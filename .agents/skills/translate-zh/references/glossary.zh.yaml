# Style notes that the translator should keep in mind (these are not
# substitutable terms; they are reminders).
style:
  - "数字、日期、单位、币种、ID、URL 一律保持原文。"
  - "公司名、产品名保留原文 Latin 拼写，不加括注的中文别名。"
  - "缩写首次出现在中文括注中给出全称，例如 “年经常性收入（ARR）”，之后段落沿用 ARR 即可。"
  - "中文句子内部用全角标点；夹杂英文单词时，前后保留半角空格以提升可读性。"
  - "翻译尽调结论保持评估口吻：避免“革命性/世界领先/颠覆”等营销化措辞。"
  - "“estimate / estimated / approximately / roughly / reportedly”等不确定性词必须保留并译为“估计 / 大约 / 据报道 / 据称”等对应限定语。"
