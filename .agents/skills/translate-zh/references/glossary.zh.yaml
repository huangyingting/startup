  bull case: 乐观情景
  base case: 基准情景
  bear case: 悲观情景
  evidence gap: 证据缺口
  evidence quality: 证据质量
  research question: 研究问题
  adverse evidence: 反向证据
  cap table: 股权结构表
  liquidation preference: 清算优先权
  preference stack: 优先股堆叠
  secondary: 老股交易
  primary: 新股
  IPO: 首次公开募股（IPO）
  filing: 监管文件
  S-1: S-1 招股说明书
  10-K: 10-K 年度报告
  cohort: 队列
  retention: 留存
  churn: 流失
  expansion: 扩张
  upsell: 增购
  cross-sell: 交叉销售
  net-new ARR: 新增 ARR
  pilot: 试点
  proof of concept: 概念验证（PoC）
  procurement: 采购
  channel partner: 渠道合作伙伴
  hyperscaler: 超大规模云厂商
  switching cost: 切换成本
  moat: 护城河
  lock-in: 锁定效应

