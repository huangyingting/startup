schemaVersion: glossary-v1
locale: zh
note: >-
  Canonical en→zh translations for recurring terminology in startup
  diligence reports. Use these exact strings whenever a term appears in
  prose. Match the website's chrome (DiligenceReport / display.ts /
  i18n.ts zh bundle) so heading vs body vs label all read the same.
  When you encounter a recurring term that is missing here, add it before
  finishing the translation.

# Chapter titles. The chapter `title` field appears in the toc / sidebar.
chapterTitles:
  Company Overview: 公司概况
  Market Analysis: 市场分析
  Competitors: 竞争格局
  Financials: 财务情况
  Product & Technology: 产品与技术
  Customers: 客户情况
  Risks: 风险
  Valuation: 估值

# Recommendation / confidence / risk / valuation enums.
# (DO NOT translate these in the YAML — the renderer maps the English
# enum string to the Chinese label via lib/display.ts. These mappings are
# included here only so prose that refers to the recommendation reads the
# same as the badge.)
recommendation:
  buy: 买入
  pass: 放弃
  track: 观察
  avoid: 回避
  research-more: 继续研究
confidence:
  high: 高
  medium: 中
  low: 低
riskRating:
  high: 高
  medium: 中
  low: 低
valuationStance:
  stretched: 偏高
  fair: 合理
  expensive: 昂贵
  cheap: 便宜
  unknown: 未知

# Common metric labels (use these whenever the prose references the metric
# rather than the YAML field name).
metrics:
  ARR: 年经常性收入（ARR）
  NRR: 净留存率（NRR）
  GRR: 总留存率（GRR）
  TAM: 总可用市场（TAM）
  SAM: 可服务市场（SAM）
  SOM: 可获取市场（SOM）
  GMV: 商品交易总额（GMV）
  CAC: 获客成本（CAC）
  LTV: 客户终身价值（LTV）
  payback: 回本周期
  burn: 烧钱速度
  runway: 现金跑道
  gross margin: 毛利率
  revenue run-rate: 收入运行率
  valuation: 估值
  total raised: 累计融资
  headcount: 员工数
  customer count: 客户数

