name = "startup-scheduler"
main = "worker.js"
compatibility_date = "2024-09-23"

# Wake every 30 minutes; worker.js decides which GitHub workflow dispatches are due.
[triggers]
crons = ["*/30 * * * *"]

[vars]
GITHUB_REF = "main"

# Secrets are NOT stored here. Set them via:
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put GITHUB_REPO
#
# GITHUB_TOKEN - Fine-grained PAT: Actions: Read & Write on the target repo
# GITHUB_REPO  - "owner/repo", e.g. "vibewatch/startup"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true