company:
  name: Vanta
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Company Overview for Vanta synthesizes public evidence on cybersecurity / trust management, retaining private-metric
    gaps where the source base is incomplete.
sections:
  - id: company-overview-section-1
    title: Evidence base
    body: >-
      Company Overview section 1 triangulates public evidence for Vanta against the chapter mission: Establish identity,
      leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. Vanta automates
      trust management and compliance workflows across frameworks such as SOC 2, ISO 27001, HIPAA, PCI, GDPR, HITRUST,
      and NIST. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Quote-based pricing and private retention metrics
      limit underwriting of revenue quality. ARR, NRR, churn, ACV, gross margin, and CAC payback should be verified
      directly with management. The referenced claim set (CO001, CO002, CO003, CO004) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
    tableRefs:
      - TO001
    figureRefs:
      - FO001
  - id: company-overview-section-2
    title: Operating implications
    body: >-
      Company Overview section 2 triangulates public evidence for Vanta against the chapter mission: Establish identity,
      leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. Vanta raised $150M
      Series C in July 2024 at a $2.45B valuation and $150M Series D in July 2025 at a $4.15B valuation. The diligence
      read is deliberately conservative: public sources can identify the company, product surface, financing context,
      customer or partner proof, and category tailwinds, but they do not expose the full management data room. The
      retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Compliance automation is crowded and could compress margins or
      raise CAC as enterprise GRC incumbents respond. Enterprise versus SMB customer mix and channel economics are not
      public. The referenced claim set (CO008, CO009, CO010, CO011) supports the section's evidence boundaries and keeps
      unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
    tableRefs:
      - TO002
    figureRefs:
      - FO002
  - id: company-overview-section-3
    title: Risk and disconfirmation
    body: >-
      Company Overview section 3 triangulates public evidence for Vanta against the chapter mission: Establish identity,
      leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. The company
      discloses thousands of customers and uses customer proof, partner channels, integrations, and Trust Center sharing
      as core distribution surfaces. The diligence read is deliberately conservative: public sources can identify the
      company, product surface, financing context, customer or partner proof, and category tailwinds, but they do not
      expose the full management data room. The retained claims in this section therefore separate observed public facts
      from estimated or inferred operating implications. For underwriting, the practical question is not whether the
      company has credible external validation; it does. The harder question is whether that validation converts into
      repeatable economics at the price implied by the latest private financing. A trust-management vendor faces
      reputational downside if its own security posture, integrations, or evidence workflows fail. Security incident
      history and penetration-test detail require NDA access to the Trust Center. The referenced claim set (CO015,
      CO016, CO017, CO018) supports the section's evidence boundaries and keeps unsupported private metrics as explicit
      diligence asks rather than invented facts.
    claimRefs:
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
    tableRefs:
      - TO003
    figureRefs:
      - FO003
  - id: company-overview-section-4
    title: Diligence view
    body: >-
      Company Overview section 4 triangulates public evidence for Vanta against the chapter mission: Establish identity,
      leadership, funding, scale, and milestones that every later chapter can reuse as ground truth. Vanta has moved
      beyond first-time compliance into GRC, third-party risk, access reviews, questionnaire automation, and AI trust
      workflows. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Quote-based pricing and private retention metrics
      limit underwriting of revenue quality. ARR, NRR, churn, ACV, gross margin, and CAC payback should be verified
      directly with management. The referenced claim set (CO022, CO023, CO024, CO025) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
    tableRefs:
      - TO004
    figureRefs: []
