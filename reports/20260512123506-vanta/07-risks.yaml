company:
  name: Vanta
chapter:
  number: 7
  title: Risks
  summary: >-
    Risks for Vanta synthesizes public evidence on cybersecurity / trust management, retaining private-metric gaps where
    the source base is incomplete.
sections:
  - id: risks-section-1
    title: Evidence base
    body: >-
      Risks section 1 triangulates public evidence for Vanta against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria.
      Vanta automates trust management and compliance workflows across frameworks such as SOC 2, ISO 27001, HIPAA, PCI,
      GDPR, HITRUST, and NIST. The diligence read is deliberately conservative: public sources can identify the company,
      product surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the
      full management data room. The retained claims in this section therefore separate observed public facts from
      estimated or inferred operating implications. For underwriting, the practical question is not whether the company
      has credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Quote-based pricing and private retention metrics
      limit underwriting of revenue quality. ARR, NRR, churn, ACV, gross margin, and CAC payback should be verified
      directly with management. The referenced claim set (CR001, CR002, CR003, CR004) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
    tableRefs:
      - TR001
      - TR005
    figureRefs:
      - FR001
  - id: risks-section-2
    title: Operating implications
    body: >-
      Risks section 2 triangulates public evidence for Vanta against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria.
      Vanta raised $150M Series C in July 2024 at a $2.45B valuation and $150M Series D in July 2025 at a $4.15B
      valuation. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Compliance automation is crowded and could
      compress margins or raise CAC as enterprise GRC incumbents respond. Enterprise versus SMB customer mix and channel
      economics are not public. The referenced claim set (CR008, CR009, CR010, CR011) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
    tableRefs:
      - TR002
    figureRefs:
      - FR002
  - id: risks-section-3
    title: Risk and disconfirmation
    body: >-
      Risks section 3 triangulates public evidence for Vanta against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria. The
      company discloses thousands of customers and uses customer proof, partner channels, integrations, and Trust Center
      sharing as core distribution surfaces. The diligence read is deliberately conservative: public sources can
      identify the company, product surface, financing context, customer or partner proof, and category tailwinds, but
      they do not expose the full management data room. The retained claims in this section therefore separate observed
      public facts from estimated or inferred operating implications. For underwriting, the practical question is not
      whether the company has credible external validation; it does. The harder question is whether that validation
      converts into repeatable economics at the price implied by the latest private financing. A trust-management vendor
      faces reputational downside if its own security posture, integrations, or evidence workflows fail. Security
      incident history and penetration-test detail require NDA access to the Trust Center. The referenced claim set
      (CR015, CR016, CR017, CR018) supports the section's evidence boundaries and keeps unsupported private metrics as
      explicit diligence asks rather than invented facts.
    claimRefs:
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
    tableRefs:
      - TR003
    figureRefs:
      - FR003
  - id: risks-section-4
    title: Diligence view
    body: >-
      Risks section 4 triangulates public evidence for Vanta against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria.
      Vanta has moved beyond first-time compliance into GRC, third-party risk, access reviews, questionnaire automation,
      and AI trust workflows. The diligence read is deliberately conservative: public sources can identify the company,
      product surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the
      full management data room. The retained claims in this section therefore separate observed public facts from
      estimated or inferred operating implications. For underwriting, the practical question is not whether the company
      has credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Quote-based pricing and private retention metrics
      limit underwriting of revenue quality. ARR, NRR, churn, ACV, gross margin, and CAC payback should be verified
      directly with management. The referenced claim set (CR022, CR023, CR024, CR025) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
    tableRefs:
      - TR004
    figureRefs: []
