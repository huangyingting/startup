company:
  name: Vanta
chapter:
  number: 8
  title: Valuation
  summary: >-
    Valuation for Vanta synthesizes public evidence on cybersecurity / trust management, retaining private-metric gaps
    where the source base is incomplete.
sections:
  - id: valuation-section-1
    title: Evidence base
    body: >-
      Valuation section 1 triangulates public evidence for Vanta against the chapter mission: Convert evidence into
      recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks. Vanta automates trust
      management and compliance workflows across frameworks such as SOC 2, ISO 27001, HIPAA, PCI, GDPR, HITRUST, and
      NIST. The diligence read is deliberately conservative: public sources can identify the company, product surface,
      financing context, customer or partner proof, and category tailwinds, but they do not expose the full management
      data room. The retained claims in this section therefore separate observed public facts from estimated or inferred
      operating implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Quote-based pricing and private retention metrics limit
      underwriting of revenue quality. ARR, NRR, churn, ACV, gross margin, and CAC payback should be verified directly
      with management. The referenced claim set (CV001, CV002, CV003, CV004) supports the section's evidence boundaries
      and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
      - CV006
      - CV007
    tableRefs:
      - TV001
      - TV005
    figureRefs:
      - FV001
  - id: valuation-section-2
    title: Operating implications
    body: >-
      Valuation section 2 triangulates public evidence for Vanta against the chapter mission: Convert evidence into
      recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks. Vanta raised $150M
      Series C in July 2024 at a $2.45B valuation and $150M Series D in July 2025 at a $4.15B valuation. The diligence
      read is deliberately conservative: public sources can identify the company, product surface, financing context,
      customer or partner proof, and category tailwinds, but they do not expose the full management data room. The
      retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Compliance automation is crowded and could compress margins or
      raise CAC as enterprise GRC incumbents respond. Enterprise versus SMB customer mix and channel economics are not
      public. The referenced claim set (CV008, CV009, CV010, CV011) supports the section's evidence boundaries and keeps
      unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CV008
      - CV009
      - CV010
      - CV011
      - CV012
      - CV013
      - CV014
    tableRefs:
      - TV002
      - TV006
    figureRefs:
      - FV002
  - id: valuation-section-3
    title: Risk and disconfirmation
    body: >-
      Valuation section 3 triangulates public evidence for Vanta against the chapter mission: Convert evidence into
      recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks. The company discloses
      thousands of customers and uses customer proof, partner channels, integrations, and Trust Center sharing as core
      distribution surfaces. The diligence read is deliberately conservative: public sources can identify the company,
      product surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the
      full management data room. The retained claims in this section therefore separate observed public facts from
      estimated or inferred operating implications. For underwriting, the practical question is not whether the company
      has credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. A trust-management vendor faces reputational
      downside if its own security posture, integrations, or evidence workflows fail. Security incident history and
      penetration-test detail require NDA access to the Trust Center. The referenced claim set (CV015, CV016, CV017,
      CV018) supports the section's evidence boundaries and keeps unsupported private metrics as explicit diligence asks
      rather than invented facts.
    claimRefs:
      - CV015
      - CV016
      - CV017
      - CV018
      - CV019
      - CV020
      - CV021
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - id: valuation-section-4
    title: Diligence view
    body: >-
      Valuation section 4 triangulates public evidence for Vanta against the chapter mission: Convert evidence into
      recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks. Vanta has moved beyond
      first-time compliance into GRC, third-party risk, access reviews, questionnaire automation, and AI trust
      workflows. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Quote-based pricing and private retention metrics
      limit underwriting of revenue quality. ARR, NRR, churn, ACV, gross margin, and CAC payback should be verified
      directly with management. The referenced claim set (CV022, CV023, CV024, CV025) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CV022
      - CV023
      - CV024
      - CV025
      - CV026
      - CV027
      - CV028
    tableRefs:
      - TV004
    figureRefs:
      - FV004
