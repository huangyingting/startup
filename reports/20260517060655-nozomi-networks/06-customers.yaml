  name: Nozomi Networks
chapter:
  number: 6
  title: "Customer and Revenue Base"
  summary: "12,000+ active installations, 115M+ OT/IoT devices monitored, and ~100% customer retention as of Q4 2025 per company disclosures. Vertical concentration in energy, utilities, and oil and gas. No verified named-customer proof points are publicly available at the individual account level. Gartner Magic Quadrant Leader recognition for the second consecutive year (2026) provides third-party validation."

sections:
- id: customer-base-overview
  title: "Customer Base Scale and Retention"
  body: >
    As of Q4 2025, Nozomi Networks reports monitoring 115M+ OT and IoT devices across 12,000+
    active installations globally — numbers that the company disclosed publicly in the context of
    the January 28, 2026 Mitsubishi Electric acquisition completion announcement. The company
    simultaneously disclosed approximately 100% customer retention, indicating near-zero annual
    churn within the deployed base. These scale claims are company-originated and have not been
    independently verified; as a private company, Nozomi does not file financial statements
    with regulators that would allow cross-checking of installed-base figures.

    Nozomi's platform serves customers across six continents, per the March 2026 Gartner Magic
    Quadrant press release. The customer base is concentrated in critical infrastructure sectors
    including energy, utilities, oil and gas, pharmaceuticals, mining, and government. Enterprise
    deployments (200+ sensors, Fortune Global 500 clients) are a growing segment, enabled by the
    Vantage cloud platform's unlimited sensor scale and AI-powered centralized management.

    Customer retention at or near 100% — if confirmed — would imply a net revenue retention (NRR)
    rate well above 100%, particularly given the company's 24% headcount growth in 2025 and
    expansion into new geographies. Strong NRR is a key indicator of platform stickiness: once
    Guardian sensors are deployed at scale across OT networks, the data and operational learning
    embedded in the platform creates meaningful switching costs.
  tableRefs: [TU001]
  figureRefs: [FU001]

- id: vertical-penetration
  title: "Vertical Market Penetration Claims"
  body: >
    Nozomi Networks makes specific vertical market penetration claims that, while unaudited,
    provide context for the quality and concentration of its installed base. The company claims
    deployments at 5 of the top 10 oil and gas companies, 7 of the top 10 pharmaceutical
    companies, 7 of the top 10 utilities companies, and 4 of the top 10 mining companies
    worldwide. These are company-stated metrics, and the methodology for ranking companies
    as "top 10" is not specified.

    The pharmaceutical sector penetration claim (7/10 top pharma) is particularly notable because
    pharmaceutical manufacturing is governed by FDA 21 CFR Part 11 and Good Manufacturing Practice
    (GMP) regulations that increasingly incorporate cybersecurity requirements. The FDA's 2023 and
    2025 guidance updates on cybersecurity in medical devices and manufacturing have heightened
    the urgency of OT security investment in this vertical. Nozomi's ability to show deep pharma
    penetration suggests it has successfully adapted its product and compliance reporting to
    meet life sciences regulatory requirements.

    For oil and gas and utilities, NERC CIP (North American Electric Reliability Corporation
    Critical Infrastructure Protection) and DOE cybersecurity strategy mandates require electric
    utilities to implement continuous monitoring, vulnerability management, and incident response
    capabilities for bulk electric system assets. These regulatory mandates are a primary driver
    of OT security budget creation in the energy vertical and validate Nozomi's deep penetration
    in this sector. The DOE's 2024 Cybersecurity Strategy specifically targets improvements to
    the electric grid's cyber resilience — directly aligned with Nozomi's value proposition.
  tableRefs: [TU002]

- id: regulatory-drivers
  title: "Regulatory Drivers of Customer Purchase"
  body: >
    OT security purchases are increasingly driven by regulatory mandates rather than discretionary
    spending decisions. The regulatory landscape across Nozomi's key customer verticals creates
    recurring, compliance-triggered purchasing pressure that supports predictable demand.

    For healthcare customers — hospitals, health systems, and medical device manufacturers —
    HIPAA (Health Insurance Portability and Accountability Act) requires protection of patient data,
    and the FDA's December 2022 omnibus and June 2025 final guidance on medical device cybersecurity
    impose specific pre-market and post-market cybersecurity obligations on manufacturers. As OT
    systems (connected medical devices, imaging systems, infusion pumps) increasingly fall under
    cyber risk scope, Nozomi's OT visibility platform addresses a direct compliance gap.

    For U.S. critical infrastructure operators, CISA's cross-sector cybersecurity guidance and
    the National Cybersecurity Strategy create industry expectations for continuous monitoring and
    anomaly detection. The CISA JCDC (Joint Cyber Defense Collaborative), of which Nozomi has
    been a founding partner since April 2022, drives public-private information sharing and
    positions Nozomi as a trusted OT security partner to federal and critical infrastructure
    customers.

    For Asian markets, Singapore's Cybersecurity Act and the Cyber Security Agency's Operational
    Technology Cybersecurity Masterplan 2024 (OT-MP 2024) create regulatory expectations for OT
    cybersecurity in the nation's critical information infrastructure. Nozomi established its
    Asia Pacific and Japan headquarters in Singapore on January 14, 2026, directly citing
    collaboration with CSA as a driver and noting close to 100 customers across the APAC region.
  tableRefs: [TU003]
  figureRefs: [FU002]

- id: customer-validation
  title: "Customer Validation: Analyst Recognition and Peer Reviews"
  body: >
    Nozomi Networks is the only vendor in the CPS Protection Platforms category to hold the
    Gartner Customers' Choice designation from the most recent Gartner Voice of the Customer
    report, per the March 9, 2026 Gartner Magic Quadrant press release. Gartner Peer Insights
    customer reviews across the cyber physical systems protection platforms market are
    available on the Gartner Peer Insights platform, where Nozomi's customer scores contributed
    to this recognition. The Customers' Choice designation is determined by end-user ratings —
    not by Gartner analyst judgment — making it a direct measure of customer satisfaction.

    PeerSpot user reviews highlight several consistent strengths: real-time OT network visibility,
    robust AI-based intrusion detection, ease of deployment (typically a few hours for initial
    setup), integration with SOC and SIEM systems, and accurate identification of OT protocols
    including OPC UA, DNP3, Modbus, and Siemens S7. Customers note that the platform "brings
    visibility into the OT environment because most enterprises only have methods to check their
    IT environment" — confirming Nozomi's core value proposition in real-world deployments.

    TrustRadius lists Nozomi Guardian (formerly SCADAGuardian) as an industrial control system
    and IoT security technology deployed across multiple industries, providing a secondary
    independent channel of customer-voice corroboration.

    Nozomi was named #3 in security on Fast Company's World's Most Innovative Companies 2025
    list (March 2025), and on the Deloitte Technology Fast 500 (November 2025) as one of the
    fastest-growing companies in North America. These external rankings confirm customer-demand
    growth and organizational velocity consistent with an expanding enterprise customer base.
  tableRefs: [TU004]

- id: deployment-patterns
  title: "Deployment Patterns and Use Case Profiles"
  body: >
    Nozomi customers deploy the platform in three primary patterns: cloud-managed (Vantage),
    on-premises air-gapped (CMC), and hybrid. PeerSpot reviews confirm that customers use
    Nozomi in both cloud and on-premises configurations, with managed service providers also
    using the platform as a white-label portal service shared with their industrial clients.

    Core deployment use cases include: OT/IoT intrusion detection for identifying threats in
    automation systems; asset inventory and vulnerability management for industrial equipment
    (PLCs, HMIs, historian servers); risk quantification and prioritization for security
    operations centers; network topology visualization for OT network segmentation planning;
    and compliance reporting for NERC CIP, NIST CSF, and IEC 62443.

    Enterprise deployments of 200+ sensors are served by Vantage, which includes automated
    alert prioritization, centralized risk scoring, and Mandiant threat intelligence distillation.
    The Vantage platform specifically highlights use cases from Fortune Global 500 companies,
    including operators managing 300+ network segmentation zones across global sites, 200+
    sensors exceeding a single on-premises console's capacity, and organizations that require
    200+ custom threat intelligence rules across a global estate.

    The APAC region, with ~100 customers supported from the Singapore headquarters,
    represents a rapidly growing segment where national OT cybersecurity regulations (including
    Singapore's OT Cybersecurity Masterplan) create regulatory demand. Regional customers
    include utilities, telecommunications operators, and government-linked companies operating
    critical national infrastructure.
  tableRefs: [TU005]

- id: customer-roi
  title: "Customer ROI and Value Realization"
  body: >
    PeerSpot aggregated reviews document several ROI dimensions that enterprise customers
    report after deploying Nozomi: significantly enhanced threat detection and visibility;
    reduced operational downtime through early warning of anomalous conditions; time and cost
    savings from automated alert processing and asset inventory management; improved decision-making
    with clear risk insights; and elevated security posture that reduces the financial impact of
    potential cyber incidents.

    The pricing structure from customer review sources suggests Nozomi is perceived as
    mid-range among OT security vendors — cited by some as less expensive than Claroty,
    while others note both companies are on the higher side for enterprise security budgets.
    Deployment is described as straightforward: the initial setup is typically completable
    within a few hours, with custom configurations adding complexity proportional to the
    number of sites, sensors, and alert rules required. This low time-to-value for initial
    deployment reduces project risk for customers and accelerates sales cycles for Nozomi.

    The customer support function receives generally positive assessments: knowledgeable
    staff, local proactive support teams, and system stability that reduces the frequency
    of support calls. Faster response times and more direct communication are cited as
    areas for improvement. The platform's stability — resulting in few critical failures
    requiring emergency support — is itself a customer satisfaction driver in OT environments
    where unplanned downtime has direct safety and production cost consequences.
  figureRefs: [FU003]

- id: customer-challenges
  title: "Customer Challenges and Adverse Feedback"
  body: >
    Despite strong customer satisfaction ratings, PeerSpot reviews and other customer-sourced
    feedback document several consistent areas requiring improvement. The most frequently cited
    operational challenge is query syntax complexity: multiple customers note that Nozomi's
    query language is complex and non-intuitive, with one reviewer stating "the query syntax
    is very complex, so sometimes you will not get what you want." This interface friction
    is a usability risk for OT security teams with limited data analysis training.

    Customer feedback on Vantage IQ (the AI assistant) notes that the product has room to
    improve: "their AI, which is IQ, could be more improved." Given that Vantage IQ launched
    in January 2026, early-stage product feedback is expected, but the criticism suggests that
    initial releases have not fully delivered the AI-guided productivity benefits promised in
    the launch announcement.

    Proof of concept (PoC) presentation quality also receives criticism: some customers suggest
    that Nozomi's PoC process could be made more tangible through improved demo materials and
    video presentations. This feedback implies that the sales process may over-rely on technical
    teams to convey product value and underinvest in structured buyer enablement.

    Pricing is noted as a concern by some buyers, particularly for licensing of add-on features.
    Customers in smaller markets may find the enterprise pricing tier prohibitive; requests for
    free add-on agent availability (Arc) have been noted. These pricing concerns affect
    Nozomi's addressable market in mid-size industrial companies that have OT security needs
    but more limited cybersecurity budgets than Fortune Global 500 accounts.
  tableRefs: [TU006]

