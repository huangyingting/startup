  researchQuestions:
  - id: QU001
    question: >
      Can Nozomi provide a list of named, referenceable customers in each of its five claimed
      top-10 verticals (oil and gas, pharmaceuticals, utilities, mining, and government) with
      sufficient detail to validate the penetration claims through diligence calls?
    type: enumeration
    status: answered
    targets:
    - contentRequirements/2
    rationale: >
      Top-10 vertical penetration claims are unverified and company-stated. Named references
      are required to validate these claims as part of standard enterprise growth-stage diligence.

  - id: QU002
    question: >
      What is the actual net revenue retention rate (NRR), including upsell and expansion ARR,
      distinct from base retention? Has this figure been audited or independently calculated?
    type: quantification
    status: answered
    targets:
    - contentRequirements/3
    rationale: >
      The ~100% retention claim may refer to logo retention only. NRR above 100% would confirm
      expansion revenue growth; below 100% would indicate contraction. This distinction is
      critical for revenue quality assessment.

  - id: QU003
    question: >
      What is the customer concentration risk: what percentage of total ARR comes from the
      top 10, top 25, and top 50 customers, and are any single-customer relationships
      above 10% of total ARR?
    type: quantification
    status: answered
    targets:
    - contentRequirements/4
    rationale: >
      Customer concentration above 20% in a handful of accounts creates material churn risk
      at the logo level. This data point is essential for modeling revenue downside scenarios.

  - id: QU004
    question: >
      What are the unit economics of customer acquisition in each vertical, including
      average selling price (ASP), sales cycle length, and customer acquisition cost (CAC)
      by channel (direct, partner, marketplace)?
    type: quantification
    status: answered
    targets:
    - contentRequirements/0
    rationale: >
      Unit economics determine the scalability of the go-to-market model under Mitsubishi
      Electric ownership. A detailed CAC/LTV breakdown by channel confirms whether growth
      is margin-accretive or loss-making.

  - id: QU005
    question: >
      What is the Arc endpoint agent attach rate within the existing 12,000+ Guardian
      installation base, and what is the annual contract value (ACV) uplift from Arc
      relative to Guardian-only contracts?
    type: quantification
    status: answered
    targets:
    - contentRequirements/1
    rationale: >
      Arc expand represents the best platform upsell opportunity. Low Arc attach rate
      (below 20% of installations) would indicate the upsell motion is underperforming
      relative to its potential.

  - id: QU006
    question: >
      What fraction of the 12,000+ installations are single-site deployments vs.
      multi-site enterprise deployments, and what is the average deployment size
      in sensors per customer for the top 20% of accounts by ARR contribution?
    type: quantification
    status: answered
    targets:
    - contentRequirements/0
    rationale: >
      Single-site deployments have lower switching costs and lower revenue per customer.
      Multi-site enterprise accounts represent the highest-value and highest-retention
      segment. Understanding the split informs the customer quality assessment.

  - id: QU007
    question: >
      What is the pipeline of government contract awards enabled by the CDM APL inclusion
      and the FedRAMP Moderate In Process status, and what is the estimated federal TAM
      that becomes accessible upon FedRAMP authorization completion?
    type: enumeration
    status: answered
    targets:
    - contentRequirements/1
    rationale: >
      Government revenue is a high-value, high-retention segment. The size and maturity
      of the federal pipeline determines how quickly FedRAMP completion translates to ARR.

  - id: QU008
    question: >
      What are the top five explicit customer churn events (lost logos) in the past three
      years, including the reason for churn and the ARR value of each lost account?
    type: adverse
    status: answered
    targets:
    - contentRequirements/3
    rationale: >
      Understanding why customers do churn — even if churn is rare — reveals the
      platform's competitive vulnerabilities and key implementation failure modes.

  - id: QU009
    question: >
      What customer success metrics are tracked internally (time to first alert, time to
      first incident detected, deployment time, alert accuracy rates), and how do these
      metrics compare to industry benchmarks for OT security platforms?
    type: enumeration
    status: answered
    targets:
    - contentRequirements/3
    rationale: >
      Internal operational metrics are leading indicators of customer health and future
      retention. Degradation in these metrics predicts churn before it appears in retention
      statistics.

  - id: QU010
    question: >
      How are customers managing the regulatory transition to NIS2 in Europe, and what
      are the contracted compliance reporting deliverables Nozomi provides under NIS2-driven
      customer agreements?
    type: mechanism
    status: answered
    targets:
    - contentRequirements/0
    rationale: >
      NIS2 creates recurring compliance reporting requirements that can deepen platform
      lock-in and justify annual ACV expansion. Understanding NIS2-specific contract
      terms in Europe reveals revenue quality and expansion potential.

  - id: QU011
    question: >
      What percentage of Nozomi's customer base is in Asia Pacific, and what is the
      projected revenue CAGR for the APAC region over the next three years under
      Mitsubishi Electric's distribution network?
    type: quantification
    status: answered
    targets:
    - contentRequirements/0
    rationale: >
      The APAC market represents a growth opportunity driven by Singapore's OT Cybersecurity
      Masterplan and Mitsubishi Electric's Japanese and APAC industrial customer relationships.
      Quantifying this trajectory is a key part of revenue upside assessment.

  - id: QU012
    question: >
      Has Mitsubishi Electric provided any Nozomi customer warm introductions to its own
      factory automation and power systems customer base since the acquisition closed in
      January 2026, and are any cross-sell agreements in place?
    type: verification
    status: answered
    targets:
    - contentRequirements/4
    rationale: >
      Mitsubishi Electric operates one of the world's largest factory automation and power
      systems businesses. Cross-sell to Mitsubishi's OEM customer base is the primary
      strategic synergy of the acquisition and the most significant customer expansion lever.

  - id: QU013
    question: >
      What is the typical NPS (Net Promoter Score) and CSAT score from customer success
      surveys for Nozomi, broken down by deployment size, vertical, and geographic region?
    type: quantification
    status: answered
    targets:
    - contentRequirements/3
    rationale: >
      NPS and CSAT data provide quantitative customer satisfaction benchmarks that validate
      or challenge the qualitative review evidence from PeerSpot and Gartner Peer Insights.

  - id: QU014
    question: >
      What is the professional services revenue as a percentage of total ARR, and is
      professional services margin dilutive or accretive to the overall gross margin?
    type: quantification
    status: answered
    targets:
    - contentRequirements/4
    rationale: >
      High professional services dependency relative to SaaS revenue implies lower overall
      gross margin and scalability constraints. The PS/SaaS revenue mix informs the
      platform's true margin profile.

  - id: QU015
    question: >
      Are there any documented cases where Nozomi's platform failed to detect an active
      OT cyberattack in a customer environment, and how were these incidents disclosed
      to affected customers and the broader market?
    type: adverse
    status: answered
    targets:
    - contentRequirements/2
    rationale: >
      High-profile detection failure cases create reputational risk and churn. Understanding
      the detection miss history informs the reliability of the ~100% retention claim and
      the platform's operational effectiveness in adversarial conditions.

  - id: QU016
    question: >
      What are Nozomi's contractual SLAs for customer support response, and what
      penalties or remedies exist when SLAs are breached in OT environments where
      security incidents require immediate vendor response?
    type: verification
    status: answered
    targets:
    - contentRequirements/3
    rationale: >
      OT security incidents require rapid response. Weak support SLAs in OT environments
      are a churn trigger for enterprise customers with high availability and safety requirements.

  - id: QU017
    question: >
      How do customers in the mining vertical use Nozomi relative to oil and gas —
      specifically, what OT protocols and asset types are most commonly monitored,
      and what are the most frequent detected threat types?
    type: comparison
    status: answered
    targets:
    - contentRequirements/0
    rationale: >
      Mining has distinct OT systems (conveyor controls, autonomous drilling, ventilation)
      from O&G. Protocol-level use case comparison informs the platform's horizontal
      scalability across verticals.

  - id: QU018
    question: >
      What percentage of APAC customers are using Vantage (cloud) vs. CMC (on-premises),
      and how does this deployment preference compare to Americas and EMEA customer preferences?
    type: quantification
    status: answered
    targets:
    - contentRequirements/1
    rationale: >
      Cloud vs. on-premises deployment mix affects ARR quality and support cost structure.
      APAC customers in regulated environments (government, critical infrastructure) may
      prefer on-premises, impacting Vantage SaaS revenue growth in the region.

  - id: QU019
    question: >
      Are there customer commitments to multi-year contracts (3+ years), and what is the
      weighted average remaining contract term (WARCT) across the customer base?
    type: quantification
    status: answered
    targets:
    - contentRequirements/3
    rationale: >
      Multi-year contract commitments reduce ARR volatility and improve revenue visibility.
      WARCT is a leading indicator of near-term retention risk.

  - id: QU020
    question: >
      What is the competitive win rate against Claroty, Dragos, Armis, and Forescout
      in competitive evaluations, by vertical and by deal size?
    type: quantification
    status: answered
    targets:
    - contentRequirements/2
    rationale: >
      Win rate data is the most direct proxy for product-market differentiation. Declining
      win rates in specific verticals would signal competitive erosion before it appears
      in financial metrics.

  - id: QU021
    question: >
      What is the average ARR per customer and the distribution of ACV across the customer
      base, including the ARR from the top 10 customers and the ARR floor for the
      bottom quartile of customers?
    type: quantification
    status: answered
    targets:
    - contentRequirements/4
    rationale: >
      Understanding the ACV distribution informs pricing power, market segmentation, and
      the potential for ARR expansion through upselling existing accounts vs. new logo growth.

  - id: QU022
    question: >
      How does Nozomi handle customer deployments in industries with specific OT safety
      certification requirements (e.g., IEC 61511 for process safety, IEC 62061 for
      machinery safety), and does the platform hold any safety certification itself?
    type: verification
    status: answered
    targets:
    - contentRequirements/2
    rationale: >
      Safety-certified OT environments have stringent change management requirements.
      If Nozomi's platform requires modification to certified systems, deployment may
      trigger re-certification costs — a significant adoption barrier in safety-critical sectors.

  - id: QU023
    question: >
      What proportion of customers have integrated Nozomi with a SIEM or SOAR platform,
      and which SIEM (Splunk, IBM QRadar, Microsoft Sentinel, Google SecOps) accounts for
      the largest share of integrations?
    type: quantification
    status: answered
    targets:
    - contentRequirements/1
    rationale: >
      SIEM integration depth indicates IT-OT convergence maturity in the customer base.
      Deep SIEM integrations create additional switching costs and validate the platform's
      role in the broader security operations stack.

  - id: QU024
    question: >
      What customer advisory board or user community does Nozomi operate, and how do
      customer representatives influence the product roadmap?
    type: enumeration
    status: answered
    targets:
    - contentRequirements/4
    rationale: >
      A formal customer advisory board indicates product development discipline and ensures
      the roadmap reflects real-world operator needs. Absence of structured customer input
      mechanisms is a product risk for an enterprise OT security company.

  - id: QU025
    question: >
      What expansion motion does Nozomi use to grow ARR within existing accounts, and
      what is the current land-and-expand conversion rate from pilot/PoV deployments
      to full enterprise contracts?
    type: mechanism
    status: answered
    targets:
    - contentRequirements/4
    rationale: >
      Land-and-expand is the primary go-to-market model for OT security platforms. The
      conversion rate from pilot to full deployment, and the average time to expand within
      an account, determines the efficiency of the existing customer growth motion.

