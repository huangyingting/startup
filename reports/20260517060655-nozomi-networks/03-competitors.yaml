  - id: S-P-04
    title: Nozomi's Competitive Moat and Positioning
    body: |
      Nozomi's competitive moat rests on four reinforcing elements: (1) OT protocol depth — 300+ ICS protocols
      supported via Guardian sensors; (2) physical deployment lock-in — once Guardian sensors are racked in
      plant network closets and tuned to customer OT environments, switching to a competitor requires re-installing
      hardware across potentially hundreds of OT network segments; (3) customer trust built through 13 years
      of operational deployment across the world's most critical industrial sites (5 of top 10 global oil & gas
      operators, 7 of top 10 utilities, 7 of top 10 pharma companies); and (4) analyst and regulatory recognition
      (Gartner MQ Leader, Forrester Leader, CISA JCDC founding partner, DHS CDM APL).

      Nozomi's passive monitoring approach — using Guardian as a passive tap on OT network traffic — avoids
      active scanning that can destabilize industrial equipment. This is a fundamental product design decision that
      differentiates Nozomi from IT security platforms attempting to enter OT with active-scanning architectures.
      Dragos shares this passive approach; Armis and Forescout use agentless discovery methods with different
      risk profiles.

      The Mitsubishi Electric acquisition creates a new strategic moat layer: distribution access to Mitsubishi's
      industrial automation customer base globally, particularly in Japan and APAC. No pure-play OT security
      competitor has comparable APAC industrial distribution. This is a durable competitive advantage for at
      least 3-5 years, given how long it takes competitors to build equivalent partner relationships.

      Key risks to moat durability: platform commoditization by large IT security vendors (Palo Alto, CrowdStrike,
      Microsoft) if OT protocol support becomes a commodity module; Claroty's significant funding advantage if
      it invests aggressively in protocol depth; and the emergence of AI-native competitors with more capital
      or better AI models for industrial anomaly detection.
