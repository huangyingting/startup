  - id: S-P-03
    title: Adjacent Platform and IT-Origin Competitors
    body: |
      Armis (founded 2015) positions as the broadest cyber exposure management platform, covering OT, IoT,
      IoMT, and IT assets under a single "Armis Centrix" umbrella. Armis serves 3,200+ customers including 1
      in 5 Fortune 500 companies, making it the largest by customer count among the pure-play security vendors
      in this analysis. However, Armis's customer base skews heavily toward IT asset management and healthcare
      IoMT use cases; its OT/ICS penetration within Nozomi's core industrial verticals (oil & gas, utilities,
      manufacturing) is less established. Armis raised approximately $600 million at a $3.4 billion valuation
      (2021). CEO Yevgeny Dibrov is a co-founder.

      Forescout Technologies (25+ years in network access control) acquired Vedere Labs for OT-specific threat
      intelligence and positions its 4D Platform as an integrated IT/OT/IoT/IoMT risk management solution. With
      3,200+ customers and 1 in 5 Fortune 500 penetration, Forescout has strong enterprise distribution but is
      not primarily known as an ICS specialist. Its agentic AI threat response is a product evolution toward
      active security vs. passive monitoring.

      Microsoft Defender for IoT (acquired from CyberX in 2020) provides OT/IoT passive monitoring integrated
      into the Microsoft Sentinel SIEM and Microsoft 365 Defender ecosystem. Microsoft's pricing model — free
      or bundled for Azure/M365 enterprise customers — creates significant downward pricing pressure on
      standalone OT monitoring tools in organizations with large Microsoft enterprise agreements. However,
      Defender for IoT's OT protocol depth is generally considered inferior to purpose-built OT platforms.

      Cisco Cyber Vision (acquired from Sentryo in 2019) is embedded in Cisco's industrial network hardware,
      providing OT visibility to customers who have deployed Cisco switches and routers in OT environments.
      Cisco's OEM channel advantage is partially offset by limited protocol depth compared to Nozomi.

      TXOne Networks (Trend Micro + Moxa joint venture) offers a different approach: OT-native endpoint
      protection (Stellar) plus OT network segmentation tools, with the Sennin CPS Platform for enterprise
      orchestration. TXOne is expanding from OT endpoint into a broader CPS protection platform, directly
      converging with Nozomi's core segment.
