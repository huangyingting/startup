      type: third-party-reported
      topic: competitive-risk
      confidence: high
      freshness: current
      sourceRefs: [SR009, SR008]
      answersQuestionRefs: [QR012]

    - id: CR012
      statement: >
        Microsoft Defender for IoT — acquired from CyberX in June 2020 for approximately $165M —
        is embedded in the Microsoft Defender for Cloud and Microsoft Sentinel ecosystems and
        available at near-zero incremental cost for enterprise customers with existing Microsoft
        security licenses, representing a bundling threat to standalone OT security vendors
        including Nozomi in accounts where Microsoft security spend is already high.
      type: observed
      topic: competitive-risk
      confidence: high
      freshness: current
      sourceRefs: [SR015, SR008]
      answersQuestionRefs: [QR011]

    - id: CR013
      statement: >
        CrowdStrike and Palo Alto Networks both offer OT security modules integrated with their
        existing endpoint and network security platforms; as enterprise security buyers consolidate
        vendors to reduce complexity and cost, bundled OT security offerings from large platform
        vendors represent an existential pricing threat to purpose-built OT vendors like Nozomi
        in non-critical-infrastructure enterprise accounts.
      type: third-party-reported
      topic: competitive-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR008, SR015]
      answersQuestionRefs: [QR013]

    - id: CR014
      statement: >
        The Dragos 2026 OT Cybersecurity Year in Review documents three new OT threat groups
        emerging in 2025, adversaries actively mapping control loops, and ransomware causing
        significant operational disruptions in critical infrastructure; this threat escalation
        validates OT security market urgency but also implies that Nozomi's detection capabilities
        are being tested against more sophisticated adversaries than at any prior point.
      type: third-party-reported
      topic: competitive-risk
      confidence: high
      freshness: current
      sourceRefs: [SR006, SR003]
      answersQuestionRefs: [QR014]

