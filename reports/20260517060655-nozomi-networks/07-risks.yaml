      type: observed
      topic: competitive-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR010, SR003]
      answersQuestionRefs: [QR015]

    - id: CR017
      statement: >
        Mitsubishi Electric completed the acquisition of Nozomi Networks on January 28, 2026;
        Mitsubishi Electric is itself a major global OT equipment manufacturer (factory automation,
        servo systems, SCADA, inverters) that competes directly with Siemens, ABB, Rockwell
        Automation, and Honeywell — all significant suppliers to Nozomi's existing and prospective
        customers, creating a structural vendor-neutrality conflict risk.
      type: observed
      topic: acquisition-risk
      confidence: high
      freshness: current
      sourceRefs: [SR001, SR002]
      answersQuestionRefs: [QR016, QR018]

    - id: CR018
      statement: >
        Enterprise critical infrastructure operators choosing OT security platforms routinely
        require vendor-agnostic monitoring that does not favor or disadvantage any specific
        OT equipment vendor; Nozomi's acquisition by an OT equipment manufacturer could be
        perceived as compromising this neutrality, particularly in accounts where Mitsubishi
        Electric competes for OT equipment sales with incumbent vendors Siemens, ABB, or Honeywell.
      type: inferred
      topic: acquisition-risk
      confidence: high
      freshness: current
      sourceRefs: [SR001, SR002, SR013]
      answersQuestionRefs: [QR018]

    - id: CR019
      statement: >
        Co-founders Andrea Carcano (CPO) and Moreno Carullo (CTO) remain operationally active
        at Nozomi as of the acquisition close; they are named inventors on multiple Nozomi patents
        and are the primary technical visionaries of the platform; their retention terms
        post-acquisition are not publicly disclosed, representing a key-person risk if they
        depart within the typical 2–4 year earnout window.
      type: observed
      topic: key-person-risk
      confidence: high
      freshness: current
      sourceRefs: [SR021, SR001]
      answersQuestionRefs: [QR019]

    - id: CR020
      statement: >
        Mitsubishi Electric operates under the Japanese keiretsu corporate model with hierarchical
        decision-making, long planning cycles, and consensus-based culture; this structural
        difference from Nozomi's San Francisco-based startup culture creates organizational
        friction risk that could slow product development velocity, increase attrition among
        engineering staff, and reduce Nozomi's agility in responding to competitive threats.
      type: inferred
      topic: acquisition-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR002, SR029]
      answersQuestionRefs: [QR016]

    - id: CR021
      statement: >
        Nozomi's vendor-agnostic brand positioning — "we keep critical infrastructure cyber
        resilient" without preferencing any OT equipment vendor — is a core commercial asset;
        any post-acquisition signal that Nozomi monitoring data is accessible to Mitsubishi Electric
        business units or that detection/response recommendations favor Mitsubishi products could
        permanently damage this positioning and trigger customer defections.
      type: inferred
      topic: acquisition-risk
      confidence: high
      freshness: current
      sourceRefs: [SR001, SR013]
      answersQuestionRefs: [QR018]

