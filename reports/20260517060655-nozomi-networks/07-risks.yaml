  claims:
    - id: CR001
      statement: >
        Nozomi Networks holds FedRAMP Moderate In Process designation as of October 2025, a
        necessary precursor to full FedRAMP Moderate authorization required for U.S. federal
        agency deployments; the typical authorization timeline post-in-process is 12–24 months.
      type: observed
      topic: regulatory-risk
      confidence: high
      freshness: current
      sourceRefs: [SR001, SR003]
      answersQuestionRefs: [QR001]

    - id: CR002
      statement: >
        The EU NIS2 Directive (Directive 2022/2555), effective October 2024, mandates cybersecurity
        incident reporting and risk management across 18 critical infrastructure sectors in EU member
        states, with fines up to €10M or 2% of global annual revenue, creating compliance complexity
        for Nozomi's European customers who must validate that Nozomi's product capabilities satisfy
        NIS2 obligations.
      type: observed
      topic: regulatory-risk
      confidence: high
      freshness: current
      sourceRefs: [SR004, SR003]
      answersQuestionRefs: [QR002]

    - id: CR003
      statement: >
        NERC CIP Standards (CIP-002 through CIP-014) require bulk electric system operators to
        implement and maintain cybersecurity controls; Nozomi deployments in the energy sector
        must be validated as supporting NERC CIP compliance, creating a compliance documentation
        burden for both Nozomi and its utility customers.
      type: observed
      topic: regulatory-risk
      confidence: high
      freshness: current
      sourceRefs: [SR005, SR003]
      answersQuestionRefs: [QR003]

    - id: CR004
      statement: >
        The SEC's 2023 cybersecurity disclosure rule (effective December 2023) requires public
        companies to disclose material cybersecurity incidents within four business days on Form
        8-K; Nozomi's enterprise customers — who are predominantly publicly traded utilities,
        energy firms, and pharma companies — depend on Nozomi's detection and triage speed to
        meet this disclosure obligation, creating indirect liability exposure for Nozomi if
        detection failures contribute to delayed disclosures.
      type: observed
      topic: regulatory-risk
      confidence: high
      freshness: current
      sourceRefs: [SR020, SR028]
      answersQuestionRefs: [QR004]

    - id: CR005
      statement: >
        Following the Mitsubishi Electric acquisition, Nozomi Networks products are subject to
        both U.S. Export Administration Regulations (EAR) and Japan's Foreign Exchange and Foreign
        Trade Act (FEFTA) export control frameworks, adding operational compliance complexity for
        Nozomi sales in countries subject to U.S. or Japan export restrictions.
      type: inferred
      topic: regulatory-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR002, SR001]
      answersQuestionRefs: [QR006]

    - id: CR006
      statement: >
        GDPR and EU data residency requirements affect Nozomi's European SaaS deployments; the
        Vantage cloud platform must route EU customer OT telemetry through EU-based data centers
        and provide data processing agreements (DPAs) compliant with GDPR Chapter V transfer
        restrictions, creating deployment friction for cloud-first Vantage customers in the EU.
      type: inferred
      topic: regulatory-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR004, SR003]
      answersQuestionRefs: [QR009]

    - id: CR007
      statement: >
        Nozomi Networks Sagl holds an active patent portfolio in OT anomaly detection and
        automatic signature generation; confirmed granted patents include US patent 12341787
        (June 2025, "Method for automatic signatures generation from a plurality of sources",
        inventors Carcano, Carullo, Kleymenov) and US patent 12238130 (anomaly detection in
        data traffic), establishing IP ownership over core platform capabilities.
      type: observed
      topic: legal-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR021]
      answersQuestionRefs: [QR007]

    - id: CR008
      statement: >
        No published litigation involving Nozomi Networks has been identified through public
