        database; the NVD CPE registry identifies CMC versions 22.0.0 through 25.3.0 and
        Guardian sensor versions as registered products within the U.S. vulnerability taxonomy;
        no Critical (CVSS 9+) Nozomi CVEs appear in the CISA KEV catalog as of the May 2026
        research date, but the existence of published CVEs confirms an attack surface requiring
