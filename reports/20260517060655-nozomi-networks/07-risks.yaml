callouts:
  - title: "Top Thesis-Break Risk: Vendor Neutrality Post-Acquisition"
    body: >
      The single highest-severity risk is the combination of Mitsubishi Electric's OT equipment
      manufacturing business and Nozomi's requirement for vendor-neutral customer trust. If
      enterprise buyers — particularly those running Siemens, ABB, Honeywell, or Rockwell
      equipment — perceive that Nozomi monitoring data is accessible to Mitsubishi or that
      Nozomi favors Mitsubishi OT products, the commercial positioning could erode rapidly.
      This risk cannot be mitigated through product architecture alone; it requires sustained
      contractual, legal, and communications commitments from Mitsubishi Electric management.
    calloutType: risk
    claimRefs: [CR017, CR018, CR021]

  - title: "FedRAMP Authorization Is a Time-Gated Revenue Gate"
    body: >
      U.S. federal agency sales above the simplified acquisition threshold require FedRAMP
      authorization. Nozomi is In Process as of October 2025, but FedRAMP JAB reviews
      routinely take 18–24 months from in-process designation. Any delay beyond 2027 closes
      the federal market for at least two additional fiscal cycles. The Japanese ownership
      adds a CFIUS/NDAA scrutiny dimension that could further complicate or delay authorization.
      Investors should request detailed FedRAMP milestone tracking as a precondition of diligence.
    calloutType: risk
    claimRefs: [CR001, CR010, CR035]

  - title: "OT Threat Escalation Simultaneously Expands Market and Raises Product Bar"
    body: >
      Dragos 2026 YIR documents three new OT threat groups and adversaries now mapping
      industrial control loops. This escalation is a strong tailwind for OT security demand,
      but it also means Nozomi's detection capabilities are tested against more sophisticated
      adversaries. If a major breach occurs at a Nozomi-monitored facility and detection
      failure is demonstrated, the reputational consequences could outweigh the market
      expansion benefit. Continuous threat coverage investment is a strategic imperative.
    calloutType: insight
    claimRefs: [CR014, CR034, CR037]
