    - id: CR009
      statement: >
        The TSA pipeline security directives (2021-2022) and U.S. DOT cybersecurity initiatives
        impose mandatory cybersecurity requirements on transportation critical infrastructure
        operators, with pipeline operators required to implement continuous monitoring capabilities;
        Nozomi's pipeline sector customers must demonstrate compliance with these directives,
