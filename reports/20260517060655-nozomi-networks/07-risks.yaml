      topic: competitive-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR008, SR006]
      answersQuestionRefs: [QR015]

    - id: CR016
      statement: >
        Open-source OT security tools (Zeek network analyzer, Snort IDS, passive asset discovery
        scripts) are freely available and used by budget-constrained smaller critical infrastructure
        operators; while they lack Nozomi's AI automation and scale, they serve as a floor-price
