    - id: CR010
      statement: >
        FedRAMP authorization timeline uncertainty is a material risk: FedRAMP In Process
        designation (October 2025) does not guarantee authorization, and multiple cybersecurity
        vendors have experienced multi-year delays in the JAB review process; any delay beyond
        Q4 2027 could materially limit Nozomi's ability to compete for U.S. federal contracts
        above the simplified acquisition threshold.
      type: inferred
      topic: regulatory-risk
      confidence: medium
      freshness: current
      sourceRefs: [SR003, SR017]
      answersQuestionRefs: [QR001]

    - id: CR011
      statement: >
        Claroty has raised approximately $635M in total funding through its Series D (2023),
        operating at a scale comparable to Nozomi; its platform offers OT, IoT, and CPS security
        with similar protocol coverage and Gartner Leader recognition in the 2026 CPS Protection
