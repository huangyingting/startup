      - number: '7.4'
        title: Acquisition and Integration Risks
        blocks:
          - type: paragraph
            body: >
              The Mitsubishi Electric acquisition completed January 28, 2026 introduced a new category of structural
              risk: vendor neutrality perception. Nozomi's core value proposition is that it is agnostic to the OT
              vendor ecosystem — it monitors Siemens PLCs, ABB DCS systems, Honeywell historians, and Rockwell
              Automation controllers impartially. Mitsubishi Electric is itself a major global OT equipment manufacturer
              (factory automation, servo systems, SCADA, inverters), competing directly with Siemens, ABB, Rockwell, and
              Honeywell. Nozomi's largest potential customers include direct Mitsubishi Electric competitors. Concerns
              about data sovereignty — whether Nozomi's telemetry data is accessible to the Mitsubishi Electric parent —
              could create friction in competitive accounts, even if contractual barriers exist.

              Key-person retention is a material risk. CEO Edgard Capdevielle joined in 2015; co-founders Andrea Carcano
              (CPO) and Moreno Carullo (CTO) remain operationally active and are named inventors on core patents. Under
              typical M&A earnout structures, founder retention is contractually bound for 2–4 years post-close;
              specific retention terms are not publicly disclosed. If either co-founder exits during the integration
              phase, product vision continuity and engineering velocity could be materially impaired.

              Cultural integration risk is significant: Mitsubishi Electric operates under the Japanese keiretsu model
              with hierarchical decision-making and long planning cycles, which is structurally different from Nozomi's
              San Francisco-based startup culture. Post-acquisition reporting requirements, procurement processes, and
              personnel policies may conflict with Nozomi's agile development cadence. Mitsubishi Electric's investor
              relations page does not disclose Nozomi segment revenues, creating opacity around financial performance
              targets and management accountability.

              The acquisition price remains undisclosed. Without a public transaction valuation, it is not possible to
              independently assess whether Mitsubishi paid a premium or discount to market comparables, or whether any
              earn-out provisions create future dilution risk for residual equity holders.
