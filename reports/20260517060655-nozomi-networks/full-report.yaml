      - number: '2.5'
        title: Adoption Constraints and Market Risks
        blocks:
          - type: paragraph
            body: >
              Despite strong regulatory and threat tailwinds, OT security adoption faces durable structural constraints.

              The primary technical barrier is the brownfield deployment problem: legacy ICS environments use
              proprietary

              protocols, vendor-specific hardware, and operating systems (often Windows XP/Server 2003) that cannot be

              patched without risk of operational disruption. Passive monitoring (Nozomi's core approach with Guardian)

              partly mitigates this by avoiding intrusive agents, but requires physical sensor placement at every
              network

              segment — a capital-intensive deployment. Long procurement and integration cycles (12-24 months for large

              utilities) limit revenue velocity.


              Budget allocation is fragmented: most large industrial organizations split OT security responsibility
              between IT

              and OT teams that historically operated independently, creating competing approval chains. In lower-margin

              verticals like water and wastewater or small manufacturing, cybersecurity budgets remain minimal and OT

              security competes with operational capex for scarce funding.


              Market consolidation risk is emerging: large IT security vendors (Cisco, Palo Alto, Microsoft, IBM) are

              acquiring OT security capabilities, potentially commoditizing Nozomi's core analytics at the platform
              layer.

              Legacy OT automation vendors (Siemens, Honeywell, Schneider Electric) are also building native security

              into their platforms, reducing the need for third-party overlays in new greenfield deployments. Nozomi's

              Mitsubishi Electric acquisition addresses competitive consolidation risk by embedding Nozomi within an

              industrial automation vendor rather than remaining standalone.


              Analyst sizing estimates are highly divergent (MarketsandMarkets: $50B by 2030 vs Precedence Research:

              $122B by 2034), which reflects genuine definitional ambiguity and low analyst consensus on OT security

              boundaries. Diligence should independently validate segment-level spend data with buyer surveys rather

              than relying on top-down analyst forecasts.
            claimRefs:
              - CM034
              - CM035
              - CM036
              - CM037
              - CM038
              - CM039
              - CM041
              - CM042
              - CM043
          - type: table
            tableRef: TM006
