  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture Overview
        blocks:
          - type: paragraph
            body: >
              The Nozomi Networks platform is a modular, multi-layered OT, IoT, and Cyber Physical Systems (CPS)
              security architecture assembled from five purpose-built components: Guardian (passive wired sensor), Arc
              (endpoint agent), Guardian Air (wireless sensor), Vantage (cloud SaaS management), and the Central
              Management Console or CMC (on-premises management). Each component collects asset, traffic, or spectrum
              data, routes it to centralized management, and feeds AI-powered analytics. The design philosophy is
              passive-first: sensors observe without injecting traffic, which is critical in OT environments where
              unsolicited packets can disrupt programmable logic controllers and safety instrumented systems.

              The platform is positioned as the AI-powered solution for OT and IoT visibility and security,
              purpose-built for critical infrastructure environments where traditional IT security tools cannot operate
              safely. The architecture supports both fully cloud-managed deployments (Vantage) and air-gapped
              on-premises deployments (CMC), giving operators flexibility regardless of connectivity constraints or
              data-residency requirements.

              As of May 2026, the platform monitors 115M+ devices across 12,000+ installations globally
              (company-claimed). The NVD NIST CPE database lists Nozomi products — including CMC versions 22.0.0 through
              25.3.0 and Guardian sensors — as registered software, indicating formal recognition within the U.S.
              cybersecurity vulnerability taxonomy.
            claimRefs: []
