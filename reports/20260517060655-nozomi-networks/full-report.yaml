      - number: '6.6'
        title: Customer ROI and Value Realization
        blocks:
          - type: paragraph
            body: >
              PeerSpot aggregated reviews document several ROI dimensions that enterprise customers report after
              deploying Nozomi: significantly enhanced threat detection and visibility; reduced operational downtime
              through early warning of anomalous conditions; time and cost savings from automated alert processing and
              asset inventory management; improved decision-making with clear risk insights; and elevated security
              posture that reduces the financial impact of potential cyber incidents.

              The pricing structure from customer review sources suggests Nozomi is perceived as mid-range among OT
              security vendors — cited by some as less expensive than Claroty, while others note both companies are on
              the higher side for enterprise security budgets. Deployment is described as straightforward: the initial
              setup is typically completable within a few hours, with custom configurations adding complexity
              proportional to the number of sites, sensors, and alert rules required. This low time-to-value for initial
              deployment reduces project risk for customers and accelerates sales cycles for Nozomi.

              The customer support function receives generally positive assessments: knowledgeable staff, local
              proactive support teams, and system stability that reduces the frequency of support calls. Faster response
              times and more direct communication are cited as areas for improvement. The platform's stability —
              resulting in few critical failures requiring emergency support — is itself a customer satisfaction driver
              in OT environments where unplanned downtime has direct safety and production cost consequences.
