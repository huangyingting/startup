      - number: '6.7'
        title: Customer Challenges and Adverse Feedback
        blocks:
          - type: paragraph
            body: >
              Despite strong customer satisfaction ratings, PeerSpot reviews and other customer-sourced feedback
              document several consistent areas requiring improvement. The most frequently cited operational challenge
              is query syntax complexity: multiple customers note that Nozomi's query language is complex and
              non-intuitive, with one reviewer stating "the query syntax is very complex, so sometimes you will not get
              what you want." This interface friction is a usability risk for OT security teams with limited data
              analysis training.

              Customer feedback on Vantage IQ (the AI assistant) notes that the product has room to improve: "their AI,
              which is IQ, could be more improved." Given that Vantage IQ launched in January 2026, early-stage product
              feedback is expected, but the criticism suggests that initial releases have not fully delivered the
              AI-guided productivity benefits promised in the launch announcement.

              Proof of concept (PoC) presentation quality also receives criticism: some customers suggest that Nozomi's
              PoC process could be made more tangible through improved demo materials and video presentations. This
              feedback implies that the sales process may over-rely on technical teams to convey product value and
              underinvest in structured buyer enablement.

              Pricing is noted as a concern by some buyers, particularly for licensing of add-on features. Customers in
              smaller markets may find the enterprise pricing tier prohibitive; requests for free add-on agent
              availability (Arc) have been noted. These pricing concerns affect Nozomi's addressable market in mid-size
              industrial companies that have OT security needs but more limited cybersecurity budgets than Fortune
