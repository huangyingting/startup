      - number: '7.3'
        title: Competitive and Technology Displacement Risks
        blocks:
          - type: paragraph
            body: >
              The OT security market is attracting well-capitalized competitors at an accelerating pace. Claroty,
              Nozomi's most direct competitor, has raised approximately $635M in funding and operates across a similar
              verticals mix; its platform-level convergence of IT/OT security creates a comparable positioning to
              Nozomi's. Dragos focuses more narrowly on ICS threat intelligence and incident response — its 2026 Year in
              Review demonstrates the depth of its threat-group research capabilities, including named attribution of
              three new threat actors. Armis, which raised $200M in Series D (January 2020) and reached unicorn status,
              brings broader IoT device intelligence that overlaps with Nozomi's asset management capabilities.

              The larger systemic risk is the entry of Big Tech cybersecurity platforms into OT security. Microsoft
              Defender for IoT (acquired from CyberX in June 2020 for approximately $165M) is embedded in the Microsoft
              Defender for Cloud and Microsoft Sentinel stack, enabling enterprise customers to extend their existing
              Microsoft security investments to OT environments at near-zero incremental license cost. CrowdStrike and
              Palo Alto Networks both offer OT security modules that integrate natively with their existing security
              operations platforms. These bundling plays threaten to displace best-of-breed OT security vendors,
              including Nozomi, in enterprise accounts where cost consolidation pressure is high.

              Nozomi's core technical moat — 1,000+ OT/ICS protocol decoders, passive sensing architecture, and
              purpose-built AI models — is defensible but not unassailable. Claroty, Dragos, and Microsoft have all
              expanded their protocol coverage over the past 18 months. The risk is that the technical differentiation
              narrows while Nozomi's pricing premium is maintained, creating a substitution scenario for cost-sensitive
              buyers. The Gartner 2026 MQ for CPS Protection Platforms showing multiple Leaders (Claroty, Nozomi)
              confirms competitive parity concerns. TXOne Networks (backed by Trend Micro and Serie Electronics) offers
              an OT-native approach with deep integration into Trend Micro's existing install base, posing a risk
              particularly in APAC manufacturing sectors.
