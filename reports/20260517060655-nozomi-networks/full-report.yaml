      - number: '1.2'
        title: Leadership, Governance, and Key-Person Dependence
        blocks:
          - type: paragraph
            body: >-
              Nozomi Networks has a three-person founding and executive core. Andrea Carcano (Co-founder and CPO) holds
              a PhD in Computer Science from Università degli Studi dell'Insubria focused on ICS intrusion detection and
              a Masters that involved SCADA malware research. Before Nozomi, he was a senior security engineer at Eni,
              an Italian multinational oil and gas company, giving him direct industrial-network experience. Moreno
              Carullo (Co-founder and CTO) holds a PhD in Artificial Intelligence and leads engineering. Edgard
              Capdevielle (President and CEO) holds an MBA from UC Berkeley and a BS in Computer Science and Electrical
              Engineering from Vanderbilt University; he previously served as VP of Product Management and Marketing at
              Imperva and in executive roles at Data Domain and EMC.


              Post-acquisition, Nozomi Networks operates as an independent subsidiary of Mitsubishi Electric
              Corporation. The company's press releases emphasize that its brand, leadership team, operations, offices,
              and points of contact remain unchanged. However, ultimate ownership and governance have shifted to
              Mitsubishi Electric (Tokyo: 6503), a global industrial conglomerate with $36.8 billion in annual revenue.
              The company appointed Jared Waterman as Chief Financial Officer in November 2022. Kevin Isaac was
              appointed Chief Revenue Officer in March 2024. Michael Plante became Chief Marketing Officer in June 2023.


              Key-person risk is meaningful. The founding duo (Carcano and Carullo) remain central to product vision and
              technical credibility. CEO Capdevielle is central to customer relationships and go-to-market execution.
              Under Mitsubishi Electric ownership, governance accountability is now shared with a Japanese parent,
              creating potential for cultural and operational integration challenges that are not yet observable from
              public sources. The company's October 2025 update on "Protecting Nozomi Customer Interests" signals that
              customers raised concerns about acquisition-related continuity, which was addressed publicly.
