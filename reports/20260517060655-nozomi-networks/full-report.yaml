      - number: '6.3'
        title: Regulatory Drivers of Customer Purchase
        blocks:
          - type: paragraph
            body: >
              OT security purchases are increasingly driven by regulatory mandates rather than discretionary spending
              decisions. The regulatory landscape across Nozomi's key customer verticals creates recurring,
              compliance-triggered purchasing pressure that supports predictable demand.

              For healthcare customers — hospitals, health systems, and medical device manufacturers — HIPAA (Health
              Insurance Portability and Accountability Act) requires protection of patient data, and the FDA's December
              2022 omnibus and June 2025 final guidance on medical device cybersecurity impose specific pre-market and
              post-market cybersecurity obligations on manufacturers. As OT systems (connected medical devices, imaging
              systems, infusion pumps) increasingly fall under cyber risk scope, Nozomi's OT visibility platform
              addresses a direct compliance gap.

              For U.S. critical infrastructure operators, CISA's cross-sector cybersecurity guidance and the National
              Cybersecurity Strategy create industry expectations for continuous monitoring and anomaly detection. The
              CISA JCDC (Joint Cyber Defense Collaborative), of which Nozomi has been a founding partner since April
              2022, drives public-private information sharing and positions Nozomi as a trusted OT security partner to
              federal and critical infrastructure customers.

              For Asian markets, Singapore's Cybersecurity Act and the Cyber Security Agency's Operational Technology
              Cybersecurity Masterplan 2024 (OT-MP 2024) create regulatory expectations for OT cybersecurity in the
              nation's critical information infrastructure. Nozomi established its Asia Pacific and Japan headquarters
              in Singapore on January 14, 2026, directly citing collaboration with CSA as a driver and noting close to
              100 customers across the APAC region.
