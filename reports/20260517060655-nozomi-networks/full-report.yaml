companyProfile:
  summary: >
    Nozomi Networks is the global leader in OT, IoT, and cyber-physical systems (CPS) security, offering the Guardian
    sensor platform and Vantage cloud analytics engine for real-time asset visibility, threat detection, and
    vulnerability management across industrial, critical infrastructure, and enterprise environments. Founded in 2013 by
    Andrea Carcano and Moreno Carullo in San Francisco, the company grew to 12,000+ deployments and 115M+ monitored
    devices before being acquired by Mitsubishi Electric in January 2026 for an undisclosed sum, validating its position
    as the pre-eminent pure-play OT/CPS security vendor.
