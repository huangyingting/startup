  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The OT/ICS/CPS security market is structurally divided into three competitive tiers: (1) pure-play OT/ICS

              security specialists (Nozomi Networks, Dragos, Claroty) competing directly in the CPS protection platform

              segment; (2) broadened asset management platforms (Armis, Forescout) that entered OT from IT asset

              management and now cover OT/IoT as one module within a larger security product suite; and (3) incumbent

              industrial automation and IT security vendors (Siemens, Honeywell, Schneider Electric, Cisco, Microsoft,

              Palo Alto, TXOne Networks) competing through platform extensions, acquisitions, or OEM channel leverage.


              Nozomi Networks, Dragos, and Claroty are the three most directly comparable vendors — all purpose-built
              for

              OT/ICS environments, all serving critical infrastructure and industrial verticals, and all named in the
              Gartner

              Magic Quadrant for CPS Protection Platforms. Gartner named both Nozomi Networks and Claroty Leaders in

              the 2026 MQ (second consecutive year for both), validating a two-leader market at the platform level.

              Dragos, despite deep ICS threat intelligence, was positioned differently in the 2026 MQ.


              A distinctive feature of this market is the co-opetition dynamic: Honeywell Ventures and Schneider
              Electric

              both invested in Nozomi through Series D and Series E funding rounds, yet both also operate OT security

              products competing with Nozomi in industrial automation accounts. Similarly, Siemens is both a Nozomi

              channel partner and operates its own cybersecurity consulting practice targeting the same industrial
              customers.
            claimRefs:
              - CP001
              - CP007
              - CP008
              - CP012
              - CP013
          - type: figure
            figureRef: FP001
            claimRefs:
              - CP001
              - CP012
