      - number: '7.5'
        title: Product Security and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Nozomi's own products are themselves targets for adversarial actors seeking to blind OT security
              monitoring. The NVD NIST CVE database, when searched for "nozomi," returns results documenting published
              vulnerabilities in Nozomi Networks products. While no critical (CVSS 9+) vulnerabilities have been flagged
              in the KEV catalog against Nozomi products as of the research date, the existence of any CVEs in a
              security product is an adversarial risk: a compromised guardian sensor could provide a blind spot rather
              than visibility. The CISA Stop Ransomware initiative and KEV catalog highlight that security tools are
              increasingly targeted by sophisticated threat actors.

              Vantage IQ, launched January 15, 2026 as the world's first private OT/IoT AI security assistant,
              introduces a novel attack surface. The system uses a private LLM trained on the organization's own OT
              data. Risks include: (1) prompt injection attacks that cause the AI to generate misleading triage
              recommendations; (2) tenant isolation failures in multi-tenant Vantage cloud deployments that could expose
              one customer's OT data to another; (3) model drift as OT environments evolve beyond the training window;
              and (4) adversarial evasion attacks that manipulate training data to degrade detection accuracy. These are
              active research areas in AI security, and Nozomi has not published formal threat modeling documentation
              for Vantage IQ as of the research date.

              Passive monitoring architecture — while reducing deployment risk — has an inherent detection limitation:
              fully encrypted OT communications (e.g., TLS-wrapped MQTT or OPC UA with certificate-based encryption)
              cannot be decrypted and inspected without the private keys. As OT vendor security roadmaps increasingly
              incorporate encrypted communications, the detection surface available to passive monitoring tools will
              narrow. Nozomi's Arc endpoint agent (October 2025) partially mitigates this by enabling on-host detection,
              but Arc requires installation on Windows-based engineering workstations, not on PLCs, RTUs, or legacy
              embedded controllers that are the highest-value targets.

              Guardian Air's wireless monitoring across 800MHz–5895MHz introduces exposure to RF jamming and spoofing: a
              targeted RF interference attack on the monitoring infrastructure itself could create a surveillance
              blackout window. OT environments with high-density wireless deployments (e.g., smart factories using
              WirelessHART or 900MHz ISA100) may experience sensor interference. The DOT (transportation.gov) and DOE
              (energy.gov) both operate critical infrastructure segments that rely heavily on wireless sensor networks,
              amplifying the applicability of this risk.
