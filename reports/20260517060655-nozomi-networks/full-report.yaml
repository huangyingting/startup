    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Products
        blocks:
          - type: paragraph
            body: >-
              Nozomi Networks describes itself as the global leader in OT, IoT, and cyber-physical system (CPS)
              security. The company's stated mission is to keep critical infrastructure and operational technology cyber
              resilient. Its platform combines network and endpoint visibility, threat detection, and AI-powered
              analysis to support industrial organizations in managing cyber risk across their OT, IoT, and IT
              environments. The company was founded in 2013 in Lugano/Mendrisio, Switzerland by Andrea Carcano and
              Moreno Carullo, two academics with deep expertise in SCADA security. Edgard Capdevielle joined as
              President and CEO to lead commercial scale-up and is not a co-founder.


              The core product portfolio consists of three main components. Guardian is the company's flagship passive
              network sensor for OT and IoT environments, providing asset inventory, network monitoring, deep packet
              inspection (DPI), and AI-powered anomaly detection without disrupting critical processes. Vantage is a
              cloud-based SaaS management platform that centralizes risk management and security visibility across
              enterprise-scale distributed OT/IoT deployments. Arc is an endpoint sensor for Windows, Linux, and macOS
              environments in operational settings, providing the industry's first solution to safely automate threat
              response in OT. Vantage IQ, launched January 15, 2026, is described as the world's first private,
              company-trained AI assistant for OT/IoT security teams. The product set is completed by Guardian Air
              (wireless sensor) and Remote Collector (for remote/air-gapped sites).


              Nozomi claims industry leadership across multiple analyst evaluations. The company was named a Gartner
              Magic Quadrant Leader for CPS Protection Platforms in both 2025 and 2026 (second consecutive year). It was
              also named a Leader in the Forrester Wave for IoT Security Solutions Q3 2025. In December 2025, Gartner
              recognized Nozomi as "The Company to Beat for AI in Cyber-Physical Systems Security." The company is also
              the only recognized Customers' Choice in Gartner's Voice of the Customer for CPS Protection Platforms,
              based on peer reviews.
