      - number: '6.4'
        title: 'Customer Validation: Analyst Recognition and Peer Reviews'
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks is the only vendor in the CPS Protection Platforms category to hold the Gartner Customers'
              Choice designation from the most recent Gartner Voice of the Customer report, per the March 9, 2026
              Gartner Magic Quadrant press release. Gartner Peer Insights customer reviews across the cyber physical
              systems protection platforms market are available on the Gartner Peer Insights platform, where Nozomi's
              customer scores contributed to this recognition. The Customers' Choice designation is determined by
              end-user ratings — not by Gartner analyst judgment — making it a direct measure of customer satisfaction.

              PeerSpot user reviews highlight several consistent strengths: real-time OT network visibility, robust
              AI-based intrusion detection, ease of deployment (typically a few hours for initial setup), integration
              with SOC and SIEM systems, and accurate identification of OT protocols including OPC UA, DNP3, Modbus, and
              Siemens S7. Customers note that the platform "brings visibility into the OT environment because most
              enterprises only have methods to check their IT environment" — confirming Nozomi's core value proposition
              in real-world deployments.

              TrustRadius lists Nozomi Guardian (formerly SCADAGuardian) as an industrial control system and IoT
              security technology deployed across multiple industries, providing a secondary independent channel of
              customer-voice corroboration.

              Nozomi was named #3 in security on Fast Company's World's Most Innovative Companies 2025 list (March
              2025), and on the Deloitte Technology Fast 500 (November 2025) as one of the fastest-growing companies in
              North America. These external rankings confirm customer-demand growth and organizational velocity
              consistent with an expanding enterprise customer base.
