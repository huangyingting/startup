      - number: '3.2'
        title: Pure-Play OT/ICS Security Competitors
        blocks:
          - type: paragraph
            body: >
              Dragos was founded in 2016 by Robert Lee and other cybersecurity professionals with direct operational

              experience investigating ICS attacks including the 2015 and 2016 Ukraine power grid attacks. This origin

              story provides Dragos with unmatched credibility among OT security practitioners and US government

              agencies. Dragos differentiates primarily through ICS threat intelligence: it tracks 23+ named OT threat

              groups, produces the "Dragos Year in Review" report, runs Neighborhood Keeper (the largest anonymized

              OT threat-sharing community), and offers OT-CERT (free resources for SMEs). Dragos Platform provides

              OT asset visibility and threat detection but has historically led with intelligence-as-service rather than

              platform breadth. Dragos raised approximately $400 million including a $200M Series D (2021) at a

              reported $1.7 billion valuation; it has not publicly disclosed revenue.


              Claroty (founded 2015, ex-IDF Unit 8200) is the most heavily funded pure-play OT security competitor

              with approximately $635 million raised, including strategic investors Schneider Electric, Rockwell
              Automation,

              Bessemer Venture Partners, and SoftBank. Claroty's xDome platform competes directly with Nozomi Vantage

              in cloud-delivered CPS asset visibility, anomaly detection, and vulnerability management. Claroty has

              expanded beyond industrial OT into healthcare IoT/IoMT (via Medigate acquisition) and commercial building

              security (BMS), broadening its TAM but potentially diluting its OT focus. Like Nozomi, Claroty was named

              a Gartner MQ Leader in CPS Protection Platforms in both 2025 and 2026.


              Key competitive distinctions between Nozomi and its pure-play peers: Nozomi achieved $100M+ ARR with

              less capital deployed than Claroty ($250M vs $635M raised), suggesting better capital efficiency. Nozomi's

              acquisition by Mitsubishi Electric provides distribution channel access that neither Dragos nor Claroty

              currently has at comparable scale in APAC industrial markets.
