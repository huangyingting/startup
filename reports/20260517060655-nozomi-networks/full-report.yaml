      - number: '4.3'
        title: Revenue Model and Product Economics
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks generates revenue across four primary streams: SaaS subscriptions through the Vantage
              cloud platform, hardware sensor deployments (Guardian), endpoint security subscriptions (Arc), and
              professional services. The revenue mix by stream is not publicly disclosed, but the product architecture
              and go-to-market model suggest a shift toward SaaS as the primary growth driver.

              The Vantage SaaS platform is a cloud-native subscription product that provides centralized OT/IoT
              visibility across distributed industrial environments. Subscription-based SaaS revenue typically commands
              higher gross margins (70-80%) than hardware revenue (30-50%), creating an incentive to grow Vantage
              adoption within the installed base. Guardian hardware sensors are deployed for passive OT network
              monitoring; hardware revenue is typically accompanied by a recurring support and software subscription
              that increases lifetime value per deployment. Arc is a pure software endpoint security subscription,
              offering a lower-cost entry point for customers who cannot or prefer not to deploy hardware sensors.

              Professional services include implementation support, threat intelligence, and managed detection services.
              These services help customers accelerate deployment and maximize platform value but typically carry lower
              gross margins (20-40%) than SaaS. Services revenue is generally expected to grow alongside the installed
              base, then plateau as customers become self-sufficient.

              The U.S. government channel represents an emerging revenue stream. Nozomi's Vantage for Government
              achieved FedRAMP Moderate "In Process" status in October 2025, opening access to federal civilian
              procurement. Combined with the CISA JCDC founding partnership (2022) and DHS CDM APL listing (2023),
              Nozomi has built the compliance infrastructure necessary to compete for significant government contracts
              in 2026 and beyond. The Google Cloud Marketplace listing (May 2026) further expands distribution through
              cloud-native channels.
