      - number: '4.2'
        title: Funding History and Capital Raised
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks has raised capital through multiple rounds since its 2013 founding. The company filed five
              Regulation D (Form D) exempt offering notices with the U.S. Securities and Exchange Commission between
              November 2016 and December 2021 (CIK 0001689366), covering seed through pre-Series D rounds. The amounts
              raised in these early rounds were not publicly disclosed.

              The two largest confirmed rounds are the $100M Series D (March 2022), led by Triangle Peak Partners, with
              participation from Honeywell Ventures, Cisco Investments, Lux Capital, and Schneider Electric, and the
              $100M Series E (March 2024), also led by Triangle Peak Partners, with new strategic participation from
              Mitsubishi Electric Corporation. Together, these two confirmed rounds total $200M. Assuming earlier rounds
              contributed $50M or more, total external capital raised is estimated at approximately $250M+ — though this
              figure is not independently verified and likely understates total capital.

              The Series D valued Nozomi at approximately $1.2B+, achieving unicorn status. The Series E in 2024 brought
              Mitsubishi Electric in as a financial investor before it later agreed to a full acquisition. No Form D
              filing has been identified for the Series D or Series E rounds, suggesting these raises may have been
              structured differently or filed under amendment to existing registrations. The Mitsubishi Electric
              acquisition, completed January 28, 2026, effectively terminates the independent funding trajectory and
              eliminates the need for Series F or IPO planning.
