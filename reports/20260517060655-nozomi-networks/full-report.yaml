      - number: '5.8'
        title: Technical Differentiators, Open-Source Research, and Platform Limitations
        blocks:
          - type: paragraph
            body: >
              Nozomi's core technical differentiator is the combination of passive network monitoring depth with
              AI-powered anomaly detection designed specifically for OT protocols. Unlike IT-oriented tools that cannot
              parse Modbus, DNP3, IEC 61850, PROFIBUS, or EtherNet/IP, Nozomi's Guardian sensor performs deep packet
              inspection across 1,000+ OT, IoT, and IT protocols. This breadth allows it to build accurate behavioral
              baselines and detect anomalies that pattern-matching or IT-tuned tools would miss.

              Nozomi Networks maintains a public GitHub organization (github.com/nozominetworks) with open-source
              security research tools targeting specific ICS and OT threat scenarios. The published repositories
              include: Triconex TriStation utilities and tools (Lua, 81 stars, 27 forks) for analyzing Triconex safety
              controller communications; a GreyEnergy packer analysis toolkit (Python, 16 stars, 6 forks) for dissecting
              the packer used by the Russian GreyEnergy APT group; Mitsubishi Electric MELSOFT protocol dissection tools
              (11 stars, 4 forks); an IoC-to-STIX processing utility (9 stars, 3 forks) for converting threat indicators
              to STIX format; and UWB RTLS communication dissection tools. These tools demonstrate deep protocol-level
              understanding of ICS ecosystems, build credibility with the security research community, and reflect
              Nozomi Labs' research priorities in high-risk OT sectors.

              The NVD/NIST CPE database lists Nozomi's own CMC (versions 22.0.0 through 25.3.0) and Guardian products as
              registered software, reflecting formal participation in the U.S. cybersecurity vulnerability tracking
              ecosystem.

              The passive-monitoring-first architecture is both a technical strength and an inherent limitation. Passive
              monitoring cannot prevent attacks by itself — it can only detect and alert. Arc's active prevention
              capabilities (Quarantine/Delete modes) address this gap, but require endpoint deployment that is not
              practical for PLCs, RTUs, and legacy controllers. Platform complexity creates a professional services
              dependency for mid-market deployments, and the Mandiant Threat Intelligence Expansion Pack adds a
              third-party cost and contractual variable that customers must factor into total platform TCO.
            claimRefs: []
