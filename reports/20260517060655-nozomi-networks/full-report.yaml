  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape and Scoring Methodology
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks faces a multidimensional risk profile shaped by its strategic position at the intersection
              of critical infrastructure cybersecurity, an enterprise SaaS transition, and a completed acquisition by a
              Japanese conglomerate. Following the Mitsubishi Electric acquisition close on January 28, 2026, the
              company's risks now fall across six primary categories: regulatory and legal, competitive and
              technological, acquisition and integration, product security and technical, financial and business model,
              and geopolitical and supply chain.

              Each risk is assessed across two dimensions — likelihood (1 = Rare, 2 = Unlikely, 3 = Possible, 4 =
              Likely, 5 = Almost Certain) and impact (1 = Negligible, 2 = Minor, 3 = Moderate, 4 = Major, 5 = Critical)
              — with a composite severity score = likelihood × impact. Risks with severity ≥ 12 are classified High,
              6–11 Medium, and ≤ 5 Low. Mitigation maturity is rated Established (E), In Progress (P), or Planned/None
              (N). Residual exposure = severity × (1 − mitigation discount).

              The Dragos 2026 OT Cybersecurity Year in Review confirms the threat landscape backdrop for these risks:
              three new threat groups emerged in 2025, adversaries are actively mapping control loops inside OT
              environments, and ransomware caused significant operational disruptions. This escalation validates the
              market opportunity but simultaneously raises the severity of unresolved gaps in Nozomi's defensive
              posture. The IBM Cost of a Data Breach Report 2024 identifies the average OT-related breach cost at
              $4.88M, providing a financial benchmark for residual exposure assessments below.

              The White House 2023 National Cybersecurity Strategy elevated OT security to a national priority,
              mandating that critical infrastructure operators implement minimum cybersecurity requirements — a
              regulatory driver that simultaneously expands Nozomi's addressable market and creates compliance risk if
              Nozomi's products fail certification milestones (e.g., FedRAMP). The CISA Known Exploited Vulnerabilities
              (KEV) catalog and Stop Ransomware initiative both represent regulatory reference points against which
              Nozomi's detection efficacy can be measured by customers and regulators alike.
