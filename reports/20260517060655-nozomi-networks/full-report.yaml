      - number: '6.2'
        title: Vertical Market Penetration Claims
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks makes specific vertical market penetration claims that, while unaudited, provide context
              for the quality and concentration of its installed base. The company claims deployments at 5 of the top 10
              oil and gas companies, 7 of the top 10 pharmaceutical companies, 7 of the top 10 utilities companies, and
              4 of the top 10 mining companies worldwide. These are company-stated metrics, and the methodology for
              ranking companies as "top 10" is not specified.

              The pharmaceutical sector penetration claim (7/10 top pharma) is particularly notable because
              pharmaceutical manufacturing is governed by FDA 21 CFR Part 11 and Good Manufacturing Practice (GMP)
              regulations that increasingly incorporate cybersecurity requirements. The FDA's 2023 and 2025 guidance
              updates on cybersecurity in medical devices and manufacturing have heightened the urgency of OT security
              investment in this vertical. Nozomi's ability to show deep pharma penetration suggests it has successfully
              adapted its product and compliance reporting to meet life sciences regulatory requirements.

              For oil and gas and utilities, NERC CIP (North American Electric Reliability Corporation Critical
              Infrastructure Protection) and DOE cybersecurity strategy mandates require electric utilities to implement
              continuous monitoring, vulnerability management, and incident response capabilities for bulk electric
              system assets. These regulatory mandates are a primary driver of OT security budget creation in the energy
              vertical and validate Nozomi's deep penetration in this sector. The DOE's 2024 Cybersecurity Strategy
              specifically targets improvements to the electric grid's cyber resilience — directly aligned with Nozomi's
              value proposition.
