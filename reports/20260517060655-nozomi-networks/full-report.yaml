      - number: '2.3'
        title: Vertical Segments and Buyer Profiles
        blocks:
          - type: paragraph
            body: >
              Nozomi addresses 17+ named verticals, with the deepest penetration in oil & gas (5 of top 10 companies),

              electric utilities (7 of top 10), pharmaceuticals (7 of top 10), and mining (4 of top 10) as of 2026

              (company-claimed). These four verticals share three characteristics that create strong demand: (1)
              physical

              process criticality — a cyber incident causing a pipeline shutdown, grid outage, or drug contamination
              batch

              has direct safety and financial consequences; (2) legacy ICS infrastructure that cannot self-protect; and
              (3)

              convergence of IT and OT networks through Industry 4.0 initiatives, eliminating air-gap isolation.


              Budget ownership varies significantly by vertical. In electric utilities, OT security spend often flows
              through

              compliance programs tied to NERC CIP — a mandatory regulatory framework with enforceable penalties for

              bulk electric system operators. In oil & gas and manufacturing, CISO-led security budgets fund OT
              monitoring

              alongside IT security tools. In federal/defense, FedRAMP authorization is a prerequisite and procurement
              flows

              through agency IT budgets. Small and medium industrial operators (SMEs) under-invest in OT security — they

              represent an underpenetrated long-tail segment increasingly addressed through MSSP channels.


              The primary buyer within large industrial enterprises is the OT/IT security team or a joint IT/OT steering

              committee. Plant managers and operations teams are key influencers (they own the plant floor) while CISOs

              control budget. Evaluations involve OT engineers, security architects, and vendors often compete on depth

              of OT protocol support rather than price.
            claimRefs:
              - CM021
              - CM022
              - CM026
              - CM029
              - CM031
