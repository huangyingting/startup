  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >
              The market in which Nozomi Networks competes is variously labeled operational technology (OT) security,

              industrial control system (ICS) security, IoT security for critical infrastructure, and — in Gartner's
              2025/2026

              framing — cyber-physical systems (CPS) protection platforms. These labels overlap substantially. OT
              security

              encompasses the hardware, software, and services used to protect industrial control systems, SCADA
              systems,

              distributed control systems (DCS), and the IoT devices embedded in physical infrastructure environments

              including energy, utilities, manufacturing, transportation, and healthcare. The CPS label expands further
              to

              include building management, smart-city systems, and connected medical devices.


              Nozomi's primary served market is the OT/ICS/CPS asset-visibility and anomaly-detection segment, which

              includes passive and active network monitoring, device inventory, vulnerability management, and threat

              detection for industrial environments. Adjacent but excluded from Nozomi's core scope: pure-play IT
              endpoint

              detection, cloud workload security, and generic network security solutions not purpose-built for OT
              protocols

              (Modbus, DNP3, IEC 61850, BACnet, PROFINET, OPC-UA, etc.).


              Status-quo substitutes include manual OT asset spreadsheets, passive firewall logging by IT vendors
              unfamiliar

              with OT protocols, and point-solution ICS firewalls (Tofino/Hirschmann). Market growth displaces these

              inadequate substitutes as regulatory mandates and threat sophistication make manual approaches untenable.
            claimRefs:
              - CM032
              - CM034
      - number: '2.2'
        title: TAM / SAM / SOM — Sizing with Multiple Lenses
        blocks:
          - type: paragraph
            body: >
              Multiple analysts size the OT security market from different definitional bases, producing forecasts that
              vary

              by 2-4× depending on scope (pure OT monitoring vs. full OT/IoT/CPS security stack including firewalls,

              endpoint, and managed services). MarketsandMarkets projects the global OT security market — broadly
              defined

              to include network security, SIEM, vulnerability management, IAM, and data security for industrial
              environments

              — at $50.29 billion by 2030 at CAGR 16.5%. Precedence Research uses an even broader scope, projecting

              $27.03 billion in 2025 growing to $122.22 billion by 2034 at CAGR 18.25%. Both firms agree on double-digit

              CAGR, reflecting structural tailwinds across all OT-heavy industries.


              Nozomi's primary addressable market — CPS protection platforms as defined by Gartner, encompassing asset

              discovery, anomaly detection, and vulnerability management — is a subset of the broader OT security TAM.

              Based on segment filtering (solutions-only, platform deployments, enterprise-grade), the CPS platform SAM

              is estimated in the $8-12 billion range for 2026. This estimate carries significant uncertainty given
              limited

              public data on segment splits within analyst reports. Nozomi's SOM at $100M+ ARR implies approximately

              1% penetration of a $10B SAM midpoint — consistent with an early-growth phase despite 13 years of

              operation, reflecting the long sales cycles and capital intensity of industrial OT deployments.


              North America dominates with approximately 42% of global OT security spend. Oil & gas is the largest

              single vertical at 22% of market; manufacturing is the fastest-growing segment. Solutions (vs. services)

              represent 77% of spend, and on-premises deployment still commands 59% of the market in 2024, though

              cloud is the highest-growth deployment mode.
