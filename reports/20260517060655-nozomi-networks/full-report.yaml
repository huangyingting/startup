  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Scale and Retention
        blocks:
          - type: paragraph
            body: >
              As of Q4 2025, Nozomi Networks reports monitoring 115M+ OT and IoT devices across 12,000+ active
              installations globally — numbers that the company disclosed publicly in the context of the January 28,
              2026 Mitsubishi Electric acquisition completion announcement. The company simultaneously disclosed
              approximately 100% customer retention, indicating near-zero annual churn within the deployed base. These
              scale claims are company-originated and have not been independently verified; as a private company, Nozomi
              does not file financial statements with regulators that would allow cross-checking of installed-base
              figures.

              Nozomi's platform serves customers across six continents, per the March 2026 Gartner Magic Quadrant press
              release. The customer base is concentrated in critical infrastructure sectors including energy, utilities,
              oil and gas, pharmaceuticals, mining, and government. Enterprise deployments (200+ sensors, Fortune Global
              500 clients) are a growing segment, enabled by the Vantage cloud platform's unlimited sensor scale and
              AI-powered centralized management.

              Customer retention at or near 100% — if confirmed — would imply a net revenue retention (NRR) rate well
              above 100%, particularly given the company's 24% headcount growth in 2025 and expansion into new
              geographies. Strong NRR is a key indicator of platform stickiness: once Guardian sensors are deployed at
              scale across OT networks, the data and operational learning embedded in the platform creates meaningful
              switching costs.
