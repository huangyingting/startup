      - number: '6.5'
        title: Deployment Patterns and Use Case Profiles
        blocks:
          - type: paragraph
            body: >
              Nozomi customers deploy the platform in three primary patterns: cloud-managed (Vantage), on-premises
              air-gapped (CMC), and hybrid. PeerSpot reviews confirm that customers use Nozomi in both cloud and
              on-premises configurations, with managed service providers also using the platform as a white-label portal
              service shared with their industrial clients.

              Core deployment use cases include: OT/IoT intrusion detection for identifying threats in automation
              systems; asset inventory and vulnerability management for industrial equipment (PLCs, HMIs, historian
              servers); risk quantification and prioritization for security operations centers; network topology
              visualization for OT network segmentation planning; and compliance reporting for NERC CIP, NIST CSF, and
              IEC 62443.

              Enterprise deployments of 200+ sensors are served by Vantage, which includes automated alert
              prioritization, centralized risk scoring, and Mandiant threat intelligence distillation. The Vantage
              platform specifically highlights use cases from Fortune Global 500 companies, including operators managing
              300+ network segmentation zones across global sites, 200+ sensors exceeding a single on-premises console's
              capacity, and organizations that require 200+ custom threat intelligence rules across a global estate.

              The APAC region, with ~100 customers supported from the Singapore headquarters, represents a rapidly
              growing segment where national OT cybersecurity regulations (including Singapore's OT Cybersecurity
              Masterplan) create regulatory demand. Regional customers include utilities, telecommunications operators,
              and government-linked companies operating critical national infrastructure.
