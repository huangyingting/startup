      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Nozomi's regulatory risk profile is complex and growing. The company operates in critical infrastructure
              sectors globally, each with its own cybersecurity compliance regime. In the United States, NERC CIP
              standards govern bulk electric system cybersecurity and require utilities deploying Nozomi products to
              validate they meet compliance requirements on an ongoing basis. The FedRAMP Moderate In Process
              designation (October 2025) is a significant gate for U.S. federal agency deployments — FedRAMP
              authorization typically requires 12–24 months post-in-process designation, meaning Nozomi may not achieve
              full FedRAMP Moderate authorization until late 2026 or 2027, limiting its ability to win new U.S. federal
              contracts during that window.

              The EU NIS2 Directive (Directive 2022/2555), effective October 2024, imposes mandatory cybersecurity
              obligations on critical infrastructure operators across 18 sectors in EU member states, with fines up to
              €10M or 2% of global annual revenue. Nozomi's EU customers must demonstrate compliance with NIS2 incident
              reporting and risk management requirements, and Nozomi's products must support those capabilities. The
              complexity of NIS2 cross-border harmonization represents a deployment friction risk for EU market growth.

              The SEC's 2023 cybersecurity disclosure rule (effective December 2023) requires publicly traded companies
              to disclose material cybersecurity incidents on Form 8-K within four business days. While Nozomi is now a
              private company (under Mitsubishi Electric), its publicly traded customers — energy, pharma, manufacturing
              — face immediate disclosure obligations that depend in part on Nozomi's detection and triage speed. Any
              detection failure that contributes to a delayed customer disclosure could create legal liability exposure
              for Nozomi.

              On the legal and IP side, Nozomi Networks Sagl has an active patent portfolio in OT anomaly detection,
              automatic signature generation, and device masquerading detection (patents.justia.com shows granted patent
              12341787 in June 2025 and 12238130 with inventors Carcano, Carullo, and Kleymenov). The IP asset is a
              competitive moat, but it also creates a patent assertion risk should a well-funded competitor (or patent
              assertion entity) challenge key claims. No published litigation involving Nozomi Networks has been
              identified as of the research date; however, this is an open diligence item requiring direct verification.
              Export control compliance under the U.S. Export Administration Regulations (EAR) and Japan's Foreign
              Exchange and Foreign Trade Act (FEFTA) adds operational complexity post-Mitsubishi acquisition.

              The FTC's data security enforcement framework (16 CFR Part 314 Safeguards Rule) and HIPAA Security Rule
              apply to Nozomi's healthcare-sector customers deploying medical device IoT security. Any compliance
              failure at a healthcare customer traceable to Nozomi's product coverage gaps could expose Nozomi to
              contractual liability.
