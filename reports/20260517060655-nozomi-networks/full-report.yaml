  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Scale and Operating Milestones
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks surpassed $100M in annual recurring revenue in 2025, as disclosed in the January 28, 2026
              press release announcing the completion of the Mitsubishi Electric acquisition. The company simultaneously
              disclosed it is the first privately held OT cybersecurity company to achieve sustained cash flow positive
              and break-even performance at this scale. These two milestones — $100M ARR and operating break-even — are
              significant because they decouple Nozomi from the financing pressures that burden most OT security peers
              who remain loss-making at similar revenue levels. The $100M ARR figure is company-disclosed and has not
              been independently audited.

              Supporting the revenue milestone, Nozomi reported 12,000+ active installations across 115M+ monitored
              devices as of Q4 2025 (company-claimed). The company grew headcount by 24% in 2025, indicating active
              investment in sales, marketing, and engineering capacity to sustain growth. Nozomi also claims
              approximately 100% customer retention, which is a strong indicator of net revenue retention quality.
              Combining strong retention with expansion into new enterprise logos drives the ARR trajectory.

              The Deloitte Technology Fast 500 recognition (2025) and Fast Company World's Most Innovative Companies
              ranking (#3 in security, 2025) are external growth-signal indicators consistent with a company growing at
              a high rate over the qualifying period. These recognitions confirm the company's self-reported growth
              narrative through third-party validation even though the specific revenue growth rates remain undisclosed.
