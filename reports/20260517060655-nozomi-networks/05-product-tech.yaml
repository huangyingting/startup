    statement: >
      The Nozomi Networks platform consists of five core components: Guardian (passive wired network
      sensor), Arc (OT endpoint security agent), Guardian Air (wireless spectrum sensor), Vantage
      (cloud SaaS management platform), and CMC (Central Management Console for on-premises
      air-gapped deployments). These components are designed to be deployed together or independently
      depending on the customer's connectivity and data-residency requirements.
    confidence: high
    freshness: recent
    type: observed
    topic: platform-architecture
    sourceRefs: [SE010, SE011, SE012, SE013, SE002]
    tags: [platform, components, architecture]

  - id: CE002
    statement: >
      Guardian passively monitors OT and IoT network traffic via mirrored SPAN ports or network taps,
      producing no additional packets and generating no traffic on monitored networks. This passive
      approach is critical in OT environments where unsolicited packets or active scanning can disrupt
      programmable logic controllers, safety instrumented systems, and real-time control processes.
    confidence: high
    freshness: recent
    type: observed
    topic: guardian-sensor
    sourceRefs: [SE011, SE008, SE014]
    tags: [Guardian, passive-monitoring, OT-safety]

