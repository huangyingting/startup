chapter:
  number: 5
  title: "Product and Technology"
  summary: "Nozomi's five-component platform (Guardian, Arc, Guardian Air, Vantage, CMC) provides OT/IoT/CPS passive monitoring, endpoint visibility, wireless spectrum analysis, and cloud-managed analytics. The Vantage IQ generative AI layer differentiates through automated threat analysis and natural-language query. Key technical risk: GenAI accuracy for OT threat classification remains unvalidated at scale."

sections:
- id: platform-architecture
  title: "Platform Architecture Overview"
  body: >
    The Nozomi Networks platform is a modular, multi-layered OT, IoT, and Cyber Physical Systems
    (CPS) security architecture assembled from five purpose-built components: Guardian (passive wired
    sensor), Arc (endpoint agent), Guardian Air (wireless sensor), Vantage (cloud SaaS management),
    and the Central Management Console or CMC (on-premises management). Each component collects asset,
    traffic, or spectrum data, routes it to centralized management, and feeds AI-powered analytics.
    The design philosophy is passive-first: sensors observe without injecting traffic, which is
    critical in OT environments where unsolicited packets can disrupt programmable logic controllers
    and safety instrumented systems.

    The platform is positioned as the AI-powered solution for OT and IoT visibility and security,
    purpose-built for critical infrastructure environments where traditional IT security tools
    cannot operate safely. The architecture supports both fully cloud-managed deployments (Vantage)
    and air-gapped on-premises deployments (CMC), giving operators flexibility regardless of
    connectivity constraints or data-residency requirements.

    As of May 2026, the platform monitors 115M+ devices across 12,000+ installations globally
    (company-claimed). The NVD NIST CPE database lists Nozomi products — including CMC versions
    22.0.0 through 25.3.0 and Guardian sensors — as registered software, indicating formal
    recognition within the U.S. cybersecurity vulnerability taxonomy.
  tableRefs: [TE001]
  figureRefs: [FE001]

- id: guardian-sensor
  title: "Guardian Passive Network Sensor"
  body: >
    Guardian is Nozomi's foundational wired network sensor. It connects passively via mirrored
    network ports (SPAN ports) or network taps, observing all traffic without generating additional
    packets or disrupting control-plane communications. This passive approach is the recommended
    method for OT security per CISA ICS recommended practices, as active scanning or traffic
    injection can trigger alarms on sensitive industrial devices or cause them to fail.

    Guardian provides continuous, automatic detection and classification of all communicating
    devices on the network segment, collecting metadata including device type, firmware version,
    serial number, and communication patterns. It supports deep packet inspection across 1,000+
    OT, IoT, and IT protocols — a breadth that allows it to parse proprietary industrial protocols
    used in sectors from energy and utilities to pharmaceuticals and manufacturing.

    The sensor builds a behavioral baseline for every device and communication flow by learning
    from passively observed traffic patterns over time. Deviations from this AI-derived baseline
    trigger anomaly alerts, enabling detection of novel threats that do not match known malware
    signatures. Detected vulnerabilities, anomalies, and threats are routed into platform workflows
    and integrated security tools to accelerate incident response.

    Guardian also supports Smart Polling — discrete active queries to specific devices to enrich
    asset data without disrupting control processes — available as an opt-in capability for
    environments where additional asset metadata is required beyond passive observation.
  tableRefs: [TE002]

- id: guardian-air
  title: "Guardian Air Wireless Sensor"
  body: >
    Guardian Air extends the Nozomi platform to the wireless spectrum, addressing a growing gap
    in OT environments where wireless devices communicate with critical assets outside the range of
    traditional wired network sensors. When integrated with the Vantage cloud platform, Guardian
    Air provides continuous monitoring of the electromagnetic spectrum from 800 MHz to 5895 MHz,
    covering a wide range of protocols including IEEE 802.11 (Wi-Fi), Bluetooth and BLE,
    IEEE 802.15.4 (Zigbee and WirelessHART), LoRaWAN, cellular, Open Drone ID (ODID), and Z-Wave.

    Wireless threats are operationally distinct from wired threats: adversaries need only physical
    proximity (from a rooftop, vehicle, or drone) to access the wireless attack surface, bypassing
    perimeter defenses without ever touching the wired network. Guardian Air detects wireless-specific
    threats including deauthentication attacks, brute-force Wi-Fi key guessing, Bluetooth hijacking,
    rogue devices, unauthorized access points, fake cell towers, and drone proximity.

    The wireless data collected by Guardian Air is correlated with wired network data from Guardian
    sensors and sent to Vantage for holistic threat analysis. This correlated view is particularly
    valuable in environments such as logistics hubs, autonomous transport facilities, and
    smart factories where wireless and wired attack surfaces increasingly overlap.
  tableRefs: [TE003]

- id: arc-endpoint
  title: "Arc OT Endpoint Security Agent"
  body: >
    Nozomi Arc, first launched in 2023, is the world's first endpoint security and network
    monitoring solution designed specifically to meet the cybersecurity and operational requirements
    of OT and IoT environments. Where Guardian monitors traffic on the network, Arc runs directly
    on Windows, Mac, and Linux endpoints within the operational environment, providing an
    endpoint-level layer of detection, forensics, and — since the October 2025 update — active
    threat prevention.

    The October 28, 2025 release moved Arc beyond passive detection to active defense. Arc now
    operates in three configurable modes based on the operator's risk tolerance: Detection Mode
    (non-disruptive monitoring for audits and compliance), Quarantine Mode (blocks malicious files
    while preserving them for forensic analysis), and Delete Mode (removes malicious files
    immediately). This flexibility acknowledges that OT operators have diverse operational
    constraints; some cannot risk any file removal, while others require immediate containment.

    Arc's threat prevention engine is powered by OT-specific threat intelligence from the
    Mandiant Threat Intelligence Expansion Pack, specifically curated for industrial environments.
    The agent detects threats via YARA signatures and STIX-formatted indicators, monitors local
    events with Sigma behavioral rules, tracks USB device usage, and correlates user activity
    with device events. Arc operates primarily in user space with minimal kernel module usage,
    unlike traditional IT EPP and EDR tools — a design that minimizes risk of disrupting OT
    applications that run on constrained operating system environments.
  tableRefs: [TE004]

- id: vantage-platform
  title: "Vantage Cloud Management Platform and Vantage IQ"
  body: >
    Vantage is Nozomi's cloud-native SaaS management platform that unifies visibility and security
    across globally distributed OT and IoT environments. It provides centralized risk management
    with a global view of all assets, sensors, networks, and locations, enabling security teams
    to drill down to any site or asset while maintaining aggregate situational awareness.
    Vantage uses a subscription model with unlimited sensor capacity, eliminating the capacity
    constraints that plague on-premises management consoles at scale. Customers migrating from
    the on-premises CMC can do so on their own terms — synchronizing some or all data — without
    replacing any existing Guardian sensors.

    Vantage integrates threat intelligence from both Nozomi Labs and Mandiant, distilling these
    feeds into filterable threat cards with suggested mitigations and AI-automated alert
    prioritization. This AI layer automates the tedious task of correlating and ranking alert data,
    enabling faster response with less analyst fatigue.

    On January 15, 2026, Nozomi launched Vantage IQ — the world's first private, company-trained
    AI assistant for OT and IoT security teams. Vantage IQ is powered by a secure large language
    model (LLM) trained on the organization's own OT/IoT asset inventory, vulnerability data,
    threat feeds, and risk context — not on external public data. This private-by-design approach
    means analysts can query the assistant about their specific environment without exposing
    sensitive operational data to external AI services. Vantage IQ provides AI-guided triage,
    investigation, and response recommendations for SOC analysts, as well as board-ready insights
    in plain language for CISOs. CPO Andrea Carcano described it as "the world's most advanced
    OT/IoT cybersecurity AI assistant."
  figureRefs: [FE002]

- id: integrations-ecosystem
  title: "Integration Ecosystem and Cloud Distribution"
  body: >
    The Nozomi platform integrates with a broad ecosystem of enterprise security and cloud
    infrastructure tools. On May 12, 2026, Nozomi announced availability on the Google Cloud
    Marketplace, enabling customers to deploy Guardian and the CMC directly within their own
    Google Cloud tenant environments without the need for external infrastructure. Nozomi also
    integrates with Google Security Operations (Chronicle SIEM successor), leveraging Google's AI
    capabilities to enable continuous monitoring across wired and wireless IT, OT, and IoT systems.

    The platform's integration architecture supports major SIEM and SOAR platforms, including
    Splunk and IBM QRadar, through bi-directional data feeds and alert routing. These integrations
    are critical for enterprises that operate unified security operations centers (SOCs) spanning
    both IT and OT environments.

    Arc's OT-specific threat intelligence is enriched through the Mandiant Threat Intelligence
    Expansion Pack — a partnership with Google Cloud's Mandiant unit — which provides curated
    ICS/OT indicators, actors, and TTPs that generic threat intelligence products do not cover.
    Nozomi announced partnerships with NVIDIA (BlueField DPUs), Schneider Electric, Hitachi Cyber,
    Dispel, and Xona in 2025, broadening the platform's hardware embedding and distribution.
  figureRefs: [FE003]

- id: standards-compliance
  title: "Standards Compliance and Regulatory Alignment"
  body: >
    Nozomi's platform supports compliance reporting against the major OT cybersecurity standards
    and frameworks: IEC 62443 (ISA/IEC consensus-based IACS security standard), NIST Cybersecurity
    Framework (CSF) 2.0, and NERC CIP (North American electric utility critical infrastructure).
    These standards require OT operators to maintain continuous asset visibility, anomaly monitoring,
    and incident response capabilities — capabilities that map directly to Nozomi's core platform.

    The ISA/IEC 62443 series is the only globally recognized, consensus-based standard for
    Industrial Automation and Control Systems (IACS) cybersecurity. It bridges operations and IT,
    and bridges process safety and cybersecurity — making it the primary compliance driver in
    sectors such as oil and gas, chemicals, and process manufacturing. Nozomi's passive monitoring
    and risk reporting capabilities help operators demonstrate compliance with 62443's security
    level requirements.

    For U.S. federal and critical infrastructure customers, Nozomi holds FedRAMP Moderate
    In Process status as of October 2025, enabling deployment discussions with civilian federal
    agencies. The company was a founding partner of CISA's Joint Cyber Defense Collaborative (JCDC)
    in April 2022 and received DHS Continuous Diagnostics and Mitigation (CDM) Approved Products
    List (APL) inclusion in March 2023 — both of which validate Nozomi's role in national
    critical infrastructure protection.

    The MITRE ATT&CK for ICS matrix provides a framework of OT-specific adversary techniques that
    Nozomi aligns its detection coverage against, including initial access via Internet-Accessible
    Device (T0883), lateral movement, Denial of Control, and Damage to Property. Mapping detection
    capabilities to MITRE ATT&CK for ICS gives security teams a standardized vocabulary for
    coverage gaps and threat modeling.
  tableRefs: [TE006]

- id: technical-differentiators
  title: "Technical Differentiators, Open-Source Research, and Platform Limitations"
  body: >
    Nozomi's core technical differentiator is the combination of passive network monitoring depth
    with AI-powered anomaly detection designed specifically for OT protocols. Unlike IT-oriented
    tools that cannot parse Modbus, DNP3, IEC 61850, PROFIBUS, or EtherNet/IP, Nozomi's Guardian
    sensor performs deep packet inspection across 1,000+ OT, IoT, and IT protocols. This breadth
    allows it to build accurate behavioral baselines and detect anomalies that pattern-matching
    or IT-tuned tools would miss.

    Nozomi Networks maintains a public GitHub organization (github.com/nozominetworks) with
    open-source security research tools targeting specific ICS and OT threat scenarios. The
    published repositories include: Triconex TriStation utilities and tools (Lua, 81 stars,
    27 forks) for analyzing Triconex safety controller communications; a GreyEnergy packer analysis
    toolkit (Python, 16 stars, 6 forks) for dissecting the packer used by the Russian GreyEnergy
    APT group; Mitsubishi Electric MELSOFT protocol dissection tools (11 stars, 4 forks);
    an IoC-to-STIX processing utility (9 stars, 3 forks) for converting threat indicators to
    STIX format; and UWB RTLS communication dissection tools. These tools demonstrate deep
    protocol-level understanding of ICS ecosystems, build credibility with the security research
    community, and reflect Nozomi Labs' research priorities in high-risk OT sectors.

    The NVD/NIST CPE database lists Nozomi's own CMC (versions 22.0.0 through 25.3.0) and
    Guardian products as registered software, reflecting formal participation in the U.S.
    cybersecurity vulnerability tracking ecosystem.

    The passive-monitoring-first architecture is both a technical strength and an inherent
    limitation. Passive monitoring cannot prevent attacks by itself — it can only detect and alert.
    Arc's active prevention capabilities (Quarantine/Delete modes) address this gap, but require
    endpoint deployment that is not practical for PLCs, RTUs, and legacy controllers.
    Platform complexity creates a professional services dependency for mid-market deployments, and
    the Mandiant Threat Intelligence Expansion Pack adds a third-party cost and contractual
    variable that customers must factor into total platform TCO.
  tableRefs: [TE005]
  acknowledgedLimitations:
  - Passive monitoring cannot prevent attacks on non-endpoint-equipped OT devices
  - PLC/RTU endpoint coverage requires Arc, which is impractical on embedded controllers
  - Platform complexity creates professional services dependency for mid-market deployments
  - Mandiant threat intelligence integration adds cost and external dependency

