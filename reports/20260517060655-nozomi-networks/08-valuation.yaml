  claims:
    - id: CV001
      statement: >-
        Nozomi Networks raised $100 million in its Series E funding round in March 2024,
        bringing total disclosed venture capital raised to over $250 million across six
        rounds since its founding in 2013; the final pre-acquisition valuation is estimated
        at $700M to $900M based on Series E terms and comparable transaction benchmarking.
      type: estimated
      confidence: high
      sourceRefs: [SV001, SV003]
      topic: funding
      freshness: current

    - id: CV002
      statement: >-
        Mitsubishi Electric Corporation completed its full acquisition of Nozomi Networks
        on January 28, 2026, approximately five months after the deal announcement on
        September 9, 2025; the transaction price was not disclosed in publicly available
        filings as of May 2026.
      type: observed
      confidence: high
      sourceRefs: [SV002, SV014]
      topic: acquisition
      freshness: current

    - id: CV003
      statement: >-
