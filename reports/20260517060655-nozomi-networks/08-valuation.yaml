callouts:
  - calloutType: insight
    title: Undisclosed Acquisition Price
    body: >-
      The Mitsubishi Electric acquisition price for Nozomi Networks has not been publicly
      disclosed as of May 2026. All enterprise value estimates in this chapter are derived
      from ARR multiple analysis and comparable transaction benchmarking. Audited financials
      and disclosed consideration are listed as Critical diligence asks (see TV006).
    claimRefs: [CV002, CV034]

  - calloutType: risk
    title: ARR Estimate Uncertainty
    body: >-
      The $100M+ ARR figure for Nozomi Networks is based on company-indicated milestones
      and investor communications, not audited financial statements. Actual ARR could be
      materially different (plus or minus 20%). All scenario analysis and EV ranges should
      be recalibrated upon receipt of audited FY2025 financials.
    claimRefs: [CV003]

  - calloutType: recommendation
    title: Strategic Premium Justification
    body: >-
      Mitsubishi Electric's access to 300,000+ factory automation customers globally
      represents the primary source of strategic acquisition premium above financial
      buyer valuation. If cross-sell conversion rates (targeted at 5 to 10% of FA base)
      are achieved, the bull-case EV of $2.6 to $3.3B fully justifies a $1.3 to $1.5B
      acquisition price, implying a 2x return for Mitsubishi within 5 to 7 years.
    claimRefs: [CV011, CV030]
