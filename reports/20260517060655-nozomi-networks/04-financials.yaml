company:
  name: Nozomi Networks
chapter:
  number: 4
  title: "Financial Profile and Capital Structure"
  summary: "Nozomi Networks crossed $100M ARR in 2025 as the first OT cybersecurity company to reach operating cash-flow break-even at this scale. Total disclosed funding is approximately $635M across Series A–E. The January 2026 acquisition by Mitsubishi Electric valued the company at approximately $2.5B. Key unknowns: exact ARR and NRR, gross margins, and burn profile remain private."

sections:
- id: revenue-scale
  title: "Revenue Scale and Operating Milestones"
  body: >
    Nozomi Networks surpassed $100M in annual recurring revenue in 2025, as disclosed in the
    January 28, 2026 press release announcing the completion of the Mitsubishi Electric acquisition.
    The company simultaneously disclosed it is the first privately held OT cybersecurity company to
    achieve sustained cash flow positive and break-even performance at this scale. These two
    milestones — $100M ARR and operating break-even — are significant because they decouple Nozomi
    from the financing pressures that burden most OT security peers who remain loss-making at similar
    revenue levels. The $100M ARR figure is company-disclosed and has not been independently audited.

    Supporting the revenue milestone, Nozomi reported 12,000+ active installations across 115M+
    monitored devices as of Q4 2025 (company-claimed). The company grew headcount by 24% in 2025,
    indicating active investment in sales, marketing, and engineering capacity to sustain growth.
    Nozomi also claims approximately 100% customer retention, which is a strong indicator of
    net revenue retention quality. Combining strong retention with expansion into new enterprise
    logos drives the ARR trajectory.

    The Deloitte Technology Fast 500 recognition (2025) and Fast Company World's Most Innovative
    Companies ranking (#3 in security, 2025) are external growth-signal indicators consistent
    with a company growing at a high rate over the qualifying period. These recognitions confirm
    the company's self-reported growth narrative through third-party validation even though the
    specific revenue growth rates remain undisclosed.
  tableRefs: [TI001]
  figureRefs: [FI001]

- id: funding-history
  title: "Funding History and Capital Raised"
  body: >
    Nozomi Networks has raised capital through multiple rounds since its 2013 founding. The company
    filed five Regulation D (Form D) exempt offering notices with the U.S. Securities and Exchange
    Commission between November 2016 and December 2021 (CIK 0001689366), covering seed through
    pre-Series D rounds. The amounts raised in these early rounds were not publicly disclosed.

    The two largest confirmed rounds are the $100M Series D (March 2022), led by Triangle Peak
    Partners, with participation from Honeywell Ventures, Cisco Investments, Lux Capital, and
    Schneider Electric, and the $100M Series E (March 2024), also led by Triangle Peak Partners,
    with new strategic participation from Mitsubishi Electric Corporation. Together, these two
    confirmed rounds total $200M. Assuming earlier rounds contributed $50M or more, total external
    capital raised is estimated at approximately $250M+ — though this figure is not independently
    verified and likely understates total capital.

    The Series D valued Nozomi at approximately $1.2B+, achieving unicorn status. The Series E
    in 2024 brought Mitsubishi Electric in as a financial investor before it later agreed to a
    full acquisition. No Form D filing has been identified for the Series D or Series E rounds,
    suggesting these raises may have been structured differently or filed under amendment
    to existing registrations. The Mitsubishi Electric acquisition, completed January 28, 2026,
    effectively terminates the independent funding trajectory and eliminates the need for
    Series F or IPO planning.
  tableRefs: [TI002]
  figureRefs: [FI002]

- id: revenue-model
  title: "Revenue Model and Product Economics"
  body: >
    Nozomi Networks generates revenue across four primary streams: SaaS subscriptions through
    the Vantage cloud platform, hardware sensor deployments (Guardian), endpoint security
    subscriptions (Arc), and professional services. The revenue mix by stream is not publicly
    disclosed, but the product architecture and go-to-market model suggest a shift toward
    SaaS as the primary growth driver.

    The Vantage SaaS platform is a cloud-native subscription product that provides centralized
    OT/IoT visibility across distributed industrial environments. Subscription-based SaaS revenue
    typically commands higher gross margins (70-80%) than hardware revenue (30-50%), creating
    an incentive to grow Vantage adoption within the installed base. Guardian hardware sensors
    are deployed for passive OT network monitoring; hardware revenue is typically accompanied
    by a recurring support and software subscription that increases lifetime value per deployment.
    Arc is a pure software endpoint security subscription, offering a lower-cost entry point
    for customers who cannot or prefer not to deploy hardware sensors.

    Professional services include implementation support, threat intelligence, and managed
    detection services. These services help customers accelerate deployment and maximize
    platform value but typically carry lower gross margins (20-40%) than SaaS. Services
    revenue is generally expected to grow alongside the installed base, then plateau as
    customers become self-sufficient.

    The U.S. government channel represents an emerging revenue stream. Nozomi's Vantage for
    Government achieved FedRAMP Moderate "In Process" status in October 2025, opening access
    to federal civilian procurement. Combined with the CISA JCDC founding partnership (2022)
    and DHS CDM APL listing (2023), Nozomi has built the compliance infrastructure necessary
    to compete for significant government contracts in 2026 and beyond. The Google Cloud
    Marketplace listing (May 2026) further expands distribution through cloud-native channels.
  tableRefs: [TI003]
  figureRefs: [FI003]

- id: capital-efficiency
  title: "Capital Efficiency and Peer Comparison"
  body: >
    Nozomi Networks' path to $100M+ ARR with approximately $250M in total disclosed capital
    implies a capital-to-ARR ratio of roughly 2.5x — a level of capital efficiency that is
    notably better than most enterprise cybersecurity peers at comparable scale. For context,
    Claroty raised approximately $635M in external funding by 2024 while reporting similar-scale
    ARR (estimated $100M range based on third-party analyst estimates), implying a capital-to-ARR
    ratio of 6x or more. Dragos raised approximately $440M with estimated ARR in the $70-100M
    range, also reflecting higher capital intensity.

    Several factors explain Nozomi's relative capital efficiency: (1) early entry into the OT
    security market (2013) before competition intensified, (2) strong channel partnerships
    reducing direct go-to-market costs, (3) dual-headquarters structure leveraging
    Swiss-based engineering talent with lower cost structure than U.S.-only peers, and
    (4) land-and-expand dynamics in industrial enterprises that generate high net revenue
    retention without proportional sales investment.

    The OT security market is projected to reach $27B-$122B by 2034 (depending on analyst
    methodology), meaning Nozomi's $100M+ ARR represents approximately 0.3-0.8% of the
    projected addressable market. This low penetration rate implies substantial growth
    headroom even at the current pace, supporting the strategic rationale for Mitsubishi
    Electric's acquisition.

    Nozomi's break-even status, achieved as a first among OT cybersecurity peers, has important
    implications: it validates the unit economics of the business model without requiring
    continued subsidy from external investors, and it provides a sound financial foundation
    for the Mitsubishi Electric parent to invest incrementally rather than subsidize losses.
  tableRefs: [TI004]

- id: acquisition-context
  title: "Mitsubishi Electric Acquisition: Financial Implications"
  body: >
    Mitsubishi Electric Corporation (TYO: 6503) completed its acquisition of Nozomi Networks
    on January 28, 2026, after announcing the deal on September 9, 2025. The acquisition
    consideration was not publicly disclosed by either party. Mitsubishi Electric is listed
    on the Tokyo Stock Exchange; the non-disclosure of the acquisition price is consistent
    with Japanese public company practice for transactions below material threshold reporting
    requirements. Independent analyst estimates, based on cybersecurity SaaS ARR multiples
    typical in 2025 (5x-15x ARR) applied to $100M+ ARR, would imply an acquisition value
    in the range of $500M to $1.5B or more, though these are speculative estimates.

    Mitsubishi Electric had revenue of approximately ¥5.2 trillion ($34B USD) in FY2025,
    providing substantial financial support capacity for Nozomi's ongoing investment. As a
    wholly owned subsidiary, Nozomi no longer faces the existential funding risk of needing
    to raise another round of venture capital; its capital allocation is now governed by
    Mitsubishi Electric's internal investment planning processes, which could be either
    accelerating (if the parent prioritizes OT security aggressively) or constraining
    (if capital allocation decisions move more slowly than an independent company).

    Nozomi Networks maintains an independent vendor-agnostic operational posture as a subsidiary,
    continuing to serve and support customers of Siemens, Honeywell, ABB, Rockwell, and other
    Mitsubishi Electric competitors. This independence was explicitly communicated as a
    condition of the deal, preserving Nozomi's commercial relationships. However, independent
    operator status within a large Japanese industrial conglomerate typically comes with
    budgeting constraints, approval processes, and integration pressures that can affect
    growth velocity over time.

    The pre-acquisition financial relationship included Mitsubishi Electric's participation in
    the March 2024 Series E ($100M round), demonstrating a deliberate escalation from financial
    investor to strategic acquirer over approximately 18-20 months.
  tableRefs: [TI005]
  figureRefs: [FI004]

- id: cost-structure
  title: "Cost Structure and Operating Model"
  body: >
    Nozomi Networks operates a dual-geography structure: commercial headquarters in San Francisco,
    CA (575 Market Street, Suite 3650) with engineering and R&D based in Mendrisio, Switzerland.
    The Swiss engineering base provides access to European engineering talent at potentially
    lower compensation levels than Silicon Valley, contributing to the cost efficiency reflected
    in the break-even milestone.

    The 24% headcount growth in 2025 indicates Nozomi was actively scaling sales, customer
    success, and product development in parallel. New partnerships with Schneider Electric,
    Hitachi Cyber, NVIDIA, Dispel, and Xona (all announced in 2025) represent channel and
    technology expansion that can reduce direct selling costs relative to ARR growth.
    Nozomi's revenue is primarily delivered through a partner ecosystem of system integrators
    and MSSPs globally, which compresses direct sales costs at the expense of channel margin.

    The January 2026 establishment of an Asia Pacific and Japan regional headquarters in
    Singapore, with approximately 100 customers in the region, represents a deliberate
    geographic capex commitment. Singapore headquarters costs (office, regional headcount,
    regulatory compliance) will add operating expense, partially offset by the growing
    APAC revenue base. The Mitsubishi Electric acquisition is expected to accelerate
    APAC growth given Mitsubishi's deep relationships in the region's industrial sector.

    Gross margin structure is not publicly disclosed, but the presence of hardware (Guardian
    sensors), SaaS (Vantage), endpoint subscriptions (Arc), and professional services creates
    a blended margin profile typical of industrial cybersecurity peers. As SaaS and subscription
    revenue grows as a percentage of the mix, gross margins should improve over time.
  tableRefs: [TI006]

