  evidenceGaps:
  - topic: "acquisition-price"
    description: >
      Mitsubishi Electric's acquisition consideration for Nozomi Networks was not publicly
      disclosed. No Form 8-K equivalent filing has been identified. Any valuation estimate
      is speculative.
    diligencePath: >
      Request acquisition agreement through M&A counsel; check Tokyo Stock Exchange
      disclosure database for material transaction filings by Mitsubishi Electric; review
      Mitsubishi Electric annual report for acquisition disclosure in FY2026 filing.

    relatedQuestionRefs:
    - QI003
  - topic: "revenue-breakdown-by-stream"
    description: >
      Revenue breakdown by product stream (SaaS/hardware/services) is not publicly disclosed.
      No investor presentation or earnings transcript is available for a private company.
    diligencePath: >
      Request management accounts in due diligence; specifically request deferred revenue
      schedule, revenue by product line, and SaaS vs. one-time breakdown.

    relatedQuestionRefs:
    - QI004
  - topic: "independent-ARR-verification"
    description: >
      The $100M+ ARR milestone is company-disclosed without independent auditor certification.
      No third-party analyst has confirmed this figure.
    diligencePath: >
      Request audited financial statements; confirm ARR definition (GAAP recurring revenue
      or bookings-based metric); request deferred revenue roll-forward.

  - topic: "gross-margin-by-stream"
    description: >
      Gross margins by product stream (SaaS, hardware, services) are not available. Overall
      margin profile is inferrable only from industry benchmarks.
    diligencePath: >
      Request P&L with product-line cost of goods sold in due diligence; benchmark against
      comparable OT security peers with publicly disclosed margins.

  - topic: "employee-equity-acquisition-treatment"
    description: >
      The terms under which employee stock options and equity awards were treated in the
      Mitsubishi Electric acquisition have not been disclosed publicly.
    diligencePath: >
      Review acquisition agreement; check SEC 13G/SC-13E or equivalent Japanese filings;
      consult with employment counsel on equity acceleration provisions typical in
      Japan-US cross-border acquisitions.

    relatedQuestionRefs:
    - QI021
