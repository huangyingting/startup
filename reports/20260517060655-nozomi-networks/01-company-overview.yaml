callouts:
  - calloutType: strength
    title: Dual Analyst Leadership Recognition
    body: >-
      Nozomi Networks holds simultaneous Leader designations in both the Gartner Magic Quadrant for CPS
      Protection Platforms (2026, second consecutive year) and the Forrester Wave for IoT Security Solutions
      (Q3 2025). Being named "Company to Beat for AI in CPS" by Gartner in December 2025 adds further
      competitive differentiation. This is a strong signal of sustained market leadership heading into the
      Mitsubishi Electric era.
    claimRefs:
      - CO037
      - CO038
      - CO039

  - calloutType: risk
    title: Post-Acquisition Independence Risk
    body: >-
      Nozomi Networks' acquisition by Mitsubishi Electric, a Japanese industrial conglomerate, raises vendor
      neutrality questions from customers who compete with or are regulated against Japanese industrial groups.
      An October 2025 press release specifically addressing "Protecting Nozomi Customer Interests" indicates
      that customer concerns were raised post-announcement, requiring explicit reassurance. The long-term
      independence of Nozomi's vendor-agnostic approach under corporate ownership is a material diligence
      concern.
    claimRefs:
      - CO028
      - CO029
      - CO030
      - CO031

  - calloutType: insight
    title: Revenue Milestone and Break-Even Achievement
    body: >-
      The January 2026 acquisition completion press release disclosed that Nozomi surpassed $100M in annual
      revenue and became the first privately held OT cybersecurity company to achieve sustained cash flow and
      break-even performance. This is an unusual disclosure for a venture-backed private company at exit and
      suggests the company reached economic sustainability before the acquisition closed, strengthening the
      deal rationale on both sides.
    claimRefs:
      - CO033
      - CO042

