  - id: section-scale
    title: Scale, Milestones, and Operational Metrics
    body: >-
      Nozomi Networks publicly claims 115M+ OT, IoT, and IT devices monitored, 12K+ installations worldwide,
      and 100% customer retention. These figures appear on the company's official "About" page and homepage
      as of the May 2026 run date and represent the most recent available public scale data; they are
      company-claimed and not third-party verified. The company surpassed $100M in annual revenue in 2025,
      achieving what it describes as the first sustained cash flow and break-even performance by a privately
      held OT cybersecurity company.


      Customer segment penetration is notable: Nozomi claims to serve 5 of the top 10 global oil and gas
      companies, 7 of the top 10 pharmaceutical manufacturers, 7 of the top 10 utilities, and 4 of the top
      10 mining operations. These claims were made in the January 28, 2026 acquisition completion press
      release and have not been independently verified. Employee headcount grew 24% in 2025. The company
      was named to the Deloitte Technology Fast 500 (2022 third consecutive year, 2025) and Fast Company's
      World's Most Innovative Companies 2025 list.


      Regulatory milestones add credibility: Nozomi was a CISA ICS Joint Cyber Defense Collaborative (JCDC)
      founding partner (April 2022), was added to the DHS CDM Approved Product List (March 2023), and
      achieved FedRAMP Moderate Authorization "In Process" designation (October 2025). The French ANSSI-CSPN
      certification for Guardian NSG-M was obtained in January 2022, supporting European government
      deployments. A $1.25M US Air Force contract was announced in April 2024.
