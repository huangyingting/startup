  - id: section-capital
    title: Capital Structure, Funding, and the Mitsubishi Electric Acquisition
    body: >-
      Nozomi Networks completed five rounds of external venture funding before being acquired. The largest
      publicly confirmed rounds are a $100M Series D (March 2022) and a $100M Series E (March 2024).
      Investors across these rounds include Triangle Peak Partners (lead), Honeywell Ventures, Cisco
      Investments, GGV Capital, Lux Capital, Planven Entrepreneur Ventures, and Mitsubishi Electric
      (Series E investor). Total capital raised is estimated at approximately $250M+ across all rounds,
      though the company has not publicly disclosed a lifetime total. A unicorn valuation was widely
      reported at approximately $1.2 billion+ at the time of Series D.


      The strategic rationale for the Mitsubishi Electric acquisition rests on several pillars stated by
      both parties: Mitsubishi Electric brings more than 100 years of OT and industrial expertise with
      $36.8B in FY2025 revenue; Nozomi brings a rapidly growing AI-powered cybersecurity platform; and
      together they aim to accelerate OT security innovation for critical infrastructure worldwide. Mitsubishi
      Electric first participated in Nozomi's Series E round (March 2024) and both companies collaborated on
      innovation and go-to-market before the definitive acquisition agreement was signed September 9, 2025.
      The transaction closed January 28, 2026. The acquisition price was not publicly disclosed; however,
      given reported $100M+ ARR and unicorn-scale valuation context, the consideration is likely in the
      $500M–$1.5B range (estimated, not confirmed).


      As a subsidiary, Nozomi is now fully owned but retains operational independence. The company
      emphasizes vendor agnosticism, continuing to work with the broader cybersecurity ecosystem including
      Cisco, IBM Security, Google Cloud, and other partners that are arguably competitors to Mitsubishi
      Electric's parent IT portfolio. A key diligence question is how Mitsubishi Electric's ownership affects
      Nozomi's relationships with customers and partners who compete with or are regulated against Japanese
      industrial conglomerates.
