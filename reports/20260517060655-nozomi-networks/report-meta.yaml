companyProfile:
  summary: >
    Nozomi Networks is the global leader in OT, IoT, and cyber-physical systems (CPS) security, offering the
    Guardian sensor platform and Vantage cloud analytics engine for real-time asset visibility, threat detection,
    and vulnerability management across industrial, critical infrastructure, and enterprise environments. Founded
    in 2013 by Andrea Carcano and Moreno Carullo in San Francisco, the company grew to 12,000+ deployments and
    115M+ monitored devices before being acquired by Mitsubishi Electric in January 2026 for an undisclosed sum,
    validating its position as the pre-eminent pure-play OT/CPS security vendor.
  foundedDate: "2013-01-01"
  founders:
    - name: "Andrea Carcano"
      role: "Co-Founder and CEO"
      background: "Previously built industrial control systems software; serial entrepreneur in OT/ICS security."
      claimRefs: ["CO003"]
    - name: "Moreno Carullo"
      role: "Co-Founder and CTO"
      background: "Deep expertise in ICS protocols, network analysis, and embedded systems security."
      claimRefs: ["CO003"]
  foundingLocation: "San Francisco, CA, USA"
  headquarters: "San Francisco, CA, USA"
  productSummary: >
    Guardian sensors (hardware and virtual) provide passive, non-intrusive monitoring of OT/IoT networks with
    deep packet inspection of 1,500+ industrial protocols. Vantage SaaS aggregates multi-site telemetry into a
    cloud analytics and workflow platform. Remote Monitoring provides managed service delivery. The platform covers
    asset inventory, vulnerability prioritization, anomaly detection, and SIEM/SOAR integration via open APIs.
  customerFocus: "Critical infrastructure operators, industrial enterprises, utilities, oil and gas, manufacturing, transportation, and government agencies requiring OT/ICS/IoT network visibility and threat detection."
  businessModel: "Hybrid subscription (Vantage SaaS ARR) plus term licenses (Guardian sensors) plus professional services and remote monitoring; majority of revenue is recurring."
