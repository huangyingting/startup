summary:
  headline: >
    Nozomi Networks 是全球 OT/CPS 安全市场龙头，部署 12,000+ 个、ARR 超 $100M；目前作为 Mitsubishi Electric 子公司运营， 估计企业价值（EV）为
    $1.4B–$1.8B，对应 9–11x ARR。交易经济性和整合轨迹披露前，建议观察。
