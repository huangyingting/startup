  topStrengths:
    - >-
      Market leader in OT/ICS/CPS security with the broadest protocol coverage (1,500+ industrial protocols) and largest
      deployment footprint (12,000+ sites).
    - >-
      Strong ARR growth trajectory reaching $100M+ milestone in 2025 with high NRR driven by platform expansion into
      Vantage SaaS.
    - >-
      Validated strategic value: acquisition by Mitsubishi Electric — a Tier 1 industrial conglomerate with global OT
      installed base — provides long-term distribution advantage.
    - >-
      Dual-use government certifications (FedRAMP in-process, NATO-allied deployments) provide defensible moats in
      regulated segments.
    - >-
      High switching costs and deep protocol expertise create durable competitive advantage against both pure-play
      (Dragos, Claroty) and broad-platform (CrowdStrike, Palo Alto) rivals.
  topRisks:
    - >-
      Undisclosed acquisition price prevents independent valuation verification; all EV estimates are inferred from ARR
      multiples and comparable transactions.
    - >-
      Integration execution risk: absorbing Nozomi into Mitsubishi Electric's corporate structure may slow product
      velocity and talent retention.
    - >-
      Intense competition from CrowdStrike, Palo Alto Networks, and Microsoft expanding OT security modules, compressing
      pure-play premiums.
    - >-
      Concentration in energy, utilities, and critical infrastructure makes revenue cyclical and dependent on capex
      cycles and government budget allocations.
    - >-
      ARR growth rate post-acquisition may decelerate as channel and incentive structures change under corporate parent
      ownership.
  unresolvedGaps:
    - >-
      Mitsubishi Electric acquisition consideration not publicly disclosed; base case EV of $1.4B–$1.8B is an estimate
      derived from ARR multiples and comparable transactions.
    - Audited FY2024 and FY2025 ARR and NRR figures unavailable; $100M+ ARR is company-indicated milestone.
    - Dragos and Claroty FY2025 ARR figures are analyst estimates; actual comparable multiples may differ.
    - Post-acquisition go-to-market and product roadmap integration plans have not been publicly disclosed.
    - >-
      Nozomi gross margin breakdown (hardware vs. SaaS vs. services) is not publicly confirmed; Rule of 40 and FCF
      estimates carry significant uncertainty.
