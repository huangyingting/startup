summary:
  headline: >
    Nozomi Networks is the global OT/CPS security market leader with 12,000+ deployments and $100M+ ARR, now operating
    as a Mitsubishi Electric subsidiary with an estimated EV of $1.4B–$1.8B at 9–11x ARR; recommend Track pending
    disclosure of deal economics and integration trajectory.
