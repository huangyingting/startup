              - CE034
      - number: '5.8'
        title: 技术差异化、开源研究与平台局限
        blocks:
          - type: paragraph
            body: >
              Nozomi 的核心技术差异化，在于把深度被动网络监控与专为 OT 协议设计的 AI 异常检测结合起来。面向 IT 的工具无法解析 Modbus、DNP3、IEC 61850、PROFIBUS 或
              EtherNet/IP；相比之下，Nozomi 的 Guardian 传感器可对 1,000+ 种 OT、IoT 和 IT 协议做深度包检测。这样的覆盖面让它能建立准确行为基线，并发现模式匹配或按 IT
              调优的工具会漏掉的异常。

              Nozomi Networks 维护公开 GitHub 组织（github.com/nozominetworks），开源安全研究工具聚焦特定 ICS 和 OT 威胁场景。已发布仓库包括：用于分析 Triconex
              安全控制器通信的 Triconex TriStation 实用程序和工具（Lua，81 stars，27 forks）；用于剖析俄罗斯 GreyEnergy APT 组织所用加壳器的 GreyEnergy
              packer 分析工具包（Python，16 stars，6 forks）；Mitsubishi Electric MELSOFT 协议解析工具（11 stars，4 forks）；将威胁指标转换为 STIX
              格式的 IoC-to-STIX 处理工具（9 stars，3 forks）；以及 UWB RTLS 通信解析工具。这些工具展示了对 ICS 生态的深层协议理解，在安全研究社区建立可信度，也反映 Nozomi
              Labs 在高风险 OT 行业的研究优先级。

              NVD/NIST CPE 数据库将 Nozomi 自家的 CMC（22.0.0 至 25.3.0 版本）和 Guardian 产品列为已注册软件，反映其正式参与美国网络安全漏洞跟踪生态。

              被动监控优先架构既是技术优势，也带有内在局限。被动监控本身无法阻止攻击，只能检测并告警。Arc 的主动防护能力（Quarantine/Delete 模式）补上了部分缺口，但需要部署端点；对 PLC、RTU
              和传统控制器而言，这并不现实。平台复杂度让中型市场部署依赖专业服务，Mandiant Threat Intelligence Expansion Pack
              还带来第三方成本和合同变量，客户必须计入平台总拥有成本（TCO）。
            claimRefs: []
