  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入规模与运营里程碑
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 在 2025 年经常性收入（ARR）超过 $100M；这一信息披露于 January 28, 2026 宣布 Mitsubishi Electric
              收购完成的新闻稿。公司同时披露，自己是在这一规模下首家实现持续现金流为正和盈亏平衡的私营 OT 网络安全公司。$100M ARR 与运营盈亏平衡这两个里程碑很重要：它们把 Nozomi 从大多数 OT
              安全同业承受的融资压力中切出来；后者在类似收入水平下仍然亏损。$100M ARR 为公司披露，尚未独立审计。

              支撑收入里程碑的是，Nozomi 报告截至 Q4 2025 拥有 12,000+ 次活跃安装，覆盖 115M+ 台受监测设备（公司声称）。2025 员工数增长
              24%，说明公司仍在主动投入销售、营销和工程能力以维持增长。Nozomi 还称客户留存约 100%，这是净收入留存质量的强信号。强留存叠加新企业客户扩张，推动 ARR 轨迹。

              Deloitte Technology Fast 500 认可（2025）和 Fast Company World's Most Innovative Companies 排名（安全领域
              #3，2025）是外部增长信号，与公司在资格期间高速增长相符。尽管具体收入增速未披露，这些认可通过第三方验证确认了公司的自述增长叙事。
