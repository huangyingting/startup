        - 正向
        - 内置面向 OT 的协议，如 OPC UA、DNP3、Modbus、Siemens S7——识别非常准确
        - 核心产品市场匹配得到确认；协议覆盖广度得到用户验证
      - - 部署便利性
        - 正向
        - 初始设置简单且快速，通常几小时内完成
        - 部署阻力低，加快价值兑现；降低专业服务风险
      - - IT 可见性缺口
        - 正向
        - 为 OT 环境带来可见性，而多数企业过去只在 IT 侧检查
        - 相对 IT 安全工具差异清晰；契合 OT 运营方需求
      - - 查询语法复杂度
        - 负向
        - 查询语法很复杂，所以有时拿不到想要的结果
        - 界面摩擦让用户依赖专家分析师；小团队采用门槛更高
      - - Vantage IQ 成熟度
        - 负向
        - 他们的 AI，也就是 IQ，还有提升空间
        - AI 助手功能仍处早期；尚未完全兑现发布时的承诺
      - - 定价
        - 负向
        - 许可价格偏高；用户希望免费提供附加代理（Arc）
        - 企业级定价限制中端市场渗透；Arc 附加率可能受约束
      - - PoC 体验
        - 负向
        - 概念验证如果配合视频演示，会更直观
        - 销售流程需要改进；需更好赋能 OT 安全利益相关方买家
    notes: |
      反馈主题汇总自 PeerSpot 用户评价（独立平台）。原文引述是 PeerSpot 评价综合中的改写摘要；它们反映多条评价中的共性主题，而非单个评价者的异常值。
