      - number: '2.3'
        title: 垂直行业与买方画像
        blocks:
          - type: paragraph
            body: >
              Nozomi 覆盖 17+ 个具名垂直行业，截至 2026 在油气（前 10 大公司中的 5 家）、电力公用事业（前 10 大中的 7 家）、制药（前 10 大中的 7 家）和采矿（前 10 大中的 4
              家）渗透最深（公司声称）。这四个垂直行业共享三项需求驱动因素：（1）物理流程关键性——网络事件若导致管道停运、电网中断或药品批次污染，会直接带来安全和财务后果；（2）无法自我防护的遗留 ICS
              基础设施；（3）Industry 4.0 推动 IT 与 OT 网络融合，消除了物理隔离。


              预算归属随垂直行业差异很大。在电力公用事业，OT 安全支出通常流经与 NERC CIP 挂钩的合规项目；NERC CIP 是面向大电力系统运营商的强制监管框架，违规可执行处罚。在油气和制造业，由 CISO
              主导的安全预算通常同时覆盖 OT 监测和 IT 安全工具。联邦 / 国防客户以 FedRAMP 授权为前提，采购经由机构 IT 预算。中小工业运营商（SMEs）在 OT
              安全上投入不足，是渗透率偏低的长尾市场，正越来越多通过 MSSP 渠道触达。


              大型工业企业中的主要买方是 OT/IT 安全团队或 IT/OT 联合指导委员会。工厂经理和运营团队是关键影响者，因为他们掌握车间现场；CISO 控制预算。评估通常会纳入 OT 工程师、安全架构师，厂商也往往拼的是
              OT 协议支持深度，而不是价格。
