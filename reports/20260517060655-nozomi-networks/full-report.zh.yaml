      - number: '6.5'
        title: 部署模式与用例画像
        blocks:
          - type: paragraph
            body: >
              Nozomi 客户主要按三种模式部署平台：云托管（Vantage）、本地隔离网络（CMC）和混合模式。PeerSpot 评价确认，客户同时在云端和本地配置中使用
              Nozomi，托管服务提供商也把该平台作为白标门户服务，与其工业客户共享。

              核心部署用例包括：用于识别自动化系统威胁的 OT/IoT 入侵检测；面向工业设备（PLC、HMI、历史数据服务器）的资产清单和漏洞管理；面向安全运营中心的风险量化和优先级排序；用于 OT
              网络分段规划的网络拓扑可视化；以及面向 NERC CIP、NIST CSF 和 IEC 62443 的合规报告。

              200+ 个传感器的企业级部署由 Vantage 承载，功能包括自动告警优先级排序、集中风险评分和 Mandiant 威胁情报提炼。Vantage 平台特别强调来自 Fortune Global 500
              公司的用例，包括管理全球站点 300+ 个网络分段区域的运营方、200+ 个传感器超过单一本地控制台容量的客户，以及需要在全球资产范围内维护 200+ 条自定义威胁情报规则的组织。

              APAC 区域由新加坡总部支持约 100 家客户，是快速增长的细分市场；当地国家级 OT 网络安全监管（包括 Singapore's OT Cybersecurity
              Masterplan）正在创造监管需求。区域客户包括运营关键国家基础设施的公用事业、电信运营商和政府关联公司。
