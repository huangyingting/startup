      - number: '1.4'
        title: 规模、里程碑与运营指标
        blocks:
          - type: paragraph
            body: >-
              Nozomi Networks 公开宣称已监测 115M+ 台 OT、IoT 和 IT 设备，全球 12K+ 次安装，并实现 100% 客户留存。这些数字出现在公司官方「About」页面和首页，截至 May
              2026 运行日期，是目前可获得的最新公开规模数据；它们由公司声称，未获第三方验证。公司在 2025 年收入超过 $100M，并称自己成为首家实现持续现金流和盈亏平衡的私营 OT 网络安全公司。


              客户分层渗透值得关注：Nozomi 称其服务全球前 10 大油气公司中的 5 家、前 10 大制药商中的 7 家、前 10 大公用事业公司中的 7 家，以及前 10 大矿业运营商中的 4 家。这些说法来自
              January 28, 2026 的收购完成新闻稿，尚未独立验证。2025 员工数增长 24%。公司入选 Deloitte Technology Fast 500（2022 第三次连续入选，2025）以及
              Fast Company World's Most Innovative Companies 2025 榜单。


              监管里程碑增强可信度：Nozomi 是 CISA ICS Joint Cyber Defense Collaborative（JCDC）创始伙伴（April 2022），进入 DHS CDM Approved
              Product List（March 2023），并在 October 2025 获得 FedRAMP Moderate Authorization「In Process」状态。Guardian NSG-M 于
              January 2022 取得法国 ANSSI-CSPN 认证，支撑欧洲政府部署。April 2024，公司宣布获得一份 $1.25M 美国空军合同。
