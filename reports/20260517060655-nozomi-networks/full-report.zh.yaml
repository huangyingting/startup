  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱与评分方法
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 面临多维风险：它处在关键基础设施网络安全、企业 SaaS 转型和被日本大型企业完成收购三者交汇处。Mitsubishi Electric 收购在 January 28, 2026
              完成交割后，公司风险现在落在六个主要类别：监管和法律、竞争和技术、收购与整合、产品安全和技术、财务和商业模式、地缘政治和供应链。

              每项风险按两个维度评估——发生概率（1 = 罕见，2 = 不太可能，3 = 可能，4 = 很可能，5 = 几乎确定）和影响（1 = 可忽略，2 = 轻微，3 = 中等，4 = 重大，5 =
              严重）——综合严重度分数 = 概率 × 影响。严重度 ≥ 12 的风险归为高，6–11 为中，≤ 5 为低。缓解成熟度评为 Established（E）、In Progress（P）或
              Planned/None（N）。剩余暴露 = 严重度 ×（1 − 缓解折扣）。

              Dragos 2026 OT Cybersecurity Year in Review 确认了这些风险背后的威胁环境：2025 年出现三个新威胁组织，对手正在主动绘制 OT
              环境内的控制回路，勒索软件造成了显著运营中断。这种升级验证了市场机会，同时也提高了 Nozomi 防御态势中未解决缺口的严重度。IBM Cost of a Data Breach Report 2024 将 OT
              相关泄露的平均成本定为 $4.88M，为下文剩余暴露评估提供财务基准。

              White House 2023 National Cybersecurity Strategy 将 OT 安全提升为国家优先事项，要求关键基础设施运营方落实最低网络安全要求。这一监管驱动一方面扩大 Nozomi
              的可触达市场，另一方面也在 Nozomi 产品未能达成认证里程碑（例如 FedRAMP）时制造合规风险。CISA Known Exploited Vulnerabilities（KEV）catalog 和
              Stop Ransomware initiative 都是监管参照点，客户和监管方可据此衡量 Nozomi 的检测有效性。
