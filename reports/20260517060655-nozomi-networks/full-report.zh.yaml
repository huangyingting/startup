      - number: '4.3'
        title: 收入模式与产品经济性
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 的收入来自四条主要流：Vantage 云平台 SaaS 订阅、硬件传感器部署（Guardian）、端点安全订阅（Arc）和专业服务。公司未公开披露各流收入占比，但产品架构和
              市场拓展模式显示，SaaS 正成为主要增长驱动。

              Vantage SaaS 平台是云原生订阅产品，为分布式工业环境提供集中化 OT/IoT 可见性。订阅型 SaaS 收入通常毛利率高于硬件收入，前者约 70-80%，后者约
              30-50%，这会激励公司在已安装客户中扩大 Vantage 采用。Guardian 硬件传感器用于被动 OT 网络监测；硬件收入通常会附带经常性支持和软件订阅，从而提高每次部署的生命周期价值。Arc
              是纯软件端点安全订阅，为无法或不愿部署硬件传感器的客户提供低成本切入口。

              专业服务包括实施支持、威胁情报和托管检测服务。这些服务帮助客户加快部署、最大化平台价值，但毛利率通常低于 SaaS，约 20-40%。服务收入一般会随安装基础增长而增长，随后在客户自给能力提升后趋于平台期。

              美国政府渠道是一条新兴收入流。Nozomi 的 Vantage for Government 于 October 2025 获得 FedRAMP Moderate「In
              Process」状态，打开了联邦民事采购入口。叠加 CISA JCDC 创始伙伴身份（2022）和 DHS CDM APL 名录（2023），Nozomi 已搭建了在 2026
              及以后竞争大型政府合同所需的合规基础设施。Google Cloud Marketplace 上架（May 2026）进一步拓宽了云原生渠道分销。
