      - number: '7.4'
        title: 收购与整合风险
        blocks:
          - type: paragraph
            body: >
              Mitsubishi Electric 收购于 January 28, 2026 完成，带来一类新的结构性风险：供应商中立性感知。Nozomi 的核心价值主张是对 OT 供应商生态保持中立——它公正监控
              Siemens PLC、ABB DCS 系统、Honeywell historian 和 Rockwell Automation 控制器。Mitsubishi Electric 本身是全球主要 OT
              设备制造商（工厂自动化、伺服系统、SCADA、逆变器），与 Siemens、ABB、Rockwell、Honeywell 直接竞争。Nozomi 最大的潜在客户包括 Mitsubishi Electric
              的直接竞争对手。即使存在合同隔离，关于数据主权的担忧——Nozomi 遥测数据是否可被 Mitsubishi Electric 母公司访问——也可能在竞争账户中制造摩擦。

              关键人员留任是重大风险。CEO Edgard Capdevielle 于 2015 加入；联合创始人 Andrea Carcano（CPO）和 Moreno
              Carullo（CTO）仍活跃参与运营，并是核心专利的署名发明人。在典型 M&A earnout 结构下，创始人留任通常在交割后 2–4
              年受到合同约束；具体留任条款未公开披露。若任一联合创始人在整合阶段离职，产品愿景连续性和工程速度都可能受到实质损害。

              文化整合风险显著：Mitsubishi Electric 采用日本 keiretsu 模式，决策层级分明、规划周期长，与 Nozomi 的旧金山创业公司文化结构性不同。收购后的汇报要求、采购流程和人事政策，可能与
              Nozomi 的敏捷开发节奏冲突。Mitsubishi Electric 投资者关系页面未披露 Nozomi 分部收入，导致财务表现目标和管理问责不透明。

              收购价格仍未披露。没有公开交易估值，就无法独立判断 Mitsubishi 相对市场可比公司支付的是溢价还是折价，也无法判断任何 earn-out 条款是否会给剩余股权持有人带来未来稀释风险。
