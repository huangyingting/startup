      - number: '6.7'
        title: 客户挑战与负面反馈
        blocks:
          - type: paragraph
            body: >
              尽管客户满意度评分较强，PeerSpot 评价和其他客户来源反馈仍记录了几类持续需要改进的领域。最常被提及的运营挑战是查询语法复杂：多名客户指出 Nozomi
              查询语言复杂且不直观，一位评价者称「查询语法非常复杂，所以有时你得不到想要的结果」。这种界面摩擦会给数据分析训练有限的 OT 安全团队带来可用性风险。

              关于 Vantage IQ（AI 助手）的客户反馈指出，产品仍有改进空间：「他们的 AI，也就是 IQ，还可以继续改进。」鉴于 Vantage IQ 于 January 2026
              发布，早期产品反馈并不意外，但这条批评说明初始版本尚未完全兑现发布公告中承诺的 AI 引导生产力收益。

              概念验证（PoC）展示质量也受到批评：一些客户建议，Nozomi 的 PoC 流程可通过改进演示材料和视频呈现变得更具体。这意味着销售流程可能过度依赖技术团队传达产品价值，而对结构化买方赋能投入不足。

              一些买方也提到价格顾虑，尤其是附加功能授权。较小市场的客户可能觉得企业级价格门槛过高；也有人提出希望免费获得附加代理（Arc）。这些定价顾虑会影响 Nozomi 在中型工业公司的可触达市场，因为这些公司有 OT
              安全需求，但网络安全预算比 Fortune Global 500 账户更有限。
