  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构概览
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 平台是一套模块化、多层的 OT、IoT 和网络物理系统（CPS）安全架构，由 5 个专门打造的组件拼成：Guardian（被动有线传感器）、Arc（端点代理）、Guardian
              Air（无线传感器）、Vantage（云端 SaaS 管理）以及 Central Management Console 或 CMC（本地管理）。每个组件都会收集资产、流量或频谱数据，路由到集中管理层，并喂给 AI
              驱动分析。设计哲学是被动优先：传感器只观察、不注入流量；在 OT 环境中，未经请求的数据包可能干扰可编程逻辑控制器和安全仪表系统，这一点至关重要。

              该平台定位为面向 OT 和 IoT 可见性与安全的 AI 驱动方案，专为传统 IT
              安全工具无法安全运行的关键基础设施环境打造。架构同时支持完全云端管理部署（Vantage）和物理隔离的本地部署（CMC），无论连接条件或数据驻留要求如何，都给运营商留出灵活性。

              截至 May 2026，该平台在全球 12,000+ 次安装中监测 115M+ 台设备（公司声称）。NVD NIST CPE 数据库将 Nozomi 产品——包括 CMC 22.0.0 至 25.3.0 版本和
              Guardian 传感器——列为注册软件，表明其在美国网络安全漏洞分类体系中获得正式认可。
