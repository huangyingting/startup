  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              OT/ICS/CPS 安全市场在结构上分为三档竞争者：（1）纯粹型 OT/ICS 安全专家（Nozomi Networks、Dragos、Claroty），直接在 CPS
              防护平台细分市场竞争；（2）扩展后的资产管理平台（Armis、Forescout），从 IT 资产管理切入 OT，并把 OT/IoT 作为更大安全产品套件中的一个模块；（3）既有工业自动化和 IT
              安全厂商（Siemens、Honeywell、Schneider Electric、Cisco、Microsoft、Palo Alto、TXOne Networks），靠平台扩展、收购或 OEM 渠道杠杆竞争。


              Nozomi Networks、Dragos 和 Claroty 是最直接可比的三家厂商——三者都为 OT/ICS 环境专门打造，都服务关键基础设施和工业垂直行业，也都出现在 Gartner Magic
              Quadrant for CPS Protection Platforms 中。Gartner 在 2026 MQ 中将 Nozomi Networks 和 Claroty
              都评为领导者（两者均连续第二年），验证了平台层面的双领导者市场。Dragos 虽有深厚的 ICS 威胁情报，但在 2026 MQ 中定位不同。


              这个市场的一个鲜明特征是竞合关系：Honeywell Ventures 和 Schneider Electric 都在 Series D 和 Series E 投资了 Nozomi，但两者也都运营与 Nozomi
              在工业自动化客户中竞争的 OT 安全产品。同样，Siemens 既是 Nozomi 的渠道伙伴，也运营面向同一批工业客户的网络安全咨询业务。
            claimRefs:
              - CP001
              - CP007
              - CP008
              - CP012
