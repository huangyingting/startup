              - CE006
              - CE015
              - CE016
              - CE017
      - number: '5.5'
        title: Vantage 云管理平台与 Vantage IQ
        blocks:
          - type: paragraph
            body: >
              Vantage 是 Nozomi 的云原生 SaaS 管理平台，把全球分布的 OT 和 IoT
              环境纳入统一可视化与安全管理。它以全局视图集中呈现所有资产、传感器、网络和地点，让安全团队既能下钻到任一站点或资产，也能保留整体态势感知。Vantage
              采用订阅模式，传感器容量不限，消除了本地管理控制台在规模化时常见的容量瓶颈。从本地 CMC 迁移的客户可以按自己的节奏迁移——同步部分或全部数据——无需替换现有 Guardian 传感器。

              Vantage 整合 Nozomi Labs 和 Mandiant 的威胁情报，将信息流提炼为可筛选的威胁卡片，附带缓解建议，并用 AI 自动化告警优先级排序。这个 AI
              层接手告警数据关联和排序这类繁琐工作，让响应更快，也减少分析师疲劳。

              January 15, 2026，Nozomi 发布 Vantage IQ——全球首个面向 OT 和 IoT 安全团队、由企业私有数据训练的 AI 助手。Vantage IQ
              基于安全的大语言模型（LLM），训练数据来自组织自身的 OT/IoT 资产清单、漏洞数据、威胁馈送和风险上下文，而不是外部公开数据。这种默认私有的设计让分析师可以围绕自身环境提问，而不把敏感运营数据暴露给外部
              AI 服务。Vantage IQ 为 SOC 分析师提供 AI 引导的分诊、调查和响应建议，也用直白语言为 CISO 生成可上会的洞察。CPO Andrea Carcano 称它是「全球最先进的 OT/IoT
              网络安全 AI 助手」。
