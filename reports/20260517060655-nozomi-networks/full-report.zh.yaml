      - number: '5.2'
        title: Guardian 被动网络传感器
        blocks:
          - type: paragraph
            body: >
              Guardian 是 Nozomi 的基础有线网络传感器。它通过镜像网络端口（SPAN ports）或网络 tap 被动接入，只观察全部流量，不额外发包，也不打断控制平面通信。按照 CISA ICS
              建议实践，OT 安全更适合采用这种被动方式；主动扫描或流量注入可能触发敏感工业设备告警，甚至导致设备失效。

              Guardian 持续、自动发现并分类该网段内所有通信设备，采集设备类型、固件版本、序列号、通信模式等元数据。它支持对 1,000+ 种 OT、IoT 和 IT
              协议做深度包检测，覆盖面足以解析能源、公用事业、制药、制造等行业使用的专有工业协议。

              传感器会随时间学习被动观察到的流量模式，为每台设备和每条通信流建立行为基线。流量一旦偏离 AI
              推导出的基线，就会触发异常告警，从而发现无法匹配已知恶意软件签名的新型威胁。已发现的漏洞、异常和威胁会流入平台工作流及集成安全工具，加快事件响应。

              Guardian 还支持 Smart Polling：针对特定设备发起离散主动查询，在不干扰控制流程的前提下补充资产数据。环境需要超出被动观察范围的额外资产元数据时，客户可以选择启用。
            claimRefs: []
          - type: table
            tableRef: TE002
            claimRefs:
              - CE009
              - CE010
              - CE028
      - number: '5.3'
        title: Guardian Air 无线传感器
        blocks:
          - type: paragraph
            body: >
              Guardian Air 将 Nozomi 平台扩展到无线频谱，补上 OT 环境里越来越突出的空白：无线设备在传统有线网络传感器覆盖不到的范围内与关键资产通信。接入 Vantage 云平台后，Guardian
              Air 可连续监测 800 MHz 至 5895 MHz 的电磁频谱，覆盖 IEEE 802.11（Wi-Fi）、Bluetooth 和 BLE、IEEE 802.15.4（Zigbee 和
              WirelessHART）、LoRaWAN、蜂窝网络、Open Drone ID（ODID）、Z-Wave 等多类协议。

              无线威胁与有线威胁在操作层面不同：攻击者只要靠近现场（屋顶、车辆或无人机），就能触达无线攻击面，绕过边界防御，而且无需接触有线网络。Guardian Air 可检测去认证攻击、暴力猜测 Wi-Fi
              密钥、Bluetooth 劫持、流氓设备、未授权接入点、伪基站、无人机接近等无线专属威胁。

              Guardian Air 采集的无线数据会与 Guardian 传感器的有线网络数据关联，并发送到 Vantage
              做整体威胁分析。物流枢纽、自动化运输设施、智能工厂等环境里，无线和有线攻击面越来越重叠，这种关联视图尤其有价值。
            claimRefs: []
          - type: table
            tableRef: TE003
            claimRefs:
              - CE011
              - CE012
              - CE013
      - number: '5.4'
        title: Arc OT 端点安全代理
        blocks:
          - type: paragraph
            body: >
              Nozomi Arc 最早于 2023 发布，是全球首个专为满足 OT 和 IoT 环境网络安全与运营要求设计的端点安全及网络监控方案。Guardian 监控网络流量，Arc 则直接运行在运营环境中的
              Windows、Mac 和 Linux 端点上，在端点层提供检测、取证能力；自 October 2025 更新后，还提供主动威胁防护。

              October 28, 2025 版本让 Arc 从被动检测走向主动防御。Arc 现在可按运营方风险承受度配置三种模式：Detection Mode（不干扰运行，用于审计和合规监控）、Quarantine
              Mode（阻止恶意文件，同时保留文件用于取证分析）和 Delete Mode（立即删除恶意文件）。这种灵活性契合 OT 运营方各不相同的约束：有些不能承担任何文件删除风险，另一些则需要立即遏制。

              Arc 的威胁防护引擎由 Mandiant Threat Intelligence Expansion Pack 提供 OT 专属威胁情报，内容专门面向工业环境筛选。代理通过 YARA 签名和 STIX
              格式指标检测威胁，用 Sigma 行为规则监控本地事件，跟踪 USB 设备使用，并把用户活动与设备事件关联。不同于传统 IT EPP 和 EDR 工具，Arc
              主要运行在用户空间，尽量少用内核模块，从而降低打断受限操作系统环境中 OT 应用的风险。
            claimRefs: []
          - type: table
            tableRef: TE004
            claimRefs:
