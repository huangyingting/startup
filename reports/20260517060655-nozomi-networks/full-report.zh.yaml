      - number: '4.2'
        title: 融资历史与累计融资
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 自 2013 创立以来通过多轮融资获得资本。公司在 November 2016 至 December 2021 之间向美国证券交易委员会提交了 5 份 Regulation
              D（Form D）豁免发行通知（CIK 0001689366），覆盖种子轮到 Series D 前轮次。这些早期轮次的募资金额未公开披露。

              两个最大且已确认的轮次是 $100M Series D（March 2022，由 Triangle Peak Partners 领投，Honeywell Ventures、Cisco
              Investments、Lux Capital 和 Schneider Electric 参与）以及 $100M Series E（March 2024，同样由 Triangle Peak Partners
              领投，Mitsubishi Electric Corporation 新增战略参与）。两轮合计 $200M。若假设更早轮次贡献 $50M 或更多，外部累计融资估计约
              $250M+——但这一数字未经独立验证，且很可能低估总资本。

              Series D 让 Nozomi 估值约 $1.2B+，达到独角兽地位。2024 的 Series E 让 Mitsubishi Electric 先以财务投资者身份进入，之后再同意全面收购。尚未找到
              Series D 或 Series E 的 Form D 文件，说明这些融资可能采用不同结构，或作为既有注册的修订提交。Mitsubishi Electric 收购于 January 28, 2026
              完成，实际上终止了公司的独立融资路径，也消除了 Series F 或 IPO 规划需求。
