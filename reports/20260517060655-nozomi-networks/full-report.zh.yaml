  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 所处市场有多种标签：运营技术（OT）安全、工业控制系统（ICS）安全、面向关键基础设施的 IoT 安全，以及 Gartner 在 2025/2026
              框架下所称的网络物理系统（CPS）防护平台。这些标签高度重叠。OT 安全覆盖用于保护工业控制系统、SCADA 系统、分布式控制系统（DCS）以及嵌入能源、公用事业、制造、交通和医疗等物理基础设施环境的 IoT
              设备的硬件、软件和服务。CPS 标签进一步扩展到楼宇管理、智慧城市系统和联网医疗设备。


              Nozomi 的主要服务市场是 OT/ICS/CPS 资产可见性与异常检测细分市场，涵盖被动和主动网络监测、设备清单、漏洞管理，以及工业环境威胁检测。与其核心范围相邻但被排除的领域包括：纯 IT
              端点检测、云工作负载安全，以及并非为 OT 协议（Modbus、DNP3、IEC 61850、BACnet、PROFINET、OPC-UA 等）专门设计的通用网络安全方案。


              现状替代品包括人工维护的 OT 资产表、由不熟悉 OT 协议的 IT 厂商提供的被动防火墙日志，以及点状 ICS
              防火墙（Tofino/Hirschmann）。随着监管要求和威胁复杂度提高，人工方式变得不可持续，市场增长正在替代这些不足够的方案。
            claimRefs:
              - CM032
              - CM034
      - number: '2.2'
        title: TAM / SAM / SOM — 多口径测算
        blocks:
          - type: paragraph
            body: >
              多家分析机构从不同定义口径测算 OT 安全市场，预测结果会因范围不同而相差 2-4×：是只看纯 OT 监测，还是把防火墙、端点和托管服务在内的完整 OT/IoT/CPS
              安全栈都算进去。MarketsandMarkets 将全球 OT 安全市场作宽口径定义，纳入工业环境的网络安全、SIEM、漏洞管理、IAM 和数据安全，并预测到 2030 达到 $50.29
              billion，CAGR 16.5%。Precedence Research 口径更宽，预测 2025 的 $27.03 billion 将以 18.25% CAGR 增至 2034 的 $122.22
              billion。两家机构都认可双位数 CAGR，反映所有 OT 密集行业的结构性顺风。


              Nozomi 的主要可服务市场是 Gartner 定义的 CPS 防护平台，覆盖资产发现、异常检测和漏洞管理，是更广义 OT 安全 TAM 的一个子集。基于细分过滤（仅解决方案、平台部署、企业级），2026
              CPS 平台 SAM 估计在 $8-12 billion 区间。由于分析报告中关于细分拆分的公开数据有限，这一估计不确定性很高。Nozomi 以 $100M+ ARR 计，对 $10B SAM 中点的渗透约为
              1%；公司虽已运营 13 年，仍处在早期增长阶段，这与工业 OT 部署的长销售周期和资本密集特征一致。


              北美约占全球 OT 安全支出的 42%。油气是最大单一垂直行业，占市场 22%；制造业增长最快。解决方案（相对于服务）占支出 77%，本地部署在 2024 仍占市场 59%，但云是增长最快的部署模式。
