      - number: '3.2'
        title: 纯粹型 OT/ICS 安全竞争对手
        blocks:
          - type: paragraph
            body: >
              Dragos 由 Robert Lee 与其他拥有直接运营经验的网络安全专业人士于 2016 创立，他们曾调查包括 2015 和 2016 乌克兰电网攻击在内的 ICS 攻击。这一出身让 Dragos 在 OT
              安全从业者和美国政府机构中拥有难以匹敌的可信度。Dragos 主要靠 ICS 威胁情报差异化：跟踪 23+ 个具名 OT 威胁组织，发布「Dragos Year in Review」报告，运营
              Neighborhood Keeper（最大的匿名化 OT 威胁共享社区），并提供 OT-CERT（面向 SMEs 的免费资源）。Dragos Platform 提供 OT
              资产可见性和威胁检测，但历史上更强调情报即服务，而不是平台宽度。Dragos 融资约 $400 million，其中包括 2021 $200M Series D，估值据报道 $1.7
              billion；公司未公开披露收入。


              Claroty（2015 创立，前 IDF Unit 8200）是融资最多的纯粹型 OT 安全竞争对手，累计融资约 $635 million，战略投资方包括 Schneider Electric、Rockwell
              Automation、Bessemer Venture Partners 和 SoftBank。Claroty 的 xDome 平台在云交付的 CPS 资产可见性、异常检测和漏洞管理上直接对标 Nozomi
              Vantage。Claroty 已从工业 OT 扩展到医疗 IoT/IoMT（通过收购 Medigate）和商业楼宇安全（BMS），扩大了 TAM，但也可能稀释其 OT 聚焦。与 Nozomi
              一样，Claroty 在 2025 和 2026 都被 Gartner MQ for CPS Protection Platforms 评为领导者。


              Nozomi 与纯粹型同业的关键竞争差异在于：Nozomi 用少于 Claroty 的资本（$250M vs $635M 融资）做到 $100M+ ARR，说明资本效率更好。被 Mitsubishi
              Electric 收购后，Nozomi 获得分销渠道入口；Dragos 和 Claroty 目前在亚太工业市场没有同等规模的渠道。
