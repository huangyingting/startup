      - number: '5.6'
        title: 集成生态与云分发
        blocks:
          - type: paragraph
            body: >
              Nozomi 平台可接入广泛的企业安全和云基础设施工具生态。May 12, 2026，Nozomi 宣布登陆 Google Cloud Marketplace，客户无需外部基础设施，就能在自己的 Google
              Cloud 租户环境中直接部署 Guardian 和 CMC。Nozomi 还集成 Google Security Operations（Chronicle SIEM 的继任者），借助 Google 的 AI
              能力，对有线和无线 IT、OT、IoT 系统做连续监控。

              平台集成架构通过双向数据流和告警路由，支持 Splunk、IBM QRadar 等主流 SIEM 和 SOAR 平台。企业若运营横跨 IT 与 OT 的统一安全运营中心（SOC），这些集成就是关键。

              Arc 的 OT 专属威胁情报通过 Mandiant Threat Intelligence Expansion Pack 增强——这是与 Google Cloud 旗下 Mandiant
              部门的合作，提供通用威胁情报产品未覆盖的 ICS/OT 指标、攻击者和 TTP。Nozomi 还在 2025 宣布与 NVIDIA（BlueField DPU）、Schneider
              Electric、Hitachi Cyber、Dispel、Xona 建立合作，扩大平台的硬件嵌入和分发能力。
            claimRefs: []
          - type: figure
            figureRef: FE003
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE029
              - CE035
      - number: '5.7'
        title: 标准合规与监管对齐
        blocks:
          - type: paragraph
            body: >
              Nozomi 平台支持围绕主要 OT 网络安全标准和框架生成合规报告：IEC 62443（基于 ISA/IEC 共识的 IACS 安全标准）、NIST Cybersecurity
              Framework（CSF）2.0、NERC CIP（北美电力公用事业关键基础设施）。这些标准要求 OT 运营方保持连续资产可视化、异常监控和事件响应能力——这些能力直接对应 Nozomi 的核心平台。

              ISA/IEC 62443 系列是全球唯一公认、基于共识的工业自动化与控制系统（IACS）网络安全标准。它连接运营与 IT，也连接流程安全与网络安全，因此成为油气、化工、流程制造等行业的主要合规驱动。Nozomi
              的被动监控和风险报告能力帮助运营方证明自己满足 62443 的安全等级要求。

              面向美国联邦和关键基础设施客户，Nozomi 截至 October 2025 已处于 FedRAMP Moderate In Process 状态，可与民用联邦机构推进部署讨论。公司于 April 2022 成为
              CISA Joint Cyber Defense Collaborative（JCDC）的创始合作伙伴，并于 March 2023 进入 DHS Continuous Diagnostics and
              Mitigation（CDM）Approved Products List（APL）；两项都验证了 Nozomi 在国家关键基础设施保护中的角色。

              MITRE ATT&CK for ICS 矩阵提供 OT 专属对手技术框架，Nozomi 用它对齐自身检测覆盖，包括通过 Internet-Accessible
              Device（T0883）初始访问、横向移动、Denial of Control 和 Damage to Property。把检测能力映射到 MITRE ATT&CK for
              ICS，可让安全团队用标准化语言讨论覆盖缺口和威胁建模。
            claimRefs: []
          - type: table
            tableRef: TE006
            claimRefs:
