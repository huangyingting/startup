      - number: '2.5'
        title: 采用约束与市场风险
        blocks:
          - type: paragraph
            body: >
              虽有强监管和威胁顺风，OT 安全采用仍面对持久的结构性约束。


              首要技术障碍是存量部署问题：遗留 ICS 环境使用专有协议、特定厂商硬件和操作系统（常见 Windows XP/Server 2003），无法在不干扰运营的情况下打补丁。被动监测（Nozomi 以
              Guardian 为核心的方法）避免侵入式代理，部分缓解了这一问题，但需要在每个网段物理部署传感器，部署资本开支高。大型公用事业的长采购和集成周期（12-24 个月）限制收入转化速度。


              预算分配很碎：多数大型工业组织把 OT 安全责任拆在历史上各自独立运转的 IT 和 OT 团队之间，形成彼此竞争的审批链。在水务和污水处理、小型制造等低利润率垂直行业，网络安全预算仍很有限，OT
              安全要与运营资本开支争夺稀缺资金。


              市场整合风险正在出现：大型 IT 安全厂商（Cisco、Palo Alto、Microsoft、IBM）正在收购 OT 安全能力，可能在平台层把 Nozomi 的核心分析商品化。遗留 OT
              自动化厂商（Siemens、Honeywell、Schneider Electric）也在把原生安全能力嵌入自身平台，降低新建部署中对第三方叠加层的需求。Nozomi 被 Mitsubishi Electric
              收购，等于把自己嵌入一家工业自动化厂商，而不是继续独立面对竞争整合风险。


              分析师市场规模估计差异很大（MarketsandMarkets：2030 达 $50B；Precedence Research：2034 达 $122B），反映了 OT
              安全边界的真实定义模糊和分析师共识偏低。尽调不应只依赖自上而下的分析师预测，而应通过买方调研独立验证细分层面的支出数据。
