      - number: '6.4'
        title: 客户验证：分析师认可与同行评价
        blocks:
          - type: paragraph
            body: >
              根据 March 9, 2026 Gartner Magic Quadrant 新闻稿，Nozomi Networks 是 CPS Protection Platforms 类别中唯一在最新 Gartner
              Voice of the Customer 报告里获得 Gartner Customers' Choice 标识的供应商。Gartner Peer Insights
              平台提供整个网络物理系统保护平台市场的客户评价，Nozomi 的客户评分促成了这一认可。Customers' Choice 由终端用户评分决定，而不是 Gartner 分析师判断，因此是客户满意度的直接指标。

              PeerSpot 用户评价反复提到几项优势：实时 OT 网络可视化、强健的 AI 入侵检测、部署容易（初始设置通常只需几小时）、可与 SOC 和 SIEM 系统集成，以及能准确识别 OPC
              UA、DNP3、Modbus、Siemens S7 等 OT 协议。客户称该平台「让 OT 环境变得可见，因为多数企业只有检查 IT 环境的手段」——这印证了 Nozomi 在真实部署中的核心价值主张。

              TrustRadius 将 Nozomi Guardian（原 SCADAGuardian）列为工业控制系统和 IoT 安全技术，且已在多个行业部署，为客户声音提供了第二个独立佐证渠道。

              Nozomi 在 Fast Company World's Most Innovative Companies 2025 榜单（March 2025）中位列安全类别第 3 名，并在 Deloitte
              Technology Fast 500（November 2025）中获评北美增长最快公司之一。这些外部排名确认了客户需求增长和组织速度，符合企业客户基础扩张的迹象。
