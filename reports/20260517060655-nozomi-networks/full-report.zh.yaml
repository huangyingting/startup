      - number: '7.3'
        title: 竞争与技术替代风险
        blocks:
          - type: paragraph
            body: >
              OT 安全市场正以更快速度吸引资本充足的竞争者。Nozomi 最直接的竞争对手 Claroty 已融资约 $635M，覆盖类似的垂直行业组合；其平台级 IT/OT 安全融合，与 Nozomi
              定位相近。Dragos 更聚焦 ICS 威胁情报和事件响应——其 2026 Year in Review 展示了深度威胁组织研究能力，包括对三个新威胁行为体的命名归因。Armis 在 Series
              D（January 2020）融资 $200M 并成为独角兽，带来更广泛的 IoT 设备情报，与 Nozomi 的资产管理能力重叠。

              更大的系统性风险，是大型科技公司的网络安全平台进入 OT 安全。Microsoft Defender for IoT（June 2020 以约 $165M 收购 CyberX）嵌入 Microsoft
              Defender for Cloud 和 Microsoft Sentinel 技术栈，让企业客户能以接近零的增量授权成本，把既有 Microsoft 安全投入延伸到 OT 环境。CrowdStrike 和
              Palo Alto Networks 都提供可原生集成到既有安全运营平台的 OT 安全模块。这类捆绑打法威胁到包括 Nozomi 在内的最佳单项 OT 安全供应商，尤其是在成本整合压力高的企业账户中。

              Nozomi 的核心技术护城河——1,000+ 个 OT/ICS 协议解码器、被动感知架构和专用 AI 模型——有防御力，但并非牢不可破。Claroty、Dragos 和 Microsoft 在过去 18
              个月都扩大了协议覆盖。风险在于，技术差异缩窄，而 Nozomi 仍维持价格溢价，从而让价格敏感买方转向替代方案。Gartner 2026 MQ for CPS Protection Platforms 显示多个
              Leaders（Claroty、Nozomi），也确认了竞争趋同的担忧。TXOne Networks（由 Trend Micro 和 Serie Electronics 支持）采取 OT 原生路径，并深度集成
              Trend Micro 既有安装基础，尤其会在 APAC 制造业领域构成风险。
