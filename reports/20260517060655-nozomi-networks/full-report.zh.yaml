      - number: '7.9'
        title: 证据附录
        blocks:
          - type: callout
            title: 最高投资逻辑破裂风险：收购后的供应商中立性
            body: >
              最高严重度的单一风险，来自 Mitsubishi Electric 的 OT 设备制造业务与 Nozomi 必须维持的供应商中立客户信任之间的冲突。如果企业买家——尤其是运行
              Siemens、ABB、Honeywell 或 Rockwell 设备的客户——认为 Nozomi 的监控数据可被 Mitsubishi 访问，或认为 Nozomi 偏向 Mitsubishi OT
              产品，商业定位可能迅速受损。仅靠产品架构无法缓释这项风险；Mitsubishi Electric 管理层必须长期给出合同、法律和沟通层面的承诺。
            calloutType: risk
            claimRefs:
              - CR017
              - CR018
              - CR021
          - type: callout
            title: FedRAMP 授权是受时间闸门约束的收入门槛
            body: >
              美国联邦机构超过简化采购门槛的销售需要 FedRAMP 授权。截至 2025 年 10 月，Nozomi 处于 In Process 状态，但 FedRAMP JAB 审查通常从进入流程起需要 18–24
              个月。任何拖到 2027 年之后的延迟，都会让联邦市场至少再关闭两个财政周期。日本所有权还带来 CFIUS/NDAA 审查维度，可能进一步复杂化或拖慢授权。投资者应把详细的 FedRAMP
              里程碑跟踪列为尽调前置条件。
            calloutType: risk
