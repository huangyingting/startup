      - number: '1.3'
        title: 资本结构、融资与 Mitsubishi Electric 收购
        blocks:
          - type: paragraph
            body: >-
              Nozomi Networks 在被收购前完成了 5 轮外部风险融资。公开确认的最大两轮是 $100M Series D（March 2022）和 $100M Series E（March
              2024）。这些轮次的投资方包括 Triangle Peak Partners（领投）、Honeywell Ventures、Cisco Investments、GGV Capital、Lux
              Capital、Planven Entrepreneur Ventures 和 Mitsubishi Electric（Series E 投资方）。所有轮次累计融资估计约
              $250M+，但公司未公开披露全生命周期总额。Series D 时，市场广泛报道称公司估值约 $1.2 billion+，达到独角兽级别。


              Mitsubishi Electric 收购的战略逻辑建立在双方陈述的几根支柱上：Mitsubishi Electric 拥有超过 100 年 OT 与工业经验，FY2025 收入 $36.8B；Nozomi
              带来快速增长的 AI 驱动网络安全平台；双方合力，希望加速全球关键基础设施的 OT 安全创新。Mitsubishi Electric 最早参与 Nozomi 的 Series E（March
              2024），随后双方在创新和市场推广上合作；最终收购协议于 September 9, 2025 签署，交易于 January 28, 2026 交割。收购价格未公开披露；不过考虑到据报道 $100M+ ARR
              和独角兽估值背景，对价很可能落在 $500M–$1.5B 区间（估计值，未确认）。


              作为子公司，Nozomi 现已被完全控股，但保留运营独立性。公司强调供应商中立，继续与更广泛的网络安全生态合作，包括 Cisco、IBM Security、Google Cloud 以及其他可被视为
              Mitsubishi Electric 母公司 IT 组合竞争对手的伙伴。核心尽调问题是：Mitsubishi Electric 的所有权会如何影响 Nozomi
              与客户和伙伴的关系，尤其是那些与日本工业集团竞争、或受监管要求限制接触日本工业集团的对象。
