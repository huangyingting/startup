      - number: '7.6'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Nozomi 报告 2025 年 ARR 为 $100M+，标志着 OT 网络安全行业历史上首次实现盈亏平衡（公司声称）。但是，收入构成的颗粒度——硬件 vs. SaaS vs.
              专业服务；地理分布；头部客户集中度——并未公开披露。在 Mitsubishi Electric 所有权下，Nozomi 不提交独立财务报表。这种不透明是重大尽调风险，因为外部无法验证 NRR、流失率、CAC
              回本周期和毛利率轨迹。

              公司声称的 ~100% 客户留存率，虽然符合 OT 监控部署的粘性，但尚未独立核验。PeerSpot 客户评价指出，相比替代方案，Nozomi 定价「偏高」，说明即使现有客户得以保留，边际上仍存在价格敏感性。来自
              Microsoft（以接近零边际成本捆绑 OT 安全）和 Claroty（资金充足、产品可比）的竞争压力，会形成下行定价压力，并可能在 3–5 年周期内压缩利润率。

              收入集中风险未知但可以推断：关键基础设施是集中行业，少数 Tier 1 公用事业、油气巨头或制药公司的大合同，可能构成 ARR 的不成比例份额。失去一两个关键账户（例如因为 Mitsubishi
              中立性担忧）可能对收入增长造成实质影响。IBM Cost of a Data Breach 2024 报告记录，单次泄露的平均成本持续上升，为客户维持 OT
              监控提供财务激励，从而支撑留存；但同样的成本压力也可能导致合同价格被重新谈判。

              Mitsubishi 所有权下的 R&D 资金投入大概率稳定，因为收购方明确表示要扩展网络安全能力；但如果 Mitsubishi Electric 面临盈利压力（Mitsubishi 投资者材料披露了
              FY2025 净利润目标），Nozomi 的 R&D 预算可能受到集团节支影响。SEC 网络安全风险管理披露规则（2023 生效）并不直接约束日本母公司的子公司，降低了 Nozomi 收购后治理的监管问责。
            claimRefs: []
      - number: '7.7'
        title: 地缘政治与供应链风险
        blocks:
          - type: paragraph
            body: >
              最重要的地缘政治风险，是美国联邦市场准入与日本公司所有权的交汇。Mitsubishi 收购后，美国联邦采购 Nozomi 产品都会受到更高审查，审查依据包括 CFIUS review precedents 和
              National Defense Authorization Act（NDAA）供应链安全条款；这些条款限制联邦机构在关键基础设施场景中使用某些外资实体的技术。虽然 Mitsubishi Electric
              目前不在受限实体清单上，但风险在于，不断演变的美日贸易政策或具体 NDAA 条款可能使联邦签约复杂化，进而延迟或阻断 FedRAMP 授权。

              Nozomi 客户运营的是关键基础设施资产，正是国家级威胁行为体的主要目标。CISA KEV catalog 数据记录了 ICS 环境中漏洞被主动利用的情况。Dragos 2026 YIR
              指出，具名威胁组织带有具体关键基础设施攻击任务；勒索软件活动已在能源、水务和制造设施造成运营中断——这些都是 Nozomi 的客户行业。如果 Nozomi 监控的设施发生重大泄露，无论 Nozomi
              产品是被绕过还是被误用，声誉影响都可能很大。CISA Stop Ransomware initiative 凸显了 OT 安全供应商客户群所面对的广泛攻击面。

              云基础设施依赖构成供应链集中风险：Nozomi Vantage SaaS 运行在主要超大规模云厂商之上。Google Cloud Marketplace 上架（May 12, 2026）和 Vantage
              的云原生架构，意味着其依赖 GCP、AWS 和 / 或 Azure 的可用性与安全态势。若主要云服务商发生影响 OT 监控可用性的重大宕机或安全事件，客户检测能力会直接受损。HHS HIPAA 安全指南和 FDA
              医疗设备网络安全政策都要求医疗健康客户维持连续监控正常运行；如果云基础设施故障造成监控缺口，Nozomi 将面临合同 SLA 风险。

              Guardian 硬件传感器的更广泛供应链——部署在客户环境中的物理设备——涉及半导体和硬件组件供应商。COVID
              后供应链中断以及美中半导体出口管制，可能影响传感器组件可得性和交期，尤其是在制造依赖东亚供应链、且 Mitsubishi Electric 集团结构可能进一步集中这些供应链的情况下。
            claimRefs: []
      - number: '7.8'
        title: 缓解措施、监测指标与终止标准
        blocks:
          - type: paragraph
            body: >
              Nozomi 有几项正在发挥作用的缓释措施，可降低已识别风险的严重性。JCDC 创始合作伙伴关系（2022 年 4 月）让公司更早拿到 CISA 威胁情报，增强检测覆盖，也积累监管关系资本。FedRAMP In
              Process 认定（2025 年 10 月）说明公司在持续投入合规；这个流程本身既是风险（时间表不确定），也是缓释项（承诺已经体现）。Gartner Customers' Choice 2025
              认可中，Nozomi 是 CPS 类别唯一入选厂商，为客户满意度提供了独立验证，部分对冲了 PeerSpot 上的定价顾虑。

              Vantage IQ 的私有 LLM 架构（2026 年 1 月）用客户自己的 OT 数据训练，而不是共用模型，这是对多租户 AI 数据暴露风险的架构级缓释。Arc 端点代理（2025 年 10 月）支持
              YARA、STIX 和 Sigma，部分补上了被动监控在 Windows 主机加密流量上的盲点。Guardian Air 覆盖 cellular、BLE、Zigbee、LoRaWAN 和 Z-Wave
              等协议，说明公司在无线风险面上有技术投入。

              需要监控的投资逻辑恶化信号包括：（1）FedRAMP 授权被拒或无限期推迟；（2）两家或以上具名竞争对手在 Fortune 500 OT 安全 RFP 中替代 Nozomi，并由新闻稿记录；（3）收购交割后 24
              个月内联合创始人离职；（4）Mitsubishi Electric 公开表态限制 Nozomi 监控与 Mitsubishi 存在竞争关系的 OT 设备；（5）Nozomi
              监控的设施发生公开披露的入侵，且部分归因于检测缺口；（6）从公开声明推断，ARR 同比增速跌破 10%；（7）Nozomi 核心产品出现 CVSS 9+ 严重漏洞，进入 CISA KEV 目录且未能当日修补。

              需要立即重估的投资逻辑破裂触发项包括：（a）Mitsubishi Electric 终止 Nozomi 独立商业化路径，把它吸收进捆绑产品，独立品牌消失；（b）美国出现重大监管行动（NDAA 排除、CFIUS
              命令），禁止 Nozomi 向联邦销售；（c）专利挑战成功，核心 OT 异常检测 IP 被判无效；或（d）OT 安全品类坍缩，被一两家超大规模安全平台（Microsoft Defender、CrowdStrike
              Falcon）吸收，且其定价让非关键行业无法支撑独立 OT 安全产品的经济性。
