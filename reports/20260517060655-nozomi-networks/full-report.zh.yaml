      - number: '6.3'
        title: 客户采购的监管驱动
        blocks:
          - type: paragraph
            body: >
              OT 安全采购越来越由监管要求推动，而不是由可自由裁量的支出决定。Nozomi 核心客户垂直行业的监管环境，形成反复出现、由合规触发的采购压力，支撑更可预测的需求。

              医疗健康客户——医院、医疗系统和医疗设备制造商——需要遵守 HIPAA（Health Insurance Portability and Accountability Act）对患者数据保护的要求；FDA 的
              December 2022 omnibus 和 June 2025 医疗设备网络安全最终指南，则对制造商施加具体的上市前和上市后网络安全义务。OT
              系统（联网医疗设备、影像系统、输液泵）越来越纳入网络风险范围，Nozomi 的 OT 可视化平台正好补上直接合规缺口。

              美国关键基础设施运营方受到 CISA 跨行业网络安全指南和 National Cybersecurity Strategy 影响，行业预期其具备连续监控和异常检测能力。Nozomi 自 April 2022
              起就是 CISA JCDC（Joint Cyber Defense Collaborative）创始合作伙伴；JCDC 推动公私部门信息共享，也把 Nozomi 定位为联邦和关键基础设施客户可信的 OT
              安全伙伴。

              亚洲市场中，Singapore's Cybersecurity Act 和 Cyber Security Agency's Operational Technology Cybersecurity
              Masterplan 2024（OT-MP 2024）为新加坡关键资讯基础设施中的 OT 网络安全设定监管预期。Nozomi 于 January 14, 2026 在新加坡设立 Asia Pacific and
              Japan headquarters，直接称与 CSA 合作是驱动因素之一，并指出 APAC 区域已有接近 100 家客户。
