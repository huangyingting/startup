              - CR001
              - CR010
              - CR035
          - type: callout
            title: OT 威胁升级同时扩大市场，也抬高产品门槛
            body: >
              Dragos 2026 YIR 记录了三个新的 OT 威胁组织，攻击者已经开始绘制工业控制回路。升级明显利好 OT 安全需求，但也意味着 Nozomi 的检测能力要面对更高阶的对手。如果 Nozomi
              监控的设施发生重大入侵，并证明检测失效，声誉损失可能超过市场扩张带来的收益。持续投资威胁覆盖是战略必需项。
