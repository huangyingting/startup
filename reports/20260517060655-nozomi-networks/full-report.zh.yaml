      - number: '2.4'
        title: 监管顺风与增长驱动
        blocks:
          - type: paragraph
            body: >
              全球范围内，监管强制要求是拉动 OT 安全支出的最强结构性增长驱动。


              在欧盟，NIS2 Directive（December 2022，通过 2025-2026 分阶段执行）把强制性网络安全要求扩展到 18 个行业类别，包括能源、交通、水务、医疗、制造和数字基础设施——这些都是主要
              OT 安全垂直行业。NIS2 施加事件报告义务和相称的技术风险措施，直接为此前不在监管范围内的运营商创造由合规驱动的 OT 安全预算。


              在美国，CISA 的 Cross-Sector Cybersecurity Performance Goals 2.0 将 IT 和 OT 安全实践对齐到 NIST CSF 2.0。NERC CIP
              标准对大电力系统运营商提出强制保护要求。2021 Colonial Pipeline 勒索攻击后，TSA 对管道运营商发布网络安全指令。美国国防部 CMMC 框架要求供应链网络安全。CISA 指出，存量 OT
              部署——在遗留 ICS 上叠加现代 IoT / 自动化——会形成复合挑战，因为新的连接会制造新的攻击面。


              除了监管，真实事件频率也在拉动需求：Dragos 记录到 2025 新增 3 个针对 OT 的威胁组织，攻击者主动绘制 OT 环境中的控制回路，勒索软件造成广泛运营中断。Censys 在 2025 报告
              145,000+ 个暴露在互联网的 ICS，其中 48,000 个在美国——这是可衡量且持续存在的攻击面，说明意识提升尚未转化为充分修复。IBM/Ponemon 将 2025 全球平均数据泄露成本定为
              $4.4M，OT 事件通常还会额外承担安全和监管责任成本。
