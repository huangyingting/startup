      - number: '6.2'
        title: 垂直市场渗透主张
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 对垂直市场渗透提出了具体说法。虽未经审计，这些说法仍能提供安装基础质量和集中度的背景。公司称已部署于全球前 10 大油气公司中的 5 家、前 10 大制药公司中的 7 家、前 10
              大公用事业公司中的 7 家，以及前 10 大采矿公司中的 4 家。这些指标由公司陈述，且未说明如何界定「前 10 大」公司。

              制药行业渗透说法（前 10 大制药公司中的 7 家）尤其值得注意，因为制药制造受 FDA 21 CFR Part 11 和 Good Manufacturing
              Practice（GMP）监管，而这些规则越来越多纳入网络安全要求。FDA 在 2023 和 2025 更新的医疗设备与制造网络安全指南，提高了该垂直行业投资 OT 安全的紧迫性。Nozomi
              能展示深度制药渗透，说明它已较好地调整产品和合规报告，以满足生命科学监管要求。

              油气和公用事业领域中，NERC CIP（North American Electric Reliability Corporation Critical Infrastructure Protection）和
              DOE 网络安全战略要求，要求电力公用事业为大电力系统资产落实连续监控、漏洞管理和事件响应能力。这些监管要求是能源垂直行业形成 OT 安全预算的主要驱动，也验证了 Nozomi 在该行业的深度渗透。DOE 的
              2024 Cybersecurity Strategy 明确瞄准提升电网网络韧性，直接契合 Nozomi 的价值主张。
