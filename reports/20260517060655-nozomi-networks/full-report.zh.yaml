      - number: '7.5'
        title: 产品安全与技术风险
        blocks:
          - type: paragraph
            body: >
              Nozomi 自身产品也会成为对手目标，攻击者可能试图让 OT 安全监控失明。在 NVD NIST CVE 数据库中搜索「nozomi」会返回 Nozomi Networks
              产品已公开漏洞的记录。虽然截至研究日期，KEV catalog 中未标记 Nozomi 产品的关键（CVSS 9+）漏洞，但安全产品存在任何 CVE 都是一种对抗风险：被攻陷的 Guardian
              传感器可能制造盲区，而不是提供可视化。CISA Stop Ransomware initiative 和 KEV catalog 表明，安全工具正越来越多地被高级威胁行为体盯上。

              Vantage IQ 于 January 15, 2026 作为全球首个私有 OT/IoT AI 安全助手发布，带来新的攻击面。系统使用基于组织自身 OT 数据训练的私有 LLM。风险包括：（1）提示注入攻击导致
              AI 生成误导性分诊建议；（2）多租户 Vantage 云部署中租户隔离失败，可能把一个客户的 OT 数据暴露给另一个客户；（3）OT
              环境演化超出训练窗口后出现模型漂移；（4）对抗性规避攻击操纵训练数据，降低检测准确性。这些都是 AI 安全的活跃研究领域，截至研究日期，Nozomi 尚未发布 Vantage IQ 的正式威胁建模文档。

              被动监控架构虽然降低部署风险，但存在内在检测局限：完全加密的 OT 通信（例如 TLS 封装的 MQTT，或使用证书加密的 OPC UA）没有私钥就无法解密和检查。随着 OT
              供应商安全路线图越来越多纳入加密通信，被动监控工具可用的检测面会收窄。Nozomi 的 Arc 端点代理（October 2025）通过启用主机上检测部分缓解这一问题，但 Arc 需要安装在基于 Windows
              的工程工作站上，而不是安装在 PLC、RTU 或高价值的传统嵌入式控制器上。

              Guardian Air 覆盖 800MHz–5895MHz 的无线监控，会暴露于 RF 干扰和欺骗：如果攻击者针对监控基础设施本身发起 RF 干扰，可能制造监控黑窗。高密度无线部署的 OT 环境（例如使用
              WirelessHART 或 900MHz ISA100 的智能工厂）可能遇到传感器干扰。DOT（transportation.gov）和
              DOE（energy.gov）都运营高度依赖无线传感器网络的关键基础设施领域，放大了这一风险的适用性。
