chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与产品
        blocks:
          - type: paragraph
            body: >-
              Nozomi Networks 自称是 OT、IoT 和网络物理系统（CPS）安全的全球领导者。公司使命是让关键基础设施和运营技术具备网络韧性。其平台把网络与端点可见性、威胁检测和 AI
              驱动分析整合在一起，帮助工业组织管理横跨 OT、IoT 和 IT 环境的网络风险。公司由 Andrea Carcano 和 Moreno Carullo 于 2013 在瑞士 Lugano/Mendrisio
              创立；两人是深耕 SCADA 安全的学者。Edgard Capdevielle 后来加入担任总裁兼 CEO，负责商业化扩张，并非联合创始人。


              核心产品组合由三部分组成。Guardian 是公司的旗舰被动网络传感器，面向 OT 和 IoT 环境，在不干扰关键流程的情况下提供资产清单、网络监测、深度包检测（DPI）和 AI 驱动异常检测。Vantage
              是云端 SaaS 管理平台，把企业级分布式 OT/IoT 部署的风险管理和安全可见性集中起来。Arc 是面向运营环境中 Windows、Linux 和 macOS 的端点传感器，公司称其是行业首个可在 OT
              中安全自动化威胁响应的方案。Vantage IQ 于 January 15, 2026 发布，被描述为面向 OT/IoT 安全团队、全球首个私有且由公司训练的 AI 助手。Guardian Air（无线传感器）和
              Remote Collector（面向远程 / 物理隔离站点）补齐了产品线。


              Nozomi 在多项分析师评估中主张行业领先。公司在 2025 和 2026 连续两年入选 Gartner Magic Quadrant for CPS Protection Platforms 领导者；也在
              Forrester Wave for IoT Security Solutions Q3 2025 中入选领导者。December 2025，Gartner 将 Nozomi 评为「网络物理系统安全 AI
              领域最值得追赶的公司」。基于同行评审，公司也是 Gartner CPS Protection Platforms 客户之声中唯一获认可的客户之选。
