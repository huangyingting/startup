      - number: '4.6'
        title: 成本结构与运营模式
        blocks:
          - type: paragraph
            body: >
              Nozomi Networks 采用双地域结构：商业总部位于 San Francisco, CA（575 Market Street, Suite 3650），工程和 R&D 位于瑞士
              Mendrisio。瑞士工程基地让公司触达欧洲工程人才，薪酬水平可能低于硅谷，这有助于解释盈亏平衡里程碑所体现的成本效率。

              2025 员工数增长 24%，说明 Nozomi 同时在销售、客户成功和产品开发上扩张。2025 宣布与 Schneider Electric、Hitachi Cyber、NVIDIA、Dispel 和 Xona
              的新合作，代表渠道和技术扩展；相对于 ARR 增长，这些合作可以降低直接销售成本。Nozomi 的收入主要通过全球系统集成商和 MSSP 伙伴生态交付，这会压缩直接销售成本，但代价是渠道利润分成。

              January 2026 在新加坡设立亚太及日本区域总部，并在该地区拥有约 100 家客户，代表有意为地理扩张投入资本开支。新加坡总部成本（办公室、区域员工、监管合规）会增加运营费用，部分由增长中的亚太
              收入基础抵消。考虑到 Mitsubishi 在该地区工业部门的深厚关系，Mitsubishi Electric 收购预计将加速亚太增长。

              毛利率结构未公开披露，但硬件（Guardian 传感器）、SaaS（Vantage）、端点订阅（Arc）和专业服务并存，会形成工业网络安全同业常见的混合毛利结构。随着 SaaS
              和订阅收入在收入组合中占比提高，毛利率应随时间改善。
