      - number: '1.2'
        title: 领导层、治理与关键人物依赖
        blocks:
          - type: paragraph
            body: >-
              Nozomi Networks 的创始和高管核心由三人构成。Andrea Carcano（联合创始人兼 CPO）拥有 Università degli Studi dell'Insubria
              计算机科学博士学位，研究方向为 ICS 入侵检测；其硕士研究涉及 SCADA 恶意软件。加入 Nozomi 前，他曾在意大利跨国油气公司 Eni 担任高级安全工程师，直接接触工业网络。Moreno
              Carullo（联合创始人兼 CTO）拥有人工智能博士学位并负责工程团队。Edgard Capdevielle（总裁兼 CEO）拥有 UC Berkeley MBA 和 Vanderbilt University
              计算机科学与电气工程学士学位；此前曾任 Imperva 产品管理与营销副总裁，并在 Data Domain 和 EMC 担任高管。


              收购后，Nozomi Networks 作为 Mitsubishi Electric Corporation
              的独立子公司运营。公司新闻稿强调，品牌、领导团队、运营、办公室和联系窗口保持不变。不过，最终所有权和治理已转向 Mitsubishi Electric（Tokyo: 6503），这是一家年收入 $36.8
              billion 的全球工业集团。公司于 November 2022 任命 Jared Waterman 为首席财务官；March 2024 任命 Kevin Isaac 为首席营收官；June 2023 任命
              Michael Plante 为首席营销官。


              关键人物风险不低。创始二人组 Carcano 和 Carullo 仍是产品愿景和技术可信度的核心。CEO Capdevielle 则是客户关系和商业化执行的核心。Mitsubishi Electric
              入主后，治理责任现在要与日本母公司共享，可能带来文化和运营整合挑战；公开资料尚无法观察这些影响。公司 October 2025 关于「Protecting Nozomi Customer
              Interests」的更新，说明客户曾对收购后的连续性提出担忧，公司也公开做了回应。
