      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Nozomi 的监管风险画像复杂且还在扩大。公司服务全球关键基础设施行业，每个行业都有自己的网络安全合规体系。在美国，NERC CIP 标准管理大电力系统网络安全，要求部署 Nozomi
              产品的公用事业持续验证自身满足合规要求。FedRAMP Moderate In Process 标识（October 2025）是美国联邦机构部署的重要关口——FedRAMP 授权通常需要在 In Process
              标识后 12–24 个月完成，意味着 Nozomi 可能要到 late 2026 或 2027 才能取得完整 FedRAMP Moderate 授权，在此窗口期限制其赢得新的美国联邦合同。

              EU NIS2 Directive（Directive 2022/2555）自 October 2024 生效，对欧盟成员国 18 个行业的关键基础设施运营方施加强制网络安全义务，罚款最高可达 €10M
              或全球年收入 2%。Nozomi 的欧盟客户必须证明其满足 NIS2 事件报告和风险管理要求，Nozomi 产品也必须支撑这些能力。NIS2 跨境协调的复杂性，会给欧盟市场增长带来部署摩擦风险。

              SEC 2023 网络安全披露规则（December 2023 生效）要求上市公司在四个工作日内通过 Form 8-K 披露重大网络安全事件。Nozomi 现在虽是 Mitsubishi Electric
              旗下私营公司，但其上市客户——能源、制药、制造企业——面临即时披露义务，而这些义务部分依赖 Nozomi 的检测和分诊速度。任何导致客户延迟披露的检测失败，都可能给 Nozomi 带来法律责任暴露。

              法律和 IP 方面，Nozomi Networks Sagl 在 OT 异常检测、自动签名生成、设备伪装检测领域拥有活跃专利组合（patents.justia.com 显示已授权专利 12341787 于
              June 2025 授权，12238130 的发明人包括 Carcano、Carullo 和 Kleymenov）。IP
              资产是竞争护城河，但如果资金充足的竞争对手（或专利主张实体）挑战关键权利要求，也会产生专利主张风险。截至研究日期，未发现涉及 Nozomi Networks
              的公开诉讼；但这是一个开放尽调事项，需要直接核验。Mitsubishi 收购后，美国 Export Administration Regulations（EAR）和日本 Foreign Exchange and
              Foreign Trade Act（FEFTA）下的出口管制合规增加了运营复杂度。

              FTC 数据安全执法框架（16 CFR Part 314 Safeguards Rule）和 HIPAA Security Rule 适用于部署医疗设备 IoT 安全的 Nozomi
              医疗健康客户。若医疗客户发生可追溯到 Nozomi 产品覆盖缺口的合规失败，Nozomi 可能面临合同责任。
