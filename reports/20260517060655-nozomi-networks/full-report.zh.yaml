      - number: '3.4'
        title: Nozomi 的竞争护城河与定位
        blocks:
          - type: paragraph
            body: >
              Nozomi 的竞争护城河靠四个要素相互加固：（1）OT 协议深度——Guardian 传感器支持 300+ 个 ICS 协议；（2）物理部署锁定——Guardian 传感器一旦上架到工厂网络机柜并按客户 OT
              环境调校，切换到竞品就要在可能多达数百个 OT 网段重新安装硬件；（3）13 年在全球最关键工业现场持续部署形成的客户信任（全球前 10 大油气运营商中的 5 家、前 10 大公用事业中的 7 家、前 10
              大制药公司中的 7 家）；（4）分析师与监管认可（Gartner MQ 领导者、Forrester 领导者、CISA JCDC 创始伙伴、DHS CDM APL）。


              Nozomi 的被动监测方法——把 Guardian 作为 OT 网络流量的被动旁路——避免会让工业设备不稳定的主动扫描。这是一个基础产品设计选择，让 Nozomi 有别于试图以主动扫描架构切入 OT 的 IT
              安全平台。Dragos 也采取被动路径；Armis 和 Forescout 使用无代理发现方法，但风险画像不同。


              Mitsubishi Electric 收购创造了一层新的战略护城河：进入 Mitsubishi 全球工业自动化客户基础的分销入口，尤其是在日本 和亚太。没有一家纯粹型 OT
              安全竞争者拥有可比的亚太工业分销。考虑到竞品建立同等伙伴关系需要很长时间，这至少在 3-5 年内是一个可持续竞争优势。


              护城河耐久性的关键风险包括：如果 OT 协议支持变成商品化模块，大型 IT 安全厂商（Palo Alto、CrowdStrike、Microsoft）可能把平台层商品化；Claroty
              若激进投入协议深度，其融资优势很大；以及 AI 原生竞争者出现，凭借更多资本或更好的工业异常检测 AI 模型切入。
