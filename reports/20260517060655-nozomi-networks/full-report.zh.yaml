      - number: '3.3'
        title: 相邻平台与 IT 出身竞争者
        blocks:
          - type: paragraph
            body: >
              Armis（2015 创立）定位为覆盖面最广的网络暴露管理平台，在单一「Armis Centrix」体系下覆盖 OT、IoT、IoMT 和 IT 资产。Armis 服务 3,200+ 家客户，其中每 5 家
              Fortune 500 公司中就有 1 家，是本分析中按客户数计最大的纯粹型安全厂商。不过，Armis 客户群明显偏向 IT 资产管理和医疗 IoMT 场景；其在 Nozomi
              核心工业垂直行业（油气、公用事业、制造）中的 OT/ICS 渗透尚不充分。Armis 融资约 $600 million，估值 $3.4 billion（2021）。CEO Yevgeny Dibrov
              是联合创始人。


              Forescout Technologies（深耕网络访问控制 25+ 年）收购 Vedere Labs 以获得 OT 专用威胁情报，并将其 4D Platform 定位为一体化 IT/OT/IoT/IoMT
              风险管理方案。凭借 3,200+ 家客户和每 5 家 Fortune 500 公司中 1 家的渗透，Forescout 具备强企业分销能力，但其主要认知并不是 ICS 专家。其智能体 AI
              威胁响应，是从被动监测走向主动安全的产品演进。


              Microsoft Defender for IoT（2020 从 CyberX 收购）提供 OT/IoT 被动监测，并接入 Microsoft Sentinel SIEM 和 Microsoft 365
              Defender 生态。Microsoft 的定价模式——对 Azure/M365 企业客户免费或打包——会对大型 Microsoft 企业协议客户中的独立 OT 监测工具造成明显降价压力。不过，Defender
              for IoT 的 OT 协议深度通常被认为弱于专门打造的 OT 平台。


              Cisco Cyber Vision（2019 从 Sentryo 收购）嵌入 Cisco 工业网络硬件，为已在 OT 环境部署 Cisco 交换机和路由器的客户提供 OT 可见性。Cisco 的 OEM
              渠道优势，部分被相较 Nozomi 更有限的协议深度抵消。


              TXOne Networks（Trend Micro + Moxa 合资）走的是另一条路：OT 原生端点防护（Stellar）加 OT 网络分段工具，并用 Sennin CPS Platform
              做企业级编排。TXOne 正从 OT 端点扩展到更宽的 CPS 防护平台，直接向 Nozomi 的核心细分市场收敛。
