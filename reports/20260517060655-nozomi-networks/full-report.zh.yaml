  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户规模与留存
        blocks:
          - type: paragraph
            body: >
              截至 Q4 2025，Nozomi Networks 称其在全球 12,000+ 个活跃安装中监控 115M+ 台 OT 和 IoT 设备——这些数字来自公司在 January 28, 2026
              Mitsubishi Electric 收购完成公告中公开披露的信息。公司同时披露客户留存率约为 100%，意味着已部署客户群的年流失率接近零。这些规模说法来自公司，尚未独立核验；作为私营公司，Nozomi
              不向监管机构提交财务报表，外部无法据此交叉核验安装基数。

              根据 March 2026 Gartner Magic Quadrant 新闻稿，Nozomi 平台服务六大洲客户。客户集中在能源、公用事业、油气、制药、采矿、政府等关键基础设施行业。企业级部署（200+
              个传感器、Fortune Global 500 客户）是增长中的细分市场，Vantage 云平台的无限传感器规模和 AI 驱动集中管理使其可行。

              客户留存率达到或接近 100%——如果得到证实——意味着净留存率（NRR）远高于 100%，尤其考虑到公司 2025 年员工数增长 24%，并进入新地区。强 NRR 是平台粘性的关键指标：Guardian
              传感器一旦在 OT 网络中规模化部署，平台沉淀的数据和运营学习会形成有意义的切换成本。
