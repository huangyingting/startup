      - - 整合扰动
        - 收购后 Nozomi 销售团队流失和交易关闭率
        - '>20% 高级销售人员流失，或 ARR 增长连续 2 个季度 <10%'
        - 将乐观权重下调至 5%；转向基准 / 悲观投资逻辑
      - - 竞争替代
        - Gartner MQ 位置；来自 PeerSpot / TrustRadius 的客户切换数据
        - Gartner MQ 降至挑战者；NPS 下降 >15 分
        - 标记悲观情景；跟踪 Palo Alto XSIAM-OT 在关键基础设施中的客户赢单
      - - FedRAMP 延迟
        - CISA FedRAMP Marketplace 中 Nozomi Vantage 的挂牌状态
        - 到 Q4 2027 仍未获授权
        - 将联邦细分 TAM 下调 $40M；将乐观情景 ARR 下调 -$20M
      - - 监管放松
        - NERC CIP、NIS2、TSA 指令的执法行动和罚款
        - 所有主要司法辖区连续 >12 个月零罚款
        - 下调市场顺风评分；施加 1 至 2x 倍数压缩
      - - Mitsubishi 剥离信号
        - Mitsubishi Electric 战略评估公告和业务分部变化
        - Nozomi 被划出安全分部，或在财务报表中减记
        - 全面重置情景；用已披露财务数据更新 DCF
  - id: TV006
    title: 最终尽调事项
    description: >-
      Outstanding diligence items required to convert investment thesis from estimated to confirmed, ordered by
      materiality.
    notes: 尽调优先级反映截至 2026 年 5 月的分析师判断；Mitsubishi IR 披露后可能解决。
    columns:
      - 尽调事项
      - 优先级
      - 数据来源
      - 解决路径
    rows:
      - - 确认 FY2024 和 FY2025 经审计 ARR 与 NRR
        - 关键
        - Mitsubishi Electric 经审计合并账目
        - 向 Mitsubishi IR 索取；查看 FY2026 业绩是否披露分部数据
      - - 披露的收购对价（交易价格）
        - 关键
        - Mitsubishi Electric M&A 文件或监管披露
        - 查看 Mitsubishi FY2026 年报；日本 FSA（EDINET）文件
      - - 交割后股权结构表和优先权瀑布
        - 高
        - Nozomi 董事会材料和股东名册
        - EDGAR Form D 修订；直接询问投资人
      - - 客户 ARR 集中度（前 10 大账户占 ARR 的比例）
        - 高
        - Nozomi 内部 CRM 数据
        - 交易尽调中索取；用 PeerSpot 行业分布做代理
      - - CISA Marketplace 给出的 FedRAMP 授权时间表
        - 中
        - CISA FedRAMP Marketplace（公开）
        - 跟踪 fedramp.gov 挂牌；确认 In Process 与已授权状态
      - - Dragos 和 Claroty 2025 ARR，用于竞争校准
        - 中
        - Pitchbook / 分析师简报 / SEC Forms D
        - Pitchbook 付费数据；Dragos / Claroty 融资披露
      - - 收购后 NPS 和续约率数据
        - 中
        - PeerSpot 与 TrustRadius 评论趋势；Gartner Peer Insights 2026
        - 跟踪公开评论平台；向渠道合作伙伴索取
      - - Nozomi 毛利率拆分（硬件 vs. 软件 vs. 服务）
        - 高
        - Nozomi P&L；可比 SaaS 基准
        - 要求放入 M&A 数据室；用 Battery Ventures SaaS 基准估计
