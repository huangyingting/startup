  - id: S-M-04
    title: Regulatory Tailwinds and Growth Drivers
    body: |
      Regulatory mandates are the single most powerful structural growth driver for OT security spending globally.
      In the EU, the NIS2 Directive (December 2022, phased enforcement through 2025-2026) expanded mandatory
      cybersecurity requirements to 18 sector categories including energy, transport, water, health, manufacturing,
      and digital infrastructure — all major OT security verticals. NIS2 imposes incident reporting obligations and
      proportionate technical risk measures, directly creating compliance-driven OT security budgets for operators
      previously outside regulatory scope.

      In the United States, CISA's Cross-Sector Cybersecurity Performance Goals 2.0 align IT and OT security
      practices under NIST CSF 2.0. NERC CIP standards impose mandatory protections on bulk electric system
      operators. TSA has issued cybersecurity directives for pipeline operators following the 2021 Colonial Pipeline
      ransomware attack. The Department of Defense CMMC framework mandates supply chain cybersecurity.
      CISA notes that brownfield OT deployments — layering modern IoT/automation onto legacy ICS — represent
      a compounding challenge as new connectivity creates new attack surfaces.

      Beyond regulation, demand is driven by real incident frequency: Dragos documented three new OT-targeting
      threat groups in 2025, adversaries actively mapping control loops in OT environments, and ransomware
      causing widespread operational disruptions. Censys reported 145,000+ internet-exposed ICS in 2025,
      including 48,000 in the US — a measurable, persistent attack surface that shows awareness has not
      translated into adequate remediation. IBM/Ponemon put the average breach cost at $4.4M globally in 2025,
      with OT incidents often carrying additional safety and regulatory liability costs.
