  topStrengths:
    - >-
      BMS has provided unusually strong public proof for a private techbio through upfront cash, milestone conversion,
      extension funding, and additional target nominations.
    - >-
      Public materials cite roughly $800M of capital and about $150M of partnership revenue, indicating more financial
      and commercial validation than a typical preclinical platform story.
    - >-
      The platform-plus-pipeline model gives insitro multiple ways to create value if CTRO-1013 and future internal
      assets reach the clinic while partnerships continue to expand.
    - >-
      Governance and talent additions such as Amy Abernethy and Joe Hand suggest a company trying to mature beyond an
      early narrative-stage startup posture.
  topRisks:
    - >-
      Current price, cap table, liquidation preferences, and latest financing terms are not public, so entry discipline
      cannot be judged directly from public evidence.
    - >-
      Internal asset value is still preclinical: CTRO-1013 is in IND-enabling / first-in-human preparation rather than
      human proof.
    - >-
      Revenue, current cash, and burn remain too opaque for a reliable revenue-multiple or runway-led valuation model,
      and public trackers conflict sharply.
    - >-
      Public AI-techbio comparables sit mostly in a $0.5B-$2.5B band, which constrains how much premium can be justified
      without stronger private proof.
    - >-
      AI validation, security, and regulatory-readiness materials remain private even though those artifacts will matter
      for both partner confidence and later-stage financing.
