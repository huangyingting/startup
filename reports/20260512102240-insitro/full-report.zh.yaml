      - number: '4.2'
        title: GTM 与销售效率代理指标：企业级药企账户和先落地再扩张动作
        blocks:
          - type: paragraph
            body: >-
              insitro 的市场进入动作更像面向大型药企的战略企业业务发展，而不是广泛软件分销。每份披露协议都是定制的、权利很重，并围绕治疗项目设计，而不是围绕订阅设计。BMS 关系尤其有启发性：2020
              年发现合作、2024 年里程碑转化、2025 年 ChemML 延展，以及 2026 年新增靶点。这一串动作像先落地再扩张销售：先靠科学进展赚到信任，再通过后续工作变现。KPMG 和 McKinsey 都把药企
              AI 采用描述为重证据、重合作，这与 insitro 的公开姿态一致：它是战略发现能力，而不是通用 AI
              工具。由于没有公开来源披露获客成本、胜率或回本周期，销售效率只能用少数标杆账户随时间加深的能力来代理。公开证据说明 BMS 已经扩展；但还不能证明 insitro
              拥有广泛、可复制、多客户商业引擎，且漏斗效率可衡量。
