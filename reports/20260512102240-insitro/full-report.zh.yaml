  - id: TV005
    slug: thesis-break-and-kill-triggers-table
    title: 投资逻辑破裂与终止触发因素表
    description: >-
      Monitorable triggers that would either break the insitro investment thesis or force a materially lower valuation
      stance.
    columns:
      - 触发因素
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 操作含义
    rows:
      - - 临床时间表明显后移
        - 到 2027 年底仍无 IND 或首次人体试验进展
        - 压低自有资产期权价值，并推高融资压力
        - 转向悲观情景 / 放弃，除非价格大幅重置
      - - 再次重大裁员
        - 关键职能再次出现实质性裁员或明显冻结招聘
        - 说明现金跑道或执行能力弱于假设
        - 提高下行情景权重，并质疑能否跑到下一证明点
      - - 合作伙伴动能停滞
        - BMS / Lilly 没有新增扩展，合作伙伴明确降级优先级，或不续约
        - 削弱最强的外部验证支柱
        - 提高集中度折扣，并下调基准情景区间
      - - AI / 安全尽调不过关
        - 管理层拿不出验证、治理或安全材料
        - 监管和企业级就绪风险仍悬而未决
        - 视为溢价定价的硬性阻断项
      - - 价格或条款变得惩罚性
        - 轮次估值高于约 $3B，或附带沉重的参与分配优先权 / 反稀释保护
        - 安全边际被吃掉
        - 放弃，除非私下证据显著强于公开证据
      - - 现金跑道短于预期
        - 现有现金无法稳妥撑到下一证明点
        - 抬高被迫融资和稀释风险
        - 立即按悲观情景重切估值
    notes: 这些触发因素之所以入选，是因为尽调、管理层更新或后续披露可以核验它们，而不是只能从叙事语气推断。
    claimRefs:
      - CV030
      - CV035
      - CV036
      - CV043
      - CV044
  - id: TV006
    slug: final-diligence-asks-table
    title: 最终尽调清单表
    description: >-
      Missing evidence that would most directly move insitro from an interesting narrative to a priceable private
      opportunity.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 责任方 / 尽调路径
    rows:
      - - 股权结构表与优先权
        - 当前完全稀释股本和优先股权利
        - 决定名义上行空间是否真的归新投资人所有
        - 索取董事会材料、股权结构表和瀑布分析
      - - 现金、烧钱速度和现金跑道
        - 当前现金余额、月度烧钱速度和下行情景现金跑道
        - 决定下一轮融资是被迫还是可选
        - 索取财务模型和证明点预算
      - - 最近定价轮或老股信号
        - 2021 年后任何定价交易、老股标记或 409A 更新
        - 用真实入场价取代过时轮次叙事
        - 索取融资历史和估值备忘录
      - - 合作伙伴合同经济性
        - 续约、排他性、数据权利、成果所有权和收入确认细节
        - 区分可持续经济性与里程碑表象
        - 审阅 BMS、Lilly 以及当前任何涉及 Gilead 的协议
      - - IND 与 AI 验证路径
        - 监管沟通、IND 时间表和 AI 验证包
        - 决定平台价值能否转化为疗法价值上行的核心因素
        - 索取开发与监管尽调材料包
      - - 安全与质量状态
        - 审计证据、认证、事件历史和企业级控制
        - 影响合作伙伴信任、投资人尽调转化和退出就绪度
        - 索取安全 / 质量尽调资料室材料
    notes: 这些尽调问题刻意按决策杠杆筛选：每一项都可能实质性移动价格、风险评级或推荐结论。
    claimRefs:
      - CV003
      - CV009
      - CV036
      - CV037
      - CV043
      - CV044
