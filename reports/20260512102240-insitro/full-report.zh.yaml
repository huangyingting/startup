      - number: '1.5'
        title: 反向信号与未决尽调缺口
        blocks:
          - type: paragraph
            body: >-
              公开来源中最清晰的反向信号是 2025 年裁员。BioPharma Dive 报道 insitro 裁员 22%，剩余约 230
              名员工，并明确把此举与临床准备和更艰难的融资环境相连。这个事实很重要，因为当前追踪器页面仍给出差异很大的员工数、融资总额和估值估计，公司快照没有表面叙事那么精确。收入质量也有同样模糊性：低质量追踪器发布收入估计，但没有经过审阅的公开来源给出经审计的当前收入构成或资产负债表桥接。合起来看，反向图景不是
              insitro
              缺乏技术野心或合作伙伴验证；问题在于，公开尽调记录在投资人最需要精确度的地方很薄。当前估值、客户集中度、债务或老股交易历史、以及精确当前运营规模都仍未解决，后续章节应把这些视为开放的承销问题，而不是既定事实。
