  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 工作流语境下的产品定义：先是发现系统，其次才是产品 SKU
        blocks:
          - type: paragraph
            body: >-
              公开材料一贯把 insitro
              描述得不像软件供应商，更像工业化发现系统。公司从多模态人群队列和临床数据出发，加入内部生成的细胞和扰动数据，再用机器学习推导关于疾病生物学的因果假设。产出随后被推入第二层治疗设计，而不是停在靶点排序。这很重要，因为它澄清了客户视角下「产品」到底是什么：对药企合作伙伴而言，它是一套能从生物学发现推进到优化干预设计的工作流；对数据合作伙伴而言，它可以是向量嵌入搜索或共同开发的基础模型等特定部署工具；对
              insitro 内部而言，它是产出保留管线资产的操作系统。没有公开定价、自助 API 界面或打包软件文档，进一步说明其公开产品表面以工作流为中心、按合作定制，而不是通用企业 SaaS 平台。
