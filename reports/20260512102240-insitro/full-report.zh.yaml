      - number: '5.2'
        title: 模块图谱与运营架构：从因果生物学到模态感知设计
        blocks:
          - type: paragraph
            body: >-
              insitro 的架构在公开资料中可读成一个分层系统。在发现端，Virtual Human 被描述为因果生物学引擎；ClinML 和 CellML 创建表型与细胞证据，让这张因果图可执行。POSH
              位于细胞扰动层，是一种高内涵筛选机制；它在规模化时保留表型深度，而不是把一切压缩成低维读数。下游，TherML 和 ChemML
              把生物学洞察转成干预设计，主动学习循环直接连接自动化实验室。结果不是一堆模型，而是管线形状的运营模式：发现疾病结构，识别杠杆点，选择模态，生成化合物或寡核苷酸候选，并用实验反馈迭代。公开 GitHub 资产和
              cp-posh 资源让这套架构的切片变得具体；但完整栈仍部分不透明，因为只有面向研究的片段开放，最有价值的数据集、内部模型和运营指标仍是私有的。
