      - number: '2.2'
        title: 规模测算视角：AI 市场预测、研发预算与疾病负担需求
        blocks:
          - type: paragraph
            body: >-
              公开规模数据存在，但无法整齐对齐成一个可承销 TAM。药企 AI 和药物发现 AI 的分析师页面方向上看多，预测从当前低个位数十亿美元，到 2030
              年代初的一百多亿美元中段，甚至二百多亿美元中段。但这些估计混合了不同类别边界：有的纳入广义药企 AI 工作流，有的隔离药物发现，有的包括更宽的精准医疗软件栈。第二个视角是买家背后的预算池：EFPIA 估计
              2024 年仅欧洲药企研发支出就有 EUR 55 billion，说明足以资助合作的买家基数有多大。第三个视角是疾病负担带来的需求拉动。WHO 报告 890 million 成年人患有肥胖；insitro 的
              Lilly 新闻稿称 MASLD 在美国影响约 100 million 人；WHO 报告 2.2 billion 人存在视力损害；CDC 估计美国有 9.6 million 糖尿病视网膜病变患者。这些数字确认了
              insitro 项目周围有巨大的需求域，但不能等同于软件或合作 TAM。最干净的结论是：insitro 的市场必须通过多个受证据约束的视角测算，而不能靠一个通用标题数字。
