    title: 投资 KPI 评分卡
    summary: 这张 IC 风格评分卡从市场、合作伙伴验证、内部验证、经济性透明度、风险、估值支撑和退出准备度评估 insitro。
    approximationNotes: 评分采用 0-10 分制，反映在私募价格未知时的可投性，而不是公司的绝对质量。
    claimRefs:
      - CV002
      - CV003
      - CV011
      - CV014
      - CV022
      - CV028
      - CV029
      - CV030
      - CV031
      - CV045
    data:
      items:
        - label: 市场机会
          score: 8
          detail: AI 赋能生物医药仍有吸引力，也有战略相关性。
        - label: 合作伙伴验证
          score: 7
          detail: BMS 是强公开验证；Lilly 增加了可选性。
        - label: 内部资产验证
          score: 3
          detail: CTRO-1013 仍处在临床前 / IND 支持阶段。
        - label: 护城河 / 平台差异化
          score: 7
          detail: 平台和数据生成叙事是真实的，但估值仍部分吃叙事。
        - label: 经济性透明度
          score: 3
          detail: 当前收入、现金、烧钱速度和条款披露仍不足。
        - label: 融资韧性
          score: 6
          detail: 历史融资规模大，确实有意义，但跑道模型仍是私有信息。
        - label: 监管准备度
          score: 4
          detail: AI 治理和临床转化负担仍在前面。
        - label: 估值支撑
          score: 5
          detail: 公开可比公司和旧轮次锚点支持有纪律的定价，而不是盲目溢价。
        - label: 证据质量
          score: 4
          detail: 合作伙伴验证强，条款和当前经济性弱。
        - label: 退出准备度
          score: 3
          detail: 从公开证据看还没到 IPO 准备好；更近的逻辑是合作或战略可选性。
