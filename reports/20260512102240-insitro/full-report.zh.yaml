      - number: '8.4'
        title: 可比公司背景与情景区间：公开技术生物企业估值给出护栏
        blocks:
          - type: paragraph
            body: >-
              防止付高价的最强公开保护是可比公司组。截至 2026 年 5 月，Eikon 交易市值约 $0.54 billion，Absci 约 $0.90 billion，Schrödinger 约 $0.95
              billion，Recursion 约 $1.73 billion，Relay 约 $2.46 billion。这些同行并不完美，但每一个都给出有用约束。Eikon
              显示，公开市场可以多快重置早期证据故事。Absci 显示，AI 生物学平台可以长期低于 $1 billion。Schrödinger 显示，即使计算平台商业化程度更高，也拿不到软件式溢价。Recursion
              显示，规模、资本和合作伙伴并不自动支撑很高倍数。Relay 显示，更清晰的临床资产可以把公司推到公开区间上沿，但仍不会进入无约束地带。在这个背景下，insitro 的公开证据基准情景应落在约 $1.5-2.5
              billion，悲观情景约 $0.8-1.3 billion；只有临床进入和合作方转化明显改善时，乐观情景才约 $3.0-4.5 billion。
