chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与当前阶段
        blocks:
          - type: paragraph
            body: >-
              insitro 把自己定位为建立在因果生物学上的 AI 药物公司，而不是纯软件供应商或工具提供商。公司由 Daphne Koller 于 2018 年创立，总部位于南旧金山 East Grand Avenue
              279 号；公开使命是用多模态人类和细胞数据加机器学习来解码疾病。这个定位很关键，因为 insitro
              现在既不是在出售单一治疗资产，也不是在出售横向机器学习平台；它想搭出一台可复用引擎，从靶点发现推进到特定模态药物设计，再推进到内部控制的管线资产。公开网站和使命页面显示，公司仍扎根药物发现和开发，而不是商业化。它没有上市产品，但披露了项目组合，也有不断增加的数据和设计合作；这让公司超出种子前「AI
              赋能生物科技」阶段，进入后期私有、支撑临床前到 IND 准备的运营阶段。
