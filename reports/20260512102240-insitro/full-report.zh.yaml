  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 格局：直接同行、邻近公司、替代方案与潜在进入者
        blocks:
          - type: paragraph
            body: >-
              insitro 没有一个显而易见的单一对手。竞争集合至少分成三类。第一类是直接 AI 药物发现同行，它们同样试图把自有数据、机器学习和湿实验室工作流转成治疗管线或可合作项目。在已审阅公开来源中，最清晰的名字包括
              Recursion/Exscientia、Insilico Medicine、Xaira、Isomorphic Labs、Generate Biomedicines、Valo Health 和
              BenevolentAI。第二类是 Schrödinger、Evotec
              等邻近替代方案，它们用不同包装解决相似买家问题：基于物理的计算发现、整合型研发服务或灵活合作。第三类是药企内部自建；只要大型买家选择把发现留在内部，而不是为外部平台付费，它仍是默认替代方案。这很重要，因为它意味着
              insitro 不只在原始科学上竞争，还要竞争买家是否相信，其多模态人类数据方法足够区别于不断增殖的 AI 叙事和替代工作流。
