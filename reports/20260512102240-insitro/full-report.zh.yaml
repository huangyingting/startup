              不是一个零验证科学项目。大型药企已经向它支付真实现金，至少反复延展一个核心关系，并给公司一条从平台工作走向里程碑、特许权使用费或内部保留资产价值的可信路径。这比没有任何变现的纯临床前生物科技经济性更强。但从公开证据看，公司仍依赖融资。没有经审计现金头寸、没有干净年度收入桥接、没有披露义务时间表，也没有可靠公开方法来承销当前毛利率或烧钱速度。2025
              年重组说明，管理层仍在为到达证据节点而优化，而不是为了自我维持的经营杠杆。相对公开 AI 生物制药同行，insitro
              很可能有财务上可信的平台故事，但还不能用传统模型精度承销。关键尽调阻碍仍是当前现金、真实年度合作收入、义务负担，以及按资产和阶段拆分的项目支出。
