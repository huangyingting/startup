        - 相比更弱或验证更少的上市科技生物公司，insitro 或许应享有溢价。
        - 上市可比公司群的估值仍明显低于前沿 AI 叙事。
        - 证明 insitro 应高于 Relay 这类上市参照。
      - - 融资韧性
        - 庞大的历史资本基础和重组纪律，可能为公司争取时间抵达证据点。
        - 如果现金跑道仍先于临床证据耗尽，投资者可能面对价格压力和偏重优先权的融资。
        - 更新后的现金跑道模型和证据点日历。
      - - 治理 / 领导层
        - 董事会和领导层补强提升执行力和监管判断。
        - 治理无法替代价格、条款或临床证据。
        - 可见执行里程碑，加上干净融资条款。
    notes: 该表把公司质量和特定私募价格下的可投资性分开。
