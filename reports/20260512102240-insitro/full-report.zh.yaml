      - number: '7.4'
        title: 人员、执行与终止标准：缓释措施存在，但举证责任仍在前方
        blocks:
          - type: paragraph
            body: >-
              公开记录里确有缓释因素。Amy Abernethy 进入董事会，带来临床开发和前 FDA 经验。Joe Hand
              的任命说明，公司进入运营要求更高的阶段后，已经把人才战略摆到台面上。合作机构的安全环境也显示，insitro
              对外协作时已经把部分高风险治理控制纳入工作方式。但这些缓释因素都没有消掉核心举证责任。公司仍需证明，它能把项目推进到临床，产出成熟合作方和监管机构都愿意接受的验证文件，并且不再进一步削弱执行能力或加深合作方集中。尽调最有用的可监测触发点不是模糊的进展印象，而是具体事件：申报状态、首次人体试验准备度、进一步裁员、缺失验证包、缺乏审计证据，以及合作方不续约或降低优先级。在这些问题厘清之前，正确姿态是把领导层补强视为有意义但不完整的缓释，残余风险仍然偏高。
