      - number: '4.3'
        title: 成本结构、毛利率路径与公开牵引力
        blocks:
          - type: paragraph
            body: >-
              成本结构比验证更容易推断。insitro 运营湿实验室生物学、人类细胞数据生成、化学和大量算力，而不是轻量 SaaS 栈。2025 年 ChemML 延展特别强调了 192-H100 GPU
              集群；公司更广泛的平台叙事也依赖大规模数据生成和内部管线工作。因此，即便长期里程碑或特许权使用费经济最终可能有吸引力，当前交付经济也不太可能像纯软件毛利。公开牵引力同样不均衡。官方材料现在引用约 $150
              million 累计合作收入，对私有生物科技公司有意义；但第三方追踪器对年化收入和员工数分歧很大。GetLatka 报告 2024 年收入 $69 million、员工 262 人；Usearch 列出收入
              $7.5 million、员工 267 人；Awaira 报告约 300 名员工和一个很宽的估计 ARR 区间；WorxForm 则把融资压缩成单一 $400 million
              数字。最安全的读法是：合作伙伴现金存在且重要，但没有干净公开来源能对齐年度收入、毛利率或运营规模。
