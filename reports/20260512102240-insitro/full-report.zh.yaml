      - number: '3.3'
        title: 能力、包装、GTM 与切换成本对比
        blocks:
          - type: paragraph
            body: >-
              能力比较的重点不是谁「使用 AI」，而是每家公司能为这个主张挂上哪类证据。insitro 的公开角度是多模态人类和细胞数据，连接到疾病理解和内部管线形成。Recursion
              的公开优势是数据集和工业化规模。Insilico 的公开优势是速度和重复项目输出。Xaira 出售虚拟细胞野心，Isomorphic Labs 出售 AlphaFold 邻近的预测设计。Schrödinger
              是最清晰的计算替代方案，Evotec
              是最清晰的整合服务替代方案。公开定价比较远弱于能力比较。在已审阅来源中，经济条款通过合作结构、对外授权、里程碑组合、服务或合作姿态披露，而不是通过透明席位定价或菜单式包装披露。这让 GTM
              和切换成本分析格外重要。在深度整合之前，买家很可能同时使用多个平台；但一旦数据、模型工作流或项目权利嵌入合作，切换成本会上升。与此同时，分销权力仍偏向大型药企和后期商业化组织，而不是 insitro
              和多数私有同行。
