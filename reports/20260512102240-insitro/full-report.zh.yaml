              的差异化更多来自模态或人类因果生物学角度，而不是清晰公开商业验证。BenevolentAI 仍是有意义的类别参照，因为其知识图谱传统让它成为早期 AI
              药物发现领导者；但其战略重组和拟退市也显示，一旦执行或市场胃口转弱，类别叙事会迅速压缩。合起来看，这组画像表明 insitro 有差异化，但不是该类别的规模或融资领导者。
