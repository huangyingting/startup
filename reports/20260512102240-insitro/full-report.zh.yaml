companyProfile:
  summary: >-
    insitro 是一家位于南旧金山的 AI 药物研发公司，由 Daphne Koller 于 2018 年创立。公司已从机器学习药物发现平台，演进为覆盖代谢、神经科学和眼科的私有管线建设者。公开证据显示，借助 BMS、Lilly
    以及更早期 Gilead 合作的经济条款，insitro 的外部验证强于许多 TechBio 同行；但更准确的理解仍是：它是一家后期私有、处于临床前到 IND 准备阶段的平台叠加管线型生物科技公司，而不是商业化软件业务。
  foundedDate: '2018-01-01'
  founders:
    - name: Daphne Koller
      role: 创始人兼 CEO
      background: Stanford 机器学习教授、Coursera 联合创始人；其创始人与市场匹配来自把 AI 和数据科学用到高维生物学问题上。
      claimRefs:
        - CO001
        - CO006
  foundingLocation: South San Francisco, California, USA
  headquarters: South San Francisco, CA
  productSummary: insitro 将多模态人群队列和细胞数据、机器学习，以及内部和合作伙伴发现工作流组合在一起。可见组合覆盖代谢、神经科学和眼科；CTRO-1013 仍是最清晰、接近进入临床的内部资产。
  customerFocus: 公开客户验证集中在少数大型药企合作方，而不是广泛的软件客户群；BMS 是最强的公开持续性信号，Lilly 是第二个主要合作伙伴，Gilead 则提供历史验证。
  businessModel: 公司模式把带里程碑付款的药企合作，与更长期的内部管线期权价值揉在一起。公开定价、续约和收入确认细节仍不透明，因此更适合把 insitro 看成经合作伙伴验证的 TechBio 平台，而不是定价透明的产品公司。
  stage: private, late-preclinical
