        title: 留存与耐久性：BMS 是最佳信号，Lilly 仍早，Gilead 不透明，使用指标缺席
        blocks:
          - type: paragraph
            body: >-
              留存和耐久性正是公开记录明显变薄的地方。公司没有披露 NRR、GRR、流失率、NPS、活跃客户数或账户级收入留存指标。最强耐久性代理指标是观察到的连续性：BMS 自 2020 年到 2026
              年保持公开并跨四个不同证据点扩展，使其成为 insitro 在赢得科学信任后可以加深标杆关系的最佳证据。Lilly 令人鼓舞，但更新，目前只有 2024 至 2025 年的公开序列。Gilead
              证明大型药企早期愿意付费，但原始期限之后的当前状态在已审阅来源中不可见。研究环境合作加入了另一类粘性。Genomics England 和 INSIGHT
              都描述了安全环境：数据留在受控基础设施内，导出受门控，工具或虚拟机为获批研究者配置。这种运营模式意味着上手摩擦和一定切换成本，但仍未揭示续约经济、用户满意度或重复使用质量。
