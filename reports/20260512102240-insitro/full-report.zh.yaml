      - number: '1.3'
        title: 资本结构、合作经济与利益相关方图谱
        blocks:
          - type: paragraph
            body: >-
              公开来源显示，insitro 的资本栈由股权融资和合作现金共同搭成，这也是公开数字相互打架的原因。Forbes 报道 2020 年 Series B 后累计风投资金达到 $243 million；insitro
              2021 年新闻稿记录了由 CPP Investments 领投的 $400 million Series C。但公司后续公告在把合作现金计入后，先后引用超过 $700 million 和约 $800
              million 的资本，而第三方追踪器发布的融资和估值数字彼此不一致。更干净的结论是：insitro
              吸引了顶级私募财团和有分量的药企现金，但任何单一公开数字都不应被当成权威。合作伙伴图谱在经济上很重要：Gilead 验证了早期 NASH 逻辑；Bristol Myers Squibb
              仍是财务影响最大的神经科学合作方；Lilly 通过 2024 和 2025 年协议拓宽了代谢策略。这种集中度同时解释了上行空间和融资风险，因为少数交易对手驱动了大部分公开外部验证、里程碑流入和下游期权价值证据。
