  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、邻近领域与现状替代方案
        blocks:
          - type: paragraph
            body: >-
              分析 insitro 最容易犯的第一个错误，是简单称其市场为「药企
              AI」或「肥胖药物」。公司还不是商业化药物销售方，但也不再是纯工具供应商。它自己的平台和管线页面显示，商业模式是用多模态人类和细胞数据、机器学习以及设计工具，产出内部项目和面向合作伙伴的发现结果。因此，近期可变现市场是药企研发买家的合作与里程碑经济；下游经济上行空间则落在大得多的治疗终端市场，只有内部资产进入更后期开发时才真正重要。正确边界有三层：AI
              驱动的药物发现合作、insitro 控制的代谢 / 神经科学 / 眼科治疗项目，以及强化平台的数据密集型发现合作。现状替代方案是药企内部发现团队、传统 CRO 和药物化学工作流，以及
              Recursion、Schrödinger、Relay、Evotec 等竞争性 AI 生物制药平台，而不是消费者数字健康工具或医院 IT 软件。
