        title: 公开财务缺口与无法调和的估计
        blocks:
          - type: paragraph
            body: >-
              从承销角度看，最大问题不是缺少信号，而是缺少可调和的信号。公开来源未披露当前现金、月度烧钱速度、递延收入、债务、租赁承诺或项目层面支出。追踪器在融资、收入、估值和员工数上相互矛盾；公司自己的资本和合作收入说法也是累计口径，而不是审计式期间披露。即使存在公开基准，也回答不了
              insitro
              特定问题：有多少合作现金被确认为收入，活跃合作工作赚到多少毛利率，或已有多少资本投入内部临床项目。公开可比公司文件适合给类别资本强度划边界，不能替代公司数据。结果是，几乎每个真正的财务判断——现金跑道、扣除合作现金后的烧钱速度、下一轮规模或稀释风险——仍依赖私下披露，而不是完整公开记录。
