  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价：定制化合作经济，不是标价表
        blocks:
          - type: paragraph
            body: >-
              公开证据只支持一个清晰的变现结论：insitro 不是靠产品收入或公开席位制软件定价出售价值。相反，价值被打包进定制化药企合作和带里程碑付款的延展中。2020 年 Bristol Myers Squibb
              交易披露 $50 million 前付款、$20 million 近期运营里程碑、超过 $2 billion 下游里程碑以及特许权使用费。到 2024 年末，insitro 又宣布一个 $25 million 的
              BMS 里程碑；2025 年 ChemML 延展最高可再增加 $20 million 资金；2026 年靶点扩展公告又增加一个 $10 million 里程碑。Lilly 的 2024
              年结构显示了另一种经济设计：insitro 保留完整全球权利，Lilly 则有资格获得里程碑和特许权使用费；这意味着合作可以加速资产，但不能充当清晰的年度收入流。官方 2026 年公司信息称，insitro 已在
              BMS、Lilly 和 Gilead 上产生约 $150 million
              合作收入，但该数字是累计且未经审计的。结果是，一个真实但难以标准化的收入基础：有意义的合作伙伴现金、薄弱的公开定价透明度，以及没有经审计的产品销售引擎。
