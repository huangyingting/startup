      - number: '2.3'
        title: 买家、用户、付款方与采用路径
        blocks:
          - type: paragraph
            body: >-
              insitro 的买家图谱取决于所处价值链位置。在当前合作主导模式中，买家通常是药企研发或业务发展组织；他们判断 insitro
              的发现引擎、疾病模型或靶点工作是否值得前期资金和里程碑敞口。职能用户是双方科学团队，预算所有者是药企研发或外部创新预算。因此采用路径高度依赖证据：平台验证、疾病模型可信度、靶点提名，随后才是带里程碑结构的开发权谈判。在更后期的内部药物路径里，买家图谱会改变。只有临床证据和监管批准之后，医生、医疗系统和付款方才相关；对
              insitro 来说，这条路径目前大多仍是假设。Genomics England 和 Moorfields
              的数据合作并列作为赋能输入，而不是直接清晰的市场输出。这就是买家分析对估值如此重要的原因：公司眼前收入路径由成熟交易对手控制；他们在患者或付款方看到产品很久之前，就会要求证据。
