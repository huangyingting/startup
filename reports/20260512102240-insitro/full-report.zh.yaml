            body: >-
              命名客户证据真实存在，但由合作驱动，而不是订阅驱动。Gilead 2019 年 NASH 交易披露了三年期限、前付款、里程碑潜力，以及推进最多五个靶点的权利；这远强于被动标识背书。Bristol Myers
              Squibb 是最佳公开采用案例：2020 年五年合作，2024 年 $25 million 里程碑和第一个已提名 ALS 靶点，2025 年 ChemML 延展进入小分子设计，2026
              年又新增两个靶点和另一个里程碑。Lilly 是第二个主要先落地再扩张案例：2024 年三个代谢协议，在 2025 年拓宽为用 Lilly 数据训练、并通过 Lilly TuneLab 暴露的 ADMET
              模型。药企之外，Genomics England 称 insitro 的向量嵌入搜索将在其安全 Research Environment 中可用；INSIGHT/Moorfields
              称双方正基于数百万张关联图像共同开发 OCT 基础模型。这些都是有意义的外部部署，但公开结果仍被表述为里程碑或技术能力，而不是使用量或 ROI。
