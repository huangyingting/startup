  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与估值框架：先守定价纪律，再谈热情
        blocks:
          - type: paragraph
            body: >-
              首要问题不是 insitro 是否令人印象深刻。答案显然是肯定的。真正的问题是，公开证据是否足够给它定价。公开来源显示不少正面因素：头部合作伙伴、BMS 多次扩展合作、累计合作收入约 $150
              million，以及已融资或被引用的资本约 $800
              million。但它们没有给出当前入场价格、优先股堆叠、当前现金余额、可靠年收入，或内部资产的人体数据验证点。因此，直接给出坚决买入或坚决回避都显得牵强。基于公开证据，诚实姿态是继续研究、价格敏感。正确框架不是单点目标回报，而是一组参考区间，由公开可比公司、最后已知融资锚点和证据状态假设拼出。如果公司报价接近公开可比公司集群并加上合理溢价，尽调值得做；如果价格已经按一个去风险的前沿平台来给，公开记录提示应放慢。
