      - number: '5.4'
        title: 差异化、数据护城河与 IP：生物学、数据密度和模态广度交叉处最强
        blocks:
          - type: paragraph
            body: >-
              insitro 的差异化似乎并不建立在单一模型架构或单一治疗模态上。更强的公开故事，是把大规模人类数据资产、高密度细胞扰动系统，以及能跨模态选择和工程化干预的整合设计循环组合起来。POSH
              给公司提供了一个具体技术证据点，因为它展示了 insitro 如何试图打破表型筛选中规模与深度的取舍；cp-posh 仓库也给出真实开发者信号，说明部分工作可复现。TherML
              通过把靶点选择连接到模态选择，延展了护城河主张；这比仅仅围绕一个靶点优化小分子更有野心。Justia 专利记录也表明，insitro 正在建立真实的图像和组学 IP
              资产。尽管如此，护城河可见度仍不完整。栈中最有价值的部分很可能是私有数据集、内部反馈循环和合同数据权利，而公开记录无法清晰暴露这些。
