            body: >-
              资本充足性必须从融资、合作现金和成本重置中重建。公开报道描述，2019 年前已融资超过 $100 million，2020 年中累计风投资金 $243 million；随后 insitro 在 2021
              年披露进一步 $400 million Series C。到 2026 年 2 月，公司称自己有约 $800 million 资本支持；这个更大数字可能混合了股权、合作现金或其他资本来源。因此，2025
              年裁员在财务上很重要。BioPharma Dive 报道 insitro 裁掉 22% 员工，剩余约 230 人，并把运营目标指向 2027 年。行业背景让这种行为并不意外：EY 2025
              年生物科技报告称，后续融资是 2016 年以来最差，IPO 窗口仍低迷，而裁员持续广泛到 2026 年。公开 AI 生物制药可比公司进一步强化烧钱风险。Recursion 2023 年在 $44.6
              million 收入上亏损约 $328 million；Relay 没有产品收入却亏损 $342 million；Schrödinger 即使收入基数大得多，仍消耗约 $136.7 million
              经营现金。insitro 很可能比这些同行更有资本纪律，但公开数据不足以证明。
