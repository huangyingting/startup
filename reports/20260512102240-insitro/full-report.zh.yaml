      - number: '8.2'
        title: 投资逻辑与反向逻辑：合作方验证真实，经济性证据仍不完整
        blocks:
          - type: paragraph
            body: >-
              insitro 的正向逻辑不是假设。BMS 提供了本文件中最强的公开验证序列：首付款经济权益、里程碑转化、平台扩展资金和新靶点提名。Lilly
              增加第二个重大关系，并保留通向可观下游期权价值的路径。公司还受益于治理和人才信号，包括 Amy Abernethy 的董事会角色和 Joe Hand
              的人才职责。这些资产并不轻。反向逻辑在于，最重要的价值驱动因素仍处于临床前或私人信息状态。CTRO-1013 仍在推进 IND
              支持工作，还没有进入人体验证。收入可见度很差，公开跟踪网站之间差异巨大。合同条款、数据权利、优先权悬置，以及当前现金和烧钱情况都未公开。换句话说，insitro
              可能是家好公司，但公开记录仍更容易为愿景定价，而不是为已验证经济性定价。这个差别应主导投资姿态。
