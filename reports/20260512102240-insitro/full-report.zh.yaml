      - number: '3.4'
        title: 护城河耐久性、商品化风险与反向竞争证据
        blocks:
          - type: paragraph
            body: >-
              看多 insitro 的最强理由，是公司不依赖单一算法叙事。它的护城河主张把多模态疾病数据、细胞模型、项目所有权和已展示的合作伙伴验证组合在一起。但这条护城河并非免疫商品化。如果买家在交易前越来越把 AI
              药物发现供应商视为可互换，定价权就会被压缩。如果药企内部自建能力改善，外部平台胃口会变弱。如果 Recursion、Insilico、Xaira 或 Isomorphic Labs
              等同行继续在资本、数据集广度或公开验证节奏上放大规模，它们可能塑造整个类别的买家预期。这里的反向证据很重要。BenevolentAI 的战略重组和拟退市说明，早期 AI
              药物发现领导地位并不保证持久经济性；Exscientia 被 Recursion 吸收则说明整合已经开始。因此，竞争结论更有层次：insitro
              有差异化，但只有后续证据显示其靶点质量更好、里程碑转化更强，或买家锁定比不断扩大的 AI 生物制药替代阵营更可防守，护城河才会显得持久。
