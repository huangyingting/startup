  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群细分：少数药企付款方、少数外部用户，没有广泛安装基础
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，insitro 的客户图谱很窄。最清晰的直接付款方是 Bristol Myers Squibb、Lilly，以及历史上的 Gilead：这些大型药企交易对手用 insitro
              平台发现靶点、设计模态，并建立机器学习驱动的化学或 ADMET 能力。与这些付款方分开的，是 Genomics England 和 INSIGHT/Moorfields
              等研究环境合作伙伴；它们很重要，因为它们说明 insitro 工具可以进入带严格治理的真实外部数据基础设施。第三个表面，是通过 Lilly TuneLab 和 Catalyze360
              获得的间接生态触达；insitro 构建的模型可能触达生物科技用户，但这些用户不一定成为 insitro
              直接客户。同样重要的是缺席项：已审阅来源没有出现自助产品、公开定价、市场平台招商动作或长尾命名企业账户。主页、平台、使命和管线材料仍描述一家在内部项目和合作项目之间平衡的公司，因此当前客户经济依赖少数高价值关系，而不是广泛安装基础。
