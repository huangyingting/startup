      - number: '7.2'
        title: 监管、法律与数据治理风险：原则可见，公司特定证据有限
        blocks:
          - type: paragraph
            body: >-
              FDA 和 EMA 现在已经相当清楚地展示了 AI 用于药物开发时「好」是什么样。FDA 指出 AI 相关提交显著增加、基于风险的监管框架，以及使用场景的重要性。EMA
              明确把其反思文件从药物发现延伸到上市后，并强调偏见、患者安全、隐私和数据治理。对面向美国的项目，这些预期还叠加在围绕 IND 提交和电子记录的正式法律规则旁。相比之下，insitro
              的公开记录没有展示针对这些预期的验证包映射。法律图景同样混合。网站隐私政策很窄，且针对网站；它不能替代合作伙伴数据治理文件。Genomics England 和 INSIGHT
              展示了严肃的安全环境控制，但这些控制存在于合作伙伴环境中，也可能限制数据可移植性和复用。专利显示真实 IP
              表面，但自由实施、授权负担、诉讼历史和赔偿条款仍是私有信息。结果不是已知不合规的红旗，而是在监管方和成熟合作伙伴最关心的领域存在重大可见度缺口。
