  - id: TV003
    slug: bull-base-bear-scenario-table
    title: 乐观 / 基准 / 悲观情景表
    description: Reference valuation ranges and scenario assumptions for insitro under public-evidence constraints.
    columns:
      - 情景
      - 关键假设
      - 估值区间（$B）
      - 概率信号
      - 什么会证实 / 打破该情景
    rows:
      - - 乐观
        - CTRO-1013 按计划进入临床；BMS 或 Lilly 进一步转化；不再发生重大员工重置；条款干净。
        - $3.0-$4.5
        - 20-25%
        - IND/FIH 进展和合作伙伴扩展会证实；延迟或惩罚性条款会打破。
      - - 基准
        - 合作伙伴经济性守住；临床时间仍是方向性、尚未证明；价格落在 $2B 出头；优先权可控。
        - $1.5-$2.5
        - 40-45%
        - 稳定现金跑道且合作伙伴证明没有恶化，会证实该情景；时间停滞或隐藏优先权负担会打破。
      - - 悲观
        - 2027 年底前没有临床证据；合作伙伴势头平台化；融资条款暴露重度稀释或强优先权。
        - $0.8-$1.3
        - 30-35%
        - 延迟、裁员或苛刻条款会证实；只有证据改善快于预期时才会打破。
    notes: 概率是分析师信号，不是统计输出。区间用于框定公开证据下的合理结果，并不暗示市场精确性。
