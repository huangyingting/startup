      - number: '8.3'
        title: 融资背景与入场纪律：旧锚点、嘈杂跟踪网站、容错空间有限
        blocks:
          - type: paragraph
            body: >-
              最干净的融资锚点仍是 2021 年 Series C 轮。insitro 官方披露融资 $400 million，Forge 估算投后约 $2.57
              billion。除此之外，公开估值可见度明显变弱。GetLatka 和 Awaira 都把 insitro 放在低 $2 billion 区间，但它们在收入、融资总额，甚至基本轮次细节上相互冲突。Usearch
              将收入压到 $7.5 million，而 GetLatka 声称 $69 million。这种分歧不是小会计问题；它意味着公开跟踪网站只能当粗略路标。实际结果不是目标价，而是一条入场纪律规则。有效投后估值低于约
              $2.0 billion 且条款干净时，机会才开始值得深入研究。在旧的 $2.57 billion 锚点附近，公开记录只支持有限上行。高于约 $3 billion，投资人就在为公开文件没有包含的私人证据付费。
            claimRefs:
              - CV003
