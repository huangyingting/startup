      - number: '8.5'
        title: 退出准备度、投资逻辑破裂触发点与最终结论
        blocks:
          - type: paragraph
            body: >-
              基于公开证据，insitro 还没到 IPO
              准备好状态。私人股份没有公开价格历史，没有经审计的公开财务包，没有干净的当前现金和烧钱视图，也没有具备可见人体数据的内部资产。因此，较近的价值兑现路径更可能来自持续扩大合作伙伴、战略兴趣或后续私募融资，而不是一条直接的公开市场承销故事。这个结论让最终尽调议程更清晰。投资人需要当前股权结构表和优先股堆叠、当前烧钱与现金跑道模型、重大合作的合同条款和收入确认逻辑、CTRO-1013
              的 IND 关键路径，以及后期交易对手会要求的 AI 验证和安全材料。关键的投资逻辑破裂触发点同样具体：到 2027 年底仍无 IND
              或首次人体试验进展，再次发生重大人员重置，合作方不续约变得可见，或条款清单在溢价估值之上嵌入重度稀释。最终结论：继续研究，高风险、中等信心，且只在定价有纪律时推进。
