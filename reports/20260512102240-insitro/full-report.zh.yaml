      - number: '1.2'
        title: 领导层、治理与组织匹配
        blocks:
          - type: paragraph
            body: >-
              创始人兼 CEO Daphne Koller 仍是公司最核心的公开面孔，也是创始人与市场匹配最清晰的来源。外部报道把她的可信度与深厚机器学习专长、此前创办 Coursera
              绑定；公司材料则强调，她在打造跨学科文化，把数据科学、生物学和药物开发揉到一起。2021 年融资周期之后，董事会和高管新增成员让治理更有药物开发和临床证据深度。Paul McCracken 通过 Series C
              融资加入董事会；Amy Abernethy 于 2024 年加入，带来 FDA 和真实世界证据经验；Joe Hand 于 2026
              年出任首席人力官，随公司扩张而专业化人才战略。这些任命说明公司在为更成熟的组合管理和组织纪律做准备。与此同时，公开来源仍未披露完整董事会控制图、继任规划或优先权结构，因此治理方向可见，经济细节仍不透明。
