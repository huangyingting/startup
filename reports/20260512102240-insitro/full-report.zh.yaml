      - number: '5.3'
        title: 部署、成熟度与路线图：真实合作伙伴使用，但证据仍多停留在临床前
        blocks:
          - type: paragraph
            body: >-
              最强成熟度证据不是广泛客户铺开，而是在具体合作和命名项目中反复使用。Bristol Myers Squibb 最初让 insitro 建立 ALS 和 FTD 疾病模型，随后把关系转成已提名靶点、基于
              ChemML 的分子设计阶段，最后扩展到覆盖寡核苷酸和小分子的多模态合作。Lilly 同样从围绕 siRNA 递送和抗体发现的代谢协议，扩展到小分子 ADMET 模型开发。药企之外，Genomics
              England 和 INSIGHT/Moorfields 描述了 insitro 技术在安全环境中的合作伙伴专属部署，说明至少部分平台组件可以交付给外部组织。从 2025 年末到 2026
              年的路线图也重要：POSH 从概念推进到论文发表和公开代码发布；TherML 作为带品牌的治疗设计层推出；BAT-01
              作为端到端栈产出的命名临床前资产浮出。即便如此，成熟度天花板仍很清楚。公开证据大多止于临床前或合作阶段里程碑，而不是获批产品或公开人体疗效结果。
