  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重性排序的风险态势：临床转化和 AI 治理风险居前
        blocks:
          - type: paragraph
            body: >-
              insitro 的风险栈由两个紧密相连的问题领头：把 AI
              驱动的发现推进临床，以及在监管环境下完成这件事；该环境正更明确要求使用场景、数据治理、生命周期管理和可信度证据。公开证据仍停留在临床前和合作阶段。MASLD 更新把 CTRO-1013 描述为正推进 IND
              准备工作并走向首次人体试验；裁员和现金跑道措辞则显示，时间安排在财务上和科学上一样重要。这形成了复合结构：如果临床转化放慢，里程碑时点和融资灵活性可能一起恶化。客户侧无法抵消这一风险，因为合作验证集中在
              BMS、Lilly 和 Gilead，而不是分散到广泛组合。因此，本章把临床就绪风险、AI 治理风险、集中度融资风险视为三类最重要风险；数据权利、质量认证不透明和人员执行风险则是放大器，而不是独立干扰项。
