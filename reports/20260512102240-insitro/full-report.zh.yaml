      - number: '1.4'
        title: 里程碑与管线演进
        blocks:
          - type: paragraph
            body: >-
              阅读 insitro 轨迹，最有用的方式是看一串里程碑如何把数据与机器学习逻辑转成更宽的治疗组合。早期验证来自 Gilead 合作和 2020 年 Bristol Myers Squibb ALS
              协议，说明大型药企愿意为 insitro 的发现引擎付费。下一阶段加入更大规模股权支持和 Genomics England 等研究合作，随后又通过 Lilly 代谢疾病合作、Bristol Myers
              Squibb 带里程碑付款的 ALS 靶点工作，更明确地搭建管线。到 2025 和 2026 年，运营模式明显更工业化：公司通过 Moorfields 扩大眼科和神经退行性疾病数据网络，在管线页面披露肥胖和
              MASH 项目，并在收购 CombinAbleAI 后推出
              TherML。当前披露组合覆盖代谢、神经科学和眼科，共有八个命名项目，但仍没有上市产品，也没有公开临床阶段资产。因此，里程碑时间线比传统商业化时间线更重要。
