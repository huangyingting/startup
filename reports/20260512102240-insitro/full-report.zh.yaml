      - number: '5.5'
        title: 信任、安全、隐私、合规与质量控制：原则可见，审计不可见
        blocks:
          - type: paragraph
            body: >-
              公开信任证据方向为正，但不完整。Genomics England 和 INSIGHT/Moorfields 都强调安全研究环境和受限数据访问；这很有意义，因为 insitro
              平台触及敏感临床和影像数据集。外部框架也清楚展示「好」应该是什么样：FDA 强调用于药物决策的 AI 模型需要基于风险的可信度评估；EMA 强调数据治理和生命周期管理；WHO
              把信任和伦理视为基础，因为技术部署跑在法律前面。但 insitro 自身公开披露在运营细节上仍很薄。已发布隐私政策聚焦网站，不是合作数据控制的窗口；没有来源材料披露 SOC 2、ISO
              27001、GxP、HIPAA 或 HITRUST 认证姿态。这留下了熟悉的尽调结论：公司似乎理解正确的治理语言，但投资人仍需要私下证据，验证这些控制是否以工业级深度落实到真实发现工作流中。
