            body: >-
              insitro 的运营模式不是轻量软件业务。它把多模态数据生成、湿实验室工作流、重算力、自有合作伙伴数据集，以及与外部合作争夺资本的内部管线组合在一起。公开来源分片展示了这一点：BMS ChemML 延展提到
              QALs、ADMET 模型和 192-H100 集群；Lilly 小分子工作依赖 Lilly 自有数据；Genomics England 和 INSIGHT 部署运行在受治理的合作伙伴环境中；Joe Hand
              的公司声明仍把合作收入集中在三个名字上。这意味着多个依赖项可能一起失效。合作伙伴延迟可以同时影响数据访问、里程碑时点和战略验证。临床准备放慢会同时加重融资需求并削弱客户杠杆。BioPharma Dive 和
              Fierce 添加了重要背景：裁员并非 insitro 独有，但行业背景强化了资本和执行余量仍然有限。这里的运营风险不是一次戏剧性失败，而是一个耦合很紧、容错空间有限的系统。
