      - number: '2.4'
        title: 增长驱动、采用约束与保留的矛盾
        blocks:
          - type: paragraph
            body: >-
              insitro 所处市场的增长逻辑很直接。肥胖、MASLD、视力和神经退行性疾病负担巨大；药企研发预算庞大；AI 正在沿药物生命周期更深地渗透到发现、安全和运营环节。同时，该类别的采用约束格外重要。WHO 和
              EMA 都强调治理、风险管理和生命周期控制。McKinsey 认为药企还没有看到清晰证据，证明 AI 单独就能显著缩短周期或提高成功率；KPMG
              指出，更严峻的融资条件把买家推向风险更低的结构。这些事实意味着，热情不会自动转化为溢价经济。投资人需要保留两组张力，而不是把它们压平。第一，分析师市场预测看多，但彼此不可比。第二，疾病负担确认需求，却不能证明
              insitro 能以有吸引力的转化率获得软件收入、合作收入或未来产品收入。因此，本章应继续保留围绕精确 SAM、买家转化和类别层面 AI 生产力证据的明确缺口。
