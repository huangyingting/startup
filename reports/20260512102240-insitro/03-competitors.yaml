  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: peer-pricing
    missingEvidence: Actual pricing cards, fee schedules, or apples-to-apples commercial terms across private AI-biopharma peers.
    whyItMatters: The market packages value through bespoke partnerships, so public comparison on pricing power is weak without actual deal documents.
    diligencePath: Request internal market maps of recent AI-biopharma term sheets and direct competitor deal comps.
    relatedQuestionRefs:
    - QP013
    - QP024
  - type: private-evidence-only
    severity: material
    topic: peer-funding-runway
    missingEvidence: Current cash, burn, and runway for private peers such as Xaira, Generate, Valo, and Benevolent after their latest strategic changes.
    whyItMatters: Capital depth affects who can sustain long platform-to-clinic cycles and who may be forced into partnerships or restructuring.
    diligencePath: Request cap-table or financing summaries from management research, investor decks, or private-market databases.
    relatedQuestionRefs:
    - QP006
    - QP024
  - type: missing-source
    severity: material
    topic: switching-cost-proof
    missingEvidence: Evidence of actual partner churn, win-loss rates, or multi-homing behavior for AI-drug-discovery platforms.
    whyItMatters: Without real buyer behavior data, switching-cost and multi-homing judgments remain informed hypotheses rather than underwritten facts.
    diligencePath: Request business-development win/loss data and partner overlap maps by account.
    relatedQuestionRefs:
    - QP016
    - QP017
  - type: missing-source
    severity: material
    topic: internal-pharma-build
    missingEvidence: Current public benchmarks for how far large pharma internal AI programs have progressed versus external platform vendors.
    whyItMatters: Internal build is one of the biggest long-term substitute threats, but public benchmarking remains thin and sporadic.
    diligencePath: Request competitor intelligence on internal AI teams at major pharma buyers and how often they displace external platforms.
