- id: TP001
  slug: competitor-profile-table
  title: Competitor profile table
  description: Profiles of insitro and key competitors across category, scale, scope, and limitation.
  columns:
  - Competitor
  - Category
  - Public scale / funding signal
  - Product scope / target customer
  - Key differentiation
  - Key limitation vs insitro
  rows:
  - - insitro
    - Reference company
    - Private; public partner validation through BMS and Lilly; pipeline spans three disease buckets
    - AI therapeutics platform plus internal/partnered programs for pharma buyers
    - Multimodal human and cellular data tied to platform-to-pipeline continuity
    - Not the public capital-scale leader; limited public pricing transparency
  - - Recursion / Exscientia
    - Direct AI platform peer
    - '>50 petabytes; >10 internal and >10 partnered programs; ~$450M realized partner cash; ~800 employees'
    - Broadest AI discovery platform for pharma partners and internal pipeline
    - Industrialized phenomics + chemistry + partner cash proof
    - Broad scope may dilute disease-specific focus; no marketed drug disclosed in reviewed source
  - - Insilico Medicine
    - Direct generative-AI peer
    - 40+ programs; 13 IND-approved pipelines; 20 PCCs from 2021-2024; multiple disclosed deal values
    - Generative-AI drug discovery for internal pipeline and license-outs
    - Fast output cadence and unusually visible deal economics
    - Less obviously differentiated by multimodal disease-data moat than insitro
  - - Xaira
    - Direct frontier-platform peer
    - Nearly $1B raised; largest publicly available genome-wide Perturb-seq dataset; virtual-cell push
    - AI-first drug discovery and development across full stack
    - Virtual-cell ambition and exceptional starting capital base
    - Still earlier on public clinical proof
  - - Isomorphic Labs
    - Direct frontier-model peer
    - $600M external round; Novartis, Lilly, and J&J collaborations
    - AI-powered drug design built beyond AlphaFold for pharma collaboration and internal discovery
    - AlphaFold-adjacent brand, predictive and generative design engine
    - Public pipeline detail is thinner than platform ambition
  - - Generate Biomedicines
    - Adjacent biologics generator
    - 42,000 proteins generated, built, and tested; 140k+ sq ft footprint
    - Generative biology and protein therapeutics
    - Strong protein-design and biologics angle
    - More modality-specific and less like-for-like with insitro’s current public story
  - - Valo Health
    - Adjacent human-data peer
    - Human-causal-biology and closed-loop chemistry positioning; ecosystem-led model
    - AI-guided target and molecule discovery with partnerships
    - Human-data narrative resonates with insitro’s own thesis
    - Public proof points are thinner in reviewed sources
  - - BenevolentAI
    - Adjacent knowledge-graph peer
    - Decade of ontology and knowledge-graph investment; strategic overhaul and proposed delisting
    - AI decision support for life-science R&D and target discovery
    - Long-standing AI pharma brand and knowledge graph heritage
    - Adverse restructuring evidence weakens credibility
  - - Schrödinger
    - Computational substitute
    - Collaborative plus proprietary programs from physics-based platform
    - Computational discovery for pharma and internal pipeline
    - Physics-based simulation and established platform identity
    - Less obviously centered on multimodal human disease data
  - - Evotec
    - Integrated-service substitute
    - Integrated R&D value chain and flexible partnering model
    - Partnered drug discovery and development services
    - Commercially legible service packaging and modality breadth
    - Different business model and less pure AI moat
  notes: Scale signals are limited to what reviewed public sources exposed. Private company cash and valuation fields remain incomplete unless explicitly visible.
