- id: TP004
  slug: moat-durability-competitive-risk-register
  title: Moat durability / competitive risk register
  description: Structured register of the main competitive durability questions facing insitro.
  columns:
  - Moat or risk
  - Current direction
  - Public evidence
  - Implication for insitro
  - Diligence ask
  rows:
  - - Multimodal disease-data moat
    - Potential strength
    - insitro platform and pipeline framing
    - Could support differentiated target and patient-selection insight
    - How unique are datasets relative to peers and partners?
  - - Partner validation
    - Strength with caveats
    - BMS and Lilly structures disclosed
    - Helps credibility with buyers, but not yet proof of category-leading outcomes
    - What milestone conversion has insitro actually achieved versus peers?
  - - Capital-scale gap
    - Risk
    - Xaira and Isomorphic public funding signals; Recursion public scale
    - Larger peers may shape category expectations and absorb more failure
    - What is insitro’s effective runway versus frontier peers?
  - - Virtual-cell and AlphaFold displacement
    - Risk
    - Xaira and Isomorphic ambitions
    - Could narrow the distinctiveness of insitro’s own model-centric claims
    - Where is insitro uniquely better than virtual-cell or structural-AI approaches?
  - - Generative-chemistry velocity
    - Risk
    - Insilico output cadence and disclosed IND progress
    - Faster-output peers may win buyer attention if insitro looks slower
    - How does insitro compare on target-to-candidate speed?
  - - Multi-homing and internal build
    - Risk
    - KPMG / McKinsey plus substitute set
    - Buyers may distribute spend across multiple platforms or keep work internal
    - Which buyers use insitro exclusively versus alongside other platforms?
  - - Category consolidation / fragility
    - Risk
    - Exscientia absorbed into Recursion; BenevolentAI restructuring and delisting plan
    - Investor and buyer confidence can compress quickly
    - Does consolidation increase buyer trust in scaled leaders or open whitespace for specialists?
  - - Distribution asymmetry
    - Persistent risk
    - Large pharma or service incumbents still control many end channels
    - insitro remains dependent on partners for downstream reach
    - What routes to distribution or commercialization remain realistic?
  notes: The register separates genuine moat strengths from areas where public evidence is still too thin to underwrite durability.
