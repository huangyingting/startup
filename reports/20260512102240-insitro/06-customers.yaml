  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: account-level-revenue-mix
    missingEvidence: The public record does not disclose how the cited ~$150 million of partnership revenue is split across BMS, Lilly, and Gilead, nor how much is recognized versus deferred.
    whyItMatters: Without account-level revenue mix, investors cannot quantify top-customer risk, revenue durability, or the true weight of any single partnership in the operating model.
    diligencePath: Request partner-by-partner revenue history, deferred-revenue treatment, milestone schedules, and the percent of cumulative and forward revenue tied to each top account.
    relatedQuestionRefs:
    - QU018
    - QU022
    - QU025
    relatedTableRefs:
    - TU004
    - TU005
  - type: private-evidence-only
    severity: material
    topic: renewal-and-termination-terms
    missingEvidence: Public materials do not disclose current contract terms, renewal options, termination triggers, support obligations, or change-of-control provisions for BMS, Lilly, Genomics England, or INSIGHT relationships.
    whyItMatters: Durability depends on actual term length, cancellation rights, and operational obligations, not just the existence of a press release or a single milestone event.
    diligencePath: Request current agreements or detailed summaries covering term remaining, renewal mechanics, milestone gates, termination rights, exclusivity, and support or hosting obligations.
    relatedQuestionRefs:
    - QU015
    - QU016
    - QU025
    relatedTableRefs:
    - TU004
    - TU005
  - type: missing-source
    severity: material
    topic: deployment-usage-and-satisfaction
    missingEvidence: No reviewed source disclosed active-user counts, query volume, utilization rates, model performance in production use, satisfaction scores, or renewal outcomes for Genomics England, INSIGHT/Moorfields, or Lilly TuneLab-related deployments.
    whyItMatters: Named customer proof is materially stronger when it includes actual usage and satisfaction evidence; without these data, adoption quality and repeat usage remain inferential.
    diligencePath: Request deployment dashboards, user-count trends, usage frequency, partner satisfaction surveys, case studies, and examples of repeat usage or renewal decisions for each external deployment.
    relatedQuestionRefs:
    - QU013
    - QU020
    - QU021
    - QU025
    relatedTableRefs:
    - TU003
    - TU004
  - type: enumeration-incomplete
    severity: material
    topic: full-customer-list
    missingEvidence: The chapter can enumerate only publicly named counterparties; it cannot verify whether insitro has additional biotech, pharma, health-system, or research-infrastructure customers that have not been announced.
    whyItMatters: Customer breadth is central to underwriting concentration risk and repeatability. A hidden long tail would materially change the interpretation of quality and concentration.
    diligencePath: Request a full customer and partner roster by segment, current status, geography, and revenue contribution, plus a list of closed, paused, or expired relationships.
    relatedQuestionRefs:
    - QU001
    - QU002
    - QU003
    - QU021
    - QU025
    relatedTableRefs:
    - TU001
    - TU003
  - type: missing-source
    severity: material
    topic: gilead-current-status
    missingEvidence: Publicly reviewed materials do not show whether the original Gilead collaboration was renewed, yielded target advancement beyond the initial term, or effectively ended without follow-on work.
    whyItMatters: Gilead is one of only three named pharma revenue counterparties in the company’s own 2026 partnership-revenue statement, so its current status matters for durability and concentration analysis.
    diligencePath: Request collaboration closeout materials, renewal history, realized milestones, current obligations, and whether any Gilead-originated targets or royalties remain live.
    relatedQuestionRefs:
    - QU024
    - QU025
    relatedTableRefs:
    - TU003
