- id: expansion-and-concentration
  title: Expansion upside exists, but concentration risk dominates the investable customer story
  body: 'Expansion upside and concentration risk coexist. On the upside, insitro has shown that a customer relationship can move from target discovery into chemistry, modality expansion, or ecosystem exposure: BMS broadened across targets and modalities; Lilly broadened into ADMET and TuneLab; Genomics England can expose insitro search to a wider research network. On the downside, Joe Hand’s 2026 company statement lumps roughly $150 million of partnership revenue into just three names—BMS, Lilly, and Gilead—without revealing the split. That is enough to indicate concentration, but not enough to underwrite quality of revenue. BioPharma Dive’s 2025 layoff coverage, including a 22% workforce reduction and runway-to-2027 language, reinforces the view that insitro still operates like a capital-intensive biotech that depends on a handful of counterparties and internal proof points. KPMG and McKinsey contextualize this as normal for AI-biopharma deals: partnerships are bespoke, proof-sensitive,
    and integration-heavy. The result is a customer base that is strategically credible but still too opaque to treat as a diversified recurring-revenue engine.'
