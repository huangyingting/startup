- id: TU005
  slug: expansion-concentration-risk-table
  title: Expansion and concentration risk table
  description: Main drivers that could expand customer value, paired with the concentration or execution risks that limit confidence today.
  columns:
  - Expansion driver
  - Concentration / execution risk
  - Impact
  - Diligence path
  rows:
  - - BMS land-and-expand across targets and modalities
    - Highest-quality public customer proof sits in one marquee account
    - Loss or slowdown at BMS would remove the strongest durability signal and a meaningful share of partnership value
    - Request BMS revenue share, remaining milestone schedule, and staffing support by program
  - - Lilly expansion into ADMET and TuneLab ecosystem
    - Indirect ecosystem reach may not diversify direct payers
    - Can broaden platform exposure, but may still tie economics to one pharma sponsor
    - Request direct versus indirect economics, user counts, and roadmap for additional Lilly-linked programs
  - - Gilead-style discovery economics
    - Historical proof may not reflect current revenue quality
    - Useful as early validation, but opacity around current status weakens durability analysis
    - Request realized milestones, current obligations, and any surviving royalty or co-development rights
  - - Genomics England and INSIGHT secure-environment deployments
    - Strong strategic proof but unclear monetization
    - Validates external usability on sensitive data but may not translate into meaningful cash revenue
    - Request commercial terms, hosting obligations, and usage metrics for each deployment
  - - Aggregate partnership revenue concentration
    - ~$150M disclosed across just three counterparties with no split
    - Any partner pause could materially affect cash planning and perceived momentum
    - Request top-customer contribution percentages and forward revenue concentration scenarios
  - - 2025 restructuring and runway framing
    - Support capacity and account focus may tighten under capital discipline
    - Could increase prioritization risk across accounts and internal programs
    - Request post-restructuring account coverage plan, BD pipeline, and support SLA commitments
  notes: This table intentionally pairs upside with concentration risk because insitro’s best customer story is also its clearest exposure.
