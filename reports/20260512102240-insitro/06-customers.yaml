    - Target discovery, modality selection, chemistry, ADMET, disease-modeling
    - 3 named pharma accounts
    - Highest visible cash value; majority of disclosed partnership revenue likely concentrated here
    - No account-level revenue split, renewal terms, or customer-count denominator
  - - Research-environment deployment partners
    - 'Buyer: partner leadership; users: approved Genomics England and INSIGHT/Moorfields researchers; payer: unclear'
