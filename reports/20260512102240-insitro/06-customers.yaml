- id: named-adoption-proof
  title: 'Named adoption proof: strongest where counterparties describe real deployments or paid milestone progression'
  body: 'Named customer proof is real, but it is collaboration-led rather than subscription-led. Gilead’s 2019 NASH deal disclosed a three-year term, upfront cash, milestone potential, and rights to advance up to five targets, which is much stronger than a passive logo reference. Bristol Myers Squibb is the best public adoption case: a five-year 2020 collaboration, a $25 million 2024 milestone and first nominated ALS target, a 2025 ChemML extension into small-molecule design, and a 2026 expansion with two additional targets plus another milestone. Lilly is the second major land-and-expand example: three 2024 metabolic agreements broadened in 2025 to ADMET models trained on Lilly data and exposed through Lilly TuneLab. Outside pharma, Genomics England says insitro’s embedding search will be available inside its secure Research Environment, and INSIGHT/Moorfields says a co-developed OCT foundation model is being built on millions of linked images. These are meaningful external deployments,
    but their public outcomes are still framed as milestones or technical capabilities rather than utilization or ROI.'
