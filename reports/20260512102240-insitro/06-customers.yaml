chapter:
  number: 6
  title: Customers
  summary: 'insitro’s external customer base is narrow and strategic. The clearest paying counterparties are Bristol Myers Squibb, Lilly, and historically Gilead, while Genomics England and INSIGHT/Moorfields provide partner-side proof that insitro tools can operate inside real secure research environments. The strongest durability signal is BMS’s multi-step expansion from 2020 through 2026; Lilly shows early expansion, and Gilead’s current status is opaque. This is materially better customer proof than a logo wall, but it is still concentrated and under-disclosed: no public customer counts, retention metrics, satisfaction data, or account-level revenue mix are available.'
sections:
- id: customer-base-segmentation
  title: 'Customer base segmentation: a few pharma payers, a few external users, and no broad install base'
  body: 'As of May 2026, insitro’s customer map is narrow. The clearest direct payers are Bristol Myers Squibb, Lilly, and historically Gilead: large-pharma counterparties that use insitro’s platform to discover targets, design modalities, and build ML-enabled chemistry or ADMET capabilities. Separate from those payers are research-environment partners such as Genomics England and INSIGHT/Moorfields, which matter because they show insitro tools can be delivered into real external data infrastructures with strict governance. A third surface is indirect ecosystem reach via Lilly TuneLab and Catalyze360, where insitro-built models may reach biotech users without those users necessarily becoming direct insitro customers. What is absent is just as important: no self-serve product, public pricing, marketplace motion, or long tail of named enterprise accounts surfaced in reviewed sources. Home, platform, purpose, and pipeline materials still describe a company balancing internal programs with partnered
    programs, so current customer economics depend on a few high-value relationships rather than a broad installed base.'
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU006
  - CU007
  tableRefs:
  - TU001
  figureRefs:
