- id: retention-and-durability
  title: 'Retention and durability: BMS is the best signal, Lilly is early, Gilead is opaque, and usage metrics are absent'
  body: 'Retention and durability are where the public record thins materially. No NRR, GRR, churn, NPS, active-customer counts, or account-level revenue-retention metrics are disclosed. The strongest durability proxy is observed continuity: BMS has stayed public and expanded across four distinct proof points from 2020 through 2026, making it the best evidence that insitro can deepen a marquee relationship once scientific trust is earned. Lilly is encouraging but newer, with only a 2024-to-2025 public sequence so far. Gilead proves that large pharma was willing to pay early, but current status after the original term is not visible in reviewed sources. Research-environment partnerships add a different kind of stickiness. Genomics England and INSIGHT both describe secure environments where data stay inside controlled infrastructure, exports are gated, and tools or virtual machines are provisioned for approved researchers. That operating model implies onboarding friction and some switching
    cost, but it still does not reveal renewal economics, user satisfaction, or repeat-usage quality.'
