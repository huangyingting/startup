- id: milestones-and-pipeline
  title: Milestones and portfolio evolution
  body: 'The most useful way to read insitro’s trajectory is as a sequence of milestones that converted a data-and-ML thesis into a broader therapeutic portfolio. Early validation came from the Gilead collaboration and the 2020 Bristol Myers Squibb ALS agreement, which showed major pharma willingness to pay for insitro’s discovery engine. The next phase added larger equity backing and research partnerships such as Genomics England, then moved into more explicit pipeline construction with Lilly in metabolic disease and milestone-bearing Bristol Myers Squibb target work in ALS. By 2025 and 2026 the operating model became visibly more industrialized: the company expanded its ophthalmology and neurodegeneration data network through Moorfields, disclosed obesity and MASH programs on the pipeline page, and launched TherML after acquiring CombinAbleAI. The current disclosed portfolio spans metabolism, neuroscience, and ophthalmology, with eight named programs but still no marketed product or public
    clinical-stage asset. That makes the milestone chronology more important than a conventional commercialization timeline.'
