  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: current-valuation
    missingEvidence: Current priced secondary, internal board mark, or dated investor letter that establishes a supportable 2026 valuation.
    whyItMatters: Recommendation quality depends on whether the last private mark is still defensible after the 2025 layoffs and pipeline reshaping.
    diligencePath: Request the latest board-approved valuation memo, cap table summary, and any 2025-2026 financing or tender documentation.
    relatedQuestionRefs:
    - QO010
  - type: private-evidence-only
    severity: material
    topic: revenue-mix
    missingEvidence: Audited collaboration revenue, deferred revenue, and cash balance detail by partner and by fiscal year.
    whyItMatters: Without a clean revenue and cash bridge, capital adequacy and quality-of-revenue underwriting remain speculative.
    diligencePath: Request the latest audited financial statements plus a partner-by-partner collaboration accounting schedule.
    relatedQuestionRefs:
    - QO012
  - type: missing-source
    severity: minor
    topic: customer-count
    missingEvidence: A public source that discloses how many revenue-bearing, data-bearing, or active platform customers insitro currently serves.
    whyItMatters: Customer concentration and commercialization readiness cannot be measured cleanly from named announcements alone.
    diligencePath: Request a current active-collaboration roster with payer type, contractual status, and expected milestone cadence.
    relatedQuestionRefs:
    - QO013
  - type: missing-source
    severity: material
    topic: capital-structure
    missingEvidence: Debt facilities, venture debt, shareholder secondary sales, preference stack, and any control-right disclosures.
    whyItMatters: These terms determine true dilution, downside protection, and who controls a future financing or exit process.
    diligencePath: Request the latest cap table, stockholder rights summary, any debt agreements, and summary of historical secondaries.
    relatedQuestionRefs:
    - QO023
