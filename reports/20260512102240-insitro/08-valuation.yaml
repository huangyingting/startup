  rows:
  - - Partner proof
    - BMS and Lilly relationships show real external validation and paid strategic demand.
    - Only BMS shows repeated public expansion; Lilly economics are still less visible and Gilead is mostly historical.
    - More public partner conversion, renewal, or new counterparty proof.
  - - Internal pipeline
    - CTRO-1013 gives insitro a route to proprietary asset upside beyond services-like partnerships.
    - CTRO-1013 remains preclinical / IND-enabling, so internal asset value is still highly risk-adjusted.
    - Clear IND timing, FIH status, or early human proof.
  - - Economics visibility
    - Cumulative partnership revenue and large capital raised are real positives.
    - Current cash, burn, annual revenue, and contract accounting are too opaque for clean underwriting.
    - Current cash and burn model plus contract economics.
  - - Comparable context
    - insitro may deserve a premium to weaker or less validated public techbio names.
    - Public comp cluster still sits well below frontier-AI narratives.
    - Proof that insitro deserves to sit above Relay-like public context.
  - - Financing resilience
    - Large historical capital base and restructuring discipline may buy time to reach proof points.
    - If runway still ends before clinic proof, investors may face pricing pressure and preference-heavy financing.
    - Updated runway model and proof-point calendar.
  - - Governance / leadership
    - Board and leadership additions strengthen execution and regulatory judgment.
    - Governance cannot substitute for price, term, or clinical proof.
    - Visible execution milestones plus clean financing terms.
  notes: The table separates company quality from investability at a specific private price.
