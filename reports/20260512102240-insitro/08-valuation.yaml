chapter:
  number: 8
  title: Valuation
  summary: 'Public evidence suggests insitro deserves serious diligence, but not blind underwriting at an aggressive private price. The last clean financing anchor is the 2021 $400 million Series C; Forge estimates roughly $2.57 billion post-money, while low-confidence trackers cluster nearer $2.2-2.4 billion. Public AI-techbio comps sit much lower than frontier-AI narratives: Eikon about $0.54 billion, Absci about $0.90 billion, Schrödinger about $0.95 billion, Recursion about $1.73 billion, and Relay about $2.46 billion. insitro has stronger partner proof than several of those names, but still lacks human data, current terms, audited current financials, and clean revenue visibility. The right stance is research-more and price-sensitive. A rough public-evidence range is about $0.8-1.3 billion bear, $1.5-2.5 billion base, and $3.0-4.5 billion bull; prices above roughly $3 billion require materially stronger private evidence than the public record provides.'
sections:
- id: recommendation-and-framework
  title: 'Recommendation and valuation framework: price discipline comes before enthusiasm'
  body: 'The first question is not whether insitro is impressive. It clearly is. The question is whether public evidence is sufficient to price it. Public sources show real positives: marquee partners, repeated BMS expansion, roughly $150 million of cumulative partnership revenue, and roughly $800 million of capital raised or cited. But they do not show the current entry price, preference stack, current cash balance, reliable annual revenue, or a human-data proof point for internal assets. That makes a hard buy or hard avoid call look forced. The honest public-evidence stance is research-more and price-sensitive. The right framework is therefore not a single-point target return but a set of reference ranges built from public comps, the last known financing anchor, and proof-state assumptions. If the company is being offered near the public-comp cluster plus a rational premium, diligence may be worthwhile. If it is already being priced like a de-risked frontier platform, the public record
    says slow down.'
