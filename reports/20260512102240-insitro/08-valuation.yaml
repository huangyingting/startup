    topic: ind-path-and-ai-validation-pack
    missingEvidence: No reviewed source provided the IND critical path, regulator feedback, model validation package, or mapped controls against FDA and EMA AI expectations for active programs.
    whyItMatters: The biggest determinant of upside is whether insitro can translate from platform proof into a regulator-ready and partner-trusted clinical package.
    diligencePath: Request IND timelines, CMC and toxicology status, regulator interactions, AI validation and change-control packages, and any partner diligence memos on model credibility.
