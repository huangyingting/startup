- id: TV005
  slug: thesis-break-and-kill-triggers-table
  title: Thesis-break and kill triggers table
  description: Monitorable triggers that would either break the insitro investment thesis or force a materially lower valuation stance.
  columns:
  - Trigger
  - Threshold / event
  - Transmission to thesis
  - Action implication
  rows:
  - - Clinic timing slips materially
    - No IND or first-in-human progress by end-2027
    - Reduces proprietary-asset option value and increases financing pressure
    - Move toward bear case / pass unless price resets meaningfully
  - - Another major workforce reset
    - A further material layoff or visible hiring freeze in critical functions
    - Signals weaker runway or execution capacity than assumed
    - Increase downside weighting and question proof-point reach
  - - Partner momentum stalls
    - No new BMS/Lilly expansion, explicit partner de-prioritization, or non-renewal
    - Weakens the strongest external validation pillar
    - Raise concentration discount and lower base-case range
  - - AI / security diligence fails
    - Management cannot provide validation, governance, or security materials
    - Keeps regulatory and enterprise-readiness risk unresolved
    - Treat as a hard blocker for premium pricing
  - - Price or terms become punitive
    - Round priced above ~$3B or with heavy participating preference / anti-dilution protection
    - Eliminates margin of safety
    - Pass unless private proof is materially better than public evidence
  - - Runway is shorter than believed
    - Current cash cannot comfortably reach the next proof point
    - Raises forced-financing and dilution risk
    - Re-cut valuation toward bear case immediately
  notes: Triggers are chosen because they can be checked in diligence, management updates, or future disclosures rather than inferred only from narrative tone.
  claimRefs:
  - CV030
  - CV035
  - CV036
  - CV043
  - CV044
- id: TV006
  slug: final-diligence-asks-table
  title: Final diligence asks table
  description: Missing evidence that would most directly move insitro from an interesting narrative to a priceable private opportunity.
  columns:
  - Topic
  - Missing evidence
  - Why it matters
  - Owner / diligence path
  rows:
  - - Cap table and preferences
    - Current fully diluted capitalization and preferred-stock rights
    - Determines whether nominal upside is actually available to a new investor
    - Request board deck, cap table, and waterfall analysis
  - - Cash, burn, and runway
    - Current cash balance, monthly burn, and downside runway cases
    - Determines whether the next financing is forced or optional
    - Request finance model and proof-point budget
  - - Latest priced round or secondary signal
    - Any priced transaction, secondary mark, or 409A update after 2021
    - Anchors real entry price rather than stale round mythology
    - Request financing history and valuation memos
  - - Partner contract economics
    - Renewal, exclusivity, data-rights, output-ownership, and revenue-recognition details
    - Separates durable economics from milestone optics
    - Review BMS, Lilly, and any current Gilead-related agreements
  - - IND and AI validation path
    - Regulator interactions, IND timeline, and AI validation package
    - Primary determinant of upside from platform to therapeutics value
    - Request development and regulatory diligence pack
  - - Security and quality posture
    - Audit evidence, certifications, incident history, and enterprise controls
    - Affects partner trust, investor diligence conversion, and exit readiness
    - Request security / quality diligence room materials
  notes: 'These asks are intentionally chosen for decision leverage: each one can move price, risk rating, or recommendation materially.'
