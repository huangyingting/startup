- id: thesis-and-antithesis
  title: 'Investment thesis and anti-thesis: real partner proof, still incomplete economic proof'
  body: 'The positive case for insitro is not hypothetical. BMS has supplied the strongest public validation sequence in the file: upfront economics, milestone conversion, platform-extension funding, and new target nominations. Lilly adds a second major relationship and keeps open a route to substantial downstream option value. The company also benefits from governance and talent signals, including Amy Abernethy’s board role and Joe Hand’s talent mandate. Those are not trivial assets. The anti-thesis is that the most important value drivers remain either preclinical or private. CTRO-1013 is still moving through IND-enabling work, not through human proof. Revenue visibility is poor enough that public trackers disagree wildly. Contract terms, data rights, preference overhang, and the current cash-and-burn picture are not public. In other words, insitro may be a good company, but the public record still prices promise more easily than it prices proven economics. That distinction should dominate
    the investment posture.'
  claimRefs:
