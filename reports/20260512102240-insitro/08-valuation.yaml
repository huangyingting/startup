  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: cap-table-and-preferences
    missingEvidence: No public source disclosed the current cap table, liquidation preferences, participating preference terms, anti-dilution protections, or any side-letter economics for the latest private shares.
    whyItMatters: These terms determine whether a nominally attractive headline valuation actually leaves common-equivalent upside for a new investor.
    diligencePath: Request the current cap table, financing history, term sheet, preferred-stock rights summary, SAFEs or convertibles if any, and a fully diluted waterfall under base and downside exit values.
    relatedQuestionRefs:
    - QV008
    - QV009
    - QV023
    - QV029
    relatedTableRefs:
    - TV001
    - TV006
  - type: private-evidence-only
    severity: material
    topic: current-cash-burn-and-runway
    missingEvidence: The public record does not disclose current cash, monthly burn, downside runway, or the exact proof points management expects to reach before 2027.
    whyItMatters: Without a current runway model, it is impossible to size financing risk or judge whether the next financing would be opportunistic or forced.
    diligencePath: Request current cash, monthly burn, 24-month budget, downside runway cases, hiring plan, and the milestones expected to be reached before the next financing need.
    relatedQuestionRefs:
    - QV010
    - QV023
    - QV029
    relatedTableRefs:
    - TV001
    - TV005
    - TV006
  - type: private-evidence-only
    severity: material
    topic: latest-priced-round-and-secondary-data
    missingEvidence: No reviewed public source clearly established whether there has been a later priced round, structured recap, or meaningful secondary-price discovery after the 2021 Series C.
    whyItMatters: Entry discipline depends on knowing whether the company is being offered near an old anchor, at a premium, or through terms that already encode stress.
    diligencePath: Request the latest priced transaction history, secondary trades, 409A or board valuation memos, and any recent investor mark-down or mark-up analyses.
    relatedQuestionRefs:
    - QV006
    - QV007
    - QV009
    - QV022
    - QV023
    relatedTableRefs:
    - TV001
    - TV003
    - TV006
  - type: missing-source
    severity: material
    topic: private-comp-and-exit-reference-set
    missingEvidence: Public materials do not provide a strong set of directly comparable private techbio financings, strategic buyer indications, or M&A comparables with disclosed terms that would sharpen exit-path or comp-table coverage.
    whyItMatters: This leaves the comparable table intentionally public-heavy and makes exit-path confidence lower than it would be with recent private transaction evidence.
    diligencePath: Request banker or board materials on relevant private financings, recent strategic outreach, buyer mapping, and any internal comp set used to frame valuation or exit alternatives.
    relatedQuestionRefs:
    - QV012
    - QV021
    - QV026
    - QV029
    relatedTableRefs:
    - TV004
    - TV006
  - type: private-evidence-only
    severity: material
    topic: partner-contract-terms-and-revenue-recognition
    missingEvidence: Public sources do not reveal renewal mechanics, exclusivity, termination rights, model-output ownership, data-use rights, or revenue-recognition treatment for the major collaborations.
    whyItMatters: Those details determine how much of the partnership narrative is durable recurring economics versus milestone optics.
    diligencePath: Request contract summaries or agreements for BMS, Lilly, and any still-relevant Gilead economics, plus revenue-recognition memos and deferred-revenue schedules.
