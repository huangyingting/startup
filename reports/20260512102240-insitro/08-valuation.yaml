- id: exit-readiness-final-diligence-and-verdict
  title: Exit readiness, thesis-break triggers, and final verdict
  body: 'On public evidence, insitro is not IPO-ready. There is no public price history for the private shares, no audited public financial package, no clean current cash and burn view, and no internal asset with visible human data. The nearer-term value-realization path is therefore more likely to run through continued partner expansion, strategic interest, or a later private financing rather than a straightforward public-market underwriting story. That conclusion sharpens the final diligence agenda. Investors need the current cap table and preference stack, current burn and runway model, contract terms and revenue-recognition logic for the major collaborations, the IND critical path for CTRO-1013, and the AI validation and security materials that later-stage counterparties will expect. The key thesis-break triggers are similarly concrete: no IND or first-in-human progress by end-2027, another major workforce reset, visible partner non-renewal, or a term sheet that embeds heavy dilution
    above a premium valuation. Final verdict: research-more, with high risk and medium confidence, and only under disciplined pricing.'
