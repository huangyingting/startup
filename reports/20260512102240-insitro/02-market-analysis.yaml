  evidenceGaps:
  - type: missing-source
    severity: material
    topic: exact-sam
    missingEvidence: A public source that isolates TAM, SAM, or SOM for insitro’s exact mix of AI platform partnerships plus metabolic, neuro, and ophthalmic pipeline exposure.
    whyItMatters: Without a boundary-matched market definition, valuation models can overstate opportunity by mixing software spend, R&D budgets, and end-disease demand.
    diligencePath: Request management’s internal market-sizing memo with separate lenses for partnership revenue, internal pipeline revenue, and data-asset advantage.
    relatedQuestionRefs:
    - QM012
    - QM025
  - type: private-evidence-only
    severity: material
    topic: buyer-budget-allocation
    missingEvidence: Partner-by-partner budget owners, pilot-to-deal conversion rates, and average deal-cycle timing for insitro’s current buyer funnel.
    whyItMatters: The chapter can identify likely buyers, but it cannot underwrite how reliably platform interest converts into signed economics without private conversion data.
    diligencePath: Request current CRM funnel metrics, deal-stage definitions, and recent business development win/loss notes.
    relatedQuestionRefs:
    - QM014
    - QM016
  - type: private-evidence-only
    severity: material
    topic: downstream-commercial-path
    missingEvidence: Target product profiles, anticipated label claims, pricing assumptions, and payer-access planning for insitro’s internal programs.
    whyItMatters: The downstream buyer and payer path can only be described generically until the company exposes real launch assumptions and indication sequencing.
    diligencePath: Request target product profiles, market-access workups, and any internal demand modeling for lead programs.
    relatedQuestionRefs:
    - QM015
    - QM017
  - type: conflicting-data
    severity: minor
    topic: ai-market-boundary
    missingEvidence: A harmonized external definition that separates AI-in-pharma, AI-in-drug-discovery, and AI-in-precision-medicine market categories on one comparable basis.
    whyItMatters: Published analyst forecasts are useful directional signals, but their mixed boundaries can create false precision if they are averaged or compared without context.
    diligencePath: Normalize analyst estimates to one market definition and one forecast horizon before using them in a valuation model.
    relatedQuestionRefs:
    - QM013
    - QM024
  - type: missing-source
    severity: material
    topic: clinical-productivity-proof
    missingEvidence: Comparable evidence that insitro or the AI-first peer group has improved preclinical-to-clinical conversion or milestone realization relative to conventional discovery baselines.
    whyItMatters: 'This is the core adoption skepticism in the category: buyers may admire AI workflow claims without paying premium economics unless clinical yield is demonstrably better.'
    diligencePath: Request internal benchmark studies, partner milestone conversion analyses, and any outcome data that compares AI-enabled programs with conventional programs.
    relatedQuestionRefs:
    - QM021
    - QM025
