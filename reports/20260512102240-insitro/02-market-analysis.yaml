chapter:
  number: 2
  title: Market Analysis
  summary: 'insitro sits in a layered market rather than one clean TAM: a near-term buyer market for AI-enabled biopharma partnerships, a broader pharma R&D budget pool, and downstream disease markets in metabolism, neurodegeneration, and ophthalmology. Public evidence supports strong long-term demand and rising AI spend, but published market estimates are non-comparable and no reviewed source isolates a clean SAM or SOM for insitro’s exact cross-therapeutic model.'
sections:
- id: market-boundary-and-substitutes
  title: Market boundary, adjacencies, and status-quo substitutes
  body: 'The first analytical mistake with insitro is to call its market simply “AI in pharma” or simply “obesity drugs.” The company is not yet a commercial drug seller, but it is also no longer a pure tools vendor. Its own platform and pipeline pages show a business model that uses multimodal human and cellular data, machine learning, and design tooling to generate both internal programs and partner-facing discovery output. That means the near-term monetizable market is partnership and milestone economics with pharmaceutical R&D buyers, while the downstream economic upside sits in much larger therapeutic end markets that will matter only if internal assets reach later development. The right boundary therefore has three layers: AI-enabled drug-discovery partnerships, insitro-controlled therapeutic programs in metabolism, neuroscience, and ophthalmology, and data-intensive discovery collaborations that strengthen the platform. The status-quo alternatives are internal pharma discovery teams,
    conventional CRO and medicinal-chemistry workflows, and competing AI-biopharma platforms such as Recursion, Schrödinger, Relay, and Evotec—not consumer digital-health tools or hospital IT software.'
