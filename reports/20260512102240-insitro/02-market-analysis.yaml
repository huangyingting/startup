tables:
- id: TM001
  slug: market-definition-table
  title: Market definition table
  description: Boundary logic for the market layers that matter to insitro today.
  columns:
  - Segment / category
  - Included spend or activity
  - Excluded spend
  - Buyer / payer
  - Relevance to insitro
  rows:
  - - AI-enabled drug-discovery partnerships
    - Upfronts, milestones, option fees, and research funding tied to target discovery, model building, and program design
    - Commercial drug sales, hospital software, broad consumer health apps
    - Large-pharma R&D and BD budgets
    - Immediate monetization path; this is where insitro signs deals today
  - - Internal metabolic-disease therapeutics
    - Future revenue from obesity, MASLD, and related metabolic programs if assets advance
    - Primary-care chronic-disease management services or wellness subscriptions
    - Future prescribers, payers, and specialty pharma channels
    - Important long-term upside, but mostly pre-commercial today
  - - Internal neuroscience therapeutics
    - ALS, FTD, and related neuro target economics through partnerships or internal assets
    - Neurology care delivery spend unrelated to drugs
    - Pharma partners today; clinicians and payers later
    - Current BMS collaboration makes neuroscience commercially relevant already
  - - Ophthalmology and neurodegeneration data layer
    - Retinal imaging and multimodal discovery inputs that improve target selection and patient segmentation
    - General hospital IT, PACS software, and routine ophthalmology services
    - Research partners and future pharma users
    - Strategic moat and discovery input rather than clean standalone revenue category
  - - Status-quo substitute stack
    - In-house pharma discovery, conventional CRO workflows, medicinal chemistry, and competitor AI platforms
    - Consumer digital health, billing software, or general hospital analytics
    - Existing pharma budgets already allocated to incumbent workflows
    - Defines what insitro must displace to win budgets
  notes: Rows define market boundary logic, not additive TAM buckets. Included and excluded spend intentionally separates present buyer economics from future therapeutic upside.
