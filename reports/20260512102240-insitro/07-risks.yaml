- id: TR005
  slug: mitigation-and-kill-criteria-table
  title: Mitigation and kill criteria table
  description: Monitorable triggers that would materially change the thesis, plus the diligence outputs required to reduce risk today.
  columns:
  - Risk
  - Monitorable trigger
  - Threshold / event
  - Action implication
  rows:
  - - Clinical translation delay
    - IND / first-in-human readiness
    - No filing or human-dosing milestone by end-2027
    - Move to high-alert / avoid underwriting platform premium
  - - AI credibility gap
    - Validation package availability
    - Management cannot provide mapped controls against FDA / EMA principles
    - Treat AI-governance risk as unresolved blocker
  - - Quality / security opacity
    - Audit evidence
    - No meaningful security, quality, or incident documentation in diligence room
    - Assume enterprise readiness is unproven
  - - Partner concentration
    - BMS / Lilly milestone and renewal cadence
    - No further milestone or expansion progress across top partners
    - Increase concentration discount and financing caution
  - - Execution-capacity erosion
    - Workforce and hiring trend
    - Another material layoff round or visible inability to fill critical clinical roles
    - Downgrade confidence in clinic-readiness timeline
  - - Data-rights constraints
    - Contractual data-use terms
    - Restrictions prevent meaningful reuse, model updating, or deployment scale
    - Reduce moat and scalability assumptions
  notes: 'Triggers are chosen for observability: they can be checked in diligence, future disclosures, or partner updates rather than inferred only from narrative tone.'
