- id: people-execution-and-kill-criteria
  title: 'People, execution, and kill criteria: mitigations exist, but the burden of proof is still ahead'
  body: 'There are real mitigants in the public record. Amy Abernethy adds clinical-development and former FDA experience at the board level. Joe Hand’s appointment signals that the company is thinking explicitly about talent strategy as it moves into a more operationally demanding phase. Secure environments at partner institutions show that some high-stakes governance controls are already part of how insitro works externally. But none of those mitigants eliminate the core burden of proof. The company still needs to show that it can move programs into the clinic, produce validation documentation that sophisticated partners and regulators will accept, and do so without further erosion of execution capacity or partner concentration. For diligence, the most useful monitorable triggers are not vague impressions of progress but concrete events: filing status, first-in-human readiness, additional layoffs, missing validation packages, absence of audit evidence, and partner non-renewal or de-prioritization.
    Until those are clarified, the right stance is to treat leadership additions as meaningful but incomplete mitigation against a still-high residual risk profile.'
