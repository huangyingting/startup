  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: ai-validation-package
    missingEvidence: No public source provides insitro’s internal AI validation package, context-of-use mapping, model-change controls, or verification and validation evidence against FDA and EMA expectations.
    whyItMatters: Regulatory and partner confidence in AI-derived outputs depends on documented credibility, governance, and change control rather than on platform branding alone.
    diligencePath: Request the internal AI governance framework, model inventory, context-of-use mapping, V&V packages, change-control procedures, and any regulator-facing AI documentation prepared for active programs.
    relatedQuestionRefs:
    - QR004
    - QR005
    - QR006
    - QR023
    - QR030
    relatedTableRefs:
    - TR001
    - TR005
  - type: private-evidence-only
    severity: material
    topic: quality-security-certifications
    missingEvidence: The public record does not disclose enterprise-grade security or quality certifications, audit reports, GxP mappings, penetration-test summaries, or incident history for the platform.
    whyItMatters: Without formal assurance artifacts, investors cannot tell whether sensitive-data handling and model-supported development workflows are industrialized or only described at a principles level.
    diligencePath: Request current SOC 2 / ISO 27001 / GxP or equivalent materials, security architecture reviews, incident logs, and vendor-security questionnaires used in partner diligence.
    relatedQuestionRefs:
    - QR008
    - QR024
    - QR030
    relatedTableRefs:
    - TR001
    - TR002
  - type: private-evidence-only
    severity: material
    topic: partner-data-rights-and-terms
    missingEvidence: Public sources do not expose collaboration data-rights restrictions, model-output ownership, retraining rights, renewal mechanics, exclusivity, or termination triggers for BMS, Lilly, Gilead, Genomics England, or INSIGHT.
    whyItMatters: These terms determine whether insitro can compound learning across programs, preserve bargaining power, and avoid silent concentration or portability traps.
    diligencePath: Request contract summaries or primary agreements covering term, renewal, exclusivity, data-use rights, output ownership, termination, and change-of-control clauses for the key counterparties.
    relatedQuestionRefs:
    - QR019
    - QR020
    - QR025
    - QR030
    relatedTableRefs:
    - TR001
    - TR003
    - TR005
  - type: private-evidence-only
    severity: material
    topic: capital-plan-and-runway
    missingEvidence: The company does not publicly disclose current cash balance, monthly burn, post-layoff operating plan, or the milestone schedule needed to extend runway beyond 2027.
    whyItMatters: Clinical translation and platform operations are capital intensive; without a detailed runway model, financing risk cannot be sized with confidence.
    diligencePath: Request the current board-approved operating plan, monthly burn trajectory, cash balance, downside runway cases, and explicit assumptions about partnership milestones and hiring.
    relatedQuestionRefs:
    - QR015
    - QR016
    - QR030
    relatedTableRefs:
    - TR003
    - TR005
  - type: private-evidence-only
    severity: material
    topic: ip-freedom-to-operate-and-litigation
    missingEvidence: Public patent listings do not provide freedom-to-operate analyses, inbound-license dependencies, litigation history, indemnity terms, or internal legal-risk reviews.
    whyItMatters: A patent count does not by itself prove that insitro can commercialize targets, models, modalities, or datasets without costly disputes or encumbrances.
    diligencePath: Request a current FTO review, material-license schedule, litigation and claims history, and any legal memos on patent, trade-secret, or data-rights exposure for the lead programs and platform.
    relatedQuestionRefs:
    - QR009
    - QR010
    - QR030
    relatedTableRefs:
    - TR001
    - TR005
  - type: missing-source
    severity: material
    topic: fih-and-filing-status
    missingEvidence: No reviewed source disclosed an IND filing, regulatory submission identifier, or human-dosing milestone for insitro’s lead assets.
    whyItMatters: Clinical entry is the most important near-term proof point separating promising platform stories from credible therapeutics companies.
    diligencePath: Request IND or CTA status, expected submission timelines, regulator feedback to date, and the critical path items that still stand between current programs and human dosing.
