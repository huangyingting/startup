  figureRefs:
  - FR002
- id: operational-and-dependency-risks
  title: 'Operational, partner, and financing dependency risk: the model is powerful, but tightly coupled'
  body: 'insitro’s operating model is not a lightweight software business. It combines multimodal data generation, wet-lab workflows, heavy compute, proprietary partner datasets, and an internal pipeline that competes for capital with external partnership work. Public sources make this visible in pieces: the BMS ChemML extension references QALs, ADMET models, and a 192-H100 cluster; Lilly small-molecule work depends on Lilly’s proprietary data; Genomics England and INSIGHT deployments run inside governed partner environments; and Joe Hand’s company statement still concentrates partnership revenue in three names. That means several dependencies can fail together. A partner delay can affect data access, milestone timing, and strategic validation at the same time. A slowdown in clinic readiness can worsen both fundraising needs and customer leverage. BioPharma Dive and Fierce add important context: layoffs are not unique to insitro, but the sector backdrop reinforces that capital and execution
    slack remain limited. Operational risk here is therefore less about one dramatic failure and more about a tightly coupled system with limited room for error.'
  claimRefs:
