companyProfile:
  summary: >-
    insitro is a South San Francisco AI therapeutics company founded in 2018 by Daphne Koller that
    has evolved from an ML drug-discovery platform into a private pipeline builder spanning
    metabolism, neuroscience, and ophthalmology. Public evidence shows stronger external proof than
    many techbio peers through BMS, Lilly, and earlier Gilead collaboration economics, but the
    company is still best understood as a late-private, preclinical-to-IND-enabling
    platform-plus-pipeline biotech rather than a commercial software business.
  foundedDate: '2018-01-01'
  founders:
    - name: Daphne Koller
      role: Founder and CEO
      background: >-
        Stanford machine-learning professor and Coursera co-founder whose founder-market fit rests
        on applying AI and data science to high-dimensional biology problems.
      claimRefs: [CO001, CO006]
  foundingLocation: South San Francisco, California, USA
  headquarters: South San Francisco, CA
  productSummary: >-
    insitro combines multimodal human-cohort and cellular data, machine learning, and internal plus
    partnered discovery workflows. The visible portfolio spans metabolism, neuroscience, and
    ophthalmology, while CTRO-1013 remains the clearest internal asset approaching clinic entry.
  customerFocus: >-
    Public customer proof is concentrated in a small number of large-pharma collaborators rather
    than a broad software customer base; BMS is the strongest public durability signal, with Lilly
    as a second major partner and Gilead as historical proof.
  businessModel: >-
    The model blends milestone-bearing pharma collaborations with longer-dated internal pipeline
    option value. Public pricing, renewal, and revenue-recognition details remain opaque, so the
    business is better framed as a partner-validated techbio platform than as a transparently priced
    product company.
  stage: private, late-preclinical
  fundingStatus: >-
    Last clearly disclosed financing was the $400M Series C in 2021. Forge estimates that round at
    roughly $2.57B post-money, while low-confidence public trackers still cluster insitro in the
    low-$2B range. Management now cites roughly $800M of capital and about $150M of cumulative
    partnership revenue, but current financing terms and preference structure are not public.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CV002, CV005, CV006, CV007, CV010, CV014]

summary:
  headline: >-
    Research-more: insitro has real partner proof and a plausible route to premium techbio value,
    but public evidence does not support underwriting an aggressive private valuation without clean
    terms and stronger clinic-ready proof.
  overallScore: 6.1
  recommendation: research-more
  confidence: medium
  riskRating: high
  valuationStance: unknown
