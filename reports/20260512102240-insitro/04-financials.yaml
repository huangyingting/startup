- id: TI005
  slug: public-financial-gaps-table
  title: Public financial gaps table
  description: The highest-impact missing financial data points that still block a conventional underwriting model for insitro.
  columns:
  - Missing metric
  - Why it is missing
  - Why it matters
  - Public proxy today
  - Exact diligence ask
  rows:
  - - Current cash and unrestricted cash
    - Private company; no balance sheet published
    - Runway and dilution risk cannot be independently modeled
    - Only a press quote about operating into 2027
    - Request latest monthly cash report and board runway deck
  - - Monthly burn by category
    - No audited or management P&L detail is public
    - Gross burn versus partner cash offset is the core financing question
    - Peer filings give only category-level external bounds
    - Request 24-month burn history split into R&D, G&A, compute, and facilities
  - - Partner-by-partner recognized revenue and deferred revenue
    - Public sources disclose cash events but not accounting treatment
    - Revenue quality cannot be judged from milestone headlines alone
    - Recursion filing shows cash and GAAP timing can diverge
    - Request collaboration-accounting schedule by counterparty
  - - 'Obligations: debt, leases, compute contracts, equipment financing'
    - No contract schedules or obligation tables are public
    - Hidden obligations can materially shrink effective runway
    - Only peer filings show how material these commitments can become
    - Request full obligations schedule with maturities and covenants
  - - Program-level spend and expected use of funds
    - Internal pipeline budgeting is private
    - Needed to determine whether platform spend is converting into assets efficiently
    - Company press releases imply platform and pipeline expansion but not cost allocation
    - Request by-program budget and next-24-month use-of-funds plan
  - - Board-approved financing plan / next-round trigger
    - No investor letter or financing memo is public
    - Determines how close the company is to another raise and what milestones matter most
    - Public proxy is only the 2025 restructuring plus 2026 partner rhetoric
    - Request financing strategy memo and milestone-based capital plan
  notes: Every row in this table is material to valuation, dilution analysis, or the credibility of any revenue-quality argument.
