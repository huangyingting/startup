  - FI002
- id: capital-adequacy-and-peer-capital-intensity
  title: Capital adequacy and peer capital-intensity benchmarks
  body: 'Capital adequacy has to be reconstructed from financings, collaboration cash, and cost resets. Public reporting described more than $100 million raised by 2019 and $243 million of venture funding by mid-2020; insitro then disclosed a further $400 million Series C in 2021. By February 2026, the company described itself as backed by roughly $800 million of capital, a larger figure that likely mixes equity with collaboration cash or other capital sources. The 2025 workforce reduction is therefore financially important. BioPharma Dive reported that insitro cut 22% of staff, leaving about 230 workers and targeting operation into 2027. Sector context makes that behavior unsurprising: EY’s 2025 biotech report says follow-on financings were the worst since 2016 and IPO windows remained muted, while layoffs stayed widespread into 2026. Public AI-biopharma comparables reinforce the burn risk. Recursion lost about $328 million on $44.6 million of revenue in 2023, Relay lost $342 million with
    no product revenue, and Schrödinger still used about $136.7 million of operating cash despite a much larger revenue base. insitro may well be more capital disciplined than those peers, but public data is not strong enough to prove it.'
