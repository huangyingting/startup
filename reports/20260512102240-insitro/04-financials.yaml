company:
  name: insitro
chapter:
  number: 4
  title: Financials
  summary: 'insitro’s public financial picture is partnership-validated but still highly opaque. Official disclosures support a collaboration-led model built around BMS, Lilly, and earlier Gilead economics rather than product revenue or transparent software subscriptions. Publicly visible cash events include BMS’s $50M upfront in 2020, a $25M milestone in 2024, up to $20M of new 2025 extension funding, and a $10M milestone in 2026, while 2026 company messaging cites roughly $150M of partnership revenue and about $800M of capital. But audited annual revenue, current cash, deferred revenue, gross margin, capex commitments, and debt are not public, and trackers disagree sharply on revenue, funding, valuation, and headcount. The 2025 workforce reduction and stated plan to operate into 2027 suggest active runway management. Public comps such as Recursion, Schrödinger, and Relay show that AI-biopharma platforms routinely consume very large amounts of cash even with collaboration or software revenue.
    The financial verdict is therefore nuanced: insitro is more economically validated than a pure preclinical science project, but still financing-dependent until collaboration economics or internal programs become auditable and repeatable enough to support a conventional model.'
sections:
- id: revenue-model-and-pricing
  title: 'Revenue model and pricing: bespoke partnership economics, not list pricing'
  body: 'Public evidence supports only one clean monetization conclusion: insitro is not being sold through product revenue or public seat-based software pricing. Instead, value is packaged through bespoke pharma collaborations and milestone-bearing extensions. The 2020 Bristol Myers Squibb deal disclosed $50 million upfront, $20 million in near-term operational milestones, more than $2 billion in downstream milestones, and royalties. By late 2024, insitro had announced a further $25 million BMS milestone; the 2025 ChemML extension could add up to $20 million more funding; and the 2026 target-expansion announcement added another $10 million milestone. Lilly’s 2024 structure shows a different economic design: insitro keeps full global rights while Lilly becomes eligible for milestones and royalties, meaning the partnership can accelerate assets without functioning as a clean annual-revenue stream. Official 2026 company messaging says insitro has generated about $150 million of partnership
    revenue across BMS, Lilly, and Gilead, but that figure is cumulative and unaudited. The result is a real but hard-to-normalize revenue base: meaningful partner cash, weak public pricing transparency, and no audited product-sales engine.'
