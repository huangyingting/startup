- id: public-financial-gaps-and-unreconciled-estimates
  title: Public financial gaps and unreconciled estimates
  body: From an underwriting perspective, the biggest problem is not the absence of signals but the absence of reconciled signals. Public sources do not disclose current cash, monthly burn, deferred revenue, debt, lease commitments, or program-level spend. Trackers disagree on funding, revenue, valuation, and headcount, and the company’s own capital and partnership-revenue claims are cumulative rather than audit-style period disclosures. Even where public benchmarks exist, they cannot answer insitro-specific questions such as how much collaboration cash is recognized as revenue, what gross margin is earned on active partner work, or how much capital has already been committed to internal clinical programs. Public-comparable filings are useful for bounding category capital intensity, not for replacing company data. The result is that almost every real financial judgment—runway, burn net of partner cash, next-round size, or dilution risk—still depends on private disclosures rather than on
    a complete public record.
  claimRefs:
  - CI016
  - CI019
  - CI034
  - CI035
  - CI036
  - CI040
  tableRefs:
  - TI005
- id: financial-verdict
  title: 'Financial verdict: real partner validation, still heavy financing dependence'
  body: insitro is not a zero-validation science project. Major pharma has paid it real cash, extended at least one core relationship repeatedly, and given the company a plausible route from platform work toward milestone, royalty, or internally retained asset value. That is stronger than the economics of a purely preclinical biotech with no monetization. But the company is still financing-dependent by public evidence. There is no audited cash position, no clean annual revenue bridge, no disclosed obligation schedule, and no credible public way to underwrite current gross margin or burn. The 2025 restructuring suggests management is still optimizing for proof-point reach rather than for self-sustaining operating leverage. Relative to public AI-biopharma peers, insitro likely has a financially credible platform story, but not one that can yet be underwritten with traditional-model precision. The key diligence blockers remain current cash, true annual collaboration revenue, obligation load,
    and program-level spend by asset and stage.
  claimRefs:
  - CI031
  - CI032
  - CI033
  - CI038
  - CI040
  - CI041
