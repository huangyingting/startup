  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: current-cash-and-burn
    missingEvidence: Current cash on hand, monthly burn, and board-approved runway model showing how long insitro can fund operations without new external capital.
    whyItMatters: Without the current cash bridge, public commentary about being funded into 2027 cannot be independently verified or sensitivity-tested.
    diligencePath: Request the latest board package or management accounts showing cash, unrestricted cash, monthly gross burn, and runway scenarios.
    relatedQuestionRefs:
    - QI013
    - QI015
    - QI018
    - QI025
  - type: private-evidence-only
    severity: material
    topic: commercial-funnel-metrics
    missingEvidence: Customer-acquisition cost, active pipeline stage counts, conversion rates, and payback metrics for insitro's enterprise pharma BD funnel.
    whyItMatters: The chapter can infer a high-touch land-and-expand motion, but it cannot underwrite sales efficiency without funnel and conversion data.
    diligencePath: Request CRM funnel metrics, average deal-cycle duration, expansion conversion history, and current business-development KPI reporting.
    relatedQuestionRefs:
    - QI007
  - type: private-evidence-only
    severity: material
    topic: partner-revenue-recognition
    missingEvidence: A partner-by-partner schedule for cash received, deferred revenue, recognized revenue, and milestone timing across Gilead, BMS, and Lilly.
    whyItMatters: Public sources show cash events and cumulative partnership revenue claims, but they do not reconcile those figures to GAAP revenue or margin.
    diligencePath: Request collaboration-accounting schedules, deferred-revenue balances, and recognition policies by partner agreement.
    relatedQuestionRefs:
    - QI001
    - QI002
    - QI004
    - QI019
    - QI025
  - type: conflicting-data
    severity: material
    topic: public-tracker-estimates
    missingEvidence: A management-confirmed source of truth for current revenue, total capital raised, headcount, and valuation that can reconcile tracker disagreement.
    whyItMatters: Trackers diverge enough that they can mislead valuation, runway, and commercialization discussions if used without reconciliation.
    diligencePath: Request the latest cap-table summary, current employee count, last priced round materials, and audited or board-approved revenue bridge.
    relatedQuestionRefs:
    - QI011
    - QI012
    - QI014
    - QI024
  - type: missing-source
    severity: material
    topic: obligations-and-capex
    missingEvidence: Public disclosure of lease commitments, equipment financing, cloud contracts, debt facilities, and other non-cancelable obligations.
    whyItMatters: These obligations determine true capital intensity and can materially shrink effective runway even when headline cash appears large.
    diligencePath: Request lease schedules, debt agreements, committed cloud or compute contracts, and property/equipment capex plans.
    relatedQuestionRefs:
    - QI010
    - QI018
    - QI023
    - QI025
  - type: private-evidence-only
    severity: material
    topic: program-level-unit-economics
    missingEvidence: By-program spend for internal metabolic, neuroscience, and ophthalmology assets, including preclinical, IND-enabling, and clinical-readiness budgets.
    whyItMatters: Without program-level allocation, investors cannot tell whether partner cash is subsidizing platform R&D efficiently or simply offsetting a structurally high burn base.
    diligencePath: Request program-by-program budget, milestone plan, and expected external versus internal funding mix for the next 24 months.
    relatedQuestionRefs:
    - QI008
    - QI009
    - QI016
    - QI020
