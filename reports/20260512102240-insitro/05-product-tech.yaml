  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: quality-security-certifications
    missingEvidence: No public disclosure of SOC 2, ISO 27001, GxP quality systems, HIPAA attestations, or other enterprise-grade certification packages for the discovery platform.
    whyItMatters: Without formal audit artifacts, diligence cannot tell whether the platform’s data handling and model-development controls are enterprise-ready or merely described at a principles level.
    diligencePath: Request current security and quality audit packages, vendor questionnaires, penetration-test summaries, and any GxP or laboratory quality-system documentation that governs model-supported programs.
    relatedQuestionRefs:
    - QE018
    - QE025
  - type: private-evidence-only
    severity: material
    topic: throughput-and-reliability-metrics
    missingEvidence: Public sources do not disclose screen throughput, model retrain cadence, design-make-test turnaround time, uptime, incident history, or partner support SLAs.
    whyItMatters: A discovery stack can be scientifically impressive yet operationally brittle; investors need industrial throughput and reliability evidence, not just capability descriptions.
    diligencePath: Request platform ops dashboards showing screens per quarter, average cycle times by module, incident logs, partner support commitments, and target-to-candidate productivity metrics.
    relatedQuestionRefs:
    - QE019
    - QE025
  - type: private-evidence-only
    severity: material
    topic: clinical-translation-validation
    missingEvidence: There is no public multi-program evidence showing that insitro’s target-selection or therapeutic-design stack systematically improves clinical outcomes versus conventional discovery methods.
    whyItMatters: The platform premium in valuation depends on translation, not merely on compelling preclinical case studies or partner milestones.
    diligencePath: Request target-to-candidate and candidate-to-clinic conversion benchmarks, retrospective hit-rate comparisons, and any blinded validation studies linking platform outputs to later-stage success.
    relatedQuestionRefs:
    - QE021
    - QE025
  - type: private-evidence-only
    severity: material
    topic: partner-data-rights-and-governance
    missingEvidence: The public record does not expose the detailed data-rights, retraining rights, model-output ownership, or privacy-governance terms that govern partner datasets and co-developed models.
    whyItMatters: These terms determine whether insitro compounds its data advantage across partners or ends up with fragmented rights and limited reuse.
    diligencePath: Request collaboration contracts or summaries covering data-use restrictions, model retraining rights, output ownership, privacy obligations, and change-of-control terms for key partnerships.
    relatedQuestionRefs:
    - QE016
    - QE024
    - QE025
  - type: missing-source
    severity: material
    topic: architecture-benchmarking
    missingEvidence: No public source benchmarks insitro’s full-stack architecture against peers on end-to-end productivity, cost per validated target, or lead-to-candidate speed.
    whyItMatters: Without normalized benchmarks, it is hard to separate genuine system advantage from well-packaged platform storytelling.
    diligencePath: Request internal benchmark studies, partner scorecards, and program retrospectives that compare insitro’s workflow output to prior or conventional discovery approaches.
    relatedQuestionRefs:
    - QE020
    - QE022
    - QE025
