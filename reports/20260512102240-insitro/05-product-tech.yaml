    - Multiple ALS targets nominated and advanced into modality work
    - No public human efficacy proof yet
  - - Design small molecules for hard targets
    - ADMET and PK are slow and costly to optimize experimentally
    - ChemML / TherML active-learning loop
    - Partner expansions and Lilly ADMET collaboration show partner pull
    - No public candidate-quality benchmark or success-rate disclosure
  - - Advance metabolic RNA and antibody programs
    - Modality choice can be constrained by internal tool bias
    - TherML plus Lilly delivery and antibody agreements
    - insitro retains rights while broadening modality options
    - Timing to clinic for named assets remains private
  - - Explore multimodal NHS cases
    - Label-based search underuses high-dimensional histopathology and genomics
    - Embedding search engine for Genomics England
    - Semantic retrieval inside secure research environment
    - No public usage or outcome metrics
  - - Build ocular biomarker models for neurodegeneration
    - OCT data are rich but hard to use at scale for target discovery
    - INSIGHT / Moorfields foundation model collaboration
    - Access to millions of linked OCT images in secure environment
    - Still collaboration-stage; no public deployment metrics
  - - Generate obesity targets from scalable human phenotypes
    - BAT is difficult to measure at population scale
    - ClinML phenotype plus CellML screening and in vivo follow-up
    - Named preclinical asset BAT-01 with animal efficacy data
    - Preclinical proof only
  notes: Benefits are limited to what has been publicly described by insitro or its named partners; commercial value capture is still mostly opaque.
