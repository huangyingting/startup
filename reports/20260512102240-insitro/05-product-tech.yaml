company:
  name: insitro
chapter:
  number: 5
  title: Product & Technology
  summary: 'insitro’s public product surface is best understood as an end-to-end AI-enabled drug-discovery system rather than as a conventional software SKU. The stack starts with multimodal human and cellular data, moves through causal target discovery in Virtual Human, ClinML, and CellML/POSH, and then extends into modality-aware therapeutic design through ChemML and TherML across small molecules, oligonucleotides, and biologics. Public partner proof is real: Genomics England and INSIGHT/Moorfields describe secure-environment deployments, while BMS and Lilly collaborations show the platform being used to nominate targets, design modalities, and build ADMET models. Developer signal also exists through public GitHub repositories and cp-posh assets. The key caveat is that maturity is still preclinical or collaboration-led. Public evidence does not reveal throughput, support SLAs, formal certification posture, or broad clinical-translation proof, so the product story is differentiated and
    credible but not yet fully auditable.'
sections:
- id: product-definition-and-delivered-workflow
  title: 'Product definition in workflow terms: discovery system first, product SKU second'
  body: 'Public materials consistently describe insitro less as a software vendor and more as an industrialized discovery system. The company starts with multimodal human-cohort and clinical data, adds internally generated cellular and perturbation data, and uses machine learning to derive causal hypotheses about disease biology. That output is then pushed into a second layer of therapeutic design rather than stopping at target ranking. This matters because it clarifies what the “product” actually is in customer terms: for pharma partners it is a workflow that can move from biology discovery to optimized intervention design; for data partners it can be a specific deployed tool such as embedding search or a co-developed foundation model; and for insitro internally it is the operating system that produces retained pipeline assets. The absence of public pricing, self-serve API surfaces, or packaged software documentation reinforces that the public product surface is workflow-centric and collaboration-specific,
    not a generalized enterprise SaaS platform.'
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE019
  - CE020
  - CE029
  tableRefs:
  - TE002
  figureRefs:
  - FE002
- id: module-map-and-operating-architecture
  title: 'Module map and operating architecture: from causal biology to modality-aware design'
  body: 'insitro’s architecture is publicly legible as a layered system. At the discovery end, Virtual Human is described as the causal-biology engine, while ClinML and CellML create the phenotypes and cellular evidence that make that causal map actionable. POSH sits inside the cellular perturbation layer as a high-content screening mechanism that preserves phenotypic depth at scale rather than collapsing everything to low-dimensional readouts. Downstream, TherML and ChemML convert that biological insight into intervention design, with active-learning loops tied directly to automated laboratories. The result is not just a collection of models but a pipeline-shaped operating model: discover disease structure, identify leverage points, choose modality, generate compound or oligo candidates, and iterate using experimental feedback. Public GitHub assets and cp-posh resources make slices of this architecture tangible, but the full stack remains partly opaque because only research-facing fragments
    are open while the most valuable datasets, internal models, and operating metrics remain private.'
  claimRefs:
  - CE004
