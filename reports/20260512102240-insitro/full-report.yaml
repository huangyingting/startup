              relationship can move from target discovery into chemistry, modality expansion, or ecosystem exposure: BMS
              broadened across targets and modalities; Lilly broadened into ADMET and TuneLab; Genomics England can
              expose insitro search to a wider research network. On the downside, Joe Hand’s 2026 company statement
              lumps roughly $150 million of partnership revenue into just three names—BMS, Lilly, and Gilead—without
