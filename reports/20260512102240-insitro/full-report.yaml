      - number: '5.5'
        title: 'Trust, safety, privacy, compliance, and quality controls: principles are visible; audits are not'
        blocks:
          - type: paragraph
            body: >-
              Public trust evidence is directionally positive but incomplete. Genomics England and INSIGHT/Moorfields
              both emphasize secure research environments and restricted data access, which is meaningful because
              insitro’s platform touches sensitive clinical and imaging datasets. External frameworks also give a clear
              view of what “good” should look like: FDA highlights risk-based credibility assessments for AI models used
              in drug decision-making, EMA emphasizes data governance and lifecycle management, and WHO frames trust and
              ethics as foundational because technical deployment is moving faster than law. But insitro’s own public
              disclosures remain thin on operational detail. The published privacy policy is website-focused, not a
              window into collaboration-data controls, and no sourced materials disclosed SOC 2, ISO 27001, GxP, HIPAA,
              or HITRUST certification posture. That leaves a familiar diligence conclusion: the company appears to
              understand the right governance language, but investors still need private evidence to verify whether
              those controls are implemented at industrial depth across the actual discovery workflow.
