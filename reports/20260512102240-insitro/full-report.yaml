      - number: '1.3'
        title: Capitalization, partner economics, and stakeholder map
        blocks:
          - type: paragraph
            body: >-
              Open sources show a capital stack built from both equity financings and collaboration cash, which is why
              public numbers disagree. Forbes reported that the 2020 Series B brought total venture funding to $243
              million, and insitro’s 2021 press release documented a $400 million Series C with CPP Investments leading.
              But later company releases cite more than $700 million and then approximately $800 million of capital when
              partnership cash is included, while third-party trackers publish inconsistent funding and valuation
              figures. The cleaner conclusion is that insitro has attracted a top-tier private syndicate and meaningful
              pharma cash, but not that any single public number should be treated as canonical. The partner map is
              economically important: Gilead validated the early NASH thesis, Bristol Myers Squibb remains the most
              financially material neuroscience collaborator, and Lilly broadened the metabolism strategy with both 2024
              and 2025 agreements. That concentration helps explain both the upside and the financing risk, because a
              small set of counterparties drive much of the public evidence for external validation, milestone inflows,
              and downstream optionality.
