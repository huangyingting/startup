      - number: '8.4'
        title: 'Comparable context and scenario ranges: public techbio marks set the guardrails'
        blocks:
          - type: paragraph
            body: >-
              The strongest public protection against overpaying is the comp set. As of May 2026, Eikon trades around
              $0.54 billion, Absci around $0.90 billion, Schrödinger around $0.95 billion, Recursion around $1.73
              billion, and Relay around $2.46 billion. Those are imperfect peers, but each offers an instructive
              constraint. Eikon shows how fast public markets can reset an early proof story. Absci shows that
              AI-biology platforms can remain sub-$1 billion. Schrödinger shows that even a more monetized computational
              platform does not receive a software-style premium. Recursion shows that scale, capital, and partnerships
              do not automatically sustain a very high multiple. Relay shows that clearer clinical assets can push a
              company toward the top of the public range, but still not into unconstrained territory. Against that
              backdrop, insitro’s public-evidence base case belongs around $1.5-2.5 billion, its bear case around
              $0.8-1.3 billion, and its bull case around $3.0-4.5 billion only if clinic entry and partner conversion
              improve materially.
