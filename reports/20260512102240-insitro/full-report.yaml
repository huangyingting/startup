      - number: '8.3'
        title: 'Financing context and entry discipline: old anchor, noisy trackers, limited margin for error'
        blocks:
          - type: paragraph
            body: >-
              The cleanest financing anchor remains the 2021 Series C. insitro officially disclosed the $400 million
              raise, and Forge estimates the post-money at roughly $2.57 billion. Beyond that, public valuation
              visibility becomes much softer. GetLatka and Awaira both place insitro in the low-$2 billion range, but
              they conflict on revenue, funding totals, and even basic round details. Usearch cuts revenue down to $7.5
              million while GetLatka claims $69 million. That level of disagreement is not a small accounting issue; it
              means public trackers are useful only as rough signposts. The practical result is an entry-discipline rule
              rather than a target price. Below about $2.0 billion effective post-money with clean terms, the
              opportunity begins to look interesting enough for deeper work. Around the old $2.57 billion anchor, the
              public record supports only modest upside. Above roughly $3 billion, investors are paying for private
              proof the public file does not contain.
            claimRefs:
              - CV003
              - CV005
              - CV006
              - CV007
              - CV008
