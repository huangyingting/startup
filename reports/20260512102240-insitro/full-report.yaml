    title: Financials
    sections:
      - number: '4.1'
        title: 'Revenue model and pricing: bespoke partnership economics, not list pricing'
        blocks:
          - type: paragraph
            body: >-
              Public evidence supports only one clean monetization conclusion: insitro is not being sold through product
              revenue or public seat-based software pricing. Instead, value is packaged through bespoke pharma
              collaborations and milestone-bearing extensions. The 2020 Bristol Myers Squibb deal disclosed $50 million
              upfront, $20 million in near-term operational milestones, more than $2 billion in downstream milestones,
              and royalties. By late 2024, insitro had announced a further $25 million BMS milestone; the 2025 ChemML
              extension could add up to $20 million more funding; and the 2026 target-expansion announcement added
              another $10 million milestone. Lilly’s 2024 structure shows a different economic design: insitro keeps
              full global rights while Lilly becomes eligible for milestones and royalties, meaning the partnership can
              accelerate assets without functioning as a clean annual-revenue stream. Official 2026 company messaging
              says insitro has generated about $150 million of partnership revenue across BMS, Lilly, and Gilead, but
              that figure is cumulative and unaudited. The result is a real but hard-to-normalize revenue base:
              meaningful partner cash, weak public pricing transparency, and no audited product-sales engine.
            claimRefs:
