      - number: '4.6'
        title: 'Financial verdict: real partner validation, still heavy financing dependence'
        blocks:
          - type: paragraph
            body: >-
              insitro is not a zero-validation science project. Major pharma has paid it real cash, extended at least
              one core relationship repeatedly, and given the company a plausible route from platform work toward
              milestone, royalty, or internally retained asset value. That is stronger than the economics of a purely
              preclinical biotech with no monetization. But the company is still financing-dependent by public evidence.
              There is no audited cash position, no clean annual revenue bridge, no disclosed obligation schedule, and
              no credible public way to underwrite current gross margin or burn. The 2025 restructuring suggests
              management is still optimizing for proof-point reach rather than for self-sustaining operating leverage.
              Relative to public AI-biopharma peers, insitro likely has a financially credible platform story, but not
              one that can yet be underwritten with traditional-model precision. The key diligence blockers remain
              current cash, true annual collaboration revenue, obligation load, and program-level spend by asset and
              stage.
