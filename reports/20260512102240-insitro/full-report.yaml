      - number: '7.2'
        title: 'Regulatory, legal, and data-governance risk: visible principles, limited company-specific evidence'
        blocks:
          - type: paragraph
            body: >-
              FDA and EMA now provide a reasonably clear picture of what “good” looks like for AI in drug development.
              FDA points to a significant increase in AI-related submissions, a risk-based regulatory framework, and the
              importance of context of use. EMA explicitly extends its reflection paper from drug discovery through
              post-authorisation and highlights bias, patient safety, privacy, and data governance. For US-facing
              programs, those expectations sit next to formal legal rules around IND submissions and electronic records.
              insitro’s public record, by contrast, does not show a mapped validation package against those
              expectations. The legal picture is similarly mixed. The website privacy policy is narrow and
              site-specific; it is not a substitute for partner-data governance documentation. Genomics England and
              INSIGHT show serious secure-environment controls, but those controls live in partner environments and may
              also restrict data portability and reuse. Patents indicate a real IP surface, yet freedom-to-operate,
              licensing encumbrances, litigation history, and indemnity terms remain private. The result is not a red
              flag of known noncompliance, but a material visibility gap in exactly the areas regulators and
              sophisticated partners care about most.
            claimRefs:
