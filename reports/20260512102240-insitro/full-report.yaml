      - number: '3.3'
        title: Capability, packaging, GTM, and switching-cost comparisons
        blocks:
          - type: paragraph
            body: >-
              Capability comparison is less about who “uses AI” and more about what kind of proof each company can
              attach to that claim. insitro’s public angle is multimodal human and cellular data tied to disease
              understanding and internal pipeline formation. Recursion’s public edge is dataset and industrial scale.
              Insilico’s public edge is velocity and repeated program output. Xaira sells a virtual-cell ambition, while
              Isomorphic Labs sells AlphaFold-adjacent predictive design. Schrödinger is the clearest computational
              substitute, and Evotec is the clearest integrated-service substitute. Public pricing comparison is much
              weaker than capability comparison. In reviewed sources, economics are disclosed through collaboration
              structures, license-outs, milestone packages, and service or partnering posture—not through transparent
              seat pricing or menu-based packaging. That makes GTM and switching-cost analysis especially important.
              Buyers can likely multi-home across several platforms before deep integration, but switching costs rise
              once data, model workflows, or program rights are embedded inside a collaboration. Distribution power,
              meanwhile, still favors big pharma and later-stage commercial organizations over insitro and most private
              peers.
