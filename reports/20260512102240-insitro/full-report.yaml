      - number: '2.4'
        title: Growth drivers, adoption constraints, and preserved contradictions
        blocks:
          - type: paragraph
            body: >-
              The growth case for insitro’s market is straightforward. Disease burdens in obesity, MASLD, vision, and
              neurodegeneration are large; pharmaceutical R&D budgets are enormous; and AI is spreading deeper into the
              medicines lifecycle across discovery, safety, and operations. At the same time, the category’s adoption
              constraints are unusually important. WHO and EMA both stress governance, risk management, and lifecycle
              controls. McKinsey says pharma has not yet seen clear proof that AI alone materially shortens timelines or
              boosts success rates, and KPMG notes that tougher financing conditions pushed buyers toward lower-risk
              structures. Those facts mean enthusiasm does not automatically convert into premium economics. Investors
              therefore need to preserve two tensions instead of collapsing them. First, analyst market forecasts are
              bullish but non-comparable. Second, disease burden confirms demand, but it does not prove that insitro
              captures software revenue, partnership revenue, or future product revenue at attractive conversion rates.
              The chapter should therefore carry forward explicit gaps around exact SAM, buyer conversion, and
              category-level proof of AI productivity.
