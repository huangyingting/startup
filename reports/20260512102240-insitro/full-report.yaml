  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: 'Recommendation and valuation framework: price discipline comes before enthusiasm'
        blocks:
          - type: paragraph
            body: >-
              The first question is not whether insitro is impressive. It clearly is. The question is whether public
              evidence is sufficient to price it. Public sources show real positives: marquee partners, repeated BMS
              expansion, roughly $150 million of cumulative partnership revenue, and roughly $800 million of capital
              raised or cited. But they do not show the current entry price, preference stack, current cash balance,
              reliable annual revenue, or a human-data proof point for internal assets. That makes a hard buy or hard
              avoid call look forced. The honest public-evidence stance is research-more and price-sensitive. The right
              framework is therefore not a single-point target return but a set of reference ranges built from public
              comps, the last known financing anchor, and proof-state assumptions. If the company is being offered near
              the public-comp cluster plus a rational premium, diligence may be worthwhile. If it is already being
              priced like a de-risked frontier platform, the public record says slow down.
            claimRefs:
              - CV001
