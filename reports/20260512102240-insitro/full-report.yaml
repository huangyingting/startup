      - number: '1.2'
        title: Leadership, governance, and organizational fit
        blocks:
          - type: paragraph
            body: >-
              Founder and CEO Daphne Koller remains the company’s central public face and the clearest source of
              founder-market fit. External coverage ties her credibility to deep machine-learning expertise and the
              prior creation of Coursera, while company materials emphasize her role in building a cross-disciplinary
              culture that blends data science, biology, and drug development. Since the 2021 financing cycle,
              governance has gained more drug-development and clinical evidence depth through board and executive
              additions. Paul McCracken joined the board through the Series C financing, Amy Abernethy joined in 2024
              with FDA and real-world evidence experience, and Joe Hand became chief people officer in 2026 to
              professionalize talent strategy as the company scales. Those hires signal a company preparing for more
              mature portfolio management and organizational discipline. At the same time, public sources still do not
              reveal a full board-control map, succession planning, or preference structure, so governance remains
              directionally visible but economically opaque.
