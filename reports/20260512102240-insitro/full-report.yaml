      - number: '2.3'
        title: Buyer, user, payer, and adoption path
        blocks:
          - type: paragraph
            body: >-
              insitro’s buyer map changes depending on where one sits in the value chain. In the current partnership-led
              model, the buyer is usually a pharmaceutical R&D or business-development organization deciding whether
              insitro’s discovery engine, disease models, or target work justify upfront capital and milestone exposure.
              The functional users are scientific teams on both sides, while the budget owner is a pharma R&D or
              external-innovation budget. The adoption path is therefore evidence-heavy: platform validation,
              disease-model credibility, target nomination, and then negotiated development rights with milestone
              structures. In a later internal-drug path, the buyer map shifts. Physicians, health systems, and payers
              become relevant only after clinical proof and regulatory clearance, and that path is still mostly
              hypothetical for insitro. The data collaborations with Genomics England and Moorfields sit alongside this
              as enabling inputs rather than direct clean-market outputs. This is why buyer analysis matters so much for
              valuation: the company’s immediate revenue path is controlled by sophisticated counterparties who demand
              proof long before patients or payers ever see the product.
