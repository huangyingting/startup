      - number: '2.2'
        title: 'Sizing lenses: AI market forecasts, R&D budgets, and disease-burden demand'
        blocks:
          - type: paragraph
            body: >-
              Public sizing data exists, but it does not line up neatly enough to produce a single underwritten TAM.
              Analyst pages for AI in pharma and AI in drug discovery are directionally bullish, with forecasts ranging
              from low-single-digit billions today to mid-teens or even mid-twenties of billions by the early 2030s.
              Those estimates, however, mix different category boundaries: some include broad pharmaceutical AI
              workflows, some isolate drug discovery, and others include the wider precision-medicine software stack. A
              second lens is the budget pool behind the buyer: EFPIA estimates EUR 55 billion of pharmaceutical R&D
              spend in Europe alone in 2024, which shows the scale of the buyer base that can fund partnerships. A third
              lens is demand pull from disease burden. WHO reports 890 million adults living with obesity, insitro’s
              Lilly release says MASLD affects about 100 million people in the United States, WHO reports 2.2 billion
              people with vision impairment, and CDC estimates 9.6 million U.S. people with diabetic retinopathy. These
              figures confirm large demand domains around insitro’s programs, but they are not interchangeable with a
              software or partnership TAM. The clean conclusion is that insitro’s market must be sized through multiple
              evidence-constrained lenses, not through one generic headline number.
