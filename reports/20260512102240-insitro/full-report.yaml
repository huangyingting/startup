  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Product definition in workflow terms: discovery system first, product SKU second'
        blocks:
          - type: paragraph
            body: >-
              Public materials consistently describe insitro less as a software vendor and more as an industrialized
              discovery system. The company starts with multimodal human-cohort and clinical data, adds internally
              generated cellular and perturbation data, and uses machine learning to derive causal hypotheses about
              disease biology. That output is then pushed into a second layer of therapeutic design rather than stopping
              at target ranking. This matters because it clarifies what the “product” actually is in customer terms: for
              pharma partners it is a workflow that can move from biology discovery to optimized intervention design;
              for data partners it can be a specific deployed tool such as embedding search or a co-developed foundation
              model; and for insitro internally it is the operating system that produces retained pipeline assets. The
              absence of public pricing, self-serve API surfaces, or packaged software documentation reinforces that the
              public product surface is workflow-centric and collaboration-specific, not a generalized enterprise SaaS
              platform.
