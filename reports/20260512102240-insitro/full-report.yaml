      - number: '3.2'
        title: 'Competitor profiles: scale, funding, and public proof signals'
        blocks:
          - type: paragraph
            body: >-
              Among direct peers, Recursion/Exscientia is the clearest scale benchmark in public markets: a large
              biological-data moat, >10 internal programs, >10 partnered programs, and hundreds of millions of dollars
              of realized partner cash. Insilico looks strongest on public proof cadence among generative-AI peers, with
              40-plus total programs, multiple IND-cleared assets, and specific license-out economics disclosed. Xaira
              and Isomorphic Labs show the strongest public platform ambition among private peers, with Xaira pushing a
              virtual-cell thesis and Isomorphic extending AlphaFold-derived design into major pharma collaborations and
              a large funding round. Generate Biomedicines and Valo Health look more differentiated by modality or
              human-causal-biology angle than by clear public commercial proof. BenevolentAI is still a meaningful
              category reference because its knowledge-graph heritage made it an early AI drug-discovery leader, yet its
              strategic overhaul and proposed delisting show how quickly category narratives can compress when execution
              or market appetite softens. Taken together, the profile set suggests insitro is differentiated, but not
              the category’s scale or funding leader.
