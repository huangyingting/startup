      - number: '1.5'
        title: Adverse signals and open diligence gaps
        blocks:
          - type: paragraph
            body: >-
              The cleanest adverse signal in open sources is the 2025 workforce reduction. BioPharma Dive reported a 22
              percent cut that left insitro with roughly 230 workers and explicitly tied the move to clinic readiness
              and the tougher funding climate. That fact matters because current tracker pages still publish materially
              different employee counts, funding totals, and valuation estimates, so the company snapshot is less
              precise than the surface narrative suggests. The same ambiguity applies to revenue quality: low-quality
              trackers publish revenue estimates, but no reviewed public source provided an audited current revenue mix
              or balance-sheet bridge. Taken together, the adverse picture is not that insitro lacks technical ambition
              or partner validation; it is that the public diligence record is thin where an investor would most want
              precision. Current valuation, customer concentration, debt or secondary history, and exact current
              operating scale all remain unresolved enough that later chapters should treat them as open underwriting
              questions rather than settled facts.
