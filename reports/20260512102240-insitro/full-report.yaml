chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and current stage
        blocks:
          - type: paragraph
            body: >-
              insitro positions itself as an AI therapeutics company built on causal biology rather than as a pure
              software vendor or tools provider. The company was founded in 2018 by Daphne Koller, is headquartered at
              279 East Grand Avenue in South San Francisco, and publicly frames its mission as decoding disease with
              multimodal human and cellular data plus machine learning. That framing matters because insitro is now
              selling neither a single therapeutic asset nor a horizontal ML platform; it is trying to build a
              repeatable engine that can move from target discovery into modality-specific drug design and then into
              internally controlled pipeline assets. The public website and purpose page show a company still anchored
              in drug discovery and development, not commercialization. It has no marketed product, but it does have a
              disclosed portfolio of programs and a growing set of data and design partnerships that move it beyond the
              pre-seed “AI for biotech” phase into a late-private, preclinical-to-IND-enabling operating stage.
