  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: 'Severity-ranked risk posture: translation and AI-governance risks dominate the stack'
        blocks:
          - type: paragraph
            body: >-
              insitro’s risk stack is led by two tightly linked issues: getting AI-enabled discovery into the clinic,
              and doing so under a regulatory environment that is getting more explicit about context of use, data
              governance, lifecycle management, and credibility evidence. Public proof still sits at the preclinical and
              collaboration stage. The MASLD update frames CTRO-1013 as moving through IND-enabling work toward
              first-in-human, while layoffs and runway language show that timing matters financially as well as
              scientifically. This creates a compounding structure: if translation slows, milestone timing and financing
              flexibility can deteriorate together. The customer side does not offset this risk because partnership
              validation is concentrated in BMS, Lilly, and Gilead rather than spread across a broad portfolio. The
              chapter therefore treats clinic-readiness risk, AI-governance risk, and concentration-financing risk as
              the three most important categories, with data-rights, quality-certification opacity, and people-execution
              risk as amplifiers rather than independent distractions.
