  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, adjacencies, and status-quo substitutes
        blocks:
          - type: paragraph
            body: >-
              The first analytical mistake with insitro is to call its market simply “AI in pharma” or simply “obesity
              drugs.” The company is not yet a commercial drug seller, but it is also no longer a pure tools vendor. Its
              own platform and pipeline pages show a business model that uses multimodal human and cellular data,
              machine learning, and design tooling to generate both internal programs and partner-facing discovery
              output. That means the near-term monetizable market is partnership and milestone economics with
              pharmaceutical R&D buyers, while the downstream economic upside sits in much larger therapeutic end
              markets that will matter only if internal assets reach later development. The right boundary therefore has
              three layers: AI-enabled drug-discovery partnerships, insitro-controlled therapeutic programs in
              metabolism, neuroscience, and ophthalmology, and data-intensive discovery collaborations that strengthen
              the platform. The status-quo alternatives are internal pharma discovery teams, conventional CRO and
              medicinal-chemistry workflows, and competing AI-biopharma platforms such as Recursion, Schrödinger, Relay,
              and Evotec—not consumer digital-health tools or hospital IT software.
