      - number: '4.5'
        title: Public financial gaps and unreconciled estimates
        blocks:
          - type: paragraph
            body: >-
              From an underwriting perspective, the biggest problem is not the absence of signals but the absence of
              reconciled signals. Public sources do not disclose current cash, monthly burn, deferred revenue, debt,
              lease commitments, or program-level spend. Trackers disagree on funding, revenue, valuation, and
              headcount, and the company’s own capital and partnership-revenue claims are cumulative rather than
              audit-style period disclosures. Even where public benchmarks exist, they cannot answer insitro-specific
              questions such as how much collaboration cash is recognized as revenue, what gross margin is earned on
              active partner work, or how much capital has already been committed to internal clinical programs.
              Public-comparable filings are useful for bounding category capital intensity, not for replacing company
              data. The result is that almost every real financial judgment—runway, burn net of partner cash, next-round
              size, or dilution risk—still depends on private disclosures rather than on a complete public record.
