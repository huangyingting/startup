      - number: '5.2'
        title: 'Module map and operating architecture: from causal biology to modality-aware design'
        blocks:
          - type: paragraph
            body: >-
              insitro’s architecture is publicly legible as a layered system. At the discovery end, Virtual Human is
              described as the causal-biology engine, while ClinML and CellML create the phenotypes and cellular
              evidence that make that causal map actionable. POSH sits inside the cellular perturbation layer as a
              high-content screening mechanism that preserves phenotypic depth at scale rather than collapsing
              everything to low-dimensional readouts. Downstream, TherML and ChemML convert that biological insight into
              intervention design, with active-learning loops tied directly to automated laboratories. The result is not
              just a collection of models but a pipeline-shaped operating model: discover disease structure, identify
              leverage points, choose modality, generate compound or oligo candidates, and iterate using experimental
              feedback. Public GitHub assets and cp-posh resources make slices of this architecture tangible, but the
              full stack remains partly opaque because only research-facing fragments are open while the most valuable
              datasets, internal models, and operating metrics remain private.
