  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Landscape: direct peers, adjacents, substitutes, and likely entrants'
        blocks:
          - type: paragraph
            body: >-
              insitro does not face a single obvious rival. The competitive set breaks into at least three buckets.
              First are direct AI-drug-discovery peers that also try to turn proprietary data, machine learning, and
              wet-lab workflows into therapeutic pipelines or partnerable programs. In reviewed public sources, the
              clearest names are Recursion/Exscientia, Insilico Medicine, Xaira, Isomorphic Labs, Generate Biomedicines,
              Valo Health, and BenevolentAI. Second are adjacent substitutes such as Schrödinger and Evotec that solve
              similar buyer problems through different packaging: physics-based computational discovery, integrated R&D
              services, or flexible partnering. Third is internal pharma build, which remains the default substitute
              whenever a large buyer chooses to keep discovery in-house rather than pay an external platform. This
              matters because it means insitro competes not only on raw science, but also on whether buyers believe its
              multimodal human-data approach is sufficiently differentiated from a proliferating set of AI narratives
              and substitute workflows.
