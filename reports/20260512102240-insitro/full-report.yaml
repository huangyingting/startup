      - number: '5.3'
        title: 'Deployment, maturity, and roadmap: real partner use, still mostly preclinical proof'
        blocks:
          - type: paragraph
            body: >-
              The strongest maturity evidence is not broad customer rollout but repeated use inside specific
              collaborations and named programs. Bristol Myers Squibb first engaged insitro to build ALS and FTD disease
              models, then converted that relationship into nominated targets, a ChemML-based molecule-design phase, and
              finally a multimodality expansion that spans oligonucleotides and small molecules. Lilly likewise
              broadened from metabolic agreements around siRNA-delivery and antibody discovery into small-molecule ADMET
              model development. Outside pharma, Genomics England and INSIGHT/Moorfields describe partner-specific
              deployments of insitro technology inside secure environments, showing that at least some platform
              components are deliverable to external organizations. The roadmap from late 2025 into 2026 also matters:
              POSH moved from concept to publication plus public code release, TherML launched as a branded
              therapeutic-design layer, and BAT-01 emerged as a named preclinical asset from the end-to-end stack. Even
              so, the maturity ceiling is still clear. Public proof stops mostly at preclinical or collaboration-stage
              milestones rather than approved products or public human efficacy outcomes.
