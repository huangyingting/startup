evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: current-valuation
    missingEvidence: >-
      Current priced secondary, internal board mark, or dated investor letter that establishes a supportable 2026
      valuation.
    whyItMatters: >-
      Recommendation quality depends on whether the last private mark is still defensible after the 2025 layoffs and
      pipeline reshaping.
    diligencePath: >-
      Request the latest board-approved valuation memo, cap table summary, and any 2025-2026 financing or tender
      documentation.
    relatedQuestionRefs:
      - QO010
  - type: private-evidence-only
    severity: material
    topic: revenue-mix
    missingEvidence: Audited collaboration revenue, deferred revenue, and cash balance detail by partner and by fiscal year.
    whyItMatters: Without a clean revenue and cash bridge, capital adequacy and quality-of-revenue underwriting remain speculative.
    diligencePath: Request the latest audited financial statements plus a partner-by-partner collaboration accounting schedule.
    relatedQuestionRefs:
      - QO012
  - type: missing-source
    severity: minor
    topic: customer-count
    missingEvidence: >-
      A public source that discloses how many revenue-bearing, data-bearing, or active platform customers insitro
      currently serves.
    whyItMatters: Customer concentration and commercialization readiness cannot be measured cleanly from named announcements alone.
    diligencePath: Request a current active-collaboration roster with payer type, contractual status, and expected milestone cadence.
    relatedQuestionRefs:
      - QO013
  - type: missing-source
    severity: material
    topic: capital-structure
    missingEvidence: Debt facilities, venture debt, shareholder secondary sales, preference stack, and any control-right disclosures.
    whyItMatters: These terms determine true dilution, downside protection, and who controls a future financing or exit process.
    diligencePath: >-
      Request the latest cap table, stockholder rights summary, any debt agreements, and summary of historical
      secondaries.
    relatedQuestionRefs:
      - QO023
  - type: enumeration-incomplete
    severity: minor
    topic: public-coverage-gaps-for-enumeration-tables
    missingEvidence: >-
      Complete public rosters for leadership, stakeholder economics, and chronology entries beyond the reviewed named
      disclosures.
    whyItMatters: >-
      The overview chapter relies on partial public lists for governance, investor map, and milestone chronology, so
      readers need explicit notice that the tables are not exhaustive.
    diligencePath: >-
      Request a current org chart, cap table summary, and company-approved chronology that can reconcile omitted or
      undisclosed rows.
    relatedQuestionRefs:
      - QO05
      - QO24
      - QO25
    relatedTableRefs:
      - TO002
      - TO003
      - TO004
  - type: missing-source
    severity: material
    topic: exact-sam
    missingEvidence: >-
      A public source that isolates TAM, SAM, or SOM for insitro’s exact mix of AI platform partnerships plus metabolic,
      neuro, and ophthalmic pipeline exposure.
    whyItMatters: >-
      Without a boundary-matched market definition, valuation models can overstate opportunity by mixing software spend,
      R&D budgets, and end-disease demand.
    diligencePath: >-
      Request management’s internal market-sizing memo with separate lenses for partnership revenue, internal pipeline
      revenue, and data-asset advantage.
    relatedQuestionRefs:
      - QM012
      - QM025
  - type: private-evidence-only
    severity: material
    topic: buyer-budget-allocation
    missingEvidence: >-
      Partner-by-partner budget owners, pilot-to-deal conversion rates, and average deal-cycle timing for insitro’s
      current buyer funnel.
    whyItMatters: >-
      The chapter can identify likely buyers, but it cannot underwrite how reliably platform interest converts into
      signed economics without private conversion data.
    diligencePath: Request current CRM funnel metrics, deal-stage definitions, and recent business development win/loss notes.
    relatedQuestionRefs:
      - QM014
      - QM016
  - type: private-evidence-only
    severity: material
    topic: downstream-commercial-path
    missingEvidence: >-
      Target product profiles, anticipated label claims, pricing assumptions, and payer-access planning for insitro’s
      internal programs.
    whyItMatters: >-
      The downstream buyer and payer path can only be described generically until the company exposes real launch
      assumptions and indication sequencing.
    diligencePath: Request target product profiles, market-access workups, and any internal demand modeling for lead programs.
    relatedQuestionRefs:
      - QM015
      - QM017
  - type: conflicting-data
    severity: minor
    topic: ai-market-boundary
    missingEvidence: >-
      A harmonized external definition that separates AI-in-pharma, AI-in-drug-discovery, and AI-in-precision-medicine
      market categories on one comparable basis.
    whyItMatters: >-
      Published analyst forecasts are useful directional signals, but their mixed boundaries can create false precision
      if they are averaged or compared without context.
    diligencePath: >-
      Normalize analyst estimates to one market definition and one forecast horizon before using them in a valuation
      model.
    relatedQuestionRefs:
      - QM013
      - QM024
  - type: missing-source
    severity: material
    topic: clinical-productivity-proof
    missingEvidence: >-
      Comparable evidence that insitro or the AI-first peer group has improved preclinical-to-clinical conversion or
      milestone realization relative to conventional discovery baselines.
    whyItMatters: >-
      This is the core adoption skepticism in the category: buyers may admire AI workflow claims without paying premium
      economics unless clinical yield is demonstrably better.
    diligencePath: >-
      Request internal benchmark studies, partner milestone conversion analyses, and any outcome data that compares
      AI-enabled programs with conventional programs.
    relatedQuestionRefs:
      - QM021
      - QM025
  - type: private-evidence-only
    severity: material
    topic: peer-pricing
    missingEvidence: Actual pricing cards, fee schedules, or apples-to-apples commercial terms across private AI-biopharma peers.
    whyItMatters: >-
      The market packages value through bespoke partnerships, so public comparison on pricing power is weak without
      actual deal documents.
    diligencePath: Request internal market maps of recent AI-biopharma term sheets and direct competitor deal comps.
    relatedQuestionRefs:
      - QP013
