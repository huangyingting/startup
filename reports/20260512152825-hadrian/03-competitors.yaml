  - id: capability-comparison
    title: "Capability Comparison Across Competitors"
    body: >
      A side-by-side comparison of Hadrian's capabilities against its closest competitors reveals
      systematic gaps in automation depth, defense qualification, and production-scale capacity
      among alternatives.

      On AI-automated CNC programming, Hadrian's Opus platform generates machine programs automatically
      from part geometry files in minutes; Xometry offers quoting automation but relies on third-party
      suppliers to interpret and program each job; traditional job shops depend entirely on manual
      programming by experienced machinists (median age 45+). Divergent Technologies' AI automation
      is applied to topology optimization for additive manufacturing, not subtractive CNC.

      On ITAR and defense qualification, Hadrian's factory infrastructure is ITAR-registered and
      designed around defense-grade quality management (AS9100D/NADCAP-path), with its Factory 4
      operating under a direct US Navy public-private partnership. Xometry has marketplace-level ITAR
      handling but cannot guarantee each supplier in its network meets ITAR facility requirements.
      Traditional job shops vary widely — some are ITAR registered, most are not NADCAP accredited.
      Protolabs' production lines are commercial-grade, not defense-qualified.

      On production scale, Hadrian's factory model is designed for high-volume long-run production
      (1,000–10,000+ parts per month per program), not prototype or one-off jobs. This aligns with
      the DoD's need for sustained production rate increases rather than engineering samples. Xometry,
      Protolabs, and most job shops serve the full spectrum from prototypes to small batch; none has
      demonstrated the factory-scale operating model Hadrian has built for military production contracts.

      Feature breadth scores in the companion matrix (FP002) reflect assessments based on public
      evidence; cells marked "Unknown" represent gaps in publicly available evidence rather than
      confirmed absences of capability.
