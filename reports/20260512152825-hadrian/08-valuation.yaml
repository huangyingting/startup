  - id: section-scenarios
    title: Bull / Base / Bear Scenarios
    body: >
      Three scenarios are presented with explicit assumptions, valuation logic, and key risks.
      All scenario valuations are research-team estimates based on public peer multiples and
      Hadrian's disclosed revenue trajectory; they are not price targets.

      BEAR CASE (~20% probability signal): Factory 4 opens late (H2 2027 or beyond), revenue
      grows at 1.5–2× per year from the $30 million base, reaching $80–120 million by 2027.
      Public market multiples compress to 5–8× revenue as growth moderates — a range consistent
      with Proto Labs and Xometry in lower-growth periods. Implied enterprise value: $400–960
      million. This scenario results in a significant loss from the $1.6 billion Series C entry.
      Triggers include: F4 construction delays beyond Q4 2026; gross margin disclosed below 25%;
      a down-round Series D; Anduril revenue concentration exceeding 40% of total revenue.

      BASE CASE (~55% probability signal): Factory 4 opens partially on schedule (mid-2026),
      revenue grows 3–5× from the $30 million base reaching $150–250 million by 2027. Gross
      margins converge to 30–40% as F4 scales. A strategic acquisition by a defense prime
      (Lockheed, RTX, or Northrop) or a late-stage Series D at 12–20× revenue yields an
      enterprise value of $1.8–5.0 billion in 2027–2028. Return from $1.6 billion entry:
      breakeven to approximately 3×, modest but acceptable for the risk profile.

      BULL CASE (~25% probability signal): Factory 4 becomes fully operational at or near the
      March 2026 target, scales to 60–80% of theoretical capacity by 2028. Revenue reaches
      $400–600 million by 2027. EBITDA margins emerge at 15–20%. IPO or strategic acquisition
      at 25–40× revenue yields an enterprise value of $10–24 billion. Return from $1.6 billion
      entry: 6–15×. This scenario requires near-flawless F4 execution, no major defense budget
      contractions, and continued Anduril and Navy program growth without contract concentration.

      The dominant uncertainty is Factory 4 timing and execution. Investors should treat any
      delay exceeding 60 days as a partial bear-case trigger requiring model adjustment and
      should have a pre-agreed protocol for increasing or reducing exposure as milestones are
      confirmed or missed across the 2026–2027 construction ramp period.
