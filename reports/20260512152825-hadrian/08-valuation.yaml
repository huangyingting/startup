callouts:
  - calloutType: risk
    title: "The 53× Revenue Multiple Is Premised Entirely on Unconfirmed Factory 4 Success"
    claimRefs: [CV002, CV005, CV027, CV040]
    body: >
      At $1.6 billion and $30 million in 2024 revenue, Hadrian is priced at 53× trailing revenue —
      a multiple with no precedent in public defense manufacturing. Even TransDigm Group, the
      highest-quality defense components analog, trades at 12–15× revenue with demonstrated
      profitability and decades of pricing power. The Hadrian premium is justified only if
      Factory 4 (planned opening March 2026) succeeds at scale and enables $300–500 million in
      annual revenue. The Factory 4 private capital structure ($1.5 billion) is entirely opaque;
      the build has no precedent at this company; and any delay of 6+ months pushes the bull case
      into the base case or worse. Investors entering at $1.6 billion bear the full execution risk
      of a $2.4 billion public-private partnership whose private capital terms are undisclosed.

  - calloutType: insight
    title: "RTX Ventures Series B Lead Creates Strategic Acquirer Alignment"
    claimRefs: [CV031, CV006, CV029]
    body: >
      RTX Ventures (Raytheon Technologies' venture arm) led Hadrian's Series B in February 2024
      and participated in the Series C. Strategic investors at the lead level typically receive
      enhanced information rights, board observer seats, and first-look rights on acquisition
      discussions. This alignment — combined with RTX's exposure to the same defense programs
      Hadrian serves — creates an implicit acquirer pathway that may reduce exit risk relative to
      a pure financial sponsor exit. However, RTX's strategic interest could create conflicts if
      Hadrian pursues competing primes or diversifies beyond RTX's supply chain perimeter.

  - calloutType: recommendation
    title: "HOLD / RESEARCH-MORE at $1.6B — Three Conditions Required to Upgrade to BUY"
    claimRefs: [CV009, CV013, CV015, CV039]
    body: >
      The research team's recommendation is HOLD / RESEARCH-MORE. Three conditions would support
      upgrading to BUY: (1) audited or CPA-reviewed financials confirming gross margin >30% and
      cash runway >18 months; (2) confirmed Factory 4 private capital structure showing equity
      or project finance rather than senior secured debt; and (3) disclosed 2025 revenue showing
      continued 2–5× growth from the $30 million 2024 base. Meeting all three would give the
      research team sufficient confidence to support commitment at or near the $1.6 billion mark.
      Failure to meet any one condition should trigger renegotiation of entry price or a structured
      milestone-linked investment with step-up pricing tied to F4 construction confirmation.

