  - id: section-valuation-context
    title: Valuation Context and Current Round
    body: >
      Hadrian's $1.6 billion post-money valuation was established at the Series C close announced
      in July 2025, led by Founders Fund and Lux Capital, with participation from a16z, RTX Ventures,
      Altimeter Capital, 1789 Capital, and Construct Capital. SEC Form D filings (CIK 0001863211)
      confirm two tranches: a July 2025 filing showing approximately $161 million offered with
      ~$110 million sold, and a December 2025 filing showing an additional ~$151 million offered
      with ~$131 million sold across 39 investors (up from 28 in July). The total Form D-confirmed
      Series C capital is approximately $292 million — above the publicly announced $260 million
      headline figure — suggesting strong investor demand and a potential extended close or second
      tranche tied to Factory 4 milestones.

      At $1.6 billion and $30 million in 2024 revenue, the implied EV/Revenue multiple is
      approximately 53×. For context, Xometry (XMTR), the closest public peer, trades at 3–4×
      revenue; Proto Labs (PRLB) trades at approximately 1.5× revenue; TransDigm Group, the
      highest-quality public analog in defense components, trades at 12–15× EBITDA even at full
      profitability. Even applying a substantial premium for Hadrian's growth rate and its
      factory-scale capacity optionality, the current multiple implies investors are pricing in a
      scenario in which Factory 4 becomes operational and revenue scales to $300–500 million
      within three to five years.

      Dilution and preference overhang are entirely opaque: no cap table, liquidation preference
      stack, anti-dilution provisions, or pro-rata rights have been disclosed. If the $1.5 billion
      Factory 4 private capital is structured as debt or convertible project finance, equity holders
      at the Series C price could face significant liquidation preference pressure in downside
      scenarios. Entry discipline at this price requires investors to model the full downside and
      to price in the optionality cost of committing capital before Factory 4 milestones are
      confirmed. Historical private defense tech investments exit at 3–8× revenue at IPO or M&A,
      implying that Hadrian must reach $200–500 million in revenue for the $1.6 billion entry
      to produce a market-rate return at a traditional exit multiple.
