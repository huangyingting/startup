  - id: section-named-customer-proof
    title: Named Customer Proof and Production Evidence
    body: >
      Hadrian has publicly disclosed three named production customers as of May 2026: Anduril Industries,
      Lockheed Martin Missiles and Fire Control, and the US Navy. Each represents a distinct tier in the
      defense industrial base and a distinct point on the Precision Components → MaaS → FaaS value chain.


      Anduril Industries is the strongest customer proof point. The strategic manufacturing partnership
      announced in June 2023 has been confirmed by both companies via press release (Business Wire) and
      on Anduril's official website. Anduril receives rocket components, drone parts, and weapons
      subsystems from Hadrian's factories under production contracts — not pilots. The relationship has
      been active for more than three years as of the report date, providing the most durable evidence of
      production-grade delivery.


      Lockheed Martin Missiles and Fire Control entered an MOU with Hadrian in December 2025 to produce
      PAC-3 MSE, THAAD, PrSM, and GMLRS components via an embedded Hadrian manufacturing cell at a
      Lockheed facility. The MOU was confirmed by Lockheed Martin's official news site and independently
      verified by defense press (Defense News, Breaking Defense, National Defense Magazine). The MOU
      represents the transition from Precision Components supply to FaaS-tier engagement — a significant
      upsell and the strongest indication of production-level intent from a Tier-1 prime contractor.


      The US Navy's Factory 4 anchor in Cherokee, Alabama represents the FaaS tier at its most
      complete form: Hadrian designed, built, and now operates a 2.2-million-square-foot facility
      exclusively for submarine components under a public-private partnership. The Navy's $900 million
      OBBBA contribution was confirmed in federal spending databases and Navy official communications.
      This is a government contract relationship — not a pilot — with the Navy effectively co-funding
      the facility and acting as the anchor off-take customer.


      RTX / Raytheon's position is more ambiguous: RTX Ventures led Hadrian's Series B in February 2024,
      which implies internal vetting as a supply-chain partner, but no explicit production contract
      has been announced. A small number of additional unnamed defense contractors are implied by
      Hadrian's $30M 2024 revenue in excess of what the Anduril relationship alone could plausibly
      account for at known part pricing, but these customers remain unconfirmed.


      Adversarial analysis by Toarn notes that Hadrian's customer disclosure is highly limited: only
      three named customers despite $30M revenue and $625M raised creates meaningful concentration
      risk uncertainty and limits independent verification of the adoption narrative.
