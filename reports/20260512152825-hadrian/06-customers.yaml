figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    layout: standard
    caption: >
      How defense customers at each tier discover, evaluate, qualify, contract with, and expand their
      Hadrian relationship — from initial awareness through multi-year production partnership and FaaS
      deployment. All three named customer segments follow materially different entry points but converge
      on the same long-term production contract endpoint.
    data:
      nodes:
        - id: "n1"
          label: "Discovery / Referral"
          detail: "Defense prime or startup identifies machining capacity gap; hears about Hadrian via CEO network, defense-tech cohort, or peer referral"
        - id: "n2"
          label: "RFQ / Automated Quote"
          detail: "Prospect submits drawing; Hadrian Opus platform returns automated quote in minutes vs. days for legacy job shops; pricing and lead time comparison triggers engagement"
        - id: "n3"
          label: "Technical Qualification"
          detail: "AS9100D audit; first article inspection; quality plan review; typically 3–9 months for defense-grade parts; Hadrian accelerates via Opus inspection automation"
        - id: "n4"
          label: "Pilot / Initial Production"
          detail: "Initial purchase order for small-batch production; customer validates repeatability, tolerance, and delivery at volume; may include 9-month validation phase"
        - id: "n5"
          label: "Production Contract Award"
          detail: "Multi-year production SOW or blanket purchase agreement awarded; 80% of Hadrian revenue tied to 3–7 year contracts; customer locks capacity and pricing"
        - id: "n6"
          label: "MaaS Expansion"
          detail: "Customer upgrades from on-demand parts supply to dedicated MaaS cell — Hadrian operates a reserved machining capacity block for the customer's program schedule"
        - id: "n7"
          label: "FaaS / Factory-as-a-Service"
          detail: "Deepest integration: Hadrian designs, builds, and operates an entire factory for the customer at or near customer site (e.g., Lockheed Martin MFC MOU Dec 2025; Navy Factory 4)"
    claimRefs:
      - CU006
      - CU008

