  - id: section-retention-durability
    title: Retention, Contract Durability, and Customer Satisfaction
    body: >
      Hadrian has not publicly disclosed any Net Revenue Retention (NRR), Gross Revenue Retention (GRR),
      customer churn rate, or Net Promoter Score for any period. As a private company serving a B2G and
      B2B industrial market, Hadrian is not covered on G2, Capterra, Gartner Peer Insights, or any other
      consumer-facing review platform. This makes quantitative retention analysis impossible from public
      sources.


      Structural retention analysis from the contract model provides a qualitative proxy. Approximately 80%
      of Hadrian's revenue derives from multi-year production contracts (3–7 years per company-stated
      figures), meaning the majority of revenue is locked in against a schedule rather than subject to
      annual renewal. The switching costs for defense production customers are extremely high: replacing a
      qualified machining supplier requires re-running AS9100D audits, first article inspections, and
      qualification programs that can take 12–18 months and cost millions of dollars. Once Hadrian is
      on-program as a qualified supplier, churn is structurally very unlikely within the contract term.


      The Anduril relationship is the strongest retention data point available. The partnership has been
      active and publicly referenced continuously from June 2023 through the report date — approximately
      three years. There has been no public indication of volume reduction, re-sourcing, or contract
      dispute. The fact that Anduril has continued to reference Hadrian as a manufacturing partner in
      official materials through 2025 and 2026 provides reasonable confidence in ongoing active production.


      The Lockheed Martin MOU is too recent (December 2025) to provide retention evidence — it has not
      yet been in effect long enough for renewal to be relevant. The Navy Factory 4 relationship is
      inherently long-duration due to the scale of the facility investment; effective tenure will be
      measured in decades rather than years.


      Customer satisfaction is entirely inferred rather than measured. Hadrian's CEO Chris Power has
      described customer demand as "stronger than we can fulfill" in multiple interviews, implying
      demand-side pull. If accurate, this would suggest very low at-risk retention. However, these are
      company-side statements and have not been corroborated by customer references in any public source.
    claimRefs:
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
