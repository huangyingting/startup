callouts:
  - calloutType: risk
    title: "Customer Concentration: Anduril and the Navy Are Structural Anchors and Single Points of Failure"
    claimRefs: [CU028, CU029, CU032, CU035]
    body: >
      Hadrian's public evidence reveals a deeply concentrated customer base: Anduril Industries (the
      anchor since 2022) likely accounts for 30–50%+ of the company's early production revenue, and the
      US Navy anchors the entire Factory 4 facility via a government program dependent on OBBBA
      appropriations. Two customers represent the backbone of two distinct revenue streams and two of
      Hadrian's four factories.


      If Anduril were to reduce procurement volumes — whether due to its own fundraising challenges,
      program cancellations, or a decision to in-source or re-source machined parts — Hadrian would
      lose a disproportionate share of revenue with limited short-term replacement. The defense
      procurement cycle is 12–24 months, making rapid customer substitution structurally impossible.


      The Navy Factory 4 dependency compounds the risk: cancellation or significant restructuring of the
      OBBBA-backed submarine program would strand $1.5 billion in private capital committed to a
      facility built specifically for that program. Investors should model concentration scenarios
      quantitatively and request Anduril's revenue share from the data room before forming a view.

  - calloutType: insight
    title: "Defense Contract Structure Creates High Structural Retention Even Without Disclosed NRR"
    claimRefs: [CU023, CU024, CU026]
    body: >
      The absence of NRR or GRR data from Hadrian does not mean retention is unknown — the structural
      economics of defense production contracts make churn within the contract term extremely unlikely.
      Once a supplier is AS9100D-qualified and on-program, the switching cost to a new supplier
      (12–18 months re-qualification, first article inspection programs, potential program delays) is
      larger than the pricing premium any competitor could offer in normal circumstances.


      The 80% long-term revenue share (3–7 year contracts) implies that the vast majority of Hadrian's
      confirmed revenue is contractually committed over multi-year horizons. The Anduril relationship's
      3+ year active history without any public churn signal is directionally consistent with this
      structural retention model. For diligence purposes, the key question is not whether Hadrian
      retains existing customers within contract periods, but whether it successfully converts the
      remaining 20% of shorter-cycle customers to long-term relationships and whether customer
      expansion (MaaS/FaaS upsell) continues at the observed rate.

