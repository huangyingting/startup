  - id: section-adoption-trajectory
    title: Adoption Trajectory and Commercial Ramp
    body: >
      Hadrian's commercial trajectory can be reconstructed from a combination of revenue disclosures,
      customer announcement dates, and factory commissioning milestones. The company launched commercially
      in 2023 — the first full year of Precision Components and MaaS sales — and reported approximately
      $3 million in revenue, sourced almost entirely from the Anduril anchor relationship and early
      on-demand customers. The 10× growth to approximately $30 million in 2024 implies meaningful
      expansion beyond a single anchor, with multiple unnamed production contracts contributing alongside
      the Anduril relationship.


      The customer acquisition funnel for Hadrian is materially constrained by defense procurement cycles.
      New production customers typically require 12–24 months from initial engagement through qualification,
      AS9100D auditing, first article inspection, and contract award. Hadrian's Opus platform accelerates
      the quoting phase to minutes, but the qualification and procurement cycle is a customer-side
      constraint that compresses the funnel conversion rate.


      RTX Ventures' lead investment in the Series B (February 2024) is an important adoption signal:
      Raytheon Technologies' investment arm would not have led a $117 million round without having
      conducted supply-chain vetting of Hadrian as a prospective precision-machining supplier. While no
      explicit production contract between Hadrian and Raytheon has been disclosed, the investment implies
      Tier-1 prime validation and potential forward purchase-order pipeline.


      The Datum Source acquisition (August 2024) and the Lockheed Martin MOU (December 2025) represent
      two distinct adoption vectors: the former expands the on-demand (Tier-1 parts) pipeline via an
      existing marketplace, while the latter deepens the relationship from parts supply to embedded factory
      capacity. The Navy Factory 4 commitment represents the deepest customer integration available —
      the FaaS tier — and functions as a reference anchor for future DoD agency and prime contractor
      FaaS evaluations.
