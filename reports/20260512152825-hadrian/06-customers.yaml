      through qualification, production contract, and long-term FaaS deployment. Funnel reflects
      structural constraints: 12–24 month procurement cycles, AS9100D qualification requirements,
      and ITAR-limited addressable market. Values are research-team estimates; Hadrian has not
      disclosed pipeline or conversion data.
