chapter:
  number: 6
  title: Customers
  summary: >
    Hadrian's publicly confirmed customer base consists of three named anchor accounts — Anduril Industries
    (strategic manufacturing partner since 2022), Lockheed Martin Missiles and Fire Control (MOU signed
    December 2025), and the US Navy (Factory 4 anchor, $2.4B public-private partnership commissioned March
    2026) — with several unnamed Tier-1 and Tier-2 defense contractors implied by $30M 2024 revenue.
    All revenue is US-only due to ITAR restrictions. Customer concentration is a material risk: Anduril
    likely represents a disproportionate share of early revenue, and the Navy Factory 4 program represents
    a single government dependency for Hadrian's largest facility. Retention appears structurally high due
    to long-term 3–7 year production contracts, but no NRR, GRR, or churn data have been publicly disclosed.

sections:
  - id: section-customer-segments
    title: Customer Segments and Buyer Profiles
    body: >
      Hadrian's addressable customer universe is defined almost entirely by its ITAR registration and
      US-only operations. All three confirmed customer accounts are domestic US entities, and management
      has explicitly stated that Hadrian does not sell to foreign buyers. The effective addressable market
      is therefore the US defense industrial base — encompassing defense tech startups (Tier 0), Tier-1
      prime contractors, and the US government as a direct buyer.


      The primary segment today is Defense Tech Startups, typified by Anduril Industries. These companies
      require precision-machined parts for autonomous systems, rockets, and drones at high velocity and
      low lead time — characteristics that strongly favor Hadrian's automated, fast-turnaround model over
      legacy job shops. Anduril was Hadrian's first publicly confirmed production customer, beginning a
      strategic manufacturing partnership in June 2023 and reducing machined part lead times by up to 50%.


      The second segment is Tier-1 Defense Primes such as Lockheed Martin. These companies operate at
      massive program scale (PAC-3, THAAD, PrSM, GMLRS) and are exploring Hadrian's Manufacturing-as-a-Service
      (MaaS) and Factories-as-a-Service (FaaS) tiers for embedded factory capacity. The Lockheed Martin
      Missiles and Fire Control MOU of December 2025 is the clearest signal that Tier-1 primes are willing
      to deepen the relationship from on-demand parts to factory-level integration.


      The US Government as Direct Buyer represents the third segment, anchored by the US Navy's commissioning
      of Hadrian's Factory 4 in Cherokee, Alabama in March 2026. The $2.4 billion public-private partnership
      — combining $900 million in Navy OBBBA funds with $1.5 billion in private capital — establishes the
      Navy as both a customer and a co-funder of Hadrian's largest manufacturing facility, producing
      submarine components for Virginia- and Columbia-class boats.


      Commercial aerospace (Boeing/Airbus supply chain) and Tier-2 defense subcontractors represent
      potential future segments that have not been publicly confirmed. Hadrian's 2024 acquisition of Datum
      Source — a SaaS tool connecting customers to machine shops — implies intent to expand the Tier-2
      prototype-to-production pipeline, but no named Tier-2 customer has been disclosed.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
