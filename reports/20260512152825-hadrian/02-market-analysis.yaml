  - id: buyer-segmentation
    title: Buyer and Payer Segmentation
    body: >
      Hadrian's buyer landscape divides into three distinct tiers, each with different procurement
      profiles, budget ownership, and adoption triggers. Tier 1 (the most commercially advanced) is
      defense startups and new-space/autonomy companies: Anduril, SpaceX, Rocket Lab, Shield AI,
      Hermeus, and similar companies that lack legacy supply chain relationships, move fast, and
      reward partners who can match their speed. This segment drives the Precision Components and
      Manufacturing-as-a-Service revenue lines today.

      Tier 2 is legacy defense primes (Lockheed Martin, RTX, Northrop Grumman, General Dynamics,
      BAE Systems). These companies have recognized that their internal machining capacity is
      undersized for current surge demand—driven by PAC-3, F-35, GMLRS, and THAAD production ramps—
      and are increasingly turning to external automated manufacturers. The Lockheed Martin MOU signed
      in December 2025 for PAC-3/THAAD/PrSM/GMLRS parts is the first confirmed prime-tier engagement
      and represents the largest potential revenue tier for Hadrian's FaaS model.

      Tier 3 is the US government (DoD direct): the Navy OBBBA public-private partnership for Factory 4
      is the first confirmed direct-government engagement. The DoD's National Defense Industrial Strategy
      (NDIS, released December 2023) explicitly calls for investment in manufacturing capacity that
      cannot be supported by the existing industrial base, opening a pathway for Hadrian to serve
      as a DoD-designated infrastructure partner. Budget ownership is spread across program offices
      (PEOs) and Congress-approved program lines.

      The adoption trigger for all three buyer tiers is capacity pressure: parts shortfalls are delaying
      delivery schedules for F-35, PAC-3, GMLRS, and submarine programs. The need is not speculative;
      it is documented in Congressional testimony, program office briefings, and press coverage.
