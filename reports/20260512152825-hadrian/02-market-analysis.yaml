callouts:
  - calloutType: insight
    title: The DIB Machining Gap Is Structural, Not Cyclical
    body: >
      The US defense industrial base lost approximately 1.9 million specialized manufacturing workers
      over the past four decades—from approximately 3 million to 1.1 million workers in the defense
      and aerospace manufacturing sector. This is not a transitory demand shock; it is structural
      workforce attrition combined with underinvestment in manufacturing capital. The workforce that
      remains is aging (average machinist age 45+), and there is no evidence of a pipeline replenishment
      at anything close to the scale required to meet AUKUS, Ukraine, and Pacific deterrence demands.
      This structural gap is what makes Hadrian's 30-day training pipeline and AI-automated operations
      a genuine market necessity rather than a nice-to-have.
    claimRefs:
      - CM004
      - CM005

  - calloutType: risk
    title: No Single Third-Party Source Precisely Sizes Hadrian's SAM
    body: >
      The defense precision CNC machining sub-segment does not correspond to any standard SIC/NAICS
      code and is not specifically sized by major market research firms. Grand View Research sizes the
      broader aerospace manufacturing market at ~$908 billion—far too broad. NDIA quantifies
      the gap qualitatively but not in dollars. This creates model risk for any financial projection
      anchored to a precise market figure. Investors should treat all SAM estimates in this chapter
      as research-team synthesis models, not third-party validated data points.
    claimRefs:
      - CM006
      - CM010

