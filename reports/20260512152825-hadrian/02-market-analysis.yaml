chapter:
  number: 2
  title: Market Analysis
  summary: >
    Hadrian competes in the U.S. defense industrial base (DIB) precision manufacturing market—
    a segment shaped by decades of capacity erosion, acute workforce decline, and rising peer-competitor
    threats. The DIB total addressable market for automated CNC-machined precision components is
    estimated at $30–100 billion annually depending on scope. Near-term addressable spend (SAM) is
    approximately $20–40 billion in US defense procurement of machined parts. Critical demand
    catalysts—AUKUS submarine commitments, NDAA reindustrialization provisions, Ukraine-driven munitions
    surge, and defense prime outsourcing pressure—are accelerating the pace at which government
    and commercial buyers are willing to commit to long-term supply agreements with automated manufacturers.

sections:
  - id: market-boundary
    title: Market Boundary, Segments, and Status-Quo Substitutes
    body: >
      Hadrian's addressable market is the production of precision-machined metallic components for
      the U.S. aerospace and defense supply chain. This spans five primary spend categories:
      (1) aircraft structural components (fuselage frames, wing ribs, bulkheads); (2) propulsion and
      engine parts (turbine blades, compressor housings, combustion chambers); (3) weapons and
      missile components (seeker heads, fin assemblies, valve bodies for rocket motors, actuator
      housings); (4) naval and submarine precision parts (pressure housings, pump shafts, valve
      manifolds, sonar mounts); and (5) ground vehicle and electronics precision housings.
      The company has strategically prioritized categories (2), (3), and (4) where the gap between
      current US capacity and required production rates is most acute.

      Excluded from the immediate addressable market are additive manufacturing (3D printing),
      composite fabrication, large-scale structural forgings, and electronics assembly—each a
      distinct process requiring different capital equipment and manufacturing systems. However,
      Hadrian's Factories-as-a-Service tier is designed to eventually incorporate multiple process
      types inside a single automated factory, which would expand the addressable footprint over time.

      The status quo for 90%+ of the DIB is fragmented small-to-mid-size machine shops: approximately
      60,000 Defense Industrial Base companies according to NDIA estimates, of which the vast majority
      employ fewer than 20 workers. These shops rely on aging CNC equipment operated by experienced
      machinists, many of whom are nearing retirement. The average age of a precision machinist in
      the US is over 45, and the sector lost approximately 1.9 million manufacturing workers since
      the 1980s (from 3 million to approximately 1.1 million in the aerospace/defense-specific segment).
      The DoD has explicitly identified this workforce attrition and capacity gap as one of the most
      urgent risks to US military readiness.
