      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: The DIB Machining Gap Is Structural, Not Cyclical
            body: >
              The US defense industrial base lost approximately 1.9 million specialized manufacturing workers over the
              past four decades—from approximately 3 million to 1.1 million workers in the defense and aerospace
              manufacturing sector. This is not a transitory demand shock; it is structural workforce attrition combined
              with underinvestment in manufacturing capital. The workforce that remains is aging (average machinist age
              45+), and there is no evidence of a pipeline replenishment at anything close to the scale required to meet
              AUKUS, Ukraine, and Pacific deterrence demands. This structural gap is what makes Hadrian's 30-day
              training pipeline and AI-automated operations a genuine market necessity rather than a nice-to-have.
            calloutType: insight
            claimRefs:
              - CM004
              - CM005
          - type: callout
            title: No Single Third-Party Source Precisely Sizes Hadrian's SAM
            body: >
              The defense precision CNC machining sub-segment does not correspond to any standard SIC/NAICS code and is
              not specifically sized by major market research firms. Grand View Research sizes the broader aerospace
              manufacturing market at ~$908 billion—far too broad. NDIA quantifies the gap qualitatively but not in
              dollars. This creates model risk for any financial projection anchored to a precise market figure.
              Investors should treat all SAM estimates in this chapter as research-team synthesis models, not
              third-party validated data points.
            calloutType: risk
            claimRefs:
              - CM006
              - CM010
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Hadrian's competitive universe spans five distinct categories: (1) digital manufacturing marketplaces
              (Xometry, Fictiv, Protolabs) that match buyers to third-party shops; (2) AI-driven additive manufacturing
              (Divergent Technologies, Velo3D) focused on metal 3D printing rather than CNC subtractive processes; (3)
              traditional job shops — approximately 60,000 privately held SMB machine shops in the US Defense Industrial
              Base (DIB) that collectively hold the vast majority of current defense precision machining revenue; (4)
              captive manufacturing by defense primes (General Atomics, L3Harris, Boeing Defense) who retain some CNC
              capacity in-house; and (5) potential future entrants including well-capitalized industrial tech companies
              (e.g., Siemens, General Electric Aerospace) that might build automated factory capabilities.

              Hadrian's core differentiation from all five categories is its fully vertically integrated ownership model
              — it owns and operates the CNC machines, factory buildings, and AI software stack rather than licensing
              technology or acting as a marketplace intermediary. This ownership model enables its AI/MES platform
              (Opus) to generate operational feedback loops that improve programming, scheduling, and quality at scale
              in ways that a marketplace cannot. Hadrian has been explicit that Opus is not sold externally and
              represents a proprietary advantage embedded in its factory network.

              Xometry, the most visible public-market comparator, is a digital manufacturing marketplace with
              approximately 10,000+ active suppliers and ~$120M in annual marketplace revenue (FY2024). The business
              model is fundamentally different: Xometry aggregates demand and routes jobs to third-party shops without
              owning machines or facilities. This means Xometry cannot guarantee ITAR compliance, production-scale
              capacity, or long-term contract performance in the way Hadrian's dedicated ITAR-cleared factory model can.
              Siemens' $50M minority investment in Xometry (announced May 2026) underscores the marketplace's
              AI/software platform evolution but does not change its non-integrated factory model.

              The legacy job shop universe — thousands of private shops averaging 30% machine uptime and deep
              skilled-worker dependency — is the primary incumbent Hadrian is displacing. These shops hold most of the
              current defense machining revenue but lack automation, scale, and the training pipeline to grow capacity
              at the rate the DoD needs.
