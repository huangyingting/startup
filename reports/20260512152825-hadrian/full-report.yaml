      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              Sizing the Hadrian addressable market requires triangulating from multiple lenses because no single
              analyst report captures the specific segment of automated-CNC precision defense machining. The broadest
              measure, total US defense procurement (FY2025 budget ~$886 billion), captures all defense spending, of
              which roughly 30–35% goes to procurement of goods and systems. Within procurement, precision-machined
              metallic components represent a subset: industry estimates suggest 5–10% of procurement spending, implying
              a total procurement value of $15–30 billion per year for CNC-machined parts alone.

              A narrower lens comes from the aerospace parts manufacturing market: Grand View Research estimates the
              global aerospace parts manufacturing market at approximately $908 billion in 2024, growing at a CAGR of
              approximately 6.3% to 2030. The precision CNC-machining sub-sector within this is approximately 5–8% of
              the total aerospace parts market, implying a global TAM for precision aerospace CNC machining of $45–75
              billion. The US defense portion is roughly 20–30% of global aerospace spending, suggesting a US defense
              precision CNC TAM of $9–22 billion.

              A third lens: Hadrian's CEO has called US defense machining a "multi-hundred-billion-dollar opportunity"
              over the next decade, citing the Navy's need to scale submarine production from 1.3 per year to 2+ per
              year. The Congressional Budget Office (CBO) has estimated the Navy's 30-year shipbuilding plan at over $1
              trillion in total program costs, a substantial portion of which flows through precision-machined
              components in the industrial base.

              Hadrian's realistic SAM today is the segment of defense machining that (a) can be automated with current
              5-axis CNC technology, (b) is on production-rate contracts (not one-off prototypes), and (c) is currently
              under-served by traditional shops. On this basis, the company's own Factory 4 commitment alone ($2.4
              billion over its initial life) implies Hadrian views the immediately addressable market at $5–20 billion
              in the near-to-medium term. The SOM over the next five years, assuming execution of the Factory 4–Factory
              8 build-out plan, is estimated at $1–5 billion in annual revenue.
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
