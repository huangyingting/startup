      - number: '8.5'
        title: Comparable Companies and Transactions
        blocks:
          - type: paragraph
            body: >
              Hadrian's valuation can be calibrated against three cohorts: public defense and digital manufacturing
              companies, private defense technology unicorns, and historical M&A transactions in defense manufacturing.

              Among public peers, Xometry (XMTR) is the closest business model analog — a digital-first manufacturing
              marketplace focused on on-demand CNC and 3D printing. Xometry trades at approximately 3–4× EV/Revenue with
              a market cap around $350–400 million as of early 2026. Its gross margins (~28–32%) and revenue profile are
              comparable to Hadrian's Precision Components tier, though the key difference is that Xometry is an
              asset-light marketplace while Hadrian is capital-intensive vertically integrated manufacturing. Proto Labs
              (PRLB) trades at ~1.5× revenue, reflecting slower growth and no defense premium. TransDigm Group commands
              12–15× EV/Revenue but is profitable, mature, and carries substantial pricing power from proprietary
              sole-source components. Heico Corporation and Moog Inc trade at 5–6× and ~0.8× revenue respectively — both
              are mature profitable analogs without Hadrian's growth or automation moat.

              Among private defense technology companies, Divergent Technologies (~$850 million valuation in 2022) is
              the most direct structural analog — a vertically integrated defense manufacturing startup with similar DoD
              focus, though using additive rather than subtractive manufacturing. Shield AI ($2.8 billion valuation,
              2023) and Anduril ($14 billion valuation, 2024) demonstrate that the market will pay substantial premiums
              for defense AI and hardware companies with strong program traction. The Anduril comparison is particularly
              instructive: as Hadrian's largest anchor customer, Anduril's own $14 billion valuation sets an upper
              ceiling for what the customer's growth trajectory can support in terms of Hadrian's supply chain value.

              Historical defense M&A shows acquirers typically paying 3–8× revenue for precision manufacturing targets
              and 8–15× for high-growth technology-differentiated assets. At $1.6 billion, Hadrian is priced above the
              top of the historical M&A acquisition range at current revenue — justifiable only if Factory 4 scale
              materializes within a strategic buyer's five-year horizon.
