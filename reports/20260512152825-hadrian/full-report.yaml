      - number: '3.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Xometry and Hadrian Solve Different Customer Problems
            body: >
              Xometry and Hadrian are often mentioned in the same breath as "digital manufacturing" companies, but they
              address structurally different customer needs. Xometry solves the sourcing discovery problem: a buyer
              uploads a CAD file, gets an instant quote, and jobs are routed to one of 10,000+ suppliers. This model is
              optimized for commercial customers, prototyping, and non-critical parts. Hadrian solves the production
              reliability problem: a defense prime or government program office needs guaranteed ITAR-compliant,
              production-scale, long-run machined components at sustained quality — which requires a dedicated,
              qualified factory, not a marketplace. The Siemens $50M investment in Xometry (2026) confirms the
              marketplace's value in design-to-quote intelligence but does not transform Xometry into a factory
              operator. Direct competition between them is limited to the narrow band of defense-adjacent commercial
              work.
            calloutType: insight
            claimRefs:
              - CP001
              - CP002
              - CP009
          - type: callout
            title: 'Moat Risk: CAM Software Commoditization and AI Manufacturing Intelligence'
            body: >
              The primary long-term risk to Hadrian's Opus platform moat is not a direct competitor replicating the
              factory model, but the commoditization of AI-powered CNC programming itself. Commercial CAM software
              (Siemens NX, Mastercam, Autodesk Fusion 360) is increasingly adding AI-assisted toolpath generation, and
              open-source CNC automation projects are advancing. If AI-powered CNC programming becomes widely available
              as a software commodity, Hadrian's differentiation would narrow to its factory network and qualified
              customer relationships — still meaningful moats, but lower than the current platform-plus-factory
              combination. The Siemens–Xometry integration announced in May 2026 represents this vector in its earliest
              form: embedding manufacturing intelligence into design tools rather than into factory operations.
