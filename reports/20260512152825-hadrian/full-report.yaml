    data:
      nodes:
        - id: n1
          label: Customer Submits RFQ
          detail: >-
            Customer uploads engineering drawings (2D PDF or 3D CAD) and material/tolerance specifications to Hadrian's
            digital portal
        - id: n2
          label: Opus Auto-Quote Generation
          detail: >-
            AI parses geometry, selects processes and materials, generates fixed-price quote in minutes; no human
            estimator required
        - id: n3
          label: Contract and Program Setup
          detail: >-
            Long-term supply agreement signed; Hadrian creates CNC programs, selects tooling, completes process
            qualification, and performs FAI
        - id: n4
          label: Production Scheduling
          detail: >-
            Opus AI scheduler queues the program; stages materials and tooling; assigns machine time across the factory
            fleet
        - id: n5
          label: CNC Machining
          detail: Parts machined on multi-axis CNC fleet; 75–80% machine uptime; operators monitor 10 machines simultaneously
        - id: n6
          label: In-Process CV Quality Inspection
          detail: >-
            Computer vision performs dimensional checks at key machining checkpoints; out-of-spec events flagged
            automatically and routed for review
        - id: n7
          label: Final Inspection and AS9100D Record
          detail: >-
            Final CMM or CV measurement; digital quality record generated per serial number or lot; AS9100D-compliant
            documentation package assembled
        - id: n8
          label: Delivery and Customer Portal Update
          detail: >-
            Parts shipped to customer; tracking updated in portal; quality records delivered digitally; AS9102 FAI
            documentation included for new programs
