  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Segments, and Status-Quo Substitutes
        blocks:
          - type: paragraph
            body: >
              Hadrian's addressable market is the production of precision-machined metallic components for the U.S.
              aerospace and defense supply chain. This spans five primary spend categories: (1) aircraft structural
              components (fuselage frames, wing ribs, bulkheads); (2) propulsion and engine parts (turbine blades,
              compressor housings, combustion chambers); (3) weapons and missile components (seeker heads, fin
              assemblies, valve bodies for rocket motors, actuator housings); (4) naval and submarine precision parts
              (pressure housings, pump shafts, valve manifolds, sonar mounts); and (5) ground vehicle and electronics
              precision housings. The company has strategically prioritized categories (2), (3), and (4) where the gap
              between current US capacity and required production rates is most acute.

              Excluded from the immediate addressable market are additive manufacturing (3D printing), composite
              fabrication, large-scale structural forgings, and electronics assembly—each a distinct process requiring
              different capital equipment and manufacturing systems. However, Hadrian's Factories-as-a-Service tier is
              designed to eventually incorporate multiple process types inside a single automated factory, which would
              expand the addressable footprint over time.

              The status quo for 90%+ of the DIB is fragmented small-to-mid-size machine shops: approximately 60,000
              Defense Industrial Base companies according to NDIA estimates, of which the vast majority employ fewer
              than 20 workers. These shops rely on aging CNC equipment operated by experienced machinists, many of whom
              are nearing retirement. The average age of a precision machinist in the US is over 45, and the sector lost
              approximately 1.9 million manufacturing workers since the 1980s (from 3 million to approximately 1.1
              million in the aerospace/defense-specific segment). The DoD has explicitly identified this workforce
              attrition and capacity gap as one of the most urgent risks to US military readiness.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
