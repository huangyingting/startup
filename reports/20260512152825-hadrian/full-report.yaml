        - Tailwind
        - Geopolitical / policy
        - 2025–2040
        - US Navy must increase sub production rate from ~1.3 to 2+ per year; Factory 4 is first of 3 needed
        - Creates multi-decade committed demand; Navy as anchor tenant
        - Confirm factory ramp timeline and production milestones vs. Navy delivery schedule
      - - Ukraine-driven munitions stockpile depletion
        - Tailwind
        - Geopolitical / policy
        - 2024–2028
        - >-
          GMLRS production shortfall; Pentagon requesting >100% increase in production rates for guided rockets and
          artillery
        - Creates urgent pull for missile/munitions components; near-term revenue driver for Hadrian
        - Quantify GMLRS, ATACMS and 155mm shells shortfall and timeline to close
      - - National Defense Industrial Strategy (NDIS 2023)
        - Tailwind
        - Regulatory / policy
        - 2024–2028
        - >-
          First ever DoD industrial strategy; explicitly calls for investment in non-traditional manufacturers and
          automation
        - Validates Hadrian's model at the highest policy level; opens OTA and public-private contract vehicles
        - Track NDIS implementation milestones and related legislative provisions in FY2025–26 NDAA
      - - NDAA FY2024 Section 844 + One Big Beautiful Bill Act
        - Tailwind
        - Legislative / funding
        - 2025–2030
        - $900M in OBBBA funds committed to Factory 4; additional provisions for DIB reinvestment
        - Direct federal funding pathway for future Hadrian factories
        - Confirm any standing Congressional earmarks or program lines for additional Hadrian-type factories
      - - Defense prime outsourcing trend
        - Tailwind
        - Commercial / procurement
        - 2024–2028
        - Major primes reducing fixed-cost machining footprints; subcontracting specialized machining
        - Expands FaaS opportunity; Lockheed MFC MOU is first proof point
        - Count additional prime MOU/LOI targets in pipeline; assess contractual terms and exclusivity
      - - ITAR and DoD QMS qualification timelines
        - Constraint
        - Regulatory
        - Ongoing
        - 'AS9100D qualification: 12–24 months for new programs; NADCAP accreditation: 18 months+'
        - Limits speed of new program onboarding; requires dedicated regulatory investment per factory
        - Confirm Hadrian's ITAR registration, existing AS9100D scope, and F4 qualification timeline
      - - DoD LCTA contracting model
        - Constraint
        - Procurement policy
        - Ongoing
