      - number: '3.3'
        title: Pricing and Packaging Comparison
        blocks:
          - type: paragraph
            body: >
              Pricing across defense precision manufacturing vendors is generally opaque due to contract
              confidentiality, program-level pricing, and the complex multi-tier nature of defense procurement. The
              following analysis draws on public statements, analyst reports, and proxy indicators.

              Hadrian does not publish list prices and operates on negotiated long-term production contracts typically
              running three to seven years. Its Opus-powered quoting system reportedly generates quotes in minutes for
              standard geometries, but the underlying per-part pricing is not publicly disclosed. Analyst commentary
              suggests Hadrian commands a premium over legacy job shops on a per-part basis, justified by
              speed-to-quote, quality consistency, and production-rate reliability. The FaaS (Factory-as-a-Service)
              model represents the highest-value tier, embedding Hadrian manufacturing cells inside a customer's or
              public facility — the Lockheed Martin MFC collaboration and the Navy Factory 4 are the two confirmed
              public examples.

              Xometry's marketplace uses an AI-powered Instant Quoting Engine (IQE) that generates real-time prices from
              uploaded CAD files; typical lead times are one to four weeks for machined parts. Xometry's pricing is
              competitive for standard machining work but carries the inherent variability of a multi-supplier network:
              quality, delivery reliability, and ITAR compliance depend on the specific supplier assigned.

              Protolabs offers rapid prototyping and low-volume manufacturing with online quoting and industry- leading
              one-to-three day lead times for some processes. Its pricing is optimized for engineering iteration
              (prototype-to-pilot), not production-scale defense programs.

              Traditional job shops price via request-for-quote (RFQ) processes that often take days to weeks, with no
              standardized pricing. Most operate on purchase order or blanket order commercial terms without the
              long-term capacity reservations that defense primes increasingly require.
