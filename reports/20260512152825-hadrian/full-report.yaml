      - number: '8.6'
        title: Exit Readiness and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Hadrian's most likely exit paths within a five-year horizon (2026–2031) are: (1) strategic acquisition by
              a defense prime, (2) late-stage secondary or Series D-plus round with secondary liquidity, or (3) public
              market listing (IPO or direct listing). Each path has different prerequisites and risk profiles requiring
              separate diligence tracks.

              Strategic acquisition is the highest-probability exit path. RTX Ventures' Series B lead creates explicit
              strategic alignment with Raytheon Technologies, and the MOU with Lockheed Martin Missiles and Fire Control
              (December 2025) introduces a second potential acquirer. Defense primes have historically acquired
              manufacturing capabilities at 5–15× revenue; at $500 million in revenue a $5–8 billion acquisition would
              represent 10–16× revenue, within range for a high-quality, technology-differentiated manufacturing asset.
              Northrop Grumman and General Dynamics are additional potential acquirers given their submarine and
              precision components program exposure.

              IPO readiness requires sustained revenue of $500 million or more, visible EBITDA margins of 10–15%+, and a
              completed Factory 4 ramp. The earliest plausible IPO window based on current trajectory is 2028–2030,
              contingent on F4 execution. Defense sector M&A is at historically elevated levels as of 2025–2026, driven
              by DoD industrial base consolidation initiatives and increased defense budgets — a favorable tailwind for
              exit optionality.

              Final diligence asks before committing capital at $1.6 billion include: (a) audited or CPA-reviewed
              financial statements for 2024–2025 confirming revenue, gross margins, and burn rate; (b) confirmation of
              the Factory 4 private capital structure — equity versus debt versus project finance; (c) current-year
              revenue run rate from management accounts; (d) a customer revenue concentration schedule; (e) the Factory
              4 construction milestone schedule and completion date commitment; and (f) the cap table with preference
              stack and anti-dilution terms. Without these inputs, the research team cannot move from HOLD /
              RESEARCH-MORE to a positive commitment recommendation at any price within $200 million of the current $1.6
              billion Series C mark.
