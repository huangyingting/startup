      - number: '7.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Factory 4 Is the Largest Unproven Execution in Hadrian's History
            body: >
              Factory 4 in Cherokee, Alabama combines every operational risk category simultaneously: unprecedented
              scale (2.2M sqft, 8x all prior factories combined), a $2.4 billion public-private financing structure with
              an opaque $1.5B private capital tranche, a workforce requirement of 1,000-2,000 workers, equipment
              procurement for hundreds of CNC machining centers with 12-24 month lead times, and contractual performance
              obligations to the US Navy on submarine production. Hadrian has not disclosed a public construction
              schedule, independent project management oversight, or equipment procurement milestone. Investors
              evaluating Hadrian in 2026 are essentially underwriting the successful delivery of a project with no
              publicly available progress audit.
            calloutType: risk
            claimRefs:
              - CR011
              - CR024
              - CR027
          - type: callout
            title: ITAR Tail Risk Grows Non-Linearly With Scale
            body: >
              Hadrian's ITAR compliance obligation does not scale linearly with headcount or factory count; it scales
              with the number of people having access to export-controlled technical data, hardware, and manufacturing
              processes. At 408 employees across four facilities, the ITAR surface area is already substantial. At the
              2,000+ worker scale required for Factory 4, the technology control plan must screen, badge, and monitor an
              order of magnitude more individuals in a new state with a different talent pool. A single willful ITAR
              violation by a Hadrian employee carries criminal penalties of up to 20 years imprisonment and $1.3M per
              violation. No information about Hadrian's technology control plan architecture, audit cadence, or DDTC
              self-assessment program has been disclosed.
            calloutType: risk
            claimRefs:
              - CR001
              - CR005
              - CR030
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              The investment thesis for Hadrian at $1.6 billion rests on five interconnected pillars. First, the market
              opportunity: the US defense precision CNC machining market represents an estimated $50 billion total
              addressable market, with a bipartisan congressional and DoD mandate to modernize and domesticate the
              defense industrial base — creating structural demand that is policy-driven rather than merely cyclical.
              Second, product differentiation: Hadrian's Opus manufacturing execution system achieves 75–80% machine
              uptime versus 40–50% for the industry, and 10 machines per worker versus 1–3 at legacy job shops — metrics
              that, if independently verified, represent a durable and difficult-to-replicate operational moat. Third,
              customer validation: Anduril Industries, the US Navy (Factory 4 OBBBA partnership), and Lockheed Martin
              Missiles and Fire Control (December 2025 MOU) are tier-1 anchor customers whose endorsement signals
              product-market fit at the defense prime level. Fourth, capital trajectory: the 10× year-over-year revenue
              growth ($3 million in 2023 to $30 million in 2024) and $625 million in confirmed equity from Founders
              Fund, a16z, Lux Capital, and RTX Ventures signals elite investor conviction. Fifth, the Factory 4 option:
              the $2.4 billion public-private partnership with the US Navy creates a step-change in capacity that could
              underpin $500 million or more in annual revenue at maturity.

              The anti-thesis is equally structured. At 53× trailing twelve-month revenue, Hadrian's valuation is
              aggressive even for high-growth technology companies and is unprecedented for a manufacturing business at
              this stage. The bull case is almost entirely premised on Factory 4 success — a $2.4 billion facility that
              has never been built at this scale. The $1.5 billion private capital commitment for Factory 4 remains
              structurally opaque: no public filing discloses whether it is equity, debt, project finance, or revenue
              bonds, creating material contingent liability invisible to outside observers. Gross margins, burn rate,
              and cash on hand are entirely undisclosed. Customer concentration in three customers (Anduril, Navy,
              Lockheed MFC) creates significant single-program risk, particularly given that Anduril is itself a
              growth-stage company. If Factory 4 experiences meaningful delays, if revenue growth slows to 1.5–2× per
              year, or if public market multiples compress, the fair value of Hadrian could fall to $800 million–$1.2
              billion — a significant loss from a $1.6 billion entry price.
