      - number: '4.2'
        title: Unit Economics and Gross Margin
        blocks:
          - type: paragraph
            body: >
              Because Hadrian is private and has not filed any financial statements with any public regulatory body
              (beyond SEC Regulation D forms, which confirm round sizes but not revenue, margins, or burn rates), unit
              economics must be estimated from public proxy data. Hadrian's business model creates two distinct economic
              layers: factory-level economics and per-part or per-program economics.


              At the factory level, Hadrian claims 75–80% machine uptime versus approximately 30% for legacy job shops,
              and workers operating 10 machines simultaneously versus one per skilled machinist at traditional
              facilities. If accurate, these productivity claims imply significantly lower labor cost per unit and
              higher revenue per square foot. Factory 2 (Torrance, 100,000 sqft) and Factory 3 (Mesa AZ, 270,000 sqft)
              are the primary production facilities as of Q1 2026. Factory 3 required approximately $200 million in
              company-stated capital investment, confirmed by the Arizona Commerce Authority — implying approximately
              $740 per sqft in capital intensity, roughly 2–4× a traditional job shop buildout.


              The company has not disclosed gross margins. Using public CNC machining benchmarks and Xometry (XMTR) as a
              comparable (gross margins ~28–32% for marketplace; higher for vertically-integrated shops), and applying
              Hadrian's stated productivity advantage, the research team estimates Precision Components gross margins at
              35–50% at maturity. MaaS and FaaS tiers likely carry higher contribution margins due to recurring contract
              economics, but front-loaded qualification and tooling costs reduce early-period margins on new programs.


              Capital intensity is the dominant financial risk at the factory level: each new facility requires
              $50–200M+ in initial capital before Factory 4 scale ($1.5B+ private capital). Factory payback is estimated
              at 3–5 years at current production ramp rates, with wide uncertainty.
