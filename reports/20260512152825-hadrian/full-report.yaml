      - number: '5.6'
        title: Trust, Safety, Security, and Quality Controls
        blocks:
          - type: paragraph
            body: >
              Hadrian operates at the intersection of aerospace quality standards and defense cybersecurity
              requirements, creating a multi-layer compliance burden. AS9100D — the aerospace quality management system
              standard based on ISO 9001 — is confirmed for Hadrian's production operations and is required by prime
              contractors including Lockheed Martin, Anduril, and Raytheon-tier companies before placing production
              orders. AS9100D mandates documented process controls, calibration records, supplier qualification
              procedures, corrective action tracking, and management review cycles, all of which Hadrian appears to have
              implemented given its confirmed long-term supply relationships.


              ITAR (International Traffic in Arms Regulations) compliance is essential for manufacturing parts for
              controlled defense programs such as PAC-3 missile systems, THAAD interceptors, and PrSM precision strike
              munitions. Hadrian explicitly lists ITAR compliance in its capabilities and operates physical access
              controls, personnel screening, and export-filing procedures consistent with ITAR requirements. CMMC Level
              2 certification — requiring 110 cybersecurity practices aligned with NIST SP 800-171 and a triennial
              third-party assessment — has not been publicly confirmed as completed by Hadrian as of Q1 2026. CMMC Level
              2 is required under DFARS 252.204-7021 for DOD contractors handling Controlled Unclassified Information
              (CUI), which includes much of the technical data associated with missile and submarine component
              manufacturing. The connected factory architecture (IoT sensors, cloud telemetry, digital twin data
              streams) creates a cybersecurity surface area that must be managed under CMMC and ITAR simultaneously. DOD
              facility security clearance — enabling access to classified programs and Special Access Programs — is also
              reported as a target but has not been publicly confirmed.
