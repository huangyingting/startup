      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Hadrian's expansion model follows a clear land-and-expand pattern: Precision Components on-demand →
              Manufacturing-as-a-Service (dedicated capacity) → Factories-as-a-Service (full facility operation). The
              Anduril relationship began as precision parts supply and expanded to embedded MaaS capacity. Lockheed
              Martin is transitioning from on-demand parts to an embedded factory cell per the December 2025 MOU — the
              canonical upsell. The US Navy went directly to FaaS tier, representing the most integrated relationship
              tier.


              Customer concentration is a significant adverse risk. With only three publicly confirmed customers, and
              Anduril likely accounting for 30–50% of 2023–2024 revenue (the earliest and most strategic relationship
              when Hadrian was generating $3–30M annually), the company is highly exposed to single-customer risk. Any
              reduction in Anduril's procurement volumes — whether from Anduril's own funding constraints, program
              cancellations, or competitive re-sourcing — could have a material adverse impact on Hadrian's revenue.


              The Navy Factory 4 represents a second axis of concentration risk: an entire 2.2-million-square-foot
              facility is built to serve submarine component production under a government program. If OBBBA
              appropriations are reduced, the Navy program is restructured, or procurement timelines slip, the private
              capital committed to Factory 4 ($1.5 billion) would be underutilized and potentially stranded. Government
              program risk is structurally different from commercial customer risk — it involves political, budget, and
              regulatory vectors that are outside Hadrian's control.


              RTX / Raytheon represents a potential concentration offset: if RTX Ventures' investment evolves into a
              production supply relationship, Raytheon would provide a third large-prime anchor. SpaceX, Boeing Defense,
              and other large prime contractors could expand the base further. However, as of the report date, none of
              these relationships have been confirmed as production customers.


              Geographic concentration is complete: US-only due to ITAR. Sector concentration is extreme: defense and
              aerospace exclusively. There is no commercial aerospace, industrial, or medical device revenue as of the
              report date. Toarn's adversarial analysis specifically calls out the combination of customer
              concentration, sector concentration, and limited public proof of customer diversification as a key risk to
              the investment thesis.
