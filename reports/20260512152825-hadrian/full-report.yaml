  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape Overview
        blocks:
          - type: paragraph
            body: >
              Hadrian's risk profile is unusual among venture-backed startups in its breadth and structural severity.
              Unlike software companies, Hadrian's core business requires active federal regulatory compliance (ITAR,
              CMMC, AS9100D), physical capital at unprecedented scale (Factory 4 at 2.2 million sqft, $2.4 billion),
              dependence on a concentrated customer base anchored to defense budget cycles, and a single founder driving
              all institutional relationships.

              The five dominant risk categories are: (1) regulatory and legal risk, where ITAR non-compliance or CMMC
              disqualification could exclude Hadrian from all DoD contracts; (2) operational risk, where Factory 4
              execution failure, CNC supply disruption, or a quality escape could impair revenue and reputation
              simultaneously; (3) partner and dependency risk, where Anduril concentration and Navy OBBBA continuity are
              existential near-term dependencies; (4) financial and model risk, where extreme capital intensity, opaque
              F4 capital structure, and an undisclosed burn rate create balance-sheet uncertainty; and (5) people and
              execution risk, where sole-founder dependency, rapid workforce scaling, and an unproven training pipeline
              at F4 scale are structural vulnerabilities.

              Risk severity in this chapter is calibrated on a four-level scale: critical (company-ending or
              program-ending), high (material revenue or financial impairment), medium (significant disruption), and low
              (manageable with current resources). Likelihood reflects probability over a 3-year horizon at current
              trajectory.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
          - type: figure
