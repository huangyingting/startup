  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >
      Sensitivity of implied valuation to EV/Revenue multiple at $30M 2024 TTM revenue, from bear-case multiple
      compression at 5× to current Series C implied multiple of 53×.
    data:
      items:
        - label: 'Bear: 5× TTM Revenue'
