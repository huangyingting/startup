  - id: TV005
    title: Thesis-break and kill triggers table
    type: enum
    coverage: partial
    enumerationScope:
      coverage: partial
      basis: >-
        Key thesis-break triggers identified from research evidence gaps and risk analysis; not exhaustive of all
        possible negative events.
    summary: >-
      Specific observable trigger events, thresholds, thesis impacts, and recommended actions for monitoring investment
      integrity post-entry.
    columns:
      - Trigger
      - Observable Threshold
      - Impact on Investment Thesis
      - Recommended Action
    rows:
      - - Factory 4 opening delay >6 months
        - Any public announcement or confirmed report of delay past Q3 2026
        - Removes primary bull-case catalyst; delays $500M+ revenue ramp by 12–24 months; forced into base-case at best
        - Monitor weekly; request formal milestone update from company; re-evaluate return model
      - - Gross margin disclosed below 25%
        - Any reliable disclosure in audited statements, data room, or press of gross margin <25%
        - >-
          Undermines unit economics narrative; suggests cost structure is not sufficiently differentiated at current
          scale
        - Reassess premium multiple; recalibrate to 8–12× revenue; request detailed factory-level cost structure
      - - Series D down-round below $1.6B post-money
        - Any publicly announced or Form D-confirmed round at lower valuation
        - Investor confidence loss confirmed; return at $1.6B entry destroyed unless round is tiny bridge
        - Immediate exit evaluation; down round at this level is a near-automatic thesis break
      - - Single customer exceeds 50% of revenue
        - Any reliable indication one customer (incl. Anduril) exceeds 50% of 2025–2026 revenue
        - Extreme concentration risk; loss of that anchor customer is potentially existential to the company
        - Add revenue concentration covenant to deal terms; trigger governance rights for disclosure
      - - Navy cancels or materially reduces OBBBA commitment
        - Official Navy or congressional notification of OBBBA reduction or cancellation
        - F4 project viability collapses; the $1.5B private capital commitment is at risk; entire F4 thesis fails
        - Immediate exit evaluation; thesis break; monitor defense appropriations reconciliation process closely
      - - Competitor achieves comparable uptime at lower cost
        - Press-verified or audit-confirmed competitor achieving 75%+ uptime in defense-grade CNC at lower per-part cost
        - Erodes primary operational moat; 53× entry multiple is indefensible without product differentiation
        - Commission independent uptime audit; re-evaluate tech moat premium; consider multiple compression
      - - Chris Power departure as sole CEO/founder
        - Public announcement of resignation, incapacity, or governance change removing Power from day-to-day operations
        - Single-founder dependency materializes; no disclosed succession plan or co-founder as backstop
        - Require governance backstop provision; COO or co-founder hire as pre-condition for continued holding
    notes: >-
      Trigger thresholds are monitoring guidelines, not automatic actions. Each trigger should be evaluated in full
      context. Down-round and Navy cancellation are near-automatic thesis breaks; others require judgment.
