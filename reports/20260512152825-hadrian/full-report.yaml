      - number: '1.3'
        title: Funding History, Investors, and Valuation
        blocks:
          - type: paragraph
            body: >
              Hadrian has raised approximately $625 million in private capital through four rounds as of March 2026. The
              seed round (pre-2022, amount undisclosed) was followed by a Series A in 2022 of approximately $90 million
              led by Lux Capital, Andreessen Horowitz, and Founders Fund. The Series B in February 2024 raised $117
              million with RTX Ventures as a notable strategic new investor alongside returning Lux, a16z, and Founders
              Fund. The Series C in July 2025 raised $260 million led by existing investors Founders Fund and Lux
              Capital, with Morgan Stanley providing a factory expansion loan facility and new investors Altimeter
              Capital and 1789 Capital also participating.

              Post-Series C, Hadrian's valuation was confirmed at $1.6 billion, representing a roughly 3× step-up from
              the approximately $500 million valuation implied at Series B. The $2.4 billion Factory 4 public-private
              partnership with the U.S. Navy—announced at the ribbon-cutting in March 2026—combines $1.5 billion in
              private capital and $900 million in Navy funds from the One Big Beautiful Bill Act, making it the largest
              single manufacturing commitment in Hadrian's history.

              Eighty percent of Hadrian's revenue comes from long-term, three-to-seven-year production contracts,
              providing visibility into future cash flows that supports the capital-intensive factory build-out program.
              The remaining 20% is shorter-cycle prototype and on-demand work. As of the report date, no debt financing
              has been publicly disclosed beyond the Morgan Stanley facility loan included in the Series C package.
