      - number: '7.3'
        title: Operational, Quality, and Security Risks
        blocks:
          - type: paragraph
            body: >
              Factory 4 in Cherokee, Alabama represents Hadrian's most concentrated operational risk. At 2.2 million
              square feet, approximately 8x the combined footprint of Factories 1-3, and anchoring a $2.4 billion
              public-private commitment, any material delay in construction, equipment procurement, workforce ramp, or
              program qualification directly impairs the entire investment thesis. CNC machine procurement is the most
              immediate bottleneck: high-precision machining centers from Haas Automation, DMG Mori, Mazak, and Okuma
              carry documented lead times of 12-24 months. Factory 4's equipment requirements could number in the
              hundreds of units; no public statement about procurement timelines or vendor commitments for F4 has been
              made.

              Quality risk is structural to any AS9100D defense supplier. A single confirmed quality escape affecting a
              DoD production program can trigger DCSA/DCMA audit, program disqualification, or temporary suspension of
              supplier status. Hadrian's automated CMM inspection is a genuine mitigation, but it has not been
              independently validated across all program types, and the company has not disclosed rework rates or
              non-conformance history. For a company at Series C ($1.6B valuation), a single high-profile quality event
              creates disproportionate reputational damage with prime contractors who have long memories and
              conservative supply chain governance.

              Cybersecurity is a cross-cutting operational risk. Hadrian's Opus AI MES platform bridges operational
              technology (OT, meaning CNC machine controls) with IT infrastructure; this OT/IT convergence is a
              documented priority target for state-sponsored APTs targeting the US defense industrial base. DISA STIG
              compliance and CMMC Level 2 controls provide a framework, but Hadrian has not disclosed its cybersecurity
              posture, incident history, or STIG compliance status for the Opus platform. Workforce scale risk is a
              secondary operational concern: Hadrian's 30-day training pipeline has functioned effectively at under 500
              workers, but Factory 4 targets 1,000-2,000 workers; degraded training quality at that scale could
              compromise both safety metrics and product quality.
