      - number: '5.3'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >
              Opus is best understood as a purpose-built combination of Manufacturing Execution System (MES) and
              Advanced Planning and Scheduling (APS) software, designed from the ground up for Hadrian's own high-mix
              precision machining environment rather than as enterprise software sold to others. At its core, the AI
              scheduler ingests customer engineering drawings, selects processes and materials, generates toolpaths and
              CNC programs, and then allocates machine time across the multi-axis CNC fleet using optimization
              algorithms that minimize changeover time and maximize throughput. The digital twin continuously models the
              real-time state of the factory floor — machine occupancy, WIP location, tool life remaining — enabling
              predictive scheduling and early identification of bottlenecks before they impact delivery commitments.


              Computer vision quality control performs in-process dimensional inspection at machining checkpoints,
              replacing or supplementing manual coordinate measuring machine (CMM) inspection for a substantial portion
              of the quality workflow. Each inspection event generates a digital quality record tied to the part serial
              number or lot, supporting AS9100D traceability requirements and enabling AS9102 first-article inspection
              documentation. The IoT sensor network monitors spindle vibration, coolant levels, tool wear signatures,
              and machine health parameters across the CNC fleet, feeding predictive maintenance models that reduce
              unplanned downtime. Automated materials handling — likely using robotic pallet and fixturing systems —
              tracks work-in-progress and positions stock at machines without manual material moves, further reducing
              the labor content per part. Specific CNC equipment OEMs (Haas Automation, DMG Mori, Mazak, and others are
              industry-plausible choices) and automation vendors have not been publicly confirmed by Hadrian.
