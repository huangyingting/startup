        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Hadrian operates a three-tier commercial model designed to capture progressively more value as customer
              relationships deepen. Tier 1 — Precision Components — is on-demand supply of CNC-machined metallic parts
              at volume; a customer provides drawings and Hadrian ships qualified parts against a purchase order or
              supply agreement. Tier 2 — Manufacturing-as-a-Service (MaaS) — is a dedicated machining cell embedded in a
              customer's production schedule under a multi-year contract; Hadrian operates the cell capacity on the
              customer's behalf. Tier 3 — Factories-as-a-Service (FaaS) — is a full factory deployment operated by
              Hadrian at or near a customer site; the deepest integration level, confirmed with the US Navy (Factory 4,
              Cherokee AL) and the subject of a Memorandum of Understanding with Lockheed Martin Missiles and Fire
              Control (December 2025).


              The company reported approximately $3 million in revenue for 2023, its first full commercial year, and
              approximately $30 million for 2024 — a 10× year-over-year increase. Forbes and Yahoo Finance independently
              confirmed the ~$30M 2024 figure; the company has not issued an official press release with a specific
              revenue number. As of Q1 2026, Hadrian has not disclosed 2025 or 2026 revenue, characterizing growth only
              as "aggressive." Revenue recognition is consistent with standard accrual accounting tied to production
              milestones; no deferred-revenue or subscription-SaaS structure appears to apply to the Precision
              Components tier.


              Approximately 80% of revenue derives from multi-year production contracts (3–7 years), per company-stated
              figures. This provides strong revenue visibility and reduces churn risk, but also concentrates performance
              on a small number of anchor programs (Anduril, Lockheed MFC, US Navy). The remaining ~20% is estimated to
              come from on-demand parts and shorter-cycle work.
