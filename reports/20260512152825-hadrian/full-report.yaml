      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              International Traffic in Arms Regulations (ITAR, 22 CFR 120-130) govern all of Hadrian's defense
              production operations. As a manufacturer of precision components for aircraft, missiles, naval vessels,
              and other defense articles, Hadrian must maintain active DDTC registration, implement technology control
              plans, screen all employees and visitors against US Person status, and obtain licenses for any export or
              re-transfer of defense articles or technical data. ITAR violations carry criminal penalties of up to 20
              years imprisonment and civil fines up to $1.3 million per violation. Hadrian has not disclosed any DDTC
              enforcement actions or voluntary disclosures in any public source as of Q1 2026.

              CMMC (Cybersecurity Maturity Model Certification) under 32 CFR Part 170, finalized December 2024, requires
              Level 2 certification for DoD contracts involving Controlled Unclassified Information. Hadrian's Navy
              OBBBA contract for submarine components (Virginia and Columbia class) almost certainly triggers Level 2
              requirements, obligating Hadrian to complete a third-party C3PAO assessment. The public SPRS portal allows
              limited verification of self-attestation scores; Hadrian has not disclosed its CMMC assessment timeline or
              SPRS score for any facility. Factory 4 in Alabama will require separate CMMC scoping.

              AS9100D quality management certification is claimed by Hadrian in company materials. This standard governs
              aerospace quality systems and requires annual surveillance audits; a failed audit or non-conformance can
              trigger certification suspension. No independent source has confirmed the AS9100D scope across all four
              Hadrian facilities. OSHA 29 CFR 1910 and EPA RCRA hazardous waste regulations apply to all manufacturing
              locations; Hadrian has not disclosed recordable incident rates or environmental compliance records. NLRB
              organizing risk is latent but real: a 408-person workforce spread across California and Alabama, with
              different labor market conditions in each state, creates potential exposure to union organizing campaigns.
            claimRefs:
