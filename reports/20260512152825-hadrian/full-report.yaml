          value: 240
          unit: USD million
          note: Low-case growth-stage industrial multiple; $30M × 8; below any defense premium
        - label: 'Moderate: 15× TTM Revenue'
          value: 450
          unit: USD million
          note: Mid-range for high-growth manufacturing; $30M × 15; below TransDigm quality premium
        - label: 'Base: 20× TTM Revenue'
          value: 600
          unit: USD million
          note: Base-case growth premium for capital-intensive manufacturing at 10× growth; without F4 option value
        - label: 'Series C Entry: 53× TTM'
          value: 1600
          unit: USD million
          note: 'Current round: $1.6B / $30M 2024 revenue = 53× LTM; full F4 option value priced in'
        - label: 'Bull: 100× TTM (F4 Option)'
