            title: 'Customer Concentration: Anduril and the Navy Are Structural Anchors and Single Points of Failure'
            body: >
              Hadrian's public evidence reveals a deeply concentrated customer base: Anduril Industries (the anchor
              since 2022) likely accounts for 30–50%+ of the company's early production revenue, and the US Navy anchors
              the entire Factory 4 facility via a government program dependent on OBBBA appropriations. Two customers
              represent the backbone of two distinct revenue streams and two of Hadrian's four factories.


              If Anduril were to reduce procurement volumes — whether due to its own fundraising challenges, program
              cancellations, or a decision to in-source or re-source machined parts — Hadrian would lose a
              disproportionate share of revenue with limited short-term replacement. The defense procurement cycle is
              12–24 months, making rapid customer substitution structurally impossible.


              The Navy Factory 4 dependency compounds the risk: cancellation or significant restructuring of the
              OBBBA-backed submarine program would strand $1.5 billion in private capital committed to a facility built
              specifically for that program. Investors should model concentration scenarios quantitatively and request
              Anduril's revenue share from the data room before forming a view.
