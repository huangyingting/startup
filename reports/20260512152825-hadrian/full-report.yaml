      - number: '8.2'
        title: Recommendation and Confidence
        blocks:
          - type: paragraph
            body: >
              Based on available evidence as of Q2 2026, the research team assigns a HOLD / RESEARCH-MORE recommendation
              for new investment in Hadrian at the $1.6 billion Series C valuation. This is a price-sensitivity and
              evidence-gap rating, not a company-quality rating. Hadrian is a high-quality business with a compelling
              product, elite investors, and a legitimate defense tailwind. The problem is that at $1.6 billion with $30
              million in disclosed 2024 revenue, the multiple is too high to underwrite without audited financials
              confirming gross margins, a disclosed Factory 4 capital structure, and binding rather than MOU-level
              customer commitments. The investment committee should not commit capital at this price without the final
              diligence asks enumerated in Section 6.

              Risk rating: HIGH. The dominant risks are: (1) Factory 4 execution — the $2.4 billion build has no
              precedent at this company, and any meaningful delay compresses the bull case by one to two years; (2)
              capital intensity — the $1.5 billion private commitment for Factory 4 may create balance-sheet obligations
              larger than all prior equity raises combined; (3) customer concentration — approximately 80% of revenue is
              estimated to derive from fewer than five anchor programs; and (4) financial opacity — no gross margins,
              burn rate, cash position, or 2025 revenue have been publicly disclosed. These risks are not individually
              disqualifying but collectively prevent a high-confidence positive recommendation.

              Confidence in the HOLD recommendation itself is medium: the revenue trajectory and market context are
              clear, but key financial and structural inputs for precise valuation modeling are missing. A RESEARCH-MORE
              path exists — obtaining audited financials or management accounts, confirming the Factory 4 private
              capital structure, and seeing one disclosed 2025 revenue milestone would allow this recommendation to move
              to either BUY (if fundamentals support) or PASS (if margins are below expectations). Target return in the
              base case is 0–3× over four to five years from the $1.6 billion entry, contingent on partial Factory 4
              success and a strategic acquisition by a defense prime at $3–5 billion.
            claimRefs:
              - CV009
              - CV010
