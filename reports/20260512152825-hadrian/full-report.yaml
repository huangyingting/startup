        - HIGH — near-term thesis monitoring
      - - Gross Margin by Factory and Tier
        - No cost of revenue, gross margin, or segment-level economics disclosed for any period
        - Central to whether unit economics support $1.6B+ valuation at scale; cannot model base case without this
        - Detailed cost-of-revenue schedule by factory and service tier in financial data room from CFO
        - HIGH — affects all fair-value modeling
      - - Cap Table and Liquidation Preference Stack
        - No cap table, liquidation preference schedule, or anti-dilution terms disclosed publicly
        - Determines effective equity return at exit; preference overhang could dramatically reduce common equity value
        - Cap table summary plus preference waterfall from legal counsel; review investor rights agreement
        - MEDIUM — affects return modeling at exit
      - - Defense Contract Pipeline — Binding vs. MOU
        - LM MFC MOU and other MOUs are non-binding; binding backlog size unknown beyond Anduril programs
        - Binding backlog drives revenue visibility and scenario probability weighting; MOUs do not guarantee revenue
        - Contract registry with signed POs vs. MOUs vs. LOIs breakdown; review supply agreement terms
        - MEDIUM — affects base and bull case confidence
    notes: >-
      Priority: CRITICAL = blocking condition for investment; HIGH = required before signing term sheet; MEDIUM =
      important for return modeling accuracy. All items should be addressed in formal due diligence before commitment.
