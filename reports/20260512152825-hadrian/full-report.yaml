chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Business Model
        blocks:
          - type: paragraph
            body: >
              Hadrian was incorporated in 2020 and commenced commercial operations in 2023 with a mission to
              "Reindustrialize America" by building AI-powered factories that produce precision-machined components
              faster, cheaper, and at higher quality than the legacy defense industrial base. The company's headquarters
              are in Torrance, California, with additional facilities in Hawthorne, California; Mesa, Arizona; and
              Cherokee, Alabama.

              Hadrian positions itself as a full-stack advanced manufacturing company rather than a contract
              manufacturer or software vendor. Its core thesis is that thousands of small, aging machine shops staffed
              by a retiring workforce cannot meet the surge demands of modern defense procurement, and that AI-driven
              automation deployed inside purpose-built factories can close this gap at scale. Founder and CEO Chris
              Power has described the competitive threat from China's manufacturing dominance as "existential," framing
              Hadrian as a national-security infrastructure play.

              The company operates three commercial service tiers: (1) Precision Components on demand—producing
              flight-grade machined parts for customers from prototype to production; (2) Manufacturing-as-a-Service
              —dedicated machining or inspection cells deployed inside Hadrian or customer facilities; and (3)
              Factories-as-a-Service—entire product, assembly, and component factories designed and operated by Hadrian
              to address the U.S. defense industrial base's most critical production shortfalls. All three tiers run on
              Hadrian's proprietary software platform, Opus, which automates design interpretation, CNC programming,
              workflow scheduling, and autonomous inspection.

              Hadrian's factory model is differentiated by 24/7 automated operation, 75–80% equipment uptime versus
              approximately 30% at legacy aerospace machine shops, and a workforce training pipeline that brings workers
              with no prior manufacturing background to full productivity within 30 days.
