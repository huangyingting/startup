      - number: '5.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Opus Data Flywheel Is the Core Defensibility Engine
            body: >
              Hadrian's deepest competitive moat is not the Opus MES software itself — which could in principle be
              replicated — but the machine telemetry, toolpath programs, quality outcomes, and scheduling history that
              accumulate with each new factory and production program. Every additional part produced trains the AI
              scheduler to quote more accurately, the CV QC system to inspect more precisely, and the digital twin to
              model bottlenecks earlier. A competitor attempting to replicate Opus from scratch would start with no
              training data and face a compounding gap against Hadrian's installed base. This flywheel dynamic makes the
              first-mover advantage in AI-driven precision machining more durable than comparable software startups
              because the data is generated internally and is not publicly accessible. The caveat is that no patents
              have been identified, so legal protection against well-funded imitators depends entirely on trade-secret
              status and organizational knowledge retention.
            calloutType: insight
            claimRefs:
              - CE015
              - CE032
              - CE017
          - type: callout
            title: CMMC Level 2 Gap Threatens Full DOD Contract Eligibility
            body: >
              As of Q1 2026, Hadrian has not publicly confirmed completion of a CMMC Level 2 third-party assessment,
              despite operating connected factory IoT infrastructure and handling Controlled Unclassified Information
              (CUI) associated with multiple missile defense and submarine programs. CMMC Level 2 — required under DFARS
              252.204-7021 — mandates 110 cybersecurity practices aligned with NIST SP 800-171 and a triennial
              assessment by a C3PAO (Certified Third-Party Assessment Organization). Without confirmed Level 2 status,
              Hadrian may face contractual barriers to certain DOD prime and sub-prime awards as CMMC enforcement ramps
              through 2026. The risk is compounded by the connected factory architecture: IoT sensor networks, cloud
              telemetry pipelines, and digital twin data streams create an attack surface that must be hardened before
              assessment. Obtaining CMMC Level 2 within the next 12 months should be treated as a priority execution
              item, not an administrative formality.
            calloutType: risk
            claimRefs:
              - CE019
              - CE028
              - CE029
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and Buyer Profiles
        blocks:
          - type: paragraph
            body: >
              Hadrian's addressable customer universe is defined almost entirely by its ITAR registration and US-only
              operations. All three confirmed customer accounts are domestic US entities, and management has explicitly
              stated that Hadrian does not sell to foreign buyers. The effective addressable market is therefore the US
              defense industrial base — encompassing defense tech startups (Tier 0), Tier-1 prime contractors, and the
              US government as a direct buyer.


              The primary segment today is Defense Tech Startups, typified by Anduril Industries. These companies
              require precision-machined parts for autonomous systems, rockets, and drones at high velocity and low lead
              time — characteristics that strongly favor Hadrian's automated, fast-turnaround model over legacy job
              shops. Anduril was Hadrian's first publicly confirmed production customer, beginning a strategic
              manufacturing partnership in June 2023 and reducing machined part lead times by up to 50%.


              The second segment is Tier-1 Defense Primes such as Lockheed Martin. These companies operate at massive
              program scale (PAC-3, THAAD, PrSM, GMLRS) and are exploring Hadrian's Manufacturing-as-a-Service (MaaS)
              and Factories-as-a-Service (FaaS) tiers for embedded factory capacity. The Lockheed Martin Missiles and
              Fire Control MOU of December 2025 is the clearest signal that Tier-1 primes are willing to deepen the
              relationship from on-demand parts to factory-level integration.


              The US Government as Direct Buyer represents the third segment, anchored by the US Navy's commissioning of
              Hadrian's Factory 4 in Cherokee, Alabama in March 2026. The $2.4 billion public-private partnership —
              combining $900 million in Navy OBBBA funds with $1.5 billion in private capital — establishes the Navy as
              both a customer and a co-funder of Hadrian's largest manufacturing facility, producing submarine
              components for Virginia- and Columbia-class boats.


              Commercial aerospace (Boeing/Airbus supply chain) and Tier-2 defense subcontractors represent potential
              future segments that have not been publicly confirmed. Hadrian's 2024 acquisition of Datum Source — a SaaS
              tool connecting customers to machine shops — implies intent to expand the Tier-2 prototype-to-production
              pipeline, but no named Tier-2 customer has been disclosed.
