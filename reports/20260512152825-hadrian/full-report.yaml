          - type: callout
            title: Defense Contract Structure Creates High Structural Retention Even Without Disclosed NRR
            body: >
              The absence of NRR or GRR data from Hadrian does not mean retention is unknown — the structural economics
              of defense production contracts make churn within the contract term extremely unlikely. Once a supplier is
              AS9100D-qualified and on-program, the switching cost to a new supplier (12–18 months re-qualification,
              first article inspection programs, potential program delays) is larger than the pricing premium any
              competitor could offer in normal circumstances.


              The 80% long-term revenue share (3–7 year contracts) implies that the vast majority of Hadrian's confirmed
              revenue is contractually committed over multi-year horizons. The Anduril relationship's 3+ year active
              history without any public churn signal is directionally consistent with this structural retention model.
              For diligence purposes, the key question is not whether Hadrian retains existing customers within contract
              periods, but whether it successfully converts the remaining 20% of shorter-cycle customers to long-term
              relationships and whether customer expansion (MaaS/FaaS upsell) continues at the observed rate.
