      - number: '1.2'
        title: Leadership, Founders, and Governance
        blocks:
          - type: paragraph
            body: >
              Chris Power, 33 as of the Forbes profile published in August 2024, is the sole founder and serves as CEO.
              Power grew up in Melbourne, Australia, dropped out of Monash University, and worked in growth roles at
              retail and SaaS startups before relocating to the United States in 2019 with $6,000 and a conviction that
              American industrial decline posed a geopolitical threat. He spent six months visiting machine shops before
              incorporating Hadrian in 2020. Prior to Hadrian, Power ran ADSC, a small investment vehicle focused on
              acquiring mid-sized defense supply chain companies, which he dissolved in favor of building a greenfield
              factory.

              Chris Baker, VP of Operations, previously managed machine shops for SpaceX. Power recruited Baker as the
              technical operating lead after six months of persistent outreach, with Baker initially skeptical the
              venture was feasible. Baker now leads factory floor systems and workforce programs. Katherine Boyle of
              Andreessen Horowitz and Brandon Reeves of Lux Capital serve as board observers; RTX Ventures' Daniel Ateya
              represents a strategic investor on the company's governance structure.

              Hadrian grants equity to all employees, a deliberate retention mechanism in a sector where traditional
              manufacturers rarely extend ownership to production workers. Key-person dependence on Power is a material
              risk given his dual role as the public face of Hadrian's reindustrialization mission and the primary
              relationship owner with DoD officials and defense primes.
