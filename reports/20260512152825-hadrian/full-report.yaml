      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Largest Defense Manufacturing Public-Private Partnership in Hadrian's History
            body: >
              Factory 4 in Cherokee, Alabama—a $2.4 billion public-private partnership with the U.S. Navy—is the most
              consequential proof point in Hadrian's short history. The Navy committed $900 million in OBBBA funds
              specifically because Hadrian's automated factory model can restore submarine component production rates
              faster and more cost-effectively than traditional prime contractors. The project is the "first of three
              facilities" the Secretary of the Navy said are needed to address the most critical bottlenecks in the
              maritime industrial base.
            calloutType: strength
            claimRefs:
              - CO029
              - CO030
          - type: callout
            title: Key-Person Concentration and Revenue Transparency Gaps
            body: >
              Hadrian's narrative, government relationships, and investor confidence rest heavily on Chris Power as sole
              founder and CEO. No publicly disclosed succession plan, co-CEO structure, or internal executive bench has
              been identified. Additionally, the company has not disclosed 2025 revenue, gross margins, burn rate, or
              unit economics, making independent verification of the growth trajectory beyond the $30 million 2024
              figure impossible from public sources alone.
            calloutType: risk
            claimRefs:
              - CO013
              - CO036
          - type: callout
            title: 10× Revenue Growth in 2024 Is the Demand-Side Proof Point, Not Just a Capital Story
            body: >
              While Hadrian's headline metrics are dominated by funding rounds and factory announcements, the most
              operationally significant data point is the confirmed 10× year-over-year revenue growth from $3 million to
              approximately $30 million in 2024. CEO Power explicitly stated that this growth occurred "without setting
              up a sales team until that spring," driven entirely by inbound demand from primes unable to find domestic
              capacity. This pull-based growth distinguishes Hadrian from pure capital-story plays.
            calloutType: insight
            claimRefs:
              - CO024
