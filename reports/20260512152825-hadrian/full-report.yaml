        - May limit pricing power in traditional procurement; mitigated by OTA and public-private pathways
        - Assess what % of Hadrian's contracts are awarded via OTA vs. traditional FAR-based
      - - Defense budget instability (CRs, sequestration risk)
        - Constraint
        - Legislative / fiscal
