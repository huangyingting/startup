company:
  name: Hadrian

chapter:
  number: 4
  title: Financials
  summary: >
    Hadrian is a private company that reported approximately $3 million in revenue (2023) and
    approximately $30 million (2024) — a 10× year-over-year increase. The company has raised
    ~$625 million in confirmed equity capital across five Regulation D rounds (SEC EDGAR CIK
    0001863211), with the July 2025 Series C valuing the business at $1.6 billion. Factory-level
    capital intensity is extreme: Factory 3 (Mesa AZ) required $200 million; Factory 4 (Cherokee AL)
    anchors a $2.4 billion public-private partnership with the US Navy. No gross margins, operating
    burn, or profitability data have been publicly disclosed. The company is firmly in its capital
    deployment phase and relies on continued equity, government partnership, and project finance.

sections:
  - id: revenue-model
    title: Revenue Model and Streams
    body: >
      Hadrian operates a three-tier commercial model designed to capture progressively more value as
      customer relationships deepen. Tier 1 — Precision Components — is on-demand supply of
      CNC-machined metallic parts at volume; a customer provides drawings and Hadrian ships qualified
      parts against a purchase order or supply agreement. Tier 2 — Manufacturing-as-a-Service (MaaS) —
      is a dedicated machining cell embedded in a customer's production schedule under a multi-year
      contract; Hadrian operates the cell capacity on the customer's behalf. Tier 3 — Factories-as-a-Service
      (FaaS) — is a full factory deployment operated by Hadrian at or near a customer site; the deepest
      integration level, confirmed with the US Navy (Factory 4, Cherokee AL) and the subject of a
      Memorandum of Understanding with Lockheed Martin Missiles and Fire Control (December 2025).


      The company reported approximately $3 million in revenue for 2023, its first full commercial year,
      and approximately $30 million for 2024 — a 10× year-over-year increase. Forbes and Yahoo Finance
      independently confirmed the ~$30M 2024 figure; the company has not issued an official press release
      with a specific revenue number. As of Q1 2026, Hadrian has not disclosed 2025 or 2026 revenue,
      characterizing growth only as "aggressive." Revenue recognition is consistent with standard accrual
      accounting tied to production milestones; no deferred-revenue or subscription-SaaS structure appears
      to apply to the Precision Components tier.


      Approximately 80% of revenue derives from multi-year production contracts (3–7 years), per
      company-stated figures. This provides strong revenue visibility and reduces churn risk, but also
      concentrates performance on a small number of anchor programs (Anduril, Lockheed MFC, US Navy).
      The remaining ~20% is estimated to come from on-demand parts and shorter-cycle work.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001

  - id: unit-economics
    title: Unit Economics and Gross Margin
    body: >
      Because Hadrian is private and has not filed any financial statements with any public regulatory
      body (beyond SEC Regulation D forms, which confirm round sizes but not revenue, margins, or burn
      rates), unit economics must be estimated from public proxy data. Hadrian's business model creates
      two distinct economic layers: factory-level economics and per-part or per-program economics.


      At the factory level, Hadrian claims 75–80% machine uptime versus approximately 30% for legacy job
      shops, and workers operating 10 machines simultaneously versus one per skilled machinist at traditional
      facilities. If accurate, these productivity claims imply significantly lower labor cost per unit and
      higher revenue per square foot. Factory 2 (Torrance, 100,000 sqft) and Factory 3 (Mesa AZ, 270,000
      sqft) are the primary production facilities as of Q1 2026. Factory 3 required approximately $200
      million in company-stated capital investment, confirmed by the Arizona Commerce Authority — implying
      approximately $740 per sqft in capital intensity, roughly 2–4× a traditional job shop buildout.


      The company has not disclosed gross margins. Using public CNC machining benchmarks and Xometry (XMTR)
      as a comparable (gross margins ~28–32% for marketplace; higher for vertically-integrated shops), and
      applying Hadrian's stated productivity advantage, the research team estimates Precision Components
      gross margins at 35–50% at maturity. MaaS and FaaS tiers likely carry higher contribution margins
      due to recurring contract economics, but front-loaded qualification and tooling costs reduce early-period
      margins on new programs.


      Capital intensity is the dominant financial risk at the factory level: each new facility requires
      $50–200M+ in initial capital before Factory 4 scale ($1.5B+ private capital). Factory payback is
      estimated at 3–5 years at current production ramp rates, with wide uncertainty.
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
    tableRefs:
      - TI003
    figureRefs:
      - FI002

  - id: capital-adequacy
    title: Capital Adequacy, Funding, and Burn
    body: >
      Hadrian has raised approximately $625 million in total equity capital across five Regulation D
      rounds, confirmed through SEC EDGAR Form D filings (CIK 0001863211). The most recent confirmed
      round is the Series C (announced July 2025; Form D filed July 28, 2025), led by Founders Fund and
      Lux Capital, with participation from a16z, RTX Ventures, Construct Capital, 137 Ventures, Altimeter
      Capital, and 1789 Capital.


      SEC Form D data reveals two separate Form D filings for the Series C: the July 2025 filing shows
      approximately $161 million in total offering with ~$110 million sold; a second December 2025 Form D
      filing shows approximately $151 million in additional offering with ~$131 million sold, suggesting the
      Series C ultimately closed at approximately $292 million in confirmed Form D capital — exceeding the
      announced $260 million headline figure. The December filing involved 39 investors versus 28 in July,
      suggesting an extended round or a Series C+ tranche.


      The Factory 4 (Cherokee, AL) $2.4 billion public-private partnership is structurally separate from
      the equity rounds: the US Navy's $900 million OBBBA contribution is a government obligation, and
      the $1.5 billion private capital commitment is expected to come from a combination of debt facilities,
      project finance, and additional equity. The equity raises (~$625M Series A–C) are primarily allocated
      to Factories 1–3 capital and operating expenses.


      With $625M raised and three factories operational, the company is in a capital-intensive phase.
      No signal of profitability has been communicated. Research-team burn estimates — based on ~408
      employees at ~$180K fully-loaded average cost plus factory depreciation — suggest annualized operating
      expenses of $90M+, which outpaces the disclosed $30M 2024 revenue and implies significant ongoing
      cash consumption.
    claimRefs:
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
    tableRefs:
      - TI004
    figureRefs:
      - FI003
      - FI004

  - id: financial-gaps
    title: Public Financial Gaps and Disclosure Limits
    body: >
      Hadrian is not required to file financial statements with any public authority as a private
      company. The company's only public financial disclosures are SEC Regulation D forms (confirming
      round amounts, investor names, and share structure) and selective press-level statements
      (only $3M 2023 and ~$30M 2024 have been publicly communicated as revenue figures).


      Key financial unknowns include: gross margins, operating burn rate, cash on hand, cost of
      revenue (including CNC machining consumables, labor, materials), MaaS/FaaS contract terms,
      revenue per factory, Factory 4 private capital sourcing structure, and long-term debt facilities.
      No audited financial statements, management accounts, or investor letters have been made public.


      Toarn's adversarial analysis estimates that Hadrian's burn rate, based on headcount expansion
      and factory build costs, exceeds its disclosed revenue by a wide margin, making continued
      access to equity markets critical. This view is directionally consistent with the research
      team's modeling but cannot be confirmed without inside information.


      The absence of profitability signals at this funding stage ($625M raised) is typical for
      capital-intensive industrial-scale manufacturing startups but creates meaningful financial risk
      if macro conditions deteriorate, if program milestones slip, or if a subsequent equity or
      project-finance round is delayed. Factory 4's $1.5 billion private capital commitment — if
      structured as debt or project finance — would add material balance-sheet obligations that are
      currently entirely opaque to outside observers.
    claimRefs:
      - CI020
      - CI021
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
