callouts:
  - calloutType: insight
    title: SEC Form D Reveals Extended Series C Beyond Announced $260M
    claimRefs: [CI026, CI027, CI028]
    body: >
      Hadrian's SEC EDGAR filing history (CIK 0001863211) shows two separate Form D notices for the
      Series C round: a July 2025 filing showing ~$161M in offering with ~$110M sold, and a December
      2025 filing showing an additional ~$151M offering with ~$131M already sold and 39 investors
      (up from 28 in July). The total Form D-confirmed capital for the Series C therefore approaches
      approximately $292M — materially above the publicly announced $260M headline — suggesting an
      extended round, second close, or overallotment that has not been separately announced. This
      pattern is consistent with strong investor demand and may reflect bridge financing or Series C+
      activity tied to Factory 4 milestones.

  - calloutType: risk
    title: The $1.5B Factory 4 Private Commitment Is Structurally Opaque
    claimRefs: [CI029, CI030]
    body: >
      Hadrian's most material financial uncertainty is the structure of the $1.5 billion private capital
      commitment for Factory 4 in Cherokee, Alabama. Unlike the equity raises — which are documented
      in SEC Form D filings — no public filing, press release, or news article has characterized whether
      this $1.5B represents additional equity, a credit facility, revenue bonds, government-backed loans,
      or project finance. If structured as debt or project finance, it would create balance-sheet
      obligations materially larger than Hadrian's total equity raises to date and would introduce
      leverage risk that is entirely invisible to outside observers from public sources.

