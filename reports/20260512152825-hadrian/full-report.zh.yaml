      - number: '8.5'
        title: 可比公司与交易
        blocks:
          - type: paragraph
            body: >
              Hadrian 的估值可用三组参照校准：上市国防与数字制造公司、私有国防科技独角兽，以及国防制造领域历史 M&A 交易。

              上市可比公司中，Xometry（XMTR）是商业模式最接近的参照——一家数字优先制造交易平台，聚焦按需 CNC 和 3D 打印。截至 2026 年初，Xometry 约按 3–4× EV/Revenue
              交易，市值约 $350–400 million。其毛利率（约 28–32%）和收入画像可与 Hadrian 的 Precision Components 层级比较；关键差异在于 Xometry 是轻资产平台，而
              Hadrian 是资本密集的垂直一体化制造。Proto Labs（PRLB）交易在约 1.5× 收入，反映增长较慢且没有国防溢价。TransDigm Group 享有 12–15×
              EV/Revenue，但它已经盈利、成熟，并且凭借自研单一来源零部件拥有强定价权。 Heico Corporation 和 Moog Inc 分别按 5–6× 和约 0.8×
              收入交易——两者都是成熟盈利参照，但没有 Hadrian 的增长或自动化护城河。

              私有国防科技公司中，Divergent Technologies（2022 年估值约 $850 million）是最直接的结构参照——同样是聚焦 DoD
              的垂直一体化国防制造创业公司，只是采用增材而非减材制造。Shield AI（2023 年估值 $2.8 billion）和 Anduril（2024 年估值 $14 billion）表明，市场会为项目牵引强的国防
              AI 和硬件公司支付高溢价。Anduril 对比尤其有启发：作为 Hadrian 最大锚定客户，Anduril 自身 $14 billion 估值为其增长轨迹能够支撑的 Hadrian 供应链价值设置了上限。

              历史国防 M&A 显示，收购方通常为精密制造标的支付 3–8× 收入，为高增长、技术差异化资产支付 8–15× 收入。以当前收入看，$1.6 billion 已高于历史 M&A 收购区间顶部；只有当
              Factory 4 规模在战略买家的五年视野内兑现时，才说得通。
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
