        - 立即暂停投资；要求提交含时间线的书面整改计划；通知 LP 律师；事件后 24 个月监控 DDTC 民事罚款登记
      - - CMMC Level 2 评估失败
        - CMMC 评估结果；DoD SPRS 门户；C3PAO 认证通知；OBBBA 里程碑报告
        - Hadrian 收到有条件否决、任何设施未通过 Level 2 C3PAO 评估，或 OBBBA 合同因等待 CMMC 整改而暂停
        - 在整改时间线明确前暂停投资；评估范围和对 DoD 项目的影响；要求管理层就整改里程碑出具声明函
      - - Factory 4 进度滑期 > 12 个月
        - 施工许可动态（Cherokee, AL 公开记录）；F4 场地卫星图像；Navy 新闻稿；Hadrian 博客或 PR 公告
        - F4 全面投产日期滑到 2027 年 3 月之后，或 Navy OBBBA 里程碑付款延迟 >90 天
        - 要求更新 F4 进度和 Navy 里程碑状态；评估营运资本影响；考虑对后续资本承诺设置里程碑分期
      - - Anduril 收入集中度连续两个季度 > 40%
        - 季度管理层报告；Anduril 融资新闻；公开 DoD 公告中的 Anduril 项目中标或失标
        - 任意连续两个季度，Anduril 占 Hadrian 收入 >40%，且管线中没有可信多元化抵消项
        - 要求提交含具名目标和时间线的客户多元化路线图；考虑在下一轮融资中加入保护性条款
      - - Navy OBBBA 取消或不可抗力
        - NDAA 修正案；Navy 新闻稿；DoD 项目办公室公告；OBBBA 修订文件
        - Navy 正式撤回、实质性重组或就对 Hadrian 的 $900M OBBBA 承诺援引不可抗力
        - 投资论点破裂触发项：F4 经济性依赖 $900M Navy 资本；重估所有 DCF 情景；若未获得替代承诺，180 天内启动退出规划
      - - 质量漏检导致 DoD 项目取消资格
        - DCSA / DCMA 审计通知；客户 RMA 模式；AS9100D 监督审计结果；Aviation Week 和 Defense News 的零件故障报道
        - DoD 量产零件确认发生质量漏检，并导致项目取消资格、DCSA 审计，或主承包商正式提出纠正措施要求
        - 在根因分析完成前暂停进一步资本部署；要求独立 AS9100D 审计；评估项目恢复资格时间线和收入影响
      - - Chris Power 离职或无法履职（> 90 天）
        - 反映新领投方的 SEC Form D 文件；公司新闻稿；LinkedIn 动态和投资人沟通
        - Power 卸任 CEO 且没有具名、合格继任者，或无解释缺席公开 / 投资人活动 >90 天
        - 创始人依赖型投资论点的破裂触发项；加速继任尽调；评估董事会构成和临时 CEO 能力
      - - 国防预算自动削减或锚定项目削减 15%+
        - OMB President's Budget；NDAA 协商报告；持续决议公告；Lockheed MFC 业绩电话会
        - DoD 正式宣布将 Virginia-class 或 Columbia-class 潜艇项目，或 Anduril 主要国防科技项目组合削减 15%+
