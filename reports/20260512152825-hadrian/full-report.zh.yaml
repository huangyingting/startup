      - number: '5.5'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >
              Hadrian 的部署模式接入客户采购和质量体系，而不要求客户安装或运营任何软件。客户通过 Hadrian 门户提交图纸并管理交付排期；质量记录以 AS9100D
              兼容格式返回。路线图由四个工厂里程碑锚定：Factory 1 和 Factory 2 是已验证运营资产；Factory 3（270K sqft，Mesa AZ）在 $200M 投资后于 2026 年 1
              月开放；Factory 4（2.2M sqft，Cherokee AL）计划于 2026 年 3 月开放，由 US Navy 在 Other Budgetary Basis of
              Appropriations（OBBBA）框架下的 $2.4B 公私合作支持。2025 年 12 月的 Lockheed Martin MFC Memorandum of Understanding
              显示，Hadrian 有机会为多个导弹防御和精确打击项目（PAC-3、THAAD、PrSM、GMLRS）达成高产量供应协议。


              可靠性主张（机器稼动率 75–80%）尚未经过独立审计；所有数据来自公司口径，并由 Forbes 等媒体转载，未见第三方验证。Factory 4 的 2.2M sqft 约为 Factory 3 面积的
              8×，且是网络中迄今最大的设施；在这一规模达到宣称的运营效率指标，是最大单一未验证执行假设。技术依赖包括 CNC 设备 OEM
              供应链（多轴加工中心交期长）、特种原材料供应（titanium、Inconel、aluminum alloy、steel）、用于 ML 和遥测的云基础设施，以及 Opus
              代码库本身；后者对全部工厂运营构成单一软件供应商风险。
