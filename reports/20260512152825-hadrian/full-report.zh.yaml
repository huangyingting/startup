      - number: '2.5'
        title: 图表
        blocks:
          - type: callout
            title: DIB 机加工缺口是结构性的，不是周期性的
            body: >
              过去四十年，美国国防工业基础流失约 1.9 million 名专业制造工人——国防和航空航天制造领域工人从约 3 million 降至 1.1
              million。这不是短期需求冲击，而是劳动力结构性流失叠加制造资本长期投入不足。留存劳动力也在老化（机加工技工平均 45+ 岁），没有证据显示补充管线接近满足 AUKUS、Ukraine
              和太平洋威慑需求所需规模。这个结构性缺口，让 Hadrian 的 30 天培训管线和 AI 自动化运营成为真正的市场必需品，而不是锦上添花。
            calloutType: insight
            claimRefs:
              - CM004
              - CM005
          - type: callout
            title: 没有单一第三方来源能精确测算 Hadrian 的 SAM
            body: >
              国防精密 CNC 加工子板块不对应任何标准 SIC/NAICS 代码，主流市场研究机构也没有专门定规模。Grand View Research 测算的是更宽的航空航天制造市场，约 $908
              billion，口径过宽。NDIA 定性刻画缺口，但没有给出美元规模。因此，任何锚定精确市场数字的财务预测都有模型风险。投资人应把本章所有 SAM 估计视为研究团队综合模型，而非第三方验证的数据点。
            calloutType: risk
            claimRefs:
              - CM006
              - CM010
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Hadrian 的竞争版图横跨五类：（1）数字制造市场（Xometry、Fictiv、Protolabs），把买方匹配给第三方工厂；（2）AI 驱动增材制造（Divergent
              Technologies、Velo3D），重点是金属 3D 打印，而非 CNC 减材工艺；（3）传统机加工小厂——美国国防工业基础（DIB）中约 60,000 家私营 SMB
              机加工厂，合计掌握当前国防精密机加工收入的绝大多数；（4）国防主承包商自有制造（General Atomics、L3Harris、Boeing Defense），保留部分内部 CNC
              产能；（5）潜在未来进入者，包括资本充足的工业科技公司（如 Siemens、General Electric Aerospace），可能自建自动化工厂能力。

              Hadrian 相对五类竞争者的核心差异，是完全垂直一体的所有权模型——公司拥有并运营 CNC 机器、厂房和 AI 软件栈，而不是授权技术或充当市场中介。这个所有权模型让其 AI/MES 平台 Opus
              能形成运营反馈循环，在规模化场景下改进编程、排产和质量，市场平台做不到。Hadrian 明确表示，Opus 不对外销售，是嵌入工厂网络的自研优势。

              最显眼的公开市场可比公司 Xometry，是数字制造市场，拥有约 10,000+ 活跃供应商和约 $120M 年市场收入（FY2024）。商业模式根本不同：Xometry
              聚合需求，把订单路由给第三方工厂，不拥有机器或设施。这意味着 Xometry 无法像 Hadrian 专用且通过 ITAR 清场的工厂模型那样，保证 ITAR 合规、量产级产能或长期合同履约。Siemens 于
              2026 年 5 月宣布向 Xometry 少数股投资 $50M，凸显其 AI / 软件平台演进，但不改变非一体化工厂模型。

              传统机加工小厂——数千家私营工厂，平均机器开机率 30%，高度依赖熟练工——是 Hadrian 正在替代的主要既有玩家。这些工厂掌握当前大部分国防机加工收入，但缺少自动化、规模和培训管线，无法按 DoD
              所需速度扩产。
