      - number: '5.2'
        title: 产品模块与工厂资产图谱
        blocks:
          - type: paragraph
            body: >
              Hadrian 的商业基础设施包括四座处于不同运营阶段的工厂，以及连接这些工厂的 Opus MES 平台。Factory 1（Hawthorne, CA）是最初的概念验证（PoC）试点设施。Factory
              2（Torrance, CA；100,000 sqft）自 2023 年起成为主要商业生产基地，也是首个取得完整 AS9100D 认证的设施。Factory 3（Mesa, AZ；270,000
              sqft）代表重大扩产，面积约为 Factory 2 的 2.7×；Arizona Commerce Authority 已确认 $200 million 投资，该厂于 2026 年 1 月开放。Factory
              4（Cherokee, AL；2.2M sqft）正在建设，目标于 2026 年 3 月开放，并锚定与 US Navy 的 $2.4 billion 公私合作。


              Opus 平台是 Hadrian 的自研 AI MES，也是整套运营的软件核心。它不对外许可或销售；所有价值都通过 Hadrian 自有工厂产出实现。Opus 至少整合五个功能模块：AI
              作业调度器、数字孪生引擎、计算机视觉质量控制系统、IoT 传感器网络层，以及自动化物料搬运和 WIP 跟踪模块。这些模块共同支撑公司的核心运营主张：机器稼动率 75–80%，高于行业平均
              40–50%；每名工人运营 10 台 CNC 机器，而传统设施为 1–3 台。产品不覆盖复合材料、增材制造或非金属零件；它仅聚焦高规格项目所需的精密 CNC 加工金属部件。
            claimRefs:
