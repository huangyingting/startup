        - 低–中——需要 2–3 年持续资本投入，还要完成 ITAR 资质
        - 5+ 年
        - 评估 Hadrian 在工厂建设时间线上的先发优势，对比任何已宣布的竞争者设施计划
      - - ITAR 注册和 AS9100D 国防资质
        - 多家国防媒体称 Hadrian 工厂已完成 ITAR 注册并走 AS9100D 路径；Navy 公告确认 Factory 4 为国防级
        - 竞争者加速办理 ITAR 注册和 AS9100D 认证；第三方审核通常执行 12–24 个月时间线
        - 低——资质时间线由 DoD / 审核方控制，不由 Hadrian 控制
