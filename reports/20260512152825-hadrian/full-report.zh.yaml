      - number: '2.4'
        title: 增长驱动、市场顺风与采用约束
        blocks:
          - type: paragraph
            body: >
              Hadrian 最主要增长驱动，是美国 DoD 弹药和武器系统需求与当前国防工业基础产能之间有急迫且有记录的缺口；Ukraine、Taiwan 和 AUKUS 潜艇承诺进一步放大了这个缺口。NDIA Vital
              Signs 2024 调查覆盖 1,397 名受访者（568 名政府、829 名私营部门），发现扩产仍是政府和行业受访者共同的首要工业战备担忧。报告指出，过去 30
              年里，美国政府在两党共同执政周期中都没有为赢得近似对等冲突所需的工业足迹投入足够资源。

              五个独立催化因素正在推高近期需求：（1）AUKUS：澳大利亚采购 Virginia-class 和 SSN-AUKUS 潜艇，需要大幅扩大美国潜艇部件生产；海军在 Factory 4 公告中明确表示，至少需要三座
              F4 类型自动化工厂才能补上缺口。（2）Ukraine / 弹药：Ukraine 冲突暴露了 155mm 炮弹、GMLRS 火箭和 ATACMS 导弹产能短板；美国必须在继续供给盟友的同时重建库存。（3）NDAA
              条款：FY2024 National Defense Authorization Act 包含“工业基础再投资”条款，One Big Beautiful Bill
              Act（OBBBA）设立了直接制造基础设施拨款，资助 Factory 4 的 $900M 海军份额。（4）国防科技主承包商外包：Anduril、SpaceX
              等公司正在扩大自主系统和运载火箭产量，需要的机加工零件超过自有制造团队可供应节奏。（5）COVID 后供应链回流：两党政策共识已转向减少国防供应链对单一外国供应商的暴露，为国内自动化制造创造监管和采购激励。

              采用约束很实在。ITAR 合规和 DoD 质量管理体系（QMS）资质（AS9100D、NADCAP）会让新供应商进入主承包商项目经历 12–24 个月认证。资本强度高：每座 Hadrian 新工厂依规模需
              $200M–$2.4B。国防预算不稳定（持续决议、自动减支风险）可能推迟项目资金承诺。DoD 传统的最低成本 / 技术可接受（LCTA）合同框架，也会把精密机加工压向商品化，而不是为速度支付溢价。
