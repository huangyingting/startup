      - number: '4.2'
        title: 单位经济与毛利率
        blocks:
          - type: paragraph
            body: >
              Hadrian 是私营公司，未向任何公共监管机构提交财务报表（除 SEC Regulation D 表格外；这些表格确认融资规模，不披露收入、利润率或烧钱速度），因此单位经济只能用公开代理数据估算。Hadrian
              商业模型有两层经济性：工厂层经济性，以及单件或单项目经济性。


              在工厂层面，Hadrian 声称机器开机率 75–80%，传统机加工小厂约 30%；工人可同时操作 10 台机器，而传统设施每名熟练技工通常只操作 1
              台。若属实，这些生产率主张意味着单位人工成本显著更低、每平方英尺收入更高。截至 2026 年 Q1，Factory 2（Torrance，100,000 sqft）和 Factory 3（Mesa
              AZ，270,000 sqft）是主要生产设施。Factory 3 需要约 $200 million 公司披露资本投入，并由 Arizona Commerce Authority 确认；这意味着资本强度约
              $740 / sqft，约为传统机加工小厂建设成本的 2–4×。


              公司未披露毛利率。研究团队以公开 CNC 加工基准和可比公司 Xometry（XMTR）为参照（市场平台毛利率约 28–32%；垂直一体工厂更高），再叠加 Hadrian
              声称的生产率优势，估计精密部件成熟期毛利率为 35–50%。MaaS 和 FaaS 层因合同经常性更强，贡献利润率可能更高，但新项目早期认证和工装成本前置，会压低初期利润率。


              资本强度是工厂层面最主要财务风险：每座新设施在 Factory 4 规模（$1.5B+ 私人资本）之前，也需要 $50–200M+ 初始资本。按当前产量爬坡速度，工厂回本期估计为 3–5 年，但不确定性很大。
