      - number: '5.6'
        title: 信任、安全、网络安全与质量控制
        blocks:
          - type: paragraph
            body: >
              Hadrian 位于航空航天质量标准与国防网络安全要求的交叉点，因此承担多层合规负担。AS9100D 是基于 ISO 9001 的航空航天质量管理体系标准，已确认适用于 Hadrian
              的生产运营；Lockheed Martin、Anduril 和 Raytheon 层级公司等主承包商在下达生产订单前均要求该标准。AS9100D
              要求形成文件化的过程控制、校准记录、供应商资质程序、纠正措施跟踪和管理评审周期。鉴于其已确认的长期供应关系，Hadrian 看来已经实施这些要求。


              ITAR（International Traffic in Arms Regulations）合规对制造 PAC-3 导弹系统、THAAD 拦截器和 PrSM
              精确打击弹药等受控国防项目零件至关重要。Hadrian 在能力清单中明确列出 ITAR 合规，并运营符合 ITAR 要求的物理访问控制、人员筛查和出口申报程序。截至 Q1 2026，尚未公开确认 Hadrian
              已完成 CMMC Level 2 认证；该认证要求 110 项与 NIST SP 800-171 对齐的网络安全实践，并每三年接受第三方评估。根据 DFARS 252.204-7021，处理 Controlled
              Unclassified Information（CUI）的 DOD 承包商必须满足 CMMC Level 2，而导弹和潜艇部件制造相关技术数据大多属于 CUI。互联工厂架构（IoT
              传感器、云遥测、数字孪生数据流）形成网络安全攻击面，必须同时在 CMMC 与 ITAR 下管理。DOD 设施安全许可可支持访问涉密项目和 Special Access
              Programs，据报道也是目标，但尚未公开确认。
