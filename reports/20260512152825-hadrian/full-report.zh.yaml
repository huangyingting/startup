      - number: '7.3'
        title: 运营、质量与安全风险
        blocks:
          - type: paragraph
            body: >
              Cherokee, Alabama 的 Factory 4 是 Hadrian 最集中的运营风险。该设施 2.2 million square feet，约为 Factories 1-3 合计面积的 8x，并锚定
              $2.4 billion 公私承诺；建设、设备采购、劳动力爬坡或项目资质认证中任何重大延迟，都将直接损害整个投资论点。CNC 机器采购是最直接瓶颈：来自 Haas Automation、DMG
              Mori、Mazak 和 Okuma 的高精密加工中心有公开记录的 12-24 个月交期。Factory 4 设备需求可能达到数百台；公司尚未公开说明 F4 的采购时间线或供应商承诺。

              质量风险是任何 AS9100D 国防供应商的结构性风险。若一次确认的质量逃逸影响 DoD 生产项目，可能触发 DCSA/DCMA 审计、项目资格取消或供应商状态临时暂停。Hadrian 的自动化 CMM
              检测是真实缓释手段，但尚未在所有项目类型上得到独立验证，公司也未披露返工率或不符合项历史。对一家 Series C（$1.6B
              估值）公司而言，单次高关注质量事件会在记忆长且供应链治理保守的主承包商中造成不成比例的声誉损害。

              网络安全是横跨运营的风险。Hadrian 的 Opus AI MES 平台连接运营技术（OT，即 CNC 机器控制）与 IT 基础设施；这种 OT/IT 融合是针对美国防务工业基础的国家级 APT
              的明确优先目标。DISA STIG 合规和 CMMC Level 2 控制提供框架，但 Hadrian 未披露 Opus 平台的网络安全态势、事件历史或 STIG
              合规状态。员工规模风险是次级运营问题：Hadrian 的 30 天培训管线在少于 500 名工人规模下有效运转，但 Factory 4 目标为 1,000-2,000
              名工人；在该规模下培训质量下降，可能同时损害安全指标和产品质量。
