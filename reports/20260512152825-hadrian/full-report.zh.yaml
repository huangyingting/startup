      - number: '1.5'
        title: 地理足迹与员工队伍
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Hadrian 的制造足迹横跨 3 个州。Factory 2 位于 California 州 Torrance（100,000 sq ft），是当前旗舰生产设施，自 2024
              年起已按完整商业规模运行。Factory 3 位于 Arizona 州 Mesa（约 270,000 sq ft），2026 年 1 月开放，是公司首个州外设施，预计投资 $200 million，创造约 350
              个新岗位。Factory 4 位于 Alabama 州 Cherokee（2.2 million sq ft），2026 年 3 月在海军公私合营框架下开放，是迄今最大单体设施。

              公司正在主动寻找 400,000 平方英尺的企业总部和 R&D 园区；Power 公开承诺，在 Series C 公布（2025 年 7 月）后 12 个月内再开 4–5
              家工厂。扩张速度激进，执行压力很高：每座新工厂都要在压缩时间表内拿到资本、合格劳动力、设备采购和监管资质。

              员工数从 Forbes 2024 年 8 月画像时的约 170 人，增至 Tracxn 数据显示的 2026 年 Q1 约 408 人。全员持股。30 天培训管线是劳动力规模化的核心：Hadrian
              有意从非制造背景（护理、零售、服务业）招人，借助 Opus 平台的引导式自动化层，让工人同时操作 10 台机器。
