      - number: '4.3'
        title: 资本充足性、融资与烧钱速度
        blocks:
          - type: paragraph
            body: >
              Hadrian 已通过五轮 Regulation D 融资累计获得约 $625 million 股权资本，并由 SEC EDGAR Form D 文件确认（CIK 0001863211）。最近一轮已确认融资是
              Series C（2025 年 7 月宣布；2025 年 7 月 28 日提交 Form D），由 Founders Fund 和 Lux Capital 领投，a16z、RTX
              Ventures、Construct Capital、137 Ventures、Altimeter Capital 和 1789 Capital 参与。


              SEC Form D 数据显示 Series C 有两份独立 Form D：2025 年 7 月文件显示总发行约 $161 million、已售约 $110 million；2025 年 12 月第二份 Form
              D 显示新增发行约 $151 million、已售约 $131 million，说明 Series C 最终以已确认 Form D 资本约 $292 million 关闭，超过公布的 $260 million
              头部数字。12 月文件涉及 39 名投资人，7 月为 28 名，说明这一轮被延展，或存在 Series C+ 分段。


              Factory 4（Cherokee, AL） $2.4 billion 公私合营与股权轮结构上分开：美国海军 $900 million OBBBA 出资是政府义务，$1.5 billion
              私人资本承诺预计来自债务额度、项目融资和额外股权的组合。股权融资（Series A–C 约 $625M）主要用于 Factories 1–3 的资本开支和运营费用。


              公司已融资 $625M，三座工厂投入运营，仍处于资本密集阶段。公司没有传递盈利信号。研究团队基于约 408 名员工、全成本平均 $180K 加上工厂折旧，估计年化运营费用超过 $90M；这一水平高于已披露的
              $30M 2024 年收入，意味着持续现金消耗显著。
