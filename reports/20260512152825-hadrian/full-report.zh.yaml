      - number: '6.5'
        title: 扩张动力与集中度风险
        blocks:
          - type: paragraph
            body: >
              Hadrian 的扩张模型遵循清晰的先落地再扩张路径：Precision Components 按需服务 → Manufacturing-as-a-Service（专用产能）→
              Factories-as-a-Service（完整设施运营）。Anduril 关系始于精密零件供应，并扩展至嵌入式 MaaS 产能。根据 2025 年 12 月 MOU，Lockheed Martin
              正从按需零件转向嵌入式工厂单元，这是典型向上销售。US Navy 则直接进入 FaaS 层级，代表最深度的关系层级。


              客户集中是重大不利风险。公开确认客户只有三个；Anduril 很可能贡献 2023–2024 年收入的 30–50%（在 Hadrian 年收入仅 $3–30M
              时，它是最早且最具战略意义的关系），公司高度暴露于单一客户风险。若 Anduril 因自身融资约束、项目取消或竞争性重新寻源而降低采购量，Hadrian 收入可能受到重大不利影响。


              Navy Factory 4 是第二个集中度风险轴：整座 2.2-million-square-foot 设施为政府项目下的潜艇部件生产而建。若 OBBBA 拨款减少、Navy 项目重组或采购时间线滑移，投入
              Factory 4 的私人资本（$1.5 billion）将利用不足，甚至可能搁浅。政府项目风险与商业客户风险在结构上不同，涉及政治、预算和监管变量，且均不在 Hadrian 控制范围内。


              RTX / Raytheon 可能抵消集中度：若 RTX Ventures 的投资演变为生产供应关系，Raytheon 将提供第三个大型主承包商锚点。SpaceX、Boeing Defense
              和其他大型主承包商也可能进一步扩大客户基础。不过，截至报告日期，这些关系均未被确认为生产客户。


              地域集中度是完整的：受 ITAR 约束，仅限美国。行业集中度极高：仅国防和航空航天。截至报告日期，没有商业航空航天、工业或医疗器械收入。Toarn
              的对抗性分析特别指出，客户集中、行业集中以及客户多元化公开证据有限，是投资论点的关键风险组合。
