      - number: '2.2'
        title: 市场规模——总可用市场（TAM）、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              给 Hadrian 的可服务市场定规模，需要从多个视角三角定位，因为没有单一分析报告覆盖自动化 CNC 国防精密加工这个具体细分。最宽口径是美国国防采购总额（FY2025 预算约 $886
              billion），涵盖全部国防支出，其中约 30–35% 流向商品和系统采购。在采购内部，精密机加工金属部件只是一个子集：行业估计占采购支出的 5–10%，意味着单 CNC 机加工零件每年总采购价值为
              $15–30 billion。

              更窄的视角来自航空航天零部件制造市场：Grand View Research 估计，2024 年全球航空航天零部件制造市场约 $908 billion，并以约 6.3% CAGR 增长至 2030 年。其中精密
              CNC 加工子板块约占航空航天零部件总市场 5–8%，对应全球精密航空航天 CNC 加工 TAM 为 $45–75 billion。美国国防部分约占全球航空航天支出的 20–30%，推导出美国国防精密 CNC
              TAM 为 $9–22 billion。

              第三个视角：Hadrian CEO 称，未来 10 年美国国防机加工是“数千亿美元级机会”，理由是海军需要把潜艇产量从每年 1.3 艘提升至 2+ 艘。Congressional Budget
              Office（CBO）估算，海军 30 年造舰计划总项目成本超过 $1 trillion，其中相当一部分会通过工业基础中的精密机加工部件流转。

              Hadrian 今天现实的 SAM，是满足三项条件的国防机加工细分：（a）现有 5-axis CNC 技术可自动化；（b）处于生产节奏合同，而不是一次性原型；（c）当前被传统工厂服务不足。按这个口径，仅公司自己的
              Factory 4 承诺（初始生命周期 $2.4 billion）就意味着 Hadrian 认为近中期即时可服务市场为 $5–20 billion。若假设 Factory 4 至 Factory 8
              建设计划执行到位，未来 5 年 SOM 估计为年收入 $1–5 billion。
