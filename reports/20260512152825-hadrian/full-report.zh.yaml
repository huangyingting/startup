      - number: '3.2'
        title: 竞争者能力对比
        blocks:
          - type: paragraph
            body: >
              把 Hadrian 与最接近的竞争者逐项比较，可以看到替代方案在自动化深度、国防资质和量产级产能上存在系统性缺口。

              在 AI 自动化 CNC 编程上，Hadrian 的 Opus 平台可在几分钟内从零件几何文件自动生成机器程序；Xometry
              提供报价自动化，但依赖第三方供应商解读并编写每个订单；传统机加工小厂完全依赖经验机加工技工手工编程（中位年龄 45+）。Divergent Technologies 的 AI
              自动化用于增材制造的拓扑优化，而非减材 CNC。

              在 ITAR 和国防资质上，Hadrian 工厂基础设施已完成 ITAR 注册，并围绕国防级质量管理建设（AS9100D / NADCAP 路径），Factory 4
              还处于与美国海军直接公私合营框架下。Xometry 具备市场层 ITAR 处理能力，但无法保证网络内每个供应商都满足 ITAR 设施要求。传统机加工小厂差异很大——有些完成 ITAR 注册，多数没有 NADCAP
              认证。Protolabs 产线是商业级，不是国防资质级。

              在生产规模上，Hadrian 工厂模型面向高产量、长周期量产（每个项目每月 1,000–10,000+ 个零件），不是原型或一次性订单。这契合 DoD
              对持续提高生产节奏的需求，而不是工程样件。Xometry、Protolabs 和大多数机加工小厂覆盖从原型到小批量的全谱系；没有一家展示出 Hadrian 为军工生产合同搭建的工厂级运营模型。

              配套矩阵（FP002）中的功能广度评分，基于公开证据评估；标为“未知”的单元格代表公开证据缺口，而非确认没有能力。
