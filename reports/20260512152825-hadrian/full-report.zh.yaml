      - number: '6.2'
        title: 采用路径与商业爬坡
        blocks:
          - type: paragraph
            body: >
              Hadrian 的商业路径可由收入披露、客户公告日期和工厂投产里程碑共同重构。公司于 2023 年商业化，这是 Precision Components 和 MaaS 销售的第一个完整年度；报告收入约 $3
              million，几乎全部来自 Anduril 锚定关系和早期按需客户。2024 年增长 10× 至约 $30 million，说明其已显著超出单一锚定客户，多份未具名生产合同与 Anduril 关系共同贡献。


              Hadrian 的客户获取漏斗受国防采购周期显著约束。新生产客户通常需要 12–24 个月，才能从初始接触走完资质认证、AS9100D 审核、首件检验和合同授予。Hadrian 的 Opus
              平台将报价阶段压缩至数分钟，但资质认证和采购周期是客户侧约束，会压低漏斗转化率。


              RTX Ventures 在 Series B（2024 年 2 月）领投，是重要采用信号：Raytheon Technologies 的投资部门若未对 Hadrian
              作为潜在精密加工供应商完成供应链审查，不会领投 $117 million 轮。虽然 Hadrian 与 Raytheon 之间没有披露明确生产合同，但该投资暗示 Tier-1
              主承包商验证，以及潜在的前置采购订单管线。


              Datum Source 收购（2024 年 8 月）和 Lockheed Martin MOU（2025 年 12 月）代表两条不同采用路径：前者通过既有市场扩展按需（Tier-1
              零件）管线，后者则把关系从零件供应深化到嵌入式工厂产能。Navy Factory 4 承诺代表最深客户集成，即 FaaS 层级，并作为未来 DoD 机构和主承包商评估 FaaS 的参考锚点。
