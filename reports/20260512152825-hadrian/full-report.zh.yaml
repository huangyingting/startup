      - number: '1.4'
        title: 里程碑、运营轨迹与负面事件
        blocks:
          - type: paragraph
            body: >
              Hadrian 的运营时间线从 2020 年成立，延伸到 2023 年商业化启动，并在 2024–2026 年快速放量。2023 年（首个完整商业年）收入达 $3 million，2024 年预计增长约 10×
              至 $30 million；Power 将 2025 年描述为“快速进攻式增长”，但未披露具体数字。公司尚未公开披露 2025 年收入。

              这一阶段形成的关键合作包括：2023 年 6 月与 Anduril Industries 的战略制造合作，把 Anduril 自主系统机加工零件交期最多缩短 50%；2025 年 12 月与 Lockheed
              Martin Missiles and Fire Control 签署 MOU，在 Lockheed 设施内嵌入 Hadrian 工厂单元，用于 PAC-3 MSE、THAAD、PrSM 和 GMLRS
              部件生产。2024 年 8 月，公司还收购 Datum Source——一个连接客户与机加工厂的 SaaS 工具，把分销触达延伸到从原型到量产的工作流。

              现有公开资料未发现监管行动、产品召回、安全事故或不利法律程序。不过，批评者和分析师指出，相比野心规模，Hadrian 仍是一家收入体量很小的公司：2024 年收入约 $30 million，估值超过过去收入的
              50×，反映市场押注它能持续超高速增长，并成为国防部再工业化平台，而非成熟收入机器。
