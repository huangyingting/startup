      - number: '8.2'
        title: 建议与置信度
        blocks:
          - type: paragraph
            body: >
              基于截至 2026 年 Q2 可得证据，研究团队对以 $1.6 billion Series C 估值新投资 Hadrian 给出 HOLD / RESEARCH-MORE
              建议。这是价格敏感和证据缺口评级，不是公司质量评级。Hadrian 是一家高质量公司，产品有吸引力，投资人阵容顶级，也确实受益于国防顺风。 问题在于，$1.6 billion 估值对应已披露 2024 年收入
              $30 million；在没有经审计财务确认毛利率、没有披露 Factory 4 资本结构、也没有绑定性客户承诺（而不只是 MOU）的情况下，这个倍数太高，无法承销。投资委员会在拿到第 6
              节列出的最终尽调材料前，不应按这个价格投入资本。

              风险评级：高。主导风险包括：（1）Factory 4 执行——$2.4 billion 建设对公司没有先例，任何实质性延迟都会把牛市情形压缩一到两年； （2）资本强度——Factory 4 的 $1.5
              billion 私人承诺可能带来资产负债表义务，规模超过公司此前所有股权融资总和； （3）客户集中——估计约 80% 收入来自少于五个锚定项目；（4）财务不透明——毛利率、烧钱速度、现金头寸和 2025
              年收入均未公开披露。单看每项风险都未必一票否决，但合在一起，无法支持高置信度的正面建议。

              对 HOLD 建议本身的置信度为中等：收入轨迹和市场背景清楚，但精确估值建模所需的关键财务和结构输入缺失。 RESEARCH-MORE 路径仍然存在——拿到经审计财务或管理账、确认 Factory 4
              私人资本结构，并看到一个已披露的 2025 年收入里程碑后，建议可以转为 BUY（若基本面支持）或 PASS（若毛利率低于预期）。基准情形下，从 $1.6 billion 入场，目标回报为四到五年
              0–3×；前提是 Factory 4 部分成功，并由国防主承包商以 $3–5 billion 战略收购。
