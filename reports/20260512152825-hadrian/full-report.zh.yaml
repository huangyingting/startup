  - id: FP003
    title: 护城河 / 准备度 KPI
    type: kpi
    layout: compact
    summary: |
      关键竞争 KPI，用来量化 Hadrian 相对于传统机加工厂和数字制造替代方案的结构性护城河。
    data:
      items:
        - label: 机器稼动率——Hadrian 对比传统机加工厂
          value: 75–80% vs. ~30%
          unit: uptime rate
          note: 单机吞吐量优势 2.5x；同等产出所需机器更少
        - label: 工人与机器比（Hadrian 对比传统）
          value: 1:10 vs. 1:1–2
          unit: workers per machine
          note: Opus 自动化编程和排产；培训 30 天，而机加工技师需要数年
        - label: 报价周转时间（Hadrian 对比机加工厂）
          value: Minutes vs. Days–Weeks
          unit: time to quote
          note: Opus 从 CAD 文件自动报价；传统 RFQ 流程需要 2–14 天
        - label: 长期合同收入占比
          value: ~80%
          unit: '% of total revenue'
          note: 3–7 年生产协议；带来强客户锁定和收入可见性
        - label: Xometry 活跃供应商网络
          value: 10,000+
          unit: active suppliers
          note: 市场平台规模大——但不自有工厂，也没有 ITAR 保证
        - label: Hadrian 单座工厂资本投入
          value: $200M–$2.4B
          unit: USD per factory
          note: 高资本开支构成复制壁垒；Factory 4 = $2.4B 公私合营投资
        - label: 新进入者 ITAR 资格周期
          value: 12–24 months
          unit: months
          note: 第三方强制执行；新竞争者无法加速
        - label: Xometry FY2024 市场平台收入
          value: ~$120M
          unit: USD annual
          note: 公开披露；用于对照 Hadrian 在更窄细分市场的 2024 年 ~$30M 收入
