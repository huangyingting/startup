      - number: '3.5'
        title: 图表
        blocks:
          - type: callout
            title: Xometry 和 Hadrian 解决的是不同客户问题
            body: >
              Xometry 和 Hadrian 常被并列为“数字制造”公司，但它们对应的客户需求结构不同。Xometry 解决采购发现问题：买方上传 CAD 文件，获得即时报价，订单被路由给 10,000+
              供应商之一。这个模型针对商业客户、原型和非关键零件优化。Hadrian 解决生产可靠性问题：国防主承包商或政府项目办公室需要有保证的 ITAR
              合规、量产级、长周期机加工部件，并且质量要稳定——这需要专用且通过资质的工厂，而不是市场平台。Siemens 2026 年向 Xometry 投资 $50M，确认了市场平台在从设计到报价智能中的价值，但没有把
              Xometry 变成工厂运营商。二者的直接竞争仅限于国防相邻商业业务的窄区间。
            calloutType: insight
            claimRefs:
              - CP001
              - CP002
              - CP009
          - type: callout
            title: 护城河风险：CAM 软件商品化与 AI 制造智能
            body: >
              Hadrian 的 Opus 平台护城河长期首要风险，不是直接竞争者复制工厂模型，而是 AI 驱动 CNC 编程本身走向商品化。商业 CAM 软件（Siemens NX、Mastercam、Autodesk
              Fusion 360）越来越多加入 AI 辅助刀路生成，开源 CNC 自动化项目也在推进。如果 AI 驱动 CNC 编程成为广泛可得的软件商品，Hadrian
              的差异化会收窄到工厂网络和已认证客户关系——仍然有意义，但弱于当前“平台 + 工厂”组合。2026 年 5 月宣布的 Siemens–Xometry
              集成，就是这一路径最早形态：把制造智能嵌入设计工具，而不是工厂运营。
            calloutType: risk
            claimRefs:
              - CP024
