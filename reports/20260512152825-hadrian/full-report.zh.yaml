  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Hadrian 的商业产品围绕两个明确层级，服务航空航天与国防客户。第一层级 Precision Components 是按需、固定价格服务：客户通过 Hadrian 数字门户提交工程图纸，数分钟内收到 AI
              生成报价，而非传统机加工厂常见的数天或数周；随后客户依据长期供应协议下达采购订单。Hadrian 制造零件，并随货提供完整 AS9100D 质量记录。第二层级
              Manufacturing-as-a-Service（MaaS）在多年合同下提供专用加工产能，Hadrian 实质上代表客户运营其工厂网络中的预留部分。第三层级
              Factories-as-a-Service（FaaS）是在大型客户现场或附近部署一座由 Hadrian 运营的完整工厂；Factory 4（Cherokee, AL）是首个已确认 FaaS 实例，由 US
              Navy 在 OBBBA 框架下锚定。


              已确认商业客户包括 Anduril Industries（战略合作）、Lockheed Martin Missiles and Fire Control（2025 年 12 月签署 MOU，覆盖
              PAC-3、THAAD、PrSM 与 GMLRS 部件供应）以及 US Navy（Factory 4 承包商关系）。据 Forbes 报道的公司口径数据，Hadrian 约 80% 收入来自多年生产合同（3–7
              年），可见度强，并限制现货市场暴露。公司报告 2023 年收入约 $3 million、2024 年约 $30 million，同比增长 10×；2025 年则被描述为继续激进增长。
