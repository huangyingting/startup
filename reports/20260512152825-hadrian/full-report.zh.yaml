  - id: FE001
    title: 产品架构图
    type: stack
    caption: Hadrian Opus MES 技术栈——从客户界面到云基础设施的五个集成层
    data:
      layers:
        - label: 客户界面
          detail: 用于提交图纸的数字 RFQ 门户；自动报价交付；生产跟踪看板；AS9100D 质量记录交付
          items:
            - label: 数字 RFQ 与报价门户
              detail: 客户上传 2D/3D 图纸；Opus 解析几何形状，并在数分钟内生成固定价格报价
            - label: 客户生产看板
              detail: 实时订单状态、机器队列位置、质量记录访问和交付跟踪
        - label: Opus AI 与 MES 核心
          detail: 自研 AI 制造执行系统（MES）——作业排产、报价、数字孪生和项目管理
          items:
            - label: AI 排产 / 排序器
              detail: 使用优化算法在机器群中分配并排序作业；最小化换型；从图纸生成 CNC 程序
            - label: 数字孪生引擎
              detail: 实时工厂状态模型，跟踪机器占用、WIP 位置和刀具寿命；在瓶颈影响交付前预测瓶颈
            - label: 自动报价引擎
              detail: 解析工程图纸；选择工艺和材料；无需人工估价员即可生成固定价格报价
        - label: 质量与合规层
          detail: 过程内尺寸检测、质量记录生成，以及 AS9100D/ITAR/CMMC 合规控制
          items:
            - label: 计算机视觉 QC
              detail: 基于工业相机，在加工检查点做过程内检测；按序列号生成数字质量记录
            - label: 合规控制
              detail: ITAR 访问控制、AS9100D 文档管理、审计轨迹和 FAI 记录生成
        - label: 车间自动化
          detail: CNC 机器群、IoT 监控和自动化物料搬运——物理生产层
          items:
            - label: CNC 机器群
              detail: 多轴铣削和车削中心；稼动率 75–80%，行业平均 40–50%；按 10:1 机器 / 工人比例运营
            - label: IoT 传感器网络
              detail: 覆盖全机器群的主轴健康、刀具磨损、冷却液和振动监测；输入预测性维护模型
            - label: 自动化物料搬运
              detail: 机器人 WIP 跟踪和托盘 / 夹具自动化；降低单件人工含量
        - label: 云与数据基础设施
          detail: ML 模型训练、运营分析、遥测存储和符合 ITAR 的网络架构
          items:
            - label: ML 训练平台
              detail: 用积累的机器遥测和质量结果训练排产、QC 和维护模型——Opus 数据飞轮
            - label: 符合 ITAR 的工厂网络
              detail: 气隙或零信任 OT/IT 网络架构；保护 CUI 和受 ITAR 管制的技术数据
