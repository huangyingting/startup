      - number: '6.4'
        title: 留存、合同耐久性与客户满意度
        blocks:
          - type: paragraph
            body: >
              Hadrian 未公开披露任何时期的净留存率（NRR）、总留存率（GRR）、客户流失率或 Net Promoter Score。作为一家服务 B2G 与 B2B 工业市场的私营公司，Hadrian 不在
              G2、Capterra、Gartner Peer Insights 或任何其他面向消费者的评价平台覆盖范围内。因此，无法从公开来源开展定量留存分析。


              合同模型的结构性留存分析可提供定性代理。Hadrian 约 80% 收入来自多年生产合同（按公司口径为 3–7
              年），意味着大部分收入绑定在排期中，而不是受年度续约影响。国防生产客户的转换成本极高：更换合格机加工供应商需要重新执行 AS9100D 审核、首件检验和资质认证项目，可能耗时 12–18
              个月并花费数百万美元。一旦 Hadrian 成为项目内合格供应商，合同期内流失在结构上非常不可能。


              Anduril 关系是目前可获得的最强留存数据点。从 2023 年 6 月至报告日期，该合作持续活跃并不断被公开引用，约三年。公开信息中没有降量、重新寻源或合同争议迹象。Anduril 在 2025 和 2026
              年仍于官方材料中继续提及 Hadrian 作为制造合作伙伴，这为持续活跃生产提供了合理信心。


              Lockheed Martin MOU 过于新近（2025 年 12 月），尚不足以提供留存证据；其生效时间还未长到涉及续约。Navy Factory 4
              关系因设施投资规模而天然具有长期属性；实际合作年限将以数十年而非数年衡量。


              客户满意度完全是推断，而非测量。Hadrian CEO Chris Power 在多次访谈中将客户需求描述为“stronger than we can
              fulfill”，暗示需求侧拉动。若该说法准确，则留存风险很低。不过，这些是公司侧表述，尚未由任何公开来源中的客户引用佐证。
