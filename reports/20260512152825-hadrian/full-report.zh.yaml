      - number: '7.5'
        title: 财务、模型与人员风险
        blocks:
          - type: paragraph
            body: >
              在 Hadrian 投资画像中，结构最不透明的风险是 Factory 4 的 $1.5 billion 私人资本承诺。不同于已在 SEC Form D 申报中记录的股权融资，这笔 $1.5B
              承诺的性质尚未被公开说明。它可能是股权、项目融资、收益债、政府支持贷款，或某种混合结构。若其结构是债务或项目融资，将形成杠杆义务，规模显著高于 Hadrian
              此前全部股权融资合计；该义务对外部观察者不可见，并优先于任何普通股。F4 建设和设备采购的营运资本需求也意味着，在该设施产生首笔收入前会消耗大量现金。

              Hadrian 未披露烧钱速度，是第二项重大财务风险。约 408 名员工，按估计 $180,000 全成本平均费用，加上四座设施的工厂折旧和运营费用，研究团队估计年化运营费用为 $90 million
              或更高，显著超过已披露 2024 年收入 $30 million。前两到三大客户收入集中度很可能超过 80%；若没有客户级收入披露，无法量化单一合同不续约导致收入阶梯式下滑的概率。

              人员风险是独立类别。Chris Power 作为唯一创始人兼 CEO，是 DoD、国防主承包商和领投方的主要关系所有者；公司未披露继任计划。除 Power 和 Baker
              外，领导团队偏薄；若两人同时离职，将同时损害机构关系和工厂运营连续性。员工人数在 18 个月内从 170 增至 408，带来超高速制造企业常见的文化和流程整合风险；当产品是在 AS9100D 和 ITAR
              监管下的安全关键国防部件时，这类风险尤其重要。
