  - id: TV006
    title: 最终尽调问题表
    type: enum
    coverage: partial
    enumerationScope:
      coverage: partial
      basis: >-
        Priority diligence asks derived from evidence gaps identified in this research process; not exhaustive of all
        standard due diligence items.
    summary: >-
      Prioritized final diligence asks to move from HOLD / RESEARCH-MORE to a positive commitment recommendation at or
      near $1.6B.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
      - 优先级
    rows:
      - - F4 私人资本结构
        - $1.5B Factory 4 私人资本承诺究竟是股权、债务、项目融资还是收入债券
        - 决定杠杆风险和潜在稀释时间表；股权投资者面对重大资产负债表不确定性
        - 与 CFO 通话；审阅投资条款清单；法律尽调；Alabama UCC / 留置权检索
        - 关键 — 缺少它无法形成投资判断
      - - 经审计或 CPA 审阅财务报表
        - 任何年份 P&L、资产负债表或现金流量表均未公开
        - 没有审计报表就无法核验收入确认、毛利率、烧钱速度或现金跑道
        - 要求 2023–2024 年经审计财务或 CPA 审阅；将 LOI 或约束性报价设为交付后生效
        - 关键 — 买入建议门槛
      - - 2025 年收入运行率
        - 2025 年或 2026 年 Q1 的收入数字或管理层指引均未公开
        - 校准远期倍数必须拿到收入数据；也能确认 10× 增长轨迹是否延续或放缓
        - 数据室管理账；投资人更新信；CFO 提供的当年销售报告
        - 高 — 影响所有情景概率
      - - 按客户划分的收入集中度
        - 未披露前三大客户收入占比；80% 长期合同组合意味着收入集中
        - Anduril 占比可能 >50%；单一客户流失风险；影响 DCF 和下行韧性
        - 数据室客户收入明细；前 10 大客户协议摘要及承诺量
        - 高 — 影响风险评级和论点破裂阈值
      - - Factory 4 里程碑计划
        - 未公开确认完工时间、施工阶段里程碑或承包商进度数据
        - F4 是主要多头催化剂；里程碑滑坡超过 60 天就是论点破裂触发器
        - 实地走访 Cherokee AL；建设承包商进度报告；公司确认的里程碑日历
        - 高 — 近期论点监控
      - - 按工厂和层级划分的毛利率
        - 任何期间的收入成本、毛利率或分部层面经济性均未披露
        - 判断规模化后单位经济模型能否支撑 $1.6B+ 估值的核心；缺少成本数据无法建模基准情景
        - CFO 在财务数据室提供按工厂和服务层级拆分的详细收入成本表
        - 高 — 影响所有公允价值建模
      - - 股权结构表与清算优先权栈
        - 股权结构表、清算优先权时间表或反稀释条款均未公开
        - 决定退出时有效股权回报；优先权悬置可能显著削弱普通股价值
        - 法律顾问提供股权结构表摘要和优先权瀑布；审阅投资人权利协议
        - 中 — 影响退出回报建模
      - - 防务合同管线 — 约束性协议 vs. MOU
        - LM MFC MOU 和其他 MOU 无约束力；除 Anduril 项目外，约束性积压订单规模未知
        - 约束性积压订单决定收入可见度和情景概率权重；MOU 不保证收入
        - 合同登记簿，拆分已签 PO、MOU 和 LOI；审阅供应协议条款
        - 中 — 影响基准和多头情景置信度
    notes: 优先级：关键 = 投资阻断条件；高 = 签投资条款清单前必须拿到；中 = 对回报建模准确性重要。所有事项都应在正式承诺前的尽调中解决。
