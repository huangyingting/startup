    title: 论点破裂与叫停触发器表
    type: enum
    coverage: partial
    enumerationScope:
      coverage: partial
      basis: >-
        Key thesis-break triggers identified from research evidence gaps and risk analysis; not exhaustive of all
        possible negative events.
    summary: >-
      Specific observable trigger events, thresholds, thesis impacts, and recommended actions for monitoring investment
      integrity post-entry.
    columns:
      - 触发器
      - 可观察阈值
      - 对投资论点的影响
      - 建议动作
    rows:
      - - Factory 4 开业延误 >6 个月
        - 任何公开公告或确认报道显示延误超过 2026 年 Q3
        - 移除主要多头催化剂；$500M+ 收入爬坡延后 12–24 个月；最好也只能落入基准情景
        - 每周监控；要求公司正式更新里程碑；重新评估回报模型
      - - 披露毛利率低于 25%
        - 审计报表、数据室或媒体中任何可靠披露显示毛利率 <25%
        - 动摇单位经济模型叙事；说明当前规模下成本结构差异化不足
        - 重新评估溢价倍数；重校至 8–12× 收入；要求详细工厂级成本结构
      - - Series D 轮投后估值低于 $1.6B
        - 任何公开宣布或 Form D 确认的更低估值融资
        - 投资者信心丧失得到确认；除非该轮只是很小的过桥融资，否则 $1.6B 入场价回报被摧毁
        - 立即评估退出；这一级别的下轮降价融资几乎自动打破论点
      - - 单一客户超过收入 50%
        - 任何可靠迹象显示一个客户（包括 Anduril）占 2025–2026 年收入 >50%
        - 极端集中风险；失去这个锚定客户可能危及公司生存
        - 在交易条款中加入收入集中度约束；触发披露治理权
      - - 美国海军取消或大幅削减 OBBBA 承诺
        - 美国海军或国会正式通知削减或取消 OBBBA
        - F4 项目可行性崩塌；$1.5B 私人资本承诺面临风险；整个 F4 论点失效
        - 立即评估退出；论点破裂；密切跟踪国防拨款调和流程
      - - 竞争对手以更低成本达到相当稼动率
        - 经媒体验证或审计确认，竞争对手在防务级 CNC 中达到 75%+ 稼动率且单件成本更低
        - 侵蚀核心运营护城河；没有产品差异化，53× 入场倍数无法辩护
        - 委托独立稼动率审计；重新评估技术护城河溢价；考虑倍数压缩
      - - Chris Power 作为唯一 CEO / 创始人离任
        - 公开宣布辞任、失能，或治理变更使 Power 脱离日常运营
        - 单一创始人依赖兑现；公司未披露继任计划，也没有联合创始人托底
        - 要求治理托底条款；COO 或联合创始人入职作为继续持有的前置条件
    notes: 触发阈值是监控指引，不是自动动作。每个触发器都要放在完整背景下评估。下轮降价融资和美国海军取消承诺几乎自动打破论点；其他触发器需要判断。
