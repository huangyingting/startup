      - number: '8.7'
        title: 图表与附录
        blocks:
          - type: callout
            title: 53× 收入倍数完全押注尚未确认的 Factory 4 成功
            body: >
              在 $1.6 billion 估值和 2024 年 $30 million 收入下，Hadrian 定价为过去收入的 53×——公开国防制造公司没有这样的先例。 即便是质量最高的国防零部件参照 TransDigm
              Group，也是在已验证盈利能力和数十年定价权支撑下按 12–15× 收入交易。Hadrian 溢价只有在 Factory 4（计划 2026 年 3 月开业）大规模成功并带来 $300–500 million
              年收入时才合理。Factory 4 私人资本结构（$1.5 billion）完全不透明；公司没有建造同等规模设施的先例； 任何 6 个月以上延迟，都会把牛市情形推入基准情形甚至更差。以 $1.6 billion
              入场的投资人，要承担一个 $2.4 billion 公私合作项目的全部执行风险，而该项目的私人资本条款并未披露。
            calloutType: risk
            claimRefs:
              - CV002
              - CV005
              - CV027
              - CV040
          - type: callout
            title: RTX Ventures 领投 Series B，形成战略收购方对齐
            body: >
              RTX Ventures（Raytheon Technologies 的风投部门）在 2024 年 2 月领投 Hadrian Series B，并参与了 Series
              C。作为领投方的战略投资人通常会获得更强的信息权、董事会观察员席位，以及收购讨论中的优先审视权。 这种对齐，加上 RTX 对 Hadrian
              所服务同一批国防项目的敞口，形成一条隐含收购路径；相比纯财务投资人退出，可能降低退出风险。 但如果 Hadrian 追逐竞争性主承包商，或在 RTX 供应链边界之外多元化，RTX 的战略利益也可能制造冲突。
            calloutType: insight
            claimRefs:
              - CV031
              - CV006
              - CV029
          - type: callout
            title: $1.6B 时 HOLD / RESEARCH-MORE——升级到 BUY 需要三个条件
            body: >
              研究团队建议为 HOLD / RESEARCH-MORE。三个条件可支持升级到 BUY：（1）经审计或 CPA 复核的财务确认毛利率 >30%，且现金跑道 >18 个月；（2）已确认 Factory 4
              私人资本结构显示为股权或项目融资，而非高级担保债务； （3）披露 2025 年收入，显示相对 2024 年 $30 million 基数仍有 2–5× 增长。三项全部满足后，研究团队才有足够信心支持在 $1.6
              billion 标记价附近投入资本。任何一项未达成，都应触发入场价重谈，或采用与里程碑挂钩的结构化投资，并把阶梯上调价格绑定到 F4 建设确认。
            calloutType: recommendation
            claimRefs:
              - CV009
              - CV013
              - CV015
              - CV039
