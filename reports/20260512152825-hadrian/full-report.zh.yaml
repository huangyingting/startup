          - type: callout
            title: ITAR 尾部风险随规模非线性增长
            body: >
              Hadrian 的 ITAR 合规义务不会随员工人数或工厂数量线性扩张；它随可接触受出口管制技术数据、硬件和制造流程的人数扩张。408 名员工分布在四座设施，ITAR 攻击面已经相当大。Factory 4 所需
              2,000+ 工人规模下，技术控制计划必须在一个新州、面对不同人才池，对数量级更高的人员进行筛查、制证和监控。Hadrian 员工单次故意 ITAR 违规可带来最高 20 年监禁和每次违规 $1.3M
              的刑事处罚。公司未披露任何关于技术控制计划架构、审计节奏或 DDTC 自评项目的信息。
