      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              International Traffic in Arms Regulations（ITAR，22 CFR 120-130）约束 Hadrian
              的全部国防生产运营。作为为飞机、导弹、海军舰艇和其他国防物项制造精密部件的制造商，Hadrian 必须维持有效 DDTC 注册，执行技术控制计划，按 US Person
              身份筛查所有员工和访客，并为任何国防物项或技术数据的出口或再转让取得许可。ITAR 违规可导致最高 20 年监禁的刑事处罚，以及每次违规最高 $1.3 million 的民事罚款。截至 Q1
              2026，任何公开来源均未披露 Hadrian 存在 DDTC 执法行动或自愿披露。

              CMMC（Cybersecurity Maturity Model Certification）依据 32 CFR Part 170，并于 2024 年 12 月最终确定；涉及 Controlled
              Unclassified Information 的 DoD 合同需要 Level 2 认证。Hadrian 的潜艇部件（Virginia 和 Columbia class）Navy OBBBA 合同几乎必然触发
              Level 2 要求，迫使 Hadrian 完成第三方 C3PAO 评估。公开 SPRS 门户可有限验证自我证明分数；Hadrian 尚未披露任何设施的 CMMC 评估时间线或 SPRS 分数。Alabama 的
              Factory 4 将需要单独 CMMC 范围界定。

              Hadrian 在公司材料中声称拥有 AS9100D 质量管理认证。该标准约束航空航天质量体系，并要求年度监督审核；审核失败或不符合项可能触发认证暂停。尚无独立来源确认 AS9100D 范围覆盖 Hadrian
              全部四座设施。OSHA 29 CFR 1910 和 EPA RCRA 危险废物法规适用于所有制造地点；Hadrian 未披露可记录事故率或环境合规记录。NLRB 组织化风险虽潜伏但真实存在：408 人员工分布在
              California 和 Alabama，且各州劳动力市场条件不同，形成潜在工会组织活动暴露。
