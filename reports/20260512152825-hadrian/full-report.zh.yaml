      - number: '5.7'
        title: 证据图表
        blocks:
          - type: callout
            title: Opus 数据飞轮是核心防御引擎
            body: >
              Hadrian 最深的竞争护城河并非 Opus MES 软件本身——原则上可以被复制——而是随每座新工厂和每个生产项目累积的机器遥测、刀路程序、质量结果和排程历史。每多生产一个零件，AI
              调度器的报价会更准确，CV QC 系统的检测会更精细，数字孪生也能更早建模瓶颈。若竞争者从零复制 Opus，将没有训练数据起点，并会面对 Hadrian 已安装基础带来的复利差距。这个飞轮使 AI
              驱动精密加工的先发优势比可比软件创业公司更持久，因为数据在内部生成且不可公开获取。限制条件是尚未识别到专利，因此针对资金充足模仿者的法律保护完全依赖商业秘密状态和组织知识留存。
            calloutType: insight
            claimRefs:
              - CE015
              - CE032
              - CE017
          - type: callout
            title: CMMC Level 2 缺口威胁完整 DOD 合同资格
            body: >
              截至 Q1 2026，尽管 Hadrian 运营互联工厂 IoT 基础设施，并处理与多个导弹防御和潜艇项目相关的 Controlled Unclassified
              Information（CUI），公司仍未公开确认已完成 CMMC Level 2 第三方评估。CMMC Level 2 根据 DFARS 252.204-7021 被要求，规定 110 项与 NIST SP
              800-171 对齐的网络安全实践，并需由 C3PAO（Certified Third-Party Assessment Organization）每三年评估一次。在 Level 2 状态未确认前，随着 CMMC
              执法在 2026 年推进，Hadrian 可能在某些 DOD 主承包与分包授标上遇到合同障碍。互联工厂架构放大这一风险：IoT 传感器网络、云遥测管线和数字孪生数据流构成必须在评估前加固的攻击面。未来 12
              个月内取得 CMMC Level 2 应被视为优先执行事项，而非行政手续。
            calloutType: risk
            claimRefs:
              - CE019
              - CE028
              - CE029
  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户细分与买方画像
        blocks:
          - type: paragraph
            body: >
              Hadrian 的可服务客户范围几乎完全由其 ITAR 注册和仅限美国运营所定义。三个已确认客户账户均为美国本土实体，管理层也明确表示 Hadrian
              不向外国买方销售。因此，实际可服务市场是美国防务工业基础，涵盖国防科技创业公司（Tier 0）、Tier-1 主承包商，以及作为直接买方的美国政府。


              当前主要细分是国防科技创业公司，典型代表为 Anduril Industries。这类公司需要为自主系统、火箭和无人机快速获得低交期的精密加工零件；这些特征使 Hadrian
              自动化、快速周转模式相较传统作业车间具备强适配性。Anduril 是 Hadrian 首个公开确认的生产客户，双方于 2023 年 6 月启动战略制造合作，并将机加工零件交期最高缩短 50%。


              第二个细分是 Tier-1 国防主承包商，例如 Lockheed Martin。这些公司运营 PAC-3、THAAD、PrSM、GMLRS 等超大规模项目，并正在探索 Hadrian 的
              Manufacturing-as-a-Service（MaaS）和 Factories-as-a-Service（FaaS）层级，以获得嵌入式工厂产能。2025 年 12 月的 Lockheed Martin
              Missiles and Fire Control MOU 是最清晰信号，说明 Tier-1 主承包商愿意把关系从按需零件深化到工厂级集成。


              作为直接买方的美国政府构成第三个细分，由 US Navy 于 2026 年 3 月委托 Hadrian 在 Cherokee, Alabama 的 Factory 4 锚定。$2.4 billion 公私合作由
              $900 million Navy OBBBA 资金与 $1.5 billion 私人资本组成，使 Navy 同时成为 Hadrian 最大制造设施的客户和共同出资方，为 Virginia- 和
              Columbia-class 舰艇生产潜艇部件。


              商业航空航天（Boeing/Airbus 供应链）和 Tier-2 国防分包商是潜在未来细分，但尚未公开确认。Hadrian 2024 年收购 Datum Source——一家连接客户与机加工厂的 SaaS
              工具——暗示其有意扩大 Tier-2 原型到量产管线，但尚未披露任何具名 Tier-2 客户。
