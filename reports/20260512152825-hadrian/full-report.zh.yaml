      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Hadrian 的收入基础几乎肯定集中在少数锚定客户。Anduril Industries 是唯一公开确认的具名客户，研究团队基于合作深度估计其贡献 2024 年收入超过
              30%，合作内容包括专用机加工单元和多年生产合同。Anduril 自身资金充足（累计融资 $3.5B+），但尚未盈利；若 Anduril 国防项目中标或政府合同付款放缓，将在有限滞后后传导至 Hadrian
              订单量。公司尚未公开披露收入多元化时间线。

              US Navy 对 Factory 4 的 $900 million OBBBA 承诺是第二个关键依赖。尽管
              AUKUS/潜艇更新项目获得政治支持，它仍受年度国会拨款、预算交易结构和继续决议风险影响。Hadrian 未披露 OBBBA 里程碑付款计划，而该计划可澄清现金流时点风险。CNC 机器供应商，主要是 Haas
              Automation、DMG Mori、Mazak 和 Okuma，构成资本设备供应链依赖；若从单一供应商集中采购，尤其考虑 Haas 国内制造产能约束，将形成 F4 设备建设风险。

              RTX Ventures 作为 Hadrian Series B 领投方，代表更微妙的战略依赖风险。Raytheon Technologies 的投资部门可接触 Hadrian
              的战略计划、客户关系和技术路线图。若 RTX 制造战略转向，或 Raytheon 建立竞争能力，由董事会观察员身份和投资者权利造成的信息不对称可能不利。国防预算拨款风险影响整个客户基础：Hadrian
              基本所有收入来自国防项目（Anduril、Lockheed MFC、Navy），因此 15%+ DoD 项目削减会构成系统性收入风险。
