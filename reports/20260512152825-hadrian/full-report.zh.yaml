      - number: '8.6'
        title: 退出准备度与尽调要求
        blocks:
          - type: paragraph
            body: >
              Hadrian 在五年视野（2026–2031）内最可能的退出路径有三条：（1）由国防主承包商战略收购，（2）后期二级交易或带二级流动性的 Series D-plus 轮次，（3）公开市场上市（IPO
              或直接上市）。每条路径的前置条件和风险画像不同，需要分别尽调。

              战略收购是概率最高的退出路径。RTX Ventures 领投 Series B，已经与 Raytheon Technologies 形成明确战略对齐；与 Lockheed Martin Missiles and
              Fire Control 的 MOU（2025 年 12 月）引入第二个潜在收购方。国防主承包商历史上按 5–15× 收入收购制造能力；若收入达到 $500 million，$5–8 billion 收购对应
              10–16× 收入，仍在高质量、技术差异化制造资产可接受区间内。 Northrop Grumman 和 General Dynamics 因潜艇和精密零部件项目敞口，也可能成为潜在收购方。

              IPO 准备度要求收入持续达到 $500 million 或以上、可见 EBITDA 利润率达到 10–15%+，并完成 Factory 4 爬坡。基于当前轨迹，最早可信的 IPO 窗口是 2028–2030
              年，取决于 F4 执行。截至 2025–2026 年，受 DoD 工业基础整合举措和国防预算增加推动，国防行业 M&A 处于历史高位；这为退出期权带来有利顺风。

              在以 $1.6 billion 投入资本前，最终尽调要求包括：（a）2024–2025 年经审计或 CPA 复核的财务报表，确认收入、毛利率和烧钱速度； （b）确认 Factory 4
              私人资本结构——股权、债务还是项目融资；（c）来自管理账的当年收入运行率；（d）客户收入集中度明细； （e）Factory 4 建设施工里程碑时间表和完工日期承诺；（f）带优先权堆栈和反稀释条款的股权结构表。
              没有这些输入，研究团队无法在当前 $1.6 billion Series C 标记价上下 $200 million 范围内，将 HOLD / RESEARCH-MORE 调整为正面投入建议。
