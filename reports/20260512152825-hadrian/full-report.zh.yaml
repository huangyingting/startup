chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Hadrian 于 2020 年注册成立，2023 年开始商业运营，使命是“让美国再工业化”：建设 AI 驱动工厂，以比传统国防工业基础更快、更便宜、更高质量的方式生产精密机加工部件。公司总部在
              California 州 Torrance，另有 Hawthorne, California；Mesa, Arizona；Cherokee, Alabama 等设施。

              Hadrian 把自己定位为全栈先进制造公司，而不是合同制造商或软件供应商。核心判断是：成千上万家小型、老化的机加工厂依赖即将退休的员工，无法承接现代国防采购的增量需求；把 AI
              驱动自动化部署进专门建造的工厂，才能规模化补上缺口。创始人兼 CEO Chris Power 曾把中国制造优势带来的竞争威胁称为“生死攸关”，因此把 Hadrian 定义为国家安全基础设施。

              公司运营三层商业服务：（1）按需精密部件——从原型到量产，为客户生产飞行级机加工零件；（2）制造即服务（MaaS）——在 Hadrian 或客户设施内部署专用加工或检测单元；（3）工厂即服务（FaaS）——由
              Hadrian 设计并运营整条产品、装配和部件工厂，解决美国国防工业基础最关键的产能短板。三层服务都运行在 Hadrian 自研软件平台 Opus 上，自动处理设计解读、CNC 编程、工作流排产和自主检测。

              Hadrian 的工厂模型差异化在于 24/7 自动化运行，设备开机率 75–80%，而传统航空航天机加工厂约 30%；公司还建立培训管线，让没有制造经验的工人 30 天内达到满产效率。
