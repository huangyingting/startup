  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、细分与现状替代方案
        blocks:
          - type: paragraph
            body: >
              Hadrian
              的可服务市场，是美国航空航天与国防供应链中的精密机加工金属部件生产。支出横跨五类：（1）飞机结构件（机身框、翼肋、隔框）；（2）推进和发动机部件（涡轮叶片、压缩机机匣、燃烧室）；（3）武器和导弹部件（导引头、尾翼组件、火箭发动机阀体、作动器壳体）；（4）舰艇和潜艇精密零件（压力壳体、泵轴、阀歧管、声呐支架）；（5）地面车辆和电子设备精密壳体。公司有策略地优先切入（2）、（3）、（4），因为当前美国产能与所需生产节奏之间缺口最尖锐。

              增材制造（3D 打印）、复合材料制造、大型结构锻件和电子装配不属于近期可服务市场；这些都是独立工艺，需要不同资本设备和制造系统。不过，Hadrian
              的工厂即服务层最终计划把多种工艺纳入同一座自动化工厂，可服务范围会随时间扩大。

              国防工业基础（DIB）90% 以上的现状，是碎片化的中小型机加工厂：按 NDIA 估计，国防工业基础约有 60,000 家公司，其中绝大多数少于 20 名员工。这些工厂依赖老化 CNC
              设备和经验丰富的技工，很多技工接近退休。美国精密机加工技工平均年龄超过 45 岁；自 1980 年代以来，该行业制造工人减少约 1.9 million（航空航天 / 国防细分从 3 million 降至约 1.1
              million）。DoD 已明确把劳动力流失和产能缺口列为美国军事战备最紧迫风险之一。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
          - type: table
            tableRef: TM001
            claimRefs:
