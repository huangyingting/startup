      - number: '1.2'
        title: 领导层、创始人与治理
        blocks:
          - type: paragraph
            body: >
              Chris Power 在 Forbes 2024 年 8 月画像发布时 33 岁，是唯一创始人并担任 CEO。Power 成长于澳大利亚 Melbourne，从 Monash University
              退学，曾在零售和 SaaS 初创公司负责增长；2019 年，他带着 $6,000 和“美国工业衰退构成地缘政治威胁”的判断来到美国。创立 Hadrian 之前，他花 6 个月走访机加工厂，并于 2020
              年注册公司。Hadrian 之前，Power 运营 ADSC，这是一家专注收购中型国防供应链公司的小型投资载体；随后他解散 ADSC，转向从零建设工厂。

              运营副总裁 Chris Baker 此前在 SpaceX 管理机加工车间。Power 持续接触 6 个月后把 Baker 招为技术运营负责人；Baker 起初怀疑这个项目能否做成。Baker
              目前负责工厂现场系统和员工项目。Andreessen Horowitz 的 Katherine Boyle 和 Lux Capital 的 Brandon Reeves 担任董事会观察员；RTX Ventures
              的 Daniel Ateya 代表战略投资方进入公司治理架构。

              Hadrian 向全员授予股权，这是刻意设计的留才机制；传统制造商很少让一线生产工人持有所有权。Power 身兼 Hadrian 再工业化使命的公众面孔、DoD
              官员和国防主承包商关系的主要负责人，关键人依赖是实质风险。
