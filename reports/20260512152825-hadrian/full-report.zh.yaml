  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Hadrian 运营三层商业模型，客户关系越深，捕获价值越多。Tier 1——精密部件——是按需批量供应 CNC 机加工金属零件；客户提供图纸，Hadrian 根据采购订单或供应协议发出合格零件。Tier
              2——制造即服务（MaaS）——是在多年合同下嵌入客户生产计划的专用加工单元；Hadrian 代表客户运营该单元产能。Tier 3——工厂即服务（FaaS）——是在客户现场或附近由 Hadrian
              运营整座工厂；这是最深的集成层，已由美国海军（Factory 4, Cherokee AL）确认，并是与 Lockheed Martin Missiles and Fire Control 2025 年 12 月
              MOU 的主题。


              公司 2023 年首个完整商业年收入约 $3 million，2024 年约 $30 million，同比增长 10×。Forbes 和 Yahoo Finance 分别确认了约 $30M 的 2024
              年数字；公司尚未发布带具体收入数字的官方新闻稿。截至 2026 年 Q1，Hadrian 未披露 2025 或 2026
              年收入，只把增长形容为“激进”。收入确认与标准权责发生制一致，绑定生产里程碑；精密部件层不适用递延收入或订阅 SaaS 结构。


              根据公司披露数字，约 80% 收入来自多年生产合同（3–7 年）。这带来强收入可见度，降低流失风险，但也把履约集中在少数锚定项目（Anduril、Lockheed MFC、美国海军）。剩余约 20%
              估计来自按需零件和短周期业务。
