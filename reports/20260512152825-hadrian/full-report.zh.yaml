      - number: '8.4'
        title: 牛市 / 基准 / 熊市情形
        blocks:
          - type: paragraph
            body: >
              下列三种情形给出明确假设、估值逻辑和关键风险。所有情形估值均为研究团队基于上市可比公司倍数和 Hadrian 已披露收入轨迹作出的估算；它们不是目标价格。

              熊市情形（约 20% 概率信号）：Factory 4 延迟开业（2027 年 H2 或更晚），收入从 $30 million 基数起每年增长 1.5–2×，到 2027 年达到 $80–120
              million。随着增长放缓，公开市场倍数压缩到 5–8× 收入——这一区间与 Proto Labs 和 Xometry 在低增长阶段一致。隐含企业价值：$400–960 million。该情形会让 $1.6
              billion Series C 入场出现显著亏损。触发因素包括：F4 建设延误超过 2026 年 Q4；披露毛利率低于 25%；Series D 下轮融资；Anduril 收入集中度超过总收入 40%。

              基准情形（约 55% 概率信号）：Factory 4 按计划部分开业（2026 年年中），收入从 $30 million 基数增长 3–5×，到 2027 年达到 $150–250 million。随着 F4
              放量，毛利率收敛到 30–40%。国防主承包商（Lockheed、RTX 或 Northrop）战略收购，或后期 Series D 按 12–20× 收入融资，可在 2027–2028 年带来 $1.8–5.0
              billion 企业价值。从 $1.6 billion 入场的回报：持平到约 3×，不高但与风险画像基本匹配。

              牛市情形（约 25% 概率信号）：Factory 4 在 2026 年 3 月目标附近全面投产，并到 2028 年扩至理论产能的 60–80%。2027 年收入达到 $400–600 million。EBITDA
              利润率出现并达到 15–20%。IPO 或战略收购按 25–40× 收入定价，带来 $10–24 billion 企业价值。从 $1.6 billion 入场的回报：6–15×。该情形要求 F4
              几乎无瑕疵执行、国防预算没有大幅收缩，并且 Anduril 和美国海军项目继续增长且没有合约集中问题。

              最大不确定性是 Factory 4 的时间表和执行。投资人应把任何超过 60 天的延迟视为部分熊市触发因素，需要调整模型；并且应预先约定流程，在 2026–2027 建设爬坡期，根据里程碑被确认或落空来增减敞口。
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV040
