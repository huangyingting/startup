      - number: '1.3'
        title: 融资历史、投资方与估值
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 3 月，Hadrian 已通过四轮私募融资约 $625 million。种子轮（2022 年前，金额未披露）之后，2022 年 Series A 约 $90 million，由 Lux
              Capital、Andreessen Horowitz 和 Founders Fund 领投。2024 年 2 月 Series B 融资 $117 million，RTX Ventures
              作为重要新增战略投资方进入，Lux、a16z 和 Founders Fund 继续跟投。2025 年 7 月 Series C 融资 $260 million，由现有投资方 Founders Fund 和 Lux
              Capital 领投，Morgan Stanley 提供工厂扩张贷款额度，新进投资方 Altimeter Capital 和 1789 Capital 也参与。

              Series C 后，Hadrian 估值确认为 $1.6 billion，较 Series B 隐含约 $500 million 估值大约上调 3×。2026 年 3 月剪彩时宣布的美国海军 $2.4
              billion Factory 4 公私合营，把 $1.5 billion 私人资本与 One Big Beautiful Bill Act 的 $900 million 海军资金合在一起，是 Hadrian
              史上最大的单笔制造承诺。

              Hadrian 80% 的收入来自三至七年长期生产合同，支撑未来现金流可见度，也为资本密集的工厂建设计划提供依据。其余 20% 来自周期较短的原型和按需业务。截至报告日，除 Series C 套餐中的
              Morgan Stanley 设施贷款外，未见公开披露的债务融资。
