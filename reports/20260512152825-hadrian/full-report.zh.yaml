      - number: '8.3'
        title: 估值背景与当前轮次
        blocks:
          - type: paragraph
            body: >
              Hadrian 的 $1.6 billion 投后估值来自 2025 年 7 月宣布完成的 Series C，由 Founders Fund 和 Lux Capital 领投，a16z、RTX
              Ventures、Altimeter Capital、1789 Capital 和 Construct Capital 参与。SEC Form D 文件（CIK 0001863211）确认了两批融资：2025 年
              7 月文件显示约 $161 million 拟发行、约 $110 million 已售；2025 年 12 月文件显示另有约 $151 million 拟发行、约 $131 million 已售，投资人 39
              名（7 月为 28 名）。Form D 已确认的 Series C 总资本约 $292 million，高于公开宣布的 $260 million 标题数字；这表明投资人需求强劲，也可能意味着与 Factory 4
              里程碑挂钩的延长交割或第二批融资。

              在 $1.6 billion 估值和 2024 年 $30 million 收入下，隐含 EV/Revenue 约 53×。对照来看，最接近的上市可比公司 Xometry（XMTR）交易在 3–4×
              收入；Proto Labs（PRLB）约 1.5× 收入；国防零部件中质量最高的上市参照 TransDigm Group，即使已充分盈利，也交易在 12–15× EBITDA。即便给 Hadrian
              的增速和工厂规模化产能期权很高溢价，当前倍数也意味着投资人在定价一个情形： Factory 4 投产，并在三到五年内把收入放大到 $300–500 million。

              稀释和优先权悬置完全不透明：股权结构表、清算优先权堆栈、反稀释条款和按比例跟投权均未披露。若 Factory 4 的 $1.5 billion 私人资本以债务或可转项目融资形式落地，按 Series C
              价格进入的股权持有人在下行情形中可能承受显著清算优先权压力。 按这个价格入场，投资人必须完整建模下行，并把 Factory 4 里程碑确认前投入资本的期权成本计入价格。历史上，私有国防科技投资在 IPO 或
              M&A 退出时通常按 3–8× 收入定价；这意味着 Hadrian 必须达到 $200–500 million 收入，$1.6 billion 入场价才可能在传统退出倍数下产生市场水准回报。
