      - number: '5.3'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Opus 更适合被理解为 Manufacturing Execution System（MES）与 Advanced Planning and Scheduling（APS）软件的专用组合。它从一开始就面向
              Hadrian 自身的高混合度精密加工环境，而不是面向外部销售的企业软件。核心 AI 调度器摄取客户工程图纸，选择工艺与材料，生成刀路和 CNC 程序，并用优化算法在多轴 CNC
              机群之间分配机时，以减少换型时间、最大化吞吐。数字孪生持续建模车间实时状态，包括机器占用、WIP 位置、剩余刀具寿命，从而实现预测性排程，并在瓶颈影响交付承诺前提前识别。


              计算机视觉质量控制在加工检查点执行过程内尺寸检测，替代或补充质量流程中相当一部分人工坐标测量机（CMM）检测。每次检测都会生成与零件序列号或批次绑定的数字质量记录，支持 AS9100D 可追溯性要求，并生成
              AS9102 首件检验文档。IoT 传感器网络监控 CNC
              机群的主轴振动、冷却液水平、刀具磨损特征和机器健康参数，为预测性维护模型供数，减少非计划停机。自动化物料搬运很可能使用机器人托盘与夹具系统，跟踪在制品并将原料定位到机器旁，无需人工搬运物料，进一步降低单件劳动力含量。具体
              CNC 设备 OEM（Haas Automation、DMG Mori、Mazak 等是行业上合理的选择）和自动化供应商尚未由 Hadrian 公开确认。
