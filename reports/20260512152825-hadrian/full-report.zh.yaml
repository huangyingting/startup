      - number: '2.3'
        title: 买方与付款方分层
        blocks:
          - type: paragraph
            body: >
              Hadrian 的买方分为三层，每层采购画像、预算归属和采用触发因素都不同。Tier 1（商业化最成熟）是国防初创公司和新航天 / 自主系统公司：Anduril、SpaceX、Rocket Lab、Shield
              AI、Hermeus 及类似公司。它们缺少传统供应链关系，节奏快，也愿意奖励跟得上速度的合作伙伴。今天精密部件和 MaaS 收入主要来自这一层。

              Tier 2 是传统国防主承包商（Lockheed Martin、RTX、Northrop Grumman、General Dynamics、BAE Systems）。PAC-3、F-35、GMLRS 和
              THAAD 产量爬坡推高增量需求，这些公司已经意识到内部机加工产能不足，正越来越多转向外部自动化制造商。2025 年 12 月签署的 Lockheed Martin MOU 覆盖
              PAC-3/THAAD/PrSM/GMLRS 零件，是已确认的首个主承包商层级合作，也代表 Hadrian FaaS 模型最大的潜在收入层。

              Tier 3 是美国政府（DoD 直采）：海军 OBBBA Factory 4 公私合营是首个已确认的直接政府合作。DoD 2023 年 12 月发布的 National Defense Industrial
              Strategy（NDIS）明确要求投资现有工业基础无法支撑的制造产能，为 Hadrian 成为 DoD 指定基础设施伙伴打开通道。预算归属分散在项目办公室（PEOs）和国会批准的项目线。

              三类买方的采用触发点都是产能压力：F-35、PAC-3、GMLRS 和潜艇项目因零件短缺延误交付计划。这不是推测性需求；国会听证、项目办公室简报和媒体报道都有记录。
