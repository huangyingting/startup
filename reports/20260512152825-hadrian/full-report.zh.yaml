      - number: '7.7'
        title: 证据图表
        blocks:
          - type: callout
            title: Factory 4 是 Hadrian 历史上最大且未经验证的执行
            body: >
              Cherokee, Alabama 的 Factory 4 同时叠加所有运营风险类别：前所未有的规模（2.2M sqft，为此前全部工厂合计的 8x）、$2.4 billion 公私融资结构及不透明的 $1.5B
              私人资本分层、1,000-2,000 名工人的劳动力需求、数百台 CNC 加工中心且交期 12-24 个月的设备采购，以及对 US Navy 潜艇生产的合同履约义务。Hadrian
              未披露公开建设时间表、独立项目管理监督或设备采购里程碑。2026 年评估 Hadrian 的投资者，实质上是在承销一个没有公开进度审计的项目能否成功交付。
