      - number: '3.3'
        title: 定价与包装对比
        blocks:
          - type: paragraph
            body: >
              国防精密制造供应商的定价通常不透明，原因是合同保密、项目级定价，以及国防采购多层级结构复杂。以下分析基于公开表述、分析师报告和代理指标。

              Hadrian 不公布价目表，通常以三至七年期议价长期生产合同运营。其 Opus 驱动报价系统据称可在几分钟内为标准几何生成报价，但底层单件定价未公开披露。分析师评论认为，按单件计，Hadrian
              相比传统机加工小厂收取溢价，理由是报价速度、质量一致性和生产节奏可靠性。FaaS（Factory-as-a-Service）是价值最高的一层，把 Hadrian 制造单元嵌入客户或公共设施；Lockheed
              Martin MFC 合作和海军 Factory 4 是两个已确认的公开案例。

              Xometry 市场使用 AI 驱动的 Instant Quoting Engine（IQE），可从上传的 CAD 文件实时生成价格；机加工零件典型交期为 1–4 周。Xometry
              对标准机加工的定价有竞争力，但多供应商网络天然带来波动：质量、交付可靠性和 ITAR 合规取决于分配到的具体供应商。

              Protolabs 提供快速原型和小批量制造，支持在线报价，部分工艺交期 1–3 天，处于行业领先。其定价针对工程迭代（从原型到试点）优化，而非量产级国防项目。

              传统机加工小厂通过询价（RFQ）流程定价，通常耗时数天到数周，且没有标准化价格。多数采用采购订单或总括订单商业条款，缺少国防主承包商越来越需要的长期产能预留。
            claimRefs:
