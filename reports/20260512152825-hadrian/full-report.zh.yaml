      - number: '7.6'
        title: 缓释措施、论点破坏条件与尽调问题
        blocks:
          - type: paragraph
            body: >
              各风险类别的缓释措施在设计上可信，但在 Hadrian 目标规模上验证不均。ITAR 合规计划覆盖最高严重度监管风险，且 Hadrian 干净的 DDTC 执法历史降低概率。不过，公司运营扩张，尤其是在
              Alabama 招聘并让数百名新员工接触受出口管制的技术数据和硬件，显著扩大 ITAR 攻击面。监控指标包括：DDTC 禁业名单公布、CMMC 自我证明的季度 SPRS 分数更新，以及四座设施 AS9100D
              证书的公开登记。

              对运营风险而言，论点破坏条件更具体。Factory 4 开放时间较 2026 年 3 月延迟超过 12 个月，DCSA 审计发现导致项目暂停，或任何设施 CMMC Level 2
              评估失败，均应构成需要投资者立即复核的论点破坏事件。CNC 供应中断可通过 Haas/DMG Mori 财报电话会和交期披露监控，并辅以通过卫星图像或 Cherokee, AL 建设许可活动跟踪 F4
              设备安装进度。

              财务论点破坏条件包括：（1）$1.5B 私人 F4 资本承诺被披露含有使股权劣后的债务；（2）Anduril 收入因不续约而非多元化降至总收入 20% 以下；或（3）Factory 4
              开放时间表滞后期间，收入爬坡落后且运营亏损持续高于每年 $100M。关键尽调问题包括：经审计的 ITAR 技术控制计划、所有设施的 AS9100D 证书编号、CMMC 评估时间线和 SPRS 分数、Factory
              4 建设时间表和里程碑结构、Anduril 与 Navy 收入占总收入比例，以及 $1.5B F4 私人资本承诺的法律结构。
