      - - 计算机视觉质检
        - 在加工检查点做在线尺寸检验；补充或替代关键特征的人工 CMM
        - 工业相机系统；校准后的光学与照明夹具；测量算法
        - 严公差（±0.001"）准确性未经独立审计验证；切屑污染或冷却液下的失效模式未披露
      - - IoT 传感器网络
        - 监测 CNC 机群的主轴健康、振动、冷却液液位、刀具磨损；向预测性维护模型供数
        - CNC OEM 传感器 API 或加装传感器硬件；有线 / 无线工厂网络；符合 ITAR 的网络分段
        - IoT 联网车间扩大网络安全攻击面；必须同时满足 CMMC Level 2 和 ITAR 管理
      - - 自动化物料搬运
        - 跟踪工厂内 WIP；自动化托盘与工装夹具流转；降低单件人工投入
        - 机器人与输送系统（供应商未披露）；与 Opus Scheduler 集成用于备料
        - 具体供应商和系统架构未公开披露；机器人供应链风险；F4 规模下集成复杂
      - - CNC 机群
