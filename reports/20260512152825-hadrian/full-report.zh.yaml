  - id: TV002
    title: 投资论点 / 反论点表
    type: enum
    coverage: exhaustive
    summary: >-
      Structured bull-thesis and bear-anti-thesis across six valuation-critical dimensions with explicit view-change
      criteria.
    columns:
      - 维度
      - 多头论点
      - 反面论点（空头）
      - 改变判断的信号
    rows:
      - - 市场机会
        - 防务精密 CNC 有 $50B+ 总可用市场（TAM）；DoD 推动本土制造现代化；两党政策顺风有望跨选举周期延续
        - 市场转向慢于预期；防务主承包商保留内部机加工；预算封存风险限制可触达规模
        - 与 Anduril 和 LM MFC 之外的 3+ 家防务主承包商签下长期合同；确认积压订单超过 $500M
      - - 产品 / 技术
        - Opus MES 撑起可持续的 75–80% 稼动率护城河；人力杠杆 10×；30 天培训替代 2 年机械师培养通道，带来劳动力成本优势
        - PE 支持的机加工车间整合商可能复制自动化优势；防务主承包商也可能靠自建现代 CNC 基础设施复制
        - 独立审计验证稼动率和成本说法；与传统及新竞争对手的正面对标公开确认
      - - 客户
        - Anduril、美国海军、LM MFC 是一线锚定客户，具备长期合同潜力；美国海军 OBBBA 为 F4 需求托底
        - 收入集中在 3 个客户；Anduril 本身也是创业公司；MOU 无约束力；失去单一客户可能危及公司生存
        - 收入来自 10+ 家不同防务承包商；无单一客户占收入 >25%；MOU 转为有约束力的供应协议
      - - 财务
        - 同比增长 10×（$3M→$30M）验证产品市场匹配；F4 通往 $500M+ 收入运行率的路径清晰，毛利结构有利
        - 未披露毛利率；烧钱速度显著高于已披露收入；$1.5B F4 私人资本承诺完全不透明
        - 经审计财务显示毛利率 >30%、现金跑道 >18 个月；披露 2025 年收入且增长延续
      - - 执行 / 运营
        - F4（$2.4B 美国海军合作）降低需求风险并验证规模化模型；F1–F3 运营证据显示公司能建厂
        - F4 是公司史上资本强度最高的一注；延误会带来稀释性资本要求；Chris Power 单一创始人依赖
        - F4 按期或接近按期确认投产；美国海军生产订单签署；COO 或技术联合负责人到位
      - - 估值
        - $1.6B 估值由 F4 期权价值和 10× 增长轨迹支撑；Founders Fund 和 a16z 的高确信度为标记估值托底
        - 53× TTM 收入没有制造业先例；若增长放缓至 2–3× 区间，倍数压缩不可避免
        - $1.6B 或更高估值的二级交易确认标记；战略意向书价格达到或高于 Series C
    notes: 研究团队对公开证据的解读。运营指标基于公司披露数据；竞争判断来自研究团队分析。
