      - number: '4.4'
        title: 公开财务缺口与披露限制
        blocks:
          - type: paragraph
            body: >
              作为私营公司，Hadrian 无需向任何公共机构提交财务报表。公司唯一公开财务披露，是 SEC Regulation D 表格（确认融资金额、投资人姓名和股权结构）以及选择性媒体层表述（公开传达的收入数字只有
              2023 年 $3M 和 2024 年约 $30M）。


              关键财务未知项包括：毛利率、运营烧钱速度、账上现金、收入成本（包括 CNC 加工耗材、人工、材料）、MaaS / FaaS 合同条款、单工厂收入、Factory 4
              私人资本来源结构和长期债务额度。审计财报、管理账目或投资人信均未公开。


              Toarn 的对抗性分析估计，按员工扩张和工厂建设成本计算，Hadrian 的烧钱速度大幅超过已披露收入，因此持续进入股权市场至关重要。这个观点与研究团队模型方向一致，但没有内部信息无法确认。


              在已融资 $625M 的阶段，没有盈利信号对资本密集型工业规模制造初创公司并不异常；但若宏观环境恶化、项目里程碑滑坡，或下一轮股权 / 项目融资延迟，财务风险会变得有意义。Factory 4 的 $1.5
              billion 私人资本承诺若以债务或项目融资构成，会增加实质资产负债表义务；外部观察者目前完全看不清。
