      - number: '6.6'
        title: 证据图表
        blocks:
          - type: callout
            title: 客户集中度：Anduril 与 Navy 是结构性锚点，也是单点故障
            body: >
              Hadrian 的公开证据显示，其客户基础高度集中：Anduril Industries（自 2022 年起为锚定客户）很可能贡献公司早期生产收入的 30–50%+；US Navy 则通过依赖 OBBBA
              拨款的政府项目锚定整座 Factory 4 设施。两名客户构成两条不同收入流和四座工厂中两座的骨干。


              若 Anduril 因自身融资挑战、项目取消，或决定内部化/重新寻源机加工零件而减少采购量，Hadrian 将损失不成比例的收入，且短期替代有限。国防采购周期为 12–24 个月，使快速客户替代在结构上不可能。


              Navy Factory 4 依赖进一步放大风险：若 OBBBA 支持的潜艇项目取消或大幅重组，专为该项目建设的设施所承诺的 $1.5 billion
              私人资本将被搁浅。投资者应量化建模集中度情景，并在形成观点前从资料室请求 Anduril 收入占比。
            calloutType: risk
            claimRefs:
              - CU028
              - CU029
              - CU032
              - CU035
          - type: callout
            title: 即使未披露 NRR，国防合同结构也创造高结构性留存
            body: >
              Hadrian 未提供 NRR 或 GRR 数据，并不意味着留存不可知——国防生产合同的结构性经济学使合同期内流失极不可能。一旦供应商取得 AS9100D 资质并进入项目，更换到新供应商的转换成本（12–18
              个月重新资质认证、首件检验项目、潜在项目延期）通常高于任何竞争者在正常情况下可提供的价格溢价。


              80% 长期收入占比（3–7 年合同）意味着 Hadrian 已确认收入的绝大部分在多年维度上有合同承诺。Anduril 关系 3+
              年活跃历史且无任何公开流失信号，与该结构性留存模型方向一致。尽调中，关键问题不是 Hadrian 能否在合同期内留住现有客户，而是能否将剩余 20% 较短周期客户转化为长期关系，以及客户扩张（MaaS/FaaS
              向上销售）能否按已观察速度持续。
            calloutType: insight
            claimRefs:
              - CU023
              - CU024
              - CU026
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险全景
        blocks:
          - type: paragraph
            body: >
              在风投支持的创业公司中，Hadrian 的风险画像因广度和结构性严重程度而不寻常。不同于软件公司，Hadrian
              核心业务需要主动履行联邦监管合规（ITAR、CMMC、AS9100D），投入前所未有规模的实物资本（Factory 4，2.2 million sqft，$2.4
              billion），依赖锚定于国防预算周期的集中客户基础，并由单一创始人推动全部机构关系。

              五个主导风险类别是：（1）监管和法律风险，ITAR 不合规或 CMMC 资格不通过可能使 Hadrian 被排除在所有 DoD 合同之外；（2）运营风险，Factory 4 执行失败、CNC
              供应中断或质量逃逸可能同时损害收入和声誉；（3）合作伙伴与依赖风险，Anduril 集中度和 Navy OBBBA 连续性是近期生存级依赖；（4）财务和模型风险，极高资本密集度、不透明的 F4
              资本结构和未披露烧钱速度造成资产负债表不确定性；（5）人员和执行风险，单一创始人依赖、员工快速扩张以及在 F4 规模下未经验证的培训管线构成结构性脆弱点。

              本章风险严重度按四级标定：极高（公司终结或项目终结）、高（重大收入或财务损害）、中（显著扰动）和低（可用现有资源管理）。可能性反映在当前轨迹下未来 3 年的概率。
