      - number: '3.4'
        title: 护城河耐久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Hadrian 的竞争护城河分三层：技术（Opus AI/MES 平台）、运营（工厂网络和资本强度）以及合同（ITAR 资质和长期生产锁定）。评估每层耐久性，需要同时检验护城河强度和具体替代路径的可信度。

              Opus 平台是最深的技术护城河。它不对外销售，持续用 Hadrian 自有工厂的生产数据训练，并形成复利飞轮：通过 Opus
              跑的零件越多，编程和排产模型越好，后续每座工厂都比前一座更高效。具体风险是商品化：开源 CNC 自动化（如 PathPilot、Fusion 360 CAM）和商业 CAM
              软件（Mastercam、Siemens NX）都在进步，但缺少 Hadrian 运营工厂生成的闭环生产反馈训练数据。2026 年 5 月 Siemens–Xometry
              合作，是最接近资本充足软件进入者切入制造智能的公开类比，但仍偏市场平台，而非自有工厂。

              工厂网络的资本强度构成快速复制的结构性门槛。每座 Hadrian 工厂需要 $200M–$2.4B 资本，并需 12–24 个月满足 AS9100D 和 NADCAP
              要求、取得国防项目资质。时间线由第三方审计机构和 DoD 项目办公室执行，不由 Hadrian 决定。资金充足的新进入者若尝试复制 Factory 3（Mesa, AZ），在服务量产项目之前，至少要经历 18
              个月导入期。

              ITAR 注册和生产合同锁定会进一步叠加。一旦国防主承包商或政府项目办公室把 Hadrian 认证为生产供应商，切换到新供应商需要重新认证（通常 6–18 个月），惯性很强。公司声明约 80%
              收入来自长期合同，意味着客户基础结构性粘性较高。

              最可信的替代风险包括：（1）大型国防主承包商把精密 CNC 大规模收回内部（其公开外包制造资本策略部分缓释了这一风险）；（2）受敌对国家支持的新进入者以低于成本的价格竞争（ITAR
              限制会压低这种可能性）；（3）宏观或资本市场冲击让 Hadrian 无法以足够速度建设工厂、满足已签约需求。
