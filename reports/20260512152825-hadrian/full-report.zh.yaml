      - number: '6.3'
        title: 具名客户验证与生产证据
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Hadrian 已公开披露三个具名生产客户：Anduril Industries、Lockheed Martin Missiles and Fire Control 和 US
              Navy。每个客户都代表防务工业基础中的不同层级，也对应 Precision Components → MaaS → FaaS 价值链上的不同位置。


              Anduril Industries 是最强客户验证点。2023 年 6 月宣布的战略制造合作，已由双方通过新闻稿（Business Wire）和 Anduril 官方网站确认。Anduril 从 Hadrian
              工厂接收火箭部件、无人机零件和武器子系统，基于生产合同，而非试点。截至报告日期，该关系已持续三年以上，是生产级交付最持久的证据。


              Lockheed Martin Missiles and Fire Control 于 2025 年 12 月与 Hadrian 签署 MOU，通过位于 Lockheed 设施内的嵌入式 Hadrian
              制造单元生产 PAC-3 MSE、THAAD、PrSM 和 GMLRS 部件。该 MOU 由 Lockheed Martin 官方新闻网站确认，并由国防媒体（Defense News、Breaking
              Defense、National Defense Magazine）独立验证。MOU 代表从 Precision Components 供应转向 FaaS 层级合作，是一次重要向上销售，也是 Tier-1
              主承包商生产级意向的最强信号。


              US Navy 位于 Cherokee, Alabama 的 Factory 4 锚点，是 FaaS 层级最完整的形态：Hadrian 设计、建造并运营一座 2.2-million-square-foot
              设施，专门用于潜艇部件，并置于公私合作框架下。Navy 的 $900 million OBBBA 出资已由联邦支出数据库和 Navy 官方沟通确认。这是一项政府合同关系，而非试点；Navy
              实质上共同出资建设设施，并担任锚定承购客户。


              RTX / Raytheon 的位置更模糊：RTX Ventures 于 2024 年 2 月领投 Hadrian Series B，暗示其作为供应链合作伙伴已获内部审查，但未宣布明确生产合同。鉴于
              Hadrian 2024 年 $30M 收入超过 Anduril 关系按已知零件定价可合理解释的规模，少数其他未具名国防承包商应已存在，但这些客户仍未确认。


              Toarn 的对抗性分析指出，Hadrian 的客户披露高度有限：尽管收入 $30M、累计融资 $625M，却只有三个具名客户。这造成有意义的集中度风险不确定性，也限制外部对采用叙事的独立验证。
