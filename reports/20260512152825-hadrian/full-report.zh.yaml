        - OEM 供应——Haas、DMG Mori、Mazak 或类似厂商（未确认）；切削刀具耗材；原材料坯料
        - 先进 5 轴 CNC 设备交期长（6–18 个月）；OEM 供应集中风险；机器可用性限制扩产速度
      - - 原材料供应
