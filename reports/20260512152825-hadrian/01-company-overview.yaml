  - id: geographic-profile
    title: Geographic Footprint and Workforce
    tableRefs:
      - TO005
    body: >
      Hadrian's manufacturing presence spans three states as of May 2026. Factory 2 in Torrance, California
      (100,000 sq ft) is the current flagship production facility and has operated at full commercial scale
      since 2024. Factory 3 in Mesa, Arizona (approximately 270,000 sq ft) opened in January 2026 and
      represents the company's first out-of-state facility, representing an estimated $200 million investment
      and creating approximately 350 new jobs. Factory 4 in Cherokee, Alabama (2.2 million sq ft) opened in
      March 2026 under the Navy public-private partnership, representing by far the largest single facility.

      The company is actively searching for a 400,000-square-foot corporate headquarters and R&D campus,
      and Power has publicly committed to opening four to five additional factories within 12 months of the
      Series C announcement (July 2025). This aggressive expansion rate creates significant execution
      pressure: each new factory requires capital, qualified workforce, equipment procurement, and
      regulatory qualification on compressed timelines.

      Headcount has grown from approximately 170 workers at the time of the Forbes August 2024 profile to
      approximately 408 as of Q1 2026 per Tracxn data. All employees receive equity. The 30-day training
      pipeline is central to workforce scalability: Hadrian deliberately recruits from non-manufacturing
      backgrounds (nursing, retail, services) and trains workers to run 10 machines simultaneously using
      the Opus platform's guided automation layer.
