  - id: milestones-trajectory
    title: Milestones, Operational Trajectory, and Adverse Events
    body: >
      Hadrian's operational timeline spans from incorporation in 2020 through commercial launch in 2023
      and rapid scaling in 2024–2026. Revenue reached $3 million in 2023 (the first full commercial year),
      grew approximately 10× to an estimated $30 million in 2024, and Power has described 2025 as
      "aggressively growing" without disclosing a specific figure. The company has not disclosed 2025
      revenue publicly.

      Key partnerships established during this period include the Anduril Industries strategic
      manufacturing partnership (June 2023), which reduced machined part lead times for Anduril's
      autonomous systems by up to 50%, and the December 2025 Memorandum of Understanding with Lockheed
      Martin Missiles and Fire Control to embed a Hadrian factory cell at a Lockheed facility for
      PAC-3 MSE, THAAD, PrSM, and GMLRS component production. The company also acquired Datum Source,
      a SaaS tool connecting customers to machine shops, in August 2024 to extend its distribution reach
      into prototype-to-production workflows.

      No public regulatory actions, product recalls, safety incidents, or adverse legal proceedings have
      been identified in available sources. However, critics and analysts note that Hadrian remains a
      small-revenue company relative to the scale of its ambitions: at ~$30 million in 2024 revenue, the
      company is valued at more than 50× trailing revenue, reflecting the market's expectation of sustained
      hypergrowth and its role as a Defense Department reindustrialization platform rather than a mature
      revenue generator.
