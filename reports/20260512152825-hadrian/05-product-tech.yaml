callouts:
  - calloutType: insight
    title: "Opus Data Flywheel Is the Core Defensibility Engine"
    claimRefs: [CE015, CE032, CE017]
    body: >
      Hadrian's deepest competitive moat is not the Opus MES software itself — which could in
      principle be replicated — but the machine telemetry, toolpath programs, quality outcomes,
      and scheduling history that accumulate with each new factory and production program. Every
      additional part produced trains the AI scheduler to quote more accurately, the CV QC system
      to inspect more precisely, and the digital twin to model bottlenecks earlier. A competitor
      attempting to replicate Opus from scratch would start with no training data and face a
      compounding gap against Hadrian's installed base. This flywheel dynamic makes the first-mover
      advantage in AI-driven precision machining more durable than comparable software startups
      because the data is generated internally and is not publicly accessible. The caveat is that
      no patents have been identified, so legal protection against well-funded imitators depends
      entirely on trade-secret status and organizational knowledge retention.

  - calloutType: risk
    title: "CMMC Level 2 Gap Threatens Full DOD Contract Eligibility"
    claimRefs: [CE019, CE028, CE029]
    body: >
      As of Q1 2026, Hadrian has not publicly confirmed completion of a CMMC Level 2 third-party
      assessment, despite operating connected factory IoT infrastructure and handling Controlled
      Unclassified Information (CUI) associated with multiple missile defense and submarine
      programs. CMMC Level 2 — required under DFARS 252.204-7021 — mandates 110 cybersecurity
      practices aligned with NIST SP 800-171 and a triennial assessment by a C3PAO (Certified
      Third-Party Assessment Organization). Without confirmed Level 2 status, Hadrian may face
      contractual barriers to certain DOD prime and sub-prime awards as CMMC enforcement
      ramps through 2026. The risk is compounded by the connected factory architecture: IoT sensor
      networks, cloud telemetry pipelines, and digital twin data streams create an attack surface
      that must be hardened before assessment. Obtaining CMMC Level 2 within the next 12 months
      should be treated as a priority execution item, not an administrative formality.

