company:
  name: Hadrian

chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Hadrian delivers precision CNC-machined metallic components to aerospace and defense customers
    through two commercial tiers — Precision Components (fixed-price on-demand parts) and
    Manufacturing-as-a-Service (dedicated capacity under multi-year contract) — powered by Opus,
    its proprietary AI Manufacturing Execution System that achieves 75–80% machine uptime and a
    10:1 machines-per-operator ratio versus 40–50% and 1–3 at legacy job shops. The company has
    confirmed AS9100D and ITAR compliance; CMMC Level 2 certification and DOD facility clearance
    remain unconfirmed publicly as of Q1 2026, creating the principal near-term compliance risk
    for expanded DOD contract eligibility.

sections:
  - id: section-product-definition
    title: Product Definition and Customer Workflow
    body: >
      Hadrian's commercial offering centers on two distinct product tiers serving aerospace and
      defense customers. The first tier — Precision Components — is an on-demand, fixed-price
      service: a customer submits engineering drawings via Hadrian's digital portal, receives an
      AI-generated quote in minutes rather than the days or weeks typical of traditional machine
      shops, and places a purchase order against a long-term supply agreement. Hadrian manufactures
      the parts and ships them with full AS9100D quality records. The second tier — Manufacturing-as-a-Service
      (MaaS) — provides dedicated machining capacity under a multi-year contract, where Hadrian
      effectively operates a reserved portion of its factory network on behalf of the customer.
      A third tier — Factories-as-a-Service (FaaS) — deploys a full Hadrian-operated factory at
      or adjacent to a major customer site; Factory 4 (Cherokee, AL) is the first confirmed FaaS
      instance, anchored by the US Navy under an OBBBA framework.


      Confirmed commercial customers include Anduril Industries (strategic partnership), Lockheed
      Martin Missiles and Fire Control (MOU signed December 2025, covering PAC-3, THAAD, PrSM,
      and GMLRS component supply), and the US Navy (Factory 4 contractor relationship). Approximately
      80% of Hadrian's revenue derives from multi-year production contracts (3–7 years), per
      company-stated figures reported by Forbes, providing strong visibility and limiting spot-market
      exposure. The company reported approximately $3 million in 2023 revenue and approximately
      $30 million in 2024 — a 10× year-over-year increase — with 2025 characterized as continuing
      aggressive growth.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
