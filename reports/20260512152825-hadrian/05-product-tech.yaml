  - id: section-module-asset-map
    title: Product Module and Factory Asset Map
    body: >
      Hadrian's commercial infrastructure comprises four factories at different operational stages
      and the Opus MES platform that connects them. Factory 1 (Hawthorne, CA) served as the
      original proof-of-concept pilot facility. Factory 2 (Torrance, CA; 100,000 sqft) has been
      the primary commercial production site since 2023 and is the first to achieve full AS9100D
      certification. Factory 3 (Mesa, AZ; 270,000 sqft) represents a major scale-up — roughly 2.7×
      the footprint of Factory 2 — with a confirmed $200 million investment confirmed by the Arizona
      Commerce Authority; it opened in January 2026. Factory 4 (Cherokee, AL; 2.2M sqft) is under
      construction with a March 2026 target opening and anchors the $2.4 billion public-private
      partnership with the US Navy.


      The Opus platform, Hadrian's proprietary AI MES, is the software core of the entire operation.
      It is not licensed or sold externally; all value accrues through Hadrian's own factory output.
      Opus integrates at minimum five functional modules: an AI job scheduler, a digital twin
      engine, a computer vision quality control system, an IoT sensor network layer, and an
      automated materials handling and WIP tracking module. Together these modules enable the
      company's headline operating claims — 75–80% machine uptime versus 40–50% industry average,
      and 10 CNC machines operated per worker versus 1–3 at traditional facilities. The product
      does not cover composites, additive manufacturing, or non-metallic parts; it is focused
      exclusively on precision CNC-machined metallic components for high-specification programs.
    claimRefs:
      - CE006
      - CE007
      - CE008
