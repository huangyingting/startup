  - id: section-roadmap
    title: Deployment, Integration, Reliability, and Roadmap
    body: >
      Hadrian's deployment model integrates with customer procurement and quality systems rather
      than requiring customers to install or operate any software. Customers submit drawings and
      manage delivery schedules through Hadrian's portal; quality records are returned in AS9100D-
      compliant format. The roadmap is anchored by four factory milestones: Factories 1 and 2 are
      proven operational assets; Factory 3 (270K sqft, Mesa AZ) opened January 2026 after a $200M
      investment; Factory 4 (2.2M sqft, Cherokee AL) is scheduled to open March 2026, enabled by
      the $2.4B public-private partnership with the US Navy under an Other Budgetary Basis of
      Appropriations (OBBBA) framework. The December 2025 Lockheed Martin MFC Memorandum of
      Understanding signals a pathway to high-volume supply agreements for multiple missile defense
      and precision strike programs (PAC-3, THAAD, PrSM, GMLRS).


      Reliability claims — 75–80% machine uptime — have not been independently audited; all
      figures originate from company sources and have been repeated by Forbes and similar media
      without third-party verification. Factory 4's 2.2M sqft makes it approximately 8× the
      footprint of Factory 3 and by far the largest facility in the network; reaching claimed
      operational efficiency metrics at this scale is the single largest unverified execution
      assumption. Technology dependencies include the CNC equipment OEM supply chain (multi-axis
      machining centers have long lead times), specialty raw material supply (titanium, Inconel,
      aluminum alloy, steel), cloud infrastructure for ML and telemetry, and the Opus codebase
      itself, which represents a single-software-vendor risk for all factory operations.
    claimRefs:
      - CE021
