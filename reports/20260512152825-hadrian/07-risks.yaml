  - id: section-mitigations
    title: Mitigations, Thesis-Break Criteria, and Diligence Asks
    body: >
      Mitigations across all risk categories are credible in design but unevenly proven at the
      scale Hadrian is targeting. The ITAR compliance program covers the highest-severity regulatory
      risk, and Hadrian's clean DDTC enforcement history reduces probability. However, the company's
      operational expansion, particularly hiring into Alabama and onboarding hundreds of new workers
      with access to export-controlled technical data and hardware, meaningfully increases the ITAR
      surface area. Monitoring indicators include: DDTC debarment list publication, quarterly SPRS
      score updates for CMMC self-attestation, and AS9100D certificate public registry for all
      four facilities.

      For operational risk, thesis-break criteria are more specific. A Factory 4 schedule slip
      beyond 12 months from the March 2026 opening, a DCSA audit finding triggering program
      suspension, or a CMMC Level 2 assessment failure for any facility would each constitute
      thesis-break events requiring immediate investor review. CNC supply disruption can be
      monitored via Haas/DMG Mori earnings calls and lead-time disclosures, supplemented by
      tracking F4 equipment installation progress through satellite imagery or construction permit
      activity in Cherokee, AL.

      Financial thesis-break criteria are: (1) the $1.5B private F4 capital commitment is revealed
      to include debt that subordinates equity; (2) Anduril revenue falls below 20% of total
      revenue due to a non-renewal rather than diversification; or (3) operating losses persist
      above $100M per year while revenue ramp lags the Factory 4 opening schedule. Key diligence
      asks include: audited ITAR technology control plans, AS9100D certificate numbers for all
      facilities, CMMC assessment timeline and SPRS score, Factory 4 construction schedule and
      milestone structure, Anduril and Navy revenue as percentage of total, and the legal structure
      of the $1.5B F4 private capital commitment.
