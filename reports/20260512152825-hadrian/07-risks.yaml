  - id: section-financial
    title: Financial, Model, and People Risks
    body: >
      The most structurally opaque risk in Hadrian's investment profile is the $1.5 billion private
      capital commitment for Factory 4. Unlike the equity raises documented in SEC Form D filings,
      the nature of this $1.5B commitment has not been publicly characterized. It may be equity,
      project finance, revenue bonds, a government-backed loan, or some hybrid. If structured as
      debt or project finance, it would create leverage obligations materially larger than all
      prior Hadrian equity raises combined, invisible to outside observers and senior to any common
      equity. The working capital requirements for F4 construction and equipment procurement also
      imply meaningful cash consumption ahead of first revenue from that facility.

      Hadrian's undisclosed burn rate is a second major financial risk. With approximately 408
      employees at an estimated $180,000 fully-loaded average cost, plus factory depreciation and
      operating expenses across four facilities, the research team estimates annualized operating
      expenses of $90 million or more, materially exceeding the disclosed 2024 revenue of $30
      million. Revenue concentration at the top two or three customers likely exceeds 80%; without
      customer-level revenue disclosure, the probability of a revenue step-down from a single
      contract non-renewal cannot be quantified.

      People risk is a distinct category. Chris Power, as sole founder and CEO, is the primary
      relationship owner with DoD, defense primes, and lead investors; no succession plan has been
      disclosed. The leadership team is thin outside of Power and Baker; a dual departure would
      impair institutional relationships and factory operational continuity simultaneously. Rapid
      headcount scaling (170 to 408 in 18 months) creates cultural and process integration risks
      that are typical for hypergrowth manufacturers but especially consequential when the product
      is safety-critical defense components under AS9100D and ITAR oversight.
