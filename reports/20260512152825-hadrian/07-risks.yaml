callouts:
  - calloutType: risk
    title: "Factory 4 Is the Largest Unproven Execution in Hadrian's History"
    claimRefs:
      - CR011
      - CR024
      - CR027
    body: >
      Factory 4 in Cherokee, Alabama combines every operational risk category simultaneously:
      unprecedented scale (2.2M sqft, 8x all prior factories combined), a $2.4 billion
      public-private financing structure with an opaque $1.5B private capital tranche, a
      workforce requirement of 1,000-2,000 workers, equipment procurement for hundreds of
      CNC machining centers with 12-24 month lead times, and contractual performance obligations
      to the US Navy on submarine production. Hadrian has not disclosed a public construction
      schedule, independent project management oversight, or equipment procurement milestone.
      Investors evaluating Hadrian in 2026 are essentially underwriting the successful delivery
      of a project with no publicly available progress audit.

  - calloutType: risk
    title: "ITAR Tail Risk Grows Non-Linearly With Scale"
    claimRefs:
      - CR001
      - CR005
      - CR030
    body: >
      Hadrian's ITAR compliance obligation does not scale linearly with headcount or factory
      count; it scales with the number of people having access to export-controlled technical
      data, hardware, and manufacturing processes. At 408 employees across four facilities, the
      ITAR surface area is already substantial. At the 2,000+ worker scale required for Factory 4,
      the technology control plan must screen, badge, and monitor an order of magnitude more
      individuals in a new state with a different talent pool. A single willful ITAR violation
      by a Hadrian employee carries criminal penalties of up to 20 years imprisonment and $1.3M
      per violation. No information about Hadrian's technology control plan architecture, audit
      cadence, or DDTC self-assessment program has been disclosed.

