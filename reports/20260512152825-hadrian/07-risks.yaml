chapter:
  number: 7
  title: Risks
  summary: >
    Hadrian faces a layered risk profile anchored by ITAR/CMMC regulatory obligations, Factory 4
    execution exposure ($2.4B at unprecedented 2.2M sqft scale), and customer concentration
    in Anduril and the US Navy. Key thesis-break events are: an ITAR or CMMC enforcement action
    against any facility, Factory 4 schedule slip beyond 12 months, Navy OBBBA cancellation,
    or Chris Power departure without succession. Mitigations are credible but unproven at scale,
    and the opacity of the $1.5B private capital structure for Factory 4 creates a material
    unquantified liability.

sections:
  - id: section-risk-overview
    title: Risk Landscape Overview
    body: >
      Hadrian's risk profile is unusual among venture-backed startups in its breadth and structural
      severity. Unlike software companies, Hadrian's core business requires active federal regulatory
      compliance (ITAR, CMMC, AS9100D), physical capital at unprecedented scale (Factory 4 at
      2.2 million sqft, $2.4 billion), dependence on a concentrated customer base anchored to
      defense budget cycles, and a single founder driving all institutional relationships.

      The five dominant risk categories are: (1) regulatory and legal risk, where ITAR non-compliance
      or CMMC disqualification could exclude Hadrian from all DoD contracts; (2) operational risk,
      where Factory 4 execution failure, CNC supply disruption, or a quality escape could impair
      revenue and reputation simultaneously; (3) partner and dependency risk, where Anduril
      concentration and Navy OBBBA continuity are existential near-term dependencies; (4) financial
      and model risk, where extreme capital intensity, opaque F4 capital structure, and an
      undisclosed burn rate create balance-sheet uncertainty; and (5) people and execution risk,
      where sole-founder dependency, rapid workforce scaling, and an unproven training pipeline
      at F4 scale are structural vulnerabilities.

      Risk severity in this chapter is calibrated on a four-level scale: critical (company-ending
      or program-ending), high (material revenue or financial impairment), medium (significant
      disruption), and low (manageable with current resources). Likelihood reflects probability
      over a 3-year horizon at current trajectory.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
    figureRefs:
      - FR001

  - id: section-regulatory
    title: Regulatory and Legal Risks
    body: >
      International Traffic in Arms Regulations (ITAR, 22 CFR 120-130) govern all of Hadrian's
      defense production operations. As a manufacturer of precision components for aircraft,
      missiles, naval vessels, and other defense articles, Hadrian must maintain active DDTC
      registration, implement technology control plans, screen all employees and visitors against
      US Person status, and obtain licenses for any export or re-transfer of defense articles or
      technical data. ITAR violations carry criminal penalties of up to 20 years imprisonment and
      civil fines up to $1.3 million per violation. Hadrian has not disclosed any DDTC enforcement
      actions or voluntary disclosures in any public source as of Q1 2026.

      CMMC (Cybersecurity Maturity Model Certification) under 32 CFR Part 170, finalized December
      2024, requires Level 2 certification for DoD contracts involving Controlled Unclassified
      Information. Hadrian's Navy OBBBA contract for submarine components (Virginia and Columbia
      class) almost certainly triggers Level 2 requirements, obligating Hadrian to complete a
      third-party C3PAO assessment. The public SPRS portal allows limited verification of
      self-attestation scores; Hadrian has not disclosed its CMMC assessment timeline or SPRS score
      for any facility. Factory 4 in Alabama will require separate CMMC scoping.

      AS9100D quality management certification is claimed by Hadrian in company materials. This
      standard governs aerospace quality systems and requires annual surveillance audits; a failed
      audit or non-conformance can trigger certification suspension. No independent source has
      confirmed the AS9100D scope across all four Hadrian facilities. OSHA 29 CFR 1910 and EPA
      RCRA hazardous waste regulations apply to all manufacturing locations; Hadrian has not
      disclosed recordable incident rates or environmental compliance records. NLRB organizing risk
      is latent but real: a 408-person workforce spread across California and Alabama, with
      different labor market conditions in each state, creates potential exposure to union
      organizing campaigns.
