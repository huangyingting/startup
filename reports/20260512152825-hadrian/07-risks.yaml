  - id: section-partner
    title: Partner and Dependency Risks
    body: >
      Hadrian's revenue base is almost certainly concentrated in a small number of anchor customers.
      Anduril Industries, the only publicly confirmed named customer, is estimated by the research
      team to represent more than 30% of 2024 revenue based on the depth of the described
      partnership, including dedicated machining cells and multi-year production contracts. Anduril
      is itself well-funded ($3.5B+ raised) but is not yet profitable; any slowdown in Anduril's
      defense program wins or government contract payments would flow through to Hadrian order
      volumes with limited lag. No revenue diversification timeline has been publicly disclosed.

      The US Navy's $900 million OBBBA commitment for Factory 4 is a second critical dependency.
      While the AUKUS/submarine recapitalization program is politically supported, it remains
      subject to annual congressional appropriations, budget deal structures, and continuing
      resolution risk. Hadrian has not disclosed OBBBA milestone payment schedules, which would
      clarify the cash flow timing risk. CNC machine vendors, primarily Haas Automation, DMG Mori,
      Mazak, and Okuma, represent a capital equipment supply chain dependency; concentrated
      sourcing from any single vendor, particularly given Haas's domestic manufacturing capacity
      constraints, creates an F4 equipment build-out risk.

      RTX Ventures, as the lead investor in Hadrian's Series B, represents a nuanced strategic
      dependency risk. Raytheon Technologies' investment arm has access to Hadrian's strategic
      plans, customer relationships, and technology roadmap. If RTX's manufacturing strategy shifts
      or Raytheon builds a competing capability, the information asymmetry created by board observer
      status and investor rights could be disadvantageous. Defense budget appropriations risk affects
      the entire customer base: Hadrian derives essentially all revenue from defense programs
      (Anduril, Lockheed MFC, Navy), making a 15%+ DoD program cut a systemic revenue risk.
