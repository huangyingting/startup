      - "Monitorable Trigger"
      - "Threshold / Event"
      - "Action Implication"
    rows:
      - - "ITAR / Export Control Violation"
        - "DDTC debarment list; Federal Register enforcement notices; Hadrian press releases; voluntary disclosure filings"
        - "Any DDTC enforcement notice, voluntary disclosure filing, or debarment action against Hadrian or named employees"
        - "Immediate investment hold; require written remediation plan with timeline; notify LP counsel; monitor DDTC civil penalty register for 24 months post-event"
      - - "CMMC Level 2 Assessment Failure"
        - "CMMC Assessment Results; DoD SPRS portal; C3PAO certification notice; OBBBA milestone reports"
        - "Hadrian receives conditional denial, fails Level 2 C3PAO assessment for any facility, or OBBBA contract paused pending CMMC remediation"
        - "Investment hold pending remediation timeline; assess scope and DoD program impact; require management representation letter on remediation milestones"
      - - "Factory 4 Schedule Slip > 12 Months"
        - "Construction permit activity (Cherokee, AL public records); satellite imagery of F4 site; Navy press releases; Hadrian blog or PR announcements"
        - "F4 full operational date slips beyond March 2027 or Navy OBBBA milestone payment is delayed by >90 days"
        - "Request F4 schedule update and Navy milestone status; assess working capital implications; consider milestone-gated tranches for follow-on capital commitment"
      - - "Anduril Revenue Concentration > 40% for Two Consecutive Quarters"
        - "Quarterly management reports; Anduril fundraising news; Anduril program wins or losses in public DoD announcements"
        - "Anduril represents >40% of Hadrian revenue for any two consecutive quarters, without a credible diversification offset in the pipeline"
        - "Require customer diversification roadmap with named targets and timeline; consider protective provisions in next financing round"
      - - "Navy OBBBA Cancellation or Force Majeure"
        - "NDAA amendments; Navy press releases; DoD program office announcements; OBBBA amendment filings"
        - "Navy officially withdraws, materially restructures, or invokes force majeure on the $900M OBBBA commitment to Hadrian"
        - "Thesis-break trigger: F4 economics are dependent on $900M Navy capital; reassess all DCF scenarios; initiate exit planning within 180 days if no replacement commitment is secured"
      - - "Quality Escape Leading to DoD Program Disqualification"
        - "DCSA / DCMA audit notices; customer RMA patterns; AS9100D surveillance audit outcome; Aviation Week and Defense News for part failures"
        - "Confirmed quality escape on a DoD production part leading to program disqualification, DCSA audit, or formal corrective action request from a prime contractor"
        - "Hold further capital deployment until root cause analysis complete; require independent AS9100D audit; assess program reinstatement timeline and revenue impact"
      - - "Chris Power Departure or Incapacitation (> 90 Days)"
        - "SEC Form D filings reflecting new investor lead; company press releases; LinkedIn activity and investor communications"
        - "Power departs as CEO without a named and qualified successor, or is absent from public/investor activity for >90 days without explanation"
        - "Thesis-break trigger for founder-dependent investment thesis; accelerate succession diligence; assess board composition and interim CEO capability"
      - - "Defense Budget Sequestration or 15%+ Anchor Program Cut"
        - "OMB President's Budget; NDAA conference report; continuing resolution announcements; Lockheed MFC earnings calls"
        - "DoD formally announces 15%+ reduction to Virginia-class or Columbia-class submarine programs, or to Anduril's primary defense-tech program portfolio"
        - "Reassess DCF model under lower-revenue scenario; identify non-Navy revenue substitution paths; assess whether defense budget alternatives can substitute within 24 months"
    notes: "All triggers are designed to be observable from public sources without inside access. Thesis-break criteria are cumulative: two or more simultaneous triggers significantly increase the urgency of investor action."
