companyProfile:
  summary: >-
    Hadrian is a Torrance, California-based AI-powered CNC machining company founded in 2020
    by Chris Power to address the fragmented, aging US defense manufacturing supply chain.
    The company builds vertically integrated, software-defined precision manufacturing
    factories — operating the Opus AI manufacturing execution system across four facilities
    (Hawthorne CA, Torrance CA, Mesa AZ, and Cherokee AL opening 2026) — delivering
    aerospace-grade precision components to defense primes at 2x the machine utilization of
    traditional job shops. Hadrian has raised approximately $625 M at a $1.6 B post-money
    Series C valuation, backed by Founders Fund, Lux Capital, a16z, RTX Ventures, and
    Altimeter Capital, with strategic customer relationships with Anduril, Lockheed Martin
    MFC, and the US Navy.
  foundedDate: '2020-01-01'
  founders:
    - name: Chris Power
      role: Founder and CEO
      background: >-
        Australian entrepreneur who identified the fragility of the US defense precision
        machining supply chain and built Hadrian to replace aging artisanal job shops with
        AI-driven, high-throughput CNC factories.
      claimRefs: []
  foundingLocation: Hawthorne, California, USA
  headquarters: Torrance, California, USA
  productSummary: >-
    Hadrian delivers precision CNC-machined components (aluminum, titanium, steel, exotic
    alloys) to aerospace and defense customers through two tiers: fixed-price long-term
    production contracts and on-demand manufacturing capacity (MaaS). All factories run the
    proprietary Opus AI MES platform, providing autonomous scheduling, digital twin
    simulation, computer vision QC, and IoT process control — achieving 75-80% machine
    uptime versus 40-50% industry average, and 10 machines per operator versus 1-3 industry.
  customerFocus: >-
    US Tier-1 and Tier-2 defense prime contractors and the US military (primarily DoD/Navy),
    requiring aerospace-grade precision parts under ITAR, AS9100D, and CMMC compliance.
  businessModel: >-
    Vertically integrated contract manufacturing with two tiers: fixed-price long-term
    production contracts for recurring components, and MaaS on-demand capacity. Revenue
    recognized on part delivery. Opus is internal-only and not licensed externally. Growth
    is driven by factory capacity expansion (Factory 3 opened January 2026; Factory 4
    opening March 2026 as a $2.4 B public-private partnership).
  stage: Series C private
  fundingStatus: >-
    Approximately $625 M total raised; most recent is a Series C at a $1.6 B post-money
    valuation (July 2025), extended via December 2025 Form D to approximately $292 M total
    Series C. Factory 4 involves an additional $2.4 B public-private partnership ($900 M
    Navy OBBBA plus $1.5 B private commitment of undisclosed structure).
  disclosureProfile: private-undisclosed
  claimRefs: []
summary:
  headline: >-
    Hadrian is executing the right industrial thesis with credible defense customers and
    extraordinary growth, but the $1.6 B valuation at over 50x TTM revenue demands Factory 4
    delivery and structural transparency before a high-conviction position is justified.
