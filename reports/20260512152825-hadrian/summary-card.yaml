  topStrengths:
    - >-
      10x revenue growth ($3 M to $30 M in one year) with marquee defense anchor customers including Anduril, Lockheed
      Martin MFC, and the US Navy
    - >-
      Proprietary Opus AI MES platform delivers 2x machine utilization with 30-day operator training, creating a
      compounding operational moat
    - >-
      Factory 4 ($2.4 B public-private) backstopped by $900 M Navy OBBBA program, de-risking demand at unprecedented
      scale
    - >-
      Tier-1 investor syndicate (Founders Fund, a16z, Lux Capital, RTX Ventures, Altimeter) provides capital and
      strategic defense-market access
  topRisks:
    - >-
      The $1.5 B Factory 4 private capital commitment structure is undisclosed; debt or project finance would create
      balance-sheet leverage invisible to outside investors
    - >-
      Customer concentration: Anduril likely represents a majority of early revenue; Lockheed Martin MOU is unproven
      production volume as of report date
    - >-
      Factory 4 at 2.2 M sqft is roughly 22x the size of Factory 2; execution risk at this scale is material and
      unproven
    - >-
      Valuation at approximately 53x TTM revenue prices in 3-5 years of sustained hyper-growth; any growth deceleration
      compresses the multiple severely
    - >-
      ITAR/CMMC/DoD cybersecurity compliance is existential; a single regulatory violation or breach could disqualify
      Hadrian from all federal work
  unresolvedGaps:
    - >-
      Factory 4 $1.5 B private capital structure (debt vs. equity vs. project finance) and contributing investor
      identities
    - 2025 and 2026 revenue, gross margins, and plant-level unit economics
    - Full customer list, revenue concentration by customer, and NRR/GRR metrics
    - CMMC Level 2+ certification status and DCSA facility clearance progress for Factory 4
