summary:
  headline: >-
    Hadrian is executing the right industrial thesis with credible defense customers and extraordinary growth, but the
    $1.6 B valuation at over 50x TTM revenue demands Factory 4 delivery and structural transparency before a
    high-conviction position is justified.
