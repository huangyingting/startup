chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 自 April 2025 起以 Abnormal AI 品牌运营，是一家总部位于 California 州 San Francisco 的 AI 原生网络安全公司。公司成立于
              2018 年，切入企业电子邮件安全的专业赛道：它不是把邮件导入网关、过滤已知恶意签名，而是通过 API
              接入云邮件系统，摄取数千个行为信号——发件人历史、沟通模式、语言语气、关系图谱——为每个租户建立正常人类行为基线。只要消息或动作明显偏离基线，平台就会识别威胁，从而发现绕过传统安全电子邮件网关（SEGs）的复杂
              BEC、供应商仿冒欺诈、账户接管和零日社会工程攻击。


              核心产品原生集成 Microsoft 365 和 Google Workspace，并已扩展覆盖协作平台（Slack、Zoom）、CRM（Salesforce）、ITSM（ServiceNow）和 HR
              系统（Workday）。商业模式是按邮箱或席位收费的 SaaS 订阅，合同以多年期企业合同为主，并辅以专业服务。部署走 API 优先路线，不需要变更 MX 记录，几分钟内即可完成，降低企业 POC
              摩擦。扩张收入来自新增模块（账户接管保护、安全态势管理）以及向现有电子邮件安全客户交叉销售更广泛的 SaaS 应用覆盖。
