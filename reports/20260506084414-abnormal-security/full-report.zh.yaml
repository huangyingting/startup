  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 所处的电子邮件安全市场由两股结构性力量主导：Microsoft 捆绑的 Defender for Office 365（在 M365 E3/E5 中免费包含）和
              Proofpoint，后者是传统 Secure Email Gateway 领导者，2021 年被 Thoma Bravo 以 $12.3 billion 私有化
              [CP002]。这些在位者合计控制大型企业电子邮件安全部署的大部分，既给挑战者制造分发难题，也提供验证机会 [CP001]。


              市场正分裂为两种架构阵营：传统 Secure Email Gateways（SEGs）通过变更组织 MX 记录，把所有邮件流量路由到供应商数据中心；更新的 Integrated Cloud Email
              Security（ICES）模型则通过 API 接入 Microsoft 365 或 Google Workspace，无需变更 MX 记录。Abnormal 是 ICES 阵营的市场领导者，直接 ICES
              层主要对手是 Darktrace、Perception Point 和 IRONSCALES，同时也在企业账户中替换基于 SEG 的 Proofpoint 和 Mimecast 部署
              [CP008][CP026]。


              2024 Gartner Magic Quadrant for Email Security Platforms 评估了 14 家供应商，并把 Abnormal Security 定位为所有 Leaders 中
              Completeness of Vision 最靠右的一家；这对评估长期平台方向的企业买方是有意义的信号 [CP012][CP022]。本章梳理竞争格局，评估功能差异化，比较定价，并判断 Abnormal 行为
              AI 护城河的耐久性。
