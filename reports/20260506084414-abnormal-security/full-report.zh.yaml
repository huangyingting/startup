      - number: '2.4'
        title: 竞争动态与市场结构
        blocks:
          - type: paragraph
            body: >
              企业细分的电子邮件安全市场呈寡头格局，Microsoft（通过 Defender for Office 365）和 Proofpoint 合计服务超过 50%
              的大型企业电子邮件安全支出。Mimecast（2021 年被 Permira 收购）在中型市场和 EMEA 位置显著。Cisco 的 Secure Email Gateway 在电信和受监管行业仍有存在感。


              ICES/API 原生子赛道——Abnormal 的直接竞争场——规模更小、竞争更激烈。主要对手包括
              IRONSCALES（用户驱动的钓鱼模拟和众包情报）、Tessian（聚焦误发数据和内部人风险的人类层安全）、Proofpoint 的新兴 API 产品，以及 Microsoft 对 Defender
              的持续改进。2024 Gartner Magic Quadrant for Email Security Platforms 将 Abnormal 定位为 Leader，并在 Completeness of
              Vision 上最靠右，显示分析师强力认可其平台路径。


              支撑 Abnormal 的结构性顺风，是 MX 记录替代趋势：企业越来越希望在原生云邮件上叠加行为 AI，而不打断邮件流。「无需 MX 变更」这一价值主张，相比传统 SEGs 构成真实切换优势。但
              Microsoft 加大对 Defender AI 能力（Copilot for Security、AI 辅助威胁狩猎）的投入，是最强的长期竞争威胁，因为它站在免费捆绑的位置上。
