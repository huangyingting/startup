      - number: '4.5'
        title: 财务数据缺口与尽调问题
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 在 GAAP 财务上仍完全不透明。任何投资者或收购方做财务尽调时，关键未披露事项如下 [CI008][CI025]：


              1. **GAAP 收入 vs. ARR**：ARR 是带有账单滞后的指标；递延收入和合同起始时间可能导致 GAAP 收入与 $200M ARR 存在重大差异。


              2. **经营亏损和现金消耗**：以 Abnormal 的员工规模和销售模式，高增长企业 SaaS 公司通常每年消耗 $50–100M 现金；这一点未核验。


              3. **毛利率**：AI 推理成本不透明；65–80% 毛利率是合理区间，但未披露。


              4. **股权激励薪酬**：一家拥有 1,000+ 员工的 IPO 前公司，SBC 负担很可能是 $40–70M/year，对 non-GAAP 盈利能力主张影响重大。


              5. **客户集中度**：前 10 大客户是否贡献超过 20% ARR 未知，对 IPO 投资者是重大风险 [CI027]。


              这些缺口是后期私营公司的结构性特征，并不表示公司有意回避；它们会在 S-1 申报中解决。在此之前，尽调应聚焦客户 NRR 核验、流失客户的流失数据，以及对 Fortune 500 账户采购联系人的背调核验
              [CI035]。
            claimRefs:
              - CI008
              - CI025
              - CI027
              - CI035
