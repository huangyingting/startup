  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与优先级框架
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 面临多维风险，横跨监管 / 法律、运营、合作伙伴 / 平台依赖、人员 / 执行以及财务 / 模型。近期最重大的风险是：（1）对 Microsoft 365 和 Google
              Workspace API 访问的平台依赖，这是整个产品架构的底座；（2）作为处理个人数据的 AI 系统提供方，需要履行 EU AI Act 合规义务；（3）Microsoft 原生 Defender for
              Office 365 能力带来的竞争替代；（4）FedRAMP 授权完成风险（ATO 原目标为 2025 年 H1，但截至报告日已延迟）。次要风险包括 IPO 市场窗口不确定、AI 准确性 /
              误报运营风险，以及对创始人的关键人物依赖。公司的缓释措施有部分证据支撑——GDPR/CCPA DPA 已发布，FedRAMP In Process
              状态已确认——但若干风险（平台访问、竞争替代、烧钱率）仍缺少合同或监管兜底，结构上未被缓释。整体剩余风险为中等：公司收入增长强劲，估值 $5.1B，但缺少能够降低投资者风险溢价的公开市场流动性和合同确定性。
              [CR001] [CR002] [CR003]
