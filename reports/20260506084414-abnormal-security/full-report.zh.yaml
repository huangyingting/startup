      - number: '8.3'
        title: 牛 / 基准 / 熊情景分析
        blocks:
          - type: paragraph
            body: >
              牛市情境假设 Abnormal 到 2025 年底仍维持 80–100% ARR 增长，IPO 时达到 $380–400M ARR，并在 IPO 时拿到 22–28× 的 AI 原生安全溢价，对应市值
              $8–11B，相比 $5.1B Series D 入场带来 1.6–2.2× 回报。 [CV011] 牛市情境的关键推动因素包括：向现有 2,800 家客户快速交叉销售 Account
              Takeover、Vendor Email Compromise 和 Collaboration Security 模块；FedRAMP ATO 加速落地，打开美国联邦垂直行业；以及市场对 AI
              优先安全平台的广泛重估。 [CV012]


              基准情境假设 2025 年 ARR 增速降至 60–70%，IPO 时达到约 $320–340M ARR，公开市场倍数为 16–20×，意味着 IPO 市值 $5.1–6.8B——相对 $5.1B
              入场大体持平到小幅为正。 [CV013] 基准情境假设 2025 年 H1 取得 FedRAMP ATO，净美元留存继续保持 130%+，且 Microsoft Defender 或 CrowdStrike
              Falcon for Email 没有造成重大竞争替代。 [CV014] CEO Evan Reiser 在 Series D 完成时的 CRN 采访中公开指引 Q4 2025 IPO。 [CV015]


              熊市情境假设 ARR 增速滑落至 50% 以下，IPO 时 ARR 为 $250–270M，在 10–12× 倍数下隐含估值 $2.5–3.2B——较入场折价 37–51%。 [CV016] 熊市触发因素包括
              Microsoft Defender 在独立基准测试中达到检测能力平价、经济下行削减企业安全预算，以及 2025 年底前未能取得 FedRAMP ATO。 [CV017] 在下行情境中，累计 $546M
              融资上的后期轮次清算优先权叠加，可能进一步侵蚀普通股回报。 [CV018]
