      - number: '2.2'
        title: 市场规模与分层
        blocks:
          - type: paragraph
            body: >
              多家研究机构估计，2024 年全球电子邮件安全 TAM 为 $8.0–8.9 billion，至 2030 年代初 CAGR 为 11.7–14.2%；届时市场可达 $16–23
              billion，取决于是否纳入相邻 SaaS 安全。ResearchAndMarkets 估计，仅云端电子邮件安全细分市场 2024 年约为 $1.1 billion，2030 年增至 $1.6
              billion——这是一个更窄定义，排除了传统网关收入。对 Abnormal 最宽口径的可触达机会，纳入企业 ICES、SaaS 安全和 SOC 工作流自动化后，随着公司扩展平台范围，合理区间可达 $15–25
              billion。


              买方分层自然按组织规模和云邮件采用阶段划分。大型企业（1,000+ 员工、Microsoft 365 或 Google Workspace）代表 Fortune 500 和 Global 2000，是
              Abnormal 的主要切入区。这些组织 BEC 损失暴露最高（按 FBI IC3 数据，单起事件平均 BEC 损失 $5M+），采购周期最成熟，也愿意支付更高 ARPU。中型市场组织（100–999
              员工）是可通过渠道伙伴覆盖的次级机会。100 人以下 SMB 基本由 M365 许可中捆绑的原生 Microsoft Defender 服务。


              地域分层显示，2024 年 North America 占全球电子邮件安全支出的 40–45%，Europe 占 25–30%，Asia-Pacific 增速最快，CAGR 为 15–18%，受
              Japan、Australia 和 Southeast Asia 云迁移加速带动。美国联邦政府是重点垂直行业，采购要求单独（需要 FedRAMP 授权），合同经济性也以多年期为主。
