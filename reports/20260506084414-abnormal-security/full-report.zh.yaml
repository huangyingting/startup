      - number: '5.2'
        title: 产品模块与使用场景
        blocks:
          - type: paragraph
            body: >
              Abnormal 的 Email Security 是最成熟模块，覆盖入站威胁检测（BEC、钓鱼、恶意软件）、账户接管保护、灰邮件过滤和误发邮件预防 [CE002]。检测工作流全自动：平台识别异常后，通过
              M365/Google API 隔离消息，并向 SOC 团队给出自然语言威胁解释——通常在投递后几分钟内完成 [CE007]。企业部署的基线建立需要 2–4
              周，之后检测达到最佳准确率；高置信度紧急检测从第一天就开始 [CE006]。


              SaaS Security 模块把行为 AI 保护扩展到 Slack、Zoom、Salesforce、ServiceNow、Workday 和 Microsoft
              Teams，在整个云应用栈中检测账户接管和数据暴露风险 [CE004]。AI Security Agents（April 2025 推出）代表最新产品层：AI Security Mailbox
              以超人速度自动回应用户上报的钓鱼；AI Phishing Coach 基于真实用户行为提供高度个性化培训；AI Data Analyst 支持自然语言安全报告 [CE003][CE031][CE032]。这些
              AI agents 处于早期商业可用阶段，代表平台未来相对纯电子邮件安全厂商的差异化。
