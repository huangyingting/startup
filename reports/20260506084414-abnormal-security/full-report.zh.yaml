  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              Abnormal Security（现为 Abnormal AI）只服务企业和中端市场 B2B 客户，没有消费者或 SMB 业务。到 2024 年底，公司披露全球客户 2,800+ 家、Fortune 500
              渗透率 20%——高于 2024 年 8 月 Series D 融资时的 2,400+ 家客户和 17% Fortune 500 渗透率。核心客群是 1,000–100,000+
              名员工的大型企业；邮箱数量大、合同价值更高，使它们贡献了大部分 ARR。金融服务和医疗健康在订单中占比偏高，原因是泄露成本高、监管义务严格（SOX、HIPAA），且复杂供应商生态抬高了 VEC
              暴露面。制造业和零售 / 消费品构成第二大客群：2024 年，这一合并分部中 76% 的组织至少收到过一次 VEC 或供应商欺诈攻击，91% 的建筑与工程公司收到过 BEC 攻击，AI
              原生防护因此形成强拉力。2025 年，随着 AI 自动化钓鱼扩大可服务人群，一个快速增长的中端市场分部（500–1,000 名员工）浮现，需求不再局限于纯 Global 2000
              账户。地域上，北美主导客户基础，EMEA 是主要国际扩张区域，APAC 正在增长。具名全球客户包括 Maersk（全球航运，丹麦）、Accelleron（工业技术，瑞士）和
              Boohoo（零售，英国），显示出早期跨国覆盖。 [CU001] [CU002] [CU003] [CU004]
