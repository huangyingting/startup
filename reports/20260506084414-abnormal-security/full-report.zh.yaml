      - number: '8.2'
        title: 估值背景与可比公司组
        blocks:
          - type: paragraph
            body: >
              $5.1B 的入场估值，对公开和私有可比公司都设下了高门槛。在大型纯网络安全上市公司中，CrowdStrike 在 2024 财年（2024 年 1 月 31 日）结束时 ARR 为 $3.44B，市值约
              $44B，意味着约 12.8× ARR。 [CV021] Palo Alto Networks 在 2024 财年（2024 年 7 月）报告下一代安全 ARR 为 $4.2B，市值超过
              $100B；在更大、更分散的收入基础上，对应约 24× NGS-ARR。 [CV022] Zscaler 2024 财年订阅收入为 $2.17B，市值约 $25B，意味着约 11.5× 收入。 [CV023]
              SentinelOne 2024 财年末 ARR 为 $724M、同比增长 39%，市值约 $9B，意味着约 12.4× ARR。 [CV024]


              M&A 可比交易方面，Proofpoint 2021 年被 Thoma Bravo 以约 $12B 收购，当时年收入约 $1B，对应成熟、增长较慢的电子邮件安全龙头 10–12× 收入。 [CV025]
              Rubrik 2024 年 4 月 IPO，市值 $5.6B，ARR 约 $500M——对应一个快速增长、规模化数据安全 SaaS 业务的 11.2× ARR，为相邻安全 SaaS 提供了最新公开基准。
              [CV026] 根据 Software Equity Group 数据，公开交易网络安全 SaaS 的行业 TTM 收入倍数中位数在 2023 年 Q4 约为 7.3×，最快增长公司可升至十几倍中段。
              [CV027] Abnormal 的 100% ARR 增速是上市同行的 3–5×，这部分解释了溢价。 [CV028]


              可比公司组显示，基础情境下，IPO 时 ARR 基础为 $350–400M，合理 IPO 倍数为 18–22× ARR，对应完全稀释估值 $6.3–8.8B。 [CV029]
              来自平台整合方（CrowdStrike、Palo Alto Networks 或 Google）的二级战略收购退出，在 8–15× ARR 也仍有可能，因为此前已有电子邮件安全 M&A
              先例（Avanan、Area 1 Security）。 [CV030]
