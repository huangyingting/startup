  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              电子邮件安全市场包括过滤、检测、隔离和补救通过电子邮件投递的威胁的产品，包括垃圾邮件、恶意软件、钓鱼、BEC、账户接管和社会工程。市场通常分为两种架构栈：传统 Secure Email
              Gateways（SEGs），要求变更 MX 记录，将所有邮件流量经由中间转发层；以及更新的 Integrated Cloud Email Security（ICES）或 API 原生方案，通过云平台 API
              在投递后接入。


              Abnormal Security 主要在 ICES 细分市场竞争，目标是 Microsoft 365 和 Google Workspace 企业部署。平台也延伸到相邻市场：SaaS 应用安全（保护
              Slack、Salesforce、Workday 免受账户接管）、安全态势管理和自动化 SOC 工作流。这些相邻领域扩大了总机会，也引入来自终端和 SIEM 厂商的竞争。


              现状替代方案包括 Microsoft Defender for Office 365（包含在 M365 E3/E5
              许可中）、传统网关在位者（Proofpoint、Mimecast、Cisco）以及选择接受剩余风险的内部 SecOps 团队。从在位 SEG 切换的成本中等（数周配置和变更管理），但当 BEC
              损失或审计发现推动转型时，这笔成本可以被合理化。
