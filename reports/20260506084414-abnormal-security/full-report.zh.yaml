      - number: '3.2'
        title: 在位竞争者 —— Microsoft 与 Proofpoint
        blocks:
          - type: paragraph
            body: >
              **Microsoft Defender for Office 365** 是 Abnormal 最强的结构性竞争者：它在 M365 E3 中免费包含，在 E5 中折扣提供，全球估计服务 300+ million
              个企业邮箱 [CP007][CP023]。主要弱点是重度依赖基于签名和静态机器学习的模型，对普通钓鱼表现良好，但会漏掉 BEC、供应商电子邮件入侵和账户接管等复杂行为攻击 [CP008]。Abnormal 的
              API 原生叠加路径让组织无需替换 Defender 就能并行部署 Abnormal，降低采用门槛，也证明它更像补充而不是直接替代。


              **Proofpoint** 在 September 2023 收购 Tessian，以把行为 AI 加入平台，这是对 Abnormal 差异化的直接竞争回应 [CP003][CP032]。截至
              mid-2025，整合仍在进行；PeerSpot 上的企业买方持续给 Abnormal 在检测准确性和易用性上更高评分 [CP009][CP010]。Proofpoint 的 SEG 架构需要变更 MX
              记录，且被评价为运维复杂、成本高；其价格估计为 $5–8/user/month，高于 Abnormal 的 $3–5/user/month [CP014]。不过，Proofpoint
              在基于策略的过滤宽度、合规归档和出站数据丢失防护上仍有优势——这些是 Abnormal 目前尚未覆盖的领域 [CP034]。


              **Mimecast** 以云原生 SEG 服务约 40,000 家客户，主要位于中大型企业层。自 2021 年被 Permira 收购以来，其 R&D 投入速度相对 Abnormal 下降，网关架构也限制了
              Abnormal 已经建立的行为 AI 基线 [CP027][CP004]。
