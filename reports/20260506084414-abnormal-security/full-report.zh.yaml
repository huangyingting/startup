      - number: '4.2'
        title: 融资历史与资本充足性
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 自 2018 年创立以来，在四轮披露融资中筹集 $546M：$24M Series A（2019，Greylock）、$50M Series B（2021，Insight
              Partners）、$210M Series C（2022，Menlo Ventures，估值 $4B）以及 $250M Series D（2024，Wellington Management，估值 $5.1B）
              [CI003][CI004][CI005]。Series C 到 Series D 间隔 26 个月，估值仅温和上升 27.5%，反映 2022–2024 年成长股权 环境艰难；但 $250M 融资为 IPO
              准备和产品扩张提供了新的一级资本。


              投资人阵容尤其强。Wellington Management 领投，显示一家拥有深厚科技 IPO 经验机构的机构级信心 [CI020]。CrowdStrike 通过 Falcon Fund
              参投，增加了战略维度：Abnormal 的电子邮件检测数据与 CrowdStrike 终端遥测互补，意味着商业合作或潜在 M&A 兴趣 [CI022]。Greylock、Menlo 和 Insight
              Partners 为 IPO 流程提供成熟董事会治理 [CI019][CI028][CI032]。


              资本充足性看起来稳健。凭借 $250M 新 Series D 资金，以及估计来自前几轮的 $100–150M 剩余现金（基于 1,000+ 人企业 SaaS 公司的行业 烧钱率基准），Abnormal 很可能拥有
              24–36 个月运营现金缓冲，无需额外融资 [CI021]。不过，相对 $200M ARR，累计融资 $546M 偏高，意味着资本效率低于后期网络安全公司中位数，也符合 Abnormal 仍处在高投入增长模式
              [CI023][CI033]。
