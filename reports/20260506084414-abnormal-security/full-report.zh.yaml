      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 代表企业客户处理电子邮件内容和行为数据，在 GDPR（Regulation (EU) 2016/679）、UK GDPR、CCPA/CPRA 和 Swiss FADP
              下形成重大数据隐私暴露。公司已发布数据处理附录（DPA，2026 年 2 月生效）以及用于受限传输的标准合同条款（SCCs），显示其具备正式合规基础设施。不过，2024 年 EU GDPR 执法急剧升级；GDPR
              Enforcement Tracker 显示罚款总额超过 €2.4B，而 EU AI Act（Regulation (EU) 2024/1689）下的 AI 专项审查也在强化。该法于 2024 年 8
              月生效，并将在 2026 年 8 月前施加完整罚则。分析员工行为数据并自动决策（例如隔离动作）的 AI 系统，可能需要按 Annex III 归类为高风险
              AI，并承担技术文档、合格评定和透明度义务。Abnormal 的 FedRAMP In Process 状态（2024 年 8 月宣布）目标是在 2025 年 H1 取得 Moderate Authority
              to Operate（ATO）；若未能按期取得 ATO，将基本封死有意义的美国联邦政府收入。截至报告日，未见针对 Abnormal Security
              的公开已知诉讼、专利纠纷或监管执法行动。来自传统厂商（Proofpoint、Mimecast）的 IP 诉讼风险在公司扩张时并非为零，但目前没有证据支撑。 [CR004] [CR005] [CR006]
              [CR007] [CR008] [CR009]
