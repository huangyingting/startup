      - number: '3.3'
        title: AI 原生 ICES 挑战者
        blocks:
          - type: paragraph
            body: >
              ICES 子赛道在 2024 年吸引了大量资本。**Perception Point** 于 August 2024 从 Apax Funds 融资 $100 million，用于扩展 API
              原生电子邮件和工作空间安全平台 [CP006]。尽管如此，2024 Gartner MQ 将其归为 Niche Player 而非 Leader，说明相对 Abnormal 仍存在产品完整性差距 [CP028]。


              **Darktrace EMAIL** 把公司的自学习 AI 用于电子邮件安全，声称比领先 SEGs 早 13 天发现威胁 [CP016]。Darktrace 报告 FY2024 年化收入约
              $660M，但电子邮件产品只是更广平台中的多个产品之一 [CP005]。不同于 Abnormal，Darktrace EMAIL 通常作为叠加层部署，而非替代方案，限制了其交叉销售潜力。


              **IRONSCALES** 通过众包威胁情报差异化——把 10,000+ 客户的用户反馈与 AI 结合，快速补救钓鱼 [CP017]。其模型比 Abnormal
              自成体系的行为基线更依赖社区，也更依赖客户参与。**Sublime Security** 于 January 2024 融资 $20M，面向希望完全定制和控制基于规则检测的安全工程团队——这是一种小众
              差异化，避免在企业层面与 Abnormal 正面对抗 [CP018]。
