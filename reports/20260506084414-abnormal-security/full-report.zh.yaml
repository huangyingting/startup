      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Abnormal 的 AI 检测引擎天然带有误报和漏报风险：误报过多会阻断合法邮件、侵蚀客户信任；漏报则让攻击穿透，损害 Abnormal 的核心价值主张。随着威胁行为者越来越多使用 AI 生成的社会工程（GPT
              风格 BEC），攻防竞赛可能跑得比 Abnormal 的模型更新更快。基础设施可靠性风险不低：Abnormal 插在 API 内联位置，不是备份层；任何服务宕机都会让客户完全暴露。Abnormal
              的电子邮件安全平台近实时托管、处理并分析邮件正文和元数据；若 Abnormal 自身 AI 基础设施（包括训练数据或推理模型）被攻破，将引发严重声誉和合同事件。H2 2024 Threat Report
              记录文件共享钓鱼激增 350%，显示攻击向量快速演进，压迫 R&D 节奏。Abnormal 自身计算集中在 AWS / Azure，若超大云厂商宕机，会带来 SLA 传导风险。公司已有 900+
              名员工，也面临旧金山 AI / 安全人才市场竞争下的人才获取压力。 [CR010] [CR011] [CR012] [CR013] [CR014]
