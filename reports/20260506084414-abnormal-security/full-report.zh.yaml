      - number: '2.3'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              ICES/AI 原生细分市场的核心增长驱动，是传统 SEGs 面对现代 BEC 和社会工程攻击的系统性不足。根据 Verizon 2024 Data Breach Investigations
              Report，社会工程和钓鱼仍是最主要的初始访问向量，占所有入侵路径的 30% 以上。FBI IC3 的 2023 annual report 记录，仅美国 BEC 损失就达 $2.9
              billion，单起事件中位损失同比上升。这些损失数字直接转化为董事会层面对检测与预防方案的采购意愿，只要方案能在规模化场景中证明可阻断 BEC。


              第二个驱动是 GenAI 攻击快速升级。大型语言模型让低技能攻击者也能工业化生成高度个性化的钓鱼邮件，基本抵消基于签名和声誉的过滤。用行为基线而非已知恶意内容建模的 AI 原生平台，在这种环境中具备结构性优势。


              采用约束包括：（1）Microsoft Defender 免费捆绑在 M365 E3/E5 中，形成价格锚和「够用」惯性；（2）在位 Proofpoint 或 Mimecast SEG 合同通常为 2–3
              年，使切换依赖续约窗口；（3）SMB/中型市场安全团队资源有限，没有足够带宽评估和上线新平台；（4）监管采购周期（FedRAMP、DISA STIG）把联邦销售周期拉长到 12–24 个月。
