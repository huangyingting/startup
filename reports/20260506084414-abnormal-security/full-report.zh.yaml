      - number: '6.5'
        title: 扩张动态与集中风险
        blocks:
          - type: paragraph
            body: >
              先落地、再扩张是核心商业动作：客户从保护 Microsoft 365 或 Google Workspace 的 Email Security 起步，随后加购 SaaS Security（保护
              Slack、Workday、ServiceNow、Zoom）和 AI Security Agent 模块（AI Security Mailbox、Phishing Coach、Data
              Analyst）。这条多产品路径显著提高单客户 ACV。在 2,800+ 家客户和 $200M+ ARR 基础上，平均每客户 ARR 约为
              $71K，符合中大型企业分部以及典型五位数到六位数年合同。公司未披露任何单一客户收入超过 5%；收入分布在 2,800+ 家客户上，意味着相对同行的单客户集中风险较低。不过，少数高价值 Fortune 500
              账户和北美地域集中，带来温和的地理与垂直集中暴露。对合作伙伴渠道依赖有限；直销（企业 AE 和 SDR）以及社区驱动的客户引用模式推动了大多数新客户。采购摩擦中等偏高：典型企业安全销售周期为 3–6+ 个月，需要
              CISO / VP InfoSec 签字、IT 批准，偶尔还要经过法律 / 供应商风险审查。 [CU018] [CU019] [CU020] [CU021]
