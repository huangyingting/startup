    title: 客户工作流运行流程——BEC 攻击检测
    type: flow
    layout: standard
    summary: 逐步展示 Abnormal Security 如何在企业客户环境中检测并处置 BEC 攻击。
    data:
      nodes:
        - id: email-arrives
          label: BEC 邮件进入 M365 收件箱
          detail: 攻击者冒充 CFO 要求电汇；原生 Defender 放行
        - id: abnormal-pull
          label: Abnormal API 拉取（投递后）
          detail: 邮件投递后数秒内通过 Graph API 读取
        - id: behavior-check
          label: 行为基线比对
          detail: PeopleBase：CFO 从不从该 IP 发送电汇请求 + 邮件线程模式异常
        - id: anomaly-score
          label: 高置信度异常打分
          detail: 99.2% 置信度 BEC；VendorBase 确认发件人域名不匹配
        - id: quarantine
          label: 通过 Graph API 自动隔离
          detail: 邮件移入隔离文件夹；收件人尚未收到通知
        - id: soc-alert
          label: SOC 告警 + AI 解释
          detail: 告警推送至 SIEM，附 AI 生成的威胁叙述；SOC 在 <2 分钟内确认
        - id: remediation-complete
          label: 处置完成
          detail: 系统在 <5 分钟内压制攻击；未造成财务损失
      edges:
        - from: email-arrives
          to: abnormal-pull
          label: 投递后经 API
        - from: abnormal-pull
          to: behavior-check
          label: 信号提取
        - from: behavior-check
          to: anomaly-score
          label: 基线偏离
        - from: anomaly-score
          to: quarantine
          label: 触发自动处置
        - from: quarantine
          to: soc-alert
          label: 告警 + 上下文
        - from: soc-alert
          to: remediation-complete
          label: SOC 确认
