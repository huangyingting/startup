      - number: '7.5'
        title: 财务、执行与人员风险
        blocks:
          - type: paragraph
            body: >
              Abnormal 原计划 2025 年 IPO，但在市场波动中推迟，给早期投资者带来流动性约束，也压迫员工股权。在流动性事件发生前，Abnormal 必须依靠累计募资 $546M
              和持续收入来维持运营；公司不披露烧钱率，但在 $200M ARR 和最新一轮 $250M 融资背景下，这一规模的企业 SaaS 公司通常把 ARR 的 50–80% 投向 S&M + R&D，FCF
              可能为负。关键人物风险很尖锐：CEO Evan Reiser 和 CTO Sanjay Jeyakumar 是联合创始人，拥有深厚组织知识；任何一人离开都会向客户和投资者释放显著负面信号。公司员工数快速增长（从
              2022 年约 600 人增至 900+ 人），带来组织扩张风险——在私营公司股权流动性约束下，同时维持文化、客户成功质量和 R&D 速度，运营难度很高。旧金山 AI / ML
              人才竞争激烈，大型科技公司和资金充足的 AI 初创公司都能给出可观薪酬。收入集中在北美；如果国际增长慢于模型假设，会带来 FX 和地理扩张风险。 [CR019] [CR020] [CR021] [CR022]
