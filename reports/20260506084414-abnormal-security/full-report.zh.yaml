      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 由 Evan Reiser（CEO）和 Sanjay Jeyakumar（CTO）联合创立，两人此前都是 Twitter 和 TellApart
              工程师，并搭建过大规模机器学习系统。Reiser 在 Twitter 做行为建模的经历——分析数十亿信号以发现异常活动——直接塑造了 Abnormal 的产品论点：电子邮件攻击利用的是人的行为，防御也需要 AI
              深度理解组织内每名员工、供应商与租户关系的「正常」状态。


              公司为潜在 IPO 补强了高管团队。Michael DeCesare（前 Forescout CEO）加入担任 President，负责商业化。Smita Sanadhya 此前任 Okta CFO，并曾在
              Microsoft 和 HP 担任财务高管，2024 年初被任命为 CFO。Jeff True（前 Zoom 和 Palo Alto Networks General Counsel）同期出任 CLO。Kevin
              Moore 担任 Chief Revenue Officer，Mike Britton 担任 CISO，Lisa Wallace 担任 Chief People Officer。Series D
              完成后，董事会包括来自 Greylock Partners（Asheem Chandna、Saam Motamedi）、Menlo Ventures（Venky Ganesan）、Insight
              Partners（Stephen Ward）和 Wellington Management（Rob Mazzoni）的投资方代表。


              关键人物风险集中在 CEO Reiser 身上；他的愿景和技术可信度支撑公司市场定位。公司留住了一位经验丰富的 CFO，董事会也有 IPO 经验成员，一定程度上缓释了接班风险。
