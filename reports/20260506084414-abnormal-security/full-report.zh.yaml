            body: >
              Abnormal Security 未公开披露 GAAP 财务报表，精确分析单位经济不可能 [CI008]。不过，行业基准和管理层评论允许合理估算。ARR 达 $100–300M 的企业网络安全 SaaS
              公司，通常毛利率为 70–80%；对 AI 原生公司而言，持续行为推理负载的基础设施成本可能把毛利率略微压到 75–80% 中位数以下 [CI013][CI014]。


              在 100% YoY 增长下，即使假设 EBITDA 亏损仅为收入的 -20% 到 -30%，Abnormal 的 Rule of 40 得分也会在 70–80，稳居企业 SaaS 基准的前 10% 分位
              [CI017]。基于 NRR 高于 110%、平均客户生命周期为多年期的企业网络安全 SaaS 基准，公司 LTV/CAC 估计为 5–8x [CI009][CI018]。约 $83,000 的 ACV 和
              3–9 个月企业销售周期，意味着 CAC 回收期为 18–30 个月——偏高，但符合企业安全常态 [CI015]。


              成本结构偏 S&M：Abnormal 这个 ARR 规模的企业网络安全公司，通常把收入的 30–40% 投入 S&M，20–30% 投入 R&D [CI026][CI034]。约 1,000 名员工，加上估计
              $150–200M/year 现金薪酬成本、云基础设施和股权激励薪酬，Abnormal 很可能接近 EBITDA 收支平衡，这与其增长投入姿态一致 [CI034]。
            claimRefs:
