  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与产品概览
        blocks:
          - type: paragraph
            body: >
              Abnormal Security（April 2025 更名为 Abnormal AI）运营一个云原生 AI 平台，组织为四个产品区：Email Security、AI Security Agents、SaaS
              Security 和 Abnormal Behavior Platform 基础设施层 [CE001][CE023]。平台的独特之处在于 API 原生架构：所有产品都通过 只读 OAuth API 集成连接
              Microsoft 365、Google Workspace 和下游 SaaS 应用，不需要变更 MX 记录或调整网络路由 [CE005]。


              核心基础设施层——Abnormal Behavior Platform——承载 Behavior Engine、五个 Knowledge
              Bases（PeopleBase、VendorBase、AppBase、TenantBase、ThreatBase）以及原生 SIEM/SOAR/XDR 连接器
              [CE009][CE011][CE012]。Behavior Engine 从沟通模式、认证事件和 API 活动中，为每名员工摄取约 45,000 个身份信号，建立每个身份的行为指纹，并自主检测相对基线的偏离
              [CE010]。关键在于，这一路径不需要威胁情报源或签名更新——模型纯粹基于行为，并且自我更新。


              Knowledge Bases 提供分层的上下文情报：PeopleBase 跟踪员工沟通规范和关系图谱；VendorBase 映射供应商身份，防止供应商电子邮件入侵；ThreatBase 汇总所有 2,400+
              客户部署中的威胁模式，以驱动网络效应检测 [CE011][CE025]。
            claimRefs:
              - CE001
              - CE005
              - CE009
              - CE010
              - CE011
