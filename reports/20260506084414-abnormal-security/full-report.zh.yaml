            body: >-
              Abnormal 的一键式 OAuth API 集成模式省掉了 SEG 竞争对手要求的 MX 记录变更、DNS 重路由和变更管理开销。通过 Graph API
              访问进行投递后检查，平台可以在不打扰用户的情况下，对已投递邮件应用行为 AI——并在新威胁情报出现时回溯重新隔离。这个架构选择同时推动了快速部署速度和独特检测能力。
