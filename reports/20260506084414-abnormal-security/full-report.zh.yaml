      - number: '7.4'
        title: 平台依赖与合作伙伴风险
        blocks:
          - type: paragraph
            body: >
              Abnormal 的整个产品架构依赖持续、不中断地访问 Microsoft 365 和 Google Workspace API。Microsoft 的 Defender for Office 365 Plan
              2 过去持续增强，现在已成为 Microsoft 365 E5 许可持有者的免费或打包组件——这是直接竞争威胁，同时也控制着 Abnormal 所依赖的 API 表面。如果 Microsoft 限制 Graph
              API 范围、降低第三方电子邮件安全 API 访问质量，或把与 Abnormal 产品实质重叠的安全功能打包，Abnormal 可能同时遭遇竞争侵蚀和技术访问风险。CrowdStrike 既是投资方（Falcon
              Fund），也是集成合作伙伴，带来治理模糊性：如果 CrowdStrike 的平台战略偏离 Abnormal，集成合作可能走弱。Wellington Management 领投 $250M Series
              D，使财务依赖集中到单一机构投资者。Abnormal 的 DPA 记录了分处理方风险；任何列明的分处理方（例如 AWS、用于分析的 Snowflake）发生重大泄露或服务中断，都会传导到 Abnormal
              的合同义务。 [CR015] [CR016] [CR017] [CR018]
