companyProfile:
  summary: >
    Abnormal Security 是一家总部位于 San Francisco 的网络安全公司，2018 年由 Evan Reiser（CEO）和 Sanjay Jeyakumar（CTO）创立；两人此前都在 Twitter 和
    TellApart 任职。公司做的是 API 原生平台，直接连接 Microsoft 365 和 Google Workspace，不需要变更 MX 记录；平台用专有 Behavior Engine 给正常通信模式建立基线，识别
    AI 生成的钓鱼、商业电子邮件入侵（BEC）和账户接管攻击。Abnormal 在 August 2024 由 Wellington Management 领投的 Series D 中融资 $250 million，估值 $5.1
    billion，累计融资达到 $546 million。Series D 完成时，ARR 超过 $200 million，约为前一年的两倍；企业客户超过 2,400 家，包括 17% 的 Fortune 500。到 2024
    年底，客户数增至 2,800+，Fortune 500 渗透率达到 20%。April 2025，公司更名为 Abnormal AI，释放出从电子邮件扩展到所有云应用的平台信号。公司在 2024 年 Forbes Cloud 100
    中排名第 #46。
