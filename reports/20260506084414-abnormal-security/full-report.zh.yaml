      - number: '5.3'
        title: 技术架构与 IP
        blocks:
          - type: paragraph
            body: >
              Abnormal 的技术差异化立在三根支柱上：行为 AI 深度、API 原生架构和专有训练数据。Behavior Engine 可能使用图神经网络（GNNs）做跨电子邮件沟通图谱的身份关系映射，使用 NLP
              做邮件内容和风格分析，并使用 LLM 组件支撑威胁解释和代理能力 [CE015]。这种多层 ML 路径基于专有客户数据训练，形成的模型无法被没有同等训练数据集的外部参与者复制。


              知识产权方面，Abnormal 至少已提交一项专利（US20230239295A1），覆盖其行为异常检测方法 [CE014]。公司也发布开发者 API（REST）、用于 SOAR 集成的 GitHub
              仓库，并维护活跃开发者工具——说明它在专有核心之外，也采取开放生态策略 [CE013][CE030][CE033]。


              SIEM/SOAR 集成连接 Splunk、Microsoft Sentinel、IBM QRadar、Palo Alto XSOAR、CrowdStrike Falcon 等，使 Abnormal
              能在企业安全运营中心中作为一线检测源运行，而不是孤立单点方案 [CE012]。
            claimRefs:
              - CE012
              - CE013
              - CE014
              - CE015
              - CE030
              - CE033
      - number: '5.4'
        title: 信任、合规与可靠性
        blocks:
          - type: paragraph
            body: >
              Abnormal Security 持有 SOC 2 Type II 认证（经 Vanta 第三方审计），确认其安全性、可用性和保密性控制达到企业 SaaS 标准 [CE016]。公司提供符合 GDPR
              的数据处理协议，客户数据按配置存储在美国或欧盟区域 [CE017]。2023–2025 年间未见公开披露的数据泄露或重大平台宕机；只读 API 模型限制了 Abnormal 自身被攻破时的影响半径
              [CE026][CE020]。


              关键合规缺口：Abnormal 尚未取得 FedRAMP 授权，限制其在美国联邦机构部署 [CE018]。产品的纯云架构排除了本地部署，限制了有气隙要求的受监管实体采用
              [CE024]。从隐私角度看，平台能访问企业全部电子邮件和认证日志，采购时需要用严密的 DPA 治理来管住数据隐私风险 [CE034]。


              面向误报管理的企业管理员控制包括白名单、抑制规则，以及带隔离可视性的完整管理控制台，回应了客户对自动化电子邮件安全干扰合法业务通信的常见担忧 [CE028]。
