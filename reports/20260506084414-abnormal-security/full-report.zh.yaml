      - number: '6.3'
        title: 具名客户验证
        blocks:
          - type: paragraph
            body: >
              Abnormal 发布了多个行业的生产环境案例。ADT 是消费者服务安全巨头，在 Microsoft 365 上保护 24,770+ 个邮箱；部署 Abnormal 后，24
              个月内成功攻击为零，还识别出数百个被攻破的供应商邮箱账户，并大幅降低了 BEC 和发票欺诈。ADT 的 CISO Ryan Fritts 表示：「我们看到 BEC
              和订单欺诈大幅下降，所以现在有时间更主动地做安全。」Domino's（4,400+ 个邮箱，零售 / 食品）部署 Abnormal 后，电子邮件调查每天节省 41 个安全分析师小时，用户上报恶意邮件减少
              98%，检测到的 BEC 攻击比行业平均多 355%；此外，前 30 天还记录了全公司灰色邮件过滤节省 488 小时。JB Poindexter & Co（JBPCO，8,300 个邮箱，制造业）在 90
              天内节省 684 小时手动修复，并释放 1 名 FTE 不再处理电子邮件分诊；CISO John Barrow 称基于 API 的部署是「我做过最容易的技术实施」。具名企业引用 Maersk、Xerox 和
              Mattel，确立了 Abnormal 在全球航运、文档管理和消费品领域的可信度。所有记录在案的案例都是生产部署，不是试点。 [CU009] [CU010] [CU011] [CU012] [CU013]
