      - number: '5.5'
        title: 产品路线图与开发成熟度
        blocks:
          - type: paragraph
            body: >
              Abnormal 的产品成熟度因模块差异很大：核心 Email Security 模块已在 2,400+ 个企业部署中经受检验；SaaS Security 已经 GA，但商业规模更早期；新的 AI
              Security Agents（AI Phishing Coach、AI Data Analyst）于 2025 年推出，处于早期商业可用阶段 [CE021]。2025–2026 年路线图包括推进 FedRAMP
              授权、更深的 Microsoft Copilot 集成、出站电子邮件安全覆盖，以及扩展 AI 智能体能力 [CE022]。


              客户提到的改进方向包括：本地电子邮件支持、出站 DLP、更细颗粒度的管理员配置选项，以及与 Microsoft 安全工具的增强集成 [CE035]。这些都是已知产品缺口，而 Proofpoint 和
              Mimecast 目前已能服务合规负担更重的垂直行业。尤其是缺少出站 DLP，限制了 Abnormal 在受监管行业中作为完整电子邮件安全替代品的能力，使其更像互补覆盖层 [CE024]。


              其云基础设施估计主要托管在 AWS 上，带来标准的超大云厂商集中风险：AWS 区域故障会让检测失效，但不会中断邮件投递本身 [CE027][CE029]。
