      - number: '3.5'
        title: 护城河耐久性与竞争风险
        blocks:
          - type: paragraph
            body: >
              Abnormal 的竞争护城河有三项结构性组件：（1）基于专有客户数据训练、外部无法复制的行为 AI 模型；（2）部署惯性——一旦部署，基线模型会深度嵌入安全运营工作流；（3）来自 2,400+
              企业部署模式的跨客户威胁情报 [CP011][CP030][CP024]。


              主要竞争风险是 Microsoft。凭借 300M+ 邮箱和 $212B 全球网络安全支出顺风 [CP007][CP023]，Microsoft 拥有分发、数据和 AI 投资能力；如果它选择在 Copilot
              for Security 内优先推进电子邮件安全，就可能补上行为检测差距。当前证据显示，Microsoft 对 AI 辅助 SOC 工具的投入多于电子邮件行为检测，但战略选项存在 [CP025]。


              Proofpoint-Tessian 整合意味着在位者需要 12–18 个月滞后期，才可能在企业场景中可信地匹配 Abnormal 的行为检测 [CP020][CP032]。Proofpoint
              买方异议（成本高、复杂）也说明，仅仅追平 Abnormal 的 AI 能力，可能仍不足以留住有流失风险的客户。总体看，护城河在 3 年维度上中等耐久，但 第 2 年之后面临来自 Microsoft 的实质压缩风险
              [CP025]。
