      - number: '3.4'
        title: 功能差异化与定价
        blocks:
          - type: paragraph
            body: >
              Abnormal 的核心差异化是行为 AI 基线：它基于每名员工 45,000+ 个身份信号训练，包括沟通模式、登录事件和第三方 SaaS 行为。这形成的检测模型天然是客户专属的，并会在部署后的前 6–12
              个月持续改进 [CP011][CP030]。目前没有竞争对手能在不需要大量定制或分析师时间的情况下，匹配这种身份信号整合范围。


              Abnormal 相比 Microsoft Defender 的关键功能优势：（1）无需依赖已知威胁签名即可检测 BEC 和供应商电子邮件入侵的行为；（2）API 原生部署，无需变更 MX 记录；（3）SaaS
              安全扩展到 Slack、Teams 和云存储。相比 Proofpoint 的关键功能缺口：（1）没有本地网关兜底；（2）没有电子邮件网关层的出站 DLP；（3）合规归档有限
              [CP034][CP026][CP008]。


              定价上，Microsoft 免费捆绑形成最不对称的竞争动态：即便 Defender Plan 2 作为附加项定价 $2/user/month，在 M365 E5 中也免费 [CP015]。Abnormal 的
              $3–5/user/month 价格靠检测准确率优势支撑，并且总体上与 Proofpoint 的 $5–8/user/month 竞争；对 Proofpoint 存量客户而言，Abnormal
              看起来还能讲出节省成本的故事 [CP014]。
