      - number: '6.4'
        title: 留存、满意度与韧性
        blocks:
          - type: paragraph
            body: >
              作为私营公司，Abnormal 不公开披露净收入留存（NRR）或毛收入留存（GRR）。但几个替代指标指向高留存：（a）ARR 同比增长 100%+，同期客户数约增长 50–60%，意味着单客户扩张收入可观，隐含
              NRR 明显高于 100%；（b）多模块采用（Email + SaaS Security + AI Agents）推动已安装客户自然增购；（c）API 原生、行为自适应架构不要求客户重新配置 MX
              记录或改变邮件路由，低扰动姿态降低了切换动机；（d）Abnormal 在 TrustRadius 的 22 条评论中评分 9.8/10，高于威胁检测品类 8.5 的平均值，且截至 2025 年未报告负面评价，并在
              Gartner Peer Insights 上有较强存在感。客户成功触点包括上线协助、最佳实践咨询会议和定制化业务回顾，进一步强化黏性。该分部常见的多年期企业合同结构也支撑了持久留存。 [CU014]
              [CU015] [CU016] [CU017]
