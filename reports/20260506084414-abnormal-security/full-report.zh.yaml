        title: 规模测算缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >
              分析师对电子邮件安全 TAM 的估计因范围定义不同而明显分化。覆盖独立电子邮件过滤产品的窄口径给出 2024 年 $6–7 billion；纳入 SaaS 应用安全、云端身份保护和安全意识培训的宽口径给出
              $15–25 billion。VerifiedMarketResearch、MarketResearchFuture、SNS Insider 和 Research & Markets
              的独立预测都使用不同组件定义，精确比较并不可靠。Technavio 单独建模「安全电子邮件网关」子赛道，抓住的是传统市场，而不是 Abnormal 这类 API 原生 ICES
              进入者。这些定义不一致意味着，常被引用的「电子邮件安全市场」规模可能对 Abnormal 的真实 TAM 产生重复计算或低估，取决于采用哪份研究报告。
