chapter:
  number: 1
  title: Company Overview
  summary: |
    Abnormal Security (rebranded to Abnormal AI in April 2025) is an AI-native cybersecurity company
    founded in 2018 in San Francisco. Its behavioral AI platform protects cloud email and SaaS applications
    from advanced socially engineered attacks—BEC, phishing, and account takeover—by modeling human behavior
    patterns at scale. After raising $250 million in a Series D at a $5.1 billion valuation in August 2024,
    bringing total funding to $546 million, the company crossed $200 million in ARR with 2,400+ enterprise
    customers and is targeting an IPO in late 2025.
sections:
  - id: s1
    title: Identity and Business Model
    body: |
      Abnormal Security, operating as Abnormal AI since April 2025, is an AI-native cybersecurity company
      headquartered in San Francisco, California. Founded in 2018, the company occupies a specialist niche
      within enterprise email security: rather than routing email through a gateway and filtering known-bad
      signatures, Abnormal's platform connects to cloud email systems via API, ingests thousands of
      behavioral signals—sender history, communication patterns, language tone, relationship graph—and
      builds per-tenant baselines of normal human behavior. Threats are detected when a message or action
      deviates meaningfully from those baselines, enabling identification of sophisticated business email
      compromise, vendor-impersonation fraud, account takeover, and zero-day social engineering that evades
      legacy secure email gateways (SEGs).

      The core product integrates natively with Microsoft 365 and Google Workspace and has expanded to
      cover collaboration platforms (Slack, Zoom), CRM (Salesforce), ITSM (ServiceNow), and HR systems
      (Workday). The business model is a SaaS subscription charged per mailbox or seat with multi-year
      enterprise contracts, supplemented by professional services. Deployment is API-first and can be
      completed in minutes without MX record changes, lowering friction for enterprise POCs. Expansion
      revenue is driven by adding modules (account takeover protection, security posture management) and
      cross-selling broader SaaS application coverage to existing email security customers.
    claimRefs:
      - CO001
      - CO002
      - CO019
      - CO020
      - CO031
      - CO032
  - id: s2
    title: Founders, Leadership, and Governance
    body: |
      Abnormal Security was co-founded by Evan Reiser (CEO) and Sanjay Jeyakumar (CTO), both former
      engineers at Twitter and TellApart, where they built large-scale machine learning systems. Reiser's
      background in behavioral modeling at Twitter—analyzing billions of signals to detect anomalous
      activity—directly informed Abnormal's product thesis: that email attacks exploit human behavior, and
      defending against them requires an AI that deeply understands what "normal" looks like for every
      employee, vendor, and tenant relationship within an organization.

      The executive team has been strengthened ahead of a potential IPO. Michael DeCesare (formerly CEO of
      Forescout) joined as President to lead go-to-market operations. Smita Sanadhya, previously CFO at
      Okta and finance executive at Microsoft and HP, was appointed CFO in early 2024. Jeff True (formerly
      General Counsel at Zoom and Palo Alto Networks) was named CLO concurrently. Kevin Moore serves as
      Chief Revenue Officer, Mike Britton as CISO, and Lisa Wallace as Chief People Officer. The
      board includes investor representatives from Greylock Partners (Asheem Chandna, Saam Motamedi),
      Menlo Ventures (Venky Ganesan), Insight Partners (Stephen Ward), and Wellington Management
      (Rob Mazzoni) following the Series D close.

      Key-person risk centers on CEO Reiser, whose vision and technical credibility anchor the
      company's market positioning. The retention of a seasoned CFO and presence of IPO-experienced board
      members somewhat mitigates succession risk.
    claimRefs:
      - CO003
      - CO004
      - CO017
      - CO018
      - CO034
      - CO035
      - CO037
      - CO039
      - CO040
  - id: s3
    title: Funding History and Capitalization
    body: |
      Abnormal Security has raised $546 million across four primary equity rounds. An early Series A
      closed in 2020, followed by a $50 million Series B in 2021 that funded the API-native platform
      build-out. The company crossed $100 million ARR before its May 2022 Series C, which raised
      $210 million at a $4 billion pre-money valuation, led by CrowdStrike Falcon Fund with participation
      from Greylock and Menlo. In August 2024, Abnormal closed a $250 million Series D led by Wellington
      Management—a crossover fund that regularly pre-positions in IPO candidates—at a $5.1 billion valuation,
      implying an approximately 25x ARR multiple at time of raise. The CrowdStrike Falcon Fund's
      participation across multiple rounds signals strategic alignment between the two companies' detection
      ecosystems. No material secondary transactions or convertible debt have been publicly disclosed,
      and the company has not reported any credit facility.
    claimRefs:
      - CO005
      - CO006
      - CO007
      - CO013
      - CO014
      - CO015
      - CO016
      - CO030
      - CO033
  - id: s4
    title: Commercial Scale and Cover Metrics
    body: |
      As of the August 2024 Series D announcement, Abnormal Security's ARR had surpassed $200 million,
      representing approximately 100% year-over-year growth from the prior $100 million level. The company
      reported 2,400+ enterprise customers at the time of fundraising; third-party data providers tracking
      active deployments placed the figure closer to 3,000–3,200 by end of 2024, spanning 35+ countries.
      Fortune 500 penetration is approximately 17%—around 85 companies—with some sources citing up to 20%.
      Headcount grew roughly 70% during 2024 to approximately 1,000 employees, with offices in San Francisco
      (HQ), Austin, New York, London, and emerging Asia-Pacific markets. NRR and gross margin are not
      publicly disclosed, but enterprise SaaS email security peers typically operate 110–130% NRR and
      70–80% gross margins, suggesting Abnormal is in a similar range given its API architecture and low
      per-customer infrastructure cost.
    claimRefs:
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO025
      - CO026
      - CO029
      - CO041
  - id: s5
    title: Key Milestones and Strategic Direction
    body: |
      From a two-person founding team in 2018 to a $5.1 billion company in 2024, Abnormal followed a
      disciplined build-measure-iterate trajectory. The company's first enterprise customers validated
      the API-behavioral-AI product-market fit; successive funding rounds enabled geographic expansion and
      product breadth beyond core email. The 2024 Gartner Magic Quadrant recognition—as a Leader and
      furthest right for Completeness of Vision in the inaugural Email Security Platforms edition—cemented
      industry analyst credibility alongside customer satisfaction scores (4.8/5 on Gartner Peer Insights).
      The April 2025 rebranding to Abnormal AI and launch of autonomous AI agents (AI Phishing Coach,
      AI Data Analyst) signals a platform evolution from reactive detection toward AI-orchestrated security
      operations, expanding total addressable market beyond email into full SOC automation.
      IPO preparations (appointment of IPO-experienced CFO and CLO in early 2024) indicate management
      and board are targeting public markets in the 2025–2026 window, subject to macro conditions.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO024
      - CO027
      - CO028
      - CO036
      - CO042
