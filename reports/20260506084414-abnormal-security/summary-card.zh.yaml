summary:
  headline: |
    Abnormal Security 是企业邮件安全里最清晰的 AI 原生颠覆样本：ARR 增长 100%，企业客户 2,800+，
    并在 Gartner Magic Quadrant 的愿景维度领先，获得独立分析师背书。Series D 估值 $5.1B，
    约 25× ARR，较上市网络安全同业（11–15× ARR）偏贵；但若公司能把 70%+ ARR 增速守到
    目标中的 2025 年 Q4 IPO，这一价格仍可辩护。核心风险是 Microsoft Defender 以零边际成本
    捆绑销售，以及增长放缓后的倍数压缩。若能在尽调中拿到 NDR 和利润率披露，成熟投资人可视为
    **有条件买入**。
