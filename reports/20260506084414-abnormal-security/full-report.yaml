            title: 'Structural Tailwind: GenAI Attacks Expose SEG Weakness'
            body: >-
              The rise of GenAI-powered personalized phishing makes legacy signature-based SEGs increasingly
              ineffective. Abnormal's behavioral AI approach has a structural advantage that should widen as attack
              sophistication increases.
            calloutType: strength
            claimRefs:
