  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Abnormal Security (now Abnormal AI) focuses exclusively on enterprise and mid-market B2B customers, with
              no consumer or SMB segment. As of year-end 2024 the company reported 2,800+ customers globally and 20%
              Fortune 500 penetration—up from 2,400+ customers and 17% Fortune 500 at the August 2024 Series D close.
              The primary segment is Large Enterprises with 1,000–100,000+ employees, which account for the majority of
              ARR due to large mailbox counts and higher-value contracts. Financial Services and Healthcare represent a
              disproportionate share of bookings driven by high breach costs, stringent regulatory obligations (SOX,
              HIPAA), and complex vendor ecosystems that raise Vendor Email Compromise (VEC) exposure. Manufacturing and
              Retail/Consumer Goods form a large second cohort: in 2024, 76% of organizations in this combined segment
              received at least one VEC or vendor-fraud attack, and 91% of Construction & Engineering firms received a
              BEC attack, creating strong pull for AI-native protection. A fast-growing Mid-Market segment (500–1,000
              employees) emerged in 2025 as automated AI-enabled phishing broadened the addressable audience beyond pure
              Global 2000 accounts. Geographically, North America dominates the customer base, with EMEA as the primary
              international expansion region and APAC growing. Named global accounts include Maersk (global shipping,
              Denmark), Accelleron (industrial technology, Switzerland), and Boohoo (retail, UK), demonstrating early
              multinational reach. [C184] [C185] [C186] [C187]
            claimRefs: []
      - number: '6.2'
        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: >
              Abnormal crossed $200M in ARR in 2024—a milestone achieved in roughly five years from founding and
              representing approximately 100% year-over-year ARR growth. Customer count grew from under 1,000 in 2021 to
              2,400+ by August 2024 and 2,800+ by year-end 2024, implying net logo additions of 400+ in a six-month
              window. The company appeared on the Forbes Cloud 100 for the second consecutive year in 2024, ranking
              #46—its best placement to date and the first time it entered the top 50. Each new customer goes live via
              an API-based deployment (no MX record change required), which shortens time-to-value significantly:
              multiple case studies document full deployment within "less than an hour" and tangible threat visibility
              on day one. This frictionless onboarding lowers the barrier to trial and supports Abnormal's
              proof-of-value (POV) motion, where prospects see real threats missed by incumbent tools before committing
              to purchase. Deployment depth grows as customers add modules: from core Email Security to SaaS Security
              (Slack, Workday, ServiceNow) and AI Security Agents, expanding the average contract value over time.
              [C188] [C189] [C190] [C191]
            claimRefs: []
      - number: '6.3'
        title: Named Customer Proof
        blocks:
          - type: paragraph
            body: >
              Abnormal publishes production case studies across multiple industries. ADT, the consumer-services security
              giant with 24,770+ protected mailboxes on Microsoft 365, deployed Abnormal and has recorded zero
              successful attacks over 24 months, plus identification of hundreds of compromised vendor email accounts
              and a dramatic reduction in BEC and invoice fraud. ADT's CISO Ryan Fritts stated: "We've seen a
              significant drop in BEC and order fraud, so now we have time to be more proactive on security." Domino's
              (4,400+ mailboxes, retail/food) deployed Abnormal and achieved 41 security analyst hours saved per day on
              email investigations, a 98% reduction in user-reported malicious emails, and 355% more BEC attacks
              detected versus industry averages; additionally 488 hours of companywide graymail-filtering savings were
              documented in the first 30 days. JB Poindexter & Co (JBPCO, 8,300 mailboxes, manufacturing) saved 684
              hours of manual remediation in 90 days and freed one FTE from email triage, with CISO John Barrow calling
              the API-based deployment "the easiest technology implementation I've ever done." Named enterprise
              references Maersk, Xerox, and Mattel establish Abnormal's credibility in global shipping, document
              management, and consumer goods. All documented case studies represent production deployments, not pilots.
              [C192] [C193] [C194] [C195] [C196]
            claimRefs: []
      - number: '6.4'
        title: Retention, Satisfaction, and Durability
        blocks:
          - type: paragraph
            body: >
              Abnormal does not publicly disclose Net Revenue Retention (NRR) or Gross Revenue Retention (GRR) as a
              private company. However, several proxy indicators point to high retention: (a) ARR grew 100%+ YoY while
              customer count grew roughly 50–60% in the same period, implying meaningful expansion revenue per customer
              and an implied NRR well above 100%; (b) multi-module adoption (Email + SaaS Security + AI Agents) drives
              natural upsell within the installed base; (c) the API-native, behaviorally adaptive architecture does not
              require customers to reconfigure MX records or change mail routing—a low disruption posture that reduces
              switching motivation; (d) Abnormal boasts a 9.8/10 rating on TrustRadius across 22 reviews (above the
              category average of 8.5 for threat detection) with zero negative reviews reported as of 2025, and a strong
              Gartner Peer Insights presence. Customer success touchpoints include onboarding assistance, best practice
              advisory sessions, and customized business reviews, reinforcing stickiness. The multi-year enterprise
              contract structure common in this segment also supports durable retention. [C197] [C198] [C199] [C200]
            claimRefs: []
      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Land-and-expand is a core commercial motion: customers start with Email Security protecting Microsoft 365
              or Google Workspace and subsequently add SaaS Security (protecting Slack, Workday, ServiceNow, Zoom) and
              AI Security Agent modules (AI Security Mailbox, Phishing Coach, Data Analyst). This multi-product
              trajectory increases per-customer ACV meaningfully. At 2,800+ customers and $200M+ ARR, average ARR per
              customer is approximately $71K, consistent with the mid-to-large enterprise segment and typical
              five-figure to six-figure annual contracts. No single customer is disclosed as exceeding 5% of revenue;
              revenue distribution across 2,800+ customers implies a low single-customer concentration risk relative to
              peers. However, concentration in a few high- value Fortune 500 accounts and in the North American
              geography creates modest geographic and vertical concentration exposure. Partner-channel dependence is
              limited; direct sales (enterprise AEs and SDRs) and a community-led reference model drive the majority of
              new logos. Procurement friction is moderate-to-high: typical enterprise security sales cycles span 3–6+
              months and require CISO/VP InfoSec sign-off, IT approval, and occasionally legal/vendor-risk review.
              [C201] [C202] [C203] [C204]
            claimRefs: []
