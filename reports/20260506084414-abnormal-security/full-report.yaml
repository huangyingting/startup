            body: >-
              Microsoft Defender for Office 365 is included in widely-deployed M365 E3/E5 plans, creating a 'free'
              pricing anchor that forces Abnormal to justify premium ARPU through demonstrably superior BEC and
              social-engineering detection.
            calloutType: risk
