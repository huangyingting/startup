callouts:
  - calloutType: risk
    title: Private Valuation of $5.1B May Exceed Near-Term IPO Market Clearing Price
    body: >-
      At 2024–2025 late-stage cybersecurity multiples of 12–20x NTM ARR, Abnormal's IPO valuation range is approximately
      $3.6–4.8B in the base case — meaningfully below the $5.1B Series D price. Series D investors, particularly
      Wellington Management, may require sustained high growth (above 60% in 2025) or market multiple recovery to
      achieve a non-dilutive IPO. This dynamic explains the IPO delay and adds timing risk for Series C/D investors.
    claimRefs:
      - CI006
      - CI007
      - CI024
      - CI030
      - CI031
  - calloutType: strength
    title: 100% ARR Growth at $200M Scale Is Exceptional and Rarely Sustained
    body: >-
      Fewer than 5% of enterprise SaaS companies sustain 100% ARR growth after crossing the $100M ARR threshold. If
      Abnormal maintains even 60–70% growth into 2025, it would remain in the top quintile of cybersecurity SaaS growth
      profiles and command a premium multiple at IPO. The company's NRR-driven expansion and Fortune 500 concentration
      support sustained growth through land-and-expand mechanics.
    claimRefs:
      - CI002
      - CI017
      - CI018
