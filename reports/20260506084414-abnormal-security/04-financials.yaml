  - id: TI005
    title: Public Financial Gaps Table
    columns:
      - Unknown Item
      - Risk Level
      - Why It Matters
      - Diligence Ask
    enumerationScope:
      coverage: partial
      basis: >-
        Covers 6 key undisclosed financial items; based on typical pre-IPO private company disclosure framework and
        standard IPO S-1 requirements
    rows:
      - - GAAP Revenue vs. ARR gap
        - Medium
        - Deferred revenue timing can produce 10–20% gap between ARR and GAAP revenue
        - Request GAAP revenue schedule for prior 4 quarters
      - - Operating loss / cash burn
        - High
        - High-growth SaaS burn of $50–100M/year not verified; impacts runway
        - Request quarterly cash flow statements
      - - Gross margin
        - High
        - AI inference costs may compress margin; critical for IPO valuation model
        - Request detailed COGS breakdown
      - - Stock-based compensation (SBC)
        - Medium
        - Pre-IPO SBC creates dilution; $40–70M/year estimated
        - Request capitalization table and option overhang
      - - Customer concentration
        - Medium
        - Top 10 customers may represent >20% of ARR; undisclosed
        - Request revenue concentration schedule (top 10, 20 customers)
      - - NRR / gross retention
        - High
        - No official NRR disclosed; critical for SaaS growth durability assessment
        - Request cohort retention data and NRR by vintage year
    notes: >-
      These gaps are standard for late-stage private companies and are not indicators of any financial irregularity;
      they will be resolved in an S-1 filing.
    claimRefs:
      - CI008
      - CI025
      - CI027
