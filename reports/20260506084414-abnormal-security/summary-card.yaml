  topStrengths:
    - >-
      API-native Behavior Engine creates proprietary per-organization communication baselines with no MX-record change
      required — no direct architectural peer at scale
    - >-
      100% YoY ARR growth ($100M → $200M+) in 2024 at 2,400+ enterprise customers, including 17% of the Fortune 500 —
      hyper-growth profile rare at this ARR base
    - >-
      Gartner Magic Quadrant Vision leader in the inaugural 2024 Email Security Platforms MQ — independent analyst
      validation that accelerates enterprise procurement
    - >-
      Wellington Management-led Series D at $5.1B signals blue-chip crossover investor conviction and a clear near-term
      IPO pathway (Q4 2025 CEO-guided)
    - >-
      CrowdStrike Falcon Fund participation provides strategic investor alignment, channel ecosystem access, and
      competitive intelligence moat
    - >-
      FedRAMP In Process (Aug 2024) with ATO targeted H1 2025 opens a $4B+ U.S. federal vertical that pure-play
      competitors have not yet penetrated
  topRisks:
    - >-
      Microsoft Defender for Office 365 Plan 2 bundles AI-powered threat detection at zero incremental cost for E3/E5
      licensees — creates a significant pricing and value-justification headwind in Microsoft-centric enterprises
    - >-
      CrowdStrike Falcon for Email launched in 2024 with the same Fortune 500 relationships and consolidated-platform
      pricing advantage — a credible 2–3 year competitive catch-up threat
    - >-
      25× ARR entry multiple provides thin downside margin of safety; ARR growth deceleration below 50% would compress
      multiple to 10–14× and push implied FMV below the $5.1B entry price
    - >-
      No public disclosure of net dollar retention, gross margins, or operating loss — material financial opacity that
      limits IPO underwriting without access to private data room
    - >-
      EU AI Act, GDPR enforcement evolution, and FedRAMP timeline risk create regulatory headwinds that could delay the
      federal vertical catalyst or increase compliance costs
    - >-
      Preference stack of $546M total raised could erode common equity returns materially in a bear-case exit at or
      below $5.1B
  unresolvedGaps:
    - >-
      Net dollar retention not disclosed — cannot independently verify expansion cohort health or churn exposure without
      private data room access
    - >-
      Gross margin and operating margin not publicly disclosed — limits ability to underwrite the profitability path to
      IPO
    - >-
      Customer concentration risk (top-10 customers as % of ARR) unknown — a single large churn event could be material
      at $200M ARR
    - >-
      Liquidation preference and anti-dilution structure across $546M raised not published — preference overhang opacity
      for common equity holders
    - >-
      FedRAMP ATO final grant date unconfirmed as of report date — federal vertical contribution to the bull case
      remains uncertain
    - >-
      Precise pricing model and per-seat economics not publicly available — ARR quality and renewal visibility cannot be
      independently assessed
