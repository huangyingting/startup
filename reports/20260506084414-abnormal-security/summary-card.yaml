summary:
  headline: |
    Abnormal Security is the clearest AI-native disruption story in enterprise email security,
    with 100% ARR growth, 2,800+ enterprise customers, and a Gartner Magic Quadrant Vision
    leadership position validated by independent analysts. The $5.1 billion Series D valuation
    at ~25× ARR is steep relative to public cybersecurity peers (11–15× ARR), but is defensible
    if the company sustains 70%+ ARR growth through its targeted Q4 2025 IPO. The primary risks
    are Microsoft Defender's zero-marginal-cost bundling threat and multiple compression if
    growth decelerates. A **Conditional Buy** for sophisticated investors who can obtain NDR
    and margin disclosures in due diligence.
