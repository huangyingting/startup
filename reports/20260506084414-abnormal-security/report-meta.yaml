  foundingLocation: "San Francisco, CA"
  headquarters: "San Francisco, CA (operational) / Las Vegas, NV (legal entity)"
  productSummary: |
    Abnormal's core product is an API-integrated behavioral AI platform that protects Microsoft 365
    and Google Workspace environments from advanced email threats. The Behavior Engine creates
    per-organization communication baselines for every employee, vendor, and partner, enabling
    detection of AI-generated phishing, BEC, vendor email compromise (VEC), and lateral account
    takeover without relying on signatures or reputation lists. The platform requires no MX-record
    change and deploys in minutes. The product suite has expanded to include Account Takeover
    Protection, Vendor Email Compromise detection, Collaboration Security (Microsoft Teams, Slack),
    and the AI Security Mailbox for human-reported message triage. In April 2025, the company
    rebranded as Abnormal AI and announced expansion to secure all cloud SaaS applications.
  customerFocus: "Large enterprises and mid-market organizations using Microsoft 365 or Google Workspace; 2,400+ customers at Series D; 17% Fortune 500 penetration; verticals include financial services, healthcare, manufacturing, retail, and public sector"
  businessModel: "Per-seat SaaS subscription with annual enterprise contracts; add-on modules for Collaboration Security, VEC, and AI Security Mailbox; specific pricing is not publicly disclosed"
