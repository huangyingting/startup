companyProfile:
  summary: |
    Abnormal Security is a San Francisco–based cybersecurity company founded in 2018 by Evan Reiser
    (CEO) and Sanjay Jeyakumar (CTO), both formerly of Twitter and TellApart. The company built an
    API-native platform that connects directly to Microsoft 365 and Google Workspace without
    requiring an MX-record change, using a proprietary Behavior Engine to baseline normal
    communication patterns and detect AI-generated phishing, business email compromise (BEC),
    and account takeover attacks. Abnormal raised $250 million in a Series D led by Wellington
    Management in August 2024 at a $5.1 billion valuation, bringing total funding to $546 million.
    As of the Series D close, ARR exceeded $200 million—approximately double the prior year—
    with 2,400+ enterprise customers including 17% of the Fortune 500. By year-end 2024 the
    customer count had grown to 2,800+, with 20% Fortune 500 penetration. In April 2025 the
    company rebranded as Abnormal AI, signaling a platform expansion from email to all cloud
    applications. The company was ranked #46 on the Forbes Cloud 100 in 2024.
  foundedDate: "2018-01-01"
  founders:
    - name: Evan Reiser
      role: "CEO, Co-founder"
      background: "Former Principal Engineer at Twitter; co-founded TellApart (acquired by Twitter 2015); built large-scale ML systems at both companies"
      claimRefs: [CO003]
    - name: Sanjay Jeyakumar
      role: "CTO, Co-founder"
