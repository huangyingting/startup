callouts:
  - calloutType: strength
    title: API-Native Architecture Enables Zero-Friction Deployment and Post-Delivery Inspection
    body: >-
      Abnormal's one-click OAuth API integration model eliminates the MX record change, DNS re-routing, and change
      management overhead required by SEG competitors. Post-delivery inspection via Graph API access allows the platform
      to apply behavioral AI to already-delivered emails without user disruption — and to re-quarantine retroactively as
      new threat intelligence emerges. This architectural choice drives both rapid deployment velocity and unique
      detection capabilities.
    claimRefs:
      - CE005
      - CE007
      - CE025
  - calloutType: risk
    title: Microsoft API Dependency and LLM Cost Concentration Are Latent Platform Risks
    body: >-
      Abnormal's detection capability is dependent on Microsoft Graph API availability, rate limits, and policy
      stability. Any Microsoft decision to restrict third-party API access to email data (analogous to Apple's ATT
      change) would materially impair Abnormal's business. Additionally, the expansion into AI Security Agents
      introduces LLM cost concentration and hallucination risk that is not yet resolved at enterprise scale.
    claimRefs:
      - CE027
      - CE029
      - CE032
