sections:
  - id: SEC501
    title: Platform Architecture and Product Overview
    body: >
      Abnormal Security (rebranded to Abnormal AI in April 2025) operates a cloud-native AI platform organized into four
      product areas: Email Security, AI Security Agents, SaaS Security, and the Abnormal Behavior Platform
      infrastructure layer [CE001][CE023]. The platform's distinctive characteristic is its API-native architecture: all
      products connect via read-only OAuth API integrations to Microsoft 365, Google Workspace, and downstream SaaS
      applications, requiring no MX record changes or network routing modifications [CE005].


      The core infrastructure layer — the Abnormal Behavior Platform — houses the Behavior Engine, five Knowledge Bases
      (PeopleBase, VendorBase, AppBase, TenantBase, ThreatBase), and native SIEM/SOAR/XDR connectors
      [CE009][CE011][CE012]. The Behavior Engine ingests approximately 45,000 identity signals per employee from
      communication patterns, authentication events, and API activity, builds a behavioral fingerprint for each
      identity, and autonomously detects deviations from that baseline [CE010]. Critically, this approach requires no
      threat intelligence feeds or signature updates — the model is purely behavioral and self-updating.


      The Knowledge Bases provide layered contextual intelligence: PeopleBase tracks employee communication norms and
      relationship graphs; VendorBase maps vendor identities to prevent vendor email compromise; ThreatBase aggregates
      threat patterns across all 2,400+ customer deployments to power network-effect detection [CE011][CE025].
    claimRefs:
      - CE001
      - CE005
      - CE009
      - CE010
      - CE011
      - CE012
      - CE023
      - CE025
    tableRefs:
      - TE003
    figureRefs:
      - FE001
      - FE002
  - id: SEC502
    title: Product Modules and Use Cases
    body: >
      Abnormal's Email Security area is the most mature module, covering inbound threat detection (BEC, phishing,
      malware), account takeover protection, graymail filtering, and misdirected email prevention [CE002]. The detection
      workflow is fully automated: upon identifying an anomaly, the platform quarantines the message via M365/Google API
      and delivers a natural-language explanation of the threat to the SOC team — typically within minutes of delivery
      [CE007]. Enterprise deployment baseline establishment takes 2–4 weeks before detection reaches optimal accuracy;
      emergency high-confidence detections begin from day one [CE006].


      The SaaS Security module extends behavioral AI protection to Slack, Zoom, Salesforce, ServiceNow, Workday, and
      Microsoft Teams, detecting account takeovers and data exposure risks across the cloud application stack [CE004].
      The AI Security Agents (launched April 2025) represent the newest product tier: AI Security Mailbox auto-responds
      to user-reported phishing at superhuman speed, AI Phishing Coach delivers hyper-personalized training based on
      actual user behavior, and AI Data Analyst enables natural-language security reporting [CE003][CE031][CE032]. These
      agents are in early commercial availability and represent the platform's future differentiation from pure email
      security vendors.
    claimRefs:
      - CE002
      - CE003
      - CE004
      - CE006
      - CE007
      - CE031
      - CE032
    tableRefs:
      - TE001
      - TE002
  - id: SEC503
    title: Technology Architecture and IP
    body: >
      Abnormal's technical differentiation rests on three pillars: behavioral AI depth, API-native architecture, and
      proprietary training data. The Behavior Engine likely employs graph neural networks (GNNs) for identity
      relationship mapping across the email communication graph, NLP for email content and style analysis, and LLM
      components for threat explanation and agent capabilities [CE015]. This multi-layer ML approach, trained on
      proprietary customer data, creates a model that cannot be replicated by external actors without the same training
      dataset.


      On intellectual property, Abnormal has filed at least one patent (US20230239295A1) covering its behavioral anomaly
      detection methodology [CE014]. The company also publishes developer APIs (REST), GitHub repositories for SOAR
      integrations, and maintains active developer tooling — indicating an open ecosystem strategy alongside the
      proprietary core [CE013][CE030][CE033].


      SIEM/SOAR integrations connect to Splunk, Microsoft Sentinel, IBM QRadar, Palo Alto XSOAR, and CrowdStrike Falcon
      among others, enabling Abnormal to function as a first-class detection source within enterprise security
      operations centers rather than a standalone point solution [CE012].
    claimRefs:
      - CE012
      - CE013
      - CE014
      - CE015
      - CE030
      - CE033
  - id: SEC504
    title: Trust, Compliance, and Reliability
    body: >
      Abnormal Security holds SOC 2 Type II certification (third-party audited via Vanta), confirming that security,
      availability, and confidentiality controls meet enterprise SaaS standards [CE016]. The company provides
      GDPR-compliant data processing agreements with customer data stored in US or EU regions based on configuration
      [CE017]. No publicly reported data breach or major platform outage has occurred during 2023–2025; the read-only
      API model limits the blast radius if Abnormal itself were compromised [CE026][CE020].


      Key compliance gaps: Abnormal does not yet hold FedRAMP authorization, restricting its deployment in US federal
      agencies [CE018]. The product's cloud-only architecture precludes on-premises deployment, limiting adoption by
      regulated entities with air-gapped requirements [CE024]. From a privacy perspective, the platform's access to all
      enterprise email and authentication logs creates a data privacy consideration that requires robust DPA governance
      during procurement [CE034].


      Enterprise admin controls for false-positive management include allow-listing, suppression rules, and a full admin
      console with quarantine visibility, addressing a common customer concern about automated email security
      interfering with legitimate business communications [CE028].
    claimRefs:
      - CE016
      - CE017
      - CE018
      - CE020
      - CE024
      - CE026
      - CE028
      - CE034
    tableRefs:
      - TE004
  - id: SEC505
    title: Product Roadmap and Development Maturity
    body: >
      Abnormal's product maturity varies significantly by module: the core Email Security module is battle-tested across
      2,400+ enterprise deployments; SaaS Security is in general availability but at earlier commercial scale; the new
      AI Security Agents (AI Phishing Coach, AI Data Analyst) launched in 2025 and are in early commercial availability
      [CE021]. The roadmap for 2025–2026 includes FedRAMP authorization pursuit, deeper Microsoft Copilot integration,
      outbound email security coverage, and expansion of AI agent capabilities [CE022].


      Customer-reported improvement areas include: on-premises email support, outbound DLP, more granular admin
      configuration options, and enhanced integration with Microsoft security tools [CE035]. These represent known
      product gaps that Proofpoint and Mimecast currently address for compliance-heavy verticals. The lack of outbound
      DLP in particular limits Abnormal's ability to serve as a complete email security replacement rather than a
      complementary overlay in regulated industries [CE024].


      The estimated cloud infrastructure is primarily AWS-hosted, creating standard hyperscaler concentration risk: an
      AWS regional outage would disable detection but would not interrupt email delivery itself [CE027][CE029].
    claimRefs:
      - CE021
      - CE022
      - CE024
      - CE027
      - CE029
      - CE035
    tableRefs:
      - TE005
    figureRefs:
      - FE003
      - FE004
