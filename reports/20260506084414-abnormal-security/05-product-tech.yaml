    - id: CE001
      statement: >-
        Abnormal Security's platform consists of four top-level product areas: (1) Email Security, (2) AI Security
        Agents, (3) SaaS Security, and (4) the Abnormal Behavior Platform infrastructure layer.
      type: observed
      topic: product-structure
      sourceRefs:
