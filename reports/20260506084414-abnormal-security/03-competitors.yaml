callouts:
  - calloutType: risk
    title: Microsoft's Free Bundling Remains Abnormal's Structural Ceiling
    body: >-
      Microsoft Defender for Office 365 is included free or near-free in M365 enterprise agreements covering 300M+
      mailboxes. No amount of feature differentiation fully overcomes a zero-cost incumbent. Abnormal's growth thesis
      requires that enterprise buyers consistently find behavioral AI detection worth the incremental $3–5/user/month
      spend — a thesis that holds in the Fortune 500 today but may compress in the mid-market and SMB tiers.
    claimRefs:
      - C085
      - C093
      - C101
      - C103
  - calloutType: strength
    title: Behavioral AI Moat Reinforced by Deployment Data Network Effects
    body: >-
      Abnormal's behavioral model improves continuously as more enterprise customers deploy, creating a data flywheel
      that pure challengers without a comparable enterprise installed base cannot easily replicate. With 2,400+
      enterprise customers each contributing identity signal data, the cross-customer threat intelligence network is a
      genuine structural advantage through at least 2027.
    claimRefs:
      - C089
      - C102
      - C108
acknowledgedWarnings:
  - dimension: figureType
    reason: >-
      F302 uses kpi type instead of the planned 'Feature breadth / capability map' which would typically use matrix
      type; kpi format chosen because the comparison data is score-based (0–10) rather than categorical
      presence/absence, making kpi a clearer presentation for the scored comparison.
