  - id: TV004
    title: Thesis/anti-thesis
    order: 4
    description: Key thesis and anti-thesis arguments for Vercel investment.
    columns:
      - Dimension
      - Thesis (Positive)
      - Anti-Thesis (Risk)
    rows:
      - - Framework moat
        - Next.js 52.9% market share; Nuxt ecosystem; high switching cost
        - Framework fragmentation; Astro/SvelteKit gaining; React fatigue
      - - AI platform
        - v0 3.5M users; 30% AI deployments; first-mover in AI deployment
        - AI tools commoditizing; supply chain breach exposed AI risk
      - - Infrastructure position
        - Frontend Cloud category leader; 9M deployments/week
        - AWS-dependent; Cloudflare owns infra; structural cost disadvantage
      - - Revenue quality
        - Enterprise mix ~40%; usage-based with annual contracts; global
        - NRR and gross margin undisclosed; billing controversy risk
      - - Team and execution
        - Founder-CEO; Next.js creator; technical community credibility
        - Key person risk; CEO controversy; no succession plan disclosed
      - - Valuation
        - Cheap on growth-adjusted basis (0.33x P/G vs Cloudflare 0.75x)
        - Private premium 23-50% above public median; thin margin of safety
  - id: TV005
    title: Final diligence asks
    order: 5
    description: Critical diligence requests before investment commitment.
    columns:
      - Diligence Ask
      - Why Critical
      - Minimum Threshold
      - If Missing
    rows:
      - - NRR (Net Revenue Retention)
        - Validates pricing power and expansion revenue
        - 115%+
        - Pass if below 110%; negotiate if 110-115%
      - - Gross margin
        - Validates infrastructure cost structure
        - 68%+
        - Price reduction if below 65%
      - - Enterprise ACV distribution
        - Validates customer quality and concentration
        - Top-10 <25% ARR
        - Pass if top-10 >35%
      - - Cyber insurance post-breach
        - Financial risk from April 2026 incident
        - Full coverage confirmed
        - Material risk if uncovered
      - - EU AI Act v0 compliance status
        - Regulatory risk materialization
        - Roadmap in place
        - Red flag if no compliance plan
      - - v0 ARR contribution
        - Validates optionality value
        - '>$20M confirmed ARR'
        - Renegotiate multiple if <$10M
  - id: TV006
    title: Thesis-break and kill triggers
    order: 6
    description: Conditions that would impair or invalidate the investment thesis.
    columns:
      - Trigger
      - Type
      - Threshold
      - Impact on Thesis
    rows:
