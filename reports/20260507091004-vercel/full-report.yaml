      - - CEO departure (adverse)
        - Kill criterion
        - Unplanned departure in crisis
        - Brand and community trust collapse
      - - EU AI Act enforcement (v0)
        - Thesis-break
        - Enforcement action in EU market
        - Regulatory restriction on AI product
