  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >-
              Vercel's customer base is structured as a four-tier pyramid with distinct economic characteristics at each
              level. At the base is the Hobby tier — millions of free developers who deploy personal projects,
              prototypes, and open-source work. This tier generates no direct revenue but is the primary source of
              future paying customers. Pro ($20/user/month) captures individual developers who need collaboration
              features, custom domains, and higher limits. Teams ($20/seat/month) serves collaborative teams in SMBs and
              startups. Enterprise (custom contract) serves Fortune 500 organizations needing custom SLAs, SSO, audit
              logs, and multi-team governance.


              CEO Rauch confirmed that over 50% of revenue comes from Teams and Enterprise combined as of September
              2025. Industry verticals represented include: retail/e-commerce (Walmart, Nike, Target),
              media/entertainment (Hulu), telecom (AT&T), marketing/agencies (WPP), fintech (PayPal), and tech (OpenAI,
              Anthropic, GitHub, HashiCorp). The geographic distribution is predominantly US-heavy with European
              expansion now a strategic priority, evidenced by GIC's co-lead in the Series F.


              A novel customer segment is emerging: AI agents. CEO Rauch stated at the HumanX conference in early 2026
              that 30% of Vercel deployments are generated by AI agents — autonomous coding systems that automatically
              deploy to Vercel without human developer involvement. This represents a structurally new category of
              'customer' that could significantly expand platform usage velocity without proportional CAC.
            claimRefs: []
      - number: '6.2'
        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: >-
              Vercel's adoption trajectory is among the strongest in developer infrastructure. From $5M ARR in 2020 to
              $340M run rate in February 2026, the platform has compounded at roughly 68x in six years. The adoption of
              Next.js (9M+ weekly downloads) is the primary acquisition channel — developers who adopt Next.js
              organically discover Vercel as the default deployment target, creating a zero-CAC lead generation engine.


              v0 (3.5M unique users) adds a second adoption vector targeting both developers and non-technical designers
              who generate UI components from natural language. This expands the Vercel addressable market beyond pure
              developers to include designers, product managers, and business users who generate deployable code without
              writing it. The AI SDK (3M weekly downloads) drives adoption among developers building AI-powered
              applications who naturally deploy their streaming interfaces on Vercel infrastructure.


              The PLG funnel mechanics are clear: Hobby developers experience Vercel's deployment simplicity on personal
              projects → team members adopt together → leadership buys Teams or Enterprise for governance. This
              bottom-up adoption model keeps CAC low for self-serve tiers and creates qualified enterprise pipeline at
              minimal acquisition cost. The combination of Next.js organic adoption, v0 user growth, and AI agent
              deployments creates a multi-layered adoption funnel with compounding velocity.
            claimRefs: []
      - number: '6.3'
        title: Named Customer Proof and Production Deployments
        blocks:
          - type: paragraph
            body: >-
              Vercel's enterprise customer roster is impressive by any measure. Confirmed production deployments include
              some of the largest enterprise brands globally: Walmart (next-gen storefront), AT&T (composable
              architecture), WPP (digital marketing platform), OpenAI (AI product interfaces), Anthropic (developer
              documentation), Nike (e-commerce), Target (retail), Hulu (streaming media), PayPal (fintech), Under Armour
              (brand/commerce), HashiCorp (developer docs), and GitHub (product site).


              These are not pilots — they are confirmed production deployments, many featured in detailed case studies
              that describe architectural decisions, technical outcomes, and business results. Walmart's case study
              specifically describes rebuilding the next-gen storefront on Next.js/Vercel for improved performance.
              AT&T's composable architecture case describes reduced deployment cycle times. The quality of customer
              proof is high: recognizable enterprise brands, multi-year deployments, and published architectural details
              indicate deep platform commitment rather than surface-level adoption.


              The AI company customer segment (OpenAI, Anthropic) is particularly valuable as a validation signal: the
              companies building the AI that powers Vercel's own v0 tool are themselves Vercel customers. This creates a
              virtuous cycle where AI infrastructure investments simultaneously benefit Vercel customers and Vercel's
              own product development.
            claimRefs: []
      - number: '6.4'
        title: Retention, Satisfaction, and Adverse Signals
        blocks:
          - type: paragraph
            body: >-
              Vercel's retention profile is structurally favorable but carries specific adverse signals that require
              monitoring. On the positive side: annual enterprise contracts, multi-year architectural commitments
              (migrating from Vercel requires framework changes), and a G2 rating of 4.6/5 with 500+ reviews indicate
              strong structural retention. Enterprise customers rating Vercel on TrustRadius confirm SOC2/GDPR
              compliance and flag pricing predictability as the primary concern — not platform reliability or feature
              gaps.


              Adverse signals include: (1) The September 2025 CEO political post controversy (photo with Netanyahu)
              generated significant developer community backlash and migration threats; actual enterprise churn from
              this incident is not publicly quantified but the reputational damage to developer community trust is real
              and ongoing. (2) Cloudflare confirmed developer migrations from Vercel citing pricing and performance,
              validating competitive churn risk. (3) The $96K billing incident prompted community calls for self-hosting
              alternatives. NRR and logo churn are not disclosed; the combination of structural retention drivers and
              these adverse signals creates a nuanced retention picture that requires due diligence data to resolve.


              The CEO controversy deserves special attention: Guillermo Rauch is the founder and face of both Vercel and
              Next.js. Developer trust in the platform is partly trust in its founder. Any sustained community backlash
              risks disrupting the organic adoption flywheel that drives Vercel's zero-CAC developer acquisition —
              potentially the most valuable business metric that is not disclosed.
            claimRefs: []
      - number: '6.5'
        title: Land-and-Expand and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Vercel's land-and-expand motion is among the cleanest in developer infrastructure. The pattern: a
              developer at a large enterprise uses Hobby/Pro for a side project → demonstrates value → convinces team to
              adopt Teams → enterprise procurement buys Enterprise for governance and compliance. This bottom-up motion
              means Vercel enters enterprise accounts with near-zero top-of-funnel cost and expands via usage rather
              than sales-led expansion.


              Concentration risk is unquantified. Top-10 customer revenue concentration is not publicly disclosed. Given
              the enterprise-heavy revenue mix (50%+ from Teams/Enterprise), and assuming a typical SaaS enterprise
              concentration where top-10 customers represent 20-30% of ARR, Vercel's largest customers represent a
              meaningful chunk of revenue. Losing any single Fortune 500 customer (who might represent $2-10M+ ARR)
              would be material.


              The European expansion via GIC partnership represents the most significant geographic expansion vector.
              European enterprise customers have historically been slower to adopt US cloud platforms due to data
              sovereignty concerns; GIC's investment and Vercel's GDPR compliance provide credibility to EU enterprise
              procurement teams. The NuxtLabs acquisition (bringing in French Nuxt.js maintainers) further strengthens
              Vercel's European developer credibility.
            claimRefs: []
      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Blue-Chip Enterprise Customer Roster Validates Production-Scale Platform
            body: >-
              Vercel has confirmed production deployments at Walmart, AT&T, OpenAI, Anthropic, WPP, Nike, Target, Hulu,
              PayPal, HashiCorp, GitHub, and Under Armour. These are not pilots — they are multi-year architectural
              commitments that represent high switching costs and durable ARR. The roster spans retail, media, telecom,
              AI, fintech, and developer tools.
