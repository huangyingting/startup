sections:
  - id: SO_IDENTITY
    title: "Identity, Mission, and Business Model"
    order: 1
    claimRefs: [CO001, CO002, CO003, CO026, CO027, CO029, CO032]
    body: |
      Vercel is an American cloud application company headquartered in San Francisco, CA,
      founded in 2015 by Guillermo Rauch as ZEIT and rebranded to Vercel on April 21, 2020.
      The company's mission is "to enable the world to ship the best products" — originally
      framed as democratizing frontend deployment infrastructure that only tech giants like
      Amazon, Google, and Facebook had access to internally. This mission has evolved to
      encompass the "AI Cloud" — a platform purpose-built for AI-native applications and agents.

      Vercel's business model is freemium-to-enterprise: a free Hobby tier for individual
      developers converts to Pro ($20/month), Team plans for collaborative teams, and Enterprise
      contracts with dedicated infrastructure, SSO, uptime SLAs, and direct sales support.
      The company also monetizes through its v0 AI tool (Teams/Enterprise accounts now exceed
      50% of v0 revenue) and the AI SDK ecosystem. Next.js, while open-source, creates
      platform affinity: teams building with Next.js naturally gravitate to Vercel for optimized
      deployment. This framework-to-cloud flywheel is central to Vercel's go-to-market moat.

  - id: SO_FOUNDERS
    title: "Founders, Leadership, and Governance"
    order: 2
    claimRefs: [CO010, CO011, CO012, CO013, CO014, CO033, CO035]
    body: |
      Guillermo Rauch (born 1990, Lanús, Argentina) is the founder and CEO of Vercel — a
      self-taught programmer who relocated to San Francisco at 18 on an O-1 "extraordinary
      ability" visa after creating Socket.IO and Mongoose. Prior to ZEIT, he founded LearnBoost
      and Cloudup (acquired by Automattic in 2013). His technical credibility spans Socket.IO,
      Next.js, and Mongoose, and he is regarded as one of the most influential JavaScript
      ecosystem builders globally.

      The C-suite assembled for the AI-scale build-out (as of 2025) includes Malte Ubl (CTO),
      Jeanne Grosser (COO, former Stripe Chief Business Officer), Marten Abrahamsen (CFO),
      Tom Occhino (CPO), Keith Messick (CMO), Aparna Sinha (SVP Product), Werner Schwock (CAO),
      and Talha Tariq (CTO Security). This senior team reflects deliberate hiring from enterprise
      infrastructure leaders (Stripe, HashiCorp, Capital One, IBM). The key-person risk is
      concentrated in Rauch, whose public identity, open-source credibility, and community
      relationships are central to Vercel's developer-first brand.

      Board composition is not fully public; known seats include representatives from CRV
      (Reid Christian), GGV Capital (Glenn Solomon), and co-lead Series F investors Accel
      and GIC. Individual angel investors include React creator Jordan Walke, former GitHub
      CEO Nat Friedman, Scale AI CEO Alexandr Wang, and JavaScript/Brave CEO Brendan Eich.

  - id: SO_FUNDING
    title: "Funding History and Capital Structure"
    order: 3
    claimRefs: [CO006, CO007, CO008, CO009, CO028, CO029, CO015]
    body: |
      Vercel has raised approximately $863M across six primary rounds plus a $300M secondary
      tender offer. The funding trajectory reflects three phases: (1) developer platform validation
      (Series A–B, 2020, $61M total); (2) hypergrowth infrastructure build (Series C–D, 2021,
      $252M total); and (3) AI Cloud enterprise transformation (Series E–F, 2024–2025, $550M total).

      The September 2025 Series F ($300M, $9.3B post-money) was co-led by Accel and GIC —
      Singapore's sovereign wealth fund providing global diversification and enterprise credibility.
      New investors BlackRock, Khosla Ventures, General Catalyst, StepStone, Schroders, and Adams
      Street Partners joined alongside existings GV, Notable Capital, Salesforce Ventures, and
      Tiger Global. The approximately $300M concurrent secondary tender offer for early investors
      and employees signals cap table management and pre-IPO liquidity engineering. Key individual
      angel investors provide both technical validation and network effects.

  - id: SO_SCALE
    title: "Scale, Growth Metrics, and Cover KPIs"
    order: 4
    claimRefs: [CO004, CO005, CO017, CO018, CO030, CO031, CO034]
    body: |
      Vercel's ARR trajectory is striking: $100M (early 2024), ~$200M (mid-2025), $340M run
      rate (February 2026) — approximately 3.4x ARR growth in two years. The company reported
      82% YoY revenue growth at the Series F close. Approximately 30% of deployments on the
      platform now originate from AI agents, not humans — a structural demand driver that
      management expects to accelerate. Vercel's user base doubled in the 12 months ending
      September 2025.

      v0 has reached 3.5M unique users with enterprise accounts representing 50%+ of v0 revenue
      — a meaningful monetization signal for what began as a developer toy. The AI SDK reports
      3M weekly downloads; Next.js exceeded 500M downloads in the trailing 12 months to September
      2025. Headcount grew to approximately 897 (March 2026) from ~550 (2025), indicating
      continued hiring despite a selective macro environment. Vercel has not disclosed gross margin,
      EBITDA, or profitability status.

  - id: SO_MILESTONES
    title: "Key Milestones and Adverse Events"
    order: 5
    claimRefs: [CO019, CO020, CO021, CO022, CO023, CO024, CO036, CO037]
    body: |
      Vercel's milestone history spans founding, financing, product launches, acquisitions, and
      notable adverse events. The 2021 acquisition of Turborepo established Vercel as the monorepo
      build platform of choice. The 2023 launch of v0 transformed perception from hosting provider
      to AI developer tools platform. NuxtLabs' acquisition in July 2025 extended Vercel's framework
      ownership to Vue/Nuxt, diversifying beyond Next.js and signaling framework pluralism.

      Two material adverse events occurred in 2025–2026: (1) CEO Guillermo Rauch's meeting with
      Israeli Prime Minister Netanyahu in September 2025 generated significant developer community
      backlash with some users publicly declaring migration intent; (2) On April 19, 2026, Vercel
      disclosed a security breach via a compromised employee's Google Workspace account accessed
      through third-party AI tool Context.ai (linked to Lumma Stealer malware), with a threat actor
      reportedly demanding $2M for stolen data. Neither event has materially impaired reported
      revenue growth through May 2026, but both represent ongoing reputational risks for a
      developer-community-dependent platform.

