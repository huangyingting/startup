chapter:
  number: 1
  title: Company Overview
  summary: |
    Vercel is the leading frontend cloud platform and the creator/maintainer of Next.js,
    the dominant React meta-framework powering millions of websites globally. Founded in
    2015 by Guillermo Rauch as ZEIT, and rebranded to Vercel in April 2020, the company
    has grown from a developer-focused deployment tool into a $9.3B AI Cloud platform.
    As of early 2026, Vercel reports ~$340M ARR (run rate), 82% YoY revenue growth,
    ~897 employees, and a suite of AI developer tools including v0 (text-to-UI) and the
    AI SDK (3M weekly downloads). The September 2025 Series F ($300M, co-led by Accel
    and GIC) cements Vercel's position as the infrastructure layer for the AI-native web.

