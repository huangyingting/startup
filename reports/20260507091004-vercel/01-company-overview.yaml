callouts:
  - id: KCO001
    type: key-finding
    title: "AI-era infrastructure inflection — $340M ARR, 82% growth, 30% agent deployments"
    body: >
      Vercel has executed a successful pivot from Jamstack hosting to AI Cloud platform:
      $340M ARR run rate (Feb 2026), 82% YoY growth, v0 at 3.5M users, AI SDK at 3M
      weekly downloads. 30% of platform deployments now originate from AI agents — a
      structural demand driver management expects to accelerate. The $9.3B Series F
      valuation reflects this inflection, though gross margin and profitability remain
      undisclosed private metrics.
    claimRefs: [CO004, CO005, CO015, CO016, CO018]

  - id: KCO002
    type: risk-flag
    title: "Adverse events in 2025–2026: reputational controversy + security breach"
    body: >
      Two material adverse events — CEO's Netanyahu meeting (Sep 2025, user exodus threats)
      and April 2026 security breach (stolen env variables, $2M ransom demand) — have
      not visibly impaired revenue through May 2026 but represent ongoing reputational risks
      for a developer-trust-dependent platform. Security posture is now a strategic priority
      (Talha Tariq hired as CTO Security in Oct 2025).
    claimRefs: [CO022, CO023]
