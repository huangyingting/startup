summary:
  headline: >
    Vercel 是 Frontend Cloud 的主导者，Next.js 生态治理和 AI 部署飞轮构成真实护城河。按 $9.3B（27x ARR）估值看，增长调整后并不离谱，但安全边际很薄；在 NRR
    和毛利率披露前，结论是有条件放弃。
