callouts:
- id: KCE001
  type: keyFinding
  title: Framework Stewardship Creates Unmatched Ecosystem Moat
  body: Vercel now stewards both Next.js (9M weekly downloads, ~52.9% React meta-framework market) and Nuxt.js (leading Vue meta-framework) as employer of core maintainers. This dual-framework stewardship creates an ecosystem gravity unmatched by any competitor — covering the two largest JavaScript framework communities.
  claimRefs:
  - CE003
  - CE009
  - CE019
  - CE037
- id: KCE002
  type: risk
  title: Supply Chain Security Breach Exposes AI Tool Integration Risk
  body: The April 2026 supply chain attack via Context.ai/Lumma Stealer demonstrates the growing attack surface from deep AI tool integrations. As 30% of deployments become AI-generated, the number of third-party AI tool touchpoints grows proportionally, expanding the attack surface. The $2M ransom incident requires investors to scrutinize third-party security controls.
  claimRefs:
  - CE013
  - CE020
- id: KCE003
  type: opportunity
  title: AI-Generated Deployments Create Self-Reinforcing Growth Loop
  body: 30% of Vercel deployments are AI agent-generated (early 2026). v0 generates Next.js code that naturally deploys on Vercel; AI SDK powers AI apps that scale on Vercel. This creates a closed-loop acquisition funnel where AI tool adoption directly drives platform revenue with near-zero incremental CAC.
  claimRefs:
  - CE004
  - CE005
  - CE020
