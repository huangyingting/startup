callouts:
  - id: KCI001
    type: keyFinding
    title: Hyper-Growth ARR with Strong Enterprise Conversion
    body: >-
      Vercel has grown from $5M ARR (2020) to $340M run rate (Feb 2026) at 82% YoY growth — among the fastest ARR
      scaling trajectories in developer infrastructure. With 50%+ revenue from Teams/Enterprise, the PLG-to-enterprise
      conversion is executing at scale, validating the Hobby → Pro → Enterprise funnel.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
  - id: KCI002
    type: risk
    title: Critical Financial Metrics Remain Undisclosed
    body: >-
      Gross margin, NRR, burn rate, logo churn, and enterprise ACV are all undisclosed. As a pre-IPO private company,
      this is standard — but investors must obtain these metrics in due diligence before committing capital. The AWS
      infrastructure dependency and billing controversy are additional margin and retention risk factors.
    claimRefs:
      - CI012
      - CI013
      - CI014
      - CI030
  - id: KCI003
    type: opportunity
    title: AI Tooling Creates Second ARR Engine
    body: >-
      v0 (3.5M unique users) and AI SDK (3M weekly downloads) are in early monetization. As enterprise AI workflows
      standardize, Vercel is positioned to layer a high-ARPU AI infrastructure subscription onto its existing platform
      subscriptions — potentially doubling ARR/FTE efficiency without proportional headcount growth.
    claimRefs:
      - CI009
      - CI023
      - CI036
