chapter:
  number: 4
  title: Financials
  summary: >-
    Vercel has demonstrated exceptional revenue velocity, scaling from $5M ARR in 2020 to a $340M run rate by February
    2026 — representing roughly 68x growth in six years. The September 2025 Series F ($300M primary at $9.3B valuation,
    co-led by Accel and GIC) was followed by a $300M secondary tender in November 2025, signaling strong investor
    conviction. YoY growth stood at 82% at Series F close, and the company surpassed $200M ARR by mid-2025.


    Revenue is primarily enterprise and team subscription-based. CEO Guillermo Rauch confirmed in September 2025 that
    over 50% of revenue derives from Teams and Enterprise tiers. Hobby (free) users drive platform adoption but
    contribute negligible direct revenue. Vercel's AI product suite — v0 (3.5M unique users) and the AI SDK (3M weekly
    downloads) — is emerging as a second monetization layer that could expand ARPU significantly as AI-assisted
    development workflows proliferate.


    Key financial unknowns remain: gross margin, net revenue retention, customer acquisition cost, and contribution
    margins by tier are not publicly disclosed. Vercel runs its infrastructure on AWS, creating cost structure opacity
    and potential margin compression risk. Benchmark SaaS gross margins of 70-85% are achievable but depend on the
    balance between managed infrastructure and pure software revenue.


    At $340M ARR with 82% growth and an estimated Rule of 40 score above 80 (growth alone exceeds the threshold), Vercel
    presents a compelling financial profile for late-stage private investors. The absence of disclosed gross margin,
    burn rate, and unit economics requires significant due-diligence work before an investment decision. Capital
    adequacy appears strong with $300M+ in fresh primary capital and a substantial secondary tender clearing liquidity
    needs.
