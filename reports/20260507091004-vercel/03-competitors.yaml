callouts:
- id: KCP001
  type: keyFinding
  title: Cloudflare Is the Structural Long-Term Competitive Threat
  body: 'Cloudflare Pages/Workers is the only competitor with the capital base (public company, $1.6B+ ARR),

    network scale (330+ PoPs vs Vercel''s 100+), zero-egress-fee cost structure, and enterprise trust

    posture to structurally undercut Vercel on price for both static and dynamic workloads. The current

    weakness in Next.js ISR/RSC support is temporary. Vercel must maintain framework-defined infrastructure

    advantages while Cloudflare closes the feature gap.

    '
  claimRefs:
  - CP006
  - CP023
  - CP026
- id: KCP002
  type: risk
  title: Next.js Lock-in Is a Double-Edged Competitive Sword
  body: 'Vercel''s deepest moat (Next.js features optimized for Vercel infrastructure) is simultaneously

    its largest reputational risk. The $96K bill shock incident, CEO controversy-triggered migration

    evaluations, and documented lock-in on Next.js 15.1+ create community brand risk. If perceived

    as abusing open-source stewardship, Vercel could trigger governance pressure or accelerate

    adoption of Astro, SvelteKit, and Remix.

    '
  claimRefs:
  - CP014
  - CP031
  - CP032
