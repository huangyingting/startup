chapter:
  number: 3
  title: Competitive Landscape
  summary: 'Vercel''s most direct competitors are Netlify ($46.3M ARR, $2B valuation) and Cloudflare Pages/Workers

    (undisclosed revenue, backed by a $25B+ public company with 330+ edge PoPs). Adjacent PaaS platforms

    (Railway, Render, Fly.io) overlap at the lower tiers but do not compete head-to-head in enterprise

    frontend cloud. AWS Amplify Gen 2 is the primary enterprise competitor for regulated verticals.

    Vercel''s moat centers on Next.js framework stewardship — Next.js 15.1+ features are documented as

    increasingly difficult to replicate outside Vercel — creating non-contractual platform lock-in that

    simultaneously defends revenue and creates community brand risk. Cloudflare''s structural cost and

    network advantages make it the primary long-term competitive threat.

    '
