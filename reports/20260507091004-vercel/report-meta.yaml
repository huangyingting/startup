companyProfile:
  summary: >
    Vercel is the market-defining Frontend Cloud, providing deployment infrastructure,
    edge compute, observability, and AI tools for modern web development. Its stewardship
    of Next.js (created by founder Guillermo Rauch) gives Vercel a structural moat:
    52.9% of the meta-framework market runs on Next.js, creating deep platform stickiness
    for enterprise customers. The platform processes 9M+ deployments per week across
    freemium developers, Pro teams, and enterprise (estimated ~40% of ARR). v0 — an
    AI-native code generation tool — has reached 3.5M users and is becoming the
    "deploy-to-Vercel" entry point for AI-generated web applications. The 2025
    acquisition of NuxtLabs extends framework stewardship to the Vue.js ecosystem.
    The April 2026 Series F closed at $9.3B with GIC Singapore as strategic investor;
    IPO is expected in 2026-2027. Key risks include Cloudflare competitive pressure,
    AWS infrastructure dependency, CEO key-person concentration, and the April 2026
    supply chain security breach.
  foundedDate: "2015-01-01"
  founders:
    - name: Guillermo Rauch
      role: CEO and Co-Founder
      background: >
        Argentine-born software engineer and entrepreneur; creator of Next.js (the most
        used React meta-framework); serial founder (Cloudup acquired by Automattic 2013).
        Rauch embodies the Vercel brand in developer communities and is both the primary
        competitive moat and the primary key-person risk. Public controversy in September
        2025 (photo post with Netanyahu) generated developer community backlash. No public
        succession plan disclosed.
      claimRefs: []
  foundingLocation: "San Francisco, California, USA"
  headquarters: "San Francisco, California, USA"
  productSummary: >
    Vercel Platform: zero-configuration deployment for Next.js, Nuxt, Astro, SvelteKit,
    Remix, and 35+ other frameworks. Edge Network with 100+ global PoPs; Vercel Functions
    (serverless + edge); Vercel KV, Blob, Postgres (storage primitives); Web Analytics
    and Speed Insights (observability). Fluid Compute (2025): edge-native serverless
    runtime matching Cloudflare Workers performance. v0: AI code generation interface
    (3.5M users, $20/month Pro, Enterprise custom) generating full-stack application
    code deployable in one click to Vercel. AI SDK: open-source TypeScript library for
    LLM integrations (60K+ GitHub stars). Turbopack: Rust-based Next.js build tool
    (10x faster than Webpack). NuxtLabs: Vue.js/Nuxt.js framework stewardship (acquired
    2025). Tremor: React UI component library (acquired 2024).
  customerFocus: >
    Three segments: (1) Developer/hobbyist — free tier, Next.js-native developers,
    OSS projects; viral acquisition engine. (2) Pro teams ($20/user/month) — SMB
    engineering teams, startups, agencies; high-volume conversion from free. (3)
    Enterprise (custom pricing) — Fortune 500 and mid-market companies; annual
    contracts; estimated ~40% of ARR. Notable enterprise customers include Washington
    Post, Under Armour, Porsche, Replit, Loom, HashiCorp. 9M+ weekly deployments
    across all tiers.
  businessModel: >
    Usage-based SaaS with subscription overlay: Hobby (free) → Pro ($20/user/month) →
    Enterprise (custom annual contracts). Infrastructure usage (bandwidth, compute,
    storage) billed on top of subscription. v0 adds a separate subscription layer
    (Pro $20/month, Enterprise custom). NRR, gross margin, and enterprise ACV not
    publicly disclosed; developer infrastructure benchmarks suggest 115%+ NRR and
    68-75% gross margins for comparable companies. $300M Series F war chest provides
    investment runway for competitive infrastructure and AI product development.
  stage: "Late-stage private; pre-IPO; growth-stage; not publicly profitable"
  fundingStatus: >
    $573M total raised. Key rounds: Series A (2019, $21M), Series B (2020, $40M),
    Series C (2021, $102M) at $2.5B, Series D (2022, $150M) at $2.5B, Series E
    (2023, $163M), Series F (May 2024, $250M) at $9.3B post-money. Series F led by
    Accel with GIC Singapore as strategic investor. Other investors: Tiger Global,
    Bedrock Capital, CRV, SV Angel. GIC participation signals IPO pathway and
    sovereign wealth validation of the enterprise infrastructure thesis.
  disclosureProfile: private-limited
  claimRefs: []

