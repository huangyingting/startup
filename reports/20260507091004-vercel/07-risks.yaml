callouts:
  - id: KCR001
    type: risk
    title: Cloudflare + AWS Create a Two-Front Competitive and Cost Risk
    body: >-
      Cloudflare owns its infrastructure and achieves 8-15ms cold starts vs. Vercel 30-35ms, making it a superior edge
      computing platform on raw performance. AWS supplies Vercel infrastructure while competing via Amplify. Together,
      these create a two-front war: margin pressure from AWS costs and market share pressure from Cloudflare
      performance.
    claimRefs:
      - CR001
      - CR004
      - CR017
  - id: KCR002
    type: warning
    title: Supply Chain Breach and CEO Controversy Both Materialized in 2025-2026
    body: >-
      Within a 7-month period, two significant adverse events occurred: CEO political controversy (Sep 2025) and supply
      chain security breach ($2M ransom, April 2026). The cluster of incidents suggests elevated execution risk at the
      current growth pace. Both events were managed but neither has been fully resolved from a community trust
      perspective.
    claimRefs:
      - CR002
      - CR003
      - CR030
  - id: KCR003
    type: keyFinding
    title: CEO is Simultaneously Greatest Asset and Greatest Risk
    body: >-
      Guillermo Rauch created Next.js, founded Vercel, and embodies the company brand. This concentration makes him
      simultaneously the primary competitive moat (developer trust and ecosystem stewardship) and the primary single
      point of failure. Any succession planning or governance improvement that reduces key person concentration would
      meaningfully improve the risk-adjusted investment thesis.
    claimRefs:
      - CR009
      - CR030
      - CR015
