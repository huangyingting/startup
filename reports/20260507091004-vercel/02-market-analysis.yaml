chapter:
  number: 2
  title: Market Analysis
  summary: |
    Vercel operates at the intersection of three large, fast-growing markets: (1) the global
    cloud application platform / PaaS market ($215B+ in 2025); (2) the developer tools and
    DevOps market ($8–15B in 2025, 16–26% CAGR); and (3) the emergent AI Cloud / AI developer
    infrastructure segment (no established TAM, but AI-agent deployment is a structural
    growth driver). Vercel's served addressable market — frontend-optimized PaaS for
    React/Next.js developers — is more accurately sized at $5–10B by 2026 based on
    developer base, enterprise seat pricing, and competitive benchmarks. Next.js commands
    ~17–20% of developer usage globally and 52.9% of meta-framework usage, creating a
    captive addressable base for Vercel's monetization funnel.
