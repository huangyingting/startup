callouts:
  - id: KCM001
    type: key-finding
    title: Next.js ecosystem creates a captive SAM — 11M React devs, 52.9% meta-framework share
    body: >
      Vercel's market advantage stems from owning the dominant framework in its target market. Next.js commands 52.9% of
      meta-framework usage among developers (TSH.io 2025) and 17–20% of all developer usage (Stack Overflow 2025). This
      creates a self-reinforcing demand channel: framework → deployment → platform expansion. With $340M ARR
      representing only ~3.4% of a conservative $10B SAM, penetration headroom is substantial.
    claimRefs:
      - CM007
      - CM017
      - CM025
  - id: KCM002
    type: risk-flag
    title: TAM inflation risk — Jamstack $46B estimate is likely overstated; AI Cloud TAM unvalidated
    body: >
      Multiple market estimates cited for Vercel's opportunity use expansive definitions that inflate the addressable
      market. The $46B Jamstack estimate blends CDN, hosting, and tooling categories. More critically, the AI Cloud TAM
      expansion — central to the $9.3B Series F narrative — has not been formally sized by any tier-one analyst firm.
      Investors should model conservatively at $5–10B SAM and apply a probability weight to AI Cloud expansion.
    claimRefs:
      - CM006
      - CM022
      - CM024
