callouts:
  - id: KCV001
    type: keyFinding
    title: Cheap on Growth-Adjusted Basis Despite Headline Premium
    body: >-
      Vercel at 27x ARR on 82% growth implies a multiple-to-growth ratio (PEG-equivalent) of 0.33 — compared to
      Cloudflare at 0.75 (21x on 28% growth). On this metric, Vercel is actually 55% cheaper than its most comparable
      public peer. The Series F price reflects hypergrowth; the risk is growth deceleration, not current overvaluation.
    claimRefs:
      - CV001
      - CV004
      - CV036
  - id: KCV002
    type: risk
    title: 'Fastly Cautionary Comparable: Multiple Compression Can Be Severe'
    body: >-
      Fastly IPO at 25x NTM Revenue compressed to 6x after growth decelerated from 44% to 20%. Applying the same
      compression to Vercel: 27x to 10x on $400M ARR = $4B — a 57% loss on Series F entry. This is the tail risk that
      the 20% bear case probability captures. Growth must be protected at all costs.
    claimRefs:
      - CV018
      - CV007
  - id: KCV003
    type: recommendation
    title: 'Conditional Pass: Request 10-15% Discount and Financial Disclosures'
    body: >-
      CONDITIONAL PASS at $9.3B. The investment is acceptable at the Series F price given the growth profile and
      framework moat, but we recommend: (1) requesting NRR and gross margin disclosure before commitment; (2) attempting
      a 10-15% price reduction to $8-8.5B which would increase expected return from 1.6x to 1.8x; (3) setting clear
      thesis-break monitoring triggers focused on Cloudflare enterprise wins and Next.js community health.
    claimRefs:
      - CV026
      - CV016
      - CV027
