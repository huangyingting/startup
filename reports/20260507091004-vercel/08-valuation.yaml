sections:
  - id: SV_VALUATION_OVERVIEW
    title: Valuation Context and Methodology
    order: 1
    body: >-
      Vercel's $9.3B Series F valuation (May 2024) implies approximately 27x forward ARR based on Sacra's estimate of
      $340M 2026 ARR. This multiple must be assessed against three benchmarks: (1) comparable public company multiples,
      (2) BVP hypergrowth SaaS benchmarks for companies growing >60% YoY, and (3) developer infrastructure M&A
      transaction precedents.


      On the first benchmark, public comparables trade at significantly lower multiples: Cloudflare at ~21x (28%
      growth), Datadog at ~19x (22% growth), MongoDB at ~13x (14% growth). However, these companies are growing at
      14-28% vs. Vercel's 82% — applying a growth-adjusted multiple (PEG-equivalent analysis), Vercel at 27x on 82%
      growth implies a multiple-to-growth ratio of 0.33 vs. Cloudflare at 0.75. On this basis, Vercel is actually
      cheaper on a growth-adjusted basis.


      On the second benchmark, BVP State of the Cloud 2025 confirms top-quartile SaaS companies growing >60% supported
      25-35x ARR multiples in 2025. Vercel at 27x is firmly in the acceptable range for its growth profile.


      On the third benchmark, M&A transactions average 14-18x ARR for developer tools (HashiCorp IBM at 14x, developer
      tool strategic averages at 18x), making an IPO exit clearly preferable to acquisition. The IPO pathway is the
      correct frame for Series F exit planning.
    tableRefs:
      - TV001
      - TV006
    figureRefs:
      - FV001
  - id: SV_COMPARABLES
    title: Comparable Company Analysis
    order: 2
    body: >-
      The most relevant public comparable is Cloudflare (NET), which is the closest structural peer: developer-first
      infrastructure company, CDN and compute at the edge, similar enterprise + developer GTM motion. Cloudflare trades
      at ~21x NTM Revenue with 28% growth and 117% NRR. Fastly (FSLY) is a cautionary comparable: priced at 25x NTM
      Revenue at IPO, compressed to 6x after growth decelerated from 44% to 20%. Datadog and MongoDB provide SaaS
      infrastructure benchmarks.


      Adjusting Cloudflare's multiple for Vercel's superior growth (82% vs. 28%) using a PEG-equivalent approach: 21x ×
      (82/28) = ~62x implied, which is too high. A more conservative approach using the BVP hypergrowth premium (25-35x
      for >60% growth) and AI-native premium (15-25% premium to non-AI peers in 2026) yields a fair value range of
      24-30x ARR, placing Vercel at $8.2-10.2B — consistent with the $9.3B Series F.


      The Fastly cautionary example is the critical risk data point: if Vercel's growth decelerates sharply post-IPO
      (from 82% to <30%), multiple could compress to 10-12x, implying IPO value of $3.4-4.1B — a 55-63% markdown from
      Series F. This is the primary risk embedded in the Series F price.
    tableRefs:
      - TV002
    figureRefs:
      - FV002
  - id: SV_SCENARIOS
    title: 'Scenario Analysis: Bull, Base, and Bear'
    order: 3
    body: >-
      Bull case ($14-16B IPO, 1.5-1.7x return): Vercel sustains 75-80% growth to 2027, v0 reaches $150M ARR, enterprise
      NRR disclosed at 120%+, and IPO in favorable 2027 market at 25-28x forward ARR on $560M 2027 ARR. Key conditions:
      v0 conversion success, no Cloudflare enterprise disruption, and intact developer community trust.


      Base case ($11-13B IPO, 1.2-1.4x return): Vercel maintains 60-65% growth to 2027, v0 reaches $60-80M ARR, NRR at
      115%, IPO in 2027 at 22-24x on $480M ARR. Reasonable assumption given current trajectory.


      Bear case ($6-7.5B IPO, 0.65-0.8x return): Vercel growth decelerates to 30-35% by 2027 due to Cloudflare
      competition and billing controversy-driven churn; v0 underperforms ($20-30M ARR); NRR below 110%; IPO at 15-17x on
      $420M ARR. Recovery of principal but loss of time value.


      Probability-weighted expected return (35% bull × 2.5x + 45% base × 1.4x + 20% bear × 0.75x) = ~1.6x. This is
      acceptable but the margin of safety is limited at the Series F price. A 10-15% discount to $8-8.5B would increase
      the expected return to ~1.8x with materially less downside.
    tableRefs:
      - TV003
    figureRefs:
      - FV003
  - id: SV_THESIS
    title: Investment Thesis and Anti-Thesis
    order: 4
    body: >-
      Investment thesis: Vercel has built the dominant position in an emerging category — the Frontend Cloud — that is
      becoming the default deployment layer for AI-generated web applications. The AI deployment flywheel (30% of all
      Vercel deployments are AI-generated) creates organic demand that competitors cannot easily replicate. Next.js
      stewardship (52.9% meta-framework market) creates enterprise retention and pricing power. v0 as an AI-native
      development platform extends the moat to the pre-deployment phase.


      The anti-thesis: Cloudflare's infrastructure ownership advantage creates a structural margin and performance gap
      that will become more visible as edge computing matures. Vercel's AWS dependency means it will always have higher
      infrastructure costs. The CEO key-person risk and community trust vulnerability are structural weaknesses. The
      series of adverse events (breach, billing controversy, CEO controversy) in 2024-2026 suggests operational
      fragility at the current growth pace.


      Net assessment: The thesis is stronger than the anti-thesis at current growth rates, but the margin of safety at
      27x ARR is thin. This is a high-conviction bet on sustained hypergrowth and v0 monetization success.
    tableRefs:
      - TV004
    figureRefs:
      - FV004
  - id: SV_RECOMMENDATION
    title: Recommendation and Final Diligence Asks
    order: 5
    body: >-
      RECOMMENDATION: CONDITIONAL PASS at $9.3B Series F.


      The investment case is supported by: (1) 82% YoY growth at $340M ARR scale — one of the highest growth rates in
      developer infrastructure; (2) framework moat through Next.js and Nuxt.js stewardship; (3) v0 optionality with 3.5M
      users; (4) GIC sovereign wealth strategic validation; (5) IPO liquidity pathway within 18-24 months.


      The investment case is conditional on: (1) NRR confirmed at 115%+ in due diligence; (2) gross margin confirmed at
      68%+ (consistent with peer benchmarks); (3) cyber insurance status post-April 2026 breach; (4) EU AI Act
      compliance roadmap for v0; (5) enterprise customer concentration below 25% in top-10.


      If NRR is below 110% or gross margin below 65%, the Series F price is difficult to justify relative to
      Cloudflare/Datadog comparables and we would recommend passing or requesting a 15-20% price reduction.


      Thesis-break and kill triggers: ARR growth below 30% for two consecutive quarters; Cloudflare successful
      enterprise customer acquisition from Vercel; Next.js community governance crisis; or EU AI Act enforcement action
      against v0. Risk rating: MEDIUM-HIGH.
    tableRefs:
      - TV005
