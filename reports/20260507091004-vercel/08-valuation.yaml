chapter:
  number: 8
  title: Valuation
  summary: >-
    Vercel's $9.3B Series F valuation implies approximately 27x forward ARR ($340M estimated) — a meaningful premium to
    comparable public SaaS peers. Cloudflare trades at ~20-25x ARR; Datadog at ~18-22x; MongoDB at ~12-15x. The premium
    is partially justified by Vercel's 82% YoY growth (vs. comparables growing 20-30%) and the AI tailwind from v0 (3.5M
    users) and AI-generated deployments (30% of all deployments). However, the premium also reflects late-stage private
    market optimism that may not fully translate to public markets.


    Our base case valuation is $8.5-10.5B, implying the Series F is fairly priced in an optimistic scenario. The bull
    case ($14-16B) requires v0 to become a $200M+ ARR product, sustained 70%+ growth, and a favorable IPO market (25-30x
    ARR multiples). The bear case ($4.5-6B) reflects multiple compression to 15x ARR on growth deceleration below 40%.


    Recommendation: CONDITIONAL PASS. At $9.3B, the investment is priced for significant continued outperformance. The
    risk-adjusted entry point is acceptable given the GIC sovereign wealth investment and framework moat, but the margin
    of safety is thin. The IPO provides an exit within 18-24 months. Key diligence asks: NRR, gross margin, enterprise
    ACV, and cyber insurance status post-breach. A 10-15% price reduction in current round would improve risk-adjusted
    return materially.
