summary:
  headline: >
    Vercel is the dominant Frontend Cloud with genuine competitive moats through Next.js stewardship and the AI
    deployment flywheel. At $9.3B (27x ARR), the valuation is fair on a growth-adjusted basis but thin on margin of
    safety — CONDITIONAL PASS pending NRR and gross margin disclosure.
