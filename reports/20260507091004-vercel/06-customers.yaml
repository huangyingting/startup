callouts:
- id: KCU001
  type: keyFinding
  title: Blue-Chip Enterprise Customer Roster Validates Production-Scale Platform
  body: Vercel has confirmed production deployments at Walmart, AT&T, OpenAI, Anthropic, WPP, Nike, Target, Hulu, PayPal, HashiCorp, GitHub, and Under Armour. These are not pilots — they are multi-year architectural commitments that represent high switching costs and durable ARR. The roster spans retail, media, telecom, AI, fintech, and developer tools.
  claimRefs:
  - CU005
  - CU006
  - CU007
  - CU009
  - CU023
- id: KCU002
  type: risk
  title: CEO Controversy and Pricing Issues Create Community Trust Risk
  body: The September 2025 CEO political controversy and the $96K billing incident have elevated community trust risk. Developer trust in Vercel is partly trust in its founder — and disruption to the organic adoption flywheel could materially impact the zero-CAC developer acquisition model that underpins enterprise pipeline.
  claimRefs:
  - CU012
  - CU013
  - CU033
- id: KCU003
  type: opportunity
  title: AI Agent Deployments Open Structurally New Growth Category
  body: '30% of Vercel deployments being AI-generated marks a paradigm shift: autonomous AI systems are becoming Vercel customers. This creates a growth vector that is decoupled from human developer headcount growth — AI systems can deploy at rates orders of magnitude faster than human developers, potentially creating non-linear usage growth.'
  claimRefs:
  - CU011
  - CU034
  - CU030
