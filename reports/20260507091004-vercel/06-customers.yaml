chapter:
  number: 6
  title: Customers
  summary: 'Vercel''s customer base spans a four-tier pyramid: Hobby (millions of free developers), Pro (individual developers and small teams at $20/month), Teams (collaborative teams at $20/seat/month), and Enterprise (custom contracts with Fortune 500 organizations). The product-led growth motion converts free Hobby developers into paying customers via platform utility — as projects scale, teams upgrade to Teams or Enterprise to unlock collaboration features, access controls, and SLAs. CEO Rauch confirmed 50%+ of revenue from Teams and Enterprise as of September 2025.


    Named enterprise customers include OpenAI, Anthropic, WPP, PayPal, AT&T, Hulu, Nike, Target, Walmart, Under Armour, HashiCorp, and GitHub. These customers are production deployments, not pilots — confirmed through case studies and conference presentations. Walmart rebuilt its next-gen storefront on Next.js/Vercel; AT&T implemented composable architecture; WPP uses Vercel for digital marketing platform infrastructure. The Fortune 500 penetration is significant but the exact percentage of Fortune 500 using Vercel is not publicly disclosed.


    v0 (3.5M unique users) represents a new AI-native customer segment that is emerging from the developer tool space. 30% of Vercel deployments are now AI agent-generated, indicating that the customer base is expanding beyond traditional human developers to include autonomous AI coding agents as de facto ''customers.'' This is a structurally novel dynamic in developer infrastructure that could significantly expand the platform''s usage velocity.


    Customer retention and NRR are not publicly disclosed. Adverse signals include: (1) pricing controversy-driven churn from cost-sensitive developers after the $96K billing incident; (2) some reported developer migration after the CEO''s September 2025 political controversy; and (3) competitive pressure from Cloudflare Pages, which offers a compelling free tier. Overall, the enterprise-heavy revenue mix and multi-year contracts suggest retention is structurally strong.'
