      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              可用的市场规模口径很多，方法和置信度差异很大。Jamstack / 静态托管市场被引用为到 2026 达 $46B；但这个口径混合了 CDN、边缘计算、静态托管和相邻工具，可能高估 Vercel
              的直接可服务边界。具体到静态托管细分（Vercel 核心），CAGR 为 19.3%。一个更保守的开发者中心前端 PaaS SAM 估计是到 2026 达 $5–10B，自下而上推导：全球约 11 million
              React/Next.js 开发者 × $240 平均年等效支出 = ~$2.6B 直接开发者 SAM，再叠加企业席位定价和 AI 产品附加销售，放大到 $5–10B。


              Vercel 当前 ARR 约 $340M，占 $215B PaaS 市场约 0.16%，在第三方估计的全球 PaaS 中约 0.047%——说明渗透空间仍大。Vercel 被 Gartner Cloud
              Application Platforms Magic Quadrant 评为 Visionary，为其市场定位提供分析师验证。考虑到 DevOps 市场与其共享 CI/CD
              和部署基础设施特征，$14.95–18.77B（2025–2026，25.6% CAGR）的 DevOps 市场是估值比较最相关的同类市场。
