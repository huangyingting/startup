            body: >-
              Guillermo Rauch 可以说是开发者基础设施领域集中度最高的关键人物风险。他同时是：（1）Vercel 创始人兼 CEO；（2）Next.js
              创建者及其最主要的外部倡导者；（3）公司在开发者社区中的技术声音；（4）Vercel AI 愿景（v0、AI SDK、AI-native web）的公众面孔。公司没有公开披露接班计划。2025 年 9
