      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Guillermo Rauch（1990 出生于 Lanús, Argentina）是 Vercel 创始人兼 CEO。他自学编程，创建 Socket.IO 和 Mongoose 后，18 岁持
              O-1「杰出能力」签证迁往 San Francisco。创立 ZEIT 之前，他曾创立 LearnBoost 和 Cloudup（2013 被 Automattic 收购）。他的技术信用横跨
              Socket.IO、Next.js、Mongoose，也被视为全球最有影响力的 JavaScript 生态建设者之一。


              为 AI 规模化建设组建的高管班子（as of 2025）包括 Malte Ubl（CTO）、Jeanne Grosser（COO，前 Stripe Chief Business Officer）、Marten
              Abrahamsen（CFO）、Tom Occhino（CPO）、Keith Messick（CMO）、Aparna Sinha（SVP Product）、Werner Schwock（CAO）和 Talha
              Tariq（CTO Security）。高管团队明显来自企业基础设施龙头（Stripe、HashiCorp、Capital One、IBM）。关键人物风险集中在 Rauch：他的公开身份、开源信用和社区关系，都是
              Vercel 开发者优先品牌的中心。


              董事会构成未完全公开；已知席位包括 CRV（Reid Christian）、GGV Capital（Glenn Solomon）以及 Series F 联合领投方 Accel 和 GIC
              的代表。个人天使投资者包括 React 创建者 Jordan Walke、前 GitHub CEO Nat Friedman、Scale AI CEO Alexandr Wang 和
              JavaScript/Brave CEO Brendan Eich。
