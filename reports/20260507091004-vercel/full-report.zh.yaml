      - number: '7.3'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Vercel 面临多线监管风险。最直接的是面向欧洲企业客户的 GDPR 合规：Vercel 提供 GDPR DPA 和 EU 数据驻留选项，但按客户隔离保障会随套餐层级不同。IAPP
              已指出，云开发者工具正受到更多监管审查；随着 Vercel 扩大 EU 企业业务（GIC 投资后的战略优先级），GDPR 合规标准会被更严格审视。


              EU AI Act（Regulation 2024/1689，2024 年 8 月生效）构成 v0 特有的新兴监管风险。作为拥有 3.5M 用户的代码生成工具，v0 可能会被该法案归类为通用 AI
              系统（GPAI），从而需要透明度文档、能力评估和训练数据披露。GPAI 义务的时间线是法案生效后 12 个月（初始合规截止为 2025 年 8 月），意味着 v0
              可能在技术上已经落入范围。合规成本和文档负担可控，但如果 Vercel 尚未启动合规流程，就会形成执行风险。


              IP 与法律风险：没有披露重大待决诉讼。Next.js 和 Turbopack 采用 MIT 许可证，且无已知 IP 争议。主要法律风险在于潜在社区治理争议：如果 Vercel 被认为以不利于自托管用户的方式，把
              Next.js 开源项目用于商业优势，社区可能反弹。
