      - number: '5.2'
        title: 框架生态：Next.js、Nuxt 与多框架支持
        blocks:
          - type: paragraph
            body: >-
              Vercel 最可防守的竞争资产，是它对 Next.js 的拥有和掌舵。Next.js 是主导 React 元框架，每周下载 9M+、过去 12 个月下载 500M，并占据约 52.9%
              元框架市场。Next.js 采用 MIT 许可，可部署在竞争基础设施上；但 Vercel 持续投资 Next.js 功能（App Router、Server
              Components、ISR、Turbopack），让围绕 Vercel 部署模型优化的新能力先发落地。


              NuxtLabs 收购（July 2025）具有战略转折意义：它让 Vercel 成为 Nuxt.js 核心维护者的雇主，从而同时掌舵领先的 React（Next.js）和
              Vue（Nuxt.js）元框架。再加上支持 SvelteKit、Astro、Remix 和 Gatsby，Vercel 已从 Next.js 优先平台演进为多框架前端云。这一扩张显著拓宽了可服务客户基础，从
              React 开发者扩到整个 JavaScript 生态。


              Turbopack（基于 Rust 的打包器，比 Webpack 快 5-70x）和 ISR（Incremental Static Regeneration）都是 Vercel 自研创新，先在 Next.js
              中发布，之后可能被更广泛采用。这些技术创新会拉动 Next.js 采用，进而推动 Vercel 平台采用——形成复合型技术飞轮。
