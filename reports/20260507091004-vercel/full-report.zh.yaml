  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Vercel 的核心市场是面向前端优化的云应用平台（PaaS）细分：为 React、Next.js、Vue/Nuxt 及相邻框架构建的现代 Web 应用提供云部署、预览环境、全球 CDN / edge
              delivery 和无服务器计算。这个市场落在更大的 $1.13 trillion 云计算生态（2025）之内，但分析上不同于通用 IaaS（AWS EC2、Azure
              VMs）、完整后端计算（Heroku、Railway）和传统托管。


              相邻市场类别对 TAM 建模很关键：（1）web hosting services（$137.7B，2025，12.25%
              CAGR）作为上游类别；（2）PaaS（$215B，2025）作为治理类别；（3）edge computing（$21.4B，2025，28% CAGR）作为基础设施使能层；（4）developer
              tools（$8.8B，2025，16.2% CAGR）作为开发者支出的可比同类。全球 IaaS 市场由 AWS、Azure 和 Google Cloud 主导，规模 $171.8B（2024）；它同时是
              Vercel 的结构性成本基础和竞争威胁——Vercel 建在 AWS 之上，但在部署用例上又与 AWS Amplify 竞争。
