              Vercel 的采用曲线在开发者基础设施中属于最强一档。从 2020 年 $5M 年经常性收入（ARR）到 2026 年 2 月 $340M 收入运行率，平台六年约增长 68 倍。Next.js（每周下载
              9M+）是最主要获客渠道——采用 Next.js 的开发者会自然发现 Vercel 是默认部署目标，由此形成零 CAC 线索引擎。


              v0（3.5M 独立用户）提供第二条采用路径，面向开发者，也面向用自然语言生成 UI 组件的非技术设计师。这把 Vercel
              的可服务市场从纯开发者扩到设计师、产品经理和无需写代码也能生成可部署代码的业务用户。AI SDK（每周下载 3M）则吸引构建 AI 应用的开发者，他们的流式界面天然会部署在 Vercel 基础设施上。


              PLG 漏斗机制很清楚：Hobby 开发者在个人项目中体验 Vercel 的部署简单性 → 团队成员一起采用 → 管理层为治理购买 Teams 或 Enterprise。这种自下而上的采用模型让自助层级 CAC
