      - number: '2.3'
        title: 买方分层与采用动态
        blocks:
          - type: paragraph
            body: >
              Vercel 服务三个截然不同的买方群体，采用触发点和价值驱动各异：（1）个人开发者（Hobby/Pro 层）：自助采用，被零配置部署和 Next.js 原生优化吸引；预算负责人是开发者本人，典型花费
              $20–60/month；（2）创业公司 / SMB 团队（Team 层）：从个人采用做 PLG 扩张，由 VP Engineering 批准，$100–500/month；（3）企业（Enterprise
              层）：采购牵头，要求安全与合规、SSO/SLA，$50,000–500,000+ annually。


              React 在开发者生态中的强势位置（39–45% 使用率，11M+ 网站）创造了巨大的自然 Next.js 采用基础。Vercel 的开源 Next.js 生态支撑免费转付费——500M
              年下载量先建立开发者熟悉度，再转化为平台订阅。企业采用被无头商务和可组合架构转型推快：Nike、Target、Walmart 在 Vercel 上部署 Next.js，代表可复制的企业用例。v0 AI 工具
              50%+ 收入来自企业账户，说明 Vercel 已成功切入 AI 开发者栈的企业端。
