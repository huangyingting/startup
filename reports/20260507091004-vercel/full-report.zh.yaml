  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与核心基础设施
        blocks:
          - type: paragraph
            body: >-
              Vercel 平台是一个全栈前端云，建在三层架构上：（1）连接 Git 的 CI/CD 流水线，开发者 push 后自动构建并打包应用；（2）覆盖 100+ PoPs
              的全球边缘网络，用于服务静态资产、边缘函数和无服务器计算；（3）存储层（Blob、KV、Postgres），为 Next.js 应用提供有状态后端。部署流程完全自动化：开发者把代码 push 到
              GitHub、GitLab 或 Bitbucket，Vercel webhook 触发构建，生成的产物随后原子化部署到所有 edge PoPs，失败时自动回滚。


              平台关键架构创新是 Fluid Compute（launched 2025），它用并发实例模型替代传统按调用隔离的无服务器架构。不同于 AWS Lambda 为每个请求启动新容器，Fluid Compute
              允许一个温热实例处理多个并发请求，大幅降低冷启动开销和单次请求成本。它直击无服务器计算的核心批评（冷启动延迟和成本不可预测），同时保留无服务器部署的运营简单性。


              Vercel 基础设施跑在 AWS 上，上面叠加 Vercel 自有软件抽象层。这意味着 Vercel 是 AWS 之上的基础设施服务层；AWS 提供可靠性和全球覆盖，但也制造成本结构依赖。Cloudflare
              Workers 跑在 Cloudflare 自有网络上，冷启动为 8-15ms，Vercel 为 30-35ms；这是一个性能差距，Fluid Compute 试图通过保留温热实例来弥合。
