      - number: '4.3'
        title: 单位经济与效率指标
        blocks:
          - type: paragraph
            body: >-
              Vercel 公开可得的单位经济数据有限，但现有信号偏正面。按约 897 employees（March 2026）和 $340M ARR 运行率计算，Vercel 达到约 $379K ARR per
              full-time employee——高于成长阶段公司 $300K ARR/FTE 的 SaaS 前四分位 benchmark（BVP State of Cloud 2025）。考虑到 Vercel 仍在以
              82% YoY 增长，这种生产率效率值得注意；很多公司在这个阶段会牺牲效率换增长。


              毛利率估计带有推测性：Vercel 基础设施跑在 AWS 上（叠加 IaaS 转嫁成本），平台类业务的利润率通常会比纯软件更低。参考对象 Cloudflare（可比边缘基础设施公司）报告毛利率约
              76%。Vercel 的毛利率可能在 70-78% 区间，取决于收入来自 Hobby-tier deployments（补贴 compute，低毛利）还是 Enterprise
              subscriptions（毛利更高、更可预测）的比例。Rule of 40 指标——增长率 + 利润率——仅凭 82% 收入增长就已满足，说明即使未披露盈利能力，Vercel 在这个 benchmark 上也是
              top-tier performer。


              企业客户获客成本和回本周期未披露。PLG motion（free Hobby → paid Teams）天然降低漏斗顶部 CAC，相比纯直销更有优势。Vercel 借助
              Next.js（trailing-12-month downloads 500M）形成开发者心智，构成自然获客引擎；这可能让 Vercel 的 CAC 指标优于没有开源光环的 SaaS peers。开源采用带来的
              GTM 效率，是结构性优势；投资者已在 HashiCorp、Elastic、MongoDB 等可比开发者主导公司上认可这一点，并给出 premium multiples。
