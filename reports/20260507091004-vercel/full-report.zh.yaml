  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Vercel 在开发者基础设施里跑出了最快的 ARR 扩张轨迹之一：从 2020 的 $5M 增至 February 2026 的 $340M 运行率——六年约 68x。绝对增量还在加速：2022-2023 新增
              $65M（$51M → $86M ARR），2024 新增 $58M（$86M → $144M），随后从 end-2024 到 February 2026 的 12 months 内新增惊人的
              $196M（$144M → $340M 运行率）。Series F 交割（September 2025）时同比增速为 82%，远高于后期私营公司 SaaS 前四分位 benchmark 的 50%。


              2025-2026 的收入加速来自三个主要驱动：（1）组织承诺采用基于 Next.js 的架构后，企业先落地再扩张的动力释放；（2）AI 开发者工具浪潮推高 Vercel AI SDK 和 v0
              产品需求；（3）平台从 Jamstack-only 转向全栈 AI 应用部署。CEO Guillermo Rauch 确认，超过 50% revenue 现在来自 Teams 和 Enterprise
              tiers，意味着自助 Hobby 飞轮已经能把用户大规模转化为付费企业客户——这是一套单位经济有利的 PLG motion。
            claimRefs: []
