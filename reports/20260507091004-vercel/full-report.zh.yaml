          - type: paragraph
            body: >-
              Vercel 的留存结构有利，但也有需要监测的具体反向信号。正面因素包括：年度企业合同、多年架构承诺（从 Vercel 迁出需要改框架），以及 G2 4.6/5 分、500+
              条评价，这些都指向较强的结构性留存。TrustRadius 上给 Vercel 评分的企业客户确认其 SOC2/GDPR 合规，并把价格可预测性列为主要担忧——不是平台可靠性或功能缺口。


              反向信号包括：（1）2025 年 9 月 CEO 政治贴文争议（与 Netanyahu
              合影）引发开发者社区显著反弹和迁移威胁；该事件导致的实际企业流失尚无公开量化，但对开发者社区信任的声誉伤害真实且仍在持续。（2）Cloudflare 证实有开发者因定价和性能从 Vercel
              迁出，验证了竞争性流失风险。（3）$96K 账单事件引发社区呼吁转向自托管替代方案。净留存率（NRR）和客户数流失率未披露；结构性留存驱动因素与这些反向信号并存，形成一幅更复杂的留存图景，需要尽调数据才能判断。


              CEO 争议需要单独关注：Guillermo Rauch 是 Vercel 和 Next.js 的创始人，也是两者的公众面孔。开发者对平台的信任，部分就是对创始人的信任。任何持续的社区反弹，都可能打断
              Vercel 零 CAC 开发者获客所依赖的自然采用飞轮——这很可能是未披露指标中最有价值的一项。
