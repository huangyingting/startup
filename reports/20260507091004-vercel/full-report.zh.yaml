      - number: '1.4'
        title: 规模、增长指标与封面 KPI
        blocks:
          - type: paragraph
            body: >
              Vercel 的 ARR 曲线很陡：$100M（early 2024）、~$200M（mid-2025）、$340M 运行率（February 2026）——两年内 ARR 约 3.4x。Series F
              交割时，公司披露收入同比增长 82%。平台部署中约 30% 现在来自 AI 智能体，而不是人类；管理层预计这会成为继续加速的结构性需求驱动。Vercel 用户基数在截至 September 2025 的 12
              months 内翻倍。


              v0 已达 3.5M 独立用户，企业账户贡献超过 50% 的 v0 收入——这对一个起初像开发者玩具的产品，是有意义的变现信号。AI SDK 报告每周下载 3M；Next.js 在截至 September
              2025 的 trailing 12 months 内下载量超过 500M。员工数从 ~550（2025）增至约 897（March 2026），说明即使宏观环境更挑剔，公司仍在继续招聘。Vercel
              未披露毛利率、EBITDA 或盈利状态。
