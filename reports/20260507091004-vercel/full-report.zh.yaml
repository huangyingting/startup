      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: >-
              最相关的上市可比公司是 Cloudflare（NET），它是结构上最接近的同业：开发者优先的基础设施公司、边缘 CDN 与计算、相似的企业 + 开发者 GTM 路径。Cloudflare 以约 21x NTM
              Revenue 交易，增速 28%，NRR 为 117%。Fastly（FSLY）是警示性可比：IPO 时定价为 25x NTM Revenue，在增长从 44% 降至 20% 后压缩到 6x。Datadog 和
              MongoDB 提供 SaaS 基础设施基准。


              用 PEG 等价方法按 Vercel 更高增速（82% vs. 28%）调整 Cloudflare 倍数：21x × (82/28) = 隐含约 62x，显然过高。更保守的方法是采用 BVP 高增长溢价（>60%
              增长对应 25-35x）和 AI 原生溢价（2026 年相对非 AI 同业溢价 15-25%），得到 24-30x ARR 的公允价值区间，对应 Vercel $8.2-10.2B——与 $9.3B Series
              F 一致。


              Fastly 的警示案例是关键风险数据点：如果 Vercel IPO 后增长急剧降速（从 82% 降至 <30%），倍数可能压缩到 10-12x，对应 IPO 价值 $3.4-4.1B——较 Series F
              下调 55-63%。这是 Series F 价格里嵌入的主要风险。
            claimRefs: []
