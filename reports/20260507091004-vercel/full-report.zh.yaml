      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              2026 年 4 月的供应链安全事件，是 Vercel 历史上最重大的运营风险事件。攻击者利用 Context.ai 开发者工具集成投放 Lumma Stealer 恶意软件，并带来 $2M
              赎金要求。Vercel 拒绝付款并在 48 小时内修补，这一响应是合适的；但事件暴露出 Vercel AI-first 策略中的结构性脆弱点：与第三方 AI 工具（v0、Context.ai 和数十个
              marketplace 集成）深度集成，会随着 AI 工具更深嵌入开发工作流而持续扩大攻击面。


              账单透明度问题（2024 年 $96K 事件）属于另一类运营风险：客户体验和信任。开发者社区高度互联，事件会通过 Hacker News 和 Twitter
              快速扩散；一次高关注度账单事件造成的声誉伤害，可能远超其实际财务影响。Vercel 已经上线支出上限，但核心的按量计费模型仍会引发可预测性担忧。


              基础设施可靠性风险目前较低——2025-2026 年没有公开披露重大平台宕机。不过，AWS 依赖意味着任何 AWS 区域性宕机都会直接传导到 Vercel 部署，因为 Vercel 不拥有冗余基础设施。比如
              2024 年 6 月 AWS US-EAST-1 事件影响了多个依赖 Vercel 的应用——这是托管基础设施模型内生的风险。
