  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 竞争风险：Cloudflare 和 AWS 替代
        blocks:
          - type: paragraph
            body: >-
              Vercel 面临的最大结构性风险，是被 Cloudflare 竞争性替代。Cloudflare Workers 冷启动 8-15ms，对比 Vercel
              30-35ms；对延迟敏感应用来说，这是显著性能差距。更重要的是，Cloudflare 拥有自己的全球网络基础设施，相比运行在 AWS 上、必须吸收 AWS 出站流量和计算加价的
              Vercel，具备结构性成本优势。Cloudflare Pages 定价激进，并已确认赢得从 Vercel 迁出的开发者，尤其是成本敏感的自助开发者。


              AWS 依赖带来双重风险：Vercel 既是 AWS 客户，也是 AWS Amplify 的竞争对手。这意味着 Amazon 可以通过账单数据看到 Vercel
              的使用模式、基础设施拓扑和客户需求——这些情报理论上可以反哺 Amplify 的产品和定价策略。如果 AWS 决定用定价权压缩 Vercel 利润率，或把企业客户导向 Amplify，Vercel
              的回旋空间有限。


              收购 NuxtLabs（以及随之获得 Vue.js 生态控制力）在一定程度上缓解了框架集中度风险，让 Vercel 不再只押 Next.js/React。不过，核心企业价值主张仍然高度依赖 Next.js，也就与
              React 生态健康度相关——根据 State of JS 2025，随着开发者探索 Astro、SvelteKit 和 Remix，React 的喜爱度得分正在下降。
