      - number: '1.5'
        title: 关键里程碑与反向事件
        blocks:
          - type: paragraph
            body: >
              Vercel 的里程碑横跨创立、融资、产品发布、收购和显著反向事件。2021 收购 Turborepo，让 Vercel 成为 monorepo 构建平台首选。2023 推出 v0，把外界认知从托管服务商推向
              AI 开发者工具平台。NuxtLabs 于 July 2025 被收购，把 Vercel 的框架掌舵权延伸到 Vue/Nuxt，降低对 Next.js 单一生态的依赖，也释放框架多元化信号。


              2025–2026 发生两起重大反向事件：（1）CEO Guillermo Rauch 在 September 2025 与 Israeli Prime Minister Netanyahu
              会面，引发开发者社区明显反弹，部分用户公开声明有迁移意向；（2）April 19, 2026，Vercel 披露一起安全事件：一名员工的 Google Workspace 账户被攻破，入口是第三方 AI 工具
              Context.ai（与 Lumma Stealer malware 相关），威胁行为者据称索要 $2M 赎金换取被盗数据。截至 May
              2026，两起事件尚未对披露的收入增长造成实质损害，但对一个依赖开发者社区信任的平台，声誉风险仍在。
