      - number: '5.3'
        title: AI 产品套件：v0 与 AI SDK
        blocks:
          - type: paragraph
            body: >-
              Vercel 的 AI 产品层代表公司押注成为 AI 原生 Web 应用的基础设施层。套件由两个主要产品组成：v0（text-to-UI）和 Vercel AI SDK。


              v0 于 October 2023 推出，允许开发者和设计师用自然语言描述生成 React/Next.js 组件。系统通过 Vercel AI SDK 调用前沿
              LLM（GPT-4o、Claude）生成组件代码，并借助 Tremor 收购（January 2025）提升组件质量和设计一致性。凭借 3.5M 独立用户，v0 已获得显著采用，使 Vercel 与 GitHub
              Copilot、Cursor、Bolt.new 一同进入 AI 原生开发工具市场。关键在于，所有 v0 生成的组件都天然部署到 Vercel，形成从 AI 工具使用到平台订阅的闭环获客漏斗。


              Vercel AI SDK（每周下载 3M）把 LLM provider integrations（OpenAI、Anthropic、Google、Mistral）抽象成统一的 TypeScript 流式
              API。它把 Vercel 定位为基于 Next.js 构建 AI 应用的基础设施胶水，让流式聊天界面、tool calling 和结构化输出以极少样板代码落地。SDK 快速采用（增长最快的 OSS AI
              开发者工具包）是未来 Vercel 平台部署的领先指标，因为 AI 驱动应用正在走向生产环境。CEO Rauch 指出，early 2026 Vercel 部署中 30% 由 AI 智能体生成，验证了 AI
              到平台管道假说。
