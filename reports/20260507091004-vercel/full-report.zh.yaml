chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Vercel 是一家总部位于 San Francisco, CA 的美国云应用公司，Guillermo Rauch 于 2015 以 ZEIT 名义创立，并在 April 21, 2020 更名为
              Vercel。公司的使命是「让全世界都能发布最好的产品」——最初指向的是把 Amazon、Google、Facebook 等科技巨头内部才有的前端部署基础设施民主化。这一使命已经延伸到「AI Cloud」：一个为
              AI 原生应用和智能体专门打造的平台。


              Vercel 的商业模式是免费增值到企业：个人开发者使用免费的 Hobby 层，再转为 Pro（$20/month）、协作团队的 Team 计划，以及带专用基础设施、SSO、正常运行时间 SLA 和直销支持的
              Enterprise 合同。公司还通过 v0 AI 工具变现（Teams/Enterprise 账户现在贡献超过 50% 的 v0 收入）和 AI SDK 生态变现。Next.js
              虽然开源，但会制造平台亲和力：团队用 Next.js 开发时，自然会转向 Vercel 做优化部署。这个「框架到云」飞轮，是 Vercel GTM 护城河的核心。
