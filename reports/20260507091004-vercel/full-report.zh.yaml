appendices:
  - id: A
    title: Vercel 融资与估值历史
    blocks:
      - type: paragraph
        title: null
        body: >
          Vercel 估值轨迹：$21M Series A (2019) → ZIRP 峰值时 $2.5B Series C (2021) → $2.5B Series D (2022, 持平) → $9.3B Series F
          (May 2024)。Series D 持平，反映 2022 SaaS 下行；Series D 到 Series F 估值抬升 3.7x，既来自 ARR 增长（2024 从 ~$100M 到 ~$187M），也来自开发者
          AI 工具获得投资者溢价后估值倍数重新扩张。 累计融资：$573M。$250M Series F 可提供约 12-24 个月现金跑道，具体取决于 Fluid Compute 投入节奏、v0 扩张和国际企业销售。
        claimRefs: []
  - id: B
    title: Next.js 与框架生态策略
    blocks:
      - type: paragraph
        title: null
        body: >
          Vercel 的框架主导策略，是其竞争护城河的主要来源。Next.js（由 Guillermo Rauch 创建，MIT 许可）占据元框架市场 52.9%，也是 React 企业应用的默认选择。Vercel 优化
          Next.js App Router 和边缘部署，让它们在 Vercel Platform 上跑得最好，从而把框架性能和平台收入绑定起来。NuxtLabs 收购 (2025) 把这套策略延伸到 Vue.js
          生态。Turbopack（基于 Rust 的构建工具）和 AI SDK（60K+ GitHub stars）进一步加固开发者工具链锁定。需要持续盯住的治理风险，是社区认为 Vercel 为自有平台优化
          Next.js，牺牲自托管体验。
        claimRefs: []
  - id: C
    title: v0 与 AI 平台可选性
    blocks:
      - type: paragraph
        title: null
        body: >
          v0（2023 推出，2024 正式可用）是 Vercel 在核心部署平台之外最重要的战略押注。该工具借助 Vercel AI SDK 调用 Claude（Anthropic）和 GPT-4（OpenAI），用自然语言
          prompt 生成全栈 Web 应用代码。v0 拥有 3.5M 注册用户，并接入 Vercel 部署流程，创造新的漏斗入口：AI 生成代码 → 代码部署到 Vercel → 部署转化为付费客户。如果 v0 在 Pro
          $20/month 上实现 3-5% 付费转化，当前 ARR 贡献约为 $25-42M。到 2027 做到 $100-200M ARR，需要用户持续增长、转化率继续提升。April 2026 经由 Context.ai
          发生的供应链安全事件，凸显深度集成第三方 AI 工具的安全风险。
        claimRefs: []
