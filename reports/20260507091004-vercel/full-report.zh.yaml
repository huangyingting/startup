      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Vercel 已通过六轮主要融资加一笔 $300M 老股要约累计融资约 $863M。融资轨迹分三段：（1）开发者平台验证（Series A–B，2020，合计
              $61M）；（2）高速增长期的基础设施建设（Series C–D，2021，合计 $252M）；（3）AI Cloud 企业化转型（Series E–F，2024–2025，合计 $550M）。


              September 2025 的 Series F（$300M，投后 $9.3B）由 Accel 和 GIC 联合领投——GIC 是 Singapore
              的主权财富基金，带来全球多元化资本和企业客户可信度。新投资方 BlackRock、Khosla Ventures、General Catalyst、StepStone、Schroders、Adams Street
              Partners 入局，现有投资方 GV、Notable Capital、Salesforce Ventures、Tiger Global 跟投。同期约 $300M
              的老股要约面向早期投资者和员工，说明公司在管理股权结构表，也在为 IPO 前流动性做工程化安排。关键个人天使投资者同时带来技术验证和网络效应。
