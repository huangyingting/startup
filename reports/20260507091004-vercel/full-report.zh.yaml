  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与方法
        blocks:
          - type: paragraph
            body: >-
              Vercel 的 $9.3B Series F 估值（May 2024），基于 Sacra 对 2026 年 $340M ARR 的估计，约等于 27x 远期
              ARR。这个倍数需要放在三个基准下评估：（1）可比上市公司倍数；（2）BVP 针对增速 >60% YoY 公司的高增长 SaaS 基准；（3）开发者基础设施 M&A 交易先例。


              第一项基准下，上市可比公司的交易倍数明显更低：Cloudflare 约 21x（增长 28%）、Datadog 约 19x（增长 22%）、MongoDB 约 13x（增长 14%）。但这些公司的增速只有
              14-28%，而 Vercel 是 82%——如果采用增长调整倍数（PEG 等价分析），Vercel 82% 增长对应 27x，倍数 / 增长比为 0.33，而 Cloudflare 为
              0.75。按这个口径，Vercel 在增长调整后反而更便宜。


              第二项基准下，BVP State of the Cloud 2025 确认，2025 年增速 >60% 的前四分位 SaaS 公司可以支撑 25-35x ARR 倍数。Vercel 的 27x
              明确落在其增长画像的可接受区间。


              第三项基准下，开发者工具 M&A 交易平均为 14-18x ARR（HashiCorp 被 IBM 收购为 14x，开发者工具战略交易均值为 18x），因此 IPO 退出显然优于被收购。Series F
              退出规划应以 IPO 路径为正确框架。
            claimRefs: []
