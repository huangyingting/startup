      - number: '8.3'
        title: 情景分析：乐观、基准、悲观
        blocks:
          - type: paragraph
            body: >-
              乐观情景（$14-16B IPO，1.5-1.7x 回报）：Vercel 到 2027 年维持 75-80% 增长，v0 达到 $150M ARR，企业 NRR 披露为 120%+，并在有利的 2027
              年市场中以 25-28x 远期 ARR、基于 $560M 2027 ARR IPO。关键条件：v0 转化成功、没有 Cloudflare 企业端扰动、开发者社区信任保持完整。


              基准情景（$11-13B IPO，1.2-1.4x 回报）：Vercel 到 2027 年维持 60-65% 增长，v0 达到 $60-80M ARR，NRR 为 115%，2027 年以 22-24x、基于
              $480M ARR IPO。基于当前轨迹，这是合理假设。


              悲观情景（$6-7.5B IPO，0.65-0.8x 回报）：受 Cloudflare 竞争和账单争议驱动的流失影响，Vercel 增长到 2027 年降至 30-35%；v0 表现不及预期（$20-30M
              ARR）；NRR 低于 110%；以 15-17x、基于 $420M ARR IPO。本金可回收，但损失时间价值。


              概率加权预期回报（35% 乐观 × 2.5x + 45% 基准 × 1.4x + 20% 悲观 × 0.75x）= 约 1.6x。这个回报可以接受，但 Series F 价格下安全边际有限。如果能以
              $8-8.5B 获得 10-15% 折扣，预期回报可提升至约 1.8x，下行风险也会实质降低。
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV005
              - CV006
              - CV007
      - number: '8.4'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              投资逻辑：Vercel 已在新兴品类 Frontend Cloud 中建立主导地位，而 Frontend Cloud 正在成为 AI 生成 Web 应用的默认部署层。AI 部署飞轮（Vercel 全部部署中
              30% 由 AI 生成）创造出竞争对手难以复制的自然需求。Next.js 主导维护（52.9% 元框架市场）带来企业留存和定价权。v0 作为 AI 原生开发平台，把护城河延伸到部署前阶段。


              反向逻辑：Cloudflare 拥有基础设施的优势，会形成结构性利润率和性能差距，并会随着边缘计算成熟而更显眼。Vercel 依赖 AWS，意味着基础设施成本永远更高。CEO
              关键人物风险和社区信任脆弱性都是结构性弱点。2024-2026 年连续出现反向事件（安全事件、账单争议、CEO 争议），说明当前增长速度下运营韧性不足。


              净评估：在当前增长率下，投资逻辑强于反向逻辑，但 27x ARR 的安全边际很薄。这是一笔高信念赌注，赌持续高增长和 v0 变现成功。
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs: []
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV008
              - CV012
              - CV026
      - number: '8.5'
        title: 建议与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              建议：按 $9.3B Series F 有条件通过。


              投资理由由以下因素支撑：（1）在 $340M ARR 规模上实现 82% YoY 增长——开发者基础设施中最高的一档增速；（2）通过 Next.js 和 Nuxt.js 主导维护形成框架护城河；（3）v0 拥有
              3.5M 用户带来的可选性；（4）GIC 主权财富资金的战略验证；（5）18-24 个月内的 IPO 流动性路径。


              投资理由成立的条件是：（1）尽调确认 NRR 为 115%+；（2）确认毛利率为 68%+（与同业基准一致）；（3）2026 年 4 月安全事件后的网络保险状态；（4）v0 的 EU AI Act
              合规路线图；（5）前 10 大企业客户集中度低于 25%。


              如果 NRR 低于 110%，或毛利率低于 65%，相对 Cloudflare/Datadog 可比公司，Series F 价格就难以自洽，我们会建议放弃，或要求降价 15-20%。


              投资逻辑破裂和退出触发条件：ARR 增速连续两个季度低于 30%；Cloudflare 成功从 Vercel 手中获取企业客户；Next.js 社区治理危机；或 EU AI Act 对 v0
              采取执法行动。风险评级：中高。
            claimRefs: []
          - type: table
            tableRef: TV005
            claimRefs: []
      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 尽管表面溢价，按增长调整后并不贵
            body: >-
              Vercel 以 82% 增长对应 27x ARR，倍数 / 增长比（PEG 等价）为 0.33；Cloudflare 则为 0.75（28% 增长对应 21x）。按这个指标，Vercel
              实际上比最可比的上市同业便宜 55%。Series F 价格反映高增长；风险在增长降速，而不是当前估值过高。
            calloutType: insight
            claimRefs:
              - CV001
              - CV004
              - CV036
          - type: callout
            title: Fastly 警示性可比：倍数压缩可能很严重
            body: >-
              Fastly IPO 时为 25x NTM Revenue，在增长从 44% 降至 20% 后压缩到 6x。对 Vercel 套用同样压缩：27x 降至 10x，基于 $400M ARR = $4B——较
              Series F 入场损失 57%。这就是 20% 悲观情景概率所覆盖的尾部风险。必须不惜代价守住增长。
            calloutType: insight
            claimRefs:
              - CV018
              - CV007
          - type: callout
            title: 有条件通过：要求 10-15% 折扣和财务披露
            body: >-
              按 $9.3B 有条件通过。考虑到增长画像和框架护城河，Series F 价格下投资可以接受，但我们建议：（1）承诺前要求披露 NRR 和毛利率；（2）尝试将价格下调 10-15% 至
              $8-8.5B，这会把预期回报从 1.6x 提升到 1.8x；（3）设置清晰的投资逻辑破裂监测触发点，重点跟踪 Cloudflare 企业客户胜利和 Next.js 社区健康度。
            calloutType: insight
            claimRefs:
              - CV026
              - CV016
              - CV027
