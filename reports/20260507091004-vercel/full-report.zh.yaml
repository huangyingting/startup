      - number: '4.4'
        title: 资本结构与充足性
        blocks:
          - type: paragraph
            body: >-
              Vercel 已在各轮融资中累计获得约 $863M primary capital，若计入 November 2025 secondary tender，总资本接近 $1.16B。September 2025
              Series F（$300M primary）是最大单笔融资，提供了充足现金跑道。再加上 $300M secondary tender 完成员工和早期投资者流动性，截至 early 2026，Vercel
              资本位置稳健。


              Burn rate 未披露。按典型成长阶段基础设施公司烧钱速度（在毛利之上把 revenue 的 20-30% 投入 S&M 和 R&D）估算，Vercel 月 burn 可能在 $10-25M/month。若按
              $25M/month burn，$300M Series F 提供 12 months 现金跑道；若按 $10M/month，则约 30 months。考虑到收入轨迹强劲，如果 82% 增长能在费用 ramp
              前转化为对应客户回款，Vercel 可能正在接近现金流中性。


              投资者基础——Accel、GIC（Singapore sovereign wealth）、Sequoia、Tiger Global、Greenoaks——很适合支撑 IPO process。尤其 GIC
              的主权财富 profile，会给机构投资者带来可信度；他们通常把 SWF participation 视为质量信号。CEO Guillermo Rauch 在 April 2026 表达 IPO
              readiness；公司正评估 2026-2027 window 的公开上市选项。成功 IPO 将为 developer tools space 的收购提供更多资本、流动性和交易货币。
