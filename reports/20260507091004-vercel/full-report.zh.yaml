      - number: '3.2'
        title: 竞争者画像与规模
        blocks:
          - type: paragraph
            body: >
              Netlify 是 Vercel 历史上最直接的竞争对手，也是「JAMstack」类别共同创造者。Netlify 成立于 2014，多轮融资 $212M，并在 Series D（$105M，2021）达到 $2B
              估值。收入在 2024 达 $46.3M（高于 2023 的 $33M），员工约 182 人。Netlify 估计约 40% 同比增速，落后于 Vercel 的 82%，ARR 约小
              7x。核心优势包括丰富的开放插件生态（200+ 社区集成）和 JAMstack 先发品牌认知。September 2025 转向积分制计费，降低了超额费用冲击风险。


              Cloudflare Pages and Workers 背靠 Cloudflare Inc.（NYSE: NET），后者是市值 $25B+、总 ARR $1.6B+ 的上市公司。Pages/Workers
              收入未披露，但 Cloudflare 报告 100K+ 活跃 Workers 客户。结构性优势明显：330+ edge PoPs（vs Vercel 的 100+）、无限免费静态带宽、2-8ms Workers
              冷启动（vs Vercel 约 30-35ms），以及 R2 storage 零出站流量费。Cloudflare 在前端云的弱点是 Next.js SSR/ISR 深度。它在 2025 扩展到 AI
              Gateway、Vectorize（边缘向量数据库）和 D1（边缘 SQLite），说明仍在持续进入 Vercel 腹地。


              AWS Amplify Gen 2 是 Amazon 对前端云的回应，2024 重新发布为 TypeScript-first、code-first 全栈平台，并集成 200+ AWS
              services（Cognito、DynamoDB、Lambda、CDK）。凭借 AWS FedRAMP、HIPAA BAA 和 SOC 2 认证，它是 Vercel
              在合规要求重的垂直行业里最可信的企业竞争者。不过，Amplify 几乎没有独立开发者社区牵引力，相比 Vercel 的零配置体验，普遍被认为更复杂。


              Railway（12.9M 月部署）、Render（固定费率 Heroku 替代方案）和 Fly.io（18+ regions、VM-level control、3M+ apps）都是全栈 PaaS
              平台，并不在企业前端云上与 Vercel 正面对打。它们都没有 Vercel 的 Next.js 集成深度、企业销售打法或 DX 品牌。GitHub Pages 为 1B+ repositories
              提供免费静态托管，但缺少 SSR、无服务器函数、预览部署 URL 和 analytics。
