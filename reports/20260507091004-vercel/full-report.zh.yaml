companyProfile:
  summary: >
    Vercel 是定义市场的前端云，为现代 Web 开发提供部署基础设施、边缘计算、可观测性和 AI 工具。它掌舵 Next.js（由创始人 Guillermo Rauch 创建），构成结构性护城河：元框架市场中 52.9% 运行在
    Next.js 上，为企业客户带来很深的平台粘性。平台每周处理 9M+ 次部署，覆盖免费增值开发者、Pro 团队和企业客户（估计贡献约 40% ARR）。v0 是 AI 原生代码生成工具，用户已达 3.5M，正成为 AI 生成
    Web 应用「部署到 Vercel」的入口。2025 收购 NuxtLabs，把框架掌舵范围延伸到 Vue.js 生态。April 2026 Series F 以 $9.3B 完成，GIC Singapore 为战略投资者；IPO
    预计在 2026-2027。关键风险包括 Cloudflare 竞争压力、AWS 基础设施依赖、CEO 关键人物集中，以及 April 2026 供应链安全事件。
  foundedDate: '2015-01-01'
  founders:
    - name: Guillermo Rauch
      role: CEO 兼联合创始人
      background: >
        阿根廷出生的软件工程师和创业者；Next.js 创建者（使用最广的 React 元框架）；连续创业者（Cloudup 于 2013 被 Automattic 收购）。Rauch 在开发者社区里就是 Vercel
        品牌本人，既是最主要的竞争护城河，也是最主要的关键人物风险。September 2025 的公开争议（与 Netanyahu 合影发帖）引发开发者社区反弹。公司未披露公开接班计划。
      claimRefs: []
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California, USA
  productSummary: >
    Vercel Platform：面向 Next.js、Nuxt、Astro、SvelteKit、Remix 以及 35+ 其他框架的零配置部署。Edge Network 覆盖 100+ 全球 PoPs；Vercel
    Functions（无服务器 + edge）；Vercel KV、Blob、Postgres（存储原语）；Web Analytics 和 Speed Insights（可观测性）。Fluid
    Compute（2025）：边缘原生无服务器运行时，性能对标 Cloudflare Workers。v0：AI 代码生成界面（3.5M 用户、$20/month Pro、Enterprise 定制），生成可一键部署到 Vercel
    的全栈应用代码。AI SDK：面向 LLM 集成的开源 TypeScript 库（60K+ GitHub stars）。Turbopack：基于 Rust 的 Next.js 构建工具（比 Webpack 快
    10x）。NuxtLabs：Vue.js/Nuxt.js 框架掌舵权（2025 收购）。Tremor：React UI 组件库（2024 收购）。
  customerFocus: >
    三个客群：（1）开发者 / 爱好者——免费层、Next.js 原生开发者、OSS 项目；病毒式获客引擎。（2）Pro 团队（$20/user/month）——SMB
    工程团队、创业公司、agency；从免费用户高频转化。（3）企业（定制定价）——Fortune 500 与中型市场公司；年度合同；估计贡献约 40% ARR。典型企业客户包括 Washington Post、Under
    Armour、Porsche、Replit、Loom、HashiCorp。全层级每周部署 9M+ 次。
  businessModel: >
    基于使用量的 SaaS，叠加订阅：Hobby（免费）→ Pro（$20/user/month）→ Enterprise（定制年度合同）。基础设施用量（带宽、计算、存储）在订阅之外计费。v0 增加独立订阅层（Pro
    $20/month、Enterprise 定制）。NRR、毛利率和企业 ACV 未公开披露；开发者基础设施基准显示，可比公司 NRR 115%+、毛利率 68-75%。$300M Series F 弹药为竞争性基础设施和 AI
    产品开发提供投资跑道。
  stage: Late-stage private; pre-IPO; growth-stage; not publicly profitable
