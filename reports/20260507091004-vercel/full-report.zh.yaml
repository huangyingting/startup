      - number: '3.4'
        title: 护城河分析与竞争风险
        blocks:
          - type: paragraph
            body: >
              Vercel 的主要竞争护城河是 Next.js 掌舵权。Next.js 采用 MIT 许可证，但 Vercel 控制路线图、发布节奏和参考基础设施。批评者记录称，Next.js 15.1+ 元数据流式传输在
              Vercel 之外会破坏 SEO，App Router / React Server Component 功能也针对 Vercel
              的无服务器执行模型做了优化。这形成了非合同锁定：客户技术上可以自托管，但每次大版本发布都会增加摩擦。一个 Hacker News 讨论串中，数十名工程师记录了 Next.js
              功能里「隐蔽很深的供应商锁定」，这些功能只有在 Vercel 基础设施上才有效。


              次级护城河包括 DX 品牌领先（开发者推荐的参考平台）、企业集成深度（SSO、SAML、审计日志、SOC 2）、v0 AI 开发者工具飞轮对 AI 原生团队的粘性增强，以及 v0 → Next.js →
              Vercel 部署漏斗的刻意低摩擦。


              主要竞争风险是 Cloudflare 持续扩张。Cloudflare 有资本（上市公司，$1.6B+ ARR）、网络（330+ PoPs）和成本结构（R2 无出站流量费），能在价格上结构性压低 Vercel。如果
              Cloudflare 投资改善基于 Workers 的 Next.js ISR/RSC 支持，护城河会明显变窄。次级风险是框架多元化：Astro、SvelteKit、Remix 和 Nuxt 正在 React
              之外获得采用。React 喜爱度在 2024 到 2025 间从 62% 降到 52%，说明早期框架疲劳已经出现。这个类别里多平台并用较少，但定价冲击、CEO 政治争议等事件会触发迁移评估，并暴露切换摩擦。
            claimRefs: []
          - type: table
            tableRef: TP004
            claimRefs: []
