  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >-
              Vercel 的客户群呈四层金字塔，每层经济特征都不同。底部是 Hobby
              层——数百万免费开发者用它部署个人项目、原型和开源工作。该层不直接贡献收入，却是未来付费客户的主要来源。Pro（$20/用户/月）承接需要协作功能、自定义域名和更高额度的个人开发者。Teams（$20/席位/月）服务
              SMB 和创业公司的协作团队。Enterprise（定制合同）服务需要定制 SLA、SSO、审计日志和多团队治理的 Fortune 500 组织。


              CEO Rauch 证实，截至 2025 年 9 月，Teams 和 Enterprise 合计贡献超过 50% 收入。覆盖的行业包括：零售 / 电商（Walmart、Nike、Target）、媒体 /
              娱乐（Hulu）、电信（AT&T）、营销 /
              代理机构（WPP）、金融科技（PayPal）和科技（OpenAI、Anthropic、GitHub、HashiCorp）。地域分布明显偏美国，欧洲扩张现在是战略优先级；GIC 共同领投 Series F
              就是证据。


              一个新的客户段正在出现：AI 智能体。CEO Rauch 在 2026 年初 HumanX 会议上表示，Vercel 30% 的部署由 AI 智能体生成——这些自主编码系统无需人类开发者介入就会自动部署到
              Vercel。这代表一种结构性全新的“客户”类别，可能在不成比例增加 CAC 的情况下显著提高平台使用速度。
