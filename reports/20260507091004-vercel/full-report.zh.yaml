  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Vercel 的竞争横跨多个层级：直接前端云同业、更广义的全栈 PaaS 平台、大型云在位者，以及开源 / 现状替代方案。直接竞争层由 Netlify 和 Cloudflare Pages/Workers
              主导。相邻 PaaS 层包括 Railway、Render 和 Fly.io，它们服务全栈部署需求，但会在开发者同时构建 API 路由和前端应用时与 Vercel 重叠。云在位者层（AWS
              Amplify、Azure Static Web Apps、Google Cloud Run）提供原始基础设施，开发者体验打磨更少，但企业分发优势巨大。


              Vercel 最清晰的竞争护城河，是创建并持续掌舵 Next.js。Next.js 是主导 React 元框架，开发者使用占比 17-20%，元框架市场份额 52.9%。Vercel
              为自家框架构建参考托管环境，由此形成平台特定优化（ISR、streaming、Edge Middleware），这些能力在 Vercel 基础设施上表现最好，甚至只能在 Vercel
              上跑。批评者称之为「framework-defined infrastructure」；Vercel 则把它表述为应用与部署运行时共同设计的收益。


              2024-2025，竞争者阵列明显碎片化。Netlify 曾是 Vercel 最接近的同业，如今收入规模已大幅落后（$46.3M 2024 ARR vs Vercel 的 $340M
              运行率）。Cloudflare 已成为更可信的结构性长期威胁：330+ PoPs、Pages 上无限免费带宽，以及 Workers 2-8ms 冷启动延迟，相比 Vercel 约 30-35ms。AWS
              Amplify Gen 2 是最强的企业竞争者，但开发者社区独立牵引力几乎可以忽略。
            claimRefs: []
