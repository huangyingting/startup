      - number: '3.3'
        title: 能力与定价比较
        blocks:
          - type: paragraph
            body: >
              Vercel 的 DX 领先最明显体现在 CI/CD 集成：每个分支自动生成预览部署 URL、Next.js 零配置部署，并对 React Server Components 和流式渲染提供一等支持。Vercel
              首创预览部署 URL，如今 Netlify、Cloudflare Pages 和 AWS Amplify 都已复制。Cloudflare Pages 缺少原生 ISR，对 React Server
              Component 支持有限。AWS Amplify 通过 CloudFront 支持 Next.js ISR，但配置更复杂。


              定价上，直接竞争者在 Pro 档基本收敛到约 $20/user/month。Vercel 最大的定价顾虑是带宽超额：Pro plans 超过 1TB 后 $55/TB。2024 一起病毒式事件（一名开发者收到
              $96,000 Vercel 账单）说明了没有硬上限的基于用量带宽计费存在尾部风险。Vercel 在 mid-2024 通过更细粒度计费加以处理，但仍保留「高价」定价口碑。Cloudflare Pages
              提供无限免费静态带宽。AWS Amplify 的出站数据传输价格为 $0.023/GB。Netlify 在 September 2025 转向积分制计费，降低了最常见的超额场景。
