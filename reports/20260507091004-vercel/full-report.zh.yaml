      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              Vercel 市场的主要增长驱动包括：（1）AI 智能体部署成为结构性需求倍增器——early 2026，Vercel 部署中 30% 来自 AI 智能体，2023 几乎为零；（2）Next.js/CRA
              生态迁移——CRA 在 early 2025 退场，把 React 开发者推向 Next.js，周下载量从 7M 加速到 9M；（3）企业数字化转型——composable architecture
              采用带来新增前端基础设施支出；（4）边缘计算采用——对延迟敏感的 AI 应用需要地理分布式计算。


              采用约束包括：（1）供应商锁定担忧——Vercel 自研 edge/middleware API 形成切换成本，企业买家会谨慎看待；（2）定价不可预测——2022–2023 的带宽超额争议损害了开发者信任，直到
              Fluid 模型缓解；（3）大云竞争——AWS Amplify 和 Cloudflare Pages 能以更低成本提供相近基础功能；（4）开发者情绪：React/Next.js 喜爱度从 62% 降到
              52%（2024–2025），说明热情降温，可能拖慢自然获客。


              AI Cloud TAM 扩张很有吸引力，但尚未验证：没有一线分析师机构发布过 AI developer infrastructure 作为独立类别的正式 TAM。Vercel
              的市场叙事领先于分析师分类，这对创造新品类的公司很常见，但也在 IPO 阶段引入预测不确定性。
