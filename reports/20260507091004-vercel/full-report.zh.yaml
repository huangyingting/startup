      - number: '5.5'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Vercel 持有企业级合规认证：SOC2 Type II、ISO 27001、面向 EU 部署的 GDPR 合规，以及面向符合条件医疗客户的 HIPAA BAA。这些认证是企业销售周期的入场券，Vercel
              也在持续维护。TrustRadius 的企业评价确认，其合规姿态足以支撑受监管企业部署。


              2026 年 4 月 19 日的供应链安全事件，是 Vercel 历史上最重大的信任事故。攻击者利用 Context.ai 开发者工具集成投放 Lumma Stealer 恶意软件，并索要 $2M
              赎金。Vercel 拒绝付款，并在 48 小时内完成修补。响应速度值得肯定，但事件暴露出 Vercel 与第三方 AI 开发者工具深度集成带来的攻击面——随着 AI 工具更深嵌入开发工作流，这块暴露面还会扩大。


              GDPR 数据驻留控制允许欧洲客户将数据处理固定在 EU 区域，但按客户隔离数据的文档尚未完全公开。v0（AI 生成代码）受到 EU AI Act 影响，形成新的监管暴露面；随着该法案通用 AI
              系统条款生效，Vercel 可能需要补齐合规文档。整体看，合规姿态足以支撑企业销售，但安全事件留下尽调标记，需要审查 Vercel 的第三方集成安全政策和泄露通知流程。
