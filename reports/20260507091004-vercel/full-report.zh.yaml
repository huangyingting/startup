      - number: '4.2'
        title: 变现模型与定价策略
        blocks:
          - type: paragraph
            body: >-
              Vercel 的变现建立在四条收入流上：（1）订阅层——Hobby（免费）、Pro（$20/user/month）、Teams（$20/seat/month）和
              Enterprise（定制）；（2）带宽、函数调用和构建分钟数超过 plan limits 后的基于用量超额收费；（3）v0 与 AI SDK premium tiers 的新兴 AI 产品订阅；（4）与第三方
              add-ons 的 marketplace integrations。Hobby tier 明确是开发者获客工具，不产生直接收入，却为 Teams 和 Enterprise conversions 播种
              pipeline。


              Pro 和 Teams plans 都采用固定席位定价，价格为 $20/month，个人开发者和小团队都负担得起。Enterprise contracts 按规模谈判，中大型企业部署的年度合同价值很可能锚定在
              $50-200K+。基于用量的超额计费模式曾引发争议——2024 一起事件中，一名开发者因意外流量 spikes 积累了 $96K bill，引发社区反弹，并要求支出上限和账单透明度改进。Vercel 后来实施了
              spending limit controls，但对成本敏感客户来说，定价可预测性仍是供应商风险。


              v0 和 AI SDK 变现仍处早期。v0 有 3.5M 独立用户，但提供慷慨的免费层；平台很可能仍处于获客模式，尚未收紧变现。AI SDK 每周 3M 下载，代表显著的未来变现机会：当企业 workflows
              标准化在 Vercel AI infrastructure layer 上，高 ARPU 订阅有机会叠加到既有平台订阅之上。
