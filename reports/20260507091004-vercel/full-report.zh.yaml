      - number: '6.5'
        title: 先落地再扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Vercel 的先落地再扩张路径，是开发者基础设施中最清晰的一类。典型路径是：大企业里的开发者先用 Hobby/Pro 做副项目 → 证明价值 → 说服团队采用 Teams → 企业采购为治理和合规购买
              Enterprise。自下而上的路径让 Vercel 几乎不花漏斗顶端成本就进入企业账户，并靠使用量扩张，而不是靠销售主导扩张。


              集中度风险没有量化。前 10 大客户收入集中度未公开披露。考虑到收入结构偏企业（Teams/Enterprise 贡献 50%+），并假设典型 SaaS 企业客户集中度下前 10 大客户占 ARR 的
              20-30%，Vercel 最大客户会占到相当可观的收入。失去任何一个 Fortune 500 客户（可能对应 $2-10M+ ARR）都会有实质影响。


              借助 GIC 合作伙伴关系推进欧洲扩张，是最重要的地域扩张向量。由于数据主权担忧，欧洲企业客户历来较慢采用美国云平台；GIC 投资和 Vercel 的 GDPR 合规，为 EU 企业采购团队提供了可信度。收购
              NuxtLabs（引入法国 Nuxt.js 维护者）进一步增强了 Vercel 在欧洲开发者中的可信度。
            claimRefs: []
