schemaVersion: startup-diligence-v1
artifact: milestones-catalysts
slug: anthropic
runDate: 2026-05-01
company:
  name: Anthropic
horizons:
  next6Months:
    - id: M001
      milestone: Independent evidence emerges that Claude Code and computer-use workflows are converting into repeat enterprise adoption.
      type: product
      bullishIfAchieved: Workflow-level adoption would support the case that Anthropic can own a durable layer above raw model access.
      bearishIfMissed: If agentic features stay mostly demo-driven, Anthropic's differentiation may remain easier to copy.
      claimRefs: [C014, C022, C024]
    - id: M002
      milestone: Public-sector and regulated-buyer access expands through additional procurement, compliance, or deployment proofs.
      type: regulatory
      bullishIfAchieved: Stronger regulated traction would validate the safety-and-governance positioning as commercially meaningful.
      bearishIfMissed: If regulated traction stalls, one of Anthropic's clearest claimed differentiators weakens.
      claimRefs: [C023, C031, C034]
    - id: M003
      milestone: New customer evidence appears in support, healthcare, finance, or life sciences with clearer before-and-after workflow outcomes.
      type: gtm
      bullishIfAchieved: More repeatable cross-vertical proof would increase confidence in customer pull beyond isolated case studies.
      bearishIfMissed: If proof remains thin or company-hosted only, confidence in repeatability should stay constrained.
      claimRefs: [C023, C024, C027, C028, C029]
    - id: M004
      milestone: Product and pricing updates continue to improve token economics through caching, batching, and model tiering.
      type: financial
      bullishIfAchieved: Better deployment economics would improve the path to scalable margins.
      bearishIfMissed: If cost controls lag, usage growth may not translate into attractive unit economics.
      claimRefs: [C010, C011, C012]
  next12Months:
    - id: M005
      milestone: Anthropic shows more evidence of winning and retaining enterprise accounts through direct relationships, not only through hyperscaler channels.
      type: gtm
      bullishIfAchieved: Direct account control would support stronger pricing power and customer ownership.
      bearishIfMissed: If most scaled wins remain channel-owned, long-term value capture may look weaker.
      claimRefs: [C021, C044]
    - id: M006
      milestone: Deloitte- and Cognizant-style alliance deployments translate into recurring, repeatable software usage.
      type: partnership
      bullishIfAchieved: This would show that service-partner leverage expands, rather than substitutes for, durable product revenue.
      bearishIfMissed: If alliance-led deals remain services-heavy, Anthropic may struggle to earn software-like margins.
      claimRefs: [C030, C046]
    - id: M007
      milestone: Material litigation developments clarify the downside from copyright and training-data disputes.
      type: regulatory
      bullishIfAchieved: Favorable outcomes or manageable settlements would remove a major overhang.
      bearishIfMissed: Adverse rulings or escalating claims would be a direct downgrade trigger.
      claimRefs: [C039, C040, C041]
    - id: M008
      milestone: The company continues to deepen leadership and operating depth outside the founders.
      type: hiring
      bullishIfAchieved: More bench depth would reduce key-person concentration and improve execution resilience.
      bearishIfMissed: If operating ownership remains founder-centric, governance and succession risk stay elevated.
      claimRefs: [C005, C006, C045]
  next24Months:
    - id: M009
      milestone: Anthropic demonstrates a durable workflow layer around Claude that is harder to substitute than basic model access.
      type: product
      bullishIfAchieved: Strong workflow lock-in would improve moat durability and justify premium pricing.
      bearishIfMissed: If customers continue treating Claude as interchangeable model access, moat and valuation support weaken.
      claimRefs: [C014, C021, C043, C044]
    - id: M010
      milestone: Channel mix proves that hyperscaler relationships widen reach without fully owning economics or customer control.
      type: financial
      bullishIfAchieved: A healthier direct-versus-channel balance would support better margins and strategic independence.
      bearishIfMissed: If hyperscalers dominate the customer interface, Anthropic may remain strategically important but economically constrained.
      claimRefs: [C019, C020, C021, C044]
    - id: M011
      milestone: Governance and bench depth scale in a way that lowers founder concentration while preserving mission credibility.
      type: other
      bullishIfAchieved: Better distributed leadership would improve resilience and investor confidence in the nonstandard control structure.
      bearishIfMissed: If trust and mission still hinge mainly on founders, key-person risk remains high.
      claimRefs: [C004, C005, C045]
    - id: M012
      milestone: Government and other regulated verticals become repeatable commercial wedges rather than packaging experiments.
      type: gtm
      bullishIfAchieved: Repeatable regulated wins would be a strong signal that Anthropic's trust and compliance posture is monetizable.
      bearishIfMissed: If these segments do not compound, a core part of the differentiation story weakens.
      claimRefs: [C023, C031, C034]
leadingIndicators:
  - indicator: Mix of major customer references coming from direct Claude/API relationships versus Bedrock, Vertex AI, or Foundry.
    cadence: quarterly
    sourceToWatch: Company announcements, customer references, and management reporting
    claimRefs: [C021, C044]
  - indicator: Frequency and quality of customer proof in coding, support, healthcare, finance, and government workflows.
    cadence: monthly
    sourceToWatch: Customer stories, partner announcements, and product case studies
    claimRefs: [C023, C024, C030, C031]
  - indicator: Pricing and product updates that affect token economics, including caching, batching, and model-tier usage.
    cadence: monthly
    sourceToWatch: Product documentation and pricing pages
    claimRefs: [C010, C011, C012]
  - indicator: Court rulings, settlements, and buyer commentary related to copyright and training-data litigation.
    cadence: episodic
    sourceToWatch: Court developments and company disclosures
    claimRefs: [C039, C040, C041]
  - indicator: Open-role mix and executive additions that broaden operating depth beyond the founders.
    cadence: quarterly
    sourceToWatch: Greenhouse board and company leadership announcements
    claimRefs: [C006, C045]
killCriteria:
  - criterion: A court outcome or settlement materially restricts model training or product usage, or creates damages large enough to alter the investment case.
    severity: critical
    detectionMethod: Court rulings, settlement disclosures, and board-level legal updates
  - criterion: Evidence shows hyperscalers own most strategic customer relationships and economics, leaving Anthropic with structurally weak margin capture.
    severity: high
    detectionMethod: Revenue mix, gross-margin by channel, and renewal ownership analysis
  - criterion: Large enterprise deployments fail to renew or expand without heavy SI dependence.
    severity: high
    detectionMethod: Cohort retention, services attachment rates, and customer reference checks
  - criterion: Key-person concentration remains high enough that founder availability becomes a material operating bottleneck.
    severity: medium
    detectionMethod: Succession mapping, delegated ownership, and customer or partner feedback
catalystCalendar:
  - event: Material rulings or settlements in ongoing copyright cases
    expectedDate: null
    impact: high
  - event: Additional government or regulated-market deployment announcements
    expectedDate: null
    impact: medium
  - event: New Claude Code, computer-use, or workflow-product releases
    expectedDate: null
    impact: medium
  - event: Evidence of channel-mix or major financing/liquidity changes
    expectedDate: null
    impact: high
