technologyStack:
  coreTechnology: Claude is presented as a frontier model family delivered through direct product surfaces and APIs, with multimodal input, multilingual capability, tool use, and newer agentic coding and computer-use workflows.
  proprietaryElements:
    - Claude model family and tiering across Haiku, Sonnet, and Opus
    - Agentic product layers including Claude Code and computer-use capabilities
    - Safety and deployment framework via Responsible Scaling Policy and related safeguards
  thirdPartyDependencies:
    - AWS as primary cloud provider for mission-critical workloads
    - Google Cloud as a major compute and distribution partner
    - Amazon Bedrock, Google Vertex AI, and Microsoft Foundry as major distribution channels
  dataDependencies:
