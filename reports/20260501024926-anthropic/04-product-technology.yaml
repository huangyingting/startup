productRisks:
  - risk: Dependence on hyperscaler infrastructure and channel partners could constrain economics, product control, or bargaining power.
    severity: high
    rationale: AWS is documented as the primary cloud provider, Google Cloud is also a major partner, and major enterprise distribution runs through Bedrock, Vertex AI, and Microsoft Foundry.
    claimRefs:
      - C019
      - C020
      - C021
  - risk: Legal and copyright disputes could slow enterprise adoption or increase operating cost.
    severity: high
    rationale: Public reporting in the ledger shows active and potentially material IP litigation exposure.
    claimRefs:
      - C039
      - C040
      - C041
  - risk: Enterprise rollout depends on buyer trust, security posture, procurement readiness, and integration support, not just raw model quality.
    severity: high
    rationale: Reviewed claims show enterprise controls and services alliances matter because reliability, governance, and implementation complexity remain gating factors.
    claimRefs:
      - C031
      - C034
      - C044
      - C046
  - risk: New agentic and computer-use workflows raise execution and safety expectations that are only partly supported by company-authored evidence.
    severity: medium
    rationale: Anthropic is pushing into Claude Code and computer use, but some detailed capability framing is still company-claimed.
    claimRefs:
      - C014
      - C015
      - C016
productVerdict:
  assessment: promising
  rationale: Anthropic has a real scaled product footprint across consumer, enterprise, developer, and cloud-channel surfaces, with unusually explicit safety and governance positioning; however, core durability still looks only partly proven because channel dependence is high, frontier capabilities are contestable, and several outcome claims remain company-authored.
  confidence: medium
  claimRefs:
    - C007
    - C008
    - C014
    - C016
