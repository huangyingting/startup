technicalDefensibility:
  strengths:
    - Multi-surface distribution across direct assistant usage, enterprise plans, API access, and hyperscaler channels
    - Safety and governance positioning that is more explicit than a generic model-quality pitch
    - Developer ecosystem footprint through SDKs, protocol ecosystem participation, and coding-oriented workflows
  limitations:
    - Several high-visibility capability and customer-outcome claims are company-authored or company-hosted rather than independently benchmarked
    - Infrastructure and channel dependence on AWS, Google Cloud, and hyperscaler marketplaces limits full stack control
    - Commercial durability appears to depend heavily on integration, procurement, and workflow adoption rather than model quality alone
