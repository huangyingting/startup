schemaVersion: startup-diligence-v1
artifact: market-customers
slug: anthropic
runDate: '2026-05-01'
company:
  name: Anthropic
marketDefinition:
  category: Frontier foundation-model platform with consumer assistant, enterprise
    workspace, and developer API distribution
  boundaries: Included market is enterprise and developer spend on large-language-model
    applications, seats, and API usage across coding, knowledge work, support, research,
    and regulated workflows. It also includes cloud-channel distribution through hyperscalers.
    Excludes raw AI infrastructure chips, generic cloud compute not monetized through
    Claude, and broad IT services revenue unrelated to Claude usage.
  excludedMarkets:
  - Semiconductor sales and raw accelerator hardware
  - Generic cloud IaaS revenue not tied to Claude distribution
  - Pure consulting or outsourcing revenue that does not embed Claude usage
  - Non-AI SaaS categories with no foundation-model component
  claimRefs:
  - C007
  - C008
  - C021
  - C022
  - C023
whyNow:
  inflectionDrivers:
  - driver: Model capability has advanced from chat into agentic coding, hybrid reasoning,
      and computer-use workflows that can automate higher-value work.
    driverType: technology
    strength: high
    claimRefs:
    - C013
    - C014
    - C015
  - driver: Deployment economics are improving through model tiering, prompt caching,
      and batch discounts, making broader rollout easier to justify.
    driverType: economic
    strength: high
    claimRefs:
    - C009
    - C010
    - C011
    - C012
  - driver: Distribution via AWS, Google Cloud, and Microsoft Foundry reduces infrastructure
      friction and meets buyers where they already buy AI.
    driverType: distribution
    strength: high
    claimRefs:
    - C019
    - C020
    - C021
  - driver: Compliance and procurement channels are opening for tougher buyer segments,
      including public sector and regulated enterprises.
    driverType: regulatory
    strength: medium
    claimRefs:
    - C031
    - C034
  - driver: Independent data shows enterprise AI adoption and spending are rising
      quickly, expanding the budget pool available to Claude.
    driverType: behavioral
    strength: high
    claimRefs:
    - C035
    - C037
    - C038
  timingRationale: Anthropic is arriving as foundation models become good enough for
    workflow automation, cheap enough to pilot at scale, and easy enough to procure
    through hyperscalers and enterprise controls.
  claimRefs:
  - C014
  - C021
  - C031
  - C035
  - C037
marketSizing:
  tam:
    value: $631B by 2028
    valueUsdM: 631000
    methodology: IDC broad global AI market forecast; used here as an outer-bound
      top-down market envelope rather than Anthropic’s exact addressable slice.
    approach: top-down
    confidence: medium
    claimRefs:
    - C037
  sam:
    value: $89.6B in 2024 across software and information services, banking, and retail
      AI spend
    valueUsdM: 89600
    methodology: IDC cited combined 2024 AI spending of the three largest industries;
      used as a rough proxy for near-term enterprise budgets relevant to Anthropic,
      though still overinclusive.
    approach: top-down
    confidence: low
    claimRefs:
    - C037
  som:
    value: null
    valueUsdM: null
    methodology: null
    approach: unknown
    confidence: low
    claimRefs:
    - C018
    - C030
  reconciliation: IDC TAM materially overstates Anthropic’s true addressable market
    because it includes wider AI categories; the SAM proxy narrows to large enterprise
    budgets but still includes spend Anthropic cannot capture. Public data is insufficient
    for a defensible bottom-up SOM.
