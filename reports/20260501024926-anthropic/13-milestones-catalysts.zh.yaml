schemaVersion: startup-diligence-v1
artifact: milestones-catalysts
slug: anthropic
runDate: 2026-05-01
company:
  name: Anthropic
horizons:
  next6Months:
    - id: M001
      milestone: 独立的证据表明,Claude Code和计算机使用工作流正在转化为重复的企业收养。
      type: product
      bullishIfAchieved: 工作流层面的采用将证明Anthropic在原始模型准入之上可拥有一层耐用层。
      bearishIfMissed: 如果代理特性大多保持演示驱动,则Anthropic的区分可能仍然比较容易被复制.
      claimRefs: [C014, C022, C024]
    - id: M002
      milestone: 公共部门和受管制的买方通过更多的采购、合规或部署证明扩大准入。
      type: regulatory
      bullishIfAchieved: 强化监管的牵引力将证明安全和治理定位具有商业意义。
      bearishIfMissed: 如果有规范的牵引摊,Anthropic最明确声称的异形者之一会削弱.
      claimRefs: [C023, C031, C034]
    - id: M003
      milestone: 新的客户证据出现在支持、保健、金融或生命科学,结果更明确。
      type: gtm
      bullishIfAchieved: 更多的可重复的纵向证据将增强对客户在孤立的案例研究之外拉动的信心。
      bearishIfMissed: 如果证据仍然薄弱或只有公司提供,那么对重复性的信心就应受到限制。
      claimRefs: [C023, C024, C027, C028, C029]
    - id: M004
      milestone: 产品和定价更新继续通过缓存、分批和模型分级改进象征性经济。
      type: financial
      bullishIfAchieved: 更好的部署经济性将改善通往可扩展边际的道路。
      bearishIfMissed: 如果成本控制滞后,使用量的增长可能不会转化为有吸引力的单位经济性。
      claimRefs: [C010, C011, C012]
  next12Months:
    - id: M005
      milestone: Anthropic通过直接关系,而不仅仅是通过超大规模云厂商渠道获得和保留企业账户的更多证据。
      type: gtm
      bullishIfAchieved: 直接账户控制将支持加强定价能力和客户控制权。
      bearishIfMissed: 如果大多数规模赢家仍然是渠道拥有的,长期价值捕捉可能看起来比较弱.
      claimRefs: [C021, C044]
    - id: M006
      milestone: Deloitte-和Cognizant]式的联盟部署被转换为反复重复的软件使用.
      type: partnership
      bullishIfAchieved: 这将表明,服务伙伴的杠杆作用能够扩大而不是取代持久的产品收入。
      bearishIfMissed: 如果以联盟为主导的交易仍然服务繁重,Anthropic可能难以获得类似软件的利润。
      claimRefs: [C030, C046]
    - id: M007
      milestone: 实质性的诉讼动态澄清了版权和培训数据纠纷的缺点。
      type: regulatory
      bullishIfAchieved: 有利的结果或可管理的解决办法将消除重大的悬置。
      bearishIfMissed: 不利的裁决或不断升级的索赔将直接引发降级。
      claimRefs: [C039, C040, C041]
    - id: M008
      milestone: 公司继续在创始人之外深化领导和业务深度.
      type: hiring
      bullishIfAchieved: 更多的长凳深度将减少关键人物的集中,提高执行的复原力。
      bearishIfMissed: 如果运营所有权仍然以创始人为中心,治理和继任风险就会继续上升。
      claimRefs: [C005, C006, C045]
  next24Months:
    - id: M009
      milestone: Anthropic 显示Claude周围的一层耐用,比基本模型访问更难取而代之。
      type: product
      bullishIfAchieved: 坚固的工作流锁定将改善护城河的耐久性并证明溢价合理。
      bearishIfMissed: 如果客户继续将Claude视为可互换的模型访问,护城河和估值支持就会被削弱.
      claimRefs: [C014, C021, C043, C044]
    - id: M010
      milestone: Channel mix证明超大规模云厂商关系在不完全拥有经济性或客户控制的情况下扩大覆盖范围.
      type: financial
      bullishIfAchieved: 更健康的直接与渠道平衡将有利于改善边际关系和战略独立性。
      bearishIfMissed: 如果超大规模云厂商主导客户界面,Anthropic可能仍然具有战略重要性,但经济上受到限制。
      claimRefs: [C019, C020, C021, C044]
    - id: M011
      milestone: 治理和长凳深度规模,在保持特派团公信力的同时降低创始人的集中程度。
      type: other
      bullishIfAchieved: 更好的领导分配将提高复原力和投资者对非标准控制结构的信心。
      bearishIfMissed: 如果信任和使命仍然主要取决于创始人,关键人物的风险仍然很高。
      claimRefs: [C004, C005, C045]
    - id: M012
      milestone: 政府和其他受管制的垂直成为可重复的商业楔形,而不是包装试验。
      type: gtm
      bullishIfAchieved: 重复的受管制赢家将是一个强烈的信号,表明Anthropic的信任和遵守态势可以货币化.
      bearishIfMissed: 如果这些部分不复合,差异故事的核心部分会减弱.
      claimRefs: [C023, C031, C034]
leadingIndicators:
  - indicator: 从直接Claude/API关系与Bedrock,Vertex AI,或Foundry等关系获得的主要客户参考信息混合.
    cadence: 季度数
    sourceToWatch: 公司公告、客户查询和管理报告
    claimRefs: [C021, C044]
  - indicator: 编码、支助、保健、财务和政府的客户证明的频率和质量工作流。
    cadence: 每月
    sourceToWatch: 客户故事、伙伴通知和产品案例研究
    claimRefs: [C023, C024, C030, C031]
  - indicator: 影响象征性经济性的定价和产品更新,包括缓存、分批和模型级使用。
    cadence: 每月
    sourceToWatch: 产品文件和定价页
    claimRefs: [C010, C011, C012]
  - indicator: 法院的裁决、解决和买方评注涉及版权和培训数据诉讼。
    cadence: 癫痫
    sourceToWatch: 法院发展和公司披露
    claimRefs: [C039, C040, C041]
  - indicator: 开放-角色组合和高管添加,将操作深度扩大至创始人之外.
    cadence: 季度数
    sourceToWatch: Greenhouse董事会和公司领导公告
    claimRefs: [C006, C045]
killCriteria:
  - criterion: 法院的结果或和解实质性地限制了示范培训或产品使用,或造成了足以改变投资逻辑件的损害。
    severity: critical
    detectionMethod: 法院裁决、和解披露和董事会一级法律最新情况
  - criterion: 证据表明超大规模云厂商s拥有最具战略意义的客户关系和经济性,留下Anthropic在结构上薄弱的比值捕捉.
    severity: high
    detectionMethod: 按渠道分列的收入组合毛利率和续约所有权分析
  - criterion: 大型企业的部署在不严重依赖SI的情况下无法续延或扩大.
    severity: high
    detectionMethod: 共用设备保留、服务附加费率和客户证明人查询
  - criterion: 关键人物的集中度仍然很高,使创始人可用性成为操作瓶颈的材料.
    severity: medium
    detectionMethod: 继承绘图、授权所有权和客户或伙伴反馈
catalystCalendar:
  - event: 正在进行的版权案件中的重大裁决或解决
    expectedDate:
    impact: high
  - event: 其他政府或受管制市场部署通知
    expectedDate:
    impact: medium
  - event: 新的Claude Code、计算机使用或工作流-产品释放
    expectedDate:
    impact: medium
  - event: 渠道混合或重大融资/流动性变化的证据
    expectedDate:
    impact: high
