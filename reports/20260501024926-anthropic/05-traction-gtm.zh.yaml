gtmMotion:
  primaryMotion: hybrid
  buyer: CIO、CTO、VP Engineering、支持领导、公共部门采购团队，以及受监管行业的职能负责人。
  user: 消费者、知识工作人、开发者人、支助小组、分析员和政府或受管制的用户。
  channels:
    - 直接Claude自助计划
    - 直接团队和企业销售
    - Claude PlatformAPI
    - Amazon Bedrock
    - Google Vertex AI
    - Microsoft Foundry
    - 服务业和系统集成/咨询合作伙伴
    - 启动和校园方案
    - GSA Schedule用于U.S.联邦采购
  salesCycleHypothesis: 介质
