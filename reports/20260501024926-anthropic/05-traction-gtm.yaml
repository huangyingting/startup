tractionSummary:
  overallSignal: moderate
  rationale: Anthropic shows substantial commercial momentum through a large late-stage financing, broad hyperscaler distribution, visible enterprise and government packaging, and multiple named deployments. However, public evidence still does not disclose ARR, revenue, paid customer count, retention, or independently verified monetization quality, and most customer outcomes are company-hosted.
  confidence: medium
  claimRefs: [C018, C021, C023, C024, C030]
