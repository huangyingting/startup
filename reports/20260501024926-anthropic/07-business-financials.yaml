financialVerdict:
  assessment: uncertain
  rationale: Anthropic clearly has exceptional access to capital and meaningful commercial surface area, but public financial transparency remains thin. Revenue, margin, burn, and retention are undisclosed, while compute intensity, channel dependence, and legal exposure make the underlying economics hard to underwrite with confidence.
