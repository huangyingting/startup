teamVerdict:
  assessment: credible
  rationale: Anthropic shows a strong founder core, an increasingly professionalized executive bench, active board and trust governance, and unusually broad current hiring across technical and commercial functions. The main remaining diligence limitations are undisclosed headcount and incomplete public visibility into the deeper operating org chart.
  confidence: medium
  claimRefs: []
