    - Claude跨Haiku、Sonnet和Opus的示范家庭和分级
    - 代理产品层,包括Claude Code和计算机使用能力
    - 通过负责任的扩增政策和相关保障措施建立安全和部署框架
  thirdPartyDependencies:
    - AWS作为特派团关键工作量的主要云提供方
    - Google Cloud作为主要的计算和分发伙伴
    - Amazon Bedrock、GoogleVertex AI和Microsoft Foundry作为主要分销渠道
  dataDependencies:
