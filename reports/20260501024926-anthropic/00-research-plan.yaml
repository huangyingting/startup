schemaVersion: startup-diligence-v1
artifact: research-plan
slug: anthropic
runDate: 2026-05-01
company:
  name: Anthropic
  requestedName: anthropic
  requestedUrl: https://www.anthropic.com/
researchScope:
  focus: Full company diligence with stage-1 emphasis on verified company identity, legal-entity scoping, product-surface mapping, governance context, and the current team-and-people picture needed for downstream work.
  depth: deep
  geography: Global
  sectorHypothesis: Frontier AI research and deployment company spanning consumer assistant, enterprise software, and developer platform products
keyResearchQuestions:
  - id: Q001
    question: What is the exact diligence target across Anthropic the brand, Anthropic, PBC the main U.S. legal entity, Anthropic Ireland, Limited the regional affiliate, and product surfaces such as Claude and the Claude Platform?
    whyItMatters: Wrong-entity or wrong-product attribution would distort legal, commercial, governance, and traction conclusions.
  - id: Q002
    question: Which official domains and product surfaces are actually operated by Anthropic today?
    whyItMatters: Anthropic spans anthropic.com, claude.com, and console.anthropic.com, so product claims must be mapped to the right surface before downstream analysis.
  - id: Q003
    question: Who founded Anthropic, who leads it now, and how much of strategy, recruiting, and external trust is concentrated in Dario Amodei and Daniela Amodei?
    whyItMatters: Frontier-model companies often carry outsized key-person risk, especially when fundraising and safety posture are closely tied to a small founding group.
  - id: Q004
    question: What does Anthropic's public governance structure actually look like across the Board of Directors and the Long-Term Benefit Trust?
    whyItMatters: Governance structure is a differentiator for Anthropic and directly affects control, mission lock, and oversight quality.
  - id: Q005
    question: Which recent executive additions indicate where Anthropic is strengthening product, finance, engineering, and international go-to-market capabilities?
    whyItMatters: Recent hires help reveal whether the company is moving from founder-heavy execution toward a broader operating bench.
  - id: Q006
    question: What hiring signals best indicate current organizational buildout, geographic expansion, and functional priorities?
    whyItMatters: Open roles are one of the clearest near-real-time signals of strategy and bottlenecks when primary-source headcount is undisclosed.
  - id: Q007
    question: Which later-stage diligence angles should wait until identity and team mapping are clean?
    whyItMatters: Market, traction, business-model, and competitive work should not proceed on top of an ambiguous entity map.
  - id: Q008
    question: Which facts remain ambiguous after stage 1 and must be escalated to the source-ledger and evidence stages?
    whyItMatters: Explicit unresolved questions reduce silent assumption creep in later diligence passes.
priorityAngles:
  - angle: identity
    priority: high
    rationale: Anthropic has multiple legal entities and multiple product surfaces that must be separated before any other work is reliable.
  - angle: team
    priority: high
    rationale: Founder concentration, executive depth, and recent leadership additions are central to execution risk.
  - angle: governance
    priority: high
    rationale: The Public Benefit Corporation and Long-Term Benefit Trust structure is unusual and materially important.
  - angle: legal
    priority: high
    rationale: Contracting entity, privacy controller, and regional affiliate distinctions matter for diligence accuracy.
  - angle: risk
    priority: high
    rationale: Key-person dependence and governance complexity are stage-1 gating risks.
  - angle: product
    priority: medium
    rationale: Product-surface mapping matters now, but detailed product analysis should follow entity clarification.
  - angle: technology
    priority: medium
    rationale: Frontier-model capability and safety positioning matter, but later stages can assess them once the company perimeter is fixed.
  - angle: funding
    priority: medium
    rationale: Anthropic's late private funding history is relevant context, but stage 1 only needs enough evidence to avoid wrong-stage assumptions.
  - angle: traction
    priority: medium
    rationale: Public growth claims exist, but downstream validation should happen after claims are cleanly attributed to the company or a product line.
  - angle: business-model
    priority: medium
    rationale: Revenue model appears multi-surface, so early work should stay at the scoping level rather than full monetization analysis.
  - angle: market
    priority: low
    rationale: Full market sizing is explicitly out of scope for this stage.
  - angle: competition
    priority: low
    rationale: Competitive analysis should follow only after entity and product attribution are stable.
sourceStrategy:
  sourceTarget: 30
  mustHaveSourceTypes:
    - official websites
    - legal and policy pages
    - company announcements
    - official careers and jobs pages
    - trusted databases
    - founder and executive profiles
    - reputable business press
  disconfirmingEvidencePlan: Test each company-level claim against the possibility that it belongs instead to Anthropic, PBC, Anthropic Ireland, Limited, Claude the consumer product, Claude Platform the developer surface, or a regional commercial operation; prefer sources that name the legal entity, domain, board role, or hiring surface explicitly.
handoffNotes: Stage 1 outputs should give downstream researchers a verified entity map, official-domain map, current leadership and governance picture, recent executive additions, current hiring signals, and an explicit list of unresolved identity and team questions. Do not begin full market analysis until company versus product attribution is locked.
