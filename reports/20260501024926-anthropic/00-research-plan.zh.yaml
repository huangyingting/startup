schemaVersion: startup-diligence-v1
artifact: research-plan
slug: anthropic
runDate: 2026-05-01
company:
  name: Anthropic
  requestedName: anthropic
  requestedUrl: https://www.anthropic.com/
researchScope:
  focus: 公司全心全意,第1阶段强调经核实的公司身份、法律实体范围界定、产品地表绘图、治理背景以及下游工作所需的当前团队和人员情况。
  depth: deep
  geography: 全球
  sectorHypothesis: AI跨越消费者助理、企业软件和开发者平台产品的研究和部署公司
keyResearchQuestions:
  - id: Q001
    question: Anthropic该品牌、Anthropic, PBC主要U.S.法律实体、Anthropic Ireland, Limited区域附属公司以及诸如Claude和Claude Platform等产品表面的确切尽职调查目标是什么?
    whyItMatters: 错误实体或错误产品归属会扭曲法律、商业、治理和引导结论。
  - id: Q002
    question: 今天哪些官方域和产品表面实际由Anthropic操作?
    whyItMatters: Anthropic 横跨 harmic.com, claude.com, 并控制台. hanic.com,所以产品索赔必须在下游分析前被映射到正确的地表.
  - id: Q003
    question: 谁建立了Anthropic,谁领导现在,以及有多少战略、招募和外部信任集中于Dario Amodei和Daniela Amodei?
    whyItMatters: 边疆型公司往往承担规模较大的关键人物风险,特别是在筹资和安全态势与一个小型创始集团紧密相联的情况下。
  - id: Q004
    question: Anthropic公共治理结构实际上在董事会和长期利益信托之间是什么样子?
    whyItMatters: 治理结构与Anthropic不同,直接影响到控制、任务锁定和监督质量。
  - id: Q005
    question: 最近增加哪些行政内容表明Anthropic正在何处加强产品、金融、工程和国际市场进入能力?
    whyItMatters: 近期的雇佣帮助揭示了公司是否从创始人-重刑转向更广泛的操作板凳.
  - id: Q006
    question: 哪些雇用信号最能说明目前的组织建设、地域扩展和职能优先事项?
    whyItMatters: 当主源头统计未公开时,开放角色是战略与瓶颈最明显的近实时信号之一.
  - id: Q007
    question: 哪个后期的勤奋角度应该等到身份和团队绘图干净之后?
    whyItMatters: 市场、牵引力、商业模型和竞争性工作不应超越模棱两可的实体地图。
  - id: Q008
    question: 在第一阶段之后,哪些事实仍然含糊不清,必须升级为来源和证据阶段?
    whyItMatters: 明确未解决的问题减少了事后谨慎处理的沉默假设。
priorityAngles:
  - angle: 身份
    priority: high
    rationale: Anthropic有多个法律实体和多个产品表面,在任何其他工作可靠之前必须加以分离.
  - angle: 团队
    priority: high
    rationale: 创始人集中、执行深度和最近增加领导是执行风险的核心。
  - angle: 施政
    priority: high
    rationale: 公益公司和长期利益信托的结构是不寻常的,而且具有重大意义。
  - angle: 法律
    priority: high
    rationale: 就谨慎的准确性而言,缔约方实体、隐私控制人和区域附属机构的区别很重要。
  - angle: 风险
    priority: high
    rationale: 关键人物依赖性和治理复杂性是第1阶段的地标风险.
  - angle: 产品
    priority: medium
    rationale: 现在产品地表测绘很重要,但在对产品进行详细分析之后,实体应作出澄清。
  - angle: 技术
    priority: medium
    rationale: 边疆模型能力和安全定位问题,但后期可在公司周边确定后进行评估。
  - angle: 供资
    priority: medium
    rationale: Anthropic后期私人融资历史是相关的上下文,但第1阶段只需要足够的证据来避免错误的阶段假设.
  - angle: 牵引力
    priority: medium
    rationale: 公共增长索赔存在,但下游审定应在索赔被明确归于公司或产品线之后进行。
  - angle: 商业模型
    priority: medium
    rationale: 收入模型似乎是多面的,因此,早期工作应停留在范围界定一级,而不是完全货币化分析。
  - angle: 市场
    priority: low
    rationale: 在这一阶段,完全的市场规模显然超出了范围。
  - angle: 竞争
    priority: low
    rationale: 只有在实体和产品归属稳定之后,才应进行竞争性分析。
sourceStrategy:
  sourceTarget: 30
  mustHaveSourceTypes:
    - 官方网站
    - 法律和政策页
    - 公司公告
    - 官方职业和职位页面
    - 信任的数据库
    - 创建者和执行者简介
    - 知名商业报刊
  disconfirmingEvidencePlan: 检验每一公司一级的索赔是否属于Anthropic, PBC、Anthropic Ireland, Limited、Claude消费品、Claude Platform开发者表面或区域商业业务;倾向于明确指定法律实体、域名、董事会角色或雇用表面的来源。
handoffNotes: 第一阶段的产出应提供下游研究人员经核实的实体地图、官方领域地图、现任领导和治理情况、最近增加的行政主管、目前的雇用信号以及未解决的身份和团队问题的明确清单。 在锁定公司与产品归属之前,不要开始全面市场分析。
