callouts:
  - calloutType: insight
    title: OpenAI’s real market is narrower than headline TAM
    body: >-
      The company benefits from a massive generative AI backdrop, but the most relevant spend pool is enterprise
      application and model-usage budget rather than the entire hardware-plus-services AI stack.
    claimRefs:
