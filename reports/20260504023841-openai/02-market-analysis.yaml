tables:
  - id: T201
    title: Market definition table
    columns:
      - segment/category
      - included spend
      - excluded spend
      - buyer/payer
      - relevance
    rows:
      - - Enterprise workforce assistants
        - Seat-based subscriptions for ChatGPT Business and Enterprise, plus workflow agents and knowledge work copilots
        - Generic office SaaS, device refresh, and non-GenAI productivity suites
        - CIO, COO, central IT, and line-of-business leaders buying for employees
        - Core direct market for OpenAI’s enterprise assistant surfaces
      - - Developer and API platform
        - Token-priced inference, coding copilots, agent workflows, and application-layer model calls
        - Hyperscaler server capex, storage, and unrelated developer tooling
        - CTO, VP Engineering, platform teams, and software budgets
        - Core direct market for OpenAI’s API and coding products
      - - Higher education deployment
        - Campus-wide AI access for students, faculty, researchers, and operations via ChatGPT Edu
        - General LMS spend, campus hardware, and non-AI software contracts
        - Provost, CIO, procurement, and university administration
        - Distinct institutional budget line beyond commercial enterprise sales
      - - Vertical workflow applications
        - Application-layer spend in support, search, data extraction, summarization, and regulated workflows
        - Legacy enterprise software modules without model-driven functionality
        - Functional leaders plus IT and procurement
        - Indirect but important demand channel because many apps sit on model providers
      - - Consumer and prosumer subscriptions
        - Individual subscriptions and self-serve usage that seed familiarity and workflow habits
        - Ad-funded search, social media, and generic consumer internet categories
        - Individual professionals and very small teams
        - Useful wedge for awareness, but less durable than managed enterprise budgets
      - - Broad AI infrastructure adjacency
        - Global genAI devices, servers, services, and software counted in broad market reports
        - Direct OpenAI product revenue when infrastructure spend does not flow through OpenAI
        - Device OEMs, hyperscalers, infrastructure and services buyers
        - Important TAM context but mostly outside OpenAI’s direct SAM
    notes: >-
      The underwriting boundary should track monetization surfaces that can flow to OpenAI directly or through
      foundation-model application demand, not every dollar in the broader AI hardware and services stack.
    claimRefs:
