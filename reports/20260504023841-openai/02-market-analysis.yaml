  - id: TM003
    title: Segment / buyer map
    columns:
      - segment
      - buyer
      - user
      - payer/workflow
      - budget owner
      - adoption trigger
    rows:
      - - Enterprise workforce
        - CIO, COO, or transformation leader
        - General knowledge workers and managers
        - Company-funded seat deployment for productivity, search, and cross-functional assistance
        - Central IT plus shared transformation budgets
        - Need to close the capacity gap while preserving security and governance
      - - Developers and engineering
        - CTO, VP Engineering, platform leader
        - Software engineers, DevOps, and technical program teams
        - Engineering-funded copilots, agent workflows, and token-priced APIs
        - Product + Engineering and platform budgets
        - High ROI from code copilots and automation in core technical workflows
      - - Customer support
        - Support operations or CX leader
        - Contact-center agents and customer-service managers
        - Support automation, retrieval, and chatbot workflows
        - Support and operations budgets with IT partnership
        - Need for 24/7 responsiveness and cost-per-contact improvement
      - - Sales and marketing
        - CRO, CMO, or rev-ops leader
        - Sellers, marketers, and campaign teams
        - Content generation, prospecting, and pipeline workflows
        - Sales and marketing budgets
        - Pressure for faster content and more productive frontline teams
      - - Higher education
        - Provost, CIO, procurement leader
        - Students, faculty, researchers, and administrators
        - Institution-wide AI deployment for teaching, research, and campus operations
        - Central university administration and IT
        - Affordable secure access plus academic and administrative productivity
      - - Regulated specialist functions
        - General counsel, CFO, compliance, or clinical/financial operations leader
        - Lawyers, finance staff, clinicians, and specialist operators
        - Document-heavy or judgment-heavy workflows in legal, finance, and healthcare
        - Functional budgets with governance oversight
        - Strong ROI potential but heavier privacy, accuracy, and regulatory review before scale
    notes: >-
      OpenAI’s practical buyer map spans centralized IT, functional leaders, and institutional buyers; the adoption
      motion usually starts in one workflow and expands only after governance and ROI proof.
