  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - driver/constraint
      - direction
      - timing
      - implication
      - diligence ask
    rows:
      - - Digital labor demand
        - up
        - near term
        - Supports budget expansion for assistants and agents
        - Request OpenAI pipeline split between seat expansion and agentic workflow deployments.
      - - Productivity and wage signals
        - up
        - near term
        - Strengthens willingness to fund high-value AI tooling
        - Request customer ROI cases with labor substitution or revenue uplift evidence.
      - - Budget permanence
        - up
        - 12-24 months
        - Suggests AI spend is moving into recurring operating budgets
        - Request evidence that OpenAI contracts are replacing existing software or services spend.
      - - Code-copilot adoption
        - up
        - current
        - Favors developer APIs, coding agents, and technical-seat growth
        - Request OpenAI share of engineering and coding workloads versus competitors.
      - - Regulatory compliance
        - down
        - current and rising
        - Slows deployment in regulated sectors and high-consequence workflows
        - Request product compliance roadmap, region-by-region gating, and customer audit requirements.
      - - Governance build-out
        - down
        - 12+ months
        - Delays full-scale deployment even when pilots show ROI
        - Request implementation services burden, governance templates, and security review cycle times.
      - - Privacy and trust
        - down
        - current
        - Trust features are prerequisites for expansion from pilot to production
        - Request customer proof on privacy controls, retention settings, and data-boundary exceptions.
      - - Implementation cost and hallucinations
        - down
        - current
        - Raises services burden and narrows which use cases justify scale
        - Request deployment cost curves, human-review rates, and production error metrics.
      - - Multi-model switching
        - mixed
        - current
        - Keeps buyer power high and weakens single-vendor lock-in
        - Request retention, win-rate, and interoperability data by workload and segment.
    notes: >-
      The valuation-relevant question is not whether demand exists, but whether OpenAI can convert experimentation into
      repeatable, trusted, and retained production spend faster than governance and competition erode buyer momentum.
