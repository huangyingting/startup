  - id: section-3
    title: Growth drivers, adoption constraints, and valuation relevance
    body: >-
      Demand-side drivers are strong. Microsoft reports that 82% of leaders see 2025 as a pivotal strategy year and 82%
      expect to add digital labor in the next 12 to 18 months. PwC’s 2025 Jobs Barometer reinforces that signal with
      measurable labor-market evidence: AI-skilled workers command a 56% wage premium, AI-exposed roles continued to
      grow, and the most AI-exposed industries saw much faster revenue-per-employee growth than less exposed industries.
      McKinsey adds a functional map for where value is most likely to be realized, with roughly 75% of the economic
      upside concentrated in customer operations, marketing and sales, software engineering, and R&D. Those are exactly
      the kinds of workflows where OpenAI’s assistants, APIs, and agent patterns can win budget.


      The braking forces are just as material. Deloitte shows that most organizations still expect only a small share of
      experiments to be fully scaled in the near term, even though ROI on the most advanced projects is often positive.
      Regulatory compliance became Deloitte’s top reported barrier, governance programs are slow to complete, and
      Menlo’s failed-pilot data shows implementation cost, data privacy, ROI disappointment, and hallucinations as
      persistent failure modes. That is why OpenAI’s privacy guarantees matter commercially: trust, retention control,
      and enterprise identity features are not cosmetic benefits but prerequisites for moving budget from pilot to
      production. The European Union’s AI Act, OECD accountability framing, and NIST risk-management guidance all
      reinforce the same conclusion: OpenAI operates in a market with real, expanding demand, but valuation should
      discount for slower scaling in regulated or high-consequence workflows until governance and proof-of-value are
      demonstrated customer by customer.
