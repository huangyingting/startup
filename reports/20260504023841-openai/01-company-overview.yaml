callouts:
  - calloutType: strength
    title: Mission governance still matters
    body: >-
      The controlling-foundation structure is not just historical branding; it remains embedded in board control, equity
      ownership, and the company’s public-benefit corporation form.
    claimRefs:
      - CO002
      - CO005
      - CO021
      - CO037
  - calloutType: insight
    title: Microsoft remains strategically central even after recapitalization
    body: >-
      The current picture combines Microsoft’s equity position, Azure exclusivity, and long-running investment history,
      making the relationship more than a normal strategic partnership.
    claimRefs:
      - CO015
      - CO016
      - CO022
  - calloutType: risk
    title: Governance and privacy disputes are part of the core company story
    body: >-
      The board crisis, active copyright litigation, and court-driven data-retention fights are not edge issues; they
      directly affect governance credibility, privacy posture, and diligence burden.
    claimRefs:
