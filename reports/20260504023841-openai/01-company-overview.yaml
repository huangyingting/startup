company:
  name: OpenAI
chapter:
  number: 1
  title: Company Overview
  summary: >-
    OpenAI is a San Francisco-based frontier AI company operating through a nonprofit-controlled public benefit
    corporation. The company combines unusual mission governance with exceptional capital access and distribution reach,
    but governance, litigation, and reliability issues remain central to diligence.
sections:
  - id: section-1
    title: Identity, mission, and operating model
    body: >
      OpenAI describes itself as an AI research and deployment company whose mission is to ensure artificial general
      intelligence benefits all of humanity. As of the current structure, that mission is carried through two linked
      entities: the nonprofit OpenAI Foundation and OpenAI Group PBC, the for-profit public benefit corporation that
      commercializes the company’s models and products. The Foundation governs the Group rather than merely holding a
      passive stake, which is a material difference from a conventional venture-backed startup and should be treated as
      a core diligence fact reused by later chapters.


      The operating model matters because OpenAI is simultaneously a research lab, a consumer product company, an API
      platform, and an enterprise infrastructure dependency. Public materials show the company distributing models
      through ChatGPT, its API, enterprise offerings, and Azure-linked channels, while preserving a mission-governed
      structure intended to keep commercialization tied to a broader public-benefit objective. That structure is not
      cosmetic: OpenAI states that the Foundation appoints the OpenAI Group board and can replace directors, while the
      Group itself is organized as a public benefit corporation expected to consider broader stakeholder interests. The
      result is a company that should be analyzed as both a fast-scaling software platform and a governance-sensitive
      institution.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO037
      - CO039
  - id: section-2
    title: Governance, leadership, and key-person dependence
    body: >
      Governance remains one of the most important underwriting variables. Official materials show a current board that
      includes Bret Taylor, Adam D’Angelo, Sue Desmond-Hellmann, Zico Kolter, Paul Nakasone, Adebayo Ogunlesi, Nicole
      Seligman, and Sam Altman. OpenAI’s March 2024 review materials matter because they turn the 2023 board crisis from
      rumor into a reusable canonical fact set: the WilmerHale review said the rupture was driven by a breakdown in
      trust between the prior board and Altman, not by product-safety, security, financing, or partner-disclosure
      concerns. That finding lowers one class of existential concern while leaving a separate concern in place:
      leadership concentration and governance execution risk.


      The key-person map is still narrow. Sam Altman remains the central executive and public face; Greg Brockman was
      elevated to president and continues to sit close to the technical critical path; Fidji Simo was later brought in
      to lead Applications, improving execution depth on the commercial side; and board additions in 2024 and 2025 were
      explicitly framed as governance strengthening. Even with those changes, the evidence still points to a company
      where strategy, capital raising, compute partnerships, and trust with outside stakeholders remain unusually
      concentrated in a small group. That concentration is not necessarily disqualifying for a frontier-AI leader, but
      it is a major diligence item for downstream product, risk, and valuation work.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
      - CO021
  - id: section-3
    title: Capital base, stakeholder map, and public scale
    body: >
      OpenAI’s capital profile is now in a category of its own. Public reporting and company materials support a
      sequence from the January 2023 Microsoft partnership extension, through the October 2024 $6.6 billion round at a
      $157 billion post-money valuation, to a March 2026 round reported by CNBC and Bloomberg as $122 billion at an $852
      billion post-money valuation. Those same materials point to a stakeholder structure in which the OpenAI Foundation
      holds roughly 26% of OpenAI Group and Microsoft roughly 27% after recapitalization, while Amazon, Nvidia,
      SoftBank, Thrive, and other financial backers have become materially relevant to OpenAI’s future financing
      capacity and bargaining leverage.


      Public scale indicators are impressive but unevenly supportable. Forbes lists OpenAI as headquartered in San
      Francisco with 6,400 employees as of December 2025 and reports 2025 revenue of $3.7 billion. The same profile
      describes ChatGPT usage at roughly 500 million weekly users and about 2 million paying enterprise users. Those
      figures are directionally useful for maturity and scale, but public reporting still does not provide a fully
      reconciled cap table, exact consolidated lifetime funding total, or the granularity a financial underwriter would
      want on realized pricing, margin, or cohort quality. This is why later chapters should reuse these figures as
      public reference points, not as substitutes for full diligence-room data.
    claimRefs:
      - CO015
      - CO016
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
  - id: section-4
    title: Milestones, legal friction, and reliability context
    body: >
      The company overview has to preserve a chronology that later chapters can cite without re-litigating core facts.
      The public record supports a clear sequence: founding as a nonprofit in 2015, creation of a for-profit business in
      2019, leadership-role changes in May 2022, ChatGPT’s launch in November 2022, Microsoft’s renewed multiyear
      investment in January 2023, GPT-4’s release in March 2023, the March 2024 governance review and board expansion,
      the October 2024 funding round, the June 2025 public defense against New York Times data-retention demands, the
      October 2025 recapitalization, and the March 2026 funding close. That is the best single chronology of record from
      the current source set.


      The same chronology also shows why OpenAI is not a clean “growth at any cost” story. The status history page shows
      recurring service incidents across ChatGPT, the API, login, file handling, and model-specific services, which
      matters because OpenAI is now infrastructure for enterprises and developers rather than a pure novelty app. Legal
      risk is also live rather than historical: OpenAI’s own litigation-response pages, JD Supra’s analysis of the New
      York Times preservation dispute, Loeb’s copyright-litigation note, and the Musk v. Altman docket all show that
      copyright, privacy, nonprofit-mission, and governance disputes remain active diligence themes. The takeaway is not
      that the business is broken; it is that scale, governance, and legal complexity are now part of the company’s core
      identity.
    claimRefs:
      - CO013
      - CO015
      - CO017
      - CO018
      - CO023
      - CO031
      - CO032
      - CO033
      - CO034
      - CO035
      - CO036
      - CO037
