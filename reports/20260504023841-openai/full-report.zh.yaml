    rows:
      - - 工作场景席位型知识工作
        - 买方：职能负责人或 IT；用户：员工；付费方：部门或企业预算
        - 在 ChatGPT 工作区内做起草、分析、搜索和任务辅助
        - 超过 100 万家企业客户；超过 700 万个工作场景席位；300 万付费企业用户
        - 最大的可见直销动作，也最容易从初始落地切入更大账户
        - 公开资料没有按队列拆分 Business、Enterprise 和 Edu 的席位组合或 ARPU。
      - - 开发者 / 平台团队
        - 买方：CTO、产品或平台负责人；用户：开发者；付费方：工程或产品预算
        - 通过 API 构建产品内助手、搜索、客户支持、自动化和自定义应用
        - 超过 9,000 个组织消耗超过 100 亿 tokens；近 200 个组织超过 1 万亿 tokens；Mercado Libre 支撑 17,000 名开发者和 30,000+ 微服务
        - 战略上重要，因为 API 使用把 OpenAI 嵌进客户产品，并抬高切换成本
        - 直接 OpenAI 与 Azure 关联 API 的份额不公开。
      - - 受监管企业知识工作
        - 买方：数字、运营或合规负责人；用户：顾问和银行员工；付费方：企业采购
        - 金融场景中的研究、摘要、内部知识和工作流自动化
        - Morgan Stanley 报告顾问团队采用率 98%；BBVA 报告周活使用率 83%，并创建 20,000+ 个自定义 GPT
        - 高价值证明：OpenAI 能穿过受监管环境的治理门槛
        - 合同规模、续约时间和定价仍未披露。
      - - 客户支持自动化
        - 买方：支持负责人；用户：支持坐席和终端客户；付费方：支持或运营预算
        - 自动化聊天、电话和多语言客户服务
        - Klarna 首月处理 230 万次对话；Intercom 平均对话解决率 41%，端到端电话解决率 53%
        - ROI 导向强，劳动力和延迟收益可衡量
        - OpenAI 不公布支持行业按客户队列划分的整体留存或利润率。
      - - 零售辅助
        - 买方：数字或门店运营负责人；用户：购物者和门店员工；付费方：零售 IT / 运营预算
        - 产品发现、项目建议和员工赋能
        - Lowe's 称 Mylow Companion 已在 1,700+ 家门店上线，Mylow 将建议与产品发现连接起来
        - 说明 OpenAI 能同时支撑面向客户和面向员工的零售工作流
        - 公开资料未披露 GMV、转化率或客单价提升。
      - - 合作伙伴牵头的企业转型
        - 买方：CIO 或转型赞助人；用户：客户团队和顾问；付费方：企业转型预算
        - OpenAI 采用通过咨询项目和 Azure 部署加速
        - Accenture 将装备数万名专业人员；Microsoft 客户案例展示了零售和银行场景中的 Azure OpenAI
        - 在不只依赖直销的情况下，扩大进入大型企业和受监管部署的触达
        - 合作伙伴来源收入、客户所有权和毛利分成不公开。
    notes: 公开证据最能支撑的分群方式是上市路径和工作流，而不是收入带。证据指向一个混合客户群：直接席位、API 构建者和合作伙伴中介的企业部署并存。
