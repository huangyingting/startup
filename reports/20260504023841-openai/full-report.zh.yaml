  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 版图：直接实验室、套件型巨头、基础设施聚合商和自建替代方案
        blocks:
          - type: paragraph
            body: >-
              OpenAI 竞争的不是一两家前沿模型实验室。公开版图已经覆盖直接前沿同行 Anthropic，Google 和 Microsoft 这类套件型巨头，Amazon Bedrock
              这类多模型基础设施聚合商，以及围绕 Llama 等开放权重模型或 Mistral 等隐私导向供应商搭建的替代方案。Menlo 2025
              企业报告尤其重要，因为它显示买方替代集合在实践中扩宽，而不是只在理论上扩宽：企业 AI 用例中 76% 现在选择外购而非内部自建，横向 copilots 已占 84 亿美元支出，基础模型份额也已在
              Anthropic、OpenAI 和 Google 之间发生实质重分配。


              这改变了 OpenAI 的“竞争者”定义。直接同行集合仍包括 API 和编码市场里的 Anthropic，但实际交易集合也包括 Google Workspace 和 Microsoft 365 预算、Amazon
              的多模型路由层，以及把开放权重模型与云工具结合起来的内部自建。OpenAI 的核心优势仍是旗舰消费产品、广泛使用的 API
              和企业信任控制的组合。弱点在于，现在有多条竞争路径可以解决同一类任务：买方可以购买套件内助手，可以在多家供应商之间路由流量，也可以在控制权比前沿质量更重要时基于开放模型自建。
