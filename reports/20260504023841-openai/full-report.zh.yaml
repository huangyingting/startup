  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础横跨员工席位、API 构建者和伙伴主导的企业项目
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的客户基础已经不再是单一的“给知识工作者用 ChatGPT”故事。公开记录现在支撑三条不同收入路线。第一，OpenAI 有直接员工席位业务：其客户案例 hub 称 100 万家企业使用
              OpenAI；2025 年 11 月里程碑文章称超过 100 万名企业客户直接使用 OpenAI；VentureBeat 报道截至 2025 年 6 月有 300 万付费商业用户；2025 企业报告称
              OpenAI 服务超过 700 万个 ChatGPT 工作场所席位。合起来看，这既意味着广度，也意味着速度：OpenAI 正在吸引大量组织，同时也在这些组织内部加深权益。


              第二，OpenAI 有 API 驱动的构建者分层，且用量越来越接近生产级。企业报告称，超过 9,000 家组织已处理逾 100 亿 tokens，近 200 家组织已超过 1 万亿 tokens，单个组织平均
              reasoning-token 消耗量同比约增长 320 倍。API 使用也不局限于传统软件公司。OpenAI 自己的报告称，客户支持和内容生成合计约占 API 活动的 20%，非科技公司 API 使用量同比增长
              5 倍。Mercado Libre 的 Verdi 平台进一步强化了开发者/平台买方地图：OpenAI 称 17,000 名开发者可在其上构建，覆盖 30,000 多个微服务。


              第三，渠道和伙伴正在放大企业触达。TechCrunch 基于 Ramp 的快照显示，OpenAI 正在美国商业 AI 支出中赢得份额；Microsoft 客户案例和 Accenture 2025 年 12
              月公告则显示，OpenAI 正通过 Azure 和咨询主导 rollout 被拉进更大的转型预算。这对尽调很重要，因为买方、用户和付款方并不总是同一方。有些账户由中央 IT 或数字化负责人购买 ChatGPT
              席位，用于广泛员工使用；有些由产品或平台团队为 API 用量买单；还有一些由服务或云伙伴塑造部署路径。因此，OpenAI 看起来不像窄应用供应商，更像一个多界面企业平台，同时跑着几套 GTM 动作。
