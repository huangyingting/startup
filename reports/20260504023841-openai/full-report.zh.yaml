      - number: '7.4'
        title: 缓释措施看得见，但投资判断仍需要明确否决标准
        blocks:
          - type: paragraph
            body: >-
              和许多高速增长的 AI 公司相比，OpenAI 确实有更多公开的缓释脚手架。2026 DPA 和 Services Agreement
              为企业和开发者客户定义了法律框架。企业隐私材料称，客户拥有并控制数据，业务数据默认不用于训练，关键企业计划可以控制保留期限。安全报告通道和运行中的 bug bounty
              也显示，公司没有把信任当作边缘问题。治理也已有改善：WilmerHale 审查、董事会补强和 Fidji Simo 的运营角色，都降低了所有关键职能压在一个人或一套临时流程上的概率。


              但在这一章里，缓释措施降低风险，并不消灭风险。缺失项恰恰是投资者最关心的东西：合并口径的承诺支出表、完整客户合同条款、SLA 和赔偿附件、伙伴来源
              ARR、头部客户暴露和继任材料。正确姿态因此应是有条件的，而不是宿命式的。如果诉讼扩大、可用性恶化、Microsoft 或 Oracle 经济条件转向不利，或者领导层治理再次破裂，这些都不是普通执行失误，而是投资
              thesis 的击穿触发项。反过来，如果管理层能拿出合同包、集中度表和支出承诺，并且比公开记录暗示的更干净，剩余风险可能明显压缩。
