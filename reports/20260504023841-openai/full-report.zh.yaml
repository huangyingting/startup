      - number: '6.4'
        title: 渠道依赖和集中度仍是客户尽调的主要盲点
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的企业增长覆盖面很广，但公开证据也显示，客户关系并不总是由 OpenAI 直接掌握。Microsoft 的客户案例显示，Azure OpenAI 已用于 Worten、Discovery Bank
              等零售和银行部署；Accenture 则称，会让数万名专业人员使用 ChatGPT Enterprise，并为金融服务、医疗、公共部门和零售构建基于 OpenAI
              的项目。这些材料是正向信号，因为它们证明生态杠杆有效；但它们也意味着，部分企业扩张可能由云厂商或服务伙伴居中完成，而不是完全靠 OpenAI 自己的直销和客户成功体系拿下并服务。


              客户集中度风险也因此很难只靠公开证据判断。公开材料没有说明，客户增长中有多少来自直接席位销售，又有多少来自 Azure 相关用量、伙伴主导实施或大型标杆客户。公开材料也没有披露最大客户对
              ARR、续约排期或支持负担的贡献。这块缺口很关键，因为一家公司可以同时呈现出色的顶线采用，又仍然依赖少数超大型企业关系或渠道。


              因此，尽调姿态应当是双向的。正面看，OpenAI
              似乎已经建出一台客户机器，可以面向知识工作者、开发者、零售商、银行、金融科技公司和企业软件厂商销售，并且扩张信号异常快。风险侧看，公开集中度和合同数据缺位，意味着客户故事仍不完整；管理层还需要拿出按 cohort
              的留存、头部客户暴露、伙伴来源 ARR，以及把采用转成耐久经常性收入的商业条款。
