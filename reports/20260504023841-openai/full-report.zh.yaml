  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律和监管风险仍是严重度最高的一组风险
        blocks:
          - type: paragraph
            body: >-
              OpenAI 最大的风险桶仍是法律和监管，而不是单纯的产品竞争。New York Times 诉讼之所以重要，是因为它已经把公司拉进取证和数据保留问题，直接触及用户隐私承诺。OpenAI 表示，影响消费者
              ChatGPT 和 API 内容的非常规保留令已于 2025 年 9 月结束，标准删除做法已经恢复，这是实质缓释。但公司自己的诉讼页面也显示，该案仍活跃到需要专门的辩护网站；CourtListener
              也确认底层联邦案卷仍在进行。也就是说，隐私负担可以下降，但诉讼负担并没有消失。


              第二组法律风险是治理。即便 OpenAI 已在 2024 年 3 月重置董事会，Musk v. Altman 仍把非营利使命和控制权问题留在法庭上。OpenAI 的审查材料有价值，因为它收窄了一类担忧：2023
              年的裂痕被定性为信任破裂，而不是隐藏的安全或融资丑闻。即便如此，该结构仍把董事任命权集中在 Foundation，公益公司结构也不能消除未来治理争议的风险。欧洲审查又叠了一层。EDPB ChatGPT
              taskforce 报告和欧盟委员会 2025 AI Act 落地推进都意味着，前沿模型提供商在欧洲要面对比普通软件公司更重的合规、文档和隐私要求。
