      - number: '1.2'
        title: 治理、领导层与关键人依赖
        blocks:
          - type: paragraph
            body: >
              治理仍是最重要的承销变量之一。官方材料显示，现任董事会成员包括 Bret Taylor、Adam D’Angelo、Sue Desmond-Hellmann、Zico Kolter、Paul
              Nakasone、Adebayo Ogunlesi、Nicole Seligman 和 Sam Altman。OpenAI 2024 年 3 月的审查材料很关键，因为它把 2023
              年董事会危机从传闻变成可复用的规范事实：WilmerHale 审查称，裂痕源于前董事会与 Altman
              之间的信任崩塌，而不是产品安全、安全、融资或合作伙伴披露问题。该结论降低了一类生存性担忧，但另一类担忧仍在：领导权集中和治理执行风险。


              关键人地图仍然很窄。Sam Altman 仍是核心高管和公共面孔；Greg Brockman 升任总裁，继续贴近技术关键路径；Fidji Simo 后来加入并负责
              Applications，补强了商业侧执行深度；2024 和 2025
              年新增董事也被明确包装为加强治理。即便有这些变化，证据仍指向一家公司：战略、融资、算力伙伴关系，以及外部利益相关方信任，仍异常集中在少数人手里。对前沿 AI
              领导者来说，这种集中不一定构成否决项，但它是后续产品、风险和估值工作中的重大尽调事项。
