      - number: '4.2'
        title: GTM 路径与收入质量：自助速度、企业上行销售和定价不透明
        blocks:
          - type: paragraph
            body: >-
              已审阅证据指向一种混合 GTM 模式。OpenAI 的 Business 页面同时推动立即试用和联系销售两种动作；旧版 ChatGPT Team 发布文，现已更新为 Business，也确认自助式员工产品与更早的
              Enterprise 发布并行。帮助中心材料显示，Business 将标准订阅席位和按用量计费的 Codex 席位结合在一起；OpenAI 还在 2026 年 4 月 2 日调整 Business
              定价，将标准席位月费下调 5 美元，同时引入仅 Codex 的灵活席位。这个结构在财务上很重要：它说明 OpenAI 愿意在同一个 workspace 里混合可预测的席位收入和弹性的开发者式用量收入。


              明确的隐私控制有利于收入质量，但最大合同所在位置的定价不透明又削弱了可判断性。OpenAI 称默认不使用业务数据训练，企业客户也可以控制保留期限，这支撑企业在敏感工作流中扩大使用。与此同时，公开记录没有披露标准化
              Enterprise 价目表、典型折扣、最低承诺、销售周期长度、CAC、回本期或 NRR。因此，最好的公开销售效率代理指标只能是间接的：OpenAI 企业研究中的员工报告称每天节省约 40 至 60
              分钟，Enterprise logos 加上广泛业务路由也显示出真实部署动能。这些是有用的需求信号，但不能替代 cohort 经济性。
