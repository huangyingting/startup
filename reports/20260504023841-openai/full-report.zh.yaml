      - number: '4.4'
        title: 财务结论：变现改善，但关键承销指标仍未公开
        blocks:
          - type: paragraph
            body: >-
              正面案例很直接。OpenAI 有多条变现向量、明确 API 定价、消费者愿意为每月 20 美元和 200 美元套餐付费、自助式 Business 产品、定制 Enterprise
              上行销售路径，以及企业用量深度正在上升的清晰证据。供应商和合作伙伴披露也显示，生态愿意围绕 OpenAI 以异常规模融资建设容量；相比必须自筹每一次重大建设的公司，这降低了近期执行风险。


              负面案例同样清楚。公开证据仍未披露现金余额、净 burn、runway、已实现企业定价、产品级毛利率、headline 报道之外的伙伴分成机制，或标准化销售效率数据。CNBC 报道称 Microsoft
              经济性被重置，以封顶收入分成付款，这可能有助于未来利润率留存；但已审阅公开材料没有给出量化该收益所需的完整排程。因此，承销结论是混合的：OpenAI
              的收入质量在改善，需求基础真实，但利润率路径和资本充足性仍取决于关于算力合同、客户预付款、折扣和内部现金生成的私有信息。本章能支撑强需求叙事；没有管理层数据，它不能完成一份传统财务尽调。
