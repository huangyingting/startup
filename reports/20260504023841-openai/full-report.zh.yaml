        - 工具可用性、模型目录和 API 兼容性
        - Assistants 迁移到 Responses 的细节演进速度，通常快过大型企业愿意承受的节奏。
      - - 模型层
        - 推理、代码、多模态和长上下文能力底座
        - 公开模型家族包括 GPT-5.5、GPT-5.4、GPT-4.1、GPT-4o，以及 o1 相关 system-card 证据
