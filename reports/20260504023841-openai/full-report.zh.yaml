      - number: '8.4'
        title: 退出就绪度和最终尽调：公开证据方向强，但还不完整到能让投资者下判断
        blocks:
          - type: paragraph
            body: >-
              公开证据已经足以让人认真看待 OpenAI 作为未来流动性候选人的可能。CNBC 把最新融资直接和 IPO 预期挂钩，Reuters 也描述 OpenAI 和 Anthropic
              都在为最终上市铺路。需求、品牌触达和融资能力已经不再是门槛。门槛在披露质量。Microsoft、Oracle 和 Alphabet 都有披露密集的投资者门户；OpenAI 没有，因为它仍是由 Foundation
              控制、通过 OpenAI Group PBC 组织的私营公司。


              在 8520 亿美元估值上，这块缺口比普通成长期估值下更重要。投资者仍无法公开查看把好感转化为可承销 conviction 所需的精确 2026
              年优先权栈、ratchet、清算权、经审计分部收入、客户集中度、确认毛利率、承诺算力流出或现金消耗轨迹。管理层拿出这套材料之前，正确姿态是有纪律的好奇：保持跟进，定义清晰否决触发项，并愿意在价格重置或披露包开始像上市公司级尽调资料室时，重新评估判断。
