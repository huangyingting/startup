        - label: 资本强度与合作伙伴出资建设
          values:
            - label: 中等
              tone: warning
              detail: 巨大的产能目标仍靠交易对手和融资市场撑着。
            - label: 高
              tone: negative
              detail: 承诺投入和商业化节奏一旦错位，会挤压融资和估值。
            - label: 中低
              tone: warning
              detail: 公开可见的缓释主要是交易对手融资和扩产。
            - label: 高
              tone: negative
              detail: 披露仍太薄，风险还不能再下调。
        - label: 领导层与治理集中度
          values:
            - label: 中等
              tone: warning
              detail: 治理确有改善，但集中度仍很明显。
            - label: 高
              tone: warning
              detail: 治理一旦破裂，可能同时扰动合作伙伴、融资和执行。
            - label: 中等
              tone: warning
              detail: 董事会增补和 Fidji Simo 加入能降低风险，但不能消除敞口。
            - label: 中高
              tone: warning
              detail: 剩余敞口仍高于普通软件公司的基线。
    approximationNotes: 该热力图采用有来源支撑的序位评分，而非编造概率；目标是给剩余敞口排序，不是假装精确。
    claimRefs:
      - CR002
      - CR008
      - CR016
      - CR020
      - CR026
      - CR028
      - CR030
      - CR032
      - CI042
      - CR037
      - CR038
      - CR045
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: OpenAI 的主要风险沿少数通道传导：法律与隐私负担、平台集中度、可靠性事件，最终都会落到客户信任、利润率、融资需求和估值上。
    data:
      nodes:
        - id: legal
          label: 法律 / 监管负担
          detail: 版权、隐私和 AI Act 合规可能抬高运营开销，也增加客户摩擦。
          tone: warning
        - id: ops
          label: 可靠性 / 安全事件
          detail: 宕机和漏洞利用会打击工作流信任，并加重支持负担。
          tone: warning
        - id: platform
          label: 合作伙伴集中度
          detail: Microsoft、Oracle 和 CoreWeave 共同塑造产能和经济账。
          tone: warning
        - id: trust
          label: 客户信任
          detail: 企业愿不愿继续加深采用，取决于它们如何判断隐私保护和稳定运行能力。
          tone: warning
        - id: margin
          label: 利润率压力
          detail: 算力成本、分成条款和补救成本会挤压经济性。
          tone: negative
        - id: growth
          label: 增长韧性
          detail: 信任或产能走弱，扩张就可能放慢。
          tone: warning
        - id: financing
          label: 融资需求
          detail: 固定承诺更高或商业化更弱，都会抬高对融资的依赖。
          tone: negative
        - id: valuation
          label: 估值风险
          detail: 韧性下降、风险上升，会压低下行支撑。
          tone: negative
      edges:
        - from: legal
          to: trust
        - from: legal
          to: margin
        - from: ops
          to: trust
        - from: ops
          to: margin
        - from: platform
          to: margin
        - from: platform
          to: growth
        - from: trust
          to: growth
        - from: margin
          to: financing
        - from: growth
          to: valuation
        - from: financing
          to: valuation
    approximationNotes: 该图是有来源支撑的定性图：展示因果方向，不编合成概率权重。
    claimRefs:
      - CR001
      - CR016
      - CR026
      - CR028
      - CR030
      - CR032
      - CR034
      - CU006
      - CR036
      - CR045
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: wide
    summary: OpenAI 的依赖网络已不再是一条双边关系，而是跨云、基础设施和渠道伙伴的多节点栈；但这些节点仍足够集中，足以影响判断。
    data:
      nodes:
        - id: microsoft
          label: Microsoft
          detail: 多年合作延长后，Microsoft 同时是云、分销和经济交易对手。
          tone: warning
        - id: oracle
          label: Oracle / Stargate
          detail: 扩张产能，以及与融资绑定的云建设。
          tone: warning
        - id: coreweave
          label: CoreWeave
          detail: 专用基础设施合同与股权层面的利益绑定。
          tone: warning
        - id: accenture
          label: Accenture
          detail: 借助实施能力和渠道杠杆切入企业转型。
          tone: neutral
        - id: openai
          label: OpenAI 运营核心
          detail: 产品、API、企业 GTM 和治理中心。
          tone: positive
        - id: capacity
          label: 算力产能
          detail: 训练和推理供给支撑产品可用性和成本。
          tone: warning
        - id: distribution
          label: 客户分销
          detail: Azure 及伙伴主导的路径，决定谁掌握客户关系。
          tone: warning
        - id: economics
          label: 利润率 / 融资
          detail: 收入分成、合同价值和交易对手融资计划都会影响经济性。
          tone: negative
      edges:
        - from: microsoft
          to: capacity
        - from: microsoft
          to: distribution
        - from: oracle
          to: capacity
        - from: coreweave
          to: capacity
        - from: accenture
          to: distribution
        - from: capacity
          to: openai
        - from: distribution
          to: openai
        - from: microsoft
          to: economics
        - from: oracle
          to: economics
        - from: coreweave
          to: economics
        - from: openai
          to: economics
    approximationNotes: 该依赖关系图只表示方向、不做量化；它标出合作伙伴失灵会在哪里传导进运营或经济账。
    claimRefs:
      - CR026
      - CR027
      - CR028
      - CR030
      - CR032
      - CI042
      - CR033
      - CU055
      - CU056
      - CR043
      - CR044
  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: wide
    summary: 建议的核心，是强需求证据碰上偏紧价格和披露不足；合作伙伴经济性是主要摇摆因素。
    data:
      nodes:
        - id: demand
          label: 需求验证
          detail: OpenAI 的指标包括：2025 年化收入超过 200 亿美元，截至 2026 年 2 月底超过 250 亿美元，每周用户 8 亿，企业客户 100 万。
          tone: positive
        - id: scarcity
          label: 稀缺性溢价
          detail: Anthropic 等前沿模型同业仍能拿到很高的私募估值。
          tone: positive
        - id: price
          label: 8520 亿美元入场价
          detail: 当前轮次已经把高质量执行和商业化预期计入价格。
          tone: warning
        - id: costs
          label: 合作伙伴经济性
          detail: Microsoft 条款、Stargate、Oracle 融资和 CoreWeave 产能共同决定 OpenAI 留下多少经济性。
          tone: warning
        - id: disclosure
          label: 披露缺口
          detail: OpenAI 缺少达到申报文件水准的公开利润率、现金流和优先权条款披露。
          tone: warning
        - id: decision
          label: 继续研究
          detail: 保持跟进，但买入前要么价格更好，要么证据更硬。
          tone: neutral
      edges:
        - from: demand
          to: price
        - from: scarcity
          to: price
        - from: price
          to: decision
        - from: costs
          to: decision
        - from: disclosure
          to: decision
    approximationNotes: null
    claimRefs:
      - CV001
      - CV004
      - CV025
      - CV026
      - CV033
      - CV036
      - CV040
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 只有 OpenAI 能守住高收入倍数，或把收入拉到远高于当前公开年化收入水平，当前估值才显得站得住。
    data:
      items:
        - label: 12 倍收入下所需收入
          value: 71
          detail: 按成熟平台倍数计算，支撑 8520 亿美元估值所需收入，单位为十亿美元。
          tone: negative
        - label: 18 倍收入下所需收入
          value: 47.3
          detail: 按高溢价平台倍数计算，支撑 8520 亿美元估值所需收入，单位为十亿美元。
          tone: warning
        - label: 25 倍收入下所需收入
          value: 34.1
          detail: 按前沿稀缺溢价倍数计算，支撑 8520 亿美元估值所需收入，单位为十亿美元。
          tone: neutral
        - label: 当前年化收入
          value: 25
          detail: MarketScreener/Reuters 报道的 2026 年 2 月底年化收入。
          tone: positive
    approximationNotes: 收入门槛只是用最新公开融资估值做 EV/收入的简单桥接，不是贴现现金流模型输出。
    claimRefs:
      - CV004
      - CV022
      - CV023
      - CV024
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 公开证据能支撑很宽的估值区间，因为倍数选择几乎和增长本身一样重要。
    data:
      items:
        - label: 悲观情形
          low: 250
          mid: 300
          high: 350
          displayValue: $250B-$350B
          detail: 年化收入停滞，估值压缩到接近 12 倍收入。
          tone: negative
        - label: 基准情形
          low: 650
          mid: 720
          high: 800
          displayValue: $650B-$800B
          detail: 收入向 400 亿美元爬升，并享有接近 18 倍的高溢价平台倍数。
          tone: warning
        - label: 乐观情形
          low: 1300
          mid: 1500
          high: 1700
          displayValue: $1.3T-$1.7T
          detail: 收入达到约 600 亿美元，稀缺性溢价维持在接近 25 倍。
          tone: positive
    approximationNotes: 区间是基于情景的收入倍数测算，服务于投委会讨论，不是管理层指引。
    claimRefs:
      - CV004
      - CV019
      - CV022
      - CV023
      - CV024
      - CV039
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: OpenAI 在市场拉力和产品验证上得分极高，但经济性可见度和价格支撑明显低得多。
    data:
      items:
        - label: 市场需求
          score: 9
          detail: 年化收入和 AI 支出增长真实存在，且规模异常大。
          tone: positive
        - label: 客户验证
          score: 9
          detail: 每周用户 8 亿、企业客户 100 万，是顶级规模信号。
          tone: positive
        - label: 护城河 / 稀缺性
          score: 8
          detail: 前沿模型同业估值仍打入稀缺性，能支撑部分溢价。
          tone: positive
        - label: 经济性可见度
          score: 4
          detail: 公开证据对留存利润率、烧钱速度和现金生成仍太弱。
          tone: warning
        - label: 治理 / 执行风险
          score: 4
          detail: 合作伙伴经济性和治理复杂度仍然重要。
          tone: warning
        - label: 估值支撑
          score: 4
          detail: 只有在溢价假设下，当前价格才勉强站得住。
          tone: warning
        - label: 证据质量
          score: 5
          detail: 方向性证据不错，但还不是上市公司级别的披露。
          tone: neutral
    approximationNotes: 分数是为投委会讨论基于公开证据综合出的 0-10 分序位判断。
    claimRefs:
      - CV004
      - CV019
      - CV025
      - CV026
      - CV033
      - CV036
      - CV040
