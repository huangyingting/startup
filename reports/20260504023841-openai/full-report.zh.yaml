    title: 护城河耐久性 / 竞争风险登记表
    columns:
      - 护城河主张
      - 威胁
      - 严重性
      - 缓释/尽调问题
    rows:
      - - OpenAI 的消费者 + API 切入点带来持久心智和分发
        - Anthropic 和 Google 正在拿走企业份额，知名度不等于企业留存
        - 高
        - 要求提供企业净留存、赢单/输单原因，以及消费者起步与 CIO 主导落地之间的拆分
      - - 企业信任控制帮助 OpenAI 通过受监管买家
        - Google、Microsoft、AWS 和 Anthropic 都在宣传竞争性信任或合规控制
        - 中
        - 按受监管垂直行业比较审计材料、留存控制和采购成交率
      - - 前沿模型质量是一道可防守的护城河
        - Bedrock 式多模型路由和快速模型替换会把基础模型层商品化
        - 高
        - 测试工作负载在性能、成本、可靠性和治理之间如何分流
      - - OpenAI 能比小型实验室更强分发
        - Microsoft 和 Google 可以把 AI 卖进买家本来就预算好的续约动作里
        - 高
        - 检查捆绑附加率，以及 OpenAI 被既有套件整合替代的频率
      - - 随着 agent 铺开，转换成本会上升
        - 目前只有 16% 的企业部署算真正 agent，许多系统仍可迁移
        - 中
        - 审阅合同期限、数据导出工具、prompt 可迁移性和模型路由抽象
      - - 开放权重替代品仍居次要地位
        - Llama 和内部自建路径持续改进；当控制权重于最高前沿质量时，它们会变得重要
        - 中
        - 按自托管或采用开放权重模型的意愿切分买方群体，尤其关注欧洲和受监管行业
    notes: 登记表聚焦最可能改变承销假设的耐久性问题，而不是每一场战术产品战。
