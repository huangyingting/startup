      - number: '6.2'
        title: 具名客户证明最强处在受监管知识工作、客服自动化和零售辅助
        blocks:
          - type: paragraph
            body: >-
              最好的公开客户证明并不平均分布在所有分层，而是集中在几个反复出现的 jobs-to-be-done 上。受监管知识工作是最清晰的一类。Morgan Stanley 称 AI @ Morgan Stanley
              Debrief 在取得客户同意后起草笔记、行动项、邮件和 Salesforce 更新；该公司还称 98% 的 Financial Advisor 团队已采用 AI @ Morgan Stanley
              Assistant。BBVA 是另一个高信号金融服务案例：OpenAI 2025 年 11 月案例研究称，员工每周节省约 3 小时，周活使用率达到 83%，员工创建超过 20,000 个自定义 GPT，其中约
              4,000 个经常使用。合在一起，这两个引用说明，OpenAI 可以在重监管环境中走出试点，而这类环境尤其看重工作流质量和信任。


              客服自动化是第二个主要证明集群。Klarna 2024 年 2 月发布称，其 OpenAI 驱动助手首月处理 230 万次对话，覆盖三分之二客服聊天，将重复询问减少 25%，并把解决时间从 11 分钟降至不到 2
              分钟。Intercom 给出的是同一故事更像企业软件的版本。Intercom 称 Fin 在数千名客户中平均解决 41% 的对话；OpenAI 2025 企业报告称 Fin Voice 将延迟降低
              48%，端到端解决 53% 的电话，并让转人工电话快 40%。这些不是泛泛的“AI 助手”推荐语，而是直接绑定客服运营的工作流指标。


              零售辅助是第三个集群。Lowe’s 称 Mylow 为客户提供实时项目指导和产品发现，Mylow Companion 已覆盖 1,700 多家门店的员工。Digital Commerce 360
              独立确认，Mylow 已在 Lowe’s 网站和移动 app 上向登录购物者上线；OpenAI 还称，员工工具运行在与面向客户顾问相同的基础上。Morgan
              Stanley、BBVA、Klarna、Intercom 和 Lowe’s 合在一起形成的模式很重要：OpenAI
              的公开客户引用，在买方能指向具体工作流、可衡量节省时间或明确服务水平改善的场景里最强，而不是靠模糊的创新叙事撑着。
