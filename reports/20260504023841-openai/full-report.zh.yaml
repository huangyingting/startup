  - id: TM004
    title: 增长驱动和约束表
    columns:
      - 驱动/约束
      - 方向
      - 时间
      - 含义
      - 尽调问题
    rows:
      - - 数字劳动力需求
        - 上行
        - 近期
        - 支撑助手和 agent 预算扩张
        - 要求 OpenAI 拆分 pipeline 中席位扩张与 agentic 工作流部署的比例。
      - - 生产力和工资信号
        - 上行
        - 近期
        - 强化企业为高价值 AI 工具付费的意愿
        - 要求客户 ROI 案例，并提供劳动力替代或收入提升证据。
      - - 预算常态化
        - 上行
        - 12-24 个月
        - 暗示 AI 支出正在进入经常性运营预算
        - 要求证明 OpenAI 合同正在替代既有软件或服务支出。
      - - Code-copilot 采用
        - 上行
        - 当前
        - 有利于开发者 API、编程 agent 和技术席位增长
        - 要求 OpenAI 在工程和编程工作负载中相对竞争对手的份额。
      - - 监管合规
        - 下行
        - 当前且加重
        - 放慢受监管行业和高后果工作流的部署
        - 要求产品合规路线图、逐地区准入安排和客户审计要求。
      - - 治理建设
        - 下行
        - 12+ 个月
        - 即使试点显示 ROI，也会推迟全面部署
        - 要求实施服务负担、治理模板和安全审查周期。
      - - 隐私和信任
        - 下行
        - 当前
        - 信任功能是从试点扩张到生产环境的前置条件
        - 要求客户侧隐私控制、保留设置和数据边界例外的证明。
      - - 实施成本和幻觉
        - 下行
        - 当前
        - 抬高服务负担，并收窄值得规模化的用例范围
        - 要求部署成本曲线、人工审核率和生产错误指标。
      - - 多模型切换
        - 混合
        - 当前
        - 维持较高买方权力，并削弱单一供应商锁定
        - 要求按工作负载和细分拆分的留存、胜率和互操作性数据。
    notes: 估值真正要回答的，不是需求有没有，而是 OpenAI 能不能在治理要求和竞争侵蚀买方动能之前，把试用转成可复制、可信、能留存的生产支出。
