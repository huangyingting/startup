  - id: TP003
    title: 定价 / 打包对比
    columns:
      - 供应商
      - 公开套餐
      - 价格/单位/合同模式
      - 包含能力
      - 折扣或未知项
      - 启示
    rows:
      - - OpenAI
        - GPT API + ChatGPT Business / Codex 产品线
        - GPT-5.5 API 每 100 万 tokens 输入 $5 / 输出 $30；Business 打包在 2026 年 4 月调整；Codex 席位按用量计价
        - 前沿 API、缓存输入折扣、商业管理/隐私控制
        - 已审阅定价页没有完整公开当前自助席位价格表；企业条款为定制
        - OpenAI 在 API 经济性上透明，但大型企业实际成交价透明度较低
      - - Anthropic
        - Claude 套餐 + 企业合同
        - claude.ai 列出套餐层级，但已审阅公开材料显示，企业定价仍是定制且按模型而异
        - Claude 产品入口，加上经 Bedrock 和 Vertex 的分发
        - 企业席位标价和折扣未在保留来源中公开
        - 公开价格透明度较低，但采用度仍强
      - - Google
        - Gemini API + Workspace Enterprise 产品线
        - 按 token 计价的 Gemini API，按模型分层；Workspace Enterprise 为联系销售/定制
        - Gemini API，加上企业套件控制和端点/合规功能
        - 边际 AI 成本可埋在更大的 Workspace 合同里
        - Google 既能打直接模型经济性，也能打套件捆绑
      - - Microsoft
        - Microsoft 365 Copilot + Azure OpenAI
        - 取决于附加购买和许可证路径；已审阅公开商业页面没有完整价格表
        - Microsoft 应用里的 Copilot、工作 agent、Azure OpenAI 路径
        - 区域许可证和捆绑折扣在保留来源中不可见
        - 即使 AI 单价难以拆出，Microsoft 也能赢单
      - - Amazon
        - Amazon Q Business + Bedrock
        - Q Business Lite 为 $3/用户/月；Pro 为 $20/用户/月；Bedrock 批量推理在支持模型上比按需低 50%
        - 按席位计费的助手，加多模型服务层
        - 底层 Bedrock 模型经济性随供应商和用量模式变化
        - Amazon 把明确的助手定价和基础设施可选性绑在一起
      - - Meta / 开放权重
        - Llama 4 及托管/开放部署
        - null
        - 开放权重控制权、长上下文、自托管或第三方托管路径
        - 总成本取决于基础设施、优化和运维，而不是单一供应商标价
        - 开放权重降低买方对单一专有 API 的依赖
      - - Mistral
        - Studio + API / 企业部署
        - 存在按模型使用量计价和企业合同，但已审阅官方文档无法完整抽取精确费率
        - 重隐私的平台和企业部署
        - 公开价目表细节比 OpenAI 或 AWS Q 更薄
        - Mistral 更多靠主权和部署灵活性竞争，而不是最清晰的公开标价
    notes: 不受支持或不透明的单元格有意保留为 null 或描述为定制，而不是猜测。
