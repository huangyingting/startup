      - number: '1.4'
        title: 里程碑、法律摩擦与可靠性背景
        blocks:
          - type: paragraph
            body: >
              公司概览必须保留一条后续章节可引用、无需重新争论核心事实的时间线。公开记录支撑的顺序很清楚：2015 年以非营利组织创立，2019 年创建营利性业务，2022 年 5 月领导角色调整，2022 年 11 月推出
              ChatGPT，2023 年 1 月 Microsoft 续签多年投资，2023 年 3 月发布 GPT-4，2024 年 3 月完成治理审查并扩充董事会，2024 年 10 月融资，2025 年 6 月公开回应
              New York Times 数据保留要求，2025 年 10 月资本重组，2026 年 3 月完成融资。这是当前来源集下最好的一条单一记录时间线。


              同一条时间线也说明，OpenAI 不是一个干净的“不惜代价增长”故事。状态历史页面显示，ChatGPT、API、登录、文件处理和特定模型服务反复出现服务事件；这很重要，因为 OpenAI
              现在是企业和开发者的基础设施，而不再只是新奇应用。法律风险也不是历史问题，而是仍在发生：OpenAI 自己的诉讼回应页面、JD Supra 对 New York Times 证据保全争议的分析、Loeb
              的版权诉讼说明，以及 Musk v. Altman 案件卷宗，都显示版权、隐私、非营利使命和治理争议仍是活跃尽调主题。结论不是业务已经坏掉，而是规模、治理和法律复杂度已经成为公司核心身份的一部分。
