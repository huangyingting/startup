      - number: '2.2'
        title: 买方分层、预算与采用路径
        blocks:
          - type: paragraph
            body: >-
              公开证据显示，OpenAI 同时卖进多套买方地图。第一类是广义知识工作市场：OpenAI 明确把 Business 和 Enterprise 套餐作为员工工具销售，而 Microsoft 2025 Work
              Trend Index 显示，领导者优先关注客服、营销和产品开发，并预期数字劳动力会扩充员工队伍。第二类是开发者市场，OpenAI 的 API 和面向开发的定价，与 Menlo 发现的企业采用率最高用例一致：代码
              copilots 的采用率达到 51%。第三类是机构教育，OpenAI 的 ChatGPT Edu 材料把学生、教师、研究人员和校园运营纳入集中化大学采购动作。


              预算归属同样关键。Menlo 数据显示，企业需求不再局限于沙盒式创新团队：60% 支出仍来自创新预算，但 40% 已来自常设预算，而且这部分经常性支出中超过一半来自既有预算重分配。按部门看，支出集中在
              IT、产品与工程、数据科学，但客服、销售、营销、HR、财务和法务也握有有意义的预算。这一模式适配 OpenAI 的 GTM 界面：公司既能通过中央 IT 横向销售，也能靠职能 ROI
              案例纵向切入。采用路径通常仍是从实验到特定职能试点，再到安全和数据集成，最后才进入经常性预算和广泛部署。
