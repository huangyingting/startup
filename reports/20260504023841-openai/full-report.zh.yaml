      - number: '5.3'
        title: 可靠性、信任控制与路线图风险
        blocks:
          - type: paragraph
            body: >-
              信任和运营是产品的一部分，不只是后台职能。OpenAI 的业务数据页面称，ChatGPT Enterprise、ChatGPT Business、ChatGPT Edu、ChatGPT for
              Healthcare、ChatGPT for Teachers 和 API 平台中的组织数据归客户所有，并且默认不用于模型训练。面向消费者的安全页面称，用户可以选择数据是否用于训练和模型改进，并突出
              Advanced Account Security 作为账户保护功能。安全材料还把 OpenAI 的运营循环描述为
              teach、test、share。合在一起，这些材料对尽调有方向性帮助，但仍未给出许多企业买方在没有单独 trust portal 访问时会要求的完整认证与控制包。


              可靠性已经公开到足以影响判断。2026 年 5 月 4 日，状态页面显示一起影响 ChatGPT workspace-connector 写入动作的活跃事件。同一页面披露了 2026 年 2 月至 5
              月期间的汇总 uptime 快照：API 为 99.99%，ChatGPT 为 99.83%，Codex 为 99.98%，FedRAMP 为
              99.93%；同时也提示，单个客户可用性可能因套餐和模型而异。这比许多 AI 创业公司披露得更好，但仍不能替代特定套餐 SLA 条款或支持响应承诺。


              下行背景也来自外部来源。SecurityWeek 在 2025 年末报道称，研究人员攻破了 ChatGPT memory 和 web-search 功能，凸显新便利功能会多快扩大攻击面。The Verge 记录了
              Sora 如何从发布热度快速走向申请关闭，随后 OpenAI 自己的帮助页正式确认了停用路径。结果是一家公司既有快速移动的路线图和越来越可信的信任控制，也可能在几个季度内改变套餐设计、产品可用性和运营假设。
