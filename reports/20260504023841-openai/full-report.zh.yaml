      - 缺失证据
      - 重要性
      - 负责人或尽调路径
    rows:
      - - 2026 年融资栈
        - 1220 亿美元轮次中的优先权顺位、清算权、估值调整条款、最惠国条款（MFN）以及任何老股交易条款。
        - 这些条款决定头部估值对新钱是否经济上真实。
        - 管理层 + 律师会议；融资文件。
      - - 收入质量
        - 按分部打通年化 run-rate 到确认收入的桥，并补充流失率、NRR 和头部客户集中度。
        - 当前公开证据对 run-rate 很强，对耐久性偏弱。
        - CFO 尽调包；收入 cohort 导出。
      - - 利润率留存
        - 按产品线拆分的毛利率，以及扣除 Microsoft/Oracle/CoreWeave 经济性后的毛利率。
        - 不知道 OpenAI 留住多少收入，就无法判断当前倍数。
        - 财务 + 基础设施采购审查。
      - - 承诺支出
        - 算力和数据中心伙伴中的照付不议、预付款和最低承诺义务。
        - 下行不只来自需求弱，也可能来自义务跑赢商业化。
        - 采购和司库排期。
      - - 治理转换路径
        - 任何 IPO 相关治理变化、非营利控制权让步或董事会权利变化。
        - 是否具备公开市场准备度，取决于治理变得可读，也取决于增长继续强劲。
        - 董事会材料和外部律师备忘录。
      - - 现金和资金跑道
        - 当前现金余额、烧钱和融资时点假设，按乐观/基准/悲观需求情景拆分。
        - 即便私募估值巨大，只要资本需求持续跑赢内部生成，估值也会压缩。
        - 司库模型和董事会批准预算。
    notes: 这些要求刻意收窄到投资关键项；每一项都可能改变建议或可接受价格。
