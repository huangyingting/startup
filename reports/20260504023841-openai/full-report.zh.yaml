      - number: '5.2'
        title: 架构、工具与差异化
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的架构在公开材料中越来越明确。公司 2025 年 5 月发布文和开发者参考资料，把 Responses API 定位为 agentic applications 的核心 API
              primitive，支持远程 MCP servers，也内置 image generation、Code Interpreter 和 file search 等工具。实际含义是，OpenAI
              卖的不只是模型推理；它还在卖一层编排层，减少构建者需要自行拼装的工具量。在这一层之上，是 ChatGPT、deep research 和 Codex 等终端用户产品；在其下，是
              GPT-5.5、GPT-5.4、GPT-4.1、o1 和 GPT-4o 等前沿模型家族，每个模型通过文档、定价页和发布说明的组合暴露出来。


              差异化既来自原始模型质量，也来自包装。公开叙事中，GPT-4.1 相比 GPT-4o 改进了编码、指令遵循和长上下文。Codex 把编码变成一个专用的云端软件工程 agent，可以并行处理多项任务。Deep
              research 把联网综合能力产品化为 agent，并在 2026 年 2 月加入受信网站限制、MCP 或 app 连接、实时进度跟踪，以及可打断后继续追问精修。这些是工作流 primitive，而不只是模型
              benchmark。它们重要，是因为它们让 OpenAI 更接近拥有研究、编码和 agent 构建中的经常性 jobs-to-be-done，而不是只在抽象模型质量上竞争。


              最好的公开技术证明仍然不完整。OpenAI 维护第一方 Python 和 Node SDK，模型/系统卡记录覆盖 GPT-4o 和 o1。NIST 对 o1
              的预部署评估提供了少见的政府作者检查点。即便如此，公开来源没有完整披露模型路由逻辑、废弃政策，或直接 OpenAI 交付与 Azure
              等伙伴渠道之间的确切运营分工。因此，技术故事在界面广度和工具集成上很强，但在企业承销人想要更深部署证据的位置仍不完整。
