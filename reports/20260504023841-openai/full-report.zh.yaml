      - number: '3.2'
        title: 竞争者类别画像：OpenAI 哪里最强，哪里对手更锐利
        blocks:
          - type: paragraph
            body: >-
              Anthropic 是最清晰的直接产品威胁。Anthropic 官方材料显示，Claude 横跨商业和企业界面销售，并通过 Amazon Bedrock 和 Google Cloud Vertex AI
              分发；独立报道则显示 Claude 赢得企业编码叙事，并从 OpenAI 手中拿走企业用量份额。Google 的竞争方式不同：Gemini 不只是模型 API，也是更大的 Workspace 和 Google
              Cloud 采购界面的一部分，已有合规、安全和终端管理功能。Microsoft 的威胁更偏分发。它的 Copilot 界面嵌在 Microsoft 365 和 Teams 里，Azure OpenAI
              则提供一条并行的开发者和企业路线。Amazon 的姿态不是押一款旗舰助手，而是卖可选性：Bedrock 让买方在 Anthropic、Meta、Mistral 和 Amazon 模型之间选择，Amazon Q
              则提供明确按席位收费的内部知识工作助手。


              Meta Llama 和 Mistral 即便不主导闭源模型份额，也仍然重要。Llama 给企业和构建者一条开放权重后路，并带有长上下文多模态能力；Mistral
              则卖隐私和数据主权叙事，在欧洲的说服力强于许多美国对手。合在一起，这些替代方案限制了专有实验室单靠模型独占性建护城河的上限。
