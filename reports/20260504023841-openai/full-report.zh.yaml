      - number: '4.3'
        title: 成本结构与资本强度：算力主导承销故事
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的公开财务图景中，主导因素不是工资或销售费用，而是算力和伙伴经济性。OpenAI 自己在 ChatGPT Pro
              发布中明确说，更高级模型需要显著更多算力；这是官方材料中最干净的解释，说明为什么单看标价几乎看不出利润率。公司当前的基础设施姿态，通过一组异常庞大的生态承诺变得可见：Stargate 项目计划四年投资 5,000
              亿美元，并立即部署 1,000 亿美元；CoreWeave 另行宣布一份最高 119 亿美元的 OpenAI 基础设施合同，以及 OpenAI 对其 3.5 亿美元股权投资；Oracle 也多次把主要
              backlog 增长和融资计划与 OpenAI 相关 AI 需求联系起来。


              Oracle 披露尤其重要，因为它显示相当一部分 capex 负担由供应商和融资伙伴中介，而不是透明地落在 OpenAI 自己已发布的资产负债表上。Oracle 2025 年 3 月称已与 OpenAI
              签署云协议，并预计拿到第一份 Stargate 合同，同时当年把数据中心容量翻倍。到 2026 年 2 月，Oracle 称计划融资 450 亿至 500 亿美元，以为包括 OpenAI 在内的客户扩建 OCI
              容量；到 2026 年 3 月，它又称大规模 AI 合同 backlog 的大部分跃升，可以由客户预付款或客户提供 GPU 支撑。这并不让 OpenAI
              变成轻资本公司；它意味着部分融资负担转移进合作伙伴资产负债表、供应商合同和预付款结构，而公开投资人仍无法把这些项目完整净额化。
