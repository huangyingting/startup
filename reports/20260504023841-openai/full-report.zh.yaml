      - number: '7.2'
        title: 运营可靠性和安全风险已经是平台风险，不再是边缘问题
        blocks:
          - type: paragraph
            body: >-
              OpenAI 已经不是一个宕机只会让人烦躁的新奇应用。状态历史现在显示，ChatGPT、API、登录、文件处理和特定模型服务都反复出现事故；2026-05-04
              的连接器写入事故正好说明，可靠性为什么已经变成核心尽调变量。公开的 uptime 数字方向上很强，但 ChatGPT 99.83% 的 uptime 仍足以在 OpenAI
              嵌入研究、编程、支持和受监管工作流后造成可见中断。因此，一个前沿 AI 平台可以总体可用性很高，同时对那些一个连接器或一个模型路由坏掉就停工的买家来说，仍然存在运营风险。


              安全风险也是同样的结构。SecurityWeek 关于 memory 和网页搜索功能漏洞的报道显示，便利功能扩大攻击面的速度可以非常快。OECD.AI 事故记录和 OpenAI 自己关于 Axios
              入侵事件的回应表明，软件供应链问题已不是假设风险。OpenAI 在公开层面确实有实质缓释：安全和隐私页面、漏洞报告流程、bug bounty
              计划。但这些是控制信号，不等于公共用户和企业客户已经看到足够的事后复盘、红队证据或合同支持的服务承诺，可以有把握地判断剩余风险。
