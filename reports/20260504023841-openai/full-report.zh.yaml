    rows:
      - - 企业员工
        - CIO、COO 或转型负责人
        - 普通知识工作者和管理者
        - 公司出资的席位部署，用于生产力、搜索和跨职能辅助
        - 中央 IT 加共享转型预算
        - 需要在守住安全和治理的同时补上产能缺口
      - - 开发者和工程
        - CTO、工程 VP、平台负责人
        - 软件工程师、DevOps 和技术项目团队
        - 工程预算支持的 copilot、agent 工作流和按 token 定价 API
        - 产品 + 工程和平台预算
        - 编程 copilot 和核心技术工作流自动化具有高 ROI
      - - 客户支持
        - 支持运营或 CX 负责人
        - 联络中心坐席和客户服务经理
        - 支持自动化、检索和 chatbot 工作流
        - 支持与运营预算，并与 IT 合作
        - 需要 24/7 响应能力和降低每次联系成本
      - - 销售和营销
        - CRO、CMO 或 rev-ops 负责人
        - 销售、营销人员和 campaign 团队
        - 内容生成、潜客开发和 pipeline 工作流
        - 销售和营销预算
        - 需要更快产出内容，并提高一线团队生产力
      - - 高等教育
        - 教务长、CIO、采购负责人
        - 学生、教师、研究人员和行政人员
        - 面向教学、研究和校园运营的机构级 AI 部署
        - 大学中央行政和 IT
        - 需要可负担的安全访问，以及学术和行政生产力
      - - 受监管专业职能
        - 总法律顾问、CFO、合规负责人，或临床/金融运营负责人
        - 律师、财务人员、临床人员和专业运营人员
        - 法律、金融和医疗中重文档或重判断的工作流
        - 带治理监督的职能预算
        - ROI 潜力强，但规模化前要经过更重的隐私、准确性和监管审查
