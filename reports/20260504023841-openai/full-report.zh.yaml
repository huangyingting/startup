        - 公开信任披露方向上有用，但许多买方级材料仍受限或缺失。
    notes: OpenAI 的架构最好理解为一套分层运营栈：顶部是工作区，中间是 agent，Responses/工具负责编排，模型是能力引擎，信任/运营在底层提供控制。
