  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 以客户工作流理解产品界面
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的产品界面现在是一个组合，而不是单一聊天机器人。公司公开 Business 页面把 ChatGPT Business 和 Enterprise 描述为员工产品，提供无限聊天、高级模型访问、共享
              workspace 管理，以及包括 Codex 和 workspace agents 在内的专门 agent。帮助中心材料显示，Business 产品在 2026 年 4 月 2 日发生实质变化：现在同时支持标准
              ChatGPT 席位和按用量计费的 Codex 席位，说明 OpenAI 正在变现不同工作流，而不只是打包一个通用席位。定价界面也强化了这一理解。ChatGPT 公开定价页覆盖
              Free、Go、Plus、Pro、Business 和 Enterprise；API 平台则单独公布旗舰模型的 token 价格和上下文窗口限制。


              对买方来说，运营含义是 OpenAI 有三种主要交付模式。第一，ChatGPT 作为终端用户 workspace，承载广义知识工作任务。第二，deep research 和 Codex 等专用
              agent，把研究和软件开发中的更高自主性工作流产品化。第三，API 平台和 Responses API 给开发者一条可编程路径，接入同一模型家族。这个组合扩大了 OpenAI
              可触达的预算所有者，但也让尽调更依赖具体 SKU。评估 ChatGPT Business 的团队应关心管理控制和席位经济性；评估 API 的开发团队应关心模型定价、上下文和工具访问；评估 Codex
              的软件团队应关心任务自主性和互联网权限。


              公开路线图还显示，OpenAI 愿意快速扩张，也愿意快速下线产品界面。Deep research 和 Codex 在 2025 与 2026 年快速从发布走向更广泛权益；Sora 则反向移动，消费者体验在
              2026 年 4 月关闭，API 计划于 2026 年 9 月 sunset。这个组合让 OpenAI 的产品栈显得雄心很大、商业覆盖很广，但也意味着不能只凭发布动能假定产品会长期存在。
