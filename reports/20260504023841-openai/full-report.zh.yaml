      - number: '6.3'
        title: 扩张在用量代理指标上很强，但仍缺少 SaaS 式耐久性披露
        blocks:
          - type: paragraph
            body: >-
              判断留存韧性，最有力的证据不是公开披露的 NRR，而是 OpenAI 自己的参与度数据已经显示出多深的工作流嵌入。2025 企业报告称，Enterprise 每周消息数增长 8 倍，Custom GPT 和
              Projects 的周活用户年初至今增长 19 倍，约 20% 的 Enterprise 消息已经跑在这些结构化工作流里，工作场景席位超过 700
              万。这些都是有用的“落地后扩张”信号，因为它们说明客户不只是买席位然后闲置。报告还称，75% 受访员工表示输出质量或速度提升，75% 表示现在能完成过去做不了的任务，企业用户估计每个活跃日节省 40–60
              分钟。合在一起看，OpenAI 进入一个账户后，继续向更多职能扩张这件事是说得通的。


              即便如此，公开材料仍明显弱于成熟企业软件尽调所需要的证据包。OpenAI 的企业隐私页面方向上有帮助：客户拥有并控制业务数据，OpenAI
              默认不会用业务数据训练，部分企业计划还允许客户控制保留期限。这些披露大概率有助于敏感环境里的采购和扩张。但它们没有回答更硬的商业问题：公开材料里仍没有
              NRR、GRR、流失率、标准合同期限、最低席位要求、折扣区间，也没有头部客户集中度表。


              这块披露缺口之所以重要，是因为外部基准提醒人谨慎。ChartMogul 的 AI 流失报告警告，部分 AI 合约带有三个月退出条款，退出率达
              70–80%；实验性收入或高度按用量计费的收入，可能比实际更像可持续收入。High Alpha 的 2025
              基准从上行角度给出相反提示：公司规模做大后，扩张收入会成为主要增长引擎，结果对齐的定价也能支撑更好的留存。合理的综合判断是，OpenAI
              的扩张动能显然很强，但公开披露仍没有证明，今天的采用能否转化为上市公司级企业软件通常要证明的续约和 cohort 韧性。
