  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议：质量真实，但入场价仍跑在公开披露前面
        blocks:
          - type: paragraph
            body: >-
              OpenAI 显然已经不再按投机性原型定价。第三方报道称，公司 2025 年年化收入超过 200 亿美元，到 2026 年 2 月底超过 250 亿美元；OpenAI 自己也称 ChatGPT 每周服务超过 8
              亿用户，且超过 100 万企业客户直接使用其产品。这些都是顶级需求信号，也解释了为什么资本仍愿意在前所未有的规模上涌向公司。


              话虽如此，当前决策仍应对价格敏感，而不是对崇拜敏感。CNBC 的 2026 年 3 月融资报道把入场估值定在 8520 亿美元，Reuters
              随即把挑战描述为在这个估值上找到焦点。公开证据支持溢价倍数，但不支持把这个价格视为显然便宜。市场实际上是在被要求提前承销 run-rate
              收入转化、伙伴融资的基础设施扩张和未来公开市场接纳度，而在此之前，投资者还看不到申报级别的利润率、烧钱、优先权或现金流数据。这组条件足以支持“继续深入研究”的判断，但不足以在当前估值给出买入建议。
