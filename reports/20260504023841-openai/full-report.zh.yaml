      - number: '3.3'
        title: 切换成本、锁定、多家并用与护城河耐久性
        blocks:
          - type: paragraph
            body: >-
              OpenAI 仍有真实竞争耐久性，但这种耐久性有条件，并非自动成立。公司受益于 ChatGPT 熟悉度、API
              广度，以及默认不使用业务数据训练等企业隐私承诺；这些因素帮助它同时拿下开发者预算和知识工作者预算。不过，同一批公开证据也说明，商品化风险已经是核心尽调事项。Menlo 2025 数据中，Anthropic
              已在企业 LLM 支出和编码份额上超过 OpenAI；Google 和 Microsoft 能把 AI 采购藏进更大的套件续约；Amazon Bedrock 则把多模型路由变成一流运营模式，而不再是定制工程项目。


              因此，这个市场的结构性锁定低于经典 SaaS。买方可以多家并用模型，把席位预算留给既有套件，也可以把敏感工作负载转向开放权重或主权导向替代方案。Menlo 发现只有 16% 的企业部署算真正
              agent，这一点也重要：许多现实系统仍足够简单，价格、治理或可靠性变化时可以迁移到别的供应商。对 OpenAI
              来说，护城河不再主要取决于它是不是唯一可信的模型实验室，而在于能否同时在质量、开发者体验、信任和分发上持续明显领先。
