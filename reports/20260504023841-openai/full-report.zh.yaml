      - number: '1.3'
        title: 资本基础、利益相关方地图与公开规模
        blocks:
          - type: paragraph
            body: >
              OpenAI 的资本画像已经自成一档。公开报道和公司材料支撑了一条清晰序列：从 2023 年 1 月 Microsoft 合作伙伴关系延长，到 2024 年 10 月以 1,570 亿美元投后估值完成 66
              亿美元融资，再到 CNBC 和 Bloomberg 报道的 2026 年 3 月融资，规模 1,220 亿美元、投后估值 8,520 亿美元。同一批材料也指向一套利益相关方结构：资本重组后，OpenAI
              Foundation 持有 OpenAI Group 约 26%，Microsoft 约 27%；Amazon、Nvidia、SoftBank、Thrive 及其他财务投资人则对 OpenAI
              未来融资能力和谈判筹码产生实质影响。


              公开规模指标亮眼，但支撑力度并不均匀。Forbes 将 OpenAI 总部列为旧金山，称截至 2025 年 12 月有 6,400 名员工，并报告 2025 年营收 37 亿美元。同一公司档案称，ChatGPT
              周活用户约 5 亿，付费企业用户约 200 万。这些数字有助于判断成熟度和规模，但公开报道仍未给出完全对齐的股权结构表、精确的累计合并融资总额，也没有金融承销人想看的已实现定价、利润率或 cohort
              质量颗粒度。因此，后续章节应把这些数字作为公开参照点，而不是把它们当成完整数据室资料的替代品。
