      - number: '8.3'
        title: 情景逻辑：上行存在，但下行路径更容易用公开证据解释
        blocks:
          - type: paragraph
            body: >-
              多头情景并不难描述。如果 OpenAI 能继续把前沿模型领先转化为企业支出，守住消费者规模，并在伙伴经济性改善的同时，把 run-rate
              收入变成耐久的确认收入，公司就有可能复利长成足以支撑甚至超过当前估值的收入基数。Microsoft 收入分成上限重置在这里很重要，因为收入基数已经以数百亿美元计，留存经济性哪怕边际改善，也会产生很大差异。


              基准和空头情景更容易由公开证据支撑。OpenAI 正同时尝试把消费者使用、企业工作流、开发者需求和基础设施级伙伴关系货币化，同时又计划承担按软件标准看极其庞大的算力支出和供应商承诺。Stargate 5000
              亿美元雄心、Oracle 为 OCI capacity 制定的 450 亿至 500 亿美元融资计划，以及 CoreWeave 119 亿美元 OpenAI
              合同，都指向同一个事实：估值压缩不需要需求崩塌。只要收入转化、利润率捕获或伙伴杠杆低于 8520 亿美元估值已经内含的预期，就足够了。
