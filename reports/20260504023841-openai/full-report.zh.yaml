  - id: TP001
    title: 竞争对手画像表
    columns:
      - 竞争对手
      - 类别
      - 规模/融资
      - 目标客群
      - 差异化
      - 短板
    rows:
      - - OpenAI
        - 直接前沿实验室 + 平台
        - 公开认知中的领先者，覆盖消费者和 API；Menlo 2025 显示其占企业 LLM 支出的 27%
        - 开发者、企业、教育、专业消费者
        - ChatGPT + API 广度 + 隐私控制
        - 企业份额正受 Anthropic 和 Google 挤压；实际成交价并未完全公开
      - - Anthropic
        - 直接前沿实验室
        - CNBC 报道 2025 年 3 月估值 615 亿美元；Menlo 2025 显示其占企业 LLM 支出的 40%
        - 企业买家和代码密集型团队
        - 代码能力、安全品牌、经由 Bedrock 和 Vertex 的多云分发
        - 企业合同价格在公开层面仍大多不透明
      - - Google Gemini
        - 既有套件厂商 + 超大云
        - Menlo 2025 显示其占企业 LLM 支出的 21%，并嵌入 Workspace/Cloud 分发
        - Workspace 账户、开发者、IT 主导的部署
        - 捆绑能力、合规姿态、Google 基础设施
        - 企业 Gemini 合同的确切价格仍是定制/联系销售
      - - Microsoft Copilot / Azure OpenAI
        - 既有套件厂商 + OpenAI 渠道
        - Microsoft 365 预算内领先的横向 copilot 阵营
        - 标准化在 Microsoft 体系上的企业和 Azure 开发者
        - 工作应用里的 Copilot、agent builder、Azure OpenAI 路径
        - 已审阅的商业页面没有公开完整价格表
      - - Amazon Bedrock / Amazon Q
        - 基础设施聚合器 + 助手
        - Bedrock 支持多模型，Amazon Q 明确公布按用户席位定价
        - 以 AWS 为中心的构建者和内部知识工作团队
        - 模型选择、更低批处理价格、治理护栏
        - 在广泛终端用户心智中，助手品牌弱于 ChatGPT 或 Copilot
      - - Meta Llama
        - 开放权重替代品
        - 按采用度看是企业开源领导者，但开源份额仍只有 11%
        - 追求控制权、自托管或降低依赖的构建团队
        - 开放权重部署、多模态长上下文、成本效率
        - 企业采用闭源模型的速度仍快于开放权重
      - - Mistral
        - 面向隐私和主权的替代方案
        - CNBC 报道 2025 年 9 月估值 140 亿美元
        - 以欧洲为重点、重视隐私的企业和构建者
        - 企业隐私、数据所有权、部署灵活性
        - 与更大对手相比，公开采用份额和精确价目表信息更薄
      - - 基于开放模型 + 云工具的内部自建
        - 现状方案 / 替代品
        - 76% 的用例仍是外购，但在控制要求很高的工作流里，内部自建依然可行
        - 内部 AI 工程能力强且数据受限的团队
        - 最大控制权和供应商可选性
        - 相比购买成品，见效更慢、集成负担更重
    notes: 各行覆盖了严肃 OpenAI 买家在 2026 年可以选择的主要直接、既有、相邻、替代和内部自建方案。
