      - number: '7.3'
        title: 依赖、资本强度和执行跨度，会把风险传导到利润率和估值
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的伙伴栈既是护城河，也是集中度问题。Microsoft 从 2023 年合作延伸以来仍是基础性伙伴，公开记录也继续把 Azure 视为研究、API 和产品的结构性核心。Oracle 和
              Stargate 更适合解读为部分多元化，而不是独立：它们增加了产能和融资选项，但也增加了第二层交易对手，而这些交易对手自己的资本计划现在已经明确引用 OpenAI 需求。CoreWeave
              则增加了第三个集中节点：最高 $11.9B 的基础设施协议，再加上 OpenAI 参股。任一关系如果重新定价、停滞或交付不足，损害都可能传导到产品可用性、毛利率和融资需求，而不是只留在采购环节。


              财务模型风险在于，公开需求代理指标是真实的，但公开的耐久性和义务数据不完整。OpenAI 的 2025 企业报告显示，企业消息增长 8 倍、推理 token 消耗增长 320
              倍，这意味着宕机、合规限制或渠道冲击现在会打到比一年前大得多的已安装工作流基础。但 ChartMogul 关于短退出期 AI 合约、以及收入在真正耐久前看似经常性的警告，是必要的校正。领导层广度正在改善，尤其是
              Fidji Simo 接任 Applications 角色；但公司仍要求投资者相信，它能同时跑好研究、消费者、企业、API 和伙伴多条战线，却没有公开足以闭环的继任、P&L 或承诺支出细节。
