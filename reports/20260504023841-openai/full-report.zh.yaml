chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >
              OpenAI 将自己定义为一家 AI 研究与部署公司，使命是确保通用人工智能惠及全人类。在现有架构下，这一使命由两个相连实体承载：非营利的 OpenAI
              Foundation，以及负责把公司模型和产品商业化的营利性公益公司 OpenAI Group PBC。Foundation 治理 Group，而不只是被动持股；这和传统 VC
              支持的创业公司有实质差异，后续章节也应把它作为核心尽调事实反复使用。


              运营模式之所以重要，是因为 OpenAI 同时是研究实验室、消费级产品公司、API 平台和企业基础设施依赖。公开材料显示，公司靠 ChatGPT、API、企业产品和 Azure
              相关渠道分发模型，同时保留一套使命治理结构，意在把商业化和更广泛的公共利益目标绑在一起。这套结构不是门面：OpenAI 称 Foundation 任命 OpenAI Group 董事会并可更换董事，而 Group
              本身按公益公司组织，需要考虑更广泛的利益相关方。结果是，分析 OpenAI 时必须同时把它看作高速扩张的软件平台，也看作对治理高度敏感的机构。
