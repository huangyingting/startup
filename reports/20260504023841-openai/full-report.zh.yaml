        - OpenAI 将当前 run-rate 转化为 600 亿美元收入，留存经济性改善，同时继续拿到前沿模型稀缺性溢价。
        - 按 25 倍收入计算，股权价值可接近 1.5 万亿美元，摊薄前约为当前估值的 1.8 倍。
        - 需要产品领先持续、伙伴配合，并且没有重大治理或监管断裂。
        - 中低
      - - 基准
        - 收入扩大到约 400 亿美元，公私市场投资者给予 18 倍倍数，接近高端但不是亢奋的平台估值。
        - 隐含价值约 7200 亿美元，低于当前 8520 亿美元入场估值。
        - 即便执行不错，也未必跑赢倍数正常化。
        - 中
      - - 悲观
        - 收入停在当前约 250 亿美元 run-rate 附近，市场按更成熟的基础设施/软件平台给 OpenAI 12 倍估值。
        - 隐含价值约 3000 亿美元，相比最新轮估值有严重下行。
        - 即使需求没有崩，利润率或伙伴经济性不及预期也足以触发压缩。
        - 中
