      - number: '8.2'
        title: 价格背景：OpenAI 相对上市巨头偏贵，但相对前沿 AI 稀缺性并不荒谬
        blocks:
          - type: paragraph
            body: >-
              最有用的估值框架不是单一比率，而是一组比率。用最新公开 run-rate 证据看，OpenAI 8520 亿美元估值意味着，按 2026 年 2 月底数字约为年化收入的 34.1 倍，按 2025 年底数字约为
              39.8 倍。这些水平远高于 Microsoft、Oracle 等上市平台，用当前市值和收入数据看，后两者大约分别是 10.1 倍和 7.7 倍。单看这个镜头，OpenAI 是偏紧的。


              但同一组数据也说明，当前价格并没有明显脱离前沿 AI 私募市场行为。Anthropic 2026 年 2 月融资，对 Reuters 后来归因给它的年化收入数字，隐含约 42.2 倍；Palantir
              在公开市场约按过去收入的 77.3 倍交易。因此，OpenAI 落在一个不舒服的中间位置：明显贵于多元化上市巨头，但又没有明确贵于能找到的最佳前沿模型或 AI 溢价可比公司。承销问题在于，OpenAI
              缺少公开申报文件，投资者无法判断它到底应该落在哪个可比桶里。
