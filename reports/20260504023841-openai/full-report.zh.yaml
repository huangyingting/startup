      - number: '2.3'
        title: 增长驱动、采用约束与估值相关性
        blocks:
          - type: paragraph
            body: >-
              需求侧驱动力很强。Microsoft 报告称，82% 的领导者认为 2025 年是关键战略年份，82% 预期未来 12 至 18 个月会增加数字劳动力。PwC 2025 Jobs Barometer
              用可衡量的劳动力市场证据强化了这一信号：具备 AI 技能的员工享有 56% 薪资溢价，受 AI 影响的岗位继续增长，AI 暴露度最高的行业在人均收入增长上显著快于暴露度较低的行业。McKinsey
              还给出一张功能地图，显示约 75% 的经济上行集中在客户运营、营销与销售、软件工程和 R&D。OpenAI 的助手、API 和 agent 模式，正好能在这些工作流里争取预算。


              制动力同样实质。Deloitte 显示，大多数组织仍预期近期只有一小部分实验能完全规模化，尽管最先进项目的 ROI 往往为正。监管合规成为 Deloitte 报告中排名第一的障碍，治理项目推进缓慢，Menlo
              的失败试点数据则显示，实施成本、数据隐私、ROI 落差和幻觉仍是持续失败模式。这就是为什么 OpenAI 的隐私承诺具有商业意义：信任、保留控制和企业身份功能不是装饰性卖点，而是预算从试点走向生产的前提。欧盟
              AI Act、OECD 问责框架和 NIST 风险管理指南都强化同一结论：OpenAI 所处市场需求真实且在扩大，但在受监管或高后果工作流中，估值应对较慢规模化打折，直到治理和价值证明能逐个客户跑通。
