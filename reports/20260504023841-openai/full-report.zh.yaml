  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与规模测算口径
        blocks:
          - type: paragraph
            body: >-
              OpenAI 的相关市场不是整个 AI 技术栈。公开产品页显示，公司有三块直接变现界面：面向员工的 ChatGPT Business 和 Enterprise 套餐，面向开发者和软件团队、按 token 定价的
              API 用量，以及面向大学的独立教育产品。这个边界很重要，因为 Gartner 对 2025 年生成式 AI 6,440
              亿美元的预测，是一个宽口径、自上而下的支出口径，包含设备、服务器、软件和服务等类别；相比之下，Menlo 的 138 亿美元企业支出和 46 亿美元应用层支出，更接近真正流向基础模型应用和 copilots
              的预算。投资判断中，实用市场边界应包括按席位收费的企业助手、按用量计费的开发者和 agent 工作流，以及高校等机构部署；应排除通用硬件更新、hyperscaler 基础设施
              capex，以及不直接变现模型或助手的非 GenAI 软件模块。


              McKinsey 的价值池研究仍有用，但更适合作为外层天花板，而不是直接收入池。其每年 2.6 万亿至 4.4
              万亿美元的估算解释了为什么这个类别能拿到溢价估值，但实际支出仍远低于该上限，并且高度受组织变革、集成和治理制约。对 OpenAI 的关键含义是：公司受益于真实庞大的需求背景，但直接 SAM
              应通过企业应用预算和模型用量预算来界定，而不是套用整个头条式 AI 经济。
