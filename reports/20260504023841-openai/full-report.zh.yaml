  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与公开牵引力：变现面广，但结构披露不完整
        blocks:
          - type: paragraph
            body: >-
              OpenAI 现在不是靠单一 SaaS 套餐变现，而是通过几块不同界面赚钱。公开公司材料显示，收入面包括 ChatGPT Plus 和 Pro 消费订阅、自助式 ChatGPT Business
              席位、按用量计费的 Codex 席位、定制 Enterprise 合同、按 token 定价的 API
              用量，以及由合作伙伴中介的分发或基础设施关系。这个广度很重要，因为它降低了对单一买方分层的依赖；但也意味着公开记录混在一起的是席位定价、token
              定价、订阅和谈判得来的商业条款，彼此不能直接比较。最干净的定价证据仍是消费者和 API 标价；Business 和 Enterprise 在已审阅公开材料中只部分透明。


              公开牵引力足以证明需求，但不足以对齐收入质量。OpenAI 自己 2025 年 12 月的企业报告称，ChatGPT 服务超过 8 亿周活用户；TechCrunch 报道称，企业消息量自 2024 年 11
              月以来增长 8 倍，API reasoning-token 用量同比增长 320 倍，自定义 GPT 用量增长 19 倍并占企业消息的 20%。Forbes 公司档案还给出 2025 年营收 37
              亿美元这一公开参照点。关键承销细节是，TechCrunch 也报道 OpenAI 大部分收入仍来自消费者订阅；这意味着企业采用正在快速上升，但尚未完全取代消费者收入成为经济重心。
