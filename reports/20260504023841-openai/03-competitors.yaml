  - id: T303
    title: Pricing / packaging comparison
    columns:
      - vendor
      - public package
      - price/unit/contract model
      - included capabilities
      - discount or unknowns
      - implication
    rows:
      - - OpenAI
        - GPT API + ChatGPT Business/Codex
        - >-
          GPT-5.5 API at $5 input / $30 output per 1M tokens; Business packaging changed in April 2026; Codex seats are
          usage-priced
        - Frontier API, cached-input discounting, business admin/privacy controls
        - Exact current self-serve seat card is not fully exposed on reviewed pricing pages; enterprise terms custom
        - OpenAI is transparent on API economics but less transparent on large-enterprise realized pricing
      - - Anthropic
        - Claude plans + enterprise contracts
        - >-
          claude.ai lists plan tiers, but enterprise pricing remains custom and model-specific in reviewed public
          materials
        - Claude surfaces plus distribution via Bedrock and Vertex
        - List pricing for enterprise seats and discounts not public in retained sources
        - Strong adoption despite lower public pricing transparency
      - - Google
        - Gemini API + Workspace Enterprise
        - Token-priced Gemini API with model-specific tiers; Workspace Enterprise is contact-sales/custom
        - Gemini API plus enterprise suite controls and endpoint/compliance features
        - Marginal AI cost can be buried inside broader Workspace contracts
        - Google can compete on both direct model economics and suite bundling
      - - Microsoft
        - Copilot for Microsoft 365 + Azure OpenAI
        - Add-on and license-path dependent; reviewed public business page did not expose a complete price card
        - Copilot in Microsoft apps, agents for work, Azure OpenAI route
        - Regional licensing and bundle discounts are not visible in retained sources
        - Microsoft can win even when its AI unit price is hard to isolate
      - - Amazon
        - Amazon Q Business + Bedrock
        - >-
          Q Business Lite $3/user/month; Pro $20/user/month; Bedrock batch inference is 50% below on-demand across
          supported models
        - Seat-based assistant plus multi-model model-serving layer
        - Underlying Bedrock model economics vary by provider and usage pattern
        - Amazon pairs explicit assistant pricing with infrastructure optionality
      - - Meta / open weights
        - Llama 4 and hosted/open deployments
        - null
        - Open-weight control, long context, self-hosting or third-party hosting paths
        - Total cost depends on infra, optimization, and operations rather than a single vendor list price
        - Open weights cap buyer dependence on a single proprietary API
      - - Mistral
        - Studio + API / enterprise deployment
        - >-
          Model-specific usage pricing and enterprise contracts exist, but exact rates were not fully extractable from
          the reviewed official docs
        - Privacy-focused platform and enterprise deployments
        - Public rate-card detail is thinner than for OpenAI or AWS Q
        - Mistral competes more on sovereignty and deployment flexibility than on the clearest public list pricing
    notes: Unsupported or opaque cells are intentionally left null or described as custom rather than guessed.
