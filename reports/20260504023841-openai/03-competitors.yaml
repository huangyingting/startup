callouts:
  - calloutType: insight
    title: Anthropic is now the direct enterprise-share benchmark, not a distant challenger
    body: >-
      Independent 2025 evidence no longer supports treating OpenAI as the unchallenged enterprise model leader.
      Anthropic has already passed it in both broad enterprise LLM spend and coding-heavy share in Menlo’s data.
    claimRefs:
      - C155
      - C156
  - calloutType: strength
    title: OpenAI still combines developer reach, product familiarity, and trust controls unusually well
    body: >-
      OpenAI remains one of the few vendors with broad consumer usage, explicit business-data controls, and transparent
      flagship API pricing on the public web.
    claimRefs:
      - C123
      - C125
      - C126
      - C127
  - calloutType: risk
    title: Bundle power and multi-model infrastructure reduce classic SaaS-style lock-in
    body: >-
      Google, Microsoft, and Amazon can all win AI budget without beating OpenAI on every model benchmark because they
      control adjacent procurement surfaces or multi-model routing layers.
    claimRefs:
      - C144
      - C158
      - C159
      - C161
