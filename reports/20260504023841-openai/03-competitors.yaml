  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - moat claim
      - threat
      - severity
      - mitigation/diligence ask
    rows:
      - - OpenAI’s consumer-plus-API wedge creates durable mindshare and distribution
        - Anthropic and Google are taking enterprise share, so awareness does not guarantee enterprise retention
        - high
        - Ask for enterprise net retention, win/loss reasons, and split between consumer-originated and CIO-led landings
      - - Enterprise trust controls help OpenAI clear regulated buyers
        - Google, Microsoft, AWS, and Anthropic all advertise competing trust or compliance controls
        - medium
        - Compare audit artifacts, retention controls, and procurement-close rates by regulated vertical
      - - Frontier model quality is a defensible moat
        - Bedrock-style multi-model routing and fast model substitution commoditize the base-model layer
        - high
        - Test how much workload is routed on performance versus cost, reliability, and governance
      - - OpenAI can out-distribute smaller labs
        - Microsoft and Google can sell AI inside renewal motions buyers already budget for
        - high
        - Inspect bundle attach rates and how often OpenAI is displaced by incumbent suite consolidation
      - - Switching costs will rise as agents spread
        - Only 16% of enterprise deployments qualify as true agents today, so many systems remain portable
        - medium
        - Review contract duration, data-export tooling, prompt portability, and model-routing abstractions
      - - Open-weight substitutes are still secondary
        - Llama and internal build paths keep improving and can matter where control beats maximum frontier quality
        - medium
        - >-
          Segment buyer base by willingness to self-host or adopt open-weight models, especially in Europe and regulated
          sectors
    notes: >-
      The register focuses on durability questions most likely to change underwriting assumptions, not every tactical
      product battle.
