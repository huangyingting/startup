  - id: section-3
    title: Switching cost, lock-in, multi-homing, and moat durability
    body: >-
      OpenAI still has real competitive durability, but the durability is conditional rather than automatic. The company
      benefits from ChatGPT familiarity, API breadth, and enterprise privacy commitments such as no training on business
      data by default, which help it land both developer and knowledge-worker budgets. However, the same public evidence
      also shows why commoditization risk is now a core diligence item. Anthropic has already overtaken OpenAI in
      enterprise LLM spend and coding share in Menlo’s 2025 data; Google and Microsoft can hide AI procurement inside
      broader suite renewals; and Amazon Bedrock makes multi-model routing a first-class operating model instead of a
      bespoke engineering project.


      The result is a market with lower structural lock-in than classic SaaS. Buyers can multi-home models, hold seat
      budgets with incumbents, or shift sensitive workloads toward open-weight or sovereignty-oriented alternatives.
      Menlo’s finding that only 16% of enterprise deployments qualify as true agents also matters: many real-world
      systems are still simple enough to port across providers if price, governance, or reliability change. For OpenAI,
      the moat therefore depends less on being the only credible model lab and more on staying meaningfully ahead on
      quality, developer ergonomics, trust, and distribution at the same time.
    claimRefs:
      - C124
      - C125
      - C126
      - C145
      - C155
      - C156
      - C157
      - C158
      - C159
      - C160
