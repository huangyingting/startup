      - TP004
tables:
  - id: TP001
    title: Competitor profile table
    columns:
      - competitor
      - category
      - scale/funding
      - target segment
      - differentiation
      - limitation
    rows:
      - - OpenAI
        - Direct frontier lab + platform
        - Public leader with broad consumer/API reach; 27% of enterprise LLM spend in Menlo 2025
        - Developers, enterprises, education, prosumers
        - ChatGPT + API breadth + privacy controls
        - Enterprise share is under pressure from Anthropic and Google; realized pricing is not fully public
      - - Anthropic
        - Direct frontier lab
        - CNBC reported $61.5B valuation in March 2025; 40% enterprise LLM spend in Menlo 2025
        - Enterprise buyers and coding-heavy teams
        - Coding strength, safety brand, multi-cloud distribution via Bedrock and Vertex
        - Enterprise contract pricing is still mostly opaque publicly
      - - Google Gemini
        - Incumbent suite vendor + hyperscaler
        - 21% enterprise LLM spend in Menlo 2025 and embedded Workspace/Cloud distribution
        - Workspace accounts, developers, IT-led deployments
        - Bundle power, compliance posture, Google infrastructure
        - Exact enterprise Gemini contract pricing is still custom/contact-sales
      - - Microsoft Copilot / Azure OpenAI
        - Incumbent suite vendor + OpenAI channel
        - Top horizontal-copilot cohort inside Microsoft 365 budgets
        - Microsoft-standardized enterprises and Azure developers
        - Copilot in work apps, agent builder, Azure OpenAI route
        - Reviewed business page did not expose a complete public price card
      - - Amazon Bedrock / Amazon Q
        - Infrastructure aggregator + assistant
        - Bedrock is multi-model and Amazon Q has explicit user-seat pricing
        - AWS-centric builders and internal knowledge-work teams
        - Model choice, lower batch pricing, governance guardrails
        - Assistant brand is weaker than ChatGPT or Copilot in broad end-user mindshare
      - - Meta Llama
        - Open-weight substitute
        - Enterprise open-source leader by adoption, but open-source share is still only 11%
        - Builders seeking control, self-hosting, or lower dependency
        - Open-weight deployment, multimodal long context, cost-efficiency
        - Closed-model enterprise adoption still outpaces open-weight use
      - - Mistral
        - Privacy- and sovereignty-oriented alternative
        - CNBC reported $14B valuation in September 2025
        - Europe-focused, privacy-sensitive enterprises and builders
        - Enterprise privacy, data ownership, deployment flexibility
        - Public adoption-share and exact rate-card detail are thinner than for larger rivals
      - - Internal build on open models + cloud tools
        - Status quo / substitute
        - 76% of use cases are still bought, but internal build remains viable for control-heavy workflows
        - Teams with strong internal AI engineering and data constraints
        - Maximum control and provider optionality
        - Longer time to value and higher integration burden than buying a finished product
    notes: >-
      Rows cover the main direct, incumbent, adjacent, substitute, and internal-build alternatives that a serious OpenAI
      buyer can choose in 2026.
    enumerationScope:
      coverage: partial
      basis: >-
        This table covers the most material competitor classes visible in public evidence for OpenAI buyers in 2026, but
        it does not enumerate every departmental or vertical AI application vendor.
