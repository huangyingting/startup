      - C404
      - C420
      - C421
  - id: T806
    title: Final diligence asks table
    columns:
      - topic
      - missing evidence
      - why it matters
      - owner or diligence path
    rows:
      - - 2026 financing stack
        - Preference order, liquidation rights, ratchets, MFN clauses, and any secondary terms in the $122B round.
        - These terms determine whether the headline valuation is economically real for new money.
        - Management + counsel room; financing documents.
      - - Revenue quality
        - >-
          Bridge from annualized run-rate to recognized revenue by segment, plus churn, NRR, and top-customer
          concentration.
        - Current public evidence is strong on run-rate and weak on durability.
        - CFO diligence pack; revenue cohort exports.
      - - Margin capture
        - Gross margin by product line and after Microsoft / Oracle / CoreWeave economics.
        - The current multiple is impossible to judge without knowing how much revenue OpenAI retains.
        - Finance + infrastructure procurement review.
      - - Committed spend
        - Take-or-pay, prepayment, and minimum-commit obligations across compute and data-center partners.
        - Downside can come from obligations outrunning monetization, not just from weak demand.
        - Procurement and treasury schedules.
      - - Governance conversion path
        - Any IPO-related governance changes, nonprofit-control concessions, or board-rights changes.
        - Public-market readiness depends on governance becoming legible as well as growth staying strong.
        - Board materials and external counsel memo.
      - - Cash and runway
        - Current cash balance, burn, and financing timing assumptions under bull/base/bear demand cases.
        - Even giant private marks can compress if capital needs keep outrunning internal generation.
        - Treasury model and board-approved budget.
    notes: >-
      These asks are intentionally narrow and investment-critical; each could move the recommendation or the acceptable
      price.
    claimRefs:
      - C374
      - C375
      - C393
      - C401
      - C402
      - C404
      - C411
      - C416
      - C421
figures:
  - id: F801
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The recommendation turns on strong demand proof meeting stretched price and incomplete disclosure, with partner
      economics acting as the main swing factor.
    data:
      nodes:
        - id: demand
          label: Demand proof
          detail: >-
            OpenAI shows >$20B 2025 annualized revenue, >$25B by end-Feb 2026, 800M weekly users, and 1M business
            customers.
          tone: positive
        - id: scarcity
          label: Scarcity premium
          detail: Frontier-model peers such as Anthropic still command very high private valuations.
          tone: positive
        - id: price
          label: $852B entry mark
          detail: Current round already prices in premium execution and monetization.
          tone: warning
        - id: costs
          label: Partner economics
          detail: Microsoft terms, Stargate, Oracle financing, and CoreWeave capacity shape retained economics.
          tone: warning
        - id: disclosure
          label: Disclosure gap
          detail: OpenAI lacks filing-grade public margin, cash-flow, and preference disclosure.
          tone: warning
        - id: decision
          label: Research-more
          detail: Stay engaged, but require either better price or better evidence before buying.
          tone: neutral
      edges:
        - from: demand
          to: price
        - from: scarcity
          to: price
        - from: price
          to: decision
        - from: costs
          to: decision
        - from: disclosure
          to: decision
    approximationNotes: null
    claimRefs:
      - C372
      - C375
      - C399
      - C400
      - C411
      - C416
      - C421
