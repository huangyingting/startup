  - id: section-3
    title: 'Scenario logic: upside exists, but the downside path is easier to explain with public evidence'
    body: >-
      The bull case is straightforward to describe. If OpenAI can keep converting frontier-model leadership into
      enterprise spend, preserve consumer scale, and turn run-rate revenue into durable recognized revenue while partner
      economics improve, the company could plausibly compound into the revenue base needed to sustain or grow beyond the
      current valuation. The Microsoft revenue-share cap reset matters here, because even a marginal improvement in
      retained economics can make a very large difference when the revenue base is already measured in tens of billions.


      The base and bear cases are easier to defend from public evidence. OpenAI is simultaneously trying to monetize
      consumer usage, enterprise workflows, developer demand, and infrastructure-scale partnerships while planning for
      compute spending and supplier commitments that are enormous by software standards. Stargate’s $500 billion
      ambition, Oracle’s $45 billion to $50 billion financing plan for OCI capacity, and CoreWeave’s $11.9 billion
      OpenAI contract all point to the same truth: valuation compression does not require demand collapse. It only
      requires revenue conversion, margin capture, or partner leverage to fall short of what the $852 billion mark
      already assumes.
    claimRefs:
      - C374
      - C375
      - C379
      - C393
      - C401
      - C402
      - C404
      - C420
      - C421
  - id: section-4
    title: 'Exit readiness and final diligence: public evidence is directionally strong, but not investor-complete'
    body: >-
      There is enough public evidence to take OpenAI seriously as a future liquidity candidate. CNBC tied the latest
      financing directly to IPO anticipation, and Reuters described both OpenAI and Anthropic as laying groundwork for
      eventual listings. Demand, brand reach, and financing access are no longer the gating issues. The gating issue is
      disclosure quality. Microsoft, Oracle, and Alphabet all maintain filing-rich investor portals; OpenAI does not,
      because it remains a foundation-controlled private company organized through OpenAI Group PBC.


      That gap matters more at $852 billion than it would at a normal growth-stage mark. Investors still cannot publicly
      inspect the exact 2026 preference stack, ratchets, liquidation rights, audited segment revenue, customer
      concentration, recognized gross margin, committed compute outflows, or cash-burn trajectory needed to turn
      admiration into underwritten conviction. Until management supplies that package, the right posture is disciplined
      curiosity: stay engaged, define clear kill triggers, and be willing to revisit the call if either the price resets
      or the disclosure set starts to look more like a public-company-quality diligence room.
    claimRefs:
      - C372
      - C374
      - C408
      - C409
      - C410
      - C411
      - C414
      - C415
      - C416
tables:
  - id: T801
    title: Recommendation summary table
    columns:
      - decision field
      - current view
      - decision implication
    rows:
      - - Recommendation
        - research-more
        - Stay engaged, but do not underwrite new money at the current mark without private diligence.
      - - Confidence
        - medium
        - Public evidence is strong on demand and weak on filing-grade economics.
      - - Risk rating
        - high
        - Multiple compression can transmit through compute cost, partner economics, or governance shocks.
      - - Valuation stance
        - stretched
        - Current price requires premium revenue conversion and sustained scarcity multiples.
      - - Hold / exit posture
        - 3-5 year hold only if private diligence closes gaps
        - Short-duration upside is mostly sentiment; fundamental support needs time and execution.
      - - Price discipline
        - No price-insensitive buy at $852B
        - Either require materially better terms or substantially better disclosure.
    notes: The call reflects the current entry price, not a generic view that OpenAI is a weak company.
    claimRefs:
      - C372
      - C393
      - C396
      - C397
      - C398
      - C411
      - C416
      - C421
  - id: T802
    title: Thesis / anti-thesis table
    columns:
      - argument
      - direction
      - what would change the view
    rows:
      - - Run-rate monetization is already elite for a private software company.
        - thesis
        - A verified slowdown in ARR conversion or a reversal in enterprise usage would weaken the premium case.
      - - Consumer and business usage create unusually broad distribution for monetization.
        - thesis
        - >-
          If those users do not convert into durable recognized revenue or profitable cohorts, scale alone is
          insufficient.
      - - Partner-financed infrastructure can support growth faster than a self-funded balance sheet could.
        - thesis
        - If those contracts reprice or create hidden obligations, the same structure becomes a margin drag.
      - - Current valuation still screens far above public incumbents.
        - anti-thesis
        - >-
          A move toward filing-grade disclosure or much higher recognized revenue would make that premium easier to
          defend.
      - - Public evidence is too thin on preferences, margins, and cash generation for a buy call.
        - anti-thesis
        - Publishing audited economics and the 2026 financing stack would materially improve underwriteability.
    notes: >-
      Arguments are intentionally price-sensitive; they describe what the current valuation already assumes, not just
      what is true about the product.
