    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      OpenAI scores exceptionally on market pull and product proof, but much lower on economic visibility and price
      support.
    data:
      items:
        - label: Market demand
          score: 9
          detail: Run-rate revenue and AI-spend growth are real and unusually large.
          tone: positive
        - label: Customer proof
          score: 9
          detail: 800M weekly users and 1M business customers are elite scale signals.
          tone: positive
        - label: Moat / scarcity
          score: 8
          detail: Frontier-model peers still price in scarcity, supporting some premium.
          tone: positive
        - label: Economics visibility
          score: 4
          detail: Public evidence is still too weak on retained margin, burn, and cash generation.
          tone: warning
        - label: Governance / execution risk
          score: 4
          detail: Partner economics and governance complexity remain material.
          tone: warning
        - label: Valuation support
          score: 4
          detail: Current price is defendable only under premium assumptions.
          tone: warning
        - label: Evidence quality
          score: 5
          detail: Good directional evidence, but not public-company-quality disclosure.
          tone: neutral
    approximationNotes: Scores are 0-10 ordinal judgments synthesized from the public evidence set for IC discussion.
