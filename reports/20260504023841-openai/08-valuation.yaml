  - id: TV003
    title: Bull / base / bear scenario table
    columns:
      - scenario
      - assumptions
      - valuation / return logic
      - key risks
      - probability signal
    rows:
      - - Bull
        - >-
          OpenAI converts current run-rate into $60B revenue with improved retained economics and still wins frontier
          scarcity premium.
        - At 25x revenue, equity value could approach $1.5T, or ~1.8x current mark before dilution.
        - Requires sustained product lead, partner cooperation, and no major governance or regulatory break.
        - low-medium
      - - Base
        - >-
          Revenue scales to about $40B and public/private investors grant an 18x multiple closer to a premium but not
          euphoric platform.
        - Implied value is about $720B, below the current $852B entry mark.
        - Even good execution may not outrun multiple normalization.
        - medium
      - - Bear
        - >-
          Revenue stalls near the current $25B run-rate and the market prices OpenAI more like a mature
          infrastructure/software platform at 12x.
        - Implied value is about $300B, meaning severe downside from the latest round.
        - Compression can happen without a demand collapse if margins or partner economics disappoint.
        - medium
    notes: >-
      Scenarios are revenue-multiple frameworks because public evidence is too weak on profit and cash-flow conversion
      for a DCF-quality model.
    claimRefs:
