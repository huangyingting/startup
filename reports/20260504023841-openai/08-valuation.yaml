  - id: T804
    title: Comparable valuation table
    columns:
      - comparable
      - metric
      - multiple / valuation / status
      - relevance
      - limitation
    rows:
      - - Microsoft
        - Market cap / TTM revenue
        - ~10.1x
        - Best public benchmark for scaled AI distribution, cloud, and enterprise monetization.
        - Diversified megacap; AI is only one part of the business.
      - - Oracle
        - Market cap / TTM revenue
        - ~7.7x
        - Useful benchmark for AI-infrastructure demand monetized through a large incumbent cloud platform.
        - Diversified database and cloud vendor, not a frontier-model lab.
      - - Palantir
        - Market cap / TTM revenue
        - ~77.3x
        - Shows what public markets will pay for scarce AI-premium software exposure.
        - Different mix, profitable public-company status, and meaningful government exposure.
      - - Anthropic
        - Private valuation / annualized revenue
        - ~42.2x on $380B and ~$9B annualized revenue
        - Closest disclosed frontier-model private comp in 2026.
        - Private mark and run-rate revenue are not directly comparable to audited public metrics.
      - - Mistral
        - Private valuation status
        - $14B valuation in Sept. 2025
        - Shows how far below OpenAI the next disclosed frontier-model tier still sits.
        - Different geography, scale, and disclosure depth; no like-for-like revenue metric in this source set.
    notes: >-
      The comp set is intentionally mixed because no single public peer cleanly matches OpenAI’s consumer, enterprise,
      model, and infrastructure exposure.
    enumerationScope:
      coverage: partial
      basis: >-
        This table covers the most decision-useful public and private comparables with accessible May 2026 evidence, but
        it is not exhaustive because several frontier-model peers and internal AI segments lack like-for-like public
        revenue and preference disclosures.
