          detail: USD billions required to support $852B at a mature-platform multiple.
          tone: negative
        - label: Revenue needed at 18x
          value: 47.3
          detail: USD billions required to support $852B at a premium-platform multiple.
          tone: warning
        - label: Revenue needed at 25x
          value: 34.1
          detail: USD billions required to support $852B at a frontier-premium multiple.
          tone: neutral
        - label: Current annualized revenue
          value: 25
          detail: End-February 2026 annualized revenue reported by MarketScreener/Reuters.
          tone: positive
    approximationNotes: >-
      Revenue thresholds are simple EV/revenue bridges using the latest public financing mark; they are not discounted
      cash-flow outputs.
    claimRefs:
      - CV004
      - CV022
      - CV023
      - CV024
  - id: FV003
    title: Valuation / return range
    type: range
    layout: wide
    summary: Public evidence supports a wide valuation range because multiple selection matters almost as much as growth.
    data:
      items:
        - label: Bear case
          low: 250
          mid: 300
          high: 350
          displayValue: $250B-$350B
          detail: Run-rate stagnates and valuation compresses near 12x revenue.
          tone: negative
        - label: Base case
          low: 650
          mid: 720
          high: 800
          displayValue: $650B-$800B
          detail: Revenue scales toward $40B with an 18x-like premium platform multiple.
          tone: warning
        - label: Bull case
          low: 1300
          mid: 1500
          high: 1700
          displayValue: $1.3T-$1.7T
          detail: Revenue reaches ~$60B and scarcity premium persists near 25x.
          tone: positive
    approximationNotes: >-
      Ranges are scenario-based revenue-multiple outputs designed for investment committee discussion, not management
      guidance.
    claimRefs:
