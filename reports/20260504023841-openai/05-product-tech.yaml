      - - Deep research
        - Analysts, researchers, and executives
        - Launched February 2025; material controls update in February 2026
        - >-
          Multi-step research agent with MCP/app connections, trusted-site restriction, real-time progress tracking, and
          interrupt/refine flow
        - Moves research synthesis into a productized, source-aware agent workflow
        - Public sources do not quantify accuracy, cost, or completion rates by plan or domain.
      - - Sora
        - Creators and media experimenters
        - Sunsetting; app/web discontinued in April 2026 and API discontinuation announced for September 2026
        - OpenAI still provides export and deletion guidance during wind-down
        - Shows OpenAI can rapidly test adjacent modalities, but also retire them quickly
        - Replacement video strategy and migration path are not publicly defined.
    notes: >-
      OpenAI’s portfolio is broad, but maturity is uneven. The most durable public surfaces are ChatGPT, the API
      platform, and agentic developer tooling; Sora is the clearest sign that adjacent products can be deprioritized
      quickly.
