      - CE035
  - calloutType: insight
    title: Business monetization is splitting by workflow
    body: >-
      The April 2026 move to standard ChatGPT seats plus usage-based Codex seats suggests OpenAI is pricing
      collaboration and coding autonomy as separate products.
    claimRefs:
