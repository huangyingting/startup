  - id: section-3
    title: Reliability, trust controls, and roadmap risk
    body: >-
      Trust and operations are part of the product, not just back-office functions. OpenAI’s business-data page says
      organizational data across ChatGPT Enterprise, ChatGPT Business, ChatGPT Edu, ChatGPT for Healthcare, ChatGPT for
      Teachers, and the API platform remains customer-owned and is not used for model training by default. The
      consumer-facing security page says users can choose whether data is used for training and model improvement, and
      it highlights Advanced Account Security as an account-protection feature. Safety materials further describe
      OpenAI’s operating loop as teach, test, and share. Together, these materials are directionally helpful for
      diligence, but they still stop short of providing the full certification and control package many enterprise
      buyers would request without separate trust-portal access.


      Reliability is public enough to matter. On May 4, 2026, the status page showed an active incident affecting
      ChatGPT workspace-connector write actions. The same page disclosed aggregate uptime snapshots of 99.99% for APIs,
      99.83% for ChatGPT, 99.98% for Codex, and 99.93% for FedRAMP over the February-to-May 2026 period, while also
      warning that individual customer availability may vary by tier and model. That is better disclosure than many AI
      startups provide, but it still does not substitute for plan-specific SLA language or support-response commitments.


      The downside context also comes from outside sources. SecurityWeek reported in late 2025 that researchers hacked
      ChatGPT memory and web-search features, highlighting how quickly new convenience features can expand the attack
      surface. The Verge documented how quickly Sora moved from launch excitement to closed applications, and OpenAI’s
      own help page then formalized the discontinuation path. The result is a company with a fast-moving roadmap and
      increasingly credible trust controls, but also one that can change plan design, product availability, and
      operational assumptions within a few quarters.
    claimRefs:
      - C218
      - C219
      - C220
      - C221
      - C222
