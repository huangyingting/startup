  - id: TE003
    title: Technology / operating architecture table
    columns:
      - layer/component
      - role
      - evidence-backed implementation
      - dependency
      - public risk
    rows:
      - - Experience layer
        - End-user workspace and entitlement surface
        - >-
          ChatGPT plans span consumer through Business and Enterprise tiers, with advanced tools and agent access
          exposed through plan design
        - Identity, admin controls, and plan entitlements
        - Public plan pages are strong on features but weak on contract-level SLA detail.
      - - Agent layer
        - Turns recurring jobs into higher-autonomy products
        - Codex and deep research package coding and research workflows as dedicated agents
        - Model availability, tool permissions, and plan-specific access
        - OpenAI expands agent capabilities quickly, which can change buyer assumptions quarter to quarter.
      - - API orchestration layer
        - Programmatic interface for agentic applications
        - >-
          Responses API is positioned as the core API primitive, with MCP and built-in tools for image generation, Code
          Interpreter, and file search
        - Tool availability, model catalog, and API compatibility
        - Assistants-to-Responses migration details evolve faster than large enterprises typically like.
      - - Model layer
        - Reasoning, coding, multimodal, and long-context capability base
        - Public model family includes GPT-5.5, GPT-5.4, GPT-4.1, GPT-4o, and o1-related system-card evidence
        - Compute access, model routing, and safety gating
        - Exact per-model routing, fallback, and retirement policy are not fully public.
      - - SDK / developer tooling layer
        - Reduces integration friction for application teams
        - OpenAI maintains official Python and Node SDKs plus dedicated API references
        - SDK release cadence and backward compatibility
        - Production teams still need to monitor library changes and API lifecycle transitions closely.
      - - Trust / operations layer
        - Data handling, security, safety, and uptime disclosure
        - Business-data, security/privacy, safety, and status pages create a visible control plane
        - Internal control maturity and trust-portal artifacts
        - Public trust disclosures are directionally useful, but many buyer-grade artifacts are still gated or absent.
    notes: >-
      OpenAI’s architecture is best understood as a layered operating stack: workspaces at the top, agents in the
      middle, Responses/tooling as orchestration, models as the capability engine, and trust/operations as the control
      layer underneath.
