        - Run-rate stalls near ~$25B instead of growing toward the ~$34B-$47B range needed for premium support.
        - The current valuation loses the growth bridge needed even for a 25x-18x framework.
        - Do not add capital; re-underwrite downside against the bear case.
      - - Partner economics worsen
        - Microsoft revenue-share reset fails to improve retained economics or new supplier terms become more punitive.
        - Gross-margin and free-cash-flow conversion stay too weak for premium multiples.
        - Shift stance from stretched to expensive.
      - - Capacity becomes balance-sheet toxic
        - >-
          Stargate, Oracle, or CoreWeave commitments migrate from partner support into hard OpenAI obligations without
          matching monetization.
        - Valuation becomes a capex story rather than a software-scarcity story.
        - Require committed-spend schedule before any new underwriting.
      - - Governance or legal shock reopens control questions
        - A new board or nonprofit-control rupture re-prices execution confidence.
        - Scarcity premium compresses before financials can catch up.
        - Pause investment work until governance terms are clarified.
    notes: >-
      These are kill triggers, not generic risks. Each would directly impair the specific assumptions needed to defend
      the current mark.
