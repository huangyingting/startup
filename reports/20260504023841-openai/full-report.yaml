  - number: 9
    title: Valuation
    sections:
      - number: '9.1'
        title: 'Recommendation: quality is real, but the entry price still outruns public disclosure'
        blocks:
          - type: paragraph
            body: >-
              OpenAI is clearly not being priced like a speculative prototype anymore. The company has reached a scale
              where third-party reporting says annualized revenue exceeded $20 billion in 2025 and topped $25 billion by
              the end of February 2026, while OpenAI itself says ChatGPT serves more than 800 million weekly users and
              that more than 1 million business customers directly use its products. Those are elite demand signals, and
              they explain why capital has continued to find the company at unprecedented size.


              That said, the current decision should still be price-sensitive rather than admiration-sensitive. CNBC’s
              March 2026 round report sets the entry mark at $852 billion, while Reuters immediately framed the
              challenge as finding focus at that valuation. Public evidence supports a premium multiple, but it does not
              support treating the price as obviously cheap. The market is effectively being asked to underwrite
              run-rate revenue conversion, partner-financed infrastructure expansion, and future public-market
              receptivity before it can inspect filing-grade margin, burn, preference, or cash-flow data. That
              combination is good enough for a research-more call, not good enough for a buy recommendation at the
              current mark.
            claimRefs:
              - C372
              - C373
              - C375
              - C376
              - C377
              - C399
              - C400
              - C416
      - number: '9.2'
        title: 'Price context: OpenAI screens rich versus public incumbents, but not absurd versus frontier-AI scarcity'
        blocks:
          - type: paragraph
            body: >-
              The most useful valuation framing is not a single ratio but a stack of ratios. Using the latest public
              run-rate evidence, OpenAI’s $852 billion mark implies about 34.1x annualized revenue on the end-February
              2026 figure and about 39.8x on the end-2025 figure. Those levels are far above public incumbent platforms
              such as Microsoft and Oracle, which screen around 10.1x and 7.7x respectively using current market-cap and
              revenue data. On that lens alone, OpenAI looks stretched.


              But the same data also shows why the current price is not obviously detached from frontier-AI
              private-market behavior. Anthropic’s February 2026 financing implies roughly 42.2x on the annualized
              revenue figure Reuters later attributed to it, and Palantir trades around 77.3x trailing revenue in public
              markets. OpenAI therefore sits in an uncomfortable middle: materially richer than diversified public
              incumbents, but not clearly richer than the best available frontier-model or AI-premium comparables. The
              underwriting problem is that OpenAI lacks the public filings that would let investors decide which comp
              bucket it truly deserves.
            claimRefs:
              - C375
              - C376
              - C380
              - C384
              - C385
              - C386
              - C387
              - C388
              - C389
