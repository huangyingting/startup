      - number: '8.4'
        title: Mitigations are visible, but the investment case still needs explicit kill criteria
        blocks:
          - type: paragraph
            body: >-
              OpenAI does have more public mitigation scaffolding than many fast-growing AI companies. The 2026 DPA and
              Services Agreement define the legal framework for business and developer customers. Enterprise privacy
              materials say customers own and control data, that business data is not used for training by default, and
              that retention windows can be controlled on key enterprise plans. Security reporting routes and a live bug
              bounty also show that the company is not treating trust as a side issue. Governance has improved as well:
              the WilmerHale review, board additions, and Fidji Simo's operating role all reduce the probability that
              every critical function sits with one person or one improvised process.


              Still, this is a chapter where mitigations lower risk; they do not remove it. The missing items are
              exactly the items investors care about most: a consolidated committed-spend schedule, full customer
              contract terms, SLA and indemnity exhibits, partner-sourced ARR, top-customer exposure, and succession
              materials. The right posture is therefore conditional rather than fatalistic. If litigation expands, if
              availability deteriorates, if Microsoft or Oracle economics move against OpenAI, or if leadership
              governance ruptures again, those are not ordinary execution misses; they are thesis-break triggers.
              Conversely, if management can produce contract packs, concentration schedules, and spend commitments that
              look cleaner than the public record suggests, residual risk could compress materially.
