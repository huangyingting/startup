chapters:
  - number: 2
    title: Company Overview
    sections:
      - number: '2.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >
              OpenAI describes itself as an AI research and deployment company whose mission is to ensure artificial
              general intelligence benefits all of humanity. As of the current structure, that mission is carried
              through two linked entities: the nonprofit OpenAI Foundation and OpenAI Group PBC, the for-profit public
              benefit corporation that commercializes the company’s models and products. The Foundation governs the
              Group rather than merely holding a passive stake, which is a material difference from a conventional
              venture-backed startup and should be treated as a core diligence fact reused by later chapters.


              The operating model matters because OpenAI is simultaneously a research lab, a consumer product company,
              an API platform, and an enterprise infrastructure dependency. Public materials show the company
              distributing models through ChatGPT, its API, enterprise offerings, and Azure-linked channels, while
              preserving a mission-governed structure intended to keep commercialization tied to a broader
              public-benefit objective. That structure is not cosmetic: OpenAI states that the Foundation appoints the
              OpenAI Group board and can replace directors, while the Group itself is organized as a public benefit
              corporation expected to consider broader stakeholder interests. The result is a company that should be
              analyzed as both a fast-scaling software platform and a governance-sensitive institution.
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
              - C006
              - C037
              - C039
      - number: '2.2'
        title: Governance, leadership, and key-person dependence
        blocks:
          - type: paragraph
            body: >
              Governance remains one of the most important underwriting variables. Official materials show a current
              board that includes Bret Taylor, Adam D’Angelo, Sue Desmond-Hellmann, Zico Kolter, Paul Nakasone, Adebayo
              Ogunlesi, Nicole Seligman, and Sam Altman. OpenAI’s March 2024 review materials matter because they turn
              the 2023 board crisis from rumor into a reusable canonical fact set: the WilmerHale review said the
              rupture was driven by a breakdown in trust between the prior board and Altman, not by product-safety,
              security, financing, or partner-disclosure concerns. That finding lowers one class of existential concern
              while leaving a separate concern in place: leadership concentration and governance execution risk.


              The key-person map is still narrow. Sam Altman remains the central executive and public face; Greg
              Brockman was elevated to president and continues to sit close to the technical critical path; Fidji Simo
              was later brought in to lead Applications, improving execution depth on the commercial side; and board
              additions in 2024 and 2025 were explicitly framed as governance strengthening. Even with those changes,
              the evidence still points to a company where strategy, capital raising, compute partnerships, and trust
              with outside stakeholders remain unusually concentrated in a small group. That concentration is not
              necessarily disqualifying for a frontier-AI leader, but it is a major diligence item for downstream
              product, risk, and valuation work.
            claimRefs:
              - C007
              - C008
              - C009
              - C010
              - C011
              - C012
              - C013
              - C014
              - C021
      - number: '2.3'
        title: Capital base, stakeholder map, and public scale
        blocks:
          - type: paragraph
            body: >
              OpenAI’s capital profile is now in a category of its own. Public reporting and company materials support a
              sequence from the January 2023 Microsoft partnership extension, through the October 2024 $6.6 billion
              round at a $157 billion post-money valuation, to a March 2026 round reported by CNBC and Bloomberg as $122
              billion at an $852 billion post-money valuation. Those same materials point to a stakeholder structure in
              which the OpenAI Foundation holds roughly 26% of OpenAI Group and Microsoft roughly 27% after
              recapitalization, while Amazon, Nvidia, SoftBank, Thrive, and other financial backers have become
              materially relevant to OpenAI’s future financing capacity and bargaining leverage.


              Public scale indicators are impressive but unevenly supportable. Forbes lists OpenAI as headquartered in
              San Francisco with 6,400 employees as of December 2025 and reports 2025 revenue of $3.7 billion. The same
              profile describes ChatGPT usage at roughly 500 million weekly users and about 2 million paying enterprise
              users. Those figures are directionally useful for maturity and scale, but public reporting still does not
              provide a fully reconciled cap table, exact consolidated lifetime funding total, or the granularity a
              financial underwriter would want on realized pricing, margin, or cohort quality. This is why later
              chapters should reuse these figures as public reference points, not as substitutes for full diligence-room
              data.
