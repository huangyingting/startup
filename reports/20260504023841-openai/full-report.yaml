  - number: 5
    title: Financials
    sections:
      - number: '5.1'
        title: 'Revenue model and public traction: broad monetization, incomplete mix disclosure'
        blocks:
          - type: paragraph
            body: >-
              OpenAI now monetizes through several distinct surfaces rather than a single SaaS plan. Public company
              materials show consumer subscriptions at ChatGPT Plus and Pro, self-serve ChatGPT Business seats,
              usage-based Codex seats, custom Enterprise contracts, token-priced API usage, and partner-mediated
              distribution or infrastructure relationships. That breadth matters because it reduces dependence on one
              buyer segment, but it also means the public record mixes seat pricing, token pricing, subscriptions, and
              negotiated commercial terms that are not directly comparable. The cleanest pricing evidence remains
              consumer and API list pricing, while Business and Enterprise remain only partially transparent in the
              reviewed public material.


              Public traction evidence is strong enough to show demand, but not strong enough to reconcile revenue
              quality. OpenAI’s own December 2025 enterprise report says ChatGPT serves more than 800 million weekly
              users, and TechCrunch reported enterprise message volume up 8x since November 2024, API reasoning-token
              use up 320x year over year, and custom GPT usage up 19x to 20% of enterprise messages. Forbes’ company
              profile adds a public 2025 revenue reference point of $3.7 billion. The important underwriting nuance is
              that TechCrunch also reported the majority of OpenAI’s revenue still comes from consumer subscriptions,
              which implies enterprise adoption is rising quickly but has not yet fully displaced consumer revenue as
              the economic center of gravity.
            claimRefs:
              - C164
              - C165
              - C166
              - C167
              - C168
              - C169
              - C170
