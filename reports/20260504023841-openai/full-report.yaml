  - number: 7
    title: Customers
    sections:
      - number: '7.1'
        title: Customer base spans workplace seats, API builders, and partner-led enterprise programs
        blocks:
          - type: paragraph
            body: >-
              OpenAI’s customer base is no longer a single “ChatGPT for knowledge workers” story. The public record now
              supports three distinct routes to revenue. First, OpenAI has a direct workplace-seat business: its
              customer-story hub says 1M businesses use OpenAI, the November 2025 milestone post says more than 1
              million business customers are directly using OpenAI, VentureBeat reported 3 million paying business users
              by June 2025, and the 2025 enterprise report says OpenAI serves more than 7 million ChatGPT workplace
              seats. That combination implies both breadth and speed: OpenAI is attracting a very large number of
              organizations while also deepening entitlements inside those organizations.


              Second, OpenAI has an API-led builder segment with increasingly production-grade usage. The enterprise
              report says more than 9,000 organizations have processed over 10 billion tokens, nearly 200 organizations
              have exceeded 1 trillion tokens, and average reasoning-token consumption per organization rose roughly
              320x year over year. API usage is not confined to classic software companies either. OpenAI’s own report
              says customer support and content generation together make up about 20% of API activity, and
              non-technology firm API use grew 5x year over year. Mercado Libre’s Verdi platform reinforces that
              developer/platform buyer map: OpenAI says 17,000 developers can build on it across more than 30,000
              microservices.


              Third, enterprise reach is increasingly amplified by channels and partners. TechCrunch’s Ramp-based
              snapshot suggests OpenAI is winning share inside U.S. business AI spend, while Microsoft customer stories
              and Accenture’s December 2025 announcement show OpenAI getting pulled into larger transformation budgets
              through Azure and consulting-led rollouts. This matters for diligence because the buyer, user, and payer
              are not always the same party. In some accounts a central IT or digital leader buys ChatGPT seats for
              broad workforce use; in others a product or platform team pays for API usage; in others a services or
              cloud partner shapes the deployment path. OpenAI therefore looks less like a narrow app vendor and more
              like a multi-surface enterprise platform with several go-to-market motions running at once.
            claimRefs:
              - C257
              - C258
              - C260
              - C261
              - C267
              - C268
              - C269
              - C277
              - C279
              - C280
              - C284
              - C286
              - C287
              - C288
              - C320
              - C322
              - C323
              - C324
              - C325
      - number: '7.2'
        title: Named customer proof is strongest in regulated knowledge work, support automation, and retail assistance
        blocks:
          - type: paragraph
            body: >-
              The best public customer proof is not evenly distributed across all segments; it is concentrated in a few
              recurring jobs-to-be-done. Regulated knowledge work is one of the clearest. Morgan Stanley says AI @
              Morgan Stanley Debrief drafts notes, action items, emails, and Salesforce updates with client consent, and
              the firm says 98% of Financial Advisor teams have adopted AI @ Morgan Stanley Assistant. BBVA is the other
              high-signal financial-services case: OpenAI’s November 2025 case study says employees save about three
              hours per week, weekly active usage reached 83%, and staff created more than 20,000 custom GPTs, with
              about 4,000 used frequently. Taken together, those two references show OpenAI can move beyond pilots in
              heavily regulated environments where workflow quality and trust matter.


              Customer-service automation is the second major proof cluster. Klarna’s February 2024 release says its
              OpenAI-powered assistant handled 2.3 million conversations in the first month, covered two-thirds of
              customer-service chats, cut repeat inquiries 25%, and reduced resolution times from 11 minutes to under
              two. Intercom gives a more enterprise-software-shaped version of the same story. Intercom says Fin
              averages 41% conversation resolution across thousands of customers, while OpenAI’s 2025 enterprise report
              says Fin Voice reduced latency 48%, resolves 53% of calls end to end, and makes human-escalated calls 40%
              faster. These are not generic “AI assistant” testimonials; they are explicit workflow metrics tied to
              support operations.


              Retail assistance is the third cluster. Lowe’s says Mylow gives customers real-time project guidance and
              product discovery, and that Mylow Companion rolled out to associates across more than 1,700 stores.
              Digital Commerce 360 independently confirms Mylow is live on Lowe’s website and mobile app for logged-in
              shoppers, and OpenAI says the associate tool runs on the same foundation as the customer-facing advisor.
