      - number: '2.4'
        title: Milestones, legal friction, and reliability context
        blocks:
          - type: paragraph
            body: >
              The company overview has to preserve a chronology that later chapters can cite without re-litigating core
              facts. The public record supports a clear sequence: founding as a nonprofit in 2015, creation of a
              for-profit business in 2019, leadership-role changes in May 2022, ChatGPT’s launch in November 2022,
              Microsoft’s renewed multiyear investment in January 2023, GPT-4’s release in March 2023, the March 2024
              governance review and board expansion, the October 2024 funding round, the June 2025 public defense
              against New York Times data-retention demands, the October 2025 recapitalization, and the March 2026
              funding close. That is the best single chronology of record from the current source set.


              The same chronology also shows why OpenAI is not a clean “growth at any cost” story. The status history
              page shows recurring service incidents across ChatGPT, the API, login, file handling, and model-specific
              services, which matters because OpenAI is now infrastructure for enterprises and developers rather than a
              pure novelty app. Legal risk is also live rather than historical: OpenAI’s own litigation-response pages,
              JD Supra’s analysis of the New York Times preservation dispute, Loeb’s copyright-litigation note, and the
              Musk v. Altman docket all show that copyright, privacy, nonprofit-mission, and governance disputes remain
              active diligence themes. The takeaway is not that the business is broken; it is that scale, governance,
              and legal complexity are now part of the company’s core identity.
