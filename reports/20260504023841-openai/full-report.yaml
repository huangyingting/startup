      - number: '6.2'
        title: Architecture, tooling, and differentiation
        blocks:
          - type: paragraph
            body: >-
              OpenAI’s architecture is becoming more explicit in public materials. The company’s May 2025 launch post
              and developer references position the Responses API as the core API primitive for agentic applications,
              with support for remote MCP servers and built-in tools such as image generation, Code Interpreter, and
              file search. In practical terms, that means OpenAI is not only selling model inference; it is selling an
              orchestration layer that reduces how much tooling a builder must assemble independently. Above that layer
              sit end-user products such as ChatGPT, deep research, and Codex. Below it sit frontier model families
              including GPT-5.5, GPT-5.4, GPT-4.1, o1, and GPT-4o, each exposed through a combination of docs, pricing
              pages, and launch notes.


              Differentiation comes from packaging as much as raw model quality. GPT-4.1 is publicly framed as improving
              coding, instruction following, and long context relative to GPT-4o. Codex turns coding into a dedicated
              cloud-based software engineering agent that can work on many tasks in parallel. Deep research turns
              web-backed synthesis into a productized agent and, by February 2026, added trusted-site restriction, MCP
              or app connections, real-time progress tracking, and interruption for follow-up refinement. Those are
              workflow primitives, not just model benchmarks. They matter because they move OpenAI closer to owning
              recurring jobs-to-be-done in research, coding, and agent-building instead of competing only on abstract
              model quality.


              The best public technical proof is still partial. OpenAI maintains first-party Python and Node SDKs, and
              its model/system-card record extends to GPT-4o and o1. NIST’s pre-deployment evaluation of o1 adds a rare
              government-authored checkpoint. Even so, public sources do not fully disclose model routing logic,
              deprecation policy, or the exact operational split between direct OpenAI delivery and partner channels
              such as Azure. The technology story is therefore strong on surface breadth and tool integration, but still
              incomplete where an enterprise underwriter would want deeper deployment evidence.
            claimRefs:
