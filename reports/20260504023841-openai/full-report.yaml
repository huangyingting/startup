  - number: 3
    title: Market Analysis
    sections:
      - number: '3.1'
        title: Market boundary and sizing lenses
        blocks:
          - type: paragraph
            body: >-
              OpenAI’s relevant market is not the entire AI stack. Public product pages show the company selling across
              three direct monetization surfaces: workforce-oriented ChatGPT Business and Enterprise plans, token-priced
              API usage for developers and software teams, and a separate education offering for universities. That
              boundary matters because Gartner’s 2025 $644 billion generative AI forecast is a broad top-down spend lens
              that includes categories such as devices, servers, software, and services, while Menlo’s $13.8 billion
              enterprise spend and $4.6 billion application-layer spend are much closer to the budgets that actually
              flow into foundation-model applications and copilots. For underwriting, the practical market boundary
              should therefore include seat-based enterprise assistants, developer and agent workflows priced on usage,
              and institutional deployments such as higher education; it should exclude generic hardware refresh,
              hyperscaler infrastructure capex, and non-GenAI software modules that do not directly monetize a model or
              assistant.


              McKinsey’s value-pool work is still useful, but as an outer envelope rather than a direct revenue pool.
              Its $2.6 trillion to $4.4 trillion annual estimate shows why the category receives premium valuations, yet
              realized spending is still far below that ceiling and heavily mediated by organizational change,
              integration, and governance. The key implication for OpenAI is that the company benefits from a genuinely
              large demand backdrop, but direct SAM should be framed through enterprise application budgets and
              model-usage budgets rather than the whole headline AI economy.
            claimRefs:
              - C040
              - C041
              - C043
              - C049
              - C055
              - C063
              - C068
              - C105
              - C107
      - number: '3.2'
        title: Buyer segmentation, budgets, and adoption path
        blocks:
          - type: paragraph
            body: >-
              The public evidence shows OpenAI selling into several buyer maps at once. The first is the broad
              knowledge-work market: OpenAI explicitly markets Business and Enterprise plans as workforce tools, while
              Microsoft’s 2025 Work Trend Index shows leaders prioritizing customer service, marketing, and product
              development and expecting digital labor to expand their workforce. The second is the developer market,
              where OpenAI’s API and development-focused pricing line up with Menlo’s finding that code copilots are the
              most adopted enterprise use case at 51%. The third is institutional education, where OpenAI’s ChatGPT Edu
              materials target students, faculty, researchers, and campus operations under a centralized university
              purchasing motion.


              Budget ownership is equally important. Menlo’s data suggests enterprise demand is no longer confined to
              sandboxed innovation teams: 60% of spend still comes from innovation budgets, but 40% already comes from
              permanent budgets and more than half of that recurring spend is being redirected from existing
              allocations. Departmentally, spending is concentrated in IT, product and engineering, and data science,
              but meaningful dollars also sit with support, sales, marketing, HR, finance, and legal. That pattern fits
              OpenAI’s go-to-market surface: the company can sell horizontally through central IT and vertically through
              functional ROI cases. The adoption path still tends to move from experimentation to a function-specific
              pilot, then to security and data integration, and only then to recurring budget and broad deployment.
            claimRefs:
