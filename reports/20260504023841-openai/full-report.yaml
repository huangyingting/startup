              - C418
      - number: '9.3'
        title: 'Scenario logic: upside exists, but the downside path is easier to explain with public evidence'
        blocks:
          - type: paragraph
            body: >-
              The bull case is straightforward to describe. If OpenAI can keep converting frontier-model leadership into
              enterprise spend, preserve consumer scale, and turn run-rate revenue into durable recognized revenue while
              partner economics improve, the company could plausibly compound into the revenue base needed to sustain or
              grow beyond the current valuation. The Microsoft revenue-share cap reset matters here, because even a
              marginal improvement in retained economics can make a very large difference when the revenue base is
              already measured in tens of billions.


              The base and bear cases are easier to defend from public evidence. OpenAI is simultaneously trying to
              monetize consumer usage, enterprise workflows, developer demand, and infrastructure-scale partnerships
              while planning for compute spending and supplier commitments that are enormous by software standards.
              Stargate’s $500 billion ambition, Oracle’s $45 billion to $50 billion financing plan for OCI capacity, and
              CoreWeave’s $11.9 billion OpenAI contract all point to the same truth: valuation compression does not
              require demand collapse. It only requires revenue conversion, margin capture, or partner leverage to fall
              short of what the $852 billion mark already assumes.
            claimRefs:
              - C374
              - C375
              - C379
              - C393
              - C401
              - C402
              - C404
              - C420
              - C421
      - number: '9.4'
        title: 'Exit readiness and final diligence: public evidence is directionally strong, but not investor-complete'
        blocks:
          - type: paragraph
            body: >-
              There is enough public evidence to take OpenAI seriously as a future liquidity candidate. CNBC tied the
              latest financing directly to IPO anticipation, and Reuters described both OpenAI and Anthropic as laying
              groundwork for eventual listings. Demand, brand reach, and financing access are no longer the gating
              issues. The gating issue is disclosure quality. Microsoft, Oracle, and Alphabet all maintain filing-rich
              investor portals; OpenAI does not, because it remains a foundation-controlled private company organized
              through OpenAI Group PBC.


              That gap matters more at $852 billion than it would at a normal growth-stage mark. Investors still cannot
              publicly inspect the exact 2026 preference stack, ratchets, liquidation rights, audited segment revenue,
              customer concentration, recognized gross margin, committed compute outflows, or cash-burn trajectory
              needed to turn admiration into underwritten conviction. Until management supplies that package, the right
              posture is disciplined curiosity: stay engaged, define clear kill triggers, and be willing to revisit the
              call if either the price resets or the disclosure set starts to look more like a public-company-quality
              diligence room.
            claimRefs:
              - C372
              - C374
              - C408
