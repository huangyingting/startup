  - number: 4
    title: Competitors
    sections:
      - number: '4.1'
        title: 'Landscape: direct labs, bundled incumbents, infrastructure aggregators, and build-it-yourself substitutes'
        blocks:
          - type: paragraph
            body: >-
              OpenAI does not compete only with one or two frontier-model labs. The public landscape now spans direct
              frontier peers such as Anthropic, bundled incumbents such as Google and Microsoft, multi-model
              infrastructure aggregators such as Amazon Bedrock, and substitutes built around open-weight models like
              Llama or privacy-oriented vendors like Mistral. Menlo’s 2025 enterprise report is especially important
              because it shows the buyer’s alternative set broadening in practice rather than in theory: 76% of
              enterprise AI use cases are now purchased rather than built internally, horizontal copilots already
              account for $8.4 billion of spend, and foundation-model share has redistributed materially across
              Anthropic, OpenAI, and Google.


              That changes what “competitor” means for OpenAI. The direct peer set still includes Anthropic in the API
              and coding markets, but the practical deal set also includes Google Workspace and Microsoft 365 budgets,
              Amazon’s multi-model routing layer, and internal builds that combine open-weight models with cloud
              tooling. OpenAI’s core advantage remains the combination of a flagship consumer product, a widely used
              API, and enterprise trust controls. The weakness is that multiple rival paths now solve the same jobs:
              buyers can buy a bundled assistant, route traffic across several providers, or build on open models when
              control matters more than frontier quality.
            claimRefs:
              - C152
              - C153
              - C154
              - C155
              - C158
              - C159
              - C160
              - C162
      - number: '4.2'
        title: 'Profile by competitor class: where OpenAI is strongest and where rivals are sharper'
        blocks:
          - type: paragraph
            body: >-
              Anthropic is the clearest direct product threat. Official Anthropic materials show Claude sold across
              commercial and enterprise surfaces and distributed through both Amazon Bedrock and Google Cloud Vertex AI,
              while independent coverage shows Claude winning the enterprise coding narrative and taking enterprise
              usage share from OpenAI. Google competes differently: Gemini is not only a model API, but also part of a
              larger Workspace and Google Cloud procurement surface that already carries compliance, security, and
              endpoint-management features. Microsoft’s threat is even more distribution-heavy. Its Copilot surface sits
              inside Microsoft 365 and Teams, with Azure OpenAI providing a parallel developer and enterprise route.
              Amazon’s posture is less about a single flagship assistant and more about optionality: Bedrock lets buyers
              choose among Anthropic, Meta, Mistral, and Amazon models, while Amazon Q offers an explicit seat-based
              assistant for internal knowledge work.


              Meta Llama and Mistral matter even when they do not dominate closed-model share. Llama gives enterprises
              and builders an open-weight fallback with long-context multimodal capability, while Mistral sells a
              privacy and data-sovereignty story that is stronger in Europe than many U.S. rivals can easily match.
              Together, those alternatives keep a ceiling on how much proprietary labs can rely on pure model
              exclusivity as a moat.
            claimRefs:
              - C129
              - C132
              - C133
              - C134
              - C135
              - C136
              - C138
              - C139
              - C140
              - C141
              - C143
              - C144
              - C146
              - C147
              - C149
              - C151
      - number: '4.3'
        title: Switching cost, lock-in, multi-homing, and moat durability
        blocks:
          - type: paragraph
            body: >-
              OpenAI still has real competitive durability, but the durability is conditional rather than automatic. The
              company benefits from ChatGPT familiarity, API breadth, and enterprise privacy commitments such as no
              training on business data by default, which help it land both developer and knowledge-worker budgets.
              However, the same public evidence also shows why commoditization risk is now a core diligence item.
              Anthropic has already overtaken OpenAI in enterprise LLM spend and coding share in Menlo’s 2025 data;
              Google and Microsoft can hide AI procurement inside broader suite renewals; and Amazon Bedrock makes
              multi-model routing a first-class operating model instead of a bespoke engineering project.


              The result is a market with lower structural lock-in than classic SaaS. Buyers can multi-home models, hold
              seat budgets with incumbents, or shift sensitive workloads toward open-weight or sovereignty-oriented
              alternatives. Menlo’s finding that only 16% of enterprise deployments qualify as true agents also matters:
              many real-world systems are still simple enough to port across providers if price, governance, or
              reliability change. For OpenAI, the moat therefore depends less on being the only credible model lab and
              more on staying meaningfully ahead on quality, developer ergonomics, trust, and distribution at the same
              time.
            claimRefs:
              - C124
              - C125
              - C126
              - C145
              - C155
              - C156
