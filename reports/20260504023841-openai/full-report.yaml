  - number: 6
    title: Product & Technology
    sections:
      - number: '6.1'
        title: Product surface in customer workflow terms
        blocks:
          - type: paragraph
            body: >-
              OpenAI’s product surface is now a portfolio, not a single chatbot. The company’s public business pages
              describe ChatGPT Business and Enterprise as workforce products with unlimited chats, access to advanced
              models, shared-workspace administration, and specialized agents including Codex and workspace agents.
              Help-center materials show that the Business offer changed materially on April 2, 2026: it now supports
              both standard ChatGPT seats and usage-based Codex seats, indicating that OpenAI is monetizing distinct
              workflows rather than only bundling one generic seat. The pricing surface reinforces that interpretation.
              ChatGPT’s public pricing page spans Free, Go, Plus, Pro, Business, and Enterprise, while the API platform
              publishes separate token prices and context-window limits for flagship models.


              For buyers, the operational implication is that OpenAI has three primary delivery modes. First, ChatGPT
              acts as the end-user workspace for broad knowledge-work tasks. Second, dedicated agents such as deep
              research and Codex package higher-autonomy workflows for research and software development. Third, the API
              platform and Responses API give developers a programmable route into the same model family. That mix
              expands OpenAI’s reachable budget owners, but it also makes diligence more SKU-specific. A team evaluating
              ChatGPT Business should care about admin controls and seat economics; a developer team evaluating the API
              should care about model pricing, context, and tool access; a software team evaluating Codex should care
              about task autonomy and internet permissions.


              The public roadmap also shows that OpenAI is willing to both expand and retire surfaces quickly. Deep
              research and Codex moved from launch to broader entitlement quickly during 2025 and 2026, while Sora moved
              in the opposite direction, with the consumer experience shut down in April 2026 and the API scheduled to
              sunset in September 2026. That combination makes OpenAI’s product stack ambitious and commercially broad,
              but it also means product permanence cannot be assumed from launch momentum alone.
            claimRefs:
              - C209
              - C211
              - C212
              - C213
              - C214
