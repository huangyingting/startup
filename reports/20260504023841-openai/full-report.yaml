      - number: '7.3'
        title: Expansion looks strong in usage proxies, but SaaS-style durability disclosure is still missing
        blocks:
          - type: paragraph
            body: >-
              The strongest argument for durability is not a published NRR metric; it is the depth of workflow embedding
              visible in OpenAI’s own engagement data. The 2025 enterprise report says weekly Enterprise messages grew
              8x, Custom GPT and Project weekly users grew 19x year to date, roughly 20% of Enterprise messages now run
              through those structured workflows, and workplace seats reached more than 7 million. Those are useful
              land-and-expand indicators because they imply accounts are not merely buying seats and leaving them idle.
              The report also says 75% of surveyed workers report improved output quality or speed, 75% say they can now
              complete tasks they could not previously do, and enterprise users estimate 40–60 minutes saved per active
              day. That combination makes it plausible that OpenAI can expand across functions once it lands inside an
              account.


              Even so, the public record is still materially weaker than what a mature enterprise-software diligence
              file would require. OpenAI’s enterprise privacy page is directionally helpful because it says customers
              own and control business data, that OpenAI does not train on business data by default, and that some
              enterprise plans let customers control retention windows. Those disclosures likely help procurement and
              expansion in sensitive environments. But they do not answer the harder commercial questions: there is
              still no public NRR, GRR, churn, standard contract length, seat-minimum disclosure, discount band, or
              top-customer concentration schedule.


              That omission matters more because external benchmarks are cautionary. ChartMogul’s AI churn report warns
              that some AI contracts have three-month opt-out clauses with 70–80% opt-out rates and argues that
              experimental or heavily usage-based revenue can look more durable than it is. High Alpha’s 2025 benchmarks
              point in the opposite direction on the upside, noting that expansion becomes the dominant growth engine at
              scale and that outcome-aligned pricing can support better retention. The fair synthesis is that OpenAI
              clearly has strong expansion energy, but public disclosure still does not show whether today’s adoption
              converts into the kind of renewal and cohort durability that public-market-quality enterprise software
              normally proves.
