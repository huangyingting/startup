      - number: '8.2'
        title: Operational reliability and security risk are now platform risks, not edge cases
        blocks:
          - type: paragraph
            body: >-
              OpenAI is no longer a novelty app whose outages are merely frustrating. The status history now shows
              repeated incidents across ChatGPT, APIs, login, file handling, and model-specific services, and the
              2026-05-04 connector-write incident is a good example of why reliability has become a core diligence
              variable. The published uptime figures are directionally strong, but 99.83% ChatGPT uptime still leaves
              enough room for visible disruption when OpenAI is embedded inside research, coding, support, and regulated
              workflows. A frontier-AI platform can therefore be both broadly available and still operationally risky
              for buyers whose work stops when one connector or one model route breaks.


              Security risk has the same shape. SecurityWeek's reporting on memory and web-search feature exploits shows
              how fast convenience features can expand attack surface. The OECD.AI incident record and OpenAI's own
              Axios compromise response show that software-supply-chain issues are no longer hypothetical. OpenAI does
              have real mitigations in public view: a security-and-privacy page, a vulnerability-reporting process, and
              a bug bounty program. But those are control signals, not proof that public users and enterprise customers
              have seen enough postmortem detail, red-team evidence, or contract-backed service commitments to
              underwrite residual risk confidently.
            claimRefs:
              - C342
              - C343
              - C344
              - C345
              - C346
              - C347
              - C348
              - C349
              - C350
              - C351
              - C371
      - number: '8.3'
        title: Dependency, capital intensity, and execution span create a transmission path into margin and valuation
        blocks:
          - type: paragraph
            body: >-
              OpenAI's partner stack is simultaneously a moat and a concentration problem. Microsoft remains
              foundational from the 2023 partnership onward, and the public record still treats Azure as structurally
              central to research, APIs, and products. Oracle and Stargate are best read as partial diversification
              rather than independence: they add capacity and financing options, but they also create a second layer of
              counterparties whose own capital plans now explicitly cite OpenAI demand. CoreWeave adds a third
              concentrated node with an infrastructure agreement worth up to $11.9 billion plus OpenAI equity
              participation. If any one of these relationships reprices, stalls, or underdelivers, the damage can
              propagate into product availability, gross margin, and financing needs rather than staying isolated inside
              procurement.


              The financial-model risk is that public demand proxies are real while public durability and obligation
              data are incomplete. OpenAI's 2025 enterprise report shows 8x enterprise-message growth and 320x growth in
              reasoning-token consumption, which means outages, compliance limits, or channel shocks would now hit a
              much bigger installed workflow base than a year earlier. But ChartMogul's warning about short opt-out AI
              contracts and revenue that looks recurring before it is durable is a useful corrective. Leadership breadth
              is improving, particularly with Fidji Simo taking the Applications role, yet the company still asks
              investors to trust a very wide execution span across research, consumer, enterprise, API, and partner
              motions without publishing the succession, P&L, or committed-spend detail that would close the loop.
            claimRefs:
