  - id: F701
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      OpenAI’s highest residual risks cluster around legal/regulatory exposure and partner concentration, with
      operational and execution risks still material despite visible mitigations.
    data:
      columns:
        - Likelihood
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: NYT + copyright / privacy litigation
          values:
            - label: medium
              tone: warning
              detail: Live litigation remains active even after legal-hold relief.
            - label: critical
              tone: negative
              detail: Can affect privacy posture, customer trust, and compliance cost.
            - label: medium
              tone: warning
              detail: OpenAI has DPA, privacy controls, and a public defense posture.
            - label: high
              tone: negative
              detail: Residual exposure remains high until claims and discovery narrow further.
        - label: Microsoft / cloud concentration
          values:
            - label: high
              tone: negative
              detail: Core platform and economics still route through Microsoft.
            - label: critical
              tone: negative
              detail: Availability, margin, and bargaining power all transmit through this node.
            - label: medium
              tone: warning
              detail: Oracle/Stargate partially diversify but do not remove dependency.
            - label: high
              tone: negative
              detail: A repricing or relationship shock would hit multiple layers at once.
        - label: Reliability and security incidents
          values:
            - label: high
              tone: negative
              detail: Status history and recent incidents show recurrence.
            - label: high
              tone: warning
              detail: Incidents now affect enterprise workflows, not just consumer sessions.
            - label: medium
              tone: warning
              detail: Status, bug bounty, and reporting routes exist publicly.
            - label: medium-high
              tone: warning
              detail: Residual risk stays elevated without full SLA and postmortem visibility.
        - label: Capital intensity and partner-funded buildout
          values:
            - label: medium
              tone: warning
              detail: Huge capacity ambitions still depend on counterparties and financing markets.
            - label: high
              tone: negative
              detail: Mismatch between commitments and monetization would pressure financing and valuation.
            - label: low-medium
              tone: warning
              detail: Public mitigation is mostly counterparties raising money and building capacity.
            - label: high
              tone: negative
              detail: Disclosure is still too thin to mark this down further.
        - label: Leadership and governance concentration
          values:
            - label: medium
              tone: warning
