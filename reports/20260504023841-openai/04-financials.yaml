  - id: section-2
    title: 'GTM motion and revenue quality: self-serve speed, enterprise upsell, and pricing opacity'
    body: >-
      The reviewed evidence points to a hybrid go-to-market model. OpenAI’s Business page pushes both try-now and
      contact-sales motions, while the legacy ChatGPT Team post, now updated to Business, confirms a self-serve
      workforce product sitting alongside the earlier Enterprise launch. Help-center materials show that Business
      combines standard subscription seats with usage-based Codex seats, and that OpenAI changed Business pricing on
      April 2, 2026 by reducing standard seat pricing by $5 per month while also introducing a Codex-only flexible seat.
      That structure is financially important: it suggests OpenAI is willing to blend predictable seat revenue with
      elastic developer-style usage revenue inside one workspace.


      Revenue quality is helped by explicit privacy controls but weakened by pricing opacity where the largest contracts
      likely sit. OpenAI says it does not train on business data by default and that enterprise customers can control
      retention, which supports enterprise willingness to expand usage in sensitive workflows. At the same time, the
      public record does not expose a normalized Enterprise price card, typical discounting, minimum commits,
      sales-cycle length, CAC, payback, or NRR. The best public sales-efficiency proxies are therefore indirect: workers
      in OpenAI’s enterprise study reported saving roughly 40 to 60 minutes per day, and Enterprise logos plus broad
      business routing suggest real deployment momentum. Those are useful demand signals, but they are not substitutes
      for cohort economics.
    claimRefs:
      - CI004
      - CI005
      - CI006
      - CI007
      - CI008
