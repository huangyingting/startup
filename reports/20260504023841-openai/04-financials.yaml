  - id: section-3
    title: 'Cost structure and capital intensity: compute dominates the underwriting story'
    body: >-
      OpenAI’s public financial picture is dominated less by payroll or sales expense than by compute and partner
      economics. OpenAI’s own ChatGPT Pro launch explicitly says more advanced models require significantly more
      compute, which is the cleanest official explanation for why list pricing alone tells so little about margin. The
      company’s infrastructure posture is now visible through a set of unusually large ecosystem commitments: the
      Stargate project aims to invest $500 billion over four years with $100 billion deployed immediately; CoreWeave
      separately announced an OpenAI infrastructure contract worth up to $11.9 billion plus a $350 million OpenAI equity
      investment; and Oracle has repeatedly tied major backlog growth and financing plans to OpenAI-linked AI demand.


      The Oracle disclosures are especially important because they show how much of the capex burden is being
      intermediated by suppliers and financing partners rather than borne transparently on OpenAI’s own published
      balance sheet. Oracle said in March 2025 that it had signed cloud agreements with OpenAI and expected its first
      Stargate contract while doubling data-center capacity that year. By February 2026 Oracle said it planned to raise
      $45 billion to $50 billion to expand OCI capacity for customers including OpenAI, and by March 2026 it said most
      of the jump in large-scale AI contract backlog could be supported by customer prepayments or customer-supplied
      GPUs. That does not make OpenAI capital-light; it means part of the funding burden is shifted into partner balance
      sheets, supplier contracts, and prepayment structures that public investors still cannot fully net together.
    claimRefs:
      - CI012
