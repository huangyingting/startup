  - calloutType: risk
    title: Capital intensity is now measured in supplier financing and infrastructure programs, not just payroll
    body: >-
      Stargate, CoreWeave, and Oracle disclosures show that OpenAI-related capacity expansion is already large enough to
      require industrial-scale financing. The burden is partly moved onto partners, but not eliminated.
    claimRefs:
      - CI025
      - CI026
      - CI027
      - CI035
      - CI036
      - CI038
      - CI039
