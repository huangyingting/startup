  - calloutType: recommendation
    title: Do not underwrite margin path or runway from public evidence alone
    body: >-
      The reviewed public record is strong on demand and weak on cash, burn, gross margin, realized enterprise pricing,
      and contract obligations. Management data remains mandatory before a financial verdict can be considered complete.
