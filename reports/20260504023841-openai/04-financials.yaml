      - impact
      - exact diligence path
    rows:
      - - Revenue mix by consumer, business, enterprise, API, and channel
        - Cannot underwrite concentration, seasonality, or durability of each revenue stream
        - Request monthly revenue bridge and deferred-revenue roll-forward by product surface.
      - - Enterprise contract pricing, discounts, and minimum commits
        - List pricing is not enough to assess ASP, revenue quality, or margin capture
        - Review representative enterprise MSAs, order forms, and discount policy memos.
      - - Gross margin and compute COGS by surface
        - Margin path cannot be modeled from public pricing alone
        - Request COGS waterfall split across inference, training, third-party rev share, and support.
      - - Cash on hand, net burn, runway, and financing covenants
        - Capital adequacy remains the largest hard blocker in public-only underwriting
        - Obtain treasury dashboard, cash statement, debt agreements, and board runway scenarios.
      - - Sales efficiency by segment
        - No public CAC, payback, sales cycle, or NRR data
        - Request funnel metrics, CAC by segment, cohort NRR, and enterprise implementation-cost data.
      - - Supplier obligations across Microsoft, Oracle, CoreWeave, and Stargate
        - Cannot net direct obligations against partner-funded capacity and prepayments
        - >-
          Request consolidated committed-spend schedule including take-or-pay, prepayment, and GPU procurement
          responsibilities.
    notes: >-
      These gaps are the minimum private-data requests needed to turn a public research chapter into an investable
