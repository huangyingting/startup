    title: OpenAI has become a multi-surface monetization business, not just a chatbot subscription
    body: >-
      Public materials now show consumer subscriptions, business seats, enterprise contracts, token-priced APIs, and
      usage-based Codex billing. That breadth supports demand durability even though realized revenue mix remains
      private.
