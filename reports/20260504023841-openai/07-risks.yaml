chapter:
  number: 7
  title: Risks
  summary: >-
    OpenAI’s highest residual risks are legal/regulatory exposure, partner concentration, and capital-intensive
    operating dependencies. Public mitigations are meaningful, but litigation, cloud economics, reliability, and
    governance concentration still require explicit kill criteria and private diligence before underwriting downside
    with confidence.
sections:
  - id: section-1
    title: Legal and regulatory risk remains the highest-severity stack
    body: >-
      OpenAI's top risk bucket is still legal and regulatory rather than pure product competition. The New York Times
      litigation matters because it has already pulled the company into discovery and retention questions that directly
      touch user privacy commitments. OpenAI said the extraordinary retention order affecting consumer ChatGPT and API
      content ended in September 2025 and that standard deletion practices resumed, which is a real mitigation. But the
      company's own litigation page also shows the case is still active enough to warrant a dedicated defense site,
      while CourtListener confirms the underlying federal docket remains live. That means the privacy burden can shrink
      without the litigation burden disappearing.


      The second legal stack is governance. Musk v. Altman keeps nonprofit-mission and control questions in court even
      after OpenAI's March 2024 board reset. OpenAI's review materials are useful because they narrow one class of
      concern: the 2023 rupture was framed as a trust breakdown, not a hidden safety or financing scandal. Even so, the
      structure still concentrates board appointment power in the Foundation, and the public-benefit structure does not
      remove the risk of future governance disputes. European scrutiny adds a third layer. The EDPB ChatGPT taskforce
      report and the Commission's 2025 AI Act implementation push both imply that frontier-model providers should expect
      a heavier compliance, documentation, and privacy posture in Europe than a normal software company.
    claimRefs:
