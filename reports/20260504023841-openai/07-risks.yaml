  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold/event
      - action implication
    rows:
      - - Litigation / privacy
        - Retention or discovery burden expands again
        - New court order, regulator action, or customer-notice requirement that overrides stated deletion commitments
        - Pause enterprise-confidence assumptions and increase compliance-cost haircut immediately.
      - - Reliability / product quality
        - Sustained service degradation
        - Quarterly availability meaningfully below current published levels or repeated multi-day major incidents
        - Reduce growth and margin assumptions; treat as product-infrastructure execution miss, not noise.
      - - Platform concentration
        - Counterparty economics worsen
        - Adverse Microsoft reset, Oracle financing stress, or visible capacity delay on a critical program
        - Raise required return, cap position size, and demand fuller contractual disclosure.
      - - Capital intensity
        - Partner-financed capacity outruns monetization
        - Emergency fundraising, delayed buildout, or evidence that fixed commitments are outrunning usage conversion
        - Move from trackable risk to thesis-break territory unless management provides a clean committed-spend bridge.
      - - Governance / leadership
        - Another leadership or board rupture
        - Executive departure, board conflict, or material adverse ruling in mission-governance litigation
        - Treat as a stop-and-reunderwrite event until governance stability is re-established.
    notes: >-
      These criteria are designed to be monitorable from public news, status pages, court developments, and management
      diligence materials rather than from intuition.
