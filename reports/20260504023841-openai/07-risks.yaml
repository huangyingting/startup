  - id: section-2
    title: Operational reliability and security risk are now platform risks, not edge cases
    body: >-
      OpenAI is no longer a novelty app whose outages are merely frustrating. The status history now shows repeated
      incidents across ChatGPT, APIs, login, file handling, and model-specific services, and the 2026-05-04
      connector-write incident is a good example of why reliability has become a core diligence variable. The published
      uptime figures are directionally strong, but 99.83% ChatGPT uptime still leaves enough room for visible disruption
      when OpenAI is embedded inside research, coding, support, and regulated workflows. A frontier-AI platform can
      therefore be both broadly available and still operationally risky for buyers whose work stops when one connector
      or one model route breaks.


      Security risk has the same shape. SecurityWeek's reporting on memory and web-search feature exploits shows how
      fast convenience features can expand attack surface. The OECD.AI incident record and OpenAI's own Axios compromise
      response show that software-supply-chain issues are no longer hypothetical. OpenAI does have real mitigations in
      public view: a security-and-privacy page, a vulnerability-reporting process, and a bug bounty program. But those
      are control signals, not proof that public users and enterprise customers have seen enough postmortem detail,
      red-team evidence, or contract-backed service commitments to underwrite residual risk confidently.
    claimRefs:
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
      - CR022
      - CR023
      - CR024
      - CR025
      - CR045
