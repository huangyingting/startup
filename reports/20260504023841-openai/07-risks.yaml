      - TR002
      - TR004
      - TR005
  - id: section-3
    title: Dependency, capital intensity, and execution span create a transmission path into margin and valuation
    body: >-
      OpenAI's partner stack is simultaneously a moat and a concentration problem. Microsoft remains foundational from
      the 2023 partnership onward, and the public record still treats Azure as structurally central to research, APIs,
      and products. Oracle and Stargate are best read as partial diversification rather than independence: they add
      capacity and financing options, but they also create a second layer of counterparties whose own capital plans now
      explicitly cite OpenAI demand. CoreWeave adds a third concentrated node with an infrastructure agreement worth up
      to $11.9 billion plus OpenAI equity participation. If any one of these relationships reprices, stalls, or
      underdelivers, the damage can propagate into product availability, gross margin, and financing needs rather than
      staying isolated inside procurement.


      The financial-model risk is that public demand proxies are real while public durability and obligation data are
      incomplete. OpenAI's 2025 enterprise report shows 8x enterprise-message growth and 320x growth in reasoning-token
      consumption, which means outages, compliance limits, or channel shocks would now hit a much bigger installed
      workflow base than a year earlier. But ChartMogul's warning about short opt-out AI contracts and revenue that
      looks recurring before it is durable is a useful corrective. Leadership breadth is improving, particularly with
      Fidji Simo taking the Applications role, yet the company still asks investors to trust a very wide execution span
      across research, consumer, enterprise, API, and partner motions without publishing the succession, P&L, or
      committed-spend detail that would close the loop.
    claimRefs:
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
      - CI042
      - CR033
      - CU055
      - CU056
      - CR034
      - CR035
      - CU006
      - CR036
      - CR037
      - CR045
