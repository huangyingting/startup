chapter:
  number: 6
  title: Customers
  summary: >-
    OpenAI’s customer base is already broad across workplace seats, API builders, and partner-led enterprise programs,
    with unusually strong public proof in banking, retail, fintech support, and enterprise software. The public record
    shows rapid adoption and workflow expansion, but it still does not disclose retention cohorts, contract terms, or
    customer concentration well enough to fully underwrite durability.
sections:
  - id: section-1
    title: Customer base spans workplace seats, API builders, and partner-led enterprise programs
    body: >-
      OpenAI’s customer base is no longer a single “ChatGPT for knowledge workers” story. The public record now supports
      three distinct routes to revenue. First, OpenAI has a direct workplace-seat business: its customer-story hub says
      1M businesses use OpenAI, the November 2025 milestone post says more than 1 million business customers are
      directly using OpenAI, VentureBeat reported 3 million paying business users by June 2025, and the 2025 enterprise
      report says OpenAI serves more than 7 million ChatGPT workplace seats. That combination implies both breadth and
      speed: OpenAI is attracting a very large number of organizations while also deepening entitlements inside those
      organizations.


      Second, OpenAI has an API-led builder segment with increasingly production-grade usage. The enterprise report says
      more than 9,000 organizations have processed over 10 billion tokens, nearly 200 organizations have exceeded 1
      trillion tokens, and average reasoning-token consumption per organization rose roughly 320x year over year. API
      usage is not confined to classic software companies either. OpenAI’s own report says customer support and content
      generation together make up about 20% of API activity, and non-technology firm API use grew 5x year over year.
      Mercado Libre’s Verdi platform reinforces that developer/platform buyer map: OpenAI says 17,000 developers can
      build on it across more than 30,000 microservices.


      Third, enterprise reach is increasingly amplified by channels and partners. TechCrunch’s Ramp-based snapshot
      suggests OpenAI is winning share inside U.S. business AI spend, while Microsoft customer stories and Accenture’s
      December 2025 announcement show OpenAI getting pulled into larger transformation budgets through Azure and
      consulting-led rollouts. This matters for diligence because the buyer, user, and payer are not always the same
      party. In some accounts a central IT or digital leader buys ChatGPT seats for broad workforce use; in others a
      product or platform team pays for API usage; in others a services or cloud partner shapes the deployment path.
      OpenAI therefore looks less like a narrow app vendor and more like a multi-surface enterprise platform with
      several go-to-market motions running at once.
