tables:
  - id: T601
    title: Customer segmentation table
    columns:
      - segment
      - buyer / user / payer
      - primary use case
      - evidence-backed scale
      - revenue / strategic value
      - gap
    rows:
      - - Workplace-seat knowledge work
        - 'Buyer: function lead or IT; user: employees; payer: department or enterprise budget'
        - Drafting, analysis, search, and task assistance inside ChatGPT workspaces
        - '>1M business customers; >7M workplace seats; 3M paying business users'
        - Largest visible direct-distribution motion and easiest land motion into broader accounts
        - Public sources do not split Business, Enterprise, and Edu seat mix or ARPU by cohort.
      - - Developer / platform teams
        - 'Buyer: CTO, product, or platform lead; user: developers; payer: engineering or product budget'
        - In-product assistants, search, customer support, automation, and custom applications via API
        - >-
          >9,000 orgs over 10B tokens; nearly 200 orgs over 1T tokens; Mercado Libre supports 17,000 developers across
          30,000+ microservices
        - >-
          Strategically important because API usage ties OpenAI into customer products and creates higher switching
          costs
        - Direct OpenAI versus Azure-linked API share is not public.
      - - Regulated enterprise knowledge work
        - >-
          Buyer: digital, ops, or compliance leadership; user: advisors and bank employees; payer: enterprise
          procurement
        - Research, summarization, internal knowledge, and workflow automation in finance
        - Morgan Stanley reports 98% advisor-team adoption; BBVA reports 83% weekly active usage and 20,000+ custom GPTs
        - High-value proof that OpenAI can clear governance hurdles in regulated environments
        - Contract size, renewal timing, and pricing remain undisclosed.
      - - Customer-support automation
        - 'Buyer: support leadership; user: support agents and end customers; payer: support or operations budget'
        - Automated chat, phone, and multilingual customer service
        - >-
          Klarna handled 2.3M conversations in month one; Intercom averages 41% conversation resolution and 53%
          end-to-end phone resolution
        - Strong ROI-oriented segment with measurable labor and latency benefits
        - OpenAI does not publish aggregate support-sector retention or margin by customer cohort.
      - - Retail assistance
        - >-
          Buyer: digital or store-operations leadership; user: shoppers and store associates; payer: retail IT /
          operations budget
        - Product discovery, project advice, and associate enablement
        - Lowe’s says Mylow Companion launched across 1,700+ stores and Mylow links advice to product discovery
        - Shows OpenAI can support both customer-facing and employee-facing retail workflows
        - No public GMV, conversion, or basket-size uplift is disclosed.
      - - Partner-led enterprise transformation
        - >-
          Buyer: CIO or transformation sponsor; user: client teams and consultants; payer: enterprise transformation
          budget
        - OpenAI adoption accelerated through consulting programs and Azure deployments
        - >-
          Accenture will equip tens of thousands of professionals; Microsoft customer stories show Azure OpenAI in
          retail and banking
        - Expands reach into large enterprises and regulated deployments without relying only on direct sales
        - Partner-sourced revenue, customer ownership, and gross-margin split are not public.
    notes: >-
      The segmentation that is best supported publicly is by route-to-market and workflow, not by revenue band. The
      evidence points to a blended customer base spanning direct seats, API builders, and partner-mediated enterprise
      deployments.
