  - id: section-2
    title: Named customer proof is strongest in regulated knowledge work, support automation, and retail assistance
    body: >-
      The best public customer proof is not evenly distributed across all segments; it is concentrated in a few
      recurring jobs-to-be-done. Regulated knowledge work is one of the clearest. Morgan Stanley says AI @ Morgan
      Stanley Debrief drafts notes, action items, emails, and Salesforce updates with client consent, and the firm says
      98% of Financial Advisor teams have adopted AI @ Morgan Stanley Assistant. BBVA is the other high-signal
      financial-services case: OpenAI’s November 2025 case study says employees save about three hours per week, weekly
      active usage reached 83%, and staff created more than 20,000 custom GPTs, with about 4,000 used frequently. Taken
      together, those two references show OpenAI can move beyond pilots in heavily regulated environments where workflow
      quality and trust matter.


      Customer-service automation is the second major proof cluster. Klarna’s February 2024 release says its
      OpenAI-powered assistant handled 2.3 million conversations in the first month, covered two-thirds of
      customer-service chats, cut repeat inquiries 25%, and reduced resolution times from 11 minutes to under two.
      Intercom gives a more enterprise-software-shaped version of the same story. Intercom says Fin averages 41%
      conversation resolution across thousands of customers, while OpenAI’s 2025 enterprise report says Fin Voice
      reduced latency 48%, resolves 53% of calls end to end, and makes human-escalated calls 40% faster. These are not
      generic “AI assistant” testimonials; they are explicit workflow metrics tied to support operations.


      Retail assistance is the third cluster. Lowe’s says Mylow gives customers real-time project guidance and product
      discovery, and that Mylow Companion rolled out to associates across more than 1,700 stores. Digital Commerce 360
      independently confirms Mylow is live on Lowe’s website and mobile app for logged-in shoppers, and OpenAI says the
      associate tool runs on the same foundation as the customer-facing advisor. The cumulative pattern across Morgan
      Stanley, BBVA, Klarna, Intercom, and Lowe’s is important: OpenAI’s public reference base is strongest where the
      buyer can point to a concrete workflow, measurable time savings, or clear service-level improvement rather than a
      vague innovation narrative.
