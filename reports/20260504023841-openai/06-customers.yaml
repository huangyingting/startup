  - id: section-4
    title: Channel dependence and concentration remain the main customer-underwriting blind spots
    body: >-
      OpenAI’s enterprise growth is broad, but public evidence also shows that customer ownership is not always direct.
      Microsoft’s customer stories show Azure OpenAI being used for retail and banking deployments such as Worten and
      Discovery Bank, while Accenture says it will put ChatGPT Enterprise in the hands of tens of thousands of
      professionals and build OpenAI-based programs for financial services, healthcare, the public sector, and retail.
      Those sources are positive because they confirm ecosystem leverage, yet they also imply that some enterprise
      expansion may be mediated by cloud or services partners rather than won and serviced entirely through OpenAI’s own
      field motion.


      This is where customer concentration risk becomes difficult to underwrite from public evidence alone. The public
      record does not reveal what percentage of customer growth comes from direct seat sales versus Azure-linked
      consumption, partner-led implementations, or large lighthouse accounts. It also does not reveal the contribution
      of the biggest customers to ARR, renewal schedules, or support burden. That gap matters because a company can
      simultaneously show outstanding top-line adoption and still be dependent on a relatively small number of very
      large enterprise relationships or channels.


      The right diligence posture is therefore two-sided. On the positive side, OpenAI appears to have built a customer
      machine that can sell to knowledge workers, developers, retailers, banks, fintechs, and enterprise-software
      vendors with unusually fast expansion signals. On the risk side, the absence of public concentration and contract
      data means the customer story is still incomplete until management can show retention by cohort, top-customer
      exposure, partner-sourced ARR, and the commercial terms that turn adoption into durable recurring revenue.
    claimRefs:
      - CU021
      - CU022
      - CU024
      - CU053
      - CU054
      - CU055
      - CU056
