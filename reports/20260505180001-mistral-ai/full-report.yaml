  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Mistral AI operates at the intersection of two overlapping markets: the open-source LLM ecosystem and the
              proprietary AI foundation model API market. The relevant serviceable market for Mistral's commercial
              business (La Plateforme) is best defined as the "foundation model API" segment — services providing text,
              code, or multimodal generation capability on a usage-based (token) pricing model to developers, enterprise
              teams, and cloud re-sellers.

              This market explicitly excludes: (1) GPU and cloud compute infrastructure spending (captured by NVIDIA,
              AWS, GCP, Azure); (2) AI-embedded SaaS applications where the AI is a feature within an existing software
              suite (Salesforce Einstein, Microsoft Copilot); (3) on-premises deployments of open-weight models that
              generate no direct API revenue. The total AI spending market estimated at $235-632B by 2028 substantially
              includes these excluded categories; the foundation model API sub-market is a $15-25B subset.

              Key substitutes for Mistral's API include: Azure OpenAI Service (Microsoft), Anthropic Claude API, Google
              Vertex AI Gemini models, Cohere API, and self-hosted open-weight deployments of Mistral's own models or
              Meta's LLaMA family. The self-hosting option (Mistral open-weight) is a unique dynamic where Mistral's own
              open-source models act as both a community adoption driver and a competitive substitute for its commercial
              API revenue. Understanding this tension is essential for evaluating how Mistral monetizes community trust.
            claimRefs:
              - CM004
              - CM005
              - CM006
              - CM017
