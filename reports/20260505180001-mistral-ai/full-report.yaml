      - number: '2.2'
        title: Market Sizing and Mistral's Position
        blocks:
          - type: paragraph
            body: >
              The foundation model API market is growing rapidly from an estimated $6.4B LLM market in 2023 to a
              projected $36B+ by 2030 at 37% CAGR (Grand View Research consensus). Global enterprise AI spending,
              broadly defined by IDC, reaches $235B in 2024 and $632B by 2028 — though only 10-15% of this is
              attributable to foundation model API spending as opposed to compute, services, and embedded software.
              OpenAI dominates this sub-market with $3.7B ARR in 2024 (approximately 40-50% market share), followed by
              Anthropic at ~$1B. Mistral AI's estimated $200M ARR represents approximately 5% market share and
              substantial headroom.

              The European AI market is a strategically differentiated sub-segment for Mistral: European enterprise AI
              spending reached €30-40B in 2024 (Dealroom, European Commission), and EU AI Act compliance requirements
              are driving procurement toward EU-sovereign AI providers. PwC estimates €8B in AI compliance-related
              enterprise spending in Europe through 2027 — creating a structural tailwind for Mistral that no US
              competitor can replicate. NVIDIA's $35B annualized data center revenue signals extraordinary AI
              infrastructure investment, but a16z's "AI's $600B question" analysis highlights that model API revenue is
              still a small fraction of this compute spend, suggesting either significant future market expansion or a
              valuation bubble risk.
