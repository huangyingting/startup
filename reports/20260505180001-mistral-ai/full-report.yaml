      - number: '1.3'
        title: Funding History and Capital Position
        blocks:
          - type: paragraph
            body: >
              Mistral AI has executed one of the fastest capital formations in European tech history, raising over $1.1B
              across three rounds in its first 14 months of existence. The €105M seed round in June 2023 — led by
              Lightspeed with participation from a16z, Xavier Niel, and others — was the largest AI seed round in
              European history at the time, signaling exceptional investor conviction in the team before any product had
              shipped.

              The Series A followed in December 2023 at approximately $2B valuation, co-led by a16z and driven by the
              extraordinary market reception of Mistral 7B (released September 2023) and Mixtral 8x7B (released December
              2023) — both viral community releases that demonstrated the team could produce frontier-quality models on
              a fraction of US lab compute budgets. The Series B in June 2024 at $6B valuation with €600M ($640M) raised
              cemented Mistral as Europe's leading AI unicorn, with General Catalyst and Lightspeed co-leading.

              A notable and controversy-generating event was Microsoft's small strategic investment in March 2024,
              alongside a distribution deal that made Mistral models available on Azure AI Studio. The European
              Commission briefly examined whether this constituted a notifiable merger under EU competition law, though
              no formal proceeding resulted. The episode highlights the tension between Mistral's European champion
              positioning and its pragmatic embrace of US hyperscaler distribution channels. Estimated total raised
              through mid-2024 is approximately $1.17B; the company is not known to have raised a Series C as of May
              2026, suggesting strong cash efficiency or readiness for a larger capital event.
