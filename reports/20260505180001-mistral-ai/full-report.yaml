  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Mistral AI operates an open-core revenue model: permissively-licensed open-weight models (Mistral 7B,
              Mixtral 8x7B/8x22B) drive developer community adoption at no direct revenue, while the La Plateforme API
              (proprietary frontier models), enterprise contracts, and cloud marketplace listings generate commercial
              revenue. La Plateforme charges on a per-token usage basis — approximately $3/million input tokens and
