chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: >
              Mistral AI was founded in April 2023 by three world-class machine learning researchers: Arthur Mensch
              (CEO), Guillaume Lample, and Timothée Lacroix. All three left prestigious posts — Mensch from DeepMind,
              and Lample and Lacroix from Meta AI's FAIR research lab — to build what they believe can become Europe's
              defining frontier AI company. Headquartered in Paris with a small US footprint, Mistral is explicitly
              positioned as a European AI champion, competing against US hyperscaler labs (OpenAI, Anthropic, Google
              DeepMind) on efficiency, openness, and regulatory alignment.

              The company's core mission is to make frontier AI accessible and trustworthy through a dual-track model
              strategy: releasing efficient open-weight models under permissive licenses (Mistral 7B, Mixtral
              8x7B/8x22B) to build community trust and developer ecosystems, while monetizing via proprietary frontier
              models (Mistral Large, Mistral Medium, Codestral) on the La Plateforme API and cloud marketplace channels.
              This open-core approach mirrors Red Hat's playbook in open-source infrastructure and has enabled unusually
              rapid enterprise adoption relative to the company's young age.

              Mistral's corporate structure as a French SAS gives it credibility with European institutions navigating
              AI regulation — particularly the EU AI Act — while the company's lean operating model (estimated 400-500
              headcount) relative to its revenue scale signals strong capital efficiency. The Paris office remains the
              engineering center of gravity, with the US San Francisco presence focused on enterprise sales and
              partnership development.
            claimRefs:
