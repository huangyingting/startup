  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Mistral AI's regulatory risk profile is uniquely shaped by its European headquarters and the EU AI Act.
              The company is subject to GPAI (General Purpose AI) model obligations under the EU AI Act, but benefits
              from the open-source carve-out that exempts open-weight model releases from the most burdensome
              documentation and transparency requirements. Arthur Mensch personally engaged with European Parliament
              members during AI Act negotiations to advocate for these exemptions, successfully influencing the final
              text. This lobbying success reduces near-term regulatory compliance burden but creates reputational risk
              if a Mistral open-weight model becomes associated with harmful applications — the company would face
              heightened criticism for having argued against stricter regulation.

              The copyright training data litigation environment represents a medium-term legal risk. While Mistral has
              not been named in any copyright lawsuit as of May 2026, the global precedent-setting cases (NYT v. OpenAI,
              Authors Guild class action) create industry-wide exposure. The EU's DSM Directive Article 4 TDM exemption
              provides stronger protection in European jurisdictions than US fair use doctrine, partially mitigating
              this risk. The EU DG COMP inquiry into the Microsoft equity stake has been resolved without action but
              signals ongoing regulatory attention to Big Tech-AI startup relationships that could complicate future
              fundraising from US strategic investors.
            claimRefs:
