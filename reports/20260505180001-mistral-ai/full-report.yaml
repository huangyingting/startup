      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              The Mistral AI co-founding team combines frontier AI research credentials with complementary skills.
              Arthur Mensch, CEO, holds a PhD from École Polytechnique and worked at DeepMind on efficient transformer
              architectures; his publication record on sparse and efficient models directly informs Mistral's
              architecture differentiation. His positioning as a vocal European AI advocate — including direct lobbying
              of EU officials on the AI Act — has made him the company's public face and a recognized figure in European
              tech policy circles.

              Guillaume Lample is one of the co-inventors of the LLaMA family of language models at Meta AI FAIR, which
              became the dominant open-source base for the 2023 open LLM ecosystem. His deep expertise in large-scale
              pre-training and model evaluation is central to Mistral's ability to produce competitive models with
              smaller teams and budgets than US labs. Timothée Lacroix brings complementary infrastructure and ML
              systems expertise from Meta AI FAIR, with publications on knowledge graph embeddings and distributed
              training, critical for maintaining training pipeline efficiency at scale.

              No leadership departures have been publicly reported through May 2026, maintaining the founding team's
              stability. Key-person risk is material given the company's technical dependence on a small founding team,
              though this is partially mitigated by the fact that all three founders remain active. The company has not
              disclosed board composition details beyond investor participation.
