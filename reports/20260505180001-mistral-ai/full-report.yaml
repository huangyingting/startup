        title: Exhibits
        blocks:
          - type: callout
            title: EU AI Act creates structural procurement advantage
            body: >-
              Mistral's French domicile and EU-sovereign data handling position it uniquely to capture €8B+ in EU AI Act
              compliance-driven enterprise spending that no US-based AI lab can claim with equal credibility. This is a
              durable structural advantage in the world's second-largest AI market.
