companyProfile:
  summary: >
    Mistral AI was founded in April 2023 by ex-DeepMind (Arthur Mensch) and Meta FAIR (Guillaume Lample, Timothée
    Lacroix) researchers, becoming France's first AI unicorn within six months. The company has raised €1.1B across
    three rounds and is valued at €6B. Mistral builds both open-source models (Mistral 7B, Mixtral 8x7B MoE — Apache
    2.0) and proprietary frontier models (Mistral Large, Mistral Medium) available via La Plateforme API. Its sovereign
    AI positioning — exclusively compliant with EU GDPR, AI Act, and data residency requirements — gives it a defensible
    enterprise niche that US-based competitors structurally cannot fill. The company estimates ~$200M ARR in 2024-2025,
    with distribution partnerships with Microsoft Azure, Google Cloud, and Snowflake.
