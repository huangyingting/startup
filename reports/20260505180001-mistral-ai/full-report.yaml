      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 'TRACK: High-conviction monitoring, not immediate investment at $6B'
            body: >-
              Mistral AI is Europe's only frontier AI company at scale, with a genuine sovereign regulatory moat, MoE
              efficiency advantage, and exceptional capital efficiency. However, the $6B valuation at 30x unaudited ARR
              with no NRR data, no audited financials, and unresolved Big Tech competitive pressure does not justify
              immediate primary investment. The Series C (expected 2025-2026 at $8-12B if milestones met) represents a
              potential better-risk-adjusted entry point after key diligence questions are resolved.
            calloutType: insight
            claimRefs:
              - CV021
              - CV025
              - CV009
              - CV010
          - type: callout
            title: Valuation analysis built on media-estimated ARR — critical caveat
            body: >-
              All return scenarios and multiple analyses in this chapter are built on ARR estimates from Bloomberg and
              The Information (~$200M as of early 2025). These figures have not been audited or confirmed by Mistral
              management. A 20-30% downward revision to ARR would materially affect all valuation conclusions. Resolving
              this uncertainty is the single most important diligence action.
            calloutType: insight
            claimRefs:
              - CV001
              - CV023
              - CV027
          - type: callout
            title: Mistral appears materially undervalued vs. US AI peers on relative multiple basis
            body: >-
              At $6B and 30x ARR, Mistral trades at a 80% discount to xAI ($50B, similar ARR stage) and a significant
              discount to OpenAI (46x ARR) and Anthropic (18-36x ARR). While some discount for EU market focus and lower
              scale is warranted, the magnitude of the discount suggests either European AI is undervalued by global
              capital markets or US AI peers are significantly overvalued — a judgment call for investors with
              multi-market conviction.
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
              - CV022
