      - number: '5.2'
        title: Technology Differentiation and Architecture
        blocks:
          - type: paragraph
            body: >
              Mistral's core architectural innovations are Grouped Query Attention (GQA), Sliding Window Attention
              (SWA), and Sparse Mixture of Experts (SMoE). GQA reduces KV cache memory bandwidth by allowing multiple
              query heads to share key-value heads, enabling higher-throughput batch inference. SWA allows processing of
              long sequences at linear (rather than quadratic) attention cost. SMoE in Mixtral routes each token to the
              2 most relevant of 8 expert layers, activating only 12.9B of 47B parameters per forward pass — achieving
              LLaMA 2 70B-level performance at approximately 1/6th the inference compute cost. These were novel
              efficiency techniques at the time of Mistral's releases and remain architecturally differentiated from
              dense transformer competitors.

              Mistral's multilingual training strategy is a genuine product moat: native French, German, Spanish, and
              Italian fluency (rather than post-hoc fine-tuning) produces higher quality outputs in European enterprise
              language tasks. The open-weight transparency also enables reproducibility and auditable inference for
              enterprises with compliance mandates requiring explainable AI processes, a requirement Mistral's closed
              competitors cannot meet without significant additional disclosure.
