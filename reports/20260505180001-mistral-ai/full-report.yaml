      - number: '8.3'
        title: Investment Recommendation and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              The recommendation is TRACK: Mistral AI merits high-conviction monitoring and deep diligence preparation
              for investment, but not immediate commitment at the $6B mark without resolving key financial diligence
              gaps. The sovereign AI positioning, MoE efficiency architecture, and ARR growth trajectory are genuine
              competitive advantages that create a strong fundamental investment thesis. The 30x ARR multiple at current
              growth is fair-to-slightly-stretched given the absence of audited financials and undisclosed NRR.
              Investors should act quickly.

              Immediate diligence actions required before investment: (1) request audited FY2023-FY2024 revenue and
              verify $200M ARR estimate; (2) obtain NRR by customer cohort to validate ARR quality; (3) confirm cap
              table and preference stack from Series B; (4) assess IP clean-room status for founder transitions; (5)
              evaluate EU GPAI Code of Practice compliance plan and cost estimates; (6) obtain customer concentration
              data (top 5 customers as % of ARR) and channel breakdown (direct vs. marketplace). Expected Series C at
              $8-12B in 2025-2026 if ARR milestones are met represents a potential entry opportunity at a materially
              better risk-adjusted mark.
            claimRefs:
              - CV019
