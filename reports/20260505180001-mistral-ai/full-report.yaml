      - number: '8.2'
        title: Investment Thesis, Anti-Thesis, and Scenarios
        blocks:
          - type: paragraph
            body: >
              The bull case for Mistral AI rests on four pillars: (1) Europe's only frontier AI company at scale with a
              genuine sovereign regulatory moat that US competitors cannot easily replicate; (2) MoE architectural
              efficiency that produces market-leading performance-per-compute-cost, enabling competitive quality at
              lower API pricing; (3) open-source flywheel that structurally reduces CAC and builds developer community
              moat at zero marginal cost; and (4) exceptional capital efficiency ($200M ARR on $1.17B raised) that
              demonstrates commercial execution. In the bull case, ARR reaches $400-500M by end 2025, Series C is raised
              at $10-12B, and IPO in 2028 at $1.5B ARR and 15-20x implies a $22-30B enterprise value — roughly 4-5x the
              Series B mark.

              The bear case is driven by the structural threats: Meta's LLaMA 4 matches Mistral's open-weight models in
              quality, causing developer community attrition; token price deflation exceeds 70% in 2025 in an OpenAI-led
              race to zero; and EU GPAI Code of Practice compliance costs force Mistral to close-source its models,
              eliminating the open-core GTM. In this scenario, ARR growth decelerates to 30-40%, Series C is
              flat-to-down at $5-6B, and terminal value depends on a strategic acquisition at modest premium. The base
              case probability-weighted expected return is approximately 1.8-2.1x over 4-5 years (~15-20% IRR), below
              typical VC hurdle rates but potentially appropriate for growth equity with downside protection.
            claimRefs:
