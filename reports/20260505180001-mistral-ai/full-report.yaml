            title: Token price deflation is a structural revenue headwind
            body: >-
              AI API prices have declined 90% since 2022 and continue falling as model efficiency improves and
              competition increases. Revenue growth requires extreme volume scaling to outpace price deflation —
              creating margin pressure even as Mistral's cost efficiency (MoE) provides relative relief.
            calloutType: insight
