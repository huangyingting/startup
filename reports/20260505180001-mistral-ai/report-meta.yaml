summary:
  headline: >
    Mistral AI is Europe's leading open-source AI company with a sovereign AI moat, MoE compute efficiency
    advantage, and ~$200M ARR. The $6B valuation at 30x ARR is fair for 100%+ ARR growth but carries high
    risks from Big Tech resource asymmetry and undisclosed financials. Track for Series C entry.
