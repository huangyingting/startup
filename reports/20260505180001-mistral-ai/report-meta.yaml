  productSummary: >
    Open-source models (Mistral 7B Apache 2.0; Mixtral 8x7B Sparse MoE) for developer adoption and
    enterprise self-hosting; proprietary models (Mistral Large, Mistral Medium, Mistral Small) via
    La Plateforme API (REST + Python/TypeScript SDK); Le Chat consumer chatbot (~1M users); enterprise
    private deployments with EU data residency guarantees; distribution via Azure AI Studio, Google Cloud,
    AWS Bedrock, Snowflake Cortex.
  customerFocus: >
    Enterprise developers and engineering teams requiring EU-compliant AI APIs; European regulated industries
    (public sector, financial services, healthcare); government ministries requiring sovereign AI deployments.
  businessModel: >
    Dual open-core model: open-source models drive developer adoption and brand; commercial API (token-based
    pricing) and enterprise self-hosting licenses generate revenue. Distribution via cloud marketplace listings
    (Azure, GCP) adds GTM reach.
