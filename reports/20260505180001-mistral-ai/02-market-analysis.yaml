callouts:
  - type: strength
    title: EU AI Act creates structural procurement advantage
    body: >-
      Mistral's French domicile and EU-sovereign data handling position it uniquely to capture €8B+ in EU AI Act
      compliance-driven enterprise spending that no US-based AI lab can claim with equal credibility. This is a durable
      structural advantage in the world's second-largest AI market.
    claimRefs:
      - CM014
      - CM015
      - CM023
  - type: risk
    title: Token price deflation is a structural revenue headwind
    body: >-
      AI API prices have declined 90% since 2022 and continue falling as model efficiency improves and competition
      increases. Revenue growth requires extreme volume scaling to outpace price deflation — creating margin pressure
      even as Mistral's cost efficiency (MoE) provides relative relief.
    claimRefs:
      - CM021
      - CM029
      - CM033
  - type: risk
    title: Hyperscaler embedded AI may commoditize the mid-tier
    body: >-
      Microsoft Copilot (M365 AI) and Google Workspace AI are embedding foundation model capability into the enterprise
      software suites used by 1B+ users. If these products address the use cases that currently drive API adoption, the
      addressable market for standalone AI API providers shrinks substantially.
    claimRefs:
      - CM031
      - CM006
