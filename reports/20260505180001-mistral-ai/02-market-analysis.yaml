sections:
  - title: Market Boundary and Definition
    body: >
      Mistral AI operates at the intersection of two overlapping markets: the open-source LLM ecosystem and the
      proprietary AI foundation model API market. The relevant serviceable market for Mistral's commercial business (La
      Plateforme) is best defined as the "foundation model API" segment — services providing text, code, or multimodal
      generation capability on a usage-based (token) pricing model to developers, enterprise teams, and cloud
      re-sellers.

      This market explicitly excludes: (1) GPU and cloud compute infrastructure spending (captured by NVIDIA, AWS, GCP,
      Azure); (2) AI-embedded SaaS applications where the AI is a feature within an existing software suite (Salesforce
      Einstein, Microsoft Copilot); (3) on-premises deployments of open-weight models that generate no direct API
      revenue. The total AI spending market estimated at $235-632B by 2028 substantially includes these excluded
      categories; the foundation model API sub-market is a $15-25B subset.

      Key substitutes for Mistral's API include: Azure OpenAI Service (Microsoft), Anthropic Claude API, Google Vertex
      AI Gemini models, Cohere API, and self-hosted open-weight deployments of Mistral's own models or Meta's LLaMA
      family. The self-hosting option (Mistral open-weight) is a unique dynamic where Mistral's own open-source models
      act as both a community adoption driver and a competitive substitute for its commercial API revenue. Understanding
      this tension is essential for evaluating how Mistral monetizes community trust.
    claimRefs:
      - CM004
      - CM005
      - CM006
      - CM017
    tableRefs:
      - TM001
  - title: Market Sizing and Mistral's Position
    body: >
      The foundation model API market is growing rapidly from an estimated $6.4B LLM market in 2023 to a projected $36B+
      by 2030 at 37% CAGR (Grand View Research consensus). Global enterprise AI spending, broadly defined by IDC,
      reaches $235B in 2024 and $632B by 2028 — though only 10-15% of this is attributable to foundation model API
      spending as opposed to compute, services, and embedded software. OpenAI dominates this sub-market with $3.7B ARR
      in 2024 (approximately 40-50% market share), followed by Anthropic at ~$1B. Mistral AI's estimated $200M ARR
      represents approximately 5% market share and substantial headroom.

      The European AI market is a strategically differentiated sub-segment for Mistral: European enterprise AI spending
      reached €30-40B in 2024 (Dealroom, European Commission), and EU AI Act compliance requirements are driving
      procurement toward EU-sovereign AI providers. PwC estimates €8B in AI compliance-related enterprise spending in
      Europe through 2027 — creating a structural tailwind for Mistral that no US competitor can replicate. NVIDIA's
      $35B annualized data center revenue signals extraordinary AI infrastructure investment, but a16z's "AI's $600B
      question" analysis highlights that model API revenue is still a small fraction of this compute spend, suggesting
      either significant future market expansion or a valuation bubble risk.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM007
      - CM016
      - CM022
      - CM023
      - CM030
    tableRefs:
