callouts:
  - type: strength
    title: Snowflake and IBM integrations create enterprise distribution moat at cloud scale
    body: >-
      Mistral's integration into IBM WatsonX (Fortune 500 enterprise AI) and Snowflake Cortex AI (9,000+ data cloud
      customers) creates distribution reach that a pure direct-sales approach could not achieve. Customers find and
      adopt Mistral within their existing vendor relationships, bypassing CISO-level procurement friction.
    claimRefs:
      - C177
      - C178
      - C208
  - type: strength
    title: French sovereign AI positioning creates a defensible EU government customer moat
    body: >-
      The Albert deployment for French civil servants and EU regulatory advantage makes Mistral the default choice in
      European public sector AI procurement, where geopolitical supply chain concerns and GDPR data localization
      requirements systematically disadvantage US-incorporated competitors.
    claimRefs:
      - C184
      - C193
      - C202
  - type: risk
    title: Limited US enterprise penetration and absence of published NRR create key diligence gaps
    body: >-
      Mistral's enterprise customer base is heavily European with minimal named US reference customers. The absence of
      any disclosed NRR, churn, or customer count data makes revenue quality assessment dependent on inference.
      Geographic concentration in Europe limits TAM unless North America direct sales expands significantly.
    claimRefs:
      - C197
      - C204
      - C209
