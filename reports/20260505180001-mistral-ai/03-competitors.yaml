callouts:
  - type: strength
    title: EU sovereignty is Mistral's most durable moat
    body: >-
      Mistral's French domicile and EU AI Act alignment creates a regulatory advantage that no US-based competitor can
      replicate structurally. As EU AI Act obligations phase in, European regulated enterprises will face increasing
      procurement pressure toward EU-sovereign AI providers.
    claimRefs:
      - C086
      - C094
      - C100
  - type: risk
    title: Meta LLaMA threatens open-weight leadership
    body: >-
      Meta's $35B annual compute capex and LLaMA 3's download dominance represent an existential threat to Mistral's
      open-weight market position. Mistral cannot match Meta's scale and must win on efficiency, European
      specialization, and architectural innovation to maintain community relevance.
    claimRefs:
      - C074
      - C075
      - C105
  - type: risk
    title: OpenAI's Azure distribution moat is structural
    body: >-
      Azure OpenAI Service's exclusive integration into Microsoft's enterprise sales channel creates a distribution
      advantage that Mistral's multi-cloud approach (Azure + AWS + IBM) cannot fully replicate; Microsoft's 100M+
      enterprise users represent a captive procurement channel that independent API providers will struggle to displace.
    claimRefs:
      - C071
      - C087
      - C088
