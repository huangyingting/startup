      - number: '2.4'
        title: 证据要点
        blocks:
          - type: callout
            title: EU AI Act 带来结构性采购优势
            body: >-
              Mistral 的法国注册地和 EU 主权数据处理定位，让它能独特承接 €8B+ 由 EU AI Act 合规驱动的企业支出；美国 AI 实验室很难拿出同等可信度。这是全球第二大 AI
              市场中一项持久的结构性优势。
            calloutType: insight
            claimRefs:
              - CM014
              - CM015
              - CM023
          - type: callout
            title: Token 价格通缩是结构性收入逆风
            body: 2022 年以来，AI API 价格已下降 90%，并且随着模型效率提升和竞争加剧继续下行。收入增长需要极端放大用量，才能跑赢价格通缩；即便 Mistral 的 MoE 成本效率提供相对缓冲，利润率仍会承压。
            calloutType: insight
            claimRefs:
              - CM021
              - CM029
              - CM033
          - type: callout
            title: 超大规模云嵌入式 AI 可能让中端市场商品化
            body: >-
              Microsoft Copilot（M365 AI）和 Google Workspace AI 正把基础模型能力嵌入 1B+ 用户已经使用的企业软件套件。如果这些产品覆盖了当前推动 API 采用的用例，独立 AI
              API 供应商的可触达市场会明显收缩。
            calloutType: insight
            claimRefs:
