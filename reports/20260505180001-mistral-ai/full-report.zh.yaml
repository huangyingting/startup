        title: 估值与可比分析
        blocks:
          - type: paragraph
            body: >
              Mistral AI Series B 的 $6B 估值，约等于估计 ARR 的 30 倍（early 2025 收入运行率 $200M），落在 Bessemer 2024 AI 云基准所示顶四分位 AI
              原生公司 25-50 倍区间的低端；这些公司年增速超过 100%。在私有 AI 公司可比组里，Mistral 低于 Anthropic（ARR 更高时 $18B）和 OpenAI（规模与品牌占优时
              $157B），高于 Cohere（$5B），也是唯一被纳入的主要 EU AI 公司。xAI 对比（$50B 估值）显示 US-EU 估值差距非常刺眼——xAI 在相近 ARR 阶段估值是 Mistral 的 8
              倍，反映美国市场规模、Elon Musk 品牌分发，以及美国投资人风险偏好。

              Snowflake（当前市场约 8 倍，IPO 时约 50-80 倍）、MongoDB（约 10 倍）和 Datadog（约 15-20 倍）等上市公司终局倍数，为 IPO
              退出倍数讨论提供锚点。考虑到增速更快、定位 AI 原生，Mistral 在 IPO 时可能享有高于这些 SaaS 倍数的溢价，但长期仍会面对同样的倍数压缩路径。NVIDIA FY2025 10-K（收入
              $130B，数据中心同比增长 142%）验证了企业 AI 基础设施需求的巨大规模，也支撑 Mistral 的可寻址市场。Azure 含 AI 的 Intelligent Cloud 收入同比增长 29%、达到
              $105B，进一步验证市场。
