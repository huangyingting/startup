companyProfile:
  summary: >
    Mistral AI 由前 DeepMind（Arthur Mensch）和 Meta FAIR（Guillaume Lample、Timothée Lacroix）研究员于 2023 年 4 月创立，6 个月内成为法国首家 AI
    独角兽。公司三轮累计融资 €1.1B，估值 €6B。Mistral 同时做开源模型（Mistral 7B、Mixtral 8x7B MoE，Apache 2.0）和闭源前沿模型（Mistral Large、Mistral
    Medium），后者通过 La Plateforme API 提供。它的主权 AI 定位——专门适配 EU GDPR、AI Act 和数据驻留要求——给公司切出一个防御性企业细分市场，美国本土竞争对手结构上无法填补。公司估计
    2024-2025 年 ARR 约 $200M，并与 Microsoft Azure、Google Cloud、Snowflake 建立分发合作。
