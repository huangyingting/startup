              - CV027
          - type: callout
            title: 按相对倍数看，Mistral 相比美国 AI 同行明显低估
            body: >-
              按 $6B 估值和 30 倍 ARR 计算，Mistral 相比 xAI（$50B，相近 ARR 阶段）折价 80%，相比 OpenAI（46 倍 ARR）和 Anthropic（18-36 倍
              ARR）也明显折价。考虑到 EU 市场聚焦和规模较小，部分折价可以成立，但折价幅度说明，要么全球资本市场低估了欧洲 AI，要么美国 AI 同行显著高估——这取决于投资人是否对多市场判断有足够确信。
            calloutType: insight
