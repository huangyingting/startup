  - id: TV006
    title: 最终尽调问题清单
    columns:
      - 需核查事项
      - 优先级
      - 重点核查
      - 缺失时的红旗
    rows:
      - - FY2023-FY2024 经审计收入
        - 关键
        - 确认 FY2024 ARR 约 $100M；核查收入确认
        - 是 —— 所有模型都基于未经审计的估计
      - - 按客户队列拆分的 NRR
        - 关键
        - NRR >120% 支撑扩张逻辑；<100% = 净流失红旗
        - 是 —— ARR 质量假设未经验证
      - - 股权结构表和优先股堆叠
        - 关键
        - 假设 1x 非参与型优先股；多倍参与型 = 下行风险
        - 是 —— 悲观情景回报取决于优先级瀑布
      - - 客户数和前五大集中度
        - 高
        - 前五大客户占 ARR 比例；市场渠道与直销拆分
        - 中等 —— 集中度风险未量化
      - - IP 权属链文件
        - 高
        - DeepMind 与 Meta FAIR 离职交接中的发明人协议
        - 中等 —— 商业秘密主张风险
      - - EU GPAI 行为准则合规计划
        - 高
        - 合规成本估算和时间表
        - 中等 —— 监管成本上行空间不确定
      - - 烧钱速度和 12 个月预算
        - 高
        - 月度烧钱；确认 Series C 时间
        - 中等 —— 现金跑道估算需要验证
      - - 按客群拆分的 ACV 分布
        - 中
        - 企业客户与 SMB ACV；客户队列经济性
        - 低 —— 有信息量，但非决策关键
    claimRefs:
      - CV023
      - CV027
