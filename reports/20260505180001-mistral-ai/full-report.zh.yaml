      - number: '2.2'
        title: 市场规模与 Mistral 的位置
        blocks:
          - type: paragraph
            body: >
              基础模型 API 市场正在快速增长：LLM 市场规模估计从 2023 年的 $6.4B，按 37% CAGR 增至 2030 年超过 $36B（Grand View Research 共识）。按 IDC
              的宽口径定义，全球企业 AI 支出在 2024 年达到 $235B，到 2028 年达到 $632B；但其中只有 10-15% 可归因于基础模型 API 支出，其余更多是算力、服务和嵌入式软件。OpenAI 以
              2024 年 $3.7B ARR 主导这个子市场（约 40-50% 市占率），Anthropic 约 $1B 居后。Mistral AI 估计 $200M ARR，约等于 5% 市占率，仍有大量上行空间。

              欧洲 AI 市场给 Mistral 提供了战略差异化的子板块：2024 年欧洲企业 AI 支出达到 €30-40B（Dealroom、European Commission），EU AI Act
              合规要求正在把采购推向 EU 主权 AI 供应商。PwC 估计，到 2027 年欧洲将出现 €8B 与 AI 合规相关的企业支出，这给 Mistral 带来美国竞争对手无法复制的结构性顺风。NVIDIA 年化
              $35B 数据中心收入说明 AI 基础设施投入异常强劲；但 a16z 的“AI 的 $600B 问题”分析也指出，模型 API
              收入仍只是算力支出的一小部分，这既可能意味着未来市场仍会显著扩张，也可能意味着估值泡沫风险。
