      - number: '1.3'
        title: 融资历史与资本状况
        blocks:
          - type: paragraph
            body: >
              Mistral AI 完成了欧洲科技史上最快的资本形成之一：成立后 14 个月内完成三轮融资，累计超过 $1.1B。2023 年 6 月的 €105M 种子轮由 Lightspeed 领投，a16z、Xavier
              Niel 等参与；在当时，这是欧洲史上最大 AI 种子轮，也说明产品尚未发布前，投资人已经对团队给出异常强的信心。

              2023 年 12 月，公司完成 Series A，估值约 $2B，由 a16z 共同领投，核心驱动来自 Mistral 7B（2023 年 9 月发布）和 Mixtral 8x7B（2023 年 12
              月发布）的超预期市场反响。这两次社区发布都迅速出圈，证明团队能用美国实验室一小部分算力预算，做出接近前沿质量的模型。2024 年 6 月，公司以 $6B 估值完成 Series B，融资
              €600M（$640M），General Catalyst 和 Lightspeed 共同领投，Mistral 由此坐实欧洲领先 AI 独角兽地位。

              2024 年 3 月，Microsoft 的小额战略投资和一项分发协议引发了显著争议；协议让 Mistral 模型进入 Azure AI Studio。European Commission 一度审查这是否构成
              EU 竞争法下需要申报的合并交易，但最终没有进入正式程序。这一事件凸显了 Mistral “欧洲冠军”定位与务实拥抱美国超大规模云分发渠道之间的张力。截至 2024 年中，估计累计融资约 $1.17B；截至
              2026 年 5 月，公司未见已融资 Series C 的公开信息，说明现金效率较强，或正为更大规模资本事件做准备。
