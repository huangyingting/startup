            body: >
              Mistral AI 已经搭建了覆盖完整效率—性能光谱的模型家族。开放权重模型（Mistral 7B、Mixtral 8x7B/8x22B、Mistral NeMo、Pixtral 12B）以 Apache
              2.0 发布，最大化开发者触达；闭源前沿模型（Mistral Small、Mistral Large 2、Codestral、Pixtral Large、Mistral Embed）则只通过 La
              Plateforme API 或云市场提供。这种双轨架构复刻了成功的开放核心软件剧本，在第一个月就让 Mistral 7B 获得 5M+ 下载，形成异常大的开发者社区，同时通过商业 API 变现。

              La Plateforme 是商业业务核心，提供文本生成、代码生成（Codestral）、多模态视觉分析（Pixtral）、语义向量嵌入（Mistral
              Embed）、面向智能体工作流的函数调用和工具使用、用于企业数据集成的 JSON-mode 结构化输出、基于 LoRA 的微调，以及专用单租户部署选项。企业客户可以选择多租户托管
              API、专用单租户云基础设施，或通过 vLLM 在自有硬件上完全自托管开放权重部署。这种灵活性覆盖了一系列企业数据驻留和合规需求，是 OpenAI API-only 这类单一部署模式无法做到的。OpenAI 兼容
              API 规范意味着，在现有集成中，Mistral 模型可以作为 OpenAI 模型的直接替代品，显著降低已经基于 GPT-4 或 GPT-3.5 API 调用构建应用的开发者切换成本。
