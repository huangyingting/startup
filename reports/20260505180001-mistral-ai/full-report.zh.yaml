  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Mistral AI 采用开放核心收入模式：宽松许可的开放权重模型（Mistral 7B、Mixtral 8x7B/8x22B）免费拉动开发者社区采用，而 La Plateforme
              API（闭源前沿模型）、企业合同和云市场上架贡献商业收入。La Plateforme 按 token 用量收费——Mistral Large 的 2025 年标价约为每百万输入 token $3、每百万输出
              token $9——企业在平台上构建应用时，收入可随用量扩张。企业合同通过承诺用量和 SLA 保证带来更可预测的高 ACV（每年
              $50K-$2M+），并包含定制微调和私有部署选项。开放核心转化率（开放权重模型用户中有多少成为付费 API 客户）未公开披露，但这是建模未来增长的关键指标。

              通过 Azure AI Studio、AWS Bedrock 和 IBM WatsonX Cortex AI 的云市场收入，把 Mistral 的企业触达延伸到可信云采购渠道。Microsoft Azure
              云市场将 Mistral 模型分发给 Azure 生态中的数万家企业客户，用约 20-30% 平台费形式的云市场收入分成，换来显著分发杠杆。IBM WatsonX 和 Snowflake
              集成则是面向受监管行业的战略性企业分发渠道。
