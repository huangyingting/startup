      - number: '5.3'
        title: 信任、安全与路线图
        blocks:
          - type: paragraph
            body: >
              Mistral AI 的安全姿态由 GDPR 合规支撑：法国注册、承诺在 EU
              处理数据、不用客户数据训练模型；同时，它的开放权重模型策略允许企业安全团队独立审计开放模型行为。企业客户可以通过自托管开放权重模型或专用单租户云基础设施实现完全私有部署，消除跨客户数据暴露风险。公司为企业 API
              客户提供符合 GDPR 第 28/29 条的数据处理协议（DPA）。

              相比竞争对手，主要信任缺口在于缺少公开确认的 SOC 2 Type II 认证，也缺少正式 AI 安全评估报告（带红队结果的模型卡）。Anthropic 公开了详细的 Constitutional AI
              安全方法和 Claude 安全评估；OpenAI 也发布了带安全评估的 GPT-4 技术报告。Mistral 较轻的安全披露姿态，可能限制受监管企业采用，因为正式 AI 安全文档常常是采购要求。

              Mistral 2024 年 R&D 速度（约每季度一次重大模型发布）对其团队规模而言执行力很强：前沿闭源模型（Mistral Large 2、Pixtral Large）、开放权重模型（Mixtral
              8x22B、NeMo、Pixtral 12B）和专用模型（Codestral）都在 12 个月内发布。路线图方向指向更长上下文窗口、多模态扩展（视觉 → 音频 / 视频）、智能体 AI
              能力（工具编排、自主工作流）和小模型边缘部署。快速发布节奏、强欧洲客户基础，以及通过云市场分发进入美国企业的能力叠加，形成了可防御的产品定位；纯 API 闭源竞争对手如果不能匹配 Mistral
              的开放权重社区护城河，将越来越难侵蚀这块位置。
