      - number: '8.2'
        title: 投资逻辑、反向逻辑与情景
        blocks:
          - type: paragraph
            body: >
              Mistral AI 的乐观情景建立在四根支柱上：(1) 欧洲唯一具备规模的前沿 AI 公司，拥有美国竞争对手难以复制的真正主权监管护城河；(2) MoE 架构效率带来领先的单位算力成本性能，使其能以更低 API
              定价交付有竞争力的质量；(3) 开源飞轮结构性压低获客成本（CAC），并以零边际成本构建开发者社区护城河；(4) 卓越资本效率（融资 $1.17B 支撑 $200M ARR）证明商业执行力。乐观情景下，ARR 到
              2025 年底达到 $400-500M，Series C 以 $10-12B 估值融资，并在 2028 年以 $1.5B ARR 和 15-20 倍倍数 IPO，隐含 $22-30B 企业价值——约为
              Series B 估值的 4-5 倍。

              悲观情景由结构性威胁驱动：Meta 的 LLaMA 4 在质量上追平 Mistral 的开放权重模型，导致开发者社区流失；OpenAI 领头的归零竞赛使 2025 年 token 价格通缩超过 70%；EU
              GPAI Code of Practice 合规成本迫使 Mistral 闭源模型，开源核心 GTM 随之消失。在这种情景下，ARR 增长放缓至 30-40%，Series C 估值持平到下行至
              $5-6B，终局价值取决于能否以有限溢价被战略收购。按概率加权的基准情景预期回报约为 4-5 年 1.8-2.1 倍（约 15-20% IRR），低于典型 VC 门槛，但对有下行保护的成长股权可能仍合适。
