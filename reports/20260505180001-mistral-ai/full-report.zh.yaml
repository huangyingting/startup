              Mistral 以 Apache 2.0 发布有竞争力的开放权重模型，已经形成自我强化的开发者社区。Mistral 7B 首 30 天下载量超过 5M，加上广泛微调采用，Mistral
              搭出了一条有机开发者获客渠道，付费 AI 实验室很难复制。
