            body: >-
              本章所有回报情景和倍数分析，都建立在 Bloomberg 和 The Information 对 ARR 的估计上（截至 early 2025 约 $200M）。这些数字未经审计，也未获 Mistral
              管理层确认。如果 ARR 下修 20-30%，所有估值结论都会受到实质影响。解决这个不确定性，是最重要的尽调动作。
            calloutType: insight
            claimRefs:
              - CV001
