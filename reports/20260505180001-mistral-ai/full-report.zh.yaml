      - number: '3.2'
        title: 功能、定价与能力对比
        blocks:
          - type: paragraph
            body: >
              Mistral Large 在 LMSYS Chatbot Arena 人类评估榜单（2024）中排名第 5-8 位，落后于 GPT-4o、Claude 3 Opus 和 Gemini 1.5
              Pro，但领先多数其他闭源模型。这确认了它具备前沿梯队竞争力，但还不是前三名领导者。关键在于，在等价输入 / 输出 token 价格上，Mistral 的定价大约比 OpenAI 和 Anthropic 低
              30-50%；价格敏感型企业买方只要不要求每个工作负载都达到绝对前沿性能，就会看到很强的性价比叙事。

              Mistral 的原生多语言能力（法语、德语、西班牙语、意大利语）是欧洲企业用例的差异化因素，尤其是政府、法律和媒体场景，非英语欧洲语言的流利度本身就是硬性采购要求。GPT-4 和 Claude 3
              主要针对英语优化，如果没有等量欧洲训练数据投入，很难复制这条护城河。AI21 的 Jamba 在长上下文用例中构成一个增长中的小众竞争者（256K 上下文，对比 Mixtral 的 64K），可能限制
              Mistral 在法律文档和大语料分析工作负载中的可触达市场。不过，Jamba 企业采用仍处更早阶段，也缺少 Mistral 在欧洲市场的品牌认知，短期内不太可能形成竞争替代。
