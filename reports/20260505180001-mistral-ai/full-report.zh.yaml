      - number: '6.3'
        title: 留存动态与集中度风险
        blocks:
          - type: paragraph
            body: >
              Mistral AI 的客户留存模型随部署模式不同，呈现两种风险画像。自托管开放权重模型客户拥有模型权重，部署后几乎没有供应商依赖，因此留存接近永久；选择这一路径的企业客户因此获得结构性优势。商业 API
              客户切换成本更低，但会被 EU 合规画像黏性留住：换新供应商需要重做安全审查，采购成本高；同时，Mistral 的欧洲多语言表现优势和已完成的集成投入也提供留存支撑。

              第一大集中度风险是地域：Mistral 的企业客户群高度欧洲化，法国账户很可能占比偏高；除非北美直销显著扩张，否则有限的美国企业渗透会形成增长天花板。第二大集中度风险是渠道依赖：如果大部分收入流经
              Azure、AWS 或 IBM 云市场安排，Mistral 的直接客户关系就由伙伴居中管理，伙伴既抽取收入分成，也控制主要客户触点。Token 价格通缩和竞争对手质量提升（OpenAI o3、Anthropic
              Claude 3.5）是使用量收入留存的持续结构性威胁，必须靠模型改进和更深企业集成来抵消。
