  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Mistral AI 站在两个重叠市场的交叉处：开源 LLM 生态和闭源 AI 基础模型 API 市场。Mistral 商业业务（La Plateforme）的相关可服务市场，最适合定义为“基础模型
              API”板块，也就是以按用量（token）计价方式，向开发者、企业团队和云转售方提供文本、代码或多模态生成能力的服务。

              这个市场明确排除三类支出：（1）GPU 和云算力基础设施支出（由 NVIDIA、AWS、GCP、Azure 承接）；（2）AI 只是现有软件套件内功能的 AI 嵌入式 SaaS 应用（Salesforce
              Einstein、Microsoft Copilot）；（3）不会产生直接 API 收入的开放权重模型本地部署。外部估计到 2028 年总 AI 支出市场为
              $235-632B，但其中大幅包含上述被排除类别；基础模型 API 子市场只是其中 $15-25B 的一部分。

              Mistral API 的主要替代品包括 Azure OpenAI Service（Microsoft）、Anthropic Claude API、Google Vertex AI Gemini
              模型、Cohere API，以及自托管的开放权重部署，包括 Mistral 自有模型或 Meta 的 LLaMA 家族。自托管选项（Mistral 开放权重）带来一个独特动态：Mistral
              自己的开源模型既是社区采用引擎，也是商业 API 收入的竞争替代品。理解这条张力，是评估 Mistral 如何把社区信任变现的前提。
