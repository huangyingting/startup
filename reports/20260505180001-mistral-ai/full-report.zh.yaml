      - number: '7.2'
        title: 竞争、商业与运营风险
        blocks:
          - type: paragraph
            body: >
              Meta、Google DeepMind 和 OpenAI 带来的生存级竞争风险，是 Mistral AI 乃至整个 AI 基础设施市场最重要的风险。三家既有巨头的投入，比 Mistral 估计 $30-50M
              年度研究预算高出 100-300 倍；Mistral 的 MoE 效率优势能用更少参数跑出相近性能，部分抵消算力差距，但要在大型科技公司几乎无限预算面前长期守住前沿模型竞争力，必须持续做架构创新。

              Token 价格通缩构成直接商业风险：2024 年主要提供商的 LLM API 价格下降 50-90%，直接压缩每次 API 调用收入；Mistral 的 MoE
              成本优势提供结构性缓冲，但每次推理请求的绝对收入仍在缩水。因此，收入增长需要大幅放量来抵消价格压缩，企业获客执行压力随之上升。对 Azure、AWS、IBM 和 Snowflake
              等分销渠道的依赖带来集中度风险：这些合作伙伴合计贡献了可观但不确定的收入份额，一旦任何主要云市场下架，收入可能在没有预警的情况下突然中断。

              关键人物风险偏高：三位联合创始人承担 Mistral 的核心架构创新和研究方向；更大团队里没有同等深度的研究领导梯队。GPU 供应链依赖 NVIDIA
              和云服务商，每一代新前沿模型的训练排期都受制于供给，需求高峰期 H100 分配队列可拉长到 6-12 个月。
