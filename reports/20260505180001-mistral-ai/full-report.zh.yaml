      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Mistral AI 的联合创始团队把前沿 AI 研究资历和互补能力放在了一起。CEO Arthur Mensch 拥有 École Polytechnique 博士学位，曾在 DeepMind 研究高效
              transformer 架构；他在稀疏模型和高效模型上的论文记录，直接支撑了 Mistral 的架构差异化。Mensch 也是欧洲 AI 的高调倡导者，包括就 AI Act 直接游说 EU
              官员，这让他成为公司的公众面孔，也让他在欧洲科技政策圈具备辨识度。

              Guillaume Lample 是 Meta AI FAIR LLaMA 语言模型家族的共同发明者之一；LLaMA 后来成为 2023 年开放 LLM
              生态的主导开源基础。他在大规模预训练和模型评估上的深厚经验，是 Mistral 能用比美国实验室更小的团队和预算做出有竞争力模型的关键。Timothée Lacroix 则带来 Meta AI FAIR
              的基础设施和 ML 系统经验，发表过知识图谱嵌入和分布式训练论文，对规模化保持训练管线效率至关重要。

              截至 2026 年 5
              月，公开信息未显示领导层离职，创始团队保持稳定。鉴于公司技术上依赖小规模创始团队，关键人物风险实质存在；但三位创始人都仍在一线，部分缓解了这一风险。除投资方参与外，公司未披露董事会构成细节。
