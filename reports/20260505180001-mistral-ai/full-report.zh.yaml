      - number: '8.3'
        title: 投资建议与尽调问题
        blocks:
          - type: paragraph
            body: >
              建议为观察（TRACK）：Mistral AI 值得高确信跟踪，并为投资做深度尽调准备；但在关键财务尽调缺口解决前，不应按 $6B 估值立即投入。主权 AI 定位、MoE 效率架构和 ARR
              增长轨迹都是真实竞争优势，足以支撑扎实的基本面投资逻辑。在缺少经审计财务数据、未披露 NRR 的情况下，当前增长对应 30 倍 ARR 倍数属于合理到略偏高。投资人应快速推进。

              投资前需要立即完成的尽调动作：(1) 索取经审计 FY2023-FY2024 收入，核验 $200M ARR 估计；(2) 按客户队列获取 NRR，验证 ARR 质量；(3) 确认 Series B
              后的股权结构表和优先股堆叠；(4) 评估创始人离职转入后的 IP clean-room 状态；(5) 评估 EU GPAI Code of Practice 合规计划和成本估计；(6) 获取客户集中度数据（前 5
              大客户占 ARR 比例）和渠道拆分（直销 vs. 云市场）。如果 ARR 里程碑达成，2025-2026 年预期以 $8-12B 完成的 Series C，可能提供一个风险调整后明显更好的切入点。
