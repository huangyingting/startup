  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Mistral AI 所在的基础模型 API 市场演化很快，三家资源更强的美国既有玩家占据主导：OpenAI（$3.7B ARR，Azure 分发）、Anthropic（Amazon 支持，估值
              $7.3B，安全优先）和 Google DeepMind（Gemini，深度嵌入 GCP 和 Google Workspace）。相对这些对手，Mistral
              的竞争差异化靠三根支柱：欧洲主权（法国注册地、GDPR 合规、EU AI Act 定位）、开放权重模型领导力（Mistral 7B 和 Mixtral 是社区认可的高效模型标杆），以及有价格竞争力的闭源
              API（在可比性能下比 GPT-4 Turbo 低 30-50%）。竞争格局还包括规模较小的同业（Cohere 估值 $2.2B、AI21 Labs 估值 $1.4B）和一个欧洲对手（德国 Aleph
              Alpha），它们各自瞄准更窄的企业子市场。

              开源维度是一把双刃剑：Mistral 的开放权重发布是主要社区采用驱动，但也让开发者可以自托管，从而把公司自己的 API 商品化。Meta 于 2024 年 4 月发布的 LLaMA 3
              背后算力支持显著更强，已经成为主导开放权重模型，并与 Mixtral 直接争夺开发者心智。Mistral 在开放权重板块的优势来自架构效率（MoE）和欧洲语言质量，但随着 Meta、Google 和 AI21
              Labs 采用相似架构，两项优势都面临侵蚀。重要的是，Mistral 的 OpenAI 兼容 API 规范降低了向它切换的摩擦，开发者无需承担代码迁移开销即可试用。
