      - number: '2.3'
        title: 买方分层、增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              Mistral AI 服务三类核心买方：（1）用 API 做原型和早期产品的个人开发者与初创公司；（2）把 Mistral 模型嵌入内部工具或面向客户产品的企业团队，这是单客户收入最高的板块；（3）通过
              Azure AI Studio、AWS Bedrock 或 IBM WatsonX 访问 Mistral 的云市场买方。受监管行业（金融、法律、医疗、政府）价格承受力最高，但进入时需要最多合规投入；EU AI
              Act 对开放权重模型的较轻处理，也让 Mistral 在这里拥有结构性优势。

              关键增长驱动包括：77% 的企业 CEO 对采用 AI 有信心（IBM 2024）、McKinsey 对生成式 AI 的 $2.6T-$4.4T 经济价值估计、EU AI Act 推动 EU
              主权采购、价格通缩（2022 年以来 token 价格下降 90%）扩大开发者可触达范围，以及 Mistral 通过模型发布建立开源社区信任。增长逆风包括：Gartner
              警告短期采用可能进入平台期、Goldman Sachs 质疑短期 AI ROI（Acemoglu 估计仅 4.6% 任务自动化）、63% 企业仍面临安全 / 隐私壁垒，以及超大规模云厂商嵌入式
              AI（Microsoft Copilot、Google Workspace AI）带来的竞争商品化压力。在受监管行业，企业从 PoC 走到承诺合同通常需要 6-18 个月，使收入转化滞后于使用量增长。
