      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: >
              按当前利用率估计，Mistral AI 的 API 收入毛利率为 50-70%，受益于 MoE 架构 5-8 倍的推理效率优势。SemiAnalysis 估计，MoE 模型在 60-70% GPU 利用率下可实现
              40-60% 毛利率，结构上优于可比的稠密模型 API 供应商。相比 OpenAI 据报道 45-55% 的 API 毛利率，这一水平更有利。按 $200M ARR 和约 50-70% 毛利率计算，Mistral
              产生约 $100-140M 毛利润；但仅人员成本（约 500 名员工，平均总薪酬 $200-250K = 每年 $100-125M）就会吃掉大部分毛利润。

              如果再加上算力基础设施成本（推理 + 训练摊销估计每年 $20-40M）、G&A 以及销售和市场费用，Mistral 很可能每年净亏损 $50-100M。这个亏损显著好于 OpenAI 的 $5B
              亏损，但公司显然还未盈利。训练新的前沿模型每次估计要花 $5-20M（Epoch AI），每个发布周期都相当于一次重要资本事件。Series B 的 $640M
              在当前烧钱水平下提供了足够现金跑道，说明资本充足性不是眼前问题；但增长投入和模型发布周期仍要求公司持续高效配置资本。
