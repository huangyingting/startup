              Mistral AI 三轮累计融资约 $1.17B（种子轮 $115M、Series A 约 $415M、Series B $640M），未披露债务或风险信贷额度。按 $6B Series B 估值和估计
              $200M ARR（2025）计算，Mistral 约以 30x ARR 交易；按 Bessemer 口径，增长 100%+ 的 AI 原生公司估值区间为 25-50x，Mistral
              处在低端，若增长延续，还有倍数扩张空间。隐含收入倍数已经从 Series B 完成时（2024 年 6 月，基于 $100M ARR）的 60x 压缩到今天约 30x，反映 ARR 翻倍而估值保持不变。

              Mistral AI 三轮累计融资约 $1.17B（种子轮 $115M、Series A 约 $415M、Series B $640M），未披露债务或风险信贷额度。按 $6B Series B 估值和估计
              $200M ARR（2025）计算，Mistral 约以 30x ARR 交易；按 Bessemer 口径，增长 100%+ 的 AI 原生公司估值区间为 25-50x，Mistral
              处在低端，若增长延续，还有倍数扩张空间。隐含收入倍数已经从 Series B 完成时（2024 年 6 月，基于 $100M ARR）的 60x 压缩到今天约 30x，反映 ARR 翻倍而估值保持不变。

              财务结论是：Mistral AI 已证明早期收入牵引力很强（2 年内 ARR 从 $25M 到 $100M 再到 $200M），相对 Anthropic 具备明显资本效率，并从 MoE
              架构获得结构性成本优势。不过，完全缺少经审计财务、未披露 NRR、烧钱速度未知，也没有任何已披露盈利路径，这些都是实质性财务尽调缺口。公司几乎肯定尚未盈利，除非 ARR
