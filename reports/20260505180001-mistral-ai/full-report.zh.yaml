      - number: '5.2'
        title: 技术差异化与架构
        blocks:
          - type: paragraph
            body: >
              Mistral 的核心架构创新是 Grouped Query Attention（GQA）、Sliding Window Attention（SWA）和 Sparse Mixture of
              Experts（SMoE）。GQA 让多个 query head 共享 key-value head，从而降低 KV cache 内存带宽需求，提升批量推理吞吐。SWA
              让长序列处理的注意力成本变成线性，而不是二次方。Mixtral 中的 SMoE 会把每个 token 路由到 8 个专家层中最相关的 2 个，每次前向传播只激活 47B 参数中的 12.9B，以约 1/6
              推理算力成本达到 LLaMA 2 70B 级别性能。这些技术在 Mistral 发布时属于新颖效率手段，至今仍让其架构有别于稠密 transformer 竞争对手。

              Mistral 的多语言训练策略是真正的产品护城河：原生法语、德语、西班牙语和意大利语流利度（而不是事后微调）让它在欧洲企业语言任务中输出质量更高。开放权重透明性也让有合规要求的企业能够复现并审计推理过程；若要求
              AI 流程可解释，Mistral 的闭源竞争对手必须额外披露大量信息才做得到。
            claimRefs:
              - CE002
              - CE003
              - CE014
              - CE015
              - CE017
              - CE027
              - CE031
