        title: 证据要点
        blocks:
          - type: callout
            title: 欧洲 AI 中少有的顶级创始团队
            body: >-
              DeepMind（Mensch）和 Meta AI FAIR（Lample、Lacroix）的研究背景叠加，让 Mistral 拥有一支能与全球最技术化 AI 实验室正面竞争的创始团队。Lample 的
              LLaMA 共同作者身份，让公司创立时就拿到即时可信度。
