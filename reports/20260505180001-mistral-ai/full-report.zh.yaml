chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Mistral AI 由三位世界级机器学习研究员于 2023 年 4 月创立：Arthur Mensch（CEO）、Guillaume Lample 和 Timothée
              Lacroix。三人都离开了顶尖岗位——Mensch 来自 DeepMind，Lample 和 Lacroix 来自 Meta AI 的 FAIR 研究实验室——想打造欧洲具有定义意义的前沿 AI
              公司。Mistral 总部在巴黎，在美国只有小规模布局，定位非常明确：作为欧洲 AI 代表，凭效率、开放性和监管适配，与美国实验室（OpenAI、Anthropic、Google DeepMind）竞争。

              公司核心使命是靠双轨模型策略，让前沿 AI 更易获取、更可信：一边以宽松许可发布高效开放权重模型（Mistral 7B、Mixtral 8x7B/8x22B），建立社区信任和开发者生态；一边通过 La
              Plateforme API 和云市场渠道，用闭源前沿模型（Mistral Large、Mistral Medium、Codestral）变现。这套开放核心打法类似 Red Hat
              在开源基础设施中的剧本，也让一家成立不久的公司拿到了异常快的企业采用。

              Mistral 采用法国 SAS 公司结构，在应对 AI 监管的欧洲机构面前更有可信度，尤其是 EU AI Act。与此同时，相比收入规模，公司运营很精简（估计 400-500
              人），显示出较强资本效率。巴黎办公室仍是工程重心，美国旧金山团队则主要负责企业销售和伙伴拓展。
