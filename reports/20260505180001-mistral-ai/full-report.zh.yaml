      - number: '7.3'
        title: 风险缓释与否决标准
        blocks:
          - type: paragraph
            body: >
              Mistral AI 最有效的风险缓释藏在架构选择里：MoE 设计降低推理成本（缓释算力风险），开源策略压低 CAC（缓释商业风险），EU 注册主体和 GDPR 原生数据处理降低 EU 监管风险。公司主动参与
              EU 政策，已经在 EU AI Act 中争取到有利的开源豁免——这是实打实的监管胜利。

              最重要且尚未缓释的风险有三项：(1) 与大型科技公司的算力预算差距——架构效率有帮助，但无法无限期填平 100 倍资本差；(2) Microsoft 持股带来的利益冲突观感——需要主动安抚 EU
              公共部门客户，说明 Microsoft 只是非控股股东；(3) 开源双重用途安全缺口——相比 Anthropic，Mistral 安全姿态更轻，一旦出现有害应用，就会暴露监管风险。打破投资逻辑的情景，是 Meta
              LLaMA 4 追平 Mistral 模型质量、token 价格继续以每年 50%+ 下跌、EU GPAI Code of Practice 对开源发布施加高到难以承受的合规成本三者同时出现；未来 12-24
