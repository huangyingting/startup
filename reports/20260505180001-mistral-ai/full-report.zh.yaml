      - number: '8.4'
        title: 附录图表
        blocks:
          - type: callout
            title: 观察：高确信跟踪，但不在 $6B 估值立即投资
            body: >-
              Mistral AI 是欧洲唯一具备规模的前沿 AI 公司，拥有真正的主权监管护城河、MoE 效率优势和卓越资本效率。但 $6B 估值对应 30 倍未经审计 ARR，且没有 NRR
              数据、没有经审计财务、大型科技公司竞争压力仍未解决，不足以支撑立即参与一级市场投资。Series C（若达成里程碑，预期 2025-2026 年以 $8-12B
              进行）可能在关键尽调问题解决后，提供更好的风险调整后切入点。
            calloutType: insight
