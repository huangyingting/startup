  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Mistral AI 的监管风险画像由其欧洲总部和 EU AI Act 共同塑造。根据 EU AI Act，公司受通用目的
              AI（GPAI）模型义务约束，但又受益于开源豁免：开放权重模型发布可免于最繁重的文档和透明度要求。Arthur Mensch 在 AI Act 谈判期间亲自接触 European Parliament
              成员，主张这些豁免，并成功影响了最终文本。这次游说成功降低了近期监管合规负担，但也带来声誉风险：如果某个 Mistral 开放权重模型与有害应用产生关联，公司会因为曾主张较宽监管而面对更强批评。

              版权训练数据诉讼环境构成中期法律风险。截至 2026 年 5 月，Mistral 尚未被列入任何版权诉讼，但全球范围内会设定先例的案件（NYT v. OpenAI、Authors Guild
              集体诉讼）给整个行业带来暴露。EU 的 DSM Directive Article 4 TDM 豁免在欧洲司法辖区提供的保护强于美国合理使用原则，部分缓解这一风险。EU DG COMP 对 Microsoft
              股权投资的问询已无行动结案，但它表明监管机构仍持续关注 Big Tech 与 AI 初创公司的关系，未来从美国战略投资人融资可能因此更复杂。
