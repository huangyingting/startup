      - number: '6.2'
        title: 增长与采用指标
        blocks:
          - type: paragraph
            body: >
              Mistral AI 的收入增长轨迹——ARR 从 2023 年底的 $25M，到 2024 年的 $100M，再到 2025 年初运行率 $200M——意味着仅 2024 年就约 4 倍增长；对这一规模的 AI
              基础设施公司而言，这一速度异常快。开发者社区飞轮同样亮眼：Mistral 7B 在 Hugging Face 获得数千万次下载，带来巨大的品牌认知和上游开发者兴趣，并持续转化为商业 API 客户。基于
              Mistral 开放权重基础构建的数百个社区微调模型变体，证明开发者参与度很深，这一点对闭源竞争对手而言结构上难以复制。

              Le Chat 在 2024 年底达到 1M 注册用户里程碑，说明 Mistral 在欧洲已经建立起仍处早期但正在增长的消费者分发触点；€15/月的 Pro 档带来直接消费者收入流，部分降低了对企业 API
              收入的依赖风险。企业 API、云市场分发和增长中的消费者产品组合，让 Mistral AI 拥有多元收入增长结构；对一家 $200M ARR 阶段的公司来说，这并不常见。不过，公司未披露客户数、NRR
              和流失数据，关键留存问题仍无答案，收入质量评估只能依赖推断而非已确认事实。在尽调中拿到 NRR 披露和客户数数据，是关键优先事项。
