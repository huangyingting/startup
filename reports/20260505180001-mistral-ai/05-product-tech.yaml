callouts:
  - type: strength
    title: Dual open-source + proprietary model strategy drives compounding flywheel
    body: >-
      The open-weight releases (Mistral 7B, Mixtral) generate millions of downloads and community trust that reduce CAC
      for the commercial API, while proprietary frontier models (Mistral Large 2, Pixtral Large) capture premium
      enterprise pricing. No competitor executes this dual-track strategy as effectively at Mistral's quality level.
    claimRefs:
      - CE001
      - CE019
      - CE031
  - type: risk
    title: Missing SOC 2 Type II certification limits regulated US enterprise sales
    body: >-
      Mistral's absence of publicly confirmed SOC 2 Type II certification creates friction in US enterprise procurement
      cycles where this is a standard requirement. Competitors including Harvey AI, Anthropic, and OpenAI hold SOC 2
      Type II, giving them an advantage in CISO-led security reviews.
    claimRefs:
      - CE007
      - CE022
  - type: risk
    title: Context window gap vs. Claude 3 limits very long document use cases
    body: >-
      Mistral Large 2's 128K context window is competitive but below Claude 3's 200K, limiting its applicability for use
      cases requiring entire contracts, annual reports, or legal precedent sets in a single context — use cases that
      represent the highest-value enterprise workflows.
    claimRefs:
      - CE017
      - CE035
