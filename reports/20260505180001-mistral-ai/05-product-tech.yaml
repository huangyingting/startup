  claims:
    - id: CE001
      statement: >-
        Mistral AI's product family as of May 2026 includes: Mistral 7B (7B params, Apache 2.0), Mixtral 8x7B (47B
        total/12.9B active, Apache 2.0), Mixtral 8x22B (141B total/39B active, Apache 2.0), Mistral NeMo (12B, Apache
        2.0, NVIDIA collab), Mistral Small (API-only), Mistral Large 2 (API-only, frontier), Codestral (code-specialized
        API), Mistral Embed (embedding API), and Pixtral 12B (multimodal, API+open-weight).
      type: observed
      topic: product family enumeration
      sourceRefs:
        - SE005
        - SE007
        - SE008
        - SE016
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
      contradictsClaimRefs: []
    - id: CE002
      statement: >-
