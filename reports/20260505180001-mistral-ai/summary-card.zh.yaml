summary:
  headline: >
    Mistral AI 是欧洲领先的开源 AI 公司，护城河来自主权 AI、MoE 计算效率优势和约 $200M ARR。以 30x ARR 计的 $6B 估值，对 100%+ ARR 增长并不离谱，但 Big Tech
    资源不对称和财务未披露带来高风险。Series C 入场应继续跟踪。
  overallScore: 6.5
