callouts:
  - type: risk
    title: Big Tech compute budget asymmetry is the existential risk
    body: >-
      OpenAI, Google DeepMind, and Meta collectively spend $15-25B+ annually on AI R&D vs. Mistral's estimated $30-50M
      research budget. MoE efficiency partially compensates but cannot close a 100-300x capital gap indefinitely.
      Sustained frontier model competitiveness requires either dramatically increased funding, a key architectural
      breakthrough that extends the current efficiency advantage, or a strategic repositioning toward the mid-tier/EU
      segment.
    claimRefs:
      - CR021
      - CR028
  - type: risk
    title: Open-weight dual-use misuse creates asymmetric reputational risk
    body: >-
      Mistral receives the benefit of open-source community adoption from permissively-licensed models while bearing
      reputational risk if fine-tuned harmful variants become prominent. Unlike closed-model competitors, Mistral cannot
      recall or update deployed open-weight models, making proactive safety guidelines and voluntary responsible-use
      commitments essential risk mitigations.
    claimRefs:
      - CR009
      - CR018
      - CR038
  - type: insight
    title: EU open-source exemption is a regulatory moat — but requires sustained lobbying to maintain
    body: >-
      The EU AI Act open-source exemption that Mistral helped secure is a genuine competitive advantage that reduces
      compliance costs vs. US closed-model providers. However, this advantage is not permanent: future EU GPAI Code of
      Practice iterations and post-incident political pressure could narrow the exemption. Continued active regulatory
      engagement is a strategic necessity, not a discretionary activity.
    claimRefs:
      - CR001
      - CR012
      - CR029
