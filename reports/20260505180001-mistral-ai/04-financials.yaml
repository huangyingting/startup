        (2025 list pricing); enterprise contracts are structured on committed monthly spend with SLA guarantees and
        custom deployment options, typically ranging from $50K to $2M+ annually.
      type: observed
      topic: pricing structure
      sourceRefs:
        - S005
        - S021
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ003
        - RQ012
