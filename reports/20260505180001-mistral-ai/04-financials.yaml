callouts:
  - type: strength
    title: MoE architecture creates structural gross margin advantage
    body: >-
      Mistral's Mixture of Experts architecture provides an estimated 5-8x inference efficiency advantage over
      comparable dense models, translating to 50-70% API gross margins versus the 45-55% observed at OpenAI. This cost
      structure advantage is Mistral's most durable financial differentiation.
    claimRefs:
      - C110
      - C111
  - type: risk
    title: Complete financial opacity is a valuation discipline blocker
    body: >-
      No audited revenue, margin, NRR, or burn data is publicly available. All financial metrics are analyst estimates
      that could be off by 30-50%. A disciplined investor cannot underwrite Mistral at $6B without full audited
      financials and a cap table review.
    claimRefs:
      - C127
      - C140
  - type: risk
    title: Token price deflation is a structural revenue headwind
    body: >-
      AI API prices have fallen 80%+ since 2022 and continue declining. Mistral must grow token volume at 5-10x the rate
      of price decline to sustain revenue growth — a compounding treadmill that makes path-to-profitability harder even
      as gross margin structurally improves with scale.
    claimRefs:
      - C139
      - C125
