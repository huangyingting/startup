  researchQuestions:
    - id: QV001
      type: quantification
      question: >-
        What is Mistral AI's current $6B valuation in terms of ARR multiple, and how does this compare to other private
        AI companies at similar ARR growth rates?
      targets:
        - contentRequirements/0
        - plannedTables/recommendation-summary-table
      status: answered
    - id: QV002
      type: comparison
      question: >-
        How does Mistral AI's $6B valuation at ~30x ARR compare to Anthropic ($18B), OpenAI ($157B), Cohere ($5B), and
        Harvey AI ($3B) on a revenue-multiple basis?
      targets:
        - contentRequirements/3
        - plannedTables/comparable-valuation-table
      status: answered
    - id: QV003
      type: mechanism
      question: >-
        What are the key value drivers that justify Mistral AI's $6B valuation — and what financial assumptions underlie
        a bull, base, and bear valuation scenario?
      targets:
        - contentRequirements/1
        - plannedTables/bull-base-bear-scenario-table
      status: answered
    - id: QV004
      type: adverse
      question: >-
        What are the key anti-thesis arguments against Mistral AI's valuation — and what factors could cause the
        valuation to decrease materially from $6B?
      targets:
        - contentRequirements/2
        - contentRequirements/1
      status: answered
    - id: QV005
      type: quantification
      question: >-
        What ARR, growth rate, and exit multiple assumptions are required for Mistral AI to return 3-5x on a $6B entry
        valuation over a 5-7 year horizon?
      targets:
        - contentRequirements/1
        - plannedTables/bull-base-bear-scenario-table
      status: answered
    - id: QV006
      type: comparison
      question: >-
        What are the EV/Revenue multiples for public company comparables (Snowflake, MongoDB, Datadog) that serve as
        valuation anchors for AI infrastructure companies?
      targets:
        - contentRequirements/3
        - plannedTables/comparable-valuation-table
      status: answered
    - id: QV007
      type: mechanism
      question: >-
        What is the potential exit pathway for Mistral AI — IPO, strategic acquisition, or secondary — and what does the
        market precedent suggest about exit valuations?
      targets:
        - contentRequirements/4
      status: answered
    - id: QV008
      type: verification
      question: >-
        What is Mistral AI's capital efficiency compared to Anthropic and OpenAI — how much ARR is generated per dollar
        of venture capital raised?
      targets:
        - contentRequirements/0
        - contentRequirements/1
      status: answered
    - id: QV009
      type: adverse
      question: >-
        What investment thesis break scenarios could cause Mistral AI to fail to achieve a $6B+ valuation exit — and
        what is the probability of the bear case?
      targets:
        - contentRequirements/2
        - contentRequirements/4
      status: answered
    - id: QV010
      type: quantification
      question: >-
        What does the AI infrastructure comparable company set (Snowflake at IPO, MongoDB, Datadog) suggest about
        terminal revenue multiples for Mistral AI at a potential IPO?
      targets:
        - contentRequirements/3
        - plannedTables/comparable-valuation-table
      status: answered
    - id: QV011
      type: mechanism
      question: >-
        How does Mistral AI's open-source model strategy affect its terminal value compared to closed-API-only AI
        companies — does open-source create durable value or commoditize the API?
      targets:
        - contentRequirements/1
        - contentRequirements/2
      status: answered
    - id: QV012
      type: adverse
      question: >-
        What is the probability that token price deflation compresses Mistral AI's API revenue to a level that makes a
