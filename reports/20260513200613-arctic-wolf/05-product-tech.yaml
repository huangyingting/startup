company:
  name: Arctic Wolf Networks
chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Arctic Wolf Networks delivers a multi-product Security Operations as a Service platform
    anchored by the Aurora Superintelligence Platform, rebranded in 2025 from the Aurora
    Security Operations Cloud. The core portfolio spans Managed Detection and Response (MDR),
    Aurora Exposure Management combining Vulnerability Management and Attack Surface Management,
    Cloud Detection and Response, Aurora Endpoint Security incorporating Cylance AI technology
    acquired from BlackBerry for approximately $160 million in December 2024, SOAR automation
    from the October 2023 Revelstoke acquisition, Incident Response, and asset intelligence
    from the 2025 Sevco Security acquisition. The Concierge Security Team (CST) model embeds
    human security analysts into every customer relationship, distinguishing Arctic Wolf from
    automated-only MDR competitors. The Aurora platform's AI Trust Engine applies governance
    controls including permissions, monitoring, logging, explainability, rollback, and human
    approval for high-impact actions. Post-2024 acquisitions of Cylance and Sevco expand endpoint
    protection and asset intelligence, positioning Arctic Wolf as a broad-spectrum MDR operator
    at the intersection of SOC-as-a-Service, XDR, and AI-driven threat response.

sections:
  - id: product-portfolio
    title: "Product Portfolio Overview"
    body: |
      Arctic Wolf's commercial product portfolio as of 2026 comprises seven distinct solution
      lines, all delivered as managed services under the Aurora Superintelligence Platform brand.
      The flagship offering, Managed Detection and Response (MDR), provides 24x7 threat monitoring,
      detection, investigation, and response across an organization's entire technology stack. MDR
      has been the company's foundational service since its 2012 founding and accounts for the
      largest share of annual recurring revenue.

      Aurora Exposure Management (formerly Managed Risk) combines Aurora Vulnerability Management
      and Aurora Attack Surface Management. Vulnerability Management helps teams discover, prioritize,
      and remediate vulnerabilities and misconfigurations, while Attack Surface Management provides
      continuous asset discovery across internal, external, cloud, and end-user environments,
      aggregating and deduplicating data to create a continuously updated view of assets, users,
      vulnerabilities, applications, and security controls.

      Cloud Detection and Response extends MDR capabilities into cloud-native environments,
      monitoring AWS, Azure, and Google Cloud Platform configurations and workloads. Aurora
      Endpoint Security, powered by Cylance AI technology acquired from BlackBerry in December 2024
      for approximately $160 million, delivers endpoint protection platform and EDR within Aurora.
      Aurora SOAR from the October 2023 Revelstoke acquisition enables automated playbook execution.
      Incident Response provides emergency breach investigation integrated with existing customer
      technology without requiring re-tooling. Asset Intelligence from the 2025 Sevco Security
      acquisition provides continuous cyber asset discovery and reconciliation.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008]
    tableRefs: [TE001]
    figureRefs: []

  - id: technology-architecture
    title: "Technology Architecture and Aurora Platform"
    body: |
      The Aurora Superintelligence Platform (rebranded from Aurora Security Operations Cloud in
      2025) serves as the unified technical substrate underpinning all Arctic Wolf managed services.
      The platform ingests security telemetry from endpoints, cloud environments, networks, and
      identity systems, applying proprietary machine learning models and AI agents to detect,
      investigate, and respond to threats on behalf of customers.

      Arctic Wolf describes its Aurora platform as an open XDR architecture, ingesting telemetry
      from a wide variety of third-party security tools rather than requiring customers to replace
      existing technology investments. This contrasts with fully closed vendor ecosystems like
      CrowdStrike Falcon Complete, which prioritizes CrowdStrike-native telemetry, though both
      approaches offer 24x7 managed detection and response services. The Concierge Delivery Model
      provides dedicated human security analyst teams (CSTs) assigned to each customer, responding
      to threats when minutes matter. Arctic Wolf's platform is cloud-native and does not offer
      on-premises deployment; all telemetry processing occurs in Arctic Wolf's cloud data lake.

      The AI Trust Engine is a governance layer applying controls across testing, permissions,
      monitoring, logging, explainability, rollback, and human approval for high-impact AI actions.
      Each AI agent operates within clearly defined boundaries and least-privilege controls, accessing
      only data and tools required for its specific function. Customer data is logically separated
      so agents supporting one customer cannot access another customer's information. Arctic Wolf
      does not train its generative AI on customer data; relevant customer data may be used at
      invocation time to improve output quality.
    claimRefs: [CE009, CE010, CE011, CE012, CE013, CE014, CE015, CE016, CE017, CE018]
    tableRefs: [TE002]
    figureRefs: [FE001]

  - id: proprietary-capabilities
    title: "Proprietary Capabilities: AI, ML, and Threat Intelligence"
    body: |
      Arctic Wolf's proprietary technical capabilities center on the Aurora Superintelligence
      Platform's AI and machine learning stack. The company's ML models are trained on
      security-relevant telemetry from its multi-thousand-customer base, creating a network effect
      where threat signals observed across all customers inform detections for each individual
      customer. This threat intelligence aggregation is a structural advantage over standalone SIEM
      deployments or internally managed SOC environments. Arctic Wolf has not published detection
      rate, mean time to respond (MTTR), false positive rate, or dwell time benchmarks for the
      Aurora platform as of 2026.

      The Revelstoke SOAR acquisition in October 2023 added approximately 30 employees and
      purpose-built SOAR technology to Arctic Wolf, integrated as a native component within Aurora
      rather than a bolted-on external tool. The December 2024 Cylance acquisition added an
      AI-powered endpoint protection engine using ML models trained on malware samples to provide
      pre-execution threat prevention with a lightweight agent and offline efficacy. The 2025
      Sevco Security acquisition added asset intelligence for continuous cyber asset discovery and
      reconciliation, enabling context-aware alert prioritization based on asset criticality.

      Aurora Exposure Management is positioned as a managed service overlay on top of vulnerability
      scanner data from Tenable, Qualys, or Rapid7, rather than as a competing standalone tool.
      No patent filings from Arctic Wolf Networks protecting Aurora AI methods, the AI Trust Engine,
      or SOAR automation capabilities were identified in public sources as of May 2026, suggesting
      the company relies on trade secret protections and operational moat rather than patent coverage.
    claimRefs: [CE019, CE020, CE021, CE022, CE023, CE024, CE025, CE026, CE027, CE028]
    tableRefs: [TE003]
    figureRefs: [FE002]

  - id: integration-ecosystem
    title: "Integration Ecosystem and Technology Partnerships"
    body: |
      Arctic Wolf's open XDR architecture is designed to ingest telemetry from a broad ecosystem
      of third-party security and IT tools, allowing deployment into existing customer environments
      without significant technology displacement. Aurora's integration ecosystem spans at least
      seven categories: endpoints, cloud infrastructure, identity providers, network security,
      SIEM/log management, ticketing/workflow, and vulnerability scanners.

      In the endpoint category, Aurora integrates with major EDR and EPP vendors alongside native
      Aurora Endpoint Security. Cloud integrations span AWS CloudTrail and GuardDuty, Microsoft
      Azure Defender for Cloud, and GCP Security Command Center. Identity integrations include
      Microsoft Active Directory, Azure AD (Entra ID), Okta, and other identity providers.
      Network integrations support leading firewall vendors through syslog and API connectors.
      SIEM integrations allow customers with Splunk, IBM QRadar, or Microsoft Sentinel to layer
      Arctic Wolf MDR on top of existing data lakes. Ticketing integrations with ServiceNow and
      Jira enable CST analysts to update incidents in customer-native systems.

      The Aurora Cloud Detection and Response product monitors AWS, Azure, and GCP environments
      for security threats; specific supported compliance frameworks such as CIS, NIST, or PCI-DSS
      are not individually itemized in public product pages. The integration breadth positions
      Arctic Wolf as additive to existing technology investments, reducing adoption friction for
      channel partners and customers and supporting the company's 100% channel distribution model.
    claimRefs: [CE029, CE030, CE031, CE032, CE033, CE034, CE035]
    tableRefs: [TE004]
    figureRefs: [FE003]

  - id: recent-launches-roadmap
    title: "Recent Product Launches and Platform Evolution"
    body: |
      Arctic Wolf's most significant product development in recent years was the rebranding and
      expansion of the Aurora Security Operations Cloud to the Aurora Superintelligence Platform
      in 2025. This rebrand signals strategic emphasis on AI-driven autonomous security operations,
      with the "Superintelligence" positioning reflecting the integration of agentic AI capabilities
      across the platform under the AI Trust Engine governance architecture.

      The 2023 Revelstoke acquisition materially enhanced the automation layer of the platform.
      The 2024 Cylance acquisition added proven AI-native endpoint protection for approximately
      $160 million. The 2025 Sevco Security acquisition completed the asset intelligence layer.
      Arctic Wolf's platform evolution signals continued investment in agentic AI for automated
      threat investigation, deeper Cylance-Aurora MDR integration, and expansion of Sevco asset
      intelligence across the platform. Arctic Wolf does not publish a formal product roadmap,
      and product certifications such as SOC 2 Type II, ISO 27001, or FedRAMP compliance have
      not been publicly documented, though such certifications are typical for MDR vendors
      selling to regulated industries.
    claimRefs: [CE036, CE037, CE038, CE039, CE040, CE041, CE042]
    tableRefs: [TE005]
    figureRefs: [FE004]

  - id: cylance-sevco-integration
    title: "Post-Acquisition Integration: Cylance and Sevco"
    body: |
      Arctic Wolf acquired Cylance from BlackBerry in December 2024 for approximately $160 million,
      rebranding the offering as Aurora Endpoint Security. The integration combines Cylance's
      AI-driven pre-execution prevention capabilities with Arctic Wolf's 24x7 CST monitoring and
      response. The Cylance integration was ongoing as of mid-2026, with Arctic Wolf not having
      disclosed specific integration milestones or completion timelines. Arctic Wolf has not publicly
      disclosed the post-acquisition customer count for Aurora Endpoint Security.

      The Sevco Security acquisition in 2025 added cyber asset intelligence, providing continuous
      discovery and reconciliation of cyber assets across the enterprise. This asset intelligence
      layer integrates with Aurora's threat detection to enable context-aware alert prioritization.
      Integration risk remains material for both acquisitions: the Cylance technology must be
      technically integrated with Aurora's data ingestion and AI governance layers, and customer
      overlap between Cylance's prior BlackBerry install base and Arctic Wolf's MDR customers
      creates commercial integration complexity. Arctic Wolf has not disclosed integration milestones
      or timelines for either Cylance or Sevco, consistent with the company's practice of limiting
      forward-looking operational disclosures.
    claimRefs: [CE043, CE044, CE045, CE046, CE047, CE048, CE049, CE050]
    tableRefs: []
    figureRefs: []

