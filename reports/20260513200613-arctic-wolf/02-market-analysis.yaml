chapter:
  number: 2
  title: "Market Analysis"
  summary: >-
    Arctic Wolf competes in the managed detection and response (MDR) market — a segment
    of the broader cybersecurity services industry growing at 21–25% CAGR. Three independent
    analyst estimates place the 2025–2026 MDR market at $3.4B–$6.3B, converging toward
    $13–19B by 2031. Arctic Wolf's primary buyer is the SME/mid-market organization (100–5,000
    employees) lacking an in-house 24×7 SOC; this cohort is the fastest-growing MDR segment
    at 27% CAGR. Key demand drivers include a structural cybersecurity talent shortage,
    regulatory compliance mandates (NIS2, DORA), and cyber-insurance premium incentives.
    Material constraints include SME cost sensitivity (MDR can consume 7–12% of IT budget)
    and AI-driven commoditization risk for legacy MSSP providers.

sections:
- id: CR0
  title: "Market Definition and Boundaries"
  body: >-
    Managed Detection and Response (MDR) is the outsourced delivery of a 24×7 security
    operations center capability including threat monitoring, detection, investigation, and
    active response. It is distinct from pure Managed Security Services Providers (MSSPs)
    which typically offer monitoring and alerting without guaranteed response, and from
    SIEM/XDR platforms which provide tooling but require internal analyst staffing. The
    substitutes for MDR include: (1) in-house SOC build requiring 8–12 dedicated analysts
    minimum; (2) MSSP alert-forwarding with internal triage; (3) standalone SIEM with
    contracted professional services; and (4) cyber-insurance-mandated basic monitoring
    via insurance-preferred vendors. The MDR market boundary defined by Mordor Intelligence
    covers endpoint, network, cloud, and MXDR (eXtended) variants delivered as managed
    services. Adjacent markets include the SIEM market ($8.4B → $13.7B by 2031 at 10.3%
    CAGR per MarketsandMarkets), endpoint protection platforms (EPP), and SOC-as-a-service
    platforms. Arctic Wolf's "Concierge Delivery Model" positions it within MDR proper,
    layering human expertise and 24×7 coverage on top of its Aurora Platform technology.
  tableRefs:
  - TM001
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM004

- id: CR1
  title: "Market Sizing — TAM, SAM, and SOM"
  body: >-
    Three independent analyst estimates bracket the MDR addressable market. Mordor Intelligence
    (2026) sized global MDR at $4.19B in 2025, growing to $13.45B by 2031 at a 21.45% CAGR.
    MarketsandMarkets (May 2026) projected $6.28B in 2026 rising to $19.01B by 2031 at 24.8%
    CAGR — the most bullish estimate. Precedence Research set a lower baseline at $3.40B in
    2025 and $13.90B by 2035 at 15.12% CAGR, reflecting a more conservative scope definition.
    The spread across estimates ($3.4B–$6.3B in 2025) stems primarily from scope disagreements:
    some analysts include large-enterprise MXDR contracts that Precedence classifies separately,
    and CAGR differences reflect divergent assumptions about AI-enabled service deflation.
    Arctic Wolf's serviceable addressable market (SAM) narrows to the SME/mid-market segment
    (100–5,000 employees) in North America, Europe, and Australia/NZ — estimated at roughly
    $4–6B by 2026 based on Mordor's 45.78% North America share and SME proportion of MDR spend.
    Arctic Wolf's serviceable obtainable market (SOM) can be triangulated from its own disclosed
    ARR: with >$200M ARR (TechCrunch, October 2023) and roughly 3,000 customers, it holds
    approximately 3–5% of the SME/mid-market MDR segment, assuming $60–70K average contract
    value. These are bottom-up estimates with high uncertainty.
  tableRefs:
  - TM002
  figureRefs:
  - FM001
  - FM002
  claimRefs:
  - CM005
