  claims:
  - id: CM001
    statement: >-
      MDR (Managed Detection and Response) is defined as the outsourced delivery of 24×7
      security operations including threat monitoring, detection, investigation, and active
      response, covering endpoint, network, cloud, and MXDR variants.
    type: third-party-reported
    topic: market-definition
    sourceRefs: [SM001, SM002]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM010]

  - id: CM002
    statement: >-
      MSSPs (Managed Security Service Providers) offer alert monitoring and ticket escalation
      without guaranteed active response, making them the primary lower-cost substitute for MDR.
    type: third-party-reported
    topic: market-definition
    sourceRefs: [SM001, SM009]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM012]

  - id: CM003
    statement: >-
      XDR/SIEM platforms require in-house analyst staffing (minimum 8–12 dedicated analysts)
      to achieve 24×7 coverage, making them a cost-intensive substitute for MDR in the SME segment.
    type: third-party-reported
    topic: market-definition
    sourceRefs: [SM002, SM010]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM012]

  - id: CM004
    statement: >-
      In-house SOC build at 8-analyst scale costs more than $3M per year including salaries,
      tooling, and overhead, making MDR a compelling economic alternative for sub-5,000 employee organizations.
    type: estimated
    topic: market-definition
    sourceRefs: [SM001, SM004]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM012]

  - id: CM005
    statement: >-
      The global MDR market was $4.19 billion in 2025, growing to $5.09 billion in 2026,
      and forecast to reach $13.45 billion by 2031 at a CAGR of 21.45%, per Mordor Intelligence.
    type: estimated
    topic: market-size
    sourceRefs: [SM001]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM001, QM002, QM026]

  - id: CM006
    statement: >-
      MarketsandMarkets projects the global MDR market at $6.28 billion in 2026 growing to
      $19.01 billion by 2031 at 24.8% CAGR — the highest published estimate, reflecting
      the broadest scope including large-enterprise MXDR contracts.
    type: estimated
    topic: market-size
    sourceRefs: [SM002]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM001, QM002, QM026]

  - id: CM007
    statement: >-
      Precedence Research estimates the global MDR market at $3.40 billion in 2025 growing
      to $13.90 billion by 2035 at a CAGR of 15.12%, the most conservative estimate due to
      narrower scope definitions.
    type: estimated
    topic: market-size
    sourceRefs: [SM003]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM001, QM002, QM026]

  - id: CM008
    statement: >-
      North America accounts for 45.78% of global MDR market revenue as of 2025, making it
      the dominant geography, per Mordor Intelligence.
    type: estimated
    topic: market-geography
    sourceRefs: [SM001, SM006]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM003]

  - id: CM009
    statement: >-
      Large enterprises accounted for 57.65% of MDR market spending in 2025, per Mordor
      Intelligence, reflecting complex security stacks and multi-cloud estates driving outsourced
      monitoring demand.
    type: estimated
    topic: market-segments
    sourceRefs: [SM001]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM004]

  - id: CM010
    statement: >-
      SMEs are the fastest-growing MDR buyer segment at a 27.02% CAGR through 2031, driven
      by insurer mandates, supply-chain security clauses, and cost-effective SOC-in-a-box
      packaging, per Mordor Intelligence.
    type: estimated
    topic: market-segments
    sourceRefs: [SM001, SM003]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM004, QM006]

  - id: CM011
    statement: >-
      Arctic Wolf's disclosed ARR of over $200M (October 2023) with 3,000+ customers implies
      an average contract value of approximately $60,000–$70,000 and a market share of
      roughly 3–5% in the North American SME/mid-market MDR sub-segment.
    type: inferred
    topic: market-share
    sourceRefs: [SM010, SM015]
    confidence: low
    freshness: historical
    answersQuestionRefs: [QM007]

  - id: CM012
    statement: >-
      The SIEM market, an adjacent segment to MDR, was projected at $8.39 billion in 2026
      growing to $13.67 billion by 2031 at 10.3% CAGR, per MarketsandMarkets — growing more
      slowly than MDR, reflecting the shift from self-operated security tooling to managed services.
    type: estimated
    topic: adjacent-markets
    sourceRefs: [SM002, SM001]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM021]

  - id: CM013
    statement: >-
      SME/mid-market organizations (100–999 employees) are Arctic Wolf's primary buyer
      segment; the typical buying center is the CIO or IT Manager, with CFO approval, and
      procurement is often triggered by cyber-insurance renewal or ransomware incidents.
    type: third-party-reported
    topic: buyer-profile
    sourceRefs: [SM001, SM003]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM011]

  - id: CM014
    statement: >-
      Mid-to-large enterprise MDR buyers (1,000–5,000 employees) are led by CISOs, with
      deal sizes typically $100K–$500K annually and procurement cycles of 90–180 days including
      formal RFP.
    type: third-party-reported
    topic: buyer-profile
    sourceRefs: [SM001, SM002]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM011, QM023]

  - id: CM015
    statement: >-
      Large-enterprise MDR buyers (5,000+ employees) represent 57.65% of current MDR spend
      and increasingly seek MXDR (eXtended) services integrating endpoint, network, identity,
      and cloud telemetry in a unified managed service.
    type: estimated
    topic: buyer-profile
    sourceRefs: [SM001, SM002]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM004]

  - id: CM016
    statement: >-
      BFSI (Banking, Financial Services, Insurance) is the largest MDR vertical segment at
      28.74% of market revenue in 2025; healthcare and life sciences are the fastest-growing
      vertical at 23.60% CAGR through 2031, both driven by regulatory mandates and high breach costs.
    type: estimated
    topic: buyer-segments
    sourceRefs: [SM001]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM005]

  - id: CM017
    statement: >-
      Arctic Wolf states that over 10,000 organizations worldwide trust its platform, up from
      3,000+ customers cited in October 2023, reflecting rapid customer acquisition through
      its channel-first go-to-market with MSSPs, VARs, and integrators.
    type: company-claimed
    topic: customer-count
    sourceRefs: [SM008, SM010]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QM027]

  - id: CM018
    statement: >-
      Arctic Wolf distributes primarily through channel partners (MSSPs, VARs, integrators),
