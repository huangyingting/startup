  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: cap-table-arr-disclosure
      missingEvidence: "Arctic Wolf has not publicly disclosed its ARR, NRR, cap table composition, or liquidation preferences. ARR is the primary valuation input and NRR is the primary revenue-quality measure; both are unavailable from public sources."
      whyItMatters: "Without verified ARR, valuation ranges are based on analyst estimates with low confidence. Without cap-table data, return modeling for common shareholders is speculative. These are the two most important inputs for private-investment valuation."
      diligencePath: "Request CFO data room access: verified ARR and NRR for FY2023–FY2025; cap table with all share classes and liquidation preferences; debt schedule; Series F preference terms."
      relatedQuestionRefs: [QV013, QV015]

    - type: missing-source
      severity: material
      topic: cylance-integration-net-arr
      missingEvidence: "No public source discloses the net ARR contribution from the Cylance acquisition after accounting for customer attrition. Cylance suffered significant customer losses during BlackBerry ownership, and the post-acquisition retention rate is not reported."
      whyItMatters: "The $160M Cylance acquisition is material; its net ARR contribution determines whether it is accretive or dilutive to Arctic Wolf's blended growth rate. Sub-50% net retention on the Cylance book would add integration drag rather than growth."
      diligencePath: "Request Cylance customer count and ARR pre- and post-acquisition (Q1 FY2025); integration roadmap milestones; CRO report on Cylance customer retention for the first two renewal cycles post-close."
      relatedQuestionRefs: [QV014]

    - type: enumeration-incomplete
      severity: material
      topic: private-comp-transactions
      missingEvidence: "The comparable valuation table covers only public companies due to the absence of accessible private-company M&A transaction data for MDR/SOCaaS platforms at the $300M–$600M ARR scale within the past 24 months."
      whyItMatters: "Private-company comparables would provide a more accurate valuation reference for Arctic Wolf's private-to-IPO transition; absence of this data increases valuation uncertainty and makes the comp set less complete."
      diligencePath: "Engage a placement agent or investment bank with access to PitchBook, Preqin, or Capital IQ private transaction databases; request MDR/SOCaaS M&A comps from 2022–2025 above $500M."
      relatedTableRefs: [TV004]
      relatedQuestionRefs: [QV022]
