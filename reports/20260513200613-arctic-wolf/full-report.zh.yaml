      - number: '6.5'
        title: 扩张、集中度与渠道依赖
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf 的“先落地、再扩张”主要靠向现有 MDR 客户交叉销售更多解决方案驱动，包括
              Managed Risk、云检测与响应（CDR）、安全意识培训（SAT）和 IR 预留服务。Aurora 平台的一体化架构意味着，
              新增模块不需要部署新传感器，交叉销售的切换摩擦较低。不过，Arctic Wolf 不披露产品附加率、
              多产品客户占比，或扩张 ARR 占总 ARR 的比例。

              客户集中度风险没有公开披露。Arctic Wolf 服务 10,000+ 家组织，说明头部客户集中风险低于
              典型企业软件公司；但中端市场客户可能集中在特定垂直行业（医疗、金融服务），这些行业
              的监管要求会推动采购。Arctic Wolf 的保险合作伙伴渠道（300+ 个网络保险集成）很可能在
              SMB 客群中带来不成比例的获客贡献，因为保险公司会把安装安全工具作为保单条件。

              渠道依赖带来自己的集中度风险：Arctic Wolf 100% 的收入都通过渠道合作伙伴流入。如果某个
              大型 VAR 或 MSSP 合作伙伴转向竞争 MDR 供应商（例如 Huntress、Expel，或 CrowdStrike
              Falcon Complete 的合作伙伴），Arctic Wolf 在特定地区或垂直行业的获客速度可能受损。
              Arctic Wolf 不披露前 10 大渠道合作伙伴的收入贡献。400+ 个合作伙伴意味着有一定分散度，
              但不能消除合作伙伴驱动的集中风险。
            claimRefs:
