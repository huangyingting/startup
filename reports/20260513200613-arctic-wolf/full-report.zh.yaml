      - number: '1.4'
        title: 里程碑、收购与战略演进
        blocks:
          - type: paragraph
            body: >
              2018 年以来，Arctic Wolf 通过五笔收购演进，每一步都指向更宽的安全运营平台。2018 年收购 RootSecure，启动托管漏洞管理。2022 年收购 Tetra Defense，带来 100
              名顶尖事件响应调查员，把平台扩展到取证和泄露恢复。2023 年收购 Revelstoke，将 SOAR 自动化能力原生整合进 Aurora，降低客户对独立编排工具的依赖。2024 年以约 $160M 从
              BlackBerry 收购 Cylance，加入 AI 驱动的端点预防；2025 年收购 Sevco Security，加入资产智能。


              公司的增长轨迹也获得外部验证：Gartner 于 2018 年 6 月将 Arctic Wolf 评为 Cool Vendor，Deloitte 在 2019 年和 2020 年均将其纳入 Technology
              Fast 500。公司在 2020 年 Series E 后跻身独角兽，员工数从 2022 年约 2,000 人增至 2025 年 3,300 人，客户数从 2023 年 10 月的 3,000+ 增至 2025
              年 9 月的 10,000+。


              多次推迟 IPO
              构成一条重要战略叙事：管理层持续把规模、平台宽度和并购整合放在资本市场退出之前，最终形成覆盖检测、响应、预防、身份、云和资产智能的平台型公司。任何未来流动性事件都要回答一个核心问题：平台宽度究竟能形成持久竞争差异，还是会引入整合复杂度，拖累
              EBITDA 利润率和估值倍数。
