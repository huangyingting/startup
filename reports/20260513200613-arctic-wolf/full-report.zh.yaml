      - number: '3.3'
        title: 第三至第四层竞争对手画像：纯 MDR 与 SMB 挑战者
        blocks:
          - type: paragraph
            body: >-
              在中端市场 MDR 领域，Rapid7 是最接近 Arctic Wolf 的上市可比公司。Rapid7 全球客户 11,500+，并在 NASDAQ 上市（RPD），为基准对比提供了更高透明度。Rapid7 在
              2023 年经历大幅重组，包括影响约 18% 员工的裁员，反映托管服务业务的利润率压力。Rapid7 2024 年 Q3 收入约 $213M（年化 $850M+），ARR 增速放缓到个位数。Rapid7 通过
              InsightIDR 平台捆绑 MDR 竞争，但市场感知更偏工具中心，服务差异化弱于 Arctic Wolf 的 Concierge 模式。Huntress 是 Arctic Wolf 最直接的 SMB
              竞争对手。Huntress 成立于 2015 年，只走渠道（仅 MSP），2024 年 2 月完成 $150M Series C，服务 1–500
              名员工细分，重点是持久立足点检测（由伙伴管理的端点监控）。Huntress 定价竞争力很强（基础价约每端点每月 $7），而 Arctic Wolf 估计平均每年 $60–70K；因此，预算受限的 SMB
              往往优先选择 Huntress。Huntress 近期扩展到身份威胁检测与响应（ITDR），直接侵入 Arctic Wolf 的身份监控用例。eSentire（私营，约 1,500 家组织）在
              1,000–10,000 名员工细分竞争，提供全范围 MDR，内置 IR 预付服务，并承诺 SLA 支撑的 15 分钟平均遏制时间。Expel（前 Mandiant 创始人，累计融资 $145M+）以 API
              可访问性和面向云原生买方的透明定价形成差异化。Deepwatch 服务中大型企业，采用共管式「Guardian Platform」模式，并称年度客户增长超过 75%。
