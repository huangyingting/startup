      - number: '1.3'
        title: 融资历史、投资者与资本结构
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 已累计获得约 $900M 股权与债务融资。股权融资包括：2020 年 3 月 $60M Series D（Blue Cloud Ventures 和 Stereo Capital
              领投）、2020 年以 $1.3B 估值完成 $200M Series E，以及 2021 年 7 月以 $4.3B 估值完成 $150M Series F，由 Viking Global Investors
              领投，D1 Capital Partners 和 Koch Disruptive Technologies 参投。按 2023 年 10 月报道，公司累计 VC 融资为 $499M。


              2022 年 10 月，Arctic Wolf 从 Owl Rock Capital（Blue Owl）和 Alter Domus 获得 $401M 债务融资，明确部分资金将用于并购。CEO Schneider
              确认，其中一部分资本用于 2023 年收购 Revelstoke SOAR；随后 2024 年收购 Cylance，进一步体现了并购投入。


              公司在 2020 年 3 月 Series D 公告中公开释放 IPO 意图，CEO NeSmith 当时提出 10 个季度登陆公开市场的路径。但 2022 年公开市场环境不利，加上网络安全板块整体波动，IPO
              计划被推迟。截至 2026 年，Arctic Wolf 仍为私营公司，没有确认的上市时间表。2022 年偏重债务的资本结构带来财务契约和再融资风险，这是尽调中的关键关注点。
