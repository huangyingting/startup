    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf Networks 是一家私营网络安全公司，总部位于 Minnesota 州 Eden Prairie，2012 年创立于 California 州
              Sunnyvale。公司提供安全运营即服务，实际上为内部没有能力配置和运行 24x7 威胁监控的组织，承担全托管安全运营中心（SOC）的角色。其核心产品 Aurora Security Operations
              Cloud（2025 年营销中更名为 Aurora Superintelligence Platform）从端点、云环境、网络和身份系统采集安全遥测，用来检测、调查并响应网络威胁。


              Arctic Wolf 的商业模式是基于订阅的托管服务，定位为安全团队的力量倍增器，核心是消除告警疲劳。传统 SIEM 会抛出成千上万条告警；Arctic Wolf
              交付的是经过筛选、由分析师确认的工单——通常每个客户每周只有一到两条——让内部安全人员只处理已确认威胁。这种运营模式非常契合小企业和中端市场客户（50 到 8,000 名员工），公司此后也逐步上探大客户。


              Aurora 平台覆盖 MDR（托管检测与响应）、托管风险（来自 2018 年收购 RootSecure 后获得的漏洞与合规能力）、云安全、身份安全、事件准备与响应（来自 2022 年收购 Tetra
              Defense）以及安全自动化（来自 2023 年收购 Revelstoke SOAR）。2024 年 12 月从 BlackBerry 收购 Cylance 后，公司补上 AI 驱动的端点威胁预防；2025
              年收购 Sevco Security 后，又加入资产智能层。截至 2025 年，Arctic Wolf 的平台每周处理超过 5 万亿条安全事件。
