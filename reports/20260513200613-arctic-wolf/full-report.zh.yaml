      - number: '5.2'
        title: 技术架构与 Aurora 平台
        blocks:
          - type: paragraph
            body: >
              Aurora Superintelligence Platform（2025 年从 Aurora Security Operations Cloud 更名）是支撑 Arctic Wolf
              全部托管服务的统一技术底座。平台从端点、云环境、网络和身份系统采集安全遥测，应用自研机器学习模型和 AI 智能体，代表客户检测、调查并响应威胁。


              Arctic Wolf 将 Aurora 平台描述为开放 XDR 架构，能够从大量第三方安全工具采集遥测，而不是要求客户替换既有技术投资。这与 CrowdStrike Falcon Complete
              等完全封闭的供应商生态形成对比，后者优先使用 CrowdStrike 原生遥测；不过，两种路径都提供 24x7 托管检测与响应服务。Concierge Delivery Model
              为每个客户配置专属人类安全分析师团队（CST），在分秒必争时响应威胁。Arctic Wolf 的平台是云原生架构，不提供本地部署；所有遥测处理都发生在 Arctic Wolf 的云数据湖中。


              AI Trust Engine 是一个治理层，围绕测试、权限、监控、日志、可解释性、回滚，以及高影响 AI 动作的人类审批设置控制。每个 AI
              智能体都在清晰边界和最小权限控制内运行，只访问其特定功能所需的数据和工具。客户数据做逻辑隔离，因此支持某一客户的智能体无法访问另一客户的信息。Arctic Wolf 不用客户数据训练生成式
              AI；在调用时，相关客户数据可能用于提高输出质量。
