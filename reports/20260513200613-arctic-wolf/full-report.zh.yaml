      - 对承销的重要性
      - 最新已知数据点
      - 尽调路径
    rows:
      - - 经审计财务报表（损益表、资产负债表、现金流量表）
        - 没有经审计数据，就无法核验年经常性收入（ARR）、收入、毛利率、EBITDA 或现金烧钱速度；目前所有数字都是估计值
        - 无可用数据——私营公司，无 SEC 注册披露义务
        - 向管理层索取最近两年由 Big-4 或同等机构编制的经审计财务报表
      - - 毛利率拆分（订阅 vs. CST 人工 vs. 基础设施）
        - CST 人工成本决定长期毛利结构，也决定托管服务模式规模化后的可行性
        - 按员工数分析估计，综合毛利率 55–65%（未核验）
        - 索取 COGS 拆分：按团队划分的人工（CST、工程、支持）、基础设施、托管、第三方数据源
      - - 净收入留存率（NRR）和 Logo 流失
        - NRR 和 Logo 流失验证粘性逻辑；如果 NRR 低于预期，增长叙事会被实质改写
        - 未披露；基于 CST 切换成本和产品扩张路径，估计为 105–120%
        - 索取按年份队列（2020–2024）划分的 ARR 留存报告；总留存率与净留存率；按客群划分的 Logo 流失
      - - 现金余额和月度烧钱速度（截至 Q1 2026）
        - 没有现金余额和烧钱速度，就无法评估运营现金跑道；Blue Owl 债务带来利息支出，会进一步推高烧钱速度
        - 未披露；已知 Blue Owl 债务面值约 $221M，但现金余额未知
        - 索取 CFO 认证资产负债表，列明截至 December 2025 的现金及等价物；索取 13 周滚动现金预测
      - - IPO 时间表和流动性事件计划
        - 公司已进入后期，累计融资 $900M+、员工 3,000+，需要可信的流动性路径；IPO 推迟会带来投资人和员工流动性风险
        - 截至 May 2026 未提交 IPO 文件；据 SC World，CEO 在 2023 年称没有具体 IPO 时间表
        - 索取董事会层面的流动性计划；确认二级市场交易活动；评估直接上市或 M&A 收购情景
      - - ACV 分布、客户集中度和按客群划分的 ARR
        - 少数大客户集中会带来留存风险；客群拆分能看出增长质量，而不只是增长数量
        - 公司声称客户 5,000+；未提供 ACV 分布或客群拆分
        - 索取前 10 大客户 ARR 及占比；ACV 直方图；按地域和垂直行业划分的 ARR
    claimRefs:
      - CI024
      - CI028
      - CI034
      - CI035
      - CI038
      - CI040
    notes: 这是完整财务承销中最关键的六项证据缺口。所有缺口都需要管理层在正式数据室直接披露。没有经审计财务和 NRR 队列数据，仅靠公开来源无法完成完整承销。
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Evidence gap list compiled from systematic review of all publicly available Arctic Wolf financial disclosures,
        SEC filings referencing the company, and standard SaaS late-stage diligence checklist; these six gaps represent
        all blocking items for financial underwriting.
