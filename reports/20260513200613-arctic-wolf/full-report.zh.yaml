      - number: '8.5'
        title: 情景分析、退出准备度与建议
        blocks:
          - type: paragraph
            body: |
              三种情景刻画投资回报分布。乐观情景假设 Arctic Wolf 于 2025 年末或 2026 年 IPO，已验证 ARR
              达到 $550 million 或以上，且同比增长 35%+，拿到与 CrowdStrike 和 Cloudflare 可比的 14–16x
              EV/ARR 倍数。这意味着估值 $7.7–8.8 billion，较 2021 年 Series F 标记约有 80–105% 回报。该情景
              需要有利的 IPO 市场环境和已验证的高溢价增长画像；概率估计约 25%。

              基准情景假设 2026–2027 年 IPO，已验证 ARR 约 $500 million，同比增长 25–30%，拿到与相似
              增长画像下 Zscaler 和 Palo Alto 一致的 9–12x 倍数。这会产生 $4.5–6.0 billion 估值，对 Series F
              标记有 5–40% 回报——对现有投资者略为正向，但若新投资者以 $4.3 billion 水平进入且没有价格
              折让，则不足以补偿风险。概率约 50%。

              悲观情景假设 IPO 推迟到 2027 年之后，或以 $400 million ARR 和低于 20% 增长推进，导致 6–8x
              倍数和 $2.4–3.2 billion 估值——较 $4.3 billion Series F 标记亏损 26–44%。该情景由 Microsoft
              打包产品带来的竞争压缩、IPO 窗口关闭，或 NRR 恶化至 100% 以下触发。概率约 25%。

              需要立即退出头寸的投资逻辑破裂触发条件包括：MDR 收入增长确认低于 20% 同比；Microsoft
              或 CrowdStrike 以低于 $8/seat 定价发布打包 MDR；确认估值低于 $3.5 billion 的降价轮；或 2028 年
              后 IPO 注册撤回且没有战略买家公告。Cylance 收购后第一年净留存低于 80%，是一个实质观察
              触发点。

              有证据支撑的建议是：现有投资者在 $4.3 billion 标记上有条件谨慎持有；新投资只有在 $3.0–3.5
              billion 入场价才合理——这一 19–30% 折价补偿了 2021 年峰值定价带来的倍数压缩和持有期延长
              风险。任何投资决定前，五个关键尽调问题是：已验证 ARR 和 NRR（FY2023–FY2025）、完整股权
              结构表和清算优先权瀑布、Cylance 首个续约周期的净 ARR 贡献、IPO 时间表的董事会决议或投行
              接触情况，以及单位经济学（按细分市场的 CAC 和 LTV）。
