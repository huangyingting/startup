  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 融资历史与估值背景
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf Networks 自成立至 Series F，已通过八轮已披露融资累计获得约 $900 million 风险
              和成长资本；最近一次新股融资是 2021 年 7 月完成的 $150 million Series F，投后估值 $4.3 billion。
              该轮引入 Owl Rock Capital、DTCP 和 CrowdStrike Falcon Fund 作为新投资者，同时 Lightspeed
              Venture Partners、Viking Global、D.E. Shaw、EDBI 和 Teralyst 等既有支持者继续参与——这是
              一个横跨一线成长股权和战略网络安全资本的财团。

              $4.3 billion 估值出现在 SaaS 估值倍数的周期高点。根据 EquityZen 和 CB Insights 的背景估计，
              Arctic Wolf 在 Series F 交割时 ARR 约为 $150–200 million，隐含 EV/ARR 倍数为 22–29x——这
              符合 2021 年高增长安全 SaaS 公司的峰值定价，但明显高于 2026 年初公开网络安全可比公司
              集合中可观察的 11–15x 中位数。对在 2021 年高水位或附近进入的投资者而言，如果没有进一步
              验证 ARR 规模，就存在显著倍数压缩风险。

              此后两项进展实质影响估值背景。第一，2023 年末，多家可信新闻来源报道 Arctic Wolf 推迟了
              此前释放信号的 IPO 计划；管理层传达的偏好，是在寻求公开市场流动性前继续扩大收入规模。
              IPO 从 2023–2024 年目标推迟到 2026–2027 年区间，会把 Series F 投资者的持有期从交割日起
              拉长到五到六年，相比四年退出假设压缩 IRR。第二，Arctic Wolf 于 2024 年 12 月宣布以
              $160 million 从 BlackBerry 收购 Cylance，资金来自现金与股权的未披露组合，为 Aurora 平台
              增加约 3,500 名端点安全客户和 EDR 能力。

              SEC EDGAR 确认，截至 2026 年 5 月，Arctic Wolf Networks Inc. 未提交 S-1 或草案注册声明，
              与私人公司状态一致。Form D 文件记录了 2012 年至 2021 年的多次 Regulation D 豁免发行，
              与公司披露的融资历史相匹配。股权结构表构成、清算优先权金额和 Cylance 融资结构均未公开，
              因而无法为普通股和后期优先股股东独立建模回报。

              截至 2026 年 5 月，公开来源中未发现低于 $4.3 billion 估值的降价轮融资或二级出售事件。
              Arctic Wolf 正式最后已知私人估值仍为 $4.3 billion，不过通过 EquityZen 等平台撮合的二级市场
              可能隐含按市值计价折扣，而该折扣尚未反映在任何披露估值中。EquityZen 将 Arctic Wolf 列为
              可投资的 Pre-IPO 二级标的，确认了其私人公司状态，也说明正式公开发行前机构对流动性有兴趣。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
