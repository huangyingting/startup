  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              2026 年 MDR 竞争格局可分为五层。第一层（平台巨头）：CrowdStrike（ARR $3.44B+，NASDAQ:CRWD）通过 Falcon Complete 服务主导企业 MDR；该服务要求部署
              CrowdStrike Falcon 端点传感器，对既有 Falcon 客户是显著优势，但也限制了平台中立型交易。Microsoft（Defender for Endpoint + Sentinel）和 Palo
              Alto Networks（XSIAM）以打包替代方案竞争。第二层（规模整合者）：Sophos 在 2024 年 10 月以 $859M 收购 Secureworks 后，按客户数形成单一最大 MDR
              供应商——截至 2026 年 5 月服务 39,000+ 家组织，获得 Gartner Peer Insights 2026 Customers' Choice 认可，290 条评价给出 4.8/5.0
              评分。第三层（纯 MDR 专家）：Rapid7（NASDAQ:RPD，11,500+ 客户）通过 InsightIDR 平台和托管运营竞争。eSentire（私营，总部 Toronto）和 Expel（私营，由前
              Mandiant 高管创立）分别面向中端市场和云原生买方。Deepwatch 通过共管式「Guardian Platform」模式服务企业客户。第四层（SMB/MSP 优先 MDR）：Huntress（2024
              年 2 月完成 $150M Series C，聚焦 SMB）通过仅 MSP 渠道模式，以明显更低的端点单价，直接竞争 Arctic Wolf 核心的 1–500 名员工细分。第五层（传统 MSSP 升级）：传统
              MSSP（Alert Logic、Trustwave、Optiv）正在逐步增加 MDR 能力，但缺少 24×7 主动响应 SLA 和专属客户团队。Arctic Wolf 的主要可触达战场，是第三、四层中的 SME
              / 中端市场新增客户，以及第一、二层中考虑平台整合的买方。
