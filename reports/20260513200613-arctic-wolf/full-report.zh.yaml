      - number: '8.2'
        title: 公开可比公司与市场倍数
        blocks:
          - type: paragraph
            body: |
              由于公开来源无法获取 $300–600 million ARR 规模的可比私人 MDR/SOCaaS 交易，公开网络安全
              可比公司集合成为 Arctic Wolf 估值的主要倍数锚。基于 ARR 规模、收入增长画像，以及与
              Arctic Wolf 托管安全运营平台的产品接近度，选取六家公司：CrowdStrike、SentinelOne、Palo
              Alto Networks、Zscaler、Okta 和 Cloudflare。

              CrowdStrike（CRWD）是最直接的可比公司，因为它是具备 XDR 和 MDR 能力的纯网络安全平台。
              该公司截至 Q4 FY2025 期末 ARR 约 $4.24 billion，同比增长约 30%，按远期 ARR 约 20–22x 交易，
              市值超过 $88 billion——为定义品类的网络安全平台立下了溢价下限。SentinelOne（S）在规模
              阶段上最直接可比，截至 Q4 FY2025 披露 ARR 约 $894 million，同比增长约 35%，按远期 ARR
              16–18x 交易，市值 $17 billion。Series F 时，Arctic Wolf 的规模和增长阶段最接近 SentinelOne
              IPO 时的画像，因此 SentinelOne 是 Arctic Wolf IPO 定价的参考锚。

              Palo Alto Networks（PANW）和 Zscaler（ZS）按远期 ARR 10–12x 交易，反映其更成熟的增长画像，
              同比增速分别为 16% 和 23%。Okta（OKTA）因增长率降至 15% 以下，已压缩到 5–7x 远期 ARR；
              这直接说明安全 SaaS 公司减速时会受到怎样的倍数惩罚。Cloudflare（NET）在 27% ARR 增长下
              达到 20–22x，设定了上沿溢价倍数基准。

              CB Insights 2023 年网络安全独角兽分析记录了全行业较 2021 年峰值水平 30–50% 的倍数压缩，
              这会直接折价 Arctic Wolf 2021 年 $4.3 billion 高水位。当前行业中位 EV/ARR 倍数，对 ARR 增长
              20–35% 的公司为 11–15x；相比 Arctic Wolf Series F 时拿到的 22–29x，这意味着 40–50% 的倍数
              收缩，Arctic Wolf 必须通过已证明的收入规模来抵消。Cybersecurity Ventures 市场分析和
              Crunchbase News 报道确认，投资者仍持续关注跨过 $500 million ARR 里程碑的 MDR 品类领导者，
              这一门槛常被视为安全平台 IPO 准备度信号。
