        - 具名部署深度
        - 结果具体性
        - 生产验证
      rows:
        - label: G2 / TrustRadius 评价
          values:
            - 高（279 + 31 条评价）
            - 低（匿名）
            - 中（具体用例）
            - 高（已验证平台）
        - label: Gartner Peer Insights
          values:
