        - 按层级拆分的合作伙伴 ARR 贡献；前 5 大合作伙伴在新增 ARR 中的占比；合作伙伴留存率
        - 任一单一合作伙伴连续两个季度贡献 >20% 新增 ARR
        - 要求按十分位拆分合作伙伴 ARR 集中度；合作伙伴 NPS 与留存；任何合作协议中的保证或排他条款
      - - NRR 披露低于 100%
        - IPO 文件、老股交易或公开披露中的 NRR/GRR；管理层数据室中的队列数据
        - 首次 NRR 披露显示任一细分低于 100%
        - 优先尽调：在任何重大投资承诺前要求提供队列留存瀑布；确保条款清单中加入 NRR 条款
      - - 正式监管执法行动
        - 提及 Arctic Wolf 的 SEC EDGAR 文件；FTC 执法案卷；HHS OCR 泄露门户；CISA 警示提及
        - 任一正式执法行动（SEC、FTC、OCR、CISA）点名 Arctic Wolf 平台或运营
        - 每季度监控 SEC、FTC 和 HHS OCR 公开案卷；为 Arctic Wolf 名称提及设置监管提醒服务
      - - Aurora Platform SLA 失效并引发诉讼
        - 客户集体诉讼文件；平台宕机的负面媒体报道；披露的 SLA 补偿付款
        - 客户提起集体诉讼，并称 Aurora 平台故障是数据泄露的近因
        - 投资前审阅客户 SLA 协议样本；确保 E&O 和网络责任保险覆盖充分
      - - CEO 或 CTO 离职且未指定继任者
        - LinkedIn、新闻稿和公开公告监控；董事会治理披露
        - CEO 或 CTO 离职公告发布后 90 天内，没有指定内部继任者或可信外部聘任人选
        - 将董事会批准的继任计划列为尽调前提；确保雇佣协议包含通知和交接条款
  - id: TV001
    title: 建议摘要表
    notes: 评估基于公开来源证据进行估计；ARR 与 NRR 来自第三方数据，尚未验证。入场价格和持有期仅为指示性判断，不构成投资建议。
    claimRefs:
      - CV041
      - CV026
      - CV027
    columns:
      - 维度
      - 评估
      - 依据
    rows:
      - - 投资建议
        - 有条件谨慎持有
        - 证据支持既有投资者持有；新投资需要先验证 ARR，并把价格压到约 $3–3.5B
      - - 置信度
        - 中
        - 公开财务披露有限，无法给出高置信度估值判断；ARR 尚未验证
      - - 风险评级
        - 高
        - IPO 时间不确定、倍数压缩、财务不透明，以及 Cylance 整合风险叠加，整体风险偏高
      - - 估值立场
        - 2021 年 $4.3B 标记对新资金偏高
        - 若无法验证 ARR 高于 $380M，当前 11–15x ARR 中位数相对 2021 年隐含的 22–29x，要求 30–40% 折价
      - - 目标入场价（新资金）
        - $3.0–3.5B
        - 较 2021 年标记折价 19–30%；补偿倍数压缩和持有期风险
      - - 目标持有期
        - 18–36 个月
        - 按推迟后的计划和市场条件，IPO 窗口最可能在 2026–2027 年；老股退出可能更早
  - id: TV002
    title: 投资逻辑与反向逻辑表
    notes: 投资逻辑和反向逻辑来自公开竞品数据、市场报告和管理层披露的交叉验证。权重是对其影响投资结果相关性的定性判断。
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
    columns:
      - 维度
      - 投资逻辑
      - 反向逻辑
      - 权重
    rows:
      - - 市场地位
        - 定义品类的 MDR 龙头；8K+ 客户；SOCaaS 规模带来高切换成本
        - Microsoft/CrowdStrike 将同等能力打包进现有企业协议
        - 高 — 护城河的核心竞争风险
      - - 收入增长
        - FY2024 创纪录、接近同比翻倍的增长，证明 MDR 需求仍然强劲
        - 未披露 ARR/NRR；增长说法无法验证；财务不透明带来逆向选择
        - 高 — 首要尽调缺口
      - - 估值
        - 若验证 ARR 超过 $500M，品类龙头 IPO 时应享有 14–16x 倍数
        - 2021 年 $4.3B 标记处于倍数峰值；按当前 ARR 估计需要压缩 30–50%
        - 高 — 新资金和 Series F 投资者的关键风险
      - - 退出路径
        - 2025–2026 年 IPO 窗口重新打开；MDR 品类支撑溢价上市
        - 2023 年 IPO 推迟；延迟拉长会增加持有成本和老股折价
        - 中 — 价格纪律到位即可管理
      - - Cylance 收购
        - 补充端点安全和 3,500+ 客户；平台宽度提高切换成本
        - Cylance 在 BlackBerry 旗下经历客户流失；整合风险增加执行负担
        - 中 — 18 个月窗口内的执行风险
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    notes: 所有情景估值都基于公开市场可比公司倍数，并套用分析师估计的 ARR。概率信号是指示性区间，不是精算预测。
    claimRefs:
      - CV037
      - CV038
      - CV039
    columns:
      - 情景
      - ARR 假设
      - EV/ARR 倍数
      - 隐含估值
      - 概率信号
      - 主要下行风险
    rows:
      - - 乐观
        - ~$550M（已验证）
        - 14–16x
        - $7.7–8.8B
        - ~25% — 需要验证 35%+ 增长，并赶上有利的 2025–2026 年 IPO 窗口
        - 增长放缓或市场回调会把倍数打到 12x 以下
      - - 基准
        - ~$500M（共识估计）
        - 9–12x
        - $4.5–6.0B
        - ~50% — 按当前同业倍数和估计规模轨迹，这是最可能结果
        - IPO 进一步推迟或 ARR 不及预期，会压向悲观情景
      - - 悲观
        - ~$400M（增长放缓）
        - 6–8x
        - $2.4–3.2B
        - ~25% — 由竞争压缩、IPO 推迟或 NRR 恶化至 100% 以下触发
        - 倍数永久压缩；被迫降估值融资，或老股交易出现实质性亏损
  - id: TV004
    title: 可比估值表
    enumerationScope:
