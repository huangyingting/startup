      - number: '5.6'
        title: 收购后整合：Cylance 与 Sevco
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf 于 2024 年 12 月从 BlackBerry 收购 Cylance，交易金额约 $160 million，
              并将该产品线更名为 Aurora Endpoint Security。整合后，Cylance 基于 AI 的执行前预防
              能力，与 Arctic Wolf 24x7 CST 监控和响应能力拼到一起。截至 2026 年中，Cylance 整合
              仍在推进，Arctic Wolf 尚未披露具体里程碑或完成时间表。Arctic Wolf 也未公开 Aurora
              Endpoint Security 在收购后的客户数。

              2025 年收购 Sevco Security 后，Arctic Wolf 增加了网络资产情报能力，可以在企业范围内
              持续发现并核对网络资产。该资产情报层与 Aurora 的威胁检测结合，让告警优先级可以按
              上下文排序。两笔收购的整合风险仍然实质存在：Cylance 技术必须接入 Aurora 的数据摄取
              和 AI 治理层；Cylance 原 BlackBerry 装机基础与 Arctic Wolf MDR 客户之间的重叠，也让
              商业整合更复杂。Arctic Wolf 未披露 Cylance 或 Sevco 的整合里程碑或时间表，这也符合
              公司一贯限制前瞻性运营披露的做法。
