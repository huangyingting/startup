        - label: 已评估 Arctic Wolf MDR
          value: 25000
        - label: 已签署 Arctic Wolf MDR 合同
          value: 10000
        - label: 已部署 Aurora 平台
          value: 9800
        - label: 已扩张到 2+ 个 Arctic Wolf 产品
          value: 2000
  - id: FU003
    title: 客户证明质量矩阵 – 证据类型与部署成熟度
    type: matrix
    notes: 评估 Arctic Wolf 可得客户证据的质量和成熟度。评级：高（H）、中（M）、低（L）。基于截至 2026 年 5 月对所有公开客户证据的系统审查。
