  - id: FI002
    title: 单位经济桥
    type: flow
    summary: >-
      示意单位经济如何从渠道合作伙伴获客线索，流向合同续约和毛利贡献；该流程反映 Arctic Wolf 的 100% 渠道 GTM 模式，以及嵌入式 Concierge Security Team 交付结构。可得处列示估计值；CST
      入驻标志 COGS 开始发生。
    data:
      nodes:
        - id: channel-lead
          label: 渠道合作伙伴线索生成
          description: MSSP、VAR 或 MSP 合作伙伴识别潜在客户；Arctic Wolf 提供合作伙伴赋能、联合营销和交易注册支持
        - id: qualification
          label: 技术资格筛选与演示
          description: 合作伙伴 BDR 筛选机会；Arctic Wolf SE 支持演示和价值验证；中端市场客户标识估计 CAC 为 $15K–$60K
        - id: initial-contract
          label: 初始 MDR 合同（ACV）
          description: 签署年度订阅；中端市场估计 ACV 为 $50K–$200K，企业客户为 $200K–$1M+；预先开票，形成递延收入
        - id: cst-onboarding
          label: CST 入驻（COGS 开始）
          description: Concierge Security Team 分析师分配到客户 pod；24/7/365 覆盖开始；COGS 从合同第 1 天开始发生
        - id: expansion
          label: 产品扩张（Managed Risk / ASM / IR）
          description: 增购 Managed Risk、Attack Surface Management 或 IR Retainer；估计 NRR 105–120% 的主要驱动因素
        - id: renewal
          label: 年度续约
          description: 嵌入式 CST 关系拉高切换成本，推动续约；成熟账户估计续约率 >90%
        - id: gross-margin
          label: 毛利贡献
          description: 估计混合毛利率 55–65%；CST 人力作为 COGS 约占收入 40%；基础设施约 5%
      edges:
        - from: channel-lead
          to: qualification
          label: 合作伙伴转介
        - from: qualification
          to: initial-contract
          label: 成交
        - from: initial-contract
          to: cst-onboarding
          label: 合同开始
        - from: cst-onboarding
          to: expansion
          label: 增购动作
        - from: expansion
          to: renewal
          label: 全平台续约
        - from: renewal
          to: gross-margin
          label: 毛利累积
    claimRefs:
      - CI009
      - CI010
      - CI015
      - CI016
      - CI017
      - CI018
