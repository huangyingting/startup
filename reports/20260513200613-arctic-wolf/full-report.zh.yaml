      - number: '5.5'
        title: 近期产品发布与平台演进
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 近年最重要的产品进展，是 2025 年将 Aurora Security Operations Cloud 更名并扩展为 Aurora Superintelligence
              Platform。此次重塑品牌释放了一个战略重点：用 AI 驱动自主安全运营；「Superintelligence」定位则体现了在 AI Trust Engine 治理架构下，智能体 AI 能力被整合进整个平台。


              2023 年收购 Revelstoke，实质强化了平台的自动化层。2024 年以约 $160M 收购 Cylance，加入经过验证的 AI 原生端点保护。2025 年收购 Sevco
              Security，补齐资产智能层。Arctic Wolf 的平台演进显示，公司会继续投入智能体 AI，用于自动化威胁调查、深化 Cylance 与 Aurora MDR 的整合，并把 Sevco
              资产智能扩展到整个平台。Arctic Wolf 不发布正式产品路线图；SOC 2 Type II、ISO 27001 或 FedRAMP 等产品认证也没有公开文件证明，尽管面向受监管行业销售的 MDR
              厂商通常会具备这类认证。
