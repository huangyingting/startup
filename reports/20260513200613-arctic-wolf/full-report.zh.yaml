  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与确认基础
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 的收入全部来自通过 100% 渠道伙伴生态销售的年度订阅合同。公司的产品组合分为四条彼此独立但整合的线：通过 Aurora Superintelligence Platform
              交付的托管检测与响应（MDR）、用于漏洞管理和攻击面收敛的托管风险、用于外部暴露监控的攻击面管理（ASM），以及用于泄露响应的事件响应（IR）预付服务。MDR 订阅收入占 ARR 的主导份额，估计约占总额的
              80–85%；其余来自托管风险、ASM 和 IR 预付服务。


              收入确认遵循与 ASC 606 一致的订阅模式：平台访问费和 Concierge Security Team（CST）覆盖费按合同期直线确认，合同通常为 12 个月，也可选择多年期。由于 CST
              被打包进订阅价格，而不是作为独立专业服务线销售，所有收入在确认口径上都被视为订阅 SaaS。披露的产品结构不包含永久许可证、硬件或一次性实施费。


              最近一次公开引用的 ARR 里程碑约为 $500M，来自 2022 年 11 月 SiliconAngle 的报道，该报道引用 CEO Nick Schneider，当时公司也在瞄准 2023 年
              IPO。该数字是公开来源中可获得的最后一个已确认 ARR 数据点。以 2022 年末 $500M 为基线，按保守的 30–40% CAGR 推算，FY2024 ARR 估计区间为 $650M–$900M，使
              Arctic Wolf 成为全球最大的私营 MDR 订阅业务之一。Arctic Wolf 不发布经审计财务报表，因此在 CFO 直接披露前，所有收入和收入结构数据都仍是估计。
