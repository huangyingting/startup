  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf 可触达的核心客户，是防御不足的中端市场：员工 50–5,000 人，面临企业级威胁，
              但没有预算或人才去搭建并配齐专属安全运营中心（SOC）。公司在 arcticwolf.com/customers/
              的定位确认其覆盖 30 个国家，垂直行业横跨 12 个独立细分：医疗、金融服务、法律、零售、
              汽车经销商、航空、州和地方政府、教育、制造、交通、信用合作社、体育和娱乐。

              主要买方画像是员工 200–2,000 人组织里的 CISO 或 IT 副总裁，Arctic Wolf 的 Concierge
              Security Team（CST）模式替代内部 SOC 人员。员工少于约 200 人的组织里，买方往往是 CEO
              或 CFO，他们在网络保险压力下首次投入网络安全；Arctic Wolf 通过 300+ 个保险合作伙伴
              集成触达这类客户。员工 2,000–10,000+ 人的大型企业里，Arctic Wolf 则与内部 SOC 团队并行
              或补位，重点强调 Aurora 的遥测覆盖广度和响应自动化。

              地域上，公司起家于北美，集中度也偏北美，但自 2020 年起大举进入 EMEA 和 APAC；
              arcticwolf.com 的语言选择器（EN-GB、DE、FR、EN-AU）确认其在英国、德国和澳大利亚
              有专门布局。公司概览引用的 30 国覆盖数，说明国际渗透已具规模，但公司没有披露更细的
              地区收入拆分。
