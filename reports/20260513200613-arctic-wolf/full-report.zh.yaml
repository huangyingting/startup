      - number: '4.3'
        title: 单位经济：成本结构与利润率估计
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 的 Concierge Security Team（CST）模式需要全职分析师小组分配给客户集群，提供 24/7/365 分诊、威胁狩猎和事件响应。这部分人力资本嵌入
              COGS，使其成本结构从根本上不同于纯软件 MDR 供应商。公司截至 2024 年全球约有 3,000+ 名员工；假设其中约 40–50% 与 CST 相关，则公司的 COGS 包含大量人工成本，估计占收入的
              35–45%。这意味着综合毛利率约为 55–65%——低于纯软件 MDR 竞争对手常见的 70–80%，但与 Arctic Wolf 所主张的「MDR 即托管服务」核心差异化一致。


              Aurora Superintelligence Platform 需要为数千家客户大规模采集、处理并关联遥测，基础设施成本不可忽视。不过，云基础设施成本估计占收入
              5–8%，这符合该规模云原生安全平台的常见水平。


              营运资本动态在结构上有利：年度订阅合同通常预先计费，形成递延收入余额，在服务完全交付前为运营提供资金。这降低了短期融资运营成本的需求。资本开支集中在技术基础设施和平台开发，而不是实物资产，符合轻资产 SaaS
              交付模式。


              净留存率（NRR）未披露，但估计在 105–120% 区间。CST 关系创造高切换成本，因为替换 Arctic Wolf 需要客户在内部或通过新供应商重建 24/7 分析师覆盖能力。向现有 MDR
              客户增售托管风险、ASM 和 IR 预付服务，是 NRR 超过 100% 的主要驱动因素。获客成本（CAC）被渠道模式部分抵消，因为潜客开发成本转移给了伙伴。
