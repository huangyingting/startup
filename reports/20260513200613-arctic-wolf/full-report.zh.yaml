      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 由 Brian NeSmith、Kim Tremblay、Sam McLane 和 Matthew Thurston 于 2012 年共同创立。NeSmith 担任 CEO 至约
              2021-2022 年，此前他曾任上市网络安全公司 Blue Coat Systems CEO，并在该公司任职超过十年，具备很强的上市公司履历。这段经历塑造了 Arctic Wolf
              对运营纪律和财务治理的重视，也是在为潜在 IPO 做准备。


              公司按计划完成 CEO 交接：前总裁 Nick Schneider 升任总裁兼 CEO，NeSmith 转任执行董事长。这次继任体现出管理团队在资本市场活动前的主动职业化。高管团队还包括 CFO Duston
              Williams、CMO Dan Larson，以及负责产品战略和并购整合的 CPO Dan Schiappa（曾任职 Sophos）。


              作为私营公司，Arctic Wolf 不公开披露董事会构成。管理层一直强调 Concierge 交付模式：专属 Concierge Security Team（CST）持续担任客户的安全伙伴，以此区别于商品化
              MDR 和 MSSP 产品。关键人物依赖风险集中在 Schneider（战略执行）、NeSmith（市场愿景与投资者关系）和
              Schiappa（多次收购后的平台路线图）。截至可得公开来源，尚未发现重大高管离职报道。
