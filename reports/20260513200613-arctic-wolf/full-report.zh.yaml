        - ~$88B
        - ~21x
        - ~30%
        - 最接近的纯网络安全可比公司；XDR/MDR 相邻平台；设定市场溢价底线
      - - SentinelOne (S)
        - ~$894M
        - ~$17B
        - ~17x
        - ~35%
        - IPO 规模上最直接可比；端点叠加 MDR 的覆盖模型
      - - Palo Alto Networks (PANW)
        - ~$10.6B
        - ~$115B
        - ~11x
        - ~16%
        - 成熟平台可比；主动打包 MDR，是市场风险基准
      - - Zscaler (ZS)
        - ~$2.6B
        - ~$28B
        - ~11x
        - ~23%
        - 高增长云原生安全；访问控制 TAM 不同，但倍数仍有参考意义
      - - Okta (OKTA)
        - ~$2.4B
        - ~$15B
        - ~6x
        - ~12%
        - 警示：增长受罚后的倍数展示了 ARR 增长放缓时的下行空间
      - - Cloudflare (NET)
        - ~$1.6B
        - ~$34B
        - ~22x
        - ~27%
        - 溢价增长倍数基准；网络安全相邻；上限参考
  - id: TV005
    title: 投资逻辑失效与退出触发项表
    notes: 触发阈值是基于公开竞争情报和市场倍数分析的证据化估计；精确触发条件仍需投资者判断和持续监控。
    claimRefs:
      - CV040
      - CV033
      - CV035
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Microsoft MDR 大规模打包
        - '>30% 中端市场 MDR 交易在竞争性 RFP 中纳入 Microsoft Defender Experts'
        - 核心 MDR 护城河坍塌；Arctic Wolf 价格溢价不可持续
        - 减持 / 退出；按无护城河估值框架，以 5–7x ARR 重新评估
      - - ARR 增长低于 20%
        - 已披露或可信推断的 ARR 同比增长 <20%
        - 增长故事结束；市场会重估至 5–8x；按当前标记 IPO 失败
        - 按市场价退出；不要按 2021 年水位投资
      - - 降估值融资低于 $3.5B
        - 任何融资事件定价低于 $3.5B
        - 资本效率逻辑失效；优先股堆叠很可能低于水面
        - 无论价格如何，按市场价退出
      - - 2028 年后撤回 IPO
        - 董事会正式声明撤回 IPO 计划，且没有 M&A 公告
        - 流动性事件时间线消失；老股市场成为唯一选项
        - 强制老股退出；接受账面价值折价
      - - Cylance 第 1 年 NRR 低于 80%
        - Cylance 客户 NRR 在交割 12 个月后披露或推断为 <80%
        - 收购稀释混合 ARR 增长；$160M 资本投入毁损价值
        - 要求董事会层面的战略复核；下调持仓估值
  - id: TV006
    title: 最终尽调清单表
    notes: 尽调事项来自公开来源分析发现的缺口；所有事项都需要公司数据室访问权限或管理层沟通才能解决。
    claimRefs:
      - CV042
      - CV014
      - CV015
      - CV028
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 已验证 ARR 和 NRR
        - FY2023–FY2025 按产品线拆分的实际 ARR（不是新闻稿表述）以及 NRR/GRR
        - ARR 是核心估值输入；NRR 决定收入质量和增长可持续性
        - 公司数据室 — CFO/CRO
      - - 股权结构表和清算优先权瀑布
        - 完整投资者堆叠，包括所有股份类别、清算优先权金额和反稀释条款
        - 没有这些信息，普通股和后期优先股持有人的回报模型无法完成
        - 法律尽调 — 外部律师审阅
      - - Cylance 净 ARR 贡献
        - Cylance 收购前后 ARR；首个续约周期的客户留存率
        - 判断 $160M 资本开支是否增厚价值；量化整合风险需要净 ARR
        - 管理层数据室 — CRO 访谈加整合进展更新
      - - IPO 时间线和董事会决议
        - 董事会决议或投行聘书，注明 IPO 目标日期和交易所偏好
        - 流动性时间线直接影响 IRR 模型和持有期风险评估
        - 董事会层面尽调 — 审阅投资者权利协议
      - - 单位经济（CAC 和 LTV）
        - 按渠道拆分的获客成本，以及按细分（企业、中端市场）拆分的客户终身价值
        - 验证 ARR 增长可持续性；CAC 相对 LTV 过高会提示不计代价增长风险
        - 公司数据室 — CFO/财务副总裁
