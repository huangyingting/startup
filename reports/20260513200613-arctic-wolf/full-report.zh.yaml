          description: 平台以 AI Trust Engine 重新定位；收购 Sevco Security，补强资产情报
    claimRefs:
      - CE036
      - CE037
      - CE038
      - CE039
      - CE041
      - CE042
  - id: FU001
    title: Arctic Wolf 客户旅程地图
    type: journey-map
    notes: 展示 Arctic Wolf 客户生命周期从初始认知到主动扩张的七个阶段。依据 arcticwolf.com 公布的渠道模式和客户入驻说明。
    claimRefs:
      - CU002
      - CU003
      - CU013
      - CU014
      - CU033
      - CU034
      - CU038
    data:
      items:
        - label: 认知
          description: 渠道合作伙伴或保险要求把潜在客户引向 Arctic Wolf MDR
        - label: 评估
          description: 潜在客户查看 G2 / TrustRadius、Gartner Peer Insights 和渠道合作伙伴演示
        - label: 采购
          description: 通过渠道合作伙伴签约；通常为 12 个月订阅，并可选择多年期
        - label: 入驻
          description: 部署 Aurora 传感器并分配 CST 分析师；按 G2 数据，实施约需 2 个月
        - label: 活跃使用
          description: 24×7 MDR 配专属 CST；Aurora 平台摄取遥测并产出可执行工单
        - label: 续约
          description: 渠道合作伙伴管理续约；专属 CST 关系带来高切换成本
        - label: 扩张
          description: 在既有 Aurora 传感器足迹上交叉销售 Managed Risk、CDR、SAT 或 IR Retainer
  - id: FU002
    title: Arctic Wolf 采用漏斗 – 从发现到扩张
    type: funnel
    notes: 示意漏斗基于渠道模式和公开客户数推断的转化率。并非基于公司披露的漏斗指标。数值代表估计规模比例，不代表实际转化数据。
    claimRefs:
      - CU009
      - CU010
      - CU014
      - CU015
      - CU016
      - CU038
    data:
      items:
