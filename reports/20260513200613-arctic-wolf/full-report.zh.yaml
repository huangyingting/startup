      - number: '5.3'
        title: 自研能力：AI、ML 与威胁情报
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 的自研技术能力集中在 Aurora Superintelligence Platform 的 AI 和机器学习栈。公司的 ML
              模型基于来自数千家客户的安全遥测训练，形成网络效应：所有客户中观测到的威胁信号，都会反哺每个单一客户的检测。这种威胁情报聚合，相对于独立 SIEM 部署或内部自管 SOC 环境，是结构性优势。截至 2026
              年，Arctic Wolf 尚未公布 Aurora 平台的检测率、平均响应时间（MTTR）、误报率或驻留时间基准。


              2023 年 10 月收购 Revelstoke SOAR，为 Arctic Wolf 带来约 30 名员工和专门打造的 SOAR 技术，并作为 Aurora 内的原生组件整合，而不是外接工具。2024 年 12
              月收购 Cylance，加入 AI 驱动的端点保护引擎；该引擎使用基于恶意软件样本训练的 ML 模型，通过轻量级代理和离线有效性提供执行前威胁预防。2025 年收购 Sevco
              Security，加入用于持续网络资产发现和对账的资产智能，使平台能根据资产关键性进行上下文感知的告警排序。


              Aurora Exposure Management 定位为叠加在 Tenable、Qualys 或 Rapid7 漏洞扫描器数据之上的托管服务层，而不是与它们竞争的独立工具。截至 2026 年 5
              月，公开来源未发现 Arctic Wolf Networks 为 Aurora AI 方法、AI Trust Engine 或 SOAR
              自动化能力申请专利，说明公司更依赖商业秘密保护和运营护城河，而不是专利覆盖。
