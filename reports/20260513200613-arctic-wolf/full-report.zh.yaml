  - id: FR001
    title: 风险热力图
    type: matrix
    notes: 单元格按可能性（Y 轴）和影响（X 轴）映射主要风险。风险位置基于公开证据综合分析；具体概率分数为估计。多个风险可能出现在同一单元格。
    claimRefs:
      - CR001
      - CR003
      - CR007
      - CR014
      - CR015
      - CR018
      - CR021
      - CR023
      - CR027
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 严重影响
      rows:
        - label: 高可能性
          values:
            - IPO 后准备度缺口
            - SOC 分析师人才短缺；GDPR / 州级隐私碎片化合规负担
            - 渠道合作伙伴集中风险；Microsoft Sentinel 捆绑替代
            - —
        - label: 中等可能性
          values:
            - 收入确认时点错配
            - 告警误报量；MDR ACV 承压信号
            - Cylance 集成执行失败；NRR 不透明 / 财务不透明
            - 实战攻击中 Aurora 平台漏报；HIPAA BAA 违规事件
        - label: 低可能性
          values:
            - CEO / CTO 关键人员离职
            - FTC 执法行动；未遵守 CIRCIA
            - SEC 网络安全披露规则的间接影响；Cylance 工程团队流失
            - 活跃攻击期间 Aurora 多区域故障；Arctic Wolf 供应链遭入侵
