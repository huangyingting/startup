      - number: '3.2'
        title: 第一至第二层竞争对手画像：巨头与规模整合者
        blocks:
          - type: paragraph
            body: >-
              CrowdStrike 的 Falcon Complete MDR 按品牌认知和企业交易规模看是市场领导者。其竞争优势在于与 Falcon 传感器平台深度整合，可以在没有人工延迟的情况下自动遏制威胁。但
              Falcon Complete 明确要求部署 Falcon EDR——这种结构性「围墙花园」会削弱其在平台中立买方中的竞争力，尤其是运行 SentinelOne、Microsoft Defender 或传统 AV
              的客户。CrowdStrike 2024 年 7 月全球软件更新事故（影响约 850 万台 Windows 设备）造成短期声誉损伤，并加速其在 SME 细分的一些竞争流失。Falcon Complete
              定价偏高（每端点每月 $25–45），对 500 人以下组织形成可负担性门槛。进入 2026 年，Secureworks 收购后的 Sophos MDR 是最重要的新竞争变量。Sophos
              带来规模经济（600K+ 传感器遥测管线）、Gartner MDR 最高客户满意度评分（4.8/5.0，290
              条评价），并能服务运行竞品端点平台（CrowdStrike、SentinelOne、Microsoft）的组织。在 G2 2026 年春季 MDR Grid 上，Sophos 评分高于 Arctic
              Wolf。合并实体的主要约束，是 2025–2026 年并购后整合风险，以及潜在文化 / 产品理顺带来的扰动。
