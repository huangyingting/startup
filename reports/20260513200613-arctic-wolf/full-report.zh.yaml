      - number: '6.4'
        title: 留存、耐久性与满意度
        blocks:
          - type: paragraph
            body: |
              截至 2026 年 5 月，Arctic Wolf 未在任何公开监管文件或新闻稿中披露净留存率（NRR）、
              总留存率（GRR）、流失率、队列留存或平均合同期限。公司仍为私人公司，对运营指标披露
              保留很大自由。本章所有留存估计，都来自第三方评论信号和可比 MDR 订阅业务的行业基准。

              留存耐久性最强的代理指标，是 G2 上 279 条已验证评论形成的 4.7/5 综合评分，使 Arctic Wolf
              位于 G2 MDR 类别同业的前四分之一。Gartner Peer Insights 在托管检测与响应市场授予
              Arctic Wolf “North America Customers' Choice” 称号；该认可要求达到最低已验证
              评论数量和最低综合评分门槛，是第三方对持续客户满意度的强背书。TrustRadius 上 31 条
              评论的综合评分为 9.2/10。

              跨评论平台看，正面情绪主要集中在 CST 响应速度、检测质量和集成便利性。反复出现的负面
              主题包括告警量管理、控制台可用性、以及自助式告警抑制能力有限——这些问题符合托管服务
              模式的特征，即优先保证覆盖完整性，而不是优先降噪。这些可用性缺口不意味着流失风险升高，
              但说明告警分诊流程仍有产品改进空间。

              Arctic Wolf 的订阅模式大概率默认采用年度合同，高接触的 CST 互动又给续约带来天然黏性：
              客户与专属 CST 分析师共事 12+ 个月后，切换成本很高。不过，竞争供应商（CrowdStrike
              Falcon Complete、Huntress、Expel）正主动面向 Arctic Wolf 客户群营销，尤其是借助渠道
              合作伙伴。
