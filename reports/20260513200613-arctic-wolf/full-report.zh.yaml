      - number: '5.4'
        title: 集成生态与技术伙伴
        blocks:
          - type: paragraph
            body: >
              Arctic Wolf 的开放 XDR 架构设计目标，是从广泛的第三方安全和 IT 工具体系采集遥测，让客户无需大规模替换技术即可部署。Aurora
              的集成生态至少覆盖七类：端点、云基础设施、身份提供商、网络安全、SIEM / 日志管理、工单 / 工作流，以及漏洞扫描器。


              在端点类别中，Aurora 除原生 Aurora Endpoint Security 外，也集成主流 EDR 和 EPP 厂商。云集成覆盖 AWS CloudTrail 和 GuardDuty、Microsoft
              Azure Defender for Cloud，以及 GCP Security Command Center。身份集成包括 Microsoft Active Directory、Azure AD（Entra
              ID）、Okta 和其他身份提供商。网络集成通过 syslog 和 API 连接器支持领先防火墙厂商。SIEM 集成允许使用 Splunk、IBM QRadar 或 Microsoft Sentinel
              的客户，在既有数据湖之上叠加 Arctic Wolf MDR。与 ServiceNow 和 Jira 的工单集成，让 CST 分析师能在客户原生系统中更新事件。


              Aurora Cloud Detection and Response 产品监控 AWS、Azure 和 GCP 环境中的安全威胁；公开产品页面没有逐项列出 CIS、NIST 或 PCI-DSS
              等具体支持的合规框架。集成广度让 Arctic Wolf 成为既有技术投资的增量层，降低渠道伙伴和客户的采用摩擦，并支撑公司 100% 渠道分销模式。
