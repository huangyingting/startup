      - number: '6.2'
        title: 采用轨迹与增长
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf 最近一次公开客户数，是截至 2026 年 5 月 arcticwolf.com/company/ 概览页
              提到的“全球超过 10,000 家组织”。这较 2020 年披露的 3,000 家客户、以及 2021 年新闻稿
              提到的约 6,500 家客户有大幅增长，意味着 2020–2024 年客户数复合年增长率大约为 20–30%。
              Arctic Wolf 不发布细颗粒度的年度客户数更新，因此当前 10,000+ 的数字无法独立验证，也
              无法精确定位到具体日期。

              Aurora 平台每周处理 10+ trillion 起安全事件，这一规模指标说明客户环境中的传感器部署
              覆盖面相当广。平台的 Concierge Security Team（CST）模式要求每个客户都有专门分析师
              覆盖，这对增长速度形成天然约束：公司需要按客户新增节奏招聘并培训分析师。3,000+ 名
              员工意味着 CST 人员规模可观，但不能确认每个客户对应的分析师配比。

              渠道采用已有证据支撑：arcticwolf.com/company/ 概览披露了 400+ 个渠道合作伙伴和 300+
              个保险合作伙伴集成。渠道驱动的销售会间接加速采用，合作伙伴负责筛选并签下客户；但
              它也限制了 Arctic Wolf 对下游客户使用模式的可见度。Spiceworks 和 Reddit/r/MSP 社区讨论
              确认，Arctic Wolf 是 MSP RFP 中被认可的选项，尤其适合寻求共管安全的中端市场客户。
