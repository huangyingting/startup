      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              三家独立分析机构给出了 MDR 可服务市场的区间。Mordor Intelligence（2026）估算，全球 MDR 规模 2025 年为 $4.19B，到 2031 年增至 $13.45B，CAGR
              21.45%。MarketsandMarkets（2026 年 5 月）预测，2026 年为 $6.28B，到 2031 年升至 $19.01B，CAGR 24.8%——这是最乐观的估计。Precedence
              Research 给出的基线更低：2025 年 $3.40B，到 2035 年 $13.90B，CAGR 15.12%，反映出更保守的范围定义。各估算之间的差距（2025 年
              $3.4B–$6.3B）主要来自范围分歧：部分分析师把大型企业 MXDR 合同纳入，而 Precedence 单独分类；CAGR 差异则反映了对 AI 驱动服务通缩的假设不同。Arctic Wolf
              的可服务市场（SAM）收窄到北美、欧洲和澳大利亚 / 新西兰的 SME / 中端市场客户（100–5,000 名员工）；按 Mordor 的北美 45.78% 占比和 SME 在 MDR
              支出中的比例估算，2026 年约为 $4–6B。Arctic Wolf 的可获取市场（SOM）可用其披露 ARR 倒推：按 2023 年 10 月 TechCrunch 报道的 >$200M ARR 和约
              3,000 家客户、假设平均合同额 $60–70K，公司约占 SME / 中端市场 MDR 细分的 3–5%。这些都是自下而上的估算，不确定性很高。
