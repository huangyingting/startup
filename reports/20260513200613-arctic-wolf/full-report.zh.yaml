  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，Arctic Wolf 的商业产品组合包括七条清晰的解决方案线，全部以 Aurora Superintelligence Platform
              品牌下的托管服务交付。旗舰产品托管检测与响应（MDR）提供 24x7 威胁监控、检测、调查和响应，覆盖组织的整套技术栈。MDR 自公司 2012 年创立以来就是基础服务，并贡献最大份额的年经常性收入。


              Aurora Exposure Management（前身为 Managed Risk）结合了 Aurora Vulnerability Management 和 Aurora Attack Surface
              Management。Vulnerability Management 帮助团队发现、排序并修复漏洞和配置错误；Attack Surface Management
              则在内部、外部、云和终端用户环境中持续发现资产，聚合并去重数据，形成对资产、用户、漏洞、应用和安全控制的持续更新视图。


              Cloud Detection and Response 将 MDR 能力延伸到云原生环境，监控 AWS、Azure 和 Google Cloud Platform 的配置与工作负载。Aurora
              Endpoint Security 由 2024 年 12 月以约 $160M 从 BlackBerry 收购的 Cylance AI 技术驱动，在 Aurora 内交付端点保护平台和 EDR。2023 年 10
              月收购 Revelstoke 后获得的 Aurora SOAR 支持自动化响应剧本执行。Incident Response 提供应急泄露调查，可与客户现有技术集成，无需重新换工具。2025 年收购 Sevco
              Security 后获得的 Asset Intelligence 提供持续网络资产发现和对账。
