      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              MDR 市场由四个叠加的需求驱动因素推动。第一，网络攻击复杂度升级——OT 泄露在最近一个报告周期上升 73%，勒索软件团伙越来越多使用 AI 驱动的规避工具，Cybersecurity Ventures 预计到
              2025 年网络犯罪成本每年达 $10.5T——让检测能力不成熟的组织感到强烈紧迫。第二，网络安全人才结构性短缺（全球估计 3.4M 个空缺岗位），使大多数 SME 在经济上无法自建 24×7
              SOC。第三，监管要求——欧盟 NIS2 Directive（2024 年 10 月生效）、Digital Operational Resilience Act（DORA，2025 年 1
              月生效）以及美国关键基础设施事件报告规则——正在把 MDR 从可选项推向跨境企业的准必选项。第四，网络保险生态越来越多把可证明的 MDR 控制作为承保前提，或对经验证的 MDR 部署提供最高 12.5%
              的保费折扣。采用约束同样实质存在：MDR 订阅可能消耗 SME IT 预算的 7–12%；AI 自动化让小型供应商也能匹配一线厂商的检测准确率，压缩利润率；数据驻留要求（中国 PIPL、印度
              PDPB）又迫使区域基础设施投资，增加全球规模化复杂度。Arctic Wolf 按客户数是最大的纯 MDR 供应商，这让其在威胁情报聚合上获得网络效应优势，但 AI 降低供应商进入门槛后，公司也面临利润率压力。
