  - id: TM001
    title: 市场定义表
    description: >-
      MDR and adjacent security service categories — scope, buyer type, status-quo substitute, and relevance to Arctic
      Wolf's positioning.
    notes: 覆盖并不完整；另有小众替代品。成本和人员估算是分析师中点判断，并非审计数字。
    columns:
      - 类别
      - 纳入支出
      - 排除支出
      - 主要买方 / 付款方
      - 与 Arctic Wolf 的相关性
    rows:
      - - 托管检测与响应（MDR）
        - 24×7 威胁监控、检测、调查、主动响应；覆盖端点、网络、云
        - 仅反应式告警；没有托管成分的工具许可
        - CIO / IT 负责人（SME）；CISO（企业）；IT 预算负责人
        - Arctic Wolf 核心市场；Concierge Delivery Model 完全落在 MDR 内
      - - MSSP——仅告警监控
        - 24×7 日志监控、告警分诊、工单升级
        - 主动遏制、威胁狩猎、事件响应
        - IT 负责人 / MSP 采购
        - 现状替代方案；Arctic Wolf 靠有保障的主动响应区分
      - - XDR/SIEM 平台（自运营）
        - 检测工具、分析平台、剧本自动化
        - 24×7 分析师覆盖、响应执行
        - CISO / 安全工程；需要 8–12 名内部分析师
        - 自建 vs. 购买替代；MDR 免去招聘分析师
      - - 自建内部 SOC
        - 配备专职员工的完整内部安全运营中心
        - 托管服务成分
        - CISO / CFO 共同负责；8 人分析师团队 capex + opex > $3M/年
        - SME 的主要替代方案；高成本和人才门槛推动 MDR 采用
      - - 网络保险基础监控
        - 与保单捆绑的保险公司偏好供应商监控
        - 完整 MDR 范围；超出保险公司利益的响应动作
        - CFO / 风险管理；由保险要求驱动
        - 入门级替代；监管和保险公司压力推动升级到完整 MDR
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM019
    enumerationScope:
      coverage: partial
      basis: >-
        Four distinct non-MDR service categories identified from Mordor Intelligence and MarketsandMarkets segment
        reports covering organizations with fewer than 5,000 employees; additional niche substitutes likely exist but
        are not separately quantified.
