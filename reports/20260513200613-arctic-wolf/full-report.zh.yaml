      - number: '2.3'
        title: 买方分层与支付意愿
        blocks:
          - type: paragraph
            body: >-
              MDR 买方可分为三类：SME / 中端市场（100–999 名员工）、中大型企业（1,000–5,000 名员工）和大型企业 / 受监管行业（5,000+ 名员工）。Arctic Wolf
              的「Concierge Delivery Model」明确瞄准 SME / 中端市场——这些组织没有预算或人才自建 24×7 内部 SOC，但威胁暴露和合规义务都在上升。该细分的预算负责人通常是 CIO 或 IT
              Director，CFO 批准初始支出；交易规模每年 $30K 到 $250K。中大型企业客户通常已有部分 SOC，希望用 MDR 补强；这类交易为 $100K–$500K，由 CISO
              负责。按垂直行业看，BFSI（Mordor 数据显示占 MDR 收入 28.74%）和医疗健康（CAGR
              23.60%）是支出最高的细分，驱动因素是监管要求（DORA、HIPAA、PCI-DSS）和高昂的数据泄露成本。MDR 订阅平均吃掉 SME IT 预算的 7–12%，每名员工每年
              $2,800（Coalition/Mordor 数据）；因此，靠网络保险保费最高 12.5% 的折扣来证明 ROI，成为关键销售叙事。Arctic Wolf 通过 MSSP、VAR
              和集成商优先分销，触达大量习惯通过可信 IT 服务伙伴采购的 SME 长尾买方。
