  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              托管检测与响应（MDR）指外包交付 24×7 安全运营中心能力，包括威胁监控、检测、调查和主动响应。它不同于纯托管安全服务商（MSSP）：后者通常只提供监控和告警，不保证响应；也不同于 SIEM/XDR
              平台：后者提供工具，但需要客户内部配置分析师。MDR 的替代方案包括：（1）自建内部 SOC，至少需要 8–12 名专职分析师；（2）MSSP 转发告警，由内部团队分诊；（3）独立 SIEM
              加签约专业服务；（4）网络保险强制要求的基础监控，由保险公司偏好的供应商提供。Mordor Intelligence 定义的 MDR 市场边界涵盖端点、网络、云和
              MXDR（扩展型）等以托管服务交付的形态。相邻市场包括 SIEM 市场（MarketsandMarkets 预计到 2031 年从 $8.4B 增至 $13.7B，CAGR 10.3%）、端点保护平台（EPP）和
              SOC 即服务平台。Arctic Wolf 的「Concierge Delivery Model」把它放在真正的 MDR 范畴内：在 Aurora Platform 技术之上叠加人的专业能力和 24×7 覆盖。
