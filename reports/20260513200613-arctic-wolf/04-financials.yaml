  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: unit-economics
      missingEvidence: >-
        Gross margin, NRR, GRR, CAC, LTV, and payback period are all undisclosed by Arctic Wolf.
        No cohort retention data, COGS breakdown, or unit-economics disclosure has been made public.
      whyItMatters: >-
        Unit economics determine whether the subscription model is structurally profitable at
        scale or requires continuous capital to sustain the CST headcount. A gross margin below
        55% would signal margin compression risk; NRR below 100% would indicate churn-driven decay.
      diligencePath: >-
        Request audited P&L with COGS breakdown by labor vs. infrastructure; CFO walkthrough of
        gross margin bridge by product line; cohort ARR retention report covering vintage years
        2020–2024; gross vs. net churn by customer segment.
      relatedQuestionRefs: [QI007, QI008, QI009]
      relatedTableRefs: [TI003]

    - type: enumeration-incomplete
      severity: minor
      topic: revenue-mix-and-pricing
      missingEvidence: >-
        Precise revenue mix across MDR, Managed Risk, ASM, and IR retainer is undisclosed.
        No list pricing, ACV distribution, or per-product ARR breakout has been published.
        Channel mark-up structure and actual realized pricing are not observable externally.
      whyItMatters: >-
        Revenue quality differs by stream. Low-margin or non-recurring revenue components
        would reduce ARR quality vs. pure MDR subscription ARR. ACV distribution determines
        customer concentration risk and average economics per logo.
      diligencePath: >-
        Request ARR breakdown by product line; separate MDR subscription ARR from Managed Risk
        and IR retainer ARR; request ACV histogram by customer segment and geography; obtain
        standard contract template with pricing mechanics.
      relatedQuestionRefs: []
      relatedTableRefs: [TI001, TI002]

    - type: private-evidence-only
      severity: material
      topic: capital-adequacy-and-runway
      missingEvidence: >-
        Cash position, monthly burn rate, EBITDA, and free cash flow are not publicly disclosed.
        Runway can only be estimated from Series F proceeds (2021) and benchmark burn assumptions,
        providing a low-confidence assessment. Debt repayment schedule for the Blue Owl $221M
        facility is also undisclosed.
      whyItMatters: >-
        Without cash balance and burn, runway and capital adequacy cannot be independently
        verified. The Blue Owl debt creates a defined repayment obligation that reduces free
        cash flow and increases liquidity event urgency. A cash shortfall within 12–18 months
        would require a dilutive equity raise or strategic exit.
      diligencePath: >-
        Request CFO-certified balance sheet as of December 2025; request 13-week rolling cash
        forecast and trailing 4-quarter monthly burn trend; obtain Blue Owl credit facility
        terms including interest rate, maturity, and covenant package.
      relatedQuestionRefs: [QI021, QI023]
      relatedTableRefs: [TI004]
