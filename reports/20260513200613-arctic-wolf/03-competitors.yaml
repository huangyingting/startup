  claims:
  - id: CP001
    statement: >-
      The MDR competitive landscape in 2026 comprises five tiers: platform giants
      (CrowdStrike, Microsoft, Palo Alto), scale consolidators (Sophos/Secureworks),
      pure-play MDR specialists (Rapid7, eSentire, Expel, Deepwatch), SMB-first channel
      providers (Huntress), and legacy MSSPs upgrading to MDR.
    type: inferred
    topic: competitive-landscape
    sourceRefs: [SP001, SP002, SP003, SP004, SP005, SP011, SP013]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP001]

  - id: CP002
    statement: >-
      Sophos's acquisition of Secureworks for $859 million in October 2024 created the
      single largest MDR provider by customer count, with a combined base of over
      39,000 organizations protected as of May 2026.
    type: third-party-reported
    topic: market-consolidation
    sourceRefs: [SP001, SP013, SP015]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP002, QP022]

  - id: CP003
    statement: >-
      Huntress raised $150 million in a Series C funding round in February 2024, making
      it the best-capitalized pure-play SMB MDR provider; it operates exclusively through
      MSP channel partners and targets organizations with 1–500 employees.
    type: third-party-reported
    topic: competitor-funding
    sourceRefs: [SP011, SP003]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP004]

  - id: CP004
    statement: >-
      Rapid7 (NASDAQ:RPD) serves over 11,500 customers worldwide as of 2026 and positions
      its MDR offering as "AI-powered managed cybersecurity operations" built on the
      InsightIDR platform, making it the closest publicly-listed comparable to Arctic Wolf.
    type: third-party-reported
    topic: competitor-profile
    sourceRefs: [SP005, SP017]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP005]

  - id: CP005
    statement: >-
      CrowdStrike Falcon Complete is the enterprise MDR market leader by brand recognition
      and deal size, with CrowdStrike reporting over $3.44 billion in ARR for fiscal year
      2024, though Falcon Complete as a standalone service line does not have separately
      disclosed revenue.
    type: third-party-reported
    topic: competitor-profile
    sourceRefs: [SP004, SP012, SP014]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP003]

  - id: CP006
    statement: >-
      Sophos MDR is rated 4.8/5.0 by Gartner Peer Insights customers based on 290 reviews
      as of March 2026, making it the most-reviewed MDR vendor and 2026 Gartner Customers'
      Choice — rated above CrowdStrike, SentinelOne, and Arctic Wolf on G2 Spring 2026.
    type: third-party-reported
    topic: competitor-rating
    sourceRefs: [SP001, SP009]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP002, QP022]

  - id: CP007
    statement: >-
      Sophos MDR differentiates from Arctic Wolf by operating across all endpoint vendor
      environments (including CrowdStrike Falcon, SentinelOne, Microsoft Defender) and
      by leveraging a 600,000+ sensor telemetry base — providing cross-customer threat
      intelligence at a scale Arctic Wolf cannot currently match.
    type: third-party-reported
    topic: competitor-differentiation
    sourceRefs: [SP001, SP013]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP002, QP007]

  - id: CP008
    statement: >-
      The Sophos acquisition of Secureworks introduces significant post-acquisition
      integration risk through 2025–2026, including potential product rationalization
      between the Taegis XDR platform (Secureworks) and Sophos's Intercept X EDR
      and Sophos MDR product lines.
    type: inferred
    topic: competitor-risk
    sourceRefs: [SP013, SP015, SP016]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP002]

  - id: CP009
    statement: >-
      CrowdStrike Falcon Complete requires the deployment of CrowdStrike Falcon endpoint
      sensors as a prerequisite — organizations running SentinelOne, Microsoft Defender,
      or legacy AV must replace their existing endpoint protection platform to use
      Falcon Complete, creating a significant platform-switching cost.
    type: third-party-reported
    topic: competitor-lock-in
    sourceRefs: [SP004, SP012, SP014]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP003, QP011, QP012]

  - id: CP010
    statement: >-
      CrowdStrike Falcon Complete customers rate the service highly on Gartner Peer
      Insights; however, Sophos MDR surpassed CrowdStrike in review volume (290 vs. fewer)
      and rating (4.8/5.0 vs. comparable) in the 2026 Gartner Voice of the Customer report.
    type: third-party-reported
    topic: competitor-rating
    sourceRefs: [SP009, SP010]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP003, QP027]

  - id: CP011
    statement: >-
      CrowdStrike Falcon Complete's estimated pricing ranges from $25 to $45 per endpoint
      per month for enterprise customers, creating an affordability barrier for organizations
      with fewer than 500 employees and enabling Arctic Wolf to compete on total cost
      of ownership in the SME/mid-market.
    type: estimated
    topic: competitor-pricing
    sourceRefs: [SP004, SP014]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP003, QP008]

  - id: CP012
    statement: >-
      CrowdStrike's growing Falcon sensor install base — encompassing a majority of Fortune
      500 companies — creates a structural distribution moat where future MDR upsells
      within that base require no platform migration, incrementally reducing Arctic Wolf's
      accessible market among existing CrowdStrike customers.
    type: inferred
    topic: competitive-threat
    sourceRefs: [SP004, SP014]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP012]

  - id: CP013
    statement: >-
      Dark Reading and industry analysts identified CrowdStrike's July 2024 global software
      update incident (affecting approximately 8.5 million Windows devices) as creating
      temporary competitive opportunity for platform-agnostic MDR providers including
      Arctic Wolf, with some CrowdStrike customers accelerating evaluation of alternatives.
    type: third-party-reported
    topic: competitor-adverse
    sourceRefs: [SP014, SP012]
    confidence: medium
    freshness: historical
    answersQuestionRefs: [QP016]

  - id: CP014
    statement: >-
      Rapid7 conducted significant workforce restructuring in 2023, reducing its headcount
      by approximately 18%, reflecting margin pressure in its managed services business;
      Rapid7's Q3 2024 revenue was approximately $213 million ($850M+ annualized) with
      moderating ARR growth.
    type: third-party-reported
    topic: competitor-financials
    sourceRefs: [SP005, SP017]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP005, QP023]

  - id: CP015
    statement: >-
      Huntress's MDR pricing is based on a per-endpoint monthly model, with publicly
      disclosed base pricing of approximately $7 per endpoint per month — substantially
      below Arctic Wolf's estimated $60–70K annual contract value for comparable coverage,
      positioning Huntress as the price leader in the SMB segment.
    type: third-party-reported
    topic: competitor-pricing
    sourceRefs: [SP003, SP011]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP004, QP008]

  - id: CP016
    statement: >-
      Huntress operates exclusively through MSP (Managed Service Provider) channel partners
      and does not sell directly to end customers, making its go-to-market fundamentally
      different from Arctic Wolf's hybrid direct + channel model and creating complementary
      rather than purely competitive dynamics in certain MSP partner accounts.
    type: third-party-reported
    topic: competitor-gtm
    sourceRefs: [SP003, SP011]
    confidence: high
    freshness: current
    answersQuestionRefs: [QP004, QP010]

  - id: CP017
    statement: >-
      Huntress expanded its product scope in 2024–2025 to include Identity Threat Detection
      and Response (ITDR) alongside its endpoint MDR service, directly competing with
      Arctic Wolf's identity monitoring use case and potentially capturing MDR customers
      who prioritize Active Directory and identity-layer coverage.
    type: third-party-reported
    topic: competitor-expansion
    sourceRefs: [SP003, SP011]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP025]

  - id: CP018
    statement: >-
      Rapid7's MDR service is bundled with its InsightIDR SIEM/XDR platform and is perceived
      by buyers as more tool-centric and analyst-optional compared to Arctic Wolf's
      service-first Concierge model; Rapid7's IPO timing and restructuring created
      operational distractions favorable to Arctic Wolf's competitive positioning.
    type: inferred
    topic: competitor-positioning
    sourceRefs: [SP005, SP017]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP005, QP007, QP023]

  - id: CP019
    statement: >-
      Deepwatch reports approximately 75% annual customer growth as of its public marketing
      materials and uses a "Guardian Platform" co-managed model where customers retain
      hands-on access alongside Deepwatch's analyst team — a model structurally similar
      to Arctic Wolf's Concierge approach but tilted toward larger enterprise clients.
    type: company-claimed
    topic: competitor-profile
    sourceRefs: [SP007, SP018]
    confidence: medium
    freshness: current
    answersQuestionRefs: [QP018]

  - id: CP020
    statement: >-
      eSentire MDR (private, Toronto-based, ~1,500 organizations) competes directly with
      Arctic Wolf in the 1,000–10,000 employee segment via a full-scope MDR with a
