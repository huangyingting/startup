  evidenceGaps:
    - type: missing-source
      severity: critical
      topic: nrr-grr
      missingEvidence: "Arctic Wolf has not disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), or cohort-level customer retention data in any public source. These metrics are the primary durability signals for a subscription business at this scale."
      whyItMatters: "Without NRR/GRR, the quality of Arctic Wolf's ARR cannot be assessed — high growth with poor retention creates an ARR treadmill. NRR above 110% would indicate strong expansion; below 90% would signal material churn risk."
      diligencePath: "Request CFO/CRO to provide annual NRR and GRR by segment (MDR, Managed Risk, CDR) for FY2022–FY2025; obtain cohort retention waterfall by customer vintage; ask for logo churn rate and average contract duration."
      relatedQuestionRefs: [QU003, QU004]
      relatedTableRefs: [TU004]

    - type: private-evidence-only
      severity: material
      topic: customer-concentration
      missingEvidence: "Arctic Wolf has not disclosed top-10 or top-20 customer revenue concentration. With 10,000+ customers, concentration risk is likely modest at the customer level, but channel partner concentration may create indirect revenue concentration."
      whyItMatters: "If 10–20 channel partners represent 30–50% of new customer acquisition, partner defection risk becomes a material business risk equivalent to key customer concentration at other software companies."
      diligencePath: "Request breakdown of new ARR by top-20 channel partners for FY2024; ask for top-10 customer revenue concentration as a percentage of total ARR."
      relatedQuestionRefs: [QU020]
      relatedTableRefs: [TU005]

    - type: private-evidence-only
      severity: material
      topic: expansion-arr
      missingEvidence: "Arctic Wolf does not disclose product attach rates, expansion ARR as a percentage of total ARR, or cross-sell penetration by product line. The land-and-expand potential of the Aurora platform is the key growth multiplier but is entirely unverifiable externally."
      whyItMatters: "If expansion ARR is low (<15% of total ARR), Arctic Wolf depends primarily on new logo acquisition for growth, creating higher revenue risk and implying weaker product stickiness than the multi-product platform story suggests."
      diligencePath: "Request CFO to provide net new ARR split between new logos and expansion for FY2022–FY2025; ask for attach rate of Managed Risk, CDR, and SAT on the existing MDR base."
      relatedQuestionRefs: [QU015]
      relatedTableRefs: [TU005]

    - type: missing-source
      severity: minor
      topic: named-customer-depth
      missingEvidence: "Arctic Wolf's case study library is gated behind a form, limiting independent verification of specific named customers beyond the two (QuidelOrtho and Synovus) identified through third-party media coverage. The breadth of named customers with verifiable production deployment outcomes is limited in public sources."
      whyItMatters: "Named customer depth is a key quality indicator for B2B SaaS companies; the gatedness of Arctic Wolf's case studies prevents independent assessment of customer deployment breadth and outcome specificity."
      diligencePath: "Request a list of 20–50 reference customers willing to speak to investors; obtain customer case studies including deployment scope, outcome metrics, and contract duration."
      relatedQuestionRefs: [QU005]
      relatedTableRefs: [TU003]

