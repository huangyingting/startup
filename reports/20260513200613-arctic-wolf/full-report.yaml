    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Recognition Basis
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf generates revenue exclusively through annual subscription contracts sold via its
              100% channel partner ecosystem. The company's product portfolio spans four distinct but
              integrated lines: Managed Detection and Response (MDR) delivered through the Aurora
              Superintelligence Platform, Managed Risk for vulnerability management and attack surface
              reduction, Attack Surface Management (ASM) for external exposure monitoring, and an Incident
              Response (IR) retainer product for breach response. MDR subscription revenue forms the
              dominant share of ARR, estimated at approximately 80–85% of total, with Managed Risk, ASM,
              and IR retainers comprising the balance.

              Revenue recognition follows a subscription model consistent with ASC 606: fees for platform
              access and Concierge Security Team (CST) coverage are recognized ratably over the contract
              term, typically 12 months with multi-year options available. Because the CST is bundled into
              the subscription price rather than sold as a separate professional services line, all revenue
              is treated as subscription SaaS for recognition purposes. No perpetual licenses, hardware,
              or one-time implementation fees are part of the disclosed product structure.

              The most recent publicly cited ARR milestone is approximately $500M, referenced in a November
              2022 SiliconAngle article citing CEO Nick Schneider, at which time the company was also
              targeting a 2023 IPO. That figure is the last confirmed ARR data point available from public
              sources. Applying a conservative 30–40% CAGR from the $500M late-2022 baseline yields an
              estimated FY2024 ARR range of $650M–$900M, making Arctic Wolf one of the largest private
              MDR subscription businesses globally. Arctic Wolf does not publish audited financial
              statements, so all revenue and mix figures remain estimates until direct CFO disclosure.
