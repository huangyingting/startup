      - Thesis Argument
      - Anti-Thesis Counter
      - Weight
    rows:
      - - Market Position
        - Category-defining MDR leader; 8K+ customers; SOCaaS scale with high switching cost
        - Microsoft/CrowdStrike bundle equivalent capabilities into existing enterprise agreements
        - High — core competitive risk to moat
      - - Revenue Growth
        - Record FY2024 near-double YoY growth confirms sustained MDR demand
        - No ARR/NRR disclosed; growth claim unverifiable; financial opacity creates adverse selection
        - High — primary diligence gap
      - - Valuation
        - Category leader deserves 14–16x at IPO if $500M+ ARR verified
        - 2021 $4.3B mark set at peak multiples; 30–50% compression needed at current ARR estimates
        - High — key risk for new money and Series F investors
      - - Exit Path
        - IPO window reopening in 2025–2026; MDR category supports premium listing
        - IPO deferred in 2023; extended delay increases carry costs and secondary discount
        - Medium — manageable with price discipline
      - - Cylance Acquisition
        - Adds endpoint security and 3,500+ customers; platform breadth increases switching cost
        - Cylance experienced customer attrition under BlackBerry; integration risk adds execution burden
        - Medium — execution risk within 18-month window
