          - type: callout
            title: 100% Subscription Channel Model with Embedded CST Creates Durable Recurring Revenue
            body: >
              Arctic Wolf's fully subscription-based revenue model, delivered 100% through channel partners, generates
              high-predictability ARR with structurally favorable working capital dynamics (annual upfront billing). The
              Concierge Security Team is embedded in the subscription—not sold separately—making displacement difficult
              without the customer rebuilding 24/7 analyst coverage from scratch. Estimated NRR of 105–120% suggests
              organic expansion from existing accounts via Managed Risk, ASM, and IR retainer upsells. The channel model
              also reduces direct S&M costs relative to enterprise-direct peers, improving capital efficiency. At an
              estimated $650M–$900M ARR, Arctic Wolf has reached the scale where gross margins should improve as CST
              headcount per customer cluster becomes more efficient through automation and the Aurora AI platform.
