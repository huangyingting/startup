      - number: '1.4'
        title: Milestones, Acquisitions, and Strategic Evolution
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf has evolved through five acquisitions since 2018, each representing deliberate
              steps toward a broader security operations platform. The 2018 RootSecure acquisition initiated
              managed vulnerability management. The 2022 Tetra Defense acquisition brought 100 elite
              incident response investigators and expanded the platform into forensics and breach recovery.
              The 2023 Revelstoke acquisition integrated SOAR automation capabilities natively into Aurora,
              reducing customer dependence on standalone orchestration tools. The 2024 Cylance acquisition
              from BlackBerry (approximately $160 million) added AI-powered endpoint prevention, and the
              2025 Sevco Security acquisition added asset intelligence.

              The company's growth trajectory has been validated externally: Gartner recognized Arctic Wolf
              as a Cool Vendor in June 2018, and Deloitte included the company in its Technology Fast 500
              rankings in both 2019 and 2020. The company achieved unicorn status with its 2020 Series E
              and grew from approximately 2,000 employees in 2022 to 3,300 by 2025, with customers
              expanding from 3,000+ in October 2023 to 10,000+ by September 2025.

              The repeated IPO deferrals represent an important strategic narrative: management has
              consistently prioritized scale, platform breadth, and M&A integration over capital markets
              exit, resulting in a platform company spanning detection, response, prevention, identity,
              cloud, and asset intelligence. The strategic question for any future liquidity event is
              whether the platform breadth creates durable competitive differentiation or introduces
              integration complexity risk that could weigh on EBITDA margins and valuation multiples.
