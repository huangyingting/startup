    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf Networks is a privately held cybersecurity company headquartered in Eden Prairie,
              Minnesota, founded in 2012 in Sunnyvale, California. The company provides security operations
              as a service, acting as a fully managed Security Operations Center (SOC) for organizations
              that lack the internal capacity to staff and run 24x7 threat monitoring. Its core offering,
              the Aurora Security Operations Cloud (rebranded Aurora Superintelligence Platform in 2025
              marketing), ingests security telemetry from endpoints, cloud environments, networks, and
              identity systems to detect, investigate, and respond to cyber threats.

              Arctic Wolf's business model is subscription-based managed service, positioning itself as a
              force multiplier for security teams by eliminating alert fatigue. Unlike traditional SIEMs
              that surface thousands of alerts, Arctic Wolf delivers curated, analyst-verified tickets —
              typically only one to two per week per customer — ensuring internal security staff focus only
              on confirmed threats. This operational model resonated strongly with small and mid-market
              businesses (50 to 8,000 employees), and the company has since expanded upmarket.

              The Aurora platform spans MDR (Managed Detection and Response), Managed Risk (vulnerability
              and compliance from the 2018 RootSecure acquisition), Cloud Security, Identity Security,
              Incident Readiness and Response (from the 2022 Tetra Defense acquisition), and security
              automation (from the 2023 Revelstoke SOAR acquisition). The December 2024 Cylance acquisition
              from BlackBerry added AI-powered endpoint threat prevention, and the 2025 Sevco Security
              acquisition added an asset intelligence layer. As of 2025, Arctic Wolf processes over 5
              trillion security events per week across its platform.
