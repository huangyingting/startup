  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Financing History and Valuation Context
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf Networks has raised approximately $900 million in total venture and growth
              capital across eight disclosed funding rounds from inception through its Series F, with
              the most recent primary financing being the $150 million Series F closed in July 2021 at
              a post-money valuation of $4.3 billion. That round attracted Owl Rock Capital, DTCP, and
              the CrowdStrike Falcon Fund as new investors, alongside continuing backers Lightspeed
              Venture Partners, Viking Global, D.E. Shaw, EDBI, and Teralyst — a syndicate spanning
              blue-chip growth equity and strategic cybersecurity names.

              The $4.3 billion mark was established at a cyclical peak in SaaS valuation multiples. Based
              on contextual estimates from EquityZen and CB Insights suggesting Arctic Wolf's ARR was
              approximately $150–200 million at Series F close, the implied EV/ARR multiple was 22–29x —
              consistent with 2021 peak pricing for high-growth security SaaS companies but materially
              above the 11–15x median observable in the public cybersecurity comparable set as of early
              2026. This creates a significant compression risk for investors who entered at or near the
              2021 watermark without further ARR scale verification.

              Two subsequent developments materially affect the valuation context. First, in late 2023,
              multiple credible news sources reported that Arctic Wolf deferred its previously signaled
              IPO plans, with management communicating a preference to continue scaling revenue before
              pursuing public-market liquidity. An IPO delay from a 2023–2024 target to a 2026–2027
              horizon extends the holding period for Series F investors to five to six years from close —
              compressing IRR relative to a four-year exit assumption. Second, Arctic Wolf announced the
              acquisition of Cylance from BlackBerry for $160 million in December 2024, funded through
              an undisclosed combination of cash and equity, adding approximately 3,500 endpoint security
              customers and an EDR capability to the Aurora platform.

              SEC EDGAR confirms no S-1 or draft registration statement filed by Arctic Wolf Networks
              Inc. as of May 2026, consistent with private-company status. Form D filings document
              multiple exempt Regulation D offerings from 2012 through 2021, matching the company's
              disclosed funding history. The cap table composition, liquidation preference amounts, and
              Cylance financing structure are not publicly disclosed, preventing independent return
              modeling for common and late-preferred shareholders.

              No down-round financing event or secondary sale below the $4.3 billion mark has been
              identified in public sources as of May 2026. Arctic Wolf's formal last-known private
              valuation remains $4.3 billion, though secondary markets facilitated through platforms like
              EquityZen may imply a mark-to-market discount not yet reflected in any disclosed valuation.
              EquityZen's listing of Arctic Wolf as an available pre-IPO secondary investment confirms
              private-company status and indicates institutional interest in liquidity before any formal
              public offering.
