        - ARR is the primary valuation input; NRR determines revenue quality and growth sustainability
        - Company data room — CFO/CRO
      - - Cap Table and Preference Waterfall
        - Full investor stack with all share classes, liquidation preference amounts, and anti-dilution terms
        - Return modeling for common and late-stage preferred holders cannot be completed without this
        - Legal due diligence — outside counsel review
      - - Cylance Net ARR Contribution
        - Cylance ARR pre- and post-acquisition; customer retention rate at first renewal cycle
        - Determines whether $160M capex was accretive; integration risk quantification requires net ARR
        - Management data room — CRO interview plus integration updates
      - - IPO Timeline and Board Resolution
        - Board resolution or banker engagement letter with IPO target date and exchange preference
        - Liquidity timeline directly affects IRR modeling and hold-period risk assessment
        - Board-level due diligence — investor rights agreement review
      - - Unit Economics (CAC and LTV)
        - Customer acquisition cost by channel and customer lifetime value by segment (enterprise, mid-market)
        - Validates ARR growth sustainability; high CAC relative to LTV would signal growth-at-any-cost risk
        - Company data room — CFO/VP Finance
