  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio Overview
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf's commercial product portfolio as of 2026 comprises seven distinct solution
              lines, all delivered as managed services under the Aurora Superintelligence Platform brand.
              The flagship offering, Managed Detection and Response (MDR), provides 24x7 threat monitoring,
              detection, investigation, and response across an organization's entire technology stack. MDR
              has been the company's foundational service since its 2012 founding and accounts for the
              largest share of annual recurring revenue.

              Aurora Exposure Management (formerly Managed Risk) combines Aurora Vulnerability Management
              and Aurora Attack Surface Management. Vulnerability Management helps teams discover, prioritize,
              and remediate vulnerabilities and misconfigurations, while Attack Surface Management provides
              continuous asset discovery across internal, external, cloud, and end-user environments,
              aggregating and deduplicating data to create a continuously updated view of assets, users,
              vulnerabilities, applications, and security controls.

              Cloud Detection and Response extends MDR capabilities into cloud-native environments,
              monitoring AWS, Azure, and Google Cloud Platform configurations and workloads. Aurora
              Endpoint Security, powered by Cylance AI technology acquired from BlackBerry in December 2024
              for approximately $160 million, delivers endpoint protection platform and EDR within Aurora.
              Aurora SOAR from the October 2023 Revelstoke acquisition enables automated playbook execution.
              Incident Response provides emergency breach investigation integrated with existing customer
              technology without requiring re-tooling. Asset Intelligence from the 2025 Sevco Security
              acquisition provides continuous cyber asset discovery and reconciliation.
            claimRefs:
