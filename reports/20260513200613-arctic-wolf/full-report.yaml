      - number: '3.2'
        title: 'Tier 1–2 Competitor Profiles: Giants and Scale Consolidators'
        blocks:
          - type: paragraph
            body: >-
              CrowdStrike's Falcon Complete MDR is the market leader by brand recognition and enterprise deal size. Its
              competitive advantage is deep integration with the Falcon sensor platform, enabling automated threat
              containment without human latency. However, Falcon Complete explicitly requires Falcon EDR deployment — a
              structural "walled garden" that disadvantages platform-agnostic buyers running SentinelOne, Microsoft
              Defender, or legacy AV. CrowdStrike's July 2024 global software update incident (affecting approximately
              8.5 million Windows devices) created transient reputational damage and accelerated some competitive losses
              in the SME segment. CrowdStrike's pricing is premium ($25–45/endpoint/month for Falcon Complete), creating
              an affordability barrier for sub-500-employee organizations. Sophos MDR following the Secureworks
              acquisition is the most significant new competitive variable entering 2026. Sophos brings scale economics
              (600K+ sensor telemetry pipeline), Gartner's highest customer satisfaction score in MDR (4.8/5.0, 290
              reviews), and the ability to serve organizations running competing endpoint platforms (CrowdStrike,
              SentinelOne, Microsoft). Sophos is rated higher than Arctic Wolf on G2's Spring 2026 MDR Grid. The
              combined entity's primary constraint is post-acquisition integration risk and potential culture/product
              rationalization disruption through 2025–2026.
            claimRefs:
