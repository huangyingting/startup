      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: IPO Deferral and Valuation Opacity Create Compounding Investor Liquidity Risk
            body: >
              Arctic Wolf raised $551M in its Series F and extension at a $4.3B valuation in 2021 and signaled a
              2022–2023 IPO. The IPO was subsequently deferred with no stated timeline. Meanwhile, the company has taken
              on approximately $221M in BDC debt (Blue Owl 10-Q, Q1 2026) creating ongoing interest expense and a
              defined repayment obligation. The Blue Owl equity fair value of ~$3.03B as of Q1 2026 implies flat-to-down
              valuation from the 2021 high-water mark, even as ARR has likely doubled. With 3,000+ employees holding
              equity, ongoing debt service, and no near-term liquidity event, the combination of a stalled IPO and
              opaque financials represents a material risk for secondary investors and late-vintage employees.
