      - number: '5.2'
        title: Technology Architecture and Aurora Platform
        blocks:
          - type: paragraph
            body: |
              The Aurora Superintelligence Platform (rebranded from Aurora Security Operations Cloud in
              2025) serves as the unified technical substrate underpinning all Arctic Wolf managed services.
              The platform ingests security telemetry from endpoints, cloud environments, networks, and
              identity systems, applying proprietary machine learning models and AI agents to detect,
              investigate, and respond to threats on behalf of customers.

              Arctic Wolf describes its Aurora platform as an open XDR architecture, ingesting telemetry
              from a wide variety of third-party security tools rather than requiring customers to replace
              existing technology investments. This contrasts with fully closed vendor ecosystems like
              CrowdStrike Falcon Complete, which prioritizes CrowdStrike-native telemetry, though both
              approaches offer 24x7 managed detection and response services. The Concierge Delivery Model
              provides dedicated human security analyst teams (CSTs) assigned to each customer, responding
              to threats when minutes matter. Arctic Wolf's platform is cloud-native and does not offer
              on-premises deployment; all telemetry processing occurs in Arctic Wolf's cloud data lake.

              The AI Trust Engine is a governance layer applying controls across testing, permissions,
              monitoring, logging, explainability, rollback, and human approval for high-impact AI actions.
              Each AI agent operates within clearly defined boundaries and least-privilege controls, accessing
              only data and tools required for its specific function. Customer data is logically separated
              so agents supporting one customer cannot access another customer's information. Arctic Wolf
              does not train its generative AI on customer data; relevant customer data may be used at
              invocation time to improve output quality.
