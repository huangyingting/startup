      - number: '4.2'
        title: Pricing, Packaging, and Monetization Model
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf does not publish list pricing. The company's website and partner portal confirm
              a subscription-based model but provide no price-per-endpoint, per-user, or per-tier rates.
              All commercial terms are negotiated through certified channel partners who set the
              end-customer price with a mark-up on top of their wholesale cost. This channel-exclusive
              pricing model creates significant opacity for third-party analysis.

              Industry estimates based on public MDR peer pricing, channel partner commentary, and analyst
              benchmarks place Arctic Wolf MDR pricing in the range of $8–$15 per endpoint per month for
              mid-market deployments of 250–2,500 managed endpoints. Enterprise accounts with 5,000+
              endpoints likely carry volume discounts and multi-year commitments. Annual contract values
              (ACV) for mid-market accounts are estimated at $50,000–$200,000, with enterprise accounts
              exceeding $500,000 at the largest deployments.

              The 100% channel distribution model means Arctic Wolf's list pricing is effectively the
              wholesale price paid by the partner, not the retail price charged to the end customer.
              Partners earn margin by marking up the Arctic Wolf wholesale price and adding their own
              professional services, onboarding, and management fees. This structure reduces Arctic Wolf's
              direct S&M costs, as channel partner sales teams perform most prospect education and
              qualification. However, it also limits pricing visibility and makes it difficult to track
              average realized ACV from public data. The Concierge Security Team model is fully bundled
              into the subscription—there is no separate SOC staffing line item—which simplifies pricing
              but limits upsell optionality for standalone analyst hours.

              Arctic Wolf has appeared in MSSPAlert's MSSP 250 rankings, which confirms scale relative
              to the broader managed security service provider market without disclosing specific
              revenue data.
