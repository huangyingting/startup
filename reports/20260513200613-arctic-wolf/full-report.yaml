      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf was co-founded in 2012 by Brian NeSmith, Kim Tremblay, Sam McLane, and Matthew
              Thurston. NeSmith served as CEO until around 2021-2022, bringing a strong public-company
              pedigree as the former CEO of Blue Coat Systems, a publicly traded network security company
              where he served for over a decade. This background shaped Arctic Wolf's culture of operational
              discipline and financial governance in preparation for a potential IPO.

              The company executed a planned CEO transition by promoting Nick Schneider — former President —
              to President and CEO, with NeSmith becoming Executive Chairman. This succession reflects
              deliberate professionalization of the management team ahead of capital markets activities.
              The executive team is rounded out by CFO Duston Williams, CMO Dan Larson, and CPO Dan Schiappa
              (formerly of Sophos), who oversees product strategy and M&A integration.

              As a private company, Arctic Wolf does not disclose its board composition publicly. The
              leadership team has emphasized a concierge delivery model, where dedicated Concierge Security
              Teams (CSTs) serve as ongoing security partners for customers, differentiating Arctic Wolf
              from commoditized MDR and MSSP offerings. Key-person dependency risk is concentrated in
              Schneider (strategic execution), NeSmith (market vision and investor relationships), and
              Schiappa (platform roadmap following multiple acquisitions). No material executive departures
              have been reported publicly through available sources.
