      - - Target Entry Price (new)
        - $3.0–3.5B
        - 19–30% discount to 2021 mark; compensates for multiple compression and hold-period risk
      - - Target Hold Period
        - 18–36 months
        - IPO window most likely 2026–2027 per deferred plans and market conditions; secondary exit possible sooner
  - id: TV002
    title: Thesis Anti-Thesis Table
    notes: >-
      Thesis and anti-thesis arguments derived from triangulation of public competitor data, market reports, and
      management disclosures. Weights are qualitative assessments of relevance to investment outcome.
    claimRefs:
