    title: Thesis-Break and Kill Triggers Table
    notes: >-
      Trigger thresholds are evidence-informed estimates based on public competitive intelligence and market-multiple
      analysis; exact trigger conditions require investor judgment and ongoing monitoring.
    claimRefs:
      - CV040
      - CV033
      - CV035
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Microsoft MDR bundle at volume
        - '>30% mid-market MDR deals include Microsoft Defender Experts in competitive RFPs'
        - Core MDR moat collapses; Arctic Wolf pricing premium unsustainable
        - Reduce/exit; reassess at 5–7x ARR with no-moat valuation framework
      - - ARR growth below 20%
        - Disclosed or credibly inferred YoY ARR growth <20%
        - Growth story ends; market will re-rate to 5–8x; IPO at current mark fails
        - Exit at market; do not invest at 2021 watermark
      - - Down-round below $3.5B
        - Any financing event priced below $3.5B
        - Capital efficiency thesis fails; preferred stack likely under water
        - Exit at market regardless of price
      - - IPO withdrawn beyond 2028
        - Official Board statement withdrawing IPO plans without M&A announcement
        - Liquidity event horizon removed; secondary market only option
        - Force secondary exit; accept discount to book value
      - - Cylance NRR below 80% in Year 1
        - Cylance customer NRR disclosed or inferred <80% twelve months post-close
        - Acquisition dilutes blended ARR growth; $160M capital deployment destroys value
        - Request strategic review at board level; mark down position
