      - number: '5.4'
        title: Integration Ecosystem and Technology Partnerships
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf's open XDR architecture is designed to ingest telemetry from a broad ecosystem
              of third-party security and IT tools, allowing deployment into existing customer environments
              without significant technology displacement. Aurora's integration ecosystem spans at least
              seven categories: endpoints, cloud infrastructure, identity providers, network security,
              SIEM/log management, ticketing/workflow, and vulnerability scanners.

              In the endpoint category, Aurora integrates with major EDR and EPP vendors alongside native
              Aurora Endpoint Security. Cloud integrations span AWS CloudTrail and GuardDuty, Microsoft
              Azure Defender for Cloud, and GCP Security Command Center. Identity integrations include
              Microsoft Active Directory, Azure AD (Entra ID), Okta, and other identity providers.
              Network integrations support leading firewall vendors through syslog and API connectors.
              SIEM integrations allow customers with Splunk, IBM QRadar, or Microsoft Sentinel to layer
              Arctic Wolf MDR on top of existing data lakes. Ticketing integrations with ServiceNow and
              Jira enable CST analysts to update incidents in customer-native systems.

              The Aurora Cloud Detection and Response product monitors AWS, Azure, and GCP environments
              for security threats; specific supported compliance frameworks such as CIS, NIST, or PCI-DSS
              are not individually itemized in public product pages. The integration breadth positions
              Arctic Wolf as additive to existing technology investments, reducing adoption friction for
              channel partners and customers and supporting the company's 100% channel distribution model.
