      - number: '4.5'
        title: Financial Trajectory and Evidence Gaps
        blocks:
          - type: paragraph
            body: |
              Arctic Wolf's publicly available financial milestones allow construction of a high-level
              ARR trajectory. The $500M ARR milestone cited in November 2022 is the most recent confirmed
              data point. At that stage, the company was targeting a 2023 IPO, which was subsequently
              deferred. CEO Nick Schneider stated to SC World in 2023 that the company had no specific
              IPO timeline, stepping back from earlier public statements. As of May 2026, no S-1 or
              Form D filing indicating an imminent public offering has been identified.

              Arctic Wolf serves 5,000+ customers globally per its press materials, and with an estimated
              average contract value of $100,000–$150,000, this customer count would support an ARR in
              the $500M–$750M range. The trajectory from this customer count to a higher ARR requires
              either more customers or higher ACV—both are possible given product expansion into Managed
              Risk and ASM, but neither is independently verifiable.

              The combination of 3,000+ employees, $221M in BDC debt, $900M+ in total equity raised,
              and a deferred IPO creates compounding liquidity pressure. Employees holding equity awards
              have been waiting for a liquidity event since the company first approached unicorn status
              in 2019–2020. Secondary market transactions may be occurring but are not publicly disclosed.

              The material evidence gaps for full financial underwriting of Arctic Wolf are: (1) audited
              financial statements (GAAP revenue, gross margin, EBITDA, cash flow); (2) NRR and logo
              churn by vintage cohort; (3) ACV distribution by segment and geography; (4) cash position
              and monthly burn rate as of 2025–2026; and (5) the company's internal roadmap for achieving
              profitability or executing a liquidity event. All of these require direct management
              disclosure in a formal data room process.
