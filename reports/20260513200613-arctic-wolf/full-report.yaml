              - CV034
              - CV035
              - CV036
      - number: '8.5'
        title: Scenario Analysis, Exit Readiness, and Recommendation
        blocks:
          - type: paragraph
            body: |
              Three scenarios frame the investment return distribution. The bull case assumes Arctic
              Wolf IPOs in late 2025 or 2026 with verified ARR of $550 million or more and 35%+ YoY
              growth, achieving a 14–16x EV/ARR multiple consistent with CrowdStrike and Cloudflare
              comps. This implies a valuation of $7.7–8.8 billion — approximately an 80–105% return
              on the 2021 Series F mark. This scenario requires favorable IPO market conditions and
              a verified premium growth profile; probability is estimated at approximately 25%.

              The base case assumes an IPO in 2026–2027 with verified ARR of approximately $500 million
              and 25–30% YoY growth, achieving a 9–12x multiple consistent with Zscaler and Palo Alto
              comps at similar growth profiles. This produces a $4.5–6.0 billion valuation and a
              5–40% return on the Series F mark — modestly positive for existing investors but
              insufficient to compensate new investors entering at the $4.3 billion level without a
              price concession. Probability is approximately 50%.

              The bear case assumes IPO is delayed beyond 2027 or proceeds with ARR of $400 million and
              sub-20% growth, resulting in a 6–8x multiple producing a $2.4–3.2 billion valuation — a
              26–44% loss on the $4.3 billion Series F mark. This scenario is triggered by competitive
              compression from Microsoft bundles, IPO window closure, or NRR deterioration below 100%.
              Probability is approximately 25%.

              Thesis-break triggers requiring immediate position exit include: MDR revenue growth
              confirmed below 20% YoY; Microsoft or CrowdStrike releasing bundled MDR at sub-$8/seat
              pricing; a confirmed down-round below $3.5 billion; or IPO registration withdrawn past
              2028 without a strategic-buyer announcement. Cylance net retention below 80% in year
              one post-acquisition is a material watch trigger.

              The evidence-supported recommendation is a conditional cautious hold for existing investors
              at the $4.3 billion mark, with new investment rational only at an entry price of $3.0–3.5
              billion — a 19–30% discount that compensates for multiple compression from 2021 peak
              pricing and extended hold-period risk. Before any investment decision, the five critical
              diligence asks are: verified ARR and NRR (FY2023–FY2025), full cap table and liquidation
              preference waterfall, Cylance net ARR contribution at first renewal cycle, IPO timeline
              board resolution or banker engagement, and unit economics (CAC and LTV by segment).
            claimRefs:
