      - number: '2.3'
        title: Buyer Segmentation and Willingness to Pay
        blocks:
          - type: paragraph
            body: >-
              The MDR buyer landscape divides into three primary segments: SME/mid-market (100–999 employees),
              mid-to-large enterprise (1,000–5,000 employees), and large enterprise/regulated (5,000+ employees). Arctic
              Wolf's "Concierge Delivery Model" explicitly targets the SME/ mid-market cohort — organizations that lack
              the budget or talent to build a 24×7 in-house SOC but face rising threat exposure and compliance
              obligations. The budget owner in this segment is typically the CIO or IT Director, with the CFO approving
              initial spend; deal sizes range from $30K to $250K annually. Mid-to-large enterprise buyers, often with a
              partial SOC, seek MDR augmentation; these deals run $100K–$500K with CISO ownership. Vertically, BFSI
              (28.74% of MDR revenue, Mordor) and healthcare (23.60% CAGR) are the highest-spending segments, driven by
              regulatory mandates (DORA, HIPAA, PCI-DSS) and high breach costs. MDR subscriptions cost SMEs an average
              of 7–12% of IT budgets and $2,800 per employee annually (Coalition/Mordor data), making cost justification
              via cyber-insurance premium discounts of up to 12.5% a key ROI narrative. Arctic Wolf's channel-first
              distribution through MSSPs, VARs, and integrators expands its reach into the long tail of SME buyers who
              procure through trusted IT service partners.
