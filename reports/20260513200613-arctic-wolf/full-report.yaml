      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The MDR market is propelled by four compounding demand drivers. First, escalating cyber-attack
              sophistication — OT breaches rose 73% in the last reporting cycle, ransomware groups increasingly use
              AI-powered evasion tools, and cybercrime costs are forecast at $10.5T annually by 2025 (Cybersecurity
              Ventures) — creates acute urgency among organizations without mature detection capabilities. Second, a
              structural cybersecurity talent shortage (estimated 3.4M open positions globally) makes insourced 24×7 SOC
              operations economically infeasible for most SMEs. Third, regulatory mandates — the EU's NIS2 Directive
              (effective October 2024), the Digital Operational Resilience Act (DORA, effective January 2025), and US
              critical-infrastructure incident reporting rules — are converting MDR from optional to quasi-mandatory for
              cross-border enterprises. Fourth, cyber-insurance ecosystems increasingly require demonstrable MDR
              controls as a prerequisite for coverage or offer premium discounts of up to 12.5% for verified MDR
              deployments. Adoption constraints are also material: MDR subscriptions can consume 7–12% of SME IT
              budgets; AI-driven automation is enabling smaller providers to match tier-one detection accuracy,
              compressing margin; and data residency mandates (China PIPL, India PDPB) force regional infrastructure
              investment that complicates global scale. Arctic Wolf's position as the largest pure-play MDR provider by
              customer count gives it network-effect advantages in threat intelligence aggregation but exposes it to
              margin pressure as AI lowers provider entry barriers.
