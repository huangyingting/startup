      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >-
              Three independent analyst estimates bracket the MDR addressable market. Mordor Intelligence (2026) sized
              global MDR at $4.19B in 2025, growing to $13.45B by 2031 at a 21.45% CAGR. MarketsandMarkets (May 2026)
              projected $6.28B in 2026 rising to $19.01B by 2031 at 24.8% CAGR — the most bullish estimate. Precedence
              Research set a lower baseline at $3.40B in 2025 and $13.90B by 2035 at 15.12% CAGR, reflecting a more
              conservative scope definition. The spread across estimates ($3.4B–$6.3B in 2025) stems primarily from
              scope disagreements: some analysts include large-enterprise MXDR contracts that Precedence classifies
              separately, and CAGR differences reflect divergent assumptions about AI-enabled service deflation. Arctic
              Wolf's serviceable addressable market (SAM) narrows to the SME/mid-market segment (100–5,000 employees) in
              North America, Europe, and Australia/NZ — estimated at roughly $4–6B by 2026 based on Mordor's 45.78%
              North America share and SME proportion of MDR spend. Arctic Wolf's serviceable obtainable market (SOM) can
              be triangulated from its own disclosed ARR: with >$200M ARR (TechCrunch, October 2023) and roughly 3,000
              customers, it holds approximately 3–5% of the SME/mid-market MDR segment, assuming $60–70K average
              contract value. These are bottom-up estimates with high uncertainty.
