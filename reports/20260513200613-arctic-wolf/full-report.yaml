  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >-
              Managed Detection and Response (MDR) is the outsourced delivery of a 24×7 security operations center
              capability including threat monitoring, detection, investigation, and active response. It is distinct from
              pure Managed Security Services Providers (MSSPs) which typically offer monitoring and alerting without
              guaranteed response, and from SIEM/XDR platforms which provide tooling but require internal analyst
              staffing. The substitutes for MDR include: (1) in-house SOC build requiring 8–12 dedicated analysts
              minimum; (2) MSSP alert-forwarding with internal triage; (3) standalone SIEM with contracted professional
              services; and (4) cyber-insurance-mandated basic monitoring via insurance-preferred vendors. The MDR
              market boundary defined by Mordor Intelligence covers endpoint, network, cloud, and MXDR (eXtended)
              variants delivered as managed services. Adjacent markets include the SIEM market ($8.4B → $13.7B by 2031
              at 10.3% CAGR per MarketsandMarkets), endpoint protection platforms (EPP), and SOC-as-a-service platforms.
              Arctic Wolf's "Concierge Delivery Model" positions it within MDR proper, layering human expertise and 24×7
              coverage on top of its Aurora Platform technology.
