      - number: '4.4'
        title: Capital Structure, Debt Obligations, and Runway
        blocks:
          - type: paragraph
            body: |
              The most significant independent data point on Arctic Wolf's capital structure comes from
              Blue Owl Technology Finance Corp.'s Form 10-Q filed with the SEC for the period ending
              March 31, 2026. This Business Development Company (BDC) filing reports Arctic Wolf Networks
              as a portfolio company with a combined face-value debt position of approximately $221 million
              and an equity/warrant fair value position of approximately $3.03 billion. The $3.03 billion
              fair value figure is Blue Owl's mark-to-market estimate as of Q1 2026 and represents the
              most recent independent third-party valuation anchor for Arctic Wolf, closely approximating
              the $4.3 billion post-money valuation from the July 2021 Series F.

              The Series F financing history is documented across multiple press releases and news sources.
              Arctic Wolf raised $150 million in its initial Series F round in July 2021 at a $4.3 billion
              post-money valuation, led by Owl Rock Capital (now Blue Owl Capital) with participation from
              Viking Global Investors and others. In December 2021, the company raised an additional $401
              million in a Series F extension, bringing total Series F proceeds to approximately $551
              million. At the time of the December 2021 extension, the company indicated it was considering
              an IPO as a path toward liquidity. Total disclosed equity capital raised across all rounds
              since 2014 exceeds $900 million.

              The $221 million in Blue Owl debt represents structured credit from a BDC—a financing
              mechanism common for late-stage, pre-IPO private technology companies that have exhausted
              or supplemented traditional VC rounds. BDC debt typically carries interest rates of
              approximately 10–14% and has defined maturity schedules; the specific terms of Arctic Wolf's
              facility are not publicly disclosed. The presence of this debt creates ongoing interest
              expense that reduces free cash flow and increases the urgency of a liquidity event.

              Cash position, monthly burn rate, and EBITDA are not publicly disclosed. Arctic Wolf's
              Cylance acquisition from BlackBerry for approximately $160 million in early 2024 demonstrates
              continued M&A capacity. Total capital adequacy appears sufficient for a 24–36 month
              operational runway based on extrapolated ARR and burn estimates, but this assessment carries
              significant uncertainty given the absence of audited financial data.
