      - number: '8.2'
        title: Public Comparables and Market Multiples
        blocks:
          - type: paragraph
            body: |
              The public cybersecurity comparable set provides the primary multiple anchor for Arctic
              Wolf's valuation since no comparable private MDR/SOCaaS transactions at the $300–600 million
              ARR scale are accessible from public sources. Six companies are selected based on ARR scale,
              revenue growth profile, and product proximity to Arctic Wolf's managed security operations
              platform: CrowdStrike, SentinelOne, Palo Alto Networks, Zscaler, Okta, and Cloudflare.

              CrowdStrike (CRWD) represents the most direct comparable as a pure-play cybersecurity
              platform with XDR and MDR capabilities. It reported approximately $4.24 billion in ending
              ARR as of Q4 FY2025 with approximately 30% YoY growth, and trades at roughly 20–22x forward
              ARR with a market capitalization exceeding $88 billion — establishing the premium floor for
              a category-defining cybersecurity platform. SentinelOne (S) is the most directly comparable
              on a size-stage basis, having reported approximately $894 million in ARR as of Q4 FY2025 with
              approximately 35% YoY growth and trading at 16–18x forward ARR at a $17 billion market cap.
              At Series F, Arctic Wolf's scale and growth stage most closely resembled SentinelOne's
              profile at IPO — making SentinelOne the reference anchor for Arctic Wolf's IPO pricing.

              Palo Alto Networks (PANW) and Zscaler (ZS) trade at 10–12x forward ARR, reflecting more
              mature growth profiles at 16% and 23% YoY respectively. Okta (OKTA) has compressed to 5–7x
              forward ARR as its growth rate fell below 15% — a direct illustration of the multiple
              punishment applied when security SaaS companies decelerate. Cloudflare (NET) achieves 20–22x
              at 27% ARR growth, setting the upper-band premium multiple benchmark.

              CB Insights' 2023 cybersecurity unicorn analysis documents 30–50% multiple compression from
              2021 peak levels across the sector, which directly discounts Arctic Wolf's $4.3 billion 2021
              watermark. The current sector median EV/ARR multiple of 11–15x for companies with 20–35%
              ARR growth — versus the 22–29x Arctic Wolf commanded at Series F — implies a 40–50% multiple
              contraction that Arctic Wolf must offset through demonstrated revenue scale to maintain its
              prior mark. Cybersecurity Ventures' market analysis and Crunchbase News coverage confirm
              sustained investor interest in MDR category leaders crossing the $500 million ARR milestone,
              frequently cited as an IPO-readiness signal for security platforms.
