  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The MDR competitive landscape in 2026 comprises five tiers. Tier 1 (Platform Giants): CrowdStrike ($3.44B+
              ARR, NASDAQ:CRWD) dominates enterprise MDR via its Falcon Complete service, which requires CrowdStrike
              Falcon endpoint sensors — a significant advantage among existing Falcon customers but a barrier for
              platform-agnostic deals. Microsoft (via Defender for Endpoint + Sentinel) and Palo Alto Networks (XSIAM)
              compete as bundled alternatives. Tier 2 (Scale Consolidators): The October 2024 Sophos acquisition of
              Secureworks ($859M) created the single largest MDR provider by customer count — 39,000+ organizations as
              of May 2026, with Gartner Peer Insights 2026 Customers' Choice recognition and a 4.8/5.0 rating from 290
              reviews. Tier 3 (Pure-Play MDR Specialists): Rapid7 (NASDAQ:RPD, 11,500+ customers) competes through its
              InsightIDR platform and managed operations. eSentire (private, Toronto-based) and Expel (private, founded
              by ex-Mandiant executives) target mid-market and cloud-native buyers respectively. Deepwatch targets
              enterprise clients via a co-managed "Guardian Platform" model. Tier 4 (SMB/MSP-First MDR): Huntress ($150M
              Series C raised February 2024, SMB-focused) competes directly in Arctic Wolf's core 1–500 employee segment
              via an MSP-channel-only model at notably lower per-endpoint pricing. Tier 5 (Legacy MSSP Upgrades):
              Traditional MSSPs (Alert Logic, Trustwave, Optiv) are incrementally adding MDR capabilities but lack 24×7
              active response SLAs and dedicated customer teams. Arctic Wolf's primary addressable battleground is Tiers
              3 and 4 for net-new SME/mid-market wins, and Tiers 1–2 where buyers consider platform consolidation.
            claimRefs:
