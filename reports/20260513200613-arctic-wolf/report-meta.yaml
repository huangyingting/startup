companyProfile:
  summary: "Arctic Wolf Networks is a private cybersecurity company founded in 2012 that offers Security Operations as a Service through its Aurora platform. The company provides managed detection and response (MDR), managed risk, cloud security, identity security, and incident response to mid-market and enterprise organizations. Arctic Wolf has raised $499M in venture capital and $401M in debt financing, with its last known valuation at $4.3B in July 2021. The company has made five strategic acquisitions since 2018—most recently Cylance from BlackBerry for ~$160M in December 2024 and Sevco Security in 2025—to expand its product portfolio and strengthen its Aurora Superintelligence Platform."
