summary:
  headline: >-
    WHOOP enters 2026 with credible IPO optionality, 103% bookings growth, and a $10.1B valuation that is rich but
    defensible against the closest private comparable (Oura) and anchored by positive free cash flow.
  overallScore: 6.8
