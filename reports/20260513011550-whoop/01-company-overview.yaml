company:
  name: WHOOP
chapter:
  number: 1
  title: Company Overview
  summary: >
    WHOOP is a Boston-based subscription wearable company founded in 2012 that bundles
    continuous health and fitness tracking hardware with a recurring membership. Its March 2026
    Series G raised $575 million at a $10.1 billion valuation, following $1.1 billion in
    bookings at 103% YoY growth; the company has 2.5 million+ members, is operating
    cash-flow positive, and is actively preparing for a potential IPO, while navigating
    an active FDA regulatory dispute over its Blood Pressure Insights feature.

sections:
  - id: identity-and-business-model
    title: Company Identity and Business Model
    body: >
      WHOOP, Inc. is an American consumer health and performance wearable company
      headquartered at One Kenmore Square, Suite 601, Boston, Massachusetts 02215. Founded
      in 2012 at the Harvard Innovation Labs by Will Ahmed, John Capodilupo, and Aurelian
      Nicolae, WHOOP designs screenless wrist-worn biosensors that continuously track
      physiological signals including heart rate variability, respiratory rate, sleep
      architecture, and cardiovascular strain. The company's central innovation is
      translating raw biometrics into three proprietary scores—Recovery, Strain, and
      Sleep—delivered through a mobile coaching application.

      WHOOP operates exclusively through a subscription-based hardware-as-a-service model.
      Customers pay for an annual or monthly membership rather than purchasing hardware
      outright; the wearable device is bundled with the subscription. As of May 2025, WHOOP
      offers three tiers: WHOOP One at $199 per year, WHOOP Peak at $239 per year, and
      WHOOP Life at $359 per year, with each tier unlocking progressively more advanced
      health features. The WHOOP Life tier includes the WHOOP MG device with medical-grade
      ECG and blood pressure capabilities. This model drives predictable recurring revenue and
      creates durable subscriber retention incentives since members who upgrade hardware can
      continue their existing membership.

      WHOOP's product positioning has evolved from athlete performance optimization toward
      a broader personal health and longevity platform. The May 2025 launch of WHOOP 5.0 and
      WHOOP MG introduced Healthspan with WHOOP Age (physiological age calculation using nine
      biomarkers developed with the Buck Institute for Research on Aging), Heart Screener with
      FDA-cleared ECG, and Blood Pressure Insights. The company ships to 56 countries, operates
      its app in six languages, and distributes through major retailers including Amazon, Best
      Buy, and Dick's Sporting Goods in the United States. A B2B platform, WHOOP Unite, serves
      corporate wellness programs and healthcare organizations as a secondary revenue stream
      alongside the primary consumer subscription.
    claimRefs: [CO001, CO003, CO004, CO005, CO015, CO016, CO017, CO031, CO040]
    tableRefs: [TO001]
    figureRefs: [FO002, FO003]

  - id: founders-leadership-governance
    title: Founders, Leadership, and Governance
    body: >
      WHOOP was conceived by Will Ahmed while he served as captain of the Harvard University
      squash team, where he experienced chronic overtraining and found no consumer technology
      adequate to track physiological recovery. Ahmed, who concentrated in economics and
      government at Harvard (A.B. 2012), developed the concept at the Harvard Innovation Labs
      alongside John Capodilupo and Aurelian Nicolae, both of whom contributed engineering
      and data science foundations. Ahmed has served as Chief Executive Officer since
      inception, making him one of the longest-tenured founder-CEOs in consumer health
      technology; his role in setting company direction, managing investor relations, and
      serving as public spokesperson creates material key-person concentration.

      The current leadership team reflects a combination of founding continuity and
      professional management scale-up. Aurelian Nicolae remains as Chief Hardware Engineer,
      retaining deep hardware IP ownership. Professional executives appointed more recently
      include Jaime Waydo (CTO), Michener Chandlee (CFO), and Garrett Bastable (COO). In
      September 2025, WHOOP added Johan Liden as Chief Creative Officer—Liden co-founded
      industrial design firm Aruliden and has shaped WHOOP's product identity since 2013 as a
      board member and external collaborator—and Jason Lynch as Chief Administrative Officer
      and Chief Legal Officer, who comes from Foundry Group where he served as General Counsel.
      Emily Capodilupo serves as SVP of Data Science and Research, and Kristen Holmes leads as
      Global Head of Human Performance and Principal Scientist.

      Board representation includes Will Ahmed, Kristin Bannon, Eric Liaw, Chris Moody, and
      Johan Liden. The board composition does not include representatives from the two largest
      institutional investors (SoftBank and Collaborative Fund), creating governance risk in
      that investor representation and oversight may not be fully transparent. No major
      C-suite departures have been publicly reported through the date of this analysis, and
      WHOOP maintains an extremely selective hiring process with an acceptance rate of
      approximately 0.13%, reinforcing cultural cohesion.
    claimRefs: [CO002, CO021, CO022, CO023, CO024, CO025, CO032, CO033, CO036]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-history-capital
    title: Funding History and Capital Structure
    body: >
      WHOOP has raised approximately $979 million to $1.376 billion in total funding across
      eleven or more rounds from its Seed in July 2013 through the Series G closed on March
      31, 2026. The funding history reflects a steady escalation in valuation from an
      undisclosed seed stage through unicorn status at $1.2 billion in October 2020 (Series E)
      to the current $10.1 billion post-money valuation. The most recent round—$575 million
      in Series G—was led by Collaborative Fund and included notable strategic investors:
      Abbott (a major medical device manufacturer) and Mayo Clinic (a flagship health system),
      both of which signal WHOOP's ambition to enter clinical and reimbursed healthcare
      channels. Sovereign wealth funds Qatar Investment Authority and Mubadala Investment
      Company (UAE) provide international expansion capital and GCC market access.

      Athlete and celebrity investors participate both as financial backers and brand
      ambassadors. Cristiano Ronaldo, LeBron James, Rory McIlroy, Reggie Miller, and Virgil
      van Dijk each participated in the Series G. This network serves dual purposes: authentic
      endorsement for the brand in elite athletic circles and potential distribution in
      global sports markets. Prior prominent investors include SoftBank Vision Fund 2 (lead
      on the $200 million Series F at $3.6 billion valuation in August 2021), IVP (multi-round
      investor from Series C through Series G), and Foundry Group.

      The Series G was announced alongside strong financial metrics: $1.1 billion bookings run
      rate at year-end 2025 (up 103% year-over-year), operating cash-flow positivity, and
      more than 2.5 million members. CEO Will Ahmed told TechCrunch the company is doing
      "a lot of the no-regrets work to be a public company," signaling IPO preparation without
      committing to a timeline. Bloomberg reported the raise is occurring ahead of a likely
      IPO. Total capital is earmarked for U.S. growth, talent, international expansion across
      Europe, GCC, Latin America, and Asia, and continued R&D investment.
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011, CO012, CO013, CO037, CO038]
    tableRefs: [TO003]
    figureRefs: []

  - id: scale-milestones-risk-events
    title: Scale, Milestones, and Risk Events
    body: >
      WHOOP's growth trajectory since founding in 2012 has followed a pattern of iterative
      hardware launches paired with financing milestones. The company shipped WHOOP 1.0 in
      2015 and has since progressed through multiple hardware generations to WHOOP 4.0 in
      2021 and the current WHOOP 5.0 and WHOOP MG platform launched in May 2025. As of March
      2026, WHOOP has surpassed 2.5 million members worldwide and employs approximately 1,300
      or more people, with plans to add more than 600 additional roles in 2026. The company
      had a $1.1 billion bookings run rate at year-end 2025 and was operating cash-flow
      positive, demonstrating that the subscription model has reached a scale where hardware
      unit economics are no longer a drag on cash generation.

      Key milestone events include the Advanced Labs launch in late 2025, which introduced
      blood biomarker testing integrated into the WHOOP platform, and WHOOP Physician
      Services, P.C. being selected into the CMS Innovation Center ACCESS program (eCKM
      track), enabling Medicare beneficiary access to WHOOP's platform through a reimbursed
      care pathway expected to launch July 2026. These two developments mark WHOOP's first
      substantive entries into clinical and payor channels.

      Risk events requiring diligence attention include: (1) the FDA warning letter issued
      July 14, 2025 to CEO Will Ahmed, citing Blood Pressure Insights as an unapproved
      medical device being marketed without clearance—WHOOP has contested this characterization,
      argued the 21st Century Cures Act wellness software exemption applies, and has continued
      marketing the feature as of May 2026, risking regulatory penalty including seizure or
      injunction; (2) active litigation against Polar (filed October 2025, alleging design
      trade dress infringement of WHOOP's band design) and a preliminary injunction secured
      against Shenzhen Lexqi Electronic Technology in February 2026 for distributing a
      lookalike tracker; (3) key-person concentration risk in CEO Will Ahmed, who founded the
      company, built its investor network, and serves as its primary public face and
      spokesperson. Governance disclosures are limited given WHOOP's private status and absence
      of public financial filings, leaving some board composition and equity structure details
      unverifiable through public sources.
    claimRefs: [CO014, CO016, CO019, CO020, CO026, CO027, CO028, CO029, CO030, CO034, CO035, CO039]
    tableRefs: [TO004]
    figureRefs: [FO001]

