      - number: '6.5'
        title: 扩张路径与集中度风险
        blocks:
          - type: paragraph
            body: >
              WHOOP 的先落地再扩张路径横跨四个维度：（1）从 One → Peak → Life 的档位增购（每名订阅者每年增加 $40–$160 收入）；（2）增购服务，包括 WHOOP Labs
              血液生物标志物检测组合（每次抽血 $100–$50）和 WHOOP MG 硬件升级；（3）通过 WHOOP Unite 向受雇于 WHOOP Unite 客户的个人会员做企业交叉销售；（4）通过 REST API
              扩大开发者生态。


              个人会员层面的客户集中度风险较低：没有单个消费者订阅者构成实质收入占比。企业层面，WHOOP 披露 200+
              组织客户，行业分布也较广（体育、医疗、企业），说明单一客户集中风险有限；不过公司尚未发布企业收入拆分或前五大客户占比。


              关键扩张摩擦包括：（1）休闲健身用户抗拒订阅价格，不愿在没有智能手表功能的情况下支付 $199+/年；（2）WHOOP MG Blood Pressure Insights 的 FDA
              警告信尚未解决，医疗企业交易的采购复杂度更高；（3）开发者 API 生态受开发者数量未披露、且没有正式市场限制；（4）HSA/FSA 资格（2025 年 11 月启用）降低但未消除美国健康计划会员的购买摩擦。
