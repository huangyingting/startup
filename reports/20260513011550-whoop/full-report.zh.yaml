chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              WHOOP, Inc. 是一家美国消费健康与运动表现可穿戴公司，总部位于 One Kenmore Square, Suite 601, Boston, Massachusetts 02215。 公司 2012
              年由 Will Ahmed、John Capodilupo 和 Aurelian Nicolae 在 Harvard Innovation Labs 创立。WHOOP 设计无屏幕腕戴式生物传感器，
              持续追踪心率变异性、呼吸率、睡眠结构和心血管负荷等生理信号。公司的核心创新，是把原始生物指标转成 Recovery、Strain 和 Sleep 三个自研评分，并通过移动教练 App 交付给用户。

              WHOOP 完全采用订阅制硬件即服务模式。客户支付年度或月度会员费，而不是一次性买断硬件；可穿戴设备随订阅打包。到 2025 年 5 月，WHOOP 提供三档：WHOOP One 每年 $199、WHOOP
              Peak 每年 $239、WHOOP Life 每年 $359，越高档解锁越高级的健康功能。WHOOP Life 档包含 WHOOP MG 设备，具备医疗级 ECG
              和血压能力。这一模式带来可预测的经常性收入，也强化订阅留存：会员升级硬件后仍可沿用原有会员资格。

              WHOOP 的产品定位已从运动员表现优化，转向更宽的个人健康与长寿平台。2025 年 5 月发布的 WHOOP 5.0 和 WHOOP MG 引入了 Healthspan with WHOOP Age（使用
              Buck Institute for Research on Aging 开发的九项生物标志物计算生理年龄）、带有获 FDA 许可的 ECG 的 Heart Screener，以及 Blood Pressure
              Insights。公司向 56 个国家发货，App 支持六种语言，并通过美国 Amazon、Best Buy、Dick's Sporting Goods 等主要零售商分销。B2B 平台 WHOOP Unite
              服务企业健康福利项目和医疗机构，是核心消费者订阅之外的第二条收入线。
