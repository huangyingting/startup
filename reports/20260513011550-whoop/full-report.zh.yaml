      - number: '1.4'
        title: 规模、里程碑与风险事件
        blocks:
          - type: paragraph
            body: >
              WHOOP 自 2012 年创办以来，增长路径一直是硬件迭代发布与融资里程碑相互推进。公司 2015 年交付 WHOOP 1.0，随后经历多代硬件，2021 年推出 WHOOP 4.0， 2025 年 5
              月推出当前的 WHOOP 5.0 和 WHOOP MG 平台。截至 2026 年 3 月，WHOOP 全球会员超过 2.5M，员工约 1,300 人或更多，并计划在 2026 年新增 600 多个岗位。公司
              2025 年底预订额运行率达 $1.1B，经营现金流为正，说明订阅模式已经达到规模：硬件单位经济不再拖累现金生成。

              关键里程碑包括 2025 年末推出 Advanced Labs，将血液生物标志物检测接入 WHOOP 平台；以及 WHOOP Physician Services, P.C. 入选 CMS Innovation
              Center ACCESS program（eCKM track），让 Medicare 受益人可通过预计 2026 年 7 月上线的报销护理路径使用 WHOOP 平台。这两个进展是 WHOOP
              首次实质性进入临床和支付方渠道。

              需要尽调关注的风险事件包括：（1）FDA 于 2025 年 7 月 14 日向 CEO Will Ahmed 发出警告信，称 Blood Pressure Insights
              是未经批准却在未获许可情况下营销的医疗器械——WHOOP 已反驳这一认定，主张 21st Century Cures Act 的健康软件豁免适用，并截至 2026 年 5
              月仍在营销该功能，因此面临扣押或禁令等监管处罚风险；（2）针对 Polar 的在审诉讼（2025 年 10 月起诉，称其侵犯 WHOOP 手环设计的商业外观）以及 2026 年 2 月针对 Shenzhen
              Lexqi Electronic Technology 取得的初步禁令， 后者涉及分销相似外观追踪器；（3）CEO Will Ahmed
              的关键人物集中风险，他创办公司、搭建投资人网络，并担任主要公众形象和发言人。WHOOP 仍为私营公司，缺乏公开财务文件，治理披露有限，因此部分董事会构成和股权结构细节无法通过公开来源核验。
