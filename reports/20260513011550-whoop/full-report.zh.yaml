      - number: '6.4'
        title: 留存、粘性与满意度
        blocks:
          - type: paragraph
            body: >
              WHOOP 的留存受益于结构性锁定：会员连续日常佩戴 WHOOP 12 个月以上后，会积累个性化生物识别基线（HRV
              趋势、睡眠模式、负荷历史），竞争平台很难复制。除功能满意度外，这种纵向数据依赖是关键留存驱动。WHOOP 的 2025 Year in Review
              确认会员在所有指标类别上的参与度都在加深，与订阅基础成熟后留存改善的判断一致。


              据报道年流失率为 16–24%，意味着 12 个月总留存率为 76–84%，符合面向高参与细分人群的高价消费订阅服务特征。Comparably NPS 为 31，正向但不突出；作为参照，同一平台上 Apple
              Watch 的 NPS 为 46，Fitbit 为 -35。男性与女性 NPS 差距显著（男性 NPS 0，女性 NPS 34），值得产品设计关注：女性用户满意度明显更高，说明参与模式不同，或未满足预期更少。


              净留存率（NRR）未公开披露。WHOOP 的档位升级经济性（One → Peak → Life）和增购服务（WHOOP Labs、WHOOP MG）提供扩张收入路径，但没有公开实证增购率或 NRR 数据。2025
              年 WHOOP 5.0 升级争议带来有记录的客户不满，是一次性留存逆风；它对全年流失率的影响尚未确认。
