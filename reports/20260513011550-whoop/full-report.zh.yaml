      - number: '4.2'
        title: 单位经济与成本结构
        blocks:
          - type: paragraph
            body: |
              WHOOP 的单位经济围绕订阅优先模式搭建，硬件承担亏损引流品或盈亏平衡的会员获客机制。设备 COGS
              估计为每台 $47–$62（2025 年估计，未计关税影响），反映中国合同制造，主要组件包括光学传感器、
              电池和触觉马达。2025 年扩大后的 Section 301 中国关税，估计使 COGS 增加 6–9%，折合每台
              $5–12 增量成本；这些成本要么压缩毛利，要么需要提高零售价。2025 年 7 月 14 日收到的 FDA
              警告信涉及 Blood Pressure Insights，给区分高端 Life 档的功能带来财务不确定性；补救成本和
              潜在功能撤回可能压低 Life 档转化。

              整体业务毛利率估计约为 38%（FY2025），受订阅软件毛利（约 70%+）拉高，也被硬件 COGS 和
              实体物流拉低。跨档混合 ARPU 估计约为每年 $250，其中 Life 档（$359/年）对每位会员毛利贡献
              不成比例地更高。年度会员流失率估计为 16–24%；WHOOP 声称，WHOOP Coach 参与度可衡量地把流失率
              拉向该区间低端，因为它提高了 App 内每日习惯形成。按 $250 ARPU 和 20% 中点流失率计算，预期会员生命周期
              约 5 年，估计总 LTV 约为每位会员 $590–$900，取决于档位组合和附加服务渗透。

              目标 CAC 回本周期低于 18 个月，意味着每个获客会员的 CAC 上限约为 $250–$375（一年订阅毛利按
              38% 毛利率约为 $95；18 个月回本意味着 CAC ≤ $142）。实际中，WHOOP 的精英运动员营销、社交媒体
              大使模式和企业打包获客，可能使混合 CAC 低于 $200。在该水平下，按毛利口径计算的 LTV/CAC
              超过 3:1，处于订阅硬件业务可接受范围内，但低于纯 SaaS 常见的 5:1+。
