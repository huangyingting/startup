      - number: '8.5'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              WHOOP 最可能的退出路径是 2027 年 IPO，CEO Will Ahmed 明确称 Series G 后的「下一步」就是 IPO。数字健康 IPO 窗口在 2025 年重新打开，Hinge Health
              完成 $437M IPO，Omada Health 也上市；预计 2026–2027 年，对具备盈利路径且 ARR 超过 $1B 的平台，条件仍会温和有利。第二退出路径是由 Abbott Laboratories
              战略收购，这呼应 Dexcom 2024 年投资 Oura 并演化为 CGM 产品合作的路径。Abbott 可能给出 $10.5–13.5B（较 Series G 溢价 5–25%），但相对 IPO
              乐观情景会稀释回报。承诺投资前的最终尽调问题包括：GAAP 收入与预订额调节（IPO 建模的关键）、按会员队列拆分的净留存率（未公开披露）、股权结构表瀑布和优先权条款、按硬件与订阅拆分的毛利率，以及
              Abbott/Mayo 集成路线图。在 S-1 提交前，GAAP 收入缺口是投资案例中最大的单一信息风险，因为估值溢价依赖于证明经常性订阅经济性，而不是硬件收入带来的 GAAP 波动数字。
