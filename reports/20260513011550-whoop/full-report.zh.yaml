      - number: '3.3'
        title: 功能与定价战场
        blocks:
          - type: paragraph
            body: >
              WHOOP 的定价模式在结构上不同：硬件打包进会员，消除了前置资本支出，但也带来更高的持续支出。按每年 $199–$359 计算，WHOOP 三年总成本为 $597–$1,077； 对关注总成本的用户来说，相比
              Oura Ring 的 $559（三年）和 Garmin 的 $649 一次性购买并不占优。对企业或 HSA/FSA 覆盖买方，WHOOP 订阅具备税收优势（自 2025 年 11 月起符合资格）。Apple
              Watch 一次性 $399–$799、无订阅，仍是在规模上进入健康追踪功能最容易的入口。


              功能差异是多维的。WHOOP 5.0 提供无需处方的最深恢复和 Strain 分析。WHOOP MG 增加 ECG 和血压趋势，去竞争 Apple Watch 的临床功能。Oura Ring Gen 4
              因基于手指的 PPG，在夜间睡眠准确性上领先。Garmin 在 GPS 广度和续航上领先。Apple Watch 与 iPhone 和 iOS 健康生态整合最佳。Samsung 的 BIA
              身体成分传感在一线竞争对手中独特。WHOOP 唯一独占的能力组合，是无屏幕形态 + 每日 Strain 教练 + Recovery 评分；没有同等竞争对手默认同时提供这三项。


              最常驱动 WHOOP 用户流失的功能缺口是没有 GPS。想要集成跑步 / 骑行路线分析的用户，必须带手机，或转向 Garmin、Apple Watch。这一结构性限制影响了 WHOOP 对 15–20%
              用户的吸引力；这些用户使用可穿戴设备主要为了户外运动表现，而不是恢复优化。续航是第二个缺口：WHOOP 5.0 续航 4–5 天，落后于 Oura Ring 4（5–8 天），两者也都落后于 Garmin
              在长时间国际旅行中的 7–31 天优势。
