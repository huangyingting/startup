  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品功能集与差异化
        blocks:
          - type: paragraph
            body: >
              WHOOP 只通过年度订阅交付两条硬件线：WHOOP 5.0 和 WHOOP MG。WHOOP 5.0 面向普通健康管理和运动表现优化市场，采用无屏形态，电池续航 14
              天，传感器阵列包括多波长光电容积描记（PPG）、SpO2、3 轴加速度计、陀螺仪和皮肤温度传感器。WHOOP MG 进一步加入医疗级 ECG（已获 FDA 许可）、Blood Pressure
              Insights（受 2025 年 7 月 FDA 警告信影响）以及更高保真的传感器，用于采集心血管生物标志物。


              软件平台产出三项核心指标：Recovery Score（0–100，基于 HRV、静息心率、睡眠质量和呼吸频率衡量每日准备度）、Strain Score（0–21，衡量心血管负荷）和 Sleep
              Performance（达到睡眠需求的百分比）。WHOOP 5.0 与 2025 年夏季更新推出的新功能包括 WHOOP Coach AI（由 LLM 驱动的个性化行为建议）、Healthspan
              长寿评分（生物年龄估算）以及 WHOOP Labs/Advanced Labs（远程血液生物标志物检测组合，首次抽血 $100，复测 $50；自 2025 年 11 月起可用 HSA/FSA 支付）。


              WHOOP Unite 是企业 B2B 门户，把平台能力延伸到 200+ 组织客户，提供汇总健康仪表盘、团队级指标和面向管理者的工具。developer.whoop.com 上的开发者 API（OAuth2
              REST）让第三方应用访问恢复、睡眠、负荷、训练和身体测量数据；社区构建的 Python 与 .NET SDK 已在公共包注册表上发布。
