      - number: '5.3'
        title: 构建、运营与规模化
        blocks:
          - type: paragraph
            body: >
              WHOOP 正处在显著工程扩张期：公司宣布 2026 年新增 600+ 名员工，约等于员工数增加 75%，其中软件、硬件和临床工程岗位是招聘重点。2026 年 3 月的 Series
              G（$575M）明确用于产品开发和全球平台建设。


              技术债信号不重，但确实存在。睡眠分期算法在 2025 年 2 月做过一次重大更新，分类准确率提升 7%，说明公司在迭代模型，而不是推倒重建。Blood Pressure Insights 收到 FDA
              警告信，意味着至少一项由 ML 推导的临床声明在监管许可前就已上线；产品开发速度和监管严谨性之间的取舍值得关注。


              WHOOP 发货到 56 个国家，支持 6 种语言本地化，意味着基础设施分布更广，也带来数据驻留义务。2025 年 7 月的 Snowflake 合作说明数据分析能力至少部分外包，而非完全内建；这对成长阶段
              SaaS 很常见，但会引入平台依赖风险。除开发者 API 文档外，WHOOP 没有公开工程博客或开源贡献，外界难以判断工程文化和技术深度。
            claimRefs: []
      - number: '5.4'
        title: 信任、质量与合规
        blocks:
          - type: paragraph
            body: >
              WHOOP 的信任与合规表现参差。正面看，WHOOP MG 的 ECG 功能已获 FDA 许可，WHOOP 声称数据基础设施符合 HIPAA，并与 Central Queensland
              University、University of Arizona 推进临床验证合作。2025 年一次睡眠分期更新经多导睡眠图对比验证，阶段分类准确率提升 7%，睡眠 / 清醒检测提升 3%。公开临床基准显示，相对
              PSG 金标准，睡眠期间心率准确率为 99.7%，HRV 准确率为 99%。


              谨慎看，2025 年 7 月 FDA 警告信指出 WHOOP MG 的 Blood Pressure Insights 功能构成未经授权的医疗器械声明。睡眠分期准确率虽在消费级可穿戴设备中靠前，但与 PSG
              的一致性只是中等（Cohen's kappa ~0.47）：浅睡 58%、深睡 62%、REM 睡眠 66%、清醒期 56% 被正确分类。WHOOP 的 HIPAA 合规声明尚未被公开独立审计确认；SOC 2
              认证状态未披露。WHOOP 5.0 和 WHOOP MG 均已确认取得欧盟市场 CE 标志。


              数据权利：WHOOP 隐私政策称用户拥有自己的生物识别数据，并通过开发者 API 支持数据可携带。可是，WHOOP 将汇总匿名会员数据用于研究或商业用途的变现程度并未公开细说，留下同意授权和商业化残余风险。
