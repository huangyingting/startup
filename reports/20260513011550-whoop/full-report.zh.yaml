companyProfile:
  summary: >
    WHOOP 是一家位于 Boston 的消费健康科技公司，打造以订阅为核心、无屏幕的可穿戴平台，持续监测生理数据。WHOOP 4.0 手环实时追踪 Strain、Recovery、睡眠质量和心血管指标，并通过配套 App 提供 AI
    教练。WHOOP 靠硬件 + 软件会员模式变现（$239–$359/年）， 带来较强净留存率（NRR），企业渠道 WHOOP Unite 也在增长。截至 2026 年 3 月，公司以 $10.1B 估值完成 $575M Series
    G， 拥有 2.5M+ 活跃会员，估计年化预订额达 $1.1B，并首次实现正自由现金流。
