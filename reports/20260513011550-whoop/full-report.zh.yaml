      - number: '8.2'
        title: 估值语境与入场纪律
        blocks:
          - type: paragraph
            body: >
              WHOOP 2026 年 3 月 Series G 的投后估值为 $10.1B，约为 2025 年 $1.1B 预订额运行率的 9.2×。2021 年 Series F 给 WHOOP 估值
              $3.6B；Series G 代表五年升值 2.8×，同期公司达到正现金流（2025）和国际规模（60 个国家贡献 60% 收入）等资本效率里程碑。累计融资超过 $1.38B，意味着清算优先权悬置会相对
              $10.1B 头条估值削弱普通股上行空间。优先股堆叠——近期轮次通常为 1× 非参与型清算优先权——意味着普通股股东只能在高级优先股补足后获得剩余价值。入场纪律要求：（a）IPO 定价前建立预订额到 GAAP
              收入的桥；（b）通过 S-1 招股说明书核实股权结构表瀑布和优先权条款；（c）按 $4–6B 悲观情景 20% 概率来决定仓位。按当前私募市场可比公司看，Series G 估值似乎合理（Oura 按 2025E
              收入 11× 估值 $11B），但相对公开硬件 / 订阅可比公司 4.6–5.6× 收入区间（Dexcom、Garmin）仍有明显溢价。
            claimRefs:
              - CV001
              - CV002
              - CV003
