              WHOOP 预订额同比增长 103%，远高于健身追踪器整体 17% 的行业 CAGR，确认高端经常性订阅细分市场显著跑赢整体可穿戴市场。公司在 2.5M+ 会员基础上实现 $1.1B 运行率，意味着有效混合
              ARPU 约 $440——显著高于市场单台设备平均售价——验证了即便缺少硬件毛利，订阅经济也能支撑高端单位经济。
