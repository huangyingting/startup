      - number: '3.2'
        title: 直接与邻近竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Oura Ring（Gen 4）是与 WHOOP 结构最相近的竞争对手。两者都通过自研算法提供恢复教练，都 24/7 佩戴，都无屏幕，也都要求订阅才能访问完整分析。Oura 在 2025 年 10 月完成
              $900M Series E 后估值达 $11B，确认投资人相信高端恢复可穿戴品类可以同时容纳多家大公司。Oura 收入从 $235M（2023）翻倍至 $500M+（2024），CEO Tom Hale 预计
              2026 年达到 $1.5B——这条轨迹可能在 18 个月内超过 WHOOP 约 $1.1B 的预订额运行率。Oura 的戒指形态因运动伪影更少，带来更好的夜间生物信号质量， 但限制了实时运动追踪的广度。


              Apple Watch（Series 10 和 Ultra 2）是最大的生态威胁。凭借约 29% 的全球智能手表份额、超过 200M 台设备的装机基础，以及持续扩展的健康功能（VO2
              max、ECG、血氧、碰撞检测）， Apple 不收单独订阅溢价，也在不断缩小健康追踪差距。Garmin（Forerunner 965、Fenix 8）用 GPS 优先设备、Body Battery
              恢复评分、7–31 天电池续航和一次性购买定价来瞄准耐力运动员。 Samsung Galaxy Watch（Watch 7 和 Ultra）加入身体成分测量（BIA）、双频 GPS 和最长 100
              小时续航，主要在 Android 生态竞争。Fitbit 目前下滑（2025 年收入下降 15.3% 至 $770M），服务大众健康市场；它的战略价值在于作为 Google
              可穿戴数据管道，为未来平台打法提供入口。Polar Vantage V3 面向耐力运动员（跑步功率、HRV），一次性售价 $499，无订阅。
