  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              WHOOP 最尖锐的近期风险，是 2025 年 7 月 14 日 FDA 警告信。该信依据 FDA 新的「固有用途」理论，认定 WHOOP MG 上的 Blood Pressure
              Insights（BPI）是未获许可的医疗器械。不同于传统基于意图的监管，FDA 认为血压估算「与低血压和高血压诊断具有固有关联」，无论 WHOOP
              作何健康免责声明；该信五次使用这一表述，史无前例地偏离基于声明的预期用途框架。FDA 的执法工具箱包括扣押、禁令、民事罚款、同意令和刑事起诉。WHOOP CEO Will Ahmed 一天内在 LinkedIn
              回应，称 FDA「方向错了」，随后上 CNBC Squawk Box 和 Bloomberg TV 为 BPI 辩护；这种对抗姿态抬高了升级风险。Apple 为高血压通知功能取得 510(k) 许可；WHOOP
              既没有走许可路径，也没有走健康功能重述路径。FDA 警告信催化了消费者集体诉讼（Rowe v. WHOOP, 3:25-cv-09910 N.D. Cal., Nov 2025），指控其在 California
              UCL/FAL/CLRA 下使用「医疗级」营销声明。


              另外三起法律行动并行推进：Sanderson v. WHOOP（加州自动续费披露违规，Judge Breyer 于 2025 年 3 月认证为集体诉讼）、Lomeli v. WHOOP（通过嵌入式 Segment
              分析追踪器分享数据，涉及 VPPA/CMIA，2025 年 8 月提起）以及 Omni MedSci v. WHOOP（7 项光学传感器专利，故意侵权；D. Del. 法院 2025 年 2
              月驳回部分撤诉动议）。FTC 于 2026 年 3 月成立 Healthcare Task Force，拥有 HBNR 民事罚款权限，最高可达每项违规每天
              $44,000，直接适用于健身追踪器数据泄露。欧盟方面，GDPR 将生物识别和健康数据列为需要明确同意的「特殊类别」数据；截至 2025 年底，GDPR 累计罚款超过 €5.5 billion，2026 年新的
              EDPB 程序规则正在加快跨境执法时间线。
