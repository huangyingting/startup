      - number: '5.2'
        title: 架构与技术运营
        blocks:
          - type: paragraph
            body: >
              WHOOP 的技术栈分为六层：传感器硬件（WHOOP 设备）、设备固件（嵌入式 RTOS、Bluetooth LE / ANT+ 无线）、云端数据摄取（Snowflake 合作，2025 年 7 月宣布）、ML
              算法引擎（Recovery、Strain、睡眠分期、HRV 分析、Healthspan 的自研模型）、应用层（iOS/Android 原生应用加 WHOOP Web）以及开发者 / 企业 API
              层（REST、OAuth2）。


              数据从设备通过 Bluetooth LE 同步（或通过 ANT+ 与健身房设备配对）进入移动应用，再进入 WHOOP 云端管线；云端对原始生物识别时间序列提取特征并推理。公开披露称 Snowflake
              数据平台合作提供实时分析和大规模数据处理；除此之外，内部 ML 工具未公开说明。WHOOP
              的开发者平台（developer.whoop.com）开放五类数据范围：cycles、sleep、workouts、recovery 和 body measurements，全部通过标准 OAuth2
              授权码流程访问，并支持 PKCE。Terra API 等第三方集成中介让消费应用无需直接 API 凭证也能拉取 WHOOP 数据。


              基础设施依赖包括：Snowflake（数据平台）、Apple 与 Google 应用商店（移动分发）、亚洲合同制造商（硬件生产）以及主要云厂商（推测为 AWS/GCP；未公开披露）。WHOOP 的设备固件和 ML
              算法均为自研闭源；只有 REST API 层有公开文档。
