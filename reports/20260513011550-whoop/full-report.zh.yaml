      - number: '8.4'
        title: 可比估值组
        blocks:
          - type: paragraph
            body: >
              公开硬件订阅可比公司为底部估值锚定。Garmin（GRMN）在 $7.5B 收入、59% 毛利率下交易于 5.6× EV/revenue 和 19.2× EV/EBITDA，是 WHOOP
              在稳定状态下希望成为的盈利、多元化样板。Dexcom（DXCM）在类似 SaaS 的 CGM 经常性收入下交易于 4.6× EV/revenue 和 14×
              EV/EBITDA，展示健康订阅在规模化后能获得的估值。Peloton（PTON）在 2.8M 订阅者下滑时仅为 1× price/sales，提供悲观底部情景：一个受欢迎品牌失去增长叙事后，从 >$50B
              坍缩到 $2.5B。私募可比公司中，Oura Ring 按 $500M 2024 收入估值 $11B（11× 远期）是最接近的单一基准，不过 Oura 的硬件占比更高，戒指形态也不同于 WHOOP
              的腕戴、订阅优先模式。Noom（$3.66B / 3.7× ARR）和 Calm（$2.0B / 3.4× ARR）框定消费健康订阅底部。SaaS Capital 2025 年运行率 ARR 中位数 7× 与
              Aventis Advisors 硬件 M&A 的 EV/revenue 中位数 1.4× 共同框定区间：WHOOP 的 9.2× 高于两者，增长速度能解释这点，但在利率上行环境中容易被压缩。
