  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              WHOOP 的客户基础分为三大核心群体。消费端个人会员是最大群体：追求运动表现的运动员、竞技型业余爱好者、军人，以及用 WHOOP 做日常恢复、睡眠优化和 HRV 跟踪的生物黑客式健康消费者。该群体贡献约
              85–90% 的订阅收入。通过 WHOOP Unite 进入的企业 / B2B 客户覆盖 200+ 组织，包括 NFL 和 NBA 职业运动队、医疗系统，以及 Hitachi Vantara
              等企业健康项目。B2B 开发者和研究用户通过开发者 API 使用 WHOOP 平台，服务临床研究和健康应用集成。


              从地域看，截至 2026 年，WHOOP 发货到 56 个国家，支持英语、西班牙语、法语、德语、葡萄牙语和意大利语。美国估计是主要市场（约占会员 60%），欧洲和亚太则靠 CE 标志和区域营销投入增长。WHOOP
              的高端订阅价格（$199–$359/年）把会员基础集中在可支配收入高于平均、健身参与度强的家庭；这自然限制了可触达订阅人群的天花板，但支撑较高 ARPU 和品牌溢价。


              Cristiano Ronaldo、LeBron James、Patrick Mahomes、Michael Phelps、Rory McIlroy 和 Tiger Woods
              等运动员大使兼具真实品牌倡导者角色，他们公开分享自己的生物识别数据，形成社会证明飞轮，推动自然获客。
