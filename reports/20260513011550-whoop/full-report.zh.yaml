      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              WHOOP
              的买方覆盖三个结构上不同的群体，各自的预算归属、采用路径和支付意愿都不同。第一类也是最早的群体，是精英和认真训练的运动人群——职业体育队、大学项目和投入度高的业余运动员，他们优先看重恢复优化和表现分析。
              这一群体支付意愿强、价格敏感度低，并能接触机构预算（体育队可能把会员费纳入训练项目）。WHOOP 历史运动员阵容覆盖 NFL、NBA、PGA 和国际足球的职业队； 与 Buck Institute
              的合作也增强了它在运动医学上的可信度。

              第二类、也是最可扩展的群体，是注重健康的主流消费者：25–50 岁成年人，主动管理睡眠、压力和健身，但不一定参加有组织的竞技体育。WHOOP 2025 年产品更新以及转向「长寿」叙事（WHOOP
              Age、Healthspan）明确瞄准这一群体。该买方用个人可支配收入支付；自 2025 年 11 月起具备 HSA/FSA 资格后，部分支出开始通过雇主资助的健康福利账户流转，
              购买路径被部分机构化。按应用划分，跑步 / 运动类别约占健身追踪器市场份额的 43%，其余分散在睡眠追踪、压力监测和一般健康管理。

              第三类是企业和雇主健康福利，由 WHOOP Unite 服务。截至 2025 年，已有超过 200 家组织加入，包括 Fortune 500 公司、医疗系统（NHS）、高等教育机构（Boston College）
              和联邦政府机构（US National Forest Service）。B2B 买方是 HR、福利或职业健康高管；预算来自企业健康福利支出。企业定价为定制化，并打包分析看板、管理工具和教练服务。 B2B
              与消费者收入的准确拆分尚未公开，但该群体提供了长期结构性机会：进入不依赖个人消费者可支配支出的预算池。

              正在出现的第四类群体，是医疗系统和临床合作伙伴，由 WHOOP MG 以及 Abbott、Mayo Clinic 的 Series G 投资激活。该群体包括远程患者监测、临床试验招募和预防性护理项目；
              具体声称需要 FDA 许可或 510(k) 路径，因此既是机会，也是采用门槛。参与 CMS Innovation Center ACCESS program，显示机构医疗买方已经开始早期验证。
