  - id: TV006
    title: 最终尽调问题清单
    description: >-
      Critical information gaps that must be resolved before IPO commitment, with why each matters and the diligence
      path.
    notes: 事项按对估值的重要性排序；S-1 申报会解决大部分事项，但部分需要 IPO 前接触权限。
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - GAAP 收入与订单额调节
        - WHOOP 未公开披露 GAAP 损益表；$1.1B 是订单额，不是 ARR
        - 订单额到 ARR 的桥接决定真实 EV/收入倍数；差距可能让表观规模减半
        - S-1 财务报表；IPO 前 CFO 提供的机密桥接表
      - - 按群组拆分的净收入留存（NRR）
        - 未公开披露 NRR 或基于金额的留存指标
        - NRR >110% 可支撑 SaaS 溢价；NRR <95% 则指向商品化订阅
        - 群组级留存数据；借移动归因做第三方分析交叉核验
      - - 股权结构表与优先权层级
        - 累计融资 $1.38B+；Series G 优先股条款未披露
        - 清算优先权压力会压低普通股在低于 $10.1B 标称退出估值中的分成
        - 股权结构表；经律师获取 Series G 公司注册证书
      - - 按分部拆分的毛利率
        - 硬件与订阅毛利率未公开分拆；综合估算 45–55%
        - 订阅占比提升支撑毛利率扩张叙事；必须剥离硬件拖累
        - S-1 分部披露；申报后投资者日材料
      - - Abbott 与 Mayo Clinic 集成路线图
        - 战略投资已确认；产品集成时间表未披露
        - Abbott Lingo 与 WHOOP 的 CGM 集成可能把 ARPU 提高 $100–200/yr
        - 合作协议摘要；与 WHOOP 管理层核验产品路线图
      - - FDA 510(k) 管线与监管姿态
        - ECG 已获准；BPI 已解决；血糖 / CGM 路径未披露
        - 临床功能管线天花板决定长期 ARPU 和可防守护城河
        - WHOOP 监管事务团队；检索 FDA 510(k) 数据库；监管律师审阅
