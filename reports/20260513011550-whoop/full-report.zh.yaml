  - id: FR001
    title: 风险热力图
    description: 二维热力图，按可能性（行）和影响（列）绘制 WHOOP 的关键风险。
    claimRefs:
      - CR001
      - CR009
      - CR010
      - CR016
      - CR030
    sourceRefs:
      - SR001
      - SR009
      - SR012
      - SR019
      - SR020
    notes: 风险位置是分析师基于截至 2026 年 5 月可得证据的定性评估。概率估计并不精确。
    coverage: partial
    type: matrix
    data:
      columns:
        - label: 低影响
        - label: 中等影响
        - label: 高 / 关键影响
      rows:
        - label: 高可能性
          values:
            - 高端定价下的订阅流失
            - FTC HBNR 执法（Lomeli 触发）
            - FDA BPI 争议升级为执法
        - label: 中等可能性
          values:
            - GDPR 第 9 条执法行动（欧盟）
            - Omni MedSci 专利赔偿 / 规避设计
            - 供应链中断 / 关税飙升
        - label: 低可能性
          values:
            - IPO 失败或取消
            - 关键人物离任（Will Ahmed）
            - 专利和解 >$50M，迫使设计变更
