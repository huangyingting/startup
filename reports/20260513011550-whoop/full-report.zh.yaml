        - WHOOP 被勒令下架 BPI、ECG 或未来 CGM 功能
        - 核心差异化被拿掉；医疗级档位 ARPU 压缩 25–40%
        - 全仓退出；投资逻辑结构性破裂
      - - 订阅用户下滑
        - IPO 前任一财年末会员数 <2.2M
        - 增长叙事失效；Peloton 式重估情景启动
        - 停止新增资金；连续两个季度监测
      - - Apple Watch 压缩 TAM
        - Apple Watch 在美国高端可穿戴市场份额 >55%，且健康功能相当
        - 获客 CAC 上升；流失加速；护城河叙事走弱
        - 减仓；重新评估国际 TAM 能否成为主要增长引擎
      - - IPO 倍数压缩
        - IPO 定价低于 $8.5B EV（低于 Series G 估值标记）
        - 向下轮信号；2021 年融资批次优先权压力显性化；普通股受损
        - 不参与 EV <$8.5B 的 IPO；回调后评估二级市场入场
      - - Abbott 或 Mayo Clinic 战略退出
        - 任一投资者出售持股、拒绝产品集成或终止合作
        - 战略背书撤回；CGM / 数据集成逻辑崩塌
        - 要求管理层紧急沟通；暂停待确认尽调
