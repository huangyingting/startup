      - number: '6.2'
        title: 采用与增长轨迹
        blocks:
          - type: paragraph
            body: >
              WHOOP 会员数从 2024 年约 1.2–1.4M 增至 2026 年 3 月的 2.5M 活跃会员，约 18 个月大致翻倍。这条增长轨迹对应会员数约 70–80% 的复合增长，驱动因素包括 WHOOP
              5.0 硬件发布（2025 年 5 月）、新功能深度（Healthspan、WHOOP Coach AI）、地域覆盖扩大，以及高调宣布 Series G 融资带来的自然媒体放大。WHOOP 的 2025 Year
              in Review 数据确认，睡眠跟踪、负荷监测和恢复一致性指标均创下参与度纪录。


              公司发货到 56 个国家，支持 6 种语言；覆盖范围从 2024 年前约 45 个国家扩大而来。通过 WHOOP Unite 的企业采用已达到 200+ 组织客户，但该部分收入贡献估计低于总订阅收入的
              10%。开发者 API 采用情况未公开量化。应用商店评分（iOS 约 4.7/5）显示活跃用户满意度较强，不过评分池偏向留存会员，而不是已流失订阅者。


              2025 年 5 月 WHOOP 5.0 发布时伴随定价 / 升级争议：公司围绕现有订阅者可获「免费硬件」的沟通，让用户对是否必须延长订阅产生困惑。社交媒体随即出现显著反弹；客户体验分析也把它视为 WHOOP
              在规模化过程中必须处理的信任赤字。
