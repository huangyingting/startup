      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >
              多个独立规模测算视角都确认，健身可穿戴市场规模大且增长快。GrandView Research 预测全球健身追踪器市场 2030 年将达 $67.6B，并保持双位数 CAGR。 The Business
              Research Company 估计 2026 年市场为 $70.3B，到 2030 年增至 $130.9B，CAGR 约 17.1%。Statista 的健身追踪器展望预计， 2026 年全球收入为
              $49.4B，到 2030 年升至 $81.5B，全球人口用户渗透率从 12.04% 提高到 13.53%。在更宽的可穿戴医疗设备范围内，MarketsandMarkets 认为 2025 年市场为
              $45.3B，到 2030 年扩至 $76B，CAGR 为 11%。GM Insights 的可穿戴市场报告预测，所有可穿戴设备合计到 2035 年将达到 $222B。

              这些估计不能直接对比，因为范围定义不同：有的来源只纳入专用健身追踪器，有的加入智能手表，还有的把所有可穿戴电子设备都算进去。分析机构之间估计值相差 3–5
              倍，正反映这种定义不一致，也让自下而上的交叉验证变得关键。对 WHOOP 具体所在的高端订阅细分市场，行业分析师评论认为 2025 年可服务市场为 $8–12B；
              随着愿意为高端经常性分析付费的健康意识型消费者占比扩大，该市场约以 18–20% CAGR 增长。WHOOP 2025 年预订额为 $1.1B，意味着它在该子市场的份额约为 9–14%，这与公司 2.5M+
              会员、平均有效 ARPU 每年 $200–359 相匹配。

              出货量也在硬件层面印证增长轨迹。IDC 追踪到 2025 年全球可穿戴设备出货超过 611M 台，并预计 2026 年超过 625M 台。Omdia 报告称，2025 年全球可穿戴手环市场增长
              9%，智能手表和健康功能引领加速。智能戒指是增长最快的形态，2025 年出货量约增长 50%，预计到 2027 年总市场价值超过 $1.2B。WHOOP 的直接竞争对手 Oura 2024 年收入翻倍至
              $500M+，并预计 2025 年接近 $1B，印证高端细分市场仍有活力。

              WHOOP 自身预订额同比增长 103%，显著跑赢 17% 的大盘 CAGR，说明公司既在扩张市场中抢份额，也受益于自身会员分层扩张。
