  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: |
              WHOOP 采用硬件即服务（HaaS）模式，可穿戴设备以无额外前置成本的方式打包进三档年度订阅：
              WHOOP One（$199/年）、WHOOP Peak（$239/年）和 WHOOP Life（$359/年）。这一模式消除了
              一次性硬件收入，把整个收入基础转为经常性订阅 ARR，从而支持可预测增长预测和更受投资人欢迎的
              类 SaaS 指标。WHOOP 5.0（2025 年 5 月）和医疗级 WHOOP MG 均包含在订阅中，而非单独出售。

              除消费者订阅外，WHOOP 又叠加了两条增量收入流。WHOOP Labs（Advanced Labs）提供居家血液生物标志物
              分析作为附加服务（首个面板 $100，后续每次约 $50），随 WHOOP 5.0 推出。WHOOP Unite 是企业 B2B
              健康福利平台，为组织提供按席位订阅，并把 WHOOP 嵌入员工福利项目；截至 2026 年初，已有超过
              200 家企业客户签约。设备层面的硬件毛利被有意压薄，COGS 估计为每台 $47–$62；该商业模式设计成由
              订阅毛利来补贴获客阶段的硬件。

              收入模式桥（FI001）展示了 WHOOP 估计 $1.1B 的 2025 预订额运行率构成：以 2.5M 会员基础、
              约 $250 ARPU 为核心，再加上 B2B 和 Labs 增量。2025 年预订额同比增长 103%，为 WHOOP
              史上最快有机增长；驱动因素包括国际扩张（新销售中 60% 来自国际市场）、WHOOP 5.0 硬件发布，以及从旧有
              单档 $30/月模式升级到三档订阅定价。
