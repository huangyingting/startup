      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              WHOOP 从 2013 年 7 月 Seed 轮到 2026 年 3 月 31 日完成 Series G，历经十一轮或更多融资，累计融资约 $979M 至 $1.376B。估值从未披露的种子阶段稳步抬升， 到
              2020 年 10 月 Series E 以 $1.2B 进入独角兽行列，再到当前 $10.1B 投后估值。最近一轮 $575M Series G 由 Collaborative Fund
              领投，并引入重要战略投资者： Abbott（大型医疗器械制造商）和 Mayo Clinic（旗舰医疗系统）。两者都显示 WHOOP 试图进入临床和可报销医疗渠道。主权财富基金 Qatar Investment
              Authority 和 Mubadala Investment Company（UAE）提供国际扩张资本和 GCC 市场入口。

              运动员和名人投资者既是财务支持者，也是品牌大使。Cristiano Ronaldo、LeBron James、Rory McIlroy、Reggie Miller 和 Virgil van Dijk 均参与
              Series G。这一网络有两层作用：在精英运动圈提供真实背书，也可能帮助公司打入全球体育市场。此前的重要投资者包括 SoftBank Vision Fund 2（2021 年 8 月以 $3.6B 估值领投
              $200M Series F）、IVP（从 Series C 到 Series G 的多轮投资者）和 Foundry Group。

              Series G 公布时，公司同步披露强劲财务指标：2025 年底预订额运行率 $1.1B（同比增长 103%）、经营现金流转正、会员超过 2.5M。CEO Will Ahmed 告诉
              TechCrunch，公司正在做「大量不会后悔的上市准备工作」，释放 IPO 准备信号，但未承诺时间表。Bloomberg 报道称，本轮融资发生在可能 IPO 之前。
              资金用途包括美国增长、人才、欧洲、GCC、拉美和亚洲的国际扩张，以及持续 R&D 投入。
