      - number: '5.5'
        title: 供应商、平台与数据依赖
        blocks:
          - type: paragraph
            body: >
              WHOOP 的硬件供应链依赖亚洲外包合同制造商生产设备。这带来两个相连风险：（1）对中国制造电子产品征收的 Section 301 关税估计每台设备增加 $5–$12 的增量
              COGS；（2）少数合同制造商集中，让 WHOOP 暴露在供应中断或成本上涨下。硬件传感器组件（定制 PPG 传感器阵列、IMU、ECG 电极）需要具备精密制造公差的合格供应商，换厂并不容易。


              软件平台侧，WHOOP 的关键依赖包括：Snowflake（数据分析）、Apple App Store 与 Google Play（移动分发）以及 AWS 或同等级超大规模云厂商（云计算；未公开确认）。Terra
              API 和 ROOK API 是第三方集成中介，位于 WHOOP 开发者 API 与下游应用开发者之间。这些中介在开发者生态中增加了一层；如果 WHOOP 扩大直接 API 关系，可能制造摩擦。


              数据权利与 IP：WHOOP 自有的纵向生物识别数据集覆盖 2.5M+ 会员的连续可穿戴数据，是公司最可防守的资产。临床研究合作（Mayo Clinic、投资方
              Abbott）为将该数据集用于药物开发或人群健康研究提供潜在商业化路径。要大规模授权该数据集，WHOOP 需要会员同意框架；公开材料中尚看不到这类框架已经成型。
            claimRefs: []
      - number: '5.6'
        title: 技术结论
        blocks:
          - type: paragraph
            body: >
              WHOOP 的技术更像一个经过验证、但仍在渐进改进的消费健康平台，而不是医疗级诊断设备。其 HR、HRV 和睡眠核心传感器融合算法在消费级可穿戴设备中属于验证最严格的一档；WHOOP MG 已获 FDA 许可的
              ECG 也构成真实的监管护城河。开发者 API 与 Snowflake 数据基础设施显示，公司正在走平台策略，也有生态野心。


              关键技术强项：（1）HR 和 HRV 准确率经过临床验证；（2）来自 2.5M+ 会员的纵向生物识别数据集，参与度高（日常佩戴，而非事件驱动）；（3）WHOOP MG 具备已获 FDA 许可的 ECG
              能力；（4）开放开发者 API，可支持集成合作。关键脆弱点：（1）ML 架构自研但未披露，带来黑箱风险；（2）睡眠分期准确率仅中等，尚不到临床级；（3）Blood Pressure Insights 收到 FDA
              警告，显示医疗声明可能过线；（4）硬件供应链外包且暴露在关税下；（5）没有公开确认的 SOC 2 或 ISO 27001 认证。


              除 WHOOP 5.0 和 WHOOP MG 外，WHOOP 的技术路线图——包括可能的 CGM 集成——仍未确认。公司筹备 IPO 可能加速平台投资，但也会让任何新健康监测声明承受更高监管审视。
