      - number: '7.3'
        title: 合作伙伴、依赖与供应链风险
        blocks:
          - type: paragraph
            body: >
              WHOOP 的供应链集中在中国；公司没有披露替代制造地区。Section 301 关税按 HTS 代码对可穿戴组件征收 7.5%（List 4A）或 25%（List 3）。Trump 2025
              年对中国电子产品加征的关税在峰值时高达 54%，直到 2025 年 11 月 Trump-Xi 协议后才部分缓和。WHOOP 约 38% 的毛利率已经低于同规模公司软硬混合业务的目标水平；Section 301
              关税估计每台增加 $5–12 的 COGS。Harris Sliwoski 的 2025 China Law Blog 指出多重叠加风险：收取预付款后消失的供应商、困境工厂挪用
              IP，以及制造商在中国注册外国品牌时的「快速抢注」商标劫持。


              平台依赖构成第二条风险向量。WHOOP 的 iOS 和 Android 应用需要 Apple HealthKit 和 Google Fit API 的活跃集成。Apple 过去曾撤销第三方心率应用的 API
              访问；类似撤销或政策变化可能迫使 WHOOP 应用紧急重构。2025 年 7 月 Snowflake 数据合作和 AWS 云依赖，让分析层出现单一供应商集中风险。WHOOP v. Lexqi（2026 年 2
              月获初步禁令）确认中国 ODM 正在主动复制 WHOOP 的商品外观；海外 IP 维权仍在继续，并需要持续法律支出。
