      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Will Ahmed 在担任 Harvard University 壁球队队长时萌生了 WHOOP 的构想。当时他长期过度训练，却找不到足够好用的消费科技产品来追踪生理恢复。 Ahmed 在 Harvard
              主修经济与政府（A.B. 2012），并在 Harvard Innovation Labs 与 John Capodilupo、Aurelian Nicolae 一起打磨概念；
              后两者补上工程和数据科学基础。Ahmed 自公司成立起一直担任 CEO，是消费健康科技里任期最长的创始人 CEO 之一；他负责公司方向、投资人关系和公开发声， 也带来实质性的关键人物集中风险。

              现任领导团队兼具创始连续性和职业化管理扩张。Aurelian Nicolae 仍任首席硬件工程师，保留深厚硬件 IP 主导权。近年加入的职业高管包括 Jaime Waydo（CTO）、Michener
              Chandlee（CFO）和 Garrett Bastable（COO）。2025 年 9 月，WHOOP 任命 Johan Liden 为首席创意官——Liden 共同创办工业设计公司 Aruliden，自
              2013 年起作为董事和外部合作者塑造 WHOOP 的产品身份——并任命 Jason Lynch 为首席行政官兼首席法务官； Lynch 来自 Foundry Group，曾任总法律顾问。Emily
              Capodilupo 担任数据科学与研究高级副总裁，Kristen Holmes 则担任全球人类表现负责人兼首席科学家。

              董事会成员包括 Will Ahmed、Kristin Bannon、Eric Liaw、Chris Moody 和 Johan Liden。董事会并未包含两家最大机构投资者（SoftBank 和
              Collaborative Fund）的代表，因此投资人代表席位和监督机制可能不完全透明，构成治理风险。截至本分析日期，公开信息未显示主要最高管理层 离职；WHOOP 维持极其严格的招聘流程，录取率约
              0.13%，进一步强化文化凝聚力。
