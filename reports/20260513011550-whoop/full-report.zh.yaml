      - number: '7.5'
        title: 风险缓释与投资逻辑破裂触发因素
        blocks:
          - type: paragraph
            body: >
              WHOOP 在多个战线上主动缓释风险。FDA 争议方面，WHOOP 于 2025 年 5 月 15 日和 5 月 27 日与 FDA 会面，并聘请了监管律师。510(k) 许可路径——Apple
              为其高血压通知功能选择的路线——仍然可用，但时间线为 12–24 个月。另一条路径是把 BPI 重述为不显示血压数值的健康「趋势指标」，类似 FDA 为血氧仪创建一般健康产品代码（OCH、PGJ）的方式。RFK
              Jr. 在国会证词中明确背书 WHOOP，而证词发生在 FDA 警告信前仅数周；这种政治不一致可能成为 WHOOP 在监管谈判中的筹码。


              法律风险方面，WHOOP 的进攻性 IP 诉讼（2026 年 3 月 WHOOP v. Finerpoint/Bevel、2026 年 2 月 WHOOP v. Lexqi 初步禁令）显示其执行 IP
              护城河的能力。Sanderson ARL 暴露可通过改进披露 UI 和早期和解处理。Lomeli VPPA/CMIA 风险需要第三方 SDK 审计和数据最小化计划。供应链多元化至 Vietnam、India 或
              Mexico 在技术上可行，但需要 6–12 个月和资本投入。Abbott Laboratories 与 Mayo Clinic 作为 Series G 投资者，提供监管可信度和潜在 FDA 导航支持。WHOOP
              的 $575M Series G 和 2025 年现金流转正状态，提供了不依赖 IPO 的 3–4 年现金跑道。


              投资逻辑破裂触发因素：（1）FDA 发布同意令或禁令，要求移除 BPI，导致 90 天内增量流失率 >10%；（2）合并诉讼准备金超过 $50M，且短期没有和解路径；（3）关税叠加使 COGS 升至收入 50%
              以上，毛利率跌破 25%；（4）Omni MedSci 光学传感器专利案导致必须绕开设计，影响 PPG/SpO2 准确率。
