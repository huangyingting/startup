  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              WHOOP 竞争的位置，是消费健康可穿戴设备与订阅软件服务的交汇处。这个市场最好拆成三层嵌套范围来看。最宽的一层是全球可穿戴技术市场，覆盖智能手表、健身追踪器、智能戒指、听戴设备、智能贴片和工业可穿戴设备；
              该市场 2026 年估计为 $109–115B。对 WHOOP 硬件和订阅业务而言，可服务范围是健身与健康追踪器细分市场，2026 年估计为 $49–70B，具体取决于来源方法。 WHOOP
              的可获取市场更窄：高端经常性订阅健康分析细分市场，即愿意每年支付 $199–$359 的消费者；分析师估计该子市场 2025 年全球规模为 $8–12B。

              WHOOP 的市场边界纳入以下支出：提供连续生理监测的腕戴和戒指形态生物传感器、交付教练和洞察的配套移动 App，以及用于高级健康分析的经常性软件订阅。WHOOP 核心市场不包括听戴设备（健身耳机）、智能眼镜、仅
              GPS 的运动设备、植入式监测器，以及需要处方的临床级连续血糖监测仪（CGM）——尽管 CGM 邻近性正在增强。 争夺 WHOOP 目标买家的主要既有替代品包括 Apple Watch Series
              10（一次性购买，可选蜂窝套餐）、Garmin Forerunner 和 Fenix GPS 手表、Fitbit Charge 6 以及 Samsung Galaxy
              Watch；这些产品都能提供健康追踪，且不强制收订阅费。

              与边界拉扯明显的邻近市场包括企业健康福利平台（2026 年全球估计 $50–60B）、远程患者监测和血液生物标志物检测。WHOOP 正在积极进入这三类邻近市场： WHOOP Unite
              面向企业健康福利，WHOOP MG 追求临床级监测，WHOOP Advanced Labs 提供按需血液面板检测。这些邻近领域既是增长机会，也是监管风险来源。
