  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              WHOOP 面对的是多层竞争场：专用恢复可穿戴设备、主流智能手表平台、运动 GPS 专家和大众健身追踪器。没有单一竞争对手完全复制 WHOOP 的组合：无屏幕形态、Strain 与 Recovery
              分析深度，以及只靠订阅交付硬件的模式。最接近的直接对手是 Oura Ring，它同样定位高端订阅并聚焦恢复；但戒指形态、睡眠优先取向和明显更低的订阅 ARPU 让两者区分开来。Apple
              Watch、Samsung Galaxy Watch 和 Garmin 是大型邻近威胁；它们功能宽、生态强，并从规模端蚕食 WHOOP 的健康追踪领地。


              Fitbit 自 2021 年被 Google 收购后，收入和用户心智持续流失，但仍为 Google 提供消费可穿戴入口；如果 Google 完成传闻中的无屏幕健康手环，它可能演化为更直接威胁。 WHOOP
              面临的竞争强度并不对称：Oura 争夺同一批富裕的健康优化买方，而 Apple 和 Google 今天更多靠规模和生态优势竞争，并非在功能上正面对撞。WHOOP
              的位置最强，是在那些自我认同为运动表现型运动员或健康数据重度用户、且愿意专门为恢复教练支付溢价的买方子集里。
