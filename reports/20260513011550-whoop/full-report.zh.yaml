      - number: '7.2'
        title: 运营、数据与网络安全风险
        blocks:
          - type: paragraph
            body: >
              WHOOP 的运营风险主要由健康数据隐私暴露主导。2025 年 8 月，原告 Steven Lomeli 提起 VPPA/CMIA 集体诉讼，指控 WHOOP 在应用中嵌入 Segment
              分析追踪器，并在未经用户同意的情况下向 Segment 披露全名、邮箱、身高、体重、生日、城市、性别、用户名、设备标识符、心率生命体征和视频标题（引导冥想）。这可能触发 FTC Health Breach
              Notification Rule（HBNR）：自 2024 年 7 月 29 日生效后，HBNR 明确覆盖不受 HIPAA 管辖的健身追踪器和可穿戴设备，民事罚款最高可达每项违规每天 $44,000。


              美国可穿戴隐私版图已经碎片化，形成多州合规负担：Washington 的 My Health My Data Act（要求选择加入同意）、California CPRA（敏感个人信息选择退出权）、Texas
              TDPSA 和 Florida FDBR 都对可穿戴设备产生的健康数据施加更高义务，造成四州拼图式要求，需要差异化同意流程。在欧盟，GDPR Article 9 将生物识别和健康数据列为特殊类别；当个人数据用于
              AI 模型时，EU AI Act 与 GDPR 交叉适用会收紧控制，直接影响 WHOOP Coach AI。GDPR/HIPAA 之间也存在张力：GDPR 要求按请求删除健康数据，而 HIPAA
              禁止受管实体删除健康记录。


              FDA 的 2025 年 6 月 Cybersecurity Guidance 要求「网络设备」制定 Cybersecurity Management Plans（CMP）；如果 FDA 将 WHOOP MG
              归类为医疗器械，WHOOP MG 可能触发这一分类。2026 年 HIPAA Security Rule 修订将加密和 MFA 列为强制要求。全行业 Bluetooth
              可穿戴安全弱点（未加密数据、弱默认密码、未修补固件）仍基本未被处理；WHOOP 没有公开 CVE 披露，也没有确认的漏洞赏金计划。


              产品质量风险同样存在：公开临床数据显示，WHOOP 睡眠阶段准确率与多导睡眠图约 64% 一致（中等一致性），在算法改进前会阻碍临床用例扩张。
