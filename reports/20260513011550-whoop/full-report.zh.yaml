      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景（30% 概率）假设 WHOOP 执行 2026 年招聘计划（600+ 岗位），Abbott 在 2026 年 H2 交付商业化 CGM 集成，BPI 继续在线，Advanced Labs 采用推动
              ARPU 扩张至 $350+，且 WHOOP 于 2026 年末提交 S-1，2027 年 IPO 按 14× 远期收入定价——对应 $18–22B EV，相对 $10.1B 入场产生 1.8–2.2×
              回报。基准情景（50% 概率）假设预订额增长 30–40%，FDA 风险受控，订阅组合改善，并在 2027–2028 年按 $1.3–1.5B 远期收入的 8–10× IPO，对应 $12–15B 和
              1.2–1.5× 回报。悲观情景（20% 概率）假设 FDA 再升级迫使 BPI 下线，Apple Watch 渗透加速美国订阅者流失，预订额增长降至 20% 以下，IPO 推迟到 2029+ 或按类似
              Peloton 的 4–6× 倍数定价，对应 $4–6B 并造成资本减值。概率加权预期价值约为 $12.0B，较 $10.1B 入场溢价 19%，意味着 2.5 年持有期的总 IRR 为
              12–15%；对一个执行风险较高的后期私募仓位而言可以接受。
            claimRefs:
              - CV040
