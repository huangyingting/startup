company:
  name: WHOOP
chapter:
  number: 4
  title: Financials
  summary: >
    WHOOP's financial model is subscription-first: hardware is bundled at near-cost into annual
    memberships ($199–$359/year), generating predictable ARR that reached an estimated $1.1B
    bookings run rate in December 2025. The company confirmed operating-cash-flow positivity in
    2025 and closed a $575M Series G at a $10.1B valuation in March 2026. With 2.5M+ members,
    gross margin of approximately 38% on recurring subscription revenue, and blended ARPU of
    roughly $250 per year, WHOOP's unit economics are materially improving. Key risks include
    undisclosed net income, China tariff cost pressure (+$5–12/device), an unresolved FDA warning
    letter on Blood Pressure Insights, and an IPO that is confirmed as the CEO's stated next step
    but lacks a filed S-1 as of May 2026.

sections:
  - id: sec-revenue-model
    title: "Revenue Model and Monetization"
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]
    body: |
      WHOOP operates a hardware-as-a-service (HaaS) model in which the wearable device is bundled
      at no additional upfront cost into three annual subscription tiers: WHOOP One ($199/yr),
      WHOOP Peak ($239/yr), and WHOOP Life ($359/yr). This model eliminates the one-time hardware
      revenue lump and converts the entire revenue base into recurring subscription ARR, enabling
      predictable growth forecasting and investor-friendly SaaS-like metrics. WHOOP 5.0 (May 2025)
      and the medical-grade WHOOP MG are included in the subscription rather than sold separately.

      Beyond consumer subscriptions, WHOOP has layered two incremental revenue streams. WHOOP Labs
      (Advanced Labs) provides at-home blood biomarker analysis as an add-on ($100 for the first
      panel, ~$50 per subsequent test), introduced with WHOOP 5.0. WHOOP Unite, the enterprise
      B2B wellness platform, offers organizations a per-seat subscription that embeds WHOOP into
      employee benefits programs; over 200 enterprise clients have contracted the service as of
      early 2026. Hardware margin is intentionally thin at the device level, with COGS estimated
      at $47–$62 per unit; the business model is designed so subscription gross margin subsidizes
      hardware at acquisition.

      The revenue model bridge (FI001) shows the composition of WHOOP's estimated $1.1B 2025
      bookings run rate, anchored by a 2.5M member base generating approximately $250 ARPU, plus
      B2B and Labs increments. Year-over-year bookings growth was reported at 103% for 2025,
      representing the fastest organic growth in WHOOP's history and driven by international
      expansion (60% of new sales international), the WHOOP 5.0 hardware launch, and the three-tier
      subscription pricing upgrade from the legacy single-tier $30/month model.

    callouts:
      - type: insight
        body: "WHOOP's shift from a single subscription tier to three tiers in 2025 (One/Peak/Life) structurally raises blended ARPU as early-adopter and high-engagement users self-select into premium tiers, increasing gross profit per cohort without requiring member count growth."

  - id: sec-unit-economics
    title: "Unit Economics and Cost Structure"
    tableRefs: [TI003]
    figureRefs: [FI002, FI003]
    body: |
      WHOOP's unit economics are built around a subscription-first model where hardware acts as a
      loss-leader or break-even mechanism for member acquisition. Device COGS are estimated at
      $47–$62 per unit (2025 estimates before tariff impact), reflecting contract manufacturing in
      China with primary components including optical sensors, battery, and haptic motor. Section
      301 China tariffs, expanded in 2025, add an estimated 6–9% to COGS, translating to $5–12
      per unit of incremental cost that either compresses margins or requires retail price increases.
      The FDA warning letter received July 14, 2025, regarding Blood Pressure Insights creates
      financial uncertainty for a feature that differentiates the premium Life tier; remediation
      costs and potential feature withdrawal could depress Life tier conversion.

      Gross margin for the overall business is estimated at approximately 38% (FY2025), weighted
      toward the subscription software margin (~70%+) and pulled down by hardware COGS and
      physical logistics. Blended ARPU across tiers is estimated at approximately $250/year, with
      the Life tier ($359/yr) contributing disproportionately to gross profit per member. Annual
      member churn is estimated at 16–24%; WHOOP claims that WHOOP Coach engagement measurably
      reduces churn toward the lower end of this range by increasing in-app daily habit formation.
      At a $250 ARPU and 20% midpoint churn, expected member tenure is approximately 5 years and
      estimated gross LTV is approximately $590–$900 per member depending on tier mix and add-on
      penetration.

      Target CAC payback of under 18 months implies a CAC ceiling of approximately $250–$375 per
      acquired member (one year's subscription gross profit at 38% margin = ~$95; 18-month payback
      means CAC ≤ $142). In practice WHOOP's elite-athlete marketing, social media ambassador
      model, and enterprise-bundled acquisition likely generate blended CACs below $200. At that
      level, the LTV/CAC ratio exceeds 3:1 on a gross-profit basis, which is within acceptable
      range for a subscription hardware business though below the 5:1+ seen in pure SaaS.

    callouts:
      - type: warning
        body: "WHOOP's gross margin is anchored by subscription software margin but structurally capped by hardware COGS, China tariff exposure, and physical logistics. An escalation in tariffs or a significant ramp in hardware refresh cycles would compress blended margin before scale benefits accrue."

  - id: sec-funding-capital
    title: "Funding History and Capital Adequacy"
    tableRefs: [TI004]
    figureRefs: [FI004]
    body: |
      WHOOP has raised over $1.47B in total venture capital across eight financing rounds spanning
      2013–2026. The Goodwin Law Series G announcement confirms the company had raised "more than
      $900 million" prior to the March 2026 Series G closing, which added $575M at a $10.1B
      post-money valuation. The Series G was led by Collaborative Fund and included strategic
      participation from Qatar Investment Authority (QIA), Mubadala Investment Company, Abbott,
      and the Mayo Clinic, alongside institutional investors Glade Brook, B-Flexion, IVP, and
      Foundry. Strategic health system and device company participation from Abbott and Mayo Clinic
      signals WHOOP's ambition to expand into clinical and enterprise health markets.

      The SEC EDGAR database records Form D filings by Whoop, Inc. (CIK 0001582746) for earlier
      fundraising rounds under Regulation D, including a November 2020 filing for an exempt
      offering. No Form D has been filed for the 2026 Series G as of May 2026, which is consistent
      with a Regulation S offering or a structuring exempt from Form D requirements. The company's
      stated use of Series G proceeds is global expansion and AI platform development; the $575M
      raise at current burn implies multiple years of runway before a next equity round becomes
      necessary. With cash-flow positivity confirmed for 2025 and a $10.1B valuation benchmark set,
      WHOOP's path to IPO is capital-supported.

      Capital intensity in WHOOP's business model is moderate by hardware-subscription standards.
      Inventory financing and contract manufacturing represent the primary working capital demand.
      WHOOP does not own manufacturing capacity (outsourced to contract manufacturers) and does not
      carry significant project finance obligations. The 2026 headcount expansion of 600+ new roles
      (announced alongside the Series G) will increase operating expense meaningfully but is expected
      to be funded by the Series G proceeds and growing subscription revenue without requiring debt.

    callouts:
      - type: insight
        body: "Participation from Abbott (diagnostics) and Mayo Clinic (clinical health systems) in the Series G suggests WHOOP is positioning its revenue model to extend beyond consumer subscriptions into clinical data licensing and enterprise health contracts—new revenue streams that do not yet appear in reported metrics."

  - id: sec-ipo-outlook
    title: "IPO Preparation and Financial Outlook"
    tableRefs: []
    figureRefs: []
    body: |
      WHOOP CEO Will Ahmed confirmed in March 2026 that an IPO is "the next step" for the company.
      No S-1 has been confidentially submitted or publicly filed as of May 2026. Market observers
      and analysts cite late 2026 or early 2027 as the most likely IPO window, contingent on macro
      conditions and the company's ability to sustain bookings growth at or near the 103% rate
      reported for 2025. At a $10.1B post-money valuation and $1.1B bookings run rate, the implied
      price-to-bookings multiple is approximately 9.2x; comparable consumer health and SaaS
      companies have traded at 6–15x ARR, suggesting WHOOP's current private valuation is
      defensible at the high end if growth sustains.

      Key pre-IPO financial milestones likely include GAAP revenue recognition (bookings vs. revenue
      reconciliation pending completion of multi-year subscription terms), audited financials for
      FY2025 and FY2024, gross margin expansion toward 40%+, and a demonstrable path to EBITDA
      break-even or positive. International revenue scaling from 60% of new sales provides a
      structural growth lever that supports revenue growth even as the domestic base matures.
      WHOOP Labs (Advanced Labs) and WHOOP Unite (B2B enterprise) represent the primary new revenue
      pillars that differentiate WHOOP's IPO story from a single-product subscription company into
      a multi-revenue-stream health data platform.

    callouts:
      - type: warning
        body: "The FDA warning letter on Blood Pressure Insights (July 2025) remains unresolved as of May 2026. If the feature must be withdrawn from the WHOOP MG and Life tier, it removes a differentiated clinical feature from WHOOP's IPO narrative and may require remediation expenditure that depresses EBITDA margin."

  - id: sec-financial-gaps
    title: "Financial Disclosure Gaps and Diligence Blockers"
    tableRefs: [TI005]
    figureRefs: []
    body: |
      As a late-stage private company preparing for IPO, WHOOP has disclosed substantially more
      operating metrics than most similarly valued private companies—bookings run rate, member
      count, international growth share, and ARPU tier structure are all publicly anchored. However,
      critical GAAP financial metrics remain undisclosed: net income or EBITDA, exact recognized
      revenue (vs. bookings), cash balance, and customer acquisition cost are not publicly available.
      These gaps are standard for a pre-S-1 private company but represent hard diligence blockers
      for prospective institutional investors conducting pre-IPO analysis.

      The most significant financial uncertainty for WHOOP is the bookings-to-revenue conversion
      path. WHOOP reports a $1.1B "bookings run rate" which likely represents committed future
      subscription revenue including multi-year memberships. GAAP revenue would be recognized
      ratably over subscription periods, implying actual FY2025 recognized revenue is likely
      materially below $1.1B—analyst estimates cluster at $550–$700M for GAAP revenue given the
      annualized bookings base mid-2025. Without an S-1, the true revenue recognition methodology
      and audited revenue figure remain unavailable.

    callouts:
      - type: insight
        body: "The gap between $1.1B bookings run rate and an estimated $550–$700M GAAP revenue is a critical reconciliation item for IPO investors. WHOOP's decision to report bookings rather than GAAP revenue is strategic: it presents the highest-growth metric while legal disclosure of recognized revenue awaits the S-1 filing."

