      - number: '2.2'
        title: Market Sizing and Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Multiple independent sizing lenses confirm a large and rapidly growing fitness wearables market. GrandView
              Research places the global fitness tracker market at a 2030 forecast of $67.6 billion with double-digit
              CAGR. The Business Research Company estimates the 2026 market at $70.3 billion, growing to $130.9 billion
              by 2030 at a CAGR of approximately 17.1%. Statista's fitness tracker outlook projects 2026 global revenue
              of $49.4 billion, rising to $81.5 billion by 2030, at user penetration growing from 12.04% to 13.53% of
              the global population. At the broader wearable healthcare devices scope, MarketsandMarkets pegs the 2025
              market at $45.3 billion expanding to $76 billion by 2030 at an 11% CAGR. GM Insights' wearables market
              report projects $222 billion by 2035 for all wearables combined.

              These estimates are not directly comparable due to differing scope definitions: some sources include only
              dedicated fitness trackers, others add smartwatches, and others include all wearable electronics. The 3–5x
              variance in estimates across analyst houses reflects this definitional inconsistency and makes bottom-up
              triangulation critical. For WHOOP's specific premium subscription segment, industry analyst commentary
              places the serviceable market at $8–12 billion in 2025, growing at roughly 18–20% CAGR as the share of
              health-conscious consumers willing to pay for premium recurring analytics expands. At $1.1 billion in 2025
              bookings, WHOOP's implied market share in this sub-segment is 9–14%, which is consistent with the
              company's 2.5 million+ members at an average effective ARPU of $200–359 per year.

              Shipment volumes confirm the growth trajectory at the hardware level. IDC tracked over 611 million
              wearable device global shipments in 2025, growing to 625 million+ projected for 2026. Omdia reported the
              global wearable band market growing at 9% in 2025 with smartwatches and health features leading the
              acceleration. Smart rings, the fastest-growing form factor, posted approximately 50% shipment growth in
              2025 and are projected to exceed $1.2 billion in total market value by 2027. WHOOP's direct competitor
              Oura doubled its revenue to $500 million+ in 2024 and projected approaching $1 billion in 2025, confirming
              the premium segment's vitality.

              WHOOP's own 103% year-over-year bookings growth significantly outpaces the 17% broad market CAGR,
              suggesting the company is simultaneously capturing share in an expanding market while benefiting from its
              own membership tier expansion.
