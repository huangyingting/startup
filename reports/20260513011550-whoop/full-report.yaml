      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              WHOOP was conceived by Will Ahmed while he served as captain of the Harvard University squash team, where
              he experienced chronic overtraining and found no consumer technology adequate to track physiological
              recovery. Ahmed, who concentrated in economics and government at Harvard (A.B. 2012), developed the
              concept at the Harvard Innovation Labs alongside John Capodilupo and Aurelian Nicolae, both of whom
              contributed engineering and data science foundations. Ahmed has served as Chief Executive Officer since
              inception, making him one of the longest-tenured founder-CEOs in consumer health technology; his role in
              setting company direction, managing investor relations, and serving as public spokesperson creates
              material key-person concentration.

              The current leadership team reflects a combination of founding continuity and professional management
              scale-up. Aurelian Nicolae remains as Chief Hardware Engineer, retaining deep hardware IP ownership.
              Professional executives appointed more recently include Jaime Waydo (CTO), Michener Chandlee (CFO), and
              Garrett Bastable (COO). In September 2025, WHOOP added Johan Liden as Chief Creative Officer—Liden
              co-founded industrial design firm Aruliden and has shaped WHOOP's product identity since 2013 as a board
              member and external collaborator—and Jason Lynch as Chief Administrative Officer and Chief Legal Officer,
              who comes from Foundry Group where he served as General Counsel. Emily Capodilupo serves as SVP of Data
              Science and Research, and Kristen Holmes leads as Global Head of Human Performance and Principal
              Scientist.

              Board representation includes Will Ahmed, Kristin Bannon, Eric Liaw, Chris Moody, and Johan Liden. The
              board composition does not include representatives from the two largest institutional investors (SoftBank
              and Collaborative Fund), creating governance risk in that investor representation and oversight may not be
              fully transparent. No major C-suite departures have been publicly reported through the date of this
              analysis, and WHOOP maintains an extremely selective hiring process with an acceptance rate of
              approximately 0.13%, reinforcing cultural cohesion.
