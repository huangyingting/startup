      - number: '7.3'
        title: Partner, Dependency, and Supply Chain Risks
        blocks:
          - type: paragraph
            body: |
              WHOOP's supply chain is concentrated in China; no alternative manufacturing geography
              has been disclosed. Section 301 tariffs apply at 7.5% (List 4A) or 25% (List 3) on
              wearable components by HTS code. Trump 2025 tariffs on Chinese electronics reached up
              to 54% at their peak before partial de-escalation through the November 2025 Trump-Xi
              agreement. WHOOP's ~38% gross margin is already below the software-blend target for
              companies at this scale; Section 301 tariffs add an estimated $5–12 per unit to COGS.
              Harris Sliwoski's 2025 China Law Blog identified compounding risks: vanishing suppliers
              taking advance payments, IP misappropriation by distressed factories, and "quick-fire"
              trademark hijacking by manufacturers registering foreign brands in China.

              Platform dependencies create a second risk vector. WHOOP's iOS and Android apps require
              active Apple HealthKit and Google Fit API integrations. Apple has previously revoked API
              access for third-party heart-rate applications; a similar revocation or policy change
              could require emergency re-architecture of the WHOOP app. The July 2025 Snowflake data
              partnership and AWS cloud dependency add single-vendor concentration risk to the
              analytics layer. WHOOP v. Lexqi (preliminary injunction granted February 2026) confirmed
              Chinese ODMs actively copy WHOOP's trade dress; outbound IP enforcement is ongoing and
              requires sustained legal spending.
