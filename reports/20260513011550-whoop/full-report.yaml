      - number: '1.4'
        title: Scale, Milestones, and Risk Events
        blocks:
          - type: paragraph
            body: >
              WHOOP's growth trajectory since founding in 2012 has followed a pattern of iterative hardware launches
              paired with financing milestones. The company shipped WHOOP 1.0 in 2015 and has since progressed through
              multiple hardware generations to WHOOP 4.0 in 2021 and the current WHOOP 5.0 and WHOOP MG platform
              launched in May 2025. As of March 2026, WHOOP has surpassed 2.5 million members worldwide and employs
              approximately 1,300 or more people, with plans to add more than 600 additional roles in 2026. The company
              had a $1.1 billion bookings run rate at year-end 2025 and was operating cash-flow positive, demonstrating
              that the subscription model has reached a scale where hardware unit economics are no longer a drag on cash
              generation.

              Key milestone events include the Advanced Labs launch in late 2025, which introduced blood biomarker
              testing integrated into the WHOOP platform, and WHOOP Physician Services, P.C. being selected into the CMS
              Innovation Center ACCESS program (eCKM track), enabling Medicare beneficiary access to WHOOP's platform
              through a reimbursed care pathway expected to launch July 2026. These two developments mark WHOOP's first
              substantive entries into clinical and payor channels.

              Risk events requiring diligence attention include: (1) the FDA warning letter issued July 14, 2025 to CEO
              Will Ahmed, citing Blood Pressure Insights as an unapproved medical device being marketed without
              clearance—WHOOP has contested this characterization, argued the 21st Century Cures Act wellness software
              exemption applies, and has continued marketing the feature as of May 2026, risking regulatory penalty
              including seizure or injunction; (2) active litigation against Polar (filed October 2025, alleging design
              trade dress infringement of WHOOP's band design) and a preliminary injunction secured against Shenzhen
              Lexqi Electronic Technology in February 2026 for distributing a lookalike tracker; (3) key-person
              concentration risk in CEO Will Ahmed, who founded the company, built its investor network, and serves as
              its primary public face and spokesperson. Governance disclosures are limited given WHOOP's private status
              and absence of public financial filings, leaving some board composition and equity structure details
              unverifiable through public sources.
