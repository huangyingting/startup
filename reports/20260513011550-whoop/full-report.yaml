            body: |
              The bull case (30% probability) assumes WHOOP executes its 2026 hiring plan (600+ roles),
              Abbott delivers a commercial CGM integration by H2 2026, BPI remains live, ARPU expands
              toward $350+ with Advanced Labs adoption, and WHOOP files an S-1 in late 2026 for a 2027
              IPO at 14× forward revenue — yielding an $18–22B EV and a 1.8–2.2× return from $10.1B
              entry. The base case (50% probability) assumes 30–40% bookings growth, FDA risk contained,
              subscription mix improving, and an IPO in 2027–2028 at 8–10× forward revenue of $1.3–1.5B,
              yielding $12–15B and a 1.2–1.5× return. The bear case (20% probability) assumes FDA
              re-escalation forces BPI removal, Apple Watch penetration accelerates U.S. subscriber
              attrition, bookings growth decelerates below 20%, and the IPO is delayed to 2029+ or
              priced at Peloton-like 4–6× multiple, yielding $4–6B and capital impairment. The
              probability-weighted expected value is approximately $12.0B, a 19% premium to the
              $10.1B entry, implying a 12–15% gross IRR over a 2.5-year hold — acceptable for a
              late-stage private position with high execution risk.
