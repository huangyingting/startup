        - label: Cloud Data Ingestion
          detail: >-
            Snowflake-based data platform (July 2025 partnership); HIPAA-compliant biometric time-series storage; event
            streaming for real-time metric updates
        - label: ML / Algorithm Engine
          detail: >-
            Proprietary models for Recovery Score, Strain Score, Sleep Stage classification (light/deep/REM/awake), HRV
            analysis, Respiratory Rate, and Healthspan longevity index
        - label: Application Layer
          detail: >-
            iOS and Android native apps; WHOOP Web dashboard; WHOOP Coach AI (LLM-powered daily recommendations);
            Healthspan portal; WHOOP Labs integration
        - label: Developer & Enterprise Platform
          detail: >-
            REST API with OAuth2/PKCE at developer.whoop.com; WHOOP Unite B2B portal for 200+ enterprise clients; Terra
            API and ROOK API third-party integration brokers
