      - number: '7.2'
        title: Operational, Data, and Cybersecurity Risks
        blocks:
          - type: paragraph
            body: |
              WHOOP's operational risk profile is dominated by health data privacy exposure. In August
              2025, plaintiff Steven Lomeli filed a VPPA/CMIA class action alleging WHOOP embedded the
              Segment analytics tracker in its app and disclosed full name, email, height, weight,
              birthday, city, gender, username, device identifiers, heart rate vitals, and video titles
              (guided meditations) to Segment without user consent. This constitutes a potential FTC
              Health Breach Notification Rule (HBNR) trigger: effective July 29, 2024, HBNR expressly
              covers fitness trackers and wearables not covered by HIPAA, with civil penalties up to
              $44,000 per violation per day.

              The U.S. privacy landscape for wearables has fragmented into a multi-state compliance
              burden: Washington's My Health My Data Act (opt-in consent required), California CPRA
              (sensitive personal information opt-out rights), Texas TDPSA, and Florida FDBR each
              impose heightened obligations on wearable-derived health data—creating a four-state
              patchwork requiring differentiated consent flows. In the EU, GDPR Article 9 classifies
              biometric and health data as special category, and EU AI Act intersection with GDPR
              tightens controls when personal data is used for AI models—directly applicable to WHOOP
              Coach AI. A GDPR/HIPAA tension also applies: GDPR requires deletion of health data on
              request, while HIPAA prohibits deletion of health records for covered entities.

              FDA's June 2025 Cybersecurity Guidance requires Cybersecurity Management Plans (CMPs)
              for "cyber devices"—a classification WHOOP MG may trigger if FDA classifies it as a
              medical device. HIPAA Security Rule amendments in 2026 make encryption and MFA
              mandatory. Industry-wide Bluetooth wearable security weaknesses (unencrypted data,
              weak default passwords, unpatched firmware) remain largely unaddressed in absence of
              public CVE disclosures or a confirmed bug bounty program from WHOOP.

              Product quality risk is also present: published clinical data shows WHOOP's sleep-stage
              accuracy at approximately 64% agreement with polysomnography (moderate agreement),
              which blocks clinical use-case expansion without algorithm improvement.
