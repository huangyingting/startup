      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Premium Subscription Segment Outgrowing Broader Market
            body: >
              WHOOP's 103% year-over-year bookings growth dwarfs the 17% industry CAGR for fitness trackers broadly,
              confirming that the premium recurring subscription sub-segment is disproportionately outperforming the
              overall wearables market. The company's $1.1B run rate at 2.5M+ members implies an effective blended ARPU
              of ~$440—significantly above the market's average selling price per device—validating that subscription
              economics can sustain premium unit economics absent hardware margin.
            calloutType: insight
            claimRefs:
              - CM011
              - CM040
              - CM012
          - type: callout
            title: Subscription Price Barrier Limits Mass-Market Penetration Ceiling
            body: >
              WHOOP's $199–359/year subscription faces structural price resistance in the mainstream consumer segment
              where Apple Watch, Garmin, and Samsung offer health tracking at comparable or lower one-time cost. Without
              insurance reimbursement, B2B enterprise adoption must compensate for the consumer mass-market cap. The
              corporate wellness pathway (WHOOP Unite) is promising but at 200+ enterprise clients the B2B base remains
              early-stage relative to the 2.5M+ consumer membership base.
            calloutType: risk
            claimRefs:
              - CM027
              - CM030
              - CM039
          - type: callout
            title: Market Definition Ambiguity Creates Valuation Sensitivity
            body: >
              The 3–5x range in analyst-cited market sizes ($45B to $115B for overlapping market definitions in
              2025–2026) creates material sensitivity in market share and growth multiple assumptions. Investors relying
              on TAM framing for WHOOP's $10.1B valuation must choose a defensible market boundary, as narrower
              definitions compress the implied share and growth headroom while broader definitions risk overstating
              competitive context.
            calloutType: risk
