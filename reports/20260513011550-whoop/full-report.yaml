      - number: '6.2'
        title: Adoption and Growth Trajectory
        blocks:
          - type: paragraph
            body: |
              WHOOP has grown from approximately 1.2–1.4 million members in 2024 to 2.5 million active
              members by March 2026—roughly doubling subscriber count in approximately 18 months.
              This growth trajectory corresponds to a ~70–80% compound growth in member count, driven
              by the WHOOP 5.0 hardware launch (May 2025), new feature depth (Healthspan, WHOOP Coach
              AI), expanded geographic availability, and a high-profile Series G fundraise announcement
              that amplified earned media. WHOOP's 2025 Year in Review data confirms record-breaking
              engagement across sleep tracking, strain monitoring, and recovery consistency metrics.

              The company ships to 56 countries in 6 languages, a footprint that increased from
              approximately 45 countries pre-2024. Enterprise adoption through WHOOP Unite has reached
              200+ organizational clients, though revenue contribution from this segment is estimated
              at less than 10% of total subscription revenue. Developer API adoption is not publicly
              quantified. App store ratings (approximately 4.7/5 on iOS) signal strong consumer
              satisfaction among active users, though the rating pool skews toward retained members
              rather than churned subscribers.

              The WHOOP 5.0 launch in May 2025 was accompanied by a pricing/upgrade controversy in
              which the company's communication around "free hardware" for existing subscribers
              created confusion about required subscription extensions. This generated significant
              social media backlash and is cited in customer experience analyses as a trust deficit
              that WHOOP must manage as it scales.
