      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: |
              WHOOP's most likely exit is a 2027 IPO, with CEO Will Ahmed explicitly stating it as
              the "next step" post-Series G. The digital health IPO window reopened in 2025 with
              Hinge Health's $437M IPO and Omada Health's debut, and 2026–2027 conditions are projected
              to remain moderately favorable for $1B+ ARR platforms with a path to profitability.
              A secondary exit path is strategic acquisition by Abbott Laboratories, which mirrors
              Dexcom's investment in Oura (2024) that evolved into a CGM product partnership. Abbott
              could offer $10.5–13.5B (5–25% premium to Series G), though this would dilute returns
              relative to an IPO bull case. Final diligence asks before commitment include: GAAP revenue
              vs. bookings reconciliation (critical for IPO modeling), net revenue retention by member
              cohort (not publicly disclosed), cap-table waterfall and preference terms, gross margin
              segmented by hardware vs. subscription, and Abbott/Mayo integration roadmap. Until the
              S-1 is filed, the GAAP revenue gap represents the single largest information risk in the
              investment case, as the valuation premium depends on demonstrating recurring subscription
              economics rather than hardware-lumpy GAAP figures.
            claimRefs:
