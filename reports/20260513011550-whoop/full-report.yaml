companyProfile:
  summary: >
    WHOOP is a Boston-based consumer health technology company that makes a subscription-first, screenless wearable
    platform for continuous physiological monitoring. The WHOOP 4.0 band tracks strain, recovery, sleep quality, and
    cardiovascular metrics in real time, delivering AI-powered coaching through a companion app. WHOOP monetizes through
    a recurring hardware + software membership model ($239–$359/year), enabling strong NRR and a growing enterprise
    channel (WHOOP Unite). As of March 2026, the company raised a $575M Series G at a $10.1B valuation, has 2.5M+ active
    members, generated an estimated $1.1B in annualized bookings, and achieved positive free cash flow for the first
    time.
