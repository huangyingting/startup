  - id: TV005
    title: Thesis-Break and Kill Triggers
    description: >-
      Observable thresholds that would invalidate the investment thesis, with transmission mechanism and action
      implication.
    notes: Triggers are ordered by estimated probability of occurrence, not by impact magnitude.
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - FDA consent decree or injunction
        - WHOOP ordered to pull BPI, ECG, or future CGM features
        - Core differentiation removed; ARPU compressed by 25–40% for medical-grade tier
        - Exit full position; thesis structurally broken
      - - Subscriber decline
        - Members <2.2M at any fiscal year-end before IPO
        - Growth narrative invalidated; Peloton re-rating scenario activated
        - Halt new capital deployment; monitor for two consecutive quarters
      - - Apple Watch TAM compression
        - '>55% premium wearable U.S. market share for Apple Watch w/ health parity'
        - Subscriber acquisition CAC rises; churn accelerates; moat narrative weakens
        - Reduce position; reassess international TAM as primary growth driver
      - - IPO multiple compression
        - IPO priced below $8.5B EV (below Series G mark)
        - Down-round signal; 2021 vintage preference overhang activated; common equity impaired
        - Do not participate in IPO at <$8.5B; evaluate secondary market entry post-correction
      - - Abbott or Mayo Clinic strategic exit
        - Either investor sells stake, declines product integration, or ends partnership
        - Strategic validation withdrawn; CGM/data integration thesis collapses
        - Request emergency management call; pause pending confirmatory diligence
