  - id: TV006
    title: Final Diligence Asks
    description: >-
      Critical information gaps that must be resolved before IPO commitment, with why each matters and the diligence
      path.
    notes: Items are ranked by materiality to valuation; S-1 filing resolves most items but some require pre-IPO access.
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Diligence path
    rows:
      - - GAAP revenue vs. bookings reconciliation
        - WHOOP does not publicly disclose GAAP P&L; $1.1B is bookings, not ARR
        - Bookings to ARR bridge determines the true EV/revenue multiple; gap could halve apparent scale
        - S-1 financial statements; confidential CFO bridge pre-IPO
      - - Net revenue retention (NRR) by cohort
        - No public NRR or dollar-based retention metric disclosed
        - NRR >110% would justify SaaS premium; NRR <95% would signal commodity subscription
        - Cohort-level retention data; third-party analytics cross-check via mobile attribution
      - - Cap table and preference stack
        - $1.38B+ total raised; Series G pref terms undisclosed
        - Liquidation preference overhang reduces common equity share in exit below $10.1B headline
        - Cap table document; Series G certificate of incorporation via counsel
      - - Gross margin by segment
        - Hardware vs. subscription margin not publicly segmented; blended est. 45–55%
        - Subscription mix shift drives margin expansion story; hardware drag must be isolated
        - S-1 segment disclosures; investor day materials post-filing
      - - Abbott and Mayo Clinic integration roadmap
        - Strategic investment confirmed; product integration timeline not disclosed
        - CGM integration with Abbott Lingo + WHOOP could expand ARPU by $100–200/yr
        - Partnership agreement summary; product roadmap diligence with WHOOP management
      - - FDA 510(k) pipeline and regulatory posture
        - ECG cleared; BPI resolved; blood glucose / CGM path undisclosed
        - Clinical feature pipeline ceiling determines long-term ARPU and defensible moat
        - WHOOP regulatory affairs; FDA 510(k) database searches; regulatory counsel review
