      - number: '4.2'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: |
              WHOOP's unit economics are built around a subscription-first model where hardware acts as a
              loss-leader or break-even mechanism for member acquisition. Device COGS are estimated at
              $47–$62 per unit (2025 estimates before tariff impact), reflecting contract manufacturing in
              China with primary components including optical sensors, battery, and haptic motor. Section
              301 China tariffs, expanded in 2025, add an estimated 6–9% to COGS, translating to $5–12
              per unit of incremental cost that either compresses margins or requires retail price increases.
              The FDA warning letter received July 14, 2025, regarding Blood Pressure Insights creates
              financial uncertainty for a feature that differentiates the premium Life tier; remediation
              costs and potential feature withdrawal could depress Life tier conversion.

              Gross margin for the overall business is estimated at approximately 38% (FY2025), weighted
              toward the subscription software margin (~70%+) and pulled down by hardware COGS and
              physical logistics. Blended ARPU across tiers is estimated at approximately $250/year, with
              the Life tier ($359/yr) contributing disproportionately to gross profit per member. Annual
              member churn is estimated at 16–24%; WHOOP claims that WHOOP Coach engagement measurably
              reduces churn toward the lower end of this range by increasing in-app daily habit formation.
              At a $250 ARPU and 20% midpoint churn, expected member tenure is approximately 5 years and
              estimated gross LTV is approximately $590–$900 per member depending on tier mix and add-on
              penetration.

              Target CAC payback of under 18 months implies a CAC ceiling of approximately $250–$375 per
              acquired member (one year's subscription gross profit at 38% margin = ~$95; 18-month payback
              means CAC ≤ $142). In practice WHOOP's elite-athlete marketing, social media ambassador
              model, and enterprise-bundled acquisition likely generate blended CACs below $200. At that
              level, the LTV/CAC ratio exceeds 3:1 on a gross-profit basis, which is within acceptable
              range for a subscription hardware business though below the 5:1+ seen in pure SaaS.
