      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              WHOOP has raised approximately $979 million to $1.376 billion in total funding across eleven or more
              rounds from its Seed in July 2013 through the Series G closed on March 31, 2026. The funding history
              reflects a steady escalation in valuation from an undisclosed seed stage through unicorn status at $1.2
              billion in October 2020 (Series E) to the current $10.1 billion post-money valuation. The most recent
              round—$575 million in Series G—was led by Collaborative Fund and included notable strategic investors:
              Abbott (a major medical device manufacturer) and Mayo Clinic (a flagship health system), both of which
              signal WHOOP's ambition to enter clinical and reimbursed healthcare channels. Sovereign wealth funds Qatar
              Investment Authority and Mubadala Investment Company (UAE) provide international expansion capital and GCC
              market access.

              Athlete and celebrity investors participate both as financial backers and brand ambassadors. Cristiano
              Ronaldo, LeBron James, Rory McIlroy, Reggie Miller, and Virgil van Dijk each participated in the Series G.
              This network serves dual purposes: authentic endorsement for the brand in elite athletic circles and
              potential distribution in global sports markets. Prior prominent investors include SoftBank Vision Fund 2
              (lead on the $200 million Series F at $3.6 billion valuation in August 2021), IVP (multi-round investor
              from Series C through Series G), and Foundry Group.

              The Series G was announced alongside strong financial metrics: $1.1 billion bookings run rate at year-end
              2025 (up 103% year-over-year), operating cash-flow positivity, and more than 2.5 million members. CEO Will
              Ahmed told TechCrunch the company is doing "a lot of the no-regrets work to be a public company,"
              signaling IPO preparation without committing to a timeline. Bloomberg reported the raise is occurring
              ahead of a likely IPO. Total capital is earmarked for U.S. growth, talent, international expansion across
              Europe, GCC, Latin America, and Asia, and continued R&D investment.
