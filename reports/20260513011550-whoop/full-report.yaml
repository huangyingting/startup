  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >
              WHOOP competes in the intersection of consumer health wearables and subscription software services. The
              market is best understood through three nested scopes. The broadest is the global wearable technology
              market, which encompasses smartwatches, fitness trackers, smart rings, hearables, smart patches, and
              industrial wearables; this market is estimated at $109–115 billion in 2026. The serviceable scope for
              WHOOP's hardware and subscription business is the fitness and health tracker sub-segment, estimated at
              $49–70 billion in 2026 depending on source methodology. WHOOP's addressable market is narrower still: the
              premium recurring subscription health analytics segment, representing consumers willing to pay $199–$359
              per year; analysts estimate this sub-market at $8–12 billion globally in 2025.

              Included spend within WHOOP's market boundary covers wrist-worn and ring-form-factor biosensors that
              provide continuous physiological monitoring, companion mobile applications delivering coaching and
              insights, and recurring software subscriptions for advanced health analytics. Excluded from WHOOP's core
              market are hearables (fitness earbuds), smart glasses, GPS-only sports devices, implantable monitors, and
              clinical-grade continuous glucose monitors (CGMs) that require prescriptions—though CGM adjacency is
              growing. Key status-quo substitutes that compete for WHOOP's target buyers include the Apple Watch Series
              10 (one-time purchase with optional cellular plan), Garmin Forerunner and Fenix GPS watches, Fitbit Charge
              6, and Samsung Galaxy Watch, all of which offer health tracking without mandatory subscription fees.

              Adjacent markets with active boundary tension include corporate wellness platforms (estimated $50–60B
              globally in 2026), remote patient monitoring, and blood biomarker testing. WHOOP is actively expanding
              into all three adjacencies: WHOOP Unite targets enterprise wellness, WHOOP MG pursues clinical-grade
              monitoring, and WHOOP Advanced Labs offers on-demand blood panel testing. These adjacencies are
              simultaneously growth opportunities and regulatory risk vectors.
