      - number: '8.2'
        title: Valuation Context and Entry Discipline
        blocks:
          - type: paragraph
            body: |
              WHOOP's March 2026 Series G priced at $10.1B post-money — approximately 9.2× its
              $1.1B 2025 bookings run rate. The Series F in 2021 valued WHOOP at $3.6B; the Series G
              represents a 2.8× appreciation over five years against capital efficiency milestones that
              include positive cash flow (2025) and international scale (60% of revenue from 60 countries).
              Total raised capital exceeds $1.38B, implying a liquidation preference overhang that reduces
              common equity upside relative to the headline $10.1B. The preference stack — typically 1×
              non-participating liquidation in recent rounds — means common shareholders receive residual
              value after senior preferred are made whole. Entry discipline requires: (a) establishing
              the bookings-to-GAAP-revenue bridge before IPO pricing; (b) verifying cap-table waterfall
              and preference terms via the S-1; (c) sizing position to reflect the 20% probability
              bear-case scenario of $4–6B. The Series G valuation appears justified at current private
              market comps (Oura at $11B on 11× 2025E revenue), but trades at a meaningful premium to
              the public hardware/subscription comp range of 4.6–5.6× revenue (Dexcom, Garmin).
