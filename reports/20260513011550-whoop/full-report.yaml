chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              WHOOP, Inc. is an American consumer health and performance wearable company headquartered at One Kenmore
              Square, Suite 601, Boston, Massachusetts 02215. Founded in 2012 at the Harvard Innovation Labs by Will
              Ahmed, John Capodilupo, and Aurelian Nicolae, WHOOP designs screenless wrist-worn biosensors that
              continuously track physiological signals including heart rate variability, respiratory rate, sleep
              architecture, and cardiovascular strain. The company's central innovation is translating raw biometrics
              into three proprietary scores—Recovery, Strain, and Sleep—delivered through a mobile coaching application.

              WHOOP operates exclusively through a subscription-based hardware-as-a-service model. Customers pay for an
              annual or monthly membership rather than purchasing hardware outright; the wearable device is bundled with
              the subscription. As of May 2025, WHOOP offers three tiers: WHOOP One at $199 per year, WHOOP Peak at $239
              per year, and WHOOP Life at $359 per year, with each tier unlocking progressively more advanced health
              features. The WHOOP Life tier includes the WHOOP MG device with medical-grade ECG and blood pressure
              capabilities. This model drives predictable recurring revenue and creates durable subscriber retention
              incentives since members who upgrade hardware can continue their existing membership.

              WHOOP's product positioning has evolved from athlete performance optimization toward a broader personal
              health and longevity platform. The May 2025 launch of WHOOP 5.0 and WHOOP MG introduced Healthspan with
              WHOOP Age (physiological age calculation using nine biomarkers developed with the Buck Institute for
              Research on Aging), Heart Screener with FDA-cleared ECG, and Blood Pressure Insights. The company ships to
              56 countries, operates its app in six languages, and distributes through major retailers including Amazon,
              Best Buy, and Dick's Sporting Goods in the United States. A B2B platform, WHOOP Unite, serves corporate
              wellness programs and healthcare organizations as a secondary revenue stream alongside the primary
              consumer subscription.
