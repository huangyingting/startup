      - number: '7.4'
        title: People, Execution, and Business Model Risks
        blocks:
          - type: paragraph
            body: |
              WHOOP's key-person risk centers on founder-CEO Will Ahmed, who has led the company since
              2012 and whose personal brand is deeply intertwined with WHOOP's identity. Ahmed
              personally directed the FDA confrontation across four public channels (LinkedIn, CNBC,
              Bloomberg, X/Twitter). The FDA warning letter was addressed to Ahmed by name. No
              succession plan, co-CEO, president, or board-level succession framework has been
              disclosed publicly.

              WHOOP is scaling headcount by approximately 75% (~600+ new hires) in 2026, creating
              culture dilution and management bandwidth risk during a critical pre-IPO execution
              phase. Pre-IPO equity lacks the liquidity of public-company RSUs, creating retention
              pressure for senior engineers and product managers competing in the Boston/NYC talent
              market. WHOOP has not disclosed formal retention programs or severance packages for
              key technology leadership.

              The IPO execution risk is structural: WHOOP's Series G was priced at approximately
              20–25× revenue, versus public SaaS comparables at 8–12×. This implies sustained
              hypergrowth and FDA dispute resolution before IPO pricing. CEO Ahmed confirmed IPO as
              "our next step" in March 2026. A subscriber growth miss, unresolved FDA action, or
              deteriorating gross margin could trigger an IPO withdrawal or pricing below the
              $10.1B Series G valuation. The FTC 5th Circuit ruling in March 2026 may shift FTC
              enforcement to federal courts, potentially increasing enforcement aggressiveness against
              digital health platforms.

              Subscription churn compounds execution risk: 71% of companies reported in 2025 that
              price increases drove cancellations. At WHOOP's 16–24% estimated annual churn and
              2.5M member base, approximately 400,000–600,000 members must be replaced annually
              through new subscriber acquisition, sustaining high marketing spend dependency.
