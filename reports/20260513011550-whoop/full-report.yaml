  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Monetization
        blocks:
          - type: paragraph
            body: |
              WHOOP operates a hardware-as-a-service (HaaS) model in which the wearable device is bundled
              at no additional upfront cost into three annual subscription tiers: WHOOP One ($199/yr),
              WHOOP Peak ($239/yr), and WHOOP Life ($359/yr). This model eliminates the one-time hardware
              revenue lump and converts the entire revenue base into recurring subscription ARR, enabling
              predictable growth forecasting and investor-friendly SaaS-like metrics. WHOOP 5.0 (May 2025)
              and the medical-grade WHOOP MG are included in the subscription rather than sold separately.

              Beyond consumer subscriptions, WHOOP has layered two incremental revenue streams. WHOOP Labs
              (Advanced Labs) provides at-home blood biomarker analysis as an add-on ($100 for the first
              panel, ~$50 per subsequent test), introduced with WHOOP 5.0. WHOOP Unite, the enterprise
              B2B wellness platform, offers organizations a per-seat subscription that embeds WHOOP into
              employee benefits programs; over 200 enterprise clients have contracted the service as of
              early 2026. Hardware margin is intentionally thin at the device level, with COGS estimated
              at $47–$62 per unit; the business model is designed so subscription gross margin subsidizes
              hardware at acquisition.

              The revenue model bridge (FI001) shows the composition of WHOOP's estimated $1.1B 2025
              bookings run rate, anchored by a 2.5M member base generating approximately $250 ARPU, plus
              B2B and Labs increments. Year-over-year bookings growth was reported at 103% for 2025,
              representing the fastest organic growth in WHOOP's history and driven by international
              expansion (60% of new sales international), the WHOOP 5.0 hardware launch, and the three-tier
              subscription pricing upgrade from the legacy single-tier $30/month model.
