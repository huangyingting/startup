      - number: '7.5'
        title: Risk Mitigations and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              WHOOP's risk mitigation posture is active across multiple fronts. On the FDA dispute,
              WHOOP met with FDA on May 15 and May 27, 2025, and has retained regulatory counsel.
              The 510(k) clearance pathway—Apple's chosen route for its hypertension notification
              feature—remains available but carries a 12–24 month timeline. Alternatively, WHOOP
              could reframe BPI as a wellness "trend indicator" without displaying BP numbers, similar
              to how FDA created general wellness product codes (OCH, PGJ) for oximeters. RFK Jr.'s
              explicit endorsement of WHOOP in congressional testimony—delivered just weeks before
              FDA's warning letter—creates a political inconsistency that WHOOP may leverage in
              regulatory negotiations.

              On legal risk, WHOOP's offensive IP litigation (WHOOP v. Finerpoint/Bevel March 2026,
              WHOOP v. Lexqi February 2026 preliminary injunction) demonstrates IP-moat enforcement
              capability. Sanderson ARL exposure is addressable via improved disclosure UI and
              early settlement. Lomeli VPPA/CMIA risk requires a third-party SDK audit and data
              minimization program. Supply chain diversification to Vietnam, India, or Mexico is
              technically feasible but requires 6–12 months and capital investment. Abbott
              Laboratories and Mayo Clinic as Series G investors provide regulatory credibility and
              potential FDA navigation support. WHOOP's $575M Series G and 2025 cash-flow-positive
              status provide a 3–4 year runway without IPO dependency.

              Thesis-break triggers: (1) FDA issues consent decree or injunction requiring BPI
              removal, causing >10% incremental churn within 90 days; (2) combined litigation
              reserve exceeds $50M with no near-term settlement path; (3) COGS rises above 50% of
              revenue from tariff compounding, collapsing gross margin below 25%; (4) Omni MedSci
              optical-sensor patent suit results in a design-around affecting PPG/SpO2 accuracy.
