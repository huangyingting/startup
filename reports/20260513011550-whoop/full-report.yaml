      - number: '1.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Subscription Bundling Creates Durable Revenue Flywheel
            body: >
              WHOOP's hardware-as-a-service model—where members pay annually rather than for hardware— generates high
              recurring revenue predictability and strong retention incentives. At $1.1 billion bookings run rate with
              103% YoY growth and operating cash-flow positivity, the model has matured to self-funding scale with
              significant capital runway from the Series G to accelerate international expansion.
            calloutType: strength
            claimRefs:
              - CO012
              - CO013
              - CO038
          - type: callout
            title: FDA Dispute Over Blood Pressure Insights Creates Regulatory Overhang
            body: >
              The FDA's July 2025 warning letter characterizes WHOOP's Blood Pressure Insights feature as an unapproved
              medical device, creating potential regulatory exposure including seizure or injunction. WHOOP has elected
              to continue marketing the feature without clearance, arguing the wellness software exemption applies. This
              dispute is unresolved as of May 2026 and is a material risk ahead of any IPO, given that an FDA
              enforcement action could force product modification, removal, or costly regulatory submission processes.
            calloutType: risk
            claimRefs:
              - CO026
              - CO027
              - CO028
              - CO029
          - type: callout
            title: Strategic Investor Base Signals Dual-Track Healthcare Ambition
            body: >
              The inclusion of Abbott (medical devices) and Mayo Clinic (flagship health system) as Series G strategic
              investors, alongside WHOOP's selection into the CMS Innovation Center ACCESS program, signals an explicit
              strategy to transition from consumer wearables into reimbursed healthcare delivery. This dual-track
              ambition expands the total addressable market but also increases regulatory complexity and clinical
              validation requirements.
            calloutType: insight
            claimRefs:
