summary:
  headline: WHOOP 进入 2026 年时具备可信的 IPO 可选性，bookings 增长 103%，$10.1B 估值偏贵；但对照最接近的私营可比公司 Oura，再加上正向自由现金流支撑，这一估值仍可辩护。
