company:
  name: WHOOP
chapter:
  number: 8
  title: Valuation
  summary: >
    WHOOP's March 2026 Series G priced at $10.1B — approximately 9.2× its $1.1B bookings run
    rate — with Abbott Laboratories and Mayo Clinic as strategic investors. A conditional buy
    is warranted at current entry: the base case (50% probability) projects a $12–15B IPO
    valuation in 2027–2028 yielding a 1.2–1.5× MOIC; the bull case (30%) sees $18–22B on
    Abbott CGM integration and ARPU expansion; the bear case (20%) compresses to $4–6B if FDA
    re-escalates or Apple Watch erodes subscriber growth. Critical diligence gaps — GAAP revenue
    vs. bookings reconciliation, NRR, and the cap-table preference stack — must be resolved at
    S-1 filing before a full commitment.

sections:
  - id: SX801
    title: "Investment Thesis and Anti-Thesis"
    body: |
      WHOOP's investment thesis rests on four reinforcing pillars: (1) subscription scale
      at $1.1B bookings run rate (103% YoY growth) with 2.5M+ members generating high-margin
      recurring revenue; (2) a clinical-grade data flywheel where 24/7 longitudinal biometric
      data from millions of users compounds AI model accuracy and creates switching-cost moats;
      (3) strategic healthcare investor validation from Abbott Laboratories and Mayo Clinic,
      mirroring the Dexcom–Oura pattern that preceded product integration and ARPU expansion;
      and (4) a $185–222B wearable TAM growing at 15–18% CAGR through 2030. The FDA resolution
      in January 2026 — which retained Blood Pressure Insights as a validated wellness biomarker
      — removed the single largest near-term regulatory overhang. The anti-thesis centers on
      (a) bookings-to-GAAP-revenue opacity: $1.1B bookings does not equal $1.1B ARR, and deferred
      revenue recognition inflates apparent multiples; (b) Apple Watch and Samsung Galaxy Watch
      competing on increasingly overlapping features at hardware-bundled pricing WHOOP cannot
      match; (c) the valuation premium of 9.2× bookings leaves a thin margin of safety — Peloton
      at its peak was valued at >$50B before compressing to ~$2.5B; and (d) an IPO market
      requiring sustained 30%+ growth that has not been independently audited. The conditional
      buy call requires monitoring all four pillars quarterly.
    claimRefs: [CV029, CV030, CV031, CV034, CV035, CV036, CV037]
    sourceRefs: [SV001, SV003, SV010, SV011, SV012, SV014, SV020]
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]

  - id: SX802
    title: "Valuation Context and Entry Discipline"
    body: |
      WHOOP's March 2026 Series G priced at $10.1B post-money — approximately 9.2× its
      $1.1B 2025 bookings run rate. The Series F in 2021 valued WHOOP at $3.6B; the Series G
      represents a 2.8× appreciation over five years against capital efficiency milestones that
      include positive cash flow (2025) and international scale (60% of revenue from 60 countries).
      Total raised capital exceeds $1.38B, implying a liquidation preference overhang that reduces
      common equity upside relative to the headline $10.1B. The preference stack — typically 1×
      non-participating liquidation in recent rounds — means common shareholders receive residual
      value after senior preferred are made whole. Entry discipline requires: (a) establishing
      the bookings-to-GAAP-revenue bridge before IPO pricing; (b) verifying cap-table waterfall
      and preference terms via the S-1; (c) sizing position to reflect the 20% probability
      bear-case scenario of $4–6B. The Series G valuation appears justified at current private
      market comps (Oura at $11B on 11× 2025E revenue), but trades at a meaningful premium to
      the public hardware/subscription comp range of 4.6–5.6× revenue (Dexcom, Garmin).
    claimRefs: [CV001, CV002, CV003, CV007, CV008, CV009, CV010]
    sourceRefs: [SV003, SV004, SV005, SV006, SV007, SV021, SV022, SV024, SV025]
    tableRefs: []
    figureRefs: [FV002, FV003]

  - id: SX803
    title: "Bull / Base / Bear Scenarios"
    body: |
      The bull case (30% probability) assumes WHOOP executes its 2026 hiring plan (600+ roles),
      Abbott delivers a commercial CGM integration by H2 2026, BPI remains live, ARPU expands
      toward $350+ with Advanced Labs adoption, and WHOOP files an S-1 in late 2026 for a 2027
      IPO at 14× forward revenue — yielding an $18–22B EV and a 1.8–2.2× return from $10.1B
      entry. The base case (50% probability) assumes 30–40% bookings growth, FDA risk contained,
      subscription mix improving, and an IPO in 2027–2028 at 8–10× forward revenue of $1.3–1.5B,
      yielding $12–15B and a 1.2–1.5× return. The bear case (20% probability) assumes FDA
      re-escalation forces BPI removal, Apple Watch penetration accelerates U.S. subscriber
      attrition, bookings growth decelerates below 20%, and the IPO is delayed to 2029+ or
      priced at Peloton-like 4–6× multiple, yielding $4–6B and capital impairment. The
      probability-weighted expected value is approximately $12.0B, a 19% premium to the
      $10.1B entry, implying a 12–15% gross IRR over a 2.5-year hold — acceptable for a
      late-stage private position with high execution risk.
    claimRefs: [CV040, CV041, CV042, CV043, CV044]
    sourceRefs: [SV010, SV011, SV014, SV015, SV018, SV026, SV027]
    tableRefs: [TV003]
    figureRefs: []

  - id: SX804
    title: "Comparable Valuation Set"
    body: |
      Public hardware-subscription comparables anchor the floor valuation. Garmin (GRMN)
      trades at 5.6× EV/revenue and 19.2× EV/EBITDA on $7.5B revenue with 59% gross margin —
      a profitable, diversified archetype WHOOP aspires to in steady state. Dexcom (DXCM)
      at 4.6× EV/revenue and 14× EV/EBITDA with SaaS-like CGM recurring revenue demonstrates
      what health subscription can earn at scale. Peloton (PTON) at 1× price/sales on declining
      2.8M subscribers provides the bear-floor scenario: a beloved brand that lost the growth
      narrative collapsed from >$50B to $2.5B. Among private comps, Oura Ring at $11B on $500M
      2024 revenue (11× forward) is the nearest single benchmark, though Oura's hardware-heavy
      mix and ring form factor differ from WHOOP's wrist-based subscription-first model. Noom
      ($3.66B / 3.7× ARR) and Calm ($2.0B / 3.4× ARR) bound the consumer wellness subscription
      floor. SaaS Capital's 2025 median of 7× run-rate ARR and Aventis Advisors' hardware M&A
      median of 1.4× EV/revenue bracket the range: WHOOP's 9.2× falls above both, justified
      by growth velocity but vulnerable to compression in a rising-rate environment.
    claimRefs: [CV012, CV013, CV014, CV015, CV016, CV017, CV018, CV019, CV020, CV021, CV022, CV023, CV024]
    sourceRefs: [SV006, SV007, SV008, SV009, SV010, SV011, SV016, SV017, SV018, SV019, SV021, SV022]
    tableRefs: [TV004]
    figureRefs: []

  - id: SX805
    title: "Exit Readiness and Final Diligence Asks"
    body: |
      WHOOP's most likely exit is a 2027 IPO, with CEO Will Ahmed explicitly stating it as
      the "next step" post-Series G. The digital health IPO window reopened in 2025 with
      Hinge Health's $437M IPO and Omada Health's debut, and 2026–2027 conditions are projected
      to remain moderately favorable for $1B+ ARR platforms with a path to profitability.
      A secondary exit path is strategic acquisition by Abbott Laboratories, which mirrors
      Dexcom's investment in Oura (2024) that evolved into a CGM product partnership. Abbott
      could offer $10.5–13.5B (5–25% premium to Series G), though this would dilute returns
      relative to an IPO bull case. Final diligence asks before commitment include: GAAP revenue
      vs. bookings reconciliation (critical for IPO modeling), net revenue retention by member
      cohort (not publicly disclosed), cap-table waterfall and preference terms, gross margin
      segmented by hardware vs. subscription, and Abbott/Mayo integration roadmap. Until the
      S-1 is filed, the GAAP revenue gap represents the single largest information risk in the
      investment case, as the valuation premium depends on demonstrating recurring subscription
      economics rather than hardware-lumpy GAAP figures.
    claimRefs: [CV005, CV006, CV011, CV025, CV026, CV027, CV028, CV032, CV033]
    sourceRefs: [SV003, SV004, SV013, SV014, SV015, SV023, SV025, SV026, SV027, SV029]
    tableRefs: [TV005, TV006]
    figureRefs: [FV004]

