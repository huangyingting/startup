evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: valuation
    missingEvidence: >-
      Specific Series D valuation in USD at the time of the April 2025 raise; CEO explicitly declined to disclose this
      metric publicly.
    whyItMatters: >-
      Without a disclosed valuation, investors cannot independently assess entry price, implied multiple, or expected
      return profile for any secondary or follow-on investment in Thunes.
    diligencePath: >-
      Request the Series D term sheet or investor presentation from management during formal due diligence; review any
      409A or secondary transaction records through data room.
    relatedQuestionRefs:
      - QO004
  - type: missing-source
    severity: material
    topic: leadership
    missingEvidence: >-
      Public announcement or explanation of Floris de Kort's departure as CEO of Thunes sometime after the April 2025
      Series D and before May 2026.
    whyItMatters: >-
      CEO departures within 12 months of a major funding round may signal disagreements on strategy, performance issues,
      or governance conflicts; the lack of disclosure is an unresolved diligence flag.
    diligencePath: >-
      Request a formal explanation from management and board; review any investor call transcripts or communications
      from the June-December 2025 period; check LinkedIn for de Kort's subsequent employment for timeline signals.
    relatedQuestionRefs:
      - QO013
    relatedTableRefs:
      - TO002
  - type: private-evidence-only
    severity: material
    topic: financials
    missingEvidence: >-
      Detailed P&L, balance sheet, gross margin, net income, headcount, and customer count metrics for Thunes; the
      company has not published audited financial statements.
    whyItMatters: >-
