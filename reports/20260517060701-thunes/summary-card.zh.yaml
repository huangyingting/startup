summary:
  headline: >
    Thunes 拥有宽监管牌照栈（MAS、FCA、ACPR、HK MSO、美国 50 州 MTL）、覆盖 130+ 国家和地区的自有 Direct Global Network， 并在 Series D 披露 EBITDA
    为正，是最可信的私有 B2B 跨境支付基础设施平台之一；但 Series D 估值、经审计财务和量化留存指标都未披露， 数据室开放前，投资确信度仍只能停在观察区间。
