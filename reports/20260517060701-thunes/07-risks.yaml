chapter:
  number: 7
  title: Risks
  summary: >-
    Thunes faces five principal risk clusters. Stablecoin and regulatory risk is the most
    distinctive: the EBA's February 2026 opinion ending the PSD2/MiCA No-Action Letter period
    on 2 March 2026 directly affects Thunes' EU USDC settlement operations, and US MTL licenses
    acquired in all 50 states remain "subject to regulatory approval" with final approval still
    pending in certain jurisdictions. Operational risk is elevated by financial opacity — Thunes
    publishes only a revenue run-rate ($150M) and positive EBITDA claim, with no audited P&L or
    cash flow statement available publicly. Partner concentration risk is material: Visa, Mastercard,
    Circle, Ripple, and SWIFT connectivity collectively constitute critical infrastructure
    dependencies. Competitive risk is substantial from Airwallex ($5.6B), Wise Platform (public,
    LSE:WISE), and Nium ($1.4B) all expanding direct network footprints into Thunes' target
    corridors. Key-person risk is elevated by the January 2024 CEO transition (new CEO Floris de
    Kort, approximately 16 months tenure as of May 2026). No enforcement actions, fines, or
    material litigation against Thunes were identified in public records; positive EBITDA
    differentiates Thunes from loss-making peers.

sections:
  - id: regulatory-and-legal-risk
    title: Regulatory and Legal Risk
    body: >-
      Thunes operates under a multi-jurisdiction regulatory framework that is simultaneously its
      primary competitive advantage and its most operationally complex risk cluster. The company
      holds a Major Payment Institution (MPI) license from the Monetary Authority of Singapore
      (MAS), an Authorised Payment Institution (API) authorization from the UK Financial Conduct
      Authority (FCA), a Payment Institution license from France's Autorité de Contrôle Prudentiel
      et de Résolution (ACPR, obtained April 2023), a Money Service Operator (MSO) license in
      Hong Kong, and money transmitter licenses in all 50 US states through Thunes Financial
      Services — though these remain "subject to regulatory approval" per multiple public
      announcements, signalling that final approval may still be pending in certain jurisdictions.
      The US MTL caveat is material: New York DFS and California DFPI operate demanding money
      transmitter licensing regimes, and New York's virtual currency regulatory framework could
      complicate stablecoin-related operations in the US market.

      The European Banking Authority issued an opinion on 12 February 2026 stating that the
      No-Action Letter transition period governing the PSD2/MiCA interplay ends on 2 March 2026.
      This directly affects Thunes' USDC settlement operations with Circle in EU jurisdictions:
      e-money token (EMT) transactions using USDC require coordination between PSD2 authorisation
      frameworks and MiCA compliance by the issuer. If Circle's USDC fails to obtain or maintain
      EMT status under MiCA, Thunes' EU stablecoin settlement capability could be suspended pending
      re-authorisation. Separately, Ripple Payments, integrated into Thunes' SmartX Treasury System
      in September 2025, carries residual US regulatory perception risk following the resolution
      of the SEC's XRP enforcement case.

      The FATF 40 Recommendations define the international AML/CFT legal framework applicable to
      Thunes across all operating jurisdictions; non-compliance with FATF standards in any
      jurisdiction creates the risk of correspondent banking withdrawal, regulatory examination, or
      license suspension. Thunes' in-house Fortress Compliance Platform (built partly through the
      April 2022 acquisition of Tookitaki's majority stake) provides integrated AML/CFT screening
      — a structural mitigation. No MAS, FCA, ACPR, or US state regulatory enforcement actions,
      fines, or sanctions against Thunes were identified in any public record as of May 2026, and
      NMLS Consumer Access confirms Thunes' US money transmission licensing is publicly trackable.
