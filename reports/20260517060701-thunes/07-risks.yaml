  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financial opacity
      missingEvidence: >-
        Audited annual financial statements for FY2023 and FY2024, including P&L, cash flow
        statement, balance sheet, and revenue breakdown by geography and product line.
      whyItMatters: >-
        Without audited financials, investors cannot verify the positive EBITDA claim, assess
        capital efficiency, determine burn rate trajectory, or confirm financial sustainability
        of the US expansion. US enterprise and FI partners may also require audited financials
        before signing major infrastructure agreements.
      diligencePath: >-
        Request audited FY2023 and FY2024 financials via private data room; confirm EBITDA
        definition and reconciliation to operating cash flow; request revenue breakdown by
        geography (Americas, Europe, EMEA, APAC) and product line (pay, accept, stablecoin).

    - type: missing-source
      severity: material
      topic: US MTL regulatory approval
      missingEvidence: >-
        State-by-state confirmation of final regulatory approval status for all 50 US MTL
        applications filed through Thunes Financial Services, particularly for NY DFS and CA DFPI.
      whyItMatters: >-
        The "subject to regulatory approval" qualifier in multiple public announcements indicates
        some approvals may still be pending. NY and CA represent major remittance and B2B payment
        markets that are essential to the US expansion thesis.
      diligencePath: >-
        Query NMLS Consumer Access for Thunes Financial Services; request state-by-state approval
        status from management; confirm NY DFS and CA DFPI application timelines from state dockets.
      relatedTableRefs:
        - TR001

    - type: private-evidence-only
      severity: material
      topic: revenue concentration
      missingEvidence: >-
        Revenue concentration data — percentage of total Thunes revenue attributable to top 3
        network members (e.g., Uber, Grab, Deliveroo) and to top commercial partners (Visa, Mastercard).
      whyItMatters: >-
        If any single network member exceeds 15 to 20 percent of revenue, Thunes faces significant customer
        concentration risk. Without concentration data, the partner/dependency risk cannot be
        fully quantified.
      diligencePath: >-
        Request revenue by top-10 network member and by top commercial partner from data room;
        confirm NRR and churn metrics for DGN membership.
      relatedQuestionRefs:
        - QR016
        - QR018

    - type: missing-source
      severity: material
      topic: Fortress Compliance Platform certification
      missingEvidence: >-
        Independent audit, regulatory acknowledgement, or third-party certification of Thunes'
        Fortress Compliance Platform for AML/CFT effectiveness, false-positive rates, and
        SAR filing accuracy.
      whyItMatters: >-
        An unaudited compliance platform creates regulatory examination risk; if MAS, FCA, or ACPR
        conduct an AML/CFT examination and find deficiencies, Thunes could face enforcement action
        or be required to use a regulator-approved third-party system.
      diligencePath: >-
        Request any MAS/FCA examination letters referencing AML/CFT compliance; request SAR
        filing volume and false-positive rates; confirm whether Fortress has achieved any
        regulatory-body sign-off.
      relatedQuestionRefs:
        - QR009
        - QR032

    - type: missing-source
      severity: material
      topic: SmartX Treasury System stress-testing
      missingEvidence: >-
        Independent stress-test results or liquidity management audit for Thunes' SmartX Treasury
        System covering FX liquidity adequacy across 80-plus currencies under extreme market
        conditions (e.g., EM currency crisis, liquidity crunch in exotic corridors).
      whyItMatters: >-
        FX liquidity failures during peak transaction periods or EM currency crises could delay
        settlements, triggering contractual penalty exposure and network member churn.
      diligencePath: >-
        Request liquidity stress-test methodology, worst-case FX shortfall scenario modelling,
        and FX liquidity provider identity and concentration from data room.
      relatedQuestionRefs:
        - QR020
        - QR032

    - type: private-evidence-only
