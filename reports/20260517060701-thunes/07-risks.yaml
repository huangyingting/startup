  - id: operational-and-financial-risk
    title: Operational and Financial Risk
    body: >-
      Thunes' primary operational risk is financial opacity. The company publicly states a revenue
      run-rate of $150 million and positive EBITDA as of April 2025, but these figures are
      company-claimed and unaudited — no independent third-party verification, audited financial
      statements, or detailed P&L breakdown is publicly available for any fiscal year since the
      2019 rebrand. This is a common private company disclosure practice but creates material
      investment opacity: investors cannot independently verify the EBITDA margin, the revenue
      growth trajectory across recent quarters, the capital deployment efficiency of the $150M
      Series D, or whether positive EBITDA is sustained across all business units including the
      Tilia acquisition. The distinction between "positive EBITDA" and free cash flow is
      significant — a company can show EBITDA-positive metrics while still consuming cash through
      working capital expansion, integration capex for acquisitions, and accelerated US market
      headcount growth.

      The June 2025 acquisition of Tilia (gaming and virtual currency payments platform, formerly
      a subsidiary of Linden Lab / Second Life) introduces integration and execution risk. Tilia
      operates in the gaming, virtual economy, and metaverse payment space — a meaningful
      adjacency to Thunes' core cross-border B2B infrastructure but with its own user base,
      regulatory touch points, and virtual currency licensing obligations. Integration of Tilia's
      systems, compliance frameworks, and operational staff into Thunes' global infrastructure
      requires management bandwidth and capital. Thunes completed two prior acquisitions
      (Limonetik 2021, Tookitaki majority stake 2022) and has not disclosed material integration
      difficulties in public records, suggesting some acquisition integration capability; however,
      the Tilia transaction is larger and more operationally complex than its predecessors.

      API reliability and operational continuity are undisclosed risks: Thunes does not publish
      service level agreements or API uptime data in its public-facing product documentation. For
      a network whose members include Uber, Deliveroo, and Grab — gig economy platforms with
      real-time payout dependencies — the absence of disclosed uptime commitments creates
      enterprise trust gaps and potential contractual liability exposure in the event of settlement
      delays or network outages. FX liquidity management through the SmartX Treasury System covers
      80-plus currencies and real-time FX settlement, but no independent audit of the system's
      liquidity adequacy or stress-test results has been disclosed publicly.
