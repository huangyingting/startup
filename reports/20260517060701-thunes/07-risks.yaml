  - id: partner-and-dependency-risk
    title: Partner and Dependency Risk
    body: >-
      Thunes' Direct Global Network is structurally dependent on a cluster of critical commercial
      and infrastructure partnerships that collectively constitute a multi-layered dependency stack.
      Visa Direct, integrated in October 2022 and expanded to Asia and Africa in March 2024, is
      arguably Thunes' most strategically important partner: Visa's 14,900-plus financial
      institution clients access Thunes' send-to-wallet functionality via the Visa Direct
      integration, enabling payouts to over 108 digital wallet types across 190-plus countries.
      Visa also participated as an investor in Thunes' July 2023 Series C extension, creating
      partial strategic alignment — but commercial arrangements of this nature are typically
      terminable on notice, and Visa could negotiate revised terms or route volume through
      competing infrastructure.

      Mastercard partnered with Thunes in November 2025 for stablecoin payout services using
      USDC. Circle became Thunes' primary stablecoin settlement partner in October 2024. Ripple
      Payments was integrated into Thunes' SmartX Treasury System in September 2025. This creates
      a multi-layer stablecoin dependency stack: Thunes' digital asset payment capabilities depend
      on Circle (USDC issuance and MiCA compliance), Mastercard (distribution channel for stablecoin
      payouts), and Ripple (blockchain infrastructure). Regulatory adverse action against any of
      these partners — Circle's MiCA compliance window, Ripple's US positioning post-SEC settlement
      — would cascade to Thunes' stablecoin revenue and product offering. SWIFT connectivity
      (launched October 2025) enables the 11,000-plus banks on the SWIFT network to access
      Thunes' mobile wallet network, creating critical infrastructure dependency: any SWIFT
      connectivity restriction in a given corridor (geopolitical or regulatory scenario) would
      disable that corridor's bank-to-wallet flow.

      Thunes' geographic concentration in emerging markets (Africa, Asia, Latin America) creates
      specific corridor risk: country-level regulatory changes, capital controls, mobile wallet
      operator operational issues, or central bank restrictions can close corridors rapidly.
      Correspondent banking de-risking — where major international banks withdraw from certain
      emerging market payment corridors due to risk appetite and compliance cost constraints — is
      a secular trend documented by BIS and FSB that could reduce liquidity and increase operating
      costs for Thunes' network members in affected markets.
