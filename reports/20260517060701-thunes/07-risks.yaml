callouts:
  - title: MiCA / Circle Compliance Window Is the Most Time-Sensitive Regulatory Risk
    calloutType: risk
    body: >-
      The EBA's 12 February 2026 opinion ending the No-Action Letter transition period for PSD2/MiCA
      interplay on 2 March 2026 is Thunes' most time-sensitive regulatory risk. Thunes' EU stablecoin
      settlement capability — launched October 2024 via Circle/USDC and expanded with Mastercard in
      November 2025 — depends on Circle maintaining MiCA-compliant e-money token (EMT) authorisation
      status in the EU. A compliance shortfall on Circle's side does not constitute a Thunes regulatory
      failure, but it would force Thunes to suspend EU USDC settlement operations, impairing the
      stablecoin revenue line and the product differentiation narrative. Investors should request
      Circle's current MiCA EMT authorisation status, Thunes' contingency operating plan if USDC is
      disrupted, and the percentage of Thunes' current settlement volume denominated in USDC.
    claimRefs:
      - CR008
      - CR009
      - CR021
      - CR035

  - title: Financial Opacity Is a Structural Diligence Gap for Enterprise and Investor Counterparties
    calloutType: risk
    body: >-
      Thunes' "revenue run-rate of $150M and positive EBITDA" disclosure (April 2025 Series D) is
      company-stated and unaudited. No audited financial statements for any fiscal year since the
      2019 rebrand are publicly available. For a company planning significant US enterprise market
      expansion, this opacity is a structural diligence gap: large US financial institutions and
      enterprise SaaS buyers routinely require two to three years of audited financials before
      signing major infrastructure agreements. The $150M Series D was secured from private equity
      (Apis Partners, Vitruvian Partners) — investors accustomed to private company opacity — but
      the US market expansion will encounter a different disclosure standard. Investors should
      obtain full audited financials and a breakdown of revenue by geography, product line, and
      major network member concentration.
    claimRefs:
      - CR011
      - CR012
      - CR028
      - CR036

