  - id: technology-architecture
    title: Technology and Operating Architecture
    body: >-
      Thunes' platform is built around three interconnected technology pillars that operate as a
      vertically integrated payment infrastructure stack. At the connectivity layer, the Direct
      Global Network maintains 720 direct Member integrations across 140 countries — Americas
      (18 countries), Europe (40-plus countries), MENA (12 countries), Asia-Pacific (25-plus
      countries), and Africa (35-plus countries). Unlike correspondent-banking chains that route
      through multiple intermediaries, DGN connections are direct, enabling 85% of transactions
      to settle immediately while sustaining 99.99% platform uptime. The network spans 220
      payment methods across 90 currencies.

      At the financial intelligence layer, SmartX Treasury manages real-time FX optimisation and
      liquidity management in 90 currencies, offering transparent wholesale FX pricing with no
      hidden fees and full transaction-cost visibility. In September 2025, Thunes integrated
      Ripple Payments into SmartX Treasury, extending digital-asset liquidity pathways for Members
      serving digital-asset use cases. At the compliance layer, Fortress Compliance embeds AML risk
      controls, KYC/KYB verification, and sanctions screening across all 50 regulatory markets,
      with machine-learning-driven transaction monitoring from the Tookitaki engine acquired in
      April 2022.

      All three pillars are accessed through a single REST API exposed at docs.thunes.com. In
      October 2025, Thunes extended its integration surface by enabling SWIFT connectivity,
      allowing the 11,000-plus banks on the SWIFT network to reach Thunes' 4 billion bank
      account and digital wallet endpoints without any new API integration. A Business Hub
      no-API option is also offered for smaller Members without dedicated engineering resources.
      Thunes does not publicly disclose its cloud provider, database technology, or underlying
      programming language stack — consistent with enterprise payment infrastructure operating
      models where provider concentration and stack details are commercially sensitive.
