figures:
  - id: FE001
    title: Thunes platform architecture — three-pillar stack
    type: stack
    description: >-
      Thunes' payment infrastructure organised as five technology layers from client
      integration through product modules, infrastructure pillars, and network endpoints,
      showing key components at each level.
    claimRefs:
      - CE001
      - CE002
      - CE006
      - CE018
      - CE019
      - CE041
    data:
      layers:
        - label: Client Integration Layer
          modules:
            - Single REST API (docs.thunes.com — Money Transfer and Collection APIs)
            - SWIFT Connectivity (for 11,000+ SWIFT member banks; no new API required)
            - Business Hub (no-API access option for smaller Members)
            - Webhook Notifications (real-time payment status events)
          note: Single integration point for all Pay and Accept products across 140 countries
        - label: Product Layer — Pay
          modules:
            - Pay-to-Mobile-Wallets (145 brands; 4B accounts; 98% instant)
            - Pay-to-Banks (8B accounts; 60 real-time countries; 140 total)
            - Pay-to-Cards (15B+ cards; Visa, Mastercard, UnionPay)
            - Pay-to-Stablecoin-Wallets (USDC/USDT; 140+ countries; 24/7)
            - Business Payments (local ACH 50+ countries; USD wire 170+ countries)
          note: Five pay modules share DGN connectivity; stablecoin via licensed-partner model
        - label: Product Layer — Accept
          modules:
            - Accept Mobile Wallets (145 brands; 36+ settlement currencies; Magento/Mirakl plugins)
            - Accept Bank Payments (Open Banking + traditional; developed and emerging markets)
            - Accept BNPL
            - Accept Digital Vouchers
          note: Accept modules feed inbound flows into DGN settlement; FX at point of collection
        - label: Infrastructure Pillars
          modules:
            - Direct Global Network — 720 Members; 140 countries; 220 payment methods; 85% immediate settlement
            - SmartX Treasury — transparent FX; 90 currencies; Ripple Payments integration (Sep 2025)
            - Fortress Compliance — 50 licences; embedded AML/KYC/KYB; Tookitaki ML engine
          note: All three pillars operate in parallel behind all Pay and Accept products
        - label: Network Endpoints
          modules:
            - Local Banks and Real-Time Rails (60+ countries instant payment systems)
            - Mobile Network Operators and eWallets (145 brands across 140 countries)
            - Card Networks (Visa, Mastercard, UnionPay; + Amex/JCB/UnionPay via Tilia)
            - Stablecoin Wallets (USDC via Circle partnership; USDT)
            - SWIFT Network (11,000+ member banks accessing DGN)
          note: 99.99% platform uptime; 98% quality-of-service success rate across all endpoints

