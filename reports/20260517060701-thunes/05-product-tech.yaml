chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Thunes delivers cross-border payment infrastructure through its proprietary Direct Global Network
    (DGN), connecting 720 Members across 140 countries to 4 billion mobile and stablecoin wallets,
    8 billion bank accounts, and 15 billion cards via a single REST API. The platform rests on three
    technology pillars — Direct Global Network (connectivity), SmartX Treasury (FX and liquidity in
    90 currencies), and Fortress Compliance (50 regulatory licenses, embedded AML/KYC). A growing
    stablecoin layer is anchored by Circle (USDC settlements, October 2024), Mastercard Move
    (stablecoin wallet payouts, November 2025), and Ripple (SmartX Treasury integration, September
    2025). With PCI DSS and ISO 27001 certifications, publicly reported 99.99% platform uptime, and
    a gated B2B developer model typical of licensed payment infrastructure, Thunes' technical moat
    is built on regulatory breadth, 720 direct network integrations, and compliance orchestration
    rather than disclosed proprietary software IP.

sections:
  - id: product-suite-overview
    title: Product Suite Overview
    body: >-
      Thunes organises its commercial offering along two axes — Pay and Accept — both delivered
      through a single API gateway into the Direct Global Network. The Pay dimension spans five
      modules. Pay-to-Mobile-Wallets connects enterprise clients to 145 mobile wallet brands and
      4 billion mobile and stablecoin wallet accounts worldwide, achieving 98% of transactions
      settled instantly. Pay-to-Banks provides access to 8 billion bank accounts across 140
      countries, including real-time payment systems in 60 countries, and is priced at up to
      ten times less than traditional correspondent-bank wires. Pay-to-Cards reaches 15 billion-plus
      cards across Mastercard, Visa, and UnionPay with PCI-DSS-certified tokenization and 24/7
      availability. Pay-to-Stablecoin-Wallets supports USDC and USDT payouts to 140-plus countries,
      covering over 80% of stablecoin payout demand with near-instant, around-the-clock settlement.
      Business Payments provides local ACH access in 50-plus countries across 30-plus currencies
      and USD wire transfers to 170-plus countries, positioning Thunes as a single-contract
      replacement for traditional correspondent banking relationships.

      The Accept dimension offers four complementary collection modules: Accept Mobile Wallets
      (145 brands, settlement in 36-plus currencies, with plugins for Magento and Mirakl),
      Accept Bank Payments (Open Banking and traditional bank transfers), Accept BNPL, and
      Accept Digital Vouchers. All products share the same three-pillar infrastructure beneath
      them. The June 2025 acquisition of Tilia added card acceptance capabilities — Visa,
      Mastercard, American Express, JCB, and UnionPay — and an additional 48 US state and
      territory payment licenses, creating a US market anchor and extending Thunes' payout
      product into card acceptance. Thunes targets eight industry verticals: Banks and Neobanks,
      Mobile Wallets, Payment Service Providers, Gig Economy Platforms, MTOs, Digital Asset
      Companies, E-commerce, and Payroll and EOR platforms. Representative enterprise Members
      include Uber, Deliveroo, Grab, WeChat, and global MTOs.
