  - id: developer-experience
    title: Developer Experience and Integration
    body: >-
      Thunes operates a gated developer model consistent with licensed enterprise B2B payment
      infrastructure. API documentation is hosted at docs.thunes.com, covering Money Transfer
      APIs for payment initiation and Collection APIs for acceptance, with documented support
      for banks, MTOs, PSPs, platforms and marketplaces, and eWallets. Integration paths include
      standard REST API connectivity, SWIFT-based access for financial institutions, and the
      Business Hub no-API pathway for Members without dedicated engineering teams.

      Unlike developer-first platforms such as Stripe (self-service sandbox, extensive public
      documentation) or Moov.io (open-source payment infrastructure with community-maintained
      GitHub libraries), Thunes does not operate a public GitHub organisation and has zero
      Stack Overflow questions tagged "thunes" as of May 2026. Developer engagement occurs
      through direct sales and onboarding channels rather than a public developer community,
      which is standard for licensed payment infrastructure where regulatory KYB onboarding
      and contract execution precede API credential issuance. This gated model does not
      impede high-volume production deployment — Members including Uber, Deliveroo, and Grab
      demonstrate enterprise-scale usage at global volumes. However, the absence of a public
      developer community does reduce organic developer discovery and self-service adoption
      velocity compared with developer-first payment API platforms. The absence of a public
      status page (status.thunes.com did not resolve as of May 2026) is an additional
      operational transparency gap relative to enterprise SaaS peers that publish live
      incident dashboards. The SWIFT connectivity option significantly reduces integration
      overhead for banking institution Members, which represent a large addressable segment
      of Thunes' growth opportunity in the 2025-2026 US expansion phase.
    claimRefs:
