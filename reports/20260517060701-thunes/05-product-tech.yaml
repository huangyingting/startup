  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: reliability
      missingEvidence: >-
        Contractual API uptime SLA commitment level, penalties for breach, and 12-month
        historical incident log with MTTD/MTTR metrics are not publicly disclosed.
      whyItMatters: >-
        Enterprise payment buyers require binding SLA commitments in MSAs before deploying
        high-volume production workloads; the absence of a public SLA makes the 99.99% uptime
        figure unverifiable as a contractual obligation rather than a marketing claim.
      diligencePath: >-
        Request the Master Service Agreement, incident log for the preceding 12 months, and
        contractual uptime SLA terms including remedies for breach; cross-reference against
        internal monitoring data.
      relatedQuestionRefs:
        - QE003

    - type: private-evidence-only
      severity: material
      topic: transaction-volume
      missingEvidence: >-
        Thunes' 2026 annual or monthly transaction volume (count and value) has not been
        publicly disclosed; the last public reference was $50B+ cumulative as of July 2023.
      whyItMatters: >-
        Transaction volume is the primary indicator of DGN network liquidity and corridor
        utilisation; without a current figure, estimates of take-rate and revenue quality
        cannot be independently anchored.
      diligencePath: >-
        Request current TPV (total payment volume) by product module and corridor from
        Thunes management; cross-reference with the $150M revenue run-rate implied take-rate.
      relatedQuestionRefs:
        - QE004

    - type: missing-source
      severity: minor
      topic: technology-stack
      missingEvidence: >-
        Thunes' cloud infrastructure provider, database technology, and programming language
        stack are not publicly disclosed in product documentation, job postings, or press coverage.
      whyItMatters: >-
        Cloud provider concentration risk (e.g. single-cloud dependency) and data-sovereignty
        implications for cross-jurisdiction payments cannot be assessed without knowing the
        underlying infrastructure stack.
      diligencePath: >-
        Request infrastructure architecture overview in technical due diligence; review cloud
        provider agreements and disaster-recovery documentation.

    - type: private-evidence-only
      severity: minor
      topic: API-performance
      missingEvidence: >-
        API response-time benchmarks, p99 latency, and throughput limits for the Thunes
        REST API endpoints are not published in publicly accessible documentation.
      whyItMatters: >-
        High-volume enterprise use cases (payroll batch, gig-economy real-time disbursements)
        require sub-second API latency; absence of benchmarks prevents technical evaluation
        without sandbox testing.
      diligencePath: >-
        Request API performance benchmarks and load-test results from Thunes engineering;
        conduct sandbox load testing during technical due diligence.
      relatedQuestionRefs:
        - QE014

    - type: private-evidence-only
      severity: minor
      topic: market-share
      missingEvidence: >-
        Thunes' market share or transaction volume concentration in specific corridors
        (e.g. Philippines remittance, UK-to-Africa) or verticals (B2B vs. consumer)
        is not publicly disclosed.
      whyItMatters: >-
        Corridor concentration risk and vertical revenue mix affect growth rate assumptions
        and competitive moat assessment; a highly concentrated corridor creates single-point
        revenue risk.
      diligencePath: >-
        Request TPV breakdown by corridor and product module; obtain top-ten corridor
        concentration from Thunes management during financial due diligence.
      relatedQuestionRefs:
        - QE027
