callouts:
  - calloutType: insight
    title: Direct Global Network's Direct-Connection Architecture Is the Core Technical Moat
    body: >-
      Thunes' competitive advantage is not primarily in software IP but in the combination of 720
      direct Member integrations (bypassing correspondent intermediaries), 50 regulatory licenses
      (each requiring years and substantial capital per jurisdiction), PCI DSS and ISO 27001
      certifications, and the SmartX Treasury FX engine. This combination — direct connectivity
      plus compliance infrastructure plus certified security — is collectively expensive and
      slow to replicate. The three-pillar architecture (DGN, SmartX Treasury, Fortress
      Compliance) maps directly to the three primary enterprise purchase criteria for
      cross-border payment infrastructure: reach, price transparency, and compliance
      certainty. The October 2025 SWIFT connectivity launch extended the integration surface
      to 11,000-plus banking institutions without any new API development, demonstrating that
      the DGN moat strengthens as the number of access paths grows.
    claimRefs:
      - CE001
      - CE002
      - CE019
      - CE020
      - CE021
      - CE035

  - calloutType: risk
    title: Gated Developer Model and Undisclosed Contractual SLAs Are Enterprise Procurement Friction
    body: >-
      Thunes' absence from public developer communities (zero Stack Overflow questions, no public
      GitHub organisation, no publicly accessible status page) and the lack of disclosed
      contractual API uptime SLAs are material friction points in enterprise procurement cycles.
      Enterprise payment buyers typically require published uptime commitments in Master Service
      Agreements, historical incident logs, and sandbox access before production deployment.
      While Thunes publicly reports 99.99% platform uptime and 98% quality-of-service success
      rate on its website, the contractual SLA commitment level is undisclosed. Investors and
      enterprise procurement teams should request: (1) Thunes' 12-month uptime track record
      by product and corridor; (2) contractual SLA terms in the MSA including penalties for
      breach; (3) API incident history with mean-time-to-detect and mean-time-to-resolve
      metrics; and (4) a copy of the current PCI DSS Attestation of Compliance from a
      Qualified Security Assessor confirming level and scope.
    claimRefs:
      - CE005
      - CE025
      - CE034

