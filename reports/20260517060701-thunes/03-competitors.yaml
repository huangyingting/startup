  - id: competitor-profiles
    title: Competitor Profiles
    body: >-
      Nium is the most direct B2B infrastructure competitor to Thunes. Nium's platform covers 190+
      countries with 40+ regulatory licenses, targeting the same enterprise fintech and financial
      institution buyer. Its card issuance BaaS product (Nium Embed, 34+ countries) is a capability
      Thunes does not publicly emphasize, representing a product-mix gap. Nium's 100+ real-time
      payment corridors and API-first model (Transact, Receive, Embed) overlap with Thunes' DGN
      most directly in APAC, where both have strong local network access. Nium is loss-making (SGD
      88M net loss FY2024) and targeting a 2026 IPO, creating different capital-market pressures
      than Thunes' EBITDA-positive position.

      TerraPay operates a mobile-first global payment network with 31 regulatory approvals, emphasizing
      compliance as a core differentiator. Its founding story — first payment of $13 from Dubai to
      Tanzania — signals an emerging-market DNA similar to Thunes, and its network includes mobile
      wallet integrations across Africa and APAC. However, TerraPay lacks Thunes' scale and breadth of
      stablecoin and card connectivity.

      Airwallex has built a multi-product financial platform processing $235B+ annually across 120+
      countries for local transfers and 70+ countries for fund collection. It achieves 93% same-day
      and 50% instant settlement, positioning it as a credible infrastructure alternative for high-volume
      clients. Airwallex's multi-product model (global accounts, expense management, card issuance,
      cross-border payments) gives it breadth Thunes lacks; however, Airwallex's EM mobile wallet
      reach is substantially narrower than Thunes' 4 billion mobile and stablecoin wallet endpoints.

      Wise Platform offers £181BN+ in FX volumes through 80 licenses globally, reaching 160+ countries
      with 40+ currencies. Its bank-grade KYC and onboarding APIs are offered to financial institution
      partners, making it a competitor in the B2B infrastructure layer. Wise's transparency ethos and
      profitable public company status (LSE-listed) provide credibility advantages Thunes does not yet
      hold, but Wise Platform does not match Thunes' EM mobile wallet depth.

      Currencycloud (Visa) processed $75B+ in payments across 180+ countries before disclosure figures
      were obscured post-Visa integration, and operates an API-first embedded payments platform for banks
      and fintechs. Visa's ownership creates both a distribution advantage (Visa scheme relationships)
      and a strategic constraint (non-Visa scheme clients may prefer agnostic providers).

      Ripple Payments provides a stablecoin-and-fiat cross-border payment platform with 75+ US money
      transmitter licenses, MAS Singapore, and DFSA UAE authorization. Its positioning explicitly challenges
      traditional fiat B2B rails, arguing that stablecoin settlement eliminates pre-funding requirements
      and reduces costs. Circle operates USDC-based cross-border payments, licensed in New York by
      both NYDFS and DFS. Both represent structural competitors to Thunes' fiat DGN economics if
      stablecoin adoption accelerates in EM corridors. Thunes has mitigated this risk partly through
      its Mastercard stablecoin payout partnership (November 2025), Circle USDC integration (October
      2024), and Ripple partnership (September 2025), effectively making stablecoin providers
      network members rather than purely adversarial competitors.

      Western Union and MoneyGram are incumbent MTOs that process massive retail cross-border volumes
      and are simultaneously Thunes' customers and corridor-access competitors. Both are digitizing
      aggressively. Remitly, which uses Thunes infrastructure for some corridors, also creates a
      dual customer-competitor dynamic in B2B pay-in/pay-out markets.
