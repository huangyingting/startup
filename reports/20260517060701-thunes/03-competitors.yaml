  - id: switching-costs-network-effects
    title: Switching Costs, Network Effects, and Multi-Homing
    body: >-
      Thunes' switching-cost architecture operates on two levels. At the API integration layer, a
      Thunes DGN customer integrating 140-country payout routing, compliance workflows, FX settlement,
      and reconciliation logic faces a 3–9 month re-platforming cost if switching to an alternative
      network. For high-volume enterprise clients (MTOs, gig platforms, neobanks), this integration
      cost is real but surmountable: several Thunes customers are known to multi-home across
      2–3 payment infrastructure providers simultaneously, using Thunes for EM mobile wallet corridors
      and alternatives for other regions or product needs.

      At the network level, Thunes' DGN creates supply-side switching costs for corridors where
      Thunes holds direct, bilateral relationships with mobile wallet operators (M-Pesa, WeChat,
      GCash, 145 mobile wallet brands). Replicating this bilateral network requires country-by-country
      commercial and technical integration over multiple years — a significant barrier to corridor-
      specific duplication that is harder to shortcut than pure API switching costs. Competitors
      must either build these relationships directly (as TerraPay is doing) or acquire companies
      with existing access (as Thunes did with Limonetik in 2021).

      However, enterprise clients frequently manage their own multi-homing deliberately: Remitly,
      MoneyGram, and Western Union all use Thunes infrastructure while also maintaining competitive
      network relationships. This "customer-competitor" dynamic limits how aggressively Thunes can
      price exclusive arrangements, since large MTO customers could accelerate their own direct
      corridor building if Thunes pricing becomes unfavorable.
    claimRefs:
      - CP027
      - CP028
      - CP029
      - CP030
      - CP031

  - id: moat-durability-risk
    title: Moat Durability and Competitive Risk Assessment
    body: >-
      Thunes' three primary moat claims — Direct Global Network breadth (140 countries, 145 mobile
      wallet brands), compliance licensing (50 markets, MAS/FCA/ACPR anchor), and API agnosticism
      (serves Visa, Mastercard, SWIFT, Ripple as members, not adversaries) — are durable over a
      2–3 year horizon but each face specific erosion vectors.

      The DGN mobile wallet breadth moat is the most differentiated: no publicly available competitor
      claims 145 mobile wallet brands across Africa, APAC, and LATAM simultaneously. However, this
      moat is susceptible to stablecoin displacement: if USDC or other stablecoins become the dominant
      settlement mechanism in EM corridors, the value of Thunes' bilateral fiat wallet relationships
      erodes as settlement can occur on-chain without bilateral network membership. Thunes' USDC
      (Circle, Oct 2024) and Mastercard stablecoin payout (Nov 2025) partnerships represent proactive
      hedging against this risk, but do not eliminate it.

      The compliance licensing moat is the second most defensible: building equivalent licenses across
      50 jurisdictions (50 US state MTLs, MAS, FCA, ACPR) requires 3–5 years and tens of millions in
      regulatory investment. Ripple's 75+ US MTLs (exceeding Thunes' count) and MAS/DFSA licensing
      demonstrate that well-capitalized stablecoin players can build comparable regulatory footprints,
      particularly in developed markets. Thunes' edge is in its EM-specific regulatory stack (ACPR
      France, HK MSO) and the Tookitaki AML acquisition (2022) providing proprietary compliance
      tooling.

      The agnostic "superhighway" positioning creates a network-effect moat: as more financial
      institutions join the DGN (720 members), the value of each additional connection increases.
      However, Nium's 40+ regulatory license portfolio, Airwallex's $235B+ volume, and SWIFT gpi's
      11,000+ bank connections demonstrate that large, well-resourced competitors are building
      alternative network effects in overlapping segments. The commoditization risk on fiat FX
      spreads is real: as more B2B players enter EM corridors, take rates compress, requiring
      Thunes to generate revenue from compliance services, stablecoin treasury, and premium SLAs
      beyond basic corridor access.
