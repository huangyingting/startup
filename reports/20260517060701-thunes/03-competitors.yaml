callouts:
  - calloutType: risk
    title: Stablecoin Rails Are a Structural Threat to Thunes' Fiat Corridor Economics
    body: >-
      Ripple Payments holds 75+ US money transmitter licenses (exceeding Thunes' disclosed count)
      and explicitly positions its stablecoin-and-fiat platform as superior to traditional fiat B2B
      payment rails — the very infrastructure Thunes' DGN primarily operates on. If USDC, Ripple USD
      stablecoin, or competing digital assets achieve mainstream adoption for EM payout corridors
      over the next 3–5 years, the economics of Thunes' bilateral fiat wallet network erode as
      settlement shifts on-chain. Thunes has hedged through partnerships with Circle (Oct 2024),
      Mastercard stablecoin payouts (Nov 2025), and Ripple (Sep 2025), transforming stablecoin
      operators into network members. Whether this partnership-first strategy can maintain take rates
      as stablecoin volume grows is an open diligence question.
    claimRefs:
      - CP034
      - CP035
      - CP036
      - CP037

  - calloutType: insight
    title: Thunes' Agnostic Positioning Turns Structural Rivals Into Revenue Contributors
    body: >-
      Unlike Nium (which competes directly with Visa/Mastercard infrastructure) or Currencycloud
      (Visa-owned, strategically constrained), Thunes' "Smart Superhighway" model has systematically
      converted network giants into DGN members: Visa Direct partnership (Oct 2022), SWIFT connectivity
      (Oct 2025), Mastercard stablecoin payouts (Nov 2025), and Ripple partnership (Sep 2025). This
      agnostic positioning means Thunes can generate revenue from multiple scheme relationships
      simultaneously, and its competitive moat is network breadth rather than scheme exclusivity. The
      risk is that each partnership also gives the partner visibility into Thunes' network utilization
      and routing economics — information that could eventually support competitive infrastructure builds
      by Visa, Mastercard, or SWIFT.
    claimRefs:
      - CP013
      - CP015
      - CP016
      - CP038
      - CP039

