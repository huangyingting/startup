  evidenceGaps:
    - type: enumeration-incomplete
      severity: minor
      topic: competitor-profile-table
      missingEvidence: >-
        The competitor profile table (TP001) covers 17 major players but excludes regional specialists
        (e.g., Ecobank's cross-border capabilities, Flutterwave, Paystack), early-stage B2B payment
        startups, and CBDC infrastructure projects (e.g., Project mBridge). Their inclusion may reveal
        additional competitive positioning dynamics in specific EM corridors.
      whyItMatters: >-
        Regional specialists may have deeper bilateral relationships in specific EM corridors (e.g.,
        West Africa, South Asia) that could erode Thunes' moat in those markets if scaled.
      diligencePath: >-
        Review Fintech Global, Finextra, and FXC Intelligence for coverage of EM-focused B2B payment
        network operators not covered in this table; conduct management channel checks on corridor-
        specific competition in Nigeria, Kenya, India, and Philippines.
      relatedTableRefs:
        - TP001
      relatedQuestionRefs:
        - QP001

    - type: private-evidence-only
      severity: material
      topic: pricing-comparison
      missingEvidence: >-
        Thunes does not publish its per-corridor take rate, FX markup, or enterprise contract pricing.
        Without this data, it is impossible to verify whether Thunes' pricing is competitive with
        Nium, Airwallex, or Ripple on specific high-volume corridors (India, Philippines, Nigeria,
        Kenya). The percentage of Thunes' $150M revenue run-rate from stablecoin versus fiat corridors
        is also not publicly disclosed.
      whyItMatters: >-
        Pricing competitiveness is the primary driver of MTO and fintech vendor selection; if Thunes'
        pricing is materially above Nium or Ripple on key corridors, enterprise clients will multi-home
        more aggressively and reduce Thunes' wallet share.
      diligencePath: >-
        Request corridor-level take rate data (at minimum top 10 corridors by volume) in management
        diligence; compare against Nium and Wise Platform enterprise pricing obtained through independent
        channel checks with shared customers; request revenue mix between fiat and stablecoin corridors.
      relatedQuestionRefs:
        - QP017
        - QP025

    - type: private-evidence-only
      severity: material
      topic: switching-costs
      missingEvidence: >-
        No public data exists on Thunes' mobile wallet bilateral agreement exclusivity, renewal terms,
        or pricing with wallet operators. Whether any of the 145 wallet operators hold exclusive or
        preferred-access arrangements with Thunes versus TerraPay or Nium is undisclosed.
      whyItMatters: >-
        Exclusive or preferred bilateral agreements with high-volume wallet operators (M-Pesa, WeChat,
        GCash) would significantly increase Thunes' moat durability; non-exclusive agreements mean
        competitors can replicate the same connectivity with sufficient commercial effort.
      diligencePath: >-
        Review all material wallet operator contracts in due diligence; specifically request any
        exclusivity, MFN, or minimum-volume provisions; map TerraPay's disclosed wallet count against
        Thunes' 145 brands to identify corridor overlap.
      relatedQuestionRefs:
        - QP011

    - type: private-evidence-only
      severity: moderate
      topic: stablecoin-adoption-rate
      missingEvidence: >-
        The pace of stablecoin adoption (USDC, Ripple USD, Stellar USDC) in Thunes' top EM corridors
        — Africa (Nigeria, Kenya, Ghana), APAC (Philippines, Indonesia), and LATAM (Mexico, Colombia)
        — is not publicly disclosed. The proportion of Thunes' DGN volume already settled via
        stablecoin rails (Circle Oct 2024, Ripple Sep 2025, Mastercard Nov 2025) is not reported.
      whyItMatters: >-
        If stablecoin settlement exceeds 10–15% of EM corridor volume within 2–3 years, the value
        of Thunes' bilateral fiat wallet network erodes rapidly; the partnership-based hedging
        strategy's effectiveness depends on whether Thunes generates revenue from stablecoin routing
        or cedes margin to stablecoin operators.
      diligencePath: >-
        Request stablecoin vs. fiat volume breakdown by corridor and quarter from Thunes management;
        review Circle and Ripple partner announcements for disclosed Thunes settlement volumes;
        assess EM stablecoin adoption from FXC Intelligence and BIS cross-border payment reports.
      relatedQuestionRefs:
        - QP013

    - type: private-evidence-only
      severity: material
      topic: customer-retention-nrr
      missingEvidence: >-
        Thunes does not disclose net revenue retention (NRR), wallet share trends, or gross volume
        retention by customer cohort year. Without this data, it is impossible to assess whether
        Thunes' enterprise customers are increasing their wallet share with Thunes (signal of moat
        strength) or gradually multi-homing to Nium and Airwallex (signal of competitive erosion).
      whyItMatters: >-
        NRR and wallet share trend are the primary predictors of whether Thunes' DGN network effects
        are compounding or being eroded; a NRR below 100% would indicate structural multi-homing
        or churn that is not visible in gross network membership metrics.
      diligencePath: >-
        Request cohort-level NRR and gross volume retention data in financial due diligence; interview
        3–5 shared customers of Thunes and Nium to assess wallet share allocation decisions; request
        historical quarterly revenue by customer concentration tier.
      relatedQuestionRefs:
        - QP022
