company:
  name: Thunes
chapter:
  number: 3
  title: Competitors
  summary: >-
    Thunes competes across five distinct competitor categories: direct B2B payment network operators
    (Nium, TerraPay, Currencycloud/Visa), embedded-finance platform players (Airwallex, Wise Platform,
    Rapyd), network giants serving as both partners and rivals (Visa Direct, Mastercard Cross-Border,
    SWIFT gpi), emerging stablecoin rails (Circle, Ripple), and digitizing money-transfer operators
    that are simultaneously Thunes customers and corridor competitors (Western Union, MoneyGram,
    Remitly). No single rival fully replicates Thunes' combination of Direct Global Network breadth
    (140 countries, 220 payment methods, 4 billion mobile and stablecoin wallets, 8 billion bank
    accounts, 15 billion cards) with a compliance stack licensed across 50 markets. The most acute
    competitive risks are Nium's APAC overlap and enterprise API positioning, Airwallex's expanding
    platform with $235B+ annual volume, and structural displacement by stablecoin rails that erode
    the fiat corridor economics underpinning Thunes' take rate.

sections:
  - id: competitive-landscape-overview
    title: Competitive Landscape Overview
    body: >-
      The global B2B cross-border payments infrastructure market serves a fragmented set of customer
      segments — fintechs, money-transfer operators, neobanks, e-commerce platforms, payroll providers,
      and gig-economy companies — through a range of competing models. No single operator dominates
      across all geographies, payment methods, and enterprise use cases. Thunes positions itself as
      the agnostic "Smart Superhighway" connecting all payment endpoints through a single API: the
      Direct Global Network (DGN) spanning 140 countries, 90 currencies, 220 payment methods, 720
      network members, and 85% immediate settlement as of May 2026.

      The competitive universe divides into five categories. Direct B2B network operators (Nium,
      TerraPay, Currencycloud/Visa, dLocal, PPRO, Banking Circle) compete for the same API-first
      enterprise buyer, differing in geographic focus and product breadth. Embedded-finance platform
      players (Airwallex, Wise Platform, Stripe, Rapyd) approach from a multi-product SaaS angle
      rather than pure network infrastructure. Network giants (Visa Direct, Mastercard Cross-Border
      Services, SWIFT gpi) function as both infrastructure layer and occasional competitor, leveraging
      scale and scheme relationships. Emerging stablecoin rails (Circle USDC, Ripple Payments, Stellar)
      represent a structural alternative that could bypass fiat corridor economics over a 3–5 year
      horizon. Money-transfer operators (Western Union, MoneyGram, Remitly) are simultaneously Thunes
      customers and corridor competitors who continue to digitize their own rails.

      Thunes' $150M Series D at an undisclosed but significantly higher valuation than its $900M+
      Series C (2023), combined with a $150M revenue run-rate and EBITDA-positive status, positions
      it as a credible mid-scale alternative to larger infrastructure players. The company's agnostic
      model — it serves Visa, Mastercard, and SWIFT as partners while also competing indirectly with
      them — creates both partnership leverage and strategic tension that rivals operating within a
      single scheme ecosystem do not face.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
      - CP005
