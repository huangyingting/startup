  - id: capability-pricing-comparison
    title: Feature, Capability, and Pricing Comparison
    body: >-
      Across eight buying criteria, Thunes leads competitors on emerging-market mobile wallet reach (145
      mobile wallet brands, 4B wallet endpoints in 140 countries) and compliance breadth (50 market
      licenses including MAS, FCA, ACPR, and all 50 US states). No competitor publicly claims
      equivalent mobile wallet depth in Africa, APAC, and LATAM simultaneously. Airwallex leads on
      multi-product breadth (global accounts + expense management + card issuance), Wise Platform
      leads on FX transparency and compliance tooling maturity, and Nium leads on card issuance BaaS
      in APAC/MEA. Ripple and Circle lead specifically on stablecoin settlement infrastructure.

      On pricing, Thunes does not publish list prices; enterprise contracts are negotiated based on
      volume, corridor mix, and product scope. This is consistent with direct B2B network infrastructure
      norms but creates friction with SMB buyers who prefer transparent pricing. Airwallex's tiered
      pricing (free Explore tier, $49/month Growth tier, enterprise custom) gives it a mid-market
      advantage. Wise Platform charges banks and enterprises custom rates on volume-based terms. SWIFT
      gpi passes costs through correspondent banking relationships, typically 1-3% all-in for cross-border
      corporate flows. Ripple claims significant cost reduction over traditional rails through
      stablecoin-based settlement, but enterprise contract terms are undisclosed.

      The feature capability matrix (FP002) reveals that Thunes is strongest on mobile-wallet reach
      and compliance breadth, moderate on developer integration experience relative to Stripe and
      Airwallex, and developing its stablecoin rails position through partnerships rather than native
      infrastructure. Buyers seeking pure developer experience with transparent pricing (SMBs,
      digital-native fintechs) have stronger alternatives in Airwallex and Wise Platform. Buyers
      seeking maximum EM mobile wallet reach and regulatory coverage in Africa, APAC, and LATAM
      have fewer alternatives to Thunes.
