  stage: Late-Stage Private (Series D, April 2025)
  headquarters: Singapore
  shortDescription: >
    Thunes is a Singapore-headquartered B2B cross-border payments infrastructure
    company that operates a proprietary Direct Global Network (DGN) spanning
    130+ countries and 80+ currencies, connecting members to mobile wallets,
    banks, cards, and stablecoin endpoints through a single API. Founded in
    2016 as a spin-off from TransferTo, Thunes has raised ~$292M across four
    rounds — most recently a $150M Series D in April 2025 led by Apis Partners
    and Vitruvian Partners — and disclosed positive EBITDA at the Series D
    announcement. The company holds payment institution licenses across MAS
    (Singapore), FCA (UK), ACPR (France), Hong Kong MSO, and money transmitter
    licenses in all 50 US states.

subtitle: "Thunes: Cross-Border Payments Infrastructure for Emerging Markets — Diligence Report"

coverageNotes: >
  This report reflects publicly available disclosures, official Thunes
  communications, regulator registries (MAS, FCA, NMLS), and tier-one
  fintech media as of 2026-05-17. Thunes is a private company with no
  publicly disclosed audited financials, no public Series D post-money
  valuation figure, and no public customer-count or NRR data. Revenue
  scale, gross margin, burn, and runway are inferred from third-party
  estimates and a positive-EBITDA statement made at the April 2025
  Series D announcement; primary financial diligence requires data-room
  access. Leadership succession is partially ambiguous: Floris de Kort
  was named CEO in January 2024, but the about-us page on the report
  date lists Peter De Caluwe as "Deputy Chairman and CEO," and no public
  announcement of de Kort's departure has been located.

