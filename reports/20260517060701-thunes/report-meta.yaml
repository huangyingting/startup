companyProfile:
  summary: >
    Thunes was formed in 2016 when Singapore-based mobile payments operator
    TransferTo (founded 2005) was split into DT One (mobile top-ups) and
    Thunes (cross-border B2B payments), then publicly relaunched under the
    Thunes brand in February 2019. Co-founder Peter De Caluwe — a serial
    fintech entrepreneur (Ogone, Naspers/PayU, DT One) — has remained the
    central executive, currently serving as Deputy Chairman and CEO after
    a brief 2024–2025 interlude under Floris de Kort. Thunes operates the
    Direct Global Network (DGN), a proprietary single-integration
    connectivity layer reaching 130+ countries and 80+ currencies through
    550+ direct integrations with banks, mobile wallets, MTOs, and
    stablecoin endpoints, supplemented by the SmartX Treasury System and
    Fortress Compliance Platform. The company has raised approximately
    $292M across Series A ($10M, 2019, GGV Capital), Series B ($60M, 2020,
    Helios Investment Partners), Series C ($72M at $900M+, 2023, Marshall
    Wace) and Series D ($150M, April 2025, Apis Partners and Vitruvian
    Partners). Thunes claims positive EBITDA at the Series D milestone —
    a rare profitability signal in cross-border payments infrastructure —
    and is using Series D proceeds to fund US expansion, DGN deepening,
    and AI/digital-asset capabilities. Recent network and partnership
    milestones include Mastercard stablecoin payouts (Nov 2025), SWIFT
    connectivity (Oct 2025), Ripple integration (Sep 2025), Ecobank
    partnership (Oct 2025), Circle USDC settlement (Oct 2024), the Tilia
    acquisition (Jun 2025), and money transmitter licenses in all 50 US
    states.
  foundedDate: "2016-01-01"
  founders:
    - name: Peter De Caluwe
      role: Co-Founder, Deputy Chairman & CEO
      background: >
        Serial fintech entrepreneur and pioneer in B2B payments. Began at
        Ogone (COO then CEO; €360M acquisition by Ingenico in 2013), led
        Payments at Naspers supporting PayU's global growth, served as
        CEO of DT One; co-founded Thunes within DT One and led
        international expansion through Series A–C; named CEO again as
        of the report date.
      claimRefs: [CO022]
  foundingLocation: Singapore
  headquarters: Singapore
  productSummary: >
    Thunes operates the Direct Global Network (DGN), a single-API
    cross-border payments network covering Pay-to-Mobile-Wallets,
    Pay-to-Banks, Pay-to-Cards, Pay-to-Stablecoin-Wallets, and Pay-to-
    Digital-Vouchers, plus reciprocal Accept rails for bank payments,
    mobile wallets, digital vouchers, and BNPL. Two proprietary
    platforms underpin the network: the SmartX Treasury System for
    multi-currency liquidity, FX, and settlement orchestration, and the
    Fortress Compliance Platform (built around the Tookitaki regtech
    acquisition) for AML/KYC/sanctions screening. The network reaches
    130+ countries and 80+ currencies across 550+ direct integrations
    and is now also accessible to banks via existing SWIFT connectivity
    without a new integration.
  customerFocus: >
    B2B-only. Eight published industry verticals: Banks and Neobanks,
    Mobile Wallets, Payment Service Providers, Gig Economy Platforms,
    Money Transfer Operators, Digital Asset Companies, E-commerce, and
    Payroll/EOR. Named partners and customers include Western Union,
    MoneyGram, PayU, Remitly, Uber, Deliveroo, Grab, M-Pesa, GCash,
    Mastercard, Visa Direct, Circle, Ripple, PayPal/Hyperwallet, and
    Ecobank. Concentration appears tilted toward large MTOs, wallet
    operators in emerging markets, and global gig-economy payers.
  businessModel: >
    Per-transaction take rate (a fixed fee of ~US$0.02–$2 per
    transaction depending on destination corridor) plus a small markup
    on FX rates referenced to mid-market. No publicly disclosed SaaS
    or subscription tier; pricing for enterprise contracts is bespoke
    and not published. Series D announcement claimed positive EBITDA.
  stage: Late-Stage Private (Series D, $150M, April 2025)
  fundingStatus: >
    Total raised ~$292M. Rounds: Series A $10M (May 2019, led by GGV
    Capital); Series B $60M (Sep 2020 / closed May 2021, led by Helios
    Investment Partners with Checkout.com, GGV Capital, Future Shape);
    Series C $72M at $900M+ valuation (Jul 2023, led by Marshall Wace
    with Bessemer Venture Partners, 01Fintech, Visa, EDBI, Endeavor
    Catalyst); Series D $150M (Apr 2025, led by Apis Partners and
    Vitruvian Partners; post-money valuation not publicly disclosed).
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO011, CO022, CO028, CO029, CO034, CO036]

summary:
  headline: >
    Thunes' broad regulatory license stack (MAS, FCA, ACPR, HK MSO,
    50-state US MTL), proprietary Direct Global Network across 130+
    countries, and stated positive EBITDA at Series D position it as
    one of the most credible private B2B cross-border payments
    infrastructure platforms, but the absence of any disclosed Series D
    valuation, audited financials, or quantified retention metrics
    keeps conviction in track territory until data-room access is
    available.
