  title: Valuation
  summary: >-
    Thunes' Series D post-money valuation is not publicly disclosed. Based on the April 2025
    $150M raise, the CEO's statement that valuation was a "substantial increase" over the
    Series C ($900M+), and peer comparisons, a base-case estimate of $1.4B–$1.8B post-money
    appears reasonable. This implies a revenue multiple of 9–12x the approximately $150M
    annualised revenue run-rate cited at Series D close — broadly in line with pre-IPO private
    market conventions for a profitable, growing B2B payments infrastructure company.
    Comparable public peers (dLocal at 3–4.5x; Wise at 5–7x; Payoneer at 2.5–3.5x) trade at
    lower multiples, reflecting public market liquidity discounts and larger scale, while private
    comparable Airwallex carries a ~$5.6B valuation on ~$300M+ ARR — roughly 18x. Thunes'
    confirmed EBITDA positivity materially strengthens the valuation case relative to loss-making
    peers, but the absence of audited financials, undisclosed post-money, and opaque cap table
    make conviction-buying impossible from public information alone. The investment
    recommendation is Track: monitor for IPO signals, strategic acquisition activity, or
    data-room access events that would allow verification of valuation assumptions.

sections:
  - id: investment-thesis-and-antithesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      The investment thesis for Thunes rests on four pillars: (1) a structural market opportunity
      in B2B cross-border payments projected to grow from $212.55B in 2024 to $320.73B by 2030 at
      a 7.1% CAGR, with B2B representing 72.6% of total flows — a multi-trillion dollar total
      addressable market on a gross payment volume basis; (2) a proprietary Direct Global Network
      covering 130+ countries and 80+ currencies, connected to 7B+ mobile wallets and bank
      accounts via 320+ payment methods, built over nearly a decade and representing a difficult-to-
      replicate compliance and infrastructure moat; (3) confirmed EBITDA positivity at the time of
      the April 2025 Series D — distinguishing Thunes from most of its private B2B payments peers
      including Nium (net loss SGD 88.1M in FY2024) and Airwallex (loss-making); and (4) strategic
      partnerships with Mastercard, Circle, SWIFT, Ripple, GCash, Uber, Deliveroo, and Grab that
      provide both volume and network expansion signals.

      The anti-thesis is equally substantive: Thunes' Series D post-money valuation is not publicly
      disclosed, and the CEO explicitly declined to reveal detailed financial figures at close — an
      opacity that prevents verification of the ~$1.4B–$1.8B estimated range. Revenue of approximately
      $150M is stated as a run-rate at time of close but is not an audited figure, and the company
      provides no public financial statements (it is incorporated in Singapore and does not file with
      ACRA under a listed-company regime). Competitive pressure is intensifying: Airwallex (direct
      B2B peer, ~$5.6B valuation) is expanding aggressively, Wise is growing its Wise Platform
      (B2B API product), and Visa's ownership of Currencycloud gives a strategic network incumbent
      deep competitive resources. The $150M total raised over eight-plus years implies a relatively
      capital-efficient build, but it also means the growth rate has been constrained by available
      capital — and the 100% YoY growth rate cited at the Series B has evidently moderated to the
      ~$150M run-rate implied by the Series D.

      The recommendation is Track. Thunes is a genuine B2B payments infrastructure business with
      confirmed profitability, a broad network, and strong strategic partners. However, the complete
      absence of audited public financials, undisclosed post-money valuation, and undisclosed cap
      table prevent a buy or hold recommendation without data-room access. The primary monitoring
      triggers are: (a) IPO registration statement or strategic sale announcement; (b) data-room
      access providing revenue, EBITDA, and cap-table detail; (c) audited financials emergence via
      any public disclosure event.
