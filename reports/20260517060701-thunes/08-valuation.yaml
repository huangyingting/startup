callouts:
  - title: EBITDA Positivity Is the Key Differentiating Factor — But It Cannot Be Verified
    calloutType: insight
    body: >-
      Thunes' claimed EBITDA positivity at the April 2025 Series D close is the single most
      important differentiator from comparable B2B payments infrastructure peers. Nium reported
      a SGD 88.1M net loss (53% loss margin) in FY2024; Airwallex is estimated loss-making at
      its $5.6B valuation. If Thunes is genuinely EBITDA positive with $150M revenue, this implies
      a capital-efficient business model that either (a) has superior unit economics, (b) operates
      with lower overhead, or (c) has moderated growth investment relative to peers. However, this
      claim is unaudited, unverified by any public financial filing, and stated in a company-
      authored press release. Investors must treat it as unconfirmed pending data-room audit review.
    claimRefs:
      - CV005
      - CV011
      - CV016

  - title: Valuation Opacity Is the Primary Investment Risk — Not Competitive Dynamics
    calloutType: risk
    body: >-
      The most significant risk in Thunes' valuation assessment is not competition from Airwallex
      or Wise Platform — it is the complete absence of publicly verifiable financial data. The CEO
      explicitly declined to reveal financial details at the Series D close, the company has no
      public financial filings, and the post-money valuation is undisclosed. This creates a
      scenario where an investor cannot verify whether the estimated $1.4B–$1.8B range is a
      reasonable entry point or a significant overpayment relative to actual financial performance.
      For all the strength of the network story, the Track recommendation is driven primarily by
      this opacity: no financial verification = no conviction position.
    claimRefs:
      - CV006
      - CV027
      - CV029

