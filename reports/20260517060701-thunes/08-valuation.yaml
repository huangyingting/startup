  - id: exit-readiness-and-diligence-asks
    title: Exit Readiness and Diligence Asks
    body: >-
      Thunes' exit readiness signals are mixed. On the positive side: EBITDA positivity reduces
      the urgency of an equity liquidity event; the CEO Floris de Kort is an experienced listed-
      company executive (Worldpay IPO, TSG/Xplor merger) with demonstrable public-market transaction
      experience; and the strategic investor base (Apis Partners, Vitruvian Partners, GIC, Western
      Union, IFC) is diverse enough to support either an IPO or strategic sale process. On the
      negative side: Thunes has not disclosed audited financials publicly, has no PCAOB audit on
      record, and the Singapore incorporation means no ACRA-equivalent public filing obligation
      for a private company. Total raised of ~$292M over nine years with 10+ investors creates
      potential cap table complexity, including potential liquidation preference overhang from
      each round.

      The most critical diligence asks before entering any investment position in Thunes are:
      (1) audited revenue, EBITDA, and net loss for FY2023 and FY2024; (2) Series D post-money
      valuation and cap-table structure (preference stack); (3) top-10 customer concentration
      and net revenue retention by cohort; (4) FCA, MAS, and other material licensing status
      checks for any pending actions; (5) geographic revenue concentration, particularly for
      high-margin versus pass-through corridors; and (6) CEO and co-founder equity and vesting
      terms to assess alignment.

      Thesis-break conditions: any verified revenue decline from the $150M run-rate; a regulatory
      suspension of the Singapore MAS or UK FCA license; a down-round Series E below $1.0B; or
      departure of Floris de Kort as CEO before a liquidity event.
