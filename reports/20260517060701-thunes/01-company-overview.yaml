callouts:
  - calloutType: strength
    title: Proprietary Direct Global Network with 550+ Direct Integrations is a Structural Moat
    body: >-
      Thunes' Direct Global Network is the result of years of bilateral relationship-building with mobile
      wallets, banks, and payment providers across emerging markets — a process that cannot be replicated
      quickly or cheaply. The 550+ direct integrations (as of April 2025), combined with SmartX Treasury
      System and Fortress Compliance Platform, provide speed, cost, and compliance advantages that
      underpin member retention and network effects as the DGN grows.
    claimRefs:
      - CO005
      - CO006
      - CO007
  - calloutType: strength
    title: Profitability Milestone Reached at Scale — Rare in Cross-Border Payments Infrastructure
    body: >-
      Reporting positive EBITDA at a $150M revenue run-rate (April 2025) positions Thunes as one of the
      few B2B cross-border payments infrastructure companies to have crossed from hyper-growth burn to
      sustainable economics. This milestone validates the unit economics of the DGN transaction-fee model
      and strengthens the case for continued independent growth or strategic M&A.
    claimRefs:
      - CO033
      - CO034
  - calloutType: risk
    title: CEO Transition Post-Series D Creates Governance Uncertainty
    body: >-
      Floris de Kort (CEO from January 2024) was the public face of Thunes at the April 2025 Series D,
      claiming positive EBITDA and $150M revenue run-rate. The current about-us page (May 2026) shows
      Peter De Caluwe as CEO, with no public explanation for de Kort's departure. Unexplained executive
      departures within 12 months of a major funding round raise questions about operational continuity,
      investor confidence, and strategy execution.
    claimRefs:
      - CO020
      - CO021
      - CO044
  - calloutType: risk
    title: Valuation Opacity and Competitive Pressure Are Key Diligence Gaps
    body: >-
      Thunes has not disclosed its Series D valuation — CEO de Kort explicitly declined to share the
      figure. Combined with intensifying competition from Nium, Airwallex, TerraPay, Wise Platform,
      and major network operators (Visa Direct, Mastercard Send, SWIFT gpi), the undisclosed valuation
      makes independent price-discovery impossible. Investors entering now lack a verifiable anchor for
      return modeling.
    claimRefs:
      - CO045
      - CO035

