company:
  name: Thunes

chapter:
  number: 1
  title: Company Overview
  summary: >
    Thunes is a Singapore-headquartered B2B cross-border payments infrastructure company that emerged in 2016
    from the split of TransferTo and publicly rebranded in February 2019. Operating as the "Smart Superhighway
    to move money around the world," Thunes runs a proprietary Direct Global Network spanning 130+ countries,
    80+ currencies, and 550+ direct integrations. The company raised a $150M Series D in April 2025 at a
    substantial valuation increase over its prior $900M+ Series C round, reporting a revenue run-rate of
    $150M and positive EBITDA at the time of the raise. Current CEO Peter De Caluwe (co-founder and returning
    CEO as of 2025-2026) leads the company toward US market expansion, stablecoin interoperability, and
    profitability consolidation.

sections:
  - id: company-identity
    title: Company Identity and Business Model
    body: >
      Thunes is a private, Singapore-headquartered B2B financial infrastructure company providing
      cross-border payment and collection services to banks, neobanks, mobile wallet operators, payment
      service providers, money transfer operators, gig economy platforms, and e-commerce businesses. The
      company's flagship product is the Direct Global Network (DGN), a proprietary single-API integration
      connecting members to 130+ countries, 80+ currencies, over 550 direct payment-provider integrations,
      7 billion+ mobile wallets and bank accounts, and 15 billion cards across 320+ payment methods. Key
      brand names within the DGN include GCash, M-Pesa, Airtel, MTN, Orange, JazzCash, Easypaisa, AliPay,
      and WeChat Pay. The DGN differentiates through its in-house SmartX Treasury System (liquidity
      management) and Fortress Compliance Platform (AML/KYC/sanctions screening).

      Thunes operates on a transaction-fee model: charging a fixed amount between two cents and $2 per
      transaction depending on destination country, plus a small markup over mid-market FX rates for
      currency conversions. This low-margin, high-volume model is consistent with cross-border payments
      infrastructure. Thunes' stated mission is "To connect every corner of the world, and make the global
      economy accessible to all," with the tagline "The Smart Superhighway to move money around the world."
      The company operates from its Singapore headquarters and 13 additional locations including Barcelona,
      Beijing, Dubai, Hong Kong, Johannesburg, London, Manila, Nairobi, Paris, Riyadh, San Francisco, and
      Shanghai. As of April 2025 (Series D announcement), Thunes reported a revenue run-rate of $150M and
      positive EBITDA. Named customers include Uber, Deliveroo, Grab, WeChat, Western Union, MoneyGram,
      PayPal (via Hyperwallet), and Remitly.
