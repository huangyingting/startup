  - id: leadership-governance
    title: Leadership and Governance
    body: >
      Thunes' leadership has undergone notable evolution. Peter De Caluwe, the company's co-founder who
      served as executive chairman and CEO during the company's formative years, stepped back in January
      2024 when Floris de Kort was appointed CEO. De Kort, who had previously led Global eCommerce at
      Worldpay through its 2015 IPO and then served as CEO of Xplor Technologies (formerly TSG/Clearent),
      was credited with reporting revenue run-rate of $150M and positive EBITDA at the April 2025 Series D.
      However, the current Thunes about-us page (as of May 2026) lists Peter De Caluwe as "Deputy Chairman
      and CEO," indicating that Floris de Kort departed sometime after the Series D announcement in April
      2025 and De Caluwe resumed the CEO role while retaining the Deputy Chairman title. This CEO transition
      represents a key governance uncertainty requiring diligence.

      Allan Green serves as Chairman. The current executive team includes Chloé Mayenobe (Deputy CEO; prior:
      COO Solaris Group, Deputy CEO Natixis Payments, MD EMEA Ingenico), Ruwan de Soyza (Chief Legal &
      Compliance Officer; 25+ years, ex-Worldpay Group GC), Simon Nelson (Chief Commercial Officer; ex-CEO
      Mercury UAE, ex-Network International), Andrew Stewart (Chief Revenue Officer; ex-WorldRemit, 17 years
      American Express), Parvinder Bhatia (Chief Technology Officer), Elie Bertha (Chief Product Officer),
      and Aik Boon Tan (Chief Network Officer). Mathieu Limousi has been cited as Chief Marketing Officer.
      The Thunes board and full investor governance structure (board seats, veto rights, preference stack)
      are not publicly disclosed.
