  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: valuation
      missingEvidence: >-
        Specific Series D valuation in USD at the time of the April 2025 raise; CEO explicitly declined
        to disclose this metric publicly.
      whyItMatters: >-
        Without a disclosed valuation, investors cannot independently assess entry price, implied
        multiple, or expected return profile for any secondary or follow-on investment in Thunes.
      diligencePath: >-
        Request the Series D term sheet or investor presentation from management during formal due
        diligence; review any 409A or secondary transaction records through data room.
      relatedQuestionRefs:
        - QO004

    - type: missing-source
      severity: material
      topic: leadership
      missingEvidence: >-
        Public announcement or explanation of Floris de Kort's departure as CEO of Thunes sometime
        after the April 2025 Series D and before May 2026.
      whyItMatters: >-
        CEO departures within 12 months of a major funding round may signal disagreements on strategy,
        performance issues, or governance conflicts; the lack of disclosure is an unresolved diligence
        flag.
      diligencePath: >-
        Request a formal explanation from management and board; review any investor call transcripts
        or communications from the June-December 2025 period; check LinkedIn for de Kort's subsequent
        employment for timeline signals.
      relatedQuestionRefs:
        - QO013
      relatedTableRefs:
        - TO002

    - type: private-evidence-only
      severity: material
      topic: financials
      missingEvidence: >-
        Detailed P&L, balance sheet, gross margin, net income, headcount, and customer count metrics
        for Thunes; the company has not published audited financial statements.
      whyItMatters: >-
        Without audited financials, claims of positive EBITDA and $150M revenue run-rate cannot be
        independently verified; the quality of earnings and path to full profitability are unassessable.
      diligencePath: >-
        Request audited financial statements and management accounts for FY2023, FY2024, and most
        recent period from the data room; review any regulatory filings in Singapore or UK.
      relatedQuestionRefs:
        - QO007
        - QO020
        - QO021

    - type: private-evidence-only
      severity: material
      topic: governance
      missingEvidence: >-
        Board composition, investor-nominated directors, voting rights, liquidation preferences, and
        governance covenants from the Series D investment agreement.
      whyItMatters: >-
        PE-led investments (Apis Partners, Vitruvian Partners) typically include board control
        provisions, consent rights over M&A and IPO, and anti-dilution protections; these materially
        affect governance and strategic optionality.
      diligencePath: >-
        Review Series D term sheet and shareholders' agreement in the data room; identify board seat
        holders and any veto rights over material corporate decisions.
      relatedQuestionRefs:
        - QO027
      relatedTableRefs:
        - TO003

    - type: missing-source
      severity: minor
      topic: headcount
      missingEvidence: >-
        Verified current employee headcount at Thunes as of 2026; no public disclosure found.
      whyItMatters: >-
        Headcount is a useful proxy for operational scale, organizational capacity, and cost structure;
        the absence makes it harder to assess revenue-per-employee efficiency.
      diligencePath: >-
        Review LinkedIn employee count (typically an estimate); check Singapore ACRA filings or any
        UK Companies House filings for Thunes entities; request from management.
      relatedQuestionRefs:
        - QO019

    - type: missing-source
      severity: material
      topic: acquisitions
      missingEvidence: >-
        The strategic rationale for Thunes' June 2025 acquisition of Tilia (gaming/virtual currency
        subsidiary of Linden Lab) was not publicly elaborated beyond a brief announcement; no
        integration roadmap, pricing, or revenue contribution has been disclosed.
      whyItMatters: >-
        Gaming and virtual currency payments are not core to B2B cross-border infrastructure; without
        a clear rationale the acquisition introduces strategic focus risk. The deal size and financial
        impact on Thunes' balance sheet are unknown.
      diligencePath: >-
        Request the Tilia acquisition business case and integration plan from management; review any
        Linden Lab filings or press releases for pricing; clarify whether Tilia's virtual currency
        infrastructure is being repurposed for stablecoin or digital wallet capabilities.
      relatedQuestionRefs:
        - QO022

    - type: missing-source
      severity: minor
      topic: strategy
      missingEvidence: >-
        No public statements on Thunes' exit or IPO plans have been found through May 2026; the
        company has not indicated a timeline for a public listing or strategic acquisition.
      whyItMatters: >-
        PE-backed companies (Apis Partners, Vitruvian Partners) typically have defined hold periods
        (5-7 years); absence of IPO or M&A signals makes exit timeline and liquidity events
        difficult to model for prospective investors.
      diligencePath: >-
        Request management guidance on exit strategy during formal diligence; review any LP updates
        from Apis Partners or Vitruvian Partners that reference Thunes; compare to Nium which has
        disclosed and deferred IPO ambitions.
      relatedQuestionRefs:
        - QO028

