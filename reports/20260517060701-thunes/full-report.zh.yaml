      - number: '6.4'
        title: 留存与收入韧性
        blocks:
          - type: paragraph
            body: >-
              Thunes 未披露任何分层的净收入留存（NRR）、总收入留存（GRR）、年度客户流失率或队列级数据。这些是衡量 Thunes
              业务质量最关键的指标——它们决定收入增长主要来自存量网络扩张，还是不断替换流失成员。没有 NRR，就无法在结构上区分复合增长（NRR > 100%）和流失替换跑步机（NRR <
              100%）。结构性因素强烈支持高留存：客户要把 API 集成进 Thunes DGN，需要数月投入，完成 KYB、技术 API
              集成、合规流程嵌入和特定走廊测试——这会形成高切换成本。一旦客户上线生产，迁移到不同供应商就意味着重新谈判特定走廊银行关系、重新集成合规工具，并承担服务中断风险。

              市场地位相似的 B2B 支付基础设施商——Adyen、Worldpay（被 FIS 收购前）、Currencycloud（被 Visa 收购前）——历史上通常报告 NRR 高于
              100%，原因是存量客户内部交易量扩张，而不是涨价。Thunes 的 $150M 收入运行率和正 EBITDA（2025 年 4 月）与稳定或增长的客户基础相一致，而非大规模流失。摩洛哥走廊扩张（2025 年 9
              月）和 Ecobank 分阶段铺开代表了新的客户价值创造——需要摩洛哥或非洲走廊的现有成员现在无需更换供应商即可服务这些目的地，这本身就是一种隐性留存激励。

              本研究周期内未能访问 G2、Gartner Peer Insights 或其他独立客户评价平台数据。Trustpilot 未返回 thunes.com 相关结果。缺少公开评价足迹符合纯 B2B
              客户模式：企业客户通常不会留下公开平台评价；但这也阻止了独立满意度验证。
