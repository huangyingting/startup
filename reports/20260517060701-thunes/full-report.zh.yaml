      - number: '4.4'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >-
              Thunes 从 Series A 到 Series D 累计股权融资约 $352 million。2025 年 4 月的 $150 million Series D 是公司史上最大单轮融资，由 Apis
              Partners 和 Vitruvian Partners 领投；两者都是深耕金融服务的私募股权机构。CEO Floris de Kort 确认估值较 Series C（2023 年 7 月，$900
              million+）「大幅提升」，意味着 Series D 投后估值大致落在 $1.2–1.8 billion 区间。Series C 投资者包括 Marshall Wace（领投）、Bessemer
              Venture Partners、Visa、EDBI 和 Endeavor Catalyst；PitchBook 来源显示 Series C 前估值为 $794 million，最终 Series C 以超过
              $900 million 估值完成。因此，融资时间线体现出连续估值上行，而非同业部分公司出现的 down-round——这对 Thunes 的资本结构是正面信号。


              Series D 关闭时公司披露正 EBITDA，意味着月度现金消耗大概率显著低于亏损同业。公司未披露烧钱速度；若 EBITDA 说法准确，且 EBITDA 大体接近经营现金生成（不计 D&A
              和资本开支），$150 million Series D 资金在保守假设下可把 Thunes 的现金跑道延长到 24 个月以上；如果 EBITDA 能自我维持，甚至可能无限延长。不过，EBITDA
              不等于自由现金流：Limonetik、Tookitaki、Tilia 收购产生的 D&A、MAS 和 FCA 要求的监管资本留存，以及技术和网络扩张资本开支，都可能使实际自由现金流显著低于
              EBITDA。公司列明的资金用途——美国市场扩张、DGN 加深、AI
              和数字资产互操作——都需要持续资本投入。公开渠道未披露债务额度、可转债工具或或有负债；资本结构看似纯股权，但若没有经审计财务报表或股权结构表，无法验证。以「thunes」检索 UK Companies House
              没有返回该名称下仍活跃的 Thunes 金融科技实体，说明获得 FCA 授权的英国业务可能注册在子公司名下（例如 TransferTo 或更名后的法律实体）；ACRA Singapore 则保存集团主要公司文件。
