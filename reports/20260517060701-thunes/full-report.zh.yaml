      - number: '7.2'
        title: 运营与财务风险
        blocks:
          - type: paragraph
            body: >-
              Thunes 最主要的运营风险是财务不透明。公司公开称，截至 2025 年 4 月，收入运行率为 $150 million，EBITDA 为正；但这些数字来自公司口径、未经审计——自 2019
              年品牌重塑以来，任何财年都没有公开的独立第三方验证、经审计财报或详细 P&L 拆分。这是私营公司的常见披露做法，但会显著拉高投资不透明度：投资者无法独立核验 EBITDA
              利润率、最近几个季度的收入增长轨迹、$150M D 轮的资本投放效率，也无法确认正 EBITDA 是否覆盖包括 Tilia 收购在内的所有业务单元。「正 EBITDA」与自由现金流差别很大——公司可以展示
              EBITDA 为正的指标，同时仍因营运资本扩张、收购整合资本开支、美国市场加速扩编而继续消耗现金。

              2025 年 6 月收购 Tilia（游戏和虚拟货币支付平台，前 Linden Lab / Second Life 子公司）带来了整合与执行风险。Tilia 所在的游戏、虚拟经济和元宇宙支付领域，与 Thunes
              核心跨境 B2B 基础设施相邻，但它有自己的用户群、监管触点和虚拟货币牌照义务。把 Tilia 的系统、合规框架和运营团队并入 Thunes 全球基础设施，需要管理层投入带宽和资本。Thunes
              此前完成过两笔收购（Limonetik 2021、Tookitaki 多数股权 2022），公开记录未披露重大整合困难，说明公司具备一定收购整合能力；但 Tilia 交易规模更大，运营复杂度也高于此前两笔。

              API 可靠性和运营连续性仍是不透明风险：Thunes 没有在公开产品文档中发布服务等级协议或 API 可用率数据。其网络成员包括 Uber、Deliveroo 和
              Grab——这些零工经济平台依赖实时付款——但公司没有披露可用率承诺，给企业信任留下缺口；一旦结算延迟或网络中断，也可能带来合同责任敞口。SmartX Treasury System 覆盖 80+
              种货币和实时外汇结算，但系统流动性充足性或压力测试结果没有公开的独立审计。
