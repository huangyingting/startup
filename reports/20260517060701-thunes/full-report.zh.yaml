            body: >-
              Thunes 的竞争优势主要不在软件 IP，而在 720 个直接成员集成（绕过代理行中介）、50 张监管牌照（每个司法辖区都需要多年和大量资本）、PCI DSS 与 ISO 27001 认证，以及 SmartX
