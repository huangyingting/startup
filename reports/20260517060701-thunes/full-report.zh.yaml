      - number: '6.2'
        title: 采用情况与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，Thunes 已把 Direct Global Network 扩至 720 个成员；此前 2025 年 4 月 Series D 公告引用的公开数字为 550
              个直接集成，说明网络规模在约一年内增长约 31%。公司在 2025 年 4 月 Series D 时报告 $150 million 收入运行率和正
              EBITDA，这对一家私有跨境支付基础设施公司是重要规模里程碑。该网络此前在 2023 年中（TechCrunch Series C 报道）处理过 $50B+
              累计交易——考虑到成员扩张，这一指标几乎肯定已经增长。官网引用的 85% 实时结算率和 140 国覆盖是网络运营质量指标，而不是客户数或单客户收入。

              客户获取同时由直接销售和网络效应转介绍驱动：当 Mastercard、Visa 或 PayPal 作为网络成员加入，其子客户和伙伴无需单独集成即可触达 Thunes 走廊，覆盖随之复合。2025 年 1 月
              PayPal Hyperwallet 加入后，APAC 移动钱包付款覆盖六个国家的 450M+ 端点——单个伙伴关系就显著扩展了 Thunes 在东南亚的可触达范围。摩洛哥在 2025 年 9
              月被加入为实时走廊；Ecobank 从 2025 年 10 月的 Togo 开始分阶段推向 32 个撒哈拉以南非洲国家，构成 Thunes 在非洲大陆最大的单一伙伴扩张。

              Thunes 不披露按分层的客户数、每期新增客户或 CAC/回本指标。$150M 收入运行率意味着 720 个成员的平均网络成员收入约为 $208K，符合企业 B2B
              支付基础设施定价。不过，这个平均值掩盖了很大离散度：少数高交易量 MTO 和大型平台客户很可能贡献了不成比例的收入份额。
