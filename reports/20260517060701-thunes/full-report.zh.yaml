        - 低（EBITDA 为正说明收入基础稳定）
        - 退出 / 拒绝持仓；核心投资逻辑破裂
      - - 大客户流失（Uber、Grab、WeChat）
        - 新闻公告；竞争对手赢单；任何文件中的交易量数据
        - 前三大交易量客户公开宣布离开
        - 中低（合作仍活跃；但不排他）
        - 立即复核；投资逻辑显著受损
      - - 监管行动（MAS 或 FCA）
        - MAS/FCA 公开登记册；监管公告
        - 牌照被暂停、限制或撤销
        - 很低（目前无信号；EBITDA 为正降低财务风险）
        - 立即退出；网络面临生存威胁
      - - 被迫在 $1.0B 以下下轮降价
        - Series E 或桥轮融资公告披露估值
        - Series D 后投后估值低于 $1.0B 估计区间
        - 低（EBITDA 为正降低资本紧迫性）
        - 复核；资本损失情景被确认
      - - CEO Floris de Kort 离任
        - 公开高管公告；LinkedIn / 公司沟通
        - CEO 辞任、被替换或被迫离任公告
        - 低（近期才任命；带领公司完成 Series D）
        - 信号事件；立即复核；大概率降低信心
    notes: 触发概率带有判断色彩，并基于截至 2026 年 5 月的公开信息。近期最关键风险是大客户流失，因为 Thunes 的网络价值高度依赖企业平台客户带来的交易量集中。监管行动最严重，但也是最不可能发生的触发因素。
  - id: TV006
    title: 最终尽调问题表
    description: >-
      Most critical pre-investment diligence items for Thunes — what is needed and why, given the current information
      gap.
    claimRefs:
      - CV028
      - CV029
      - CV030
      - CV031
      - CV032
    columns:
      - 尽调问题
      - 重要性
      - 数据来源
      - 是否阻断？
    rows:
      - - FY2023 和 FY2024 经审计收入与 EBITDA
        - $150M 运行率未经验证；EBITDA 为正未经审计；两者都是估值核心
        - 管理层资料室；独立审计师报告
        - 是——没有经审计财务，所有估值估计都是推测
      - - Series D 投后估值和优先股堆叠
        - 投后估值未知，无法验证入场倍数；优先权悬置会影响回报情景
        - 管理层披露；资料室中的股权结构表文件
        - 是——估值不透明是最大单一投资风险
      - - 前 10 大客户集中度和净收入留存率（NRR）
        - 收入质量；流失风险；判断 Uber/Grab/WeChat 是增长还是稳定
        - 财务资料室；收入运营报告
        - 是——没有这些数据，客户集中风险无法量化
      - - FCA 和 MAS 牌照状态确认
        - 确认监管状态干净；没有待处理行动、限制或强化监管
        - FCA Financial Services Register；MAS 登记册；监管法律顾问
        - 重要——确认不存在未披露合规风险
      - - 地理收入集中度（走廊拆分）
        - 高利润走廊 vs. 过手流量；弄清收入实际在哪里产生
        - 管理账目；CFO 披露
        - 重要——评估收入质量和竞争韧性需要这一项
      - - CEO 与领导层股权和归属结构
        - 管理层利益一致；任期风险；理解 Floris de Kort 和 Chloé Mayenobe 的激励期限
        - 资料室；雇佣协议摘要
        - 重要——利益一致性会影响一直到流动性事件的执行质量
    notes: 标为「是」的阻断项应在任何投资承诺前解决。只有当经审计财务确认估值假设，且资料室访问没有发现反向股权结构或监管问题时，「观察」建议才会转为潜在买入 / 持有建议。
