            body: >-
              Nium 可通过 ACRA Singapore 文件（fintechnews.sg 转引）看到经审计 FY2024 收入 SGD 167.2M、净亏损 SGD 88.1M；Thunes
              则没有同等公开来源的财务细节。$150M 运行率只是一个单点数据，没有多年轨迹、没有分部拆分，也没有审计验证。截至 2026 年 5 月运行日期，公开流通渠道没有 Thunes ACRA
              文件摘要；新加坡公司法要求提交年度申报，但公众可及性取决于第三方聚合。缺少历史收入数据（2025 年前）、毛利率和客户级经济模型，意味着任何估值模型都建立在一条未经审计的管理层主张之上。以 Thunes
