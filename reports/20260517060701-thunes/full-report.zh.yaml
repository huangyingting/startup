      - number: '2.3'
        title: 买方与细分市场格局
        blocks:
          - type: paragraph
            body: >-
              Thunes 的买方格局可分为五类，差异来自技术要求、支付量和采用触发点。支付服务提供商（PSPs）和数字钱包运营商是交易量最高、频率最高的细分：它们把 Thunes DGN
              嵌入为自身客户的后台出款轨，按笔付费，更看重覆盖广度（走廊数量）而不是深度。银行和 NBFI 是第二类；Thunes 的 SWIFT 接入（October 2025 推出）让现有 SWIFT
              成员无需额外集成即可路由到 Thunes DGN，是重要的分发加速器。跨国公司（MNCs）是客单价最高的买方，用 Thunes 做供应商付款、国际薪酬和跨多司法辖区的资金管理。

              电信运营商和金融科技平台构成第四类，GCash 合作（Philippines）就是例子：约 2 million 名在欧洲的菲律宾人于 2024 年向 Philippines 汇出 $3.8
              billion，Thunes 支持实时数字钱包充值。电商和零工经济平台补齐买方版图：Thunes 收购 Tilia，把 DGN 触达延伸到游戏和虚拟经济出款。按 Mordor
              Intelligence，大企业占整体 B2B 支付收入的 60.31%，但 SME 是增长最快细分，CAGR 为 16.23%，说明简化版跨境支付 API 存在更长期的市场扩张机会。BFSI 是最大行业垂直，占
              B2B 支付需求的 25.18%。Thunes 自有研究引用的一项调查显示，65% 外派人士把速度列为选择跨境支付提供商的首要标准，进一步支撑 DGN 直接结算的价值主张。
