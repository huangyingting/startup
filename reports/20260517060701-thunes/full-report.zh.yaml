      - number: '7.5'
        title: 缓释因素与止损条件
        blocks:
          - type: paragraph
            body: >-
              Thunes 的主要结构性缓释因素包括：（1）多司法辖区牌照（MAS MPI、FCA API、ACPR PI、HK MSO、50 个美国
              MTL）形成地域冗余——单一司法辖区撤销牌照，不会让全球网络失效；（2）EBITDA 为正，相比亏损同行降低了资本风险；（3）自研 Fortress Compliance Platform（源自
              Tookitaki）提供 AML/CFT 筛查，比外采方案更不容易受到监管挑战；（4）SWIFT 连接降低了机构成员对直接银行集成的依赖；（5）2025 年 4 月的 $150M D 轮融资
              提供了现金跑道，即便按保守收入增长假设，也估计足以支撑美国市场扩张。

              风险升级的关键监测指标包括：MAS 和 FCA 牌照在公开登记册中的状态；通过 NMLS Consumer Access 跟踪 NY、CA 和 TX 的美国 MTL 审批进度；Circle 和 Ripple 在
              MiCA 及 SEC 和解后美国框架下的监管状态；相对 $150M 收入运行率基线的季度收入节奏；以及 CEO、副董事长或 CLO 离任的任何公告。Thunes 累计融资 $292M+、覆盖 5
              轮，并展示出投资人信心（Apis Partners、Vitruvian Partners、Marshall Wace、Bessemer），这构成较强的备用资本获取信号。

              需要紧急重新评估投资的投资逻辑破裂情景包括：MAS 或 FCA 牌照被暂停或撤销；美国 MTL 在 NY 或 CA 被拒，阻断美国市场进入；欧盟 MiCA 对 Circle 采取执法行动，暂停欧盟走廊的 USDC
              结算；收入增长停滞在 10% YoY 以下，且未披露改善盈利能力路径；CEO Floris de Kort 在上任 24 个月内离职；或 Tilia 整合产生重大减值或冲销，显示 Thunes 过往收购存在
              M&A 执行风险。目前已知事实没有显示上述任何情景有迫近概率。
