      - number: '4.2'
        title: 销售效率与单位经济模型
        blocks:
          - type: paragraph
            body: >-
              Thunes 面向企业买方销售——MTO、金融科技公司、银行、超级应用、零工经济平台和薪资服务商——路径包括直接企业销售和 API 合作。具名客户包括
              PayPal（Hyperwallet）、Remitly、Western Union、MoneyGram、Grab、Deliveroo 和
              Uber，显示客户结构偏向大交易量企业对手方；这类客户会谈量价，实际抽成率大概率低于标价。若没有年度 GTV 披露，很难倒推出混合抽成率；用已披露的 $150 million 收入运行率和估计 $50–200
              billion 年度 GTV 计算，混合抽成率约为 0.08–0.30%，符合跨境 B2B 支付基础设施的底层经济模型：相比消费者汇款，基础设施层价差天然更薄。


              获客成本、回本周期和净收入留存均未公开，外部无法独立评估 LTV:CAC 或收入韧性。截至 2026 年，720+
              个直接网络成员既包括付费企业客户，也包括可能只贡献间接交易量的网络伙伴。毛利率——最关键的单位经济指标——未披露；B2B 跨境支付基础设施运营商扣除网络费用、FX
              对冲成本、结算浮存和支付处理费之后，基准毛利率通常在 40–65%。如果 $150 million 收入运行率下正 EBITDA 的说法准确，说明 Thunes
              的规模已经足以用毛利覆盖运营费用——Nium、Airwallex 等同业达到这一里程碑花了更久；若能持续，也意味着其毛利率更接近基准区间上沿。
