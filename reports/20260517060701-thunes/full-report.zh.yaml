  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合概览
        blocks:
          - type: paragraph
            body: >-
              Thunes 围绕两条轴线组织商业产品——Pay 和 Accept——二者都通过单一 API 网关接入 Direct Global Network。Pay
              维度包含五个模块。Pay-to-Mobile-Wallets 将企业客户连接到全球 145 个移动钱包品牌以及 4 billion 个移动和稳定币钱包账户，98% 的交易可即时结算。Pay-to-Banks 覆盖
              140 个国家的 8 billion 个银行账户，包括 60 个国家的实时支付系统，价格最高比传统代理行电汇低十倍。Pay-to-Cards 覆盖 Mastercard、Visa 和 UnionPay 体系下
              15 billion+ 张卡，具备 PCI-DSS 认证的代币化和 24/7 可用性。Pay-to-Stablecoin-Wallets 支持向 140+ 个国家的 USDC 和 USDT 钱包付款，覆盖超过
              80% 的稳定币付款需求，并支持近实时、全天候结算。Business Payments 在 50+ 个国家提供本地 ACH 接入，覆盖 30+ 种货币，并向 170+ 个国家提供 USD 电汇，把 Thunes
              定位成可用单一合同替代传统代理行关系的方案。

              Accept 维度提供四个互补收款模块：Accept Mobile Wallets（145 个品牌、36+ 种货币结算，并为 Magento 和 Mirakl 提供插件）、Accept Bank
              Payments（Open Banking 和传统银行转账）、Accept BNPL 以及 Accept Digital Vouchers。所有产品底层共享同一套三支柱基础设施。2025 年 6 月收购
              Tilia 后，Thunes 新增卡受理能力——Visa、Mastercard、American Express、JCB 和 UnionPay——以及额外 48 个美国州和地区支付牌照，形成美国市场锚点，并把
              Thunes 的付款产品延伸到卡受理。Thunes 面向八个行业垂直：银行与数字银行、移动钱包、支付服务提供商、零工经济平台、MTO、数字资产公司、电商，以及薪资与 EOR 平台。代表性企业成员包括
              Uber、Deliveroo、Grab、WeChat 和全球 MTO。
