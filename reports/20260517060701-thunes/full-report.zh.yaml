      - number: '1.4'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Thunes 已通过四轮公开披露的机构融资筹集约 $292M；2019 Series A 之前没有外部融资（此前由盈利的 TransferTo 资助）。Series A（$10M，May 2019，GGV
              Capital 领投）是 Thunes 第一次引入外部资本。Series B（$60M，September 2020 公告 / May 2021 完成，Helios Investment Partners
              领投）将累计融资推至 $70M，并催化非洲和亚洲扩张。Series C（June 2023 首次交割 $60M；July 2023 总额 $72M，Marshall Wace 领投）确立 $900M+
              估值，并引入 Bessemer Venture Partners、01Fintech、Visa（战略再投资）、EDBI 和 Endeavor Catalyst。April 2025 Series
              D（$150M，Apis Partners 与 Vitruvian Partners 领投）是公司最大一轮融资；de Kort 称该轮相较 Series C 代表“估值大幅提升”，但未披露具体数字。

              累计投资人包括 Apis Partners、Vitruvian Partners、Marshall Wace、Bessemer Venture Partners、Helios Investment
              Partners、Checkout.com、GGV Capital、Future Shape（Tony Fadell 的公司）、01Fintech、Visa（战略）、EDBI（Singapore EDB
              的创投部门）和 Endeavor Catalyst。公开披露的累计融资约 $292M（10 + 60 + 72 + 150 = $292M），不过部分来源在计入未披露的 Series B
              分批资金后给出更高累计资本。Thunes 仍为私营公司；不同于曾讨论上市的 Nium，Thunes 没有公开给出 IPO 时间表。
