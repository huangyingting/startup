  - id: TR001
    title: 监管 / 法律风险台账
    description: >-
      Thunes' principal regulatory and legal risks across jurisdictions — status, likelihood, severity, mitigation, and
      residual exposure. Ordered by severity (critical to low).
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
      - CR010
      - CR033
    columns:
      - 风险 / 法规
      - 司法辖区
      - 状态
      - 可能性
      - 严重性
      - 缓释措施
      - 剩余敞口
      - 尽调请求
    rows:
      - - 欧盟 MiCA / PSD2 交互——USDC 稳定币结算合规（EBA No-Action Letter 于 2 March 2026 到期）
        - 欧盟 / 法国
        - 进行中——过渡窗口已关闭；Circle 必须证明 EMT 状态符合 MiCA
        - 中——Circle 一直在建设 MiCA 合规，但过渡窗口很紧
        - 关键——若 Circle 失去 MiCA 合规，欧盟稳定币结算将暂停
        - Circle 的 MiCA 合规计划；Thunes 持有 ACPR PI 牌照，可开展欧盟业务
        - 较高——监管时点取决于第三方（Circle）的合规落地
        - 确认 Circle 当前在 MiCA 下的欧盟电子货币代币授权状态；若 USDC 暂停，Thunes 的应急方案
      - - 美国 MTL 监管批准——50 州牌照“subject to regulatory approval”
        - 美国（50 州）
        - 待定——牌照已取得；最终监管批准仍标记为未完成
        - 中——多数州可能批准；NY DFS 和 CA DFPI 要求最高
        - 高——主要州拒批或延迟会阻断美国市场进入
        - 通过 Thunes Financial Services 申报 50 个 MTL；正与州监管机构积极沟通
        - 较高——美国扩张策略取决于所有关键收入州完成批准
        - 索取逐州 MTL 批准状态；确认 NY 和 CA 批准时间表
      - - MAS MPI 牌照撤销或正式监管行动
        - 新加坡
        - 公开记录中未发现当前执法行动
        - 低——未见当前 MAS 执法信号；Thunes 符合 MPI 要求
        - 关键——新加坡是总部；MAS MPI 是主要运营牌照
        - 持续运行符合 MAS 要求的资本充足、AML/CFT 和报告计划
        - 低——未见当前信号；合规成本是持续运营项
        - 确认最新 MAS 检查结果；资本充足门槛和余量
      - - FCA 授权支付机构牌照暂停或英国监管行动
        - 英国
        - 公开记录中未披露当前 FCA 执法行动
        - 低——未见 FCA 执法信号；Thunes 持有授权支付机构（API）资格
        - 高——英国是主要通道，也是欧洲至新兴市场汇款的重要来源地
        - FCA 授权支付机构（API）合规；按 Payment Services Regulations 保护客户资金
        - 低——未见当前信号；监控仍属标准动作
        - 确认 FCA 登记状态和上次检查日期；保障账户余额
      - - FATF AML/CFT 不合规——代理行撤出风险
        - 全球（40+ 个司法辖区）
        - 持续——FATF 标准要求持续计划；未发现违规
        - 低-中——新兴市场通道天然 AML 风险较高
        - 高——代理行撤出会让 SWIFT 路由跨境流停摆
        - Fortress Compliance Platform（源自 Tookitaki）在线 AML/CFT 筛查
        - 低-中——高风险新兴通道的运营合规风险仍在
        - 索取 SAR 申报历史、AML 误报率和 FATF 要求的审计记录
      - - 法国 ACPR PI 牌照合规与欧盟支付机构维护
        - 法国 / 欧盟
        - 有效——ACPR PI 牌照于 April 2023 授予；需持续合规
        - 低——未发现 ACPR 执法行动
        - 中——若牌照失效，法国和欧盟支付通道会受影响
        - 运行符合 ACPR 要求的 PI 计划；通过 ACPR 牌照进行欧盟跨境通行
        - 低——未见当前信号；需例行合规维护
        - 确认 ACPR 年度合规报告提交和状态
    notes: >-
      风险可能性和严重性评估基于截至 May 2026 的公开监管公告、牌照登记数据和标准 B2B 支付基础设施风险框架。已查阅的 MAS、FCA、ACPR 或 NMLS 记录中未发现 Thunes
      执法行动；未发现并不排除未公开往来。MiCA/Circle 合规窗口风险按 EBA February 2026 意见评估；状态可能快速变化。
    enumerationScope:
      coverage: partial
      basis: >-
        Covers six most material regulatory and legal risk categories for Thunes based on publicly available license
        data, regulatory body announcements, and risk analysis as of May 2026; excludes minor jurisdictional regulatory
        variations, potential future enforcement actions not yet documented in public sources, and non-payment
        regulatory obligations.
