      - number: '5.3'
        title: 开发者体验与集成
        blocks:
          - type: paragraph
            body: >-
              Thunes 采用门控式开发者模式，符合持牌企业 B2B 支付基础设施的特征。API 文档托管在 docs.thunes.com，覆盖用于发起付款的 Money Transfer APIs 和用于受理的
              Collection APIs，并记录了对银行、MTO、PSP、平台与市场平台、电子钱包的支持。集成路径包括标准 REST API 连接、面向金融机构的 SWIFT 接入，以及面向无专职工程团队成员的无 API
              Business Hub 路径。

              不同于 Stripe（自助沙盒、广泛公开文档）或 Moov.io（开源支付基础设施、社区维护的 GitHub 库）等开发者优先平台，Thunes 不运营公开 GitHub 组织；截至 2026 年 5
              月，Stack Overflow 上标记为「thunes」的问题为零。开发者参与发生在直销和准入流程中，而不是公开开发者社区；持牌支付基础设施通常如此，因为监管 KYB 准入和合同签署要先于 API
              凭证发放。这种门控模式并不阻碍大交易量生产部署——Uber、Deliveroo 和 Grab 等成员证明其能支撑全球规模的企业级使用。不过，缺少公开开发者社区，相比开发者优先的支付 API
              平台，会降低自然开发者发现和自助采用速度。公开状态页缺位（截至 2026 年 5 月，status.thunes.com 未解析）也是一个运营透明度缺口；企业 SaaS 同业通常发布实时事故看板。SWIFT
              连接选项显著降低银行机构成员的集成负担，而银行机构是 Thunes 在 2025–2026 年美国扩张阶段的重要可触达增长市场。
