      - number: '3.3'
        title: 功能、能力与定价对比
        blocks:
          - type: paragraph
            body: >-
              在八项购买标准中，Thunes 在新兴市场移动钱包触达（140 个国家的 145 个移动钱包品牌、4B 钱包端点）和合规广度（50 个市场牌照，包括 MAS、FCA、ACPR 以及美国全部 50
              个州）上领先竞争对手。没有竞争对手公开宣称同时在 Africa、APAC 和 LATAM 拥有同等移动钱包深度。Airwallex 领先于多产品广度（全球账户 + 费用管理 + 发卡），Wise Platform
              领先于 FX 透明度和合规工具成熟度，Nium 在 APAC/MEA 发卡 BaaS 上领先。Ripple 和 Circle 则专门领先于稳定币结算基础设施。

              定价方面，Thunes 不发布价目表；企业合同按交易量、走廊组合和产品范围谈判。这符合直接 B2B 网络基础设施惯例，但会给偏好透明定价的 SMB 买方带来摩擦。Airwallex 的分层定价（免费
              Explore 层、$49/month Growth 层、企业定制）给它带来中端市场优势。Wise Platform 按基于交易量的条款向银行和企业收取定制费率。SWIFT gpi
              通过代理行关系传导成本，跨境企业资金流通常总成本为 1-3%。Ripple 声称借助稳定币结算显著降低相对传统支付轨的成本，但企业合同条款未披露。

              功能能力矩阵（FP002）显示，Thunes 在移动钱包触达和合规广度上最强；相对 Stripe 和
              Airwallex，开发者集成体验中等；稳定币支付轨通过合作而非原生基础设施发展。若买方追求纯开发者体验和透明定价（SMB、数字原生金融科技），Airwallex 和 Wise Platform
              是更强替代方案。若买方追求 Africa、APAC 和 LATAM 的最大新兴市场移动钱包触达与监管覆盖，Thunes 的替代选择更少。
