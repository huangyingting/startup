            body: >-
              截至 2026 年 5 月，Thunes 公开确认其符合 PCI DSS 并获得 ISO 27001 认证，使其成为少数在所述范围内同时持有两项认证的跨境支付网络之一。PCI DSS 覆盖
              Pay-to-Cards 和 Tilia 卡受理能力等卡数据处理。ISO 27001 覆盖 Thunes 各运营实体的信息安全管理体系。两项认证均由 Thunes
              在官网和合规页面自述；公开可访问文档中未找到具体等级、认证机构和最近审计日期，尽调中应予验证。

              Fortress Compliance 支柱在全部 50 个持牌市场嵌入 AML 风险控制、KYC/KYB 验证和制裁筛查。2022 年 4 月收购的 Tookitaki AML
              机器学习引擎支撑交易监控。监管授权覆盖所有主要金融司法辖区：MAS（新加坡）Major Payment Institution、FCA（英国）Authorised Payment
              Institution、ACPR（法国）Payment Institution 并可延伸至欧盟、FinCEN（美国）Money Service Business 并在美国 50 州持有 Money
              Transmitter Licenses、FINTRAC（加拿大）Money Services Business，以及香港海关 Money Service
              Operator。客户资金存放在授权信贷机构的专用账户，与 Thunes 公司资金完全隔离。DGN 平台公开报告 99.99% 平台正常运行时间和 98% 服务质量成功率。截至 2026 年 5
              月运行日期，公开记录中未发现针对 Thunes 的重大监管执法行动或已记录安全事件。
