          - type: callout
            title: 门控开发者模式和未披露合同 SLA 会拖慢企业采购
            body: >-
              Thunes 缺席公开开发者社区（Stack Overflow 问题为零、无公开 GitHub 组织、无公开可访问状态页），且未披露合同层面的 API 正常运行时间
              SLA，这是企业采购周期中的重要摩擦点。企业支付买方通常会在生产部署前要求主服务协议（MSA）中的公开正常运行时间承诺、历史事故日志和沙盒访问。虽然 Thunes 在官网公开报告 99.99% 平台正常运行时间和
              98% 服务质量成功率，但合同 SLA 承诺水平未披露。投资者和企业采购团队应要求提供：(1) Thunes 按产品和走廊拆分的 12 个月正常运行时间记录；(2) MSA 中的合同 SLA
              条款，包括违约罚则；(3) API 事故历史，包括平均发现时间和平均恢复时间指标；以及 (4) 合格安全评估师出具的当前 PCI DSS Attestation of Compliance
              副本，用于确认等级和范围。
            calloutType: risk
            claimRefs:
              - CE005
              - CE025
              - CE034
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群分层
        blocks:
          - type: paragraph
            body: >-
              Thunes 将付费客户群分为八个垂直领域，每个领域都有不同支付场景。Remitly、Western Union、Ria 等汇款运营商（MTO）使用 Thunes
              的汇款走廊扩展到新兴市场；这些客户贡献高交易量，是最具战略意义的客户之一，但也存在竞争重叠，因为 MTO 越来越多地自建直连支付轨道。Commercial Bank of Dubai、Revolut
              等银行和数字银行使用 Thunes，把商业付款和供应商发票结算送达代理行速度慢或成本高的市场。GCash、M-Pesa、Airtel、MTN、Orange 和 WeChat Pay 等移动钱包加入 Direct
              Global Network (DGN)，既作为发送端点，也作为接收侧走廊，从而实现双边互操作。支付服务提供商连接 Thunes，为没有本地银行关系的市场中的零工、自由职业者和市场平台卖家批量付款。

              Uber、Deliveroo、Grab 等零工经济平台使用 Thunes，在 140+ 个国家把工人报酬实时打到移动钱包和银行账户。薪资和 EOR 平台使用
              Thunes，在没有本地银行实体的市场发放多币种薪资；这一垂直受益于 Thunes 的美国 MTL 覆盖（50 州）以及面向薪资时点 SLA 的实时结算。电商商户用 Thunes 通过 220+
              种本地支付方式收款，并以本币结算，从而提高新兴市场结账转化率。数字资产公司集成 Thunes，用于法币出入金、稳定币钱包充值，以及向 40+ 个国家银行账户和钱包的最后一公里付款。

              地理集中度映射到新兴市场足迹：APAC（东南亚、南亚）、撒哈拉以南非洲和 LATAM 是主要增长市场，不过在 2024–2025 年实现美国 50 州 MTL 后，美国扩张正在加速。客户在所有垂直领域选择
              Thunes 而非代理行替代方案时，最常引用的关键差异化是 85% 实时结算率和 140 国覆盖。
