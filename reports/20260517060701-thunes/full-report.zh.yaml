      - number: '7.6'
        title: 展项
        blocks:
          - type: callout
            title: MiCA / Circle 合规窗口是时效性最高的监管风险
            body: >-
              EBA 2026 年 2 月 12 日意见将 PSD2/MiCA 衔接的 No-Action Letter 过渡期结束时间定为 2026 年 3 月 2 日，这是 Thunes 时效性最高的监管风险。Thunes
              的欧盟稳定币结算能力——2024 年 10 月通过 Circle/USDC 上线，并在 2025 年 11 月随 Mastercard 扩展——依赖 Circle 在欧盟维持 MiCA
              合规的电子货币代币（EMT）授权状态。Circle 侧出现合规缺口，不等于 Thunes 监管失败，但会迫使 Thunes 暂停欧盟 USDC 结算运营，损害稳定币收入线和产品差异化叙事。投资者应索取
              Circle 当前 MiCA EMT 授权状态、USDC 受扰时 Thunes 的应急运营方案，以及 Thunes 当前结算量中以 USDC 计价的比例。
            calloutType: risk
            claimRefs:
              - CR008
              - CR009
              - CR021
              - CR035
          - type: callout
            title: 财务不透明是企业和投资交易对手的结构性尽调缺口
            body: >-
              Thunes 披露的「$150M 收入运行率和正 EBITDA」（2025 年 4 月 D 轮融资）来自公司口径、未经审计。自 2019
              年品牌重塑以来，任何财年的经审计财报都未公开。对一家计划大举扩张美国企业市场的公司来说，这种不透明是结构性尽调缺口：大型美国金融机构和企业 SaaS
              买方在签署重大基础设施协议前，通常要求两到三年的经审计财务。$150M D 轮融资来自私募股权机构（Apis Partners、Vitruvian
              Partners）——这类投资人习惯私营公司的不透明——但美国市场扩张会遇到不同的披露标准。投资者应取得完整经审计财报，并拆分收入的地域、产品线和主要网络成员集中度。
            calloutType: risk
            claimRefs:
              - CR011
