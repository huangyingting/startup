  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Thunes 运行在多司法辖区监管框架下；这既是它最主要的竞争优势，也是运营复杂度最高的风险簇。公司持有 Monetary Authority of Singapore (MAS) 的 Major Payment
              Institution (MPI) 牌照、英国 Financial Conduct Authority (FCA) 的 Authorised Payment Institution (API) 授权、法国
              Autorité de Contrôle Prudentiel et de Résolution (ACPR) 的 Payment Institution 牌照（2023 年 4 月取得）、香港 Money
              Service Operator (MSO) 牌照，并通过 Thunes Financial Services 在美国 50
              个州持有汇款牌照——但多份公开公告仍称这些牌照「仍待监管批准」，说明部分司法辖区的最终批准可能仍在等待。美国 MTL 限定很重要：New York DFS 和 California DFPI
              的汇款牌照制度要求很高，而纽约虚拟货币监管框架可能使 Thunes 在美国市场的稳定币相关业务更复杂。

              European Banking Authority 在 2026 年 2 月 12 日发布意见称，PSD2/MiCA 交互关系下的 No-Action Letter 过渡期将于 2026 年 3 月 2
              日结束。这会直接影响 Thunes 与 Circle 在欧盟司法辖区的 USDC 结算业务：使用 USDC 的电子货币代币（EMT）交易，需要 PSD2 授权框架与发行人的 MiCA 合规相互协调。如果
              Circle 的 USDC 未能在 MiCA 下取得或维持 EMT 地位，Thunes 的欧盟稳定币结算能力可能会在重新授权前暂停。另外，Ripple Payments 在 2025 年 9 月集成进
              Thunes SmartX Treasury System；即便 SEC 针对 XRP 的执法案已解决，Ripple 仍带有美国监管观感残余风险。

              FATF 40 Recommendations 定义了适用于 Thunes 全部运营司法辖区的国际 AML/CFT 法律框架；任何司法辖区不符合 FATF
              标准，都可能引发代理行撤出、监管检查或牌照暂停。Thunes 内部 Fortress Compliance Platform（部分来自 2022 年 4 月收购 Tookitaki 多数股权）提供一体化
              AML/CFT 筛查，这是结构性缓释。截止 2026 年 5 月，在任何公开记录中均未发现 MAS、FCA、ACPR 或美国州级监管机构针对 Thunes 的执法行动、罚款或制裁；NMLS Consumer
              Access 也确认 Thunes 的美国汇款牌照可公开追踪。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
