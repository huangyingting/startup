    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Thunes 是一家总部位于新加坡的私营 B2B 金融基础设施公司，为银行、数字银行、移动钱包运营商、支付服务提供商、汇款运营商、零工经济平台和电商企业提供跨境支付与收款服务。公司的旗舰产品是 Direct
              Global Network (DGN)，一个自研的单 API 集成网络，把成员连接到 130+ 个国家、80+ 种货币、550+ 个直接支付提供商集成、7 billion+ 个移动钱包和银行账户，以及覆盖
              320+ 种支付方式的 15 billion 张卡。DGN 内的重要品牌包括 GCash、M-Pesa、Airtel、MTN、Orange、JazzCash、Easypaisa、AliPay 和 WeChat
              Pay。DGN 的差异化来自自有 SmartX Treasury System（流动性管理）和 Fortress Compliance Platform（AML/KYC/制裁筛查）。

              Thunes 采用交易收费模式：按目的地国家，每笔交易收取两美分到 $2 的固定费用，货币转换则在中间价 FX 汇率上加少量点差。低毛利、高交易量的模型符合跨境支付基础设施逻辑。Thunes
              给出的使命是“连接世界每一个角落，让所有人都能进入全球经济”，标语是“让资金在全球流动的智能高速公路”。公司以新加坡为总部，并在 Barcelona、Beijing、Dubai、Hong
              Kong、Johannesburg、London、Manila、Nairobi、Paris、Riyadh、San Francisco 和 Shanghai 等 13 个地点运营。截至 April
              2025（Series D 公告），Thunes 披露收入运行率为 $150M，且 EBITDA 为正。已点名客户包括 Uber、Deliveroo、Grab、WeChat、Western
              Union、MoneyGram、PayPal（经 Hyperwallet）和 Remitly。
