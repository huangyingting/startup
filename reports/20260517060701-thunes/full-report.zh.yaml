companyProfile:
  summary: >
    Thunes 诞生于 2016：总部位于新加坡的移动支付运营商 TransferTo（创立于 2005）拆分为 DT One（手机充值）和 Thunes（跨境 B2B 支付），并在 February 2019 以 Thunes
    品牌公开重启。联合创始人 Peter De Caluwe 是连续金融科技创业者（Ogone、Naspers/PayU、DT One），一直是公司的核心高管；Floris de Kort 在 2024–2025 短暂接任后，De
    Caluwe 目前担任副董事长兼 CEO。Thunes 运营自研的 Direct Global Network (DGN)，这是一层单一集成连接网络，通过与银行、移动钱包、MTO 和稳定币端点的 550+ 直接集成，覆盖 130+
    个国家和 80+ 种货币，并由 SmartX Treasury System 与 Fortress Compliance Platform 补强。公司累计融资约 $292M，轮次包括 Series A（$10M，2019，GGV
    Capital）、Series B（$60M，2020，Helios Investment Partners）、Series C（$72M，估值 $900M+，2023，Marshall Wace）和 Series
    D（$150M，April 2025，Apis Partners 与 Vitruvian Partners）。Thunes 称在 Series D 节点实现正 EBITDA，这在跨境支付基础设施公司中是少见的盈利信号；Series
    D 资金将用于美国扩张、加深 DGN，以及建设 AI / 数字资产能力。近期网络和合作里程碑包括 Mastercard 稳定币出款（Nov 2025）、SWIFT 接入（Oct 2025）、Ripple 集成（Sep
    2025）、Ecobank 合作（Oct 2025）、Circle USDC 结算（Oct 2024）、收购 Tilia（Jun 2025），以及拿下美国全部 50 个州的汇款牌照。
