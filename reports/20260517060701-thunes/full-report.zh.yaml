        - 2024 → 2034
        - 全球（全部跨境：B2B + B2C + C2C）
        - $206.5B (2024) → $414.6B (2034)；CAGR 7.1%
        - 按渠道（银行转账、MTO、银行卡）统计的跨境支付收入
        - 高 — 成熟研究机构
        - 包含非 B2B 流量（C2C 汇款、B2C 电商）；统计的是收入而非交易额
      - - Ripple（行业估计）
        - 当前 → 2032
        - 全球（仅 B2B 跨境）
        - $31.6T 交易额 → 2032 年超过 $50T
        - B2B 跨境总交易额（不是收入）
        - 中 — 竞争对手赞助；按交易额口径会比收入口径放大机会
        - 交易额会把收入放大 100–200 倍；Ripple 是直接竞争对手
      - - Thunes（公司口径）
        - '2025'
        - 全球（全部跨境流量）
        - $150T 总市场机会
        - 全部全球跨境支付流：B2B、B2C、C2C、汇款
        - 低 — 用于投资测算时口径过宽；不是可服务收入市场
        - 包含 Thunes 无法变现的流量；将 SAM/SOM 放大了数个数量级
      - - McKinsey & Company（2024 全球支付报告）
