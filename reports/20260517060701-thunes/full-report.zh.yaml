      - number: '7.4'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >-
              CEO Floris de Kort 于 2024 年 1 月加入 Thunes，接替转任副董事长的联合创始人 Peter De Caluwe。De Kort 在支付行业履历扎实——他曾任 Worldpay
              Global eCommerce 部门 CEO，并带领该部门完成 2015 年 IPO；之后领导 Clearent 和 TSG 合并后的 Xplor
              Technologies。对扩张支付基础设施业务来说，这是很强的运营背景。但截至 2026 年 5 月报告运行日期，de Kort 上任约 16
              个月，任期仍偏短；同一时间，他还要推进美国市场扩张、稳定币产品增长、SWIFT 连接上线，以及一笔重大 M&A 交易（Tilia，2025 年 6 月）。联合创始人交接也让 Peter De Caluwe
              的关键人影响仍在：即便担任副董事长，他的战略视野、网络关系和组织知识仍然重要；一旦未来完全退出董事会职责，将是明显的组织拐点。

              Thunes 的美国市场扩张，是其增长路线图上近期最大的执行风险。公司要在美国搭建市场进入能力，并与 Stripe、Airwallex（融资超过 $900M）、Wise Platform（上市公司，披露财务）和
              Nium（IPO 路线）竞争；这些公司在美国企业销售上的存在感都更成熟。要打进去，需要大量商业、合规和工程投入。美国 B2B 支付基础设施市场比 Thunes 现有的新兴市场强势区域更透明，企业尽调要求也更高；而
              Thunes 进入美国时，没有大型美国企业和金融机构伙伴通常要求的公开财务披露记录。

              在重大美国市场进入的同时，整合三笔收购（Limonetik 2021、Tookitaki 2022、Tilia 2025），进一步增加执行复杂度。新加坡金融科技 市场中，工程、合规和支付运营人才被
              DBS、Grab、Sea Limited、Revolut 和 Airwallex 激烈争夺；薪酬压力和人才流失会持续带来运营风险。Thunes 的首席法务与合规官 Ruwan de Soyza（25+ 年经验，前
              Worldpay 总法律顾问）提供了较强的合规领导连续性；但考虑到公司的监管复杂度，若 CLO 离任，将是高风险信号。
