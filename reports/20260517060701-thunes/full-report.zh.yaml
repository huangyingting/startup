  - id: FV003
    title: 估值 / 回报区间 —— 悲观、基准、乐观
    type: range
    description: 在 18–36 个月投资期内，Thunes 悲观、基准、乐观情景下的预期企业价值区间。
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV025
    data:
      items:
        - label: 悲观情景（降价轮或困境）
          low: 700
          high: 1100
          unit: $M
          note: 收入停滞或主要客户流失；EBITDA 转负；被迫以压缩倍数融资
        - label: 基准情景（私募估值稳定）
          low: 1400
          high: 1800
          unit: $M
          note: 收入稳定在 ~$150M+；EBITDA 为正；短期没有流动性事件；维持当前估计区间
        - label: 乐观情景（IPO 或战略收购）
          low: 2000
          high: 2800
          unit: $M
          note: 经审计收入确认增长；EBITDA 利润率得到验证；出现 IPO 申报，或战略 M&A 给出溢价
  - id: FV004
    title: 投资 KPI
    type: kpi
    description: 用于跟踪 Thunes 观察建议的关键投资绩效指标。
    claimRefs:
      - CV001
      - CV003
      - CV005
      - CV006
      - CV007
    data:
      items:
        - label: 估计投后估值（Series D）
          value: $1.4B–$1.8B
          unit: estimated range
          trend: up
          note: 未披露；依据较 $900M+ Series C “大幅提升”的表述和同业可比公司估计
        - label: 收入运行率
          value: ~$150M
          unit: annualised (April 2025)
          trend: up
          note: Series D 公告披露；未经审计；基准情景估计估值隐含 9–12x 倍数
        - label: EBITDA 状态
          value: Positive
          unit: unaudited
          trend: up
          note: CEO 在 Series D 公告中确认；在私营 B2B 支付同业中少见
        - label: 累计融资
          value: ~$292M
          unit: cumulative
          trend: up
          note: Series A 轮 $10M + Series B 轮 $60M + Series C 轮 $72M + Series D 轮 $150M
        - label: 网络覆盖
          value: 130+ countries
          unit: via 320+ payment methods
          trend: up
          note: 7B+ 个移动钱包和银行账户；80+ 种货币；关键竞争差异点
