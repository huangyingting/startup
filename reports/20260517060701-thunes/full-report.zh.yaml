      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              多家独立分析机构用差异很大的方法测算 B2B 与跨境支付机会，结论区间很宽，但方向上都指向强增长。Mordor Intelligence（January 2026 更新）测算，全球 B2B
              支付总市场——包括本地资金流、所有支付工具和所有地区——2025 年为 $1.42 trillion，到 2031 年增至 $3.43 trillion，CAGR 为 15.48%。其中跨境子板块 CAGR 为
              16.52%，数字支付轨 CAGR 为 17.31%，均跑赢整体市场。

              Allied Market Research 独立测算，跨境支付市场（包括 B2B、B2C 和 C2C）2024 年收入为 $206.5 billion，到 2034 年增至 $414.6
              billion，CAGR 为 7.1%，其中 B2B 是最大的交易类型板块。Ripple 作为竞争对手，使用自有估计，将当前 B2B 跨境交易量测算为 $31.6 trillion，并预计到 2032 年增长至
              $50 trillion+。Thunes 内部则把机会框定为 $150 trillion 的总市场，这是覆盖所有全球跨境支付流的最宽口径。

              映射到 Thunes：TAM 是 B2B 跨境收入池总额（按 Allied Market Research，2024 年约 $206.5 billion）；SAM 是 Thunes 130 国 DGN
              覆盖内可触达的份额，考虑 DGN 走廊覆盖，估计约为全球收入池的 12–15%；SOM 则由 Thunes 截至 April 2025 的 $150 million 年化收入运行率和正 EBITDA
              证明，仅占收入 TAM 的不到 1%。North America 占整体 B2B 支付市场 34.27%；APAC 是增长最快地区，CAGR 为 17.42%；LAMEA 被认定为跨境支付中增长最快地区，正好贴合
              Thunes 的新兴市场走廊策略。2024 McKinsey Global Payments Report 估计，2023 年全球支付收入达到 $2.4 trillion，其中跨境资金流产生最高的单笔交易利润率。
