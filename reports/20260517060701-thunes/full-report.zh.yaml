  - id: TU005
    title: 扩张与集中度风险表
    columns:
      - 主题
      - 扩张驱动或集中度风险
      - 影响
      - 尽调路径
    rows:
      - - 交易量驱动扩张
        - 现有成员自身业务增长，带动 Thunes 交易量提升，且无需新增 CAC
        - 收入不增加新成员获客成本也能增长；若该效应占主导，NRR > 100%
        - 索取按队列年份拆分的 NRR；提供 12 个月内 Thunes 交易量翻倍的成员案例
      - - 地域扩张
        - 美国市场（已取得 50 州 MTL）；摩洛哥通道（Sep 2025）；经 Ecobank 覆盖非洲（Oct 2025）
        - 打开来自美国金融科技公司和非洲银行客户的新收入流
        - 索取美国已按收入标准筛选的机会管线；Ecobank 分阶段上线时间表
      - - 产品覆盖扩张
        - 成员在初始出款集成之上，再接入稳定币出款、SWIFT 连接或收款能力
        - ARPU 更高；客户关系更深；流失更低
        - 询问使用 2+ 个 Thunes 产品的成员占比与仅用 1 个的对比；交叉销售率
      - - MTO 集中度与竞争重叠
        - Remitly、Western Union、Ria 同时是 Thunes 客户和市场竞争者，也有能力自建支付轨道
        - 若头部 MTO 流失，影响重大；Western Union 一家每年处理 $100B+
        - 索取前三大 MTO 收入占总收入比例；跟踪 Western Union Evolve 平台进展
      - - 头部客户收入集中度
        - 未知——Thunes 未披露前五大或前十大客户收入占比
        - 3–5 个客户高度集中，会形成单一客户收入风险
        - 索取匿名化收入瀑布图；询问前十大客户占总收入比例
      - - 网络合作伙伴依赖
        - Visa、Mastercard、PayPal、Ripple、Circle、Swift 既是渠道合作伙伴，也可能成为竞争者
        - 若网络合作伙伴把 Thunes 能力内建化，客户流量可能被转走
        - 跟踪 Visa 直接钱包集成进展；跟踪 Mastercard Send 与 Mastercard-Thunes 交易条款
      - - 地域集中度与通道风险
        - APAC 和非洲交易密度高，但监管和货币波动也更大
        - 监管变化（移动钱包牌照、FX 管制）可能扰动特定通道
        - 索取前十大通道收入；询问通道级应急方案
    notes: >-
      客户集中度数据未公开披露。扩张驱动因素来自 Thunes 产品路线图、行业页面信息和 Series D 募资用途表述推断。MTO 竞争重叠风险基于分析师观察和行业结构；尚无具体 MTO 宣布计划自建替代 Thunes
      的专有支付轨道。网络合作伙伴风险是所有 B2B 基础设施平台的结构性风险，并非 Thunes 特有。
