        - 确认双边钱包运营商协议深度（排他 vs. 非排他）；跟踪 TerraPay 披露的钱包数量 vs. Thunes；评估前 10 大新兴市场走廊的 USDC 采用率
      - - 合规栈：50 个市场牌照，包括美国 50 州 MTL 以及 MAS/FCA/ACPR
        - Ripple 持有 75+ 个美国 MTL（超过 Thunes 披露数量）；Nium 持有 40+ 个牌照；资本充足的玩家可在 3–5 年内搭出同等新兴市场监管栈
        - 中 — 2 年内可防守；Ripple 的美国 MTL 数量证明可复制
        - 按产品类型和司法辖区确认 50 个市场牌照的准确拆分；评估 Thunes 50 个牌照与 Ripple 75+ 个 MTL 在美国走廊覆盖上的差距；跟踪 ACPR 和 HK MSO 牌照续期状态
      - - 中立高速路：Visa、Mastercard、SWIFT 和 Ripple 都是 DGN 成员，而非纯竞争对手
        - 网络巨头（Visa Direct、Mastercard）可能发展直连新兴市场出款能力，降低对 Thunes 的依赖；SWIFT 连接 11,000 家银行，具备竞争性网络枢纽位置
        - 中 — 伙伴模式带来收入多元化，也带来集中度风险
        - 评估 Thunes 收入中来自 Visa Direct、Mastercard 和 SWIFT 渠道伙伴的比例；判断是否有任何伙伴拥有排他条款，限制 Thunes 服务竞争网络成员的能力
      - - 收入运行率 $150M + EBITDA 为正（截至 2025 年 4 月 Series D）
        - Nium 亏损（FY2024 净亏损 SGD 88M），Airwallex 交易量更大（$235B+），都可能接受更低抽成率争夺战略客户；稳定币玩家以接近零的边际成本竞争
        - 高 — 资本充足竞品和稳定币替代方案压缩抽成率，是最尖锐的近期财务风险
        - 厘清 Thunes 在交易量上的实际抽成率；确认 EBITDA 利润率和不同走廊类型的收入结构；若一家主要 MTO 客户（WU、MoneyGram、Remitly）将新兴市场走廊内化，评估定价韧性
      - - Tookitaki AML 合规工具（2022 年收购）作为自有合规护城河
        - Airwallex 和 Nium 已内建合规能力；Wise Platform 的 80 个牌照包含强合规工具；RegTech SaaS 替代品（Chainalysis、Sardine）使 AML 工具商品化
        - 低 — AML 工具是 B2B 支付标配；不是独立护城河，但会增强合规栈价值
        - 确认 Tookitaki AML 是否覆盖全部 50 个 DGN 市场；评估自有 AML 工具是客户选择驱动因素，还是仅为控本工具；检查是否存在任何不利监管执法行动
      - - 720 个网络成员，形成双边市场网络效应
        - 多归属是常态：企业客户会同时使用 2–3 家提供方；Nium 的 285,000+ 家企业和 SWIFT 的 11,000 家银行代表更大的披露网络成员规模
        - 中 — 网络成员带来数据和关系优势，但挡不住多归属
        - 跟踪每季度净新增成员；按队列年份评估钱包份额留存；识别是否有任何排他签约成员；将 720 个成员基数与 Nium 和 TerraPay 的成员指标对比
    notes: >-
      严重程度基于截至 2026 年 5 月公开来源、产品公告和 Thunes 公开披露的竞争情报评估。Ripple 75+ 个美国 MTL 数量来自 Ripple 官方解决方案页面。Nium 财务数据来自 Fintech News
      Singapore FY2024 报告。Airwallex $235B+ 交易量来自 Airwallex 官方关于页面。所有严重程度评级都是分析师判断，不是公司披露指标；尽调问题需通过保密接洽验证。
