    notes: >-
      不同口径会让测算相差 100,000 倍：交易额（$150T 流量）、全部支付收入（$2.4T）、跨境收入（$206.5B），或特指 B2B 跨境子板块。Allied Market Research 的 $206.5B
      收入口径最保守，也最适合用于 Thunes 的 TAM 分析。Thunes $150M 的年化收入约占该 TAM 的 0.07%，说明仍有很大增长空间。Ripple 和 Thunes
