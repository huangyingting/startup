      - number: '3.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 稳定币支付轨对 Thunes 法币走廊经济性构成结构性威胁
            body: >-
              Ripple Payments 持有 75+ 张美国汇款牌照（超过 Thunes 披露数量），并明确把其稳定币与法币平台定位为优于传统法币 B2B 支付轨；后者正是 Thunes DGN 主要运行的基础设施。如果
              USDC、Ripple USD stablecoin 或其他竞争性数字资产在未来 3–5 年成为新兴市场出款走廊的主流，结算会转向链上，Thunes 双边法币钱包网络的经济性将被侵蚀。Thunes 已通过
              Circle（Oct 2024）、Mastercard 稳定币出款（Nov 2025）和 Ripple（Sep 2025）合作对冲，把稳定币运营商转化为网络成员。随着稳定币交易量增长，合作优先策略能否守住
              抽成率，仍是开放尽调问题。
            calloutType: risk
            claimRefs:
              - CP034
              - CP035
              - CP036
              - CP037
          - type: callout
            title: Thunes 的中立定位把结构性对手变成收入贡献方
            body: >-
              不同于 Nium（直接与 Visa/Mastercard 基础设施竞争）或 Currencycloud（Visa 所有，战略上受限），Thunes 的“智能高速公路”模型系统性地把网络巨头转化为 DGN
              成员：Visa Direct 合作（Oct 2022）、SWIFT 接入（Oct 2025）、Mastercard 稳定币出款（Nov 2025）和 Ripple 合作（Sep 2025）。这种中立定位意味着
              Thunes 能同时从多种卡组织 / 网络关系中产生收入，其竞争护城河是网络广度，而不是卡组织独占。风险在于，每一次合作也会让伙伴看到 Thunes 的网络使用率和路由经济性；这些信息最终可能支持
              Visa、Mastercard 或 SWIFT 自建竞争性基础设施。
