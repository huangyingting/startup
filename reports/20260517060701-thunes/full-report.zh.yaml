        - 高
        - Capgemini World Payments Report 2026
      - - SWIFT 既有竞争与转型
        - 约束
        - SWIFT 正靠 gpi、ISO 20022 迁移和预验证服务「从根本上改造」跨境支付；11,000+ 家金融机构成员网络带来很高切换摩擦
        - 中高
