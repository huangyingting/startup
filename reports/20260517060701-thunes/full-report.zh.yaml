      - number: '1.5'
        title: 网络运营、关键合作与反向因素
        blocks:
          - type: paragraph
            body: >
              Thunes 的监管版图是关键竞争差异：它持有 MAS（Singapore）的 Major Payment Institution license、FCA（UK）的 Authorised Payment
              Institution licence、ACPR（France，April 2023 取得）的 Payment Institution Licence、Hong Kong 的 Money Service
              Operator licence，并通过 Thunes Financial Services 在美国全部 50 个州取得汇款牌照（2024-2025 取得）。这些牌照合起来，让 DGN
              能服务全球主要金融中心和美国市场的受监管客户；这也是公司宣称 Series D 资金的首要用途。October 2025 推出的 SWIFT 接入，把 DGN 覆盖延伸到 SWIFT 网络上的 11,000+
              家银行，而且这些机构无需新集成，显著降低 Thunes 获取银行客户的摩擦。

              2024-2025 年的关键合作集成包括：Circle（October 2024 推出 USDC 结算，October 2025 扩展至支持 USDC 和 USDT 的
              Pay-to-Stablecoin-Wallets）、Mastercard Move（November 2025，经 DGN 做稳定币钱包出款）、Ripple（September 2025 扩展 2020
              年合作，将 Ripple Payments 集成进 SmartX Treasury System）、PayPal Hyperwallet（January 2025，面向 Asia-Pacific 的 450M+
              移动钱包实现实时出款）、Ecobank（October 2025，泛非银行接入）和 GCash（November 2024，从 UK/Europe 向 Philippines 钱包充值）。Visa Direct
              的集成（October 2022，March 2024 扩展）让 Visa 企业客户可经 Thunes 触达数字钱包。

              反向因素：公开来源未发现针对 Thunes 的重大诉讼、监管执法或制裁。已识别的主要风险包括：跨境支付基础设施提供商阵营扩张带来的竞争压力（Nium、TerraPay、Airwallex、Wise
              Platform、PPRO、Banking Circle、Visa Direct、Mastercard Send、SWIFT gpi），多个司法辖区的稳定币监管不确定性，以及 April 2025 Series
              D 后 Floris de Kort 疑似离任、联合创始人 Peter De Caluwe 回归 CEO 角色带来的 CEO 交接风险。研究未找到 de Kort
              离任的公开解释，这仍是一个需要尽调的开放问题。跨境支付的市场商品化风险是结构性的：竞争加剧后，交易收费模型会持续承受价格压缩。
