      - number: '8.4'
        title: 退出准备度与尽调问题
        blocks:
          - type: paragraph
            body: >-
              Thunes 的退出准备度信号混合。正面看：EBITDA 为正降低了股权流动性事件的紧迫性；CEO Floris de Kort 是有经验的上市公司高管（Worldpay IPO、TSG/Xplor
              合并），具备可验证的公开市场交易经验；战略投资者基础（Apis Partners、Vitruvian Partners、GIC、Western Union、IFC）足够多元，可支持 IPO
              或战略出售流程。负面看：Thunes 没有公开披露经审计财务，没有 PCAOB 审计记录；注册地在新加坡，也意味着私营公司没有类似 ACRA 的公开申报义务。九年累计融资约 $292M、投资者
              10+，可能带来股权结构表复杂度，包括各轮清算优先权形成的潜在压力。

              在 Thunes 建立任何投资仓位前，最关键的尽调问题是：（1）FY2023 和 FY2024 经审计收入、EBITDA 和净亏损；（2）D 轮 投后估值和股权结构表（优先股堆叠）；（3）前 10
              大客户集中度，以及按队列划分的净收入留存；（4）FCA、MAS 和其他重要牌照状态，检查是否有待处理行动；（5）地域收入集中度，尤其是高利润率走廊与 转手型走廊的对比；（6）CEO
              和联合创始人的股权与归属条款，用于评估利益一致性。

              投资逻辑破裂条件包括：经验证收入相对 $150M 运行率下降；Singapore MAS 或 UK FCA 牌照被监管暂停；E 轮以低于 $1.0B 的估值下调融资；或 Floris de Kort
              在流动性事件前离任 CEO。
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
