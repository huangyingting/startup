      - number: '1.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 自研 Direct Global Network 与 550+ 直接集成构成结构性护城河
            body: >-
              Thunes 的 Direct Global Network 来自多年与新兴市场移动钱包、银行和支付提供商逐一建立双边关系；这条路无法快速、低成本复制。550+ 直接集成（截至 April 2025），再叠加
              SmartX Treasury System 与 Fortress Compliance Platform，带来速度、成本和合规优势，并在 DGN 扩张时支撑成员留存和网络效应。
            calloutType: strength
            claimRefs:
              - CO005
              - CO006
              - CO007
          - type: callout
            title: 达到规模后实现盈利里程碑——在跨境支付基础设施中少见
            body: >-
              Thunes 在 $150M 收入运行率（April 2025）下披露正 EBITDA，使其成为少数从高速增长期烧钱跨入可持续经济性的 B2B 跨境支付基础设施公司。这个里程碑验证了 DGN
              交易收费模型的单位经济性，也强化了继续独立增长或战略 M&A 的逻辑。
            calloutType: strength
            claimRefs:
              - CO033
              - CO034
          - type: callout
            title: Series D 后 CEO 交接带来治理不确定性
            body: >-
              Floris de Kort（January 2024 起任 CEO）是 Thunes April 2025 Series D 的公开代表，并宣称公司实现正 EBITDA 和 $150M 收入运行率。当前
              about-us 页面（May 2026）显示 Peter De Caluwe 为 CEO，却没有公开解释 de Kort 离任原因。重大融资后 12
              个月内高管无解释离任，会让运营连续性、投资人信心和战略执行打上问号。
            calloutType: risk
            claimRefs:
              - CO020
              - CO021
              - CO044
          - type: callout
            title: 估值不透明与竞争压力是关键尽调缺口
            body: >-
              Thunes 未披露 Series D 估值；CEO de Kort 明确拒绝分享具体数字。Nium、Airwallex、TerraPay、Wise Platform 以及大型网络运营商（Visa
              Direct、Mastercard Send、SWIFT gpi）的竞争持续加剧，未披露估值使独立价格发现无法完成。此时进入的投资人缺少可核验的回报建模锚点。
