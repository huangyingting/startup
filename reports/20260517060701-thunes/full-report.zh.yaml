  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Thunes 的投资逻辑建立在四根支柱上：（1）B2B 跨境支付有结构性市场机会，预计从 2024 年的 $212.55B 增至 2030 年的 $320.73B，CAGR 为 7.1%；B2B 占总流量
              72.6%，按总支付量口径是数万亿美元级 TAM；（2）自有 Direct Global Network 覆盖 130+ 个国家和 80+ 种货币，通过 320+ 种支付方式连接 7B+
              个移动钱包和银行账户，历时近十年搭建，形成难以复制的合规和基础设施护城河；（3）2025 年 4 月 D 轮融资时已确认 EBITDA 为正，使 Thunes 区别于多数私营 B2B 支付同行，包括
              Nium（FY2024 净亏损 SGD 88.1M）和 Airwallex（亏损）；（4）与 Mastercard、Circle、SWIFT、Ripple、GCash、Uber、Deliveroo 和 Grab
              的战略合作，同时提供交易量和网络扩张信号。

              反向逻辑同样充分：Thunes 的 D 轮投后估值没有公开披露，CEO 在交割时明确拒绝披露详细财务数据——这种不透明让外部无法验证 ~$1.4B–$1.8B 估计区间。约 $150M
              收入在交割时被称为运行率，但未经审计；公司不提供公开财报（注册地在新加坡，且不按上市公司制度向 ACRA 申报）。竞争压力在加剧：Airwallex（直接 B2B 同行，估值 ~$5.6B）正激进扩张，Wise
              正发展 Wise Platform（B2B API 产品），Visa 拥有 Currencycloud，让战略网络在位者具备深厚竞争资源。八年多累计融资
              $150M，说明搭建过程相对资本高效；但也意味着增长速度受可用资本约束——B 轮时引用的 100% YoY 增长，显然已放缓至 D 轮隐含的 ~$150M 运行率。

              建议为观察。Thunes 是一家真实的 B2B 支付基础设施公司，盈利已确认，网络覆盖广，战略伙伴强。但在没有资料室
              访问前，完全缺少经审计公开财务、投后估值未披露、股权结构表未披露，无法给出买入或持有建议。主要监测触发器是：（a）IPO 注册声明或战略出售公告；（b）资料室 访问提供收入、EBITDA
              和股权结构表细节；（c）通过任何公开披露事件出现经审计财务。
