  - id: TP004
    title: 护城河耐久度 / 竞争风险登记表
    description: >-
      Assesses six moat claims for Thunes, the primary competitive threat to each moat, severity of erosion risk over a
      2–3 year horizon, and recommended mitigation or diligence actions.
    columns:
      - 护城河主张
      - 竞争威胁
      - 严重程度（高/中/低）
      - 缓释措施 / 尽调问题
    rows:
      - - Direct Global Network：覆盖 140 个国家的 145 个移动钱包品牌
        - TerraPay 正在搭建可比移动钱包网络；如果稳定币采用速度加快，Ripple/Circle 稳定币可能在新兴市场走廊替代法币钱包轨道
