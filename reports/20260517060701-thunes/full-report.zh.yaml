        - 在高增长新兴市场（LATAM、非洲、APAC）处理支付的企业
        - 覆盖 40+ 个新兴市场国家的本地支付方式受理；商户收单能力；LATAM 监管深度
        - 收单 / 受理取向，相比之下 Thunes 侧重出款网络；移动钱包出款宽度有限
      - - Banking Circle
        - 相邻（欧盟金融基础设施）
        - 持牌欧盟银行；处理欧洲 B2C 电商流量中的大部分
        - 需要虚拟 IBAN 的欧洲支付服务提供商、金融科技公司和收单机构
        - 欧盟银行牌照支持 IBAN 账户、直接清算和信贷额度
        - 以欧盟为主；没有可比的新兴市场移动钱包或非洲 / APAC / LATAM 网络深度
      - - PPRO
        - 相邻（替代支付方式聚合）
        - 私有公司；面向全球 PSP 和收单机构的主要支付方式聚合商
        - 需要接入本地支付方式的全球支付服务提供商和收单机构
        - 为收单机构聚合 200+ 种替代支付方式；专注 B2B 聚合模式
        - 聚焦收单 / PSP 聚合；不在出款网络或移动钱包基础设施上竞争
      - - Currencycloud（Visa）
        - 直接 B2B 网络（API 基础设施）
        - Visa 以 $963M 收购（2021 年）；已处理 $75B+ 支付；覆盖 180+ 个国家
        - 需要嵌入式 FX 和跨境支付 API 的银行、金融科技公司、企业客户
        - Visa 网络接入；API 优先的嵌入式支付；35 种出款货币；覆盖 180+ 个国家
        - Visa 中心策略可能劝退非 Visa 卡组织客户；新兴市场移动钱包深度低于 Thunes
      - - Airwallex
        - 嵌入式金融平台（多产品）
        - ~$5.6B 估值（报道）；年支付量 $235B+；120+ 个国家本地转账
        - 需要全球账户、发卡、跨境支付和费用管理的 SMB 与企业级金融科技公司
        - 多产品宽度（全球账户 + 卡 + FX + 费用）；93% 当日结算；API 文档强
        - 新兴市场移动钱包深度较窄；不是基础设施优先；开发者 SaaS 定位限制 MTO 场景
      - - Wise Platform
        - 嵌入式金融 / B2B API 基础设施
        - 伦交所上市（WISE）；年 FX 交易量 £181BN+；全球 80 张监管牌照
        - 需要透明跨境支付 API 的银行、金融机构和企业
        - 中间市场 FX 汇率透明；80 张牌照；75% 支付在 20 秒内完成；160+ 个国家
        - 有 B2C 基因；没有可比 Thunes 的移动钱包运营商网络；DGN 钱包宽度仍难匹敌
      - - Rapyd
        - 嵌入式金融平台
        - 私有公司；累计融资 $610M+；全球嵌入式金融科技平台（卡、钱包、出款）
        - 需要嵌入式支付受理、发卡和稳定币结算的平台与企业
        - 稳定币集成；发卡 + 钱包 + BNPL 通过单一 API；LatAm/APAC 覆盖强
        - 新兴市场移动钱包运营商深度较弱；网络规模小于 Thunes 或 Airwallex
      - - Stripe
        - 相邻（开发者平台）
        - $65B 估值（2023 年）；年支付量 $1T+（全部产品）
        - 美国和欧盟的数字原生公司；开发者优先的嵌入式金融
        - 行业领先的开发者体验和 API 文档；全球支付受理覆盖广
        - 在新兴市场，跨境出款基础设施弱于 Thunes；没有 MTO 级移动钱包网络
      - - Visa Direct
        - 网络巨头（基于卡组织的推送支付）
        - Visa Inc. NYSE：V；全球年支付量 >$12T（全部 Visa）
        - 需要基于 Visa 轨道的实时推送支付的金融机构、金融科技公司和企业
        - 全球数十亿个 Visa 关联端点；实时推送支付至银行卡和账户
        - 以卡 / 账户为中心；移动钱包覆盖弱于 Thunes 的 145 个移动钱包品牌网络
      - - Mastercard Cross-Border Services
        - 网络巨头（基于卡组织的跨境支付）
        - Mastercard NYSE：MA；全球年支付量 >$9T（全部 Mastercard）
        - 需要品牌化跨境支付基础设施的金融机构和金融科技公司
        - Mastercard 卡组织信任；稳定币出款能力（2025 年 11 月与 Thunes 合作）
        - 依赖卡组织；在新兴市场移动钱包中，把 Thunes 定位为交付层，而非纯竞争对手
      - - SWIFT gpi
        - 既有网络（金融报文）
        - 11,000+ 家连接金融机构；年跨境流量 $150T+
        - 大型企业、代理行、机构金融流量
        - 普遍采用；GPI 增加追踪和近实时透明度；通过 2025 年 10 月合作接入 Thunes
        - T+1 到 T+5 结算；综合成本 1–3%；非移动钱包原生；Thunes 充当 SWIFT 最后一公里层
      - - Circle（USDC）
        - 稳定币轨道
        - 私有公司；提交 IPO 申请；USDC 市值 >$40B；纽约 NYDFS 和 DFS 持牌
        - 需要稳定币计价跨境结算的金融科技公司、加密企业和企业
        - USDC 链上结算；24/7 即时全球转账；不依赖代理行
        - 稳定币优先；交易对手需要入金 / 出金通道；仍需要法币新兴市场最后一公里
      - - Ripple Payments
        - 稳定币轨道（法币 + 稳定币）
        - 私有公司；75+ 张美国 MTL；MAS 新加坡；DFSA 阿联酋；Ripple USD 稳定币
        - 寻找稳定币和法币跨境支付方案的金融科技公司、加密企业和银行
        - 端到端稳定币支付平台（收款、持有、兑换、出款）；24/7 结算
        - 明确对标法币 B2B 轨道；Thunes 现为 Ripple 合作伙伴（2025 年 9 月），缓解直接冲突
      - - Western Union
        - MTO / 既有机构
        - NYSE：WU；年收入约 $4B（2025 年）；全球零售和数字转账网络
        - 发起国际转账的零售消费者和 SMB，包括转至新兴市场移动钱包
        - 全球品牌信任；覆盖 200+ 个国家；数字化转型进行中；Thunes DGN 客户
        - 消费者优先；Thunes 是 WU 交付伙伴，产生客户兼竞争者的张力
      - - Remitly
        - 数字 MTO（Thunes 客户）
        - NASDAQ：RELY；年收入约 $1.2B（2025 年）；数字优先的新兴市场汇款平台
        - 向新兴市场收款地汇款的消费者和 SMB
        - 数字优先移动 App；低成本新兴市场汇款走廊；高增长
        - 部分新兴市场出款使用 Thunes DGN；客户兼竞争者的双重关系限制定价弹性
    notes: >-
      规模数据来自截至 2026 年 5 月的公司官网、新闻稿和公开投资者披露。Airwallex $5.6B 估值来自 2024 年融资报道；收入未公开披露。Nium 2024 财年财务数据来自 Fintech News
      Singapore 引用的新加坡公司申报。dLocal 市值为近似值，受市场波动影响。SWIFT $150T 流量为所有成员银行的总名义价值，不是手续费收入。本表覆盖不完整：区域专业机构、早期网络和 CBDC 试点未纳入。
