      - number: '8.2'
        title: 估值背景与可比分析
        blocks:
          - type: paragraph
            body: >-
              Thunes 的 D 轮投后估值没有公开披露。CEO 称较 C 轮（$900M+）有「估值大幅提升」，意味着投后至少约 $1.0B 以上。结合可比私营公司融资动态，以及 $150M
              融资规模所反映的投资者兴趣，$1.4B–$1.8B 的基准区间可以成立。按 D 轮交割时（2025 年 4 月）披露的 $150M 年化收入运行率计算，对应 EV/Revenue 为
              9–12x——相对上市可比公司有显著溢价，但在 2025 年融资环境下，对一家 EBITDA 为正且仍在增长的 B2B 支付基础设施公司来说，符合 IPO 前私募市场定价。

              上市 B2B 跨境支付可比公司的倍数被压低，反映 2022 年后金融科技重新定价、盈利要求和规模因素。dLocal（DLO）约按收入 3–4.5x 交易；Payoneer（PAYO）在 GAAP 盈利基础上为
              2.5–3.5x；Remitly（RELY）虽偏消费者端，也在 2–3x；Western Union（WU）因长期下行，收入倍数低于 1x。Wise（WISE.L）在 LSE 按 5–7x
              交易，是同业中最高的上市倍数，由较强利润率和增长支撑。私营可比公司更有支撑力：Nium 2024 年 6 月在约 $124M 年化收入（约 11x）基础上最后估值 $1.4B（较 $2.1B
              下调）；Airwallex 约 $300M+ ARR 对应约 $5.6B 估值（约 18x）——反映不同投资者风险偏好和增长画像。Visa 于 2021 年以约 $925M 收购 Currencycloud，是
              B2B 跨境基础设施的战略 M&A 先例。

              Thunes 的 EBITDA 为正，在私营 B2B 支付同行中罕见，应支撑其相对亏损可比公司的估值溢价。但缺少经审计收入、EBITDA
              利润率、客户集中度或净收入留存数据，适用倍数无法验证。$1.4B–$1.8B 的基准估计区间，是保守上市市场可比（按 5–9x 收入为 $750M–$1.35B）和乐观私募市场先例（Airwallex
              18x）之间的合理中点。投资者应把该区间视为有信息支撑的估计，仍需资料室验证。
