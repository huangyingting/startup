      - number: '3.4'
        title: 切换成本、网络效应与多归属
        blocks:
          - type: paragraph
            body: >-
              Thunes 的切换成本分两层。API 集成层面，一个接入 Thunes DGN 的客户若已集成 140 国出款路由、合规工作流、FX 结算和对账逻辑，切到替代网络通常要付出 3–9
              个月的重平台化成本。对高交易量企业客户（MTO、零工平台、数字银行）来说，集成成本真实存在，但并非不可跨越：已有若干 Thunes 客户会同时接入 2–3 家支付基础设施提供商，用 Thunes
              跑新兴市场移动钱包走廊，用替代方案覆盖其他地区或产品需求。

              网络层面，在 Thunes 与移动钱包运营商（M-Pesa、WeChat、GCash、145 个移动钱包品牌）拥有直接双边关系的走廊中，DGN
              带来供给侧切换成本。复制这张双边网络，需要多年按国家推进商业和技术集成；这是走廊特定复制的重要壁垒，比纯 API 切换成本更难绕开。竞争对手要么直接建设这些关系（TerraPay
              正在做），要么收购已有接入的公司（Thunes 2021 年收购 Limonetik 就是如此）。

              不过，企业客户常常主动做多归属：Remitly、MoneyGram 和 Western Union 都使用 Thunes 基础设施，同时维持竞争性网络关系。这种“客户兼竞争者” 动态限制了 Thunes
              对独家安排的定价激进程度，因为如果 Thunes 定价不利，大型 MTO 客户可能加速自建直接走廊。
            claimRefs:
              - CP027
              - CP028
              - CP029
              - CP030
              - CP031
      - number: '3.5'
        title: 护城河耐久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >-
              Thunes 的三项核心护城河主张——Direct Global Network 广度（140 个国家、145 个移动钱包品牌）、合规牌照（50 个市场，MAS/FCA/ACPR 锚点）和 API 中立性（把
              Visa、Mastercard、SWIFT、Ripple 作为成员服务，而非对手）——在 2–3 年维度内有耐久性，但每一项都有具体侵蚀路径。

              DGN 的移动钱包广度护城河最有差异化：没有公开资料显示竞争对手能同时在 Africa、APAC 和 LATAM 宣称 145 个移动钱包品牌。不过，这条护城河容易被稳定币替代侵蚀：如果 USDC
              或其他稳定币成为新兴市场走廊的主导结算机制，结算可以在链上完成，无需双边网络成员关系，Thunes 双边法币钱包关系的价值就会下降。Thunes 与 USDC（Circle，Oct 2024）和
              Mastercard 稳定币出款（Nov 2025）的合作是对该风险的主动对冲，但无法消除风险。

              合规牌照护城河的防御性排第二：在 50 个司法辖区搭建同等牌照（美国 50 个州 MTL、MAS、FCA、ACPR）需要 3–5 年，并投入数千万监管成本。Ripple 的 75+ 美国 MTL（超过
              Thunes 披露数量）以及 MAS/DFSA 牌照说明，资本充足的稳定币玩家也能搭建可比监管版图，尤其是在发达市场。Thunes 的优势在于其面向新兴市场的监管栈（ACPR France、HK MSO）以及
              2022 年收购 Tookitaki 后获得的自研合规工具。

              中立“高速公路”定位形成网络效应护城河：越多金融机构加入 DGN（720 个成员），每个新增连接的价值越高。不过，Nium 的 40+ 监管牌照组合、Airwallex 的 $235B+ 交易量，以及 SWIFT
              gpi 的 11,000+ 家银行连接，说明资源雄厚的大型竞争对手正在重叠细分中建设替代网络效应。法币 FX 点差商品化风险是真实的：更多 B2B 玩家进入新兴市场走廊后，抽成率会被压缩，Thunes
              需要在基础走廊接入之外，从合规服务、稳定币资金管理和高级 SLA 中创造收入。
