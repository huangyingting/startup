      - number: '4.5'
        title: 财务结论与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              与同等规模的私有 B2B 跨境支付基础设施公司相比，Thunes 的财务画像明显更强。在 130+ 个国家运营、拥有美国 50 州牌照覆盖并推进稳定币 / 数字资产路线图的同时，达到 $150 million
              收入运行率和正 EBITDA，这是相对同业更突出的资本效率结果。多轮融资估值持续抬升（无 down-round；Series C 为 $900M+，Series D
              为「大幅提升」）也传递出建设性的投资者信心信号。不过，若要独立验证 Thunes 的财务投资逻辑，仍有几个结构性限制。


              五个财务缺口仍未解决，构成阻断性尽调事项。第一，无法验证各收入流毛利率——正 EBITDA 值得鼓励，但不能替代经审计的毛利拆分。第二，CAC 和回本周期未知，无法评估
              LTV:CAC。第三，公司未披露按走廊、地域或客户分层的收入，集中度风险无法量化。第四，净收入留存和客户流失未披露，无法基于存量客户预测未来收入。第五，月度现金流实际数不可得；若没有 P&L，就无法核对
              EBITDA 说法。跨境 B2B 支付市场到 2030 年仍以高个位数至双位数年增速增长（FXC Intelligence、McKinsey Global Payments
              Report），形成结构性顺风；但来自竞争基础设施网络（Nium、Airwallex、Wise Platform、TerraPay）以及 Thunes 自身伙伴转潜在竞争者（Visa
              Direct、Mastercard Move）的商品化压力，可能在市场成熟后压缩抽成率。投资者在承销任何 Thunes 交易前，应要求进入数据室查看经审计财务、走廊级收入拆分和完整股权结构表。
