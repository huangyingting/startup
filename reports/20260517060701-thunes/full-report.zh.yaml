      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              跨境 B2B 支付基础设施市场同时受多重结构性顺风推动。最重要的是实时支付轨扩张：到 2025 年末，FedNow 参与的美国金融机构超过 900 家；SEPA Instant 在 2024 年处理 14.5
              billion 笔交易，同比增长 54%；India UPI 到 December 2025 月交易量达到 13.4 billion
              笔。每条本地实时支付轨都会制造跨境互操作需求，因为终端用户和企业在本地已经收到即时结算后，也越来越期待国际支付即时到账。ISO 20022 到 2025
              年覆盖大多数全球系统，统一结构化汇款数据并降低对账摩擦，显著提升直接 API 跨境支付轨的商业理由。EU 强制 e-VAT 合规计划（2028 年生效，范围为 10 million+ 家 EU
              企业）将要求结构化、数字化上报跨境支付数据，进一步拉动企业对 API 集成 B2B 支付基础设施的需求。

              采用约束主要有三类。第一，存量巨头直接竞争：SWIFT 的多年转型计划（“从根本上改变国际支付”）以及 Mastercard Move 的 200+
              市场覆盖，代表了有深厚机构关系的成熟网络，很难被替代。第二，代理行业务根深蒂固：各司法辖区 AML/KYC 割裂，意味着即便 Thunes
              建立直接集成，每个市场的监管批准和合规检查仍需持续投入。第三，监管资本要求：在 130+ 个国家取得并维持支付牌照，既构成进入壁垒，也给 Thunes 自身带来资本强度挑战。稳定币和 CBDC
              方向给出混合信号：与 Circle（USDC）和 Mastercard 的稳定币合作让 Thunes 能参与数字资产结算，但如果中央银行搭建自己的跨境支付轨，CBDC 的广泛采用最终可能替代私营支付基础设施。
