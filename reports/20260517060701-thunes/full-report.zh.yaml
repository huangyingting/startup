  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              B2B
              跨境支付市场涵盖企业跨国境、通常也跨币种，把价值转给另一家企业、交易对手、供应商、员工或承包商的所有金融交易。它包括跨境供应商付款、国际薪酬与承包商付款、集团内资金调拨、市场平台卖家出款、向移动钱包和银行账户汇款，以及零工经济和数字商业平台的出款基础设施。该市场不同于
              C2C 汇款（World Bank 估计 2024 年该独立子市场超过 $830 billion），也不同于单一司法辖区内的本地 B2B 支付。

              Thunes 将其可服务市场定义为通过 Direct Global Network (DGN) 启用的跨境支付流；DGN 向 130+ 个国家的支付端点提供直接连接，而不是代理行连接。Thunes
              解决的结构性问题已有充分记录：传统跨境支付在结算前要经过三到五家中介银行，每一层都会增加一到五个工作日延迟，并收取交易额一到五个百分点的费用。SWIFT 连接全球 11,000+
              家金融机构，是占主导地位的存量消息网络，但仍依赖代理行中介，并正积极投入自身转型计划。Mastercard Move 覆盖 200+ 个市场，并通过卡网络触达 95% 有银行账户的成年人，是卡基 B2B
              流中的替代方案。Thunes 主要 TAM 定义排除了：消费者 P2P 汇款、单一司法辖区内的本地支付，以及证券结算。
