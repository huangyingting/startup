      - number: '1.2'
        title: 创立历史与公司演进
        blocks:
          - type: paragraph
            body: >
              Thunes 的源头是 TransferTo，一家 2005 年创立、总部位于新加坡的移动支付公司。2016 年，TransferTo 重组为两个独立业务：DT One（面向消费者的手机充值和奖励）与
              Thunes（B2B 跨境支付基础设施）。February 2019，TransferTo 正式为两个实体改名，Thunes 品牌公开亮相。在 2019 年公告中，当时担任 DT One CEO 及 Thunes
              执行董事长的 Peter De Caluwe 将拆分称为“抓住这个快速变化市场增长机会的重要下一步”。

              B2B 跨境支付方向来自 2016 年的一项判断：碎片化的新兴市场支付生态，比消费者汇款对应的可服务市场大得多。到 May 2019 的 $10M Series A（GGV Capital 领投）时，Thunes
              年支付量已达 $3 billion。September 2020，公司完成 Series B（$60M，Helios Investment Partners 领投，Checkout.com、GGV Capital
              和 Future Shape 参投），覆盖扩至 100+ 个国家；Series B 据报道在 May 2021 完成。之后 Thunes 通过三笔收购扩展能力：Limonetik（总部在 Paris
              的线上支付平台，2021）、Tookitaki（新加坡 AML 监管科技公司，April 2022 收购多数股权）和 Tilia（Linden Lab 旗下游戏与虚拟货币平台，June 2025
              收购）。Series C 首次交割 $60M 于 June 2023 公布；该轮在 July 2023 以 $72M 完成（Marshall Wace 领投，Bessemer Venture
              Partners、01Fintech、Visa、EDBI 和 Endeavor Catalyst 参投），估值 $900M+。2023 年，Thunes 还在法国取得 ACPR Payment
              Institution Licence。April 2025 的 $150M Series D（Apis Partners 和 Vitruvian Partners）是最新融资里程碑。
