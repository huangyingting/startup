      - number: '1.3'
        title: 管理层与治理
        blocks:
          - type: paragraph
            body: >
              Thunes 管理层经历了明显变化。Peter De Caluwe 是公司联合创始人，在公司成长期担任执行董事长兼 CEO；January 2024，Floris de Kort 被任命为 CEO，De
              Caluwe 退居二线。De Kort 此前在 Worldpay 负责 Global eCommerce，并经历其 2015 IPO，之后担任 Xplor Technologies（原
              TSG/Clearent）CEO；April 2025 Series D 时，公司披露 $150M 收入运行率和正 EBITDA，这一表述归于 de Kort。但截至 May 2026，Thunes 当前
              about-us 页面将 Peter De Caluwe 列为 “Deputy Chairman and CEO”，说明 Floris de Kort 在 April 2025 Series D
              公告后某个时间离开，De Caluwe 在保留副董事长头衔的同时重任 CEO。CEO 交接是需要尽调的关键治理不确定性。

              Allan Green 担任董事长。现任高管团队包括 Chloé Mayenobe（Deputy CEO；曾任 Solaris Group COO、Natixis Payments Deputy
              CEO、Ingenico EMEA MD）、Ruwan de Soyza（Chief Legal & Compliance Officer；25+ 年经验，前 Worldpay Group GC）、Simon
              Nelson（Chief Commercial Officer；前 Mercury UAE CEO、前 Network International 高管）、Andrew Stewart（Chief Revenue
              Officer；前 WorldRemit，American Express 17 年）、Parvinder Bhatia（Chief Technology Officer）、Elie Bertha（Chief
              Product Officer）和 Aik Boon Tan（Chief Network Officer）。Mathieu Limousi 曾被称为 Chief Marketing Officer。Thunes
              的董事会与完整投资人治理结构（董事席位、否决权、优先股堆叠）未公开披露。
