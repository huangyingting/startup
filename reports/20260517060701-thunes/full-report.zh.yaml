  - id: TM004
    title: 增长驱动因素和约束表
    description: >-
      Catalogs the primary growth drivers and adoption constraints for cross-border B2B payment infrastructure with
      emphasis on factors directly relevant to Thunes' DGN business model.
    columns:
      - 因素
      - 类型
      - 描述
      - 信号强度
      - 证据来源
    rows:
      - - 实时支付轨道扩张（FedNow、SEPA Instant、UPI）
        - 驱动因素
        - >-
          美国 900+ 家金融机构接入 FedNow；2024 年 SEPA Instant 交易 14.5B 笔（同比 +54%）；截至 2025 年 12 月，印度 UPI 月交易 13.4B
          笔；每条境内实时支付轨道都会催生跨境互操作需求
        - 高
