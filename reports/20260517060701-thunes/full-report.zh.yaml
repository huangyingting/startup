      - number: '4.6'
        title: 证据
        blocks:
          - type: callout
            title: $150M 收入运行率下的正 EBITDA 是差异化里程碑，但需要审计佐证
            body: >-
              CEO Floris de Kort 在 2025 年 4 月称 Thunes 已实现「正 EBITDA」，并同时达到「$150 million 收入运行率」；这是公司迄今最重要的财务披露。若准确，Thunes
              在可比私有跨境 B2B 支付基础设施同业（Nium、TerraPay）仍亏损时，已经实现经营层面盈利。不过，这一披露是融资新闻稿中的管理层表述，不是经审计或独立验证的数据。公司没有说明 EBITDA
              定义；三笔收购（Limonetik、Tookitaki、Tilia）产生的 D&A、股权激励和收购相关费用等重大项目，都可能造成 EBITDA 与净利润之间的大额扣减。投资者必须索取 ACRA Singapore
              文件（或同等来源）中的经审计财务报表，并把 EBITDA 说法与经审计毛利率核对之后，才应把正 EBITDA 视为已验证的财务里程碑。
