      - CE001
      - CE002
      - CE006
      - CE018
      - CE019
      - CE041
    data:
      layers:
        - label: 客户集成层
          modules:
            - 单一 REST API（docs.thunes.com — Money Transfer and Collection APIs）
            - SWIFT 连接（面向 11,000+ 家 SWIFT 成员银行；无需新 API）
            - Business Hub（小型成员的无 API 接入选项）
            - Webhook 通知（实时支付状态事件）
          note: Single integration point for all Pay and Accept products across 140 countries
        - label: 产品层 — Pay
          modules:
            - 付款至移动钱包（145 个品牌；4B 账户；98% 即时）
            - 付款至银行（8B 账户；60 个实时国家；共 140 个）
            - 付款至卡（15B+ 张卡；Visa、Mastercard、UnionPay）
            - 付款至稳定币钱包（USDC / USDT；140+ 个国家；24/7）
            - 企业付款（50+ 个国家本地 ACH；170+ 个国家 USD 电汇）
          note: Five pay modules share DGN connectivity; stablecoin via licensed-partner model
        - label: 产品层 — Accept
          modules:
            - 移动钱包收款（145 个品牌；36+ 结算币种；Magento / Mirakl 插件）
            - 银行付款收款（开放银行 + 传统方式；发达和新兴市场）
            - BNPL 收款
            - 数字券收款
          note: Accept modules feed inbound flows into DGN settlement; FX at point of collection
        - label: 基础设施支柱
          modules:
            - Direct Global Network — 720 个成员；140 个国家；220 种支付方式；85% 即时结算
            - SmartX Treasury — 透明 FX；90 种货币；Ripple Payments 集成（2025 年 9 月）
            - Fortress Compliance — 50 张牌照；嵌入式 AML / KYC / KYB；Tookitaki ML 引擎
          note: All three pillars operate in parallel behind all Pay and Accept products
        - label: 网络端点
          modules:
            - 本地银行与实时通道（60+ 个国家即时支付系统）
            - 移动网络运营商与电子钱包（140 个国家 145 个品牌）
            - 卡组织（Visa、Mastercard、UnionPay；通过 Tilia 接入 Amex / JCB / UnionPay）
            - 稳定币钱包（通过 Circle 合作接入 USDC；USDT）
            - SWIFT 网络（11,000+ 家成员银行接入 DGN）
          note: 99.99% platform uptime; 98% quality-of-service success rate across all endpoints
