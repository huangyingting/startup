      - number: '6.6'
        title: 证据
        blocks:
          - type: callout
            title: 具名客户材料比多数私有阶段 B2B 支付基础设施同业更丰富
            body: >-
              Thunes 提供七个官方案例研究，具名客户包括 GCash、nsave、PayQuicker、Flip、UNFCU、Pomelo 和 Paydek；此外还有与 Mastercard、Visa、PayPal
              Hyperwallet、Ripple、Circle、Ecobank 和 Swift 的具名网络合作。nsave 案例罕见地提供量化结果（交易量 4×、处理速度快 50%+），Mastercard Move
              合作（2025 年 11 月）则代表一线金融机构背书，是少数私有跨境支付基础设施公司能够匹配的证明。TechCrunch 在 2022 年独立确认 Uber、MoneyGram、Remitly 和 Western
              Union 是活跃客户。案例研究、网络伙伴和独立媒体验证共同构成的具名证明广度，是相对证据较少的 B2B 同业时有意义的竞争差异化。
            calloutType: strength
            claimRefs:
              - CU007
              - CU009
              - CU015
              - CU022
              - CU027
              - CU032
          - type: callout
            title: MTO 客户同时是 Thunes 的客户和结构性竞争者
            body: >-
              Remitly、Western Union 和 Ria 在 Thunes 行业页面上被明确列为汇款运营商客户，TechCrunch 也在 2022 年确认 MoneyGram 和 Western Union 是
              Thunes 客户。不过，这些公司同时也是 Thunes 在消费者汇款市场中的直接竞争者——并且随着规模扩大，它们具备工程能力和财务动机去自建专有直连结算轨道。Western Union 的 Evolve 平台和
              Remitly 的直接走廊开发，对 Thunes 的 MTO 收入基础构成可信的中期风险。如果前三大 MTO 占 Thunes 收入 30–40%，单个客户决定降低对 Thunes
              的依赖就可能高度重大。投资者应要求 MTO 收入集中度数据，并询问是否有任何大型 MTO 表示过减少依赖 Thunes 的意向。
            calloutType: risk
