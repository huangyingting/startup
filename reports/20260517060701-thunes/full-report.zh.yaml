              - CU005
              - CU022
              - CU026
              - CU033
              - CU037
          - type: callout
            title: 净收入留存是最重要的未披露指标
            body: >-
              Thunes 这个规模的 B2B 支付基础设施业务（$150M 运行率、720 个成员），最能预测长期业务质量的单一指标就是净收入留存。如果 NRR 高于 110%，Thunes
              不新增任何客户，也能靠存量客户把收入维持双位数增长，$150M 运行率就是可复合的底线。如果 NRR 低于 100%，公司需要不断获取新客户来替换流失收入，形成 S 曲线平台期风险。Thunes 已披露正
              EBITDA 和 $150M 运行率，但没有发布 NRR——公开数据无法评估增长质量。任何投资者或收购方都应把 NRR 披露作为尽调前置条件。
