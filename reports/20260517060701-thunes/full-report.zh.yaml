      - number: '2.5'
        title: 市场展望与 Thunes 定位
        blocks:
          - type: paragraph
            body: >-
              进入 2026 年，Thunes 是少数达到可运营验证规模的跨境 B2B 支付基础设施公司之一：年化收入 $150 million、EBITDA 为正、估值 $1.9 billion，并在 April 2025
              完成由 APIS Partners 和 Vitruvian Partners 领投的 Series D。公司通过有意设计的扩张策略，从纯新兴市场出款提供商走向多产品跨境基础设施层：SWIFT 接入（October
              2025）瞄准无法重构技术栈的银行客户；Ripple Payments 集成（September 2025）打开区块链原生金融科技细分；Circle USDC 结算（October 2024）降低 DGN
              成员流动性需求；Mastercard 稳定币出款（November 2025）把触达延伸到网络上已有的 15 billion+ 个 Mastercard/Visa 卡端点。

              从 Series B（2021，100% YoY 增长）到 Series C（July 2023，$72 million、估值 $900 million），再到 Series
              D，增长轨迹显示投资人信心与运营推进保持连续。Thunes 于 September 2025 进入 Morocco，以及其 GCash-Europe-Philippines
              走廊，都体现出公司刻意聚焦存量基础设施服务不足的高汇款走廊。公司的 $150 million 收入运行率约占 $206.5 billion 跨境支付收入 TAM 的
              0.07%，说明即便按当前抽成率，增长空间仍很大。主要市场风险不是需求——所有分析师估计均显示 15–17% CAGR 的结构性强需求——而是竞争强度：Visa、Mastercard、SWIFT
              和银行联盟都在投资同一类跨境支付基础设施现代化，Thunes 也在建设这条赛道。
            claimRefs:
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
              - CM037
      - number: '2.6'
        title: 展示材料
        blocks:
          - type: callout
            title: DGN 直接集成模式结构上优于代理行体系——但 SWIFT 正在缩小差距
            body: >-
              Thunes 的 Direct Global Network 去掉了传统跨境 B2B 支付中 3-5 层代理行中介跳转，把活跃走廊的结算从 1-5 个工作日压缩到实时或近实时。凭借横跨 130 个国家的 550+
              直接集成，DGN 是中端市场和新兴市场走廊中 SWIFT 代理行链条的真实替代方案。不过，SWIFT 的主动投资计划——ISO 20022 迁移、gpi 追踪和预验证服务——明确瞄准同一批痛点。October
              2025，Thunes 宣布自有 DGN 接入 SWIFT（让 SWIFT 成员银行可通过 Thunes 路由），这是一个战略对冲：Thunes 既与 SWIFT 竞争，也借 SWIFT 分发。双重姿态降低了
              Thunes 面对 SWIFT 替代的风险，同时带来分发杠杆。
            calloutType: insight
            claimRefs:
              - CM006
              - CM007
              - CM026
              - CM029
              - CM030
          - type: callout
            title: 市场规模口径相差 1,000x——投资人必须说明自己用哪一个指标
            body: >-
              分析师对 B2B 跨境支付市场的估计，从 $206.5 billion 收入（Allied Market Research，2024）到 $150 trillion 总资金流（Thunes
              自有市场框架，2025）不等，相差超过 700 倍。这不是统计噪声，而是衡量口径根本不同：交易流量还是费用收入、只算跨境还是所有 B2B、是否包含消费者资金流。若投资人用 TAM 支撑 Thunes 的 $1.9
              billion 估值，应使用 Allied Market Research 的 $206.5 billion 收入口径，而不是 $150 trillion 资金流口径。在 $150 million ARR
              下，Thunes 已拿到约 0.07% 的收入 TAM；这符合高增长基础设施公司的特征，也说明市场叙事与当前货币化之间仍有距离。真正需要向前看的问题是：Thunes 能否按 15%+
              CAGR（与整体市场一致）增长收入，并在 2031 年达到 $500 million+ 收入。
            calloutType: risk
            claimRefs:
              - CM001
              - CM009
              - CM012
              - CM033
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              全球 B2B
              跨境支付基础设施市场服务一组碎片化客户：金融科技公司、汇款运营商、数字银行、电商平台、薪酬服务商和零工经济公司；供给侧则有多种竞争模型。没有单一运营商能在所有地区、支付方式和企业用例上占据主导。Thunes
              把自己定位为中立的“智能高速公路”，用单一 API 连接所有支付端点：截至 May 2026，Direct Global Network (DGN) 覆盖 140 个国家、90 种货币、220 种支付方式、720
              个网络成员，并实现 85% 即时结算。

              竞争版图分为五类。直接 B2B 网络运营商（Nium、TerraPay、Currencycloud/Visa、dLocal、PPRO、Banking Circle）争夺同一类 API
              优先的企业买方，差异在地区重点和产品广度。嵌入式金融平台玩家（Airwallex、Wise Platform、Stripe、Rapyd）从多产品 SaaS 角度切入，而不是纯网络基础设施。网络巨头（Visa
              Direct、Mastercard Cross-Border Services、SWIFT gpi）既是基础设施层，也会偶尔成为竞争者，依靠规模和卡组织 / 网络关系发力。新兴稳定币支付轨（Circle
              USDC、Ripple Payments、Stellar）是一种结构性替代，可能在 3–5 年内绕过法币走廊经济。汇款运营商（Western Union、MoneyGram、Remitly）既是 Thunes
              客户，也是走廊竞争者，并继续将自有支付轨数字化。

              Thunes 的 $150M Series D 未披露估值，但显著高于 2023 年 $900M+ 的 Series C；再叠加 $150M 收入运行率和 EBITDA
              为正，公司已成为大型基础设施玩家之外可信的中等规模替代方案。公司的中立模型——既把 Visa、Mastercard 和 SWIFT
              作为合作伙伴服务，也与它们间接竞争——带来合作杠杆和战略张力，而单一卡组织生态内的竞争对手不具备这组特征。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Nium 是 Thunes 最直接的 B2B 基础设施竞争对手。Nium 平台覆盖 190+ 个国家，拥有 40+ 张监管牌照，瞄准同一类企业金融科技和金融机构买方。其发卡 BaaS 产品（Nium
              Embed，34+ 个国家）是 Thunes 未公开重点强调的能力，构成产品组合缺口。Nium 的 100+ 实时支付走廊和 API 优先模型（Transact、Receive、Embed）在 APAC 与
              Thunes DGN 重叠最深，两者都有强本地网络接入。Nium 仍在亏损（FY2024 净亏损 SGD 88M）并计划 2026 IPO，因此承受的资本市场压力不同于 Thunes 的 EBITDA 为正状态。

              TerraPay 运营一个移动优先的全球支付网络，持有 31 项监管批准，并把合规作为核心差异化。其创立故事——第一笔付款是从 Dubai 汇往 Tanzania 的 $13——体现出与 Thunes
              类似的新兴市场基因；网络也包括 Africa 和 APAC 的移动钱包集成。不过，TerraPay 在规模以及稳定币和卡连接广度上弱于 Thunes。

              Airwallex 搭建了多产品金融平台，每年处理 $235B+，本地转账覆盖 120+ 个国家，资金收款覆盖 70+ 个国家。它实现 93% 当日结算和 50%
              即时结算，是高交易量客户可信的基础设施替代方案。Airwallex 的多产品模型（全球账户、费用管理、发卡、跨境支付）提供了 Thunes 缺少的广度；但 Airwallex 在新兴市场移动钱包触达上明显窄于
              Thunes 的 4 billion 个移动与稳定币钱包端点。

              Wise Platform 通过全球 80 张牌照提供 £181BN+ FX 交易量，覆盖 160+ 个国家和 40+ 种货币。它向金融机构合作伙伴提供银行级 KYC 和入驻 API，因此也是 B2B
              基础设施层的竞争者。Wise 的透明度理念和已盈利上市公司身份（LSE-listed）带来 Thunes 尚未具备的可信度优势，但 Wise Platform 的新兴市场移动钱包深度不及 Thunes。

              Currencycloud（Visa）在 Visa 整合后披露口径变得不透明；此前它在 180+ 个国家处理 $75B+ 支付，并为银行和金融科技公司运营 API 优先的嵌入式支付平台。Visa
              所有权同时带来分发优势（Visa 卡组织关系）和战略约束（非 Visa 卡组织客户可能更偏好中立提供商）。

              Ripple Payments 提供稳定币与法币跨境支付平台，拥有 75+ 张美国汇款牌照、MAS Singapore 和 DFSA UAE 授权。其定位明确挑战传统法币 B2B
              支付轨，主张稳定币结算可以消除预先备付要求并降低成本。Circle 运营基于 USDC 的跨境支付，并在 New York 同时获得 NYDFS 和 DFS 许可。如果稳定币在新兴市场走廊加速采用，两者都是
              Thunes 法币 DGN 经济性的结构性竞争者。Thunes 通过 Mastercard 稳定币出款合作（November 2025）、Circle USDC 集成（October 2024）和 Ripple
              合作（September 2025）部分缓释了这一风险，实质上把稳定币提供商变成网络成员，而不是纯粹对手。

              Western Union 和 MoneyGram 是存量 MTO，处理大规模零售跨境交易量，同时也是 Thunes 客户和走廊接入竞争者。两家公司都在积极数字化。Remitly 在部分走廊使用 Thunes
              基础设施，也在 B2B 收款 / 出款市场形成客户兼竞争者的双重关系。
