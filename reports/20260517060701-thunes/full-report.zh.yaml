      - number: '8.5'
        title: 展项
        blocks:
          - type: callout
            title: EBITDA 为正是关键差异化因素——但无法验证
            body: >-
              Thunes 声称在 2025 年 4 月 D 轮交割时 EBITDA 为正，这是它区别于可比 B2B 支付基础设施同行的最重要因素。Nium 报告 FY2024 净亏损 SGD 88.1M（亏损率
              53%）；Airwallex 在 $5.6B 估值下估计仍亏损。如果 Thunes 确实以 $150M 收入实现 EBITDA
              为正，说明其商业模式资本效率较高，可能是（a）单位经济更优，（b）运营开支更低，或（c）相对同行放缓了增长投入。但这一说法未经审计，没有任何公开财务申报验证，并出现在公司撰写的新闻稿中。投资者必须把它视为未确认，等待
              资料室审计复核。
            calloutType: insight
            claimRefs:
              - CV005
              - CV011
              - CV016
          - type: callout
            title: 估值不透明是首要投资风险——不是竞争格局
            body: >-
              评估 Thunes 估值时，最重大的风险不是 Airwallex 或 Wise Platform 的竞争，而是完全缺少可公开验证的财务数据。CEO 在 D 轮
              交割时明确拒绝披露财务细节，公司没有公开财务申报，投后估值也未披露。这会造成一种局面：投资者无法验证 $1.4B–$1.8B
              估计区间究竟是合理入场点，还是相对真实财务表现的显著高价。即便网络叙事很强，观察建议主要仍由这种不透明驱动：没有财务验证，就没有高确信度仓位。
            calloutType: risk
            claimRefs:
              - CV006
              - CV027
              - CV029
