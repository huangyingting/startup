      - number: '5.5'
        title: 路线图与技术差异化
        blocks:
          - type: paragraph
            body: >-
              Thunes 的技术路线图由三条战略向量锚定：稳定币和数字资产集成、美国市场扩张，以及 AI 赋能基础设施。Circle 合作（2024 年 10 月）为 DGN 成员引入 USDC 结算，用 24/7
              实时资金流转消除代理行延迟，从而降低资本成本。Mastercard Move 合作（2025 年 11 月，Singapore Fintech Festival）把稳定币钱包付款扩展到 200+
              个市场。Ripple 集成进 SmartX Treasury（2025 年 9 月）为数字资产公司成员增加基于区块链的流动性路径。Tilia 收购（2025 年 6
              月）增加卡受理（Visa、Mastercard、Amex、JCB、UnionPay），并通过 48 个州 / 地区牌照形成美国锚点；利用 Series D 资本扩张美国市场，是近期最主要的地理增长杠杆，但仍取决于
              Tilia 收购监管审批最终完成。

              Thunes 最核心的技术差异化，是 DGN 的直连架构——绕过代理行中介，把 85% 的交易做到即时结算，而不是代理行链条的 2 到 5 天。50 张监管牌照、720 个直接成员集成、PCI DSS 和 ISO
              27001 认证，以及 SmartX Treasury FX
              引擎，单独复制都很昂贵，合在一起形成结构上可防守的护城河。每张监管牌照都要求在当地维持资本充足、维护本地合规项目并接受定期监管检查——这构成多年进入壁垒，单靠软件 IP 无法复制。2025 年 4 月
              Series D 的 CEO 表述把 AI 和数字资产生态互操作列为前瞻投资重点；但截至 2026 年 5 月运行日期，公司未公开宣布具体 AI 产品发布，因此 AI 路线图仍是方向性意图，而非已交付能力。
