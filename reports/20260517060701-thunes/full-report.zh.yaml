      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              乐观情景假设 Thunes 确认经审计收入显著高于 $150M，EBITDA 利润率达到
              15%+，且关键企业客户（Uber、Grab、Deliveroo、WeChat）的净收入留存强劲。在这一情景下，Direct Global Network 向新走廊扩张（Morocco
              2025、Gulf/APAC 持续增长）正在推动交易量加速，Mastercard 和 Circle 稳定币合作带来可衡量的新收入流，Thunes 要么在 2026–2027 年提交美国或新加坡 IPO，要么收到
              Tier-1 支付网络或银行的战略收购报价，估值区间为 $2.0B–$2.8B。Airwallex $5.6B 估值和 Currencycloud $925M 战略收购，都为这一情景提供方向性支撑。

              基准情景假设 Thunes 收入处于 $140M–$175M 区间，EBITDA 为正但利润率未披露，走廊和合作伙伴稳步扩张，未来 18–24 个月估值稳定在 $1.4B–$1.8B 估计区间。近期不发生 IPO
              或 M&A 事件；公司如有需要则融资 E 轮，或继续靠现金流运营。随着上市市场可比公司提供底部、私募市场溢价提供顶部，倍数大致维持在 9–12x 区间。

              悲观情景假设出现以下一项或多项：（a）主要客户（Uber、Grab、WeChat）流失到竞争平台（Airwallex、Wise
              Platform、Visa/Currencycloud），造成有意义的交易量下滑；（b）关键走廊（Singapore MAS、FCA）出现监管行动，带来合规成本上升或临时暂停；（c）2022–2024
              年金融科技倍数压缩继续，如果需要资本，被迫以 $700M–$1.0B 估值下调融资；或（d）Thunes 在 D 轮投资阶段支出后报告 EBITDA 转负。在这一情景下，按 ~$1.4B–$1.8B
              估计区间进入的投资者面临 30–50% 减记。
            claimRefs:
              - CV021
