  - id: TM001
    title: 市场定义表
    description: >-
      Defines the cross-border B2B payment segments Thunes competes in, distinguishing included from excluded spend,
      identifying buyers, and explaining each segment's relevance to Thunes' DGN strategy.
    columns:
      - 细分 / 类别
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - 与 Thunes DGN 的相关性
    rows:
      - - 全球 B2B 跨境支付（主要 TAM）
        - 国际供应商付款、跨境薪资、承包商付款、公司间资金调拨、市场平台卖家付款
        - 单一司法辖区内 B2B 支付、消费者 P2P 汇款、证券结算
        - CFO、资金团队、AP/AR 部门、PSP 运营商、金融科技平台
        - Thunes DGN 核心：130+ 个国家，直接支付轨道替代 3-5 段代理行跳转链
      - - 数字钱包和移动货币付款（高增长）
        - 移动钱包充值、向移动账户进行数字资金转账、电信运营商付款流
        - 移动银行服务（吸收存款）、消费者信贷产品
        - 电信运营商、数字钱包平台、超级应用（GCash、bKash、M-Pesa 类型）
        - DGN 上 320+ 种支付方式；7B+ 个移动钱包 / 银行账户端点；Thunes 重点方向
      - - 卡基 B2B 付款（通过 Visa/Mastercard 相邻）
        - 向 Visa/Mastercard 借记账户推送付款、虚拟卡 B2B 结算、卡基承包商付款
        - 消费者信用卡发卡、线下刷卡支付
        - 零工平台、市场平台运营商、企业支出管理团队
        - Thunes-Visa Direct 集成（Oct 2022）+ Mastercard 稳定币付款（Nov 2025）；15B+ 张卡端点
      - - 实时支付轨道互操作（结构性使能）
        - 即时本地支付轨道入口（FedNow、UPI、SEPA Instant）连接跨境结算
        - 不含跨境环节的孤立本地即时支付
        - 需要实时跨境结算的银行、金融科技公司、PSP
        - DGN 可直接连接 550+ 个本地实时支付运营商；支持 ISO 20022
      - - 消费者汇款（相邻，排除在 DGN SAM 外）
        - 零售 P2P 资金转账、移民汇款
        - 所有消费者汇款
        - 个人汇款人、侨民社群
        - 不在 Thunes 主要买方策略中；对电信和数字钱包付款客户存在相邻重叠
    notes: >-
      市场边界遵循 Mordor Intelligence（总 B2B 支付）和 Allied Market Research（跨境细分）。Thunes 的 $150T
