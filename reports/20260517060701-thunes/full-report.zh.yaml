      - number: '4.3'
        title: 成本结构与监管资本义务
        blocks:
          - type: paragraph
            body: >-
              Thunes 的成本结构由四类支出主导：支付网络费用和 FX 对冲成本（收入成本）、覆盖 50+ 个市场的监管合规与牌照开支、DGN 的技术基础设施，以及工程、合规、销售和运营人员成本。公司持有新加坡 MAS
              Major Payment Institution 资格、英国 FCA Authorised Payment Institution 资格、法国 ACPR Payment Institution
              License、香港 Money Service Operator 资格，以及美国 50
              个州的汇款牌照——这组多司法辖区牌照组合要求持续持有最低流动资本、配置专职合规人员并承担检查成本，这些都会占用资本，却不会按比例带来收入。MAS Payment Services Act
              要求主要支付机构维持高于规定门槛的最低流动资产和资本充足率；FCA 则在 Payment Services Regulations 2017 下施加同等要求。


              2021 年以来的三笔收购进一步抬高成本基数：Limonetik（2021 年，法国收款平台）、Tookitaki（2022 年 4 月，新加坡监管科技，AML 多数股权）和 Tilia（2025 年 6
              月，美国游戏 / 虚拟货币支付）。这些收购带来的整合成本、商誉摊销以及任何或有对价义务均未公开。尤其是 Tilia 收购把一个美国实体纳入合并范围；Thunes 正推进美国 50 州牌照，这会同步增加 GAAP
              会计复杂度和合规负担。稳定币和数字资产路线图（Circle USDC 集成、Mastercard Move 稳定币付款、Ripple 合作）带来技术投入要求，但预计也会打开新的收入走廊。不同于
              Nium，Thunes 声称已经实现正 EBITDA，意味着运营费用由毛收入覆盖——但确切 EBITDA 利润率，以及 D&A、利息和收购成本是否重大，仍未披露。
