      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Thunes
              的先落地再扩张模式通过两条平行杠杆运转：存量网络成员自身业务增长带来的交易量驱动扩张，以及客户在初始集成之上新增付款端点、币种或受理方式带来的产品覆盖扩张（cross-sell）。两条杠杆都能在不增加获客成本的情况下提升收入。Series
              D 资本明确投向美国市场扩张，为 Thunes 增加一个重要新地域，面向需要新兴市场支付网络的高价值金融科技公司、电商和金融机构客户。

              客户集中度风险未知且重大。Thunes 未披露前 5 或前 10 大客户贡献收入比例。一家公司若达到 $150M 运行率、拥有 720 个成员，前 10 大成员贡献 40–60% 收入就高度合理——在 B2B
              基础设施中，少数高交易量 MTO 或平台客户驱动不成比例交易量是常见模式。MTO 客户分层有特定结构性风险：Remitly、Western Union 和 Ria 既是 Thunes
              客户，也是消费者汇款市场中的直接竞争者。这些公司具备技术能力和财务动机，随着规模扩大自建专有直连支付轨道，从而降低或消除对 Thunes 的依赖。Western Union 现有内部支付基础设施和 Remitly
              工程团队，使这一风险在中期具备可信度。

              地理集中度跟随网络的新兴市场足迹：APAC、非洲和 LATAM 走廊代表最高交易量，但也带来最高监管和货币风险敞口。SWIFT 集成（2025 年 10 月）降低了银行客户的切换摩擦，银行现在可以用既有
              SWIFT 报文访问 Thunes；这既是增长加速器，也在 SWIFT 关系或标准变化时形成依赖风险。研究中没有发现客户合同期限、排他条款或最低交易量承诺的公开记录，因此无法评估客户流失情景下的收入韧性。
