  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >-
              Thunes 的收入来自 Direct Global Network (DGN) 上两个主要计费机制：单笔交易费，以及跨境货币兑换的 FX 加价。根据 TechCrunch 2020 年 9 月 Series B
              文章披露，交易费按目的地走廊、支付方式类型和到账速度变化，每笔介于 $0.02 到 $2。FX 加价则是在每笔换汇付款的中间市场参考汇率之上收取小幅价差——公司在官网称其「定价和 FX 费用 100%
              透明」。无论透明度表述如何，公开渠道找不到费率表或走廊级定价表；企业客户逐一谈判条款，实际价格不披露。


              DGN 平台有三条产品取向，收入也从中流出：Pay（出站跨境付款——B2B 转账、汇款基础设施、薪资和零工经济付款）、Accept（入站收款、钱包充值和本地支付方式受理）以及 SmartX Treasury（覆盖
              90 种货币的 FX 管理与流动性优化）。Tookitaki 收购带来的 Fortress Compliance 嵌入式 AML 产品（2022 年 4 月）可能收取合规 SaaS
              费用，但其收入贡献未单独披露。截至 2025 年 4 月 Series D，CEO Floris de Kort 直接公开表示年化收入运行率约为 $150 million，使 Thunes 成为一家 ARR
              等价口径约 $150 million 的支付基础设施公司。历史收入数据没有公开；支付量运行率从 Series A（2019 年 5 月）的 $3 billion 增至 Series C（2023 年 7
              月）的累计交易额 $50 billion+，说明交易规模显著增长，但这些是交易量数字，不是收入，累计交易额也不能与年度 GTV 互换。按产品线、地域、走廊或客户分层拆分的收入均未公开。
