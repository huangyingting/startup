      - number: '5.2'
        title: 技术与运营架构
        blocks:
          - type: paragraph
            body: >-
              Thunes 平台围绕三根相互连接的技术支柱搭建，形成垂直整合的支付基础设施栈。在连接层，Direct Global Network 在 140 个国家维护 720 个直接成员集成——美洲（18
              个国家）、欧洲（40+ 个国家）、MENA（12 个国家）、亚太（25+ 个国家）和非洲（35+ 个国家）。不同于经过多个中介路由的代理行链条，DGN 连接是直接的，因此 85% 的交易可即时结算，同时维持
              99.99% 的平台正常运行时间。网络覆盖 220 种支付方式和 90 种货币。

              在金融智能层，SmartX Treasury 管理 90 种货币的实时 FX 优化和流动性管理，提供透明的批发 FX 定价、无隐藏费用，并完整展示交易成本。2025 年 9 月，Thunes 将 Ripple
              Payments 集成进 SmartX Treasury，为服务数字资产场景的成员扩展数字资产流动性路径。在合规层，Fortress Compliance 在全部 50 个监管市场嵌入 AML
              风险控制、KYC/KYB 验证和制裁筛查，交易监控则由 2022 年 4 月收购的 Tookitaki 引擎以机器学习驱动。

              三根支柱都通过 docs.thunes.com 暴露的单一 REST API 访问。2025 年 10 月，Thunes 通过启用 SWIFT 连接扩展集成面，使 SWIFT 网络上的 11,000+
              家银行无需新增 API 集成，即可触达 Thunes 的 4 billion 个银行账户和数字钱包端点。公司还为缺少专职工程资源的小型成员提供无 API 的 Business Hub 选项。Thunes
              未公开披露其云服务商、数据库技术或底层编程语言栈——这符合企业支付基础设施运营模式，因为供应商集中度和技术栈细节都具备商业敏感性。
