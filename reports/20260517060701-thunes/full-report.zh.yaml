      - number: '6.3'
        title: 具名客户证明与案例研究
        blocks:
          - type: paragraph
            body: >-
              Thunes 在 thunes.com/case-studies 运营公开案例研究库，记录了七个客户部署：GCash（菲律宾）、nsave（新兴市场 USD
              账户）、PayQuicker（美国付款编排）、Flip（印度尼西亚，10M+ 用户）、UNFCU（United Nations Federal Credit Union，180,000+
              成员）、Pomelo（美国—菲律宾汇款）和 Paydek（英国跨境转账）。相比同阶段多数 B2B 支付基础设施同业，这是一组更丰富的具名证明。证据力最强的案例是
              nsave——它罕见地提供量化结果：上线两个月内付款量提升 4×，支付处理时间缩短超过 50%。GCash 是知名度最高的客户：作为菲律宾领先金融超级应用、服务 10 个菲律宾人中的 8 个，2024 年 11
              月支持英国 / 欧洲钱包充值的合作，是具备强品牌识别度的战略性客户证明点。

              在案例研究之上，Thunes 还宣布了一系列自带客户证明的大型网络合作。Mastercard 2025 年 11 月公告明确点名 Thunes 是 Mastercard Move 在 200+
              个市场实现稳定币钱包付款能力的基础设施，这构成一线金融机构背书。Visa 2022 年 10 月集成（2024 年 3 月扩大）和 PayPal Hyperwallet 2025 年 1 月加入，确认
              Thunes 是全球支付网络获取新兴市场钱包触达时偏好的基础设施。Ecobank 2025 年 10 月合作（32 个非洲国家，Togo 首个上线）和 Ripple 2025 年 9
              月扩展，也进一步佐证其在高摩擦走廊的可生产化网络质量。

              Paydek、UNFCU 和 Pomelo 案例量化较少，但确认了不同客户类型的生产使用：一家英国汇款公司、一家与联合国有关联的信用合作社，以及一家美国—菲律宾汇款创新者。TechCrunch 在 2022 年
              10 月独立确认 Thunes 客户包括 Uber Eats、Grab、MoneyGram、Remitly 和 Western Union——这补强了公司自有传播之外，对 MTO 和零工经济客户基础广度的证明。除
              nsave 外，没有客户公开特定成本节省、结算速度改善数据或归因于 Thunes 的交易量；对企业支付基础设施而言，结果指标缺位很常见，但仍是投资者尽调缺口。
