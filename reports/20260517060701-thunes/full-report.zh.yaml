        - 驱动因素
        - 结构化支付数据标准让跨境对账信息更丰富；多数系统到 2025 年采用；降低跨境流量中的摩擦和欺诈
        - 中高
        - BIS CPMI 2023 年 3 月；SWIFT ISO 20022 指南
      - - SME 跨境支付需求增长
