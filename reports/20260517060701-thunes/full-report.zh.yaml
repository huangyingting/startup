      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Thunes 的 Direct Global Network 在结构上依赖一组关键商业和基础设施合作伙伴，合在一起构成多层依赖栈。Visa Direct 于 2022 年 10 月接入，并在 2024 年 3
              月扩展到亚洲和非洲，可以说是 Thunes 最具战略意义的合作伙伴：Visa 的 14,900+ 家金融机构客户可通过 Visa Direct 集成使用 Thunes 的 send-to-wallet 能力，向
              190+ 个国家的 108+ 种数字钱包付款。Visa 还参与了 Thunes 2023 年 7 月的 C 轮延伸融资，带来一定战略一致性——但这类商业安排通常可提前通知后终止，Visa
              也可能重新谈判条款，或把交易量导向竞争性基础设施。

              Mastercard 于 2025 年 11 月与 Thunes 合作，用 USDC 提供稳定币付款服务。Circle 在 2024 年 10 月成为 Thunes 的主要稳定币结算伙伴。Ripple
              Payments 于 2025 年 9 月接入 Thunes 的 SmartX Treasury System。这形成了多层稳定币依赖栈：Thunes 的数字资产支付能力依赖 Circle（USDC 发行和
              MiCA 合规）、Mastercard（稳定币付款分发渠道）和 Ripple（区块链基础设施）。任一伙伴遭遇监管不利行动——Circle 的 MiCA 合规窗口、Ripple 在 SEC
              和解后的美国定位——都会传导到 Thunes 的稳定币收入和产品供给。SWIFT 连接（2025 年 10 月上线）让 SWIFT 网络上的 11,000+ 家银行可以接入 Thunes
              的移动钱包网络，也带来关键基础设施依赖：若某条走廊出现 SWIFT 连接限制（地缘政治或监管场景），该走廊的银行到钱包流就会停摆。

              Thunes
              在新兴市场（非洲、亚洲、拉美）的地域集中度带来特定走廊风险：国家层面监管变化、资本管制、移动钱包运营商运营问题或央行限制，都可能快速关闭走廊。代理行去风险化——大型国际银行因风险偏好和合规成本约束退出部分新兴市场支付走廊——是
              BIS 和 FSB 已记录的长期趋势，可能削弱流动性，并提高受影响市场中 Thunes 网络成员的运营成本。
