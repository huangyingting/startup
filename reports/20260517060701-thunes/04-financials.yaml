callouts:
- title: Positive EBITDA at $150M Revenue Run-Rate Is a Differentiated Milestone but Requires Audited Corroboration
  calloutType: risk
  body: 'CEO Floris de Kort''s April 2025 statement that Thunes has achieved "positive EBITDA" alongside a "$150 million revenue
    run-rate" is the most material financial disclosure the company has made. If accurate, Thunes has achieved operational profitability
    at a point where comparable private cross-border B2B payment infrastructure peers (Nium, TerraPay) remain loss-making.
    However, the disclosure is a management statement in a funding press release, not an audited or independently verified figure.
    The EBITDA definition was not specified; material items such as D&A from three acquisitions (Limonetik, Tookitaki, Tilia),
    share-based compensation, and acquisition-related costs could account for significant deductions between EBITDA and net
    income. Investors must request audited financial statements from ACRA Singapore filings (or equivalent) and reconcile the
    EBITDA claim to audited gross margin before treating the positive EBITDA as a verified financial milestone.'
  claimRefs:
  - CI001
  - CI002
  - CI039
  - CI040
- title: Revenue Opacity — No Historical Financials, No Segment Disclosure — Constrains Investment Underwriting
  calloutType: risk
  body: 'Unlike Nium, which has ACRA Singapore filings (accessed via fintechnews.sg) providing audited FY2024 revenue of SGD
    167.2M and net loss of SGD 88.1M, no comparable publicly sourced financial detail exists for Thunes. The $150M run-rate
    is a single data point with no multi-year trajectory, no segment breakdown, and no audited validation. There is no publicly
    available Thunes ACRA filing summary in circulation as of the May 2026 run date; Singapore corporate law requires annual
    returns but public accessibility depends on third-party aggregation. The absence of historical revenue figures (pre-2025),
    gross margin, and customer-level economics means any valuation model is built on a single unaudited management assertion.
    This opacity is normal for a private company of Thunes'' stage, but it elevates diligence requirements substantially and
    means the public record provides insufficient basis to independently underwrite the financial chapter of any transaction.'
  claimRefs:
  - CI039
  - CI040
  - CI041
  - CI043
