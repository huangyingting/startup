- id: sales-efficiency-and-unit-economics
  title: Sales Efficiency and Unit Economics
  body: 'Thunes targets enterprise buyers — MTOs, fintechs, banks, superapps, gig-economy platforms, and payroll providers
    — through direct enterprise sales and API partnerships. Named customers include PayPal (Hyperwallet), Remitly, Western Union,
    MoneyGram, Grab, Deliveroo, and Uber, indicating a bias toward large-volume enterprise counterparties that negotiate volume
    pricing and likely achieve below-list take rates. The implied blended take rate is difficult to derive without annual GTV
    disclosure; using the disclosed revenue run-rate of $150 million and an estimated annual GTV in the $50–200 billion range
    yields a blended take rate of 0.08–0.30%, consistent with the infrastructure-layer economics of the cross-border B2B payments
    vertical where spreads are structurally tighter than in consumer remittance.


    Customer acquisition cost, payback period, and net revenue retention are not publicly disclosed, making it impossible to
    independently assess LTV:CAC ratios or revenue durability. The 720-plus direct network members as of 2026 include both
    paying enterprise clients and network partners that may generate indirect volume only. Gross margin — the most critical
    unit-economic metric — is not disclosed; for B2B cross-border payment infrastructure operators, benchmark gross margins
    typically fall in the 40–65% range after deducting network fees, FX hedging costs, settlement float, and payment processing
    charges. Positive EBITDA at a $150 million revenue run-rate, if accurate, implies that Thunes has achieved sufficient scale
    to cover operating expenses from gross profit — a milestone that took peers such as Nium and Airwallex considerably longer
    and that, if sustained, suggests a gross margin closer to the upper end of the benchmark range.'
