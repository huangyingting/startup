- id: cost-structure-and-regulatory-capital
  title: Cost Structure and Regulatory Capital Obligations
  body: 'Thunes'' cost structure is dominated by four categories: payment network fees and FX hedging costs (cost of revenue),
    regulatory compliance and licensing expenditure across 50-plus markets, technology infrastructure for the DGN, and headcount
    for engineering, compliance, sales, and operations. The company holds Major Payment Institution status from MAS Singapore,
    Authorised Payment Institution status from the FCA in the UK, a Payment Institution License from ACPR France, Money Service
    Operator status in Hong Kong, and money transmitter licenses in all 50 US states — a multi-jurisdictional licensing portfolio
    that requires continuous minimum liquid capital holdings, dedicated compliance staff, and examination costs that consume
    capital without proportional revenue generation. The MAS Payment Services Act requires major payment institutions to maintain
    minimum liquid assets and capital adequacy above defined thresholds; the FCA imposes equivalent requirements under its Payment
    Services Regulations 2017.


    Three acquisitions since 2021 add to the cost base: Limonetik (2021, French collections platform), Tookitaki (April 2022,
    Singapore regtech majority stake for AML), and Tilia (June 2025, US gaming/virtual currency payments). Integration costs,
    goodwill amortization, and any earn-out obligations from these acquisitions are not publicly disclosed. The Tilia acquisition
    in particular adds a US-based entity to the consolidation perimeter, increasing GAAP accounting complexity and compliance
    overhead just as Thunes pursues 50-state licensing. Capital intensity from the stablecoin and digital asset roadmap (Circle
    USDC integration, Mastercard Move stablecoin payouts, Ripple cooperation) adds technology investment requirements but is
    also expected to open new revenue corridors. Unlike Nium, Thunes claims positive EBITDA, which implies that operating expenses
    are covered by gross revenue — but the exact EBITDA margin, and whether D&A, interest, and acquisition costs are material,
    remain undisclosed.'
