- id: financial-verdict-and-gaps
  title: Financial Verdict and Diligence Gaps
  body: 'Thunes'' financial profile is materially stronger than comparable private-stage B2B cross-border payment infrastructure
    companies at equivalent scale. Reaching a $150 million revenue run-rate with positive EBITDA — while operating in 130-plus
    countries with a 50-state US licensing footprint and a stablecoin/digital asset roadmap — represents a differentiated capital
    efficiency outcome relative to the peer set. The consistent valuation uplift across rounds (no down-round; Series C at $900M+,
    Series D at "substantial increase") provides a constructive investor confidence signal. However, several structural limitations
    constrain the ability to independently underwrite Thunes'' financial thesis.


    Five financial gaps remain unresolved and constitute blocking diligence items. First, gross margin by revenue stream cannot
    be verified — positive EBITDA is encouraging but does not substitute for audited gross profit disaggregation. Second, CAC
    and payback period are unknown, making LTV:CAC assessment impossible. Third, revenue by corridor, geography, or customer
    segment is not disclosed, leaving concentration risk unquantifiable. Fourth, net revenue retention and customer churn are
    not disclosed, preventing forward revenue projection from existing customers. Fifth, monthly cash-flow actuals are not available;
    the EBITDA claim cannot be reconciled without a P&L. The cross-border B2B payments market is growing at high single-digit
    to double-digit annual rates through 2030 (FXC Intelligence, McKinsey Global Payments Report), providing a structural tailwind,
    but commoditization pressure from competing infrastructure networks (Nium, Airwallex, Wise Platform, TerraPay) and from
    Thunes'' own partner-turned-potential-competitors (Visa Direct, Mastercard Move) could compress take rates as the market
    matures. Investors should demand data room access to audited financials, corridor-level revenue breakdown, and the full
    cap table before underwriting any Thunes transaction.'
