  evidenceGaps:
  - topic: Audited gross margin and P&L
    type: private-evidence-only
    severity: blocking
    missingEvidence: Audited gross margin by revenue stream and full P&L are not publicly available. Positive EBITDA is CEO-stated
      and not audited; no ACRA filing summary has been publicly circulated for Thunes.
    relatedQuestionRefs:
    - QI008
    - QI013
    relatedTableRefs:
    - TI003
    - TI005
    whyItMatters: Without audited gross margin, the EBITDA claim cannot be verified and unit economics cannot be independently
      derived, making financial underwriting dependent on a single unaudited management assertion.
    diligencePath: Request audited ACRA Singapore annual financial statements for FY2023 and FY2024 via BizFile+; request management
      accounts with P&L disaggregated by revenue stream and geographic segment.
  - topic: Annual GTV and transaction count
    type: private-evidence-only
    severity: blocking
    missingEvidence: Annual gross transaction value and transaction count are not publicly disclosed. The "$50B cumulative transactions"
      figure at Series C is a lifetime metric, not an annual run-rate, and cannot substitute.
    relatedQuestionRefs:
    - QI026
    - QI007
    relatedTableRefs:
    - TI003
    - TI005
    whyItMatters: Without annual GTV, blended take rate cannot be derived, pricing power relative to peers cannot be assessed,
      and revenue trajectory modelling is impossible.
    diligencePath: Request annual GTV by corridor and product line for FY2022–FY2024; transaction count and average transaction
      size by payment method and destination region.
  - topic: Customer acquisition cost and NRR
    type: private-evidence-only
    severity: blocking
    missingEvidence: CAC, payback period, and net revenue retention rate are not publicly disclosed.
    relatedQuestionRefs:
    - QI023
    - QI024
    relatedTableRefs:
    - TI003
    - TI005
    whyItMatters: Without CAC and NRR, neither the LTV:CAC ratio nor the forward revenue forecast from existing clients can
      be independently assessed.
    diligencePath: Request cohort-level CAC by acquisition channel; NRR by customer segment and vintage year for FY2022–FY2024;
      gross churn rate and reason-for-churn analysis.
