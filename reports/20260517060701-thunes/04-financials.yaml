- id: TI005
  title: Public financial gaps table
  description: Financial metrics not publicly available for Thunes that represent blocking or material diligence items before
    any investment or partnership underwriting decision.
  claimRefs:
  - CI039
  - CI040
  - CI041
  - CI042
  - CI043
  columns:
  - Missing Metric
  - Diligence Impact
  - Exact Path to Resolve
  - Urgency
  rows:
  - - Gross margin by revenue stream
    - Cannot validate EBITDA claim or assess unit economics; take rate without COGS is uninterpretable
    - Request FY2023–FY2025 audited P&L with stream-level gross margin; reconcile to DGN product lines
    - Blocking
  - - CAC and payback period
    - Cannot compute LTV:CAC ratio; sales efficiency and capital requirements for growth unverifiable
    - Request cohort-level CAC by acquisition channel; payback period by customer segment and ACV band
    - Blocking
  - - Annual GTV and transaction count
    - Cannot derive blended take rate or validate revenue quality; "$50B cumulative" at Series C is not annual volume
    - Request annual GTV by corridor and payment method for FY2023–FY2025; transaction count and average ticket
    - Blocking
  - - Revenue by corridor or geography
    - Cannot assess concentration risk; single-corridor dependency and corridor pricing opacity invisible from aggregates
    - Request top-10 corridor revenue breakdown; geographic revenue split; HHI for concentration analysis
    - Material
  - - Customer count, NRR, and churn
    - Cannot forecast revenue trajectory or validate expansion story from existing clients
    - Request active client definition; quarterly NRR by cohort; gross churn rate and churn reasons
    - Material
  notes: All five metrics are standard disclosures in any formal data room for a private equity investment or strategic transaction.
    Their absence from public data reflects normal private-company practice, not active concealment. The positive EBITDA disclosure
    is a positive signal but does not substitute for any of these five items. Thunes''s ACRA Singapore corporate filings, if
    lodged, would provide audited financial statements; a request through ACRA''s BizFile+ system should be the first step.
