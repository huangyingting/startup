- id: capital-adequacy-and-financing
  title: Capital Adequacy and Financing Dependency
  body: 'Thunes has raised approximately $352 million in total equity across Series A through D. The April 2025 Series D of $150
    million — the company''s largest raise by round — was led by Apis Partners and Vitruvian Partners, both private equity
    firms with deep financial-services expertise. CEO Floris de Kort confirmed a "substantial valuation increase" over the $900
    million-plus Series C valuation (July 2023), implying a Series D post-money valuation in the approximate range of $1.2–1.8
    billion. The Series C investor base included Marshall Wace (lead), Bessemer Venture Partners, Visa, EDBI, and Endeavor Catalyst,
    and the PitchBook-sourced pre-round valuation before Series C was $794 million; the Series C closed at over $900 million.
    The funding chronology therefore represents consistent valuation appreciation unlike peers with down-rounds — a positive
    capital structure signal for Thunes.


    With positive EBITDA disclosed at Series D close, the monthly cash consumption is likely materially lower than for loss-making
    peers. No burn rate is disclosed; assuming the EBITDA claim is accurate and EBITDA approximates operational cash generation
    (ignoring D&A and capex), the $150 million Series D proceeds extend Thunes'' runway well beyond 24 months under conservative
    assumptions, and potentially indefinitely if EBITDA is self-sustaining. However, EBITDA is not equivalent to free cash flow:
    D&A from acquisitions (Limonetik, Tookitaki, Tilia), regulatory capital set-asides required by MAS and FCA, and capex
    for technology and network expansion could mean actual free cash flow is materially below EBITDA. The stated use of funds
    — US market expansion, DGN deepening, AI, and digital asset interoperability — all require continued capital investment.
    No debt facilities, convertible instruments, or contingent liabilities have been publicly disclosed; the capital structure
    appears equity-only, but this cannot be verified without audited financial statements or a cap table disclosure. A UK Companies
    House search for "thunes" did not return an active Thunes fintech entity under that name, suggesting the FCA-authorized
    UK operations may be registered under a subsidiary name (such as TransferTo or a renamed legal entity); the ACRA Singapore
    registry holds the group''s primary corporate filings.'
