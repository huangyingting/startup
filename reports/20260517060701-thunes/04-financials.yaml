company:
  name: Thunes
chapter:
  number: 4
  title: Financials
  summary: Thunes disclosed a revenue run-rate of approximately $150 million and positive EBITDA at its April 2025 Series D
    close — the first time the company has confirmed any profitability metric. These are self-reported figures; no audited financials,
    segment-level revenue, or detailed P&L are publicly available for this private Singapore-registered company. Total equity
    raised across Series A through D is approximately $352 million at a valuation that management characterizes as a "substantial
    increase" over the $900 million-plus Series C (July 2023), implying a post-money valuation in the $1.2–1.8 billion range.
    The revenue model is a dual-lever structure of per-transaction fees ($0.02–$2, corridor-dependent) plus an FX markup above
    mid-market on currency conversions — a model unchanged in its fundamentals since 2019. Gross margin, monthly cash burn,
    customer acquisition cost, net revenue retention, and revenue by corridor are all undisclosed. Post-Series D capital adequacy
    appears sufficient for a 24-plus-month horizon assuming the claimed EBITDA is accurate, but five structural financial gaps
    constitute blocking diligence items before underwriting the Thunes investment thesis.
sections:
- id: revenue-streams-and-pricing
  title: Revenue Streams and Pricing Model
  body: 'Thunes generates revenue through two primary mechanisms applied across its Direct Global Network (DGN): a per-transaction
    fee and an FX markup on cross-border currency conversions. The transaction fee structure, as disclosed in the September 2020
    TechCrunch Series B article, ranges from $0.02 to $2 per transaction, varying by destination corridor, payment method type,
    and delivery speed. The FX markup component captures a small spread above the mid-market reference rate on each converted
    payment — a model the company describes on its homepage as offering "100% transparency on pricing and FX fees." Regardless
    of the transparency claim, no published rate card or corridor-level pricing schedule is publicly accessible; enterprise
    clients negotiate bespoke terms, and realized pricing is not disclosed.


    The DGN platform has three product orientations from which revenue flows: Pay (outbound cross-border payouts — B2B transfers,
    remittance infrastructure, payroll, and gig-economy disbursements), Accept (inbound payment collection, wallet top-ups,
    and local payment method acceptance), and SmartX Treasury (FX management and liquidity optimization in 90 currencies).
    The Fortress Compliance embedded-AML product, acquired through Tookitaki (April 2022), likely generates a compliance SaaS
    fee, but its revenue contribution is not separately disclosed. At April 2025 Series D, the annualized revenue run-rate was
    approximately $150 million per CEO Floris de Kort''s direct public statement, making Thunes a $150 million ARR-equivalent
    payment infrastructure business. No historical revenue figures are public; the progression from a $3 billion payment volume
    run-rate at Series A (May 2019) to $50 billion-plus in cumulative transactions at Series C (July 2023) suggests significant
    volume growth, but those are volume figures, not revenue, and cumulative transactions are not interchangeable with annual
    GTV. Revenue attribution by product line, geography, corridor, or customer segment is not publicly disclosed.'
