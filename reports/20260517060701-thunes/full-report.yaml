      - number: '7.4'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: >-
              CEO Floris de Kort joined Thunes in January 2024, replacing co-founder Peter De Caluwe who moved to the
              Deputy Chairman role. De Kort brings substantial payments industry credentials — he served as CEO of
              Worldpay's Global eCommerce division through its 2015 IPO and later led Xplor Technologies, the merged
              entity of Clearent and TSG. This is a strong operational background for scaling a payment infrastructure
              business. However, de Kort has been in post for approximately 16 months as of the May 2026 runDate — a
              relatively recent tenure for a CEO simultaneously navigating US market expansion, stablecoin product
              growth, SWIFT connectivity launch, and a major M&A transaction (Tilia, June 2025). The co-founder
              transition also creates key-person dynamics around Peter De Caluwe: his strategic vision, network
              relationships, and institutional knowledge remain important even in the Deputy Chairman role, and his
              eventual full departure from board responsibilities would represent a notable organizational inflection.

              Thunes' US market expansion is the largest near-term execution risk on its growth roadmap. Building a US
              go-to-market capability in competition with Stripe, Airwallex (over $900M raised), Wise Platform (public,
              with disclosed financials), and Nium (IPO-track) — all of which have more established US enterprise sales
              presences — requires significant commercial, compliance, and engineering investment. The US B2B payment
              infrastructure market is more transparent and more demanding in enterprise due diligence than most of
              Thunes' existing emerging-market strongholds, and Thunes enters without a public financial disclosure
              track record that large US enterprises and FI partners often require.

              The integration of three acquisitions (Limonetik 2021, Tookitaki 2022, Tilia 2025) while executing a major
              US market entry creates execution complexity. Engineering, compliance, and payments operations talent in
              Singapore's fintech market is competed for aggressively by DBS, Grab, Sea Limited, Revolut, and Airwallex;
              compensation pressure and talent attrition create ongoing operational risks. Thunes' Chief Legal and
              Compliance Officer, Ruwan de Soyza (25-plus years of experience, ex-Worldpay GC), provides strong
              compliance leadership continuity, but CLO departure would be an elevated risk signal given the company's
              regulatory complexity.
