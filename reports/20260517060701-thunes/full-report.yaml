    Thunes operates the Direct Global Network (DGN), a single-API cross-border payments network covering
    Pay-to-Mobile-Wallets, Pay-to-Banks, Pay-to-Cards, Pay-to-Stablecoin-Wallets, and Pay-to- Digital-Vouchers, plus
