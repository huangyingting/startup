            body: >-
              Across eight buying criteria, Thunes leads competitors on emerging-market mobile wallet reach (145 mobile
              wallet brands, 4B wallet endpoints in 140 countries) and compliance breadth (50 market licenses including
              MAS, FCA, ACPR, and all 50 US states). No competitor publicly claims equivalent mobile wallet depth in
