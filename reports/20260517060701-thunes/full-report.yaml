            title: Positive EBITDA at $150M Revenue Run-Rate Is a Differentiated Milestone but Requires Audited Corroboration
            body: >-
              CEO Floris de Kort's April 2025 statement that Thunes has achieved "positive EBITDA" alongside a "$150
              million revenue run-rate" is the most material financial disclosure the company has made. If accurate,
              Thunes has achieved operational profitability at a point where comparable private cross-border B2B payment
              infrastructure peers (Nium, TerraPay) remain loss-making. However, the disclosure is a management
              statement in a funding press release, not an audited or independently verified figure. The EBITDA
