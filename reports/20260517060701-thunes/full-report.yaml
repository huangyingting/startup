      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: >-
              DGN Direct-Integration Model Is Structurally Superior to Correspondent Banking — But SWIFT Is Closing the
              Gap
            body: >-
              Thunes' Direct Global Network eliminates the 3-5 correspondent intermediary hops that define legacy
              cross-border B2B payments, reducing settlement from 1-5 business days to real-time or near-real-time in
              active corridors. With 550-plus direct integrations across 130 countries, the DGN is a genuine alternative
              to the SWIFT correspondent chain for mid-market and emerging-market corridors. However, SWIFT's active
              investment program — ISO 20022 migration, gpi tracking, and pre-validation services — is explicitly
              designed to address the same pain points. The October 2025 announcement of SWIFT connectivity for Thunes'
              own DGN (allowing SWIFT member banks to route through Thunes) is a strategic hedge: Thunes is
              simultaneously competing with and distributing through SWIFT. This dual posture reduces Thunes' exposure
              to SWIFT substitution risk while creating distribution leverage.
            calloutType: insight
            claimRefs:
              - CM006
              - CM007
              - CM026
              - CM029
              - CM030
          - type: callout
            title: Market Sizing Spread Is 1,000x — Investors Must Specify Which Metric They Are Using
            body: >-
              Analyst estimates for the B2B cross-border payment market range from $206.5 billion in revenue (Allied
              Market Research, 2024) to $150 trillion in total flows (Thunes' own market framing, 2025) — a spread of
              more than 700 times. This is not statistical noise. It reflects fundamentally different measurement
              choices: transaction flow volume versus fee-based revenue, cross-border only versus all B2B, and whether
              consumer flows are included. Investors using TAM to justify Thunes' $1.9 billion valuation should use the
              Allied Market Research $206.5 billion revenue figure, not the $150 trillion flow metric. At $150 million
              ARR, Thunes has captured approximately 0.07 percent of the revenue TAM — which is consistent with a
              high-growth infrastructure business but also illustrates the distance between the market narrative and
              current monetization. The relevant forward projection is whether Thunes can grow revenue at 15-plus
              percent CAGR (in line with the overall market) to reach $500 million-plus revenue by 2031.
