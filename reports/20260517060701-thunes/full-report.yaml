      - number: '8.3'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              The bull case assumes Thunes confirms audited revenue materially above $150M, EBITDA margins of 15%+, and
              strong net revenue retention from key enterprise customers (Uber, Grab, Deliveroo, WeChat). In this
              scenario, the Direct Global Network expansion to new corridors (Morocco 2025, continued Gulf/APAC growth)
              is driving volume acceleration, the Mastercard and Circle stablecoin partnerships deliver measurable new
              revenue streams, and Thunes either files for a US or Singapore IPO in 2026–2027 or receives a strategic
              acquisition offer from a Tier-1 payments network or bank at a $2.0B–$2.8B range. The Airwallex $5.6B
              valuation and the Currencycloud $925M strategic acquisition both provide directional support for this
              scenario.

              The base case assumes Thunes' revenue is in the $140M–$175M range, EBITDA-positive but with margins not
              disclosed, steady corridor and partnership expansion, and a valuation stable at the estimated $1.4B–$1.8B
              range over the next 18–24 months. No IPO or M&A event occurs in the near term; the company raises a Series
              E (if needed) or continues operating on cash flow. The multiple stays approximately flat in the 9–12x
              range as public market comps provide a floor and private market premiums provide a ceiling.

              The bear case assumes one or more of the following: (a) a major customer (Uber, Grab, WeChat) churns to a
              competing platform (Airwallex, Wise Platform, Visa/Currencycloud), causing a meaningful volume decline;
              (b) a regulatory action in a key corridor (Singapore MAS, FCA) creates compliance cost escalation or
              temporary suspension; (c) the fintech multiple compression of 2022–2024 continues, resulting in a forced
              down-round at $700M–$1.0B if capital is needed; or (d) Thunes reports EBITDA turning negative following
              the Series D investment phase spend. In this scenario, investors entering at the ~$1.4B–$1.8B estimated
              range face a 30–50% markdown.
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
