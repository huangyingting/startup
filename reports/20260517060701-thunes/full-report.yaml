      - number: '1.5'
        title: Network Operations, Key Partnerships, and Adverse Considerations
        blocks:
          - type: paragraph
            body: >
              Thunes' regulatory footprint is a key competitive differentiator: it holds a Major Payment Institution
              license from MAS (Singapore), an Authorised Payment Institution licence from the FCA (UK), a Payment
              Institution Licence from ACPR (France, obtained April 2023), a Money Service Operator licence in Hong
              Kong, and 50 money transmitter licenses across all US states via Thunes Financial Services (obtained
              2024-2025). These licenses collectively enable the DGN to serve regulated clients across key global
              financial centres and the US market — the primary stated use of Series D proceeds. The SWIFT connectivity
              launch (October 2025) extended DGN reach to the 11,000+ banks on the SWIFT network without requiring new
              integration by those institutions, materially lowering Thunes' friction for bank client acquisition.

              Key partner integrations in 2024-2025 include: Circle (October 2024 USDC settlement launch, expanded
              October 2025 to include Pay-to-Stablecoin-Wallets supporting USDC and USDT), Mastercard Move (November
              2025, stablecoin wallet payouts via DGN), Ripple (September 2025 expansion of a 2020 partnership,
              integrating Ripple Payments into SmartX Treasury System), PayPal Hyperwallet (January 2025, enabling
              real-time payouts to 450M+ mobile wallets in Asia-Pacific), Ecobank (October 2025, pan-African banking
              access), and GCash (November 2024, Philippines wallet top-ups from UK/Europe). Visa Direct's integration
              (October 2022, expanded March 2024) allows Visa's enterprise clients to reach digital wallets via Thunes.

              Adverse considerations: No major lawsuits, regulatory enforcement actions, or sanctions against Thunes
              were identified in publicly available sources. The principal risk factors identified are competitive
              pressure from a growing field of cross-border payment infrastructure providers (Nium, TerraPay, Airwallex,
              Wise Platform, PPRO, Banking Circle, Visa Direct, Mastercard Send, SWIFT gpi), stablecoin regulatory
              uncertainty across multiple jurisdictions, and the CEO transition risk from the apparent departure of
              Floris de Kort after the April 2025 Series D and return of co-founder Peter De Caluwe to the CEO role.
              Research found no public explanation of the de Kort departure, which is an open question requiring
              diligence. Market commoditization risk in cross-border payments is structural: the transaction-fee model
              is subject to ongoing price compression as competition grows.
