      - number: '6.3'
        title: Named Customer Proof and Case Studies
        blocks:
          - type: paragraph
            body: >-
              Thunes operates a public case study library at thunes.com/case-studies with seven documented client
              deployments: GCash (Philippines), nsave (emerging-market USD accounts), PayQuicker (US payouts
              orchestration), Flip (Indonesia, 10M+ users), UNFCU (United Nations Federal Credit Union, 180,000+
              members), Pomelo (US-Philippines remittance), and Paydek (UK cross-border transfer). This is a
              substantially richer named-proof corpus than most B2B payment infrastructure peers at a comparable stage.
              The most evidentially compelling case study is nsave — uniquely, it provides quantified outcomes: a 4×
              increase in payout volumes and more than 50% faster payment processing times within two months of going
              live. GCash is the highest-profile client: as the Philippines' leading finance super app serving 8 out of
              10 Filipinos, the November 2024 partnership enabling UK/European wallet top-ups is a strategically
              significant customer proof point with strong brand recognition.

              Above the case study layer, Thunes has announced a series of major network partnerships that carry their
              own customer proof. Mastercard's November 2025 announcement explicitly named Thunes as the infrastructure
              enabling Mastercard Move's stablecoin wallet payout capability across 200+ markets, constituting a tier-1
              financial institution endorsement. Visa's October 2022 integration (expanded March 2024) and PayPal's
              Hyperwallet joining in January 2025 confirm Thunes' role as infrastructure-of-choice for global payment
              networks seeking emerging-market wallet reach. Ecobank's October 2025 partnership (32 African countries,
              first live in Togo) and Ripple's September 2025 expansion are further corroboration of production-ready
              network quality in high-friction corridors.

              The Paydek, UNFCU, and Pomelo case studies are less quantified but confirm production usage across diverse
