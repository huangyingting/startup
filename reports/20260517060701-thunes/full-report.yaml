  - id: FV002
    title: Valuation sensitivity — Thunes implied EV by revenue multiple
    type: bar
    description: >-
      Implied Thunes enterprise value across EV/Revenue multiple scenarios from 5x (distressed) to 18x (Airwallex
      private-market comparable), based on estimated $150M revenue run-rate.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV016
    data:
      xAxis: EV/Revenue Multiple
      yAxis: Implied Enterprise Value ($M)
      items:
        - label: 5x rev (distressed/WU-floor)
          value: 750
          note: Below public peer floor; only warranted if revenue declines or EBITDA turns negative
        - label: 7x rev (dLocal/Payoneer premium)
          value: 1050
          note: Reflects public market peer median with private-market discount applied
        - label: 9x rev (base low — private EBITDA premium)
          value: 1350
          note: Lower bound of base-case estimated range; EBITDA positive justifies premium over public comps
        - label: 12x rev (base high)
          value: 1800
          note: Upper bound of base-case estimated range; consistent with Series D "substantial increase" language
        - label: 15x rev (bull)
          value: 2250
          note: Bull scenario requiring audited high margins and strong NRR confirmation
        - label: 18x rev (Airwallex private comparable)
          value: 2700
          note: Airwallex private-market benchmark; achievable only with scale acceleration and market leadership evidence
  - id: FV003
    title: Valuation / return range — bear, base, bull
    type: range
    description: >-
      Expected enterprise value range for Thunes under bear, base, and bull scenarios over an 18–36 month investment
      horizon.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV025
    data:
      items:
        - label: Bear case (down-round or distressed)
          low: 700
          high: 1100
          unit: $M
          note: Revenue stalls or major customer churns; EBITDA turns negative; forced capital raise at compressed multiple
        - label: Base case (stable private valuation)
          low: 1400
          high: 1800
          unit: $M
          note: Revenue stable at ~$150M+; EBITDA positive; no near-term liquidity event; estimated current range maintained
        - label: Bull case (IPO or strategic acquisition)
          low: 2000
          high: 2800
          unit: $M
          note: Audited revenue confirms growth; EBITDA margins verified; IPO filing or strategic M&A at premium
  - id: FV004
    title: Investment KPIs
    type: kpi
    description: Key investment performance indicators for monitoring the Thunes Track recommendation.
    claimRefs:
      - CV001
      - CV003
      - CV005
      - CV006
      - CV007
    data:
      items:
        - label: Estimated Post-Money (Series D)
          value: $1.4B–$1.8B
          unit: estimated range
          trend: up
          note: Undisclosed; estimated from "substantial" language over $900M+ Series C and peer comparables
        - label: Revenue Run-Rate
          value: ~$150M
          unit: annualised (April 2025)
          trend: up
          note: Stated in Series D announcement; unaudited; implies 9–12x multiple on base-case estimated valuation
        - label: EBITDA Status
          value: Positive
          unit: unaudited
          trend: up
          note: Confirmed by CEO in Series D announcement; rare among private B2B payments peers
        - label: Total Capital Raised
          value: ~$292M
          unit: cumulative
          trend: up
          note: Series A $10M + Series B $60M + Series C $72M + Series D $150M
        - label: Network Reach
          value: 130+ countries
          unit: via 320+ payment methods
          trend: up
          note: 7B+ mobile wallets and bank accounts; 80+ currencies; key competitive differentiator
