  - id: FU001
    title: Thunes customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Thunes' enterprise customer journey from initial awareness through API integration, production go-live, and
      multi-product/multi-corridor expansion.
    claimRefs:
      - CU002
      - CU028
      - CU030
      - CU036
    data:
      items:
        - label: Awareness
          value: >-
            Discovery via fintech industry events (Money20/20, Sibos, Singapore Fintech Festival) | Network-effect
            referrals from existing members (Visa, Mastercard, PayPal partnerships drive downstream awareness) | Thunes
            direct sales outreach (SDR-led or enterprise AE) | Analyst coverage (TechCrunch, Finextra, PYMNTS) |
            Regulatory milestone announcements (50-state US MTL, SWIFT connectivity) triggering inbound from
            compliance-sensitive buyers
          note: >-
            Enterprise buyer journey starts with problem recognition — slow/opaque correspondent banking, no mobile
            wallet reach, compliance burden. Thunes awareness is event-driven and referral-amplified by tier-1 network
            partnerships.
        - label: Evaluation
          value: >-
            API documentation review (thunes.com/api-documentation) | Corridor coverage assessment vs competitors (Nium,
            Airwallex, TerraPay, Currencycloud) | Regulatory license review (50-market licenses, PCI DSS, ISO 27001
            compliance) | Proof-of-concept discussion with Thunes solutions engineer | Reference checks with existing
            Network Members
          note: >-
            Buyers compare corridor depth in target markets, real-time settlement rates, compliance coverage, and
            pricing. Thunes' 85% real-time rate and 140-country coverage are primary differentiators vs
            correspondent-bank alternatives.
        - label: Commercial Onboarding
          value: >-
            Master Service Agreement (MSA) and DPA negotiation | KYB completion and AML/CFT regulatory sign-off | FX and
            fee structure agreement | SLA terms for settlement timing, corridor uptime, and incident escalation |
            Integration timeline planning with Thunes implementation team
          note: >-
            Commercial cycle varies by client type: 1–3 months for smaller fintechs; 3–9 months for mid-market; longer
            for tier-1 financial institutions (banks, large MTOs).
        - label: Technical Integration
          value: >-
            Single API integration via Thunes Money Transfer API | Webhook configuration for payment status events |
            Compliance workflow embedding (AML, KYC/KYB pass-through) | Corridor-specific testing and go-live readiness
            review | Optional SWIFT connectivity for bank clients (launched Oct 2025)
          note: >-
            Technical integration creates structural switching costs — 2–6 months of engineering work plus compliance
            workflow re-routing. Clients who complete integration rarely switch providers without a compelling cost or
            service quality trigger.
        - label: Production and Expansion
          value: >-
            Live payments in initial corridors | Volume ramp as client end-users generate demand | Additional corridor
            enablement (expanding from initial corridors to 140 total) | Cross-sell of Accept capability, stablecoin
            settlement, or SWIFT connectivity | Network-effect value grows as Thunes adds new wallet and bank endpoints
            (e.g., GCash, M-Pesa, Ecobank Africa rollout)
          note: >-
            Land-and-expand model — volume growth within existing members and cross-sell to additional Thunes products
            are the primary revenue levers after initial go-live. US MTL achievement opens US-based clients to the same
            expansion path.
  - id: FU002
    title: Adoption and deployment funnel
    type: funnel
    layout: standard
    summary: >-
      Estimated enterprise funnel from total potential B2B cross-border payment clients to Thunes Network Members, named
      case study clients, and clients with quantified outcomes.
    claimRefs:
      - CU001
      - CU022
      - CU023
      - CU028
    data:
      items:
        - label: Total addressable B2B cross-border payment clients (global)
          value: 50000
          unit: estimated organisations
          note: >-
            Rough estimate of global MTOs, banks, PSPs, gig platforms, and wallets that require cross-border payment
            infrastructure API access. Not disclosed by Thunes; author estimate from industry sources (SWIFT has 11,000+
            bank clients alone).
        - label: Thunes Network Members (current)
          value: 720
          unit: members
          note: >-
            Official Thunes homepage figure as of May 2026 run date; represents clients with active DGN integration via
            API or SWIFT connectivity.
        - label: Named and publicly verifiable clients
          value: 22
          unit: estimated named clients
          note: >-
            Includes 7 official case study clients + Mastercard, Visa, PayPal, Ripple, Circle, Ecobank, Swift (7 network
            partners) + Uber, Deliveroo, Grab, Remitly, Western Union, Ria, Commercial Bank of Dubai, Revolut (8 named
            in official industry pages or independent press). Not exhaustive — many of 720 are unnamed.
        - label: Clients with quantified proof outcomes
          value: 1
          unit: clients
          note: >-
            Only nsave has published quantified deployment outcomes (4× volume, 50%+ faster). All other case studies
            describe qualitative outcomes only.
  - id: FU003
    title: Customer proof matrix
    type: matrix
    layout: wide
    summary: Evidence quality assessment across Thunes' key named customers and network partners on five proof dimensions.
    claimRefs:
      - CU007
      - CU009
      - CU015
      - CU019
      - CU022
      - CU027
      - CU031
      - CU032
    data:
      columns:
        - nsave
        - GCash
        - Mastercard Move
        - Ecobank Group
        - TechCrunch-confirmed (Uber/WU/Remitly)
      rows:
        - label: Named in official case study or press release
          values:
            - Yes — official Thunes case study
            - Yes — official case study + CrowdFund Insider 2024
            - Yes — Mastercard newsroom press release (primary source)
            - Yes — African Business Oct 2025 (CEO-quoted)
            - Third-party only — TechCrunch Oct 2022 (no Thunes case study)
        - label: Executive quoted or named
          values:
            - Not named in case study excerpt
            - Not named in case study
            - Pratik Khowala, Global Head Mastercard Transfer Solutions
            - Jeremy Awori, CEO Ecobank Group
            - Not quoted — client confirmation only
        - label: Production deployment confirmed
          values:
            - Yes — 2-month live results reported
            - Yes — Nov 2024 launch announcement
            - Yes — announced at Singapore Fintech Festival 2025
            - Yes — Togo live Oct 2025; phased rollout
            - Yes — TechCrunch confirmed active client status
        - label: Quantified outcome disclosed
          values:
            - Yes — 4× volume, 50%+ faster processing
            - No — qualitative description only
            - No — partnership scope described, not volume
            - No — launch announced, no volume metrics
            - No — client status confirmed, no Thunes-specific metrics
        - label: Strategic importance tier
          values:
            - Low-to-medium — fast-growing emerging-market fintech
            - High — Philippines' dominant finance super app
            - Tier-1 — global payment network, 200+ markets
            - High — pan-African banking anchor client, 32 countries
            - High — Uber/Western Union/Remitly are global brands
  - id: FU004
    title: Retention and cohort estimate
    type: cohort
    layout: standard
    summary: >-
      Estimated enterprise Network Member retention by cohort year, derived from B2B payment infrastructure industry
      benchmarks. Thunes has not published NRR, GRR, or cohort data.
    claimRefs:
      - CU025
      - CU028
      - CU030
    approximationNotes: >-
      Thunes does not publish cohort or retention data. Values are estimated using B2B payment infrastructure industry
      benchmarks (85–90% Year 2 gross retention for API-integrated enterprise clients; 100–120% NRR assuming volume
      expansion within surviving clients). These estimates should be treated as directional benchmarks for diligence
      framing, not as Thunes-specific performance data.
    data:
      columns:
        - Year 1 (%)
        - Year 2 (%)
        - Year 3 (%)
      rows:
        - label: FY2022 Cohort (estimated — B2B infra benchmark)
          values:
            - 100
            - 87
            - 78
          note: >-
            Estimated using comparable B2B payment infrastructure benchmarks; high switching cost from API integration
            supports Year 2/3 retention. Actual Thunes data not available.
        - label: FY2023 Cohort (estimated — B2B infra benchmark)
          values:
            - 100
            - 85
            - 0
          note: >-
            Year 2 estimate based on benchmark; Year 3 not yet observable as of 2026. Positive EBITDA in 2025 is broadly
            consistent with stable or improving cohort retention.
        - label: FY2024 Cohort (estimated — first year only)
          values:
            - 100
            - 0
            - 0
          note: Only Year 1 is observable for this cohort; Year 2 data not yet available as of May 2026.
        - label: FY2025 Cohort (partial year — not yet assessed)
          values:
            - 0
            - 0
            - 0
          note: >-
            FY2025 cohort members (including Ecobank, Swift-connected banks, US market entrants) are too recent to
            assess; no first-year completion data available.
  - id: FR001
    title: Risk heatmap — Thunes principal risks by likelihood and severity
    type: matrix
    layout: wide
    summary: >-
      Thunes' principal risks mapped by likelihood (rows) and severity (columns); cell values name specific risk
      scenarios.
    claimRefs:
      - CR001
      - CR005
      - CR008
      - CR011
      - CR020
      - CR028
      - CR030
    data:
      columns:
        - Medium Severity
        - High Severity
        - Critical Severity
      rows:
        - label: Low Likelihood
          values:
            - ACPR/HK MSO compliance cost | Fortress Compliance audit gap
            - MAS MPI revocation | FCA API suspension | SWIFT exclusion in corridor
            - FATF correspondent banking withdrawal | Visa Direct commercial termination
        - label: Medium Likelihood
          values:
            - Tilia integration execution delay | EM talent attrition
            - Financial opacity limits institutional diligence | US expansion GTM miss | Circle MiCA compliance window
            - US MTL NY/CA approval denial | Revenue stall and valuation compression | CEO departure signal
        - label: High Likelihood
          values:
            - FX exotic-corridor liquidity pressure | No published API SLA
            - Stablecoin regulatory volatility (MiCA, US bills) | Competitive pressure Airwallex/Wise/Nium
            - Financial disclosure gap persists as US launch scales | Partner concentration in Visa+Mastercard+Circle
