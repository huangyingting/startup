companyProfile:
  summary: >
    Thunes was formed in 2016 when Singapore-based mobile payments operator TransferTo (founded 2005) was split into DT
    One (mobile top-ups) and Thunes (cross-border B2B payments), then publicly relaunched under the Thunes brand in
    February 2019. Co-founder Peter De Caluwe — a serial fintech entrepreneur (Ogone, Naspers/PayU, DT One) — has
    remained the central executive, currently serving as Deputy Chairman and CEO after a brief 2024–2025 interlude under
    Floris de Kort. Thunes operates the Direct Global Network (DGN), a proprietary single-integration connectivity layer
    reaching 130+ countries and 80+ currencies through 550+ direct integrations with banks, mobile wallets, MTOs, and
    stablecoin endpoints, supplemented by the SmartX Treasury System and Fortress Compliance Platform. The company has
    raised approximately $292M across Series A ($10M, 2019, GGV Capital), Series B ($60M, 2020, Helios Investment
    Partners), Series C ($72M at $900M+, 2023, Marshall Wace) and Series D ($150M, April 2025, Apis Partners and
    Vitruvian Partners). Thunes claims positive EBITDA at the Series D milestone — a rare profitability signal in
    cross-border payments infrastructure — and is using Series D proceeds to fund US expansion, DGN deepening, and
    AI/digital-asset capabilities. Recent network and partnership milestones include Mastercard stablecoin payouts (Nov
    2025), SWIFT connectivity (Oct 2025), Ripple integration (Sep 2025), Ecobank partnership (Oct 2025), Circle USDC
    settlement (Oct 2024), the Tilia acquisition (Jun 2025), and money transmitter licenses in all 50 US states.
