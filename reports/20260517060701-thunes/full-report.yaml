  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >-
              Thunes generates revenue through two primary mechanisms applied across its Direct Global Network (DGN): a
              per-transaction fee and an FX markup on cross-border currency conversions. The transaction fee structure,
              as disclosed in the September 2020 TechCrunch Series B article, ranges from $0.02 to $2 per transaction,
              varying by destination corridor, payment method type, and delivery speed. The FX markup component captures
              a small spread above the mid-market reference rate on each converted payment — a model the company
              describes on its homepage as offering "100% transparency on pricing and FX fees." Regardless of the
              transparency claim, no published rate card or corridor-level pricing schedule is publicly accessible;
              enterprise clients negotiate bespoke terms, and realized pricing is not disclosed.


              The DGN platform has three product orientations from which revenue flows: Pay (outbound cross-border
              payouts — B2B transfers, remittance infrastructure, payroll, and gig-economy disbursements), Accept
              (inbound payment collection, wallet top-ups, and local payment method acceptance), and SmartX Treasury (FX
              management and liquidity optimization in 90 currencies). The Fortress Compliance embedded-AML product,
              acquired through Tookitaki (April 2022), likely generates a compliance SaaS fee, but its revenue
              contribution is not separately disclosed. At April 2025 Series D, the annualized revenue run-rate was
              approximately $150 million per CEO Floris de Kort's direct public statement, making Thunes a $150 million
              ARR-equivalent payment infrastructure business. No historical revenue figures are public; the progression
              from a $3 billion payment volume run-rate at Series A (May 2019) to $50 billion-plus in cumulative
              transactions at Series C (July 2023) suggests significant volume growth, but those are volume figures, not
              revenue, and cumulative transactions are not interchangeable with annual GTV. Revenue attribution by
              product line, geography, corridor, or customer segment is not publicly disclosed.
