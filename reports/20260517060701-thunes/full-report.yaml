              Thunes' "revenue run-rate of $150M and positive EBITDA" disclosure (April 2025 Series D) is company-stated
              and unaudited. No audited financial statements for any fiscal year since the 2019 rebrand are publicly
              available. For a company planning significant US enterprise market expansion, this opacity is a structural
              diligence gap: large US financial institutions and enterprise SaaS buyers routinely require two to three
              years of audited financials before signing major infrastructure agreements. The $150M Series D was secured
