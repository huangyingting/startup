      - number: '5.4'
        title: Trust, Compliance, and Reliability
        blocks:
          - type: paragraph
            body: >-
              Thunes publicly confirms PCI DSS compliance and ISO 27001 certification as of May 2026, making it one of
              the few cross-border payment networks to hold both certifications simultaneously at stated scope. PCI DSS
              covers card-data handling including Pay-to-Cards and the Tilia card acceptance capability. ISO 27001
              covers the information security management system across Thunes' operating entities. Both certifications
              are self-reported on the Thunes homepage and compliance page; specific levels, certification bodies, and
              last audit dates were not found in publicly accessible documentation and should be verified in due
              diligence.

              The Fortress Compliance pillar embeds AML risk controls, KYC/KYB verification, and sanctions screening
              across all 50 licensed markets. The ML-driven Tookitaki AML engine, acquired in April 2022, underpins
              transaction monitoring. Regulatory authorisations span all major financial jurisdictions: Major Payment
              Institution under MAS (Singapore), Authorised Payment Institution under the FCA (UK), Payment Institution
              under ACPR (France) with EU extension, Money Service Business under FinCEN (USA) with Money Transmitter
              Licenses in all 50 US states, Money Services Business under FINTRAC (Canada), and Money Service Operator
              under Hong Kong Customs and Excise. Client funds are safeguarded in dedicated accounts at authorised
              credit institutions, fully segregated from Thunes' corporate funds. The DGN platform publicly reports
              99.99% platform uptime and a 98% quality of service success rate. No major regulatory enforcement actions
              or documented security breaches against Thunes were found in public records through the May 2026 runDate.
