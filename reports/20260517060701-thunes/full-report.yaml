  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Suite Overview
        blocks:
          - type: paragraph
            body: >-
              Thunes organises its commercial offering along two axes — Pay and Accept — both delivered through a single
              API gateway into the Direct Global Network. The Pay dimension spans five modules. Pay-to-Mobile-Wallets
              connects enterprise clients to 145 mobile wallet brands and 4 billion mobile and stablecoin wallet
              accounts worldwide, achieving 98% of transactions settled instantly. Pay-to-Banks provides access to 8
              billion bank accounts across 140 countries, including real-time payment systems in 60 countries, and is
              priced at up to ten times less than traditional correspondent-bank wires. Pay-to-Cards reaches 15
              billion-plus cards across Mastercard, Visa, and UnionPay with PCI-DSS-certified tokenization and 24/7
              availability. Pay-to-Stablecoin-Wallets supports USDC and USDT payouts to 140-plus countries, covering
              over 80% of stablecoin payout demand with near-instant, around-the-clock settlement. Business Payments
              provides local ACH access in 50-plus countries across 30-plus currencies and USD wire transfers to
              170-plus countries, positioning Thunes as a single-contract replacement for traditional correspondent
              banking relationships.

              The Accept dimension offers four complementary collection modules: Accept Mobile Wallets (145 brands,
              settlement in 36-plus currencies, with plugins for Magento and Mirakl), Accept Bank Payments (Open Banking
              and traditional bank transfers), Accept BNPL, and Accept Digital Vouchers. All products share the same
              three-pillar infrastructure beneath them. The June 2025 acquisition of Tilia added card acceptance
              capabilities — Visa, Mastercard, American Express, JCB, and UnionPay — and an additional 48 US state and
              territory payment licenses, creating a US market anchor and extending Thunes' payout product into card
              acceptance. Thunes targets eight industry verticals: Banks and Neobanks, Mobile Wallets, Payment Service
              Providers, Gig Economy Platforms, MTOs, Digital Asset Companies, E-commerce, and Payroll and EOR
              platforms. Representative enterprise Members include Uber, Deliveroo, Grab, WeChat, and global MTOs.
