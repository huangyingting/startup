      - number: '5.5'
        title: Roadmap and Technology Differentiation
        blocks:
          - type: paragraph
            body: >-
              Thunes' technology roadmap is anchored by three strategic vectors: stablecoin and digital-asset
              integration, US market expansion, and AI-enabled infrastructure. The Circle partnership (October 2024)
              introduced USDC settlements for DGN Members, enabling 24/7 real-time funding that reduces capital costs by
              removing correspondent-banking delays. The Mastercard Move collaboration (November 2025, Singapore Fintech
              Festival) extends stablecoin wallet payouts to 200-plus markets. The Ripple integration into SmartX
              Treasury (September 2025) adds blockchain-based liquidity pathways for digital-asset company Members. The
              Tilia acquisition (June 2025) adds card acceptance (Visa, Mastercard, Amex, JCB, UnionPay) and creates a
              US anchor via 48 state/territory licenses; US market expansion using the Series D capital is the primary
              near-term geographic growth lever, subject to finalisation of Tilia acquisition regulatory approvals.

              Thunes' primary technology differentiation is the DGN's direct-connection architecture — bypassing
              correspondent intermediaries to deliver 85% immediate settlement versus the 2-to-5-day correspondent
              chain. The combination of 50 regulatory licenses, 720 direct Member integrations, PCI DSS and ISO 27001
              certifications, and the SmartX Treasury FX engine is individually expensive to replicate and collectively
              creates a structurally defensible moat. Each regulatory license requires in-country capital adequacy
              maintenance, local compliance programme upkeep, and periodic regulatory examination — creating a
              years-long barrier to entry that software IP alone cannot replicate. The April 2025 Series D CEO statement
              cited AI and digital-asset ecosystem interoperability as forward investment priorities; however, no
              specific AI product releases had been publicly announced by the May 2026 runDate, leaving the AI roadmap
              as directional intent rather than delivered capability.
