      - number: '1.2'
        title: Founding History and Corporate Evolution
        blocks:
          - type: paragraph
            body: >
              Thunes traces its origins to TransferTo, a Singapore-based mobile payments company founded in 2005. In
              2016, TransferTo reorganized into two separate businesses: DT One (consumer mobile top-ups and rewards)
              and Thunes (B2B cross-border payments infrastructure). The Thunes brand launched publicly in February 2019
              when TransferTo formally rebranded both entities. During the 2019 announcement, Peter De Caluwe — then CEO
              of DT One and executive chairman of Thunes — described the split as an "important next step to capitalize
              on the growth opportunities in this rapidly changing market."

              The B2B cross-border payments focus emerged from the recognition in 2016 that fragmented, emerging- market
              payment ecosystems represented a far larger addressable market than consumer remittances. By the time of
              its $10M Series A in May 2019 (led by GGV Capital), Thunes had already reached $3 billion in annual
              payment volumes. Series B followed in September 2020 ($60M, led by Helios Investment Partners, with
              Checkout.com, GGV Capital, and Future Shape participating), growing coverage to 100+ countries. Series B
              reportedly closed in May 2021. Thunes subsequently made three acquisitions to expand capabilities:
              Limonetik (Paris-based online payment platform, 2021), Tookitaki (Singapore-based AML regtech, majority
              stake acquired April 2022), and Tilia (gaming and virtual currency platform, sub of Linden Lab, acquired
              June 2025). A first close of Series C at $60M was announced in June 2023; the round closed at $72M in July
              2023 (led by Marshall Wace, with Bessemer Venture Partners, 01Fintech, Visa, EDBI, and Endeavor Catalyst)
              at a $900M+ valuation. In 2023, Thunes also obtained an ACPR Payment Institution Licence in France. The
              April 2025 Series D at $150M (Apis Partners and Vitruvian Partners) marks the most recent financing
              milestone.
