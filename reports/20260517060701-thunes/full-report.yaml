  - id: TV005
    title: Thesis-break and trigger monitoring table
    description: >-
      Specific conditions that would break the Thunes Track recommendation — with monitoring indicators, thresholds, and
      action implications.
    claimRefs:
      - CV027
      - CV028
      - CV029
      - CV030
      - CV031
    columns:
      - Trigger
      - Monitoring Indicator
      - Threshold / Event
      - Probability of Occurrence
      - Action Implication
    rows:
      - - Revenue decline from $150M run-rate
        - Audited financials; data-room disclosure; any public filing
        - Verified revenue below $130M in FY2025 (YoY decline)
        - Low (EBITDA positive suggests stable revenue base)
        - Exit/reject position; core thesis broken
      - - Major customer churn (Uber, Grab, WeChat)
        - Press announcements; competitor wins; volume data in any filing
        - Public announcement of departure by top-3 volume customer
        - Low-medium (partnerships are active; not exclusive)
        - Immediate review; significant thesis impairment
      - - Regulatory action (MAS or FCA)
        - MAS/FCA public registers; regulatory announcements
        - License suspended, restricted, or revoked
        - Very low (no current signal; EBITDA positive reduces financial risk)
        - Immediate exit; existential threat to network
      - - Forced down-round below $1.0B
        - Series E or bridge financing announcement with disclosed valuation
        - Post-money below $1.0B post-Series D estimated range
        - Low (EBITDA positive reduces capital urgency)
        - Review; capital loss scenario confirmed
      - - CEO Floris de Kort departs
        - Public executive announcements; LinkedIn / company communications
        - CEO resignation, replacement, or forced departure announcement
        - Low (recently appointed; led through Series D)
        - Signal event; immediate review; likely reduce conviction
    notes: >-
      Trigger probabilities are judgmental and based on publicly available information as of May 2026. The most
      consequential near-term risk is major customer churn, as Thunes' network value is highly dependent on volume
      concentration from enterprise platform customers. Regulatory action is the most severe but least likely trigger.
  - id: TV006
    title: Final diligence asks table
    description: >-
      Most critical pre-investment diligence items for Thunes — what is needed and why, given the current information
      gap.
    claimRefs:
      - CV028
      - CV029
      - CV030
      - CV031
      - CV032
    columns:
      - Diligence Ask
      - Why It Matters
      - Data Source
      - Blocking?
    rows:
      - - Audited revenue and EBITDA for FY2023 and FY2024
        - Run-rate $150M is unverified; EBITDA positivity is unaudited; both are core to valuation
        - Management data room; independent auditor report
        - Yes — without audited financials, all valuation estimates are speculative
      - - Series D post-money valuation and preference stack
        - Unknown post-money prevents verification of entry multiple; preference overhang affects return scenarios
        - Management disclosure; cap table document in data room
        - Yes — valuation opacity is the single largest investment risk
      - - Top-10 customer concentration and net revenue retention (NRR)
        - Revenue quality; churn risk; understanding of whether Uber/Grab/WeChat are growing or stable
        - Finance data room; revenue operations report
        - Yes — customer concentration risk is unquantifiable without this
      - - FCA and MAS license status confirmation
        - Confirms clean regulatory position; no pending actions, restrictions, or enhanced supervision
        - FCA Financial Services Register; MAS register; regulatory counsel
        - Important — confirms no undisclosed compliance risk
      - - Geographic revenue concentration (corridor breakdown)
        - High-margin corridors vs. pass-through; understand where revenue is actually generated
        - Management accounts; CFO disclosure
        - Important — needed to assess revenue quality and competitive resilience
      - - CEO and leadership equity and vesting structure
        - Management alignment; tenure risk; understanding of incentive horizon for Floris de Kort and Chloé Mayenobe
        - Data room; employment agreements summary
        - Important — alignment affects execution quality through to liquidity event
    notes: >-
      Items marked "Yes" for blocking should be resolved before making any investment commitment. The Track
      recommendation converts to a potential Buy/Hold recommendation only if audited financials confirm the valuation
      assumptions and no adverse cap-table or regulatory findings emerge from data-room access.
