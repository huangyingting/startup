              Thunes' absence from public developer communities (zero Stack Overflow questions, no public GitHub
              organisation, no publicly accessible status page) and the lack of disclosed contractual API uptime SLAs
              are material friction points in enterprise procurement cycles. Enterprise payment buyers typically require
              published uptime commitments in Master Service Agreements, historical incident logs, and sandbox access
              before production deployment. While Thunes publicly reports 99.99% platform uptime and 98%
