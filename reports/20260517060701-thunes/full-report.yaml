      - number: '6.4'
        title: Retention and Durability
        blocks:
          - type: paragraph
            body: >-
              Thunes has not published net revenue retention (NRR), gross revenue retention (GRR), annual client churn
              rate, or cohort-level data for any segment. These are the most critical indicators of Thunes' business
              quality — they determine whether revenue growth is driven primarily by expanding the existing network or
              by continually replacing churned members. Without NRR, it is structurally impossible to distinguish
              between compounding growth (NRR > 100%) and a churn-replacement treadmill (NRR < 100%). Structural factors
              strongly support high retention: API integration into Thunes' DGN is a multi-month investment requiring
              KYB completion, technical API integration, compliance workflow embedding, and corridor-specific testing —
              creating high switching costs. Once a client is live in production, migrating to a different provider
              means re-negotiating corridor-specific banking relationships, re-integrating compliance tooling, and
              accepting service disruption risk.

              B2B payment infrastructure providers with similar market positions — Adyen, Worldpay (before FIS
              acquisition), Currencycloud (before Visa acquisition) — historically report NRR above 100% due to volume
              expansion within existing clients rather than price increases. Thunes' revenue run-rate of $150M and
              positive EBITDA (April 2025) are consistent with a stable or growing client base rather than significant
              churn. The Morocco corridor expansion (September 2025) and Ecobank rollout represent new client value
              creation — existing members who needed Morocco or Africa corridors can now serve those destinations
              without switching providers, which is a form of implicit retention incentive.

              No G2, Gartner Peer Insights, or other independent client review platform data was accessible during this
              research cycle. Trustpilot did not return results for thunes.com. The absence of a public review footprint
              is consistent with a B2B-only client model where enterprise clients do not typically leave public platform
              reviews but does prevent independent satisfaction verification.
            claimRefs:
