chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Thunes is a private, Singapore-headquartered B2B financial infrastructure company providing cross-border
              payment and collection services to banks, neobanks, mobile wallet operators, payment service providers,
              money transfer operators, gig economy platforms, and e-commerce businesses. The company's flagship product
              is the Direct Global Network (DGN), a proprietary single-API integration connecting members to 130+
              countries, 80+ currencies, over 550 direct payment-provider integrations, 7 billion+ mobile wallets and
              bank accounts, and 15 billion cards across 320+ payment methods. Key brand names within the DGN include
              GCash, M-Pesa, Airtel, MTN, Orange, JazzCash, Easypaisa, AliPay, and WeChat Pay. The DGN differentiates
              through its in-house SmartX Treasury System (liquidity management) and Fortress Compliance Platform
              (AML/KYC/sanctions screening).

              Thunes operates on a transaction-fee model: charging a fixed amount between two cents and $2 per
              transaction depending on destination country, plus a small markup over mid-market FX rates for currency
              conversions. This low-margin, high-volume model is consistent with cross-border payments infrastructure.
              Thunes' stated mission is "To connect every corner of the world, and make the global economy accessible to
              all," with the tagline "The Smart Superhighway to move money around the world." The company operates from
              its Singapore headquarters and 13 additional locations including Barcelona, Beijing, Dubai, Hong Kong,
              Johannesburg, London, Manila, Nairobi, Paris, Riyadh, San Francisco, and Shanghai. As of April 2025
              (Series D announcement), Thunes reported a revenue run-rate of $150M and positive EBITDA. Named customers
              include Uber, Deliveroo, Grab, WeChat, Western Union, MoneyGram, PayPal (via Hyperwallet), and Remitly.
