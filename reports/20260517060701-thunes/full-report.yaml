      - number: '8.2'
        title: Valuation Context and Comparable Analysis
        blocks:
          - type: paragraph
            body: >-
              Thunes' Series D post-money valuation is not publicly disclosed. The CEO's statement of a "substantial
              valuation increase" over the Series C ($900M+) implies at minimum a post-money above approximately $1.0B.
              Using comparable private company funding dynamics and the $150M raise size as a signal of investor
              appetite, a base-case range of $1.4B–$1.8B is supportable. At $150M annualised revenue run-rate (stated at
              Series D close, April 2025), this implies an EV/Revenue multiple of 9–12x — a significant premium to
              public comparables but consistent with pre-IPO private market pricing for an EBITDA-positive, growing B2B
              payments infrastructure business in a 2025 fundraising environment.

              Public B2B cross-border payments comparables trade at compressed multiples reflecting post-2022 fintech
              re-rating, profitability requirements, and scale. dLocal (DLO) trades at approximately 3–4.5x revenue;
              Payoneer (PAYO) at 2.5–3.5x on GAAP profitability; Remitly (RELY), while consumer-focused, at 2–3x;
              Western Union (WU) at sub-1x revenue reflecting secular decline. Wise (WISE.L) trades at 5–7x on the LSE —
              the highest public multiple in the peer group, justified by strong profit margins and growth. Private
              comparables are more supportive: Nium was last valued at $1.4B on ~$124M annualised revenue (~11x) in June
              2024 (down-round from $2.1B), while Airwallex was valued at approximately $5.6B on ~$300M+ ARR (~18x) —
              reflecting different investor risk appetite and growth profiles. The Currencycloud acquisition by Visa in
              2021 for ~$925M represents a strategic M&A precedent for B2B cross-border infrastructure.

              Thunes' EBITDA positivity — rare among its private B2B payments peers — should support a valuation premium
              over loss-making comparables. However, without audited revenue, EBITDA margin, customer concentration, or
              net revenue retention data, the applicable multiple cannot be verified. The base-case estimated range of
              $1.4B–$1.8B represents a reasonable midpoint between the conservative public-market comps (which would
              imply $750M–$1.35B at 5–9x revenue) and the optimistic private-market precedents (Airwallex at 18x).
              Investors should treat this range as an informed estimate requiring data-room verification.
            claimRefs:
