      - number: '2.3'
        title: Buyer and Segment Landscape
        blocks:
          - type: paragraph
            body: >-
              Thunes' buyer landscape segments into five primary categories differentiated by technical requirements,
              payment volumes, and adoption triggers. Payment Service Providers (PSPs) and digital wallet operators
              represent the highest-volume, highest-frequency segment: they embed Thunes' DGN as the back-end payout
              rail for their own client base, paying on a per-transaction basis and requiring breadth (number of
              corridors) over depth. Banks and NBFIs are the second segment, now accessible via Thunes' SWIFT
              connectivity (launched October 2025), allowing existing SWIFT members to route to Thunes' DGN without
              additional integration — a significant distribution accelerant. Multinational Corporations (MNCs)
              represent the highest-ticket buyers, using Thunes for supplier payments, international payroll, and
              treasury management across multiple jurisdictions.

              Telecom operators and fintech platforms form a fourth segment — exemplified by the GCash partnership
              (Philippines), where approximately 2 million Filipinos in Europe sent $3.8 billion to the Philippines in
              2024, with Thunes enabling real-time digital wallet top-ups. E-commerce and gig-economy platforms round
              out the buyer map: Thunes' acquisition of Tilia extends DGN reach into gaming and virtual economy payouts.
              Large enterprises hold 60.31% of overall B2B payments revenue share, per Mordor Intelligence, but SMEs are
              the fastest-growing segment at 16.23% CAGR — signaling a longer-term market expansion opportunity for
              simplified cross-border payment APIs. BFSI is the largest industry vertical at 25.18% of B2B payments
              demand. A survey cited by Thunes' own research found 65 percent of expatriates prioritize speed as the
