  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The global B2B cross-border payments infrastructure market serves a fragmented set of customer segments —
              fintechs, money-transfer operators, neobanks, e-commerce platforms, payroll providers, and gig-economy
              companies — through a range of competing models. No single operator dominates across all geographies,
              payment methods, and enterprise use cases. Thunes positions itself as the agnostic "Smart Superhighway"
              connecting all payment endpoints through a single API: the Direct Global Network (DGN) spanning 140
              countries, 90 currencies, 220 payment methods, 720 network members, and 85% immediate settlement as of May
              2026.

              The competitive universe divides into five categories. Direct B2B network operators (Nium, TerraPay,
              Currencycloud/Visa, dLocal, PPRO, Banking Circle) compete for the same API-first enterprise buyer,
              differing in geographic focus and product breadth. Embedded-finance platform players (Airwallex, Wise
              Platform, Stripe, Rapyd) approach from a multi-product SaaS angle rather than pure network infrastructure.
              Network giants (Visa Direct, Mastercard Cross-Border Services, SWIFT gpi) function as both infrastructure
              layer and occasional competitor, leveraging scale and scheme relationships. Emerging stablecoin rails
              (Circle USDC, Ripple Payments, Stellar) represent a structural alternative that could bypass fiat corridor
              economics over a 3–5 year horizon. Money-transfer operators (Western Union, MoneyGram, Remitly) are
              simultaneously Thunes customers and corridor competitors who continue to digitize their own rails.

              Thunes' $150M Series D at an undisclosed but significantly higher valuation than its $900M+ Series C
              (2023), combined with a $150M revenue run-rate and EBITDA-positive status, positions it as a credible
              mid-scale alternative to larger infrastructure players. The company's agnostic model — it serves Visa,
              Mastercard, and SWIFT as partners while also competing indirectly with them — creates both partnership
              leverage and strategic tension that rivals operating within a single scheme ecosystem do not face.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              Nium is the most direct B2B infrastructure competitor to Thunes. Nium's platform covers 190+ countries
              with 40+ regulatory licenses, targeting the same enterprise fintech and financial institution buyer. Its
              card issuance BaaS product (Nium Embed, 34+ countries) is a capability Thunes does not publicly emphasize,
              representing a product-mix gap. Nium's 100+ real-time payment corridors and API-first model (Transact,
              Receive, Embed) overlap with Thunes' DGN most directly in APAC, where both have strong local network
              access. Nium is loss-making (SGD 88M net loss FY2024) and targeting a 2026 IPO, creating different
              capital-market pressures than Thunes' EBITDA-positive position.

              TerraPay operates a mobile-first global payment network with 31 regulatory approvals, emphasizing
              compliance as a core differentiator. Its founding story — first payment of $13 from Dubai to Tanzania —
              signals an emerging-market DNA similar to Thunes, and its network includes mobile wallet integrations
              across Africa and APAC. However, TerraPay lacks Thunes' scale and breadth of stablecoin and card
              connectivity.

              Airwallex has built a multi-product financial platform processing $235B+ annually across 120+ countries
              for local transfers and 70+ countries for fund collection. It achieves 93% same-day and 50% instant
              settlement, positioning it as a credible infrastructure alternative for high-volume clients. Airwallex's
              multi-product model (global accounts, expense management, card issuance, cross-border payments) gives it
              breadth Thunes lacks; however, Airwallex's EM mobile wallet reach is substantially narrower than Thunes' 4
              billion mobile and stablecoin wallet endpoints.

              Wise Platform offers £181BN+ in FX volumes through 80 licenses globally, reaching 160+ countries with 40+
              currencies. Its bank-grade KYC and onboarding APIs are offered to financial institution partners, making
              it a competitor in the B2B infrastructure layer. Wise's transparency ethos and profitable public company
              status (LSE-listed) provide credibility advantages Thunes does not yet hold, but Wise Platform does not
              match Thunes' EM mobile wallet depth.

              Currencycloud (Visa) processed $75B+ in payments across 180+ countries before disclosure figures were
              obscured post-Visa integration, and operates an API-first embedded payments platform for banks and
              fintechs. Visa's ownership creates both a distribution advantage (Visa scheme relationships) and a
              strategic constraint (non-Visa scheme clients may prefer agnostic providers).

              Ripple Payments provides a stablecoin-and-fiat cross-border payment platform with 75+ US money transmitter
              licenses, MAS Singapore, and DFSA UAE authorization. Its positioning explicitly challenges traditional
              fiat B2B rails, arguing that stablecoin settlement eliminates pre-funding requirements and reduces costs.
              Circle operates USDC-based cross-border payments, licensed in New York by both NYDFS and DFS. Both
              represent structural competitors to Thunes' fiat DGN economics if stablecoin adoption accelerates in EM
              corridors. Thunes has mitigated this risk partly through its Mastercard stablecoin payout partnership
              (November 2025), Circle USDC integration (October 2024), and Ripple partnership (September 2025),
              effectively making stablecoin providers network members rather than purely adversarial competitors.

              Western Union and MoneyGram are incumbent MTOs that process massive retail cross-border volumes and are
              simultaneously Thunes' customers and corridor-access competitors. Both are digitizing aggressively.
              Remitly, which uses Thunes infrastructure for some corridors, also creates a dual customer-competitor
              dynamic in B2B pay-in/pay-out markets.
