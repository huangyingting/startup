            body: >-
              The EBA's 12 February 2026 opinion ending the No-Action Letter transition period for PSD2/MiCA interplay
              on 2 March 2026 is Thunes' most time-sensitive regulatory risk. Thunes' EU stablecoin settlement
              capability — launched October 2024 via Circle/USDC and expanded with Mastercard in November 2025 — depends
