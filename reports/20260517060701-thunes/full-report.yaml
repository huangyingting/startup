  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >-
              The B2B cross-border payments market encompasses all financial transactions in which a business transfers
              value to another business, counterparty, supplier, employee, or contractor across a national border and
              typically across currencies. This includes cross-border supplier payments, international payroll and
              contractor disbursements, inter-company treasury transfers, marketplace seller payouts, remittances to
              mobile wallets and bank accounts, and payout infrastructure for gig-economy and digital commerce
              platforms. The market is distinct from consumer-to-consumer remittances (a separate sub-market estimated
              at $830 billion-plus in 2024 by the World Bank) and from domestic B2B payments within single
              jurisdictions.

              Thunes defines its serviceable market as cross-border payment flows enabled through its Direct Global
              Network (DGN), which provides direct — not correspondent — connections to payment endpoints in 130-plus
              countries. The structural problem Thunes addresses is well-documented: traditional cross-border payments
              pass through three to five intermediary banks before settlement, each adding latency of one to five
              business days and fees of one to five percent of transaction value. SWIFT, which connects 11,000-plus
              financial institutions globally, is the dominant incumbent messaging network but requires correspondent
              intermediaries and is actively investing in its own transformation program. Mastercard Move covers
              200-plus markets and reaches 95 percent of the banked adult population via card networks, representing an
              alternative substitut in card-based B2B flows. Excluded from Thunes' primary TAM definition are: consumer
              P2P remittances, domestic payments within single jurisdictions, and securities settlement.
            claimRefs:
