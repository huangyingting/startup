    rows:
      - - Global B2B cross-border payments (primary TAM)
        - >-
          International supplier payments, cross-border payroll, contractor disbursements, inter-company treasury
          transfers, marketplace seller payouts
        - Domestic single-jurisdiction B2B payments, consumer P2P remittances, securities settlement
        - CFOs, treasury teams, AP/AR departments, PSP operators, fintech platforms
        - 'Thunes'' DGN core: 130+ countries, direct rails replacing 3-5 correspondent hop chains'
      - - Digital wallet and mobile money payouts (high-growth)
        - Mobile wallet top-ups, digital money transfers to mobile accounts, telco-operator payout flows
        - Mobile banking services (deposit-taking), consumer credit products
        - Telco operators, digital wallet platforms, super-apps (GCash, bKash, M-Pesa type)
        - 320+ payment methods on DGN; 7B+ mobile wallet/bank account endpoints; key Thunes focus
      - - Card-based B2B payouts (adjacency via Visa/Mastercard)
        - Push payments to Visa/Mastercard debit accounts, virtual card B2B settlement, card-based contractor payouts
        - Consumer credit-card issuing, card-in-store payments
        - Gig platforms, marketplace operators, corporate spend management teams
        - Thunes-Visa Direct integration (Oct 2022) + Mastercard stablecoin payouts (Nov 2025); 15B+ card endpoints
      - - Real-time payment rail interoperability (structural enabler)
        - Instant domestic rail on-ramps (FedNow, UPI, SEPA Instant) linked to cross-border settlement
        - Isolated domestic instant payments without cross-border leg
        - Banks, fintechs, PSPs requiring real-time cross-border settlement
        - DGN enables direct connection to 550+ domestic real-time payment operators; supports ISO 20022
      - - Consumer remittances (adjacent, excluded from DGN SAM)
        - Retail P2P money transfer, migrant remittances
