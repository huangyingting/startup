      - number: '1.4'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Thunes has raised approximately $292M across four disclosed institutional rounds, having received no
              external funding prior to its 2019 Series A (it was previously financed by TransferTo, a profitable
              business). The Series A ($10M, May 2019, GGV Capital lead) was Thunes' first outside capital raise. The
              Series B ($60M, September 2020 announcement / May 2021 close, Helios Investment Partners lead) brought
              total raises to $70M and catalyzed Africa and Asia expansion. The Series C ($60M first close June 2023;
              total $72M July 2023, Marshall Wace lead) established a $900M+ valuation and added Bessemer Venture
              Partners, 01Fintech, Visa (strategic reinvestment), EDBI, and Endeavor Catalyst. The April 2025 Series D
              ($150M, Apis Partners and Vitruvian Partners lead) is the company's largest round, and de Kort stated it
              represents a "substantial valuation increase" over the Series C without disclosing the specific figure.

              Cumulative investors include Apis Partners, Vitruvian Partners, Marshall Wace, Bessemer Venture Partners,
              Helios Investment Partners, Checkout.com, GGV Capital, Future Shape (Tony Fadell's firm), 01Fintech, Visa
              (strategic), EDBI (Singapore EDB's venture arm), and Endeavor Catalyst. Total disclosed raised is
              approximately $292M (10 + 60 + 72 + 150 = $292M), though some sources place cumulative capital higher when
              including any undisclosed Series B tranches. Thunes remains private; no IPO timeline has been publicly
              stated (unlike Nium, which has discussed public listings).
