      - number: '7.5'
        title: Mitigations and Kill Criteria
        blocks:
          - type: paragraph
            body: >-
              Thunes' primary structural mitigations are: (1) multi-jurisdiction licensing (MAS MPI, FCA API, ACPR PI,
              HK MSO, 50 US MTLs) creating geographic redundancy — revocation in one jurisdiction does not disable the
              global network; (2) positive EBITDA position reducing capital-at-risk relative to loss-making peers; (3)
              in-house Fortress Compliance Platform (Tookitaki-derived) providing AML/CFT screening less susceptible to
              regulatory challenge than externally sourced solutions; (4) SWIFT connectivity reducing the dependency on
              direct bank integration for institutional members; and (5) the $150M Series D (April 2025) providing
              capital runway estimated sufficient for US market expansion, even under conservative revenue growth
              assumptions.

              Key monitoring indicators for risk escalation include: MAS and FCA license status in public registries; US
              MTL approval progress in NY, CA, and TX through NMLS Consumer Access; Circle and Ripple regulatory status
              under MiCA and post-SEC-settlement US frameworks; quarterly revenue cadence against the $150M run-rate
              baseline; and any announcement of CEO, Deputy Chairman, or CLO departure. Thunes' total capital raised
              ($292M-plus across 5 rounds) and demonstrated investor confidence (Apis Partners, Vitruvian Partners,
              Marshall Wace, Bessemer) provide a strong fallback capital-access signal.

              Thesis-break scenarios that would warrant urgent investment reconsideration include: MAS or FCA license
              suspension or revocation; US MTL regulatory approval denied in NY or CA blocking US market entry; EU MiCA
              enforcement action against Circle suspending USDC settlement in EU corridors; revenue growth stalling
              below 10% YoY without a disclosed path to profitability improvement; CEO Floris de Kort departure within
              24 months of appointment; or Tilia integration resulting in a material impairment charge or write-down
              that signals M&A execution risk across Thunes' prior acquisitions. No currently known facts suggest
              imminent probability of any of these scenarios.
