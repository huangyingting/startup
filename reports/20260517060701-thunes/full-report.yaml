      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              The cross-border B2B payment infrastructure market faces a strong confluence of structural tailwinds.
              Real-time payment rail expansion is the most significant: FedNow exceeded 900 participating U.S. financial
              institutions by late 2025; SEPA Instant processed 14.5 billion transactions in 2024, a 54% YoY increase;
              India UPI processed 13.4 billion monthly transactions by December 2025. Each of these domestic real-time
              rails creates demand for cross-border interoperability, since end users and corporates increasingly expect
              instant settlement internationally when they already receive it domestically. ISO 20022 adoption —
              reaching most global systems by 2025 — standardizes structured remittance data and reduces reconciliation
              friction, materially improving the business case for direct API-based cross-border rails. The EU's
              mandatory e-VAT compliance program (effective 2028, scope: 10 million-plus EU businesses) will require
              structured, digitally reported cross-border payment data, further driving enterprise demand for
              API-integrated B2B payment infrastructure.

              Key adoption constraints include: first, incumbents competing directly — SWIFT's multi-year transformation
              program ("fundamentally transforming international payments") and Mastercard Move's 200-plus market reach
              represent established networks with deep institutional relationships that are hard to displace. Second,
              correspondent banking entrenchment: AML/KYC fragmentation across jurisdictions means that even as Thunes
              builds direct integrations, regulatory approvals and compliance checks require sustained investment in
              each market. Third, regulatory capital requirements: obtaining and maintaining payment licenses in
              130-plus countries creates a structural barrier to entry but also a capital intensity challenge for Thunes
              itself. The stablecoin and CBDC trajectory presents a mixed signal — stablecoin partnerships with Circle
              (USDC) and Mastercard position Thunes to participate in digital asset settlement, but broad CBDC adoption
              could eventually displace private payment infrastructure if central banks build their own cross-border
              rails.
