      - - Airwallex
        - Embedded finance platform (multi-product)
        - ~$5.6B valuation (reported); $235B+ annual payment volume; 120+ countries local transfers
        - >-
          SMB and enterprise fintechs needing global accounts, card issuance, cross-border payments, and expense
          management
        - >-
          Multi-product breadth (global accounts + cards + FX + expense); 93% same-day settlement; strong API
          documentation
        - Narrower EM mobile wallet depth; not infrastructure-primary; developer-SaaS positioning limits MTO use cases
      - - Wise Platform
        - Embedded finance / B2B API infrastructure
        - LSE-listed (WISE); £181BN+ annual FX volumes; 80 regulatory licenses globally
        - Banks, financial institutions, and enterprises needing transparent cross-border payment APIs
        - Mid-market FX rate transparency; 80 licenses; 75% of payments under 20 seconds; 160+ countries
        - B2C-heritage; no mobile wallet operator network comparable to Thunes'; DGN wallet breadth unmatched
      - - Rapyd
        - Embedded finance platform
        - Private; raised $610M+ total; global embedded fintech (cards, wallets, payouts)
        - Platforms and enterprises needing embedded payment acceptance, card issuance, and stablecoin settlement
        - Stablecoin integration; card issuing + wallet + BNPL on a single API; strong LatAm/APAC coverage
        - Less EM mobile wallet operator depth; smaller network scale than Thunes or Airwallex
      - - Stripe
        - Adjacent (developer platform)
        - $65B valuation (2023); $1T+ annual payment volume (all products)
        - Digital-native companies in US and EU; developer-first embedded finance
        - Industry-leading developer experience and API documentation; global payment acceptance breadth
        - Cross-border payout infrastructure limited vs. Thunes in EM; no MTO-grade mobile wallet network
      - - Visa Direct
        - Network giant (scheme-based push payments)
        - 'Visa Inc. NYSE: V; >$12T annual payments volume globally (all Visa)'
        - Financial institutions, fintechs, and enterprises needing real-time push payments on Visa rails
        - Billions of Visa-linked endpoints globally; real-time push payments to cards and accounts
        - Card/account-centric; limited mobile wallet reach vs. Thunes' 145 mobile wallet brand network
      - - Mastercard Cross-Border Services
