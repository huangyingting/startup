  - id: market-sizing
    title: Market Sizing — TAM, SAM, and SOM
    body: >-
      Multiple independent analysts have sized the B2B and cross-border payments opportunity using materially
      different methodologies, producing a wide but directionally consistent picture of strong growth. Mordor
      Intelligence (updated January 2026) measures the total global B2B payments market — including domestic
      flows, all payment instruments, and all geographies — at $1.42 trillion in 2025, growing to $3.43 trillion
      by 2031 at a 15.48% CAGR. The cross-border sub-segment specifically grows at 16.52% CAGR, and digital
      payment rails grow at 17.31% CAGR, both outpacing the total market.

      Allied Market Research independently sizes the cross-border payments market (including B2B, B2C, and C2C)
      at $206.5 billion in revenue in 2024, growing to $414.6 billion by 2034 at a 7.1% CAGR, with B2B the
      largest transaction-type segment. Ripple, as a competitor using its own proprietary estimates, sizes B2B
      cross-border transaction volume at $31.6 trillion today, projecting growth to $50 trillion-plus by 2032.
      Thunes internally frames its opportunity as a $150 trillion total market — the broadest possible framing
      covering all global cross-border payment flows.

      Applied to Thunes: the TAM is the total B2B cross-border revenue pool (approximately $206.5 billion in
      2024 per Allied Market Research); the SAM is the share reachable within Thunes' 130-country DGN footprint
      — estimated at roughly 12–15 percent of the global revenue pool given DGN corridor coverage; and the SOM
      is evidenced by Thunes' $150 million annualized revenue run-rate on positive EBITDA as of April 2025,
      representing a fraction of one percent of the revenue TAM. North America holds 34.27% of the total B2B
      payments market; APAC is the fastest-growing region at 17.42% CAGR; and LAMEA is identified as the
      fastest-growing region in cross-border payments specifically — directly aligned with Thunes' emerging-market
      corridor strategy. The 2024 McKinsey Global Payments Report estimates total global payment revenues
      reached $2.4 trillion in 2023, with cross-border flows generating the highest per-transaction margins.
