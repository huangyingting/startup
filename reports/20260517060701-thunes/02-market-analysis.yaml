  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "Thunes' $150T market opportunity calculation methodology"
      missingEvidence: >-
        Thunes cites a $150 trillion total market opportunity in its Series D press materials but does not
        disclose the calculation methodology. Independent analyst revenue estimates range from $206.5 billion
        (Allied Market Research, cross-border revenue basis) to $2.4 trillion (McKinsey, all payments) — a
        spread of more than 700x from Thunes' figure. It is not possible from public sources to verify which
        flows are included in the $150T figure, how transaction volume is converted to revenue opportunity,
        or which geographic boundaries apply.
      whyItMatters: >-
        If Thunes or investors use the $150T figure as the primary TAM in valuation models, the implied
        take rate at $150M revenue ($0.000001 of TAM) is analytically meaningless and understates the
        competitive intensity of the actual cross-border revenue market. The investable TAM is $206.5B
        (Allied Market Research), at which Thunes has a 0.07% share — a more relevant baseline for
        growth projections.
      diligencePath: >-
        Request Thunes' CFO or investor relations team to provide the specific methodology underlying the
        $150T figure, including: included flow types (B2B only vs. all), geographic scope, data source
        (BIS, SWIFT, World Bank, proprietary), and year. Cross-reference against BIS CPMI cross-border
        payment statistics and Allied Market Research for independent validation.
      relatedQuestionRefs:
        - QM025

    - type: missing-source
      severity: moderate
      topic: "Per-country regulatory capital requirements constraining Thunes' DGN expansion"
      missingEvidence: >-
        No public source quantifies the specific regulatory capital requirements, licensing fees, or compliance
        timelines Thunes faces in each of its 130-plus country markets. It is unknown whether specific emerging
        markets (e.g., Nigeria, Pakistan, Indonesia) have capital requirements or regulatory barriers that
        slow Thunes' corridor activation, or what share of the DGN's $150M revenue is concentrated in
        a subset of high-volume corridors versus distributed across 130 countries.
      whyItMatters: >-
        Corridor economics determine whether Thunes' 130-country network generates genuine distributed
        revenue or whether a small subset of corridors (e.g., UAE, Philippines, India, Bangladesh) accounts
        for the majority of volume. Regulatory barriers in expansion markets may be a binding constraint
        on growth that is not visible from external data.
      diligencePath: >-
        Review Thunes' regulatory filings in Singapore (MAS), UK (FCA), and EU (ECB-supervised entities).
        Request corridor-level revenue concentration data from management. Commission analysis of payment
        license requirements in the top-10 emerging market corridors Thunes is targeting.
      relatedQuestionRefs:
        - QM026

    - type: missing-source
      severity: moderate
      topic: "Scenario analysis: SWIFT modernization, SME acceleration, and CBDC risk impact on Thunes"
      missingEvidence: >-
        No public research quantifies how SWIFT gpi / ISO 20022 modernization affects Thunes' DGN competitive
        advantage in specific corridors, nor how Thunes' revenue trajectory would change if SME cross-border
        volumes grew at 25%-plus CAGR versus the base-case 16.23%. Similarly, no credible public analysis
        models the probability or timeline for CBDC-based cross-border rail adoption displacing private
        payment infrastructure operators, nor Thunes' specific exposure profile.
      whyItMatters: >-
        If SWIFT successfully modernizes correspondent banking (faster settlement, richer ISO 20022 data,
        lower fees), Thunes' DGN value proposition narrows to corridors where SWIFT has weak coverage.
        If CBDC cross-border rails are deployed by G20 central banks within a decade, Thunes' 130-country
        direct-integration asset base could become a liability (stranded compliance investment). These
        are material downside scenarios with no public quantification.
      diligencePath: >-
        Commission independent scenario analysis from BIS or Aite-Novarica comparing SWIFT gpi fee trajectory
        vs. DGN-class network costs by corridor type. Review BIS CPMI work on CBDC cross-border interoperability
        (Project Nexus, mCBDC Bridge) to assess displacement timeline. Model SME TAM upside using World Bank
        SME finance data cross-referenced with Mordor Intelligence CAGR assumptions.
      relatedQuestionRefs:
        - QM021
        - QM022
        - QM023

