  - id: market-outlook-and-positioning
    title: Market Outlook and Thunes' Positioning
    body: >-
      Thunes enters the 2026 period as one of the few cross-border B2B payment infrastructure companies with
      operationally verified scale — $150 million in annualized revenue, positive EBITDA, a $1.9 billion
      valuation, and a Series D led by APIS Partners and Vitruvian Partners (April 2025). The company has moved
      from a pure-play emerging-market payout provider toward a multi-product cross-border infrastructure layer
      by executing a deliberate expansion strategy: SWIFT connectivity (October 2025) targets bank clients who
      cannot re-engineer their technology stack; Ripple Payments integration (September 2025) opens the
      blockchain-native fintech segment; Circle USDC settlement (October 2024) reduces DGN member liquidity
      requirements; and Mastercard stablecoin payouts (November 2025) extend reach to the 15 billion-plus
      Mastercard/Visa card endpoints already on the network.

      The trajectory of growth from Series B (2021, 100% YoY growth) through Series C ($72 million at $900
      million valuation in July 2023) to Series D illustrates consistent investor confidence and operational
      progression. Thunes' geographic expansion into Morocco in September 2025 and its GCash-Europe-Philippines
      corridor reflects a deliberate focus on high-remittance corridors underserved by incumbent infrastructure.
      The company's $150 million revenue run-rate represents approximately 0.07 percent of the $206.5 billion
      cross-border payments revenue TAM — suggesting substantial room to grow even at current take rates. The
      principal market risk is not demand (which is structurally strong at 15–17% CAGR across all analyst
      estimates) but competitive intensity: Visa, Mastercard, SWIFT, and bank consortia are all investing in
      precisely the same cross-border payment infrastructure modernization that Thunes is building.
    claimRefs:
      - CM032
      - CM033
      - CM034
      - CM035
