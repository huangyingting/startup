chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Cross-border B2B payments represent one of the most structurally inefficient segments in global finance, and
    the growth opportunity is enormous. Mordor Intelligence values the total B2B payments market at $1.42 trillion
    in 2025, growing to $3.43 trillion by 2031 at a 15.48% CAGR, with the cross-border sub-segment expanding at
    an even faster 16.52% CAGR and digital rails advancing at 17.31% CAGR. Allied Market Research independently
    sizes the cross-border payments market at $206.5 billion in 2024, projected to reach $414.6 billion by 2034
    at 7.1% CAGR. Thunes itself frames its opportunity as a $150 trillion market — the estimated total value of
    all cross-border payment flows annually — though this conflates transaction volume with addressable revenue.
    Traditional cross-border payments remain slow (1–5 business days), expensive (1–5% fees), and multi-hop
    (3–5 intermediaries per transaction), creating the exact structural pain Thunes' Direct Global Network (DGN)
    is built to solve. Thunes' DGN now spans 130-plus countries, 80-plus currencies, 550-plus direct integrations,
    and 7 billion-plus mobile wallets and bank accounts, positioning the company as a direct-integration
    alternative to legacy correspondent banking. With $150 million in annualized revenue and positive EBITDA as
    of April 2025, Thunes is the operationally mature infrastructure layer competing in a market where APAC
    leads growth at 17.42% CAGR, LAMEA represents the fastest-growing corridor region, and SMEs are accelerating
    at 16.23% CAGR. Regulatory tailwinds — ISO 20022 adoption, FedNow expansion to 900-plus institutions, SEPA
    Instant's 54% YoY volume growth — are structurally enlarging the market for cross-border payment
    infrastructure while incumbent players such as SWIFT and Mastercard Move are simultaneously competing for
    the same opportunity.

sections:
  - id: market-definition
    title: Market Definition and Scope
    body: >-
      The B2B cross-border payments market encompasses all financial transactions in which a business
      transfers value to another business, counterparty, supplier, employee, or contractor across a national
      border and typically across currencies. This includes cross-border supplier payments, international payroll
      and contractor disbursements, inter-company treasury transfers, marketplace seller payouts, remittances
      to mobile wallets and bank accounts, and payout infrastructure for gig-economy and digital commerce
      platforms. The market is distinct from consumer-to-consumer remittances (a separate sub-market estimated at
      $830 billion-plus in 2024 by the World Bank) and from domestic B2B payments within single jurisdictions.

      Thunes defines its serviceable market as cross-border payment flows enabled through its Direct Global Network
      (DGN), which provides direct — not correspondent — connections to payment endpoints in 130-plus countries.
      The structural problem Thunes addresses is well-documented: traditional cross-border payments pass through
      three to five intermediary banks before settlement, each adding latency of one to five business days and
      fees of one to five percent of transaction value. SWIFT, which connects 11,000-plus financial institutions
      globally, is the dominant incumbent messaging network but requires correspondent intermediaries and is
      actively investing in its own transformation program. Mastercard Move covers 200-plus markets and reaches
      95 percent of the banked adult population via card networks, representing an alternative substitut in
      card-based B2B flows. Excluded from Thunes' primary TAM definition are: consumer P2P remittances, domestic
      payments within single jurisdictions, and securities settlement.
