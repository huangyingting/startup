callouts:
  - calloutType: strength
    title: Richer Named-Customer Corpus Than Most Private-Stage B2B Payment Infrastructure Peers
    body: >-
      Thunes offers seven official case studies with named clients — GCash, nsave, PayQuicker,
      Flip, UNFCU, Pomelo, and Paydek — plus named network partnerships with Mastercard, Visa,
      PayPal Hyperwallet, Ripple, Circle, Ecobank, and Swift. The nsave case study is exceptional
      in providing quantified outcomes (4× volume, 50%+ faster processing), and the Mastercard
      Move partnership (Nov 2025) represents a tier-1 financial institution endorsement that
      few private cross-border payment infrastructure companies can match. TechCrunch independently
      confirmed Uber, MoneyGram, Remitly, and Western Union as active clients in 2022. This
      breadth of named proof across case studies, network partners, and independent press
      verification is a meaningful competitive differentiator versus less documented B2B peers.
    claimRefs:
      - CU007
      - CU009
      - CU015
      - CU022
      - CU027
      - CU032

  - calloutType: risk
    title: MTO Clients Are Simultaneously Thunes' Customers and Its Structural Competitors
    body: >-
      Remitly, Western Union, and Ria are explicitly named as Money Transfer Operator clients on
      Thunes' industry page, and TechCrunch confirmed MoneyGram and Western Union as Thunes
      clients in 2022. However, these same companies are Thunes' direct competitors in the
      consumer remittance market — and they have the engineering capability and financial incentive
      to build proprietary direct-settlement rails as they scale. Western Union's Evolve platform
      and Remitly's direct corridor development represent credible medium-term risks to Thunes'
      MTO revenue base. If the top three MTOs represent 30–40% of Thunes' revenue, a single
      client decision to reduce Thunes dependency could be highly material. Investors should
      request MTO revenue concentration data and ask whether any major MTO has indicated an
      intent to reduce its Thunes reliance.
    claimRefs:
      - CU005
      - CU022
      - CU026
      - CU033
      - CU037

  - calloutType: insight
    title: Net Revenue Retention Is the Most Important Undisclosed Metric
    body: >-
      For a B2B payment infrastructure business at Thunes' scale ($150M run-rate, 720 members),
      net revenue retention is the single metric most predictive of long-term business quality.
      If NRR is above 110%, Thunes can grow revenue at double-digit rates without adding a
      single new client, and the $150M run-rate is a compounding floor. If NRR is below 100%,
      the company needs continual new client acquisition to replace churned revenue, creating
      an S-curve plateau risk. Thunes has disclosed positive EBITDA and a $150M run-rate but
      has not published NRR — making growth quality impossible to assess from public data.
      Any investor or acquirer should make NRR disclosure a diligence precondition.
    claimRefs:
      - CU023
      - CU025
      - CU028
      - CU030

