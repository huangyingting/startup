figures:
  - id: FU001
    title: Thunes customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Thunes' enterprise customer journey from initial awareness through API integration,
      production go-live, and multi-product/multi-corridor expansion.
    claimRefs:
      - CU002
      - CU028
      - CU030
      - CU036
    data:
      items:
        - label: Awareness
          value: >-
            Discovery via fintech industry events (Money20/20, Sibos, Singapore Fintech Festival) |
            Network-effect referrals from existing members (Visa, Mastercard, PayPal partnerships
            drive downstream awareness) | Thunes direct sales outreach (SDR-led or enterprise AE) |
            Analyst coverage (TechCrunch, Finextra, PYMNTS) | Regulatory milestone announcements
            (50-state US MTL, SWIFT connectivity) triggering inbound from compliance-sensitive buyers
          note: >-
            Enterprise buyer journey starts with problem recognition — slow/opaque correspondent
            banking, no mobile wallet reach, compliance burden. Thunes awareness is event-driven
            and referral-amplified by tier-1 network partnerships.
        - label: Evaluation
          value: >-
            API documentation review (thunes.com/api-documentation) | Corridor coverage assessment
            vs competitors (Nium, Airwallex, TerraPay, Currencycloud) | Regulatory license review
            (50-market licenses, PCI DSS, ISO 27001 compliance) | Proof-of-concept discussion with
            Thunes solutions engineer | Reference checks with existing Network Members
          note: >-
            Buyers compare corridor depth in target markets, real-time settlement rates, compliance
            coverage, and pricing. Thunes' 85% real-time rate and 140-country coverage are primary
            differentiators vs correspondent-bank alternatives.
        - label: Commercial Onboarding
          value: >-
            Master Service Agreement (MSA) and DPA negotiation | KYB completion and AML/CFT
            regulatory sign-off | FX and fee structure agreement | SLA terms for settlement
            timing, corridor uptime, and incident escalation | Integration timeline planning
            with Thunes implementation team
          note: >-
            Commercial cycle varies by client type: 1–3 months for smaller fintechs; 3–9 months
            for mid-market; longer for tier-1 financial institutions (banks, large MTOs).
        - label: Technical Integration
          value: >-
            Single API integration via Thunes Money Transfer API | Webhook configuration for
            payment status events | Compliance workflow embedding (AML, KYC/KYB pass-through) |
            Corridor-specific testing and go-live readiness review | Optional SWIFT connectivity
            for bank clients (launched Oct 2025)
          note: >-
            Technical integration creates structural switching costs — 2–6 months of engineering
            work plus compliance workflow re-routing. Clients who complete integration rarely switch
            providers without a compelling cost or service quality trigger.
        - label: Production and Expansion
          value: >-
            Live payments in initial corridors | Volume ramp as client end-users generate demand |
            Additional corridor enablement (expanding from initial corridors to 140 total) |
            Cross-sell of Accept capability, stablecoin settlement, or SWIFT connectivity |
            Network-effect value grows as Thunes adds new wallet and bank endpoints (e.g., GCash,
            M-Pesa, Ecobank Africa rollout)
          note: >-
            Land-and-expand model — volume growth within existing members and cross-sell to
            additional Thunes products are the primary revenue levers after initial go-live.
            US MTL achievement opens US-based clients to the same expansion path.

