  - id: adoption-and-growth-trajectory
    title: Adoption and Growth Trajectory
    body: >-
      Thunes has grown its Direct Global Network to 720 members as of May 2026, up from
      an earlier public figure of 550 direct integrations cited at the Series D announcement
      in April 2025 — suggesting approximately 31% growth in network size in roughly one year.
      The company reported a revenue run-rate of $150 million and positive EBITDA at the time
      of its April 2025 Series D, representing a significant scale milestone for a private
      cross-border payment infrastructure company. The network previously processed $50B+ in
      cumulative transactions as of mid-2023 (TechCrunch Series C coverage) — a metric that
      has almost certainly grown given the membership expansion. The 85% real-time settlement
      rate and 140-country coverage cited on the homepage represent the network's operational
      quality metrics rather than client count or revenue per client.

      Customer acquisition dynamics are driven by both direct sales and network-effect referrals:
      when Mastercard, Visa, or PayPal join as Network Members, their sub-clients and partners
      gain access to Thunes' corridors without separate integration, compounding reach. The
      January 2025 PayPal Hyperwallet addition enabled APAC mobile wallet payouts to 450M+
      endpoints across six countries — a single partnership that dramatically extends Thunes'
      addressable reach in Southeast Asia. Morocco was added as a real-time corridor in September
      2025, and Ecobank's phased rollout across 32 Sub-Saharan African countries starting in
      October 2025 with Togo represents Thunes' largest single partner expansion on the continent.

      Thunes does not publish customer count by segment, new customer additions per period, or
      CAC/payback metrics. The revenue run-rate of $150M implies an average revenue per Network
      Member of approximately $208K at 720 members — consistent with enterprise B2B payment
      infrastructure pricing. However, this average masks wide dispersion: a small number of
      high-volume MTOs and large platform clients likely account for a disproportionate share of
      revenue.
