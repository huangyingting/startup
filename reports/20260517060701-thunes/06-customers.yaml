  - id: TU003
    title: Named customer proof table
    enumerationScope:
      coverage: partial
      basis: >-
        Thunes does not publish a complete client list; this table enumerates all publicly
        named clients confirmed via official case studies, partner press releases, or
        independent third-party reporting as of May 2026. Major network partners (Mastercard,
        Visa, PayPal, Circle, Ripple, Ecobank, Swift) are listed separately in the lower rows
        as strategic partnerships rather than traditional enterprise API clients.
    columns:
      - Customer / Partner
      - Segment
      - Deployment / Use Case
      - Production vs Pilot
      - Quantified Outcome / Proof Quality
      - Limitation / Gap
    rows:
      - - nsave
        - Fintech — emerging-market USD accounts for underbanked users
        - Cross-border payout to key emerging markets via Thunes DGN
        - Production — official Thunes case study with quantified results
        - 4× payout volume increase; 50%+ faster processing in <2 months (best-in-class proof)
        - Outcome period limited to first 2 months; no long-term volume or NRR data
      - - GCash (Philippines)
        - Mobile wallet / super app — 8/10 Filipinos are users
        - "Cross-border wallet top-up: Filipinos in UK/Europe top up GCash from foreign bank accounts"
        - Production — case study and co-press release (Nov 2024)
        - Named case study; strategic importance confirmed (Philippines is top-4 global remittance market)
        - No transaction volume or fee savings disclosed; outcome metrics absent
      - - UNFCU (UN Federal Credit Union)
        - Financial institution — cooperative serving 180,000+ UN staff globally
        - Mobile money transfers for UN community members in emerging markets
        - Production — official Thunes case study
        - Named institution; use case confirms enterprise financial-institution adoption
        - No volume, cost-saving, or customer satisfaction metrics
      - - Flip (Indonesia)
        - Fintech — Indonesian payment platform, 10M+ users
        - Enhanced cross-border payments and reduced remittance costs for Flip customers
        - Production — official Thunes case study
        - Named case study; Indonesia is a high-growth digital payments market
        - No quantified corridor improvements; reliance on qualitative description
      - - PayQuicker (US)
        - Payouts orchestration — gig/affiliate/marketplace payouts
        - Digital wallet payouts via Thunes Money Transfer API; rapid onboarding
        - Production — official Thunes case study; CEO Paul Beldham named
        - Executive named in case study; multiple digital wallet use cases confirmed
        - No volume metrics or payout destinations detailed
      - - Pomelo (US-Philippines)
        - Remittance / credit card issuer for Filipino diaspora
        - Enabled payouts from Pomelo credit line to GCash wallets in Philippines
        - Production — official Thunes case study; CEO Eric Velasquez Frenkiel named
        - CEO-named case study; confirms GCash wallet payout capability in Philippines corridor
        - Credit-line-funded remittance is niche; volume undisclosed
      - - Paydek (UK)
        - Cross-border money transfer — businesses and individuals
        - 14 local currency transactions processed for clients via Thunes
        - Production — official Thunes case study
        - Named case study; "14 local currency transactions" is only metric disclosed
        - Limited outcome depth; no revenue or volume data
      - - Mastercard (Move platform)
        - Global payment network — 200+ markets, 150+ currencies
        - Stablecoin wallet payouts via Thunes DGN integrated into Mastercard Move (Nov 2025)
        - Production — joint press release from Mastercard newsroom (primary source)
        - Tier-1 financial institution endorsement; Pratik Khowala (Global Head) quoted; mainstream
        - Volume of stablecoin payouts facilitated; go-live corridors; exclusivity terms
      - - Ecobank Group
        - Pan-African bank — 32 countries, dominant Sub-Saharan Africa footprint
        - Instant cross-border payments across Africa; first live in Togo (Oct 2025)
        - Production (Togo) — phased rollout to more countries; CEO Jeremy Awori quoted
        - Pan-African banking anchor client; confirms Africa strategy is live; CEO-quoted
        - Only Togo confirmed live as of announcement; full 32-country rollout timeline unknown
      - - Visa Direct
        - Global payment network — 190+ countries, 7B+ endpoints
        - Send-to-wallet for Visa clients; 1.5B+ new endpoints (2022); expanded to 108 wallet types in Asia/Africa (2024)
        - Production — TechCrunch confirmed 2022 integration; PYMNTS confirmed 2024 expansion
        - Tier-1 network partner; Visa invested in Thunes Series C; independently confirmed by TechCrunch
