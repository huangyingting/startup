  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: NRR and GRR
      missingEvidence: >-
        Net revenue retention and gross revenue retention rates for Thunes' Network Members
        across all segments, broken out by cohort year.
      whyItMatters: >-
        NRR is the single most important metric for assessing Thunes' business quality —
        it determines whether $150M run-rate is compounding growth or a churn-replacement
        treadmill. Without NRR, the company's revenue growth quality is unknowable.
      diligencePath: >-
        Request trailing-12-month NRR by segment cohort from Thunes CFO during due diligence;
        compare to B2B infrastructure benchmarks of 100–120% for API-integrated enterprise clients.
      relatedQuestionRefs:
        - QU014

    - type: private-evidence-only
      severity: material
      topic: top-customer concentration
      missingEvidence: >-
        The percentage of Thunes' total revenue attributable to its top 5 and top 10 Network
        Members by transaction volume.
      whyItMatters: >-
        If the top 3 MTOs (Western Union, Remitly, Ria) represent 30–40% or more of revenue,
        a single client decision to internalise rails would be highly material to Thunes'
        financial position.
      diligencePath: >-
        Request an anonymised revenue waterfall sorted by member revenue contribution; ask
        specifically for top-5 and top-10 client share of revenue and top-3 segment concentration.
      relatedQuestionRefs:
        - QU024

    - type: missing-source
      severity: material
      topic: client churn and dispute history
      missingEvidence: >-
        Any public record of Network Member churn, client disputes, service complaints, or
        regulatory actions related to Thunes' client delivery quality.
      whyItMatters: >-
        Without churn history or adverse client feedback, retention quality cannot be independently
        validated; the absence of G2/Gartner reviews leaves only company-selected case studies
        as the client satisfaction signal.
      diligencePath: >-
        Conduct 5–10 reference calls with active Thunes Network Members across different segments;
        request Thunes' internal NPS or CSAT scores; search FCA and MAS enforcement databases
        for any client-related complaints naming Thunes.
      relatedQuestionRefs:
        - QU008

    - type: enumeration-incomplete
      severity: minor
      topic: named client enumeration
      missingEvidence: >-
        The identity of the remaining approximately 678 Network Members (720 total minus 42
        publicly named or verifiable); which segments they belong to and what their relative
        revenue contribution is.
      whyItMatters: >-
        The 22 publicly identifiable clients represent only ~3% of the total 720; concentration
        analysis and segment mix analysis cannot be completed without the full client roster.
      diligencePath: >-
        Request a full client list (anonymised by segment and volume tier if necessary) during
        due diligence; cross-reference with Thunes' reported 720 member figure.
      relatedTableRefs:
        - TU003

    - type: private-evidence-only
      severity: material
      topic: MTO competitive overlap and churn risk
      missingEvidence: >-
        Whether named MTO clients (Western Union, Remitly, Ria) have disclosed plans to reduce
        reliance on Thunes or have invested in proprietary direct-settlement rail development;
        and what share of Thunes' revenue is concentrated in the top three MTO clients.
      whyItMatters: >-
        MTOs are simultaneously Thunes' clients and its direct competitors in consumer remittance.
        Western Union and Remitly have the engineering resources to internalise Thunes' capability
        over a 2–5 year horizon, creating a material medium-term churn risk. Without concentration
        data, it is impossible to assess whether an MTO departure would be survivable.
      diligencePath: >-
        Ask Thunes management directly about MTO contract term lengths, minimum volume commitments,
        and any renewal negotiations in progress; request revenue from the top three MTO clients as
        a percentage of total revenue; review Western Union Evolve platform documentation for
        competitive overlap signals.
      relatedQuestionRefs:
        - QU007
        - QU015
