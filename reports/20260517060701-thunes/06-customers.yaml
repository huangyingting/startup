chapter:
  number: 6
  title: Customers
  summary: >-
    Thunes' Direct Global Network serves 720 named Network Members as of May 2026, spanning
    eight distinct industry verticals: money transfer operators (MTOs), banks and neobanks, mobile
    wallets, payment service providers (PSPs), gig economy platforms, payroll and EOR, e-commerce,
    and digital asset companies. Customer proof is available through seven official case studies
    (GCash, nsave, PayQuicker, Flip, UNFCU, Pomelo, Paydek) plus named partnerships with Mastercard,
    Visa Direct, PayPal Hyperwallet, Ripple, Circle, Ecobank, and Swift — giving Thunes a stronger
    named-customer corpus than most private B2B payment infrastructure peers. The nsave case study
    is unique in providing quantified outcomes (4× payout volume increase and 50%+ faster processing
    in two months). However, no NRR, GRR, annual churn, or top-customer concentration data is
    publicly disclosed, leaving durability and concentration risk as material diligence gaps.

sections:
  - id: customer-base-segmentation
    title: Customer Base Segmentation
    body: >-
      Thunes segments its paying client base across eight verticals, each with distinct payment
      use cases. Money Transfer Operators (MTOs) such as Remitly, Western Union, and Ria use
      Thunes' remittance corridors to expand into emerging markets; these clients generate high
      transaction volumes and are among the most strategically important but also represent
      competitive overlap because MTOs increasingly build direct rails. Banks and neobanks —
      including the Commercial Bank of Dubai and Revolut — use Thunes for business payments and
      supplier invoice settlement to markets where correspondent banking is slow or expensive.
      Mobile wallets such as GCash, M-Pesa, Airtel, MTN, Orange, and WeChat Pay join the Direct
      Global Network (DGN) both as send endpoints and as receive-side corridors, enabling bilateral
      interoperability. Payment Service Providers connect to Thunes for mass payouts to gig workers,
      freelancers, and marketplace sellers in markets without local banking relationships.

      Gig economy platforms including Uber, Deliveroo, and Grab use Thunes for real-time worker
      payouts to mobile wallets and bank accounts in 140+ countries. Payroll and EOR platforms
      use Thunes to disburse multi-currency payroll across markets without local banking entities;
      this vertical benefits from Thunes' US MTL coverage (50 states) and real-time settlement for
      payroll timing SLAs. E-commerce merchants use Thunes to accept payments via 220+ local
      payment methods and settle in home currency, increasing checkout conversion in emerging
      markets. Digital asset companies integrate for fiat on/off ramps, stablecoin wallet top-ups,
      and last-mile payouts to bank accounts and wallets in 40+ countries.

      Geographic concentration mirrors emerging-market footprint: APAC (Southeast Asia, South
      Asia), Sub-Saharan Africa, and LATAM are primary growth markets, though US expansion is
      accelerating following the 50-state MTL achievement in 2024–2025. The 85% real-time
      settlement rate and 140-country coverage are key differentiators cited by clients in all
      verticals as primary reasons for choosing Thunes over correspondent-bank alternatives.
