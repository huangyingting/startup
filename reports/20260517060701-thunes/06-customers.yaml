  - id: TU005
    title: Expansion and concentration risk table
    columns:
      - Topic
      - Expansion Driver or Concentration Risk
      - Impact
      - Diligence Path
    rows:
      - - Volume-led expansion
        - Existing members grow their own businesses, increasing Thunes' transaction volume with no incremental CAC
        - Revenue grows without new member acquisition cost; NRR > 100% if this effect dominates
        - Request NRR by cohort year; examples of members that doubled Thunes volume in 12 months
      - - Geographic expansion
        - US market (50-state MTL achieved); Morocco corridor (Sep 2025); Africa via Ecobank (Oct 2025)
        - Opens new revenue streams from US fintechs and African banking clients
        - Request US pipeline in revenue-qualified opportunities; Ecobank phased rollout timeline
      - - Product footprint expansion
        - Members adding stablecoin payout, SWIFT connectivity, or accept capability on top of initial payout integration
        - Higher ARPU; deeper client relationship; lower churn
        - Ask for % of members using 2+ Thunes products vs 1; cross-sell rate
      - - MTO concentration and competitive overlap
        - Remitly, Western Union, Ria are simultaneously Thunes clients and market competitors capable of building own rails
        - Loss of top MTOs would be material; Western Union alone processes $100B+ annually
        - Request revenue from top-3 MTOs as % of total; monitor Western Union Evolve platform development
      - - Top-client revenue concentration
        - Unknown — Thunes has not disclosed top-5 or top-10 client revenue share
        - High concentration in 3–5 clients creates single-client revenue risk
        - Request anonymised revenue waterfall; ask for top-10 client % of total revenue
      - - Network partner dependency
        - Visa, Mastercard, PayPal, Ripple, Circle, Swift are both channel partners and potential competitors
        - If a network partner internalises Thunes' capability, client flow could be redirected
        - Monitor Visa's direct wallet integration progress; track Mastercard Send vs Mastercard-Thunes deal terms
      - - Geographic concentration and corridor risk
        - APAC and Africa represent high transaction density but also higher regulatory and currency volatility
        - Regulatory changes (mobile money licensing, FX controls) could disrupt specific corridors
        - Request revenue by top-10 corridors; ask for corridor-level contingency plans
    notes: >-
      Customer concentration data is not publicly disclosed. Expansion drivers are inferred from
      Thunes' product roadmap, industry page messaging, and Series D use-of-proceeds statements.
