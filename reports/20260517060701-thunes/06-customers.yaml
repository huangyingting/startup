  - id: expansion-and-concentration-risk
    title: Expansion and Concentration Risk
    body: >-
      Thunes' land-and-expand model works through two parallel levers: volume expansion within
      existing Network Members as their own businesses grow (volume-led expansion) and product
      footprint expansion as clients add new payout endpoints, currencies, or accept methods on
      top of their initial integration (cross-sell). Both levers increase revenue without
      incremental client acquisition cost. The Series D capital is explicitly directed at
      US market expansion, adding a new major geography with high-value fintech, e-commerce,
      and financial institution clients who need emerging-market payment rails.

      Customer concentration risk is unknown and material. Thunes has not disclosed what
      percentage of revenue comes from its top 5 or top 10 clients. For a $150M run-rate
      business with 720 members, it is highly plausible that the top 10 members account for
      40–60% of revenue — a common pattern in B2B infrastructure where a handful of
      high-volume MTOs or platform clients drive disproportionate transaction volume. The
      MTO client segment carries a specific structural risk: Remitly, Western Union, and
      Ria are both Thunes' clients and direct competitors in the consumer remittance market.
      These companies have the technical capability and financial incentive to build
      proprietary direct rails as they scale, reducing or eliminating their Thunes dependency.
      Western Union's existing internal payment infrastructure and Remitly's engineering team
      make this a credible medium-term risk.

      Geographic concentration follows the network's emerging-market footprint: APAC, Africa,
      and LATAM corridors represent the highest transaction volumes but also the highest
      regulatory and currency-risk exposure. The SWIFT integration (October 2025) reduces
      switching friction for bank clients who can now use existing SWIFT messaging to access
      Thunes — which is both a growth accelerant and a dependency risk if SWIFT relationships
      or standards change. No public record of client contract term lengths, exclusivity clauses,
      or minimum volume commitments was found during research, preventing assessment of revenue
      durability under a client-loss scenario.
    claimRefs:
      - CU023
      - CU026
      - CU028
      - CU033
