summary:
  headline: >
    Thunes' broad regulatory license stack (MAS, FCA, ACPR, HK MSO, 50-state US MTL), proprietary Direct Global Network
    across 130+ countries, and stated positive EBITDA at Series D position it as one of the most credible private B2B
    cross-border payments infrastructure platforms, but the absence of any disclosed Series D valuation, audited
    financials, or quantified retention metrics keeps conviction in track territory until data-room access is available.
