company:
  name: Thunes
  website: https://www.thunes.com
  sector: B2B Cross-Border Payments Infrastructure
  stage: Late-Stage Private (Series D, April 2025)
  headquarters: Singapore
  shortDescription: >
    Thunes is a Singapore-headquartered B2B cross-border payments infrastructure company that operates a proprietary
    Direct Global Network (DGN) spanning 130+ countries and 80+ currencies, connecting members to mobile wallets, banks,
    cards, and stablecoin endpoints through a single API. Founded in 2016 as a spin-off from TransferTo, Thunes has
    raised ~$292M across four rounds — most recently a $150M Series D in April 2025 led by Apis Partners and Vitruvian
    Partners — and disclosed positive EBITDA at the Series D announcement. The company holds payment institution
    licenses across MAS (Singapore), FCA (UK), ACPR (France), Hong Kong MSO, and money transmitter licenses in all 50 US
    states.
