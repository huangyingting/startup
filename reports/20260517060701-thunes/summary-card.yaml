  topStrengths:
    - >-
      Direct Global Network across 130+ countries, 80+ currencies, 550+ direct integrations: a multi-year
      capital-intensive build that better-capitalized peers (Airwallex, Nium) have not replicated at the same
      emerging-markets depth.
    - >-
      Regulatory license breadth — MAS MPI, FCA API, ACPR PI, HK MSO, plus all 50 US state money transmitter licenses
      achieved 2024–2025 — substantially raising the bar for new entrants and unlocking direct US enterprise
      distribution.
    - >-
      Positive EBITDA disclosed at April 2025 Series D: a rare profitability signal in private cross-border payments
      infrastructure, materially improving capital efficiency vs. loss-making peers like Nium (SGD 88M FY24 loss).
    - >-
      Network and stablecoin partnerships compound moat: SWIFT connectivity (Oct 2025) opens 11,000+ banks via existing
      rails; Mastercard Move (Nov 2025), Circle USDC (Oct 2024), Ripple (Sep 2025), and Visa Direct (Oct 2022) integrate
      Thunes into both traditional and next-generation settlement layers.
    - >-
      Tier-one institutional backing — Apis Partners and Vitruvian Partners co-led Series D ($150M, Apr 2025); Vitruvian
      has backed Wise and Marqeta to public-market outcomes — signals growth-equity conviction in the platform's path to
      a liquidity event.
  topRisks:
    - >-
      Valuation and financial opacity: no publicly disclosed Series D post-money valuation, no audited revenue, no gross
      margin, no burn or runway figures — making any price-sensitive investment decision dependent on data-room access.
    - >-
      Leadership succession ambiguity: Floris de Kort was announced as CEO in January 2024, but the May 2026 about-us
      page lists Peter De Caluwe as Deputy Chairman and CEO with no public departure announcement, creating governance
      uncertainty material to underwriting.
    - >-
      Cross-border payments commoditization and pricing pressure: SWIFT gpi modernization, Visa Direct, Mastercard Send,
      and Wise Platform are all chasing the same B2B disbursement workflows, and Thunes' SWIFT connectivity launch —
      while expanding reach — also accelerates network commoditization.
    - >-
      Partner concentration in stablecoin rails: Mastercard Move, Circle USDC, Ripple, and Visa Direct are
      simultaneously distribution leverage and concentration risk; a strategic shift or regulatory change at any single
      partner (e.g., MiCA in EU, GENIUS Act in US) could materially reshape Thunes' next-generation payments roadmap.
    - >-
      Tilia acquisition integration risk: the June 2025 purchase of Linden Lab's gaming-payments subsidiary expands
      Thunes into virtual-economy payouts but introduces digital-economy compliance exposure and integration execution
      risk that is unproven at the report date.
  unresolvedGaps:
    - >-
      Series D post-money valuation: company-stated as 'substantial increase' over the prior $900M+ Series C mark but
      the precise figure is not disclosed; required to size dilution, preference overhang, and entry multiple.
    - >-
      Audited revenue, gross margin, and EBITDA composition: 'positive EBITDA' is a company-stated headline at the
      Series D announcement with no audited disclosure, scope definition (Group vs. operating entity), or
      trailing-twelve-month evidence.
    - >-
      CEO clarity: definitive confirmation of whether Peter De Caluwe or Floris de Kort is the operating CEO as of
      mid-2026, plus succession plan and key-person mitigation arrangements.
    - >-
      Customer concentration and retention: no published customer count, no NRR/GRR by segment, no breakdown of revenue
      concentration among top MTOs, wallets, or platform partners — all material for assessing revenue durability.
    - >-
      US expansion progress against the Series D thesis: outside the 50-state MTL milestone, no public KPIs on US client
      wins, US transaction volume, or path to US revenue contribution have been disclosed.
