company:
  name: Semgrep
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    Semgrep, Inc. is a San Francisco-based application security company founded in 2017 by three MIT alumni—Isaac Evans (CEO), Drew Dennison (CTO), and Luke O'Malley (CPO). The company develops a developer-first AppSec platform combining SAST, SCA, Secrets detection, and AI-powered triage. In February 2025 Semgrep raised a $100M Series D led by Menlo Ventures, bringing total funding to $204M. The platform powers 75M+ annual code scans and is used by companies including Figma, Dropbox, Snowflake, and Slack. The December 2024 open-source license restriction and resulting Opengrep fork represent a material reputational and competitive risk.

sections:
  - id: identity-and-founding
    title: "Identity and Founding"
    body: |
      Semgrep, Inc. is an application security company headquartered in San Francisco, California. The legal entity was incorporated on May 15, 2017. The company was originally operated under the name r2c (Return to Corporation) before rebranding to Semgrep as the flagship open-source product gained traction. The founders—Isaac Evans, Drew Dennison, and Luke O'Malley—are all MIT electrical engineering and computer science graduates who met in Simmons Hall as undergraduates and began collaborating on security projects as students.

      The founding story began with the founders' shared frustration that software security was inaccessible to most developers, requiring specialized skills available only at a handful of large tech companies. In 2016, the founders started exploring the software security landscape and in 2019 discovered a dormant open-source project called sgrep, originally built at Facebook. They revived and expanded it during an internal hackathon, adding broader language support and higher-level code analysis capabilities. In 2020 the project was renamed Semgrep to reflect its new identity and broader mission.

      The company's mission is to "make it expensive to exploit software" by bringing world-class security tools to both software and security engineers. Semgrep's approach centers on extensibility: security rules look like the source code they analyze, enabling any developer—not just specialists—to write, share, and extend scanning rules. This democratization philosophy has powered a large open-source community and accelerated enterprise adoption. As of May 2026, Semgrep powers 75M+ source-code security scans per year across 40+ programming languages and has shipped 100+ releases including weekly updates.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008, CO009, CO010, CO011, CO012]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: leadership-and-governance
    title: "Leadership, Board, and Governance"
    body: |
      Semgrep's executive team is founder-led. Isaac Evans serves as Chief Executive Officer, guiding product vision and overall company strategy. Drew Dennison serves as Chief Technology Officer and leads core engineering and technical architecture. Luke O'Malley serves as Chief Product Officer and oversees product management and user experience. All three founders have maintained their original roles since inception—CEO, CTO, and CPO respectively—a structure they identified as natural during a joint MIT project as undergraduates.

      In conjunction with the February 2025 Series D, Semgrep made two strategic executive hires and one governance addition. Garrett Souza joined as Vice President of Sales, bringing enterprise sales experience from Matillion (SVP Americas) and Snyk (Enterprise Sales Leader). Mark McLaughlin, former CEO of Palo Alto Networks, joined as an Angel Investor and Advisor, providing operational guidance on scaling a security company. Matt Murphy, Partner at Menlo Ventures, joined as a new Board Member upon completion of the Series D.

      The board and investor base include Menlo Ventures (Series D lead, board seat), Lightspeed Venture Partners (Series C lead), Redpoint Ventures, Sequoia Capital, Felicis Ventures, and Harpoon Ventures. The company does not publicly disclose formal board composition beyond these investors. The three founders remain the primary operational decision-makers, creating a meaningful key-person concentration across Evans, Dennison, and O'Malley. Isaac Evans authored the Series D announcement and public communications, reinforcing his role as the company's primary public voice.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022]
    tableRefs: [TO002, TO003]
    figureRefs: []

  - id: funding-and-capital
    title: "Funding History and Capital Structure"
    body: |
      Semgrep has raised $204M in total funding across four rounds since its first institutional close in October 2020. The funding trajectory reflects rapid scaling from seed-stage infrastructure to a full enterprise AppSec platform over approximately five years. The most recent round, a $100M Series D announced February 5, 2025, was led by Menlo Ventures with participation from all existing investors: Felicis Ventures, Harpoon Ventures, Lightspeed Venture Partners, Redpoint Ventures, and Sequoia Capital.

      Prior to the Series D, Semgrep raised a $53M Series C in April 2023 led by Lightspeed Venture Partners. The Series B closed July 2021 and the Series A closed October 2020. The company is privately held and has not disclosed revenue metrics, margins, or annual recurring revenue publicly. Tracxn reports 257 employees as of March 2026. The Series D valuation has not been formally disclosed; contemporaneous reporting placed Semgrep in the unicorn range given the round size, sector comparables, and investor participation, though no official figure has been published. The funds are designated for AI and program analysis talent acquisition, product awareness expansion, and go-to-market team growth including geographic expansion in Europe and Asia-Pacific.

      The investor syndicate is composed entirely of institutional U.S. venture capital firms with no disclosed strategic or corporate investors. The absence of strategic investors preserves Semgrep's independence as a platform serving multiple enterprise customers who may also be technology partners or competitors of potential strategic investors. Semgrep's disclosure profile is private-undisclosed: no financial statements, ARR, or revenue growth metrics are publicly available as of May 2026.
    claimRefs: [CO023, CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO031, CO032]
    tableRefs: []
    figureRefs: [FO003]

  - id: product-platform-and-scale
    title: "Product Platform and Scale"
    body: |
      Semgrep's commercial AppSec Platform comprises four interconnected products built on top of the open-source Semgrep engine. Semgrep Code (SAST) provides static application security testing with cross-file and cross-function taint analysis, supporting 30+ languages. Semgrep Supply Chain (SCA) performs reachability-aware software composition analysis, surfacing only vulnerabilities in code paths that are actually called rather than every CVE in every imported package. Semgrep Secrets detects hard-coded credentials using semantic analysis and entropy analysis with live credential validation. Semgrep Assistant is an AI layer that auto-triages findings, suppresses approximately 20% of SAST false positives on day one (improving to ~40% with codebase learning), generates remediation guidance, and can open pull requests with suggested code fixes.

      The open-source Semgrep Community Edition (CE) underpins the commercial platform and remains free under LGPL-2.1 for individual and non-commercial use. As of May 2026, the GitHub repository has accumulated 14,300+ stars and is used by hundreds of thousands of developers including security engineers at GitLab, Dropbox, Slack, Figma, Shopify, HashiCorp, and Snowflake. The platform powers 75M+ code scans per year across 40+ languages and supports 3,000+ community-contributed rules. The commercial platform is sold as a SaaS product at $30/month/contributor for SAST or SCA (Teams tier) and $15/month/contributor for Secrets, with custom Enterprise pricing for large organizations and on-premises deployments.

      An MCP server released in 2025 enables AI coding assistants (Cursor, VS Code, Claude Desktop) to invoke Semgrep scans in real time during AI-assisted development, directly addressing the growing "vibe coding" risk of LLM-generated code containing security vulnerabilities. Semgrep's Managed Scanning feature handles CI/CD configuration on behalf of customers, reducing time-to-first-finding from weeks to hours.
    claimRefs: [CO033, CO034, CO035, CO036, CO037, CO038, CO039, CO040, CO041]
    tableRefs: []
    figureRefs: []

  - id: milestones-and-adverse-events
    title: "Key Milestones and Adverse Events"
    body: |
      Semgrep's development from a dormant open-source project to a $204M-funded enterprise platform spans approximately nine years. The company's milestone trajectory is characterized by three phases: open-source community building (2017–2020), enterprise product expansion and funding acceleration (2021–2023), and AI-augmented platform scaling (2024–2026).

      The most significant adverse event in Semgrep's history is the December 2024 open-source license restriction. Semgrep renamed its OSS project to "Semgrep Community Edition," introduced a proprietary "Semgrep Rules License" restricting commercial use of rules, and migrated features including fingerprinting, tracking ignores, and certain metavariables from the Community Edition to the commercial platform. This triggered significant backlash from the security and developer community. On January 23, 2025, a coalition of 10+ application security companies—including Aikido Security, Endor Labs, Amplify Security, Jit, Orca Security, and Mobb—launched Opengrep, a fork of the last fully-featured CE codebase, restoring the locked features under LGPL-2.1. Critics described the license change as a "rug pull" that alienated contributors who had invested in the Semgrep ecosystem. Semgrep defended the change as necessary to prevent competitors from commercializing its rules, and the underlying engine remains LGPL-2.1 licensed. The Opengrep project has 2,100+ GitHub stars and a dedicated full-time OCaml development team as of early 2026.

      Despite the controversy, Semgrep announced the $100M Series D just two weeks after the Opengrep fork launch, suggesting investor confidence remained intact. The company added veterans from Palo Alto Networks, Snyk, and Matillion to its leadership team and articulated a clear roadmap toward autonomous AppSec engineering.
    claimRefs: [CO042, CO043, CO044, CO045, CO046, CO047, CO048]
    tableRefs: [TO004]
    figureRefs: [FO001]

