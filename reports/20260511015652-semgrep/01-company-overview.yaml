callouts:
  - calloutType: strength
    title: "Developer-First Open-Source Moat"
    body: >
      Semgrep's open-source community of hundreds of thousands of developers and 3,000+ community rules creates a durable adoption funnel. The CE-to-enterprise upgrade path converts grassroots developer adoption into institutional sales without requiring cold outreach—a structural GTM advantage over pure-enterprise SAST vendors.
    claimRefs: [CO033, CO034, CO039]

  - calloutType: strength
    title: "Founder Continuity and Technical Depth"
    body: >
      All three co-founders remain in executive roles nine years after founding, maintaining institutional knowledge and technical credibility. Isaac Evans's doctoral-level background in static analysis and Drew Dennison's OCaml/program analysis expertise are rare and directly relevant to the product's technical differentiation.
    claimRefs: [CO013, CO014, CO015]

  - calloutType: risk
    title: "Open-Source License Controversy Creates Competitive Vulnerability"
    body: >
      The December 2024 license restriction and resulting Opengrep fork represent a material reputational risk. Critics described the change as a "rug pull," and a coalition of 10+ application security companies now backs a competing free alternative. If Opengrep gains sufficient traction, Semgrep's community-driven pipeline advantage could weaken over time.
    claimRefs: [CO042, CO043, CO044, CO045, CO046]

  - calloutType: risk
    title: "Revenue Opacity Complicates Investment Thesis"
    body: >
