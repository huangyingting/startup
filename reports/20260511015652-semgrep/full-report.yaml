      - number: '5.2'
        title: Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >
              Semgrep's software architecture has three layers:


              **Layer 1 — The Scanner Engine (OSS Core):** The foundational static analysis engine is written in OCaml
              and released as open-source (previously LGPL-2.1, now under the Semgrep Open Source License with December
              2024 CE rule restrictions). It uses tree-sitter grammars for language-specific AST (Abstract Syntax Tree)
              parsing across 40+ programming languages. The OSS engine performs syntactic pattern matching and
              intra-procedural analysis available to all tiers.


              **Layer 2 — The Pro Engine (Paid):** The Pro Engine extends the OSS core with inter-procedural taint
              analysis (cross-file, cross-function dataflow), the full 20,000+ Pro rule library, and advanced
              language-specific analyzers. The Pro Engine runs in Semgrep's cloud infrastructure (not locally), meaning
              scan results are transmitted to Semgrep servers for Pro-tier analysis. This creates a cloud dependency for
              all paying customers.


              **Layer 3 — The AppSec Platform (Cloud):** The web-based management console (semgrep.dev) provides
              repository management, finding triage, rule configuration, policy enforcement, user management
              (SSO/SAML/SCIM), reporting dashboards, AI triage (Semgrep Assistant), Managed Scanning orchestration, and
              API access. The platform stores finding history and trends.


              **Data pipeline:** Source code is scanned locally by the Semgrep CLI (run in CI/CD); findings metadata
              (file paths, rule IDs, matched text snippets, line numbers) are transmitted to the cloud platform. Full
              source code is not transmitted by default; only matched code snippets and context lines are sent. This
              architecture is critical for enterprise security approval processes.


              **Dependency map:** The platform is tightly integrated with GitHub, GitLab, Bitbucket, and Azure DevOps
              via OAuth and webhook APIs. Semgrep Assistant depends on third-party LLM APIs (OpenAI or Anthropic) for
              code explanation and fix generation. Supply Chain depends on CVE/NVD databases (NIST), GitHub Advisory
              Database, and Semgrep's proprietary reachability analysis. The OSS engine is a hard dependency for the
              entire platform.
