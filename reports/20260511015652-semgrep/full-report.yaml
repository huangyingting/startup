      - number: '2.5'
        title: Adoption Constraints and Risks
        blocks:
          - type: paragraph
            body: >
              Five material constraints limit AppSec adoption velocity and affect Semgrep specifically.


              Tool fatigue and false positives are the most acute. Traditional SAST false positive rates run 30–70% per
              multiple industry studies. Sixty-two percent of respondents in the Cypress Data Defense 2025 survey
              admitted releasing vulnerable code to meet deadlines. Latio's 2026 report describes AppSec as "a
              discipline in crisis." The consequence is alert fatigue: 58% of AppSec professionals encounter false
              positives frequently.


              Talent shortage compounds this: the global cybersecurity workforce gap is 4.8 million professionals (ISC2
              2024). Only 30% of organizations consider themselves at a mature DevSecOps level (Checkmarx 2025). This
              creates both opportunity (automation substitutes for headcount) and adoption risk (under-resourced teams
              delay purchase).


              Market concentration risk exists: 43% of organizations are at the lowest AppSec maturity level (Gartner).
              This segment is accessible only via the free tier; conversion is complicated by the Opengrep fork offering
              a free alternative.


              Platform consolidation by incumbents is accelerating: enterprises managing 7+ security tools (Endor Labs)
              are consolidating toward platforms with broader code-to-cloud coverage. Checkmarx, Snyk, GitHub Advanced
              Security, and Wiz are building capabilities that overlap with Semgrep's. Latio 2026 notes the silent death
              of standalone ASPM as a category.
            claimRefs:
              - CM023
              - CM024
              - CM025
              - CM026
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
