  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Revenue Streams
        blocks:
          - type: paragraph
            body: >
              Semgrep's revenue model is a product-led growth (PLG) SaaS structure with three monetization tiers built
              on top of the open-source Community Edition (CE). The PLG motion generates a developer acquisition funnel
              at zero variable cost — developers discover and adopt Semgrep CE, validate security value in CI, and
              upgrade to Teams or Enterprise as usage scales or security program formalization occurs.


              Revenue Stream 1 — Teams Tier ($30/contributor/month for Code or Supply Chain; $15/contributor/month for
              Secrets): This is the primary self-serve revenue generator. The trigger is scale (>10 repositories or >10
              contributors exceeding the free tier limit) or access to Pro rules and AI triage. Teams tier is billed per
              active contributor, a metric Semgrep controls and audits through its CI integration.


              Revenue Stream 2 — Enterprise Contracts (custom pricing): Enterprise revenue is negotiated directly,
              typically with CISO or VP Engineering budget owners at organizations with 500+ employees. Enterprise
              contracts include SSO/SAML, SCIM provisioning, Managed Scanning, SLA guarantees, audit logging,
              on-premises deployment option, and access to the full Pro rule set (20,000+ rules). ACV likely ranges from
              $50K to $500K+.


              Revenue Stream 3 — Professional Services and Implementation (small): Semgrep offers implementation
              services for Managed Scanning. This is not a primary revenue generator and likely represents <5% of total
              revenue.


              Revenue recognition: Annual or multi-year subscription contracts in advance (typical SaaS). No evidence of
              per-scan pricing, consumption metering, or transaction-based billing. Revenue is ratable over the contract
              term; upfront annual payments create positive working capital dynamics.
