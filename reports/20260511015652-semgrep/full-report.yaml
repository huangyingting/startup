              company. Matt Murphy, Partner at Menlo Ventures, joined as a new Board Member upon completion of the
              Series D.


              The board and investor base include Menlo Ventures (Series D lead, board seat), Lightspeed Venture
              Partners (Series C lead), Redpoint Ventures, Sequoia Capital, Felicis Ventures, and Harpoon Ventures. The
              company does not publicly disclose formal board composition beyond these investors. The three founders
              remain the primary operational decision-makers, creating a meaningful key-person concentration across
              Evans, Dennison, and O'Malley. Isaac Evans authored the Series D announcement and public communications,
