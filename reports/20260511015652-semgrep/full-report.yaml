      - number: '6.4'
        title: Retention, Durability, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              Semgrep has not publicly disclosed customer retention metrics (NRR, GRR, churn, renewal rates, or cohort
              data). All estimates below are author-derived from industry benchmarks and behavioral signals:


              **Enterprise tier retention proxy:** Enterprise contracts with SSO/SAML, SCIM, Managed Scanning, and
              multi-year commitments have structurally high switching costs. SAST tools, once deployed via Managed
              Scanning across an organization's full repository set, require security teams to reconfigure CI/CD,
              migrate finding histories, retrain developer habits, and re-certify the new tool for compliance purposes.
              This creates natural stickiness analogous to other developer infrastructure tools. Estimated enterprise
              GRR: 85–95%.


              **Teams tier retention proxy:** Self-serve Teams tier customers have lower switching costs — migration
              requires changing the GitHub Actions workflow file and moving rules. However, once an engineering team has
              customized rules and integrated findings into their JIRA workflow, switching friction is non-trivial.
              Estimated Teams tier GRR: 70–85%.


              **CE / Free tier retention:** CE users are by definition not revenue-contributing; CE "retention"
              (continued use of Semgrep CE rather than migrating to Opengrep) is unverifiable. The December 2024 license
              change may have accelerated CE churn toward Opengrep.


              **G2 satisfaction signals:** 4.5/5 average across 30+ reviews indicates strong developer satisfaction.
              Common positive themes: rule quality, ease of rule writing, CI integration, low friction. Common negative
              themes: Pro Engine scan latency on large codebases, community rule false positive rate, documentation
              depth for advanced use cases.


              **NPS proxy:** Semgrep has not published Net Promoter Score data. The consistent G2 positive reviews and
              active community rule contribution (3,000+ community rules) suggest a developer Net Promoter Score above
              50, which is typical for developer tools with strong OSS community engagement.
