        title: Exhibits
        blocks:
          - type: callout
            title: Structural tailwinds are multi-year and compounding
            body: >
              AI-generated code, EU CRA enforcement, SBOM mandates, and shift-left DevSecOps adoption are not temporary
              trends — they compound across a 3-7 year horizon and directly expand the SAM for Semgrep's
              SAST/SCA/Secrets platform.
            calloutType: strength
            claimRefs:
