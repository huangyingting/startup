      - number: '5.5'
        title: Trust, Security, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >
              **Security certifications:** Semgrep maintains SOC 2 Type II certification, covering security,
              availability, and confidentiality controls. The compliance report is available under NDA to enterprise
              customers via trust.semgrep.dev.


              **GDPR compliance:** Semgrep has published a Data Processing Agreement (DPA) for European customers and
              supports GDPR data deletion requests. As of 2025, code snippet data transmitted to the Semgrep platform
              was subject to GDPR retention and deletion controls.


              **FedRAMP:** Not in FedRAMP Authorized status as of May 2026. This is a blocking factor for U.S. federal
              government sales and limits addressable market in regulated U.S. government sectors. Semgrep has been
              noted as "FedRAMP Ready" in progress; completion timeline is unknown.


              **HIPAA:** No public HIPAA BAA offering identified; Semgrep does not target healthcare as a primary
              vertical.


              **Data handling policy:** Semgrep does not train its AI models on customer code by default; opt-in for
              telemetry improvement programs. The privacy documentation states that code snippets sent to the Semgrep
              cloud platform for Pro Engine analysis are not used for rule training without explicit customer consent.


              **Status and reliability:** Status page (status.semgrep.dev) reports uptime SLA of 99.9% for Enterprise
              tier. No major publicly disclosed outages identified as of May 2026.


              **Quality controls:** Semgrep publishes false-positive rate benchmarks for Pro rules; typical Pro rule FP
              rate is claimed to be <5% on the benchmarked rulesets. Community rules have no enforced FP rate standard.


              **Vulnerability disclosure:** Semgrep has a published responsible disclosure policy. No public CVEs
              attributed to the Semgrep SaaS platform identified.
