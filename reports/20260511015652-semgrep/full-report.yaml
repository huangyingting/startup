      - number: '8.4'
        title: Comparable Set and Valuation Context
        blocks:
          - type: paragraph
            body: >
              **Developer security public/private comparables:**


              Snyk is the closest public comparable: $350M+ ARR (2024 est.), $7.4B valuation (secondary market, 2024),
              implying ~21x forward ARR at scale. Snyk achieved this multiple at 100%+ NRR with $200M+ ARR; applying
              Snyk's multiple to Semgrep's $33.6M ARR implies a $700M valuation if ARR is growing 60%+ with 120%+ NRR —
              consistent with the Series D range.


              Checkmarx was acquired by Hellman & Friedman in 2022 at ~$1.15B on ~$100M ARR (~11.5x ARR), providing a
              strategic floor valuation for an enterprise AppSec platform of Semgrep's profile when it reaches $100M
              ARR.


              GitHub Advanced Security (GHAS) is bundled into GitHub Enterprise Cloud at enterprise tiers, with no
              disclosed separate ARR. GitHub's $7.5B acquisition by Microsoft in 2018 valued the full developer
              platform, not security specifically. GHAS is not a tradeable comparable but sets a reference point for the
              value embedded in GitHub's developer distribution.


              SonarSource (SonarQube) closed a $412M fundraise in 2022 at an undisclosed valuation from Warburg Pincus,
              providing a private comparable for developer-focused static analysis platforms; SonarSource is larger
              ($100M+ ARR) but confirms investor appetite for this category at scale.


              Veracode (acquired by Broadcom in 2023 for $550M from Broadcom after prior PE ownership) provides an M&A
              floor: a mature SAST/DAST vendor with $250M+ ARR sold to a large enterprise acquirer at ~2x ARR,
              reflecting legacy product discount but confirming strategic buyer demand.


              **Valuation sensitivity:**

              At Semgrep's $33.6M ARR, the implied valuation range is:

              - 10x ARR (legacy/stagnating): $336M (bear floor)

              - 15x ARR (moderate growth, 40% CAGR): $504M

              - 20x ARR (high growth, 60% CAGR): $672M

              - 30x ARR (hypergrowth, 80%+ CAGR, NRR > 120%): $1.0B+


              The Series D post-money valuation is estimated at $400–750M based on the $100M raise size, Menlo Ventures'
              typical check-to-ownership ratio (15–25%), and comparables in the developer security category.
