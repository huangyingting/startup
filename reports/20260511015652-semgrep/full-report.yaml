      - number: '3.2'
        title: 'Direct Developer-First Peers: Snyk and GitHub Advanced Security'
        blocks:
          - type: paragraph
            body: >
              Snyk is the most direct competitor to Semgrep across product, market, and GTM motion. Snyk Code (SAST,
              powered by DeepCode AI acquisition, 2020), Snyk Open Source (SCA), Snyk Container, and Snyk Infrastructure
              as Code overlap all four of Semgrep's commercial products. Snyk's $407M 2025 revenue and 5,000+ customers
              demonstrate validated enterprise demand for developer-first AppSec. However, Snyk's 2023 layoffs (12%
              headcount reduction) and decelerated revenue growth suggest the hypergrowth phase has concluded, and the
              company is optimizing for profitability ahead of a potential IPO or strategic exit. Snyk's pricing
              overlaps Semgrep's ($25–30/developer/month for SAST); the key competitive dimension is ecosystem breadth
              (Snyk has Container/IaC; Semgrep has more flexible SAST rule authoring).


              GitHub Advanced Security (GHAS) represents a structural distribution threat rather than a product
              technology threat. GHAS is powered by CodeQL (acquired by GitHub 2019), Dependabot (SCA), and Secret
              Scanning. The March 2025 rebrand split GHAS into two products: GitHub Code Security ($30/committer/month)
              and GitHub Secret Protection ($19/committer/month). GitHub Copilot Autofix generates PR-ready code patches
              directly in pull requests, creating a seamless developer UX. GHAS's structural advantage is GitHub's 100M+
              developer ecosystem: for any organization using GitHub, GHAS is already present in the platform and
              requires no additional vendor relationships. Many security teams run both GHAS and Semgrep — CodeQL for
              deep nightly semantic analysis, Semgrep for fast PR-level pattern-matching — reducing zero-sum competitive
              dynamics.


              Semgrep's differentiation vs. both: (1) multi-VCS support (GitLab, Bitbucket, Azure DevOps) vs. GHAS's
              GitHub-only deployment; (2) 40+ language support vs. CodeQL's ~12 languages; (3) YAML-based custom rule
              authoring vs. CodeQL's SQL-like query language; (4) integrated Secrets/SCA/SAST/AI platform vs. GHAS's
              module-separated billing.
