      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              The TAM for Semgrep's ecosystem is anchored by the global DevSecOps platform market, projected at $10.88
              billion in 2026 by Mordor Intelligence (CAGR 22.1% through 2031) and $11.07–11.49 billion per Coherent
              Market Insights and Fortune Business Insights. These figures use the broadest definition, encompassing
              DevSecOps orchestration, CI/CD security automation, and compliance management alongside SAST/SCA tools.
              The narrower AST tool market — MarketsandMarkets' scope most directly comparable to Semgrep's product
              footprint — was $1.83 billion in 2025 (CAGR 26.7% to 2031), implying approximately $2.3 billion by 2026.


              The SCA standalone market (Grand View Research) grew from $266.2 million in 2023 at a 19.87% CAGR,
              projected to reach $880.6 million by 2030. These figures are consistent: Semgrep Supply Chain competes
              within this segment. Multiple analyst sources exhibit wide spread (2:1 to 6:1 ratio) largely explained by
              differing scope definitions, not methodological error.


              The SAM for Semgrep — developer-facing SAST/SCA/Secrets for CI/CD-integrated teams — is estimated at
              approximately $2–3 billion for 2026. Bottom-up validation: GitHub reports 100+ million total developers
              globally; if 10% are at organizations with formal AppSec programs, and each contributes $30/month at full
              conversion, the theoretical SOM ceiling exceeds $3.6 billion annually. In practice, penetration is far
              lower. Semgrep's realistic SOM in a 3–5 year horizon, assuming 6% share of SAM at current growth
              trajectory, is estimated at $150–300 million.
