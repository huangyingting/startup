      - number: '7.4'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >
              **GitHub platform risk (structural):**

              Semgrep's GTM depends on GitHub as the primary code host for its customer base. GitHub owns the CI/CD
              pipeline integration surface (GitHub Actions), the PR comment interface (where Semgrep posts findings),
              the repository permission model (required for Managed Scanning), and the competing product (GHAS + Copilot
              Autofix). GitHub could restrict third-party security tool API access, change GitHub App permission scopes,
              or tighten Actions runner security in ways that impair Semgrep's functionality.


              **Opengrep as a community substitute:**

              Opengrep is both a competitive and a dependency risk. As a fork, it depends on continued community
              investment in the OSS engine quality. If Opengrep attracts significant investment or corporate backing
              (e.g., a large tech vendor sponsoring Opengrep as a free community tool), the competitive pressure on
              Semgrep's PLG funnel intensifies dramatically.


              **LLM provider dependency:**

              If OpenAI or Anthropic changes API pricing, terms of service, or access policies, Semgrep's Assistant
              feature economics change materially. Migrating between LLM providers (e.g., OpenAI → Anthropic → Google
              Gemini) requires re-prompting, re-evaluation, and re-certification of fix quality, creating switching
              latency.


              **NVD/CVE data feed dependency (Supply Chain):**

              Semgrep Supply Chain depends on NIST NVD and GitHub Advisory Database for vulnerability data. NVD has
              experienced processing backlogs (documented in 2024: 93% of CVEs published in 2024 were NOT analyzed in
              NVD within 30 days). If these data quality degradations persist, Semgrep Supply Chain reachability
              analysis will lag the threat landscape, impairing the product's commercial value proposition.


              **Customer concentration risk:**

              Estimated top-10 customers represent 30–50% of total ARR. Loss of 2–3 named enterprise accounts (Figma,
              Dropbox, Snowflake) would represent a material ARR decline. No multi-year contract status for individual
              customers has been confirmed.
