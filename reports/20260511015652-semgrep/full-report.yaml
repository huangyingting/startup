      - number: '7.3'
        title: Operational, Security, and Technology Risk
        blocks:
          - type: paragraph
            body: >
              **LLM API dependency (Semgrep Assistant):**

              Semgrep Assistant relies on third-party LLM APIs (OpenAI or Anthropic) for AI triage and code fix
              generation. This creates three distinct risks: (1) pricing risk — LLM inference costs may increase
              materially; (2) availability risk — LLM API outages or rate limiting directly impair the Semgrep Assistant
              feature; (3) data risk — code snippet transmission to a third-party LLM may violate enterprise data
              security policies, requiring additional procurement hurdles.


              **GitHub API dependency:**

              Semgrep's primary CI/CD integration is via GitHub Actions and GitHub App (for Managed Scanning). GitHub
              has historically maintained backward compatibility, but any changes to GitHub Actions runner environments,
              API authentication, or webhook delivery could disrupt customer scans. GitHub also competes with Semgrep
              via GHAS.


              **Cloud infrastructure concentration:**

              Semgrep's cloud platform is hosted on a single cloud provider (AWS or GCP, unconfirmed). A major outage to
              the primary cloud provider would impair the Semgrep AppSec Platform availability including findings
              management, policy enforcement, and Managed Scanning orchestration.


              **Security of the Semgrep scanning pipeline itself:**

              Semgrep analyzes code from customer repositories. A supply-chain attack targeting the Semgrep scanner
              (malicious rule injected into the Pro rules registry) could compromise customer CI/CD pipelines. Semgrep's
              rule signing and distribution security has not been independently audited.


              **Scan result data integrity:**

              False negative vulnerabilities (security bugs that Semgrep fails to detect) represent an operational
              liability. If a Semgrep customer suffers a security breach from a vulnerability class that Semgrep's Pro
              rules should have detected, the reputational and potential legal (negligence/warranty) exposure could be
              significant.


              **Performance degradation on large codebases:**

              Opengrep's 3.15x performance claim (full-repository benchmarks) suggests that Semgrep CE has accumulated
              technical debt in its scan engine. For enterprise customers with 100M+ LOC monorepos, slow scan times
              increase CI/CD cycle times, reducing developer experience quality and creating a procurement objection for
              performance-sensitive organizations.
