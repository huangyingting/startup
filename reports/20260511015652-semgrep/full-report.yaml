  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The application security testing competitive landscape has five meaningful categories relevant to Semgrep:
              (1) developer-first SAST/SCA peers that compete directly for the same buyer and user; (2) code-quality
              incumbents with security features; (3) enterprise SAST/SCA platform leaders; (4) the Opengrep fork as a
              free substitute for Semgrep's OSS community funnel; and (5) cloud security platforms extending into code
              scanning.


              Semgrep is not the largest SAST vendor by revenue or enterprise install base. The largest developer-first
              security company by revenue is Snyk ($407M 2025 revenue, $7.4–8.5B valuation, ~1,278 employees), which
              offers comparable SAST (Snyk Code), SCA (Snyk Open Source), Container, and IaC scanning. GitHub Advanced
              Security (GHAS) is structurally advantaged by being native to GitHub's 100M+ developer ecosystem and
              priced at $30/committer/month — identical to Semgrep Code. SonarQube holds the largest SAST install base
              by developer count (7M+ developers, 15% SAST market share) but competes primarily on code quality and
              technical debt rather than security-first analysis. Checkmarx One ($150M+ ARR, 860+ enterprise customers)
              leads the enterprise SAST/SCA segment.


              The Opengrep fork, launched January 23, 2025 by a 10-company consortium, directly threatens Semgrep's
              OSS-to-enterprise adoption funnel by offering free, restored CE-equivalent features under LGPL-2.1.
              Opengrep has 2,100+ GitHub stars, 26 releases, and claims 3.15x scan speed improvements in some benchmarks
              vs. Semgrep CE. Status-quo substitutes — manual code review, generic linters, and no-tool approaches —
              remain the most common alternative for companies that have not formalized an AppSec program.
