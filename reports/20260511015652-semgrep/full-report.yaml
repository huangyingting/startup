      - number: '8.2'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              **Investment Thesis (Bull):**

              Semgrep is the only enterprise AppSec platform that combines developer experience (fastest scan setup,
              lowest friction deployment), technical precision (Pro Engine interprocedural dataflow), and product
              breadth (SAST + SCA + Secrets + AI triage) in a single developer-native platform at $30/contributor/month.
              As the AppSec market grows from $8.6B to $25B+ by 2030, Semgrep is positioned to capture the growing
              enterprise developer security budget that requires more precision than GHAS native SAST while costing less
              than Snyk ($65–80K+/year enterprise) or Checkmarx ($100K+/year legacy). The PLG → enterprise motion (CE
              free → Teams → Enterprise → multi-product) creates a compounding acquisition engine that, once the
              enterprise direct sales function matures, could accelerate to $100M+ ARR within 24–36 months.


              **Anti-Thesis (Bear):**

              GitHub's structural distribution advantage means that GitHub Enterprise customers will default to GHAS +
              Copilot Autofix once feature parity with Semgrep Teams is achieved. This is a matter of "when," not "if."
              Simultaneously, the Opengrep fork undermines the top-of-funnel CE developer acquisition channel that
              Semgrep has historically relied on for PLG-to-Teams conversion. Without an independent top-of-funnel and
              without a distribution moat, Semgrep is a niche enterprise AppSec vendor with $33M ARR and a $400–750M
              Series D post-money that implies 12–22x ARR multiples — a challenging return profile if growth stalls. The
              investment thesis requires a narrow conjunction of events (rapid ARR growth + GHAS failing to achieve
              feature parity + Opengrep not gaining critical mass) that is not supported by strong disconfirming
              evidence for any element.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
