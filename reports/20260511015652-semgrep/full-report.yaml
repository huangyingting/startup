      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              The AppSec buyer landscape segments by organization size, budget ownership, and workflow entry point. In
              large enterprises (1,000+ employees), the CISO or AppSec program lead holds final budget authority;
              purchases are typically driven by regulatory mandates, breach experience, or board-level security program
              buildout. This segment controls 64% of AST market revenue by organization size (Business Research
              Insights). Security engineers are the primary users; procurement involves formal RFP, security
              questionnaire, and 90–180 day cycles.


              In mid-market and SMB segments, the VP Engineering or CTO drives purchases with limited CISO oversight.
              Semgrep's product-led growth (PLG) motion is particularly effective here: developers adopt the Community
              Edition organically, validate value in CI, and convert to Teams at $30/contributor/month. The free-to-paid
              transition is triggered by scale (>10 repositories) or security program formalization.


              Government and regulated verticals (BFSI, healthcare) exhibit different dynamics: compliance officers and
              formal procurement dominate, timelines are longer, and FedRAMP/HIPAA mandates create predictable demand.
              North America accounts for 35–42% of the global AST market by geography (consistent across Mordor,
              MarketsandMarkets, BRI), making it Semgrep's highest-priority market. Asia-Pacific is the fastest-growing
              region (22–25% CAGR) but with longer sales cycles and distinct regulatory frameworks.
            claimRefs:
              - CM010
              - CM011
              - CM012
              - CM013
