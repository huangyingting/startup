      - number: '5.4'
        title: Technology Differentiation and IP
        blocks:
          - type: paragraph
            body: >
              Semgrep's primary technical differentiation claims are:


              1. **Rule language and portability:** The Semgrep rule language (YAML-based pattern DSL) allows security
              engineers to write rules without deep compiler knowledge. A rule written for one language framework is
              typically adaptable to another in minutes. This portability creates network effects: 3,000+ community
              rules have been contributed by users for frameworks and languages that Semgrep's team has not prioritized.


              2. **Pro Engine dataflow precision:** Cross-file and cross-function taint analysis is computationally
              expensive; Semgrep implements it via compositional interprocedural analysis that scales to
              enterprise-sized codebases in reasonable scan times. Competitors like CodeQL (GitHub) also offer
              interprocedural analysis, but CodeQL requires a proprietary query language with a steep learning curve.
              Semgrep's claim is higher developer accessibility without sacrificing precision.


              3. **Reachability-aware SCA:** The Supply Chain product's reachability analysis (calling-graph computation
              on top of dependency graph) is a genuine technical differentiator in the SCA market. Most SCA tools flag
              all CVEs in the dependency graph regardless of code paths; Semgrep reduces this by 95%+ in published
              benchmarks.


              4. **Data moat via scan telemetry:** 75M+ annual scans generate anonymized pattern telemetry that informs
              rule quality and false-positive rates. This data advantage compounds over time if Semgrep can use it to
              train rule classifiers.


              5. **Speed:** Semgrep OSS is designed for developer-time feedback loops; scan times target <60 seconds for
              incremental scans on changed files. The Opengrep fork claims 3.15x performance improvement in full-repo
              benchmarks as of early 2025, which, if accurate, represents a competitive threat to Semgrep's developer
              experience advantage.


              **IP position:** No public patent portfolio identified. IP is primarily embedded in the Pro Engine's
              proprietary dataflow analysis and the Pro rule library. The OCaml engine source code is open (with license
              restriction post-Dec 2024). The Pro Engine and Pro rules are proprietary trade secrets.
            claimRefs:
