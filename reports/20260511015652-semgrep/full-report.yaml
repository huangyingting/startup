      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Semgrep has raised $204M in total funding across four rounds since its first institutional close in
              October 2020. The funding trajectory reflects rapid scaling from seed-stage infrastructure to a full
              enterprise AppSec platform over approximately five years. The most recent round, a $100M Series D
              announced February 5, 2025, was led by Menlo Ventures with participation from all existing investors:
              Felicis Ventures, Harpoon Ventures, Lightspeed Venture Partners, Redpoint Ventures, and Sequoia Capital.


              Prior to the Series D, Semgrep raised a $53M Series C in April 2023 led by Lightspeed Venture Partners.
              The Series B closed July 2021 and the Series A closed October 2020. The company is privately held and has
              not disclosed revenue metrics, margins, or annual recurring revenue publicly. Tracxn reports 257 employees
              as of March 2026. The Series D valuation has not been formally disclosed; contemporaneous reporting placed
              Semgrep in the unicorn range given the round size, sector comparables, and investor participation, though
              no official figure has been published. The funds are designated for AI and program analysis talent
              acquisition, product awareness expansion, and go-to-market team growth including geographic expansion in
              Europe and Asia-Pacific.


              The investor syndicate is composed entirely of institutional U.S. venture capital firms with no disclosed
              strategic or corporate investors. The absence of strategic investors preserves Semgrep's independence as a
              platform serving multiple enterprise customers who may also be technology partners or competitors of
              potential strategic investors. Semgrep's disclosure profile is private-undisclosed: no financial
              statements, ARR, or revenue growth metrics are publicly available as of May 2026.
