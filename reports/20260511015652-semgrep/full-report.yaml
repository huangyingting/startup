            title: Developer-first PLG motion captures the fastest-growing buyer segment
            body: >
              The mid-market developer-led buying pattern (bottom-up OSS to Teams to Enterprise) is the fastest-growing
              AppSec procurement model. Semgrep's free tier and PLG motion are structurally aligned with this shift,
              reducing CAC and enabling land-and-expand at scale.
            calloutType: strength
            claimRefs:
              - CM012
              - CM022
