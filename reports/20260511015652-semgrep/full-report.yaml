      - number: '5.3'
        title: Deployment, Integrations, and Roadmap
        blocks:
          - type: paragraph
            body: >
              **Deployment modes:**

              - CLI: `semgrep scan` runs locally against any git repository; requires Python 3 or Docker

              - CI/CD native: GitHub Actions, GitLab CI/CD, Jenkins, CircleCI, Azure DevOps, Bitbucket Pipelines —
              official action/plugin maintained by Semgrep

              - IDE plugins: VS Code extension, IntelliJ/JetBrains plugin, LSP-compatible editors

              - Managed Scanning: Semgrep deploys and maintains CI/CD configuration across all repositories via GitHub
              App or GitLab integration, eliminating per-team developer configuration burden

              - API: REST API for finding export, SBOM generation, and CI status webhook integration with JIRA, Linear,
              PagerDuty, Slack


              **Platform integrations:** Semgrep integrates with JIRA (ticket creation from findings), Slack (PR
              notifications), GitHub/GitLab Security Dashboards (SARIF output), Snyk dependency data (historical,
              pre-Snyk-compete overlap), and SIEM tools via webhook. SAML 2.0, Okta, Azure AD, and Google Workspace are
              supported for SSO.


              **Roadmap trajectory (2025–2026):**

              - AI-first direction: expanding Semgrep Assistant to auto-fix generation, IDE-first triage, and
              developer-facing remediation coaching

              - Managed Scanning GA: reducing time-to-deploy from hours to minutes for enterprise customers

              - Supply Chain expansion: broader reachability analysis for interpreted languages (Python, Ruby, PHP)

              - Geographic expansion: European and APAC data residency options to satisfy GDPR and regional data laws

              - Rule quality: continuous expansion of Pro rules library; community rules remain open
