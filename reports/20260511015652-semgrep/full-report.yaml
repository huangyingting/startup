    sections:
      - number: '1.1'
        title: Identity and Founding
        blocks:
          - type: paragraph
            body: >
              Semgrep, Inc. is an application security company headquartered in San Francisco, California. The legal
              entity was incorporated on May 15, 2017. The company was originally operated under the name r2c (Return to
              Corporation) before rebranding to Semgrep as the flagship open-source product gained traction. The
              founders—Isaac Evans, Drew Dennison, and Luke O'Malley—are all MIT electrical engineering and computer
              science graduates who met in Simmons Hall as undergraduates and began collaborating on security projects
              as students.


              The founding story began with the founders' shared frustration that software security was inaccessible to
              most developers, requiring specialized skills available only at a handful of large tech companies. In
              2016, the founders started exploring the software security landscape and in 2019 discovered a dormant
              open-source project called sgrep, originally built at Facebook. They revived and expanded it during an
              internal hackathon, adding broader language support and higher-level code analysis capabilities. In 2020
              the project was renamed Semgrep to reflect its new identity and broader mission.


              The company's mission is to "make it expensive to exploit software" by bringing world-class security tools
              to both software and security engineers. Semgrep's approach centers on extensibility: security rules look
              like the source code they analyze, enabling any developer—not just specialists—to write, share, and extend
              scanning rules. This democratization philosophy has powered a large open-source community and accelerated
              enterprise adoption. As of May 2026, Semgrep powers 75M+ source-code security scans per year across 40+
              programming languages and has shipped 100+ releases including weekly updates.
