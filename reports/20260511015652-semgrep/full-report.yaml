  - id: FE001
    title: Semgrep Product Architecture Stack
    type: stack
    data:
      layers:
        - label: Semgrep AppSec Platform (Cloud)
          modules:
            - Finding management and triage dashboard (semgrep.dev)
            - Semgrep Assistant — AI triage, auto-fix suggestions (LLM API)
            - Managed Scanning orchestration — centralized CI/CD deployment
            - Policy engine — rule configuration, blocking thresholds
            - SSO/SAML, SCIM, audit logging, reporting, REST API
        - label: Semgrep Pro Engine (Proprietary — Cloud-executed)
          modules:
            - Cross-file and cross-function taint / dataflow analysis
            - 20,000+ Pro rules library (OWASP, CWE, language-specific)
            - Reachability-aware SCA (call graph + CVE overlay)
            - Semgrep Secrets live validation engine
        - label: Semgrep OSS Core (Local execution — CLI / CI)
          modules:
            - OCaml static analysis engine — pattern matching and intra-procedural analysis
            - tree-sitter grammars for 40+ languages (AST parsing)
            - 3,000+ community rules (open registry)
            - SARIF / JSON output for CI/CD integration
        - label: CI/CD and IDE Integration Layer
          modules:
            - GitHub Actions, GitLab CI, Jenkins, CircleCI, Azure DevOps, Bitbucket Pipelines
            - VS Code extension, JetBrains plugin, LSP support
            - JIRA, Slack, PagerDuty, Linear webhook integrations
            - GitHub App (Managed Scanning trigger)
    approximationNotes: >-
      Layer boundaries are based on Semgrep public documentation. Pro Engine cloud execution boundary is inferred from
      documentation language about Pro Engine running on Semgrep infrastructure.
