      - number: '8.3'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              **Bull Case (20–25% probability):**

              ARR grows at 70–80% CAGR, reaching $100M+ in 2027 and $180M+ in 2028. NRR is 120%+ indicating strong
              expansion from the multi-product cross-sell (Code + SC + Secrets + Assistant). Enterprise direct sales
              function ramps to 50+ AEs by 2026. Series E at $1B+ valuation in 2026–2027. Exit via IPO or strategic
              acquisition (Google, Microsoft Azure, JetBrains, Palo Alto Networks) at $1.5–3B in 2027–2029. Return to
              Series D investors: 2–4x on invested capital.


              **Base Case (50–55% probability):**

              ARR grows at 40–60% CAGR, reaching $70M in 2027 and $120M in 2028. NRR is 105–115% indicating modest
              expansion. Enterprise direct sales ramps to 20–30 AEs. Series E at $500–800M valuation in 2027. Exit via
              strategic acquisition (Palo Alto, Broadcom/Symantec, Rapid7, Qualys) at $600M–$1.2B in 2028–2030. Return
              to Series D investors: 0.8–1.5x on invested capital at current price, depending on dilution from Series E.


              **Bear Case (20–30% probability):**

              ARR growth stalls below 30% YoY as Opengrep fork reduces CE top-of-funnel and GHAS adoption by enterprise
              customers impairs enterprise pipeline. NRR falls below 105% indicating churn or contraction. Series E
              financing is at flat or down-round valuation ($300–500M). Company executes strategic sale to a security
              acquirer (Broadcom, Tenable, HCL) or strategic recap at $200–350M. Return to Series D investors: 0.2–0.5x
              on invested capital with significant preference overhang dilution.


              The key swing factor is NRR: at NRR > 120%, the base case upgrades to bull; at NRR < 105%, the base case
              degrades to bear. This single metric, currently undisclosed, is the most important data point for
              investment thesis confirmation.
