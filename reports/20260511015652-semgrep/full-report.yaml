      - number: '7.2'
        title: Legal, License, and Regulatory Risks
        blocks:
          - type: paragraph
            body: >
              **Open source license change legal risk:**

              In December 2024, Semgrep modified the license for the CE rules repository from LGPL-2.1 to the Semgrep
              Open Source License (SOSL), a proprietary license restricting competing commercial use. LGPL-2.1 requires
              that relicensing of derivative works receive consent from all copyright contributors. The community rule
              registry contained contributions from thousands of developers under LGPL-2.1; if any contributor
              challenges the unilateral relicensing, Semgrep faces potential LGPL violation claims. No litigation has
              been filed as of May 2026, but community members on Hacker News and GitHub Discussions raised specific
              legal concerns about the transition process.


              **IP ownership and contributor agreements:**

              Semgrep's community contribution process (via GitHub pull requests) uses an implicit "inbound = outbound"
              licensing assumption rather than a formal Contributor License Agreement (CLA) for all rule contributions.
              If Semgrep does not have proper CLAs covering the 3,000+ community rules, the relicensing may be legally
              precarious.


              **FedRAMP Authorization gap:**

              Semgrep is classified as FedRAMP Ready but not Authorized. Without FedRAMP Authorization (In-Progress or
              full), Semgrep cannot be used in U.S. federal information systems, blocking the U.S. federal government
              sector entirely. FedRAMP Authorization typically takes 12–24 months once ATO (Authority to Operate)
              sponsorship is secured.


              **EU AI Act (potential scope):**

              The EU AI Act, which entered into force in August 2024, may impose obligations on AI-powered code scanning
              tools in categories affecting software development. Semgrep Assistant's AI-generated code fixes could be
              classified under limited-risk or general-purpose AI provisions, requiring transparency disclosures and
              documentation. Regulatory interpretation is pending; specific compliance obligations for developer tooling
              AI are unresolved.


              **Data privacy — GDPR:**

              Semgrep processes code snippets (including potentially personally identifiable developer data in code
              comments or variable names) on cloud infrastructure not yet offering EU data residency. GDPR Art. 44
              restrictions on international data transfers require Standard Contractual Clauses (SCCs); Semgrep's DPA
              covers SCCs, but EU data residency customers have flagged data transfer latency and compliance clarity as
              procurement concerns.
