              - CV014
          - type: callout
            title: Information asymmetry is structurally disadvantageous for current investors
            body: >
              Semgrep discloses no operating metrics. Management, existing investors, and employees have full
              information on ARR, NRR, churn, pipeline, and burn. External investors have $33.6M crowdsourced ARR,
              headcount estimates, and product documentation. This information asymmetry is standard for private
              growth-stage companies, but it means that current pricing reflects insider information that has not been
              validated externally. The data room confirmation items in the final diligence asks are the minimum
              required to reduce this asymmetry to investment-grade information quality.
            calloutType: risk
            claimRefs:
              - CV001
              - CV002
              - CV004
          - type: callout
            title: 'Most likely acquirer: Palo Alto Networks or CrowdStrike'
            body: >
              Strategic M&A is the most probable exit path for a base case scenario. Palo Alto Networks (Prisma Cloud
              platform, active AppSec M&A track record including Bridgecrew acquisition) and CrowdStrike (Falcon
              platform AppSec expansion) are the most likely strategic buyers. Both have the balance sheet capacity
              ($15B+ market cap), strategic rationale (developer-led AppSec is adjacent to their cloud security
              platforms), and track record of mid-market acquisitions in developer security. At $600M–$1.2B (base case),
              the acquisition is digestible for either buyer.
            calloutType: insight
            claimRefs:
              - CV022
              - CV023
              - CV025
