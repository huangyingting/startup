    sections:
      - number: '8.1'
        title: Investment Recommendation and Confidence
        blocks:
          - type: paragraph
            body: >
              **Recommendation: Conditional Interest — Invest Pending Data Room Confirmation**


              Semgrep is an investment-grade company in an investment-grade market with a differentiated technical
              product and strong developer brand. The investment case is **not structurally broken** but is **not
              actionable at current information quality** without data room access to confirm:

              1. Current ARR and YoY growth rate (the $33.6M estimate is 9 months old and crowdsourced)

              2. Net Revenue Retention (NRR) and cohort retention by tier (Teams vs. Enterprise)

              3. Actual cash burn, runway, and Series E timeline


              Without these three confirmations, a conviction buy recommendation is not supportable. With them, the
              recommendation could upgrade to **Conditional Buy** (if NRR > 120% and ARR growth > 60%) or downgrade to
              **Pass** (if NRR < 100% and growth < 30%).


              **Confidence level: Medium** — material evidence gaps in financial performance (all metrics undisclosed)
              prevent high-confidence recommendation.


              **Risk rating: Elevated** — competitive commoditization (GHAS), Opengrep fork, capital dependency, and key
              person risk are all present simultaneously; not acute but require active monitoring.


              **Valuation stance: Current valuation appears reasonable if ARR growth > 50% YoY** — at $33.6M ARR and
              50-80% YoY growth, a Series D valuation of $400–750M (12–22x ARR) is within range of developer security
              comparables. The valuation becomes stretched at 20–30% ARR growth and is cheap at 80%+ growth.
