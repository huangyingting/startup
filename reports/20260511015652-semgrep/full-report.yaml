        title: 'Platform Incumbents: Checkmarx, SonarQube, and Veracode'
        blocks:
          - type: paragraph
            body: >
              Checkmarx One is the dominant enterprise SAST/SCA platform, with $150M+ ARR (Oct 2025), 30%+ YoY ARR
              growth, 860+ large enterprise customers, and Gartner Magic Quadrant AST Leader status. Checkmarx competes
              in deals above $100K ACV where CISOs require breadth (SAST + DAST + SCA + API Security + ASPM), compliance
              documentation, and SOC 2/FedRAMP certification. Checkmarx's weakness is developer experience: its scan
              times, rule complexity, and UX are oriented toward security teams rather than developers. Semgrep's
              competitive opportunity in Checkmarx accounts is developer-led expansion into the engineering team before
              the CISO selects a platform.


              SonarQube/SonarCloud (SonarSource) holds the largest SAST install base by developer headcount: 7M+
              developers, 500,000+ organizations, with ~15% SAST market share. SonarQube's focus is code quality and
              technical debt alongside security; its 6,500+ rules are 85% quality-focused and 15% security-focused.
              Security detection efficacy benchmarks show Semgrep outperforms SonarQube on pure security findings (46%
              detection rate vs. 19% in independent 2026 tests). SonarQube's SAST competitive threat is modest for
              security-first buyers; however, its dominance as the default CI code quality tool means it often occupies
              the "security tool" budget line before Semgrep can land.


              Veracode (private equity, TA Associates/Francisco Partners) targets the enterprise compliance segment with
              3,000+ customers, including Fortune 500. Veracode's strength is audit-ready compliance documentation and
              DAST capabilities Semgrep does not offer. Its weakness is developer experience: scan-as-a-service is
              perceived as slow. Veracode is not a meaningful competitor for developer-led, mid-market PLG motions.
