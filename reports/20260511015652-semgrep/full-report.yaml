      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              **Expansion motion:**

              Semgrep's land-and-expand model operates at two levels: (1) within a customer, expanding from Code (SAST)
              to Supply Chain (SCA) to Secrets to Assistant ("breadth expansion") and (2) within a customer, expanding
              contributor count as more developers adopt Semgrep across teams ("seat expansion"). Both levers drive
              revenue growth without requiring new customer acquisition.


              The typical enterprise expansion progression: Teams tier adoption by one security engineer → pilot
              deployment to 3–5 teams → Managed Scanning enterprise-wide deployment → cross-sell Supply Chain and
              Secrets → platform ACV 2–4x initial contract.


              **Concentration risk:**

              No customer revenue concentration data is disclosed. Based on the named customer set (Figma, Dropbox,
              Slack, Snowflake, HashiCorp, GitLab, Shopify), the addressable base is heavily weighted toward large-cap
              tech companies with mature security programs and large engineering headcounts. This implies:

              - The top 10 customers likely represent 30–50% of ARR (estimated, not confirmed)

              - Loss of any named enterprise customer would be material at $33.6M total ARR

              - No evidence of distribution channel (reseller, MSSP, marketplace) customers at meaningful scale


              **Platform concentration risk from GitLab integration:**

              GitLab embeds Semgrep rules in GitLab Ultimate's SAST scanner. If GitLab were to switch to a different
              rule engine (e.g., built in-house or using CodeQL/Sonar rules), Semgrep would lose an indirect
              distribution channel. This is not a direct revenue dependency but a community/pipeline dependency.


              **Vertical concentration:**

              Semgrep's public customer references are concentrated in software-native companies. Expansion into
              regulated industries (financial services, healthcare, government) requires FedRAMP Authorization, HIPAA
              BAA, or sector-specific compliance certifications that Semgrep does not yet offer at scale, limiting the
              addressable market in those verticals.
