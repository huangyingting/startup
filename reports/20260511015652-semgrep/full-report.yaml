  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >
              Semgrep's product is a developer-first application security platform that scans source code at commit time
              — in the developer's IDE, in CI/CD pull requests, and in full-repository scheduled scans — to identify
              security vulnerabilities before they reach production. The platform is organized around four primary
              products:


              **Semgrep Code (SAST):** Static application security testing engine that finds security vulnerabilities by
              pattern matching and dataflow analysis against a library of 20,000+ Pro rules (curated by Semgrep
              engineers) and 3,000+ community rules. The Pro Engine adds cross-file and cross-function taint tracking,
              enabling detection of vulnerabilities that span multiple modules — the technical capability that most
              distinguishes Semgrep from simple pattern-match tools like grep or basic SAST scanners.


              **Semgrep Supply Chain (SCA):** Open-source dependency analysis that goes beyond simple CVE-list matching
              by applying reachability analysis — verifying whether a vulnerable function in a dependency is actually
              called by the application's code. This "reachability-aware SCA" dramatically reduces noise: Semgrep claims
              to surface only 2–5% of the CVEs flagged by list-matching SCA tools as "reachable" in a given codebase.


              **Semgrep Secrets:** Hardcoded credential detection for API keys, tokens, passwords, and private keys
              embedded in source code. Includes live validation (pinging endpoints to confirm a detected secret is
              active) and PR-blocking to prevent secrets from being merged.


              **Semgrep Assistant:** AI-powered triage and remediation layer, launched in 2024, built on top of large
              language models (likely OpenAI GPT-4 or Claude). Assistant automatically triages scan results, filters
              confirmed false positives, explains findings in natural language, and generates suggested code fixes.
              Assistant is bundled with Enterprise and optionally available in Teams tier.


              The customer workflow begins with developer self-service adoption via GitHub Actions or CLI (Community
              Edition → Teams upgrade), then expands to enterprise-wide deployment via direct sales with the Managed
              Scanning feature, which automates CI/CD configuration across all repositories without requiring per-team
              developer involvement.
