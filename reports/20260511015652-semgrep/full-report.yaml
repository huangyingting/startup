  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Semgrep's customer base consists of three distinct segments with fundamentally different acquisition
              dynamics, usage patterns, and revenue contribution:


              **Segment 1 — Community Edition (CE) / Open Source Users (Free):** Estimated hundreds of thousands of
              developers who use the Semgrep CLI for personal projects, side projects, or evaluated installations. This
              group contributes zero direct revenue but is the source of Semgrep's PLG pipeline. CE users generate the
              75M+ annual scan signals that provide telemetry for rule improvement. The December 2024 CE license
              restriction has created uncertainty in this segment, with the Opengrep fork offering an alternative CE
              path.


              **Segment 2 — Teams Tier (Self-Serve Paid):** Engineering teams at companies of 10–500 employees who have
              exceeded the CE free tier limits or need Pro rules, AI triage, or Secrets scanning. Buyer is typically an
              engineering lead or developer security champion. Purchase is self-serve via credit card or annual invoice.
              Customer economics: $30/contributor/month × 12 months = $360/contributor/year minimum. A 50-person
              engineering team paying $30/contributor would contribute ~$18K/year.


              **Segment 3 — Enterprise (Direct Sales):** Organizations with 500+ employees, typically CISO-led buying,
              requiring SSO/SAML, SCIM, audit logging, SLA, Managed Scanning, and security compliance documentation.
              This segment contributes the majority of ARR (estimated 60–70% based on typical PLG enterprise revenue
              mix). Average contract value is estimated at $50K–$300K/year based on comparable SAST enterprise vendors.
              Multi-year contracts are typical. Key verticals: SaaS/cloud-native, fintech, enterprise software, consumer
              technology.


              **Geographic concentration:** North America is the primary market (headquarters San Francisco; most named
              customers are U.S.-based). European and APAC expansion was announced as a Series D priority, but no
              European enterprise customer case studies have been published.


              **Vertical concentration:** The named customer set is concentrated in software-native companies (Figma,
              Dropbox, Slack, GitLab, Shopify) — companies with large engineering teams, sophisticated security
              programs, and developer-first cultures. This creates vertical concentration in "tech company" buyers
              rather than broad industry penetration.
