      - number: '4.2'
        title: GTM Motion and Sales Efficiency Proxies
        blocks:
          - type: paragraph
            body: >
              Semgrep's go-to-market motion is primarily product-led (bottom-up) with an emerging enterprise direct
              sales layer. The PLG motion is architected around three conversion events: (1) individual developer or
              small team adoption via GitHub Actions or CLI, (2) team-level upgrade at the $30/contributor/month Teams
              threshold, and (3) enterprise consolidation via direct sales contact.


              The PLG motion reduces traditional CAC significantly. For self-serve Teams tier customers, Semgrep's
              effective CAC is primarily the cost of developer marketing (conferences, open-source sponsorship,
              documentation, and community management) rather than traditional inside sales cycles. The February 2025
              Series D hired Garrett Souza as VP Sales, signaling a deliberate build-out of the direct enterprise sales
              motion. This represents a structural shift from pure PLG toward a hybrid model.


              SaaS PLG benchmarks (OpenView 2025) indicate PLG companies with a developer-first free tier typically
              achieve free-to-paid conversion rates of 3–8%, with CAC payback periods of 6–18 months at scale. Applying
              these benchmarks to Semgrep's 75M+ annual scans and 14,300+ GitHub stars suggests a substantial
              top-of-funnel, but the conversion efficiency is unverifiable without internal data.


              Sales cycle proxies: Enterprise sales cycles in the SAST/SCA market typically run 90–180 days for 500+
              employee organizations (CISO-level approval) and 30–60 days for mid-market engineering leader deals.
              Semgrep's Managed Scanning feature (handles CI/CD configuration on behalf of customers) reduces
              time-to-first-value from weeks to hours, a likely conversion accelerant.


              Revenue per employee: $33.6M ARR / 210 employees (Sept 2025) = ~$160K per employee. This is below top-tier
              SaaS benchmarks ($200–300K/employee) but consistent with growth-stage Series D companies with heavy
              engineering investment. Series D headcount expansion (257 employees per Tracxn, March 2026) suggests
              revenue is growing but employee count has also scaled.
