      - number: '7.5'
        title: People and Execution Risk
        blocks:
          - type: paragraph
            body: >
              **Key person dependency — co-founders:**

              Isaac Evans (CEO) and Drew Dennison (CTO) are the founding technical and commercial leaders. No succession
              plan, deputy CEO, or COO has been publicly named. The loss of either co-founder would be a material
              disruption to the company's technical roadmap and investor relationships. Both are active contributors to
              the company's public identity (blog posts, conference talks, media interviews).


              **Enterprise GTM execution risk:**

              Semgrep hired Garrett Souza as VP Sales in early 2025 as part of the Series D GTM investment. Building an
              enterprise direct sales function from near-zero to $50M+ ARR requires: (1) recruiting enterprise account
              executives with SAST/AppSec domain expertise, (2) building SDR and marketing operations, (3) developing
              enterprise procurement processes (security questionnaire responses, legal contract templates, renewal
              infrastructure). This is a known-hard organizational transition for engineering-led PLG companies; failure
              to execute typically shows up as ARR stagnation 12–18 months after the VP Sales hire.


              **Talent competition for OCaml engineers:**

              Semgrep's core analysis engine is written in OCaml, a specialized functional programming language with a
              limited talent pool. OCaml engineers command premium salaries and are recruited by Jane Street, Meta (Hack
              compiler), and other specialized employers. Semgrep's ability to maintain and extend the Pro Engine
              depends on a narrow specialized hiring pool.


              **Cultural transition from engineering-led to enterprise-sales organization:**

              Semgrep's founding culture is engineering-first, community-first. The shift to enterprise direct sales
              requires hiring sales, marketing, and customer success personnel who may have different incentive
              structures and cultural norms. Managing this transition while retaining engineering quality is a known
              execution challenge.
