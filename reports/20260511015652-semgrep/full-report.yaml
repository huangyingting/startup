      - number: '2.4'
        title: Growth Drivers
        blocks:
          - type: paragraph
            body: >
              Four structural tailwinds drive AppSec market growth through 2028 and directly benefit Semgrep.


              First, AI-generated code is creating a new vulnerability surface. Mordor Intelligence attributes +2.9% to
              the DevSecOps CAGR from this driver. Gartner (via Veracode) reports 65% of engineering leaders say teams
              already use AI tools. GitHub Octoverse 2024 reports a 59% surge in generative AI project contributions and
              98% increase in AI projects on GitHub in 2024. Sonatype's 2026 report confirms AI-assisted development is
              increasing dependency change velocity and introducing incorrect package selections. Semgrep's MCP server,
              AI-native rules, and vibe-coding security positioning directly address this need.


              Second, regulatory tailwinds are structural: the EU Cyber Resilience Act mandates vulnerability reporting
              within 24 hours by September 2026 and full enforcement by December 2027, with fines up to €15 million or
              2.5% of global turnover. Futurum Group's 2H 2025 survey (n=1,008) found 73.2% of organizations expect
              cybersecurity budget increases.


              Third, software supply chain attacks are accelerating: Sonatype identified 512,000+ malicious packages in
              2024; 97% of codebases contain open-source components (Black Duck OSSRA 2025). SBOM mandates are
              converting supply chain risk into a compliance procurement driver for Semgrep Supply Chain.


              Fourth, shift-left adoption is now mainstream: 56% of developers say their organization has adopted a
              DevSecOps platform (GitLab 2024); 72% of enterprises with 500+ employees have integrated SAST into
              pipelines (Grand View Research 2024).
