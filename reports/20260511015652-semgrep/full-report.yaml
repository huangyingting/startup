    Semgrep (formerly r2c) is a San Francisco-based application security platform founded in 2017 by Isaac Evans (CEO),
    Drew Dennison (CTO), and Luke O'Malley (CPO). The company builds developer-native security tooling centered on a
    high-performance static analysis engine written in OCaml that supports 40+ programming languages. Its platform
