      - number: '4.3'
        title: Cost Structure, Gross Margin, and Capital Intensity
        blocks:
          - type: paragraph
            body: >
              Semgrep is a cloud-hosted SaaS business with a developer tooling architecture. Cost of goods sold (COGS)
              consists primarily of: (1) cloud hosting for the scan execution layer and data pipeline (AWS/GCP), (2)
              CI/CD API integrations and webhook processing, (3) professional services headcount for enterprise
              implementation, and (4) third-party data feeds for Supply Chain vulnerability intelligence.


              Gross margin estimation: No public disclosure. Based on developer security SaaS benchmarks, gross margins
              of 75–80% are typical; companies with heavy professional services components (e.g., Veracode) have lower
              margins (~60–70%). Semgrep's architecture — a core static analysis engine with cloud-hosted rule execution
              — is inherently high-margin. The AI triage layer (Semgrep Assistant) adds LLM inference costs
              (OpenAI/Anthropic API costs), which could compress margins by 3–7% if not priced appropriately.


              Operating expenses: private. Estimated R&D at approximately 50–60% of ARR (typical for growth-stage
              developer tools), S&M at 40–50% of ARR (building enterprise GTM), and G&A at 10–15% of ARR. At $33.6M ARR,
              these estimates imply cash operating expenses of $45–75M annually, suggesting a negative FCF position of
              $15–40M/year at current scale.


              Capital intensity: Low. Static analysis software has no hardware manufacturing or physical asset
              requirements. Capex is minimal. Cloud costs scale with scan volume, creating a variable cost element at
              scale, but the incremental cost of each additional scan is very low once the infrastructure is
              provisioned.
