              IPO path requires:

              1. $100M+ ARR with 40%+ growth

              2. NRR > 115% demonstrating land-and-expand viability

              3. GAAP gross margin > 70% demonstrating SaaS economics

              4. Reduction in key person dependency (succession planning for CEO/CTO)

              5. FedRAMP Authorization for U.S. federal market access


              Strategic acquisition path is available at $200M–$1.5B+ depending on ARR, NRR, and buyer strategic fit.
              The most likely strategic acquirers in priority order: (1) Palo Alto Networks (active AppSec M&A, Prisma
              Cloud expansion); (2) JetBrains (developer tooling synergy, editor + SAST integration); (3) CrowdStrike
              (Falcon platform expansion to developer AppSec); (4) Google/GitHub indirect (via platform partnership with
              GHAS competitive threat).


