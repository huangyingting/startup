      - number: '3.4'
        title: Opengrep Fork and Status-Quo Substitutes
        blocks:
          - type: paragraph
            body: >
              Opengrep is uniquely positioned as both a competitive threat and an indicator of Semgrep's strategic
              error. Launched January 23, 2025 — two weeks before the Semgrep Series D announcement — by a consortium of
              Aikido Security, Endor Labs, Amplify Security, Jit, Orca Security, and Mobb, Opengrep restores the CE
              features (cross-function taint analysis, fingerprinting, tracking ignores, specific metavariables) that
              Semgrep restricted in December 2024. Opengrep is governed by a multi-vendor Open Governance Consortium,
              developed by a dedicated OCaml team, and released under LGPL-2.1. As of early 2026, Opengrep has 2,100+
              GitHub stars, 26 releases, 61+ contributors, and benchmarks showing 3.15x faster scan speed in certain
              rule-load scenarios.


              The Opengrep threat is specifically to Semgrep's OSS-to-enterprise adoption funnel. Organizations that
              would have used Semgrep CE as a free scanning layer — the entry point for eventual Teams/Enterprise
              conversion — can now use Opengrep with restored functionality and no commercial relationship with Semgrep
              Inc. Semgrep's PLG moat depends on Semgrep CE being the natural starting point; Opengrep erodes this by
              offering a genuinely compelling free alternative.


              Status-quo substitutes remain the most common alternative: ESLint (JavaScript), Bandit (Python),
              Flawfinder (C/C++), PMD (Java), GoSec (Go), and generic linters for other languages. These tools are
              fragmented across languages, lack cross-language orchestration, and have no rules marketplace — weaknesses
              Semgrep addresses. Manual code review, ad-hoc scripts, and no-tool approaches are the default for
              organizations at AppSec maturity level 1.
            claimRefs:
              - CP030
              - CP031
              - CP032
              - CP033
              - CP034
              - CP035
              - CP036
      - number: '3.5'
        title: Switching Costs, Lock-In, and Moat Durability
        blocks:
          - type: paragraph
            body: >
              Semgrep's competitive moats fall into three categories: community and rule network effects, technical
              differentiation, and GTM/distribution.


              The rule network effect is the most durable moat: Semgrep's 3,000+ community rules and 20,000+ commercial
              Pro rules represent years of contribution and institutional knowledge that cannot be replicated overnight.
              However, most OSS rules are YAML patterns that are portable to any rule-compatible engine — including
              Opengrep. The rule moat is strongest for the commercial Pro rule set, which is proprietary and licensed
              only to paying customers.


              Technical differentiation: Semgrep's Pro Engine provides cross-file and cross-function taint analysis in
              40+ languages at CI speeds — a combination competitors have not matched. CodeQL offers deeper semantic
              analysis but is 5-10x slower, making it suitable for nightly builds but not for every-commit PR checks.
              Semgrep's MCP server integration positions it uniquely for the AI coding assistant market (Cursor, VS
              Code, Claude Desktop).


              GTM and distribution: The OSS→Teams→Enterprise PLG motion enables land-and-expand with low CAC compared to
              direct enterprise sales. The risk is that GHAS's GitHub-native distribution eliminates this motion for
              GitHub-centric organizations that have not yet tried Semgrep. Semgrep's multi-VCS flexibility is its
              clearest counter.


              Switching costs are moderate: Semgrep CI integrations (GitHub Actions, GitLab CI, Jenkins) are standard
              YAML that takes 1-2 days to install and configure. Custom rules take longer to migrate; the Pro rule set
              is non-portable. Enterprise platform deals with SSO/SAML, SCIM provisioning, policy dashboards, and audit
              logs create modest stickiness. Net overall: Semgrep has real but not structural lock-in; churn risk is
              higher for free-tier and Teams-tier than Enterprise.
