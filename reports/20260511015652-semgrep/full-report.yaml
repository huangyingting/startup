  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: >
              Semgrep operates at the intersection of enterprise security software, open-source development, and
              AI-powered tooling — three domains with distinct and compounding risk profiles. The following seven risk
              categories are assessed from most to least severe based on potential investment impact:


              **1. Competitive commoditization (Critical):** GitHub Advanced Security (GHAS) + Copilot Autofix bundles
              SAST scanning and AI-powered code fixes into the GitHub Enterprise platform at zero marginal cost for
              existing GitHub Enterprise customers. Semgrep's core Teams tier and Semgrep Assistant value propositions
              are directly substitutable. This risk is structural and worsening: GitHub's distribution advantage (50M+
              developers) creates an asymmetric acquisition moat.


              **2. Open-source fork / community fragmentation (High):** The Opengrep fork (January 2025) directly
              threatens Semgrep's developer acquisition funnel. Opengrep claims 3.15x performance improvement, provides
              CE feature parity, and is licensed under AGPLv3 (fully open). If Opengrep reaches critical community mass,
              new developer installations will prefer Opengrep CE, starving Semgrep's PLG pipeline at the top of the
              funnel.


              **3. Financial opacity / capital risk (High):** All operating metrics are undisclosed. Estimated burn
              ($4–7M/month) against estimated cash position ($50–90M) implies a Series E financing window within 12–18
              months. If ARR growth has not accelerated sufficiently, fundraising at a flat or declining valuation
              becomes a structural risk, with potential for down-round or strategic pressure.


              **4. License legal risk (Medium-High):** The December 2024 license change modified the Semgrep CE license
              from LGPL-2.1 to a proprietary Semgrep Open Source License (SOSL) with restrictions on competing
              commercial use. This change may have created legal exposure if the transition did not comply with LGPL-2.1
              relicensing requirements (which typically require consent from all copyright contributors). No litigation
              has been filed, but the risk exists.


              **5. Regulatory / compliance risk (Medium):** FedRAMP Authorization gap blocks U.S. federal market. EU AI
              Act obligations for AI-assisted security tooling are ambiguous. GDPR data residency for EU customers is an
              incomplete capability.


              **6. Operational / technology dependency risk (Medium):** LLM API provider dependency (OpenAI/Anthropic)
              for Semgrep Assistant creates concentration and pricing risk. GitHub API dependency for primary CI/CD
              integration creates platform risk.


              **7. Key person / execution risk (Medium):** Co-founders Isaac Evans (CEO) and Drew Dennison (CTO) are the
              primary leaders with no disclosed succession plan. Series D GTM build-out (VP Sales hired) represents a
              new execution challenge for an engineering-led organization.
