  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Semgrep operates in the application security testing (AST) market, specifically the developer-first SAST,
              SCA, and secrets detection segment. The AST market broadly includes static analysis (SAST), dynamic
              analysis (DAST), interactive analysis (IAST), runtime protection (RASP), and software composition analysis
              (SCA) tools. Semgrep's addressable market excludes DAST, IAST, and RASP — categories where it does not
              currently compete — as well as penetration testing services, red-team consulting, and infrastructure
              security tools.


              The market boundary matters because analyst estimates range from $1.83 billion (MarketsandMarkets, narrow
              AST tool scope, 2025) to $11+ billion (Mordor Intelligence, broad DevSecOps platform scope, 2026). Neither
              extreme precisely reflects Semgrep's addressable segment; the developer-facing SAST/SCA/Secrets SAM is
              estimated at approximately $2–3 billion. Status-quo substitutes — manual code review, ad-hoc linting, and
              no-tool approaches — represent the largest single alternative Semgrep displaces, and winning these
              situations requires demonstrating speed, low false-positive rates, and minimal integration friction.
            claimRefs:
              - CM034
              - CM039
          - type: table
            tableRef: TM001
            claimRefs:
