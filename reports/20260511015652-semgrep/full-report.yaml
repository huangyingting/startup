      - number: '1.4'
        title: Product Platform and Scale
        blocks:
          - type: paragraph
            body: >
              Semgrep's commercial AppSec Platform comprises four interconnected products built on top of the
              open-source Semgrep engine. Semgrep Code (SAST) provides static application security testing with
              cross-file and cross-function taint analysis, supporting 30+ languages. Semgrep Supply Chain (SCA)
              performs reachability-aware software composition analysis, surfacing only vulnerabilities in code paths
              that are actually called rather than every CVE in every imported package. Semgrep Secrets detects
              hard-coded credentials using semantic analysis and entropy analysis with live credential validation.
              Semgrep Assistant is an AI layer that auto-triages findings, suppresses approximately 20% of SAST false
              positives on day one (improving to ~40% with codebase learning), generates remediation guidance, and can
              open pull requests with suggested code fixes.


              The open-source Semgrep Community Edition (CE) underpins the commercial platform and remains free under
              LGPL-2.1 for individual and non-commercial use. As of May 2026, the GitHub repository has accumulated
              14,300+ stars and is used by hundreds of thousands of developers including security engineers at GitLab,
              Dropbox, Slack, Figma, Shopify, HashiCorp, and Snowflake. The platform powers 75M+ code scans per year
              across 40+ languages and supports 3,000+ community-contributed rules. The commercial platform is sold as a
              SaaS product at $30/month/contributor for SAST or SCA (Teams tier) and $15/month/contributor for Secrets,
              with custom Enterprise pricing for large organizations and on-premises deployments.


              An MCP server released in 2025 enables AI coding assistants (Cursor, VS Code, Claude Desktop) to invoke
              Semgrep scans in real time during AI-assisted development, directly addressing the growing "vibe coding"
              risk of LLM-generated code containing security vulnerabilities. Semgrep's Managed Scanning feature handles
              CI/CD configuration on behalf of customers, reducing time-to-first-finding from weeks to hours.
            claimRefs:
              - CO033
              - CO034
              - CO035
              - CO036
              - CO037
              - CO038
              - CO039
              - CO040
              - CO041
      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >
              Semgrep's development from a dormant open-source project to a $204M-funded enterprise platform spans
              approximately nine years. The company's milestone trajectory is characterized by three phases: open-source
              community building (2017–2020), enterprise product expansion and funding acceleration (2021–2023), and
              AI-augmented platform scaling (2024–2026).


              The most significant adverse event in Semgrep's history is the December 2024 open-source license
              restriction. Semgrep renamed its OSS project to "Semgrep Community Edition," introduced a proprietary
              "Semgrep Rules License" restricting commercial use of rules, and migrated features including
              fingerprinting, tracking ignores, and certain metavariables from the Community Edition to the commercial
              platform. This triggered significant backlash from the security and developer community. On January 23,
              2025, a coalition of 10+ application security companies—including Aikido Security, Endor Labs, Amplify
              Security, Jit, Orca Security, and Mobb—launched Opengrep, a fork of the last fully-featured CE codebase,
              restoring the locked features under LGPL-2.1. Critics described the license change as a "rug pull" that
              alienated contributors who had invested in the Semgrep ecosystem. Semgrep defended the change as necessary
              to prevent competitors from commercializing its rules, and the underlying engine remains LGPL-2.1
              licensed. The Opengrep project has 2,100+ GitHub stars and a dedicated full-time OCaml development team as
              of early 2026.


              Despite the controversy, Semgrep announced the $100M Series D just two weeks after the Opengrep fork
              launch, suggesting investor confidence remained intact. The company added veterans from Palo Alto
              Networks, Snyk, and Matillion to its leadership team and articulated a clear roadmap toward autonomous
              AppSec engineering.
