              In conjunction with the February 2025 Series D, Semgrep made two strategic executive hires and one
              governance addition. Garrett Souza joined as Vice President of Sales, bringing enterprise sales experience
              from Matillion (SVP Americas) and Snyk (Enterprise Sales Leader). Mark McLaughlin, former CEO of Palo Alto
