        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              **Exit readiness:**

              Semgrep has multiple plausible exit paths: IPO (requires $100M+ ARR with 20%+ growth and a favorable
              market environment, likely 2028+ for base case), strategic acquisition by a cybersecurity platform (Palo
              Alto Networks, CrowdStrike, Broadcom, Rapid7, Tenable, JetBrains), or financial sponsor acquisition (PE or
