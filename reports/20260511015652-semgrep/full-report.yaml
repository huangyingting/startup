      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Semgrep closed a $100M Series D on February 5, 2025, led by Menlo Ventures with participation from
              Lightspeed, Redpoint, Sequoia, Felicis, and Harpoon. Total cumulative funding is $204M across four rounds.
              The Series D announcement specified deployment toward AI and program analysis talent, product awareness,
              and GTM (geographic expansion in Europe and Asia-Pacific).


              Burn rate estimate: With 257 employees in San Francisco (as of March 2026) and typical developer tooling
              company cost structures, estimated monthly cash burn is $4–7M, placing total annual cash consumption at
              $48–84M. This estimate incorporates payroll (~50–55% of burn at $200–250K average fully-loaded cost per
              employee), cloud infrastructure, and G&A.


              Runway estimate: If $80–90M of the $100M Series D remained undeployed immediately post-close (after
              account for pre-close costs and transition), and burn is $4–7M/month, runway extends approximately 13–22
              months from February 2025, placing the Series E financing window at approximately Q1 2026 – Q4 2026. Given
              the analysis date (May 2026), Semgrep may be approaching a financing inflection point within the next 6–12
              months absent meaningful ARR acceleration.


              Debt and project finance: No disclosed debt. The company is equity-funded exclusively. No project finance
              obligations, customer financing, or government contract requirements identified.


              Capital adequacy verdict: The $100M Series D provides adequate runway for a 12–24 month acceleration
              phase. The critical dependency is ARR growth: Semgrep must demonstrate a meaningful step-up from the
              $33.6M ARR base (e.g., toward $50–70M) to justify a Series E at a higher valuation. If ARR growth has
