  foundingLocation: "San Francisco, CA (formerly Cambridge, MA research lab)"
  headquarters: "San Francisco, CA"
  productSummary: >
    Semgrep Code (SAST): pattern-based and interprocedural static analysis for 40+ languages with 20,000+ Pro rules and a 3,000+ community rule library. Semgrep Supply Chain (SCA): reachability-aware open source dependency vulnerability analysis. Semgrep Secrets: live-validated secrets detection. Semgrep Assistant: AI-powered triage (false positive reduction) and code fix suggestion. Semgrep AppSec Platform: unified findings management, policy enforcement, and Managed Scanning for organization-wide deployment.
  customerFocus: "Enterprise and growth-stage technology companies with large developer teams; initial foothold via open-source CE installations (free, ≤10 repos), converting to Teams ($30/contributor/month) and Enterprise (custom ACV)."
  businessModel: "PLG → Enterprise: free CE tier drives developer adoption and top-of-funnel; Teams self-serve subscription ($30/contributor/month) converts developer teams; Enterprise direct sales for multi-product, multi-team deployments at custom ACV. GitLab OEM integration provides a partner distribution channel."
