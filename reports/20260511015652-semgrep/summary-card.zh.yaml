summary:
  headline: Semgrep 是具备投资级质量的开发者 AppSec 平台，技术护城河真实、开发者采用强；但 GitHub GHAS 带来的竞争风险和财务不透明度仍高， 数据室确认前不足以形成无条件确信，只能维持有条件兴趣。
