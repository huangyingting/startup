company:
  name: Semgrep
chapter:
  number: 8
  title: "Valuation"
  summary: >
    Semgrep warrants a Conditional Interest rating. The company has compelling developer adoption (75M+ annual OSS scans, 14,300+ stars), a differentiated technical moat (Pro Engine cross-file dataflow, 20,000+ Pro rules), a strong Series D ($100M, Menlo lead) at a plausible $400–750M post-money valuation, and is growing in an $8.6B → $25B+ AppSec market. However, the base case is constrained by three uncertainties: (1) ARR opacity — $33.6M estimate is crowdsourced with no official confirmation, (2) GitHub GHAS structural commoditization risk, and (3) NRR and cohort retention are entirely undisclosed. The bull case ($1–2B exit) requires 70%+ ARR CAGR over 4–5 years and a successful Series E at $1B+ entry; the bear case ($200–350M) reflects an Opengrep-stalled PLG funnel with ARR growth below 20%. Entry at current stage is only advisable for investors who can secure data room access, confirm ARR and NRR, and negotiate anti-dilution provisions — making this a Conditional Interest, not an unconditional conviction buy.

sections:
  - id: recommendation
    title: "Investment Recommendation and Confidence"
    body: |
      **Recommendation: Conditional Interest — Invest Pending Data Room Confirmation**

      Semgrep is an investment-grade company in an investment-grade market with a differentiated technical product and strong developer brand. The investment case is **not structurally broken** but is **not actionable at current information quality** without data room access to confirm:
      1. Current ARR and YoY growth rate (the $33.6M estimate is 9 months old and crowdsourced)
      2. Net Revenue Retention (NRR) and cohort retention by tier (Teams vs. Enterprise)
      3. Actual cash burn, runway, and Series E timeline

      Without these three confirmations, a conviction buy recommendation is not supportable. With them, the recommendation could upgrade to **Conditional Buy** (if NRR > 120% and ARR growth > 60%) or downgrade to **Pass** (if NRR < 100% and growth < 30%).

      **Confidence level: Medium** — material evidence gaps in financial performance (all metrics undisclosed) prevent high-confidence recommendation.

      **Risk rating: Elevated** — competitive commoditization (GHAS), Opengrep fork, capital dependency, and key person risk are all present simultaneously; not acute but require active monitoring.

      **Valuation stance: Current valuation appears reasonable if ARR growth > 50% YoY** — at $33.6M ARR and 50-80% YoY growth, a Series D valuation of $400–750M (12–22x ARR) is within range of developer security comparables. The valuation becomes stretched at 20–30% ARR growth and is cheap at 80%+ growth.
    tableRefs: [TV001]
    figureRefs: [FV001, FV004]
    claimRefs: [CV001, CV002, CV003, CV004, CV005]

  - id: thesis-antithesis
    title: "Investment Thesis and Anti-Thesis"
    body: |
      **Investment Thesis (Bull):**
      Semgrep is the only enterprise AppSec platform that combines developer experience (fastest scan setup, lowest friction deployment), technical precision (Pro Engine interprocedural dataflow), and product breadth (SAST + SCA + Secrets + AI triage) in a single developer-native platform at $30/contributor/month. As the AppSec market grows from $8.6B to $25B+ by 2030, Semgrep is positioned to capture the growing enterprise developer security budget that requires more precision than GHAS native SAST while costing less than Snyk ($65–80K+/year enterprise) or Checkmarx ($100K+/year legacy). The PLG → enterprise motion (CE free → Teams → Enterprise → multi-product) creates a compounding acquisition engine that, once the enterprise direct sales function matures, could accelerate to $100M+ ARR within 24–36 months.

      **Anti-Thesis (Bear):**
      GitHub's structural distribution advantage means that GitHub Enterprise customers will default to GHAS + Copilot Autofix once feature parity with Semgrep Teams is achieved. This is a matter of "when," not "if." Simultaneously, the Opengrep fork undermines the top-of-funnel CE developer acquisition channel that Semgrep has historically relied on for PLG-to-Teams conversion. Without an independent top-of-funnel and without a distribution moat, Semgrep is a niche enterprise AppSec vendor with $33M ARR and a $400–750M Series D post-money that implies 12–22x ARR multiples — a challenging return profile if growth stalls. The investment thesis requires a narrow conjunction of events (rapid ARR growth + GHAS failing to achieve feature parity + Opengrep not gaining critical mass) that is not supported by strong disconfirming evidence for any element.
    tableRefs: [TV002]
    figureRefs: []
    claimRefs: [CV006, CV007, CV008, CV009, CV010]

  - id: scenarios
    title: "Bull / Base / Bear Scenarios"
    body: |
      **Bull Case (20–25% probability):**
      ARR grows at 70–80% CAGR, reaching $100M+ in 2027 and $180M+ in 2028. NRR is 120%+ indicating strong expansion from the multi-product cross-sell (Code + SC + Secrets + Assistant). Enterprise direct sales function ramps to 50+ AEs by 2026. Series E at $1B+ valuation in 2026–2027. Exit via IPO or strategic acquisition (Google, Microsoft Azure, JetBrains, Palo Alto Networks) at $1.5–3B in 2027–2029. Return to Series D investors: 2–4x on invested capital.

      **Base Case (50–55% probability):**
      ARR grows at 40–60% CAGR, reaching $70M in 2027 and $120M in 2028. NRR is 105–115% indicating modest expansion. Enterprise direct sales ramps to 20–30 AEs. Series E at $500–800M valuation in 2027. Exit via strategic acquisition (Palo Alto, Broadcom/Symantec, Rapid7, Qualys) at $600M–$1.2B in 2028–2030. Return to Series D investors: 0.8–1.5x on invested capital at current price, depending on dilution from Series E.

      **Bear Case (20–30% probability):**
      ARR growth stalls below 30% YoY as Opengrep fork reduces CE top-of-funnel and GHAS adoption by enterprise customers impairs enterprise pipeline. NRR falls below 105% indicating churn or contraction. Series E financing is at flat or down-round valuation ($300–500M). Company executes strategic sale to a security acquirer (Broadcom, Tenable, HCL) or strategic recap at $200–350M. Return to Series D investors: 0.2–0.5x on invested capital with significant preference overhang dilution.

      The key swing factor is NRR: at NRR > 120%, the base case upgrades to bull; at NRR < 105%, the base case degrades to bear. This single metric, currently undisclosed, is the most important data point for investment thesis confirmation.
    tableRefs: [TV003]
    figureRefs: [FV003]
    claimRefs: [CV011, CV012, CV013, CV014, CV015]

  - id: comparables
    title: "Comparable Set and Valuation Context"
    body: |
      **Developer security public/private comparables:**

      Snyk is the closest public comparable: $350M+ ARR (2024 est.), $7.4B valuation (secondary market, 2024), implying ~21x forward ARR at scale. Snyk achieved this multiple at 100%+ NRR with $200M+ ARR; applying Snyk's multiple to Semgrep's $33.6M ARR implies a $700M valuation if ARR is growing 60%+ with 120%+ NRR — consistent with the Series D range.

      Checkmarx was acquired by Hellman & Friedman in 2022 at ~$1.15B on ~$100M ARR (~11.5x ARR), providing a strategic floor valuation for an enterprise AppSec platform of Semgrep's profile when it reaches $100M ARR.

      GitHub Advanced Security (GHAS) is bundled into GitHub Enterprise Cloud at enterprise tiers, with no disclosed separate ARR. GitHub's $7.5B acquisition by Microsoft in 2018 valued the full developer platform, not security specifically. GHAS is not a tradeable comparable but sets a reference point for the value embedded in GitHub's developer distribution.

      SonarSource (SonarQube) closed a $412M fundraise in 2022 at an undisclosed valuation from Warburg Pincus, providing a private comparable for developer-focused static analysis platforms; SonarSource is larger ($100M+ ARR) but confirms investor appetite for this category at scale.

      Veracode (acquired by Broadcom in 2023 for $550M from Broadcom after prior PE ownership) provides an M&A floor: a mature SAST/DAST vendor with $250M+ ARR sold to a large enterprise acquirer at ~2x ARR, reflecting legacy product discount but confirming strategic buyer demand.

      **Valuation sensitivity:**
      At Semgrep's $33.6M ARR, the implied valuation range is:
      - 10x ARR (legacy/stagnating): $336M (bear floor)
      - 15x ARR (moderate growth, 40% CAGR): $504M
      - 20x ARR (high growth, 60% CAGR): $672M
      - 30x ARR (hypergrowth, 80%+ CAGR, NRR > 120%): $1.0B+

      The Series D post-money valuation is estimated at $400–750M based on the $100M raise size, Menlo Ventures' typical check-to-ownership ratio (15–25%), and comparables in the developer security category.
    tableRefs: [TV004]
    figureRefs: [FV002]
    claimRefs: [CV016, CV017, CV018, CV019, CV020]

  - id: exit-diligence
    title: "Exit Readiness and Final Diligence Asks"
    body: |
      **Exit readiness:**
      Semgrep has multiple plausible exit paths: IPO (requires $100M+ ARR with 20%+ growth and a favorable market environment, likely 2028+ for base case), strategic acquisition by a cybersecurity platform (Palo Alto Networks, CrowdStrike, Broadcom, Rapid7, Tenable, JetBrains), or financial sponsor acquisition (PE or growth equity at $500M+ enterprise value). The Series D investor base (Menlo, Lightspeed, Sequoia) has strong IPO and M&A relationships; exit paths are available at multiple ARR milestones.

      IPO path requires:
      1. $100M+ ARR with 40%+ growth
      2. NRR > 115% demonstrating land-and-expand viability
      3. GAAP gross margin > 70% demonstrating SaaS economics
      4. Reduction in key person dependency (succession planning for CEO/CTO)
      5. FedRAMP Authorization for U.S. federal market access

      Strategic acquisition path is available at $200M–$1.5B+ depending on ARR, NRR, and buyer strategic fit. The most likely strategic acquirers in priority order: (1) Palo Alto Networks (active AppSec M&A, Prisma Cloud expansion); (2) JetBrains (developer tooling synergy, editor + SAST integration); (3) CrowdStrike (Falcon platform expansion to developer AppSec); (4) Google/GitHub indirect (via platform partnership with GHAS competitive threat).

      **Final diligence asks (minimum viable data room):**
      1. ARR as of Q1 2026 with YoY growth confirmation
      2. NRR and GRR for last 4 quarters by tier
      3. Cash burn, cash position, and Series E pipeline
      4. Customer count by tier (CE MAU, Teams, Enterprise)
      5. Legal opinion on LGPL-2.1 relicensing compliance and CLA status
      6. Enterprise AE headcount and 2025 direct sales new ARR attribution
    tableRefs: [TV005, TV006]
    figureRefs: []
    claimRefs: [CV021, CV022, CV023, CV024, CV025]

