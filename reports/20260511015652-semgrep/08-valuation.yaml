callouts:
  - calloutType: insight
    title: "NRR is the single most important missing data point"
    body: >
      Semgrep's investment thesis hinges on net revenue retention. If NRR is > 120% (expansion exceeds churn meaningfully), the PLG → Enterprise cross-sell motion is working and the bear case is improbable. If NRR is < 105%, the company is in early churn, the expansion thesis is not validated, and the valuation is stretched. Every other metric — ARR growth, enterprise pipeline, headcount — is secondary to NRR for resolving the current uncertainty in the investment recommendation.
    claimRefs: [CV003, CV015]

  - calloutType: insight
    title: "The base case requires a narrow conjunction of favorable conditions"
    body: >
      The base case assumes: Opengrep stays below critical mass, GHAS doesn't reach Pro Engine parity within 3 years, enterprise direct sales ramps successfully, and Series E is available at a flat-to-up valuation. Each of these conditions is individually uncertain; the conjunction of all four is meaningfully uncertain. This is not a thesis-break observation — all growth-stage investments require favorable conjunctions — but it argues for price discipline and position sizing consistent with elevated scenario uncertainty.
    claimRefs: [CV012, CV013, CV014]

  - calloutType: risk
    title: "Information asymmetry is structurally disadvantageous for current investors"
    body: >
      Semgrep discloses no operating metrics. Management, existing investors, and employees have full information on ARR, NRR, churn, pipeline, and burn. External investors have $33.6M crowdsourced ARR, headcount estimates, and product documentation. This information asymmetry is standard for private growth-stage companies, but it means that current pricing reflects insider information that has not been validated externally. The data room confirmation items in the final diligence asks are the minimum required to reduce this asymmetry to investment-grade information quality.
    claimRefs: [CV001, CV002, CV004]

  - calloutType: insight
    title: "Most likely acquirer: Palo Alto Networks or CrowdStrike"
    body: >
      Strategic M&A is the most probable exit path for a base case scenario. Palo Alto Networks (Prisma Cloud platform, active AppSec M&A track record including Bridgecrew acquisition) and CrowdStrike (Falcon platform AppSec expansion) are the most likely strategic buyers. Both have the balance sheet capacity ($15B+ market cap), strategic rationale (developer-led AppSec is adjacent to their cloud security platforms), and track record of mid-market acquisitions in developer security. At $600M–$1.2B (base case), the acquisition is digestible for either buyer.
    claimRefs: [CV022, CV023, CV025]

