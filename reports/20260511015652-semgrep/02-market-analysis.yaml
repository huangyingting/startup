chapter:
  number: 2
  title: "Market Analysis"
  summary: >
    The application security testing (AST) market is projected to grow from $1.83 billion in 2025 to $7.60 billion by 2031 (MarketsandMarkets, CAGR 26.7%); the broader DevSecOps platform market reaches $10.88–11.49 billion in 2026 across multiple analyst estimates. Semgrep's developer-facing SAST/SCA/Secrets SAM is estimated at $2–3 billion. Four structural tailwinds drive demand: AI-generated code expanding the attack surface, EU Cyber Resilience Act enforcement, software supply chain attacks, and shift-left DevSecOps adoption. Material constraints include SAST false positive rates of 30–70%, a 4.8-million-person cybersecurity talent gap, and rapid platform consolidation by incumbents. Semgrep's PLG motion from OSS to enterprise aligns with the mid-market developer-led buying pattern.

sections:
  - id: market-boundary-and-definition
    title: "Market Boundary and Definition"
    body: |
      Semgrep operates in the application security testing (AST) market, specifically the developer-first SAST, SCA, and secrets detection segment. The AST market broadly includes static analysis (SAST), dynamic analysis (DAST), interactive analysis (IAST), runtime protection (RASP), and software composition analysis (SCA) tools. Semgrep's addressable market excludes DAST, IAST, and RASP — categories where it does not currently compete — as well as penetration testing services, red-team consulting, and infrastructure security tools.

      The market boundary matters because analyst estimates range from $1.83 billion (MarketsandMarkets, narrow AST tool scope, 2025) to $11+ billion (Mordor Intelligence, broad DevSecOps platform scope, 2026). Neither extreme precisely reflects Semgrep's addressable segment; the developer-facing SAST/SCA/Secrets SAM is estimated at approximately $2–3 billion. Status-quo substitutes — manual code review, ad-hoc linting, and no-tool approaches — represent the largest single alternative Semgrep displaces, and winning these situations requires demonstrating speed, low false-positive rates, and minimal integration friction.
    tableRefs: [TM001]
    figureRefs: []
    claimRefs: [CM034, CM039]

  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and SOM"
    body: |
      The TAM for Semgrep's ecosystem is anchored by the global DevSecOps platform market, projected at $10.88 billion in 2026 by Mordor Intelligence (CAGR 22.1% through 2031) and $11.07–11.49 billion per Coherent Market Insights and Fortune Business Insights. These figures use the broadest definition, encompassing DevSecOps orchestration, CI/CD security automation, and compliance management alongside SAST/SCA tools. The narrower AST tool market — MarketsandMarkets' scope most directly comparable to Semgrep's product footprint — was $1.83 billion in 2025 (CAGR 26.7% to 2031), implying approximately $2.3 billion by 2026.

      The SCA standalone market (Grand View Research) grew from $266.2 million in 2023 at a 19.87% CAGR, projected to reach $880.6 million by 2030. These figures are consistent: Semgrep Supply Chain competes within this segment. Multiple analyst sources exhibit wide spread (2:1 to 6:1 ratio) largely explained by differing scope definitions, not methodological error.

      The SAM for Semgrep — developer-facing SAST/SCA/Secrets for CI/CD-integrated teams — is estimated at approximately $2–3 billion for 2026. Bottom-up validation: GitHub reports 100+ million total developers globally; if 10% are at organizations with formal AppSec programs, and each contributes $30/month at full conversion, the theoretical SOM ceiling exceeds $3.6 billion annually. In practice, penetration is far lower. Semgrep's realistic SOM in a 3–5 year horizon, assuming 6% share of SAM at current growth trajectory, is estimated at $150–300 million.
    tableRefs: [TM002]
    figureRefs: [FM001, FM002]
    claimRefs: [CM001, CM002, CM003, CM004, CM005, CM006, CM007, CM008, CM009]

  - id: buyer-segmentation
    title: "Buyer Segmentation and Adoption Path"
    body: |
      The AppSec buyer landscape segments by organization size, budget ownership, and workflow entry point. In large enterprises (1,000+ employees), the CISO or AppSec program lead holds final budget authority; purchases are typically driven by regulatory mandates, breach experience, or board-level security program buildout. This segment controls 64% of AST market revenue by organization size (Business Research Insights). Security engineers are the primary users; procurement involves formal RFP, security questionnaire, and 90–180 day cycles.

      In mid-market and SMB segments, the VP Engineering or CTO drives purchases with limited CISO oversight. Semgrep's product-led growth (PLG) motion is particularly effective here: developers adopt the Community Edition organically, validate value in CI, and convert to Teams at $30/contributor/month. The free-to-paid transition is triggered by scale (>10 repositories) or security program formalization.

      Government and regulated verticals (BFSI, healthcare) exhibit different dynamics: compliance officers and formal procurement dominate, timelines are longer, and FedRAMP/HIPAA mandates create predictable demand. North America accounts for 35–42% of the global AST market by geography (consistent across Mordor, MarketsandMarkets, BRI), making it Semgrep's highest-priority market. Asia-Pacific is the fastest-growing region (22–25% CAGR) but with longer sales cycles and distinct regulatory frameworks.
    tableRefs: [TM003]
    figureRefs: [FM003, FM004]
    claimRefs: [CM010, CM011, CM012, CM013, CM035, CM036, CM040, CM041]

  - id: growth-drivers
    title: "Growth Drivers"
    body: |
      Four structural tailwinds drive AppSec market growth through 2028 and directly benefit Semgrep.

      First, AI-generated code is creating a new vulnerability surface. Mordor Intelligence attributes +2.9% to the DevSecOps CAGR from this driver. Gartner (via Veracode) reports 65% of engineering leaders say teams already use AI tools. GitHub Octoverse 2024 reports a 59% surge in generative AI project contributions and 98% increase in AI projects on GitHub in 2024. Sonatype's 2026 report confirms AI-assisted development is increasing dependency change velocity and introducing incorrect package selections. Semgrep's MCP server, AI-native rules, and vibe-coding security positioning directly address this need.

      Second, regulatory tailwinds are structural: the EU Cyber Resilience Act mandates vulnerability reporting within 24 hours by September 2026 and full enforcement by December 2027, with fines up to €15 million or 2.5% of global turnover. Futurum Group's 2H 2025 survey (n=1,008) found 73.2% of organizations expect cybersecurity budget increases.

      Third, software supply chain attacks are accelerating: Sonatype identified 512,000+ malicious packages in 2024; 97% of codebases contain open-source components (Black Duck OSSRA 2025). SBOM mandates are converting supply chain risk into a compliance procurement driver for Semgrep Supply Chain.

      Fourth, shift-left adoption is now mainstream: 56% of developers say their organization has adopted a DevSecOps platform (GitLab 2024); 72% of enterprises with 500+ employees have integrated SAST into pipelines (Grand View Research 2024).
    tableRefs: [TM004]
    figureRefs: []
    claimRefs: [CM014, CM015, CM016, CM017, CM019, CM020, CM021, CM022, CM041, CM042]

  - id: adoption-constraints
    title: "Adoption Constraints and Risks"
    body: |
      Five material constraints limit AppSec adoption velocity and affect Semgrep specifically.

      Tool fatigue and false positives are the most acute. Traditional SAST false positive rates run 30–70% per multiple industry studies. Sixty-two percent of respondents in the Cypress Data Defense 2025 survey admitted releasing vulnerable code to meet deadlines. Latio's 2026 report describes AppSec as "a discipline in crisis." The consequence is alert fatigue: 58% of AppSec professionals encounter false positives frequently.

      Talent shortage compounds this: the global cybersecurity workforce gap is 4.8 million professionals (ISC2 2024). Only 30% of organizations consider themselves at a mature DevSecOps level (Checkmarx 2025). This creates both opportunity (automation substitutes for headcount) and adoption risk (under-resourced teams delay purchase).

      Market concentration risk exists: 43% of organizations are at the lowest AppSec maturity level (Gartner). This segment is accessible only via the free tier; conversion is complicated by the Opengrep fork offering a free alternative.

      Platform consolidation by incumbents is accelerating: enterprises managing 7+ security tools (Endor Labs) are consolidating toward platforms with broader code-to-cloud coverage. Checkmarx, Snyk, GitHub Advanced Security, and Wiz are building capabilities that overlap with Semgrep's. Latio 2026 notes the silent death of standalone ASPM as a category.
    tableRefs: []
    figureRefs: []
    claimRefs: [CM023, CM024, CM025, CM026, CM027, CM028, CM029, CM030, CM031, CM032, CM033]

