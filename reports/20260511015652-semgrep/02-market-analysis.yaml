callouts:
  - calloutType: strength
    title: "Structural tailwinds are multi-year and compounding"
    body: >
      AI-generated code, EU CRA enforcement, SBOM mandates, and shift-left DevSecOps adoption are not temporary trends — they compound across a 3-7 year horizon and directly expand the SAM for Semgrep's SAST/SCA/Secrets platform.
    claimRefs: [CM014, CM016, CM019, CM022]

  - calloutType: strength
    title: "Developer-first PLG motion captures the fastest-growing buyer segment"
    body: >
      The mid-market developer-led buying pattern (bottom-up OSS to Teams to Enterprise) is the fastest-growing AppSec procurement model. Semgrep's free tier and PLG motion are structurally aligned with this shift, reducing CAC and enabling land-and-expand at scale.
    claimRefs: [CM012, CM022, CM039]

  - calloutType: risk
    title: "Wide analyst estimate spread signals immature market definition"
    body: >
      The 6:1 spread between narrow AST tool estimates ($1.83B) and broad DevSecOps platform estimates ($11B) reflects fundamental definitional disagreement. Semgrep's TAM claims depend on which definition investors accept; the narrower definition makes the company look like a $1-2B market player rather than a $10B market player.
    claimRefs: [CM001, CM002, CM007]

  - calloutType: risk
    title: "Platform consolidation by incumbents threatens standalone SAST/SCA positioning"
    body: >
      Latio 2026 and Endor Labs both document enterprise consolidation away from point solutions. GitHub Advanced Security, Snyk, Checkmarx One, and Wiz are building unified platforms; Semgrep may need code-to-cloud coverage to remain competitive at enterprise scale.
    claimRefs: [CM029, CM031, CM033]

