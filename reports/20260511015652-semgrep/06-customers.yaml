callouts:
  - calloutType: strength
    title: "Named customers are marquee software-native enterprises — strong proof of concept"
    body: >
      Figma, Dropbox, Slack, Snowflake, and Shopify represent tier-1 software engineering organizations with sophisticated security programs. These references validate Semgrep's fit for the most demanding engineering environments and reduce perception risk for mid-market buyers. The Figma case study (custom rule authoring, CI/CD enforcement) is particularly strong as evidence of deep product adoption rather than evaluation or partial deployment.
    claimRefs: [CU012, CU013, CU014, CU015]

  - calloutType: risk
    title: "No customer count or NRR disclosed — no verifiable evidence of retention quality"
    body: >
      Without customer count, NRR, GRR, or churn rate disclosures, it is impossible to distinguish between a growing, retaining business and one with a stagnant or declining customer base. At $33.6M ARR, a 10% annual churn rate would consume all gross new ARR growth from 35+ new customers annually — a meaningful treadmill effect. Retention data is a tier-1 diligence requirement.
    claimRefs: [CU019, CU020, CU023]

  - calloutType: risk
    title: "Customer base heavily concentrated in U.S. software-native tech companies"
    body: >
      The public reference set (Figma, Dropbox, Snowflake, HashiCorp, Shopify, Slack) consists entirely of U.S.-based software companies. If U.S. tech sector hiring and security budgets contract, Semgrep's customer expansion would be impaired. Geographic and vertical diversification into financial services, healthcare, government, or European enterprise is underdeveloped, limiting addressable market growth.
    claimRefs: [CU004, CU027, CU028]

  - calloutType: insight
    title: "GitLab OEM integration is a double-edged reference — validates quality but creates substitution risk"
    body: >
      GitLab embedding Semgrep rules in its native SAST scanner (GitLab Ultimate) is a strong technical quality signal visible to millions of GitLab users. However, it also means Semgrep rules function as a free embedded feature rather than a purchased product for GitLab's user base. If GitLab builds or buys its own rule engine, this indirect distribution channel disappears without any direct ARR impact.
    claimRefs: [CU016, CU029]

