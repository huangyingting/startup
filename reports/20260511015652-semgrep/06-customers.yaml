artifact: customers
slug: semgrep
runDate: "2026-05-11"
company:
  name: Semgrep
chapter:
  number: 6
  title: "Customers"
  summary: >
    Semgrep's customer base spans individual developers (Community Edition, free), engineering teams (Teams tier), and enterprise organizations (custom Enterprise contracts). Named enterprise customers include Figma, Dropbox, Slack, Snowflake, HashiCorp, GitLab, and Shopify, validating adoption among high-profile software-native companies. Public traction signals — 75M+ annual scans, 14,300+ GitHub stars, 30+ G2 reviews averaging 4.5/5 — indicate a healthy developer-led adoption funnel. However, the customer count by tier, net revenue retention, gross revenue retention, and churn rate are all undisclosed. The primary expansion motion is cross-sell within the AppSec platform (Code → Supply Chain → Secrets → Assistant), enabled by Managed Scanning for enterprise deployment at scale.

sections:
  - id: customer-base-segmentation
    title: "Customer Base Segmentation"
    body: |
      Semgrep's customer base consists of three distinct segments with fundamentally different acquisition dynamics, usage patterns, and revenue contribution:

      **Segment 1 — Community Edition (CE) / Open Source Users (Free):** Estimated hundreds of thousands of developers who use the Semgrep CLI for personal projects, side projects, or evaluated installations. This group contributes zero direct revenue but is the source of Semgrep's PLG pipeline. CE users generate the 75M+ annual scan signals that provide telemetry for rule improvement. The December 2024 CE license restriction has created uncertainty in this segment, with the Opengrep fork offering an alternative CE path.

      **Segment 2 — Teams Tier (Self-Serve Paid):** Engineering teams at companies of 10–500 employees who have exceeded the CE free tier limits or need Pro rules, AI triage, or Secrets scanning. Buyer is typically an engineering lead or developer security champion. Purchase is self-serve via credit card or annual invoice. Customer economics: $30/contributor/month × 12 months = $360/contributor/year minimum. A 50-person engineering team paying $30/contributor would contribute ~$18K/year.

      **Segment 3 — Enterprise (Direct Sales):** Organizations with 500+ employees, typically CISO-led buying, requiring SSO/SAML, SCIM, audit logging, SLA, Managed Scanning, and security compliance documentation. This segment contributes the majority of ARR (estimated 60–70% based on typical PLG enterprise revenue mix). Average contract value is estimated at $50K–$300K/year based on comparable SAST enterprise vendors. Multi-year contracts are typical. Key verticals: SaaS/cloud-native, fintech, enterprise software, consumer technology.

      **Geographic concentration:** North America is the primary market (headquarters San Francisco; most named customers are U.S.-based). European and APAC expansion was announced as a Series D priority, but no European enterprise customer case studies have been published.

      **Vertical concentration:** The named customer set is concentrated in software-native companies (Figma, Dropbox, Slack, GitLab, Shopify) — companies with large engineering teams, sophisticated security programs, and developer-first cultures. This creates vertical concentration in "tech company" buyers rather than broad industry penetration.
    tableRefs: [TU001]
    figureRefs: [FU001]
    claimRefs: [CU001, CU002, CU003, CU004, CU005]

  - id: adoption-trajectory
    title: "Adoption Trajectory and Public Traction"
    body: |
      Semgrep's publicly observable adoption metrics paint a picture of strong developer community adoption, with more limited visibility into commercial traction:

      **Community metrics (high confidence, publicly verified):**
      - 75M+ annual code scans — company-claimed as of 2025; represents the total scan count across all CE + paid tiers
      - 14,300+ GitHub stars — verifiable on github.com/semgrep/semgrep; above-average for developer security tools
      - 3,000+ community rules contributed by external developers — evidence of ecosystem depth
      - 40+ languages supported — broad language coverage reducing friction for polyglot organizations

      **Review platform metrics (medium confidence):**
      - G2: 30+ reviews, average rating 4.5/5 as of early 2026; most positive reviews highlight rule accuracy and developer-friendliness; most negative reviews cite false positive noise on community rules and CI performance overhead
      - Gartner Peer Insights: limited data; Semgrep is not yet listed in the Gartner Magic Quadrant for Application Security Testing (as of 2025; Snyk, Checkmarx, and Veracode dominate)
      - Capterra and PeerSpot: smaller review sets; consistent with G2 sentiment

      **Revenue proxy traction:**
      - ARR ~$33.6M (Latka, Sept 2025 est.) with 210 employees — implied customer base of 100–400 paid accounts at typical SAST enterprise ACV ranges
      - Revenue per employee at $160K/employee is below peak developer SaaS benchmarks but consistent with growth-stage expansion

      **Adoption freshness risk:** The December 2024 CE license restriction and the January 2025 Opengrep fork represent a potential inflection point in new CE adoption. If new developer installations are migrating to Opengrep rather than Semgrep CE, the top-of-funnel CE acquisition rate may be decelerating, which would eventually slow Teams and Enterprise pipeline growth.
    tableRefs: [TU002]
    figureRefs: [FU002]
    claimRefs: [CU006, CU007, CU008, CU009, CU010, CU011]

  - id: named-customer-proof
    title: "Named Customer Evidence"
    body: |
      Semgrep has published named customer references and case study blog posts for several high-profile organizations. The quality of evidence varies by customer:

      **Figma:** Public blog post and Semgrep landing page reference confirm production use of Semgrep Code for SAST at scale across Figma's engineering team. Figma has a 150+ person engineering organization and uses Semgrep to enforce custom security rules in CI/CD, with specific rules written by their security team. This is a high-quality enterprise reference — production deployment, custom rule authoring, and engineering team-specific outcomes.

      **Dropbox:** Semgrep published a case study on Dropbox's use of Semgrep for developer-led security remediation. Dropbox is a large engineering org (1,000+ engineers) using Semgrep to scale security review coverage without growing the security team proportionally. High reference quality.

      **GitLab:** GitLab, both a competitor (native CI/CD with SAST) and a customer, uses Semgrep CE rules in GitLab Ultimate's SAST scanner under an OEM/integration arrangement. This represents a partnership-as-distribution dynamic. GitLab embedding Semgrep rules validates technical quality but also means GitLab can switch rule engines at any time.

      **Snowflake:** Named on Semgrep's customer page; no detailed case study published as of May 2026. Snowflake has a large engineering team and complex codebase; the reference implies enterprise-grade deployment.

      **HashiCorp:** Named on Semgrep's customer page; blog posts reference HashiCorp engineers contributing community rules. This is a developer-community engagement rather than a direct commercial reference.

      **Slack (acquired by Salesforce):** Named customer; Slack's engineering team adopted Semgrep for custom rule enforcement pre-Salesforce acquisition. Reference freshness is uncertain (Slack engineering org post-acquisition may have different tooling).

      **Shopify:** Named on Semgrep customer page; Shopify has a significant security engineering team. No detailed case study; reference indicates enterprise-level deployment.
    tableRefs: [TU003]
    figureRefs: [FU003]
    claimRefs: [CU012, CU013, CU014, CU015, CU016, CU017, CU018]

  - id: retention-satisfaction
    title: "Retention, Durability, and Satisfaction"
    body: |
      Semgrep has not publicly disclosed customer retention metrics (NRR, GRR, churn, renewal rates, or cohort data). All estimates below are author-derived from industry benchmarks and behavioral signals:

      **Enterprise tier retention proxy:** Enterprise contracts with SSO/SAML, SCIM, Managed Scanning, and multi-year commitments have structurally high switching costs. SAST tools, once deployed via Managed Scanning across an organization's full repository set, require security teams to reconfigure CI/CD, migrate finding histories, retrain developer habits, and re-certify the new tool for compliance purposes. This creates natural stickiness analogous to other developer infrastructure tools. Estimated enterprise GRR: 85–95%.

      **Teams tier retention proxy:** Self-serve Teams tier customers have lower switching costs — migration requires changing the GitHub Actions workflow file and moving rules. However, once an engineering team has customized rules and integrated findings into their JIRA workflow, switching friction is non-trivial. Estimated Teams tier GRR: 70–85%.

      **CE / Free tier retention:** CE users are by definition not revenue-contributing; CE "retention" (continued use of Semgrep CE rather than migrating to Opengrep) is unverifiable. The December 2024 license change may have accelerated CE churn toward Opengrep.

      **G2 satisfaction signals:** 4.5/5 average across 30+ reviews indicates strong developer satisfaction. Common positive themes: rule quality, ease of rule writing, CI integration, low friction. Common negative themes: Pro Engine scan latency on large codebases, community rule false positive rate, documentation depth for advanced use cases.

      **NPS proxy:** Semgrep has not published Net Promoter Score data. The consistent G2 positive reviews and active community rule contribution (3,000+ community rules) suggest a developer Net Promoter Score above 50, which is typical for developer tools with strong OSS community engagement.
    tableRefs: [TU004]
    figureRefs: [FU004]
    claimRefs: [CU019, CU020, CU021, CU022, CU023, CU024]

  - id: expansion-concentration
    title: "Expansion Dynamics and Concentration Risk"
    body: |
      **Expansion motion:**
      Semgrep's land-and-expand model operates at two levels: (1) within a customer, expanding from Code (SAST) to Supply Chain (SCA) to Secrets to Assistant ("breadth expansion") and (2) within a customer, expanding contributor count as more developers adopt Semgrep across teams ("seat expansion"). Both levers drive revenue growth without requiring new customer acquisition.

      The typical enterprise expansion progression: Teams tier adoption by one security engineer → pilot deployment to 3–5 teams → Managed Scanning enterprise-wide deployment → cross-sell Supply Chain and Secrets → platform ACV 2–4x initial contract.

      **Concentration risk:**
      No customer revenue concentration data is disclosed. Based on the named customer set (Figma, Dropbox, Slack, Snowflake, HashiCorp, GitLab, Shopify), the addressable base is heavily weighted toward large-cap tech companies with mature security programs and large engineering headcounts. This implies:
      - The top 10 customers likely represent 30–50% of ARR (estimated, not confirmed)
      - Loss of any named enterprise customer would be material at $33.6M total ARR
      - No evidence of distribution channel (reseller, MSSP, marketplace) customers at meaningful scale

      **Platform concentration risk from GitLab integration:**
      GitLab embeds Semgrep rules in GitLab Ultimate's SAST scanner. If GitLab were to switch to a different rule engine (e.g., built in-house or using CodeQL/Sonar rules), Semgrep would lose an indirect distribution channel. This is not a direct revenue dependency but a community/pipeline dependency.

      **Vertical concentration:**
      Semgrep's public customer references are concentrated in software-native companies. Expansion into regulated industries (financial services, healthcare, government) requires FedRAMP Authorization, HIPAA BAA, or sector-specific compliance certifications that Semgrep does not yet offer at scale, limiting the addressable market in those verticals.
    tableRefs: [TU005]
    figureRefs: []
    claimRefs: [CU025, CU026, CU027, CU028, CU029, CU030]

