callouts:
  - calloutType: risk
    title: "GHAS is a distribution moat Semgrep cannot replicate"
    body: >
      GitHub Advanced Security is natively embedded in every GitHub Enterprise Cloud/Server deployment. For organizations using GitHub — the dominant VCS — GHAS removes the need to find, evaluate, and onboard a separate vendor. Semgrep's PLG funnel depends on developers discovering it independently; GHAS short-circuits that discovery motion.
    claimRefs: [CP003, CP016, CP039]

  - calloutType: risk
    title: "Opengrep directly attacks Semgrep's OSS adoption funnel"
    body: >
      The December 2024 license restriction created an unforced error that resulted in a well-funded free competitor. Opengrep has a dedicated OCaml development team, open governance, and performance benchmarks that outperform Semgrep CE in some scenarios. Every developer who adopts Opengrep instead of Semgrep CE is a lost top-of-funnel entry that will never convert to Teams or Enterprise.
    claimRefs: [CP030, CP031, CP032, CP033, CP034]

  - calloutType: strength
    title: "No competitor matches Semgrep's SAST+SCA+Secrets+AI in one PLG platform at mid-market price"
    body: >
      Checkmarx One offers more enterprise breadth but at enterprise-only pricing (no self-serve). Snyk offers comparable PLG pricing but lacks integrated Secrets and AI triage. GHAS lacks SCA reachability and is GitHub-only. Semgrep is uniquely positioned as the only vendor offering a four-product AppSec platform at a developer-first price point accessible to mid-market buyers.
    claimRefs: [CP013, CP014, CP017, CP018, CP038]

  - calloutType: insight
    title: "The competitive dynamic favors platform over point tools — Semgrep must continue broadening"
    body: >
      Latio 2026 and enterprise buyer research confirm consolidation toward unified platforms. Semgrep's current four-product platform (Code, Supply Chain, Secrets, Assistant) is ahead of Snyk in integration completeness at equivalent price points, but must continue expanding (DAST, IaC, ASPM) to remain competitive in enterprise platform evaluations against Checkmarx and Wiz.
    claimRefs: [CP029, CP040, CP041]

