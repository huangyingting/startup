company:
  name: Semgrep
chapter:
  number: 3
  title: "Competitors"
  summary: >
    Semgrep faces competition across four vectors: developer-first peers (Snyk, GHAS/CodeQL), quality-first incumbents (SonarQube), enterprise platform leaders (Checkmarx One, Veracode), and an existential fork threat (Opengrep). Snyk — $407M 2025 revenue, $7.4–8.5B valuation — is the most direct competitor, while GitHub Advanced Security (GHAS) leverages GitHub's 100M+ developer distribution as a structural distribution moat. Checkmarx One ($150M+ ARR, 860+ enterprise customers) dominates the large-enterprise SAST segment. Semgrep's core moats — rule extensibility, multi-language OSS community, and developer-first PLG motion — are durable in the mid-market but increasingly pressured at enterprise scale by platform consolidation.

sections:
  - id: competitive-landscape-overview
    title: "Competitive Landscape Overview"
    body: |
      The application security testing competitive landscape has five meaningful categories relevant to Semgrep: (1) developer-first SAST/SCA peers that compete directly for the same buyer and user; (2) code-quality incumbents with security features; (3) enterprise SAST/SCA platform leaders; (4) the Opengrep fork as a free substitute for Semgrep's OSS community funnel; and (5) cloud security platforms extending into code scanning.

      Semgrep is not the largest SAST vendor by revenue or enterprise install base. The largest developer-first security company by revenue is Snyk ($407M 2025 revenue, $7.4–8.5B valuation, ~1,278 employees), which offers comparable SAST (Snyk Code), SCA (Snyk Open Source), Container, and IaC scanning. GitHub Advanced Security (GHAS) is structurally advantaged by being native to GitHub's 100M+ developer ecosystem and priced at $30/committer/month — identical to Semgrep Code. SonarQube holds the largest SAST install base by developer count (7M+ developers, 15% SAST market share) but competes primarily on code quality and technical debt rather than security-first analysis. Checkmarx One ($150M+ ARR, 860+ enterprise customers) leads the enterprise SAST/SCA segment.

      The Opengrep fork, launched January 23, 2025 by a 10-company consortium, directly threatens Semgrep's OSS-to-enterprise adoption funnel by offering free, restored CE-equivalent features under LGPL-2.1. Opengrep has 2,100+ GitHub stars, 26 releases, and claims 3.15x scan speed improvements in some benchmarks vs. Semgrep CE. Status-quo substitutes — manual code review, generic linters, and no-tool approaches — remain the most common alternative for companies that have not formalized an AppSec program.
    tableRefs: [TP001]
    figureRefs: [FP001]
    claimRefs: [CP001, CP002, CP003, CP004, CP005, CP006, CP007, CP008, CP009, CP010]

  - id: direct-peers
    title: "Direct Developer-First Peers: Snyk and GitHub Advanced Security"
    body: |
      Snyk is the most direct competitor to Semgrep across product, market, and GTM motion. Snyk Code (SAST, powered by DeepCode AI acquisition, 2020), Snyk Open Source (SCA), Snyk Container, and Snyk Infrastructure as Code overlap all four of Semgrep's commercial products. Snyk's $407M 2025 revenue and 5,000+ customers demonstrate validated enterprise demand for developer-first AppSec. However, Snyk's 2023 layoffs (12% headcount reduction) and decelerated revenue growth suggest the hypergrowth phase has concluded, and the company is optimizing for profitability ahead of a potential IPO or strategic exit. Snyk's pricing overlaps Semgrep's ($25–30/developer/month for SAST); the key competitive dimension is ecosystem breadth (Snyk has Container/IaC; Semgrep has more flexible SAST rule authoring).

      GitHub Advanced Security (GHAS) represents a structural distribution threat rather than a product technology threat. GHAS is powered by CodeQL (acquired by GitHub 2019), Dependabot (SCA), and Secret Scanning. The March 2025 rebrand split GHAS into two products: GitHub Code Security ($30/committer/month) and GitHub Secret Protection ($19/committer/month). GitHub Copilot Autofix generates PR-ready code patches directly in pull requests, creating a seamless developer UX. GHAS's structural advantage is GitHub's 100M+ developer ecosystem: for any organization using GitHub, GHAS is already present in the platform and requires no additional vendor relationships. Many security teams run both GHAS and Semgrep — CodeQL for deep nightly semantic analysis, Semgrep for fast PR-level pattern-matching — reducing zero-sum competitive dynamics.

      Semgrep's differentiation vs. both: (1) multi-VCS support (GitLab, Bitbucket, Azure DevOps) vs. GHAS's GitHub-only deployment; (2) 40+ language support vs. CodeQL's ~12 languages; (3) YAML-based custom rule authoring vs. CodeQL's SQL-like query language; (4) integrated Secrets/SCA/SAST/AI platform vs. GHAS's module-separated billing.
    tableRefs: [TP002, TP003]
    figureRefs: []
    claimRefs: [CP011, CP012, CP013, CP014, CP015, CP016, CP017, CP018, CP019, CP020]

  - id: platform-incumbents
    title: "Platform Incumbents: Checkmarx, SonarQube, and Veracode"
    body: |
      Checkmarx One is the dominant enterprise SAST/SCA platform, with $150M+ ARR (Oct 2025), 30%+ YoY ARR growth, 860+ large enterprise customers, and Gartner Magic Quadrant AST Leader status. Checkmarx competes in deals above $100K ACV where CISOs require breadth (SAST + DAST + SCA + API Security + ASPM), compliance documentation, and SOC 2/FedRAMP certification. Checkmarx's weakness is developer experience: its scan times, rule complexity, and UX are oriented toward security teams rather than developers. Semgrep's competitive opportunity in Checkmarx accounts is developer-led expansion into the engineering team before the CISO selects a platform.

      SonarQube/SonarCloud (SonarSource) holds the largest SAST install base by developer headcount: 7M+ developers, 500,000+ organizations, with ~15% SAST market share. SonarQube's focus is code quality and technical debt alongside security; its 6,500+ rules are 85% quality-focused and 15% security-focused. Security detection efficacy benchmarks show Semgrep outperforms SonarQube on pure security findings (46% detection rate vs. 19% in independent 2026 tests). SonarQube's SAST competitive threat is modest for security-first buyers; however, its dominance as the default CI code quality tool means it often occupies the "security tool" budget line before Semgrep can land.

      Veracode (private equity, TA Associates/Francisco Partners) targets the enterprise compliance segment with 3,000+ customers, including Fortune 500. Veracode's strength is audit-ready compliance documentation and DAST capabilities Semgrep does not offer. Its weakness is developer experience: scan-as-a-service is perceived as slow. Veracode is not a meaningful competitor for developer-led, mid-market PLG motions.
    tableRefs: []
    figureRefs: [FP002]
    claimRefs: [CP021, CP022, CP023, CP024, CP025, CP026, CP027, CP028, CP029]

  - id: opengrep-and-substitutes
    title: "Opengrep Fork and Status-Quo Substitutes"
    body: |
      Opengrep is uniquely positioned as both a competitive threat and an indicator of Semgrep's strategic error. Launched January 23, 2025 — two weeks before the Semgrep Series D announcement — by a consortium of Aikido Security, Endor Labs, Amplify Security, Jit, Orca Security, and Mobb, Opengrep restores the CE features (cross-function taint analysis, fingerprinting, tracking ignores, specific metavariables) that Semgrep restricted in December 2024. Opengrep is governed by a multi-vendor Open Governance Consortium, developed by a dedicated OCaml team, and released under LGPL-2.1. As of early 2026, Opengrep has 2,100+ GitHub stars, 26 releases, 61+ contributors, and benchmarks showing 3.15x faster scan speed in certain rule-load scenarios.

      The Opengrep threat is specifically to Semgrep's OSS-to-enterprise adoption funnel. Organizations that would have used Semgrep CE as a free scanning layer — the entry point for eventual Teams/Enterprise conversion — can now use Opengrep with restored functionality and no commercial relationship with Semgrep Inc. Semgrep's PLG moat depends on Semgrep CE being the natural starting point; Opengrep erodes this by offering a genuinely compelling free alternative.

      Status-quo substitutes remain the most common alternative: ESLint (JavaScript), Bandit (Python), Flawfinder (C/C++), PMD (Java), GoSec (Go), and generic linters for other languages. These tools are fragmented across languages, lack cross-language orchestration, and have no rules marketplace — weaknesses Semgrep addresses. Manual code review, ad-hoc scripts, and no-tool approaches are the default for organizations at AppSec maturity level 1.
    tableRefs: []
    figureRefs: []
    claimRefs: [CP030, CP031, CP032, CP033, CP034, CP035, CP036]

  - id: switching-costs-and-moat
    title: "Switching Costs, Lock-In, and Moat Durability"
    body: |
      Semgrep's competitive moats fall into three categories: community and rule network effects, technical differentiation, and GTM/distribution.

      The rule network effect is the most durable moat: Semgrep's 3,000+ community rules and 20,000+ commercial Pro rules represent years of contribution and institutional knowledge that cannot be replicated overnight. However, most OSS rules are YAML patterns that are portable to any rule-compatible engine — including Opengrep. The rule moat is strongest for the commercial Pro rule set, which is proprietary and licensed only to paying customers.

      Technical differentiation: Semgrep's Pro Engine provides cross-file and cross-function taint analysis in 40+ languages at CI speeds — a combination competitors have not matched. CodeQL offers deeper semantic analysis but is 5-10x slower, making it suitable for nightly builds but not for every-commit PR checks. Semgrep's MCP server integration positions it uniquely for the AI coding assistant market (Cursor, VS Code, Claude Desktop).

      GTM and distribution: The OSS→Teams→Enterprise PLG motion enables land-and-expand with low CAC compared to direct enterprise sales. The risk is that GHAS's GitHub-native distribution eliminates this motion for GitHub-centric organizations that have not yet tried Semgrep. Semgrep's multi-VCS flexibility is its clearest counter.

      Switching costs are moderate: Semgrep CI integrations (GitHub Actions, GitLab CI, Jenkins) are standard YAML that takes 1-2 days to install and configure. Custom rules take longer to migrate; the Pro rule set is non-portable. Enterprise platform deals with SSO/SAML, SCIM provisioning, policy dashboards, and audit logs create modest stickiness. Net overall: Semgrep has real but not structural lock-in; churn risk is higher for free-tier and Teams-tier than Enterprise.
    tableRefs: [TP004]
    figureRefs: [FP003]
    claimRefs: [CP037, CP038, CP039, CP040, CP041, CP042]

