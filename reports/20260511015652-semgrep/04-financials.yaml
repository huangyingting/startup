artifact: financials
slug: semgrep
runDate: "2026-05-11"
company:
  name: Semgrep
chapter:
  number: 4
  title: "Financials"
  summary: >
    Semgrep reported approximately $33.6M in annual recurring revenue in 2025 (Latka), representing a modest base for a company that has raised $204M in total funding. The revenue model is a three-tier PLG structure: free Community Edition (top-of-funnel), Teams tier at $30/contributor/month, and custom Enterprise contracts. Most unit economics — gross margin, CAC, LTV, NRR, burn rate — are undisclosed. Based on SaaS industry benchmarks and 257 employees, monthly burn is estimated at $4–7M, implying approximately 18–36 months of runway from the February 2025 Series D close. The primary financial diligence gap is the absence of all operating metrics; ARR, growth rate, gross margin, and retention data are fully private.

sections:
  - id: revenue-model-and-streams
    title: "Revenue Model and Revenue Streams"
    body: |
      Semgrep's revenue model is a product-led growth (PLG) SaaS structure with three monetization tiers built on top of the open-source Community Edition (CE). The PLG motion generates a developer acquisition funnel at zero variable cost — developers discover and adopt Semgrep CE, validate security value in CI, and upgrade to Teams or Enterprise as usage scales or security program formalization occurs.

      Revenue Stream 1 — Teams Tier ($30/contributor/month for Code or Supply Chain; $15/contributor/month for Secrets): This is the primary self-serve revenue generator. The trigger is scale (>10 repositories or >10 contributors exceeding the free tier limit) or access to Pro rules and AI triage. Teams tier is billed per active contributor, a metric Semgrep controls and audits through its CI integration.

      Revenue Stream 2 — Enterprise Contracts (custom pricing): Enterprise revenue is negotiated directly, typically with CISO or VP Engineering budget owners at organizations with 500+ employees. Enterprise contracts include SSO/SAML, SCIM provisioning, Managed Scanning, SLA guarantees, audit logging, on-premises deployment option, and access to the full Pro rule set (20,000+ rules). ACV likely ranges from $50K to $500K+.

      Revenue Stream 3 — Professional Services and Implementation (small): Semgrep offers implementation services for Managed Scanning. This is not a primary revenue generator and likely represents <5% of total revenue.

      Revenue recognition: Annual or multi-year subscription contracts in advance (typical SaaS). No evidence of per-scan pricing, consumption metering, or transaction-based billing. Revenue is ratable over the contract term; upfront annual payments create positive working capital dynamics.
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006]

  - id: gtm-and-sales-efficiency
    title: "GTM Motion and Sales Efficiency Proxies"
    body: |
      Semgrep's go-to-market motion is primarily product-led (bottom-up) with an emerging enterprise direct sales layer. The PLG motion is architected around three conversion events: (1) individual developer or small team adoption via GitHub Actions or CLI, (2) team-level upgrade at the $30/contributor/month Teams threshold, and (3) enterprise consolidation via direct sales contact.

      The PLG motion reduces traditional CAC significantly. For self-serve Teams tier customers, Semgrep's effective CAC is primarily the cost of developer marketing (conferences, open-source sponsorship, documentation, and community management) rather than traditional inside sales cycles. The February 2025 Series D hired Garrett Souza as VP Sales, signaling a deliberate build-out of the direct enterprise sales motion. This represents a structural shift from pure PLG toward a hybrid model.

      SaaS PLG benchmarks (OpenView 2025) indicate PLG companies with a developer-first free tier typically achieve free-to-paid conversion rates of 3–8%, with CAC payback periods of 6–18 months at scale. Applying these benchmarks to Semgrep's 75M+ annual scans and 14,300+ GitHub stars suggests a substantial top-of-funnel, but the conversion efficiency is unverifiable without internal data.

      Sales cycle proxies: Enterprise sales cycles in the SAST/SCA market typically run 90–180 days for 500+ employee organizations (CISO-level approval) and 30–60 days for mid-market engineering leader deals. Semgrep's Managed Scanning feature (handles CI/CD configuration on behalf of customers) reduces time-to-first-value from weeks to hours, a likely conversion accelerant.

      Revenue per employee: $33.6M ARR / 210 employees (Sept 2025) = ~$160K per employee. This is below top-tier SaaS benchmarks ($200–300K/employee) but consistent with growth-stage Series D companies with heavy engineering investment. Series D headcount expansion (257 employees per Tracxn, March 2026) suggests revenue is growing but employee count has also scaled.
    tableRefs: [TI003]
    figureRefs: [FI002]
    claimRefs: [CI007, CI008, CI009, CI010, CI011, CI012]

  - id: cost-structure-and-margins
    title: "Cost Structure, Gross Margin, and Capital Intensity"
    body: |
      Semgrep is a cloud-hosted SaaS business with a developer tooling architecture. Cost of goods sold (COGS) consists primarily of: (1) cloud hosting for the scan execution layer and data pipeline (AWS/GCP), (2) CI/CD API integrations and webhook processing, (3) professional services headcount for enterprise implementation, and (4) third-party data feeds for Supply Chain vulnerability intelligence.

      Gross margin estimation: No public disclosure. Based on developer security SaaS benchmarks, gross margins of 75–80% are typical; companies with heavy professional services components (e.g., Veracode) have lower margins (~60–70%). Semgrep's architecture — a core static analysis engine with cloud-hosted rule execution — is inherently high-margin. The AI triage layer (Semgrep Assistant) adds LLM inference costs (OpenAI/Anthropic API costs), which could compress margins by 3–7% if not priced appropriately.

      Operating expenses: private. Estimated R&D at approximately 50–60% of ARR (typical for growth-stage developer tools), S&M at 40–50% of ARR (building enterprise GTM), and G&A at 10–15% of ARR. At $33.6M ARR, these estimates imply cash operating expenses of $45–75M annually, suggesting a negative FCF position of $15–40M/year at current scale.

      Capital intensity: Low. Static analysis software has no hardware manufacturing or physical asset requirements. Capex is minimal. Cloud costs scale with scan volume, creating a variable cost element at scale, but the incremental cost of each additional scan is very low once the infrastructure is provisioned.
    tableRefs: []
    figureRefs: [FI004]
    claimRefs: [CI013, CI014, CI015, CI016, CI017]

  - id: public-traction-and-private-gaps
    title: "Public Traction Metrics vs. Private Financial Gaps"
    body: |
      Semgrep's publicly available operational metrics provide indirect evidence of commercial traction but cannot substitute for financial disclosures:

      Operating metrics (public): 75M+ annual code scans (company-claimed), 14,300+ GitHub stars (observable), 3,000+ community rules, 20,000+ Pro rules, 40+ supported languages, 257 employees (Tracxn, March 2026). Customer names referenced publicly include Figma, Dropbox, Slack, Snowflake, HashiCorp, GitLab, and Shopify.

      Revenue estimate: Latka reports $33.6M ARR for September 2025 based on crowdsourced revenue data. This is consistent with 210 employees at $160K/employee, a typical Series D-stage ratio for developer security companies. No independent verification exists; CBInsights lists Semgrep's financials as undisclosed. The Sacra estimate for Semgrep has not been published as of May 2026.

      Key gaps: ARR, growth rate, gross margin, NRR/GRR, CAC, LTV, customer count, ACV distribution, and burn rate are all undisclosed. The funding multiple (valuation / ARR) cannot be validated without ARR confirmation. At a hypothetical $1B valuation and $33.6M ARR, the revenue multiple would be ~30x — aggressive but not unprecedented for high-growth developer security SaaS in 2025.
    tableRefs: [TI005]
    figureRefs: [FI003]
    claimRefs: [CI018, CI019, CI020, CI021, CI022, CI023, CI024]

  - id: capital-adequacy
    title: "Capital Adequacy and Financing Dependency"
    body: |
      Semgrep closed a $100M Series D on February 5, 2025, led by Menlo Ventures with participation from Lightspeed, Redpoint, Sequoia, Felicis, and Harpoon. Total cumulative funding is $204M across four rounds. The Series D announcement specified deployment toward AI and program analysis talent, product awareness, and GTM (geographic expansion in Europe and Asia-Pacific).

      Burn rate estimate: With 257 employees in San Francisco (as of March 2026) and typical developer tooling company cost structures, estimated monthly cash burn is $4–7M, placing total annual cash consumption at $48–84M. This estimate incorporates payroll (~50–55% of burn at $200–250K average fully-loaded cost per employee), cloud infrastructure, and G&A.

      Runway estimate: If $80–90M of the $100M Series D remained undeployed immediately post-close (after account for pre-close costs and transition), and burn is $4–7M/month, runway extends approximately 13–22 months from February 2025, placing the Series E financing window at approximately Q1 2026 – Q4 2026. Given the analysis date (May 2026), Semgrep may be approaching a financing inflection point within the next 6–12 months absent meaningful ARR acceleration.

      Debt and project finance: No disclosed debt. The company is equity-funded exclusively. No project finance obligations, customer financing, or government contract requirements identified.

      Capital adequacy verdict: The $100M Series D provides adequate runway for a 12–24 month acceleration phase. The critical dependency is ARR growth: Semgrep must demonstrate a meaningful step-up from the $33.6M ARR base (e.g., toward $50–70M) to justify a Series E at a higher valuation. If ARR growth has stalled post-Opengrep fork, the fundraising window becomes more challenging.
    tableRefs: [TI004]
    figureRefs: []
    claimRefs: [CI025, CI026, CI027, CI028, CI029, CI030, CI031]

