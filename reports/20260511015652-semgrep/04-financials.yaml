callouts:
  - calloutType: risk
    title: "Revenue too small relative to $204M invested capital"
    body: >
      $33.6M ARR against $204M raised implies a capital efficiency ratio of approximately 6:1 ($ raised per $ ARR). Top-tier developer security SaaS companies target 1.5–3x ARR/capital raised ratios. At Semgrep's current metrics, investors are accepting that the company is still early-stage relative to its total capital deployment — justifiable only if ARR growth is accelerating substantially.
    claimRefs: [CI018, CI025, CI022]

  - calloutType: risk
    title: "No operating metrics visible — full black box for Series E underwriting"
    body: >
      ARR, gross margin, NRR, CAC, LTV, churn, burn rate, and customer count are all undisclosed. Investors evaluating a Series E or secondary transaction must underwrite with no financial visibility beyond the $33.6M crowdsourced ARR estimate and the $204M raised. This is a blocking due-diligence risk.
    claimRefs: [CI019, CI020, CI021, CI024, CI032]

  - calloutType: strength
    title: "PLG revenue model has structurally low CAC and high gross margin potential"
    body: >
      Developer-led discovery via free CE creates a zero-cost acquisition funnel unmatched by enterprise-only competitors. The self-serve Teams tier requires no direct sales for <$36K/year contracts. This structural advantage implies CAC well below the SaaS median ($400–$600) for self-serve customers, and a PLG payback period potentially under 12 months.
    claimRefs: [CI007, CI008, CI009, CI013]

  - calloutType: insight
    title: "Series E financing window likely within 12–18 months of run date"
    body: >
      At estimated burn of $4–7M/month and an assumed $50–90M cash position in May 2026, Semgrep's next financing event is likely H1–H2 2027. The company must demonstrate material ARR acceleration from the ~$33.6M base to justify a Series E at a flat or higher valuation. The Opengrep fork may have modestly impaired the PLG funnel, making the enterprise direct sales motion (funded by hiring Garrett Souza) more critical.
    claimRefs: [CI028, CI029, CI030, CI031]

