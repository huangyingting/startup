    rows:
      - - GitHub API 与 GitHub Actions
        - GitHub（Microsoft）
        - 主要 CI/CD 集成接口；通过 GitHub App 实现 Managed Scanning；PR 评论发布；webhook 推送
        - 极高——大多数 Semgrep 客户以 GitHub 为主要代码托管平台
        - GitHub 限制第三方 GitHub App 权限、更改 Actions runner 安全策略，或推出要求企业客户禁用第三方扫描器的 GHAS 功能
        - 高——任何限制都将实质性损害 Semgrep 的主要产品交付渠道
        - Semgrep 支持 GitLab、Bitbucket、Azure DevOps 作为替代 VCS 集成；多 VCS 覆盖降低但未消除集中度
        - 持续监测 GitHub API 服务条款及 GitHub Actions 安全策略变更；为不希望使用 GitHub App 的客户开发无 API 本地扫描模式
      - - OpenAI / Anthropic LLM API（Assistant 依赖）
        - OpenAI 或 Anthropic（未确认）
        - Semgrep Assistant 的 AI 分类与代码修复生成
        - 高——所有 Assistant 功能依赖单一 LLM 供应商
        - LLM 供应商大幅提高 API 定价、变更数据处理条款，或限制开发者工具用例的访问
        - 中——Assistant 功能受损；LLM 成本上升将压缩毛利率；企业数据政策可能阻断 LLM API 数据传输
        - 无已确认的多供应商回退；缓解成熟度低
        - 长期：为隔离网络企业客户投入本地 / 私有化 LLM 选项；就多年期 API 定价进行谈判
      - - NIST NVD + GitHub Advisory Database（CVE 数据源）
        - NIST（美国政府）+ GitHub
        - Supply Chain 可达性分析的 CVE 数据源
        - 高——Supply Chain 无已确认的替代 CVE 数据源
        - NVD 积压加剧；GitHub Advisory 数据库对非开源安全公告的覆盖存在缺口
        - 中——Supply Chain 可达性分析质量下降；SCA 产品价值主张受损
        - 缓解程度低——无已确认的自有 CVE 数据库；依赖公共数据源
        - 自建或购买自有 CVE 数据库授权；与商业威胁情报供应商合作
      - - Opengrep 社区（负向依赖）
        - Opengrep（开源社区 / 未披露赞助方）
        - CE 层级的竞争性替代品；社区规则贡献的替代选择
        - 高——Opengrep 已有 2,100+ star，开发活跃
        - Opengrep 达到社区临界规模（10,000+ star，重要企业赞助商入场）；新开发者安装迁移至 Opengrep； Semgrep PLG 漏斗停滞
        - 高——漏斗顶端 CE 采用是主要增长杠杆；结构性损害虽缓慢但具复合效应
        - Semgrep Pro Engine 护城河（自研数据流）及 20,000+ Pro 规则无法被 Opengrep CE 复制；企业功能形成切换成本
        - 每季度监测 Opengrep 仓库增长、PR 速度及企业赞助方公告
      - - 资本方（Menlo、Lightspeed、Sequoia）
        - Menlo Ventures、Lightspeed、Redpoint、Sequoia、Felicis、Harpoon 等资本方
        - E 轮融资依赖；董事会治理；投资者网络提供企业客户引荐
        - 高——100% 股权融资；无已确认的风险债务兜底
        - VC 市场恶化；ARR 增长不及预期；E 轮以低估值成交，员工及早期投资者面临稀释
        - 中——自 2026 年 5 月起现金跑道估计为 12–18 个月；若增长停滞，融资风险为真实存在
        - D 轮投资者关系深厚，具有领投及跟投记录
        - 持续监测宏观 VC 市场状况；追踪开发者安全领域 E 轮可比估值
    notes: 依赖风险由作者评估。合作条款、API 合同细节及投资者参与规范均未公开披露。
