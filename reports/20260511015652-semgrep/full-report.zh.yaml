        - 竞争对手持续扩充语言支持；CodeQL 深化语言覆盖；Opengrep 已匹配 CE 版的语言支持范围
        - 中低
        - 2-4 years
        - 核实 Pro Engine 语言路线图；通过直接对比基准测试确认污点分析深度与 CodeQL 的差距
      - - MCP 服务器及面向氛围编程的 AI 原生定位
        - GitHub Copilot Autofix 和 Snyk IDE 集成瞄准相同的开发者使用场景；该能力并无专有壁垒
        - 中等
        - 1-2 years
        - 获取 MCP 使用数据；确认 AI 扫描采用率及开发者对质量的反馈
      - - 多 VCS 支持与平台无关的 CI/CD 集成
        - GitLab Ultimate SAST 和 Bitbucket Code Insights 正在增加原生扫描功能；GHAS 的优势仅限于 GitHub，并不覆盖多 VCS 场景
        - 低
        - 2-4 years
        - 要求按 VCS 平台拆分客户分布；验证 GitLab 场景下的赢单/输单率
      - - Semgrep Assistant AI 分类（首日误报率降低 20-40%）
        - Snyk、Checkmarx 和 CodeQL 均在投入 AI 分类能力；除非代码库学习能基于私有代码历史实现个性化，否则难以形成持久护城河
        - 中等
        - 1-3 years
        - 获取分客户队列的误报率降低数据；验证代码库学习随时间推移的改善效果
      - - 商业 Pro 规则集（20,000+ 条自研规则）
        - 规则是订阅权益而非网络效应；若竞争对手为其所用语言提供同等规则覆盖，客户可能随时切换
        - 中等
        - 1-3 years
        - 要求提供按语言拆分的 Pro 规则覆盖情况；验证客户对规则质量的满意度评分
    notes: >-
      威胁严重程度：Low = 在预期时间跨度内发生概率低；Moderate = 可能发生但可管控；High = 已存在主动竞争压力。 时间跨度：近期 = 1-2 年，中期 = 2-4 年。资料来源：Endor Labs
      竞争分析、AppSec Santa、Latio 2026、Opengrep GitHub。
