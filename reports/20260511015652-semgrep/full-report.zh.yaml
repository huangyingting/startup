  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Semgrep 的收入模式是构建于开源 Community Edition（CE）之上的产品驱动增长（PLG）SaaS 结构，分三级变现。 PLG 模式以零边际成本生成开发者获取漏斗——开发者发现并采用
              Semgrep CE，在 CI 中验证安全价值，随着使用规模 扩大或安全项目正式化，升级至 Teams 或 Enterprise。


              收入来源 1——Teams 层（Code 或 Supply Chain $30/contributor/月；Secrets $15/contributor/月）：这是主要的
              自助服务收入来源。触发点是规模（代码库超过 10 个或贡献者超过 10 人，超出免费层限制）或对 Pro 规则和 AI 分类的需求。Teams 层按活跃贡献者计费，Semgrep 通过其 CI
              集成控制并审计这一指标。


              收入来源 2——Enterprise 合同（自定义定价）：企业营收通过直接谈判获取，通常对接 500+ 员工组织中的 CISO 或 工程副总裁预算负责人。Enterprise 合同包含 SSO/SAML、SCIM
              配置、Managed Scanning、SLA 保证、审计日志、 本地部署选项以及完整 Pro 规则集（20,000+ 条规则）访问权。ACV 预计在 $50K 至 $500K+ 区间。


              收入来源 3——专业服务与实施（规模较小）：Semgrep 为 Managed Scanning 提供实施服务。这不是主要收入来源， 预计占总收入的 <5%。


              收入确认：年度或多年预付订阅合同（典型 SaaS 模式）。无按扫描计价、消耗量计量或交易计费的证据。收入在 合同期内均匀确认；年度预付款产生正向营运资金动态。
