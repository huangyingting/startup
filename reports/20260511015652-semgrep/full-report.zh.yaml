      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              Semgrep 于 2025 年 2 月 5 日完成 1 亿美元 D 轮融资，由 Menlo Ventures 领投，Lightspeed、Redpoint、Sequoia、Felicis 和 Harpoon
              跟投。累计融资总额达 2.04 亿美元，历经四轮。D 轮融资公告指明资金将投向 AI 与程序分析人才、产品知名度提升，以及 GTM（欧洲和亚太地区的地理扩张）。


              烧钱速度估算：截至 2026 年 3 月，Semgrep 在旧金山有 257 名员工，参照典型开发者工具公司的成本结构，预计每月现金消耗约 400–700 万美元，折合全年现金消耗 4,800–8,400
              万美元。该估算涵盖薪资（约占烧钱速度的 50–55%，人均全包成本约 20–25 万美元）、云基础设施及管理费用。


              现金跑道估算：D 轮融资交割后，若 1 亿美元中有 8,000–9,000 万美元尚未动用（扣除交割前成本和过渡期支出），以每月 400–700 万美元的烧钱速度计，现金跑道约可延伸至 2025 年 2 月起的
              13–22 个月，即 E 轮融资窗口约在 2026 年第一季度至 2026 年第四季度。 鉴于本次分析日期（2026 年 5 月），若年经常性收入（ARR）未能实质性加速，Semgrep 可能在未来 6–12
              个月内迎来融资拐点。


              债务与项目融资：无已披露债务，公司完全依靠股权融资，未发现项目融资义务、客户融资安排或政府合同要求。


              资本充足性判断：1 亿美元 D 轮融资为 12–24 个月的加速期提供了充裕跑道。核心依赖在于 ARR 增长：Semgrep 须在 3,360 万美元 ARR 基础上实现显著提升（如迈向 5,000–7,000
              万美元），方能以更高估值支撑 E 轮融资。若 Opengrep 分叉后 ARR 增长已停滞， 融资窗口将更为逼仄。
