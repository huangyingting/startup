            figureRef: FR001
            claimRefs: []
      - number: '7.2'
        title: 法律、许可证与监管风险
        blocks:
          - type: paragraph
            body: >
              **开源许可证变更法律风险：**

              2024 年 12 月，Semgrep 将 CE 规则仓库的许可证从 LGPL-2.1 修改为 Semgrep Open Source License（SOSL）——一种限制
              竞争性商业用途的专有许可证。LGPL-2.1 要求对衍生作品重新许可时须获得所有版权贡献者的同意。社区规则仓库收录了数千名 开发者在 LGPL-2.1
              下的贡献；若任何贡献者对单方面重新许可提出异议，Semgrep 将面临潜在的 LGPL 侵权索赔。截至 2026 年 5 月尚无诉讼，但 Hacker News 和 GitHub Discussions
              上的社区成员已对过渡流程提出具体法律质疑。


              **IP 所有权与贡献者协议：**

              Semgrep 的社区贡献流程（通过 GitHub Pull Request）依赖隐性的"入站 = 出站"许可假设，而非对所有规则贡献者适用正式的 贡献者许可协议（CLA）。若 Semgrep 未针对 3,000
              余条社区规则持有有效的 CLA，重新许可在法律上可能存在隐患。


              **FedRAMP 授权缺口：**

              Semgrep 被归类为 FedRAMP Ready，但尚未获得授权。未获得 FedRAMP 授权（进行中或完整），Semgrep 不得用于美国联邦信息 系统，全面阻断美国联邦政府市场。FedRAMP
              授权通常在获得 ATO（运营授权）担保后需要 12–24 个月完成。


              **EU AI Act（潜在适用范围）：**

              EU AI Act 于 2024 年 8 月生效，可能对影响软件开发的 AI 辅助代码扫描工具施加义务。Semgrep Assistant 的 AI 生成代码 修复可能被列为有限风险或通用 AI
              条款，需进行透明度披露和文档记录。监管解释尚待确定；针对开发者工具 AI 的具体合规 义务未有定论。


              **数据隐私——GDPR：**

              Semgrep 在尚未提供欧盟数据驻留的云基础设施上处理代码片段（包括代码注释或变量名中潜在的个人可识别开发者数据）。 GDPR 第 44 条对国际数据传输的限制要求使用标准合同条款（SCCs）；Semgrep
              的 DPA 已涵盖 SCCs，但欧盟数据驻留客户已将 数据传输延迟和合规清晰度列为采购关切。
            claimRefs:
