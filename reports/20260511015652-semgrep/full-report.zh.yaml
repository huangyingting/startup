      - number: '6.2'
        title: 采纳轨迹与公开牵引力
        blocks:
          - type: paragraph
            body: >
              Semgrep 的可公开观察采纳指标呈现出强劲的开发者社区采纳态势，而商业牵引力的可见度则较为有限：


              **社区指标（高置信度，公开可验证）：**

              - 每年 7,500 万次以上的代码扫描——截至 2025 年公司自报，覆盖所有 CE 和付费档的总扫描量

              - 14,300 余个 GitHub 星标——可在 github.com/semgrep/semgrep 验证；在开发者安全工具中高于平均水平

              - 3,000 余条由外部开发者贡献的社区规则——生态深度的佐证

              - 支持 40 余种语言——广泛的语言覆盖降低了多语言组织的采纳摩擦


              **评测平台指标（中等置信度）：**

              - G2：截至 2026 年初，30 余条评测，平均评分 4.5/5；多数正面评测突出规则准确性和开发者友好性；多数负面评测提及 社区规则误报噪声和 CI 性能开销

              - Gartner Peer Insights：数据有限；截至 2025 年，Semgrep 尚未进入应用安全测试 Gartner 魔力象限（Snyk、Checkmarx 和 Veracode 占据主导）

              - Capterra 和 PeerSpot：评测数量较少；情感倾向与 G2 一致


              **收入代理牵引力：**

              - ARR 约 3,360 万美元（Latka，2025 年 9 月估算），员工 210 人——以典型 SAST 企业 ACV 范围推算，隐含付费客户数约 100–400 家

              - 每员工收入约 16 万美元，低于开发者 SaaS 巅峰期基准，但与成长期扩张阶段一致


              **采纳新鲜度风险：** 2024 年 12 月的 CE 许可证限制和 2025 年 1 月的 Opengrep 分叉是 CE 新增采纳的潜在拐点。若新 开发者安装正向 Opengrep 迁移而非选择
              Semgrep CE，顶部漏斗 CE 获客速率可能正在减速，最终将拖慢 Teams 和企业版的 销售管道增长。
