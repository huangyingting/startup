      - number: '8.5'
        title: 退出准备度与最终尽调待确认事项
        blocks:
          - type: paragraph
            body: >
              **退出准备度：**

              Semgrep 有多条可行的退出路径：IPO（需要 $100M+ ARR、20%+ 增速及有利的市场环境，基准情景下预计 2028 年或之后）、被网络安全平台战略收购（Palo Alto
              Networks、CrowdStrike、Broadcom、Rapid7、 Tenable、JetBrains），或被财务投资方收购（PE 或成长股权，企业价值 $500M+）。D 轮投资方（Menlo、
              Lightspeed、Sequoia）具备强大的 IPO 和并购资源；多个 ARR 里程碑节点均有退出路径可选。


              IPO 路径要求：

              1. $100M+ ARR 且增速 40%+

              2. NRR > 115%，证明"落地-扩张"模式有效

              3. GAAP 毛利率 > 70%，证明 SaaS 经济模型可行

              4. 降低关键人物依赖（CEO/CTO 接班人规划）

              5. 取得 FedRAMP 授权以进入美国联邦市场


              战略收购路径在 $200M–$1.5B+ 区间均可行，具体取决于 ARR、NRR 及买方战略契合度。最可能的战略 收购方（按优先级排序）：（1）Palo Alto Networks（活跃 AppSec
              并购记录，Prisma Cloud 扩张）； （2）JetBrains（开发者工具协同，编辑器 + SAST 集成）；（3）CrowdStrike（Falcon 平台向开发者 AppSec
              延伸）；（4）Google/GitHub 间接路径（通过平台合作应对 GHAS 竞争威胁）。


              **最终尽调待确认事项（最小可行数据室）：**

              1. 截至 Q1 2026 的 ARR 及同比增速确认

              2. 各层级过去 4 个季度的 NRR 和 GRR

              3. 烧钱速度、现金储备及 E 轮融资管道

              4. 各层级客户数量（CE MAU、Teams、Enterprise）

              5. LGPL-2.1 重新授权合规性及 CLA 状态法律意见书

              6. 企业 AE 头数及 2025 年直销新增 ARR 归因
