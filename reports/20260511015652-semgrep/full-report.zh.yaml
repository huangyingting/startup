  - id: TE002
    title: 工作流 / 使用场景表
    columns:
      - 用户需求
      - 当前工作流（无 Semgrep）
      - Semgrep 解决方案
      - 可量化收益（公司自述）
      - 主要局限
    rows:
      - - 开发者：在 PR 合并前发现安全漏洞
        - 人工代码审查；误报率高的 SAST 扫描器需人工分类
        - 在 CI/CD 中使用 Semgrep Code 配合 Pro 规则：自动扫描 PR diff，误报率低
        - 开发者在 PR 阶段即可修复问题；据称比部署后修复快多达 10 倍
        - 扫描覆盖范围取决于规则库；新型漏洞类别须等规则编写后方可覆盖
      - - AppSec 团队：确定开源依赖中哪些 CVE 需优先修复
        - 完整 CVE 扫描结果（10,000 条以上）；按严重性手工分类；CVSS 评分筛选
        - Semgrep Supply Chain：可达性分析将结果过滤至实际代码可达的 2–5% CVE
        - 据称噪声减少 95% 以上；分类时间从数天缩短至数小时
        - 动态分发、反射及部分语言习惯（Ruby、PHP）下可达性准确率有限
      - - 开发者：防止硬编码密钥被提交
        - Git 提交钩子（可选）；定期密钥扫描；提交后修复
        - Semgrep Secrets：预提交拦截 + 实时验证检测到的密钥
        - 实时验证相较纯正则工具（如 TruffleHog）可降低误报
        - 长随机字符串误报率高；自定义令牌格式需额外配置
      - - AppSec 团队：无需各团队单独操作，即可向 500 个以上代码库部署安全扫描
        - 各团队独立配置 CI/CD；开发者培训；手工编写 yml
        - Semgrep Managed Scanning：通过 GitHub App 集中部署；无需各团队改动 CI
        - 企业全量部署时间从数周缩短至数小时
        - Managed Scanning 较新；10,000 个以上代码库规模的公开案例有限
      - - AppSec 团队：分类并解释大量扫描积压问题
        - 每个迭代人工审查数百条发现；JIRA 工单泛滥；开发者体验差
        - Semgrep Assistant：AI 分类过滤已确认的误报，用通俗语言解释发现，并提出修复建议
        - 据称分类负担减少 60% 以上（公司自述，未经独立核实）
        - LLM 推理成本及延迟；修复质量因语言和发现类型而异
    notes: 标注"公司自述"的收益指标来源于 Semgrep 产品页面和博客，未经独立核实。
