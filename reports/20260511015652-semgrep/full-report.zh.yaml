  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概述与严重程度排序
        blocks:
          - type: paragraph
            body: >
              Semgrep 处于企业安全软件、开源开发和 AI 驱动工具的交叉点——三个领域各自具有独特且相互叠加的风险特征。以下七类风险 按潜在投资影响从高到低排序：


              **1. 竞争商品化（关键）：** GitHub Advanced Security（GHAS）+ Copilot Autofix 将 SAST 扫描和 AI 代码修复捆绑至 GitHub Enterprise
              平台，对现有 GitHub Enterprise 客户零边际成本。Semgrep 的核心 Teams 档和 Semgrep Assistant 价值主张均可被直接替代。这一风险具有结构性且持续恶化：GitHub
              的分发优势（5,000 万以上开发者）构建起非对称获客 护城河。


              **2. 开源分叉 / 社区碎片化（高）：** Opengrep 分叉（2025 年 1 月）直接威胁 Semgrep 的开发者获客漏斗。Opengrep 声称性能提升 3.15 倍，提供 CE 功能对等，并以
              AGPLv3 许可（完全开放）发布。若 Opengrep 达到社区临界质量，新开发者 安装将优先选择 Opengrep CE，从顶部漏斗切断 Semgrep 的 PLG 管道。


              **3. 财务不透明 / 资本风险（高）：** 所有经营指标均未披露。以估算烧钱速度（400–700 万美元/月）对比估算现金存量 （5,000–9,000 万美元），E 轮融资窗口预计在 12–18
              个月内开启。若 ARR 增长不够充分，在平估或下行估值下融资将成为 结构性风险，存在下行轮或战略压力风险。


              **4. 许可证法律风险（中高）：** 2024 年 12 月的许可证变更将 Semgrep CE 许可证从 LGPL-2.1 修改为专有的 Semgrep Open Source
              License（SOSL），限制竞争性商业用途。若此次过渡未符合 LGPL-2.1 再许可要求（通常需要所有版权贡献者的 同意），可能产生法律风险。截至目前尚无诉讼提起，但风险存在。


              **5. 监管 / 合规风险（中）：** FedRAMP 授权缺口阻断美国联邦市场。AI 辅助安全工具在 EU AI Act 下的义务尚不明确。 面向欧盟客户的 GDPR 数据驻留能力尚不完善。


              **6. 运营 / 技术依赖风险（中）：** Semgrep Assistant 对 LLM API 提供商（OpenAI/Anthropic）的依赖带来集中度和 定价风险。主要 CI/CD 集成对 GitHub
              API 的依赖带来平台风险。


              **7. 关键人物 / 执行风险（中）：** 联合创始人 Isaac Evans（CEO）和 Drew Dennison（CTO）是主要领导者，未披露任何 继任计划。D 轮 GTM 建设（已招募 VP
              Sales）对于一家工程主导型组织而言是全新的执行挑战。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
