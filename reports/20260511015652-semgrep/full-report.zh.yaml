      - number: '8.4'
        title: 可比公司集与估值背景
        blocks:
          - type: paragraph
            body: >
              **开发者安全公开/私有可比公司：**


              Snyk 是最接近的公开可比公司：ARR $350M+（2024 年估算），估值 $7.4B（2024 年二级市场），隐含约 21 倍前瞻 ARR。Snyk 在 $200M+ ARR 时 NRR 超过
              100%，才达到该倍数；将 Snyk 倍数套用至 Semgrep $33.6M ARR，若 ARR 增速 60%+ 且 NRR > 120%，则隐含估值约 $700M——与 D 轮区间一致。


              Checkmarx 于 2022 年以约 $1.15B 被 Hellman & Friedman 收购，彼时 ARR 约 $100M（约 11.5x ARR）， 为 Semgrep 达到 $100M ARR
              时提供了企业 AppSec 平台的战略底部估值参考。


              GitHub Advanced Security（GHAS）捆绑在 GitHub Enterprise Cloud 企业版中，无单独披露的 ARR。 2018 年 Microsoft 以 $7.5B 收购
              GitHub，针对的是完整开发者平台而非安全业务本身。GHAS 不是可交易 的可比标的，但为 GitHub 开发者分发所蕴含的价值提供了参照。


              SonarSource（SonarQube）于 2022 年完成 $412M 融资，来自 Warburg Pincus，估值未披露，为面向 开发者的静态分析平台提供了私有可比参考；SonarSource
              规模更大（ARR $100M+），但印证了投资者对 该赛道的规模化兴趣。


              Veracode（2023 年由 Broadcom 以 $550M 收购，此前经历 PE 所有权）提供了并购底部参考：一家拥有 $250M+ ARR 的成熟 SAST/DAST 供应商以约 2x ARR
              出售给大型企业并购方，反映遗留产品折价，但也 印证了战略买方需求。


              **估值敏感性分析：**

              以 Semgrep $33.6M ARR 为基准，隐含估值区间如下：

              - 10x ARR（遗留/停滞）：$336M（悲观底部）

              - 15x ARR（温和增长，40% CAGR）：$504M

              - 20x ARR（高增长，60% CAGR）：$672M

              - 30x ARR（超高增长，80%+ CAGR，NRR > 120%）：$1.0B+


              基于 $100M 融资规模、Menlo Ventures 典型支票对应持股比例（15–25%）及开发者安全赛道可比数据， D 轮后估值估计在 $400–750M 之间。
