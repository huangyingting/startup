  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户群细分
        blocks:
          - type: paragraph
            body: >
              Semgrep 的客户群由三个细分市场构成，各自在获客动态、使用模式和收入贡献上存在根本差异：


              **细分市场一——社区版（CE）/ 开源用户（免费）：** 估计有数十万开发者将 Semgrep CLI 用于个人项目、业余项目或评估安装。 该群体不贡献任何直接收入，但是 Semgrep PLG
              管道的来源。CE 用户产生每年 7,500 万次以上的扫描信号，为规则改进提供遥测。 2024 年 12 月的 CE 许可证限制使该细分市场出现不确定性，Opengrep 分叉提供了另一条 CE 路径。


              **细分市场二——Teams 档（自助付费）：** 规模在 10–500 名员工之间的公司工程团队，已超过 CE 免费档限制，或需要 Pro 规则、AI 分类或 Secrets
              扫描。买家通常是工程负责人或开发者安全负责人，通过信用卡或年度发票自助完成购买。客户经济效益： 30 美元/贡献者/月 × 12 个月 = 最低 360 美元/贡献者/年。50 人工程团队按 30
              美元/贡献者付费，年贡献约 1.8 万美元。


              **细分市场三——企业版（直销）：** 500 名以上员工的组织，通常由 CISO 主导采购，需要 SSO/SAML、SCIM、审计日志、SLA、 Managed Scanning
              及安全合规文档。该细分市场贡献大部分 ARR（基于典型 PLG 企业收入结构，估计占 60–70%）。参照同类 SAST 企业供应商，平均合同价值估计在 5 万至 30
              万美元/年。多年合同是常态。主要垂直行业：SaaS/云原生、金融科技、企业软件、 消费科技。


              **地理集中度：** 北美是主要市场（总部位于旧金山；多数具名客户为美国企业）。欧洲和亚太扩张已作为 D 轮优先事项宣布， 但尚无欧洲企业客户案例发布。


              **垂直行业集中度：** 具名客户集中在软件原生公司（Figma、Dropbox、Slack、GitLab、Shopify）——这些公司拥有大型工程团队、
              成熟的安全项目和开发者优先的文化。这造成买家群体集中于"科技公司"，而非广泛的行业渗透。
