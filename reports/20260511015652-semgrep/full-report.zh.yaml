      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: Pro Engine 跨文件数据流是相较于简单 SAST 工具的真实技术护城河
            body: >
              Pro Engine 的跨文件和跨函数污点分析使 Semgrep 能发现过程内工具所遗漏的漏洞类别（跨模块边界的 SQL 注入、辅助库中的 不安全反序列化）。结合易用的 YAML
              规则语言，这形成了大多数开源和低价竞品难以复制的技术能力差距。
            calloutType: strength
            claimRefs:
              - CE018
              - CE019
              - CE007
          - type: callout
            title: Opengrep 分叉对 CE 获客漏斗构成性能与社区风险
            body: >
              Opengrep 于 2025 年 1 月推出，在全仓库基准测试中声称较 Semgrep CE 引擎性能提升 3.15 倍，以 AGPLv3 许可发布， GitHub 星标已超 2,100。若开发者迁移到
              Opengrep 进行 CE 扫描，Semgrep 的 PLG 顶部漏斗将退化——因为 CE 到 Teams 的转化依赖于开发者首先采用并认可 Semgrep CE 产品。
            calloutType: risk
            claimRefs:
              - CE030
              - CE031
              - CE022
          - type: callout
            title: GitHub Copilot Autofix 与 GHAS AI 分类是以零边际成本取代 Assistant 的直接替代品
            body: >
              GitHub 于 2024 年推出 Copilot Autofix，在 GitHub UI 内为代码扫描告警提供 AI 生成的代码修复建议，与 Semgrep Assistant
              的价值主张直接重叠。对于已付费使用 GitHub Enterprise 或 Copilot Enterprise 的组织，Autofix 无需额外 收费。这使 Semgrep 力推的下一代护城河——AI
              分类差异化——面临商品化风险。
            calloutType: risk
            claimRefs:
              - CE032
              - CE033
          - type: callout
            title: Managed Scanning 是企业采纳的关键解锁点——需持续监测容量和参考案例数量
            body: >
              Managed Scanning 消除了企业全面部署 SAST 的首要障碍：各团队逐一配置 CI/CD。借助 GitHub App 集中管理 CI/CD 配置， Semgrep 可通过单一合同覆盖 1,000
              余个仓库。该功能在超大规模（10,000 余个仓库）下的表现尚未经过独立基准测试；该规模 下的客户参考案例将大幅验证企业增长投资逻辑。
