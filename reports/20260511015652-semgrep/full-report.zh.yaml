      - number: '8.2'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              **投资逻辑（乐观）：**

              Semgrep 是唯一将开发者体验（最快扫描配置、最低摩擦部署）、技术精度（Pro Engine 过程间数据流分析） 与产品宽度（SAST + SCA + Secrets + AI
              分诊）整合于单一开发者原生平台的企业 AppSec 产品，定价 $30/贡献者/月。随着 AppSec 市场从 $8.6B 增长至 2030 年 $25B+，Semgrep 有望抢占企业开发者安全预算——
              这部分预算要求比 GHAS 原生 SAST 更高精度，同时成本低于 Snyk（企业版 $65–80K+/年）或 Checkmarx （遗留版 $100K+/年）。PLG → 企业版路径（CE 免费 → Teams
              → Enterprise → 多产品）构建了复利式客户 获取引擎，一旦企业直销能力成熟，有望在 24–36 个月内突破 $100M ARR。


              **反向逻辑（悲观）：**

              GitHub 的结构性分发优势意味着，一旦 GHAS + Copilot Autofix 在功能上追平 Semgrep Teams， GitHub Enterprise
              客户将默认选择前者——这是"何时"而非"是否"的问题。与此同时，Opengrep fork 削弱了 Semgrep 历来依赖的 PLG 转化渠道——CE 开发者漏斗。没有独立的顶部漏斗，也没有分发护城河，
              Semgrep 只是一个拥有 $33M ARR、D 轮后估值 $400–750M 的细分企业 AppSec 供应商，隐含 12–22x ARR
              倍数——若增长停滞，回报前景颇具挑战。投资逻辑依赖一系列有利条件同时成立（ARR 快速增长 + GHAS 无法 实现功能对等 + Opengrep 无法获得临界规模），而任一条件均缺乏强有力的反驳证据支撑。
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
