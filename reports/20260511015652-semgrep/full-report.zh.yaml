      - number: '5.3'
        title: 部署方式、集成与路线图
        blocks:
          - type: paragraph
            body: >
              **部署模式：**

              - CLI：`semgrep scan` 在本地针对任意 Git 仓库运行；需要 Python 3 或 Docker

              - CI/CD 原生集成：GitHub Actions、GitLab CI/CD、Jenkins、CircleCI、Azure DevOps、Bitbucket Pipelines—— 由 Semgrep
              官方维护的 Action/插件

              - IDE 插件：VS Code 扩展、IntelliJ/JetBrains 插件、兼容 LSP 的编辑器

              - Managed Scanning：Semgrep 通过 GitHub App 或 GitLab 集成，统一部署并维护所有仓库的 CI/CD 配置，消除各团队 开发者的配置负担

              - API：REST API，支持发现导出、SBOM 生成，以及与 JIRA、Linear、PagerDuty、Slack 的 CI 状态 Webhook 集成


              **平台集成：** Semgrep 与 JIRA（从发现创建工单）、Slack（PR 通知）、GitHub/GitLab 安全仪表板（SARIF 输出）、 Snyk 依赖数据（历史集成，早于 Snyk
              竞争重叠期）及 SIEM 工具（通过 Webhook）集成。SSO 支持 SAML 2.0、Okta、 Azure AD 和 Google Workspace。


              **路线图方向（2025–2026）：**

              - AI 优先：扩展 Semgrep Assistant 至自动修复生成、IDE 优先分类及面向开发者的修复辅导

              - Managed Scanning GA：将企业客户部署时间从数小时压缩至数分钟

              - Supply Chain 扩展：为解释型语言（Python、Ruby、PHP）提供更广泛的可达性分析

              - 地理扩张：提供欧洲和亚太数据驻留选项，满足 GDPR 及地区数据法规要求

              - 规则质量：持续扩充 Pro 规则库；社区规则保持开放
