        - from: github_ghas
          to: enterprise_demand
          label: 以零边际成本替代 SAST + AI 分诊
        - from: opengrep
          to: plg_funnel
          label: CE 采用向 Opengrep 迁移
        - from: lgpl_risk
          to: litigation
          label: 贡献者提起 LGPL 违规索赔
        - from: enterprise_demand
          to: arr_stall
          label: Enterprise 销售管道收缩
        - from: plg_funnel
          to: arr_stall
          label: CE 向 Teams 的转化减少
        - from: arr_stall
          to: series_e_risk
          label: E 轮融资时收入倍数压缩
        - from: burn_rate
          to: series_e_risk
          label: 若 ARR 不增长，现金跑道缩短
        - from: litigation
          to: valuation_impact
          label: 法律成本 + 声誉损失
        - from: series_e_risk
          to: valuation_impact
          label: 下行轮次稀释或融资失败
    approximationNotes: 风险传导路径为作者评估所得。实际风险相互依赖关系可能因市场条件和管理层应对措施而有所不同。
  - id: FR003
    title: 关键外部依赖图
    type: dag
    data:
      nodes:
        - id: semgrep
          label: Semgrep（AppSec 平台）
        - id: github
          label: GitHub / Microsoft
        - id: llm_provider
          label: OpenAI 或 Anthropic（LLM API）
        - id: aws_gcp
          label: AWS / GCP（云基础设施）
        - id: nist_nvd
          label: NIST NVD + GitHub Advisory DB（CVE 数据源）
        - id: tree_sitter_oss
          label: tree-sitter 开源库（MIT 许可）
        - id: capital_providers
          label: Menlo / Lightspeed / Sequoia（股权投资方）
        - id: opengrep_community
          label: Opengrep 社区（竞争对手 / 分叉项目）
        - id: eu_regulators
          label: 欧盟监管机构（GDPR / AI Act）
        - id: fedramp
          label: FedRAMP 项目办公室（GSA）
      edges:
        - from: semgrep
          to: github
          label: 主要 CI/CD 集成；GitHub App；Actions
        - from: semgrep
          to: llm_provider
          label: Semgrep Assistant AI 推理
        - from: semgrep
          to: aws_gcp
          label: 云平台托管
        - from: semgrep
          to: nist_nvd
          label: 供应链 CVE 数据
        - from: semgrep
          to: tree_sitter_oss
          label: AST 解析（MIT 许可证）
        - from: semgrep
          to: capital_providers
          label: E 轮融资依赖
        - from: opengrep_community
          to: semgrep
          label: PLG 漏斗竞争（不利）
        - from: eu_regulators
          to: semgrep
          label: GDPR / AI Act 合规义务
        - from: fedramp
          to: semgrep
          label: 面向联邦市场的 FedRAMP 授权门槛
    approximationNotes: 依赖关系基于公开文档及产品架构分析。LLM 提供商尚未确认；根据现有信号，OpenAI 最为可能。
  - id: FV001
    title: 推荐逻辑流程：从证据到确信
    type: flow
    data:
      nodes:
        - id: market
          label: 广阔市场：AppSec 规模 $8.6B → 2030 年 $25B+——开发者安全融合趋势
        - id: product
          label: 技术护城河：Pro Engine 跨文件数据流；20,000+ 条 Pro 规则；多产品平台
        - id: customers
          label: 客户验证：7 家具名企业客户；G2 评分 4.5/5；年扫描量 7500 万+次
        - id: financials
          label: 财务不透明：年经常性收入（ARR）估计 $33.6M；净留存率（NRR）及增速未披露——不足以形成确信
        - id: risks
          label: 风险较高：GHAS 同质化竞争；Opengrep 分叉；LGPL 法律风险；资本依赖
        - id: valuation
          label: 估值合理：估计投后估值 $400–750M，对应 12–22x ARR（处于 40–60% 增速区间的合理范围）
        - id: recommendation
          label: 有条件兴趣：待 NRR > 110%、ARR 增速 > 50%、LGPL 法律问题厘清后方可投资
      edges:
        - from: market
          to: recommendation
          label: 支持
        - from: product
          to: recommendation
          label: 支持
        - from: customers
          to: recommendation
          label: 支持
        - from: financials
          to: recommendation
          label: 制约（不透明）
        - from: risks
          to: recommendation
          label: 制约（风险偏高）
        - from: valuation
          to: recommendation
          label: 若增速确认则支持
    approximationNotes: 该流程代表从证据到投资建议的逻辑链。并非正式评分模型。
  - id: FV002
    title: 估值敏感性分析：按增长情景划分的 ARR 倍数
    type: bar
    data:
      items:
        - label: 悲观情景（增速 <20%，8–10x ARR）
          value: 270
          unit: $M implied value
        - label: 低基准情景（增速 30%，10–12x ARR）
          value: 370
          unit: $M implied value
        - label: 基准情景（增速 50%，15x ARR）
          value: 504
          unit: $M implied value
        - label: 高基准情景（增速 60%，20x ARR）
          value: 672
          unit: $M implied value
        - label: 乐观情景（增速 80%，25x ARR）
          value: 840
          unit: $M implied value
        - label: 超高增长情景（增速 100%，30x ARR）
          value: 1008
          unit: $M implied value
    approximationNotes: 估值以 ARR 倍数 × 当前 ARR 估计值 $33.6M 计算。各增速档位的 ARR 倍数由作者基于开发者安全领域可比公司判断得出，并非正式 DCF 或可比公司分析。
  - id: FV003
    title: 估值 / 回报区间：乐观 / 基准 / 悲观情景
    type: range
    data:
      items:
        - label: D 轮进入时的隐含估值（估计）
          low: 400
          base: 575
          high: 750
          unit: $M
          claimRefs:
            - CV016
          sourceNotes: Estimated from $100M Series D raise and Menlo ownership range of 13–25%
        - label: 基准情景退出估值（战略收购，2028–2030 年）
          low: 500
          base: 900
          high: 1400
          unit: $M
          claimRefs:
            - CV012
          sourceNotes: Based on $70–90M 2027E ARR × 7–15x exit multiple
        - label: 乐观情景退出估值（首次公开募股（IPO）或溢价收购，2027–2029 年）
          low: 1200
          base: 1800
          high: 3000
          unit: $M
          claimRefs:
            - CV011
          sourceNotes: Based on $100–120M ARR × 12–25x growth multiple; IPO premium or strategic premium included
        - label: 悲观情景退出估值（下行轮融资或困境出售）
          low: 150
          base: 275
          high: 400
          unit: $M
          claimRefs:
            - CV013
          sourceNotes: Based on $40–50M ARR × 4–8x stagnation multiple; preference overhang erodes common equity value
        - label: D 轮预计回报（基准情景，面向 D 轮投资者）
          low: 0.8
          base: 1.2
          high: 2
          unit: x MOIC
          claimRefs:
            - CV012
          sourceNotes: Series D post-money $400–750M; base case exit $600M–$1.2B; 20–30% dilution from Series E/E+ rounds assumed
    approximationNotes: 所有估值均为基于可比交易及作者判断的情景估计，不构成投资建议。实际结果可能与估计存在重大偏差。
  - id: FV004
    title: 投资 KPI 记分卡
    type: kpi
    data:
      items:
        - label: 市场机遇
          value: 8
          max: 10
          notes: AppSec 规模 $8.6B → $25B+；开发者安全融合趋势真实存在；结构性顺风明显
        - label: 产品 / 技术护城河
          value: 7
          max: 10
          notes: Pro Engine 跨文件数据流是真实护城河；Opengrep 和 GHAS 侵蚀开源优势，但 Pro 版本仍保持差异化
        - label: 客户验证
          value: 6
          max: 10
          notes: 7 家具名企业客户，扫描量 7500 万+次，G2 评分 4.5/5；净留存率（NRR）未披露——无法确认扩张证据
        - label: 财务表现
          value: 4
          max: 10
          notes: 年经常性收入（ARR）$33.6M（众包来源）；净留存率（NRR）及增速完全未披露；证据缺口较大
        - label: 竞争地位
          value: 6
          max: 10
          notes: 开发者体验出色；面临 GHAS 的结构性威胁；Snyk 规模约为其 10 倍；Opengrep 分叉风险
        - label: 风险状况
          value: 5
          max: 10
          notes: 风险较高（GHAS、Opengrep、LGPL、关键人物、资本依赖）——均可通过监控加以管理，目前尚无急迫风险
        - label: 估值纪律
          value: 6
          max: 10
          notes: D 轮估计 12–22x ARR 处于开发者安全类别的合理区间；若 ARR 增速得到确认则估值合理
        - label: 证据质量
          value: 4
          max: 10
          notes: 产品 / 市场证据充分；财务表现证据极为薄弱——导致投资建议存在较高不确定性
    approximationNotes: KPI 评分由作者按 1–10 分制对各投资维度进行评估，并非正式评分模型。
