      - number: '3.3'
        title: 平台老牌厂商：Checkmarx、SonarQube 与 Veracode
        blocks:
          - type: paragraph
            body: >
              Checkmarx One 是企业级 SAST/SCA 市场的主导平台，ARR $150M+（2025 年 10 月），ARR 同比增长 30%+，拥有 860+ 家大型企业客户，并获得 Gartner
              Magic Quadrant AST 领导者认定。Checkmarx 争夺 ACV 超过 $100K 的企业 大单，这类客户要求 CISO 级别的产品广度（SAST + DAST + SCA + API
              Security + ASPM）、合规文档和 SOC 2/FedRAMP 认证。Checkmarx 的弱点是开发者体验：扫描时间、规则复杂度和 UX 均以安全团队为中心，而非开发者。Semgrep 在
              Checkmarx 客户中的竞争机会，在于在 CISO 选定平台之前率先渗透工程团队。


              SonarQube/SonarCloud（SonarSource）按开发者数量计拥有最大 SAST 装机量：7M+ 开发者、500,000+ 组织，约 15% SAST 市场份额。SonarQube
              的重心是代码质量和技术债务，安全只是其次；6,500+ 条规则中 85% 面向质量， 15% 面向安全。安全检测效能基准测试显示，Semgrep 在纯安全发现上优于 SonarQube（2026
              年独立测试中检测率 46% 对比 19%）。对安全优先的买家而言，SonarQube 的 SAST 竞争威胁有限；但其作为默认 CI 代码质量工具的 主导地位意味着，Semgrep
              进入客户之前，它往往已占据"安全工具"预算线。


              Veracode（私募股权，TA Associates/Francisco Partners 持有）专注企业合规细分市场，拥有 3,000+ 客户，含 《财富》500 强。Veracode
              的优势是合规审计就绪文档和 Semgrep 不具备的 DAST 能力；弱点是开发者体验—— 扫描即服务模式被认为速度迟缓。在开发者主导、中型市场 PLG 场景中，Veracode 并非有力竞争者。
