chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与创立
        blocks:
          - type: paragraph
            body: >
              Semgrep, Inc. 是一家总部位于加利福尼亚州旧金山的应用安全公司，法人实体于 2017 年 5 月 15 日注册成立。公司最初以 r2c（Return to
              Corporation）运营，随着旗舰开源产品获得广泛认可后更名为 Semgrep。三位创始人 Isaac Evans、 Drew Dennison 和 Luke O'Malley 均毕业于 MIT
              电气工程与计算机科学专业，本科期间在 Simmons Hall 相识，从 学生时代便开始合作研究安全项目。


              公司的创立源于三位创始人共同的痛点：软件安全工具对大多数开发者而言遥不可及，所需专业技能仅存在于少数大型科技公司。 2016 年他们开始研究软件安全领域；2019 年发现了最初由 Facebook
              构建的休眠开源项目 sgrep。通过内部黑客马拉松， 他们复活并扩展了该项目，增加了更广泛的语言支持和更高层次的代码分析能力。2020 年项目更名为 Semgrep，以体现新的 定位与更宏大的使命。


              公司使命是"让漏洞利用变得代价高昂"——将世界级安全工具普及给软件工程师和安全工程师。Semgrep 的核心理念是可扩展性：
              安全规则的写法与所分析的源代码相似，让任何开发者（而非只有专家）都能编写、共享和扩展扫描规则。这种普惠化理念催生了 庞大的开源社区，也加速了企业采用。截至 2026 年 5 月，Semgrep 每年驱动超过
              7500 万次源代码安全扫描，覆盖 40+ 种编程语言，已累计发布 100+ 个版本（含每周更新）。
