      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              **GitHub 平台风险（结构性）：**

              Semgrep 的 GTM 依赖 GitHub 作为客户群的主要代码托管平台。GitHub 掌控 CI/CD 管道集成界面（GitHub Actions）、PR 评论界面（Semgrep
              在此发布发现）、仓库权限模型（Managed Scanning 所需），以及竞争产品（GHAS + Copilot Autofix）。 GitHub 可能限制第三方安全工具的 API 访问、更改 GitHub
              App 权限范围，或收紧 Actions 运行器安全策略，进而损害 Semgrep 的功能。


              **Opengrep 作为社区替代：**

              Opengrep 既是竞争风险，也是依赖风险。作为一个分叉项目，它依赖持续的社区投入来维持 OSS 引擎质量。若 Opengrep 吸引 了大量投资或企业支持（如某大型科技厂商将 Opengrep
              作为免费社区工具进行赞助），对 Semgrep PLG 漏斗的竞争压力将急剧 加大。


              **LLM 提供商依赖：**

              若 OpenAI 或 Anthropic 更改 API 定价、服务条款或访问策略，Semgrep Assistant 的功能经济性将发生实质变化。在 LLM 提供商之间迁移（如 OpenAI →
              Anthropic → Google Gemini）需要重新提示、重新评估和重新认证修复质量，产生切换延迟。


              **NVD/CVE 数据源依赖（Supply Chain）：**

              Semgrep Supply Chain 依赖 NIST NVD 和 GitHub Advisory Database 获取漏洞数据。NVD 曾出现处理积压（2024 年有文献 记录：2024 年发布的 93%
              CVE 未在 30 天内完成 NVD 分析）。若这些数据质量退化持续存在，Semgrep Supply Chain 的 可达性分析将滞后于威胁态势，损害产品的商业价值主张。


              **客户集中度风险：**

              估计前 10 名客户占总 ARR 的 30–50%。2–3 家具名企业账户（Figma、Dropbox、Snowflake）流失将代表 ARR 的实质性下降。 各客户的多年合同状态尚未得到确认。
