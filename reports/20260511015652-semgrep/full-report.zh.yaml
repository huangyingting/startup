      - - Pro Engine（污点分析 / 数据流）
        - 为 Pro 规则提供跨文件、跨函数的污点分析
        - 基于 OSS 核心的自研 OCaml 扩展；云端分析通过 Semgrep cloud API 运行
        - Semgrep 云基础设施（AWS/GCP）；本地扫描器通过 API 调用
        - 云依赖在隔离网络环境中引入延迟和故障风险；Teams 层无本地部署选项
      - - 规则注册表
        - 存储、版本化并分发规则
        - Semgrep Registry（semgrep.dev/r）；YAML 规则格式；社区规则 + Pro 规则
        - GitHub（社区规则）；Semgrep 托管 API（Pro 规则）
        - 规则时效性：新披露的 CVE 类别从公开到社区规则发布可能滞后数天至数周
      - - 云平台（AppSec 控制台）
        - 发现管理、分类、报告、SSO、Managed Scanning 编排
        - SaaS 网页应用；semgrep.dev；多租户，企业级租户隔离
        - AWS/GCP 提供计算与存储；Assistant 使用第三方 LLM API（OpenAI/Anthropic）
        - Assistant 依赖 LLM 供应商；客户数据经第三方 LLM 处理，可能需安全审查
      - - CI/CD 集成
        - 在 PR 事件时触发扫描；将发现发布至 PR 检查；阻断合并
        - GitHub Actions、GitLab CI、Jenkins 插件、CircleCI orb、Azure DevOps 扩展、Bitbucket pipelines
        - GitHub API、GitLab API、Bitbucket API、Azure DevOps API（版本控制系统 API）
        - GitHub API 速率限制及策略变更可能影响企业规模下的扫描频率
      - - 可达性引擎（Supply Chain）
        - 从应用代码构建调用图；叠加 CVE 影响的函数调用
        - 基于 Pro Engine 数据流原语构建的自研调用图分析
        - NIST NVD CVE feed、GitHub Advisory Database、OSS Insights 数据
        - NVD feed 延迟（披露后最长 48 小时）；反射及动态分发场景下可达性准确率低
    notes: 架构细节来自 Semgrep 公开文档、开源代码和产品博客，自研层细节不完整。
