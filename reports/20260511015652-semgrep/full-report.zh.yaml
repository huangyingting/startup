      - number: '5.2'
        title: 架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Semgrep 的软件架构分为三层：


              **第一层——扫描引擎（OSS 核心）：** 基础静态分析引擎以 OCaml 编写并开源（此前采用 LGPL-2.1，2024 年 12 月起改用 Semgrep Open Source License，并对
              CE 规则加以限制）。引擎使用 tree-sitter 语法对 40 余种编程语言进行语言特定的 AST（抽象语法树）解析，所有层级均可使用 OSS 引擎提供的语法模式匹配和过程内分析。


              **第二层——Pro Engine（付费）：** Pro Engine 在 OSS 核心基础上扩展了过程间污点分析（跨文件、跨函数数据流）、完整的 20,000 余条 Pro
              规则库，以及高级语言专用分析器。Pro Engine 在 Semgrep 的云基础设施上运行（非本地），扫描结果将传输至 Semgrep 服务器进行 Pro 层分析，所有付费客户因此对云端产生依赖。


              **第三层——AppSec 平台（云端）：** 基于 Web 的管理控制台（semgrep.dev）提供仓库管理、发现分类、规则配置、策略执行、 用户管理（SSO/SAML/SCIM）、报告仪表板、AI
              分类（Semgrep Assistant）、Managed Scanning 编排及 API 访问，并存储发现 历史与趋势数据。


              **数据管道：** 源代码由 Semgrep CLI（在 CI/CD 中运行）在本地扫描；发现元数据（文件路径、规则 ID、匹配文本片段、行号）
              传输至云平台。默认不传输完整源代码，仅发送匹配的代码片段和上下文行。该架构对企业安全审批流程至关重要。


              **依赖关系图：** 平台通过 OAuth 和 Webhook API 与 GitHub、GitLab、Bitbucket 和 Azure DevOps 深度集成。Semgrep Assistant 依赖第三方
              LLM API（OpenAI 或 Anthropic）进行代码解释和修复生成。Supply Chain 依赖 CVE/NVD 数据库 （NIST）、GitHub Advisory Database 以及
              Semgrep 自研的可达性分析。OSS 引擎是整个平台的强依赖项。
