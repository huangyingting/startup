      - number: '4.3'
        title: 成本结构、毛利率与资本密集度
        blocks:
          - type: paragraph
            body: >
              Semgrep 是一家基于云托管的 SaaS 企业，采用开发者工具架构。销售成本（COGS）主要由以下几部分构成：（1）扫描 执行层和数据管道的云托管费用（AWS/GCP）；（2）CI/CD API 集成和
              webhook 处理；（3）企业实施的专业服务人力 成本；（4）Supply Chain 漏洞情报第三方数据接入费用。


              毛利率估算：无公开披露。基于开发者安全 SaaS 基准，75—80% 的毛利率较为典型；专业服务比重较大的公司（如 Veracode）毛利率偏低（约 60—70%）。Semgrep
              的架构——以云端规则执行的核心静态分析引擎为基础——天然具备 高毛利特征。AI 分类层（Semgrep Assistant）引入 LLM 推理成本（OpenAI/Anthropic API 费用），若定价不当，
              可能压缩毛利率 3—7 个百分点。


              运营费用：私人未披露。预估研发费用约占 ARR 的 50—60%（成长期开发者工具典型值），销售与市场约占 40—50% （构建企业 GTM），综合管理费用约占 10—15%。以 $33.6M ARR
              计，上述估算意味着年现金运营支出约 $45—75M， 当前规模下自由现金流（FCF）每年亏损约 $15—40M。


              资本密集度：低。静态分析软件无硬件制造或实物资产要求，资本支出极少。云计算成本随扫描量扩张，规模化后形成 可变成本要素，但基础设施完成配置后每次额外扫描的边际成本极低。
