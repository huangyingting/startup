      - number: '8.6'
        title: 附注
        blocks:
          - type: callout
            title: NRR 是最重要的单一缺失数据点
            body: >
              Semgrep 的投资逻辑系于净留存率（NRR）。若 NRR > 120%（扩张明显超过流失），PLG → Enterprise 交叉销售路径运转有效，悲观情景概率极低。若 NRR <
              105%，公司处于早期流失阶段，扩张逻辑未经验证， 估值偏高。其他所有指标——ARR 增速、企业销售管道、员工数——在消解投资建议当前不确定性方面，重要性 均次于 NRR。
            calloutType: insight
            claimRefs:
              - CV003
              - CV015
          - type: callout
            title: 基准情景依赖多个有利条件同时成立
            body: >
              基准情景假设：Opengrep 维持在临界规模以下、GHAS 三年内无法追平 Pro Engine、企业直销顺利起量， 以及 E
              轮能以持平或上行估值完成。每项条件单独看均存在不确定性；四者同时成立的不确定性更为显著。 这并非否定投资逻辑——所有成长期投资都需要有利条件叠加——但它要求在价格纪律和仓位规模上保持与 情景不确定性相称的谨慎。
            calloutType: insight
            claimRefs:
              - CV012
              - CV013
              - CV014
          - type: callout
            title: 信息不对称从结构上不利于外部投资者
            body: >
              Semgrep 不披露任何经营指标。管理层、现有投资者和员工掌握 ARR、NRR、流失率、销售管道及烧钱速度的 完整数据。外部投资者仅有 $33.6M 的众包 ARR
              估算、员工数估算和产品文档。这种信息不对称在私营 成长期公司中属于常态，但意味着当前定价反映的是尚未经外部验证的内部信息。最终尽调待确认事项中的 数据室核查项，是将信息不对称压缩至投资级质量所需的最低标准。
            calloutType: risk
            claimRefs:
              - CV001
              - CV002
              - CV004
          - type: callout
            title: 最可能收购方：Palo Alto Networks 或 CrowdStrike
            body: >
              基准情景下，战略并购是最可能的退出路径。Palo Alto Networks（Prisma Cloud 平台，含 Bridgecrew 收购在内的活跃 AppSec 并购记录）和
              CrowdStrike（Falcon 平台向 AppSec 延伸）是最可能的战略买方。 两者均具备资产负债表实力（市值 $15B+）、战略合理性（开发者主导的 AppSec 与其云安全平台高度相邻），
              以及开发者安全领域中型并购的成功记录。按基准情景 $600M–$1.2B 定价，对两家买方而言均属可消化的规模。
            calloutType: insight
            claimRefs:
              - CV022
              - CV023
              - CV025
