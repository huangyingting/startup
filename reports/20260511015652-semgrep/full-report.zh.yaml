      - number: '3.4'
        title: Opengrep 分支与现状替代品
        blocks:
          - type: paragraph
            body: >
              Opengrep 的定位独特：既是竞争威胁，也是 Semgrep 战略失误的佐证。它由 Aikido Security、Endor Labs、 Amplify Security、Jit、Orca Security
              和 Mobb 组成的联盟于 2025 年 1 月 23 日发布——恰在 Semgrep Series D 宣布前两周——恢复了 Semgrep 于 2024 年 12 月限制的 CE
              功能（跨函数污点分析、指纹识别、追踪忽略、特定元 变量）。Opengrep 由多厂商开放治理联盟负责治理，由专职 OCaml 团队开发，以 LGPL-2.1 授权发布。截至 2026 年初，Opengrep
              已积累 2,100+ GitHub Star、26 个版本、61+ 名贡献者，且在特定规则加载场景的基准测试中 扫描速度比 Semgrep CE 快 3.15 倍。


              Opengrep 的威胁具体指向 Semgrep 的开源到企业采用漏斗。原本会以 Semgrep CE 作为免费扫描层——最终转化为 Teams/Enterprise 的切入点——的组织，现在可以使用
              Opengrep 获得恢复后的功能，且与 Semgrep Inc. 无商业 关系。Semgrep 的 PLG 护城河依赖于 Semgrep CE 作为自然起点；Opengrep
              提供了一个真正有竞争力的免费替代品， 持续侵蚀这一优势。


              现状替代品仍是最常见的选择：ESLint（JavaScript）、Bandit（Python）、Flawfinder（C/C++）、PMD（Java）、 GoSec（Go）以及其他语言的通用
              linter。这些工具按语言分散，缺乏跨语言编排，也没有规则市场——这些正是 Semgrep 弥补的弱点。对 AppSec 成熟度 1 级的组织，人工代码审查、临时脚本和无工具方式是默认选择。
            claimRefs:
              - CP030
              - CP031
              - CP032
              - CP033
              - CP034
              - CP035
              - CP036
      - number: '3.5'
        title: 切换成本、锁定效应与护城河持久性
        blocks:
          - type: paragraph
            body: >
              Semgrep 的竞争护城河分为三类：社区与规则网络效应、技术差异化，以及 GTM/分销。


              规则网络效应是最持久的护城河：Semgrep 的 3,000+ 条社区规则和 20,000+ 条商业 Pro 规则代表了多年积累的贡献 和机构知识，无法一夜复制。然而，大多数 OSS
              规则是可移植到任何兼容规则引擎（包括 Opengrep）的 YAML 模式。 规则护城河最坚固的部分是商业 Pro 规则集——它是专有的，仅授权给付费客户。


              技术差异化：Semgrep Pro Engine 在 40+ 种语言中提供 CI 速度级别的跨文件、跨函数污点分析——这一组合竞争对手 尚未复制。CodeQL 提供更深层的语义分析，但速度慢 5—10
              倍，适合夜间构建而非每次提交的 PR 检查。Semgrep 的 MCP server 集成使其在 AI 编程助手市场（Cursor、VS Code、Claude Desktop）中占据独特位置。


              GTM 与分销：OSS → Teams → Enterprise 的 PLG 路径相比直接企业销售能以更低获客成本（CAC）实现"先占后扩"。 风险在于，GHAS 的 GitHub 原生分销对尚未尝试
              Semgrep 的 GitHub 中心化组织而言直接绕过了这一路径。 Semgrep 多 VCS 灵活性是最明确的反击。


              切换成本适中：Semgrep CI 集成（GitHub Actions、GitLab CI、Jenkins）是标准 YAML，安装配置仅需 1—2 天。 自定义规则的迁移耗时更长；Pro 规则集不可移植。包含
              SSO/SAML、SCIM 配置、策略仪表盘和审计日志的企业平台 协议带来一定粘性。综合来看：Semgrep 有真实但非结构性的锁定效应，免费层和 Teams 层的流失风险高于 Enterprise。
