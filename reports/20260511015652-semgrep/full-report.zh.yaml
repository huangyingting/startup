        - 中——中断期间发现管理及新扫描触发受损
        - 高——99.9% Enterprise SLA；status.semgrep.dev 监控；可能具备多区域备份
        - 中断低于 1 小时为低；影响企业合规窗口的长时间中断为中
        - Enterprise 无本地部署选项；完全依赖云端
