  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Semgrep 所在的市场是应用安全测试（AST）市场，具体聚焦于开发者优先的 SAST、SCA 和密钥检测细分领域。AST 市场
              广义上包含静态分析（SAST）、动态分析（DAST）、交互式分析（IAST）、运行时保护（RASP）和软件成分分析（SCA） 工具。Semgrep 的可寻址市场不含 DAST、IAST 和
              RASP（目前均不参与竞争），也不含渗透测试服务、红队咨询和 基础设施安全工具。


              市场边界的界定至关重要：分析机构的估算从 $1.83 billion（MarketsandMarkets，2025 年，窄口径 AST 工具范围） 跨越至 $11+ billion（Mordor
              Intelligence，2026 年，宽口径 DevSecOps 平台范围）。两个极端均无法精准反映 Semgrep 的可寻址细分市场；面向开发者的 SAST/SCA/Secrets
              可服务市场（SAM）估计约为 $2—3 billion。现状替代 方案——人工代码审查、临时 linting 和无工具方式——是 Semgrep 需要替换的最大单一竞争对手，赢得这类场景的关键
              在于证明速度快、误报率低、集成摩擦小。
            claimRefs:
              - CM034
              - CM039
