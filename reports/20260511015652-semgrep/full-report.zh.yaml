  - id: FE001
    title: Semgrep 产品架构栈
    type: stack
    data:
      layers:
        - label: Semgrep AppSec 平台（云端）
          modules:
            - 发现项管理与分诊仪表板（semgrep.dev）
            - Semgrep Assistant —— AI 分诊、自动修复建议（LLM API）
            - 托管扫描编排 —— 集中化 CI/CD 部署
            - 策略引擎 —— 规则配置、阻断阈值
            - SSO/SAML、SCIM、审计日志、报告、REST API
        - label: Semgrep Pro Engine（自研专有 —— 云端执行）
          modules:
            - 跨文件与跨函数污点 / 数据流分析
            - 20,000+ 条 Pro 规则库（OWASP、CWE、语言专项）
            - 可达性感知的 SCA（调用图 + CVE 叠加）
            - Semgrep Secrets 实时验证引擎
        - label: Semgrep OSS 核心（本地执行 —— CLI / CI）
          modules:
            - OCaml 静态分析引擎 —— 模式匹配与过程内分析
            - 支持 40+ 种语言的 tree-sitter 语法（AST 解析）
            - 3,000+ 条社区规则（开放注册表）
            - SARIF / JSON 输出，用于 CI/CD 集成
        - label: CI/CD 与 IDE 集成层
          modules:
            - GitHub Actions、GitLab CI、Jenkins、CircleCI、Azure DevOps、Bitbucket Pipelines 等 CI/CD
            - VS Code 插件、JetBrains 插件、LSP 支持
            - JIRA、Slack、PagerDuty、Linear webhook 集成
            - GitHub App（托管扫描触发器）
    approximationNotes: 架构层级划分基于 Semgrep 公开文档。Pro Engine 云端执行边界系从文档中关于 Pro Engine 运行于 Semgrep 基础设施的表述推断。
  - id: FE002
    title: 客户工作流：从开发者到企业全局安全
    type: flow
    data:
      nodes:
        - id: discover
          label: 开发者发现 Semgrep（GitHub、博客、技术会议）
        - id: install_ce
          label: 安装 CE：本地运行 `semgrep scan` 或通过 GitHub Actions
        - id: first_scan
          label: 运行首次扫描：CE 规则在 PR 中标记安全问题
        - id: upgrade_trigger
          label: 升级触发条件：仓库数超过 10 个、需要 Pro 规则或 AI 分诊
        - id: teams_tier
          label: Teams 版（每贡献者每月 30 美元）：Pro Engine + Pro 规则
        - id: enterprise_trigger
          label: Enterprise 触发条件：需要 SSO、CISO 项目、托管扫描
        - id: enterprise_deploy
          label: Enterprise 合同：托管扫描部署至所有仓库
        - id: platform_adoption
          label: 全平台采用：Code + SC + Secrets + Assistant
        - id: value_realized
          label: 安全程序成熟度：发现项录入 JIRA、仪表板、合规报告
      edges:
        - from: discover
          to: install_ce
          label: 零摩擦：pip install semgrep 或 GitHub Action
        - from: install_ce
          to: first_scan
          label: 即时价值：5 分钟内获得首个发现项
        - from: first_scan
          to: upgrade_trigger
          label: PLG 转化事件：规模瓶颈或质量缺口
        - from: upgrade_trigger
          to: teams_tier
          label: 通过 semgrep.dev 自助升级
        - from: teams_tier
          to: enterprise_trigger
          label: 自下而上：团队 → 部门 → 组织
        - from: enterprise_trigger
          to: enterprise_deploy
          label: 直销签约；部署托管扫描
        - from: enterprise_deploy
          to: platform_adoption
          label: 交叉销售：增加 SC、Secrets、Assistant
        - from: platform_adoption
          to: value_realized
          label: 扩张收入 + NRR 增长
