      - number: '5.4'
        title: 技术差异化与知识产权
        blocks:
          - type: paragraph
            body: >
              Semgrep 的主要技术差异化主张包括：


              1. **规则语言与可移植性：** Semgrep 规则语言（基于 YAML 的模式 DSL）允许安全工程师无需深入编译器知识即可编写规则。
              针对某一语言框架编写的规则，通常可在数分钟内适配到另一语言。这种可移植性产生网络效应：社区用户已为 Semgrep 团队未 优先支持的框架和语言贡献了 3,000 余条社区规则。


              2. **Pro Engine 数据流精度：** 跨文件和跨函数的污点分析计算开销大；Semgrep 通过组合式过程间分析加以实现，能在合理 扫描时间内扩展至企业规模代码库。GitHub 的 CodeQL
              同样提供过程间分析，但 CodeQL 要求掌握学习曲线陡峭的专有查询语言。 Semgrep 的主张是：在不牺牲精度的前提下，开发者的上手门槛更低。


              3. **可达性感知 SCA：** Supply Chain 产品的可达性分析（在依赖图之上构建调用图计算）是 SCA 市场的真正技术差异化点。 多数 SCA 工具不论代码路径如何，标记依赖图中所有
              CVE；Semgrep 在已发布基准测试中将其减少了 95% 以上。


              4. **扫描遥测数据护城河：** 每年 7,500 万次以上的扫描产生匿名化模式遥测数据，为规则质量和误报率提供反馈。若 Semgrep 能将这些数据用于训练规则分类器，这一数据优势将随时间复利增长。


              5. **速度：** Semgrep OSS 专为开发者时间反馈循环而设计，对变更文件的增量扫描目标为 60 秒以内。Opengrep 在 2025 年初 声称全仓库基准测试性能提升 3.15 倍，若属实，将对
              Semgrep 的开发者体验优势构成竞争威胁。


              **知识产权状况：** 未发现公开的专利组合。IP 主要内嵌于 Pro Engine 的专有数据流分析和 Pro 规则库中。OCaml 引擎源码 已开放（2024 年 12 月后受许可证限制）。Pro
              Engine 和 Pro 规则为专有商业秘密。
