        - 语言覆盖存在空白；新语言版本可能在社区修补前破坏语法规则
      - - 模式匹配引擎（OSS Core）
        - 基于 AST 执行 YAML 规则匹配；过程内分析
        - OCaml 代码库；LGPL-2.1（2024 年 12 月前）/ Semgrep OSL（2024 年 12 月后）；运行于开发者本地机器或 CI runner
