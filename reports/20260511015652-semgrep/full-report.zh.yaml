      - number: '2.4'
        title: 增长驱动因素
        blocks:
          - type: paragraph
            body: >
              四大结构性顺风因素推动 AppSec 市场增长至 2028 年，Semgrep 直接受益。


              第一，AI 生成代码正在制造新的漏洞攻击面。Mordor Intelligence 将此因素归因为 DevSecOps 年复合增长率额外 贡献 +2.9 个百分点。Gartner（经 Veracode
              引用）报告称 65% 的工程负责人表示团队已在使用 AI 工具；GitHub Octoverse 2024 显示 2024 年生成式 AI 项目贡献增长 59%，GitHub 上 AI 项目数量增长
              98%；Sonatype 2026 年 报告确认 AI 辅助开发正在加速依赖变更频率，并引入错误包选择。Semgrep 的 MCP server、AI 原生规则和"氛围编程" 安全定位直接回应这一需求。


              第二，监管顺风结构性存在：欧盟《网络弹性法案》（Cyber Resilience Act）要求 2026 年 9 月前在 24 小时内 报告漏洞，2027 年 12 月前全面执行，违规罚款最高可达 €15
              million 或全球营业额的 2.5%。Futurum Group 2025 年下半年调查（n=1,008）显示 73.2% 的组织预期网络安全预算增加。


              第三，软件供应链攻击持续加速：Sonatype 2024 年发现 512,000+ 个恶意包；97% 的代码库包含开源组件（Black Duck OSSRA 2025）。SBOM 强制要求正将供应链风险转化为
              Semgrep Supply Chain 的合规采购驱动力。


              第四，"左移"（shift-left）已成主流：56% 的开发者表示所在组织已采用 DevSecOps 平台（GitLab 2024）； 72% 的 500+ 员工企业已将 SAST 集成到 CI/CD
              流水线（Grand View Research 2024）。
