      - number: '7.3'
        title: 运营、安全与技术风险
        blocks:
          - type: paragraph
            body: >
              **LLM API 依赖（Semgrep Assistant）：**

              Semgrep Assistant 依赖第三方 LLM API（OpenAI 或 Anthropic）进行 AI 分类和代码修复生成。这带来三项独立风险： （1）定价风险——LLM
              推理成本可能大幅上涨；（2）可用性风险——LLM API 中断或限速直接影响 Semgrep Assistant 功能； （3）数据风险——向第三方 LLM
              传输代码片段可能违反企业数据安全策略，产生额外采购障碍。


              **GitHub API 依赖：**

              Semgrep 的主要 CI/CD 集成依赖 GitHub Actions 和 GitHub App（用于 Managed Scanning）。GitHub 历来保持向后兼容，但 GitHub Actions
              运行环境、API 认证或 Webhook 推送的任何变更都可能中断客户扫描。GitHub 还通过 GHAS 与 Semgrep 形成 竞争关系。


              **云基础设施集中度：**

              Semgrep 的云平台托管于单一云服务商（AWS 或 GCP，未经确认）。若主要云服务商发生重大中断，Semgrep AppSec 平台的 可用性将受损，包括发现管理、策略执行和 Managed
              Scanning 编排。


              **Semgrep 扫描管道自身的安全性：**

              Semgrep 分析来自客户仓库的代码。针对 Semgrep 扫描器的供应链攻击（恶意规则注入 Pro 规则仓库）可能危及客户的 CI/CD 管道。Semgrep 的规则签名和分发安全性尚未经过独立审计。


              **扫描结果数据完整性：**

              漏报漏洞（Semgrep 未能检测到的安全缺陷）构成运营责任。若某 Semgrep 客户因 Semgrep Pro 规则本应检测到的漏洞类别而 遭受安全漏洞，声誉和潜在法律（过失/保修）风险可能相当严重。


              **大型代码库的性能退化：**

              Opengrep 的 3.15 倍性能声明（全仓库基准测试）表明 Semgrep CE 扫描引擎积累了技术债务。对于拥有超过 1 亿行代码单体 仓库的企业客户，扫描时间过长将增加 CI/CD
              周期时间，降低开发者体验质量，并成为对性能敏感组织的采购异议。
