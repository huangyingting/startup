      - number: '3.2'
        title: 直接开发者优先竞品：Snyk 与 GitHub Advanced Security
        blocks:
          - type: paragraph
            body: >
              在产品、市场和 GTM 模式上，Snyk 是 Semgrep 最直接的竞争对手。Snyk Code（SAST，基于 2020 年 DeepCode AI 收购）、Snyk Open
              Source（SCA）、Snyk Container 和 Snyk Infrastructure as Code 与 Semgrep 四款商业产品 全面重叠。Snyk 2025 年 $407M 营收和
              5,000+ 客户印证了开发者优先 AppSec 领域的企业需求。但 Snyk 2023 年 裁员（削减 12% 员工）和营收增速放缓表明超高增长阶段已告终，公司正在为潜在 IPO 或战略退出优化盈利能力。
              Snyk 定价与 Semgrep 重叠（SAST $25—30/developer/月）；核心竞争维度是生态广度（Snyk 有 Container/IaC； Semgrep 的 SAST 规则编写更灵活）。


              GitHub Advanced Security（GHAS）构成的是分销结构威胁，而非产品技术威胁。GHAS 由 CodeQL（2019 年 GitHub 收购）、Dependabot（SCA）和 Secret
              Scanning 驱动。2025 年 3 月品牌重组将 GHAS 拆分为两款产品：GitHub Code Security（$30/committer/月）和 GitHub Secret
              Protection（$19/committer/月）。GitHub Copilot Autofix 在 pull request 中直接生成可用代码补丁，带来流畅的开发者体验。GHAS 的结构性优势来自
              GitHub 1 亿+ 开发者生态： 任何使用 GitHub 的组织，GHAS 已内置于平台，无需额外引入供应商关系。许多安全团队同时运行 GHAS 和 Semgrep—— CodeQL
              用于深度夜间语义分析，Semgrep 用于快速 PR 级模式匹配——降低了零和竞争态势。


              Semgrep 相对两者的差异化：（1）多 VCS 支持（GitLab、Bitbucket、Azure DevOps），对比 GHAS 仅限 GitHub 部署；（2）支持 40+ 种语言，对比 CodeQL 约
              12 种语言；（3）基于 YAML 的自定义规则编写，对比 CodeQL 的类 SQL 查询语言；（4）Secrets/SCA/SAST/AI 一体化平台，对比 GHAS 按模块独立计费。
