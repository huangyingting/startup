      - number: '6.5'
        title: 扩张动态与集中度风险
        blocks:
          - type: paragraph
            body: >
              **扩张动作：**

              Semgrep 的土地扩张模式在两个层面运作：（1）在单一客户内，从 Code（SAST）扩展至 Supply Chain（SCA）再到 Secrets 再到
              Assistant（"广度扩张"）；（2）在单一客户内，随着更多开发者跨团队采用 Semgrep，贡献者席位数持续增加（"席位 扩张"）。两个杠杆无需新客户获取即可驱动收入增长。


              典型企业扩张路径：一名安全工程师采用 Teams 档 → 向 3–5 个团队试点部署 → 通过 Managed Scanning 全企业部署 → 交叉 销售 Supply Chain 和 Secrets → 平台
              ACV 达到初始合同的 2–4 倍。


              **集中度风险：**

              无客户收入集中度数据披露。基于具名客户群（Figma、Dropbox、Slack、Snowflake、HashiCorp、GitLab、Shopify），可寻址
              客户群高度集中于拥有成熟安全项目和大规模工程人员的大市值科技公司。这意味着：

              - 前 10 名客户可能占 ARR 的 30–50%（估算，未经确认）

              - 在 3,360 万美元总 ARR 下，任何一家具名企业客户的流失都将产生实质影响

              - 无证据显示渠道分销商（经销商、MSSP、市场平台）客户达到有意义的规模


              **GitLab 集成的平台集中度风险：**

              GitLab 将 Semgrep 规则嵌入 GitLab Ultimate 的原生 SAST 扫描器。若 GitLab 切换到不同的规则引擎（如自建或使用 CodeQL/Sonar 规则），Semgrep
              将失去一个间接分发渠道。这并非直接的收入依赖，而是社区/管道依赖。


              **垂直行业集中度：**

              Semgrep 的公开客户参考集中于软件原生公司。扩张至受监管行业（金融服务、医疗保健、政府）需要 FedRAMP 授权、HIPAA BAA 或 Semgrep
              尚未大规模提供的行业特定合规认证，限制了这些垂直市场的可及市场规模。
            claimRefs:
              - CU025
              - CU026
              - CU027
              - CU028
              - CU029
