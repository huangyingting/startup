      - - LGPL-2.1 重新授权法律意见
        - Semgrep 法律顾问就 LGPL-2.1 重新授权合规性出具的意见；所有社区规则贡献者的 CLA 签署状态
        - LGPL 合规性未确认则存在潜在阻塞性法律风险；机构投资者要求核心 IP 权属清晰
        - Semgrep 总法律顾问；要求 Semgrep 外部律师出具正式 IP 尽调报告
      - - CE 用户数量及 Opengrep 影响
        - 2024 年 12 月授权变更前后的月活跃 CE 扫描次数及新安装率；Opengrep 与 Semgrep 的开发者调研数据对比
        - PLG 漏斗健康度是 Teams 转化增长的首要先行指标；Opengrep 分叉对 CE 漏斗的冲击是最关键的未知变量
        - 管理层——增长 / 产品团队；要求提供 CE 漏斗仪表盘
      - - 企业直销指标
        - 2025 年 Q1/Q2 企业客户经理数量；管道覆盖率；对比 GHAS、Snyk、Checkmarx 的赢率 / 败率；平均企业合同 ACV
        - VP Sales 爬坡速度是企业 GTM 执行的关键变量；数据将验证或推翻 D 轮企业增长逻辑
        - 管理层——VP Sales（Garrett Souza）；要求提供 CRM 管道摘要及企业客户队列数据
    notes: 尽调问题按对投资逻辑的影响程度排序。在任何投资决策前，必须获得数据室访问权限。
    claimRefs:
      - CV024
      - CV025
