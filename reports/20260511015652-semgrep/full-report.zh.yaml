  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与信心水平
        blocks:
          - type: paragraph
            body: >
              **建议：有条件兴趣——待数据室确认后跟进**


              Semgrep 是一家处于投资级市场的投资级公司，产品技术差异化明显，开发者品牌强劲。投资逻辑**并未从根本上 失效**，但在缺乏数据室准入的情况下，**当前信息质量不足以支撑行动**，须确认以下事项：

              1. 当前 ARR 及同比增速（$33.6M 估算已有 9 个月之久，来源于众包）

              2. 净留存率（NRR）及各层级（Teams vs. Enterprise）的客户队列留存

              3. 实际烧钱速度、现金跑道及 E 轮时间线


              缺乏上述三项确认，高信心买入建议无法成立。一旦获得，建议或升级至**有条件买入**（若 NRR > 120% 且 ARR 增速 > 60%），或降级至**放弃**（若 NRR < 100% 且增速 < 30%）。


              **信心水平：中** —— 财务表现存在实质性证据缺口（所有指标均未披露），不支持高信心建议。


              **风险评级：偏高** —— 竞争商品化（GHAS）、Opengrep fork、资本依赖及关键人物风险同时存在；目前 不急迫，但须主动监测。


              **估值立场：若 ARR 年增速 > 50%，当前估值看来合理** —— 以 $33.6M ARR、50–80% 同比增速估算， D 轮估值 $400–750M（12–22x
              ARR）在开发者安全可比公司范围内。ARR 增速降至 20–30% 则估值偏高； 超 80% 则偏低。
