  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              应用安全测试竞争格局有五类与 Semgrep 直接相关：（1）争夺相同买家和用户的开发者优先 SAST/SCA 同类产品； （2）具备安全功能的代码质量老牌厂商；（3）企业级 SAST/SCA
              平台领导者；（4）作为 Semgrep 开源社区漏斗 免费替代品的 Opengrep 分支；（5）延伸至代码扫描的云安全平台。


              按营收或企业安装量，Semgrep 并非最大 SAST 厂商。开发者优先安全公司中营收最高的是 Snyk（2025 年营收 $407M，估值 $7.4—8.5B，约 1,278 名员工），提供可比的
              SAST（Snyk Code）、SCA（Snyk Open Source）、 Container 和 IaC 扫描。GitHub Advanced Security（GHAS）天然嵌入 GitHub 1 亿+
              开发者生态，定价 $30/committer/月——与 Semgrep Code 完全相同，具有结构性分销优势。SonarQube 按开发者数量计拥有最大 SAST 装机量（7M+ 开发者，15% SAST
              市场份额），但主要聚焦于代码质量和技术债务，而非安全优先分析。Checkmarx One （ARR $150M+，860+ 家企业客户）领跑企业级 SAST/SCA 细分市场。


              Opengrep 分支由 10 家公司联盟于 2025 年 1 月 23 日发布，在 LGPL-2.1 下恢复了 CE 等效功能并免费提供，直接 威胁 Semgrep 的开源到企业采用漏斗。Opengrep
              已积累 2,100+ GitHub Star、26 个版本，并声称在部分基准测试中 扫描速度比 Semgrep CE 快 3.15 倍。现状替代品——人工代码审查、通用 linter
              和无工具方式——仍是尚未正式化 AppSec 项目的公司最常见的替代选择。
