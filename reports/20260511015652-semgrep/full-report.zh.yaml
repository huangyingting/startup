      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Semgrep 自 2020 年 10 月首次机构融资以来，已完成四轮融资，累计筹资 $204M。融资轨迹折射出公司在约五年内从种子期 基础设施迅速扩张至成熟企业级 AppSec 平台的历程。最近一轮为 2025
              年 2 月 5 日宣布的 $100M Series D，由 Menlo Ventures 领投，全体现有投资方（Felicis Ventures、Harpoon Ventures、Lightspeed
              Venture Partners、 Redpoint Ventures、Sequoia Capital）均参与跟投。


              Series D 之前，Semgrep 于 2023 年 4 月完成由 Lightspeed Venture Partners 领投的 $53M Series C；Series B 于 2021 年 7
              月关闭，Series A 于 2020 年 10 月关闭。公司目前为私人控股，未公开披露营收指标、利润率或年经常性 收入（ARR）。Tracxn 数据显示截至 2026 年 3 月员工数为 257
              人。Series D 估值尚未正式披露；当时报道结合轮次规模、 行业可比公司和投资方阵容，将 Semgrep 置于独角兽区间，但官方数字未见发布。本轮资金将用于 AI 及程序分析人才招募、
              产品认知度提升，以及包括欧洲和亚太地区在内的市场拓展。


              投资方均为美国机构风险投资机构，未见战略投资者或企业投资者。战略投资者的缺席使 Semgrep 得以保持独立性——其 服务的多家企业客户本身可能也是潜在战略投资方的技术合作伙伴或竞争对手。Semgrep
              的信息披露状态为私人非披露： 截至 2026 年 5 月，财务报表、ARR 或营收增长指标均不公开。
