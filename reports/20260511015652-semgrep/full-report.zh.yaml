      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景
        blocks:
          - type: paragraph
            body: >
              **乐观情景（概率 20–25%）：**

              ARR 以 70–80% CAGR 增长，2027 年突破 $100M，2028 年达 $180M+。NRR 超过 120%，表明多产品交叉销售 （Code + SC + Secrets +
              Assistant）扩张势头强劲。企业直销团队 2026 年前扩展至 50+ 名 AE。 2026–2027 年完成 E 轮，估值 $1B+。通过 IPO 或战略并购（Google、Microsoft
              Azure、JetBrains、 Palo Alto Networks）以 $1.5–3B 退出，时间窗口 2027–2029 年。D 轮投资者回报：已投资本 2–4 倍。


              **基准情景（概率 50–55%）：**

              ARR 以 40–60% CAGR 增长，2027 年达 $70M，2028 年达 $120M。NRR 为 105–115%，扩张温和。企业直销 团队扩展至 20–30 名 AE。2027 年完成 E 轮，估值
              $500–800M。通过战略并购（Palo Alto、 Broadcom/Symantec、Rapid7、Qualys）以 $600M–$1.2B 退出，时间窗口 2028–2030 年。D 轮投资者回报：
              按当前价格计 0.8–1.5 倍已投资本，具体取决于 E 轮稀释幅度。


              **悲观情景（概率 20–30%）：**

              Opengrep fork 压缩 CE 顶部漏斗，企业客户采纳 GHAS 冲击企业销售管道，ARR 增速停滞在 30% 以下。 NRR 跌破 105%，出现客户流失或合同收缩。E
              轮融资在持平或下行估值区间完成（$300–500M）。公司被 安全行业并购方（Broadcom、Tenable、HCL）战略收购，或以 $200–350M 进行战略重组。D 轮投资者回报： 已投资本
              0.2–0.5 倍，叠加大幅优先股超额稀释。


              NRR 是核心摆动因素：NRR > 120%，基准情景升格为乐观；NRR < 105%，基准情景降格为悲观。这一目前 未披露的单一指标，是确认投资逻辑最重要的数据点。
