      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              Semgrep 生态的总可用市场（TAM）以全球 DevSecOps 平台市场为锚点：Mordor Intelligence 预测 2026 年市场规模 达 $10.88 billion（年复合增长率
              22.1%，至 2031 年），Coherent Market Insights 和 Fortune Business Insights 的数据为 $11.07—11.49
              billion。上述数字采用最宽泛的定义，囊括 DevSecOps 编排、CI/CD 安全自动化和合规管理， 以及 SAST/SCA 工具。更窄口径的 AST 工具市场——MarketsandMarkets
              的口径最直接对应 Semgrep 的产品覆盖——2025 年为 $1.83 billion（年复合增长率 26.7%，至 2031 年），对应 2026 年约为 $2.3 billion。


              SCA 独立市场（Grand View Research）自 2023 年的 $266.2 million 出发，以 19.87% 的年复合增长率增长，预计 到 2030 年达到 $880.6
              million。上述数据自洽——Semgrep Supply Chain 正在这一细分领域竞争。各分析机构数据 差异悬殊（比率从 2:1 到 6:1 不等），主要原因是口径定义不同，而非方法论错误。


              Semgrep 的可服务市场（SAM）——面向 CI/CD 集成团队的开发者侧 SAST/SCA/Secrets——2026 年估计约为 $2—3 billion。 自下而上验证：GitHub 报告全球开发者超过
              1 亿；若其中 10% 所在组织拥有正式的 AppSec 项目，且每人按 $30/月 全量转化，理论上的可获取市场（SOM）上限每年超过 $3.6 billion。实际渗透率远低于此。若假设当前增长轨迹下 3—5
              年内占据 SAM 的 6% 份额，Semgrep 现实可获取市场估算约为 $150—300 million。
