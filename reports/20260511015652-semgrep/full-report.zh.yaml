        title: 风险缓解措施、监控触发器与投资逻辑破坏事件
        blocks:
          - type: paragraph
            body: |
              **现有风险缓解措施：**
              - SOC 2 Type II 认证应对企业安全异议
              - GDPR DPA 和隐私文档应对欧盟客户采购要求
              - FedRAMP Ready 状态提供授权路径（阻断联邦销售，但不妨碍企业商业）
              - Managed Scanning 降低企业部署摩擦（应对运营风险）
              - Pro Engine 差异化（跨文件数据流）相较于简单模式匹配竞品提供技术护城河
              - 1 亿美元 D 轮融资提供至少 12–18 个月的跑道，缓解资本风险

              **投资逻辑破坏触发器（若发生任何一项，投资者应退出或实质性折价仓位）：**
              1. GitHub 宣布面向所有 GitHub Enterprise 客户降低 GHAS 价格或实现与 Semgrep Code 的功能对等——将直接蚕食企业 SAST 市场
              2. Semgrep ARR 确认低于 2,500 万美元或同比增长低于 20%——意味着 PLG 增长停滞论点得到证实
              3. 因 2024 年 12 月许可证变更向 Semgrep 提起 LGPL-2.1 版权侵权诉讼——将产生生存性法律风险
              4. 两家或以上具名企业客户公开流失至竞品——将发出产品市场契合度侵蚀信号
              5. Opengrep 达到 20,000 个以上 GitHub 星标，或主要风险投资机构/企业赞助商宣布支持 Opengrep——将加速 CE 漏斗流失

              **监控指标（季度审查）：**
              - semgrep/semgrep 和 opengrep/opengrep 仓库的 GitHub 星标增长率
              - G2 和 Gartner Peer Insights 评分趋势
              - Semgrep 职位发布（按职能）作为收入增长投入的代理指标
              - GHAS 定价及功能公告
              - Latka ARR 估算更新
              - FedRAMP 市场列表状态
