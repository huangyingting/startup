        - 决定 Semgrep 的 SaaS 经济模型是否具有竞争力（目标：75–80%+）
        - 若无毛利率数据，无法估算盈利路径或经营杠杆
        - 要求提供最近财年及上一财年的 GAAP 毛利率；确认营业成本分类方式
