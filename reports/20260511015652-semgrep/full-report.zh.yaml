      - number: '2.5'
        title: 采用约束与风险
        blocks:
          - type: paragraph
            body: >
              五大实质性制约因素限制 AppSec 采用速度，并对 Semgrep 产生直接影响。


              工具疲劳和误报是最突出的问题。多项行业研究显示传统 SAST 误报率在 30—70% 之间。Cypress Data Defense 2025 年调查中，62%
              的受访者承认曾为赶工期而发布含漏洞的代码。Latio 2026 年报告将 AppSec 描述为"一个正在经历 危机的学科"。后果是告警疲劳：58% 的 AppSec 从业者频繁遭遇误报。


              人才短缺进一步加剧：全球网络安全人才缺口达 480 万（ISC2 2024）。仅 30% 的组织认为自身已达到成熟的 DevSecOps 水平（Checkmarx
              2025）。这既带来机遇（自动化替代人力），也带来采用风险（资源不足的团队推迟购买）。


              市场集中度风险现实存在：43% 的组织处于最低 AppSec 成熟度水平（Gartner）。这一细分市场只能通过免费层触达， 而 Opengrep 分支提供免费替代方案，转化更加困难。


              现有巨头的平台整合正在提速：管理 7 个以上安全工具的企业（Endor Labs）正向覆盖范围更广的代码到云安全平台 收拢。Checkmarx、Snyk、GitHub Advanced Security 和
              Wiz 正在构建与 Semgrep 重叠的能力。Latio 2026 指出 独立 ASPM 作为类别已悄然消亡。
