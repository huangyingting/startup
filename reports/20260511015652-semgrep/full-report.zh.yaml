      - number: '1.4'
        title: 产品平台与规模
        blocks:
          - type: paragraph
            body: >
              Semgrep 商业版 AppSec Platform 由四款互联产品组成，均构建于开源 Semgrep 引擎之上。Semgrep Code（SAST）提供 跨文件、跨函数的污点分析静态应用安全测试，支持 30+
              种语言。Semgrep Supply Chain（SCA）执行具备可达性感知的 软件成分分析，只暴露实际被调用代码路径中的漏洞，而非包含所有导入包中每一条 CVE。Semgrep Secrets 结合语义分析
              与熵分析检测硬编码凭证，并实时验证其有效性。Semgrep Assistant 是 AI 层：自动分类漏洞、在首日抑制约 20% 的 SAST 误报（随代码库学习可提升至约
              40%），生成修复指引，并可直接开启附带代码修复建议的 pull request。


              开源版 Semgrep Community Edition（CE）是商业平台的基础，个人及非商业用途在 LGPL-2.1 下免费使用。截至 2026 年 5 月，GitHub 仓库已累计获得 14,300+
              Star，被数十万开发者使用，其中包括 GitLab、Dropbox、Slack、Figma、 Shopify、HashiCorp 和 Snowflake 的安全工程师。平台每年驱动 75M+ 次代码扫描，覆盖
              40+ 种语言，支持 3,000+ 条 社区贡献规则。商业平台以 SaaS 形式销售：SAST 或 SCA（Teams 层）定价 $30/month/contributor，Secrets 定价
              $15/month/contributor，大型企业和本地部署提供自定义 Enterprise 定价。


              2025 年发布的 MCP server 允许 AI 编程助手（Cursor、VS Code、Claude Desktop）在 AI 辅助开发过程中实时调用 Semgrep 扫描，直接应对 LLM
              生成代码带来的"氛围编程"安全漏洞风险。Semgrep 的 Managed Scanning 功能代替客户 处理 CI/CD 配置，将从接入到首次发现漏洞的时间从数周压缩至数小时。
