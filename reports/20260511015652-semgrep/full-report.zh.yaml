companyProfile:
  summary: >
    Semgrep（前身为 r2c）是一家总部位于旧金山的应用安全平台，由 Isaac Evans（CEO）、Drew Dennison（CTO）和 Luke O'Malley（CPO）于 2017 年联合创立。公司以 OCaml
    编写的高性能静态分析引擎为核心，构建面向开发者的安全工具， 支持 40+ 种编程语言。平台包含四款产品：Semgrep Code（SAST）、Semgrep Supply Chain（含可达性分析的 SCA）、 Semgrep
