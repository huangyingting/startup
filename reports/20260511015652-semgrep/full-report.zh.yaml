      - number: '2.3'
        title: 买家细分与采用路径
        blocks:
          - type: paragraph
            body: >
              AppSec 买家市场按组织规模、预算归属和工作流切入点细分。大型企业（1,000+ 员工）中，CISO 或 AppSec 项目负责人
              掌握最终预算审批权；采购通常由监管合规要求、安全事故经历或董事会层面的安全项目建设驱动。该细分市场按组织规模 口径占 AST 市场收入的 64%（Business Research
              Insights）。安全工程师是主要用户，采购流程涉及正式 RFP、安全 问卷和 90—180 天的采购周期。


              中型市场和 SMB 细分中，工程副总裁或 CTO 主导采购，CISO 的介入有限。Semgrep 的产品驱动增长（PLG）模式在 这里尤为有效：开发者自发采用 Community Edition，在 CI
              中验证价值后以 $30/contributor/月转化至 Teams。 免费到付费的触发点是规模（代码库超过 10 个）或安全项目正式化。


              政府和受监管行业（BFSI、医疗）呈现不同规律：合规官员和正式采购流程主导，周期更长，FedRAMP/HIPAA 合规要求 形成可预期的需求。北美占全球 AST 市场
              35—42%（Mordor、MarketsandMarkets、BRI 口径一致），是 Semgrep 的 最优先市场。亚太地区是增速最快的地区（年复合增长率 22—25%），但销售周期更长，监管框架各异。
