  - id: TR001
    title: 监管 / 法律风险登记册
    coverage: partial
    enumerationScope:
      coverage: partial
      basis: >-
        Risks identified from public legal analysis, regulatory databases, news coverage, and author review; non-public
        litigation and regulatory actions may exist
    columns:
      - 规则 / 许可证 / 案件
      - 司法管辖区
      - 状态
      - 可能性
      - 严重程度
      - 缓解措施
      - 残余敞口
      - 尽调路径
    rows:
      - - Semgrep 开源许可证（SOSL）——2024 年 12 月 CE 许可证变更及 LGPL-2.1 重新许可合规性
        - 美国（合同法 / 知识产权法）
        - 无正式诉讼；社区法律异议已在 GitHub Discussions 和 Hacker News 上提出
        - 低至中
        - 高——若贡献者群体提起 LGPL 违规索赔，将威胁公司存续
        - Semgrep 已发布许可证变更说明，声称合规；未确认所有贡献者均签署 CLA
        - 若并非所有社区贡献者均签署符合 LGPL 的 CLA，重新许可在法律上存在敞口
        - 请求 Semgrep 就 LGPL 重新许可提供法律意见；确认逾 3,000 名社区规则贡献者均有 CLA 覆盖
      - - FedRAMP 授权缺口——美国联邦政府市场受阻
        - 美国联邦（FedRAMP）
        - FedRAMP Ready 状态——截至 2026 年 5 月，ATO 流程尚未完成
        - N/A（监管要求）
        - 中——封锁 50 亿至逾 100 亿美元的联邦 AppSec 市场；对商业 SaaS 不构成生存威胁，但限制 TAM
        - 已获 FedRAMP Ready 状态；ATO 赞助流程正在推进
        - 在赞助机构完成 3PAO 评估前（通常需 12–24 个月），无法取得 FedRAMP 授权
        - 确认哪家联邦机构正在赞助 Semgrep 的 ATO；请求 FedRAMP 路线图时间表
      - - EU AI Act 合规——AI 辅助代码修复生成
        - 欧盟
        - EU AI Act 自 2024 年 8 月起生效；开发者工具 AI 的具体义务尚不明确
        - 低至中
        - 低至中——潜在的合规披露及文档义务
        - 有限风险 AI 系统的透明度要求可能适用；代码安全工具预计不会被列为高风险
        - EU AI Office 监管解释指引尚待发布；风险通过文档记录可控
        - 持续关注 EU AI Act 针对开发者工具的指引；为 Semgrep Assistant 准备透明度披露文件
      - - GDPR 数据处理——代码片段传输至 Semgrep 云端及 LLM API
        - 欧盟 / 英国
        - 合规——DPA 已发布；国际传输已有标准合同条款（SCC）
        - 低
        - 中——违反 GDPR 第 44 条可能导致监管机构审查或罚款
        - Semgrep DPA 中的标准合同条款已覆盖国际传输；欧盟数据驻留已在规划中，但尚未落地
        - 欧盟数据驻留上线前，GDPR 严格合规的企业客户可能限制代码片段传输范围
        - 确认 Semgrep DPA 中列明了哪些第三方 LLM API 次处理方；核实欧盟客户的 SCC 合规情况
      - - 知识产权侵权风险——第三方针对 Pro Engine 数据流分析的专利主张
        - 美国 / 全球
        - 无已知专利纠纷；Semgrep 无公开披露的专利组合
        - 低
        - 中——若资金雄厚的竞争对手就 Semgrep 使用的过程间数据流分析技术申请专利保护
        - 静态分析数据流方法现有技术丰富（Bell Labs、Carnegie Mellon、MIT）；专利清除风险低但非零
        - 当前无知识产权诉讼风险；持续监测竞争对手专利申请（Snyk、Checkmarx、GHAS）
        - 请求对 Pro Engine 方法进行知识产权尽调；确认自由实施（FTO）分析已完成
    notes: 风险登记册基于公开法律分析、监管文件及社区论坛。非公开诉讼、监管调查或知识产权冲突可能存在，但未被识别。
