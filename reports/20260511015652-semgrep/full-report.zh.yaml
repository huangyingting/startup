      - number: '1.5'
        title: 关键里程碑与重大不利事件
        blocks:
          - type: paragraph
            body: >
              Semgrep 从一个休眠的开源项目成长为累计融资 $204M 的企业平台，历经约九年。公司里程碑轨迹可划分为三个阶段： 开源社区建设（2017—2020）、企业产品扩张与融资提速（2021—2023）、AI
              增强平台规模化（2024—2026）。


              Semgrep 历史上最重大的不利事件是 2024 年 12 月的开源许可证收紧。Semgrep 将 OSS 项目更名为"Semgrep Community Edition"，引入专有的"Semgrep
              Rules License"限制规则的商业使用，并将指纹识别、追踪忽略、特定元变量等功能从 Community Edition 迁移至商业平台。此举在安全和开发者社区引发强烈反弹。2025 年 1 月 23
              日，由 Aikido Security、 Endor Labs、Amplify Security、Jit、Orca Security 和 Mobb 等 10+ 家应用安全公司组成的联盟发布了 Opengrep——
              最后一个全功能 CE 代码库的分支，在 LGPL-2.1 下恢复了被锁定的功能。批评者将这次许可证变更称为"rug pull"，认为 其背离了在 Semgrep 生态中持续投入的贡献者。Semgrep
              则将此次变更定性为防止竞争对手将其规则商业化的必要举措， 并强调底层引擎依然保持 LGPL-2.1 授权。截至 2026 年初，Opengrep 已积累 2,100+ GitHub Star，并拥有专职全职
              OCaml 开发团队。


              尽管争议不断，Semgrep 仍在 Opengrep 分叉发布仅两周后宣布完成 $100M Series D，显示投资方信心依然稳固。 公司随即引入来自 Palo Alto Networks、Snyk 和
              Matillion 的资深人才，并明确提出迈向自主 AppSec 工程的发展 路线图。
