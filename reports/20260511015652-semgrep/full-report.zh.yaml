      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              **关键人物依赖——联合创始人：**

              Isaac Evans（CEO）和 Drew Dennison（CTO）是核心技术和商业领导者。未公开命名继任计划、副 CEO 或 COO。任一联合
              创始人的离职都将对公司技术路线图和投资者关系造成重大影响。两人都是公司公众形象的活跃贡献者（博客文章、会议演讲、 媒体采访）。


              **企业 GTM 执行风险：**

              Semgrep 于 2025 年初作为 D 轮 GTM 投资的一部分招募了 Garrett Souza 担任 VP Sales。将企业直销职能从接近零发展至 5,000 万美元以上 ARR，需要：（1）招募具备
              SAST/AppSec 领域专业知识的企业客户主管；（2）建立 SDR 和市场营销运营； （3）开发企业采购流程（安全问卷回应、法律合同模板、续约基础设施）。对于工程主导的 PLG 公司而言，这是公认的艰难
              组织转型；执行失败通常在 VP Sales 招募后 12–18 个月体现为 ARR 停滞。


              **OCaml 工程师人才竞争：**

              Semgrep 的核心分析引擎以 OCaml 编写，这是一种人才池有限的专业函数式编程语言。OCaml 工程师薪酬溢价，被 Jane Street、 Meta（Hack 编译器）等专业雇主争相招募。Semgrep
              维护和扩展 Pro Engine 的能力依赖于这一狭窄的专业招聘池。


              **从工程主导型向企业销售型组织的文化转型：**

              Semgrep 的创立文化以工程为先、社区为先。转向企业直销需要招募激励结构和文化规范可能截然不同的销售、市场营销和客户 成功人员。在保持工程质量的同时管理这一转型，是公认的执行挑战。
