        - 生产——活跃社区贡献者
        - HashiCorp 工程师已向 Semgrep registry 贡献自定义规则；有生产使用的证据
        - IBM 收购 HashiCorp 后可能调整 AppSec 工具策略；规则贡献可能来自个人，而非企业指令
      - - GitLab
        - OEM / 嵌入式；同时也是竞争对手
        - Semgrep CE 规则嵌入 GitLab Ultimate SAST 扫描器（GitLab CI 原生扫描器）
        - 生产——嵌入 GitLab 产品
        - GitLab 公开记录在 SAST 集成中使用 Semgrep 规则；印证技术质量在大规模场景下经得住检验
        - 属合作关系，非直接商业 Enterprise 合同；GitLab 可在任意版本替换 Semgrep 规则；不构成 ARR 贡献参考
      - - Shopify
        - Enterprise——电商平台；10,000 人以上
        - Semgrep Code；企业级部署
        - 生产——从客户页面列表推断
        - 列于 Semgrep 客户页面；无详细案例研究
        - 无可用成果数据；仅为列名；超大型组织可能同时使用多种 SAST 工具
      - - Slack (Salesforce)
        - Enterprise——即时通讯 SaaS；2021 年被 Salesforce 收购
        - Semgrep Code；在 CI/CD 流水线中强制执行自定义规则
        - 生产——Salesforce 收购前的参考
        - Slack 工程师在工程博客中公开讨论了使用 Semgrep 实施自定义安全规则的实践
        - 参考案例早于 Salesforce 收购；收购后 AppSec 工具决策可能已变更；时效性不确定
    notes: 所有案例研究均由 Semgrep 撰写或整理，独立核实有限。生产与试点状态由案例研究的措辞推断。
