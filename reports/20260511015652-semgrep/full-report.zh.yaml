      - number: '6.4'
        title: 留存、持久性与满意度
        blocks:
          - type: paragraph
            body: >
              Semgrep 未公开披露客户留存指标（净留存率 NRR、总留存率 GRR、流失率、续约率或队列数据）。以下所有估算均由作者基于 行业基准和行为信号推导：


              **企业档留存代理指标：** 采用 SSO/SAML、SCIM、Managed Scanning 和多年合同的企业客户，结构性切换成本较高。SAST 工具 一旦通过 Managed Scanning
              覆盖组织全量仓库，安全团队若要切换，需重新配置 CI/CD、迁移发现历史、重新培训开发者习惯， 并对新工具进行合规再认证。这产生了类似其他开发者基础设施工具的自然黏性。企业档 GRR 估计：85–95%。


              **Teams 档留存代理指标：** 自助 Teams 档客户切换成本较低——迁移只需更改 GitHub Actions 工作流文件并移动规则。但一旦 工程团队已自定义规则并将发现集成至 JIRA
              工作流，切换摩擦也不可忽视。Teams 档 GRR 估计：70–85%。


              **CE / 免费档留存：** CE 用户本就不贡献收入；CE"留存"（继续使用 Semgrep CE 而非迁移至 Opengrep）无法核实。2024 年 12 月的许可证变更可能加速了 CE 用户向
              Opengrep 的流失。


              **G2 满意度信号：** 30 余条评测平均 4.5/5，表明开发者满意度较高。常见正面主题：规则质量、规则编写便利性、CI 集成、 低摩擦。常见负面主题：大型代码库上 Pro Engine
              扫描延迟、社区规则误报率、高级用例文档深度不足。


              **NPS 代理指标：** Semgrep 未发布净推荐值（NPS）数据。持续的 G2 正面评测和活跃的社区规则贡献（3,000 余条社区规则） 表明开发者 NPS 超过 50，这与拥有强大 OSS
              社区参与度的开发者工具的典型水平相符。
