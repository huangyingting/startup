        - 低——无已确认的多 LLM 回退；Assistant 功能是增强型分类，而非核心扫描
        - LLM 长时间中断期间，Semgrep Assistant 功能不可用；企业客户可能提出 SLA 质疑
        - 无已披露的多供应商 LLM 回退或本地 LLM 选项
      - - 恶意规则注入 Pro 规则注册表——通过规则更新发起供应链攻击
        - 极低
        - 高——恶意规则可在客户 CI/CD 流水线中执行任意代码
        - 中——存在规则签名和代码审查流程；具体细节未经公开审计
        - 概率极低，一旦发生影响极大；将从根本上损害客户信任
        - 无已发布的规则注册表安全第三方审计；规则签名架构未公开记录
      - - 漏报漏洞——Semgrep 未能检测到客户代码库中被利用的安全缺陷
        - 中（静态分析的固有局限）
        - 中至高——若因未检测到的漏洞类别导致客户遭受攻击，将产生声誉及潜在法律敞口
        - 中——Semgrep 公布 CWE 覆盖范围；局限性已记录；未保证检测全面
        - Semgrep 的责任受合同条款限制；高关注度漏报带来的声誉敞口是真实存在的
        - Pro 规则无独立 FP/FN 率基准；局限性未经独立审计
      - - Pro Engine 大规模扫描性能退化——大型代码库扫描超时
        - 中（Opengrep 基准测试显示存在性能差距）
        - 中——扫描时间过长造成 CI/CD 摩擦；开发者抗拒在关键流水线中启用 Semgrep
        - 中——增量扫描优化持续进行；Opengrep 分叉凸显性能差距
        - 面向客户的 Enterprise 扫描性能 SLA 未公开；若扫描拖慢 CI 周期，企业客户可能降低 Semgrep 的优先级
        - 无已发布的企业规模（1 亿行以上代码）Pro Engine 性能基准
    notes: 风险评级由作者根据现有运营数据评估。可能性评级（低/中/高）为定性判断。缓解成熟度评级衡量现有控制措施的深度。
