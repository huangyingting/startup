  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Semgrep 是一款开发者优先的应用安全平台，在代码提交时扫描源代码——涵盖开发者 IDE、CI/CD Pull Request 以及全仓库定期
              扫描——在安全漏洞进入生产环境前将其识别出来。平台围绕四款核心产品构建：


              **Semgrep Code（SAST）：** 静态应用安全测试引擎，通过模式匹配和数据流分析，比对超过 20,000 条 Pro 规则（由 Semgrep 工程师精选维护）和 3,000
              余条社区规则，发现安全漏洞。Pro Engine 新增跨文件、跨函数的污点追踪，能检测跨多个模块的漏洞—— 这是 Semgrep 区别于 grep 等简单模式匹配工具及基础 SAST 扫描器的核心技术能力。


              **Semgrep Supply Chain（SCA）：** 开源依赖分析工具，超越简单 CVE 列表匹配，引入可达性分析——验证依赖项中的漏洞函数是否 真正被应用代码调用。这种"可达性感知
              SCA"大幅降低噪声：Semgrep 宣称在给定代码库中，列表匹配型 SCA 工具标记的 CVE 中 仅 2–5% 被判定为"可达"。


              **Semgrep Secrets：** 对嵌入源代码中的 API 密钥、令牌、密码和私钥进行硬编码凭据检测，支持实时验证（向端点发送探测请求 确认密钥是否有效）并阻断含密钥的 PR 合并。


              **Semgrep Assistant：** AI 驱动的漏洞分类与修复层，于 2024 年推出，基于大语言模型（可能为 OpenAI GPT-4 或 Claude）构建。 Assistant
              自动分类扫描结果，过滤确认的误报，以自然语言解释发现内容，并生成建议的代码修复方案。企业版内置 Assistant， Teams 档可选购。


              客户工作流从开发者通过 GitHub Actions 或 CLI 自助采用（社区版 → 升级至 Teams）开始，再借助 Managed Scanning 功能扩展
              到全企业部署——该功能通过直销模式，在所有仓库间自动化 CI/CD 配置，无需各团队开发者单独介入。
