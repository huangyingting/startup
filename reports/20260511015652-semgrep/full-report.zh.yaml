      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              **安全认证：** Semgrep 持有 SOC 2 Type II 认证，涵盖安全性、可用性和保密性控制。合规报告可在签署 NDA 后通过 trust.semgrep.dev 向企业客户提供。


              **GDPR 合规：** Semgrep 已为欧洲客户发布数据处理协议（DPA），并支持 GDPR 数据删除请求。截至 2025 年，传输至 Semgrep 平台的代码片段数据受 GDPR 留存和删除控制约束。


              **FedRAMP：** 截至 2026 年 5 月，尚未获得 FedRAMP 授权状态。这是进入美国联邦政府销售市场的阻断性因素，限制了在 受监管美国政府领域的可及市场。Semgrep
              已被标注为"FedRAMP Ready"，仍在推进中；完成时间表未知。


              **HIPAA：** 未发现公开的 HIPAA BAA 服务；Semgrep 未将医疗保健作为主要垂直行业。


              **数据处理政策：** 默认情况下，Semgrep 不使用客户代码训练 AI 模型；遥测改进计划需客户主动选择加入。隐私文档明确， 发送至 Semgrep 云平台进行 Pro Engine
              分析的代码片段，未经客户明确同意不用于规则训练。


              **状态与可靠性：** 状态页面（status.semgrep.dev）显示企业档 SLA 可用率为 99.9%。截至 2026 年 5 月，未发现重大 公开披露的服务中断事件。


              **质量控制：** Semgrep 发布 Pro 规则的误报率基准；Pro 规则典型误报率声称在基准规则集上低于 5%。社区规则无强制误报率 标准。


              **漏洞披露：** Semgrep 已发布负责任披露政策。未发现归因于 Semgrep SaaS 平台的公开 CVE。
