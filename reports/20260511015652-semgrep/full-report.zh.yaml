      - number: '6.3'
        title: 具名客户证据
        blocks:
          - type: paragraph
            body: >
              Semgrep 已为多个知名组织发布了具名客户参考案例和案例研究博客文章。证据质量因客户而异：


              **Figma：** 公开博客文章和 Semgrep 落地页参考案例证实，Figma 工程团队在 SAST 规模化部署中生产级使用 Semgrep Code。 Figma 有 150 名以上的工程师，使用
              Semgrep 在 CI/CD 中执行自定义安全规则，规则由其安全团队编写。这是高质量企业参考 案例——生产级部署、自定义规则编写、工程团队特定成果一应俱全。


              **Dropbox：** Semgrep 发布了关于 Dropbox 使用 Semgrep 进行开发者主导安全修复的案例研究。Dropbox 是大型工程组织 （1,000 余名工程师），使用 Semgrep
              在不等比例扩充安全团队的情况下扩大安全审查覆盖面。参考案例质量高。


              **GitLab：** GitLab 既是竞争对手（提供原生 CI/CD 和 SAST），也是客户——GitLab 在 OEM/集成安排下将 Semgrep CE 规则 嵌入 GitLab Ultimate 的
              SAST 扫描器。这代表一种"合作即分发"的动态。GitLab 嵌入 Semgrep 规则验证了技术质量，但也 意味着 GitLab 可以随时切换规则引擎。


              **Snowflake：** 列于 Semgrep 客户页面；截至 2026 年 5 月，尚无详细案例研究发布。Snowflake 拥有大型工程团队和复杂 代码库；该参考案例暗示企业级部署。


              **HashiCorp：** 列于 Semgrep 客户页面；博客文章中提及 HashiCorp 工程师贡献社区规则。这是开发者社区参与，而非直接 商业参考。


              **Slack（已被 Salesforce 收购）：** 具名客户；Slack 工程团队在 Salesforce 收购前采用 Semgrep 进行自定义规则执行。 参考案例的时效性存疑（收购后 Slack
              工程组织的工具链可能已有变化）。


              **Shopify：** 列于 Semgrep 客户页面；Shopify 拥有规模可观的安全工程团队。无详细案例研究；参考案例表明企业级部署。
