      - number: '4.2'
        title: GTM 模式与销售效率指标
        blocks:
          - type: paragraph
            body: >
              Semgrep 的市场进入模式以产品驱动（自下而上）为主，企业直销层正在形成。PLG 模式围绕三个转化节点构建： （1）开发者个人或小团队通过 GitHub Actions 或 CLI 采用；（2）团队达到
              $30/contributor/月 Teams 阈值后 升级；（3）通过直销接触完成企业级整合。


              PLG 模式大幅降低传统获客成本（CAC）。对自助 Teams 层客户而言，Semgrep 的有效 CAC 主要是开发者营销成本 （会议、开源赞助、文档和社区管理），而非传统内部销售周期。2025 年 2 月
              Series D 完成后招募 Garrett Souza 担任销售副总裁，标志着有意构建企业直销体系——这是从纯 PLG 向混合模式的结构性转变。


              SaaS PLG 基准数据（OpenView 2025）显示，拥有开发者优先免费层的 PLG 公司通常实现 3—8% 的免费到付费转化率， 规模化后 CAC 回本周期为 6—18 个月。将这些基准应用于
              Semgrep 的 75M+ 年扫描次数和 14,300+ GitHub Star， 表明漏斗顶部规模可观，但转化效率在缺乏内部数据的情况下无法验证。


              销售周期参考指标：SAST/SCA 市场的企业级销售周期，500+ 员工组织（需 CISO 级审批）通常为 90—180 天，中型 市场工程负责人主导的交易为 30—60 天。Semgrep 的 Managed
              Scanning 功能（代替客户处理 CI/CD 配置）将初次 发现价值的时间从数周压缩至数小时，很可能是转化加速器。


              人均营收：$33.6M ARR / 210 名员工（2025 年 9 月）= 约 $160K/人。低于顶级 SaaS 基准（$200—300K/人）， 但与工程投入密集的成长期 Series D
              公司一致。Series D 完成后的扩员（Tracxn 数据，2026 年 3 月：257 人） 表明营收在增长，但员工数也同步扩张。
