        title: 管理层、董事会与治理
        blocks:
          - type: paragraph
            body: >
              Semgrep 由创始人主导管理层。Isaac Evans 担任首席执行官，负责产品愿景与整体公司战略；Drew Dennison 担任首席 技术官，主导核心工程与技术架构；Luke O'Malley
              担任首席产品官，统筹产品管理与用户体验。三位创始人自公司成立起便 分别担任 CEO、CTO 和 CPO，这一分工格局源于他们本科期间在 MIT 合作项目时自然形成的默契。


              2025 年 2 月 Series D 完成之际，Semgrep 同步完成两项战略高管招募和一次治理调整。Garrett Souza 以销售副总裁 身份加盟，此前曾担任 Matillion SVP
              Americas 和 Snyk 企业销售负责人；Palo Alto Networks 前 CEO Mark McLaughlin 以天使投资人兼顾问身份加入，为公司规模化扩张提供运营指导；Menlo
              Ventures 合伙人 Matt Murphy 则于 Series D 完成后正式出任新董事会成员。


              董事会及投资方包括 Menlo Ventures（Series D 领投，拥有董事会席位）、Lightspeed Venture Partners（Series C 领投）、Redpoint
              Ventures、Sequoia Capital、Felicis Ventures 和 Harpoon Ventures。公司未公开披露上述 投资方以外的正式董事会组成。三位创始人仍是核心运营决策者，在
              Evans、Dennison 和 O'Malley 之间形成较为集中的 关键人物风险。Isaac Evans 亲自撰写 Series D 公告和对外沟通材料，进一步强化了其作为公司主要公众发言人的角色。
