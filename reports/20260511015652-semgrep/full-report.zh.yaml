        - 若无 NRR，无法区分业务是在增长还是在流失现有客户
        - 要求按队列（Teams 对比 Enterprise）提供过去 4 个季度的 NRR
      - - 客户数量与 ACV 分布
        - 收入集中度评估、流失率建模及渠道分析的必要基础
        - 若无客户数量，无法评估风险集中度或估算 LTV
