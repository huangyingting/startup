callouts:
  - calloutType: risk
    title: "GitHub GHAS + Copilot Autofix is a structural threat to Semgrep's core value proposition"
    body: >
      GitHub bundles SAST scanning and AI-powered code fix suggestions in GitHub Enterprise and Copilot Enterprise at zero marginal cost for existing subscribers. For organizations already paying $21/seat/month for GitHub Enterprise + Copilot, adding a $30/contributor/month Semgrep Teams subscription requires a clear incremental value demonstration. The trend toward all-in-one developer platforms (GitHub, GitLab, JetBrains) commoditizing security tooling is the most durable competitive threat Semgrep faces.
    claimRefs: [CR001, CR002, CR003]

  - calloutType: risk
    title: "LGPL-2.1 license compliance risk is a credible but unquantified legal exposure"
    body: >
      The December 2024 CE license change relicensed community-contributed rules from LGPL-2.1 to Semgrep SOSL without confirmed Contributor License Agreements from all 3,000+ contributors. LGPL-2.1 requires contributor consent for relicensing derivative works. If a contributor files a copyright infringement claim, Semgrep faces an injunction risk on CE rule distribution. No litigation has been filed, but the risk has been formally raised in public forums.
    claimRefs: [CR006, CR007]

  - calloutType: risk
    title: "Capital adequacy requires ARR growth or financing within 12–18 months"
    body: >
      At estimated burn of $4–7M/month and an estimated $50–90M cash position in May 2026, the Series E financing window is approximately H1–H2 2027. This creates a 12–18 month execution window during which Semgrep must demonstrate accelerating ARR growth to justify Series E terms at a flat or increasing valuation. Failure to hit ARR milestones during this window creates a down-round or financing failure risk.
    claimRefs: [CR028, CR029, CR030]

  - calloutType: insight
    title: "Pro Engine interprocedural analysis and reachability SCA are not replicated by Opengrep or GitHub GHAS"
    body: >
      The most important risk mitigation is technical: Semgrep's Pro Engine (cross-file/function dataflow), the 20,000+ Pro rule library, and Supply Chain reachability analysis are proprietary capabilities not available in either Opengrep CE or GitHub GHAS native SAST. These create a technical moat that limits direct substitution for customers who have experienced and depend on Pro Engine quality. The thesis survives as long as enterprise customers place high value on these capabilities vs. convenience of bundled alternatives.
    claimRefs: [CR002, CR003, CR015]

