chapter:
  number: 7
  title: "Risks"
  summary: >
    Semgrep's top risks are competitive commoditization of its core SAST/AI-triage value proposition by GitHub (Copilot Autofix bundled at zero marginal cost), the Opengrep fork undermining the PLG acquisition funnel, and undisclosed financials that prevent underwriting revenue quality. Legal and license risks include the December 2024 CE license change that spawned Opengrep and exposed Semgrep to sustained community reputational damage. Regulatory risks include FedRAMP Authorization gap (blocking U.S. federal market) and the EU AI Act's potential obligations around AI-assisted code remediation. Operational risks center on LLM API provider dependency for Semgrep Assistant and concentration in two co-founders with no disclosed succession plan. All risks have identifiable monitoring triggers; the most thesis-breaking are sustained GitHub GHAS adoption by enterprise customers and failure to close the financing gap within the estimated 12–18 month runway window.

sections:
  - id: risk-overview
    title: "Risk Overview and Severity Ranking"
    body: |
      Semgrep operates at the intersection of enterprise security software, open-source development, and AI-powered tooling — three domains with distinct and compounding risk profiles. The following seven risk categories are assessed from most to least severe based on potential investment impact:

      **1. Competitive commoditization (Critical):** GitHub Advanced Security (GHAS) + Copilot Autofix bundles SAST scanning and AI-powered code fixes into the GitHub Enterprise platform at zero marginal cost for existing GitHub Enterprise customers. Semgrep's core Teams tier and Semgrep Assistant value propositions are directly substitutable. This risk is structural and worsening: GitHub's distribution advantage (50M+ developers) creates an asymmetric acquisition moat.

      **2. Open-source fork / community fragmentation (High):** The Opengrep fork (January 2025) directly threatens Semgrep's developer acquisition funnel. Opengrep claims 3.15x performance improvement, provides CE feature parity, and is licensed under AGPLv3 (fully open). If Opengrep reaches critical community mass, new developer installations will prefer Opengrep CE, starving Semgrep's PLG pipeline at the top of the funnel.

      **3. Financial opacity / capital risk (High):** All operating metrics are undisclosed. Estimated burn ($4–7M/month) against estimated cash position ($50–90M) implies a Series E financing window within 12–18 months. If ARR growth has not accelerated sufficiently, fundraising at a flat or declining valuation becomes a structural risk, with potential for down-round or strategic pressure.

      **4. License legal risk (Medium-High):** The December 2024 license change modified the Semgrep CE license from LGPL-2.1 to a proprietary Semgrep Open Source License (SOSL) with restrictions on competing commercial use. This change may have created legal exposure if the transition did not comply with LGPL-2.1 relicensing requirements (which typically require consent from all copyright contributors). No litigation has been filed, but the risk exists.

      **5. Regulatory / compliance risk (Medium):** FedRAMP Authorization gap blocks U.S. federal market. EU AI Act obligations for AI-assisted security tooling are ambiguous. GDPR data residency for EU customers is an incomplete capability.

      **6. Operational / technology dependency risk (Medium):** LLM API provider dependency (OpenAI/Anthropic) for Semgrep Assistant creates concentration and pricing risk. GitHub API dependency for primary CI/CD integration creates platform risk.

      **7. Key person / execution risk (Medium):** Co-founders Isaac Evans (CEO) and Drew Dennison (CTO) are the primary leaders with no disclosed succession plan. Series D GTM build-out (VP Sales hired) represents a new execution challenge for an engineering-led organization.
    tableRefs: []
    figureRefs: [FR001]
    claimRefs: [CR001, CR002, CR003, CR004, CR005]

  - id: legal-regulatory-risks
    title: "Legal, License, and Regulatory Risks"
    body: |
      **Open source license change legal risk:**
      In December 2024, Semgrep modified the license for the CE rules repository from LGPL-2.1 to the Semgrep Open Source License (SOSL), a proprietary license restricting competing commercial use. LGPL-2.1 requires that relicensing of derivative works receive consent from all copyright contributors. The community rule registry contained contributions from thousands of developers under LGPL-2.1; if any contributor challenges the unilateral relicensing, Semgrep faces potential LGPL violation claims. No litigation has been filed as of May 2026, but community members on Hacker News and GitHub Discussions raised specific legal concerns about the transition process.

      **IP ownership and contributor agreements:**
      Semgrep's community contribution process (via GitHub pull requests) uses an implicit "inbound = outbound" licensing assumption rather than a formal Contributor License Agreement (CLA) for all rule contributions. If Semgrep does not have proper CLAs covering the 3,000+ community rules, the relicensing may be legally precarious.

      **FedRAMP Authorization gap:**
      Semgrep is classified as FedRAMP Ready but not Authorized. Without FedRAMP Authorization (In-Progress or full), Semgrep cannot be used in U.S. federal information systems, blocking the U.S. federal government sector entirely. FedRAMP Authorization typically takes 12–24 months once ATO (Authority to Operate) sponsorship is secured.

      **EU AI Act (potential scope):**
      The EU AI Act, which entered into force in August 2024, may impose obligations on AI-powered code scanning tools in categories affecting software development. Semgrep Assistant's AI-generated code fixes could be classified under limited-risk or general-purpose AI provisions, requiring transparency disclosures and documentation. Regulatory interpretation is pending; specific compliance obligations for developer tooling AI are unresolved.

      **Data privacy — GDPR:**
      Semgrep processes code snippets (including potentially personally identifiable developer data in code comments or variable names) on cloud infrastructure not yet offering EU data residency. GDPR Art. 44 restrictions on international data transfers require Standard Contractual Clauses (SCCs); Semgrep's DPA covers SCCs, but EU data residency customers have flagged data transfer latency and compliance clarity as procurement concerns.
    tableRefs: [TR001]
    figureRefs: []
    claimRefs: [CR006, CR007, CR008, CR009, CR010]

  - id: operational-security-risks
    title: "Operational, Security, and Technology Risk"
    body: |
      **LLM API dependency (Semgrep Assistant):**
      Semgrep Assistant relies on third-party LLM APIs (OpenAI or Anthropic) for AI triage and code fix generation. This creates three distinct risks: (1) pricing risk — LLM inference costs may increase materially; (2) availability risk — LLM API outages or rate limiting directly impair the Semgrep Assistant feature; (3) data risk — code snippet transmission to a third-party LLM may violate enterprise data security policies, requiring additional procurement hurdles.

      **GitHub API dependency:**
      Semgrep's primary CI/CD integration is via GitHub Actions and GitHub App (for Managed Scanning). GitHub has historically maintained backward compatibility, but any changes to GitHub Actions runner environments, API authentication, or webhook delivery could disrupt customer scans. GitHub also competes with Semgrep via GHAS.

      **Cloud infrastructure concentration:**
      Semgrep's cloud platform is hosted on a single cloud provider (AWS or GCP, unconfirmed). A major outage to the primary cloud provider would impair the Semgrep AppSec Platform availability including findings management, policy enforcement, and Managed Scanning orchestration.

      **Security of the Semgrep scanning pipeline itself:**
      Semgrep analyzes code from customer repositories. A supply-chain attack targeting the Semgrep scanner (malicious rule injected into the Pro rules registry) could compromise customer CI/CD pipelines. Semgrep's rule signing and distribution security has not been independently audited.

      **Scan result data integrity:**
      False negative vulnerabilities (security bugs that Semgrep fails to detect) represent an operational liability. If a Semgrep customer suffers a security breach from a vulnerability class that Semgrep's Pro rules should have detected, the reputational and potential legal (negligence/warranty) exposure could be significant.

      **Performance degradation on large codebases:**
      Opengrep's 3.15x performance claim (full-repository benchmarks) suggests that Semgrep CE has accumulated technical debt in its scan engine. For enterprise customers with 100M+ LOC monorepos, slow scan times increase CI/CD cycle times, reducing developer experience quality and creating a procurement objection for performance-sensitive organizations.
    tableRefs: [TR002]
    figureRefs: [FR003]
    claimRefs: [CR011, CR012, CR013, CR014, CR015]

  - id: partner-dependency-risks
    title: "Partner and Dependency Risks"
    body: |
      **GitHub platform risk (structural):**
      Semgrep's GTM depends on GitHub as the primary code host for its customer base. GitHub owns the CI/CD pipeline integration surface (GitHub Actions), the PR comment interface (where Semgrep posts findings), the repository permission model (required for Managed Scanning), and the competing product (GHAS + Copilot Autofix). GitHub could restrict third-party security tool API access, change GitHub App permission scopes, or tighten Actions runner security in ways that impair Semgrep's functionality.

      **Opengrep as a community substitute:**
      Opengrep is both a competitive and a dependency risk. As a fork, it depends on continued community investment in the OSS engine quality. If Opengrep attracts significant investment or corporate backing (e.g., a large tech vendor sponsoring Opengrep as a free community tool), the competitive pressure on Semgrep's PLG funnel intensifies dramatically.

      **LLM provider dependency:**
      If OpenAI or Anthropic changes API pricing, terms of service, or access policies, Semgrep's Assistant feature economics change materially. Migrating between LLM providers (e.g., OpenAI → Anthropic → Google Gemini) requires re-prompting, re-evaluation, and re-certification of fix quality, creating switching latency.

      **NVD/CVE data feed dependency (Supply Chain):**
      Semgrep Supply Chain depends on NIST NVD and GitHub Advisory Database for vulnerability data. NVD has experienced processing backlogs (documented in 2024: 93% of CVEs published in 2024 were NOT analyzed in NVD within 30 days). If these data quality degradations persist, Semgrep Supply Chain reachability analysis will lag the threat landscape, impairing the product's commercial value proposition.

      **Customer concentration risk:**
      Estimated top-10 customers represent 30–50% of total ARR. Loss of 2–3 named enterprise accounts (Figma, Dropbox, Snowflake) would represent a material ARR decline. No multi-year contract status for individual customers has been confirmed.
    tableRefs: [TR003]
    figureRefs: [FR002]
    claimRefs: [CR016, CR017, CR018, CR019, CR020]

  - id: people-execution-risks
    title: "People and Execution Risk"
    body: |
      **Key person dependency — co-founders:**
      Isaac Evans (CEO) and Drew Dennison (CTO) are the founding technical and commercial leaders. No succession plan, deputy CEO, or COO has been publicly named. The loss of either co-founder would be a material disruption to the company's technical roadmap and investor relationships. Both are active contributors to the company's public identity (blog posts, conference talks, media interviews).

      **Enterprise GTM execution risk:**
      Semgrep hired Garrett Souza as VP Sales in early 2025 as part of the Series D GTM investment. Building an enterprise direct sales function from near-zero to $50M+ ARR requires: (1) recruiting enterprise account executives with SAST/AppSec domain expertise, (2) building SDR and marketing operations, (3) developing enterprise procurement processes (security questionnaire responses, legal contract templates, renewal infrastructure). This is a known-hard organizational transition for engineering-led PLG companies; failure to execute typically shows up as ARR stagnation 12–18 months after the VP Sales hire.

      **Talent competition for OCaml engineers:**
      Semgrep's core analysis engine is written in OCaml, a specialized functional programming language with a limited talent pool. OCaml engineers command premium salaries and are recruited by Jane Street, Meta (Hack compiler), and other specialized employers. Semgrep's ability to maintain and extend the Pro Engine depends on a narrow specialized hiring pool.

      **Cultural transition from engineering-led to enterprise-sales organization:**
      Semgrep's founding culture is engineering-first, community-first. The shift to enterprise direct sales requires hiring sales, marketing, and customer success personnel who may have different incentive structures and cultural norms. Managing this transition while retaining engineering quality is a known execution challenge.
    tableRefs: [TR004]
    figureRefs: []
    claimRefs: [CR021, CR022, CR023, CR024, CR025]

  - id: mitigations-kill-criteria
    title: "Mitigations, Monitoring Triggers, and Thesis-Break Events"
    body: |
      **Risk mitigations in place:**
      - SOC 2 Type II certification addresses enterprise security objections
      - GDPR DPA and privacy documentation addresses EU customer procurement requirements
      - FedRAMP Ready status provides a pathway to Authorization (blocks federal sales but does not prevent enterprise commercial)
      - Managed Scanning reduces enterprise deployment friction (addressing operational risk)
      - Pro Engine differentiation (cross-file dataflow) provides technical moat vs. simple pattern-match competitors
      - $100M Series D provides runway for at least 12–18 months, cushioning capital risk

      **Thesis-break triggers (investor should exit or materially discount position if any occur):**
      1. GitHub announces GHAS price reduction or feature parity with Semgrep Code for all GitHub Enterprise customers — would directly cannibalize the enterprise SAST market
      2. Semgrep ARR confirmed below $25M or YoY growth below 20% — would imply the PLG growth stall thesis is confirmed
      3. LGPL-2.1 copyright infringement lawsuit filed against Semgrep over December 2024 license change — would create existential legal risk
      4. Two or more named enterprise customers publicly churn to a competitor — would signal product-market fit erosion
      5. Opengrep reaches 20,000+ GitHub stars or a major VC/corporate backer announces Opengrep sponsorship — would accelerate CE funnel attrition

      **Monitoring indicators (quarterly review):**
      - GitHub star growth rate for both semgrep/semgrep and opengrep/opengrep repositories
      - G2 and Gartner Peer Insights rating trends
      - Semgrep job postings (by function) as proxy for revenue growth investment
      - GHAS pricing and feature announcements
      - Latka ARR estimate updates
      - FedRAMP marketplace listing status
    tableRefs: [TR005]
    figureRefs: []
    claimRefs: [CR026, CR027, CR028, CR029, CR030]

