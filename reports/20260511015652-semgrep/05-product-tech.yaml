callouts:
  - calloutType: strength
    title: "Pro Engine cross-file dataflow is a genuine technical moat vs. simple SAST tools"
    body: >
      The Pro Engine's cross-file and cross-function taint analysis enables Semgrep to find vulnerability classes (SQL injection across module boundaries, insecure deserialization in helper libraries) that intra-procedural tools miss. Combined with the accessible YAML rule language, this creates a technical capability gap that most open-source and lower-price competitors cannot easily replicate.
    claimRefs: [CE018, CE019, CE007]

  - calloutType: risk
    title: "Opengrep fork poses performance and community risk to CE acquisition funnel"
    body: >
      Opengrep, launched January 2025, claims 3.15x performance improvements over the Semgrep CE engine in full-repository benchmarks, is available under AGPLv3, and already has 2,100+ GitHub stars. If developers migrate to Opengrep for CE scanning, Semgrep's PLG top-of-funnel degrades because the CE-to-Teams conversion depends on developers first adopting and valuing the Semgrep CE product.
    claimRefs: [CE030, CE031, CE022]

  - calloutType: risk
    title: "GitHub Copilot Autofix and GHAS AI triage are direct Assistant substitutes at zero marginal cost"
    body: >
      GitHub launched Copilot Autofix in 2024, providing AI-generated code fix suggestions for code scanning alerts within the GitHub UI — directly overlapping with Semgrep Assistant's value proposition. For organizations already paying for GitHub Enterprise or Copilot Enterprise, Autofix is included at no additional charge. This commoditizes the AI triage differentiator that Semgrep is positioning as its next-generation moat.
    claimRefs: [CE032, CE033]

  - calloutType: insight
    title: "Managed Scanning is the key enterprise adoption unlock — monitor capacity and reference case volume"
    body: >
      Managed Scanning eliminates the primary deployment barrier for enterprise-wide SAST adoption: per-team CI/CD configuration. By managing CI/CD configuration centrally via GitHub App, Semgrep can deploy to 1,000+ repositories with a single contract. The strength of this feature at scale (10,000+ repos) has not been independently benchmarked; reference customer case studies at that scale would significantly validate the enterprise growth thesis.
    claimRefs: [CE005, CE015, CE016]

