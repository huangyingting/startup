company:
  name: Semgrep
chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Semgrep offers an application security platform built on a proprietary static analysis engine originally written in OCaml with tree-sitter parsing across 40+ languages. The product suite includes Semgrep Code (SAST), Semgrep Supply Chain (SCA with reachability analysis), Semgrep Secrets (credential detection), and Semgrep Assistant (AI-powered triage and auto-fix). The core technical differentiator is the Pro Engine's cross-file and cross-function dataflow analysis, which reduces false positives while maintaining broad language coverage. Key technology risks include performance competition from the Opengrep fork (claiming 3.15x speed improvement) and the rapid commoditization of AI-assisted code scanning by GitHub (Copilot Autofix) and Snyk. The product is mature for SAST and SCA; Secrets and Assistant remain commercially nascent.

sections:
  - id: product-definition
    title: "Product Definition and Customer Workflow"
    body: |
      Semgrep's product is a developer-first application security platform that scans source code at commit time — in the developer's IDE, in CI/CD pull requests, and in full-repository scheduled scans — to identify security vulnerabilities before they reach production. The platform is organized around four primary products:

      **Semgrep Code (SAST):** Static application security testing engine that finds security vulnerabilities by pattern matching and dataflow analysis against a library of 20,000+ Pro rules (curated by Semgrep engineers) and 3,000+ community rules. The Pro Engine adds cross-file and cross-function taint tracking, enabling detection of vulnerabilities that span multiple modules — the technical capability that most distinguishes Semgrep from simple pattern-match tools like grep or basic SAST scanners.

      **Semgrep Supply Chain (SCA):** Open-source dependency analysis that goes beyond simple CVE-list matching by applying reachability analysis — verifying whether a vulnerable function in a dependency is actually called by the application's code. This "reachability-aware SCA" dramatically reduces noise: Semgrep claims to surface only 2–5% of the CVEs flagged by list-matching SCA tools as "reachable" in a given codebase.

      **Semgrep Secrets:** Hardcoded credential detection for API keys, tokens, passwords, and private keys embedded in source code. Includes live validation (pinging endpoints to confirm a detected secret is active) and PR-blocking to prevent secrets from being merged.

      **Semgrep Assistant:** AI-powered triage and remediation layer, launched in 2024, built on top of large language models (likely OpenAI GPT-4 or Claude). Assistant automatically triages scan results, filters confirmed false positives, explains findings in natural language, and generates suggested code fixes. Assistant is bundled with Enterprise and optionally available in Teams tier.

      The customer workflow begins with developer self-service adoption via GitHub Actions or CLI (Community Edition → Teams upgrade), then expands to enterprise-wide deployment via direct sales with the Managed Scanning feature, which automates CI/CD configuration across all repositories without requiring per-team developer involvement.
    tableRefs: [TE001, TE002]
    figureRefs: [FE002]
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006]

  - id: architecture
    title: "Architecture and Operating Model"
    body: |
      Semgrep's software architecture has three layers:

      **Layer 1 — The Scanner Engine (OSS Core):** The foundational static analysis engine is written in OCaml and released as open-source (previously LGPL-2.1, now under the Semgrep Open Source License with December 2024 CE rule restrictions). It uses tree-sitter grammars for language-specific AST (Abstract Syntax Tree) parsing across 40+ programming languages. The OSS engine performs syntactic pattern matching and intra-procedural analysis available to all tiers.

      **Layer 2 — The Pro Engine (Paid):** The Pro Engine extends the OSS core with inter-procedural taint analysis (cross-file, cross-function dataflow), the full 20,000+ Pro rule library, and advanced language-specific analyzers. The Pro Engine runs in Semgrep's cloud infrastructure (not locally), meaning scan results are transmitted to Semgrep servers for Pro-tier analysis. This creates a cloud dependency for all paying customers.

      **Layer 3 — The AppSec Platform (Cloud):** The web-based management console (semgrep.dev) provides repository management, finding triage, rule configuration, policy enforcement, user management (SSO/SAML/SCIM), reporting dashboards, AI triage (Semgrep Assistant), Managed Scanning orchestration, and API access. The platform stores finding history and trends.

      **Data pipeline:** Source code is scanned locally by the Semgrep CLI (run in CI/CD); findings metadata (file paths, rule IDs, matched text snippets, line numbers) are transmitted to the cloud platform. Full source code is not transmitted by default; only matched code snippets and context lines are sent. This architecture is critical for enterprise security approval processes.

      **Dependency map:** The platform is tightly integrated with GitHub, GitLab, Bitbucket, and Azure DevOps via OAuth and webhook APIs. Semgrep Assistant depends on third-party LLM APIs (OpenAI or Anthropic) for code explanation and fix generation. Supply Chain depends on CVE/NVD databases (NIST), GitHub Advisory Database, and Semgrep's proprietary reachability analysis. The OSS engine is a hard dependency for the entire platform.
    tableRefs: [TE003]
    figureRefs: [FE001, FE003]
    claimRefs: [CE007, CE008, CE009, CE010, CE011, CE012]

  - id: deployment-integration-roadmap
    title: "Deployment, Integrations, and Roadmap"
    body: |
      **Deployment modes:**
      - CLI: `semgrep scan` runs locally against any git repository; requires Python 3 or Docker
      - CI/CD native: GitHub Actions, GitLab CI/CD, Jenkins, CircleCI, Azure DevOps, Bitbucket Pipelines — official action/plugin maintained by Semgrep
      - IDE plugins: VS Code extension, IntelliJ/JetBrains plugin, LSP-compatible editors
      - Managed Scanning: Semgrep deploys and maintains CI/CD configuration across all repositories via GitHub App or GitLab integration, eliminating per-team developer configuration burden
      - API: REST API for finding export, SBOM generation, and CI status webhook integration with JIRA, Linear, PagerDuty, Slack

      **Platform integrations:** Semgrep integrates with JIRA (ticket creation from findings), Slack (PR notifications), GitHub/GitLab Security Dashboards (SARIF output), Snyk dependency data (historical, pre-Snyk-compete overlap), and SIEM tools via webhook. SAML 2.0, Okta, Azure AD, and Google Workspace are supported for SSO.

      **Roadmap trajectory (2025–2026):**
      - AI-first direction: expanding Semgrep Assistant to auto-fix generation, IDE-first triage, and developer-facing remediation coaching
      - Managed Scanning GA: reducing time-to-deploy from hours to minutes for enterprise customers
      - Supply Chain expansion: broader reachability analysis for interpreted languages (Python, Ruby, PHP)
      - Geographic expansion: European and APAC data residency options to satisfy GDPR and regional data laws
      - Rule quality: continuous expansion of Pro rules library; community rules remain open
    tableRefs: [TE005]
    figureRefs: []
    claimRefs: [CE013, CE014, CE015, CE016, CE017]

  - id: differentiation
    title: "Technology Differentiation and IP"
    body: |
      Semgrep's primary technical differentiation claims are:

      1. **Rule language and portability:** The Semgrep rule language (YAML-based pattern DSL) allows security engineers to write rules without deep compiler knowledge. A rule written for one language framework is typically adaptable to another in minutes. This portability creates network effects: 3,000+ community rules have been contributed by users for frameworks and languages that Semgrep's team has not prioritized.

      2. **Pro Engine dataflow precision:** Cross-file and cross-function taint analysis is computationally expensive; Semgrep implements it via compositional interprocedural analysis that scales to enterprise-sized codebases in reasonable scan times. Competitors like CodeQL (GitHub) also offer interprocedural analysis, but CodeQL requires a proprietary query language with a steep learning curve. Semgrep's claim is higher developer accessibility without sacrificing precision.

      3. **Reachability-aware SCA:** The Supply Chain product's reachability analysis (calling-graph computation on top of dependency graph) is a genuine technical differentiator in the SCA market. Most SCA tools flag all CVEs in the dependency graph regardless of code paths; Semgrep reduces this by 95%+ in published benchmarks.

      4. **Data moat via scan telemetry:** 75M+ annual scans generate anonymized pattern telemetry that informs rule quality and false-positive rates. This data advantage compounds over time if Semgrep can use it to train rule classifiers.

      5. **Speed:** Semgrep OSS is designed for developer-time feedback loops; scan times target <60 seconds for incremental scans on changed files. The Opengrep fork claims 3.15x performance improvement in full-repo benchmarks as of early 2025, which, if accurate, represents a competitive threat to Semgrep's developer experience advantage.

      **IP position:** No public patent portfolio identified. IP is primarily embedded in the Pro Engine's proprietary dataflow analysis and the Pro rule library. The OCaml engine source code is open (with license restriction post-Dec 2024). The Pro Engine and Pro rules are proprietary trade secrets.
    tableRefs: []
    figureRefs: [FE004]
    claimRefs: [CE018, CE019, CE020, CE021, CE022, CE023]

  - id: trust-compliance-quality
    title: "Trust, Security, Compliance, and Quality Controls"
    body: |
      **Security certifications:** Semgrep maintains SOC 2 Type II certification, covering security, availability, and confidentiality controls. The compliance report is available under NDA to enterprise customers via trust.semgrep.dev.

      **GDPR compliance:** Semgrep has published a Data Processing Agreement (DPA) for European customers and supports GDPR data deletion requests. As of 2025, code snippet data transmitted to the Semgrep platform was subject to GDPR retention and deletion controls.

      **FedRAMP:** Not in FedRAMP Authorized status as of May 2026. This is a blocking factor for U.S. federal government sales and limits addressable market in regulated U.S. government sectors. Semgrep has been noted as "FedRAMP Ready" in progress; completion timeline is unknown.

      **HIPAA:** No public HIPAA BAA offering identified; Semgrep does not target healthcare as a primary vertical.

      **Data handling policy:** Semgrep does not train its AI models on customer code by default; opt-in for telemetry improvement programs. The privacy documentation states that code snippets sent to the Semgrep cloud platform for Pro Engine analysis are not used for rule training without explicit customer consent.

      **Status and reliability:** Status page (status.semgrep.dev) reports uptime SLA of 99.9% for Enterprise tier. No major publicly disclosed outages identified as of May 2026.

      **Quality controls:** Semgrep publishes false-positive rate benchmarks for Pro rules; typical Pro rule FP rate is claimed to be <5% on the benchmarked rulesets. Community rules have no enforced FP rate standard.

      **Vulnerability disclosure:** Semgrep has a published responsible disclosure policy. No public CVEs attributed to the Semgrep SaaS platform identified.
    tableRefs: [TE004]
    figureRefs: []
    claimRefs: [CE024, CE025, CE026, CE027, CE028, CE029]

