callouts:
  - calloutType: risk
    title: Founder Departure — Key-Person Risk Crystallized
    body: >-
      Jonathan Ross (founder-CEO) and Sunny Madra (President) both joined Nvidia in December 2025
      as part of the non-exclusive licensing deal. This is a high-severity leadership event for a
      company where Ross was the primary technical visionary and sales force for nine years. Simon
      Edwards (new CEO, former CFO appointed just three months earlier) has not previously led a
      semiconductor or cloud infrastructure company. GroqCloud operations are stated to continue
      without interruption but the medium-term risk to product roadmap and enterprise relationships
      is material.
    claimRefs: [CO020, CO021]

  - calloutType: risk
    title: "SRAM Architecture: Speed at the Cost of Model Scale"
    body: >-
      Groq's LPU achieves industry-leading inference speeds through SRAM-centric design but SRAM
      is approximately three orders of magnitude less memory-dense than the HBM used in NVIDIA
      GPUs. This limits single-chip viable model sizes and means LPU cards cost roughly $20,000
      each. Multi-chip scaling partially addresses this but introduces inter-chip communication
      complexity. Groq's LPU v2 (Samsung 4nm) is designed to address scale limitations, but the
      architecture remains fundamentally less suited for training than GPU alternatives.
    claimRefs: [CO041]

