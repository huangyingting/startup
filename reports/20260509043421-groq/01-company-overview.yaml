  evidenceGaps:
    - type: private-evidence-only
      severity: minor
      topic: headcount and org structure
      missingEvidence: "Official employee headcount; Groq does not publish headcount figures. Estimates range 300–440 from third-party data providers."
      whyItMatters: "Headcount is a proxy for burn rate, operational capacity, and R&D investment pace."
      diligencePath: "Request human resources data, payroll summary, or most recent board presentation from company management."
      relatedQuestionRefs: [QO015]

    - type: private-evidence-only
      severity: material
      topic: financial statements and revenue
      missingEvidence: "Audited financial statements, detailed P&L, gross margin, burn rate, and ARR are not publicly available."
      whyItMatters: "Revenue estimates ($500M 2025) are unaudited third-party projections; actual financial health is unknown without a financing data room."
      diligencePath: "Request audited financials and board-approved financial projections from Groq management."
      relatedQuestionRefs: [QO012, QO023]

    - type: private-evidence-only
      severity: material
      topic: board composition
      missingEvidence: "Groq's board of directors is not publicly disclosed; investor governance rights are unknown."
      whyItMatters: "Material for assessing corporate governance quality, fiduciary oversight, and investor alignment post-Nvidia deal."
      diligencePath: "Review cap table, certificate of incorporation, investor rights agreements, and board minutes."
      relatedQuestionRefs: [QO028]

    - type: private-evidence-only
      severity: material
      topic: "Saudi Arabia $1.5B commitment binding nature"
      missingEvidence: "The $1.5B Saudi Arabia commitment has not been verified as binding purchase orders vs. non-binding intent."
      whyItMatters: "The commitment represents the single largest customer relationship; if non-binding, Groq's revenue pipeline could be materially overstated."
      diligencePath: "Request executed contracts, purchase orders, or escrow evidence from Groq and/or Aramco Digital."
      relatedQuestionRefs: [QO018]
      relatedTableRefs: [TO003]

    - type: private-evidence-only
      severity: minor
      topic: "leadership and founder table"
      missingEvidence: "Full executive compensation, equity stakes, and non-compete terms for Jonathan Ross and Sunny Madra post-Nvidia are not disclosed."
      whyItMatters: "Founder equity dilution, non-compete duration, and residual alignment with Groq matter for strategic continuity."
      diligencePath: "Review employment agreements, equity plans, and the specific terms of the Nvidia licensing agreement."
      relatedQuestionRefs: [QO028]
      relatedTableRefs: [TO002]

    - type: missing-source
      severity: minor
      topic: "milestone table completeness"
      missingEvidence: "Internal product launch dates, chip tape-out dates, and undisclosed early commercial contracts are not in public sources."
      whyItMatters: "A complete milestone picture requires proprietary company data; the partial list may omit early-stage events that affect IP and foundry strategy dating."
      diligencePath: "Request internal product roadmap, foundry tape-out records, and board deck timeline slides."
      relatedQuestionRefs: [QO016]
      relatedTableRefs: [TO004]

    - type: missing-source
      severity: minor
      topic: "stakeholder or investor map"
      missingEvidence: "Cap table details, secondary sales, and exact ownership percentages for each investor are not publicly disclosed."
      whyItMatters: "Understanding liquidation preferences, dilution structure, and governance rights requires access to shareholder agreements."
      diligencePath: "Request cap table, investor rights agreement, and any secondary transaction summaries."
      relatedQuestionRefs: [QO007]
      relatedTableRefs: [TO003]
