  - id: SO002s
    title: Founding Team and Leadership
    body: >-
      Groq's founding was led by Jonathan Ross, who at Google co-invented the Tensor Processing
      Unit (TPU) — one of the most influential AI acceleration architectures in history. Ross served
      as CEO from founding until December 2025, when he transitioned to Nvidia as part of a
      non-exclusive licensing agreement. Co-founder Douglas Wightman (ex-Google X) served as the
      company's first CEO before departing; the circumstances of his departure were not publicly
      disclosed. The post-Ross leadership team includes Simon Edwards, appointed CFO in September
      2025 who became CEO in December 2025. Stuart Pann (former senior executive at Intel and HP)
      joined as COO in August 2024 to scale operations. Mohsen Moazami, President of International
      and a former Cisco executive, leads global commercial expansion including the $1.5 billion
      Saudi Arabia initiative. Ian Andrews serves as Chief Revenue Officer and attended the White
      House Genesis Mission event in December 2025. Chelsey Susin Kantor is Chief Marketing
      Officer. In August 2024, Meta's Chief AI Scientist Yann LeCun — a Turing Award winner and
      former computer science professor of Jonathan Ross at NYU — joined as technical advisor.
      Groq's board composition is not publicly disclosed, representing a material governance gap
      for diligence purposes. Key-person risk is elevated: the company lost its founder-CEO and
      President in a single event, and the successor CEO has no public track record running a
      semiconductor or cloud infrastructure company.
    claimRefs:
