  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Nvidia IP cross-license terms and royalty obligations
      missingEvidence: >-
        The December 2025 Groq-Nvidia IP cross-license terms have not been publicly disclosed. Whether Groq owes Nvidia
        royalties, under what conditions, and for how long are unknown. Law360 analysis confirms this is a blocking
        diligence item.
      whyItMatters: >-
        Hidden royalty obligations to Nvidia would compress Groq's gross margins, create competitive entanglement with
        its primary hardware competitor, and materially affect the IPO narrative and financial model.
      diligencePath: >-
        Request full cross-license agreement; identify royalty rates, most-favored-nation clauses, field-of-use
        restrictions, grant-back provisions, and termination conditions.
      relatedQuestionRefs:
        - QR021
    - type: private-evidence-only
      severity: blocking
      topic: HUMAIN contract binding status and BIS export control compliance status
      missingEvidence: >-
        Whether the HUMAIN $1.5B commitment includes binding purchase orders vs. letters of intent is not publicly
        confirmed. Whether Groq has obtained required BIS export licenses for LPU shipment to Saudi Arabia is also not
        disclosed.
      whyItMatters: >-
        A non-binding HUMAIN commitment or undisclosed export control compliance gap could simultaneously destroy the
        revenue thesis and expose Groq to US government penalties under the Export Administration Regulations.
      diligencePath: >-
        Request HUMAIN master service agreement; BIS export control counsel classification of LPU Gen2 performance vs
        CCL thresholds; any pending license applications.
      relatedQuestionRefs:
        - QR016
        - QR017
        - QR022
        - QR024
    - type: private-evidence-only
      severity: material
      topic: Multi-LPU node latency and coordination overhead for 405B+ model inference
      missingEvidence: >-
        The inter-node latency overhead and coordination complexity of distributing 405B+ parameter model inference
        across multiple LPU nodes is not publicly quantified. This overhead partially offsets Groq's single-node
        throughput advantage.
      whyItMatters: >-
        If multi-node LPU coordination significantly degrades latency for frontier models, Groq's speed advantage — the
        primary basis for its pricing premium and developer adoption — may not extend to the fastest-growing frontier
        model workloads.
      diligencePath: >-
        Request multi-node LPU performance benchmarks for 70B and 405B parameter models; compare against
        ArtificialAnalysis single-node benchmarks; quantify latency overhead.
      relatedQuestionRefs:
        - QR008
    - type: private-evidence-only
      severity: material
      topic: Samsung Taylor fab yield rates and LPU Gen2 production economics
      missingEvidence: >-
        Samsung's actual yield rate for Groq's 4nm LPU Gen2 at the Taylor, Texas facility is not publicly disclosed.
        Historical Samsung 4nm yield challenges raise questions about production reliability, cost, and HUMAIN
        deployment timeline.
      whyItMatters: >-
        Low yield rates translate directly to higher effective per-chip cost, compressing already-constrained gross
        margins and potentially causing HUMAIN delivery delays.
      diligencePath: >-
        Request Samsung yield reports from LPU Gen2 production runs; independent fab analyst assessment of Taylor
        facility throughput; contractual SLA for delivery schedule.
      relatedQuestionRefs:
        - QR003
    - type: estimable-with-effort
      severity: material
      topic: Regulatory / legal risk register — country-specific licensing regimes not yet triggered
      missingEvidence: >-
        The partial-coverage regulatory/legal risk register (TR001) excludes country-specific AI licensing regimes
        outside the US and EU that could affect Groq as it expands. Japan's AI governance framework, Saudi NCA detailed
        requirements beyond data residency, and India's emerging AI regulation are not mapped. UAE AI regulatory
        requirements for Groq's potential UAE deployments are also not captured in the current register.
      whyItMatters: >-
        As Groq deploys LPU infrastructure across HUMAIN-affiliated geographies and expands enterprise sales into Japan
        (KDDI partnership) and India (Paytm), additional regulatory obligations will emerge that the current register
        does not anticipate.
      diligencePath: >-
        Engage local counsel in Saudi Arabia, UAE, Japan, and India to assess AI-specific licensing requirements; update
        regulatory register before HUMAIN production deployment.
      relatedQuestionRefs:
        - QR016
      relatedTableRefs:
        - TR001
    - type: private-evidence-only
      severity: material
      topic: Jonathan Ross IP contribution scope and Gen3 LPU continuity plan
      missingEvidence: >-
        The scope of IP that Groq contributed to Nvidia under the cross-license is unknown, as is Groq's Gen3 LPU
        architecture continuity plan following Ross's departure. Whether Nvidia gained access to core LPU architecture
        patents is not disclosed.
      whyItMatters: >-
        Loss of unique LPU IP to a direct competitor undermines Groq's defensibility. Without a named successor
        architect and documented Gen3 continuity plan, investors cannot assess whether the speed advantage can be
        sustained through the next generation.
      diligencePath: >-
        Request patent assignment schedules from cross-license; Gen3 LPU architecture roadmap; organizational chart
        showing architecture team succession.
      relatedQuestionRefs:
        - QR027
        - QR029
