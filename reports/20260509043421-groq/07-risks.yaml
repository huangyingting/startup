chapter:
  number: 7
  title: Risks
  key: risks
  summary: >-
    Groq faces five interlocking risk clusters that must be weighed against its exceptional inference-speed advantage.
    Regulatory and legal risk is anchored in US BIS export controls that could block the $1.5B Saudi HUMAIN deployment —
    Groq's single largest revenue commitment. Operational risk includes Samsung Taylor fab concentration, SRAM scaling
    ceilings, and compiler brittleness that creates support lag for new model architectures. Partner and dependency risk
    is extreme: Groq is entirely reliant on Meta and Mistral for open-source model weights, on Samsung for LPU
    production, and on HUMAIN for revenue scale. Financial risk centers on an estimated $150–200M annual burn, absence
    of audited financials, and a $6.9B Series E valuation that demands a credible IPO path within 2–3 years. People and
    governance risk crystallized in December 2025 when founder Jonathan Ross departed to Nvidia as part of an IP
    cross-licensing deal — simultaneously triggering a CEO transition, creating royalty uncertainty, and leaving Groq's
    LPU Gen3 architecture roadmap without its originating engineer.
sections:
  - id: S01
    title: Regulatory and Legal Risk
    body: >-
      Groq's international revenue concentration — most prominently the $1.5B Saudi HUMAIN commitment — creates
      regulatory and legal exposure rarely present in domestic-only infrastructure companies. The US Bureau of Industry
      and Security (BIS) has progressively tightened export controls on advanced AI chips under the Export
      Administration Regulations (EAR), reclassifying accelerators to the Commerce Control List (CCL) and imposing
      license requirements for advanced computing hardware destined for Middle East markets. Groq's LPUs, if swept into
      future BIS rulemaking on dedicated inference ASICs, could require export licenses for Saudi Arabia and UAE
      deployments — potentially blocking or delaying the HUMAIN deal. The January 2024 BIS interim final rule
      established performance-based thresholds for advanced AI chips requiring licenses for Country Group D:5
      destinations; Groq must continuously monitor whether LPU Gen2 performance metrics breach these thresholds. OFAC
      sanctions compliance is a secondary but non-trivial risk: if any HUMAIN-affiliated entity receives an OFAC
      designation, Groq could be legally prohibited from receiving payment under the infrastructure contract. The EU AI
      Act (Regulation 2024/1689), entering full applicability in 2026, imposes compliance obligations on inference
      infrastructure providers when their API is used for high-risk AI applications (healthcare, biometrics, employment
      screening) in the EU. Domestically, the FTC identified inference compute concentration as a monitoring priority in
      its 2024 AI competition report. Groq's IP cross-license with Nvidia (December 2025) introduces legal risk whose
      scope is unknown: undisclosed royalty terms could represent material future cost obligations, and field-of-use
      restrictions may limit LPU Gen3 design freedom. ITAR and EAR compliance for Department of Energy deployments
      (Argonne National Laboratory) adds federal contracting overhead and staff-access constraints.
    claimRefs:
