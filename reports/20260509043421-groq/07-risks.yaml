  - id: S02
    title: Operational and Technology Risk
    body: >-
      Groq's Language Processing Unit architecture is designed around on-chip SRAM rather than HBM, achieving maximum
      inference throughput by eliminating memory-bandwidth bottlenecks. This structural choice, however, creates
      compounding operational risks. First, SRAM is 2–4× more expensive per byte than HBM/DRAM, capping per-node model
      size; Llama 3 405B requires multi-node LPU distribution, adding inter-node latency and coordination complexity.
      Second, LPU Gen2 production is exclusively sourced from Samsung's Taylor, Texas 4nm facility — a single-foundry
      dependency. Samsung's 4nm node has experienced yield challenges globally; Semi Analysis documents these yield
      problems at the Taylor facility specifically. Any sustained yield shortfall would delay HUMAIN deployment
      milestones and compress available margins. Third, Groq's static compilation approach converts model graphs to
      execution plans at build time — enabling hardware efficiency but creating months-long support lag for new model
      architectures (Mamba state-space, new attention variants) versus Nvidia's CUDA zero-day compatibility. Fourth,
      Nvidia's Blackwell GPU family (H200 and B200) achieved approximately 2.4× the inference throughput of the H100 on
      transformer workloads, substantially narrowing Groq's tokens-per-second differentiation. Fifth, data center
      operations across North America, Europe, and Saudi Arabia create distributed infrastructure reliability risk —
      power outages, co-location provider failures, and network disruptions could affect GroqCloud SLA commitments.
      Sixth, Groq's model catalog is entirely dependent on open-source providers: if Meta restricts Llama licensing
      terms or Mistral closes model weights, Groq's model catalog would contract materially without a proprietary
      alternative.
