  - id: S03
    title: Partner and Dependency Risk
    body: >-
      Groq competes in a market dominated by Nvidia's CUDA ecosystem — a 10-year head start with millions of trained
      developers and deep integration across every major cloud provider. Groq has no equivalent proprietary developer
      platform. The hyperscaler threat is structural: AWS Trainium2 and Inferentia3, Google TPU v6, and Microsoft Azure
      Maia 2 are purpose-built AI inference ASICs developed by companies with unlimited capex budgets explicitly
      targeting the third-party inference market Groq serves. As these chips mature, hyperscalers will shift enterprise
      AI inference in-house, shrinking Groq's total addressable market. Cerebras presents a direct competitor threat on
      large-model inference: ArtificialAnalysis benchmarks from October 2025 show Cerebras outperforming Groq on 70B+
      parameter models. For the growing share of enterprise AI workloads running frontier 70B–405B models, Cerebras is a
      superior-performing alternative. GPU-based inference platforms — Together AI, Fireworks AI, Replicate — offer
      hundreds of models versus Groq's curated list, appealing to developers who prioritize breadth over peak speed.
      Revenue concentration in the HUMAIN sovereign contract is extreme: HUMAIN alone may represent the majority of
      Groq's 2025 revenue thesis. Loss of this contract — through export controls, political deterioration, or milestone
      failure — would be catastrophic. Key customer concentration extends to DOE (Argonne), McLaren F1, Paytm, and Bell
      Canada; revenue contribution from any single account loss is material. Forbes analyst analysis concludes that at
      5% combined market share, only one of the three main custom ASIC inference startups (Groq, Cerebras, SambaNova) is
      likely to survive commercially — the market may not sustain all three.
