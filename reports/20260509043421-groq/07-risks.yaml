callouts:
  - calloutType: risk
    title: HUMAIN + BIS Export Controls = Compounding Existential Risk
    body: >-
      Groq's single largest financial commitment ($1.5B HUMAIN deal) and its single largest regulatory threat (BIS AI
      chip export controls) are directly coupled. If BIS reclassifies Groq's LPUs onto the Commerce Control List — as it
      has done for Nvidia H100/A100 chips in comparable export restriction cycles — the HUMAIN Saudi Arabia deployment
      could be blocked entirely. This risk is not theoretical: BIS has aggressively expanded the AI chip control
      perimeter since 2022, and dedicated inference ASICs have not been explicitly excluded from future rulemaking.
      Groq's entire 2025–2026 revenue thesis is built on the assumption that HUMAIN executes on schedule. An export
      control event would simultaneously destroy the revenue thesis, trigger investor covenant concerns, and eliminate
      the rationale for the $6.9B Series E valuation. This is the thesis-break trigger that warrants the most immediate
      diligence investment.
    claimRefs:
      - CR016
      - CR017
      - CR018
      - CR026
      - CR034
  - calloutType: risk
    title: Founder Departure Is a Leading Indicator of Architecture and IP Risk
    body: >-
      Jonathan Ross invented the Google TPU, founded Groq, and served as its primary LPU architecture authority for 10+
      years. His departure to Nvidia in December 2025 — packaged as part of an IP cross-licensing deal — is not merely a
      people-risk event. It signals that Nvidia considered Ross's knowledge valuable enough to pay for access (via the
      license), that Groq's IP position required a cross-license to avoid potential litigation risk, and that Groq's
      architecture team now operates without its founding intelligence. Two unanswerable questions remain from public
      sources: (1) What does Nvidia now know about Groq's LPU architecture from the licensing process? (2) Is the
      cross-license royalty-bearing in a way that creates future cost obligations? Law360 analysis confirms neither
      question is answerable without the full agreement text. These are blocking diligence items for any significant
      capital commitment to Groq.
    claimRefs:
      - CR022
      - CR028
      - CR029
      - CR030
      - CR033
