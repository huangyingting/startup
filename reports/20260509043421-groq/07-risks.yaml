  - id: S04
    title: Financial, People, and Governance Risk
    body: >-
      Groq's financial risk profile is characterized by high capital intensity, accelerating burn, absence of audited
      public financials, and extreme revenue concentration in a single sovereign commitment. Estimated 2024 operating
      burn was $150–200M on approximately $90M revenue — implying negative operating leverage before HUMAIN. Samsung 4nm
      LPU Gen2 CAPEX is estimated at $50–100M annually; data center operations add $30–60M; engineering headcount adds
      $60–80M. Despite $750M raised in the Series E (September 2025) and the $1.5B HUMAIN commitment, runway is
      estimated at only 18–24 months at current burn before HUMAIN revenue materially offsets deployment costs. The
      $6.9B Series E valuation implies investors expect an IPO within 2–3 years, creating execution pressure on revenue
      growth and margin expansion on a compressed timeline. Management publicly targeted cash-flow positive operations
      by 2026, but this target is contingent on HUMAIN revenue realization that is itself subject to export control and
      geopolitical risk. All financial figures are third-party analyst estimates; no audited GAAP statements have been
      published. People and governance risk crystallized in December 2025: founder Jonathan Ross (Google TPU inventor,
      LPU architect) departed to Nvidia as part of the IP cross-licensing arrangement; CEO Sunny Madra departed to
      Nvidia simultaneously; Simon Edwards became CEO — his first CEO role — during a critical operational phase. The
      LPU compiler team is small, specialized, and immediately attractive to Nvidia and hyperscaler recruiting. Board
      composition is heavily VC-controlled with limited operational representation from executives who have scaled AI
      hardware companies at the ASIC production level.
