sections:
  - id: S01
    title: Market Boundary and Definition
    body: >-
      The AI inference market encompasses the compute, memory, networking, and software infrastructure
      used to execute trained AI models in production — generating predictions, responses, or decisions
      from new input data. Groq competes directly within the cloud AI inference-as-a-service (IaaS)
      segment: API-accessible, hosted, pay-per-token execution of large language models (LLMs) and
      multimodal models. This segment sits within a broader AI inference hardware and services market
      that includes on-premises accelerators, edge deployments, and enterprise MLOps tooling.
      Excluded from Groq's primary market are AI model training (a separate capital-intensive workload
      dominated by Nvidia H100/H200 and B200 GPUs), fine-tuning infrastructure, and inference for
      non-language modalities such as computer vision or recommendation systems where GPU cost
      structures are different. The status-quo substitutes for Groq's offering are: (1) managed
      GPU inference via hyperscaler APIs (AWS Bedrock, Azure OpenAI Service, Google Vertex AI),
      (2) self-hosted open-source LLMs on GPU clusters, and (3) proprietary models via the major
      AI labs (OpenAI, Anthropic). Groq occupies a distinct speed-and-cost niche within the
      cloud IaaS layer, targeting latency-sensitive use cases where GPU-based alternatives
      cannot match its tokens-per-second performance on supported open models.

  - id: S02
    title: Market Sizing — TAM, SAM, SOM
    body: >-
      The addressable market for AI inference is large and growing rapidly, but sizing estimates
      vary significantly by scope and methodology. Grand View Research estimated the global AI
      inference market at $97.24 billion in 2024, projecting $253.75 billion by 2030 (17.5%
      CAGR). MarketsandMarkets places 2025 at $106.15 billion with a $254.98 billion 2030
      forecast (19.2% CAGR). Fortune Business Insights estimates $103.73 billion in 2025 growing
      to $312.64 billion by 2034 (12.98% CAGR). These broad figures include AI inference
      hardware (GPU/ASIC purchases), cloud AI services, and enterprise software — a significantly
      wider scope than Groq's direct addressable market. Groq's serviceable addressable market
      (SAM) is the cloud AI inference-as-a-service sub-segment: API-first, hosted LLM inference
      at scale. This is estimated at roughly 10–20% of the broad market based on the revenue
      split between cloud services and hardware, implying a 2025 SAM of $10–20 billion. Groq's
      estimated 2025 revenue of approximately $500 million (per third-party estimates) would
      imply a roughly 3–5% SAM share within this inference IaaS layer. Groq's serviceable
      obtainable market (SOM) is further constrained to use cases where ultra-low latency and
      deterministic throughput are a requirement: real-time AI agents, voice applications,
      financial fraud detection, and interactive developer tools — a sub-segment estimated at
      $2–5 billion in 2025. Investors must apply appropriate discounts to broad market forecasts
      when sizing Groq's opportunity.

  - id: S03
    title: Market Segmentation — Buyers, Users, and Payers
    body: >-
      The AI inference market segments along deployment model, buyer sophistication, and
      cost sensitivity. Hyperscalers (AWS, Azure, Google Cloud, Oracle, Meta) represent
      the largest segment by revenue and compute volume, but primarily build and operate
      proprietary inference infrastructure rather than purchasing from specialized IaaS
      providers like Groq. The IaaS/API-first segment — Groq's primary arena — is contested
      by Together AI ($3.3 billion valuation, General Catalyst-led), Fireworks AI, Cerebras
      Systems, SambaNova, Baseten, and DeepInfra. Enterprise buyers in financial services,
      healthcare, media, and government procure inference capacity from API providers primarily
      on latency, throughput, compliance, and total cost of ownership. Groq's developer-first
      go-to-market (360,000+ developers by August 2024; 2.8 million by December 2025) is aimed
      at bottom-up adoption: developers self-select Groq on speed, integration simplicity
      (OpenAI-compatible API), and a generous free tier, then convert enterprise organizations.
      Federal and national laboratory buyers (DOE, ALCF) represent a smaller but high-value
      segment where scientific computing use cases create differentiated demand for deterministic,
      reproducible inference performance. Budget owners across segments are typically IT/Cloud
      Infrastructure leads for production workloads and AI/ML Engineering for experimental
      or dev-tier usage. Procurement cycles range from instant (self-serve API key) to 6–24
      months for enterprise and federal contracts.

  - id: S04
    title: Growth Drivers and Adoption Constraints
    body: >-
      The AI inference market is propelled by structural tailwinds: (1) the cost of a given
      level of AI capability declines approximately 10x every 12 months per OpenAI's CEO Sam
      Altman, expanding demand exponentially as use cases that were cost-prohibitive become
      viable; (2) reasoning models (DeepSeek R1, OpenAI o3, Anthropic Claude 3.7) perform
      substantially more compute at inference time per query than prior-generation models,
      increasing average inference cost per session and creating demand for efficient hardware;
      (3) hyperscaler AI capital expenditure grew from $126 billion (2023) to $197 billion
      (2024) and is projected at $234 billion (2025) per J.P. Morgan, driving continued
      infrastructure build-out; (4) Barclays estimates inference capex in frontier AI will
      jump from $122.6 billion in 2025 to $208.2 billion in 2026, eventually commanding 50%+
      of Nvidia's inference market share for alternative silicon. Key adoption constraints
      include: the dominant CUDA software moat (Nvidia's ecosystem has 10+ years of tooling
      investment, and developers pay a significant switching cost to move away); energy
      consumption at scale (inference now accounts for up to 90% of a model's total lifetime
      cost per Forbes, including energy); SRAM-centric architectures like Groq's are limited
      in supported model sizes, restricting the breadth of models on which they can compete;
      capital intensity of custom silicon fabs; and regulatory and compliance uncertainty in
      healthcare and financial services that slows enterprise adoption of third-party inference
      APIs. The inference market is also susceptible to pricing compression: inference costs
      have fallen dramatically year over year, compressing revenue per token for all providers
      even as usage volumes rise.

