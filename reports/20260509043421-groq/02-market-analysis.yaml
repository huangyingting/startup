callouts:
  - calloutType: risk
    title: "Pricing Compression — Revenue Per Token in Secular Decline"
    body: >-
      AI inference prices have fallen ~10x every 12 months (Sam Altman, February 2025). For Groq,
      which competes partly on price-performance vs. GPU providers, this creates a structural headwind:
      even as token volumes grow, per-token revenue erodes. If Groq's estimated 2025 revenue of $500M
      reflects $0.75/1M input tokens, a 10x price decline would require 10x volume growth just to
      maintain revenue. The company must demonstrate that volume growth outpaces price compression
      by a significant margin to sustain its growth trajectory.
    claimRefs: [CM015, CM016, CM019, CM020, CM021]

  - calloutType: insight
    title: "Inference Overtaking Training — Structural Market Shift Favoring Groq's Architecture"
    body: >-
      Morgan Stanley estimates >75% of data center compute demand will be for inference within the next
      few years. Barclays estimates inference capex will exceed training capex in frontier AI by 2026,
      reaching ~$208B. Nvidia itself forecasts 50% long-term inference market share for alternatives,
      implying ~$200B in chip spending for non-Nvidia inference silicon. Groq's LPU is purpose-built
      for this transition. The key risk is whether Nvidia's Blackwell chips (inference-optimized) and
      custom silicon from hyperscalers (Google TPU, AWS Inferentia, Microsoft Maia) will absorb the
      majority of this shift before specialized cloud IaaS providers like Groq can scale.
    claimRefs: [CM008, CM009, CM010, CM011, CM025]

