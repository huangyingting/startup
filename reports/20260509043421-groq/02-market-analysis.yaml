  evidenceGaps:
    - type: missing-source
      severity: material
      topic: cloud AI inference-as-a-service sub-segment sizing
      missingEvidence: >-
        No independent market research firm has published a paid, primary-source sizing report
        specifically for API-first, cloud-hosted LLM inference-as-a-service. All SAM estimates
        are analyst-derived approximations from the broad AI inference market.
      whyItMatters: "Without a credible SAM figure, Groq's addressable market is difficult to independently verify, making market-size-based valuation arguments vulnerable."
      diligencePath: "Commission or purchase a custom market segmentation from IDC, Gartner, or Forrester scoped to cloud LLM IaaS."
      relatedQuestionRefs: [QM002, QM003]

    - type: missing-source
      severity: material
      topic: Groq actual market share and revenue breakdown by segment
      missingEvidence: "Groq does not publicly disclose revenue by customer segment, enterprise vs. developer split, or any verified market share figure."
      whyItMatters: "The $500M 2025 revenue estimate is unaudited. Without segment breakdown, the sustainability and concentration risk of Groq's revenue base is unknown."
      diligencePath: "Request audited revenue by segment, cohort retention data, and top-10 customer concentration from Groq management."
      relatedQuestionRefs: [QM015]

    - type: missing-source
      severity: minor
      topic: regulatory and compliance certification status (FedRAMP, HIPAA BAA, SOC2)
      missingEvidence: "Groq's current compliance certification status (FedRAMP, HIPAA BAA, SOC2 Type II, ISO 27001) is not publicly confirmed."
      whyItMatters: "Compliance certifications are gatekeepers for enterprise and federal procurement. Without them, Groq's access to high-value regulated sectors is limited."
      diligencePath: "Request Groq's current compliance certification portfolio and roadmap from the sales engineering team."
      relatedQuestionRefs: [QM021]

    - type: private-evidence-only
      severity: minor
      topic: per-token gross margin and cost structure
      missingEvidence: "Groq's gross margin per token, infrastructure cost per request, and pricing floor are not publicly disclosed."
      whyItMatters: "As per-token prices fall 10x/year, the long-term viability of the business depends on whether Groq's cost structure allows profitable operations at the price floor."
      diligencePath: "Request detailed COGS breakdown, data center lease/power costs, and LPU depreciation schedule."
      relatedQuestionRefs: [QM005]

    - type: missing-source
      severity: minor
      topic: Asia Pacific inference market and Groq's international expansion
      missingEvidence: >-
        Asia Pacific is forecast to be the fastest-growing AI inference region, but Groq's
        current APAC presence and data center footprint outside Saudi Arabia are not well documented.
      whyItMatters: "If Groq cannot serve APAC inference demand with local data center presence, the fastest-growing regional market may be captured by hyperscalers or local competitors."
      diligencePath: "Map Groq data center locations against APAC demand centers; verify Japan, India, Singapore presence or timeline."
      relatedQuestionRefs: [QM023]
