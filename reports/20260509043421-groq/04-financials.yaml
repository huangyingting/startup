callouts:
  - calloutType: risk
    title: Burn Rate and Audited-Financials Gap Are Blocking Diligence Items
    body: >-
      Groq's estimated 2024 burn of $150–200M combined with the absence of any audited financial
      statements creates a material underwriting barrier. Revenue estimates ($90M in 2024, $500M+
      in 2025) are sourced entirely from third-party analyst reports and CEO statements — not from
      a CPA-reviewed or audited P&L. The HUMAIN deal ($1.5B committed) is the largest single
      revenue item and its draw-down schedule has not been publicly disclosed. If deployment
      milestones slip, actual cash received could be materially below the headline figure. Any
      significant capital commitment to Groq requires an audited P&L, HUMAIN contract terms, and
      LPU utilization data from the data room.
    claimRefs:
      - CI021
      - CI022
      - CI023
      - CI025

  - calloutType: insight
    title: Developer-Led Growth Creates Asymmetric CAC Advantage at Scale
    body: >-
      Groq's viral developer acquisition model — where inference speed itself is the primary
      marketing channel — has driven 40× developer growth in 22 months at near-zero CAC for
      individual users. With 2.8M registered developers and GroqCloud OpenAI compatibility
      enabling low-friction adoption, Groq has built a demand funnel that competitors spending
      on paid marketing cannot easily replicate. The enterprise upsell motion layers on top of
      this organically-acquired base. If Groq can maintain its speed advantage through LPU Gen2
      and achieve 35%+ gross margins at scale, the unit economics could support a path to
      profitability without requiring another equity raise before 2027.
    claimRefs:
      - CI017
      - CI026
      - CI027
      - CI036

