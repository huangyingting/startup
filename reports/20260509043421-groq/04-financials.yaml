  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: audited financial statements
      missingEvidence: >-
        Groq has not published audited GAAP financial statements. All revenue ($3.4M 2023;
        ~$90M 2024; ~$500M 2025) and burn figures are third-party analyst estimates sourced
        from Fortune, Sacra, and Bloomberg — not from company-disclosed audited data.
      whyItMatters: >-
        Without audited financials, no IRR model, revenue multiple, or profitability analysis
        can be validated. All financial underwriting is speculative until P&L access is granted.
      diligencePath: >-
        Request CPA-reviewed or audited P&L statements for FY2023, FY2024, and YTD 2025 from
        Groq management. If unavailable, request board-approved financial projections and last
        twelve months billing data.
      relatedQuestionRefs: [QI021]

    - type: private-evidence-only
      severity: material
      topic: HUMAIN deal binding status and draw-down schedule
      missingEvidence: >-
        The $1.5B Saudi HUMAIN commitment has not been verified as binding purchase orders
        with defined payment milestones. The master service agreement, escrow structure, and
        revenue recognition policy are not publicly available. The deal may be structured as
        a non-binding letter of intent with phased conversion to binding commitments.
      whyItMatters: >-
        HUMAIN is potentially the single largest revenue source and a major driver of the
        $465–520M 2025 revenue estimate. If non-binding or milestone-dependent, actual cash
        received could be materially lower.
      diligencePath: >-
        Request the executed master service agreement, payment schedule, milestone definitions,
        and any escrow or performance bond documentation from Groq and HUMAIN / Saudi Aramco Digital.
      relatedQuestionRefs: [QI013, QI023]

    - type: private-evidence-only
      severity: material
      topic: enterprise NRR and cohort retention data
      missingEvidence: >-
        Net revenue retention (NRR/NDR) for enterprise contracts is not publicly disclosed.
        Without cohort data, it is impossible to assess whether Groq's enterprise revenue
        is expanding or contracting within existing customers.
      whyItMatters: >-
        NRR is the single most important leading indicator of enterprise revenue durability.
        An NRR below 100% signals contraction; above 120% signals strong expansion — the
        difference is material for modeling terminal revenue.
      diligencePath: >-
        Request CRM cohort reports by ARR bucket; customer interview program with 5+ enterprise
        accounts; and renewal rate data by contract vintage.
      relatedQuestionRefs: [QI015]

    - type: private-evidence-only
      severity: material
      topic: LPU utilization rate and per-unit economics
      missingEvidence: >-
        Groq's LPU utilization rate (percentage of deployed capacity actively generating revenue)
        is not publicly disclosed. Without this, the payback period on LPU CAPEX and true
        gross margin per token cannot be computed.
      whyItMatters: >-
        If utilization is below 50%, gross margins on deployed hardware could be negative until
        demand fills capacity. Utilization is the key lever between hardware CAPEX intensity
        and eventual margin expansion.
      diligencePath: >-
        Request GroqCloud capacity utilization dashboard data or a summary by geography and
        model; cross-check against data-center electricity bills and revenue per region.
      relatedQuestionRefs: [QI019]

    - type: private-evidence-only
      severity: material
      topic: on-premises GroqRack pricing and gross margin
      missingEvidence: >-
        Revenue, ASP, and gross margin contribution from Groq's on-premises LPU / GroqRack
        business are not publicly disclosed. This segment serves government labs and large
        enterprise customers and may represent a meaningfully different margin profile.
      whyItMatters: >-
        Without segment margin data, blended gross margin cannot be calculated. If GroqRack
        hardware carries thin or negative margins (common in hardware-first cloud models),
        blended margin could be below the API-only estimate.
      diligencePath: >-
        Request GroqRack ASP, COGS per unit, and contribution margin data; cross-check against
        Samsung manufacturing cost benchmarks and Argonne National Lab contract details.
      relatedQuestionRefs: [QI022]

