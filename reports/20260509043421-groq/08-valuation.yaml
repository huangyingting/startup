  - id: TV006
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold / Signal
      - Transmission to Thesis
      - Action Implication
    rows:
      - - BIS export control classification of LPU
        - BIS rulemaking sweep includes dedicated inference ASICs; LPU Gen2 performance metrics breach CCL thresholds
        - >-
          Blocks HUMAIN Saudi Arabia deployment ($1.5B revenue commitment); eliminates bull and base revenue scenarios;
          elevates bear case probability to 50%+
        - >-
          Escalate immediately; engage export control counsel; model 100% HUMAIN revenue write-down; re-rate to $2–3B
          implied value
      - - Groq 2025 revenue miss below $350M
        - >-
          Year-end 2025 confirmed revenue below $350M (30%+ miss on $500M target); signals HUMAIN non-execution and
          market share loss
        - >-
          Base case collapses to bear case; 13.8× forward P/S at $350M revenue implies overvaluation at current mark;
          next equity raise likely at down-round
        - Reduce position; require confirmed binding HUMAIN draw-down and audited revenue before re-initiating
      - - Nvidia cross-license royalty exceeds 10% of revenue
        - >-
          Court filing, press report, or M&A due diligence reveals royalty rate >10% of GroqCloud/LPU revenue payable to
          Nvidia
        - >-
          Permanently compresses gross margins from 35–45% to 25–35%; eliminates cash-flow-positivity-by-2026
          commitment; reduces terminal DCF by 20–30%
        - >-
          Immediate downgrade; re-run DCF with adjusted margin assumptions; assess whether IPO remains viable at
          compressed margin profile
      - - Cerebras or Together AI captures >30% of enterprise inference market
        - >-
          Third-party benchmark data, Sacra/PitchBook revenue estimates, or enterprise survey data shows >30% inference
          market share for a single GPU-cloud competitor
        - >-
          Groq's speed premium erodes as an enterprise decision driver; ASP compression accelerates; 13.8× P/S becomes
          hard to defend without platform differentiation
        - >-
          Monitor ArtificialAnalysis benchmarks and competitor funding/ARR quarterly; require NRR data before next
          capital commitment
      - - HUMAIN contract confirmed as non-binding LOI
        - >-
          Legal filings, due diligence review, or press investigation reveals HUMAIN agreement lacks binding purchase
          orders or enforceable delivery milestones
        - >-
          Revenue thesis loses its primary anchor; bear case becomes base case; growth trajectory unsupported by
          independent revenue commitment
        - >-
          Initiate full data room review; require contract documentation; withhold any additional capital until binding
          terms confirmed
    notes: >-
      Thesis-break triggers are ordered by severity × immediacy. The first three are currently unresolvable from public
      sources — they require data room access or regulatory disclosure. Trigger thresholds are quantitative where
      possible; each trigger independently moves the probability-weighted intrinsic value below the $6.9B Series E entry
      price.
