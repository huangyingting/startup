  - id: TV004
    title: Thesis / Anti-Thesis Table
    columns:
      - Dimension
      - Investment Thesis (Bull / Base)
      - Anti-Thesis (Bear)
      - Evidence That Would Change the View
    rows:
      - - Inference Speed Moat
        - >-
          LPU delivers 10–14× speed advantage enabling pricing premium and developer lock-in for latency-sensitive
          workloads
        - >-
          Nvidia Blackwell B200 achieves 2.4× H100 throughput, halving Groq's speed gap by 2026 without new LPU
          generation
        - LPU Gen3 maintains >5× speed advantage on 70B+ models with confirmed benchmark data
      - - Developer Ecosystem
        - 2.8M registered developers = compounding funnel; 40× growth in 22 months demonstrates product-market fit
        - >-
          OpenAI-compatible API = zero switching cost; developers migrate to cheaper GPU-cloud alternatives without
          penalty
        - Enterprise NRR >150% confirmed by cohort data, demonstrating sticky platform behavior
      - - Revenue Growth Trajectory
        - 500% YoY revenue growth (2024→2025) supports 13.8× P/S; CEO confirms $500M ARR target for 2025
        - Commodity inference ASP compression forces price cuts that erode revenue growth below 30% in 2026
        - Confirmed $450M+ 2025 audited revenue and sustained >30% QoQ growth into 2026
      - - HUMAIN Deal Value
        - >-
          $1.5B phased infrastructure revenue commitment creates government AI tailwind with multi-year revenue
          visibility
        - BIS export controls block LPU shipment to Saudi Arabia; non-binding letter of intent = no realized revenue
        - >-
          Binding purchase orders and first LPU delivery milestones confirmed; BIS export license granted for Saudi
          deployment
      - - Exit Optionality
        - IPO at $15–25B in 2027 or strategic M&A at $10–14B (Cisco/Samsung/IBM) is credible given growth trajectory
        - >-
          Down round, distressed sale <$7B, or IPO pulled on revenue miss / regulatory event; Series E investors face
          loss
        - >-
          IPO filing submitted with $450M+ confirmed ARR and audited financials; M&A interest from two or more strategic
          parties
      - - Valuation Multiple
        - >-
          13.8× 2025E P/S is in-line with AI inference peer median and represents a 15–40% discount to base-case
          intrinsic value
        - 76× 2024 trailing P/S and absence of audited financials make current valuation speculative at the $6.9B mark
