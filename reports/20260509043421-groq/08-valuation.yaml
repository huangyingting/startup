  - id: S03
    title: DCF Scenario Analysis and Valuation Ranges
    body: >-
      A three-scenario DCF provides the analytical backbone for the valuation recommendation. All scenarios use a 30%
      discount rate appropriate for a pre-revenue-certainty, pre-IPO hardware/cloud company with no audited financials
      and material regulatory exposure. Bull case (30% probability): Revenue grows from $500M in 2025 to $5B in 2030 at
      a 60% CAGR, driven by HUMAIN execution, a Gen3 LPU speed refresh, and expansion into agentic AI workloads. 2030
      gross margin reaches 60% as SRAM costs decline with scale and software layers monetize. Terminal value at 20×
      EV/Revenue equals $100B. Discounted to present at 30%: implied current valuation of $18–25B. At $6.9B, Series E
      investors would capture 2.6–3.6×. Base case (50% probability): Revenue grows from $500M in 2025 to $2.5B in 2030
      at a 38% CAGR. Gross margin expands to 45% as utilization improves. Terminal value at 12× EV/Revenue equals $30B.
      Discounted to present: implied current valuation of $8–12B. The $6.9B Series E is a moderate 15–40% discount to
      base-case intrinsic value — attractive if executed, but with limited margin for error. Bear case (20%
      probability): Revenue decelerates to $800M by 2030 (14% CAGR) as Nvidia Blackwell closes the speed gap,
      hyperscalers deploy custom ASICs (AWS Trainium3, Google TPU v7), and HUMAIN draw-down stalls under BIS export
      controls. 2030 gross margin is 30%. Terminal value at 6× EV/Revenue equals $4.8B. Discounted to present: implied
      current value of $2–3B. At $6.9B, the current valuation is 2–3× overvalued in this scenario. The
      probability-weighted intrinsic value across scenarios is approximately $9.5–12B — suggesting the Series E is
      priced at a meaningful discount to expected intrinsic value, conditional on base or bull case execution.
