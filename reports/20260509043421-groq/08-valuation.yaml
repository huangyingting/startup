  - id: S04
    title: Exit Scenarios, Investor Return Analysis, and Thesis-Break Triggers
    body: >-
      Three exit pathways exist for Groq investors: IPO, strategic M&A, and distressed sale. The IPO pathway is the
      base-case management objective. Groq CEO statements have pointed toward cash-flow positivity by 2026 as a
      precondition for public market readiness. At a $15B IPO valuation (base case, 2027), Series E investors ($6.9B
      entry) earn a 2.2× return and approximately 47% IRR over two years. At $25B (bull case IPO), the return is 3.6×
      and ~90% IRR. Series D investors ($2.8B entry, August 2024) currently hold a 2.46× paper gain in thirteen months —
      an annualized IRR of approximately 227% if the $6.9B mark holds. The strategic M&A pathway at 1–2× premium to the
      current mark implies $10–14B. Cisco (existing Series E investor), Samsung (existing investor and LPU
      manufacturer), and IBM have the balance sheet and AI infrastructure rationale to be acquirers. A $13.8B M&A
      outcome would give Series E investors a 2.0× return over approximately two years (~41% IRR). The distressed sale
      scenario (bear case HUMAIN stall + revenue miss + next equity raise at down round) would likely price Groq at
      $3–5B — a 0.4–0.7× loss for Series E investors. Three thesis-break triggers require immediate diligence
      escalation: (1) BIS classifies Groq LPUs under advanced AI chip export controls, blocking the HUMAIN Saudi Arabia
      deployment; (2) Groq misses $400M 2025 revenue by year-end, signaling HUMAIN non-execution and market share loss;
      (3) Nvidia cross-license royalty terms emerge that impose >10% gross margin drag. Any single trigger would reduce
      the base-case implied valuation by 30–50% and elevate the probability weight on the bear scenario from 20% to
      40–50%.
