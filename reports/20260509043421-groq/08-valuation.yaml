  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Audited financial statements — revenue, margin, burn rate, and cash position
      missingEvidence: >-
        No GAAP-audited P&L, balance sheet, or cash-flow statement has been published by Groq. All 2024 and 2025 revenue
        figures are third-party analyst estimates (Sacra, Fortune) or CEO-level claims. Gross margin estimates of 35–45%
        are based on SRAM hardware cost analysis, not reported figures.
      whyItMatters: >-
        Every DCF scenario, comparable valuation, and return analysis in this chapter rests on unaudited revenue inputs.
        A 30% downward revision to 2025 revenue would reduce the trailing P/S from 13.8× to ~20× and collapse the base
        case to the bear case. The absence of audited financials is the single most significant diligence blocker.
      diligencePath: >-
        Request data room access with audited P&L for 2022–2025, gross margin bridge by revenue stream (API, enterprise,
        HUMAIN), cash position as of Q1 2026, and burn rate trend.
      relatedQuestionRefs:
        - QV003
        - QV015
    - type: private-evidence-only
      severity: blocking
      topic: HUMAIN contract binding status, draw-down schedule, and BIS export license
      missingEvidence: >-
        Whether the $1.5B HUMAIN commitment constitutes binding purchase orders or a letter of intent is not confirmed
        publicly. The phased draw-down schedule, delivery milestones, and BIS export license status for LPU shipment to
        Saudi Arabia are not disclosed.
      whyItMatters: >-
        The HUMAIN deal is Groq's largest single revenue commitment and the primary driver of the bull and base revenue
        scenarios. A non-binding LOI or BIS export control blockage simultaneously eliminates the revenue thesis and
        exposes Groq to regulatory penalties under the Export Administration Regulations.
      diligencePath: >-
        Request master service agreement with purchase order schedule; BIS export control counsel assessment of LPU Gen2
        performance vs. CCL thresholds; any pending export license applications for Saudi Arabia.
      relatedQuestionRefs:
        - QV019
        - QV025
    - type: private-evidence-only
      severity: material
      topic: Nvidia cross-license royalty scope, rate, and gross margin impact
      missingEvidence: >-
        The December 2025 Groq-Nvidia IP cross-license terms, including royalty rates, field-of-use restrictions,
        duration, and any grant-back provisions, are not publicly disclosed. Whether Groq owes Nvidia ongoing royalties
        on LPU sales or GroqCloud revenue is unknown.
      whyItMatters: >-
        Hidden royalty obligations of 5–15% of revenue would compress already-constrained gross margins (estimated
        35–45%) to 20–40%, eliminating the path to cash-flow positivity by 2026 and materially reducing terminal value
        across all DCF scenarios.
      diligencePath: >-
        Request full cross-license agreement; identify royalty rates, most-favored-nation clauses, LPU Gen3 design
        freedom-to-operate scope, and any revenue-sharing provisions.
      relatedQuestionRefs:
        - QV025
    - type: private-evidence-only
      severity: material
      topic: Enterprise NRR, cohort retention, and revenue mix by stream
      missingEvidence: >-
        Groq has not disclosed enterprise net revenue retention, churn rate, or cohort-level retention data. The 2.8M
        developer registration count conflates paid and free tiers; actual paying user count and average revenue per
        user are not public. Revenue mix between GroqCloud API, enterprise contracts, and HUMAIN infrastructure revenue
        is unknown.
      whyItMatters: >-
        The base-case DCF assumes Groq retains and expands enterprise revenue. If NRR is below 100%, the growth
        assumptions collapse. If more than 60% of revenue is HUMAIN-dependent, the business is more concentrated and
        riskier than the diversified impression suggests.
      diligencePath: >-
        Request enterprise cohort report showing NRR by vintage year; revenue mix breakdown; top-10 customer
        concentration; API vs. enterprise vs. infrastructure revenue split.
      relatedQuestionRefs:
        - QV015
        - QV018
    - type: private-evidence-only
      severity: material
      topic: Cap table, liquidation preference stack, and secondary market overhang
      missingEvidence: >-
        Groq's full capitalization table, Series E liquidation preferences, anti-dilution provisions, and any secondary
        market sales by early-round investors are not publicly available. Whether participating preferred or
        non-participating structures are in place significantly affects common stockholder (employee and Series E)
        returns at IPO or M&A exit.
      whyItMatters: >-
        Series E investors at $6.9B may face significant preference stack from earlier rounds at IPO or M&A. A $15B IPO
        with heavy liquidation preferences could deliver far less than the implied 2.2× to Series E investors. This gap
        materially affects the return analysis.
      diligencePath: >-
        Request full capitalization table with preference stack, participating vs. non-participating preferred,
        anti-dilution provisions, employee option pool size, and any secondary transaction history since Series C.
      relatedQuestionRefs:
        - QV022
        - QV023
    - type: estimable-with-effort
      severity: informational
      topic: Comparable valuation table completeness — private comps with undisclosed valuations
      missingEvidence: >-
        Several AI inference and compute companies with potential comparability have no publicly disclosed valuation:
        Replicate, Modal, Baseten, Anyscale, and Lepton AI. Their absence from the comparable valuation table may bias
        the peer median toward companies that received large rounds (selection bias).
      whyItMatters: >-
        If smaller bootstrapped or Series A/B AI inference companies trade at lower effective multiples, the peer median
        may be overstated, making Groq's 13.8× appear more favorable than it actually is within the broader inference
        infrastructure universe.
      diligencePath: >-
        Request secondary market data from Forge.com or Carta for private AI inference company equity marks; review CB
        Insights AI valuation tracker for additional private comps with estimated valuations.
      relatedTableRefs:
        - TV002
      relatedQuestionRefs:
        - QV030
