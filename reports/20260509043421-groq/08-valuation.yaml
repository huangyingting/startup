          Audited 2025 revenue at $450M+ reduces trailing multiple to <20× and validates the current valuation entry
          point
    notes: >-
      Thesis and anti-thesis positions are evidence-grounded but conditioned on unverified revenue and unaudited
      financials. The valuation stance would upgrade from MONITOR to BUY if binding HUMAIN draw-down schedule, audited
