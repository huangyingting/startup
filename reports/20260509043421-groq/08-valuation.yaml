callouts:
  - calloutType: insight
    title: Groq's 13.8× P/S Is in the AI Inference Peer Median — But Bear Case Overvaluation Risk Is Real
    body: >-
      Groq's September 2025 Series E valuation of $6.9B at 13.8× 2025E revenue sits squarely in the middle of the
      private AI inference peer set (Cerebras ~16×, Together AI ~16.5×, Fireworks AI ~12.7×, Lambda Labs ~3.8×). The
      CoreWeave public-market anchor at ~10× GPU cloud P/S provides a floor. On this basis, the current mark is
      defensible — not speculative — for a base or bull case execution. However, 76× 2024 trailing revenue is an
      uncomfortable entry multiple for any capital structure that requires repayment in 3–5 years. If 2025 revenue comes
      in at $350M (30% miss) rather than $500M, the trailing multiple rises to ~20× — still high but less alarming. If
      it comes in at $250M (50% miss), the multiple hits ~28× and the base case becomes the bear case by definition. The
      revenue target is thus the single most important near-term valuation variable, and the absence of audited
      financials makes it unverifiable from public sources.
    claimRefs:
      - CV004
      - CV005
      - CV006
      - CV008
      - CV009
      - CV027
      - CV028
      - CV042
  - calloutType: risk
    title: Three Thesis-Break Triggers That Would Compress $6.9B to $2–4B Overnight
    body: >-
      Three events individually would force a material downward revaluation of Groq from the current $6.9B mark: (1) BIS
      issues a rule classifying Groq's LPUs under advanced AI chip export controls, blocking the HUMAIN Saudi Arabia
      deployment. This eliminates the primary bull and base revenue driver ($500M+ from HUMAIN phased revenue), forcing
      a bear-case re-rating to $2–3B implied value. (2) Groq's 2025 year-end revenue is confirmed below $350M, revealing
      HUMAIN non-execution and market-share loss to Cerebras, Together AI, or AWS Inferentia. At $350M revenue and 10×
      P/S (bear-case compress), implied value is $3.5B — a 49% markdown. (3) Nvidia cross-license royalty terms emerge
      that impose a 10%+ gross margin drag, reducing estimated gross margins from 35–45% to 25–35% and eliminating the
      path to cash-flow positivity by 2026. Any single trigger elevates the bear-case probability weight from 20% to
      40–50%, producing a probability-weighted intrinsic value below $6.9B. These are not low-probability tail events —
      BIS regulatory risk and revenue concentration in a single government contract are structural features of Groq's
      current business model.
    claimRefs:
      - CV018
      - CV019
      - CV022
      - CV025
      - CV026
      - CV036
