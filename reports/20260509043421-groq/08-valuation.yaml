  - id: S02
    title: Comparable Company Analysis and Market Multiples
    body: >-
      The most relevant direct comparable set for Groq is private AI inference companies with disclosed valuations:
      Cerebras Systems ($8.1B, September 2025, ~$510M 2025E revenue, ~16× P/S), Fireworks AI ($4.0B, October 2025,
      ~$315M ARR, ~12.7× P/S), and Together AI ($3.3B, February 2025, ~$200M ARR, ~16.5× P/S). Lambda Labs ($1.5B,
      ~$400M ARR, ~3.8× P/S) is a partial comp representing pure GPU compute rental with lower platform premium.
      SambaNova Systems, also an inference ASIC startup, saw its valuation decline to an estimated $1.5–2B in 2025 while
      exploring strategic alternatives — a cautionary data point for the bear case. Among the partial comps, CoreWeave's
      March 2025 IPO at approximately $19–20B valuation on $1.9B 2024 revenue (~10× P/S) provides the only public-market
      anchor. Databricks ($43B, $1.6B ARR, ~27× P/S) and Scale AI ($14B, ~$1B revenue, ~14× P/S) illustrate the premium
      attached to platform and data network-effect businesses, which Groq has not yet established. Nvidia (~$3T market
      cap, $130B revenue, ~23× P/S) and AMD (~$250B, $24B revenue, ~10× P/S) represent the public silicon benchmarks.
      The private AI inference median EV/Revenue is approximately 13–16× in 2025. Groq's 13.8× sits at the lower end of
      this range, which implies the market is not yet pricing in a platform premium — a reasonable discount given the
      absence of audited financials and the inference-only TAM ceiling. PitchBook and CB Insights private market data
      confirm AI infrastructure multiples have compressed 20–40% from the 2021–2022 peak, creating a more disciplined
      valuation environment in which Groq's current mark must be continuously defended by revenue execution.
