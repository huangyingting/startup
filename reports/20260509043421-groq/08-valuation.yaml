  - id: TV005
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Audited Financial Statements 2022–2025
        - >-
          No GAAP P&L, balance sheet, or cash-flow statement exists in the public domain; all revenue and margin figures
          are third-party estimates
        - >-
          Revenue and margin claims are the foundation of every valuation scenario; unverified inputs mean the base-case
          DCF could be wrong by 30–50%
        - >-
          Request data room access with audited P&L, gross margin bridge, and segmented revenue by stream (API,
          enterprise, HUMAIN)
      - - HUMAIN Contract — Binding Terms and Draw-Down Schedule
        - >-
          Whether the $1.5B commitment includes binding purchase orders or letters of intent is not publicly confirmed;
          draw-down milestones are unknown
        - >-
          The HUMAIN deal is the largest single revenue commitment; a non-binding LOI or stalled deployment eliminates
          the bull and base revenue scenarios
        - >-
          Request master service agreement, phased purchase order schedule, BIS export license status, and first
          delivery milestone dates
      - - Nvidia Cross-License Royalty Terms
        - >-
          The December 2025 Groq-Nvidia IP cross-license terms, royalty rates, field-of-use restrictions, and duration
          are not publicly disclosed
        - >-
          Hidden royalty obligations to Nvidia would permanently compress gross margins and create competitive
          entanglement with the primary GPU incumbent
        - >-
          Request full cross-license agreement; identify royalty rates, most-favored-nation clauses, grant-back
          provisions, and LPU Gen3 design freedom-to-operate scope
      - - Enterprise NRR and Cohort Retention Data
        - >-
          No enterprise NRR, churn rate, or cohort-level retention metric has been publicly disclosed; 2.8M developer
          registrations conflate paid and free tiers
        - >-
          The base-case DCF assumes Groq retains and expands enterprise revenue; if NRR is below 100%, the base case
          collapses to the bear case
        - >-
          Request enterprise cohort report showing NRR by vintage year, revenue mix (API vs. enterprise vs.
          infrastructure), and top-10 customer concentration
      - - Cap Table and Liquidation Preference Stack
        - >-
          Groq's full cap table, Series E liquidation preferences, anti-dilution provisions, and secondary market
          overhang are not publicly available
        - >-
          Series E investors at $6.9B may face significant preference stack from earlier rounds at IPO or M&A;
          liquidation preference could limit common-stock upside materially
        - >-
          Request full capitalization table with preference stack, participating preferred vs. non-participating,
          anti-dilution provisions, and employee option pool size
    notes: >-
      These five diligence asks are prioritized in order of thesis impact. Items 1 and 2 (audited financials and HUMAIN
      contract terms) are blocking; a positive investment decision at $6.9B or above without these would be speculative.
      Items 3–5 are material but not blocking for initial sizing decisions.
