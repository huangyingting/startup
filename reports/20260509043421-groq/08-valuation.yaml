chapter:
  number: 8
  title: Valuation
  key: valuation
  summary: >-
    Groq's September 2025 Series E establishes a $6.9B post-money valuation on approximately $500M 2025E ARR, implying a
    13.8× EV/Revenue multiple that sits within the median band for private AI inference and compute infrastructure
    peers. The valuation grew 146% in thirteen months from the August 2024 Series D ($2.8B pre-money), driven by the
    $1.5B HUMAIN infrastructure commitment and strong GroqCloud developer momentum. Base-case DCF analysis supports an
    intrinsic value of $8–12B (2030 target, 38% CAGR, 12× exit multiple), suggesting $6.9B is a moderate discount to
    base-case intrinsic value. However, the bear case — Nvidia speed-gap closure, hyperscaler ASIC substitution,
    stalling HUMAIN draw-down — implies 50–60% overvaluation at today's mark. The primary diligence blockers are: no
    audited financials, undisclosed HUMAIN contract terms, and opaque Nvidia cross-license royalty obligations.
    Recommendation: MONITOR. Do not initiate new positions at current valuation without (a) confirmed $450M+ 2025
    revenue and (b) binding HUMAIN draw-down schedule. Series D investors hold strong paper gains (2.46×, ~227%
    annualized IRR); Series E investors need $10–14B exit for a 1.5–2× return and $14–21B for a 2–3× outcome.
sections:
  - id: S01
    title: Investment Thesis, Anti-Thesis, and Valuation Context
    body: >-
      Groq's investment thesis rests on four pillars: (1) a purpose-built LPU delivering 750+ tokens per second on
      70B-parameter models — a 10–14× speed advantage over GPU clouds that commands a pricing premium and developer
      loyalty; (2) a 2.8-million-developer ecosystem that creates organic top-of-funnel and network-effect compounding;
      (3) the $1.5B Saudi HUMAIN infrastructure commitment providing government-backed revenue visibility through
      2026–2027; and (4) a $6.9B September 2025 valuation that, at 13.8× 2025E revenue, sits within the 10th–75th
      percentile of comparable private AI infrastructure companies and represents a moderate discount to base-case
      intrinsic value. The anti-thesis is structurally serious. Nvidia's Blackwell GPU family (H200/B200) has narrowed
      the tokens-per-second gap by approximately 2.4×, compressing Groq's differentiator without eliminating it. Groq's
      OpenAI-compatible API, while a developer acquisition asset, is also a switching-cost liability: enterprises can
      migrate to cheaper GPU-cloud alternatives in days. Training market exclusion limits Groq's total addressable
      market to inference-only, while Databricks, Scale AI, and AWS train on vertical integrations Groq cannot match.
      Most critically: no audited financial statements exist. Every revenue and margin figure is a third-party estimate
      or CEO-level claim. The $6.9B valuation at 76× 2024 trailing revenue embeds a growth expectation that has not been
      independently verified. Investors entering at Series E carry a compressed return profile and must price in
      significant execution risk.
