  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis, Anti-Thesis, and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Groq's investment thesis rests on four pillars: (1) a purpose-built LPU delivering 750+ tokens per second
              on 70B-parameter models — a 10–14× speed advantage over GPU clouds that commands a pricing premium and
              developer loyalty; (2) a 2.8-million-developer ecosystem that creates organic top-of-funnel and
              network-effect compounding; (3) the $1.5B Saudi HUMAIN infrastructure commitment providing
              government-backed revenue visibility through 2026–2027; and (4) a $6.9B September 2025 valuation that, at
              13.8× 2025E revenue, sits within the 10th–75th percentile of comparable private AI infrastructure
              companies and represents a moderate discount to base-case intrinsic value. The anti-thesis is structurally
              serious. Nvidia's Blackwell GPU family (H200/B200) has narrowed the tokens-per-second gap by approximately
              2.4×, compressing Groq's differentiator without eliminating it. Groq's OpenAI-compatible API, while a
              developer acquisition asset, is also a switching-cost liability: enterprises can migrate to cheaper
              GPU-cloud alternatives in days. Training market exclusion limits Groq's total addressable market to
              inference-only, while Databricks, Scale AI, and AWS train on vertical integrations Groq cannot match. Most
              critically: no audited financial statements exist. Every revenue and margin figure is a third-party
              estimate or CEO-level claim. The $6.9B valuation at 76× 2024 trailing revenue embeds a growth expectation
              that has not been independently verified. Investors entering at Series E carry a compressed return profile
              and must price in significant execution risk.
            claimRefs:
              - CV001
              - CV004
              - CV005
              - CV020
              - CV021
              - CV022
              - CV024
              - CV025
              - CV028
              - CV035
      - number: '8.2'
        title: Comparable Company Analysis and Market Multiples
        blocks:
          - type: paragraph
            body: >-
              The most relevant direct comparable set for Groq is private AI inference companies with disclosed
              valuations: Cerebras Systems ($8.1B, September 2025, ~$510M 2025E revenue, ~16× P/S), Fireworks AI ($4.0B,
              October 2025, ~$315M ARR, ~12.7× P/S), and Together AI ($3.3B, February 2025, ~$200M ARR, ~16.5× P/S).
              Lambda Labs ($1.5B, ~$400M ARR, ~3.8× P/S) is a partial comp representing pure GPU compute rental with
              lower platform premium. SambaNova Systems, also an inference ASIC startup, saw its valuation decline to an
              estimated $1.5–2B in 2025 while exploring strategic alternatives — a cautionary data point for the bear
              case. Among the partial comps, CoreWeave's March 2025 IPO at approximately $19–20B valuation on $1.9B 2024
              revenue (~10× P/S) provides the only public-market anchor. Databricks ($43B, $1.6B ARR, ~27× P/S) and
              Scale AI ($14B, ~$1B revenue, ~14× P/S) illustrate the premium attached to platform and data
              network-effect businesses, which Groq has not yet established. Nvidia (~$3T market cap, $130B revenue,
              ~23× P/S) and AMD (~$250B, $24B revenue, ~10× P/S) represent the public silicon benchmarks. The private AI
              inference median EV/Revenue is approximately 13–16× in 2025. Groq's 13.8× sits at the lower end of this
              range, which implies the market is not yet pricing in a platform premium — a reasonable discount given the
              absence of audited financials and the inference-only TAM ceiling. PitchBook and CB Insights private market
              data confirm AI infrastructure multiples have compressed 20–40% from the 2021–2022 peak, creating a more
              disciplined valuation environment in which Groq's current mark must be continuously defended by revenue
              execution.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV027
              - CV028
