  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Architecture
        blocks:
          - type: paragraph
            body: >-
              Groq generates revenue through three primary streams: (1) GroqCloud token-based API access, (2) enterprise
              API contracts with dedicated capacity, and (3) infrastructure partnerships — most significantly the $1.5B
              HUMAIN commitment from the Kingdom of Saudi Arabia. A nascent on-premises GroqRack hardware business
              exists but pricing and revenue contribution are not publicly disclosed. GroqCloud is the most visible and
              measurable stream, operating on a pay-per-token model with publicly listed prices: $0.59/1M input tokens
              and $0.79/1M output tokens for Llama 3.1 70B, and $0.05/1M input tokens for smaller models like Llama 3.1
              8B. This positions Groq competitively below premium GPU-cloud APIs. Enterprise contracts are
              company-claimed to start at $500,000 per year, offering dedicated LPU capacity and service level
              agreements, though realized average selling prices and contract counts are not disclosed. The HUMAIN deal
              is structured as phased infrastructure revenue, not equity — meaning revenue is recognized as capacity is
              deployed, not upfront. Recognition timing and draw-down schedule are critical unknowns for modeling cash
              flow. Revenue mix between developer API, enterprise, and infrastructure is not publicly broken down,
              making it impossible to assess concentration risk or margin contribution by segment without a data room.
              Groq's revenue model benefits from OpenAI API compatibility, dramatically lowering switching friction for
              developers.
            claimRefs:
              - CI001
              - CI002
              - CI012
              - CI018
              - CI025
              - CI028
