      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Groq has raised approximately $1.5 billion in disclosed equity financing across six rounds between 2017
              and September 2025, plus a $1.5 billion infrastructure commitment from the Kingdom of Saudi Arabia
              announced in February 2025. The company received a $10 million seed round in 2017 led by Social Capital
              (Chamath Palihapitiya), followed by additional early-stage capital in 2018. In April 2021, the $300
              million Series C — led by Tiger Global Management and D1 Capital Partners — vaulted Groq to unicorn status
              at over $1 billion valuation. The August 2024 Series D ($640M at $2.8B valuation, led by BlackRock Private
              Equity Partners) included strategic investors Samsung Catalyst Fund (the semiconductor manufacturer for
              LPU v2) and Cisco Investments (aligned with Groq's Bell Canada and enterprise telco plays). Morgan Stanley
              served as exclusive placement agent. The September 2025 Series E ($750M at $6.9B) was led by Disruptive —
              a Dallas growth fund that invested nearly $350 million in this single round — with continued participation
              from BlackRock, Samsung, Cisco, D1, Altimeter, 1789 Capital, and Infinitum. In December 2025, Nvidia
              agreed to license Groq's inference technology in a deal valued at approximately $20 billion, described by
              Groq as a non-exclusive licensing arrangement. Groq's 2023 revenue was reported at $3.4 million against a
              net loss of $88 million; 2025 estimated revenue of $500 million reflects the dramatic post-ChatGPT
              acceleration, though exact figures have not been independently audited.
