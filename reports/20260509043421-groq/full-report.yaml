      - number: '5.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Deterministic LPU Architecture Is a Genuine and Defensible Technical Moat for Mid-Size LLM Inference
            body: >-
              Groq's LPU architecture represents a fundamentally different approach to AI inference compared to
              GPU-based alternatives: statically-scheduled, SRAM-centric, and fully deterministic. This design yields
              time-to-first-token and throughput benchmarks for 7B–70B parameter models that GPU architectures
              structurally cannot replicate without fundamental redesign, because GPU scheduling latency is an inherent
              property of their dynamic execution model, not a configuration parameter. Independent benchmark data from
              ArtificialAnalysis (241 tokens per second for Llama 2 70B in January 2024, when the nearest GPU
              alternative delivered fewer than 50 tokens per second) confirms the performance advantage is real and
              substantial for the target model size range. The GroqFlow compiler's static scheduling also delivers a
              predictable, reproducible performance characteristic that enterprises running latency-sensitive production
              workloads value independently of raw throughput numbers. This moat is durable in the near-to-medium term
              because it is rooted in silicon design and compiler technology — not tunable parameters that competitors
              can replicate through software optimization alone.
            calloutType: insight
            claimRefs:
              - CE001
              - CE007
              - CE008
              - CE012
          - type: callout
            title: SRAM Ceiling and Cost Economics Are the Most Material Technical Diligence Risks
            body: >-
              The SRAM-centric architecture that makes the LPU fast for mid-size models creates a structural ceiling for
              large model inference. Models exceeding approximately 70–80 billion parameters require distribution across
              multiple GroqNodes, adding inter-node communication latency and reducing the single-system throughput
              advantage that is Groq's primary competitive claim. ArtificialAnalysis data from October 2025 shows
              Cerebras WSE-3 outperforming Groq for 70B-plus parameter models — exactly the frontier where commercial
              interest and average contract values are highest. Compounding this, SRAM costs significantly more per bit
              than DRAM and HBM, and as HBM costs decline with process maturity and volume, Groq's cost-per-token
              advantage may compress even if speed leadership is maintained for mid-size models. Groq has not publicly
              disclosed Gen2 LPU SRAM capacity, making it impossible to assess whether the Samsung 4nm generation
              materially resolves the model-size ceiling. The combination of a size ceiling today, an uncertain cost
              roadmap, and an undisclosed Gen2 architectural specification is the most material set of technical
              diligence gaps for prospective investors evaluating long-term competitive durability.
            calloutType: insight
