          - type: callout
            title: Founder Departure Is a Leading Indicator of Architecture and IP Risk
            body: >-
              Jonathan Ross invented the Google TPU, founded Groq, and served as its primary LPU architecture authority
              for 10+ years. His departure to Nvidia in December 2025 — packaged as part of an IP cross-licensing deal —
              is not merely a people-risk event. It signals that Nvidia considered Ross's knowledge valuable enough to
              pay for access (via the license), that Groq's IP position required a cross-license to avoid potential
              litigation risk, and that Groq's architecture team now operates without its founding intelligence. Two
              unanswerable questions remain from public sources: (1) What does Nvidia now know about Groq's LPU
              architecture from the licensing process? (2) Is the cross-license royalty-bearing in a way that creates
              future cost obligations? Law360 analysis confirms neither question is answerable without the full
