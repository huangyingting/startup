  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments and Buyer Landscape
        blocks:
          - type: paragraph
            body: >-
              Groq's customer base is organized into four identifiable segments by buyer type, revenue band, and
              deployment model. The enterprise segment (estimated contract value above $100,000 per year) comprises
              approximately 25% of customer accounts but drives roughly 70% of total revenue. Enterprise buyers are
              primarily AI engineering leads and CTO-level executives at technology-intensive companies, government
              agencies, and research institutions who require deterministic latency SLAs that GPU-based cloud providers
              cannot guarantee. The growth-company segment (estimated $10,000–$100,000 per year) comprises approximately
              35% of accounts and 25% of revenue; this tier skews toward AI-native startups building real-time
              applications such as voice AI, code copilots, and gaming intelligence where Groq's throughput advantage is
              commercially meaningful. Developer self-serve customers (less than $10,000 per year, including free-tier
              users) constitute approximately 40% of accounts but only approximately 5% of revenue — a large but
              monetization-light base whose primary value is top-of-funnel pipeline and ecosystem signaling. Vertically,
              Groq's named customer logos span motorsport (McLaren F1), financial services (Paytm), telecommunications
              (Bell Canada, Government of India DoT), energy and commodities (Saudi Aramco HUMAIN), high-energy physics
              (CERN), national laboratory computing (US DOE / Argonne), and enterprise software (IBM, Salesforce via
              partner integrations). Geographically, GroqCloud's developer base is global, with documented
              concentrations in the United States, India (Paytm, DoT), Europe (CERN), and the Gulf Cooperation Council
              region (HUMAIN). Revenue geography is not publicly disclosed and represents a diligence gap, as the HUMAIN
              commitment could disproportionately shift the apparent geographic mix if recognized in 2025–2026.
