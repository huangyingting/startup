  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Groq competes in a landscape defined by three distinct competitive layers: custom-silicon AI inference
              specialists, GPU-cloud inference-as-a-service API providers, and the hyperscaler managed AI services that
              bundle inference into broader cloud platforms. Among custom-silicon peers, Cerebras Systems (WSE-3 chip)
              and SambaNova Systems (SN40L RDU) are the most directly comparable — each has built its own ASIC
              architecture, targets latency-sensitive and compute-intensive inference workloads, and competes for the
              same enterprise and national-laboratory customer segment that Groq pursues with GroqRack. Among API-first
              GPU-cloud providers, Together AI ($3.3B valuation, General Catalyst-led Series B, 450K+ developers) and
              Fireworks AI ($4B valuation, Sequoia-led Series C, $315M ARR) represent the most scaled alternatives with
              similarly open-model libraries and OpenAI-compatible APIs. Nvidia, as the incumbent, is simultaneously a
              supplier (via its CUDA ecosystem that all GPU inference players depend on), a licensing partner (December
              2025 ~$20B deal with Groq), and a formidable downstream competitor via NIM inference microservices and
              Triton Inference Server deployed across every major cloud. AMD competes indirectly via MI300X GPU
              deployments and ROCm. The hyperscalers (AWS Inferentia 2, Google TPU v5, Azure Maia 100) build custom
              silicon primarily for internal cost optimization of their own AI APIs, not as standalone third-party IaaS
              products, but they capture the large majority of enterprise AI spend. Likely entrants include further
              VC-backed inference optimization startups and potential vertical ASIC plays from ARM-ecosystem chip
              designers targeting edge and on-premises deployments. The status quo for many buyers remains self-hosting
              open-source models on GPU clusters rented from AWS, Azure, or Google, which remains Groq's most common
              displacement target.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
              - CP007
              - CP008
      - number: '3.2'
        title: Competitor Profiles — Scale, Funding, and Strategy
        blocks:
          - type: paragraph
            body: >-
              Cerebras Systems (founded 2016, Menlo Park CA; CEO Andrew Feldman) has built the world's largest chip —
              the Wafer Scale Engine 3 (WSE-3) with 900,000 AI cores, 40GB on-chip SRAM, and manufactured on TSMC 3nm.
              Cerebras closed a $1.1B Series G in September 2025 at an $8.1B valuation, with customers including AWS,
              Meta, IBM, Mistral, DOE, GSK, and Mayo Clinic. Cerebras claims 20x faster throughput than Nvidia GPUs for
              large models and reports 5M+ monthly requests on Hugging Face. Cerebras supports both training and
              inference, giving it a broader addressable market than Groq's inference-only LPU, and its enterprise-first
              sales motion targets national labs and regulated-sector buyers. SambaNova Systems (founded 2017, Palo Alto
              CA; CEO Rodrigo Liang) built the SN40L chip on a reconfigurable dataflow unit (RDU) architecture with a
              three-tier memory hierarchy (SRAM + HBM + DRAM). SambaNova raised $2.17B total but was reported in October
              2025 to be exploring a sale after failing to raise a new funding round — a significant signal of market
              stress for the custom-silicon inference category. SambaNova's customers include Oak Ridge National
              Laboratory, Lawrence Livermore National Laboratory (LLNL), OTP Bank, and Saudi Aramco. Together AI
              (founded 2022; CEO Vipul Ved Prakash) closed a $305M Series B in February 2025 led by General Catalyst at
              a $3.3B valuation and serves 450K+ developers with 200+ open-source models. Together uses Nvidia Blackwell
              GPUs and the FlashAttention-3 kernel, combining training, fine-tuning, and inference. Fireworks AI ($4B
              valuation; $315M ARR by early 2026; $250M Series C led by Sequoia with NVIDIA and AMD participating)
              serves Uber, Shopify, GitLab, Notion, and DoorDash, processing 10T+ tokens per day via its FireAttention
              custom CUDA stack. Nvidia ($130B+ annual revenue; 80–90% AI accelerator market share) is the defining
              incumbent, with Blackwell GPU (B200) inference-optimized variants now shipping and NIM microservices
              providing turnkey inference orchestration on top of the dominant CUDA software stack.
