              - CV041
              - CV042
              - CV043
              - CV044
      - number: '8.3'
        title: DCF Scenario Analysis and Valuation Ranges
        blocks:
          - type: paragraph
            body: >-
              A three-scenario DCF provides the analytical backbone for the valuation recommendation. All scenarios use
              a 30% discount rate appropriate for a pre-revenue-certainty, pre-IPO hardware/cloud company with no
              audited financials and material regulatory exposure. Bull case (30% probability): Revenue grows from $500M
              in 2025 to $5B in 2030 at a 60% CAGR, driven by HUMAIN execution, a Gen3 LPU speed refresh, and expansion
              into agentic AI workloads. 2030 gross margin reaches 60% as SRAM costs decline with scale and software
              layers monetize. Terminal value at 20× EV/Revenue equals $100B. Discounted to present at 30%: implied
              current valuation of $18–25B. At $6.9B, Series E investors would capture 2.6–3.6×. Base case (50%
              probability): Revenue grows from $500M in 2025 to $2.5B in 2030 at a 38% CAGR. Gross margin expands to 45%
              as utilization improves. Terminal value at 12× EV/Revenue equals $30B. Discounted to present: implied
              current valuation of $8–12B. The $6.9B Series E is a moderate 15–40% discount to base-case intrinsic value
              — attractive if executed, but with limited margin for error. Bear case (20% probability): Revenue
              decelerates to $800M by 2030 (14% CAGR) as Nvidia Blackwell closes the speed gap, hyperscalers deploy
              custom ASICs (AWS Trainium3, Google TPU v7), and HUMAIN draw-down stalls under BIS export controls. 2030
              gross margin is 30%. Terminal value at 6× EV/Revenue equals $4.8B. Discounted to present: implied current
              value of $2–3B. At $6.9B, the current valuation is 2–3× overvalued in this scenario. The
              probability-weighted intrinsic value across scenarios is approximately $9.5–12B — suggesting the Series E
              is priced at a meaningful discount to expected intrinsic value, conditional on base or bull case
              execution.
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV045
      - number: '8.4'
        title: Exit Scenarios, Investor Return Analysis, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              Three exit pathways exist for Groq investors: IPO, strategic M&A, and distressed sale. The IPO pathway is
              the base-case management objective. Groq CEO statements have pointed toward cash-flow positivity by 2026
              as a precondition for public market readiness. At a $15B IPO valuation (base case, 2027), Series E
              investors ($6.9B entry) earn a 2.2× return and approximately 47% IRR over two years. At $25B (bull case
              IPO), the return is 3.6× and ~90% IRR. Series D investors ($2.8B entry, August 2024) currently hold a
              2.46× paper gain in thirteen months — an annualized IRR of approximately 227% if the $6.9B mark holds. The
              strategic M&A pathway at 1–2× premium to the current mark implies $10–14B. Cisco (existing Series E
              investor), Samsung (existing investor and LPU manufacturer), and IBM have the balance sheet and AI
              infrastructure rationale to be acquirers. A $13.8B M&A outcome would give Series E investors a 2.0× return
              over approximately two years (~41% IRR). The distressed sale scenario (bear case HUMAIN stall + revenue
              miss + next equity raise at down round) would likely price Groq at $3–5B — a 0.4–0.7× loss for Series E
              investors. Three thesis-break triggers require immediate diligence escalation: (1) BIS classifies Groq
              LPUs under advanced AI chip export controls, blocking the HUMAIN Saudi Arabia deployment; (2) Groq misses
              $400M 2025 revenue by year-end, signaling HUMAIN non-execution and market share loss; (3) Nvidia
              cross-license royalty terms emerge that impose >10% gross margin drag. Any single trigger would reduce the
              base-case implied valuation by 30–50% and elevate the probability weight on the bear scenario from 20% to
              40–50%.
            claimRefs:
              - CV026
              - CV029
              - CV030
              - CV031
              - CV032
              - CV033
              - CV034
              - CV036
      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Groq's 13.8× P/S Is in the AI Inference Peer Median — But Bear Case Overvaluation Risk Is Real
            body: >-
              Groq's September 2025 Series E valuation of $6.9B at 13.8× 2025E revenue sits squarely in the middle of
              the private AI inference peer set (Cerebras ~16×, Together AI ~16.5×, Fireworks AI ~12.7×, Lambda Labs
              ~3.8×). The CoreWeave public-market anchor at ~10× GPU cloud P/S provides a floor. On this basis, the
              current mark is defensible — not speculative — for a base or bull case execution. However, 76× 2024
              trailing revenue is an uncomfortable entry multiple for any capital structure that requires repayment in
              3–5 years. If 2025 revenue comes in at $350M (30% miss) rather than $500M, the trailing multiple rises to
              ~20× — still high but less alarming. If it comes in at $250M (50% miss), the multiple hits ~28× and the
              base case becomes the bear case by definition. The revenue target is thus the single most important
              near-term valuation variable, and the absence of audited financials makes it unverifiable from public
              sources.
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV008
              - CV009
              - CV027
              - CV028
              - CV042
          - type: callout
            title: Three Thesis-Break Triggers That Would Compress $6.9B to $2–4B Overnight
            body: >-
              Three events individually would force a material downward revaluation of Groq from the current $6.9B mark:
              (1) BIS issues a rule classifying Groq's LPUs under advanced AI chip export controls, blocking the HUMAIN
              Saudi Arabia deployment. This eliminates the primary bull and base revenue driver ($500M+ from HUMAIN
              phased revenue), forcing a bear-case re-rating to $2–3B implied value. (2) Groq's 2025 year-end revenue is
              confirmed below $350M, revealing HUMAIN non-execution and market-share loss to Cerebras, Together AI, or
              AWS Inferentia. At $350M revenue and 10× P/S (bear-case compress), implied value is $3.5B — a 49%
              markdown. (3) Nvidia cross-license royalty terms emerge that impose a 10%+ gross margin drag, reducing
              estimated gross margins from 35–45% to 25–35% and eliminating the path to cash-flow positivity by 2026.
              Any single trigger elevates the bear-case probability weight from 20% to 40–50%, producing a
              probability-weighted intrinsic value below $6.9B. These are not low-probability tail events — BIS
              regulatory risk and revenue concentration in a single government contract are structural features of
              Groq's current business model.
            calloutType: risk
