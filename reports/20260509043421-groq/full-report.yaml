      - number: '4.3'
        title: Cost Structure, Unit Economics, and Gross Margin
        blocks:
          - type: paragraph
            body: >-
              Groq's cost structure is dominated by three categories: LPU hardware CAPEX (chip procurement from Samsung
              4nm fab), data center operations (co-location and power costs), and R&D / engineering headcount. The
              SRAM-centric LPU architecture that enables best-in-class inference speed also creates a structural cost
              disadvantage: SRAM is orders of magnitude less memory-dense and more expensive per byte than the HBM used
              in NVIDIA GPUs, and each LPU card costs approximately $20,000. This hardware cost profile constrains gross
              margins to an estimated 35–45% on GroqCloud API revenue — well below the 60–70%+ margins typical of
              pure-play software SaaS, though improving as utilization scales. CAPEX for LPU hardware is estimated at
              $50–100M annually based on Samsung manufacturing cost benchmarks. Operating burn includes this hardware
              cost amortized, plus $60–80M in R&D engineering headcount and $30–60M in data center operations. Estimated
              total 2024 burn was $150–200M. Groq's unit economics at the developer level are favorable for customer
              acquisition: developer-led growth implies near-zero CAC for individual API users, but enterprise deals
              require sales engineering investment not publicly quantified. Revenue per developer is estimated at ~$178
              per year on average, skewed heavily by enterprise cohorts. NRR, LPU utilization rate, and payback period
              on LPU CAPEX are material unknowns that require access to internal billing data.
