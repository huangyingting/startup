    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Audited Financial Statements 2022–2025
        - >-
          No GAAP P&L, balance sheet, or cash-flow statement exists in the public domain; all revenue and margin figures
          are third-party estimates
        - >-
          Revenue and margin claims are the foundation of every valuation scenario; unverified inputs mean the base-case
