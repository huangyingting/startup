            body: >-
              Groq has raised approximately $2.1B in total equity through six rounds, with the most recent being the
              $750M Series E (September 2025, $6.9B valuation, led by Disruptive with participation from BlackRock,
              Cisco, Samsung, and 01 Advisors). Additionally, the Saudi Arabia HUMAIN commitment of $1.5B in February
