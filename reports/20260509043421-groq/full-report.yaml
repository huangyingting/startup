            title: SRAM Architecture Ceiling Limits Competitive Reach
            body: >-
              Groq's LPU SRAM-centric design is its primary speed advantage but also its most documented competitive
              constraint. Models exceeding approximately 70–80 billion parameters cannot be served efficiently on
              current LPU hardware without quantization, while Cerebras WSE-3 (40GB SRAM) and SambaNova SN40L
              (three-tier memory) handle larger models. As frontier model sizes grow beyond 100B parameters, Groq's
              competitive reach narrows unless its next-generation chip significantly expands on-chip memory capacity.
