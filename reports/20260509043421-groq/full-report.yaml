        - Reduce position; require confirmed binding HUMAIN draw-down and audited revenue before re-initiating
      - - Nvidia cross-license royalty exceeds 10% of revenue
        - >-
          Court filing, press report, or M&A due diligence reveals royalty rate >10% of GroqCloud/LPU revenue payable to
