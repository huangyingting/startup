  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: LPU Architecture and Technical Innovation
        blocks:
          - type: paragraph
            body: >-
              Groq's Language Processing Unit (LPU) is a purpose-built application-specific integrated circuit (ASIC)
              designed exclusively for AI inference — not training. The foundational architectural insight behind the
              LPU is that GPU-based inference is bottlenecked not by compute FLOPS but by memory bandwidth: loading
              model weights from DRAM between token generation steps creates the latency that GPUs cannot eliminate.
              Groq's solution is an SRAM-centric design in which the entire model computation graph is mapped to on-chip
              SRAM, eliminating the DRAM read cycle per token. The LPU is a single-core architecture with no cache
              hierarchy, no branch prediction, and no speculative execution. Instead, the GroqFlow compiler statically
              schedules every operation at compile time — a "kernel-free" execution model where the entire model's
              execution path is fully determined before hardware runs. This yields deterministic latency: any given
              model configuration always produces the same time-per-token regardless of batch size or concurrent request
              load, a property that GPU architectures cannot replicate because their dynamic schedulers introduce
              inherent variability. The first-generation LPU, manufactured on GlobalFoundries' 14nm process, has 230
              million transistors and delivers 900 GB/s of on-chip memory bandwidth. The second-generation LPU,
              manufactured at Samsung's Taylor, Texas facility on the 4nm process node, was deployed in production in
              2025 with higher transistor density and improved throughput, though detailed specifications remain
              undisclosed. GroqCards (PCIe accelerator cards) assemble into GroqNodes and GroqRacks — the latter being a
              9U rack unit containing 8 GroqNodes (64 GroqCards) delivering approximately 5.6 TFLOPS FP16 aggregate.
              Groq acquired Maxeler Technologies in March 2022, adding FPGA-based dataflow computing expertise and HPC
              intellectual property to its architecture foundation.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
              - CE027
              - CE034
              - CE037
      - number: '5.2'
        title: Product Portfolio and Service Tiers
        blocks:
          - type: paragraph
            body: >-
              Groq's commercial product portfolio spans two primary delivery models: GroqCloud, a cloud-based API
              inference service, and GroqRack, an on-premises LPU hardware deployment system. GroqCloud is the primary
              growth vehicle: an OpenAI-compatible REST API that accepts chat completions and audio transcription
              requests, requiring zero code changes for developers migrating from OpenAI or other compatible API
              providers. The service operates across three tiers — free (rate-limited developer access), growth/pro
              (higher rate limits, pay-as-you-go per token), and enterprise (SLA-backed, custom pricing, private
              deployments) — enabling a land-and-expand motion from experimentation to production. Supported open-source
              models include the Meta Llama 2 series (7B, 13B, 70B), Llama 3 and Llama 3.1 (8B, 70B, 405B), Mistral 7B,
              Mixtral 8x7B, DeepSeek-R1 distilled variants, OpenAI Whisper for speech-to-text transcription, and Meta
              Llama Guard for content moderation. The Llama 3 405B model requires distribution across multiple GroqNodes
              due to the SRAM constraint of individual LPU chips, adding inter-node communication latency for the
              largest supported model. GroqRack serves enterprise and government customers requiring air-gapped or
              on-premises deployments, bundled with KQUE — Groq's high-density cooling and power delivery system
              designed for data center rack integration. In March 2024, Groq acquired Definitive Intelligence, adding AI
              analytics and natural language business intelligence capabilities to the GroqCloud platform, expanding the
              product scope from pure inference API toward analytics use cases, though integration maturity is not
              publicly documented.
            claimRefs:
              - CE013
              - CE014
              - CE015
              - CE016
              - CE017
              - CE026
              - CE031
              - CE035
      - number: '5.3'
        title: Developer Ecosystem and API Experience
        blocks:
          - type: paragraph
            body: >-
              GroqCloud's developer adoption trajectory is among the fastest recorded for an AI infrastructure API:
              70,000 developers signed up in the first month following the February 2024 public launch, reaching 360,000
              by August 2024 and 2.8 million by December 2025. This velocity was driven primarily by the
              OpenAI-compatible API design — developers with existing OpenAI integrations can switch to GroqCloud by
              changing a single endpoint URL and API key, with no code refactoring required. Official client libraries
              are published for Python (as the "groq" package on PyPI) and TypeScript/JavaScript (as "groq-sdk" on npm),
              with CURL examples for direct REST access. The ecosystem integrations span LangChain, LlamaIndex, LiteLLM,
              n8n, Flowise, and PrivateGPT, enabling GroqCloud as a drop-in inference backend for popular AI
              orchestration frameworks. GitHub repositories for the GroqCloud API client libraries accumulate over
              10,000 combined stars, indicating strong community engagement relative to the platform's age. Groq
              operates an active developer Discord with dedicated support channels, API status announcements, and
              community showcase threads. The developer documentation portal at console.groq.com/docs provides API
              reference, quickstart guides, model cards, rate limit documentation, and migration guides. Model
              availability through Hugging Face further extends ecosystem reach with Groq-hosted model endpoints
              accessible via the Hugging Face inference API layer. HeliconeAI public API analytics data shows GroqCloud
              consistently among the most queried inference endpoints in the developer AI API category, reinforcing the
              community adoption narrative beyond self-reported developer counts alone.
            claimRefs:
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
              - CE024
              - CE033
              - CE036
      - number: '5.4'
        title: Performance Benchmarks, Reliability, and Technical Risks
        blocks:
          - type: paragraph
            body: >-
              Groq's documented performance leadership for mid-size LLM inference is supported by independent benchmark
              data. ArtificialAnalysis.ai recorded 241 tokens per second for Llama 2 70B on GroqCloud in January 2024 —
              the highest throughput measured across all tested inference providers at that time, when GPU alternatives
              delivered fewer than 50 tokens per second for the same model. By November 2024, GroqCloud achieved
              800-plus tokens per second for Llama 3.1 8B. Groq internally claims 1,000-plus tokens per second for
              open-source models in the 20-billion-parameter equivalent range. Time to first token (TTFT) on GroqCloud
              is approximately 50 milliseconds, best-in-class for latency-sensitive applications such as real-time AI
              agents and voice interfaces. Groq claims 20x inference speed advantage over the NVIDIA H100, but
              ArtificialAnalysis data from October 2025 shows Cerebras WSE-3 outperforming Groq for models with 70
              billion or more parameters, while Groq leads for the 7-to-70 billion parameter range. The primary
              structural technical risk is the SRAM architecture ceiling: on-chip SRAM is expensive per bit to scale,
              constraining the maximum model size that a single GroqCard can serve without distribution across multiple
              nodes. This creates an inverse relationship between the LPU speed advantage and model size — frontier
              models with 100B-plus parameters attract the most commercial interest but are exactly where Groq's
              advantage is weakest relative to Cerebras WSE-3 and GPU-based alternatives. Additional risks include
              supply chain concentration at Samsung's Taylor TX facility for Gen2 LPU wafers, the complete absence of
              public SOC 2 Type II or FedRAMP certifications limiting regulated enterprise procurement, and the low
              switching cost created by the OpenAI-compatible API — the same feature driving adoption also makes it
              trivial for customers to migrate to competing providers offering price or capability improvements.
            claimRefs:
              - CE008
              - CE009
              - CE010
              - CE011
              - CE012
              - CE013
