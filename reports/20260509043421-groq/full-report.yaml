chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Groq, Inc. is a vertically integrated AI hardware and inference company headquartered in Mountain View,
              California (Silicon Valley). Founded in 2016 by Jonathan Ross — one of the original designers of Google's
              Tensor Processing Unit (TPU) — and co-founder Douglas Wightman, Groq was purpose-built to solve the core
              bottleneck in AI deployment: inference latency. The company's flagship product, the Language Processing
              Unit (LPU), is an application-specific integrated circuit (ASIC) designed exclusively for AI inference,
              delivering deterministic, ultra-low-latency token generation that substantially outperforms GPU-based
              alternatives for many workloads. The LPU, originally named the Tensor Streaming Processor (TSP), employs
              an SRAM-centric, single-core architecture in which all execution is compiler-controlled rather than
              relying on traditional hardware scheduling mechanisms such as branch predictors or caches. Groq operates
              through two commercial channels: the GroqCloud API (a cloud-based inference service launched February 19,
              2024, priced as tokens-as-a-service) and on-premises LPU deployment for enterprise and government
              customers. GroqCloud is OpenAI-compatible, requiring minimal migration effort from existing
              infrastructure. The company's first-generation LPU chips are manufactured by GlobalFoundries on a 14 nm
              process; second-generation chips are being manufactured by Samsung Electronics on their 4 nm process node
              at the Taylor, Texas facility. By December 2025, Groq served more than 2.8 million developers and numerous
              Fortune 500 companies across data centers in North America, Europe, and the Middle East.
            claimRefs:
