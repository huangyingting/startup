      - number: '1.4'
        title: Adverse Signals and Key-Person Risk
        blocks:
          - type: paragraph
            body: >-
              Groq carries several material adverse signals that warrant diligence scrutiny. The most significant is the
              December 2025 departure of founder-CEO Jonathan Ross and President Sunny Madra to Nvidia as part of the
              licensing agreement. Ross was the company's chief technical visionary, public spokesperson, and primary
              sales evangelist for nearly a decade. The successor CEO Simon Edwards was appointed CFO less than three
              months before becoming CEO, with no public track record running a chip or cloud infrastructure company.
              Second, Groq nearly ran out of money in 2019, surviving by less than one month — a fact disclosed by Ross
              himself — suggesting the company's early risk management was precarious and its survival was partly
              opportunistic. Third, Groq's 2023 revenue was only $3.4 million against a net loss of $88 million, raising
              questions about whether post-ChatGPT revenue growth is durable or represents a window of opportunity that
              incumbents may close. Fourth, technical analysts note that the LPU's SRAM-based architecture is three
              orders of magnitude less memory-dense than GPU HBM, constraining viable model sizes and increasing
              hardware cost per card to approximately $20,000. A venture capitalist who declined to participate in the
              Series D described Groq's intellectual property as "not defensible in the long term," citing the risk that
              Nvidia or other incumbents could replicate the inference speed advantage. Lambda Cloud's CEO stated that
              their company had no plans to offer Groq chips, noting it remains "very hard to think beyond Nvidia" for
              cloud infrastructure. These concerns are partially offset by the Nvidia licensing validation, which itself
              confirms IP value.
            claimRefs:
              - CO021
              - CO038
              - CO039
              - CO040
              - CO041
