companyProfile:
  summary: >-
    Groq is a Mountain View–based AI inference infrastructure company that designs its own Language Processing Unit
    (LPU) chips for deterministic, ultra-low-latency token generation. Groq's LPU architecture eliminates DRAM
    bottlenecks via SRAM-centric design and static compilation, achieving industry-leading inference speeds for
    open-source models. The company operates GroqCloud, a developer API service with 2.8M+ registered users as of
    December 2025, and provides GroqRack on-premise hardware deployments for enterprises and governments.
  foundedDate: '2016-01-01'
  founders:
    - name: Jonathan Ross
      role: Co-founder and Chief Scientist (departed Dec 2025)
      background: Inventor of Google's original TPU; designed Groq's LPU architecture from first principles.
      claimRefs:
        - CO007
  foundingLocation: Mountain View, California, USA
  headquarters: Mountain View, California
