callouts:
  - id: CAL001
    type: risk
    title: SRAM Architecture Ceiling Limits Competitive Reach
    body: >-
      Groq's LPU SRAM-centric design is its primary speed advantage but also its most documented competitive constraint.
      Models exceeding approximately 70–80 billion parameters cannot be served efficiently on current LPU hardware
      without quantization, while Cerebras WSE-3 (40GB SRAM) and SambaNova SN40L (three-tier memory) handle larger
      models. As frontier model sizes grow beyond 100B parameters, Groq's competitive reach narrows unless its
      next-generation chip significantly expands on-chip memory capacity. Forbes analyst Karl Freund's warning that only
      one of the three custom ASIC startups may survive with 5% combined market share by 2030 underscores the urgency of
      resolving this constraint.
    claimRefs:
      - CP025
      - CP026
      - CP030
  - id: CAL002
    type: insight
    title: SambaNova's Distress Is Both a Warning and an Opportunity for Groq
    body: >-
      SambaNova Systems exploring a sale in October 2025 after failing to raise a new funding round signals that the
      capital intensity of custom-silicon AI inference is straining at least one of the three main ASIC startups. For
      Groq, this is simultaneously adverse (confirming that the category faces capital-raising difficulty) and
      opportunistic: SambaNova's federal and national-laboratory customer relationships (Oak Ridge, LLNL) could become
      available to Groq's GroqRack sales team if SambaNova's strategic future remains uncertain. Groq's $1.5B+ raised
      and the December 2025 Nvidia licensing deal capital provide a relative funding buffer, though the leadership
      transition introduces execution risk.
    claimRefs:
      - CP013
      - CP031
      - CP032
