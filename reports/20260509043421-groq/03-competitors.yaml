sections:
  - id: SP_S01
    title: Competitive Landscape Overview
    body: >-
      Groq competes in a landscape defined by three distinct competitive layers: custom-silicon AI inference
      specialists, GPU-cloud inference-as-a-service API providers, and the hyperscaler managed AI services that bundle
      inference into broader cloud platforms. Among custom-silicon peers, Cerebras Systems (WSE-3 chip) and SambaNova
      Systems (SN40L RDU) are the most directly comparable — each has built its own ASIC architecture, targets
      latency-sensitive and compute-intensive inference workloads, and competes for the same enterprise and
      national-laboratory customer segment that Groq pursues with GroqRack. Among API-first GPU-cloud providers,
      Together AI ($3.3B valuation, General Catalyst-led Series B, 450K+ developers) and Fireworks AI ($4B valuation,
      Sequoia-led Series C, $315M ARR) represent the most scaled alternatives with similarly open-model libraries and
      OpenAI-compatible APIs. Nvidia, as the incumbent, is simultaneously a supplier (via its CUDA ecosystem that all
      GPU inference players depend on), a licensing partner (December 2025 ~$20B deal with Groq), and a formidable
      downstream competitor via NIM inference microservices and Triton Inference Server deployed across every major
      cloud. AMD competes indirectly via MI300X GPU deployments and ROCm. The hyperscalers (AWS Inferentia 2, Google TPU
      v5, Azure Maia 100) build custom silicon primarily for internal cost optimization of their own AI APIs, not as
      standalone third-party IaaS products, but they capture the large majority of enterprise AI spend. Likely entrants
      include further VC-backed inference optimization startups and potential vertical ASIC plays from ARM-ecosystem
      chip designers targeting edge and on-premises deployments. The status quo for many buyers remains self-hosting
      open-source models on GPU clusters rented from AWS, Azure, or Google, which remains Groq's most common
      displacement target.
