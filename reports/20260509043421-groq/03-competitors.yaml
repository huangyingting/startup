  - id: SP_S04
    title: Moat Durability and Adverse Competitive Evidence
    body: >-
      Groq's primary moat claim is architectural: the LPU's deterministic, SRAM-centric design yields latency and power
      efficiency advantages that Nvidia GPUs cannot easily replicate without abandoning the CUDA general-purpose
      execution model. However, this moat faces four structural threats. First, Nvidia's Blackwell B200 GPU includes
      inference-optimized memory configurations and NIM microservices that close the latency gap for batch inference use
      cases. Barclays estimates that non-Nvidia silicon will capture only around 10–15% of the inference accelerator
      market by 2030, while Nvidia holds 50%+ long-term. Second, the SRAM headroom constraint is a documented
      limitation: Groq's current chips cannot cost-effectively serve models larger than approximately 70–80B parameters
      at scale without quantization, which limits competitive reach as frontier model sizes grow to 100B–1T+ parameters.
      Third, Forbes analyst Karl Freund wrote in October 2025 that "there could be room for only one of the three custom
      ASIC startups to survive" if combined custom-ASIC market share reaches only 5% by 2030 — a direct adverse signal
      for Groq, Cerebras, and SambaNova. Fourth, SambaNova's October 2025 exploration of a sale after failing to raise a
      new round is a leading indicator of capital-raising difficulty across the custom-silicon inference category. On
      lock-in, Groq benefits from minimal switching cost for developers (OpenAI-compatible API), which is simultaneously
      a distribution advantage and a retention risk — developers can switch to Together AI or Fireworks with a single
      endpoint change. On supply and partner access, Groq's Samsung 4nm manufacturing agreement and GlobalFoundries 14nm
      history provide some supply security, but all custom-silicon players face multi-year fab lead times and capital
      intensity for next-generation chip generations. The December 2025 Nvidia licensing deal (approximately $20B) and
      departure of founder Jonathan Ross and President Sunny Madra to Nvidia represent both a capital injection and an
      adverse signal about Groq's ability to retain its core founding leadership in a standalone capacity.
