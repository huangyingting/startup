  - id: SP_S02
    title: Competitor Profiles — Scale, Funding, and Strategy
    body: >-
      Cerebras Systems (founded 2016, Menlo Park CA; CEO Andrew Feldman) has built the world's largest chip — the Wafer
      Scale Engine 3 (WSE-3) with 900,000 AI cores, 40GB on-chip SRAM, and manufactured on TSMC 3nm. Cerebras closed a
      $1.1B Series G in September 2025 at an $8.1B valuation, with customers including AWS, Meta, IBM, Mistral, DOE,
      GSK, and Mayo Clinic. Cerebras claims 20x faster throughput than Nvidia GPUs for large models and reports 5M+
      monthly requests on Hugging Face. Cerebras supports both training and inference, giving it a broader addressable
      market than Groq's inference-only LPU, and its enterprise-first sales motion targets national labs and
      regulated-sector buyers. SambaNova Systems (founded 2017, Palo Alto CA; CEO Rodrigo Liang) built the SN40L chip on
      a reconfigurable dataflow unit (RDU) architecture with a three-tier memory hierarchy (SRAM + HBM + DRAM).
      SambaNova raised $2.17B total but was reported in October 2025 to be exploring a sale after failing to raise a new
      funding round — a significant signal of market stress for the custom-silicon inference category. SambaNova's
      customers include Oak Ridge National Laboratory, Lawrence Livermore National Laboratory (LLNL), OTP Bank, and
      Saudi Aramco. Together AI (founded 2022; CEO Vipul Ved Prakash) closed a $305M Series B in February 2025 led by
      General Catalyst at a $3.3B valuation and serves 450K+ developers with 200+ open-source models. Together uses
      Nvidia Blackwell GPUs and the FlashAttention-3 kernel, combining training, fine-tuning, and inference. Fireworks
      AI ($4B valuation; $315M ARR by early 2026; $250M Series C led by Sequoia with NVIDIA and AMD participating)
      serves Uber, Shopify, GitLab, Notion, and DoorDash, processing 10T+ tokens per day via its FireAttention custom
      CUDA stack. Nvidia ($130B+ annual revenue; 80–90% AI accelerator market share) is the defining incumbent, with
      Blackwell GPU (B200) inference-optimized variants now shipping and NIM microservices providing turnkey inference
      orchestration on top of the dominant CUDA software stack.
