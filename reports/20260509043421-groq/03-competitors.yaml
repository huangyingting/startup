  - id: SP_S03
    title: Capability Comparison — Pricing, GTM, and Trust
    body: >-
      On per-token pricing, Groq's GroqCloud API is positioned at approximately $0.75 per million input tokens and $0.99
      per million output tokens for DeepSeek-R1 class models — roughly 4–8x cheaper than Together AI ($3.00/$7.00 per
      million) and Fireworks AI ($3.00/$8.00 per million). However, Groq's SRAM-centric architecture limits supported
      model sizes: models exceeding the on-chip SRAM capacity (approximately 70B–80B parameters for current LPU
      generations) cannot run on GroqCloud without model quantization or partitioning, whereas GPU-based providers can
      run any model that fits within GPU VRAM, including 405B+ parameter models. Cerebras outperforms Groq on raw
      tokens-per-second throughput for very large models (e.g., Llama 3.1 405B) per Artificial Analysis benchmarks,
      while Groq maintains the lead for mid-size models (Llama 3.1 70B and below). On GTM, Groq's developer-led motion
      (GroqCloud free tier; 2.8M+ developer signups; OpenAI-compatible API) mirrors Together AI's developer-first
      approach. Fireworks AI has focused more aggressively on enterprise sales and production SLAs, evidenced by its
      $315M ARR. Groq lacks publicly disclosed SOC 2 Type II, FedRAMP, or HIPAA BAA certifications, which constrains
      enterprise and government procurement. Cerebras and SambaNova have deeper federal relationships (DOE, DOD,
      national labs) than GroqCloud. Distribution for all non-hyperscaler inference providers is primarily direct or
      developer-community-led; none have established meaningful channel-reseller programs. GPU-cloud providers can list
      on AWS, Azure, and GCP marketplace while Groq's custom silicon is not natively available through hyperscaler
      marketplaces as a managed offering.
