      - number: '3.2'
        title: 竞争对手画像——规模、融资与战略
        blocks:
          - type: paragraph
            body: >-
              Cerebras Systems（2016 年创立，Menlo Park CA；CEO Andrew Feldman）打造了世界上最大的芯片 Wafer Scale Engine 3（WSE-3），拥有
              900,000 个 AI 核心、40GB 片上 SRAM，并由 TSMC 3nm 制造。Cerebras 2025 年 9 月完成 $1.1B Series G，估值 $8.1B，客户包括
              AWS、Meta、IBM、Mistral、DOE、GSK 和 Mayo Clinic。Cerebras 称其大模型吞吐比 Nvidia GPUs 快 20x，并报告 Hugging Face 月请求量
              5M+。Cerebras 同时支持训练和推理，可寻址市场比 Groq 仅推理的 LPU 更宽，且企业优先销售动作瞄准国家实验室和受监管行业买方。SambaNova Systems（2017 年创立，Palo
              Alto CA；CEO Rodrigo Liang）基于可重构数据流单元（RDU）架构打造 SN40L 芯片，采用三级内存层级（SRAM + HBM + DRAM）。SambaNova 累计融资
              $2.17B，但据 2025 年 10 月报道，在未能完成新一轮融资后正探索出售——这是定制硅推理品类承压的重要信号。SambaNova 客户包括 Oak Ridge National
              Laboratory、Lawrence Livermore National Laboratory（LLNL）、OTP Bank 和 Saudi Aramco。Together AI（2022 年创立；CEO
              Vipul Ved Prakash）于 2025 年 2 月完成 General Catalyst 领投的 $305M Series B，估值 $3.3B，并用 200+ 开源模型服务 450K+
              开发者。Together 使用 Nvidia Blackwell GPUs 和 FlashAttention-3 内核，覆盖训练、微调和推理。Fireworks AI（$4B 估值；2026 年初 $315M
              ARR；Sequoia 领投 $250M Series C，NVIDIA 和 AMD 参投）服务 Uber、Shopify、 GitLab、Notion 和 DoorDash，通过自研 FireAttention
              CUDA 栈每天处理 10T+ tokens。Nvidia（年收入 $130B+；AI 加速器市场份额 80–90%）定义了现有格局，Blackwell GPU（B200）的推理优化版本已开始出货，NIM
              微服务在主导性的 CUDA 软件栈之上提供即用型推理编排。
