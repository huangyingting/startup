  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: LPU 架构与技术创新
        blocks:
          - type: paragraph
            body: >-
              Groq 的 Language Processing Unit（LPU）是一款专用集成电路（ASIC），专为 AI 推理而非训练设计。LPU 的基础架构洞察是：基于 GPU 的推理， 瓶颈不是计算
              FLOPS，而是内存带宽——每次 token 生成步骤之间从 DRAM 加载模型权重，造成 GPU 无法消除的延迟。Groq 的方案是以 SRAM 为中心的设计，把整个模型计算图映射到片上 SRAM，消除每个
              token 的 DRAM 读取周期。LPU 是单核架构，没有缓存层级、没有分支预测，也没有推测执行。取而代之，GroqFlow
              编译器在编译时静态调度每个操作——这是一种「kernel-free」执行模型，整个模型执行路径在硬件运行前就完全确定。由此得到确定性延迟：任何给定模型配置，无论 batch size
              或并发请求负载如何，都始终产生相同的 time-per-token；GPU 架构无法复制这一属性，因为其动态调度器天然引入波动。第一代 LPU 由 GlobalFoundries 14nm 制程制造，拥有 230
              million 个晶体管，提供 900 GB/s 片上内存带宽。第二代 LPU 由 Samsung Texas Taylor 工厂以 4nm 制程制造，于 2025
              年投产，晶体管密度和吞吐提升，但详细规格仍未披露。GroqCards（PCIe 加速卡）组装为 GroqNodes 和 GroqRacks；后者是 9U 机架单元，包含 8 个 GroqNodes（64 张
              GroqCards），聚合提供约 5.6 TFLOPS FP16。Groq 于 2022 年 3 月收购 Maxeler Technologies，将基于 FPGA 的数据流计算专长和 HPC
              知识产权纳入架构基础。
