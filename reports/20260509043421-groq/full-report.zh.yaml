  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 因素
      - 方向
      - 时点
      - 对 Groq 的影响
      - 尽调问题
    rows:
      - - 生成式 AI 采用激增（ChatGPT、企业 Copilot）
        - 驱动
        - 当前
        - 推高整体推理需求；每位用户的 API 调用更多
        - 跟踪 GroqCloud token 用量的环比增长
      - - 推理成本每年下降约 10x
        - 驱动
        - 持续
        - 降价扩大需求，但压缩单 token 收入
        - 问 Groq：价格下行时毛利率走势
      - - 推理型模型每次查询需要更多算力
        - 驱动
        - 当前 / 近期
        - 单次会话平均推理成本更高；利好专用硬件
        - 核验 GroqCloud 工作负载组合：标准模型与推理型模型
      - - 超大规模云厂商 AI 资本开支 $197B→$234B（2024→2025）
        - 驱动
        - 当前
        - 扩大基础设施市场，但超大规模云厂商也争夺同一批开发者
        - 按季度跟踪 AWS Bedrock / Azure OpenAI 定价与 Groq 定价
      - - Barclays：到 2026 年，推理资本开支将超过训练资本开支
        - 驱动
        - 近期（12–18 个月）
        - 结构性抬升推理市场；如果 CUDA 护城河被削弱，自研芯片受益
        - 观察 Nvidia H200/B200 推理效率提升
      - - CUDA 生态锁定
        - 约束
        - 持续
        - 开发者切换成本高；Groq 靠免费层低摩擦入口获客
        - 监测无 CUDA 开发者采用曲线；Groq 的 SDK 覆盖广度
      - - LPU 的 SRAM 模型尺寸上限
        - 约束
        - 当前
        - 没有多芯片时，Groq 无法服务最大模型（>70B 参数）；市场宽度受限
        - 问 Groq：LPU v2 支持的模型尺寸；400B+ 模型路线图
      - - 规模化能耗
        - 约束
        - 正在显现（1–3 年）
        - 电力成本限制数据中心建设；LPU 效率可能成为优势
        - 对比满负载规模下 LPU 与 H100 的 tokens/watt
      - - 企业监管 / 合规不确定性
        - 约束
        - 持续
        - 企业客户需要 FedRAMP、HIPAA、SOC2 认证；Groq 状态不明
        - 核验 Groq 当前合规认证（SOC2、ISO 27001）
      - - 推理 IaaS 提供商普遍价格压缩
        - 约束
        - 持续
        - 单 token 收入下降；需要用量增长来维持绝对收入
        - 测算降价 50% 与用量增长 3x 下的收入敏感性
    notes: 时点分类：当前 = 2025-2026 年活跃；近期 = 12-24 个月；正在显现 = 2-4 年。SRAM 模型尺寸上限是 Groq LPU v1/v2 架构特有约束。Groq 的监管合规状态未能从公开来源独立核验。
