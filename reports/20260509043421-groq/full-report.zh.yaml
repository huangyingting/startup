      - number: '1.2'
        title: 创始团队与领导层
        blocks:
          - type: paragraph
            body: >-
              Groq 由 Jonathan Ross 牵头创立。他在 Google 共同发明 Tensor Processing Unit（TPU），这是历史上最有影响力的 AI 加速架构之一。Ross 从创立起担任
              CEO，直到 2025 年 12 月转往 Nvidia，交易背景是一项非排他授权协议。联合创始人 Douglas Wightman（ex-Google X）曾任公司首任
              CEO，后离任；离任情况未公开披露。Ross 之后的领导团队包括 Simon Edwards：他 2025 年 9 月被任命为 CFO，2025 年 12 月接任 CEO。Stuart Pann（Intel 与
              HP 前高管）于 2024 年 8 月加入，出任 COO，负责扩张运营。国际业务总裁 Mohsen Moazami 曾任 Cisco 高管，负责全球商业拓展，包括 $1.5 billion 沙特阿拉伯项目。Ian
              Andrews 担任首席收入官，并出席 2025 年 12 月 White House Genesis Mission 活动。Chelsey Susin Kantor 是首席营销官。2024 年 8 月，Meta
              首席 AI 科学家 Yann LeCun 加入担任技术顾问；他是 Turing Award 得主，也曾是 Jonathan Ross 在 NYU 的计算机科学教授。Groq
              董事会构成未公开披露，对尽调构成重大治理缺口。关键人风险上升：公司在同一事件中失去创始人 CEO 和总裁，而继任 CEO 没有公开的半导体或云基础设施公司管理履历。
