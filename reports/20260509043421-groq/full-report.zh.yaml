      - number: '2.2'
        title: 市场规模——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >-
              AI 推理可寻址市场很大且快速增长，但估算会随范围和方法大幅波动。Grand View Research 估计 2024 年全球 AI 推理市场为 $97.24 billion，并预测 2030 年达到
              $253.75 billion（17.5% CAGR）。MarketsandMarkets 将 2025 年市场估为 $106.15 billion，2030 年预测 $254.98 billion（19.2%
              CAGR）。Fortune Business Insights 估计 2025 年为 $103.73 billion，到 2034 年增至 $312.64 billion（12.98%
              CAGR）。这些宽口径数字包括 AI 推理硬件（GPU/ASIC 采购）、云 AI 服务和企业软件，范围显著大于 Groq 直接可寻址市场。Groq 的可服务市场（SAM）是云端 AI 推理即服务 子赛道：API
              优先、托管的大规模 LLM 推理。按云服务与硬件收入拆分估计，该子赛道约占大市场 10–20%，对应 2025 年 SAM 为 $10–20 billion。Groq 2025 年估计收入约 $500
              million（第三方估计）意味着其在该推理 IaaS 层约有 3–5% SAM 份额。Groq 的可获取市场（SOM）进一步被限制在需要超低延迟和确定性吞吐的用例：实时 AI
              智能体、语音应用、金融欺诈检测和交互式开发者工具，2025 年这一子赛道估计为 $2–5 billion。投资者测算 Groq 机会规模时，必须对宽口径市场预测作适当折扣。
            claimRefs: []
