      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Groq 的 Language Processing Unit 架构围绕片上 SRAM 而非 HBM 设计，靠消除内存带宽瓶颈来拉满推理吞吐。 但这个结构性选择也叠加了运营风险。第一，SRAM 每 byte
              成本是 HBM/DRAM 的 2–4×，限制单节点模型规模； Llama 3 405B 需要多节点 LPU 分布，增加节点间延迟和协同复杂度。第二，LPU Gen2 生产完全来自 Samsung 位于 Texas
              Taylor 的 4nm 工厂，是单一晶圆厂依赖。Samsung 4nm 节点在全球遇到过良率挑战； Semi Analysis 明确记录了 Taylor 工厂的这些良率问题。任何持续良率不足都会延迟
              HUMAIN 部署里程碑，并压缩可用利润率。 第三，Groq 的静态编译方法在构建时把模型图转换为执行计划——这提升了硬件效率，但相比 Nvidia CUDA 的零日兼容性， 新模型架构（Mamba
              状态空间、新注意力变体）支持可能滞后数月。第四，Nvidia 的 Blackwell GPU 家族 （H200 和 B200）在 transformer 工作负载上的推理吞吐达到 H100 的约
              2.4×，大幅缩小了 Groq 在 tokens/sec 上的差异。第五，横跨北美、欧洲和沙特阿拉伯的数据中心运营带来分布式基础设施可靠性风险—— 停电、托管服务商故障、网络中断都可能影响 GroqCloud
              SLA 承诺。第六，Groq 的模型目录完全依赖开源提供方； 如果 Meta 收紧 Llama 授权条款，或 Mistral 关闭模型权重，Groq 模型目录会在没有自研替代方案的情况下实质收缩。
