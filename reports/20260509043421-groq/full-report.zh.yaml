      - number: '4.4'
        title: 资本充足性、烧钱速度与盈利路径
        blocks:
          - type: paragraph
            body: >-
              Groq 已通过六轮股权融资累计约 $2.1B，最近一轮是 $750M Series E（2025 年 9 月，$6.9B 估值，由 Disruptive 领投，BlackRock、Cisco、Samsung 和
              01 Advisors 参投）。此外，2025 年 2 月沙特阿拉伯 HUMAIN 的 $1.5B 承诺提供基础设施收入，降低净 CAPEX 负担。Series E 之后，按 2024 年每年 $150–200M
              burn 估计，现金跑道为 18–24 个月。管理层称目标是在 2026 年实现现金流转正。如果 HUMAIN 交易按披露执行，将显著改善现金状况，并降低 2026–2027
              年追加股权融资需求。不过，HUMAIN 承诺是分阶段收入合同，不是预付现金：如果部署里程碑延误，实际收到现金可能显著低于名义 $1.5B。相较 纯软件 AI 公司，Groq 资本密集度高，但这对其
              LPU-first 模式是结构性必要。Nvidia 授权交易（2025 年 12 月）估值约 ~$20B，但结构是授权协议，不是直接现金注入。更大的财务风险在于，Groq 必须在下一次股权融资（大概率
              2026–2027 年）之前实现收入规模和利润率扩张，同时守住相对资本雄厚的 GPU 云现有巨头的速度优势。公司未发布经审计财务报表；所有收入和 burn 数字均为第三方估计。重大尽调应包括：经审计
              P&L、HUMAIN 合同条款、LPU 利用率和企业队列 NRR。
