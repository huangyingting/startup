            body: >-
              按买方类型、收入区间和部署模式划分，Groq 的客户群可分为四类。企业客户（估计合同价值每年超过 $100,000）约占客户账户的 25%，却贡献约 70%
              的总收入。企业买方主要是技术密集型公司、政府机构和研究机构中的 AI 工程负责人及 CTO 级高管；他们需要 GPU 云厂商无法保证的确定性延迟 SLA。成长型公司客户 （估计每年
              $10,000–$100,000）约占账户的 35%、收入的 25%；这一层更偏 AI 原生初创公司， 他们在构建语音 AI、代码助手、游戏智能等实时应用，Groq 的吞吐优势具备商业意义。开发者自助客户
              （每年低于 $10,000，含免费层用户）约占账户的 40%，但只贡献约 5% 的收入——基数很大，变现较轻， 主要价值在于漏斗顶部线索和生态信号。按垂直行业看，Groq
              的具名客户标识覆盖赛车运动（McLaren F1）、 金融服务（Paytm）、电信（Bell Canada、Government of India DoT）、能源与大宗商品 （Saudi Aramco
              HUMAIN）、高能物理（CERN）、国家实验室计算（US DOE / Argonne）以及企业软件 （IBM、通过伙伴集成的 Salesforce）。按地域看，GroqCloud
              开发者基础是全球性的，已记录的集中区域包括美国、 印度（Paytm、DoT）、欧洲（CERN）和海湾合作委员会地区（HUMAIN）。收入地域分布没有公开，是一个尽调缺口； 如果 HUMAIN 承诺在
