  - id: FV001
    title: 建议逻辑
    type: flow
    layout: standard
    summary: 从市场机会、产品验证、客户牵引、估值背景和风险因素一路推到最终的观察建议，并在每个节点标出击穿投资逻辑的触发条件。
    data:
      nodes:
        - id: market
          label: 市场机会
          detail: 2025 年 AI 推理总可用市场（TAM）为 $97–128B；2030 年达 $254–313B。Groq 可服务市场（SAM）：$10–20B。
          type: input
          tone: positive
        - id: product
          label: 产品验证：LPU 速度
          detail: 70B 模型上 750+ tokens/sec；达到 GPU 云速度的 10–14×。经 ArtificialAnalysis 基准验证。
          type: process
          tone: positive
        - id: traction
          label: 客户牵引：2.8M 开发者 + HUMAIN
          detail: 2.8M 开发者；HUMAIN 承诺 $1.5B；企业客户包括 McLaren、Paytm、DOE Argonne。
          type: process
          tone: positive
        - id: valuation
          label: 估值：$6.9B，2025E P/S 13.8×
          detail: 2025 年 9 月 Series E。与 AI 推理同行中位数持平。13 个月内从 $2.8B 增长 146%。
