  - id: TV004
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 投资逻辑（乐观 / 基准）
      - 反向逻辑（悲观）
      - 会改变判断的证据
    rows:
      - - 推理速度护城河
        - LPU 带来 10–14× 速度优势，让公司能对延迟敏感型负载收取溢价，并把开发者锁在平台内
        - Nvidia Blackwell B200 吞吐量达到 H100 的 2.4×，到 2026 年即便没有新一代 LPU，也会把 Groq 的速度差距砍半
        - LPU Gen3 在 70B+ 模型上维持 >5× 速度优势，并有确认过的基准数据支撑
      - - 开发者生态
        - 2.8M 注册开发者形成复利漏斗；22 个月增长 40×，说明产品市场匹配已跑通
        - OpenAI 兼容 API 意味着切换成本为零；开发者可无惩罚迁移到更便宜的 GPU 云替代方案
        - 企业 NRR >150% 经队列数据确认，证明平台有粘性
      - - 收入增长轨迹
        - 500% 同比收入增长（2024→2025）支撑 13.8× P/S；CEO 确认 2025 年 $500M ARR 目标
        - 大宗化推理 ASP 压缩迫使降价，2026 年收入增长被压到 30% 以下
        - 经确认的 2025 年审计收入 $450M+，并在 2026 年持续 >30% QoQ 增长
      - - HUMAIN 交易价值
        - $1.5B 分阶段基础设施收入承诺带来政府 AI 顺风，并给出多年收入可见度
        - BIS 出口管制阻止 LPU 发往沙特阿拉伯；无约束力意向书 = 没有实际收入
        - 有约束力采购订单和首批 LPU 交付里程碑已确认；BIS 为沙特部署发放出口许可
      - - 退出可选性
        - 鉴于增长轨迹，2027 年以 $15–25B IPO，或以 $10–14B 被战略方收购（Cisco/Samsung/IBM）具备可信度
        - 下调估值轮、以 <$7B 困境出售，或因收入不达预期 / 监管事件撤回 IPO；Series E 投资者亏损
        - IPO 申报已提交，确认 ARR $450M+ 且财务已审计；两家或更多战略方表达 M&A 兴趣
      - - 估值倍数
        - 13.8× 2025E P/S 与 AI 推理同业中位数一致，相对基准情景内在价值有 15–40% 折价
        - 76× 2024 年追踪 P/S 且缺少审计财务，让当前 $6.9B 估值带有投机性
        - 2025 年审计收入达到 $450M+，把追踪倍数降至 <20×，并验证当前估值进入点
