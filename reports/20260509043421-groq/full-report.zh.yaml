  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流与定价架构
        blocks:
          - type: paragraph
            body: >-
              Groq 通过三条主要收入流变现：（1）GroqCloud 按 token 计费的 API 访问，（2）带专用容量的企业 API 合同，（3）基础设施合作，其中最重要的是来自 沙特阿拉伯王国的 $1.5B
              HUMAIN 承诺。早期本地 GroqRack 硬件业务已经存在，但定价和收入贡献未公开披露。GroqCloud 是最可见、最可衡量的收入流，按每 token 付费模式运行，公开挂牌价格包括：Llama 3.1
              70B 每 1M 输入 token $0.59、每 1M 输出 token $0.79，以及 Llama 3.1 8B 等较小模型每 1M 输入 token $0.05。该定价让 Groq 低于高端 GPU 云
              API，具备竞争力。据公司称，企业合同起价为每年 $500,000，提供专用 LPU 容量和服务等级协议，但实际平均售价和合同数量未披露。HUMAIN
              交易被设计为分阶段基础设施收入，而不是股权——也就是说，收入随容量部署确认，而非预付。确认时点和拨付排期是现金流建模的关键未知数。开发者
              API、企业和基础设施之间的收入组合未公开拆分，缺少资料室数据就无法评估集中风险或按细分的利润率贡献。Groq 的收入模型受益于 OpenAI API 兼容性，大幅降低开发者切换摩擦。
