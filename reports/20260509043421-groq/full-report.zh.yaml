      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Groq 在 2017 年至 2025 年 9 月期间，跨六轮披露股权融资约 $1.5 billion；另有 2025 年 2 月宣布的沙特阿拉伯王国 $1.5 billion 基础设施承诺。公司 2017
              年获得由 Social Capital（Chamath Palihapitiya）领投的 $10 million 种子轮，2018 年又取得额外早期资本。2021 年 4 月，由 Tiger Global
              Management 和 D1 Capital Partners 领投的 $300 million Series C 将 Groq 推入独角兽，估值超过 $1 billion。2024 年 8 月 Series
              D（$640M，估值 $2.8B，由 BlackRock Private Equity Partners 领投）引入战略投资方 Samsung Catalyst Fund（LPU v2 半导体制造商）和
              Cisco Investments（与 Groq 的 Bell Canada 和企业电信布局一致）。Morgan Stanley 担任独家配售代理。2025 年 9 月 Series E（$750M，估值
              $6.9B）由 Disruptive 领投；这家 Dallas 成长基金在单轮中投入近 $350 million，BlackRock、 Samsung、Cisco、D1、Altimeter、1789
              Capital 和 Infinitum 继续参投。2025 年 12 月，Nvidia 同意授权 Groq 的推理技术，交易估值约 $20 billion；Groq 称该交易为非排他授权安排。据报道，Groq
              2023 年收入为 $3.4 million，净亏损 $88 million；2025 年估计收入 $500 million 体现出 ChatGPT 之后的急剧加速，但准确数字尚未经独立审计。
