  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Groq 的竞争格局由三层构成：定制硅 AI 推理专家、GPU 云推理即服务 API 提供商，以及把推理捆绑进更广云平台的超大规模云厂商托管 AI 服务。在定制硅同行中，Cerebras
              Systems（WSE-3 chip）和 SambaNova Systems（SN40L RDU）最可比——二者都自建 ASIC 架构，瞄准延迟敏感和计算密集型推理工作负载，并争夺 Groq 通过
              GroqRack 追求的同一类企业和国家实验室客户。在 API 优先的 GPU 云供应商中，Together AI（$3.3B 估值，General Catalyst 领投 Series B，450K+
              开发者）和 Fireworks AI（$4B 估值，Sequoia 领投 Series C，$315M ARR）是最具规模的替代方案，同样拥有开放模型库和兼容 OpenAI 的 API。Nvidia
              作为现有巨头，同时是供应商（所有 GPU 推理玩家都依赖其 CUDA 生态）、授权伙伴（2025 年 12 月与 Groq 的 ~$20B 交易）以及强大的下游竞争者，NIM 推理微服务和 Triton
              Inference Server 已部署到每个主要云平台。AMD 通过 MI300X GPU 部署和 ROCm 间接竞争。超大规模云厂商（AWS Inferentia 2、Google TPU v5、Azure
              Maia 100）打造定制硅主要是为了优化自家 AI API 内部成本，而不是作为独立第三方 IaaS 产品，但它们捕获了绝大多数企业 AI 支出。潜在进入者包括更多 VC 支持的推理优化初创公司，以及 ARM
              生态芯片设计商针对边缘和本地部署推出的垂直 ASIC。许多买方的现状仍是在从 AWS、Azure 或 Google 租来的 GPU 集群上自托管开源模型，这也是 Groq 最常替代的目标。
