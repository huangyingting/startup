      - number: '7.4'
        title: 财务、人员与治理风险
        blocks:
          - type: paragraph
            body: >-
              Groq 的财务风险画像是资本强度高、烧钱加速、缺少公开审计财务、收入极度集中于单一主权承诺。估计 2024 年运营烧钱 $150–200M，收入约 $90M——这意味着 HUMAIN
              之前经营杠杆为负。Samsung 4nm LPU Gen2 资本开支 估计每年 $50–100M；数据中心运营增加 $30–60M；工程人员增加 $60–80M。即便 2025 年 9 月 Series E 融到
              $750M，且有 $1.5B HUMAIN 承诺，以当前烧钱速度测算，在 HUMAIN 收入实质抵消部署成本前，现金跑道估计只有 18–24 个月。Series E $6.9B 估值意味着投资人预期 2–3 年内
              IPO，这给收入增长和毛利率扩张施加了压缩时间线下的执行压力。 管理层公开目标是在 2026 年实现现金流为正，但这个目标取决于 HUMAIN 收入兑现，而 HUMAIN 本身又受出口管制和地缘政治风险影响。
              所有财务数字都是第三方分析师估计；公司没有发布经审计的 GAAP 报表。人员和治理风险在 2025 年 12 月集中暴露： 创始人 Jonathan Ross（Google TPU 发明者、LPU 架构师）作为
              IP 交叉许可安排的一部分离职加入 Nvidia； CEO Sunny Madra 同时离职加入 Nvidia；Simon Edwards 成为 CEO——这是他的首个 CEO 职位——且正值关键运营阶段。
              LPU 编译器团队规模小、专业化程度高，对 Nvidia 和超大规模云厂商招聘极具吸引力。董事会结构高度受 VC 控制， 缺少在 ASIC 量产层面扩张过 AI 硬件公司的运营型高管代表。
