            title: 价格压缩——每 token 收入长期下行
            body: >-
              AI 推理价格约每 12 个月下降 ~10x（Sam Altman，2025 年 2 月）。Groq 一部分竞争力来自相对 GPU 供应商的 性价比，这构成结构性逆风：token 量增长时，每 token
              收入也在流失。如果 Groq 2025 年估计 $500M 收入基于 $0.75/1M 输入 token，那么 10x 降价仅为维持收入就需要 10x
              用量增长。公司必须证明用量增长显著跑赢价格压缩，才能维持增长轨迹。
            calloutType: risk
            claimRefs:
              - CM015
              - CM016
              - CM019
              - CM020
              - CM021
          - type: callout
            title: 推理超过训练——有利于 Groq 架构的结构性市场迁移
            body: >-
              Morgan Stanley 估计未来几年数据中心算力需求中 >75% 将用于推理。Barclays 估计前沿 AI 的推理资本开支到 2026 年将超过训练资本开支，达到 ~$208B。Nvidia
              自身预测替代方案长期会拿到 50% 推理市场份额，意味着非 Nvidia 推理硅片支出约 ~$200B。Groq 的 LPU 正是为这一转变设计。关键风险在于，Nvidia 的 Blackwell
              芯片（面向推理优化）和超大规模云厂商自研硅片（Google TPU、AWS Inferentia、Microsoft Maia）是否会在 Groq 这类专业云 IaaS 提供商规模化之前，吸走大部分迁移红利。
