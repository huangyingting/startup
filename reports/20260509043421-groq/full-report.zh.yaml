      - number: '8.3'
        title: DCF 情景分析与估值区间
        blocks:
          - type: paragraph
            body: >-
              三情景 DCF 构成估值建议的分析骨架。所有情景都采用 30% 折现率，适用于一家收入确定性尚未建立、IPO 前、 缺少审计财务且有重大监管敞口的硬件 / 云公司。乐观情景（30% 概率）：收入从 2025 年
              $500M 增至 2030 年 $5B，CAGR 60%，由 HUMAIN 执行、Gen3 LPU 速度刷新、智能体 AI 工作负载扩张驱动。 随着 SRAM 成本随规模下降、软件层开始变现，2030
              年毛利率达到 60%。按 20× EV/Revenue 计算终值为 $100B。以 30% 折现到现在：隐含当前估值 $18–25B。按 $6.9B 入场，Series E 投资人可获得 2.6–3.6×。
              基准情景（50% 概率）：收入从 2025 年 $500M 增至 2030 年 $2.5B，CAGR 38%。随着利用率改善， 毛利率扩至 45%。按 12× EV/Revenue 计算终值为
              $30B。折现到现在：隐含当前估值 $8–12B。 Series E 的 $6.9B 对基准情景内在价值有适度 15–40% 折价——若执行到位具吸引力，但容错空间有限。 悲观情景（20% 概率）：随着
              Nvidia Blackwell 追平速度差距、超大规模云厂商部署自研 ASIC （AWS Trainium3、Google TPU v7）、HUMAIN 因 BIS 出口管制而放款停滞，2030 年收入放缓至
              $800M（14% CAGR）。2030 年毛利率为 30%。按 6× EV/Revenue 计算终值为 $4.8B。折现到现在： 隐含当前价值 $2–3B。按 $6.9B 估值看，该情景下当前估值高估
              2–3×。跨情景概率加权内在价值约 $9.5–12B——这意味着 Series E 定价相对预期内在价值有明显折价，但前提是基准或乐观情景能够执行。
