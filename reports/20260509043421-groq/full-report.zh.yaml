      - number: '1.4'
        title: 反向信号与关键人风险
        blocks:
          - type: paragraph
            body: >-
              Groq 有多项重大反向信号，需要尽调重点审视。最大的是 2025 年 12 月创始人兼 CEO Jonathan Ross 和总裁 Sunny Madra 因授权协议转往 Nvidia。近十年里，Ross
              既是公司的核心技术愿景人物、公共发言人，也是主要销售布道者。继任 CEO Simon Edwards 在接任 CEO 前不到三个月才被任命为 CFO，且没有公开的芯片或云基础设施公司管理履历。第二，Groq
              2019 年几乎现金耗尽，撑过来的余地不到一个月——Ross 本人披露了这一事实——说明公司早期风险管理脆弱，能活下来也部分靠机会窗口。第三，Groq 2023 年收入仅 $3.4 million，净亏损 $88
              million，令人质疑 ChatGPT 之后的收入增长究竟可持续，还是只是现有巨头可能很快关闭的窗口。第四，技术分析师指出，LPU 的 SRAM 架构内存密度比 GPU HBM
              低三个数量级，限制可运行模型规模，并把单卡硬件成本推高到约 $20,000。一位拒绝参与 Series D 的风险投资人称 Groq 知识产权「长期看不可防御」，理由是 Nvidia
              或其他现有巨头可能复制其推理速度优势。Lambda Cloud CEO 表示其公司没有计划提供 Groq 芯片，并指出云基础设施领域「很难跳出 Nvidia 来思考」。Nvidia
              授权交易带来的验证部分抵消了这些担忧；该交易本身确认了 IP 价值。
