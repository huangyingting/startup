      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Groq 竞争的市场由 Nvidia CUDA 生态主导——它领先 10 年，拥有数百万受训开发者，并深度集成进每家主要云厂商。 Groq 没有同等的自有开发者平台。超大规模云厂商威胁是结构性的：AWS
              Trainium2 和 Inferentia3、 Google TPU v6、Microsoft Azure Maia 2 都是专为 AI 推理打造的 ASIC，背后公司资本开支预算几乎不受约束， 明确瞄准
              Groq 所服务的第三方推理市场。随着这些芯片成熟，超大规模云厂商会把企业 AI 推理转回自家体系， 压缩 Groq 的总可用市场。Cerebras
              在大模型推理上构成直接竞争威胁：ArtificialAnalysis 2025 年 10 月基准显示， Cerebras 在 70B+ 参数模型上超过 Groq。企业 AI 工作负载中越来越多运行
              70B–405B 前沿模型， 对这部分需求而言，Cerebras 是性能更优的替代方案。GPU 推理平台——Together AI、Fireworks AI、Replicate—— 提供数百个模型，而 Groq
              是精选目录；这会吸引更看重广度而非峰值速度的开发者。HUMAIN 主权合同带来的收入集中度极高： 仅 HUMAIN 就可能支撑 Groq 2025
              年收入逻辑的大部分。若因出口管制、政治关系恶化或里程碑失败而失去该合同， 后果将是灾难性的。关键客户集中还包括 DOE（Argonne）、McLaren F1、Paytm、Bell
              Canada；任何单一账户流失的收入影响都很大。 Forbes 分析师分析认为，在合计 5% 市场份额下，三家主要定制 ASIC 推理初创公司（Groq、Cerebras、SambaNova）中
              可能只有一家能商业存活——市场未必容得下三家。
