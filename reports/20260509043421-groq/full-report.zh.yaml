      - number: '6.4'
        title: 收入集中、留存信号与反向证据
        blocks:
          - type: paragraph
            body: >-
              Groq 的收入基础在客户细分和账户层面都存在显著集中风险。企业客户约占账户的 25%，却贡献估计 70% 的收入； 即便绝对流失数量不高，企业账户流失也会让业务高度敏感。若 HUMAIN 的 $1.5B
              承诺按预期在 2025–2026 年确认， 单一客户收入贡献会异常庞大——在缺少已披露多元化基准时，这是结构性风险。Groq 没有公开任何 NRR 或 NDR 数据， 对企业留存评估构成反向信号。API 型 AI
              基础设施公司的行业常模显示，高质量企业 NRR 应超过 120%；在没有披露前， 投资人必须把 Groq 的扩张动态视为未验证。客户满意度信号好坏参半：G2 上 GroqCloud
              来自企业和开发者用户的评分平均为 4.4/5，速度和开发者体验被列为主要优势，但相对 OpenAI，速率限制频率和模型选择广度是短板。 Reddit 的 r/LocalLLaMA 社区记录了多起
              GroqCloud 在高负载时段限流、打断开发者工作流的情况， 部分用户称已迁往竞品。The Information 2025 年 8 月报道称，Groq 的低切换成本 API 设计带来结构性流失风险，
              这一风险在开发者层队列中可观察到，但企业层数据仍未披露。Together AI 声称拥有 450K+ 开发者， Fireworks AI 声称拥有 10,000+ 客户，显示 Groq
              开发者层留存面临强竞争压力。因速度需求而选择 Groq 的企业客户可能更粘， 但合同期限、续约率、客户标识留存等指标没有披露，公开来源无法做定量留存评估。
