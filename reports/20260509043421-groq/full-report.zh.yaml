      - number: '3.5'
        title: 附录图表
        blocks:
          - type: callout
            title: SRAM 架构天花板限制竞争覆盖面
            body: >-
              Groq 的 LPU 以 SRAM 为中心，这是其主要速度优势，也是文档最充分的竞争约束。超过约 70–80 billion 参数的模型若不量化，就无法在当前 LPU 硬件上高效服务；而 Cerebras
              WSE-3（40GB SRAM）和 SambaNova SN40L（三级内存）能处理更大模型。随着前沿 模型规模超过 100B 参数，除非下一代芯片显著扩大片上内存容量，否则 Groq
              的竞争覆盖面会收窄。Forbes 分析师 Karl Freund 警告，到 2030 年三家定制 ASIC 初创公司若合计只有 5% 市场份额，可能仅有一家存活，这凸显了解决这一约束的紧迫性。
            calloutType: insight
            claimRefs:
              - CP025
              - CP026
              - CP030
          - type: callout
            title: SambaNova 困境既是警告，也是 Groq 的机会
            body: >-
              SambaNova Systems 在 2025 年 10 月融资失败后探索出售，说明定制硅 AI 推理的资本密集度正压迫至少一家主要 ASIC 初创公司。对 Groq
              而言，这既是不利信号（确认该品类面临融资困难），也是机会：如果 SambaNova 的战略未来仍不确定，其联邦和国家实验室客户关系（Oak Ridge、LLNL）可能向 Groq 的 GroqRack
              销售团队开放。Groq 已融资 $1.5B+，加上 2025 年 12 月 Nvidia 授权交易带来的资本，形成相对融资缓冲；但领导层交接引入执行风险。
            calloutType: insight
