      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              AI 推理市场有结构性顺风：（1）OpenAI CEO Sam Altman 称，同等 AI 能力成本约每 12 个月下降 10x，随着过去成本过高的用例变得可行，需求呈指数扩张；（2）推理模型（DeepSeek
              R1、OpenAI o3、Anthropic Claude 3.7）单次查询在推理时执行的计算显著多于上一代模型，推高每会话平均推理成本，也创造对高效硬件的需求；（3）J.P. Morgan
              数据显示，超大规模云厂商 AI 资本开支从 $126 billion（2023）增至 $197 billion（2024），并预计 2025 年为 $234
              billion，推动基础设施继续建设；（4）Barclays 估计前沿 AI 的推理资本开支将从 2025 年 $122.6 billion 跳升至 2026 年 $208.2 billion，替代硅片最终会拿下
              Nvidia 推理市场份额的 50%+。主要采用约束包括：CUDA 软件护城河占主导（Nvidia 生态有 10+ 年工具链投入，开发者离开要付出显著切换成本）；大规模能耗（Forbes
              称推理如今最高可占模型全生命周期总成本的 90%，包括能源）；Groq 这类以 SRAM
              为中心的架构受支持模型规模限制，压缩可竞争模型广度；定制芯片制造资本密集；医疗和金融服务中的监管与合规不确定性拖慢企业采用第三方推理
              API。推理市场也容易遭遇价格压缩：推理成本逐年大幅下降，即便用量上升，所有提供商的每 token 收入也会被挤压。
