              Groq 最大的单一财务承诺（$1.5B HUMAIN 交易）和最大的单一监管威胁（BIS AI 芯片出口管制）直接绑定。 如果 BIS 像过往可比出口限制周期中对 Nvidia H100/A100
              所做的那样，把 Groq 的 LPU 重新归入 商业管制清单，HUMAIN 的沙特阿拉伯部署可能被完全阻断。这个风险并非理论问题：自 2022 年以来， BIS 一直激进扩大 AI 芯片管制边界，专用推理
              ASIC 并未被明确排除在未来规则之外。Groq 整个 2025–2026 收入逻辑都建立在 HUMAIN 按期执行的假设上。一旦触发出口管制事件，收入逻辑会崩塌，投资人对契约条款的担忧会同时升温， Series
              E $6.9B 估值的理由也会消失。这是最值得立即投入尽调资源的投资逻辑破裂触发点。
