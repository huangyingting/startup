  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Groq 的国际收入集中度——最突出的是 $1.5B 沙特 HUMAIN 承诺——带来了纯国内基础设施公司少见的监管和法律敞口。 美国工业与安全局（BIS）已根据《出口管理条例》（EAR）持续收紧先进 AI
              芯片出口管制， 把加速器重新归入商业管制清单（CCL），并对运往中东市场的先进计算硬件施加许可证要求。 如果未来 BIS 针对专用推理 ASIC 的规则覆盖 Groq 的
              LPU，沙特阿拉伯和阿联酋部署可能需要出口许可证—— HUMAIN 交易可能因此被阻断或延迟。2024 年 1 月 BIS 临时最终规则为需要许可证的先进 AI 芯片设定了基于性能的阈值， 适用于 Country
              Group D:5 目的地；Groq 必须持续监测 LPU Gen2 性能指标是否突破这些阈值。OFAC 制裁合规是次要但并非微小的风险： 如果任何 HUMAIN 关联实体受到 OFAC 指定，Groq
              可能被法律禁止收取基础设施合同项下款项。EU AI Act （Regulation 2024/1689）将在 2026 年全面适用；当 Groq API 被用于欧盟高风险 AI 应用
              （医疗、生物识别、就业筛选）时，推理基础设施提供商也要承担合规义务。在美国国内，FTC 在 2024 年 AI 竞争报告中把推理算力集中列为监测重点。 Groq 与 Nvidia 的 IP 交叉许可（2025 年
              12 月）引入了范围不明的法律风险：未披露的许可费条款可能构成重大未来成本义务， 使用领域限制也可能约束 LPU Gen3 设计自由度。美国能源部部署（Argonne National Laboratory）的
              ITAR 和 EAR 合规，还会增加联邦承包管理成本和人员访问限制。
