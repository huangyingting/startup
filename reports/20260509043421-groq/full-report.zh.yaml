      - number: '8.4'
        title: 退出情景、投资人回报分析与投资逻辑破裂触发点
        blocks:
          - type: paragraph
            body: >-
              Groq 投资人有三条退出路径：IPO、战略 M&A、困境出售。IPO 路径是管理层的基准目标。Groq CEO 的表态把 2026 年现金流为正作为公开市场准备度的前提。若 2027 年以 $15B 估值
              IPO（基准情景），Series E 投资人 （$6.9B 入场）获得 2.2× 回报，两年 IRR 约 47%。若以 $25B 估值 IPO（乐观情景），回报为 3.6×， IRR 约 90%。Series D
              投资人（2024 年 8 月 $2.8B 入场）目前账面收益 2.46×，若 $6.9B 估值成立， 13 个月年化 IRR 约 227%。战略 M&A 路径若较当前估值有 1–2× 溢价，意味着
              $10–14B。 Cisco（现有 Series E 投资人）、Samsung（现有投资人和 LPU 制造商）、IBM 都有资产负债表和 AI 基础设施理由成为买方。 若 M&A 结果为
              $13.8B，Series E 投资人约两年获得 2.0× 回报（约 41% IRR）。困境出售情景 （悲观情景下 HUMAIN 停滞 + 收入未达标 + 下一轮股权融资为降价轮）可能把 Groq 定价在
              $3–5B—— Series E 投资人可能只拿回 0.4–0.7×。三个投资逻辑破裂触发点需要立即升级尽调：(1) BIS 将 Groq LPU 归入先进 AI 芯片出口管制，阻断 HUMAIN
              的沙特阿拉伯部署；(2) Groq 年底未能达到 $400M 2025 收入，显示 HUMAIN 未执行且市场份额流失；(3) Nvidia 交叉许可的许可费条款浮现，造成 >10%
              毛利率拖累。任何单一触发点都会把基准情景隐含估值下调 30–50%，并把悲观情景概率权重从 20% 抬高到 40–50%。
            claimRefs:
              - CV026
              - CV029
              - CV030
              - CV031
              - CV032
              - CV033
              - CV034
              - CV036
      - number: '8.5'
        title: 图表
        blocks:
          - type: callout
            title: Groq 的 13.8× P/S 位于 AI 推理同业中位数——但悲观情景高估风险真实存在
            body: >-
              Groq 2025 年 9 月 Series E 估值 $6.9B，按 2025E 收入为 13.8×，正处于私营 AI 推理同业中部 （Cerebras 约 16×、Together AI 约
              16.5×、Fireworks AI 约 12.7×、Lambda Labs 约 3.8×）。 CoreWeave 公开市场锚约 10× GPU 云
              P/S，提供了底线。在这个基础上，只要基准或乐观情景能执行，当前估值就有防守性—— 不是投机性定价。但对任何需要 3–5 年内偿还的资本结构而言，按 2024 年过去 12 个月收入计算的 76×
              都是令人不适的入场倍数。 如果 2025 年收入为 $350M（低于目标 30%）而不是 $500M，过去 12 个月收入倍数升至约 20×——仍高，但没那么刺眼。 如果收入为 $250M（低于目标
              50%），倍数会达到约 28×，基准情景按定义就变成悲观情景。因此，收入目标是近期最重要的估值变量； 没有经审计财务，也意味着公开来源无法验证它。
            calloutType: insight
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV008
              - CV009
              - CV027
              - CV028
              - CV042
          - type: callout
            title: 三个投资逻辑破裂触发点会让 $6.9B 一夜压缩至 $2–4B
            body: >-
              三个事件中的任何一个，都会迫使 Groq 当前 $6.9B 估值大幅下修：(1) BIS 发布规则，将 Groq LPU 归入先进 AI 芯片出口管制，阻断 HUMAIN
              的沙特阿拉伯部署。这会消灭主要乐观和基准收入驱动因素 （来自 HUMAIN 分阶段收入的 $500M+），迫使重估到悲观情景隐含价值 $2–3B。(2) Groq 2025 年末收入被确认低于 $350M，暴露
              HUMAIN 未执行以及市场份额流向 Cerebras、Together AI 或 AWS Inferentia。按 $350M 收入和 10× P/S（悲观情景压缩）计算，隐含价值为 $3.5B，较当前下调
              49%。(3) Nvidia 交叉许可的许可费条款浮现， 带来 10%+ 毛利率拖累，把估计毛利率从 35–45% 降至 25–35%，并切断 2026 年实现现金流为正的路径。
              任一触发点都会把悲观情景概率权重从 20% 抬高到 40–50%，使概率加权内在价值低于 $6.9B。这些不是低概率尾部事件—— BIS 监管风险和单一政府合同收入集中，都是 Groq 当前业务模型的结构性特征。
            calloutType: risk
            claimRefs:
              - CV018
              - CV019
              - CV022
              - CV025
              - CV026
