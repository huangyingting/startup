    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人 / 尽调路径
    rows:
      - - 2022–2025 年审计财务报表
        - 公开领域没有 GAAP 损益表、资产负债表或现金流量表；所有收入和利润率数据均为第三方估计
        - 收入和利润率主张是每个估值情景的基础；未经验证的输入意味着基准情景 DCF 可能错 30–50%
        - 要求开放数据室，提供审计 P&L、毛利率桥接，以及按 API、企业、HUMAIN 分拆的收入
      - - HUMAIN 合同——有约束力条款和提款时间表
        - $1.5B 承诺是否包含有约束力采购订单或只是意向书，公开信息尚未确认；提款里程碑未知
        - HUMAIN 交易是最大的单笔收入承诺；无约束力 LOI 或部署停滞，会抹掉乐观和基准收入情景
        - 要求提供主服务协议、分阶段采购订单计划、BIS 出口许可状态和首批交付里程碑日期
      - - Nvidia 交叉许可版税条款
        - 2025 年 12 月 Groq-Nvidia IP 交叉许可条款、版税率、使用领域限制和期限均未公开披露
        - 对 Nvidia 的隐性版税义务会长期压缩毛利率，并让公司与主要 GPU 既有厂商产生竞争纠缠
        - 要求提供完整交叉许可协议；识别版税率、最惠国条款、回授条款，以及 LPU Gen3 设计的自由实施范围
      - - 企业 NRR 和队列留存数据
        - 企业 NRR、流失率或队列级留存指标均未公开披露；2.8M 开发者注册数混合了付费层和免费层
        - 基准情景 DCF 假设 Groq 能留住并扩大企业收入；如果 NRR 低于 100%，基准情景会坍塌为悲观情景
        - 要求提供企业队列报告，按年份批次展示 NRR、收入结构（API vs. 企业 vs. 基础设施）和前 10 大客户集中度
      - - 股权结构表和清算优先权堆叠
        - Groq 完整股权结构表、Series E 清算优先权、反稀释条款和二级市场悬空供给均未公开
        - 以 $6.9B 投入的 Series E 投资者在 IPO 或 M&A 时，可能面对早期轮次堆出的显著优先权；清算优先权可能明显限制普通股上行
        - 要求提供完整股权结构表，包括优先股堆叠、参与型优先股 vs. 非参与型优先股、反稀释条款和员工期权池规模
    notes: 这五项尽调问题按对投资逻辑的影响排序。第 1 和第 2 项（审计财务和 HUMAIN 合同条款）是阻断项；没有这些证据就在 $6.9B 或更高估值作出正面投资决定，仍属投机。第 3–5 项重要，但不阻断初始仓位决策。
