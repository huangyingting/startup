      - number: '8.2'
        title: 可比公司分析与市场倍数
        blocks:
          - type: paragraph
            body: >-
              对 Groq 最相关的直接可比组，是已披露估值的私营 AI 推理公司：Cerebras Systems（$8.1B，2025 年 9 月， 约 $510M 2025E 收入，约 16×
              P/S）、Fireworks AI（$4.0B，2025 年 10 月，约 $315M ARR，约 12.7× P/S）、 Together AI（$3.3B，2025 年 2 月，约 $200M ARR，约
              16.5× P/S）。Lambda Labs（$1.5B， 约 $400M ARR，约 3.8× P/S）是部分可比，更像纯 GPU 算力租赁，平台溢价较低。SambaNova Systems 同样是推理
              ASIC 初创公司，2025 年探索战略替代方案时估值降至估计 $1.5–2B，是悲观情景的警示数据点。部分可比中， CoreWeave 2025 年 3 月 IPO 估值约 $19–20B、2024 年收入
              $1.9B（约 10× P/S），提供了唯一公开市场锚。 Databricks（$43B，$1.6B ARR，约 27× P/S）和 Scale AI（$14B，约 $1B 收入，约 14× P/S）
              展示了平台和数据网络效应业务的溢价，而 Groq 尚未建立这一点。Nvidia（约 $3T 市值、$130B 收入、约 23× P/S） 和 AMD（约 $250B、$24B 收入、约 10×
              P/S）则是公开硅片基准。2025 年私营 AI 推理公司的中位 EV/Revenue 约为 13–16×。Groq 的 13.8× 位于该区间低端，意味着市场尚未给平台溢价定价——考虑到缺少经审计财务和纯推理
              TAM 上限，这个折价合理。PitchBook 和 CB Insights 私募市场数据确认，AI 基础设施倍数已较 2021–2022 年高点压缩 20–40%，估值环境更趋纪律化，Groq
              当前估值必须持续靠收入执行来守住。
