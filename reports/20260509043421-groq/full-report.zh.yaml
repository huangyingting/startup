chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司定位与商业模式
        blocks:
          - type: paragraph
            body: >-
              Groq, Inc. 是一家垂直整合的 AI 硬件与推理公司，总部位于加州 Mountain View（Silicon Valley）。公司由 Jonathan Ross 与联合创始人 Douglas
              Wightman 于 2016 年创立；Ross 是 Google Tensor Processing Unit（TPU）的初代设计者之一。Groq 从一开始就为解决 AI
              部署的核心瓶颈——推理延迟——而生。公司旗舰产品 Language Processing Unit（LPU）是一款专为 AI 推理设计的专用集成电路（ASIC），能输出确定性、超低延迟的 token
              生成，在许多工作负载上显著跑赢 GPU 方案。LPU 最初名为 Tensor Streaming Processor（TSP），采用以 SRAM
              为中心的单核架构；所有执行都由编译器控制，而不是依赖分支预测器或缓存等传统硬件调度机制。Groq 有两条商业渠道：GroqCloud API（2024 年 2 月 19 日上线的云推理服务，按 token
              即服务模式定价）以及面向企业和政府客户的本地 LPU 部署。GroqCloud 兼容 OpenAI，现有基础设施迁移成本很低。公司第一代 LPU 芯片由 GlobalFoundries 以 14 nm
              制程制造；第二代芯片由 Samsung Electronics 在 Texas Taylor 工厂以 4 nm 制程制造。截至 2025 年 12 月，Groq 服务超过 2.8M
              名开发者，并覆盖北美、欧洲和中东数据中心中的多家 Fortune 500 公司。
