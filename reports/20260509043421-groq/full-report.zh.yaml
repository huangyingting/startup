  - id: TE005
    title: GroqCloud 工作流和用例参考
    columns:
      - 用户任务 / 用例
      - 不用 Groq（当前工作流）
      - 使用 GroqCloud
      - 可衡量收益
      - 限制
    rows:
      - - 实时 AI agent 响应
        - OpenAI GPT-4 API 或自托管 GPU；200–800ms TTFT；高负载时排队
        - 使用 Llama 3.1 70B 的 GroqCloud API；~50ms TTFT；确定性延迟
        - 响应快 4–10x；减少面向用户产品里的 agent「思考等待」
        - 模型广度限于受支持的开放模型；GroqCloud 上没有 GPT-4 等价模型
      - - 语音界面 / 语音转文本 + LLM
        - 分离的 STT + LLM 管线跑 GPU 推理；端到端延迟通常为 1–2 秒
        - 同一次 API 调用内使用 GroqCloud Whisper + Llama LLM；目标综合延迟低于 500ms
        - 在开放模型上跑出对话级语音 AI 延迟，同时不依赖专有 API
        - 除 Whisper 外无多模态模型；不支持视觉管线
      - - 开发者试验 / 原型开发
        - 使用付费额度的 OpenAI API，或消费级 GPU 本地模型；要么限速，要么成本高
        - GroqCloud 免费层；无需信用卡；OpenAI 兼容 API；即时访问
        - 从 OpenAI 迁移成本为零；免费访问加速开发者上手
        - 免费层限速可能限制负载测试和高频原型开发
      - - LangChain / LlamaIndex agent 应用
        - OpenAI 或 Anthropic 推理后端；若 API 不兼容，切换需要改代码
        - 借助 LiteLLM 或原生集成，GroqCloud 可即插即用作为 LangChain/LlamaIndex 后端
        - 确定性延迟让 agent 链执行更快；相较 GPU 替代方案，每 token 成本更低
        - 模型多样性有限；需要 function-calling 的 LangChain/LlamaIndex 功能可能有缺口
      - - 企业本地 LLM 部署
        - 自托管 GPU 服务器（H100/A100）；高资本开支；维护负担重；无托管服务
        - GroqRack 本地 LPU 机架；硬件托管；企业销售；包含 KQUE 冷却
        - 隔离网络部署也有确定性推理延迟；无云端数据外流
        - 前期硬件采购；合规认证状态未披露；公开价格有限
      - - 批量文档处理 / 摘要
        - GPU API 批量推理；延迟波动；按 token 定价随用量放大
        - GroqCloud 批量 API 支持 7B–70B 模型；高吞吐、低每 token 成本
        - 在中型模型规模化场景，Groq 定价约比 GPU IaaS 同行便宜 4–7x
        - 不支持微调模型；100B 级模型受 SRAM 模型上限约束，批处理作业受限
    claimRefs:
      - CE013
      - CE014
      - CE015
      - CE016
      - CE017
      - CE021
      - CE022
      - CE030
    notes: 可衡量收益除非归因于独立基准，否则来自估计或公司说法。限制反映截至 2026 年 5 月已记录的架构或产品缺口。
