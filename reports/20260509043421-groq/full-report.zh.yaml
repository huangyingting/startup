      - - Groq 2025 年收入低于 $350M
        - 2025 年底确认收入低于 $350M（较 $500M 目标偏差 30%+）；意味着 HUMAIN 未执行且市场份额流失
        - 基准情景坍塌为悲观情景；按 $350M 收入计算，当前估值对应 13.8× 远期 P/S，意味着估值过高；下一轮股权融资很可能下调估值
        - 减仓；重新建仓前要求确认 HUMAIN 有约束力提款，并取得审计收入
      - - Nvidia 交叉许可版税超过收入的 10%
        - 法庭文件、媒体报道或 M&A 尽调显示，GroqCloud/LPU 收入需向 Nvidia 支付 >10% 版税
        - 毛利率将从 35–45% 长期压缩到 25–35%；抹掉 2026 年实现现金流转正的承诺；终值 DCF 降低 20–30%
        - 立即下调评级；用调整后的利润率假设重跑 DCF；评估压缩利润率下 IPO 是否仍可行
      - - Cerebras 或 Together AI 拿下 >30% 企业推理市场
        - 第三方基准数据、Sacra/PitchBook 收入估计或企业调研显示，单一 GPU 云竞争对手的推理市场份额 >30%
        - Groq 的速度溢价不再驱动企业决策；ASP 压缩加速；没有平台差异化，13.8× P/S 难以自圆其说
        - 每季度跟踪 ArtificialAnalysis 基准和竞争对手融资 / ARR；下次出资前要求 NRR 数据
      - - HUMAIN 合同确认为无约束力 LOI
        - 法律文件、尽调审查或媒体调查显示 HUMAIN 协议缺少有约束力采购订单或可执行交付里程碑
        - 收入逻辑失去主要锚点；悲观情景变成基准情景；增长轨迹缺少独立收入承诺支撑
        - 启动完整数据室审查；要求合同文件；在有约束力条款确认前，暂停追加任何资本
    notes: 投资逻辑失效触发因素按严重性 × 即时性排序。前三项目前无法用公开来源解决——需要数据室访问或监管披露。触发阈值尽量量化；每项触发因素单独发生，都会把概率加权内在价值压到 $6.9B Series E 进入价以下。
    claimRefs:
      - CV018
      - CV019
      - CV022
      - CV025
      - CV026
      - CV036
