      - number: '4.3'
        title: 成本结构、单位经济性与毛利率
        blocks:
          - type: paragraph
            body: >-
              Groq 成本结构由三类主导：LPU 硬件 CAPEX（从 Samsung 4nm 晶圆厂采购芯片）、数据中心运营（托管和电力成本）以及 R&D / 工程人员。支撑最佳推理速度的以 SRAM 为中心的 LPU
              架构也带来结构性成本劣势：SRAM 的内存密度比 NVIDIA GPUs 所用 HBM 低几个数量级，且每 byte 成本更高，每张 LPU 卡约 $20,000。这一硬件成本画像将 GroqCloud API
              收入毛利率限制在估计 35–45%，明显低于纯软件 SaaS 常见的 60–70%+，但会随利用率提升而改善。按 Samsung 制造成本基准估计，LPU 硬件 CAPEX 每年约
              $50–100M。运营烧钱包括该硬件成本摊销，加上 $60–80M 的 R&D 工程人员成本和 $30–60M 数据中心运营成本。2024 年总 burn 估计为 $150–200M。Groq
              在开发者层面的单位经济性有利于获客：开发者主导增长意味着个人 API 用户 CAC 近乎为零，但企业交易需要销售工程投入，公开资料未量化。平均每开发者年收入估计约 ~$178，且高度由企业队列拉高。NRR、LPU
              利用率和 LPU CAPEX 回本周期都是重大未知数，需要访问内部账单数据。
