        - 企业、国家实验室、受监管行业
        - 全球最大芯片；900K 个 AI 核心；40GB SRAM；宣称大型模型吞吐量为 Nvidia 的 20x
        - 晶圆级芯片良率风险；模型可移植性有限；成本基底更高
        - 训练 + 推理；企业销售；扩张美国制造
      - - SambaNova Systems (SN40L)
        - 自研 ASIC——直接竞争
        - 累计融资 $2.17B；峰值估值 $5.1B；探索出售（2025 年 10 月）
        - 国家实验室、受监管企业
        - RDU 架构；三级内存（SRAM+HBM+DRAM）；模型支持更灵活
        - 融资承压；生态更小；战略前景不确定
        - 可能通过 M&A 退出；维持国家实验室关系
      - - Together AI
        - GPU 云 IaaS
        - $305M Series B 轮（2025 年 2 月）；估值 $3.3B；开发者 450K+
        - AI 开发者、初创公司、企业
        - 200+ 个开放模型；FlashAttention-3；训练 + 微调 + 推理；支持大型模型
        - 中型模型相对 Groq 没有速度优势；每 1M tokens $3/$7（为 Groq 定价的 4–7x）
        - 开发者驱动增长；扩张企业客户；多模态训练平台
      - - Fireworks AI
        - GPU 云 IaaS
        - 估值 $4B；$250M Series C 轮（2025 年 10 月）；$315M ARR
        - 企业生产工作负载
        - FireAttention CUDA 栈；每日 10T+ tokens；Sequoia + NVIDIA + AMD 支持
        - 延迟敏感任务相对 Groq 没有速度优势；定价更高
        - 企业 SLA；大型模型库；生产级微调
      - - AMD (MI300X + ROCm)
        - GPU——在位者
        - '2024 年数据中心 GPU 收入 $4.8B；Nasdaq: AMD'
        - 超大规模云厂商、HPC、AI 云
        - 192GB HBM MI300X；兼容 CUDA 的 ROCm；OpenAI / Microsoft / Meta 客户
        - 软件生态与 CUDA 存在差距；没有专门面向推理的 API 产品
        - 扩大云 GPU 租赁市场份额；ROCm 与 CUDA 拉平
      - - AWS Inferentia 2 / Google TPU v5 / Azure Maia 100（云厂商自研芯片）
        - 超大规模云厂商自研芯片
        - 仅内部使用；不作为第三方 IaaS 出售
        - 内部 AI API 成本优化
        - 自有云成本优势；与托管服务（Bedrock、Vertex、Azure OAI）打包
