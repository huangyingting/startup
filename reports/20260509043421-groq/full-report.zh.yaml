      - number: '3.4'
        title: 护城河耐久性与反向竞争证据
        blocks:
          - type: paragraph
            body: >-
              Groq 的主要护城河主张是架构：LPU 确定性、以 SRAM 为中心的设计带来延迟和能效优势，Nvidia GPUs 若不放弃 CUDA
              通用执行模型，很难直接复制。不过，这条护城河面临四个结构性威胁。第一，Nvidia Blackwell B200 GPU 包含面向推理优化的内存配置和 NIM
              推理微服务，在批量推理用例中缩小延迟差距。Barclays 估计，到 2030 年非 Nvidia 硅片只会拿到推理加速器市场约 10–15%，而 Nvidia 长期保持 50%+。第二，SRAM
              容量余量约束是已有文档支持的限制：Groq 现有芯片若不量化，无法以成本有效的方式大规模服务约 70–80B 参数以上模型；随着前沿模型规模增至 100B–1T+ 参数，竞争覆盖面会受限。第三，Forbes
              分析师 Karl Freund 在 2025 年 10 月写道，如果到 2030 年定制 ASIC 合计市场份额只有 5%，「三家定制 ASIC 初创公司可能只容得下一家存活」——这是 Groq、Cerebras
              和 SambaNova 的直接反向信号。第四，SambaNova 2025 年 10 月在融资失败后探索出售，是定制硅推理品类融资困难的领先指标。锁定效应方面，Groq 受益于开发者切换成本低（兼容 OpenAI
              API），这既是分销优势，也是留存风险——开发者只需改一个端点就能切到 Together AI 或 Fireworks。供应和伙伴准入方面，Groq 的 Samsung 4nm 制造协议和
              GlobalFoundries 14nm 历史提供了一定供应安全，但所有定制硅玩家都面临下一代芯片的多年 晶圆厂交付周期和资本密集度。2025 年 12 月 Nvidia 授权交易（约 $20B）以及创始人
              Jonathan Ross、总裁 Sunny Madra 转往 Nvidia，既是资本注入，也是不利信号：Groq 作为独立公司留住核心创始领导层的能力受到质疑。
