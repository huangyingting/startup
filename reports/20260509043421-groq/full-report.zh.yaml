      - number: '5.5'
        title: 图表
        blocks:
          - type: callout
            title: 确定性 LPU 架构是中型 LLM 推理真实且可防守的技术护城河
            body: >-
              与 GPU 替代方案相比，Groq 的 LPU 架构走的是一条根本不同的 AI 推理路线：静态调度、以 SRAM 为中心、完全确定性。这个设计在 7B–70B 参数模型上的首 token 时间和吞吐基准，是
              GPU 架构不做底层重构就无法复制的； 原因在于 GPU 调度延迟来自动态执行模型本身，不是一个可调配置项。ArtificialAnalysis 的独立基准数据 （2024 年 1 月 Llama 2 70B
              达到 241 tokens/sec，当时最接近的 GPU 替代方案低于 50 tokens/sec） 证实，目标模型规模区间内的性能优势真实且显著。GroqFlow
              编译器的静态调度还带来可预测、可复现的性能特征； 对运行延迟敏感生产负载的企业来说，这一点本身就有价值，不只取决于原始吞吐数字。这个护城河在近中期具备耐久性，
              因为它扎根于芯片设计和编译器技术，而不是竞争对手只靠软件优化就能复制的可调参数。
            calloutType: insight
            claimRefs:
              - CE001
              - CE007
              - CE008
              - CE012
          - type: callout
            title: SRAM 上限与成本经济性是最重要的技术尽调风险
            body: >-
              以 SRAM 为中心的架构让 LPU 在中型模型上跑得快，也给大模型推理设下结构性上限。超过约 70–80B 参数的模型需要分布到多个 GroqNode，带来节点间通信延迟，并削弱 Groq
              最核心的单系统吞吐优势。 ArtificialAnalysis 2025 年 10 月数据表明，Cerebras WSE-3 在 70B+ 参数模型上超过 Groq——这正是商业兴趣和平均合同价值最高的前沿区间。
              更棘手的是，SRAM 每 bit 成本显著高于 DRAM 和 HBM；随着 HBM 成本因工艺成熟和规模放量而下降， 即便 Groq 继续守住中型模型的速度领先，单位 token 成本优势也可能被压缩。Groq
              没有公开 Gen2 LPU 的 SRAM 容量，因此无法判断 Samsung 4nm 一代是否实质性缓解了模型规模上限。现有规模上限、成本路线图不确定、 Gen2
              架构规格未披露，这三点合在一起，是潜在投资人评估长期竞争耐久性时最重要的一组技术尽调缺口。
            calloutType: insight
            claimRefs:
              - CE025
              - CE028
              - CE031
              - CE011
