      - number: '3.3'
        title: 能力对比——定价、GTM 与信任
        blocks:
          - type: paragraph
            body: >-
              按每 token 定价，Groq 的 GroqCloud API 面向 DeepSeek-R1 类模型约为每百万输入 token $0.75、每百万输出 token $0.99——大约比 Together
              AI（每百万 $3.00/$7.00）和 Fireworks AI（每百万 $3.00/$8.00）便宜 4–8x。不过，Groq 的以 SRAM 为中心的架构限制可支持模型规模：超过片上 SRAM
              容量的模型（当前 LPU 世代约 70B–80B 参数）若不做量化或分片，无法在 GroqCloud 上运行；而基于 GPU 的供应商可运行任何能放进 GPU VRAM 的模型，包括 405B+
              参数模型。Artificial Analysis 基准显示，Cerebras 在非常大的模型（如 Llama 3.1 405B）原始每秒 token 吞吐上超过 Groq；Groq 则在中等规模模型（Llama
              3.1 70B 及以下）保持领先。GTM 上，Groq 的开发者主导动作（GroqCloud 免费层；2.8M+ 开发者注册；兼容 OpenAI API）类似 Together AI
              的开发者优先方法。Fireworks AI 更积极地聚焦企业销售和生产 SLA，其 $315M ARR 可作佐证。Groq 未公开披露 SOC 2 Type II、FedRAMP 或 HIPAA BAA
              认证，这限制了企业和政府采购。Cerebras 和 SambaNova 比 GroqCloud
              拥有更深的联邦关系（DOE、DOD、国家实验室）。所有非超大规模云推理供应商的分销主要靠直销或开发者社区驱动；没有哪家建立了有意义的渠道转售计划。GPU 云 供应商可以上架 AWS、Azure 和 GCP
              市场，而 Groq 的定制硅尚未以托管产品原生进入超大规模云市场。
