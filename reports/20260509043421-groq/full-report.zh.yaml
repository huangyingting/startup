      - number: '1.5'
        title: 附录图表
        blocks:
          - type: callout
            title: 创始人离任——关键人风险落地
            body: >-
              Jonathan Ross（创始人兼 CEO）和 Sunny Madra（总裁）均在 2025 年 12 月加入 Nvidia，作为非排他授权交易的一部分。对一家由 Ross
              担任九年主要技术愿景人物和销售力量的公司而言，这是高严重度领导层事件。Simon Edwards（新任 CEO、三个月前刚被任命的前 CFO）此前没有领导半导体或云基础设施公司的经历。GroqCloud
              运营据称将不受影响地继续，但中期产品路线图和企业关系面临重大风险。
            calloutType: risk
            claimRefs:
              - CO020
              - CO021
          - type: callout
            title: SRAM 架构：速度背后是模型规模代价
            body: >-
              Groq 的 LPU 凭以 SRAM 为中心的设计实现行业领先推理速度，但 SRAM 的内存密度约比 NVIDIA GPU 所用 HBM 低三个数量级。这限制了单芯片可运行模型规模，也意味着 LPU 卡每张成本约
              $20,000。多芯片扩展能部分缓解，但会引入芯片间通信复杂度。Groq 的 LPU v2（Samsung 4nm）旨在缓解规模限制，但该架构从根上仍不如 GPU 方案适合训练。
            calloutType: risk
            claimRefs:
              - CO041
  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              AI 推理市场涵盖用于在生产环境执行已训练 AI 模型的计算、内存、网络和软件基础设施——从新输入数据生成预测、回复或决策。Groq 直接竞争的是云端 AI 推理即服务（IaaS）细分：通过 API
              访问、托管、按 token 付费运行大型语言模型（LLMs）和多模态模型。该细分位于更广义的 AI 推理硬件与服务市场之内，后者还包括本地加速器、边缘部署和企业 MLOps 工具。Groq 的主市场不包括 AI
              模型训练（由 Nvidia H100/H200 和 B200 GPUs 主导的另一个资本密集型工作负载）、微调基础设施，以及计算机视觉或推荐系统等非语言模态推理，因为 GPU 成本结构不同。Groq
              产品的现状替代方案包括：（1）通过超大规模云厂商 API 托管 GPU 推理（AWS Bedrock、Azure OpenAI Service、Google Vertex AI）；（2）在 GPU
              集群上自托管开源 LLM；（3）通过主要 AI 实验室使用专有模型（OpenAI、Anthropic）。Groq 在云 IaaS 层占据速度和成本并重的利基，目标是延迟敏感用例：在受支持的开放模型上，GPU
              方案无法匹配其每秒 token 表现。
