      - number: '2.3'
        title: 市场分层——买方、用户与付款方
        blocks:
          - type: paragraph
            body: >-
              AI 推理市场按部署模式、买方成熟度和成本敏感性分层。超大规模云厂商（AWS、Azure、Google
              Cloud、Oracle、Meta）按收入和算力规模是最大一层，但它们主要自建并运营专有推理基础设施，而不是向 Groq 这类专业 IaaS 供应商采购。IaaS / API 优先细分是 Groq
              的主战场，竞争方包括 Together AI（$3.3 billion 估值，General Catalyst 领投）、Fireworks AI、Cerebras
              Systems、SambaNova、Baseten 和 DeepInfra。金融服务、医疗、媒体和政府企业买方采购 API 提供商的推理容量时，主要看延迟、吞吐、合规和总拥有成本。Groq 的开发者优先
              GTM（2024 年 8 月 360,000+ 开发者；2025 年 12 月 2.8 million）瞄准自下而上采用：开发者因速度、集成简单（兼容 OpenAI API）和慷慨免费层自选
              Groq，再把企业组织转化过来。联邦和国家实验室买方（DOE、ALCF）规模较小但价值高，科学计算用例会拉动对确定性、可复现推理性能的差异化需求。各细分的预算所有者通常是生产工作负载的 IT /
              云基础设施负责人，以及实验或开发层用量的 AI/ML 工程团队。采购周期从即时（自助 API key）到企业和联邦合同的 6–24 个月不等。
            claimRefs: []
