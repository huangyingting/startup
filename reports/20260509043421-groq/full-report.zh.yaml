      - number: '5.2'
        title: 产品组合与服务层级
        blocks:
          - type: paragraph
            body: >-
              Groq 的商业产品组合跨两种主要交付模式：GroqCloud 云端 API 推理服务，以及 GroqRack 本地 LPU 硬件部署系统。GroqCloud 是主要增长载体：兼容 OpenAI 的 REST
              API，接受聊天补全和音频转录请求；开发者从 OpenAI 或其他兼容 API 提供商迁移时无需修改代码。服务分三层——免费（有速率限制的开发者访问）、growth/pro（更高限额，按 token
              随用随付）和企业层（SLA 支持、自定义定价、私有部署）——支持从实验到生产的先落地再扩张。支持的开源模型包括 Meta Llama 2 系列（7B、13B、70B）、Llama 3 和 Llama
              3.1（8B、70B、405B）、Mistral 7B、Mixtral 8x7B、DeepSeek-R1 蒸馏变体、OpenAI Whisper 语音转文本转录，以及 Meta Llama Guard
              内容审核。受单个 LPU 芯片 SRAM 约束，Llama 3 405B 模型需要分布到多个 GroqNodes 上运行，这会为最大支持模型增加节点间通信延迟。GroqRack
              服务需要物理隔离或本地部署的企业和政府客户，并捆绑 KQUE——Groq 为数据中心机架集成设计的高密度冷却和供电系统。2024 年 3 月，Groq 收购 Definitive Intelligence，为
              GroqCloud 平台加入 AI 分析和自然语言商业智能能力，把产品范围从纯推理 API 扩到分析用例，但整合成熟度未公开记录。
