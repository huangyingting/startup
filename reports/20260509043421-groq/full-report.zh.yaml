      - number: '5.4'
        title: 性能基准、可靠性与技术风险
        blocks:
          - type: paragraph
            body: >-
              Groq 在中型 LLM 推理上的性能领先，有独立基准数据支撑。ArtificialAnalysis.ai 2024 年 1 月记录， GroqCloud 在 Llama 2 70B 上达到 241
              tokens/sec，是当时所有受测推理服务商里的最高吞吐； 同一模型下，GPU 替代方案低于 50 tokens/sec。到 2024 年 11 月，GroqCloud 在 Llama 3.1 8B 上达到
              800+ tokens/sec。Groq 内部称，在约 200 亿参数等效范围的开源模型上，速度超过 1,000 tokens/sec。GroqCloud 的首 token 时间（TTFT）约 50 毫秒，在实时
              AI 智能体、 语音界面等延迟敏感应用里属于同类领先。Groq 声称推理速度比 NVIDIA H100 快 20 倍，但 ArtificialAnalysis 2025 年 10 月数据表明，70B
              及以上参数模型上 Cerebras WSE-3 已超过 Groq，而 Groq 仍在 7B–70B 参数区间领先。核心结构性技术风险是 SRAM 架构上限：片上 SRAM 按 bit 扩展成本高，限制了单张
              GroqCard 不跨多节点时可承载的最大模型规模。因此，LPU 速度优势与模型规模呈反向关系——100B+ 参数的前沿模型商业兴趣最高，却恰恰是 Groq 相比 Cerebras WSE-3 和 GPU
              替代方案优势最弱的位置。其他风险还包括：Gen2 LPU 晶圆集中依赖 Samsung 的 Taylor TX 工厂；完全没有公开的 SOC 2 Type II 或 FedRAMP 认证，限制受监管企业采购；
              以及 OpenAI 兼容 API 带来的低切换成本——这个推动采用的特性，也让客户很容易迁往价格或能力更优的竞品。
