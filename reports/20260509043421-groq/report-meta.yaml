companyProfile:
  summary: Groq is a Mountain View–based AI inference infrastructure company that designs its own Language Processing Unit (LPU) chips for deterministic, ultra-low-latency token generation. Groq's LPU architecture eliminates DRAM bottlenecks via SRAM-centric design and static compilation, achieving industry-leading inference speeds for open-source models. The company operates GroqCloud, a developer API service with 2.8M+ registered users as of December 2025, and provides GroqRack on-premise hardware deployments for enterprises and governments.
  foundedDate: '2016-01-01'
  founders:
    - name: Jonathan Ross
      role: Co-founder and Chief Scientist (departed Dec 2025)
      background: Inventor of Google's original TPU; designed Groq's LPU architecture from first principles.
      claimRefs: [CO007]
  foundingLocation: Mountain View, California, USA
  headquarters: Mountain View, California
  productSummary: Groq sells deterministic AI inference via GroqCloud (developer API) and GroqRack (on-premise hardware). The LPU chip achieves 241–800+ tokens/second for Llama-class open-source models. Gen2 LPU uses Samsung 4nm process (Taylor TX fab). Supported models include Meta Llama 3.x, Mixtral, Mistral, DeepSeek, and Whisper.
  customerFocus: AI developers, enterprise AI teams, government/defense research, and sovereign AI initiatives.
  businessModel: Usage-based API pricing (per token), enterprise contracts, and hardware licensing/deployment.
  stage: late-stage private
  fundingStatus: Series E completed September 2025 at $6.9B post-money valuation; $750M raised in that round; total $2.1B raised to date.
  claimRefs: [CO001, CO005, CO007, CO023, CO029, CO035, CO038, CO042]
summary:
