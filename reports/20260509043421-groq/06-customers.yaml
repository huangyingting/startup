  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: enterprise NRR and retention cohort data
      missingEvidence: >-
        Groq has not disclosed net revenue retention (NRR), gross revenue retention (GRR), or any cohort-level data for
        its enterprise customer base. Without this, it is impossible to determine whether enterprise accounts are
        expanding, flat, or contracting within existing contracts.
      whyItMatters: >-
        NRR is the single most important leading indicator for an API-first enterprise business. An NRR below 100%
        signals contraction even with strong new logo additions; above 120% signals efficient growth. The absence of any
        disclosure is itself an adverse data point, as well-performing companies typically share this metric.
      diligencePath: >-
        Request cohort ARR reports by contract vintage from Groq management; conduct reference interviews with 5–8
        enterprise accounts; ask for renewal rate data.
      relatedQuestionRefs:
        - QU013
    - type: private-evidence-only
      severity: material
      topic: developer-tier churn rate from rate-limit incidents
      missingEvidence: >-
        Developer-tier churn driven by rate-limiting during high-demand periods is documented qualitatively in Reddit
        and GitHub threads, but no quantitative churn rate has been disclosed. The scale of developer attrition is
        unknown.
      whyItMatters: >-
        Developer-tier churn has two effects: it reduces the enterprise conversion pipeline, and it signals product
        reliability concerns that enterprise evaluators will probe. If churn is concentrated in high-usage developers,
        the enterprise conversion pipeline may be thinner than the raw 2.8M registration count suggests.
      diligencePath: >-
        Request HeliconeAI or internal API active-user time-series data; ask Groq for trailing 90-day active developer
        count; review GitHub issue resolution rate for rate-limit complaints.
      relatedQuestionRefs:
        - QU016
    - type: private-evidence-only
      severity: material
      topic: enterprise account count and ARR concentration
      missingEvidence: >-
        The total number of enterprise accounts paying more than $100,000 per year and the ARR contribution of the top
        three accounts are not publicly disclosed. Without this, revenue concentration cannot be quantified.
      whyItMatters: >-
        If three or fewer enterprise accounts represent more than 50% of ARR (excluding HUMAIN), the business is highly
        exposed to single-account churn. This risk is structurally different from HUMAIN concentration and requires
        separate measurement.
      diligencePath: >-
        Request CRM data showing ARR by account tier; ask for Lorenz curve or Gini coefficient equivalent for ARR
        concentration; review top-10 enterprise account list with masked company names.
      relatedQuestionRefs:
        - QU007
    - type: private-evidence-only
      severity: material
      topic: named customer ROI and outcome-level case study depth
      missingEvidence: >-
        No named Groq customer has published a quantified ROI, cost reduction, or performance improvement metric
        attributable to Groq. All public case studies are deployment- announcements, not outcome reports. This limits
        the quality of reference selling and third-party verification of customer value.
      whyItMatters: >-
        Outcome-level proof is the highest-quality customer evidence for enterprise diligence. Its absence means
        investors must rely on deployment-level signals that do not prove continued usage, expansion, or renewal.
      diligencePath: >-
        Request reference customer calls with McLaren, Paytm, and DOE; ask for permission to publish anonymized outcome
        metrics; review any internal customer success reports.
      relatedTableRefs:
        - TU003
      relatedQuestionRefs:
        - QU020
    - type: private-evidence-only
      severity: material
      topic: HUMAIN draw-down schedule and binding legal status
      missingEvidence: >-
        The $1.5B HUMAIN commitment's binding legal structure, payment milestones, and draw-down timeline are not
        publicly disclosed. It is unclear whether this is a binding purchase order, a framework agreement, or a letter
        of intent with conditional milestones.
      whyItMatters: >-
        If HUMAIN is a non-binding commitment or is milestone-contingent on Saudi AI infrastructure rollout, actual cash
        received in 2025–2026 could be materially below the $1.5B headline, affecting both revenue and burn projections.
      diligencePath: >-
        Request executed master service agreement, payment schedule, escrow structure, and any force-majeure or
        termination provisions from Groq and Saudi Aramco Digital.
      relatedQuestionRefs:
        - QU025
