callouts:
  - id: KU001
    calloutType: risk
    title: No Disclosed NRR — Retention Durability Unverifiable
    body: >-
      Groq has not disclosed NRR, GRR, or any cohort-level retention metric for its enterprise customer base. For an
      API-first business where switching cost is structurally low (OpenAI- compatible), NRR is the single most important
      leading indicator of enterprise revenue durability. Without it, investors cannot distinguish between an expanding
      and a contracting enterprise base. This is a blocking diligence gap that must be cleared via data room access
      before any IRR model can be validated.
    claimRefs:
      - CU027
      - CU029
      - CU032
  - id: KU002
    calloutType: strength
    title: 2.8M Developer Base — Proven Viral Adoption and Ecosystem Gravity
    body: >-
      Groq's 2.8 million registered developer count as of December 2025 represents the fastest adoption ramp recorded
      for a new AI inference API. The OpenAI-compatible API design eliminated friction for migration-driven
      experimentation, while raw throughput performance drove organic benchmark-sharing across developer communities.
      This scale creates durable ecosystem gravity: GroqCloud is now embedded as a default backend in LangChain,
      LlamaIndex, and LiteLLM, meaning new open-source AI frameworks default to testing on Groq. The developer base is
      the primary top-of-funnel for enterprise conversion and reduces future customer acquisition costs for the growth
      segment.
    claimRefs:
      - CU001
      - CU002
      - CU019
      - CU023
      - CU025
