  - id: S02
    title: Named Enterprise Customer Case Studies and Deployment Proof
    body: >-
      Groq's most commercially and reputationally significant named customer is McLaren Formula 1, which uses
      GroqCloud's LPU-backed inference for real-time telemetry analysis and race strategy optimization during Grand Prix
      events. This deployment is production-grade — it operates on race day with latency constraints no GPU-based API
      could meet — and represents a high- reference-quality proof of Groq's core value proposition: deterministic,
      sub-50-millisecond inference for time-critical decisions. Paytm, India's largest fintech by payment volume, has
      deployed GroqCloud for AI-powered customer service interactions at scale, making it one of the highest-volume
      consumer AI deployments in Groq's portfolio. Bell Canada deployed Groq LPUs for telecom AI applications, extending
      the enterprise account base into regulated North American infrastructure. Saudi Aramco's HUMAIN joint venture
      represents Groq's largest single commercial commitment by dollar value: a $1.5 billion infrastructure agreement to
      power Saudi Arabia's national AI compute ambitions, with Groq providing LPU capacity as the preferred inference
      accelerator. The U.S. Department of Energy deployed Groq hardware alongside Cerebras at Argonne National
      Laboratory for AI inference workloads, providing federal-sector credibility and a high-visibility reference
      deployment for regulated-environment procurement. CERN, the European particle physics consortium, deployed Groq
      infrastructure for data analysis tasks, broadening the scientific computing vertical. IBM selected GroqCloud for
      enterprise AI applications, signaling tier-1 enterprise credibility. India's Department of Telecommunications
      selected Groq for national telecom AI workloads in 2025. The common thread across all named enterprise deployments
      is speed: every public customer rationale cites inference throughput or deterministic latency as the primary
      selection criterion. However, no named customer has published quantified ROI, contract value, NRR, or renewal
      data, limiting the depth of outcome-level diligence possible from public sources.
