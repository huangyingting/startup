sections:
  - id: S01
    title: LPU Architecture and Technical Innovation
    body: >-
      Groq's Language Processing Unit (LPU) is a purpose-built application-specific integrated circuit (ASIC) designed
      exclusively for AI inference — not training. The foundational architectural insight behind the LPU is that
      GPU-based inference is bottlenecked not by compute FLOPS but by memory bandwidth: loading model weights from DRAM
      between token generation steps creates the latency that GPUs cannot eliminate. Groq's solution is an SRAM-centric
      design in which the entire model computation graph is mapped to on-chip SRAM, eliminating the DRAM read cycle per
      token. The LPU is a single-core architecture with no cache hierarchy, no branch prediction, and no speculative
      execution. Instead, the GroqFlow compiler statically schedules every operation at compile time — a "kernel-free"
      execution model where the entire model's execution path is fully determined before hardware runs. This yields
      deterministic latency: any given model configuration always produces the same time-per-token regardless of batch
      size or concurrent request load, a property that GPU architectures cannot replicate because their dynamic
      schedulers introduce inherent variability. The first-generation LPU, manufactured on GlobalFoundries' 14nm
      process, has 230 million transistors and delivers 900 GB/s of on-chip memory bandwidth. The second-generation LPU,
      manufactured at Samsung's Taylor, Texas facility on the 4nm process node, was deployed in production in 2025 with
      higher transistor density and improved throughput, though detailed specifications remain undisclosed. GroqCards
      (PCIe accelerator cards) assemble into GroqNodes and GroqRacks — the latter being a 9U rack unit containing 8
      GroqNodes (64 GroqCards) delivering approximately 5.6 TFLOPS FP16 aggregate. Groq acquired Maxeler Technologies in
      March 2022, adding FPGA-based dataflow computing expertise and HPC intellectual property to its architecture
      foundation.
