  - id: S02
    title: Product Portfolio and Service Tiers
    body: >-
      Groq's commercial product portfolio spans two primary delivery models: GroqCloud, a cloud-based API inference
      service, and GroqRack, an on-premises LPU hardware deployment system. GroqCloud is the primary growth vehicle: an
      OpenAI-compatible REST API that accepts chat completions and audio transcription requests, requiring zero code
      changes for developers migrating from OpenAI or other compatible API providers. The service operates across three
      tiers — free (rate-limited developer access), growth/pro (higher rate limits, pay-as-you-go per token), and
      enterprise (SLA-backed, custom pricing, private deployments) — enabling a land-and-expand motion from
      experimentation to production. Supported open-source models include the Meta Llama 2 series (7B, 13B, 70B), Llama
      3 and Llama 3.1 (8B, 70B, 405B), Mistral 7B, Mixtral 8x7B, DeepSeek-R1 distilled variants, OpenAI Whisper for
      speech-to-text transcription, and Meta Llama Guard for content moderation. The Llama 3 405B model requires
      distribution across multiple GroqNodes due to the SRAM constraint of individual LPU chips, adding inter-node
      communication latency for the largest supported model. GroqRack serves enterprise and government customers
      requiring air-gapped or on-premises deployments, bundled with KQUE — Groq's high-density cooling and power
      delivery system designed for data center rack integration. In March 2024, Groq acquired Definitive Intelligence,
      adding AI analytics and natural language business intelligence capabilities to the GroqCloud platform, expanding
      the product scope from pure inference API toward analytics use cases, though integration maturity is not publicly
      documented.
