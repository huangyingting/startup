  - id: S04
    title: Performance Benchmarks, Reliability, and Technical Risks
    body: >-
      Groq's documented performance leadership for mid-size LLM inference is supported by independent benchmark data.
      ArtificialAnalysis.ai recorded 241 tokens per second for Llama 2 70B on GroqCloud in January 2024 — the highest
      throughput measured across all tested inference providers at that time, when GPU alternatives delivered fewer than
      50 tokens per second for the same model. By November 2024, GroqCloud achieved 800-plus tokens per second for Llama
      3.1 8B. Groq internally claims 1,000-plus tokens per second for open-source models in the 20-billion-parameter
      equivalent range. Time to first token (TTFT) on GroqCloud is approximately 50 milliseconds, best-in-class for
      latency-sensitive applications such as real-time AI agents and voice interfaces. Groq claims 20x inference speed
      advantage over the NVIDIA H100, but ArtificialAnalysis data from October 2025 shows Cerebras WSE-3 outperforming
      Groq for models with 70 billion or more parameters, while Groq leads for the 7-to-70 billion parameter range. The
      primary structural technical risk is the SRAM architecture ceiling: on-chip SRAM is expensive per bit to scale,
      constraining the maximum model size that a single GroqCard can serve without distribution across multiple nodes.
      This creates an inverse relationship between the LPU speed advantage and model size — frontier models with
      100B-plus parameters attract the most commercial interest but are exactly where Groq's advantage is weakest
      relative to Cerebras WSE-3 and GPU-based alternatives. Additional risks include supply chain concentration at
      Samsung's Taylor TX facility for Gen2 LPU wafers, the complete absence of public SOC 2 Type II or FedRAMP
      certifications limiting regulated enterprise procurement, and the low switching cost created by the
      OpenAI-compatible API — the same feature driving adoption also makes it trivial for customers to migrate to
      competing providers offering price or capability improvements.
