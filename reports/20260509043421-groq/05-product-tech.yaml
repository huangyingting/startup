  evidenceGaps:
    - type: missing-source
      severity: material
      topic: GroqCloud compliance certifications — SOC 2, FedRAMP, HIPAA BAA
      missingEvidence: >-
        Groq has not publicly confirmed SOC 2 Type II, FedRAMP authorization, or HIPAA BAA availability for GroqCloud.
        No trust center, compliance documentation, or certification audit reports are publicly accessible as of May
        2026.
      whyItMatters: >-
        The absence of documented compliance certifications blocks regulated enterprise procurement in financial
        services, healthcare, and government — segments where Cerebras and SambaNova have deeper established
        relationships with national labs and federal agencies.
      diligencePath: >-
        Request Groq's current compliance certification portfolio, ongoing audit status, and roadmap timeline from legal
        and security leadership. Check FedRAMP.gov marketplace for any listed Groq services.
      relatedQuestionRefs:
        - QE020
    - type: missing-source
      severity: material
      topic: Gen2 LPU detailed technical specifications and SRAM capacity per chip
      missingEvidence: >-
        Groq confirmed the Gen2 LPU uses Samsung 4nm but has not publicly disclosed transistor count, on-chip SRAM
        capacity per chip, memory bandwidth, or peak throughput. The model-size ceiling for a single Gen2 LPU chip is
        therefore unconfirmed.
      whyItMatters: >-
        SRAM capacity per chip is the binding constraint on supported model size. Without Gen2 specs, it is impossible
        to assess whether the Samsung 4nm generation meaningfully expands the model-size ceiling versus Gen1 or whether
        distribution overhead for 70B-plus models is reduced.
      diligencePath: >-
        Request Gen2 LPU architecture datasheet or engineering briefing from Groq hardware team. Cross-check against
        Samsung S4 process node partner specifications for context on achievable SRAM density.
      relatedQuestionRefs:
        - QE017
    - type: private-evidence-only
      severity: material
      topic: SRAM per-bit cost trajectory and GroqCloud cost-per-token roadmap vs. GPU HBM
      missingEvidence: >-
        Groq does not publicly disclose SRAM chip cost, wafer cost, or cost-per-token for GroqCloud inference. The
        relative trajectory of SRAM costs versus GPU HBM (which is declining with scale) is not quantified in any public
        Groq communication.
      whyItMatters: >-
        If HBM costs decline faster than SRAM costs, Groq's cost-per-token advantage could compress even if speed
        leadership is maintained, threatening pricing sustainability and investor economics over a 3–5 year horizon.
      diligencePath: >-
        Request Groq's internal cost-per-token COGS, SRAM procurement cost roadmap, and gross margin per inference tier
        from finance leadership. Compare against public HBM cost trajectory projections from semiconductor analysts.
      relatedQuestionRefs:
        - QE025
    - type: missing-source
      severity: minor
      topic: Samsung Taylor TX wafer allocation agreements and alternative foundry qualification
      missingEvidence: >-
        Groq has not publicly confirmed long-term wafer allocation contracts with Samsung for Gen2 LPU production
        volume, nor disclosed whether any alternative 4nm foundry is being qualified as a backup source.
      whyItMatters: >-
        Single-foundry concentration at Samsung Taylor TX creates production continuity risk if yield issues,
        geopolitical disruptions, or capacity reallocation occur. The risk is structural until a second source is
        qualified.
      diligencePath: >-
        Request supply agreement documentation confirming wafer allocation timeline, volume commitments, and alternative
        fab qualification status from Groq operations and supply chain leadership.
      relatedQuestionRefs:
        - QE018
    - type: missing-source
      severity: minor
      topic: GroqCloud developer-to-paid conversion and cohort retention metrics
      missingEvidence: >-
        Groq does not disclose paid user counts, developer-to-paid conversion rates, D7/D30/D90 retention, or cohort
        metrics for GroqCloud. The 2.8 million developer figure represents cumulative registrations only with no active
        or monetized user denominator.
      whyItMatters: >-
        Developer adoption velocity is Groq's primary growth narrative for GroqCloud. Without conversion and retention
        data, the monetizable proportion of the developer base is unknown, making revenue forecasting highly uncertain.
      diligencePath: >-
        Request cohort analysis from Groq growth team: activation rates, D7/D30/D90 retention, free-to-paid conversion,
        and enterprise ACV data. Benchmark against industry API platform conversion norms.
      relatedQuestionRefs:
        - QE013
        - QE019
callouts:
  - id: CAL001
    type: strength
    title: Deterministic LPU Architecture Is a Genuine and Defensible Technical Moat for Mid-Size LLM Inference
    body: >-
      Groq's LPU architecture represents a fundamentally different approach to AI inference compared to GPU-based
      alternatives: statically-scheduled, SRAM-centric, and fully deterministic. This design yields time-to-first-token
      and throughput benchmarks for 7B–70B parameter models that GPU architectures structurally cannot replicate without
      fundamental redesign, because GPU scheduling latency is an inherent property of their dynamic execution model, not
      a configuration parameter. Independent benchmark data from ArtificialAnalysis (241 tokens per second for Llama 2
      70B in January 2024, when the nearest GPU alternative delivered fewer than 50 tokens per second) confirms the
      performance advantage is real and substantial for the target model size range. The GroqFlow compiler's static
      scheduling also delivers a predictable, reproducible performance characteristic that enterprises running
      latency-sensitive production workloads value independently of raw throughput numbers. This moat is durable in the
      near-to-medium term because it is rooted in silicon design and compiler technology — not tunable parameters that
      competitors can replicate through software optimization alone.
    claimRefs:
      - CE001
      - CE007
      - CE008
      - CE012
  - id: CAL002
    type: risk
    title: SRAM Ceiling and Cost Economics Are the Most Material Technical Diligence Risks
    body: >-
      The SRAM-centric architecture that makes the LPU fast for mid-size models creates a structural ceiling for large
      model inference. Models exceeding approximately 70–80 billion parameters require distribution across multiple
      GroqNodes, adding inter-node communication latency and reducing the single-system throughput advantage that is
      Groq's primary competitive claim. ArtificialAnalysis data from October 2025 shows Cerebras WSE-3 outperforming
      Groq for 70B-plus parameter models — exactly the frontier where commercial interest and average contract values
      are highest. Compounding this, SRAM costs significantly more per bit than DRAM and HBM, and as HBM costs decline
      with process maturity and volume, Groq's cost-per-token advantage may compress even if speed leadership is
      maintained for mid-size models. Groq has not publicly disclosed Gen2 LPU SRAM capacity, making it impossible to
      assess whether the Samsung 4nm generation materially resolves the model-size ceiling. The combination of a size
      ceiling today, an uncertain cost roadmap, and an undisclosed Gen2 architectural specification is the most material
      set of technical diligence gaps for prospective investors evaluating long-term competitive durability.
    claimRefs:
      - CE025
      - CE028
      - CE031
      - CE011
