  claims:
    - id: CE001
      statement: >-
        The Groq LPU is a purpose-built ASIC designed exclusively for AI inference (not training), employing a
        single-core deterministic architecture with no cache hierarchy, no branch prediction, and no speculative
        execution.
      type: observed
      topic: LPU core architecture
      sourceRefs:
        - SE001
        - SE005
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QE001
        - QE002
    - id: CE002
      statement: >-
        The LPU uses an SRAM-centric memory architecture in which the entire model computation graph is mapped to
        on-chip SRAM, eliminating DRAM bandwidth as a per-token inference bottleneck.
      type: observed
      topic: LPU SRAM memory architecture
      sourceRefs:
        - SE005
        - SE009
      confidence: high
      freshness: recent
      answersQuestionRefs:
        - QE002
