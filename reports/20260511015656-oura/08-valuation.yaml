  - id: scenarios
    title: "Bull / Base / Bear Scenario Analysis"
    body: >-
      Three valuation scenarios are constructed from observable revenue trajectory, competitive
      dynamics, and comparable exit multiples. Each scenario incorporates explicit revenue,
      margin, and multiple assumptions with probability weighting informed by the evidence gathered
      in prior chapters.


      The bull case assumes Oura achieves $2 billion in 2026 revenue (the high end of CEO guidance),
      sustains 40 percent or better year-over-year growth into 2027, maintains subscriber retention
      in the high-80s, and expands its enterprise and pharma partnership pipeline. In this scenario,
      an IPO or strategic acquisition at 10x forward revenue is achievable — implying an exit
      valuation of $20 billion or more on projected 2028 revenue of $3 to $4 billion. The bull case
      requires no major competitive disruption from Samsung Galaxy Ring, successful monetization of
      AI health features, and clinical validation continuing to differentiate the product. Probability
      is estimated at 25 percent given the ambitious growth assumptions and unresolved competitive
      dynamics.


      The base case assumes $1.5 billion 2026 revenue (midpoint of guidance) with growth moderating
      to 25 to 30 percent through 2028 as Samsung Galaxy Ring captures a portion of new smart ring
      adopters. Subscriber retention holds in the mid-80s. An IPO at 8x forward revenue on $2.5
      billion 2028 revenue implies a $20 billion exit valuation — broadly consistent with the
      current $11 billion private mark. Probability is estimated at 50 percent.


      The bear case assumes Samsung Galaxy Ring's subscription-free model causes 15 to 20 percent
      subscriber churn in 2026, hardware units growth stalls at $800 million total revenue, and
      multiple compression accelerates as public markets apply a 4 to 5x multiple on a slowing
      hardware-led business. This implies a fair value of $3.5 to $4 billion — a 65 percent
      decline from the Series E mark and a potential down-round if Oura requires additional
      capital before reaching IPO. Probability is estimated at 25 percent. Weighted average
      implied value: 0.25 × $20B + 0.50 × $14B + 0.25 × $4B = $13 billion, directionally
      consistent with the $11 billion Series E mark but requiring execution on the base case.
