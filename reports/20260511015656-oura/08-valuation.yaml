  - id: thesis-breaks
    title: "Thesis-Break Triggers and Final Diligence Asks"
    body: >-
      The investment thesis contains four observable kill criteria that, if triggered, would
      downgrade the recommendation to PASS: (1) Samsung Galaxy Ring achieves greater than 20
      percent market share of new smart ring unit sales within 12 months, indicating structural
      subscription model threat; (2) Oura subscriber 12-month retention falls below 80 percent
      in any two consecutive quarters, indicating material churn acceleration; (3) 2026 revenue
      growth falls below 25 percent year-over-year, indicating the doubling growth trajectory
      has stalled; (4) a regulatory enforcement action (FDA, FTC, or GDPR authority) materially
      disrupts operations, subscription practices, or data handling.


      Conversely, three signals would support upgrading the recommendation to a conditional BUY:
      (1) transparent disclosure of audited revenue, gross margin by segment, and subscriber
      cohort analysis showing retention above 85 percent; (2) a Series F or pre-IPO round at a
      valuation materially below $11 billion presenting a discounted entry point; (3) a strategic
      acquirer announcement (pharma, insurer, or major consumer platform) offering a control
      premium above the current mark.


      The six diligence asks identified below are the minimum threshold for underwriting confidence
      in a follow-on or new commitment at Series E valuation. The two blocking items are subscriber
      cohort analysis (confirming retention in the context of Samsung competition) and 2025 audited
      revenue (confirming the $1 billion growth trajectory). Without these, the appropriate posture
      remains TRACK rather than BUY regardless of other positive signals.
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
