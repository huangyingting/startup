        Ring launched in July 2024. The company states high-80s 12-month retention but does not
        disclose whether retention has held for cohorts acquired in H2 2024 and 2025 in the
        competitive environment. This is the single most critical unknown for the subscription
        model valuation thesis and is exclusively available in the company's data room.
