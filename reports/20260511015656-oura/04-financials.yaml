company:
  name: "Oura"
chapter:
  number: 4
  title: "Financials"
  summary: >-
    Oura's financials represent a rare consumer hardware-plus-subscription success story at scale. The company
    reported $500M+ in 2024 revenue (company-stated, doubling from ~$250M in 2023) and was on track to surpass
    $1B in 2025 — a second consecutive doubling — with CEO Tom Hale projecting $1.5–2B in 2026 sales. Revenue
    mixes approximately 80% hardware (ring sales at $299–$549) and 20% subscription ($5.99/month Oura Membership),
    with 2M paying subscribers as of late 2025 and 12-month retention in the high-80s percent range. The company
    has confirmed it reached profitability in 2024. With $1.5B total raised (including a $875M Series E in October
    2025 at an $11B valuation plus a $250M revolving credit facility), capital adequacy is robust for an 18–36
    month runway. Five acquisitions (Sparta Science, Veri, Proxy, Doublepoint, Galen AI) and US manufacturing
    opening in Fort Worth in 2026 represent significant capital commitments. Key diligence gaps remain: exact gross
    margins by segment, monthly burn rate, revenue concentration by customer, international revenue breakdown, and
    the absence of audited financials as a private company. A class-action lawsuit over subscription auto-renewal
    practices introduces regulatory and financial-reputation risk.

sections:
  - id: revenue-model
    title: "Revenue Model and Streams"
    body: >
      Oura operates a hardware-plus-subscription revenue architecture with three distinct streams.
      Primary revenue comes from hardware sales: the Oura Ring 4 is priced at $299–$399 for titanium
      variants and $499 for ceramic, sold direct-to-consumer through ouraring.com and via 4,000+ retail
      locations including Amazon, Target, and Apple Stores across 20+ countries. In 2024, Oura sold
      approximately 1.3 million rings, generating an estimated $390M in hardware revenue — roughly 80%
      of the company's $500M+ total revenue for the year.

      The second and strategically more important revenue pillar is the Oura Membership subscription
      at $5.99 per month (or $69.99 annually), which is required to unlock all health analytics and
      personalized insights beyond basic daily scores. With 2 million paying subscribers as of late 2025
      and 12-month retention rates in the high-80s, subscription revenue represented approximately 20%
      of total revenue — an estimated $110M in 2024 based on Sacra's analysis. Subscription gross
      margins are company-cited at approximately 68%, structurally higher than the hardware segment,
      creating a SaaS-like recurring-revenue flywheel that funds ongoing AI and product investment.

      The third revenue stream is B2B/enterprise: Oura for Business deploys rings and analytics
      dashboards to enterprise clients including the U.S. Department of Defense (the largest enterprise
      customer, with tens of thousands of rings deployed since 2019), the NBA, UFC, Medicare Advantage
      plan Essence Healthcare, and over 1,000 API/ecosystem partners. Enterprise accounts have driven
      31% of new subscriptions in recent periods. Adjacent monetization includes the $99 Health Panels
      blood-test add-on (via Quest Diagnostics at ~2,000 US labs) and the Dexcom Stelo CGM sensor
      integration at $99. These add-on products increase revenue per user without requiring subscription
      price increases and are early but growing contributors to total ARPU.

      The aggregate revenue trajectory shows two consecutive years of approximately 100% growth:
      ~$250M in 2023 → $500M+ in 2024 → $1B+ targeted for 2025 → $1.5–2B projected for 2026.
      This compounding growth, combined with confirmed profitability in 2024, positions Oura's
      revenue quality as high — though all figures remain unaudited and company-stated.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI006
      - CI007
