      - TI002
    figureRefs:
      - FI001

  - id: unit-economics
    title: "Unit Economics and Margin Structure"
    body: >
      Oura's unit economics are shaped by the interplay between a high-ASP physical product and a
      high-margin software subscription. Hardware average selling price (ASP) ranges from $299 for
      the entry-level titanium Ring 4 to $499 for ceramic, implying a blended ASP of approximately
      $330–$370 based on Sacra's analysis of the 2024 product mix. Hardware gross margins are not
      publicly disclosed; for comparable consumer wearables (Garmin, Fitbit), hardware margins
      typically range from 45–65%. Oura's bill-of-materials for a precision smart ring — custom
      photoplethysmography sensors, NTC temperature sensor, accelerometer, gyroscope, and titanium
      or ceramic housing — is more complex than a standard fitness band, suggesting margins toward
      the lower end of this range (estimated 45–55%) without explicit confirmation.

      Subscription economics are more transparent. At $5.99/month (or $69.99/year), annual revenue
      per subscriber (ARPU) is approximately $72. With 2 million paying subscribers, this implies an
      annualized subscription ARR of approximately $144M — consistent with Sacra's $110M estimate for
      2024 (when the subscriber base averaged ~1.5M through the year as it doubled from ~1M to 2M).
      The company has stated subscription gross margins of approximately 68%, yielding an estimated
      $97M in subscription gross profit annually at the 2025 run-rate. Twelve-month subscriber
      retention in the "high-80s" percent is industry-leading for consumer hardware subscriptions,
      implying LTV well above CAC.

      Customer acquisition dynamics favor digital and retail channels. Oura's retail expansion to
      Target, Amazon, and Apple Stores in 2024 reduced reliance on DTC, improving distribution
      economics. Enterprise (B2B) subscriptions are reported to be growing rapidly, representing
      31% of new subscribers — these carry higher CAC but likely higher retention given institutional
      use cases. The company has not disclosed blended CAC, LTV/CAC ratios, or the split between
      consumer and enterprise gross margins.

      Key unit-economics gaps include: hardware COGS and bill-of-materials data, blended gross
      margin combining hardware and subscription, customer acquisition cost by channel, and the
      contribution margin of enterprise accounts relative to consumer DTC. These are standard
      data-room items that prevent a fully informed financial verdict.
