  - id: capital-adequacy
    title: "Capital Adequacy and Financial Position"
    body: >
      Oura's capital adequacy is exceptionally strong relative to its current revenue scale. Total
      capital raised is approximately $1.5 billion across equity rounds and a revolving credit
      facility, with the largest infusion being the October 2025 Series E: $875M in equity led by
      Fidelity Management & Research Company, with significant participation from new investor ICONIQ
      Growth and contributions from Whale Rock Capital and Atreides Management, valuing the company
      at approximately $11 billion. This followed the December 2024 Series D ($200M at $5.2B
      valuation, led by Fidelity with Dexcom as strategic co-investor).

      Supplementing the equity rounds, Oura secured a $250M revolving credit facility in September
      2025 from a syndicate of six banks: JPMorgan Chase, Goldman Sachs, Wells Fargo, Citi, Barclays,
      and Bank of America. This credit facility provides operational liquidity without additional
      equity dilution and is typical for companies scaling hardware manufacturing. With $1B+ in annual
      revenue and confirmed profitability at the company level, Oura's cash consumption per unit
      revenue is likely declining — but exact monthly burn rate and net income remain undisclosed.

      Prior funding rounds totaled approximately $148.3M from seed (2015) through Series C (2021),
      bringing total equity funding to roughly $1.3B before the credit facility. The Series C ($100M
      in May 2021, led by The Chernin Group and Elysian Park) brought the total to $148.3M and was
      the last round before the strategic Dexcom $75M investment (November 2024) that valued Oura at
      $5B+ ahead of the formal Series D.

      Use of funds from the Series E is stated as: AI and product innovation, global distribution
      expansion, new health features, US manufacturing scale-up (Fort Worth, Texas facility opening
      2026), and M&A to extend capabilities. Five acquisitions to date — Sparta Science (performance
      analytics), Veri (metabolic health), Proxy (access control), Doublepoint (biometric gesture AI),
      and Galen AI (clinical data unification) — have already consumed capital. The combined
      equity-plus-credit capital structure provides 18–36 months of operational runway assuming
      $100–200M annual capex and M&A spend, without further fundraising.

      Oura's shift from a Finnish entity to a US-domiciled parent company (announced 2026) simplifies
      governance and tax structure for the eventual IPO pathway, signaling management's expectations
      of public-market readiness within 2–4 years.
