callouts:
  - type: strength
    title: "Confirmed profitability at scale"
    body: >-
      CEO Tom Hale explicitly confirmed profitability to FierceHealthcare in December 2024, as Oura
      reached $500M+ in annual revenue. Sustained 100% year-over-year growth with positive unit
      economics is rare for hardware-plus-subscription companies at this stage.
    claimRefs:
      - CI010
      - CI001
  - type: risk
    title: "Subscription auto-renewal class action"
    body: >-
      A class-action lawsuit filed in California alleges Oura violated the state's Automatic Renewal
      Law through subscription billing practices. If successful, the action could require retroactive
      refunds, force changes to auto-renewal flows, and negatively impact subscription conversion
      and revenue recognition. This is an adverse financial risk not yet reflected in company
      financial projections.
    claimRefs:
      - CI038
  - type: risk
    title: "Valuation multiple requires sustained hypergrowth"
    body: >-
      At ~$11B valuation against ~$1B in 2025 estimated revenue, Oura trades at approximately 11x
      revenue — a multiple that implies continued 50–100% annual growth for 3+ years. Any deceleration
      in ring sales, subscriber growth, or competitive pricing pressure (Samsung Galaxy Ring's
      no-subscription model) could compress the multiple significantly.
    claimRefs:
      - CI035
      - CI036
  - type: insight
    title: "Subscription revenue at 20% — room to grow as flywheel compounds"
    body: >-
      Subscription at 20% of revenue with 2M subscribers and $5.99/month yields ~$144M ARR. As the
      installed base grows (5.5M rings sold, ~36% subscription penetration), the share of recurring
      revenue will naturally increase, improving revenue quality and reducing dependence on new
      hardware units sold.
    claimRefs:
      - CI003
      - CI004
      - CI005
  - type: assumption
    title: "All revenue figures are unaudited company-stated or estimated"
    body: >-
      No independently audited financial statements exist for Oura as a private company. All revenue
      figures in this chapter — whether company-stated or third-party estimated — carry inherent
      uncertainty and may differ from GAAP-audited results. The financial analysis here is for
      diligence orientation, not investment-grade reliance.
    claimRefs:
      - CI029
      - CI030

