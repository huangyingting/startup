    reason: >-
      Sources SI013 (Finsmes, 403 blocked) and SI024 (AInvest, js-only empty) were attempted
      through fetch-url but returned non-content responses; their URLs, dates, and metadata are
      based on the published record and corroborated by multiple other sources covering the same events.
      SI025 references FierceHealthcare profitability coverage confirmed through SI006.
