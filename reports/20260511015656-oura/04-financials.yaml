        - QI019
      relatedTableRefs: []

acknowledgedWarnings:
  - dimension: tableNotes
    reason: >-
      Confidence, methodology, and gap columns in the unit economics and capital adequacy tables
      serve as inline caveats for all estimates; adding redundant table-level notes would
      duplicate this information without adding analytical value.
