  evidenceGaps:
    - id: EGI001
      topic: "Subscription churn and retention cohort data"
      description: >-
        Oura's exact subscription churn rate, monthly cohort retention curves, and involuntary
        churn (payment failure) rate are not publicly available. The company-stated "high-80s"
        12-month retention is a single data point insufficient for LTV modeling.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
        - QI021
      relatedTableRefs:
        - TI003

    - id: EGI002
      topic: "Gross margin by segment (hardware vs. subscription vs. B2B)"
      description: >-
        No audited or independently verified segment gross margin data exists for Oura.
        The company has stated subscription margins (~68%) but hardware COGS, B2B segment
        economics, and blended company gross margin remain estimated from industry benchmarks.
      severity: blocking
      type: private-evidence-only
      relatedQuestionRefs:
        - QI023
      relatedTableRefs:
        - TI003
        - TI005

    - id: EGI003
      topic: "Monthly burn rate and EBITDA magnitude"
      description: >-
        While Oura has confirmed company-level profitability qualitatively, no quantitative
        data on EBITDA, net income, operating cash flow, or monthly burn rate has been disclosed.
        This prevents assessment of capital efficiency and runway duration.
      severity: blocking
      type: private-evidence-only
      relatedQuestionRefs:
        - QI024
      relatedTableRefs:
        - TI004
        - TI005

    - id: EGI004
      topic: "Geographic revenue breakdown"
      description: >-
        Oura operates in 150+ countries with retail in 20+ markets, but no geographic revenue
        segmentation has been disclosed. Currency exposure, tax implications, and regional
        growth drivers are unknown.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
        - QI025
      relatedTableRefs:
        - TI005

    - id: EGI005
      topic: "LTV/CAC ratio and customer acquisition cost by channel"
      description: >-
        Oura does not disclose customer acquisition cost by channel (DTC, retail, enterprise)
        or LTV/CAC ratios. The rapid retail expansion (Amazon, Target, Apple Stores in 2024)
        likely shifted CAC dynamics materially; without this data, marketing ROI cannot be assessed.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
        - QI027
      relatedTableRefs:
        - TI003

    - id: EGI006
      topic: "Dexcom SEC filing details on Oura investment size and terms"
      description: >-
        Dexcom's Q4 2024 8-K earnings release mentions Oura partnership context but does not
        disclose specific investment terms, equity stake, board rights, or financial impact
        quantification. The $75M investment amount is from press releases, not SEC filing detail.
      severity: minor
      type: partial
      relatedQuestionRefs:
        - QI028
      relatedTableRefs: []

    - id: EGI007
      topic: "Samsung Galaxy Ring impact on Oura subscription conversion in 2026"
      description: >-
        Samsung's Galaxy Ring (launched 2024, no subscription fee, $399 price) creates a
        competitive benchmark against Oura's subscription model. No consumer survey data,
        Oura conversion rate impact, or competitive response pricing data is available to
        quantify this threat.
