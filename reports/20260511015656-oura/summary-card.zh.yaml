summary:
  headline: Oura 是智能戒指品类无可争议的龙头，临床级生物指标验证扎实，订阅收入基数也在扩大；但 $11B 估值对应估计 20-30x ARR，已经偏高， 投入资本前必须看到收入和留存透明度。
