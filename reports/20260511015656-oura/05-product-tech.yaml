  - id: health-algorithms
    title: "Health Algorithms and Scoring Engine"
    body: >
      Oura's health analytics engine processes raw sensor data from the ring into 30+ structured
      health metrics. Sleep staging is performed by a multi-parameter machine learning model that
      samples ring sensors at 250Hz during sleep to classify light, deep, REM, and awake periods.
      Heart rate variability is calculated using RMSSD (root mean square of successive RMS differences)
      from 5-minute nighttime sample windows — the method recommended by the Task Force of the European
      Society of Cardiology and the North American Society of Pacing and Electrophysiology.

      The Readiness Score is a composite metric combining the previous night's sleep data, resting
      heart rate recovery, HRV balance versus 3-month baseline, and body temperature deviation.
      The Cardiovascular Age (CVA) feature, launched in 2025, estimates arterial stiffness as a
      proxy for pulse wave velocity — a clinically validated marker of cardiovascular aging —
      without invasive measurement. Cardio Capacity estimates VO2 Max via a submaximal walking test
      algorithm, requiring no laboratory equipment. Daytime Stress monitoring extends sensor
      sampling into waking hours, tracking HRV, heart rate, and temperature fluctuations to classify
      physiological stress load. Resilience is a newer score that integrates recovery patterns across
      days to model stress adaptation capacity. These multi-modal, longitudinal algorithms are what
      differentiates Oura from simpler heart-rate-only trackers.
