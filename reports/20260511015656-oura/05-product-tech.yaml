  - id: roadmap-innovation
    title: "Product Roadmap and Innovation Pipeline"
    body: >
      Oura's innovation pipeline is fueled by two targeted acquisitions completed in 2024–2025 and
      the Oura Labs experimental platform. In October 2024, Oura acquired Doublepoint, a Helsinki-based
      AI startup with a team of four founders specializing in gesture recognition from biometric
      ring sensors. This acquisition positions Oura to develop touchless ring-based gesture
      interaction for connected devices — a potentially transformative input paradigm enabled by
      the ring form factor. In 2025, Oura acquired Galen AI, a clinical data unification platform
      founded by Stanford graduates, to accelerate integration of ring data with electronic health
      records and clinical workflows for B2B and hospital enterprise clients.

      Oura Labs serves as the consumer-facing innovation sandbox, letting willing users participate
      in experiments before features reach general availability. The Blood Pressure Profile Study
      is the highest-profile active experiment, exploring whether ring sensors can non-invasively
      estimate blood pressure — a feature that, if validated and cleared, would represent a major
      competitive differentiator. The Women's Health AI Model, released in February 2026, uses a
      purpose-built LLM trained on women's health data. Oura holds over 80% of the global smart ring
      market share (IDC estimate) with 5.5M+ total rings sold as of October 2025, providing a
      data flywheel that strengthens algorithm training and competitive positioning for future features.
