  - id: software-platform
    title: "Software Platform and Application Layer"
    body: >
      The Oura mobile application, available on iOS and Android, is organized into three primary tabs:
      Today (personalized daily insights and scores), Vitals (continuous metric streams including
      heart rate, HRV, and temperature), and My Health (longitudinal trend analysis and historical
      data). The app serves as the primary interface for the $5.99/month Oura Membership, which is
      required to unlock the full analytics suite beyond basic daily scores — members access advanced
      trends, comparisons against their baseline, integration data, and AI-powered features.

      Oura Advisor, the LLM-powered AI assistant launched in 2024, enables natural-language queries
      about personal health data. It was tested on more than one million messages prior to launch,
      achieving an 83% reliability rate for health question responses. Oura Labs is an experimental
      feature hub within the app that provides early-access features to willing users before
      general availability. Active Labs experiments as of early 2026 include the Blood Pressure
      Profile Study — a consumer research project exploring ring-based blood pressure estimation —
      and the Women's Health AI Model, added in February 2026, which applies a purpose-built large
      language model to women's health patterns including menstrual cycle tracking and hormonal
      recovery. These Labs features are clearly labeled as experimental and not for diagnostic use.
