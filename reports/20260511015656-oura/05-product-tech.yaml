chapter:
  number: 5
  letter: E
  title: "Product & Technology"
  summary: >-
    Oura's product-technology platform centers on the Ring 4, a fourth-generation smart ring launched
    October 2024 featuring the proprietary Smart Sensing architecture — an 18-path multi-wavelength
    PPG subsystem delivering a 120% improvement in SpO2 signal quality and 30% overall accuracy gains
    over Gen 3. The titanium-and-ceramic form factor (3.3–5.2g, 7.9mm wide, 2.88mm thick, up to 8-day
    battery, 100m water resistance) houses red/infrared LEDs for SpO2, green/infrared LEDs for heart
    rate and HRV, a digital temperature sensor, and a 3D accelerometer. The health analytics engine
    produces 30+ metrics including Readiness, Sleep, Activity, Daytime Stress, Cardiovascular Age
    (arterial stiffness proxy), and Cardio Capacity (VO2 Max estimation). A 2025 meta-analysis of six
    PSG-comparison studies (n=388) found no statistically significant difference between Oura Ring
    sleep staging and polysomnography. The iOS/Android app includes Oura Advisor, an LLM assistant
    tested on 1M+ messages with 83% reliability, and Oura Labs for experimental features. Health
    Panels provides 50-biomarker blood tests via Quest Diagnostics at $99, and Dexcom Stelo integration
    adds continuous glucose monitoring. Oura holds SOC 2 Type II, HIPAA, and GDPR certifications and
    operates a public API V2 (OAuth2) with 1,000+ partner integrations, though it is not FDA-cleared
    as a medical device. Acquisitions of Doublepoint (gesture AI) and Galen AI (clinical data
    unification) extend the innovation pipeline. Key diligence gaps include no peer-reviewed
    Cardio Capacity validation, no public API uptime SLA, limited developer-community signal, and
    complete absence of independent Ring 4 manufacturing yield or defect-rate data.

sections:
  - id: hardware-platform
    title: "Ring Hardware Platform"
    body: >
      The Oura Ring 4, launched in October 2024, represents a significant hardware redesign around the
      Smart Sensing architecture — a proprietary 18-path multi-wavelength PPG (photoplethysmography)
      subsystem. Where Gen 3 used a single light path, Ring 4 distributes six LEDs (red, infrared,
      and green wavelengths) across 18 signal paths to dramatically improve signal quality for SpO2,
      heart rate, and HRV measurements, claiming a 120% improvement in SpO2 signal quality and 30%
      overall accuracy improvement over its predecessor. The sensor module also includes a digital NTC
      temperature sensor for circadian and ovulation tracking, and a three-axis accelerometer for
      activity and sleep position detection.

      The physical form factor balances medical-grade data capture with wearability. The ring is
      available in sizes 4–15, weighing between 3.3g (size 4) and 5.2g (size 13–15). Dimensions are
      7.9mm wide and 2.88mm thick at the device body, with sensor bumps recessed to just 0.3mm
      (reduced from 1.3mm on Gen 3), improving ring-to-finger contact and wearer comfort. Battery
      life reaches up to 8 days on a single charge, and the ring is water-resistant to 100m. Materials
      include titanium in six color finishes (silver, black, gold, stealth, brushed titanium, and
      rose gold) and ceramic in four finishes, enabling premium positioning. Ring 4 is manufactured
      to consumer-electronics standards and retails at $299–$399 for titanium and $499 for ceramic.
