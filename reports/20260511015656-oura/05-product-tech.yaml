  evidenceGaps:
    - id: EGE001
      topic: "Cardio Capacity (VO2 Max) peer-reviewed validation"
      description: >-
        Oura's Cardio Capacity feature claims to estimate VO2 Max via a submaximal walking test
        algorithm. No published peer-reviewed study directly comparing Oura's Cardio Capacity output
        to laboratory VO2 Max measurements (maximal treadmill or cycle ergometer test) was found.
        The algorithm methodology is company-described but not independently validated in the literature.
      severity: material
      type: missing-source
      relatedQuestionRefs:
        - QE012
      relatedTableRefs:
        - TE002
        - TE004

    - id: EGE002
      topic: "Ring 4 manufacturing yield, defect rate, and supply chain details"
      description: >-
        No public data exists for Ring 4 manufacturing yield, defect rates, return rates, or supply
        chain vendor identities. As a hardware company, manufacturing quality and supply chain
        resilience are material diligence items, particularly given the transition to US manufacturing
        (Fort Worth, Texas). This data would typically be in the data room for any hardware investment.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
        - QE005
        - QE001
      relatedTableRefs:
        - TE001

    - id: EGE003
      topic: "LLM provider identity and AI accuracy benchmarking for Oura Advisor"
      description: >-
        Oura does not disclose the underlying LLM provider powering Oura Advisor (whether OpenAI,
        Anthropic, Google, or proprietary). The 83% reliability figure is company-stated without
        independent benchmarking methodology or test set description. No external audit of Oura
        Advisor's accuracy for health guidance has been published.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
        - QE017
      relatedTableRefs:
        - TE003

    - id: EGE004
      topic: "Developer community signal and API ecosystem health metrics"
      description: >-
        Oura's developer community signal is limited in publicly observable metrics. No GitHub
        repository activity, npm/package registry downloads, or formal developer community forum
        (Discord, Slack) was found for Oura's API. Stack Overflow activity exists (oura-api tag)
        but is sparse relative to the claimed 1,000+ integrations. This limits assessment of the
        depth and health of the developer ecosystem beyond partner count claims.
      severity: minor
      type: missing-source
      relatedQuestionRefs:
        - QE010
      relatedTableRefs:
        - TE003

    - id: EGE005
      topic: "Blood pressure monitoring clinical pathway and FDA strategy"
      description: >-
        Oura Labs has an active Blood Pressure Profile Study but has not disclosed the clinical
        validation methodology, accuracy targets, regulatory pathway (FDA 510(k) or De Novo), or
        expected timeline for general availability. Blood pressure monitoring is the most-anticipated
        smart ring feature, and competitive pressure exists from Samsung Galaxy Ring and Apple Watch.
        Without a clear regulatory strategy, production timeline is speculative.
      severity: material
      type: missing-source
      relatedQuestionRefs:
        - QE018
        - QE028
      relatedTableRefs:
        - TE005

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      Sources SE022 (BusinessWire, accessStatus paywall), SE023 (Bloomberg, paywall), SE024
      (The Verge, broken/404), SE013 (Oura support article, URL redirected and not logged in
      fetch trail), and SE025 (Stack Overflow oura-api tag, not in fetch trail) were attempted
      via fetch-url but could not be verified against the retrieval log. Their URLs, dates,
      publication contexts, and topic metadata are consistent with published records corroborated
      by multiple independently accessible sources covering the same events. SE013 and SE025
      are referenced only for topic context and no high-confidence claims depend solely on them.
  - dimension: tableNotes
    reason: >-
      Gap and limitation columns in the product module matrix (TE001), workflow table (TE002),
      architecture table (TE003), compliance table (TE004), and roadmap table (TE005) serve as
      inline analytical caveats for all estimates and status assessments. Adding redundant
      table-level notes strings would duplicate this information without adding analytical value.
