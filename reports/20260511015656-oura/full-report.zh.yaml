          notes: 综合分析师共识（0.8–20 亿美元区间）与 Oura CEO 营收指引（2025 年约 10 亿美元）的中间值估算
    approximationNotes: >-
      SAM 和 SOM 均为推算值，非直接引用自单一分析师来源。TAM 来自 Grand View Research（2026 年预测）；SAM 通过 Mordor Intelligence
      的智能手表/健身细分比例，将健康/消费份额应用于 TAM 估算得出；SOM 以 Oura CEO 约 10 亿美元的 2025 年营收指引和分析师对智能戒指市场 0.8–20
      亿美元的估算为锚点。所有数据均应视为数量级近似值，待独立核实的智能戒指市场规模数据出炉后再做修订。
