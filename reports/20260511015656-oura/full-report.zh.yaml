      - number: '4.3'
        title: 资本充足性与财务状况
        blocks:
          - type: paragraph
            body: >
              以当前营收规模衡量，Oura 的资本充足性异常强劲。累计融资约 $15 亿，来源包括多轮股权融资和一笔循环信贷额度。规模最大的一笔是 2025 年 10 月的 E 轮融资：$8.75 亿股权，由 Fidelity
              Management & Research Company 领投，新投资方 ICONIQ Growth 大额跟投，Whale Rock Capital 和 Atreides Management
              参与其中，公司估值约 $110 亿。此前是 2024 年 12 月的 D 轮（$2 亿，估值 $52 亿，Fidelity 领投，Dexcom 作为战略联合投资方）。

              股权融资之外，Oura 于 2025 年 9 月从六家银行财团获得 $2.5 亿循环信贷额度，参与方包括 JPMorgan Chase、Goldman Sachs、Wells
              Fargo、Citi、Barclays 和 Bank of America。该信贷安排在不稀释股权的前提下补充运营流动性，对于规模扩张中的硬件制造商而言属于常规操作。年收入超过 $10
              亿、公司层面已确认盈利，Oura 每单位收入的资金消耗可能在持续下降——但每月实际燃烧率和净利润仍未披露。

              此前历轮融资从 2015 年种子轮到 2021 年 C 轮共计约 $1.483 亿，将 E 轮前总股权融资累计至约 $13 亿。C 轮（2021 年 5 月，$1 亿，The Chernin Group 和
              Elysian Park 领投）是 Dexcom $7,500 万战略投资（2024 年 11 月，为正式 D 轮前给 Oura 定价 $50 亿+）之前的最后一轮。

              E 轮资金用途：AI 与产品创新、全球分销扩张、新健康功能、美国制造产能建设（德克萨斯州沃思堡工厂，2026 年开业），以及通过并购拓展能力。已完成的五笔收购——Sparta
              Science（运动表现分析）、Veri（代谢健康）、Proxy（门禁控制）、Doublepoint（生物特征手势 AI）和 Galen
              AI（临床数据整合）——均已消耗资本。股权加信贷的组合资本结构在假设年度资本开支和并购支出 $1–2 亿的前提下，可提供 18–36 个月的运营跑道，无需进一步融资。

              Oura 将实体从芬兰迁至美国母公司（2026 年宣布），简化了治理结构与税务架构，为潜在 IPO 做铺垫，表明管理层预期在 2–4 年内具备上市条件。
