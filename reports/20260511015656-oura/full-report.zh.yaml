      - number: '4.2'
        title: 单位经济学与利润结构
        blocks:
          - type: paragraph
            body: >
              Oura 的单位经济学由高 ASP 实体产品与高毛利软件订阅共同塑造。硬件平均售价（ASP）从入门级钛金属 Ring 4 的 $299 到陶瓷版的 $499；Sacra 对 2024 年产品结构的分析显示，混合
              ASP 约为 $330–$370。硬件毛利率未作公开披露；可比消费级可穿戴品牌（Garmin、Fitbit）的硬件毛利率通常在 45–65% 之间。Oura
              智能戒指的物料清单——定制光电容积脉搏描记（PPG）传感器、NTC 温度传感器、加速度计、陀螺仪、钛或陶瓷外壳——复杂程度超过普通运动手环，意味着毛利率可能偏低（估计 45–55%），但无明确确认。

              订阅经济学更为透明。按 $5.99/月（或 $69.99/年）计算，每位订阅用户年收入（ARPU）约 $72。200 万付费用户对应年化订阅 ARR 约 $144M——与 Sacra 对 2024 年的
              $110M 估算一致（当年订阅用户从约 100 万增至 200 万，全年平均约 150 万）。公司披露订阅毛利率约 68%，以 2025 年运行速率计，年化订阅毛利润估约 $97M。12 个月订阅留存率处于"高
              80% 区间"，在消费硬件订阅领域属于行业领先水平，意味着 LTV 远高于 CAC。

              获客方面，数字渠道与零售渠道并重。2024 年进驻 Target、Amazon 和 Apple Stores，减少了对 DTC 的依赖，改善了分销经济性。B2B 订阅据报增长迅猛，贡献了 31%
              的新增用户——此类用户 CAC 更高，但机构使用场景可能带来更高留存。公司尚未披露混合 CAC、LTV/CAC 比率，以及消费者与企业毛利率的分拆数据。

              核心单位经济学缺口包括：硬件成本与物料清单数据、硬件与订阅合并毛利率、分渠道获客成本，以及企业账户相对于消费者 DTC 的贡献利润。这些均是标准尽调数据室所需材料，缺失则无法作出完整的财务判断。
