      - number: '5.4'
        title: 集成生态与 API
        blocks:
          - type: paragraph
            body: >
              Oura 提供基于 OAuth2 认证的公开 REST API（V2），允许第三方开发者和企业合作伙伴在用户授权下访问个人健康数据。V1 于 2024 年 1 月正式退役，所有集成须迁移至 V2。生态已扩展至逾
              1,000 个合作伙伴集成，覆盖健康应用、临床研究平台、企业 HR 工具、健身应用和健康监测服务。

              战略意义最大的集成是 Dexcom Stelo——面向消费者的持续葡萄糖监测（CGM）传感器。Dexcom Stelo 数据接入 Oura
              应用后，用户可将连续葡萄糖水平与睡眠质量、HRV、运动等戒指生物特征数据关联，构建出任何单一产品都无法实现的多模态代谢健康视图。该集成源于 Dexcom 2024 年 11 月对 Oura 的 $7,500
              万战略投资。

              Health Panels 于 2025 年第四季度推出，是通过 Quest Diagnostics 合作提供的血液生物标志物检测附加服务，约 $99 可在全美约 2,000 家 Quest
              Diagnostics 实验室完成 50 项生物标志物血液检测。SteadyMD 提供结果解读的远程医疗层。Oura 还与 Apple Health、Google Fit 和 Samsung Health
              实现双向集成，支持跨设备数据共享，以及与企业健康平台的 B2B 对接。
