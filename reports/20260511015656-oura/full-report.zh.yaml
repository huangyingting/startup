chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、使命与运营模式
        blocks:
          - type: paragraph
            body: >
              Oura Health Ltd. 2013 年在芬兰奥卢注册成立，公开使命是通过 Oura Ring
              为用户提供个性化、具有临床意义的健康洞见——这枚佩戴于手指而非手腕的消费级智能戒指，持续采集睡眠分期、心率变异性、静息心率、皮肤温度、血氧及活动数据。此后公司总部迁至美国加利福尼亚州旧金山，但主要研发力量仍留在奥卢，形成消费类可穿戴企业中少见的双中心运营格局。


              运营模式有两大收入支柱：（1）每枚 $349–$499 的硬件销售；（2）配套应用中高级健康分析功能几乎全部依托的 Oura Membership 循环订阅，月费 $5.99（年费 $69.99）。这一硬件加
              SaaS 架构随 2021–2022 年 Gen 3 戒指全面落地，已成为财务动能与投资人信心的核心驱动。管理层披露订阅毛利率约 68%，显著高于可穿戴行业均值，年度订阅留存率为 89%。


              2025 年 Oura 营收接近 $10 亿，CEO Tom Hale 公开预测 2026 年销售额将达 $15–$20 亿，意味着连续第二年接近翻倍。公司全球雇员约 1,000–1,250
              人，企业及临床客户阵营持续壮大，包括 NBA、UFC、Cleveland Clinic，以及最新加入的美国国防部。企业/B2B 部分目前贡献约 31% 的新增订阅，进一步降低对纯消费渠道的依赖。2024 年 10
              月推出的 Gen 4 戒指全钛结构、搭载 Smart Sensing，是当前旗舰产品；Gen 5 已出现在 FCC 备案中，普遍预期于 2026 年底发布。
