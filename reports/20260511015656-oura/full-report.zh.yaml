      - number: '8.3'
        title: 投资建议：TRACK
        blocks:
          - type: paragraph
            body: >-
              投资建议为 TRACK（观察），置信度中等。投资逻辑建立在以下基础之上：Oura 在智能戒指品类拥有领导地位，付费订阅用户达 200 万，2024
              年已确认盈利，企业与临床合作管线持续扩张，经临床验证的传感器平台形成差异化壁垒，难以被同质化戒指竞品短期复制。反向逻辑集中于：Samsung Galaxy Ring
              免订阅模式带来的结构性挑战；未经审计的财务数据限制了精确承销；110 亿美元估值已充分定价高增长执行；2021 年峰值以来数字健康板块倍数压缩，预示公开市场重新定价的风险。


              110 亿美元估值溢价不低，但若基准情景收入走势（2026 年 15 亿美元、2028 年 25 亿美元）得以实现，则并非不合理。关键未知项包括：Samsung Galaxy Ring
              上市后确切的订阅流失率、硬件与订阅混合业务的综合毛利率，以及 IPO 时机构投资者能否对一家收入 70–80% 来自硬件的公司给出类软件的估值倍数。历史上健康科技
              IPO（Fitbit、iRhythm、Masimo）获得的倍数始终低于其私募轮估值，私募到公开市场的倍数压缩规律形成了执行窗口风险。


              最终给出 TRACK 而非 PASS 或 BUY，是因为机会真实存在，但需要进一步确认：透明的收入与增速披露、至少两个季度 Samsung Galaxy Ring 上市后的订阅留存数据，以及明确的 IPO
              申报时间表。若能以较 110 亿美元标记打八折至七折入场——可通过二级市场交易实现，或在竞争压力加剧时等待潜在下修融资——风险调整后回报可升入 BUY 门槛区间。若以 110 亿美元入场，基准情景下 3
              年持有期预期回报约为 1.3 倍，低于早期健康科技投资通常要求的 3 倍门槛。
