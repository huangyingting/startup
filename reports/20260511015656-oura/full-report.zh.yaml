      - number: '1.2'
        title: 创立历程与领导层
        blocks:
          - type: paragraph
            body: >
              Oura 由三位芬兰工程师于 2013 年创立：Petteri Lahtela（初任 CEO）、Kari Kivelä 和 Markku
              Koskela，三人均来自以奥卢为核心的芬兰电信与移动技术生态。早期研发全靠自筹，资金极为紧张——创始人曾数月无薪、动用个人信用卡维持运营。2015 年 Kickstarter 众筹筹得逾
              $650,000，大幅超额完成目标，同年 Gen 1 戒指在旧金山 Launch Festival 亮相，验证了产品方向。


              Tom Hale 于 2022 年接任 CEO，此前有 Macromedia、HomeAway 及 MomentiveAI
              的从业经历。他的加入标志着管理团队向职业化方向的刻意转型，以支撑公司进入规模扩张阶段。2026 年领导层包括：Michael Chapp（COO）、Holly Shelton（首席产品官）、Dorothy
              Kilroy（首席商务官）、Teemu Kurppa（软件 CTO）、Judy Gilbert（首席人才官）、Doug Sweeny（首席营销官）及 Adi Shammout（CISO）。联合创始人
              Lahtela 和 Kivelä 已淡出公开高管角色，其当前参与程度及董事会席位未在公开材料中披露，构成关键人员及治理信息缺口。


              董事会构成未公开披露。Fidelity、Forerunner Ventures、ICONIQ Capital 及可能的 Dexcom
              投资方代表料已入席，但尚未经公开来源确认。旧金山总部加奥卢研发的双中心结构，令公司在保留芬兰工程人才及跨大西洋协作上存在执行依赖风险。
