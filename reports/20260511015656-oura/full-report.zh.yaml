      - number: '5.6'
        title: 合规、安全与数据隐私
        blocks:
          - type: paragraph
            body: >
              Oura 的安全与合规能力对于一家消费级健康设备公司而言属于强劲水平，超出一般健康产品的法定要求。公司每年接受 SOC 2 Type II 审计，覆盖安全性、可用性和保密性等信任服务标准，并自愿每年委托第三方开展
              HIPAA 合规审计——值得注意的是，Oura 在法律上并非 HIPAA 涵盖实体，主动进行审计是为服务企业医疗客户。戒指、移动应用与云后端之间的所有传输数据均以 TLS 1.2 或更高版本加密；云端存储数据受
              AES-256 加密保护。Oura 隐私政策（2026 年 4 月最新更新）记录了符合 GDPR 要求的同意架构，要求用户明确授权数据处理。

              戒指被归类为一般健康设备（而非 FDA 监管医疗设备），既带来监管便利——当前功能无需 510(k) 或 De Novo 批准，也形成一项约束：Oura
              在法律上不能将任何功能宣传为诊断性或治疗性工具。这一监管定位与竞争对手（Samsung Galaxy Ring、Garmin）一致，但对于 B2B 医疗和 Medicare Advantage
              部署而言构成天花板——此类场景日益要求以 FDA 批准的数据输入支持临床决策。
