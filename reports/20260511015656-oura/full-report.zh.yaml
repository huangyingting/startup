      - number: '6.5'
        title: 负面信号与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Oura 面临多项需尽调关注的实质性客户端风险。

              隐私争议（2025 年）：2025 年 9 月，Oura 在发布沃思堡制造工厂公告时提及与 Palantir FedStart 平台合作服务美国国防部客户，由此引发大规模用户公开反弹。TikTok 上的用户指控
              Oura 将生物特征数据（包括女性月经周期数据）共享给政府和 Palantir。CEO Tom Hale 公开回应称相关担忧"完全夸大"，坚称仅国防部客户的隔离数据流经
              FedStart，Oura"永远不会将你的数据出售给任何人"。争议仍触发了明显的用户流失，多名用户公开宣布弃用戒指。鉴于政府访问的 HIPAA 豁免条款及后罗伊时代女性健康数据的政治敏感性，声誉风险依然居高。

              订阅付费墙反弹：Oura 随 Gen 3（2021 年）引入每月 $5.99
              会员要求时，遭遇大量用户强烈不满——这些用户认为自己为以前硬件已含的功能再次付费。该流失事件确立了一种规律：价格调整和功能门控可能引发社区不成比例的强烈反应。

              硬件可靠性问题：2025 年 12 月，ZDNet 援引 Reddit 报道了 Oura Ring 过热冒烟事件，其中一名用户起了水泡。Oura 将事件定性为"个例"（550
              万枚戒指中报告的两起），但报道造成了声誉风险。电池衰减问题也于 2025 年浮现，Ring 4 用户反映购买不到一年续航即降至官方宣传的 8 天以下。

              集中度风险：美国国防部是 Oura 最大的单一企业客户。该关系一旦因采购规则变更、安全审查问题或合同不续期而终止或受限，将对收入和可信度造成实质性打击。对 Apple App Store 和 Google
              Play 的平台依赖也构成针对分销政策变化的脆弱性。

              竞争压力：Samsung Galaxy Ring 于 2024 年推出，无需订阅，直接针对消费者对 Oura 最常见的反对意见。Apple Watch 和 Google Pixel Watch
              持续在相近价位提供丰富健康功能。订阅费敏感度若上升，或零订阅替代品获得可信认可，Oura"高 80%"的 12 个月留存率将面临下行压力。
