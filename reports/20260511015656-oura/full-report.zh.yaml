  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与来源
        blocks:
          - type: paragraph
            body: >
              Oura 采用硬件加订阅的双轨收入架构，共有三条清晰的变现线。一是硬件销售，也是当前主力。Oura Ring 4 钛金属版定价 $299–$399，陶瓷版 $499，通过 ouraring.com 直销及
              Target、Amazon、Apple Stores 等 4,000 余家零售渠道覆盖 20 余个国家。2024 年 Oura 累计售出约 130 万枚戒指，硬件收入估计约 $390M，占公司全年 $500M+
              总收入的约 80%。

              二是 Oura Membership 订阅，每月 $5.99（年付 $69.99）——这也是战略价值更高的一条线。订阅是解锁完整健康分析及个性化洞察的前提。截至 2025 年末，付费订阅用户达 200 万，12
              个月留存率处于高 80% 区间；Sacra 估计 2024 年订阅收入约 $110M，占总收入约 20%。公司披露订阅毛利率约 68%，结构性高于硬件，形成类 SaaS 的循环收入飞轮，为 AI
              与产品持续投入提供资金。

              三是 B2B/企业业务：Oura for Business 向企业客户部署戒指与分析仪表盘。最大单一企业客户是美国国防部——2019 年起累计部署数万枚；其余客户包括 NBA、UFC、Medicare
              Advantage 计划 Essence Healthcare 及逾 1,000 家 API/生态合作伙伴。企业账户贡献了近期 31% 的新增订阅。周边变现还包括 $99 的 Health Panels
              血液检测（经 Quest Diagnostics 约 2,000 家美国实验室提供）以及 $99 的 Dexcom Stelo CGM
              传感器集成——这些附加产品在无需提高订阅价格的前提下提升每用户收入，属于早期但增势明显的 ARPU 贡献者。

              整体收入轨迹呈现连续两年约 100% 增长：$250M（2023）→ $500M+（2024）→ 目标 $1B+（2025）→ 预测 $1.5–2B（2026）。上述复合增长叠加 2024 年已确认盈利，表明
              Oura 收入质量较高——但所有数据均未经审计，系公司自述。
