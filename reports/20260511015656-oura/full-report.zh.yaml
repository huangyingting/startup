  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 消费者细分与人群画像
        blocks:
          - type: paragraph
            body: >-
              Oura 的核心客群是大约 25–45 岁、自我认定为运动员、生物黑客或主动健康追求者的健康意识成年人——这一群体愿意为每日睡眠、准备度、运动和压力的生物特征洞察，支付 $299–$499 硬件费加每月
              $5.99–$6.00 的订阅费。名人效应放大了品牌认知度：Jennifer Aniston、Prince Harry、Kim Kardashian 均公开佩戴，科技领袖 Jack Dorsey、Michael
              Dell 和 Marc Benioff 是早期忠实用户。《时代》杂志将 Oura Ring 列入 2020 年全球 100 大最佳发明，契机是 NBA 新冠气泡部署，由此进入主流消费者视野。

              2025 年末，首席商务官 Dorothy Kilroy 公开指出，20 岁出头的女性已成为增速最快的客户细分。这一人口结构变化由 Oura
              女性健康平台驱动——月经周期追踪、孕期洞察、围绝经期检测和更年期洞察，将戒指从通用健康追踪器转变为女性健康数据伴侣。Oura 已与 Twentyeight Health、Midi
              Health、Evernow、Maven Clinic 和 Progyny 合作，将其数据嵌入临床女性健康工作流。

              社区活跃度对于硬件品牌而言异常强劲。r/OuraRing 讨论区据报拥有逾 200,000 名成员，分享个人生物特征数据、交流应用问题，形成有机口碑传播。随 Ring 4 推出的应用内社交层 Oura
              Circles 允许成员分享每日评分、相互比拼运动目标，强化每日使用习惯。App Store 评分在 4.5–4.8 星之间。PCMag 授予 Ring 4 编辑推荐（4.0/5），表彰其健康追踪的广度与精度。

              2026 年 5 月 Oura 官网确认其 HSA/FSA 资格，允许医疗储蓄账户用于购买戒指，拓宽了可寻址消费者群体。2025 年 Oura
              通过本地零售合作伙伴进入澳大利亚/新西兰、印度、墨西哥和阿联酋，下一步目标是西欧（英国、德国、法国、意大利）和亚太地区。
