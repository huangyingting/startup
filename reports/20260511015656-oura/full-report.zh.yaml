  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争概览与市场结构
        blocks:
          - type: paragraph
            body: >-
              Oura 所处的竞争环境由两个不同的威胁层次构成。第一层是直接智能戒指竞品——相同的形态因素、相同的全天候被动健康监测用途、相近的定价区间。第二层是邻近的健康可穿戴平台——尽管形态（手腕 vs.
              手指）和功能架构不同，但同样竞争健康意识消费者的注意力与消费预算。

              在直接智能戒指层，Samsung Galaxy Ring 是迄今影响最大的入局者。2024 年 7 月以 $399 无订阅上市，凭借 Samsung 全球制造与零售体系、与 Samsung Health 及
              Android Galaxy 生态的深度整合，以及能支撑有竞争力硬件定价的自有成本结构。Galaxy Ring 精准瞄准 Oura 的同类高端健康消费者，Wareable 和 Digital Trends
              的独立测试显示其睡眠追踪精度与 Oura Gen 4 大体相当，不过 Oura 在健康洞见深度和 iOS 兼容性上仍保有差异化价值。Ultrahuman Ring AIR（印度班加罗尔创立，$349，无订阅）和
              RingConn Gen 2（$299，无订阅）占据 $350 以下无订阅智能戒指细分，共同传递出一个消费偏好信号：无订阅戒指所有权是可行的市场形态。Oura 通过美国国际贸易委员会实施的 IP 执法——2025
              年成功对 Ultrahuman 和 RingConn 取得进口禁令，RingConn 其后和解支付专利授权费——表明 Oura 愿意动用法律手段保护智能戒指市场地位，并拖慢低价竞品在关键的美国市场规模化。

              在邻近可穿戴层，WHOOP 是商业模式上最接近的竞争对手：两者都是靠持续订阅变现的健康监测平台，都争夺愿意为生物指标洞见持续付费的高端健康消费者。不过两者在形态、功能侧重和品牌定位上差异明显。WHOOP
              采用无屏幕腕带而非戒指，主打高性能运动员和长寿健康爱好者，历来以恢复力和应激分析为核心，而非以睡眠为首要切入点。Apple Watch（Series 10 约
              $400–$800，无订阅）以全球最强的健康消费者生态撑腰——10 亿 iPhone 用户潜在买家、睡眠呼吸暂停检测及深度整合的 iOS HealthKit。Garmin 主导高端 GPS
              运动手表细分（$200–$1,000+，极少订阅费），在专业运动追踪上领先，但睡眠与恢复叙事较弱。Google Fitbit 已全面整合进 Google Health，以 Fitbit Charge 6
              和新发布的 Google Fitbit Air 无屏幕追踪器（约 $100–$200，$10/月 Fitbit Premium）覆盖健康可穿戴市场的低端。从整体竞争格局看，Oura
              在高端睡眠与恢复健康洞见细分中占优，但随着品类成熟、资金充裕的挑战者入局，其收入模式面临实质压力。
