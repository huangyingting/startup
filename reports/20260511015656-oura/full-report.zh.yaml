      - number: '6.3'
        title: 命名合作伙伴与企业验证
        blocks:
          - type: paragraph
            body: >-
              Oura 的 B2B 渠道分为两条：精英体育表现合作和通过 Oura for Business 开展的企业健康合作，共同为消费者漏斗之外提供商业可信度、标杆客户和机构分销。

              体育合作涵盖：NBA（2020 年新冠气泡，部署 2,000 余枚戒指；与 76ers、Pelicans、Clippers、Lakers、Pistons、Heat、Wizards、Nuggets
              等多支球队保持合作关系）、UFC、Team USA（LA28 奥运和残奥会官方可穿戴）、US Soccer（全部 27 支国家队，Arthur M. Blank 国家训练中心创始合作伙伴，2026
              年春季开幕）、USTA（五年合作，USTA 首个可穿戴合作，覆盖 US Open）。Clemson University 男女篮球项目使用 Oura 监测运动员状态，已获教练验证。Red Bull Racing
              和 NASCAR 延伸了赛车运动布局。

              Oura for Business 服务 200 余家企业组织，覆盖企业健康、医疗、学术研究、体育和军事领域。命名 B2B 客户包括：Thrive Global（CEO Arianna Huffington
              公开背书）、US Air Force、US Navy、US Army、NASA、Red Bull Racing、NASCAR、USA Surfing、Noom 和 University of
              Vermont（600 名学生健康研究）。美国国防部是 Oura 最大的单一企业客户，自 2019 年起在国防领域累计部署数万枚。为服务国防部及其他政府/企业客户，Oura
              正在德克萨斯州沃思堡建设美国制造基地，2026 年投产。

              Dexcom 合作（2024 年 11 月）战略意义最为突出：Dexcom 向 Oura 投入 $7,500 万，将其 Stelo OTC CGM 与 Oura 应用集成，构建出融合葡萄糖、睡眠、运动和 HRV
              的代谢健康综合视图。加州大学旧金山分校（UCSF）和西弗吉尼亚大学（WVU）在正式研究语境中使用 Oura Ring 数据开展疾病检测和新冠研究。WVU 在一项研究中发现，该戒指可在症状出现前最多三天、以 90%
              的准确率检测到疾病迹象。

              Oura API（V2）支持逾 1,000 个合作伙伴集成，将 Oura 数据嵌入第三方健康、健康管理和企业平台，每增加一个集成无需 Oura 承担额外获客成本。
