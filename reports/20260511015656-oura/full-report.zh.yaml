      - number: '8.5'
        title: 附表
        blocks:
          - type: callout
            title: TRACK：溢价估值需执行确认后方可入场
            body: >-
              Oura 以过去两年约 100% 的收入增速、200 万付费订阅用户及行业领先的留存率、2024 年已确认的盈利能力，以及同质化智能戒指竞品短期难以复制的临床验证护城河，支撑起可信的 110
              亿美元估值。然而，这一标记对应 2025 年估计收入约 11 倍——高于上市健康科技可比公司 5–10 倍的区间，并在上市时承载私募到公开市场的压缩风险。Samsung Galaxy Ring 于 2024 年
              7 月推出的免订阅模式，是对支撑溢价倍数的订阅 ARR 最具实质性的结构威胁。建议为
              TRACK：在入场前持续跟踪订阅留存、收入增速及竞争应对；目标以较当前估值打八折至七折入场，或等待未来融资事件并获得完整尽调数据室访问权限。
            calloutType: recommendation
            claimRefs:
              - CV021
              - CV022
              - CV023
          - type: callout
            title: Adverse：倍数压缩与 Peloton 前车之鉴带来实质性下行风险
            body: >-
              悲观情景——并非中心情景，但有 25% 的真实概率——是类 Peloton 式的倍数压缩。Peloton 凭借"硬件 + 订阅"模式、强劲的订阅利润率，在 2020 年 11 月峰值时市值达 500
              亿美元；随着订阅流失加速、硬件销售放缓，到 2023 年市值已跌至 10–20 亿美元。Rock Health 数据显示，数字健康融资与估值较 2021 年峰值已压缩 40–60%。若 Samsung
              Galaxy Ring 抢占超过 20% 的新增智能戒指用户、Oura 12 个月订阅留存率跌破 80%、收入增速减速至 25% 以下，110 亿美元估值将意味着对放缓业务给出 14
              倍的不可持续倍数——由此产生下修融资风险，E 轮投资者面临按市值计价损失。
            calloutType: risk
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
