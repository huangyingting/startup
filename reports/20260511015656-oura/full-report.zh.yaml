      - number: '2.2'
        title: 市场规模概览：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >-
              2026 年可穿戴技术市场的独立分析师估算因范围不同从约 $920 亿到 $1,190 亿不等。Grand View Research 估计全球可穿戴技术市场 2025 年规模为 $929 亿、2026 年达
              $1,031 亿，预测以 12.1% CAGR 增长至 2033 年的 $2,300 亿。Mordor Intelligence 聚焦智能可穿戴范围——剔除部分工业设备——将 2026 年市场规模定为
              $1,189 亿，预计以约 16.4% CAGR 增至 2031 年的 $2,543 亿。两家机构的估算存在差异，原因在于覆盖范围不同（工业、音频、眼镜类可穿戴的纳入标准各异）及基准年选取差异，并非其中一方有误。


              智能手表是两套测算框架中均占主导的子品类，在不同分析师口径下代表可穿戴收入的 45.6%–60.4%。智能戒指在多数市场报告中仍是规模较小、尚未单独追踪的品类；行业媒体引用的粗略分析师共识将全球智能戒指市场
              2024–2026 年规模置于 $6 亿–$20 亿区间，且随 Samsung、Ultrahuman 和 RingConn 入局，增速快于整体可穿戴市场。Oura 2025 年约 $10 亿的营收——若公司
              CEO 指引准确——意味着其在智能戒指收入池中处于主导地位，但在更广泛的健康可穿戴市场中仍是个位数份额。Statista 的智能戒指市场付费模块无法公开获取，无法独立核实。


              Oura 的可服务市场（SAM）最适合以全球健康意识消费者与企业健康项目合计估算，约为 $150–$250 亿，定义为愿意为搭载循环订阅的戒指支付 $200 以上的买家群体。2026
              年的可获取市场（SOM），综合至今约 550 万枚戒指的销售量及新增 Gen 4 出货，估计为年化硬件加订阅收入 $15–$20 亿。SOM 的上限受制于地域分布（Oura
              偏重北美和欧洲）、人口结构偏移（高收入、健康意识较强的成年人），以及订阅门槛——该门槛限制了在价格敏感或订阅疲劳细分市场的留存与扩张。
