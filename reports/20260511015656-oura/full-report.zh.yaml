      - number: '7.4'
        title: 人员、执行与治理风险
        blocks:
          - type: paragraph
            body: >-
              CEO Tom Hale 于 2021 年加入 Oura，带领公司从年收入约 $1 亿增长至 $5 亿以上，并完成五笔战略收购。Hale 的个人影响力和关系网络在 Oura
              企业战略、媒体定位和投资者信心方面可见度极高。作为私营公司，Oura 不承担任何披露义务，治理透明度天然偏低：目前没有公开确认的 COO、CFO 或首席产品官，构成可信的 CEO 职能运营搭档或接班候选人。CEO
              在无清晰接班计划的情况下离任，将是一项实质性业务事件。Oura
              发源地奥卢（Oulu，芬兰），核心传感器和算法研发仍集中于此，构成地理人才风险。芬兰工程人才市场规模远小于主要美国或欧洲科技中心，全球范围内嵌入式系统工程师、机器学习专家和生物特征传感器专家的竞争正在加剧。Oulu
              资深工程师流失将直接损害传感器开发和算法路线图——这正是 Oura 有别于商品化戒指竞争对手的核心优势。整合执行风险因五笔收购（Sparta Science、Veri、Proxy、Doublepoint 和
              Galen AI）的同步管理而上升。每笔收购均带来文化、技术和合同整合风险，可能消耗管理层精力，延迟产品路线图里程碑，并造成被收购团队的人才流失。以 $110
              亿私有估值运营，董事会治理的不透明使投资者无法了解监督架构、薪酬治理和接班规划——随着 IPO 进程临近、机构投资者要求对标上市公司标准，这些风险的重要性将显著上升。
