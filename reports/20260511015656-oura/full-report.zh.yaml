  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: >-
              Oura 的 E 轮估值 110 亿美元，于 2025 年 10 月随 Fidelity Management and Research Company 领投、ICONIQ Growth 与 Whale Rock
              Capital 跟投的 8.75 亿美元融资一并确立，是本次分析的核心参考点。上一轮 D 轮于 2024 年 12 月以 52 亿美元估值融资 2 亿美元关闭，提供第二个估值锚点，两轮相距九个月。D
              轮隐含倍数（52 亿美元 / 2024 年估计收入运行率 5 亿美元以上）约为 10 倍；E 轮基于 2025 年约 10 亿美元估计收入的隐含倍数约为 11 倍。按 CEO Tom Hale 公开披露的
              2026 年收入目标 15–20 亿美元测算，E 轮隐含远期倍数为 5.5–7.3 倍，已接近公开市场可比估值区间。


              估值方法采用收入倍数分析法，适用于无公开披露 EBITDA 或自由现金流的高增长"硬件 + 订阅"公司。可比集涵盖：公开消费电子及健康科技公司（Garmin、Apple
              可穿戴业务）、私有健康可穿戴同类（WHOOP）、战略并购案例（Fitbit 被 Google 收购）以及高增速数字健康公司（Noom、Peloton）。Garmin 作为最直接可比的多元化可穿戴 / GPS
              上市公司，市值约 300–320 亿美元、2024 年收入约 52 亿美元，市销率约 5–6 倍。Oura 的订阅分量与更快增速使其应享有高于 Garmin 的溢价倍数。WHOOP 上一轮私募估值于 2021
              年达到 36 亿美元，彼时年度经常性收入约为 1 亿美元，对应约 36 倍倍数，但体量更小、阶段更早。Fitbit 于 2021 年 1 月被 Google 以 21 亿美元收购，当时 Fitbit 收入约 14
              亿美元且持续下滑，对应约 1.5 倍，属于困境收购价格。数字健康订阅平台 Noom 于 2021 年融资 5.4 亿美元时估值 37 亿美元，彼时正值数字健康热潮顶峰，但此后深陷订阅流失与倍数压缩。反向参照是
              Peloton：2020 年 11 月峰值市值 500 亿美元，到 2023 年已跌至约 10–20 亿美元，原因是硬件销售放缓、订阅流失加速，市场对其"硬件 + 订阅"模式的倍数从峰值大幅折价。Oura
              的订阅留存率（12 个月约 89%）、临床验证护城河与企业多元化使其有别于 Peloton 的下行轨迹，但 Peloton 先例是评估悲观情景的主要参照框架。
