      - number: '6.2'
        title: 采用轨迹与市场规模
        blocks:
          - type: paragraph
            body: >-
              Oura 自 2016 年商用以来累计售出逾 550 万枚戒指，是单一高端消费品 SKU 的非凡里程碑。出货高度集中在近期：维基百科记录截至 2024 年 12 月累计售出 250 万枚（Ring 4
              刚刚度过假日季拉货高峰），TechCrunch 2025 年 10 月报道（引自 $9 亿 E 轮公告）确认累计 550 万枚——意味着有史以来超过半数的戒指在单一年度内出货。Sacra 估计 2024 年售出
              130 万枚，硬件收入约 $3.9 亿。

              Oura 在全球智能戒指市场约占 80% 份额（引自 E 轮新闻稿的 IDC 数据）。公司 2024 年收入翻倍至约 $5 亿，2025 年按 Sacra 估算突破 $10 亿。CEO Tom Hale 预期
              2026 年销售额接近 $20 亿——属于高管指引，非审计结果。收入结构约为 80% 硬件、20% 订阅。200 万付费用户、每月约 $6，年化订阅收入估约 $1.44 亿。

              2024 年 10 月 Ring 4 发布，叠加进驻 4,000 家零售门店（Target、Amazon、Apple Stores
              及广泛专业零售商）和四个新国际市场，带来出货量跃升。Fidelity、ICONIQ、Whale Rock 和 Atreides 领投的 $9 亿 E 轮——估值约 $110
              亿——标志着机构对持续增长的信心。募集资金用途包括 AI 和产品创新、全球分销及新健康功能。

              分销现已覆盖直销（ouraring.com）和广泛全渠道零售布局。逾 1,000 个 API 合作伙伴集成将 Oura 数据引入互补健康应用，在无额外获客成本的前提下扩大覆盖。
