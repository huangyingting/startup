      - number: '5.3'
        title: 软件平台与应用层
        blocks:
          - type: paragraph
            body: >
              Oura 移动应用支持 iOS 和 Android，分三个主要标签页：Today（个性化每日洞察与评分）、Vitals（心率、HRV、体温等连续指标流）和 My
              Health（纵向趋势分析与历史数据）。该应用是每月 $5.99 Oura Membership 的核心界面——会员可解锁基础每日评分之外的完整分析套件，包括高级趋势对比、基线对比、集成数据以及 AI 驱动功能。

              Oura Advisor 是 2024 年推出的大语言模型 AI 助手，支持用户以自然语言查询个人健康数据。上线前经超过 100 万条消息测试，健康问题回答可靠率达 83%。Oura Labs
              是应用内的实验功能沙箱，允许愿意尝鲜的用户在功能正式推出前参与测试。2026 年初的活跃实验包括：Blood Pressure Profile Study——探索戒指传感器无创估算血压的消费者研究项目；以及
              2026 年 2 月新增的 Women's Health AI Model，基于女性健康数据训练的专用大语言模型，涵盖月经周期追踪与激素恢复。Labs 功能均明确标注为实验性质，不用于诊断。
