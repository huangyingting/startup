  - id: FU002
    title: Oura 消费者采纳漏斗
    type: funnel
    layout: standard
    summary: >-
      估算截至 2026 年初从健康可穿戴市场总体认知到高参与度活跃 Oura 订阅用户的消费者转化漏斗。漏斗数据基于已报告的戒指销量、高端可穿戴设备行业转化基准及 Sacra 订阅用户估算。Oura
      未单独披露活跃用户数量，仅公布戒指总销量。
    data:
      items:
        - label: 全球健康可穿戴市场认知
          value: 500000000
        - label: 智能戒指考虑购买（高端细分）
          value: 25000000
        - label: Oura 戒指累计销量（约 2025 年 10 月）
          value: 5500000
        - label: Oura 活跃订阅用户（估算，2024 年底）
          value: 2000000
        - label: 高参与度用户（每日打开应用，估算）
          value: 1200000
    approximationNotes: >-
      漏斗数据为粗略估算。总体认知基于全球可穿戴市场规模（累计出货约 6 亿台）估算。智能戒指考虑购买细分来源于 Oura 在截至 2025 年约 600 万枚全球智能戒指销量中约 80% 的份额。订阅用户数来自 Sacra（2024
      年底约 200 万）。高参与度用户估算（约占订阅用户的 60%）来源于 Oura Advisor 参与度调查（60% 认为有帮助），非实际 DAU 数据。Oura 不公布日活跃用户数或参与率。
