      - number: '1.4'
        title: 产品里程碑、合作伙伴关系与竞争地位
        blocks:
          - type: paragraph
            body: >
              Oura 的产品历程横跨十一年四代硬件。Gen 1（2015）专注睡眠与 HRV；Gen 2（2018）改善了外观与佩戴舒适度；Gen 3（2021–2022）扩展传感器并引入订阅模式；当前的 Gen
              4（2024 年 10 月）以全钛结构、重新设计的陶瓷版表圈、18 路 PPG 信号通道（"Smart Sensing"）、增强血氧精度及最长 8 天续航为主要卖点。Gen 5 设备已于 2026 年 4
              月出现在 FCC 备案及 Oura 官网，预计 2026 年晚些时候正式发布。


              战略合作伙伴关系是核心竞争优势之一。Dexcom 合作（2024 年 11 月）将持续血糖监测数据整合进 Oura 应用，指向代谢健康市场，拓宽了可服务场景。体育合作——NBA（尤其是 2020 年 COVID
              泡泡期间用于健康监测）、UFC（官方可穿戴设备）及美国足球（2026 年，全美国家队官方可穿戴）——提升了品牌可信度并带来分发渠道。Cleveland Clinic 合作支撑研究与临床验证工作。2026 年
              Oura 被任命为 LA28 奥运会 Team USA 官方可穿戴设备，为高曝光度背书。


              Oura 的主要竞争对手包括 Apple Watch、Samsung Galaxy Ring、Garmin 可穿戴设备和 WHOOP。Galaxy Ring 是值得关注的直接竞品，Samsung
              将其定位为无强制订阅，在定价与定位上形成压力。Oura 的差异化在于指环传感器精度（手指 vs. 手腕）、睡眠追踪深度以及 Oura Membership 平台的健康智能层。截至 2025 年底，Oura 已在
              100 余国累计销售逾 550 万枚戒指。
