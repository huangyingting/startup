      - number: '7.5'
        title: 财务风险与退出路径
        blocks:
          - type: paragraph
            body: >-
              2025 年 10 月确立的 110 亿美元估值要求高倍数增长兑现，容错空间极小。2024 年收入超 5 亿美元、2025–2026 年预计达到 10–20 亿美元，当前估值约为过去十二个月收入的 7–11
              倍。消费电子硬件毛利率通常为 20–35%，要撑起这一倍数，订阅收入占总收入的比重必须大幅提升。订阅流失率持续攀升或硬件价格受压，均会侵蚀退出逻辑的单位经济基础。加州集体诉讼及 FTC
              对订阅计费实践的潜在执法，带来和解赔付、整改成本及流程改造等财务风险，可能压缩利润率或迫使订阅模式重构。沃思堡美国本土制造投资增加了资本开支，但利润率改善难以保证——政府与企业端订单短期内未必能达到消费端的规模经济。凭借
              2.5 亿美元循环信贷和 15 亿美元累计融资，Oura 近期资本储备充裕；但硬件产能扩张、五项收购整合及激进的人员增长带来的持续消耗，需要严格的财务纪律。上市路径取决于公开市场能否接受一家前期估值 110
              亿美元的"硬件 +
              订阅"消费健康公司——历史上，此类标的从私募末轮到公开市场通常面临倍数压缩。竞争格局恶化、监管受挫，或数据泄露触发执法，都会降低按当前隐含倍数顺利上市的概率，甚至迫使以下修条款延期融资或接受战略并购。
            claimRefs:
