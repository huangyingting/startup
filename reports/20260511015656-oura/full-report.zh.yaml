      - number: '1.5'
        title: 法律、监管与不利发现
        blocks:
          - type: paragraph
            body: >
              Oura 面临一系列法律与声誉风险，尽调须认真审视。知识产权层面，Oura 历来是积极的 IP 执行方，曾在美国国际贸易委员会赢得裁定、封锁竞品智能戒指进口。然而，2026 年 4 月 Zepp Health
              在德克萨斯州提起专利侵权诉讼，指控 Oura Ring Gen 3、Gen 4 及 Oura 应用侵犯其涵盖运动识别、睡眠监测、健康评分和传感器校准的六项专利。一旦胜诉，可能招致赔偿、许可费用或功能限制。


              2026 年 3 月，加利福尼亚州一宗集体诉讼指控 Oura 违反该州《自动续订法》《消费者法律救济法》和《不正当竞争法》，称其未清晰披露订阅自动续订条款且设置了不必要的取消障碍。


              声誉压力最大的问题涉及数据隐私。Oura 与美国国防部签订合同，并引入 Palantir Technologies 的 FedStart 合规平台履行政府合同。社交媒体上有声音指控 Oura
              向政府共享消费者生物特征数据。Oura CEO 公开否认上述指控，声明政府合同运行于独立安全的企业服务器，Palantir
              仅用于合规基础设施，不涉及消费者数据。此次争议折射出大规模生物特征数据的敏感性，以及与国防/政府相邻业务在声誉层面的潜在风险。
