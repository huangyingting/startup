      - number: '5.7'
        title: 产品路线图与创新管线
        blocks:
          - type: paragraph
            body: >
              Oura 的创新管线由 2024–2025 年两笔定向收购及 Oura Labs 实验平台共同驱动。2024 年 10 月，Oura 收购 Doublepoint——一家赫尔辛基 AI
              初创公司，四位创始人专注于从生物特征戒指传感器中识别手势。该收购使 Oura 具备了开发基于戒指的无触摸手势交互能力，面向智能设备，这是戒指形态天然赋能的潜在变革性输入范式。2025 年，Oura
              收购由斯坦福校友创立的临床数据整合平台 Galen AI，加速戒指数据与电子健康记录、临床工作流的整合，服务 B2B 和医院企业客户。

              Oura Labs 是面向消费者的创新沙箱，让愿意参与的用户在功能正式推出前参与实验。Blood Pressure Profile Study
              是当前最受瞩目的活跃实验，探索戒指传感器能否无创估算血压——若获验证并通过审批，将成为重大竞争差异化点。2026 年 2 月推出的 Women's Health AI
              Model，基于女性健康数据训练的专用大语言模型。Oura 在全球智能戒指市场占据逾 80% 份额（IDC 估算），截至 2025 年 10 月累计售出 550
              万枚以上，形成强化算法训练与未来功能竞争定位的数据飞轮。
