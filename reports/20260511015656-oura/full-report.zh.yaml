  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Oura
              的市场覆盖三个相互交叠的层次：（1）全球可穿戴技术市场，涵盖智能手表、健身追踪器、智能戒指、耳戴设备、医疗可穿戴及工业/增强现实设备；（2）智能可穿戴或消费健康可穿戴细分，剔除工业和纯娱乐设备，聚焦健康监测电子产品；（3）智能戒指子市场，该细分仍处初期阶段，主打高端定价，目前由
              Oura 主导，Samsung Galaxy Ring、RingConn 及 Ultrahuman Ring PRO
              正在跟进。三个层次对尽调分析各有价值：最宽泛的层次提供宏观背景与投资叙事；健康可穿戴细分界定竞争与监管环境；智能戒指层次才是 Oura 当下真正胜负所在。


              Oura 可服务市场的消费范围涵盖：高端消费级戒指（$300–500 硬件加订阅）、企业健康项目（员工健康监测的 B2B
              合同）及临床研究合作（向学术机构和制药公司收取数据授权费）。排除项包括：百元以下的大众健身手环、持有 FDA 510(k)
              二类及以上认证的医疗级诊断设备，以及工业外骨骼可穿戴。个人消费者的现有替代方案包括免费智能手机健康应用、入门级健身追踪器（Fitbit、Amazfit），以及已整合大量相同生物传感器的成熟智能手表平台（Apple
              Watch、Samsung Galaxy Watch、Garmin Forerunner）。对 Oura 而言，核心结构性问题在于：在 Apple 和 Samsung
              大力投入自家健康平台的背景下，智能戒指形态能否维持可持续的差异化——尤其是全天候 24/7 佩戴舒适性、更优质的被动监测精度及高端健康洞见品牌——与上述替代品相比是否依然成立。
