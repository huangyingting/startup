      - number: '8.2'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              本次估值构建了三种情景，输入变量来自可观察的收入走势、竞争格局与可比退出倍数。每种情景包含明确的收入、利润率与倍数假设，概率权重基于前述章节所收集的证据。


              乐观情景假设 Oura 2026 年实现 20 亿美元收入（CEO 指引上限），2027 年继续保持 40% 以上的同比增长，订阅留存率维持在 80% 高段，企业与医药合作管线持续扩张。在此情景下，以 10
              倍远期收入上市或被战略收购在逻辑上可行——若 2028 年收入达到 30–40 亿美元，对应退出估值超过 200 亿美元。乐观情景要求 Samsung Galaxy Ring 不构成重大竞争冲击、AI
              健康功能顺利变现，且临床验证持续形成差异化壁垒。考虑到增长假设的激进程度及竞争格局的未解风险，该情景概率估计为 25%。


              基准情景假设 2026 年收入 15 亿美元（指引中值），随着 Samsung Galaxy Ring 抢占部分智能戒指新用户，2028 年增速放缓至 25–30%。订阅留存率维持在 80% 中段。若 2028
              年收入达到 25 亿美元时以 8 倍远期收入上市，退出估值约为 200 亿美元，与当前 110 亿美元私募标记大体吻合。该情景概率估计为 50%。


              悲观情景假设 Samsung Galaxy Ring 的免订阅模式导致 2026 年订阅流失率上升 15–20%，硬件出货增长停滞、总收入约为 8 亿美元，公开市场对放缓的硬件主导型业务给出 4–5
              倍倍数，估值压缩加速。由此得出公允价值约为 35–40 亿美元，较 E 轮标记下跌约 65%；若在上市前需要再次融资，则存在下修融资风险。该情景概率估计为 25%。加权平均隐含价值：0.25 × $20B +
              0.50 × $14B + 0.25 × $4B = 130 亿美元，方向性上与 110 亿美元的 E 轮标记吻合，但实现前提是基准情景得以执行。
