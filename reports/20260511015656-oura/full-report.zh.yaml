  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Oura 占据一个本质上模糊的监管位置，构成潜在但实质性的业务风险。公司将 Oura Ring 定位为健康设备而非医疗设备，在当前 FDA 针对低风险设备软件功能的执法酌情框架下，规避了 510(k)
              清关要求。FDA 对用于一般健康目的、对患者风险最小的软件行使裁量权，但这只是政策立场，并非永久保障。心血管年龄（CVA）功能以动脉硬度估算血管衰老，Cardio Capacity 通过 VO2 Max
              估算心肺适能，二者已逼近诊断评估边界。FDA 指南更新、高知名度不良事件追溯至 Oura 健康输出，或国会对健康可穿戴设备的关注，都可能收窄安全港，迫使提交 510(k)
              申请，延迟功能推出并带来重大合规成本。欧盟医疗器械法规（MDR，2024
              年全面生效）对在欧盟以健康声明上市的设备要求更严格的技术文档、临床证据和上市后监测，若欧盟监管机构对健康设备定位提出异议，将带来增量合规成本和市场准入风险。最迫切的法律风险是加州集体诉讼。2024 年 12 月
              26 日，三名消费者在加州联邦法院起诉 Oura Health Oy 和 Ouraring
              Inc.，指控其违反加州《自动续费法》，未能清晰披露订阅续费条款，也未提供便捷取消机制。诉状还援引《消费者法律救济法》和《不正当竞争法》。FTC 在数据隐私框架下对 Oura
              持有明确调查权，并已将《健康违规通知规则》的适用范围扩展至个人健康记录应用。Oura 隐私政策承认 FTC 的管辖权，为数据事件或欺骗性行为认定开辟了真实的执法路径。GDPR
              将生物特征和健康数据列为特殊类别，要求在 Oura 欧盟业务中获得明确同意并严格最小化数据，欧盟成员国数据保护机构（DPA）拥有广泛的调查权。
