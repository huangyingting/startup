appendices:
  - id: A
    title: 方法论与数据来源说明
    blocks:
      - type: paragraph
        body: >-
          本报告基于截至2026-05-11收集的公开信息，包括公司公告、公开投资者（Dexcom）的 SEC 监管文件、分析师报告、同行评审研究、新闻报道及消费者评论。Oura
          为私营公司，不披露经审计的财务报表。所有收入、年经常性收入（ARR）及利润率数据均为估算值，来源于公司披露的预测、分析师估算，或通过订阅/硬件定价及已报告用户数推算得出。读者在进行独立核实之前，不应依赖上述财务估算。
        claimRefs: []
      - type: callout
        calloutType: assumption
        title: 关键估算假设
        body: >-
          2024年收入约5亿美元的估算基于公司 CEO 的预测。年经常性收入（ARR）估算假设约210万订阅用户 × 5.99美元/月 × 12 = 约1.51亿美元订阅
          ARR，另加硬件收入。基于上述估算计算的所有倍数对实际收入披露情况较为敏感。
        claimRefs: []
