      - number: '3.2'
        title: 直接智能戒指竞品：Samsung、Ultrahuman 与 RingConn
        blocks:
          - type: paragraph
            body: >-
              Samsung Galaxy Ring 是 Oura 在智能戒指细分中最重要的竞争威胁。2024 年 7 月以 $399 上市，是 Samsung 的第一代戒指产品，提供 5 级钛合金结构、10 ATM
              防水、Energy Score（类比 Oura 的准备度评分）、带昼夜节律时型指导的睡眠追踪、心率监测和月经周期追踪——且全部无需订阅。该戒指仅支持 Android，需配对 Samsung Galaxy
              手机或其他 Android 设备，相较 Oura 的 iOS/Android 双端兼容，可服务市场较窄。Wareable 的并排测试显示 Galaxy Ring 更薄（2.6mm vs.
              2.88mm）、更轻（最轻 2.3g vs. 3.3g），且附带 Oura 缺乏的便携充电盒。Oura 在健康洞见深度、精度（尤其是深色皮肤用户）及集成生态广度（600 余个 vs. 仅限 Samsung
              Health）上领先。从持有成本看，Galaxy Ring 用户一次性支付 $399，而 Oura 用户需支付 $349–$499 硬件加每年 $71.88 订阅，两年内 Oura 贵出约 $120–$220。

              Ultrahuman Ring AIR 是一家印度初创公司推出的智能戒指（$349，无订阅），采用钛合金与碳化钨结构，电池约 24mAh 续航四天，搭载
              PPG、SpO2、皮肤温度及六轴加速度计传感器。Digital Trends 认为 Ring Air 的传感器阵列在被动监测上与 Oura 相当，但指出其应用需要更多用户主动操作、语言习惯较为陌生，且缺乏
              Oura 那样打磨成熟的生态整合。关键在于，Ultrahuman Ring AIR 目前因 Oura 的 ITC 专利案而在美国遭到进口禁令（截至 2026 年初），Ultrahuman
              正寻求撤销禁令，但美国消费市场可用性受到严重限制，其争夺 Oura 核心北美市场的能力大打折扣。Ultrahuman Ring PRO 是配备 45 天续航充电盒、戒指内置存储及"Jade"AI
              生物智能集成（将戒指数据与 CGM 血糖、血液生物标志物和环境数据结合）的高端后续产品。

              RingConn Gen 2（$299，无订阅）获 Digital Trends 评为"最佳无订阅智能戒指"，并在 Wareable 2026
              年综合排名中位列榜首，表彰其长续航、佩戴舒适及无循环费用下全面的睡眠与健康追踪功能。RingConn 与 Oura 就美国进口禁令达成和解，同意支付专利授权费后恢复美国市场供货。RingConn Gen 3 已在
              CES 2026 亮相，显示出对产品线的持续投入。$299 的定价低于 Oura 和 Samsung Galaxy Ring，无订阅模式在长期总持有成本上具备明显优势。
