      - number: '1.3'
        title: 融资、估值与投资方构成
        blocks:
          - type: paragraph
            body: >
              Oura 的融资历程是消费健康科技领域估值扩张最为压缩的案例之一。经历早期种子轮和 A/B 轮后，公司于 2021 年完成 $100M C 轮融资。2024 年 12 月以 $5.2B 估值关闭 $200M D
              轮，由 Fidelity Management & Research 和 Dexcom（以战略合作方身份投入 $75M）联合领投。不足一年后，2025 年 10 月 Oura 再次完成逾 $900M E
              轮融资，仍由 Fidelity 领投，ICONIQ Capital、Whale Rock Capital Management 及 Atreides Management 跟投，交易后估值达约 $11B——不足
              12 个月翻逾一倍。累计融资总额约 $1.5B。


              2026 年初据报道 Oura 正在推进老股转让，允许早期投资者以约折让 E 轮价格 25% 的价格出售股份，以在公司保持私有状态的同时提供流动性。投资方集中于大型机构成长基金（Fidelity、Whale
              Rock、ICONIQ）及战略产业投资者（Dexcom）。早期投资方还包括 Forerunner Ventures、The Chernin Group、Temasek、Elysian Park
              Ventures、JAZZ Venture Partners、Gradient Ventures 及 Marc Benioff。


              截至研究日，公司尚未宣布 IPO 计划，但其规模与估值走势暗示公开市场上市是可信的中期路径。关键财务指标——盈利能力、EBITDA 利润率、自由现金流——均未公开披露，构成实质性尽调缺口。
