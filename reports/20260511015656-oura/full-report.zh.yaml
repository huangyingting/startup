companyProfile:
  summary: >-
    Oura Health Ltd. 是一家芬兰健康科技公司，2013 年创立，总部现设于美国加利福尼亚州旧金山。公司研发并销售 Oura Ring——一款钛合金智能戒指，持续采集多项生物信号（基于 PPG 的心率与
    HRV、皮肤温度、SpO2 及三轴运动），并据此生成睡眠、准备度和活动评分。收入来源包括硬件销售（每枚 $349–$499）及循环订阅制的 Oura Membership（约 $5.99/月）。截至 2026 年，Oura
    已累计销售 550 万枚以上戒指，拥有约 210 万活跃订阅用户，睡眠分期精度已达临床级别并经同行评审研究验证。2024 年 12 月公司以 $5.2B 估值完成 $200M D 轮融资，2025 年 10 月再以 $11B
    估值完成逾 $900M E 轮融资，累计融资总额约 $1.5B。
