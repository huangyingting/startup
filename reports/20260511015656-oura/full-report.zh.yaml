      - number: '2.3'
        title: 买家与用户细分
        blocks:
          - type: paragraph
            body: >-
              Oura 的客户群至少可划分为四个可识别的细分，各有不同的买家经济逻辑、采纳触发因素和预算归属。按出货量计最大的是高端健康消费者：通常年龄 28–45 岁、收入较高，自费购买 $349–$499 的戒指及
              $5.99/月的订阅，将其作为预防性健康与表现优化日常的一部分。Pew Research 2019 年调查发现，21% 的美国成年人经常佩戴智能手表或健身追踪器，采纳率与收入强相关——年收入 $75,000
              以上家庭为 31%，$30,000 以下仅 12%。这一收入梯度直接框定了 Oura 的定价天花板：高端细分真实存在，但边界清晰。


              第二个细分是企业与职场健康，Oura 已主动布局，据公司说法在 2024–2025 年占新增订阅的约
              31%。这一细分的预算决策方是大型雇主的人力资源总监、职业健康官员或健康项目管理者；驱动因素通常是医疗成本控制目标或绩效优化项目（在职业体育、军队和急救机构中较为普遍）。第三个细分是临床研究——学术医疗中心、制药公司及合同研究机构采购
              Oura 戒指和数据授权权限，用于纵向健康研究。第四个细分是政府与国防，既是机会（DoD 的"战士健康"项目合同），也是风险（汇聚至 Oura 云端的大量生物特征数据引发的数据隐私审查）。


              各细分的付款方式差异显著：个人消费者自付（Oura 会员资格部分可通过 HSA/FSA 账户报销）；企业客户从 HR
              健康预算支出；临床研究客户从科研经费或合同预算支出；政府/国防客户通过采购合同付款。订阅模式为消费者和企业细分带来循环收入，而临床和政府细分往往是一次性或有期限的数据授权安排，而非按席位收取订阅费。
