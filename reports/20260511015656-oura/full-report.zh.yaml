          claimRefs:
            - CU019
            - CU031
        - label: 订阅转化
          description: >-
            免费试用结束后，激活 $5.99/月的 Oura Membership 以解锁完整洞察。附加服务包括 Health Panels（通过 Quest Diagnostics 提供 $99 血液生物标志物检测）和
            Dexcom Stelo CGM（$99，用于血糖集成）。形成年度经常性承诺。
          claimRefs:
            - CU008
            - CU014
        - label: 口碑与社区
          description: >-
            加入 r/OuraRing（20 万以上成员），参与 Oura Circles，向朋友推荐。在社交媒体分享数据，形成自然传播。佩戴戒指作为可见的生活方式配饰（钛金属/陶瓷款）。续订会员；每日习惯与社区嵌入支撑高 12
            个月留存。
          claimRefs:
            - CU004
            - CU020
