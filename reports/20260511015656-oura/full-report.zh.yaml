    title: 产品与技术
    sections:
      - number: '5.1'
        title: 戒指硬件平台
        blocks:
          - type: paragraph
            body: >
              Oura Ring 4 于 2024 年 10 月发布，围绕 Smart Sensing 架构进行了重大硬件重设计——这是一套专有的 18 路多波长 PPG（光电容积脉搏描记）子系统。Gen 3
              只用单一光路，Ring 4 将 6 颗 LED（红光、红外、绿光三种波长）分布于 18 条信号路径，大幅提升 SpO2、心率和 HRV 的信号质量，官方称 SpO2 信号质量较前代提升 120%，整体精度提升
              30%。传感器模组还集成了数字 NTC 温度传感器（用于昼夜节律与排卵期追踪）以及三轴加速度计（用于运动与睡眠姿态检测）。

              外形上，戒指在医疗级数据采集与佩戴舒适性之间取得了平衡。尺码覆盖 4–15 号，重量从 3.3 克（4 号）到 5.2 克（13–15 号）。机身宽 7.9mm，厚 2.88mm，传感器凸起仅 0.3mm（Gen
              3 为 1.3mm），更贴合手指、提升佩戴舒适度。单次充电续航最长 8 天，防水等级 100m。材质提供钛金属（银、黑、金、暗影、拉丝钛、玫瑰金六种配色）和陶瓷（四种配色），支撑高端定位。Ring 4
              依照消费电子标准生产，钛金属版零售价 $299–$399，陶瓷版 $499。
