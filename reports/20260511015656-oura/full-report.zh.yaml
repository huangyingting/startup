      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: Samsung Galaxy Ring 的无订阅模式直接挑战 Oura 的循环收入逻辑
            body: >-
              Samsung Galaxy Ring 以 $399 无订阅上市，两年总持有成本低于 Oura，且提供大体相当的睡眠与恢复追踪。随着 Samsung 健康算法能力成熟、Galaxy Ring 积累装机量（尤其是
              Android 主导的国际市场），消费者对 Oura $5.99/月订阅合理性的质疑压力将持续加大。Oura 的订阅目前尚能以洞见深度和 iOS 兼容性为由得到支撑，但两项优势均面临侵蚀风险——Samsung
              持续投入，而 AI 健康分析正将睡眠数据解读商品化。
            calloutType: risk
            claimRefs:
              - CP003
              - CP004
              - CP005
              - CP034
          - type: callout
            title: Apple 潜在的智能戒指入局构成生存级竞争风险
            body: >-
              Apple 专利申请和分析师报告记录了 Apple 对一款能与 iOS 及 Apple Health 生态整合的智能戒指产品的探索。截至 2026 年中 Apple
              尚未确认任何智能戒指产品，但一旦推出，Apple Ring 将立即凭借全球 900 余家 Apple 零售店的分发优势、iPhone HealthKit 整合及 Apple
              品牌信任度，可能以结构性方式将高端智能戒指市场拦腰劈断，威胁 Oura 的市场地位。应持续关注 Oura 是否在加速企业与临床收入多元化，以对冲来自 Apple 的潜在消费市场冲击。
            calloutType: risk
