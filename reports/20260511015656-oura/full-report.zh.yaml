      - number: '8.4'
        title: 否决触发条件与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              投资逻辑包含四项可观测的否决标准，任一触发即将建议下调为 PASS：（1）Samsung Galaxy Ring 在 12 个月内占新增智能戒指出货量的 20% 以上，表明订阅模式面临结构性威胁；（2）Oura
              12 个月订阅留存率连续两个季度低于 80%，表明流失加速具有实质性；（3）2026 年收入同比增速低于 25%，表明翻倍增长轨迹已停滞；（4）监管执法（FDA、FTC 或 GDPR
              主管机构）实质性干扰运营、订阅实践或数据处理。


              反之，三项信号支持将建议上调为有条件 BUY：（1）公开披露经审计的收入、分业务毛利率及订阅队列分析，留存率显示高于 85%；（2）F 轮或上市前轮以实质性低于 110
              亿美元的估值完成，提供折价入场机会；（3）战略收购方公告（医药、保险或大型消费平台），报价高于当前标记。


              以下六项尽调要求是在 E 轮估值上承销新资或跟投所需的最低置信门槛。两项阻断项为：订阅队列分析（在 Samsung 竞争背景下确认留存率）以及 2025 年经审计收入（确认 10
              亿美元增长轨迹）。在这两项数据缺失的情况下，无论其他正面信号如何，适当立场仍应保持 TRACK 而非 BUY。
            claimRefs:
