    type: pyramid
    layout: standard
    summary: >-
      Oura 市场规模三层测算：宽口径可穿戴设备 TAM（2026 年约 1030 亿美元）、健康导向消费与企业 SAM（约 200–250 亿美元），以及智能戒指 / 高端可穿戴 SOM（约 15–20
      亿美元）。各层来自不同分析师或内部估算，SAM 和 SOM 基于局部与综合数据推算。Grand View Research 和 Mordor Intelligence 锚定 TAM；SAM
      由作者据智能手表调整后的健康份额估算；SOM 以 Oura 公开营收走势为参照。
    data:
      items:
        - label: TAM：全球可穿戴设备（GVR 2026）
          value: 103.1
          unit: $B
          notes: Grand View Research 对 2026 年全球所有可穿戴设备的市场估算
        - label: SAM：健康导向可穿戴设备（消费 + 企业）
          value: 22
