      - number: '3.4'
        title: 智能手表平台：Apple Watch、Garmin 与 Google Fitbit
        blocks:
          - type: paragraph
            body: >-
              Apple Watch 是全球主导的消费健康智能手表平台，Apple 估计占全球智能手表市场的 30–40%。Apple Watch Series 10（铝合金款 $399，钛金属款 $799）厚度仅
              10mm，新增睡眠呼吸暂停检测（watchOS 11 新功能）、Vitals 监测仪表盘（心率、体温、血氧、呼吸频率），并与 Apple Health 和 Apple Fitness+ 深度整合。Series
              10 需每日充电，相较 Oura 5–8 天的续航，被动夜间监测能力受限。Apple 可能进军智能戒指——已见于专利申请和分析师预测，但尚未证实——对 Oura 而言是生存级别的竞争风险，因为这将把 Apple
              的生态、制造规模和零售渠道直接带入 Oura 的形态品类。

              Garmin 服务于差异明显但部分重叠的细分：为跑者、骑行者、铁人三项运动员和户外爱好者提供高端 GPS 运动手表。产品线从 $200 到 $1,000 以上，旗舰款如 Garmin Fenix 8 和 Epix
              Pro 提供高级 VO2 max 追踪、Body Battery（能量监测）、睡眠追踪、HRV 状态及月经周期追踪。Garmin 的核心差异化在于 GPS 精度、多运动追踪深度和长续航（多款产品超过 10
              天）。大多数功能无需订阅，主要应用 Garmin Connect 免费使用，另有面向企业健康应用的 Garmin Health API。Garmin 与 Oura 在健康意识高端用户群体上有所重叠，但
              Garmin 更侧重运动表现导向的买家，而非睡眠与恢复或被动生物指标导向的买家。

              Google Fitbit 已全面整合进 Google Health，以 Fitbit Charge 6（约 $160）和新发布的 Google Fitbit Air
              无屏幕健身追踪器占据健康可穿戴市场低端——后者的无屏幕设计似乎是对智能戒指趋势的腕部形态回应。Google Fitbit Premium（$10/月）提供 Daily Readiness
              Score、睡眠分析和高级健康洞见，以明显更低的价格点直接与 Oura Membership 竞争。自 Google 收购以来，Google Fitbit 的品牌在消费者心智中已有所流失，产品线的高端感不及
              Oura、Apple Watch 或 Garmin。Google 更宏观的 Pixel Watch 4 及与 Android Health Connect 的整合代表着平台级生态布局，以 Google
              Health 作为连接数据层。
