      - number: '4.4'
        title: 财务缺口与尽调评估
        blocks:
          - type: paragraph
            body: >
              作为总部位于芬兰、目前正重组为美国母公司的私营企业，Oura 无义务公开披露经审计的财务报表、SEC
              文件或详细分部报告。这产生了实质性信息缺口，使完整的基本面核查无法完成。制约财务尽调结论的五大核心缺口是：（1）分业务段毛利率（硬件、订阅、B2B 均为估算，未经确认）；（2）月度燃烧率及
              EBITDA/净利润（管理层确认"盈利"，但未披露量级与趋势）；（3）订阅流失率与队列分析（"高 80%
              留存率"系公司自述，未经审计）；（4）按客户分部的收入集中度（美国国防部是最大企业客户，但其占总收入比例未知）；（5）美国制造工厂及五笔并购整合的详细成本结构。

              加州集体诉讼指控 Oura 的订阅计费违反《自动续费法》，是一项负面财务风险——若败诉或达成和解，可能被迫退款或修改自动续费流程，进而冲击订阅留存率和收入确认。

              尽管存在上述缺口，Oura 财务健康状况的旁证依然充分：两家独立高声誉媒体（FierceHealthcare、MedTechDive）证实了 CEO 关于盈利的声明；Sacra 第三方分析独立估算 2025
              年收入约 $10 亿，并提供了详细收入结构拆分；Fidelity、JPMorgan、Goldman Sachs 等机构投资者在高估值下参与大额融资，提供了市场层面对财务健康的背书。收入增长轨迹（连续两年约
              100% 增长）极为罕见，虽未经审计，但有戒指销量、订阅用户数和零售渠道扩张等旁证支撑。

              财务结论：增长势头强劲，盈利信号可信，但利润率、单位经济学和现金生成能力尚不完整。投资级财务分析需要完整尽调数据室。Oura 以约 $110 亿估值对应约 11 倍 2025 年预期收入（以及约 5.5–7 倍
              2026 年预测收入），处于高增长消费科技/平台可比公司的估值区间，但需经审计确认。
