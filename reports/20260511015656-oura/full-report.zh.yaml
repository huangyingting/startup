      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              订阅模式是 Oura 结构上最脆弱的资产。Samsung Galaxy Ring 于 2024 年 7 月以 $399 推出，不收订阅费，由 Samsung Health 驱动，兼容所有 Android
              设备。Galaxy Ring 的免订阅架构直接击中消费者对 Oura 最普遍的异议：硬件购买后每月 $5.99 的持续收费。Oura Ring 4 用户花 $299–$499 买硬件再加每年 $71.88
              订阅费；Samsung Galaxy Ring 用户一次性支付 $399。五年下来，Oura 用户比 Samsung Galaxy Ring 用户多花约 $120–$250。Ultrahuman Ring
              AIR（$349）和 RingConn Gen 2（$299）均无订阅费，进一步放大了这一结构性信号：智能戒指品类正在分化为订阅制与买断制两档，消费者对一次性付费的偏好在增强。Apple Watch
              仍是主导消费级健康可穿戴平台，在全球智能手表市场约占 30–40% 份额。Apple 持续扩展健康功能——包括心电图、血氧、睡眠分期和体温传感——逐步蚕食 Oura 的差异化空间。关于 Apple
              推出智能戒指的持续猜测构成尾部风险：Apple 一旦携紧密 iOS 整合进入智能戒指品类，将立即压缩 Oura 的高端定位。平台依赖风险也具有结构性：Oura 依赖 Apple HealthKit 和
              Google Health Connect 进行数据集成，任一平台的政策调整都可能限制数据流或降低应用曝光。消费电子领域 SaaS
              式订阅定价的泛化造成订阅疲劳，若竞争对手持续提供具备可信健康指标覆盖的免订阅替代品，这一长期趋势可能加速用户流失。
