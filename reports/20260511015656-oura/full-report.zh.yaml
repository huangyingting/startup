      - number: '5.2'
        title: 健康算法与评分引擎
        blocks:
          - type: paragraph
            body: >
              Oura 的健康分析引擎将戒指原始传感器数据处理成 30 余项结构化健康指标。睡眠分期采用多参数机器学习模型，睡眠期间以 250Hz 对戒指传感器采样，将睡眠划分为浅睡、深睡、REM
              和清醒四个阶段。心率变异性（HRV）通过 RMSSD（连续差值均方根）计算，采样窗口为夜间 5 分钟——该方法由欧洲心脏病学会和北美起搏与电生理学会工作组推荐。

              准备度评分（Readiness Score）综合前一晚睡眠数据、静息心率恢复情况、HRV 相对 3 个月基线的偏差，以及体温波动。2025 年推出的心血管年龄（Cardiovascular
              Age，CVA）功能以动脉硬度为脉搏波速度的代理指标——这是一个经临床验证的心血管衰老标志物——无需有创测量。心肺适能（Cardio Capacity）通过次极量步行测试算法估算 VO2
              Max，无需实验室设备。日间压力（Daytime Stress）监测将传感器采样延伸至清醒状态，通过追踪
              HRV、心率和体温波动来评估生理压力负荷。韧性评分（Resilience）是一项更新的评分，整合多日恢复模式，对压力适应能力建模。正是这些多模态、纵向算法，让 Oura 有别于更简单的纯心率追踪器。
