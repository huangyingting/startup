      - number: '2.3'
        title: Buyer and user segmentation
        blocks:
          - type: paragraph
            body: >-
              Oura's customer base spans at least four identifiable segments, each with distinct buyer economics,
              adoption triggers, and budget owners. The largest segment by units is the premium health-engaged consumer:
              an individual (typically 28–45, higher income) who self-funds a $349–$499 ring and a $5.99/month
              subscription as part of a preventive health and performance optimization routine. Pew Research (2019
              survey) found that 21% of US adults regularly wore a smart watch or fitness tracker, and adoption
              correlated strongly with income—31% of households above $75,000 vs. 12% below $30,000. This income
              gradient directly shapes Oura's pricing ceiling: the premium segment is real but bounded.


              The second segment is enterprise and workplace wellness, which Oura has explicitly developed, and which
              accounted for approximately 31% of new subscriptions in the 2024–2025 period according to company
              guidance. Budget owners in this segment are HR directors, occupational health officers, or wellness
              program managers at large employers; the trigger is either cost-of-care reduction goals or performance
              optimization programs (common in professional sports, military, and first-responder agencies). The third
              segment is clinical research—academic medical centers, pharmaceutical companies, and contract research
              organizations purchasing Oura rings and data-licensing access as part of longitudinal health studies. The
              fourth segment is government and defense, which represents both an opportunity (DoD contract for
              Warfighter Health initiative) and a risk (data-privacy scrutiny tied to aggregated biometric data flowing
              through Oura's cloud).


              Payer dynamics differ meaningfully across segments: individual consumers pay out of pocket (with Oura
              membership partially eligible for reimbursement through HSA/FSA accounts), enterprise clients pay through
              HR wellness budgets, clinical research clients pay through grant or contract budgets, and
              government/defense clients pay through procurement contracts. The subscription model creates recurring
              revenue from the consumer and enterprise segments, while the clinical and government segments tend to
              involve one-time or term-limited data-licensing arrangements rather than per-seat subscriptions.
            claimRefs:
