companyProfile:
  summary: >-
    Oura Health Ltd. is a Finnish health technology company founded in 2013 and now headquartered in San Francisco, CA.
    It designs and sells the Oura Ring, a titanium smart ring that continuously measures biometric signals—PPG-based
    heart rate and HRV, skin temperature, SpO2, and 3-axis motion—to derive Sleep, Readiness, and Activity scores.
    Revenue comes from hardware sales ($349–$499 per ring) and a recurring Oura Membership subscription (~$5.99/month).
    As of 2026 Oura has sold 5.5M+ rings, counts ~2.1M active subscribers, and has achieved clinical-grade sleep-staging
    accuracy validated in peer-reviewed research. The company raised $200M at a $5.2B valuation in December 2024 and
    $900M+ at an $11B valuation in October 2025, bringing total funding to approximately $1.5B.
