  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
      - Probability (12mo)
    rows:
      - - Samsung Galaxy Ring market share
        - '>20% of new premium smart ring unit sales'
        - Subscription model under structural attack; ARR growth stalls; churn accelerates
        - Downgrade to PASS; re-evaluate entry price at 50%+ discount to $11B
        - 25%
      - - Subscriber retention decline
        - 12-month retention < 80% in two consecutive quarters
        - Recurring revenue moat eroding; subscription ARR growth turns negative
        - Downgrade to PASS regardless of hardware revenue; subscription multiple collapses
        - 20%
      - - Revenue growth deceleration
        - 2026 revenue < $1.0B or YoY growth < 25%
        - Growth thesis invalidated; $11B valuation now 11x+ on decelerating revenue
        - Downgrade to PASS; wait for public pricing or strategic sale data point
        - 20%
      - - Regulatory enforcement
        - FDA 510(k) enforcement, FTC class-action settlement > $50M, or GDPR enforcement
        - Subscription model or data practices disrupted; enterprise customer trust impaired
        - Immediate re-evaluation; potential PASS depending on scope and remediation path
        - 15%
      - - Apple smart ring launch
        - Apple announces smart ring product within 12 months
        - Category disruption with iOS ecosystem lock-in; immediate premium segment compression
        - Downgrade to PASS; reassess only if Oura demonstrates clinical differentiation holds
        - 10%
    notes: >-
      Probability estimates are qualitative base-rate judgments based on competitive evidence, regulatory landscape, and
      comparable company precedents. Triggers are ordered by transmission severity. Multiple simultaneous triggers would
      compound the bear case probability.
    claimRefs:
      - CV031
      - CV032
      - CV033
