      - number: '1.3'
        title: Funding, valuation, and investor base
        blocks:
          - type: paragraph
            body: >
              Oura's fundraising history is one of the most compressed valuation expansions in consumer health tech.
              After early seed and Series A/B rounds, the company raised $100 million in a Series C in 2021. In December
              2024 it closed a $200 million Series D at a $5.2 billion valuation, co-led by Fidelity Management &
              Research and Dexcom (which invested $75 million as part of a strategic partnership). Less than a year
              later, in October 2025, Oura raised over $900 million in a Series E, led again by Fidelity with ICONIQ
              Capital, Whale Rock Capital Management, and Atreides Management joining. The post-money valuation reached
              approximately $11 billion—more than doubling in under 12 months. Total capital raised stands at roughly
              $1.5 billion.


              In early 2026 Oura was reportedly conducting a tender offer allowing early investors to sell shares at a
              discount of approximately 25% to the Series E price, providing liquidity while the company remained
              private. The investor base is concentrated around large institutional growth funds (Fidelity, Whale Rock,
              ICONIQ) and strategic industrials (Dexcom). Earlier investors include Forerunner Ventures, The Chernin
              Group, Temasek, Elysian Park Ventures, JAZZ Venture Partners, Gradient Ventures, and Marc Benioff.


              The company has not announced IPO plans as of the research date, though the scale and valuation trajectory
              suggest public-market access as a plausible medium-term path. Key financial metrics—profitability, EBITDA
              margin, free cash flow—are not publicly disclosed, creating a material diligence gap.
