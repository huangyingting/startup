            body: >-
              Oura operates two distinct B2B channels: elite sports performance partnerships and enterprise wellness
              through Oura for Business. Together these provide commercial credibility, reference customers, and
              institutional distribution distinct from the consumer funnel.

              Sports partnerships include the NBA (2020 COVID bubble, 2,000+ rings deployed, multiple team relationships
              including the 76ers, Pelicans, Clippers, Lakers, Pistons, Heat, Wizards, and Nuggets), UFC, Team USA
              (official wearable for LA28 Olympic and Paralympic Games), US Soccer (all 27 National Teams, founding
              partner of the Arthur M. Blank National Training Center opening spring 2026), and the USTA (five-year
              deal, USTA's first wearable partnership, covering the US Open). Clemson University's men's and women's
              basketball programs used Oura for player monitoring with coach-verified performance results. Red Bull
              Racing and NASCAR extend the motorsport footprint.

              Oura for Business serves 200+ enterprise organizations spanning corporate wellness, healthcare, academic
              research, athletics, and military. Named B2B clients include Thrive Global (CEO Arianna Huffington is a
              public testimonial), US Air Force, US Navy, US Army, NASA, Red Bull Racing, NASCAR, USA Surfing, Noom, and
              the University of Vermont (600-student health study). The US Department of Defense is Oura's largest
              single enterprise customer, with tens of thousands of rings deployed across defense sector since 2019. To
              serve the DoD and other government/enterprise accounts, Oura is establishing a US manufacturing facility
              in Fort Worth, Texas, opening in 2026.

              The Dexcom partnership (November 2024) is the most strategically significant: Dexcom invested $75 million
              into Oura's Series E and integrated its Stelo over-the-counter CGM with the Oura app, creating a combined
              metabolic health view of glucose, sleep, activity, and HRV. The University of California San Francisco
              (UCSF) and West Virginia University (WVU) conducted illness detection and COVID research using Oura Ring
              data in formal study contexts. WVU found the ring could detect illness symptoms up to three days in
              advance with 90% accuracy in one study.

              The Oura API (V2) supports 1,000+ partner integrations, embedding Oura data into third-party health,
