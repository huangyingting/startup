  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Framework and Comparable Analysis
        blocks:
          - type: paragraph
            body: >-
              Oura's $11 billion Series E valuation, set in October 2025 with a $875 million raise led by Fidelity
              Management and Research Company with ICONIQ Growth and Whale Rock Capital, represents the primary
              reference point for this analysis. The prior Series D, closed December 2024 at $5.2 billion with $200
              million raised, provides a secondary valuation anchor and a nine-month trajectory. The implied multiple on
              Series D ($5.2 billion on an estimated $500 million plus 2024 revenue run-rate) was approximately 10x. The
              Series E multiple on estimated 2025 revenue of approximately $1 billion is approximately 11x. On CEO Tom
              Hale's publicly stated projection of $1.5 to $2 billion in 2026 revenue, the Series E implies a forward
              multiple of 5.5 to 7.3x, which begins to approach public-market comp territory.


              The valuation methodology employed here is revenue multiple analysis, appropriate for a high-growth
              hardware-plus-subscription company without publicly reported EBITDA or free cash flow. The comparable set
              spans public consumer-electronics and health-tech companies (Garmin, Apple wearables), private
              health-wearable peers (WHOOP), strategic acquisitions (Fitbit by Google), and high-growth digital health
              companies (Noom, Peloton). Garmin, the most directly relevant diversified wearable/GPS public company,
              trades at approximately 5 to 6 times revenue (market cap approximately $30 to $32 billion on $5.2 billion
              2024 revenue). Oura's subscription component and faster growth warrant a premium to Garmin's multiple.
              WHOOP's last private round valued it at $3.6 billion in 2021 when the company had an estimated $100
              million in annual recurring revenue — a roughly 36x multiple on a smaller, earlier-stage business. Fitbit
              was acquired by Google in January 2021 for $2.1 billion; at the time Fitbit had declining revenue of
              approximately $1.4 billion — roughly 1.5x, a distressed acquisition price. Noom, the digital-health
              subscription platform, was valued at $3.7 billion on its $540 million 2021 raise at a time of peak
              digital-health enthusiasm, but has since struggled with subscriber churn and multiple compression. The
              adverse comparable is Peloton: valued at $50 billion at its November 2020 peak, it had collapsed to
              approximately $1 to $2 billion by 2023 as hardware sales slowed, subscription churn accelerated, and the
              market re-rated its hardware-plus-subscription model at a fraction of its peak multiple. Oura's
              subscription retention (high-80s percent 12-month), clinical validation moat, and enterprise
              diversification differentiate it from the Peloton trajectory, but the Peloton precedent is the primary
              adverse scenario framework.
            claimRefs:
