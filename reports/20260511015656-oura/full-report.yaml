  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Consumer Segments and Demographics
        blocks:
          - type: paragraph
            body: >-
              Oura's primary customer base consists of health-conscious adults aged roughly 25–45 who self-identify as
              athletes, biohackers, or proactive wellness seekers. This cohort is willing to pay a premium — $299–$499
              for hardware plus a $5.99–$6.00 monthly subscription — in exchange for daily biometric insights on sleep,
              readiness, activity, and stress. Celebrity adoption has amplified brand awareness beyond the core
              demographic: Jennifer Aniston, Prince Harry, and Kim Kardashian are publicly known wearers, while tech
              leaders Jack Dorsey, Michael Dell, and Marc Benioff were early devotees. TIME magazine named the Oura Ring
              one of the 100 Best Inventions of 2020 following the NBA COVID-bubble deployment, catalyzing mainstream
              awareness.

              By late 2025, Oura's chief commercial officer Dorothy Kilroy publicly highlighted that women in their
              early twenties had become the fastest-growing customer segment. This demographic shift is driven by Oura's
              expanding women's health platform — cycle tracking, pregnancy insights, perimenopause check-in, and
              menopause insights — which transforms the ring from a general wellness tracker into a women's health data
              companion. Oura has partnered with Twentyeight Health, Midi Health, Evernow, Maven Clinic, and Progyny to
              embed its data within clinical women's health workflows.

              Community engagement is exceptionally strong for a hardware brand. The r/OuraRing subreddit reportedly has
              more than 200,000 members who share personal biometric insights, troubleshoot app issues, and drive
              organic word-of-mouth. Oura Circles, the in-app social layer launched with Ring 4, allows members to share
              daily scores and compete on activity goals, reinforcing daily engagement habits. App Store ratings hover
              between 4.5 and 4.8 stars. PCMag awarded the Ring 4 its Editors' Choice designation at 4.0/5, recognizing
              the breadth and accuracy of its health tracking.

              Oura's HSA/FSA eligibility, confirmed on its homepage as of May 2026, widens the addressable consumer base
              by allowing health spending accounts to cover the ring purchase. Geographic expansion into Australia/New
              Zealand, India, Mexico, and the UAE via local retail partners extended distribution in 2025, with Western
              Europe (UK, Germany, France, Italy) and Asia-Pacific targeted next.
