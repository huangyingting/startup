          announcements, SEC filings from public investors (Dexcom), analyst reports, peer-reviewed research, news
          coverage, and consumer reviews. Oura is a private company and does not disclose audited financial statements.
          All revenue, ARR, and margin figures are estimates derived from company-stated projections, analyst estimates,
          or inferred from subscription/hardware pricing and reported user counts. Readers should not rely on financial
          estimates without independent verification.
