    type: range
    layout: standard
    summary: >-
      Three analyst estimates of the global wearable technology / smart wearables market for 2026 expressed in USD
      billions. Grand View Research and Mordor Intelligence provide specific 2026 figures; an analyst consensus range
      synthesizes multiple paywalled and trade-press-cited estimates. All values are in the same unit (USD billions) but
      reflect different scope definitions, which is the primary driver of the spread.
    data:
      items:
        - label: Grand View Research (broad wearable technology, 2026)
          low: 95
          mid: 103.1
          high: 115
        - label: Mordor Intelligence (smart wearables focus, 2026)
          low: 108
          mid: 118.9
          high: 135
        - label: Multi-analyst consensus range (health wearables, 2026)
          low: 85
          mid: 103
          high: 140
    approximationNotes: >-
      Grand View Research: mid value = published 2026 forecast; low/high represent a ±11% uncertainty band consistent
      with analyst forecast accuracy norms. Mordor Intelligence: mid from published 2026 figure; low/high similarly
      bounded. Multi-analyst consensus: low = most conservative single analyst estimate reviewed (GVR 2025 value of
      $92.9B adjusted); mid = equal-weight average of GVR and Mordor mid values; high = Mordor upper range. Scope
      divergence (inclusion of AR/VR, industrial, audio wearables) is the primary driver of the spread between analysts,
