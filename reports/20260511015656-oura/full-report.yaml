            title: Key-person concentration and opaque governance
            body: >-
              CEO Tom Hale is the face of Oura's fundraising and partnerships. Board composition is not publicly
              disclosed, co-founders' current roles and governance rights are unclear, and the dual-geography structure
              (SF HQ, Oulu R&D) creates execution dependencies. The lack of public financial statements (profitability,
              FCF, debt) is standard for a private company but is a meaningful gap for any counterparty conducting
              commercial diligence.
