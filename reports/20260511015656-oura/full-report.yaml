      - number: '6.4'
        title: Retention, Satisfaction, and Engagement
        blocks:
          - type: paragraph
            body: >-
              Oura's subscription retention is a key financial strength: Sacra reports 12-month retention in the "high
              80s," which is exceptional for a consumer health subscription tied to hardware that must be worn daily.
              The business model's flywheel — hardware purchase sunk cost, daily habit formation around biometric
              scores, and social community engagement — creates durable stickiness.

              The Oura Advisor AI assistant, available to all subscribers, demonstrates engagement depth: in internal
              surveys, 60% of users said the Advisor helped them understand their metrics better, and 87% said it
              accurately remembered their health goals. These figures (company- stated, not independently audited)
              indicate that conversational AI features are driving meaningful engagement beyond passive data viewing.

              Oura Circles and the r/OuraRing subreddit (200,000+ members) function as organic retention mechanisms.
              Community members share readiness scores, troubleshoot app issues, and discuss biometric insights —
              behaviors that reinforce daily engagement and social investment. The community also serves as a
              self-correcting feedback loop: hardware and software defects surface publicly (overheating reports,
              battery drain), creating both reputational risk and an implicit quality accountability pressure on Oura.

              App Store ratings between 4.5 and 4.8 stars across iOS and Android reflect strong user satisfaction on
              core sleep and readiness tracking. PCMag's Editors' Choice award for Ring 4 (4.0/5) represents independent
              expert validation. The TIME 100 Best Inventions 2020 designation, earned through the NBA COVID bubble,
              established Oura's brand among mainstream consumers. Independent reviews in publications including the New
              York Times Wirecutter, Wired, The Verge, PCMag, and Digital Trends consistently rate the Ring 4 as the
              market-leading smart ring.

              Cohort retention across 2022–2025 estimated from industry benchmarks for premium wearable subscriptions
              suggests steady improvement year-over-year, consistent with a maturing product with increasing feature
              differentiation. Oura does not disclose audited cohort retention data.
