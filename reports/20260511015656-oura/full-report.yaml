  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and definitions
        blocks:
          - type: paragraph
            body: >-
              Oura operates at the intersection of three overlapping market layers: (1) the global wearable technology
              market, which encompasses smartwatches, fitness trackers, smart rings, hearables, medical wearables, and
              industrial/ augmented-reality devices; (2) the smart-wearables or consumer health wearable segment, which
              excludes industrial and pure entertainment devices and focuses on health-monitoring electronics; and (3)
              the smart ring sub-segment, which is nascent, premium-priced, and still dominated by Oura with emerging
              competition from Samsung Galaxy Ring, RingConn, and Ultrahuman Ring PRO. Each layer matters to a diligence
              analysis: the broadest layer sets the macro context and investor narrative; the health-wearable segment
              defines the competitive and regulatory environment; and the smart ring layer is where Oura actually wins
              or loses today.


              The included spend in Oura's addressable market spans premium consumer rings ($300–500 hardware plus
              subscription), enterprise wellness programs (B2B contracts for employee health monitoring), and clinical
              research partnerships (data-access fees from academic and pharmaceutical institutions). Excluded spend
              covers commodity fitness bands under $100, medical-grade diagnostic devices with FDA 510(k) clearance as
              Class II or higher, and industrial exoskeleton wearables. Status-quo substitutes for the individual
              consumer include free smartphone health apps, entry-level fitness trackers (Fitbit, Amazfit), and
              established smartwatch platforms (Apple Watch, Samsung Galaxy Watch, Garmin Forerunner) that now
              incorporate many of the same biometric sensors. The key structural question for Oura is whether the smart
              ring form factor retains sustainable differentiation—in particular, continuous 24/7 wear comfort, superior
              passive-monitoring accuracy, and a premium health-insight brand—versus these substitutes as Apple and
              Samsung invest aggressively in their own health platforms.
