  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Ring Hardware Platform
        blocks:
          - type: paragraph
            body: >
              The Oura Ring 4, launched in October 2024, represents a significant hardware redesign around the Smart
              Sensing architecture — a proprietary 18-path multi-wavelength PPG (photoplethysmography) subsystem. Where
              Gen 3 used a single light path, Ring 4 distributes six LEDs (red, infrared, and green wavelengths) across
              18 signal paths to dramatically improve signal quality for SpO2, heart rate, and HRV measurements,
              claiming a 120% improvement in SpO2 signal quality and 30% overall accuracy improvement over its
              predecessor. The sensor module also includes a digital NTC temperature sensor for circadian and ovulation
              tracking, and a three-axis accelerometer for activity and sleep position detection.

              The physical form factor balances medical-grade data capture with wearability. The ring is available in
              sizes 4–15, weighing between 3.3g (size 4) and 5.2g (size 13–15). Dimensions are 7.9mm wide and 2.88mm
              thick at the device body, with sensor bumps recessed to just 0.3mm (reduced from 1.3mm on Gen 3),
              improving ring-to-finger contact and wearer comfort. Battery life reaches up to 8 days on a single charge,
              and the ring is water-resistant to 100m. Materials include titanium in six color finishes (silver, black,
              gold, stealth, brushed titanium, and rose gold) and ceramic in four finishes, enabling premium
              positioning. Ring 4 is manufactured to consumer-electronics standards and retails at $299–$399 for
              titanium and $499 for ceramic.
