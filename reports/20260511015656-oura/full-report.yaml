            title: Rapid valuation growth and strong investor validation
            body: >-
              Oura achieved an $11 billion valuation in October 2025, more than doubling from $5.2 billion in under 12
              months. Fidelity led both the Series D and Series E rounds, providing continuity of institutional
              conviction. The Dexcom strategic partnership ($75 million investment plus technology integration) adds a
              healthcare-grade validator. This investor trajectory suggests strong confidence in Oura's ability to scale
