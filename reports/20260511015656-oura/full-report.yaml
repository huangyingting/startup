      - number: '2.2'
        title: 'Market sizing landscape: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >-
              Independent analyst estimates for the wearable technology market in 2026 range from approximately $92–119
              billion depending on scope. Grand View Research estimates the global wearable technology market at $92.9
              billion in 2025 and $103.1 billion in 2026, projecting 12.1% CAGR to $229.97 billion by 2033. Mordor
              Intelligence's smart-wearable scope—which strips out some industrial devices—sizes the market at $118.89
              billion in 2026, growing to $254.31 billion by 2031 at roughly 16.4% CAGR. These estimates diverge because
              of different scope boundaries (inclusion of industrial, audio, and eyewear wearables varies) and different
              base years, not necessarily because either is wrong.


              Smartwatches are the dominant sub-category in both sizing frameworks, representing 45.6%–60.4% of wearable
              revenue depending on the analyst's scope definition. Smart rings remain a small and not yet separately
              tracked line item in most market reports; rough analyst consensus embedded in trade press citations places
              the global smart ring market at $600 million–$2 billion in 2024–2026, growing faster than the broader
              wearable market as Samsung, Ultrahuman, and RingConn enter. Oura's 2025 revenue of approximately $1
              billion—if the company's own CEO guidance is accurate—implies it holds a commanding share of the smart
              ring revenue pool but remains a single-digit share of the broader health-wearable market. Statista's
              paywalled smart ring market module is not accessible for independent verification.


              Oura's SAM is best approximated as the global health-conscious consumer and enterprise wellness segment at
              $15–25 billion, defined by buyers willing to pay $200+ for a ring with a recurring subscription. The SOM
              in 2026, given ~5.5 million rings sold to date plus new Gen 4 units, is roughly $1.5–2.0 billion of annual
              recurring hardware plus subscription revenue. The SOM calculation is constrained by geographic
              distribution (Oura skews toward North America and Europe), demographic skew (higher-income, health-engaged
              adults), and the subscription friction that limits retention and expansion into more price-sensitive
              segments.
