      - number: '1.4'
        title: Product milestones, partnerships, and competitive position
        blocks:
          - type: paragraph
            body: >
              Oura's product history spans four hardware generations over eleven years. The Gen 1 ring (2015) focused on
              sleep and HRV; Gen 2 (2018) refined design and comfort; Gen 3 (2021–2022) expanded sensors and introduced
              the subscription model; and the current Gen 4 (October 2024) features all-titanium construction, a
              redesigned ceramic chassis option, 18 PPG signal pathways ("Smart Sensing"), enhanced SpO₂ accuracy, and
              up to 8 days of battery life. A Gen 5 device appeared in FCC filings and Oura's own website in April 2026,
              with a launch expected later in 2026.


              Strategic partnerships are a defining competitive advantage. The Dexcom partnership (November 2024)
              integrates continuous glucose monitoring data into the Oura app, targeting the metabolic-health market and
              expanding addressable use cases. Sports partnerships—NBA (notably during the 2020 COVID bubble for health
              monitoring), UFC (official wearable), and U.S. Soccer (2026, official wearable for all U.S. national
              teams)—provide credibility and distribution. The Cleveland Clinic relationship supports research and
              clinical validation. Oura was named the official wearable of Team USA for the LA28 Olympics in 2026, a
              high-profile endorsement.


              Oura competes primarily with Apple Watch, Samsung Galaxy Ring, Garmin wearables, and WHOOP. The Galaxy
              Ring is a notable direct competitor launched by Samsung without a mandatory subscription, creating pricing
              and positioning pressure. Oura's differentiation rests on ring-form-factor accuracy (finger sensors vs.
              wrist), sleep tracking depth, and the Oura Membership platform's health intelligence layer. Over 5.5
              million rings had been sold by late 2025 across 100+ countries.
