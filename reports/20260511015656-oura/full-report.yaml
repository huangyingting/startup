          - type: callout
            title: 'Legal exposure: IP litigation, subscription class action, and privacy'
            body: >-
              Oura faces three simultaneous legal threats as it approaches a potential IPO window. Zepp Health's April
              2026 patent suit (Texas, six counts) could impose damages or disrupt product features. A March 2026
              California class action over subscription auto-renewal practices could mandate compensation and
              business-practice changes. And the DoD/Palantir controversy—though denied by management—carries ongoing
              reputational risk and could trigger regulatory scrutiny over biometric data handling. The convergence of
              these actions in a single window is a material diligence concern.
            calloutType: risk
            claimRefs:
