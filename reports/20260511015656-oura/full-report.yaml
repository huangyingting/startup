      - number: '1.5'
        title: Legal, regulatory, and adverse findings
        blocks:
          - type: paragraph
            body: >
              Oura faces a cluster of legal and reputational risks that diligence must address. On the
              intellectual-property front, Oura has historically been an aggressive IP enforcer, winning a U.S.
              International Trade Commission ruling blocking competing smart rings. However, in April 2026 Zepp Health
              filed a patent infringement lawsuit in Texas alleging that the Oura Ring Gen 3, Gen 4, and the Oura app
              infringe six Zepp Health patents covering motion recognition, sleep monitoring, health scoring, and sensor
              calibration. If successful this could impose damages, licensing costs, or feature restrictions.


              In March 2026 a class action was filed in California alleging Oura violated the state's Automatic Renewal
              Law, Consumers Legal Remedies Act, and Unfair Competition Law by failing to clearly disclose subscription
              auto-renewal terms and making cancellation unnecessarily difficult.


              The most reputationally charged issue involves data privacy. Oura entered a contract with the U.S.
              Department of Defense and engaged Palantir Technologies' FedStart compliance platform to fulfill
              government contracts. Social media backlash alleged that Oura was sharing consumer biometric data with the
              government. Oura's CEO publicly denied these allegations, asserting that government contracts operate on
              separate, secure enterprise servers and that Palantir is used only for compliance infrastructure, not
              consumer data. The controversy highlights the sensitivity of biometric data at scale and the reputational
              risk of defense/government-adjacent business development.
            claimRefs:
              - CO034
              - CO035
              - CO036
              - CO037
              - CO038
              - CO039
              - CO040
