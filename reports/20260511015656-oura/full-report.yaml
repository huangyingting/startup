      - number: '4.4'
        title: Financial Gaps and Diligence Assessment
        blocks:
          - type: paragraph
            body: >
              As a private company headquartered in Finland and now restructuring to a US parent, Oura has no obligation
              to publicly disclose audited financial statements, SEC filings, or detailed segment reporting. This
              creates material information gaps that prevent a complete fundamental underwriting. The five most blocking
              gaps for a financial diligence verdict are: (1) gross margin by segment (hardware vs. subscription vs. B2B
              are all estimated, not confirmed); (2) monthly burn rate and EBITDA/net income (management has confirmed
              "profitability" but not the magnitude or trajectory); (3) subscription churn rate and cohort analysis (the
              "high-80s retention" figure is company-stated but unaudited); (4) revenue concentration by customer
              segment (DoD is the largest enterprise customer but share of total revenue is unknown); and (5) detailed
              cost structure for the planned US manufacturing facility and the five M&A integrations.

              The class-action lawsuit alleging violation of California's Automatic Renewal Law in Oura's subscription
              billing practices is an adverse financial risk, as any settlement or injunctive relief could require
              retroactive refunds or forced changes to the subscription auto-renewal model — potentially impacting
              subscriber retention and revenue recognition.

              Against these gaps, the corroborating evidence for Oura's financial health is strong: two independent
              high-reputation news sources (FierceHealthcare, MedTechDive) confirmed CEO statements on profitability;
              Sacra's third-party analysis independently estimated $1B in 2025 revenue with a detailed revenue-mix
              breakdown; and the participation of institutional investors (Fidelity, JPMorgan, Goldman Sachs) in large
              funding rounds at high valuations provides market-corroborated evidence of financial health. The revenue
              growth trajectory (consecutive 100% annual growth) is exceptional and, while unaudited, is supported by
              corroborating data points including ring units sold, subscriber count, and retail channel expansion.

              The financial verdict is: strong growth momentum with credible profitability signals, but an incomplete
              picture on margins, unit economics, and cash generation. A full diligence data room is needed for
              investment-grade financial analysis. Oura's $11B valuation at approximately 11x 2025 estimated revenue
              (and ~5.5–7x projected 2026 revenue) is within the range of high-growth consumer-tech/platform comparables
              but requires audited confirmation.
