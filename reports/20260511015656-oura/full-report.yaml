  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Oura operates a hardware-plus-subscription revenue architecture with three distinct streams. Primary
              revenue comes from hardware sales: the Oura Ring 4 is priced at $299–$399 for titanium variants and $499
              for ceramic, sold direct-to-consumer through ouraring.com and via 4,000+ retail locations including
              Amazon, Target, and Apple Stores across 20+ countries. In 2024, Oura sold approximately 1.3 million rings,
              generating an estimated $390M in hardware revenue — roughly 80% of the company's $500M+ total revenue for
              the year.

              The second and strategically more important revenue pillar is the Oura Membership subscription at $5.99
              per month (or $69.99 annually), which is required to unlock all health analytics and personalized insights
              beyond basic daily scores. With 2 million paying subscribers as of late 2025 and 12-month retention rates
              in the high-80s, subscription revenue represented approximately 20% of total revenue — an estimated $110M
              in 2024 based on Sacra's analysis. Subscription gross margins are company-cited at approximately 68%,
              structurally higher than the hardware segment, creating a SaaS-like recurring-revenue flywheel that funds
              ongoing AI and product investment.

              The third revenue stream is B2B/enterprise: Oura for Business deploys rings and analytics dashboards to
              enterprise clients including the U.S. Department of Defense (the largest enterprise customer, with tens of
              thousands of rings deployed since 2019), the NBA, UFC, Medicare Advantage plan Essence Healthcare, and
              over 1,000 API/ecosystem partners. Enterprise accounts have driven 31% of new subscriptions in recent
              periods. Adjacent monetization includes the $99 Health Panels blood-test add-on (via Quest Diagnostics at
              ~2,000 US labs) and the Dexcom Stelo CGM sensor integration at $99. These add-on products increase revenue
              per user without requiring subscription price increases and are early but growing contributors to total
              ARPU.

              The aggregate revenue trajectory shows two consecutive years of approximately 100% growth: ~$250M in 2023
              → $500M+ in 2024 → $1B+ targeted for 2025 → $1.5–2B projected for 2026. This compounding growth, combined
              with confirmed profitability in 2024, positions Oura's revenue quality as high — though all figures remain
              unaudited and company-stated.
