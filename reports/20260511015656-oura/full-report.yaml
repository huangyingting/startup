      - number: '5.4'
        title: Integration Ecosystem and API
        blocks:
          - type: paragraph
            body: >
              Oura operates a public REST API (Version 2) using OAuth2 authentication, enabling third-party developers
              and enterprise partners to access personal health data with user consent. API version 1 was retired in
              January 2024, requiring all integrations to migrate to V2. The ecosystem has grown to over 1,000 partner
              integrations spanning wellness apps, clinical research platforms, enterprise HR tools, fitness
              applications, and health monitoring services.

              The most strategically significant integration is with Dexcom Stelo, a consumer-grade continuous glucose
              monitoring (CGM) sensor. Dexcom Stelo data flows into the Oura app, enabling users to correlate continuous
              glucose levels with ring biometrics such as sleep quality, heart rate variability, and activity, creating
              a multi-modal metabolic health view not available in either product alone. This integration followed
              Dexcom's $75M strategic investment in Oura (November 2024).

              Health Panels, launched Q4 2025, is a blood biomarker testing add-on delivered through a Quest Diagnostics
              partnership, providing access to 50-biomarker blood panels for $99 at approximately 2,000 US Quest
              Diagnostics locations. SteadyMD provides the telehealth layer for results review. Oura also integrates
              bidirectionally with Apple Health, Google Fit, and Samsung Health for cross-device data sharing, and with
              employer wellness platforms for B2B deployments.
