            title: Hardware-plus-subscription model with high retention
            body: >-
              The $5.99/month Oura Membership subscription, introduced with Gen 3, transformed Oura's economics.
              Reported annual subscriber retention of approximately 89%, combined with an estimated 2.1 million active
              subscribers and ~68% subscription gross margin, creates a recurring revenue base increasingly resembling a
              SaaS business alongside hardware sales. Revenue approximately doubled in 2024 and again in 2025, and
              management guidance of $1.5–$2 billion for 2026 implies continued compounding.
            calloutType: strength
            claimRefs:
