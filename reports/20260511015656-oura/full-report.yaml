      - number: '2.4'
        title: Growth drivers
        blocks:
          - type: paragraph
            body: >-
              Several structural macro trends support durable growth in the health wearable market through 2026 and
              beyond. First, chronic disease burden is both a demand signal and a reimbursement tailwind: the WHO
              reports that non-communicable diseases cause 74% of all global deaths globally, and the preventive
              monitoring use case (detecting early warning signs for cardiovascular disease, metabolic dysfunction, and
              sleep disorders) is one of the strongest demand drivers for continuous health monitoring. Reimbursement
              policies are gradually expanding to cover FDA-cleared wearables for chronic disease management, lowering
              effective cost for patients and creating an institutional buyer channel that barely existed five years
              ago.


              Second, subscription-based digital health services are growing at roughly 17% CAGR, and fitness app
              revenue reached $3.4 billion in 2025—a 24.5% year-over-year increase (Business of Apps)—with 540 million
              fitness app users globally. This validates the consumer willingness to pay recurring fees for health
              software, which underpins Oura's $5.99/month membership economics. Third, the services and subscription
              layer across the broader smart-wearable market is growing at 16.94% CAGR, faster than hardware, favoring
              Oura's hardware-plus- SaaS model over pure-hardware competitors who must re-monetize at upgrade cycles.
              Fourth, CB Insights' State of Digital Health Q1 2026 report notes that digital health "accelerated into
              2026 with funding and deal size both climbing as capital concentrated in fewer, larger bets," signaling
              sustained venture and corporate R&D investment that will expand the overall ecosystem.


              Enterprise health program growth is a specific near-term driver for Oura. Corporate wellness budgets have
              shifted from general gym memberships toward data-driven biometric platforms following the post-pandemic
              emphasis on mental health, sleep, and burnout prevention. The professional sports and military sectors—
              where Oura holds partnerships with the NBA, UFC, and the US DoD—serve as proof points that raise
              credibility and enable cross-segment expansion. The Asia-Pacific region is forecast to grow at 17.31% CAGR
              for smart wearables through 2031, providing a geographic expansion runway beyond Oura's current North
              America and Western Europe concentration.
