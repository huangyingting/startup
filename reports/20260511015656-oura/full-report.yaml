      - number: '6.5'
        title: Adverse Signals and Concentration Risks
        blocks:
          - type: paragraph
            body: >-
              Oura faces several material customer-facing risks that warrant diligence scrutiny.

              Privacy controversy (2025): A wave of public customer backlash erupted in September 2025 after Oura's
              press release announcing its Fort Worth manufacturing facility mentioned a tie-up with Palantir's FedStart
              platform for US DoD customers. Users on TikTok accused Oura of sharing biometric data — including women's
              menstrual cycle data — with the government and Palantir. CEO Tom Hale's public response characterized the
              concerns as "totally overblown," insisting only DoD customers' segregated data flows through FedStart and
              that Oura will "never sell your data to anyone, ever." The controversy nonetheless triggered visible
              customer churn, with many users publicly announcing ring abandonment. Given the HIPAA carve-outs for
              government access and political sensitivities around women's health data post-Roe, the risk remains
              reputationally elevated.

              Subscription paywall backlash: When Oura introduced the $5.99/month membership requirement with Gen 3
              (2021), it received significant user anger from customers who felt they were paying again for features
              previously included with hardware. This churn event established a pattern: price changes and feature gates
              may trigger disproportionate community response.

              Hardware reliability issues: December 2025 ZDNet coverage reported Oura Ring overheating and smoking
              incidents on Reddit, with one user sustaining a blister. Oura called the incidents "isolated" (two
              reported cases among 5.5M+ rings), but the coverage created reputational risk. Battery degradation issues
              also surfaced in 2025, with Ring 4 users reporting life below the advertised 8 days within one year of
              purchase.

              Concentration risk: The US DoD is Oura's largest single enterprise customer. Loss or restriction of this
              relationship — whether through procurement rule changes, security vetting issues, or contract non-renewal
              — would represent a material revenue and credibility setback. Platform dependency on Apple App Store and
              Google Play creates vulnerability to distribution policy changes.

              Competitive pressure: Samsung Galaxy Ring launched in 2024 without a subscription fee, directly
              challenging Oura's subscription model. Apple Watch and Google Pixel Watch continue offering rich health
              features at similar price points. If subscription fee sensitivity increases or a credible zero-fee
              alternative gains traction, Oura's 12-month retention in the "high 80s" could deteriorate.
            claimRefs:
              - CU026
              - CU027
              - CU028
              - CU029
              - CU011
