      - number: '5.6'
        title: Compliance, Security, and Data Privacy
        blocks:
          - type: paragraph
            body: >
              Oura's security and compliance posture is strong for a consumer health device company and exceeds what is
              legally required for a general wellness product. The company undergoes an annual SOC 2 Type II audit
              covering the Trust Services Criteria for security, availability, and confidentiality, and maintains HIPAA
              compliance through an annual third-party audit — notable because Oura is not legally a HIPAA-covered
              entity and undergoes this audit voluntarily to serve enterprise healthcare customers. All data transmitted
              between the ring, mobile app, and cloud backend is encrypted using TLS 1.2 or higher; data stored in the
              cloud is protected with AES-256 encryption. Oura's privacy policy, last updated April 2026, documents a
              GDPR-compliant consent architecture requiring explicit user authorization for data processing.

              The ring's classification as a general wellness device (not an FDA-regulated medical device) carries both
              a regulatory benefit — no 510(k) or De Novo clearance required for current features — and a constraint:
              Oura cannot legally market any feature as diagnostic or therapeutic. This regulatory position is
              consistent with competitors (Samsung Galaxy Ring, Garmin) but creates a ceiling on the medical claims the
              company can make in marketing and app copy, which is a structural limitation for B2B healthcare and
              Medicare Advantage deployments that increasingly require FDA-cleared data inputs for clinical decision
              support.
