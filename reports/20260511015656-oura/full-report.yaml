  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Oura occupies an inherently ambiguous regulatory position representing a latent but material business
              risk. The company frames the Oura Ring as a wellness device, not a medical device, which shields it from
              FDA 510(k) clearance requirements under the current enforcement-discretion framework for low-risk device
              software functions. The FDA exercises discretion for software posing minimal patient risk intended for
              general wellness use, but this is a policy posture not a permanent guarantee. The Cardiovascular Age
              feature, which estimates arterial stiffness as a proxy for vascular aging, and Cardio Capacity VO2 Max
              estimation move toward diagnostic assessment. A formal FDA guidance update, a high-profile adverse outcome
              traced to Oura health outputs, or congressional attention on health wearables could narrow the safe harbor
              and force 510(k) submissions that would delay feature rollouts and impose significant compliance costs.
              The European Medical Device Regulation, fully effective since 2024, requires stricter technical
              documentation, clinical evidence, and post-market surveillance for devices marketed with health claims in
              the EU, creating incremental compliance cost and market access risk if EU regulators challenge the
              wellness framing. The most immediate legal risk is the California class action. Three consumers filed suit
              in California federal court on December 26, 2024 alleging Oura Health Oy and Ouraring Inc. violated the
              Automatic Renewal Law by failing to clearly disclose subscription renewal terms and not providing an easy
              cancellation mechanism. The complaint also invokes the Consumers Legal Remedies Act and Unfair Competition
              Law. The FTC holds explicit investigatory authority over Oura under the Data Privacy Frameworks and has
              expanded application of the Health Breach Notification Rule to personal health record applications. Oura
              privacy policy acknowledges FTC jurisdiction, creating a real enforcement path for any data incident or
              deceptive practice finding. GDPR classifies biometric and health data as special categories requiring
              explicit consent and strict data minimization for Oura EU operations, and EU member state DPAs have broad
              investigatory authority.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
              - CR008
              - CR037
