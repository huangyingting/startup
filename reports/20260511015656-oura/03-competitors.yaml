  - id: smartwatch-platforms
    title: "Smartwatch platforms: Apple Watch, Garmin, and Google Fitbit"
    body: >-
      Apple Watch is the dominant consumer health smartwatch platform globally, with Apple capturing an estimated
      30–40% of the global smartwatch market. The Apple Watch Series 10 ($399 for aluminum, $799 for titanium)
      offers a 10mm-thin case, sleep apnea detection (new in watchOS 11), Vitals monitoring dashboard (heart rate,
      temperature, SpO2, respiratory rate), and deep integration with Apple Health and Apple Fitness+ service. The
      Series 10 requires daily charging, which limits its passive overnight monitoring capability compared to Oura's
      5–8 day battery life. Apple's potential smart ring entry—which has appeared in patent filings and analyst
      speculation but has not been confirmed—represents an existential competitive risk for Oura, as it would bring
      Apple's ecosystem, manufacturing scale, and retail distribution directly into Oura's form-factor category.

      Garmin serves a distinct but partially overlapping market segment: premium GPS-enabled sport watches for
      runners, cyclists, triathletes, and outdoor enthusiasts. The Garmin product line spans $200–$1,000+, with
      flagship devices such as the Garmin Fenix 8 and Epix Pro offering advanced VO2 max tracking, body battery
      (energy monitoring), sleep tracking, HRV status, and menstrual cycle tracking. Garmin's key differentiators
      are GPS precision, multi-sport tracking depth, and long battery life (up to 10+ days for many models). Garmin
      does not require a subscription for most features, uses Garmin Connect (free) as its primary app, and has
      Garmin Health API for enterprise wellness applications. Garmin overlaps with Oura in the health-conscious
      premium user segment but serves a more fitness-performance-oriented buyer rather than a sleep-and-recovery
      or passive-biometric buyer.

      Google Fitbit, now fully integrated into Google Health, occupies the lower end of the health wearable market
      with devices like Fitbit Charge 6 (~$160) and the newly announced Google Fitbit Air—a screenless fitness
      tracker that appears to respond to the smart ring trend with a wrist-worn screenless form factor. Google
      Fitbit Premium ($10/month) provides Daily Readiness Score, sleep analytics, and advanced health
      insights—directly competing with Oura Membership's positioning at a meaningfully lower price point.
      However, Google Fitbit's brand has lost consumer mindshare since the acquisition, and its product lineup
      is perceived as less premium than Oura, Apple Watch, or Garmin. Google's broader Pixel Watch 4 and
      integration with Android Health Connect represent the platform-level ecosystem play, with Google Health as
      the connective data layer.
