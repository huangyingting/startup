      missingEvidence: "Oura's annual subscription retention rate is cited in third-party sources as approximately 89%, but no primary source (Oura financial disclosure, audited retention report, or investor materials) has been located to confirm this figure. The benchmark comparison against industry SaaS retention norms is also unverified."
