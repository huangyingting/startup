  evidenceGaps:
    - id: EGR001
      topic: "Subscriber churn rate impact since Samsung Galaxy Ring launch"
      description: >-
        No public data exists for Oura month-over-month subscriber churn rate or net subscriber
        acquisition trends since the Samsung Galaxy Ring launched in July 2024. This is a critical
        data point for assessing the competitive threat. The company reports high-80s 12-month
        retention but does not disclose shorter-period churn metrics. This information is typically
        available only in the data room for investor diligence.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
        - QR009
      relatedTableRefs:
        - TR001
        - TR003

    - id: EGR002
      topic: "Apple HealthKit and Google Health Connect integration agreement terms"
      description: >-
        The specific contractual terms of Oura integration agreements with Apple HealthKit and
        Google Health Connect are not publicly disclosed. It is unknown whether these integrations
        operate under standard developer terms (revocable unilaterally), custom partnership
        agreements, or formal data licensing terms. The dependency risk cannot be fully assessed
        without understanding the contractual protections, if any, against unilateral API restriction.
      severity: material
      type: private-evidence-only
      relatedQuestionRefs:
