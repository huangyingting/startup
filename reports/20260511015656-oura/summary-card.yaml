summary:
  headline: >-
    Oura is the undisputed smart-ring category leader with clinical-grade biometric validation and a growing
    subscription revenue base, but the $11B valuation at an estimated 20-30x ARR is stretched and demands revenue and
    retention transparency before committing capital.
