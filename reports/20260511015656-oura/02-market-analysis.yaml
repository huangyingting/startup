figures:
  - id: FM001
    title: "Market sizing lens"
    type: pyramid
    layout: standard
    summary: >-
      Three-tier market sizing lens for Oura: the broad wearable technology TAM (~$103B in 2026), the health-
      focused consumer and enterprise SAM (~$20–25B), and the smart ring / premium wearable SOM (~$1.5–2B).
      Each layer reflects a different analyst or internal estimate, with the SAM and SOM based on partial and
      synthesized evidence. Grand View Research and Mordor Intelligence anchor the TAM; SAM is author-estimated
      based on smartwatch-adjusted health share; SOM is informed by Oura's reported revenue trajectory.
    data:
      items:
        - label: "TAM: Global Wearable Technology (GVR 2026)"
          value: 103.1
          unit: "$B"
          notes: "Grand View Research estimate for all wearable devices globally in 2026"
        - label: "SAM: Health-Focused Wearables (Consumer + Enterprise)"
          value: 22.0
          unit: "$B"
          notes: "Author-estimated; ~21% of TAM applying health/wellness share of wearable spend; excludes industrial and audio"
        - label: "SOM: Smart Ring + Premium Health Ring Market"
          value: 1.5
          unit: "$B"
          notes: "Synthesis of analyst consensus ($0.8–2B range) and Oura CEO revenue guidance (~$1B in 2025); mid-point estimate"
    approximationNotes: >-
      SAM and SOM are derived estimates, not directly cited from a single analyst source. TAM from Grand View
      Research (2026 forecast); SAM estimated by applying health/consumer share to TAM using smartwatch/fitness
      segment proportions from Mordor Intelligence; SOM anchored to Oura CEO guidance of ~$1B 2025 revenue and
      analyst estimates of $0.8–2B for the smart ring market. All figures should be treated as order-of-magnitude
      approximations pending independently verified smart ring market sizing.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM022
      - CM041

