callouts:
  - calloutType: insight
    title: "Smart ring market is nascent and under-measured"
    body: >-
      No major analyst firm publishes a publicly available, non-paywalled smart ring market size for 2026. Estimates
      range from $0.8B to $2.0B depending on scope, but none are independently verifiable without purchasing
      paywalled reports. This creates a due-diligence gap: investors cannot independently validate the market-size
      narrative that Oura and its investors use to justify the $11B valuation multiple.
    claimRefs:
      - CM011
      - CM043

  - calloutType: risk
    title: "Subscription-free competitors structurally challenge Oura's monetization model"
    body: >-
      Samsung Galaxy Ring ($399, no subscription), RingConn Gen 3 (no subscription), and Ultrahuman Ring PRO (no
      mandatory subscription) are collectively normalizing ring ownership without recurring fees. If consumer
      expectations shift toward subscription-free hardware—as happened in the smartwatch market—Oura will face
      pressure to either eliminate the subscription or dramatically increase its perceived value. The current
      $5.99/month fee is $71.88/year, adding ~20% annual cost on top of a $349 ring purchase.
    claimRefs:
      - CM036
      - CM037
      - CM038
      - CM039

