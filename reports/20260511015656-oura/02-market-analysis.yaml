      severity: minor
      topic: "wearable-market-scope-definitions"
      missingEvidence: "Analyst scope definitions for the wearable technology market are not fully harmonized; Mordor Intelligence broad wearable report, smart wearables report, and GVR report all use different scope boundaries. No authoritative reconciliation of scope differences is publicly available."
      whyItMatters: "Scope inconsistencies make it difficult to track market share trends over time or compare analysts' growth rate forecasts against a consistent baseline."
      diligencePath: "Request analyst directly for scope reconciliation notes; alternatively, define Oura's own market boundary and apply consistently across all sizing estimates in investor materials."
