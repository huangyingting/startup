    - type: missing-source
      topic: "smart-ring-market-size"
      missingEvidence: "No publicly accessible, non-paywalled analyst report provides a verified smart ring market size for 2026. Statista, Grand View Research, Fortune Business Insights, and MarketsandMarkets all gatekeep this figure behind paid subscriptions. The $0.8–2.0B estimate is a synthesis from trade press summaries and partial data."
      whyItMatters: "Without a verified smart ring market size, it is impossible to independently assess Oura's market share, TAM penetration rate, or the credibility of its $11B valuation relative to market size."
      diligencePath: "Purchase GVR smart ring report or Statista smart ring time series; request Oura management to share or license market sizing basis used in investor materials."
      relatedQuestionRefs: [QM002, QM026]

    - type: missing-source
      severity: material
      topic: "oura-subscription-retention"
      missingEvidence: "Oura has not publicly disclosed active subscriber counts, annual subscription churn rate, or net revenue retention. The 89% annual retention figure cited in press is company-disclosed, not audited."
      whyItMatters: "Subscription retention is the single most important metric for Oura's recurring revenue model. Without audited churn data, it is impossible to model sustainable revenue and evaluate whether the subscription moat is durable."
      diligencePath: "Request subscriber count, monthly churn, and NRR as part of due diligence data room; cross-check against cohort-level subscription renewal patterns from any disclosed cohort data."
      relatedQuestionRefs: [QM022, QM024]

    - type: missing-source
      severity: material
      topic: "subscription-free-competitor-impact"
      missingEvidence: "No publicly available data documents whether Samsung Galaxy Ring's no-subscription model has affected Oura's customer acquisition or churn since Galaxy Ring launched in mid-2024. No market share data for the smart ring segment by unit volume exists in public sources."
      whyItMatters: "If Galaxy Ring is capturing market share and suppressing Oura's subscription conversion rate, the revenue growth story is at risk. Lack of public data makes this the most consequential unresolved competitive question."
      diligencePath: "Request Oura internal NPS, post-Galaxy Ring acquisition rate trends, and win/loss analysis from sales team; seek app store data from Sensor Tower or similar for Oura app download trends."
      relatedQuestionRefs: [QM015, QM016]

