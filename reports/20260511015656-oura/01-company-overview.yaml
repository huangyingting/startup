      - CO021
      - CO022

  - calloutType: strength
    title: "Hardware-plus-subscription model with high retention"
    body: >-
      The $5.99/month Oura Membership subscription, introduced with Gen 3, transformed Oura's economics. Reported
      annual subscriber retention of approximately 89%, combined with an estimated 2.1 million active subscribers
      and ~68% subscription gross margin, creates a recurring revenue base increasingly resembling a SaaS business
      alongside hardware sales. Revenue approximately doubled in 2024 and again in 2025, and management guidance
      of $1.5–$2 billion for 2026 implies continued compounding.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010

  - calloutType: risk
    title: "Legal exposure: IP litigation, subscription class action, and privacy"
    body: >-
      Oura faces three simultaneous legal threats as it approaches a potential IPO window. Zepp Health's April 2026
      patent suit (Texas, six counts) could impose damages or disrupt product features. A March 2026 California class
      action over subscription auto-renewal practices could mandate compensation and business-practice changes. And
      the DoD/Palantir controversy—though denied by management—carries ongoing reputational risk and could trigger
      regulatory scrutiny over biometric data handling. The convergence of these actions in a single window is a
      material diligence concern.
    claimRefs:
      - CO034
      - CO035
      - CO036
      - CO037
      - CO038
      - CO039

  - calloutType: risk
    title: "Key-person concentration and opaque governance"
    body: >-
      CEO Tom Hale is the face of Oura's fundraising and partnerships. Board composition is not publicly disclosed,
      co-founders' current roles and governance rights are unclear, and the dual-geography structure (SF HQ, Oulu R&D)
      creates execution dependencies. The lack of public financial statements (profitability, FCF, debt) is standard
      for a private company but is a meaningful gap for any counterparty conducting commercial diligence.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016

