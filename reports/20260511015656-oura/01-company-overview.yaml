company:
  name: "Oura"
chapter:
  number: 1
  title: "Company Overview"
  summary: >-
    Oura (Oura Health Ltd.) is a Finnish health technology company founded in 2013 in Oulu, Finland, that designs and
    sells the Oura Ring—a consumer smart ring tracking sleep, activity, readiness, and an expanding range of biometric
    signals. Headquartered in San Francisco with R&D centered in Oulu, Oura has grown from a Kickstarter project to
    one of the most valuable private health-tech companies in the world, with an $11 billion valuation after its
    October 2025 Series E raise of over $900 million led by Fidelity. The company reports close to $1 billion in 2025
    revenue and is targeting $1.5–$2 billion for 2026. It has sold more than 5.5 million rings and operates a
    hardware-plus-subscription model ($5.99/month Oura Membership). Strategic partnerships with Dexcom, the NBA, UFC,
    and Cleveland Clinic, combined with aggressive product innovation (Gen 4 ring, AI features, women's health),
    position Oura as a category leader, though it faces mounting legal scrutiny over IP, subscription practices, and
    data-privacy concerns tied to government contracts and the Palantir relationship.

sections:
  - id: section-1
    title: "Identity, mission, and operating model"
    body: >
      Oura Health Ltd. was incorporated in Oulu, Finland in 2013. Its public mission is to empower people with
      personalized, clinically relevant health insights through the Oura Ring—a consumer-facing smart ring worn on the
      finger rather than the wrist, providing continuous biometric data including sleep staging, heart-rate variability,
      resting heart rate, skin temperature, SpO₂, and activity. The company's headquarters have since shifted to San
      Francisco, California, while a substantial R&D organization remains in Oulu, giving Oura a dual-geography
      operating model unusual among consumer-wearables companies.


      The operating model has two primary revenue pillars: (1) a hardware sale at $349–$499 per ring, and (2) a
      recurring Oura Membership subscription priced at $5.99/month (or $69.99/year) that unlocks the bulk of advanced
      health analytics in the companion app. This hardware-plus-SaaS architecture, introduced fully with the Gen 3
      ring in 2021–2022, has been the dominant driver of financial momentum and investor confidence. Management
      reports subscription gross margins of approximately 68%, meaningfully above the wearables-industry average,
      and 89% annual subscriber retention.


      In 2025 Oura reported revenues approaching $1 billion and CEO Tom Hale publicly projected $1.5–$2 billion in
      2026 sales, implying a near-doubling of revenue for the second consecutive year. The company employs roughly
      1,000–1,250 people globally and has partnered with a growing roster of enterprise and clinical clients,
      including the NBA, UFC, Cleveland Clinic, and, most recently, the U.S. Department of Defense. An enterprise or
      B2B segment now contributes roughly 31% of new subscriptions, diversifying revenue away from pure consumer
      channels. Oura's Gen 4 ring, released October 2024 with all-titanium construction and Smart Sensing, is the
      current flagship device, while a Gen 5 ring has appeared in FCC filings and is widely expected in late 2026.
    claimRefs:
