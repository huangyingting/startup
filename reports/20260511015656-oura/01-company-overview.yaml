  - id: section-2
    title: "Founding history and leadership"
    body: >
      Oura was founded in 2013 by three Finnish engineers: Petteri Lahtela (initial CEO), Kari Kivelä, and Markku
      Koskela. All three came from Finland's telecom and mobile-technology ecosystem centered in Oulu. Early
      development was self-funded and financially precarious—founders worked months without salaries and used personal
      credit cards. The concept was validated by a 2015 Kickstarter campaign that raised more than $650,000, far
      exceeding its goal, and the Gen 1 ring debuted at the San Francisco Launch Festival that same year.


      Tom Hale became CEO in 2022, bringing experience from Macromedia, HomeAway, and MomentiveAI. His appointment
      marked a deliberate professionalization of the executive team to support the company's scaling phase. The 2026
      leadership team includes Michael Chapp (COO), Holly Shelton (Chief Product Officer), Dorothy Kilroy (Chief
      Commercial Officer), Teemu Kurppa (CTO Software), Judy Gilbert (Chief People Officer), Doug Sweeny (Chief
      Marketing Officer), and Adi Shammout (CISO). Co-founders Lahtela and Kivelä are no longer in public-facing
      executive roles; their current involvement or board representation is not disclosed in public materials,
      representing a key-person and governance information gap.


      The board composition is not publicly disclosed in detail. Investor representatives from Fidelity, Forerunner
      Ventures, ICONIQ Capital, and possibly Dexcom are likely present but have not been confirmed in public sources.
      Oura's dual-geography structure—San Francisco HQ with Oulu R&D—creates an execution dependency on maintaining
      Finnish engineering talent and cross-Atlantic coordination.
