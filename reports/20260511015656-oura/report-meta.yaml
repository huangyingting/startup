companyProfile:
  summary: "Oura Health Ltd. is a Finnish health technology company founded in 2013 and now headquartered in San Francisco, CA. It designs and sells the Oura Ring, a titanium smart ring that continuously measures biometric signals—PPG-based heart rate and HRV, skin temperature, SpO2, and 3-axis motion—to derive Sleep, Readiness, and Activity scores. Revenue comes from hardware sales ($349–$499 per ring) and a recurring Oura Membership subscription (~$5.99/month). As of 2026 Oura has sold 5.5M+ rings, counts ~2.1M active subscribers, and has achieved clinical-grade sleep-staging accuracy validated in peer-reviewed research. The company raised $200M at a $5.2B valuation in December 2024 and $900M+ at an $11B valuation in October 2025, bringing total funding to approximately $1.5B."
  foundedDate: "2013-01-01"
  founders:
    - name: "Petteri Lahtela"
      role: "Co-Founder & Founding CEO"
      background: "Serial Finnish entrepreneur; led Oura from founding through initial product launches."
      claimRefs: ["CO011"]
    - name: "Kari Kivela"
      role: "Co-Founder & Chief Technology Officer"
      background: "Hardware and sensor technology expert; led ring hardware development in Oulu, Finland."
      claimRefs: ["CO012"]
    - name: "Markku Koskela"
      role: "Co-Founder"
      background: "Co-founded Oura with Lahtela and Kivela; involved in early product and business development."
      claimRefs: ["CO013"]
  foundingLocation: "Oulu, Finland"
  headquarters: "San Francisco, CA (global HQ); Oulu, Finland (R&D center)"
  productSummary: "The Oura Ring Gen 4 (released October 2024) is a titanium smart ring with an 18-path PPG array, NTC temperature sensor, and 3-axis accelerometer. It syncs via Bluetooth to the Oura app (iOS/Android), which surfaces Sleep Score, Activity Score, and Readiness Score. The Oura Health platform provides an API for researchers and enterprise clients. A Dexcom CGM integration combines blood-glucose data with ring biometrics for diabetes management."
  customerFocus: "Health-conscious consumers (primary), sports organizations (NBA, UFC), clinical researchers, and enterprise wellness programs."
  businessModel: "Hardware sales ($349–$499 per ring) + recurring subscription (Oura Membership, ~$5.99/month). B2B enterprise and research contracts represent a growing segment (~31% of new subscriptions per company claim)."
  stage: "Late Stage / Series E"
  fundingStatus: "Series E closed October 2025 at $11B valuation ($900M+ raised). Total funding ~$1.5B. Prior rounds include Series D ($200M, Dec 2024, $5.2B valuation), Series C ($100M, 2021), Series B (~$25M, 2018), Series A (~$5M, 2016), and a 2015 Kickstarter ($650K)."
  disclosureProfile: "private-undisclosed"
  claimRefs: ["CO001", "CO002", "CO003", "CO004", "CO009"]
