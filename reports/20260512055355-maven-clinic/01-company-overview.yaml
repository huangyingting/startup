    private-data gaps, and investment implications.
sections:
  - id: company-overview-section-1
    title: Evidence base and thesis relevance
    body: >-
      Maven Clinic company overview diligence is evidence-constrained but actionable because the public record contains
      a mix of official materials, third-party coverage, market context, and risk sources. The section emphasizes what
      can be verified from retained sources and separates it from information that should be requested in a data room.
      For Maven Clinic, the most important analytical stance is that public evidence can establish category
      participation, recent financing context, product direction, and some customer or partner signals, but it cannot by
      itself prove repeatable economics. This matters for investment work because a private unicorn round can validate
      external demand while still leaving material uncertainty about retention, margin, sales efficiency, and
      implementation quality. The specific unresolved diligence path for this section is: ARR, NRR, gross margin,
      implementation cost, and employer renewal cohorts. Until that evidence is reviewed, the report treats strong
      public claims as directional signals rather than final underwriting proof. The 2026 freshness check also keeps
      volatile facts separate from older background material.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
    tableRefs:
      - TO001
      - TO002
    figureRefs:
      - FO001
      - FO002
  - id: company-overview-section-2
    title: Operating proof and gaps
    body: >-
      Maven Clinic company overview diligence is evidence-constrained but actionable because the public record contains
      a mix of official materials, third-party coverage, market context, and risk sources. The section emphasizes what
      can be verified from retained sources and separates it from information that should be requested in a data room.
      For Maven Clinic, the most important analytical stance is that public evidence can establish category
      participation, recent financing context, product direction, and some customer or partner signals, but it cannot by
      itself prove repeatable economics. This matters for investment work because a private unicorn round can validate
      external demand while still leaving material uncertainty about retention, margin, sales efficiency, and
      implementation quality. The specific unresolved diligence path for this section is: Outcomes proof by product
      line, including fertility, maternity, menopause, and parenting. Until that evidence is reviewed, the report treats
      strong public claims as directional signals rather than final underwriting proof. The 2026 freshness check also
      keeps volatile facts separate from older background material.
