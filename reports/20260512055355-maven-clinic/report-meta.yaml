  topStrengths:
    - Fresh Series F evidence supports unicorn status in an underrepresented healthcare-benefits category.
    - Maven addresses a large, persistent gap in women and family health access for employers and payers.
    - Public sources indicate scaled enterprise adoption and broad product coverage across life stages.
    - The model can compound if outcomes data, member engagement, and benefits integration remain strong.
  topRisks:
    - Public sources do not disclose ARR, gross margin, NRR, claims savings, or cohort retention.
    - Employer-benefits budgets can tighten and put pressure on point-solution vendors.
    - >-
      Clinical quality, privacy, reproductive-health regulation, and multi-state provider coverage remain material
      risks.
    - Competitive alternatives include fertility-specific, care-navigation, payer, and incumbent benefits platforms.
  unresolvedGaps:
    - ARR, NRR, gross margin, implementation cost, and employer renewal cohorts.
    - Outcomes proof by product line, including fertility, maternity, menopause, and parenting.
    - Claims-savings methodology, privacy/security audit results, and clinical quality metrics.
    - Customer concentration, broker/channel economics, and sales-cycle durability.
