companyProfile:
  summary: >-
    Maven Clinic 是一家总部位于美国纽约州纽约市的未上市公司，属于医疗健康 / 女性与家庭数字健康领域。Maven
    提供虚拟护理平台、护理倡导员、数字项目和雇主福利导航，覆盖生育规划、孕产、育儿、更年期及相关女性与家庭健康需求。本报告把最近一轮确认独角兽身份的融资视为可信筛选证据，但最终投资判断前仍需私有运营材料。
  foundedDate: '2014-01-01'
  founders:
    - name: Kate Ryder
      role: 创始人兼 CEO
      background: 数字健康创业者，围绕女性与家庭健康导航搭建了 Maven。
      claimRefs:
        - CO001
  foundingLocation: New York, New York, USA
  headquarters: New York, New York, USA
  productSummary: Maven 提供虚拟护理平台、护理倡导员、数字项目和雇主福利导航，覆盖生育规划、孕产、育儿、更年期及相关女性与家庭健康需求。
  customerFocus: 大型雇主、健康险计划、福利团队，以及希望在各生命阶段获得家庭健康支持的成员。
  businessModel: B2B2C 雇主与支付方订阅 / 福利平台，包含会员参与、护理导航、虚拟服务提供者和管理式福利服务。
  stage: Series F private unicorn
