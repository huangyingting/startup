      - number: '3.2'
        title: 能力基准与 1X 产品对比
        blocks:
          - type: paragraph
            body: >-
              将 1X 与直接竞争者对标，可以看到清晰取舍。在商业部署规模上，1X EVE 以约 390 台企业客户部署量领先所有纯仿人机器人公司——除 Agility Robotics Digit
              外，超过任何竞争者。Digit 已部署在 Amazon 履约中心、GXO Logistics 和 Ford；其 Amazon 部署是行业内商业意义最重的案例，代表首个大规模工业仿人机器人部署。

              在双足移动和灵巧操作上，1X 的轮式 EVE 落后于完全双足竞争者。Boston Dynamics Atlas 虽未面向通用任务商业部署，但展示了完整杂技式能力。Figure AI 的 Figure 02 和
              Agility 的 Digit 都能在真实工厂环境中行走并执行操作任务。Apptronik Apollo 和 Sanctuary AI Phoenix 是可信的双足平台，企业试点正在推进。1X 的 NEO
              双足机器人就是为这一空间竞争而设计，但它将在 2026 年进入市场，届时多个竞争者已有 12–24 个月双足部署经验。

              在 AI 集成上，Figure AI 与 OpenAI 的合作使其能够获得前沿语言模型能力，并与操作系统紧密集成。1X 的具身学习策略——用 VR
              遥操作数据端到端训练神经网络——具有差异化，也已经产生公开展示的自主任务表现；但所有玩家与人类能力之间仍存在很大的自主性缺口。Tesla Optimus 受益于 Tesla 大规模 AI 训练基础设施（Dojo
              超级计算机、FSD 神经网络栈），小公司很难复制。

              价格方面，1X NEO 的 $20,000（或 $499/月）与 Tesla Optimus 公开提出的长期目标价直接竞争。不过 Unitree G1 为 $16,000，H1 为 $90,000，夹住市场，其中
              G1 一旦能借第三方 AI 软件增强自主能力，将构成明确低成本威胁。1X 与 Unitree 等中国竞争者之间的价格差，是关键战略变量。
