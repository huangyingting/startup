      - number: '1.2'
        title: 领导层、治理与组织结构
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 由创始人兼 CEO Bernt Øivind Børnich 领导；自 2014 年创立 Halodi Robotics 以来，他一直掌舵。Børnich
              是挪威机器人学家，主导了公司更名、连续融资和产品转向中的技术路线。他也是公司最主要的公开代表，出现在所有重要媒体互动中，显示出显著的关键人依赖。

              AI 研究由 AI 副总裁 Eric Jang 负责。他掌管具身学习数据引擎，并公开解释过 1X 靠 VR 遥操作规模化训练机器人的策略。Jang 的角色以 San Francisco Bay Area
              为中心，对公司核心 AI 差异化主张至关重要。2025 年 1 月收购 Kind Humanoid 后，Christoph Kohstall 加入 1X；他曾是 Stanford University
              科学家，也是 Google 机器人团队成员。Halodi 时期的早期公司材料还将 Nicholas Nadeau 列为 CTO，但更名后公开材料没有确认其当前状态。

              1X 是私营公司，治理结构——包括董事会构成、投资人权利和股权结构表——尚未公开披露细节。审阅过的公开材料中，公司没有发布公司章程或治理文件。董事会上的投资人代表可从领投方 EQT Ventures（Series
              B）和 OpenAI Startup Fund（Series A2）推断，但具体董事席位未获确认。公司没有披露任何监管、法律或 IPO 相关治理里程碑。美国总部迁至 Palo Alto
              后，管理层提到希望从更广泛的 Bay Area 生态吸引顶尖 AI 人才，并与投资方和合作伙伴加强协作。
