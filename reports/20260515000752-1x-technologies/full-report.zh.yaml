      - number: '2.2'
        title: 市场规模测算——TAM、SAM、SOM 与分析师估计
        blocks:
          - type: paragraph
            body: >-
              仿人机器人仍处商业化早期，市场规模天然不确定；即便如此，多家独立研究机构对 2033–2035 年总可用市场给出的估计正在收敛到 $35B–$75B 区间。Goldman Sachs（2023，2024
              更新）预计 2035 年全球仿人机器人市场为 $38 billion，2030 年可服务市场（SAM）约 $6 billion，重点是西方市场的制造、仓储和企业安防。这一 SAM
              估计建立在明确的近期部署场景——产线支持、物料搬运、楼宇安保——之上，而不是简单用 TAM 乘以通用系数。

              ARK Invest 的视角更激进：若将仿人机器人视为全球各行业人类劳动力替代品，2030 年可触达机会超过 $24 trillion。该数字体现 ARK
              一贯的自上而下方法，基础假设是自动化可捕获全球劳动报酬中的相当一部分。这个数字有方向参考价值，但不是近期可触达市场，应理解为天花板情景。IDC 对全球服务机器人市场（涵盖仿人和非仿人服务机器人）的更保守估计为
              2030 年 $50 billion，CAGR 约 20%。

              Mordor Intelligence、MarketsandMarkets 和 Grand View Research 分别预计 2033–2035 年仿人机器人市场为 $35–$75
              billion，覆盖保守到乐观情景，CAGR 估计为 40–55%。区间很宽，反映市场边界（仅仿人 vs. 更广义服务机器人）、地理范围和采用速度假设不同。Statista 和 ABI Research
              提供了服务机器人收入轨迹的支撑数据。

              对 1X Technologies 而言，SOM 没有公开预测。基于当前 EVE 部署（ADT 和 Everon 约 390 台）以及 NEO 预购价格（$20,000 或 $499/月），对 2026–2028
              年收入的数量级估计为 $10M–$50M，并会随着 NEO 规模化快速增长——但这仍只是从公开数据粗略推断，并非公司披露数字。
