      - number: '6.5'
        title: 客户尽调缺口与反向笔记
        blocks:
          - type: paragraph
            body: >-
              最重大的客户尽调缺口，是缺乏任何独立验证的客户留存或满意度数据。在 RaaS 商业模式里，续约率是产品市场匹配度能否持续的核心指标。没有来自 ADT 和 Everon 的已确认续约数据，ARR
              轨迹只能算推测。投资人在给增长预测背书前，应从 1X 数据室取得明确续约确认、合同延期条款和使用率数据。

              隐私风险是 NEO 进入消费者市场的首要反向变量。WSJ 2025 年 10 月调查报道及 Wired 后续报道记录了消费者对远程操作员查看家庭内部的抵触。1X
              的同意加模糊控制回应了表层担忧，但没有消除结构性问题：依赖远程操作的自主性，本质上需要人类观察私人空间。如果交付后出现隐私投诉或监管执法，NEO 消费者爬坡可能停滞，并连带影响企业端 EVE 部署。

              次要反向笔记是客户集中度。ADT 和 Everon 约占企业机队部署的 ~95%，1X
              的商业可行性实质上押在两段采购关系上。两个客户都没有公开发布前瞻扩张承诺。安防机器人市场若出现任何恶化——无论来自机器人性能不佳、保险责任担忧，还是宏观预算压力——都会不成比例地冲击 1X
              收入。证据矩阵（FU003）和集中度风险表（TU005）系统汇总了这些暴露。
