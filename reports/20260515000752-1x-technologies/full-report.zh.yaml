      - number: '7.2'
        title: 运营、质量与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 面临一系列运营风险，当前较小的机队规模部分遮蔽了这些风险。硬件可靠性是首要未知数：约 390 台 EVE
              已部署在商业环境中，但公司还没有面对数千台规模下出现的质量管理挑战。平均故障间隔时间（MTBF）数据未公开披露。行业背景令人担忧——多家其他机器人公司经历过硬件故障、安全事故和召回，最终需要昂贵的现场干预。NEO
              Gamma 的双足设计引入了 EVE 轮式平台没有的额外失效模式（跌倒、关节磨损、套装退化）。

              网络安全是被明显低估的风险维度。EVE 和 NEO 都是持续联网设备，配有摄像头、麦克风和执行器，并在设施或家庭里运行。被攻陷的机器人可被用于监控、数据外泄、物理扰动或勒索。1X
              尚未发布网络安全白皮书、渗透测试结果或安全架构文档。相比之下，Amazon Alexa 和 Google Nest
              这类简单得多的联网设备都遭遇过大量安全审查。带摄像头和机械操作能力的家用机器人，攻击面严重程度要高得多。

              供应链风险集中在自研执行器部件和 3D 编织纺织制造。影响训练 GPU 算力的半导体短缺，以及执行器专用部件可能存在的单一供应，会造成制造延期风险。如果关键执行器部件供应商遇到质量问题或供给中断，NEO
              Gamma 生产可能显著延迟。风险传导图（FR002）展示了运营风险如何传导到收入、客户和融资结果。
