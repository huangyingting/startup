  - id: FE001
    title: 产品架构图
    type: stack
    layout: standard
    summary: 六层技术栈展示 1X 的架构，从实体硬件延伸到云基础设施。图中从底部自研执行器到顶端云 GPU 训练，体现垂直一体化设计；具身 AI 数据引擎连接硬件层和智能层。
    data:
      items:
        - label: 云 GPU 训练基础设施
          detail: 用于在遥操作演示数据上训练神经网络的计算集群
        - label: 具身学习数据引擎
          detail: VR 遥操作管线把真实世界演示转成训练批次
        - label: 端到端神经网络（控制 AI）
          detail: 联合优化模型把传感器输入直接映射为电机指令
        - label: 传感器套件（摄像头、IMUs、本体感知）
