      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              仿人机器人采用的主要增长驱动因素分为四类。第一，结构性劳动力短缺：美国约有 10 million 个未填补岗位（多个 2024–2025 年分析师报告引用的 BLS 数据），Goldman Sachs
              估计仿人机器人到 2030 年可填补其中最多 4%。WEF Future of Jobs 2025 报告预计，全球 85 million 个岗位将被自动化替代，同时产生 97 million
              个自动化相邻新岗位，带来对技能升级人类工人和机器人助手的净需求。McKinsey 研究显示，到 2030 年自动化可能影响全球 400–800 million 个岗位。

              第二，AI 硬件成本下降：计算成本、传感器价格和执行器制造经济性的快速改善，已将基础仿人机器人的物料清单成本压到 $50,000 以下——这一门槛让规模化企业安防商业案例开始可行。第三，VC
              和企业投资背书：PitchBook 数据显示，2024 年仿人机器人 VC 融资超过 $1 billion，Tesla、Figure、Agility、Apptronik 和 1X
              均获得大量资本，带动供应商、集成商和 AI 模型开发者生态。第四，数据飞轮：早期部署者积累专有训练数据，提升模型表现，给 1X 这类已有商业部署的先行者带来复利优势。

              主要采用约束同样显著。单机成本 $20K–$100K+，相当于用机器人替代人力需要 1–5 年回本，许多行业的 CFO 批准并不稳。自主能力有限——多数机器人仍需人类遥操作完成复杂任务——削弱感知 ROI
              和价值主张。监管缺位：美国和欧盟尚无面向工作场所仿人机器人的正式标准，企业采用方面临责任不确定性。消费者信任不足：NEO 遥操作模式（WSJ 2025 年 10
              月披露）引发隐私担忧，可能拖慢家庭市场采用。制造规模化的资本强度也会在需求完全确立前约束供给。
