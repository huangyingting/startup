  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 的收入主要来自两款已商业化产品：EVE，一款以机器人即服务（RaaS）月度订阅部署的双足商业机器人；NEO，一款面向家庭的仿人机器人，可直接购买硬件，并可能附带订阅层。EVE
              是当前收入引擎。公开披露的 EVE RaaS 定价约为每台每月 $3,500 至 $5,000，使其成为截至 2026 年纯创业公司中定价最具体的商业仿人机器人产品。两个锚定企业部署——ADT（140 台）和
              Everon（约 250 台）——构成公司的核心经常性收入基础，合计部署机队约 390+ 台。若按 390 台、每台每月 $3,500 计算，毛收入运行率对应的月经常性收入约为 $1.37
              million；视实际合同价格、使用率和折扣而定，意味着年化运行率约 $15–25 million。公司没有披露官方收入数字。NEO 于 2024 年宣布，零售价约 $20,000。NEO 的订阅层（据报道约
              $499/月）曾被市场推测，但 1X 尚未正式确认。RaaS
              模式通常在合同期内按月确认收入，收入质量优于硬件一次性销售模式。专业服务和入门部署构成第二类但未披露的收入来源。公司没有披露按细分市场划分的收入、毛利率，或已确认收入与递延收入。
