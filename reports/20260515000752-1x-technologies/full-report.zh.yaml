      - number: '3.3'
        title: 定价、包装与商业模式对比
        blocks:
          - type: paragraph
            body: >-
              仿人机器人竞争格局中，商业模式和定价策略差异很大。1X 率先采用双定价模式：NEO 硬件买断价 $20,000，EVE 采用企业合同（估计为 $3,500–5,000/月或一次性 $100K+），同时为消费版
              NEO 提供 $499/月订阅。这一订阅模式在仿人机器人竞争者中独特，类似自主洗地（Brain Corp、Avidbots）和仓库
              AMR（Locus、Fetch、Vecna）等相邻品类已经验证过的机器人即服务（RaaS）模式。

              Agility Robotics 主要以企业合同提供 Digit，而不是直接售卖，并在 Amazon 和 GXO Logistics 项目中强调 RaaS 模式。价格未公开披露，但分析师估计为每台
              $100,000–150,000，或等值年度合同额。Agility 已由 Agility Robotics 母公司收购——它拥有独立融资，投资方包括 Amazon 和其他投资者。Boston Dynamics
              Atlas 目前未面向通用任务商业销售；其此前商业产品 Spot 定价约 $70,000–90,000。

              Tesla Optimus 尚未公布面向第三方销售的商业价格；当前部署仅限 Tesla 自有工厂内部。Elon Musk 提出的长期零售价格 $20,000 带有愿景性质，取决于大规模制造。Figure AI
              没有公开披露其 BMW 工厂部署的定价。Apptronik Apollo 企业合同估计为每台 $100K+。Sanctuary AI Phoenix 商业条款未公开披露，但已有与 Mark's Work
              Wearhouse（Canada）及美国零售商的部署报道。

              Unitree G1 的 $16,000 是市场上最具破坏性的定价信号：它以低于 $20K 的价格提供双足机器人，竞争者目前无法在同等硬件能力下匹配。如果 Unitree 产品通过自有 AI
              或第三方集成达到足够自主运行水平，它可能拿下价格敏感的企业 SME 细分，并将硬件层商品化。
