    approximationNotes: 定性评级（高 / 很高 / 中）来自公开披露、机器人硬件创业公司的行业基准以及同业公司分析。1X 未披露财务数据。制造扩产被评为很高风险，原因是双足人形机器人大规模生产资本强度高，且公司未披露制造合作伙伴或规模目标。
