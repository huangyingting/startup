      - number: '5.4'
        title: 开发路线图与量产准备度
        blocks:
          - type: paragraph
            body: >-
              1X 的开发路线图沿分阶段弧线推进：先用企业市场验证轮式机器人，再走向可进入家庭的双足人形机器人；每个阶段既验证技术，也为下一阶段生成训练数据。2024 年 8 月 NEO Beta
              发布，在完整尺寸上验证了核心双足具身 AI 架构。2025 年 2 月 NEO Gamma 发布，展示了整合 Kind Humanoid 机身收购成果的量产意向设计。2025 年 10 月开启的预购以
              $20,000 买断 / 每月 $499 订阅定价，确认了 2026 年交付的商业意图。截至 2026 年 Q2，除 2026 年目标外，NEO Gamma
              的交付时间和批量规模尚未公开确认；公司也未披露生产速率数据。

              2026–2027 年路线图围绕三条并行主线：（1）扩大 NEO Gamma 制造能力以履行预购订单；（2）把 NEO 的自主能力从当前约 70%
              远程操作依赖，推进到能在一组明确家庭任务上具备有意义的自主性；（3）开发具备 π 式多任务泛化能力的基础模型，减少逐任务训练需求。基础模型工作使 1X 贴近行业大方向（Physical Intelligence
              的 π0、Figure 的 Helix 等）：通用机器人策略可被微调，而不必每个任务从零重训。

              NEO Gamma 的量产准备度有实质执行风险。定制执行器和 3D 编织套装要规模化制造，供应链部件并非完全商品化。负责 EVE 的挪威 Moss 制造设施，尚未被公开确认具备消费级批量生产 NEO Gamma
              的能力。2025 年夏季启用的 Palo Alto 80,000 sq ft 设施主要是工程和 AI 训练中心。投资人和预购客户应把制造合作伙伴公告作为按时交付的关键领先指标。
