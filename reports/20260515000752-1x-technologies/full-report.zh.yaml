      - number: '4.5'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 讲出了一个有吸引力的商业牵引故事——纯创业公司中最大的已确认仿人机器人机队、企业级客户，以及可信的 RaaS 定价模型——但任何已披露财务数据的缺失，严重限制了财务尽调。没有
              ARR、MRR 队列数据、留存率，以及按产品和部署队列划分的毛利率，就无法评估收入质量。单位经济模型依赖估计 COGS；在当前规模下，这可能让现有 RaaS 模式毛利为负。资本充足性不确定：据报道公司正在寻求
              $1 billion Series C，但关闭时间和投资方构成尚未确认，形成二元融资风险。通往盈利的毛利路径需要靠制造规模和设计优化降低 COGS，靠自主能力提升降低现场服务成本，并扩张毛利以覆盖 R&D 和
              G&A 开销。上述里程碑没有任何公开披露时间线或指标。任何资本配置决策前必须解决的尽调阻断项包括：已确认月度烧钱和现金余额，经审计或管理层审阅的收入与毛利数据，按客户划分的 ARR 和 MRR 队列分析，逐产品
              COGS 瀑布图，Series C 融资状态，以及任何债务或或有负债。总结而言，1X 商业上有差异化，但财务上高度不透明。投资逻辑完全取决于必须通过正式数据室取得的私有财务证据。
