      - number: '8.5'
        title: 尽调事项、投资逻辑破裂触发器与退出准备度
        blocks:
          - type: paragraph
            body: >-
              最终尽调事项表（TV006）列出八项优先数据请求；在任何 Series C 定价水平下，投入资本前都必须解决。最关键的是：EVE 收入运行率和 ADT/Everon
              合同条款，因为已确认经常性收入是首要估值锚；NEO 预购积压数量，用于验证或挑战消费者市场投资逻辑；以及烧钱速度和现金跑道，用于确认 Series C 时间表并非由急性资本压力驱动。Series C
              条款和投资人构成会影响优先股堆叠和稀释悬垂分析；自主性指标——自主完成任务与通过远程操作完成任务的比例——是 NEO 在规模化商业可行性上的领先指标。

              投资逻辑破裂与毙命触发器表（TV005）定义了五个具体事件，一旦出现就意味着投资逻辑失败，需要立即采取组合行动：Series C 未在 2026 年 Q4 前关闭；ADT 或 Everon
              合同终止，或机队减少超过 20%；NEO 出货延迟到 2027 年 Q4 之后且没有可信里程碑更新；CEO Børnich 或 AI 副总裁 Jang 离开且未任命继任者；或 FTC、GDPR、EU AI Act
              对家庭远程操作数据采集采取执法行动。这些触发器来自第 4 章财务分析、第 7 章风险登记表和第 3 章竞争分析，为 Series C 投资建立跨章节监控框架。

              1X Technologies 的退出可选性有三条路径：IPO（基于公开市场可比公司的 $100M+ ARR 要求，时间在 2029 年以后）、由生态内企业伙伴战略并购（Samsung NEXT
              既有投资是概率最高的人才收购或全面收购路径），以及通过要约收购向早期投资人提供二级市场流动性。在当前规模下，最可能的近期退出是 $1–3B 区间的战略并购。NEO
              预购和商业验证数据，是改善退出时点和价格的主要杠杆。TV006 中第 1–4 项（收入、预购、烧钱速度、Series C 条款）最终尽调结果为正，是从 TRACK 转向 INVEST 的最低门槛。
            claimRefs:
              - CV011
              - CV013
              - CV014
              - CV015
              - CV031
              - CV039
