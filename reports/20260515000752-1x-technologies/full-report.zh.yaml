      - number: '4.2'
        title: 成本结构、毛利率与单位经济模型
        blocks:
          - type: paragraph
            body: >-
              1X 的成本结构具有早期机器人硬件公司的典型特征：R&D、制造和现场支持推高资本强度；在当前规模下，毛利率很可能为负到小幅为正。基于第三方硬件基准和竞争仿人平台类比，EVE 硬件 COGS 估计为每台
              $15,000–25,000，但官方 COGS 数据未披露。按每台机器人每月 $3,500–5,000 的 RaaS 定价，在乐观假设下，硬件成本约 3–7
              个月可收回；这还未计入现场服务、软件维护和折旧成本。每台已部署 EVE 的真实毛利率未知。行业基准显示，第一代仿人硬件在当前批量下毛利率为负到低个位数正值；单批规模超过 500 台后会显著改善。R&D
              支出可能占运营支出的 40–60%，这与 1X 对自主 AI 开发和快速产品迭代周期（EVE 到 NEO）的强调一致。企业机器人销售和 GTM 成本很高：典型企业销售周期为 6–18
              个月，获客成本（CAC）估计为每账户 $50,000–200,000，取决于交易规模和部署复杂度。因此回本周期被拉长，在规模化期间形成资本拖累。营运资本管理是关键风险：收入发生前必须先制造机器人库存，RaaS
              合同还可能需要试点期，从而推迟现金回收。1X 没有公开披露毛利率、COGS、CAC 或回本周期。
