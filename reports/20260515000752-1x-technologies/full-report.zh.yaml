        - label: 2025 年 1 月融资带来的估算现金跑道（月）
          low: 7
          high: 20
          note: $100M 融资除以 $5–15M/月烧钱速度；对烧钱假设高度敏感
        - label: 每台 EVE 估算硬件 COGS（USD/台）
          low: 15000
          high: 25000
          note: 源自同业硬件成本基准；1X 未官方披露
        - label: Series C 融资目标（USD）
          low: 500000000
          high: 1000000000
          note: 据报道目标约 ~$1B；若市场条件变化，下限反映可能降低的最终到账
    approximationNotes: 所有区间均为估算，来自公开定价、媒体报道和行业基准。1X 未官方披露财务数据。收到数据室材料后应更新区间。下限代表乐观情景；上限反映公开证据有限但数值更高的情景。
