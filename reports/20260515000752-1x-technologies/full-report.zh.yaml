      - number: '1.4'
        title: 产品、客户与商业化证据
        blocks:
          - type: paragraph
            body: >-
              1X 有两款主要产品，商业成熟度不同。EVE 是面向工业和机构环境的轮式仿人机器人。它拥有 23 个自由度，所有关节具备力控和阻抗控制，每只手臂可承载 8
              kilogram，并配有自然语言界面，操作员可通过语音命令串联任务。EVE 已在至少两个具名企业客户处规模化商业部署：ADT 据报道下单 140 台 EVE，是当时全球最大的仿人机器人订单；Everon（前
              ADT Commercial）在商业楼宇夜间安保中部署约 250 台 EVE。挪威 Sunnass Hospital 被列为医疗部署案例，挪威高校也已收到 EVE 设备。

              NEO 是为家庭使用设计的双足仿人机器人。它经历了原型阶段：NEO Beta 于 2024 年 8 月 30 日亮相，定位为家庭部署原型，少量进入选定家庭用于研究。NEO Gamma 于 2025 年 2 月
              21 日发布，引入 3D 编织尼龙外衣以降低受伤风险，加入用于沟通反馈的「Emotive Ear Rings」、100Hz 动态平衡控制、来自人体动作捕捉的强化学习，以及能够抓取多种物体的视觉操作模型。2025
              年 10 月 28 日，1X 开放 NEO 预购，一次性买断价 $20,000，或按月订阅 $499，订金 $200，预计 2026 年发货。

              NEO 当前部署模式有一个关键运营限制：早期体验家庭中的多数任务将由远程人类遥操作员通过 VR 头显完成，而不是由完全自主的 AI 完成。CEO Børnich
              直接承认了这一点，称买家必须同意，在预约时段内遥操作员可以访问其家庭数据。公司将其包装为训练自主模型所必需的数据采集策略，而非产品限制；但外部分析师和记者认为，这暴露了市场化产品愿景与近期现实之间的重大落差。
