      - number: '6.4'
        title: 市场进入可复制性与集中度风险
        blocks:
          - type: paragraph
            body: >-
              1X 的 EVE 市场进入模式，是通过安防集成商关系做企业直销。ADT 和 Everon 合作证明，渠道型打法——通过大型托管服务运营商销售，而不是直接卖给终端设施——可以推动 EVE
              采用。相比直接从零开拓，这一模式更省资本，但也把收入和获客风险集中在狭窄的合作伙伴渠道里。如果 ADT 或 Everon 任一方停止 EVE
              项目（原因可能是成本、性能不满或战略优先级调整），考虑到相对机队规模，收入影响估计分别约为企业 ARR 总额的 40–60%。

              安防垂直之外的市场进入可复制性尚未确认。相邻垂直领域（医疗、物流、酒店）有不同采购周期、终端用户和合规环境。医疗尤其会引入患者安全监管要求（FDA、欧洲 CE Mark），EVE 尚未就此公开回应。1X 的
              EVE 产品路线图似乎聚焦于加深安防部署，同时继续推进 NEO 开发，而不是激进把 EVE 扩张到新垂直领域。

              NEO 的消费端市场进入定价（$20,000 / 每月 $499）瞄准高端细分市场，可能是科技早期用户和富裕家庭。进入大众市场需要另一套定价策略。公司未披露任何分销渠道（零售、电商、白标）；通过 1x.tech
              直接面向消费者预购，是唯一已确认渠道。渠道扩张公告将是消费者细分市场规模化意图的关键领先指标。
