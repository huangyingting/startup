      - number: '2.5'
        title: 规模测算尽调缺口与相互矛盾的估计
        blocks:
          - type: paragraph
            body: >-
              多个重大证据缺口限制了对市场规模和采用轨迹的信心。第一，不同机构对仿人机器人 TAM 的估计相差 2–3x（2033–2035 年为 $35B 到
              $75B+），反映其对采用速度、价格点演进和地理市场定义的基本假设不同。Goldman Sachs 到 2030 年约 $6B 的 SAM 估计更保守，也可能更适合近期规划，但尚未有其他机构用同一方法独立复现。

              第二，没有公开来源实时追踪全球仿人机器人部署总量。1X 的 EVE 机队（约 390 台）和 Agility 在 Amazon 的 Digit
              部署常被引用，但全行业部署估计来自新闻稿和分析师推断，而不是经验证的出货数据。第三，企业安防机器人市场规模（2027 年
              $3–5B）基于有限分析师覆盖，可能没有纳入非仿人安防机器人在内的完整竞争格局。第四，美国和欧盟的仿人机器人监管框架完全缺位，在医疗、航空、食品处理等受监管行业，预测采用时间线与真实世界部署可行性之间存在落差。最后，没有分析师发布过企业仿人机器人需求价格弹性的正式评估——这是估计单机价格降至
              $10K、$5K 或 $2K 后市场扩张的关键输入。
