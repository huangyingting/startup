  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - EVE 收入运行率
        - ADT 或 Everon 的 EVE 企业部署未披露 ARR、MRR 或收入运行率
        - 主要估值锚；没有确认收入，所有可比倍数都属推测
        - CFO；要求提供月度 MRR、合同期限、续约历史和混合单台定价
      - - NEO 预订单积压
        - 预订单于 2025 年 10 月开放；未披露订单数量或订金金额
        - 消费者逻辑验证：带订金的积压订单超过 1,000 台，会显著提高信心
        - CEO 或销售副总裁；要求提供当前积压订单数量、地域分布和订金转化率
      - - 烧钱速度和现金跑道
        - 未披露现金余额、月度烧钱速度或 12 个月现金跑道预测
        - Series C 时间和困境风险：若现金跑道低于 9 个月，谈判筹码会受损
        - CFO；要求提供月度现金消耗、账上总现金，以及带模型假设的 12 个月现金跑道预测
      - - Series C 条款和投资者构成
        - 截至 2026 年 Q2，轮次规模、投后估值和领投方构成未确认
        - 入场价是主要回报变量；优先股堆叠和反稀释条款影响净 IRR
        - CEO 或法律顾问；要求提供条款清单、投后股权结构表、优先权结构和共同投资者名单
      - - 自主能力水平指标
        - 未披露 NEO 或 EVE 自主完成任务与远程遥操作完成任务的比例
        - NEO 消费者可行性需要达到 L2+ 自主能力；当前遥操作比例决定持续成本结构
        - AI 副总裁 Eric Jang；要求提供月度自主率进展、任务复杂度指标和 2026 年路线图目标
      - - 硬件可靠性（MTBF）
        - EVE 或 NEO 未发布平均故障间隔时间或保修索赔数据
        - RaaS 模型单位经济高度依赖维护成本；MTBF 决定长期利润率
        - 工程或运营团队；要求提供现场可靠性数据、维护干预率和保修索赔
      - - 专利组合和 IP 所有权
        - 除公开登记中的少量已知美国专利外，公开专利披露有限
        - 如果 Tesla 或 Figure AI 规模化并寻求自由实施，IP 护城河耐久性决定可防守性
        - 总法律顾问；要求提供完整专利组合清单、待审申请、自由实施分析和 IP 所有权
      - - 董事会构成和投资者权利
        - 未确认 Series B 后董事会构成、投资者权利摘要或股权表
        - 治理结构影响退出灵活性、Series C 定价、反稀释保护和董事会控制
        - CEO 或法律顾问；要求提供董事名单、主要投资者权利摘要和当前股权表
    notes: >-
      尽调问题按其对 Series C 投资决策的重要性排序。第 1–4 项（收入、预订单、烧钱速度、Series C 条款）本质上是阻断级缺口，任何投资承诺前都必须解决。第 5–8 项（自主能力指标、硬件
      MTBF、专利、董事会构成）对投资质量判断很重要，但若第 1–4 项顺利解决，不一定构成阻断。任何有约束力的 Series C 承诺前，所有项目都应在正式数据室中解决。若未披露第 1–4 项，建议应维持观察。
    claimRefs:
      - CV039
