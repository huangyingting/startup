        title: 公开牵引力与商业里程碑
        blocks:
          - type: paragraph
            body: >-
              1X 最具体的公开财务牵引信号是已部署机队规模。截至 2026 年，ADT 的 140 台 EVE 部署是北美已确认的最大商业双足仿人机器人合同。Everon 部署又增加约 250 台，使已确认商业机队总量达到约
              390+ 台。这让 1X 成为纯创业公司中已确认商业仿人机器人部署的领先者，领先 Agility Robotics（Amazon/GXO 的 100+ 台 Digit）许多，也远高于仅披露试点规模部署的
              Figure AI 和 Apptronik。公司没有披露收入或 ARR 数字，也没有提供 MRR 队列分析或收入增长轨迹。截至 2026 年，公司没有确认 NEO
              是否已从预购转入批量商业发货。公开信号显示公司有活跃商业牵引——拿下企业合同、从挪威扩张到美国，以及 OpenAI 和 NEA
              等战略投资方参与——但这些信号都没有转化为已披露财务结果。私有指标缺口包括：按客户队列划分的
