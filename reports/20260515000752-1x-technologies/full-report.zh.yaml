      - number: '2.3'
        title: 买方分层、采用路径与付款方地图
        blocks:
          - type: paragraph
            body: >-
              仿人机器人市场包含三类主要买方，采用动态各不相同。企业买方——包括企业安防运营、设施管理部门、仓储和物流运营商、制造工厂管理者——构成近期商业机会：采购流程可预测，有资本设备预算，购买以 ROI 为导向。ADT
              部署 140 台 EVE 用于夜间安保，Everon 部署约 250 台，是当前商业化证明。采购通常由运营副总裁或首席安全官推动，他们可动用 CapEx 或服务合同 OpEx 预算。

              消费者买方——房主和家庭决策者——代表 NEO 及竞品的长期 TAM。NEO 定价 $20,000 或
              $499/月，瞄准有显著可支配收入的早期科技消费者。该细分市场的采用触发点主要是便利和节省时间（家务自动化），但近期转化率会受遥操作模式和有限自主能力制约。如果自主能力达到门槛，消费者家庭机器人市场到 2030
              年的 TAM 估计为 $10–15 billion。

              医疗和医院系统构成第三个新兴细分，应用包括患者转运、药物配送和基础护理辅助。挪威 Sunnass Hospital 是 1X
              早期客户。该细分采购周期更长，并需要监管许可；但护理劳动力短缺是强结构性驱动因素。预算通常由设施资本设备委员会掌握，采用触发点包括护理人员短缺（当前在美国和欧洲已很严峻）以及按患者日成本优化。第四个细分——高等教育与科研——规模更小，但作为早期标杆客户，对建立生态信誉有战略意义。
