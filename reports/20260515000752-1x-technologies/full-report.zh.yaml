      - number: '7.3'
        title: 合作伙伴、依赖与客户集中风险
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 有三类合作伙伴和依赖风险，单独看都可管理，但叠加后形成脆弱的依赖栈。第一，是对 OpenAI 的战略 AI 依赖：OpenAI Startup Fund 领投 Series
              A2，OpenAI 的技术合作（尤其是 AI 模型访问和集成）被公司列为 AI 战略赋能因素。如果 OpenAI 调整机器人战略、改变许可条款，或直接进入具身 AI 竞争，1X 将需要在失去 OpenAI
              集成优势的情况下快速内化 AI 模型开发。没有公开披露的合同保护覆盖这一情景。

              第二，是对 EQT Ventures 的资本依赖：EQT 是 Series B 领投方，并拥有董事会席位。随着 1X 接近 Series C，EQT 是否有能力、也是否愿意共同投资或支持下一轮融资非常关键。如果
              EQT 的组合配置变化，或治理摩擦出现，1X 以目标 $1B Series C 估值融资的能力可能受损。

              第三，也是最重大的，是客户集中度：ADT 和 Everon 合计估计贡献 1X 企业收入的 95%+。失去任一关系，都需要 12–24
              个月的替代客户获取时间——前提是管线确实存在——而固定成本（制造、研发、远程操作员薪资）仍会持续。这是二元风险：不是逐步下滑，而是潜在的阶梯式断崖。依赖地图（FR003）展示了所有关键第三方依赖，以及它们如何流入
              1X 运营。
