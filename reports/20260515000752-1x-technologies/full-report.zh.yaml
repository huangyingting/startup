      - number: '5.3'
        title: 知识产权、防御性与技术护城河
        blocks:
          - type: paragraph
            body: >-
              1X 最具防御性的技术资产，是公司十年历史中（最初名为 Halodi
              Robotics）积累出的自研电动执行器技术。执行器采用低阻抗设计，天然具备机械柔顺性——机器人遇到冲击时吸收力量，而不是硬顶力量。这能在无需复杂实时力控软件的情况下，降低人机交互场景中的受伤风险。US11498217B2
              专利覆盖了最初以 Halodi Robotics 名义提交的核心执行器技术，多件延续专利仍在积极审查中。这一专利组合为试图复制 1X
              特定执行器几何和控制方法的竞争对手设置了有意义的壁垒，不过更广义的电动执行器设计空间仍竞争激烈。

              除了执行器 IP，1X 还通过训练数据引擎积累数据优势。竞争对手的 AI 训练往往依赖合成数据或脚本化环境，1X 的 EVE
              商业部署则持续从真实企业环境生成真实世界交互数据。没有同等商业部署，竞争对手很难复制这种真实世界数据分布。数据飞轮巩固了 1X 在企业机器人领域的先发位置，也构成硬件 IP 之外的二阶护城河。

              第三层防御性来自垂直一体化架构：1X 自己设计执行器、开发 AI 栈，并在 Hayward 和 Moss 至少部分自行制造。全栈所有权降低关键部件单一供应风险，也让软硬件能更紧密协同设计，类似 Apple
              silicon 的整合模式。相比使用商品化执行器的竞争对手（例如 Unitree 使用 Robstrider，或 Boston Dynamics 的液压路线），1X
              的自研驱动带来差异化的扭矩密度和柔顺性特征。产品成熟度与能力地图（FE004）展示了 1X 在各能力维度上相对于自身 2027 路线图目标的位置。
