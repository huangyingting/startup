      - number: '7.4'
        title: 人员、执行与财务模型风险
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 的关键人物依赖极强。CEO Bernt Børnich 是创始愿景人物和公司架构师；他带领公司从 Halodi Robotics
              走过三次转向、三轮融资和两代产品。他离开会造成战略领导真空，在尚早期的人形机器人领域很难填补。AI 副总裁 Eric Jang 在技术侧同样关键：他的具身学习数据引擎是公司的核心 AI 差异化，结合 VR
              远程操作和强化学习的特定经验也很稀缺。任一人离开，都可能至少拖慢 AI 路线图 12–18 个月，并可能引发投资人担忧。

              竞争性人才市场放大了这一风险。Google DeepMind、Meta AI、Tesla、Boston Dynamics 和 Figure AI 都在积极从同一人才池招聘 AI
              机器人工程师。这些公司的薪酬包高度有竞争力；对 1X 中层工程师而言，相比拥有上市公司股权薪酬的大型科技公司，机会成本很高。即便没有关键人物离开，工程层流失也可能实质放慢开发速度。

              财务上，1X 的首要毙命风险是无法按足够规模和时间表完成 Series C，以支持 NEO 制造规模化。按估计烧钱速度 $10–15M/月（由同阶段机器人公司和 1X 员工数信号推导），2025 年 1
              月之后的资本可支撑约 7–20 个月现金跑道——意味着 2026 年初之前或期间需要融资。如果 NEO 制造需要显著资本开支（CAPEX），而 Series C 延迟或认购不足，1X
              可能同时面对交付延迟、客户流失和管理层分心。
