  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品线、功能与技术概览
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 正在商业化两条机器人平台，分别面向不同市场和部署场景。EVE 是公司已经产生收入的轮式人形机器人，高约 140cm、重约 70kg。它在企业环境中连续运行，主要为 ADT 和
              Everon 执行商业安防巡逻，任务包括非工作时段巡查、开门和搬运负载。EVE 的轮式底盘让移动更稳定，不必处理双足设计的平衡复杂度，因此更容易落地 24/7 生产部署。截至 2026 年初，约 390 台
              EVE 已商业部署。

              NEO 是面向消费家庭市场的双足继任平台。2024 年 8 月推出的 NEO Beta 是首个完整双足原型，验证了具身 AI 架构。2025 年 2 月发布的 NEO Gamma 是一次明显的设计跃迁：它整合了与
              Kind Humanoid（2025 年 1 月被收购）合作开发的 3D 编织全身套装，让机器人具备类人的运动范围和适合家庭环境的柔触表面。NEO Gamma 高约 163cm，采用 100Hz
              主动平衡控制环，并部署由动作捕捉参考数据训练出的强化学习策略。预购于 2025 年 10 月开启，买断价 $20,000，订阅价每月 $499，目标在 2026 年交付消费者。

              从 EVE 到 NEO 的产品切换，体现出一条战略弧线：从商业上已验证的企业级实用机器人，走向通用家庭人形机器人。两个平台共享底层自研执行器架构和端到端神经网络控制系统，但 NEO Gamma
              增加了双足行走难题；EVE 通过轮式设计避开了这部分复杂度。Kind Humanoid 收购引入了联合创始人 Christoph Kohstall 作为工程贡献者，也带来工业设计师 Yves Béhar
              的人体工学机身概念，现在已整合进 NEO Gamma 的工业设计。相对于完全自研节奏，这次收购显著加快了家用形态迭代。
