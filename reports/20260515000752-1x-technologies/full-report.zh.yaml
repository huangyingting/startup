      - number: '5.5'
        title: 技术风险、信任与安全架构
        blocks:
          - type: paragraph
            body: >-
              1X
              的信任与安全架构立在三根支柱上：低阻抗执行器柔顺性带来的物理安全，远程操作监督带来的运营安全，以及实体急停机制带来的产品安全。低阻抗执行器设计是一种结构性安全属性——不同于接触时传递完整电机扭矩的刚性执行器，1X
              执行器在碰撞时吸收能量，降低人在近距离时承受的伤害力量。这一设计哲学适合消费环境，但截至 2026 年 Q2，尚未通过已发布的 ISO 13482（个人护理机器人安全）或 ISO
              10218（工业机器人安全）认证验证。

              当前把远程操作作为复杂任务安全网，也引入了自身风险：远程操作员误判、延迟造成的判断失误，以及人类视觉观察家庭环境带来的隐私问题。WSJ 2025 年 10 月报道点名了家庭场景远程操作带来的消费者隐私担忧；之后
              1X 在远程操作视频流中加入了同意控制和可识别内容模糊处理。不过，这些控制的技术实现以及远程操作视频的数据留存政策，尚未被详细公开披露。

              网络安全是正在浮现的风险维度。配备摄像头、麦克风并持续联网的机器人，为未授权访问家庭数据创造了攻击面。1X 尚未发布网络安全白皮书，也未披露渗透测试结果。监管风险也在成形：EU AI Act 对高风险 AI
              系统的分类可能适用于自主机器人功能，进入欧盟市场前需要合规评估和公告机构审查。美国 FTC 商业监控规则适用于采集视频 / 音频数据的机器人。OSHA 法规（29 USC 652）约束企业场景中的 EVE，1X
              尚未就其商业部署公开回应这一问题。信任 / 质量 / 合规表（TE004）按当前控制状态汇总了这些缺口。
