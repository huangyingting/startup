      - number: '5.2'
        title: 核心技术栈与架构
        blocks:
          - type: paragraph
            body: >-
              1X 的技术架构围绕一个端到端神经网络搭建，机器人所有行为都由它控制，不依赖硬编码任务逻辑或模块化行为树。这让 1X
              有别于传统机器人公司；后者通常把控制拆成感知、规划和执行模块。整条动作栈——从传感器输入到电机命令——都由单一学习模型联合优化，机器人因此能跨感知条件和任务变化泛化；在模块化系统里，这类能力往往要大量手工工程才能拼出。

              具身学习数据引擎是数据生成骨干，这一概念由 1X 的 AI 副总裁 Eric Jang 提出。人类远程操作员通过 VR 头显控制部署在真实商业环境中的
              EVE，生成物理场景里的高保真任务示范。这些示范随后用于训练一代又一代神经网络，方法结合模仿学习（行为克隆）和强化学习。飞轮效应很强：每一次 EVE 商业部署都同时生成真实世界训练数据，反过来改进 NEO 的
              AI 模型。到 2025 年中，ADT 和 Everon 的 EVE 部署已经在为 NEO Gamma 的策略训练管线供数。

              训练管线利用动作捕捉参考数据来初始化行走强化学习策略——这一路径来自基于物理的角色动画和人形控制学术研究。1X 研究人员发表的 ArXiv 论文（例如 2309.01694 关于全身控制、2405.01813
              关于灵巧操作）确认，公司方法建立在同行评议方法之上。软件栈由内部开发；未发现公开资料提到 ROS 等行业标准机器人操作框架，这与 1X
              的立场一致：神经网络路线让传统感知-规划-执行栈在架构上不再必要。github.com/1x-technologies 上的 GitHub
              仓库显示工程活动活跃，提交和贡献者持续出现，为开发节奏提供了轻量级开发者信号验证。
