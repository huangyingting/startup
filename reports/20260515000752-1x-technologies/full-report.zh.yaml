        - Series C 延迟或认购不足；NEO 遥操作瓶颈在商业规模下仍存在
        - 基于当前财务不透明、NEO 准备度信号和 Tesla Optimus 竞争压力，这是最可能情景
      - - 悲观（30% 权重）
