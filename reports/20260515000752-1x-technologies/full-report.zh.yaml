      - number: '1.3'
        title: 融资历史、投资方与财务状况
        blocks:
          - type: paragraph
            body: >-
              自 2023 年以来，1X Technologies 在已确认融资轮次中至少筹集 $223.5 million；若计入更名前 Halodi 的早期轮次，金额很可能更高。2023 年 3 月的 Series A2
              融资 $23.5 million，由 OpenAI Startup Fund 领投，Tiger Global Management、Sandwater、Alliance Ventures 和 Skagerak
              Capital 参投。2024 年 1 月的 $100 million Series B 由 EQT Ventures 领投，Samsung NEXT、Nistad Group
              以及同一批既有投资方参投。VentureBeat 在 Series B 后立即报道称累计融资「接近 $137 million」，意味着 Halodi 时期还有未披露的早期轮次。

              2025 年 1 月，Bloomberg 报道 1X 又融资 $100 million（2025 年 1 月 27 日文章标题「humanoid robot maker 1x raises 100
              million」已通过 URL 元数据确认，但访问时全文受限）。Freethink 2025 年 3 月文章确认了这一时间线，称 2025 年 1 月轮次发生在 2025 年 2 月 NEO Gamma
              发布之前。据此，已确认累计融资约为 $237 million，不包括未披露的 Halodi 时期资金。

              2025 年 9 月，The Information 报道 1X 正在瞄准新一轮 $1 billion
              融资，以支持仿人机器人开发和家庭部署。截至本报告撰写时，该轮尚未确认关闭。任何融资轮次的估值均未公开披露。公司没有披露收入、烧钱速度或盈利能力。包括
              ARR、客户数和员工数在内的关键财务指标仍是私有信息。投资方包括重要全球风投资本（EQT Ventures、Tiger Global）、战略科技投资方（Samsung NEXT、OpenAI Startup
              Fund）和挪威产业资本（Sandwater、Skagerak Capital、Nistad Group）。
