      - number: '8.3'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              情景分析覆盖三种不同投资结果，分别绑定 NEO 商业化成功、Series C 关闭和竞争动态。乐观情景（25% 概率权重）假设到 2030 年，NEO 交付给 10,000 户或更多消费者家庭，按每台
              $20,000 或每月 $499 订阅收费，到 2030 年产生 $500M 或更多年收入，并在一个因已验证商业规模而上调估值中枢的市场里获得 8–12x 收入倍数。隐含退出估值 $4–6B，相对于 $3B
              Series C 入场只带来 1.3–2x 毛回报——除非入场价格低于 $2B，否则回报边际。ARK Invest 的物理 AI
              估值框架认为，如果数据飞轮在规模化后形成可防御护城河，定义品类的玩家可支撑更高倍数。

              基准情景（45% 概率权重）假设 NEO 在 2026–2027 年实现消费者交付，但数量低于预测且仍依赖远程操作。EVE 企业收入到 2028 年通过新增客户增长至 $50–80M ARR。2028
              年退出时隐含基准估值为 $1.2–1.5B，相比 $3B 入场显著减记；除非 Series C 入场价格远低于 $3B，否则基准情景回报为负。悲观情景（30% 概率权重）是有序收缩：NEO
              未能商业出货，ADT/Everon 合同失效，公司以知识产权加团队形式按 $200–400M 被收购——在任何 $3B+ 入场价格下几乎全损。

              三种情景的概率加权预期企业价值约为 $1.3B，显著低于任何可能的 $3B+ Series C 入场，再次支持 TRACK 而非 INVEST 建议，除非通过入场价格纪律把入场估值压到 $1.5B 以下。乐观 /
              基准 / 悲观情景表（TV003）和估值回报区间图（FV003）用明确假设、回报逻辑、概率信号和下行触发器固化了三种情景。
