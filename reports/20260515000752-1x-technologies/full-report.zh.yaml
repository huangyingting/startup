  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 具名客户与企业部署状态
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 有两个已确认达到商业生产规模的企业客户：财富 500 强安防服务公司 ADT Inc.，以及北美领先商业安防集成商 Everon（前身为 ADT Commercial，2022 年
              11 月更名）。ADT 运营约 140 台 EVE，用于商业设施的非工作时段安防巡逻，包括仓库、办公园区和企业园区。Everon 在其商业客户群中部署了约 250 台 EVE，是已知单一客户中最大的 EVE
              部署。两者合计约 390 台 EVE 处于活跃商业运行状态，按每台机器人每月 $3,500–5,000 估算，对应年化收入运行率约 $15–25M。基于机队规模、已确认的 RaaS 合同结构，以及跨度超过 12
              个月的媒体报道，这两段关系更像生产部署，而非试点。

              除 ADT 和 Everon 外，1X 披露了两段较小的客户关系。据报道，挪威 Sunnaasen Hospital 正在用 EVE 执行医疗机器人任务，但规模和运营结果尚未公开披露。几所挪威大学已知将 EVE
              用于学术机器人研究，这带来国际品牌露出和研究渠道数据，但商业价值有限。截至 2026 年 Q2，尚无其他企业客户被公开宣布。因此，企业客户组合高度集中：两个客户估计贡献 95%+ 已部署机器人；除试点规模的
              Sunnaasen 安排外，尚未公开宣布扩张到物流、酒店或医疗等相邻垂直领域。

              ADT 关系至少可追溯到 2022 年，早于 Halodi 更名为 1X，说明这是一段长期商业合作，并经受住了公司战略重定位。Everon 合作关系于 2024 年 2 月通过 BusinessWire
              宣布。TechCrunch 和 Axios 在 2025 年 1–2 月的报道中确认了两段关系，Fortune 在 2025 年 4 月报道中称 ADT 的运营结果正面。
