      - number: '8.4'
        title: 竞争动态、市场背景与资本环境
        blocks:
          - type: paragraph
            body: >-
              人形机器人市场正在快速扩张。Goldman Sachs 预计到 2030 年，可寻址机器人市场为 $38B。IFR Service Robots 报告估计，到 2025 年服务机器人市场为
              $46.6B；Mordor Intelligence 和 MarketsAndMarkets 预计服务机器人到 2030 年年复合增长率（CAGR）为
              20–25%。这些预测构成了大市场背景，支撑品类领先人形机器人公司在私有市场获得溢价入场倍数。

              Tesla 的 Optimus 项目是主要竞争威胁。Elon Musk 曾提出到 2025–2026 年生产数千台 Optimus；如果 Tesla 以低于 $30K 的消费者定价实现生产规模，1X 的 NEO
              定价权会大幅被侵蚀。不过，截至 2026 年 Q2，Tesla Optimus 部署仍停留在内部（Tesla 工厂内部使用），这给 1X 留出估计 18–24 个月窗口，在外部 Optimus
              竞争进入家庭市场前建立消费者预购速度。

              2025–2026 年风险投资（VC）融资环境对人形机器人仍然强劲。Reuters 确认 1X 正瞄准 $1B Series C；2024–2025 年行业内多轮超过 $100M
              的融资说明投资人需求充足。OpenAI 和 EQT 的既有持仓，为潜在新进入投资人提供可信锚定信号。1X 在 2025 年整合 80,000 sq ft Palo Alto 总部，释放出组织扩张信号，与为 NEO
              生产爬坡做准备的公司状态一致。若商业化目标落空，战略收购方——包括 Samsung（现有投资人）、Amazon（机器人履历）和 Google/Alphabet（AI
              机器人兴趣）——构成可行退出路径。投资关键指标图（FV004）提供了面向投委会的 1X 八项关键投资维度评分。
