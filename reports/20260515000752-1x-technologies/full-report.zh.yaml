      - number: '3.5'
        title: 竞争尽调缺口与开放问题
        blocks:
          - type: paragraph
            body: >-
              若干竞争情报缺口限制了对护城河评估的信心。第一，Agility 的 Digit Amazon 部署实际合同经济性——数量、价格、排他条款和续约结构——未公开披露，无法判断 Agility
              是否已跑通可持续单位经济模型，还是仍在为数据和学习补贴部署。第二，Tesla Optimus 内部部署指标——单台每日完成任务数、自主率与人工接管比例、缺陷处理——未披露，无法客观评估 Tesla
              距商业部署就绪还有多近。

              第三，Figure AI 自 BMW 公告以来的进展没有公开详尽记录；媒体报道显示 BMW 合作已投入运营，但没有生产指标。第四，在不了解 $16K 价位、且没有重大 AI 软件集成时 Unitree G1
              可达到何种自主水平，以及西方安全和监管要求是否会为本土运营商形成天然护城河之前，Unitree G1 的竞争风险很难量化。

              第五，1X 没有披露 ADT 和 Everon 合同的具体金额或数量承诺，无法从 EVE 机队计算已签约 ARR。这一点重要，因为竞争护城河分析取决于 1X
              是在从部署领先中获取经济价值，还是只是在补贴价格下积累数据。
