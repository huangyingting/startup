      - number: '6.2'
        title: 客户分层、买方模式与市场进入
        blocks:
          - type: paragraph
            body: >-
              1X 的客户基础横跨两个结构不同的细分市场，需要不同的市场进入方法。企业段（EVE）以 B2B 直销为主，面向大型商业安防运营商，采用多年期 RaaS
              合同，采购决策发生在设施层面。买方是运营副总裁、首席安全官或设施总监。交易规模很大（ADT 部署 140 台，按每月 $3,500–5,000 计算，单一客户贡献 $490,000–700,000
              月度经常性收入），销售周期也长——按企业机器人行业基准约 6–18 个月。ADT 和 Everon
              是理想客户原型：全国性安防运营商，托管服务网络庞大，能消化机器人机队管理开销，也能从非工作时段自动化节省成本中获益。

              消费段（NEO）结构完全不同：个人买方以 $20,000 或每月 $499 做购买决策，依据是便利性、信任和生活方式契合度。家庭市场尚无任何面向消费者规模的机器人产品跑出重复购买行为。NEO 预购于 2025 年
              10 月开启，使 1X 成为消费级人形机器人早期玩家，但这个细分市场仍未被验证。Wall Street Journal 在 2025 年底围绕远程操作提出的消费者隐私担忧——尤其是远程人类在引导 NEO
              时可以看到家庭内部——构成该细分市场的首要需求侧风险。

              企业安防机器人市场是 EVE 的主要总可用市场（TAM），这个市场仍在增长，可比玩家包括 Knightscope、Cobalt Robotics 和 Zetron，但它们都不提供双足人形形态，也不具备 EVE
              提供的通用操作能力。这把 EVE 放在更高端层级，单次部署可覆盖的任务更多。相邻垂直领域——医疗支持、轻物流、酒店——都有扩张可能，但截至 2026 年尚无已确认客户牵引。
