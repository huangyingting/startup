      - number: '7.5'
        title: 缓释措施、毙命条件与尽调事项
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 的风险缓释分三类：内置在产品设计里的结构性缓释（低阻抗执行器柔顺性、实体停止装置）、不利事件后触发的反应式缓释（WSJ 隐私报道后加入同意控制），以及仍未披露的规划型缓释（ISO
              认证路线图、OSHA 审计方案、GDPR 数据处理协议）。

              对投资人和企业客户最可执行的毙命条件包括：（1）Series C 失败或缩水——如果 1X 在 Series C 融资少于 $300M，NEO 制造计划很可能需要重组；（2）ADT 或 Everon
              不续约——单个企业合同不续约且没有替代客户公告，将是重大不利信号；（3）隐私执法行动——美国 FTC 或欧盟 GDPR 围绕机器人数据采集发出执法通知，将要求产品修改并退出欧盟市场，NEO 消费收入会延迟 12+
              个月；（4）关键人物离开——Børnich 或 Jang 离开且没有可信继任者公告；（5）硬件召回——EVE 机队出现系统性安全缺陷并需要召回生产机，将同时摧毁近期经济性和品牌可信度。

              监控指标包括：NEO 交付时间线更新、Series C 公告条款、ADT/Everon 在季度业绩评论中的扩张或缩减信号、点名 1X
              的监管文件、工程岗位发布水平（远程操作员和机器人工程师），以及作为开发动能代理指标的 GitHub 活跃速度。缓释与毙命条件表（TR005）用具体阈值固化了这些触发器。
