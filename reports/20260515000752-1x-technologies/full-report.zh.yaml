  - id: TV005
    title: 投资逻辑破坏与终止触发表
    columns:
      - 触发项
      - 阈值 / 终止事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Series C 未完成
        - 2026 年 Q4 前未公告 Series C，或确认融资额低于 $300M
        - NEO 制造资金不到位；估计现金跑道降至 9 个月以下；悲观情景概率升至 50% 以上
        - 立即重新评估投资逻辑；任何 Series C 承诺都必须以确认完成且条款明确为条件
      - - 企业锚定客户流失
        - ADT 或 Everon 将机队规模减少超过 20%、终止合同，或公开宣布替代机器人供应商
        - ARR 损失 40–60%；EVE 商业验证——主要估值锚——被削弱；基准情景向悲观情景坍缩
        - 减持或退出组合持仓；对替代客户管线启动紧急尽调
      - - NEO 出货延迟至 2027 年 Q4 之后
        - 到 2027 年 Q4 末仍未确认向付费客户交付 NEO 消费者版本
        - 消费者逻辑破裂；乐观和基准情景明显转向悲观；预订单取消率可能超过 30%
        - 重新评估信心；要求更新自主能力指标和预订单留存数据；考虑困境并购情景
      - - CEO 或 AI 副总裁离职且无接任者
        - Børnich 或 Jang 非计划离职，且 30 天内未宣布具名可信接任者
        - AI 路线图倒退 12–18 个月；NEO 自主能力开发受扰；Series C 投资者信心受影响
        - 立即开展治理问询；要求董事会回应和继任证据；暂停部署任何新资本
      - - 隐私监管执法行动
        - FTC 调查、GDPR 执法通知或 EU AI Act 不合规认定，且明确点名 1X Technologies
        - 受影响司法辖区内 NEO 消费者发布受阻；欧盟业务暂停等待合规；法律成本负担上升
        - 在监管结果明确前暂停持仓；评估欧盟市场排除对投资逻辑的影响
    notes: >-
