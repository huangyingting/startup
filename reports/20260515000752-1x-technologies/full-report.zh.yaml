  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险图谱
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 处在快速演化的监管环境中，AI 安全、消费者隐私和机器人劳动标准都在立法与执法推进中。EU AI Act 于 2024 年通过，并在 2026–2027
              年进入适用阶段；它把若干自主 AI 系统应用归为高风险，进入欧盟市场前需要合规评估、技术文档、人类监督安排和公告机构审查。鉴于 NEO Gamma 面向消费者家庭使用并具备自主 AI
              能力，它可能落入高风险类别。1X Technologies 尚未公开披露 EU AI Act 合规策略，也未说明是否已接触公告机构。

              隐私监管带来两个不同司法辖区的风险。在 GDPR 下，1X 的欧洲运营——包括 Sunnaasen Hospital
              和挪威大学部署——会生成个人数据（视频、音频、运动数据），处理这些数据需要合法依据、数据最小化和数据主体访问权。远程操作视频处理所依据的具体法律基础（同意、合法利益或合同）尚未披露。在美国，FTC 2024
              年商业监控报告建立的监管框架可能直接适用于 NEO 的数据采集实践，州级隐私法（CCPA 及同类法规）又增加了额外暴露。拟议中的 AI ROBOT Act（Senate Bill
              2718）若通过，将施加新的联邦机器人安全标准；但截至 2026 年 Q2，该法尚未生效。

              OSHA 法规 29 USC 652 约束雇主在工人靠近机器人等工业机械时的义务。ADT 和 Everon 设施里的 EVE 商业部署要求部署方运营商维护符合 OSHA 的安全文档。1X 未发布 OSHA
              合规文档，并依赖部署客户管理这一要求。NIST 的 AI Risk Management Framework
              提供了自愿标准，企业客户可能开始把它作为采购条件。监管风险登记表（TR001）按严重程度排序这些暴露，风险热力图（FR001）提供跨风险的概率-影响概览。
