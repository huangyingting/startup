      - number: '8.2'
        title: 估值方法、融资背景与可比公司
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 未在任何已确认融资轮公开披露估值数字。$23.5M Series A2（2023 年 3 月）、$100M Series B（2024 年 1 月，EQT Ventures
              领投，Samsung NEXT 等参与）以及约 $100M 追加融资（2025 年 1 月），合计约 $237M 已确认资本，所有轮次的投后估值均未披露。截至 2026 年 5
              月，尚无二级市场标记、公开提交的优先股堆叠披露，或分析师确认的 1X 专属估值估计。

              本章采用三种三角校验方法。第一，收入倍数外推：按估计 EVE RaaS 年化收入 $15–25M，并采用适合高增长、未盈亏平衡机器人的 12–20x 收入倍数，当前基本面单独隐含的估值区间为
              $180–$500M。这显著低于隐含 Series C 入场估值，说明任何 $3–5B 溢价都依赖 NEO 商业化的未来状态。第二，可比公司分析把估值锚定在同行背景中：Figure AI 约
              $3.2B，Boston Dynamics 并购价格 $1.1B，Agility Robotics 约 $1B，Apptronik 约 $300M，Sanctuary AI 约 $500M
              CAD。可比估值表（TV004）列出全部六家参考公司及指标和限制；估值敏感性图（FV002）展示在 NEO 商业化时间不同的情况下，悲观、基准和乐观估值如何从 $300M 跨到
              $6B。第三，入场价格纪律：如果假设 Series C 投后估值为 $3–5B，要在 5–7 年退出期内为 LP 带来 3x 回报，需要达到 $9–15B 退出价值——只有乐观情景才可能实现。

              从资本效率看，1X 用约 $237M 融资换来约 390 台商业 EVE 部署，相比 Figure AI 融资 $675M 却没有已确认的外部付费部署更有利。这说明 1X
              比融资最多的同行更有效地把资本转化成商业验证，足以支撑相对于纯收入倍数基准的适度溢价。Bloomberg 2025 年 4 月分析确认，只有当商业验证显著超过行业均值时，可比阶段公司之上的估值溢价才合理——仅看
              EVE，1X 勉强通过这一测试。PitchBook 数据显示，2025 年人形机器人估值倍数主要由部署验证、累计融资和领投人层级驱动，而非收入倍数，这为 1X
              相对于当前收入基础的溢价入场价格提供了进一步理论支撑。
