  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资建议与投资逻辑
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 获得 TRACK（观察）投资建议，综合得分 6.5/10，置信度中等、风险评级高。这个建议反映出真实张力：一边是 1X 罕见的商业验证——约 390 台 EVE
              已部署并产生真实企业经常性收入；另一边是一组尚未解决的风险，限制了更高确信度的仓位。投资建议摘要表（TV001）固化了所有评分维度上的正式判断；建议逻辑图（FV001）把证据支柱和风险向量到投资结果的因果链条画出来。

              投资逻辑立在五根支柱上。第一，1X 是唯一一家已确认在企业端达到商业规模部署的人形机器人公司，约 390 台设备分布在 ADT 和 Everon；竞争对手大多还在实验室或试点阶段。第二，OpenAI
              Startup Fund 合作带来前沿 AI 模型访问、投资人生态可信度和战略可选性，竞争对手很难复制。第三，NEO 的 3D 编织外骨骼、100Hz 全身平衡控制和 VR
              远程操作数据飞轮，构成真实技术差异化，并会随时间累积防御性。第四，EQT Ventures 领投 Series B，带来欧洲分销触达和 Series C
              桥接投资人可信度。第五，挪威工程文化与美国资本通道结合，形成硬件 AI 创业公司少见的均衡风险画像。

              反向逻辑同样重大。NEO 高度依赖远程操作，尚未在消费者规模证明完全自主。Tesla Optimus 在资本、制造基础设施和分销触达上约为 1X 的 10x。财务不透明使资本效率无法验证，且截至 2026 年
              Q2，$1B Series C 仍未确认。家庭远程操作的隐私模式正面对 FTC 和欧盟监管机构关注。投资逻辑 / 反向逻辑表（TV002）用明确证据基础和改变观点的条件，结构化呈现两边。

              若出现以下情况，建议可从 TRACK 调整为 INVEST：Series C 以已知估值确认交割；NEO 预购量超过 1,000 台；EVE 收入运行率确认高于 $30M
              ARR；以及面向消费者部署的可验证自主路线图。Goldman Sachs 的人形机器人投资逻辑把数据飞轮、制造规模和部署验证列为私有市场机器人估值的三大价值驱动因素；1X 满足第一和第三项，但相对于隐含
              $3–5B 的 Series C 入场估值，部署规模仍偏小。多年通过 EVE 商业部署积累的 VR 远程操作数据飞轮，是 1X 最具防御性的竞争资产。
