    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 是一家挪威-美国机器人和人工智能公司，总部位于 Palo Alto, California，制造业务分布在 Hayward, California 和挪威
              Moss。公司公开使命是「创造充足劳动力，让安全、智能的仿人机器人与人并肩工作」。1X 以垂直整合的硬件-AI 初创公司运转：内部设计机器人，利用真实世界遥操作数据训练具身 AI
              模型，并直接向企业客户和潜在消费者销售或部署机器人。

              公司由挪威机器人学家 Bernt Øivind Børnich 于 2014 年创立，当时名为 Halodi Robotics，早期重点是为工业和医疗机器人开发安全执行器和全身控制系统。到 2019 年，公司已在
              California 落地业务。2022 年，Halodi 与 OpenAI 达成技术合作，将 AI 模型接入其机器人。2023 年 3 月，公司正式更名为 1X Technologies，并同时宣布由
              OpenAI Startup Fund 领投的 $23.5 million Series A2。

              商业模式走双线：EVE（轮式仿人机器人）面向企业商业部署，先从安防和物流客户贡献近期收入；NEO（为家庭设计的双足仿人机器人）则是长期消费者平台。NEO 已披露定价：一次性买断 $20,000，或每月订阅
              $499；2025 年 10 月开放预购，计划 2026 年交付。1X 位于 Palo Alto 的总部在 2025 年夏季启用，面积 80,000 平方英尺，可容纳 400 名员工，用来整合此前
              Sunnyvale 和 Moss 团队。制造仍留在挪威 Moss 和 California 的 Hayward。
