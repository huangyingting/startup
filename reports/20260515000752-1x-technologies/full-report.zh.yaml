      - number: '3.4'
        title: 护城河耐久性、竞争风险与杀伤情景
        blocks:
          - type: paragraph
            body: >-
              1X 最持久的护城河是来自商业 EVE 部署的专有训练数据。约 390 台机器人在安防和医疗环境中生成真实世界运行数据，1X
              已积累出尚未商业部署的竞争者无法复制的训练数据集。这套数据飞轮——遥操作数据输入端到端神经网络训练——在结构上类似 Tesla 靠 Autopilot 车队数据建立 FSD 优势；1X AI 副总裁 Eric
              Jang 也公开阐述过这一策略。该护城河能否持久，取决于模拟训练成熟后（NVIDIA Isaac、Google DeepMind 模拟管线），专有真实世界数据是否仍然必要。

              次级护城河包括：（1）OpenAI 关系，提供技术信誉和生态入口，但并非排他；（2）与 ADT 和 Everon 建立的企业客户关系，凭运营集成和积累的任务专用模型微调形成切换成本；（3）1X
              的挪威设计和制造传承，带来位于挪威 Moss 的高成本效率制造基础设施，区别于 Bay Area 成本结构。

              主要杀伤情景是 Tesla Optimus 规模化。如果 Tesla 达成 2025 年 1,000 台部署目标，并随后在 Tesla 品牌、服务网络和 AI 基础设施支持下，以 $20,000
              或更低价格宣布商业上市，1X 的 NEO 将面临强烈逆风。次级杀伤情景是 Amazon 支持的 Agility Robotics 将 Digit 部署扩展至 Amazon 1,000+
              个履约中心，完全拿下物流细分，并融到足够资本，在双足开发上超越 1X。

              Unitree 的价格竞争是整个西方仿人硬件层的系统性风险，而不是只针对 1X 的威胁；即便如此，如果中国制造商能凭开源或商业授权 AI 模型达到足够自主性，$16K 价格点可能压垮 1X 的 NEO
              所瞄准的可服务企业 SME 市场。
