  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局——直接、相邻与新兴竞争者
        blocks:
          - type: paragraph
            body: >-
              仿人机器人竞争格局可分为五类。直接竞争者——为商业部署打造通用双足或轮式仿人机器人的公司——包括 Agility Robotics（Digit）、Figure AI（Figure
              02）、Apptronik（Apollo）、Sanctuary AI（Phoenix）和 Unitree（H1/G1）。各家公司都在用不同形态、融资水平和部署策略，瞄准企业或消费者仿人机器人采用。

              超大型公司入局是最具生存威胁的一层：Tesla（Optimus）和 Hyundai/Boston Dynamics（Atlas）带来硬件制造基础设施、品牌和资本，纯机器人创业公司难以匹敌。Elon Musk
              公开给出的目标是到 2025 年底在 Tesla 自有工厂部署 1,000 台 Tesla Optimus，并提出长期消费者价格目标约 $20,000——直接对齐 NEO 已宣布价格。

              相邻竞争者包括 Physical Intelligence（pi），该公司走纯软件路线，为机器人操作构建基础模型；以及以 Unitree 为代表的中国 OEM 制造商。Unitree 正在出货 H1
              双足机器人，价格 $90,000；G1 价格 $16,000，明显低于西方竞争者。Unitree 极强的价格进攻性，对包括 1X 在内所有西方硬件优先仿人机器人公司构成商品化风险。

              现状替代方案仍是最重要的竞争压力：人类劳动力（安防、物流、家务任务）、传统工业机器人，以及没有操作能力的自主移动机器人（AMR）。说服买方从这些替代方案切换到仿人机器人，需要足够自主能力和有吸引力的
              ROI；目前没有竞争者在大众市场规模上跨过这两道门槛。1X 的竞争护城河问题在于，当前 EVE 商业部署领先是否能形成持久的专有训练数据优势，抵消它相较 Figure、Tesla 和 Agility
              在双足硬件上的劣势。
