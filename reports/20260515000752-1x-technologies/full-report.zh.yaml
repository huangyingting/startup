  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、定义与替代方案
        blocks:
          - type: paragraph
            body: >-
              仿人机器人市场指已经商业销售或租赁、具有人形形态的机器人——既包括轮式躯干设计（如 1X EVE），也包括完全双足设计（如 1X NEO、Tesla Optimus 和 Figure
              02）——它们在为人类建造的环境中，靠灵巧操作和移动能力完成任务。该定义排除传统固定臂工业机器人（Fanuc、KUKA、ABB）、没有操作能力的自主移动机器人（AMR，例如 Locus
              Robotics），以及没有物理形态的纯 AI 软件系统。

              目标用例中，仿人机器人面对的现状替代方案包括：（1）人类劳动力——安防、物流和家务任务中的主要替代；（2）传统自动化系统——传送带、固定机械臂、条码扫描器——可处理结构化任务，但无法泛化；（3）协作机器人——如
              Universal Robots UR 系列——在固定位置运行，没有移动能力；（4）专用非仿人机器人——Roomba
              类扫地机器人、农业收割机——解决窄任务。仿人形态的竞争优势在于，无需重新改造环境，就能使用现有人类设计的物理基础设施（门、楼梯、工具、货架）。

              相邻市场包括工业外骨骼、协作机器人手臂、AI
              驱动服务机器人（配送机器人、洗地机器人），以及更广义的工业自动化软件。随着能力成熟，仿人机器人有望连接这些相邻领域，扩大可服务范围。本分析纳入的支出包括机器人硬件采购、租赁、软件订阅、训练数据服务和售后维护；排除的支出包括设施基础设施改造、员工再培训，以及相邻非仿人机器人品类。
