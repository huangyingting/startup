      - number: '6.3'
        title: 留存、重复使用与客户满意度
        blocks:
          - type: paragraph
            body: >-
              1X Technologies 的客户耐久性数据是一个重大缺口。企业和消费者两个细分市场都没有公开披露 NPS、客户满意度指数、续约率或流失数据。考虑到已报道的机队规模，ADT 或 Everon 没有公开 ROI
              案例研究或具名客户证言尤其值得注意——这种体量的企业客户通常会为营销材料提供背书引语。沉默可能意味着严格的商业保密条款、仍在进行的性能验收期，或对技术真实世界效果的竞争敏感性。

              隐性留存信号偏正面：ADT 关系跨越公司更名，已持续至少三年；Everon 在 12 个月内从合作公告推进到已确认部署；Fortune 2025 年 4 月关于 ADT 的报道也称 EVE
              巡逻带来正面运营结果。截至 2026 年 Q2，尚无合同终止、机队缩减或客户投诉的公开报道。这些只是弱正面信号，不是已确认留存数据。

              NEO 在交付前无法评估消费者满意度。2025 年 10 月开放预购带来媒体关注，显示消费者兴趣；但 Wired 和 WSJ 关于远程操作隐私担忧的报道带来了声誉逆风。1X
              的回应是加入同意控制和数据模糊能力。这个回应能否支撑预购需求直到 2026 年交付，仍未知。公司未披露预购量、定金转化率或取消率。由于没有任何已披露留存数据，留存 / 队列图（FU004）使用的是估计值。
