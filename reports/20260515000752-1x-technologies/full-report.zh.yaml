      - number: '1.5'
        title: 里程碑、收购与证据缺口
        blocks:
          - type: paragraph
            body: >-
              1X 的公开时间线横跨十多年，包括更名、四轮已确认融资、一项公司收购和连续产品迭代。公司 2014 年以 Halodi Robotics 名义创立于挪威，先从学术/工业机器人转向商业机器人，再于 2022 年与
              OpenAI 合作。2023 年 3 月更名为 1X Technologies，并同步宣布 $23.5 million Series A2，标志着公司进入全球机器人融资讨论。2024 年 1 月来自 EQT
              Ventures 的 $100 million Series B，让 1X 成为资金更充足的欧洲仿人机器人公司之一。

              2025 年 1 月，1X 收购 Kind Humanoid。这是一家 Bay Area 三人创业公司，由 Christoph Kohstall 创立，曾将大语言模型用于仿人交互，并与设计师 Yves Béhar
              的 Fuseproject 工作室合作。同月，据报道公司又完成 $100 million 融资。NEO Gamma 于 2025 年 2 月发布，Palo Alto 总部于 2025 年夏季启用，可容纳 400
              名员工。2025 年 10 月，NEO Home Robot 开放预购。截至 2025 年 9 月，1X 据报道正在寻求 $1 billion 新资金。

              关键证据缺口包括：经验证的员工数（Palo Alto 总部按 400 人设计，但实际员工数未披露）；全部历史轮次的累计融资；已确认估值；EVE 企业部署带来的收入；以及据报道 $1 billion
              融资目标的状态。OpenAI 合作的具体条款（商业协议还是仅投资）仍不透明，治理结构也没有公开文件。公司截至报告日没有披露 NEO 预购的准确数量。
