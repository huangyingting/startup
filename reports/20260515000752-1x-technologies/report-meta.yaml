companyProfile:
  summary: >-
    1X Technologies (formerly Halodi Robotics) is a Norwegian-American robotics and AI company
    developing general-purpose humanoid robots. Founded in 2014 in Moss, Norway, the company
    rebranded in March 2023 and has since raised $237M+ led by OpenAI and EQT Ventures. Its
    wheeled robot EVE is commercially deployed at ADT and Everon for enterprise security, while
    bipedal NEO targets the home consumer market with pre-orders open at $20K.
  foundedDate: "2014-01-01"
  founders:
    - name: Bernt Øivind Børnich
      role: CEO & Founder
      background: Norwegian roboticist; founded Halodi Robotics in 2014 and has led through all major funding rounds.
  foundingLocation: "Moss, Norway"
  headquarters: "Palo Alto, CA (HQ); Moss, Norway (manufacturing)"
  productSummary: >-
    EVE: wheeled humanoid robot for enterprise security and commercial deployment.
    NEO: bipedal humanoid robot for home use, in pre-order at $20,000 or $499/month.
  customerFocus: Enterprise security and facilities (EVE); home consumers (NEO)
  businessModel: >-
    Robot hardware sales and subscription (RaaS) model; enterprise deployments (EVE) generating
    current revenue; consumer subscriptions (NEO) targeted for 2026+.
  stage: Series B / pre-Series C
  fundingStatus: >-
    $100M Series B (Jan 2024, EQT Ventures lead); ~$100M additional (Jan 2025); seeking $1B Series C.
  disclosureProfile: private-undisclosed
summary:
