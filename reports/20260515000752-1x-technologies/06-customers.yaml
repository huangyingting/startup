    reason: >-
      Notes fields are provided on all five tables (TU001-TU005) to disclose estimated or inferred
      values. Fleet counts are third-party reported estimates; RaaS ARR is analyst-derived at disclosed
      pricing; retention percentages in the cohort figure are estimated given no official data is
      disclosed by 1X Technologies. Tables clearly distinguish confirmed data from estimates.

sections:
  - id: section-named-customers
    title: "Named Customers and Enterprise Deployment Status"
    body: >-
      1X Technologies has two confirmed enterprise customers at commercial production scale: ADT Inc.,
      a Fortune 500 security services company, and Everon (formerly ADT Commercial, rebranded November
      2022), the leading commercial security integrator in North America. ADT operates approximately
      140 EVE units deployed for after-hours security patrol at commercial facilities — warehouses,
      office parks, and corporate campuses. Everon has approximately 250 EVE units deployed across
      its commercial client base, representing the single largest known EVE deployment by any customer.
      Together, ADT and Everon account for approximately 390 EVE units in active commercial operation,
      which at $3,500–5,000 per robot per month implies an estimated annualised run-rate revenue of
      $15–25 million. Both relationships appear to be production rather than pilot, based on fleet size,
      the confirmed RaaS contract structure, and media reporting spanning more than 12 months.

      Beyond ADT and Everon, 1X has disclosed two smaller customer relationships. Sunnaasen Hospital
      in Norway is reported to be using EVE for healthcare robotics tasks, though scale and operational
      outcomes have not been publicly disclosed. Several Norwegian universities are known to use EVE for
      academic robotics research, which provides international brand presence and research-channel data
      but limited commercial value. No other enterprise customers have been publicly announced as of
      Q2 2026. The enterprise customer set is therefore highly concentrated: two customers representing
      an estimated 95%+ of deployed units, with no publicly announced expansion to adjacent verticals
      such as logistics, hospitality, or healthcare beyond the pilot-scale Sunnaasen arrangement.

      The ADT relationship dates to at least 2022, predating the Halodi-to-1X rebrand, indicating
      a long-standing commercial partnership that survived the company's strategic repositioning. The
      Everon partnership was announced via BusinessWire in February 2024. Both relationships were
      confirmed by TechCrunch and Axios in January-February 2025 reporting, and Fortune reported
      positive ADT operational outcomes in its April 2025 coverage.
    claimRefs:
