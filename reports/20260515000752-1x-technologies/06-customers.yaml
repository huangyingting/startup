company:
  name: 1X Technologies
chapter:
  number: 6
  title: Customers
  summary: >-
    1X Technologies' commercial customer base is anchored by two enterprise accounts — ADT (~140 EVE units)
    and Everon (~250 EVE units) — representing an estimated 95%+ of all commercial deployments in a
    robotics-as-a-service model. A small Norwegian hospital and academic institutions round out the named
    roster. NEO pre-orders opened October 2025 at $20,000/$499 per month, but consumer adoption is
    unproven and privacy concerns (WSJ, Wired) cloud the home-market entry. No NPS, churn rate, ROI
    case studies, or pre-order volume data have been publicly disclosed, leaving customer durability
    and concentration risk as the primary diligence gaps.

