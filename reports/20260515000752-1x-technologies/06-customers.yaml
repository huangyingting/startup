      All sources are cited with access dates of 2026-05-15 per report run date.
  - dimension: unverifiedSource
    reason: >-
      All 30 sources (SU001-SU030) are curated from credible publishers including customer company
      press centers (ADT, Everon), BusinessWire partnership announcements, and established technology
      media (TechCrunch, Reuters, Fortune, Bloomberg, Axios, WSJ, Wired, Engadget). Adverse sources
      (SU016, SU023) from WSJ and Wired are well-established investigative publications reporting on
      verified consumer privacy concerns. Source credibility assessed per editorial standards.
