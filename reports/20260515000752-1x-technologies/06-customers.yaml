  - id: section-customer-segmentation
    title: "Customer Segmentation, Buyer Patterns, and Market Entry"
    body: >-
      1X's customer base spans two structurally different segments requiring distinct go-to-market
      approaches. The enterprise segment (EVE) is characterised by B2B direct sales to large commercial
      security operators with multi-year RaaS contracts and facilities-level procurement decisions.
      Buyers are VP Operations, Chief Security Officers, or Facilities Directors. Deal sizes are large
      (ADT 140-unit deployment at $3,500–5,000/month implies $490,000–700,000 in monthly recurring
      revenue from a single customer), and sales cycles are long — 6–18 months based on enterprise
      robotics industry benchmarks. The ADT and Everon relationships represent ideal customer archetypes:
      national-scale security operators with large managed-services footprints who can absorb robot
      fleet management overhead and benefit from after-hours automation cost savings.

      The consumer segment (NEO) is structurally different: individual buyers at $20,000 or $499/month
      making purchase decisions based on convenience, trust, and lifestyle fit. No consumer-scale robot
      product has yet established recurring purchase behaviour in the home market. NEO pre-orders opened
      October 2025, positioning 1X as an early mover in consumer humanoid robots, but the segment
      is unproven. Consumer privacy concerns raised by the Wall Street Journal in late 2025 around
      teleoperation — specifically that remote humans can view home interiors when guiding NEO —
      represent the primary demand-side risk in this segment.

      The enterprise security robot market (EVE's primary TAM) is growing, with Knightscope, Cobalt
      Robotics, and Zetron as comparable players, but none offer bipedal humanoid form factors or the
      general-purpose manipulation capability EVE provides. This positions EVE at a premium tier with
      larger addressable tasks per deployment. Adjacent verticals — healthcare support, light logistics,
      hospitality — are plausible expansion markets but have no confirmed customer traction as of 2026.
    claimRefs:
      - CU008
      - CU013
      - CU016
      - CU019
      - CU020
      - CU025
      - CU027
      - CU032
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: section-retention-satisfaction
    title: "Retention, Repeat Usage, and Customer Satisfaction"
    body: >-
      Customer durability data for 1X Technologies is a significant gap. No NPS scores, customer
      satisfaction indices, renewal rates, or churn figures have been publicly disclosed for either
      enterprise or consumer segments. The absence of publicly available ROI case studies or named
      customer testimonials from ADT or Everon is notable given the reported fleet sizes — enterprise
      customers of this scale would normally provide reference quotes for marketing collateral. The
      silence suggests either strict commercial confidentiality clauses, ongoing performance qualification
      periods, or competitive sensitivity about the technology's real-world effectiveness.

      Implicit retention signals are moderately positive: the ADT relationship has persisted for at
      least three years across company rebranding; Everon expanded from a partnership announcement
      to confirmed unit deployment within 12 months; and Fortune's April 2025 coverage of ADT
      reported positive operational outcomes from EVE patrols. No public reporting of contract
      termination, fleet reduction, or customer complaint has emerged as of Q2 2026. These are
      weak-positive signals, not confirmed retention data.

      Consumer satisfaction for NEO is impossible to assess pre-delivery. Pre-order opens in October
      2025 generated media coverage suggesting consumer interest, but Wired and WSJ coverage of
      teleoperation privacy concerns introduced reputational headwinds. 1X responded by adding
      consent controls and data blurring capabilities. Whether this response is sufficient to maintain
      pre-order demand through 2026 delivery is unknown. No pre-order volume, deposit conversion
      rate, or cancellation rate has been disclosed. The retention/cohort figure (FU004) uses estimated
      values given the absence of any disclosed retention data.
    claimRefs:
      - CU009
      - CU010
      - CU012
      - CU014
      - CU015
