  - id: section-diligence-gaps
    title: "Customer Diligence Gaps and Adversarial Notes"
    body: >-
      The most material customer diligence gap is the absence of any independently verified customer
      retention or satisfaction data. In a RaaS business model, renewal rate is the primary indicator
      of product-market fit durability. Without confirmed renewal data from ADT and Everon, the ARR
      trajectory is speculative. Investors should obtain explicit renewal confirmation, contract
      extension terms, and utilisation data from 1X's data room before underwriting growth projections.

      Privacy risk is the primary adversarial vector for NEO's consumer market entry. The WSJ's
      October 2025 investigative piece and Wired's follow-on coverage documented consumer discomfort
      with teleoperators viewing home interiors. 1X's consent-and-blur control response addresses
      the surface concern but does not eliminate the structural issue: teleoperation-dependent
      autonomy inherently requires humans to observe private spaces. If post-delivery privacy complaints
      or regulatory enforcement actions emerge, they could stall NEO's consumer ramp and affect
      enterprise EVE deployments by association.

      A secondary adversarial note is customer concentration. With ADT and Everon representing
      ~95% of enterprise fleet deployments, 1X's commercial viability is essentially contingent
      on two procurement relationships. Neither customer has published forward-looking expansion
      commitments. Any deterioration in the security robot market — whether from poor robot
      performance, insurance liability concerns, or macroeconomic budget pressure — would
      disproportionately affect 1X's revenue. The proof matrix (FU003) and concentration risk
      table (TU005) summarise these exposures systematically.
    claimRefs:
      - CU022
      - CU028
      - CU034
      - CU036
      - CU038
      - CU009
      - CU011
      - CU014

