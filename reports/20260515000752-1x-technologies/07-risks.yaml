company:
  name: 1X Technologies
chapter:
  number: 7
  title: Risks
  summary: >-
    1X Technologies faces a layered risk profile spanning regulatory exposure from EU AI Act and FTC
    commercial surveillance rules, operational risks from hardware reliability gaps and cybersecurity
    attack surfaces on always-on home robots, extreme customer concentration (ADT + Everon ≈ 95% of
    fleet), key-person dependencies (CEO Børnich and VP AI Jang), and a financing kill risk if Series C
    is not closed before NEO manufacturing scale-up. Privacy backlash from WSJ/Wired reporting on
    teleoperation home access is an active reputational risk. Most risks have partial mitigations but
    lack confirmed compliance certifications or formal safety audits.

