  - id: section-operational-security
    title: "Operational, Quality, and Cybersecurity Risks"
    body: >-
      1X Technologies faces a series of operational risks that are partially masked by its current small
      fleet size. Hardware reliability is the primary unknown: with approximately 390 EVE units deployed
      in commercial environments, the company has not yet faced the quality-management challenges that
      arise at thousands of units. Mean-time-between-failure (MTBF) data is not publicly disclosed. The
      industry context is concerning — multiple other robotics companies have experienced hardware
      failures, safety incidents, and recalls that required expensive field interventions. NEO Gamma's
      bipedal design introduces additional failure modes (falls, joint wear, suit degradation) not
      present in EVE's wheeled platform.

      Cybersecurity represents a materially underappreciated risk dimension. EVE and NEO are both
      continuously connected devices with cameras, microphones, and actuators operating in facilities
      or homes. A compromised robot could be used for surveillance, data exfiltration, physical
      disruption, or extortion. 1X has not published a cybersecurity white paper, penetration testing
      results, or security architecture documentation. For comparison, Amazon Alexa and Google Nest
      — much simpler connected devices — have faced significant security scrutiny. A home-deployed
      robot with a camera and manipulators presents a far higher-severity attack surface.

      Supply chain risk is concentrated in proprietary actuator components and 3D-knitted textile
      manufacturing. Semiconductor shortages affecting GPU compute for training, and potential
      single-sourcing of actuator-specific components, create manufacturing delay risk. If a key
      actuator component supplier encounters quality issues or supply interruption, NEO Gamma
      production could be delayed substantially. The risk transmission map (FR002) illustrates how
      operational risks propagate to revenue, customer, and financing outcomes.
    claimRefs:
      - CR008
      - CR009
      - CR014
      - CR015
      - CR017
      - CR024
      - CR025
      - CR028
      - CR031
      - CR038
    tableRefs:
      - TR002
    figureRefs:
      - FR002

  - id: section-partner-dependency
    title: "Partner, Dependency, and Customer Concentration Risks"
    body: >-
      1X Technologies has three categories of partner and dependency risk that individually would be
      manageable but collectively create a fragile dependency stack. First, strategic AI dependency
      on OpenAI: the OpenAI Startup Fund led the Series A2, and OpenAI's technical partnership
      (particularly for AI model access and integration) is a stated enabler of 1X's AI strategy.
      If OpenAI pivots its robotics strategy, changes licensing terms, or competes directly in
      the embodied AI space, 1X would need to rapidly internalise AI model development without
      the OpenAI integration advantage. There is no publicly disclosed contractual protection for
      this scenario.

      Second, capital dependency on EQT Ventures: EQT is the Series B lead investor with board
      representation. As 1X approaches Series C, EQT's ability and willingness to co-invest or
      support the next financing is critical. If EQT's portfolio allocation shifts or governance
      friction emerges, 1X's ability to raise at its targeted $1B Series C valuation could be
      compromised.

      Third, and most material, customer concentration: ADT and Everon together represent an
      estimated 95%+ of 1X's enterprise revenue. Loss of either relationship would require 12-24
      months of replacement customer acquisition time — assuming the pipeline exists — while fixed
      costs (manufacturing, R&D, teleoperator salaries) persist. This is a binary risk: not a gradual
      decline but a potential step-down cliff. The dependency map (FR003) visualises all critical
      third-party dependencies and their flow into 1X's operations.
    claimRefs:
      - CR011
      - CR012
      - CR013
      - CR014
      - CR018
      - CR019
      - CR027
      - CR032
      - CR037
