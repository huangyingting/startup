  - id: section-people-financial
    title: "People, Execution, and Financial Model Risks"
    body: >-
      Key-person dependency at 1X Technologies is extreme. CEO Bernt Børnich is the founding
      visionary and company architect; he has guided the company from Halodi Robotics through
      three pivots, three funding rounds, and two product generations. His departure would create
      a strategic leadership vacuum difficult to fill in the nascent humanoid robotics space. VP
      of AI Eric Jang is equally critical on the technical side: his embodied learning data engine
      is the company's core AI differentiation, and his specific expertise in combining VR
      teleoperation with reinforcement learning is rare. The departure of either person would
      likely delay the AI roadmap by 12-18 months minimum and potentially trigger investor concern.

      The competitive talent market amplifies this risk. Google DeepMind, Meta AI, Tesla,
      Boston Dynamics, and Figure AI are all actively recruiting AI robotics engineers from the
      same talent pool. Compensation packages at these companies are highly competitive, and
      the opportunity cost for mid-level engineers at 1X (vs. a large tech company with public
      equity compensation) is high. Attrition at the engineering layer — even absent key-person
      departure — could slow development velocity materially.

      Financially, 1X's primary kill risk is a failure to close the Series C at sufficient size
      and timeline to fund NEO manufacturing scale-up. Based on estimated burn rates of
      $10-15M/month (derived from comparable-stage robotics companies and 1X's headcount signals),
      post-January 2025 capital gives an estimated 7-20 months of runway — implying a financing
      need before or during early 2026. If NEO manufacturing requires significant CAPEX and the
      Series C is delayed or under-subscribed, 1X could face delivery delay, customer attrition,
      and management distraction simultaneously.
    claimRefs:
      - CR010
      - CR019
      - CR026
      - CR029
      - CR036
      - CR037
      - CR040
    tableRefs:
      - TR004

  - id: section-mitigations-kill
    title: "Mitigations, Kill Criteria, and Diligence Asks"
    body: >-
      Risk mitigation at 1X Technologies follows three patterns: structural mitigations built into
      the product design (low-impedance actuator compliance, physical stops), reactive mitigations
      triggered by adverse events (consent controls added post-WSJ privacy coverage), and planning
      mitigations that remain undisclosed (ISO certification roadmap, OSHA audit programme, GDPR
      data-processing agreements).

      The most actionable kill criteria for investors and enterprise customers are: (1) Series C
      failure or reduction — if 1X raises less than $300M in Series C, the NEO manufacturing plan
      likely requires restructuring; (2) ADT or Everon non-renewal — a single enterprise contract
      non-renewal without replacement customer announcement would be a material adverse signal;
      (3) Privacy enforcement action — a US FTC or EU GDPR enforcement notice related to robot
      data collection would require product modification and EU market withdrawal, delaying NEO
      consumer revenue by 12+ months; (4) Key-person departure — the departure of Børnich or Jang
      without a credible succession announcement; (5) Hardware recall — a systematic safety defect
      in the EVE fleet requiring recall of production units would destroy near-term economics and
      brand credibility simultaneously.

      Monitoring indicators include: NEO delivery timeline updates, Series C announcement terms,
      ADT/Everon expansion or reduction signals in quarterly earnings commentary, regulatory
      filings referencing 1X by name, engineering job posting levels (teleoperator and robotics
      engineer), and GitHub activity velocity as a proxy for development momentum. The mitigation
      and kill criteria table (TR005) codifies these triggers with specific thresholds.
    claimRefs:
      - CR016
      - CR019
      - CR027
      - CR028
      - CR030
      - CR033
      - CR034
      - CR038
      - CR040
    tableRefs:
      - TR005

