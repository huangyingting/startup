  - id: section-diligence-exit
    title: "Diligence Asks, Thesis-Break Triggers, and Exit Readiness"
    body: >-
      The final diligence asks table (TV006) lists the eight priority data requests that must be addressed before
      committing capital at any Series C pricing level. The most critical are: EVE revenue run rate and ADT/Everon
      contract terms, since confirmed recurring revenue is the primary valuation anchor; NEO pre-order backlog
      count, which would validate or challenge the consumer market thesis; and burn rate with runway, to confirm
      that the Series C timeline is not driven by acute capital distress. Series C terms and investor composition
      matter for preference stack and dilution overhang analysis; autonomy metrics — percentage of tasks completed
      autonomously versus via teleoperation — are the leading indicator for NEO's commercial viability at scale.

      The thesis-break and kill triggers table (TV005) defines five specific events that would signal thesis
      failure requiring immediate portfolio action: Series C not closed by Q4 2026; ADT or Everon contract
      terminated or fleet reduced more than 20%; NEO shipping delayed beyond Q4 2027 without credible milestone
      update; CEO Børnich or VP AI Jang departure without named successor; or an FTC, GDPR, or EU AI Act
      enforcement action targeting home teleoperation data collection. These triggers are derived from the
      financial analysis in Chapter 4, the risk register in Chapter 7, and competitive analysis in Chapter 3,
      creating a cross-chapter monitoring framework for the Series C investment.

      Exit optionality for 1X Technologies runs across three pathways: IPO (2029+ based on $100M+ ARR
      requirement for public market comparables), strategic M&A by a corporate partner already in the ecosystem
      (Samsung NEXT's existing investment is the highest-probability acqui-hire or full acquisition pathway),
      and secondary market liquidity via tender offers to early investors. The most likely near-term exit at
      current scale is strategic M&A in the $1–3B range. NEO's pre-orders and commercial validation data are the
      primary levers for improving exit timing and pricing. Final diligence completion with positive results
      across items 1–4 (revenue, pre-orders, burn, Series C terms) in TV006 would be the minimum threshold
      for a transition from TRACK to INVEST.
