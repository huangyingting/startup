      in USD millions. Each bar spans the uncertainty range of the scenario with the central estimate as the point
      value. Illustrates the asymmetric return profile from a $3B+ Series C entry price: the base case ($1.2–1.5B)
      implies a significant write-down, while the bull case ($4–6.5B) offers only modest returns at current entry
