    type: flow
    layout: standard
    summary: >-
      Causal chain from 1X Technologies' four key evidence pillars (commercial proof, AI partnership, technical
      differentiation, data moat) through two risk vectors (competitive pressure from Tesla Optimus and financial
      opacity with unconfirmed Series C) to the final TRACK recommendation at 6.5/10 with medium confidence.
