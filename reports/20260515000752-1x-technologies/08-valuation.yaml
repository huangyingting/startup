  - id: section-scenarios
    title: "Bull, Base, and Bear Scenario Analysis"
    body: >-
      The scenario analysis spans three distinct investment outcomes tied to NEO commercialization success,
      Series C closure, and competitive dynamics. The bull case (25% probability weight) assumes NEO ships to
      10,000 or more consumer homes by 2030 at $20,000 per unit or on the $499/month subscription, generating
      $500M or more in annual revenue by 2030 and commanding an 8–12x revenue multiple in a market that has
      re-rated upward on proven commercial scale. The implied exit valuation of $4–6B represents a 1.3–2x gross
      return on a $3B Series C entry — marginal unless entry pricing comes in below $2B. ARK Invest's physical
      AI valuation framework suggests category-defining players could justify even higher multiples if the data
      flywheel creates a defensible moat at scale.

      The base case (45% probability weight) assumes NEO reaches consumer delivery in 2026–2027 but at
      lower-than-projected volumes and with continued reliance on teleoperation. EVE enterprise revenue grows to
      $50–80M ARR by 2028 through new customer additions. The implied base case valuation of $1.2–1.5B at a 2028
      exit represents a meaningful write-down from a $3B entry, making base case returns negative unless Series C
      entry pricing comes in well below $3B. The bear case (30% probability weight) is an orderly wind-down:
      NEO fails commercial shipping, ADT/Everon contracts lapse, and the company is acquired as an IP-plus-team
      at $200–400M — representing near-total loss at any $3B+ entry price.

      The probability-weighted expected enterprise value across all three scenarios is approximately $1.3B,
      well below any plausible $3B+ Series C entry, reinforcing the TRACK over INVEST recommendation unless
      entry price discipline is applied to bring entry below $1.5B. The bull/base/bear scenario table (TV003)
      and valuation return range figure (FV003) encode all three scenarios with explicit assumptions, return
      logic, probability signals, and downside triggers.
