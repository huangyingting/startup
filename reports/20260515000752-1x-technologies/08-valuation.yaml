    layout: standard
    summary: >-
      Bar chart showing implied 1X Technologies valuations (USD millions) across seven reference scenarios and
      comparables: from the bear IP-liquidation case at $300M through current-fundamentals revenue multiples,
      the Boston Dynamics and Agility Robotics comparable floor, the base case 2028 scenario, Figure AI's
      comparable implied valuation, and the bull case 2030 scenario at $5B. Illustrates the wide valuation
      dispersion and the primacy of NEO commercialization on ultimate outcome.
