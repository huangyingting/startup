            - Labor/union opposition
            - Hardware reliability failures
            - Privacy regulatory enforcement
        - label: Low Likelihood
          values:
            - IP litigation
            - Tesla Optimus commoditisation
            - OpenAI partnership termination
  - id: FR002
    title: Risk transmission map
    type: dag
    layout: standard
    summary: >-
      Directed graph showing how primary risk events at 1X Technologies transmit into downstream revenue, operational,
      regulatory, and valuation consequences. Illustrates the cascading nature of privacy, customer concentration, and
      financing risks.
    data:
