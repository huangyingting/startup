    title: Dependency map
    type: dag
    layout: standard
    summary: >-
      Critical dependency map showing all external parties on which 1X Technologies depends for capital, AI capability,
      revenue, training data, and hardware supply. Illustrates the concentrated dependency stack with few redundancies.
    data:
      nodes:
        - id: d1
          label: 1X Technologies (Core)
