          values:
            - Strong (wheeled 24/7)
            - Partial (bipedal stable)
            - Strong
        - label: Manipulation / Dexterity
          values:
            - Partial (door, carry)
            - Partial (in development)
            - Strong
        - label: Task Autonomy
