      - number: '6.2'
        title: Customer Segmentation, Buyer Patterns, and Market Entry
        blocks:
          - type: paragraph
            body: >-
              1X's customer base spans two structurally different segments requiring distinct go-to-market approaches.
              The enterprise segment (EVE) is characterised by B2B direct sales to large commercial security operators
              with multi-year RaaS contracts and facilities-level procurement decisions. Buyers are VP Operations, Chief
              Security Officers, or Facilities Directors. Deal sizes are large (ADT 140-unit deployment at
              $3,500–5,000/month implies $490,000–700,000 in monthly recurring revenue from a single customer), and
              sales cycles are long — 6–18 months based on enterprise robotics industry benchmarks. The ADT and Everon
              relationships represent ideal customer archetypes: national-scale security operators with large
              managed-services footprints who can absorb robot fleet management overhead and benefit from after-hours
              automation cost savings.

              The consumer segment (NEO) is structurally different: individual buyers at $20,000 or $499/month making
              purchase decisions based on convenience, trust, and lifestyle fit. No consumer-scale robot product has yet
              established recurring purchase behaviour in the home market. NEO pre-orders opened October 2025,
              positioning 1X as an early mover in consumer humanoid robots, but the segment is unproven. Consumer
              privacy concerns raised by the Wall Street Journal in late 2025 around teleoperation — specifically that
              remote humans can view home interiors when guiding NEO — represent the primary demand-side risk in this
              segment.

              The enterprise security robot market (EVE's primary TAM) is growing, with Knightscope, Cobalt Robotics,
              and Zetron as comparable players, but none offer bipedal humanoid form factors or the general-purpose
              manipulation capability EVE provides. This positions EVE at a premium tier with larger addressable tasks
              per deployment. Adjacent verticals — healthcare support, light logistics, hospitality — are plausible
              expansion markets but have no confirmed customer traction as of 2026.
