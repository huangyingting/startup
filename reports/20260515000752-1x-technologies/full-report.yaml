            body: >-
              The most material customer diligence gap is the absence of any independently verified customer retention
              or satisfaction data. In a RaaS business model, renewal rate is the primary indicator of product-market
              fit durability. Without confirmed renewal data from ADT and Everon, the ARR trajectory is speculative.
              Investors should obtain explicit renewal confirmation, contract extension terms, and utilisation data from
