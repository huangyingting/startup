  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >-
              1X Technologies operates in a rapidly evolving regulatory environment where AI safety, consumer privacy,
              and robot labour standards are all in active legislative and enforcement development. The EU AI Act —
              passed in 2024 and entering application phases through 2026-2027 — classifies certain autonomous AI system
              applications as high-risk, requiring conformity assessments, technical documentation, human oversight
              provisions, and Notified Body review before EU market entry. Given that NEO Gamma is designed for consumer
              home use with autonomous AI capabilities, it may fall into the high-risk category. 1X Technologies has not
              publicly disclosed an EU AI Act compliance strategy or indicated engagement with a Notified Body.

              Privacy regulation presents two distinct jurisdictional risks. Under GDPR, 1X's European operations —
              including the Sunnaasen Hospital and Norwegian university deployments — generate personal data (video,
              audio, movement data) that requires a legal basis for processing, data minimisation, and subject access
              rights. The specific legal basis (consent, legitimate interest, or contract) for teleoperation video
              processing has not been disclosed. In the United States, the FTC's 2024 commercial surveillance report
              established a regulatory framework that could apply directly to NEO's data collection practices, and
              state-level privacy laws (CCPA and equivalents) add further exposure. The proposed AI ROBOT Act (Senate
              Bill 2718) would impose new federal robot safety standards if enacted, though as of Q2 2026 it has not
              been enacted.

              OSHA regulations under 29 USC 652 govern employer obligations for workers in proximity to industrial
              machinery including robots. EVE's commercial deployments at ADT and Everon facilities require that the
              deploying operator maintain OSHA-compliant safety documentation. 1X has not published OSHA compliance
              documentation and relies on the deploying customer to manage this requirement. NIST's AI Risk Management
              Framework provides a voluntary standard that enterprise customers may begin demanding as a procurement
              condition. The regulatory risk register (TR001) ranks these exposures by severity, and the risk heatmap
              (FR001) provides a cross-risk probability-impact overview.
