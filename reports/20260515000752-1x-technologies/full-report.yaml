  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary, Definitions, and Substitutes
        blocks:
          - type: paragraph
            body: >-
              The humanoid robot market is defined as commercially sold or leased robots with a human-like form factor—
              including both wheeled-torso designs (such as 1X EVE) and fully bipedal designs (such as 1X NEO, Tesla
              Optimus, and Figure 02)—designed to perform tasks in human-built environments using dexterous manipulation
              and mobility. This definition excludes traditional fixed-arm industrial robots (Fanuc, KUKA, ABB),
              autonomous mobile robots (AMRs) without manipulation capability (e.g. Locus Robotics), and pure AI
              software systems without physical form.

              The status-quo substitutes for humanoid robots in target use cases include: (1) human labor—the primary
              substitute in security, logistics, and household tasks; (2) traditional automation systems—conveyor belts,
              fixed robotic arms, barcode scanners—which address structured tasks but cannot generalize; (3) cobots
              (collaborative robots)—such as Universal Robots UR-series—which operate in fixed positions without
              mobility; and (4) specialized non-humanoid robots—Roomba-type vacuum robots, agricultural harvesters—which
              address narrow tasks. The humanoid form factor's competitive advantage is its ability to use existing
              human-designed physical infrastructure (doors, stairs, tools, shelves) without re-engineering the
              environment.

              Adjacent markets include industrial exoskeletons, cobot arms, AI-powered service robots (delivery bots,
              floor-cleaning robots), and the broader industrial automation software sector. Humanoid robots are
              positioned to bridge these adjacencies as their capabilities mature, creating an expanding addressable
              footprint. Included spend in this analysis covers robot hardware purchases, leases, software
              subscriptions, training data services, and after-sale maintenance. Excluded spend includes re-engineered
              facility infrastructure, workforce retraining, and adjacent non-humanoid robotics categories.
            claimRefs:
              - CM001
              - CM002
              - CM006
              - CM010
