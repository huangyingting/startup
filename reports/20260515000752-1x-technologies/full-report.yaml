      - number: '3.2'
        title: Capability Benchmarks and 1X Product Comparison
        blocks:
          - type: paragraph
            body: >-
              Benchmarking 1X against direct competitors reveals distinct trade-offs. On commercial deployment scale, 1X
              EVE leads all pure-play humanoid companies with approximately 390 units deployed at enterprise
              customers—more than any competitor other than Agility Robotics Digit, which has deployed at Amazon
              fulfillment centers, GXO Logistics, and Ford. Digit's Amazon deployment is the most commercially
              significant in the industry, representing the first high-volume industrial humanoid deployment.

              On bipedal mobility and dexterous manipulation, 1X's wheeled EVE is outclassed by fully bipedal
              competitors. Boston Dynamics Atlas, while not commercially deployed for general tasks, demonstrates full
              acrobatic capability. Figure AI's Figure 02 and Agility's Digit both walk and perform manipulation tasks
              in real factory environments. Apptronik Apollo and Sanctuary AI Phoenix represent credible bipedal
              platforms with enterprise pilots underway. 1X's NEO bipedal robot is designed to compete in this space,
              but it is entering a market in 2026 where several competitors have 12–24 months of bipedal deployment
              experience.

              On AI integration, Figure AI's OpenAI partnership gives it access to frontier language model capabilities
              tightly integrated with its manipulation system. 1X's embodied learning strategy—training end-to-end
              neural networks from VR teleoperator data—is differentiated and has produced publicly demonstrated
              autonomous task performance, but the autonomy gap versus human capability remains wide for all players.
              Tesla Optimus benefits from Tesla's massive AI training infrastructure (Dojo supercomputer, FSD neural net
              stack) in ways that are difficult for smaller companies to replicate.

              On price, 1X NEO at $20,000 (or $499/month) is directly competitive with Tesla Optimus's stated long-term
              target price. However, Unitree G1 at $16,000 and H1 at $90,000 bracket the market, with the G1 posing a
              specific low-cost threat if autonomy can be augmented with third-party AI software. The pricing
              differential between 1X and Chinese competitors like Unitree is a critical strategic variable.
