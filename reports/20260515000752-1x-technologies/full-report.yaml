  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Probability-impact heatmap mapping 1X's top identified risks across three likelihood levels and three impact
      severities. Higher-right cells represent the most critical risks requiring active monitoring and diligence.
      Privacy regulatory action and Series C financing failure occupy the highest-severity positions.
    data:
      columns:
        - Low Impact
        - Medium Impact
        - High Impact
      rows:
        - label: High Likelihood
          values:
            - NIST RMF procurement req.
            - Talent attrition
            - Customer concentration cliff
        - label: Medium Likelihood
