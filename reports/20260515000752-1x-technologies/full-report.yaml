      - number: '4.2'
        title: Cost Structure, Gross Margin, and Unit Economics
        blocks:
          - type: paragraph
            body: >-
              1X's cost structure is characteristic of early-stage robotics hardware companies: high capital intensity
              driven by R&D, manufacturing, and field-support costs, with gross margins that are likely negative to
              marginally positive at current scale. Hardware COGS for EVE is estimated at $15,000–25,000 per unit based
              on third-party hardware benchmarks and analogues from competing humanoid platforms, though no official
              COGS data has been disclosed. At RaaS pricing of $3,500–5,000 per robot per month, the hardware cost would
              be recovered over roughly 3–7 months under optimistic assumptions, before field service, software
              maintenance, and depreciation costs are accounted for. The true gross margin per deployed EVE is unknown.
              Industry benchmarks suggest first-generation humanoid hardware margins are negative to low single-digit
              positive at current batch sizes, improving substantially at scale above 500 units per batch. R&D spending
              likely constitutes 40–60% of operating expenditure, consistent with 1X's emphasis on autonomous AI
              development and the rapid product iteration cycle (EVE to NEO). Sales and GTM costs for enterprise
              robotics are substantial: typical enterprise sales cycles run 6–18 months, with customer acquisition costs
              (CAC) estimated at $50,000–200,000 per account depending on deal size and deployment complexity. Payback
              periods are therefore extended, creating capital drag during scale-up. Working capital management is a key
              risk: robot inventory must be manufactured before revenue accrues, and RaaS contracts may require pilot
              periods that defer cash collection. There is no public disclosure of 1X's gross margin, COGS, CAC, or
              payback period.
