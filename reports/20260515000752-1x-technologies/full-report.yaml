        private funding rounds, M&A transactions, and analyst-assigned implied valuations through Q2 2026. Tesla Optimus
        is included as a scale-threat reference but excluded from comparable set averaging since its value cannot be
        independently separated from Tesla's consolidated equity. Additional earlier-stage comparables (Fourier
        Intelligence, Unitree, Agility parent post-acquisition) omitted due to insufficient independent valuation
        disclosure. Chinese humanoid makers omitted due to currency and market-access comparability limitations.
