      - number: '6.4'
        title: Go-to-Market Repeatability and Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              1X's go-to-market model for EVE is direct enterprise sales through security integrator relationships. The
              ADT and Everon partnerships demonstrate that a channel-based approach — selling through large
              managed-services operators rather than directly to end facilities — is viable for EVE adoption. This model
              is capital-efficient compared to direct Greenfield sales but concentrates revenue and customer-acquisition
              risk in a narrow partner channel. If either ADT or Everon were to discontinue their EVE programs (due to
              cost, performance dissatisfaction, or strategic reprioritisation), the revenue impact would be estimated
              at 40–60% of total enterprise ARR respectively, given their relative fleet sizes.

              Go-to-market repeatability beyond the security vertical is unconfirmed. Adjacent verticals (healthcare,
              logistics, hospitality) require different procurement cycles, end-users, and compliance environments.
              Healthcare in particular introduces patient-safety regulatory requirements (FDA, CE Mark in Europe) that
              EVE has not addressed publicly. 1X's product roadmap for EVE appears focused on deepening the security
              deployment while NEO development continues, rather than aggressively expanding EVE into new verticals.

              For NEO's consumer GTM, the pricing model ($20,000/$499/month) targets a premium segment, likely
              tech-early-adopters and affluent households. Mass-market penetration will require a different pricing
              strategy. No distribution channel (retail, e-commerce, white-label) has been disclosed; direct-to-consumer
              via 1x.tech pre-order is the only confirmed channel. Channel expansion announcements will be a key leading
              indicator of consumer segment scale-up intent.
