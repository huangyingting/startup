  - id: FU004
    title: Retention / repeat cohort
    type: cohort
    layout: standard
    summary: >-
      Estimated retention cohort for ADT and Everon EVE fleet contracts over 18 months. Values are analyst estimates
      only — no official retention data has been disclosed by 1X Technologies. High estimated retention reflects fleet
      persistence signals (no reported cancellations) rather than confirmed renewal data.
    data:
