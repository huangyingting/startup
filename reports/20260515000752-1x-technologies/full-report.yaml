      - number: '7.5'
        title: Mitigations, Kill Criteria, and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Risk mitigation at 1X Technologies follows three patterns: structural mitigations built into the product
              design (low-impedance actuator compliance, physical stops), reactive mitigations triggered by adverse
              events (consent controls added post-WSJ privacy coverage), and planning mitigations that remain
              undisclosed (ISO certification roadmap, OSHA audit programme, GDPR data-processing agreements).

              The most actionable kill criteria for investors and enterprise customers are: (1) Series C failure or
              reduction — if 1X raises less than $300M in Series C, the NEO manufacturing plan likely requires
              restructuring; (2) ADT or Everon non-renewal — a single enterprise contract non-renewal without
              replacement customer announcement would be a material adverse signal; (3) Privacy enforcement action — a
              US FTC or EU GDPR enforcement notice related to robot data collection would require product modification
              and EU market withdrawal, delaying NEO consumer revenue by 12+ months; (4) Key-person departure — the
              departure of Børnich or Jang without a credible succession announcement; (5) Hardware recall — a
              systematic safety defect in the EVE fleet requiring recall of production units would destroy near-term
              economics and brand credibility simultaneously.

              Monitoring indicators include: NEO delivery timeline updates, Series C announcement terms, ADT/Everon
              expansion or reduction signals in quarterly earnings commentary, regulatory filings referencing 1X by
              name, engineering job posting levels (teleoperator and robotics engineer), and GitHub activity velocity as
              a proxy for development momentum. The mitigation and kill criteria table (TR005) codifies these triggers
