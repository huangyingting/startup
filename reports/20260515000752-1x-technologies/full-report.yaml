        - id: j5
          label: Expansion / Renewal (Fleet Growth)
          detail: 'Enterprise: additional units, new sites; Consumer: subscription continuation'
  - id: FU002
    title: Adoption / deployment funnel
    type: funnel
    layout: standard
    summary: >-
      Enterprise adoption funnel from addressable security operator prospects through confirmed production deployments.
      Illustrates the narrow conversion from large addressable market to current deployment count, highlighting the GTM
      concentration challenge.
