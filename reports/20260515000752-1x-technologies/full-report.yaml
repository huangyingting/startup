  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold / Kill Event
      - Transmission to Investment Thesis
      - Action Implication
    rows:
      - - Series C not closed
        - No Series C announcement by Q4 2026, or raise confirmed below $300M
        - >-
          NEO manufacturing capital unavailable; estimated runway falls below 9 months; bear case probability rises
          above 50%
        - Immediate thesis re-evaluation; any Series C commitment conditional on confirmed close at known terms
      - - Enterprise anchor customer loss
        - >-
          ADT or Everon reduces fleet more than 20%, terminates contract, or publicly announces alternate robotics
          provider
        - >-
          40–60% ARR loss; EVE commercial proof — the primary valuation anchor — is undermined; base case collapses
          toward bear
        - Portfolio position reduction or exit; emergency due diligence on replacement customer pipeline
      - - NEO shipping delay beyond Q4 2027
        - No confirmed NEO consumer delivery to paying customers by end of Q4 2027
        - >-
          Consumer thesis broken; bull and base cases shift materially toward bear; pre-order cancellations likely above
          30%
        - >-
          Reassess conviction; demand updated autonomy metrics and pre-order retention data; consider distressed M&A
          scenario
      - - CEO or VP AI departure without successor
        - Børnich or Jang departs unplanned without a named credible successor announced within 30 days
        - AI roadmap setback of 12–18 months; NEO autonomy development disrupted; Series C investor confidence impacted
        - Immediate governance inquiry; request board response and succession evidence; hold any new capital deployment
      - - Privacy regulatory enforcement action
        - >-
          FTC investigation, GDPR enforcement notice, or EU AI Act non-compliance finding specifically naming 1X
          Technologies
        - >-
          NEO consumer launch in affected jurisdictions blocked; EU operations suspended pending compliance; legal cost
          burden
        - Position suspension pending regulatory outcome; evaluate EU market exclusion scenario on thesis
    notes: >-
      Kill trigger thresholds are analyst-defined based on financial analysis (Chapter 4), risk register (Chapter 7),
      and scenario analysis in this chapter. Triggers are monitorable via 1X press releases, publicly filed disclosures
      from ADT Inc. and Everon parent companies, FTC and GDPR enforcement databases, technology media, and quarterly
      portfolio check-ins. Sources used in threshold calibration: SV006, SV028.
    claimRefs:
      - CV031
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - EVE revenue run rate
        - No disclosed ARR, MRR, or revenue run rate for EVE enterprise deployments at ADT or Everon
        - Primary valuation anchor; without confirmed revenue, all comparable multiples are speculative
        - CFO; request monthly MRR, contract term lengths, renewal history, and blended unit pricing
      - - NEO pre-order backlog
        - Pre-orders opened October 2025; no unit count or deposit amount has been disclosed
        - 'Consumer thesis validation: backlog above 1,000 units with deposits would materially increase conviction'
        - CEO or VP Sales; request current backlog count, geographic distribution, and deposit conversion rate
      - - Burn rate and runway
        - No disclosed cash position, monthly burn rate, or 12-month runway projection
        - 'Series C timing and distress risk: if runway is below 9 months, negotiating leverage is impaired'
        - CFO; request monthly cash burn, total cash on hand, and 12-month runway projection with model assumptions
      - - Series C terms and investor composition
        - Round size, post-money valuation, and lead investor composition not confirmed as of Q2 2026
        - Entry price is the primary return variable; preference stack and anti-dilution terms affect net IRR
        - CEO or legal counsel; request term sheet, post-money cap table, preference structure, and co-investor list
      - - Autonomy level metrics
        - No disclosed percentage of tasks completed autonomously versus via remote teleoperation for NEO or EVE
        - >-
          NEO consumer viability requires reaching L2+ autonomy; current teleoperation rate drives ongoing cost
          structure
        - VP AI Eric Jang; request monthly autonomy rate progression, task complexity metrics, and 2026 roadmap targets
      - - Hardware reliability (MTBF)
        - No mean-time-between-failure or warranty claim data published for EVE or NEO
        - Unit economics for RaaS model depend critically on maintenance cost; MTBF drives long-term margin
        - >-
          Engineering or operations team; request field reliability data, maintenance intervention rates, and warranty
          claims
      - - Patent portfolio and IP ownership
        - Limited public patent disclosure beyond a small number of known US patents in the public registry
        - IP moat durability determines defensibility if Tesla or Figure AI scales and seeks freedom-to-operate
        - >-
          General counsel; request full patent portfolio list, pending applications, freedom-to-operate analysis, and IP
          ownership
      - - Board composition and investor rights
        - No confirmed board composition, investor rights summary, or equity table post-Series B
        - Governance structure affects exit flexibility, Series C pricing, anti-dilution protections, and board control
        - CEO or legal counsel; request board member list, major investor rights summary, and current equity table
    notes: >-
      Diligence asks are ordered by materiality to the Series C investment decision. Items 1–4 (revenue, pre-orders,
      burn rate, Series C terms) are effectively blocking-level gaps that must be resolved before any investment
      commitment. Items 5–8 (autonomy metrics, hardware MTBF, patents, board composition) are material for underwriting
      quality but not necessarily blocking if Items 1–4 resolve favourably. All items should be addressed in a formal
      data room before any binding Series C commitment is made. Failure to disclose Items 1–4 should cause the
      recommendation to remain at TRACK.
    claimRefs:
      - CV039
