          to: d1
        - from: d6
          to: d1
        - from: d7
          to: d1
  - id: FE004
    title: Product maturity / capability map
    type: matrix
    layout: wide
    summary: >-
      Capability maturity matrix scoring EVE and NEO Gamma across five dimensions against the 2027 target state. Scores
      are qualitative (Strong / Partial / Weak) based on publicly reported performance data and independent technical
      assessments as of Q2 2026.
    data:
      columns:
        - EVE (Current)
        - NEO Gamma (Current)
        - NEO Target 2027
      rows:
