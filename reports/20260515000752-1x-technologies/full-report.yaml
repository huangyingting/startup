      - number: '5.5'
        title: Technology Risks, Trust, and Safety Architecture
        blocks:
          - type: paragraph
            body: >-
              1X's trust and safety architecture rests on three primary pillars: physical safety through low-impedance
              actuator compliance, operational safety through remote teleoperation oversight, and product safety through
              physical emergency stop mechanisms. The low-impedance actuator design is a structural safety property —
              unlike stiff actuators that transmit full motor torque on contact, 1X's actuators absorb energy on
              collision, reducing injury force in human proximity. This is a sound design philosophy for consumer
              environments, though it has not been validated through published ISO 13482 (personal care robot safety) or
              ISO 10218 (industrial robot safety) certification as of Q2 2026.

              The reliance on remote teleoperation as the current safety net for complex tasks introduces its own risks:
              teleoperator error, latency-induced misjudgment, and the privacy implications of having humans visually
              observe home environments. The WSJ's October 2025 report flagged consumer privacy concerns about
              teleoperation in home settings, and 1X subsequently added consent controls and blurring of identifiable
              content in teleop feeds. However, the technical implementation of these controls and data retention
              policies for teleop video have not been publicly disclosed in detail.

              Cybersecurity represents an emerging risk dimension. Robots equipped with cameras, microphones, and
              continuous internet connectivity create attack surfaces for unauthorised access to home data. 1X has not
              published a cybersecurity white paper or disclosed penetration testing results. Regulatory risk is also
              materialising: the EU AI Act's high-risk AI system classification may apply to autonomous robot functions,
              requiring conformity assessments and Notified Body review before EU market entry. FTC commercial
              surveillance rules in the US apply to robots collecting video/audio data. OSHA regulations (29 USC 652)
              govern EVE in enterprise settings and have not been publicly addressed by 1X in relation to its commercial
              deployments. The trust/quality/compliance table (TE004) summarises these gaps against current control
              status.
