  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Lines, Features, and Technical Overview
        blocks:
          - type: paragraph
            body: >-
              1X Technologies commercialises two distinct robot platforms targeting different markets and deployment
              contexts. EVE is the company's revenue-generating wheeled humanoid, standing approximately 140cm tall and
              weighing around 70kg. It operates continuously in enterprise environments — primarily commercial security
              patrols for ADT and Everon — performing tasks including after-hours surveillance, door opening, and load
              carrying. EVE's wheeled base enables stable locomotion without the balancing complexity of bipedal
              designs, making it more tractable for 24/7 production deployment. As of early 2026, approximately 390 EVE
              units have been deployed commercially.

              NEO is the bipedal successor platform targeting the consumer home market. NEO Beta, launched August 2024,
              was the first full bipedal prototype validating the embodied AI architecture. NEO Gamma, announced
              February 2025, represents a significant design leap: it integrates a 3D-knitted full-body suit developed
              in partnership with Kind Humanoid (acquired January 2025) that enables anthropomorphic range of motion and
              soft-touch surfaces for home environments. NEO Gamma stands approximately 163cm tall, uses a 100Hz active
              balance control loop, and deploys reinforcement learning policies trained from motion capture reference
              data. Pre-orders opened October 2025 at $20,000 outright purchase or $499 per month subscription, with
              consumer delivery targeted in 2026.

              The product transition from EVE to NEO reflects a strategic arc from commercially proven enterprise
              utility robot toward a general-purpose household humanoid. Both platforms share the same underlying
              proprietary actuator architecture and end-to-end neural network control system, though NEO Gamma adds
              bipedal locomotion challenges that EVE avoids through its wheeled design. The Kind Humanoid acquisition
              brought co-founder Christoph Kohstall as an engineering contributor and industrial designer Yves Béhar's
              ergonomic chassis concept, now integrated into NEO Gamma's industrial design. This acquisition accelerated
              the home-form-factor iteration significantly relative to organic development timelines.
