      - number: '7.2'
        title: Operational, Quality, and Cybersecurity Risks
        blocks:
          - type: paragraph
            body: >-
              1X Technologies faces a series of operational risks that are partially masked by its current small fleet
              size. Hardware reliability is the primary unknown: with approximately 390 EVE units deployed in commercial
              environments, the company has not yet faced the quality-management challenges that arise at thousands of
              units. Mean-time-between-failure (MTBF) data is not publicly disclosed. The industry context is concerning
              — multiple other robotics companies have experienced hardware failures, safety incidents, and recalls that
              required expensive field interventions. NEO Gamma's bipedal design introduces additional failure modes
              (falls, joint wear, suit degradation) not present in EVE's wheeled platform.

              Cybersecurity represents a materially underappreciated risk dimension. EVE and NEO are both continuously
              connected devices with cameras, microphones, and actuators operating in facilities or homes. A compromised
              robot could be used for surveillance, data exfiltration, physical disruption, or extortion. 1X has not
              published a cybersecurity white paper, penetration testing results, or security architecture
              documentation. For comparison, Amazon Alexa and Google Nest — much simpler connected devices — have faced
              significant security scrutiny. A home-deployed robot with a camera and manipulators presents a far
              higher-severity attack surface.

              Supply chain risk is concentrated in proprietary actuator components and 3D-knitted textile manufacturing.
              Semiconductor shortages affecting GPU compute for training, and potential single-sourcing of
              actuator-specific components, create manufacturing delay risk. If a key actuator component supplier
              encounters quality issues or supply interruption, NEO Gamma production could be delayed substantially. The
              risk transmission map (FR002) illustrates how operational risks propagate to revenue, customer, and
              financing outcomes.
