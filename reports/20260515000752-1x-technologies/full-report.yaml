            - Weak (limited multi-task)
            - Partial
        - label: Safety Certification
          values:
            - Partial (OSHA scope)
            - Weak (uncertified)
            - Partial
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: standard
    summary: >-
      Five-stage customer journey from initial awareness through enterprise production and expansion, mapped separately
      for EVE enterprise and NEO consumer segments. Illustrates the distinct adoption paths and inflection points for
      each segment.
    data:
      nodes:
        - id: j1
          label: Awareness (Security Integrator Lead / Consumer Media)
          detail: EVE via security integrator channel (ADT, Everon); NEO via tech media pre-launch
        - id: j2
          label: Evaluation / Pilot (Demo & RFP)
          detail: 'Enterprise: 6-18 month evaluation; Consumer: pre-order decision at $20K'
        - id: j3
          label: Initial Deployment (Contract Signed)
          detail: 'Enterprise: multi-unit RaaS contract; Consumer: pre-order confirmed'
        - id: j4
          label: Production Operation (Active Use)
