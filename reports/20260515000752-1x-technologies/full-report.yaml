      - number: '1.2'
        title: Leadership, Governance, and Organizational Structure
        blocks:
          - type: paragraph
            body: >-
              1X Technologies is founder-led by CEO Bernt Øivind Børnich, who has been at the helm since founding Halodi
              Robotics in 2014. Børnich is a Norwegian roboticist who has directed the company's technical roadmap
              through its rebranding, successive funding rounds, and product pivots. He is the primary public face of
              the company and appears in all major media interactions, indicating significant key-person dependence.

              The AI research function is led by VP of AI Eric Jang, who oversees the embodied learning data engine and
              has publicly described 1X's strategy of training robots at scale using VR teleoperation. Jang's role is
              centered in the San Francisco Bay Area and is critical to the company's core AI differentiation claim.
              Following the January 2025 acquisition of Kind Humanoid, Christoph Kohstall (formerly a scientist at
              Stanford University and a member of Google's robotics team) joined 1X. Earlier company materials from the
              Halodi era also named Nicholas Nadeau as CTO, though his current status is not confirmed in public
              post-rebrand materials.

              1X is a private company and its governance structure—including board composition, investor rights, and
              equity table—has not been publicly disclosed in detail. The company has not published a corporate charter
              or governance document in reviewed public materials. Investor representation on the board can be inferred
              from lead investors EQT Ventures (Series B) and the OpenAI Startup Fund (Series A2), but board seat
              specifics are not confirmed. The company has not disclosed any regulatory, legal, or IPO-related
              governance milestones. Following the relocation of its US HQ to Palo Alto, leadership mentioned intent to
              attract top AI talent from the broader Bay Area ecosystem and to foster closer collaboration with
              investors and partners.
