      - number: '7.3'
        title: Partner, Dependency, and Customer Concentration Risks
        blocks:
          - type: paragraph
            body: >-
              1X Technologies has three categories of partner and dependency risk that individually would be manageable
              but collectively create a fragile dependency stack. First, strategic AI dependency on OpenAI: the OpenAI
              Startup Fund led the Series A2, and OpenAI's technical partnership (particularly for AI model access and
              integration) is a stated enabler of 1X's AI strategy. If OpenAI pivots its robotics strategy, changes
              licensing terms, or competes directly in the embodied AI space, 1X would need to rapidly internalise AI
              model development without the OpenAI integration advantage. There is no publicly disclosed contractual
              protection for this scenario.

              Second, capital dependency on EQT Ventures: EQT is the Series B lead investor with board representation.
              As 1X approaches Series C, EQT's ability and willingness to co-invest or support the next financing is
              critical. If EQT's portfolio allocation shifts or governance friction emerges, 1X's ability to raise at
              its targeted $1B Series C valuation could be compromised.

              Third, and most material, customer concentration: ADT and Everon together represent an estimated 95%+ of
              1X's enterprise revenue. Loss of either relationship would require 12-24 months of replacement customer
              acquisition time — assuming the pipeline exists — while fixed costs (manufacturing, R&D, teleoperator
              salaries) persist. This is a binary risk: not a gradual decline but a potential step-down cliff. The
              dependency map (FR003) visualises all critical third-party dependencies and their flow into 1X's
              operations.
