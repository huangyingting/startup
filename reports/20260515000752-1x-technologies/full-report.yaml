      - number: '3.3'
        title: Pricing, Packaging, and Business Model Comparison
        blocks:
          - type: paragraph
            body: >-
              Business model and pricing strategies vary significantly across the humanoid robot competitive landscape.
              1X has pioneered a dual pricing model: hardware purchase at $20,000 (NEO) or enterprise contracts for EVE
              (estimated $3,500–5,000/month or $100K+ outright), alongside a $499/month subscription for consumer NEO.
              This subscription model is unique among humanoid robot competitors and mirrors the robotics-as-a-service
              (RaaS) models proven in adjacent categories such as autonomous floor cleaning (Brain Corp, Avidbots) and
              warehouse AMRs (Locus, Fetch, Vecna).

              Agility Robotics offers Digit primarily on enterprise contracts rather than outright sale, emphasizing the
              RaaS model for Amazon and GXO Logistics. Pricing is not publicly disclosed but is estimated by analysts at
              $100,000–150,000 per unit or equivalent annual contract value. Agility was acquired by Agility Robotics
              parent company—it is independently capitalized with Amazon and other investors. Boston Dynamics Atlas is
              not currently commercially available for general tasks; its prior commercial products (Spot) are priced
              around $70,000–90,000.

              Tesla Optimus has no commercial pricing announced for third-party sales; the current deployment is
              internal to Tesla's own factories. Elon Musk's stated ambition of a $20,000 long-term retail price is
              aspirational and contingent on massive manufacturing scale. Figure AI does not publicly disclose pricing
              for its BMW factory deployment. Apptronik Apollo enterprise contracts are estimated at $100K+ per unit.
              Sanctuary AI Phoenix commercial terms have not been publicly disclosed but deployments with Mark's Work
              Wearhouse (Canada) and US retailers have been reported.

              Unitree's G1 at $16,000 is the most disruptive pricing signal in the market, offering a bipedal robot at
              sub-$20K that competitors cannot currently match at equivalent hardware capability. If Unitree's product
              achieves sufficient autonomous operation (through its own AI or third-party integrations), it could
              capture the price-sensitive enterprise SME segment and commoditize the hardware tier.
