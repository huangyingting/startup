      - number: '2.3'
        title: Buyer Segmentation, Adoption Path, and Payer Map
        blocks:
          - type: paragraph
            body: >-
              The humanoid robot market encompasses three primary buyer segments with distinct adoption dynamics.
              Enterprise buyers—comprising corporate security operations, facilities management departments, warehouse
              and logistics operators, and manufacturing plant managers—represent the near-term commercial opportunity
              with predictable procurement processes, capital equipment budgets, and ROI-driven purchasing. ADT's
              deployment of 140 EVE units for night security guarding and Everon's ~250-unit deployment represent the
              current commercialization proof point. Procurement is typically driven by VPs of Operations or Chief
              Security Officers with access to CapEx or service-contract OpEx budgets.

              Consumer buyers—homeowners and household decision-makers—represent the long-term TAM for NEO and competing
              products. At $20,000 or $499/month, NEO targets early-adopter technology consumers with significant
              disposable income. The adoption trigger in this segment is primarily convenience and time savings
              (household chore automation), but near-term conversion rates will be constrained by the teleoperation
              model and limited autonomous capability. The consumer home robot market is estimated at $10–15 billion TAM
              by 2030 if autonomous capability reaches threshold levels.

              Healthcare and hospital systems form a third emerging segment, with applications in patient transport,
              medication delivery, and basic nursing assistance. Sunnass Hospital in Norway is an early 1X customer.
              This segment has longer procurement cycles and requires regulatory clearance, but labor shortages in
              nursing are a powerful structural driver. Budget ownership is typically facility capital equipment
              committees, and adoption triggers include nursing staff shortages (now critical in the US and Europe) and
              cost-per-patient-day optimization. A fourth segment—higher-education and research—is smaller but
              strategically important as an early reference customer building ecosystem credibility.
