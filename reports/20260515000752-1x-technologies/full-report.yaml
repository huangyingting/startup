      - number: '1.3'
        title: Capital History, Investors, and Financial Position
        blocks:
          - type: paragraph
            body: >-
              1X Technologies has raised at least $223.5 million across confirmed funding rounds since 2023, and likely
              more when earlier pre-rebrand Halodi rounds are included. The Series A2 in March 2023 raised $23.5 million
              led by the OpenAI Startup Fund, with Tiger Global Management, Sandwater, Alliance Ventures, and Skagerak
              Capital participating. The $100 million Series B in January 2024 was led by EQT Ventures with Samsung
              NEXT, Nistad Group, and the same existing investors. VentureBeat reported total capital raised at "nearly
              $137 million" immediately following the Series B, implying earlier undisclosed Halodi-era rounds.

              In January 2025, Bloomberg reported that 1X had raised an additional $100 million (the article title
              "humanoid robot maker 1x raises 100 million" from January 27, 2025 was confirmed via URL metadata, though
              the full article was blocked at time of access). Freethink's March 2025 article confirms this timeline,
              describing the January 2025 round as preceding the February 2025 NEO Gamma announcement. This would put
              total confirmed capital raised at approximately $237 million, excluding undisclosed Halodi-era funding.

              In September 2025, The Information reported that 1X was targeting a new $1 billion funding round to
              support humanoid robot development and home deployment. This round had not been confirmed as closed by the
              time of this report. No valuation has been publicly disclosed for any funding round. The company has not
              disclosed revenue, burn rate, or profitability. Key financial metrics including ARR, customer count, and
              headcount remain private. Investors include significant global venture capital (EQT Ventures, Tiger
              Global), strategic technology investors (Samsung NEXT, OpenAI Startup Fund), and Norwegian industrial
              capital (Sandwater, Skagerak Capital, Nistad Group).
