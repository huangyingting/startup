  - id: FV001
    title: Recommendation logic
    type: flow
    layout: standard
    summary: >-
      Causal chain from 1X Technologies' four key evidence pillars (commercial proof, AI partnership, technical
      differentiation, data moat) through two risk vectors (competitive pressure from Tesla Optimus and financial
      opacity with unconfirmed Series C) to the final TRACK recommendation at 6.5/10 with medium confidence. Illustrates
      how each evidence dimension and risk interacts to produce the investment outcome.
    data:
      nodes:
        - id: n1
          label: EVE ~390 units deployed (commercial proof)
        - id: n2
          label: OpenAI + EQT partnership (credibility + capital anchor)
        - id: n3
          label: NEO differentiation (3D-knit + 100Hz balance)
        - id: n4
          label: Data flywheel (VR teleoperation moat)
        - id: n5
          label: Tesla Optimus threat (10x capital + manufacturing scale)
        - id: n6
          label: Financial opacity + unconfirmed $1B Series C
        - id: n7
          label: TRACK — 6.5/10, medium confidence, high risk
      edges:
        - from: n1
          to: n7
        - from: n2
          to: n7
        - from: n3
          to: n7
        - from: n4
          to: n7
        - from: n5
          to: n7
        - from: n6
          to: n7
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >-
      Bar chart showing implied 1X Technologies valuations (USD millions) across seven reference scenarios and
      comparables: from the bear IP-liquidation case at $300M through current-fundamentals revenue multiples, the Boston
      Dynamics and Agility Robotics comparable floor, the base case 2028 scenario, Figure AI's comparable implied
      valuation, and the bull case 2030 scenario at $5B. Illustrates the wide valuation dispersion and the primacy of
      NEO commercialization on ultimate outcome.
    data:
      items:
        - label: Bear (IP liquidation)
          value: 300
        - label: Current fundamentals (rev multiple)
          value: 500
        - label: Agility Robotics (peer comp)
          value: 1000
        - label: Boston Dynamics (M&A floor)
          value: 1100
        - label: Base case (2028, $80M ARR)
          value: 1350
        - label: Figure AI (highest-funded comp)
          value: 3200
        - label: Bull case (2030, $500M+ ARR)
          value: 5000
  - id: FV003
    title: Valuation / return range
    type: range
    layout: wide
    summary: >-
      Range chart showing bear, base, bull, and hypothetical Series C entry valuation outcomes for 1X Technologies in
      USD millions. Each bar spans the uncertainty range of the scenario with the central estimate as the point value.
      Illustrates the asymmetric return profile from a $3B+ Series C entry price: the base case ($1.2–1.5B) implies a
      significant write-down, while the bull case ($4–6.5B) offers only modest returns at current entry pricing.
    data:
      items:
        - label: Bear case (IP + team M&A)
          low: 200
          value: 300
          high: 500
        - label: Base case (2028 EVE-led)
          low: 900
          value: 1350
          high: 1700
        - label: Bull case (2030 NEO at scale)
          low: 3000
          value: 4500
          high: 6500
        - label: Series C entry (hypothetical)
          low: 2500
          value: 3500
          high: 5000
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: compact
    summary: >-
      IC-ready scoring dashboard for 1X Technologies across eight investment dimensions on a 1–10 scale. The composite
      6.5/10 overall score reflects genuine commercial proof and strong market opportunity offset by financial opacity,
      competitive vulnerability to Tesla Optimus, and limited valuation support from current revenue metrics. Scores are
      analyst judgments synthesised from evidence gathered across all report chapters.
    data:
      items:
        - label: Market opportunity (TAM + CAGR)
          value: 9
        - label: Commercial proof (EVE deployment scale)
          value: 8
        - label: Technical moat (differentiation depth)
          value: 7
        - label: Team quality (Børnich + Jang + org)
          value: 8
        - label: Financial transparency
          value: 3
        - label: Competitive position vs. Tesla Optimus
          value: 4
        - label: Valuation support (comparable benchmarks)
          value: 5
        - label: Overall composite
          value: 6.5
