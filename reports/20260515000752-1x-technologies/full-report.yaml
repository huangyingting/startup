      - number: '5.4'
        title: Development Roadmap and Production Readiness
        blocks:
          - type: paragraph
            body: >-
              1X's development roadmap follows a staged arc from enterprise-proven wheeled robot to home-ready bipedal
              humanoid, with each stage both validating technology and generating training data for the next. The August
              2024 NEO Beta launch proved the core bipedal embodied AI architecture at full scale. The February 2025 NEO
              Gamma announcement demonstrated a production-intent design incorporating the Kind Humanoid chassis
              acquisition. The October 2025 pre-order opening at $20,000/$499 per month confirmed commercial intent for
              2026 delivery. As of Q2 2026, NEO Gamma delivery timing and batch sizes have not been publicly confirmed
              beyond the 2026 target; no production rate data is disclosed.

              The 2026-2027 roadmap centers on three parallel tracks: (1) scaling NEO Gamma manufacturing to fulfill
              pre-orders, (2) increasing NEO's autonomous capability from its current ~70% teleop dependency toward
              meaningful autonomy for a defined subset of household tasks, and (3) developing a foundation model with
              π-style multi-task generalization to reduce the need for per-task training. The foundation model effort
              aligns 1X with the broader industry direction (Physical Intelligence's π0, Figure's Helix, etc.) toward
              general-purpose robot policies that can be fine-tuned rather than retrained from scratch per task.

              Production readiness for NEO Gamma carries meaningful execution risk. Hardware manufacturing at scale for
              custom actuators and 3D-knitted suits requires supply chain components that are not fully commodity. The
              Moss, Norway manufacturing facility handling EVE has not been publicly confirmed as capable of NEO Gamma
              production at consumer volumes. The Palo Alto 80,000 sq ft facility opened summer 2025 is primarily an
              engineering and AI training centre. Investors and pre-order customers should track manufacturing
              partnership announcements as a key leading indicator of on-time delivery.
