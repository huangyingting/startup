      - number: '1.5'
        title: Milestones, Acquisitions, and Evidence Gaps
        blocks:
          - type: paragraph
            body: >-
              1X's public chronology spans over a decade and includes a rebrand, four confirmed funding rounds, a
              corporate acquisition, and successive product generations. The company founded in 2014 as Halodi Robotics
              in Norway pivoted from academic/industrial to commercial robotics before partnering with OpenAI in 2022.
              The March 2023 rebrand to 1X Technologies and simultaneous $23.5 million Series A2 announcement marked the
              company's emergence in the global robotics funding conversation. The January 2024 Series B at $100 million
              from EQT Ventures established 1X as one of the better-funded European humanoid robotics companies.

              In January 2025, 1X acquired Kind Humanoid, a three-person Bay Area startup founded by Christoph Kohstall
              that had applied large language models to humanoid interaction and had worked with designer Yves Béhar's
              Fuseproject studio. That same month, an additional reported $100 million raise was executed. NEO Gamma
              launched in February 2025 and the Palo Alto HQ opened in summer 2025 with capacity for 400 employees.
              October 2025 brought pre-orders for the NEO Home Robot. As of September 2025, 1X was reportedly seeking to
              raise $1 billion in new capital.

              Key evidence gaps include: verified headcount (the Palo Alto HQ was designed for 400 people, but actual
              employee count is not disclosed); total capital raised across all historical rounds; confirmed valuation;
              revenue from EVE enterprise deployments; and the status of the reported $1 billion fundraising target.
              Additionally, the precise terms of the OpenAI partnership (commercial agreements vs. investment only)
              remain opaque, and the governance structure is not publicly documented. The company has not disclosed the
              precise number of NEO pre-orders as of the report date.
