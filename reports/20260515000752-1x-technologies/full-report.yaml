    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Operating Model
        blocks:
          - type: paragraph
            body: >-
              1X Technologies is a Norwegian-American robotics and artificial intelligence company headquartered in Palo
              Alto, California, with manufacturing operations in Hayward, California and Moss, Norway. The company's
              stated mission is "to create an abundance of labor through safe, intelligent humanoids that work alongside
              people." It operates as a vertically integrated hardware-AI startup: designing robots in-house, training
              embodied AI models using real-world teleoperation data, and selling or deploying robots directly to
              enterprise and (prospectively) consumer customers.

              The company was founded in 2014 by Norwegian roboticist Bernt Øivind Børnich under the name Halodi
              Robotics, with an initial focus on developing safe actuators and full-body control systems for industrial
              and healthcare robotics. By 2019 it had established a California presence. In 2022, Halodi entered a
              technology partnership with OpenAI to integrate AI models into its robots. In March 2023, the company
              officially rebranded as 1X Technologies and simultaneously announced a $23.5 million Series A2 led by the
              OpenAI Startup Fund.

              The business model is dual-track: commercial enterprise deployment of EVE (a wheeled humanoid) generating
              near-term revenue from security and logistics customers, while NEO (a bipedal humanoid designed for the
              home) is the long-term consumer platform. Pricing for NEO has been disclosed at $20,000 outright or $499
              per month as a subscription, with pre-orders opened in October 2025 for 2026 delivery. 1X's Palo Alto HQ
              opened in summer 2025 as an 80,000 square-foot facility designed to seat 400 employees, consolidating
              prior Sunnyvale and Moss teams. Manufacturing remains in Moss, Norway and Hayward, California.
