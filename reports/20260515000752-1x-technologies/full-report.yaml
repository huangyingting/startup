      - number: '7.4'
        title: People, Execution, and Financial Model Risks
        blocks:
          - type: paragraph
            body: >-
              Key-person dependency at 1X Technologies is extreme. CEO Bernt Børnich is the founding visionary and
              company architect; he has guided the company from Halodi Robotics through three pivots, three funding
              rounds, and two product generations. His departure would create a strategic leadership vacuum difficult to
              fill in the nascent humanoid robotics space. VP of AI Eric Jang is equally critical on the technical side:
              his embodied learning data engine is the company's core AI differentiation, and his specific expertise in
              combining VR teleoperation with reinforcement learning is rare. The departure of either person would
              likely delay the AI roadmap by 12-18 months minimum and potentially trigger investor concern.

              The competitive talent market amplifies this risk. Google DeepMind, Meta AI, Tesla, Boston Dynamics, and
              Figure AI are all actively recruiting AI robotics engineers from the same talent pool. Compensation
              packages at these companies are highly competitive, and the opportunity cost for mid-level engineers at 1X
              (vs. a large tech company with public equity compensation) is high. Attrition at the engineering layer —
              even absent key-person departure — could slow development velocity materially.

              Financially, 1X's primary kill risk is a failure to close the Series C at sufficient size and timeline to
              fund NEO manufacturing scale-up. Based on estimated burn rates of $10-15M/month (derived from
              comparable-stage robotics companies and 1X's headcount signals), post-January 2025 capital gives an
              estimated 7-20 months of runway — implying a financing need before or during early 2026. If NEO
              manufacturing requires significant CAPEX and the Series C is delayed or under-subscribed, 1X could face
              delivery delay, customer attrition, and management distraction simultaneously.
