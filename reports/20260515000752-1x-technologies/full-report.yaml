      - number: '8.2'
        title: Valuation Methodology, Financing Context, and Comparables
        blocks:
          - type: paragraph
            body: >-
              1X Technologies has not publicly disclosed any valuation figure at any confirmed funding round. The $23.5M
              Series A2 (March 2023), the $100M Series B (January 2024, EQT Ventures lead with Samsung NEXT and others),
              and additional approximately $100M (January 2025) total approximately $237M in confirmed capital — all
              raised at undisclosed post-money valuations. No secondary market marks, publicly filed preference stack
              disclosures, or analyst-confirmed valuation estimates specific to 1X have been released as of May 2026.

              The valuation methodology applied in this chapter uses three triangulation approaches. First, revenue
              multiple extrapolation: at estimated EVE RaaS revenue of $15–25M annualised and a sector-appropriate
              12–20x revenue multiple for high-growth pre-breakeven robotics companies, the implied valuation range is
              $180–$500M on current fundamentals alone. This is well below the implied Series C entry valuation,
              confirming that any $3–5B premium is future-state dependent on NEO commercialization. Second, comparable
              company analysis anchors the valuation in the context of peers: Figure AI at approximately $3.2B, Boston
              Dynamics at $1.1B M&A price, Agility Robotics at approximately $1B, Apptronik at approximately $300M, and
              Sanctuary AI at approximately $500M CAD. The comparable valuation table (TV004) enumerates all six
              reference companies with metrics and limitations; the valuation sensitivity figure (FV002) illustrates how
              bear, base, and bull case valuations span from $300M to $6B depending on NEO commercialization timing.
              Third, entry-price discipline: at a hypothetical $3–5B Series C post-money, generating a 3x return to LPs
              over a 5–7 year exit horizon requires reaching $9–15B in exit value — achievable only in the bull case.

              From a capital efficiency standpoint, 1X's approximately 390 commercial EVE deployments on $237M raised
              compares favourably to Figure AI's zero confirmed revenue-paying external deployments on $675M raised.
              This suggests 1X has translated capital into commercial proof more effectively than its most heavily
              funded peer, justifying a modest premium over pure revenue-multiple benchmarks. Bloomberg's April 2025
              analysis confirmed that valuation premiums over comparable-stage companies are justified only when
              commercial proof substantially exceeds sector averages — a test 1X passes narrowly on EVE alone. PitchBook
              data indicates humanoid robot valuation multiples in 2025 are driven primarily by deployment proof, total
              funded capital, and lead investor tier rather than by revenue multiples, providing further theoretical
              support for 1X's premium entry price relative to its current revenue base.
            claimRefs:
