      All financial magnitudes are estimates derived from public pricing disclosures, fleet size reports, and industry
      COGS benchmarks. 1X has not disclosed revenue, gross margin, or COGS. Node connections are qualitative. Gross
      profit estimate assumes COGS amortisation over a 24-month contract life.
    claimRefs:
      - CI005
      - CI008
      - CI009
      - CI010
      - CI011
      - CI017
  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: standard
    summary: >-
      Qualitative flow from monthly RaaS revenue per deployed EVE unit through estimated cost layers to gross margin per
      unit. All cost nodes are estimates; actual data is not publicly available.
    data:
      nodes:
        - label: Monthly RaaS Revenue per Robot
          detail: ~$3,500–5,000/month per deployed EVE; list price range per 1x.tech commercial page
        - label: Hardware COGS Amortisation per Month
          detail: Est. $625–1,040/month per robot assuming $15–25K hardware cost over 24-month contract life
        - label: Field Service and Maintenance Cost
          detail: Est. $500–1,500/month per robot; includes on-site support, parts, software updates
        - label: Software and AI Infrastructure Cost
          detail: Est. $200–500/month per robot; cloud compute, model inference, updates
        - label: Gross Margin per Robot (estimated)
          detail: >-
            Est. $1,460–2,860/month per robot (~40–57%) under optimistic COGS; could be negative under pessimistic COGS
            assumptions
    approximationNotes: >-
      All cost nodes are estimates derived from industry benchmarks for humanoid robotics hardware and service delivery.
      1X has not disclosed COGS, field-service costs, or gross margin. Estimates are illustrative only. Actual economics
      must be confirmed via data room COGS waterfall.
    claimRefs:
      - CI005
      - CI014
      - CI021
      - CI027
      - CI032
      - CI034
  - id: FI003
    title: Financial estimate range
    type: range
    layout: standard
    summary: >-
      Source-backed numeric ranges for key financial estimates: monthly RaaS revenue per robot, estimated monthly burn
      rate, estimated cash runway, estimated hardware COGS per EVE unit, and Series C funding target. Ranges reflect
      uncertainty due to absence of disclosed financial data.
    data:
      items:
        - label: Monthly RaaS Revenue per EVE Robot (USD/month)
          low: 3500
          high: 5000
          note: Per 1x.tech commercial pricing disclosure; realised rate may differ from list
        - label: Estimated Monthly Burn Rate (USD/month)
          low: 5000000
          high: 15000000
          note: Estimated from headcount, R&D intensity, and multi-site opex; not disclosed by 1X
        - label: Estimated Cash Runway from Jan 2025 Raise (months)
          low: 7
          high: 20
          note: $100M raise divided by $5–15M/month burn; highly sensitive to burn assumption
        - label: Estimated Hardware COGS per EVE Unit (USD/unit)
          low: 15000
          high: 25000
          note: Derived from peer hardware cost benchmarks; not officially disclosed by 1X
        - label: Series C Funding Target (USD)
          low: 500000000
          high: 1000000000
          note: Reported target ~$1B; lower bound reflects potential reduced closing if market conditions shift
    approximationNotes: >-
      All ranges are estimates derived from public pricing, media reports, and industry benchmarks. No financial data
      has been officially disclosed by 1X. Ranges should be updated when data room materials are received. Lower bounds
      represent optimistic scenarios; upper bounds reflect scenarios with limited public evidence for higher figures.
    claimRefs:
      - CI003
      - CI004
      - CI005
      - CI012
      - CI013
      - CI014
  - id: FI004
    title: Capital intensity / cash-flow map
    type: matrix
    layout: wide
    summary: >-
      Matrix assessing 1X Technologies' capital intensity and cash-flow exposure across four cost dimensions (R&D Capex,
      Manufacturing Scale-up, Sales and GTM, Working Capital) across three time horizons. Qualitative ratings reflect
      estimated relative intensity based on public evidence.
    data:
      columns:
        - R&D Capex
        - Manufacturing Scale-up
        - Sales and GTM
        - Working Capital
      rows:
        - label: Current (2025–26)
          values:
            - High
            - High
            - Medium
            - High
        - label: Scale Phase (2027–28)
          values:
            - High
            - Very High
            - High
            - Very High
        - label: Maturity Phase (2029+)
          values:
            - Medium
            - High
            - High
            - Medium
        - label: Relative Risk Level
          values:
            - Medium
            - Very High
            - Medium
            - High
        - label: Key Uncertainty
          values:
            - NEO gen-2 development capex
            - Contract manufacturer ramp; yield improvement
            - Enterprise CAC and sales cycle length
            - Inventory financing before deployment
    approximationNotes: >-
      Qualitative ratings (High/Very High/Medium) are estimates derived from public disclosures, industry benchmarks for
      robotics hardware startups, and peer company analysis. No financial data has been disclosed by 1X. Manufacturing
      scale-up is rated Very High risk due to the capital intensity of bipedal humanoid production at scale and absence
      of disclosed manufacturing partnerships or scale targets.
    claimRefs:
      - CI003
      - CI012
      - CI022
      - CI028
      - CI029
      - CI037
  - id: FE001
    title: Product architecture map
    type: stack
    layout: standard
    summary: >-
      Six-layer technical stack showing 1X's architecture from physical hardware through cloud infrastructure.
      Illustrates the vertically integrated design from proprietary actuators at the base to cloud GPU training at the
      apex, with the embodied AI data engine bridging hardware and intelligence layers.
    data:
      items:
        - label: Cloud GPU Training Infrastructure
          detail: Compute clusters for neural network training on teleop demonstration data
        - label: Embodied Learning Data Engine
          detail: VR teleop pipeline converting real-world demonstrations to training batches
        - label: End-to-End Neural Network (Control AI)
          detail: Joint-optimised model mapping sensor inputs directly to motor commands
        - label: Sensor Suite (Cameras, IMUs, Proprioception)
          detail: Third-party COTS sensors providing perception inputs to AI model
        - label: Proprietary Low-Impedance Actuators
          detail: Core hardware IP; compliant joint actuation across all DOFs
        - label: Robot Chassis (EVE Wheeled / NEO Bipedal)
          detail: Physical platform; EVE commercial-grade, NEO Gamma 3D-knitted consumer
  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: standard
    summary: >-
      Operational data flow showing how customer deployment generates embodied AI training data through the VR
      teleoperator pipeline, creating the flywheel that feeds model improvement back to deployed robots. Captures the
      commercial and AI training feedback loop simultaneously.
    data:
      nodes:
        - id: n1
          label: Customer Facility (ADT / Everon / Home)
          detail: Physical environment where EVE or NEO operates
        - id: n2
          label: Robot Sensor Capture (Cameras, IMUs)
          detail: Real-world sensory stream from deployed robot in environment
        - id: n3
          label: VR Teleoperator Control
          detail: Human operator guides robot via VR; overlaid on robot sensor stream
        - id: n4
          label: Demonstration Data Logging
          detail: State-action pairs recorded from teleop session for training
        - id: n5
          label: Embodied Learning Data Engine
          detail: Aggregates, filters, and batches demonstration data for model training
        - id: n6
          label: Neural Network Re-training / Fine-tuning
          detail: Improved model deployed back to robot fleet; closes the flywheel loop
  - id: FE003
    title: Critical dependency map
    type: dag
    layout: standard
    summary: >-
      Directed acyclic graph mapping 1X Technologies' critical external dependencies across capital, AI partnerships,
      hardware supply, and infrastructure. Shows concentration risk from OpenAI partnership and semiconductor supply
      chain bottlenecks.
    data:
      nodes:
        - id: d1
          label: 1X Technologies (Core)
        - id: d2
          label: OpenAI (AI Partnership / Investor)
        - id: d3
          label: EQT Ventures (Primary Capital)
        - id: d4
          label: NVIDIA / GPU Suppliers
        - id: d5
