  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Figure-AI-OpenAI-partnership-scope
      missingEvidence: >-
        The specific terms of Figure AI's OpenAI partnership—whether it includes exclusive model access,
        co-development of manipulation-specific models, or only general-purpose language model licensing—
        are not publicly disclosed, preventing comparison with 1X's OpenAI relationship.
      whyItMatters: >-
        If Figure AI has a deeper co-development agreement with OpenAI than 1X does, the competitive
        moat from 1X's OpenAI relationship is largely cosmetic, materially weakening the AI differentiation
        argument for 1X versus Figure AI.
      diligencePath: >-
        Request partnership term sheets from 1X management; compare with Figure AI's public announcements
        about OpenAI integration; consult OpenAI's published policy on multi-robot-company licensing.
      relatedQuestionRefs:
