sections:
  - id: section-landscape
    title: Competitive Landscape — Direct, Adjacent, and Emerging Competitors
    body: >-
      The humanoid robot competitive landscape divides into five categories. Direct competitors—companies building
      general-purpose bipedal or wheeled humanoid robots for commercial deployment—include Agility Robotics (Digit),
      Figure AI (Figure 02), Apptronik (Apollo), Sanctuary AI (Phoenix), and Unitree (H1/G1). Each is targeting
      enterprise or consumer humanoid adoption with different form factors, funding levels, and deployment strategies.

      Megacap entrants are the most existentially threatening tier: Tesla (Optimus) and Hyundai/Boston Dynamics
      (Atlas) bring hardware manufacturing infrastructure, brand, and capital that pure-play robotics startups
      cannot match. Elon Musk has publicly targeted 1,000 Tesla Optimus units in Tesla's own factories by end
      2025, with a stated long-term consumer price target of approximately $20,000—directly matching NEO's
      announced price point.

      Adjacent competitors include Physical Intelligence (pi), which takes a software-only approach building
      foundation models for robotic manipulation, and Chinese OEM manufacturers led by Unitree, which is shipping
      the H1 bipedal robot at $90,000 and the G1 at $16,000—the latter substantially undercutting Western
      competitor pricing. Unitree's extreme price aggressiveness poses a commoditization risk to all Western
      hardware-first humanoid robot companies including 1X.

      Status-quo substitutes remain the most significant competitive pressure: human labor (for security,
      logistics, household tasks), traditional industrial robots, and autonomous mobile robots (AMRs) without
      manipulation capability. Convincing buyers to switch from these substitutes to humanoid robots requires
      both sufficient autonomy and a compelling ROI, hurdles that no competitor has yet cleared at mass-market
      scale. The competitive moat question for 1X is whether its current commercial deployment lead with EVE
      creates durable proprietary training data advantages that offset its bipedal hardware disadvantage
      versus Figure, Tesla, and Agility.
