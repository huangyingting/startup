      - TP004

  - id: section-diligence-gaps
    title: Competitive Diligence Gaps and Open Questions
    body: >-
      Several competitive intelligence gaps limit confidence in the moat assessment. First, the actual contract
      economics for Agility's Digit Amazon deployment—volume, pricing, exclusivity terms, and renewal structure—
      are not publicly disclosed, making it impossible to assess whether Agility has achieved a sustainable unit
      economics model or is still subsidizing deployments for data and learning. Second, Tesla Optimus internal
      deployment metrics—tasks performed per unit per day, autonomy rate versus human override, and defect
      handling—are not disclosed, preventing objective assessment of how close Tesla is to commercial deployment
      readiness.

      Third, Figure AI's progress since its BMW announcement is not publicly documented in detail; media coverage
      suggests the BMW partnership is operational but production metrics are not available. Fourth, the Unitree G1
      competitive risk is difficult to quantify without understanding the autonomy level achievable at $16K without
      significant AI software integration, and whether Western safety and regulatory requirements create a natural
      moat for domestic operators.

      Fifth, 1X has not disclosed the specific dollar amount or volume commitments from its ADT and Everon
      contracts, making it impossible to calculate contracted ARR from the EVE fleet. This matters because
      the competitive moat analysis depends on whether 1X is capturing economic value from its deployment
      lead or merely accumulating data at subsidized prices.
    claimRefs:
      - CP033
      - CP034
      - CP035

