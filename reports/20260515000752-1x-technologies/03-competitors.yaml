chapter:
  number: 3
  title: Competitive Landscape
  summary: >-
    The humanoid robot competitive landscape is intensely contested across three tiers: well-funded US bipedal
    startups (Figure AI, Apptronik, Sanctuary AI), industrial-grade deployments (Agility Robotics Digit at Amazon),
    and megacap contenders (Tesla Optimus, Boston Dynamics Atlas). 1X Technologies' key differentiator is its
    only commercially deployed humanoid fleet at significant scale (~390 EVE units), while its NEO bipedal robot
    enters a crowded 2026 market with competitors already shipping or close to shipping. The primary kill scenario
    is Tesla Optimus achieving mass production scale and driving down unit prices below 1X's cost structure.

