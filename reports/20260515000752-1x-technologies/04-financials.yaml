callouts:
  - calloutType: strength
    title: Commercial Fleet Leadership Among Pure-Play Humanoid Startups
    body: >-
      A confirmed fleet of ~390+ commercial EVE deployments across ADT and Everon is a differentiated
      proof point relative to the peer set. No other pure-play humanoid startup has disclosed a comparable
      confirmed commercial fleet as of 2026. This fleet size also creates a data advantage: real-world
      deployment at scale generates proprietary autonomy training data that competitors cannot replicate
      without equivalent deployments.
    claimRefs:
      - CI008
      - CI009
      - CI010

  - calloutType: risk
    title: Revenue Concentration and Financial Opacity
    body: >-
      Two enterprise accounts (ADT, Everon) account for substantially all known deployments. Loss of either
      account would materially impair the company's revenue base. Furthermore, the complete absence of any
      disclosed revenue, gross margin, burn rate, or financial data for a company with $237M+ raised and
      hundreds of commercial deployments creates an unusually high due diligence burden.
    claimRefs:
      - CI008
      - CI010
      - CI017

  - calloutType: risk
    title: Series C Financing Cliff Risk
    body: >-
      The estimated 7–20 month runway from the January 2025 raise, combined with an unconfirmed $1 billion
      Series C target, creates binary financing risk. If burn is at the high end ($12–15M/month) and the
      Series C has not closed, 1X faces a financing cliff in late 2026. The $1 billion target is ambitious
      relative to recent peer raises by Agility ($150M) and Figure ($675M at $2.6B valuation) and may
      require a step-change in revenue traction to justify the implied valuation.
    claimRefs:
      - CI004
      - CI012
      - CI013
      - CI024

  - calloutType: insight
    title: RaaS Model Quality vs. Capital Intensity Trade-off
    body: >-
      The RaaS model provides superior revenue quality (monthly recurring, predictable, low churn risk on
      multi-year contracts) compared to outright hardware sales, but requires 1X to carry the capital cost
      of manufacturing robots before revenue accrues. At 390+ units deployed and $15–25K estimated COGS per
      unit, the pre-deployment capital tied up in robot inventory exceeds $6–10M. This capital intensity
      increases proportionally with fleet expansion rate, creating a financing dependency loop at scale.
    claimRefs:
      - CI005
      - CI010
      - CI014
      - CI029
      - CI032

  - calloutType: recommendation
    title: Data Room Requirements Before Investment Decision
    body: >-
      Issue a formal data room request covering: (1) audited or unaudited income statement 2023–2025,
      (2) monthly cash flow statements 2024–2026, (3) COGS waterfall by product and manufacturing batch,
      (4) ARR and MRR cohort analysis by customer with retention rates, (5) confirmed Series C investor
      commitments and close status, and (6) any debt, project finance, or contingent liabilities. No
      investment decision can be made on the basis of public information alone.
    claimRefs:
      - CI003
      - CI011
      - CI023

