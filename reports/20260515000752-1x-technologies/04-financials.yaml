  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue-arr
      missingEvidence: >-
        1X Technologies has not disclosed any revenue figure, ARR, or MRR. Monthly or quarterly revenue
        data, ARR build, and cohort MRR for ADT and Everon accounts are required and not publicly available.
      whyItMatters: >-
        Investment thesis cannot be validated without confirmed revenue data. Revenue quality, growth
        trajectory, and cohort retention are all unassessable from public information alone.
      diligencePath: >-
        Request historical monthly revenue and ARR/MRR data for 2023–2026 from formal data room; require
        cohort-level breakdown by customer account.
      relatedQuestionRefs:
        - QI025

    - type: private-evidence-only
      severity: blocking
      topic: gross-margin-cogs
      missingEvidence: >-
        No COGS, gross margin, or unit economics data has been publicly disclosed by 1X. A per-unit COGS
        waterfall (BOM, manufacturing, field service, software amortisation, warranty reserve) is required.
      whyItMatters: >-
        Without confirmed COGS and gross margin data, the RaaS model's viability cannot be confirmed. Unit
        economics may be deeply negative at current scale, which would change the investment risk profile.
      diligencePath: >-
        Require audited or management-reviewed P&L; COGS waterfall by product generation and batch size;
        field-service cost per robot per month; warranty reserve methodology.
      relatedQuestionRefs:
        - QI026

    - type: private-evidence-only
      severity: material
      topic: breakeven-path
      missingEvidence: >-
        Without confirmed revenue, COGS, and burn rate data, the path to operating cash-flow breakeven
        cannot be modelled. Management has not disclosed a breakeven milestone or timeline publicly.
      whyItMatters: >-
        Capital allocation decisions require understanding the breakeven trajectory. Without it, the
        financing dependency and dilution risk of future rounds cannot be assessed.
      diligencePath: >-
        Request management financial model including revenue build, COGS trajectory, gross margin
        milestones, and operating breakeven assumptions by scenario.
      relatedQuestionRefs:
        - QI027

    - type: missing-source
      severity: material
      topic: independent-verification
      missingEvidence: >-
        No independent audit, third-party financial review, or verified unit economics disclosure exists
        publicly for 1X Technologies. Investor materials containing unit economics claims have not been
        independently verified from public sources.
      whyItMatters: >-
        Without independent verification, any financial data provided in a data room must be treated as
        management representation only. The absence of a prior audit increases due diligence risk.
      diligencePath: >-
        Request most recent audited financial statements (or management accounts if unaudited); commission
        independent financial due diligence before proceeding to investment decision.
      relatedQuestionRefs:
        - QI028
