sections:
  - id: section-revenue-model
    title: "Revenue Streams and Pricing Model"
    body: >-
      1X Technologies generates revenue primarily through two commercialised products: EVE, a bipedal commercial
      robot deployed on a robotics-as-a-service (RaaS) monthly subscription, and NEO, a home humanoid offered
      as an outright hardware purchase with a potential ancillary subscription layer. EVE is the current revenue
      engine. Publicly disclosed RaaS pricing for EVE sits in the range of approximately $3,500 to $5,000 per
      robot per month, making it the most concretely priced commercial humanoid offering among pure-play startups
      as of 2026. Two anchor enterprise deployments — ADT (140 units) and Everon (~250 units) — provide the
      company's core recurring revenue base, representing a total deployed fleet of roughly 390-plus units. At
      $3,500 per unit per month across 390 units, gross run-rate monthly recurring revenue would approximate
      $1.37 million, implying an annualised run rate in the range of $15–25 million depending on actual contract
      pricing, utilisation, and discounting. No official revenue figure has been disclosed. NEO was announced in
      2024 at a retail price of approximately $20,000. A subscription layer for NEO (reportedly ~$499/month) has
      been speculated but not formally confirmed by 1X. Revenue recognition for RaaS models is typically
      recognised monthly over the contract term, offering better revenue quality than hardware point-of-sale
      models. Professional services and onboarding represent a secondary, undisclosed revenue stream. The company
      has not disclosed revenue breakdown by segment, gross margin, or recognised versus deferred revenue.
    claimRefs:
      - CI005
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
      - CI017
      - CI031
      - CI032
    tableRefs:
