      - TI003
    figureRefs:
      - FI002

  - id: section-traction
    title: "Public Traction and Commercial Milestones"
    body: >-
      1X's most concrete public financial traction signal is its deployed fleet size. The ADT deployment of
      140 EVE units represents the largest confirmed commercial bipedal humanoid contract in North America as
      of 2026. The Everon deployment adds approximately 250 units, bringing the total confirmed commercial
      fleet to roughly 390-plus units. This makes 1X the leader in confirmed commercial humanoid deployments
      among pure-play startups, ahead of Agility Robotics (100-plus Digit units at Amazon/GXO) and well
      ahead of Figure AI and Apptronik, which have disclosed only pilot-scale deployments. No revenue or ARR
      figure has been disclosed. No MRR cohort analysis or revenue growth trajectory has been provided. The
      company has not confirmed whether NEO has transitioned from pre-order to volume commercial shipment as
      of 2026. Public signals suggest active commercial traction — enterprise contract wins, international
      expansion from Norway to the United States, and strategic investor participation from OpenAI and NEA
      — but none of these signals translates into a disclosed financial outcome. Private-metric gaps include:
      ARR/MRR by customer cohort, customer retention rate, renewal rate, average contract value, utilisation
      rate per deployed robot, and gross retention versus net revenue retention. These metrics are essential
      for assessing revenue quality and scalability and must be obtained via a data room.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI015
      - CI017
      - CI024
      - CI025
    tableRefs:
      - TI005
    figureRefs:
      - FI003

  - id: section-capital
    title: "Capital Adequacy and Financing Dependency"
    body: >-
      1X Technologies has raised approximately $237 million in confirmed capital: a Series A2 of $23.5 million
      (Halodi era), a Series B of $100 million (led by EQT with participation from OpenAI and NEA), and a
      January 2025 round of $100 million from undisclosed investors. The company is reported to be targeting
      a Series C of approximately $1 billion, though no close date has been disclosed. Burn rate is not
      publicly disclosed. Based on 1X's estimated headcount of 150–200 full-time employees, its R&D intensity,
      manufacturing expenditure, and multi-site operations in Norway and the United States, monthly cash
      consumption is estimated at $5–15 million per month. Under this range and assuming the January 2025
      raise of $100 million provided most of the current treasury, the company's estimated runway as of Q2
      2026 is approximately 7–20 months. This runway is highly sensitive to the burn assumption: at $5 million
      per month, runway extends into 2027; at $15 million per month, the company may need a Series C close by
      late 2026. No debt, project finance, or credit facility has been disclosed. The capital adequacy picture
      is materially uncertain without access to actual burn rate, cash balance, and Series C status.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI012
      - CI013
      - CI018
      - CI020
    tableRefs:
      - TI004
    figureRefs:
      - FI004

  - id: section-financial-verdict
    title: "Financial Verdict and Diligence Blockers"
    body: >-
      1X Technologies presents a compelling commercial traction story — the largest confirmed humanoid robot
      fleet among pure-play startups, enterprise-grade clients, and a credible RaaS pricing model — but the
      financial diligence case is severely constrained by the absence of any disclosed financial data. Revenue
      quality cannot be assessed without ARR, MRR cohort data, retention rates, and gross margin by product
      and deployment cohort. The unit economics case rests on estimated COGS that could render the current
      RaaS model gross-margin negative at present scale. Capital adequacy is uncertain: the company is
      reportedly seeking a $1 billion Series C, but the close timeline and investor composition have not been
      confirmed, creating a binary financing risk. The margin path to profitability requires COGS reduction
      through manufacturing scale and design optimisation, reduction of field-service costs through improved
      autonomy, and gross margin expansion to cover R&D and G&A overhead. None of these milestones has a
      publicly disclosed timeline or metric. Diligence blockers that must be resolved before any capital
      allocation decision include: confirmed monthly burn and cash balance, audited or management-reviewed
      revenue and gross margin data, ARR and MRR cohort analysis by customer, COGS waterfall per product,
      Series C financing status, and any debt or contingent liabilities. In summary, 1X is commercially
      differentiated but financially opaque. The investment thesis depends entirely on private financial
      evidence that must be obtained via a formal data room process.
    claimRefs:
      - CI003
      - CI004
      - CI011
      - CI017
      - CI023
      - CI036

