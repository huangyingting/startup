chapter:
  number: 4
  title: Financial Analysis
  summary: >-
    1X Technologies has raised approximately $237 million in confirmed capital (Series A2 $23.5M, Series B $100M,
    January 2025 $100M) and operates a robotics-as-a-service (RaaS) model for EVE at ~$3,500–5,000 per robot per
    month, with ~390 confirmed commercial deployments. However, no revenue, gross margin, burn rate, or COGS data
    has been publicly disclosed. The company reportedly targets a $1 billion Series C; estimated runway of 7–20
    months (post-January 2025) creates a financing dependency that is the primary near-term risk. Unit economics
    cannot be confirmed without a formal data room.

