chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The global humanoid robot market is projected to reach $38 billion by 2035 (Goldman Sachs), underpinned by a
    structural global labor shortage and accelerating AI hardware cost reductions. 1X Technologies competes across two
    distinct market segments—enterprise security/logistics (EVE, near-term revenue) and consumer home robotics (NEO,
    long-term TAM)—each with distinct buyer profiles, adoption triggers, and competitive dynamics. Analyst estimates
    for the total addressable market vary widely ($35B–$75B by 2033–2035 across major research firms), and multiple
    adoption constraints—unit cost, limited autonomy, absent regulatory frameworks, and consumer trust—remain material
    gating factors for near-term market scale.

