  - id: section-market-sizing
    title: Market Sizing — TAM, SAM, SOM, and Analyst Estimates
    body: >-
      Market sizing for humanoid robots is inherently uncertain given the nascent commercialization stage;
      nonetheless, multiple independent research firms have produced converging estimates in the $35B–$75B range
      for total addressable market by 2033–2035. Goldman Sachs (2023, updated 2024) projects the global humanoid
      robot market at $38 billion by 2035, with a serviceable addressable market (SAM) of approximately $6 billion
      by 2030 focused on manufacturing, warehousing, and enterprise security in Western markets. This SAM estimate
      is grounded in specific near-term deployment scenarios—assembly line support, materials handling, building
      security—rather than a general multiplier of the TAM.

      ARK Invest takes a more expansive view, estimating a $24 trillion+ addressable opportunity by 2030 when
      humanoid robots are considered as a substitute for global human labor across sectors. This figure reflects
      ARK's standard top-down methodology and is based on the concept that automation could capture a significant
      fraction of global labor compensation. While this figure is directionally useful, it is not a near-term
      addressable market and should be interpreted as a ceiling scenario. More conservative estimates from IDC
      for the global service robot market (encompassing humanoids and non-humanoid service robots) project $50
      billion by 2030 on a CAGR of approximately 20%.

      Mordor Intelligence, MarketsandMarkets, and Grand View Research independently project the humanoid robot
      market at $35–$75 billion by 2033–2035, spanning conservative to optimistic scenarios with CAGR estimates
      of 40–55%. The wide range reflects methodological differences in market boundary (humanoid-only vs. broader
      service robot), geographic scope, and adoption velocity assumptions. Statista and ABI Research provide
      supporting data on service robot revenue trajectories.

      For 1X Technologies specifically, the SOM is not publicly projected. Based on current EVE deployment
      (~390 units at ADT and Everon) and NEO pre-order pricing ($20,000 or $499/month), an order-of-magnitude
      estimate for 2026–2028 revenue is $10M–$50M, growing rapidly with NEO scale—but this remains a rough
      inference from public data, not a disclosed company figure.
    claimRefs:
      - CM001
      - CM004
      - CM007
