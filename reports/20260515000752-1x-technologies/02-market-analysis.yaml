  evidenceGaps:
    - type: missing-source
      severity: material
      topic: enterprise-security-robot-market-size
      missingEvidence: >-
        A formal analyst report sizing the enterprise security robot market as a specific sub-segment of
        humanoid robots—separated from non-humanoid patrol robots—with bottom-up methodology and named
        buyers, deal sizes, and contract structures.
      whyItMatters: >-
        Without a rigorous enterprise security sub-segment estimate, the near-term SAM for 1X EVE is
        extrapolated from the broader humanoid TAM rather than grounded in the specific security buyer
        market, reducing confidence in short-term revenue projections.
      diligencePath: >-
        Commission a primary research survey of enterprise security buyers; review ADT and Everon contract
        structures; cross-check with physical security industry association data (ASIS International).
      relatedQuestionRefs:
        - QM025

    - type: missing-source
      severity: material
      topic: regulatory-humanoid-robot-standards
      missingEvidence: >-
        Published regulatory guidance, safety standards, or legislative dockets from US OSHA, EU machinery
        directive committees, or ISO/IEC technical committees specifically addressing humanoid robots in
        commercial environments.
      whyItMatters: >-
        Absent regulatory standards create material deployment risk in healthcare, aviation, and food
        handling—sectors that represent significant SAM expansion beyond current security use cases. Buyers
        in regulated industries may delay procurement indefinitely without a clear compliance path.
      diligencePath: >-
        Review ISO TC 299 (Robotics) published standards and active working groups; OSHA rulemaking dockets;
        EU Machinery Regulation 2023/1230 applicability to humanoid robots; monitor CE marking requirements.
      relatedQuestionRefs:
        - QM026

    - type: conflicting-data
      severity: minor
      topic: humanoid-robot-market-sizing
      missingEvidence: >-
        A published critical analysis or bear-case market estimate that explicitly models lower adoption
        scenarios—citing specific technology milestones that might not be met or demand signals that may
        be softer than consensus projects.
      whyItMatters: >-
        All major analyst estimates for the humanoid robot market are published by firms with commercial
        interest in bullish projections; an independent bear-case analysis would provide balance and
        flag specific risk factors that could result in market development significantly below consensus.
      diligencePath: >-
        Review academic publications in robotics and automation economics; seek analyst commentary from
        firms with a track record of skeptical technology forecasts (Gartner Hype Cycle, neutral academia).
      relatedQuestionRefs:
        - QM027

    - type: stale
      severity: minor
      topic: global-humanoid-robot-deployment-count
      missingEvidence: >-
        A current (2026) verified count of total humanoid robot commercial deployments globally across all
        operators, broken out by company and use case, enabling proper market penetration measurement.
      whyItMatters: >-
        Without a verified baseline deployment count, market penetration rates and growth velocity cannot
        be calculated with precision; current estimates range from a few hundred to several thousand units
        globally, a 10x uncertainty band that makes adoption curve modeling unreliable.
      diligencePath: >-
        Compile from company press releases, trade show announcements, customer disclosures, and The Robot
        Report tracking database; cross-check with IFR service robot shipment data for the next annual
        release (expected Q4 2026).
      relatedQuestionRefs:
        - QM028
