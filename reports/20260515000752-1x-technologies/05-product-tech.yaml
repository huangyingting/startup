      severity: material
      topic: product-technology
      missingEvidence: "Total volume of training demonstrations processed by the embodied learning data engine — including hours of VR teleop data — is not publicly disclosed."
      whyItMatters: "Training data volume is a key indicator of model maturity and the defensibility of the data flywheel moat versus well-funded competitors who can accelerate data collection."
