  - id: section-tech-stack
    title: "Core Technology Stack and Architecture"
    body: >-
      1X's technology architecture is built around an end-to-end neural network that controls all robot
      behavior without hardcoded task logic or modular behavior trees. This distinguishes 1X from traditional
      robotics companies that decompose control into separate perception, planning, and execution modules.
      The entire action stack — from sensor inputs to motor commands — is jointly optimised through a single
      learned model, enabling the robot to generalise across sensory conditions and task variations that
      would require extensive hand-engineering in modular systems.

      The embodied learning data engine, a concept developed by 1X's VP of AI Eric Jang, is the data
      generation backbone. Human teleoperators work via VR headsets to control EVE units deployed in real
      commercial environments, generating high-fidelity demonstrations of tasks in physical contexts.
      These demonstrations are used to train successive iterations of the neural network through a combination
      of imitation learning (behaviour cloning) and reinforcement learning. The flywheel effect is significant:
      every EVE commercial deployment simultaneously generates real-world training data that improves NEO's
      AI model. By mid-2025, EVE deployments at ADT and Everon were actively contributing to the training
      pipeline for NEO Gamma's policies.

      The training pipeline leverages motion capture reference data to initialise reinforcement learning
      policies for locomotion — a technique drawn from academic research in physics-based character animation
      and humanoid control. ArXiv publications by 1X researchers (e.g., 2309.01694 on whole-body control,
      2405.01813 on dexterous manipulation) confirm that the company's approach is grounded in peer-reviewed
      methods. The software stack is developed in-house; no public references to industry-standard robot
      operating frameworks such as ROS have been identified, which is consistent with 1X's position that
      its neural network approach makes traditional perception-planning-execution stacks architecturally
      unnecessary. The GitHub repository at github.com/1x-technologies shows active engineering activity
      with regular commits and contributors, providing a lightweight developer-signal verification of
      development cadence.
