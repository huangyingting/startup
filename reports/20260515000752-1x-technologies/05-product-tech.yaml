      missingEvidence: "Hardware reliability data for EVE fleet — MTBF, downtime incidents, field repair rates — is not publicly disclosed by 1X Technologies."
      whyItMatters: "Without MTBF data, enterprise buyers cannot assess TCO, and investors cannot evaluate execution risk for scaling from 390 to thousands of units."
