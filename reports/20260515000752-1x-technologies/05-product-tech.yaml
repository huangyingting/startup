company:
  name: 1X Technologies
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    1X Technologies operates a dual-product portfolio: EVE, a commercially deployed wheeled humanoid for enterprise
    security and logistics, and NEO Gamma, a bipedal home robot in pre-order with 2026 delivery targeted. The company's
    core technology moat rests on proprietary low-impedance electric actuators (patented from the Halodi era), an
    end-to-end neural network control architecture trained via a real-world VR teleoperator data engine, and the
    January 2025 acquisition of Kind Humanoid which contributed ergonomic chassis design. Autonomy remains
    approximately 70% teleop-assisted for complex tasks, with key gaps in publicly disclosed hardware reliability,
    training data volume, and independent safety certification.

