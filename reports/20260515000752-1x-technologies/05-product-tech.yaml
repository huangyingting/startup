      severity: minor
      topic: product-technology
      missingEvidence: "No public update on 1X NEO's autonomy benchmark since February 2025 (~70% teleop figure). Current 2026 autonomy level is not independently confirmed."
      whyItMatters: "Autonomy progress is the primary indicator of AI model improvement and the viability of the consumer value proposition."
      diligencePath: "Request internal autonomy evaluation protocols, test task list, and current benchmark results from 1X; cross-reference with teleoperator headcount trends."
