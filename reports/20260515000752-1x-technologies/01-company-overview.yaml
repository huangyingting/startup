  - id: section-products
    title: Products, Customers, and Go-to-Market Evidence
    body: >-
      1X has two primary products at different stages of commercial maturity. EVE is a wheeled humanoid designed for
      industrial and institutional environments. It features 23 degrees of freedom, force and impedance control on all
      joints, the ability to handle an 8 kilogram payload per arm, and a natural language interface enabling operators
      to chain tasks via voice commands. EVE has been commercially deployed at scale with at least two named enterprise
      customers: ADT, which reportedly placed the world's largest humanoid robot order at the time with 140 EVE units,
      and Everon (formerly ADT Commercial), which deployed approximately 250 EVEs for night guarding in commercial
      buildings. Sunnass Hospital in Norway is cited as a healthcare deployment, and Norwegian universities have
      received EVE units.

      NEO is a bipedal humanoid designed for household use. It evolved through a prototype phase: NEO Beta was
      unveiled on August 30, 2024 as a prototype for home deployment, with a limited number placed in selected homes
      for research. NEO Gamma, announced February 21, 2025, introduced a 3D-knitted nylon suit to reduce injury risk,
      "Emotive Ear Rings" for communication feedback, 100Hz dynamic balance control, reinforcement learning from human
      motion capture, and visual manipulation models able to pick up a wide variety of objects. On October 28, 2025,
      1X opened pre-orders for NEO at $20,000 outright or $499 per month by subscription, with a $200 deposit, and
      shipping expected in 2026.

      A critical operational caveat for NEO's current deployment model is that most tasks in early-access homes will
      be performed by remote human teleoperators using VR headsets rather than fully autonomous AI. CEO Børnich
      acknowledged this directly, stating that buyers must agree their home data will be accessible to a teleoperator
      during scheduled sessions. The company frames this as a necessary data collection strategy to train autonomous
      models rather than as a product limitation, but external analysts and journalists have characterized it as a
      significant gap between the marketed product vision and near-term reality.
