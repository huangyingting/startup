companyProfile:
  summary: Cerebras Systems was founded in 2016 by Andrew Feldman (CEO) and a team of former semiconductor engineers in Sunnyvale,
    California. The company spent three years in stealth building the Wafer-Scale Engine (WSE), launching the WSE-1 and CS-1
    system in 2019. The WSE-3, its third-generation chip manufactured by TSMC on 5nm, is the largest chip in commercial production
    at 46,225 mm² with 4 trillion transistors, 900,000 AI cores, and 21 PB/s on-chip memory bandwidth. Cerebras serves national
    laboratories (LLNL, ANL), sovereign AI programmes (G42/UAE), and pharmaceutical customers (GSK), with G42 representing
    86% of H1 2024 revenue of $136M. The company filed an S-1/A for IPO in October 2024 but withdrew due to CFIUS uncertainty
    arising from G42's UAE government ties.
  foundedDate: '2016-01-01'
  founders:
  - name: Andrew Feldman
    role: CEO & Co-Founder
    background: Former CEO of SeaMicro (acquired by AMD in 2012); veteran server/semiconductor entrepreneur
  foundingLocation: Sunnyvale, CA, USA
  headquarters: Sunnyvale, CA, USA
  productSummary: CS-3 on-premises AI system (WSE-3 + MemoryX 850TB + SwarmX fabric); Cerebras Inference API (cloud, OpenAI-compatible,
    2,100+ t/s on LLaMA-70B); PyTorch-compatible SDK and open-source Model Zoo (30+ architectures); AWS disaggregated inference
    partnership (2026).
  customerFocus: National laboratories (LLNL, ANL, Sandia), sovereign AI programmes (G42/UAE), pharmaceutical companies (GSK),
    and AI startups/researchers accessing the cloud inference API.
  businessModel: Hardware system sales and leases (CS-3 on-prem, multi-year contracts); cloud inference API (per-token pricing,
    undisclosed); professional services bundled with on-prem contracts.
  stage: Series D (Nov 2023), late-stage private; IPO withdrawn Oct 2024
  fundingStatus: ~$720M raised; most recent round was $177M Series D (Nov 2023) led by Altimeter, Citadel Securities at $4.0B
    valuation.
