  researchQuestions:
    - id: QR001
      question: >-
        What regulatory frameworks and export control rules directly apply to Cerebras Systems chip
        sales operations, including which BIS rules govern WSE-3 exports to UAE, as of 2026?
      type: enumeration
      targets:
        - contentRequirements/0
        - contentRequirements/1
        - plannedFigures/risk-heatmap
      status: answered
    - id: QR002
      question: >-
        What is the specific severity and likelihood of a BIS/EAR rule change restricting UAE chip
        sales, quantified relative to current revenue exposure of approximately 86% from UAE entities?
      type: quantification
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
      status: answered
    - id: QR003
      question: >-
        What CFIUS or national security review history exists for Cerebras investors and strategic
        partners, specifically the Saudi Aramco episode and G42 counterparty screening history?
      type: verification
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
      status: answered
    - id: QR004
      question: >-
        Does Cerebras face any material identified IP litigation or trade secret risk from
        semiconductor patent holders such as NVIDIA or AMD as of the May 2026 IPO date?
      type: adverse
      targets:
        - contentRequirements/1
        - plannedTables/regulatory-legal-risk-register
      status: answered
    - id: QR005
      question: >-
        What are the primary operational failure modes in Cerebras TSMC manufacturing supply chain,
        and what are their estimated impact severity and likelihood as of 2026?
      type: enumeration
      targets:
        - contentRequirements/2
        - plannedTables/operational-quality-security-risk-register
      status: answered
    - id: QR006
      question: >-
        What is the probability-weighted impact severity of a TSMC sole-source disruption scenario
        and how does it compare to peer AI hardware companies supply chain risk profiles?
      type: quantification
      targets:
        - contentRequirements/2
        - plannedTables/operational-quality-security-risk-register
      status: answered
    - id: QR007
      question: >-
        How does Cerebras defect-tolerant routing technology mechanically mitigate wafer yield
