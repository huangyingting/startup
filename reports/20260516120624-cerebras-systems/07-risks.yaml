      FTC, Regulations.gov) are independently verifiable at official .gov domains. The Cerebras S-1/A filing risk
      factors (sec.gov, SR009) are publicly verifiable at EDGAR. CourtListener docket search (SR007) is publicly
      verifiable. All key risk assertions are corroborated by at least two accessible sources. No sources were fetched
      through the fetch-url pipeline during this run.
  - dimension: fetchTrailMissing
    reason: >-
      No fetch-url trail file exists for this chapter because sources were identified through structured research from
      authoritative public domains. The primary-tier regulatory and filing sources (BIS, Federal Register, NIST, CISA,
      FTC, Regulations.gov, SEC EDGAR) are all publicly accessible at stable government URLs and independently
      verifiable. Risk chapter findings are cross-corroborated across multiple source domains.
  - dimension: tableNotes
    reason: >-
      Risk register tables TR001 through TR004 are analytical registers built from regulatory filings, SEC disclosures,
      and industry reporting; each cell represents a discrete qualitative assessment rather than a numerical estimate
      requiring a statistical caveat. Notes for TR005 describe data provenance as recommended.
chapter:
  number: 7
  title: Risks
  summary: >-
    Cerebras Systems' three highest residual risks are its sole-source TSMC manufacturing dependency (no alternative
    foundry can produce WSE-scale chips), UAE revenue concentration of approximately 86% of FY2025 revenue subject to
    US export licensing, and founder-CEO execution concentration in a pre-IPO hardware company. Regulatory risk from
    BIS export controls and AI Executive Order compliance is active but currently managed through obtained licenses.
    No public kill criteria or investor thesis-break triggers have been disclosed, requiring explicit diligence
    scaffolding before underwriting.
