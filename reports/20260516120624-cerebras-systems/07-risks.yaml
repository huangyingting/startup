  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: burn rate and cash runway not publicly disclosed
      missingEvidence: >-
        Cerebras has not disclosed gross burn rate, net burn, or specific cash runway figures in any public filing or
        press communication as of May 2026; only partial financial data is available through the S-1/A IPO disclosure.
      whyItMatters: >-
        Without burn rate data, investors cannot assess how long Cerebras can operate without additional financing or
        whether its capital structure is adequate to fund CS-4 development through to commercial shipment.
      diligencePath: >-
        Request management disclosure of trailing 12-month gross burn, net burn, cash position, and committed capex
        schedule. Review CFO cash-flow model and audit workpapers for cash runway under base and stress cases.
      relatedQuestionRefs: [QR013]
    - type: private-evidence-only
      severity: material
      topic: kill criteria and thesis-break triggers not publicly defined
      missingEvidence: >-
        Cerebras has not publicly defined any monitorable kill criteria, investment thesis-break triggers, or explicit
        escalation thresholds for investors as of May 2026.
      whyItMatters: >-
        Without publicly stated kill criteria, investors cannot establish systematic monitoring indicators or exit
        triggers; the investment thesis rests on management judgment rather than verifiable threshold metrics.
      diligencePath: >-
        Develop proprietary kill criteria from this chapter's analysis; propose monitoring KPIs to management during
        due diligence for validation and to gauge management's own risk awareness.
      relatedQuestionRefs: [QR014]
    - type: private-evidence-only
      severity: material
      topic: burn rate estimate — insufficient public financial data for precision
      missingEvidence: >-
        Cerebras' S-1/A does not separately disclose R&D capex, NRE amortization, or gross cash burn by quarter;
        only the incomplete financial summary available through the IPO disclosure process is publicly accessible.
      whyItMatters: >-
        Hardware chip companies have NRE-driven cash burn that diverges significantly from GAAP operating loss; without
        actual burn schedules, the capital requirement to sustain the technology roadmap cannot be precisely assessed.
      diligencePath: >-
        Request CFO-prepared cash flow model showing NRE spending, tape-out schedule, working capital requirements,
        and projected cash runway under base and downside cases including TSMC disruption scenario.
      relatedQuestionRefs: [QR018]
    - type: private-evidence-only
      severity: minor
      topic: NRE and tape-out cost per generation — industry estimates only
      missingEvidence: >-
        Cerebras has not disclosed actual NRE costs for WSE-2, WSE-3, or projected CS-4 tape-out costs; the $100M+
        estimate is an industry approximation based on comparable advanced-node tape-out comparable programs.
      whyItMatters: >-
        NRE per generation is a key input for financial modeling; if actual costs significantly exceed estimates, the
        capital requirement for sustaining the technology roadmap would be materially higher than currently assumed.
      diligencePath: >-
        Request actual NRE and tape-out spending for WSE-2 and WSE-3 from management; obtain CS-4 tape-out budget and
        milestone schedule from CFO; verify against auditor workpapers.
      relatedQuestionRefs: [QR021]
    - type: missing-source
      severity: minor
      topic: Cerebras IP litigation risk — no confirmed litigation to assess defensibility
      missingEvidence: >-
        No publicly confirmed IP lawsuit has been filed against Cerebras as of May 2026; the risk can only be assessed
        inferentially. No freedom-to-operate (FTO) analysis or chip design IP review is publicly available.
      whyItMatters: >-
        Wafer-scale chip designs are novel and potentially patentable; Nvidia, Intel, and others hold broad
        semiconductor portfolios that could be asserted against Cerebras once it reaches commercial scale.
      diligencePath: >-
        Obtain a freedom-to-operate opinion from IP counsel covering WSE-3 key design elements. Review any IP
        indemnity language in the Cerebras S-1/A and proposed customer contract templates.
      relatedQuestionRefs: [QR028]
sections:
  - id: section-regulatory-legal
    title: Regulatory and Legal Risk
    body: >-
      Cerebras' most active regulatory risk is US export control exposure under the Export Administration Regulations
      administered by BIS. WSE-3 chips exceed BIS performance thresholds for advanced computing and cannot be shipped
      to China, Russia, or other restricted destinations without export licenses. Critically, approximately 86% of
      Cerebras' FY2025 revenue came from UAE entities — G42 and MBZUAI — all sold under BIS export licenses that
      must be maintained. BIS has updated its advanced computing rules multiple times since 2022; each update creates
      uncertainty about whether existing licenses remain valid and whether new or modified licenses are required. The
      G42 partnership carries additional scrutiny because G42 agreed to divest its Chinese technology holdings in 2024
      as a condition of US government approval for the Microsoft deal; G42's prior China ties remain a compliance
      screening risk for any Cerebras pursuit of US government and defense agency sales.

      On the legal side, no IP litigation has been confirmed against Cerebras as of May 2026, but Nvidia's portfolio
      of over 10,000 semiconductor patents creates latent litigation risk that an FTO opinion should address before
      institutional capital is deployed. AI Executive Order 14110 and the CHIPS Act Section 9002 guardrails add
      indirect regulatory obligations for Cerebras. The NIST AI RMF, while non-binding, increasingly shapes
      government procurement requirements. The FTC's ongoing AI compute competition review represents a background
      risk that remains unlikely to directly affect Cerebras in the near term but warrants monitoring as the company
      scales.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
      - CR008
      - CR009
