        - contentRequirements/5
        - plannedTables/mitigation-and-kill-criteria-table
      status: answered
    - id: QR020
      question: >-
        What thesis-break triggers and monitorable stopping criteria should investors use to frame
        exit decisions for a Cerebras investment at greater than $100 billion market cap?
      type: enumeration
      targets:
        - contentRequirements/5
        - plannedTables/mitigation-and-kill-criteria-table
      status: answered
    - id: QR021
      question: >-
        How does Cerebras cloud revenue growth to 29.7 percent of FY2025 total compare to peer
