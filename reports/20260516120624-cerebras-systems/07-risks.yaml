callouts:
  - calloutType: risk
    title: UAE export license is a single-event total-loss scenario
    body: >-
      Approximately 86% of Cerebras FY2025 revenue originated from UAE entities under active BIS export
      licenses. Any revocation, suspension, or denial of those licenses, triggered by geopolitical shifts,
      G42 counterparty status changes, or BIS rule tightening, would immediately impair more than
      four-fifths of the revenue base. Unlike most concentration risks, this scenario has no near-term
      revenue substitute and no grace period for transition planning.
    claimRefs:
      - CR002
      - CR006
      - CR022
      - CR023
  - calloutType: risk
    title: TSMC dependency is structural and non-mitigable in the near term
    body: >-
      TSMC is the only foundry in the world capable of producing WSE-scale chips. Unlike most supply
      chain concentration risks that carry theoretical mitigation options such as dual-sourcing or
      inventory buffers, Cerebras TSMC dependency cannot be diversified away in any commercially
      realistic timeframe. A Taiwan Strait disruption would halt production entirely and permanently
      with no recovery path within a typical investment horizon.
    claimRefs:
      - CR011
      - CR015
      - CR016
  - calloutType: insight
    title: OpenAI triple-role position is both the thesis and the primary counterparty risk
    body: >-
      OpenAI serves simultaneously as Cerebras production reference customer, $1B working-capital
      lender, and $20B+ MRA revenue anchor. This is the thesis for revenue diversification away from
      UAE concentration, and it is also the single largest counterparty risk in the capital structure.
      If OpenAI role deteriorates for any reason, Cerebras loses the diversification thesis, the
      financial backstop, and the reference customer simultaneously.
    claimRefs:
      - CR018
      - CR019
      - CR039
  - calloutType: assumption
    title: Monitoring thresholds are analyst-derived — Cerebras has not publicly defined them
    body: >-
      Cerebras has not publicly disclosed any monitorable thesis-break triggers or investor monitoring
      thresholds. The trigger set in this chapter, including export license revocation, TSMC disruption,
      UAE concentration above 70% through year-end 2026, OpenAI loan recall, and CEO departure,
      represents the minimum monitoring framework investors should build and propose to management
      during private due diligence access.
    claimRefs:
      - CR035
  - calloutType: strength
    title: AWS term sheet and OpenAI MRA provide credible diversification on-ramps
    body: >-
      The AWS binding term sheet (March 2026) and OpenAI Master Revenue Agreement ($20B+ notional)
      are the two most credible near-term diversification catalysts. If AWS executes as a live
      Marketplace listing and OpenAI 750MW infrastructure buildout proceeds on schedule, Cerebras
      could exit 2026 with non-UAE revenue above 20% of total, materially reducing the export-control
      single-point-of-failure risk. These remain execution-dependent, but the contractual frameworks
      are in place.
    claimRefs:
      - CR036
      - CR039
  - calloutType: recommendation
    title: Minimum diligence asks before underwriting at current valuation
    body: >-
      Institutional investors should require the following before underwriting Cerebras at a valuation
      exceeding $100 billion: (1) copies of current BIS export licenses and renewal conditions for UAE
      shipments; (2) OpenAI MRA conditionality terms and loan covenant details including cross-default
      provisions; (3) quarterly non-UAE revenue split for the past four quarters; (4) TSMC fabrication
      agreement capacity and priority terms; and (5) an organizational depth chart with CEO succession
      plan. Absence of any of these represents a material information asymmetry.
    claimRefs:
      - CR033
      - CR035
