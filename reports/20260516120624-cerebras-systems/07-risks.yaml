        Cerebras IPO coincided with a peak in AI chip investor enthusiasm; if hyperscaler capex
        moderates, NVIDIA supply constraints ease, or AI inference efficiency improvements reduce
        per-token compute demand, the market environment underpinning the IPO multiple could
        deteriorate before Cerebras achieves revenue diversification.
      type: inferred
      topic: market-risk
      sourceRefs: [SR005, SR007, SR002]
      confidence: low
      freshness: recent
      answersQuestionRefs: [QR015]
      contradictsClaimRefs: []
  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: bis-export-license-terms
      missingEvidence: >-
        Cerebras has not publicly disclosed the specific conditions, expiration dates, or renewal
        terms of its BIS export licenses for UAE customer shipments to MBZUAI and G42; these terms
        are known only to Cerebras and BIS.
      whyItMatters: >-
        Without understanding license renewal conditions, investors cannot model the probability
        or timing of a license revocation event, which is the single highest-severity risk in the
        Cerebras investment thesis.
      diligencePath: >-
        Request copies of BIS export licenses, renewal schedules, and compliance counsel opinions
        from Cerebras management during due diligence access period.
      relatedQuestionRefs: [QR002, QR019]
    - type: private-evidence-only
      severity: material
      topic: openai-mra-conditionality
      missingEvidence: >-
        The conditionality terms, termination provisions, and performance covenants of the OpenAI
        $20B+ Master Revenue Agreement have not been publicly disclosed; the S-1/A describes the
        MRA in general terms but provides no granular detail on take-or-pay commitments or exit
        rights.
      whyItMatters: >-
        The MRA is the primary diversification thesis for reducing UAE concentration risk; without
        understanding conditionality, investors cannot assess the probability that MRA revenue will
        actually materialize at scale.
      diligencePath: >-
        Request the MRA term sheet or summary from management; request OpenAI loan covenant details
        and cross-default provisions.
      relatedQuestionRefs: [QR011, QR014]
    - type: private-evidence-only
      severity: material
      topic: monitoring-thresholds-undefined
      missingEvidence: >-
        Cerebras has not publicly defined any monitorable thesis-break triggers or explicit monitoring
        thresholds for the risks identified in the S-1/A; investors must construct these independently.
      whyItMatters: >-
        Without explicit monitoring thresholds from management, investors must construct their own
        frameworks without calibration from the people with the best information, creating an
        information asymmetry that is difficult to close post-IPO.
      diligencePath: >-
        Propose a set of monitoring thresholds to management during due diligence and request
        validation or modification; document management response as part of the investment thesis.
      relatedQuestionRefs: [QR020, QR030]
    - type: private-evidence-only
      severity: material
      topic: tsmc-capacity-allocation
      missingEvidence: >-
        Cerebras contractual capacity allocation with TSMC, including priority standing versus other
        customers, cancellation penalties, and lead-time commitments, has not been publicly disclosed.
      whyItMatters: >-
        Understanding TSMC capacity commitment terms determines whether a supply disruption would be
        a gradual squeeze or an abrupt halt, critical for business continuity risk assessment.
      diligencePath: >-
        Request summary of TSMC fabrication agreement terms, specifically capacity allocation,
        lead times, and priority status provisions.
      relatedQuestionRefs: [QR005, QR006]
    - type: missing-source
      severity: minor
      topic: cloud-security-certification
      missingEvidence: >-
        No public SOC 2 Type II audit report, penetration test results, or third-party security
        certification for Cerebras cloud inference infrastructure has been identified as of May 2026.
      whyItMatters: >-
        Enterprise and government customers increasingly require SOC 2 attestation before deploying
        sensitive workloads; absence of documented certification could limit Cerebras addressable
        market in regulated industries.
      diligencePath: >-
        Request SOC 2 audit scope and report from Cerebras; if not yet available, request timeline
        for completing SOC 2 Type II certification.
      relatedQuestionRefs: [QR028]
sections:
  - id: risk-overview
    title: Risk Overview and Severity Rankings
    body: >-
      Cerebras Systems enters the public markets with a risk profile dominated by three structural
      concentrations that compound one another: a single manufacturing source (TSMC) for which no
      alternative exists, two customers representing 86% of revenue (MBZUAI and G42 in the UAE)
      operating under revocable BIS export licenses, and one counterparty playing three simultaneous
      roles (OpenAI as production customer, $1B lender, and $20B+ revenue anchor). These risks do
      not operate independently: a BIS export rule change targeting UAE destinations would
      simultaneously eliminate hardware revenue from both top customers, stress the OpenAI working
      capital loan, and impair the MRA diversification thesis. The risk-heatmap below maps ten
      identified risks by likelihood and impact severity, while the risk-transmission map shows how
      individual risk events cascade into revenue, financing, and valuation outcomes. Secondary risks
      include wafer-scale yield dependency, liquid-cooling infrastructure constraints, founder
      dual-class voting control, and an IPO multiple exceeding 190 times trailing revenue. No public
      monitoring thresholds have been disclosed by Cerebras; investors must construct their own
      monitoring frameworks before underwriting at the current valuation.
    claimRefs: [CR001, CR002, CR003, CR018]
    figureRefs: [FR001, FR002]
  - id: regulatory-legal-risks
    title: Regulatory and Legal Risks
    body: >-
      Cerebras most consequential regulatory risk is the Export Administration Regulations (EAR)
      framework administered by BIS. The October 2023 Advanced Computing rule and the October 2024
      AI Diffusion Rule establish performance thresholds that govern whether WSE-3 chips can be
      exported to UAE-based customers. Cerebras has publicly disclosed that it holds BIS licenses for
      MBZUAI and G42 shipments, but those licenses can be revoked, modified, or refused at renewal.
      A regulatory posture change, such as placing MBZUAI or G42 on the Entity List, reclassifying
      UAE as a destination requiring tighter controls, or reducing performance thresholds below the
      WSE-3 level, would immediately prohibit existing and future hardware shipments to the two
      customers representing 86% of FY2025 revenue. The CFIUS precedent from the Saudi Aramco
      episode, which caused Cerebras to withdraw its IPO in Q4 2024, illustrates that national
      security review can impose material business disruption with limited advance notice. G42 2024
      agreement to divest Chinese technology holdings partially addresses CFIUS residual risk but
      requires ongoing compliance monitoring. No material IP litigation has been disclosed in the
      S-1/A, but NVIDIA semiconductor patent portfolio creates a latent infringement risk warranting
      an FTO opinion before institutional capital is deployed.
    claimRefs: [CR004, CR005, CR006, CR007, CR008, CR009, CR010, CR023, CR037, CR038, CR042]
    tableRefs: [TR001]
  - id: operational-quality-risks
    title: Operational, Quality, and Security Risks
    body: >-
      Cerebras operational risk is dominated by its sole-source relationship with TSMC for WSE-3
      fabrication. No other foundry in the world has publicly disclosed capability to manufacture a
      chip occupying a full 300mm wafer at the advanced lithography node required for commercial
      yield. This makes TSMC a structural binary dependency: a Taiwan conflict, TSMC production
      disruption, capacity reallocation, or yield-impacting process change could halt Cerebras entire
      hardware supply pipeline for 12 or more months. The defect-tolerant routing embedded in WSE-3
      design mitigates yield risk from individual transistor failures, but cannot compensate for a
      foundry-level production halt or a fundamental TSMC process change that renders the routing
      ineffective. CS-3 systems require approximately 23 kW power draw and liquid cooling, limiting
      deployment to specialized data center facilities and structurally constraining the on-premises
      total addressable market, partially addressed by cloud inference but introducing cloud-specific
      operational risks. Cerebras cloud inference services have not disclosed a SOC 2 Type II
      certification, incident response protocol, or enterprise security audit as of May 2026, a gap
      that could become a material sales objection for enterprise and regulated-industry customers.
      Hardware lead times of 6-12 months from TSMC mean that any supply disruption translates into
      a multi-quarter revenue gap with limited short-cycle recovery options.
    claimRefs: [CR011, CR012, CR013, CR014, CR015, CR016, CR017]
    tableRefs: [TR002]
  - id: partner-dependency-risks
    title: Partner and Dependency Risks
    body: >-
      Cerebras has constructed a partner ecosystem that simultaneously reduces some risks while
      creating new concentration vectors. The OpenAI relationship is the clearest example of this
      dual nature: the $1B working capital loan provides a critical buffer against capital-intensive
      hardware manufacturing cycles, but the same counterparty holds the largest committed revenue
      obligation, runs production workloads on Cerebras infrastructure, and holds 33.4 million
      dilutive warrants. If the OpenAI relationship deteriorates for any reason, including competitive
      dynamic shift, OpenAI corporate distress, or strategic pivot to custom silicon, the simultaneous
      loss of working capital support, near-future revenue, and the production reference customer
      would be structurally devastating. The UAE customer concentration is similarly entrenched:
      MBZUAI and G42 are sovereign-affiliated institutions with durable AI mandates, but both require
      active BIS export licenses and are subject to geopolitical risk beyond Cerebras control. The
      AWS binding term sheet provides the most credible near-term diversification pathway but has not
      yet generated recognized revenue. The dependency-map figure below inventories the principal
      partner and regulatory relationships and their directional dependencies. Until non-UAE and
      non-OpenAI revenue exceeds 20% of total, the partner and dependency risk vector should be
      treated as the primary investment concentration concern.
    claimRefs: [CR018, CR019, CR020, CR021, CR022, CR033, CR034, CR036, CR039, CR041]
    tableRefs: [TR003]
    figureRefs: [FR003]
  - id: financial-model-risks
    title: Financial and Model Risks
    body: >-
      Cerebras financial risk profile features a significant GAAP versus non-GAAP gap, hardware deal
      lumpiness, and an IPO valuation that prices near-perfect execution. The FY2025 GAAP net income
      of approximately $237.8M is almost entirely driven by a non-cash warrant remeasurement gain
      related to the OpenAI warrants; on a non-GAAP adjusted basis, Cerebras shows an approximately
      $75.7M operating loss, which more accurately reflects underlying cash generation quality. Gross
      margin of approximately 39% is below software peers and reflects TSMC high fabrication costs
      for advanced-node wafer-scale production. Hardware revenue is composed of large, multi-hundred-
      million dollar contracts with extended lead times, creating quarter-over-quarter revenue
      volatility that can misalign with investor expectations and trigger disproportionate stock
      reactions to any earnings miss. At the IPO opening price implying approximately 196 times
      trailing FY2025 revenue, a deceleration from 76% revenue growth to even 40-50% would likely
      compress the multiple significantly. The 180-day lockup expiry creates near-term supply
      overhang risk when insiders become eligible to sell approximately November 2026. The OpenAI
      $1B loan, while supportive in the near term, becomes an adversarial financial instrument if
      the relationship deteriorates before the 2032 maturity date.
    claimRefs: [CR024, CR025, CR026, CR027, CR028, CR029, CR040, CR043, CR044, CR045, CR046]
  - id: people-execution-mitigations
    title: People, Execution, and Mitigations
    body: >-
      Cerebras governance structure concentrates strategic control in founders through a dual-class
      share structure where Class B shares carry 10-to-1 voting rights, giving founders approximately
      99.2% aggregate voting power at IPO despite institutional ownership of a significant economic
      share. Andrew Feldman (CEO) is explicitly named in the S-1/A as a key-person risk; no public
      succession plan has been disclosed. The engineering team represents a wafer-scale talent moat
      but also a talent concentration risk if core chip architects depart to NVIDIA, AMD, or
      well-funded AI chip startups, which could delay the CS-4 program by 12-18 months. The
      people-execution risk register documents these dependencies by role. The mitigation and
      monitoring table below provides a structured investor framework built from S-1/A disclosures,
      BIS regulatory posture analysis, and analyst-derived threshold logic. Key diligence asks before
      underwriting at current valuation include: BIS license copies and renewal timelines, OpenAI MRA
      conditionality terms and loan covenant details, non-UAE revenue quarterly split, TSMC capacity
      contract summary, and an organizational depth chart for core engineering leadership. Without
      these inputs, underwriting Cerebras at a valuation exceeding $100 billion requires accepting
      material structural information asymmetries that cannot be resolved from public disclosures.
    claimRefs: [CR030, CR031, CR032, CR035]
    tableRefs: [TR004, TR005]
