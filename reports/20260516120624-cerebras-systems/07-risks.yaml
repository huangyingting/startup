acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >-
      Sources not retrieved through the fetch-url pipeline are primarily reused from earlier chapters
      (ch1-ch6) where they were originally retrieved, or are confirmed present in the shared fetch-log.
      The 8 net-new URLs (SR001-SR008) are all confirmed in the .research-cache/_fetch-log.jsonl trail.
      Reusable ch1-ch6 sources are cross-verified from the same EDGAR filing, official company pages,
      and established news archives already used across the report.
  - dimension: tableNotes
    reason: >-
      TR001 (Regulatory / legal risk register) is the enumeration table derived from regulatory text,
      S-1/A disclosures, and BIS rule documents; its notes field documents provenance and estimation
      basis. TR002-TR005 notes are populated with data-provenance statements per the tableNotes
      requirement.
chapter:
  number: 7
  title: Risks
  summary: >-
    Cerebras Systems' three highest residual risks are its sole-source TSMC manufacturing dependency
    (no alternative foundry can produce WSE-scale chips), UAE revenue concentration of approximately
    86% of FY2025 revenue held under BIS/EAR export licenses that can be revoked, and OpenAI's
    triple-role concentration as production customer, $1B working-capital lender, and $20B+ MRA
    anchor. The CFIUS precedent from the Saudi Aramco episode demonstrates that national security
    review can impose material business disruption with limited advance notice. No public
    thesis-break triggers or investor monitoring thresholds have been disclosed by Cerebras;
    investors must construct explicit monitoring frameworks before underwriting.
