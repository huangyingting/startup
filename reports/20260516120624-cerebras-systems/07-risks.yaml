callouts:
  - calloutType: risk
    title: UAE export license dependency is a near-total-loss scenario
    body: >-
      Approximately 86% of Cerebras' FY2025 revenue was generated from UAE entities under BIS export licenses. Any
      revocation or denial of those licenses — triggered by escalating US-China tensions, changes in G42 counterparty
      status, or BIS rule updates — would immediately impair more than four-fifths of the revenue base with no
      near-term substitution path.
    claimRefs:
      - CR003
      - CR024
      - CR040
  - calloutType: risk
    title: TSMC dependency has no mitigant — this is a structural binary risk
    body: >-
      TSMC is the only foundry in the world capable of producing WSE-scale chips. Unlike most supply chain
      concentration risks that carry mitigation options, Cerebras' TSMC dependency cannot be diversified away in
      any commercially realistic timeframe. A Taiwan Strait disruption would halt production entirely and
      permanently with no recovery within a typical investment horizon.
    claimRefs:
      - CR011
      - CR012
      - CR019
  - calloutType: insight
    title: Kill criteria must be constructed by investors — Cerebras has not defined them
    body: >-
      Cerebras has not publicly disclosed any monitorable kill criteria, thesis-break triggers, or investor
      monitoring thresholds. This chapter's derived trigger set — export license revocation, TSMC disruption,
      MBZUAI demand cliff, failed revenue diversification, and IP litigation — represents the minimum monitoring
      framework an investor should build and propose to management during due diligence.
    claimRefs:
      - CR041
      - CR042
      - CR043
      - CR044
