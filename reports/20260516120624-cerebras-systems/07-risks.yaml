  - id: section-operational-supply-chain
    title: Operational and Supply Chain Risk
    body: >-
      The single most material operational risk for Cerebras is its complete dependency on TSMC as the sole foundry
      capable of manufacturing WSE-scale chips. The WSE-3 occupies an entire 300 mm silicon wafer, meaning each
      wafer produces exactly one chip; no alternative foundry in the world has demonstrated the capability to produce
      dies at anything close to 46,225 mm² at commercially viable yields. A disruption to TSMC production — whether
      from Taiwan Strait conflict, natural disaster, or US-China export escalation — would halt CS-3 and CS-4
      production with no plausible 12–24 month recovery path. This is not merely a concentration risk; it is a
      structural binary exposure with no short-term mitigant.

      Secondary operational risks are also material. The single-wafer die structure means yield risk is qualitatively
      higher per unit than for multi-die chips; any defect that would be inconsequential on a smaller die can reject
      an entire $35,000+ wafer. The CS-3's approximately 23 kW power draw and liquid cooling requirement effectively
      restricts on-premises sales to customers with hyperscale-class data center infrastructure, limiting the
      addressable enterprise hardware market. SK Hynix HBM supply for MemoryX adds a secondary memory dependency.
      The 6–12 month manufacturing lead time compounds any supply disruption into a multi-quarter revenue gap.
      Cloud security posture relies on a SOC 2 claim without publicly verified audit documentation, which could
      complicate government procurement clearances.
    claimRefs:
      - CR011
      - CR012
      - CR013
      - CR014
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
    tableRefs:
      - TR002
    figureRefs:
      - FR003
  - id: section-partner-dependency
    title: Partner and Dependency Risk
    body: >-
      Cerebras' partner stack combines its TSMC manufacturing dependency with two concentrated customer relationships
      — MBZUAI at approximately 62% and G42 at approximately 24% of FY2025 revenue — plus an emerging dependency on
      CoreWeave for cloud inference delivery. Combined, these three counterparties account for the majority of
      Cerebras' current revenue and operating infrastructure. The G42 relationship adds a distinctive compliance
      layer: G42's prior Chinese technology ties required divestiture as a US government condition for the Microsoft
      deal in 2024, and those same ties remain a disqualifying factor for Cerebras in many US government procurement
      contexts.

      The OpenAI master revenue agreement, while potentially transformative, creates a new concentrated counterparty
      dependency; if OpenAI delays its capacity ramp or modifies its commitment, the diversification rationale
      weakens. CoreWeave's role as the primary cloud delivery infrastructure means CoreWeave pricing and capacity
      decisions directly flow through to Cerebras' cloud unit economics. Downstream software dependencies on
      PyTorch and Hugging Face are less acute but represent integration risks if major ecosystem shifts occur.
      The dependency structure is not merely diverse partnership risk — it is a concentrated transmission path
      from any one partner failure to a material revenue or operational impairment.
    claimRefs:
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
    tableRefs:
      - TR003
    figureRefs:
      - FR002
  - id: section-people-execution
    title: People and Execution Risk
    body: >-
      Cerebras is a founder-led company where CEO Andrew Feldman is the primary face of the business, its strategic
      vision, and its investor and customer relationships. In a pre-IPO hardware company with a hardware-intensive
      product requiring long-cycle engineering, founder-CEO dependency is elevated compared to software peers; the
      organizational depth and succession planning for Feldman's role is not publicly visible. Separately, the
      wafer-scale chip design function relies on a small pool of specialized architects whose expertise in 3D
      floorplanning, power delivery, and yield optimization is not broadly available in the semiconductor talent
      market. Loss of key chip design personnel could delay the CS-4 program by 12–18 months.

      Execution risk also manifests in the sales cycle. Enterprise and government hardware deployments typically take
      6–18 months from first conversation to revenue recognition, which makes quarterly visibility low and creates
      lumpy revenue patterns. The commercial pharma segment — GSK and AstraZeneca — represents higher-margin
      potential but requires multi-year proof-of-value cycles in drug discovery AI that create additional timing
      uncertainty. These people and execution risks do not currently rise to the level of regulatory or TSMC
      concentration risk, but they are meaningful second-order risks in the context of a concentrated revenue base.
    claimRefs:
      - CR032
      - CR033
      - CR034
      - CR035
    tableRefs:
      - TR004
  - id: section-financial-kill-criteria
    title: Financial and Model Risk — Kill Criteria
    body: >-
      Cerebras' financial risk profile is shaped by its capital-intensive hardware model. Each chip generation
      requires an estimated $100M or more in NRE and tape-out costs, creating a high fixed burden that requires
      sustained large-volume revenue or external financing to support the CS-4 roadmap. Gross margins in AI hardware
      typically run 40–60%, significantly below the 70%+ margins of pure-software peers, which compresses Cerebras'
      economics relative to software-native AI companies even as revenue scales. The disclosed $1B OpenAI working
      capital facility signals that current operations require material external financing — a characteristic of
      hardware companies at this scale that investors must underwrite explicitly.

      Revenue episodicity is a further risk: with an estimated 10–15 customers generating FY2025 revenue, losing
      the top one or two accounts represents a 10–20% near-term revenue impact, and the MBZUAI relationship at 62%
      alone is a single-client concentration that exceeds the threshold most institutional investors treat as a
      thesis-break indicator. Because Cerebras has not publicly defined kill criteria or monitoring thresholds,
      investors must construct these independently. The analyst-derived thesis-break triggers developed in this
      chapter — export license revocation, TSMC disruption, MBZUAI or OpenAI loss, and failure to diversify UAE
      revenue concentration by end of 2026 — represent the minimum monitoring framework for underwriting this
      investment.
    claimRefs:
      - CR036
      - CR037
      - CR038
      - CR039
      - CR040
      - CR041
      - CR042
      - CR043
      - CR044
    tableRefs:
      - TR005
