      type: mechanism
      targets:
        - contentRequirements/2
      status: answered
    - id: QR008
      question: >-
        What liquid cooling and power infrastructure requirements constrain CS-3 and CS-4 on-premises
        deployment and how material is this TAM restriction relative to total market size?
      type: verification
      targets:
        - contentRequirements/2
        - plannedTables/operational-quality-security-risk-register
      status: answered
    - id: QR009
      question: >-
        What partner and vendor dependencies constitute single points of failure for Cerebras
        operations, covering TSMC, OpenAI, AWS, MBZUAI, and G42 relationships?
      type: enumeration
      targets:
        - contentRequirements/3
        - plannedTables/partner-dependency-risk-register
        - plannedFigures/dependency-map
      status: answered
    - id: QR010
      question: >-
        How concentrated is Cerebras revenue across UAE sovereign customers, and what would be
        the revenue impact of a full simultaneous loss of MBZUAI and G42 contracts?
      type: quantification
      targets:
        - contentRequirements/3
        - plannedTables/partner-dependency-risk-register
      status: answered
    - id: QR011
      question: >-
        Does OpenAI simultaneous role as Cerebras production customer, $1B loan provider, and
        $20B+ MRA holder represent an undisclosed counterparty concentration risk that materially
        impairs thesis durability?
      type: adverse
      targets:
        - contentRequirements/3
        - plannedTables/partner-dependency-risk-register
      status: answered
    - id: QR012
      question: >-
        What is Cerebras gross margin profile in FY2025, broken down by hardware and cloud, and
        what are the structural drivers of margin compression risk going forward?
      type: quantification
      targets:
        - contentRequirements/4
      status: answered
    - id: QR013
      question: >-
        How does the FY2025 GAAP net income of $237.8M versus non-GAAP adjusted loss of $75.7M
        affect accurate financial risk assessment for investors relying on headline metrics?
      type: verification
      targets:
        - contentRequirements/4
      status: answered
    - id: QR014
      question: >-
        Does Cerebras $1B OpenAI working capital loan at 6% interest maturing 2032 represent a
        hidden adversarial debt risk if the OpenAI relationship deteriorates before maturity date?
      type: adverse
      targets:
        - contentRequirements/4
        - plannedTables/partner-dependency-risk-register
      status: answered
    - id: QR015
