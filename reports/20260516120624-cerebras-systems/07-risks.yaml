        begins, could trigger significant multiple compression from the 196x trailing revenue level.
      type: estimated
      topic: revenue-growth-risk
      sourceRefs: [SR009, SR014]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QR031, QR015]
      contradictsClaimRefs: []
    - id: CR046
