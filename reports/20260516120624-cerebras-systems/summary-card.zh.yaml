summary:
  headline: Cerebras 用 WSE-3 做出了真实硬件突破，AI 推理速度号称全球最快；但 H1 2024 收入 86% 集中在一名正受 CFIUS 审查的客户，IPO 又被推迟，技术护城河之外也压着生死级风险。
