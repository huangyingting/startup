  title: Competitors

sections:
  - id: S01
    title: Competitive Landscape Overview
    body: |
      Cerebras Systems competes in the AI accelerator and inference-as-a-service market across five
      overlapping alternative categories: (1) incumbent GPU platforms led by NVIDIA and AMD; (2)
      custom internal silicon from hyperscalers—Google TPU and AWS Trainium—available externally
      via cloud but designed primarily for internal scale; (3) specialist inference-chip start-ups,
      most notably Groq (LPU architecture) and SambaNova (Reconfigurable Dataflow Unit); (4)
      early-stage RISC-V or chiplet approaches such as Tenstorrent; and (5) the status quo of
      multi-GPU clusters running open inference runtimes like vLLM and TensorRT-LLM. Enterprise
      buyers must also consider the internal build option—assembling a dedicated GPU cluster
      on-premises—which remains the dominant procurement pattern at hyperscale consumers.

      NVIDIA's GPU ecosystem is the reference standard against which every alternative is evaluated.
      AMD's MI300X has emerged as the first credible GPU challenger; Intel's Gaudi 3 targets the
      mid-tier with direct data-center sales leverage. Among purpose-built AI chips, Cerebras's
      wafer-scale memory-bandwidth architecture is architecturally differentiated from both GPU
      clusters and inference-focused LPU designs, but must overcome NVIDIA's overwhelming software
      ecosystem dominance and deep hyperscaler integration. New entrants such as Tenstorrent,
      backed by $693M in 2025 funding, are in early production but lack credible traction against
      Cerebras's vertically integrated hardware-plus-API stack as of the May 2026 IPO date.
    tableRefs: []
    figureRefs: []

  - id: S02
    title: Competitor Profiles
    body: |
      NVIDIA remains the category-defining competitor, generating approximately $47B in fiscal
      year 2025 data center revenue and holding an estimated 70–90% share in AI accelerator
      deployments. The H100 and H200 SXM5 are standard training and inference units for
      hyperscalers; the Blackwell B200/GB200 NVL72 rack system delivers 1.4 exaflops per rack
      and 8TB/s HBM3e per GPU chip, representing the next-generation platform that directly
      targets Cerebras's bandwidth narrative. NVIDIA's competitive advantage derives not only from
      hardware performance but from its CUDA ecosystem—an estimated 4M+ developers, decade-optimized
      libraries, and deep integration with every major cloud and framework.

      AMD's MI300X accelerator (192GB HBM3, 5.3TB/s) is the most commercially deployed alternative
      GPU, shipping at scale to Microsoft Azure and Meta since late 2023. AMD's ROCm software stack
      has improved meaningfully but still lags CUDA in operator coverage. Intel's Gaudi 3 targets
      cost-sensitive LLM training and inference, leveraging Intel's data-center sales relationships.

      Among hyperscaler silicon, Google TPU v5e/v5p are available on GCP with on-demand pricing
      but are tightly integrated with JAX/XLA frameworks, limiting portability. AWS Trainium2,
      accessible via SageMaker and EC2 Trn2, avoids model-format lock-in. SambaNova Cloud and
      Groq's LPU inference service represent the closest API-layer conceptual peers to Cerebras
      Cloud: both offer high-throughput LLM inference at competitive per-token pricing, but neither
      has disclosed meaningful independent enterprise revenue or verified benchmark results in 2026.
      Tenstorrent is in early production shipment targeting training workloads at smaller scale.
    tableRefs: [TP001]
    figureRefs: [FP001]

  - id: S03
    title: Capability and Pricing Comparison
    body: |
      The fundamental capability axis distinguishing Cerebras from GPU-based competitors is memory
      bandwidth per unit of inference latency. Cerebras WSE-3 delivers 21PB/s on-chip SRAM
      bandwidth versus H100's 3.35TB/s HBM3—roughly 6000x higher at the chip level—translating
      to dramatically lower time-to-first-token at small batch sizes. Cerebras publicly claims
      approximately 1,500 tokens/sec on single-stream Llama-70B inference versus 60–90 tokens/sec
      on H100. This advantage narrows under heavily batched multi-user workloads where GPU clusters
      amortize memory latency across large batches.

      On software completeness, NVIDIA CUDA's ecosystem depth—optimized transformer kernels,
      FlashAttention, TensorRT-LLM, NIM microservices, and broad framework support—represents a
      durable distribution-power advantage. AMD ROCm supports PyTorch and most CUDA operators via
      HIPification; Intel Gaudi 3 supports PyTorch 2.x natively. Cerebras requires customers to
      adopt its proprietary CTML compilation pipeline, increasing porting friction for workloads
      already optimized for CUDA.

      On pricing, Cerebras's published cloud API rate for Llama-3 70B inference is $0.60/M input
      tokens, competitive with major GPU-cloud providers charging roughly $0.90/M for equivalent
      throughput. Hardware-purchase customers pay approximately $2–4M per CS-3 system. No
      publicly disclosed list pricing exists for Cerebras enterprise inference contracts beyond
      the API rate card. The absence of a published MLPerf submission from Cerebras limits
      independent verification of its throughput performance claims.
    tableRefs: [TP002, TP003]
    figureRefs: [FP002]

  - id: S04
    title: Switching Costs and Distribution Power
    body: |
      Cerebras's proprietary CTML compilation pipeline and flat on-chip SRAM memory model create
      material switching costs: workloads optimized for WSE-3's memory hierarchy must be
      restructured for GPU clusters, typically requiring 6–18 months for production-grade LLM
      pipelines. This is simultaneously a competitive moat and a barrier to initial adoption—
      enterprise evaluators must weigh the switching cost of adopting Cerebras against the future
      cost of leaving.

      NVIDIA's distribution power is unmatched. All three major hyperscalers (AWS, Azure, GCP)
      offer NVIDIA GPU instances as the default compute option; NVIDIA NIM microservices are
      pre-integrated in GCP Vertex AI and AWS SageMaker. AMD benefits from similar hyperscaler
      distribution via AMD-instance SKUs. Intel Gaudi 3 is sold primarily through Intel's direct
      data-center sales force with limited cloud availability. Cerebras has no hyperscaler
      spot-market integration as of May 2026; its AWS partnership (binding term sheet, March 2026)
      covers Cerebras-dedicated cloud instances only.

      Multi-homing between Cerebras and GPU infrastructure is technically possible but operationally
      expensive due to compiler differences. Customers embedding Cerebras APIs in production
      inference pipelines face limited practical multi-homing, as CTML-optimized models cannot be
      trivially re-deployed to NVIDIA TRT or vLLM without re-optimization. SambaNova and Groq users
      face similar, if slightly lower, switching costs due to their API-first interfaces built over
      standard model formats. TSMC 5nm wafer-scale manufacturing is a supply-side barrier that new
      entrants cannot quickly replicate; comparable TSMC commitments plus defect-management
      know-how require 5+ years of development.
    tableRefs: []
    figureRefs: []

  - id: S05
    title: Moat Durability and Displacement Risk
    body: |
      Cerebras's primary durable moat claims are: (1) architectural bandwidth from wafer-scale
      SRAM; (2) TSMC 5nm wafer-scale manufacturing expertise that no competitor currently
      replicates; and (3) a software/API layer abstracting the hardware advantage into a
      developer-accessible product. These claims are credible but carry two material displacement
      risks.

      First, NVIDIA's Blackwell B200 SXM5 delivers 8TB/s HBM3e bandwidth—more than 2x the
      H100—significantly narrowing the bandwidth gap that Cerebras exploited during the H100 era.
      While WSE-3 still leads in absolute bandwidth, the relative gap is compressing. NVIDIA
      simultaneously launched NIM inference microservices in 2024, competing directly with
      Cerebras's inference API commercial model, creating a two-sided squeeze on hardware
      performance and API-layer positioning.

      Second, Cerebras WSE-3's 44GB on-chip SRAM limits native model capacity to roughly 60B
      parameters; larger frontier models require multi-WSE-3 parallelism, reducing per-token
      efficiency. As frontier model sizes scale—Llama 4 Maverick is approximately 400B parameters—
      the core value proposition of running the entire model in on-chip SRAM weakens unless WSE-4
      delivers substantially larger memory. Cerebras has not submitted WSE-3 results to MLCommons
      MLPerf inference benchmarks, leaving its throughput claims without independent third-party
      validation—an adverse signal for enterprise procurement teams requiring benchmark evidence.
      Customer concentration at MBZUAI (62% of 2025 revenue) is an additional durability risk.
    tableRefs: [TP004]
    figureRefs: [FP003]

