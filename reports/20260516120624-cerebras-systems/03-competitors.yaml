  evidenceGaps:
    - id: EGP001
      gapType: private-evidence-only
      severity: material
      description: >
        Groq's 2026 annual revenue, customer count, and Tenstorrent's production volumes are
        private; neither company has disclosed financials or audited metrics. Competitive profiles
        for these vendors rely on secondary news reports and investor announcements only.
      relatedQuestionRefs: [QP011, QP017]

    - id: EGP002
      gapType: missing-source
      severity: material
      description: >
        Tenstorrent's 2026 production volume, external customer list, and revenue are entirely
        undisclosed as of May 2026. The company has not published a press release confirming
        commercial shipments or customer names. Competitive threat assessment is based on funding
        announcements only.
      relatedQuestionRefs: [QP023]

    - id: EGP003
      gapType: missing-source
      severity: blocking
      description: >
        No independent third-party benchmark (MLPerf, SPEC, or comparable) comparing Cerebras
        WSE-3 versus NVIDIA B200/Blackwell on matched workloads has been published as of May 2026.
        Cerebras's throughput claims cannot be independently validated against Blackwell. This is
        a diligence blocker for buyers requiring third-party benchmark evidence.
      relatedQuestionRefs: [QP028]

