callouts:
  - title: "Architecturally Unique Bandwidth Position — Durable Near-Term Moat"
    type: strength
    body: >
      Cerebras's 21 PB/s on-chip SRAM bandwidth advantage is architecturally distinct from any
      GPU or chiplet design in production. No competitor replicates a wafer-scale chip at
      comparable bandwidth density, and TSMC's commitment of an entire 5nm wafer to Cerebras
      creates a supply-side barrier that cannot be quickly replicated. This moat is durable for
      12–24 months assuming WSE-4 is in development, but NVIDIA Blackwell compresses the relative
      gap more rapidly than the H100 era did.
    claimRefs: [CP014, CP015, CP031, CP032]

  - title: "NVIDIA Blackwell Compresses the Bandwidth Gap — Elevated Displacement Risk"
    type: risk
    body: >
      NVIDIA's B200 SXM5 chip delivers 8TB/s HBM3e bandwidth versus H100's 3.35TB/s—a 2.4x
      improvement that directly targets the throughput gap Cerebras exploited. While WSE-3's
      21 PB/s still leads by a large margin, NVIDIA's historically doubling memory bandwidth
      every 2–3 years means the gap will continue compressing unless Cerebras's WSE-4 delivers
      a step-change in on-chip SRAM. NVIDIA NIM inference microservices also replicate Cerebras's
      API-layer commercial model, potentially eroding API differentiation faster than hardware gap.
    claimRefs: [CP034, CP036]

  - title: "CUDA Ecosystem Lock-In Is a Two-Sided Distribution Risk"
    type: risk
    body: >
      CUDA's 4M+ developer user base, optimized ML libraries, and hyperscaler pre-integration
      represent a distribution-power advantage that Cerebras cannot replicate through hardware
      performance alone. Customers adopting Cerebras incur meaningful switching costs from existing
      CUDA-based pipelines, creating an initial adoption barrier. Enterprise buyers with large
      CUDA-optimized codebases will rationally demand compelling performance premiums or a
      migration path that Cerebras's CTML toolchain does not yet provide at equivalent coverage.
    claimRefs: [CP024, CP025, CP030]

  - title: "No MLPerf Benchmark Record Undermines Enterprise Credibility"
    type: risk
    body: >
      Cerebras has not submitted WSE-3 inference results to MLCommons's MLPerf benchmark suite,
      the industry-standard mechanism for independent validation of AI accelerator throughput.
      Enterprise procurement at large financial institutions, government contractors, and
      regulated industries increasingly requires MLPerf submissions for vendor qualification.
      The absence leaves Cerebras's 1M+ token/sec claims unverifiable through any independent
      channel, and exposes Cerebras to displacement if NVIDIA, AMD, or Groq publish comparative
      results that buyers cannot directly contradict.
    claimRefs: [CP017, CP029, CP038]

