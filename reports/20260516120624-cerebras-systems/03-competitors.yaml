      high-bandwidth / high-throughput quadrant due to its on-chip SRAM architecture. NVIDIA
      Blackwell has narrowed the bandwidth gap vs H100 but remains far below Cerebras. Groq LPU
      occupies high-throughput / lower-bandwidth territory due to LPU sequential-decoding
