- id: retention-durability
  title: Retention and Durability
  body: >-
    Customer retention at Cerebras cannot be formally assessed from public data because the company has not disclosed NRR,
    GRR, or any cohort-level retention metric, a significant information gap for a company approaching the public markets.
    Indirect signals are mostly positive but weak: no public evidence of a named customer terminating or not renewing a Cerebras
    contract was identified in the research window. Government customers are structurally sticky, as CORAL-2 and comparable
    DOE contracts typically carry three-to-five-year initial terms with renewal options, and the capital investment in hardware
    creates switching costs. GSK continued publication of case study material and blog posts suggests ongoing use beyond the
    initial deployment. Developer community metrics, over 5,000 GitHub ModelZoo stars and growing Hugging Face model uploads,
    are lagging indicators of ecosystem stickiness, though these do not translate directly to paying customer retention. The
    primary durability risk is not individual customer churn but rather over-concentration: if the dominant UAE customer reduces
    spending, the financial impact would be severe regardless of whether other customers stay. The S-1/A explicitly flags
    this as a material adverse risk. Retention and durability diligence must therefore prioritise obtaining NRR data and confirming
    the UAE customer contractual renewal status.
  claimRefs:
  - CU027
  - CU028
  - CU029
  - CU030
  - CU031
  - CU032
  - CU033
  tableRefs:
  - TU004
  figureRefs:
  - FU004
- id: expansion-concentration
  title: Expansion and Concentration Risk
  body: >-
    Customer concentration is the most consequential diligence finding in this chapter. The S-1/A discloses that a single
    customer, widely reported as a UAE entity likely G42 or a subsidiary, accounted for more than 50 percent of Cerebras revenue
    in the reported period. Bloomberg and the Financial Times both covered this as a material IPO risk. CNBC and other financial
    media flagged it in their S-1 analysis. The Register raised concerns about the company limited commercial traction beyond
    government and sovereign AI programmes. US national laboratories provide some institutional diversification but do not
    mitigate the financial concentration risk because their contract values, while large in aggregate, are spread across multiple
    entities. The Cerebras Inference cloud platform is the primary near-term diversification lever: it lowers adoption friction,
    reaches developer teams directly, and could convert to enterprise SaaS-like recurring revenue over time. The company has
    identified financial services, energy, and broader life sciences as expansion targets beyond its existing pharma beachhead,
    but no public evidence of deployments in those sectors was found as of May 2026. Land-and-expand economics are difficult
    to assess without NRR data. An investor should treat the current customer base as proof of technical credibility and government
    and pharma market fit, but should not extrapolate horizontal commercial scale from the existing named customer list.
