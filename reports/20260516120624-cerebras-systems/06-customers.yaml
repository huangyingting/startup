sections:
- id: section-U1
  title: 'Customer Base Segmentation: Sovereign AI, National Labs, Enterprise, and Developer'
  body: 'Cerebras serves four distinct customer segments with meaningfully different buyer profiles, procurement processes,
    and value drivers. The largest segment by revenue is sovereign AI and government institutions, dominated by UAE entities:
    G42 (Abu Dhabi sovereign technology holding company with $335M invested in Cerebras) and MBZUAI (Mohamed bin Zayed University
    of Artificial Intelligence). These buyers purchase large clusters of CS-3 hardware for national AI capability building,
    treating Cerebras infrastructure as critical sovereign technology. Combined, G42 and MBZUAI represented approximately
    86% of FY2025 revenue ($510M total, +76% YoY). The second segment is US national laboratories, led by Argonne National
    Laboratory (Department of Energy), which deploy CS-3 systems for scientific AI, high-performance computing, climate modeling,
    and materials science. This segment provides strategic US government validation but represents a small fraction of total
    revenue. The third segment is commercial enterprises, including IBM (via watsonx partnership) and other named accounts
    that purchase hardware or cloud inference for production AI deployments. The fourth and emerging segment is developers
    and smaller enterprises accessing the cloud API, which became generally available in August 2024. Hardware revenue ($358.4M,
    70% of FY2025 total) is concentrated in sovereign and government accounts; cloud revenue ($151.6M, 30%) serves a broader
    but still concentrated base. The AWS binding term sheet (March 2026) signals intent to expand the enterprise segment through
    channel distribution, and the OpenAI MRA ($20B+ notional) would transform the cloud segment''s scale if executed to plan.'
  claimRefs:
  - CU001
  - CU002
  - CU004
  - CU007
  - CU008
  - CU030
  tableRefs:
  - TU001
  figureRefs:
  - FU001
- id: section-U2
  title: 'Adoption Trajectory: From Direct Sovereign Hardware to Cloud Inference at Scale'
  body: 'Cerebras'' customer adoption trajectory has evolved through three distinct phases. In phase one (FY2022-FY2023, revenue
    $24.6M-$78.7M), the company established a proof-of-concept anchor with G42, demonstrating that wafer-scale AI compute
    could power sovereign AI infrastructure at scale. Revenue in this phase was entirely hardware-driven and concentrated
    in one account. Phase two (FY2024, $290.3M) marked the G42 scale-up: G42 became the 85%-of-revenue anchor, MBZUAI emerged
    as a secondary account beginning substantial hardware purchases, and US national labs sustained their deployments. Phase
    three (FY2025, $510M, +76% YoY) reflected MBZUAI''s emergence as the single largest customer (62%), G42''s retained but
    proportionally diluted share (24%), and the first material cloud revenue from the August 2024 API launch. Artificial Analysis''
    independent benchmark — ranking Cerebras as the highest-throughput inference provider in the market — catalyzed developer
    discovery and contributed to cloud adoption. OpenAI''s selection of Cerebras for Codex-Spark fast inference validated
    the platform for hyperscaler use cases and preceded the December 2025 MRA signing. The IBM watsonx partnership opened
    a distinct enterprise channel. The AWS binding term sheet (March 2026) represents the next phase: channel-based distribution
    to millions of enterprise AWS customers. The OpenAI MRA ($20B+ notional) represents the most significant prospective adoption
    catalyst, potentially transforming Cerebras from a UAE-focused hardware supplier into a US-anchored cloud inference company.
    Developer community growth since August 2024 is described as positive but lacks public quantitative metrics.'
  claimRefs:
  - CU005
  - CU006
  - CU013
  - CU026
  - CU033
  - CU039
  tableRefs:
  - TU002
  figureRefs: []
- id: section-U3
  title: 'Named Customer Profiles: G42, MBZUAI, OpenAI, AWS, IBM, and US National Labs'
  body: 'G42 is a UAE sovereign technology conglomerate closely affiliated with the Abu Dhabi government, with a $335M investment
    in Cerebras. G42 became Cerebras'' first large-scale anchor customer, accounting for 85% of FY2024 revenue through multi-year
    hardware purchase agreements for CS-3 clusters used in sovereign AI applications, LLM development, and national AI infrastructure.
    US export licenses were required and obtained. G42''s share declined to 24% of FY2025 revenue not from relationship deterioration
    but from MBZUAI''s faster growth. MBZUAI is the UAE''s premier AI research institution, executing frontier LLM training
    programs requiring massive compute. MBZUAI grew to 62% of FY2025 revenue using Cerebras clusters for large-scale training
    jobs directly benefiting from the WSE-3''s memory bandwidth advantage. Export licenses are in place. OpenAI signed the
    Master Revenue Agreement in December 2025: $20B+ notional, 750MW cloud inference capacity commitment, and a $1B working
    capital loan to Cerebras at 6% annual interest. OpenAI already uses Cerebras in production for Codex-Spark. If the MRA
    executes at scale, OpenAI would transform Cerebras'' revenue profile. AWS signed a binding term sheet in March 2026 to
    make Cerebras an AWS Marketplace partner, enabling enterprise customers to purchase inference via their existing AWS relationships
    — representing structural channel expansion to long-tail enterprise. IBM''s watsonx partnership enables Cerebras to reach
    regulated enterprise industries through IBM''s incumbent sales relationships. US national laboratories including Argonne
    (DOE) deploy CS-3 hardware for scientific AI computing, providing strategic US government validation that complements
    and partially offsets the UAE sovereign concentration risk.'
  claimRefs:
  - CU009
  - CU010
  - CU011
  - CU012
  - CU013
  - CU014
  - CU015
  - CU016
  - CU017
  - CU031
  tableRefs:
  - TU003
  figureRefs: []
- id: section-U4
  title: 'Retention and Durability: Repeat Purchases, Contract Anchors, and Structural Risks'
  body: 'Cerebras'' retention evidence is encouraging in observable behavior but limited in formal disclosure. G42 has made
    hardware purchases across multiple successive fiscal years (FY2022 through at minimum FY2025), indicating a sustained
    commercial relationship without public non-renewal events. MBZUAI expanded from a secondary customer to the largest customer
    between FY2024 and FY2025 — the most dramatic within-cohort expansion in disclosed history, representing effective retention
    plus massive upsell. Multi-year hardware purchase agreements with minimum commitment clauses provide contractual backlog
    visibility that reduces near-term revenue risk. No churn events have been disclosed in the S-1/A or any public communication.
    The revenue mix is structurally shifting toward recurring cloud inference revenue: the OpenAI MRA, if executed, would
    create years of cloud revenue backlog at the $20B+ level, effectively providing more durable revenue than one-time hardware
    sales. However, critical durability risks remain. MBZUAI''s demand is driven by episodic frontier LLM training programs
    that may not recur at the same scale once current runs complete. Hardware refresh cycles create natural revenue gaps between
    purchases. The AWS and IBM channels have not yet generated disclosed revenue, making channel expansion prospective. Customer-level
    gross margins are undisclosed, preventing assessment of whether anchor customers receive preferential pricing that would
    dilute as the base diversifies. Cerebras has disclosed no NRR or GRR figures, leaving the quantitative retention picture
    incomplete and relying on behavioral signals (repeat purchases) rather than retention metrics as evidence of customer
    durability.'
  claimRefs:
  - CU018
  - CU019
  - CU020
  - CU025
  - CU026
  - CU038
  tableRefs:
  - TU004
  figureRefs:
  - FU002
- id: section-U5
  title: 'Expansion and Concentration: The Defining Risk and the Diversification Path'
  body: 'Revenue concentration is the single most prominent financial risk in the Cerebras customer profile. Top-5 customers
    represented 94% of FY2025 revenue; MBZUAI and G42 alone drove approximately 86%. While concentration improved marginally
    (98% top-5 in FY2024 vs 94% in FY2025), the business remains fundamentally dependent on a handful of sovereign-AI buyers.
    This creates compounding risks. First, UAE geopolitical exposure: any US government action tightening export controls
    for AI hardware to UAE entities — a scenario actively debated in national security circles — could disrupt the majority
    of revenue with limited short-term alternatives. Second, episodic demand risk: MBZUAI''s 62% share is driven by specific
    LLM training programs; conclusion without successor programs would create a severe revenue gap. Third, binary contract
    risk: G42 and MBZUAI are each individual contracts; non-renewal would be immediately material. The path to diversification
    runs through three vectors: (1) OpenAI MRA — adding a large US-based cloud customer transforming the revenue mix; (2)
    AWS marketplace — adding long-tail enterprise through channel; and (3) IBM watsonx — reaching regulated industries. Together,
    these represent a plausible path to reducing UAE concentration below 50% by FY2026-FY2027, but execution risk on the OpenAI
    MRA is the critical variable. A $20B+ notional commitment must be operationalized at hyperscaler service expectations,
    capacity provisioned, and service levels maintained. The IPO at $39.8B market cap (~78x FY2025 revenue) implies the market
    prices in substantial execution on these diversification vectors. Until they demonstrate material revenue, UAE concentration
    risk remains the dominant investor concern.'
  claimRefs:
