figures:
  - id: FU001
    title: Cerebras Customer Journey Map
    type: journey-map
    layout: wide
    summary: >-
      Six-stage customer journey from initial awareness through strategic partnership, covering
      segmented entry points, procurement paths, and expansion loops for Cerebras customers.
    approximationNotes: >-
      Stage timing estimates are inferred from contract announcement timelines and public disclosures;
      no formal customer lifecycle data has been published by Cerebras.
    claimRefs: [CU005, CU015, CU016, CU017, CU029, CU031]
    data:
      items:
        - label: "Awareness and Discovery"
          detail: >-
            Researcher, government CTO, or enterprise AI buyer encounters Cerebras through AI
            conference presentations, Artificial Analysis inference benchmark rankings (#1 throughput),
            academic papers (arXiv 2304.03208), or direct Cerebras sales outreach. Sovereign AI
            programs may be introduced through UAE national AI strategy mandates and government
            procurement solicitations. Cloud API developers discover Cerebras via developer
            communities, GitHub ModelZoo, and HuggingFace ecosystem.
        - label: "Technical Evaluation"
          detail: >-
            Proof-of-concept request: benchmark CS-3 against GPU cluster for target workload.
            For inference customers, compare tokens per second and cost-per-token via
            cloud.cerebras.ai free-tier trial. For training customers, evaluate PyTorch compiler
            compatibility and WSE-3 on-chip SRAM fit for model size (up to 44B parameters).
            Sovereign AI programs may require extended technical pilot with government IT review.
        - label: "Procurement and Contracting"
          detail: >-
            Hardware buyers engage Cerebras enterprise sales for CS-3 purchase order or
            multi-system cluster contract; sovereign AI procurement spans 6-18 months with
            formal government tendering. Cloud API buyers activate via self-serve; no procurement
            friction. Foundation model labs negotiate strategic agreements (MRA, term sheets)
            over 6-18 months at the executive level. Export-license applications for UAE
            customers are filed during this stage.
        - label: "Production Deployment"
          detail: >-
            CS-3 hardware installed in customer datacenter (requires liquid cooling or high-airflow
            environment); Cerebras Cluster Manager configured for multi-system scale. Cloud API
            keys activated; OpenAI-compatible endpoint integrated into application stack.
            MBZUAI and G42 operate dedicated CS-3 clusters for frontier LLM workloads.
            OpenAI routes Codex-Spark inference traffic to Cerebras. GSK runs RNA training jobs.
        - label: "Expansion and Deepening"
          detail: >-
            Additional CS-3 systems ordered for increased model scale or new workload types.
            Cloud API spend grows with inference volume and new model deployments.
            Sovereign customers expand from single-use training to multi-use inference and
            fine-tuning. Enterprise customers move from departmental pilot to division-wide
            production. AWS channel expands Cerebras access to thousands of enterprise
            customers without direct Cerebras sales effort.
        - label: "Strategic Partnership and Advocacy"
          detail: >-
            Largest customers formalize multi-year agreements, MRAs, or strategic investments.
            G42 invests $335M as strategic investor. OpenAI signs $20B+ MRA and provides
            $1B working capital loan. Named customers referenced in Cerebras S-1/A, press
            releases, and conference presentations. Customer advocacy creates pipeline of
            similar institutional buyers in adjacent geographies and verticals.

