  evidenceGaps:
    - id: EGU001
      type: private-evidence-only
      severity: material
      topic: retention-metrics
      missingEvidence: >-
        Net revenue retention (NRR), gross revenue retention (GRR), cohort-level churn rates,
        contract renewal documentation, and any satisfaction survey or CSAT data for the
        Cerebras customer base. These metrics are standard for AI infrastructure investment
        analysis and have not been publicly disclosed in any Cerebras SEC filing or press release.
      whyItMatters: >-
        Without NRR and GRR, it is impossible to determine whether Cerebras revenue growth reflects
        genuine customer expansion versus replacement of churned accounts with new sovereign contracts.
        Given extreme customer concentration (top-2 = 86% of revenue), any undisclosed churn event
        at MBZUAI or G42 would be immediately catastrophic and undetectable from public disclosures alone.
      diligencePath: >-
        Request NRR and GRR by customer segment and by hardware vs. cloud revenue line in private
        management access. Ask for renewal documentation for any hardware contract that has reached
        its initial term. Request confirmation of FY2026 hardware delivery commitments from MBZUAI
        and G42 in writing. Ask for customer satisfaction survey results if any exist internally.
      relatedQuestionRefs: [QU012, QU013]

    - id: EGU002
      type: missing-source
      severity: minor
      topic: customer-count-adoption
      missingEvidence: >-
        Total customer count by fiscal year (FY2022-FY2025), cloud API monthly active developer
        count, enterprise conversion rate from self-serve cloud API trial to committed account,
        and geographic breakdown of cloud API customers beyond the UAE hardware anchor segment.
      whyItMatters: >-
        Without customer count data, it is not possible to assess whether Cerebras is building
        a broad, diversified customer base or deepening wallet share within a handful of accounts.
        The cloud API growth ($151.6M in FY2025) could reflect a small number of large enterprise
        accounts or broad developer adoption; the distinction matters materially for long-term
        revenue durability and diversification prospects.
      diligencePath: >-
        Request total customer count by quarter and revenue tier in private diligence. Request
        cloud API developer MAU and enterprise conversion metrics. Review IR materials and any
        post-IPO quarterly earnings disclosures for customer count guidance. Ask for geographic
        breakdown of cloud revenue to assess US vs. international diversification progress.
      relatedQuestionRefs: [QU027]
