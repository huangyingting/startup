callouts:
- id: KU001
  type: risk
  title: Extreme Revenue Concentration — UAE Entities at ~86% of FY2025
  body: MBZUAI (62%) and G42 (24%) together represented approximately 86% of FY2025 revenue. The top-5 customers accounted
    for 94%. Any disruption to either UAE relationship — through export-control changes, demand shifts, or contract non-renewal
    — would be immediately catastrophic to revenue. This is the single most material risk in the Cerebras investment case
    and requires close monitoring of both the geopolitical and commercial dimensions of these relationships.
  claimRefs:
  - CU021
  - CU022
  severity: high
- id: KU002
  type: risk
  title: UAE Geopolitical and Export Control Exposure
  body: All G42 and MBZUAI shipments require US export licenses, and compliance obligations restrict re-export. US-UAE AI
    hardware export policy is subject to active national security scrutiny. Any tightening of export restrictions could disrupt
    the majority of Cerebras' revenue base with no short-term substitute customer available at the required scale. This is
    a tail risk with low probability but severe potential impact.
  claimRefs:
  - CU023
  - CU024
  severity: high
- id: KU003
  type: insight
  title: 'OpenAI MRA: $20B+ Notional Could Transform the Customer Profile'
  body: The December 2025 OpenAI MRA commits OpenAI to $20B+ in notional cloud inference spend and 750MW of capacity. If executed,
    this single deal would transform Cerebras from a UAE-dependent hardware supplier into a large-scale US-based cloud infrastructure
    company, dramatically reducing concentration risk. The $1B working capital loan creates alignment of interests but also
    financial dependency. MRA conditionality and operationalization timeline are the key execution risks.
  claimRefs:
  - CU011
  - CU012
  - CU031
  severity: high
- id: KU004
  type: risk
  title: MBZUAI Demand Cliff at 62% of Revenue
  body: MBZUAI's 62% revenue share is driven by episodic frontier LLM training programs. Once current training runs conclude,
    hardware demand may not recur at the same scale unless new programs are initiated. If MBZUAI's demand gaps before the
    OpenAI MRA ramps to comparable revenue, Cerebras would face a severe near-term revenue shortfall.
  claimRefs:
  - CU025
  severity: high
- id: KU005
  type: strength
  title: AWS and IBM Channels Expand Addressable Customer Universe
  body: The AWS binding term sheet (March 2026) and IBM watsonx partnership together give Cerebras distribution access to
    enterprise segments not reachable via direct hardware sales. AWS enables self-serve inference procurement for millions
    of enterprise cloud customers; IBM reaches regulated industries. These channels represent Cerebras' clearest path to broad
    enterprise diversification beyond sovereign AI, though they have yet to generate disclosed revenue.
  claimRefs:
  - CU008
  - CU027
  - CU032
  - CU040
  severity: medium
- id: KU006
  type: risk
  title: No NRR/GRR Disclosed — Retention Durability Unverified
  body: Cerebras has not disclosed net revenue retention rate, gross revenue retention rate, or cohort-level churn data. The
    hardware sale model generates episodic revenue, and without proxy metrics (hardware re-purchase rate, renewal statistics),
    the quantitative durability of the revenue base cannot be independently verified. Investors must rely on behavioral signals
    (repeat purchases from G42 and MBZUAI) as retention evidence.
  claimRefs:
  - CU018
  - CU019
  severity: medium
- id: KU007
  type: insight
  title: IPO at ~78x Revenue Prices in Diversification Execution
  body: The May 2026 Nasdaq IPO at $185/share and $39.8B market cap implies approximately 78x FY2025 revenue. This premium
    valuation prices in substantial execution on the OpenAI MRA, AWS channel, and continued UAE sovereign demand. Any slip
    in OpenAI ramp or UAE demand disruption would be materially adverse to valuation given the implied growth expectations
    embedded in the IPO price.
  claimRefs:
  - CU037
  severity: medium
