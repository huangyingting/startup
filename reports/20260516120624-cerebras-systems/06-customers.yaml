- id: adoption-trajectory
  title: Adoption Trajectory
  body: >-
    Cerebras adoption trajectory is characterised by a small number of high-value wins rather than broad horizontal growth.
    The CORAL-2 contract with Argonne National Laboratory under the US Department of Energy represents the foundational anchor
    deployment, executed as part of one of the largest AI-focused government computing procurement programmes in US history.
    GSK and AstraZeneca each completed production deployments in 2023 and 2024, marking the first publicly confirmed commercial
    pharma wins. MBZUAI multi-CS-2 cluster deployment in the UAE adds a sovereign AI programme customer. The launch of Cerebras
    Inference in 2023 extended the potential customer base to developers and enterprises via cloud API access, lowering the
    initial adoption friction substantially. Stanford-affiliated researchers published arXiv papers using Cerebras hardware,
    indicating organic academic adoption that may precede institutional procurement. GitHub ModelZoo stars and Hugging Face
    model downloads provide lagging signals of a broadening developer community. The overall trajectory, from a handful of
    national lab customers in 2021 to multi-segment deployments by 2026, is positive. However, the total account count remains
    opaque and the cloud inference customer base is undisclosed, preventing quantitative assessment of the true growth rate.
  claimRefs:
  - CU009
  - CU010
  - CU011
  - CU012
  - CU013
  - CU014
  - CU015
  - CU016
  tableRefs:
  - TU002
  figureRefs:
  - FU002
- id: named-customer-proof
  title: Named Customer Proof
  body: >-
    The named customer evidence for Cerebras Systems is stronger than typical for a pre-IPO hardware company. GSK deployment
    is confirmed by an official Cerebras case study and VentureBeat coverage, with the use case described as generative AI
    model training for drug discovery, a production workload rather than an exploratory pilot. AstraZeneca involvement is
    corroborated by a GlobeNewsWire press release announcing an expanded collaboration in September 2024. Argonne National
    Laboratory CORAL-2 deployment is documented by both the US Department of Energy and multiple HPCwire reports. Sandia National
    Laboratories issued its own press release confirming CS-2 installation. MBZUAI published an official announcement confirming
    its Cerebras infrastructure for training Arabic and multi-modal foundation models. G42 involvement is cited in Cerebras
    blog materials and corroborated by FT adverse coverage. Lawrence Livermore is referenced in HPCwire as a co-deployer alongside
    Argonne in the CORAL-2 context. Stanford researchers published peer-reviewed arXiv papers using Cerebras hardware for
    LLM training research. At minimum, four customers have unambiguous production-grade deployments backed by official case
    studies or press releases: GSK, Sandia, Argonne, and MBZUAI. Outcome specificity is limited for all customers except GSK,
    where training time reduction is mentioned but not quantified publicly. Developer community presence on GitHub and Hugging
    Face signals broader ecosystem interest beyond named enterprise accounts.
  claimRefs:
  - CU017
  - CU018
  - CU019
  - CU020
  - CU021
  - CU022
  - CU023
  - CU024
  - CU025
  - CU026
