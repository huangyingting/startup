sections:
- id: customer-segmentation
  title: Customer Segmentation
  body: >-
    Cerebras Systems addresses four distinct customer segments as of mid-2026. The pharmaceutical and biotech segment is anchored
    by GSK and AstraZeneca, both of which have publicly confirmed production deployments of Cerebras CS-2 systems for AI-driven
    drug discovery. These buyers are typically CTO or research-lead-initiated, with procurement driven by the need to reduce
    AI model training time for candidate screening and molecular simulation. The US government and national laboratory segment,
    anchored by Argonne, Sandia, and Lawrence Livermore, reflects mission-driven HPC procurement where Cerebras wafer-scale
    throughput competes on scientific ML workloads against GPU clusters. Sovereign AI programmes in the Middle East, led by
    UAE entities MBZUAI and G42, form a third segment that is financially dominant despite its institutional rather than commercial
    character. Academic and research institutions represent a fourth segment with lower commercial value but meaningful signal
    for developer ecosystem formation. The Inference cloud service creates a fifth addressable segment: developers and enterprises
    consuming Cerebras throughput via API. Though cloud customer counts remain undisclosed, the lowered procurement friction
    represents the primary near-term diversification lever. Gartner and IDC market data for 2026 confirm rapid growth in AI
    accelerator demand, suggesting meaningful pipeline headroom across all five segments.
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU006
  - CU007
  - CU008
  tableRefs:
  - TU001
