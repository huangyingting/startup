company:
  name: Cerebras Systems
chapter:
  number: 6
  title: Customers
  summary: >-
    Cerebras Systems serves a small, highly concentrated customer base dominated by two UAE sovereign-AI
    institutions: MBZUAI (Mohamed bin Zayed University of Artificial Intelligence) at 62% of FY2025
    revenue (~$316M) and G42 at 24% (~$122M), together representing 86% of the $510M FY2025 total.
    The top-5 customers accounted for 94% of FY2025 revenue. The primary near-term diversification
    catalysts are the OpenAI Master Revenue Agreement ($20B+ notional, signed December 2025), which
    provides 750MW of committed inference capacity, and a binding AWS term sheet (March 2026) as an
    enterprise channel vehicle. Production proofs include OpenAI Codex-Spark on Cerebras inference
    infrastructure, GSK RNA drug-discovery training (10x speedup, 120x larger dataset), and Sandia
    National Laboratories for scientific computing. Cloud/services revenue grew to $151.6M (29.7%
    of FY2025 total), creating a self-serve land-and-expand vector via cloud.cerebras.ai. No NRR,
    GRR, or churn metrics have been publicly disclosed. The paramount investment risk remains customer
    concentration: any disruption to UAE sovereign demand or tightening of BIS/EAR export controls
    would be immediately catastrophic absent meaningful revenue diversification.

sections:
  - id: customer-segmentation-overview
    title: Customer Base Overview and Segmentation
    body: >-
      Cerebras serves five distinct customer segments differentiated by buyer type, geography, vertical,
      and procurement model. Sovereign AI programs—primarily MBZUAI and G42 in the UAE—constitute the
      anchor segment, representing approximately 86% of FY2025 revenue through large multi-year hardware
      contracts. These buyers are institutional and government-affiliated, with 6-to-18-month procurement
      cycles and extraordinary contract size ($100M+). Foundation model labs and hyperscalers—led by
      OpenAI under a $20B+ Master Revenue Agreement—represent the largest potential expansion segment.
      US national laboratories and defense customers, anchored by Sandia National Laboratories, validate
      scientific computing use cases. Enterprise life-sciences customers such as GSK demonstrate vertical
      adoption for RNA/protein model training. Finally, cloud API developers access Cerebras via
      cloud.cerebras.ai at $0.60 per million input tokens, enabling self-serve adoption with no hardware
      procurement friction. The segmentation reveals a bifurcated revenue model: high-value hardware
      contracts from sovereign and institutional buyers versus a nascent cloud/API business targeting
      the broader developer and enterprise market. Hardware was approximately 70% of FY2025 revenue
      ($358.4M) and cloud/services the remaining 30% ($151.6M), a significant shift from near-zero
      cloud revenue in FY2022.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU031, CU035]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: adoption-trajectory
    title: Adoption Trajectory and Revenue Growth
    body: >-
      Cerebras has achieved rapid revenue growth from a small base, with total revenue growing from
      $24.6M in FY2022 to $78.7M in FY2023, $290.3M in FY2024, and $510M in FY2025—a cumulative
      increase of approximately 1,975% in three years. The FY2022-to-FY2025 compound annual growth
      rate is approximately 174%. Year-over-year growth moderated from 269% (FY2023 to FY2024) to
      76% (FY2024 to FY2025) as the absolute revenue base expanded. The most significant adoption
      signal in FY2025 is the emergence of cloud/services revenue: $151.6M, or 29.7% of total,
      versus near-zero in FY2022 and FY2023. This suggests genuine developer and enterprise adoption
      of the cloud.cerebras.ai inference API, which went generally available in August 2024. The
      customer concentration pattern shows that Cerebras grew by winning a small number of
      extraordinarily large contracts rather than through broad market penetration. G42 represented
      approximately 85% of FY2024 revenue before MBZUAI growth in FY2025 distributed concentration
      across two anchor customers. The OpenAI MRA, signed December 2025, creates a third major revenue
      vector for FY2026 and beyond, though revenue recognition is pending the 750MW infrastructure
      buildout. Customer count remains undisclosed, but the revenue trajectory implies fewer than
      15 customers account for nearly all recognized revenue.
    claimRefs: [CU006, CU007, CU008, CU009, CU010, CU011, CU028, CU029, CU035, CU037]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: named-customer-proof
    title: Named Customer Deployments and Production Evidence
    body: >-
      Cerebras has disclosed five named customers with production or near-production evidence as of
      May 2026. MBZUAI (Mohamed bin Zayed University of Artificial Intelligence), the world's first
      graduate-level AI university based in Abu Dhabi, is the largest single customer at 62% of FY2025
      revenue, operating CS-3 clusters for frontier LLM training and UAE sovereign AI programs. G42,
      an Abu Dhabi AI and technology conglomerate that has invested $335M in Cerebras as a strategic
      partner, accounts for 24% of FY2025 revenue and has been a continuous customer since at least
      FY2022. OpenAI's Codex-Spark coding product runs in production on Cerebras inference
      infrastructure—a hyperscaler-grade production reference disclosed jointly by OpenAI and Cerebras.
      GSK reported a 10x speedup and 120x larger trainable dataset for RNA drug-discovery model
      training on CS-3 hardware, representing the highest-quality quantified outcome disclosure in
      the portfolio. Sandia National Laboratories is named as a CS-3 customer for scientific computing
      and national security AI research. The evidence quality is uneven: MBZUAI and G42 evidence is
      limited to revenue-percentage disclosures in the S-1/A; OpenAI evidence is substantiated by
      public announcements; GSK provides quantified outcomes; and Sandia is a name-only reference.
      No independent G2 or Capterra reviews of the Cerebras platform are publicly available as of
      May 2026. AWS and IBM watsonx are distribution partners with signed agreements but have not
      yet generated recognized revenue.
    claimRefs: [CU012, CU013, CU014, CU015, CU016, CU017, CU018, CU032, CU033, CU034, CU036]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: retention-and-durability
    title: Retention Indicators and Contract Durability
    body: >-
      No net revenue retention (NRR), gross revenue retention (GRR), churn rate, or cohort-based
      retention metric has been publicly disclosed by Cerebras as of May 2026. This is a material
      diligence gap: standard AI infrastructure investment analysis requires retention benchmarks
      to validate customer durability. The available proxy evidence is directionally positive but
      insufficient as a substitute for formal retention KPIs. G42 has been a continuous revenue
      contributor from FY2022 through FY2025, declining in revenue share only because MBZUAI grew
      faster—not because G42 churned. G42's $335M strategic investment further aligns incentives
      for continuity. MBZUAI grew from an implied smaller share in FY2024 to 62% of FY2025 revenue,
      demonstrating strong expansion rather than attrition. The OpenAI MRA structure—a $20B+ notional
      commitment and $1B working capital loan at 6% interest—implies a contractually committed
      long-term relationship that would be costly to exit. However, MRA conditionality terms are
      not publicly disclosed. No formal contract lengths, renewal cadences, or take-or-pay
      commitments have been disclosed for any customer. The absence of retention KPIs in the S-1/A
      is a standard omission for hardware companies at this scale, but it creates a diligence gap
      that should be addressed through private management access before investment.
    claimRefs: [CU019, CU020, CU021, CU022, CU023]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: expansion-and-concentration-risk
    title: Expansion Pathways and Revenue Concentration Risk
    body: >-
      The top-2 customer concentration of 86% (MBZUAI + G42) is extreme by any benchmark for AI
      infrastructure companies at comparable revenue scale. The top-5 customers represented 94%
      of FY2025 revenue. This concentration creates a single-point-of-failure risk: any disruption
      to UAE sovereign demand—whether from geopolitical shifts, export-control tightening, or
      budget reallocation—would be immediately catastrophic to recognized revenue. The BIS/EAR
      export-control dependency for UAE customer shipments (representing 86% of revenue) is the
      most structurally acute risk in the Cerebras investment thesis. Four primary diversification
      vectors have been announced: the OpenAI MRA ($20B+ notional, 750MW committed capacity) is
      the largest and most imminent, capable of adding hundreds of millions in annual recognized
      revenue once operational infrastructure is deployed. The AWS binding term sheet (March 2026)
      provides channel access to thousands of enterprise customers without requiring direct Cerebras
      sales engagement. IBM watsonx partnership targets regulated industries. Cloud API self-serve
      growth enables developer-led adoption with no procurement friction. However, none of these
      three vectors had generated material recognized revenue as of the IPO date (May 2026).
      The diligence question is whether recognized revenue diversification can occur before
      UAE concentration risk materializes. Revenue from FY2023 to FY2025 grew 548% to $510M,
      confirming strong demand—but the customer concentration remains an unresolved structural
      vulnerability.
    claimRefs: [CU024, CU025, CU026, CU027, CU028, CU030]
    tableRefs: [TU005]

  - id: channel-partner-ecosystem
    title: Channel Partners and Market Access Infrastructure
    body: >-
      Cerebras is building a channel ecosystem designed to convert early hyperscaler and enterprise
      partnerships into scalable revenue pipelines. The AWS binding term sheet (March 2026) represents
      the most consequential channel development: AWS would distribute Cerebras inference capacity
      through its Marketplace, exposing Cerebras to the full AWS enterprise customer base including
      regulated industries, financial services, and government verticals. The commercial terms are
      not finalized, and no Marketplace listing was live at IPO. The IBM watsonx partnership
      provides a complementary enterprise channel focused on IBM's traditional regulated-industry
      customers where IBM has established procurement relationships. OpenAI functions as both a
      revenue customer and an indirect distribution channel: Cerebras inference infrastructure
      underpins OpenAI Codex-Spark, providing downstream visibility to OpenAI's developer and
      enterprise customer base. The Cerebras Cloud API (cloud.cerebras.ai) serves as a direct
      self-serve channel that enables individual developers, startups, and enterprise API consumers
      to access inference capacity without navigating hardware procurement. The API is OpenAI
      Chat Completions compatible, reducing developer switching friction to a base-URL change.
      The channel infrastructure as built is appropriately designed for diversification—it combines
      direct enterprise sales (G42, MBZUAI, OpenAI MRA), hyperscaler distribution (AWS), enterprise
      software channel (IBM), and self-serve developer (cloud API). The execution risk is that none
      of the new channels had generated material recognized revenue at IPO.
    claimRefs: [CU015, CU016, CU025, CU026, CU029, CU030, CU031]

