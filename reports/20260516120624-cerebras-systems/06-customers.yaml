  title: Customers
  letter: U
  summary: >-
    Cerebras Systems serves a concentrated but high-value customer base anchored by two global pharmaceutical leaders (GSK,
    AstraZeneca), multiple US national laboratories under the DOE CORAL-2 programme, and Middle Eastern sovereign AI entities
    including MBZUAI and G42. A single UAE-linked customer accounts for more than 50 percent of disclosed revenue, representing
    the dominant diligence risk. Named production deployments are well-evidenced by case studies and government procurement
    records; the Cerebras Inference cloud service expands the addressable buyer universe to developer teams, though commercial
    API customer counts and retention metrics (NRR, GRR) remain undisclosed.
