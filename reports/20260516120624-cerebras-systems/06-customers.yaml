chapter:
  number: 6
  title: Customers
  letter: U
  summary: 'Cerebras'' customer base is small, concentrated, and dominated by two UAE sovereign-AI institutions. MBZUAI (Mohamed
    bin Zayed University of Artificial Intelligence) accounted for 62% of FY2025 revenue ($510M total, +76% YoY) and G42 a
    further 24%, placing roughly 86% of annual revenue with two UAE-affiliated entities. The top-5 customers represented 94%
    of FY2025 revenue. The most significant near-term diversification catalyst is the OpenAI Master Revenue Agreement (MRA)
    signed December 2025: $20B+ notional, 750MW of cloud inference capacity, and a $1B working capital loan at 6% interest.
    A binding AWS term sheet (March 2026) creates a channel-sales vector into broad enterprise, while the IBM watsonx partnership
    targets regulated industries. US national laboratories (Argonne/DOE) anchor US government validation. Hardware revenue
    was 70% of FY2025 ($358.4M), cloud 30% ($151.6M). No churn has been disclosed. The paramount diligence risk remains concentration:
    any disruption to UAE sovereign demand or export-control tightening would be immediately catastrophic without the OpenAI
    and AWS deals having yet generated material diversification revenue.'
