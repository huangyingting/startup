figures:
- id: FU001
  title: Customer journey map
  type: journey-map
  summary: >-
    Key stages from initial AI team evaluation through production deployment and expansion across Cerebras hardware and inference
    cloud.
  data:
    items:
    - label: Awareness and Evaluation
      detail: >-
        Enterprise AI or government HPC team identifies Cerebras as a candidate for training throughput; benchmarks CS-2 against
        GPU cluster alternatives
    - label: Proof-of-Concept Benchmark
      detail: >-
        Customer runs a bounded benchmark workload; typically sponsored by CTO or research director; 30 to 90 day evaluation
        window
    - label: Pilot Deployment
      detail: >-
        Customer procures or rents 1 to 4 CS-2 units for a defined AI workload; initial production data generated
    - label: Production Scale-Up
      detail: Customer scales to multi-CS-2 cluster for ongoing AI training; SLAs and support contracts formalised
    - label: Expansion via Inference Cloud
      detail: >-
        Customer or developer team accesses Cerebras hardware via cloud API for inference workloads; lower friction second-motion
        expansion
  claimRefs:
  - CU004
  - CU007
  - CU015
