callouts:
  - calloutType: risk
    title: "UAE Sovereign Concentration (86% of FY2025 Revenue) Is an Immediate Investment Thesis Risk"
    body: >-
      MBZUAI (62%) and G42 (24%) together represent 86% of FY2025 Cerebras revenue. Both are
      UAE-based entities subject to BIS/EAR export-control licensing for Cerebras hardware shipments.
      Any tightening of US advanced AI semiconductor export restrictions, geopolitical deterioration,
      or budget reallocation by either customer would be immediately catastrophic to recognized
      revenue. The OpenAI MRA and AWS term sheet are structural diversification vehicles, but
      neither had generated material recognized revenue as of the IPO date (May 2026). This
      concentration is the single highest-severity risk in the Cerebras customer diligence.
    claimRefs: [CU001, CU002, CU003, CU004, CU027]

  - calloutType: strength
    title: "OpenAI Codex-Spark Production Deployment Is Hyperscaler-Grade Customer Validation"
    body: >-
      OpenAI's Codex-Spark coding product running in production on Cerebras inference infrastructure
      is the highest-quality customer proof point in the portfolio. It provides hyperscaler-grade
      production validation of the Cerebras WSE-3 inference architecture at commercial scale.
      Combined with the $20B+ Master Revenue Agreement signed December 2025 and $1B working capital
      loan, OpenAI represents the most credible near-term revenue diversification catalyst and the
      most powerful customer reference for enterprise sales into foundation model labs and hyperscalers.
    claimRefs: [CU012, CU015, CU022, CU025]

  - calloutType: insight
    title: "Cloud API Revenue Growth Signals Self-Serve Adoption Momentum Beyond Anchor Customers"
    body: >-
      Cloud and services revenue grew from near-zero in FY2022 to $151.6M in FY2025 (29.7% of
      total), representing the fastest-growing revenue vector in the Cerebras model. The August 2024
      GA of cloud.cerebras.ai with OpenAI-compatible API pricing ($0.60/M tokens for Llama-3 70B)
      enables developer-led adoption without hardware procurement friction. This self-serve vector
      is structurally important: it creates a land-and-expand motion from individual developers to
      enterprise accounts, provides revenue that is not subject to hardware export-control risk,
      and diversifies Cerebras away from the UAE sovereign concentration. The AWS channel
      partnership, if realized, would dramatically accelerate enterprise cloud adoption.
    claimRefs: [CU010, CU029, CU031, CU035]

