callouts:
  - id: KV001
    calloutType: risk
    title: "UAE Concentration Is the Single Most Important Investment Risk"
    body: >-
      At 86% revenue concentration in two sovereign UAE entities, Cerebras carries more customer
      concentration risk than virtually any public technology hardware company of comparable scale.
      The OpenAI MRA and AWS pipeline can theoretically resolve this over 18-24 months, but neither
      has contributed disclosed revenue as of the IPO filing date. Until diversification is confirmed
      in quarterly financial results, MBZUAI and G42 relationship health is the primary monitoring
      metric for any position in CBRS.
    claimRefs: [CV003, CV027, CV033]

  - id: KV002
    calloutType: insight
    title: "The Withdrawn S-1 Premium: What Changed Between 2024 and 2026"
    body: >-
      The September 2024 S-1 sought $4 billion at 29x trailing revenue. The 2026 IPO succeeded at
      approximately 30-45x NTM revenue — seemingly similar multiples but on 3.75x more revenue.
      The 2026 IPO succeeded not because the original valuation was wrong, but because Cerebras
      compounded revenue rapidly enough to make the multiple look smaller while the absolute market
      cap grew. The OpenAI MRA announcement was the catalyst that overcame investor hesitation about
      customer concentration. This dynamic means the bull case is execution-driven, not re-rating-driven —
      an important distinction for any investor expecting multiple expansion from current levels.
    claimRefs: [CV009, CV010, CV031, CV034]

  - id: KV003
    calloutType: assumption
    title: "Base Case Requires Both UAE Stability and OpenAI Execution"
    body: >-
      The base case scenario is not a conservative outcome — it requires two independent things to go
      right simultaneously: UAE revenue must hold flat or grow while OpenAI MRA begins contributing
      revenue. If either leg fails, the base case revenue trajectory collapses toward the bear case.
      This two-leg dependency means the probability-weighted expected value is lower than a simple
      average of bear, base, and bull case enterprise values would suggest.
    claimRefs: [CV005, CV022, CV025, CV033]

