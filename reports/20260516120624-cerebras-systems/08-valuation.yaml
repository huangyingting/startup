company:
  name: Cerebras Systems
chapter:
  number: 8
  title: Valuation
  summary: >-
    Cerebras Systems completed its IPO on May 14, 2026 at $185 per share, raising $5.55 billion in what Bloomberg
    called the largest U.S. tech IPO since Uber in 2019. At FY2025 revenue of $510 million (76% YoY growth),
    the IPO implies approximately 30-45x NTM revenue — a premium that demands sustained 50%+ revenue growth,
    successful diversification away from UAE customer concentration (86% of 2025 revenue), and execution on
    the OpenAI $20B+ MRA. The recommendation is conditional TRACK: the AI hardware thesis is structurally
    compelling and the growth record is exceptional, but the valuation leaves limited margin of safety and
    key concentration, export-control, and governance risks are not yet priced conservatively.

sections:
  - id: sv-thesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      The Cerebras investment thesis rests on five structurally grounded pillars. First, the AI inference market
      is growing at 40%+ CAGR and represents the fastest-expanding segment of AI infrastructure spend, and
      Cerebras has deployed the only wafer-scale chip architecture delivering 2,100+ tokens per second — a
      performance advantage of 10-15x over GPU-cluster alternatives for memory-bandwidth-bound inference
      workloads. Second, the company has demonstrated repeatable commercial traction at scale: revenue grew
      from $78.7 million in FY2023 to $510 million in FY2025 (CAGR exceeding 100%), and the S-1/A filing
      confirms this trajectory is hardware and cloud inference revenue, not one-time project fees. Third,
      the OpenAI $20B+ master revenue agreement announced December 2025 and the AWS binding term sheet
      (March 2026) represent two independent demand pipelines that could collectively exceed $2 billion in
      annual compute spend and materially diversify Cerebras away from its current UAE concentration. Fourth,
      the IPO itself validates institutional investor appetite for WSE-based AI compute at scale; the $5.55
      billion raised is not speculative capital — it is capital deploying against an identified whitespace
      in the AI accelerator market where Nvidia's GPU ecosystem has pricing power but not a monopoly.
      Fifth, the dual-class structure and founder continuity (Andrew Feldman, Sean Lie) preserve strategic
      optionality to invest in next-generation WSE architecture without short-term earnings pressure.

      The anti-thesis is equally substantive. The 86% UAE customer concentration (MBZUAI 62%, G42 24% of
      FY2025 revenue) creates asymmetric downside: any deterioration in either relationship — whether from
      US export control enforcement, geopolitical instability, or MBZUAI/G42 budget reallocation — would
      compress FY2026 revenue dramatically without a replacement pipeline of comparable size. Nvidia's CUDA
      ecosystem and B200/GB200 NVL72 Blackwell architecture continues to dominate enterprise AI training
      and inference at scale, and the software moat compounds annually. Hardware-first business models
      historically trade at 8-12x revenue in public markets, not 30-45x; Cerebras's premium multiple is
      priced to perfection and embeds almost no multiple-compression buffer. Export controls remain a
      live risk: the Saudi Aramco CFIUS review that delayed the 2024 S-1 was resolved, but BIS restrictions
      on advanced AI chip sales to UAE and Saudi Arabia remain an active regulatory uncertainty. Finally,
      the withdrawn 2024 S-1 attempt is a permanent part of the record — the original $4B valuation
      sought was not achievable in the 2024 market; the 2026 IPO succeeded only after 20 months of
      continued revenue growth, improved macro conditions, and the OpenAI MRA announcement.
    claimRefs: [CV001, CV003, CV004, CV005, CV006, CV007, CV024, CV025, CV026, CV027, CV028, CV029, CV030, CV031]
    tableRefs: [TV002]
    figureRefs: [FV001]

  - id: sv-recommendation
    title: Recommendation and Stance
    body: >-
      The recommendation is conditional TRACK at the IPO price of $185 per share. The evidence supports
      patience: Cerebras has an exceptional revenue growth record, a genuinely differentiated product,
      and two large downstream contracts (OpenAI, AWS) that could catalyze customer diversification.
      But the IPO price implies 30-45x NTM revenue — a multiple that assumes both continued 50%+ revenue
      growth and successful execution of the OpenAI and AWS contracts simultaneously. Neither is confirmed
      in current financial statements.

      Confidence is medium. The company is now public, which means quarterly financial disclosures will
      close many information gaps within 6-12 months. The S-1/A filing provides full revenue history,
      confirms the UAE concentration risk, and discloses the dual-class voting structure. The IPO
      underwriting by Goldman Sachs, Morgan Stanley, and Citigroup provides third-party demand validation.
      However, key unknowns remain: operating margins are not disclosed at the segment level, the
      OpenAI MRA drawdown conditionality is not fully specified, and export control compliance for UAE
      customers under the current BIS regulatory regime has not been publicly confirmed for post-IPO
      operations. Risk rating is high. Three independent shocks — UAE concentration, export controls,
      and Nvidia competitive displacement — each carry sufficient impact to break the base case thesis.

      Valuation stance is aggressive. A patient AI hardware investor with 3-5 year horizon and
      high risk tolerance can underwrite the bull case (Cerebras reaches $1.5-2B revenue by FY2027,
      OpenAI and AWS execute at scale, 15-20x NTM = $22-40B market cap = 2-3x from IPO price). The base
      case targets $900M-1.1B NTM revenue at 12-15x = $11-17B enterprise value — approximately flat to
      10-15% downside from IPO pricing depending on total share count. The bear case ($500-700M
      revenue, 8-10x multiple, $4-7B market cap) implies severe downside from IPO price.
      This asymmetry (limited base case upside, substantial bear case downside, compelling bull case)
      defines the TRACK stance: monitor execution closely, establish a position only at material discount
      to IPO price or with confirmed evidence of diversification, and maintain strict kill triggers.
    claimRefs: [CV008, CV009, CV010, CV012, CV013, CV014, CV015, CV021, CV022, CV023, CV037]
    tableRefs: [TV001]
    figureRefs: [FV004]

  - id: sv-financing
    title: Financing and Valuation Context
    body: >-
      Cerebras completed its IPO on May 14, 2026 at $185 per share, raising $5.55 billion in gross proceeds.
      This is the largest US technology IPO since Uber in 2019. The S-1/A Amendment No. 2, filed in
      May 2026, discloses FY2025 revenue of $510 million, FY2024 revenue of $290.3 million, and FY2023
      revenue of $78.7 million — a compound growth rate that few hardware companies have achieved at
      this scale. Pre-IPO, Cerebras raised approximately $720 million in total equity across multiple
      rounds, including a Series F of approximately $250 million in November 2021 at a $4 billion
      valuation, which was the reference mark when the original 2024 S-1 was filed.

      The original S-1 filed in September 2024 sought a valuation of approximately $4 billion at trailing
      12-month revenue of $136.4 million (H1 2024) — roughly 29x trailing revenue. That S-1 was withdrawn
      in November 2024 after weak institutional feedback, consistent with the AI chip market multiple
      compression visible in the sector during late 2024. The successful 2026 IPO at approximately
      30-45x NTM revenue (depending on total shares outstanding and FY2026 revenue trajectory) represents
      a meaningful step-up from the 2021 Series F reference mark and from the attempted 2024 IPO price.
      The step-up is justified by the revenue growth (from $136M trailing in H1 2024 to $510M FY2025)
      but it does embed an elevated multiple premium relative to comparable public hardware peers.

      The IPO preference structure is publicly disclosed via the S-1/A. The dual-class share structure
      preserves approximately 99.2% of voting power for founders, limiting external governance influence.
      Dilution from IPO shares and potential employee stock plan exercises will need to be tracked
      over the first four post-IPO quarters. No convertible debt or preferred equity overhang is
      disclosed in the public filings, which is a positive relative to many pre-IPO tech issuers.
      The $5.55 billion raised provides 10+ years of operating runway at current burn rates, effectively
      removing any near-term financing risk from the investment thesis.
    claimRefs: [CV001, CV002, CV010, CV011, CV015, CV016, CV017, CV031, CV034, CV039, CV040]
    tableRefs: [TV004]
    figureRefs: [FV003]

  - id: sv-scenarios
    title: Bull, Base, and Bear Scenarios
    body: >-
      The bull case assumes Cerebras executes on both the OpenAI MRA and AWS term sheet simultaneously,
      growing FY2026 revenue to $900M and FY2027 revenue to $1.5-2B as inference-at-scale demand
      compounds. In this scenario, the UAE concentration falls below 40% by FY2027 as OpenAI, AWS,
      and domestic enterprise clients ramp. Revenue multiples in the 15-20x range apply as the company
      demonstrates durable operating leverage and Nvidia displacement in latency-sensitive inference
      workloads. At 17.5x $2B revenue, the implied enterprise value is $35B — approximately 2.5x
      from the $185 IPO price on a $14B market cap (using a 20% IPO float estimate). Probability of
      bull case: approximately 20-25%.

      The base case assumes the OpenAI MRA begins contributing revenue in H2 2026 but at below-plan
      rates, UAE revenue holds flat as MBZUAI and G42 extend existing contracts, and the AWS term
      sheet closes but takes 12-18 months to generate meaningful revenue. FY2026 revenue reaches
      $700-900M (40-75% growth), FY2027 reaches $900M-1.1B. At 12-14x NTM revenue of $1B,
      the enterprise value is $12-14B — approximately 7-14% downside to the implied market cap
      from IPO price. Probability of base case: approximately 50%.

      The bear case assumes US BIS export controls are tightened to restrict UAE AI chip sales,
      materially impacting MBZUAI and G42 revenue in H2 2026. FY2026 revenue contracts to $400-500M
      as the pipeline proves insufficient to replace UAE decline. The OpenAI MRA drawdown is delayed
      by counterparty execution challenges. Revenue multiple compresses to 8-10x as hardware-first
      peers in public markets struggle. At 9x $500M revenue, the enterprise value is $4.5B —
      representing 65-75% downside from the IPO implied market cap. Probability of bear case:
      approximately 25-30%.
    claimRefs: [CV021, CV022, CV023, CV005, CV006, CV029, CV030, CV033, CV041]
    tableRefs: [TV003]
    figureRefs: [FV002]

  - id: sv-comparables
    title: Comparable Set and Methodology
    body: >-
      The appropriate valuation methodology for Cerebras is a revenue multiple framework anchored to
      NTM revenue estimates, with scenario sensitivity to multiple compression and revenue growth
      deceleration. At $510M FY2025 revenue and 76% growth, the company is too large for pure ARR
      multiple approaches used in early-stage SaaS but too hardware-dependent for pure software
      SaaS multiples. A blended comparable set — public AI hardware companies, AI cloud infrastructure
      peers, and comparable private rounds — is the appropriate framework.

      Public hardware comparables: Nvidia (NVDA) trades at approximately 25x NTM revenue as of May 2026
      on fiscal year 2026 data center revenue of $47B+, implying a premium that reflects Nvidia's
      dominant market position, >70% gross margins in data center, and software ecosystem moat.
      AMD (AMD) trades at approximately 8x NTM revenue, reflecting lower AI chip market share and
      more commodity exposure. These two endpoints bracket the hardware peer range; Cerebras at
      30-45x NTM would require sustained Nvidia-like market share trajectory — defensible only if
      inference workloads shift materially to WSE architecture, which is not yet confirmed at scale.

      Private AI chip comparables: Groq's last disclosed valuation of approximately $2.8 billion
      at an estimated $750 million ARR implies a 3.7x ARR multiple — dramatically below Cerebras's
      IPO multiple, reflecting Groq's smaller scale, narrower customer base, and no public market
      liquidity premium. SambaNova Systems at an estimated $5.1 billion valuation at $450M ARR
      estimated implies approximately 11x ARR — closer to Cerebras's range. Tenstorrent was valued
      at approximately $2.6 billion in its 2025 funding round, significantly smaller scale.

      The original Cerebras S-1 (September 2024) sought approximately $4 billion at $136M trailing
      revenue (29x trailing), providing a historical reference point. The successful 2026 IPO at
      $185/share represents a significant premium to that prior reference, justified primarily by
      the $374 million revenue addition in 18 months and the OpenAI MRA announcement. The methodology
      most defensible for investors is NTM revenue multiple with explicit scenarios for both the
      multiple (8-20x range) and revenue ($700M-$2B range) — the 2x revenue uncertainty alone spans
      a $5.6-16B valuation swing at 8x, highlighting how sensitive returns are to growth execution.
    claimRefs: [CV016, CV017, CV018, CV019, CV020, CV034, CV035, CV036, CV038, CV039]
    tableRefs: []
    figureRefs: []

  - id: sv-exit
    title: Exit Readiness and Diligence Asks
    body: >-
      Cerebras is now a public company, so the traditional "exit readiness" framing shifts to
      three related questions: (1) Is the IPO price a durable entry point, or will post-IPO
      price discovery reveal a more attractive secondary market entry? (2) What are the specific
      thesis-break events that should trigger position reduction? (3) What diligence remains
      outstanding that the first quarterly earnings call (expected Q3 2026) should resolve?

      For existing pre-IPO shareholders, the lock-up expiry (typically 90-180 days post-IPO) will
      create a supply-side event. Given founders hold 99.2% of voting power, insider selling decisions
      at lock-up expiry will be the most important near-term price catalyst and need to be monitored.
      Management commentary on the OpenAI MRA drawdown cadence, the AWS term sheet closing timeline,
      and export control compliance status for UAE customers in the first quarterly earnings call
      will determine whether the base case trajectory is on track. Investors should define
      in advance what FY2026 Q1 and Q2 revenue numbers constitute "on track" vs. "at risk"
      before receiving earnings data.

      Key thesis-break triggers include: any confirmation that BIS has restricted or intends
      to restrict UAE AI chip sales post-IPO (which would directly impact the two largest customers);
      FY2026 Q1-Q2 revenue growth below 30% YoY (which would signal UAE dependency is not being
      diversified fast enough); any delay in the OpenAI MRA converting to actual revenue
      beyond Q3 2026; or any competitive announcement from Nvidia that directly addresses
      the Cerebras inference throughput advantage with equivalent economics.

      Final diligence asks for investors entering at or near IPO price include: segment-level gross
      margin disclosure to understand if hardware vs. cloud subscription economics differ materially;
      contract structure disclosure for the OpenAI MRA (minimum commitments vs. optional purchase
      rights vs. take-or-pay); export control legal opinion on UAE customer status post-IPO; and
      the specific technology roadmap for WSE-4 to confirm R&D investment continuity at the
      $1.7B+ invested-to-date level.
    claimRefs: [CV032, CV033, CV037, CV040, CV041, CV042]
    tableRefs: [TV005, TV006]
    figureRefs: []

