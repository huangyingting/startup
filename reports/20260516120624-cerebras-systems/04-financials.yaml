callouts:
  - title: "Revenue Concentration in Two Customers Is the Dominant Financial Risk"
    type: risk
    body: >
      MBZUAI (62% of 2025 revenue, 77.9% of AR) and G42 (24% of 2025 revenue) together
      represented approximately 86% of Cerebras's 2025 revenue from two customers, both
      linked to the UAE government. Loss or renegotiation of either relationship—or any
      U.S. government restriction on sales to UAE entities—would cause a revenue decline
      that no plausible hardware ramp with other customers could offset in the near term.
      This concentration risk is explicitly flagged in Cerebras's SEC risk factors.
    claimRefs: [CI003, CI004, CI036, CI038]

  - title: "OpenAI MRA Is a Transformational Forward Commitment — With Unknown Conditionality"
    type: insight
    body: >
      The $20B+ OpenAI Master Revenue Agreement, signed December 2025, is the largest customer
      commitment in Cerebras's history and potentially the most important forward revenue item
      at the May 2026 IPO. If unconditional, it diversifies the customer base meaningfully and
      provides multi-year revenue visibility. However, the draw schedule, pricing per capacity
      unit, and conditionality clauses are not disclosed. Investors and analysts are effectively
      underwriting a commitment whose terms are opaque, which is a material information asymmetry.
    claimRefs: [CI013, CI014, CI034]

  - title: "GAAP Profit Is Misleading; Non-GAAP Loss Is the Better Underlying Indicator"
    type: risk
    body: >
      Cerebras reported $237.8M GAAP net income in 2025 alongside -$75.7M non-GAAP net loss.
      The ~$313M gap represents non-cash items—likely stock-based compensation, warrant
      fair value changes from the OpenAI and AWS warrants, and other non-recurring adjustments.
      GAAP profitability should not be taken as evidence of a self-funding business; the
      underlying cash economics reflect a company that is still loss-making on an adjusted basis,
      and achieving sustainable non-GAAP profitability requires either meaningful margin expansion
      or revenue scale from the OpenAI/AWS partnerships.
    claimRefs: [CI007, CI008, CI029]

  - title: "Post-IPO Capital Adequacy Is Strong — Primary Risk Is Execution on Partnerships"
    type: strength
    body: >
      With approximately $6.5B+ in combined cash from the Series G, IPO proceeds, and the
      OpenAI Working Capital Loan, Cerebras has sufficient capital to fund operations for
      several years at current burn rates and execute on the planned TSMC capacity commitments
      for OpenAI and AWS partnerships. The primary capital risk is not near-term liquidity but
      rather execution risk on the $20B+ MRA and AWS binding term sheet—if revenue drawdowns
      are slower than modeled, working capital will be deployed ahead of revenue recognition.
    claimRefs: [CI009, CI010, CI011, CI018, CI037]

