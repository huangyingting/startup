company:
  name: Cerebras Systems
chapter:
  number: 4
  title: Financials

sections:
  - id: S01
    title: Revenue Streams and Pricing Model
    body: |
      Cerebras has three disclosed revenue streams: hardware system sales (CS-3 compute
      systems), cloud inference API (Cerebras Cloud), and professional services/support. Hardware
      sales account for the vast majority of historical revenue; the inference API is newer but
      growing. Revenue recognized for fiscal years 2022–2025 was $24.6M, $78.7M, $290.3M, and
      $510.0M respectively, representing a 220% CAGR over three years. The 2024–2025 growth rate
      was 76% YoY, which is exceptional for a hardware company with nine-digit revenue. This
      trajectory is substantially driven by two customers: MBZUAI (62% of 2025 revenue) and G42
      (24% of 2025 revenue, down from 85% in 2024). Customer concentration is the primary revenue
      quality concern.

      Hardware pricing: CS-3 compute systems are sold at approximately $2–4M per system based on
      reported deal values; no official list price is published. Cloud inference API pricing is
      published at $0.60 per million input tokens for Llama-3 70B. Inference API pricing is fully
      managed with no hardware reservation requirement, creating a lower-friction entry for
      customers but likely lower gross margin than hardware sales. Revenue recognition for hardware
      likely follows point-in-time recognition upon delivery and acceptance; inference API revenue
      is recognized ratably. No segment-level revenue breakdown is publicly available.
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: S02
    title: GTM Motion and Sales Efficiency
    body: |
      Cerebras's go-to-market is primarily direct sales to large-scale AI research institutions,
      government-linked sovereign AI programs, and hyperscalers. The disclosed customer base as
      of the May 2026 IPO is small and highly concentrated: MBZUAI, G42, GSK, and OpenAI (via
      the $20B+ MRA announced December 2025). There is no disclosed reseller channel, OEM
      distribution partner, or cloud marketplace listing as of the IPO date, though the AWS
      binding term sheet (March 2026) would add a distribution channel when executed.

      Sales cycle for hardware is likely 6–18 months given enterprise procurement requirements
      for $2–4M capital decisions. Customer acquisition cost (CAC), average contract value (ACV),
      and net revenue retention (NRR) are all undisclosed private metrics. The Saudi Aramco CFIUS
      review, which delayed the 2024 IPO filing, was a material governance consideration that
      appears to have been resolved prior to the 2026 listing. OpenAI's $20B+ MRA represents a
      foundational anchor for the inference-as-a-service GTM channel; its drawdown conditionality
      and timeline are not disclosed but represent the largest single GTM execution risk.
    tableRefs: []
    figureRefs: [FI002]

  - id: S03
    title: Cost Structure and Gross Margin
    body: |
      Cerebras's cost of goods sold (COGS) is primarily wafer fabrication cost at TSMC for the
      WSE-3 chip. The 46,225mm² die on a full 5nm wafer is among the highest-cost semiconductor
      processes commercially available; no unit cost data has been disclosed. Additional COGS
      components include CS-3 chassis assembly, interconnect hardware, and integration labor.
      Cloud inference API COGS includes data center compute and networking to host the shared
      WSE-3 clusters. Gross margin was approximately 42% in 2024 and 39% in 2025. The 3-point
      compression from 2024 to 2025 is likely a mix of revenue scale (more volume, more TSMC
      wafers), product mix, and infrastructure costs for the growing inference API business.

      At 39–42% hardware gross margin, Cerebras compares unfavorably to NVIDIA's ~75% data
      center gross margin, but this reflects the difference between a fabless IP licensor (NVIDIA)
      and a full-stack hardware system vendor (Cerebras). More relevant comparables are
      hyperscaler-committed AI hardware vendors, where 35–45% is a reasonable range. The
      non-GAAP net loss of -$75.7M in 2025 versus GAAP net income of $237.8M implies
      approximately $313M in non-cash charges—likely a combination of stock-based compensation,
      warrant fair value adjustments, and potentially other non-recurring items. Operating
      leverage and path to sustainable non-GAAP profitability are the critical near-term questions.
    tableRefs: [TI003]
    figureRefs: []

  - id: S04
    title: Capital Adequacy and Financing
    body: |
      Cerebras entered the May 2026 IPO with approximately $1.1B raised in September 2025
      (Series G at $8.7B valuation) and an additional $5.55B raised in the IPO at $185/share.
      Combined with the $1B OpenAI Working Capital Loan (6%, matures December 31, 2032), post-IPO
      liquidity is substantial. The company's capitalization is augmented by two warrant packages:
      OpenAI holds 33.4 million warrants at $0.00001 per share, and AWS holds approximately
      2.7 million warrants at $100 per share. These represent dilutive obligations tied to
      commercial partnerships.

      Capital intensity stems from the need to pre-purchase TSMC wafer runs and manage CS-3
      inventory ahead of revenue recognition. Working capital requirements are high relative to
      asset-light software companies; accounts receivable from MBZUAI represented 77.9% of total
      AR at December 31, 2025, creating a concentration-dependent collections risk. Planned use
      of IPO proceeds is not publicly disclosed in detail but likely includes TSMC capacity
      commitments, CS-3 inventory build for OpenAI and AWS partnerships, and general working
      capital. The company has no disclosed covenant violations or liquidity concerns, and post-IPO
      cash position is strong enough to fund operations for several years at current burn rates.
    tableRefs: [TI004]
    figureRefs: [FI003]

  - id: S05
    title: Public Financial Gaps and Verdict
    body: |
      The primary financial diligence blockers are: (1) the OpenAI $20B+ MRA draw schedule and
      conditionality—whether minimum revenue commitments are unconditional or milestone-dependent
      is critical to 2026–2028 revenue modeling; (2) unit economics—no CAC, ACV, NRR, or gross
      margin by business line is disclosed; (3) WSE-3 wafer yield and production cost—COGS
      modeling is impossible without per-wafer economics; and (4) working capital adequacy for
      large-scale capacity commitments.

      The financial verdict on Cerebras at the May 2026 IPO is mixed. Revenue quality is
      structurally weak due to extreme customer concentration (MBZUAI + G42 = ~86% of 2025
      revenue from two entities) and a large unverified forward commitment (OpenAI MRA). Revenue
      growth is impressive but comparisons to historical benchmarks must account for the unusual
      structure. Gross margin at 39–42% is consistent with a high-quality hardware company but
      well below software comparable multiples. GAAP profitability is notable but driven by
      non-recurring items; underlying economics are loss-making on a non-GAAP basis.

      Capital adequacy post-IPO is strong. The primary financing risk is not near-term liquidity
      but rather the execution risk of the OpenAI MRA and AWS partnership—if either stalls, the
      implied 2026–2027 revenue guidance embedded in valuation multiples would require downward
      revision. Geopolitical risk (G42's UAE ties, MBZUAI's Abu Dhabi government ownership) is a
      persistent overhang that could affect U.S. regulatory treatment of Cerebras's largest
      commercial relationships.
    tableRefs: [TI005]
    figureRefs: [FI004]

