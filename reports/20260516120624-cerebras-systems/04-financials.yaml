  evidenceGaps:
    - id: EGI001
      gapType: private-evidence-only
      severity: blocking
      description: >
        Cerebras's CAC, ACV, and net revenue retention rate are not disclosed in any SEC filing
        or investor communication. Unit economics for both hardware and inference API segments
        are unverifiable without these metrics. This is a diligence blocker for revenue
        quality assessment.
      relatedQuestionRefs: [QI026]

    - id: EGI002
      gapType: private-evidence-only
      severity: blocking
      description: >
        The OpenAI $20B+ MRA draw schedule, conditionality clauses, and per-unit pricing are
        not publicly disclosed. Revenue modeling for 2026–2028 is not possible without knowing
        whether the commitment is unconditional or milestone-dependent, and what the drawdown
        timeline looks like.
      relatedQuestionRefs: [QI020]

    - id: EGI003
      gapType: private-evidence-only
      severity: material
      description: >
        WSE-3 unit production volumes, manufacturing yield rates, and per-wafer TSMC costs
        are not disclosed. Gross margin modeling at the unit level requires these inputs; their
        absence limits COGS forecasting to blended estimates only.
      relatedQuestionRefs: []

    - id: EGI004
      gapType: missing-source
      severity: minor
      description: >
        Cerebras had not filed a 10-K or 10-Q as of the May 2026 IPO date; only S-1/A
        registration statements are available. Auditor-reviewed quarterly data and GAAP/non-GAAP
        reconciliation detail will be available after the first post-IPO quarterly filing.
      relatedQuestionRefs: []

    - id: EGI005
      gapType: private-evidence-only
      severity: material
      description: >
        MBZUAI and G42 contract terms (pricing, renewal, exclusivity, termination rights)
        are confidential. The risk of contract renegotiation or termination cannot be
        quantified from public data alone.
      relatedQuestionRefs: []

