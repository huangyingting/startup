  topStrengths:
    - >-
      Genuine hardware breakthrough: WSE-3 delivers 15x faster LLM inference than H100 at low batch sizes — a
      defensible, hard-to-replicate advantage
    - 'Revenue scale and growth: $136M H1 2024 revenue represents substantial commercial traction ahead of IPO'
    - Blue-chip national lab and pharma customer base (LLNL, ANL, GSK) provides credibility and diversification anchors
    - First-mover in wafer-scale integration with three chip generations and significant IP moat
    - AWS partnership expands distribution to enterprise cloud customers without additional hardware capex
  topRisks:
    - >-
      G42/UAE customer concentration: 86% of H1 2024 revenue from one customer under active CFIUS scrutiny creates
      existential revenue risk
    - >-
      IPO delayed by CFIUS review: inability to access public markets limits capital options and employee liquidity,
      increasing churn risk
    - >-
      TSMC sole-source dependency: wafer-scale chip can only be manufactured by TSMC; any geopolitical disruption halts
      production entirely
    - >-
      NVIDIA ecosystem moat: CUDA's 4M+ developer base and dominance in training creates a formidable switching cost
      against Cerebras expansion
    - >-
      Export control escalation: tightening BIS rules on advanced AI chip exports could restrict or eliminate sales to
      UAE and other foreign customers
  unresolvedGaps:
    - G42 contract structure and contingency plan if CFIUS forces Cerebras to end the relationship
    - WSE-3 production yield rates and per-unit manufacturing cost economics
    - IPO re-filing timeline and capital runway post-S-1 withdrawal
    - Non-G42 revenue breakdown by customer segment
