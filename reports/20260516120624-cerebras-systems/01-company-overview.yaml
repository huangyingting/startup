callouts:
  - calloutType: strength
    title: "Wafer-Scale Architecture Delivers Differentiated Inference Speed"
    body: >-
      The WSE-3's 900,000 AI cores and 21 PB/s on-chip memory bandwidth enable inference throughput of
      2,100+ tokens per second, reportedly up to 15x faster than NVIDIA GPU-based deployments for LLM
      workloads. This architectural moat is difficult to replicate quickly: the chip requires TSMC
      wafer-scale bonding expertise and proprietary interconnect design developed over nearly a decade.
      GSK's independent validation (10x speedup on RNA model training) and the $20B+ OpenAI contract
      provide third-party evidence that performance claims translate to real customer value.
    claimRefs: [CO024, CO027, CO031]

  - calloutType: risk
    title: "UAE Customer Concentration Creates Fragile Revenue Base at IPO"
    body: >-
      MBZUAI (62%) and G42 (24%) together represented roughly 86% of 2025 revenues. This concentration
      exposes Cerebras to geopolitical risk (UAE-US diplomatic relations, export controls), single-customer
      negotiating leverage, and potentially catastrophic revenue loss if either relationship deteriorates.
      The $20B+ OpenAI MRA reduces future UAE dependence but remains unexecuted in revenue terms as of
      the IPO date. Investors who priced in steep growth will face severe re-rating risk if near-term
      contract disruption materializes.
    claimRefs: [CO015, CO016, CO017, CO025]

  - calloutType: insight
    title: "GAAP Profitability Driven by Non-Cash Warrant Gains, Not Operating Cash Flow"
    body: >-
      Cerebras' $237.8M GAAP net income in 2025 contrasts sharply with a non-GAAP net loss of $75.7M.
      The divergence reflects non-cash gains from OpenAI and AWS warrant fair-value revaluations, which
      are excluded under non-GAAP accounting. On a cash-adjusted operating basis the company remains
      pre-profitable. Investors should evaluate Cerebras on non-GAAP metrics and forward revenue
      trajectory from the OpenAI MRA, not the headline GAAP profit figure.
    claimRefs: [CO012, CO013]

  - calloutType: assumption
    title: "Pre-IPO Round Breakdown Partially Inferred from S-1 Disclosure"
    body: >-
      Total pre-IPO funding of approximately $720M is cited from the S-1/A filing, but individual round
      sizes for Series A through Series G are not fully disaggregated in public filings. The Series H
      combined equity component and the $1B OpenAI Working Capital Loan are the most clearly documented
      events. Exact VC firm-by-firm ownership stakes require cap table access from Cerebras investor
      relations and are not publicly available.
    claimRefs: [CO022, CO028, CO038]

