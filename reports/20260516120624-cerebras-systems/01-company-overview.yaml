company:
  name: "Cerebras Systems"
chapter:
  number: 1
  title: "Company Overview"
  summary: >-
    Cerebras Systems is a Sunnyvale, California-based AI accelerator company that designs wafer-scale
    chips and operates an inference cloud service. Founded in April 2016, Cerebras went public on Nasdaq
    (CBRS) on May 14, 2026 at $185 per share, raising $5.55 billion in what Bloomberg called the largest
    U.S. tech IPO since Uber in 2019. Revenue grew 76% in 2025 to $510 million, though UAE-based customers
    MBZUAI and G42 represented roughly 86% of 2025 revenues. Founders hold approximately 99.2% of voting
    power via a dual-class share structure, and the WSJ framed the IPO as a huge bet on Nvidia fatigue.

sections:
  - id: section-1
    title: "Company Identity, Legal Structure, and Business Model"
    body: >-
      Cerebras Systems Inc. is a Delaware corporation founded in April 2016, headquartered at 1237 E.
      Arques Avenue, Sunnyvale, California 94085. The company designs and manufactures the Wafer-Scale
      Engine (WSE), the world's largest commercially produced integrated circuit, integrating it into the
      CS-3 compute system. Its core business model spans two complementary revenue streams: direct hardware
      sales of CS-3 clusters to hyperscalers, research institutions, and government-affiliated AI labs;
      and cloud-based inference services via the Cerebras Inference Cloud API accessible at
      cerebras.ai/inference and cloud.cerebras.ai. The inference cloud service enables customers to run
      large language models at throughput exceeding 2,100 tokens per second, which the company advertises
      as up to 15 times faster than NVIDIA GPU-based deployments for equivalent LLM workloads. Cerebras
      is a fabless chip designer: all silicon fabrication is outsourced to TSMC on its 5-nanometer process.
      The WSE-3, the latest generation chip, integrates 4 trillion transistors across a 46,225 mm² die,
      with 900,000 AI cores, 44 GB of on-chip SRAM, and 21 petabytes per second of on-chip memory
      bandwidth. Cerebras began trading on the Nasdaq Global Select Market under ticker CBRS on May 14,
      2026 following completion of its initial public offering. The company's value proposition centers
      on speed-first AI inference at scale, positioning its chip as a replacement for large multi-GPU
      clusters in latency-sensitive inference applications.
    claimRefs: [CO001, CO002, CO024, CO026, CO027]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: section-2
    title: "Founding Team and Executive Leadership"
    body: >-
      Cerebras was co-founded by Andrew D. Feldman (CEO), Sean Lie (CTO), Gary Lauterbach, and colleagues
      who previously worked together at SeaMicro, a high-density server startup acquired by AMD for $334
      million in 2012. Feldman had served as SeaMicro's CEO and later as Corporate Vice President of Server
      Business at AMD. Lie holds a Bachelor of Science from MIT in Electrical Engineering and Computer
      Science and led high-performance interconnect architecture at AMD before co-founding Cerebras. Gary
      Lauterbach, a veteran chip architect with experience from the AMD and SeaMicro cohort, serves in a
      co-founder technical capacity. The executive team also includes Dhiraj Mallick as COO and Komin as
      CFO; Komin brings prior CFO experience at Sunrun, Flurry, Ticketfly, and Linden Research, providing
      public-company financial leadership ahead of the IPO. The company's S-1/A explicitly identifies
      Andrew Feldman as a key-person risk; loss of the CEO would likely impair Cerebras' ability to execute
      its technical roadmap and maintain marquee customer relationships. The founding team's shared history
      at SeaMicro and AMD is a notable cohesion factor—core founders have worked together for over a
      decade—which reduces intra-team execution risk while concentrating critical technical knowledge in a
      small group. Board composition post-IPO includes co-founder members alongside investor
      representatives; the full list of independent directors was not fully enumerated in public
      filings accessible at time of research.
    claimRefs: [CO003, CO004, CO005, CO006, CO036]
    tableRefs: [TO002]
    figureRefs: []

  - id: section-3
    title: "Funding History and Capital Structure"
    body: >-
      Prior to its IPO, Cerebras raised approximately $720 million in venture capital across multiple
      rounds. G42, the Abu Dhabi-based AI conglomerate, invested a cumulative $335 million and became both
      Cerebras' largest strategic investor and primary revenue customer, representing 85% of 2024 revenues.
      In December 2025, OpenAI committed a $1 billion Working Capital Loan at 6% annual interest maturing
      December 31, 2032, providing pre-IPO liquidity. The IPO at $185 per share on May 14, 2026 raised
      approximately $5.55 billion in gross proceeds. AWS signed a binding term sheet with Cerebras in March
      2026, acquiring approximately 2.7 million warrant shares at a $100 exercise price in connection with
      hardware procurement commitments. OpenAI holds a separate warrant for 33.4 million shares at a
      nominal $0.00001 per share exercise price tied to the master revenue agreement, representing material
      potential dilution for common stockholders. The share structure is dual-class: Class A shares carry
      one vote, Class B shares carry 20 votes, and Class N shares carry zero votes. Following the IPO,
      Class B holders—primarily founders and early insiders—retained approximately 99.2% of total voting
      power, enabling founder-controlled governance indefinitely. The combined equity from Series H and
      the OpenAI loan represent the most significant pre-IPO capitalization events, though individual
      round sizes for Series A through Series G are not fully disaggregated in public filings.
    claimRefs: [CO015, CO018, CO019, CO020, CO021, CO022, CO023, CO028, CO038]
    tableRefs: [TO003]
    figureRefs: []

  - id: section-4
    title: "Key Performance Metrics and Stage Assessment"
    body: >-
      Cerebras is now a publicly traded company at an advanced growth stage. Revenue grew from $24.6
      million in 2022 to $78.7 million in 2023, $290.3 million in 2024, and $510.0 million in 2025,
      representing 76% year-over-year growth in the most recent fiscal year. Gross margins expanded from
      12% in 2022 to 42% in 2024 before compressing slightly to 39% in 2025, reflecting volume mix shifts
      toward hardware deployments. The company achieved GAAP net income of $237.8 million in 2025, a
      dramatic reversal from a $481.6 million GAAP net loss in 2024. However, 2025 profitability was
      significantly influenced by non-cash warrant fair-value revaluations related to the OpenAI and AWS
      transactions; the non-GAAP net loss for 2025 was $75.7 million, indicating the underlying business
      remains pre-profitable on a cash-adjusted basis. Headcount was 708 as of December 31, 2025, growing
      to approximately 1,000 by March 2026. Customer concentration is the most material operational risk:
      MBZUAI accounted for 62% of 2025 revenue and 77.9% of accounts receivable at year-end 2025.
      Combined with G42, UAE-linked entities represented approximately 86% of total 2025 revenues,
      creating significant geopolitical and counterparty concentration exposure that investors must weigh
      against the forward revenue trajectory from the OpenAI Master Revenue Agreement.
    claimRefs: [CO010, CO011, CO012, CO013, CO014, CO015, CO016, CO017]
    tableRefs: []
    figureRefs: [FO003]

  - id: section-5
    title: "Company Milestones and Adverse Events"
    body: >-
      Cerebras was incorporated in Delaware in April 2016 and spent its first three years in stealth mode
      developing the wafer-scale chip concept. The WSE-1 was unveiled at Hot Chips 2019, the WSE-2 followed
      in 2021, and the WSE-3 was introduced in March 2024. The company filed its initial S-1 with the SEC
      in September 2024 at a reference valuation of approximately $4.25 billion, followed by an amended
      S-1 in April 2026 and a final S-1/A in May 2026. SiliconAngle reported Cerebras initially targeted
      an IPO price range of $150 to $160 before finalizing at $185. The stock debuted at approximately
      $350 on May 14, closed at approximately $311 (+68% from offer price), but retreated to $279.72 on
      May 15. The Wall Street Journal characterized the IPO as a huge bet on Nvidia fatigue, signaling
      analyst skepticism about whether the non-standard form factor can sustain demand beyond early
      adopters. Adverse observations include the post-IPO stock decline, continuing non-GAAP operating
      losses despite GAAP profitability, heavy UAE customer concentration at IPO, and the undisclosed
      revenue recognition schedule under the OpenAI MRA. The GSK partnership and the $20 billion-plus
      OpenAI MRA signed in December 2025 represent major product-market validation milestones that
      transform the revenue concentration profile away from UAE entities toward a US hyperscaler anchor.
    claimRefs: [CO007, CO008, CO009, CO018, CO025, CO029, CO031, CO032, CO033, CO035]
    tableRefs: [TO004]
    figureRefs: [FO001]

