figures:
  - id: FE001
    title: "Cerebras Product Architecture Stack"
    type: stack
    layout: wide
    summary: >-
      Seven-layer view from TSMC fabrication at the base to customer applications at the top,
      spanning the full Cerebras hardware-software stack.
    approximationNotes: null
    claimRefs: [CE001, CE003, CE004, CE005, CE006, CE013]
    data:
      layers:
        - label: "Customer Applications"
          detail: >-
            LLM inference APIs, AI model training, scientific computing, sovereign AI programs
            including OpenAI Codex-Spark, GSK RNA drug discovery, and MBZUAI UAE sovereign AI
        - label: "Inference API and SDK Layer"
          detail: >-
            OpenAI Chat Completions compatible REST API; Cerebras Cloud SDK; Python client;
            published pricing at $0.60/M input tokens for Llama-3 70B
        - label: "Orchestration and Cluster Management"
          detail: >-
            Cerebras Cluster Manager: multi-CS-3 scale-out; job scheduling; disaggregated inference
            for models above 44B parameters via InfiniBand or Ethernet fabric
        - label: "Compiler and Graph Translation"
          detail: >-
            Cerebras Compiler: PyTorch model graph to WSE-3 execution plan; no custom DSL required;
            automatically maps attention, MLP, and embedding operations to 900K AI cores
        - label: "Runtime and Memory Management"
          detail: >-
            WSE-3 runtime: on-chip SRAM weight storage and scheduling; 900K AI core execution
            pipeline; token streaming at 2,100+ tok/s for Llama 8B models
        - label: "WSE-3 Hardware Substrate"
          detail: >-
            WSE-3 die: 46,225 mm2; 4 trillion transistors; 900K AI cores; 44 GB on-chip SRAM;
            21 PB/s internal memory bandwidth; fabricated on TSMC 5nm N5
        - label: "TSMC Fabrication and CS-3 Packaging"
          detail: >-
            TSMC 5nm (N5) wafer fab: sole-source full-wafer fabrication; custom die packaging;
            CS-3 chassis assembly with liquid or forced-air cooling integration

