slug: cerebras-systems
runDate: '2026-05-16'
company:
  name: Cerebras Systems
chapter:
  number: 5
  title: Product and Technology
  summary: >-
    Cerebras Systems delivers the WSE-3 wafer-scale processor (46,225 mm2, 4 trillion transistors,
    900,000 AI cores, 44 GB on-chip SRAM, 21 PB/s internal bandwidth) packaged in the CS-3 compute
    system. A PyTorch-native compiler, an OpenAI-compatible inference API, and an open-weight model
    library complete the product stack. The on-chip SRAM architecture eliminates the HBM memory
    bottleneck constraining GPU-based LLM inference, enabling 2,100+ tokens per second for Llama 3
    8B on a single WSE-3, approximately 15 times faster than GPU alternatives for models fitting
    within 44 GB. Production deployments include OpenAI Codex-Spark and GSK RNA drug discovery.
    Single-source TSMC 5nm fabrication and BIS/EAR export-control requirements for UAE customers
    representing 86 percent of FY2025 revenue are the primary product and supply-chain risks.
    No WSE-4 successor has been publicly announced as of May 2026.

sections:
  - id: wse3-hardware-architecture
    title: WSE-3 Wafer-Scale Engine Architecture
    body: >-
      The Cerebras WSE-3 (Wafer Scale Engine 3) is the core compute substrate for all Cerebras
      products. Unlike conventional semiconductor dies that measure 200 to 900 mm2, the WSE-3
      occupies an entire 300 mm TSMC 5nm wafer, producing a single die with 46,225 mm2 of silicon,
      which is 58 times larger than the NVIDIA B200 GPU at approximately 814 mm2. This extreme die
      area enables integration of 4 trillion transistors (19 times the B200), 900,000 AI processing
      cores, and 44 GB of on-chip SRAM on a single device. The on-chip SRAM delivers 21 petabytes
      per second (21,000 TB/s) of internal memory bandwidth, approximately 2,625 times the effective
      bandwidth of the NVIDIA B200 NVL72 cluster at approximately 8 TB/s. This bandwidth advantage
      is architecturally decisive because large language model inference is fundamentally
      memory-bandwidth-bound: model weights must traverse the memory interface on every forward pass.
      On GPU platforms, this creates a bottleneck at the High Bandwidth Memory interface. The WSE-3
      eliminates this bottleneck by storing all model weights for models up to 44 billion parameters
      entirely on-chip, enabling deterministically fast token generation with zero off-chip memory
      traffic. Three chip generations have followed a consistent TSMC process cadence: WSE-1 (16nm,
      1.2T transistors, 2019), WSE-2 (7nm, 2.6T transistors, 2021), and WSE-3 (5nm, 4T transistors,
      2023). Each generation delivered approximately 2x transistor density improvement consistent
      with TSMC node shrink targets and Cerebras biennial release cadence.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE022, CE030, CE035]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: cs3-system-deployment-architecture
    title: CS-3 System Design and Deployment Architecture
    body: >-
      The Cerebras CS-3 compute system integrates the WSE-3 chip into a standard two-rack-unit
      datacenter chassis. The CS-3 is the complete hardware product, encompassing the WSE-3 chip,
      power delivery, cooling infrastructure, and networking interconnects in a single deliverable
      unit priced at approximately two to four million dollars per system based on disclosed deal
      values. No official list price is published. The WSE-3 die dissipates substantially more
      thermal energy than conventional GPU boards and requires liquid cooling or high-airflow
      forced-air environments. Customers deploying CS-3 systems must configure data centers
      accordingly, adding operational overhead relative to standard GPU deployments. For workloads
      exceeding a single WSE-3 memory capacity (models above approximately 44 billion parameters),
      Cerebras provides the Cluster Manager, which orchestrates multiple CS-3 systems in a scale-out
      configuration using standard datacenter networking. The Cluster Manager enables disaggregated
      inference, distributing model layers across multiple WSE-3 nodes. This is the technical basis
      for the AWS integration announced via binding term sheet in March 2026, combining CS-3 nodes
      with AWS Trainium for hybrid disaggregated inference. Critical third-party dependencies include
      TSMC as sole wafer fabrication supplier and the packaging and chassis supply chain. The S-1/A
      prominently discloses the single-supplier concentration risk from TSMC dependence as a material
      risk to hardware revenue continuity.
    claimRefs: [CE020, CE021, CE023, CE025]
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: software-developer-ecosystem
    title: Software Stack and Developer Ecosystem
    body: >-
      Cerebras software stack transforms the WSE-3 hardware advantage into accessible developer
      productivity. The Cerebras Compiler accepts standard PyTorch model definitions and automatically
      compiles them to optimized WSE-3 execution graphs, requiring no custom domain-specific language,
      model redesign, or manual kernel optimization. For inference workloads, Cerebras offers the
      Inference Cloud API, which is fully compatible with the OpenAI Chat Completions API
      specification. Any application integrated with the OpenAI API can route requests to Cerebras by
      changing only the base URL and API key. The API supports Llama family models, Codex-Spark from
      OpenAI, GPT-OSS-120B, and GLM 4.7. Published inference pricing is 0.60 dollars per million
      input tokens for Llama-3 70B. The developer ecosystem is supported through three open channels:
      the Cerebras GitHub organization hosts a Model Zoo with reference implementations for GPT, BERT,
      and diffusion architectures; the HuggingFace organization distributes the Cerebras-GPT
      open-weight model family spanning 111M to 13B parameters, released in April 2023; and the
      Chinchilla scaling paper (arXiv 2304.03208) validates hardware training efficiency. The
      Cerebras SDK, documentation portal (docs.cerebras.ai), and cloud console (cloud.cerebras.ai)
      complete the developer-facing surface, enabling end-to-end deployment from model import to
      production inference without leaving the Cerebras platform.
    claimRefs: [CE012, CE013, CE018, CE019, CE027, CE028, CE031]
    tableRefs: [TE002]
    figureRefs: [FE002]

  - id: inference-performance-competitive-benchmarks
    title: Inference Performance and Competitive Benchmarks
    body: >-
      Cerebras claims 2,100+ tokens per second for Llama 3 8B on a single WSE-3, approximately 15
      times faster than a comparable NVIDIA H100 or B200 GPU. This claim is analytically consistent
      with the hardware architecture: LLM inference throughput is directly proportional to available
      memory bandwidth for memory-bound workloads, and the WSE-3 21 PB/s internal bandwidth vastly
      exceeds the HBM3e bandwidth of the NVIDIA B200 NVL72 cluster at approximately 8 TB/s. For
      models fitting entirely within 44 GB of on-chip SRAM, the WSE-3 delivers near-peak bandwidth
      utilization with zero off-chip memory traffic. Production evidence supports the performance
      claim. OpenAI Codex-Spark runs on Cerebras inference infrastructure, providing hyperscaler-grade
      production validation. GSK reported 10x training speedup with a 120x larger RNA drug discovery
      dataset. MBZUAI operates CS-3 clusters for UAE sovereign AI computing at 62 percent of FY2025
      revenue. The competitive landscape includes NVIDIA B200 NVL72 (approximately 8 TB/s HBM
      bandwidth, estimated 140 tok/s for 8B LLM), AMD MI300X (5.3 TB/s, 192 GB HBM3), and Google
      TPU v5/v6 (optimized for distributed training). For models up to 44B parameters in
      latency-sensitive single-user inference, the WSE-3 architecture is demonstrably differentiated.
      For models exceeding 44B parameters requiring disaggregated inference, the advantage narrows as
      distributed-compute complexity increases.
    claimRefs: [CE009, CE010, CE011, CE014, CE017, CE029, CE032, CE033]
    figureRefs: [FE004]

  - id: competitive-differentiation-ip
    title: Competitive Differentiation and Intellectual Property
    body: >-
      Cerebras primary moat is architectural and manufacturing: the company holds the only
      commercially shipped wafer-scale AI processor at production volume as of May 2026. Replicating
      the WSE-3 would require mastery of full-wafer silicon interposer and custom packaging
      technology, a compiler toolchain with years of silicon-software co-development, design expertise
      to verify a 4-trillion-transistor chip with no inter-die redundancy, and TSMC foundry
      relationships with allocated capacity for full-wafer N5, among the most complex manufacturing
      arrangements TSMC supports commercially. The S-1/A references patents, trade secrets, and
      manufacturing know-how without enumerating specific patent numbers. The structural secrecy
      around the WSE architecture functions as a trade-secret barrier: the internal mesh fabric
      design, compiler optimization passes, and silicon floorplan are not publicly disclosed.
      Cerebras-GPT and the arXiv 2304.03208 paper demonstrate hardware performance consistent with
      theoretical bandwidth predictions. The NVIDIA CUDA ecosystem remains the dominant developer
      platform with the largest pre-trained checkpoint library and partner support. Cerebras
      OpenAI-API-compatible inference interface reduces switching cost for inference workloads but
      does not displace CUDA for training workflows requiring custom kernels. The key competitive risk
      is that NVIDIA improves HBM bandwidth generation-over-generation and may close the per-token
      latency gap for small models, or hyperscaler disaggregated inference architectures erode the
      single-chip advantage for larger models. Cerebras FY2025 gross margin of 39 percent indicates
      the current competitive position sustains pricing power at scale.
    claimRefs: [CE015, CE016, CE026]

  - id: trust-compliance-roadmap
    title: Trust, Compliance, and Product Roadmap
    body: >-
      Cerebras primary compliance obligation is export control under Bureau of Industry and Security
      Export Administration Regulations. Shipments of advanced AI semiconductor systems to UAE-based
      customers MBZUAI (62 percent of FY2025 revenue) and G42 (24 percent of FY2025 revenue) require
      BIS export licenses. Dependence of over 86 percent of revenue on UAE customers subject to
      BIS/EAR export controls is a material operational risk disclosed prominently in the S-1/A.
      Export license delays, revocations, or policy restrictions could block the majority of hardware
      revenue with limited near-term diversification alternatives. Quality and reliability evidence is
      primarily production-validated: OpenAI Codex-Spark and GSK RNA drug discovery workloads confirm
      enterprise quality requirements are met. However, Cerebras has not publicly disclosed SOC 2
      Type II or ISO 27001 cloud security certifications for the Inference Cloud API as of May 2026,
      a diligence gap for enterprise customers evaluating cloud security posture. Hardware quality is
      governed by TSMC standard semiconductor manufacturing quality controls, but system-level MTBF
      statistics for the CS-3 have not been published. The product roadmap as of May 2026 does not
      include an announced WSE-4 successor chip. Cerebras generation cadence has been approximately
      biennial: WSE-1 (2019), WSE-2 (2021), WSE-3 (2023). The next significant product milestone is
      the AWS disaggregated inference integration under the March 2026 binding term sheet, with
      deployment timeline not publicly disclosed.
    claimRefs: [CE024, CE026, CE034]
    tableRefs: [TE004, TE005]

