company:
  name: "Cerebras Systems"
chapter:
  number: 5
  title: "Product & Technology"
  letter: E
  summary: >-
    Cerebras' core product is a vertically integrated AI compute platform built around the WSE-3 wafer-scale
    engine — the largest commercial chip ever produced, at 46,225 mm², 4 trillion transistors, 900,000 AI
    cores, 44 GB on-chip SRAM, and 21 PB/s memory bandwidth on TSMC 5nm. The CS-3 system houses one WSE-3
    and multiple CS-3 units cluster into supercomputers via SwarmX interconnect. The Cerebras Software
    Platform (CSoft compiler, Inference Serving Stack, Cluster Manager) provides PyTorch-native access
    with no CUDA requirement. Inference benchmarks show up to 15x throughput advantage over NVIDIA GPU
    clusters for large language models. The IP moat is deepened by 96 issued patents covering multi-die
    interconnect and fault-tolerant wafer-scale fabrication. Structural risks include sole-source
    dependence on TSMC, extreme packaging complexity, and a software ecosystem narrower than NVIDIA's
    established CUDA platform.

sections:
  - id: section-E1
    title: "Core Technology: Wafer-Scale Integration Architecture"
    body: >-
      Cerebras Systems' foundational technology is wafer-scale integration (WSI), which solves a 75-year
      chip-industry problem by treating an entire silicon wafer as a single processor. Conventional chip
      manufacturing stamps individual die onto a wafer and dices it into small separate chips; GPU clusters
      must then re-assemble compute and memory through power-hungry networking. Cerebras inverted this:
      the WSE-3 uses the entire 46,225 mm² of a TSMC 5nm silicon wafer, achieving 4 trillion transistors
      and 900,000 AI compute cores on a single monolithic die. This eliminates off-chip data movement
      bottlenecks that dominate GPU latency and power draw. Two proprietary semiconductor inventions made
      WSI commercially viable: (1) a cross-reticle multi-die interconnect that stitches otherwise
      independent die regions together at wafer level during fabrication; and (2) a fault-tolerant
      redundant-core architecture that routes around manufacturing defects, achieving near-perfect
      production yield despite the enormous die size. The WSE-3's 44 GB of on-chip SRAM and 21 petabytes
      per second of on-chip memory bandwidth — 2,625 times more than an NVIDIA B200 dual-chip package —
      directly address the memory-bandwidth bottleneck that limits GPU throughput on transformer models.
      These architectural advantages are structural and cannot be replicated by simply assembling more GPU
      chips, because off-chip interconnects between separate GPUs consume power and add latency at
      orders-of-magnitude greater rates than on-chip interconnects.
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006]
    tableRefs: [TE001]
    figureRefs: [FE001]

  - id: section-E2
    title: "Hardware Platform: WSE-3 and CS-3 System"
    body: >-
      The WSE-3 is the third-generation Cerebras wafer-scale engine, following WSE-1 (16nm) and WSE-2
      (7nm). Each generation has delivered improvements in transistor count, performance, memory, and
      energy efficiency. The WSE-3 at 5nm contains 19 times more transistors and 250 times more on-chip
      memory than the NVIDIA B200 chip. Comparing die areas, the WSE-3 is 58 times larger than the
      NVIDIA B200 at approximately 800 mm² — the discrepancy reflects the fundamental difference between
      building one wafer-scale chip versus cutting a wafer into dozens of small chips. The CS-3 is the
      rack-mounted compute system that houses one WSE-3. It integrates advanced water cooling, proprietary
      power delivery, and a high-speed interconnect fabric. Multiple CS-3 units connect via SwarmX
      interconnect modules and MemoryX memory nodes to form Cerebras AI supercomputers with aggregate
      memory and bandwidth scaling linearly with cluster size. The CS-3 is deployed in customer data
      centers and in Cerebras' own cloud infrastructure. The system is designed to replace multi-rack GPU
      clusters for inference and training, with a single CS-3 unit providing compute density equivalent
      to a large server cluster. Cerebras reports over 100 exaflops of deployed compute globally as of
      2026, primarily from large cluster installations at MBZUAI and G42 in the UAE.
    claimRefs: [CE007, CE008, CE009, CE010, CE011]
    tableRefs: [TE002]
    figureRefs: [FE003]

  - id: section-E3
    title: "Software Stack: Cerebras Software Platform"
    body: >-
      The Cerebras Software Platform (CSP) is a co-designed software stack spanning the full AI lifecycle
      from model development to production inference. The Cerebras Compiler (CSoft) translates PyTorch
      models directly to the WSE-3 hardware, eliminating the need for CUDA or other hardware-specific
      programming. Developers write standard PyTorch code and invoke a CSoft compilation step that maps
      tensor operations to the 900,000-core WSE-3 architecture. The Inference Serving Stack provides
      production-grade model hosting with industry-standard APIs compatible with the OpenAI REST
      specification, enabling drop-in adoption by any application already integrated with OpenAI or
      compatible inference services. The Cerebras Cluster Manager orchestrates multi-CS-3 deployments
      as a single logical computer, handling job scheduling, telemetry, load balancing, and health
      monitoring. The software also supports the Cerebras Model Zoo, a library of pre-validated large
      language models optimized for the WSE-3, including LLaMA, Mistral, Falcon, and GPT-class
      architectures. The Model Zoo lowers the barrier to deployment but narrows the ecosystem relative
      to NVIDIA's CUDA, which supports thousands of operators, frameworks, and community-maintained
      toolchains. Cerebras has published documentation, Python SDK examples, and API references, and
      maintains an active GitHub organization with model configuration repositories. Cerebras software
      is available on AWS Marketplace, IBM watsonx, Microsoft Marketplace, and Vercel AI Gateway.
    claimRefs: [CE012, CE013, CE014, CE015, CE016, CE017]
    tableRefs: [TE003]
    figureRefs: []

  - id: section-E4
    title: "Inference Performance and Competitive Benchmarks"
    body: >-
      Cerebras' primary commercial differentiator is inference throughput speed for large language models.
      The company claims inference delivery up to 15 times faster than leading GPU-based solutions on
      open-source models, a figure corroborated by Artificial Analysis' independent benchmark, which
      ranked Cerebras as the highest-throughput AI inference provider in the market as of early 2026.
      For LLaMA 3.1 70B, Cerebras reports over 2,100 tokens per second throughput on its inference
      cloud, compared to approximately 100-150 tokens per second from a single NVIDIA H100 and roughly
      200-300 from an NVIDIA H100 cluster. For more exotic sparse-workload models, Cerebras claims over
      1,000 times faster performance. The speed advantage directly enables applications such as real-time
      coding agents, multi-step reasoning with long-context memory, and voice AI requiring sub-second
      latency. OpenAI selected Cerebras as its fast inference solution for Codex-Spark, enabling users
      to generate complete software applications in seconds. These performance figures reflect ideal
      conditions on models that are well-suited to the WSE-3 architecture; performance advantages are
      smaller for batch inference workloads, multi-modal models, or models that require custom CUDA
      kernel extensions not yet supported in the CSoft stack.
    claimRefs: [CE018, CE019, CE020, CE021, CE022]
    tableRefs: [TE004]
    figureRefs: [FE002]

  - id: section-E5
    title: "Technology Roadmap, IP Portfolio, and Technical Risks"
    body: >-
      Cerebras has delivered three WSE generations over nine years. Its roadmap continues the wafer-scale
      trajectory: future generations (WSE-4 and beyond) are expected to increase on-chip memory capacity,
      expand memory bandwidth, improve interconnect density, and leverage next-generation TSMC process
      nodes to increase transistor density and reduce power consumption. The company intends to invest
      heavily in R&D, spending $186.5 million on R&D in FY2025 (37% of revenue). As of March 31, 2026,
      Cerebras owned 96 issued patents and 50 pending patent applications globally; 50 are issued U.S.
      patents expiring between 2038 and 2041. Patents cover multi-die interconnect, fault-tolerant
      processor design, wafer-scale cooling, hardware architecture for deep learning, and software
      compilation for sparse-algebra workloads. Significant technical risks include: TSMC sole-source
      dependency for all wafer production with no feasible near-term alternative; the impossibility
      of die-level rework once a defect reaches a system (no standard RMA path for WSE hardware);
      limited model support compared to NVIDIA's ecosystem; and the risk of future AI model architectures
      (e.g., mixture-of-experts, state-space models, diffusion models with custom kernels) that require
      compute patterns not optimal for the WSE-3. Software compatibility with emerging frameworks and
      the broader CUDA-centric research community remains a medium-term competitive liability.
    claimRefs: [CE023, CE024, CE025, CE026, CE027, CE028]
    tableRefs: [TE005]
    figureRefs: [FE004]

  - id: section-E6
    title: "Build vs Buy Analysis and Manufacturing Dependencies"
    body: >-
      Cerebras operates a fully fabless chip design model. All silicon fabrication is outsourced to
      TSMC at its 5nm N5 process node. TSMC is the sole source for WSE wafer production; no alternative
      foundry currently supports the proprietary cross-reticle interconnect process required for wafer-
      scale integration. This creates a single point of failure: any TSMC disruption — from Taiwan
      geopolitical risk, natural disaster, process node capacity constraints, or pricing disputes —
      directly impacts Cerebras' ability to manufacture. Beyond wafers, Cerebras outsources system
      assembly and testing to contract manufacturers; MemoryX and SwarmX hardware components are
      sourced from third-party suppliers. The company performs final system-level burn-in testing
      internally. Cerebras does not disclose wafer unit cost, but industry estimates for large-area
      TSMC 5nm wafers range from $15,000 to $25,000 per wafer, with each WSE die consuming an entire
      wafer. This creates a per-chip cost structure dramatically different from standard GPU production,
      where hundreds of chips are produced per wafer. The high per-unit hardware cost is partially offset
      by elimination of networking infrastructure costs (switches, cables, NICs) that GPU-based clusters
      require. Cerebras' software build-vs-buy decisions are primarily build: CSoft, the Inference Serving
      Stack, and Cluster Manager are all proprietary, with PyTorch used as the developer-facing interface.
    claimRefs: [CE029, CE030, CE031, CE032, CE033]
    tableRefs: []
    figureRefs: []

