  evidenceGaps:
    - id: EGE001
      type: missing-source
      severity: material
      topic: cloud-security-compliance
      missingEvidence: >-
        SOC 2 Type II audit report, ISO 27001 certificate, or equivalent cloud security attestation
        for the Cerebras Inference Cloud API; uptime SLA documentation and any published historical
        availability record or status page data for the inference cloud service.
      whyItMatters: >-
        Enterprise and regulated-industry customers evaluating the Cerebras cloud API require security
        certification evidence before production adoption. Absence of public SOC 2 disclosure limits
        the addressable enterprise market and creates a diligence gap for institutional buyers
        conducting vendor security assessments against standard procurement requirements.
      diligencePath: >-
        Request SOC 2 Type II report directly from Cerebras security team in private diligence; ask
        for uptime data from any published Cerebras status page; check whether AWS hosting for the
        cloud API includes inherited AWS security certifications; verify whether a trust portal exists
        at any Cerebras subdomain.
      relatedQuestionRefs: [QE026]

    - id: EGE002
      type: private-evidence-only
      severity: material
      topic: intellectual-property-patents
      missingEvidence: >-
        Specific patent numbers, patent filing dates, patent claims, and freedom-to-operate analysis
        covering the WSE-3 wafer-scale architecture, internal mesh fabric design, Cerebras Compiler
        optimization passes, or Cluster Manager orchestration technology as registered intellectual
        property.
      whyItMatters: >-
        The S-1/A references IP protection generically without enumerating specific patents. Without a
        patent landscape analysis, the durability of Cerebras IP moat and the risk of competitive
        replication or freedom-to-operate challenges from competitors such as NVIDIA or Intel cannot
        be independently assessed from public information alone.
      diligencePath: >-
        Search USPTO full-text database for Cerebras Systems patent filings by assignee name; request
        IP schedule and patent list from Cerebras legal team in private diligence; review S-1/A IP
        risk factor language for any additional specificity on protected claims or pending applications.
      relatedQuestionRefs: [QE027]
