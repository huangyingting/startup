            body: >-
              The top-2 customer concentration of 86% (MBZUAI + G42) is extreme by any benchmark for AI infrastructure
              companies at comparable revenue scale. The top-5 customers represented 94% of FY2025 revenue. This
              concentration creates a single-point-of-failure risk: any disruption to UAE sovereign demand—whether from
              geopolitical shifts, export-control tightening, or budget reallocation—would be immediately catastrophic
              to recognized revenue. The BIS/EAR export-control dependency for UAE customer shipments (representing 86%
              of revenue) is the most structurally acute risk in the Cerebras investment thesis. Four primary
              diversification vectors have been announced: the OpenAI MRA ($20B+ notional, 750MW committed capacity) is
              the largest and most imminent, capable of adding hundreds of millions in annual recognized revenue once
              operational infrastructure is deployed. The AWS binding term sheet (March 2026) provides channel access to
