      - number: '8.5'
        title: Comparable Set and Methodology
        blocks:
          - type: paragraph
            body: >-
              The appropriate valuation methodology for Cerebras is a revenue multiple framework anchored to NTM revenue
              estimates, with scenario sensitivity to multiple compression and revenue growth deceleration. At $510M
              FY2025 revenue and 76% growth, the company is too large for pure ARR multiple approaches used in
              early-stage SaaS but too hardware-dependent for pure software SaaS multiples. A blended comparable set —
              public AI hardware companies, AI cloud infrastructure peers, and comparable private rounds — is the
              appropriate framework.

              Public hardware comparables: Nvidia (NVDA) trades at approximately 25x NTM revenue as of May 2026 on
              fiscal year 2026 data center revenue of $47B+, implying a premium that reflects Nvidia's dominant market
              position, >70% gross margins in data center, and software ecosystem moat. AMD (AMD) trades at
              approximately 8x NTM revenue, reflecting lower AI chip market share and more commodity exposure. These two
              endpoints bracket the hardware peer range; Cerebras at 30-45x NTM would require sustained Nvidia-like
              market share trajectory — defensible only if inference workloads shift materially to WSE architecture,
              which is not yet confirmed at scale.

              Private AI chip comparables: Groq's last disclosed valuation of approximately $2.8 billion at an estimated
              $750 million ARR implies a 3.7x ARR multiple — dramatically below Cerebras's IPO multiple, reflecting
              Groq's smaller scale, narrower customer base, and no public market liquidity premium. SambaNova Systems at
              an estimated $5.1 billion valuation at $450M ARR estimated implies approximately 11x ARR — closer to
              Cerebras's range. Tenstorrent was valued at approximately $2.6 billion in its 2025 funding round,
              significantly smaller scale.

              The original Cerebras S-1 (September 2024) sought approximately $4 billion at $136M trailing revenue (29x
              trailing), providing a historical reference point. The successful 2026 IPO at $185/share represents a
              significant premium to that prior reference, justified primarily by the $374 million revenue addition in
              18 months and the OpenAI MRA announcement. The methodology most defensible for investors is NTM revenue
              multiple with explicit scenarios for both the multiple (8-20x range) and revenue ($700M-$2B range) — the
              2x revenue uncertainty alone spans a $5.6-16B valuation swing at 8x, highlighting how sensitive returns
              are to growth execution.
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV034
              - CV035
              - CV036
              - CV038
              - CV039
      - number: '8.6'
        title: Exit Readiness and Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Cerebras is now a public company, so the traditional "exit readiness" framing shifts to three related
              questions: (1) Is the IPO price a durable entry point, or will post-IPO price discovery reveal a more
              attractive secondary market entry? (2) What are the specific thesis-break events that should trigger
              position reduction? (3) What diligence remains outstanding that the first quarterly earnings call
              (expected Q3 2026) should resolve?

              For existing pre-IPO shareholders, the lock-up expiry (typically 90-180 days post-IPO) will create a
              supply-side event. Given founders hold 99.2% of voting power, insider selling decisions at lock-up expiry
              will be the most important near-term price catalyst and need to be monitored. Management commentary on the
              OpenAI MRA drawdown cadence, the AWS term sheet closing timeline, and export control compliance status for
              UAE customers in the first quarterly earnings call will determine whether the base case trajectory is on
              track. Investors should define in advance what FY2026 Q1 and Q2 revenue numbers constitute "on track" vs.
              "at risk" before receiving earnings data.

              Key thesis-break triggers include: any confirmation that BIS has restricted or intends to restrict UAE AI
              chip sales post-IPO (which would directly impact the two largest customers); FY2026 Q1-Q2 revenue growth
              below 30% YoY (which would signal UAE dependency is not being diversified fast enough); any delay in the
              OpenAI MRA converting to actual revenue beyond Q3 2026; or any competitive announcement from Nvidia that
              directly addresses the Cerebras inference throughput advantage with equivalent economics.

              Final diligence asks for investors entering at or near IPO price include: segment-level gross margin
              disclosure to understand if hardware vs. cloud subscription economics differ materially; contract
              structure disclosure for the OpenAI MRA (minimum commitments vs. optional purchase rights vs.
              take-or-pay); export control legal opinion on UAE customer status post-IPO; and the specific technology
              roadmap for WSE-4 to confirm R&D investment continuity at the $1.7B+ invested-to-date level.
            claimRefs:
              - CV032
              - CV033
              - CV037
              - CV040
              - CV041
              - CV042
