  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: WSE-3 Wafer-Scale Engine Architecture
        blocks:
          - type: paragraph
            body: >-
              The Cerebras WSE-3 (Wafer Scale Engine 3) is the core compute substrate for all Cerebras products. Unlike
              conventional semiconductor dies that measure 200 to 900 mm2, the WSE-3 occupies an entire 300 mm TSMC 5nm
              wafer, producing a single die with 46,225 mm2 of silicon, which is 58 times larger than the NVIDIA B200
              GPU at approximately 814 mm2. This extreme die area enables integration of 4 trillion transistors (19
              times the B200), 900,000 AI processing cores, and 44 GB of on-chip SRAM on a single device. The on-chip
              SRAM delivers 21 petabytes per second (21,000 TB/s) of internal memory bandwidth, approximately 2,625
              times the effective bandwidth of the NVIDIA B200 NVL72 cluster at approximately 8 TB/s. This bandwidth
              advantage is architecturally decisive because large language model inference is fundamentally
              memory-bandwidth-bound: model weights must traverse the memory interface on every forward pass. On GPU
              platforms, this creates a bottleneck at the High Bandwidth Memory interface. The WSE-3 eliminates this
              bottleneck by storing all model weights for models up to 44 billion parameters entirely on-chip, enabling
              deterministically fast token generation with zero off-chip memory traffic. Three chip generations have
              followed a consistent TSMC process cadence: WSE-1 (16nm, 1.2T transistors, 2019), WSE-2 (7nm, 2.6T
              transistors, 2021), and WSE-3 (5nm, 4T transistors, 2023). Each generation delivered approximately 2x
              transistor density improvement consistent with TSMC node shrink targets and Cerebras biennial release
              cadence.
