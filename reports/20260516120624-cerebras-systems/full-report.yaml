      - number: '8.2'
        title: Recommendation and Stance
        blocks:
          - type: paragraph
            body: >-
              The recommendation is conditional TRACK at the IPO price of $185 per share. The evidence supports
              patience: Cerebras has an exceptional revenue growth record, a genuinely differentiated product, and two
              large downstream contracts (OpenAI, AWS) that could catalyze customer diversification. But the IPO price
              implies 30-45x NTM revenue — a multiple that assumes both continued 50%+ revenue growth and successful
              execution of the OpenAI and AWS contracts simultaneously. Neither is confirmed in current financial
              statements.

              Confidence is medium. The company is now public, which means quarterly financial disclosures will close
              many information gaps within 6-12 months. The S-1/A filing provides full revenue history, confirms the UAE
              concentration risk, and discloses the dual-class voting structure. The IPO underwriting by Goldman Sachs,
              Morgan Stanley, and Citigroup provides third-party demand validation. However, key unknowns remain:
              operating margins are not disclosed at the segment level, the OpenAI MRA drawdown conditionality is not
              fully specified, and export control compliance for UAE customers under the current BIS regulatory regime
              has not been publicly confirmed for post-IPO operations. Risk rating is high. Three independent shocks —
              UAE concentration, export controls, and Nvidia competitive displacement — each carry sufficient impact to
              break the base case thesis.

              Valuation stance is aggressive. A patient AI hardware investor with 3-5 year horizon and high risk
              tolerance can underwrite the bull case (Cerebras reaches $1.5-2B revenue by FY2027, OpenAI and AWS execute
              at scale, 15-20x NTM = $22-40B market cap = 2-3x from IPO price). The base case targets $900M-1.1B NTM
              revenue at 12-15x = $11-17B enterprise value — approximately flat to 10-15% downside from IPO pricing
              depending on total share count. The bear case ($500-700M revenue, 8-10x multiple, $4-7B market cap)
              implies severe downside from IPO price. This asymmetry (limited base case upside, substantial bear case
              downside, compelling bull case) defines the TRACK stance: monitor execution closely, establish a position
              only at material discount to IPO price or with confirmed evidence of diversification, and maintain strict
              kill triggers.
            claimRefs:
