              partnership targets regulated industries. Cloud API self-serve growth enables developer-led adoption with
              no procurement friction. However, none of these three vectors had generated material recognized revenue as
              of the IPO date (May 2026). The diligence question is whether recognized revenue diversification can occur
              before UAE concentration risk materializes. Revenue from FY2023 to FY2025 grew 548% to $510M, confirming
              strong demand—but the customer concentration remains an unresolved structural vulnerability.
