      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Wafer-Scale Architecture Delivers Differentiated Inference Speed
            body: >-
              The WSE-3's 900,000 AI cores and 21 PB/s on-chip memory bandwidth enable inference throughput of 2,100+
              tokens per second, reportedly up to 15x faster than NVIDIA GPU-based deployments for LLM workloads. This
              architectural moat is difficult to replicate quickly: the chip requires TSMC wafer-scale bonding expertise
              and proprietary interconnect design developed over nearly a decade. GSK's independent validation (10x
              speedup on RNA model training) and the $20B+ OpenAI contract provide third-party evidence that performance
              claims translate to real customer value.
            calloutType: strength
            claimRefs:
