      - number: '1.2'
        title: Founding Team and Executive Leadership
        blocks:
          - type: paragraph
            body: >-
              Cerebras was co-founded by Andrew D. Feldman (CEO), Sean Lie (CTO), Gary Lauterbach, and colleagues who
              previously worked together at SeaMicro, a high-density server startup acquired by AMD for $334 million in
              2012. Feldman had served as SeaMicro's CEO and later as Corporate Vice President of Server Business at
              AMD. Lie holds a Bachelor of Science from MIT in Electrical Engineering and Computer Science and led
              high-performance interconnect architecture at AMD before co-founding Cerebras. Gary Lauterbach, a veteran
              chip architect with experience from the AMD and SeaMicro cohort, serves in a co-founder technical
              capacity. The executive team also includes Dhiraj Mallick as COO and Komin as CFO; Komin brings prior CFO
              experience at Sunrun, Flurry, Ticketfly, and Linden Research, providing public-company financial
              leadership ahead of the IPO. The company's S-1/A explicitly identifies Andrew Feldman as a key-person
              risk; loss of the CEO would likely impair Cerebras' ability to execute its technical roadmap and maintain
              marquee customer relationships. The founding team's shared history at SeaMicro and AMD is a notable
              cohesion factor—core founders have worked together for over a decade—which reduces intra-team execution
              risk while concentrating critical technical knowledge in a small group. Board composition post-IPO
              includes co-founder members alongside investor representatives; the full list of independent directors was
              not fully enumerated in public filings accessible at time of research.
