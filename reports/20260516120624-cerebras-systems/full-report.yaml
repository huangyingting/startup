      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Cerebras most consequential regulatory risk is the Export Administration Regulations (EAR) framework
              administered by BIS. The October 2023 Advanced Computing rule and the October 2024 AI Diffusion Rule
              establish performance thresholds that govern whether WSE-3 chips can be exported to UAE-based customers.
              Cerebras has publicly disclosed that it holds BIS licenses for MBZUAI and G42 shipments, but those
              licenses can be revoked, modified, or refused at renewal. A regulatory posture change, such as placing
              MBZUAI or G42 on the Entity List, reclassifying UAE as a destination requiring tighter controls, or
              reducing performance thresholds below the WSE-3 level, would immediately prohibit existing and future
              hardware shipments to the two customers representing 86% of FY2025 revenue. The CFIUS precedent from the
              Saudi Aramco episode, which caused Cerebras to withdraw its IPO in Q4 2024, illustrates that national
              security review can impose material business disruption with limited advance notice. G42 2024 agreement to
              divest Chinese technology holdings partially addresses CFIUS residual risk but requires ongoing compliance
              monitoring. No material IP litigation has been disclosed in the S-1/A, but NVIDIA semiconductor patent
              portfolio creates a latent infringement risk warranting an FTO opinion before institutional capital is
              deployed.
            claimRefs:
