      - number: '8.3'
        title: Financing and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Cerebras completed its IPO on May 14, 2026 at $185 per share, raising $5.55 billion in gross proceeds.
              This is the largest US technology IPO since Uber in 2019. The S-1/A Amendment No. 2, filed in May 2026,
              discloses FY2025 revenue of $510 million, FY2024 revenue of $290.3 million, and FY2023 revenue of $78.7
              million — a compound growth rate that few hardware companies have achieved at this scale. Pre-IPO,
              Cerebras raised approximately $720 million in total equity across multiple rounds, including a Series F of
              approximately $250 million in November 2021 at a $4 billion valuation, which was the reference mark when
              the original 2024 S-1 was filed.

              The original S-1 filed in September 2024 sought a valuation of approximately $4 billion at trailing
              12-month revenue of $136.4 million (H1 2024) — roughly 29x trailing revenue. That S-1 was withdrawn in
              November 2024 after weak institutional feedback, consistent with the AI chip market multiple compression
              visible in the sector during late 2024. The successful 2026 IPO at approximately 30-45x NTM revenue
              (depending on total shares outstanding and FY2026 revenue trajectory) represents a meaningful step-up from
              the 2021 Series F reference mark and from the attempted 2024 IPO price. The step-up is justified by the
              revenue growth (from $136M trailing in H1 2024 to $510M FY2025) but it does embed an elevated multiple
              premium relative to comparable public hardware peers.

              The IPO preference structure is publicly disclosed via the S-1/A. The dual-class share structure preserves
              approximately 99.2% of voting power for founders, limiting external governance influence. Dilution from
              IPO shares and potential employee stock plan exercises will need to be tracked over the first four
              post-IPO quarters. No convertible debt or preferred equity overhang is disclosed in the public filings,
              which is a positive relative to many pre-IPO tech issuers. The $5.55 billion raised provides 10+ years of
              operating runway at current burn rates, effectively removing any near-term financing risk from the
              investment thesis.
            claimRefs:
