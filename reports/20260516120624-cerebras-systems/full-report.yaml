        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: |
              Cerebras has three disclosed revenue streams: hardware system sales (CS-3 compute
              systems), cloud inference API (Cerebras Cloud), and professional services/support. Hardware
              sales account for the vast majority of historical revenue; the inference API is newer but
              growing. Revenue recognized for fiscal years 2022–2025 was $24.6M, $78.7M, $290.3M, and
              $510.0M respectively, representing a 220% CAGR over three years. The 2024–2025 growth rate
              was 76% YoY, which is exceptional for a hardware company with nine-digit revenue. This
              trajectory is substantially driven by two customers: MBZUAI (62% of 2025 revenue) and G42
              (24% of 2025 revenue, down from 85% in 2024). Customer concentration is the primary revenue
              quality concern.

              Hardware pricing: CS-3 compute systems are sold at approximately $2–4M per system based on
              reported deal values; no official list price is published. Cloud inference API pricing is
              published at $0.60 per million input tokens for Llama-3 70B. Inference API pricing is fully
              managed with no hardware reservation requirement, creating a lower-friction entry for
              customers but likely lower gross margin than hardware sales. Revenue recognition for hardware
              likely follows point-in-time recognition upon delivery and acceptance; inference API revenue
              is recognized ratably. No segment-level revenue breakdown is publicly available.
