      - number: '5.7'
        title: Exhibits
        blocks:
          - type: callout
            title: On-Chip SRAM Eliminates the HBM Memory Wall for Models up to 44B Parameters
            body: >-
              The WSE-3 44 GB on-chip SRAM delivers 21 PB/s of internal bandwidth, eliminating the HBM memory bottleneck
              constraining GPU inference for models fitting within that envelope. This architectural advantage is
              physics-based and non-replicable without wafer-scale silicon, giving Cerebras a durable throughput lead of
              approximately 15x for latency-sensitive LLM inference workloads as of May 2026. Production deployments by
              OpenAI and MBZUAI validate the performance claim at hyperscaler scale.
            calloutType: strength
            claimRefs:
              - CE005
              - CE010
              - CE011
              - CE030
              - CE032
          - type: callout
            title: TSMC Single-Source Fabrication Creates Irreplaceable Supply Concentration Risk
            body: >-
              The entire Cerebras hardware portfolio depends on a single TSMC N5 wafer fabrication relationship for the
              full-wafer WSE-3 die. There is no disclosed backup foundry, no multi-sourcing strategy, and no alternative
              chip design for a different process node or die size. Any disruption to TSMC capacity from geopolitical,
              yield-related, or capacity allocation causes would halt hardware production with no credible near-term
              mitigation path. This is the most structurally irreplaceable dependency in the Cerebras operating model as
              of May 2026.
            calloutType: risk
            claimRefs:
              - CE023
              - CE006
              - CE035
          - type: callout
            title: BIS EAR Export Controls Threaten Over 86 Percent of Hardware Revenue Simultaneously
            body: >-
              MBZUAI and G42 together represent approximately 86 percent of Cerebras FY2025 revenue, and both are
              UAE-based entities requiring BIS/EAR export licenses for each hardware shipment. A single US policy change
              including expanded Entity List designations, new license requirements for advanced AI chips, or
              deterioration of US-UAE relations could simultaneously block the majority of hardware revenue. This
              regulatory concentration risk has no credible near-term diversification path given the customer pipeline
              disclosed at the IPO date.
            calloutType: risk
            claimRefs:
              - CE015
              - CE016
              - CE024
              - CE033
          - type: callout
            title: Validate AWS Disaggregated Inference Deployment Timeline Before Forecasting Revenue
            body: >-
              The AWS binding term sheet represents the most significant near-term product milestone, unlocking a global
              distribution channel and establishing the disaggregated inference architecture for models exceeding 44B
              parameters. However, the integration was not deployed as of the May 2026 IPO. Diligence should confirm
              specific technical milestones, contract conditionality, and the expected go-live date before modeling this
              as a near-term revenue contributor in any financial forecast.
            calloutType: recommendation
            claimRefs:
              - CE025
          - type: callout
            title: Bandwidth-Bound Inference Thesis Is Analytically Sound and Scientifically Validated
            body: >-
              The mechanistic basis for Cerebras performance advantage is well-established in published AI systems
              research: LLM inference is memory-bandwidth-bound because each token generation requires loading all model
              weights across the memory interface. The WSE-3 21 PB/s on-chip bandwidth versus 8 TB/s for a B200 NVL72
              cluster represents a 2,625x advantage. The Cerebras-GPT paper (arXiv 2304.03208) validates Chinchilla
              scaling on WSE-3 hardware, providing external scientific confirmation of the bandwidth-performance thesis
              beyond marketing claims alone.
            calloutType: insight
            claimRefs:
