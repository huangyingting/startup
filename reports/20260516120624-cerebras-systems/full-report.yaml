              wafers), product mix, and infrastructure costs for the growing inference API business.

              At 39–42% hardware gross margin, Cerebras compares unfavorably to NVIDIA's ~75% data
              center gross margin, but this reflects the difference between a fabless IP licensor (NVIDIA)
              and a full-stack hardware system vendor (Cerebras). More relevant comparables are
              hyperscaler-committed AI hardware vendors, where 35–45% is a reasonable range. The
              non-GAAP net loss of -$75.7M in 2025 versus GAAP net income of $237.8M implies
              approximately $313M in non-cash charges—likely a combination of stock-based compensation,
              warrant fair value adjustments, and potentially other non-recurring items. Operating
