      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Inference Is the New Battleground; Cerebras Leads on Throughput
            body: >-
              As AI moves from training to production inference, the performance dimension shifts from training
              throughput (FLOPS) to inference latency and tokens/second. Cerebras' WSE-3 with 900K AI cores and 44GB
              on-chip SRAM delivers 2,100+ tokens/second on 70B parameter models — reportedly 15x faster than H100
              clusters. This advantage is most defensible in real-time applications where latency directly impacts user
              experience. NVIDIA Blackwell B200 (5x H100 inference throughput) will narrow this gap over 2026-2027, so
              Cerebras must convert its speed lead into customer lock-in during this window.
            calloutType: insight
            claimRefs:
              - CM011
              - CM016
              - CM031
              - CM035
          - type: callout
            title: UAE Customer Concentration Limits Market Diversification
            body: >-
              Cerebras' revenue is 86% from UAE entities (MBZUAI 62%, G42 24%) as of 2025. This creates acute near-term
              market risk: if UAE sovereign AI spending moderates, if MBZUAI shifts to NVIDIA infrastructure, or if BIS
              export control rules extend to Cerebras' UAE customers, near-term revenue would be severely impacted. The
              OpenAI MRA and AWS term sheet are important diversification milestones but carry execution risk and have
              not yet contributed significant revenue.
            calloutType: risk
            claimRefs:
              - CM025
              - CM017
              - CM019
              - CM024
          - type: callout
            title: 28% CAGR AI Infrastructure Market Creates Multi-Year TAM Runway
            body: >-
              The AI infrastructure market growing from $251B (2025) to $672B (2029) at 28% CAGR implies a $421B
              absolute market expansion over four years. McKinsey's 72% enterprise AI adoption rate and EpochAI's
              4x/year compute scaling confirm broad, secular demand. Even at a conservative sub-1% market share,
              Cerebras has multi-billion revenue opportunity by 2029. The key question is whether Cerebras can diversify
              from UAE sovereign AI to hyperscaler and enterprise segments in time to capture this growth.
