      - number: '7.7'
        title: Exhibits
        blocks:
          - type: callout
            title: UAE export license is a single-event total-loss scenario
            body: >-
              Approximately 86% of Cerebras FY2025 revenue originated from UAE entities under active BIS export
              licenses. Any revocation, suspension, or denial of those licenses, triggered by geopolitical shifts, G42
              counterparty status changes, or BIS rule tightening, would immediately impair more than four-fifths of the
              revenue base. Unlike most concentration risks, this scenario has no near-term revenue substitute and no
              grace period for transition planning.
            calloutType: risk
            claimRefs:
              - CR002
              - CR006
              - CR022
              - CR023
          - type: callout
            title: TSMC dependency is structural and non-mitigable in the near term
            body: >-
              TSMC is the only foundry in the world capable of producing WSE-scale chips. Unlike most supply chain
              concentration risks that carry theoretical mitigation options such as dual-sourcing or inventory buffers,
              Cerebras TSMC dependency cannot be diversified away in any commercially realistic timeframe. A Taiwan
              Strait disruption would halt production entirely and permanently with no recovery path within a typical
              investment horizon.
            calloutType: risk
            claimRefs:
              - CR011
              - CR015
              - CR016
          - type: callout
            title: OpenAI triple-role position is both the thesis and the primary counterparty risk
            body: >-
              OpenAI serves simultaneously as Cerebras production reference customer, $1B working-capital lender, and
              $20B+ MRA revenue anchor. This is the thesis for revenue diversification away from UAE concentration, and
              it is also the single largest counterparty risk in the capital structure. If OpenAI role deteriorates for
              any reason, Cerebras loses the diversification thesis, the financial backstop, and the reference customer
              simultaneously.
            calloutType: insight
            claimRefs:
              - CR018
              - CR019
              - CR039
          - type: callout
            title: Monitoring thresholds are analyst-derived — Cerebras has not publicly defined them
            body: >-
              Cerebras has not publicly disclosed any monitorable thesis-break triggers or investor monitoring
              thresholds. The trigger set in this chapter, including export license revocation, TSMC disruption, UAE
              concentration above 70% through year-end 2026, OpenAI loan recall, and CEO departure, represents the
              minimum monitoring framework investors should build and propose to management during private due diligence
              access.
            calloutType: assumption
            claimRefs:
              - CR035
          - type: callout
            title: AWS term sheet and OpenAI MRA provide credible diversification on-ramps
            body: >-
              The AWS binding term sheet (March 2026) and OpenAI Master Revenue Agreement ($20B+ notional) are the two
              most credible near-term diversification catalysts. If AWS executes as a live Marketplace listing and
              OpenAI 750MW infrastructure buildout proceeds on schedule, Cerebras could exit 2026 with non-UAE revenue
              above 20% of total, materially reducing the export-control single-point-of-failure risk. These remain
              execution-dependent, but the contractual frameworks are in place.
            calloutType: strength
            claimRefs:
              - CR036
              - CR039
          - type: callout
            title: Minimum diligence asks before underwriting at current valuation
            body: >-
              Institutional investors should require the following before underwriting Cerebras at a valuation exceeding
              $100 billion: (1) copies of current BIS export licenses and renewal conditions for UAE shipments; (2)
              OpenAI MRA conditionality terms and loan covenant details including cross-default provisions; (3)
              quarterly non-UAE revenue split for the past four quarters; (4) TSMC fabrication agreement capacity and
              priority terms; and (5) an organizational depth chart with CEO succession plan. Absence of any of these
              represents a material information asymmetry.
            calloutType: recommendation
            claimRefs:
              - CR033
              - CR035
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The Cerebras investment thesis rests on five structurally grounded pillars. First, the AI inference market
              is growing at 40%+ CAGR and represents the fastest-expanding segment of AI infrastructure spend, and
              Cerebras has deployed the only wafer-scale chip architecture delivering 2,100+ tokens per second — a
              performance advantage of 10-15x over GPU-cluster alternatives for memory-bandwidth-bound inference
              workloads. Second, the company has demonstrated repeatable commercial traction at scale: revenue grew from
              $78.7 million in FY2023 to $510 million in FY2025 (CAGR exceeding 100%), and the S-1/A filing confirms
              this trajectory is hardware and cloud inference revenue, not one-time project fees. Third, the OpenAI
              $20B+ master revenue agreement announced December 2025 and the AWS binding term sheet (March 2026)
              represent two independent demand pipelines that could collectively exceed $2 billion in annual compute
              spend and materially diversify Cerebras away from its current UAE concentration. Fourth, the IPO itself
              validates institutional investor appetite for WSE-based AI compute at scale; the $5.55 billion raised is
              not speculative capital — it is capital deploying against an identified whitespace in the AI accelerator
              market where Nvidia's GPU ecosystem has pricing power but not a monopoly. Fifth, the dual-class structure
              and founder continuity (Andrew Feldman, Sean Lie) preserve strategic optionality to invest in
              next-generation WSE architecture without short-term earnings pressure.

              The anti-thesis is equally substantive. The 86% UAE customer concentration (MBZUAI 62%, G42 24% of FY2025
              revenue) creates asymmetric downside: any deterioration in either relationship — whether from US export
              control enforcement, geopolitical instability, or MBZUAI/G42 budget reallocation — would compress FY2026
              revenue dramatically without a replacement pipeline of comparable size. Nvidia's CUDA ecosystem and
              B200/GB200 NVL72 Blackwell architecture continues to dominate enterprise AI training and inference at
              scale, and the software moat compounds annually. Hardware-first business models historically trade at
              8-12x revenue in public markets, not 30-45x; Cerebras's premium multiple is priced to perfection and
              embeds almost no multiple-compression buffer. Export controls remain a live risk: the Saudi Aramco CFIUS
              review that delayed the 2024 S-1 was resolved, but BIS restrictions on advanced AI chip sales to UAE and
              Saudi Arabia remain an active regulatory uncertainty. Finally, the withdrawn 2024 S-1 attempt is a
              permanent part of the record — the original $4B valuation sought was not achievable in the 2024 market;
              the 2026 IPO succeeded only after 20 months of continued revenue growth, improved macro conditions, and
              the OpenAI MRA announcement.
