            title: UAE Customer Concentration Creates Fragile Revenue Base at IPO
            body: >-
              MBZUAI (62%) and G42 (24%) together represented roughly 86% of 2025 revenues. This concentration exposes
              Cerebras to geopolitical risk (UAE-US diplomatic relations, export controls), single-customer negotiating
              leverage, and potentially catastrophic revenue loss if either relationship deteriorates. The $20B+ OpenAI
              MRA reduces future UAE dependence but remains unexecuted in revenue terms as of the IPO date. Investors
              who priced in steep growth will face severe re-rating risk if near-term contract disruption materializes.
