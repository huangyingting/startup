  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Cerebras Systems competes in the AI accelerator and inference-as-a-service market across five
              overlapping alternative categories: (1) incumbent GPU platforms led by NVIDIA and AMD; (2)
              custom internal silicon from hyperscalers—Google TPU and AWS Trainium—available externally
              via cloud but designed primarily for internal scale; (3) specialist inference-chip start-ups,
              most notably Groq (LPU architecture) and SambaNova (Reconfigurable Dataflow Unit); (4)
              early-stage RISC-V or chiplet approaches such as Tenstorrent; and (5) the status quo of
              multi-GPU clusters running open inference runtimes like vLLM and TensorRT-LLM. Enterprise
              buyers must also consider the internal build option—assembling a dedicated GPU cluster
              on-premises—which remains the dominant procurement pattern at hyperscale consumers.

              NVIDIA's GPU ecosystem is the reference standard against which every alternative is evaluated.
              AMD's MI300X has emerged as the first credible GPU challenger; Intel's Gaudi 3 targets the
              mid-tier with direct data-center sales leverage. Among purpose-built AI chips, Cerebras's
              wafer-scale memory-bandwidth architecture is architecturally differentiated from both GPU
              clusters and inference-focused LPU designs, but must overcome NVIDIA's overwhelming software
              ecosystem dominance and deep hyperscaler integration. New entrants such as Tenstorrent,
              backed by $693M in 2025 funding, are in early production but lack credible traction against
              Cerebras's vertically integrated hardware-plus-API stack as of the May 2026 IPO date.
            claimRefs: []
      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              NVIDIA remains the category-defining competitor, generating approximately $47B in fiscal
              year 2025 data center revenue and holding an estimated 70–90% share in AI accelerator
              deployments. The H100 and H200 SXM5 are standard training and inference units for
              hyperscalers; the Blackwell B200/GB200 NVL72 rack system delivers 1.4 exaflops per rack
              and 8TB/s HBM3e per GPU chip, representing the next-generation platform that directly
              targets Cerebras's bandwidth narrative. NVIDIA's competitive advantage derives not only from
              hardware performance but from its CUDA ecosystem—an estimated 4M+ developers, decade-optimized
              libraries, and deep integration with every major cloud and framework.

              AMD's MI300X accelerator (192GB HBM3, 5.3TB/s) is the most commercially deployed alternative
              GPU, shipping at scale to Microsoft Azure and Meta since late 2023. AMD's ROCm software stack
              has improved meaningfully but still lags CUDA in operator coverage. Intel's Gaudi 3 targets
              cost-sensitive LLM training and inference, leveraging Intel's data-center sales relationships.

              Among hyperscaler silicon, Google TPU v5e/v5p are available on GCP with on-demand pricing
              but are tightly integrated with JAX/XLA frameworks, limiting portability. AWS Trainium2,
              accessible via SageMaker and EC2 Trn2, avoids model-format lock-in. SambaNova Cloud and
              Groq's LPU inference service represent the closest API-layer conceptual peers to Cerebras
              Cloud: both offer high-throughput LLM inference at competitive per-token pricing, but neither
              has disclosed meaningful independent enterprise revenue or verified benchmark results in 2026.
              Tenstorrent is in early production shipment targeting training workloads at smaller scale.
