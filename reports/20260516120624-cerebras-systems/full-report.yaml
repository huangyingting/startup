      Factor assessments are qualitative, based on SEC S-1/A disclosures, SIA data, and public vendor announcements.
      Timing is author estimate; forward-looking claims subject to technology execution and policy changes. The
      hyperscaler capex surge and open-source proliferation are the most certain near-term drivers; TSMC capacity
      constraints and NVIDIA Blackwell competitive response are the most significant medium-term risks to Cerebras'
      positioning.
