            body: >-
              Cerebras has constructed a partner ecosystem that simultaneously reduces some risks while creating new
              concentration vectors. The OpenAI relationship is the clearest example of this dual nature: the $1B
              working capital loan provides a critical buffer against capital-intensive hardware manufacturing cycles,
              but the same counterparty holds the largest committed revenue obligation, runs production workloads on
              Cerebras infrastructure, and holds 33.4 million dilutive warrants. If the OpenAI relationship deteriorates
              for any reason, including competitive dynamic shift, OpenAI corporate distress, or strategic pivot to
              custom silicon, the simultaneous loss of working capital support, near-future revenue, and the production
              reference customer would be structurally devastating. The UAE customer concentration is similarly
              entrenched: MBZUAI and G42 are sovereign-affiliated institutions with durable AI mandates, but both
              require active BIS export licenses and are subject to geopolitical risk beyond Cerebras control. The AWS
              binding term sheet provides the most credible near-term diversification pathway but has not yet generated
              recognized revenue. The dependency-map figure below inventories the principal partner and regulatory
              relationships and their directional dependencies. Until non-UAE and non-OpenAI revenue exceeds 20% of
              total, the partner and dependency risk vector should be treated as the primary investment concentration
              concern.
