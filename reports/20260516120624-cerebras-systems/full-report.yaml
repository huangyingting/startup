      - number: '2.4'
        title: Competitive Supply Dynamics
        blocks:
          - type: paragraph
            body: >-
              The AI accelerator supply side is dominated by NVIDIA at approximately 70-85% AI training market share by
              revenue. NVIDIA H100 GPU sells for $25,000-$40,000 per unit; Blackwell B200 delivers 5x H100 inference
              throughput and GB200 NVL72 racks cost approximately $3 million. AMD MI300X (192GB HBM3, 8 TB/s bandwidth)
              has gained traction at Microsoft Azure and Meta for memory-intensive inference; AMD AI revenue exceeded $5
              billion in 2024. Google's TPUv5 is cloud-only (no hardware purchase), used internally for Gemini and
              Imagen. AWS Trainium2 is Amazon's custom AI chip, available via SageMaker HyperPod. Intel Gaudi 3 targets
              mid-tier workloads at ~30-40% H100 discount. Cerebras has no direct wafer-scale competitor; the WSE-3's
              900,000 AI cores and 21PB/s on-chip SRAM bandwidth create an architecture differentiated from all GPU and
              HBM-based systems. TSMC 5nm underpins both WSE-3 and NVIDIA Hopper; capacity allocation is a shared
              constraint. US BIS export controls restrict H100/A100 equivalents to China and certain Middle East
              destinations, affecting both NVIDIA's TAM and Cerebras' UAE customer eligibility.
            claimRefs:
