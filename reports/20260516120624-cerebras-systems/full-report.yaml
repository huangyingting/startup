  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Severity Rankings
        blocks:
          - type: paragraph
            body: >-
              Cerebras Systems enters the public markets with a risk profile dominated by three structural
              concentrations that compound one another: a single manufacturing source (TSMC) for which no alternative
              exists, two customers representing 86% of revenue (MBZUAI and G42 in the UAE) operating under revocable
              BIS export licenses, and one counterparty playing three simultaneous roles (OpenAI as production customer,
              $1B lender, and $20B+ revenue anchor). These risks do not operate independently: a BIS export rule change
              targeting UAE destinations would simultaneously eliminate hardware revenue from both top customers, stress
              the OpenAI working capital loan, and impair the MRA diversification thesis. The risk-heatmap below maps
              ten identified risks by likelihood and impact severity, while the risk-transmission map shows how
              individual risk events cascade into revenue, financing, and valuation outcomes. Secondary risks include
              wafer-scale yield dependency, liquid-cooling infrastructure constraints, founder dual-class voting
              control, and an IPO multiple exceeding 190 times trailing revenue. No public monitoring thresholds have
              been disclosed by Cerebras; investors must construct their own monitoring frameworks before underwriting
              at the current valuation.
