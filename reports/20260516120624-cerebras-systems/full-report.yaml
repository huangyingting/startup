      - number: '3.3'
        title: Capability and Pricing Comparison
        blocks:
          - type: paragraph
            body: |
              The fundamental capability axis distinguishing Cerebras from GPU-based competitors is memory
              bandwidth per unit of inference latency. Cerebras WSE-3 delivers 21PB/s on-chip SRAM
              bandwidth versus H100's 3.35TB/s HBM3—roughly 6000x higher at the chip level—translating
              to dramatically lower time-to-first-token at small batch sizes. Cerebras publicly claims
              approximately 1,500 tokens/sec on single-stream Llama-70B inference versus 60–90 tokens/sec
              on H100. This advantage narrows under heavily batched multi-user workloads where GPU clusters
              amortize memory latency across large batches.

              On software completeness, NVIDIA CUDA's ecosystem depth—optimized transformer kernels,
              FlashAttention, TensorRT-LLM, NIM microservices, and broad framework support—represents a
              durable distribution-power advantage. AMD ROCm supports PyTorch and most CUDA operators via
              HIPification; Intel Gaudi 3 supports PyTorch 2.x natively. Cerebras requires customers to
              adopt its proprietary CTML compilation pipeline, increasing porting friction for workloads
              already optimized for CUDA.

              On pricing, Cerebras's published cloud API rate for Llama-3 70B inference is $0.60/M input
              tokens, competitive with major GPU-cloud providers charging roughly $0.90/M for equivalent
              throughput. Hardware-purchase customers pay approximately $2–4M per CS-3 system. No
              publicly disclosed list pricing exists for Cerebras enterprise inference contracts beyond
              the API rate card. The absence of a published MLPerf submission from Cerebras limits
              independent verification of its throughput performance claims.
