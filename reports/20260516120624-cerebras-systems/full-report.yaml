            body: >-
              No net revenue retention (NRR), gross revenue retention (GRR), churn rate, or cohort-based retention
              metric has been publicly disclosed by Cerebras as of May 2026. This is a material diligence gap: standard
              AI infrastructure investment analysis requires retention benchmarks to validate customer durability. The
              available proxy evidence is directionally positive but insufficient as a substitute for formal retention
              KPIs. G42 has been a continuous revenue contributor from FY2022 through FY2025, declining in revenue share
              only because MBZUAI grew faster—not because G42 churned. G42's $335M strategic investment further aligns
              incentives for continuity. MBZUAI grew from an implied smaller share in FY2024 to 62% of FY2025 revenue,
              demonstrating strong expansion rather than attrition. The OpenAI MRA structure—a $20B+ notional commitment
              and $1B working capital loan at 6% interest—implies a contractually committed long-term relationship that
              would be costly to exit. However, MRA conditionality terms are not publicly disclosed. No formal contract
              lengths, renewal cadences, or take-or-pay commitments have been disclosed for any customer. The absence of
              retention KPIs in the S-1/A is a standard omission for hardware companies at this scale, but it creates a
              diligence gap that should be addressed through private management access before investment.
