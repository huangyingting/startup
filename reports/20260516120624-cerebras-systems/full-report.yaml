      - number: '1.5'
        title: Company Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Cerebras was incorporated in Delaware in April 2016 and spent its first three years in stealth mode
              developing the wafer-scale chip concept. The WSE-1 was unveiled at Hot Chips 2019, the WSE-2 followed in
              2021, and the WSE-3 was introduced in March 2024. The company filed its initial S-1 with the SEC in
              September 2024 at a reference valuation of approximately $4.25 billion, followed by an amended S-1 in
              April 2026 and a final S-1/A in May 2026. SiliconAngle reported Cerebras initially targeted an IPO price
              range of $150 to $160 before finalizing at $185. The stock debuted at approximately $350 on May 14, closed
              at approximately $311 (+68% from offer price), but retreated to $279.72 on May 15. The Wall Street Journal
              characterized the IPO as a huge bet on Nvidia fatigue, signaling analyst skepticism about whether the
              non-standard form factor can sustain demand beyond early adopters. Adverse observations include the
              post-IPO stock decline, continuing non-GAAP operating losses despite GAAP profitability, heavy UAE
              customer concentration at IPO, and the undisclosed revenue recognition schedule under the OpenAI MRA. The
              GSK partnership and the $20 billion-plus OpenAI MRA signed in December 2025 represent major product-market
              validation milestones that transform the revenue concentration profile away from UAE entities toward a US
              hyperscaler anchor.
