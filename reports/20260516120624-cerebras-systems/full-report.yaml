        title: Software Stack and Developer Ecosystem
        blocks:
          - type: paragraph
            body: >-
              Cerebras software stack transforms the WSE-3 hardware advantage into accessible developer productivity.
              The Cerebras Compiler accepts standard PyTorch model definitions and automatically compiles them to
              optimized WSE-3 execution graphs, requiring no custom domain-specific language, model redesign, or manual
              kernel optimization. For inference workloads, Cerebras offers the Inference Cloud API, which is fully
              compatible with the OpenAI Chat Completions API specification. Any application integrated with the OpenAI
              API can route requests to Cerebras by changing only the base URL and API key. The API supports Llama
              family models, Codex-Spark from OpenAI, GPT-OSS-120B, and GLM 4.7. Published inference pricing is 0.60
              dollars per million input tokens for Llama-3 70B. The developer ecosystem is supported through three open
              channels: the Cerebras GitHub organization hosts a Model Zoo with reference implementations for GPT, BERT,
              and diffusion architectures; the HuggingFace organization distributes the Cerebras-GPT open-weight model
              family spanning 111M to 13B parameters, released in April 2023; and the Chinchilla scaling paper (arXiv
              2304.03208) validates hardware training efficiency. The Cerebras SDK, documentation portal
              (docs.cerebras.ai), and cloud console (cloud.cerebras.ai) complete the developer-facing surface, enabling
              end-to-end deployment from model import to production inference without leaving the Cerebras platform.
