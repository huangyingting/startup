      - number: '7.6'
        title: People, Execution, and Mitigations
        blocks:
          - type: paragraph
            body: >-
              Cerebras governance structure concentrates strategic control in founders through a dual-class share
              structure where Class B shares carry 10-to-1 voting rights, giving founders approximately 99.2% aggregate
              voting power at IPO despite institutional ownership of a significant economic share. Andrew Feldman (CEO)
              is explicitly named in the S-1/A as a key-person risk; no public succession plan has been disclosed. The
              engineering team represents a wafer-scale talent moat but also a talent concentration risk if core chip
              architects depart to NVIDIA, AMD, or well-funded AI chip startups, which could delay the CS-4 program by
              12-18 months. The people-execution risk register documents these dependencies by role. The mitigation and
              monitoring table below provides a structured investor framework built from S-1/A disclosures, BIS
              regulatory posture analysis, and analyst-derived threshold logic. Key diligence asks before underwriting
              at current valuation include: BIS license copies and renewal timelines, OpenAI MRA conditionality terms
              and loan covenant details, non-UAE revenue quarterly split, TSMC capacity contract summary, and an
              organizational depth chart for core engineering leadership. Without these inputs, underwriting Cerebras at
              a valuation exceeding $100 billion requires accepting material structural information asymmetries that
              cannot be resolved from public disclosures.
