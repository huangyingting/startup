      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Prior to its IPO, Cerebras raised approximately $720 million in venture capital across multiple rounds.
              G42, the Abu Dhabi-based AI conglomerate, invested a cumulative $335 million and became both Cerebras'
              largest strategic investor and primary revenue customer, representing 85% of 2024 revenues. In December
              2025, OpenAI committed a $1 billion Working Capital Loan at 6% annual interest maturing December 31, 2032,
              providing pre-IPO liquidity. The IPO at $185 per share on May 14, 2026 raised approximately $5.55 billion
              in gross proceeds. AWS signed a binding term sheet with Cerebras in March 2026, acquiring approximately
              2.7 million warrant shares at a $100 exercise price in connection with hardware procurement commitments.
              OpenAI holds a separate warrant for 33.4 million shares at a nominal $0.00001 per share exercise price
              tied to the master revenue agreement, representing material potential dilution for common stockholders.
              The share structure is dual-class: Class A shares carry one vote, Class B shares carry 20 votes, and Class
              N shares carry zero votes. Following the IPO, Class B holders—primarily founders and early
              insiders—retained approximately 99.2% of total voting power, enabling founder-controlled governance
              indefinitely. The combined equity from Series H and the OpenAI loan represent the most significant pre-IPO
              capitalization events, though individual round sizes for Series A through Series G are not fully
              disaggregated in public filings.
