      - number: '7.5'
        title: Financial and Model Risks
        blocks:
          - type: paragraph
            body: >-
              Cerebras financial risk profile features a significant GAAP versus non-GAAP gap, hardware deal lumpiness,
              and an IPO valuation that prices near-perfect execution. The FY2025 GAAP net income of approximately
              $237.8M is almost entirely driven by a non-cash warrant remeasurement gain related to the OpenAI warrants;
              on a non-GAAP adjusted basis, Cerebras shows an approximately $75.7M operating loss, which more accurately
              reflects underlying cash generation quality. Gross margin of approximately 39% is below software peers and
              reflects TSMC high fabrication costs for advanced-node wafer-scale production. Hardware revenue is
              composed of large, multi-hundred- million dollar contracts with extended lead times, creating
              quarter-over-quarter revenue volatility that can misalign with investor expectations and trigger
              disproportionate stock reactions to any earnings miss. At the IPO opening price implying approximately 196
              times trailing FY2025 revenue, a deceleration from 76% revenue growth to even 40-50% would likely compress
              the multiple significantly. The 180-day lockup expiry creates near-term supply overhang risk when insiders
              become eligible to sell approximately November 2026. The OpenAI $1B loan, while supportive in the near
              term, becomes an adversarial financial instrument if the relationship deteriorates before the 2032
              maturity date.
