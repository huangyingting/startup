  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Scope
        blocks:
          - type: paragraph
            body: >-
              The AI infrastructure market encompasses compute hardware, cloud services, and associated software sold to
              enable training and inference of AI and machine learning models. Included spend covers GPU and AI
              accelerator hardware (NVIDIA H100/B200, AMD MI300X, Google TPU, AWS Trainium, Intel Gaudi, Cerebras WSE),
              AI-specific cloud compute services, and AI networking (InfiniBand, NVLink). Excluded spend includes
              general-purpose compute, enterprise storage, and SaaS applications that happen to incorporate AI features.
              Two subsegments are most relevant to Cerebras: AI training infrastructure — dominated by NVIDIA and
              concentrated among hyperscalers and AI labs; and AI inference infrastructure — serving models in
              production applications, growing faster than training as enterprise deployment expands. The Cerebras
              Inference Cloud competes in the inference-as-a-service subsegment against OpenAI API, Together AI, and
              Groq on throughput and price. Status-quo substitutes include NVIDIA-based cloud instances (AWS p5, Google
              A3) and proprietary inference APIs from AI labs.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM015
