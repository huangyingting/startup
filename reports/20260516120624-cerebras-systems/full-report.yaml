      - number: '3.4'
        title: Switching Costs and Distribution Power
        blocks:
          - type: paragraph
            body: |
              Cerebras's proprietary CTML compilation pipeline and flat on-chip SRAM memory model create
              material switching costs: workloads optimized for WSE-3's memory hierarchy must be
              restructured for GPU clusters, typically requiring 6–18 months for production-grade LLM
              pipelines. This is simultaneously a competitive moat and a barrier to initial adoption—
              enterprise evaluators must weigh the switching cost of adopting Cerebras against the future
              cost of leaving.

              NVIDIA's distribution power is unmatched. All three major hyperscalers (AWS, Azure, GCP)
              offer NVIDIA GPU instances as the default compute option; NVIDIA NIM microservices are
              pre-integrated in GCP Vertex AI and AWS SageMaker. AMD benefits from similar hyperscaler
              distribution via AMD-instance SKUs. Intel Gaudi 3 is sold primarily through Intel's direct
              data-center sales force with limited cloud availability. Cerebras has no hyperscaler
              spot-market integration as of May 2026; its AWS partnership (binding term sheet, March 2026)
              covers Cerebras-dedicated cloud instances only.

              Multi-homing between Cerebras and GPU infrastructure is technically possible but operationally
              expensive due to compiler differences. Customers embedding Cerebras APIs in production
              inference pipelines face limited practical multi-homing, as CTML-optimized models cannot be
              trivially re-deployed to NVIDIA TRT or vLLM without re-optimization. SambaNova and Groq users
              face similar, if slightly lower, switching costs due to their API-first interfaces built over
              standard model formats. TSMC 5nm wafer-scale manufacturing is a supply-side barrier that new
              entrants cannot quickly replicate; comparable TSMC commitments plus defect-management
              know-how require 5+ years of development.
            claimRefs: []
      - number: '3.5'
        title: Moat Durability and Displacement Risk
        blocks:
          - type: paragraph
            body: |
              Cerebras's primary durable moat claims are: (1) architectural bandwidth from wafer-scale
              SRAM; (2) TSMC 5nm wafer-scale manufacturing expertise that no competitor currently
              replicates; and (3) a software/API layer abstracting the hardware advantage into a
              developer-accessible product. These claims are credible but carry two material displacement
              risks.

              First, NVIDIA's Blackwell B200 SXM5 delivers 8TB/s HBM3e bandwidth—more than 2x the
              H100—significantly narrowing the bandwidth gap that Cerebras exploited during the H100 era.
              While WSE-3 still leads in absolute bandwidth, the relative gap is compressing. NVIDIA
              simultaneously launched NIM inference microservices in 2024, competing directly with
              Cerebras's inference API commercial model, creating a two-sided squeeze on hardware
              performance and API-layer positioning.

              Second, Cerebras WSE-3's 44GB on-chip SRAM limits native model capacity to roughly 60B
              parameters; larger frontier models require multi-WSE-3 parallelism, reducing per-token
              efficiency. As frontier model sizes scale—Llama 4 Maverick is approximately 400B parameters—
              the core value proposition of running the entire model in on-chip SRAM weakens unless WSE-4
              delivers substantially larger memory. Cerebras has not submitted WSE-3 results to MLCommons
              MLPerf inference benchmarks, leaving its throughput claims without independent third-party
              validation—an adverse signal for enterprise procurement teams requiring benchmark evidence.
              Customer concentration at MBZUAI (62% of 2025 revenue) is an additional durability risk.
