      - number: '5.5'
        title: Competitive Differentiation and Intellectual Property
        blocks:
          - type: paragraph
            body: >-
              Cerebras primary moat is architectural and manufacturing: the company holds the only commercially shipped
              wafer-scale AI processor at production volume as of May 2026. Replicating the WSE-3 would require mastery
              of full-wafer silicon interposer and custom packaging technology, a compiler toolchain with years of
              silicon-software co-development, design expertise to verify a 4-trillion-transistor chip with no inter-die
              redundancy, and TSMC foundry relationships with allocated capacity for full-wafer N5, among the most
              complex manufacturing arrangements TSMC supports commercially. The S-1/A references patents, trade
              secrets, and manufacturing know-how without enumerating specific patent numbers. The structural secrecy
              around the WSE architecture functions as a trade-secret barrier: the internal mesh fabric design, compiler
              optimization passes, and silicon floorplan are not publicly disclosed. Cerebras-GPT and the arXiv
              2304.03208 paper demonstrate hardware performance consistent with theoretical bandwidth predictions. The
              NVIDIA CUDA ecosystem remains the dominant developer platform with the largest pre-trained checkpoint
              library and partner support. Cerebras OpenAI-API-compatible inference interface reduces switching cost for
              inference workloads but does not displace CUDA for training workflows requiring custom kernels. The key
              competitive risk is that NVIDIA improves HBM bandwidth generation-over-generation and may close the
              per-token latency gap for small models, or hyperscaler disaggregated inference architectures erode the
              single-chip advantage for larger models. Cerebras FY2025 gross margin of 39 percent indicates the current
              competitive position sustains pricing power at scale.
            claimRefs:
              - CE015
              - CE016
              - CE026
      - number: '5.6'
        title: Trust, Compliance, and Product Roadmap
        blocks:
          - type: paragraph
            body: >-
              Cerebras primary compliance obligation is export control under Bureau of Industry and Security Export
              Administration Regulations. Shipments of advanced AI semiconductor systems to UAE-based customers MBZUAI
              (62 percent of FY2025 revenue) and G42 (24 percent of FY2025 revenue) require BIS export licenses.
              Dependence of over 86 percent of revenue on UAE customers subject to BIS/EAR export controls is a material
              operational risk disclosed prominently in the S-1/A. Export license delays, revocations, or policy
              restrictions could block the majority of hardware revenue with limited near-term diversification
              alternatives. Quality and reliability evidence is primarily production-validated: OpenAI Codex-Spark and
              GSK RNA drug discovery workloads confirm enterprise quality requirements are met. However, Cerebras has
              not publicly disclosed SOC 2 Type II or ISO 27001 cloud security certifications for the Inference Cloud
              API as of May 2026, a diligence gap for enterprise customers evaluating cloud security posture. Hardware
              quality is governed by TSMC standard semiconductor manufacturing quality controls, but system-level MTBF
              statistics for the CS-3 have not been published. The product roadmap as of May 2026 does not include an
              announced WSE-4 successor chip. Cerebras generation cadence has been approximately biennial: WSE-1 (2019),
              WSE-2 (2021), WSE-3 (2023). The next significant product milestone is the AWS disaggregated inference
              integration under the March 2026 binding term sheet, with deployment timeline not publicly disclosed.
