            body: >-
              The Cerebras SEC S-1/A Amendment No. 2 (May 2026) cites an AI infrastructure TAM of $251 billion in 2025
              projected to $672 billion by 2029 (28% CAGR). A narrower lens — the AI chip market alone — is estimated at
              approximately $120 billion in 2025 by the Semiconductor Industry Association, more than doubling from $55
              billion in 2023. Cerebras management estimates its SAM at $13.7 billion in 2025 growing to $51.5 billion
              by 2029, representing inference-first workloads where the WSE-3's speed advantage is most relevant.
              EpochAI's analysis shows frontier model training compute has grown 4x per year since 2020, supporting
              continued hardware demand. Stanford HAI AI Index 2025 estimates total AI investment reached $100 billion
              in 2024. McKinsey's 2024 State of AI report finds 72% of organizations have adopted AI in at least one
              business function. These signals confirm a market in early-adoption phase with secular tailwinds through
              2029.
