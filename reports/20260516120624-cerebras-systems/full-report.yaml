      - number: '7.3'
        title: Operational, Quality, and Security Risks
        blocks:
          - type: paragraph
            body: >-
              Cerebras operational risk is dominated by its sole-source relationship with TSMC for WSE-3 fabrication. No
              other foundry in the world has publicly disclosed capability to manufacture a chip occupying a full 300mm
              wafer at the advanced lithography node required for commercial yield. This makes TSMC a structural binary
              dependency: a Taiwan conflict, TSMC production disruption, capacity reallocation, or yield-impacting
              process change could halt Cerebras entire hardware supply pipeline for 12 or more months. The
              defect-tolerant routing embedded in WSE-3 design mitigates yield risk from individual transistor failures,
              but cannot compensate for a foundry-level production halt or a fundamental TSMC process change that
              renders the routing ineffective. CS-3 systems require approximately 23 kW power draw and liquid cooling,
              limiting deployment to specialized data center facilities and structurally constraining the on-premises
              total addressable market, partially addressed by cloud inference but introducing cloud-specific
              operational risks. Cerebras cloud inference services have not disclosed a SOC 2 Type II certification,
              incident response protocol, or enterprise security audit as of May 2026, a gap that could become a
              material sales objection for enterprise and regulated-industry customers. Hardware lead times of 6-12
              months from TSMC mean that any supply disruption translates into a multi-quarter revenue gap with limited
              short-cycle recovery options.
            claimRefs:
