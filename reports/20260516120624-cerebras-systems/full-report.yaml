chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Legal Structure, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Cerebras Systems Inc. is a Delaware corporation founded in April 2016, headquartered at 1237 E. Arques
              Avenue, Sunnyvale, California 94085. The company designs and manufactures the Wafer-Scale Engine (WSE),
              the world's largest commercially produced integrated circuit, integrating it into the CS-3 compute system.
              Its core business model spans two complementary revenue streams: direct hardware sales of CS-3 clusters to
              hyperscalers, research institutions, and government-affiliated AI labs; and cloud-based inference services
              via the Cerebras Inference Cloud API accessible at cerebras.ai/inference and cloud.cerebras.ai. The
              inference cloud service enables customers to run large language models at throughput exceeding 2,100
              tokens per second, which the company advertises as up to 15 times faster than NVIDIA GPU-based deployments
              for equivalent LLM workloads. Cerebras is a fabless chip designer: all silicon fabrication is outsourced
              to TSMC on its 5-nanometer process. The WSE-3, the latest generation chip, integrates 4 trillion
              transistors across a 46,225 mm² die, with 900,000 AI cores, 44 GB of on-chip SRAM, and 21 petabytes per
              second of on-chip memory bandwidth. Cerebras began trading on the Nasdaq Global Select Market under ticker
              CBRS on May 14, 2026 following completion of its initial public offering. The company's value proposition
              centers on speed-first AI inference at scale, positioning its chip as a replacement for large multi-GPU
              clusters in latency-sensitive inference applications.
