              large-scale capacity commitments.

              The financial verdict on Cerebras at the May 2026 IPO is mixed. Revenue quality is
              structurally weak due to extreme customer concentration (MBZUAI + G42 = ~86% of 2025
              revenue from two entities) and a large unverified forward commitment (OpenAI MRA). Revenue
              growth is impressive but comparisons to historical benchmarks must account for the unusual
              structure. Gross margin at 39–42% is consistent with a high-quality hardware company but
