        blocks:
          - type: paragraph
            body: >-
              Cerebras serves five distinct customer segments differentiated by buyer type, geography, vertical, and
              procurement model. Sovereign AI programs—primarily MBZUAI and G42 in the UAE—constitute the anchor
              segment, representing approximately 86% of FY2025 revenue through large multi-year hardware contracts.
              These buyers are institutional and government-affiliated, with 6-to-18-month procurement cycles and
              extraordinary contract size ($100M+). Foundation model labs and hyperscalers—led by OpenAI under a $20B+
              Master Revenue Agreement—represent the largest potential expansion segment. US national laboratories and
              defense customers, anchored by Sandia National Laboratories, validate scientific computing use cases.
              Enterprise life-sciences customers such as GSK demonstrate vertical adoption for RNA/protein model
              training. Finally, cloud API developers access Cerebras via cloud.cerebras.ai at $0.60 per million input
              tokens, enabling self-serve adoption with no hardware procurement friction. The segmentation reveals a
              bifurcated revenue model: high-value hardware contracts from sovereign and institutional buyers versus a
              nascent cloud/API business targeting the broader developer and enterprise market. Hardware was
              approximately 70% of FY2025 revenue ($358.4M) and cloud/services the remaining 30% ($151.6M), a
