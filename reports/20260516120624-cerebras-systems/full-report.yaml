      - number: '1.4'
        title: Key Performance Metrics and Stage Assessment
        blocks:
          - type: paragraph
            body: >-
              Cerebras is now a publicly traded company at an advanced growth stage. Revenue grew from $24.6 million in
              2022 to $78.7 million in 2023, $290.3 million in 2024, and $510.0 million in 2025, representing 76%
              year-over-year growth in the most recent fiscal year. Gross margins expanded from 12% in 2022 to 42% in
              2024 before compressing slightly to 39% in 2025, reflecting volume mix shifts toward hardware deployments.
              The company achieved GAAP net income of $237.8 million in 2025, a dramatic reversal from a $481.6 million
              GAAP net loss in 2024. However, 2025 profitability was significantly influenced by non-cash warrant
              fair-value revaluations related to the OpenAI and AWS transactions; the non-GAAP net loss for 2025 was
              $75.7 million, indicating the underlying business remains pre-profitable on a cash-adjusted basis.
              Headcount was 708 as of December 31, 2025, growing to approximately 1,000 by March 2026. Customer
              concentration is the most material operational risk: MBZUAI accounted for 62% of 2025 revenue and 77.9% of
              accounts receivable at year-end 2025. Combined with G42, UAE-linked entities represented approximately 86%
              of total 2025 revenues, creating significant geopolitical and counterparty concentration exposure that
              investors must weigh against the forward revenue trajectory from the OpenAI Master Revenue Agreement.
