          knowledge decay
        - >-
          WATCH 2 quarters — if departure is confirmed, request management explanation; reduce position if R&D velocity
          declines measurably
    notes: >-
      All trigger thresholds are monitoring criteria, not automatic trading signals. Each event requires independent
      verification before action. Institutional investors should define pre-set responses before IPO lock-up expiry.
    claimRefs:
      - CV029
      - CV030
      - CV032
      - CV033
      - CV042
  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner / diligence path
    rows:
      - - Segment-level gross margins (hardware vs. cloud)
        - >-
          S-1/A does not disclose gross margin by segment; total blended gross margin is disclosed but hardware vs.
          Cerebras Cloud API split is unknown
        - >-
          If hardware gross margins are <30% and cloud margins are >70%, the mix shift toward cloud API is far more
          valuable than headline revenue suggests; affects multiple justification
        - >-
          First quarterly earnings call (Q3 2026) — management discussion should provide gross margin by segment; if
          not, submit IR request
      - - OpenAI MRA contract structure (minimum vs. optional commits)
        - >-
          The $20B+ MRA has not been filed publicly; the S-1/A mentions it as a master revenue agreement but does not
          specify minimum purchase commitments, take-or-pay structure, or quarterly drawdown conditionality
        - >-
          If MRA is purely optional (no minimum commits), the $20B headline is not a committed pipeline; bear case
          probability increases substantially
        - >-
          Review Form 8-K if filed as material contract; if not yet filed, request contract summary from IR or review
          next SEC quarterly filing
      - - BIS export compliance opinion for UAE customers post-IPO
        - >-
          No legal opinion or compliance certification has been disclosed regarding BIS advanced AI chip export licenses
          for MBZUAI and G42 under current October 2023 rule or any proposed successor rule
        - >-
          Export compliance failure would immediately trigger Revenue risk in bear case; without confirmed legal
          clearance, the 86% UAE concentration is an unquantified regulatory overhang
        - >-
          Request outside counsel BIS opinion through data room or investor FAQ; confirm MBZUAI/G42 supply chain does
          not require new licenses under any pending BIS rule revision
      - - Lock-up expiry insider selling plans
        - >-
          Lock-up schedule and any Rule 10b5-1 plans for founder/executive share sales have not been disclosed pre-IPO;
          mandatory post-lock-up disclosures are typically Form 4 filed 2 business days after sale
        - >-
          Lock-up expiry (90-180 days post-IPO = August-November 2026) will create supply pressure; knowing management's
          selling intention before expiry allows better entry point management
        - >-
          Monitor SEC EDGAR Form 4 filings from founders and executives; review any pre-announced 10b5-1 plan
          disclosures in the prospectus or S-1/A amendment filings
      - - WSE-4 roadmap and TSMC capacity allocation
        - >-
          The S-1/A references WSE-3 on TSMC 5nm; WSE-4 architecture, schedule, and TSMC allocation status for
          next-generation silicon are not disclosed
        - >-
          Hardware companies with 18-24 month product cycles face competitive relevance risk if next-generation silicon
          is delayed; TSMC capacity constraints are a live risk given Apple/Nvidia/AMD priority allocation
        - >-
          Request technology roadmap briefing from management at investor conference; confirm TSMC allocation and
          tape-out schedule for WSE-4
    notes: >-
      Items 1-3 are material for position sizing at IPO price. Items 4-5 are incremental information. All should be
      resolved within the first two post-IPO earnings cycles.
    claimRefs:
      - CV037
      - CV040
      - CV042
