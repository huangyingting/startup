      - number: '8.4'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >-
              The bull case assumes Cerebras executes on both the OpenAI MRA and AWS term sheet simultaneously, growing
              FY2026 revenue to $900M and FY2027 revenue to $1.5-2B as inference-at-scale demand compounds. In this
              scenario, the UAE concentration falls below 40% by FY2027 as OpenAI, AWS, and domestic enterprise clients
              ramp. Revenue multiples in the 15-20x range apply as the company demonstrates durable operating leverage
              and Nvidia displacement in latency-sensitive inference workloads. At 17.5x $2B revenue, the implied
              enterprise value is $35B — approximately 2.5x from the $185 IPO price on a $14B market cap (using a 20%
              IPO float estimate). Probability of bull case: approximately 20-25%.

              The base case assumes the OpenAI MRA begins contributing revenue in H2 2026 but at below-plan rates, UAE
              revenue holds flat as MBZUAI and G42 extend existing contracts, and the AWS term sheet closes but takes
              12-18 months to generate meaningful revenue. FY2026 revenue reaches $700-900M (40-75% growth), FY2027
              reaches $900M-1.1B. At 12-14x NTM revenue of $1B, the enterprise value is $12-14B — approximately 7-14%
              downside to the implied market cap from IPO price. Probability of base case: approximately 50%.

              The bear case assumes US BIS export controls are tightened to restrict UAE AI chip sales, materially
              impacting MBZUAI and G42 revenue in H2 2026. FY2026 revenue contracts to $400-500M as the pipeline proves
              insufficient to replace UAE decline. The OpenAI MRA drawdown is delayed by counterparty execution
              challenges. Revenue multiple compresses to 8-10x as hardware-first peers in public markets struggle. At 9x
              $500M revenue, the enterprise value is $4.5B — representing 65-75% downside from the IPO implied market
              cap. Probability of bear case: approximately 25-30%.
