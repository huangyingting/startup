      - number: '5.2'
        title: CS-3 System Design and Deployment Architecture
        blocks:
          - type: paragraph
            body: >-
              The Cerebras CS-3 compute system integrates the WSE-3 chip into a standard two-rack-unit datacenter
              chassis. The CS-3 is the complete hardware product, encompassing the WSE-3 chip, power delivery, cooling
              infrastructure, and networking interconnects in a single deliverable unit priced at approximately two to
              four million dollars per system based on disclosed deal values. No official list price is published. The
              WSE-3 die dissipates substantially more thermal energy than conventional GPU boards and requires liquid
              cooling or high-airflow forced-air environments. Customers deploying CS-3 systems must configure data
              centers accordingly, adding operational overhead relative to standard GPU deployments. For workloads
              exceeding a single WSE-3 memory capacity (models above approximately 44 billion parameters), Cerebras
              provides the Cluster Manager, which orchestrates multiple CS-3 systems in a scale-out configuration using
              standard datacenter networking. The Cluster Manager enables disaggregated inference, distributing model
              layers across multiple WSE-3 nodes. This is the technical basis for the AWS integration announced via
              binding term sheet in March 2026, combining CS-3 nodes with AWS Trainium for hybrid disaggregated
              inference. Critical third-party dependencies include TSMC as sole wafer fabrication supplier and the
              packaging and chassis supply chain. The S-1/A prominently discloses the single-supplier concentration risk
              from TSMC dependence as a material risk to hardware revenue continuity.
