      - number: '5.4'
        title: Inference Performance and Competitive Benchmarks
        blocks:
          - type: paragraph
            body: >-
              Cerebras claims 2,100+ tokens per second for Llama 3 8B on a single WSE-3, approximately 15 times faster
              than a comparable NVIDIA H100 or B200 GPU. This claim is analytically consistent with the hardware
              architecture: LLM inference throughput is directly proportional to available memory bandwidth for
              memory-bound workloads, and the WSE-3 21 PB/s internal bandwidth vastly exceeds the HBM3e bandwidth of the
              NVIDIA B200 NVL72 cluster at approximately 8 TB/s. For models fitting entirely within 44 GB of on-chip
              SRAM, the WSE-3 delivers near-peak bandwidth utilization with zero off-chip memory traffic. Production
              evidence supports the performance claim. OpenAI Codex-Spark runs on Cerebras inference infrastructure,
              providing hyperscaler-grade production validation. GSK reported 10x training speedup with a 120x larger
              RNA drug discovery dataset. MBZUAI operates CS-3 clusters for UAE sovereign AI computing at 62 percent of
              FY2025 revenue. The competitive landscape includes NVIDIA B200 NVL72 (approximately 8 TB/s HBM bandwidth,
              estimated 140 tok/s for 8B LLM), AMD MI300X (5.3 TB/s, 192 GB HBM3), and Google TPU v5/v6 (optimized for
              distributed training). For models up to 44B parameters in latency-sensitive single-user inference, the
              WSE-3 architecture is demonstrably differentiated. For models exceeding 44B parameters requiring
              disaggregated inference, the advantage narrows as distributed-compute complexity increases.
            claimRefs:
              - CE009
              - CE010
              - CE011
              - CE014
              - CE017
              - CE029
              - CE032
