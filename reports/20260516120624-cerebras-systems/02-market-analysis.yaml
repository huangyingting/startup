    topic: NVIDIA GPU model-level market share breakdown — data not publicly disclosed
    missingEvidence: NVIDIA does not disclose data center revenue by GPU model (H100 vs A100 vs B200 vs H200); exact unit
      volumes by model are unknown; the 70-85% NVIDIA market share estimate is derived from NVIDIA's data center revenue as
