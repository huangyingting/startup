company:
  name: Cerebras Systems
chapter:
  number: 2
  title: Market Analysis
  summary: Cerebras competes in the global AI accelerator and AI infrastructure market, which its SEC S-1/A estimates at $251
    billion in 2025 growing to $672 billion by 2029 (28% CAGR). The inference segment — Cerebras' primary commercial focus
    via the Cerebras Inference Cloud — is growing fastest as LLM deployments move from training labs to production inference
    at hyperscalers and enterprises. NVIDIA holds approximately 70-85% of the AI training accelerator market, creating strong
    demand for alternatives on cost, availability, and latency dimensions. Cerebras' SAM is estimated at $13.7 billion in
    2025 growing to $51.5 billion by 2029. UAE-based customers (MBZUAI and G42) represented 86% of 2025 revenue, creating
    substantial near-term customer concentration risk that the company is seeking to diversify via OpenAI and AWS relationships.
sections:
- id: section-m1
  title: Market Definition and Scope
  body: 'The AI infrastructure market encompasses compute hardware, cloud services, and associated software sold to enable
    training and inference of AI and machine learning models. Included spend covers GPU and AI accelerator hardware (NVIDIA
    H100/B200, AMD MI300X, Google TPU, AWS Trainium, Intel Gaudi, Cerebras WSE), AI-specific cloud compute services, and AI
    networking (InfiniBand, NVLink). Excluded spend includes general-purpose compute, enterprise storage, and SaaS applications
    that happen to incorporate AI features. Two subsegments are most relevant to Cerebras: AI training infrastructure — dominated
    by NVIDIA and concentrated among hyperscalers and AI labs; and AI inference infrastructure — serving models in production
    applications, growing faster than training as enterprise deployment expands. The Cerebras Inference Cloud competes in
    the inference-as-a-service subsegment against OpenAI API, Together AI, and Groq on throughput and price. Status-quo substitutes
    include NVIDIA-based cloud instances (AWS p5, Google A3) and proprietary inference APIs from AI labs.'
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM004
  - CM015
  tableRefs:
  - TM001
  figureRefs: []
- id: section-m2
  title: Market Sizing and Growth Trajectory
  body: The Cerebras SEC S-1/A Amendment No. 2 (May 2026) cites an AI infrastructure TAM of $251 billion in 2025 projected
    to $672 billion by 2029 (28% CAGR). A narrower lens — the AI chip market alone — is estimated at approximately $120 billion
    in 2025 by the Semiconductor Industry Association, more than doubling from $55 billion in 2023. Cerebras management estimates
    its SAM at $13.7 billion in 2025 growing to $51.5 billion by 2029, representing inference-first workloads where the WSE-3's
    speed advantage is most relevant. EpochAI's analysis shows frontier model training compute has grown 4x per year since
    2020, supporting continued hardware demand. Stanford HAI AI Index 2025 estimates total AI investment reached $100 billion
    in 2024. McKinsey's 2024 State of AI report finds 72% of organizations have adopted AI in at least one business function.
    These signals confirm a market in early-adoption phase with secular tailwinds through 2029.
