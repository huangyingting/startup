- id: TM004
  title: Growth Drivers and Constraints Table
  slug: growth-drivers-and-constraints-table
  description: Structured assessment of market growth drivers and adoption constraints affecting AI infrastructure demand
    and Cerebras' addressable market.
  columns:
  - Factor
  - Direction
  - Timing
  - Implication for Cerebras
  rows:
  - - AI Model Scaling Laws
    - Driver (Accelerating)
    - Ongoing
    - Frontier training compute 4x/yr; directly scales AI chip TAM and demand for Cerebras CS-3 training clusters
  - - Enterprise Inference Deployment Wave
    - Driver (Accelerating)
    - 2025-2028 peak
    - Production LLM deployment at enterprises expands inference market; Cerebras' primary SAM segment
  - - Open-Source Model Proliferation (Llama 3, Mistral, Qwen)
    - Driver (Accelerating)
    - Now ongoing
    - Enterprises deploy custom open models; drives on-premise and cloud inference demand for Cerebras
  - - Sovereign AI Mandates (UAE, Saudi, India)
    - Driver (Expanding)
    - Multi-year programs
    - Large captive buyers outside US hyperscaler ecosystem; already Cerebras' largest revenue source
  - - Hyperscaler AI Capex Surge ($300B+ in 2026)
    - Driver (Accelerating)
    - 2025-2027
    - Expands total chip demand; creates market opportunity for non-NVIDIA share
  - - TSMC Advanced-Node Capacity Constraint
    - Constraint
    - 2025-2027
    - 5nm/3nm capacity shared across NVIDIA, AMD, Apple, Qualcomm; limits Cerebras volume ramp
  - - US BIS Export Controls (AI chips to China/UAE)
    - Risk/Constraint (Ongoing)
    - Escalation risk
    - Restricts TAM; UAE customer eligibility requires ongoing compliance monitoring
  - - AI Data Center Power Constraints
    - Constraint
    - 2026-2030
    - IEA projects 1,000 TWh/yr AI power demand by 2030; limits siting of new AI data centers
  - - NVIDIA Blackwell Competitive Response
    - Risk (Narrowing gap)
    - 2026-2027
    - B200 delivers 5x H100 inference throughput; may narrow Cerebras' speed advantage for standard GPU workloads
  notes: Factor assessments are qualitative, based on SEC S-1/A disclosures, SIA data, and public vendor announcements. Timing
    is author estimate; forward-looking claims subject to technology execution and policy changes. The hyperscaler capex surge
    and open-source proliferation are the most certain near-term drivers; TSMC capacity constraints and NVIDIA Blackwell competitive
    response are the most significant medium-term risks to Cerebras' positioning.
