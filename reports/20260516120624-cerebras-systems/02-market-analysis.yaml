  evidenceGaps:
  - type: missing-source
    severity: material
    topic: Independent AI inference cloud market sizing — no standalone segment data available
    missingEvidence: No independent third-party analyst (IDC, Gartner, Forrester) market size estimate is available for the
      AI inference-as-a-service cloud segment as a standalone subsegment; Cerebras' $251B TAM and $13.7B SAM are self-reported
      in the SEC S-1/A without identifying the underlying analyst source. The inference vs training revenue split is undisclosed
      by NVIDIA and other chip vendors.
    whyItMatters: The $251B TAM and $13.7B SAM cannot be independently verified; the inference-training revenue split assumption
      is critical to Cerebras' growth thesis. If inference accounts for a smaller share of hardware revenue than volume suggests,
      the SAM could be significantly smaller than management estimates.
    diligencePath: Obtain IDC Worldwide AI Semiconductor Forecast, Gartner AI Infrastructure Market Guide, or McKinsey AI
      Infrastructure deep-dive for independent inference subsegment sizing; request NVIDIA management commentary on inference
      vs training revenue mix.
    relatedQuestionRefs:
    - QM002
    - QM009
    - QM016
    - QM022
  - type: missing-source
    severity: minor
    topic: Buyer segment coverage gap — SMB and developer segments not profiled
    missingEvidence: Only four buyer segments profiled; SMB developer communities, individual researchers, and AI startup
      customers using the inference cloud API are not profiled despite representing potentially meaningful usage volume and
      diversification from sovereign AI.
    whyItMatters: The inference cloud API is accessible to any developer; long-tail demand from SMB and startup segments may
      provide meaningful revenue diversification below hyperscaler and sovereign deals. Ignoring this segment understates
      the breadth of inference cloud demand.
    diligencePath: Request Cerebras inference cloud customer cohort data; review API usage statistics for developer community;
      compare to Groq and Together AI developer community disclosures.
    relatedQuestionRefs:
