  claims:
  - id: CM001
    statement: The total addressable market for AI infrastructure was approximately $251 billion in 2025 and is projected
      to reach $672 billion by 2029, a 28% CAGR, per the Cerebras SEC S-1/A Amendment No. 2.
    type: company-claimed
    topic: Market sizing — AI infrastructure TAM
    confidence: high
    freshness: current
    sourceRefs:
    - SM018
    - SM019
    answersQuestionRefs:
    - QM001
  - id: CM002
    statement: The AI infrastructure market spans two primary segments — AI training infrastructure and AI inference infrastructure
      — with inference growing faster as enterprise LLM deployment moves to production.
    type: third-party-reported
    topic: Market definition — training vs inference segmentation
    confidence: medium
    freshness: current
    sourceRefs:
    - SM001
    - SM018
    - SM012
  - id: CM003
    statement: Excluded from the Cerebras addressable market are general-purpose cloud compute, enterprise SaaS AI features,
      and AI networking; Cerebras' TAM covers AI accelerator hardware and AI inference cloud services only.
    type: inferred
    topic: Market definition — included and excluded spend
    confidence: medium
    freshness: current
    sourceRefs:
    - SM018
    - SM020
    - SM021
  - id: CM004
    statement: NVIDIA holds an estimated 70-85% market share in AI training accelerators by revenue; AMD MI300X and Intel
      Gaudi 3 are the primary non-custom alternatives, while Google TPU and AWS Trainium serve their respective cloud ecosystems.
