- id: section-m5
  title: Growth Drivers, Constraints, and Market Risks
  body: 'Primary demand growth drivers: (1) AI model scaling — training compute 4x/year since 2020 requiring proportionally
    more hardware; (2) inference at scale — enterprise production deployments in early innings, with McKinsey estimating 72%
    AI adoption but far fewer in production inference at volume; (3) open-source model proliferation — Llama 3, Mistral, Qwen
    enable enterprise custom inference without proprietary API lock-in, driving demand for inference infrastructure; (4) sovereign
    AI mandates — UAE, Saudi Arabia, India allocating billions to domestic AI capability. Key constraints: TSMC advanced-node
    capacity shared across NVIDIA, AMD, Apple, Qualcomm; US BIS export controls limiting chip sales to certain countries;
    AI data center power constraints (IEA projects 1,000 TWh/yr by 2030); and hardware procurement capital intensity. Customer
    concentration risk is acute given MBZUAI''s 62% and G42''s 24% share of 2025 revenues; any slowdown in UAE sovereign AI
    spending would materially impact near-term revenue.'
