- id: section-m3
  title: Buyer Segmentation and Demand Profile
  body: Four buyer segments drive AI infrastructure demand. Hyperscalers and foundation labs (OpenAI, Microsoft, Google, Amazon,
    Meta) are the largest buyers by spend, accounting for an estimated 60-70% of AI chip purchases. Cerebras' OpenAI Master
    Research Agreement and AWS binding term sheet represent entry into this segment. Government and sovereign AI programs
    (UAE/MBZUAI/G42, Saudi Arabia, India, France) are characterized by geopolitical AI mandates and large budget allocations;
    Cerebras derived 86% of 2025 revenue from UAE entities. Academic and national research labs procure through government
    grant cycles at longer timelines. Enterprise buyers (pharma, biotech, financial services, healthcare) are the fastest-growing
    emerging segment for inference cloud adoption, with procurement via API rather than hardware. GSK's RNA model training
    on Cerebras exemplifies this pattern. Procurement cycles range from hours (API) to 18 months (large hardware cluster).
