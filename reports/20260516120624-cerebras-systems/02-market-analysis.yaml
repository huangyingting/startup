    severity: material
    topic: Geographic AI accelerator demand segmentation — no breakdown available
    missingEvidence: No breakdown of global AI accelerator demand by geography (North America, APAC, EMEA, Middle East) is
      available from SIA or independent sources; China market exclusion due to BIS controls is confirmed but its absolute
      market size is unknown; Middle East sovereign AI investment scale is approximated from disclosed contracts only.
    whyItMatters: Geographic demand segmentation would clarify how export control restrictions actually affect TAM, whether
      Middle East sovereign AI demand is structural, and where next investment waves will originate — all relevant to Cerebras'
      customer diversification strategy.
    diligencePath: Review TSMC regional revenue disclosures; analyze NVIDIA and AMD geographic data center revenue breakdowns;
      research UAE and Saudi AI strategy investment budgets from government publications.
    relatedQuestionRefs:
