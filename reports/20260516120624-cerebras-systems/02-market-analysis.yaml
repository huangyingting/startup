  - type: private-evidence-only
    severity: material
    topic: Sovereign AI pipeline — UAE and Saudi future procurement commitments undisclosed
    missingEvidence: UAE National AI Strategy 2031 and Saudi Arabia Project Transcendence procurement pipelines for AI compute
      are not publicly disclosed; the only evidence of sovereign AI demand for Cerebras is the disclosed MBZUAI and G42 historical
      revenue. Future sovereign commitments are entirely private.
    whyItMatters: If UAE sovereign AI spending moderates or shifts to NVIDIA or Chinese AI chips, Cerebras' near-term revenue
      would be severely impacted. The size of the sovereign AI pipeline beyond existing disclosed contracts is unknown, making
      forward revenue projections highly uncertain.
    diligencePath: Review UAE National AI Strategy 2031 budget documents; research G42 and MBZUAI AI infrastructure plans;
