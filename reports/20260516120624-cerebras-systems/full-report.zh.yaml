      - number: '1.6'
        title: 图表
        blocks:
          - type: callout
            title: 晶圆级架构带来差异化推理速度
            body: >-
              WSE-3 的 900,000 个 AI 核心和 21 PB/s 片上内存带宽，让推理吞吐量达到 2,100+ tokens per second；据报道，在 LLM 工作负载下最高比基于 NVIDIA GPU
              的部署快 15x。这条架构护城河很难快速复制：芯片需要 TSMC 晶圆级键合能力，以及 Cerebras 近十年打磨出来的自研互连设计。GSK 的独立验证（RNA 模型训练加速 10x）和 $20B+
              OpenAI 合同提供了第三方证据，说明性能主张能够转化为真实客户价值。
            calloutType: strength
            claimRefs:
              - CO024
              - CO027
              - CO031
          - type: callout
            title: UAE 客户集中度让 IPO 时收入基底脆弱
            body: >-
              MBZUAI（62%）和 G42（24%）合计约占 2025 年收入的 86%。这种集中让 Cerebras 暴露在地缘政治风险（UAE-US 外交关系、出口管制）、
              单一客户议价压力，以及任一关系恶化时可能出现的灾难性收入损失之下。$20B+ OpenAI MRA 会降低未来对 UAE 的依赖，但截至 IPO 日期尚未形成收入。
              如果近期合同扰动落地，按陡峭增长定价的投资者将面临严重重估风险。
            calloutType: risk
            claimRefs:
              - CO015
              - CO016
              - CO017
              - CO025
          - type: callout
            title: GAAP 盈利来自非现金认股权证收益，而非经营现金流
            body: >-
              Cerebras 2025 年 $237.8M GAAP 净利润与 $75.7M non-GAAP 净亏损形成鲜明对比。差异来自 OpenAI 和 AWS 认股权证公允价值重估产生的非现金收益； 这些收益在
              non-GAAP 会计口径下被剔除。按现金调整后的经营口径，公司仍未盈利。投资者应使用 non-GAAP 指标和 OpenAI MRA 带来的未来收入轨迹来评估 Cerebras，而不是盯着表面的 GAAP
              盈利数字。
            calloutType: insight
