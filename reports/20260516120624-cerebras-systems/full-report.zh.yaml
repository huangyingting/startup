      - number: '7.3'
        title: 运营、质量与安全风险
        blocks:
          - type: paragraph
            body: >-
              Cerebras 运营风险由其 WSE-3 代工对 TSMC 的单一来源关系主导。全球没有其他晶圆厂公开披露具备在商业良率所需先进光刻节点上制造占满整片 300mm 晶圆芯片的能力。这让 TSMC
              成为结构性二元依赖：台湾冲突、TSMC 生产中断、产能重新分配或影响良率的工艺变化，都可能让 Cerebras 整条硬件供应管线停摆 12 个月或更久。WSE-3
              设计内置的容错路由可缓释单个晶体管失效带来的良率风险，但无法补偿晶圆厂级停产，也无法应对让路由机制失效的根本性 TSMC 工艺变化。CS-3 系统功耗约 23
              kW，并需要液冷，部署只能落在专用数据中心设施，结构上限制本地部署总可用市场；云推理可部分缓解，但会引入云特有运营风险。截至 2026 年 5 月，Cerebras 云推理服务未披露 SOC 2 Type II
              认证、事件响应协议或企业安全审计，这一缺口可能成为企业和受监管行业客户的重大销售异议。TSMC 交付周期为 6–12 个月，意味着任何供应中断都会转化为多个季度收入缺口，短周期恢复选项有限。
