  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: WSE-3 Wafer-Scale Engine 架构
        blocks:
          - type: paragraph
            body: >-
              Cerebras WSE-3（Wafer Scale Engine 3）是所有 Cerebras 产品的核心计算底座。传统半导体裸片面积为 200 至 900 mm2， 而 WSE-3 占用整片 300 mm
              TSMC 5nm 晶圆，形成一块 46,225 mm2 硅裸片，约为 NVIDIA B200 GPU（约 814 mm2）的 58 倍。这种极端裸片面积让单设备集成 4 trillion 个晶体管（B200 的
              19 倍）、900,000 个 AI 处理核心和 44 GB 片上 SRAM。 片上 SRAM 提供 21 petabytes per second（21,000 TB/s）内部内存带宽，约为 NVIDIA
              B200 NVL72 集群有效带宽（约 8 TB/s）的 2,625 倍。这个带宽优势在架构上具有决定性，因为大语言模型推理本质上受内存带宽约束：每次前向传播，模型权重都必须穿过内存接口。 在 GPU
              平台上，瓶颈出现在 High Bandwidth Memory 接口。WSE-3 将最高 44 billion 参数的模型权重全部存入片上，从而消除这个瓶颈， 在零片外内存流量下实现确定性的高速 token
              生成。三代芯片遵循一致的 TSMC 制程节奏：WSE-1（16nm、1.2T 晶体管、2019）、 WSE-2（7nm、2.6T 晶体管、2021）和 WSE-3（5nm、4T 晶体管、2023）。每一代都带来约
              2x 晶体管密度提升， 与 TSMC 节点缩小目标和 Cerebras 两年一代的发布节奏一致。
