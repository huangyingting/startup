      - number: '3.3'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: |
              区分 Cerebras 与 GPU 竞品的根本能力轴，是单位推理延迟下的内存带宽。Cerebras WSE-3 提供 21PB/s 片上 SRAM
              带宽，而 H100 的 HBM3 为 3.35TB/s——芯片层面约高 6000x——在小批量下可显著降低首 token 时间（time-to-first-token）。
              Cerebras 公开声称单流 Llama-70B 推理约 1,500 tokens/sec，而 H100 为 60–90 tokens/sec。在重度批处理、多用户工作负载下，
              GPU 集群能把内存延迟摊薄到大批量中，这一优势会收窄。

              软件完整度上，NVIDIA CUDA 的生态深度——优化过的 transformer 内核、FlashAttention、TensorRT-LLM、NIM microservices
              和广泛框架支持——构成持久的分发能力优势。AMD ROCm 通过 HIPification 支持 PyTorch 和大多数 CUDA 算子；Intel Gaudi 3 原生支持
              PyTorch 2.x。Cerebras 要求客户采用其专有 CTML 编译管线，这会提高已为 CUDA 优化工作负载的迁移摩擦。

              定价上，Cerebras 公布的 Llama-3 70B 推理云 API 费率为 $0.60/M input tokens，与主要 GPU 云厂商约 $0.90/M 的同等吞吐定价相比具备竞争力。
              硬件购买客户每套 CS-3 系统约支付 $2–4M。除 API 价目表外，Cerebras 企业推理合同没有公开披露的标价。Cerebras 未公开提交 MLPerf，
              限制了其吞吐性能主张的独立验证。
