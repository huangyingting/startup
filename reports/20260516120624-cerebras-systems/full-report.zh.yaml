      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Cerebras SEC S-1/A Amendment No. 2（May 2026）引用的 AI 基础设施总可用市场（TAM）为 2025 年 $251 billion， 预计到 2029 年达到 $672
              billion（28% CAGR）。更窄的口径——仅 AI 芯片市场——Semiconductor Industry Association 估计 2025 年约 $120 billion，较 2023 年的
              $55 billion 翻倍以上。Cerebras 管理层估计其可服务市场（SAM）2025 年为 $13.7 billion，到 2029 年增至 $51.5 billion，代表 WSE-3
              速度优势最相关的推理优先工作负载。EpochAI 分析显示， 前沿模型训练算力自 2020 年以来每年增长 4x，支撑硬件需求延续。Stanford HAI AI Index 2025 估计 2024 年 AI
              总投资达到 $100 billion。McKinsey 2024 State of AI 报告显示，72% 的组织已在至少一个业务职能中采用 AI。这些信号共同确认：市场仍处于早期采用阶段， 到 2029
              年仍有结构性顺风。
