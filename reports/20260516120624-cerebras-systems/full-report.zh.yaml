      - number: '2.3'
        title: 买方分层与需求画像
        blocks:
          - type: paragraph
            body: >-
              四类买方驱动 AI 基础设施需求。超大规模云厂商和基础模型实验室（OpenAI、Microsoft、Google、Amazon、Meta）按支出是最大买方， 估计占 AI 芯片采购的
              60-70%。Cerebras 的 OpenAI Master Research Agreement 和 AWS 有约束力条款清单意味着公司进入这一板块。 政府和主权 AI
              计划（UAE/MBZUAI/G42、Saudi Arabia、India、France）由地缘政治 AI 任务和大规模预算拨款驱动；Cerebras 2025 年收入的 86% 来自 UAE
              实体。学术和国家研究实验室通过政府拨款周期采购，时间线更长。企业买方（制药、生物技术、金融服务、医疗）是推理云采用中增长最快的新兴板块， 采购方式更多是 API 而非硬件。GSK 在 Cerebras 上训练
              RNA 模型就是这一模式。采购周期从数小时（API）到 18 个月（大型硬件集群）不等。
