      - number: '3.4'
        title: 切换成本与分销能力
        blocks:
          - type: paragraph
            body: |
              Cerebras 专有 CTML 编译管线和扁平片上 SRAM 内存模型带来实质切换成本：为 WSE-3 内存层级优化过的工作负载若要重构到
              GPU 集群，生产级 LLM 管线通常需要 6–18 个月。这既是竞争护城河，也是初始采用门槛——企业评估者必须权衡采用 Cerebras 的切换成本与未来离开的成本。

              NVIDIA 的分销能力无人能及。三大超大规模云厂商（AWS、Azure、GCP）都把 NVIDIA GPU 实例作为默认计算选项；NVIDIA NIM microservices
              已预集成进 GCP Vertex AI 和 AWS SageMaker。AMD 也通过 AMD-instance SKU 获得类似超大规模云分销。Intel Gaudi 3 主要通过
              Intel 直销数据中心团队销售，云端可用性有限。截至 May 2026，Cerebras 没有超大规模云现货市场集成；其 AWS 合作（有约束力条款清单，March 2026）
              仅覆盖 Cerebras 专用云实例。

              在技术上，Cerebras 与 GPU 基础设施之间可以多宿主，但由于编译器差异，运营成本很高。把 Cerebras API 嵌入生产推理管线的客户，实际多宿主空间有限，
              因为 CTML 优化模型无法不经重新优化就轻松重新部署到 NVIDIA TRT 或 vLLM。SambaNova 和 Groq 用户面临类似但略低的切换成本，因为它们基于标准模型格式构建 API 优先接口。
              TSMC 5nm 晶圆级制造是供给侧壁垒，新进入者无法快速复制；可比的 TSMC 承诺叠加缺陷管理诀窍，需要 5+ 年开发。
            claimRefs: []
      - number: '3.5'
        title: 护城河持续性与替代风险
        blocks:
          - type: paragraph
            body: |
              Cerebras 声称的主要持久护城河有三条：（1）来自晶圆级 SRAM 的架构带宽；（2）目前没有竞争者复制的 TSMC 5nm
              晶圆级制造能力；以及（3）把硬件优势抽象成开发者可访问产品的软件 / API 层。这些主张可信，但带有两项实质替代风险。

              第一，NVIDIA Blackwell B200 SXM5 提供 8TB/s HBM3e 带宽——超过 H100 的 2x——显著收窄了 Cerebras 在 H100
              时代利用的带宽差距。虽然 WSE-3 在绝对带宽上仍然领先，但相对差距正在压缩。NVIDIA 同时在 2024 年推出 NIM 推理 microservices，
              直接竞争 Cerebras 推理 API 的商业模式，在硬件性能和 API 层定位上形成双向挤压。

              第二，Cerebras WSE-3 的 44GB 片上 SRAM 把原生模型容量限制在约 60B 参数；更大的前沿模型需要多 WSE-3 并行，
              会降低单 token 效率。当前沿模型规模继续扩张——Llama 4 Maverick 约 400B 参数——除非 WSE-4 带来显著更大的内存，
              否则“整个模型放进片上 SRAM”这一核心价值主张会弱化。Cerebras 尚未向 MLCommons MLPerf 推理基准提交 WSE-3 结果，
              其吞吐主张缺乏独立第三方验证——对需要基准证据的企业采购团队来说，这是不利信号。MBZUAI 客户集中度（2025 年收入 62%）也是额外的持续性风险。
