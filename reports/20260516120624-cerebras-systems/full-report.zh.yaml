      - number: '5.3'
        title: 软件栈与开发者生态
        blocks:
          - type: paragraph
            body: >-
              Cerebras 软件栈把 WSE-3 的硬件优势转成开发者可用的生产力。Cerebras Compiler 接收标准 PyTorch 模型定义，并自动编译成优化后的 WSE-3 执行图；开发者不需要自定义
              DSL、重写模型，也不需要手工优化 kernel。推理负载上，Cerebras 提供 Inference Cloud API，完全兼容 OpenAI Chat Completions API 规范。任何已接入
              OpenAI API 的应用，只需改 base URL 和 API key，就能把请求路由到 Cerebras。API 支持 Llama 系列模型、OpenAI 的
              Codex-Spark、GPT-OSS-120B 和 GLM 4.7。已公布推理价格为 Llama-3 70B 每百万输入 token 0.60 美元。开发者生态通过三条开放渠道支撑：Cerebras
              GitHub 组织托管 Model Zoo，为 GPT、BERT 和扩散架构提供参考实现；HuggingFace 组织分发 Cerebras-GPT 开放权重模型族，覆盖 111M 到 13B 参数，于 2023
              年 4 月发布；Chinchilla 缩放论文（arXiv 2304.03208）验证硬件训练效率。Cerebras
              SDK、文档门户（docs.cerebras.ai）和云控制台（cloud.cerebras.ai）补齐面向开发者的界面，让模型导入到生产推理的端到端部署都在 Cerebras 平台内完成。
