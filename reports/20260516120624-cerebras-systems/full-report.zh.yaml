  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模式
        blocks:
          - type: paragraph
            body: |
              Cerebras 披露了三条收入流：硬件系统销售（CS-3 计算系统）、云端推理 API（Cerebras Cloud）和专业服务 / 支持。
              硬件销售占历史收入的绝大部分；推理 API 较新，但在增长。2022–2025 财年确认收入分别为 $24.6M、$78.7M、$290.3M 和
              $510.0M，三年 CAGR 为 220%。2024–2025 增速为 76% YoY，对于一家九位数收入硬件公司来说很突出。这条轨迹主要由两个客户驱动：
              MBZUAI（2025 年收入 62%）和 G42（2025 年收入 24%，低于 2024 年的 85%）。客户集中度是收入质量的首要问题。

              硬件定价：按已报道交易额，CS-3 计算系统每套约 $2–4M；公司未发布官方标价。Llama-3 70B 的云端推理 API 定价公开为
              每百万 input tokens $0.60。推理 API 是全托管，无需预留硬件，降低了客户进入摩擦，但毛利率可能低于硬件销售。硬件收入确认可能在交付和验收时一次性确认；
              推理 API 收入按期确认。公司没有公开披露分板块收入拆分。
