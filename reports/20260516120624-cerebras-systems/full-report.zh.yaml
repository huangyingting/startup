      - number: '5.4'
        title: 推理性能与竞争基准
        blocks:
          - type: paragraph
            body: >-
              Cerebras 声称，单颗 WSE-3 上 Llama 3 8B 可达到 2,100+ tokens/s，约为可比 NVIDIA H100 或 B200 GPU 的 15
              倍。硬件架构支持这一说法：对内存受限工作负载，LLM 推理吞吐量与可用内存带宽直接相关，而 WSE-3 的 21 PB/s 内部带宽远高于 NVIDIA B200 NVL72 集群约 8 TB/s 的 HBM3e
              带宽。模型只要完整放进 44 GB 片上 SRAM，WSE-3 就能接近峰值带宽利用率，且没有片外内存流量。生产证据也支持这一性能说法。OpenAI Codex-Spark 运行在 Cerebras
              推理基础设施上，给出超大规模云厂商级生产验证。GSK 报告，使用大 120 倍的 RNA 药物发现数据集时，训练速度提升 10 倍。MBZUAI 运营 CS-3 集群，为 UAE 主权 AI 计算服务，并贡献
              FY2025 收入的 62%。竞争格局包括 NVIDIA B200 NVL72（约 8 TB/s HBM 带宽，估算 8B LLM 为 140 tok/s）、AMD MI300X（5.3 TB/s，192 GB
              HBM3）和 Google TPU v5/v6（为分布式训练优化）。延迟敏感的单用户推理中，44B 参数以内模型上，WSE-3 架构有可验证差异。模型超过 44B
              参数并需要解耦推理时，分布式计算复杂度上升，优势收窄。
