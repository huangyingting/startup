      - number: '7.6'
        title: 人员、执行与缓释措施
        blocks:
          - type: paragraph
            body: >-
              Cerebras 治理结构通过双重股权把战略控制权集中在创始人手中，Class B 股拥有 10 比 1 投票权，使创始人在 IPO 时合计掌握约 99.2% 投票权，即便机构持有相当大的经济权益。Andrew
              Feldman（CEO）在 S-1/A 中被明确列为关键人风险；公司未公开披露继任计划。工程团队构成晶圆级人才护城河，但若核心芯片架构师跳槽到 NVIDIA、AMD 或资金充足的 AI
              芯片初创公司，也会形成人才集中风险，可能让 CS-4 项目延迟 12–18 个月。人员执行风险登记表按角色记录了这些依赖。下方缓释与监控表基于 S-1/A 披露、BIS
              监管姿态分析和分析师推导的阈值逻辑，为投资者提供结构化框架。按当前估值承销前的关键尽调要求包括：BIS 许可证副本和续期时间表、OpenAI MRA 条件条款和贷款 covenant 细节、非 UAE
              收入季度拆分、TSMC 产能合同摘要，以及核心工程领导层组织深度图。没有这些输入，就要在超过 $100B 的估值上承销 Cerebras，意味着接受无法从公开披露中解决的重大结构性信息不对称。
