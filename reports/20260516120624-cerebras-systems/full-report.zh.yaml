      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Cerebras 最关键的监管风险是 BIS 执行的《出口管理条例》（EAR）框架。2023 年 10 月 Advanced Computing 规则和 2024 年 10 月 AI Diffusion Rule
              设定性能阈值，决定 WSE-3 芯片能否出口给 UAE 客户。Cerebras 已公开披露其持有 MBZUAI 和 G42 发运的 BIS
              许可证，但这些许可证可能被撤销、修改，或在续期时被拒。监管姿态一旦变化，例如将 MBZUAI 或 G42 列入 Entity List、把 UAE 重新归类为需要更严格管制的目的地，或把性能阈值降到 WSE-3
              水平以下，就会立即禁止向贡献 FY2025 收入 86% 的两大客户发出现有和未来硬件。Saudi Aramco 事件中的 CFIUS 先例曾导致 Cerebras 在 2024 年 Q4 撤回
              IPO，说明国家安全审查可以在有限提前通知下造成重大业务中断。G42 于 2024 年同意剥离中国技术持股，部分缓释 CFIUS 残余风险，但仍需要持续合规监控。S-1/A 未披露重大知识产权诉讼，但
              NVIDIA 的半导体专利组合带来潜在侵权风险，机构资金部署前应取得 FTO 意见。
