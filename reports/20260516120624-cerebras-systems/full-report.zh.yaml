      - number: '4.5'
        title: 公开财务缺口与判断
        blocks:
          - type: paragraph
            body: |
              主要财务尽调阻塞点是：（1）OpenAI $20B+ MRA 的提取节奏和条件——最低收入承诺是无条件还是依赖里程碑，对 2026–2028 收入建模至关重要；
              （2）单位经济——没有披露 CAC、ACV、NRR 或按业务线拆分的毛利率；（3）WSE-3 晶圆良率和生产成本——没有每片晶圆经济性，COGS 无法建模；
              （4）大规模产能承诺所需的营运资本充足性。

              截至 May 2026 IPO，对 Cerebras 的财务判断是好坏参半。收入质量结构性偏弱，因为客户极度集中（MBZUAI + G42 = 2025 年约 86%
              收入来自两个实体），且存在一个规模巨大但未经验证的未来承诺（OpenAI MRA）。收入增长亮眼，但与历史基准相比时必须考虑其异常结构。39–42% 的毛利率符合高质量硬件公司，
              但远低于软件可比公司的估值倍数。GAAP 盈利值得注意，但由非经常项目驱动；底层经济按 non-GAAP 口径仍在亏损。

              IPO 后资本充足性很强。主要融资风险不是近期流动性，而是 OpenAI MRA 和 AWS 合作的执行风险——如果任一合作停滞，估值倍数内含的 2026–2027
              收入指引就需要下修。地缘政治风险（G42 的 UAE 关系、MBZUAI 的 Abu Dhabi 政府所有权）是持续悬顶，可能影响美国监管对 Cerebras 最大商业关系的处理。
