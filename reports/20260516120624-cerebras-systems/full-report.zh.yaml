      - number: '2.4'
        title: 竞争供给动态
        blocks:
          - type: paragraph
            body: >-
              AI 加速器供给侧由 NVIDIA 主导，按收入计算约占 AI 训练市场 70-85% 份额。NVIDIA H100 GPU 单价为 $25,000-$40,000； Blackwell B200 的 H100
              推理吞吐量提升 5x，GB200 NVL72 机架成本约 $3 million。AMD MI300X（192GB HBM3、8 TB/s 带宽） 已在 Microsoft Azure 和 Meta
              的内存密集型推理中获得牵引；AMD AI 收入 2024 年超过 $5 billion。Google TPUv5 仅云端提供（无法购买硬件）， 内部用于 Gemini 和 Imagen。AWS Trainium2
              是 Amazon 自研 AI 芯片，可通过 SageMaker HyperPod 使用。Intel Gaudi 3 面向中端工作负载， 折价约 ~30-40% H100。Cerebras
              没有直接的晶圆级竞争对手；WSE-3 的 900,000 个 AI 核心和 21PB/s 片上 SRAM 带宽， 形成与所有 GPU 及基于 HBM 的系统不同的架构。TSMC 5nm 同时支撑 WSE-3 和
              NVIDIA Hopper，产能分配是共同约束。US BIS 出口管制限制 H100/A100 等效芯片销往中国 和部分中东目的地，同时影响 NVIDIA 的 TAM 和 Cerebras 的 UAE 客户资格。
