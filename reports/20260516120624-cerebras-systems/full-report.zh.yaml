  - id: FE001
    title: Cerebras 产品架构栈
    type: stack
    layout: wide
    summary: 七层视图从底部 TSMC 制造到顶部客户应用，覆盖完整的 Cerebras 硬件-软件栈。
    approximationNotes: null
    claimRefs:
      - CE001
      - CE003
      - CE004
      - CE005
      - CE006
      - CE013
    data:
      layers:
        - label: 客户应用
          detail: LLM 推理 API、AI 模型训练、科学计算、主权 AI 项目，包括 OpenAI Codex-Spark、GSK RNA 药物发现和 MBZUAI UAE 主权 AI
        - label: 推理 API 和 SDK 层
          detail: 兼容 OpenAI Chat Completions 的 REST API；Cerebras Cloud SDK；Python 客户端；Llama-3 70B 输入 token 已公布价格为 $0.60/M
        - label: 编排和集群管理
          detail: Cerebras Cluster Manager：多 CS-3 横向扩展；任务调度；通过 InfiniBand 或 Ethernet 互连网络，为超过 44B 参数的模型提供解耦式推理
        - label: 编译器和图转换
          detail: Cerebras Compiler：把 PyTorch 模型图转为 WSE-3 执行计划；无需自定义 DSL；自动把注意力、MLP 和向量嵌入操作映射到 900K 个 AI 核心
        - label: 运行时和内存管理
          detail: WSE-3 运行时：片上 SRAM 存储权重并调度；900K 个 AI 核心执行流水线；Llama 8B 模型 token 流式输出达到 2,100+ tok/s
        - label: WSE-3 硬件底座
          detail: WSE-3 裸片：46,225 mm2；4 万亿个晶体管；900K 个 AI 核心；44 GB 片上 SRAM；21 PB/s 内部内存 带宽；采用 TSMC 5nm N5 制造
        - label: TSMC 制造和 CS-3 封装
          detail: TSMC 5nm（N5）晶圆厂：单一来源整片晶圆制造；定制裸片封装；CS-3 机箱组装，并集成液冷或强制风冷
