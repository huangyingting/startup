companyProfile:
  summary: >-
    Cerebras Systems 由 Andrew Feldman（CEO）和一组前半导体工程师于 2016 年在加州 Sunnyvale 创立。公司前三年保持隐身， 打造 Wafer-Scale Engine（WSE），并在
    2019 年推出 WSE-1 和 CS-1 系统。WSE-3 是第三代芯片，由 TSMC 以 5nm 制程制造，面积 46,225 mm²，集成 4 trillion 个晶体管、900,000 个 AI 核心和 21 PB/s
