    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、法律结构与商业模式
        blocks:
          - type: paragraph
            body: >-
              Cerebras Systems Inc. 是一家 Delaware 公司，成立于 April 2016，总部位于 1237 E. Arques Avenue, Sunnyvale, California
              94085。公司设计并制造 Wafer-Scale Engine（WSE），这是全球最大规模商业量产的集成电路， 并将其集成进 CS-3
              计算系统。核心商业模式由两条互补收入流构成：向超大规模云厂商、研究机构和政府关联 AI 实验室直接销售 CS-3 集群硬件；以及通过 Cerebras Inference Cloud API
              提供云端推理服务，入口是 cerebras.ai/inference 和 cloud.cerebras.ai。推理云服务让客户以超过 2,100 tokens per second
              的吞吐量运行大语言模型；公司宣称，在同等 LLM 工作负载下，这比基于 NVIDIA GPU 的部署最高快 15 倍。Cerebras 是无晶圆厂芯片设计公司，全部硅片制造都外包给 TSMC 的
              5-nanometer 制程。最新一代芯片 WSE-3 在 46,225 mm² 裸片上集成 4 trillion 个晶体管，配有 900,000 个 AI 核心、 44 GB 片上 SRAM 和 21
              petabytes per second 的片上内存带宽。完成首次公开募股后，Cerebras 于 May 14, 2026 在 Nasdaq Global Select Market 以股票代码 CBRS
              开始交易。公司的价值主张押注规模化、速度优先的 AI 推理，把自家芯片定位为延迟敏感推理场景中大型多 GPU 集群的替代品。
