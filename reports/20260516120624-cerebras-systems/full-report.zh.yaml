  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              Cerebras Systems 在 AI 加速器和推理即服务市场竞争，面对五类相互重叠的替代方案：
              （1）由 NVIDIA 和 AMD 领跑的既有 GPU 平台；（2）超大规模云厂商自研芯片——Google TPU 和
              AWS Trainium——可通过云端对外提供，但最初主要为内部规模化需求设计；（3）专注推理芯片的初创公司，
              最典型的是 Groq（LPU 架构）和 SambaNova（Reconfigurable Dataflow Unit）；（4）Tenstorrent 等
              早期 RISC-V 或 chiplet 路线；以及（5）运行 vLLM、TensorRT-LLM 等开放推理运行时的多 GPU 集群这一现状方案。
              企业买方还必须评估内部自建选项——本地组装专用 GPU 集群——这仍是超大规模客户的主流采购模式。

              NVIDIA 的 GPU 生态是所有替代方案被衡量的参照标准。AMD MI300X 已成为第一个可信的 GPU 挑战者；Intel Gaudi 3
              借助直接数据中心销售能力切入中端市场。在专用 AI 芯片中，Cerebras 的晶圆级内存带宽架构与 GPU 集群和推理导向 LPU
              设计都有架构差异，但必须克服 NVIDIA 压倒性的软件生态优势和深度超大规模云集成。Tenstorrent 等新进入者在 2025 年获得
              $693M 融资支持，已进入早期生产，但截至 May 2026 IPO 日，尚未显示出足以对抗 Cerebras 硬件 + API 垂直集成栈的可信牵引。
            claimRefs: []
      - number: '3.2'
        title: 竞品画像
        blocks:
          - type: paragraph
            body: |
              NVIDIA 仍是定义品类的竞争者，2025 财年数据中心收入约 $47B，并在 AI 加速器部署中持有估计 70–90%
              份额。H100 和 H200 SXM5 是超大规模云厂商的标准训练与推理单元；Blackwell B200/GB200 NVL72 机架系统每架提供
              1.4 exaflops、每个 GPU 芯片 8TB/s HBM3e，是直接瞄准 Cerebras 带宽叙事的下一代平台。NVIDIA 的竞争优势不只来自硬件性能，
              更来自 CUDA 生态——估计 4M+ 开发者、十年优化的库，以及与每家主要云厂商和框架的深度集成。

              AMD MI300X 加速器（192GB HBM3、5.3TB/s）是商业部署最广的替代 GPU，自 2023 年末起大规模供货给
              Microsoft Azure 和 Meta。AMD 的 ROCm 软件栈已有明显改善，但在算子覆盖上仍落后 CUDA。Intel Gaudi 3 面向成本敏感的 LLM 训练和推理，
              借力 Intel 的数据中心销售关系。

              在超大规模云厂商芯片中，Google TPU v5e/v5p 可在 GCP 按需使用，但与 JAX/XLA 框架深度绑定，限制可移植性。
              AWS Trainium2 可通过 SageMaker 和 EC2 Trn2 访问，避免模型格式锁定。SambaNova Cloud 和 Groq 的 LPU 推理服务是
              Cerebras Cloud 在 API 层最接近的概念同类：两者都以有竞争力的按 token 定价提供高吞吐 LLM 推理，但截至 2026 年，均未披露有意义的独立企业收入或经验证的基准结果。
              Tenstorrent 处于早期生产出货阶段，目标是较小规模训练工作负载。
