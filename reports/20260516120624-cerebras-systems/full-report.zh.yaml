      - number: '5.7'
        title: 证据材料
        blocks:
          - type: callout
            title: 片上 SRAM 为 44B 参数以内模型消除 HBM 内存墙
            body: >-
              WSE-3 44 GB 片上 SRAM 提供 21 PB/s 内部带宽，消除了 GPU 推理在可装入该容量模型上受 HBM 内存瓶颈限制的问题。这个架构优势来自物理约束；没有晶圆级硅就难以复制，使
              Cerebras 截至 2026 年 5 月在延迟敏感 LLM 推理负载上保持约 15 倍的持久吞吐领先。OpenAI 和 MBZUAI 的生产部署在超大规模云厂商尺度验证了这一性能说法。
            calloutType: strength
            claimRefs:
              - CE005
              - CE010
              - CE011
              - CE030
              - CE032
          - type: callout
            title: TSMC 单一来源代工造成无法替代的供应集中风险
            body: >-
              整个 Cerebras 硬件组合都依赖单一 TSMC N5 晶圆代工关系来生产整片晶圆 WSE-3
              裸片。公司未披露备用晶圆厂、多源采购策略，也没有针对不同制程节点或裸片尺寸的替代芯片设计。地缘政治、良率或产能分配导致的任何 TSMC 产能中断，都会让硬件生产停摆，且短期没有可信缓释路径。截至 2026 年 5
              月，这是 Cerebras 经营模型中结构上最不可替代的依赖。
            calloutType: risk
            claimRefs:
              - CE023
              - CE006
              - CE035
          - type: callout
            title: BIS EAR 出口管制同时威胁超过 86% 的硬件收入
            body: >-
              MBZUAI 和 G42 合计约占 Cerebras FY2025 收入的 86%，两者都是 UAE 实体，每次硬件发运都需要 BIS/EAR 出口许可证。美国单一政策变化——包括扩大 Entity List
              指定、新增先进 AI 芯片许可要求，或 US-UAE 关系恶化——都可能同时挡住大部分硬件收入。鉴于 IPO 日披露的客户管线，这一监管集中风险短期没有可信多元化路径。
            calloutType: risk
            claimRefs:
              - CE015
              - CE016
              - CE024
              - CE033
          - type: callout
            title: 建模收入前，先验证 AWS 解耦推理部署时间表
            body: >-
              AWS 有约束力条款清单是短期最重要的产品里程碑，可打开全球分销渠道，并为超过 44B 参数的模型建立解耦推理架构。不过，截至 2026 年 5 月
              IPO，该集成尚未部署。尽调应先确认具体技术里程碑、合同条件和预期上线日期，再在任何财务预测中把它建模为短期收入贡献。
            calloutType: recommendation
            claimRefs:
              - CE025
          - type: callout
            title: 推理受带宽约束的逻辑在分析上成立，并有科学验证
            body: >-
              Cerebras 性能优势的机制基础已在公开 AI 系统研究中站稳：LLM 推理受内存带宽约束，因为每生成一个 token 都要跨内存接口加载全部模型权重。WSE-3 21 PB/s 片上带宽相对 B200
              NVL72 集群 8 TB/s，代表 2,625 倍优势。Cerebras-GPT 论文（arXiv 2304.03208）在 WSE-3 硬件上验证 Chinchilla
              缩放，为带宽-性能逻辑提供了超越营销说法的外部科学确认。
            calloutType: insight
            claimRefs:
              - CE005
              - CE030
              - CE032
