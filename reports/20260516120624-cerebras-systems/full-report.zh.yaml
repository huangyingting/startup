      - number: '8.2'
        title: 建议与立场
        blocks:
          - type: paragraph
            body: >-
              建议是在每股 $185 的 IPO 价格上有条件观察。证据支持耐心等待：Cerebras 有出色的收入增长记录、真正差异化的产品，以及 OpenAI、AWS 两个可催化客户多元化的大型下游合同。但 IPO
              价格隐含 30–45 倍 NTM 收入，这一倍数假设 50%+ 收入增长延续，并且 OpenAI 和 AWS 合同同时成功执行。当前财务报表尚未确认二者。

              信心为中等。公司已经上市，意味着季度财务披露将在 6–12 个月内补上许多信息缺口。S-1/A 文件提供了完整收入历史，确认 UAE 集中风险，并披露双重股权投票结构。Goldman Sachs、Morgan
              Stanley 和 Citigroup 承销 IPO，提供第三方需求验证。不过，关键未知仍在：经营利润率未按分部披露，OpenAI MRA drawdown 条件未完全说明，UAE 客户在当前 BIS
              监管制度下的 post-IPO 出口管制合规未公开确认。风险评级为高。UAE 集中、出口管制和 Nvidia 竞争替代三项独立冲击，每一项都有足够影响力打破基准情景投资逻辑。

              估值立场偏激进。风险容忍度高、投资期 3–5 年的耐心 AI 硬件投资者，可以按乐观情景建模（Cerebras 到 FY2027 收入达到 $1.5–2B，OpenAI 和 AWS 规模化执行，15–20 倍
              NTM = $22–40B 市值 = 较 IPO 价格 2–3 倍）。基准情景指向 $900M–1.1B NTM 收入、12–15 倍 = $11–17B 企业价值——相对 IPO 定价大致持平到下行
              10–15%，取决于总股数。悲观情景（$500–700M 收入、8–10 倍倍数、$4–7B 市值）意味着相对 IPO
              价格严重下行。这种不对称（基准情景上行有限、悲观情景下行巨大、乐观情景有吸引力）定义了观察立场：密切监控执行，只有在较 IPO 价格明显折价或多元化证据确认后才建仓，并保持严格否决触发器。
