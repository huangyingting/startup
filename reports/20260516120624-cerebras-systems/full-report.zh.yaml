  - id: TV006
    title: 最终尽调问题表
    columns:
      - 议题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 分部级毛利率（硬件与云）
        - S-1/A 未披露分部毛利率；总混合毛利率已披露，但硬件与 Cerebras Cloud API 的拆分未知
        - 若硬件毛利率 <30%、云毛利率 >70%，向云 API 的结构转移远比表面收入更有价值；会影响估值倍数能否成立
        - 首次季度财报电话会（Q3 2026）——管理层讨论应披露分部毛利率；若未披露，提交 IR 请求
      - - OpenAI MRA 合同结构（最低承诺与可选承诺）
        - $20B+ MRA 未公开提交；S-1/A 将其称为主收入协议，但未说明最低购买承诺、照付不议结构或季度提款条件
        - 若 MRA 纯属可选（无最低承诺），$20B 标题金额就不是已承诺管线；熊市概率会大幅上升
        - 若作为重大合同提交，审阅 Form 8-K；若尚未提交，向 IR 索取合同摘要，或审阅下一份 SEC 季度文件
      - - IPO 后阿联酋客户的 BIS 出口合规意见
        - 对于 MBZUAI 和 G42 在现行 2023 年 10 月规则或任何拟议后续规则下的 BIS 先进 AI 芯片出口许可，公司未披露法律意见或合规认证
        - 出口合规失败会立即触发熊市情形中的收入风险；没有确认的法律放行，86% 阿联酋集中度就是无法量化的监管悬顶
        - 通过数据室或投资者 FAQ 索取外部律师 BIS 意见；确认 MBZUAI/G42 供应链在任何待定 BIS 规则修订下不需要新许可证
      - - 锁定期届满后的内部人卖出计划
        - IPO 前未披露锁定期安排以及创始人 / 高管出售股份的任何 Rule 10b5-1 计划；强制性锁定期后披露通常是在卖出后 2 个工作日提交 Form 4
        - 锁定期届满（IPO 后 90-180 天 = 2026 年 8-11 月）会形成供给压力；若能在届满前了解管理层卖出意向，入场点管理会更好
        - 监控创始人和高管的 SEC EDGAR Form 4 文件；审阅招股书或 S-1/A 修订文件中任何预先公告的 10b5-1 计划披露
      - - WSE-4 路线图和 TSMC 产能分配
        - S-1/A 提到基于 TSMC 5nm 的 WSE-3；WSE-4 架构、时间表以及下一代硅片的 TSMC 分配状态未披露
        - 硬件公司产品周期 18-24 个月，下一代硅片若延迟，就会面临竞争力风险；鉴于 Apple/Nvidia/AMD 的优先分配，TSMC 产能约束是真实风险
        - 在投资者会议上向管理层索取技术路线图简报；确认 WSE-4 的 TSMC 分配和流片时间表
    notes: 第 1-3 项对 IPO 价格下的仓位大小很重要。第 4-5 项是增量信息。所有问题都应在 IPO 后前两次财报周期内解决。
    claimRefs:
      - CV037
      - CV040
      - CV042
