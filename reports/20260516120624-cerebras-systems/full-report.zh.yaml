  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与范围
        blocks:
          - type: paragraph
            body: >-
              AI 基础设施市场覆盖为 AI 和机器学习模型训练、推理提供能力的计算硬件、云服务及相关软件。纳入支出的范围包括 GPU 与 AI 加速器硬件（NVIDIA H100/B200、 AMD
              MI300X、Google TPU、AWS Trainium、Intel Gaudi、Cerebras WSE）、AI 专用云计算服务和 AI 网络（InfiniBand、NVLink）。
              排除项包括通用计算、企业存储，以及只是嵌入 AI 功能的 SaaS 应用。与 Cerebras 最相关的是两个子板块：AI 训练基础设施——由 NVIDIA 主导， 集中在超大规模云厂商和 AI 实验室；以及
              AI 推理基础设施——服务生产应用中的模型，企业部署扩张后增速快于训练。Cerebras Inference Cloud 在推理即服务子板块中与 OpenAI API、Together AI 和 Groq
              竞争，竞争轴是吞吐量和价格。现有替代方案包括基于 NVIDIA 的云实例（AWS p5、Google A3）， 以及 AI 实验室自有的推理 API。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM015
