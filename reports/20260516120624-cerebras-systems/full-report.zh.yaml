  - id: TV005
    title: 投资论点失效和止损触发器表
    columns:
      - 触发事件
      - 阈值 / 信号
      - 对投资论点的传导
      - 行动含义
    rows:
      - - BIS 对阿联酋 AI 销售采取出口执法或新增限制
        - 官方 BIS 规则、Entity List 新增，或限制 MBZUAI/G42 算力采购的执法行动
        - FY2025 86% 收入直接承压；熊市情形立即触发；FY2026 收入指引变得无法兑现
        - 任何确认限制出现后立即卖出；不要等财报影响显现
      - - FY2026 Q1-Q2 收入同比增长低于 30%
        - 季度收入低于 $128M（Q1）或 $145M（Q2）——意味着按 FY2025 同季口径同比 <30%
        - 收入分散化没有抵消阿联酋基线；OpenAI/AWS 爬坡不足；基准情形恶化为熊市
        - 减仓——若连续两个季度不达标，切换到熊市概率权重，并重估仓位大小
      - - OpenAI MRA 延迟到 Q4 2026 之后仍无收入贡献
        - FY2026 全年业绩中没有归因于 OpenAI 的收入（Q4 2026 财报披露）
        - 依赖 MRA 的牛市管线没有执行；投资论点完全压在存在集中度风险的阿联酋客户上
        - 复盘——重新校准到基准情形；若阿联酋占比仍高于 70% 且 MRA 无进展，转向卖出
      - - 针对 Cerebras 推理用例的 Nvidia 竞争性公告
        - Nvidia 发布基于 B200 或 NVL72 的推理产品，以等价每 token 价格匹配 Cerebras 2100 token/sec
        - 核心产品差异化被抹平；硬件倍数压缩至 AMD 水平（8x）；牛市情形消失
        - 减仓——观察 2 个季度，看竞争产品的企业采用情况；若 Cerebras 丢失一份重大推理合同，则重新评估
      - - 创始人 / 关键工程师离职
        - CEO Andrew Feldman 或 CTO Sean Lie 离职，或 12 个月内流失 5+ 名 WSE 架构师
        - WSE 的架构护城河依赖创始人主导设计团队延续；关键人离职会加速知识衰减
        - 观察 2 个季度——若离职确认，要求管理层解释；若研发速度可衡量地下滑，则减仓
    notes: 所有触发阈值都是监控标准，不是自动交易信号。每个事件都需要独立验证后再行动。机构投资者应在 IPO 锁定期届满前定义预设响应。
    claimRefs:
