              投资逻辑中结构上最尖锐的风险。公司已宣布四条主要多元化向量：OpenAI MRA（$20B+ 名义规模、750MW 承诺容量）最大且最接近落地，基础设施上线后可增加数亿美元年度已确认收入；AWS
              有约束力条款清单（2026 年 3 月）提供渠道入口，无需 Cerebras 直接销售即可触达数千家企业客户；IBM watsonx 合作面向受监管行业；云 API
              自助增长让开发者主导采用，无采购摩擦。不过，截至 IPO 日（2026 年 5 月），后三条向量均未产生重大已确认收入。尽调问题在于，已确认收入能否在 UAE 集中风险爆发前实现多元化。FY2023 到
