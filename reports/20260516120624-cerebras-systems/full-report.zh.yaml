              结构——$20B+ 名义承诺和利率 6% 的 $1B 营运资本贷款——意味着一段合同锁定的长期关系，退出成本很高。不过，MRA 条件条款未公开。任何客户的正式合同期限、续约节奏或照付不议承诺都未披露。S-1/A
