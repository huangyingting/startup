        blocks:
          - type: paragraph
            body: >-
              Cerebras Systems 登陆公开市场时，风险画像由三类会相互叠加的结构性集中主导：没有替代方案的单一制造来源 TSMC；两个贡献 86% 收入的客户（UAE 的 MBZUAI 和 G42）依赖可撤销
              BIS 出口许可证；以及一个交易对手同时扮演三重角色（OpenAI 是生产客户、$1B 贷款方和 $20B+ 收入锚）。这些风险不是彼此独立：针对 UAE 目的地的 BIS
              出口规则变化，会同时清除来自两大客户的硬件收入，压迫 OpenAI 营运资本贷款，并削弱 MRA
              多元化逻辑。下方风险热力图按发生可能性和影响严重度映射十项已识别风险，风险传导图则展示单个风险事件如何级联到收入、融资和估值结果。次级风险包括晶圆级良率依赖、液冷基础设施限制、创始人双重股权投票控制，以及超过过去
              12 个月收入 190 倍的 IPO 估值倍数。Cerebras 未公开披露监控阈值；投资者在按当前估值承销前，必须自行搭建监控框架。
