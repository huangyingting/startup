      - number: '7.5'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >-
              Cerebras 财务风险画像包括显著的 GAAP 与 non-GAAP 差距、硬件交易波动性，以及对近乎完美执行定价的 IPO 估值。FY2025 GAAP 净利润约 $237.8M，几乎全部来自与
              OpenAI 认股权证相关的非现金重估收益；按 non-GAAP 调整后，Cerebras 约有 $75.7M 经营亏损，更准确反映底层现金生成质量。约 39% 的毛利率低于软件同行，反映先进制程晶圆级生产的
              TSMC 高额代工成本。硬件收入由交付周期长、规模达数亿美元的大合同构成，会造成环比收入波动，容易与投资者预期错位，并在业绩不达预期时引发不成比例的股价反应。按 IPO 开盘价计算，估值约为 FY2025 收入的
              196 倍；如果收入增速从 76% 放缓到即便 40–50%，估值倍数也很可能显著压缩。180 天 lockup 到期会在 2026 年 11 月左右让内部人士具备出售资格，形成短期供给悬空风险。OpenAI
              $1B 贷款短期提供支持，但如果关系在 2032 年到期日前恶化，它会变成带对抗性的金融工具。
