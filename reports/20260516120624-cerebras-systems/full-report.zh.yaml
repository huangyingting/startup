      - number: '5.5'
        title: 竞争差异化与知识产权
        blocks:
          - type: paragraph
            body: >-
              Cerebras 的主要护城河在架构和制造。到 2026 年 5 月，公司是唯一以生产规模商业出货晶圆级 AI 处理器的厂商。复制 WSE-3
              要同时打穿整片晶圆硅中介层和定制封装技术、积累多年硅-软件协同开发的编译器工具链、具备验证 4 万亿晶体管且无裸片间冗余芯片的设计能力，还要拿到 TSMC 满片 N5 产能分配的代工关系；这是 TSMC
              商业支持中最复杂的制造安排之一。S-1/A 提到专利、商业秘密和制造 know-how，但未列出具体专利号。WSE 架构周围的结构性保密构成商业秘密壁垒：内部网格互连设计、编译器优化 pass 和硅片
              floorplan 都未公开。Cerebras-GPT 与 arXiv 2304.03208 论文展示的硬件性能，与理论带宽预测一致。NVIDIA CUDA 生态仍是主导开发者平台，拥有最大的预训练
              checkpoint 库和伙伴支持。Cerebras 兼容 OpenAI API 的推理接口降低了推理负载的切换成本，但无法取代训练工作流中需要自定义 kernel 的 CUDA。关键竞争风险在于，NVIDIA
              可能逐代提升 HBM 带宽，缩小小模型的单 token 延迟差距；超大规模云厂商的解耦推理架构也可能侵蚀大模型上的单芯片优势。Cerebras FY2025 毛利率为
              39%，说明当前竞争位置在规模化后仍能支撑定价权。
            claimRefs:
              - CE015
              - CE016
              - CE026
      - number: '5.6'
        title: 信任、合规与产品路线图
        blocks:
          - type: paragraph
            body: >-
              Cerebras 的首要合规义务是美国商务部工业与安全局（BIS）《出口管理条例》（EAR）下的出口管制。向 UAE 客户 MBZUAI（FY2025 收入 62%）和 G42（FY2025 收入
              24%）发运先进 AI 半导体系统需要 BIS 出口许可证。超过 86% 的收入依赖受 BIS/EAR 出口管制约束的 UAE 客户，这是 S-1/A
              突出披露的重大运营风险。出口许可证延迟、撤销或政策限制，都可能挡住大部分硬件收入，而短期多元化替代有限。质量和可靠性证据主要来自生产验证：OpenAI Codex-Spark 与 GSK RNA
              药物发现工作负载确认其满足企业质量要求。不过，截至 2026 年 5 月，Cerebras 未公开披露 Inference Cloud API 的 SOC 2 Type II 或 ISO 27001
              云安全认证；企业客户评估云安全姿态时，这是尽调缺口。硬件质量受 TSMC 标准半导体制造质量控制约束，但 CS-3 系统级 MTBF 统计未公布。截至 2026 年 5 月，产品路线图未宣布 WSE-4
              后继芯片。Cerebras 代际节奏约为两年一次：WSE-1（2019）、WSE-2（2021）、WSE-3（2023）。下一个重要产品里程碑是 2026 年 3 月有约束力条款清单下的 AWS
              解耦推理集成，部署时间表未公开。
