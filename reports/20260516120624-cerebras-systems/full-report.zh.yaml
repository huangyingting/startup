      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: |
              Cerebras 的 GTM 主要是面向大型 AI 研究机构、政府关联主权 AI 计划和超大规模云厂商的直销。截至 May 2026 IPO，
              披露客户基数很小且高度集中：MBZUAI、G42、GSK，以及 OpenAI（通过 December 2025 宣布的 $20B+ MRA）。截至 IPO 日期，
              公司没有披露经销商渠道、OEM 分销伙伴或云市场上架，不过 AWS 有约束力条款清单（March 2026）执行后会增加一条分销渠道。

              硬件销售周期可能为 6–18 个月，因为 $2–4M 资本支出决策需要企业采购流程。获客成本（CAC）、平均合同价值（ACV）和净收入留存率（NRR）
              都是未披露的私有指标。Saudi Aramco CFIUS 审查曾延迟 2024 年 IPO 申报，是重要治理考量；在 2026 年上市前似乎已解决。
              OpenAI 的 $20B+ MRA 是推理即服务 GTM 渠道的基础锚点；但其提取条件和时间线未披露，构成最大的单一 GTM 执行风险。
