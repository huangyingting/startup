      - number: '4.4'
        title: 资本充足性与融资
        blocks:
          - type: paragraph
            body: |
              Cerebras 进入 May 2026 IPO 时，已在 September 2025 募集约 $1.1B（Series G，估值 $8.7B），并在 IPO 中以
              $185/share 额外募集 $5.55B。再加上 $1B OpenAI Working Capital Loan（6%，December 31, 2032 到期），IPO 后流动性充足。
              公司的资本结构还叠加两组认股权证：OpenAI 持有 33.4 million 份、行权价 $0.00001 per share；AWS 持有约 2.7 million 份、
              行权价 $100 per share。这些是与商业合作绑定的稀释性义务。

              资本强度来自公司需要在收入确认前预购 TSMC 晶圆批次并管理 CS-3 库存。相较轻资产软件公司，营运资本需求很高；截至 December 31, 2025，
              来自 MBZUAI 的应收账款占总 AR 的 77.9%，形成依赖集中客户的回款风险。IPO 募集资金用途未公开详细披露，但可能包括 TSMC 产能承诺、
              为 OpenAI 和 AWS 合作储备 CS-3 库存，以及一般营运资本。公司未披露任何契约违约或流动性问题；IPO 后现金位置足以按当前烧钱速度支持数年运营。
