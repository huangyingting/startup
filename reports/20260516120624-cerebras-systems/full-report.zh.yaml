      - number: '5.2'
        title: CS-3 系统设计与部署架构
        blocks:
          - type: paragraph
            body: >-
              Cerebras CS-3 计算系统把 WSE-3 芯片装进标准 2U 数据中心机箱。CS-3 是完整硬件产品，把 WSE-3
              芯片、供电、冷却基础设施和网络互连打包成一个交付单元；按已披露交易金额估算，单套价格约 200 万至 400 万美元。公司未公布官方标价。WSE-3 裸片散发的热量显著高于传统 GPU
              板卡，需要液冷或高风量强制风冷环境。部署 CS-3 的客户必须相应改造数据中心，相比标准 GPU 部署增加运营负担。工作负载超出单颗 WSE-3 内存容量（约 44B 参数以上模型）时，Cerebras 提供
              Cluster Manager，用标准数据中心网络编排多套 CS-3，形成横向扩展配置。Cluster Manager 支持解耦推理，把模型层分布到多个 WSE-3 节点。这正是 2026 年 3
              月通过有约束力条款清单宣布 AWS 集成的技术基础：CS-3 节点与 AWS Trainium 组合，支持混合解耦推理。关键第三方依赖包括唯一晶圆代工供应商 TSMC，以及封装和机箱供应链。S-1/A
              突出披露，对 TSMC 的依赖带来单一供应商集中风险，是硬件收入连续性的重大风险。
