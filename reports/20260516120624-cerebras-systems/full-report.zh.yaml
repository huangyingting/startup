      - number: '1.2'
        title: 创始团队与执行领导层
        blocks:
          - type: paragraph
            body: >-
              Cerebras 由 Andrew D. Feldman（CEO）、Sean Lie（CTO）、Gary Lauterbach 以及曾在 SeaMicro 共事的一批同事共同创立； SeaMicro
              是一家高密度服务器初创公司，2012 年以 $334 million 被 AMD 收购。Feldman 曾任 SeaMicro CEO，后来担任 AMD Server Business Corporate
              Vice President。Lie 拥有 MIT Electrical Engineering and Computer Science Bachelor of Science 学位，联合创立 Cerebras
              前在 AMD 负责高性能互连架构。Gary Lauterbach 是资深芯片架构师，来自 AMD 和 SeaMicro 队伍，作为联合创始人承担技术角色。执行团队还包括 COO Dhiraj Mallick 和
              CFO Komin；Komin 曾在 Sunrun、Flurry、Ticketfly 和 Linden Research 担任 CFO，为 IPO 前的公司补上公众公司财务领导力。公司的 S-1/A 明确把
              Andrew Feldman 标为关键人物风险；如果 CEO 离任，Cerebras 执行技术路线图和维系标杆客户关系的能力可能受损。创始团队在 SeaMicro 和 AMD
              的共事经历是重要凝聚力因素——核心创始人合作已超过十年——这降低了团队内部执行风险，但也把关键技术知识集中在少数人手里。 IPO
              后董事会同时包括联合创始人成员和投资人代表；截至研究时，可访问的公开文件尚未完整列出独立董事名单。
