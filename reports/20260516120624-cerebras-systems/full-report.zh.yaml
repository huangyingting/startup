      - number: '4.3'
        title: 成本结构与毛利率
        blocks:
          - type: paragraph
            body: |
              Cerebras 的销售成本（COGS）主要是 TSMC 为 WSE-3 芯片制造晶圆的成本。46,225mm² 裸片占用整片 5nm 晶圆，
              属于商业可获得半导体制程中成本最高的一类；公司未披露单位成本数据。其他 COGS 构成包括 CS-3 机箱组装、互连硬件和集成劳动。
              云端推理 API 的 COGS 包括托管共享 WSE-3 集群的数据中心计算和网络。毛利率 2024 年约 42%，2025 年为 39%。2024 到 2025 年压缩
              3 个百分点，可能来自收入规模（更多出货、更多 TSMC 晶圆）、产品组合，以及增长中的推理 API 业务基础设施成本。

              39–42% 的硬件毛利率与 NVIDIA 约 75% 的数据中心毛利率相比不利，但这反映的是无晶圆厂 IP 授权方（NVIDIA）与全栈硬件系统供应商（Cerebras）的差异。
              更相关的可比对象是承接超大规模云厂商承诺的 AI 硬件供应商，35–45% 是合理区间。2025 年 non-GAAP 净亏损 -$75.7M，
              对比 GAAP 净利润 $237.8M，意味着约 $313M 非现金费用——可能由股权激励、认股权证公允价值调整，以及其他可能的非经常项目组合而成。
              经营杠杆和通往可持续 non-GAAP 盈利的路径，是近期关键问题。
