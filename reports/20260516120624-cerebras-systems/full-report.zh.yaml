  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Cerebras 投资逻辑建立在五个有结构支撑的支柱上。第一，AI 推理市场以 40%+ CAGR 增长，是 AI 基础设施支出中扩张最快的板块；Cerebras 已部署唯一晶圆级芯片架构，可达到 2,100+
              tokens/s，对内存带宽受限的推理负载，相比 GPU 集群替代方案有 10–15 倍性能优势。第二，公司已在规模上展示可重复商业牵引力：收入从 FY2023 的 $78.7M 增至 FY2025 的
              $510M（CAGR 超过 100%），S-1/A 文件确认这条轨迹来自硬件和云推理收入，而非一次性项目费。第三，2025 年 12 月宣布的 OpenAI $20B+ Master Revenue
              Agreement 和 AWS 有约束力条款清单（2026 年 3 月）是两条独立需求管线，合计年度计算支出可能超过 $2B，并实质性降低 Cerebras 当前 UAE 集中。第四，IPO
              本身验证了机构投资者对 WSE 型 AI 计算规模化的需求；募得的 $5.55B 不是投机资本，而是投向 AI 加速器市场中一个已识别空白点的资本——在这里，Nvidia 的 GPU
              生态有定价权，但不是垄断。第五，双重股权结构和创始人连续性（Andrew Feldman、Sean Lie）保留了战略选择权，让公司可在没有短期盈利压力下投资下一代 WSE 架构。

              反向逻辑同样有分量。UAE 客户集中度达 86%（MBZUAI 占 FY2025 收入 62%，G42 占 24%），制造了不对称下行：任一关系恶化——无论来自美国出口管制执行、地缘政治不稳定，还是
              MBZUAI/G42 预算重新分配——都会大幅压缩 FY2026 收入，且没有同等规模替代管线。Nvidia 的 CUDA 生态和 B200/GB200 NVL72 Blackwell 架构仍在企业 AI
              训练与规模化推理中占主导，软件护城河每年复利。硬件优先商业模式在公开市场通常按 8–12 倍收入交易，而不是 30–45 倍；Cerebras
              的溢价倍数按完美执行定价，几乎没有估值倍数压缩缓冲。出口管制仍是现实风险：推迟 2024 年 S-1 的 Saudi Aramco CFIUS 审查虽已解决，但针对 UAE 和 Saudi Arabia 先进
              AI 芯片销售的 BIS 限制仍是活跃监管不确定性。最后，2024 年撤回 S-1 已成为永久记录的一部分——当初寻求的 $4B 估值在 2024 年市场中无法实现；2026 年 IPO 成功，是因为之后 20
              个月收入持续增长、宏观条件改善，以及 OpenAI MRA 公布。
