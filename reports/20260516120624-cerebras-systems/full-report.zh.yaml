      - number: '8.3'
        title: 融资与估值背景
        blocks:
          - type: paragraph
            body: >-
              Cerebras 于 2026 年 5 月 14 日以每股 $185 完成 IPO，募资总额 $5.55B。这是自 2019 年 Uber 以来美国最大科技 IPO。2026 年 5 月提交的 S-1/A
              Amendment No. 2 披露，FY2025 收入为 $510M，FY2024 收入为 $290.3M，FY2023 收入为 $78.7M——很少有硬件公司能在这一规模上实现这样的复合增长率。IPO
              前，Cerebras 通过多轮股权融资累计募得约 $720M，其中包括 2021 年 11 月约 $250M 的 Series F，估值 $4B；这是原始 2024 年 S-1 提交时的参考标记。

              2024 年 9 月提交的原始 S-1 寻求约 $4B 估值，对应过去 12 个月收入 $136.4M（2024H1）——约 29 倍过去收入。该 S-1 在 2024 年 11 月因机构反馈疲弱撤回，与
              2024 年末 AI 芯片板块可见的估值倍数压缩一致。2026 年 IPO 成功，估值约为 30–45 倍 NTM 收入（取决于总股数和 FY2026 收入轨迹），相对 2021 年 Series F 参考标记和
              2024 年尝试 IPO 价格都有明显上台阶。收入增长（从 2024H1 过去收入 $136M 到 FY2025 $510M）证明这一步有基础，但相对可比上市硬件同行也嵌入了较高估值倍数溢价。

              IPO 优先权结构已通过 S-1/A 公开披露。双重股权结构为创始人保留约 99.2% 投票权，限制外部治理影响。IPO
              股份和潜在员工股票计划行权带来的稀释，需要在上市后前四个季度持续跟踪。公开文件未披露可转换债务或优先股悬空，相比许多 IPO 前科技发行人是积极信号。按当前烧钱速度，$5.55B 募资提供 10
              年以上运营现金跑道，基本移除了投资逻辑中的短期融资风险。
