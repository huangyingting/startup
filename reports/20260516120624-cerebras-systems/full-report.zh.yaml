  - id: TV004
    title: 可比估值表
    columns:
      - 可比对象
      - 指标
      - 倍数 / 估值
      - 相关性
      - 局限
    rows:
      - - Nvidia (NVDA)
        - NTM 收入倍数（2026 年 5 月）
        - ~25x NTM 收入；~$3.3T 市值
        - 主要公开 AI 硬件可比公司；主导型 AI 芯片基准；为硬件板块倍数设定上限
        - NVDA 收入规模大 200x，毛利率 70%+，且有软件生态护城河；规模上不可直接对比
      - - AMD (AMD)
        - NTM 收入倍数（2026 年 5 月）
        - ~8x NTM 收入；~$230B 市值
        - 有 AI 芯片敞口（MI300X）的半导体同行；为倍数区间设定贴近硬件现实的下限
        - AI 芯片占比和增长率低于 Cerebras；CUDA 替代软件栈更弱；客户组合不同
      - - Groq（私有，LPU 推理）
        - 最近披露估值与估算 ARR 对比
        - ~$2.8B，对应约 $750M 估算 ARR = ~3.7x ARR
        - 最直接的私有推理芯片同行；客户用例几乎相同（LLM 推理 API）
        - 收入估算由分析师推导，未披露；Groq 没有硬件销售渠道，只有 API；缺少企业数据
      - - SambaNova Systems（私有，RDU）
        - 最近披露估值与估算 ARR 对比
        - ~$5.1B，对应约 $450M 估算 ARR = ~11x ARR
        - 收入规模相近的私有 AI 芯片公司；提供私有市场中段倍数参照
        - 收入估算未获确认；RDU 架构的工作负载画像不同于 WSE；流动性可比性有限
      - - Cerebras 原 S-1（2024 年 9 月，已撤回）
        - 寻求估值与 H1 2024 往绩收入对比
        - ~$4.0B，对应 $136.4M H1 2024 往绩收入 = ~29x 往绩收入
        - 自我参照的历史锚点；显示从 2024 年 $4B 要价到 2026 年 $14-40B IPO 的跃迁
        - 撤回 IPO 是对原 $4B 的负面信号；2026 年更高定价只有靠收入复合增长支撑才成立
      - - Tenstorrent（私有，RISC-V 加速器）
        - 最近披露估值（2025 年融资）
        - ~$2.6B（2025）；收入未披露
        - 新兴硬件竞争者，2025 年融资 $693M；验证 AI 芯片风险投资在较小规模上的风险偏好
        - 处于收入前或极早期收入阶段；架构不同；没有财务数据，不能作为有效倍数参照
