      - number: '7.4'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Cerebras 搭建的伙伴生态一方面降低部分风险，另一方面又创造新的集中向量。OpenAI 关系最能体现这种双重性：$1B
              营运资本贷款为资本密集型硬件制造周期提供关键缓冲，但同一个交易对手还承担最大已承诺收入义务、在 Cerebras 基础设施上运行生产工作负载，并持有 3,340 万份稀释性认股权证。如果 OpenAI
              关系因任何原因恶化，包括竞争动态变化、OpenAI 公司层面压力或战略转向自研硅，Cerebras 将同时失去营运资本支持、近未来收入和生产参考客户，结构性后果极其严重。UAE 客户集中同样根深蒂固：MBZUAI
              和 G42 是主权关联机构，AI 任务长期存在，但二者都需要有效 BIS 出口许可证，并承受超出 Cerebras 控制的地缘政治风险。AWS
              有约束力条款清单提供了短期最可信的多元化路径，但尚未产生已确认收入。下方依赖地图盘点主要伙伴和监管关系及其依赖方向。在非 UAE 且非 OpenAI 收入超过总收入 20%
