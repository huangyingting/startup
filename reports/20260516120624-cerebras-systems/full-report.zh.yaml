  - id: FU001
    title: Cerebras 客户旅程图
    type: journey-map
    layout: wide
    summary: 六阶段客户旅程从最初认知走到战略合作，覆盖 Cerebras 客户的分层入口、采购路径和扩张循环。
    approximationNotes: 阶段时间估计根据合同公告时间线和公开披露推断；Cerebras 尚未发布正式客户生命周期数据。
    claimRefs:
      - CU005
      - CU015
      - CU016
      - CU017
      - CU029
      - CU031
    data:
      items:
        - label: 认知和发现
          detail: >-
            研究员、政府 CTO 或企业 AI 买家通过 AI 会议演讲、Artificial Analysis 推理基准排名（吞吐量 #1）、 学术论文（arXiv 2304.03208）或 Cerebras 直销接触了解到
            Cerebras。主权 AI 项目可能通过 UAE 国家 AI 战略要求和政府采购招标被引入。云 API 开发者则通过开发者社区、GitHub ModelZoo 和 HuggingFace 生态发现
            Cerebras。
        - label: 技术评估
          detail: >-
            概念验证请求：针对目标工作负载，用 CS-3 与 GPU 集群跑基准。推理客户通过 cloud.cerebras.ai 免费层试用， 对比每秒 token 数和单 token 成本。训练客户评估 PyTorch
            编译器兼容性，以及 WSE-3 片上 SRAM 是否装得下模型规模（最高 44B 参数）。 主权 AI 项目可能需要更长技术试点，并接受政府 IT 审查。
        - label: 采购和签约
          detail: >-
            硬件买家联系 Cerebras 企业销售，推进 CS-3 采购订单或多系统集群合同；主权 AI 采购周期为 6-18 个月， 需要正式政府招标。云 API
            买家可自助开通，几乎没有采购摩擦。基础模型实验室在高管层谈判战略协议（MRA、条款清单），周期为 6-18 个月。 UAE 客户的出口许可申请在这一阶段提交。
        - label: 生产部署
          detail: >-
            CS-3 硬件安装在客户数据中心（需要液冷或高风量环境）；Cerebras Cluster Manager 配置多系统扩展。 云 API 密钥激活；兼容 OpenAI 的端点接入应用栈。MBZUAI 和 G42
            运营专用 CS-3 集群，用于前沿 LLM 工作负载。OpenAI 将 Codex-Spark 推理流量路由到 Cerebras。GSK 运行 RNA 训练任务。
        - label: 扩张和深化
          detail: >-
            客户为提升模型规模或覆盖新工作负载追加订购 CS-3 系统。云 API 支出随推理量和新模型部署增长。 主权客户从单一训练用途扩展到多用途推理和微调。企业客户从部门试点走向事业部级生产。AWS 渠道让
            Cerebras 无需直销投入，也能触达数千家企业客户。
        - label: 战略合作和背书
          detail: >-
            最大客户把多年协议、MRA 或战略投资正式落地。G42 作为战略投资方投入 $335M。OpenAI 签署 $20B+ MRA， 并提供 $1B 营运资金贷款。具名客户出现在 Cerebras
            S-1/A、新闻稿和会议演讲中。客户背书在相邻地域和垂直行业拉出类似机构买家的管线。
