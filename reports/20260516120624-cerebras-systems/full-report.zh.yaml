        title: 增长驱动、约束与市场风险
        blocks:
          - type: paragraph
            body: >-
              主要需求增长驱动包括：（1）AI 模型扩展——训练算力自 2020 年以来每年 4x，需要同比例更多硬件；（2）规模化推理——企业生产部署仍在早期， McKinsey 估计 AI 采用率
              72%，但真正大规模生产推理的比例低得多；（3）开源模型扩散——Llama 3、Mistral、Qwen 让企业无需锁定专有 API 也能做定制推理，拉动推理基础设施需求；（4）主权 AI
              任务——UAE、Saudi Arabia、India 为本土 AI 能力投入数十亿美元。关键约束包括： TSMC 先进制程产能被 NVIDIA、AMD、Apple、Qualcomm 共用；US BIS
              出口管制限制向部分国家销售芯片；AI 数据中心电力约束（IEA 预计到 2030 年为 1,000 TWh/yr）；以及硬件采购的资本强度。鉴于 MBZUAI 占 2025 年收入的 62%、G42 占
