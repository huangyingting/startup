        - 超过 44B 参数的模型需要解耦式多 CS-3 推理；架构仍在成熟
      - - 大规模 AI 模型训练（最高 44B 参数模型）
        - 100+ H100 多 GPU 集群、自定义 CUDA kernel，受 HBM 带宽限制
        - CS-3 系统搭配 Cerebras Compiler 和 Cluster Manager 做横向扩展
        - 44B 参数以内模型可由单块 WSE-3 替代集群；无需编写自定义 kernel
        - 模型变大后训练吞吐优势收窄；CUDA 生态有更丰富的 checkpoint 可用
      - - 科学计算和药物发现（神经网络工作负载）
        - CPU 或 GPU 集群，实验周期以周计，数据集规模受限
        - 用 CS-3 加速神经网络（GSK RNA 模型部署）
        - GSK：训练提速 10x，数据集扩大 120x；药物发现实验周期缩短
        - 仅限神经网络加速；不支持通用 HPC 或分子动力学工作负载
      - - 面向政府和大学项目的主权 AI 计算
        - 美国或欧盟公有云，或自有 GPU 集群基础设施
        - CS-3 本地部署（MBZUAI 和 G42 主权 AI 项目）
        - 满足数据主权要求；硬件由客户实际控制；占 FY2025 收入的 86%
        - UAE 客户需要 BIS/EAR 出口许可证；许可证延迟或吊销会中断服务
    notes: 用例来自 S-1/A 对 GSK、MBZUAI 和 OpenAI 的客户披露，以及产品页描述。可量化收益来自公司声称或第三方报道；独立基准验证仅部分存在。
