      - number: '8.4'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >-
              牛市情景假设 Cerebras 同时兑现 OpenAI MRA 和 AWS 条款清单；大规模推理需求复合增长，FY2026 收入增至 $900M，FY2027 收入增至
              $1.5-2B。该情景下，OpenAI、AWS 和国内企业客户放量，UAE 收入集中度到 FY2027 降至 40% 以下。公司证明经营杠杆可持续，并在延迟敏感的推理工作负载中替代 Nvidia，收入倍数可落在
              15-20x 区间。按 $2B 收入的 17.5x 计算，隐含企业价值为 $35B——相对于按 $185 IPO 价格对应的 $14B 市值约 2.5x（假设 IPO 流通比例为 20%）。牛市情景概率：约
              20-25%。

              基准情景假设 OpenAI MRA 在 2026 年下半年开始贡献收入，但低于计划；UAE 收入持平，MBZUAI 和 G42 延长现有合同；AWS 条款清单成交，但需要 12-18
              个月才产生有意义收入。FY2026 收入达 $700-900M（增长 40-75%），FY2027 达 $900M-1.1B。按 $1B NTM 收入的 12-14x 计算，企业价值为 $12-14B——相较
              IPO 价格隐含市值下行约 7-14%。基准情景概率：约 50%。

              熊市情景假设美国 BIS 收紧出口管制，限制向 UAE 销售 AI 芯片，2026 年下半年实质冲击 MBZUAI 和 G42 收入。由于销售管线不足以弥补 UAE 下滑，FY2026 收入收缩至
              $400-500M。OpenAI MRA 的提款因交易对手执行挑战而延后。公开市场硬件优先同行承压后，收入倍数压缩至 8-10x。按 $500M 收入的 9x 计算，企业价值为 $4.5B——较 IPO
              隐含市值下行 65-75%。熊市情景概率：约 25-30%。
