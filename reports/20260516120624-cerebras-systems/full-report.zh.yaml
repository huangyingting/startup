  - id: TE003
    title: 技术与运营架构表
    columns:
      - 层级或组件
      - 作用
      - 核心依赖
      - 风险
    rows:
      - - TSMC 5nm（N5）代工厂
        - 制造 WSE-3 全晶圆裸片；唯一生产来源
        - TSMC 针对全晶圆 N5 产品的产能分配；未披露备用代工厂
        - 台湾集中带来的单一来源地缘政治风险；良率不确定；N5 代工产能风险
      - - WSE-3 裸片（46,225 mm2）
        - 核心计算基底：900K 个 AI 核心 + 44 GB 片上 SRAM
        - TSMC N5 工艺；定制裸片封装和热管理
        - 裸片级没有冗余；芯片缺陷会影响整片硅面积；没有替代芯片设计
      - - Cerebras Compiler
        - 自动将 PyTorch 模型图转换为 WSE-3 执行计划
        - Meta 以开源方式维护的 PyTorch 框架生态
        - 新型或非标准架构存在模型兼容性缺口；已部署模型可能被编译器版本锁定
      - - Cerebras Cluster Manager
        - 为超过 44B 参数的模型编排多 CS-3 横向扩展
        - 采用 InfiniBand 或 Ethernet 的网络 fabric；客户数据中心网络基础设施
        - 解耦式推理增加跨节点延迟和运营复杂度；AWS 集成尚未部署
      - - Cerebras 推理云 API
        - 面向大规模 LLM 推理的托管 API 层
        - 按 2026 年 3 月签署的有约束力条款清单使用 AWS 基础设施；尚未部署
        - 单一云基础设施依赖；截至 IPO 日 AWS 集成未完成；未发布 SLA
      - - 数据中心散热基础设施
        - CS-3 热管理的物理环境
        - 具备液冷或高风量强制风冷能力的客户数据中心
        - 与标准风冷机架不兼容；增加部署成本和站点验证开销
    notes: 架构来自 S-1/A 技术披露、Cerebras 文档门户和 AnandTech WSE-3 技术分析。AWS 集成状态基于 S-1/A 中有约束力的条款清单披露。
