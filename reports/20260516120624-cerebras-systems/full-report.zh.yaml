              S-1/A 申报文件引用的 IPO 前总融资约为 $720M，但公开文件没有完整拆分 Series A 到 Series G 的单轮规模。Series H 的合并股权部分和 $1B OpenAI Working
              Capital Loan 是记录最清楚的事件。精确到各 VC 机构的持股比例需要 Cerebras 投资者关系提供股权结构表，公开渠道无法获得。
