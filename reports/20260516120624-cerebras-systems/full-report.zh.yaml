      - number: '7.7'
        title: 证据材料
        blocks:
          - type: callout
            title: UAE 出口许可证是单一事件触发的全损场景
            body: >-
              Cerebras FY2025 收入约 86% 来自持有有效 BIS 出口许可证的 UAE 实体。地缘政治变化、G42 交易对手状态变化或 BIS
              规则收紧，一旦触发这些许可证撤销、暂停或拒发，就会立即损害超过五分之四的收入基础。不同于多数集中风险，这一场景短期没有替代收入，也没有过渡规划的宽限期。
