      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              IPO 前，Cerebras 多轮融资累计获得约 $720 million 风险资本。总部位于 Abu Dhabi 的 AI 集团 G42 累计投资 $335 million，并同时成为 Cerebras
              最大战略投资者和主要收入客户，贡献 2024 年收入的 85%。December 2025， OpenAI 承诺提供 $1 billion Working Capital Loan，年利率 6%，December
              31, 2032 到期，为 IPO 前提供流动性。 May 14, 2026 的 IPO 发行价为 $185 per share，募集总额约 $5.55 billion。AWS 于 March 2026 与
              Cerebras 签署有约束力的条款清单， 在硬件采购承诺配套下，以 $100 行权价取得约 2.7 million 份认股权证股份。OpenAI 另持有 33.4 million 份认股权证， 行权价为名义上的
              $0.00001 per share，并与主收入协议挂钩，对普通股股东构成实质潜在稀释。公司采用双层股权结构： Class A shares 每股 1 票，Class B shares 每股 20 票，Class
              N shares 无投票权。IPO 后，Class B 持有人——主要是创始人和早期内部人士——保留约 99.2% 的总投票权，使创始人控制的治理结构可以无限期延续。Series H 股权与 OpenAI
              贷款合计构成 IPO 前最重要的资本化事件， 但 Series A 到 Series G 的单轮规模在公开文件中没有完整拆分。
