  - id: TV002
    title: 投资论点 / 反论点表
    columns:
      - 维度
      - 正向论点
      - 反向论点
      - 什么会改变判断
    rows:
      - - 市场
        - AI 推理市场以 40%+ CAGR 增长；在 GPU 集群受带宽掣肘的延迟敏感工作负载中，WSE 架构能吃到需求
        - Nvidia H200/B200 + TensorRT-LLM 正在补上主要模型尺寸的带宽缺口；Cerebras 只在狭窄推理工作负载中胜出
        - 实测基准数据显示，在与 Blackwell GPU 集群相同的模型尺寸上，Cerebras 仍保持 5x+ 成本性能优势
      - - 产品 / 护城河
        - 晶圆级架构配 44GB 片上 SRAM，形成较持久的带宽护城河；LLaMA-70B 上 2,100+ tokens/sec 已获独立验证
        - 新一代 DRAM 架构（HBM4）提升 GPU 内存带宽后，SRAM 优势会缩小；面对 Nvidia 持续研发，护城河有有限生命周期
        - CS-4 WSE-4 路线图得到确认，并给出具体带宽和效率目标，能跑赢预计的 Nvidia HBM4 改进
      - - 客户
        - OpenAI $20B+ MRA 和 AWS 条款清单代表两条彼此独立的数十亿美元级管线，可降低对阿联酋的集中依赖
        - MRA 和 AWS 条款清单均为非约束性或附条件；二者都未在 FY2025 财务中确认收入贡献
        - FY2026 Q1 财报显示 OpenAI 或 AWS 单季收入贡献 $50M+，确认合同开始执行
      - - 财务
        - FY2025 同比增长 76% 至 $510M，对硬件公司很罕见；收入来自已部署硅片的真实客户付款，不是软件许可
        - 两个阿联酋主权实体贡献 86% 收入，构成根本性收入质量风险；单一政治或监管事件就可能逆转
        - FY2026 阿联酋占比靠新增客户降至 60% 以下，同时总收入继续增长 40% 以上
      - - 竞争
        - 纯粹晶圆级路径没有直接竞争者；Groq（LPU）、SambaNova（RDU）和 AMD（HBM3）架构不同，性能 / 工作负载画像也不同
        - Nvidia 的平台级主导地位（CUDA、软件工具、云集成、客户关系）形成切换成本，Cerebras 不易跨过
        - 企业 AI 客户（非主权、非超大规模云厂商）在可比价格下选择 Cerebras Cloud API，而不是同等的 NVIDIA 云推理
      - - 退出 / 回报
        - 刚完成 IPO 并募资 $5.55B，给公司十年级别资金跑道；公开市场流动性和季度财报纪律会提升信息质量
        - 硬件业务按 30-45x NTM 收入估值，几乎没有可持续公开市场估值先例；未来 12-24 个月倍数压缩是概率最高的基准结果
        - 前两个季度财报超预期，且同比增长 >50%，并确认 OpenAI/AWS 收入贡献，建立公开市场可定价的增长记录
    notes: 正向论点和反向论点都有证据支撑，都不是投机性说法。短期来看，因集中度风险和估值拉伸，证据权重略偏向反向论点。
