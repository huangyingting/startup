            body: >-
              Cerebras 服务五类客户，差异来自买方类型、地理、垂直行业和采购模式。主权 AI 项目——主要是 UAE 的 MBZUAI 和 G42——构成锚定客群，通过大型多年期硬件合同贡献 FY2025 收入约
              86%。这些买方具有机构和政府关联属性，采购周期为 6 至 18 个月，合同规模异常大（$100M+）。由 OpenAI 牵头、签有 $20B+ Master Revenue Agreement
              的基础模型实验室和超大规模云厂商，是最大潜在扩张客群。以 Sandia National Laboratories 为锚点的美国国家实验室和国防客户验证科学计算用例。GSK 等企业生命科学客户展示
              RNA/蛋白模型训练的垂直行业采用。最后，云 API 开发者以每百万输入 token $0.60 的价格通过 cloud.cerebras.ai 接入
              Cerebras，无需硬件采购摩擦即可自助采用。分层揭示出一个分叉收入模型：来自主权和机构买方的高价值硬件合同，对比面向更广泛开发者和企业市场的早期云/API 业务。FY2025 硬件收入约占
