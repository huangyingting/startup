      - number: '1.5'
        title: 公司里程碑与不利事件
        blocks:
          - type: paragraph
            body: >-
              Cerebras 于 April 2016 在 Delaware 注册成立，前三年保持隐身，开发晶圆级芯片概念。WSE-1 在 Hot Chips 2019 亮相， WSE-2 于 2021 年推出，WSE-3
              于 March 2024 发布。公司在 September 2024 向 SEC 提交最初 S-1，参考估值约 $4.25 billion，随后在 April 2026 提交修订 S-1，并于 May 2026
              提交最终 S-1/A。SiliconAngle 报道称， Cerebras 最初目标 IPO 价格区间为 $150 到 $160，最终定价为 $185。股票 May 14 以约 $350 开盘，收于约
              $311（较发行价 +68%），但 May 15 回落至 $279.72。The Wall Street Journal 将这次 IPO 称为一场押注 Nvidia 疲劳的巨大赌注，
              反映分析师质疑这种非标准形态能否在早期采用者之外持续获得需求。不利观察包括 IPO 后股价下跌、尽管 GAAP 盈利但 non-GAAP 经营仍亏损、 IPO 时 UAE 客户高度集中，以及 OpenAI MRA
              下收入确认节奏未披露。GSK 合作和 December 2025 签署的 $20 billion-plus OpenAI MRA 是重要的产品市场验证里程碑，能够把收入集中画像从 UAE
              实体转向美国超大规模云厂商锚点。
