          - type: callout
            title: NVIDIA Blackwell 压缩带宽差距——替代风险升高
            body: >
              NVIDIA B200 SXM5 芯片提供 8TB/s HBM3e 带宽，而 H100 为 3.35TB/s，提升 2.4x，直接瞄准 Cerebras 利用的吞吐差距。 虽然 WSE-3 的 21 PB/s
              仍以较大幅度领先，但 NVIDIA 历史上每 2–3 年把内存带宽翻倍，意味着除非 Cerebras WSE-4 在片上 SRAM 上实现阶跃式提升，否则差距会继续压缩。NVIDIA NIM 推理
              microservices 也复制了 Cerebras 的 API 层商业模式， 可能比硬件差距更快侵蚀 API 差异化。
            calloutType: insight
            claimRefs:
              - CP034
              - CP036
          - type: callout
            title: CUDA 生态锁定构成双向分销风险
            body: >
              CUDA 的 4M+ 开发者用户群、优化过的 ML 库，以及超大规模云厂商预集成，构成 Cerebras 无法仅靠硬件性能复制的分发能力优势。 采用 Cerebras 的客户要承受从既有 CUDA
              管线迁移的实质切换成本，这会形成初始采用门槛。拥有大型 CUDA 优化代码库的企业买方会理性要求 Cerebras 给出足够有说服力的性能溢价，或一条迁移路径；但其 CTML
              工具链目前还无法以同等覆盖提供这一点。
            calloutType: insight
            claimRefs:
              - CP024
              - CP025
              - CP030
          - type: callout
            title: 缺少 MLPerf 基准记录削弱企业可信度
            body: >
              Cerebras 尚未向 MLCommons 的 MLPerf 基准套件提交 WSE-3 推理结果；这是 AI 加速器吞吐量独立验证的行业标准机制。
              大型金融机构、政府承包商和受监管行业的企业采购，越来越要求供应商以 MLPerf 提交作为资格依据。缺席记录让 Cerebras 的 1M+ token/sec 主张无法通过任何独立渠道验证；如果
              NVIDIA、AMD 或 Groq 发布买方无法直接反驳的对比结果，Cerebras 将暴露在替代风险下。
            calloutType: insight
