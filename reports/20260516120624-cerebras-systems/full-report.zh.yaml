      - number: '1.4'
        title: 关键经营指标与阶段判断
        blocks:
          - type: paragraph
            body: >-
              Cerebras 现在是一家处于成熟增长阶段的上市公司。收入从 2022 年的 $24.6 million 增至 2023 年的 $78.7 million、 2024 年的 $290.3 million 和
              2025 年的 $510.0 million，最近一个财年的同比增速为 76%。毛利率从 2022 年的 12% 扩张至 2024 年的 42%，2025 年小幅压缩至 39%，反映收入组合向硬件部署倾斜。公司
              2025 年实现 GAAP 净利润 $237.8 million，较 2024 年 GAAP 净亏损 $481.6 million 大幅反转。不过，2025 年盈利显著受 OpenAI 和 AWS
              交易相关认股权证公允价值重估的非现金影响； 2025 年 non-GAAP 净亏损为 $75.7 million，说明按现金调整口径看，底层业务仍未盈利。员工数截至 December 31, 2025 为
              708，到 March 2026 增至约 1,000。客户集中度是最重要的运营风险：MBZUAI 贡献 2025 年收入的 62%，并占 2025 年末应收账款的 77.9%。与 G42 合计，UAE
              关联实体约占 2025 年总收入的 86%，带来显著地缘政治和交易对手集中敞口；投资者必须把这一风险与 OpenAI Master Revenue Agreement 带来的未来收入轨迹放在一起权衡。
