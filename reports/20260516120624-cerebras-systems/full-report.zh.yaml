      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: UAE 集中度是最重要的单一投资风险
            body: >-
              两家 UAE 主权实体贡献 86% 收入，Cerebras 的客户集中风险高于几乎任何同等规模的上市科技硬件公司。OpenAI MRA 和 AWS 管线理论上能在 18-24 个月内缓解客户集中风险，但截至
              IPO 申报日，二者都没有披露收入贡献。在季度财务结果确认多元化之前，MBZUAI 与 G42 关系健康度是任何 CBRS 持仓最重要的监控指标。
            calloutType: risk
            claimRefs:
              - CV003
              - CV027
              - CV033
          - type: callout
            title: 撤回的 S-1 溢价：2024 到 2026 之间发生了什么
            body: >-
              2024 年 9 月的 S-1 寻求 $4B 估值，对应 29x 往绩收入。2026 年 IPO 以约 30-45x NTM 收入成功发行——倍数看似相近，但收入基数扩大到 3.75x。2026 年 IPO
              成功，不是因为最初估值错了，而是因为 Cerebras 收入复合增长足够快，让倍数看起来更低，同时绝对市值提高。OpenAI MRA
              公告是化解投资者对客户集中度犹豫的催化剂。上述动态意味着牛市情景靠执行驱动，而不是靠重估驱动——任何期待当前水平上倍数扩张的投资者都必须区分这一点。
            calloutType: insight
            claimRefs:
              - CV009
              - CV010
              - CV031
              - CV034
          - type: callout
            title: 基准情景需要 UAE 稳定和 OpenAI 执行同时成立
            body: >-
              基准情景并不是保守结果——它要求两件独立事项同时顺利：UAE 收入必须持平或增长，同时 OpenAI MRA
              开始贡献收入。任一支点失败，基准情景的收入轨迹都会塌向熊市情景。双支点依赖意味着，概率加权预期价值低于对熊市、基准、牛市企业价值做简单平均得到的结果。
            calloutType: assumption
            claimRefs:
              - CV005
              - CV022
              - CV025
              - CV033
