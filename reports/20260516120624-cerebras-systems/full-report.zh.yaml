      - number: '8.5'
        title: 可比公司组与方法论
        blocks:
          - type: paragraph
            body: >-
              Cerebras 更合适的估值方法，是以 NTM 收入估计为锚的收入倍数框架，并对倍数压缩和收入增长减速做情景敏感性分析。FY2025 收入 $510M、增长 76%，公司规模已超过早期 SaaS 常用的纯
              ARR 倍数法，但硬件依赖又太重，不能直接套纯软件 SaaS 倍数。混合可比组——公开 AI 硬件公司、AI 云基础设施同行和可比私募轮——才是合适框架。

              公开硬件可比：截至 2026 年 5 月，Nvidia（NVDA）按约 25x NTM 收入交易，FY2026 数据中心收入为 $47B+；该溢价反映 Nvidia 的主导市场地位、数据中心 >70%
              毛利率和软件生态护城河。AMD（AMD）按约 8x NTM 收入交易，反映 AI 芯片市场份额更低、商品化敞口更高。两个端点框定硬件同行区间；若 Cerebras 按 30-45x NTM 交易，需要维持类似
              Nvidia 的份额轨迹——只有当推理工作负载大幅转向 WSE 架构时才站得住脚，而规模化证据尚未确认。

              私有 AI 芯片可比：Groq 最近披露估值约 $2.8B，估计 ARR 为 $750M，隐含 3.7x ARR 倍数——显著低于 Cerebras 的 IPO 倍数，反映 Groq
              规模更小、客户基数更窄，也没有公开市场流动性溢价。SambaNova Systems 估值估计 $5.1B，ARR 估计 $450M，隐含约 11x ARR——更接近 Cerebras
              区间。Tenstorrent 在 2025 年融资轮估值约 $2.6B，规模明显更小。

              最初的 Cerebras S-1（2024 年 9 月）寻求约 $4B 估值，对应 $136M 往绩收入（29x 往绩），提供了历史参照点。2026 年 IPO 以
              $185/股成功发行，相比此前参照点有显著溢价，主要由 18 个月内新增的 $374M 收入和 OpenAI MRA 公告支撑。对投资者最站得住脚的方法，是 NTM 收入倍数，并明确设定倍数（8-20x
              区间）和收入（$700M-$2B 区间）两端情景——仅 2x 的收入不确定性，在 8x 倍数下就带来 $5.6-16B 的估值摆幅，说明回报对增长执行极其敏感。
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV034
              - CV035
              - CV036
              - CV038
              - CV039
      - number: '8.6'
        title: 退出准备度与尽调问题
        blocks:
          - type: paragraph
            body: >-
              Cerebras 如今已是上市公司，传统「退出准备度」框架需要改成三个问题：（1）IPO 价格是不是耐久的入场点，还是 IPO
              后价格发现会给出更有吸引力的二级市场入场点？（2）哪些具体的投资论点破裂事件应触发减仓？（3）还有哪些尽调问题需要首次季度财报电话会（预计 2026 年 Q3）回答？

              现有 IPO 前股东会面对锁定期到期（通常为 IPO 后 90-180 天）带来的供给侧事件。鉴于创始人持有 99.2%
              投票权，锁定期到期时的内部人卖出决定将是最重要的近期价格催化剂，需要持续监控。首次季度财报电话会上，管理层对 OpenAI MRA 提款节奏、AWS 条款清单成交时间表、以及 UAE
              客户出口管制合规状态的表述，将决定基准情景轨迹是否走在正轨。投资者应在拿到财报数据前，预先定义 FY2026 Q1 和 Q2 收入达到什么水平才算「在正轨」或「有风险」。

              关键投资论点破裂触发器包括：任何确认 BIS 已在 IPO 后限制或打算限制向 UAE 销售 AI 芯片的消息（将直接影响两大客户）；FY2026 Q1-Q2 收入同比增速低于 30%（意味着 UAE
              依赖分散得不够快）；OpenAI MRA 转化为实际收入延后至 2026 年 Q3 之后；或 Nvidia 发布任何竞争性公告，以相近经济性直接回应 Cerebras 的推理吞吐优势。

              以 IPO 价格附近入场的投资者，最后需要补齐的尽调包括：按分部披露毛利率，以判断硬件与云订阅经济性是否显著不同；披露 OpenAI MRA 合同结构（最低承诺、可选购买权还是 take-or-pay）；就
              IPO 后 UAE 客户状态取得出口管制法律意见；以及 WSE-4 的具体技术路线图，以确认在累计投入 $1.7B+ 研发水平上的投资延续性。
            claimRefs:
              - CV032
              - CV033
              - CV037
              - CV040
              - CV041
