        - Retrieves and surfaces peer-reviewed evidence (UpToDate, NEJM, JAMA) grounded in patient context
        - Wolters Kluwer UpToDate API; planned NEJM Group and JAMA Network content agreements
        - Retrieval accuracy, latency, and currency of evidence not independently benchmarked; NEJM/JAMA not yet live
    notes: >-
      Infrastructure hosting provider (originally Microsoft Azure) is not confirmed as of the report date. Model update
