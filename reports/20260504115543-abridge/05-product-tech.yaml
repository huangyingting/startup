  - id: S505
    title: Technical Risks, Limitations, and Adverse Evidence
    body: |
      Despite significant engineering investment, LLM hallucination in clinical notes remains the
      primary technical risk for Abridge and the ambient AI sector broadly. Abridge's own research
      acknowledges that even its purpose-built confabulation-detection system, while substantially
      better than general-purpose models, does not achieve 100% elimination of unsupported claims.
      A 2025 Nature publication on multi-model assurance analysis found that LLMs could elaborate on
      or repeat fabricated details in up to 83% of tested clinical vignettes, with prompt engineering
      only partially reducing hallucination rates. Lowering model temperature had minimal effect.
      These adversarial vulnerability findings apply to all LLM-based documentation systems including
      Abridge, and establish that human clinician review — while mandated in Abridge's workflow — is
      a necessary rather than precautionary safeguard.

      Patient consent and recording legality represent an acute legal risk. In December 2025, a class-
      action lawsuit was filed against Sharp Healthcare alleging that a patient was recorded using
      Abridge without explicit two-party consent under California's Invasion of Privacy Act, and
      that AI-generated consent statements were automatically inserted into the patient record. While
      Abridge was not named as a direct defendant (the suit targets the deploying institution), the
      underlying allegations relate to product behavior and implementation defaults. Multiple health
      systems across the industry face similar ambient AI consent suits, suggesting systemic legal
      exposure that Abridge and its customers must manage proactively.

      Epic distribution concentration is the primary strategic technology risk: Abridge's native
      integration advantages are contingent on continued Epic Workshop partnership access. Any
      deterioration of this relationship, Epic platform policy changes, or Epic's potential entry
      into the ambient AI market directly would impair Abridge's most valuable distribution channel
      and technical moat. Independent EHR integration breadth (athenahealth, Cerner/Oracle Health)
      is reportedly available but significantly less developed than the Epic integration.

      Additional technical limitations include: unverified infrastructure resilience and uptime SLA
      commitments; unconfirmed model versioning and rollback procedures; no publicly disclosed
      clinical outcomes studies from randomized controlled trials (RCTs); and limited public data on
      specialty-specific accuracy variance, which may be significant for complex subspecialties.
    claimRefs:
      - CE024
      - CE030
      - CE027
      - CE032
      - CE035
      - CE022
