  - id: S502
    title: Contextual Reasoning Engine and AI Architecture
    body: |
      Abridge's AI stack is built around proprietary large language models (LLMs) fine-tuned on a
      de-identified dataset of over 1.5 million clinical conversations, developed by an in-house
      research team that includes CTO Zachary Lipton (CMU AI researcher) and published collaborators
      with roots in Carnegie Mellon's Language Technologies Institute and Tepper School.

      The Contextual Reasoning Engine (CRE), launched in February 2025, extends the base documentation
      pipeline with three functional additions. First, contextual awareness: the CRE pulls data from
      retrospective patient encounters, health system-specific revenue cycle guidelines, and individual
      clinician documentation preferences to enrich note drafts. Second, problem detection: the CRE
      identifies and groups medical problems with language aligned to appropriate billing codes,
      including CMS-HCC Version 28 codes critical for value-based care reimbursement. Third, actionable
      outputs: the system captures structured orders from the conversation transcript and surfaces them
      in the Epic orders module for clinician review and signature, reducing manual re-entry.

      The AI processing pipeline incorporates retrieval-augmented generation (RAG) principles, drawing
      on patient history and system-specific guidelines at inference time. Abridge publishes two
      technical whitepapers on its responsible AI methodology: "Pioneering the Science of AI Evaluation"
      (Part I) and "The Science of Confabulation Elimination" (Part II), both authored by Michael
      Oberst, Davis Liang, and Zachary Lipton and published in August 2025. These whitepapers describe
      a two-axis hallucination classification framework (support axis and severity axis) and purpose-built
      guardrails trained on over 1,000 hours of human-validated clinical encounters. In internal testing
      on 10,000+ real encounters, Abridge's confabulation-detection guardrail caught 97% of hallucinated
      claims, compared to 82% for GPT-4o baseline models — representing approximately six times fewer
      missed errors. All notes are presented as drafts requiring explicit clinician review and sign-off
      before EHR entry, maintaining human-in-the-loop accountability.
