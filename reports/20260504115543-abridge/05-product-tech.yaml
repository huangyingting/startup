  - id: S503
    title: Epic Integration and Distribution Strategy
    body: |
      Abridge's distribution strategy is built on deep native integration with Epic EHR, which holds
      approximately 35% of the U.S. hospital market and over 60% share among large academic medical
      centers. The "Abridge Inside" program, announced in February 2024 alongside the Series C
      deployment expansion, made Abridge the first ambient AI documentation vendor to integrate
      natively across Epic's full platform stack: Epic Haiku (the iOS mobile app used by clinicians
      on smartphones and iPads), and Epic Hyperdrive (the Chromium-based web desktop client).

      As an Epic Workshop partner, Abridge co-develops features with Epic rather than relying solely
      on third-party API integrations. This partnership unlocks capabilities that external vendors
      cannot access: real-time structured order capture surfaced directly into Epic's medication/order
      modules, nursing-specific workflow templates co-designed with Epic and Mayo Clinic, and native
      Linked Evidence display within the Epic note editor. Clinicians using Abridge Inside do not need
      to leave Epic to activate recording, review notes, or sign off, reducing adoption friction.

      The Epic distribution model creates a powerful flywheel: health systems purchasing Epic often
      learn about Abridge through Epic's marketplace and recommendation channels, reducing Abridge's
      direct sales cost per health system. By April 2026, Abridge is deployed across 250+ of the
      largest U.S. health systems, the majority of which run Epic. This concentration on Epic also
      creates a dependency risk: any disruption to the Epic Workshop relationship, change in Epic's
      platform access policies, or Epic's decision to launch a competing ambient documentation product
      would materially impair Abridge's distribution reach.
