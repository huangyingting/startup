  - id: T503
    title: Technology / Operating Architecture Table
    columns:
      - Layer / Component
      - Role
      - Dependency
      - Risk
    rows:
      - - Audio Capture
        - Records clinician-patient conversation via smartphone mic (iOS Haiku) or desktop browser mic (Hyperdrive)
        - Device microphone hardware; user permission; ambient noise environment
        - Audio quality degradation in noisy clinical settings; device permissions management at scale
      - - Automatic Speech Recognition (ASR)
        - Converts audio to text transcript in real time using Abridge's proprietary speech engine
        - Proprietary ASR model trained on clinical conversations; GPU compute infrastructure
        - >-
          Medical terminology ASR errors can propagate into note generation; word error rate in subspecialties not
          published
      - - LLM / Note Generation
        - Fine-tuned LLMs transform structured transcript into SOAP or specialty-specific note draft
        - Proprietary fine-tuned LLMs on 1.5M+ de-identified conversations; GPU inference cluster
        - Hallucination / confabulation risk; model versioning and update governance not publicly disclosed
      - - Confabulation Detection Guardrails
        - Automated pre-review layer detects and corrects unsupported claims before clinician review
        - Purpose-built classification models trained on 1,000+ hours of human-validated data
        - 97% confabulation catch rate vs GPT-4o 82% (internal test); ~3% residual error rate persists
      - - Linked Evidence Engine
        - Maps each note sentence to audio transcript timestamp; enables click-to-verify
        - Alignment model between generated text and ASR transcript
        - Alignment errors between note and transcript are possible; not independently audited
      - - Epic EHR Integration (Abridge Inside)
        - Embeds Abridge natively in Epic Haiku and Hyperdrive; no separate app switch required
        - Epic Workshop partnership; Epic API and integration certification
        - Dependency on Epic partnership continuity; any Epic platform policy change is a disruption risk
