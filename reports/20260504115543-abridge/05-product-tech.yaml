  - id: S503
    title: Epic Integration and Distribution Strategy
    body: |
      Abridge's distribution strategy is built on deep native integration with Epic EHR, which holds
      approximately 35% of the U.S. hospital market and over 60% share among large academic medical
      centers. The "Abridge Inside" program, announced in February 2024 alongside the Series C
      deployment expansion, made Abridge the first ambient AI documentation vendor to integrate
      natively across Epic's full platform stack: Epic Haiku (the iOS mobile app used by clinicians
      on smartphones and iPads), and Epic Hyperdrive (the Chromium-based web desktop client).

      As an Epic Workshop partner, Abridge co-develops features with Epic rather than relying solely
      on third-party API integrations. This partnership unlocks capabilities that external vendors
      cannot access: real-time structured order capture surfaced directly into Epic's medication/order
      modules, nursing-specific workflow templates co-designed with Epic and Mayo Clinic, and native
      Linked Evidence display within the Epic note editor. Clinicians using Abridge Inside do not need
      to leave Epic to activate recording, review notes, or sign off, reducing adoption friction.

      The Epic distribution model creates a powerful flywheel: health systems purchasing Epic often
      learn about Abridge through Epic's marketplace and recommendation channels, reducing Abridge's
      direct sales cost per health system. By April 2026, Abridge is deployed across 250+ of the
      largest U.S. health systems, the majority of which run Epic. This concentration on Epic also
      creates a dependency risk: any disruption to the Epic Workshop relationship, change in Epic's
      platform access policies, or Epic's decision to launch a competing ambient documentation product
      would materially impair Abridge's distribution reach.
    claimRefs:
      - C176
      - C177
      - C190
      - C175
      - C159
  - id: S504
    title: AI Safety, Quality, and Compliance Architecture
    body: |
      Abridge is HIPAA-compliant and executes Business Associate Agreements (BAAs) with each health
      system customer as a standard enterprise onboarding requirement. The platform enforces enterprise
      SSO, role-based access controls, and customizable governance settings that allow health system
      IT and compliance departments to configure audit logging, data retention policies, and user
      permissions according to institutional requirements.

      Audio recordings are processed through Abridge's proprietary speech recognition pipeline. The
      company has not publicly disclosed its full infrastructure stack, but earlier descriptions
      referenced Microsoft Azure as the initial cloud hosting provider; current infrastructure
      configuration is not independently confirmed. All AI-generated notes are explicitly framed as
      draft documents requiring clinician review, sign-off, and any necessary edits before being
      finalized in the EHR, maintaining a mandatory human-in-the-loop checkpoint.

      Abridge's Linked Evidence feature is the primary real-time accuracy transparency mechanism:
      each sentence in a generated note is mapped to the specific audio transcript segment from the
      patient encounter, and clinicians can click any sentence in the draft note to hear the
      corresponding audio. This audit trail enables rapid fact-checking and error correction before
      signature. The confabulation elimination pipeline, detailed in the August 2025 whitepaper,
      adds an automated pre-review layer that detects and corrects hallucinated claims in the draft
      before they are displayed. The two-axis classification (support level × clinical severity)
      enables the system to prioritize corrections based on potential patient harm.

      KLAS Research, the independent healthcare technology analyst firm, ranked Abridge #1 Best in
      KLAS for Ambient AI in 2025 and again in 2026, with A+ ratings across Culture, Loyalty,
      Relationship, and Value customer experience pillars based on direct interviews with health
      system customers. The consecutive KLAS wins provide independent third-party validation of
      deployment quality and customer satisfaction at scale.
