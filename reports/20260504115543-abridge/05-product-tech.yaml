    title: Product Capability Maturity Matrix
    type: matrix
    layout: wide
    summary: >-
      Maturity and differentiation strength across Abridge's five core capability dimensions evaluated against four
      criteria. Green = strong/confirmed; yellow = partial/claimed; orange = early/unconfirmed. Abridge is strongest on
      Epic integration depth and transparency mechanisms; weakest on multi-EHR breadth, independent accuracy benchmarks,
      and nursing GA status.
    data:
      columns:
        - Production Maturity
        - Independent Validation
        - Competitive Moat
        - Diligence Risk
      rows:
        - label: Core Ambient Documentation
          values:
            - 'High — 250+ health systems, KLAS #1'
            - Partial — JAMIA Open study; no RCT
            - Strong — Linked Evidence; Epic-native; proprietary dataset
            - Hallucination residual risk; accuracy variance by specialty
          tone: positive
        - label: Contextual Reasoning Engine / RCI
          values:
            - Medium — GA Feb 2025; early deployments
            - Low — no independent RCI outcome data
            - Medium — point-of-care HCC coding is novel; competitors pursuing
            - Revenue impact claims unverified; coder displacement risk unquantified
          tone: neutral
        - label: Clinical Decision Support (CDS)
          values:
            - Low-Medium — UpToDate live; NEJM/JAMA announced
            - Low — no retrieval accuracy benchmark
            - Medium — NEJM/JAMA brand; context-aware retrieval
            - Integration timeline unclear; evidence currency and hallucination in CDS unevaluated
          tone: warning
        - label: Abridge for Nurses
          values:
            - Low — co-development phase
            - None — no published outcomes
            - Medium — co-developed with Epic and Mayo Clinic
            - GA date unknown; nursing workflow accuracy not validated
          tone: warning
        - label: Linked Evidence / Safety Layer
          values:
            - High — embedded in all modules
            - Low — only Abridge internal evaluation
            - High — unique in ambient AI; clinician trust driver
            - Alignment error rate not externally audited; consent lawsuit risk
          tone: neutral
    approximationNotes: >-
      Maturity ratings based on analyst synthesis of press releases, whitepapers, and third-party coverage as of May
      2026. Independent validation assessments reflect publicly available evidence only.
