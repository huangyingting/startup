  - id: T502
    title: Workflow Use-case Table
    columns:
      - User Job
      - Current Workflow
      - Abridge Solution
      - Measurable Benefit
      - Limitation
    rows:
      - - Outpatient physician note creation
        - Type or dictate note after encounter; 2-3 hrs/day 'pajama time'
        - Ambient recording during visit; SOAP draft in EHR within ~1 min of encounter end
        - Up to 86% reduction in after-hours charting; ~70 hrs/month saved (company-claimed)
        - Benefit figures are company-claimed or pre/post survey; no RCT-validated outcome published
      - - Revenue cycle billing code capture
        - Coding team reviews notes post-encounter; queries physicians for missing codes
        - CRE identifies CMS-HCC codes from conversation in real time; surfaces in EHR
        - Reduces downstream coding queries; improves HCC capture rate at point of care
        - Claims denial reduction data not independently verified; coders still review
      - - Clinical decision-making support
        - Physician breaks workflow to search UpToDate or PubMed during or after visit
        - CDS module surfaces UpToDate/NEJM/JAMA answers grounded in patient context within Epic
        - Reduces workflow interruption; evidence anchored to specific patient encounter
        - NEJM/JAMA integration not yet GA; UpToDate retrieval accuracy vs manual search not benchmarked
      - - Nursing shift documentation
        - Nurse manually types shift handoff notes; 30-60 min/shift
        - Abridge for Nurses captures bedside conversations for handoff summary generation
        - Time reduction in handoff documentation; standardized note structure
        - Co-development phase; GA timeline, accuracy, and adoption data not public
      - - Inpatient physician progress notes
        - Attending manually dictates or types inpatient progress notes from memory
        - Ambient recording during rounds; structured progress note generated in Epic Hyperdrive
        - Reduces cognitive load; note completeness improvement reported in JAMIA Open peer-reviewed study
        - Inpatient specialty-specific accuracy (e.g., ICU, complex surgical) not benchmarked
    notes: >-
      Benefit figures for after-hours charting reduction (86%) and hours saved (70/month) are company-claimed based on
      customer surveys, not randomized controlled trials.
