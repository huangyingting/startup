chapter:
  number: 5
  title: Product & Technology
  summary: |
    Abridge's core product is an enterprise ambient AI clinical documentation platform that captures
    clinician-patient conversations and auto-generates structured SOAP and specialty-specific notes
    within approximately one minute of encounter completion. The platform is natively embedded inside
    Epic EHR via the "Abridge Inside" program (announced February 2024), integrating with Epic Haiku
    (mobile) and Epic Hyperdrive (web) as an Epic Workshop partner. The Contextual Reasoning Engine
    (CRE), launched alongside the $250 million Series D in February 2025, extends the core
    documentation capability with contextual patient history awareness, revenue cycle billing-code
    alignment (CMS-HCC), and automated order capture at the point of care. The "Linked Evidence"
    feature maps every AI-generated note sentence back to the specific audio transcript timestamp
    that supports it, providing clinician audit capability and differentiating Abridge on safety and
    transparency. The platform supports 50+ clinical specialties and 28+ languages, is deployed at
    250+ health systems, and projects 80-100 million annual clinical conversations in 2026.
    Abridge has earned Best in KLAS for Ambient AI for two consecutive years (2025 and 2026) and
    in April 2026 announced multi-year content partnerships with NEJM Group and JAMA Network for
    clinical decision support. Key technical risks include persistent LLM hallucination vulnerability,
    Epic distribution concentration, and patient consent and data privacy exposure.
sections:
  - id: S501
    title: Product Overview and Core Module Map
    body: |
      Abridge delivers an enterprise-grade ambient AI clinical documentation platform that functions
      across three primary form factors: a native iOS mobile app for bedside and outpatient use, a
      browser-based web interface embedded within Epic EHR's Hyperdrive desktop client, and an API
      integration layer that enables health system IT departments to configure deployment at scale.
      The clinician experience is streamlined: after logging in via enterprise single sign-on (SSO),
      the clinician activates recording, conducts the patient encounter normally, and receives a
      structured SOAP or specialty-specific note draft inside the EHR within approximately one minute
      of encounter completion.

      The product suite now comprises five distinguishable modules. The core Ambient Documentation
      module handles the core workflow for physician outpatient visits. The Revenue Cycle Intelligence
      module, part of the Contextual Reasoning Engine, automates CMS-HCC billing code capture at the
      point of conversation. The Clinical Decision Support (CDS) module surfaces peer-reviewed evidence
      from Wolters Kluwer UpToDate, NEJM, and JAMA Network journals in context during encounters.
      Abridge for Nurses targets nursing shift documentation, handoff notes, and inpatient assessments.
      The Linked Evidence system is a horizontal transparency layer embedded across all documentation
      modules, mapping each AI-generated sentence to the supporting audio transcript timestamp.

      The platform supports 50+ clinical specialties spanning outpatient, inpatient, emergency
      department, and nursing settings, and handles 28+ languages. As of 2026 Abridge is deployed at
      more than 250 U.S. health systems and projects 80-100 million clinician-patient conversations
      for the year.
