companyProfile:
  summary: |
    Abridge is a Pittsburgh-founded healthcare AI company that converts clinician-patient
    conversations into structured clinical notes automatically, embedded natively within Epic
    EHR via the "Abridge Inside" integration. Founded in 2018 by cardiologist-CEO Shiv Rao
    and ML researcher-CTO Zack Lipton, the company has raised $757M across five rounds,
    reaching a $5.3B valuation at Series E (June 2025, led by a16z and Khosla Ventures).
    As of early 2026, Abridge serves 150+ health systems and has earned Best in KLAS Ambient
    AI recognition for two consecutive years. It is expanding beyond ambient documentation
    into clinical coding, revenue cycle intelligence, and evidence-linked clinical decision
    support via partnerships with NEJM and JAMA.
