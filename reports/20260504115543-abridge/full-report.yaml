      - number: '3.3'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: |
              Across the major direct competitors, ambient listening and automatic SOAP note generation are now
              table-stakes capabilities. All vendors offer real-time or near-real-time note delivery and claim
              specialty support spanning primary care through surgical subspecialties. Differentiation resides in
              five dimensions: (1) depth of EHR embedding; (2) evidence traceability; (3) language breadth;
              (4) clinical coding integration; and (5) KLAS/independent validation.

              On EHR embedding, Abridge's "Abridge Inside" native Epic integration is unique. Nuance DAX is the
              only other vendor with an Epic-embedded workflow, but it runs as a separate application rather than
              a native system function. Suki uniquely covers multiple EHRs (Epic, Cerner, MEDITECH, Athenahealth),
              giving it an advantage in non-Epic markets. Ambience, DeepScribe, and Nabla primarily target Epic
              shops with API-based integration.

              On evidence traceability, Abridge's Linked Evidence feature—which maps every AI-generated sentence
              to its source transcript segment—is a clinically differentiating capability with no direct analog
              at Nuance DAX, Suki, Ambience, or DeepScribe. AWS HealthScribe offers transcript traceability at
              the API level but lacks the clinician-facing UI layer that makes it actionable in workflow.

              On language support, Nabla (35 languages) leads the field, followed by Abridge (28+ languages).
              Most other vendors support fewer than 20 languages, creating a gap for safety-net hospitals and
              federally qualified health centers with linguistically diverse patient populations.

              On independent validation, Abridge holds the highest available KLAS designation—Best in KLAS for
              Ambient AI—for both 2025 and 2026, making it the only vendor with two consecutive top designations.
              Ambience holds the highest KLAS customer satisfaction score (97.7) among vendors that have been
              formally evaluated. Nuance DAX and Suki have prior KLAS recognition; DeepScribe, Nabla, and AWS
              HealthScribe have not been independently KLAS-ranked.

              The feature matrix (T302) captures the binary or ordinal capability coverage by vendor across ten
              buying criteria as of Q2 2026.
