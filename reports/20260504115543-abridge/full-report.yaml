  - id: FE001
    title: Abridge Product Architecture Stack
    type: stack
    layout: standard
    summary: >-
      Five-layer architecture of the Abridge clinical AI platform, from audio capture at the clinical interface layer
      through speech recognition, LLM note generation, safety guardrails, and EHR delivery. The Linked Evidence system
      is embedded as a cross-cutting layer connecting generated text back to source audio at each note delivery point.
    data:
      layers:
        - label: Layer 1 — Clinical Interface (Patient Encounter)
          detail: >-
            iOS Haiku app (mobile) or Epic Hyperdrive browser (desktop); ambient audio recording activated by clinician;
            conversation captured without scripted interaction
        - label: Layer 2 — Automatic Speech Recognition (ASR)
          detail: >-
            Proprietary clinical-grade speech-to-text engine; real-time transcription; trained on medical terminology
            and multi-speaker clinical conversations; output is timestamped transcript
        - label: Layer 3 — LLM Note Generation
          detail: >-
            Fine-tuned LLMs on 1.5M+ de-identified clinical encounters; transforms transcript into structured SOAP or
            specialty-specific note; CRE adds contextual patient history, billing-code alignment, and EHR order
            extraction
        - label: Layer 4 — Confabulation Detection and Safety Guardrails
          detail: >-
            Purpose-built classifier trained on 1,000+ hours of human validation; two-axis framework (support level ×
            severity); automatically revises unsupported claims before clinician review; 97% catch rate (internal
            evaluation)
        - label: Layer 5 — Linked Evidence and EHR Delivery
          detail: >-
            Aligns each generated sentence to source transcript timestamp; clinician sees draft note in Epic with
            clickable provenance; clinician reviews, edits, and signs; note enters patient record only after explicit
            sign-off
        - label: Cross-cutting — Clinical Decision Support and Revenue Cycle Intelligence
          detail: >-
            UpToDate/NEJM/JAMA evidence layer surfaces peer-reviewed content in patient context (CDS module); CMS-HCC
            billing code extraction and EHR order capture runs in parallel to note generation (CRE/RCI module)
    approximationNotes: >-
      Architecture derived from Abridge technical whitepapers, press releases, and CRE announcement. Full infrastructure
      details (cloud provider, GPU cluster specs, model versioning) are not publicly disclosed.
    claimRefs:
      - CE002
      - CE005
      - CE006
      - CE007
      - CE008
      - CE009
      - CE012
      - CE013
      - CE031
      - CE033
