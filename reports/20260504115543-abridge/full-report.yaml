  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: wide
    summary: |
      Chain from core investment drivers through competitive risks and valuation constraints to
      the research-more recommendation. Market opportunity and product traction are positive inputs;
      valuation stretch, competitive threat from Epic, and undisclosed fundamentals are the
      counterweights preventing a buy rating.
    data:
      nodes:
        - id: market
          label: 'Market: $11B+ clinical documentation TAM; 30%+ growth; expanding into $60B RCM'
          tone: positive
        - id: product
          label: 'Product: 150+ health systems; $117M ARR; 50M+ conversation LLM; 55 specialties'
          tone: positive
        - id: investors
          label: 'Investor Syndicate: a16z, IVP, Lightspeed, Khosla — tier-1 crossover signal'
          tone: positive
        - id: competition
          label: 'Competition: Epic native scribe launched Jun 2025; Nuance DAX incumbency; ambient AI entrants'
          tone: warning
        - id: valuation
          label: 'Valuation: $5.3B / 45x ARR — 6-7x premium over public healthcare SaaS floor'
          tone: negative
        - id: disclosure
          label: 'Disclosure Gaps: GAAP revenue, cap table, NRR, burn rate all undisclosed'
          tone: warning
        - id: recommendation
          label: 'Recommendation: RESEARCH-MORE — await ARR ramp >$250M and key disclosure items'
          tone: neutral
      edges:
        - from: market
          to: product
          label: drives
        - from: product
          to: valuation
          label: justifies partially
        - from: investors
          to: valuation
          label: supports
        - from: competition
          to: valuation
          label: pressures down
        - from: valuation
          to: recommendation
          label: stretched input
        - from: disclosure
          to: recommendation
          label: blocking input
    approximationNotes: Flow logic is analyst-synthesized from public evidence. Edge weights are qualitative.
    claimRefs:
      - CV008
      - CV010
      - CV021
      - CV026
      - CV031
      - CV036
  - id: FV002
    title: Valuation Sensitivity
    type: bar
    layout: wide
    summary: |
      ARR or revenue multiple for Abridge versus comparable public companies, private
      transactions, and sector benchmarks. Abridge's 45x contracted ARR multiple is 6-7x
      above the public healthcare SaaS median and approximately 3.4x the Nuance acquisition
      multiple, illustrating the extraordinary growth expectations embedded in the Series E price.
    data:
      items:
        - label: Veeva Systems (public)
          value: 6.5
          note: EV/Revenue FY2025
        - label: Doximity (public)
          value: 7
          note: EV/Revenue FY2025
        - label: Phreesia (public)
          value: 7
          note: EV/Revenue FY2025
        - label: Healthcare SaaS public median
          value: 7
          note: 2025 sector median EV/Revenue
        - label: Tempus AI (IPO Jun 2024)
          value: 10.8
          note: EV/Revenue at IPO
        - label: Nuance Communications (M&A 2021)
          value: 13.3
          note: M&A revenue multiple
        - label: Ambience Healthcare (private)
          value: 33
          note: ARR multiple Jul 2025 Series C
        - label: Abridge (Series E Jun 2025)
          value: 45
          note: Contracted ARR multiple — recognized revenue multiple likely 60-75x
    approximationNotes: >-
      Public company multiples as of approximately May 2026 run date based on trailing EV/Revenue. Private company
      multiples based on disclosed funding round valuations divided by disclosed ARR (Abridge: $117M contracted Q1 2025;
      Ambience: $30M ARR July 2025). Abridge contracted ARR multiple likely understates true recognized-revenue multiple
      by 20-50%.
