  - id: FU004
    title: Abridge Customer Journey Map
    type: journey-map
    layout: standard
    summary: >-
      Customer adoption path from discovery through enterprise expansion, illustrating typical buyer segments, adoption
      surfaces, and land-and-expand loops.
    data:
      items:
        - label: Discovery
          detail: >-
            Health system CIO, CMIO, or CMO identifies ambient AI documentation need; Abridge surfaces via Epic App
            Orchard marketplace, clinician peer referral, or sales outreach; KLAS ranking drives inbound
        - label: Pilot
          detail: >-
            3-6 month limited deployment in one specialty or department; outcomes tracked (documentation time, KLAS
            survey, clinician satisfaction); Epic Haiku/Hyperdrive integration enables low-friction rollout
        - label: Enterprise Commitment
          detail: >-
            IT security review, HIPAA BAA, multi-stakeholder sign-off (CIO, CMIO, CFO, legal); enterprise-wide SaaS
            contract; typically multi-year term; per-clinician per-year pricing
        - label: Go-Live
          detail: >-
            Production deployment via Epic Haiku (mobile) and Hyperdrive (desktop); clinician onboarding; Linked
            Evidence feature enables audit trail; real-time note generation in 28+ languages and 50+ specialties
        - label: Expansion
          detail: >-
            Additional specialties added (cardiology to neurology to pediatrics); nursing documentation pilots converted
            to contracts; revenue cycle modules (prior authorization, billing optimization); seat count grows as health
            system adds sites
        - label: Strategic Alignment
          detail: >-
            High-value health systems become dual investor-customers (UPMC Enterprises, Kaiser Permanente Ventures);
            serve as reference accounts; data flywheel contribution; potential exclusivity or preferred pricing
            arrangements
