  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Portfolio Overview
        blocks:
          - type: paragraph
            body: |
              Abridge's customer base consists exclusively of U.S. health systems as enterprise SaaS
              purchasers. There is no consumer subscription, payer-side revenue, or confirmed international
              deployment as of May 2026. The buyer in every known transaction is the health system
              (CIO/CMIO/CFO sign-off), the user is the individual clinician (physician, advanced practice
              provider, or nurse), and the beneficiary is the patient. Purchasing is driven through an
              enterprise sales motion, typically requiring a pilot phase followed by an enterprise contract.

              Abridge surpassed 100 health system deployments at its Series D announcement (February 2025),
              up from fewer than 30 at its Series C (February 2024). By October 2025, company press materials
              reference more than 200 health systems, and the KLAS 2026 report corroborates widespread
              deployment at scale. The customer portfolio spans academic medical centers, large integrated
              delivery networks (IDNs), and regional community health systems, with a concentration in
              Epic-running institutions due to the "Abridge Inside" native integration advantage.

              Strategic investor-customers — UPMC Enterprises, Kaiser Permanente Ventures — represent
              a distinctive category where health systems are both financial backers and production
              deployers. This dual relationship provides privileged reference-selling access and signals
              long-term commitment, but also introduces conflicts of interest that require diligence.
            claimRefs:
              - CU001
              - CU002
              - CU012
              - CU013
              - CU014
              - CU024
              - CU025
              - CU026
      - number: '6.2'
        title: 'Named Deployments: Scale, Evidence, and Production Status'
        blocks:
          - type: paragraph
            body: |
              Abridge's most significant publicly confirmed production deployments as of May 2026 are
              summarized below by scale and evidence quality.

              UPMC (University of Pittsburgh Medical Center) is Abridge's founding anchor. CEO Shiv Rao
              is a practicing UPMC cardiologist and the platform was incubated within UPMC. In October
              2025, UPMC announced enterprise-wide scaling to more than 12,000 clinicians across 40
              hospitals and 800+ outpatient sites supporting 44 specialties. UPMC Enterprises is both
              an early-round investor and the longest-tenured customer, providing the strongest evidence
              of production depth in the portfolio.

              Kaiser Permanente deployed Abridge to more than 24,000 physicians across 40 hospitals and
              600+ medical offices in August 2024 — described by Kaiser as the largest generative AI
              deployment in healthcare history at that date. Kaiser Permanente Ventures is also a Series
              B and C investor in Abridge, creating a strategic alignment that underpins the scale and
              speed of the deployment. Kaiser physicians reported 87% satisfaction with Abridge as the
              most significant workday improvement.

              Northwell Health (28 hospitals, 1,000+ outpatient facilities) announced system-wide deployment
              in October 2025, aiming to support more than 50 million medical conversations per year on
              the Abridge platform. Highmark Health and Allegheny Health Network (14 hospitals) announced
              an enterprise-wide partnership in August 2025 that uniquely includes a real-time prior
              authorization module — the first confirmed expansion of Abridge beyond documentation into
              revenue cycle intelligence at a named customer.

              Corewell Health (21 hospitals, 300+ sites, 4,000+ physicians) announced enterprise-wide
              deployment in December 2024, publishing detailed 90-day pilot outcomes. Mayo Clinic expanded
              enterprise-wide to 2,000 physicians in January 2025, building on prior nursing documentation
              pilots. Duke Health and Johns Hopkins Medicine both announced enterprise-wide implementations
              in early 2025 as part of Abridge's Series D announcement cohort.

              Yale New Haven Health joined at the time of Abridge's Series C (February 2024), deploying
              to thousands of clinicians. Emory Healthcare was an early adopter in 2023, becoming one of
              the first large academic medical centers to go live with the Abridge Inside Epic integration.
            claimRefs:
              - CU001
              - CU003
              - CU004
              - CU005
              - CU006
              - CU007
              - CU008
              - CU009
              - CU010
              - CU011
              - CU014
              - CU023
              - CU024
      - number: '6.3'
        title: Clinical Outcomes, Customer Satisfaction, and KLAS Evidence
        blocks:
          - type: paragraph
            body: |
              Independent customer satisfaction evidence for Abridge is stronger than for virtually
              any other ambient AI documentation vendor, anchored by the KLAS Best in KLAS designation
              for two consecutive years and quantified clinical outcomes from multiple named deployments.

              KLAS Research named Abridge #1 Best in KLAS for Ambient AI in January 2025 and February
              2026, the latter with a published score of 94.7 out of 100 — the highest in the category.
              KLAS rankings are compiled through direct, independent interviews with healthcare organization
              leaders and clinicians, and weight culture, loyalty, relationship, and value dimensions.
              The back-to-back #1 ranking across both the 2025 and 2026 cycles provides robust independent
              corroboration of customer satisfaction.

              Corewell Health's publicly disclosed 90-day pilot data (December 2024) is the most granular
              clinical outcome dataset in the Abridge portfolio: 90% of clinicians reported significantly
              increased attention to patients; 61% reported reduced cognitive load; 48% reduction in
              after-hours documentation time (average from 4.3 to 2.2 hours weekly); 85% increased
              work satisfaction; more than 50% reported less burnout. These are reported as results from
              a controlled pre/post pilot, not general survey sentiment.

              Kaiser Permanente reported that 87% of physicians described Abridge as the most significant
              improvement to their workday. Highmark Health/AHN reported 92% of patients felt providers
              were more attentive. These figures are health system-reported rather than independently
              audited, but they originate from published press releases and are consistent across sites.

              Limitations include: all outcome data originates from health systems with financial or
              strategic interest in positive results (some are also investors); no randomized controlled
              trial evidence has been published for Abridge specifically at enterprise scale; and retention
              rates, NRR, and contract renewal data are entirely private and unavailable.
            claimRefs:
              - CU003
              - CU006
              - CU007
              - CU015
              - CU016
              - CU017
              - CU020
              - CU021
              - CU036
              - CU037
      - number: '6.4'
        title: Customer Concentration, Retention, and Expansion Signals
        blocks:
          - type: paragraph
            body: |
              Customer concentration risk is material and largely unquantifiable without private ARR
              data. UPMC's 12,000-clinician enterprise deployment at an estimated $2,500 per clinician
              per year implies approximately $30 million in annual contract value. If Abridge's total
              ARR is $100-117 million (Sacra estimate), UPMC alone could represent 25-30% of total
              revenue. No other named customer has disclosed clinician seat counts of comparable scale
              in a single contract, though Kaiser Permanente's 24,000+ physician deployment at full
              rollout could represent even greater potential contract value.

              Expansion signals are evident in the announced contract scope of named deployments. The
              Highmark/AHN partnership extends Abridge beyond documentation into real-time prior
              authorization — a new revenue stream. Mayo Clinic's expansion includes nursing documentation
              as well as physician documentation. UPMC's October 2025 enterprise-wide scale announcement
              followed an earlier, narrower deployment, demonstrating classic land-and-expand dynamics.

              No public evidence of customer churn, contract non-renewal, or active deployment cancellation
              exists as of the report date. However, this absence of adverse data is expected for a
              pre-IPO private company with no obligation to disclose customer losses. The December 2025
              Sharp Healthcare lawsuit represents a deployment-level adverse event but not a confirmed
              customer departure. HCA Healthcare — one of the largest U.S. health systems — is a confirmed
              competitive loss, having selected Commure (which acquired Augmedix) for its ambient AI program
              rather than Abridge. This represents the most significant publicly confirmed competitive loss
              in the Abridge customer record.

              Net revenue retention (NRR) is entirely private. The pattern of enterprises expanding seat
