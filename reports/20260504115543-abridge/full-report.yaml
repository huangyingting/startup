          Series E
        - Quarterly ARR reports (Sacra tracking); customer count announcements
        - Downgrade to track; begin secondary exit exploration
      - - Adverse regulatory ruling
        - FDA SaMD classification requiring PMA submission OR class-action settlement above $50M
        - >-
          Pauses new contract signings; legal cost burden; reputational impairment at health system procurement
          committees
        - FDA enforcement discretion updates; litigation docket (Sharp Healthcare case; Sutter Health parallel cases)
        - Downgrade to avoid if adverse ruling confirmed
      - - CEO departure
        - Shiv Rao exit without named successor within 30 days
        - >-
          Key-person concentration risk; investor confidence affected; enterprise sales pipeline disruption given
          founder-led relationships
        - Executive press releases; LinkedIn; board announcements
        - Initiate escalated diligence; trigger board governance review
      - - Capital market multiple compression
        - Healthcare AI public comps compress below 10x ARR for 60+ days
        - IPO window closes; M&A exit required; $5.3B entry price underwater at SaaS Capital 5x M&A median
        - Peer public comps (VEEV, DOCS, PHR) trading multiples; healthcare IT IPO pipeline data
