    title: Clinician Workflow — Ambient Documentation Journey
    type: flow
    layout: standard
    summary: >-
      Step-by-step flow of how a clinician uses Abridge within an Epic-enabled patient encounter. The workflow begins
      with clinician login and ends with a signed note in the EHR. Key handoff points are the draft note review
      (human-in-the-loop requirement) and the optional Linked Evidence verification step.
    data:
      nodes:
        - id: n1
          label: Clinician logs in via SSO in Epic Haiku (mobile) or Epic Hyperdrive (desktop)
          detail: Enterprise SSO; no separate Abridge app required; role-based access configured by health system IT
        - id: n2
          label: Clinician activates recording at start of patient encounter
          detail: Single tap in Haiku or click in Hyperdrive; ambient recording begins; no scripted questions required
        - id: n3
          label: Ambient audio captured during patient encounter
          detail: Proprietary ASR converts speech to timestamped transcript in real time; multi-speaker clinical conversation
        - id: n4
          label: Contextual Reasoning Engine processes transcript
          detail: >-
            LLMs generate structured SOAP/specialty note draft; CRE adds patient history context, billing codes, and
            order suggestions
        - id: n5
          label: Confabulation guardrail reviews and revises draft
          detail: >-
            Automated pre-review: unsupported claims revised before clinician sees draft; 97% catch rate per Abridge
            internal testing
        - id: n6
          label: Clinician reviews draft note in Epic with Linked Evidence
          detail: Clinician clicks any sentence in draft to verify against source audio transcript; edits or accepts
        - id: n7
          label: Clinician signs note; note enters EHR patient record
          detail: >-
            Mandatory sign-off step; note only enters EHR after explicit clinician approval; CDS insights and order
            prompts remain available
      edges:
