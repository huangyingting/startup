  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: |
              Abridge's most immediate risk vector is legal. The December 2025 class-action lawsuit filed in
              San Diego Superior Court names both Sharp Healthcare and Abridge as defendants, alleging that
              more than 100,000 patient encounters were recorded without adequate consent in violation of
              California's Invasion of Privacy Act (CIPA) and the Confidentiality of Medical Information
              Act (CMIA). CIPA Section 637.2 permits civil penalties of $5,000 per violation, creating
              a theoretical aggregate exposure exceeding $500M. The case is not isolated: parallel suits
              naming Sutter Health, Memorial Healthcare, and their ambient AI vendors indicate a systemic
              pattern of consent failures across the industry. Abridge's exposure extends beyond California
              because at least 12 U.S. states have all-party consent statutes, and Abridge's 150+ health
              system customers operate across all of them. Health systems are actively negotiating BAA
              indemnification clauses that shift ambient AI liability directly to vendors.

              Regulatory exposure compounds legal risk. The FDA's risk-based SaMD framework could apply
              to ambient documentation tools that influence clinical decisions; Abridge has not disclosed
              an FDA premarket submission and its exempt-CDS position has not been tested by the agency.
              The proposed HIPAA Security Rule updates (24-hour incident notification, mandatory MFA,
              asset inventories) will impose new compliance obligations on Abridge as a HIPAA business
              associate. The FTC's Operation AI Comply (September 2024) placed healthcare AI under
              heightened scrutiny for substantiation of efficacy claims. California AB 3030 (effective
              January 2025) requires disclosure of AI involvement in patient communications. Pending
              federal legislation could supersede HIPAA BAA frameworks entirely. The cumulative
              regulatory burden is rising faster than Abridge's documented compliance infrastructure,
              and the cost of non-compliance is disproportionate given the PHI-sensitive nature of
              the product. CMS is separately evaluating whether AI-generated notes require additional
              attestation for reimbursement eligibility, adding a payer-side enforcement vector.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
              - CR013
              - CR014
              - CR015
      - number: '7.2'
        title: Technical and Operational Risks
        blocks:
          - type: paragraph
            body: |
              Abridge's core technical risks center on AI accuracy and system reliability in high-stakes
              clinical environments. A 2025 npj Digital Medicine study found a 1.47% hallucination rate
              and a 3.45% omission rate in ambient AI clinical notes across 1,200 encounters; JAMA Internal
              Medicine found clinically significant discrepancies in 4.8% of encounters, with medication
              dosage and allergy errors representing the majority of high-severity incidents. These error
              rates are comparable to human transcription rates but cluster differently: AI hallucinations
              introduce factually incorrect content rather than typographical errors, and as AI-generated
              notes propagate errors into structured EHR data fields (medications, problem lists, allergies)
              the downstream malpractice exposure accumulates.

              Bias risk is documented but inadequately characterized for all protected classes. Studies
              show higher omission rates for non-English-speaking patients and certain racial subgroups
              in ambient AI systems broadly; Abridge's model cards describe bias evaluations but
              independent third-party audits have not been publicly confirmed. Data security risk is
              substantial: raw audio recordings containing voice are not de-identified under HIPAA's
              Safe Harbor method without additional processing, creating a persistent PHI exposure
              that exceeds standard text-based health records. Abridge's cloud infrastructure
              architecture (likely a primary Google Cloud deployment) and its business continuity
              plan for cloud outages are not publicly documented. Integration with EHR systems via
              FHIR APIs introduces additional attack surfaces; misconfigured OAuth token handling is
              a known vulnerability class in healthcare EHR integrations. Rapid model iteration
              required to stay competitive creates tension with FDA PCCP regulatory change-control
              requirements if Abridge's products ever cross the SaMD classification threshold.
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR019
              - CR020
              - CR034
              - CR035
              - CR038
              - CR039
              - CR040
      - number: '7.3'
        title: Competitive and Business Model Risks
        blocks:
          - type: paragraph
            body: |
              Epic's June 2025 launch of a native ambient AI scribe represents the single most material
              strategic threat to Abridge's business model. Multiple health system CIOs described the
              launch as a watershed moment for the industry. Epic's native offering benefits from zero
              marginal integration cost, richer EHR data context, and Epic's existing relationships with
              550+ health systems. The Abridge Inside partnership currently grants access to approximately
              40% of the Epic network, but Epic retains the contractual right to develop competing native
              functionality without restriction. The partnership creates a strategic dependency on a
              potential competitor that Abridge cannot easily exit without losing its primary distribution
              channel.

              Microsoft Nuance DAX Copilot compounds the competitive pressure: 550+ deployed health systems,
              full EHR platform coverage, and Microsoft Azure enterprise relationships provide advantages
              that Abridge's research pedigree cannot fully offset. KLAS Research confirms Abridge leads
              on clinical accuracy among independent vendors, but Epic's native offering is closing the
              accuracy gap. Price compression is likely as Epic and Microsoft compete for the same health
              system budgets, potentially forcing Abridge to discount to retain contracts and compressing
              gross margins below sustainable thresholds. The company's $5.3B valuation (~45x ARR)
              provides no margin for execution missteps: a growth disappointment or major contract
              loss could trigger significant multiple compression at exit. Burn rate and profitability
              timeline are undisclosed, creating uncertainty about the runway to navigate competitive
              headwinds. Customer concentration risk also applies: the loss of one or two anchor health
              systems would materially impair revenue, and health systems under financial pressure may
              defer or cancel ambient AI expansion contracts.
            claimRefs:
              - CR021
              - CR022
              - CR023
              - CR024
              - CR025
              - CR026
              - CR027
              - CR028
