  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Overview and Core Module Map
        blocks:
          - type: paragraph
            body: |
              Abridge delivers an enterprise-grade ambient AI clinical documentation platform that functions
              across three primary form factors: a native iOS mobile app for bedside and outpatient use, a
              browser-based web interface embedded within Epic EHR's Hyperdrive desktop client, and an API
              integration layer that enables health system IT departments to configure deployment at scale.
              The clinician experience is streamlined: after logging in via enterprise single sign-on (SSO),
              the clinician activates recording, conducts the patient encounter normally, and receives a
              structured SOAP or specialty-specific note draft inside the EHR within approximately one minute
              of encounter completion.

              The product suite now comprises five distinguishable modules. The core Ambient Documentation
              module handles the core workflow for physician outpatient visits. The Revenue Cycle Intelligence
              module, part of the Contextual Reasoning Engine, automates CMS-HCC billing code capture at the
              point of conversation. The Clinical Decision Support (CDS) module surfaces peer-reviewed evidence
              from Wolters Kluwer UpToDate, NEJM, and JAMA Network journals in context during encounters.
              Abridge for Nurses targets nursing shift documentation, handoff notes, and inpatient assessments.
              The Linked Evidence system is a horizontal transparency layer embedded across all documentation
              modules, mapping each AI-generated sentence to the supporting audio transcript timestamp.

              The platform supports 50+ clinical specialties spanning outpatient, inpatient, emergency
              department, and nursing settings, and handles 28+ languages. As of 2026 Abridge is deployed at
              more than 250 U.S. health systems and projects 80-100 million clinician-patient conversations
              for the year.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE019
              - CE023
      - number: '5.2'
        title: Contextual Reasoning Engine and AI Architecture
        blocks:
          - type: paragraph
            body: |
              Abridge's AI stack is built around proprietary large language models (LLMs) fine-tuned on a
              de-identified dataset of over 1.5 million clinical conversations, developed by an in-house
              research team that includes CTO Zachary Lipton (CMU AI researcher) and published collaborators
              with roots in Carnegie Mellon's Language Technologies Institute and Tepper School.

              The Contextual Reasoning Engine (CRE), launched in February 2025, extends the base documentation
              pipeline with three functional additions. First, contextual awareness: the CRE pulls data from
              retrospective patient encounters, health system-specific revenue cycle guidelines, and individual
              clinician documentation preferences to enrich note drafts. Second, problem detection: the CRE
              identifies and groups medical problems with language aligned to appropriate billing codes,
              including CMS-HCC Version 28 codes critical for value-based care reimbursement. Third, actionable
              outputs: the system captures structured orders from the conversation transcript and surfaces them
              in the Epic orders module for clinician review and signature, reducing manual re-entry.

              The AI processing pipeline incorporates retrieval-augmented generation (RAG) principles, drawing
              on patient history and system-specific guidelines at inference time. Abridge publishes two
              technical whitepapers on its responsible AI methodology: "Pioneering the Science of AI Evaluation"
              (Part I) and "The Science of Confabulation Elimination" (Part II), both authored by Michael
              Oberst, Davis Liang, and Zachary Lipton and published in August 2025. These whitepapers describe
              a two-axis hallucination classification framework (support axis and severity axis) and purpose-built
              guardrails trained on over 1,000 hours of human-validated clinical encounters. In internal testing
              on 10,000+ real encounters, Abridge's confabulation-detection guardrail caught 97% of hallucinated
              claims, compared to 82% for GPT-4o baseline models — representing approximately six times fewer
              missed errors. All notes are presented as drafts requiring explicit clinician review and sign-off
              before EHR entry, maintaining human-in-the-loop accountability.
            claimRefs:
              - CE005
              - CE006
              - CE007
              - CE008
              - CE012
              - CE013
              - CE015
              - CE016
              - CE028
              - CE031
              - CE032
              - CE034
      - number: '5.3'
        title: Epic Integration and Distribution Strategy
        blocks:
          - type: paragraph
            body: |
              Abridge's distribution strategy is built on deep native integration with Epic EHR, which holds
              approximately 35% of the U.S. hospital market and over 60% share among large academic medical
              centers. The "Abridge Inside" program, announced in February 2024 alongside the Series C
              deployment expansion, made Abridge the first ambient AI documentation vendor to integrate
              natively across Epic's full platform stack: Epic Haiku (the iOS mobile app used by clinicians
              on smartphones and iPads), and Epic Hyperdrive (the Chromium-based web desktop client).

              As an Epic Workshop partner, Abridge co-develops features with Epic rather than relying solely
              on third-party API integrations. This partnership unlocks capabilities that external vendors
              cannot access: real-time structured order capture surfaced directly into Epic's medication/order
              modules, nursing-specific workflow templates co-designed with Epic and Mayo Clinic, and native
              Linked Evidence display within the Epic note editor. Clinicians using Abridge Inside do not need
              to leave Epic to activate recording, review notes, or sign off, reducing adoption friction.

              The Epic distribution model creates a powerful flywheel: health systems purchasing Epic often
              learn about Abridge through Epic's marketplace and recommendation channels, reducing Abridge's
              direct sales cost per health system. By April 2026, Abridge is deployed across 250+ of the
              largest U.S. health systems, the majority of which run Epic. This concentration on Epic also
              creates a dependency risk: any disruption to the Epic Workshop relationship, change in Epic's
              platform access policies, or Epic's decision to launch a competing ambient documentation product
              would materially impair Abridge's distribution reach.
            claimRefs:
              - CE020
              - CE021
              - CE033
              - CE019
              - CE003
      - number: '5.4'
        title: AI Safety, Quality, and Compliance Architecture
        blocks:
          - type: paragraph
            body: |
              Abridge is HIPAA-compliant and executes Business Associate Agreements (BAAs) with each health
              system customer as a standard enterprise onboarding requirement. The platform enforces enterprise
              SSO, role-based access controls, and customizable governance settings that allow health system
              IT and compliance departments to configure audit logging, data retention policies, and user
              permissions according to institutional requirements.

              Audio recordings are processed through Abridge's proprietary speech recognition pipeline. The
              company has not publicly disclosed its full infrastructure stack, but earlier descriptions
              referenced Microsoft Azure as the initial cloud hosting provider; current infrastructure
              configuration is not independently confirmed. All AI-generated notes are explicitly framed as
              draft documents requiring clinician review, sign-off, and any necessary edits before being
              finalized in the EHR, maintaining a mandatory human-in-the-loop checkpoint.

              Abridge's Linked Evidence feature is the primary real-time accuracy transparency mechanism:
              each sentence in a generated note is mapped to the specific audio transcript segment from the
              patient encounter, and clinicians can click any sentence in the draft note to hear the
              corresponding audio. This audit trail enables rapid fact-checking and error correction before
              signature. The confabulation elimination pipeline, detailed in the August 2025 whitepaper,
              adds an automated pre-review layer that detects and corrects hallucinated claims in the draft
              before they are displayed. The two-axis classification (support level × clinical severity)
              enables the system to prioritize corrections based on potential patient harm.

              KLAS Research, the independent healthcare technology analyst firm, ranked Abridge #1 Best in
              KLAS for Ambient AI in 2025 and again in 2026, with A+ ratings across Culture, Loyalty,
              Relationship, and Value customer experience pillars based on direct interviews with health
              system customers. The consecutive KLAS wins provide independent third-party validation of
              deployment quality and customer satisfaction at scale.
            claimRefs:
              - CE009
              - CE010
              - CE014
              - CE023
              - CE026
              - CE028
              - CE031
      - number: '5.5'
        title: Technical Risks, Limitations, and Adverse Evidence
        blocks:
          - type: paragraph
            body: |
              Despite significant engineering investment, LLM hallucination in clinical notes remains the
              primary technical risk for Abridge and the ambient AI sector broadly. Abridge's own research
              acknowledges that even its purpose-built confabulation-detection system, while substantially
              better than general-purpose models, does not achieve 100% elimination of unsupported claims.
              A 2025 Nature publication on multi-model assurance analysis found that LLMs could elaborate on
              or repeat fabricated details in up to 83% of tested clinical vignettes, with prompt engineering
              only partially reducing hallucination rates. Lowering model temperature had minimal effect.
              These adversarial vulnerability findings apply to all LLM-based documentation systems including
              Abridge, and establish that human clinician review — while mandated in Abridge's workflow — is
              a necessary rather than precautionary safeguard.

              Patient consent and recording legality represent an acute legal risk. In December 2025, a class-
              action lawsuit was filed against Sharp Healthcare alleging that a patient was recorded using
              Abridge without explicit two-party consent under California's Invasion of Privacy Act, and
              that AI-generated consent statements were automatically inserted into the patient record. While
              Abridge was not named as a direct defendant (the suit targets the deploying institution), the
              underlying allegations relate to product behavior and implementation defaults. Multiple health
              systems across the industry face similar ambient AI consent suits, suggesting systemic legal
              exposure that Abridge and its customers must manage proactively.

              Epic distribution concentration is the primary strategic technology risk: Abridge's native
              integration advantages are contingent on continued Epic Workshop partnership access. Any
              deterioration of this relationship, Epic platform policy changes, or Epic's potential entry
              into the ambient AI market directly would impair Abridge's most valuable distribution channel
              and technical moat. Independent EHR integration breadth (athenahealth, Cerner/Oracle Health)
              is reportedly available but significantly less developed than the Epic integration.

              Additional technical limitations include: unverified infrastructure resilience and uptime SLA
              commitments; unconfirmed model versioning and rollback procedures; no publicly disclosed
              clinical outcomes studies from randomized controlled trials (RCTs); and limited public data on
              specialty-specific accuracy variance, which may be significant for complex subspecialties.
            claimRefs:
              - CE024
              - CE030
              - CE027
              - CE032
              - CE035
              - CE022
      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Linked Evidence Creates a Unique Trust and Safety Moat
            body: |
              Abridge's Linked Evidence feature — which maps every AI-generated clinical note sentence to the
              audio transcript timestamp that supports it — is not replicated at the same depth by any publicly
              documented competitor. This creates a clinician trust mechanism and a compliance audit trail
              that addresses the primary objection to ambient AI adoption (note accuracy liability). Combined
              with the purpose-built confabulation detection guardrail (97% catch rate vs GPT-4o's 82%), this
              safety stack is a genuine technical differentiator beyond marketing claims, backed by published
              whitepapers.
            calloutType: strength
            claimRefs:
              - CE009
              - CE012
              - CE028
              - CE031
              - CE034
          - type: callout
            title: Epic Workshop Partnership Is a Durable Distribution and Integration Moat
            body: |
              Native Abridge Inside integration within Epic Haiku and Hyperdrive — requiring no app-switching
              — eliminates the #1 adoption barrier for ambient AI in Epic-centric health systems. The Epic
              Workshop co-development relationship enables capabilities (structured order capture, nursing
              module templates) that API-only competitors cannot access. With Epic controlling >60% of large
              health system EHR market share, this partnership is Abridge's most durable distribution advantage
              and creates a structural barrier for non-Workshop ambient AI vendors.
            calloutType: strength
            claimRefs:
              - CE020
              - CE021
              - CE019
          - type: callout
            title: LLM Hallucination Risk Persists and Cannot Be Fully Eliminated
            body: |
              Despite Abridge's 97% internal confabulation catch rate, the ~3% residual error rate on a
              platform generating 80-100 million clinical conversations annually implies a material number of
              potentially erroneous clinical statements reaching clinicians for review. The 2025 Nature
              multi-model assurance study found that prompt engineering cannot eliminate hallucination risk in
              LLMs tested on clinical vignettes. Clinician rubber-stamping (signing notes without careful
              review) at scale would convert these residual AI errors into documented medical record
              inaccuracies with potential adverse patient outcomes and liability consequences. This risk is
              structurally inherent to the LLM approach and cannot be fully mitigated by software alone.
            calloutType: risk
            claimRefs:
              - CE012
              - CE024
              - CE031
          - type: callout
            title: Patient Consent Architecture Creates Legal Exposure for Abridge and Health Systems
            body: |
              The December 2025 Sharp Healthcare class-action lawsuit, alleging non-consensual recording using
              Abridge and AI-generated consent statements, highlights a systemic legal exposure across the
              ambient AI sector. While Abridge contractually places consent responsibility on deploying health
              systems, the plaintiff bar is increasingly testing whether AI tool providers share liability for
              implementation defaults. Abridge's product design choices — including how consent is prompted,
              logged, and documented — directly shape the legal exposure of its customers and potentially
              Abridge itself in future litigation.
            calloutType: risk
            claimRefs:
              - CE030
