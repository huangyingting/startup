  - id: FV003
    title: Valuation / Return Range
    type: range
    layout: wide
    summary: |
      Low, base, and high implied 2028 valuations for Abridge across three scenarios. The bear
      scenario implies near-total loss from Series E pricing; the base scenario implies flat to
      modest return; the bull scenario offers attractive returns only under sustained hypergrowth
      and platform expansion execution.
    data:
      items:
        - label: Bear Scenario (2028)
          low: 360
          mid: 480
          high: 600
          note: Epic wins; ARR stalls at $60-75M; 6-8x multiple; USD millions
        - label: Base Scenario (2028)
          low: 3000
          mid: 4125
          high: 5250
          note: Platform growth; IPO 2027-2028; $250-350M ARR; 12-15x multiple; USD millions
        - label: Bull Scenario (2028)
          low: 7500
          mid: 10750
          high: 14000
          note: Dominant platform; coding/RCM launched; $500-700M ARR; 15-20x; USD millions
    approximationNotes: >-
      Scenario ranges derived from analyst-constructed ARR projections and comparable-based exit multiples.
      Probability-weighted expected value approximately $4.1B (near Series E price), implying expected return of
      approximately 0% for Series E primary investors before dilution. All figures in USD millions. Bear probability
      20%, base 55%, bull 25%.
    claimRefs:
      - CV032
      - CV039
      - CV040
      - CV041
      - CV042
      - CV043
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: |
      IC-ready scoring across seven investment dimensions using 0-10 ordinal scale. Overall
      weighted score of approximately 5.9/10 reflects strong market and traction signals offset
      by stretched valuation and incomplete evidence base. Consistent with a research-more
      recommendation pending disclosure of blocking diligence items.
    data:
      items:
        - label: Market Opportunity
          score: 9
          note: $11B+ clinical documentation TAM expanding into $60B RCM; structural physician burnout tailwind
        - label: Product and Technology
          score: 7
          note: Proprietary clinical LLM; 50M conversation corpus; 55 specialties; 28 languages; real deployment proof
        - label: Revenue Traction
          score: 8
          note: $117M contracted ARR; 150+ health systems; UPMC/Kaiser/Mayo marquee deployments; fastest sector ramp
        - label: Competitive Moat
          score: 5
          note: Epic native scribe launch erodes distribution moat; data flywheel advantage real but narrowing
        - label: Valuation Discipline
          score: 3
          note: 45x contracted ARR; 6-7x premium over public comps; requires extraordinary execution for IRR-positive exit
        - label: Risk Profile
          score: 4
          note: >-
            Class-action; FDA uncertainty; preference overhang; multi-vector risks across legal, competitive, and
            financial
        - label: Evidence Quality
          score: 5
          note: Contracted ARR only (no GAAP); cap table undisclosed; NRR not reported; three blocking diligence gaps
    approximationNotes: >-
      Scores are ordinal 0-10 analyst judgments based on public evidence as of 2026-05-04. Market Opportunity and
      Revenue Traction scores reflect strong underlying signals. Valuation Discipline score reflects 45x ARR vs. sector
      comparables. Overall weighted average of cited scores is approximately 5.9/10.
    claimRefs:
