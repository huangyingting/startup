      - number: '3.4'
        title: Competitive Moats and Switching Cost Analysis
        blocks:
          - type: paragraph
            body: |
              Abridge's primary competitive moat is its architectural position inside Epic's native application
              layer. The "Abridge Inside" designation—embedded in Epic Haiku (mobile) and Hyperdrive (desktop)—
              means health system IT teams do not need to deploy, authenticate, or manage a separate ambient AI
              application. This reduces the procurement friction that normally benefits incumbents like Nuance DAX,
              and creates a switching cost specific to Epic shops: replacing Abridge would require migrating away
              from a natively provisioned Epic function, not simply canceling a third-party SaaS contract. This
              is Abridge's single most durable near-term moat.

              The secondary moat is KLAS recognition. Health system CIOs and CMIOs treat KLAS ratings as a
              primary risk-reduction tool in vendor selection. Two consecutive Best in KLAS designations (2025,
              2026) make Abridge the default safe choice for procurement committees at Epic-heavy health systems.
              The KLAS moat erodes only if a competitor achieves equal recognition in subsequent evaluation cycles.

              Microsoft (Nuance DAX) counters with a distribution moat: the Azure relationship, which gives
              Microsoft's enterprise account teams access to the same C-suite conversations where cloud
              infrastructure, cybersecurity, and EHR services are negotiated. For a health system already running
              Azure-hosted services, purchasing DAX Copilot can be bundled into an existing Microsoft agreement,
              reducing procurement cycles and potentially embedding DAX at below-market pricing.

              Switching costs for ambient AI are low at the contract level but increase with clinical customization.
              A health system with 500 physicians who have configured specialty-specific note templates, feedback
              loops, and EHR field mappings faces weeks to months of reconfiguration work to switch vendors. This
              customization lock-in favors whichever vendor gets deployed first at scale—a first-mover advantage
              that Abridge is exploiting through its rapid enterprise expansion.

              Multi-homing risk is real: several health systems have deployed multiple ambient AI tools in parallel
              (e.g., Nuance DAX in one service line, Abridge in another) to run internal comparisons before
              committing to an enterprise-wide agreement. This parallel adoption pattern is both an opportunity
              (Abridge can win comparisons on quality) and a risk (it prevents exclusive contracts).
            claimRefs:
              - CP039
              - CP041
              - CP042
              - CP043
              - CP048
      - number: '3.5'
        title: Adverse Evidence and Displacement Risks
        blocks:
          - type: paragraph
            body: |
              The most significant displacement risk facing Abridge—and every third-party ambient AI vendor—is
              Epic building native ambient documentation into its core product at no incremental per-seat charge.
              Epic's dominant U.S. hospital EHR market share (~35% of hospitals; over 50% of medium-to-large
              systems) gives it structural distribution leverage that no ambient AI startup can replicate. Epic's
              Cosmos de-identified patient data network and its ambient AI initiative indicate the company intends
              to absorb ambient documentation as a core function, not an add-on. If Epic releases a "good enough"
              native solution included in existing Epic licensing, the addressable market for third-party ambient
              AI at Epic health systems contracts sharply. Abridge's "Abridge Inside" program may delay this risk—
              Epic selected Abridge as its preferred ambient AI partner precisely because Abridge's quality exceeded
              Epic's internal builds—but this partnership can be renegotiated or terminated.

              Nuance DAX has faced documented accuracy complaints in complex subspecialties. Clinicians at several
              academic medical centers have reported that DAX-generated notes in surgical and procedural specialties
              require substantial editing, reducing time-savings benefit. This is consistent with DAX's 30+
              specialty claim being less deep than Abridge's 50+ specialty coverage verified by KLAS. However,
              Microsoft's model improvement cadence via Azure OpenAI is fast, and this gap may close within 12–18
              months.

              The Sharp Healthcare lawsuit (December 2025) alleging lack of patient consent for AI-recorded visits
              is an industry-wide adverse signal. While the lawsuit names Sharp Healthcare (a health system), not
              Abridge directly, it creates precedent risk for all ambient AI vendors. State-level consent
              requirements vary: California's CMIA requires explicit written consent for AI recording, and similar
              laws are advancing in other states. Any vendor operating in multi-state health systems must implement
              consent tooling across all encounter types. Abridge has consent features; whether competitor consent
              workflows meet emerging state law standards is not uniformly documented.

              Commoditization pressure is escalating. With AWS HealthScribe providing a programmable foundation
              for ambient documentation and multiple well-funded vendors converging on similar feature sets, the
              cost floor for ambient AI is dropping. Vendors that rely solely on documentation quality—without
              KLAS validation, EHR integration depth, or clinical coding value-add—face pricing pressure in the
              renewal cycle.
            claimRefs:
              - CP036
              - CP037
              - CP038
              - CP039
              - CP045
              - CP046
              - CP047
              - CP048
              - CP049
      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Abridge Is the Only Ambient AI Vendor with Native Epic Embedding
            body: |
              The "Abridge Inside" program—embedding Abridge natively in Epic Haiku and Hyperdrive—is the most
              defensible competitive advantage in the category. No other vendor, including Nuance DAX, operates
              as a native Epic system function rather than an application overlay. This creates a procurement
              advantage (no separate application to deploy), a user-experience advantage (no separate login or
              consent workflow), and a switching-cost advantage (displacement requires migrating away from a
              native EHR function).
            calloutType: strength
