  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Abridge operates in a segment that can be divided into eight competitor classes: (1) direct ambient
              AI scribe vendors (Nuance DAX, Suki, Ambience Healthcare, DeepScribe, Nabla); (2) cloud-platform
              AI-as-a-service providers offering ambient documentation APIs (AWS HealthScribe); (3) the dominant
              EHR vendor building native ambient AI (Epic Systems); (4) status-quo human medical scribes and
              offshore transcription services; (5) adjacent CDI vendors adding ambient features (M*Modal, nThrive);
              (6) general-purpose enterprise AI tools being repurposed for documentation; (7) new entrants such as
              Oracle Health's native AI, and (8) smaller boutique ambient AI vendors.

              The direct-vendor market is characterized by rapid growth, escalating venture capital, and convergent
              feature sets. Every major vendor supports ambient listening, auto-generated SOAP notes, and some form
              of EHR integration. Differentiation is therefore increasingly driven by depth of EHR embedding,
              clinical accuracy in complex subspecialties, language breadth, evidence traceability, and regulatory
              positioning. Abridge holds the KLAS Best in KLAS designation for ambient AI for 2025 and 2026 and is
              the only vendor natively embedded inside Epic's Haiku mobile and Hyperdrive desktop applications. By
              contrast, even Microsoft's Nuance DAX—though sold through Epic's App Orchard and tightly integrated—
              operates as a separate application layer, not a native system function. This architectural distinction
              matters to health system CIOs because native embedding eliminates a separate login, a separate
              consent workflow, and a separate data-handling agreement.

              The status-quo competitor—human medical scribes—remains a powerful force. Approximately 100,000
              medical scribes are employed in the U.S. at $35,000–$60,000 per physician equivalent per year. Most
              health systems adopting ambient AI cite scribe cost displacement as the primary financial justification.
              The per-seat pricing for ambient AI ($3,000–$8,000/year) offers a compelling ROI versus scribes even
              before accounting for physician time savings.
            claimRefs:
              - CP001
              - CP002
              - CP040
              - CP041
              - CP042
              - CP044
      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: |
              NUANCE DAX (Microsoft): The market's incumbent leader. Microsoft acquired Nuance Communications for
              $19.7 billion in 2022, inheriting Dragon Medical—the dominant clinical speech recognition product
              serving 600,000+ clinicians globally. DAX Copilot, launched with general availability in Epic in
              February 2024, added ambient AI note generation powered by Azure OpenAI (GPT-4). By mid-2024 DAX
              Copilot was deployed in 400+ healthcare organizations, with 150+ on Epic and 200+ on MEDITECH
              Expanse. Clinicians report a 50% reduction in documentation time, approximately seven minutes saved
              per encounter. Microsoft's distribution leverage—direct sales to the same C-suite buying Azure cloud
              services—is the primary moat. Nuance supports 30+ specialties. Pricing is generally enterprise-
              negotiated and not publicly disclosed, but industry observers estimate it is competitive with or
              slightly below Abridge given Microsoft's desire to gain market share using Azure bundling.

              SUKI: Founded 2017, headquartered in Redwood City, California. Total funding approximately $165M
              as of end-2024, with a $70M Series D in October 2024 led by Hedosophia. Post-money valuation
              approximately $500M. Suki is deployed in 300+ health systems and clinics. Its differentiation is
              breadth of EHR integration—Epic, Oracle Cerner, MEDITECH, and Athenahealth—targeting smaller and
              mid-market health systems that are not exclusively Epic shops. Suki also offers the Suki Platform
              as a developer API for third-party builders. Clinician adoption data shows up to 72% documentation
              speed improvement. Suki is expanding into nursing documentation and coding assist.

              AMBIENCE HEALTHCARE: Founded 2023, headquartered in San Francisco. Raised $243M Series C in July
              2025 (co-led by Oak HC/FT and Andreessen Horowitz), bringing total funding to $345M and valuation
              to $1.25B. Backers include OpenAI Startup Fund and Kleiner Perkins. Ambience is deployed at 40+
              major health systems including Cleveland Clinic (five-year exclusive agreement), UCSF Health, and
              Houston Methodist. It claims support for 100+ subspecialties and is the first ambient AI vendor to
              publish third-party validated, CFO-approved ROI tied to coding accuracy improvements. KLAS customer
              satisfaction score of 97.7 as of 2025. Not yet publicly confirmed on Epic native embed.

              DEEPSCRIBE: San Francisco-based; $60M in total funding. Best known for its July 2024 enterprise
              agreement with Ochsner Health covering 4,700 employed and affiliated clinicians, 46 hospitals, and
              370+ health and urgent care centers—one of the largest ambient AI deployments by clinician count in
              the U.S. DeepScribe's differentiator is its Customization Studio, which allows specialty-specific
              workflow tuning without engineering involvement. Ochsner reported a 75% clinician adoption rate
              during initial rollout. Documentation time dropped from 2–3 hours to approximately 3–4 minutes per
              note. Epic-integrated.

              NABLA: Founded 2018, Paris, France. Total funding $120M after a $70M Series C in June 2025 led by
              HV Capital. Serves 130+ healthcare organizations, 85,000 clinicians, and manages approximately
              20 million annual encounters in 35 languages. Notable US customers include CVS Health and Children's
              Hospital Los Angeles. Nabla is expanding from documentation into agentic AI workflows—ambient
              listening, clinical coding, EHR command actions—positioning itself as a broader clinical AI platform.
              Its multilingual depth (35 languages vs Abridge's 28+) is a competitive differentiator for
              safety-net hospitals serving diverse populations.

              AWS HEALTHSCRIBE: Amazon Web Services launched HealthScribe in July 2023 as a HIPAA-eligible API
              service built on Amazon Bedrock. It targets healthcare software vendors and developers building
              ambient documentation applications, not direct health system buyers. It outputs structured notes,
              transcripts, and extracted clinical entities with traceability back to the source transcript.
              HealthScribe does not use customer data for model training. Initial specialty support covered general
              medicine and orthopedics. It represents a commoditization floor—any vendor can build a basic ambient
              scribe on top of HealthScribe, compressing differentiation toward workflow integration and EHR depth.
