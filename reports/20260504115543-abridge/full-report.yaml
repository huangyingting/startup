  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
      - Priority
    rows:
      - - Recognized vs. Contracted Revenue
        - GAAP recognized revenue not disclosed; only $117M contracted ARR is public
        - >-
          True ARR multiple may be 60-75x if recognized revenue is 60-75% of contracted; could shift recommendation to
          avoid
        - >-
          Request audited financial statements or Series E investor data room access; compare with SaaS cohort ramp
          disclosure
        - Blocking
      - - Cap Table and Preference Overhang
        - Liquidation preference stack across five preferred rounds undisclosed; common vs. preferred breakdown unknown
        - In a sub-$5.3B exit, preference stack could impair common shareholder returns to near zero
        - >-
          Request full cap table with per-round preference terms from Series B onward; confirm 1x vs. 2x participating
          preferred
        - Blocking
      - - Net Revenue Retention Rate
        - NRR by cohort not publicly reported; expansion revenue from existing health systems unknown
        - >-
          NRR >120% at scale justifies current premium; NRR below 100% signals churn or pricing pressure and erodes 45x
          justification
        - Request cohort expansion ARR data from 2022-2025; verify UPMC and Kaiser ramp-to-full-utilization timelines
        - Material
      - - Monthly Burn Rate and Runway
        - Operating cash burn not disclosed despite $757M total equity raised over five rounds
        - >-
          Burn rate determines urgency of IPO timeline and risk of dilutive forced round; high burn compresses return
          window
        - >-
          Request burn rate vs. ARR ratio and runway from current cash position; compare to $757M gross raised to
          estimate net cash
        - Material
      - - Epic Partnership Economics and Exclusivity
        - Revenue share terms, exclusivity window, and change-in-control provisions not disclosed
        - >-
          Epic can build native competing product; partnership terms govern durability of Abridge's primary distribution
          advantage
        - Review partnership agreement for exclusivity window, renewal terms, and revenue-share provisions
        - Material
      - - Independent Clinical Efficacy Audit
        - >-
          No independent third-party audit of Abridge's published AI accuracy claims across all supported specialties
          and languages
        - >-
          Overstatement of clinical accuracy could trigger regulatory enforcement or class-action exposure similar to
          Sharp Healthcare lawsuit
        - >-
          Commission an independent NPJ or JAMA-standard clinical accuracy audit across at least three major health
          system deployments
        - Minor
    notes: >-
      Blocking items prevent a buy recommendation until resolved. Material items would influence entry price and
      scenario weighting. Minor items provide additional diligence depth but would not change the research-more rating
      absent other positive shifts.
