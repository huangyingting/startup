callouts:
  - calloutType: strength
    title: Abridge Is the Only Ambient AI Vendor with Native Epic Embedding
    body: |
      The "Abridge Inside" program—embedding Abridge natively in Epic Haiku and Hyperdrive—is the most
      defensible competitive advantage in the category. No other vendor, including Nuance DAX, operates
      as a native Epic system function rather than an application overlay. This creates a procurement
      advantage (no separate application to deploy), a user-experience advantage (no separate login or
      consent workflow), and a switching-cost advantage (displacement requires migrating away from a
      native EHR function).
    claimRefs:
      - C111
      - C110
      - C074
  - calloutType: risk
    title: Epic Native AI Is the Existential Long-Term Displacement Threat
    body: |
      Epic's 35%+ hospital market share and Cosmos data network give it structural leverage to absorb
      ambient documentation as a zero-marginal-cost core function. If Epic releases a satisfactory native
      solution included in existing licensing, the addressable market for third-party ambient AI at Epic
      health systems contracts sharply. The "Abridge Inside" partnership mitigates but does not eliminate
      this risk—it can be renegotiated or terminated.
    claimRefs:
      - C106
      - C107
      - C108
      - C109
      - C119
  - calloutType: risk
    title: Microsoft Azure Bundling Is a Structural Distribution Threat
    body: |
      Microsoft's ability to bundle Nuance DAX Copilot into existing Azure enterprise agreements gives it
      a sales motion that Abridge cannot replicate. A health system already purchasing $20M+ in Azure
      services may accept DAX at a significant discount or as an included feature, making a quality-based
      comparison with Abridge secondary to procurement economics.
    claimRefs:
      - C073
      - C076
      - C071
  - calloutType: insight
    title: Commoditization Is Accelerating; Differentiation Must Shift Upstream
    body: |
      With AWS HealthScribe providing a programmable foundation and multiple well-funded vendors converging
      on similar ambient note-generation features, the documentation layer is becoming a commodity. Vendors
      that survive the next three years will be those that expand into adjacent value—clinical coding,
      prior authorization, revenue cycle—not those that compete on note-generation quality alone. Abridge's
      coding assist roadmap and Linked Evidence are directionally correct, but execution speed matters.
    claimRefs:
      - C102
      - C103
      - C115
      - C101
