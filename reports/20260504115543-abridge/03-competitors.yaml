    approximationNotes: |
      Axis scores are evidence-based ordinal estimates (0–10 scale) derived from KLAS ratings, vendor
      documentation, deployment case studies, and press releases. They are not statistically derived.
      EHR integration depth reflects: whether the vendor has native Epic embedding (9–10), a structured
      Epic App Orchard integration (6–8), or an API-only approach (1–3). Clinical AI capability reflects:
      specialty breadth, KLAS scores, accuracy benchmarks, evidence traceability, and language support.
