    title: Competitive Durability KPIs
    type: kpi
    layout: standard
    summary: |
      Seven-item scorecard assessing Abridge's competitive position durability across the dimensions most
      relevant to a health system buyer or investor making a 3–5 year commitment. Scores are 0–10 ordinal
      based on the evidence in this chapter. Abridge scores highest on Epic integration and clinical
      validation, with moderate scores on distribution scale and commercial moat durability.
