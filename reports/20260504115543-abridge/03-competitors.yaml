figures:
  - id: F301
    title: Competitive Positioning Map
    type: quadrant
    layout: wide
    summary: |
      Plots eight competitor classes on EHR integration depth (x-axis, 0–10 ordinal) versus clinical AI
      capability and accuracy (y-axis, 0–10 ordinal). Abridge occupies the upper-right quadrant with
      scores of 9/9, uniquely combining the deepest Epic native embedding with best-in-class clinical AI
      quality. Nuance DAX clusters nearby at 9/7, reflecting deep EHR coverage but a maturing AI stack
      relative to Abridge. Epic Native AI scores highest on integration (10) but lowest on AI capability
      (5) as its ambient AI features are still maturing. Human scribes score high on capability (8) but
      mid on EHR integration (5) as they enter notes manually. All scores are evidence-based ordinal
      estimates; see approximationNotes.
    data:
      xAxis:
        label: EHR Integration Depth (0 = API only, 10 = native embedded)
        min: 0
        max: 10
      yAxis:
        label: Clinical AI Capability and Accuracy (0 = basic, 10 = best-in-class)
        min: 0
        max: 10
      points:
        - label: Abridge
          x: 9
          'y': 9
          tone: positive
        - label: Nuance DAX (Microsoft)
          x: 9
          'y': 7
          tone: neutral
        - label: Suki
          x: 7
          'y': 7
          tone: neutral
        - label: Ambience Healthcare
          x: 6
          'y': 8
