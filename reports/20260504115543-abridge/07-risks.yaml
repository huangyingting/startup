  - id: ethical-reputational
    title: Ethical and Reputational Risks
    body: |
      Ambient AI documentation raises fundamental ethical questions about patient autonomy,
      informed consent, and the role of automated systems in healthcare. The Sharp/Abridge
      lawsuit's most alarming allegation — that consent notes in EHRs were falsely marked
      as obtained — if proven, would represent a systemic integrity failure with ramifications
      far beyond legal liability. Public trust in ambient AI documentation is nascent and
      fragile: media coverage of consent failures amplifies patient anxiety about recording,
      and health systems facing reputational pressure may reduce ambient AI deployment even
      without legal compulsion.

      Clinician over-reliance risk is rising. As ambient AI notes become the default documentation
      modality, clinicians may reduce their verification of AI-generated content, allowing errors
      to propagate into patient records without correction. Regulatory and professional bodies
      including the White House AI Bill of Rights framework identify this dynamic as a high-impact
      risk in healthcare settings. Bias in AI documentation — producing shorter, less complete
      notes for non-English-speaking and underrepresented patient populations — raises equity
      concerns that could trigger civil rights enforcement under OCR's Section 1557 authority
      in addition to reputational damage. The company's ability to maintain clinical credibility
      while growing at enterprise scale will depend on its commitment to independent bias auditing
      and transparent error reporting.
    claimRefs:
      - CR030
      - CR031
      - CR032
      - CR033
      - CR018
      - CR007
  - id: mitigation-kill-criteria
    title: Mitigation Measures and Thesis-Break Criteria
    body: |
      Abridge's existing risk mitigations include SOC 2 Type II certification, HIPAA BAA
      infrastructure with all health system customers, encryption of audio in transit and at
      rest, model card publication with bias evaluation disclosures, and a regulatory affairs
      function monitoring FDA SaMD developments. The company's academic foundation and CEO
      Shiv Rao's clinical credentials provide reputational credibility that partially offsets
      legal exposure. However, several critical mitigation gaps exist: no independent consent
      workflow audit has been conducted or disclosed; FDA SaMD classification exposure is
      unresolved; cloud infrastructure resilience is undocumented; and the financial cushion
      against protracted litigation is unknown.

      The thesis-break framework identifies five event types that would materially impair the
      investment thesis: an adverse court judgment exceeding $100M in consent litigation; an
      FDA SaMD classification requiring premarket review for the core product; Epic terminating
      the Abridge Inside partnership; ARR growth falling below 50% year-over-year; or CEO
      Shiv Rao departing without a named clinical-technical successor. Each of these events
      would require a fundamental re-evaluation of the investment premise. Investors should
      establish monitoring protocols for early warning signals: litigation docket updates,
      FDA guidance publications on ambient AI classification, Epic product announcements,
      quarterly ARR disclosures, and leadership changes. Cybersecurity incidents targeting
      healthcare AI vendors are increasing in frequency and sophistication, and Abridge's
      posture against nation-state or sophisticated ransomware threats is not publicly documented.
    claimRefs:
      - CR020
      - CR026
      - CR028
      - CR032
      - CR039
