  - id: revenue-arr-analysis
    title: Revenue Estimation and ARR Multiple Analysis
    body: |
      Abridge's $117M contracted ARR as of Q1 2025 was disclosed in reporting by Sacra and Modern
      Healthcare and represents signed recurring contracts, not GAAP recognized revenue. The
      distinction is material: enterprise health system contracts typically have ramp schedules of
      six to eighteen months as clinicians onboard, meaning recognized revenue may be 40-70% of
      contracted ARR at any given time. Abridge has not separately disclosed its GAAP revenue,
      preventing precise multiple calculation. A conservative assumption — recognized revenue of
      60-75% of contracted ARR — implies approximately $70M-$88M in GAAP ARR, lifting the implied
      multiple to 60-75x, which is extreme by any benchmark.

      A bottom-up estimate corroborates the contracted ARR figure: 150 health systems at an average
      contract value of $500K-$1M per year yields $75M-$150M in annual run-rate billings, bracketing
      the $117M disclosed figure. Per-clinician pricing across the sector is documented at
      $2,800-$5,000 per provider per year, and enterprise health systems deploying ambient AI at
      scale (2,000-5,000 clinicians per large IDN) imply per-system revenue of $5.6M-$25M at full
      deployment — suggesting significant upside as deployments ramp.

      The $5.3B / $117M contracted ARR = 45x multiple is the key valuation signal. Comparable
      reference points: Nuance acquisition at 13x trailing revenue; Tempus AI IPO at 11x TTM
      revenue; Doximity peak at approximately 100x ARR at IPO (2021, amid frothy conditions) later
      compressing to 7x; Ambience Healthcare Series C at approximately 33x ARR. The 45x multiple
      is achievable only if Abridge sustains ARR growth at or above 100% annually while maintaining
      NRR above 120%. If growth decelerates to 50% annually (still elite-tier SaaS growth),
      the implied sustainable multiple at IPO compresses to approximately 20-25x, which at $117M
      base ARR implies only a $2.3B-$2.9B exit valuation — representing a 43-57% decline from
      Series E. SaaS Capital's 2025 benchmark shows that private healthcare SaaS commands 7-10x ARR
      in M&A transactions, putting a strategic floor at $820M-$1.17B at current ARR — well below
      Series E pricing without sustained hypergrowth.
