  - id: comparable-analysis
    title: Comparable Company and Transaction Analysis
    body: |
      Public healthcare SaaS companies provide the most transparent valuation benchmarks. Veeva
      Systems (VEEV), the leading vertical SaaS for life sciences, traded at approximately 6.5x
      EV/Revenue in FY2025 on $2.75B revenue — representing one of the most premium valuations
      among healthcare SaaS given its high retention, cross-sell trajectory, and durable moat.
      Doximity (DOCS), a high-margin healthcare professional network, traded at approximately 7x
      EV/Revenue with EBITDA margins above 40%, reflecting profitability and moderate growth.
      Phreesia (PHR), an enterprise patient intake and payment platform, traded at 6-8x revenue,
      consistent with unprofitable-but-growing enterprise SaaS. The public market thus prices
      disciplined, high-retention, moderately growing healthcare SaaS at 6-8x revenue — Abridge
      is priced at 45x contracted ARR, representing a 6-7x premium that must be earned via
      demonstrated hypergrowth.

      The Nuance acquisition by Microsoft provides the most relevant M&A comparable: $19.7B for
      $1.48B revenue (FY2020), approximately 13x trailing revenue. Nuance was the incumbent
      healthcare AI voice and clinical documentation platform — precisely the category Abridge
      targets. The 13x acquisition multiple for a scaled, mature incumbent suggests that Abridge's
      current 45x multiple embeds a premium for growth optionality that Nuance had already
      exhausted. Tempus AI's June 2024 IPO at approximately $6.1B on $562M TTM revenue (~11x)
      established a data point for healthcare AI public market pricing — and even Tempus priced
      its IPO at a 38% discount to its prior private peak valuation, as documented by PitchBook.

      Private round comparables are fewer but instructive. Ambience Healthcare, a direct ambient
      AI scribe competitor, raised at approximately 33x ARR in its July 2025 Series C ($1B+
      valuation on $30M ARR), validating that the sector commands premium multiples but also that
      multiples at Abridge's scale ($117M ARR) are higher than at Ambience's scale. The adverse
      comparable is Olive AI: nearly $900M raised at a $4B peak valuation, followed by strategic
      misfires, product execution failure, and shutdown in October 2023. While Abridge's product
      efficacy track record is superior to Olive AI's, the cautionary lesson holds — healthcare AI
      companies can collapse rapidly when growth stalls and capital markets contract simultaneously.
