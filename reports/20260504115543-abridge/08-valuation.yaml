  - id: scenarios-exit
    title: Scenario Analysis, Exit Pathways, and Final Diligence
    body: |
      The bear scenario (20% probability) projects $60-75M ARR by 2028, driven by Epic's native
      ambient scribe capturing more than 30% of the enterprise market and slowing Abridge's growth
      to zero or slightly negative net new ARR. At 6-8x ARR, the exit valuation would be
      $360M-$600M — representing a loss of more than 90% relative to the Series E price. This
      scenario requires a down-round or distressed sale and is most likely triggered by a combination
      of Epic exclusivity changes, consent law litigation settlements exceeding $50M, and adverse
      FDA SaMD classification rulings.

      The base scenario (55% probability) projects $250-350M ARR by 2028, reflecting
      maintained Epic partnership, successful ramp of UPMC/Kaiser/Mayo deployments to full
      productive capacity, and modest traction in AI coding and RCM expansion. At 12-15x ARR
      (consistent with a growth-stage healthcare AI premium over public SaaS but below current
      private multiple), the implied exit is $3B-$5.25B — roughly flat to the Series E price.
      This is not a return-generating outcome for Series E primary investors; a successful IPO
      at these levels would represent a distribution of capital rather than a gain.

      The bull scenario (25% probability) projects $500-700M ARR by 2028, underpinned by
      platform domination of ambient documentation plus successful launch of AI medical coding
      and RCM automation that adds 2-3x more revenue per existing customer. At 15-20x ARR,
      the implied valuation is $7.5B-$14B, representing a 40-165% return from Series E for
      primary investors. This outcome requires sustained >80% ARR growth and successful platform
      execution in entirely new product categories, both of which carry material execution risk.
      Standard VC return models targeting 3-5x from a Series E entry imply investors expect an
      exit at $16B-$26B, achievable only in the most optimistic bull scenarios.

      Exit pathways include an IPO targeting 2027-2028 (no formal announcement made as of
      mid-2026) and a strategic acquisition by Microsoft (Nuance DAX synergy), Epic Systems
      (eliminating the ambient AI competitive threat), Oracle/Cerner, or a payer conglomerate.
      M&A at SaaS Capital's documented 7-10x private transaction multiple would yield only
      $819M-$1.17B at current ARR, well below the $5.3B entry price. Three blocking diligence
      items must be resolved before any buy recommendation: (1) GAAP recognized revenue to
      confirm true ARR multiple; (2) full cap table with liquidation preference terms from all
      preferred rounds; (3) net revenue retention data by cohort to confirm expansion trajectory.
