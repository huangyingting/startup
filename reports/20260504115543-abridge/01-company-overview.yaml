company:
  name: Abridge
chapter:
  number: 1
  title: Company Overview
  summary: |
    Abridge is a Pittsburgh-founded, San Francisco-headquartered generative AI company that transforms
    clinical conversations into structured medical notes in real time. Founded in 2018 by Dr. Shiv Rao
    (a practicing cardiologist) and three Carnegie Mellon researchers, the company has grown from a free
    consumer app into the leading enterprise ambient AI documentation platform for U.S. health systems.
    As of February 2025 Abridge closed a $250 million Series D at a ~$2.75 billion valuation, then
    doubled that to $5.3 billion in June 2025 with a $300 million Series E led by Andreessen Horowitz.
    Total disclosed funding stands at approximately $757 million across six rounds. The platform is
    deployed at more than 150 major health systems, supports 28+ languages and 50+ specialties, and is
    deeply integrated with Epic EHR.
sections:
  - id: s1
    title: Identity and Business Model
    body: |
      Abridge AI, Inc. was incorporated in 2018 and is headquartered operationally in Pittsburgh,
      Pennsylvania—with its latest press releases issued from San Francisco—reflecting the company's
      dual roots in academic medicine and Silicon Valley venture capital. The company's one-line
      description: an enterprise-grade generative AI platform that converts physician-patient
      conversations into clinically useful and billing-ready medical notes at the point of care.

      The core product uses proprietary large language models (LLMs) fine-tuned on more than 1.5 million
      de-identified clinical encounters. Audio is captured via a microphone (mobile device or desktop),
      processed through Abridge's purpose-built speech recognition engine, and a structured SOAP or
      specialty-specific note is surfaced inside the clinician's EHR within roughly one minute of the
      encounter ending. The "Linked Evidence" feature maps every AI-generated sentence back to the
      segment of the recorded transcript that supports it, giving clinicians a fast audit trail.

      Revenue is generated through enterprise SaaS contracts with health systems; pricing is structured
      per-seat (per-clinician) or per-deployment. The company does not currently offer a direct-to-
      consumer subscription. Key partnerships include Epic Systems (the dominant U.S. EHR vendor), where
      Abridge is embedded natively via the "Abridge Inside" program from mobile (Haiku) to desktop
      (Hyperdrive). This deep EHR integration is cited by health systems as a primary adoption driver.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
  - id: s2
    title: Founders and Leadership
    body: |
      Abridge was co-founded by four individuals whose backgrounds span clinical medicine, speech AI,
      and machine learning. Dr. Shivdev (Shiv) Rao, MD, is CEO and the public face of the company. He
      is a practicing cardiologist at UPMC, received his undergraduate degree from Carnegie Mellon
      University, and held executive roles at UPMC Enterprises (the health system's venture arm) before
      founding Abridge. His dual identity as clinician and technologist is consistently cited as a
      differentiation factor in product design.

      Zachary Lipton, PhD, is CTO and Co-Founder. An Associate Professor at Carnegie Mellon's Tepper
      School and a widely-cited AI researcher known for responsible AI work, he leads Abridge's core
      research and engineering. Sandeep Konam (Co-Founder) holds a Master's in Robotics from CMU and
      led early machine-learning architecture. Florian Metze, PhD, (Co-Founder) was a Research Professor
      at CMU's Language Technologies Institute specializing in speech recognition before joining Abridge.

      The executive team has since been supplemented by Julia Chou (COO), Brian Wilson (Chief Commercial
      Officer), Sagar Sanghvi (CFO), and Tim Hwang (General Counsel). The company has approximately 22
      publicly listed executives spanning enterprise development, sales, HR, product, and engineering.
      Key-person risk is concentrated in Dr. Shiv Rao, whose physician credibility underpins clinician
      trust and whose departure would represent a material adverse event for the brand.
    claimRefs:
      - C006
      - C007
      - C008
      - C009
      - C010
      - C011
  - id: s3
    title: Funding History and Capital Formation
    body: |
      Abridge has raised approximately $757 million across six disclosed rounds between 2019 and June
      2025, ascending from seed to unicorn status in roughly six years. The company's capital trajectory
      tracks its product maturity and enterprise adoption curve.

      The $5 million seed round (2019, led by Union Square Ventures) funded the initial consumer
      mobile app and proprietary clinical speech dataset. A Series A and A-1 total of approximately
      $22.5 million (closing in 2022 with Wittington Ventures leading A-1) funded the pivot to
      enterprise documentation. The $30 million Series B (October 2023, Spark Capital and Bessemer
      Venture Partners) validated early health system adoption. The $150 million Series C (February
      2024, Lightspeed Venture Partners leading, valuation ~$850 million) was one of the largest
      generative AI healthcare rounds at the time.

      The $250 million Series D (February 17, 2025, co-led by Elad Gil and IVP; valuation ~$2.75 billion)
      arrived as Abridge surpassed 100 health system deployments. Investors in the Series D included
      Bessemer, CapitalG (Google's growth fund), CVS Health Ventures, NVentures (NVIDIA), Lightspeed,
      Redpoint, Spark Capital, California Health Care Foundation, K. Ventures, and SV Angel.

      Four months later, in June 2025, Abridge closed a $300 million Series E at a $5.3 billion
      valuation, led by Andreessen Horowitz and Khosla Ventures. The rapid valuation doubling in
      four months—from $2.75 billion to $5.3 billion—was widely reported as evidence of accelerating
      enterprise momentum.

      No public debt, credit facility, or secondary transaction details have been disclosed.
    claimRefs:
      - C012
      - C013
      - C014
      - C015
      - C016
      - C017
      - C018
      - C019
  - id: s4
    title: Scale and Key Metrics
    body: |
      At the time of the Series D announcement (February 2025), Abridge was deployed at more than 100
      of the largest and most complex health systems in the United States, including recent enterprise-
      wide implementations at Duke Health, Johns Hopkins Medicine, Mayo Clinic, and UNC Health. By
      mid-2026, the company's press materials and customer pages describe more than 150 health system
      deployments.

      The platform supports 28+ languages, 50+ clinical specialties, and care settings ranging from
      outpatient to emergency department to inpatient. UPMC, one of the company's anchor customers
      and early investors, announced in October 2025 that it was scaling Abridge enterprise-wide to
      more than 12,000 clinicians as part of its Epic EHR unification. Abridge has received multiple
      industry recognitions including Best in KLAS for Ambient AI (2025 and 2026), TIME Best
      Inventions (2024 and 2025 for Abridge for Nurses), Forbes AI 50 (2024), and Fast Company
      Most Innovative Companies of 2026. Revenue, ARR, and headcount are not publicly disclosed.
    claimRefs:
      - C020
      - C021
      - C022
      - C023
      - C024
      - C025
  - id: s5
    title: Adverse Events and Risk Flags
    body: |
      In December 2025, a proposed class action lawsuit was filed against San Diego-based Sharp
      Healthcare alleging that a patient's visit was recorded using Abridge without his knowledge or
      consent, in violation of California's two-party consent requirement under the Invasion of Privacy
      Act. The complaint also alleged that Abridge automatically inserted incorrect statements into
      medical charts asserting patient consent had been obtained when, according to the patient, it had
      not. The suit is against Sharp Healthcare (as deploying institution) and names Abridge as the
      underlying technology provider.

      Similar allegations have emerged against other health systems using ambient AI tools, representing
      a systemic liability risk for the ambient documentation sector. The core legal question is whether
      informed consent was adequately obtained by deploying health systems, and whether AI-generated
      consent statements that may not reflect actual patient interactions create regulatory and civil
      liability. Abridge has not been directly named as a defendant in the Sharp filing per publicly
      available reporting.

      There is no publicly disclosed evidence of leadership churn, material financial restatements,
      sanctions, export-control violations, or product recalls as of the report date.
    claimRefs:
      - C026
      - C027
      - C028
