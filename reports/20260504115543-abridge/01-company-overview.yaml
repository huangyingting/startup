callouts:
  - calloutType: strength
    title: Clinical Founder Credibility Drives Trust
    body: |
      Shiv Rao's dual identity as a practicing cardiologist and AI entrepreneur is a material
      differentiator. Health system CIOs and CMIOs consistently cite clinician-led product design
      as a primary reason for selecting Abridge over competitors. This credibility is difficult to
      replicate and creates organic reference-selling within clinical networks.
    claimRefs:
      - C006
      - C007
  - calloutType: strength
    title: Epic Native Integration Creates Defensible Distribution
    body: |
      Abridge Inside—embedded natively in Epic Haiku (mobile) and Hyperdrive (desktop)—eliminates
      the workflow friction that kills clinical AI adoption. Epic's installed base covers roughly
      70% of U.S. hospitals and 89% of U.S. patients have records in an Epic system. Being the
      preferred ambient AI partner inside Epic is an extraordinarily powerful distribution moat.
    claimRefs:
      - C003
      - C004
      - C005
  - calloutType: risk
    title: Patient Consent Lawsuit Signals Sector-Wide Liability Exposure
    body: |
      The December 2025 Sharp Healthcare lawsuit highlights that ambient recording without
      explicit patient consent—potentially compounded by AI-generated consent statements inserted
      into charts—creates both regulatory and civil liability for the health systems deploying
      Abridge and, potentially, for Abridge itself. California's two-party consent law is a high-
      water mark, but similar cases in other jurisdictions are plausible. This is a material risk
      that could constrain adoption velocity if it generates sector-wide regulatory scrutiny.
    claimRefs:
      - C026
      - C027
      - C028
  - calloutType: insight
    title: Valuation Doubled in Four Months
    body: |
      The acceleration from a $2.75 billion Series D in February 2025 to a $5.3 billion Series E
      in June 2025—a doubling in just four months—is an extraordinary signal of investor demand.
      It also raises the bar for the company's next liquidity event and could indicate that late-
      stage investors are pricing in highly optimistic scenarios for revenue growth and market
      expansion that the current public evidence base cannot fully support.
    claimRefs:
      - C017
      - C018
