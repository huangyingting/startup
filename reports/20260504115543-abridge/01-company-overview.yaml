  - id: s4
    title: Scale and Key Metrics
    body: |
      At the time of the Series D announcement (February 2025), Abridge was deployed at more than 100
      of the largest and most complex health systems in the United States, including recent enterprise-
      wide implementations at Duke Health, Johns Hopkins Medicine, Mayo Clinic, and UNC Health. By
      mid-2026, the company's press materials and customer pages describe more than 150 health system
      deployments.

      The platform supports 28+ languages, 50+ clinical specialties, and care settings ranging from
      outpatient to emergency department to inpatient. UPMC, one of the company's anchor customers
      and early investors, announced in October 2025 that it was scaling Abridge enterprise-wide to
      more than 12,000 clinicians as part of its Epic EHR unification. Abridge has received multiple
      industry recognitions including Best in KLAS for Ambient AI (2025 and 2026), TIME Best
      Inventions (2024 and 2025 for Abridge for Nurses), Forbes AI 50 (2024), and Fast Company
      Most Innovative Companies of 2026. Revenue, ARR, and headcount are not publicly disclosed.
    claimRefs:
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
    figureRefs:
      - FO003
  - id: s5
    title: Adverse Events and Risk Flags
    body: |
      In December 2025, a proposed class action lawsuit was filed against San Diego-based Sharp
      Healthcare alleging that a patient's visit was recorded using Abridge without his knowledge or
      consent, in violation of California's two-party consent requirement under the Invasion of Privacy
      Act. The complaint also alleged that Abridge automatically inserted incorrect statements into
      medical charts asserting patient consent had been obtained when, according to the patient, it had
      not. The suit is against Sharp Healthcare (as deploying institution) and names Abridge as the
      underlying technology provider.

      Similar allegations have emerged against other health systems using ambient AI tools, representing
      a systemic liability risk for the ambient documentation sector. The core legal question is whether
      informed consent was adequately obtained by deploying health systems, and whether AI-generated
      consent statements that may not reflect actual patient interactions create regulatory and civil
      liability. Abridge has not been directly named as a defendant in the Sharp filing per publicly
      available reporting.

      There is no publicly disclosed evidence of leadership churn, material financial restatements,
      sanctions, export-control violations, or product recalls as of the report date.
    claimRefs:
      - CO026
      - CO027
      - CO028
