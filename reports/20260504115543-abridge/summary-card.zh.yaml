summary:
  headline: >
    Abridge 已经在医疗 AI 增长最快的细分赛道跑出了顶级产品市场匹配，背后有一线投资人，也有独特的 Epic 分发护城河。$5.3B 的 Series E
    估值已经计入激进增长和市场扩张，但已确认收入还没有支撑到这一点。患者同意诉讼和 Epic 自身 AI 路线图都是实质风险。对老股东，继续持有有吸引力；新投资人若按当前估值进入，应先拿到收入透明度。
