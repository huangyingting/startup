  - id: S604
    title: Customer Concentration, Retention, and Expansion Signals
    body: |
      Customer concentration risk is material and largely unquantifiable without private ARR
      data. UPMC's 12,000-clinician enterprise deployment at an estimated $2,500 per clinician
      per year implies approximately $30 million in annual contract value. If Abridge's total
      ARR is $100-117 million (Sacra estimate), UPMC alone could represent 25-30% of total
      revenue. No other named customer has disclosed clinician seat counts of comparable scale
      in a single contract, though Kaiser Permanente's 24,000+ physician deployment at full
      rollout could represent even greater potential contract value.

      Expansion signals are evident in the announced contract scope of named deployments. The
      Highmark/AHN partnership extends Abridge beyond documentation into real-time prior
      authorization — a new revenue stream. Mayo Clinic's expansion includes nursing documentation
      as well as physician documentation. UPMC's October 2025 enterprise-wide scale announcement
      followed an earlier, narrower deployment, demonstrating classic land-and-expand dynamics.

      No public evidence of customer churn, contract non-renewal, or active deployment cancellation
      exists as of the report date. However, this absence of adverse data is expected for a
      pre-IPO private company with no obligation to disclose customer losses. The December 2025
      Sharp Healthcare lawsuit represents a deployment-level adverse event but not a confirmed
      customer departure. HCA Healthcare — one of the largest U.S. health systems — is a confirmed
      competitive loss, having selected Commure (which acquired Augmedix) for its ambient AI program
      rather than Abridge. This represents the most significant publicly confirmed competitive loss
      in the Abridge customer record.

      Net revenue retention (NRR) is entirely private. The pattern of enterprises expanding seat
      count (UPMC, Mayo, Northwell) and scope (Highmark adding prior auth) is consistent with
      strong NRR, but this cannot be confirmed from public sources.
