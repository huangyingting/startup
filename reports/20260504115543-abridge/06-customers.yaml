            Orchard marketplace, clinician peer referral, or sales outreach; KLAS ranking drives inbound
        - label: Pilot
          detail: >-
            3-6 month limited deployment in one specialty or department; outcomes tracked (documentation time, KLAS
            survey, clinician satisfaction); Epic Haiku/Hyperdrive integration enables low-friction rollout
