  - id: S602
    title: 'Named Deployments: Scale, Evidence, and Production Status'
    body: |
      Abridge's most significant publicly confirmed production deployments as of May 2026 are
      summarized below by scale and evidence quality.

      UPMC (University of Pittsburgh Medical Center) is Abridge's founding anchor. CEO Shiv Rao
      is a practicing UPMC cardiologist and the platform was incubated within UPMC. In October
      2025, UPMC announced enterprise-wide scaling to more than 12,000 clinicians across 40
      hospitals and 800+ outpatient sites supporting 44 specialties. UPMC Enterprises is both
      an early-round investor and the longest-tenured customer, providing the strongest evidence
      of production depth in the portfolio.

      Kaiser Permanente deployed Abridge to more than 24,000 physicians across 40 hospitals and
      600+ medical offices in August 2024 — described by Kaiser as the largest generative AI
      deployment in healthcare history at that date. Kaiser Permanente Ventures is also a Series
      B and C investor in Abridge, creating a strategic alignment that underpins the scale and
      speed of the deployment. Kaiser physicians reported 87% satisfaction with Abridge as the
      most significant workday improvement.

      Northwell Health (28 hospitals, 1,000+ outpatient facilities) announced system-wide deployment
      in October 2025, aiming to support more than 50 million medical conversations per year on
      the Abridge platform. Highmark Health and Allegheny Health Network (14 hospitals) announced
      an enterprise-wide partnership in August 2025 that uniquely includes a real-time prior
      authorization module — the first confirmed expansion of Abridge beyond documentation into
      revenue cycle intelligence at a named customer.

      Corewell Health (21 hospitals, 300+ sites, 4,000+ physicians) announced enterprise-wide
      deployment in December 2024, publishing detailed 90-day pilot outcomes. Mayo Clinic expanded
      enterprise-wide to 2,000 physicians in January 2025, building on prior nursing documentation
      pilots. Duke Health and Johns Hopkins Medicine both announced enterprise-wide implementations
      in early 2025 as part of Abridge's Series D announcement cohort.

      Yale New Haven Health joined at the time of Abridge's Series C (February 2024), deploying
      to thousands of clinicians. Emory Healthcare was an early adopter in 2023, becoming one of
      the first large academic medical centers to go live with the Abridge Inside Epic integration.
