chapter:
  number: 6
  title: Customers
  summary: |
    Abridge's customer base has grown from a single anchor deployment at UPMC in 2022 to
    more than 200 health systems by late 2025, representing the fastest scaling trajectory
    in the ambient AI documentation sector. Named enterprise-wide deployments include Kaiser
    Permanente (24,000+ physicians), UPMC (12,000+ clinicians), Northwell Health (28 hospitals),
    Highmark Health/Allegheny Health Network (14 hospitals), Corewell Health (4,000+ physicians),
    Mayo Clinic (2,000 physicians), Duke Health, Johns Hopkins Medicine, Yale New Haven Health,
    and Emory Healthcare, among more than 200 total. Abridge has been named #1 Best in KLAS
    for Ambient AI in both 2025 and 2026 (score: 94.7/100), providing independent third-party
    validation of customer satisfaction. Documented clinical outcomes from Corewell Health's
    90-day pilot include a 48% reduction in after-hours documentation time, 90% of clinicians
    reporting greater patient attention, and 85% reporting increased work satisfaction. Kaiser
    Permanente reported 87% of physicians called Abridge the most significant improvement to
    their workday; Highmark/AHN reported 92% of patients felt providers were more attentive.
    The primary adverse event is a December 2025 class-action lawsuit against Sharp Healthcare
    alleging that Abridge was used to record 100,000+ patient visits without consent, with AI-
    generated consent statements falsely inserted into medical records. Customer concentration
    risk is material: UPMC's 12,000-clinician deployment implies ~$30M annual contract value,
    and no NRR or churn data is publicly disclosed. HCA Healthcare, one of the largest U.S.
    health systems, selected Commure (not Abridge) for its ambient AI program, the clearest
    publicly confirmed competitive loss on record.
sections:
  - id: S601
    title: Customer Portfolio Overview
    body: |
      Abridge's customer base consists exclusively of U.S. health systems as enterprise SaaS
      purchasers. There is no consumer subscription, payer-side revenue, or confirmed international
      deployment as of May 2026. The buyer in every known transaction is the health system
      (CIO/CMIO/CFO sign-off), the user is the individual clinician (physician, advanced practice
      provider, or nurse), and the beneficiary is the patient. Purchasing is driven through an
      enterprise sales motion, typically requiring a pilot phase followed by an enterprise contract.

      Abridge surpassed 100 health system deployments at its Series D announcement (February 2025),
      up from fewer than 30 at its Series C (February 2024). By October 2025, company press materials
      reference more than 200 health systems, and the KLAS 2026 report corroborates widespread
      deployment at scale. The customer portfolio spans academic medical centers, large integrated
      delivery networks (IDNs), and regional community health systems, with a concentration in
      Epic-running institutions due to the "Abridge Inside" native integration advantage.

      Strategic investor-customers — UPMC Enterprises, Kaiser Permanente Ventures — represent
      a distinctive category where health systems are both financial backers and production
      deployers. This dual relationship provides privileged reference-selling access and signals
      long-term commitment, but also introduces conflicts of interest that require diligence.
