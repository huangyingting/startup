  - id: S605
    title: 'Adverse Evidence: Sharp Healthcare Consent Lawsuit and Sector-Wide Risk'
    body: |
      In December 2025, plaintiff Jose Saucedo filed a proposed class-action lawsuit against
      Sharp HealthCare in San Diego, alleging that Abridge was deployed starting April 2025
      to record patient-clinician conversations in exam rooms without patient knowledge or
      consent, in violation of California's all-party consent law (Invasion of Privacy Act).
      The complaint further alleges that Abridge's platform automatically inserted false
      statements into medical records indicating that the patient had been "advised" and had
      "consented" to being recorded, when according to Saucedo no such conversation ever occurred.
      Audio files were transmitted to Abridge's cloud servers, which the complaint argues also
      violates the California Confidentiality of Medical Information Act (CMIA).

      The proposed class could encompass more than 100,000 Sharp patients whose visits were
      recorded during the relevant period. Sharp HealthCare and Abridge both declined to comment
      on the pending litigation per published reports. Abridge is named as the underlying
      technology provider but Sharp HealthCare is the primary defendant.

      Legal analysts have characterized the Sharp case as potentially the first major class
      action targeting hospital ambient AI documentation without robust consent procedures.
      Fisher Phillips, a national labor and employment law firm, identified six operational
      steps health systems must take in response to the case. The case does not appear to name
      Abridge as a direct defendant in the liability theory as of the report date, but the
      reputational and regulatory implications extend to Abridge's entire deployment base.

      The risk is systemic: California's all-party consent requirement represents the highest
      standard in U.S. state law, but patient consent frameworks for ambient AI recording are
      inconsistent across jurisdictions. As of mid-2026, no federal regulation specifically
      governs ambient AI clinical documentation consent, creating an ongoing compliance gap
      for deploying health systems and, indirectly, for Abridge.
