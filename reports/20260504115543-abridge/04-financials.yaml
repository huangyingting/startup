  - id: FI004
    title: Abridge Revenue Model Bridge
    type: flow
    layout: standard
    summary: >-
      How Abridge converts clinician-level activity into enterprise ARR and gross profit. The flow shows the
      per-clinician subscription mechanism, the enterprise contract aggregation, the ARR build-up, and the key COGS
      drivers that determine gross margin.
    data:
      nodes:
        - id: n1
          label: Enterprise Health System Buyer
          detail: >-
            CIO/CMIO signs enterprise contract; pays per-clinician annual subscription; 150+ health systems as of
            mid-2026
        - id: n2
          label: Per-Clinician Subscription (~$2,500/yr)
          detail: >-
            List price estimated at $2,500/yr per seat; enterprise volume discounts compress realized ASP; multi-year
            contracts typical
        - id: n3
          label: Annual Recurring Revenue (ARR)
          detail: >-
            Sacra estimate: ~$60M (2024); ~$117M contracted Q1 2025; driven by health system deployments and expansion
            (12,000+ clinicians at UPMC alone)
        - id: n4
          label: 'COGS: GPU Compute + Human QA + Support'
          detail: >-
            Real-time ASR and LLM inference requires GPU infrastructure; human QA review may still be in pipeline;
            customer success/implementation costs
        - id: n5
          label: Gross Profit (~60-75% margin, estimated)
          detail: >-
            Based on industry benchmarks for enterprise ambient AI SaaS at scale; improving as automation displaces
            human QA
        - id: n6
          label: R&D + G&A + S&M
          detail: Headcount-heavy operating expenses; AI/ML talent premium; enterprise sales motion with long 3-6 month cycles
      edges:
