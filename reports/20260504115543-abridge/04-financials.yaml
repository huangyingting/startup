company:
  name: Abridge
chapter:
  number: 4
  title: Financials
  summary: |
    Abridge is a high-growth enterprise SaaS company whose revenue model centers on per-clinician
    annual subscriptions sold to U.S. health systems. Third-party analyst estimates (Sacra) place
    2024 ARR at approximately $60 million, up roughly 900% from ~$6 million in 2023, with contracted
    ARR reaching ~$117 million by Q1 2025. Per-seat pricing is estimated at $2,500 per clinician per
    year (~$208/month), below Nuance DAX Copilot but well above commodity scribes. Two SEC Form D
    filings confirm equity issuances of $149,999,730 (March 2024, Series C) and $318,998,519
    (June 2025, Series E). Total disclosed equity raised stands at approximately $757 million across
    six rounds, with $550 million raised in the 16 months from February 2025 to June 2025. At the
    $5.3 billion Series E valuation, the implied ARR multiple is approximately 45-53x, far above
    typical healthcare SaaS M&A comparables of 6-8x, reflecting a speculative premium on the growth
    trajectory and market leadership. Revenue, gross margin, NRR, headcount, and burn rate are all
    private and unverifiable from public sources. Diligence blockers include the absence of audited
    financials, NRR data, and cash-on-hand disclosure.
sections:
  - id: s401
    title: Revenue Model, Pricing, and Public Traction
    body: |
      Abridge's revenue model is enterprise SaaS: health systems pay a per-clinician (per-seat) annual
      subscription for access to the ambient AI documentation platform. No consumer, per-transaction,
      payer, or pharma revenue stream is publicly documented. The enterprise pricing model is not
      published and requires negotiation through an enterprise sales team. Procurement is exclusively
      at the health system level; no individual or small-practice offering exists.

      Third-party vendor comparisons and analyst summaries consistently estimate Abridge's per-clinician
      list pricing at approximately $2,500 per year (~$208/month), with a reported range of $2,500 to
      $7,200 per clinician per year depending on volume, contract length, and implementation scope.
      This positions Abridge below Nuance DAX Copilot (estimated at $369-$830+ per provider per month,
      typically $600/month for enterprise) but above commodity scribes such as Nabla ($119/month) or
      S10.ai ($99/month). Human scribes cost approximately $45,000-$65,000 per year per scribe
      equivalent, 60-75% more than AI alternatives at current price points.

      The best available external revenue estimate comes from Sacra (independent analyst). Sacra
      estimates Abridge ended 2023 with approximately $6 million in ARR, growing to approximately
      $60 million ARR by year-end 2024, representing roughly 900% year-over-year growth. Contracted
      ARR was reported at approximately $117 million in Q1 2025, with active ARR reaching $100 million
      by May 2025. These are third-party estimates; Abridge has published no official revenue figures.
      Gross margin, net revenue retention (NRR), and revenue breakdown by product line are private
      and unavailable from public sources.

      Abridge has begun expanding its revenue beyond core documentation: the Contextual Reasoning
      Engine (launched February 2025) targets revenue cycle intelligence; Abridge for Nurses extends
      the platform to nursing documentation; and the April 2026 NEJM/JAMA partnership positions the
      company for clinical decision support monetization. These adjacent streams are pre-commercial
      or early-commercial and represent future revenue upside not reflected in current ARR estimates.
    claimRefs:
      - C121
      - C122
      - C123
      - C124
      - C125
      - C126
      - C127
  - id: s402
    title: Capital Structure, Adequacy, and Use of Proceeds
    body: |
      Abridge has raised approximately $757 million in disclosed equity across six rounds from 2019
      through June 2025. The capital formation chronology is detailed in the Company Overview chapter;
      this section focuses on the forward-looking financial adequacy assessment.

      Two SEC Form D filings by Abridge AI Inc. (CIK 0001737537, incorporated in Delaware) are on
      the public record within the 2022-2026 window. The March 2024 filing (accession number
      0001737537-24-000005) discloses an equity offering of $149,999,730 under Rule 506(b), consistent
      with the announced $150 million Series C. The June 2025 filing (accession number
      0001737537-25-000003) discloses an equity offering of $318,998,519 under Rule 506(b), consistent
      with the announced $300 million Series E (the $19 million excess likely reflects additional shares
      at a slightly different price or concurrent smaller tranches). The Form D for the Series C names
      Shivdev K. Rao as Executive Officer and Director, and Andy Weissman (Union Square Ventures) and
      Sebastian Duesterhoeft (Lightspeed Venture Partners) as Directors. The company's former legal
      name, intelligible.ai Inc., is noted in the SEC filings' previous-name registry.

      No public debt, credit facility, secondary transaction, or equity buyback has been disclosed.
      The Series D press release states proceeds will fund accelerated R&D, go-to-market expansion,
      and international growth. The Series E press release emphasizes product expansion into revenue
      cycle intelligence, clinical decision support, and international markets.

      Capital adequacy analysis: with $550 million raised across Series D (February 2025) and Series E
      (June 2025), and estimated ARR of $100-117 million (implying annual net burn of $100-234 million
      at a burn multiple of 1.0-2.0x), estimated cash runway is approximately 2.4 to 5.5 years from
      July 2025. This provides ample runway for pre-IPO scaling without an imminent next financing
      requirement, unless management elects to accelerate international expansion or large-scale
      compute infrastructure investment substantially beyond current plans.
