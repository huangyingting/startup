  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Abridge 最直接的风险向量是法律风险。2025 年 12 月提交于 San Diego Superior Court 的集体诉讼将 Sharp Healthcare 和 Abridge 均列为被告，指控超过
              100,000 次患者问诊在未充分同意的情况下被录音，违反 California's Invasion of Privacy Act（CIPA）和 Confidentiality of Medical
              Information Act（CMIA）。CIPA Section 637.2 允许每次违规 $5,000 的民事罚款，理论总敞口超过 $500M。该案并非孤例：针对 Sutter
              Health、Memorial Healthcare 及其环境式 AI 供应商的平行诉讼，显示行业内存在系统性同意失败模式。Abridge 的敞口也不限于 California，因为至少 12
              个美国州有全方同意法规，而 Abridge 的 150+ 医疗系统客户遍布这些州。医疗系统正在积极谈判 BAA 赔偿条款，把环境式 AI 责任直接转嫁给供应商。


              监管敞口会叠加法律风险。FDA 的风险分级 SaMD 框架可能适用于影响临床决策的环境式文档工具；Abridge 没有披露 FDA premarket submission，其 exempt-CDS
              立场也尚未被监管机构检验。拟议 HIPAA Security Rule 更新（24-hour incident notification、mandatory MFA、asset inventories）将作为
              HIPAA business associate 给 Abridge 增加新的合规义务。FTC 的 Operation AI Comply（2024 年 9 月）将医疗 AI
              的有效性主张举证置于更强审查之下。California AB 3030（2025 年 1 月生效）要求在患者沟通中披露 AI 参与。待决联邦立法可能完全覆盖 HIPAA BAA
              框架。累计来看，监管负担上升速度快于 Abridge 已记录的合规基础设施，而考虑到产品处理 PHI，违规成本不成比例地高。CMS 也在另行评估 AI
              生成病历是否需要额外认证才具备报销资格，增加了支付方侧执行向量。
