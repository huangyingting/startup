      - number: '6.5'
        title: 不利证据：Sharp Healthcare 同意权诉讼与行业性风险
        blocks:
          - type: paragraph
            body: >
              2025 年 12 月，原告 Jose Saucedo 在圣地亚哥对 Sharp HealthCare 提出拟议集体诉讼，指控 Sharp 从 2025 年 4 月开始部署
              Abridge，在患者不知情或未同意的情况下录制诊室内医患对话，违反 California's all-party consent law（Invasion of Privacy Act）。


              起诉书进一步称，Abridge 平台自动向病历中插入虚假声明，称患者已被 "advised" 并已 "consented" 接受录音，而 Saucedo 称相关对话从未发生。音频文件被传输至 Abridge
              云服务器，起诉书认为这也违反 California Confidentiality of Medical Information Act（CMIA）。


              拟议 class 可能覆盖超过 100,000 名在相关期间就诊并被录音的 Sharp 患者。Sharp HealthCare 和 Abridge 均按已发布报道拒绝对未决诉讼置评。Abridge
              被列为底层技术提供商，但 Sharp HealthCare 是主要被告。


              法律分析人士认为，Sharp 案件可能是首个针对医院环境式 AI 文档且缺乏稳健同意程序的重大 class action。全国性劳动与雇佣律所 Fisher Phillips
              指出，医疗系统需针对该案采取六项运营步骤。该案截至报告日期似乎没有把 Abridge 列为责任理论中的直接被告，但声誉和监管影响会延伸到 Abridge 的整个部署基础。


              该风险具有系统性：California's all-party consent requirement 是美国州法中最高标准，但环境式 AI 录音的患者同意框架在各司法辖区并不一致。截至 2026
              年中期，还没有联邦法规专门规制环境式 AI 临床文档同意，给部署医疗系统以及间接受影响的 Abridge 留下持续合规缺口。
            claimRefs:
              - CU035
              - CU036
              - CU037
              - CU038
              - CU039
              - CU040
