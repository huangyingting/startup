      - number: '4.4'
        title: 估值轨迹与投资人质量
        blocks:
          - type: paragraph
            body: >
              Abridge 的估值轨迹极为陡峭：Series C（2024 年 2 月）约 $850 million，Series D（2025 年 2 月）为 $2.75 billion，Series E（2025 年 6
              月）为 $5.3 billion；16 个月内提升 6.2x，其中 Series D 到 Series E 的翻倍只用了四个月。以 Sacra 估计的 $100-117 million ARR 计算，Series
              E 隐含 ARR 倍数约为 45-53x。标准医疗 SaaS M&A 中，差异化 AI 驱动公司通常为 6-8x ARR；火热市场里的后期 VC-backed 公司可能拿到 10-20x forward
              ARR。Abridge 的隐含倍数即便按这些标准也属于离群值，反映的是市场对预期增长轨迹、市场领导地位以及大规模环境式 AI 文档部署稀缺性的投机溢价。


              投资人质量处在私营医疗 AI 领域可见样本的最高档。投资人演进为 Union Square Ventures（seed）→ Wittington Ventures 与 Bessemer（A-1）→ Spark
              Capital 与 Bessemer（B）→ Lightspeed（C）→ Elad Gil 与 IVP（D）→ Andreessen Horowitz（E），每个增长阶段都获得 Tier 1 VC
              验证。Andreessen Horowitz 领投 Series E，是该机构最大的医疗 AI 投注之一。CapitalG（Google）、NVentures（NVIDIA）、CVS Health
              Ventures、Kaiser Permanente Ventures 等战略投资人，则提供了超出财务回报的商业和技术验证。


              Series C Form D 文件确认 Andy Weissman（USV）和 Sebastian
              Duesterhoeft（Lightspeed）为董事，提供了超出新闻稿披露的正式治理确认。按这类规模融资中领投方的标准 term sheet 条款，IVP（Series D）和 Andreessen
              Horowitz（Series E）预计会有董事席位，但公开文件无法确认。
