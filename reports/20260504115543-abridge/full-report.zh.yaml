        - 削弱主要分发渠道；为 Epic 客户制造边际成本为零的直接竞品
        - 医疗体系 CIO 调研中的 Epic EHR 胜率；Abridge 合同续约率
        - 重评合作价值；启动减仓或退出
      - - ARR 增速放缓
        - 连续两个季度同比增速 <50%
        - 45x 倍数将站不住；按 $117M ARR 和 20x 倍数计算，隐含估值降至 $2.3B，较 Series E 低 57%
        - 季度 ARR 报告（Sacra 跟踪）；客户数量公告
        - 下调为跟踪；开始探索二级退出
      - - 不利监管裁定
        - FDA SaMD 分类要求提交 PMA，或集体诉讼和解超过 $50M
        - 新合同签署暂停；法律成本增加；在医疗体系采购委员会中的声誉受损
        - FDA 执法自由裁量更新；诉讼卷宗（Sharp Healthcare 案；Sutter Health 平行案件）
        - 若确认不利裁定，下调为回避
      - - CEO 离职
        - Shiv Rao 离职后 30 天内未任命继任者
        - 关键人集中风险放大；投资者信心受影响；创始人主导的关系链使企业销售 pipeline 受扰动
        - 高管新闻稿；LinkedIn；董事会公告
        - 启动升级尽调；触发董事会治理复核
      - - 资本市场倍数压缩
        - 医疗 AI 上市可比公司低于 10x ARR 持续 60+ 天
        - IPO 窗口关闭；必须走 M&A 退出；$5.3B 进入价在 SaaS Capital 5x M&A 中位数下陷入亏损
        - 上市可比公司（VEEV、DOCS、PHR）交易倍数；healthcare IT IPO pipeline 数据
        - 延长持有；按可得条款寻找二级流动性
    notes: 触发阈值由分析师根据可比公司先例和 Abridge 当前估值结构推导。财务触发项应按季度监测，监管和治理触发项应持续监测。
