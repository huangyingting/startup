      - number: '5.2'
        title: Contextual Reasoning Engine 与 AI 架构
        blocks:
          - type: paragraph
            body: >
              Abridge 的 AI 栈围绕自研大语言模型（LLMs）搭建，这些模型基于超过 1.5 million 条去标识化临床对话微调，由内部研究团队开发；团队包括 CTO Zachary Lipton（CMU AI
              researcher），以及与 Carnegie Mellon Language Technologies Institute 和 Tepper School 有渊源的发表合作作者。


              2025 年 2 月推出的 Contextual Reasoning Engine（CRE），在基础文档流程上增加了三类功能。第一，情境感知：CRE
              从既往患者问诊、医疗系统特定收入周期指南，以及单个临床医生的文档偏好中拉取数据，用来丰富病历草稿。第二，问题检测：CRE 识别并归组医学问题，把语言对齐到合适的计费代码，包括对价值医疗报销至关重要的
              CMS-HCC Version 28 代码。第三，可执行输出：系统从对话转写中捕捉结构化医嘱，并在 Epic 医嘱模块中呈现，供临床医生审核和签名，减少手工重复录入。


              AI 处理流程融入 retrieval-augmented generation（RAG）原则，在推理时调用患者病史和系统特定指南。Abridge 发表了两篇关于负责任 AI
              方法论的技术白皮书："Pioneering the Science of AI Evaluation"（Part I）和 "The Science of Confabulation
              Elimination"（Part II），作者均包括 Michael Oberst、Davis Liang 和 Zachary Lipton，发表于 2025 年 8
              月。这些白皮书描述了双轴幻觉分类框架（支持轴和严重性轴），以及基于 1,000+ 小时人工验证临床问诊训练的专门防护机制。内部测试覆盖 10,000+ 次真实问诊，Abridge 的
              confabulation-detection 防护机制捕捉到 97% 的幻觉断言，相比 GPT-4o baseline models 的
              82%，漏检错误约少六倍。所有病历都以草稿形式呈现，必须由临床医生明确审核并签署后才能进入 EHR，从而维持人在回路责任链。
