            title: 临床创始人公信力推动信任
            body: >
              Shiv Rao 既是执业心脏科医生，又是 AI 创业者，这一双重身份构成实质差异化。医疗系统 CIO 和 CMIO 持续把由临床医生主导的产品设计，列为选择 Abridge
              而非竞品的主要原因。这种公信力很难复制，也能在临床网络内自然带来参考销售。
            calloutType: strength
            claimRefs:
