  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: |
      从核心投资驱动因素，沿竞争风险和估值约束，推到「继续研究」建议。市场机会和产品牵引力是正向输入；
      估值偏高、Epic 的竞争威胁和未披露的基本面，是阻止给出买入评级的权重。
    data:
      nodes:
        - id: market
          label: 市场：临床文档 TAM 超 $11B；增速 30%+；正切入 $60B RCM
          tone: positive
        - id: product
          label: 产品：150+ 家医疗系统；$117M ARR；50M+ 对话临床 LLM；55 个专科
          tone: positive
        - id: investors
          label: 投资人组合：a16z、IVP、Lightspeed、Khosla——一线跨阶段投资信号
          tone: positive
        - id: competition
          label: 竞争：Epic 原生病历文书助手于 Jun 2025 推出；Nuance DAX 存量地位；环境式 AI 新进入者
          tone: warning
        - id: valuation
          label: 估值：$5.3B / 45x ARR——较上市医疗 SaaS 底部估值高 6-7x
          tone: negative
        - id: disclosure
          label: 披露缺口：GAAP 收入、股权结构、NRR、烧钱速度均未披露
          tone: warning
        - id: recommendation
          label: 建议：RESEARCH-MORE——等待 ARR 提升至 >$250M，并补齐关键披露项
          tone: neutral
      edges:
        - from: market
          to: product
          label: 拉动
        - from: product
          to: valuation
          label: 部分支撑
        - from: investors
          to: valuation
          label: 支持
        - from: competition
          to: valuation
          label: 向下施压
        - from: valuation
          to: recommendation
          label: 拉伸估值的输入
        - from: disclosure
          to: recommendation
          label: 阻断性输入
    approximationNotes: 流程逻辑由分析师基于公开证据综合得出。边权重为定性判断。
    claimRefs:
      - CV008
      - CV010
