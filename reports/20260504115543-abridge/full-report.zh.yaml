      - number: '1.4'
        title: 规模与关键指标
        blocks:
          - type: paragraph
            body: >
              D 轮公告发布时（2025 年 2 月），Abridge 已部署在 100 多个美国最大、最复杂的医疗系统中，包括近期在 Duke Health、Johns Hopkins Medicine、Mayo
              Clinic 和 UNC Health 的全企业实施。到 2026 年中，公司新闻材料和客户页面描述的医疗系统部署数已超过 150 个。


              平台支持 28+ 种语言、50+ 个临床专科，覆盖门诊、急诊到住院等场景。UPMC 既是公司的锚定客户也是早期投资者之一；其于 2025 年 10 月宣布，作为 Epic EHR 统一的一部分，将 Abridge
              扩展到全企业范围，覆盖 12,000 多名临床医生。Abridge 获得过多项行业认可，包括 2025 和 2026 年 Ambient AI Best in KLAS、TIME Best
              Inventions（2024 年，以及 2025 年 Abridge for Nurses）、Forbes AI 50（2024 年）和 Fast Company 2026 Most Innovative
              Companies。收入、ARR 和员工人数没有公开披露。
