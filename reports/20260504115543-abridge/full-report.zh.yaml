  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Abridge 所处市场最适合定义为**企业级环境式 AI 临床文档**：面向医疗系统按席位订阅销售的软件，能在诊疗现场自动把医患对话转成结构化、可接入 EHR 的医疗记录。


              这个市场位于三个更大类别的交汇处：（1）广义医疗 AI（多家分析机构预计 2030 年超过 $45B），（2）临床文档改进（CDI）软件（成熟市场，包含 M*Modal/Nuance
              等传统工具），以及（3）医疗企业 SaaS。Abridge 主要处在更窄的环境式 AI 书记员细分市场，但也在扩展到相邻的收入周期智能（临床编码、计费文档）和临床决策支持（NEJM/JAMA 集成）。


              纳入支出：医疗系统为环境式 AI 文档支付的按席位或企业许可费，包括合同中打包的实施、培训和支持服务。


              排除支出：通用转录服务（法律、媒体）、消费者健康应用、非对话 AI 驱动的传统医生编码软件、EHR 授权（Epic、Oracle Health），以及非专为临床文档打造的通用 LLM API 消耗。


              竞争同一预算的现状替代方案：

              (a) 真人医疗书记员（每名医生等效 $35,000–$60,000/年），美国估计雇用 100,000+ 人；

              (b) 医生在键盘上自行记录（主导现状，按 AMA 数据，每 8 小时患者护理班次要消耗 5+ 小时 EHR 时间）；

              (c) 离岸或 BPO 转录服务；

              (d) Epic 原生 GenAI 文档工具（截至 2025-2026 年处于开发/发布阶段），可能在 Epic 生态内构成直接替代。
