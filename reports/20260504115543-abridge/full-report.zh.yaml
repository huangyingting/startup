companyProfile:
  summary: >
    Abridge 是一家创立于 Pittsburgh 的医疗 AI 公司，自动把医患对话转成结构化临床记录，并通过「Abridge Inside」原生嵌入 Epic EHR。公司由心脏科医生兼 CEO Shiv Rao 和 ML
    研究者兼 CTO Zack Lipton 于 2018 年创立，五轮累计融资 $757M；2025 年 6 月由 a16z 和 Khosla Ventures 领投 E 轮后，估值达到 $5.3B。到 2026 年初，Abridge
    服务 150+ 个医疗系统，并连续两年获得 KLAS Ambient AI 认可。公司正从环境式文档扩展到临床编码、收入周期智能，以及借助 NEJM、JAMA 合作推出的证据链接型临床决策支持。
