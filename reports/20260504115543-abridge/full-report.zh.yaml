      - number: '8.5'
        title: 情景分析、退出路径与最终尽调
        blocks:
          - type: paragraph
            body: >
              熊市情景（20% 概率）假设 2028 年 ARR 为 6,000 万至 7,500 万美元，由 Epic 原生环境式书记员拿下超过 30% 的企业市场、并使 Abridge 净新增 ARR
              降至零或略为负数驱动。按 6-8x ARR 计，退出估值为 3.6 亿至 6 亿美元，较 Series E 价格损失超过 90%。该情景需要下轮降价融资或困境出售，最可能由 Epic
              排他性变化、同意法诉讼和解超过 5,000 万美元，以及不利的 FDA SaMD 分类裁定共同触发。


              基准情景（55% 概率）假设 2028 年 ARR 为 2.5 亿至 3.5 亿美元，反映 Epic 合作保持、UPMC/Kaiser/Mayo 部署成功爬坡至完整产能，以及 AI 编码和 RCM
              扩展取得有限牵引。按 12-15x ARR 计（符合成长期医疗 AI 相对上市 SaaS 的溢价，但低于当前私募倍数），隐含退出估值为 30 亿至 52.5 亿美元，约与 Series E 价格持平。对
              Series E 一级投资者而言，这不是能产生回报的结果；即便成功 IPO，也只是资本分配而非收益。


              牛市情景（25% 概率）假设 2028 年 ARR 为 5 亿至 7 亿美元，基础是环境式文档平台取得主导地位，并成功推出 AI 医疗编码和 RCM 自动化，使每个既有客户收入增加 2-3 倍。按 15-20x
              ARR 计，隐含估值为 75 亿至 140 亿美元，相对 Series E 为一级投资者带来 40-165% 回报。该结果要求 ARR 持续 >80%
              增长，并在全新产品品类中成功执行，两者都带有实质执行风险。标准 VC 回报模型若要求从 Series E 进入获得 3-5x，则意味着投资人预期退出估值为 160 亿至 260
              亿美元，只有最乐观的牛市情景才可能实现。


              退出路径包括 2027-2028 年 IPO（截至 2026 年中尚无正式公告），以及被 Microsoft（Nuance DAX 协同）、Epic Systems（消除环境式 AI
              竞争威胁）、Oracle/Cerner 或付款方集团战略收购。按 SaaS Capital 记录的 7-10x 私募交易倍数进行 M&A，以当前 ARR 只会得到 8.19 亿至 11.7 亿美元，远低于 53
              亿美元进入价格。任何买入建议前必须解决三个阻断性尽调事项：（1）确认真实 ARR 倍数所需的 GAAP
              确认收入；（2）含所有优先股轮次清算优先权条款的完整股权结构表；（3）按群组拆分的净收入留存数据，以确认扩张轨迹。
