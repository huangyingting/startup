      - number: '1.3'
        title: 融资历史与资本形成
        blocks:
          - type: paragraph
            body: >
              2019 年至 2025 年 6 月，Abridge 在六轮已披露融资中累计募集约 $757M，用大约六年从种子轮走到独角兽。公司的资本轨迹与产品成熟度和企业采用曲线同步推进。


              2019 年由 Union Square Ventures 领投的 $5M 种子轮，支持了最初的消费者移动应用和自研临床语音数据集。A 轮和 A-1 轮合计约 $22.5M（2022 年完成，Wittington
              Ventures 领投 A-1），资助公司转向企业级文档。2023 年 10 月，Spark Capital 和 Bessemer Venture Partners 参与的 $30M B
              轮验证了早期医疗系统采用。2024 年 2 月，由 Lightspeed Venture Partners 领投的 $150M C 轮（估值约 $850M）是当时最大的一批生成式 AI 医疗融资之一。


              2025 年 2 月 17 日，Abridge 在超过 100 个医疗系统部署后完成 $250M D 轮，由 Elad Gil 和 IVP 共同领投，估值约 $2.75B。D 轮投资方包括
              Bessemer、CapitalG（Google 增长基金）、CVS Health Ventures、NVentures（NVIDIA）、Lightspeed、Redpoint、Spark
              Capital、California Health Care Foundation、K. Ventures 和 SV Angel。


              四个月后，2025 年 6 月，Abridge 完成 $300M E 轮，估值 $5.3B，由 Andreessen Horowitz 和 Khosla Ventures 领投。估值在四个月内从 $2.75B
              翻到 $5.3B，被广泛报道为企业端动能加速的证据。


              目前没有公开披露的债务、授信额度或二级交易细节。
