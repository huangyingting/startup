      - number: '7.2'
        title: 技术与运营风险 violates the California Confidentiality of Medical Information Act (CMIA).
        blocks:
          - type: paragraph
            body: >
              Abridge 的核心技术风险，集中在高风险临床环境里的 AI 准确性和系统可靠性。npj Digital Medicine 2025 年一项覆盖 1,200 次就诊的研究显示，环境式 AI 临床笔记的幻觉率为
              1.47%、遗漏率为 3.45%；JAMA Internal Medicine 则发现，4.8%
              的就诊记录存在有临床意义的差异，其中用药剂量和过敏错误占高严重性事件的大多数。这些错误率与人工转录大体可比，但错误形态不同：AI 幻觉带来的是事实性错误，而不是拼写或录入错误；一旦 AI
              生成的笔记把错误推入结构化 EHR 字段，如用药、问题清单、过敏信息，下游医疗责任风险就会累积。


              偏见风险已有文献记录，但对所有受保护群体的刻画仍不足。研究显示，广义环境式 AI 系统对非英语患者和部分种族亚群的遗漏率更高；Abridge
              的模型卡披露了偏见评估，但尚未公开确认有独立第三方审计。数据安全风险也很重：含有声音的原始录音，如果不做额外处理，无法按 HIPAA Safe Harbor 方法去标识化，由此形成持续的 PHI
              暴露，风险高于标准文本病历。Abridge 的云基础设施架构（很可能主要部署在 Google Cloud）以及云故障时的业务连续性计划，均未公开说明。通过 FHIR API 接入 EHR
              系统会增加攻击面；OAuth 令牌处理配置不当，是医疗 EHR 集成中已知的一类漏洞。如果 Abridge 产品未来跨过 SaMD 分类门槛，为保持竞争力而快速迭代模型，也会与 FDA PCCP
              的监管变更控制要求发生张力。
