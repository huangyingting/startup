  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品概览与核心模块图谱
        blocks:
          - type: paragraph
            body: >
              Abridge 提供企业级环境式 AI 临床文档平台，主要覆盖三种形态：用于床旁和门诊场景的原生 iOS 移动应用；嵌入 Epic EHR Hyperdrive 桌面客户端的浏览器式 Web 界面；以及让医疗系统
              IT 部门可以规模化配置部署的 API 集成层。临床医生端体验被压得很短：通过企业单点登录（SSO）后，医生启动录音，照常完成问诊，并在问诊结束后约一分钟内，在 EHR 中收到结构化 SOAP
              或专科专用病历草稿。


              当前产品套件可区分为五个模块。核心 Ambient Documentation 模块处理医生门诊的核心工作流。Revenue Cycle Intelligence 模块是 Contextual Reasoning
              Engine 的一部分，在对话现场自动捕捉 CMS-HCC 计费代码。Clinical Decision Support（CDS）模块在问诊过程中调出来自 Wolters Kluwer UpToDate、NEJM
              和 JAMA Network journals 的同行评议证据。Abridge for Nurses 面向护理班次文档、交接记录和住院评估。Linked Evidence
              系统是横跨所有文档模块的透明度层，把每一句 AI 生成内容映射到支持它的音频转写时间戳。


              平台支持 50+ 临床专科，覆盖门诊、住院、急诊和护理场景，并支持 28+ 语言。截至 2026 年，Abridge 已部署在 250 多家美国医疗系统，预计全年处理 80-100 million
              次临床医生与患者对话。
