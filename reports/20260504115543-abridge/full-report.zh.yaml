            body: >
              Abridge 从 2025 年 2 月 $2.75B D 轮，到 2025 年 6 月 $5.3B E
              轮，仅四个月就实现估值翻倍，是投资人需求极强的信号。它也抬高了公司下一次流动性事件的门槛，并可能说明后期投资人已经把收入增长和市场扩张的高度乐观情景计入价格，而当前公开证据基础尚不足以完全支撑这些情景。
