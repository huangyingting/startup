      - number: '5.5'
        title: 技术风险、限制与不利证据
        blocks:
          - type: paragraph
            body: >
              尽管工程投入显著，临床病历中的 LLM 幻觉仍然是 Abridge 乃至整个环境式 AI 行业的主要技术风险。Abridge 自身研究承认，即便其专门构建的 confabulation-detection
              系统明显优于通用模型，也无法 100% 消除无依据断言。2025 年 Nature 关于 multi-model assurance analysis 的论文发现，LLMs 在测试临床病例片段中最高可对 83%
              的内容进行编造或重复编造细节，提示工程只能部分降低幻觉率，降低模型 temperature 影响很小。这些对抗性脆弱性发现适用于所有基于 LLM 的文档系统，包括 Abridge；也说明人工临床医生审核虽然是
              Abridge 工作流中的强制环节，但它是必要防护，而不是预防性冗余。


              患者同意和录音合法性构成急性法律风险。2025 年 12 月，一起集体诉讼针对 Sharp Healthcare 提起，指控其在 California's Invasion of Privacy Act
              下未取得明确双边同意，就使用 Abridge 录音；并指控 AI 生成的同意声明被自动插入患者病历。虽然 Abridge
              未被列为直接被告（诉讼针对部署机构），但底层指控涉及产品行为和实施默认设置。行业内多家医疗系统面临类似环境式 AI 同意权诉讼，说明这是 Abridge 及其客户必须主动管理的系统性法律敞口。


              Epic 分发集中是首要战略技术风险：Abridge 的原生集成优势取决于持续获得 Epic Workshop 合作伙伴访问权。只要关系恶化、Epic 平台政策变化，或 Epic 亲自进入环境式 AI
              市场，Abridge 最有价值的分发渠道和技术护城河都会受损。独立 EHR 集成广度（athenahealth、Cerner/Oracle Health）据称可用，但相比 Epic 集成成熟度明显不足。


              其他技术限制包括：基础设施韧性和 uptime SLA
              承诺未经验证；模型版本管理和回滚程序未确认；没有公开披露来自随机对照试验（RCTs）的临床结果研究；公开数据也很少涉及各专科准确性差异，而复杂亚专科中这种差异可能很重要。
            claimRefs:
              - CE024
              - CE030
              - CE027
              - CE032
              - CE035
              - CE022
      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: Linked Evidence 构成独特的信任与安全护城河
            body: >
              Abridge 的 Linked Evidence 功能把每一句 AI
              生成临床病历映射到支持它的音频转写时间戳；公开资料显示，没有任何竞争者在同等深度上复制这一能力。它形成了临床医生信任机制和合规审计轨迹，直接回应环境式 AI 采用的核心阻力：病历准确性责任。再叠加专门构建的
              confabulation detection 防护机制（97% catch rate，对比 GPT-4o 的 82%），这套安全栈不是营销说法，而是有公开白皮书背书的真实技术差异化。
            calloutType: strength
            claimRefs:
              - CE009
              - CE012
              - CE028
              - CE031
              - CE034
          - type: callout
            title: Epic Workshop 合作是持久的分发与集成护城河
            body: >
              Abridge Inside 在 Epic Haiku 和 Hyperdrive 内的原生集成，不需要 app-switching；Epic Workshop 共研关系则带来结构化医嘱捕捉、护理模块模板等
              API-only 竞争者无法访问的能力。Epic 控制大型医疗系统 EHR 市场 >60% 份额，这一合作是 Abridge 最持久的分发优势，也为非 Workshop 环境式 AI 供应商构成结构性门槛。
            calloutType: strength
            claimRefs:
              - CE020
              - CE021
              - CE019
          - type: callout
            title: LLM 幻觉风险仍在，无法完全消除
            body: >
              即便 Abridge 内部 confabulation catch rate 达 97%，在一个每年生成 80-100 million 次临床对话的平台上，约 3%
              的残余错误率仍意味着大量潜在错误临床陈述会进入临床医生审核环节。2025 年 Nature multi-model assurance study 发现，提示工程无法消除临床病例片段中测试 LLM
              的幻觉风险。规模化的医生走过场式签署（未认真审核即签署病历）会把这些残余 AI 错误转化为病历中的不准确信息，进而造成潜在不利患者结果和责任后果。该风险内生于 LLM 路线，无法仅靠软件完全缓释。
            calloutType: risk
            claimRefs:
              - CE012
              - CE024
              - CE031
          - type: callout
            title: 患者同意架构给 Abridge 和医疗系统带来法律敞口
            body: >
              2025 年 12 月 Sharp Healthcare 集体诉讼指控，使用 Abridge 和 AI 生成同意声明进行了未经同意的录音，凸显环境式 AI 行业的系统性法律敞口。虽然 Abridge
              在合同上把同意责任放在部署医疗系统身上，原告律师群体正越来越多测试 AI 工具供应商是否也要为实施默认设置承担责任。Abridge
              的产品设计选择，包括如何提示、记录和文档化同意，直接塑造客户的法律敞口，也可能塑造 Abridge 自身未来诉讼中的责任。
            calloutType: risk
            claimRefs:
              - CE030
  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户组合概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Abridge 的客户基础只包括作为企业 SaaS 采购方的美国医疗系统。没有消费者订阅、支付方收入或已确认的国际部署。每笔已知交易中，买方是医疗系统（CIO/CMIO/CFO
              签署），用户是单个临床医生（医生、高级执业医护人员或护士），受益者是患者。采购通过企业销售流程推进，通常需要先试点，再签企业合同。


              Abridge 在 Series D 公告（2025 年 2 月）时已超过 100 个医疗系统部署，高于 Series C（2024 年 2 月）时的不到 30 个。到 2025 年 10 月，公司新闻材料提到
              200 多个医疗系统；KLAS 2026 报告也佐证了大规模生产部署。客户组合横跨学术医疗中心、大型 integrated delivery networks（IDNs）和区域社区医疗系统，由于 "Abridge
              Inside" 原生集成优势，集中在运行 Epic 的机构。


              战略投资人兼客户 UPMC Enterprises、Kaiser Permanente Ventures
              构成一个独特类别：医疗系统既是财务支持者，也是生产环境部署方。这种双重关系提供了优先的标杆客户销售入口，并释放长期承诺信号，但也引入需要尽调的利益冲突。
