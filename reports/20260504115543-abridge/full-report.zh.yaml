  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: |
      三种情境下，Abridge 2028 年隐含估值的低、中、高区间。熊市情境意味着以 Series E 价格进入几乎全损；
      基准情境只对应持平到温和回报；只有在持续超高速增长、平台扩张也跑通时，牛市情境才给出有吸引力的回报。
    data:
      items:
        - label: 熊市情境（2028）
          low: 360
          mid: 480
          high: 600
          note: Epic 胜出；ARR 停在 $60-75M；6-8x 倍数；百万美元
        - label: 基准情境（2028）
          low: 3000
          mid: 4125
          high: 5250
          note: 平台增长；IPO 2027-2028；$250-350M ARR；12-15x 倍数；百万美元
        - label: 牛市情境（2028）
          low: 7500
          mid: 10750
          high: 14000
          note: 主导平台；编码/RCM 上线；$500-700M ARR；15-20x；百万美元
    approximationNotes: >-
      情境区间来自分析师构建的 ARR 预测和基于可比公司的退出倍数。 概率加权预期价值约 $4.1B（接近 Series E 价格），意味着 Series E 新股投资人在稀释前的预期回报约 0%。所有数值均为百万美元。熊市概率
      20%，基准 55%，牛市 25%。
    claimRefs:
      - CV032
      - CV039
      - CV040
      - CV041
      - CV042
      - CV043
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: |
      按 0-10 序数刻度，对七个投资维度给出可供 IC 使用的评分。约 5.9/10 的总体加权分，
      反映市场和牵引力信号很强，但被偏高估值和不完整证据基础抵消。阻断性尽调事项披露前，
      结论仍与「继续研究」一致。
    data:
      items:
        - label: 市场机会
          score: 9
          note: $11B+ 临床文档 TAM，正扩展至 $60B RCM；医生职业倦怠是结构性顺风
        - label: 产品与技术
          score: 7
          note: 自有临床 LLM；50M 对话语料；55 个专科；28 种语言；有真实部署证明
        - label: 收入牵引力
          score: 8
          note: $117M 签约 ARR；150+ 家医疗系统；UPMC/Kaiser/Mayo 标杆部署；行业内最快爬坡
        - label: 竞争护城河
          score: 5
          note: Epic 原生病历文书助手上线侵蚀分发护城河；数据飞轮优势真实存在，但正在收窄
        - label: 估值纪律
          score: 3
          note: 45x 签约 ARR；较上市可比公司溢价 6-7x；要实现 IRR 为正的退出，需要超常执行
        - label: 风险画像
          score: 4
          note: 集体诉讼；FDA 不确定性；清算优先权压力；法律、竞争和财务多维风险
        - label: 证据质量
          score: 5
          note: 仅披露签约 ARR（无 GAAP 收入）；股权结构未披露；NRR 未报告；三个阻断性尽调缺口
    approximationNotes: 评分是基于截至 2026-05-04 公开证据的 0-10 序数分析师判断。市场机会和 收入牵引力得分反映底层信号强。估值纪律得分反映 45x ARR 相比行业可比公司的压力。 所列评分的总体加权平均约为 5.9/10。
    claimRefs:
      - CV008
      - CV010
      - CV021
      - CV031
      - CV035
      - CV036
      - CV037
      - CV038
