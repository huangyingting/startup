      - number: '8.2'
        title: 融资历史、估值背景与轮次分析
        blocks:
          - type: paragraph
            body: >
              Abridge 的融资历史，是医疗 SaaS 中私募估值爬升最快的案例之一。公司在 2024 年 2 月完成 1.5 亿美元 Series C，估值约 8.5 亿美元，由 Lightspeed Venture
              Partners 和 Redpoint Ventures 领投。仅 12 个月后，2025 年 2 月，Elad Gil 和 IVP 共同领投 2.5 亿美元 Series D，公司估值达 27.5
              亿美元，一年内上调 3.2 倍。又过 4 个月，a16z 领投的 3 亿美元 Series E 将估值推至 53 亿美元，不到 5 个月几乎较 Series D 翻倍。计入所有轮次后，截至 Series E
              的累计股权融资约为 7.57 亿至 8 亿美元。


              Abridge AI Inc. 已向美国 SEC 提交 Form D 证券豁免发行通知，确认其私募融资使用 Regulation D Rule 506(b) 豁免。Series C 的 Form
              D（accession number 0001737537-24-000005）于 2024 年 3 月 8 日提交；Series E 的 Form D（accession number
              0001737537-25-000003）于 2025 年 6 月 30 日提交。公司注册地为 Delaware，主要营业地址位于 Pennsylvania 州 Philadelphia。这些文件确认
              Abridge 尚未向 SEC 注册证券，符合私营公司状态，也尚未启动公开发行的 S-1 注册流程。


              估值轨迹说明投资者正在为极高的前瞻 ARR 增长定价。Series C 时（估值 8.5 亿美元，ARR 约为零），投资人几乎完全在买技术论证。到 Series E（估值 53 亿美元，签约 ARR 1.17
              亿美元），隐含 45x 倍数意味着市场押注 Abridge 将在 18-24 个月内达到 2.65 亿美元以上 ARR，并维持高溢价退出倍数。估值爬升速度也很罕见：约 18 个月内，从 Series B 约 2
              亿美元估值升至 Series E 53 亿美元，涨幅 26 倍，这放大了当前价格中内嵌的执行风险。
