      - number: '8.6'
        title: 展品
        blocks:
          - type: callout
            title: 估值进入风险：45x ARR 倍数要求极高执行
            body: >
              Abridge 的 53 亿美元 Series E 价格隐含约 45x 签约 ARR，是上市医疗 SaaS 底部的 6-7 倍，并嵌入了 >100% 持续 ARR 增长预期。2022-2023
              年加息周期的历史先例显示，医疗 AI 倍数可在 12 个月内压缩 30-50%。Olive AI 从 40 亿美元峰值到归零、累计融资 9
              亿美元，说明下行风险不是理论。一级市场投资者应把保本结果作为基准情景，并据此设计进入结构。
            calloutType: risk
            claimRefs:
              - CV021
              - CV032
              - CV033
              - CV034
          - type: callout
            title: 真正的品类领导地位：1.17 亿美元 ARR 与 150+ 医疗系统部署
            body: >
              Abridge 在医疗 IT 中完成了一件少见的事：让一个新的 AI 产品品类实现真正的企业级规模采用。凭借 1.17 亿美元签约 ARR、150+ 医疗系统部署，以及 UPMC 全企业承诺，Abridge
              已从试点跨入生产部署。其自有 5,000 万段对话临床 LLM 语料形成了持久训练数据护城河，并会随着部署规模扩大而复利。公司 ARR 从 2022 年接近零增长到 2025 年 Q1 的 1.17
              亿美元，是医疗 SaaS 史上最快的增长轨迹之一。
            calloutType: strength
            claimRefs:
              - CV008
              - CV035
              - CV036
              - CV038
          - type: callout
            title: 建议：继续调研，等待关键披露与 ARR 爬坡确认
            body: >
              按 53 亿美元 Series E 定价，建议是继续调研。投资论证有吸引力，市场领导地位也真实，但三个阻断性尽调缺口使承销无法完成：GAAP 确认收入、含优先权条款的股权结构表、按群组拆分的 NRR
              均未披露。若能以较 Series E 折价 40-50% 进入二级市场（隐含价格 26.5 亿至 32 亿美元），对应约 20-25x 签约 ARR，会是更可辩护的进入点。升级为买入的观察触发条件，是 ARR
              连续两个季度保持 80% 以上增长，并至少解决两个阻断性尽调事项。
            calloutType: recommendation
