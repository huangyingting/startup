      - number: '7.3'
        title: 竞争与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Epic 在 2025 年 6 月推出原生环境式 AI 书记员，是 Abridge 商业模式面临的最实质战略威胁。多位医疗系统 CIO 将这次发布称为行业分水岭。Epic
              原生产品的优势在于边际集成成本为零、EHR 数据上下文更丰富，并且 Epic 已经与 550+ 医疗系统建立关系。Abridge Inside 合作当前让 Abridge 触达约 40% 的 Epic 网络，但
              Epic 在合同上仍保留不受限制开发竞争性原生功能的权利。这一合作让 Abridge 对潜在竞争者形成战略依赖；如果退出，又会失去最主要的分发渠道。


              Microsoft Nuance DAX Copilot 进一步加剧竞争压力：已部署 550+ 医疗系统、覆盖完整 EHR 平台，再加上 Microsoft Azure 的企业客户关系，这些优势不是
              Abridge 的研究出身可以完全抵消的。KLAS Research 确认 Abridge 在独立供应商中临床准确性领先，但 Epic 原生产品正在缩小准确性差距。Epic 与 Microsoft
              争夺同一批医疗系统预算，价格压缩大概率出现，可能迫使 Abridge 通过折扣保留合同，并把毛利率压到不可持续水平。公司 53 亿美元估值（约 45x
              ARR）几乎不给执行失误留空间：增长不及预期或丢失大合同，都可能在退出时触发显著的倍数压缩。烧钱速度和盈利时间表未披露，竞争逆风中可支撑多久仍不确定。客户集中风险同样存在：失去一到两个锚定医疗系统会对收入造成实质冲击，财务承压的医疗系统也可能推迟或取消环境式
              AI 扩展合同。
