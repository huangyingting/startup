      - number: '6.2'
        title: 已命名部署：规模、证据与生产状态
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Abridge 最重要的公开确认生产部署按规模和证据质量概括如下。


              UPMC（University of Pittsburgh Medical Center）是 Abridge 的创始锚点。CEO Shiv Rao 是执业 UPMC 心脏病医生，平台也在 UPMC
              内孵化。2025 年 10 月，UPMC 宣布企业级扩展至 40 家医院和 800+ 门诊点的 12,000 多名临床医生，支持 44 个专科。UPMC Enterprises
              既是早轮投资人，也是任期最长的客户，提供了组合中最强的生产深度证据。


              Kaiser Permanente 于 2024 年 8 月将 Abridge 部署给 40 家医院和 600+ medical offices 的 24,000 多名医生；Kaiser
              称这是截至当时医疗史上最大的生成式 AI 部署。Kaiser Permanente Ventures 也是 Abridge 的 Series B 和 C 投资人，形成战略绑定，支撑部署规模和速度。Kaiser
              医生中有 87% 表示，Abridge 是工作日中最显著的改进。


              Northwell Health（28 家医院、1,000+ 门诊设施）于 2025 年 10 月宣布系统级部署，目标是在 Abridge 平台上每年支持超过 50 million 次医疗对话。Highmark
              Health 与 Allegheny Health Network（14 家医院）于 2025 年 8 月宣布企业级合作，独特之处是包括实时 prior authorization 模块，这是 Abridge
              从文档进入收入周期智能的首个已确认具名客户扩展。


              Corewell Health（21 家医院、300+ 站点、4,000+ 医生）于 2024 年 12 月宣布企业级部署，并发布了详细的 90 天 pilot 结果。Mayo Clinic 于 2025 年 1
              月扩大到 2,000 名医生，建立在此前护理文档 pilots 之上。Duke Health 和 Johns Hopkins Medicine 均在 2025 年初作为 Abridge Series D 公告
              cohort 的一部分宣布企业级实施。


              Yale New Haven Health 在 Abridge Series C（2024 年 2 月）时加入，部署给数千名临床医生。Emory Healthcare 是 2023 年的早期采用者，是首批上线
              Abridge Inside Epic 集成的大型学术医疗中心之一。
