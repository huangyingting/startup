      - number: '5.3'
        title: Epic 集成与分发策略
        blocks:
          - type: paragraph
            body: >
              Abridge 的分发策略建立在与 Epic EHR 的深度原生集成上。Epic 约占美国医院市场 35%，在大型学术医疗中心中的份额超过 60%。2024 年 2 月随 Series C 部署扩张一同宣布的
              "Abridge Inside" 计划，使 Abridge 成为首个原生集成 Epic 全平台栈的环境式 AI 文档供应商：包括 Epic Haiku（临床医生在智能手机和 iPad 上使用的 iOS
              移动应用）和 Epic Hyperdrive（基于 Chromium 的 Web 桌面客户端）。


              作为 Epic Workshop 合作伙伴，Abridge 与 Epic 共同开发功能，而不是只依赖第三方 API 集成。这种合作解锁了外部供应商无法访问的能力：实时结构化医嘱捕捉，直接呈现在 Epic 的
              medication/order 模块中；与 Epic 和 Mayo Clinic 共同设计的护理专用工作流模板；以及在 Epic 病历编辑器中原生显示 Linked Evidence。使用 Abridge
              Inside 的临床医生不需要离开 Epic，就能启动录音、审核病历草稿或签署，采用摩擦更低。


              Epic 分发模式形成强 flywheel：采购 Epic 的医疗系统常常通过 Epic marketplace 和推荐渠道了解 Abridge，降低 Abridge 对单个医疗系统的直销成本。截至 2026 年
              4 月，Abridge 已部署在 250+ 最大美国医疗系统，其中多数运行 Epic。对 Epic 的集中也带来依赖风险：Epic Workshop 关系中断、Epic 平台访问政策变化，或 Epic
              决定推出竞争性环境式文档产品，都会实质削弱 Abridge 的分发触达。
            claimRefs:
              - CE020
              - CE021
              - CE033
              - CE019
              - CE003
      - number: '5.4'
        title: AI 安全、质量与合规架构
        blocks:
          - type: paragraph
            body: >
              Abridge 符合 HIPAA，并把与每个医疗系统客户签署 Business Associate Agreements（BAAs）作为标准企业接入要求。平台强制企业
              SSO、基于角色的访问控制，以及可定制治理设置，让医疗系统 IT 和合规部门按机构要求配置审计日志、数据留存政策和用户权限。


              音频录音通过 Abridge 自研语音识别流程处理。公司没有公开披露完整基础设施栈，但早期描述提到 Microsoft Azure 是初始云托管提供商；当前基础设施配置未获独立确认。所有 AI
              生成病历都明确定位为草稿文档，必须由临床医生审核、签署，并在最终进入 EHR 前完成必要编辑，从而保留强制人在回路关口。


              Abridge 的 Linked Evidence
              功能是主要的实时准确性透明机制：生成病历中的每句话，都映射到患者问诊中的具体音频转写片段，临床医生可点击草稿病历中的任意句子，回听对应音频。这条审计轨迹让医生在签名前快速核查事实并纠错。2025 年 8
              月白皮书详述的 confabulation elimination 流程，则增加一层自动预审，在草稿展示前检测并纠正幻觉断言。双轴分类（支持程度 x 临床严重性）让系统可以按潜在患者伤害优先处理纠错。


              独立医疗技术分析机构 KLAS Research 在 2025 年和 2026 年连续将 Abridge 评为 Ambient AI 的 #1 Best in KLAS，并基于对医疗系统客户的直接访谈，在
              Culture、Loyalty、Relationship、Value 四个客户体验支柱上给出 A+ 评级。连续获得 KLAS 第一，为其规模化部署质量和客户满意度提供了独立第三方验证。
