      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >
              Abridge 由四位背景横跨临床医学、语音 AI 和机器学习的人士共同创立。Dr. Shivdev（Shiv）Rao, MD 是 CEO，也是公司对外的核心面孔。他是 UPMC 执业心脏科医生，本科毕业于
              Carnegie Mellon University；创立 Abridge 前曾在 UPMC
              Enterprises（该医疗系统的风投部门）担任高管。他兼具临床医生和技术创业者身份，这一点常被外界视为产品设计上的差异化因素。


              Zachary Lipton, PhD 是 CTO 和联合创始人。他是 Carnegie Mellon Tepper School 副教授，也是以负责任 AI 研究闻名的高引用 AI 学者，负责 Abridge
              的核心研究与工程。Sandeep Konam（联合创始人）拥有 CMU 机器人学硕士学位，曾主导早期机器学习架构。Florian Metze, PhD（联合创始人）加入 Abridge 前曾任 CMU
              Language Technologies Institute 研究教授，专攻语音识别。


              此后，公司高管团队补入 Julia Chou（COO）、Brian Wilson（Chief Commercial Officer）、Sagar Sanghvi（CFO）和 Tim Hwang（General
              Counsel）。公开列名的高管约 22 人，覆盖企业发展、销售、HR、产品和工程。关键人物风险集中在 Dr. Shiv Rao：他的医生公信力支撑临床医生信任，一旦离职将构成对品牌的重大不利事件。
