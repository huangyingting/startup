  productSummary: >
    Abridge 的核心产品是环境式 AI 临床文档平台：一个移动端和 Web 应用，可聆听医患就诊对话，自动生成按专科适配的 SOAP 记录，并原生嵌入 Epic EHR（Haiku 和 Hyperdrive）。其自研
    Contextual Reasoning Engine 使用在去标识化临床对话上训练的大语言模型。记录包含「Linked Evidence」：每一条主张都锚定到转录文本中的具体时刻，便于医生核验。平台支持 50+
    个医学专科和多种语言。Abridge 正通过与主要医学期刊合作，扩展到收入周期智能（临床编码）和临床决策支持。
