      - number: '1.5'
        title: 不利事件与风险信号
        blocks:
          - type: paragraph
            body: >
              2025 年 12 月，San Diego 的 Sharp Healthcare 被提起拟议集体诉讼，指控一名患者的就诊在其不知情且未同意的情况下使用 Abridge 录音，违反
              California《Invasion of Privacy Act》下的双方同意要求。起诉书还称，Abridge 自动在病历中插入了不正确陈述，声称已取得患者同意；而患者称事实并非如此。该案针对 Sharp
              Healthcare（作为部署机构），并将 Abridge 列为底层技术提供方。


              使用环境式 AI 工具的其他医疗系统也出现类似指控，说明环境式文档行业存在系统性责任风险。核心法律问题在于：部署医疗系统是否充分取得知情同意；AI
              生成、但可能不反映真实患者互动的同意陈述，是否会带来监管和民事责任。按公开报道，Abridge 没有在 Sharp 案件中被直接列为被告。


              截至报告日，没有公开披露证据显示公司存在领导层流失、重大财务重述、制裁、出口管制违规或产品召回。
            claimRefs:
              - CO026
              - CO027
              - CO028
