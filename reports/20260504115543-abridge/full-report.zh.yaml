      - number: '2.2'
        title: 市场规模：多重口径
        blocks:
          - type: paragraph
            body: >
              环境式 AI 临床文档的市场规模高度取决于定义边界。现有几组可信但方法不同的估算：


              **口径 1 — 临床对话 AI 平台（Grand View Research，2024）：**

              与 Abridge 直接市场最相关的最窄口径。GVR 将该细分市场 2024 年规模定为 $538M，并预计到 2033 年 CAGR 为 25.7%，达到 $4.19B。该数字覆盖环境式 AI
              书记员和相关临床对话分析，但排除更广泛的 CDI 和工作流自动化。


              **口径 2 — 环境式临床文档市场（DataIntelo/GrowthMarkets，2025）：**

              更宽的细分市场，包含环境聆听、实时记录生成，以及所有护理场景下的 AI 辅助文档。估计 2024 年 $1.85B、2025 年 $3.8B，并预计到 2034 年达到 $18.6B，CAGR 为 19.3%。


              **口径 3 — AI 驱动临床文档（HealthcareResearchReports，2025）：**

              2025 年 $4.01B，预计到 2030 年达到 $13.99B，CAGR 为 28.3%。该范围可能包含并非纯环境式的 AI 辅助编码和 CDI 工具。


              **口径 4 — 自下而上：美国医生可触达市场：**

              美国约有 100 万名医生，其中约 800,000 名从事主动患者护理。若环境式 AI 文档的按席位 SaaS 价格处于 $3,000–$8,000/年区间（与已报道企业合同结构一致），美国 TAM 约为每年
              $2.4–6.4B。其中，Epic 相关医疗系统（按急性护理医院数量为 42%，按床位为 55%）是 Abridge 最有利的 SAM，估计为 $1.5–4B。


              **矛盾提示：** 对相似周期而言，估算跨度很大（$538M 对比 $3.8B 对比 $4B），反映的是定义不一致；分析师使用不同边界（仅环境式，或广义 CDI）和不同方法。保守买方应以最窄口径（2024 年
              $538M）作为锚点，同时承认所有口径都一致显示高速增长。
