chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Abridge AI, Inc. 成立于 2018 年，运营总部位于 Pennsylvania 州 Pittsburgh；其最新新闻稿从 San Francisco 发布，反映出公司一边扎根学术医学、一边连接
              Silicon Valley 风投。公司一句话定位：面向企业级客户的生成式 AI 平台，在诊疗现场把医患对话转成临床可用、可用于计费的医疗记录。


              核心产品使用自研大语言模型（LLMs），并在超过 150 万次去标识化临床就诊对话上微调。音频通过麦克风采集（移动设备或桌面端），经 Abridge 专用语音识别引擎处理后，在就诊结束约一分钟内，把结构化
              SOAP 记录或专科记录推送到医生的 EHR 内。「Linked Evidence」功能把每一句 AI 生成文本回链到支持它的录音转录片段，为医生提供快速审计路径。


              公司收入来自与医疗系统签订的企业 SaaS 合同；价格按席位（每名临床医生）或按部署计费。公司目前不提供直接面向消费者的订阅。关键合作方包括 Epic Systems（美国主导 EHR 厂商），Abridge
              通过「Abridge Inside」从移动端 Haiku 到桌面端 Hyperdrive 原生嵌入 Epic。医疗系统将这种深度 EHR 集成视为主要采用驱动因素。
