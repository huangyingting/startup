      - number: '4.2'
        title: 资本结构、充足性与募资用途
        blocks:
          - type: paragraph
            body: >
              Abridge 自 2019 年至 2025 年 6 月，已在六轮融资中披露募集约 $757 million 股权资本。融资形成的时间线已在公司概览章节展开；本节聚焦前瞻性的资金充足性评估。


              2022-2026 年窗口内，公开记录中有两份 Abridge AI Inc.（CIK 0001737537，特拉华注册）提交的 SEC Form D。2024 年 3 月文件（accession number
              0001737537-24-000005）披露，根据 Rule 506(b) 发行 $149,999,730 股权，与已宣布的 $150 million Series C 一致。2025 年 6
              月文件（accession number 0001737537-25-000003）披露，根据 Rule 506(b) 发行 $318,998,519 股权，与已宣布的 $300 million Series E
              一致（多出的 $19 million 可能来自略有不同价格的额外股份或同期较小 tranche）。Series C 的 Form D 将 Shivdev K. Rao 列为 Executive Officer
              and Director，并列名 Andy Weissman（Union Square Ventures）和 Sebastian Duesterhoeft（Lightspeed Venture
              Partners）为 Directors。SEC 文件的曾用名登记中还记录了公司旧法定名称 intelligible.ai Inc.。


              公司没有披露公开债务、信贷额度、二级交易或股票回购。Series D 新闻稿称，募资将用于加速 R&D、扩大商业化拓展和国际增长。Series E 新闻稿则强调把产品扩展到收入周期智能、临床决策支持和国际市场。


              资金充足性分析：Series D（2025 年 2 月）和 Series E（2025 年 6 月）合计募集 $550 million，估计 ARR 为 $100-117 million（若 burn
              multiple 为 1.0-2.0x，则隐含年度净 burn 为 $100-234 million），则从 2025 年 7 月起估算现金 runway 约为 2.4 至 5.5 年。这给 IPO
              前扩张留出了充足时间，短期内没有迫切的下一轮融资需求，除非管理层选择把国际扩张或大规模算力基础设施投入明显提速到当前计划之外。
