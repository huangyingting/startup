      - CV026
      - CV031
      - CV036
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: |
      将 Abridge 的 ARR 或收入倍数，与可比上市公司、私募交易和行业基准对照。Abridge 的签约 ARR 倍数为 45x，
      较上市医疗 SaaS 中位数高 6-7x，约为 Nuance 收购倍数的 3.4x，说明 Series E 价格里压进了极高的增长预期。
    data:
      items:
        - label: Veeva Systems（上市）
          value: 6.5
          note: FY2025 EV/Revenue
        - label: Doximity（上市）
          value: 7
          note: FY2025 EV/Revenue
        - label: Phreesia（上市）
          value: 7
          note: FY2025 EV/Revenue
        - label: 医疗 SaaS 上市公司中位数
          value: 7
          note: 2025 行业中位 EV/Revenue
        - label: Tempus AI（IPO Jun 2024）
          value: 10.8
          note: IPO 时 EV/Revenue
        - label: Nuance Communications（2021 年 M&A）
          value: 13.3
          note: M&A 收入倍数
        - label: Ambience Healthcare（非上市）
          value: 33
          note: Jul 2025 Series C ARR 倍数
        - label: Abridge（Series E Jun 2025）
          value: 45
          note: 签约 ARR 倍数——确认收入倍数可能为 60-75x
    approximationNotes: >-
      上市公司倍数按约 May 2026 的运行日期计算，基于滚动 EV/Revenue。私营公司倍数按已披露融资轮估值除以已披露 ARR 计算（Abridge：Q1 2025 签约 $117M；Ambience：July 2025
      ARR $30M）。Abridge 的签约 ARR 倍数可能低估真实确认收入倍数 20-50%。
