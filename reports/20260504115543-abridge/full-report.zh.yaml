  - id: TV006
    title: 最终尽调问题表
    columns:
      - 议题
      - 缺失证据
      - 重要性
      - 尽调路径
      - 优先级
    rows:
      - - 确认收入 vs. Contracted Revenue
        - GAAP 确认收入未披露；公开信息只有 $117M contracted ARR
        - 如果确认收入只有 contracted 的 60-75%，真实 ARR 倍数可能达到 60-75x；建议可能转为回避
        - 索取经审计财务报表或 Series E 投资人 data room 权限；与 SaaS cohort 爬坡披露对比
        - 阻断项
      - - Cap Table 与优先权悬顶
        - 五轮优先股的清算优先权堆栈未披露；普通股与优先股拆分未知
        - 如果退出估值低于 $5.3B，优先权堆栈可能把普通股股东回报压到接近零
        - 索取完整 cap table 以及 Series B 以来各轮优先权条款；确认是 1x 还是 2x participating preferred
        - 阻断项
      - - 净收入留存率
        - 未公开按 cohort 划分的 NRR；现有医疗体系客户的扩张收入未知
        - 规模化后 NRR >120% 才能支撑当前溢价；NRR 低于 100% 说明流失或价格压力，会削弱 45x 的合理性
        - 索取 2022-2025 年 cohort 扩张 ARR 数据；核验 UPMC 和 Kaiser 爬坡至充分使用的时间线
        - 重要
      - - 月度烧钱速度与跑道
        - 已通过五轮股权融资 $757M，但运营现金消耗未披露
        - 烧钱速度决定 IPO 时间线紧迫性和被迫稀释融资风险；高 burn 会压缩回报窗口
        - 索取 burn rate / ARR 比率和当前现金对应跑道；与 $757M 总融资额对比估算净现金
        - 重要
      - - Epic 合作经济性与排他性
        - 收入分成条款、排他窗口和控制权变更条款未披露
        - Epic 可以自建原生竞品；合作条款决定 Abridge 主要分发优势能持续多久
        - 审查合作协议中的排他窗口、续约条款和收入分成条款
        - 重要
      - - 独立临床有效性审计
        - Abridge 已发布的 AI 准确性声明覆盖所有支持的专科和语言，但缺少独立第三方审计
        - 如果临床准确性被夸大，可能触发类似 Sharp Healthcare 诉讼的监管执法或集体诉讼敞口
        - 委托独立机构按 NPJ 或 JAMA 标准，在至少三家大型医疗体系部署中审计临床准确性
        - 次要
    notes: 阻断项在解决前会阻止买入建议。重要项会影响进入价格和情景权重。次要项增加尽调深度，但不会单独改变继续研究评级 absent other positive shifts.
    claimRefs:
      - CV009
      - CV026
      - CV031
      - CV032
      - CV036
      - CV038
