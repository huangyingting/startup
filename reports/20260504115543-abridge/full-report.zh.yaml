        - 通过智能手机麦克风（iOS Haiku）或桌面浏览器麦克风（Hyperdrive）记录医患对话
        - 设备麦克风硬件；用户授权；环境噪声
        - 嘈杂临床环境会拉低音频质量；大规模设备权限管理
      - - 自动语音识别（ASR）
        - 用 Abridge 自研语音引擎实时将音频转为文本转录
        - 基于临床对话训练的自研 ASR 模型；GPU 计算基础设施
        - 医学术语 ASR 错误可能传导到笔记生成；亚专科词错误率未公布
      - - LLM / 笔记生成
        - 微调 LLM 将结构化转录转为 SOAP 或专科笔记草稿
        - 基于 1.5M+ 去标识化对话微调的自研 LLM；GPU 推理集群
        - 幻觉 / 编造风险；模型版本和更新治理未公开披露
      - - 编造检测护栏
        - 自动预审层在临床人员审核前检测并纠正无支撑声明
        - 专用分类模型基于 1,000+ 小时人工验证数据训练
        - 编造捕捉率 97%，对比 GPT-4o 82%（内部测试）；仍有 ~3% 残余错误率
      - - Linked Evidence 引擎
        - 将每句笔记映射到音频转录时间戳；支持点击核验
        - 生成文本与 ASR 转录之间的对齐模型
        - 笔记与转录之间可能出现对齐错误；未经独立审计
      - - Epic EHR 集成（Abridge Inside）
        - 将 Abridge 原生嵌入 Epic Haiku 和 Hyperdrive；无需切换到独立应用
        - Epic Workshop 合作伙伴关系；Epic API 和集成认证
        - 依赖 Epic 合作关系延续；任何 Epic 平台政策变化都是中断风险
      - - 临床决策支持层
        - 检索并浮出基于患者上下文的同行评议证据（UpToDate、NEJM、JAMA）
        - Wolters Kluwer UpToDate API；计划中的 NEJM Group 和 JAMA Network 内容协议
        - 检索准确率、延迟和证据时效性未经独立基准测试；NEJM/JAMA 尚未上线
    notes: 截至报告日期，基础设施托管方（原为 Microsoft Azure）尚未确认。模型更新节奏、版本回滚和 SLA 承诺未公开披露。
