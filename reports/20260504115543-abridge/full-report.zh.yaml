  - id: FI004
    title: Abridge 收入模型桥接
    type: flow
    layout: standard
    summary: Abridge 如何将临床医生层面的使用活动转化为企业 ARR 和毛利润。该流程展示按临床医生订阅的机制、企业合同汇总、ARR 构建，以及决定毛利率的关键 COGS 驱动因素。
    data:
      nodes:
        - id: n1
          label: 企业医疗系统买方
          detail: CIO/CMIO 签署企业合同；按临床医生支付年度订阅费；截至 2026 年中覆盖 150+ 医疗系统
        - id: n2
          label: 按临床医生订阅（约 2,500 美元/年）
          detail: 标价估计为每席每年 2,500 美元；企业批量折扣压低实际 ASP；通常为多年合同
        - id: n3
          label: 年度经常性收入（ARR）
          detail: Sacra 估计：2024 年约 6,000 万美元；2025 年 Q1 已签约约 1.17 亿美元；由医疗系统部署和扩张驱动（仅 UPMC 即有 12,000+ 名临床医生）
        - id: n4
          label: COGS：GPU 计算 + 人工 QA + 支持
          detail: 实时 ASR 和 LLM 推理需要 GPU 基础设施；人工 QA 审核可能仍在流程中；还包括客户成功/实施成本
        - id: n5
          label: 毛利润（估计约 60–75% 毛利率）
          detail: 基于企业级环境式 AI SaaS 规模化后的行业基准；随着自动化替代人工 QA，毛利率有望改善
        - id: n6
          label: 研发 + 管理费用 + 销售营销
          detail: 人员密集型运营费用；AI/ML 人才溢价；企业销售节奏导致 3–6 个月长周期
      edges:
        - from: n1
          to: n2
          label: 支付
        - from: n2
          to: n3
          label: 汇总为
        - from: n3
          to: n4
          label: 被抵消
        - from: n3
          to: n5
          label: 扣除 COGS
        - from: n5
          to: n6
          label: 支撑
    approximationNotes: 毛利率估计是基准代理值（60–75%），并非公司披露数字。收入模型流程基于公开记录的企业 SaaS 机制和第三方分析师估计。
