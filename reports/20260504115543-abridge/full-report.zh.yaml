            body: >
              按 $5.3 billion 的 Series E 估值和 Sacra 估计的 $100-117 million ARR 计算，Abridge 的隐含收入倍数约为 45-53x；这一水平远高于医疗 SaaS
              M&A 中常见的 6-8x ARR，也明显高于最佳后期私营成长公司的 10-20x 区间。若要在 IPO 时维持该倍数，需要医疗 AI SaaS 公开市场倍数继续高企，同时 Abridge 在 IPO
              窗口仍能证明 ARR 三位数增长。一旦增长放缓，后期投资人将面临实质倍数压缩和下行风险。
