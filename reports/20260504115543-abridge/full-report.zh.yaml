      - number: '8.4'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >
              上市医疗 SaaS 公司提供最透明的估值基准。生命科学垂直 SaaS 龙头 Veeva Systems (VEEV) 在 FY2025 按 27.5 亿美元收入计约以 6.5x EV/Revenue
              交易；鉴于其高留存、交叉销售轨迹和持久护城河，这已经是医疗 SaaS 中最优质的一档估值。高利润率医疗专业网络 Doximity (DOCS) 约按 7x EV/Revenue 交易，EBITDA 利润率超过
              40%，反映盈利能力和中等增长。企业级患者登记与支付平台 Phreesia (PHR) 按 6-8x 收入交易，符合亏损但仍增长的企业 SaaS。公开市场因此把纪律良好、高留存、中等增长的医疗 SaaS 定在
              6-8x 收入；Abridge 以 45x 签约 ARR 定价，意味着 6-7 倍溢价，必须靠已经证明的超高速增长来兑现。


              Microsoft 收购 Nuance 是最相关的 M&A 可比交易：以 197 亿美元收购 FY2020 收入 14.8 亿美元的公司，约为 13x 过去收入。Nuance 是医疗 AI
              语音与临床文档平台的既有玩家，正是 Abridge 瞄准的品类。一个成熟规模化龙头的收购倍数只有 13x，说明 Abridge 当前 45x 倍数嵌入了 Nuance 已经耗尽的增长期权溢价。Tempus AI
              在 2024 年 6 月 IPO 时，按 TTM 收入 5.62 亿美元估值约 61 亿美元（约 11x），为医疗 AI 公开市场定价提供了参照；而 PitchBook 记录显示，即便 Tempus，其 IPO
              定价也较此前私募峰值估值折价 38%。


              私募轮次可比样本较少，但仍有启发。直接的环境式 AI 书记员竞争者 Ambience Healthcare，在 2025 年 7 月 Series C 中约按 33x ARR 融资（估值 10 亿美元以上，ARR
              3,000 万美元），说明该板块确实享有高溢价倍数，但也说明 Abridge 在 1.17 亿美元 ARR 规模上的倍数高于 Ambience 所处规模。负面可比是 Olive AI：累计融资近 9
              亿美元、峰值估值 40 亿美元，随后战略失误、产品执行失败，并于 2023 年 10 月关停。Abridge 的产品有效性记录优于 Olive AI，但教训仍成立：增长停滞和资本市场收缩同时发生时，医疗 AI
              公司可能快速坍塌。
