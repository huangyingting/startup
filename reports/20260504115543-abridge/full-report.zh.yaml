            title: Epic 原生集成形成可防守分发
            body: >
              Abridge Inside 原生嵌入 Epic Haiku（移动端）和 Hyperdrive（桌面端），消除了会扼杀临床 AI 采用的工作流摩擦。Epic 装机基础覆盖约 70% 的美国医院，89%
              的美国患者在 Epic 系统中有记录。在 Epic 内成为优先的环境式 AI 伙伴，是极强的分发护城河。
            calloutType: strength
            claimRefs:
