      - number: '3.3'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              在主要直接竞品中，环境聆听和自动 SOAP 记录生成已是标配。所有供应商都提供实时或近实时记录交付，并声称支持从初级保健到外科亚专科的专科范围。真正差异化集中在五个维度：（1）EHR
              嵌入深度；（2）证据可追溯性；（3）语言广度；（4）临床编码集成；（5）KLAS/独立验证。


              在 EHR 嵌入上，Abridge 的「Abridge Inside」原生 Epic 集成具有独特性。Nuance DAX 是唯一另一个拥有 Epic
              嵌入工作流的供应商，但它作为单独应用运行，而不是原生系统功能。Suki 独特之处在于覆盖多个 EHR（Epic、Cerner、MEDITECH、Athenahealth），因此在非 Epic
              市场具备优势。Ambience、DeepScribe 和 Nabla 主要通过 API 集成面向 Epic 客户。


              在证据可追溯性上，Abridge 的 Linked Evidence 功能——把每一句 AI 生成文本映射回源转录片段——是临床差异化能力；Nuance DAX、Suki、Ambience 或
              DeepScribe 目前没有直接对应能力。AWS HealthScribe 在 API 层提供转录可追溯性，但缺少能在工作流中直接发挥作用的临床医生端 UI 层。


              在语言支持上，Nabla（35 种语言）领先，其次是 Abridge（28+ 种语言）。多数其他供应商支持少于 20 种语言，这给安全网医院和服务语言多元患者的联邦合格医疗中心留下缺口。


              在独立验证上，Abridge 拿到最高可用 KLAS 称号——2025 和 2026 年 Ambient AI Best in KLAS，是唯一连续两年获得最高称号的供应商。Ambience
              在已正式评估的供应商中拥有最高 KLAS 客户满意度得分（97.7）。Nuance DAX 和 Suki 过去获得过 KLAS 认可；DeepScribe、Nabla 和 AWS HealthScribe
              尚未获得独立 KLAS 排名。


              功能矩阵（T302）记录了截至 2026 年 Q2，各供应商在十项购买标准上的二元或等级能力覆盖。
            claimRefs:
              - CP040
              - CP041
              - CP013
