          - type: callout
            title: 患者同意诉讼暴露全行业责任风险
            body: >
              2025 年 12 月 Sharp Healthcare 诉讼显示，若未经患者明确同意便进行环境录音，并可能叠加 AI 生成同意陈述插入病历，会给部署 Abridge 的医疗系统以及 Abridge
              自身带来监管和民事责任。California 双方同意法是较高水位，但其他司法辖区出现类似案件也有现实可能。这是重大风险；一旦引发全行业监管审查，采用速度可能被压制。
            calloutType: risk
