      - number: '3.4'
        title: 竞争护城河与切换成本分析
        blocks:
          - type: paragraph
            body: >
              Abridge 的主要竞争护城河，是它在 Epic 原生应用层内的架构位置。「Abridge Inside」嵌入 Epic Haiku（移动端）和 Hyperdrive（桌面端），意味着医疗系统 IT
              团队不需要部署、认证或管理单独的环境式 AI 应用。它降低了通常有利于 Nuance DAX 等既有厂商的采购摩擦，也为 Epic 客户形成特定切换成本：替换 Abridge 不是简单取消第三方 SaaS
              合同，而是要从 Epic 原生供给的功能迁移出去。这是 Abridge 最持久的近中期护城河。


              第二层护城河是 KLAS 认可。医疗系统 CIO 和 CMIO 把 KLAS 评级视为供应商选择中的主要风险降低工具。2025 和 2026 连续两年 Best in KLAS，让 Abridge 成为 Epic
              重度医疗系统采购委员会默认的安全选择。只有竞争对手在后续评估周期取得同等认可，KLAS 护城河才会被侵蚀。


              Microsoft（Nuance DAX）则以分发护城河反击：Azure 关系让 Microsoft 企业客户团队可以进入同一批 C-suite 对话，那里也在谈云基础设施、网络安全和 EHR 服务。对于已经运行
              Azure 托管服务的医疗系统，购买 DAX Copilot 可以打包进既有 Microsoft 协议，缩短采购周期，并可能以低于市场的价格嵌入 DAX。


              环境式 AI 在合同层面的切换成本较低，但会随着临床定制加深而上升。一个拥有 500 名医生的医疗系统，如果已经配置了专科记录模板、反馈回路和 EHR
              字段映射，切换供应商需要数周到数月的重新配置工作。这种定制锁定有利于最先大规模部署的供应商——Abridge 正通过快速企业扩张利用这一先发优势。


              多供应商并行风险真实存在：若干医疗系统曾并行部署多个环境式 AI 工具（例如某条服务线用 Nuance DAX、另一条用 Abridge），在全企业签约前做内部比较。这种并行采用既是机会（Abridge
              可以凭质量赢得对比），也是风险（它会阻碍独家合同）。
            claimRefs:
              - CP039
              - CP041
              - CP042
              - CP043
              - CP048
      - number: '3.5'
        title: 不利证据与替代风险
        blocks:
          - type: paragraph
            body: >
              Abridge 以及所有第三方环境式 AI 供应商面临的最大替代风险，是 Epic 将原生环境式文档内置进核心产品，且不收取增量按席位费用。Epic 在美国医院 EHR 市场的主导份额（约 35% 医院；超过
              50% 中大型系统）给了它任何环境式 AI 初创公司都无法复制的结构性分发杠杆。Epic 的 Cosmos 去标识化患者数据网络和环境式 AI 计划显示，公司有意把环境式文档吸收为核心功能，而不是插件。若
              Epic 发布一个「足够好」、并纳入现有 Epic 授权的原生方案，Epic 医疗系统中第三方环境式 AI 的可触达市场会急剧收缩。Abridge 的「Abridge
              Inside」项目可能延后这一风险——Epic 选择 Abridge 作为优先环境式 AI 伙伴，正是因为 Abridge 质量超过 Epic 内部构建——但该合作可以重新谈判或终止。


              Nuance DAX 在复杂亚专科存在有记录的准确性投诉。多家学术医学中心的临床医生报告称，DAX 在外科和操作类专科生成的记录需要大量编辑，削弱了节省时间的收益。这与 DAX 声称 30+ 专科覆盖的深度不及
              Abridge 经 KLAS 验证的 50+ 专科覆盖相一致。不过，Microsoft 通过 Azure OpenAI 改进模型的节奏很快，这一差距可能在 12–18 个月内缩小。


              Sharp Healthcare 诉讼（2025 年 12 月）指控 AI 记录就诊缺少患者同意，是行业层面的不利信号。虽然诉讼列名的是医疗系统 Sharp Healthcare，而非 Abridge
              本身，但它给所有环境式 AI 供应商制造了先例风险。州级同意要求不一：California 的 CMIA 要求 AI
              录音取得明确书面同意，其他州也在推进类似法律。任何服务多州医疗系统的供应商，都必须在所有就诊类型中落实同意工具。Abridge 拥有同意功能；竞品同意工作流是否满足新兴州法标准，并没有被统一记录。


              商品化压力正在上升。AWS HealthScribe 提供可编程基础，多个资金充足的供应商在相似功能集上趋同，环境式 AI 的成本底线正在下降。只依赖文档质量、而没有 KLAS 验证、EHR
              集成深度或临床编码增值的供应商，会在续约周期面临价格压力。
