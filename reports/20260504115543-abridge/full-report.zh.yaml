      - number: '3.6'
        title: 展示材料
        blocks:
          - type: callout
            title: Abridge 是唯一拥有 Epic 原生嵌入的环境式 AI 供应商
            body: >
              「Abridge Inside」项目把 Abridge 原生嵌入 Epic Haiku 和 Hyperdrive，是该类别最可防守的竞争优势。包括 Nuance DAX 在内，没有其他供应商能作为原生 Epic
              系统功能运行，而不是应用覆盖层。这带来采购优势（无需部署单独应用）、用户体验优势（无需单独登录或同意工作流），以及切换成本优势（替代意味着迁离原生 EHR 功能）。
            calloutType: strength
