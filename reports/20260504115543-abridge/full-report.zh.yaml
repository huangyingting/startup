      - number: '3.2'
        title: 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              NUANCE DAX（Microsoft）：市场现任龙头。Microsoft 于 2022 年以 $19.7B 收购 Nuance Communications，继承了 Dragon Medical——全球
              600,000+ 名临床医生使用的主导临床语音识别产品。DAX Copilot 于 2024 年 2 月在 Epic 中全面可用，加入由 Azure OpenAI（GPT-4）驱动的环境式 AI 记录生成。到
              2024 年中，DAX Copilot 部署在 400+ 家医疗组织，其中 150+ 家使用 Epic、200+ 家使用 MEDITECH Expanse。临床医生报告文档时间减少 50%，每次就诊约节省 7
              分钟。Microsoft 的分发杠杆——直接向购买 Azure 云服务的同一批 C-suite 销售——是主要护城河。Nuance 支持 30+ 个专科。价格通常按企业谈判且未公开披露，但行业观察者估计，其价格与
              Abridge 相当或略低，原因是 Microsoft 希望借 Azure 打包扩大市场份额。


              SUKI：2017 年创立，总部位于 California 州 Redwood City。到 2024 年底累计融资约 $165M，其中 2024 年 10 月由 Hedosophia 领投 $70M D
              轮。投后估值约 $500M。Suki 部署在 300+ 个医疗系统和诊所。其差异化在于 EHR 集成广度——Epic、Oracle Cerner、MEDITECH 和
              Athenahealth——面向规模较小、不完全依赖 Epic 的中端医疗系统。Suki 也提供 Suki Platform，作为面向第三方开发者的 API。临床医生采用数据显示，文档速度最高提升
              72%。Suki 正扩展到护理文档和编码辅助。


              AMBIENCE HEALTHCARE：2023 年创立，总部 San Francisco。2025 年 7 月完成 $243M C 轮（Oak HC/FT 与 Andreessen Horowitz
              共同领投），累计融资达 $345M，估值 $1.25B。投资方包括 OpenAI Startup Fund 和 Kleiner Perkins。Ambience 部署在 40+ 家主要医疗系统，包括
              Cleveland Clinic（五年独家协议）、UCSF Health 和 Houston Methodist。公司称支持 100+ 个亚专科，并且是首家发布经第三方验证、CFO 批准且与编码准确性提升挂钩
              ROI 的环境式 AI 供应商。2025 年 KLAS 客户满意度得分 97.7。尚未公开确认 Epic 原生嵌入。


              DEEPSCRIBE：总部 San Francisco；累计融资 $60M。最知名的是 2024 年 7 月与 Ochsner Health 签订企业协议，覆盖 4,700 名雇佣和附属临床医生、46 家医院和
              370+ 家健康及急诊护理中心，是美国按临床医生数量计最大的环境式 AI 部署之一。DeepScribe 的差异化是 Customization
              Studio，可在不需要工程参与的情况下进行专科工作流调优。Ochsner 报告初始推广期间临床医生采用率为 75%。文档时间从 2–3 小时降至每份记录约 3–4 分钟。已集成 Epic。


              NABLA：2018 年创立，位于 France Paris。2025 年 6 月由 HV Capital 领投 $70M C 轮后，累计融资 $120M。服务 130+ 家医疗组织、85,000
              名临床医生，并以 35 种语言管理约 2,000 万次年度就诊。知名美国客户包括 CVS Health 和 Children's Hospital Los Angeles。Nabla 正从文档扩展到
              agentic AI 工作流——环境聆听、临床编码、EHR 命令动作——把自己定位为更广泛的临床 AI 平台。其多语言深度（35 种语言，对比 Abridge 的 28+）是服务多元人群的安全网医院的竞争差异点。


              AWS HEALTHSCRIBE：Amazon Web Services 于 2023 年 7 月推出 HealthScribe，这是建立在 Amazon Bedrock 上、符合 HIPAA 资格的 API
              服务。它面向构建环境式文档应用的医疗软件供应商和开发者，而非直接面向医疗系统买方。它输出结构化记录、转录文本和提取的临床实体，并能回溯到源转录文本。HealthScribe
              不使用客户数据训练模型。初始专科支持覆盖全科医学和骨科。它代表商品化底线：任何供应商都可以在 HealthScribe 之上搭建基础环境式书记员，把差异化压缩到工作流集成和 EHR 深度。
