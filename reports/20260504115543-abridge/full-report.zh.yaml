      - number: '7.4'
        title: 伦理与声誉风险
        blocks:
          - type: paragraph
            body: >
              环境式 AI 文档触及患者自主、知情同意，以及自动化系统在医疗中应扮演何种角色等根本伦理问题。Sharp/Abridge 诉讼中最令人警惕的指控是，EHR
              中的同意记录被虚假标记为已取得；若该指控成立，这将不是单纯法律责任，而是一次系统性诚信失灵。公众对环境式 AI
              文档的信任才刚形成且很脆弱：关于同意失效的媒体报道会放大患者对录音的焦虑，承受声誉压力的医疗系统即使没有法律强制，也可能收缩环境式 AI 部署。


              临床医生过度依赖的风险正在上升。环境式 AI 笔记一旦成为默认文档方式，临床医生可能减少对 AI 生成内容的核验，错误就会在未经纠正的情况下进入患者记录。包括白宫 AI Bill of Rights
              框架在内的监管和专业机构，已将这种动态识别为医疗场景中的高影响风险。AI 文档中的偏见，如给非英语患者和代表性不足群体生成更短、更不完整的笔记，会引发公平性担忧；除声誉损害外，还可能触发 OCR 依据
              Section 1557 进行民权执法。公司能否在企业级扩张中维持临床可信度，取决于其是否坚持独立偏见审计和透明错误报告。
            claimRefs:
              - CR030
              - CR031
              - CR032
              - CR033
              - CR018
              - CR007
      - number: '7.5'
        title: 缓释措施与投资论证失效条件
        blocks:
          - type: paragraph
            body: >
              Abridge 现有风险缓释措施包括 SOC 2 Type II 认证、面向所有医疗系统客户的 HIPAA BAA 基础设施、传输和静态状态下的音频加密、发布带有偏见评估披露的模型卡，以及跟踪 FDA SaMD
              动态的监管事务职能。公司的学术底色和 CEO Shiv Rao 的临床资质，给其带来声誉可信度，可部分抵消法律风险。不过，几项关键缓释缺口仍在：没有开展或披露独立的同意流程审计；FDA SaMD
              分类暴露尚未解决；云基础设施韧性没有公开文件；公司面对长期诉讼的财务缓冲也未知。


              投资论证失效框架识别了五类会实质损害投资论证的事件：同意诉讼中出现超过 1 亿美元的不利法院判决；FDA 将核心产品归为需上市前审查的 SaMD；Epic 终止 Abridge Inside 合作；ARR
              同比增速跌破 50%；或 CEO Shiv Rao 离任且未指定临床技术继任者。任一事件都需要对投资前提做根本性重估。投资者应建立早期预警监控机制：诉讼案卷更新、FDA 关于环境式 AI 分类的指引发布、Epic
              产品公告、季度 ARR 披露以及管理层变动。针对医疗 AI 供应商的网络安全事件正变得更频繁、更复杂，而 Abridge 面对国家级或复杂勒索软件威胁的防御态势尚无公开文件。
