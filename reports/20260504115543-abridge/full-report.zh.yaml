      - number: '8.3'
        title: 收入估算与 ARR 倍数分析
        blocks:
          - type: paragraph
            body: >
              Sacra 和 Modern Healthcare 报道披露，Abridge 截至 2025 年 Q1 的签约 ARR 为 1.17 亿美元；这代表已签署的经常性合同，而不是按 GAAP
              确认的收入。二者差异很重要：企业级医疗系统合同通常有 6 到 18 个月的爬坡期，临床医生逐步上线，因此任一时点确认收入可能只有签约 ARR 的 40-70%。Abridge 没有单独披露 GAAP
              收入，无法精确计算倍数。保守假设为确认收入等于签约 ARR 的 60-75%，则 GAAP ARR 约为 7,000 万至 8,800 万美元，隐含倍数上升到 60-75x，无论按什么基准都很极端。


              自下而上的估算也能支撑签约 ARR 数字：150 家医疗系统、平均合同金额每年 50 万至 100 万美元，对应 7,500 万至 1.5 亿美元的年化运行账单，覆盖已披露的 1.17
              亿美元。行业每名临床医生年费有据可查，约为 2,800 至 5,000 美元；大型 IDN 若以 2,000-5,000 名临床医生规模部署环境式 AI，全面部署后单一系统收入可达 560 万至 2,500
              万美元，说明部署爬坡仍有显著上行空间。


              53 亿美元 / 1.17 亿美元签约 ARR = 45x，是关键估值信号。可比参照包括：Nuance 收购为 13x 过去收入；Tempus AI IPO 为 11x TTM 收入；Doximity 在
              2021 年泡沫环境下 IPO 时约为 100x ARR，之后压缩到 7x；Ambience Healthcare Series C 约为 33x ARR。Abridge 只有在 ARR 每年维持 100%
              以上增长、且 NRR 保持 120% 以上时，45x 倍数才说得通。如果增速降至每年 50%（仍是顶级 SaaS 增长），IPO 时可持续倍数会压缩到约 20-25x；以 1.17 亿美元基础 ARR
              计，对应退出估值只有 23 亿至 29 亿美元，较 Series E 下降 43-57%。SaaS Capital 2025 年基准显示，私营医疗 SaaS 在 M&A 交易中的 ARR 倍数为
              7-10x，以当前 ARR 计战略底部为 8.2 亿至 11.7 亿美元，若没有持续超高增长，远低于 Series E 定价。
