      - number: '6.4'
        title: 客户集中度、留存与扩张信号
        blocks:
          - type: paragraph
            body: >
              客户集中度风险很实质，而且没有私有 ARR 数据几乎无法量化。UPMC 的 12,000 名临床医生企业级部署，按每名临床医生每年估计 $2,500 计算，意味着约 $30 million 年合同价值。若
              Abridge 总 ARR 为 $100-117 million（Sacra 估计），仅 UPMC 就可能占总收入 25-30%。没有其他具名客户披露可比规模的临床医生席位数；但 Kaiser
              Permanente 的 24,000+ 医生部署若完全铺开，潜在合同价值甚至可能更高。


              具名部署披露的合同范围显示扩张信号明确。Highmark/AHN 合作让 Abridge 从文档延伸到实时 prior authorization，新增一条收入流。Mayo Clinic
              扩张包括护理文档和医生文档。UPMC 2025 年 10 月企业级扩展公告是在此前更窄部署之后发生的，体现典型 land-and-expand dynamics。


              截至报告日期，公开渠道没有客户 churn、合同不续约或主动取消部署的证据。但这种不利数据缺失符合 IPO 前私营公司特征，公司没有披露客户流失义务。2025 年 12 月 Sharp Healthcare
              lawsuit 是部署层面的不利事件，但不是已确认客户流失。HCA Healthcare 是已确认竞争失单，这家美国最大医疗系统之一选择 Commure（收购了 Augmedix）作为其环境式 AI
              项目供应商，而不是 Abridge。这是 Abridge 客户记录中公开确认的最重要竞争失单。


              净收入留存率（NRR）完全私有。企业在席位数（UPMC、Mayo、Northwell）和范围（Highmark 增加 prior auth）上的扩张模式，与强 NRR 一致，但公开来源无法确认。
