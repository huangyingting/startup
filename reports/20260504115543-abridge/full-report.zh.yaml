              Microsoft 能把 Nuance DAX Copilot 打包进既有 Azure 企业协议，这给了它 Abridge 无法复制的销售动作。一个已经每年购买 $20M+ Azure
              服务的医疗系统，可能以大幅折扣或作为包含功能接受 DAX，使得与 Abridge 的质量比较让位于采购经济性。
