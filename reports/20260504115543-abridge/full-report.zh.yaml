      - number: '2.5'
        title: 尽调缺口与相互矛盾的估算
        blocks:
          - type: paragraph
            body: >
              若干重大数据缺口限制了市场规模判断精度：


              **TAM 估算相互矛盾：** 对「同一个」2024 年市场，分析师报告给出从 $538M 到 $4B+ 的区间，差异来自定义选择。这是新兴 AI
              市场的常见问题，类别定义仍不稳定。尽调应要求分析师提供一手数据和方法文件，而不是接受标题数字。


              **SAM 未经独立确认：** $1.5–4B 的 SAM 估算来自医生数量和按席位定价假设，使用的是公开报道的价格类比（不是 Abridge 特定确认价格）。实际合同条款仍为私密信息。


              **市场份额数据：** 没有公开的独立市场份额数据可比较 Abridge、Nuance DAX、Ambience 和 Suki。KLAS Best in KLAS 排名是满意度/价值代理，不是收入份额数字。


              **付款方市场采用时间：** 环境式文档向付款方/预授权和收入周期管理细分（Abridge 的增长领域）扩展仍处早期；仅凭公开数据尚无法可靠测算这一相邻市场。
            claimRefs:
              - CM027
              - CM028
      - number: '2.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 倦怠危机创造持久的董事会层级需求
            body: >
              医生倦怠是结构性医疗危机，不是一阵风。40% 的倦怠率叠加每年 $5.6B 的系统成本，已经让医疗系统董事会和 CFO 把临床文档自动化从便利功能提升为战略优先事项。这种持久、可量化的 ROI 驱动，是医疗
              SaaS 公司能拥有的最强需求条件之一。
            calloutType: strength
            claimRefs:
              - CM018
              - CM019
          - type: callout
            title: Epic 原生 AI 路线图是最重大的市场风险
            body: >
              Epic 自研 EHR 内环境式 AI 文档功能，是 Abridge 面临的结构性最强需求约束。若 Epic 将基础环境式书记功能打包进标准 EHR 合同，SAM 会实质收缩，Abridge
              的按席位价格也会承压。当前「Abridge Inside」合作可能延后这一风险，但不能消除。尽调必须评估 Epic Workshop 关系的排他性和商业条款。
            calloutType: risk
            claimRefs:
              - CM024
              - CM025
          - type: callout
            title: 市场定义不一致推高 TAM 叙事
            body: >
              分析师对「同一个」2024 年市场给出的数字从 $538M 到 $4B+ 不等。正确做法是把最窄且可防守的口径（GVR 的 $538M）作为保守锚点，同时承认 $3-4B 口径包含相邻
              CDI、编码和工作流自动化市场，而 Abridge 才刚开始进入这些市场。$2.75–5.3B 的估值已经把显著进入相邻市场计入价格。
            calloutType: insight
            claimRefs:
