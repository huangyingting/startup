  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式、定价与公开牵引力
        blocks:
          - type: paragraph
            body: >
              Abridge 的收入模式是企业 SaaS：医疗系统按临床医生、也就是按席位，支付年度订阅费，使用其环境式 AI
              临床文档平台。公开资料没有显示消费者端、按交易计费、支付方或药企收入流。企业定价不公开，必须通过企业销售团队谈判。采购只发生在医疗系统层面；没有面向个人医生或小型诊所的产品。


              第三方供应商对比和分析师摘要普遍估计，Abridge 面向单名临床医生的标价约为每年 $2,500（约 $208/月），公开区间为每名临床医生每年 $2,500 至
              $7,200，取决于采购规模、合同期限和实施范围。这个价格低于 Nuance DAX Copilot（估计每名服务提供者每月 $369-$830+，企业端通常为 $600/月），但高于
              Nabla（$119/月）或 S10.ai（$99/月）等商品化 scribes。人工 scribes 每个等效岗位每年约 $45,000-$65,000，比当前价位的 AI 替代方案高 60-75%。


              外部最可用的收入估计来自独立分析机构 Sacra。Sacra 估计 Abridge 2023 年底 ARR 约为 $6 million，到 2024 年底增至约 $60 million ARR，同比约增长
              900%。2025 年 Q1 的已签约 ARR 据报约为 $117 million，活跃 ARR 到 2025 年 5 月达到 $100 million。这些都是第三方估计；Abridge
              没有发布任何官方收入数据。毛利率、净收入留存率（NRR）以及按产品线拆分的收入均为私有指标，公开来源无法取得。


              Abridge 已开始把收入从核心文档业务向外延伸：Contextual Reasoning Engine（2025 年 2 月推出）瞄准收入周期智能；Abridge for Nurses
              将平台扩展到护理文档；2026 年 4 月与 NEJM/JAMA 的合作则为公司后续临床决策支持变现打开位置。这些相邻收入流仍处在商业化前或商业化早期，代表尚未体现在当前 ARR 估计中的未来收入上行空间。
