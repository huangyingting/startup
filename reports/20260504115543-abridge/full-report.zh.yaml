      - number: '6.3'
        title: 临床结果、客户满意度与 KLAS 证据
        blocks:
          - type: paragraph
            body: >
              Abridge 的独立客户满意度证据强于几乎所有其他环境式 AI 文档供应商，锚点包括连续两年的 KLAS Best in KLAS 称号，以及多个具名部署的量化临床结果。


              KLAS Research 于 2025 年 1 月和 2026 年 2 月将 Abridge 评为 Ambient AI 的 #1 Best in KLAS，后者公布得分为
              94.7/100，是该类别最高分。KLAS 排名通过对医疗机构领导者和临床医生的直接独立访谈编制，并对 culture、loyalty、relationship、value 等维度加权。2025 和 2026
              两个周期连续 #1，为客户满意度提供了强独立佐证。


              Corewell Health 公开披露的 90 天 pilot 数据（2024 年 12 月）是 Abridge 组合中最细颗粒度的临床结果数据集：90% 的临床医生表示对患者的注意力显著提升；61%
              表示认知负荷下降；下班后文档时间减少 48%（周均从 4.3 小时降至 2.2 小时）；85% 的工作满意度提高；超过 50% 表示 burnout 下降。这些数据作为受控 pre/post pilot
              结果报告，而不是一般调查情绪。


              Kaiser Permanente 报告称，87% 的医生把 Abridge 视为工作日中最显著的改善。Highmark Health/AHN 报告称，92%
              的患者觉得医护人员更专注。这些数字由医疗系统报告，未经独立审计，但来自已发布新闻稿，并在不同站点之间方向一致。


              限制包括：所有结果数据均来自对正面结果有财务或战略利益的医疗系统（其中一些也是投资人）；尚未有 Abridge 在企业级规模下的随机对照试验证据发表；留存率、NRR 和合同续约数据全部私有且不可取得。
