  - id: FE002
    title: 临床医生工作流 — 环境式文档旅程
    type: flow
    layout: standard
    summary: 临床医生在启用 Epic 的患者问诊中使用 Abridge 的逐步流程。工作流从临床医生登录开始，以签署病历进入 EHR 结束。关键交接点包括草稿病历审核（人在回路要求）和可选的 Linked Evidence 验证步骤。
    data:
      nodes:
        - id: n1
          label: 临床医生通过 Epic Haiku（移动端）或 Epic Hyperdrive（桌面端）的 SSO 登录
          detail: 企业 SSO；不需要单独的 Abridge 应用；由医疗系统 IT 配置基于角色的访问权限
        - id: n2
          label: 临床医生在患者问诊开始时启动录音
          detail: 在 Haiku 中单击或在 Hyperdrive 中点击；环境录音开始；无需脚本化提问
        - id: n3
          label: 患者问诊期间采集环境音频
          detail: 专有 ASR 实时将语音转为带时间戳的转录文本；支持多人临床对话
        - id: n4
          label: Contextual Reasoning Engine 处理转录文本
          detail: LLM 生成结构化 SOAP/专科病历草稿；CRE 加入患者历史上下文、账单编码和候选医嘱
        - id: n5
          label: 虚构护栏审核并修订草稿
          detail: 安全模型识别无支撑的说法；在临床医生看到病历前修订或标记；声称内部捕获率为 97%
        - id: n6
          label: 临床医生在 Epic 中结合 Linked Evidence 审核草稿病历
          detail: 临床医生点击草稿中的任意句子，对照源音频转录进行验证；随后编辑或接受
        - id: n7
          label: 临床医生签署病历；病历进入 EHR 患者记录
          detail: 强制签署步骤；只有临床医生明确批准后，病历才进入 EHR；CDS 洞察和医嘱提示仍可用
