            - text: AB 3030 AI 披露合规（CA）
              tone: warning
            - text: HIPAA Security Rule 更新；多州同意权暴露；病历中的 AI 偏见
              tone: negative
            - text: Sharp / Abridge CIPA 集体诉讼（100k+ 名患者；理论赔付 5 亿美元+）
              tone: negative
        - label: 中等概率
          values:
            - text: FTC AI Comply 审查；CMS 证明要求
              tone: warning
            - text: 云集中风险；模型准确性缺口；EHR API 漏洞
              tone: warning
            - text: FDA SaMD 分类；HIPAA OCR 执法；Epic 合作终止
              tone: negative
        - label: 低概率
          values:
            - text: —
              tone: neutral
            - text: 联邦健康数据法优先适用；临床医生过度依赖；治理缺口
              tone: warning
            - text: CEO 离职；供应商医疗过失判决；大规模 PHI 泄露
              tone: negative
    approximationNotes: 概率和严重程度评级为基于公开证据的分析师评估。矩阵使用序数评分；多数单元格没有可用的数值概率估计。
