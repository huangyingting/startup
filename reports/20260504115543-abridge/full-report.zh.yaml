  - id: FE001
    title: Abridge 产品架构栈
    type: stack
    layout: standard
    summary: Abridge 临床 AI 平台的五层架构，从临床界面层的音频采集，到语音识别、LLM 病历生成、安全护栏和 EHR 交付。Linked Evidence 系统作为横向层嵌入，在每个病历交付点将生成文本连接回源音频。
    data:
      layers:
        - label: 第 1 层 — 临床界面（患者问诊）
          detail: iOS Haiku 应用（移动端）或 Epic Hyperdrive 浏览器（桌面端）；由临床医生启动环境音频录制；无需脚本化互动即可采集对话
        - label: 第 2 层 — 自动语音识别（ASR）
          detail: 专有临床级语音转文本引擎；实时转录；基于医学术语和多人临床对话训练；输出带时间戳的转录文本
        - label: 第 3 层 — LLM 病历生成
          detail: 在 150 万+ 去标识化临床问诊上微调 LLM；将转录转为结构化 SOAP 或专科病历；CRE 加入患者历史上下文、账单编码对齐和 EHR 医嘱提取
        - label: 第 4 层 — 虚构检测与安全护栏
          detail: 基于 1,000+ 小时人工验证训练的专用分类器；采用双轴框架（支持程度 × 严重性）；在临床医生审核前自动修正无支撑的说法；内部评估声称 97% 捕获率
        - label: 第 5 层 — Linked Evidence 与 EHR 交付
          detail: 将每个生成句子对齐到源转录时间戳；临床医生在 Epic 中看到带可点击出处的草稿；临床医生审核、编辑并签署；病历只有在明确签署后才进入患者记录
        - label: 横向层 — 临床决策支持与收入周期智能
          detail: UpToDate/NEJM/JAMA 证据层在患者语境中呈现同行评议内容（CDS 模块）；CMS-HCC 账单编码提取和 EHR 医嘱捕获与病历生成并行运行（CRE/RCI 模块）
