  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Abridge 所处细分可分为八类竞争者：（1）直接环境式 AI 书记员供应商（Nuance DAX、Suki、Ambience Healthcare、DeepScribe、Nabla）；（2）提供环境式文档
              API 的云平台 AI-as-a-service 供应商（AWS HealthScribe）；（3）建设原生环境式 AI 的主导 EHR 厂商（Epic
              Systems）；（4）现状方案：真人医疗书记员和离岸转录服务；（5）添加环境式功能的相邻 CDI 厂商（M*Modal、nThrive）；（6）被重新用于文档的通用企业 AI 工具；（7）Oracle
              Health 原生 AI 等新进入者；（8）更小的精品环境式 AI 厂商。


              直接供应商市场增长迅速、风投资金升温，功能集趋同。所有主要厂商都支持环境聆听、自动生成 SOAP 记录，以及某种 EHR 集成。因此，差异化越来越取决于 EHR
              嵌入深度、复杂亚专科临床准确性、语言覆盖、证据可追溯性和监管定位。Abridge 在 2025 和 2026 年拿到 Ambient AI 的 KLAS Best in KLAS，且是唯一原生嵌入 Epic
              Haiku 移动端和 Hyperdrive 桌面端应用的供应商。相比之下，即使 Microsoft 的 Nuance DAX 通过 Epic App Orchard
              销售且深度集成，也仍作为单独应用层运行，而不是原生系统功能。这一区别对医疗系统 CIO 重要，因为原生嵌入消除了单独登录、单独同意工作流和单独数据处理协议。


              现状竞争者——真人医疗书记员——仍很有力量。美国约有 100,000 名医疗书记员，每名医生等效每年成本 $35,000–$60,000。多数采用环境式 AI
              的医疗系统把替代书记员成本作为主要财务理由。即使不计医生时间节省，环境式 AI 的按席位价格（$3,000–$8,000/年）相对书记员也具备有吸引力的 ROI。
