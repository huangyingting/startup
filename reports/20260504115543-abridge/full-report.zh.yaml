      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >
              医疗文档 AI 市场的买方/用户/付款方结构复杂，不同于典型企业 SaaS：


              **主要买方（预算决策）：** 医疗系统 CIO、CMIO 或 CMO，超过一定门槛的合同通常需要 CFO 最终签字。大型医疗系统的 IT 委员会往往会进行正式评估（试点 → 临床冠军 → 企业
              RFP）。企业平均销售周期为 6–18 个月。


              **终端用户：** 医生、执业护士、医师助理，以及越来越多的护士。用户采用和满意度至关重要，因为医生抵触可以否决企业续约。临床冠军会推动工具在医疗系统内病毒式扩散。


              **付款方（预算来源）：** 几乎完全来自医疗系统运营预算（不是保险报销）。部分系统用医生生产率/效率节省来论证 ROI；也有系统把它归为留任和降低倦怠投资。目前没有专门对应环境式文档的 CMS 报销代码。


              **按规模分层：**

              - 大型学术医学中心（AMCs）和整合交付网络（IDNs）：早期采用者，最有能力资助试点和企业合同；也是 Abridge 的主要滩头阵地。

              - 社区和区域医院：体量大、成本敏感；价格和实施简易度是关键触发因素。

              - 大型医生集团和多专科诊所（MSPs）：增长中的细分；可能直接购买，也可能通过医疗系统关系购买。

              - 农村和关键接入医院：体量较小，但倦怠影响高；成本和连接性约束限制渗透。


              **采购触发事件：**

              - Epic EHR 升级或新 Epic 实施（为 Abridge Inside 创造自然切入点）。

              - 倦怠调查显示文档是头号压力源。

              - 竞争情报显示对标医疗系统已部署环境式 AI。

              - KLAS 排名周期触发技术评估。
