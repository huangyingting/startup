  foundingLocation: "Pittsburgh, PA"
  headquarters: "Pittsburgh, PA / San Francisco, CA"
  productSummary: |
    Abridge's core product is an ambient AI clinical documentation platform — a mobile and
    web application that listens to clinician-patient encounters and automatically generates
    specialty-specific SOAP notes, embedded natively in Epic's EHR (Haiku and Hyperdrive).
    Its proprietary Contextual Reasoning Engine uses large language models trained on
    de-identified clinical conversations. Notes include "Linked Evidence" — each claim in
    a note is anchored to a specific moment in the transcript, enabling physician verification.
    The platform supports 50+ medical specialties and multiple languages. Abridge is expanding
    into revenue cycle intelligence (clinical coding) and clinical decision support via
    partnerships with major medical journals.
  customerFocus: "U.S. health systems (CIO/CMIO buyer); enterprise contracts; 150+ health systems as of February 2025"
