  - id: s205
    title: Diligence Gaps and Contradictory Estimates
    body: |
      Several material data gaps limit precision in market sizing:

      **Contradictory TAM estimates:** Analyst reports range from $538M to $4B+ for "the same"
      2024 market depending on definitional choices. This is a common problem in nascent AI markets
      where category definitions are still unsettled. Diligence should request primary source data
      and methodology documentation from analysts rather than accepting headline numbers.

      **SAM is not independently confirmed:** The $1.5–4B SAM estimate derived from physician counts
      and per-seat pricing assumptions uses publicly reported pricing analogues (not Abridge-specific
      confirmed pricing). Actual contract terms remain private.

      **Market share data:** No independent market share data for Abridge vs. Nuance DAX vs. Ambience
      vs. Suki is available publicly. KLAS Best in KLAS ranking is a satisfaction/value proxy, not
      a revenue share figure.

      **Payer market adoption timing:** The expansion of ambient documentation into the payer/pre-
      authorization and revenue cycle management segments (Abridge's growth area) is early-stage;
      sizing this adjacency reliably is not yet possible with public data.
    claimRefs:
      - CM027
      - CM028
