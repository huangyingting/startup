callouts:
  - calloutType: strength
    title: Burnout Crisis Creates Durable, Board-Level Demand
    body: |
      Physician burnout is a structural healthcare crisis, not a trend. With 40% burnout prevalence
      and $5.6 billion in annual system cost, health system boards and CFOs have moved clinical
      documentation automation from a convenience feature to a strategic priority. This durable,
      quantifiable ROI driver is one of the strongest demand conditions a healthcare SaaS company
      can have.
    claimRefs:
      - CM018
      - CM019
  - calloutType: risk
    title: Epic's Native AI Roadmap Is the Most Significant Market Risk
    body: |
      Epic's own development of ambient AI documentation features within its EHR platform represents
      the most structurally significant demand constraint for Abridge. If Epic bundles basic ambient
      scribing into standard EHR contracts, the SAM shrinks materially and Abridge's per-seat pricing
      faces compression. The current "Abridge Inside" partnership may delay this risk but does not
      eliminate it. Diligence must assess the exclusivity and commercial terms of the Epic Workshop
      relationship.
    claimRefs:
      - CM024
      - CM025
  - calloutType: insight
    title: Market Definitional Inconsistency Inflates TAM Claims
    body: |
      Analysts cite $538M to $4B+ for the "same" 2024 market. The correct approach is to use the
      narrowest defensible scope ($538M, GVR) as the conservative anchor and recognize the $3-4B
      figures include adjacent CDI, coding, and workflow automation markets that Abridge is only
      beginning to address. The valuation at $2.75–5.3B already prices in significant expansion into
      adjacent markets.
    claimRefs:
      - CM027
      - CM028
