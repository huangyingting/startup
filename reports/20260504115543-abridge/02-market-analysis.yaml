  - id: s202
    title: Market Sizing — Multiple Lenses
    body: |
      Market sizing for ambient AI clinical documentation varies substantially depending on the
      definitional boundary chosen. Several credible but methodology-differentiated estimates exist:

      **Lens 1 — AI Platform for Clinical Conversations (Grand View Research, 2024):**
      The narrowest scope most relevant to Abridge's direct market. GVR pegged this segment at
      $538 million in 2024, with a 25.7% CAGR projected through 2033, reaching $4.19 billion. This
      figure captures ambient AI scribes and related clinical conversation analytics but excludes
      broader CDI and workflow automation.

      **Lens 2 — Ambient Clinical Documentation Market (DataIntelo/GrowthMarkets, 2025):**
      A broader segment including ambient listening, real-time note generation, and AI-assisted
      documentation in all care settings. Estimated at $1.85 billion in 2024 and $3.8 billion in
      2025, forecast to reach $18.6 billion by 2034 at a 19.3% CAGR.

      **Lens 3 — AI-Powered Clinical Documentation (HealthcareResearchReports, 2025):**
      $4.01 billion in 2025, projected to $13.99 billion by 2030 at 28.3% CAGR. This scope
      may include AI-assisted coding and CDI tools not exclusively ambient.

      **Lens 4 — Bottom-Up: U.S. Physician Addressable Market:**
      The U.S. has approximately 1 million physicians with ~800,000 in active patient care. If per-
      seat SaaS pricing for ambient AI documentation is in the $3,000–$8,000/year range (consistent
      with reported enterprise contract structures), the U.S.-only TAM is approximately $2.4–6.4
      billion/year. Of this, Epic-affiliated health systems (42% of acute care hospitals by count,
      55% by beds) represent the best-positioned SAM for Abridge, estimated at $1.5–4 billion.

      **Contradiction note:** The wide spread in estimates ($538M vs. $3.8B vs. $4B for similar
      periods) reflects definitional inconsistency; analysts use different scope boundaries (ambient
      only vs. CDI broadly) and different methodologies. Conservative buyers should anchor on the
      narrowest scope ($538M, 2024) while recognizing rapid growth is consistent across all lenses.
