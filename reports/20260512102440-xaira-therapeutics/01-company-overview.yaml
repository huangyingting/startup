company:
  name: Xaira Therapeutics
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Xaira Therapeutics launched in April 2024 with more than $1 billion of committed capital to build an end-to-end AI
    drug discovery company spanning machine learning, industrial-scale data generation, and therapeutic product
    development. The company has assembled an unusually deep bench from Genentech, the University of Washington
    Institute for Protein Design, and blue-chip biotech investors, but it remains preclinical, has not disclosed a
    current valuation or clinical timeline, and carries reputational risk tied to CEO Marc Tessier-Lavigne’s Stanford
    controversy.
sections:
  - id: identity-mission
    title: Identity, scope, and business model
    body: >-
      Xaira Therapeutics is an AI-native biotechnology company headquartered in South San Francisco and positioned as an
      end-to-end drug discovery and development platform rather than a point-solution software vendor. Official
      materials consistently describe three integrated pillars: advanced machine learning research, expansive data
      generation, and therapeutic product development. The company’s stated aim is to make biology “more computable,”
      use frontier models to identify the right biology and molecules, and ultimately shorten the path from lab insight
      to medicines for targets that have historically been considered difficult or impossible to drug. In practice, that
      means Xaira wants to operate simultaneously as a model builder, a wet-lab data generator, and a pipeline company.
      Goldman Sachs-hosted remarks and launch reporting reinforce that the company is trying to connect target
      identification, molecular design, and clinical development in one stack. This positioning matters because it
      implies higher capital intensity and execution scope than a typical platform biotech, but it also gives Xaira more
      control over where value accrues if its models begin to produce differentiated assets. Public sources support the
      identity and ambition, while leaving revenue, valuation, and customer metrics undisclosed.
    claimRefs:
      - CO001
      - CO003
      - CO004
      - CO005
      - CO006
      - CO018
      - CO028
      - CO037
      - CO038
      - CO039
      - CO040
    tableRefs:
      - TO001
    figureRefs:
      - FO002
      - FO003
  - id: founders-origin
    title: Founders and scientific starting point
    body: >-
      Xaira’s founding story combines elite scientific origin with heavyweight venture incubation. Official bios
      identify David Baker, Marc Tessier-Lavigne, and Hetu Kamisetty as co-founders, while launch coverage also frames
      ARCH’s Robert Nelsen and Foresite’s Vik Bajaj as the venture architects who assembled the company. The scientific
      core clearly comes from Baker’s Institute for Protein Design at the University of Washington, where RFdiffusion
      and RFantibody emerged and where several early Xaira researchers trained. Launch materials also state that Xaira
      incorporated functional genomics capabilities spun out from Illumina and a proteomics group from Interline
      Therapeutics, giving the company broader biological data-generation capability than a pure protein-design startup.
      That combination helps explain why management repeatedly describes Xaira as building across biology discovery,
      design of drug-like matter, and clinical development instead of focusing only on antibody design. The result is a
      company with genuine cross-disciplinary breadth from day one, but also one whose founding narrative spans multiple
      constituencies and therefore requires careful governance and operating alignment as it scales.
    claimRefs:
      - CO002
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO021
      - CO029
    tableRefs:
      - TO002
  - id: leadership-governance
    title: Leadership bench, board, and governance coverage
    body: >-
      The current leadership team is unusually senior for a company that still has no disclosed clinical-stage asset.
      Marc Tessier-Lavigne brings prior Genentech and academic leadership experience. Hetu Kamisetty anchors the AI/ML
      stack, while Debbie Law, Paulo Fontoura, Bo Wang, Jeff Jonker, and Rachel Lane were added across 2024–2026 to
      deepen scientific, medical, AI, operating, and partnership capabilities. The board and scientific advisory bench
      are also exceptional on paper, with Scott Gottlieb, Alex Gorsky, Carolyn Bertozzi, Richard Scheller, Robert
      Nelsen, and others spanning regulatory, big pharma, venture, and Nobel-level science. That breadth gives Xaira
      more coverage than most early-stage biotechs for governance, recruiting, and eventual partnering. It also
      concentrates a large portion of the company’s external credibility in a small set of marquee names. Marc and David
      Baker remain the two most visible identity anchors; if either were to disengage or lose credibility, the impact on
      recruiting, fundraising, and external trust would likely be disproportionate. The high-caliber bench is a genuine
      strength, but it does not eliminate key-person or oversight risk.
    claimRefs:
