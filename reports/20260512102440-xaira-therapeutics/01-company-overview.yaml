  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: current-private-valuation
      missingEvidence: >-
        A contemporaneous equity valuation, ownership breakdown, and any post-launch financing terms beyond the original
        committed-capital announcement.
      whyItMatters: >-
        Without a current valuation or ownership stack, investors cannot assess entry price, dilution risk, or how much
        of the early capital base has already been consumed.
      diligencePath: >-
        Request the current cap table, board-approved financing materials, and any updates to committed-capital draw
        schedules from management or lead investors.
      relatedQuestionRefs:
        - QO016
        - QO024
    - type: private-evidence-only
      severity: material
      topic: to003-investor-rights-and-governance
      missingEvidence: >-
        Precise ownership, board-observer rights, protective provisions, and any staged funding conditions for the
        stakeholder map in TO003.
      whyItMatters: >-
        The stakeholder map is only partial without the control rights and economic weights attached to ARCH, Foresite,
        and the broader syndicate.
      diligencePath: >-
        Request the current cap table, investor rights agreements, and board materials that clarify voting power, board
        seats, and draw conditions.
      relatedQuestionRefs:
        - QO015
        - QO016
      relatedTableRefs:
        - TO003
    - type: private-evidence-only
      severity: material
      topic: cash-and-capital-draw
      missingEvidence: Actual cash on hand, burn, and the schedule or contingencies for converting committed capital into usable cash.
      whyItMatters: >-
        Committed capital and cash are not the same thing; runway, fundraising urgency, and underwriting confidence
        depend on the difference.
      diligencePath: >-
        Request treasury, budgeting, and financing documents that reconcile committed capital, capital called to date,
        and planned operating spend.
      relatedQuestionRefs:
        - QO015
        - QO024
    - type: private-evidence-only
      severity: material
      topic: current-headcount-by-site
      missingEvidence: >-
        A current 2026 headcount broken out by South San Francisco, Seattle, and London, plus functional allocation
        across AI, biology, and therapeutic development.
      whyItMatters: >-
        Xaira’s competitive advantage depends on actual internal scale and balance across model building, wet-lab
        generation, and development; stale 2024 numbers are not enough.
      diligencePath: Obtain the current org chart, site roster, and hiring plan from HR or operations leadership.
      relatedQuestionRefs:
        - QO012
        - QO013
    - type: private-evidence-only
      severity: material
      topic: pipeline-and-clinical-timing
      missingEvidence: >-
        Named internal programs, first IND timing, and specific development milestones linking platform outputs to human
        studies.
      whyItMatters: >-
        The company’s overview cannot be fully underwritten without knowing when its platform is expected to produce
        testable human assets and what the first asset classes will be.
      diligencePath: >-
        Request a pipeline review with candidate names, modality, indication, stage, and expected IND-enabling or
        clinical milestones.
      relatedQuestionRefs:
        - QO018
        - QO023
