      - TE004
  - id: dependencies-and-roadmap
    title: Critical dependencies, differentiation, and roadmap
    body: >-
      Xaira's moat, if it proves durable, is likely to come from owning the closed loop between
      proprietary interventional data, model training, wet-lab validation, and therapeutic
      translation. The official story and third-party reporting both point to that. Orion and Pisces
      provide the scale of causal data; X-Cell applies a diffusion architecture and biological
      priors on top; GeekWire describes the wet-lab protein-testing infrastructure that closes the
      loop; and company leadership continues to describe future expansion into primary cells,
      iPSC-derived cell types, organoids, in vivo perturbations, and antibody therapeutics. That
      roadmap is ambitious and directionally coherent. It also shows where the main dependency risks
      sit: 10x-linked perturbation workflows, large-scale experimental operations, external
      biological priors, GPU compute, developer-release channels, and the still less-disclosed
      protein-design layer tied to Xaira's Institute for Protein Design roots. Public signals show
      the platform is still in buildout mode, including hiring activity in March 2026. But public
      proof today remains front-loaded toward data and model releases, not toward named,
      Xaira-originated clinical or commercial outputs. The roadmap is therefore promising, but still
      materially ahead of the public proof package.
    claimRefs:
      - CE013
