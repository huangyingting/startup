  evidenceGaps:
    - type: missing-source
      severity: material
      topic: external-product-proof
      missingEvidence: >-
        Named external customers, pricing, production deployments, support terms, or other proof
        that Xaira has already commercialized X-Cell or related software artifacts externally.
      whyItMatters: >-
        Without this evidence, the public surface looks like a research and platform release rather
        than a validated software business or externally deployed product.
      diligencePath: >-
        Request signed collaboration or software agreements, deployment case studies, external-user
        references, and any product support or uptime commitments.
      relatedQuestionRefs:
        - QE003
        - QE021
        - QE024
      relatedTableRefs:
        - TE001
        - TE002
        - TE005
    - type: missing-source
      severity: material
      topic: public-shipment-completeness
      missingEvidence: >-
        Fully downloadable weights, inference code, and complete public Pisces dataset files for the
        announced X-Cell ecosystem.
      whyItMatters: >-
        The public release is technically inspectable but still incomplete, which limits
        reproducibility, community benchmarking, and diligence on actual runtime behavior.
      diligencePath: >-
        Confirm shipment dates, access paths, supported model variants, and whether private partner
        access already exists beyond the public 'coming soon' surface.
      relatedQuestionRefs:
        - QE011
        - QE016
        - QE022
        - QE024
      relatedTableRefs:
        - TE001
        - TE004
        - TE005
    - type: private-evidence-only
      severity: material
      topic: protein-design-stack-disclosure
      missingEvidence: >-
        Internal documentation showing how Xaira's protein-design and antibody-design tooling is
        wired into the causal-biology stack and which named programs it has already generated.
      whyItMatters: >-
