        central to whether Xaira can translate data-model advantage into differentiated
        therapeutics.
      diligencePath: >-
        Request architecture reviews, throughput metrics, named program examples, and evidence that
        internal molecule-design outputs are feeding active portfolio decisions.
      relatedQuestionRefs:
        - QE014
        - QE015
        - QE024
        - QE025
      relatedTableRefs:
        - TE001
        - TE003
        - TE005
    - type: missing-source
      severity: material
      topic: compliance-and-quality-controls
      missingEvidence: >-
        Public or private audit materials covering security certifications, software development
        controls, data-governance standards, or regulated-quality systems for X-Cell and X-Atlas.
      whyItMatters: >-
        Corporate privacy language does not substitute for product-grade trust evidence, especially
        if Xaira later wants regulated or enterprise adoption.
      diligencePath: >-
        Request SOC 2 or ISO reports if any exist, secure-development policies, access-control
        documentation, and any GxP or regulated-quality procedures tied to the public stack.
