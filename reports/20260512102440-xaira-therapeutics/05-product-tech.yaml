      - FE002
  - id: trust-and-release-maturity
    title: Trust, release maturity, and compliance posture
    body: >-
      The public trust posture is real but limited. Xaira's privacy policy, effective January 1,
      2025, states that the company uses technical, organizational, and administrative security
      measures, conducts fraud protection and debugging, and collects analytics and cookie data in
      connection with its services. Its careers page also includes a job-scam alert that warns
      candidates away from unofficial recruitment channels. Those are genuine trust controls, but
      they are corporate-web controls, not product-grade validation for X-Cell or X-Atlas. At the
      product level, the clearest public guardrail is actually a limitation: the model card says
      X-Cell is intended for research use in computational biology and genomics, not clinical
      decision-making. Public release maturity is also still partial. The GitHub repo, docs site,
      and Hugging Face cards provide a visible developer surface, but weights and inference code are
      still marked 'coming soon,' and the Pisces dataset card says files are still coming and that
      the dataset viewer is unavailable. No reviewed public source disclosed SOC 2, ISO 27001,
      HIPAA, GxP, 21 CFR Part 11, uptime SLAs, or enterprise support commitments for these
      artifacts. For diligence, that means the release is credible enough to inspect but not
      complete enough to underwrite as production infrastructure.
    claimRefs:
      - CE016
      - CE017
      - CE026
      - CE027
      - CE028
      - CE029
      - CE030
      - CE035
      - CE036
      - CE039
      - CE040
