  - id: TE002
    slug: workflow-use-case-table
    title: Workflow / use-case table
    description: >-
      How Xaira says the platform is meant to be used in scientist workflow terms, including where
      public evidence stops.
    columns:
      - User job
      - Current workflow
      - Xaira solution
      - Claimed benefit
      - Limitation
    rows:
      - - Causal target discovery
        - Run large perturbation experiments to see how genes influence cell state
        - FiCS Perturb-seq + Orion/Pisces supply genome-scale interventional training data
        - Improves target discovery with causal rather than purely observational cell biology
        - No public evidence yet of Xaira-originated target nominations entering clinic
      - - Perturbation response prediction
        - Scientists run wet-lab CRISPRi screens and then model unseen interventions
        - X-Cell predicts transcriptional responses to gene knockdowns in unseen contexts
        - Could reduce experimental load and prioritize follow-up biology faster
        - Public API, weights, and inference code are not fully shipped yet
      - - Mechanism-of-action and patient stratification hypothesis generation
        - Interpret pathway response after perturbation and connect it to disease setting
        - >-
          Xaira claims X-Cell can support MoA identification, target-patient matching, and toxicity
          prediction
        - Creates a bridge from cell-state modeling toward translational decisions
        - >-
          Applications remain prospective in public sources rather than externally validated
          workflows
      - - Protein / antibody design against hard targets
        - >-
          Use generative design models plus wet-lab testing to create binders and therapeutic
          proteins
        - Seattle molecule-design team builds on IPD-derived models and high-throughput validation
        - Could open difficult or 'undruggable' targets and accelerate iteration
        - Exact production stack, throughput, and named Xaira-designed antibodies remain undisclosed
      - - Internal therapeutic program generation
        - Convert model and assay insights into owned drug programs
        - Management says the platform comes first and the pipeline follows from it
        - Makes Xaira more like an integrated techbio builder than a tools vendor
        - >-
          Public proof is still strongest at the data/model layer rather than downstream asset
          disclosures
    notes: >-
      This table maps claimed use cases, not proven external customer deployments. Benefit
      statements stay close to what sources support publicly.
    claimRefs:
