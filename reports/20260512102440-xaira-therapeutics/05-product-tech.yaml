tables:
  - id: TE001
    slug: product-module-asset-matrix
    title: Product module / asset matrix
    description: >-
      Publicly visible modules inside Xaira's platform, with current maturity and the key diligence
      hole for each layer.
    columns:
      - Module / asset
      - Primary user
      - Status / maturity
      - Differentiation
      - Diligence gap
    rows:
      - - Integrated AI + data + therapeutics platform
        - Internal Xaira scientists, platform leadership, prospective collaborators
        - Operational as company model since launch; not packaged as a public SKU
        - >-
          Three-pillar operating model unifies AI research, data generation, and therapeutic product
          development
        - No public evidence of external pricing, contracts, or named enterprise deployments
      - - X-Atlas/Orion + FiCS Perturb-seq
        - Functional genomics, perturbation-biology, and model-training teams
        - Released publicly in 2025 as an 8M-cell atlas with FiCS methods
        - >-
          Industrialized perturbation data generation with dose-dependent knockdown framing and deep
          sequencing
        - No public cost, throughput, or reproducibility SLOs beyond preprint and press claims
      - - X-Atlas/Pisces
        - Model-training teams and outside researchers evaluating partial public release
        - >-
          Publicly announced in 2026; broader than Orion but still only partially uploaded
          externally
        - 25.6M perturbed single-cell transcriptomes across seven screens and 16 biological contexts
        - Dataset card says uploads are still coming and viewer is unavailable
      - - X-Cell / X-Cell Mini
        - >-
          Computational biologists and internal discovery teams; external researchers once release
          is complete
        - Docs, repo, and model cards are public; weights and inference code remain coming soon
        - >-
          Diffusion-based virtual-cell model with multi-modal priors and zero-shot generalization
          claims
        - >-
          No public hosted endpoint, benchmark suite for external users, or enterprise support
          surface
      - - Molecule-design / antibody-design layer
        - Seattle molecular-design team and downstream therapeutic programs
        - Operational internally but less publicly specified than X-Cell
        - >-
          Built on IPD roots such as RFdiffusion and ProteinMPNN plus high-throughput protein
          testing
        - No named Xaira-originated antibody asset or public production stack disclosure
      - - Internal therapeutic pipeline generation
        - Xaira discovery and development teams
        - Strategic objective; downstream outputs remain sparsely disclosed
        - >-
          Platform aims to translate causal biology and molecule design into differentiated
          therapeutics
        - Public proof is roadmap-level rather than a named, Xaira-generated clinical asset list
    notes: >-
      The matrix captures the layers that are visible in public sources. It intentionally separates
      released research artifacts from still-internal programmatic layers.
