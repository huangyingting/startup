  - id: operating-workflow
    title: 'Operating workflow: prediction, validation, and therapeutic translation'
    body: >-
      Xaira's public workflow is an AI-wet-lab feedback loop, not a one-shot model release. Drug
      Discovery Trends quotes Bo Wang describing a system where AI provides predictions, wet-lab
      work validates them, and the resulting experimental output feeds the next model iteration.
      GeekWire's reporting from Xaira's Seattle site gives that loop operational texture:
      molecular-design researchers generate candidate proteins, high-throughput lab systems test
      binding and stability, and the data are fed back into the models quickly. Fierce adds the
      company-level business interpretation—Xaira is building an integrated R&D platform where the
      machine-learning stack comes first and the therapeutic pipeline is supposed to follow. In that
      sense, X-Cell is not the end product; it is a middle layer between large-scale perturbation
      data and downstream target selection, mechanism work, antibody design, and eventually internal
      therapeutics. The limitation is disclosure depth. Xaira and third-party coverage make the
      overall workflow legible, but they stop short of naming specific Xaira-generated antibody
      assets, giving platform throughput metrics, or showing externally validated customer outcomes
      from this loop.
    claimRefs:
      - CE014
      - CE019
      - CE020
      - CE021
      - CE022
      - CE023
