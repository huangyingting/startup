artifact: product-tech
slug: xaira-therapeutics
runDate: '2026-05-12'
company:
  name: Xaira Therapeutics
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Xaira's real product is best understood as an integrated drug-discovery operating system rather
    than a publicly commercialized software SKU. Official materials consistently describe three
    connected layers: advanced AI research, expansive data generation, and therapeutic product
    development. The public proofs of that stack are now tangible. X-Atlas/Orion introduced an
    industrialized FiCS Perturb-seq platform and an 8 million-cell public atlas; X-Atlas/Pisces
    scaled that work to 25.6 million perturbed single-cell transcriptomes across seven screens and
    16 biological contexts; and X-Cell put a diffusion-based virtual-cell model on top of those data
    with public docs, a GitHub repo, and Hugging Face cards. But the maturity profile is uneven. The
    strongest evidence is at the data-and-model layer, not at the downstream commercialization
    layer. X-Cell's model weights and inference code are still labeled 'coming soon,' the Pisces
    dataset card says file uploads are still coming, and no reviewed public source disclosed
    external customers, hosted inference endpoints, support SLAs, or regulated-quality
    certifications for these public artifacts. The molecule-design and antibody-design layer looks
    strategically important—especially given Xaira's Institute for Protein Design roots and
    GeekWire's reporting on high-throughput protein testing in Seattle—but it remains less publicly
    specified than the virtual-cell stack. The result is a technically credible, unusually
    integrated platform with visible public developer surface, yet one whose external shipment,
    compliance posture, and downstream therapeutic outputs still require direct diligence.
sections:
  - id: platform-definition
    title: What Xaira actually delivers
    body: >-
      Publicly, Xaira does not look like a classic software company with a menu of externally sold
      products. Its official framing is an integrated biotech platform that combines advanced AI
      research, expansive data generation, and therapeutic product development, with each layer
      feeding the next. That means the company's 'product' is better described as an operating
      model: build causal biology data, train predictive models on those data, validate the
      predictions experimentally, and convert the output into therapeutic programs. The evidence is
      strongest for that internal platform identity. Xaira's 2024 launch materials and current
      approach page both emphasize the three-pillar stack. Since then, the company has publicly
      shipped research artifacts that sit inside that stack—X-Atlas/Orion, X-Atlas/Pisces, X-Cell,
      GitHub docs, and Hugging Face cards—but none of the reviewed sources show a public price
      sheet, enterprise deployment package, or named external software customer. In practical
      workflow terms, the most credible present-day users are Xaira's own scientists, potential
      collaborators, and outside researchers evaluating partial open releases. That distinction
      matters for diligence: there is real technical surface area here, but it is still more
      platform proof than finished commercial packaging.
    claimRefs:
      - CE001
      - CE002
      - CE015
      - CE031
      - CE037
      - CE042
    tableRefs:
      - TE001
  - id: data-and-model-stack
    title: The data engine and X-Cell architecture
    body: >-
      The most concrete part of Xaira's technology stack is its causal-data engine and the
      virtual-cell model built on top of it. X-Atlas/Orion introduced FiCS Perturb-seq as an
      industrialized large-scale data-generation process that uses the 10x Chromium platform, claims
      high sensitivity and low batch effects, and produced an 8 million-cell public atlas targeting
      all human protein-coding genes. X-Atlas/Pisces then extended that foundation to 25.6 million
      perturbed single-cell transcriptomes across seven genome-scale CRISPRi screens and 16
      biological contexts. X-Cell is the model layer trained on those data. Public docs describe it
      as a set-level diffusion transformer with four-step iterative refinement, multi-modal
      biological priors via cross-attention, and a full-scale model family up to 4.9 billion
      parameters. The public documentation also exposes some implementation details that go beyond
      marketing copy: X-Cell Mini is documented as a 55M-parameter variant initialized from scGPT;
      the planned API accepts AnnData or .h5ad control cells; and the model docs disclose a minimum
      8 GB GPU footprint for the mini configuration. Those are meaningful technical disclosures,
      even if the shipped public experience remains incomplete.
    claimRefs:
      - CE003
      - CE004
      - CE006
