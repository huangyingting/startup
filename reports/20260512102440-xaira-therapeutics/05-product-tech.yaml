        possible downstream workflow implied by a virtual-cell platform.
  - id: TE003
    slug: technology-operating-architecture-table
    title: Technology / operating architecture table
    description: >-
      The visible technical layers in Xaira's public stack and the dependency or risk that matters
      most for each.
    columns:
      - Layer / process / component
      - Role
      - Key dependency
      - Evidence / maturity
      - Risk
    rows:
      - - FiCS Perturb-seq wet-lab platform
        - Industrializes large-scale perturbation data generation
        - 10x Chromium workflow, wet-lab operations, sequencing depth
        - Supported by official release and preprint abstract
        - Public throughput, unit cost, and reproducibility metrics are still sparse
      - - X-Atlas/Orion and X-Atlas/Pisces dataset layer
        - Curates interventional single-cell data for training and validation
        - Large experimental campaigns across cell contexts
        - Strong evidence for dataset size and context diversity; public file availability is uneven
        - Community reproducibility is constrained until full files ship
      - - X-Cell model core
        - Predicts perturbation response from control cells
        - Diffusion transformer training plus GPU compute
        - Detailed in model card, docs, and press launch
        - Public users cannot fully audit runtime behavior until weights and code ship
      - - Biological prior integration layer
        - Injects external knowledge into perturbation modeling via cross-attention
        - ESM-2, STRING, GenePT, DepMap, JUMP-Cell Painting, scGPT/gene embeddings
        - Publicly documented in model card and docs
        - Performance dependence on curated priors could be hard for outsiders to disentangle
      - - Molecule-design layer
        - Translates biological insight toward designed proteins and antibodies
        - IPD-derived model heritage plus experimental protein validation
        - >-
          Well supported directionally by GeekWire and official positioning, but not exhaustively
          documented
        - Direct linkage from X-Cell outputs to a named Xaira asset is not yet public
      - - AI-validation feedback loop
        - Feeds experimental results back into training and program decisions
        - Tight coupling of computational and lab teams
        - Explicit in official approach page and third-party interviews
        - Without public throughput metrics, outsiders cannot quantify loop speed or efficiency
      - - Developer-facing release surface
        - Exposes docs, code skeleton, model cards, and dataset cards to outside researchers
        - GitHub, raw docs, Hugging Face, and planned package/API
        - Visible and credible, but still incomplete
        - Documentation exists ahead of fully shipped artifacts, which raises maturity questions
    notes: >-
      The table distinguishes the public architecture from unverified internal implementation
      detail. It highlights where Xaira has shown enough to understand the stack, and where it has
      not.
