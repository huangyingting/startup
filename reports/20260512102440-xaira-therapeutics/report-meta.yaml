companyProfile:
  summary: >
    Xaira launched in April 2024 with more than $1 billion of committed capital and a mandate to
    connect advanced AI research, expansive biological data generation, and therapeutic product
    development in one operating system. Its public artifacts now include Orion, a large
    perturb-seq dataset; Pisces; and X-Cell, a first virtual-cell release. The company looks much
    more like an integrated platform-plus-pipeline biotech than a pure software vendor, and its
    most visible external traction sits in open science rather than in disclosed commercial
    adoption.
  foundedDate: '2024-04-23'
  founders:
    - name: David Baker
      role: Co-founder and scientific advisor
      background: Institute for Protein Design leader; Nobel laureate; foundational protein-design and generative-biology researcher
      claimRefs: []
    - name: Hetu Kamisetty
      role: Co-founder and CTO
      background: Ex-Meta AI leader and former Institute for Protein Design researcher focused on generative models for proteins
      claimRefs: []
  foundingLocation: San Francisco Bay Area
  headquarters: South San Francisco, CA
  productSummary: >
    Xaira is building an internal and partner-facing discovery engine rather than a finished
    enterprise software SKU. Publicly visible components include the Orion perturb-seq atlas,
    Pisces data, and X-Cell virtual-cell model artifacts; privately, the company positions itself
    as a system that should translate models and data into differentiated therapeutic programs.
  customerFocus: >
    Current public proof is concentrated in internal platform users, open-science researchers, and
    prospective biotech/pharma collaborators rather than disclosed paying customers.
  businessModel: >
    The likely monetization paths are internal pipeline value creation plus a small number of
    higher-value collaborations or platform-linked strategic partnerships. Public pricing and
    contract structure are not disclosed.
  stage: Private, post-launch
  fundingStatus: >
    Launched with more than $1 billion of committed capital in April 2024. Public post-money
    valuation and financing terms remain undisclosed.
