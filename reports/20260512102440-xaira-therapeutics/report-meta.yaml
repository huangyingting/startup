  topStrengths:
    - >-
      More than $1B of committed capital gives Xaira unusual financing resilience for a newly
      launched AI-biotech.
    - >-
      Leadership and board density are exceptional by sector standards, combining frontier AI,
      protein design, translational medicine, and large-company operating experience.
    - >-
      Orion and X-Cell give Xaira more public scientific proof than a typical stealth techbio and
      show real external interest from the research community.
    - >-
      The integrated AI-plus-data-plus-therapeutics architecture could justify a premium if it
      begins producing repeatable collaboration or asset proof.
  topRisks:
    - >-
      No public valuation terms, price per share, or preference structure are available, so entry
      discipline cannot be judged directly from public evidence.
    - >-
      Open-science traction has not yet converted into named paying customers, disclosed pricing,
      or collaboration economics.
    - >-
      Public evidence still does not show clear translation from virtual-cell and perturbation data
      assets into patient-outcome or asset-level proof.
    - >-
      Security, compliance, and regulatory-readiness materials are too thin publicly to support a
      mature enterprise or regulated-use underwriting case.
    - >-
      The public comp set for AI-enabled drug discovery remains in a low-single-digit-billion range,
      which constrains how much premium can be justified without private proof.
  unresolvedGaps:
    - Price, post-money valuation, and full term-sheet economics
    - Fully diluted cap table and liquidation preference waterfall
    - Burn allocation and milestone-based runway plan
    - Named collaboration pipeline, pricing logic, and contract structure
    - Platform-to-asset translation metrics and compliance diligence package
