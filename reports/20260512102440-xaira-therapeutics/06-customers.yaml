          computational biologists; Payer: Xaira balance sheet
        - Run the causal-biology, molecule-design, and therapeutic-generation loop internally
        - Likely the dominant current usage base, but headcount by function is undisclosed
        - >-
          High strategic value because this is where product proof is most likely being generated
          today
        - No public utilization, seat count, or workflow metrics by internal team
      - - Open scientific community / academic researchers
        - >-
          Buyer: none disclosed; User: external computational biologists and foundation-model
          researchers; Payer: grants / non-commercial budgets
        - Download Orion/Pisces data, inspect X-Cell, benchmark or build on top of releases
        - Only segment with quantified external adoption signals today
        - >-
          High strategic value for validation, citations, benchmarking, and top-of-funnel
          collaborator discovery; limited direct revenue
        - Named institutions using the releases remain sparse in public sources
      - - Prospective commercial collaborators
        - >-
          Buyer: CSO / head of R&D / BD; User: discovery, translational, and computational teams;
          Payer: biotech or pharma R&D budget
        - Explore platform collaborations, data access, target discovery, or co-development
        - Explicitly signaled by Xaira, but no named counterparties are public
        - >-
          Potentially the most important future revenue segment if collaboration-led monetization
          wins
        - No public proof of signed deals, pilots, or conversion funnel
      - - Large pharma / top biopharma platform buyers
        - >-
          Buyer: CSO / external innovation / BD leadership; User: disease-area and translational
          scientists; Payer: central R&D and partnering budgets
        - Use Xaira to improve target discovery, MoA work, or therapeutic design
        - Likely low-account-count / high-value if it emerges
        - Could create outsized revenue but also immediate concentration risk
        - No named pharma customer, platform deal, or partner proof is public today
      - - Future developer / model users
        - >-
          Buyer: individual or team researchers; User: data scientists; Payer: unclear until a
          fuller release exists
        - Run X-Cell or reuse X-Atlas data via open tooling
        - Visible community surface exists, but public package is still partial
        - Could widen awareness beyond direct collaboration buyers
        - No public evidence of paid self-serve motion, enterprise tier, or support package
    notes: >-
      The table intentionally separates currently evidenced external users from prospective
      commercial buyers. For Xaira, visibility is highest at the user layer and weakest at the payer
