  - id: TU005
    slug: expansion-and-concentration-risk-table
    title: Expansion and concentration risk table
    description: >-
      The path from today's open-science adoption to future revenue is narrow and potentially
      concentrated.
    columns:
      - Expansion driver
      - Concentration risk
      - Impact
      - Diligence path
    rows:
      - - Open dataset and model visibility
        - Community reach may not convert into paid collaborations
        - High — strong awareness without monetization would leave customer quality unresolved
        - >-
          Track collaboration inquiries, citation-to-partner conversions, and any inbound commercial
          leads attributable to Orion/X-Cell
      - - Commercial collaboration channel
        - If monetization arrives, it likely comes from a few large counterparties
        - High — immediate revenue concentration and negotiation leverage risk
        - >-
          Request pipeline of commercial conversations, target account list, and scenario analysis
          for 1-3 anchor deals
      - - Pharma / techbio buyer segment
        - Large ticket sizes imply low account counts
        - High — one lost buyer could materially change revenue outlook
        - Request buyer segmentation, top-account exposure assumptions, and term-sheet history
      - - Enterprise adoption of X-Cell-like tooling
        - >-
          Partial shipment, limited support proof, and no public compliance stack raise procurement
          friction
        - Medium-high — slows conversion from curiosity to production deployment
        - >-
          Request enterprise roadmap, support model, security/compliance materials, and deployment
          references
      - - Academic/open-science validator segment
        - Strategically useful but low direct revenue
        - Medium — can seed influence and citations but not necessarily durable monetization
        - >-
          Request data on citations, benchmark mentions, and collaborator introductions generated by
          open releases
    notes: >-
      For Xaira, expansion and concentration risk are inseparable: the likeliest monetization route
      is also the likeliest route to a very concentrated customer base.
