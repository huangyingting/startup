  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: named-paying-customers-and-contracts
      missingEvidence: >-
        Named paying customers, contract structures, pricing, renewal data, or any other direct
        proof of commercial platform monetization.
      whyItMatters: >-
        Without this, Xaira's public customer story remains one of scientific adoption and
        collaborator potential rather than demonstrated revenue quality.
      diligencePath: >-
        Request executed collaboration agreements, customer pipeline summaries, pricing terms, and
        any current paid platform or co-development accounts.
      relatedQuestionRefs:
        - QU002
        - QU021
        - QU025
      relatedTableRefs:
        - TU001
        - TU003
        - TU005
    - type: private-evidence-only
      severity: material
      topic: retention-and-durability-metrics
      missingEvidence: >-
        NRR, GRR, logo retention, renewal rates, contract duration, repeat usage by named account,
        or customer-satisfaction tracking.
      whyItMatters: >-
        Durability is currently the weakest part of the customer picture, and every public inference
        relies on community proxies rather than actual account-level retention.
      diligencePath: >-
        Request customer cohorts, renewal history, monthly active-user metrics for external users,
        and any reference calls or satisfaction studies.
      relatedQuestionRefs:
        - QU009
        - QU010
        - QU016
        - QU022
      relatedTableRefs:
        - TU004
    - type: missing-source
      severity: material
      topic: enterprise-support-and-procurement-proof
      missingEvidence: >-
        Public evidence of enterprise support, deployment services, security/compliance materials,
        or production-readiness commitments for external buyers.
      whyItMatters: >-
        Even if technical interest is high, enterprise procurement will stall without proof that
        Xaira can support and secure a production relationship.
      diligencePath: >-
        Request enterprise roadmap, support model, security questionnaires, compliance materials,
        and deployment case studies if any exist.
      relatedQuestionRefs:
        - QU015
        - QU021
        - QU023
      relatedTableRefs:
        - TU005
    - type: missing-source
      severity: material
      topic: commercial-conversion-funnel
      missingEvidence: >-
        Metrics connecting open-science adoption to collaboration inquiries, pilot evaluations, paid
        conversions, or account expansion.
      whyItMatters: >-
        The investment question is not whether researchers notice Xaira, but whether that attention
        converts into durable commercial relationships.
      diligencePath: >-
        Request top-of-funnel to closed-deal conversion metrics, source-of-demand analysis, and
        examples of open-release users who progressed into commercial discussions.
      relatedQuestionRefs:
        - QU008
        - QU013
        - QU019
        - QU021
      relatedTableRefs:
        - TU002
        - TU005
    - type: missing-source
      severity: material
      topic: named-user-scope-and-satisfaction
      missingEvidence: >-
        A broader roster of named institutions or teams using Orion, Pisces, or X-Cell, along with
        their outcomes, repeat use, and satisfaction levels.
      whyItMatters: >-
        Current named proof is meaningful but narrow. Broader proof would separate isolated
        curiosity from market-wide pull.
      diligencePath: >-
        Request citation lists, named external collaborator references, user-survey summaries, and a
        breakdown of open-science vs commercial users by institution type.
      relatedQuestionRefs:
        - QU005
        - QU010
        - QU022
        - QU024
      relatedTableRefs:
        - TU003
        - TU004
