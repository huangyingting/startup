  - id: retention-and-expansion
    title: Retention, expansion, and concentration are still mostly nulls
    body: >-
      Customer durability is where the public evidence gets weakest. No reviewed public source
      disclosed NRR, GRR, logo churn, renewal rates, contract durations, account expansion, or
      satisfaction surveys. The only repeat-usage proxies are indirect: continuing public
      discussions months after Orion's release, likes on Hugging Face pages, and smaller ongoing
      download signals for Pisces. Those signals show continued attention, but they are not
      retention metrics in the commercial sense. Expansion logic is also still prospective. RDWorld
      quotes Xaira saying the dataset is free for academics while the company is happy to work with
      commercial entities interested in collaboration, which implies a two-track model: open-science
      reach first, collaboration monetization later. That path could work, but it would likely
      produce a concentrated revenue base if it succeeds, with only a handful of large pharma or
      techbio counterparties rather than thousands of self-serve users. Procurement friction is also
      high: public releases are partial, enterprise support terms are not visible, and product-grade
      compliance evidence is absent. Taken together, the retention story today should be treated as
      null-based, and the expansion story as an option rather than a demonstrated motion.
    claimRefs:
      - CU019
      - CU020
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
      - CU027
      - CU028
      - CU030
      - CU031
      - CU034
      - CU037
    tableRefs:
      - TU004
      - TU005
    figureRefs:
      - FU004
  - id: customer-verdict
    title: Customer verdict
    body: >-
      The right customer verdict is that Xaira has credible early external user proof in the
      open-science ecosystem but no publicly legible commercial customer base. Orion has already
      achieved real distribution into the research community, with meaningful download volume,
      visible user questions, and respected external validators. That is much stronger than
      'logo-only' proof. But it is still not the same thing as a paying-account base, retention
      evidence, or diversified revenue. The likely future customer model — if Xaira monetizes
      successfully — points toward a small number of high-value collaborations, which would make
      concentration risk a central diligence question. Until the company discloses named commercial
      users, collaboration contracts, or renewal evidence, investors should not confuse scientific
      traction with commercial traction. The customer carry-forward into later chapters is therefore
      straightforward: Xaira has market interest and user curiosity, but not yet public proof of
      monetized, durable customer adoption.
    claimRefs:
      - CU016
      - CU025
      - CU026
      - CU031
      - CU032
      - CU035
      - CU040
