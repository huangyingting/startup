company:
  name: Xaira Therapeutics
chapter:
  number: 6
  title: Customers
  summary: >-
    Xaira's publicly visible 'customer' footprint is real but unconventional: it looks like early
    open-science and research-community adoption, not a disclosed paying-customer base. The clearest
    external user proof today sits around X-Atlas/Orion. RDWorld reported that the 521 GB Orion
    open-source dataset had already been downloaded more than 16,451 times within two weeks of
    release. Hugging Face showed 22 likes and two public community discussions, including one from
    an external user named zboldyga asking for sgRNA count files; Xaira answered with exact
    filenames, proving at least one real outside usage-and-support interaction. GEN also published
    named external validation from Emma Lundberg and Hani Goodarzi, both of whom described Orion as
    a meaningful resource for the community. By contrast, no reviewed public source disclosed a
    named paying customer, platform contract, enterprise deployment, renewal metric, or
    concentration breakdown. X-Cell and Pisces expand the external surface, but their adoption proof
    is thinner because the model and data package remain partial and newer. The customer story is
    therefore asymmetric: scientific relevance and community interest are visible, but commercial
    monetization, durability, expansion, and revenue concentration remain almost entirely
    undisclosed. For later risk and valuation work, Xaira should be treated as having early user
    proof in the open-science ecosystem and collaborator potential — not as a company with a
    publicly legible commercial customer base.
sections:
  - id: customer-segmentation
    title: 'Customer segmentation: users are visible before payers are'
    body: >-
      Xaira's customer base is best segmented into four groups, only one of which has meaningful
      public proof today. First are internal Xaira teams — discovery scientists, computational
      biologists, and portfolio teams — who are likely still the dominant users of the platform
      because the company keeps describing the stack as an internal engine for generating
      therapeutics. Second is the open scientific community, which now has direct access to Orion,
      partial access to Pisces/X-Cell, and a visible community surface on Hugging Face and GitHub.
      Third are prospective commercial collaborators, which Xaira explicitly says it is happy to
      work with, but without naming any. Fourth are eventual large-pharma or biotech counterparties
      who would likely be the true paying buyers if Xaira monetizes the platform through
      collaboration or co-development. What is missing is the most important commercial layer: no
      reviewed public source discloses a named paying customer, a contracted enterprise deployment,
      or an external account with recurring revenue attached to it. The public evidence therefore
      tells us who might buy and who is already experimenting — but not who is actually paying.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU036
      - CU039
    tableRefs:
      - TU001
  - id: named-proof
    title: Named customer proof is scientific-validation proof, not revenue proof
    body: >-
      The strongest named external proof comes from the research community around Orion rather than
      from enterprise case studies. GEN quoted Human Protein Atlas co-director Emma Lundberg calling
      the release a significant contribution to the virtual-cell field, and Arc Institute's Hani
      Goodarzi describing it as a substantial training resource for foundation models. Those are
      meaningful endorsements because both commentators are technically sophisticated external
      observers. Hugging Face provides even stronger user-like proof: the Orion discussions page
      showed a real external user, zboldyga, asking for sgRNA count data that Xaira had used for
      dose stratification, and Xaira's Ann Huang responded with exact Figshare filenames. That is
      not a customer-reference call or procurement record, but it is concrete evidence of outside
      dataset use and follow-up support. The limitation is obvious: all of this proof sits in
      scientific-community usage, discussion, and validation. None of it proves a paying contract,
      production deployment, or long-term commercial durability. Xaira has real external users and
      validators in public, but they are still much closer to researchers and evaluators than to
      revenue-bearing customers.
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
      - CU016
      - CU038
    tableRefs:
      - TU003
    figureRefs:
      - FU003
  - id: adoption-trajectory
    title: 'Adoption trajectory: Orion leads, X-Cell follows'
    body: >-
      The adoption trajectory is visible, but it is still mostly a research-distribution trajectory
      rather than a revenue-distribution trajectory. Orion is the strongest surface because it has
      measurable open-data downloads, Hugging Face likes and discussions, and external scientific
      commentary. X-Cell and Pisces broaden the surface area but have not yet accumulated equally
      strong external proof, in part because the model and dataset releases remain partial and
      newer. Hugging Face's Pisces card showed 80 downloads last month and six likes, which is
      enough to prove some community attention but not enough to prove durable adoption. The Orion
      Hugging Face page also matters because it lowers usability friction: Parquet conversion and
      standard data-tool compatibility make the dataset easier to query with common analytics
      tooling. Put differently, Xaira's external adoption curve currently runs through open-data
      discovery, technical evaluation, and benchmarking. It has not yet crossed into public proof of
      enterprise deployment or contracted collaboration. The practical conclusion is that Xaira's
      adoption evidence is fresh and nontrivial — but concentrated in the scientific community and
      still early in the commercialization funnel.
    claimRefs:
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU017
