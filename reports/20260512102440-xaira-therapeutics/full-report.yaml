      - number: '8.3'
        title: Comparable set and valuation context
        blocks:
          - type: paragraph
            body: >-
              The best public anchors for Xaira are not software-only AI labs; they are public and private companies
              trying to monetize computation-driven drug discovery or precision therapeutics. Recursion is the closest
              full-stack public reference because it combines platform, pipeline, and partnerships; yet it still trades
              around $1.73B market cap. Relay shows what a well-capitalized, pre-revenue therapeutic platform can
              command in the public market at roughly $2.46B. Schrödinger demonstrates that even a mature computational
              platform with partnered and proprietary drug programs can trade under $1B. Absci shows that generative-AI
              biologics platforms with internal and partnered programs can also remain in the sub-$1B range.


              The main argument for pushing Xaira materially above these public marks is that private markets will
              sometimes pay for optionality, especially when talent, capital, and strategic scarcity are unusual.
              Isomorphic's $600M external round is the clearest recent signal that private capital still values frontier
              AI drug design narratives. But even that signal is incomplete because the valuation was not disclosed, and
              Isomorphic benefits from a DeepMind and Alphabet lineage that is not directly transferable. The comp set
              therefore does two things at once. It protects against overpaying by showing how public markets value more
              mature proof, and it leaves room for Xaira to deserve a premium if private diligence reveals stronger
              commercial or therapeutic traction than public sources show. That is why Xaira should be valued as a
              premium techbio, not as an unconstrained frontier-AI software story.
