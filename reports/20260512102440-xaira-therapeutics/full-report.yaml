  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: What market Xaira is actually addressing
        blocks:
          - type: paragraph
            body: >-
              Xaira should not be analyzed as if it were selling a single off-the-shelf AI software product. Official
              materials describe an end-to-end system that combines AI research, proprietary data generation, and
              therapeutic product development. Independent 2026 reporting adds that the company is actively building an
              inflammatory and immunological pipeline, initially centered on antibody therapeutics, while still treating
              the AI platform as the core engine. That means Xaira touches at least three economic layers at once: AI
              drug discovery platform spend, antibody discovery and production infrastructure, and the eventual
              therapeutic revenue pool in immunology and inflammatory disease. The distinction matters because each
              layer has different buyers, valuation logic, and adoption clocks. Platform budgets are controlled by R&D
              and BD teams and can move on technical proof. Therapeutic revenue depends on years of clinical
              translation, reimbursement, and physician uptake. The most defensible boundary for this chapter is
              therefore a multi-lens definition rather than a single universal TAM.
            claimRefs:
