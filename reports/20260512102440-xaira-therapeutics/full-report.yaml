              Xaira's moat, if it proves durable, is likely to come from owning the closed loop between proprietary
              interventional data, model training, wet-lab validation, and therapeutic translation. The official story
              and third-party reporting both point to that. Orion and Pisces provide the scale of causal data; X-Cell
