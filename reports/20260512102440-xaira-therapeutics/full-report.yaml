      - number: '3.4'
        title: Switching costs, multi-homing, and moat durability
        blocks:
          - type: paragraph
            body: >-
              The public record suggests that moat formation in AI drug discovery is still driven less by classic
              software lock-in and more by data ownership, workflow integration, internal experimental infrastructure,
              and negotiated asset rights. That cuts both ways for Xaira. If its perturbation-data engine and
              virtual-cell models genuinely surface better targets or patient hypotheses than peers, the resulting
              workflow and asset-integration costs could be meaningful. But large pharma buyers do not appear to be
              committing to one platform only. Lilly is working with Isomorphic, insitro, and Schrödinger; Novartis
              works with Isomorphic and Generate; Sanofi and Bayer work with Recursion; and early-stage biologics
              challengers such as Nabla are also winning programs. This multi-homing behavior is rational for buyers
              because most partnerships disclose only partial economics, unclear exclusivity, and limited evidence on
              long-term program outcomes. Adverse evidence matters here. Recursion's merger with Exscientia broadened
              its stack, but it was followed by pipeline cuts, continued focus tightening, and investor concern about
              burn. That is an important disconfirming signal: more data, more programs, and more capital do not
              automatically translate into durable execution or pricing power.
