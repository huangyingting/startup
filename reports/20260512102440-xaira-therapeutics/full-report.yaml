      - number: '3.2'
        title: Direct peers and adjacent rivals
        blocks:
          - type: paragraph
            body: >-
              The direct-peer set splits into two patterns. Generate, insitro, Recursion/Exscientia, and Absci all
              publicly describe an integrated loop in which proprietary data and wet-lab systems continuously improve
              the model and feed either partnered or internal programs. Isomorphic is different in emphasis: its public
              narrative is more explicitly about frontier predictive and generative model quality built on and beyond
              AlphaFold, with commercial proof coming through very large pharma collaborations rather than disclosed
              internal pipeline depth. Xaira appears strategically closest to the integrated-data companies, but its
              announced technical flagship is still the virtual-cell and perturbation-data stack, not a public clinical
              asset or named commercial partnership. Around that core sit narrower but still relevant antibody and
              protein challengers. Chai Discovery markets de novo antibody design with atomic precision, while Nabla Bio
              emphasizes AI plus human-relevant wet-lab testing for antibodies and other protein therapeutics against
              difficult targets. Those companies may not be direct full-stack matches to Xaira, but they compete for
              some of the same biologics buyer attention and help make antibody design a crowded wedge rather than a
              white space.
