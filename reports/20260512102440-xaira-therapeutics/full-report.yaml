  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Recommendation and entry discipline
        blocks:
          - type: paragraph
            body: >-
              The first valuation problem is not whether Xaira is an interesting company. It is whether public evidence
              is sufficient to price it. Xaira clearly has unusual starting advantages: more than $1 billion of
              committed capital, a dense concentration of AI and biotech talent, and visible open-science traction
              around Orion and X-Cell. But those advantages are not the same as a priced investment case. Public sources
              do not disclose Xaira's post-money valuation, price per share, dilution mechanics, or preference stack.
              That means any hard 'buy' or 'avoid' call at a specific entry price would be false precision.


              The more honest recommendation is research-more and price-sensitive. Current public comps in AI-enabled
              drug discovery and adjacent pre-revenue therapeutics trade in the roughly $0.9B-$2.5B market-cap range.
              Xaira probably deserves a premium to several of those names on team and capital alone, but public evidence
              does not yet justify treating it like a proven frontier platform. The guardrail is straightforward: if
              private pricing lands near the public-comp cluster plus a rational premium, continue diligence; if pricing
              already assumes large-scale commercial or therapeutic proof, public evidence says pause. That is not a
              dismissal of Xaira's potential. It is recognition that investors are being asked to price possibility, not
              measured economics. Until price, terms, and proof are clearer, valuation discipline matters more than
              narrative enthusiasm.
            claimRefs:
              - CV001
