      - number: '2.3'
        title: Buyer, user, and payer segmentation
        blocks:
          - type: paragraph
            body: >-
              Xaira’s near-term economic buyers are most likely large pharma and large biotech R&D or BD organizations
              that want differentiated target-identification, mechanism, or patient-selection capability without
              building every component internally. Mordor’s end-user split supports that view: pharma and biotech
              companies dominate current spend, while academic institutes are important but secondary as direct economic
              buyers. Xaira itself is also a buyer in a meaningful sense, because its owned-asset strategy requires
              internal capital-allocation decisions across AI, wet lab, and development. Downstream, the user and payer
              stack changes completely. Clinicians, translational investigators, and patients become the relevant users
              once a candidate reaches trials and commercialization, but hospital channels, insurers, and government
              payers determine whether therapeutic value converts into revenue. Public Xaira reporting and Bo Wang’s
              interviews also imply an adoption sequence from data generation to virtual-cell prediction to target and
              molecule hypotheses to clinical development. That sequence is crucial because it shows why technical
              adoption can happen years before financial payoff from approved drugs.
