      - number: '4.3'
        title: Capital adequacy and runway
        blocks:
          - type: paragraph
            body: >-
              The hardest financial judgment is whether Xaira's giant launch round still leaves comfortable runway in
              2026. The answer is directionally yes, but only directionally. More than $1 billion of committed capital
              at launch is a rare advantage and should have given management substantial flexibility to build people,
              data, and platform infrastructure without immediately returning to market. But launch capital is not the
              same thing as current cash on hand, and no reviewed source disclosed what remains on the balance sheet
              today. That forces any runway analysis into peer-based scenario work. Recursion ended 2025 with $753.9
              million of cash after $371.8 million of operating cash outflow and still projected runway only into early
              2028. Schrödinger ended 2025 with $402.3 million of cash after $309.5 million of operating expenses,
              supported by real software and drug-discovery revenue. Relay still had $710.3 million of cash in Q1 2025
              despite cost reductions, while Absci had $152.5 million in Q3 2025 with runway only into the first half of
              2028. Those figures imply a broad but useful Xaira burn proxy in the low hundreds of millions annually.
              That range does not imply immediate distress, but it does imply that capital adequacy will eventually
              depend on either partnership monetization or internal pipeline proof before commercialization.
