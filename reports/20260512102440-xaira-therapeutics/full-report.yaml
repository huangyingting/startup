  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk
        blocks:
          - type: paragraph
            body: >-
              Xaira is still early enough that its biggest regulatory problem is not a known enforcement action; it is
              the gap between rising regulatory expectations and sparse public readiness evidence. FDA and EMA now frame
              AI in the drug lifecycle as a risk-managed, documented, context-of-use-specific discipline rather than an
              unconstrained research activity. The EMA reflection paper explicitly says AI in the medicinal product
              lifecycle introduces new risks that must be mitigated to protect patients and the integrity of clinical
              evidence, while FDA's 2025 draft guidance asks sponsors to establish a risk-based credibility assessment
              framework when AI supports regulatory decision-making. The EU AI Act and GDPR add a European layer around
              health, safety, fundamental rights, and personal-data processing.


              Xaira's public materials do not prove it is already using AI outputs in regulatory submissions, but they
              do show a company that wants to connect models, biology, and patients end-to-end. That means regulatory
              rigor becomes a question of timing, not relevance. The current public compliance surface is light: a
              website privacy policy exists, but there is no reviewed public DPA, GxP package, validation dossier, or
              AI-governance disclosure for external diligence. Legal terms also matter. X-Cell's public release is under
              a CC BY-NC-SA 4.0 license, which helps research distribution but constrains commercial reuse absent
              separate rights. The practical risk is therefore twofold: Xaira could move faster than its public
              compliance narrative, and its public legal packaging may not yet match the expectations of future
              enterprise or regulated counterparties.
            claimRefs:
              - CR001
