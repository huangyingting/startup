  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: 'Customer segmentation: users are visible before payers are'
        blocks:
          - type: paragraph
            body: >-
              Xaira's customer base is best segmented into four groups, only one of which has meaningful public proof
              today. First are internal Xaira teams — discovery scientists, computational biologists, and portfolio
              teams — who are likely still the dominant users of the platform because the company keeps describing the
              stack as an internal engine for generating therapeutics. Second is the open scientific community, which
              now has direct access to Orion, partial access to Pisces/X-Cell, and a visible community surface on
              Hugging Face and GitHub. Third are prospective commercial collaborators, which Xaira explicitly says it is
              happy to work with, but without naming any. Fourth are eventual large-pharma or biotech counterparties who
              would likely be the true paying buyers if Xaira monetizes the platform through collaboration or
              co-development. What is missing is the most important commercial layer: no reviewed public source
              discloses a named paying customer, a contracted enterprise deployment, or an external account with
              recurring revenue attached to it. The public evidence therefore tells us who might buy and who is already
              experimenting — but not who is actually paying.
