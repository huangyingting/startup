      - number: '2.2'
        title: Sizing the opportunity with multiple, non-equivalent lenses
        blocks:
          - type: paragraph
            body: >-
              The platform-spend lens is the narrowest and most immediate. Mordor Intelligence estimates the AI drug
              discovery market at $3.25 billion in 2026, growing to $10.29 billion by 2031 at a 25.94% CAGR.
              Worldmetrics reports broadly similar but not identical high-growth ranges, while McKinsey cites an even
              larger pharma AI market projection that is broader than discovery alone and therefore should not be
              treated as a like-for-like comparison. The therapeutic-revenue lens is much bigger but also much slower to
              monetize. Third-party estimates for inflammatory disease, immunology, and anti-inflammatory drug markets
              cluster in the $122 billion to $141 billion range for 2026, with 2033–2035 forecasts ranging from roughly
              $228 billion to $293 billion. A modality-support lens sits between those two: Precedence sizes antibody
              production at $31.71 billion in 2026, while Coherent’s much broader antibodies market reaches $323 billion
              because it spans disease areas far beyond Xaira’s current disclosed focus. The right takeaway is not to
              average these numbers together. It is to preserve them as different lenses on platform revenue, modality
              infrastructure, and end-market therapy value.
