      - number: '5.2'
        title: The data engine and X-Cell architecture
        blocks:
          - type: paragraph
            body: >-
              The most concrete part of Xaira's technology stack is its causal-data engine and the virtual-cell model
              built on top of it. X-Atlas/Orion introduced FiCS Perturb-seq as an industrialized large-scale
              data-generation process that uses the 10x Chromium platform, claims high sensitivity and low batch
              effects, and produced an 8 million-cell public atlas targeting all human protein-coding genes.
              X-Atlas/Pisces then extended that foundation to 25.6 million perturbed single-cell transcriptomes across
              seven genome-scale CRISPRi screens and 16 biological contexts. X-Cell is the model layer trained on those
              data. Public docs describe it as a set-level diffusion transformer with four-step iterative refinement,
              multi-modal biological priors via cross-attention, and a full-scale model family up to 4.9 billion
              parameters. The public documentation also exposes some implementation details that go beyond marketing
              copy: X-Cell Mini is documented as a 55M-parameter variant initialized from scGPT; the planned API accepts
              AnnData or .h5ad control cells; and the model docs disclose a minimum 8 GB GPU footprint for the mini
              configuration. Those are meaningful technical disclosures, even if the shipped public experience remains
              incomplete.
