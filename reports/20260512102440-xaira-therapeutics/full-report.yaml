      - number: '4.5'
        title: Financial verdict
        blocks:
          - type: paragraph
            body: >-
              The right financial verdict is that Xaira is pre-revenue, capital-intensive, and probably still well
              funded, but not yet financially legible enough for fundamental underwriting. The launch round was
              unusually large and likely bought real time. That time matters because Xaira is trying to build a
              differentiated causal-biology stack and, ultimately, a therapeutics engine, not merely a software product.
              But the same ambition that makes the story interesting also makes it expensive. If management leans harder
              into internal assets before external monetization appears, burn could move toward the more clinical,
              higher-cash-consumption end of the peer set. If Xaira instead monetizes the platform through partnerships
              first, the business could look more like a milestone-and-royalty platform company with a longer runway and
              less dilution risk. Public evidence today does not tell us which path is already winning. For later
              valuation work, that means Xaira should be treated as a funded option on platform monetization plus
              internal pipeline creation—not as a company with validated revenue quality, visible margins, or disclosed
              cash conversion.
