chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, scope, and business model
        blocks:
          - type: paragraph
            body: >-
              Xaira Therapeutics is an AI-native biotechnology company headquartered in South San Francisco and
              positioned as an end-to-end drug discovery and development platform rather than a point-solution software
              vendor. Official materials consistently describe three integrated pillars: advanced machine learning
              research, expansive data generation, and therapeutic product development. The company’s stated aim is to
              make biology “more computable,” use frontier models to identify the right biology and molecules, and
              ultimately shorten the path from lab insight to medicines for targets that have historically been
              considered difficult or impossible to drug. In practice, that means Xaira wants to operate simultaneously
              as a model builder, a wet-lab data generator, and a pipeline company. Goldman Sachs-hosted remarks and
              launch reporting reinforce that the company is trying to connect target identification, molecular design,
              and clinical development in one stack. This positioning matters because it implies higher capital
              intensity and execution scope than a typical platform biotech, but it also gives Xaira more control over
              where value accrues if its models begin to produce differentiated assets. Public sources support the
              identity and ambition, while leaving revenue, valuation, and customer metrics undisclosed.
