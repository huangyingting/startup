  - id: FV004
    type: kpi
    title: Investment KPI scorecard
    layout: standard
    summary: >-
      IC-ready scorecard rating Xaira on market, team, product proof, commercial proof, economics visibility, risk,
      valuation support, financing resilience, and evidence quality.
    claimRefs:
      - CV006
      - CV008
      - CV009
      - CV010
      - CV021
      - CV037
      - CV038
      - CV039
      - CV042
      - CV043
    data:
      items:
        - label: Market opportunity
          score: 7
          detail: AI drug discovery is growing, but the category is still early and crowded.
        - label: Team quality
          score: 10
          detail: One of the clearest strengths in the entire public record.
        - label: Science / product proof
          score: 6
          detail: Real public artifacts and traction, but incomplete shipment and limited translation proof.
        - label: Commercial proof
          score: 3
          detail: No named paying customers, pricing, or deployment metrics public.
        - label: Economics visibility
          score: 2
          detail: No public valuation terms, revenue, or cap-table details to model.
        - label: Financing resilience
          score: 8
          detail: '>$1B committed capital is a real strategic advantage.'
        - label: Risk profile
          score: 4
          detail: High execution, translation, compliance, and commercialization risk remain.
        - label: Valuation support
          score: 3
          detail: Public evidence supports only a guarded premium over public techbio comps.
        - label: Evidence quality
          score: 4
          detail: Strong on science and team, weak on economics, price, and terms.
        - label: Exit readiness
          score: 2
          detail: Not IPO-ready on public evidence; nearer-term path is partnership or strategic optionality.
    notes: >-
      Scores are on a 0-10 scale and reflect investability at an undisclosed private price, not absolute company
      quality. Team quality is exceptional, but valuation support remains limited.
