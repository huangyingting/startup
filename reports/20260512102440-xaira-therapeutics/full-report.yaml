      - number: '3.3'
        title: How the market is priced and packaged publicly
        blocks:
          - type: paragraph
            body: >-
              Public monetization data across this peer group points in one direction: bespoke research collaborations,
              option structures, milestones, royalties, and occasional equity are the norm, while transparent list
              pricing is basically absent. Generate's Novartis partnership combines a $65 million upfront payment,
              equity, billion-dollar milestones, and royalties. Recursion's Sanofi and Bayer collaborations are even
              larger on a disclosed back-end basis. Isomorphic's first Lilly and Novartis deals reportedly total almost
              $3 billion combined despite the absence of a public internal clinical pipeline. insitro's packaging looks
              more flexible: in some Lilly programs it retains global rights while Lilly supplies enabling technology or
              receives milestones and royalties, and insitro's BMS collaboration pays target-selection milestones. Nabla
              shows that even smaller antibody-design startups can secure double-digit-million upfronts and
              billion-dollar back-end economics when a strategic pharma buyer believes the platform could unlock hard
              targets. By contrast, Xaira has not publicly disclosed partner pricing, a named platform customer, or any
              clinical program economics. That gap does not prove weakness, but it means financial underwriting has to
              rely on comparable partnership structures rather than company-specific pricing evidence.
