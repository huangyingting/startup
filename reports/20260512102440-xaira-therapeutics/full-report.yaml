      - number: '8.5'
        title: Exit readiness, diligence asks, and final verdict
        blocks:
          - type: paragraph
            body: >-
              Xaira is not IPO-ready on public evidence. There is no public pricing history for the private stock, no
              disclosed financial statements, no visible commercial metrics, and no mature compliance package. That does
              not make the company weak; it makes the public record incomplete. The nearer-term value realization paths
              are therefore more likely to be collaborations, partner-backed assets, or strategic acquisition logic than
              a clean near-term standalone public listing. Large pharma, strategic techbio companies, or major AI and
              data platform owners are the most natural counterparty archetypes because Xaira's differentiated story is
              the combination of models, data generation, and therapeutic ambition rather than a single software
              product.


              That leads directly to the final diligence asks. Investors need the term sheet and cap table, not just the
              story. They need burn and milestone-based budget logic, not just the headline $1B. They need collaboration
              pipeline data, pricing logic, and evidence that the platform is producing asset-level decisions or
              external partner pull. They also need the compliance and security materials that later buyers or
              regulators will ask for. The public evidence quality is therefore asymmetric: strong on team and science,
              weak on economics and terms. Final verdict: research-more. Continue only if pricing lands near the
              public-comp cluster plus a rational premium and private diligence closes the biggest evidence gaps. If
              pricing assumes frontier-scale proof that is not yet visible, pass and revisit after proof catches up.
