      - number: '1.5'
        title: Milestones and current operating posture
        blocks:
          - type: paragraph
            body: >-
              The public milestone record shows a company moving from stealth assembly into visible platform
              proof-points rather than into the clinic. Xaira was incorporated in 2023, launched publicly in April 2024,
              and spent the next eighteen months filling out its executive bench and physical footprint. On the
              scientific side, the major public milestones have been the June 2025 release of X-Atlas/Orion, billed as
              the largest publicly available genome-wide Perturb-seq dataset at the time, followed by the March 2026
              unveiling of X-Cell, a 4.9-billion-parameter virtual cell model trained on the 25.6 million-cell
              X-Atlas/Pisces dataset. Those announcements matter because they convert Xaira’s “AI drug discovery”
              narrative into at least some public technical artifacts and open-science signals. At the same time, the
              company still has not publicly disclosed a named clinical candidate, IND timing, or first-human trial
              date. The milestone arc therefore supports a view of Xaira as a well-capitalized preclinical platform
              company graduating from secrecy into selective scientific disclosure, not yet as a therapeutics company
              with clinical validation.
