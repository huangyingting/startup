      - number: '1.6'
        title: Adverse signals and diligence gaps
        blocks:
          - type: paragraph
            body: >-
              Two issues stand out in the adverse file. First, Xaira’s leadership story is inseparable from the
              controversy around Marc Tessier-Lavigne’s 2023 resignation from Stanford. KQED and Retraction Watch both
              document that the independent review did not find fraud by Tessier-Lavigne personally, but did find
              important flaws, data issues by others in his lab, and failures to correct the scientific record
              decisively. That does not invalidate Xaira’s technology thesis, but it creates a recurring governance and
              reputational talking point. Second, the company remains notably opaque on economics and development timing
              despite its giant war chest. Public sources reviewed here do not disclose a current equity valuation,
              revenue, customer count, cash-on-hand, or the timing of its first clinical candidate. Launch and profile
              coverage also preserves skepticism from scientists and investors who note that de novo antibody generation
              and AI-first biotech execution remain early-stage disciplines. Xaira therefore enters later diligence with
              unusually strong capital and talent, but also with unresolved questions on governance resilience, economic
              disclosure, and how quickly its platform can produce human-tested assets.
            claimRefs:
