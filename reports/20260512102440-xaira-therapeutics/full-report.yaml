      - number: '1.4'
        title: Capital base, footprint, and disclosed scale
        blocks:
          - type: paragraph
            body: >-
              Xaira launched with one of the largest initial funding commitments ever seen for a biotech startup: more
              than $1 billion of committed capital from ARCH, Foresite, and a syndicate of well-known venture investors.
              Bob Nelsen separately told Endpoints that ARCH alone intended to contribute more than $200 million,
              described the money as “hard money,” and suggested the initial capital base was a starting number rather
              than a ceiling. That kind of balance sheet supports Xaira’s decision to build broad internal capabilities
              instead of partnering narrowly from inception. Publicly disclosed scale numbers are still sparse, but
              launch coverage placed the company at roughly 50 employees in 2024, while GeekWire later reported about 80
              employees, around 15 of them in Seattle and a handful in London. Official pages and 2026 company materials
              now describe Xaira as headquartered in South San Francisco with innovation centers in Seattle and London.
              The company also announced a headquarters move within South San Francisco and a separate report pointed to
              a 73,075-square-foot San Francisco footprint expansion. Together, those disclosures support a real
              multi-site operating buildout even if precise current headcount and cash drawdown remain private.
