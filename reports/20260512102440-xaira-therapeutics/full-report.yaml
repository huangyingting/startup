      - number: '7.2'
        title: Scientific, operational, and security risk
        blocks:
          - type: paragraph
            body: >-
              Xaira's hardest risk is still scientific translation. Orion, Pisces, and X-Cell create a credible
              data-and-model story, but external commentary remains cautious about how far virtual-cell models can
              generalize toward patient outcomes. That matters because the investment case is not simply that Xaira can
              generate impressive biological representations; it is that those representations can improve target
              selection, therapeutic design, and eventually clinical success. Public X-Cell materials also remain
              incomplete: Xaira's Hugging Face and GitHub surfaces still said model weights and inference code were
              coming soon. That limits reproducibility, slows third-party benchmarking, and makes the external product
              surface look more like an advancing research release than a finished platform.


              Operationally, Xaira's moat depends on turning large-scale single-cell data generation into a repeatable
              engine. The Orion release ties that engine to 10x Genomics' Chromium platform, which makes 10x a
              meaningful upstream workflow dependency even if not the only one. Security and reliability are also
              under-documented publicly. Xaira's privacy policy says it uses appropriate measures and admits no method
              of transmission or storage is completely secure, but there is no reviewed public evidence of SOC 2, ISO
              27001, formal uptime commitments, disaster recovery detail, or regulated-data controls. NIST and CISA
              guidance make clear that AI deployment increasingly carries lifecycle governance and secure-by-design
              expectations. The residual operational risk is therefore not just outages or cyber events; it is the
              possibility that Xaira reaches a moment of buyer or regulator scrutiny before its public control surface
              is mature enough to clear diligence efficiently.
