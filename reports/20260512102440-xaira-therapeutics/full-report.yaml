  - id: FE001
    type: stack
    layout: standard
    slug: product-architecture-map
    title: Product architecture map
    summary: >-
      The public Xaira stack runs from perturbation-data generation through virtual-cell modeling into molecule design
      and therapeutic decisions.
    approximationNotes: >-
      The stack reflects only components directly supported by public sources. It does not assume undisclosed
      orchestration or hidden model layers.
    claimRefs:
      - CE003
      - CE006
      - CE008
      - CE009
      - CE019
      - CE021
      - CE032
    data:
      layers:
        - label: Wet-lab perturbation generation
          detail: >-
            FiCS Perturb-seq industrializes large-scale interventional single-cell experiments using workflows tied to
            10x Chromium and deep sequencing.
        - label: Atlas and data-engineering layer
          detail: >-
            Orion and Pisces convert those experiments into reusable causal datasets spanning growing biological context
            breadth.
        - label: Virtual-cell model layer
          detail: X-Cell applies a set-level diffusion transformer to predict perturbation response from control-cell inputs.
        - label: Biological prior integration
          detail: >-
            Cross-attention injects ESM-2, STRING, GenePT, DepMap, JUMP-Cell Painting, and related gene priors into the
            modeling stack.
        - label: Molecule-design translation
          detail: >-
            Seattle molecular-design teams connect model insight to protein and antibody design workflows rooted in IPD
            heritage.
        - label: Therapeutic program outputs
          detail: >-
            The claimed end state is target identification, MoA insight, patient stratification, and internal
            therapeutics rather than a stand-alone public SaaS endpoint.
