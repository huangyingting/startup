      - number: '1.2'
        title: Founders and scientific starting point
        blocks:
          - type: paragraph
            body: >-
              Xaira’s founding story combines elite scientific origin with heavyweight venture incubation. Official bios
              identify David Baker, Marc Tessier-Lavigne, and Hetu Kamisetty as co-founders, while launch coverage also
              frames ARCH’s Robert Nelsen and Foresite’s Vik Bajaj as the venture architects who assembled the company.
              The scientific core clearly comes from Baker’s Institute for Protein Design at the University of
              Washington, where RFdiffusion and RFantibody emerged and where several early Xaira researchers trained.
              Launch materials also state that Xaira incorporated functional genomics capabilities spun out from
              Illumina and a proteomics group from Interline Therapeutics, giving the company broader biological
              data-generation capability than a pure protein-design startup. That combination helps explain why
              management repeatedly describes Xaira as building across biology discovery, design of drug-like matter,
              and clinical development instead of focusing only on antibody design. The result is a company with genuine
              cross-disciplinary breadth from day one, but also one whose founding narrative spans multiple
              constituencies and therefore requires careful governance and operating alignment as it scales.
