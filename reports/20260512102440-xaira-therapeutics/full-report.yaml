      - number: '1.3'
        title: Leadership bench, board, and governance coverage
        blocks:
          - type: paragraph
            body: >-
              The current leadership team is unusually senior for a company that still has no disclosed clinical-stage
              asset. Marc Tessier-Lavigne brings prior Genentech and academic leadership experience. Hetu Kamisetty
              anchors the AI/ML stack, while Debbie Law, Paulo Fontoura, Bo Wang, Jeff Jonker, and Rachel Lane were
              added across 2024–2026 to deepen scientific, medical, AI, operating, and partnership capabilities. The
              board and scientific advisory bench are also exceptional on paper, with Scott Gottlieb, Alex Gorsky,
              Carolyn Bertozzi, Richard Scheller, Robert Nelsen, and others spanning regulatory, big pharma, venture,
              and Nobel-level science. That breadth gives Xaira more coverage than most early-stage biotechs for
              governance, recruiting, and eventual partnering. It also concentrates a large portion of the company’s
              external credibility in a small set of marquee names. Marc and David Baker remain the two most visible
              identity anchors; if either were to disengage or lose credibility, the impact on recruiting, fundraising,
              and external trust would likely be disproportionate. The high-caliber bench is a genuine strength, but it
              does not eliminate key-person or oversight risk.
