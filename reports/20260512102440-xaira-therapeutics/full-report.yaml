        title: What Xaira actually delivers
        blocks:
          - type: paragraph
            body: >-
              Publicly, Xaira does not look like a classic software company with a menu of externally sold products. Its
              official framing is an integrated biotech platform that combines advanced AI research, expansive data
              generation, and therapeutic product development, with each layer feeding the next. That means the
              company's 'product' is better described as an operating model: build causal biology data, train predictive
              models on those data, validate the predictions experimentally, and convert the output into therapeutic
              programs. The evidence is strongest for that internal platform identity. Xaira's 2024 launch materials and
              current approach page both emphasize the three-pillar stack. Since then, the company has publicly shipped
              research artifacts that sit inside that stack—X-Atlas/Orion, X-Atlas/Pisces, X-Cell, GitHub docs, and
              Hugging Face cards—but none of the reviewed sources show a public price sheet, enterprise deployment
              package, or named external software customer. In practical workflow terms, the most credible present-day
              users are Xaira's own scientists, potential collaborators, and outside researchers evaluating partial open
              releases. That distinction matters for diligence: there is real technical surface area here, but it is
              still more platform proof than finished commercial packaging.
