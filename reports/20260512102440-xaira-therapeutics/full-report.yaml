  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Which competitors actually matter for Xaira
        blocks:
          - type: paragraph
            body: >-
              Xaira should not be compared only to one other AI-biotech logo. Its disclosed model combines frontier
              machine learning, proprietary perturbation data generation, and therapeutic product development, with 2026
              reporting pointing specifically to inflammatory and immunological antibody therapeutics as the first
              wedge. That means the relevant landscape has at least four layers. First are direct AI-first therapeutics
              platforms such as Generate, insitro, Recursion/Exscientia, Isomorphic Labs, and Absci that publicly
              combine differentiated models with experimental systems or internal asset creation. Second are adjacent
              biologics-design specialists such as Chai Discovery and Nabla Bio that compete for the antibody and
              protein-design budget inside the same buyer set. Third are substitute toolchains such as Schrödinger,
              whose physics-plus-AI software and partnered programs let buyers solve part of the same discovery job
              without buying an integrated Xaira-like platform. Fourth is internal build at large pharma, where Lilly,
              Novartis, Sanofi, Roche and others can combine their own data with multiple external partners. The
              competitive question is therefore not whether Xaira has peers; it is which layer most directly constrains
              pricing power and deal terms in the next two to three years.
