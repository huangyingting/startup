      - number: '3.5'
        title: What the landscape means for Xaira
        blocks:
          - type: paragraph
            body: >-
              The peer set implies that Xaira does not need to prove that there is demand for AI-enabled therapeutics
              platforms. Demand is visible in the size and number of disclosed pharma collaborations across Generate,
              Isomorphic, insitro, Recursion, Nabla, and Schrödinger. What Xaira still needs to prove publicly is where
              it sits on that spectrum. Its strongest disclosed technical claim is the scale of X-Cell and the
              perturbation datasets behind it, which suggests a credible scientific wedge around causal cell biology
              rather than just generative sequence design. That matters because the biologics-design portion of the
              market is already crowded by Generate, Absci, Chai, and Nabla. If Xaira is meaningfully better at causal
              target selection, patient matching, or cross-modality therapeutic design, it may deserve comp sets closer
              to the larger full-stack platforms. If not, buyers can likely multi-home across more mature peers while
              waiting for clearer evidence. Later financial and valuation work should therefore ask whether management
              can show partner interest, exclusivity, or internal asset progress that moves Xaira from "scientifically
              impressive" to "commercially benchmarkable."
