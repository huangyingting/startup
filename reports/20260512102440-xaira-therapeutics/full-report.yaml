      - number: '2.4'
        title: Growth drivers and adoption constraints
        blocks:
          - type: paragraph
            body: >-
              The bull case for AI-enabled biopharma is straightforward: the industry’s R&D productivity is weak, the
              cost of bringing new medicines to market remains enormous, and platform teams now have access to better
              compute, better data, and better lab automation than they did even a few years ago. Deloitte’s 2025 survey
              shows tangible throughput and error-reduction gains from lab modernization, while McKinsey and Accenture
              both frame digital and AI tooling as a necessary response to poor capital efficiency. Xaira is positioned
              directly inside that thesis because its model depends on generating proprietary perturbation data and
              feeding it back into model development. But the constraint case is just as real. McKinsey says pharma has
              not yet seen system-wide improvements in development timelines or success rates. Mordor highlights
              explainability, data fragmentation, talent scarcity, and liability uncertainty. ACS and GEN both preserve
              the brutal baseline statistics: drug discovery remains a decade-plus process, only about one in ten
              clinical candidates reaches approval, and most molecules still fail before commercial success. Even if
              Xaira’s science works, immunology pricing, adverse-effect risk, and biosimilar pressure mean the large
              end-market will not translate into unconstrained pricing power.
