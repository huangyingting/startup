            body: >-
              What is missing is more important than what is present. Xaira does not publish financial statements, SEC
              filings, quarterly cash balances, collaboration revenue, partner contracts, debt schedules, lease
              obligations, or program-level R&D allocations. The company is private, so that is unsurprising, but it has
              real analytical consequences. Public-company peers such as Schrödinger have filing surfaces and annual
              financials; Recursion, Relay, and Absci at least publish periodic results or cash-runway statements. Xaira
              does not. As a result, core unit-economics questions remain unanswered: What is the monthly burn? What
              share of spend is core AI versus wet lab versus internal therapeutics? Are any partner conversations
              already producing research funding? Are there lease, compute, or manufacturing commitments that create
              fixed obligations? Without those answers, even seemingly basic conclusions—such as whether Xaira is
              spending aggressively enough to outrun peers or conservatively enough to avoid an early financing
              need—remain partly speculative. The chapter can still reach a directional judgment, but not an audited
