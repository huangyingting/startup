  - id: TP003
    slug: pricing-packaging-comparison
    title: Pricing / packaging comparison
    description: >-
      Only publicly disclosed economics are included. The absence of a number usually means the
      market uses bespoke deal structures or the company has not disclosed terms.
    columns:
      - Company / package
      - Publicly disclosed economics
      - Included capabilities
      - Unknowns / omissions
      - Implication
    rows:
      - - Xaira
        - >-
          No public pricing, partner economics, or named external platform contracts found in
          reviewed sources
        - Integrated AI research, data generation, virtual-cell work, and therapeutics narrative
        - No public list pricing, no named commercial partner, no public program economics
        - Hardest variable to underwrite directly; later chapters must use comparable deals instead
      - - Generate / Novartis
        - >-
          $65M upfront cash including $15M equity; >$1B milestones; tiered royalties up to low
          double-digits
        - >-
          Multi-target protein therapeutics discovery using Generate Platform + Novartis biology /
          development
        - Target count and exact disease areas undisclosed
        - Premium biologics-platform benchmark with clear partner willingness to pay
      - - Isomorphic / Lilly + Novartis
        - >-
          Press coverage says $45M Lilly upfront + up to $1.7B and $37.5M Novartis upfront +
          research funding + up to $1.2B
        - Multi-target AI-enabled small-molecule discovery via Isomorphic's engine
        - >-
          Official public term detail remains thinner than media summaries; internal asset economics
          undisclosed
        - >-
          Frontier-model credibility can support billion-dollar back-ends without public internal
          clinical proof
      - - insitro / Lilly + BMS
        - >-
          BMS target expansion triggered $10M milestone; Lilly structures let insitro retain global
          rights on some programs while Lilly receives milestones / royalties or supplies technology
        - ALS targets, siRNA delivery, antibodies, and ADMET / small-molecule model building
        - Program-by-program economics vary and many upfronts remain undisclosed
        - Flexible, biotech-favorable packaging is possible when platform value is differentiated
      - - Recursion / Sanofi + Bayer
        - Sanofi $100M upfront + up to $5.2B plus royalties; Bayer up to $1.5B plus royalties
        - Target discovery, precision design, lead optimization, and broader platform collaboration
        - Per-program splits, exclusivity, and realized value are not fully public
        - Largest disclosed full-stack AI-discovery comp set in this landscape
      - - Nabla / Takeda + 2024 partner set
        - >-
          2025 Takeda deal: double-digit millions upfront + research cost payments + >$1B
          success-based payments; 2024 collaboration package >$550M plus royalties
        - De novo antibodies, multispecifics, and other custom therapeutics via JAM + wet lab
        - Specific target counts and milestone timing undisclosed
        - Even smaller biologics-design startups can command large back-end economics
      - - Schrödinger / Lilly
        - >-
          Up to $425M in discovery, development, and commercial milestones plus low single- to low
          double-digit royalties
        - >-
          Computational design and discovery programs; separate enterprise software footprint via
          LiveDesign
        - Public source does not disclose software seat pricing or realized pricing mix
        - >-
          Substitute vendors still monetize drug-creation work primarily via milestone-bearing
          collaborations
    notes: >-
      Across reviewed peers, no company published transparent list pricing for AI drug discovery
      access. Public economics are overwhelmingly partnership-based.
