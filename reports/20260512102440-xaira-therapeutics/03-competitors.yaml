callouts:
  - calloutType: insight
    title: Where Xaira is most differentiated on paper
    body: >-
      Xaira's public story is strongest where it is least crowded by marketing copy alone: causal
      perturbation data, virtual-cell modeling, and the attempt to connect those systems to target
      and patient selection. That is a different wedge from simply saying AI can design antibodies.
    claimRefs:
      - CP028
      - CP043
  - calloutType: risk
    title: The main competitive hazard
    body: >-
      The biologics and antibody-design wedge is already crowded, and large pharma buyers appear
      comfortable running multiple AI-partner experiments at once. Without public proof of deal
      terms, exclusivity, or internal assets, Xaira is competing against both stronger peers and
      buyer optionality.
    claimRefs:
      - CP027
      - CP031
      - CP041
