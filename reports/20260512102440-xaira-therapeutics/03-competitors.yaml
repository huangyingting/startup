  - id: TP004
    slug: moat-durability-risk-register
    title: Moat durability / competitive risk register
    description: >-
      Competitive risks that matter most to whether Xaira can turn scientific differentiation into
      pricing power or durable buyer preference.
    columns:
      - Moat claim
      - Threat
      - Severity
      - Mitigation / diligence ask
    rows:
      - - Causal virtual-cell and perturbation-data moat
        - >-
          Recursion and insitro already operate large proprietary data loops, and public evidence
          has not yet benchmarked Xaira's causal stack head-to-head against them
        - Material
        - >-
          Request head-to-head evidence on target nomination quality, unseen-biology generalization,
          and hit-to-lead impact versus peer platforms
      - - Biologics-design differentiation
        - >-
          Generate, Absci, Chai, and Nabla already crowd the AI-biologics wedge around antibodies
          and protein therapeutics
        - High (near-term)
        - >-
          Clarify whether Xaira's edge is causal target selection, patient matching, or
          cross-modality design rather than antibodies alone
      - - Partnership pricing power
        - >-
          Large pharma buyers appear willing to multi-home across several AI vendors at once,
          reducing exclusivity and negotiating leverage
        - Material
        - >-
          Ask for any evidence of exclusivity, workflow embedding, or rights structures that make
          Xaira harder to replace once engaged
      - - Capital as a moat
        - >-
          Recursion's post-merger pipeline cuts show that scale and cash do not guarantee durable
          execution or lower burn
        - Material
        - >-
          Model Xaira's burn under aggressive data-generation, lab-expansion, and internal-pipeline
          scenarios instead of assuming the initial war chest is sufficient
      - - Trust / regulatory posture
        - >-
          As AI drug discovery matures, buyers may demand model auditability, reproducibility, and
          governance—not just benchmark claims
        - Moderate
        - >-
          Request validation protocols, data provenance documentation, and any governance materials
          used in partner conversations
      - - Internal-build substitution
        - >-
          Large pharma can combine internal data with Isomorphic, Schrödinger, insitro, Recursion,
          and other partners rather than standardize on one external platform
        - Material
        - >-
          Identify use cases where Xaira can be materially faster, more precise, or more
          capital-efficient than a mixed internal-plus-partner stack
    notes: >-
      Severity ratings are qualitative diligence judgments. High means the threat could impair
      partner economics within roughly 2–3 years; Material implies meaningful impact within roughly
      3–5 years; Moderate means watch closely but evidence is still incomplete.
    claimRefs:
      - CP028
      - CP031
      - CP032
      - CP033
      - CP034
      - CP038
      - CP040
      - CP044
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the highest-salience moat and displacement risks visible from public evidence rather
        than every operational risk in AI drug discovery.
