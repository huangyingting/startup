  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - Risk
      - Monitorable trigger
      - Threshold / event
      - Action implication
    rows:
      - - Regulatory / compliance readiness
        - Presence of AI-governance, validation, DPA, and quality materials
        - If still absent when Xaira seeks enterprise deployment or submission-adjacent use cases
        - >-
          Require management explanation of gating plan before underwriting faster commercialization
          or clinical-adjacent claims
      - - Full public product shipment
        - Weights, inference code, and reproducible docs become generally available
        - If X-Cell still remains partial through the next major diligence cycle
        - Discount claims about product maturity and external developer adoption
      - - Commercial partner conversion
        - Named collaboration, pilot, or strategic buyer proof
        - If no credible counterparty proof emerges despite sustained scientific publicity
        - Treat open-science traction as marketing rather than monetization evidence
      - - Therapeutic translation
        - >-
          Evidence that platform outputs shape actual assets, target decisions, or regulated
          milestones
        - If translation remains rhetorical rather than measurable
        - Increase discount for execution risk in valuation and scenario analysis
      - - Key-person stability
        - Leadership departures or role instability
        - Departure of one or more core scientific / technical / clinical leaders
        - >-
          Reassess operating continuity, recruiting difficulty, and knowledge-transfer risk
          immediately
      - - Security / procurement maturity
        - Enterprise diligence package, audits, or reliability commitments
        - If large buyers engage but Xaira still cannot satisfy baseline diligence asks
        - Assume long enterprise sales cycles and lower conversion probability
