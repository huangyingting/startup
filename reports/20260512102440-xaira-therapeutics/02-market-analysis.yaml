  evidenceGaps:
    - type: missing-source
      severity: material
      topic: xaira-exact-sam
      missingEvidence: >-
        A credible independent estimate for the exact market size addressed by Xaira’s specific
        combination of virtual-cell models, antibody design, and inflammatory/immunology
        therapeutics.
      whyItMatters: >-
        Without that estimate, any single-number SAM for Xaira would be more illustrative than
        evidence-based and could distort valuation work.
      diligencePath: >-
        Request management’s internal market model, any partner-outreach materials, and third-party
        analyses they rely on to size the opportunity.
      relatedQuestionRefs:
        - QM023
        - QM025
      relatedTableRefs:
        - TM001
        - TM002
    - type: private-evidence-only
      severity: material
      topic: tm003-buyer-budget-and-pricing
      missingEvidence: >-
        Buyer-specific budget ranges, target contract structure, pricing assumptions, and any actual
        platform or co-development economics for Xaira’s current commercial conversations.
      whyItMatters: >-
        The buyer map is directionally supportable from public evidence, but it cannot be fully
        underwritten without actual budget-owner behavior and pricing data.
      diligencePath: >-
        Request pipeline-commercialization plans, business-development materials, and any active or
        historical partner term sheets or outbound decks.
      relatedQuestionRefs:
        - QM008
        - QM024
      relatedTableRefs:
        - TM003
    - type: missing-source
      severity: material
      topic: ai-clinical-proof-gap
      missingEvidence: >-
        Clear public evidence that AI-first discovery platforms have already delivered system-wide
        improvements in approval rates or late-stage success, rather than isolated timeline
        anecdotes.
      whyItMatters: >-
        This is the biggest bridge between platform excitement and durable therapeutic-market
        capture. Without proof of better translation, valuation should stay conservative.
      diligencePath: >-
        Track mature AI-first clinical cohorts, partner post-mortems, and program-level comparisons
        of AI-guided versus conventional discovery outputs.
      relatedQuestionRefs:
        - QM021
        - QM025
      relatedTableRefs:
        - TM004
