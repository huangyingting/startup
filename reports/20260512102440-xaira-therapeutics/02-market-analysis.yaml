  - id: xaira-fit-and-gaps
    title: What the market evidence means for Xaira
    body: >-
      The market evidence supports a nuanced interpretation of Xaira. The company has aligned itself
      with a very large therapeutic problem set and a fast-growing platform category, and its early
      I&I plus antibody orientation gives it a concrete wedge instead of a generic “AI for biology”
      story. At the same time, no public source reviewed here quantifies the exact serviceable
      market at the intersection of virtual-cell models, antibody design, and inflammatory disease
      therapeutics. That is not a minor modeling annoyance; it is a real diligence gap. It means
      later chapters should avoid pretending Xaira’s SAM is already cleanly measured. Competitor
      analysis should test whether buyers view Xaira as a platform vendor, a modality-specific
      biotech, or a future integrated drug company. Valuation work should also separate platform
      optionality from clinical asset value instead of applying one blanket multiple to the whole
      story.
    claimRefs:
      - CM004
      - CM021
      - CM026
      - CM042
      - CM043
