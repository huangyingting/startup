          licensing structure
        - CSO, Head of R&D, BD committee
        - >-
          Clear evidence that Xaira improves target quality, MoA insight, patient stratification, or
          discovery speed
      - - Emerging biopharma / platform collaborators
        - CEO, CSO, or business-development lead
        - Small translational teams and outsourced discovery partners
        - VC or public-market-funded operating budget
        - Use Xaira to access differentiated targets or reduce internal compute/wet-lab buildout
        - CEO / CFO / CSO
        - Cheaper or faster de-risking than building the full stack internally
      - - Xaira internal portfolio teams
        - Xaira leadership and portfolio committees
        - Xaira AI, wet-lab, discovery, and development teams
        - Xaira balance sheet and committed capital
        - Generate data → build model → nominate target / molecule → advance internal programs
        - CEO, COO, CSO, CTO
        - >-
          Enough internal evidence to justify moving a program into expensive preclinical or
          clinical work
      - - Academic / translational collaborators
        - Principal investigators and platform leads
        - Bench scientists, computational biologists, trainees
        - Grant budgets, consortium funding, institutional research support
        - Benchmark models, validate biology, access open subsets of data/tools
        - PI / grants office
        - Unique data access, publication value, or translational collaboration opportunity
      - - Clinicians / KOLs / trial investigators
        - Medical and clinical development teams recruit them rather than sell to them directly
        - Physicians, investigators, patients
        - Sponsor trial budgets initially; payers after approval
        - Biomarker hypothesis → trial design → site selection → clinical evidence generation
        - CMO / development leadership
        - Mechanistic credibility plus clinically actionable patient-selection logic
      - - Health systems / insurers / hospital channels
        - Formulary and coverage committees for drug path; not buyers of the platform itself
        - Patients, infusion centers, hospital pharmacists, specialty clinicians
        - Commercial insurers, Medicare/Medicaid analogues, government systems
        - Approval → guideline support → formulary coverage → dispensing and reimbursement
        - Pharmacy / medical budget committees
        - Differentiated efficacy and safety with acceptable net price and reimbursement profile
