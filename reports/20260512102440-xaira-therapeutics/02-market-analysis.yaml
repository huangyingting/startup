    slug: market-definition-table
    title: Market definition table
    description: >-
      Core market lenses relevant to Xaira, including what spend is counted, what is excluded, who
      pays, and why the lens matters.
    columns:
      - Segment / category
      - Included spend
      - Excluded spend
      - Buyer / payer
      - Relevance to Xaira
    rows:
      - - AI-enabled drug discovery platform market
        - >-
          Software, model access, discovery services, workflow tooling, and some platform-partnering
          spend tied to target identification, design, and prediction
        - >-
          Approved-drug sales, general CRO revenue, generic cloud spend, and wet-lab services not
          sold as part of an AI platform
        - Large pharma and biotech R&D / BD budgets; some academic platform budgets
        - >-
          Most relevant near-term external monetization lens if Xaira sells or partners access to
          its AI-and-data stack
      - - Inflammatory disease therapeutics market
        - >-
          Drug revenue for inflammatory and immune-mediated diseases such as RA, IBD, psoriasis, and
          related chronic inflammatory disorders
        - Diagnostics, devices, surgery, general hospital services, and unrelated therapeutic areas
        - Health systems, insurers, government programs, and hospital channels
        - Best broad end-market lens for Xaira’s publicly disclosed I&I pipeline direction
      - - Immunology drug market
        - >-
          Immune-modulating drugs including mAbs, fusion proteins, immunosuppressants, and other
          therapies for autoimmune or immunological disorders
        - Many non-immune therapies, general wellness spend, and broad hospital services
        - Same downstream payer stack as above, with prescriber influence from specialists
        - >-
          Useful adjacent end-market lens that captures broader autoimmune and immunology revenue
          pools
      - - Antibody production / discovery ecosystem
        - >-
          Research, development, manufacturing, consumables, and software tied to antibody discovery
          and production
        - Finished-drug sales and non-antibody biologic modalities not in scope
        - Pharma, biotech, CDMOs, and research institutions
        - >-
          Relevant because Xaira’s initial disclosed modality emphasis is antibodies, making this
          the bridge between platform and product
      - - Excluded adjacencies and status-quo substitutes
        - >-
          Conventional wet-lab discovery, generic AI tooling, CRO services, and broader biologics or
          pharma revenue pools outside Xaira’s stated focus
        - N/A
        - Various
        - >-
          These are comparison points or substitute budgets, but they should not be rolled into a
          single Xaira TAM without explicit justification
    notes: >-
      The rows are not additive. They represent overlapping but non-equivalent lenses on platform
      spend, modality infrastructure, and eventual therapeutic value.
