    - type: private-evidence-only
      severity: material
      topic: current-cash-and-burn
      missingEvidence: Current cash balance, current burn, and historical quarterly cash flow for Xaira.
      whyItMatters: Without these numbers, runway remains a scenario estimate rather than a balance-sheet fact.
      diligencePath: >-
        Request latest board deck or finance packet showing cash, gross burn, net burn, and monthly
        trend since launch.
