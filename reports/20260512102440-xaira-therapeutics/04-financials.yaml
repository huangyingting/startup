callouts:
  - calloutType: insight
    title: $1B buys time, not proof
    body: >-
      The launch financing is large enough to matter strategically, but it does not answer the core
      financial questions investors eventually need: current cash, burn, partner revenue, and the
      cost of internal pipeline ambition.
    claimRefs:
      - CI001
      - CI022
      - CI037
  - calloutType: risk
    title: The hidden variable is capital allocation
    body: >-
      If Xaira monetizes the platform through partnerships first, dilution risk could stay
