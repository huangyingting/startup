  - id: TI002
    slug: pricing-monetization-table
    title: Pricing / monetization table
    description: >-
      Public monetization benchmarks from peer AI-biopharma companies that bound what Xaira might
      eventually be able to charge or negotiate.
    columns:
      - Price / unit / contract
      - List vs realized pricing
      - Discounts / unknowns
      - Source / implication
    rows:
      - - Xaira platform / collaboration
        - No public price or contract structure disclosed
        - No list price, realized price, or recognized revenue disclosed
        - >-
          Public silence means valuation must use peer comparables rather than company-specific
          pricing evidence
      - - 'Generate / Novartis: $65M upfront + >$1B milestones + royalties'
        - >-
          Deal terms are disclosed at headline level, but realized timing depends on target count
          and progress
        - Target count and disease areas undisclosed
        - Benchmarks premium biologics-platform monetization
      - - >-
          Isomorphic / Lilly + Novartis: reported $45M and $37.5M upfronts with much larger back-end
          economics
        - Press-reported economics rather than a public price sheet
        - Official term detail remains thinner than media summaries
        - Shows frontier-model credibility can monetize via strategic pharma deals
      - - 'insitro / Lilly + BMS: flexible rights structures plus milestones'
        - >-
          Realized economics vary program by program and some structures retain global rights for
          insitro
        - Many exact upfronts remain undisclosed
        - >-
          Suggests Xaira may eventually have multiple monetization templates instead of one standard
          contract
      - - 'Recursion / Sanofi + Bayer: $100M upfront + up to $5.2B; Bayer up to $1.5B'
        - Realized revenue and milestones depend on progress and recognition rules
        - Per-program splits and exclusivity terms unclear
        - Upper-end benchmark for a scaled full-stack techbio model
      - - 'Nabla / Takeda: double-digit millions upfront + >$1B back-end potential'
        - Still partnership-based, not list priced
        - Timing and target count undisclosed
        - >-
          Even earlier-stage biologics-design companies can monetize well if the science is
          differentiated
    notes: >-
      No reviewed company publishes transparent list pricing for AI drug discovery access. Peer
      monetization remains bespoke and milestone-heavy.
    claimRefs:
      - CI020
      - CI021
      - CI029
      - CI032
      - CI033
      - CI034
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the clearest public monetization benchmarks rather than every private or undisclosed
        transaction in the market.
  - id: TI003
    slug: unit-economics-table
    title: Unit economics table
    description: >-
      Public unit-economics inputs and nulls for Xaira. Nulls are intentional where private
      disclosure is still required.
    columns:
      - Metric
      - Value / null
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Public external revenue
        - Unknown / none disclosed
        - Low
        - >-
          Determines whether Xaira is already offsetting burn with partner cash or still fully
          equity-funded
        - Request 2025 and year-to-date 2026 collaboration or other operating revenue
      - - Headcount / site footprint proxy
        - >-
          ~50 employees at launch (Endpoints) and ~80 employees in 2024 with Bay Area, Seattle, and
          London presence; 73,075 sq ft SF buildout reported
        - Medium
        - A practical proxy for personnel, lab, and occupancy cost intensity
        - Request current headcount by function and all active lab / office lease commitments
      - - Capital-intensive spend mix
        - >-
          High; public sources point to talent, compute, data generation, wet lab, and therapeutic
          development as the main buckets
        - Medium
        - Explains why Xaira should not be compared to a pure-AI software startup on burn or margin
        - >-
          Request 2025 spend allocation across AI, data generation, platform operations, and
          therapeutics
      - - Estimated annual burn proxy
        - >-
          $120M–$260M per year (very low confidence estimate using Xaira scale signals and peer
          public results)
        - Low
        - Needed to scenario-model runway in the absence of current cash disclosure
        - Request actual monthly burn, cash operating expense, and annualized run rate as of Q1 2026
      - - Gross margin on realized revenue
        - Unknown
        - Low
        - >-
          If Xaira monetizes through research funding or milestones, eventual gross margin could be
          high; if it internalizes assets, margin path is much longer and more capital intensive
        - Request revenue mix assumptions and COGS structure by monetization path
      - - Program-level development cost
        - Unknown
        - Low
        - >-
          Internal asset spending is the biggest swing factor for dilution risk and runway
          compression
        - Request cost to advance each major program from current stage to IND and through Phase 1
    notes: >-
      This table is intentionally explicit about nulls because Xaira's private status removes the
      normal quarterly and annual financial disclosures used for biotech underwriting.
