        obligations.
      whyItMatters: These obligations can compress runway materially even when topline cash appears strong.
      diligencePath: >-
        Request lease schedules, major vendor contracts, cloud commitments, and any debt or
        equipment-finance agreements.
      relatedQuestionRefs:
        - QI015
