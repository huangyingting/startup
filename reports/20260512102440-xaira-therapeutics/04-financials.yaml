  - id: TI005
    slug: public-financial-gaps-table
    title: Public financial gaps table
    description: >-
      The private metrics that most directly block underwriting Xaira with normal biotech or
      software methods.
    columns:
      - Missing metric
      - Impact
      - Exact diligence path
    rows:
      - - Current cash, equivalents, and marketable securities
        - Without this, runway remains a scenario exercise rather than a balance-sheet conclusion
        - Request latest monthly cash bridge and audited or board-reviewed cash position
      - - Actual burn by quarter and by function
        - >-
          Prevents confident modeling of whether Xaira is burning like Absci, Relay, Schrödinger, or
          closer to Recursion scale
        - >-
          Request quarterly operating cash flow, cash operating expense, and spend split across AI,
          data generation, and therapeutics
      - - Named partner contracts and economics
        - >-
          Blocks evaluation of whether platform monetization has already begun and what quality of
          revenue it represents
        - >-
          Request executed term sheets or signed agreements with revenue-recognition and milestone
          schedules
      - - Program-level spend and stage map
        - Makes it impossible to forecast how quickly internal pipeline ambition will absorb capital
        - >-
          Request current program inventory, stage, modality, and expected spend to next major
          milestone
      - - Debt, leases, compute commitments, and fixed obligations
        - Can materially change runway even when headline cash appears ample
        - >-
          Request lease schedule, cloud / compute contracts, equipment financing, and any contingent
          obligations
      - - Current traction metrics (customers, contracts, usage, pilots)
        - >-
          Without traction evidence, valuation relies on science promise and peer comps rather than
          commercial proof
        - >-
          Request number of active platform evaluations, paid pilots, signed partners, and realized
          revenue to date
    notes: >-
      All gaps listed here are material to valuation. None can be solved credibly from public
      information alone.
    claimRefs:
      - CI003
      - CI022
      - CI028
      - CI034
      - CI035
      - CI036
      - CI037
      - CI041
    enumerationScope:
      coverage: partial
      basis: >-
        Covers the highest-value public-data gaps that directly block underwriting rather than every
        possible accounting or legal diligence item.
