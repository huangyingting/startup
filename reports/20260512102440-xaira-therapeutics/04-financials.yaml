        - TI004
    - type: private-evidence-only
      severity: material
      topic: partner-economics
      missingEvidence: >-
        Any signed Xaira partnership, pilot, or co-development economics and the accounting
        treatment for those arrangements.
      whyItMatters: This is the cleanest way to separate platform optionality from real monetization.
      diligencePath: >-
        Request executed or draft agreements, milestone schedules, and revenue-recognition policy
        memos.
      relatedQuestionRefs:
        - QI001
        - QI003
        - QI017
        - QI021
      relatedTableRefs:
        - TI001
        - TI002
        - TI005
    - type: private-evidence-only
      severity: material
      topic: program-level-capital-allocation
      missingEvidence: >-
        Program-by-program spend, modality mix, and the share of capital allocated to platform
        versus owned assets.
      whyItMatters: >-
        The single biggest determinant of dilution risk is how aggressively Xaira funds internal
        programs before platform monetization appears.
      diligencePath: >-
        Request portfolio review materials, program budgets, and scenario plans for platform-first
        versus asset-first deployment.
      relatedQuestionRefs:
        - QI005
        - QI013
        - QI023
      relatedTableRefs:
        - TI003
        - TI004
        - TI005
    - type: missing-source
      severity: material
      topic: fixed-obligations
      missingEvidence: >-
