  - id: TI004
    slug: capital-adequacy-table
    title: Capital adequacy table
    description: >-
      Capital sufficiency view that starts from what is actually public and then labels the rest as
      estimated or unavailable.
    columns:
      - Capital input
      - Public value / estimate
      - Confidence
      - Why it matters
      - Diligence ask
    rows:
      - - Committed capital at launch
        - '>$1B committed capital in 2024'
        - High
        - Provides an unusually large starting cash reservoir for a private AI-biopharma buildout
        - >-
          Confirm what portion was funded immediately versus committed over time and what remains
          uncalled, if any
      - - Current cash on hand
        - Unknown publicly
        - Low
        - Most important single variable for financing risk and runway
        - >-
          Request balance-sheet cash, equivalents, and marketable securities as of the latest
          month-end
      - - Monthly burn proxy
        - $10M–$22M per month implied by the annual burn estimate range
        - Low
        - Converts launch capital into an actual time horizon for execution
        - Request current gross burn, net burn after any partner inflows, and burn trend by quarter
      - - Runway months
        - >-
          Unavailable publicly; rough scenario range of ~24–72 months from the 2026 run date
          depending remaining cash and actual burn
        - Low
        - Frames how quickly Xaira needs partnership monetization or another financing event
        - >-
          Request management runway model under base, internal-pipeline-heavy, and partnership-heavy
          cases
      - - Planned use of funds
        - >-
          AI model development, data generation, multi-modal therapeutics development, and expansion
          of the data / experiment loop
        - High
        - Explains why cash deployment may accelerate before any revenue is visible
        - Request 2026–2028 capital allocation plan by platform, data, and program portfolio
      - - Next-round / strategic trigger
        - >-
          Likely major partnership economics or internal asset proof rather than near-term product
          revenue
        - Medium
        - Determines when dilution or strategic partnering pressure becomes acute
        - >-
          Request board-level financing plan and the milestones management believes are required
          before re-entering the capital market
      - - Debt / project-finance obligations
        - None disclosed publicly
        - Low
        - Undisclosed fixed obligations could materially change runway analysis
        - Request debt, leases, cloud / compute commitments, and any equipment financing schedules
    notes: >-
      This table deliberately distinguishes disclosed facts, scenario estimates, and unavailable
      private data. Launch capital is not a substitute for current cash disclosure.
