  - id: public-gaps
    title: Public traction gaps and private-metric dependency
    body: >-
      What is missing is more important than what is present. Xaira does not publish financial
      statements, SEC filings, quarterly cash balances, collaboration revenue, partner contracts,
      debt schedules, lease obligations, or program-level R&D allocations. The company is private,
      so that is unsurprising, but it has real analytical consequences. Public-company peers such as
      Schrödinger have filing surfaces and annual financials; Recursion, Relay, and Absci at least
      publish periodic results or cash-runway statements. Xaira does not. As a result, core
      unit-economics questions remain unanswered: What is the monthly burn? What share of spend is
      core AI versus wet lab versus internal therapeutics? Are any partner conversations already
      producing research funding? Are there lease, compute, or manufacturing commitments that create
      fixed obligations? Without those answers, even seemingly basic conclusions—such as whether
      Xaira is spending aggressively enough to outrun peers or conservatively enough to avoid an
      early financing need—remain partly speculative. The chapter can still reach a directional
      judgment, but not an audited one.
    claimRefs:
      - CI003
      - CI022
      - CI028
      - CI035
      - CI036
      - CI037
      - CI041
    tableRefs:
      - TI005
  - id: financial-verdict
    title: Financial verdict
    body: >-
      The right financial verdict is that Xaira is pre-revenue, capital-intensive, and probably
      still well funded, but not yet financially legible enough for fundamental underwriting. The
      launch round was unusually large and likely bought real time. That time matters because Xaira
      is trying to build a differentiated causal-biology stack and, ultimately, a therapeutics
      engine, not merely a software product. But the same ambition that makes the story interesting
      also makes it expensive. If management leans harder into internal assets before external
      monetization appears, burn could move toward the more clinical, higher-cash-consumption end of
      the peer set. If Xaira instead monetizes the platform through partnerships first, the business
      could look more like a milestone-and-royalty platform company with a longer runway and less
      dilution risk. Public evidence today does not tell us which path is already winning. For later
      valuation work, that means Xaira should be treated as a funded option on platform monetization
      plus internal pipeline creation—not as a company with validated revenue quality, visible
      margins, or disclosed cash conversion.
    claimRefs:
      - CI023
      - CI025
      - CI031
      - CI038
      - CI039
      - CI040
      - CI042
tables:
  - id: TI001
    slug: revenue-streams-table
    title: Revenue streams table
    description: >-
      Most plausible revenue streams for Xaira based on its disclosed strategy and peer
      monetization, separated from streams that are merely theoretical.
    columns:
      - Stream
      - Mechanism
      - Unit
      - Current value / status
      - Quality
      - Diligence ask
    rows:
      - - Platform collaboration / research funding
        - Pharma pays for access to Xaira's models, data, workflow, or co-development capacity
        - $ per year or per program
        - >-
          No public Xaira value disclosed; likely the most plausible near-term monetization path if
          any exists
        - Unproven for Xaira; peer analogs show this is viable but bespoke
        - >-
          Request any signed platform or co-development agreements, annual research funding, and
          revenue-recognition treatment
      - - Milestone payments
        - >-
          Program-specific payments triggered by target nomination, candidate selection, IND,
          clinical progress, or approval
        - $ per milestone
        - No public Xaira milestone package disclosed
        - Potentially high value but binary and back-end loaded
        - >-
          Request milestone schedule, trigger definitions, and probability-weighted timing
          assumptions
      - - Royalties / profit share
        - Downstream share of sales from partnered assets
        - '% of net sales or profit split'
        - No public Xaira royalty economics disclosed
        - Long-duration and highly contingent on partner and clinical success
        - Request royalty tiers, retained rights, territory scope, and duration
      - - Out-licensing / option deals on internal assets
        - Third party buys or options Xaira-originated assets after early de-risking
        - $ upfront + milestones + royalties
        - No public asset deal disclosed
        - >-
          Plausible if Xaira prioritizes platform-generated assets before full
          self-commercialization
        - >-
          Clarify whether management prefers asset sales, co-development, or retained ownership by
          modality and stage
      - - Internal therapeutic sales
        - Xaira funds programs through clinical development and eventually sells approved medicines
        - $ net product sales
        - No public clinical-stage Xaira product or revenue disclosed
        - Very long-duration and highest-risk path
        - >-
          Request pipeline stage map, target product profiles, and any commercialization intent by
          program
    notes: >-
      The table separates plausible monetization logic from disclosed financial reality. Public
      evidence supports the logic, but not current realized revenue.
