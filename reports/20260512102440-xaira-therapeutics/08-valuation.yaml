  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: price-and-terms
      missingEvidence: >-
        Post-money valuation, share price, security type, liquidation preferences, anti-dilution
        protections, and investor-rights package.
      whyItMatters: >-
        Without the term sheet, public evidence can only set guardrails. It cannot convert the
        company-quality question into a priced return decision.
      diligencePath: >-
        Request executed term sheet, cap table, liquidation waterfall, side letters, and any bridge
        or structured-financing features.
      relatedQuestionRefs:
        - QV001
        - QV002
        - QV027
      relatedTableRefs:
        - TV001
        - TV006
    - type: private-evidence-only
      severity: material
      topic: burn-and-milestone-budget
      missingEvidence: >-
        Function-level burn, runway scenarios, and the milestone plan management expects the current
        capital base to buy.
      whyItMatters: >-
        A large financing round is only strategically valuable if it produces decisive proof before
        the next valuation event matters.
      diligencePath: >-
        Request board budget, scenario plans, capital-allocation framework, and timing assumptions
        tied to platform, data, and therapeutics milestones.
      relatedQuestionRefs:
        - QV025
        - QV026
        - QV032
      relatedTableRefs:
        - TV006
    - type: private-evidence-only
      severity: material
      topic: commercial-pipeline-and-pricing
