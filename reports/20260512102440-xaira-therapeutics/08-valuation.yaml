  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing evidence
      - Why it matters
      - Owner / diligence path
    rows:
      - - Price and term sheet
        - Post-money valuation, share price, security type, preference terms, and investor rights
        - >-
          Without this, there is no way to translate public evidence into an investable or
          non-investable price
        - Board / CFO / legal diligence
      - - Cap table and dilution waterfall
        - >-
          Fully diluted ownership, option pool, liquidation preferences, side letters, and any
          structured financing terms
        - Determines whether the same headline valuation implies acceptable common-equity economics
        - Finance + legal data room
      - - Burn and milestone budget
        - Runway by function, planned use of the >$1B raise, and the milestone plan tied to spend
        - >-
          Capital scale is a strength only if it buys decisive proof before the next financing event
          matters
        - CFO / FP&A / operating review
      - - Collaboration and commercial pipeline
        - Named counterparties, stage of discussions, pricing logic, and expected economics
        - This is the cleanest bridge from scientific proof to business proof
        - BD / CEO / pipeline review
      - - Platform-to-asset translation
        - Examples linking Orion, Pisces, X-Cell, or internal models to target or molecule decisions
        - >-
          Translation proof is the most important justification for valuation premium above public
          comps
        - CSO / CTO / portfolio committee diligence
      - - Security and compliance readiness
        - DPA, audit artifacts, model governance, quality systems, and customer diligence materials
        - >-
          Future buyers, partners, and regulators will require this before scale deployment or
          submission-relevant use
        - Security / legal / quality diligence
    notes: >-
      The asks focus on the specific information that would move Xaira from an interesting public
      narrative to a priceable private opportunity.
