  - id: scenario-ranges
    title: Bull / base / bear scenario ranges
    body: >-
      Because the actual entry price is not public, the cleanest way to express valuation is with
      evidence-backed reference ranges rather than IRRs. In the bear case, Xaira remains
      scientifically credible but still fails to show named collaborations, clear commercial
      conversion, or asset-level translation. In that world, valuation drifts back toward the public
      comp cluster: roughly $1.5B-$2.5B. In the base case, Xaira converts its scientific credibility
      into at least one serious collaboration or a clear internal asset proof point and keeps the
      advantage of its capital base and team density. That supports a range closer to $3B-$5B. In
      the bull case, Xaira shows multiple proof points quickly enough that private investors
      continue paying a frontier-optionality premium despite the lower public marks. That gets to
      roughly $6B-$9B.


      What moves the valuation between these ranges is not abstract market mood alone. It is the
      arrival of concrete proof. Bear to base requires at least one meaningful conversion signal — a
      real counterparty, a partnership, or a measurable asset milestone. Base to bull requires
      repetition: more than one proof point, evidence that the platform really compounds, and
      continued private appetite for frontier AI biology. Valuation far above the bull range would
      require non-public evidence so strong that the retained public set is simply not the right
      decision tool. That may exist in a private data room, but it is not visible here. Investors
      should therefore use the ranges as guardrails for price discipline, not as a claim that
      Xaira's ceiling is capped permanently.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
