  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - Aggressive pricing without proof
        - >-
          Private round prices Xaira far above comp-cluster-plus-premium logic without private
          evidence that closes key gaps
        - >-
          Turns the investment case into narrative arbitrage rather than evidence-backed
          underwriting
        - Pass until terms or proof improve
      - - No named collaboration or commercial counterparty
        - >-
          12-18 months pass with continued scientific publicity but no clear strategic or commercial
          conversion
        - Weakens the monetization bridge from open science to business quality
        - Shift toward bear range and tighten valuation ceiling
      - - No asset-level translation proof
        - Still no measurable link from platform to target, molecule, or regulatory milestone
        - Undermines the idea that the platform compounds into therapeutics value
        - Discount platform premium materially
      - - Security / compliance package still absent
        - Large buyers engage but Xaira cannot produce credible diligence materials
        - Turns procurement friction into a structural commercialization blocker
        - Delay investment until readiness improves
      - - Key leader instability
        - Departure of core scientific, technical, or clinical leaders
        - Reduces the main premium investors are paying for today
        - Re-underwrite from comp floor, not premium case
      - - Capital burn outpaces proof creation
        - Budget use rises but no corresponding partner or asset proof appears
        - Transforms financing scale from an asset into a warning signal
        - Reassess downside dilution and time-to-next-round risk
    notes: >-
      These are monitorable thesis-break criteria rather than probability estimates. They are
      designed to protect price discipline in the absence of public terms.
