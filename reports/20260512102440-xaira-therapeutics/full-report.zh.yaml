  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Xaira 实际交付什么
        blocks:
          - type: paragraph
            body: >-
              公开来看，Xaira 不像一家有外售产品菜单的传统软件公司。官方叙事是一套整合型生物科技平台，把先进 AI
              研究、大规模数据生成和疗法产品开发结合起来，每一层都为下一层供料。这意味着公司的“产品”更应被描述为一种运营模型：构建因果生物学数据，用这些数据训练预测模型，用实验验证预测，再把产出转成疗法项目。现有证据最强地支持这种内部平台身份。Xaira
              的 2024 年启动材料和当前方法页面都强调三支柱栈。此后，公司公开交付了置于该栈内部的研究产物——X-Atlas/Orion、X-Atlas/Pisces、X-Cell、GitHub 文档和 Hugging
              Face 卡片——但本报告审阅的来源没有显示公开价格表、企业部署包或具名外部软件客户。放到实际工作流里，今天最可信的用户是 Xaira
              自己的科学家、潜在合作者，以及评估部分开放发布的外部研究者。这个区别对尽调重要：这里确有真实技术内容，但它仍更像平台证明，而不是完成商业包装的产品。
