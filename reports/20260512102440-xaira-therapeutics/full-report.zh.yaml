              个受扰动单细胞转录组，走向覆盖原代细胞、类器官和体内扰动的更广数据集。Drug Discovery Trends 引述 Bo Wang 称，AI 成功的三根支柱是人才、算力和数据，并称 Xaira
              有资金同时追这三项。GeekWire 报道 2024 年约有 80 名员工，多数在 Bay Area，15 人在 Seattle；Intelligence360 的地产信息则报道了 73,075 平方英尺的
              San Francisco 扩建项目。Fierce 引述 COO Jeff Jonker 称，整合 R&D 平台和临床测试计划需要多年时间，可能要花费 $1 billion 或更多。换句话说，Xaira
              的成本结构更接近临床阶段 techbio 公司，而不是精简软件初创。人才、湿实验运营、算力以及临床前 / 临床项目支出，几乎肯定是主要现金消耗项。
