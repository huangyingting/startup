        title: 客户分层：用户先于付费方可见
        blocks:
          - type: paragraph
            body: >-
              Xaira 的客户基础最好分成四组，其中只有一组今天有真正有意义的公开证据。第一组是 Xaira
              内部团队——发现科学家、计算生物学家和项目组合团队——它们很可能仍是平台的主导用户，因为公司一直把这套技术栈描述为生成疗法的内部引擎。第二组是开放科学共同体；它现在可直接访问 Orion，部分访问
              Pisces/X-Cell，并在 Hugging Face 和 GitHub 上拥有可见社区界面。第三组是潜在商业合作者，Xaira
              明确表示愿意合作，但没有点名任何对象。第四组是未来的大型制药或生物科技公司对手方；如果 Xaira
              通过合作或共同开发把平台货币化，它们很可能才是真正付费买方。缺失的是最重要的商业层：本报告审阅的公开来源没有披露具名付费客户、已签约企业部署，或带有经常性收入的外部账户。因此，公开证据告诉我们谁可能购买、谁已经在实验，但没有告诉我们谁真的在付钱。
