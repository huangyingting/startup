      - number: '2.3'
        title: 买方、用户与支付方分层
        blocks:
          - type: paragraph
            body: >-
              Xaira 近期的经济买方最可能是大型制药和大型生物科技公司的 R&D 或 BD 组织，它们想获得差异化靶点识别、机制或患者筛选能力，但不想把每个组件都内建。Mordor
              的终端用户拆分支持这一看法：制药和生物科技公司主导当前支出，学术机构虽重要，但作为直接经济买方处于次级位置。Xaira 自身在重要意义上也是买方，因为自有资产策略要求公司在
              AI、湿实验和开发之间做内部资本配置。下游的用户和支付方结构则完全不同。候选物进入试验和商业化后，临床医生、转化研究者和患者成为相关用户；但医院渠道、保险公司和政府支付方决定疗法价值能否转化为收入。Xaira
              公开报道和 Bo Wang 访谈还暗示了一个采用顺序：从数据生成，到虚拟细胞预测，再到靶点和分子假设，最后进入临床开发。这个顺序关键，因为它解释了为什么技术采用可能比获批药物带来的财务回报早多年发生。
