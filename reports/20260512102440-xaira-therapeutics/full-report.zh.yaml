  - id: TV006
    title: 最终尽调问题清单
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 价格与条款清单
        - 投后估值、每股价格、证券类型、优先权条款和投资人权利
        - 没有这些，公开证据无法落到可投或不可投的价格上
        - 董事会 / CFO / 法务尽调
      - - 股权结构表与稀释瀑布
        - 完全稀释后持股、期权池、清算优先权、侧信和任何结构化融资条款
        - 决定同一个名义估值是否对应可接受的普通股经济性
        - 财务 + 法务资料室
      - - 现金消耗与里程碑预算
        - 按职能拆分的现金跑道、>$1B 融资计划用途，以及与支出挂钩的里程碑计划
        - 只有在下一次融资节点变得关键前买到决定性证据，资本规模才是优势
        - CFO / FP&A / 运营审查
      - - 合作与商业管线
        - 具名交易方、讨论阶段、定价逻辑和预期经济性
        - 这是从科学证据走向商业证据最干净的桥
        - BD / CEO / 管线审查
      - - 平台到资产的转化
        - 将 Orion、Pisces、X-Cell 或内部模型与靶点或分子决策相连的案例
        - 转化证据是估值高于公开可比公司的最重要依据
        - CSO / CTO / 投资组合委员会尽调
      - - 安全与合规准备度
        - DPA、审计材料、模型治理、质量体系和客户尽调材料
        - 未来买家、合作伙伴和监管方在规模化部署或用于申报之前都会要求这些材料
        - 安全 / 法务 / 质量尽调
    notes: 这些问题聚焦具体信息：它们能把 Xaira 从有意思的公开叙事推进到可定价的私募机会。
