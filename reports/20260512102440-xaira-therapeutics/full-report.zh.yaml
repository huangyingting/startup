      - number: '2.2'
        title: 用多个不可等同的视角衡量机会
        blocks:
          - type: paragraph
            body: >-
              平台支出视角最窄，也最接近当下。Mordor Intelligence 估计，AI 药物发现市场 2026 年为 $3.25 billion，到 2031 年以 25.94% CAGR 增至 $10.29
              billion。Worldmetrics 报告的高增长区间大体相近但并不相同；McKinsey 引用的制药 AI
              市场预测更大，但范围比单纯发现更宽，因此不应当成同口径比较。疗法收入视角大得多，变现也慢得多。第三方对炎症疾病、免疫学和抗炎药市场的估计，2026 年集中在 $122 billion 到 $141 billion
              区间；2033–2035 年预测约在 $228 billion 到 $293 billion。模态支持视角介于两者之间：Precedence 估计 2026 年抗体生产市场为 $31.71
              billion；Coherent 的更宽口径抗体市场达到 $323 billion，因为它覆盖的疾病领域远超 Xaira
              当前披露的重点。正确结论不是把这些数字平均，而是把它们分别保留为平台收入、模态基础设施和终端疗法价值的不同镜头。
