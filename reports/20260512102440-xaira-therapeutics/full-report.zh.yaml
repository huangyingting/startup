        blocks:
          - type: paragraph
            body: >-
              公开里程碑显示，Xaira 正从隐身组建走向可见的平台证明点，而不是走进临床。Xaira 于 2023 年注册成立，2024 年 4 月公开启动，之后十八个月主要补齐高管班子和物理布局。科学侧的主要公开里程碑，是
              2025 年 6 月发布 X-Atlas/Orion，当时被称为最大公开可用的全基因组 Perturb-seq 数据集；随后是 2026 年 3 月推出 X-Cell，一个用 25.6 million 个细胞的
              X-Atlas/Pisces 数据集训练、拥有 4.9 billion 参数的虚拟细胞模型。这些发布重要，因为它们把 Xaira 的“AI
              药物发现”叙事转化成至少部分公开技术产物和开放科学信号。与此同时，公司仍未公开披露具名临床候选物、IND 时间或首次人体试验日期。因此，里程碑轨迹支持这样一个判断：Xaira
              是一家资金充足、正在从保密转向选择性科学披露的临床前平台公司，还不是一家已有临床验证的疗法公司。
