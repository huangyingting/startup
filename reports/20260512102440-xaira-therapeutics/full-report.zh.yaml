      - number: '7.4'
        title: 人员、治理与融资风险
        blocks:
          - type: paragraph
            body: >-
              Xaira 的人才画像既是最强资产之一，也是最清晰的集中风险之一。很少有初创公司一出场就拥有这样深的董事会和领导层：Marc Tessier-Lavigne、David Baker、Bo Wang、Hetu
              Kamisetty、Debbie Law、Paulo Fontoura，以及董事 Scott Gottlieb，共同给 Xaira
              带来少见的科学、技术、临床和监管可信度。但这并不消除集中度。公开材料仍显示，AI、生物学、临床开发和公司建设这几条线，承重过多地压在相对少数的高级领导者身上。公司在 2024 年末和 2025
              年仍在补齐高管团队，公开招聘信号也显示 2026 年仍有不少开放职位。


              因此，融资风险更适合理解为证明负担风险，而不是短期现金跑道风险。超过 $1 billion 的承诺资本是强缓冲。但 Xaira 要同时跑资本密集型的 AI 研究、湿实验数据生成和疗法开发，而 2026 年生物制药
              融资环境仍偏好临床和商业路径更清晰的公司。如果在下一次融资事件变得重要之前，Xaira
              不能拿出足够证据证明管线转化、合作方转化或平台成熟度已去风险，市场会要求更硬的证明，不管种子资金池有多大。这里最强的缓释因素是团队和投资方组合的质量。残余风险是，即使输入条件精英化，也未必能压缩打造可重复药物发现和商业化引擎所需的时间。
