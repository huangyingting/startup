      - number: '1.6'
        title: 反向信号与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              反向材料中有两个问题最突出。第一，Xaira 的领导层故事绕不开 Marc Tessier-Lavigne 2023 年从 Stanford 辞职引发的争议。KQED 和 Retraction Watch
              都记录称，独立审查没有认定 Tessier-Lavigne 本人存在欺诈，但发现重要缺陷、其实验室其他人的数据问题，以及未能果断纠正科学记录。这不推翻 Xaira
              的技术投资逻辑，但会反复成为治理和声誉层面的讨论点。第二，尽管 Xaira
              拥有巨额资金，公司在经济指标和开发时间表上仍明显不透明。本报告审阅的公开来源没有披露当前股权估值、收入、客户数、账面现金或首个临床候选物时间。启动和画像报道也保留了科学家与投资人的怀疑：de novo
              抗体生成和以 AI 为先的生物科技执行仍是早期学科。因此，Xaira 带着异常强的资本和人才进入后续尽调，但治理韧性、经济披露，以及平台多快能产出人体测试资产，仍是未解问题。
