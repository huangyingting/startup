      - number: '5.2'
        title: 数据引擎与 X-Cell 架构
        blocks:
          - type: paragraph
            body: >-
              Xaira 技术栈最具体的部分，是因果数据引擎以及建立在其上的虚拟细胞模型。X-Atlas/Orion 引入 FiCS Perturb-seq，把它作为工业化大规模数据生成流程：使用 10x Chromium
              平台，声称具备高灵敏度和低批次效应，并产出一个面向全部人类蛋白编码基因、包含 8 million 个细胞的公开图谱。X-Atlas/Pisces 随后把这个基础扩展到 25.6 million
              个受扰动单细胞转录组，覆盖七个全基因组 CRISPRi 筛选和 16 个生物学情境。X-Cell 是在这些数据上训练的模型层。公开文档称，它是集合级扩散
              Transformer，采用四步迭代优化，通过交叉注意力引入多模态生物学先验，并提供最高 4.9 billion 参数的全尺寸模型家族。公开文档还暴露了超出营销文案的实现细节：X-Cell Mini 被记录为从
              scGPT 初始化的 55M 参数变体；计划中的 API 接收 AnnData 或 .h5ad 对照细胞；模型文档披露 Mini 配置至少需要 8 GB GPU
              占用。这些都是有意义的技术披露，即便公开交付体验仍不完整。
