        title: 市场公开定价与打包方式
        blocks:
          - type: paragraph
            body: >-
              这个同行群体的公开货币化数据指向同一个方向：定制研究合作、期权结构、里程碑、版税和偶发股权是常态，透明标价基本缺席。Generate 与 Novartis 的合作包含 $65 million
              首付款、股权、十亿美元级里程碑和版税。Recursion 与 Sanofi、Bayer 的合作，在已披露后端经济条款上规模更大。Isomorphic 的首批 Lilly 和 Novartis 交易据报道合计接近
              $3 billion，尽管没有公开内部临床管线。insitro 的打包方式更灵活：在部分 Lilly 项目中，它保留全球权利，由 Lilly 提供赋能技术或获得里程碑和版税；insitro 与 BMS
              的合作则支付靶点选择里程碑。Nabla 显示，即便规模更小的抗体设计初创，只要战略制药买方相信平台能打开困难靶点，也能拿到千万美元级首付款和十亿美元级后端经济条款。相比之下，Xaira
              尚未公开披露伙伴定价、具名平台客户或任何临床项目经济条款。这个缺口不证明公司弱，但意味着财务核算必须依赖可比合作结构，而不是 Xaira 自身的定价证据。
