      - number: '1.2'
        title: 创始人与科学起点
        blocks:
          - type: paragraph
            body: >-
              Xaira 的创立故事把顶级科学源头与重磅风投孵化拼在一起。官方履历列出 David Baker、Marc Tessier-Lavigne 和 Hetu Kamisetty 为联合创始人；启动报道也把 ARCH
              的 Robert Nelsen 和 Foresite 的 Vik Bajaj 描述为组建公司的风投操盘人。科学内核显然来自 Baker 位于 University of Washington 的
              Institute for Protein Design：RFdiffusion 和 RFantibody 都出自那里，Xaira 多名早期研究者也曾在此训练。启动材料还称，Xaira 纳入了从 Illumina
              剥离的功能基因组学能力，以及来自 Interline Therapeutics 的蛋白质组学团队，因此生物数据生成能力比纯蛋白质设计初创更宽。这解释了为什么管理层反复说，Xaira
              要横跨生物学发现、类药物物质设计和临床开发，而不是只盯抗体设计。结果是一家公司从第一天起就具备真正的跨学科宽度，但创立叙事也横跨多个利益群体；公司扩张时，治理和运营对齐必须更谨慎。
