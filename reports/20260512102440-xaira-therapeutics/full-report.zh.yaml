      - number: '6.5'
        title: 客户结论
        blocks:
          - type: paragraph
            body: >-
              正确的客户结论是：Xaira 在开放科学生态里有可信的早期外部用户证据，但还没有公开可读的商业客户基础。Orion 已经切入研究社区，下载量实在、用户问题可见，也有受尊重的外部验证者。这比只有 logo
              的证明强很多。但它仍不等于付费账户基础、留存证据或多元收入。如果 Xaira
              成功变现，未来客户模型大概率指向少数高价值合作，这会让集中度风险成为核心尽调问题。在公司披露具名商业用户、合作合同或续约证据之前，投资者不应把科学牵引力误当商业牵引力。因此，带入后续章节的客户结论很直接：Xaira
              有市场兴趣和用户好奇心，但尚无公开证据证明其已经变现且形成持久客户采用。
