              Xaira 启动时拿到的是生物科技初创史上罕见的大额初始融资承诺：来自 ARCH、Foresite 和一批知名风投的超过 $1 billion 承诺资本。Bob Nelsen 另外告诉 Endpoints，仅
              ARCH 就打算投入超过 $200 million，并把这笔钱称为“硬钱”，还暗示初始资本只是起点而非上限。这样的资产负债表支撑 Xaira
              从一开始就建设宽口径内部能力，而不是狭窄地依赖合作。公开披露的规模数字仍然稀少，但启动报道称公司 2024 年约有 50 名员工；GeekWire 后来报道约 80 名员工，其中约 15 人在
              Seattle，London 还有少数员工。官方页面和 2026 年公司材料现在称，Xaira 总部位于 South San Francisco，并在 Seattle 和 London 设有创新中心。公司还宣布在
              South San Francisco 内部迁总部，另一篇报道指向 73,075 平方英尺的 San Francisco
              空间扩张。合在一起，这些披露支持一个真实的多地点运营建设，即便当前精确员工数和现金消耗仍未公开。
