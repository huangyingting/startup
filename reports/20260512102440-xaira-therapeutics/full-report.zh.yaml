            body: >-
              对一家尚无已披露临床阶段资产的公司来说，Xaira 当前领导层资历异常深。Marc Tessier-Lavigne 有 Genentech 和学术机构领导经验。Hetu Kamisetty 坐镇 AI/ML
              技术栈；Debbie Law、Paulo Fontoura、Bo Wang、Jeff Jonker 和 Rachel Lane 在 2024–2026
              年陆续加入，补强科学、医学、AI、运营和合作能力。董事会与科学顾问阵容纸面上同样强，Scott Gottlieb、Alex Gorsky、Carolyn Bertozzi、Richard
              Scheller、Robert Nelsen 等人覆盖监管、大药企、风投和诺奖级科学。这种宽度让 Xaira
              在治理、招聘和未来合作上，比多数早期生物科技公司更有覆盖。但公司外部可信度也高度集中在少数明星名字上。Marc 和 David Baker
              仍是两个最显眼的身份锚点；其中任何一人脱钩或信誉受损，对招聘、融资和外部信任的冲击都可能不成比例。高规格班底是真优势，但不能消除关键人物或监督风险。
