chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、范围与商业模式
        blocks:
          - type: paragraph
            body: >-
              Xaira Therapeutics 是一家总部位于 South San Francisco 的 AI
              原生生物科技公司，定位是端到端药物发现与开发平台，而不是单点软件供应商。官方材料反复强调三根整合支柱：先进机器学习研究、大规模数据生成、疗法产品开发。公司目标是让生物学“更可计算”，用前沿模型找到正确生物学与分子，最终缩短从实验室洞见到药物的路径，尤其针对过去被认为难以或无法成药的靶点。落到运营上，Xaira
              想同时做模型构建者、湿实验数据生产者和管线公司。Goldman Sachs
              主办的发言和启动报道也强化了这一点：公司试图把靶点识别、分子设计和临床开发接进同一技术栈。这个定位重要，因为它意味着资本强度和执行范围都高于典型平台型生物科技公司；但如果模型开始产出差异化资产，Xaira
              也能更控制价值沉淀的位置。公开来源支撑其身份和野心，但收入、估值和客户指标仍未披露。
