          detail: 合作伙伴证明、资产转化、合规包和理性定价
      edges:
        - from: fl1
          to: fl6
        - from: fl2
          to: fl6
        - from: fl3
          to: fl6
        - from: fl4
          to: fl6
        - from: fl5
          to: fl6
        - from: fl6
          to: fl7
    notes: 建议明确以缺失的私有数据为条件。如果价格和条款可得，应使用真实入场假设重新跑一遍同一逻辑树。
