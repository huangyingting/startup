              的产品级验证。在产品层面，最清楚的公开护栏其实是一个限制：模型卡称 X-Cell 旨在用于计算生物学和基因组学研究，而非临床决策。公开发布成熟度也仍然只是部分完成。GitHub 仓库、文档站点和 Hugging
              Face 卡片提供了可见开发者界面，但权重和推理代码仍标为“coming soon”；Pisces 数据集卡片称文件仍在准备，数据集查看器不可用。本报告审阅的公开来源没有披露这些产物的 SOC 2、ISO
