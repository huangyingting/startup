      - number: '8.5'
        title: 退出准备度、尽调问题与最终结论
        blocks:
          - type: paragraph
            body: >-
              按公开证据看，Xaira 尚未达到 IPO
              就绪。私有股没有公开定价历史，没有披露财务报表，没有可见商业指标，也没有成熟合规包。这不说明公司弱，只说明公开记录不完整。因此，较近的价值实现路径更可能是合作、合作方支持的资产，或战略收购逻辑，而不是近期独立上市。大型
              制药公司、战略 techbio 公司，或主要 AI 与数据平台拥有者，是最自然的对手方类型，因为 Xaira 的差异化叙事是模型、数据生成和疗法雄心的组合，而不是单一软件产品。


              这直接引出最终尽调问题。投资者需要投资条款清单和股权结构表，而不只是故事；需要现金消耗和基于里程碑的预算逻辑，而不只是 $1B
              这个头条数字；需要合作管线数据、定价逻辑，以及平台正在产出资产级决策或吸引外部伙伴的证据。投资者也需要后续买方或监管者会索要的合规和安全材料。因此，公开证据质量是不对称的：团队和科学强，经济性和条款弱。最终结论：继续研究。只有当定价接近公开
              可比公司集群加合理溢价，且私下尽调补上最大证据缺口时，才应继续。如果定价假设了尚不可见的前沿级别证明，就应放弃，并在证明跟上后再看。
