      - number: '3.4'
        title: 切换成本、多平台并行与护城河耐久性
        blocks:
          - type: paragraph
            body: >-
              公开记录显示，AI 药物发现的护城河形成仍然更少来自传统软件锁定，更多来自数据所有权、工作流整合、内部实验基础设施和谈判获得的资产权利。这对 Xaira
              是双刃剑。如果它的扰动数据引擎和虚拟细胞模型确实能比同行更好地发现靶点或患者假设，由此形成的工作流与资产整合成本可能有意义。但大型制药买方似乎不会只押一个平台。Lilly 与 Isomorphic、insitro
              和 Schrödinger 合作；Novartis 与 Isomorphic 和 Generate 合作；Sanofi 和 Bayer 与 Recursion 合作；Nabla
              等早期生物制剂挑战者也在赢得项目。买方多平台并行是理性的，因为多数合作只披露部分经济条款、排他性不清，对长期项目结果的证据也有限。这里的反向证据很重要。Recursion 与 Exscientia
              合并拓宽了技术栈，但随后出现管线削减、持续聚焦收缩，以及投资人对烧钱的担忧。这是重要的反证信号：更多数据、更多项目和更多资本，并不会自动变成持久执行力或定价权。
