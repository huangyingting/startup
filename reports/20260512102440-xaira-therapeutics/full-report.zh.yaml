      - number: '8.3'
        title: 可比公司组合与估值语境
        blocks:
          - type: paragraph
            body: >-
              Xaira 最好的公开锚点不是纯软件 AI 实验室，而是试图把计算驱动药物发现或精准疗法变现的上市和私营公司。Recursion 是最接近的全栈上市参照，因为它结合了平台、管线和合作；但它的市值仍约
              $1.73B。Relay 显示，一个资本充足、尚未产生收入的疗法平台，在公开市场大约可以拿到 $2.46B。Schrödinger 则说明，即使成熟的计算平台拥有合作和自有药物项目，也可能在 $1B
              以下交易。Absci 显示，拥有内部和合作项目的生成式 AI 生物制剂平台，也可能仍停留在 sub-$1B 区间。


              把 Xaira 大幅推高到这些公开标尺之上，主要理由是私募市场有时会为可选性付费，尤其是在人才、资本和战略稀缺性异常突出时。Isomorphic 的 $600M
              外部融资，是近期最清晰的信号，说明私募资本仍在给前沿 AI 药物设计叙事定价。但这个信号也不完整，因为估值没有披露，而且 Isomorphic 受益于 DeepMind 和 Alphabet 血统，不能直接迁移到
              Xaira 身上。因此，可比组合同时做两件事：它用公开市场对更成熟证明的定价防止高价买入，也保留空间——如果私下尽调发现强于公开来源的商业或疗法牵引力，Xaira 可以享有溢价。这就是为什么 Xaira
              应被估作高溢价 techbio，而不是不受约束的前沿 AI 软件故事。
            claimRefs:
              - CV013
