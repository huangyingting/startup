      - number: '8.2'
        title: 投资论点与反论点
        blocks:
          - type: paragraph
            body: >-
              牛市情景从真正稀缺的输入条件开始。Xaira 结合了很大的起步资本基础，一支围绕 AI、生物学和临床领导力搭建的团队，以及贯穿模型开发、数据生成和疗法开发的一体化架构。Orion 和 X-Cell
              也让公司比典型隐身 techbio 初创公司拥有更多公开科学证明。在许多公司仍要求投资者相信路演材料的市场里，Xaira 至少已经展示了真实数据和模型资产。终端市场背景也有利：AI
              药物发现仍是增长中的类别，更广泛的生物制药行业仍需要提高生产率。


              反论点是，市场最终为证明付费，而不是为输入付费。开放科学牵引力不等于具名商业牵引力。公开来源仍看不到定价、客户、合作经济性，也看不到资产级别转化为患者结局。行业本身仍拥挤，差异化很难。Biomed Nexus
              很好地抓住了核心问题：许多 AI 药物发现公司仍是尚未产生收入的平台，真正的验证周期在临床。Xaira 因此或许应较普通临床前公司享有有意义的溢价，但溢价必须受缺失项约束。投资问题不是 Xaira
              是否令人印象深刻，而是现有公开记录是否足以支撑新资金可能被要求支付的溢价。现在，答案只有部分肯定。
