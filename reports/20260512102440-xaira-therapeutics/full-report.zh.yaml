              Institute 的 Hani Goodarzi 则称其为基础模型的重要训练资源。这些背书有分量，因为两位评论者都是技术上成熟的外部观察者。Hugging Face 给出的类用户证据更强：Orion
              讨论页显示，一位真实外部用户 zboldyga 询问 Xaira 用于剂量分层的 sgRNA 计数数据，Xaira 的 Ann Huang 随后给出了具体的 Figshare
