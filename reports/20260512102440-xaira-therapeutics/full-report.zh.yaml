          low: 900
          mid: 1500
          high: 2460
        - label: 悲观情景
          low: 1500
          mid: 2000
          high: 2500
        - label: 基准情景
          low: 3000
          mid: 4000
          high: 5000
        - label: 乐观情景
          low: 6000
          mid: 7500
          high: 9000
        - label: 战略收购上行情景
          low: 5000
          mid: 7000
          high: 10000
    notes: 数值为 $M 股权价值。战略收购上行情景假设证明异常强，且买方愿意为稀缺性和整合价值付费；仅凭当前公开证明还支撑不了。
  - id: FV004
    type: kpi
    title: 投资 KPI 评分卡
    layout: standard
    summary: 面向 IC 的评分卡，从市场、团队、产品证明、商业证明、经济性可见度、风险、估值支撑、融资韧性和证据质量等维度评价 Xaira。
    claimRefs:
      - CV006
      - CV008
      - CV009
      - CV010
      - CV021
      - CV037
      - CV038
      - CV039
      - CV042
      - CV043
    data:
      items:
        - label: 市场机会
          score: 7
          detail: AI 药物发现仍在增长，但品类还早，也很拥挤。
        - label: 团队质量
          score: 10
          detail: 团队是整份公开记录中最清晰的优势之一。
        - label: 科学 / 产品证明
          score: 6
          detail: 公开产物和牵引真实存在，但交付不完整，转化证明有限。
        - label: 商业证明
          score: 3
          detail: 未公开具名付费客户、定价或部署指标。
        - label: 经济性可见度
          score: 2
          detail: 未公开估值条款、收入或股权结构表细节，无法建模。
        - label: 融资韧性
          score: 8
          detail: '>$1B 已承诺资本构成真实战略优势。'
        - label: 风险画像
          score: 4
          detail: 执行、转化、合规和商业化风险仍然很高。
        - label: 估值支撑
          score: 3
          detail: 公开证据只支持相对公开 techbio 可比公司的审慎溢价。
        - label: 证据质量
          score: 4
          detail: 科学和团队证据强，经济性、价格和条款证据弱。
        - label: 退出准备度
          score: 2
          detail: 按公开证据看尚不具备 IPO 准备度；较近路径是合作或战略可选性。
    notes: 评分采用 0-10 标尺，反映在未披露私募价格下的可投资性，而不是公司绝对质量。团队质量很突出，但估值支撑仍有限。
