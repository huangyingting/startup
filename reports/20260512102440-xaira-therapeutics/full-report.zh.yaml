  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: Xaira 实际切入的市场
        blocks:
          - type: paragraph
            body: >-
              不能把 Xaira 当成一家出售单一现成 AI 软件产品的公司来分析。官方材料描述的是一个端到端系统，把 AI 研究、自有数据生成和疗法产品开发结合起来。2026
              年独立报道进一步显示，公司正在主动建设炎症和免疫管线，最初以抗体疗法为中心，同时仍把 AI 平台视为核心引擎。这意味着 Xaira 至少同时触及三层经济池：AI
              药物发现平台支出、抗体发现与生产基础设施，以及免疫学和炎症疾病的最终疗法收入池。区分这些层次很重要，因为每一层的买方、估值逻辑和采用节奏都不同。平台预算由 R&D 和 BD
              团队控制，可以随着技术证据推进；疗法收入则取决于多年临床转化、报销和医生采用。因此，本章最稳妥的边界是多视角定义，而不是单一万能 TAM。
