      - number: '8.4'
        title: 牛市 / 基准 / 熊市情景区间
        blocks:
          - type: paragraph
            body: >-
              由于实际入场价格未公开，最干净的估值表达方式不是 IRR，而是有证据支撑的参考区间。熊市情景中，Xaira
              保持科学可信度，但仍无法展示具名合作、清晰商业转化或资产级转化。在那个世界里，估值会回落到公开可比公司集群：约 $1.5B-$2.5B。基准情景中，Xaira
              把科学可信度转化为至少一个重要合作或明确内部资产证明点，并保住其资本基础和团队密度优势。这支撑更接近 $3B-$5B 的区间。牛市情景中，Xaira
              足够快地拿出多个证明点，使私募投资者即使面对更低的公开市场标尺，仍继续支付前沿可选性溢价。估值可到约 $6B-$9B。


              推动估值在这些区间之间移动的，不是抽象的市场情绪本身，而是具体证明的到来。从熊到基准至少需要一个有意义的转化信号——真实对手方、合作关系或可衡量的资产里程碑。从基准到牛市需要重复性：不止一个证明点，证据显示平台确实能复利，以及私募市场继续偏好前沿
              AI 生物学。估值若远高于牛市区间，就需要强到足以说明现有公开可比组合已不是合适决策工具的非公开证据。这种证据可能存在于私密数据室，但这里不可见。因此，投资者应把这些区间用作价格纪律护栏，而不是声称 Xaira
              的天花板被永久封顶。
            claimRefs:
