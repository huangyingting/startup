      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              AI 赋能生物制药的乐观情景很直接：行业 R&D 生产率偏弱，新药上市成本仍然巨大，而平台团队现在能用到的算力、数据和实验室自动化能力，都比几年前更好。Deloitte 的 2025
              年调查显示，实验室现代化带来了实实在在的吞吐提升和错误减少；McKinsey 和 Accenture 也都把数字化与 AI 工具视为应对资本效率低下的必要手段。Xaira
              正处在这个逻辑里，因为它的模式依赖生成自有扰动数据，并把数据回灌到模型开发。但约束情景同样真实。McKinsey 称，制药行业还没有看到开发时间线或成功率的系统性改善。Mordor
              强调可解释性、数据碎片化、人才短缺和责任不确定性。ACS 和 GEN 都保留了残酷基线：药物发现仍是十年以上流程，临床候选物中只有约 1/10 能获批，多数分子仍会在商业成功前失败。即便 Xaira
              的科学有效，免疫学定价、不良反应风险和生物类似药压力，也意味着庞大的终端市场不会自动转化为不受约束的定价权。
