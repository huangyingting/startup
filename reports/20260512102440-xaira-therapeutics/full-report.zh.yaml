  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Xaira 仍足够早，因此最大的监管问题不是已知执法行动，而是监管预期上升与公开准备证据稀疏之间的缺口。FDA 和 EMA 现在把药物生命周期中的 AI
              定义为一套需要风险管理、文档留痕、并按使用场景界定的纪律，而不是不受约束的研究活动。EMA 反思文件明确表示，药品生命周期中的 AI 会引入新风险，必须缓释这些风险，以保护患者和临床证据完整性；FDA 2025
              年指南草案则要求，当 AI 支持监管决策时，申办方要建立基于风险的可信度评估框架。EU AI Act 和 GDPR 又在欧洲增加了围绕健康、安全、基本权利和个人数据处理的约束。


              Xaira 的公开材料不能证明它已经把 AI
              输出用于监管申报，但确实显示，公司希望端到端连接模型、生物学和患者。因此，监管严谨度只是时间问题，不是相关性问题。当前公开合规表面很薄：网站隐私政策存在，但没有已审阅的公开 DPA、GxP
              包、验证档案，也没有可供外部尽调的 AI 治理披露。法律条款同样重要。X-Cell 的公开发布使用 CC BY-NC-SA 4.0
              许可，这有利于研究分发，但在没有单独权利的情况下会限制商业复用。因此，实际风险有两层：Xaira 的推进速度可能快于其公开合规叙事；其公开法律包装也可能尚未达到未来企业或受监管对手方的预期。
