  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 哪些竞争者真正影响 Xaira
        blocks:
          - type: paragraph
            body: >-
              Xaira 不能只拿另一个 AI 生物科技公司当唯一参照。已披露模式把前沿机器学习、自有扰动数据生成和疗法产品开发结合起来；2026
              年报道还特别指向炎症和免疫抗体疗法这个第一切口。因此，相关竞争版图至少有四层。第一层是直接的以 AI 为先的疗法平台，例如
              Generate、insitro、Recursion/Exscientia、Isomorphic Labs 和 Absci，它们公开把差异化模型与实验系统或内部资产创建结合。第二层是相邻的生物制剂设计专家，例如
              Chai Discovery 和 Nabla Bio，它们争夺同一买方集合里的抗体和蛋白质设计预算。第三层是替代工具链，例如 Schrödinger，其物理 + AI 软件和合作项目让买方可以不购买 Xaira
              式一体化平台，也能解决同一发现任务的一部分。第四层是大型制药公司的内部自建，Lilly、Novartis、Sanofi、Roche 等可以把自有数据与多个外部伙伴组合起来。因此，竞争问题不是 Xaira
              有没有同行，而是未来 2–3 年哪一层最直接约束其定价权和交易条款。
