      - number: '7.2'
        title: 科学、运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              Xaira 最难的风险仍是科学转化。Orion、Pisces 和 X-Cell 拼出了一套可信的数据与模型叙事，但外部评论对虚拟细胞模型能在多大程度上泛化到患者结局仍然谨慎。这很关键，因为投资逻辑不只是
              Xaira 能生成漂亮的生物表征，而是这些表征能改善靶点选择、疗法设计，并最终提高临床成功率。公开 X-Cell 材料也仍不完整：Xaira 的 Hugging Face 和 GitHub
              页面仍显示模型权重和推理代码即将发布。这限制了可复现性，拖慢第三方基准测试，也让外部产品面更像一项推进中的研究发布，而不是成品平台。


              运营上，Xaira 的护城河取决于能否把大规模单细胞数据生成变成可重复引擎。Orion 发布把这台引擎与 10x Genomics 的 Chromium 平台相连；即使它不是唯一依赖，10x
              也是重要的上游工作流依赖。安全性和可靠性在公开层面同样记录不足。Xaira 的隐私政策称公司使用适当措施，也承认任何传输或存储方式都不可能完全安全，但没有已审阅公开证据显示其具备 SOC 2、ISO
              27001、正式正常运行时间承诺、灾备细节或受监管数据控制。NIST 和 CISA 指南已经明确，AI 部署越来越要承担生命周期治理和安全内建预期。因此，残余运营风险不只是宕机或网络事件；更在于 Xaira
              可能先迎来买方或监管审查，而其公开控制面还没有成熟到能高效通过尽调。
