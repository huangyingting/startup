            body: >-
              客户持续性是公开证据最薄弱的地方。没有任何已审阅公开来源披露 NRR、GRR、logo 流失、续约率、合同期限、账户扩张或满意度调查。仅有的重复使用代理指标都是间接的：Orion
              发布数月后仍有公开讨论，Hugging Face 页面仍有点赞，Pisces 也有较小但持续的下载信号。这些信号说明关注在延续，但不是商业意义上的留存指标。扩张逻辑也仍偏前瞻。RDWorld 引述 Xaira
              称，数据集对学术界免费，同时公司乐于与有合作兴趣的商业实体合作，这意味着双轨模式：先扩大开放科学触达，再靠合作变现。这条路可能走得通，但若成功，收入基础很可能集中，少数大型 制药或 techbio
              对手方的重要性会高于成千上万的自助用户。采购摩擦也高：公开发布仍不完整，企业支持条款不可见，产品级合规证据缺位。合在一起，今天的留存故事应按空白处理，扩张故事则更像一个期权，而非已经验证的动作。
