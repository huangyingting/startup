  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议与入场纪律
        blocks:
          - type: paragraph
            body: >-
              第一个估值问题不是 Xaira 是否有意思，而是公开证据是否足够为它定价。Xaira 显然有不寻常的起步优势：超过 $1 billion 承诺资本，AI 和生物技术人才高度密集，围绕 Orion 和 X-Cell
              的开放科学牵引力也已经可见。但这些优势不等于一个已经可定价的投资案例。公开来源没有披露 Xaira 的投后估值、每股价格、稀释机制或优先权结构。因此，在具体入场价格上给出硬性的「买入」或「回避」判断，会是假精确。


              更诚实的建议是继续研究、但对价格敏感。目前，AI 赋能药物发现及相邻临床前疗法公司的公开可比公司，市值大致在 $0.9B-$2.5B 区间。仅凭团队和资本，Xaira
              或许应较其中几家公司享有溢价，但公开证据还不足以把它视作已被验证的前沿平台。护栏很简单：如果私募定价接近公开可比公司
              集群再加上理性溢价，就继续尽调；如果定价已经隐含大规模商业或疗法证明，公开证据提示应暂停。这不是否定 Xaira
              的潜力，而是承认投资者被要求为可能性定价，而不是为已测量的经济性定价。在价格、条款和证明更清楚之前，估值纪律比叙事热情更重要。
