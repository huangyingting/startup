      - number: '3.2'
        title: 直接同行与相邻对手
        blocks:
          - type: paragraph
            body: >-
              直接同行可以分成两种模式。Generate、insitro、Recursion/Exscientia 和 Absci
              都公开描述了一条整合闭环：自有数据和湿实验系统持续改善模型，并把结果输送到合作项目或内部项目。Isomorphic 的重点不同：公开叙事更明确围绕建立在 AlphaFold 之上并超越 AlphaFold
              的前沿预测和生成模型质量；商业证明则来自非常大的制药合作，而不是已披露的内部管线深度。Xaira
              在战略上似乎最接近整合数据公司，但它已宣布的技术旗舰仍是虚拟细胞和扰动数据栈，而不是公开临床资产或具名商业合作。在这个核心周围，还有范围更窄但仍相关的抗体和蛋白质挑战者。Chai Discovery
              推广具有原子级精度的 de novo 抗体设计；Nabla Bio 强调 AI 加人类相关湿实验测试，用于针对困难靶点的抗体和其他蛋白质疗法。这些公司未必是 Xaira
              的直接全栈匹配，但会争夺一部分相同的生物制剂买方注意力，也让抗体设计不再是空白市场，而是拥挤切口。
