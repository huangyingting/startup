  - id: TP004
    slug: moat-durability-risk-register
    title: 护城河耐久性 / 竞争风险清单
    description: >-
      Competitive risks that matter most to whether Xaira can turn scientific differentiation into pricing power or
      durable buyer preference.
    columns:
      - 护城河主张
      - 威胁
      - 严重性
      - 缓释措施 / 尽调问题
    rows:
      - - 因果虚拟细胞与扰动数据护城河
        - Recursion 和 insitro 已经运营大型专有数据闭环，公开证据尚未把 Xaira 的因果技术栈与它们做正面对标
        - 重大
        - 要求提供与同业平台正面对比的证据：靶点提名质量、未见生物学泛化能力，以及从命中物到先导物阶段的影响
      - - 生物制剂设计差异化
        - Generate、Absci、Chai 和 Nabla 已在抗体与蛋白疗法周围挤满 AI 生物制剂切口
        - 高（近期）
        - 厘清 Xaira 的优势究竟是因果靶点选择、患者匹配或跨模态设计，而不只是抗体
      - - 合作定价权
        - 大型药企买方似乎愿意同时与多家 AI 供应商多栖合作，削弱排他性和议价能力
        - 重大
        - 要求提供排他性、工作流嵌入或权利结构证据，说明 Xaira 一旦接入后更难被替换
      - - 资本作为护城河
        - Recursion 并购后的管线削减表明，规模和现金不保证执行可持续，也不保证烧钱更低
        - 重大
        - 在激进的数据生成、实验室扩张和内部管线情景下建模 Xaira 的烧钱强度，而不是假设初始弹药足够
      - - 信任 / 监管姿态
        - AI 药物发现走向成熟后，买方可能要求模型可审计性、可复现性和治理，而不只是基准测试主张
        - 中等
        - 要求提供验证方案、数据来源文档，以及用于合作伙伴沟通的任何治理材料
      - - 内部自建替代
        - 大型药企可以把内部数据与 Isomorphic、Schrödinger、insitro、Recursion 等合作伙伴组合起来，而不必标准化到一个外部平台
        - 重大
        - 识别哪些用例中，Xaira 能比内部 + 合作伙伴混合栈明显更快、更精准或更省资本
    notes: 严重性评级是定性尽调判断。高表示威胁可能在约 2–3 年内损害合作伙伴经济条款；重大意味着约 3–5 年内有实质影响；中等表示需要密切跟踪，但证据仍不完整。
