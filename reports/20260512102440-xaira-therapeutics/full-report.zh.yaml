          - type: paragraph
            body: >-
              缺失的信息比已有信息更重要。Xaira 不发布财务报表、SEC 文件、季度现金余额、合作收入、伙伴合同、债务时间表、租赁义务或项目级 R&D
              分配。公司是私营企业，这并不意外，但会带来真实分析后果。Schrödinger 等上市同行有监管文件和年度财务；Recursion、Relay 和 Absci 至少会发布定期业绩或现金跑道声明。Xaira
              没有。因此，核心单位经济问题仍无答案：月度烧钱是多少？支出中核心 AI、湿实验和内部疗法各占多少？是否已有伙伴对话带来研究经费？租赁、算力或制造承诺是否形成固定义务？没有这些答案，哪怕是看似基础的结论——例如
              Xaira 花钱是否足够激进、能跑赢同行，或是否足够保守、能避免早期融资需求——仍有一部分是推测。本章仍可形成方向性判断，但不是经审计的判断。
