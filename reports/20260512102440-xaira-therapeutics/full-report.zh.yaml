            body: >-
              最难的财务判断，是 Xaira 的巨额启动轮到 2026 年是否仍留下充足现金跑道。答案方向上是肯定的，但也仅是方向上。启动时超过 $1 billion
              的承诺资本是罕见优势，应当给管理层足够灵活性去建设人员、数据和平台基础设施，而不必马上回到融资市场。但启动资本不等于当前账面现金，本报告审阅的来源也没有披露今天还剩多少。这迫使任何现金跑道分析都进入基于同行的情景推演。Recursion
              在 2025 年底有 $753.9 million 现金，此前经营现金流出 $371.8 million，但仍只预计现金跑道到 2028 年初。Schrödinger 在 2025 年底有 $402.3
              million 现金，经营费用为 $309.5 million，并有真实软件和药物发现收入支撑。Relay 在 2025 年 Q1 即便削减成本，仍有 $710.3 million 现金；Absci 在 2025
              年 Q3 有 $152.5 million，现金跑道只到 2028 年上半年。这些数字给出一个宽泛但有用的 Xaira
              烧钱参照：每年低数亿美元。这个区间不意味着马上承压，但意味着资本充足性最终会取决于商业化前能否实现合作货币化或内部管线证明。
