        - 投资论证变成叙事套利，而非证据支撑的投资判断
        - 条款或证据改善前放弃
      - - 未出现具名合作或商业交易方
        - 12-18 个月内仍只有科学宣传，未出现清晰的战略或商业转化
        - 削弱开放科学通往商业质地的变现桥梁
        - 转向悲观区间，并收紧估值上限
      - - 无资产层面转化证据
        - 平台与靶点、分子或监管里程碑之间仍没有可衡量连接
        - 削弱平台能复利生成疗法价值的判断
        - 大幅折减平台溢价
      - - 安全 / 合规材料包仍缺失
        - 大型买家开始接触，但 Xaira 拿不出可信的尽调材料
        - 采购摩擦升级为结构性商业化障碍
        - 准备度改善前推迟投资
      - - 核心领导层不稳定
        - 核心科学、技术或临床负责人离职
        - 削弱投资人今天愿意支付的主要溢价
        - 从可比公司底部重新核保，而不是按溢价情景
      - - 资本消耗快于证据生成
        - 预算消耗上升，但合作伙伴或资产证据没有同步出现
        - 融资规模从资产变成预警信号
        - 重新评估下行稀释和下一轮融资时间风险
    notes: 这些是可监控的投资论点失效标准，不是概率估计；目的在于公开条款缺位时守住价格纪律。
