        title: 收入模型：合理但尚未获公开验证
        blocks:
          - type: paragraph
            body: >-
              Xaira 官方材料描述的是一家围绕 AI 研究、大规模数据生成和疗法产品开发建设的公司。这足以识别合理的收入路径，但不足以证明其中任何一条已经启动。本报告审阅的公开来源没有披露 Xaira
              收入、年经常性收入（ARR）、合同价值、合作伙伴研究经费、里程碑收款或产品销售。结合商业模式和竞争集合，近期最可信的货币化路径不是药品销售或软件订阅，而是合作收入、里程碑付款、版税，以及可能围绕内部生成资产的期权或对外授权交易。可比
              AI 生物制药平台今天就是这样变现的。Generate、Isomorphic、insitro、Recursion 和 Nabla 都展示了里程碑重、带版税的结构：制药公司在产品获批前为差异化科学买单。Xaira
              未来可能开发自有疗法并获得产品销售，但本报告审阅的公开来源没有显示具名临床阶段 Xaira 资产，也没有显示外部客户已经为平台付费。因此，收入质量还不能被视为经常性、多元化，甚至已经开始。
