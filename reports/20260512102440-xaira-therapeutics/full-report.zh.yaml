      - number: '4.5'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >-
              合理的财务结论是：Xaira 尚未产生收入、资本密集，且大概率仍资金充足，但财务透明度还不足以支撑基本面投资核算。启动轮异常大，很可能买到了真实时间。这个时间重要，因为 Xaira
              要构建的是差异化因果生物学栈，并最终形成疗法引擎，而不只是一个软件产品。但让故事有吸引力的同一野心，也让公司变得昂贵。如果管理层在外部货币化出现前更重押内部资产，烧钱可能很快移向同行集合中更临床、更高现金消耗的一端。如果
              Xaira 先通过合作伙伴把平台货币化，业务则可能更像一家里程碑和版税型平台公司，现金跑道更长，稀释风险更低。今天的公开证据无法告诉我们哪条路径已经占优。对后续估值而言，Xaira
              应被视为一个由平台货币化加内部管线创建组成的、有资金支撑的期权，而不是一家收入质量已验证、利润率可见或现金转化已披露的公司。
