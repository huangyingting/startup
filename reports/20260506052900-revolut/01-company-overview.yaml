callouts:
  - calloutType: strength
    title: Profitable Super-App with $75B Valuation Anchor
    body: >
      Revolut's combination of 72% revenue growth, $1.4 billion pre-tax profit, and a $75 billion secondary valuation in
      November 2025 makes it among the most financially credible large private fintechs globally. Four consecutive
      profitable years and $4 billion in revenue demonstrate scalable unit economics, which is rare among high-growth
      neobanks. The full UK banking licence (March 2026) unlocks unlimited deposit-taking and mortgage/lending products,
      materially expanding the addressable revenue base.
    claimRefs:
      - C014
      - C016
      - C017
      - C023
      - C025
  - calloutType: risk
    title: Regulatory Overhang and Compliance Burden
    body: >
      The 14+ month mobilisation phase for the UK banking licence (exceeding the typical 12-month window) reflects
      persistent PRA/FCA concerns about Revolut's risk management and AML controls. The company has a documented history
      of AML-related issues, including a Lithuania fine and significant FOS complaint volumes. As Revolut scales into
      banking products (mortgages, unsecured lending), regulatory scrutiny will intensify across its 40+ jurisdictions,
      creating material operational and reputational risk.
    claimRefs:
      - C024
      - C026
      - C027
      - C028
  - calloutType: risk
    title: Key-Person Concentration in Nik Storonsky
    body: >
      Revolut's strategic direction, product philosophy, and IPO timing are tightly coupled to Nik Storonsky's
      preferences. His April 2026 statement that an IPO is "at least two years away" signals continued private status
      and lock-in for investors. Executive departure or loss of founder conviction could materially disrupt growth
      strategy and secondary market pricing.
    claimRefs:
      - C005
      - C006
      - C029
