chapter:
  number: 1
  title: Company Overview
  summary: >
    Revolut is a London-headquartered global fintech founded in 2015 by Nik Storonsky and Vlad Yatsenko. It has grown
    into Europe's most valuable private technology company at a $75 billion implied valuation (November 2025 secondary
    share sale), with $4 billion in revenue, $1.4 billion pre-tax profit, and 52.5 million retail customers as of
    year-end 2024. Revolut offers a super-app for personal and business banking across FX, payments, crypto, wealth, and
    lending in 40+ countries.
sections:
  - id: s1
    title: Identity and Business Model
    body: >
      Revolut Group Holdings Ltd (registered in the United Kingdom) operates the Revolut digital banking super-app,
      launched commercially in July 2015 with a currency-exchange and prepaid card offering. Headquartered at Canary
      Wharf, London (moved from its original Shoreditch offices in 2024), Revolut is incorporated as a private limited
      company and holds banking licences or e-money authorisations across the UK, EU (via Bank of Lithuania), and a
      growing number of international jurisdictions including Australia, Singapore, Mexico, and Colombia. As of May
      2026, Revolut remains private with no confirmed IPO timeline before 2028.

      The core business model is a financial super-app spanning: (1) consumer current accounts and debit cards, (2)
      foreign exchange and international transfers, (3) wealth products including stock trading, crypto exchange
      (Revolut X), bonds, ETFs, and robo-advisory, (4) subscription tiers (Standard, Plus, Premium, Metal, Ultra)
      generating recurring revenue, (5) Revolut Business for SME banking and payments, and (6) credit products including
      personal loans and mortgages in select markets. Revenue is diversified across card interchange, FX margin,
      subscription fees, interest income, and wealth trading commissions. The company describes its mission as
      "simplifying all things money" and publicly targets 100 million daily active users across 100 countries.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
  - id: s2
    title: Founders, Leadership, and Governance
    body: >
      Nik Storonsky (CEO and Co-founder) is the driving strategic force. A former Deutsche Bank and Credit Suisse equity
      derivatives trader, Storonsky co-founded Revolut to address the opacity and cost of cross-border financial
      services. His concentrated role creates notable key-person dependency; the company has been built around his
      product vision and risk appetite. He holds a significant equity stake and has publicly stated that an IPO is "at
      least two years away" as of April 2026, signalling continued private control.

      Vlad Yatsenko (CTO and Co-founder) leads technology, holding an equally important strategic position. Victor
      Stinga (CFO) joined from the banking sector and has been instrumental in the 2024 annual report disclosures and
      the 2025 secondary transaction. Martin Gilbert (Non-executive Chair since 2021), founder of Aberdeen Asset
      Management, leads board oversight. The board includes investor representatives from SoftBank Vision Fund, TCV, and
      other major institutional shareholders.

      Revolut moved its global headquarters to One Canada Square, Canary Wharf, London in 2024 as part of its brand
      upgrade. It also established a Barcelona TechHub to deepen its European engineering presence. The company has
      invested heavily in internal talent, receiving 1.6 million job applications in 2024 and achieving record employee
      retention. Headcount grew 20% year-on-year in 2024, exceeding 8,000 employees globally.
    claimRefs:
      - C005
      - C006
      - C007
      - C008
      - C009
  - id: s3
    title: Funding History, Valuation, and Investors
    body: >
      Revolut has completed six primary equity funding rounds since inception, raising approximately $1.71 billion in
      disclosed primary capital. The company achieved unicorn status in April 2018 with its $250 million Series C led by
      DST Global at a $1.7 billion valuation. Its $800 million Series E in July 2021 (led by SoftBank Vision Fund and
      Tiger Global Management) vaulted the valuation to $33 billion — the UK's largest-ever private tech funding round
      at the time.

      Two subsequent secondary share sales established the current valuation benchmark. In August 2024, a secondary
      transaction implied a $45 billion valuation, providing employee liquidity and attracting new institutional
      interest. In November 2025, Revolut completed its fifth employee share sale alongside a $2 billion primary raise
      led by Coatue, Greenoaks, Dragoneer, and Fidelity Management & Research Company, with participation from
      Andreessen Horowitz, Franklin Templeton, T. Rowe Price, and NVentures (NVIDIA's venture arm). This transaction
      valued Revolut at $75 billion, the highest ever implied valuation for a European private technology company. The
      $75 billion figure is based on secondary transaction pricing and is not a primary equity round.

      Revolut has not raised external debt facilities at the group level commensurate with its scale, though its bank
      subsidiary in Lithuania accepts customer deposits subject to regulatory capital rules. Total customer balances
      held on platform reached $38 billion at year-end 2024, up 66% year-on-year, representing a key liability and
      funding source for lending products.
    claimRefs:
      - C010
      - C011
      - C012
      - C013
      - C014
      - C015
  - id: s4
    title: Scale, Metrics, and Milestones
    body: >
      Revolut reported $4.0 billion in revenue for fiscal year 2024 (ended 31 December 2024), representing 72%
      year-on-year growth from $2.2 billion in 2023. Pre-tax profit was $1.4 billion (up 149% YoY), with net profit of
      $1.0 billion (26% net margin), marking the fourth consecutive profitable year. Revenue diversification is notable:
      card payments ($887M), wealth ($647M), FX ($540M), subscription ($541M), and business ($592M) all contributed
      materially. In 2025, the company projected revenue of approximately $6.0 billion with Revolut Business alone
      reaching $1 billion in annualised revenue by November 2025.

      Customer growth has been exceptional. Revolut added 14.5 million new retail users in 2024 to reach 52.5 million by
      year-end (38% YoY growth). By November 2025, the retail base exceeded 65 million; by year-end 2025, it reached
      68.3 million. Business customers totalled approximately 490,000 at end-2024 and grew to 767,000 by end-2025.
      Transaction volumes processed reached $1.3 trillion annually in 2024, up 52% YoY.

      UK banking licence status is a defining milestone: Revolut received conditional (restricted) approval from the
      PRA/FCA in July 2024 after a three-year application process, entering a "mobilisation phase" with deposit caps.
      The mobilisation phase extended beyond the usual 12 months due to regulatory scrutiny of risk controls. Revolut
      achieved full UK banking licence status in March 2026.
    claimRefs:
      - C016
      - C017
      - C018
      - C019
      - C020
      - C021
      - C022
      - C023
