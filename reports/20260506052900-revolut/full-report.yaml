  summary: >
    Revolut Group Holdings Ltd is a London-headquartered digital banking super-app founded in July 2015 by Nik Storonsky
    (CEO) and Vlad Yatsenko (CTO). It offers retail current accounts, FX, crypto trading (200+ assets), equity
    investing, subscriptions, insurance, and a full-featured SME banking suite (Revolut Business) across 40+ markets.
