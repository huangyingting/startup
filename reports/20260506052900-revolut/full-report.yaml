    type: flow
    title: Recommendation logic
    subtitle: Investment decision framework for Revolut at $75B private valuation
    approximationNotes: Decision tree is illustrative and based on the key risk and return factors identified in this diligence report.
    claimRefs:
      - CV023
      - CV024
    data:
      nodes:
        - id: f1
          label: 'Entry: $75B (Nov 2025)'
          detail: 19x FY2024 revenue; 54x pre-tax profit; post-UK banking licence
        - id: f2
          label: 'Key question: Is $75B justified?'
          detail: 'Test: peer multiples, revenue growth sustainability, regulatory risk'
        - id: f3
          label: 'Nubank/Adyen peer range: 19–22x'
          detail: Growth-adjusted peer multiple range supports $75B entry
        - id: f4
          label: 'FY2024 fundamentals: $4B rev, $1.4B profit'
          detail: 35% pre-tax margin; 72% YoY growth; both support $50–80B intrinsic range
        - id: f5
          label: 'Regulatory risk: FCA banking licence'
          detail: Clean licence granted; AML history residual; Consumer Duty ongoing
        - id: f6
          label: CONDITIONAL BUY
          detail: If regulatory track record holds and primary-account conversion progresses — buy at $65–75B
        - id: f7
          label: HOLD / PASS
          detail: If FCA enforcement materialises or crypto revenue collapses >50% — wait for re-entry at $45–55B
        - id: f8
          label: 'IPO target: 2028 NASDAQ/NYSE'
          detail: 'Base case: $75–100B at IPO; bull case: $110–150B; bear: $40–55B'
      edges:
