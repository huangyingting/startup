  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Valuation Context
        blocks:
          - type: paragraph
            body: >
              Revolut's $75 billion private valuation (November 2025) rests on a well-founded thesis: it is the world's
              most valuable privately held digital bank, with demonstrated $4.0B in FY2024 revenue (+72% YoY), $1.4B in
              pre-tax profit (35% margin), 52.5 million retail customers, and a freshly granted UK banking licence that
              opens the primary-account conversion opportunity previously blocked by the absence of FSCS deposit
              protection. [CV001] [CV002]

              **The bull case** is straightforward: Revolut is a 15-product financial platform (banking, investing,
              crypto, insurance, FX, travel, business banking) with 52.5 million customers in 40+ markets, growing at
              50%+ per year on the customer side and 72% on the revenue side. If it sustains 35–40% revenue CAGR through
              2027 (the year before the target IPO window), FY2027E revenue would reach $7–8 billion; at 15–18x forward
              revenue, an IPO in 2028 would price Revolut at $105–144 billion — a 40–90% upside from the $75B entry
              valuation. [CV003]

              **The anti-thesis** is equally clear: the $75B valuation incorporates a significant amount of optimism
              about (a) the FCA/PRA banking licence executing without material enforcement events; (b) crypto/wealth
              revenue sustaining in a market-cycle agnostic way (it grew 298% in a bull year); and (c) the
              primary-account conversion materialising at scale rather than remaining a secondary account for the
              majority of 52.5M registered users. At 19x LTM revenue, investors are paying a premium not just for growth
              but for regulatory, market-cycle, and customer-quality assumptions that carry meaningful uncertainty.
              [CV004] [CV005]

              **Entry discipline**: The November 2025 secondary-market transaction at $75B was preceded by a $45B
              primary raise in August 2024 — a 67% step-up in 15 months. This rapid private valuation inflation is
              partly justified by FY2024 financial performance but also reflects private market momentum in the
              post-2024 fintech re-rating. Investors entering at $75B should be comfortable holding through potential
              near-term volatility driven by the banking-licence integration period, the IPO preparation timeline, and
              the 2026–2028 regulatory proving-out period. [CV006]
            claimRefs: []
      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Revolut's primary public comparable is **Nubank (NU)** — the Brazilian digital bank which trades at
              approximately 19x P/S on $2.9B FY2023 revenue, with 100M+ customers in Brazil, Mexico, and Colombia.
              Nubank's P/S multiple is highly relevant: both companies are high- growth digital banks with diversified
              product suites, strong customer acquisition economics, and emerging market optionality. At 19x FY2024
              revenue ($4.0B), Revolut's $75B valuation is at parity with Nubank's multiple, which appears reasonable
              given Revolut's higher revenue growth rate (72% vs Nubank's ~30%) but discounts Nubank's larger customer
              base and longer track record of Latin American market depth. [CV007] [CV008]

              **Wise (WISE.L)** trades at approximately 10x P/S, but is a more focused FX-pure-play with lower revenue
              growth (~25% YoY); Wise's lower multiple partly reflects its narrower product scope and lower revenue
              growth, not necessarily a structural fintech discount. **Adyen** trades at approximately 22x EV/Revenue —
              the premium justified by its enterprise payment infrastructure model with high barriers to entry and 40%+
              EBITDA margins. Revolut's 35% pre-tax margin at $4.0B revenue is more comparable to Adyen than to PayPal
              (18% EBITDA margin) or Block (15% gross profit margin). [CV009] [CV010]

              **Private market comparables**: Stripe's last disclosed valuation was $65B against approximately $15B in
              revenue (2023) — a 4.3x P/S, significantly below Revolut's 19x. However, Stripe is primarily an
              infrastructure business (payment gateway, API-first) rather than a consumer bank, and the two are not
              directly comparable on P/S. The more relevant Stripe data point is that Stripe's 2021 peak valuation of
              $95B represented approximately 36x P/S at the time — illustrating that premium-priced fintech multiples
              are achievable in favourable markets. [CV011] [CV012]
            claimRefs: []
      - number: '8.3'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              **Bull case ($105–144B at 2028 IPO)**: Revolut sustains 35–40% revenue CAGR to FY2027E revenue of $7–8B;
              UK banking licence conversion drives paid tier penetration to 25%+; crypto/wealth revenues hold above
              FY2024 levels in a sustained or modestly bull crypto environment; FCA and ECB regulatory track record is
              clean; IPO prices at 15–18x FY2027E revenue. In this scenario, investors entering at $75B achieve a
              1.4–1.9x MOIC over 3 years (approximately 13–24% IRR before fees). [CV013] [CV014]

              **Base case ($75–100B at 2028 IPO)**: Revolut grows revenue at 25–30% CAGR to FY2027E $6–7B; paid tier
              conversion improves modestly; crypto/wealth revenues normalise from FY2024 bull-market levels to
              flat/modest growth; UK banking licence executes without material regulatory adverse event; IPO prices at
              14–15x FY2027E revenue. In this scenario, investors entering at $75B achieve 1.0–1.3x MOIC over 3 years
              (0–10% IRR). [CV015]

              **Bear case ($40–55B, no 2028 IPO or IPO below entry)**: A material FCA enforcement action restricts
              account opening or imposes a consent order; crypto revenue contracts 50%+ in a bear market and total
              revenue grows only 10–15% CAGR; primary-account conversion fails to materialise at scale; IPO is delayed
              to 2029–2030 or occurs at 12–13x forward revenue on a lower base. In this scenario, investors entering at
              $75B face a 0.5–0.75x MOIC (value destruction of 25–50%). [CV016] [CV017]

              **Probability-weighted implied fair value**: Assigning 25% probability to the bull case, 55% to the base
              case, and 20% to the bear case, the probability-weighted valuation outcome at 2028 is approximately
              $78–90B — marginally above the current $75B entry price. This implies limited margin of safety at the
              current $75B valuation; the investment is appropriate for investors with high conviction on the regulatory
              track record and primary-account conversion thesis, not for those seeking a wide margin of safety. [CV018]
              [CV019]
            claimRefs: []
      - number: '8.4'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Revolut's **IPO readiness** is advancing: CEO Nik Storonsky confirmed in April 2026 that the IPO target is
              "no earlier than 2028" with a preferred US listing (NASDAQ or NYSE). The banking licence is a prerequisite
              for IPO on several dimensions: FSCS coverage reduces customer risk concern for equity investors, Pillar 3
              disclosures improve financial transparency, and the post-licence audit opinion provides greater confidence
              in accounts. Goldman Sachs, Morgan Stanley, and J.P. Morgan are reportedly engaged in early relationship
              building for the IPO mandate. [CV020] [CV021]

              **Dilution and preference overhang**: Revolut's capitalisation table includes participation from SoftBank
              Vision Fund (lead investor in the $800M 2021 round at $33B), which typically holds participating preferred
              with liquidation preferences. At $75B, most preference structures from earlier rounds are well
              in-the-money; however, investors should confirm that any IPO ratchets or MFN provisions from the 2021–2024
              rounds do not create preferential IPO allocation structures that disadvantage late-stage secondary buyers.
              [CV022] [CV023]

              **Public evidence support for the $75B price**: The price is supported by (1) a
              Coatue/Greenoaks/Dragoneer/a16z/Fidelity/NVentures consortium completing the secondary transaction at this
              level — a group of sophisticated crossover investors with public and private market discipline; (2) FY2024
              financials showing $4.0B revenue and $1.4B pre-tax profit that independently justify a $50–80B valuation
              on fundamentals; and (3) peer fintech valuations suggesting the multiple is not structurally irrational.
              [CV024] [CV025]

              **Recommended final diligence asks**: (1) All FCA/PRA correspondence post-banking licence; (2) FY2024
              audited accounts (available via Companies House from ~August 2026); (3) Management accounts for Q1 2026
              showing post-banking-licence revenue mix; (4) Consumer Duty implementation plan and timeline; (5) AML
              compliance attestation from CCO; (6) Capitalisation table and preference stack details; (7) GCP contract
              terms and DR plan; (8) Consumer lending NPL data (1–12 month book); (9) Crypto CASP authorisation
              application status; (10) CFO/CCO retention commitment and equity position. [CV026]
            claimRefs: []
