companyProfile:
  summary: >
    Revolut Group Holdings Ltd is a London-headquartered digital banking super-app founded
    in July 2015 by Nik Storonsky (CEO) and Vlad Yatsenko (CTO). It offers retail current
    accounts, FX, crypto trading (200+ assets), equity investing, subscriptions, insurance,
    and a full-featured SME banking suite (Revolut Business) across 40+ markets. Revolut
    received its full UK banking licence from the PRA/FCA in March 2026, transitioning to
    a deposit-taking bank with FSCS protection and triggering the primary-account conversion
    opportunity that is central to the investment thesis. With $4.0B in FY2024 revenue (+72%
    YoY), $1.4B in pre-tax profit (35% margin), and a $75B November 2025 private valuation,
    Revolut is Europe's most valuable private company and the leading candidate for a 2028
    US IPO.
  foundedDate: '2015-07-01'
  founders:
    - name: Nik Storonsky
      role: CEO and co-founder
      background: >
        Former Deutsche Bank and Credit Suisse equity derivatives trader; primary strategic
        decision-maker, investor relationship holder, and controlling shareholder. Committed
        to no IPO before 2028.
      claimRefs: [C005]
    - name: Vlad Yatsenko
      role: CTO and co-founder
      background: >
        Former Deutsche Bank technologist; core architecture authority responsible for
        platform engineering, payment infrastructure, and fraud systems.
      claimRefs: [C006]
  foundingLocation: London, UK
  headquarters: London, UK (Canary Wharf)
  productSummary: >
    Revolut's product suite spans retail banking (IBAN accounts, debit cards, savings, overdraft),
    international FX and transfers (interbank rate), crypto trading (200+ assets, staking,
    DeFi), equity/commodity investing, subscription plans (Standard to Ultra at £0–45/mo),
    travel insurance, device protection, eSIM, and a full-featured business banking suite
    (expense management, multi-currency payroll, treasury). AI assistant handles 80% of
    customer support queries.
  customerFocus: >
    Retail: urban mobile-first consumers aged 18–40 in UK/EEA, frequent travellers, digital
    nomads, and crypto enthusiasts. Business: micro-businesses (freelancers/startups), SMEs,
    and mid-market enterprises in 40+ countries (767K+ business customers).
  businessModel: >
    Diversified revenue streams: card interchange (~35%), FX/transfer (~25%), wealth/crypto
    (~20%), subscriptions (~12%), and Revolut Business (~8%). Revenue protected by high
    switching costs in Business, subscription lock-in, and 65% organic/referral customer
    acquisition. Post-banking-licence NIM (net interest margin) will add a fifth pillar.
  stage: late-stage private
  fundingStatus: >
    Total primary capital raised approximately $3.7B across seed through Series E+ rounds.
    Most recent: $2B primary at $75B valuation (November 2025), led by Coatue, Greenoaks,
    Dragoneer, Fidelity, a16z, and NVentures. Previous: $2B primary at $45B (August 2024).
  disclosureProfile: private-disclosed
  claimRefs: [C001, C002, C005, C006, C014, C016, C021, C029]

summary:
  headline: >
    Revolut's banking licence, $4B revenue, and $1.4B profit justify a CONDITIONAL BUY at $75B;
    regulatory execution risk and crypto revenue cyclicality bound the margin of safety.
  overallScore: 7.1
  recommendation: buy
  confidence: medium
  riskRating: high
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 75000
    revenueRunRateUsdM: 4000
    arrUsdM: null
    revenueGrowthYoYPct: 72
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 3710
    customerCount: 52500000
    headcount: 10000
  topStrengths:
    - "UK banking licence (March 2026) enables FSCS deposit protection and primary-account salary conversion — the most transformative near-term revenue catalyst"
    - "$4.0B FY2024 revenue (+72% YoY) with $1.4B pre-tax profit (35% margin) demonstrates scale profitability well ahead of peers at comparable stage"
    - "52.5 million retail customers and 767K+ business customers across 40+ markets represent a deep, diversified distribution moat built on 65% organic/referral acquisition"
    - "Diversified 15-product super-app revenue mix (interchange, FX, crypto, subscriptions, business) reduces single-stream dependency and creates multiple expansion levers"
    - "FY2024 $75B valuation supported by sophisticated crossover investor consortium (Coatue, a16z, Fidelity, Greenoaks, Dragoneer, NVentures) providing price discovery anchor"
  topRisks:
    - "FCA/PRA enforcement risk post-banking-licence: historical AML/KYC concerns and Consumer Duty account-freeze exposure are the highest-severity thesis-break scenarios"
    - "Crypto and wealth revenue concentration (~20% of FY2024 revenue) grew 298% in a bull year and could contract 40–60% in a sustained bear market, converting profit to near-breakeven"
    - "GCP single-cloud dependency and AI fraud-detection false positives represent operational and Consumer Duty risks with limited disclosed mitigation"
    - "UK/EEA geographic concentration (~75% of customer base) means a material UK or EU regulatory action would disproportionately impact the business"
    - "CEO key-person concentration (Nik Storonsky as controlling shareholder and sole strategic leader) creates succession and governance uncertainty in the pre-IPO window"
  unresolvedGaps:
    - "FCA/PRA supervisory correspondence and Consumer Duty compliance status (non-public; request in data room)"
    - "FY2024 audited statutory accounts (expected Q3 2026 from Companies House; management accounts available)"
    - "Consumer lending NPL data for nascent UK and EU book (1–12 month book; no public disclosure)"
    - "Capitalisation table preference stack and IPO ratchet provisions from 2021–2025 rounds (not publicly disclosed)"
    - "Retail customer churn rate, NRR, and cohort retention data (not publicly disclosed by Revolut)"
    - "MiCA CASP authorisation application status and expected decision timeline (EU crypto revenue at risk)"
    - "CET1 capital ratio and Pillar 3 disclosures (first expected Q3 2026 post-banking-licence)"
