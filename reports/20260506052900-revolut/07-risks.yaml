runDate: '2026-05-06'
company:
  name: Revolut
  website: https://revolut.com
chapter:
  number: 7
  title: Risks
  summary: >
    Revolut's principal risk profile as of May 2026 is dominated by regulatory execution risk — the company is now a
    PRA/FCA-licensed bank in the UK, bringing significantly elevated supervisory expectations, capital requirements, and
    potential enforcement exposure for any historical AML/KYC deficiencies. Secondary risk clusters include
    crypto/wealth revenue concentration (FY2024 wealth revenue grew 298% in one year; bear market would reduce by 40–
    60%), GCP single-cloud dependency, Visa/Mastercard network concentration, CEO key-person concentration, and the
    structural challenge of converting secondary-account customers to primary banking relationships. The operational
    risk environment is material: service outages and AI-driven false-positive account freezes are the leading customer
    satisfaction detractors. A sustained AML enforcement action from FCA/PRA remains the highest-severity thesis-break
    risk.
sections:
  - id: s1
    title: Regulatory and Legal Risk
    body: >
      Revolut obtained its full UK banking licence from the PRA/FCA in March 2026, transitioning from an e-money
      institution to a regulated bank. This is the single most consequential regulatory milestone in Revolut's history —
      and it simultaneously resolves a major trust barrier (FSCS deposit protection) while dramatically raising the
      compliance bar. PRA banking supervision is materially more intensive than FCA e-money oversight: capital adequacy
      ratios, liquidity coverage, credit risk frameworks, Recovery and Resolution Plans (RRPs), and Consumer Duty
      continuous monitoring all apply from licensing date. [C211] [C212]

      **AML/KYC legacy risk**: Revolut has a documented history of AML control weaknesses. In 2021, City A.M. and others
      reported that Revolut briefly disabled automated transaction monitoring in 2019 to manage false-positive volumes;
      the FCA required enhanced monitoring and a Skilled Person Review. While Revolut states all FCA recommendations
      were remediated and the banking licence implies FCA satisfaction, residual enforcement risk from the 2019–2022
      period cannot be fully dismissed until the limitation period expires. AML enforcement by FCA carries penalties up
      to unlimited fine and, in severe cases, licence suspension. [C213] [C214]

      **EU regulatory fragmentation**: Revolut operates under a Lithuanian banking licence (Bank of Lithuania) for EEA
      customers, covering approximately 40% of its customer base. The Lithuanian banking licence is now subject to full
      ECB SSM supervision (the ECB joined direct oversight after assets crossed the €30B threshold). This creates a
      two-regulator structure (PRA + ECB/Bank of Lithuania) with potentially conflicting capital and conduct
      requirements. [C215]

      **Crypto and MiCA compliance**: Revolut's crypto product (supporting 200+ assets, trading and staking) must comply
      with the EU Markets in Crypto Assets Regulation (MiCA) effective January 2025 in full. MiCA imposes new licensing,
      whitepaper, reserve, and marketing restrictions on crypto service providers. While Revolut has applied for CASP
      (Crypto-Asset Service Provider) authorisation, any enforcement action or licence delay would materially impair the
      crypto revenue stream (~20% of FY2024 revenue). [C216] [C217]

      **Data protection and GDPR**: Revolut operates as a data controller for 52.5 million customers' financial data
      across the UK (post-Brexit ICO framework) and EU (GDPR). The scale of data processing creates systematic GDPR
      exposure; a material breach of customer financial data could result in ICO fines of up to £17.5M or 4% of global
      annual turnover (circa £160M at FY2024 revenue levels), plus reputational damage and customer churn. [C218]
  - id: s2
    title: Operational, Technology, and Security Risk
    body: >
      Revolut runs on Google Cloud Platform (GCP) across all major services — core banking ledger, payment processing,
      fraud detection, and customer-facing applications. This **single-cloud dependency** represents a concentration
      risk: a GCP availability event (either Revolut-specific misconfiguration or broad GCP regional outage) would take
      the entire platform offline. Revolut has experienced periodic outages that appear correlated with GCP
      infrastructure events. Unlike some fintech peers who operate hybrid on-premise plus cloud, Revolut's cloud-native
      architecture optimises for cost and velocity but reduces resilience diversity. [C219] [C220]

      **AI-driven fraud detection — false positive risk**: Revolut's automated account freeze system relies on ML models
      trained on transaction patterns. These models generate false positives: legitimate customers are flagged and their
      accounts frozen. This creates a paradox — reducing false positives improves customer experience but potentially
      increases genuine fraud pass-through. The Which? UK and Trustpilot evidence shows this is the primary customer
      experience detractor. Under PRA banking supervision, there is now a regulatory dimension: the new UK Consumer Duty
      requires firms to prevent foreseeable harm, and unjustified account freezes causing financial hardship may
      constitute a Consumer Duty breach. [C221] [C222]

      **Cybersecurity risk**: As a bank processing $38 billion in customer deposits and billions in daily transaction
      volume, Revolut is a high-value target for nation-state and criminal cyberattacks. The September 2022 data breach
      (50,000 customers' email addresses and partial card data compromised) established that Revolut's defences are not
      impenetrable. A material breach of customer financial credentials, account credentials, or core banking data could
      trigger simultaneous ICO enforcement, FCA supervisory action, mass customer churn, and litigation. [C223] [C224]

      **Operational scale risk**: Revolut grew from 5,000 to 10,000+ employees in two years. Rapid headcount scaling
      creates operational risk vectors: inconsistent control implementation across offices (35 countries), inadequate
      knowledge transfer, and cultural dilution of compliance standards. The FCA specifically flagged culture as a risk
      factor in its banking licence assessment process; any supervisory finding of inadequate operational controls
      post-licence would be disproportionately harmful given the heightened regulatory attention. [C225]
  - id: s3
    title: Partner and Dependency Risk
    body: >
      Revolut's core card payment infrastructure depends entirely on **Visa and Mastercard** for card network access
      (processing, clearing, scheme rules). Both networks have the right to terminate a fintech's membership agreement
      for violations of scheme rules, financial instability, or reputational events. The Wirecard collapse (a European
      e-money institution whose Visa/Mastercard membership was terminated as part of its failure) is the reference case
      for this risk pathway. While Revolut's financial position is materially stronger than Wirecard's at any comparable
      point, the dependency on two external parties for payment infrastructure is a structural concentration. [C226]
      [C227]

      **Correspondent banking relationships**: For cross-border payment settlement in non-EEA/UK currencies (USD, JPY,
      BRL, etc.), Revolut relies on correspondent bank relationships with major banks. Correspondent banking is a
      risk-sensitive relationship: banks regularly de-risk their correspondent portfolios, and a fintech with an
      unresolved AML history or regulatory inquiry could be de-risked by a critical correspondent. Loss of a major USD
      or EUR correspondent would disrupt Revolut's international transfer product — its highest-differentiation feature
      for existing customers. [C228] [C229]

      **Cloud concentration (GCP)**: As noted in operational risk, the single-vendor GCP dependency also creates a
      commercial dependency: Google could raise pricing, change product terms, or (in a distressed scenario) restrict
      access in the event of contractual disputes. Revolut's 200 NVIDIA H100 GPU investment (owned hardware) partially
      mitigates this for AI workloads but does not reduce reliance on GCP for core banking operations. [C230]

      **Capital markets dependency**: Revolut's $75B valuation is private-market and predicated on continued access to
      growth capital or a future IPO. The company is profitable (£1.4B pre-tax profit in FY2024) and has $38B in
      customer deposits providing liquidity, but any scenario where capital markets close for late-stage tech fintech
      (as occurred in 2022) would limit Revolut's ability to fund M&A or geographic expansion. Revolut's profitability
      now provides a meaningful buffer against funding risk. [C231]
  - id: s4
    title: Financial Model and People Risk
    body: >
      Revolut's revenue mix carries **crypto and market-cycle concentration risk**: wealth and crypto revenue grew 298%
      YoY in FY2024 to approximately $800 million, now representing approximately 20% of total revenue. In a sustained
      crypto bear market (as occurred in 2022–2023 when crypto prices fell 60–80%), this revenue stream could contract
      by 40–60%, reducing total revenue by 8–12 percentage points and potentially converting Revolut's $1.4B pre-tax
      profit into a loss at current cost structures. [C232] [C233]

      **FX revenue cyclicality**: Cross-border FX and transfer revenue (~25% of total) is also cyclical: reduced
      consumer travel (pandemic, recession), business trade slowdown, or compression of FX spreads from competition
      (Wise, SWIFT gpi, open banking) could reduce this revenue stream. The secular trend for FX spread compression is
      adverse and Revolut must continuously migrate customers to higher-margin subscription and lending products to
      offset FX spread decline. [C234]

      **Credit risk from lending expansion**: Revolut launched consumer lending products (Buy Now Pay Later, personal
      loans, overdraft) in multiple markets in 2024–2025. As a newly licensed UK bank, credit risk is now a first-order
      financial risk. Revolut has limited through-the-cycle credit data on its customer base, meaning its loan loss
      assumptions may be inadequately calibrated for a recession scenario. A credit cycle downturn would simultaneously
      reduce revenue (fewer lending drawdowns), increase provisions (higher defaults), and consume regulatory capital
      (CET1 requirements). [C235] [C236]

      **CEO key-person risk**: Nik Storonsky is the executive founder-CEO with a controlling stake and is the primary
      strategic decision-maker, public face, and investor relationship holder. His departure would likely result in a
      multi-quarter period of strategic uncertainty, potential investor reassessment of valuation, and organisational
      disruption at a critical juncture (post-banking-licence, pre-IPO). No obvious internal succession candidate has
      been publicly identified or positioned. [C237]

      **Leadership team depth and retention**: Revolut has experienced significant C-suite turnover: multiple CFOs, a
      Chief Compliance Officer departure, and numerous country chief departures have occurred over 2019–2024. The
      pattern of departure is partly attributable to the company's demanding culture and high-velocity growth, but also
      to compliance disagreements. The post-licensing period requires stable compliance and finance leadership; any
      further material departures in these functions would be a regulatory flag. [C238] [C239]
