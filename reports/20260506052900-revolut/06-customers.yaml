      statement: >-
        Approximately 80% of Revolut's 52.5 million retail customers (approximately 42 million) use the free Standard
        tier, primarily for travel FX, international transfers, and P2P payments as a secondary account, generating ARPU
        of approximately $20–30/year through interchange and periodic FX transactions.
      type: estimated
      topic: free-tier-segment
      sourceRefs:
