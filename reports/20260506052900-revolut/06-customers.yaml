      statement: >-
        Revolut had 52.5 million retail customers globally as of end-FY2024, representing a 50% YoY increase from
        approximately 35 million at end-2023, with UK customers estimated at ~35% of the total (~18M) and EEA customers
        at ~40% (~21M).
