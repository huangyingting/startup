  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Retail customer churn, NRR, and cohort retention data for Revolut
      missingEvidence: Revolut does not publicly disclose customer churn rates, NRR, GRR, or cohort retention by vintage year.
      whyItMatters: >-
        Without cohort retention data, the quality of Revolut's 52.5M customer count (active vs inactive vs
        secondary-only) cannot be assessed and LTV calculations carry high uncertainty.
      diligencePath: >-
        Request customer cohort analysis from management in due diligence data room; specifically: monthly active user
        rates by cohort vintage, 12-month and 24-month retention curves by segment.
      relatedQuestionRefs:
        - RQ615
    - type: missing-source
      severity: minor
      topic: Named enterprise customer proof table (T603) — traditional enterprise references not published by Revolut
      missingEvidence: >-
