      - C201
      - C202
    data:
      nodes:
        - id: n1
          label: Discovery
          detail: Referral from friend (65% organic) / app store search / travel need / social media
        - id: n2
          label: Download & KYC (<5 min)
          detail: Biometric onboarding; virtual card issued immediately; GBP/EUR IBAN created
        - id: n3
          label: 'First use: Travel FX / P2P'
          detail: International travel or P2P payment; experience with interbank rate vs bank; habit formation
        - id: n4
          label: Recurring usage (secondary account)
          detail: Card used for travel and online spending; FX top-up; ~80% of users stay at this stage
        - id: n5
          label: Product expansion
          detail: Crypto/stocks discovery → investment activation; subscription upgrade trigger; salary advance use
        - id: n6
          label: Paid tier upgrade
