          score: 6.5
        - label: LTM 收入（FY2024）
          value: $4.0B
          detail: 同比 +72%；税前利润率 35%；无保留审计意见
          score: 9
        - label: 入场 EV/Revenue
          value: ~19x
          detail: 与 Nubank 接近；较 Wise/Stripe 有溢价；增长率支撑该溢价
          score: 6.5
        - label: 基准情景 MOIC（3 年）
          value: 1.0–1.3x
          detail: 收入 CAGR 25–30%；$75–100B IPO
          score: 5.5
        - label: 乐观情景 MOIC（3 年）
          value: 1.5–2.0x
          detail: 收入 CAGR 35–40%；$112–153B IPO
          score: 7.5
        - label: 悲观情景 MOIC（3 年）
          value: 0.6–0.8x
          detail: FCA 执法 + 加密熊市；受损估值 $42–59B
          score: 3
        - label: 安全边际
          value: Limited (~5%)
          detail: 概率加权价值约 $78–90B，对比 $75B 入场；边际偏紧
          score: 4.5
