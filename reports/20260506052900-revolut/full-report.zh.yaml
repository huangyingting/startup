      - number: '7.4'
        title: 财务模型与人员风险
        blocks:
          - type: paragraph
            body: >
              Revolut 的收入结构带有**加密资产和市场周期集中风险**：财富与加密资产收入在 FY2024 同比增长 298%，至约 $800 million，目前约占总收入
              20%。若加密资产长期处于熊市（2022–2023 年加密资产价格曾下跌 60–80%），该收入流可能收缩 40–60%，令总收入减少 8–12 个百分点，并可能在当前成本结构下把 Revolut 的 $1.4B
              税前利润转为亏损。 [CR022] [CR023]

              **外汇收入周期性**：跨境外汇和转账收入（约占总收入 25%）同样有周期性：消费者旅行减少（疫情、衰退）、企业贸易放缓，或竞争（Wise、SWIFT
              gpi、开放银行）压缩外汇价差，都可能压低该收入流。外汇价差压缩是长期不利趋势；Revolut 必须持续把客户迁移到毛利更高的订阅和贷款产品，以抵消外汇价差下降。 [CR024]

              **贷款扩张带来的信用风险**：Revolut 在 2024–2025 年于多个市场推出消费贷款产品（先买后付、个人贷款、透支）。作为新近持牌的英国银行，信用风险现在是一阶财务风险。Revolut
              对其客户群的穿越周期信用数据有限，意味着贷款损失假设在衰退场景下可能校准不足。信用周期下行会同时减少收入（贷款提款减少）、增加拨备（违约率更高），并消耗监管资本（CET1 要求）。 [CR025] [CR026]

              **CEO 关键人物风险**：Nik Storonsky 是执行创始人兼
              CEO，持有控股权益，也是主要战略决策者、公众面孔和投资者关系持有人。若他离任，公司很可能经历多个季度的战略不确定、投资者重新评估估值，以及在关键节点（拿到银行牌照之后、IPO
              之前）的组织扰动。公开信息中没有明显的内部接班人被识别或定位。 [CR027]

              **领导团队深度与留存**：Revolut 经历过显著高管流失：2019–2024 年间，多任
              CFO、一名首席合规官以及多名国家负责人离开。这一离职模式部分源于公司高压文化和高速增长，也源于合规分歧。持牌后的阶段需要稳定的合规与财务领导；这些职能若再出现重大离职，会成为监管警讯。 [CR028]
              [CR029]
            claimRefs: []
