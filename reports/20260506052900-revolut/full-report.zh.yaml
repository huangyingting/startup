      - number: '6.3'
        title: 客户满意度、留存与 NPS
        blocks:
          - type: paragraph
            body: >
              Revolut 的 Trustpilot 评分为 4.3/5，来自超过 98,000 条评论（截至 2026 年 5 月）；按评论量看，它处在英国金融服务提供商的高分梯队。不过，独立消费者调查一直把 Monzo
              和 Starling 的英国客户满意度排在 Revolut 之上。Revolut 综合 NPS 为 12，反映出不对称格局：频繁旅行者和加密资产用户（产品核心用例）的 NPS
              很高；经历过账户冻结、身份核验失败或客服长时间等待的客户，NPS 较低甚至为负。 [CU014] [CU015]

              负面 Trustpilot 评论的主因是**账户冻结投诉**：Revolut 的自动欺诈检测会标记异常活动模式下的账户，导致临时冻结，用户可能因此无法使用主账户。AI 助手上线后（处理 80%
              查询）缩短了等待时间，但冻结机制本身仍是结构性客户体验难题，也是 Revolut 激进欺诈检测模型特有的问题。 [CU016] [CU017]

              **留存动态**：Revolut 未公开披露流失率。Bain & Company 的银行忠诚度研究显示，英国新银行用户约 35% 会多栖使用（持有 2 个以上新银行账户），这意味着 Revolut
              客户数里有一大部分把 Revolut 当作副账户。当竞争对手（通常是 Monzo）是主账户银行时，Revolut 面临结构性的副账户 ARPU 上限。英国银行牌照（2026 年 3 月）和 FSCS
              存款保护可能消除工资存款的关键信任障碍，从而改善主账户转化。 [CU018] [CU019]
            claimRefs: []
          - type: table
            tableRef: TU003
            claimRefs:
              - CU014
              - CU015
              - CU016
          - type: figure
            figureRef: FU003
