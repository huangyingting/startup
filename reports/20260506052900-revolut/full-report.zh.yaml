  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 乐观投资逻辑
      - 悲观反向逻辑
    rows:
      - - 收入增长
        - FY2024 同比增长 72%；英国银行业务 + 地理扩张可支撑 35–40% CAGR
        - 增长部分来自加密牛市拉动；正常化增长 20–25%；若 CAGR 只有 25%，19x 过贵
      - - 盈利能力
        - FY2024 税前利润 $1.4B，利润率 35%；银行业务放大后利润率可维持
        - 加密 / 财富业务 298% 增长贡献过重；正常化利润率可能是 20–25%，不是 35%
      - - 监管
        - 英国银行牌照已于 2026 年 3 月获批；FCA 对 AML 整改满意
        - 牌照获批后 AML 审查更严；存在 Consumer Duty 冻结风险；ECB 增加第二层监管
      - - 客户质量
        - 52.5M 客户；65% 自然获客；英国银行牌照支持主账户转化
        - 35%+ 多账户使用率；不少用户只把 Revolut 当副账户；主账户银行 NPS 只有 12，偏弱
      - - 可比估值倍数
        - 19x P/S 与 Nubank 相当；更高增速和利润率支撑溢价
        - Stripe 4x、Wise 10x；19x 假设持续高速增长，但尚未经历完整周期
      - - 加密可选性
        - MiCA 合规可打通欧盟范围的加密业务；200+ 资产；零售加密采用率上升
        - 加密收入在牛市年份增长 298%；悲观情景下或收缩 40–60%；估值承受这一风险
      - - IPO 路径
        - 2028 年 NASDAQ/NYSE IPO；Goldman / MS / JPM 关系；银行牌照提高可信度
        - 监管风险将 IPO 推迟至 2029–2030 年；公开市场在财务数据更完整后重估至 12–14x
