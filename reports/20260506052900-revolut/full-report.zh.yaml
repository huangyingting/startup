      - number: '2.5'
        title: 图表
        blocks:
          - type: callout
            title: 多垂直 TAM 推动 ARPU 复合增长
            body: >
              Revolut 能从单一外汇工具扩展为多垂直金融超级应用（银行、财富、加密资产、SME），显著抬高每名客户收入。FY2024 财富收入增长 298%，证明新产品被采用后，平台能从同一用户基数中提取显著更高的
              ARPU。完整英国银行牌照又通过净利息收入、按揭和透支释放更多 ARPU 增长；在高利率环境里，这些产品的单位经济性很强。
            calloutType: strength
            claimRefs:
              - CM016
              - CM017
              - CM018
          - type: callout
            title: 主账户地位缺口限制长期收入天花板
            body: >
              对 68 million 客户中的多数人来说，Revolut 仍是副银行——也就是说，大多数用户不会把工资直入 Revolut，限制了单客平均余额。英国传统银行年切换率只有
              10–15%，传统银行靠工资支付、按揭和直接扣款惯性守住主银行关系。除非 Revolut 赢得有实质规模的主账户地位，否则其存款基数和净利息收入潜力在结构上仍会低于传统银行同业。
