  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基数分群与特征
        blocks:
          - type: paragraph
            body: >
              Revolut 的 52.5 million 零售客户基数高度分化为三类主要客户。**免费档数字用户**（约占零售基数 80%，约 42M 客户）主要是欧洲城市市场 18–40 岁人群，把 Revolut
              作为主银行之外的副账户，主要用于旅行外汇、国际转账和 P2P 支付。这些客户通过卡交换费和周期性外汇交易贡献约 $20–30/年的 ARPU。[CU001] [CU002]

              **付费档订阅者**（约占零售基数 15–20%，约 8–10M 客户）是 Revolut Plus、Premium、Metal 或 Ultra 计划持有人，把 Revolut
              作为主银行或接近主银行的关系使用。这些客户贡献 $150–300/年的 ARPU，并不成比例地拉动订阅和财富收入。FY2024 付费计划增长 45%，说明免费到付费的转化势头强劲。[CU003] [CU004]

              **Revolut Business 客户**（767,000+ 个实体）主要是微型企业（自由职业者、初创公司）、SME，以及一个不断增长的中端市场分群。他们用 Revolut
              处理多币种工资单、费用管理、跨境支付和外汇套保。单个企业客户平均收入显著高于零售，估计 SME 为 $400–600/年，中端市场账户为 $2,000–5,000/年。[CU005] [CU006]

              **地域分布**集中在英国（约占零售客户 35%）、EEA（约 40%），其余分散在美国（软启动）、澳大利亚和 LATAM 通道等市场。英国和 EEA 集中带来监管和货币风险集中，但也反映了 Revolut
              最强的品牌和运营市场。[CU007]
