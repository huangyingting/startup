      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: >
              **乐观情景（2028 年 IPO 时 $105–144B）**：Revolut 保持 35–40% 收入 CAGR，FY2027E 收入达 $7–8B；英国银行牌照转化推动付费层级渗透率达到
              25%+；在加密资产持续或温和牛市环境下，加密资产 / 财富收入保持在 FY2024 以上；FCA 和 ECB 监管记录干净；IPO 按 FY2027E 收入 15–18x 定价。在该情景下，以 $75B
              入场的投资者 3 年实现 1.4–1.9x MOIC（扣费前 IRR 约 13–24%）。 [CV013] [CV014]

              **基准情景（2028 年 IPO 时 $75–100B）**：Revolut 收入以 25–30% CAGR 增至 FY2027E $6–7B；付费层级转化温和改善；加密资产 / 财富收入从 FY2024
              牛市水平正常化为持平 / 温和增长；英国银行牌照落地不发生重大监管负面事件；IPO 按 FY2027E 收入 14–15x 定价。在该情景下，以 $75B 入场的投资者 3 年实现 1.0–1.3x
              MOIC（IRR 0–10%）。 [CV015]

              **悲观情景（$40–55B，无 2028 年 IPO 或 IPO 低于入场价）**：FCA 重大执法行动限制开户或施加同意令；熊市中加密资产收入收缩 50%+，总收入 CAGR 仅
              10–15%；主账户转化未能大规模兑现；IPO 推迟到 2029–2030 年，或在更低收入基数上按 12–13x 前瞻收入进行。在该情景下，以 $75B 入场的投资者面临 0.5–0.75x MOIC（价值毁损
              25–50%）。 [CV016] [CV017]

              **概率加权隐含公允价值**：若赋予乐观情景 25%、基准情景 55%、悲观情景 20% 的概率，2028 年概率加权估值结果约为 $78–90B，略高于当前 $75B 入场价。这意味着当前 $75B
              估值安全边际有限；这笔投资适合高度相信监管记录和主账户转化逻辑的投资者，不适合寻求宽安全边际的投资者。 [CV018] [CV019]
            claimRefs: []
