      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Nik Storonsky（CEO 兼联合创始人）是驱动战略的核心力量。他曾任 Deutsche Bank 和 Credit Suisse 股票衍生品交易员，创立 Revolut
              是为了解决跨境金融服务不透明、成本高的问题。他的角色高度集中，也带来明显的关键人物依赖；公司围绕他的产品愿景和风险偏好搭建。他持有可观股权，并在 2026 年 4 月公开表示
              IPO「至少还要两年」，意味着公司会继续维持私有控制。

              Vlad Yatsenko（CTO 兼联合创始人）负责技术，同样处在重要战略位置。Victor Stinga（CFO）来自银行业，在 2024 年年报披露和 2025 年老股交易中作用关键。Martin
              Gilbert（2021 年起任非执行主席）是 Aberdeen Asset Management 创始人，负责董事会监督。董事会包括 SoftBank Vision Fund、TCV
              及其他大型机构股东的投资者代表。

              2024 年，Revolut 将全球总部迁至伦敦 Canary Wharf 的 One Canada Square，作为品牌升级的一部分。公司还设立了 Barcelona
              TechHub，加深在欧洲的工程布局。Revolut 大举投入内部人才，2024 年收到 1.6 million 份求职申请，并创下员工留存纪录。2024 年员工数同比增长 20%，全球超过 8,000 人。
