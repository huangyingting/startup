      - number: '2.3'
        title: 买方与用户分群
        blocks:
          - type: paragraph
            body: >
              Revolut 的客户基数横跨多个群体，每个群体需求和经济性不同。最大分群是 18–40
              岁、数字原生的城市成年人；他们看重旅行和汇款的低外汇费用、即时卡到卡转账，以及在一个应用里整合财务管理。该群体流动性很强（频繁换国家、多币种需求），也是核心增长引擎。

              第二个分群是更懂金融的投资者 / 储蓄者（主要是 Premium 和 Metal 计划订阅者），用 Revolut 做加密资产、股票交易、储蓄账户和机器人投顾。该群体的 ARPU 比标准 / 免费档高 4–6
              倍，并推动财富收入不成比例增长（FY2024 同比 +298%）。

              第三个分群是 Revolut Business——需要多币种公司账户、费用管理、工资单和 B2B 支付的 SME、初创公司和自由职业者。到 2025 年底，企业客户达到 767,000，贡献集团收入约
              15%；该分群同比增长 56%，代表下一条主要增长向量。B2B 银行 ARPU 显著高于零售。

              从地域看，西欧（英国、法国、爱尔兰、西班牙、德国、立陶宛）主导客户基数；法国、意大利、西班牙和北欧在 2024 年增长最快。2024 年，Revolut 在 19 个国家的金融类下载量排名第 1，在 26
              个国家进入前三。
