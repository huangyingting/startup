      - number: '2.4'
        title: 增长驱动与约束
        blocks:
          - type: paragraph
            body: >
              关键增长驱动：（1）全球千禧一代和 Z 世代长期转向移动优先银行服务，OECD 市场银行网点访问量逐年下降。（2）旅行者和移民长期承受传统外汇高成本——银行平均收费 2–4%，而 Revolut 低于
              1%——形成强转介绍动机。（3）加密资产采用周期：受 Bitcoin 和 Ethereum 价格上涨及新产品发布推动，Revolut 2024 年加密收入同比增长
              298%。（4）英国和欧盟银行牌照扩展，允许完整吸收存款和放贷，释放净利息收入和按揭收入流。（5）通过银行授权进入 10+ 个新国际市场。

              关键约束：（1）信任和监管合规：传统银行切换率仍低（英国年切换率 10–15%），因为大多数客户把主银行账户留在传统银行。Revolut 的副银行定位限制了平均存款余额和
              ARPU。（2）监管升级：每个新辖区都需要资本投入、本地合规建设和监管关系管理。（3）信用风险：进入贷款业务会让 Revolut
              暴露于信用损失；经济下行时违约率可能实质侵蚀利润率。（4）加密监管：MiCA（欧盟）、FCA 加密规则和全球监管分化带来合规成本和产品限制风险。（5）传统超级应用竞争：Apple Pay、Google Pay
              和大型银行应用正在扩展金融功能，威胁 Revolut 的入口。
