              - CI019
      - number: '4.3'
        title: 资本结构与融资
        blocks:
          - type: paragraph
            body: >
              自 2015 年创立以来，Revolut 累计股权融资约 $1.8–2.0 billion；最近一轮是 2024 年 8 月作为更大规模 $45B 老股交易的一部分完成的 $2 billion 新股融资，随后又在
              2025 年 11 月发生一次融资事件，把公司估值定在 $75 billion。公司未上市，因此不公开披露总现金余额或具体资产负债表指标。[CI019] [CI020]

              作为英国监管下的银行实体（2026 年 3 月之后），Revolut 必须遵守 PRA 资本充足率要求，包括 CET1（普通股一级资本）
              最低要求。银行牌照带来监管资本比率约束，限制杠杆、增加合规成本，并要求持续压力测试。2024 年 $2 billion 新股融资在一定程度上被定位为给银行实体注资，并满足 PRA 要求。[CI021]
              [CI022]

              **烧钱速度**：Revolut 已盈利且现金流为正，消除了传统初创公司的烧钱担忧。公司所称 IPO 意向（按 CEO 2026 年 4 月说法，不早于 2028
              年）说明它并不依赖近期资本市场准入。剩余的主要融资依赖来自银行牌照的监管资本、贷款扩张时的信用准备金要求，以及潜在并购资本。[CI023] [CI024]
            claimRefs: []
