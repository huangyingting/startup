      - number: '5.4'
        title: 信任、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Revolut 维持 **PCI DSS Level 1** 认证——这是支付卡处理的最高等级——覆盖所有卡交易处理基础设施。**SOC 2 Type II**
              认证验证覆盖可用性、保密性和数据处理完整性的运营安全控制，并每年续期。在英国，2026 年 3 月之后 Revolut 作为完整吸收存款银行受 PRA/FCA
              监管；在欧盟运营方面，它还持有立陶宛电子货币机构牌照（Bank of Lithuania）。[CE021] [CE022]

              **AML 和欺诈控制**历来是挑战领域：Revolut 在 2020–2022 年收到 FCA 关于 AML 报告延迟的监管警告。2023
              年之后，公司显著加大合规工程投入，包括自建专用交易监控系统（TMS），实时将 100% 交易与 OFAC、HM Treasury 和欧盟制裁名单比对。[CE023] [CE024]

              **数据隐私**合规覆盖 GDPR（欧盟和英国），Revolut 在所有受监管市场担任数据控制者；公司设有专门数据保护官（DPO）职能，并建立隐私内建的产品开发流程。生物识别 KYC 入门使用
              Onfido（身份验证合作伙伴）和自研活体检测模型，以满足 FATF 身份验证标准。2026 年 3 月银行牌照要求 Revolut 为英国客户维持最高 £85,000 的 FSCS 存款保障。[CE025]
              [CE026]

              **2025–2027 路线图优先事项**包括：完整欧盟银行牌照（超越立陶宛 EMI）；Revolut Mortgage（英国）；扩展 Revolut Credit（个人贷款）；带 AI 个性化财务辅导的
              Super-app 2.0；以及通过本地支付网络集成扩张 APAC/美国市场。APAC 扩张需要单独监管批准（MAS Singapore、RBI India、AUSTRAC
              Australia），目前处于不同阶段。[CE027] [CE028]
