    title: 投资 KPI
    subtitle: $75B 入场估值下的关键投资回报和入场指标摘要
    approximationNotes: 基准和乐观情景下的 MOIC 和 IRR 以 2028 年 IPO 退出估算。所有数字均为费用前估计，仅供示意。
