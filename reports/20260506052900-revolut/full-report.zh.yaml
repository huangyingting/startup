      - number: '3.3'
        title: 定价、功能与竞争优势
        blocks:
          - type: paragraph
            body: >
              Revolut 的**定价架构**覆盖五档，从免费（Standard）到 £3.99（Plus）、£6.99（Premium）、£14.99（Metal）和 £45/月（Ultra）；Monzo
              只有三档（免费、Plus £5、Premium £15），Wise 则是纯交易费模式。对高频旅行者和多币种用户来说，Revolut Standard 占优：它在周一到周五提供银行间外汇汇率且无月费，而 Monzo
              免费档对超过 £200/月的海外 ATM 提款收取 3%。Revolut 免费档的周末外汇附加费仍是反复被抱怨的点，也带来定价护城河被部分侵蚀的风险。[CP011] [CP014]

              **功能差异化**是 Revolut 最强的结构性护城河：没有直接竞争者能复制多币种账户（36 种货币）、加密资产交易（200+ 种资产）、股票 / ETF 投资、eSIM、旅行保险、工资预支、AI
              欺诈检测（80% 自动解决）以及 2026 年 3 月英国银行牌照下完整零售银行业务的组合。Monzo 覆盖英国银行、投资和透支，但缺少加密资产和外汇领导力。Wise
              覆盖外汇，但缺少银行、加密资产和投资。Nubank 覆盖 LatAm 的银行和投资，但缺少外汇领导力，也没有英国存在。PayPal 主导线上结账和 P2P，但没有银行、外汇或投资产品。[CP006]
              [CP007] [CP008] [CP028] [CP029]

              **客户满意度**是 Revolut 最显眼的弱点：YouGov 2025 年英国调查显示，Monzo 和 Starling 在整体满意度上高于
              Revolut，主要由账户冻结频率和客服等待时间投诉驱动。Monzo 专注更简单的英国优先产品体验，建立了更强的主账户忠诚度；Revolut 的 NPS 为 12，反映其 52.5 million
              用户中相当一部分仍把它当作副账户 / 旅行账户使用。英国银行牌照落地后，把这些用户转为主银行关系，是 Revolut 的关键增长杠杆。[CP020] [CP024]
