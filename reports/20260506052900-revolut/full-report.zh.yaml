  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与收入结构
        blocks:
          - type: paragraph
            body: >
              Revolut 的收入模型有意分散在五个产品垂直，每个垂直的变现机制不同。**卡交换费**（约占 FY2024 收入 35%，约 $1.4B）来自卡交易上的 Mastercard 和 Visa
              交换费；这条收入流经常性强、可预测，但受交换费监管约束，尤其是在欧盟，IFR 将信用卡交易交换费上限设为 0.3%、借记卡设为 0.2%。[CI001] [CI002]

              **外汇和转账费**（约 25%，约 $1.0B）捕捉 Revolut 银行间外汇汇率与给客户报价之间的价差，并收取非标准交易的显性转账费。2024 年创纪录旅行量带动了这条收入流，但随着 Wise
              和银行应用压低外汇利润率，压缩风险上升。Standard 免费档的周末外汇附加费是一项小额但反复出现的费用构成。[CI003] [CI004]

              **财富和加密资产**（约 20%，约 $800M）是 FY2024 增长最快的分部，受 2024 年加密牛市和专用加密交易所 Revolut X 上线推动，收入同比增长 298%。该分部受市场影响大；如果加密
              / 股票市场大幅下跌，会形成集中风险。[CI005] [CI006]

              **订阅**（约 12%，约 $480M）来自 Plus、Premium、Metal 和 Ultra 档，提供可预测的高利润率经常性收入。截至 FY2024，订阅渗透率约为零售客户总数的 15–20%；80%+
              免费档用户仍留下明显增购空间。[CI007] [CI008]

              **Revolut Business**（约 8%，约 $320M）到 2025 年 11 月年化收入达到 $1 billion，通过账户费、外汇利润率和支付处理变现。企业银行业务对提升 ARPU
              和切换成本具有战略重要性。[CI009] [CI010]
