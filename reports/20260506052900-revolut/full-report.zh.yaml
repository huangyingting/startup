      - number: '1.4'
        title: 规模、指标与里程碑
        blocks:
          - type: paragraph
            body: >
              Revolut 报告 FY2024（截至 2024 年 12 月 31 日）收入 $4.0 billion，较 2023 年的 $2.2 billion 同比增长 72%。税前利润 $1.4 billion（同比
              +149%），净利润 $1.0 billion（净利率
              26%），连续第四年盈利。收入多元化很突出：卡支付（$887M）、财富（$647M）、外汇（$540M）、订阅（$541M）和企业业务（$592M）都贡献了实质收入。2025 年，公司预计收入约 $6.0
              billion；仅 Revolut Business 到 2025 年 11 月年化收入就达到 $1 billion。

              客户增长异常强劲。2024 年，Revolut 新增 14.5 million 零售用户，年底达到 52.5 million（同比增长 38%）。到 2025 年 11 月，零售用户基数超过 65
              million；到 2025 年底达到 68.3 million。企业客户在 2024 年底约 490,000，到 2025 年底增至 767,000。2024 年年处理交易量达到 $1.3
              trillion，同比增长 52%。

              英国银行牌照是定义性里程碑：经过三年申请流程，Revolut 于 2024 年 7 月获得 PRA/FCA 有条件（受限）批准，进入带存款上限的「动员期」。由于监管层持续审查风险控制，动员期超过通常的 12
              个月。Revolut 于 2026 年 3 月取得完整英国银行牌照。
