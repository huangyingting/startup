      - number: '3.2'
        title: 竞争者画像与差异化
        blocks:
          - type: paragraph
            body: >
              **Nubank**（NYSE: NU，估值 $70–75B）是全球盈利能力最强的数字银行，拥有 114 million 拉美客户，FY2024 收入 $11.5 billion、年利润 $2.2
              billion。Nubank 与 Revolut 的竞争重叠在地域上有限：它主导巴西、墨西哥和哥伦比亚，但没有欧洲存在。其客户画像（较低收入、从未开户到已开户的转化）也与 Revolut
              富裕欧洲专业人士和旅行者人群明显不同。Nubank 的公开市场可比公司，为 Revolut 提供了最可信的估值基准。[CP001] [CP019]

              **Wise**（LSE: WISE，市值 £5.6B）报告 H1 FY2025 收入 £736 million，活跃客户 13.7 million，毛利率 73%。Wise 是 Revolut
              在外汇转账和多币种账户上最直接的竞争者，但范围根本更窄——没有加密资产、没有投资、没有贷款，除了国际转账外也没有零售银行业务——因此它是专门型替代品，而不是完整银行替代方案。随着竞争加剧，Wise 抽佣率从
              0.74%（FY2021）压缩到 0.64%（FY2024）。[CP002] [CP007] [CP023]

              **Monzo**（$5.9B，私营）是 Revolut 在英国最直接的竞争者，约有 12 million 英国客户和 £880 million FY2024 收入，并实现首年盈利（税前利润 £15.4
              million）。Monzo 于 2024 年增加 Monzo Investments 和工资预支功能，缩小与 Revolut 的产品差距。关键差异：Monzo 在英国主账户分群中的 NPS 明显更高（估计
              40+），而 Revolut 整体 NPS 为 12，反映 Revolut 账户冻结相关的客户服务投诉反复出现。[CP003] [CP008] [CP020]

              **Starling Bank**（$3.6B，私营）报告 FY2024 收入 £682 million、税前利润 £301 million，是英国挑战者银行中利润率最高的；但它正越来越转向 BaaS
              平台「Engine」，降低与 Revolut 的直接消费者竞争。Starling 推迟 2025 年 IPO，以继续扩大 Engine 的 B2B 收入。[CP004] [CP030]

              **N26**（$3B，私营）在 2020 年 Brexit 后被迫退出英国，并因 AML 控制缺陷继续受到 BaFin 2021 年施加的客户增长上限约束。该监管约束使 N26 对 Revolut
              核心英国和欧洲市场的竞争威胁有限。**Bunq**（估值 €2B）服务于盈利但小众、重视 ESG 的数字游民群体，客户少于 3 million。[CP005] [CP009] [CP013] [CP021]
