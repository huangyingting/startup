  - id: TR005
    title: 缓释措施与终止标准表
    columns:
      - 风险
      - 可监控触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - FCA/PRA 执法——银行牌照
        - FCA 监管函件；Consumer Duty 审查结果；FCA 新闻稿
        - 拿牌后收到 Skilled Person 审查通知或 Section 166 命令
        - 暂停估值和投资决策；寻求法律意见；评估整改范围和时间表
      - - 加密 / 财富收入崩塌
        - 每周加密收入对比 FY2024 周运行率；BTC/ETH 价格指数
        - 加密收入连续 3 个月下降 50%+，且 NII / 订阅增长无法抵消
        - 不计加密货币收入重做基准情景；评估盈亏平衡和资金需求
      - - GCP 基础设施中断 > 4 小时
        - Revolut 状态页；GCP 公开状态；客户投诉量
        - 平台不可用 > 4 小时，造成大规模客户影响并触发 FCA 通知
        - 评估多云灾备就绪度；索取 GCP SLA 条款和不可抗力条款
      - - CEO 离职公告
        - 董事会沟通；媒体报道；Companies House 董事备案
        - CEO 辞职或因健康原因休假，且未公布继任者
        - 暂停投资逻辑重估；召集董事会讨论继任安排；等待继任者 90 天表现
      - - AML 再次执法——历史期间
        - FCA 执法行动数据库；Companies House 备案；Legal Gazette
        - FCA 针对 2019–2022 年 SAR / 监控做法发布决定通知；罚款 > £50M 或新增牌照条件
        - 重大投资逻辑破裂；评估吊销牌照与仅罚款的概率；重估可能性
      - - 代理行去风险化
        - 各通道外汇转账产品可用性；客户投诉模式；Revolut 运营沟通
        - 因代理行退出，USD 或 EUR 转账通道暂停 > 7 天
        - 评估对国际转账收入（约占总收入 25%）的影响；评估替代代理行采购
      - - 信贷损失恶化（贷款）
        - Revolut 消费贷款 90 天 NPL 率；FCA RMAR 报表
        - 消费贷款 NPL 率连续 2 个季度 > 5%（行业基准两倍）
        - 重新审视信贷承保标准；在承保逻辑中降低信贷风险权重；建模拨备上调
