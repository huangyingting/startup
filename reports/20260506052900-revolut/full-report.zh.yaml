      - number: '2.2'
        title: 市场规模——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              TAM（总可用市场）：Revolut 的合并 TAM 覆盖数字银行（$96–210B）、跨境支付（$100B+ 收入池）以及财富 / 加密资产（$80B+ 费用池）。从自下而上口径看，OECD 市场约 1.4
              billion 已开户成年人，乘以每名成年人每年 $500–600 的金融服务支出，得到高端金融服务 $700B–$840B 的理论 TAM。Revolut 瞄准其市场中约 10% 的份额。

              SAM（可服务市场）：Revolut 的 SAM 主要是西欧、英国，以及其已持有或正在申请银行牌照的新兴市场通道。欧洲约有 450 million 成年人，2024 年数字银行采用率约 25–30%（2021
              年约 15%）。按支付、外汇和贷款产品的用户支出估算，欧洲数字银行收入池每年约 $30–50 billion。加上 Revolut 已持有早期牌照的美国、LATAM 和 APAC
              通道（墨西哥、哥伦比亚、新加坡、澳大利亚），SAM 扩展到约 $120–180B。

              SOM（可获取市场）：以 68.3 million 客户和 2025 年 $4 billion 收入计算，Revolut 在核心市场约捕捉了 2–5% 的 SAM。公司扩大 SOM
              的主要机制，是在新地区拿银行牌照、推动高端订阅增购并上线贷款产品。最实质的 SOM 扩张机会来自完整英国银行业务（按揭、透支、储蓄账户已从 2026 年 3 月起完整持牌）以及客户获客仍处早期的美国市场。
