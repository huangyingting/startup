  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与估值背景
        blocks:
          - type: paragraph
            body: >
              Revolut 2025 年 11 月 $75 billion 私募估值有坚实逻辑：它是全球估值最高的非上市数字银行，FY2024 收入 $4.0B（同比 +72%）、税前利润 $1.4B（35%
              利润率）、零售客户 5250 万，且刚拿到英国银行牌照。过去缺少 FSCS 存款保护，主账户转化机会被堵住；牌照打开了这条路。 [CV001] [CV002]

              **乐观情景**很直接：Revolut 是一个 15 产品金融平台（银行、投资、加密资产、保险、外汇、旅行、商业银行），拥有 5250 万客户、覆盖 40+ 市场，客户侧年增速 50%+，收入侧年增速
              72%。若到 2027 年（目标 IPO 窗口前一年）仍保持 35–40% 收入 CAGR，FY2027E 收入将达 $7–8 billion；按 15–18x 前瞻收入，2028 年 IPO 将把
              Revolut 定价在 $105–144 billion，较 $75B 入场估值有 40–90% 上行空间。 [CV003]

              **反向逻辑**同样清楚：$75B 估值纳入了大量乐观预期：(a) FCA/PRA 银行牌照落地过程中不发生重大执法事件；(b) 加密资产 / 财富收入能穿越市场周期（它在牛市年份增长 298%）；(c)
              主账户转化能够大规模兑现，而不是让 5250 万注册用户中的多数继续把 Revolut 当副账户。按 LTM 收入
              19x，投资者支付的溢价不仅买增长，也买监管、市场周期和客户质量假设；这些假设都有不小的不确定性。 [CV004] [CV005]

              **入场纪律**：2025 年 11 月 $75B 二级市场交易之前，Revolut 在 2024 年 8 月完成 $45B 新股融资——15 个月估值抬升 67%。这种私募估值快速膨胀，一部分由 FY2024
              财务表现支撑，也反映 2024 年后金融科技重估中的私募市场动能。以 $75B 入场的投资者，需要能承受近期潜在波动，波动来自银行牌照整合期、IPO 准备时间表，以及 2026–2028 年监管验证期。
              [CV006]
