      - number: '4.2'
        title: 单位经济模型与成本结构
        blocks:
          - type: paragraph
            body: >
              Revolut 估计毛利率约 65–72%，反映其收入主要由软件交付；卡处理成本、合作伙伴费用和交换费是主要收入成本。人员成本是最大的运营费用（全球 ~10,000+
              名员工），工程、合规和客户运营投入显著。[CI011] [CI012]

              **获客成本（CAC）**估计为 $20–50，显著低于传统银行 £200+ 的 CAC，主要由 65% 有机 / 转介绍获客驱动。按平均 ARPU $75 计算，客户回本周期约 6–18
              个月，视档位而定；高端档改善至 3–6 个月。按 7 年 LTV 模型和 20% 折现率估算，**客户终身价值（LTV）**为标准用户 $300–600、高端用户 $1,500–3,000。[CI013]
              [CI014]

              FY2024 在 $4.0 billion 收入上实现 $1.4 billion 税前利润，意味着 35% 税前利润率——对这个阶段的公司而言异常出色。相比之下，Monzo 税前利润率约
              1.7%，Starling 约 44%；Revolut 的轨迹显示，收入基数增速快于固定成本基础设施，利润率仍有扩张潜力。按约 10,000 名员工计算，FY2024 单名员工收入约
              $400,000，体现强运营杠杆。[CI015] [CI016]

              **净利息收入（NII）机会**：拥有 $38 billion 客户存款后，完整英国银行牌照让 Revolut 能按 Bank of England 基准利率部署这些存款。若基准利率为 4%（2026
              年初水平），存款理论 NII 可每年增加约 $500–800M（扣除资金成本和准备金要求后），完全部署后相当于 15–20% 收入增量。[CI017] [CI018]
