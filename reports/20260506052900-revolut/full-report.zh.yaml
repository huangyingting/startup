      - number: '4.4'
        title: 财务结论与尽调阻塞项
        blocks:
          - type: paragraph
            body: >
              Revolut 的财务画像处在私营金融科技公司最强梯队：收入 $4.0 billion、同比增长 72%，税前利润率 35%，并在 FY2023 和 FY2024
              已证明盈利能力，意味着财务轨迹已明显去风险。多数收入流质量不错——卡交换费和订阅具备经常性；外汇由交易驱动，但仍可预测。[CI025] [CI026]

              **关键财务风险**：第一，财富 / 加密资产收入（$800M，占总收入 20%）受市场影响，若加密 / 股票熊市，可能下滑 30–50%，形成 $240–400M 收入敞口。第二，Revolut
              不发布带标准分部披露的经审计 IFRS 或 GAAP 财务报表；所有收入结构估算都来自分析师对管理层评论和选择性披露的推导。第三，随着 Revolut Credit 和 Pay Later
              推动贷款扩张，信用损失准备会成为损益表中的重要项目；当前 NPL 比率或准备金覆盖率没有公开数据。第四，$38 billion
              存款基数带来资金集中风险：若监管行动或声誉事件触发存款流失，可能需要紧急流动性。[CI027] [CI028] [CI029]

              **尽调阻塞项**：带分部级 P&L 的完整经审计财务报表（公开不可得）、按队列年份拆分的 LTV/CAC 数据、信贷组合指标（NPL、准备金率）、银行牌照下的 NII 建模，以及管理层对 FY2025/26
              收入结构从加密资产转向更稳定收入流的指引。[CI030]
