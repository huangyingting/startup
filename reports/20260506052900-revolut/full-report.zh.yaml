  summary: >
    Revolut Group Holdings Ltd 是一家总部位于伦敦的数字银行超级应用公司，由 Nik Storonsky（CEO）和 Vlad Yatsenko（CTO）于 2015 年 7 月创立。它在 40+
    个市场提供零售活期账户、外汇、加密资产交易（200+ 种资产）、股票投资、订阅、保险，以及功能完整的中小企业银行套件（Revolut Business）。Revolut 于 2026 年 3 月从 PRA/FCA
