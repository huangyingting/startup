        - id: f3
          label: Nubank/Adyen 同业区间：19–22x
          detail: 增长调整后的同业倍数区间支持以 $75B 入场
        - id: f4
          label: FY2024 基本面：$4B 收入、$1.4B 利润
          detail: 税前利润率 35%；同比增长 72%；两者支撑 $50–80B 内在估值区间
        - id: f5
          label: 监管风险：FCA 银行牌照
          detail: 牌照获批且无附加问题；AML 历史风险仍有尾巴；消费者责任合规仍在持续
        - id: f6
          label: 有条件买入
          detail: 若监管记录稳住、主账户转化推进——在 $65–75B 买入
        - id: f7
          label: 持有 / 放弃
          detail: 若 FCA 执法落地，或加密收入下滑 >50%——等待 $45–55B 再入场
        - id: f8
          label: IPO 目标：2028 年 NASDAQ/NYSE
          detail: 基准情景：IPO 时 $75–100B；乐观情景：$110–150B；悲观情景：$40–55B
      edges:
        - from: f1
          to: f2
          label: 评估
        - from: f2
          to: f3
          label: 同业倍数检查
        - from: f2
          to: f4
          label: 基本面检查
        - from: f2
          to: f5
          label: 风险检查
        - from: f3
          to: f6
          label: 倍数合理
        - from: f4
          to: f6
          label: 基本面支持入场
        - from: f5
          to: f6
          label: 监管风险可控
        - from: f5
          to: f7
          label: 执法行动 / 负面监管
        - from: f6
          to: f8
          label: 持有至 IPO
