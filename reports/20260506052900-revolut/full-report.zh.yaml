      - number: '1.3'
        title: 融资历史、估值与投资者
        blocks:
          - type: paragraph
            body: >
              自成立以来，Revolut 已完成六轮新股融资，披露的新股资本约 $1.71B。2018 年 4 月，DST Global 领投的 $250 million Series C 使公司以 $1.7 billion
              估值跻身独角兽。2021 年 7 月，SoftBank Vision Fund 和 Tiger Global Management 领投的 $800 million Series E 又把估值推至 $33
              billion——当时是英国史上最大的私营科技融资轮。

              随后的两次老股交易确立了当前估值基准。2024 年 8 月，一笔老股交易隐含 $45 billion 估值，为员工提供流动性，也吸引了新的机构兴趣。2025 年 11 月，Revolut
              在完成第五次员工售股的同时，完成由 Coatue、Greenoaks、Dragoneer 和 Fidelity Management & Research Company 领投的 $2 billion
              新股融资，Andreessen Horowitz、Franklin Templeton、T. Rowe Price 和 NVentures（NVIDIA 的风投部门）参投。该交易把 Revolut 估值定在
              $75 billion，是欧洲私营科技公司迄今最高的隐含估值。$75 billion 数字来自老股交易定价，并非一轮新股融资。

              Revolut 尚未在集团层面举借与其规模相匹配的外部债务工具，不过其立陶宛银行子公司在监管资本规则下吸收客户存款。平台持有的客户余额在 2024 年底达到 $38 billion，同比增长
              66%，是贷款产品的关键负债和资金来源。
