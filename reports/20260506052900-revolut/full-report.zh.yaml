      - number: '6.4'
        title: 扩张经济性与集中风险
        blocks:
          - type: paragraph
            body: >
              Revolut 的**落地扩张模式**是留存和 ARPU 增长的主要机制：客户先从免费层级开始 → 使用外汇和银行卡功能 → 发现加密资产 / 投资 → 升级付费层级 →
              扩展到工资、储蓄和贷款。这个漏斗自然触发多次扩张。5250 万客户中 15–20% 从免费转付费，已经撑起订阅收入池；进一步转到
              Metal/Ultra（$150–540/year）会贡献不成比例的客户终身价值（LTV）。 [CU020] [CU021]

              **企业客户扩张**走类似路径：微型企业先为外汇开户 → 给员工增加报销卡 → 接入薪资 → 开始做资金管理。每一步都会抬高切换成本、增加年收入贡献。中端市场（100–500 名员工公司）是 Revolut
              年合同价值（ACV）最高的机会，估计每账户年收入 $5,000– 20,000。 [CU022]

              **集中风险**：零售侧集中风险低——没有单一客户贡献实质性收入。Revolut Business 侧，前 1% 企业客户（企业级、高外汇交易量）可能贡献 Business 收入的
              30–40%；失去一个大型企业外汇客户可能有实质影响，但整体业务仍分散。**地域集中**风险更实质：按客户基础，英国和 EEA 约占收入 75%；这些市场中任何针对 Revolut
              的重大监管行动，影响都会被放大。 [CU023] [CU024]

              **渠道依赖**：65% 新客户获取来自自然 / 转介绍，降低了付费营销依赖。但自然增长建立在正向口碑和品牌声誉之上。重大声誉事件（账户冻结危机、数据泄露、监管执法）可能显著压低自然获客速度；2021–2022
              年 Revolut 的 AML 报告争议就曾拖慢英国增长。 [CU025]
