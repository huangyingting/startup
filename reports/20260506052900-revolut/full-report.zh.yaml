  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户流程
        blocks:
          - type: paragraph
            body: >
              Revolut 是一款垂直整合的金融超级应用，让消费者和企业在一个应用中管理消费、储蓄、投资、货币兑换、贷款和支付。在消费者流程中，客户下载应用，在 5 分钟内完成生物识别 KYC（了解你的客户），并立即获得虚拟
              Mastercard/Visa 卡、GBP/EUR 活期账户和 36 币种多币种 Vaults。核心日常流程是：通过银行转账或 Open Banking 入金 → 刷卡消费 → 查看实时交易分析 →
              接收智能消费通知。[CE001] [CE002]

              在核心活期账户之外，Revolut 的产品目录覆盖五个垂直：**支付**（卡、银行转账、国际电汇、P2P、Open Banking）、**财富**（通过 Revolut X 交易 200+ 种加密资产、股票 /
              ETF 交易、大宗商品）、**储蓄**（利率与货币市场利率挂钩的灵活储蓄 Vaults）、**贷款**（Revolut
              Credit、先买后付、透支）以及**保险**（打包进订阅计划的旅行保险、设备保护、宠物保险）。[CE003] [CE004] [CE005]

              Revolut Business 产品面向 SME 和企业，复刻消费者应用的体验，并增加多实体管理、批量付款、团队费用卡、基于 API 的工资单集成和多币种资金管理。平台服务 767,000+ 企业客户，贡献
              $1 billion 年化收入。[CE006]
            claimRefs: []
