      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Revolut 的核心卡支付基础设施完全依赖 **Visa 和 Mastercard**
              提供卡网络接入（处理、清算、卡组织规则）。两大网络都有权因违反卡组织规则、财务不稳定或声誉事件终止金融科技公司的会员协议。Wirecard 倒闭（一家欧洲电子货币机构，其 Visa/Mastercard
              会员资格作为倒闭过程一部分被终止）是这条风险路径的参照案例。尽管 Revolut 的财务状况在任何可比阶段都明显强于 Wirecard，但支付基础设施依赖两个外部方，本身就是结构性集中。 [CR016]
              [CR017]

              **代理银行关系**：非 EEA/英国货币（USD、JPY、BRL 等）的跨境支付清算依赖 Revolut
              与大型银行的代理行关系。代理银行关系对风险很敏感：银行会定期为代理行组合去风险；若一家金融科技公司有未解决的 AML 历史或监管调查，关键代理行可能主动切断关系。失去主要 USD 或 EUR 代理行会打断
              Revolut 的国际转账产品——这是其对现有客户最具差异化的功能。 [CR018] [CR019]

              **云集中（GCP）**：如运营风险所述，单一供应商 GCP 依赖也带来商业依赖：Google 可能涨价、修改产品条款，或在极端压力场景下因合同争议限制访问。Revolut 投资 200 块 NVIDIA
              H100 GPU（自有硬件）可部分缓解 AI 工作负载风险，但不能降低核心银行业务对 GCP 的依赖。 [CR020]

              **资本市场依赖**：Revolut 的 $75B 估值来自私募市场，前提是未来仍能获得增长资本或成功 IPO。公司已盈利（FY2024 税前利润 £1.4B），并有 $38B
              客户存款提供流动性；但若后期科技金融公司资本市场关闭（如 2022 年），Revolut 为 M&A 或地域扩张融资的能力会受限。如今的盈利能力为融资风险提供了有意义的缓冲。 [CR021]
