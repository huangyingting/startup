  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              按不同产品口径看，Revolut 进入了多个相互重叠的市场。最窄口径是全球数字银行（没有实体网点的纯数字银行），多家研究机构估计其 2024 年总收入可触达市场为 $96–128 billion，2025
              年预计达到 $200–210 billion，并可能在 2033 年以 40–55% CAGR 增长到 $4+
              trillion。估算差异很大，源于定义不同：窄口径排除跨境支付和财富产品；宽口径纳入所有数字优先金融服务。

              Revolut 的核心产品覆盖：（1）零售活期账户和支付（替代传统商业街银行），（2）外汇和汇款（与 Wise、Western Union 和银行外汇柜台竞争），（3）加密资产和股票交易（与
              Coinbase、Robinhood、eToro 竞争），（4）订阅制银行服务（与高端银行账户竞争），以及（5）SME 银行服务（与 Tide、Starling Business 和传统银行 SME
              部门竞争）。多垂直布局让 Revolut 能从同一客户身上捕捉多条收入流，形成复合式超级应用价值主张。

              Revolut 的替代品包括传统银行（HSBC、Barclays、NatWest、BNP Paribas）、挑战者银行（Monzo、Starling、N26）、垂直金融科技公司（Wise 做外汇、eToro
              做交易）和加密交易所。仅跨境支付市场，2023 年交易量就超过 $156 trillion；按费用计，这是每年数千亿美元级机会。
