      - number: '8.2'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Revolut 最主要的上市可比公司是 **Nubank（NU）**——巴西数字银行，基于 $2.9B FY2023 收入约按 19x P/S 交易，在巴西、墨西哥和哥伦比亚拥有 100M+ 客户。Nubank
              的 P/S 倍数高度相关：两家公司都是高增长数字银行，产品组合多元，获客经济性强，并有新兴市场可选性。按 FY2024 收入 $4.0B 的 19x 计算，Revolut $75B 估值与 Nubank
              倍数相当；考虑到 Revolut 收入增速更高（72% vs Nubank 约 30%），该估值看起来合理，但也折让了 Nubank 更大的客户基数和更长的拉美市场深耕记录。 [CV007] [CV008]

              **Wise（WISE.L）**约按 10x P/S 交易，但它是更聚焦的外汇纯业务，收入增速较低（同比约 25%）；Wise
              较低倍数部分反映产品范围更窄、收入增速更低，不一定代表结构性金融科技折价。**Adyen**约按 22x EV/Revenue 交易——溢价来自企业支付基础设施模式、进入壁垒高、EBITDA 利润率
              40%+。Revolut 在 $4.0B 收入规模上的 35% 税前利润率，与 Adyen 的可比性高于 PayPal（18% EBITDA 利润率）或 Block（15% 毛利润率）。 [CV009]
              [CV010]

              **私募市场可比**：Stripe 最后披露估值为 $65B，对应约 $15B 收入（2023）——P/S 4.3x，显著低于 Revolut 的 19x。但 Stripe 主要是基础设施业务（支付网关、API
              优先），不是消费者银行，两者不能直接按 P/S 对比。Stripe 更有参考价值的数据点是：2021 年 Stripe 峰值估值 $95B，当时约为 36x
              P/S——说明在顺风市场中，金融科技可以拿到高溢价倍数。 [CV011] [CV012]
