chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Revolut Group Holdings Ltd（注册于英国）运营 Revolut 数字银行超级应用；该产品于 2015 年 7 月以货币兑换和预付卡服务正式商业化。Revolut 总部位于伦敦 Canary
              Wharf（2024 年从最初的 Shoreditch 办公室迁入），注册形态为私人有限公司，并在英国、欧盟（通过 Bank of
              Lithuania）以及澳大利亚、新加坡、墨西哥、哥伦比亚等越来越多国际辖区持有银行牌照或电子货币授权。截至 2026 年 5 月，Revolut 仍为私营公司，2028 年前没有已确认的 IPO 时间表。

              核心商业模式是一款金融超级应用，覆盖：（1）消费者活期账户和借记卡，（2）外汇和国际转账，（3）财富产品，包括股票交易、加密资产交易所（Revolut X）、债券、ETF
              和机器人投顾，（4）订阅档位（Standard、Plus、Premium、Metal、Ultra），贡献经常性收入，（5）面向 SME 银行和支付的 Revolut
              Business，以及（6）个人贷款、按揭等在特定市场推出的信贷产品。收入分散在卡交换费、外汇价差、订阅费、利息收入和财富交易佣金上。公司把使命表述为「让一切资金事务变简单」，并公开瞄准在 100 个国家拥有
              100 million 日活用户。
