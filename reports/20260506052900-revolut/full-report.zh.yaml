  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Revolut 于 2026 年 3 月从 PRA/FCA 取得完整英国银行牌照，从电子货币机构转为受监管银行。这是 Revolut 历史上最关键的监管里程碑——它同时解决了一个主要信任障碍（FSCS
              存款保护），也大幅抬高合规门槛。PRA 银行监管比 FCA 电子货币监管密集得多：资本充足率、流动性覆盖、信用风险框架、恢复与处置计划（RRP），以及 Consumer Duty 持续监测，都会从持牌日起适用。
              [CR001] [CR002]

              **AML/KYC 遗留风险**：Revolut 有 AML 控制薄弱的记录。2021 年，City A.M. 等媒体报道 Revolut 曾在 2019 年短暂关闭自动交易监测，以应对误报量；FCA
              要求加强监测并开展 Skilled Person Review。Revolut 称已整改所有 FCA 建议，银行牌照也意味着 FCA 基本认可，但 2019–2022
              年期间的剩余执法风险在时效期届满前不能完全排除。FCA 的 AML 执法罚则可高至不限金额罚款，严重情况下还可能暂停牌照。 [CR003] [CR004]

              **欧盟监管碎片化**：Revolut 针对 EEA 客户使用立陶宛银行牌照（Bank of Lithuania），覆盖约 40% 客户。该立陶宛银行牌照现在受 ECB SSM 全面监管（资产跨过 €30B
              门槛后，ECB 加入直接监管）。这形成双监管机构结构（PRA + ECB/Bank of Lithuania），资本与行为要求可能冲突。 [CR005]

              **加密资产与 MiCA 合规**：Revolut 的加密资产产品（支持 200+ 资产、交易和质押）必须遵守欧盟 Markets in Crypto Assets Regulation（MiCA），该法规自
              2025 年 1 月起全面生效。MiCA 对加密资产服务提供商施加新的牌照、白皮书、储备和营销限制。Revolut 已申请 CASP（Crypto-Asset Service
              Provider）授权，但任何执法行动或牌照延误都会实质损害加密资产收入流（约 FY2024 收入的 20%）。 [CR006] [CR007]

              **数据保护与 GDPR**：Revolut 是 5250 万客户金融数据的数据控制者，覆盖英国（脱欧后 ICO 框架）和欧盟（GDPR）。数据处理规模带来系统性 GDPR
              敞口；客户金融数据一旦发生重大泄露，可能触发最高 £17.5M 或全球年营业额 4%（按 FY2024 收入约 £160M）的 ICO 罚款，并叠加声誉损害和客户流失。 [CR008]
            claimRefs: []
