            body: >
              Revolut 同时具备 72% 收入增长、$1.4 billion 税前利润和 2025 年 11 月 $75 billion 老股估值，使其跻身全球财务可信度最高的大型私营金融科技公司。连续四年盈利、收入达到
              $4 billion，证明其单位经济模型可以规模化；这在高增长数字银行中并不常见。完整英国银行牌照（2026 年 3 月）放开不设上限的吸收存款和按揭 / 贷款产品，实质扩大可服务收入池。
