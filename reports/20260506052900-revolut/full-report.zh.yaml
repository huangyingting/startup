      - number: '6.2'
        title: 采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >
              Revolut 的零售客户增长曲线一直很强：2017 年约 100 万，到 2020 年 800 万、2021 年 1600 万、2022 年 2500 万、2023 年 3500 万，2024 年达到 5250
              万；自 2017 年以来 CAGR 约 70%，最近两年约 50%。 [CU008] [CU009]

              **月活用户（MAU）**未公开披露，但行业估计显示，活跃度约为总客户数的 60–70%，对应估计 MAU 为 3100–3700 万。相比之下，Wise 披露的活跃客户为 1370
              万（更纯粹的活跃用户指标），这意味着按同口径活跃使用计算，Revolut 的参与度分母可能略低。 [CU010]

              **Revolut Business 增长**尤其强：企业客户从 2020 年约 200,000 增至 2022 年 500,000，到 2025 年底超过 767,000。2025 年 11 月达到 $1
              billion 年经常性收入（ARR）里程碑，意味着每个企业客户年收入约 $1,300；微型企业（£25/月方案）与企业级客户（定制价格）之间差异很大。 [CU011] [CU012]

              **地域扩张**已经提速：Revolut 将巴西（2024）、日本（2024）和新西兰（2024）列为新上线市场，美国扩张处于软启动。每进入一个新市场，都要完成外汇 / 支付集成并拿到监管批准；想复制
              Revolut 多国模式的竞争对手，会被这些要求自然挡住。 [CU013]
