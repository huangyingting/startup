      - number: '5.3'
        title: 差异化、IP 与技术护城河
        blocks:
          - type: paragraph
            body: >
              Revolut 的主要技术差异化落在三处：**部署速度**、**AI 原生运营**和**自有数据飞轮**。约 3,000–4,000 名工程师组成的工程组织，保持着英国金融科技行业最高的功能发布频率之一，以 2
              周冲刺交付新产品功能。传统银行功能周期通常为 6–18 个月；相比之下，Revolut 能快速根据客户反馈迭代。[CE015] [CE016]

              **数据飞轮**是 Revolut 最耐久的 IP：52.5 million
              客户生成的交易、外汇、投资和行为数据，形成欺诈检测、信用评分和个性化的自有训练数据集，小型数字银行无法复制，也无法从数据供应商购买。欺诈检测模型基于该数据集训练，据报道实现行业领先的误报率，并会随着交易量增长逐月改善。[CE017]
              [CE018]

              **Revolut Open Banking API** 允许第三方开发者基于 Revolut 账户构建应用，把 Revolut 支付流嵌入外部应用。这形成了类似 Plaid 定位的开发者生态锁定。Revolut
              开发者门户公开记录了用于支付发起、账户信息和外汇的 REST APIs，并提供速率限制和沙盒环境。[CE019] [CE020]
            claimRefs: []
