      - number: '8.4'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              Revolut 的 **IPO 准备度**正在提升：CEO Nik Storonsky 2026 年 4 月确认，IPO 目标“不早于 2028 年”，优先考虑美国上市（NASDAQ 或
              NYSE）。银行牌照在多个维度都是 IPO 前提：FSCS 覆盖降低股权投资者对客户风险的担忧，Pillar 3 披露提升财务透明度，持牌后审计意见增强账户可信度。据报道，Goldman Sachs、Morgan
              Stanley 和 J.P. Morgan 已经开始为 IPO 承销建立早期关系。 [CV020] [CV021]

              **稀释与优先权悬置**：Revolut 股权结构表包括 SoftBank Vision Fund（2021 年 $800M 轮领投方，估值 $33B），该基金通常持有带清算优先权的参与型优先股。按 $75B
              估值，多数早期轮次的优先权结构都已深度价内；但投资者应确认，2021–2024 年轮次中的任何 IPO 棘轮或 MFN 条款，不会形成损害后期二级买家的优先 IPO 分配结构。 [CV022] [CV023]

              **$75B 价格的公开证据支撑**：该价格由三点支撑：(1) Coatue/Greenoaks/Dragoneer/a16z/Fidelity/NVentures
              财团按该水平完成二级交易——这是一组在公开和私募市场都有纪律的成熟跨市场投资者；(2) FY2024 财务显示 $4.0B 收入和 $1.4B 税前利润，可从基本面独立支撑 $50–80B 估值；(3)
              同业金融科技估值显示该倍数并非结构性非理性。 [CV024] [CV025]

              **建议的最终尽调问题**：(1) 银行牌照获批后的所有 FCA/PRA 往来函件；(2) FY2024 审计账目（约 2026 年 8 月起可通过 Companies House 获取）；(3) Q1 2026
              管理账目，显示银行牌照后的收入结构；(4) Consumer Duty 落地计划与时间表；(5) CCO 出具的 AML 合规证明；(6) 股权结构表和优先权堆叠细节；(7) GCP 合同条款和灾备计划；(8)
              消费贷款 NPL 数据（1–12 个月账本）；(9) 加密资产 CASP 授权申请状态；(10) CFO/CCO 留任承诺和股权头寸。 [CV026]
