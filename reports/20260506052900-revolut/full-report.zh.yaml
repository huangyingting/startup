      - number: '7.2'
        title: 运营、技术与安全风险
        blocks:
          - type: paragraph
            body: >
              Revolut 的所有主要服务都跑在 Google Cloud Platform（GCP）上——核心银行账本、支付处理、欺诈检测、面向客户应用。这种**单一云依赖**构成集中风险：一旦发生 GCP
              可用性事件（无论是 Revolut 特定配置错误，还是 GCP 大范围区域宕机），整个平台都会离线。Revolut 过去出现过周期性宕机，看起来与 GCP 基础设施事件相关。部分金融科技同行采用本地部署 +
              云的混合模式；Revolut 的云原生架构更省成本、速度更快，但牺牲了韧性多样性。 [CR009] [CR010]

              **AI 驱动欺诈检测——误报风险**：Revolut 的自动账户冻结系统依赖用交易模式训练的 ML
              模型。这些模型会产生误报：合法客户被标记、账户被冻结。悖论在于，降低误报能改善客户体验，但可能让真实欺诈更容易漏过。Which? UK 和 Trustpilot 的证据显示，这是最主要的客户体验负面因素。进入
              PRA 银行监管后，问题又有了监管维度：新的英国 Consumer Duty 要求机构防止可预见伤害，无正当理由的账户冻结若造成财务困难，可能构成 Consumer Duty 违规。 [CR011]
              [CR012]

              **网络安全风险**：作为一家处理 $38 billion 客户存款、每日交易量达数十亿的银行，Revolut 是国家级和犯罪网络攻击的高价值目标。2022 年 9 月数据泄露（50,000
              名客户的邮箱地址和部分卡数据被泄露）证明 Revolut 的防御并非牢不可破。若客户金融凭证、账户凭证或核心银行数据发生重大泄露，可能同时触发 ICO 执法、FCA 监管行动、大规模客户流失和诉讼。
              [CR013] [CR014]

              **运营规模风险**：Revolut 两年内员工数从 5,000 增至 10,000+。快速扩员带来运营风险：35 个国家办公室控制措施落地不一致、知识传递不足、合规文化被稀释。FCA
              在银行牌照评估过程中专门将文化列为风险因素；持牌后若监管认定运营控制不足，在监管关注度已经升高的背景下，伤害会被放大。 [CR015]
