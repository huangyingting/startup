  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图概览
        blocks:
          - type: paragraph
            body: >
              Revolut
              的竞争横跨五类对手。**直接数字银行同业**（Monzo、Starling、N26、Bunq）在欧洲市场争夺零售存款、活期账户和日常银行使用。**拉美规模型数字银行**（Nubank）拥有全球最大的数字银行客户基数，但与
              Revolut 的地域重叠很少。**外汇和转账专门机构**（Wise）在 Revolut
              最初、也是最高频的使用场景——国际汇款——上竞争，模式透明且低成本。**相邻支付在位者**（PayPal/Venmo）争夺线上结账和点对点支付流。**传统银行在位者**（Barclays、HSBC、Lloyds、Santander）仍占据英国活期账户市场多数份额，但在
              35 岁以下客群中正输给数字银行。[CP001] [CP002] [CP003] [CP004]

              一个关键结构性动态是**多账户并用常态**：约 35% 的英国数字银行客户同时持有多个数字银行账户 [CP022]，这意味着各竞争者的客户数指标不能相互排斥地理解。Revolut 的 52.5 million
              客户中有相当一部分也持有 Monzo 账户，因此由工资直入体现的主账户地位，才是真正战场。大型科技公司的威胁已明显退潮：Apple 于 2025 年 1 月宣布逐步结束 Apple Card（Goldman
              Sachs 合作）和 Apple Savings；The Economist 于 2025 年 2 月认为，大型科技系统性冲击银行业的风险已显著下降。[CP017] [CP034]
            claimRefs: []
