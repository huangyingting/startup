      - number: '5.2'
        title: 技术架构与工程栈
        blocks:
          - type: paragraph
            body: >
              Revolut 核心平台是完全运行在 Google Cloud Platform（GCP）上的**微服务架构**。每个产品域（支付、加密资产、外汇、卡、贷款）都作为独立微服务集群运行，并拥有自己的
              PostgreSQL 数据库，从而降低故障影响面并支持独立部署。服务之间通过 Apache Kafka 事件流处理异步操作，通过 gRPC/REST 处理同步调用。后端主要使用 Kotlin 和 Java（JVM
              生态），Python 用于数据科学 / ML 工作流。[CE007] [CE008] [CE009]

              **移动应用**采用 React Native 构建，实现跨平台 iOS/Android 交付；共享 JavaScript/TypeScript 代码库让功能能快速发布到两个平台。Web 银行使用
              React。Revolut 每天处理约 15+ million 笔交易，需要在 SEPA、SWIFT、Faster Payments 和 BACS 等支付网络上满足亚秒级延迟。Kubernetes 在多个 GCP
              区域提供容器编排，支撑 99.9%+ 可用性 SLA。[CE010] [CE011]

              **AI 和机器学习**是一阶工程投入：Revolut 在自有 AI 计算集群中运行 200 块 NVIDIA H100 GPU，训练定制欺诈检测模型、信用评分模型以及 Revolut AI 助手（通过 GCP
              合作接入 Gemini LLM）。AI 助手无需人工升级即可处理 80% 的客户支持咨询，估计把单次联系支持成本降低 60–70%。欺诈检测模型实时处理每笔卡交易，在毫秒内标记可疑模式。[CE012]
              [CE013]

              **支付基础设施**连接全球支付网络：国际电汇使用 SWIFT，欧元支付使用 SEPA/SEPA Instant，英国使用 Faster Payments 和 BACS（英国直接扣款），还接入 Open
              Banking APIs（英国 PSD2）以及 40+ 个国家的本地支付方案合作网络。Revolut 的银行牌照允许其直接访问 Bank of England 结算账户，减少中介银行层。[CE014]
            claimRefs: []
