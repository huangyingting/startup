callouts:
  - calloutType: strength
    title: Multi-Vertical TAM Creates Compounding ARPU Growth
    body: >
      Revolut's ability to expand from a single FX tool into a multi-vertical financial super-app (banking, wealth,
      crypto, SME) dramatically increases revenue per customer. The 298% wealth revenue growth in FY2024 demonstrates
      that the platform can extract materially higher ARPU from the same user base as new product adoption occurs. The
      full UK banking licence unlocks further ARPU growth via net interest income, mortgages, and overdrafts — products
      with high unit economics in a high-rate environment.
    claimRefs:
      - CM016
      - CM017
      - CM018
  - calloutType: risk
    title: Primary Bank Status Gap Limits Long-Term Revenue Ceiling
    body: >
      Revolut remains a secondary bank for the majority of its 68 million customers — meaning most users do not direct
      salary deposits to Revolut, limiting average balance per customer. Traditional bank switching rates in the UK are
      only 10–15% annually, and incumbents retain primary banking relationships through salary payments, mortgages, and
      direct debit inertia. Until Revolut wins meaningful primary bank status, its deposit base and net interest income
      potential will remain structurally below that of incumbent peers.
    claimRefs:
      - CM019
      - CM020
      - CM025
