localEvidence:
  researchQuestions:
    - id: QP001
      question: >-
        What are Nubank's FY2024 revenue, profit, and customer count per SEC 20-F filing, and how do they compare to
        Revolut?
      type: quantification
      targets:
        - plannedTables/competitor-profile-table
        - contentRequirements/1
      status: answered
    - id: QP002
      question: What is Wise's H1 FY2025 revenue, active customer count, and gross margin from LSE interim results?
      type: quantification
      targets:
        - plannedTables/competitor-profile-table
        - contentRequirements/1
      status: answered
    - id: QP003
      question: What does Monzo's FY2024 Companies House filing show for revenue, profit, and customer count?
      type: quantification
      targets:
        - plannedTables/competitor-profile-table
        - contentRequirements/1
      status: answered
    - id: QP004
      question: >-
        What features does Revolut offer that Monzo, Wise, and N26 do not, and which features are unique to those
        competitors?
      type: comparison
      targets:
        - plannedTables/feature-capability-matrix
        - contentRequirements/3
      status: answered
    - id: QP005
      question: >-
        How does Revolut's 5-tier subscription pricing structure compare to Monzo, N26, and Bunq monthly plan costs in
        2025?
      type: comparison
      targets:
        - plannedTables/pricing-packaging-comparison
        - contentRequirements/3
      status: answered
    - id: QP006
