  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Audited segment-level P&L by revenue stream for FY2024
      missingEvidence: >-
        Revolut's Companies House filing does not include audited segment-level revenue breakdown; all stream estimates
        are analyst-derived from management commentary.
      whyItMatters: >-
        Revenue quality and margin by stream cannot be independently verified; this is a material diligence gap
        affecting the reliability of all stream-level estimates.
      diligencePath: >-
        Request full audited financial statements with segment note; obtain Companies House FY2024 filing once published
        (expected Q3–Q4 2025).
      relatedQuestionRefs:
        - RQ402
        - RQ419
    - type: missing-source
      severity: material
      topic: Credit portfolio metrics — NPLs, provision coverage, and loan book size for Revolut Credit/BNPL
      missingEvidence: >-
