company:
  name: Revolut
  website: https://revolut.com
chapter:
  number: 4
  title: Financial Analysis
  summary: >
    Revolut reported FY2024 revenue of $4.0 billion (+72% YoY), pre-tax profit of $1.4 billion (~35% margin), and net
    profit of approximately $1.1 billion — its second consecutive profitable year. Revenue is diversified across card
    interchange (~35%), FX/transfers (~25%), wealth/crypto (~20%), subscriptions (~12%), and business banking (~8%).
    ARPU is approximately $75/year blended, with premium-tier customers generating $150–300/year. The $38 billion
    deposit base gained from the March 2026 UK banking licence represents a material NII opportunity. Key financial
    risks include crypto-driven revenue volatility, credit loss exposure on expanded lending, and the concentration of
    wealth revenue in market-sensitive trading volumes.
sections:
  - id: s1
    title: Revenue Model and Revenue Mix
    body: >
      Revolut's revenue model is deliberately diversified across five product verticals, each with distinct monetization
      mechanics. **Card interchange** (~35% of FY2024 revenue, ~$1.4B) is generated through Mastercard and Visa
      interchange fees on card transactions; this stream is recurring and predictable but subject to interchange
      regulation, particularly in the EU where the IFR caps interchange at 0.3% for credit and 0.2% for debit
      transactions. [C106] [C107]

      **FX and transfer fees** (~25%, ~$1.0B) capture the spread between Revolut's interbank FX rate and the rate
      offered to customers, plus explicit transfer fees for non-standard transactions. This stream benefited from record
      travel volumes in 2024 but faces compression risk as Wise and bank apps reduce FX margins. The weekend FX
      surcharge on the Standard free tier is a small but recurring fee component. [C108] [C109]

      **Wealth and crypto** (~20%, ~$800M) was the fastest-growing segment in FY2024, with 298% YoY revenue growth
      driven by the 2024 crypto bull market and the launch of Revolut X, a dedicated crypto exchange. This segment is
      market-sensitive and represents a concentration risk if crypto/equity markets decline materially. [C110] [C111]

      **Subscriptions** (~12%, ~$480M) from Plus, Premium, Metal, and Ultra tiers provide predictable recurring revenue
      with high margins. Subscription penetration was approximately 15–20% of total retail customers as of FY2024, with
      significant upsell headroom among the 80%+ free-tier user base. [C112] [C113]

      **Revolut Business** (~8%, ~$320M) reached $1 billion in annualised revenue by November 2025, monetized through
      account fees, FX margins, and payment processing. Business banking is strategically important for improving ARPU
      and switching costs. [C114] [C115]
  - id: s2
    title: Unit Economics and Cost Structure
    body: >
      Revolut's estimated gross margin of approximately 65–72% reflects its predominantly software-delivered revenue
      model with card processing costs, partner fees, and interchange charges as primary costs of revenue. Personnel
      costs are the largest operating expense (~10,000+ employees globally), with significant investment in engineering,
      compliance, and customer operations. [C116] [C117]

      **Customer acquisition cost** is estimated at $20–50, substantially below traditional bank CAC of £200+, driven by
      65% organic/referral acquisition. Customer payback period for average ARPU of $75 is approximately 6–18 months
      depending on tier, improving to 3–6 months for premium tiers. **Lifetime value** per customer is estimated at
      $300–600 for standard users and $1,500–3,000 for premium users using a 7-year LTV model at 20% discount rate.
      [C118] [C119]

      FY2024 pre-tax profit of $1.4 billion on $4.0 billion revenue implies a 35% pre-tax margin — exceptional for a
      company of this stage. This contrasts with Monzo's ~1.7% pre-tax margin and Starling's ~44% margin; Revolut's
      trajectory suggests margin expansion potential as the revenue base grows faster than fixed cost infrastructure.
      Revenue per employee reached approximately $400,000 in FY2024 with ~10,000 employees, reflecting strong
      operational leverage. [C120] [C121]

      **Net interest income (NII) opportunity**: With $38 billion in customer deposits, a full UK banking licence
      enables Revolut to deploy these deposits at the Bank of England base rate. At a 4% base rate (prevailing early
      2026), the theoretical NII from deposits could add ~$500–800M annually (net of funding costs and reserve
      requirements), representing a 15–20% revenue uplift once fully deployed. [C122] [C123]
  - id: s3
    title: Capital Structure and Financing
    body: >
      Revolut has raised approximately $1.8–2.0 billion in total equity financing since founding in 2015, with the most
      recent round being a $2 billion primary capital raise in August 2024 as part of the broader $45B secondary
      transaction, followed by another funding event valuing the company at $75 billion in November 2025. The company
      does not publicly disclose total cash on hand or specific balance sheet metrics, as it is not publicly listed.
      [C124] [C125]

      As a UK-regulated banking entity (post March 2026), Revolut must comply with PRA capital adequacy requirements,
      including CET1 (Common Equity Tier 1) minimums. The banking licence imposes regulatory capital ratios that
      constrain leverage, increase compliance costs, and require ongoing stress testing. The $2 billion primary raise in
      2024 was partly positioned to capitalize the banking entity and meet PRA requirements. [C126] [C127]

      **Burn rate**: Revolut is profitable and cash-flow positive, eliminating traditional startup burn concerns. The
      company's stated IPO intention (no earlier than 2028 per CEO April 2026) suggests it is not dependent on near-term
      capital markets access. The primary remaining financing dependency is regulatory capital for the banking licence,
      credit reserve requirements as lending scales, and potential acquisition capital. [C128] [C129]
  - id: s4
    title: Financial Verdict and Diligence Blockers
    body: >
      Revolut's financial profile is among the strongest in private fintech: $4.0 billion revenue growing 72% YoY, 35%
      pre-tax margin, and demonstrated profitability in FY2023 and FY2024 represent a fundamentally de-risked financial
      trajectory. Revenue quality is good across most streams — card interchange and subscriptions are recurring; FX is
      transaction-driven but predictable. [C130] [C131]

      **Key financial risks**: First, wealth/crypto revenue ($800M, 20% of total) is market-sensitive and could fall
      30–50% in a crypto/equity bear market, creating a $240–400M revenue exposure. Second, Revolut does not publish
      audited IFRS or GAAP financials with standard segment disclosures; all revenue mix estimates are analyst-derived
      from management commentary and selective disclosures. Third, as lending scales via Revolut Credit and Pay Later,
      credit loss provisions will become a material income statement item; no public data exists on current NPL ratios
      or provision coverage. Fourth, the $38 billion deposit base creates funding concentration risk: a deposit run
      triggered by regulatory action or reputational event could require emergency liquidity. [C132] [C133] [C134]

      **Diligence blockers**: Full audited financial statements with segment-level P&L (not available publicly), LTV/CAC
      data by cohort year, credit portfolio metrics (NPLs, provision rates), NII modelling for the banking licence, and
      management's guidance on FY2025/26 revenue mix shift from crypto toward more stable income streams. [C135]
