      - number: '7.2'
        title: 运营、欺诈和商户账户风险仍是核心
        blocks:
          - type: paragraph
            body: >-
              从运营上看，Stripe 很强，但并非无懈可击。公开文档支持严肃的安全和欺诈姿态：PCI Level 1 状态、公开 SOC 3 报告、详细 Radar
              控制和开放状态页都有帮助。但同一套文档也明确残余风险。商户仍需对许多争议或欺诈付款负责；当 Stripe 认为欺诈风险上升时，可以暂停访问；Services Agreement
              赋予公司围绕准备金、抵销和账户行动的广泛权利。对一个高风险支付平台而言，这些条款在商业上可以理解，但也是客户投诉的底层土壤。BBB
              记录显示，围绕资金扣留和账户暂停存在反复公开投诉，多年投诉数量很大。这不能证明系统性失败，但显示由合同驱动的风险管理可能制造商户痛点、声誉损害和支持负担。实际风险不只是欺诈损失或宕机，而是风险控制、准备金实践和商户感知的组合。
            claimRefs:
              - CR015
              - CR016
              - CR017
              - CR018
              - CR019
