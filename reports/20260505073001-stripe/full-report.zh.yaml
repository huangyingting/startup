      - number: '8.2'
        title: 可比框架和情景逻辑
        blocks:
          - type: paragraph
            body: >-
              可比公司集合要求价格纪律。Stripe 的 $159 billion 要约估值高于 PayPal 和 Adyen 的公开股权价值，但远低于 Visa 和 Mastercard。如果投资者把 Stripe
              看成比增长较慢的商户处理商更具结构价值、但仍远小于且弱于全球卡组织的资产，这个位置方向上说得通。挑战在于，要约标记估值也嵌入稀缺性、私人市场供给动态和员工流动性观感。因此，在三角定位 Stripe
              需要怎样的收入基础和利润率轮廓才能支撑当前估值时，PayPal、Visa、Block、Fiserv、Global Payments 和 Adyen 的公开文件，比私人快照服务本身更有用。可比结论不是 Stripe
              明显定价过高；而是当前标记估值已经假设 Stripe 应该相对公开处理商获得实质溢价。只有当软件组合、盈利质量和流动性治理折价仍然有利时，这个溢价才站得住。
