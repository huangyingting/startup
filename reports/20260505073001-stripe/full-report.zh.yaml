      - number: '5.3'
        title: 信任、控制、路线图信号和技术依赖
        blocks:
          - type: paragraph
            body: >-
              Stripe 的信任姿态公开展示充分，但仍部分经由营销中介。安全文档支持 PCI Level 1 定位、安全和隐私工具、Terminal 认证，以及更广的开发者控制表面。Radar
              增加了一个有意义的技术和数据网络声明：跨支付、账户滥用和争议的统一欺诈控制，训练在一个大型网络之上。Terminal 显示，Stripe 的产品野心已超出浏览器结账，进入读卡器、离线支付、MOTO
              流程，以及多国钱包支持。路线图信号也强。Stripe 关于智能体工作流的开发者博客显示，AI 商务定位不只是高管品牌叙事；公司正在发布实施指引，并把表面积扩展到面向智能体的支付。依赖地图仍然重要。Stripe
              依赖网络、本地支付方式、合规工作流、云与事件基础设施，以及商户侧实施质量。公开来源支持高质量产品姿态，但不是零风险姿态。正确的产品技术底线是：Stripe
              公开可见的工程系统看起来凝聚、成熟，并且异常深入地分发到开发者工作流中。剩余未知都在接口边界之后——内部账本架构、硬可靠性目标、云集中度，以及服务如此广泛产品表面的真实运营成本。因此，产品质量应给高分，技术尽调仍需要更深的基础设施证据。对投资委员会而言，这意味着产品质量应给高分，但基础设施尽调仍需在可靠性、云依赖和账本
              / 清结算内部机制上取得更深证据。公开记录支持对 Stripe
              暴露给建设者的内容有信心，但还不足以确认这些表面之下每一个隐藏基础设施依赖。这就是投资者剩下的技术尽调任务。平台故事很强，但基础设施审计线索仍不完整。在当前私人估值下承销之前，深度基础设施尽调仍不可少。投资者应记住这个区分。隐藏基础设施细节仍是最后的尽调前沿。
