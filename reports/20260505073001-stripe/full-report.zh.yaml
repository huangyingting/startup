  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争集合：Stripe 很宽，但并非处处位置最好
        blocks:
          - type: paragraph
            body: >-
              Stripe 的竞争地图按商户问题切分，而不是按简单份额排名切分。大型企业商户重视直接收单、全渠道广度和经审计公开披露时，Adyen 和 Worldpay 仍然强大。Checkout.com
              是面向数字原生全球商户的最近私人同业，这类商户想要可配置 API 和本地收单。PayPal 与 Venmo 结账组合影响转化经济性时，Braintree 仍有意义；Square 则主导许多 SMB
              和线下工作流。关键含义是，Stripe 面对的不是单一对手；买方是企业零售商、软件平台、快速移动的初创公司，还是线下占比较高的商户，对手类别都会不同。这种分层反而支持 Stripe
              的定位，因为在开发者体验、产品捆绑和快速上线最重要的地方，它仍显得最强。但这也意味着，不能仅凭 Stripe 在互联网原生团队中的品牌强度，就假设它能拿下全球企业份额。
