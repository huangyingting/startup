  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Stripe 的正面案例直接且有力。公开证据支撑巨大规模、全年盈利回归、有意义的软件和自动化挂载，以及在 AI 商务和稳定币上持续产品创新。客户基础具备战略性，产品表面很难快速复制，2025 到 2026
              年私人市场重新定价反映的是真实信心，而不只是叙事动量。反向逻辑同样清楚。Stripe
              仍按私人要约回购定价，而不是按完整公开市场纪律定价；最重要的承销变量——经审计收入结构、毛利率、集中度、营运资本和治理条款——仍只部分可见。高质量公司并不自动等于好入场价。因此，从公司层面看，Stripe
              是基本面有吸引力的投资；但在当前价格层面，判断仍必须对证据敏感。
