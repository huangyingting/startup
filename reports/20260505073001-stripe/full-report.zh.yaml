  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品表面和工作流定义
        blocks:
          - type: paragraph
            body: >-
              Stripe 的公开产品定义比支付更宽，也比泛泛的金融科技品牌更清晰。公司保留的产品和文档表面显示，一个以结账和资金流转为中心的栈，已延伸到 Billing、开票、平台、欺诈、线下收单，以及更新的 AI
              商务工作流。广度重要，因为客户工作流并不只是卡授权。Stripe
              越来越想拥有从发起结账到确认支付、订阅逻辑、税务与开票、出款编排、欺诈控制，再到下游财务运营的完整路径。最强证据来自第一方文档本身：Payments 覆盖超过 100 种支付方式和广泛国家覆盖，Billing
              覆盖定价和基于用量的变现逻辑，Connect 覆盖入驻、能力、出款和平台经济性。这是真正的产品平台，不只是套在收单上的 API
              包装层。尽调限制在于，内部账本和清结算架构仍大多未披露，所以公开证据对工作流广度的信心高于对后端系统设计的信心。
