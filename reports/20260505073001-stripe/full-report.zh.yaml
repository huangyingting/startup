  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管和法律风险是第一类结构性风险
        blocks:
          - type: paragraph
            body: >-
              Stripe 最持久的风险是监管和法律风险，而不是纯技术风险。支付业务在监管机构、卡组织和金融机构不断变化的规则中运营，Stripe 自己的文档也如此表述。保留的监管材料显示多重实时压力。在美国，CFPB
              的个人金融数据权利规则扩大了围绕金融数据访问的开放银行和同意义务。在欧洲，PSD3 和拟议 PSR 将重置支付服务要求；同时，UK APP 欺诈预期和报销保护正在提高运营标准。Stripe 自己的 Connect
              要求更新也显示，与 FCA 和 Central Bank of Ireland 预期相关的整改工作在 2026 年仍在进行。March 2026 FTC
              关于据称取消银行服务做法的警告信，又增加了一条独立的消费者保护和政治审查路径。单独看，任何一项都不会打破投资逻辑；放在一起，它们说明监管工作负荷是结构性的，不是阶段性的。投资者应预期围绕商户准入决策，会有反复出现的合规成本、整改工作和声誉敞口。
