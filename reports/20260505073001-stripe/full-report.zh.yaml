  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型：处理核心加上软件和平台挂载
        blocks:
          - type: paragraph
            body: >-
              把 Stripe 看成混合的支付加软件模式，而不是纯处理商，最能解释它的财务故事。公开证据支持三层变现。第一层是超大规模核心支付处理和相关收单经济性。第二层是通过 Billing、Revenue
              和财务自动化表面实现的软件与工作流变现。第三层是通过 Connect 实现的平台资金流转和市场平台变现。公司在 2025 年度更新中称 Revenue 套件有望在 2026 年达到 $1 billion
              运行率，使这种组合具体了许多。Billing 和 Connect 定价页进一步说明，软件和平台变现是明确设计，不只是商户收单的副作用。这很重要，因为 Stripe
              估值的乐观情景依赖软件挂载带来的利润率扩张。弱点在于，公开材料仍没有给出干净的分部拆分、确认收入桥，或薄处理经济性与高价值软件收入之间的毛利率拆分。
