      - number: '3.2'
        title: 定价、打包，以及公开费率表何时有用、何时无用
        blocks:
          - type: paragraph
            body: >-
              公开定价页展示了各家打包方式的差异。Stripe 的标价对自助商户和平台仍容易理解，而 Connect 增加了明确的平台经济性构造，例如按账户收费、出款费和收入分成选项。Adyen 更偏企业式
              interchange++ 结构，Checkout.com 强调定制交易，Braintree 发布偏钱包的定价，Square 明确优化 SMB 和线下简单性。这些差异重要，因为定价部分反映了销售动作。Stripe
              的打包对产品驱动采用和平台建设者相对更强；商户想要定制化收单经济性时，Adyen 和 Checkout.com 更强；买方看重简单商户服务包时，Square
              胜出。证据也支持一个判断：只看费率表不是好的决策规则。独立比较来源强调欺诈工具、合规、钱包组合和集成深度都是重要购买驱动因素，这也解释了为什么即使表面费率相近，切换成本仍可能很高。
