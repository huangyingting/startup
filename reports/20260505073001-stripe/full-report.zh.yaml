      - number: '3.3'
        title: 耐久性、切换成本和竞争下行
        blocks:
          - type: paragraph
            body: >-
              Stripe 的护城河真实存在，但有条件。最强的耐久性信号来自集成深度、Connect 带来的平台嵌入、Billing
              带来的软件增购，以及欺诈和出款工作流的运营粘性。独立开发者和比较来源进一步说明，一旦代码、财务运营和商户工作流围绕某套支付基础设施搭好，再拆掉并不容易。与此同时，公开证据也指向真实侵蚀路径。大型商户越来越多地做多
              PSP 路由，Adyen 和 Checkout.com 等企业同业持续投入本地覆盖和定制经济性，PayPal、Block、Worldpay、Fiserv 等在位者保留庞大装机基础或渠道权力。因此，Stripe
              最强的地方在于，它能在价格竞争商品化核心处理能力之前，持续复合产品广度和工程师亲和力。尽调问题不是 Stripe
              是否有护城河，而是护城河扩宽速度是否足以抵消企业客户成熟度和商户议价能力上升。这个框架导向一个实际尽调立场：应按市场、按工作流比较
              Stripe，而不是把它加冕为普遍领导者。它在开发者主导的互联网基础设施中显得最强；凡是本地收单深度、全渠道外勤销售或钱包原生消费者信任主导采购决策的地方，它较弱。高质量竞争章节因此支持一个耐久但并非无懈可击的护城河。竞争尽调应聚焦大型商户路由行为、Connect
              留存，以及软件挂载是否比价格压力降低切换成本更快地抬高切换成本。这个细微差别重要，因为未来份额会由定价塑造，而不只是品牌。后续尽调应关注按商户规模划分的胜率、Connect 留存，以及成熟客户在采用多 PSP
              路由时多常不会显著降低 Stripe 在客户钱包中的份额。这些是判断 Stripe
              正在加深护城河，还是仅仅参与广泛支付繁荣的最清晰经验检验。竞争记分牌最重要的就是这个。切换行为证据最关键。竞争耐久性仍必须随时间做经验测量。
