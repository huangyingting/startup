      - number: '6.3'
        title: 耐久性、集中度和反向客户证据
        blocks:
          - type: paragraph
            body: >-
              客户质量强，但并非单一维度。正面信号包括 Substack 的保存卡行为、Anthropic 和 Manus 对 Link 的采用，以及企业客户的大型迁移或定价调整成功。这类运营结果比 logo
              本身更重要。但公开记录也有谨慎信号。评论来源显示支持体验不一和账户摩擦投诉，Trustpilot 则明显反向。BuiltWith
              等广泛技术追踪来源和评论聚合器，是判断已安装基础广度和产品采用的有用方向性证据，但无法解决收入集中度、NRR、GRR 或合同耐久性。因而，Stripe
              看起来是一家在具名部署层面拥有高质量客户证据、在生态层面拥有显著广度的公司，但在集中度和队列耐久性上仍缺少足够公开披露。投资者应把客户证据评为强，再把最终确信留给私人留存和集中度数据。完整投资观点应奖励
              Stripe 异常强的公开客户证据，同时拒绝夸大公开材料对续约质量和集中度能说明的内容。公司最好的证据既深且新，尤其集中在企业软件和 AI
              变现；但最弱证据恰好落在承销纪律最重要的地方：队列耐久性、头部客户敞口，以及支持或准备金摩擦如何影响客户终身价值。因此，客户章节为正面，但仍取决于私人尽调。这也是客户章节强化整体投资逻辑、同时仍留下最后建议门槛之一的原因：私人留存和集中度数据。公开客户证据足以支撑对采用质量的信念，但不足以回答承销中每一个重要的留存或集中度问题。最后一步需要私人数据。这个缺口仍然重要。
