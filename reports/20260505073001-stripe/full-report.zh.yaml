chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、平台边界，以及 Stripe 如今如何定义自己
        blocks:
          - type: paragraph
            body: >-
              Stripe
              已不再像单一产品的支付网关。它在关于页面、年度信和文档里，把自己定义成企业金融基础设施：帮助企业收款、提供资金流转，并运营可编程收入流程。这个定位重要，因为公司正在销售一套捆绑栈：支付、Billing、平台出款、Atlas、欺诈控制，以及更新的
              AI 商务和稳定币工具，都放在同一个控制平面下。公司自有公开页面确实支撑了这种广度。Payments 文档和产品页展示了线上与线下收单能力，2025 年度更新则把叙事推进到 AI
              界面、智能体商务和可编程资金流转。结果是一个以支付为分发核心、以软件和工作流工具讲述利润率扩张故事的商业模式。尽调保留项在于，最强的运营叙事仍来自 Stripe
              自己的信，而不是经审计、逐项拆分的公开报告；因此，投资者可以把产品广度视为证据充分，但盈利结构仍只被部分披露。
