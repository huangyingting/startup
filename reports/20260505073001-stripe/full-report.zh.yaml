      - number: '4.3'
        title: 单位经济性，以及真正承销信心的阻塞点
        blocks:
          - type: paragraph
            body: >-
              关键承销阻塞点仍是单位经济性。公开来源清楚说明，支付业务需要巨大规模，因为交易利润率很薄；独立报道也反复把 Stripe 的估值框定为对软件组合和持久盈利能力的押注，而不是纯处理价差。Fiserv 和
              Global Payments 的可比文件有用，因为它们展示了成熟处理商可以变得多大、多服务化，同时仍赚取不同于软件倍数的经济性。如果软件挂载、自动化收入和产品深度确实以足够快的速度复合，Stripe
              也许应得溢价；但公开证据基础尚未揭示按产品线划分的毛利率、商户集中度、净抽成率、欺诈损失敞口，或有多少资本被绑在准备金和营运资本里。因此，财务结论对规模和轨迹为正面，但对价格敏感承销仍不完整。换句话说，财务案例方向上很有吸引力，但还差一个尽调包，才能完全承销。公开证据支持一个品质优良、有真实盈利能力且软件扩张显著的业务，却没有完全回答这种质量在上市公司式的利润率、资本强度、客户集中度和准备金义务审视下能保留多少。这也是后续估值判断必须对证据敏感，而不能机械看多的原因。在披露出现之前，财务章节支持对质量和规模有信心，但不足以对精确的正常化盈利能力或当前私人标记估值下的公允价值有充分信心。私人尽调仍需补上这个缺口，承销才能高置信。尤其是，投资者需要产品级利润率、集中度和资产负债表细节，而不只是收入规模增长。没有这些细节，公允价值只能划定区间，不能钉死。缺失的精度是最后一个主要财务障碍。价格纪律应反映这一点。
