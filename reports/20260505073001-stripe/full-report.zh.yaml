      - number: '1.3'
        title: 规模、里程碑顺序，以及后续必须带入的反向标记
        blocks:
          - type: paragraph
            body: >-
              Stripe 的公开增长声明在 2024 和 2025 年度更新周期之间明显变强。公司称 2024 年总交易量达到 $1.4 trillion，2025 年达到 $1.9 trillion，后者约等于全球 GDP
              的 1.6%。公司还称 Revenue 套件有望在 2026 年达到 $1 billion 运行率，2025 年加入的新公司数量超过此前任何一年，国际新业务占比继续上升。客户品牌证据仍偏自上而下，尚未完整列举，但
              Stripe 也声称在 Fortune 100、Nasdaq 100、Forbes AI 50 和通过 Atlas 注册的 Delaware 公司中有深度渗透。2025-2026
              年新增的最大里程碑更多是战略性的，而不只是交易性的：Bridge 扩张、智能体商务发布、OpenAI 和 Microsoft
              商务合作，以及稳定币交易量放大。主要反向保留项不是生存性问题，而是证据问题。许多最强规模指标仍停留在公司撰写的页面上，所以后续章节应区分已被佐证的平台重要性，以及仍未解决的审计财务和治理细节。基于公开证据，可以发表的结论是：Stripe
              已从精英初创公司跨入机构级私人基础设施，但仍没有上市公司的治理透明度。这个缺口重要，因为估值、领导层深度和监管准备度如今至少与增长速度同等重要。投资者应把这里的时间线作为后续章节的基准，等到直接尽调材料可得之前，不要在员工数、股权结构表条款或确切总部机制上制造虚假精确。公开尽调下一步应聚焦董事会结构、要约回购机制和经审计经济性，而不是
              Stripe 是否已经具备相关性。相关性已经清楚；承销精度还不够。剩余尽调工作关乎精度，而不是合法性。公开市场投资者也会问同样的问题。
