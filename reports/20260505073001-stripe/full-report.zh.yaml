      - number: '4.2'
        title: 规模、盈利能力和资本充足信号
        blocks:
          - type: paragraph
            body: >-
              Stripe 的规模披露现在已足以支持方向性承销。公司称 2025 年平台上企业产生 $1.9 trillion 交易量，较 2024 年增长 34%，并称自己在 2025
              年保持稳健盈利。分析师和交易导向来源补上了一部分图景。Sacra 估计 2025 年净收入约 $6.9 billion，EBITDA 约 $1.2 billion；PM Insights
              指向类似但略低的收入轨迹。这些数字未经审计，但为平台交易量、盈利能力和 2026
              年估值快速反弹之间提供了一个合理桥梁。资本充足性看起来也强于典型私人金融科技公司，因为反复要约回购暗示资产负债表信心和投资者支持，而不是即时融资压力。即便如此，公开记录仍没有现金余额、月度烧钱速度、现金跑道、债务工具或契约细节。投资者可以得出
              Stripe 并不明显受资本约束的结论，但不能把资产负债表强度视为已经充分尽调。
