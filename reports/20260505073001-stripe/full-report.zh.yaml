      - number: '2.2'
        title: 规模测算视角、买方，以及有利于 Stripe 的驱动因素
        blocks:
          - type: paragraph
            body: >-
              即使没有干净的 Stripe 专属可服务市场（SAM），公开规模数据也支撑一个极大的机会。Worldpay 显示数字支付支出将从 2024 年的 $18.7 trillion 增至 2030 年的 $33.5
              trillion。BCG 另行把 2024 年支付收入框定在 $1.9 trillion，并预计到 2029 年超过 $2.4 trillion；这个口径有用，因为 Stripe
              变现的是大型交易流中的很薄一层，而不是交易流本身。买方地图也有利于 Stripe 的模式。真正的预算所有者往往是软件、电商或平台团队，他们需要快速实施、跨境覆盖、经常性
              Billing、欺诈工具和多方出款，而不仅是便宜收单。Capgemini 和 Houlihan Lokey 的材料进一步说明，即时支付、开放金融和无卡交易增长正在重塑商户和银行优先级。Stripe
              的优势在于，复杂性本身就是购买理由的地方。全球商户、市场平台、SaaS 公司和 AI 原生初创公司，更可能看重一个可编程层，把支付方式多样性和收入运营放进同一栈里处理。
