  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界：不是所有支付交易量都能被 Stripe 捕获
        blocks:
          - type: paragraph
            body: >-
              给 Stripe 划定市场，最可辩护的起点是数字支付基础设施，而不是全球所有商业交易。Stripe
              的经济敞口来自线上结账、Billing、平台出款、跨境收单，以及不断扩大的软件中介资金流。它对每一美元银行卡网络交易额、每一条银行拥有的企业资金管理轨道，或每一个由本地处理商和银行轨道主导的国内支付市场，并没有同等敞口。公开市场数据支持这个区分。Worldpay
              的长期数据集显示，电商和销售点的数字支付金额大幅上升；BCG 则把全球支付收入框定为一个比原始交易金额更小、增速更慢的变现池。差异很关键，因为 Stripe
              能从复杂性中受益，而不只是从规模中受益。钱包扩散、本地支付方式碎片化和软件平台分发，都会提升编排层价值。但同样的迁移也可能压缩抽成率，如果更多交易量转向非卡或受监管轨道。因此，正确边界是软件中介的数字支付及相关收入工具，而不是整个全球支付宇宙。
