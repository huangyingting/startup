      - number: '2.3'
        title: 约束、矛盾，以及仍重要的市场问题
        blocks:
          - type: paragraph
            body: >-
              正面的市场叙事不能简化成“支付很大”。多份保留来源都指向真实约束。BCG 预计 2024 年之后增长会放慢，意味着收入池扩张速度可能低于交易量。Worldpay 显示钱包在电商和销售点场景中继续拿份额，A2A
              轨道和即时支付也在继续普及。这些变化帮助集成商，但也可能把经济性从传统卡组织利润率结构中重新分配出去。TSG 的欧洲排名材料显示，商户收单仍高度集中且带有地区属性，凸显 Stripe
              仍在一个本地覆盖、牌照和本地银行关系都重要的市场竞争。PayPal 和 Visa 的文件也说明，成熟在位者在交易量和已安装支付凭证上仍大得多。实际含义是，Stripe
              的市场有吸引力，是因为它复杂，不是因为它没有摩擦。因此，投资者更应把 Stripe 视为支付组合变化中的软件与编排赢家，而不是在静态 TAM
              里简单抢份额的处理商。本章支持的市场投资逻辑建立在复杂性租金之上，而不是天真的 TAM 膨胀之上。如果更多商业流变成软件中介、多轨道、跨境，Stripe
              应该受益；与此同时，投资者也应预期抽成率压力、地区碎片化和监管开销会塑造利润增长斜率。未解决的尽调任务，是量化 Stripe
              未来变现有多少来自更高价值的软件和编排，而不是低利润率交易过手。正确的市场结论是：Stripe
              在商户想要编排而非只要原始处理时最受益。这个区分应支配后续估值和产品风险分析。市场结构有吸引力，但运营复杂。它奖励执行，而不是口号。
