  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层和采用广度
        blocks:
          - type: paragraph
            body: >-
              Stripe 的客户基础覆盖企业软件、创作者平台、AI 原生初创公司和一般互联网企业，很广；但公开证据在拆成子分层后最强，而不是把它当成一面单一 logo 墙。公司关于市场渗透的声明有意义：据称 Fortune
              100 的一半、Forbes Cloud 100 的大多数，以及 Forbes AI 50 的大部分都使用 Stripe。Billing
              专属声明也重要，因为它们显示已安装基础中的产品广度，而不只是结账份额。Stripe 称超过 300,000 家公司使用 Billing，并管理近 200 million 个活跃订阅。这说明客户证据不只局限于表层
              TPV。买方地图因分层而变。企业常通过财务和支付团队采购 Stripe；SaaS 和 AI
              公司常通过产品和工程采购；平台则通过运营和风险团队采购。这种多样性是优势，但也意味着没有一个单一留存或满意度指标能代表整个客户基础。
