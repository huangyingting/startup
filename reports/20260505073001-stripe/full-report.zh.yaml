      - number: '1.2'
        title: 创始人、控制权背景和资本市场信号
        blocks:
          - type: paragraph
            body: >-
              Stripe 仍与 Patrick and John Collison 紧密绑定，公开证据也仍指向一种由创始人塑形的运营模式，尽管公司已扩张成最大型的私人金融科技公司之一。2024
              年以来的资本市场叙事尤其重要。Stripe 在 February 2025 的流动性事件把公司估值重置到 $91.5 billion，随后 February 2026 的要约回购在仅十二个月后把标记估值抬到
              $159 billion。现任和前任员工都是 2026 年要约回购的明确受益者；即使没有公开董事会材料或股权结构表披露，这仍是有意义的治理和留才信号。反复要约回购也充当 IPO
              压力阀：管理层可以提供流动性，而无需承担公开市场报告纪律。战略上这很有用，但也意味着投资者仍看不到关于优先权、稀释和二级定价机制的完整审计图景。资本市场传递的信息是正面的——稀缺价值和投资者需求显然已经回归——但不能等同于上市公司透明度。
