      - number: '8.3'
        title: 建议、价格敏感性，以及什么会改变结论
        blocks:
          - type: paragraph
            body: >-
              在当前公开证据水平下，正确建议是观察，而不是买入。Stripe 几乎肯定是市场上最强的私人金融科技 / 基础设施资产之一，产品或客户质量上也没有明显投资逻辑破裂点。但投资者不需要更多证据证明 Stripe
              很好；他们需要更多证据证明当前价格有足够支撑。公开记录仍在经审计经济性、股权结构表结构、集中度，以及溢价有多少来自真实软件经济性、多少来自私人市场稀缺性上留下太多不确定性。更好的入场价、经审计分部财务，或明确证据表明软件
              / 自动化收入正在支撑高利润率，都会显著改善结论。在那之前，Stripe 值得密切跟踪，也很可能值得积极尽调，但不能仅凭公开证据发表买入建议。这样形成的是建设性但有纪律的投资姿态。Stripe
              好到未来可能支持买入案例，尤其在审计财务确认其巨大处理规模之上有持久的软件与自动化利润率层之后。但 report-v2
              判断本来就应对证据敏感，而当前证据还没有缩短对资产的欣赏与在当前价格下注的确信之间的距离。因此，观察是诚实的结论。现在举证责任落在经审计经济性和治理细节上，而不是证明 Stripe
              重要。公司显然重要；剩下的问题是，这个入场价是否给新资本留下足够上行。这就是价格纪律在本案中仍如此重要的原因。披露更充分或价格更便宜，会比又一轮泛泛公司赞美更快改变建议。宁可错过部分上行，也不要在证据不完整时支付满价。有纪律的投资者可以欣赏公司，同时等待更干净的证明或更宽的安全边际。这个标准适用于当前价格。溢价只有凭证据才能坐实。
