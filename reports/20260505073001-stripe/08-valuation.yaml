        - Revenue by product, gross margin, EBITDA, cash
        - Core requirement for valuation underwriting
        - Finance DD / auditor package
      - - Cap-table and tender terms
        - Preferences, liquidity mechanics, company-funded repurchase size
        - Clarifies downside protection and governance discount
        - Legal + capital markets DD
      - - Merchant concentration and retention
        - Top-customer exposure, NRR / GRR, renewal behavior
        - Determines durability of scale and bargaining power
        - Go-to-market / finance DD
      - - Regulatory roadmap
        - CFPB / EU / UK remediation plans and resourcing
        - Needed to assess forward compliance cost and execution
        - Compliance / legal DD
      - - Software attach economics
        - Billing / Revenue / Connect gross margin and attach rates
        - Determines whether Stripe deserves a processor-plus-software premium
        - Product-finance DD
    notes: These are the minimum diligence items required to upgrade from track to buy.
