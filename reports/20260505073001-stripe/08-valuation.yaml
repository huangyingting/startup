  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to thesis
      - Action implication
    rows:
      - - Audited economics materially below expectation
        - Revenue mix or margins show thin-processor economics
        - Undermines premium valuation case
        - Move from track to avoid at current price.
      - - Regulatory enforcement or major compliance remediation
        - Formal action by a top regulator
        - Raises cost, slows expansion, harms trust
        - Re-rate risk and valuation downward.
      - - Customer concentration or churn revealed
        - Top-customer dependency or weak cohort retention
        - Challenges durability thesis
        - Demand lower price or pass.
      - - Tender / secondary market weakness
        - Next liquidity event clears materially below current mark
        - Signals fading scarcity premium
        - Re-anchor comp set lower.
      - - Operational trust failure
        - Major outage, reserves controversy, or support deterioration
        - Weakens customer-quality premium
        - Pause investment until remediation proven.
    notes: Kill triggers define what evidence would actually move the committee decision.
