chapter:
  number: 1
  title: Company Overview
  summary: >-
    Stripe is a scaled private financial-infrastructure platform whose public record now supports renewed hyper-scale
    growth, profitability, and a sharp private-market rerating, but still leaves key governance and audited-financial
    questions unresolved.
sections:
  - id: section-1
    title: Identity, platform scope, and what Stripe says it is now
    body: >-
      Stripe no longer reads as a single-product payment gateway. Across its About page, annual letters, and
      documentation, the company presents itself as financial infrastructure for businesses that want to accept
      payments, offer money movement, and run programmable revenue operations. That framing matters because the company
      is increasingly selling a bundled stack: payments, billing, platform payouts, Atlas, fraud controls, and newer
      AI-commerce and stablecoin tools all sit under one control plane. Public company-owned surfaces support genuine
      breadth here. The Payments documentation and product pages show online and in-person acceptance, while the 2025
      annual update expands the narrative toward AI interfaces, agentic commerce, and programmable money movement. The
      result is a business model with payments as the distribution core but software and workflow tooling as the
      margin-expansion story. The diligence caveat is that the strongest operating framing still comes from Stripe’s own
      letters rather than audited, line-item public reporting, so investors should treat product breadth as well
      supported but profitability mix as only partially disclosed.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
  - id: section-2
    title: Founders, control context, and capital-market signals
    body: >-
      Stripe remains closely identified with Patrick and John Collison, and the public evidence still points to a
      founder-shaped operating model even as the company has scaled into one of the largest private fintechs. The
      capital-market story since 2024 is especially important. Stripe’s February 2025 liquidity event reset the
      company’s value to $91.5 billion, then the February 2026 tender lifted that mark to $159 billion in only twelve
      months. Current and former employees were explicit beneficiaries of the 2026 tender, which is a meaningful
      governance and retention signal even without a public board packet or cap-table disclosure. Those repeated tenders
      also function as an IPO pressure valve: management can provide liquidity without taking on public-market reporting
      discipline. That is strategically useful, but it also means investors still lack a full audited picture of
      preferences, dilution, and secondary pricing mechanics. The capital message is positive—scarcity value and
      investor demand clearly returned—but not equivalent to public-company transparency.
    claimRefs:
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
      - CO024
  - id: section-3
    title: Scale, milestone sequence, and adverse markers to carry forward
    body: >-
      Stripe’s public growth claims became materially stronger between the 2024 and 2025 annual-update cycles. The
      company said total volume reached $1.4 trillion in 2024 and then $1.9 trillion in 2025, with the latter framed as
      roughly 1.6% of global GDP. It also said the Revenue suite was on track for a $1 billion run rate in 2026, that
      more new companies joined in 2025 than in any prior year, and that international new-business mix continued to
      rise. Customer-brand proof remains top-down rather than fully enumerated, but Stripe also claims deep penetration
      among the Fortune 100, Nasdaq 100, Forbes AI 50, and Delaware incorporations via Atlas. The biggest milestone
      additions in 2025-2026 were strategic rather than purely transactional: Bridge expansion, agentic-commerce
      launches, OpenAI and Microsoft commerce tie-ins, and stablecoin volume scaling. The main adverse caveat is
      evidentiary rather than existential. Many of these strongest scale metrics still sit on company-authored surfaces,
      so later chapters should distinguish corroborated platform importance from unresolved audited-financial and
      governance detail. A publishable conclusion from public evidence is therefore that Stripe has crossed from elite
      startup into institution-scale private infrastructure, but still without the governance transparency of a public
      company. That gap matters because valuation, leadership depth, and regulatory readiness now matter at least as
      much as growth speed. Investors should preserve the chronology here as canonical for later chapters and resist
      creating false precision on headcount, cap-table terms, or exact headquarters mechanics until direct diligence
      materials are available. Public diligence should therefore focus next on board structure, tender mechanics, and
      audited economics rather than on whether Stripe has achieved relevance. Relevance is clear; underwriting precision
      is not. The remaining diligence work is therefore about precision, not legitimacy. Public investors would ask the
      same questions.
    claimRefs:
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
      - CO031
      - CO032
      - CO033
      - CO034
      - CO035
