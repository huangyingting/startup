  evidenceGaps:
    - type: missing-source
      severity: material
      topic: retention and concentration metrics
      missingEvidence: No retained public source discloses Stripe-wide NRR, GRR, gross churn, or top-customer concentration.
      whyItMatters: These metrics are necessary to judge durability of the installed base and bargaining-power risk.
      diligencePath: Request cohort retention by segment, top-20 customer exposure, and renewal data.
    - type: enumeration-incomplete
      severity: minor
      topic: named customer proof table completeness
      missingEvidence: The retained named-customer list is selective rather than exhaustive.
      whyItMatters: A fuller deployment set would improve understanding of concentration and segment balance.
      diligencePath: Request current top-reference-customer list by segment and product.
      relatedTableRefs:
        - T603
