  - id: T705
    title: Mitigation and kill criteria table
    columns:
      - Risk
      - Monitorable trigger
      - Threshold / event
      - Action implication
    rows:
      - - Regulatory escalation
        - Named enforcement or material remediation order
        - Any formal action by CFPB / EU / FCA tied to Stripe operations
        - Move to downside case and re-price compliance cost.
      - - Merchant trust deterioration
        - Complaint or reserve-action acceleration
        - Sustained rise in public complaint velocity or adverse review pattern
        - Demand support, reserve, and appeals data before investing.
      - - Fraud-control weakness
        - Rising false positives or loss rates
        - Material increase in fraud losses or blocked-good-payment rate
        - Question moat quality and merchant retention.
      - - Execution strain
        - Additional large layoffs in core product / ops functions
        - Another broad reduction affecting engineering / ops
        - Lower confidence in roadmap and remediation execution.
      - - Operational resilience
        - Major outage or incident with prolonged duration
        - Payment disruption with significant merchant impact
        - Reassess mission-critical platform risk.
    notes: Kill criteria tie the risk chapter to investability rather than cataloguing issues in isolation.
