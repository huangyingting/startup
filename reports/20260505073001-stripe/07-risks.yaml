    - type: missing-source
      severity: material
      topic: merchant appeals and reserve outcomes
      missingEvidence: >-
        Public sources do not disclose how often Stripe reverses account holds, releases reserves, or wins merchant
        trust back after adverse risk actions.
      whyItMatters: These outcomes are central to judging whether public complaint signals are isolated or structural.
      diligencePath: Request internal reserve-action, appeal-rate, and resolution-time metrics.
