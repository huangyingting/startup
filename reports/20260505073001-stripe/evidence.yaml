evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: stakeholder or investor map completeness
    missingEvidence: >-
      Current board composition, voting-control rights, preference stack, and full cap-table are not available in
      reviewed public sources.
    whyItMatters: These terms matter for downside protection, employee-liquidity interpretation, and eventual IPO path.
    diligencePath: Request current cap-table, board roster, investor-rights agreements, and the tender-offer term sheet.
    relatedTableRefs:
      - TO002
      - TO003
    relatedQuestionRefs: []
  - type: enumeration-incomplete
    severity: minor
    topic: milestone table completeness
    missingEvidence: Private internal launches and unpublished governance events are absent from public materials.
    whyItMatters: Timeline completeness affects product and governance interpretation.
    diligencePath: Request internal corporate timeline and financing chronology.
    relatedTableRefs:
      - TO004
    relatedQuestionRefs: []
  - type: missing-source
    severity: material
    topic: stripe-specific SAM or SOM
    missingEvidence: >-
      No retained public source isolates a clean Stripe-specific SAM or SOM across payments, billing, and platform money
      movement.
    whyItMatters: Company-specific valuation depends on monetizable market slice rather than broad global-payments rhetoric.
    diligencePath: Request internal market sizing by region, rail, merchant segment, and software attach rate.
    relatedQuestionRefs: []
    relatedTableRefs: []
  - type: missing-source
    severity: material
    topic: retention and concentration metrics
    missingEvidence: No retained public source discloses Stripe-wide NRR, GRR, gross churn, or top-customer concentration.
    whyItMatters: These metrics are necessary to judge durability of the installed base and bargaining-power risk.
    diligencePath: Request cohort retention by segment, top-20 customer exposure, and renewal data.
    relatedQuestionRefs: []
    relatedTableRefs: []
  - type: enumeration-incomplete
    severity: minor
    topic: named customer proof table completeness
    missingEvidence: The retained named-customer list is selective rather than exhaustive.
    whyItMatters: A fuller deployment set would improve understanding of concentration and segment balance.
    diligencePath: Request current top-reference-customer list by segment and product.
    relatedTableRefs:
      - TU003
    relatedQuestionRefs: []
  - type: missing-source
    severity: material
    topic: merchant appeals and reserve outcomes
    missingEvidence: >-
      Public sources do not disclose how often Stripe reverses account holds, releases reserves, or wins merchant trust
      back after adverse risk actions.
    whyItMatters: These outcomes are central to judging whether public complaint signals are isolated or structural.
    diligencePath: Request internal reserve-action, appeal-rate, and resolution-time metrics.
    relatedQuestionRefs: []
    relatedTableRefs: []
