      - number: '2.3'
        title: Constraints, contradictions, and the market questions that still matter
        blocks:
          - type: paragraph
            body: >-
              The positive market narrative should not be reduced to payments is huge. Several retained sources point to
              real constraints. BCG expects growth to slow after 2024, which means revenue pools may not expand as
              quickly as transaction volumes. Worldpay shows wallets taking share across ecommerce and point of sale,
              while A2A rails and instant payments continue to gain adoption. Those shifts help integrators but can also
              reallocate economics away from traditional card-margin structures. TSG’s European ranking material shows
              how concentrated and region-specific merchant acquiring remains, underscoring that Stripe is competing in
              a market where domestic coverage, licensing, and local bank relationships still matter. PayPal and Visa
              filings also illustrate how much larger mature incumbents remain in both volume and installed payment
              credentials. The practical implication is that Stripe’s market is attractive because it is complicated,
              not because it is frictionless. Investors should therefore underwrite Stripe more as a
              software-and-orchestration winner inside a changing payments mix than as a simple share-taking processor
              against a static TAM. This chapter therefore supports a market thesis built on complexity rent rather than
              naive TAM inflation. Stripe should benefit if more commerce flows become software-mediated, multi-rail,
              and cross-border, but investors should simultaneously expect take-rate pressure, regional fragmentation,
              and regulatory overhead to shape the slope of profit growth. The unresolved diligence task is to quantify
              how much of Stripe’s future monetization comes from higher-value software and orchestration rather than
              from low-margin transaction pass-through. The correct market takeaway is that Stripe benefits most when
              merchants want orchestration, not just raw processing. That distinction should govern both valuation and
              product-risk analysis in later chapters. This is a structurally attractive but operationally complex
              market. It rewards execution, not slogans.
            claimRefs:
