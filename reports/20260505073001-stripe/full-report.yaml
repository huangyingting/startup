      - number: '1.3'
        title: Scale, milestone sequence, and adverse markers to carry forward
        blocks:
          - type: paragraph
            body: >-
              Stripe’s public growth claims became materially stronger between the 2024 and 2025 annual-update cycles.
              The company said total volume reached $1.4 trillion in 2024 and then $1.9 trillion in 2025, with the
              latter framed as roughly 1.6% of global GDP. It also said the Revenue suite was on track for a $1 billion
              run rate in 2026, that more new companies joined in 2025 than in any prior year, and that international
              new-business mix continued to rise. Customer-brand proof remains top-down rather than fully enumerated,
              but Stripe also claims deep penetration among the Fortune 100, Nasdaq 100, Forbes AI 50, and Delaware
              incorporations via Atlas. The biggest milestone additions in 2025-2026 were strategic rather than purely
              transactional: Bridge expansion, agentic-commerce launches, OpenAI and Microsoft commerce tie-ins, and
              stablecoin volume scaling. The main adverse caveat is evidentiary rather than existential. Many of these
              strongest scale metrics still sit on company-authored surfaces, so later chapters should distinguish
              corroborated platform importance from unresolved audited-financial and governance detail. A publishable
              conclusion from public evidence is therefore that Stripe has crossed from elite startup into
              institution-scale private infrastructure, but still without the governance transparency of a public
              company. That gap matters because valuation, leadership depth, and regulatory readiness now matter at
              least as much as growth speed. Investors should preserve the chronology here as canonical for later
              chapters and resist creating false precision on headcount, cap-table terms, or exact headquarters
              mechanics until direct diligence materials are available. Public diligence should therefore focus next on
              board structure, tender mechanics, and audited economics rather than on whether Stripe has achieved
              relevance. Relevance is clear; underwriting precision is not. The remaining diligence work is therefore
              about precision, not legitimacy. Public investors would ask the same questions.
