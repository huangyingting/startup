figures:
  - id: F101
    title: Company milestone timeline
    type: timeline
    layout: wide
    summary: >-
      Public Stripe milestones show a business shifting from payments infrastructure to broader programmable finance and
      AI-commerce distribution.
    data:
      items:
        - date: '2010-01-01'
          label: Founded
