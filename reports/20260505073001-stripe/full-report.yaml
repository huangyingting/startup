  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer segmentation and adoption breadth
        blocks:
          - type: paragraph
            body: >-
              Stripe’s customer base is broad across enterprise software, creator platforms, AI-native startups, and
              general internet businesses, but the public evidence is strongest when broken into sub-segments rather
              than treated as a single logo wall. Company claims about market penetration are meaningful: half of the
              Fortune 100, most of the Forbes Cloud 100, and a large majority of the Forbes AI 50 reportedly use Stripe.
              Billing-specific claims are also important because they show product breadth inside the installed base
              rather than only checkout share. Stripe says more than 300,000 companies use Billing and that it manages
              nearly 200 million active subscriptions. That suggests customer proof is not limited to top-line TPV. The
              buyer map varies by segment. Enterprises often buy Stripe through finance and payments teams; SaaS and AI
              companies often buy through product and engineering; platforms buy through operations and risk teams. That
              diversity is a strength, but it also means no single retention or satisfaction metric can speak for the
              whole customer base.
            claimRefs:
              - C175
              - C176
              - C177
              - C178
              - C179
              - C180
              - C181
              - C182
              - C183
              - C184
              - C185
              - C186
      - number: '6.2'
        title: Named deployments and what the best case studies actually prove
        blocks:
          - type: paragraph
            body: >-
              The strongest public customer proof comes from named case studies with measurable outcomes. Atlassian
              shows enterprise billing depth: it chose Stripe instead of building a billing stack internally,
              co-developed a dozen-plus features, and used Stripe to support complex enterprise needs. Substack
              demonstrates platform durability, saying it built on Stripe early and did not need to change its Connect
              onboarding code for four years. Anthropic provides particularly relevant modern proof because it used
              Stripe first for enterprise monetization and then layered more self-serve subscription tooling, with
              benefits around Data Pipeline setup speed, Link usage, and reduced false positives via custom Radar rules.
              Manus and Intercom show that Stripe still wins fast-growing AI and SaaS customers during monetization
              transitions. These examples do not prove universal retention, but they do prove that Stripe can support
              both enterprise complexity and very rapid startup monetization without being trapped in only one customer
              archetype.
            claimRefs:
              - C187
              - C188
              - C189
              - C190
              - C191
              - C192
              - C193
              - C194
              - C195
              - C196
              - C197
              - C198
      - number: '6.3'
        title: Durability, concentration, and adverse customer evidence
        blocks:
          - type: paragraph
            body: >-
              Customer quality is strong but not one-dimensional. Positive signals include saved-card behavior on
              Substack, Link adoption at Anthropic and Manus, and successful large migrations or pricing shifts at
              enterprise customers. Those are the kinds of operational outcomes that matter more than logos alone. But
              the public record also includes caution signals. Review sources show mixed support experience and
              account-friction complaints, while Trustpilot is materially adverse. Broad technology-tracking sources
              such as BuiltWith and review aggregators are useful directional evidence for installed-base breadth and
              product adoption, but they do not solve for revenue concentration, NRR, GRR, or contract durability.
              Stripe therefore looks like a company with high-quality customer proof at the named-deployment level and
              meaningful breadth at the ecosystem level, yet still insufficient public disclosure on concentration and
              cohort durability. Investors should score customer evidence as strong, then reserve final conviction for
              private retention and concentration data. A complete investment view should therefore reward Stripe for
              unusually strong public customer proof while refusing to overstate what public materials can show about
              renewal quality and concentration. The company’s best evidence is deep and modern, especially in
              enterprise software and AI monetization, but the weakest evidence is exactly where underwriting discipline
              matters most: cohort durability, top-customer exposure, and how support or reserve friction affects
              lifetime value. That keeps the customer chapter positive, but still conditional on private diligence. That
              is why the customer chapter strengthens the overall thesis while still leaving one of the final
              recommendation gates unresolved: private retention and concentration data. Public customer evidence is
              therefore good enough to support conviction in adoption quality, but not good enough to answer every
              retention or concentration question that matters for underwriting. That final step needs private data.
              That gap is still material.
