      - number: '2.2'
        title: Sizing lenses, buyers, and the drivers that favor Stripe
        blocks:
          - type: paragraph
            body: >-
              Public sizing data supports a very large opportunity even without a clean Stripe-specific SAM. Worldpay
              shows digital-payment spend rising from $18.7 trillion in 2024 toward $33.5 trillion by 2030. BCG
              separately frames payments revenue at $1.9 trillion in 2024 and more than $2.4 trillion by 2029, which is
              useful because Stripe monetizes a thin slice of large transaction flows rather than the flows themselves.
              The buyer map also favors Stripe’s model. The real budget owner is often a software, ecommerce, or
              platform team that needs fast implementation, cross-border coverage, recurring billing, fraud tooling, and
              multi-party payouts rather than just cheap acquiring. Capgemini’s and Houlihan Lokey’s material reinforces
              that instant payments, open finance, and card-not-present growth are reshaping merchant and bank
              priorities. Stripe’s advantage is strongest where complexity itself is the reason to buy. Global
              merchants, marketplaces, SaaS companies, and AI-native startups are all more likely to value a
              programmable layer that can handle method diversity and revenue operations in one stack.
            claimRefs:
              - C048
              - C049
              - C050
              - C051
              - C052
              - C053
              - C054
              - C055
              - C056
              - C057
