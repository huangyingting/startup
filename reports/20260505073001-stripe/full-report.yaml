  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: 'Market boundary: not all payment volume is Stripe addressable'
        blocks:
          - type: paragraph
            body: >-
              The most defensible market framing for Stripe starts with digital-payments infrastructure, not all global
              commerce. Stripe is economically exposed to online checkout, billing, platform payouts, cross-border
              acceptance, and an expanding set of software-mediated money flows. It is not equally exposed to every
              card-network dollar, every bank-owned corporate treasury rail, or every domestic payment market where
              local processors or bank rails dominate. Public market data supports the distinction. Worldpay’s long-run
              dataset shows digital-payment value rising dramatically across ecommerce and point of sale, while BCG
              frames global payments revenue as a smaller and slower-growing monetization pool than raw transaction
              value. That difference matters because Stripe can benefit from complexity, not just scale. Wallet
              proliferation, local method fragmentation, and software-platform distribution all expand the value of
              orchestration layers. But those same shifts can compress take rates if more volume shifts toward non-card
              or regulated rails. So the right boundary is software-mediated digital payments and related revenue
              tooling, not simply the full global payments universe.
            claimRefs:
              - C036
              - C037
              - C038
              - C039
              - C040
              - C041
