chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, platform scope, and what Stripe says it is now
        blocks:
          - type: paragraph
            body: >-
              Stripe no longer reads as a single-product payment gateway. Across its About page, annual letters, and
              documentation, the company presents itself as financial infrastructure for businesses that want to accept
              payments, offer money movement, and run programmable revenue operations. That framing matters because the
              company is increasingly selling a bundled stack: payments, billing, platform payouts, Atlas, fraud
              controls, and newer AI-commerce and stablecoin tools all sit under one control plane. Public company-owned
              surfaces support genuine breadth here. The Payments documentation and product pages show online and
              in-person acceptance, while the 2025 annual update expands the narrative toward AI interfaces, agentic
              commerce, and programmable money movement. The result is a business model with payments as the
              distribution core but software and workflow tooling as the margin-expansion story. The diligence caveat is
              that the strongest operating framing still comes from Stripe’s own letters rather than audited, line-item
              public reporting, so investors should treat product breadth as well supported but profitability mix as
              only partially disclosed.
