  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive set: Stripe is broad, but not universally best positioned'
        blocks:
          - type: paragraph
            body: >-
              Stripe’s competitive map is segmented by merchant problem rather than simple share ranking. Adyen and
              Worldpay remain formidable where large enterprise merchants value direct acquiring, omnichannel breadth,
              and audited public disclosure. Checkout.com is the closest private peer for digitally native global
              merchants that want configurable APIs and local acquiring. Braintree still matters where PayPal and Venmo
              checkout mix shapes conversion economics, while Square dominates many SMB and in-person workflows. The key
              implication is that Stripe does not face a single rival; it faces different classes of rivals depending on
              whether the buyer is an enterprise retailer, software platform, fast-moving startup, or offline-heavy
              merchant. That segmentation actually supports Stripe’s positioning because it still looks strongest where
              developer experience, product bundling, and rapid launch matter most. But it also means that global
              enterprise share cannot be assumed simply from Stripe’s brand strength among internet-native teams.
            claimRefs:
              - C071
              - C072
              - C073
              - C074
              - C075
              - C076
              - C077
              - C078
              - C079
              - C080
      - number: '3.2'
        title: Pricing, packaging, and where public fee tables do and do not matter
        blocks:
          - type: paragraph
            body: >-
              Public pricing pages show how differently the field is packaged. Stripe’s list pricing remains easy to
              understand for self-serve merchants and platforms, while Connect adds explicit platform-economics
              constructs such as per-account fees, payout fees, and revenue-share options. Adyen leans toward
              enterprise-style interchange++ structures, Checkout.com emphasizes custom deals, Braintree publishes
              wallet-heavy pricing, and Square clearly optimizes for SMB and offline simplicity. Those differences
              matter because pricing is partly a proxy for go-to-market motion. Stripe’s packaging is comparatively
              strong for product-led adoption and platform builders; Adyen and Checkout.com look stronger where
              merchants want tailored acquiring economics; Square wins where the buyer values a simple merchant-services
              bundle. The evidence also supports the view that fee tables alone are not a good decision rule.
              Independent comparison sources emphasize fraud tooling, compliance, wallet mix, and integration depth as
              material purchase drivers, which helps explain why switching costs can remain high even when headline
              rates look similar.
            claimRefs:
              - C081
              - C082
              - C083
              - C084
              - C085
              - C086
              - C087
              - C088
              - C089
              - C090
      - number: '3.3'
        title: Durability, switching costs, and competitive downside
        blocks:
          - type: paragraph
            body: >-
              Stripe’s moat is real but conditional. The strongest durability signals are integration depth, Connect-led
              platform embedding, billing-led software upsell, and the operational stickiness of fraud and payout
              workflows. Independent developer and comparison sources reinforce that payment infrastructure decisions
              are hard to unwind once code, finance ops, and merchant workflows are built around them. At the same time,
              the public evidence also points to real erosion vectors. Large merchants increasingly multi-PSP route,
              enterprise peers such as Adyen and Checkout.com keep investing in local coverage and bespoke economics,
              and incumbents like PayPal, Block, Worldpay, and Fiserv retain massive installed bases or channel power.
              Stripe therefore looks strongest where it can compound product breadth and engineering affinity before
              price competition commoditizes the core. The diligence question is less whether Stripe has a moat than
              whether that moat is widening fast enough to offset increasing enterprise sophistication and merchant
              bargaining power. That framing leads to a practical diligence stance: Stripe should be compared
              market-by-market and workflow-by-workflow, not crowned a universal leader. It appears strongest in
              developer-led internet infrastructure and weaker wherever local acquiring depth, omnichannel field sales,
              or wallet-native consumer trust dominate the purchase decision. A high-quality competitive chapter
              therefore supports a durable but not invulnerable moat. Competitive diligence should therefore concentrate
              on large-merchant routing behavior, Connect retention, and whether software attach raises switching costs
              faster than price pressure lowers them. That nuance matters because pricing, not brand alone, will shape
              future share. Future diligence should therefore focus on win rates by merchant size, Connect retention,
              and how often sophisticated customers adopt multi-PSP routing without materially reducing Stripe wallet
              share. Those are the clearest empirical tests of whether Stripe is deepening a moat or merely
              participating in a broad payments boom. That is the most important competitive scoreboard. Evidence on
              switching behavior matters most. Competitive durability still has to be measured empirically over time.
            claimRefs:
              - C091
              - C092
              - C093
              - C094
              - C095
              - C096
              - C097
              - C098
              - C099
