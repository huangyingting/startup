  founders:
    - name: Patrick Collison
      role: Co-founder / CEO
      background: Co-founder and public leader of Stripe’s product and strategy narrative.
      claimRefs: []
    - name: John Collison
      role: Co-founder / President
      background: Co-founder with deep operating and product influence across Stripe’s expansion.
      claimRefs: []
  foundingLocation: Limerick, Ireland / San Francisco formation context
  headquarters: San Francisco and Dublin
  productSummary: >-
    Stripe sells a programmable financial-infrastructure stack covering payments, billing, platforms, fraud, in-person
    acceptance, and newer AI-commerce and stablecoin workflows.
  customerFocus: Internet businesses, SaaS vendors, marketplaces, enterprises, creator platforms, and AI-native startups.
  businessModel: Transaction-linked payments revenue plus software, billing, platform, and automation monetization.
  stage: Late-stage private / tender-priced
