  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis versus anti-thesis
        blocks:
          - type: paragraph
            body: >-
              The positive case for Stripe is straightforward and powerful. Public evidence supports enormous scale, a
              return to full-year profitability, meaningful software and automation attach, and continued product
              innovation across AI commerce and stablecoins. The customer base looks strategic, the product surface is
              hard to replicate quickly, and the private-market rerating from 2025 to 2026 reflects genuine confidence
              rather than only narrative momentum. The anti-thesis is equally clear. Stripe is still priced off private
              tenders rather than full public-market discipline, and the most important underwriting variables—audited
              revenue mix, gross margin, concentration, working capital, and governance terms—remain only partially
              visible. A high-quality company is not automatically a good entry price. Stripe therefore looks like an
              investment that is fundamentally attractive at the company level but still evidence-sensitive at the
              current price level.
            claimRefs:
              - C251
              - C252
              - C253
              - C254
              - C255
              - C256
              - C257
              - C258
              - C259
              - C260
              - C261
              - C262
      - number: '8.2'
        title: Comparable framing and scenario logic
        blocks:
          - type: paragraph
            body: >-
              The comp set argues for price discipline. Stripe’s $159 billion tender mark sits above the public equity
              values of PayPal and Adyen but far below Visa and Mastercard. That is directionally sensible if investors
              see Stripe as more structurally valuable than slower-growth merchant processors but still far smaller and
              less dominant than the global card networks. The challenge is that tender marks also embed scarcity,
              private-market supply dynamics, and employee-liquidity optics. Public filings from PayPal, Visa, Block,
              Fiserv, Global Payments, and Adyen are therefore more useful than private snapshot services alone when
              triangulating what kind of revenue base and margin profile Stripe would need to justify the current mark.
              The comp conclusion is not that Stripe is obviously overpriced; it is that the current mark already
              assumes Stripe deserves a material premium to public processors. That premium is defensible only if
              software mix, profitability quality, and liquidity-governance discount remain favorable.
            claimRefs:
              - C263
              - C264
              - C265
              - C266
              - C267
              - C268
              - C269
              - C270
              - C271
              - C272
              - C273
              - C274
      - number: '8.3'
        title: Recommendation, price sensitivity, and what would change the call
        blocks:
          - type: paragraph
            body: >-
              The right recommendation at the current public-evidence level is track rather than buy. Stripe is almost
              certainly one of the strongest private fintech / infrastructure assets in the market, and there is no
              obvious thesis-break in product or customer quality. But investors do not need more proof that Stripe is
              good; they need more proof that the current price is sufficiently supported. The public record still
              leaves too much uncertainty around audited economics, cap-table structure, concentration, and how much of
              the premium is driven by true software economics versus private-market scarcity. A better entry price,
              audited segment financials, or explicit evidence that software / automation revenue is sustaining high
              margins would improve the call materially. Until then, Stripe deserves close tracking and likely
              aggressive diligence, but not a publishable buy recommendation from public evidence alone. That keeps the
              investment posture constructive but disciplined. Stripe is good enough that a buy case may eventually be
              justified, especially if audited financials confirm a durable software-and-automation margin layer on top
              of huge processing scale. But a report-v2 judgment is supposed to be evidence-sensitive, and the current
              evidence does not yet close the distance between admiration for the asset and conviction at the current
              price. Track is therefore the honest call. The burden of proof now sits with audited economics and
              governance detail, not with proving that Stripe matters. The company clearly matters; the remaining
              question is whether this entry price leaves enough upside for new capital. That is why price discipline
              still matters so much in this case. A better disclosed or cheaper entry would move the recommendation
              faster than another round of general company praise. It is better to miss some upside than to pay a full
              price on incomplete evidence. A disciplined investor can admire the company while still waiting for
              cleaner proof or a wider margin of safety. That standard is appropriate at this price. The premium is
              earned only with proof.
            claimRefs:
              - C275
              - C276
              - C277
              - C278
