  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: 'Revenue model: processing core with software and platform attach'
        blocks:
          - type: paragraph
            body: >-
              Stripe’s financial story is strongest when framed as a blended payments-and-software model rather than a
              pure processor. The public evidence supports three monetization layers. First is core payment processing
              and related acceptance economics at very large scale. Second is software and workflow monetization through
              Billing, Revenue, and finance automation surfaces. Third is platform money movement and marketplace
              monetization through Connect. The company’s 2025 annual update made that mix materially more concrete by
              saying the Revenue suite was on track for a $1 billion run rate in 2026. Billing and Connect pricing pages
              reinforce that software and platform monetization are explicit, not just merchant-acquiring side effects.
              That matters because the bull case for Stripe’s valuation relies on margin expansion through software
              attach. The weakness is that public materials still do not provide a clean segment breakout, recognized
              revenue bridge, or gross-margin split between thin processing economics and higher-value software revenue.
            claimRefs:
              - C106
              - C107
              - C108
              - C109
              - C110
              - C111
              - C112
              - C113
              - C114
              - C115
              - C116
              - C117
      - number: '4.2'
        title: Scale, profitability, and capital adequacy signals
        blocks:
          - type: paragraph
            body: >-
              Stripe’s scale disclosures are now strong enough to support directional underwriting. The company said
              businesses on the platform generated $1.9 trillion in volume in 2025, up 34% from 2024, and described
              itself as robustly profitable through 2025. Analyst and transaction-oriented sources fill in part of the
              picture. Sacra estimates net revenue around $6.9 billion in 2025 with roughly $1.2 billion of EBITDA,
              while PM Insights points to a similar but slightly lower revenue track. Those are not audited figures, but
              they provide a plausible bridge between platform volume, profitability, and the sharp 2026 valuation
              rebound. Capital adequacy also looks stronger than a typical private fintech because repeated tender
              offers imply balance-sheet confidence and investor support rather than immediate financing stress. Even
              so, the public record still does not provide cash-on-hand, monthly burn, runway, debt-facility, or
              covenant detail. Investors can conclude that Stripe is not obviously capital constrained, but they cannot
              treat balance-sheet strength as fully diligenced.
            claimRefs:
              - C118
              - C119
              - C120
              - C121
              - C122
              - C123
              - C124
              - C125
              - C126
              - C127
      - number: '4.3'
        title: Unit economics and the blockers to real underwriting confidence
        blocks:
          - type: paragraph
            body: >-
              The key underwriting blocker is still unit economics. Public sources make clear that payment businesses
              require huge scale because transaction margins are thin, and independent coverage repeatedly frames
              Stripe’s valuation as a bet on software mix and durable profitability rather than pure processing spread.
              Comparable filings from Fiserv and Global Payments are useful because they show how large and
              services-heavy mature processors can become while still earning economics that differ from software
              multiples. Stripe may deserve a premium if software attach, automation revenue, and product depth really
              are compounding fast enough, but the public evidence base does not yet reveal gross margin by product
              line, merchant concentration, net take rate, fraud-loss exposure, or the amount of capital tied up in
              reserves and working capital. The financial verdict is therefore positive on scale and trajectory, but
              incomplete for price-sensitive underwriting. In other words, the financial case is directionally
              compelling but still one diligence packet away from being fully underwritable. Public evidence supports a
              premium-quality business with real profitability and substantial software expansion, yet does not fully
              answer how much of that quality would survive public-company style scrutiny on margins, capital intensity,
              customer concentration, and reserve obligations. That is why the later valuation call has to remain
              evidence-sensitive rather than mechanically bullish. Until those disclosures exist, the financial chapter
              supports confidence in quality and scale, but not full confidence in exact normalized earnings power or
              fair value at the current private mark. Private diligence still has to close that gap before underwriting
              can be high confidence. In particular, investors need product-level margin, concentration, and
              balance-sheet detail, not just top-line volume growth. Without those details, fair value can only be
              bounded, not nailed down. That missing precision is the last major financial obstacle. Price discipline
              should reflect that.
