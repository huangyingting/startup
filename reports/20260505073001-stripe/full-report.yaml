companyProfile:
  summary: >-
    Stripe is a large private financial-infrastructure company that uses payments as its distribution core and layers
    software, platform money movement, fraud controls, and AI-commerce tooling on top. Public evidence supports very
    large transaction scale, renewed profitability, and genuine strategic relevance across internet businesses, but
    still leaves enough audited-financial and governance opacity that the investment call should remain price-sensitive.
