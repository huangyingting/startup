  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk is the first structural category
        blocks:
          - type: paragraph
            body: >-
              Stripe’s most durable risk is regulatory and legal rather than purely technical. Payments businesses
              operate inside constantly shifting rules set by regulators, card networks, and financial institutions, and
              Stripe’s own documentation says as much. The retained regulatory corpus shows multiple live pressures. In
              the U.S., the CFPB’s personal-financial-data-rights rule expands open-banking and consent obligations
              around financial data access. In Europe, PSD3 and the proposed PSR would reset payment-services
              requirements at the same time that UK APP-fraud expectations and reimbursement protections are tightening
              operational standards. Stripe’s own Connect requirements updates also show that remediation work tied to
              FCA and Central Bank of Ireland expectations remains active into 2026. The March 2026 FTC warning letter
              about alleged debanking practices adds a separate consumer-protection and political scrutiny vector. None
              of these items by itself breaks the thesis, but together they show that regulatory workload is structural,
              not episodic. Investors should expect recurring compliance cost, remediation work, and reputational
              exposure around merchant access decisions.
            claimRefs:
              - C211
              - C212
              - C213
              - C214
              - C215
              - C216
              - C217
              - C218
              - C219
              - C220
              - C221
              - C222
              - C223
              - C224
      - number: '7.2'
        title: Operational, fraud, and merchant-account risk remain central
        blocks:
          - type: paragraph
            body: >-
              Operationally, Stripe looks strong but not invulnerable. Public documentation supports a serious security
              and fraud posture: PCI Level 1 status, a public SOC 3 report, detailed Radar controls, and an open status
              page all help. But the same documentation also makes residual risk explicit. Merchants remain responsible
              for many disputed or fraudulent payments, Stripe can suspend access when it believes fraud risk is rising,
              and the Services Agreement gives the company broad rights around reserves, setoff, and account action.
              Those provisions are commercially understandable for a high-risk payments platform, but they are also the
              substrate for customer complaints. BBB records show repeated public complaints around held funds and
              account suspensions, with a large multi-year complaint count. That does not prove systemic failure, but it
              does show that contract-driven risk management can create merchant pain, reputational damage, and support
              burden. The practical risk is not only fraud losses or outages; it is the combination of risk controls,
              reserve practices, and merchant perception.
            claimRefs:
              - C225
              - C226
              - C227
              - C228
              - C229
              - C230
              - C231
              - C232
              - C233
              - C234
              - C235
              - C236
              - C237
              - C238
      - number: '7.3'
        title: Dependency, people, and thesis-break transmission paths
        blocks:
          - type: paragraph
            body: >-
              Several softer risks deserve hard attention. Stripe depends on bank rails, payment networks, cloud and
              event infrastructure, regulators, and merchant-side implementation quality. Any weakness in those
              dependencies can flow into delays, payment failures, or compliance breaches. People and execution risk are
              also live. CNBC and TechCrunch reported 300 layoffs in January 2025, concentrated in product, engineering,
              and operations, even as management still planned to grow headcount later in the year. In isolation that is
              manageable, but the specific functions affected are the exact ones that matter most for platform
              reliability, support quality, and regulatory remediation. The investment implication is that risk should
              be tracked as a transmission system, not a list. Regulatory changes can raise onboarding friction; fraud
              or reserve actions can increase complaints; support or org churn can make remediation slower; and all of
              that can feed into customer quality and valuation compression. The thesis therefore survives only if
              Stripe continues to pair product breadth with disciplined compliance and merchant-trust execution. The
              right risk posture is therefore neither panic nor complacency. Stripe’s controls are real and its risk
              tooling is more mature than that of a typical startup, but the downside pathways are also unusually direct
              because payments infrastructure sits so close to customer cash flow. A great product can still be repriced
              lower if regulation, reserve practices, support friction, or org churn begin to degrade merchant trust
              faster than the company can remediate. Investors should therefore treat risk as a live operating variable
              rather than a static appendix. Stripe can keep the thesis intact if controls and remediation continue to
              scale with product ambition. That operating discipline is the real risk-management test for Stripe over
              the next phase of growth.
            claimRefs:
              - C239
              - C240
              - C241
              - C242
              - C243
              - C244
              - C245
              - C246
              - C247
              - C248
