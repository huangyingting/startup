      - number: '1.2'
        title: Founders, control context, and capital-market signals
        blocks:
          - type: paragraph
            body: >-
              Stripe remains closely identified with Patrick and John Collison, and the public evidence still points to
              a founder-shaped operating model even as the company has scaled into one of the largest private fintechs.
              The capital-market story since 2024 is especially important. Stripe’s February 2025 liquidity event reset
              the company’s value to $91.5 billion, then the February 2026 tender lifted that mark to $159 billion in
              only twelve months. Current and former employees were explicit beneficiaries of the 2026 tender, which is
              a meaningful governance and retention signal even without a public board packet or cap-table disclosure.
              Those repeated tenders also function as an IPO pressure valve: management can provide liquidity without
              taking on public-market reporting discipline. That is strategically useful, but it also means investors
              still lack a full audited picture of preferences, dilution, and secondary pricing mechanics. The capital
              message is positive—scarcity value and investor demand clearly returned—but not equivalent to
              public-company transparency.
