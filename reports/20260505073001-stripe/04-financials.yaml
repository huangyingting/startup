  - id: TI005
    title: Public financial gaps table
    columns:
      - Missing private metric
      - Impact
      - Exact diligence path
    rows:
      - - Audited consolidated revenue by product
        - Determines whether Stripe deserves a software premium or processor multiple
        - Request audited 2024 and 2025 segment financials.
      - - Gross margin by product and rail
        - Needed to judge software attach and stablecoin economics
        - Request product-level gross profit bridge.
      - - Cash / reserves / working-capital obligations
        - Needed to assess capital adequacy and downside resilience
        - Request audited balance sheet and reserve policy.
      - - Merchant concentration and retention
        - Needed for durability and bargaining-power analysis
