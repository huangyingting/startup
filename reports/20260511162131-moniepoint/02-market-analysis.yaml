figures:
  - id: FM001
    type: pyramid
    title: Market Sizing Pyramid — Nigeria Fintech Addressable Market
    layout: standard
    summary: >-
      Three-level pyramid showing TAM (Nigeria fintech revenue market, IMARC), SAM (Moniepoint's addressed segments),
      and SOM (Moniepoint's estimated captured revenue). All revenue figures are analyst-constructed estimates due to
      absence of official Moniepoint disclosure.
    data:
      items:
        - label: TAM — Nigeria fintech revenue market (IMARC)
          value: 1310
          unit: USD million (2025)
          note: "All digital financial services: payments, credit, insurance, savings. CAGR 15.19% → $4.86B by 2034"
        - label: SAM — Nigeria payments + SME credit (Moniepoint segments)
          value: 475
          unit: USD million (2026E, midpoint of $350–$600M range)
          note: "POS merchant acquiring + business banking + SME credit; excludes telecom-led mobile money"
        - label: SOM — Moniepoint captured revenue (2026E)
          value: 200
          unit: USD million (2026E, midpoint of $100–$300M range)
          note: "Derived from ₦412T processed × blended take-rate; no official disclosure; low confidence"
    approximationNotes: >-
      All revenue estimates are analyst-constructed. Moniepoint does not disclose revenue. IMARC market definition is
      broader than Moniepoint's segments and includes insurance and savings. SOM derived from transaction volume ×
      blended take-rate assumption (0.3%). Range uncertainty is high.
    claimRefs: [CM001, CM002, CM010, CM011, CM012]

  - id: FM002
    type: range
    title: Nigeria Fintech Revenue Market — Publisher Estimate Range (2025–2026E)
    layout: standard
    summary: >-
      Range chart showing how different research firms and this report's bottom-up model size the Nigeria fintech
      revenue market in 2025-2026E, illustrating wide estimation gaps due to differing scope and methodology.
    data:
      items:
        - label: IMARC Group (2025 base)
          low: 1100
          high: 1500
          unit: USD million
          note: "IMARC base estimate $1.31B; range reflects confidence band; includes credit and insurance"
        - label: Bottom-up POS revenue pool only (this report, 2025)
          low: 400
          high: 700
          unit: USD million
          note: "CBN Q1 2025 POS ₦10.51T × 4 quarters × blended 0.3% take-rate; excludes credit income"
        - label: IMARC 2026E interpolation (this report)
          low: 1400
          high: 1650
          unit: USD million
          note: "Linear interpolation from IMARC 15.19% CAGR; extrapolated by this report from 2025 base"
        - label: Novatia TAM converted (2026E)
          low: 800
          high: 2000
          unit: USD million
          note: "Novatia $50B+ is notional volume; converted at 2-4% revenue yield — methodology uncertain; wide range"
    approximationNotes: >-
      Publishers use different market boundary definitions. IMARC includes credit, insurance, and savings; POS
      bottom-up excludes credit. Estimates cannot be directly compared without boundary alignment. The 3–5× spread
      reflects definitional variance, not factual disagreement.
    claimRefs: [CM001, CM011, CM029]

  - id: FM003
    type: matrix
    title: Buyer-Segment Matrix — Moniepoint's Addressable Market
    layout: standard
    summary: >-
      Matrix mapping Moniepoint's six product segments against buyer type, competitive intensity, and strategic
      priority, showing where Moniepoint has dominant position versus where it faces strong competition.
    data:
      columns:
        - Competitive Intensity
        - Moniepoint Strategic Priority
        - Market Size / Opportunity
        - Key Risk
      rows:
        - label: POS / Agency Banking (micro-merchant)
          values:
            - Medium — growing with single-principal rule consolidation
            - Highest — core revenue engine
            - ₦412T processed FY2025; ~80% in-person share
            - Agent churn from single-principal rule; OPay competition
        - label: SME Digital Banking
          values:
            - Low-Medium — Moniebook bundle creates differentiation
            - High — ARPU expansion; credit gateway
            - 40M+ MSMEs; underserved by traditional banks
            - SME credit NPL risk; slower enterprise sales cycle
        - label: SME Credit (MFB)
          values:
            - Low — Moniepoint's transaction data is a moat
            - High — ₦1T disbursed FY2025; large gap
            - $32.2B financing gap (IFC); structural demand
            - Rising NPLs in 33% CPI environment
        - label: B2B Gateway (Monnify)
          values:
            - High — Paystack, Flutterwave, Interswitch
            - Medium — adjacent; ₦25T FY2025
            - Large but contested; Paystack (Stripe-owned) dominates developer mindshare
            - Pricing pressure; developer trust
        - label: Personal Banking (consumer)
          values:
            - Very High — OPay (60M), PalmPay (35M), Kuda
            - Lower — launched Aug 2023; secondary to merchant
            - Large population but low ARPU; deposit competition
            - Low switching cost; aggressive subsidisation by OPay/PalmPay
        - label: International Remittance (MonieWorld)
          values:
            - High — Wise, Remitly, WorldRemit, Grey
            - Medium — UK diaspora bridgehead; strategic
            - ~$3B UK→Nigeria annually (World Bank estimate)
            - FX spread compression; regulatory compliance in UK (FCA)
    claimRefs: [CM005, CM006, CM007, CM008, CM009, CM014, CM015, CM028, CM036]

