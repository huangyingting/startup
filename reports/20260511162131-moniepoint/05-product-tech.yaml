company:
  name: Moniepoint
chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Moniepoint's product suite has evolved from a single POS terminal into a six-layer integrated platform
    spanning hardware (140,000+ active POS terminals), B2B API (Monnify, 50,000+ developers, ₦25T GPV),
    microfinance banking (₦1T+ disbursed to 70,000 SMEs), SME accounting (Moniebook, 6M+ accounts),
    UK remittance (MonieWorld), and a developer ecosystem (POS-as-a-Platform SDK). The technology stack
    runs on Google Cloud / GKE with 600+ microservices, Confluent Kafka event streaming, BigQuery ML, and
    Vertex AI — processing 600,000+ requests per minute at peak. Compliance anchors include a CBN National
    MFB licence (upgraded January 2026), PCI DSS certification, and completed ISO 20022 migration; an open
    NDPC data-protection investigation in 2025 is the primary unresolved regulatory risk.

sections:
  - id: Ech-S01
    title: Product Architecture and Module Map
    body: |
      Moniepoint operates across six distinct product layers, each purpose-built to serve Nigerian SMEs and
      developers, and tightly integrated to create cross-product lock-in.

      **Layer 1 — POS Terminal (Hardware + Software):** Moniepoint's flagship product is an Android-based
      point-of-sale terminal deployed across Nigeria's 36 states. As of FY2025, more than 140,000 terminals
      are active, collectively processing ₦412 trillion ($294 billion) in transactions — representing
      approximately 80% of Nigeria's in-person electronic payments by some analyst estimates. Terminals
      support debit card swipe, QR code, and USSD payment methods, operate in offline mode when connectivity
      drops, and complete transactions in under 5 seconds in standard conditions. Moniepoint deploys via a
      proprietary network of 1,500+ field support agents who handle installation, training, and same-day
      replacement, creating a distribution moat that no purely software-based competitor can match.

      **Layer 2 — Monnify API (B2B Payment Gateway):** Monnify is Moniepoint's developer-facing REST API
      product for online payment acceptance and disbursement. It serves 50,000+ registered developers and
      processed ₦25 trillion in gross payment volume in FY2025. The API supports bank transfers, card
      payments, USSD, and payout/disbursement; it authenticates via OAuth 2.0 and provides webhook event
      delivery, BVN/NIN identity verification, and PCI DSS-compliant card processing. SDKs are available
      for Node.js, PHP, Python, Android, and iOS. Monnify competes directly with Paystack (Stripe-owned)
      and Flutterwave in the Nigerian B2B gateway market.

      **Layer 3 — Moniepoint MFB (Microfinance Bank):** The core banking layer underpins deposits, payments,
      and a high-volume short-tenor SME lending programme. In FY2025, Moniepoint MFB disbursed over
      ₦1 trillion in credit to approximately 70,000 SME borrowers. The average loan is approximately
      ₦14.3 million, structured over 12–24 week tenors with daily automated repayment drawn from POS
      settlement. Credit scoring uses a proprietary ML model trained on six or more months of POS transaction
      history — turning Moniepoint's payment network into an underwriting data moat with no direct equivalent
      in Nigerian banking.

      **Layer 4 — Moniebook (SME Accounting SaaS):** Moniebook provides cloud-based accounting, invoicing,
      and payroll management, directly integrated with the Moniepoint business current account. Over
      6 million active business accounts have been created. The product targets the large share of Nigerian
      SMEs currently managing finances on paper or basic spreadsheets. Moniebook deepens customer lock-in by
      connecting financial management to the payment and lending products.

      **Layers 5 & 6 — International and Developer Extensions:** MonieWorld offers GBP-to-naira remittance
      for the Nigerian diaspora in the UK, launched in 2024 as Moniepoint's first product outside Nigeria.
      The POS-as-a-Platform (PaaP) SDK enables independent software vendors to deploy Android applications
      on Moniepoint's POS terminals (up to 30MB per app, built with a Kotlin SDK), creating a third-party
      developer ecosystem and additional switching cost. Sumac Kenya represents an early-stage entry into
      the Kenyan market, replicating the Nigerian payment-infrastructure model under a separate entity.
    claimRefs: [CE001, CE003, CE004, CE005, CE006, CE007, CE017, CE018, CE024, CE025, CE027, CE031, CE035, CE036]
