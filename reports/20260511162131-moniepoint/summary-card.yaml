summary:
  headline: >-
    Moniepoint is Nigeria's dominant SME payment and banking infrastructure — 14B transactions, $294B TPV, 6M+
    businesses — at a $1B valuation that implies ~1.7x revenue (compressed vs peers), but active CBN enforcement, NPL
    opacity, and no audited financials demand disciplined open-book underwriting before any new capital commitment above
    $2B pre-money.
