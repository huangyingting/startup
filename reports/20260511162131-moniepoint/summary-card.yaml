  topStrengths:
    - >-
      Dominant market position: 80%+ of Nigeria's in-person POS payments, 14B annual transactions, and ₦412T ($294B) TPV
      with no credible single competitor matching the POS + banking + credit stack simultaneously.
    - >-
      Compressed valuation: $1B post-money implies ~1.67x on $600M ARR — lowest EV/Revenue multiple among African
      fintech unicorns (Flutterwave $3B, OPay $2.75B) — creating a structural re-rating opportunity if profitability is
      verified.
    - >-
      DFI and strategic investor validation: IFC, Proparco, Swedfund (development finance), LeapFrog (ESG governance
      support), Visa (card network), and Google Africa Fund (cloud + distribution) signal multi-dimensional
      institutional confidence.
    - >-
      Revenue trajectory: 10x growth from $62.6M (2021) to $600M ARR (2025, GetLatka estimate) at claimed profitability
      — a rare combination for an African fintech at this scale.
    - >-
      National MFB licence (January 2026): Full banking licence unlocks deposit-taking, larger loan book capacity, and
      lower cost of funds, materially improving long-term unit economics.
  topRisks:
    - >-
      Active CBN enforcement: ₦1B fine (Q2 2024 KYC/AML), a ₦21B POS fraud court case as named defendant, EMAAR Ponzi
      class-action threat, and NDPC data protection investigation — all active as of May 2026 — represent the single
      most consequential risk cluster.
    - >-
      NPL opacity: ₦7B NPL book disclosed (Alerzo ₦4.38B, Shoprite ₦2.4B concentration) against ₦1T+ in FY 2025 loan
      disbursements, with no public NPL ratio or loan book aging schedule.
    - >-
      Naira devaluation: ₦415/$ (2022) → ₦1,600/$ (2026) = 74% USD compression; all revenue is naira-denominated,
      compressing USD returns and making $600M ARR estimate unreliable without FX-adjusted modelling.
    - >-
      No audited financials: Profitability claims are unverified by independent auditors; revenue and margin data remain
      non-public — a critical diligence gap for any new capital commitment.
    - >-
      Google Cloud concentration: 80%+ infrastructure on a single GCP region; no disclosed secondary cloud provider or
      disaster recovery plan.
  unresolvedGaps:
    - 'Audited financial statements (FY 2023–2025): revenue, gross margin, EBITDA, cash balance.'
    - NPL ratio, loan book aging schedule, and credit loss provisioning methodology.
    - Preference stack, liquidation waterfall, anti-dilution, and ratchet terms across all rounds.
    - CBN supervisory correspondence since Q2 2024 KYC fine; EMAAR and ₦21B litigation status.
    - UK banking licence application status and Moniepoint GB regulatory posture.
