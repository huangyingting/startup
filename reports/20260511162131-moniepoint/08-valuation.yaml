company:
  name: Moniepoint

chapter:
  number: 8
  title: Valuation
  summary: >-
    Moniepoint merits a BUY recommendation at its October 2024 Series C entry price of
    $1B+, supported by confirmed unicorn status, 412 trillion naira in 2025 transaction
    volume (~$295B), 6M+ active SME businesses, and a January 2026 national MFB licence
    upgrade. The $1B entry valuation implies approximately 5-7x analyst-estimated ARR
    of $150-200M, at the low end of African fintech comparable multiples, leaving
    meaningful upside through Pan-Africa expansion and credit product scaling. Risk rating
    is HIGH, driven by CBN regulatory enforcement (1B naira KYC/AML fine, active
    litigation), naira devaluation (~75% vs USD since 2022), undisclosed audited
    financials, and competitive pressure from OPay and Flutterwave. Bull case: $3.2B+
    at 8-10x ARR on Pan-Africa success. Base case: $1.8B at ~6x ARR. Bear case: $650M
    at 3-4x ARR if CBN restricts operations or naira devaluation accelerates. Before
    capital commitment, diligence must close on audited revenue, NPL stress-test, and
    Pan-Africa pipeline data.

sections:
  - id: isv-S01
    title: Investment Thesis and Anti-Thesis
    body: |
      Moniepoint's investment thesis rests on five interlocking pillars. First, Nigeria market
      structure: Nigeria is Africa's largest economy with a $32.2B SME finance gap (IFC/World
      Bank estimate) and only ~40% of SMEs holding formal bank accounts. Moniepoint's full-stack
      SME banking model -- POS terminals, business accounts, credit, and payroll -- addresses
      this unmet demand at scale, evidenced by 6M+ active businesses and 412 trillion naira in
      2025 payment volume. Second, network-effect moat: the 600,000+ POS terminal network creates
      a switching-cost flywheel. SMEs that process payments on Moniepoint hardware build transaction
      histories that qualify them for Moniepoint credit -- creating a data-driven lending moat that
      competitors cannot easily replicate without comparable deployment scale. Third, product
      breadth: by combining payments, banking, credit, and business management (Moniebook) in a
      single ecosystem, Moniepoint monetises more of each SME's wallet than single-product
      competitors. Fourth, IFC validation: the IFC's 2025 SME credit facility investment represents
      multilateral validation of the credit underwriting model. Fifth, regulatory upgrade: the
      January 2026 national MFB licence upgrade provides expanded lending and geographic mandate.

      The anti-thesis is substantial. Regulatory risk is not abstract: Moniepoint was fined 1B
      naira by the CBN in Q2 2024 for KYC/AML violations -- a formal enforcement action, not a
      warning. The Federal High Court joined Moniepoint in a 21B naira POS fraud case (2025),
      and EMAAR Ponzi victims have threatened class-action certification. Naira devaluation (~75%
      vs USD since 2022) structurally compresses USD returns. Audited financials have never been
      disclosed; profitability is company-asserted and unverified; NPL concentration (Alerzo
      4.38B naira, Shoprite 2.4B naira) suggests credit underwriting risk in a 30%+ inflation
      environment. OPay (last valued at $2-2.75B), Flutterwave ($3B), and PalmPay are
      well-capitalised competitors operating in the same SME payments lane. Pan-Africa expansion
      into Ethiopia, Ghana, and Kenya remains in early stages with no disclosed revenue.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007, CV008, CV009, CV010]
    tableRefs: [TV002]
    figureRefs: [FV001]

  - id: isv-S02
    title: Recommendation, Confidence, and Valuation Stance
    body: |
      Our recommendation for Moniepoint is BUY with a HIGH risk rating, reflecting a conviction
      that the $1B October 2024 Series C entry price is fair-to-attractive relative to the
      business's underlying earnings power and growth trajectory, while acknowledging that the
      risk profile is materially elevated and requires active monitoring.

      Confidence is MEDIUM-HIGH: we have high confidence in the market opportunity (Nigeria's
      SME gap is structural), high confidence in transaction volume scale (412T naira,
      multi-source corroborated), and medium confidence in revenue (analyst-estimated at
      $150-200M ARR; not formally disclosed). The main confidence limiter is the absence of
      audited financials.

      Risk rating is HIGH for four compounding reasons: (1) CBN regulatory enforcement risk --
      the existing 1B naira fine and active litigation represent forward indicators of CBN's
      willingness to act against large fintechs; (2) FX/naira risk -- naira-denominated revenue
      translates to fewer dollars at each reporting period; (3) credit/NPL risk -- the disclosed
      7B naira NPL book on a 1T+ naira lending portfolio remains opaque; (4) competition risk --
      OPay and Flutterwave have comparable capital arsenals and are fighting for the same SME
      customer base.

      Valuation stance is FAIR at $1B entry. The ARR multiple of 5-7x is in line with or at a
      slight discount to African fintech comps from comparable development stages: Flutterwave
      $3B (2022) implied ~10-15x ARR; Wave $1.7B (2021) implied ~8-12x; OPay $2B (2021) implied
      ~8-12x. An upgrade to STRONG BUY would require: (1) audited financials confirming $150M+
      ARR, (2) NPL ratio below 5% of credit book, and (3) meaningful revenue from one Pan-Africa
      market.
    claimRefs: [CV011, CV012, CV013, CV014, CV015, CV016, CV017]
    tableRefs: [TV001]
    figureRefs: [FV004]

  - id: isv-S03
    title: Financing Context, Entry Discipline, and Cap-Table Overhang
    body: |
      Moniepoint's October 2024 Series C closed at $110M in new equity, with Lightrock/LeapFrog
      Invest confirming a $200M total round including prior tranches. The round was led by
      Development Partners International (DPI) with co-investment from Google, British
      International Investment (BII), Verod-Kepple Africa Ventures, and Lightrock. Post-money
      valuation was confirmed at $1B+. Total capital raised across all rounds exceeds $240M.

      Earlier capital events: $50M Google-led round (2023), $35M Series B (2022), and pre-2022
      seed and Series A rounds totaling approximately $55M. The absence of disclosed preference
      terms or liquidation overhang is notable -- the Series C appears to be straightforward
      equity without disclosed structural features that would dilute common holders
      disproportionately. However, undisclosed preference terms remain a diligence risk.

      Entry discipline: the $1B Series C entry is appropriate if the business is performing at
      or above the $150-200M ARR analyst estimate. An investor exiting at the base-case $1.8B
      in 3-5 years achieves approximately +80% gross return before currency adjustment. After
      a 25-30% naira devaluation haircut over a 3-year hold, the USD-equivalent base case
      return is approximately +50-55%, or 15-17% IRR -- acceptable for an African fintech with
      confirmed scale and a clear expansion path. Participating in future rounds at $2B+ would
      require Pan-Africa revenue validation.
    claimRefs: [CV018, CV019, CV020, CV021, CV022, CV023]
    tableRefs: []
    figureRefs: []

  - id: isv-S04
    title: Bull, Base, and Bear Scenario Analysis
    body: |
      Bull case (20% probability): Moniepoint successfully executes Pan-Africa expansion to at
      least two markets (Ghana and Ethiopia) by FY2027, with international operations contributing
      $80-100M of a $400M+ total ARR. Credit products (working capital loans, merchant credit
      lines) deepen margin above 35% blended gross margin. At 8-10x ARR on $400M, the implied
      exit valuation is $3.2-4.0B, representing +220-300% return over 3-4 years from the $1B
      Series C entry. The key bull catalyst is the CBN national MFB licence enabling credit
      deepening in Nigeria while using the playbook internationally. The IFC's co-investment
      gives Moniepoint multilateral relationships that can accelerate regulatory approval in
      new markets.

      Base case (60% probability): Moniepoint maintains Nigeria dominance -- growing active
      businesses from 6M to 10M+ -- while international expansion delivers early but not yet
      material revenue. Total ARR reaches $300M by FY2027. At 6x ARR, the implied exit
      valuation is $1.8B, representing approximately +80% return from $1B Series C entry.
      The naira holds at current levels or depreciates no more than 20% further. CBN imposes
      incremental compliance costs but does not restrict core operations.

      Bear case (20% probability): CBN tightens MFB regulations, materially restricting
      Moniepoint's lending or agent banking operations. Naira depreciates an additional 30%+
      vs USD, compressing USD revenue by a further $60-90M. OPay and Flutterwave gain SME
      share through aggressive pricing. ARR stagnates at $175-200M. At 3-4x ARR, exit
      valuation is $525-800M, representing a -20% to -47% gross return from $1B entry.
      The 21B naira fraud litigation and EMAAR class action add legal liability risk.

      Probability-weighted expected value: 20% x $3.6B + 60% x $1.8B + 20% x $0.66B =
      approximately $1.93B, representing about +93% expected return over a 3-5 year hold.
    claimRefs: [CV024, CV025, CV026, CV027, CV028, CV029, CV030, CV031]
    tableRefs: [TV003]
    figureRefs: [FV002, FV003]

  - id: isv-S05
    title: Comparable Analysis, Exit Readiness, and Final Diligence Asks
    body: |
      The comparable set spans three categories: Nigerian/African private fintech peers, South
      African and cross-Africa challenger banks, and public emerging markets payment companies.

      Among Nigerian fintech peers, Flutterwave ($3B, 2022) is the clearest direct comparable --
      a Nigerian payments company that extended internationally with strong processing volume. OPay
      ($2-2.75B, 2021-2025) is the closest business model peer -- POS, mobile money, and SME
      services -- and implies 8-12x ARR. Both comps support a $1.5-2.5B fair value range for
      Moniepoint if it can demonstrate comparable ARR levels.

      Among African challenger banks, Wave Africa ($1.7B, 2021) serves West Africa mobile money
      with a different model (zero-fee) but overlapping geography. TymeBank ($1.5B, 2024) is the
      most recent South African digital banking mark with SME focus. Both support the $1B entry
      as reasonable.

      Among public comparables, dLocal (DLO) is the most instructive: a public emerging-markets
      payments company with $1.1B+ ARR, trading at approximately 1.1x ARR (~$1.2B market cap as
      of May 2026). The public market discount vs. private African fintech marks (8-15x) reflects
      regulatory risk, FX exposure, and lower growth rates. If Moniepoint pursued a public listing,
      a 4-6x revenue multiple is the realistic public-market expectation.

      Exit readiness: Moniepoint is not yet exit-ready for an IPO. Audited financials, two years
      of disclosed revenue trajectory, and Pan-Africa revenue proof are prerequisites for NGX,
      LSE, or Nasdaq listing. A strategic acquisition exit (Mastercard, Visa, global bank) at
      $1.5-2.5B is a viable alternative.

      The five critical diligence asks before upgrade to STRONG BUY are detailed in TV006. The
      most critical is audited FY2025 revenue; the second is an NPL stress test; the third is
      Pan-Africa regulatory status.
    claimRefs: [CV032, CV033, CV034, CV035, CV036, CV037, CV038, CV039, CV040, CV041, CV042, CV043, CV044]
    tableRefs: [TV004, TV005, TV006]
    figureRefs: []

