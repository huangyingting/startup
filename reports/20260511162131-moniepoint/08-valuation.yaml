callouts:
  - calloutType: risk
    title: "Naira Devaluation: The Silent Return Killer"
    body: >-
      Moniepoint's revenues are overwhelmingly naira-denominated. The naira has depreciated
      approximately 75% against the USD since 2022, from ~450 naira per dollar to ~1,750 naira
      per dollar. Even in the base-case scenario where Moniepoint achieves $1.8B exit valuation
      in naira terms, continued devaluation of 8% per annum over a 3-year hold would reduce
      the USD-equivalent exit by approximately 22%, converting an 80% gross return to ~55% after
      FX adjustment. Investors should budget for currency hedging costs or plan for a longer hold
      period to allow naira stabilisation. Any further CBN-driven naira float could accelerate
      this risk materially.
    claimRefs: [CV008, CV022, CV028]

  - calloutType: recommendation
    title: "BUY with Active Monitoring: Five Triggers to Track Quarterly"
    body: >-
      The BUY recommendation is conditional on active monitoring of five quarterly triggers:
      (1) CBN enforcement actions -- any new fine, restriction, or watchlist action is an
      immediate review event; (2) 21B naira fraud litigation progress -- preliminary hearing
      outcomes indicate liability exposure; (3) naira/USD exchange rate -- sustained move below
      2,000 naira per dollar activates bear-case return calculations; (4) OPay/PalmPay POS
      terminal count disclosures -- evidence of Moniepoint share declining requires base-case
      multiple compression to 4-5x; (5) Pan-Africa licence filings -- a filed Ghana or Ethiopia
      application within 12 months supports bull-case probability upgrade. Absent audited
      financials, the recommendation does not upgrade to STRONG BUY.
    claimRefs: [CV011, CV012, CV013, CV014, CV015]

