  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: "audited revenue"
      missingEvidence: "Moniepoint has never publicly disclosed audited financial statements. FY2025 revenue, gross margin, and operating profit are unverifiable from public sources. Analyst estimates ($150-200M ARR) are unaudited third-party figures."
      whyItMatters: "Without audited financials, the ARR multiple and BUY recommendation rest on third-party estimates. A material discrepancy between analyst estimates and actual revenue would change the recommendation and valuation stance."
      diligencePath: "Data room: audited FY2025 financial statements from an external auditor (KPMG, Deloitte, or PwC); failing that, signed management accounts with board attestation and external review."
      relatedQuestionRefs: [QV034]

    - type: enumeration-incomplete
      severity: material
      topic: "comparable valuation table"
      missingEvidence: "Private fintech peers PalmPay, Kuda, Carbon, FairMoney, and Interswitch do not have publicly disclosed valuation marks above $500M. OPay's 2025 mark is estimated rather than formally disclosed. Wave and TymeBank marks are stale (2021 and 2024 respectively)."
      whyItMatters: "The comparable set relies on marks ranging from 2-5 years old for four of six comparables. Post-2022 multiple compression (fintech multiples fell 50-70% globally) means effective fair multiple may be lower than peak comps suggest."
      diligencePath: "Monitor fresh funding announcements from OPay, Flutterwave, and PalmPay for updated valuation marks. Use WeeTracker, TechCabal, and PitchBook for secondary mark data as it emerges in 2026."
      relatedQuestionRefs: [QV032]
      relatedTableRefs: [TV004]

    - type: stale
      severity: material
      topic: "fintech multiple environment"
      missingEvidence: "The most recent private marks for closest peers -- OPay ($2.75B estimated, 2025) and Flutterwave ($3B disclosed, 2022) -- differ by vintage and methodology. There are no fresh 2026 fundraise marks from direct Nigerian fintech peers."
      whyItMatters: "If post-2022 multiple compression has reduced African private fintech multiples to 4-6x ARR, Moniepoint's $1B entry at ~5-7x is less attractively priced relative to the comp analysis."
      diligencePath: "Monitor OPay and Flutterwave fundraising processes. Request WeeTracker and PitchBook investor surveys on Africa fintech private mark updates."
      relatedQuestionRefs: [QV032, QV033]

    - type: missing-source
      severity: material
      topic: "POS market share"
      missingEvidence: "CBN does not publish POS terminal market share by operator. Competitive POS count for OPay and PalmPay in 2026 is not independently verified. Moniepoint's 600,000+ terminal count cannot be triangulated against total CBN-registered POS terminals."
      whyItMatters: "Moniepoint's POS moat thesis depends on terminal-installed-base leadership. Without competitor share data, the moat's durability cannot be assessed quantitatively and the base-case multiple may be overstated."
      diligencePath: "CBN NIBSS quarterly POS statistics. Operator press releases. Agent banking association disclosures. Request CBN PSSD data under public information access provisions."
      relatedQuestionRefs: [QV033]

