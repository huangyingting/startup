      - number: '4.5'
        title: 奈拉贬值与外汇敏感性
        blocks:
          - type: paragraph
            body: >
              奈拉贬值是 Moniepoint 以 USD 计价财务指标的最大单一风险。2022 到 2026 年，奈拉从约 ₦415/$1 贬至 ₦1,600/$1——按 USD 计贬值 74%。这意味着，即便
              Moniepoint 的奈拉收入大幅增长，折算成 USD 的收入和以 USD 计的估值增长会慢得多。


              具体看：如果 Moniepoint 在 2024 年按 ₦1,000/$1 汇率赚到 ₦1T 奈拉收入，折合 $1B USD。到 2026 年若汇率为 ₦1,600/$1，同样 ₦1T 只剩 $625M
              USD——业务本身没有恶化，USD 口径也会减少 37.5%。对 DPI、Visa、IFC 等 USD 计价投资者，最终回报高度取决于退出时奈拉能否稳定，还是继续贬值。


              Moniepoint 有部分自然对冲：英国子公司（Moniepoint GB / MonieWorld）产生 GBP 收入；肯尼亚业务（Sumac MFB）产生 KES
              收入。但相对尼日利亚核心业务，这些业务仍处早期，规模还不重要。


              CBN 自 2023 年起放开奈拉浮动，减少了干预造成的扭曲，但没有消除结构性贬值风险。尼日利亚的经常账户赤字、油收依赖和财政赤字，都会让奈拉持续承压。
