      - number: '8.3'
        title: 情景分析：牛市、基准与熊市
        blocks:
          - type: paragraph
            body: >
              我们以 2026 年 5 月为参照点，假设以 $1B+ Series C 估值进入，建模 5 年期三种情景。


              **牛市情景——非洲支付基础设施赢家：**

              Moniepoint 执行泛非扩张，到 FY2027 增加 3–4 个市场（通过 Sumac MFB 进入肯尼亚，另加 2 个法语西非市场）。受交易额增长（尼日利亚
              ₦600T+，再加肯尼亚和西非）、Monnify 国际扩张和 Moniebook SaaS 追加销售变现驱动，收入到 FY2027 翻倍至 $2B+。随着信用模型成熟，NPL 比率回落至 1%
              以下。Moniepoint 申请 IPO，或被战略方（Visa、Mastercard、Stripe）以 FY2027 $2B+ 收入的 3x P/S 收购 → $6B+ 估值 → 对 $1B 投资约 5–6x
              回报。5 年 IRR：约 35–40%。


              **基准情景——尼日利亚主导、M&A 退出：**

              Moniepoint 守住尼日利亚领导地位，并实现温和非洲扩张。通过自然交易额增长和 Monnify 规模化，收入到 FY2027 增至 $1.5B。NPL 稳定在 1.5–2%。公司被战略方或 DFI 以
              $1.5B 收入的 2x P/S 收购 → $3B 估值 → 约 3x 回报。5 年 IRR：约 20–25%。


              **熊市情景——NPL 激增和 CBN 逆风：**

              随着信贷簿增长，NPL 比率跃升至 5%+；CBN 限制 POS 代理点扩张，并收紧交换费上限。NPL 拨备压缩利润率，收入增长停在 $700M。奈拉进一步贬至 ₦2,000/$，按美元计收入较当前水平下降
              30%。退出估值保持在 $1B（1x 收入）→ 美元口径约 1x 回报，扣除汇率侵蚀后实际约 0.7x。5 年 IRR：约 0–5%。


              三种情景的概率权重（受数据缺口影响，主观判断）约为：牛市 20%、基准 50%、熊市 30%——得到约 2x–2.5x 的预期回报。对于一个处在独角兽阶段、位于高风险市场且流动性不足的私有
              fintech，这一回报足够但并不突出。
