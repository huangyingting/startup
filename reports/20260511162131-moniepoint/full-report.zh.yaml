      - number: '7.4'
        title: 合作伙伴、依赖与财务风险
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的财务风险集中在信用贷款簿的 NPL 集中、奈拉贬值带来的 FX/宏观暴露、潜在 MDR 上限压缩，以及可能中断运营或推高成本的合作伙伴依赖。


              **NPL 集中：** 已披露的 ₦7B NPL 贷款簿高度集中于两名借款人。Alerzo（一家 B2B 商业公司）在 ₦5B 授信上违约；约 ₦4.38B 仍未偿还，Moniepoint
              已取得强制资产出售的法院命令。Shoprite Nigeria 约 ₦2.4B 授信据称也已不良。两名借款人占已披露 ₦7B NPL 贷款簿的大多数，而 FY2025 信用组合为
              ₦1T，这构成严重集中风险。关键在于，全系统 NPL ratio 并未公开。FY2025 贷款增长 3x 与尼日利亚 30%+ 通胀环境叠加，显著放大 FY2026 进一步形成 NPL 的风险。


              **FX 与宏观风险：** 奈拉从 2022 年约 ₦415/$ 贬至 late 2025 的 ₦1,600/$——按 USD 等值收入计减少约 75%。虽然 Moniepoint 成本基础也以奈拉计价，但任何
              USD 计价义务（技术供应商合同、国际信贷工具、国际投资者报告）都会受到重大影响。MonieWorld UK 提供小型 FX 对冲，但还未达到重要规模。


              **MDR 压缩风险：** Moniepoint 支付收入的重要部分来自 POS 交易 0.5% Merchant Discount Rate（MDR）上限。即便 CBN 只把上限下调 0.1%（至
              0.4%），按当前交易量也会消除约 ₦412B 年化 MDR 收入。CBN 过去已通过 MDR 指令展示过干预支付定价的意愿。


              **合作伙伴依赖清单：** Google Cloud（主基础设施）、Confluent Cloud（事件流）、NIBSS（清算轨道）和 Visa（卡网络 + Series C
              投资者）是影响最高的四项伙伴依赖。Visa 同时是投资者和卡网络，形成潜在冲突：如果 Visa 修改网络费用或卡受理政策，Moniepoint 会同时作为金融合作伙伴和股权共同投资者承压。IFC/World
              Bank 优惠贷款让 Moniepoint MFB 的资金成本低于商业利率——任何政策变化都会推高资金成本并压缩净息差。


              **资本充足：** national MFB 牌照要求最低资本 ₦5B。Moniepoint 声称合规，但没有公开披露资本充足率。考虑到激进贷款增长和上升的 NPL 风险，资本比率需要在尽调中独立验证。
