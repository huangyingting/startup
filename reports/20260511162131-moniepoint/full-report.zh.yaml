      - number: '8.5'
        title: 投资逻辑破裂与止损触发器
        blocks:
          - type: paragraph
            body: >
              投资高增长新兴市场 fintech，必须明确跟踪投资逻辑破裂信号——也就是那些说明情景已从基准 / 牛市转向熊市的预警。


              **投资逻辑破裂信号（降低确信度，收集更多数据）：**

              - 任一审计期间贷款簿 NPL 比率超过 3%

              - CBN 对 Moniepoint 采取重大执法行动（牌照限制、罚款 > ₦5B）

              - 奈拉持续跌破 ₦2,000/$，且收入没有恢复

              - OPay 以 $4B+ 完成 IPO，并披露竞争数据，显示 Moniepoint 正在失去 POS 份额


              **止损信号（退出或不投资）：**

              - 审计账目显示收入实质低于 $400M，或经营亏损 > $100M

              - NPL 比率超过 7%（尼日利亚银行体系危机水平）

              - CBN 撤销全国性 MFB 牌照，或实施有约束力的代理点限制

              - 管理层变动：CEO Tosin Eniolorunda 或 CTO Felix Ike 离任，且无继任安排

              - 历史交易额或交易指标发生重大重述


              监测节奏：每季度复核 CBN 监管行动、Opera / OPay 文件（作为市场份额代理）、NIBSS 汇总支付数据（跟踪 Moniepoint 在全国交易额中的份额），以及任何 Moniepoint
              数据室更新。每年复核 UK Companies House 文件，以获取子公司层面的财务数据。
            claimRefs:
              - CV019
              - CV024
              - CV039
          - type: table
            tableRef: TV005
            claimRefs:
              - CV019
              - CV020
              - CV024
              - CV039
      - number: '8.6'
        title: 最终建议与尽调问题
        blocks:
          - type: paragraph
            body: >
              **建议：跟踪 / 继续研究**


              Moniepoint 具备少见组合：真实的市场领导地位（₦412T 交易额、600 万+ 企业）、机构背书（Visa、IFC、Google 共同投资），以及看起来被根本低估的估值标记（0.8x–1.5x P/S
              vs. 同业 3–10x）。这带来了有吸引力的进入可能，尤其适合期限 5–7 年、能承受奈拉外汇风险的投资人。


              但阻断性缺口——没有审计财务报表——使我们无法验证估值分析所依赖的收入、利润率和信用质量主张。在审计账目可得之前，建议姿态是：

              (a) 与公司接触，争取数据室访问权限；

              (b) 委托对贷款簿进行独立 NPL 抽样；

              (c) 索取 CBN 监管往来文件，评估合规状态；

              (d) 用 ₦2,000/$ 假设建模外汇情景；

              (e) 评估能否借用 IFC 的尽调流程（该流程促成了其投资）来补足文件。


              如果经审计的 FY2025 账目确认收入 $800M+、NPL 比率 <2%，且经营现金流为正，当前 $1B 标记就明显便宜；在基准情景下，以不高于当前估值选择性投资，有望获得 2–3x 回报。


              如果审计账目显示收入实质低于 $500M 或出现亏损，$1B 标记就偏高，不应按这一估值投资。
            claimRefs:
              - CV001
              - CV008
              - CV016
              - CV019
              - CV039
          - type: table
            tableRef: TV006
            claimRefs:
              - CV001
              - CV019
              - CV024
              - CV039
      - number: '8.7'
        title: 附录资料
        blocks:
          - type: callout
            title: 投资建议：跟踪 / 继续研究
            body: >-
              Moniepoint 的投资案例在结构上有吸引力——占主导的支付基础设施、600 万+ SME 客户、机构共同投资人（Visa、IFC、Google），以及 0.8x–1.5x 的隐含 P/S，较 3–10x
              的非洲同业明显折价。但缺少审计财务报表是阻断性缺口：收入、利润率、NPL 拨备和盈利能力都无法独立验证。建议姿态是跟踪 / 继续研究——与公司接触取得数据室访问权限，获取审计后的 FY2025 账目，委托独立
              NPL 抽样，并等待 OPay IPO（Citi / DB / JPM 牵头，$4B 目标）成为非洲 fintech 同业定价的市场催化剂。如果审计账目确认收入 $800M+、NPL 比率
              <2%，且经营现金流为正，当前 $1B+ 标记看起来明显便宜，5 年内存在 3x 基准回报路径。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV005
              - CV008
              - CV016
              - CV019
