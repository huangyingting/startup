      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的运营风险由基础设施集中、硬件供应链依赖、NIBSS 系统性暴露，以及每年跨 140,000+ 台 POS 终端和 1,500+ 名现场代理处理 14 billion
              笔交易所固有的欺诈与网络安全风险定义。


              **Google Cloud 集中：** Moniepoint 80%+ 基础设施运行在 Google Cloud Platform（GCP）上，使用 Google Kubernetes
              Engine（GKE）做容器编排，使用 Cloud Spanner 做分布式交易数据库。没有公开披露第二云供应商或正式 multi-cloud 架构。这在 ₦412T 年交易额的规模上形成单一供应商依赖：重大
              GCP 区域中断、单方面涨价或服务终止，都可能让所有 Moniepoint 运营同时停止。对于一家处理尼日利亚约 80% 线下电子支付的公司，这一系统性风险已超出
              Moniepoint，延伸到尼日利亚更广泛的支付基础设施。


              **Confluent Cloud 依赖：** Moniepoint 的实时支付事件流运行在 Confluent Cloud 托管的 Apache Kafka 服务上。任何 Confluent
              服务中断都会立即损害实时交易处理和清算流。不同于 Google Cloud，Confluent 是单一供应商服务，且没有披露备用方案。


              **NIBSS 系统性依赖：** 尼日利亚所有卡和转账清算都通过 Nigeria Inter-Bank Settlement System（NIBSS）路由。无论 Moniepoint
              自身基础设施可靠性如何，NIBSS 中断都会直接传导到所有 Moniepoint 交易清算。尼日利亚支付基础设施历史上曾出现间歇性 NIBSS 相关中断。


              **POS 硬件供应链：** Moniepoint 的 140,000+ 台终端是基于 Android 的设备，主要来自中国制造商。贸易中断、组件短缺，或 CBN
              对进口支付硬件的限制，都可能约束终端部署并拖慢商户获取。geo-tagging mandate 又增加合规维度——每台终端都必须打地理标签，需要现场代理实地到访现有终端位置。


              **现场代理与网络安全风险：** 1,500+ 现场代理网络构成分布式运营风险——不良代理可能实施欺诈、违反 KYC 协议，或对商户进行社会工程攻击。每年 14 billion
              笔交易的规模下，欺诈是重大风险：Trustpilot 评价持续提到账户冻结（与欺诈检测误报相关）是 Moniepoint 最常见的服务失败模式，说明公司既有欺诈风险，也有过度激进欺诈控制带来的客户体验风险。
