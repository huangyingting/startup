      - number: '1.5'
        title: 规模、关键指标与监管版图
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，Moniepoint 在尼日利亚服务超过 10 million 活跃企业和个人。另据其博客，公司平台覆盖 20 million 企业和个人；差异可能来自「活跃」与「注册」定义不同。更保守的
              10 million 活跃口径来自 January 2025 MonieWorld 上线新闻稿和 October 2025 Series C 交割公告。

              无论按什么标准，Moniepoint 2025 年运营表现都很突出：处理 14 billion 笔交易（较 2023 年 5.2 billion 增长 169%）；交易额 ₦412 trillion（较 2023
              年 $150 billion 增长 96%）；尼日利亚 80% 的线下支付流经 Moniepoint 轨道；并通过 Moniepoint MFB 发放超过 ₦1 trillion 中小企业贷款。

              员工数方面，公开估计显示，截至 2026 年初公司有 3,700 至 5,200 名员工，差异反映了快速扩张和定义口径不同（承包商 vs. 直接雇员）。公司在最近披露期内报告员工增长 36%。

              Moniepoint 在尼日利亚持有以下牌照：（1）Microfinance Bank 牌照，January 2026 被 CBN 升级为全国级；（2）Payment Terminal Service
              Provider（PTSP）牌照；（3）通过 TeamApt Ltd 持有 Switching and Processing 牌照；以及（4）2025 年经过严格认证流程获得的 Mastercard 和 Visa
              处理商及收单牌照。

              January 2026，CBN 将 Moniepoint MFB 的牌照升级为全国级，要求最低资本金 ₦5 billion、更严格的 KYC/AML 合规，以及在关键地区具备实体网点。此前 CBN 于 2024
              年因 KYC 不合规对 Moniepoint 处以 ₦1 billion 罚款；这一反向监管事件凸显数字金融平台正在面对更高审查。
