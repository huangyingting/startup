      - number: '5.4'
        title: 部署、集成与路线图
        blocks:
          - type: paragraph
            body: >
              相比纯软件平台，Moniepoint 的部署模式运营强度更高，这反映了硬件驱动的 POS 策略。集成深度和未来路线图显示，公司还会继续扩张平台。


              **部署模式：** POS 终端通过 Moniepoint 的 1,500+ 现场代理部署，代理负责实物配送、安装和商户培训。终端激活包括 CBN 强制的 geo-tagging（每台终端登记精确 GPS
              位置）和基于 BVN/NIN 的 KYC 验证。CBN geo-tagging 指令（August 2025，60 天合规窗口）要求 Moniepoint 和其他运营商为全行业约 4.2 million 台
              POS 终端打地理标签。Moniepoint 已公开承诺合规。Monnify 方面，开发者可通过开发者门户完全自助 onboarding，完成企业 KYC 后立即发放 API 密钥。


              **集成架构：** Moniepoint 接入 NIBSS 处理所有银行间清算；作为次级收单方接入 Visa 和 Mastercard 网络处理国际卡组织；并接入 NIBSS 做 BVN/NIN
              身份验证。Monnify webhooks 让商户系统实时接收支付通知。CBN 要求 October 2025 前完成 ISO 20022 message format migration；按 2025 Year
              in Review，公司已在 Q4 2025 完成迁移，提升了与 NIBSS 清算轨道的互操作性。


              **可靠性与 SLA：** Moniepoint 声称支付处理基础设施 uptime 为 99.8%。峰值吞吐超过每分钟 600,000 次请求（典型运营负载为 200,000）。POS
              终端离线优先设计意味着终端级可靠性与网络可用性解耦——交易先缓存再同步，使商户免受连接中断造成的停机影响。


              **路线图：** 未来关键举措包括：（1）扩张 PaaP 开发者生态，把 Moniepoint POS 硬件转化为 ISV 平台；（2）通过肯尼亚 Sumac 做泛非扩张，并可能进入更多市场；（3）深化
              MonieWorld UK 汇款业务，并可能增加侨民汇款通道；（4）部署 Vertex AI AgentSpace 客服中心以降低支持成本；（5）既定目标是活跃业务客户超过 3 million（late 2025
              约 2 million）。PaaP 是近期置信度最高的战略信号——Moniepoint 押注把硬件变成平台，能创造类似西方市场中 Stripe
              生态的开发者锁定。公司没有公开这些举措的具体收入目标或时间表，这是一个重大证据缺口。
