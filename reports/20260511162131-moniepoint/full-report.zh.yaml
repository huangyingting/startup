      - number: '5.2'
        title: 技术基础设施与运营模式
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的技术栈专为高交易量、低延迟金融交易处理而建，面对的是连接不稳定、交易尖峰极端的市场。


              **云与计算：** Google Cloud Platform（GCP）是 Moniepoint 的主基础设施供应商，双方在 2023 年正式宣布合作。Google Kubernetes
              Engine（GKE）编排超过 600 个微服务，通过水平自动扩缩容承接每分钟超过 600,000 次请求的峰值负载。公司声称支付处理栈 uptime 为 99.8%。Cloud Spanner 提供符合
              ACID 的多区域关系数据库层，用于银行交易，并享有 Google 99.999% availability SLA。合作还延伸到 Vertex AI 机器学习工作负载，以及用于 AI 客服的
              AgentSpace 部署。


              **事件流与数据架构：** Confluent Cloud（Apache Kafka）是实时事件流骨干。每笔 POS 交易、API 调用和银行事件都会生成 Kafka message，经 Dataflow 流入
              BigQuery，用于分析、ML 特征工程和 AML 检测。IntelligentCIO 对 Moniepoint 数据架构转型的报道称，公司从批处理转向流式优先设计，实现 sub-100ms
              事件延迟和实时清算。Confluent 将这一架构称为非洲金融科技领域的标杆部署。


              **ML 与 AI：** Vertex AI AutoML 基于每个商户 6 个月或更长的 POS
              交易历史训练信用评分模型——日交易速度、规律性和金额是主要特征集。这一点高度差异化：没有尼日利亚商业银行拥有同等实时、交易级数据来服务同一个 SME 群体。BigQuery ML 在 petabyte
              级别承载欺诈检测和 AML 分析。Vertex AI AgentSpace 正作为 AI 客服中心方案部署，使 SME 支持案例可用自然语言查询解决，无需人工升级。


              **POS 硬件平台：** Moniepoint 的 POS 终端是由 OEM 合作伙伴制造、基于 Android 的设备，运行 Moniepoint
              自有支付应用。终端支持离线模式——网络断开时交易在本地排队，恢复连接后同步。支持的支付方式包括磁条和芯片借记卡、二维码、USSD、NFC 非接触支付。POS-as-a-Platform（PaaP）SDK 暴露
              Kotlin API，允许第三方 Android 应用（最高 30MB）在终端运行、接收卡支付回调、访问小票打印机并使用 NFC 读卡器，等于把 Moniepoint POS 变成可编程平台。


              **Monnify API 架构：** Monnify 采用标准 REST API 架构，使用 OAuth 2.0 token 认证、基于 webhook 的事件投递，并用 idempotency keys
              防止重复支付。SDK 维护覆盖 Node.js、PHP、Python、Android 和 iOS。API 接入 NIBSS 做银行间清算，也接入 NIBSS BVN Validation 和 NIN
              Verification 服务做 KYC 身份检查。PCI DSS 合规覆盖卡数据处理的完整交易生命周期。
