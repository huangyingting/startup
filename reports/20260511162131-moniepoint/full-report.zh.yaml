      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              对投资者而言，Moniepoint 的监管与法律风险是最关键的风险类别：活跃执法、未决诉讼，以及一波新的 CBN 指令同时带来合规成本和运营约束。


              **CBN KYC/AML 执法：** Q2 2024，CBN 因 KYC 和 AML 违规对 Moniepoint 罚款 ₦1B（按当时汇率约 $633,990 USD），OPay
              也受到类似罚款。这是正式执法行动——不是警告——表明 CBN 愿意对尼日利亚最大 fintechs 施以重大处罚。Corporate Affairs Commission（CAC）随后建议将 OPay 和
              Moniepoint 列入监管观察名单，并向 CBN 报告（December 2025）。若以此严重程度重复违反 KYC/AML 要求，可能触发牌照限制、强化监管或支付业务暂停。


              **活跃诉讼：** 截至报告日，两起重大法院案件仍在进行。Federal High Court 正式将 Moniepoint 列为一起 ₦21B POS 商户欺诈案的当事方（2025）。另一起案件中，EMAAR
              Ponzi scheme 受害者威胁或已对 Moniepoint 提起集体诉讼，指控公司 KYC 控制不足，使欺诈计划得以规模化运作。如果获集体诉讼认证，EMAAR
              诉讼可能产生重大诉讼责任和严重声誉损害。Alerzo court order（Moniepoint 为追回 ₦4.38B 债务而取得）是另一项活跃法律程序。


              **NDPC 数据保护调查：** Nigeria's Data Protection Commission（NDPC）在 2025 年调查中点名 Moniepoint，原因是其可能未遵守 Nigeria Data
              Protection Act 2023。若执法落地，可能带来罚款或强制整改；公司正处理 6M+ 企业的金融数据，一旦调查出现不利结论，数据处理风险会显著上升。


              **新的 CBN 指令（2025–2026）：** single-principal agent banking rule（October 2025）要求 POS
              代理只能为一家金融机构服务；如果竞争运营商提供更好条款，Moniepoint 的代理网络可能受限。POS geo-tagging mandate（August 2025）要求 4.2 million 台终端在
              60 天内完成 GPS 标记，带来一场运营冲刺。ISO 20022 迁移期限（October 2025）带来技术合规要求；不合规意味着被切断与
              NIBSS——尼日利亚国家支付交换系统——的连接。同时，national MFB licence upgrade（January 2026）将最低资本要求提高到 ₦5B，并让 Moniepoint
              接受更强监管审查。
