      - number: '2.3'
        title: 买方与细分客群地图
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的市场有四类清晰买方画像，各自的预算归属、支付意愿和采用触发因素不同：


              **细分 1 —— 微型商户和 POS 代理（核心）：**
              业主自营店铺、市场摊位、加油站、药店、餐馆。这些商户需要价格可承受的刷卡受理和代理现金服务。预算掌握在商户业主手里；支付意愿低，但一旦完成培训，切换成本高。采用触发因素：CBN 现金限制政策（January
              2023）迫使消费者转向数字交易。


              **细分 2 —— 中小企业（增长）：** 拥有 1–50 名员工的注册企业，需要企业活期账户、薪资处理和营运资金信贷。预算掌握在企业主 / CFO
              手里。对于打包服务，支付意愿中高。采用触发因素：Moniebook 集成，以及基于交易历史获得授信资格。


              **细分 3 —— 个人银行客户：** 开通 Moniepoint 个人账户（August 2023 上线）用于日常储蓄和转账的个人。预算掌握在个人手里。这个板块里，OPay、PalmPay 和 Kuda
              的竞争很激烈。


              **细分 4 —— B2B 支付网关客户：** 通过 Monnify API 嵌入支付的电商平台、SaaS 公司和中小企业。预算掌握在技术 / 支付团队手里。这是 Moniepoint 最接近 Paystack
              / Flutterwave 市场的业务。


              地理分布：城市密集地区（Lagos、Abuja、Port Harcourt）贡献大部分交易额；尼日利亚北部渗透不足，但随着 CBN 普惠政策推动采用，正在增长。Moniepoint
              通过外勤代理签约并培训商户，这种分发模式覆盖了竞争者存在感较低的半城市和农村地区。
