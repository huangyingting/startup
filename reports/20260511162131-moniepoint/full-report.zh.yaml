chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与发展历史
        blocks:
          - type: paragraph
            body: >
              Moniepoint Inc. 此前以 TeamApt Inc. 名义注册，是一家总部在尼日利亚的金融科技公司，为非洲企业及其客户提供一体化金融平台。公司于 2015 年在尼日利亚拉各斯创立，创始人为 Tosin
              Eniolorunda 和 Felix Ike；两人在尼日利亚科技和银行圈工作时相识。Eniolorunda 曾任职于
              Interswitch——尼日利亚头部支付基础设施公司之一，这让他深入理解当地支付生态及其结构性缺口。

              早期几年，TeamApt 聚焦为尼日利亚传统银行搭建支付基础设施和后台软件。公司是大型银行的技术伙伴，帮助它们升级支付技术栈和结算系统。这个阶段让 TeamApt
              细致看清银行在哪些环节没服务好客户：交易结算慢、失败率高、交易流向缺乏可见性。

              2019 年，TeamApt 做出战略转向，获得尼日利亚中央银行（CBN）代理银行牌照，并推出 Moniepoint 品牌，直接服务商户和小企业。产品最初是帮助商户收款的销售点终端（POS），在尼日利亚 2023
              年现金危机期间快速起量：政府货币改版引发大范围现金短缺，企业被迫依赖数字支付轨道。那段时间，Moniepoint 的可靠性和即时冲正能力推动其在尼日利亚 774 个地方政府辖区迅速普及。

              2023 年，TeamApt 正式将母公司更名，使企业身份与旗舰产品保持一致，完全成为 Moniepoint Inc. 这反映出 Moniepoint
              品牌在尼日利亚中小企业中的巨大认知度，也反映公司希望把企业身份拉近客户群。如今，Moniepoint 总部位于尼日利亚拉各斯，并在伦敦拥有不断扩张的英国子公司 Moniepoint GB。
