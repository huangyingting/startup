      - number: '3.3'
        title: PalmPay——Transsion 分发引擎
        blocks:
          - type: paragraph
            body: >
              PalmPay 隶属 Transsnet Financial Services，后者是 Transsion Holdings（非洲主导智能手机厂商，旗下 Tecno、Infinix、itel 品牌）与
              NetEase（中国科技公司）的合资公司。PalmPay 的结构性优势，是预装在 Transsion 智能手机上，让它在尼日利亚、加纳、坦桑尼亚和其他非洲市场以零成本获取数百万初次智能手机用户。


              到 September 2025，PalmPay 在尼日利亚客户数超过 40 million，日处理交易超过 15 million 笔——高于 2024 年约 ~10 million 日交易，年同比增长
              50%。据报道，用户参与度很高，平均每名用户每月 50 笔交易，估计客户留存率 80%。PalmPay 的 1 million+ 代理网络提供现金存取服务，使其拥有类似 OPay 的全国分发。


              相比 Moniepoint，PalmPay 的竞争弱点在于中小企业银行和信贷产品有限：PalmPay 主要通过钱包产品服务消费者和微型商户，没有 Moniepoint
              提供的全栈企业银行（Moniebook）、MFB 持牌信贷或 Monnify 等价 B2B 网关。它与 Transsion 的绑定也意味着更暴露于手机市场动态，并且可能难以服务使用非 Transsion
              设备的商户。
