      - number: '1.4'
        title: 商业模式与产品
        blocks:
          - type: paragraph
            body: >
              Moniepoint 运营一个垂直整合的金融服务平台，瞄准尼日利亚庞大的非正规经济；后者占非洲大陆就业的 83%。公司的商业模式以商户收单（向企业部署 POS
              终端）作为初始抓手，再用贷款、银行、外汇和企业管理工具等相邻金融服务贡献增量收入，并加深锁定效应。

              收入来自多条线：（1）POS 和数字转账交易量上的交易费（估计跨渠道抽成率 0.1–0.5%）；（2）通过 Moniepoint Microfinance Bank
              发放营运资金贷款获得的利息收入；（3）Moniebook 订阅费（₦6,000– ₦8,500/month）；以及（4）跨境和汇款交易的外汇价差。TechCabal 估计，在 2025 年处理 ₦412
              trillion 的基础上，按渠道组合不同，Moniepoint 的支付总收入介于 ₦412 billion 和 ₦2 trillion 之间。

              产品覆盖：（a）POS 终端和支付受理——遍布尼日利亚 774 个 LGA；（b）Moniepoint 企业银行账户；（c）通过替代数据（交易历史、支付行为）承保的信用和营运资金贷款；（d）Monnify
              网页支付网关（2025 年处理 ₦25 trillion）；（e）Moniebook——一体化 POS + 记账方案；以及（f）MonieWorld——面向非洲侨民、在英国上线的汇款服务（April
              2025）。公司还运营个人银行垂直业务（August 2023 上线），第一年增长 2,000%。

              Moniepoint 的分发依赖超过 600,000 名「business managers」——扎根社区的代理人，他们通过引入商户和部署 POS
              终端赚取佣金。在尼日利亚半正规经济中，信任靠线下关系建立，这种人力渠道模式比纯数字化打法更有韧性。
