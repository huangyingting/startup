      - number: '3.4'
        title: Flutterwave 和 Paystack——网关基础设施专家
        blocks:
          - type: paragraph
            body: >
              Flutterwave 和 Paystack 是尼日利亚最突出的 B2B 支付网关运营商，但它们与 Moniepoint 的竞争位置根本不同。两者聚焦为在线商户、电商平台和开发者提供基于 API
              的支付收款——不是实体 POS 终端、中小企业银行或表内贷款。


              Flutterwave 估值 $3 billion（由 2022 年 Series D 估值 $3B 推算），累计处理支付额超过 $40 billion，并在 2026 年获得 National MFB
              牌照，显示其正战略转向银行服务。这是最清晰的竞争信号：Flutterwave 正向 Moniepoint 的地盘移动。其本地交易收费约 1.4%，国际交易 3.8%+，抽成率显著高于 POS 收单 ~0.5%
              的混合 MDR。


              Paystack 于 2020 年被 Stripe 以约 $200 million 收购，受益于 Stripe 的全球工程和合规能力。Paystack 已扩展至消费者应用、小额信贷和创投部门（“The Stack
              Group”）。它的核心强项是开发者体验和 API 可靠性。Paystack 本地交易收费约 ~1.5%，在 B2B 侧正面对 Moniepoint 的 Monnify 网关带来的竞争加剧。


              对 Moniepoint 而言，Flutterwave 和 Paystack 的竞争风险主要在 Monnify 网关板块（FY2025 GPV 为 ₦25T），而不是核心 POS 和中小企业银行业务。它们的
              MFB 牌照让其理论上能切入中小企业信贷，但 Moniepoint 的 6+ million 活跃企业客户和用于授信的交易历史数据库，构成了 7 年先发优势。
