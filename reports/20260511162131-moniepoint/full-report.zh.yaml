      - number: '3.5'
        title: Kuda Bank 和 MTN MoMo——利基与电信主导挑战者
        blocks:
          - type: paragraph
            body: >
              Kuda Bank 是一家 2019 年推出的数字优先消费者银行，累计融资 $91 million，截至 2025 年约有 5 million 用户。Kuda
              的核心产品是面向年轻城市尼日利亚人的免手续费消费者活期账户和储蓄产品。它在 POS 收单、中小企业银行或贷款方面不是 Moniepoint 的实质竞争者——其重点牢牢放在个人零售客群。Kuda
              代理网络有限，也没有 POS 硬件产品，因此无法服务 Moniepoint 的核心商户客群。


              MTN MoMo 作为 Payment Service Bank（PSB）运营——这是 CBN 的牌照类别，允许吸收存款和提供支付服务，但禁止贷款。MTN 的优势是覆盖尼日利亚 36 个州、拥有 70M+
              移动用户的电信分发，但 PSB 身份限制了产品菜单。MoMo 无法直接与 Moniepoint 的 MFB 贷款产品或 POS 硬件基础设施竞争。PSB-vs-MFB 的监管区分是 Moniepoint
              的结构性护城河：CBN PSB 指引明确将电信运营商排除在贷款业务之外。


              传统商业银行（Access Bank、GTCO、Zenith、UBA）有数字支付产品，但服务微型商户时存在结构性劣势：开户流程长、最低余额要求高、交易结算慢。它们是 Moniepoint
              在中小企业银行钱包份额上的间接竞争者，但其数字产品持续输给 Moniepoint 面向商户优化的工具。
