      - number: '6.3'
        title: 具名客户佐证与部署证据
        blocks:
          - type: paragraph
            body: >
              Moniepoint 公开可得的具名客户证据在 micro-SME 分层最强。TechCabal 和 Moniepoint
              自有博客记录的案例研究，提供了可验证、且能关联到具体企业的结果数据。最突出的独立报道案例是手机配件零售商 Oberry Agamah；采用 Moniepoint 集成
              POS、企业账户和营运资金信贷套件后，他报告收入增长 40%，TechCabal 和 Moniepoint 官方博客均有佐证。更广泛的 Moniepoint SME 案例显示，收入增长结果为
              30-60%，贷款偿还率超过 95%。


              机构层面，媒体报道确认 Lagos State Government 使用 Moniepoint 的代理银行基础设施做数字税收和政府收入征收，这是一个重要公共部门部署。First Bank of Nigeria
              与 Moniepoint 的代理银行合作在尼日利亚各地提供最后一公里 cash-in/cash-out 服务。MTN Nigeria 商户通过 Monnify API 集成间接使用
              Moniepoint。一家未具名、拥有 20+ 门店的连锁药店同时使用 Moniebook 和 POS 终端。虽然机构部署看起来已投入生产使用，但正式合作协议和合同金额并未公开。Business Insider
              Africa 发现，78% 的 Moniepoint 贷款客户在获信贷后扩大了经营。iOS app 4.5/5 和 Trustpilot 4.2/5 的评分也佐证了广泛满意度。也存在反向信号：Rest of
              World（2024）记录了商户在 2023 年奈拉现金危机期间对 POS 终端宕机和客服响应慢的投诉，这是尽调访谈中必须追问的重要服务质量信号。
