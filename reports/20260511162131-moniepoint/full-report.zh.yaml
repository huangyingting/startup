  - id: FE002
    type: journey-map
    title: 客户工作流 / 运营流程
    layout: wide
    summary: SME 商户从初始入驻，到日常收款、信贷资格确认、营运资金贷款发放，再到采用 Moniebook 的端到端旅程；每一步都加深平台锁定，并增强 Moniepoint 的数据优势。
    claimRefs:
      - CE003
      - CE006
      - CE016
      - CE019
      - CE025
      - CE026
      - CE034
      - CE038
    data:
      items:
        - label: 1. 商户入驻
          detail: SME 注册；通过 NIBSS 完成 BVN/NIN KYC 核验；地推代理在全部 36 个州于 2–3 个工作日内交付并安装 POS 终端； 按 CBN 要求登记地理标记
          actor: 商户 + Moniepoint 地推代理
        - label: 2. 日常收款
          detail: 客户刷卡或扫描 QR 码；POS 通过 NIBSS 路由；结算在 <5 秒内完成；网络中断时离线模式缓存交易，重连后同步
          actor: 商户 + 客户 + NIBSS
        - label: 3. 交易数据累积
          detail: 每笔 POS 交易通过 Confluent Kafka 流进入 BigQuery；ML 模型用 6+ 个月的每日现金流数据建立商户信用画像——交易速度、规律性和金额
          actor: Moniepoint ML 管道（自动化）
        - label: 4. 信贷审批
          detail: POS 历史达到 6+ 个月后，商户具备资格；系统计算 ML 信用评分；商户在 App 内申请；审批数小时内出结果，而不是数周；无需传统征信局查询
          actor: 商户（App 内）+ Moniepoint MFB（自动化）
        - label: 5. 贷款发放与还款
          detail: 平均 ₦14.3M 贷款发放至 Moniepoint 企业账户；期限 12–24 周；每日自动还款从 POS 结算账户扣除；无需人工催收
          actor: 商户 + Moniepoint MFB
        - label: 6. SaaS 与平台深化
          detail: 商户升级到 Moniebook 使用会计和薪资功能；工资通过 MFB 批量付款发放；数据飞轮逐步扩大授信额度；完整切换成本已覆盖终端 + 账户 + 贷款 + 软件
          actor: 商户 + Moniepoint 生态
  - id: FE003
    type: dag
    title: 关键依赖地图
    layout: wide
    summary: Moniepoint 关键外部依赖的有向无环图，覆盖基础设施、监管和网络；图中标出哪些节点代表集中度风险，哪些节点会受到不利监管变化影响。
    claimRefs:
      - CE008
      - CE012
      - CE014
      - CE015
      - CE021
      - CE037
    data:
      nodes:
        - id: nibss
          label: NIBSS 结算轨道
          detail: Nigeria Interbank Settlement System；所有国内银行间转账和 POS 清算都必须使用；CBN 监管下的单一结算轨道垄断；国内没有替代方案
          type: infrastructure
        - id: gcp_infra
          label: Google Cloud Platform 云平台
          detail: 主要云服务商；GKE、Cloud Spanner、BigQuery、Vertex AI；未公开披露本地部署备援；若 GCP 发生区域故障，存在供应商集中风险
          type: infrastructure
        - id: confluent_kafka
          label: Confluent Cloud（Kafka）
          detail: 实时事件流主干；托管型管理服务；结算管道和 ML 特征工程依赖 Confluent 可用性；运行在 GCP 上——集中度叠加
          type: infrastructure
        - id: cbn_reg
          label: CBN 监管框架
          detail: 国家级 MFB 牌照；POS 代理银行指南；单一主事方规则（2026 年 4 月）；地理标记要求；ISO 20022 迁移；MDR 上限——全部由 CBN 单方面设定
          type: regulatory
        - id: card_networks
          label: Visa / Mastercard 轨道
          detail: POS 上的国际卡受理；交换费经济性由外部决定；Moniepoint 是次级收单方——卡组织费用由网络决定，不由 Moniepoint 决定
          type: infrastructure
        - id: ndpc
          label: NDPC / NDP Act 2023
          detail: Nigeria Data Protection Act 2023；截至 2025 年 8 月 NDPC 调查仍在进行；不利认定可能带来罚款或强制整改；结果未定
          type: regulatory
      edges:
        - from: nibss
          to: gcp_infra
          label: NIBSS 结算事件通过 GCP Kafka 和 Spanner 处理
        - from: cbn_reg
          to: nibss
          label: CBN 将 NIBSS 指定为强制性结算基础设施
        - from: confluent_kafka
          to: gcp_infra
          label: Confluent 托管在 GCP 上 — 单一云集中度被放大
        - from: card_networks
          to: nibss
          label: Visa/Mastercard 国际卡交易通过 NIBSS 清算
        - from: cbn_reg
          to: ndpc
          label: NDPC 在更广义的 CBN / National Privacy Council 框架下运作
