      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的领导层由两位联合创始人支撑：Tosin Eniolorunda（集团 CEO 兼创始人）和 Felix Ike（联合创始人兼首席信息技术官）。Eniolorunda 在
              Interswitch 的经历——这家公司是非洲最重要的支付基础设施公司之一——直接塑造了 Moniepoint
              技术优先的思路：建设能够跑赢传统银行系统的支付轨道。他的管理风格强调纪律、主人翁意识和一致性，并把公司从低调的 B2B 基础设施供应商带成非洲最重要的商户收单机构。

              Felix Ike 是 Moniepoint 核心平台背后的技术架构师。他的工程领导力搭出了分布式系统，让 Moniepoint 达到 444 笔/秒吞吐和行业领先可靠性。由 Ike
              塑造的工程文化把低延迟结算和高可用性放在优先位置；商户选择 Moniepoint 而非竞争对手时，最常提到的正是这两点。

              除两位联合创始人外，Moniepoint 已组建深厚的高管团队，包括 Babatunde Olofin（Moniepoint MFB 董事总经理）、Solomon Amadi（支付基础设施副总裁）、Tunde
              Olofin（银行业务董事总经理）和 Edidiong Uwemakpan（传播副总裁）。团队厚度在一定程度上降低了关键人风险，但 Eniolorunda 的外部能见度和融资关系仍高度集中在 CEO 层面。

              Moniepoint 的治理仍体现出私营公司特征：没有公开披露董事会。按标准创投条款推测，DPI、LeapFrog 和其他 Series C 投资方可能拥有董事会观察员或董事席位，但具体董事会构成尚未公开披露。
