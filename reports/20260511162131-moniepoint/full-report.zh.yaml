      - number: '8.2'
        title: 可比估值与同业分析
        blocks:
          - type: paragraph
            body: >
              估值 Moniepoint，需要在三类公司中选择合适可比对象：(a) 商业模式相近的尼日利亚 fintech 同业，(b) 更广泛的非洲和新兴市场 fintech 基础设施公司，(c)
              用于倍数参照的上市或近期交易支付处理商。


              **尼日利亚 fintech 同业：**

              Interswitch 是尼日利亚开创性的银行卡交换和支付处理公司，也是最接近的结构性可比：两家公司都是盈利的尼日利亚支付基础设施企业，都有实体 POS 分发和银行牌照。Interswitch 上一次正式估值是在
              2019 年一轮融资中的约 $1B；计划中的 IPO 仍未推进。考虑到 Moniepoint 交易额明显更大（₦412T vs. Interswitch 较小基数），Moniepoint 可以合理地相对
              Interswitch 估值溢价。


              OPay 是 SoftBank 支持、服务 5000 万+ 用户的尼日利亚 fintech，按 Opera 2024 年监管文件估值为 $2.75B；2026 年 5 月，Citi / Deutsche Bank
              / JPMorgan 牵头簿记建档披露其 IPO 目标升至 $4B。OPay 在 2025 年中估计每月处理 $12B，显著低于 Moniepoint 约 $34B 的月度运行率（₦412T ÷ 12 个月 ÷
              ₦1,400/$），说明 Moniepoint 更大的交易基数有理由支撑相当或更高估值。OPay 的 $4B IPO 目标约对应 3–5x 估算收入；若套用到 Moniepoint，将意味着 $2B–$6B
              估值，远高于当前 $1B+ 标记。


              Flutterwave 是尼日利亚支付网关公司，最近一次融资是在 2022 年 Series D，估值 $3B。到 2026 年 4 月，Flutterwave 取得尼日利亚全国性 MFB 牌照，并收购 Mono
              开放银行平台，显示其正从纯网关转向全服务银行——与 Moniepoint 模式正面竞争。Flutterwave 的 $3B 标记约对应 5–10x 估算收入，不过收入未经验证。


              **MEA / 全球可比：**

              Network International 是一家专注 MEA 的支付处理商，在 London Stock Exchange 上市，2023 年被 Brookfield 以约 $2.8B 收购，约对应其收入基数的
              2x。它是 Moniepoint 支付处理职能最相关的公开市场可比对象，但 Moniepoint 叠加了 Network International 没有的贷款层。


              Wave（西非）是一家法语非洲移动钱包公司，2021 年在标志性的 $200M Series A 中达到 $1.7B 估值；它对区域溢价有参考意义。Wave 所在市场竞争更弱，监管强度也低于尼日利亚。


              **倍数参照：**

              全球上市支付处理商通常按 3–8x 收入交易。Series C–D 阶段的高增长私有新兴市场 fintech 通常拿到 6–15x。即便扣除 40–60% 的流动性和单一市场折价，Moniepoint 的
              0.8x–1.5x 仍显著折价。以 $940M 收入中点套 2x–3x 倍数，公允价值为 $1.9B–$2.8B；如果财务数据得到验证且公司走向流动性，当前 $1B 标记存在可观上行。


              所有可比分析的关键限制都是数据质量：OPay 和 Flutterwave 都不披露审计收入，Wave 收入未披露，Interswitch 财务数据自 2019
              年融资后未更新。因此，同业倍数只是估算，不是已验证标记。
