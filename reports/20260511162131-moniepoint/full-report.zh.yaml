      - number: '3.6'
        title: Moniepoint 的竞争护城河与差异化
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的竞争位置建立在四个相互咬合的优势之上，这些优势共同形成可防守护城河：


              **1. 代理银行网络效应：** Moniepoint 约占尼日利亚线下支付交易量 80%，已达到临界规模：商户偏好它的终端，因为消费者预期 Moniepoint 能用。CBN 单一主平台规则（April
              2026）把这一优势制度化：已经在 Moniepoint 投入时间、培训和营运资金的代理，有充分动机把它指定为唯一主平台。较小竞争者无法匹配 Moniepoint
              的代理支持基础设施、争议解决速度或流动性垫资能力。


              **2. MFB 牌照支撑表内贷款：** CBN National MFB 牌照（January 2026）是 Moniepoint 组合中价值最高的监管资产。它允许 Moniepoint
              吸收存款、规模化放贷，并提供完整银行关系——OPay（PSB）、PalmPay（支付服务）、Flutterwave（新获 MFB 牌照）和 Paystack（Stripe 旗下
              MFB）要么尚未使用这些能力，要么才刚开始规模化。FY2025 发放 ₦1 trillion 中小企业贷款说明这项能力已经上线且规模化，不只是愿景。


              **3. 交易数据构成授信护城河：** Moniepoint 的 412 trillion naira
              交易流，为信用评分提供了专有数据集，商业银行或新进入者都难以快速复制。基于收入的授信——贷款资格和额度由企业真实交易历史决定，而非传统抵押品——更适合尼日利亚非正规中小企业客群，也更准确。


              **4. 硬件软件一体化：** Moniepoint 自有 POS 终端（带自有 OS 的定制硬件）建立了绑定设备关系。不同于 Paystack 或 Kuda 这类纯软件玩家，Moniepoint
              控制实体支付体验。终端融资——Moniepoint 以分期方式提供硬件——又在支付关系之上叠加融资关系，大幅提高切换成本。
