      - number: '8.4'
        title: 关键风险因素
        blocks:
          - type: paragraph
            body: >
              **1. 外汇与奈拉贬值风险（高）：**

              奈拉已从 ₦415/$（2022 年）贬至约 ₦1,600/$（2026 年初），跌幅 74%。即便奈拉收入强劲增长，美元计回报的复利速度也会显著放慢。Moniepoint
              没有实质自然对冲：UK（MonieWorld）和 Kenya（Sumac）的收入仍处早期，相对尼日利亚 ₦412T 交易额并不重要。美元投资人必须接受奈拉汇率风险，或谈判美元计价的优先条款。


              **2. 信用风险集中（高）：**

              ₦7B NPL 披露（Alerzo ₦5B、Shoprite ₦2.4B）暴露了大额企业贷款集中风险，偏离了 Moniepoint 核心的数据驱动 SME 模式。如果贷款簿快速扩张，却无法维持让 SME
              组合表现良好的数据承销纪律，First Bank 式核销并非不可想象：First HoldCo 在 2025 年核销 ₦748B 坏账，利润暴跌 92%。


              **3. 监管风险（中高）：**

              CBN 曾在 2024 年 4 月冻结 Moniepoint 客户开户，并因合规违规罚款 ₦1B。新的全国性 MFB 牌照提高了可见度和审查强度。拟议中的 Nigerian Fintech Regulatory
              Commission Bill 将设立一个拥有广泛发牌权的中央监管机构。不利的 CBN 政策（例如 POS 费率上限、代理点限制）可能实质损害支付收入模型。


              **4. 未审计财务（阻断项）：**

              Moniepoint 尚未发布审计账目。所有收入、盈利能力和 NPL 数据，要么来自公司披露（未审计），要么来自第三方估算。这使标准 DCF 建模、比率分析或契约承销无法完成。在拿到审计 P&L
              之前，任何估值分析都有很大不确定性。


              **5. 竞争（中）：**

              OPay（5000 万用户，$4B IPO 目标）和 PalmPay（3500 万用户）正在激进扩张代理网络。Flutterwave（现已取得 MFB 牌照）正在进入 SME 银行业务。Moniepoint
              虽然拥有最大的 POS 足迹，但 SME 钱包份额竞争正在加剧。


              **6. 扩张执行风险（中）：**

              肯尼亚（收购 Sumac MFB）和英国（MonieWorld / 收购 Bancom）是资本密集的新市场，竞争格局也不同。英国团队自 2024 年 2 月以来已支出 $3.77M，但披露收入有限。如果 2–3
              年内无法在国际市场达到盈亏平衡，可能说明资本配置失当。
