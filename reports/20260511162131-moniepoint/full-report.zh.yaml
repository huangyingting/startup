  - id: FV001
    type: flow
    title: 投资决策逻辑
    slug: recommendation-logic
    summary: 结构化决策树从规模证据映射到估值分析，再落到「跟踪 / 继续研究」建议，并标出阻挡更高确信评级的关键缺口。
    claimRefs:
      - CV001
      - CV005
      - CV006
      - CV008
      - CV016
      - CV019
    data:
      nodes:
        - id: scale
          label: 规模证据
          detail: FY2025 交易量 ₦412T；尼日利亚 POS 份额约 80%；6M+ 家企业；14B 笔交易
        - id: profitability
          label: 盈利主张
          detail: 公司称其是首家实现盈利的非洲独角兽；机构 DFI 共同投资提供佐证
        - id: valuation_check
          label: 估值校验
          detail: 估值 $1B+，对应 0.8x–1.5x P/S；同业为 3–10x，看起来有折价
        - id: blocking_gap
          label: 阻断缺口
          detail: 无经审计 P&L；NPL 未验证；无招股书；无法按标准确信度下投资判断
        - id: peer_discount
          label: 同业折价背景
          detail: 奈拉风险 + 单一市场 + 流动性不足，相比发达市场可比公司可解释 50–70% 折价；但相对 OPay/Flutterwave 仍显便宜
        - id: adverse_flags
          label: 负面信号
          detail: ₦7B NPL 集中；CBN ₦1B 罚款（2024）；无公开财务；Flutterwave 现已成为 MFB 竞争对手
        - id: recommendation
          label: 跟踪 / 继续研究
          detail: 接触数据室；取得经审计账目；委托 NPL 抽样；跟踪 OPay IPO，作为同业定价信号
  - id: FV002
    type: bar
    title: 估值敏感性 —— 收入倍数情景（USD M）
    slug: valuation-sensitivity
    summary: 将不同 P/S 倍数套用于 $940M 收入中点（自下而上 $648M–$1.24B 区间的中点），得到 Moniepoint 隐含估值； 再与 OPay 和 Flutterwave 可比倍数推导出的同业隐含估值对照。
    claimRefs:
      - CV001
      - CV008
      - CV010
      - CV011
      - CV012
      - CV016
    data:
      items:
        - label: 悲观：0.8x P/S（$648M 收入）
          value: 518
          unit: USD M
          note: 低端收入 × 0.8x 倍数；当前估值标记接近这一水平
        - label: 基准：1.0x P/S（$940M 收入）
          value: 940
          unit: USD M
          note: 收入中点 × 1.0x；大体对应当前 $1B+ 估值标记
        - label: 乐观：2.0x P/S（$940M 收入）
          value: 1880
          unit: USD M
          note: 收入中点 × 2.0x；若盈利得到确认、非洲扩张按轨迹推进，该倍数可成立
        - label: OPay 同业：3x P/S（$940M 收入）
          value: 2820
          unit: USD M
          note: 将 OPay IPO 隐含的 3x 倍数套用于 Moniepoint 收入中点
        - label: Flutterwave 同业：5x P/S（$940M 收入）
          value: 4700
          unit: USD M
          note: 套用 Flutterwave 2022 年隐含 5x 倍数；上限情景；收入基数未验证
  - id: FV003
    type: range
    title: 各情景估值与回报区间
    slug: valuation-return-range
    summary: 从 $1B+ 入场出发，列出悲观、基准、乐观情景下的低 / 高估值区间与 5 年 IRR 区间。美元回报假设退出时将奈拉兑换为美元。
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV039
    data:
      items:
        - label: 悲观情景退出估值（USD M）
          low: 500
          high: 700
          unit: USD M
          note: 预计 FY2025 收入的 0.8x–1.1x；NPL 飙升、CBN 逆风、外汇侵蚀情景
        - label: 基准情景退出估值（USD M）
          low: 800
          high: 1500
          unit: USD M
          note: 近期为 FY2025 预计收入的 1x–1.5x；M&A 时约 2x FY2027 收入；仍以尼日利亚为主
        - label: 乐观情景退出估值（USD M）
          low: 1500
          high: 3500
          unit: USD M
          note: FY2027 预计收入的 2x–3x；IPO 或战略收购；非洲扩张落地
        - label: 5 年退出 IRR（悲观）
          low: -2
          high: 5
          unit: '%'
          note: 外汇侵蚀后，美元回报基本持平到为负；约 0.7x 现金回报倍数
        - label: 5 年退出 IRR（基准）
          low: 20
          high: 25
          unit: '%'
          note: 约 3x 现金回报倍数；以约 $3B M&A 退出；对应风险画像够用但不算突出
        - label: 5 年退出 IRR（乐观）
          low: 35
          high: 42
          unit: '%'
          note: 约 5–6x 现金回报倍数；以 $6B+ IPO / 战略退出；需要泛非扩张成功
  - id: FV004
    type: kpi
    title: 投资 KPI 仪表盘
    slug: investment-kpis
    summary: 截至 2026 年 5 月，Moniepoint 关键投资指标记分卡。数值来自公开和第三方来源；所有财务数字均为估计或公司披露（未经审计）。
    claimRefs:
      - CV001
      - CV006
      - CV008
      - CV009
      - CV022
      - CV039
    data:
      items:
        - label: 阶段
          value: Series C unicorn
          note: 融资 $200M，估值 $1B+，2024 年 10 月–2025 年 10 月
        - label: 收入估计（FY2025）
          value: $648M–$1.24B
          note: 自下而上按 MDR + Monnify + 利息估算；GetLatka 估计 $600M；均未经审计
        - label: 隐含 P/S 倍数
          value: 0.8x–1.5x
          note: 以 $648M–$1.24B 收入区间和 $1B 估值标记计算；相对同业有折价
        - label: 交易量（FY2025）
          value: ₦412T ($294B)
          note: 14B 笔交易；公司披露；FY2025 平均汇率 ₦1,400/$
        - label: 活跃企业
          value: 6M+
          note: 截至 2025 年末；公司披露；10M+ 总数包含个人银行客户
        - label: NPL 比率（估计）
          value: ~1.4% (₦7B on ₦500B book)
          note: 公司披露 NPL 为 ₦7B；贷款账簿为估算；低于尼日利亚银行 4–5% 平均水平
        - label: 盈利能力
          value: Claimed; unverified
          note: 公司称已盈利；无经审计账目；首家提出该主张的非洲独角兽
        - label: 外汇风险（美元投资者）
          value: High — Naira/USD
          note: 自 2022 年以来奈拉贬值 74%；当前阶段硬通货对冲很少
        - label: DFI 共同投资方
          value: IFC, Proparco, Swedfund
          note: 这一阶段出现 DFI 参与并不常见；释放影响力 / 可持续性验证信号
        - label: 建议
          value: Track / Research More
          note: 等待经审计账目；优先接触数据室；不要盲投
