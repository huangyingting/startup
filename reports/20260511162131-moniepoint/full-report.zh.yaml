      - number: '3.2'
        title: OPay——承受 IPO 压力的消费者钱包巨头
        blocks:
          - type: paragraph
            body: >
              OPay（Opera 子公司，获 SoftBank Vision Fund 2 支持）按用户数看是 Moniepoint 最强劲的竞争者；截至 2025 年，其在尼日利亚拥有 50 million+
              注册用户，融资放缓后估值仍估计为 $2.75 billion。OPay 在 2021 年 Series C 融资 $400 million——这是它最近一轮大额融资——据报道正计划 2026 年在美国
              IPO，并寻求 $4 billion 估值，因此上市前有很强动力展示增长指标。


              OPay 的核心产品是消费者移动钱包，支持 P2P 转账、账单支付、话费充值和代理现金存取服务。它最初靠代理网络建立主导地位——据报道 2020 年 POS 代理已超过
              300,000——之后维持了庞大的消费者用户基础。但在商户收单和中小企业银行侧，OPay 历来较弱；这些正是 Moniepoint 基础设施更强的领域。April 2024，OPay 因合规担忧被 CBN
              暂停新户入驻，显示其面临监管摩擦，而 Moniepoint 尚未在同等规模上遭遇类似问题。


              在 CBN 单一主平台规则下，OPay 的代理——其中很多此前同时使用多家服务商终端——被迫做独家选择。OPay 庞大的代理基础既是资产也是负担：它现在必须用 Moniepoint
              更强的商户工具和信贷产品来争夺并留住这些代理。mid-2025 月交易额 $12B 说明 OPay 交易规模很大，但其抽成率和盈利能力仍未披露。
