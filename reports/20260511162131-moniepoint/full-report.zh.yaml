      - number: '6.2'
        title: 采用轨迹与增长证据
        blocks:
          - type: paragraph
            body: >
              2023–2025 年间，Moniepoint 在所有可衡量维度上都保持一致的高增长动能。活跃业务客户在 2025 年同比增长约 50%，从 end-2024 估计 4 million 增至 year-end
              超过 6 million，并早于内部预测达到里程碑。POS 交易笔数从 2023 年 5.2 billion 增至 FY2025 的 14 billion，两年内接近翻三倍；总交易金额达到 NGN 412
              trillion（约 $294 billion）。活跃 POS 终端从 2022 年估计 80,000 台增至 end-2025 的 140,000+ 台。


              贷款垂直增长更快：Moniepoint MFB 服务的 SME 借款人从 2023 年约 20,000 名增至 FY2025 的 70,000+ 名，两年增长约 250%，累计发放贷款超过 NGN 1
              trillion。Monnify 开发者平台增长到 50,000+ 注册账户。CNBC 将 Moniepoint 纳入 2025 年全球金融科技 50 强榜单，引用了 6 million 业务客户和每月 $17
              billion 交易量。Moniepoint 目标到 end-2026 达到 9 million 业务客户，路径是个人银行扩张和农村市场渗透；这意味着继续维持与 2023–2025 轨迹一致的 50%
              年增长。2023 年奈拉现金危机成为关键获客事件，加速了此前依赖现金的商户首次采用电子支付。每台已部署 POS 终端估计每月处理 2,500 笔交易，单台部署收入密度很高。
