      - number: '5.5'
        title: 信任、安全、信息安全与合规
        blocks:
          - type: paragraph
            body: >
              Moniepoint 是 CBN 许可的 National Microfinance Bank，每年处理 ₦412T
              交易，处在尼日利亚金融科技公司可获得的最严格合规框架之一中；与此同时，公司还要应对一项未结数据保护调查，这是当前最主要的未决风险。


              **CBN 牌照 — National MFB 地位：** January 2026，CBN 将 Moniepoint MFB 的牌照从 unit MFB 升级为 National Microfinance
              Bank，允许其不受地域限制，在尼日利亚 36 个州和 FCT 经营分支和代理。这是尼日利亚非商业银行机构可获得的最高牌照层级，构成重要监管背书。Nairametrics 报道了此次升级；它与 OPay、Kuda
              获得的类似升级一致。


              **PCI DSS 合规：** 文件显示，Monnify 的 API 和卡处理基础设施符合 PCI DSS。Monnify 开发者文档声明合规，并引用相关标准。PCI DSS 合规要求每年由 Qualified
              Security Assessor 做第三方审计，Moniepoint 必须逐年维持。公开渠道没有可访问的审计报告；合规是公司声称，尚未被独立验证。


              **ISO 20022 迁移：** CBN 要求银行间报文在 October 2025 前切换到 ISO 20022 message formats。Moniepoint 的 2025 Year in
              Review 确认迁移已在 Q4 2025 完成，使其基础设施对齐新的 CBN/NIBSS 标准。


              **AML 与 KYC：** 作为 MFB，Moniepoint 遵循 CBN 完整 AML/KYC 框架，并与 FATF 建议保持一致。客户身份通过 BVN（Bank Verification Number）和
              NIN（National Identification Number）关联验证，二者均可通过 NIBSS 访问。交易监控系统使用 BigQuery ML 和 Vertex AI 做 AML
              分析，实时标记可疑模式。


              **POS Geo-Tagging：** CBN 的 August 2025 指令要求所有 POS 运营商在 60 天内为完整终端资产打地理标签，使 CBN 能够映射并监管尼日利亚已部署的 4.2 million
              台终端。Moniepoint 是最大的终端运营商之一，已公开承诺合规。这一要求也支持执行 April 2026 single-principal agent rule。


              **NDPC 调查 — 未结反向信号：** August 2025，Nigeria Data Protection Commission（NDPC）对 Moniepoint（以及
              Merrybet）展开调查，原因是其可能违反 Nigeria Data Protection Act 2023（NDP Act）。TechNext24 报道了这项调查。截至 May 2026
              研究日，调查结果尚未公开。NDP Act 要求数据控制者承担同意、数据最小化、跨境传输限制和数据泄露通知等义务。若出现不利结论，可能导致行政罚款或整改要求。这是产品与技术领域最重要的未决合规风险。


              **数据安全架构：** Moniepoint 的 Google Cloud 部署包括用于 DDoS 防护的 Cloud Armor、基于 IAM 的访问控制，以及 GCP
              标准功能中的静态和传输中加密。公司没有公开具体独立安全审计结果，也未发布正式漏洞赏金计划或渗透测试摘要。
