  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型架构
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的收入模型有四条主线：（1）POS 交易的商户折扣率（MDR）；（2）Monnify API 交易量上的网关费；（3）MFB 贷款账簿产生的净利息收入；以及（4）Moniebook
              和企业账户服务的月度 SaaS / 订阅费。


              **主线 1 —— POS MDR：** 每一笔通过 Moniepoint POS 终端处理的卡或 QR 交易，公司都会收取商户折扣率。CBN 将借记卡 POS 交易的交换费上限设为 0.5%（每笔最高
              ₦1,500），并扣除网络费和银行结算费。行业分析师估计，Moniepoint 在 ₦412 trillion FY2025 交易量上的有效混合 MDR 为 0.15–0.35%。按 0.25% 中点计算，对应约
              ₦1.03 trillion（按 ₦1,400/$1 约 $740M）POS 收入——这是最大单一收入线。不过，代理现金取款交易（交易量中很大一部分）经济性不同：代理直接赚取费用，因此 Moniepoint
              在现金取款部分的抽成可能更低。


              **主线 2 —— Monnify 网关：** Moniepoint 的 Monnify 网关在 FY2025 处理 ₦25 trillion。API 支付网关费通常为每笔交易 0.5% 至 1.5%。按
              ₦25T 交易额和估计 0.6% 有效率计算，Monnify 贡献约 ₦150 billion（~$107M）网关收入。它在价格上与 Paystack（~1.5%）和
              Flutterwave（~1.4%）竞争，费率可能更低。


              **主线 3 —— MFB 利息收入：** FY2025，Moniepoint MFB 向约 70,000 名借款人发放 ₦1 trillion 中小企业贷款。平均贷款规模约为每名借款人 ₦14.3M，期限
              12–24 周，按日 / 周还款。按混合年利率 28%（尼日利亚中小企业贷款区间 24–36% 的中点）计算，₦500B 平均未偿贷款账簿每年利息收入约为
              ₦140B（$100M）。这是利润率最高的收入线——扣除资金成本后的息差可超过 15–20%。


              **主线 4 —— SaaS / 订阅：** Moniebook（中小企业会计 + 薪资）按月收取订阅费。拥有 6M+ 活跃企业后，即便 ARPU
              很小，也能产生有意义的经常性收入。这是最小但最可预测的收入线；具体定价尚未公开披露。
