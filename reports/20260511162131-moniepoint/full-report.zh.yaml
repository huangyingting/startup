      - number: '4.4'
        title: 资本结构与融资
        blocks:
          - type: paragraph
            body: >
              Moniepoint 已通过多轮股权融资累计筹集约 $256M。最近且最大的一轮是 Series C：October 2024 首次交割 $110M（DPI、Google Africa
              Fund、Verod、Lightrock），October 2025 第二次交割 $90M（Visa、IFC、LeapFrog、Proparco、Swedfund、Alder Tree）。Series C
              总额超过 $200M。


              作为 MFB，Moniepoint 也通过银行资产负债表上的存款和借款获得资金。CBN National MFB 最低资本要求为 ₦5B（$3.6M）。以现有股本基础看，Moniepoint
              远高于这一最低线，但监管资本充足率（CAR）要求（MFB 通常为 10%）会限制它在不追加资本的情况下多激进地扩大贷款簿。


              Moniepoint 的 $200M Series C 资金主要投向：（a）贷款簿增长（扩大 SME 贷款）；（b）技术基础设施（提升 uptime）；（c）地理扩张（肯尼亚 Sumac MFB、英国
              MonieWorld）；（d）监管资本（满足 MFB 最低资本要求）。


              考虑到刚以 $1B+ 估值融到 $200M，Moniepoint 即便显著烧钱，也有 2–3 年运营跑道。发展金融机构（DFI）投资者（IFC、Proparco、Swedfund）还带来面向 SME
              转贷的优惠债务渠道，使 MFB 贷款簿的资金成本低于市场利率。


              重要的是，Moniepoint 没有公开债务。没有债券招股书，也没有上市债务证券，因此资本市场审视有限。融资依赖风险主要在股权侧：如果非洲金融科技融资环境恶化，后续融资可能更难，也更稀释。
            claimRefs:
