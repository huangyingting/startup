        - id: nibss
          label: NIBSS（结算轨道）
        - id: visa
          label: Visa（卡网络 + 投资方）
        - id: ifc
          label: IFC / World Bank（贷款）
        - id: cbn
          label: CBN（牌照方 / 监管方）
        - id: chinese_hw
          label: 中国 POS 硬件制造商
      edges:
        - from: moniepoint
          to: gcp
          label: 80%+ 基础设施（关键）
        - from: moniepoint
          to: confluent
          label: 实时事件流（关键）
        - from: moniepoint
          to: nibss
          label: 所有卡与转账结算（关键）
        - from: moniepoint
          to: visa
          label: 卡网络 + 股权投资方（高 / 有冲突）
        - from: moniepoint
          to: ifc
          label: 优惠信贷额度（中）
        - from: moniepoint
          to: cbn
          label: MFB 牌照 + 监管监督（关键）
        - from: moniepoint
          to: chinese_hw
