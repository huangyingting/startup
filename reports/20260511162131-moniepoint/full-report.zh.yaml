      - number: '7.5'
        title: 缓释措施与放弃标准
        blocks:
          - type: paragraph
            body: >
              Moniepoint 已经在主要风险类别上落地，或正在落地缓释措施。部分措施已经成熟并嵌入业务结构；另一些仍处早期，尚未经过大规模验证。


              **已落地的关键缓释措施：** (1) 地理多元化：MonieWorld UK（2024 年推出）和 Sumac Kenya（早期阶段）为奈拉集中风险提供外汇和地域对冲，不过两者尚未形成实质收入，收入兑现周期为
              2–3 年。(2) 资本充足缓冲：Series C 轮 $200M 股权注资，为 ₦5B 全国性 MFB 最低资本要求和信用损失准备提供了厚缓冲。(3) 自有 ML 信用评分：Moniepoint
              的信用风险模型用 POS 交易历史作为 SME 信用评分的替代数据；理论上，对非正式商户而言，这比传统征信分数能给出更好的风险信号，但模型表现尚未被独立验证。(4) 全国性 MFB 牌照稳定性：CBN 在
              2026 年 1 月将其升格为全国性 MFB，降低了监管降级风险，也释放出机构信任信号，同时抬高了合规义务。(5) IFC / World Bank
              合作：优惠性信贷额度相较商业贷款人降低资金成本，支撑净息差。(6) POS 离线优先设计：Moniepoint 支持离线的 POS 终端可在 NIBSS 或连接中断期间缓存店内交易，部分缓释了系统性清算依赖。


              **止损标准（投资逻辑破裂触发器）：** 以下情况会实质击穿投资逻辑，需要投资人立即重新评估：(a) CBN 暂停牌照，或限制支付业务、MFB 活动；(b) 披露的 NPL 比率超过 ₦1T+ 信贷簿的
              10%，且拨备不足；(c) EMAAR 集体诉讼获认证，索赔金额超过 ₦10B，形成重大或有负债；(d) CBN 将 MDR 上限下调至 0.3% 以下，消灭核心支付收入模型；(e) Google Cloud
              在尼日利亚营业时段宕机超过 24 小时，暴露灾难性的单云故障；(f) 无法满足 ₦5B 全国性 MFB 最低资本充足要求，并已确认 CBN 介入。


              **关键尽调问题：** (1) 管理账，按借款人批次和行业拆出 NPL 比率与拨备；(2) CBN 出具的资本充足证明，或管理层相对 ₦5B 最低要求的测算；(3) EMAAR 诉讼和 ₦21B
              欺诈案状态，以及外部律师意见；(4) 云架构文件，包括灾备、RTO/RPO 目标，以及多云或备份计划；(5) 代理点欺诈事件日志，以及 CBN 罚款后的 KYC 整改计划；(6) NDPC
              调查状态和带时间表的数据保护合规路线图。
