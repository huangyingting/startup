      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              **结构性增长驱动因素：**

              (a) 金融普惠政策硬要求：CBN 目标到 2030 年达到 95% 普惠率；代理银行是最后一公里交付的主要机制。

              (b) CBN 现金限制规定：2023 年推出的每周现金取款上限（个人 ₦500,000，企业 ₦5M）已让交易量持久转向数字渠道。仅 Q1 2025，POS 交易同比增长 301%。

              (c) 中小企业信贷供给不足：$32.2B 融资缺口，加上不到 5% 的中小微企业能获得银行信贷，为 Moniepoint MFB 创造了持续且庞大的放贷机会。

              (d) CBN 单一主平台规则（April 2026 生效）：每个 POS 代理必须只绑定一家服务商；这是整合催化剂，有利于规模大、资本充足的运营商，也可能成为 Moniepoint 在 2026
              年最关键的结构性顺风。

              (e) 尼日利亚年轻、移动优先的人口结构：智能手机渗透率超过 50%，且仍在增长；年龄中位数 18。


              **采用约束：**

              (a) 监管合规成本：全国级 MFB 身份（January 2026）要求 ₦5B 最低资本和显著更高的合规投入。2026 CBN Fintech Report 引入更强的消费者保护、数据本地化和 AML
              要求，抬高服务成本。

              (b) 宏观逆风：奈拉贬值（截至 2026 年为 ₦1,600/$1）侵蚀美元收入倍数，即便奈拉计价收入增长，也会压缩国际投资人回报。

              (c) 信用风险：高通胀环境（2024-2025 年 CPI 约 33%）下，中小企业 NPL 上升，威胁 Moniepoint 贷款账簿质量。

              (d) 基础设施：农村地区停电和互联网连接缺口增加 POS 停机时间，限制部署。

              (e) 信任壁垒：欺诈事件和 CBN 执法行动削弱商户和消费者对数字支付的信心，需要持续投入品牌建设。
