companyProfile:
  summary: >-
    Moniepoint（前身为 TeamApt）是一家总部位于尼日利亚拉各斯的金融科技公司，由 Tosin Eniolorunda 和 Felix Ike 于 2015 年创立。公司最初为银行提供 B2B 支付基础设施，2019 年获
    CBN 代理银行牌照批准后，转向直接服务商户。以 Moniepoint MFB（Microfinance Bank）身份运营后，公司搭建了尼日利亚最大的 POS 代理网络、全栈中小企业银行平台和营运资金贷款账簿。FY
    2025，公司处理 14 billion 笔交易、金额 ₦412 trillion（$294B），服务 6M+ 活跃企业客户；October 2024，Series C 首关 $110M、二关 $90M（合计
    $200M）后，投后估值达到 $1B，进入独角兽行列。Moniepoint 称其尼日利亚业务已实现经营盈利，并正投入国际扩张（通过 MonieWorld 服务英国侨民、推进泛非布局）。
