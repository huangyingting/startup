  - id: FR001
    type: matrix
    title: 风险热力图
    layout: standard
    summary: >-
      风险矩阵按发生可能性（行）和影响程度（列）展示 Moniepoint 的主要风险类别，并划分四个象限的严重等级。 监管 / 法律和信用 / NPL 风险集中在关键与高风险格子，说明发生可能性和影响都高。基础设施集中度为高影响 /
      中等可能性；外汇 / 宏观风险为中等影响 / 高可能性；人事风险为中等影响 / 低可能性。
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR007
      - CR012
      - CR013
      - CR027
      - CR031
    data:
      columns:
        - 低影响
        - 中等影响
        - 高影响
        - 关键影响
      rows:
        - label: 高可能性
          values:
            - 代理网络流失（CBN 单一主体规则）
            - 外汇 / 奈拉贬值；地理标记合规成本
            - CBN KYC/AML 重复执法；CAC 观察名单
            - ISO 20022 不合规 → NIBSS 断连
        - label: 中等可能性
          values:
            - CEO 集中度 / 接班缺口
            - MDR 上限压缩（CBN 指令）；POS 供应中断
            - EMAAR 集体诉讼；₦21B 欺诈法庭案件；NPL 加速上升
            - Google Cloud 单一供应商灾难性宕机
        - label: 低可能性
          values:
            - IFC / World Bank 政策变化（资金成本）
            - NDPC 执法罚款；Confluent Cloud 中断
            - 高级工程人才流失
            - CBN 暂停 MFB 牌照
  - id: FR002
    type: dag
    title: 风险传导图
    layout: wide
    summary: >-
      有向图展示监管、基础设施和金融模型层面的触发事件，如何传导为 Moniepoint 的运营、声誉和资本影响。 CBN 监管节点是中心度最高的风险源，路径通向牌照暂停、信贷限制和代理网络扰动。NIBSS 节点显示，
      基础设施依赖会制造系统性结算风险。
    claimRefs:
      - CR007
      - CR009
      - CR011
      - CR019
      - CR022
      - CR031
      - CR036
    data:
      nodes:
        - id: cbn
          label: CBN 监管行动
        - id: licence
          label: 牌照风险 / 暂停
        - id: nibss
          label: NIBSS 结算宕机
        - id: gcp
          label: Google Cloud 宕机
        - id: agent
          label: 代理银行规则 / 流失
        - id: npl
          label: NPL 加速上升
        - id: capital
          label: 资本充足率破线
        - id: ops
          label: 运营停摆
        - id: reput
          label: 声誉受损
        - id: mdr
          label: MDR 上限下调
      edges:
        - from: cbn
          to: licence
          label: 触发执法
        - from: cbn
          to: agent
          label: 强制单一主体规则
        - from: cbn
          to: mdr
          label: 下调 MDR 上限
        - from: nibss
          to: ops
          label: 传导为结算停摆
        - from: gcp
          to: ops
          label: 所有运营停摆
        - from: npl
          to: capital
          label: 侵蚀资本缓冲
        - from: capital
          to: cbn
          label: 触发 CBN 干预
        - from: licence
          to: ops
          label: 限制支付运营
        - from: ops
          to: reput
          label: 损害商户信任
  - id: FR003
    type: dag
    title: 依赖关系图
    layout: wide
    summary: 依赖关系图展示 Moniepoint 的关键外部依赖——云基础设施、支付轨道、资本提供方、监管机构和卡网络—— 以及每段关系带来的集中度风险。Moniepoint 位于中心，依赖向外辐射；边标签标明依赖类型及其关键程度。
    claimRefs:
      - CR019
      - CR022
      - CR027
      - CR032
      - CR033
      - CR036
