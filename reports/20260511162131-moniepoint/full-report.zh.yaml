            - 收入增长 30-60%；贷款还款率 >95%
            - 通过重复使用产品间接体现
            - 中（独立来源与公司撰写混合）
        - label: App Store 评论
          values:
            - 4.5/5，12K+ iOS 评论
            - 高（可观察）
            - 满意度可见，但业务结果数据有限
            - 部分可见（未跟踪重复评论或删除）
            - 高（独立平台）
        - label: Trustpilot 评论
          values:
            - 4.2/5 评分
            - 中（自选样本）
            - 满意度；提到结算速度
            - 公开数据看不到
            - 高（独立平台）
        - label: 记者商户访谈
          values:
            - Rest of World（2024）、TechCabal（2025）来源
            - 中
            - 好坏参半 —— 有增长，也有宕机投诉
            - 未量化
            - 高（独立新闻）
        - label: 政府 / 机构
          values:
            - Lagos State 税收征缴
            - 低（公开数据有限）
            - 公开未量化
            - 已确认上线运行
            - 中（仅二手媒体）
