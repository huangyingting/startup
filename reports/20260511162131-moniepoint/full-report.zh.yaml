      - number: '2.2'
        title: 市场规模测算——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              **TAM —— 自上而下的收入视角（IMARC）：** 尼日利亚金融科技收入市场 $1.31B（2025）→ $4.86B（2034），CAGR
              15.19%。该口径包括所有数字金融服务：支付、贷款、保险、储蓄和汇款。它低估了实际交易流市场，但反映了 Moniepoint 及同业可变现的收入。


              **TAM —— 交易额视角（CBN）：** 仅 POS 子板块在 Q1 2025 就处理 ₦10.51 trillion（~$7.5B）（同比增长 301%），意味着约 ₦42T 年化运行率。按 0.3%
              混合抽成率计算，对应 POS 板块每年约 ₦126B（~$90M）收入池。加上移动端 / 网页端转账、Monnify 网关流量（₦25T FY2025）和卡支付，尼日利亚支付收入池 2025 年估计为
              $400–$700M。纳入信贷和储蓄后，这个自下而上的数字与 IMARC 自上而下的 $1.31B 基本一致。


              **SAM —— Moniepoint 已覆盖的板块：** 尼日利亚的代理银行 / POS 商户收单 + 企业银行 + 中小企业信贷。基于其 2025 年交易份额（管理层称约占线下支付 80%）和 ₦412T
              处理量，Moniepoint 单家公司约占已报告 POS + 数字交易流的 37%。按公开披露指标和可比抽成率假设估计，其收入口径 SAM 为 $350–$600M。


              **SOM —— 2026 年现实可拿份额：** Moniepoint 当前已拿下的 SAM 份额体现在其收入上，独立估计为 $100–$300M（置信度低；见第 4 章）。2026
              年向英国汇款和肯尼亚小额金融扩张，会带来一个小但具战略意义的 SOM 组成部分。英国流向尼日利亚的汇款每年约 $3B（World Bank）；Moniepoint 的 MonieWorld 目标是拿下有意义份额。


              **尼日利亚宏观背景：** 尼日利亚成年人约 112 million。到 2023 年底，金融普惠率达到 64%（EFInA A2F survey），仍有约 40 million 成年人未被金融服务覆盖。CBN
              目标到 2030 年将普惠率提高到 95%，意味着 6 年内需让 34M 成年人纳入银行服务——这是数字优先运营商可触达的大池子。中小微企业（MSME）数量为 40+ million 家，占企业总数超过
              90%、GDP 约 48%，并面临有记录的 $32.2B 融资缺口（IFC estimate）。
