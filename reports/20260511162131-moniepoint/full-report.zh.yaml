  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与模块图谱
        blocks:
          - type: paragraph
            body: >
              Moniepoint 横跨 6 个清晰产品层，每一层都围绕尼日利亚 SME 和开发者定制，并通过紧密集成制造跨产品锁定。


              **第 1 层 — POS 终端（硬件 + 软件）：** Moniepoint 的旗舰产品是基于 Android 的 POS 终端，已部署到尼日利亚 36 个州。截至 FY2025，活跃终端超过 140,000
              台，合计处理 ₦412T（$294B）交易额——按部分分析师估计，约占尼日利亚线下电子支付的 80%。终端支持借记卡刷卡、二维码和 USSD 支付，断网时可离线运行，在标准条件下 5
              秒内完成交易。Moniepoint 通过自有的 1,500+ 现场支持代理网络部署，代理负责安装、培训和同日更换，形成纯软件竞争对手难以匹配的分销护城河。


              **第 2 层 — Monnify API（B2B 支付网关）：** Monnify 是 Moniepoint 面向开发者的 REST API 产品，用于线上收款和付款。它服务 50,000+
              注册开发者，FY2025 处理 ₦25T 总支付量。API 支持银行转账、卡支付、USSD 以及付款 / 代发；通过 OAuth 2.0 认证，提供 webhook 事件投递、BVN/NIN 身份验证，以及符合
              PCI DSS 的卡处理。SDK 覆盖 Node.js、PHP、Python、Android 和 iOS。Monnify 在尼日利亚 B2B 网关市场直接竞争 Paystack（Stripe 旗下）和
              Flutterwave。


              **第 3 层 — Moniepoint MFB（Microfinance Bank）：** 核心银行层支撑存款、支付和高频短期限 SME 贷款。FY2025，Moniepoint MFB 向约 70,000 名
              SME 借款人发放超过 ₦1T 信用。平均贷款约 ₦14.3M，期限 12–24 周，并从 POS 清算款中每日自动还款。信用评分使用自研 ML 模型，训练数据来自至少 6 个月 POS
              交易历史——Moniepoint 把支付网络变成了承保数据护城河，在尼日利亚银行业里没有直接等价物。


              **第 4 层 — Moniebook（SME Accounting SaaS）：** Moniebook 提供云端会计、开票和 payroll 管理，并直接接入 Moniepoint 企业活期账户。已创建超过
              6 million 个活跃企业账户。该产品瞄准仍用纸张或基础电子表格管钱的大量尼日利亚 SME。Moniebook 把财务管理与支付、贷款产品连接起来，加深客户锁定。


              **第 5 & 6 层 — 国际与开发者延伸：** MonieWorld 面向英国尼日利亚侨民提供 GBP-to-naira 汇款，2024 年上线，是 Moniepoint
              在尼日利亚之外的第一个产品。POS-as-a-Platform（PaaP）SDK 让独立软件供应商可以在 Moniepoint POS 终端上部署 Android 应用（每个应用最高 30MB，使用 Kotlin
              SDK 构建），从而形成第三方开发者生态和额外切换成本。Sumac Kenya 则代表 Moniepoint 对肯尼亚市场的早期进入，在独立实体下复制尼日利亚支付基础设施模型。
