      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的收入质量参差。POS MDR 收入流（估计 60–70% 毛利率）质量高、可重复、由交易驱动——它随商业活动放大，也受益于强网络效应。Monnify 网关同样具备重复性，且增长很快。MFB
              贷款收入毛利更高，但带有信用风险：₦7B NPL 披露是黄灯，尤其是 Alerzo、Shoprite 这类大额贷款集中在 Moniepoint 核心数据驱动 SME 模型之外。


              盈利说法有可能成立，但未经验证。按估计收入规模（折合 $600–940M）和支付业务 60–70% 毛利率，结合已披露员工数和 opex 结构，一张盈利 P&L
              在算术上说得通。不过，没有审计报表，就无法判断贷款损失准备、POS 硬件折旧和代理佣金如何处理。


              资本强度中等：POS 硬件部署需要前置 capex（140,000 台终端对应 ₦21B），但在当前交易量下回本很快。MFB 贷款簿需要营运资本（由存款 +
              股权提供），形成资产负债表杠杆；这对金融科技银行常见，但不同于纯软件公司。Series C 带来的跑道足够支撑 2–3 年。


              财务尽调必须拿到：（1）经审计 P&L 和资产负债表；（2）NPL 比率和拨备方法；（3）按板块拆分的收入（MDR / 网关 / 利息 / SaaS）；（4）奈拉与 USD 收入敏感性；（5）MFB 的资金成本。
