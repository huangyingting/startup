  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: |
              尼日利亚金融科技行业已从一批碎片化单点方案提供商，演变成一个多层生态。
              四个清晰的竞争战场同时展开：（1）面向商户收款的 POS / 代理银行；
              （2）消费者数字钱包和移动钱包；（3）面向电商和 SaaS 的 B2B 支付网关 API；
              以及（4）中小企业银行、信贷和嵌入式金融。没有单一玩家能同时主导
              四个战场——但 Moniepoint 是唯一一家能在所有战场上都可信竞争的公司，
              且持有 National Microfinance Bank（MFB）牌照，可做表内贷款。

              竞争格局由五股结构性力量塑造：（a）尼日利亚 112 million 成年人口，
              金融普惠率 64%（仍有 40M 未开户成年人）；（b）CBN 监管架构区分
              Payment Service Banks（PSBs）、代理银行超级代理和 MFBs——每类都有
              不同产品和资本约束；（c）April 2026 单一主平台 POS 规则，迫使
              每个代理只选择一个独家服务商；（d）$32.2B 中小企业融资缺口，代表巨大
              信贷机会；以及（e）奈拉结构性贬值，即便奈拉收入增长，也压缩
              美元回报。

              截至 mid-2026，主要竞争者可分三层。有规模的一线玩家：OPay
              和 PalmPay 主导消费者钱包份额；Moniepoint 主导商户侧 POS 交易量。二线
              网关专家：Flutterwave 和 Paystack 争夺开发者心智与 B2B 支付
              基础设施。三线利基和传统玩家：Kuda Bank（消费者数字银行）、MTN MoMo（电信 PSB）、
              Interswitch（传统基础设施）以及一线商业银行（Access、GTCO、Zenith）。
