      - number: '4.3'
        title: 成本结构与单位经济性
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的成本结构由三类驱动：（1）支付服务成本（网络费、清算成本、付给卡组织的交换费）；（2）信贷成本（资金成本、贷款损失准备）；（3）运营支出（员工、POS 硬件、现场代理、技术基础设施）。


              **支付成本：** Moniepoint 承担 Visa/Mastercard 的网络费用，并通过 NIBSS（Nigeria Interbank Settlement
              System）支付银行间清算成本。尼日利亚卡组织费用通常为交易额的 0.05–0.10%，按 ₦412T 交易量计算，对应
              ₦206B–₦412B（$147M–$294M）的网络成本。扣除网络成本后，支付业务毛利率估计为 MDR 总收入的 60–70%。


              **信贷成本：** Moniepoint MFB 需要为贷款簿筹资。若平均贷款余额为 ₦500B，即便存款 / 债务资金成本按 10% 计算，年度资金成本也有 ₦50B（$36M）。按 2% NPL
              计提率计算，贷款损失准备再增加 ₦10B（$7M）。扣除这些成本后，贷款簿净息差估计为 15–18%。


              **运营支出：** Moniepoint 据称在 Lagos 总部以及 Abuja、Nairobi、London 办公室雇用 2,000–5,000 人。若按 2,000 名员工、人均薪酬成本 ₦10M
              计，仅薪酬账单每年就是 ₦20B（$14M）。现场代理佣金、硬件部署（140,000+ 台 POS 终端，每台成本 ₦150,000 = 终端 capex ₦21B）和数据中心成本继续施压。总 opex 估计为
              ₦50–80B（$36–57M）。


              **单位经济 — POS 终端：** 一台已部署 POS 终端年交易额约 ₦2.94B（₦412T / 140,000 台终端）。在 0.25% MDR 下，每台终端年毛收入 ₦7.35M，对应硬件成本约
              ₦150,000（通常按 3 年摊销 = ₦50,000/年）。按当前交易量，POS 部署回本周期约 2–3 周。


              **单位经济 — SME 客户 LTV：** 一个活跃业务客户如果平均贷款 ₦14.3M，贡献 ₦4M 年利息，再加估计 ₦2M POS MDR，即每年约 ₦6M 收入。考虑到 MFB
              账户和终端粘性，流失率可能低于 10%，LTV 可能超过每个业务客户 ₦60M（$43,000）——相对获客成本，这是极高的比例。
