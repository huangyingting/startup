      - number: '1.3'
        title: 融资历史与投资人
        blocks:
          - type: paragraph
            body: >
              Moniepoint 已通过多轮股权融资累计募集约 $256 million。早期机构资金来自 QED Investors、Novastar Ventures、Global
              Ventures、FMO、British International Investment（BII）、Endeavor Catalyst 和 New Voices Fund。2022 年，公司以约 $400
              million 估值融资 $50 million。

              标志性的融资事件是分两批完成的 Series C。首关 $110 million 于 October 2024 宣布，由 Development Partners International（DPI）通过其
              African Development Partners（ADP）III 基金领投，Google's Africa Investment Fund、Verod Capital 和 Lightrock
              参与。这一首关把 Moniepoint 估值推至超过 $1 billion，使其成为非洲大陆第八家独角兽。

              第二关 $90 million 于 October 2025 完成，引入 Visa、International Finance Corporation（IFC）、LeapFrog
              Investments、Proparco、Swedfund 和 Alder Tree Investments。Series C 合计因此达到 $200
              million+，成为非洲历史上最大规模金融科技融资之一。Financial Technology Partners 担任独家财务顾问。

              Visa 的参与尤其重要：它既是战略伙伴（Moniepoint 现已通过 TeamApt 子公司持有 Visa 处理商和收单牌照），也是财务投资人，显示全球卡组织对 Moniepoint
              支付基础设施的认可。IFC 的进入带来发展金融背书，也让公司接入 IFC 在非洲各地面向 MSME 的项目网络。

              公司已公开表示自己在独角兽规模下盈利——这在非洲金融科技公司中很少见——并披露近几年收入 CAGR 超过 150%。
