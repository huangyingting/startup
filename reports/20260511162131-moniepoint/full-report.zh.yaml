      - number: '4.2'
        title: 收入估计与第三方参照
        blocks:
          - type: paragraph
            body: >
              Moniepoint 尚未披露经审计收入数据。外部估计差异很大：


              **GetLatka 估计（$600M ARR，2025）：** 数据平台 GetLatka 通过众包方式收集 SaaS 收入数据，发布了 Moniepoint 2025 年年收入约 $600M 的估计。按
              2025 年平均奈拉汇率 ₦1,400/$1 计算，这相当于约 ₦840B。不过，对这类公司而言，GetLatka 方法不透明（相比支付 + 贷款业务，它更适用于纯 SaaS 模型），因此该数字应视为上限估计。


              **自下而上的支付交易量模型：** 使用 Moniepoint 披露的 FY2025 交易量 ₦412T 和行业标准 MDR 区间：按 0.15% 抽成率，隐含支付收入为 ₦618B（$441M）；按
              0.35%，为 ₦1.44T（$1.03B）。加上 Monnify（₦150B）和利息收入（₦140B），总估计收入区间为 ₦908B–₦1.73T（$648M–$1.24B）。约
              ₦1.32T（$940M）的中点，是最可信的中心估计。


              **盈利主张：** Moniepoint 已表示其盈利。African Pact 关于其 $200M Series C 的文章明确提到，Moniepoint
              在融资前已实现盈利，这对尼日利亚金融科技公司而言并不常见。不过，会计处理方式（经营利润 vs. GAAP 净利润；贷款损失是否充分计提）无法独立验证。


              **NPL 逆风：** Hallmark News 报道称，截至 2026 年初，Moniepoint 不良贷款约达 ₦7 billion，源自激进放贷——包括对 Alerzo Ltd（₦5B）和 Retail
              Supermarkets/Shoprite（₦2.4B）的大额敞口，偏离了其核心的数据驱动、短期限中小企业模型。以 ₦500B 平均贷款账簿对应 ₦7B NPL，NPL 率约 1.4%——低于尼日利亚银行体系
              4–5% 的平均水平，但高于以往年份。未来贷款账簿增长需要谨慎管理 NPL。
