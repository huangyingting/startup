  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与基础盘概览
        blocks:
          - type: paragraph
            body: >
              截至 FY2025，Moniepoint 活跃业务客户达到 6 million，奠定了其尼日利亚领先 SME 金融服务平台、也是西非同类最大平台的地位。客户基础广而分散，横跨 6
              个主要分层：食品、时尚和电子品类的微型零售商（最大分层，估计约 3 million 家企业）；包括药店、美发沙龙和餐厅在内的中小商户（约 1.5 million）；在农村和城郊区域经营的农业和市场商贩（估计
              800,000 家企业）；通过 Monnify B2B 支付网关接入的在线电商商户和开发者（50,000+ 注册开发者、数十万在线商户）；通过 Moniepoint MFB 获取营运资金信贷的 SME
              小额金融借款人（70,000+ 企业）；以及由 MonieWorld 服务、仍处早期的英国尼日利亚侨民分层。


              地理上，Moniepoint 覆盖尼日利亚 36 个州，但客户仍最集中在 Lagos、Kano、Rivers 和 Ogun。约 250,000 名现场代理构成的代理银行网络是主要获客渠道，把 Moniepoint
              延伸到缺少传统银行基础设施的农村和城郊市场。满意商户的口碑转介绍是主要自然获客机制；相比竞争对手和传统银行，同日清算的可靠性进一步强化了转介绍。Moniepoint 的 Monnify gateway 服务
              50,000+ 注册开发者，支撑数十万在线商户。英国 MonieWorld 产品瞄准英国 250,000+ 尼日利亚侨民。综合所有分层，Moniepoint 按价值估计占尼日利亚 POS 交易量的
              40-45%，领先 OPay 和 PalmPay；驱动因素是其集成多产品平台，以及沿商户生命周期累积的结构性切换成本。
