      - number: '6.4'
        title: 留存、满意度、扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              行业分析师估计 Moniepoint 年度商户留存率为 85-90%，主要由多产品锁定驱动：使用 POS 终端、MFB 企业账户、Monnify gateway 和 Moniebook
              账务的商户，如果迁移，就必须同时替换 4 个集成产品，切换成本很高。队列模型显示，2022–2025 各商户批次的留存在改善，与产品采用加深、客户 tenure
              随时间增加相符。不过，经审计留存数据、按队列或产品层级拆分的净收入留存（NRR）或总收入留存（GRR）并未公开；尽调必须向资料室索取。多产品 ARPU 估计为仅使用 POS 商户的
              3-5x，商户沿产品阶梯上移时，客户终身价值大幅提高。隐含 cohort 留存趋势显示，连续批次在改善，与平台粘性增强一致。


              客户满意度指标很强：Moniepoint Business Banking iOS app 在尼日利亚获得 12,000+ 条评价，评分 4.5/5；Trustpilot 开放用户评价为
              4.2/5，二者都高于典型金融科技基准。估计超过 60% 的 MFB 借款人会重复使用信贷产品。


              地理和行业集中风险显著。约 40% 客户位于 Lagos 和 South West，约 70% 客户基础来自非正规部门 SME，使 Moniepoint 收入容易受奈拉贬值、燃油价格冲击以及 CBN
              single-principal agent banking rule 等政策变化影响。单一客户收入占比估计均不超过总收入 1%，限制了单一客户集中风险。通过英国 MonieWorld 和肯尼亚 Sumac
              MFB 收购做国际多元化已经启动，但仍早期且未量化。CBN single-principal rule、OPay 与 PalmPay 价格竞争，以及基础设施中断风险，是近期主要逆风。
