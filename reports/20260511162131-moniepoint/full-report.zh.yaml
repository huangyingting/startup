  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点
        blocks:
          - type: paragraph
            body: >
              Moniepoint 在尼日利亚数字支付市场占据结构性优势。FY2025 交易额 ₦412T（140 亿笔交易，估计覆盖全国线下 POS 支付约 80%）、600 万+
              活跃企业客户，以及公司声称的盈利里程碑——非洲独角兽中首个达成——共同构成了一个有吸引力的基本面故事。


              $200M+ Series C 轮分两次交割完成（2024 年 10 月由 DPI 领投 $110M，2025 年 10 月由 LeapFrog 锚定
              $90M），吸引了少见的多元投资人组合：商业基金（DPI、QED）、影响力基金（LeapFrog、Lightrock）、战略企业（Visa、Google Africa Investment
              Fund）和发展金融机构（IFC、Proparco、Swedfund）。DFI 在这一阶段参与并不常见，说明 Moniepoint 将商业回报与发展影响结合的论点，能通过最高尽调标准机构的审视。


              在这一背景下，$1B+ 的投后估值，对应 FY2025 估算收入 $648M–$1.24B 的约 0.8x–1.5x P/S（采用自下而上的支付交易额模型，MDR 为 0.15%–0.35%，并加上
              Monnify 网关和利息收入）。相较非洲 fintech 同业，这是显著折价：OPay 在 $2.75B–$4B 估值区间内，对应约 3–5x 隐含收入倍数；Flutterwave 2022 年 $3B
              估值对应约 5–10x。表面看，Moniepoint 相对同业被低估；但考虑到没有审计财报、收入集中在单一奈拉计价市场，以及 ₦7B 不良贷款，这个折价并非不理性。


              该论点立在四根支柱上：(1) 市场领导地位——Moniepoint 处理的 POS 交易多于任何一家尼日利亚机构；(2) 嵌入式转换成本——SME
              把支付、贷款、记账（Moniebook）和薪资都放在一个平台上，流失成本高；(3) 数据优势——多年交易数据支撑更好的信用承销；(4) 机构背书——Visa、IFC 和 Google
              参与，确认了基础设施属性。反向论点集中在：美元投资人的奈拉外汇风险、未审计财报无法验证 P&L、NPL 集中风险，以及行动积极的 CBN 带来的监管不确定性。


              我们的总体建议是 **跟踪 / 继续研究**：在投入资本前，等待审计财报披露，并完成完整数据室审查。按当前估算，估值合理；若进入牛市情景，则明显便宜。
