  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重度排序
        blocks:
          - type: paragraph
            body: >
              Moniepoint 的风险画像不对称地偏向监管执法和信贷集中，基础设施与宏观风险是第二层暴露。


              **最高层风险（关键 / 高影响 + 高概率）：** 监管风险位于顶端。Moniepoint 在 Q2 2024 因 KYC/AML 违规被 CBN 罚款
              ₦1B——这不是警告信，而是正式且重大的执法行动。活跃诉讼进一步叠加风险：Federal High Court 将 Moniepoint 加入一起 ₦21B POS 商户欺诈案；EMAAR Ponzi
              scheme 受害者威胁提起集体诉讼，指称 Moniepoint 宽松 KYC 放大了欺诈。CBN 已证明愿意对尼日利亚最大金融科技公司施以重大处罚，因此重复违规或牌照受限是投资必须纳入的情景，不是极端尾部风险。


              **第二层风险（高影响 / 中等概率）：** NPL 集中是关键财务风险。两名借款人——Alerzo（约 ₦4.38B 未偿）和 Shoprite Nigeria（约 ₦2.4B）——占已披露 ₦7B NPL
              贷款簿的大多数。面对 FY2025 激进的 ₦1T 信贷发放，真实全系统 NPL ratio 并未公开。尼日利亚 30%+ 通胀环境下，一旦信用周期转向，NPL 形成可能迅速放大。基础设施集中（Google
              Cloud 作为主要 / 唯一供应商）与 NPL 风险并列：单一 GCP 区域中断可能同时停止所有 Moniepoint 运营。


              **第三层风险（中等影响 / 中等概率）：** FX/宏观风险——奈拉自 2022 年以来兑 USD 贬值约 75%——以及 MDR 压缩风险（CBN 将费率上限下调 0.1% 就会消除约 ₦412B 年化
              MDR 收入），都是重大但部分可对冲的风险。人员与执行风险——CEO 风险集中、未经验证的国际扩张记录、竞争激烈的人才市场——构成第三层风险的其余部分。


              投资含义：如果监管合规姿态得到强化、NPL 贷款簿完成压力测试、云冗余方案有文档支撑，这一风险画像可以管理。放弃标准包括 CBN 牌照暂停、NPL 超过信用贷款簿 10%，或 EMAAR
              集体诉讼获认证且损害赔偿超过 ₦10B。
