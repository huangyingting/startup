  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Moniepoint
              位于尼日利亚三个相互重叠的市场交叉点：代理银行和商户收单（其起家且占主导的板块）、中小企业数字银行（企业活期账户、薪资和资金管理），以及中小企业信贷（营运资金贷款和小额贷款）。第二个仍处早期的板块是出境汇款（MonieWorld，英国，April
              2025 上线）和泛非小额金融（2025 年收购肯尼亚 Sumac MFB）。


              最宽的市场是尼日利亚整体金融服务的可触达机会。CBN 将数字支付走廊定义为所有电子资金转移（NIP、RTGS、NCS、POS、移动钱包、USSD 和网页端）。尼日利亚数字交易总额在 2024 年达到
              ₦1,100+ trillion（~$780B），高于 2022 年估计的 ₦700 trillion，驱动因素包括 CBN
              现金限制政策和智能手机广泛普及。这是总交易流，不是收入——支付处理商通常从这类流量中收取 0.1–0.5% 抽成率。


              可直接变现的可触达支出更小。IMARC Group 估计，尼日利亚金融科技收入市场——来自数字金融服务的费用、价差和利息收入——2025 年约为 $1.31 billion，到 2034 年增至 $4.86
              billion（CAGR 15.19%）。Novatia Consulting 另行估计，数字支付子市场（不含信贷）到 2026 年按名义交易额计算 TAM 可能超过 $50
              billion，但收入含义完全不同。这些估计采用的边界口径不同，不应相加。


              Moniepoint 的 SAM 排除项包括：企业资金管理和大型企业 ERP 支付（由银行和 Interswitch 服务）、大型电商平台的国际支付网关（由 Flutterwave 和 Paystack 以
              B2B 模式服务）、CBN 持牌移动钱包运营商（MTN MoMo、Airtel Money——电信主导），以及尼日利亚境内消费者 P2P 汇款（规模小、利润低）。Moniepoint
              代理银行产品的现状替代品，是银行网点柜台现金服务、非正式储蓄小组（ajo/esusu）和无监管 POS 运营商。
