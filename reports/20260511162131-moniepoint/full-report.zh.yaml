      - number: '3.7'
        title: 竞争威胁与风险情景
        blocks:
          - type: paragraph
            body: >
              尽管竞争位置很强，Moniepoint 在 2026-2028 年仍面临三项实质竞争威胁：


              **威胁 1 —— OPay 受 IPO 驱动的进攻：** OPay 以美国上市为目标、寻求 $4B 估值，因此有强烈动机在商户收单和中小企业银行上展示增长——这会直接竞争 Moniepoint
              核心市场。OPay 历史累计融资 $570M，背后有 SoftBank 深度支持，可能发起补贴 POS 推广、提高代理佣金，或收购互补 MFB 来匹配 Moniepoint
              的放贷能力。单一主平台规则推动代理网络整合，创造了关键 12-24 个月窗口；OPay 会在这段时间强力争夺代理归属。


              **威胁 2 —— Flutterwave 的银行转向：** Flutterwave 获得 MFB 牌照并收购 Mono（open banking API），使其能够向尼日利亚中小企业提供银行 +
              网关一体化服务。如果执行顺利，它可能侵蚀 Moniepoint 的 Monnify 网关市场份额，并争夺正式中小企业银行板块（同时使用网关和银行账户的企业）。Flutterwave 的 $3B
              估值为收购和补贴定价提供资本。


              **威胁 3 —— 监管收紧：** CBN 的 ₦1B KYC 罚款（2024）表明，即便是主导玩家，监管也愿意处罚。Moniepoint 的全国级 MFB 身份提高监管审查强度（₦5B 最低资本、强化 AML
              报告、消费者保护要求），合规成本会不成比例上升。如果监管机构对 MDR 或贷款利率实施价格管制，Moniepoint 的经济性可能迅速被压缩。
