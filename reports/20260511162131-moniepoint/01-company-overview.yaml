company:
  name: Moniepoint
chapter:
  number: 1
  title: Company Overview
  summary: >
    Moniepoint Inc. (formerly TeamApt Inc.) is a Lagos-headquartered Nigerian fintech unicorn founded in 2015
    by Tosin Eniolorunda and Felix Ike. Through a decade of evolution from bank-infrastructure provider to
    Nigeria's largest merchant acquirer, Moniepoint now processes ₦412 trillion ($294 billion) in annual
    transactions, serves over 10 million active businesses and individuals, and holds a $1 billion+ valuation
    after completing a $200 million Series C in 2025.
sections:
  - id: identity-and-history
    title: Company Identity and History
    body: >
      Moniepoint Inc., incorporated formerly as TeamApt Inc., is a Nigerian-headquartered fintech company
      providing an all-in-one financial platform for businesses and their customers across Africa. The
      company was founded in Lagos, Nigeria in 2015 by Tosin Eniolorunda and Felix Ike, who met while
      working in Nigerian technology and banking circles. Eniolorunda previously worked at Interswitch,
      one of Nigeria's premier payments infrastructure companies, giving him deep insight into the
      country's payment ecosystem and its structural gaps.

      In its earliest years, TeamApt focused on building payment infrastructure and back-end software for
      traditional Nigerian banks. The company served as a technology partner to major banks, helping
      modernise their payment stacks and settlement systems. This phase gave TeamApt a granular
      understanding of where banks failed their customers: slow transaction settlement, high decline
      rates, and poor visibility into transaction flows.

      In 2019, TeamApt made a strategic pivot, obtaining an agency banking license from the Central Bank
      of Nigeria (CBN) and launching the Moniepoint brand to serve merchants and small businesses
      directly. The product — initially a point-of-sale terminal for merchant payment acceptance —
      quickly gained traction during Nigeria's 2023 cash crisis, when the government's currency
      redesign exercise caused widespread cash shortages and forced businesses to rely on digital
      payment rails. Moniepoint's reliability and instant reversal capability during that period drove
      rapid adoption across Nigeria's 774 local government areas.

      In 2023, TeamApt formally rebranded the parent company to align with its flagship product, fully
      becoming Moniepoint Inc. This reflected the brand's enormous recognition among Nigerian SMEs and
      the company's desire to bring the corporate identity closer to its customer base. Today, Moniepoint
      is headquartered in Lagos, Nigeria, with a growing UK subsidiary (Moniepoint GB) in London.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: founders-and-leadership
    title: Founders and Leadership
    body: >
      Moniepoint's leadership is anchored by its two co-founders, Tosin Eniolorunda (Group CEO and
      Founder) and Felix Ike (Co-Founder and Chief Information Technology Officer). Eniolorunda's
      background at Interswitch — one of Africa's most significant payment infrastructure companies —
      directly informed Moniepoint's technical-first approach to building payment rails that could
      outperform legacy bank systems. His leadership style emphasises discipline, ownership, and
      consistency, and he has steered the company from a quiet B2B infrastructure provider to Africa's
      most significant merchant acquirer.

      Felix Ike serves as the technology architect behind Moniepoint's core platforms. His engineering
      leadership built the distributed systems that enable Moniepoint's 444 transactions-per-second
      throughput and industry-leading reliability. The company's engineering culture — shaped by Ike —
      prioritises low-latency settlement and high availability, the two factors merchants cite most
      frequently when choosing Moniepoint over competitors.

      Beyond the two co-founders, Moniepoint has assembled a deep executive team including Babatunde
      Olofin (Managing Director, Moniepoint MFB), Solomon Amadi (VP, Payment Infrastructure), Tunde
      Olofin (Managing Director of the banking arm), and Edidiong Uwemakpan (VP, Communications). The
      bench strength reduces key-person risk somewhat, though Eniolorunda's external visibility and
      fundraising relationships remain heavily concentrated at the CEO level.

      Moniepoint's governance reflects a private company with no public board disclosure. DPI, LeapFrog,
      and other Series C investors are presumed to hold board observer or director seats per standard
      venture terms, but specific board composition has not been publicly disclosed.
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014]
    tableRefs: [TO002]

  - id: funding-and-investors
    title: Funding History and Investors
    body: >
      Moniepoint has raised approximately $256 million in total equity financing across multiple rounds.
      Early institutional capital came from QED Investors, Novastar Ventures, Global Ventures, FMO,
      British International Investment (BII), Endeavor Catalyst, and New Voices Fund. In 2022, the
      company raised $50 million at an approximate $400 million valuation.

      The defining financing event was the Series C, executed in two tranches. The first close of $110
      million was announced in October 2024, led by Development Partners International (DPI) through
      its African Development Partners (ADP) III fund, with participation from Google's Africa
      Investment Fund, Verod Capital, and Lightrock. This first close valued Moniepoint at over $1
      billion, granting unicorn status — the continent's eighth.

      A second close of $90 million followed in October 2025, introducing Visa, the International
      Finance Corporation (IFC), LeapFrog Investments, Proparco, Swedfund, and Alder Tree Investments.
      The total Series C thus reached $200 million+, making it one of the largest fintech fundraises in
      African history. Financial Technology Partners acted as exclusive financial advisor.

      Visa's participation is particularly notable: it is both a strategic partner (Moniepoint now holds
      Visa processor and acquirer licenses through its TeamApt subsidiary) and a financial investor,
      signalling global card-scheme validation of Moniepoint's payment infrastructure. The IFC's
      involvement brings development-finance credibility and access to IFC's network of MSME-focused
      programmes across Africa.

      The company has publicly stated it is profitable at unicorn scale — a rare distinction among
      African fintechs — and discloses revenue growing at over 150% CAGR in recent years.
    claimRefs: [CO015, CO016, CO017, CO018, CO019, CO020, CO021, CO022, CO023]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: business-model-and-products
    title: Business Model and Products
    body: >
      Moniepoint operates a vertically integrated financial services platform targeting Nigeria's vast
      informal economy, which accounts for 83% of employment on the African continent. The company's
      business model is centred on merchant acquiring (POS terminals deployed to businesses) as the
      initial hook, with adjacent financial services — lending, banking, FX, and business management
      tools — generating incremental revenue and deepening lock-in.

      Revenue comes from multiple streams: (1) transaction fees on POS and digital transfer volumes
      (estimated 0.1–0.5% take rate across channels); (2) interest income on working capital loans
      disbursed through Moniepoint Microfinance Bank; (3) subscription fees for Moniebook (₦6,000–
      ₦8,500/month); and (4) FX spreads on cross-border and remittance transactions. With ₦412
      trillion processed in 2025, TechCabal estimates gross payment revenue between ₦412 billion and
      ₦2 trillion depending on channel mix.

      Products span: (a) POS terminals and payment acceptance — ubiquitous across Nigeria's 774 LGAs;
      (b) Moniepoint business banking accounts; (c) credit and working capital loans underwritten via
      alternative data (transaction history, payment behaviour); (d) Monnify web payment gateway (₦25
      trillion processed in 2025); (e) Moniebook — an all-in-one POS + bookkeeping solution; and
      (f) MonieWorld — a UK-launched remittance service for the African diaspora (April 2025). The
      company also operates a personal banking vertical (launched August 2023) that grew 2,000% in
      its first year.

      Moniepoint's distribution relies on over 600,000 "business managers" — community-embedded agents
      who earn commissions onboarding merchants and deploying POS terminals. This human-channel
      distribution model has proven more resilient than purely digital approaches in Nigeria's
      semi-formal economy, where trust is built through physical relationships.
    claimRefs: [CO024, CO025, CO026, CO027, CO028, CO029, CO030, CO031]
    figureRefs: [FO002]

  - id: scale-and-regulatory-footprint
    title: Scale, Key Metrics, and Regulatory Footprint
    body: >
      As of early 2026, Moniepoint serves over 10 million active businesses and individuals across
      Nigeria. Separately, its blog describes 20 million businesses and individuals across its platform
      — the discrepancy likely reflects different definitions of "active" vs. registered. The more
      conservative 10 million active figure comes from the January 2025 MonieWorld launch press release
      and the October 2025 Series C close announcement.

      Moniepoint's 2025 operational performance was exceptional by any measure: 14 billion transactions
      processed (up 169% from 5.2 billion in 2023); ₦412 trillion in transaction value (up 96% from
      $150 billion in 2023); 80% of Nigeria's in-person payments flowing through Moniepoint rails; and
      over ₦1 trillion in SME loans disbursed through Moniepoint MFB.

      On headcount, public estimates range from 3,700 to 5,200 employees as of early 2026, reflecting
      rapid scaling and definitional differences (contractors vs. direct employees). The company
      reported 36% employee growth in its most recent disclosed period.

      Moniepoint holds the following licences in Nigeria: (1) Microfinance Bank licence, upgraded to
      National status by the CBN in January 2026; (2) Payment Terminal Service Provider (PTSP) licence;
      (3) Switching and Processing licence via TeamApt Ltd; and (4) Mastercard and Visa processor and
      acquirer licences obtained in 2025 after a rigorous certification process.

      In January 2026, the CBN upgraded Moniepoint MFB's licence to national status, requiring a minimum
      capital base of ₦5 billion, stricter KYC/AML compliance, and physical presence in key areas.
      This followed a ₦1 billion CBN penalty levied on Moniepoint in 2024 for KYC non-compliance —
      an adverse regulatory event that underscores heightened scrutiny on digital financial platforms.
    claimRefs: [CO032, CO033, CO034, CO035, CO036, CO037, CO038, CO039, CO040, CO041]
    tableRefs: [TO001]
