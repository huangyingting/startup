callouts:
  - calloutType: strength
    title: Dominant Nigeria Payment Infrastructure
    body: >
      Moniepoint processes approximately 80% of Nigeria's in-person payments, handling 14 billion
      transactions worth $294 billion in 2025. This transaction market dominance is near-unprecedented
      in African fintech and creates extraordinary data advantages for credit underwriting and product
      expansion. The company reportedly generates 2.4x the electronic fee revenue of Nigeria's eight
      largest banks combined.
    claimRefs: [CO032, CO033, CO034]

  - calloutType: strength
    title: Profitable at Unicorn Scale — Rare African Distinction
    body: >
      Moniepoint is publicly described as profitable at unicorn scale — the first African fintech to
      achieve this milestone. This profitability, combined with 150%+ CAGR revenue growth, makes
      Moniepoint an outlier in a sector where most comparably-scaled competitors operate at losses.
      It also strengthens resilience against market volatility and reduces dilution pressure.
    claimRefs: [CO037, CO038]

  - calloutType: risk
    title: Regulatory Enforcement History — KYC Fine
    body: >
      In 2024, the CBN levied a ₦1 billion KYC compliance penalty on Moniepoint — the largest such
      fine in Nigerian fintech. While the company subsequently secured national MFB status in 2026,
      this enforcement history signals elevated regulatory scrutiny and the risk of future actions if
      compliance standards are not maintained at scale.
    claimRefs: [CO041, CO040]

  - calloutType: insight
    title: From Bank Back-End to National Infrastructure
    body: >
      Moniepoint's decade-long journey illustrates a deliberate strategy: gain deep understanding of
      the incumbent's weaknesses while serving as their vendor, then disintermediate. By starting
      with bank software infrastructure, TeamApt acquired knowledge of settlement failure points that
      it later exploited to build more reliable merchant-facing rails.
    claimRefs: [CO003, CO004, CO005, CO024]

