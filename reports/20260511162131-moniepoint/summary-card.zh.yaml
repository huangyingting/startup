summary:
  headline: >-
    Moniepoint 是尼日利亚 SME 支付和银行基础设施的事实龙头——14B 笔交易、$294B TPV、6M+ 商户；$1B 估值约等于收入的 ~1.7x，较同业压缩。但 CBN 执法仍在推进、NPL
    不透明且没有经审计财务，新资金若按超过 $2B pre-money 投入，必须先做严格的开放账本承销。
