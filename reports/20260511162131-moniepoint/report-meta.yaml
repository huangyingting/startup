companyProfile:
  summary: >-
    Moniepoint (formerly TeamApt) is a Lagos, Nigeria-based fintech company founded in 2015 by Tosin
    Eniolorunda and Felix Ike. Originally a B2B payments infrastructure provider for banks, it pivoted
    in 2019 to direct merchant services with CBN agency banking licence approval. As Moniepoint MFB
    (Microfinance Bank), it operates Nigeria's largest POS agent network, a full-stack SME banking
    platform, and a working-capital lending book. The company processed 14 billion transactions worth
    ₦412 trillion ($294B) in FY 2025, serves 6M+ active business customers, and achieved unicorn
    status in October 2024 with a $1B post-money valuation following a $110M first close and $90M
    second close of its Series C (total: $200M). Moniepoint claims operating profitability on its
    Nigerian business and is investing in international expansion (UK diaspora via MonieWorld,
    pan-Africa ambitions).
  foundedDate: "2015-01-01"
  founders:
    - name: "Tosin Eniolorunda"
      role: "Co-Founder & CEO"
      background: >-
        Previously a senior engineering leader at Interswitch, Nigeria's largest payment infrastructure
        company, before founding TeamApt in 2015. Leads product strategy, regulatory relationships,
        and international expansion as CEO.
      claimRefs: [CO002, CO007]
    - name: "Felix Ike"
      role: "Co-Founder & CTO"
      background: >-
        Technology co-founder with engineering background in distributed systems and payment
        infrastructure. Leads Moniepoint's 600+ microservices engineering organisation.
      claimRefs: [CO002]
  foundingLocation: "Lagos, Nigeria"
  headquarters: "Lagos, Nigeria"
  productSummary: >-
    Moniepoint's platform spans: (1) POS terminal network (140K+ terminals, 600K+ agent managers,
    agency banking and cash-in/cash-out); (2) SME business accounts (business current account,
    Moniepoint MFB deposits); (3) working capital lending (₦1T+ disbursed FY 2025, ML-scored via
    transaction history); (4) Monnify web payment gateway (₦25T processed 2025); (5) Moniebook
    POS-integrated accounting (₦6,000–₦8,500/month); (6) MonieWorld UK diaspora remittance (zero
    fee, launched April 2025); and (7) Moniepoint personal banking app (retail banking, transfers,
    bill pay, airtime).
  customerFocus: >-
    Primary: Nigerian MSMEs and micro-merchants across all 36 states, particularly in the informal
    economy (retail, hospitality, logistics, healthcare). Secondary: individual consumers via personal
    banking product launched August 2023. Tertiary: Nigerian diaspora in the UK via MonieWorld.
  businessModel: >-
    Revenue from: transaction fees (MDR on POS/card at 0.1–0.5% per transaction); interest income
    on SME working capital loans (30–40% annualised rates); Moniebook subscription fees; Monnify
    gateway fees; and FX/remittance spreads on MonieWorld. Claimed profitable on a consolidated
    Nigeria basis with 150%+ CAGR revenue growth since 2021.
  stage: "Series C"
  fundingStatus: >-
    Series C: $110M first close (October 2024, $1B+ valuation, lead: DPI; co: Google Africa Fund,
    Verod, Lightrock, Alder Tree) + $90M second close (2025; Visa, IFC, LeapFrog, Proparco,
    Swedfund, Lightrock). Total Series C: $200M. Prior: $50M Series B (2022, ~$400M valuation). Total
    raised approximately $256M+.
  disclosureProfile: private-undisclosed
  employeeCount: 3000
  employeeCountNote: >-
    Estimated 2,500–3,500 direct employees (engineers, product, operations) plus 600,000+ community
    business managers operating as agents/field network.
