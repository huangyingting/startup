callouts:
  - calloutType: risk
    title: "NPL Concentration Risk Warrants Scrutiny"
    body: "The ₦7B NPL disclosure — driven by large exposures to Alerzo (₦5B) and Shoprite (₦2.4B) — reveals that Moniepoint made corporate-scale loans outside its core data-driven SME model. This concentration risk is qualitatively different from the 70,000-borrower micro-SME book and warrants a detailed data room review of the full loan schedule."
    claimRefs: [CI010, CI029]

  - calloutType: risk
    title: "FX Risk Compresses USD Returns Structurally"
    body: "Nigeria's naira devaluation from ₦415/$ (2022) to ₦1,600/$ (2026) represents a 74% USD value compression. Even rapid naira-denominated revenue growth may not preserve USD IRR for investors. Moniepoint's UK and Kenya subsidiaries are too small to serve as meaningful hedges at current scale."
    claimRefs: [CI024, CI025, CI026]

  - calloutType: insight
    title: "Revenue Scale Is Plausible But Unaudited"
    body: "Bottom-up modelling from Moniepoint's disclosed ₦412T volume implies total revenue of ₦908B–₦1.73T ($648M–$1.24B). The GetLatka $600M ARR estimate lies within this range. The midpoint of ~$940M suggests Moniepoint is genuinely one of Nigeria's largest revenue-generating fintechs, but audited confirmation is required before these estimates can be relied upon for valuation."
    claimRefs: [CI007, CI008, CI028]
