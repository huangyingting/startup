runDate: "2026-05-11"
company:
  name: Moniepoint
chapter:
  number: 4
  title: Financial Analysis
  summary: >-
    Moniepoint's financials combine a high-volume, low-margin payments business (₦412T processed; blended MDR
    estimated at 0.15–0.35%) with a high-margin MFB lending business (₦1T+ disbursed at 24–36% interest).
    Third-party estimates place FY2025 revenue at approximately $500–700M equivalent (₦700B–₦980B), driven
    by MDR, gateway fees (Monnify ₦25T GPV), and interest income. NPLs reached ~₦7B by early 2026 on an
    aggressive lending push. Moniepoint has not disclosed audited financials; profitability is asserted but
    unverified; naira devaluation compresses USD returns materially.

sections:
  - id: Ich-S01
    title: Revenue Model Architecture
    body: |
      Moniepoint's revenue model has four primary legs: (1) merchant discount rate (MDR) on POS transactions;
      (2) gateway fees on Monnify API volume; (3) net interest income from its MFB lending book; and (4)
      monthly SaaS/subscription fees from Moniebook and business account services.

      **Leg 1 — POS MDR:** For every card or QR transaction processed through Moniepoint's POS terminal,
      the company collects a merchant discount rate. The CBN caps interchange for debit card POS transactions
      at 0.5% (max ₦1,500 per transaction), with network fees and bank settlement fees deducted. Moniepoint's
      effective blended MDR on its ₦412 trillion FY2025 volume is estimated by industry analysts at 0.15–0.35%.
      At the midpoint of 0.25%, this implies approximately ₦1.03 trillion (~$740M at ₦1,400/$1) in POS
      revenue — the single largest revenue line. However, agency cash-out transactions (a significant portion
      of volume) carry different economics: agents earn fees directly, so Moniepoint's take may be lower on
      cash-out portions.

      **Leg 2 — Monnify gateway:** Moniepoint's Monnify gateway processed ₦25 trillion in FY2025. Gateway
      fees for API-based payments typically range from 0.5% to 1.5% per transaction. At an estimated 0.6%
      effective rate on ₦25T, Monnify contributes approximately ₦150 billion (~$107M) in gateway revenue.
      This competes with Paystack (~1.5%) and Flutterwave (~1.4%) on price, potentially with lower rates.

      **Leg 3 — MFB interest income:** Moniepoint MFB disbursed ₦1 trillion in SME loans to approximately
      70,000 borrowers in FY2025. Average loan size was approximately ₦14.3M per borrower, with 12–24 week
      tenors and daily/weekly repayments. At a blended 28% annual interest rate (mid-point of Nigeria's SME
      lending range of 24–36%), the interest income on a ₦500B average outstanding book is approximately
      ₦140B ($100M) annually. This is the highest-margin revenue line — interest spread after cost of funds
      can exceed 15–20%.

      **Leg 4 — SaaS/subscription:** Moniebook (SME accounting + payroll) charges a monthly subscription.
      With 6M+ active businesses, even a small ARPU generates meaningful recurring revenue. This is the
      smallest but most predictable revenue line; specific pricing has not been disclosed publicly.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: Ich-S02
    title: Revenue Estimates and Third-Party Proxies
    body: |
      Moniepoint has not disclosed audited revenue figures. External estimates vary widely:

      **GetLatka estimate ($600M ARR, 2025):** The data platform GetLatka, which crowdsources SaaS revenue
      data, published an estimate of approximately $600M in annual revenue for Moniepoint in 2025. This would
      translate to approximately ₦840B at the 2025 average naira rate of ₦1,400/$1. However, GetLatka's
      methodology is opaque for companies of this type (it is more reliable for pure SaaS models than for
      payments + lending businesses), and this figure should be treated as an upper-bound estimate.

      **Bottom-up payment volume model:** Using Moniepoint's disclosed ₦412T in FY2025 transaction volume
      and industry-standard MDR ranges: at 0.15% take-rate, implied payment revenue is ₦618B ($441M);
      at 0.35%, it is ₦1.44T ($1.03B). Adding Monnify (₦150B) and interest income (₦140B), the total
      estimated revenue range is ₦908B–₦1.73T ($648M–$1.24B). The midpoint of approximately ₦1.32T
      ($940M) is the most plausible central estimate.

      **Profitability claim:** Moniepoint has indicated it is profitable. The African Pact article on its
      $200M Series C explicitly noted that Moniepoint had reached profitability before the round, an
      unusual assertion for Nigerian fintech. However, the accounting treatment (operating profit vs. GAAP
      net income; whether loan losses are properly provisioned) is not independently verifiable.

      **NPL headwind:** Hallmark News reported that Moniepoint's non-performing loans reached approximately
      ₦7 billion by early 2026, arising from aggressive lending — including large exposures to Alerzo Ltd
      (₦5B) and Retail Supermarkets/Shoprite (₦2.4B) that diverged from its core data-driven, short-tenor
      SME model. At ₦7B NPL on a ₦500B average loan book, the NPL ratio is approximately 1.4% — below
      Nigerian banking system average of 4–5% but elevated relative to prior years. Future loan book growth
      will require careful NPL management.
    claimRefs: [CI007, CI008, CI009, CI010, CI011, CI012]
    tableRefs: []
    figureRefs: []

  - id: Ich-S03
    title: Cost Structure and Unit Economics
    body: |
      Moniepoint's cost structure is driven by three main categories: (1) cost of payment services
      (network fees, settlement costs, interchange paid to card networks); (2) cost of credit (cost of
      funds, loan loss provisions); and (3) operating expenses (headcount, POS hardware, field agents,
      technology infrastructure).

      **Cost of payments:** Moniepoint bears network fees to Visa/Mastercard and interbank settlement
      costs through NIBSS (Nigeria Interbank Settlement System). Card network fees in Nigeria are
      typically 0.05–0.10% of transaction value, implying ₦206B–₦412B ($147M–$294M) in network
      costs on ₦412T volume. After network costs, the gross payment margin is estimated at 60–70% of
      gross MDR revenue.

      **Cost of credit:** Moniepoint's MFB must fund its loan book. With ₦500B average outstanding,
      even if funded at a 10% cost of deposits/debt, that is ₦50B ($36M) in annual funding cost.
      Loan loss provisions at a 2% NPL provision ratio add another ₦10B ($7M). After these costs,
      net interest margin on the lending book is estimated at 15–18%.

      **Operating expenses:** Moniepoint reportedly employs 2,000–5,000 people across its Lagos
      headquarters, Abuja, Nairobi, and London offices. At an average salary cost of ₦10M per employee
      for 2,000 employees, the salary bill alone is ₦20B ($14M) per year. Field agent commissions,
      hardware deployment (140,000+ POS terminals at ₦150,000 cost each = ₦21B in terminal capex),
      and data center costs add further pressure. Total opex is estimated at ₦50–80B ($36–57M).

      **Unit economics — POS terminal:** A deployed POS terminal processes approximately ₦2.94B
      (₦412T / 140,000 terminals) in annual volume. At 0.25% MDR, each terminal generates ₦7.35M in
      gross revenue per year, against approximately ₦150,000 in hardware cost (typically amortised over
      3 years = ₦50,000/year). POS deployment payback is therefore approximately 2–3 weeks at current volumes.

      **Unit economics — SME customer LTV:** An active business customer with ₦14.3M average loan
      contributing ₦4M in annual interest plus ₦2M in POS MDR (estimated) represents approximately
      ₦6M in annual revenue per customer. With a churn rate likely below 10% (given MFB account and
      terminal stickiness), LTV could exceed ₦60M ($43,000) per business customer — an extremely high
      ratio relative to customer acquisition cost.
    claimRefs: [CI013, CI014, CI015, CI016, CI017, CI018]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: Ich-S04
    title: Capital Structure and Financing
    body: |
      Moniepoint has raised approximately $256M in total equity financing across multiple rounds. The
      most recent and largest was the Series C: a $110M first close in October 2024 (DPI, Google Africa
      Fund, Verod, Lightrock) and a $90M second close in October 2025 (Visa, IFC, LeapFrog, Proparco,
      Swedfund, Alder Tree). The Series C totalled $200M+.

      As an MFB, Moniepoint is also capitalised through deposits and borrowings on its banking balance
      sheet. The CBN National MFB minimum capital requirement is ₦5B ($3.6M). Moniepoint far exceeds
      this minimum given its equity base, but the regulatory capital adequacy ratio (CAR) requirement
      (typically 10% for MFBs) constrains how aggressively it can grow the loan book without additional
      capital injection.

      Moniepoint's deployment of the $200M Series C proceeds is primarily toward: (a) loan book growth
      (to scale SME lending); (b) technology infrastructure (uptime investment); (c) geographic expansion
      (Kenya Sumac MFB, UK MonieWorld); and (d) regulatory capital (MFB minimum capital compliance).

      Given the $200M recently raised at a $1B+ valuation, Moniepoint has adequate runway for 2–3 years
      of operations even with significant cash burn. The development finance institution (DFI) investors
      (IFC, Proparco, Swedfund) also provide access to concessional debt for on-lending to SMEs, which
      reduces the cost of funds for the MFB loan book below market rates.

      Importantly, Moniepoint does not carry public debt. There is no bond prospectus or listed debt
      security, so capital market scrutiny is limited. The financing dependency risk is primarily on
      the equity side: if market conditions for African fintech deteriorate, follow-on funding could be
      more difficult and dilutive.
    claimRefs: [CI019, CI020, CI021, CI022, CI023]
    tableRefs: [TI004]

  - id: Ich-S05
    title: Naira Devaluation and FX Sensitivity
    body: |
      Naira devaluation is the single most significant risk to Moniepoint's USD-denominated financial
      metrics. From 2022 to 2026, the naira has depreciated from approximately ₦415/$1 to ₦1,600/$1 —
      a 74% devaluation in USD terms. This means that even though Moniepoint's naira revenues have grown
      substantially, its USD-equivalent revenue and valuation in USD terms grows much more slowly.

      Concretely: if Moniepoint earned ₦1T in naira revenue in 2024 at ₦1,000/$1, that was $1B USD.
      At ₦1,600/$1 in 2026, the same ₦1T is only $625M USD — a 37.5% reduction without any business
      deterioration. For USD-denominated investors (DPI, Visa, IFC), the ultimate return depends heavily
      on whether the naira stabilises or continues to depreciate at exit.

      Moniepoint has partial natural hedges: its UK subsidiary (Moniepoint GB / MonieWorld) generates
      GBP revenues; its Kenya operations (Sumac MFB) generate KES revenues. However, these are early-stage
      and immaterial relative to the Nigeria core business.

      The CBN's naira float (since 2023) has reduced intervention-driven distortions but not eliminated
      structural devaluation risk. Nigeria's current account deficit, oil revenue dependence, and fiscal
      deficit all contribute to persistent naira weakness.
    claimRefs: [CI024, CI025, CI026, CI027]
    figureRefs: [FI003]

  - id: Ich-S06
    title: Financial Verdict
    body: |
      Moniepoint's revenue quality is mixed. The POS MDR stream (estimated 60-70% gross margin) is
      high-quality, recurring, and transaction-driven — it scales with business activity and benefits from
      strong network effects. The Monnify gateway is similarly recurring and growing rapidly. The MFB
      lending income is higher-margin but carries credit risk: the ₦7B NPL disclosure is a yellow flag,
      particularly the concentration in large-ticket loans (Alerzo, Shoprite) outside Moniepoint's core
      data-driven SME model.

      Profitability claims are plausible but unverified. At the estimated revenue scale ($600–940M
      equivalent) and with a payments gross margin of 60–70%, a profitable P&L is arithmetically consistent
      with the disclosed headcount and opex profile. However, without audited statements, the treatment of
      loan loss provisions, POS hardware depreciation, and agent commissions is unknown.

      Capital intensity is moderate: POS hardware deployment requires upfront capex (₦21B for 140,000
      terminals), but the payback is rapid at current transaction volumes. The MFB loan book requires
      working capital (funded by deposits + equity), creating balance sheet leverage that is common for
      fintech-banks but different from pure software companies. Runway from the Series C is adequate
      for 2–3 years.

      The key financial diligence asks are: (1) audited P&L and balance sheet; (2) NPL ratio and
      provisioning methodology; (3) revenue breakdown by segment (MDR / gateway / interest / SaaS);
      (4) naira-vs-USD revenue sensitivity; and (5) cost of funds for the MFB.
    claimRefs: [CI028, CI029, CI030, CI031]
    tableRefs: [TI005]
    figureRefs: [FI004]

