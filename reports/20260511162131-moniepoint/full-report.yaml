            title: Revenue Scale Is Plausible But Unaudited
            body: >-
              Bottom-up modelling from Moniepoint's disclosed ₦412T volume implies total revenue of ₦908B–₦1.73T
              ($648M–$1.24B). The GetLatka $600M ARR estimate lies within this range. The midpoint of ~$940M suggests
              Moniepoint is genuinely one of Nigeria's largest revenue-generating fintechs, but audited confirmation is
              required before these estimates can be relied upon for valuation.
