  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model Architecture
        blocks:
          - type: paragraph
            body: |
              Moniepoint's revenue model has four primary legs: (1) merchant discount rate (MDR) on POS transactions;
              (2) gateway fees on Monnify API volume; (3) net interest income from its MFB lending book; and (4)
              monthly SaaS/subscription fees from Moniebook and business account services.

              **Leg 1 — POS MDR:** For every card or QR transaction processed through Moniepoint's POS terminal,
              the company collects a merchant discount rate. The CBN caps interchange for debit card POS transactions
              at 0.5% (max ₦1,500 per transaction), with network fees and bank settlement fees deducted. Moniepoint's
              effective blended MDR on its ₦412 trillion FY2025 volume is estimated by industry analysts at 0.15–0.35%.
              At the midpoint of 0.25%, this implies approximately ₦1.03 trillion (~$740M at ₦1,400/$1) in POS
              revenue — the single largest revenue line. However, agency cash-out transactions (a significant portion
              of volume) carry different economics: agents earn fees directly, so Moniepoint's take may be lower on
              cash-out portions.

              **Leg 2 — Monnify gateway:** Moniepoint's Monnify gateway processed ₦25 trillion in FY2025. Gateway
              fees for API-based payments typically range from 0.5% to 1.5% per transaction. At an estimated 0.6%
              effective rate on ₦25T, Monnify contributes approximately ₦150 billion (~$107M) in gateway revenue.
              This competes with Paystack (~1.5%) and Flutterwave (~1.4%) on price, potentially with lower rates.

              **Leg 3 — MFB interest income:** Moniepoint MFB disbursed ₦1 trillion in SME loans to approximately
              70,000 borrowers in FY2025. Average loan size was approximately ₦14.3M per borrower, with 12–24 week
              tenors and daily/weekly repayments. At a blended 28% annual interest rate (mid-point of Nigeria's SME
              lending range of 24–36%), the interest income on a ₦500B average outstanding book is approximately
              ₦140B ($100M) annually. This is the highest-margin revenue line — interest spread after cost of funds
              can exceed 15–20%.

              **Leg 4 — SaaS/subscription:** Moniebook (SME accounting + payroll) charges a monthly subscription.
              With 6M+ active businesses, even a small ARPU generates meaningful recurring revenue. This is the
              smallest but most predictable revenue line; specific pricing has not been disclosed publicly.
