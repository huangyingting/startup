      - number: '1.4'
        title: Business Model and Products
        blocks:
          - type: paragraph
            body: >
              Moniepoint operates a vertically integrated financial services platform targeting Nigeria's vast informal
              economy, which accounts for 83% of employment on the African continent. The company's business model is
              centred on merchant acquiring (POS terminals deployed to businesses) as the initial hook, with adjacent
              financial services — lending, banking, FX, and business management tools — generating incremental revenue
              and deepening lock-in.

              Revenue comes from multiple streams: (1) transaction fees on POS and digital transfer volumes (estimated
              0.1–0.5% take rate across channels); (2) interest income on working capital loans disbursed through
              Moniepoint Microfinance Bank; (3) subscription fees for Moniebook (₦6,000– ₦8,500/month); and (4) FX
              spreads on cross-border and remittance transactions. With ₦412 trillion processed in 2025, TechCabal
              estimates gross payment revenue between ₦412 billion and ₦2 trillion depending on channel mix.

              Products span: (a) POS terminals and payment acceptance — ubiquitous across Nigeria's 774 LGAs; (b)
              Moniepoint business banking accounts; (c) credit and working capital loans underwritten via alternative
              data (transaction history, payment behaviour); (d) Monnify web payment gateway (₦25 trillion processed in
              2025); (e) Moniebook — an all-in-one POS + bookkeeping solution; and (f) MonieWorld — a UK-launched
              remittance service for the African diaspora (April 2025). The company also operates a personal banking
              vertical (launched August 2023) that grew 2,000% in its first year.

              Moniepoint's distribution relies on over 600,000 "business managers" — community-embedded agents who earn
              commissions onboarding merchants and deploying POS terminals. This human-channel distribution model has
              proven more resilient than purely digital approaches in Nigeria's semi-formal economy, where trust is
              built through physical relationships.
