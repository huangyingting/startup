  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis
        blocks:
          - type: paragraph
            body: |
              Moniepoint occupies a structurally advantaged position in Nigeria's digital payments market.
              With ₦412 trillion in FY2025 transaction volume (14 billion transactions, covering an
              estimated 80% of in-person POS payments nationwide), 6 million+ active business customers,
              and a company-claimed profitability milestone — first among African unicorns — the business
              presents a compelling fundamental story.

              The $200M+ Series C, completed across two closes (October 2024 at $110M led by DPI, and
              October 2025 at $90M anchored by LeapFrog), attracted an unusually diverse investor mix:
              commercial funds (DPI, QED), impact funds (LeapFrog, Lightrock), strategic corporates (Visa,
              Google Africa Investment Fund), and development finance institutions (IFC, Proparco, Swedfund).
              DFI participation at this stage is rare and signals that Moniepoint's blended commercial and
              development impact thesis is credible to institutions with the highest due diligence standards.

              Against this backdrop, the post-money valuation of $1B+ implies a price-to-sales (P/S) ratio
              of approximately 0.8x–1.5x on estimated FY2025 revenue of $648M–$1.24B (using a bottom-up
              payment volume model at 0.15%–0.35% MDR plus Monnify gateway and interest income). This is
              a significant discount relative to African fintech peers: OPay trades on an implied 3–5x
              revenue multiple at its $2.75B–$4B valuation range; Flutterwave's $3B 2022 mark implied 5–10x.
              At face value, Moniepoint appears undervalued relative to peers — but the discount is not
              irrational given the absence of audited financials, concentration in a single naira-denominated
              market, and ₦7B in non-performing loans.

              The thesis rests on four pillars: (1) market leadership — Moniepoint processes more POS
              transactions than any other Nigerian entity; (2) embedded switching costs — SMEs running
              payments, loans, bookkeeping (Moniebook), and payroll through a single platform face high
              churn costs; (3) data advantage — years of transaction data underpin superior credit underwriting;
              and (4) institutional validation — Visa, IFC, and Google's participation confirms the
              infrastructure play. The anti-thesis centres on naira FX risk for USD investors, unaudited
              financials preventing P&L verification, NPL concentration risk, and regulatory uncertainty
              under an activist CBN.

              Our overall recommendation is **Track / Research More**: monitor for audited financials
              disclosure and conduct a full data-room review before committing capital. The valuation is
              fair at current estimates; in a bull scenario it is materially cheap.
