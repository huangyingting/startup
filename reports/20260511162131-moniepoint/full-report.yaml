      - number: '4.6'
        title: Financial Verdict
        blocks:
          - type: paragraph
            body: |
              Moniepoint's revenue quality is mixed. The POS MDR stream (estimated 60-70% gross margin) is
              high-quality, recurring, and transaction-driven — it scales with business activity and benefits from
              strong network effects. The Monnify gateway is similarly recurring and growing rapidly. The MFB
              lending income is higher-margin but carries credit risk: the ₦7B NPL disclosure is a yellow flag,
              particularly the concentration in large-ticket loans (Alerzo, Shoprite) outside Moniepoint's core
              data-driven SME model.

              Profitability claims are plausible but unverified. At the estimated revenue scale ($600–940M
              equivalent) and with a payments gross margin of 60–70%, a profitable P&L is arithmetically consistent
              with the disclosed headcount and opex profile. However, without audited statements, the treatment of
              loan loss provisions, POS hardware depreciation, and agent commissions is unknown.

              Capital intensity is moderate: POS hardware deployment requires upfront capex (₦21B for 140,000
              terminals), but the payback is rapid at current transaction volumes. The MFB loan book requires
              working capital (funded by deposits + equity), creating balance sheet leverage that is common for
              fintech-banks but different from pure software companies. Runway from the Series C is adequate
              for 2–3 years.

              The key financial diligence asks are: (1) audited P&L and balance sheet; (2) NPL ratio and
              provisioning methodology; (3) revenue breakdown by segment (MDR / gateway / interest / SaaS);
              (4) naira-vs-USD revenue sensitivity; and (5) cost of funds for the MFB.
