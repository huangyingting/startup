  - id: TV005
    title: Thesis Break and Kill Triggers
    slug: thesis-break-and-kill-triggers-table
    notes: Monitoring framework for post-investment thesis management.
    claimRefs:
      - CV019
      - CV020
      - CV024
      - CV039
    columns:
      - Category
      - Signal
      - Threshold / Trigger
      - Recommended Action
      - Monitoring Source
    rows:
      - - Credit quality
        - NPL ratio spike
        - '>3% NPL ratio → thesis break; >7% → kill'
        - Request NPL cohort data from data room; commission loan book sampling
        - Moniepoint data room; CBN MFB examination reports
      - - Regulatory
        - CBN enforcement action
        - Fine >₦5B or licence restriction → thesis break; licence revocation → kill
        - Track CBN press releases; engage Nigerian regulatory counsel
        - CBN website; Nigerian financial press
      - - FX / macro
        - Naira devaluation
        - ₦2,000/$+ sustained → thesis break; ₦2,500/$+ → kill
        - Run FX stress test; model dollar revenue waterfall from UK/Kenya
        - CBN forex data; Bloomberg
      - - Financials
        - Revenue revelation (at audit)
        - Revenue <$400M audited → thesis break; operating loss >$100M → kill
        - Prioritise audit; do not invest pre-audit without escrow/clawback protection
        - Audited P&L from Moniepoint data room
      - - Competition
        - Market share loss
        - Moniepoint POS volume share falls below 60% of national in-person payments → thesis break
        - Track NIBSS data vs. Moniepoint disclosed volume; monitor OPay terminal count
        - NIBSS aggregate payment stats; press
      - - Management
        - Leadership departure
        - CEO Tosin Eniolorunda or CTO Felix Ike departure without succession plan → kill
        - Require key-person insurance; understand succession depth
        - Company announcements; LinkedIn
  - id: TV006
    title: Final Diligence Asks
    slug: final-diligence-asks-table
    notes: >-
      These are the minimum diligence items required before an investment decision can be made. Items marked BLOCKING
      must be resolved prior to investment; others are high-priority.
    claimRefs:
      - CV001
      - CV019
      - CV024
      - CV039
    columns:
