      - number: '8.2'
        title: Comparable Valuation and Peer Analysis
        blocks:
          - type: paragraph
            body: |
              Valuing Moniepoint requires selecting appropriate comparable companies across three buckets:
              (a) Nigerian fintech peers with similar business models, (b) broader African and emerging
              market fintech infrastructure companies, and (c) listed or recently-transacted payment
              processors for multiple benchmarking.

              **Nigerian fintech peers:**
              Interswitch, Nigeria's pioneering card-switching and payment processing company, is the
              closest structural comparable: both are profitable Nigerian payment infrastructure companies
              with physical POS distribution and banking licences. Interswitch was last formally valued at
              ~$1B in a 2019 round; its planned IPO remains on hold. Given Moniepoint's significantly
              larger transaction volume (₦412T vs. Interswitch's smaller base), Moniepoint arguably merits
              a premium to Interswitch's mark.

              OPay, the SoftBank-backed Nigerian fintech serving 50M+ users, is valued at $2.75B (per
              Opera regulatory filings from 2024) rising to a $4B IPO target disclosed in May 2026 through
              Citi/Deutsche Bank/JPMorgan-led bookbuilding. OPay processes an estimated $12B monthly at
              mid-2025, significantly less than Moniepoint's ~$34B monthly run-rate (₦412T ÷ 12 months ÷
              ₦1,400/$), suggesting Moniepoint's larger volume base warrants a comparable or higher mark.
              OPay's $4B IPO target represents approximately 3–5x estimated revenue — a benchmark that,
              if applied to Moniepoint, would imply a $2B–$6B valuation, well above the current $1B+ mark.

              Flutterwave, Nigeria's payment gateway company, last raised at a $3B valuation in a 2022
              Series D. By April 2026, Flutterwave secured a Nigerian National MFB licence and acquired
              the Mono open-banking platform, signalling a transition from pure gateway to full-service
              banking — directly competing with Moniepoint's model. Flutterwave's $3B mark represents
              approximately 5–10x estimated revenue, though revenue is unverified.

              **MEA/global comps:**
              Network International, a MEA-focused payment processor listed on the London Stock Exchange,
              was acquired by Brookfield for approximately $2.8B in 2023, representing approximately 2x
              its revenue base. This is the most relevant public-market comparable for Moniepoint's
              payment processing function, though Moniepoint adds a lending overlay not present at
              Network International.

              Wave (West Africa), a Francophone Africa mobile money company that achieved a $1.7B
              valuation in a landmark $200M Series A in 2021, is relevant for its regional premium;
              Wave operates in less competitive markets with lower regulatory intensity than Nigeria.

              **Multiple benchmarking:**
              Public payment processors globally trade at 3–8x revenue. High-growth private emerging
              market fintechs at Series C–D attract 6–15x. Moniepoint at 0.8x–1.5x appears materially
              discounted, even after applying a 40–60% illiquidity and single-market discount. A 2x–3x
              multiple on a $940M revenue midpoint would imply a $1.9B–$2.8B fair value, suggesting
              meaningful upside from current $1B mark if financials are verified and the company moves
              toward liquidity.

              The key limitation across all comparables is data quality: neither OPay nor Flutterwave
              publish audited revenues, Wave's revenue is undisclosed, and Interswitch's financials have
              not been updated since the 2019 round. This makes peer multiples estimates rather than
              verified marks.
