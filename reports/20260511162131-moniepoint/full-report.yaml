    type: kpi
    title: Investment KPI Dashboard
    slug: investment-kpis
    summary: >-
      Scorecard of key investment metrics for Moniepoint as of May 2026. Values reflect public and third-party sources;
      all financial figures are estimated or company-disclosed (unaudited).
    claimRefs:
      - CV001
      - CV006
      - CV008
      - CV009
      - CV022
      - CV039
    data:
      items:
        - label: Stage
          value: Series C unicorn
          note: $200M raised, $1B+ valuation, Oct 2024–Oct 2025
        - label: Revenue estimate (FY2025)
          value: $648M–$1.24B
          note: Bottom-up MDR + Monnify + interest; GetLatka estimates $600M; all unaudited
        - label: Implied P/S multiple
          value: 0.8x–1.5x
          note: At $1B mark on $648M–$1.24B revenue range; discount to peers
        - label: Transaction volume (FY2025)
          value: ₦412T ($294B)
          note: 14B transactions; company-disclosed; ₦1,400/$ FY2025 avg rate
        - label: Active businesses
          value: 6M+
          note: As of end-2025; company-disclosed; includes personal banking customers in 10M+ total
        - label: NPL ratio (est.)
          value: ~1.4% (₦7B on ₦500B book)
          note: Company-disclosed ₦7B NPLs; loan book estimated; below 4–5% Nigerian bank avg
        - label: Profitability
          value: Claimed; unverified
          note: Company states profitable; no audited accounts; first African unicorn to claim this
        - label: FX risk (USD investor)
          value: High — Naira/USD
          note: 74% naira devaluation since 2022; minimal hard-currency hedge at current stage
        - label: DFI co-investors
          value: IFC, Proparco, Swedfund
          note: DFI participation at this stage is unusual; signals impact/sustainability validation
        - label: Recommendation
          value: Track / Research More
          note: Await audited accounts; data-room engagement priority; do not invest blind
