              Moniepoint is publicly described as profitable at unicorn scale — the first African fintech to achieve
              this milestone. This profitability, combined with 150%+ CAGR revenue growth, makes Moniepoint an outlier
              in a sector where most comparably-scaled competitors operate at losses. It also strengthens resilience
