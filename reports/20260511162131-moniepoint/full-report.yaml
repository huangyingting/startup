      - number: '7.3'
        title: Operational and Technology Risk
        blocks:
          - type: paragraph
            body: |
              Moniepoint's operational risk profile is defined by infrastructure concentration, hardware
              supply-chain dependencies, NIBSS systemic exposure, and the inherent fraud and cybersecurity
              risks of processing 14 billion transactions annually across 140,000+ POS terminals and 1,500+
              field agents.

              **Google Cloud Concentration:** 80%+ of Moniepoint's infrastructure runs on Google Cloud Platform
              (GCP), leveraging Google Kubernetes Engine (GKE) for container orchestration and Cloud Spanner
              for distributed transactional databases. No secondary cloud provider or formal multi-cloud
              architecture has been publicly disclosed. This creates a single-provider dependency at a scale
              of ₦412 trillion in annual transaction value: a major GCP regional outage, unilateral pricing
              change, or service termination could halt all Moniepoint operations simultaneously. For a company
              processing approximately 80% of Nigeria's in-person electronic payments, this is a systemic risk
              that extends beyond Moniepoint to Nigeria's broader payments infrastructure.

              **Confluent Cloud Dependency:** Moniepoint's real-time payment event streaming runs on Confluent
              Cloud's managed Apache Kafka service. Any Confluent service disruption would immediately impair
              real-time transaction processing and settlement flows. Unlike Google Cloud, Confluent is a
              single-vendor service with no disclosed fallback.

              **NIBSS Systemic Dependency:** All card and transfer settlements in Nigeria route through the
              Nigeria Inter-Bank Settlement System (NIBSS). NIBSS outages cascade directly to all Moniepoint
              transaction settlement regardless of Moniepoint's own infrastructure reliability. Nigeria's payment
              infrastructure has experienced intermittent NIBSS-related disruptions historically.

              **POS Hardware Supply Chain:** Moniepoint's 140,000+ terminals are Android-based devices sourced
              primarily from Chinese manufacturers. Trade disruptions, component shortages, or CBN restrictions
              on imported payment hardware could constrain terminal deployment and slow merchant acquisition.
              The geo-tagging mandate adds a compliance dimension — each terminal must be geo-tagged, requiring
              physical field-agent visits to existing terminal locations.

              **Field Agent and Cybersecurity Risk:** The 1,500+ field agent network represents a distributed
              operational risk — rogue agents could commit fraud, breach KYC protocols, or conduct social
              engineering attacks on merchants. At 14 billion transactions per year, fraud at scale is material:
              Trustpilot reviews consistently cite account freezes (linked to fraud-detection false positives)
              as Moniepoint's most common service failure mode, indicating both a fraud risk and a customer
              experience risk from overzealous fraud controls.
