      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >
              Moniepoint's leadership is anchored by its two co-founders, Tosin Eniolorunda (Group CEO and Founder) and
              Felix Ike (Co-Founder and Chief Information Technology Officer). Eniolorunda's background at Interswitch —
              one of Africa's most significant payment infrastructure companies — directly informed Moniepoint's
              technical-first approach to building payment rails that could outperform legacy bank systems. His
              leadership style emphasises discipline, ownership, and consistency, and he has steered the company from a
              quiet B2B infrastructure provider to Africa's most significant merchant acquirer.

              Felix Ike serves as the technology architect behind Moniepoint's core platforms. His engineering
              leadership built the distributed systems that enable Moniepoint's 444 transactions-per-second throughput
              and industry-leading reliability. The company's engineering culture — shaped by Ike — prioritises
              low-latency settlement and high availability, the two factors merchants cite most frequently when choosing
              Moniepoint over competitors.

              Beyond the two co-founders, Moniepoint has assembled a deep executive team including Babatunde Olofin
              (Managing Director, Moniepoint MFB), Solomon Amadi (VP, Payment Infrastructure), Tunde Olofin (Managing
              Director of the banking arm), and Edidiong Uwemakpan (VP, Communications). The bench strength reduces
              key-person risk somewhat, though Eniolorunda's external visibility and fundraising relationships remain
              heavily concentrated at the CEO level.

              Moniepoint's governance reflects a private company with no public board disclosure. DPI, LeapFrog, and
              other Series C investors are presumed to hold board observer or director seats per standard venture terms,
              but specific board composition has not been publicly disclosed.
