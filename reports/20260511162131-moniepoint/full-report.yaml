      - number: '1.5'
        title: Scale, Key Metrics, and Regulatory Footprint
        blocks:
          - type: paragraph
            body: >
              As of early 2026, Moniepoint serves over 10 million active businesses and individuals across Nigeria.
              Separately, its blog describes 20 million businesses and individuals across its platform — the discrepancy
              likely reflects different definitions of "active" vs. registered. The more conservative 10 million active
              figure comes from the January 2025 MonieWorld launch press release and the October 2025 Series C close
              announcement.

              Moniepoint's 2025 operational performance was exceptional by any measure: 14 billion transactions
              processed (up 169% from 5.2 billion in 2023); ₦412 trillion in transaction value (up 96% from $150 billion
              in 2023); 80% of Nigeria's in-person payments flowing through Moniepoint rails; and over ₦1 trillion in
              SME loans disbursed through Moniepoint MFB.

              On headcount, public estimates range from 3,700 to 5,200 employees as of early 2026, reflecting rapid
              scaling and definitional differences (contractors vs. direct employees). The company reported 36% employee
              growth in its most recent disclosed period.

              Moniepoint holds the following licences in Nigeria: (1) Microfinance Bank licence, upgraded to National
              status by the CBN in January 2026; (2) Payment Terminal Service Provider (PTSP) licence; (3) Switching and
              Processing licence via TeamApt Ltd; and (4) Mastercard and Visa processor and acquirer licences obtained
              in 2025 after a rigorous certification process.

              In January 2026, the CBN upgraded Moniepoint MFB's licence to national status, requiring a minimum capital
              base of ₦5 billion, stricter KYC/AML compliance, and physical presence in key areas. This followed a ₦1
              billion CBN penalty levied on Moniepoint in 2024 for KYC non-compliance — an adverse regulatory event that
              underscores heightened scrutiny on digital financial platforms.
