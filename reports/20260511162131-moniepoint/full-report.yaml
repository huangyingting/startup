chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and History
        blocks:
          - type: paragraph
            body: >
              Moniepoint Inc., incorporated formerly as TeamApt Inc., is a Nigerian-headquartered fintech company
              providing an all-in-one financial platform for businesses and their customers across Africa. The company
              was founded in Lagos, Nigeria in 2015 by Tosin Eniolorunda and Felix Ike, who met while working in
              Nigerian technology and banking circles. Eniolorunda previously worked at Interswitch, one of Nigeria's
              premier payments infrastructure companies, giving him deep insight into the country's payment ecosystem
              and its structural gaps.

              In its earliest years, TeamApt focused on building payment infrastructure and back-end software for
              traditional Nigerian banks. The company served as a technology partner to major banks, helping modernise
              their payment stacks and settlement systems. This phase gave TeamApt a granular understanding of where
              banks failed their customers: slow transaction settlement, high decline rates, and poor visibility into
              transaction flows.

              In 2019, TeamApt made a strategic pivot, obtaining an agency banking license from the Central Bank of
              Nigeria (CBN) and launching the Moniepoint brand to serve merchants and small businesses directly. The
              product — initially a point-of-sale terminal for merchant payment acceptance — quickly gained traction
              during Nigeria's 2023 cash crisis, when the government's currency redesign exercise caused widespread cash
              shortages and forced businesses to rely on digital payment rails. Moniepoint's reliability and instant
              reversal capability during that period drove rapid adoption across Nigeria's 774 local government areas.

              In 2023, TeamApt formally rebranded the parent company to align with its flagship product, fully becoming
              Moniepoint Inc. This reflected the brand's enormous recognition among Nigerian SMEs and the company's
              desire to bring the corporate identity closer to its customer base. Today, Moniepoint is headquartered in
              Lagos, Nigeria, with a growing UK subsidiary (Moniepoint GB) in London.
