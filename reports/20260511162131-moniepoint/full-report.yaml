      - number: '7.5'
        title: Mitigations and Kill Criteria
        blocks:
          - type: paragraph
            body: |
              Moniepoint has implemented or is in the process of implementing mitigations across its principal
              risk categories. Several mitigations are well-developed and structurally embedded; others are
              nascent and unproven at scale.

              **Key Mitigations in Place:** (1) Geographic diversification: MonieWorld UK (launched 2024) and
              Sumac Kenya (early-stage) provide FX and geographic hedge against naira concentration, though
              both are pre-material with 2–3 year revenue timelines. (2) Capital adequacy buffer: The Series C
              $200M equity injection provides a substantial cushion against the ₦5B national MFB minimum capital
              requirement and credit loss reserves. (3) Proprietary ML credit scoring: Moniepoint's credit risk
              model uses POS transaction history as alternative data for SME credit scoring — a proprietary
              approach that theoretically provides better risk signals than traditional bureau scores for informal
              merchants, though model performance has not been independently validated. (4) National MFB licence
              stability: The CBN upgrade to national MFB status in January 2026 reduces regulatory downgrade
              risk and signals institutional trust, while also elevating obligations. (5) IFC/World Bank
              partnership: Concessional credit facilities reduce cost of funds versus commercial lenders,
              supporting net interest margin. (6) POS offline-first design: Moniepoint's offline-capable POS
              terminals buffer in-store transactions during NIBSS or connectivity outages, partially mitigating
              the systemic settlement dependency.

              **Kill Criteria (Thesis-Break Triggers):** The following conditions would materially break the
              investment thesis and require immediate investor reassessment: (a) CBN licence suspension or
              restriction on payment operations or MFB activities; (b) Disclosed NPL ratio exceeding 10% of
              the ₦1T+ credit book without adequate provisioning; (c) EMAAR class-action lawsuit certified with
              claimed damages exceeding ₦10B, creating material contingent liability; (d) CBN MDR cap reduced
              below 0.3%, eliminating the core payment revenue model; (e) Google Cloud outage lasting >24
              hours during Nigerian business hours, demonstrating catastrophic single-cloud failure; (f) Failure
              to meet ₦5B national MFB minimum capital adequacy with confirmed CBN intervention.

              **Key Diligence Asks:** (1) Management accounts showing NPL ratio and provisioning by borrower
              vintage and sector; (2) Capital adequacy certificate from CBN or management calculation vs ₦5B
              minimum; (3) Status of EMAAR lawsuit and ₦21B fraud court case with legal counsel opinion;
              (4) Cloud architecture documentation including disaster recovery, RTO/RPO targets, and any
              multi-cloud or backup plans; (5) Agent fraud incident log and KYC remediation plan post-CBN fine;
              (6) NDPC investigation status and data protection compliance roadmap with timeline.
