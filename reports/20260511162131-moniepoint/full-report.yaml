      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear Cases'
        blocks:
          - type: paragraph
            body: |
              We model three scenarios over a 5-year horizon from the May 2026 reference point, assuming
              entry at the $1B+ Series C valuation.

              **Bull case — African payment infrastructure winner:**
              Moniepoint executes its pan-African expansion, adding 3–4 markets (Kenya via Sumac MFB,
              plus 2 Francophone West African markets) by FY2027. Revenue doubles to $2B+ by FY2027 driven
              by volume growth (₦600T+ Nigeria, plus Kenya and West Africa), Monnify international expansion,
              and Moniebook SaaS upsell monetisation. NPL ratio normalises to below 1% as the credit model
              matures. Moniepoint files for IPO or is acquired by a strategic (Visa, Mastercard, Stripe) at
              3x P/S on $2B+ FY2027 revenue → $6B+ valuation → ~5–6x return on $1B invested. 5-year IRR:
              approximately 35–40%.

              **Base case — Nigeria-dominant, M&A exit:**
              Moniepoint maintains Nigeria leadership and achieves modest Africa expansion. Revenue grows to
              $1.5B by FY2027 through organic volume growth and Monnify scale. NPLs stabilise at 1.5–2%.
              The company is acquired by a strategic or DFI at 2x P/S on $1.5B → $3B valuation → ~3x
              return. 5-year IRR: approximately 20–25%.

              **Bear case — NPL spike and CBN headwinds:**
              NPL ratio spikes to 5%+ on credit book growth; the CBN restricts POS agent expansion and
              tightens interchange caps. Revenue growth stalls at $700M with margin compression from
              NPL provisioning. Naira depreciates further to ₦2,000/$, reducing USD revenue by 30% from
              current levels. Exit valuation stays flat at $1B (1x revenue) → ~1x return in USD terms,
              effectively 0.7x after FX erosion. 5-year IRR: approximately 0–5%.

              The probability weighting across scenarios (subjective, given data gaps) is approximately:
              bull 20%, base 50%, bear 30% — yielding an expected return of approximately 2x–2.5x, which
              is an adequate but not exceptional return for an illiquid private fintech at the unicorn stage
              in a high-risk market.
