      - number: '4.4'
        title: Capital Structure and Financing
        blocks:
          - type: paragraph
            body: |
              Moniepoint has raised approximately $256M in total equity financing across multiple rounds. The
              most recent and largest was the Series C: a $110M first close in October 2024 (DPI, Google Africa
              Fund, Verod, Lightrock) and a $90M second close in October 2025 (Visa, IFC, LeapFrog, Proparco,
              Swedfund, Alder Tree). The Series C totalled $200M+.

              As an MFB, Moniepoint is also capitalised through deposits and borrowings on its banking balance
              sheet. The CBN National MFB minimum capital requirement is ₦5B ($3.6M). Moniepoint far exceeds
              this minimum given its equity base, but the regulatory capital adequacy ratio (CAR) requirement
              (typically 10% for MFBs) constrains how aggressively it can grow the loan book without additional
              capital injection.

              Moniepoint's deployment of the $200M Series C proceeds is primarily toward: (a) loan book growth
              (to scale SME lending); (b) technology infrastructure (uptime investment); (c) geographic expansion
              (Kenya Sumac MFB, UK MonieWorld); and (d) regulatory capital (MFB minimum capital compliance).

              Given the $200M recently raised at a $1B+ valuation, Moniepoint has adequate runway for 2–3 years
              of operations even with significant cash burn. The development finance institution (DFI) investors
              (IFC, Proparco, Swedfund) also provide access to concessional debt for on-lending to SMEs, which
              reduces the cost of funds for the MFB loan book below market rates.

              Importantly, Moniepoint does not carry public debt. There is no bond prospectus or listed debt
              security, so capital market scrutiny is limited. The financing dependency risk is primarily on
              the equity side: if market conditions for African fintech deteriorate, follow-on funding could be
              more difficult and dilutive.
