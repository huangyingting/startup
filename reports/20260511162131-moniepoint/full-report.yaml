      - number: '1.3'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: >
              Moniepoint has raised approximately $256 million in total equity financing across multiple rounds. Early
              institutional capital came from QED Investors, Novastar Ventures, Global Ventures, FMO, British
              International Investment (BII), Endeavor Catalyst, and New Voices Fund. In 2022, the company raised $50
              million at an approximate $400 million valuation.

              The defining financing event was the Series C, executed in two tranches. The first close of $110 million
              was announced in October 2024, led by Development Partners International (DPI) through its African
              Development Partners (ADP) III fund, with participation from Google's Africa Investment Fund, Verod
              Capital, and Lightrock. This first close valued Moniepoint at over $1 billion, granting unicorn status —
              the continent's eighth.

              A second close of $90 million followed in October 2025, introducing Visa, the International Finance
              Corporation (IFC), LeapFrog Investments, Proparco, Swedfund, and Alder Tree Investments. The total Series
              C thus reached $200 million+, making it one of the largest fintech fundraises in African history.
              Financial Technology Partners acted as exclusive financial advisor.

              Visa's participation is particularly notable: it is both a strategic partner (Moniepoint now holds Visa
              processor and acquirer licenses through its TeamApt subsidiary) and a financial investor, signalling
              global card-scheme validation of Moniepoint's payment infrastructure. The IFC's involvement brings
              development-finance credibility and access to IFC's network of MSME-focused programmes across Africa.

              The company has publicly stated it is profitable at unicorn scale — a rare distinction among African
              fintechs — and discloses revenue growing at over 150% CAGR in recent years.
