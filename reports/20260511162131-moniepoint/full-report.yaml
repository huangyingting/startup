      - number: '4.7'
        title: Exhibits
        blocks:
          - type: callout
            title: NPL Concentration Risk Warrants Scrutiny
            body: >-
              The ₦7B NPL disclosure — driven by large exposures to Alerzo (₦5B) and Shoprite (₦2.4B) — reveals that
              Moniepoint made corporate-scale loans outside its core data-driven SME model. This concentration risk is
              qualitatively different from the 70,000-borrower micro-SME book and warrants a detailed data room review
              of the full loan schedule.
            calloutType: risk
            claimRefs:
              - CI010
              - CI029
          - type: callout
            title: FX Risk Compresses USD Returns Structurally
            body: >-
              Nigeria's naira devaluation from ₦415/$ (2022) to ₦1,600/$ (2026) represents a 74% USD value compression.
              Even rapid naira-denominated revenue growth may not preserve USD IRR for investors. Moniepoint's UK and
              Kenya subsidiaries are too small to serve as meaningful hedges at current scale.
            calloutType: risk
