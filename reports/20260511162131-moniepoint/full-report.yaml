  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definitions
        blocks:
          - type: paragraph
            body: >
              Moniepoint operates at the intersection of three overlapping market segments in Nigeria: agency-banking
              and merchant-acquiring (its founding and dominant segment), SME digital banking (business current
              accounts, payroll, and treasury), and SME credit (working capital loans and nano-loans). A secondary and
              nascent segment is outbound remittance (MonieWorld, UK, launched April 2025) and pan-African microfinance
              (Kenya's Sumac MFB acquisition, 2025).


              The broadest market is Nigeria's overall financial-services addressable opportunity. The CBN defines the
              digital payments corridor as all electronic fund transfers (NIP, RTGS, NCS, POS, mobile money, USSD, and
              web). Total digital transaction value in Nigeria reached ₦1,100+ trillion (~$780B) in 2024, up from an
              estimated ₦700 trillion in 2022, driven by CBN cash-restriction policies and widespread smartphone
              adoption. This is the total transaction flow, not revenue — payment processors typically earn 0.1–0.5%
              take-rate on this flow.


              The directly monetised addressable spend is smaller. IMARC Group estimates Nigeria's fintech revenue
              market — fees, spreads, and interest income from digital financial services — at approximately $1.31
              billion in 2025, growing to $4.86 billion by 2034 (CAGR 15.19%). Novatia Consulting separately estimates
              the digital payments sub-market (excluding credit) at a TAM potentially exceeding $50 billion by 2026 in
              notional transaction value, but with very different revenue implications. These estimates reflect
              different boundary choices and should not be aggregated.


              Exclusions from Moniepoint's SAM: corporate treasury and large-enterprise ERP payments (served by banks
              and Interswitch), international payment gateways for large e-commerce platforms (served by Flutterwave and
              Paystack in B2B mode), CBN-licensed mobile money operators (MTN MoMo, Airtel Money — telecom-led), and
              consumer P2P remittance inside Nigeria (small, low-margin). The status-quo substitute for Moniepoint's
              agency-banking offering is cash-over-the-counter at bank branches, informal savings groups (ajo/esusu),
              and unregulated POS operators.
            claimRefs:
              - CM001
              - CM007
              - CM029
          - type: table
            tableRef: TM001
            claimRefs: []
      - number: '2.2'
        title: Market Sizing — TAM, SAM, SOM
        blocks:
          - type: paragraph
            body: >
              **TAM — Top-down revenue lens (IMARC):** Nigeria fintech revenue market $1.31B (2025) → $4.86B (2034),
              CAGR 15.19%. This includes all digital financial services: payments, lending, insurance, savings, and
              remittance. It undercounts the actual transaction flow market but reflects revenue Moniepoint and peers
              can monetise.


              **TAM — Transaction-value lens (CBN):** The POS sub-segment alone processed ₦10.51 trillion (~$7.5B) in Q1
              2025 (up 301% YoY), implying a ~₦42T annual run-rate. At a blended take-rate of 0.3%, this implies a
              POS-segment revenue pool of ~₦126B (~$90M) per year. Adding mobile/web transfers, Monnify gateway flows
              (₦25T FY2025), and card payments, the total Nigeria payments revenue pool is estimated at $400–$700M in
              2025. This bottom-up figure is consistent with IMARC's top-down $1.31B when credit and savings are
              included.


              **SAM — Moniepoint's addressed segments:** Agency-banking/POS merchant acquiring + business banking + SME
              credit in Nigeria. Based on its 2025 transaction share (~80% of in-person payments, per management) and
              ₦412T processed, Moniepoint alone represents ~37% of reported POS+digital flows. Its SAM in revenue terms
              is estimated at $350–$600M based on publicly reported metrics and comparable take-rate assumptions.


              **SOM — 2026 realistic share:** Moniepoint's current captured share of its SAM is its revenue, which
              independent estimates place at $100–$300M (with low confidence; see Ch4). Its 2026 target expansion into
              UK remittance and Kenya microfinance adds a small but strategic SOM component. Remittance flows from the
              UK to Nigeria total ~$3B annually (World Bank); Moniepoint's MonieWorld targets a meaningful share.


              **Nigeria macro context:** Nigeria's adult population is approximately 112 million. Financial inclusion
              reached 64% by end-2023 (EFInA A2F survey), leaving ~40 million adults financially excluded. The CBN
              targets 95% inclusion by 2030, implying 34M adults to be banked in 6 years — a substantial addressable
              pool for digital-first operators. MSMEs number 40+ million entities, account for over 90% of businesses
              and ~48% of GDP, and face a documented $32.2B financing gap (IFC estimate).
