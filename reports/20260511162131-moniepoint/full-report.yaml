  - id: FE002
    type: journey-map
    title: Customer workflow / operating flow
    layout: wide
    summary: >-
      End-to-end SME merchant journey from initial onboarding through daily payment acceptance, credit qualification,
      working-capital loan disbursement, and Moniebook adoption — illustrating how each stage deepens platform lock-in
      and increases Moniepoint's data advantage.
    claimRefs:
      - CE003
      - CE006
      - CE016
      - CE019
      - CE025
      - CE026
      - CE034
      - CE038
    data:
      items:
        - label: 1. Business Onboarding
          detail: >-
            SME signs up; KYC via BVN/NIN verification through NIBSS; field agent delivers and installs POS terminal
            within 2–3 business days across all 36 states; geo-tagging registered per CBN mandate
          actor: Merchant + Moniepoint field agent
        - label: 2. Daily Payment Acceptance
          detail: >-
            Customer swipes card or scans QR code; POS routes through NIBSS; settlement completes in <5 seconds; offline
            mode buffers transactions if network drops and syncs on reconnection
          actor: Merchant + customer + NIBSS
        - label: 3. Transaction Data Accumulation
          detail: >-
            Each POS transaction flows into BigQuery via Confluent Kafka streams; ML model builds merchant credit
            profile from 6+ months of daily cashflow data — transaction velocity, regularity, and size
          actor: Moniepoint ML pipeline (automated)
        - label: 4. Credit Underwriting
          detail: >-
            After 6+ months of POS history, merchant becomes eligible; ML credit score computed; merchant applies
            in-app; underwriting decision issued in hours not weeks; no traditional credit bureau check required
          actor: Merchant (in-app) + Moniepoint MFB (automated)
        - label: 5. Loan Disbursement and Repayment
          detail: >-
            ₦14.3M avg loan disbursed to Moniepoint business account; 12–24 week tenor; daily automated repayment
            deducted from POS settlement account; no manual collection required
          actor: Merchant + Moniepoint MFB
        - label: 6. SaaS and Platform Deepening
          detail: >-
            Merchant upgrades to Moniebook for accounting and payroll; payroll disbursed via MFB bulk payment; data
            flywheel expands credit limit over time; full switching cost now covers terminal + account + loan + software
          actor: Merchant + Moniepoint ecosystem
  - id: FE003
    type: dag
    title: Critical dependency map
    layout: wide
    summary: >-
      Directed acyclic graph of Moniepoint's critical external dependencies — infrastructure, regulatory, and network —
      showing which nodes represent concentration risks and which are subject to adverse regulatory developments.
    claimRefs:
      - CE008
      - CE012
      - CE014
      - CE015
      - CE021
      - CE037
    data:
      nodes:
        - id: nibss
          label: NIBSS Settlement Rail
          detail: >-
            Nigeria Interbank Settlement System; mandatory for all domestic interbank transfers and POS clearing;
            CBN-regulated single-settlement-rail monopoly; no domestic alternative
          type: infrastructure
        - id: gcp_infra
          label: Google Cloud Platform
          detail: >-
            Primary cloud provider; GKE, Cloud Spanner, BigQuery, Vertex AI; no publicly disclosed on-premise fallback;
            vendor concentration risk if GCP has regional outage
          type: infrastructure
        - id: confluent_kafka
          label: Confluent Cloud (Kafka)
          detail: >-
            Real-time event streaming backbone; hosted managed service; settlement pipeline and ML feature engineering
            depend on Confluent availability; runs on GCP — compounded concentration
          type: infrastructure
        - id: cbn_reg
          label: CBN Regulatory Framework
          detail: >-
            National MFB licence; POS agent banking guidelines; single-principal rule (April 2026); geo-tagging mandate;
            ISO 20022 migration; MDR cap — all set by CBN unilaterally
          type: regulatory
        - id: card_networks
          label: Visa / Mastercard Rails
          detail: >-
            International card acceptance on POS; interchange economics set externally; Moniepoint is a sub-acquirer —
            scheme fees determined by networks, not Moniepoint
          type: infrastructure
        - id: ndpc
          label: NDPC / NDP Act 2023
          detail: >-
            Nigeria Data Protection Act 2023; NDPC investigation open as of August 2025; adverse finding could result in
            fines or mandatory remediation; outcome unresolved
          type: regulatory
      edges:
        - from: nibss
          to: gcp_infra
          label: NIBSS settlement events processed via GCP Kafka and Spanner
        - from: cbn_reg
          to: nibss
          label: CBN designates NIBSS as mandatory settlement infrastructure
        - from: confluent_kafka
          to: gcp_infra
          label: Confluent hosted on GCP — single cloud concentration amplified
        - from: card_networks
          to: nibss
          label: Visa/Mastercard international card transactions cleared through NIBSS
        - from: cbn_reg
          to: ndpc
          label: NDPC operates under broader CBN / National Privacy Council framework
