              - CO040
          - type: callout
            title: From Bank Back-End to National Infrastructure
            body: >
              Moniepoint's decade-long journey illustrates a deliberate strategy: gain deep understanding of the
              incumbent's weaknesses while serving as their vendor, then disintermediate. By starting with bank software
              infrastructure, TeamApt acquired knowledge of settlement failure points that it later exploited to build
              more reliable merchant-facing rails.
