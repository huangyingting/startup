            title: Regulatory Enforcement History — KYC Fine
            body: >
              In 2024, the CBN levied a ₦1 billion KYC compliance penalty on Moniepoint — the largest such fine in
              Nigerian fintech. While the company subsequently secured national MFB status in 2026, this enforcement
              history signals elevated regulatory scrutiny and the risk of future actions if compliance standards are
              not maintained at scale.
            calloutType: risk
