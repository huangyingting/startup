      - number: '8.4'
        title: Key Risk Factors
        blocks:
          - type: paragraph
            body: |
              **1. FX and naira devaluation risk (high):**
              The naira has devalued from ₦415/$ (2022) to approximately ₦1,600/$ (early 2026) — a 74%
              depreciation. Even with strong naira revenue growth, USD-denominated returns compound
              significantly slower. Moniepoint has no material natural hedge: UK (MonieWorld) and Kenya
              (Sumac) revenues are early-stage and immaterial versus Nigeria's ₦412T volume. USD investors
              must accept naira currency risk or negotiate dollar-denominated preference terms.

              **2. Credit risk concentration (high):**
              The ₦7B NPL disclosure (Alerzo ₦5B, Shoprite ₦2.4B) reveals a concentration risk in
              large-ticket corporate loans that diverge from Moniepoint's core data-driven SME model. If
              the lending book scales rapidly without maintaining the data-underwriting discipline that made
              the SME portfolio perform, First Bank-style write-offs become conceivable: First HoldCo wrote
              off ₦748B in bad loans in 2025, crashing profit by 92%.

              **3. Regulatory risk (medium-high):**
              The CBN has previously frozen Moniepoint's customer onboarding (April 2024) and fined it
              ₦1B for compliance infractions. The new National MFB licence brings greater visibility and
              scrutiny. A proposed Nigerian Fintech Regulatory Commission Bill would create a central
              regulator with broad licensing powers. An unfavourable CBN policy (e.g., POS fee caps,
              agent restrictions) could materially impair the payments revenue model.

              **4. Unaudited financials (blocking):**
              Moniepoint has not published audited accounts. All revenue, profitability, and NPL figures
              are either company-disclosed (unaudited) or third-party estimated. This prevents standard
              DCF modelling, ratio analysis, or covenant underwriting. Until audited P&L is available, any
              valuation analysis carries wide uncertainty.

              **5. Competition (medium):**
              OPay (50M users, $4B IPO target) and PalmPay (35M users) are aggressively expanding agent
              networks. Flutterwave (now with MFB licence) is entering the SME banking space. While
              Moniepoint has the largest POS footprint, competition for SME wallet share is intensifying.

              **6. Execution risk on expansion (medium):**
              Kenya (Sumac MFB acquisition) and UK (MonieWorld / Bancom acquisition) are capital-intensive
              new markets with different competitive dynamics. The UK team has spent $3.77M since February
              2024 with limited disclosed revenue. Failure to achieve break-even in international markets
              within 2–3 years could signal capital misallocation.
            claimRefs:
              - CV019
              - CV020
              - CV023
              - CV024
              - CV025
              - CV039
      - number: '8.5'
        title: Thesis Break and Kill Triggers
        blocks:
          - type: paragraph
            body: |
              Investment theses in high-growth emerging market fintechs require explicit thesis-break
              monitoring — the warning signs that indicate a scenario has shifted from base/bull to bear.

              **Thesis-break signals (reduce conviction, gather more data):**
              - NPL ratio on the loan book exceeds 3% in any audited period
              - CBN issues material enforcement action (licence restriction, fines > ₦5B) against Moniepoint
              - Naira depreciates below ₦2,000/$ on a sustained basis without revenue recovery
              - OPay IPO is completed at $4B+ and reveals competitive data showing Moniepoint losing POS share

              **Kill signals (exit or do not invest):**
              - Audited accounts reveal revenue materially below $400M or operating losses > $100M
              - NPL ratio exceeds 7% (Nigerian banking system crisis level)
              - CBN revokes National MFB licence or imposes binding agent restrictions
              - Management turnover: departure of CEO Tosin Eniolorunda or CTO Felix Ike without succession
              - Material restatement of historical volumes or transaction metrics

              Monitoring cadence: quarterly review of CBN regulatory actions, Opera/OPay filings (for market
              share proxy), NIBSS aggregate payment data (to track Moniepoint's share of national volume),
              and any Moniepoint data-room updates. Annual review of UK Companies House filings for
              subsidiary-level financial data.
            claimRefs:
              - CV019
              - CV024
              - CV039
          - type: table
            tableRef: TV005
            claimRefs:
              - CV019
              - CV020
              - CV024
              - CV039
      - number: '8.6'
        title: Final Recommendation and Diligence Asks
        blocks:
          - type: paragraph
            body: |
              **Recommendation: Track / Research More**

              Moniepoint presents a rare combination of genuine market leadership (₦412T volume,
              6M+ businesses), institutional validation (Visa, IFC, Google co-investors), and what
              appears to be a fundamentally undervalued mark (0.8x–1.5x P/S vs. 3–10x peers). This
              creates the possibility of a compelling entry, particularly for investors with a 5–7 year
              horizon and tolerance for naira FX risk.

              However, the blocking gap — no audited financial statements — makes it impossible to
              verify the revenue, margin, and credit quality claims on which the valuation analysis rests.
              Until audited accounts are available, the recommended posture is to:
              (a) engage the company for data-room access;
              (b) commission independent NPL sampling on the loan book;
              (c) request CBN regulatory correspondence to assess compliance posture;
              (d) model FX scenarios with a ₦2,000/$ assumption;
              (e) assess whether IFC's diligence process (which resulted in its investment) can be leveraged
              for documentation.

              If audited FY2025 accounts confirm $800M+ revenue with <2% NPL ratio and positive operating
              cash flow, the current $1B mark looks materially cheap and a selective investment is warranted
              at up to the current valuation with 2–3x return expectation in the base case.

              If audited accounts reveal revenue materially below $500M or losses, the $1B mark is
              stretched and investment should not proceed at this valuation.
            claimRefs:
              - CV001
              - CV008
              - CV016
              - CV019
              - CV039
          - type: table
            tableRef: TV006
            claimRefs:
              - CV001
              - CV019
              - CV024
              - CV039
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Investment Recommendation: Track / Research More'
            body: >-
              Moniepoint presents a structurally compelling investment case — dominant payment infrastructure, 6M+ SME
              customers, institutional co-investors (Visa, IFC, Google), and an implied P/S of 0.8x–1.5x that is
              materially discounted to African peers at 3–10x. However, the absence of audited financial statements is a
              blocking gap: revenue, margin, NPL provisioning, and profitability cannot be independently verified. The
              recommended posture is to Track / Research More — engage the company for data-room access, obtain audited
              FY2025 accounts, commission independent NPL sampling, and await the OPay IPO (Citi/DB/JPM-led, $4B target)
              as a market-pricing catalyst for the African fintech peer set. If audited accounts confirm $800M+ revenue
              and <2% NPL ratio with positive operating cash flow, the current $1B+ mark appears materially cheap with a
              3x base-case return pathway over 5 years.
            calloutType: recommendation
