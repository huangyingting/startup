      - number: '2.3'
        title: Buyer and Segment Map
        blocks:
          - type: paragraph
            body: >
              Moniepoint's market has four distinct buyer archetypes, each with different budget ownership, willingness
              to pay, and adoption trigger:


              **Segment 1 — Micro-merchants and POS agents (core):** Owner-operated shops, market stalls, fuel stations,
              pharmacies, restaurants. These merchants need affordable card acceptance and agency cash services. Budget
              owner is the merchant-proprietor; willingness to pay is low but switching cost is high once trained.
              Adoption trigger: CBN cash-restriction policies (January 2023) that forced consumers to transact
              digitally.


              **Segment 2 — SMEs (growth):** Registered businesses with 1–50 employees needing business current
              accounts, payroll processing, and working capital credit. Budget owner is the business owner/CFO.
              Willingness to pay is medium-high for bundled services. Adoption trigger: Moniebook integration and credit
              eligibility based on transaction history.


              **Segment 3 — Personal banking customers:** Individuals who opened Moniepoint personal accounts (launched
              August 2023) for day-to-day savings and transfers. Budget owner is the individual. Competition from OPay,
              PalmPay, and Kuda is intense in this segment.


              **Segment 4 — B2B payment-gateway clients:** E-commerce platforms, SaaS companies, and SMEs embedding
              payments via Monnify API. Budget owner is the tech/payments team. This is Moniepoint's closest equivalent
              to Paystack/Flutterwave's market.


              Geographic distribution: Urban-dense (Lagos, Abuja, Port Harcourt) accounts for the majority of
              transaction value; Northern Nigeria is underpenetrated but growing as CBN exclusion policies push
              adoption. Moniepoint's distribution model — via field agents who sign up and train merchants — addresses
              semi-urban and rural geographies where competitors have lower presence.
