  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: |
              Moniepoint presents a risk profile asymmetrically weighted toward regulatory enforcement and
              credit concentration, with secondary exposures in infrastructure and macroeconomic risk.

              **Top-tier risks (critical / high impact + high likelihood):** Regulatory risk sits at the apex.
              Moniepoint was fined ₦1 billion by the CBN for KYC/AML violations in Q2 2024 — not a warning
              letter but a formal, material enforcement action. Active litigation compounds this: the Federal
              High Court joined Moniepoint in a ₦21 billion POS merchant fraud case, and victims of the EMAAR
              Ponzi scheme have threatened a class-action lawsuit alleging Moniepoint's lax KYC enabled the
              fraud. The CBN's demonstrated willingness to act against Nigeria's largest fintechs with material
              penalties means that a repeat violation or licence restriction is an investable scenario, not an
              extreme tail risk.

              **Second-tier risks (high impact / medium likelihood):** NPL concentration is the critical
              financial risk. Two borrowers — Alerzo (~₦4.38B outstanding) and Shoprite Nigeria (~₦2.4B) —
              represent the majority of the disclosed ₦7B NPL book. Against an aggressive ₦1 trillion credit
              disbursement in FY2025, the true system-wide NPL ratio is not publicly disclosed. A credit-cycle
              turn in Nigeria's 30%+ inflation environment could amplify NPL formation rapidly. Infrastructure
              concentration (Google Cloud as primary/sole provider) ranks alongside NPL risk: a single GCP
              regional outage could halt all Moniepoint operations simultaneously.

              **Third-tier risks (medium impact / medium likelihood):** FX/macro risk — the naira depreciated
              ~75% against the USD since 2022 — and MDR compression risk (a 0.1% CBN cap reduction would
              eliminate ~₦412B in annualised MDR revenue) represent material but partially hedged risks.
              People and execution risk — CEO concentration, unproven international expansion track record, and
              competitive talent market — round out the third tier.

              Investment implication: The risk profile is manageable if the regulatory compliance posture is
              strengthened, the NPL book is stress-tested, and a cloud redundancy plan is documented. Kill
              criteria include CBN licence suspension, NPL exceeding 10% of the credit book, or EMAAR
              class-action certification with damages exceeding ₦10B.
