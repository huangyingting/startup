      - number: '4.5'
        title: Naira Devaluation and FX Sensitivity
        blocks:
          - type: paragraph
            body: |
              Naira devaluation is the single most significant risk to Moniepoint's USD-denominated financial
              metrics. From 2022 to 2026, the naira has depreciated from approximately ₦415/$1 to ₦1,600/$1 —
              a 74% devaluation in USD terms. This means that even though Moniepoint's naira revenues have grown
              substantially, its USD-equivalent revenue and valuation in USD terms grows much more slowly.

              Concretely: if Moniepoint earned ₦1T in naira revenue in 2024 at ₦1,000/$1, that was $1B USD.
              At ₦1,600/$1 in 2026, the same ₦1T is only $625M USD — a 37.5% reduction without any business
              deterioration. For USD-denominated investors (DPI, Visa, IFC), the ultimate return depends heavily
              on whether the naira stabilises or continues to depreciate at exit.

              Moniepoint has partial natural hedges: its UK subsidiary (Moniepoint GB / MonieWorld) generates
              GBP revenues; its Kenya operations (Sumac MFB) generate KES revenues. However, these are early-stage
              and immaterial relative to the Nigeria core business.

              The CBN's naira float (since 2023) has reduced intervention-driven distortions but not eliminated
              structural devaluation risk. Nigeria's current account deficit, oil revenue dependence, and fiscal
              deficit all contribute to persistent naira weakness.
