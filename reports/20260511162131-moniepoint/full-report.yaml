        - Audited FY2024 and FY2025 P&L, balance sheet, cash flow statements
        - All revenue, profitability, and NPL data unverified; cannot underwrite without audited accounts
        - Moniepoint (data room); Nigerian CAC filings if available
        - KPMG, PwC, Deloitte, or EY Nigeria-audited accounts with unqualified opinion
      - - BLOCKING
        - NPL cohort analysis and loan loss provisioning methodology
        - ₦7B NPLs in Alerzo/Shoprite suggest model failure risk; provisioning adequacy unknown
        - Moniepoint CFO / credit team
        - Loan-level NPL schedule; provision coverage ratio vs. CBN required minimum
      - - High
        - Revenue breakdown by segment (MDR / Monnify / interest / SaaS)
        - Bottom-up model assumes revenue mix; actual mix affects margin and quality analysis
        - Moniepoint CFO
        - Segment revenue waterfall with gross margin by segment
      - - High
        - CBN regulatory correspondence and examination reports (last 3 years)
        - Two enforcement actions (onboarding freeze, ₦1B fine) indicate compliance posture risk
        - Moniepoint General Counsel; can be excerpted/redacted
        - No material outstanding enforcement; remediation evidence for past actions
      - - High
        - FX hedging strategy and USD/GBP balance sheet breakdown
        - 74% naira devaluation since 2022; USD investors need visibility on hard-currency exposure
        - CFO / Treasury
        - Treasury policy document; FX position report as of latest quarter
      - - Medium
        - UK subsidiary (Moniepoint GB Ltd) FY2024 accounts filed at Companies House
        - Subsidiary next due 30 Sep 2026; early filing or interim data provides revenue/cost signal
        - UK Companies House (public once filed)
        - Moniepoint GB Ltd FY2024 accounts; management accounts if audited unavailable
      - - Medium
        - Kenya (Sumac MFB) regulatory approval status and capital deployment plan
        - Kenya is primary expansion market; CBK approval status and initial NPL experience important
        - Moniepoint international expansion team
        - CBK licence confirmation; 12-month Kenya P&L forecast with headcount plan
      - - Medium
        - Cap table with full dilution schedule (SAFEs, options, warrants)
        - DFI investors may hold protective provisions; dilution impacts IRR model
        - Moniepoint General Counsel
        - Full cap table model with waterfall at multiple exit values
