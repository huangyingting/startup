      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              **Structural growth drivers:**

              (a) Financial inclusion policy mandate: CBN targets 95% inclusion by 2030; agency banking is the primary
              last-mile delivery mechanism.

              (b) CBN cash-restriction regulations: Weekly cash withdrawal limits (₦500,000 individual, ₦5M business)
              introduced in 2023 have durably shifted transaction volume to digital channels. POS transactions grew 301%
              YoY in Q1 2025 alone.

              (c) SME credit underserve: $32.2B financing gap with fewer than 5% of MSMEs having bank credit access
              creates a persistent and large lending opportunity for Moniepoint MFB.

              (d) CBN single-principal rule (effective April 2026): Each POS agent must affiliate exclusively with one
              provider; this is a consolidation catalyst that advantages large, well-capitalised operators and could be
              the most consequential structural tailwind for Moniepoint in 2026.

              (e) Nigeria's young, mobile-first population: 50%+ smartphone penetration and growing; median age 18.


              **Adoption constraints:**

              (a) Regulatory compliance costs: National MFB status (January 2026) requires ₦5B minimum capital and
              significantly higher compliance investment. The 2026 CBN Fintech Report introduces enhanced
              consumer-protection, data-localisation, and AML requirements that raise cost-to-serve.

              (b) Macro headwinds: Naira devaluation (₦1,600/$1 as of 2026) erodes USD revenue multiples and compresses
              international investor returns even when naira-denominated revenues grow.

              (c) Credit risk: Rising SME NPLs in a high-inflation environment (CPI ~33% in 2024-2025) threaten
              Moniepoint's lending book quality.

              (d) Infrastructure: Power outages and internet connectivity gaps in rural areas increase POS downtime and
              constrain deployment.

              (e) Trust barriers: Fraud incidents and CBN enforcement actions erode merchant and consumer confidence in
              digital payments, requiring ongoing brand investment.
