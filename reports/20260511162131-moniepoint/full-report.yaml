  - id: FV001
    type: flow
    title: Investment Decision Logic
    slug: recommendation-logic
    summary: >-
      Structured decision tree mapping from scale evidence through valuation analysis to the Track/Research More
      recommendation, identifying the blocking gaps that prevent a higher conviction rating.
    claimRefs:
      - CV001
      - CV005
      - CV006
      - CV008
      - CV016
      - CV019
    data:
      nodes:
        - id: scale
          label: Scale Evidence
          detail: ₦412T FY2025 volume; ~80% Nigeria POS share; 6M+ businesses; 14B transactions
        - id: profitability
          label: Profitability Claim
          detail: Company-claimed first African unicorn to reach profitability; institutional DFI co-investment corroborates
        - id: valuation_check
          label: Valuation Check
          detail: $1B+ at 0.8x–1.5x P/S vs. peers at 3–10x; appears discounted
        - id: blocking_gap
          label: Blocking Gap
          detail: No audited P&L; unverified NPLs; no prospectus; cannot underwrite at standard conviction
        - id: peer_discount
          label: Peer Discount Context
          detail: >-
            Naira risk + single-market + illiquidity justify 50–70% discount vs. developed-market comps; still appears
            cheap vs. OPay/Flutterwave
        - id: adverse_flags
          label: Adverse Flags
          detail: ₦7B NPL concentration; CBN ₦1B fine (2024); no public financials; Flutterwave now MFB competitor
        - id: recommendation
          label: Track / Research More
          detail: Engage data room; obtain audited accounts; commission NPL sampling; monitor OPay IPO for peer pricing signal
  - id: FV002
    type: bar
    title: Valuation Sensitivity — Revenue Multiple Scenarios (USD M)
    slug: valuation-sensitivity
    summary: >-
      Implied Moniepoint valuation at different P/S multiples applied to a $940M revenue midpoint (mid-point of
      $648M–$1.24B bottom-up range), compared to peer-implied valuations based on OPay and Flutterwave comparable
      multiples.
    claimRefs:
      - CV001
      - CV008
      - CV010
      - CV011
      - CV012
      - CV016
    data:
      items:
        - label: 'Bear: 0.8x P/S ($648M rev)'
          value: 518
          unit: USD M
          note: Low-end revenue × 0.8x multiple; current mark near this level
        - label: 'Base: 1.0x P/S ($940M rev)'
          value: 940
          unit: USD M
          note: Midpoint revenue × 1.0x; broadly consistent with $1B+ current mark
        - label: 'Bull: 2.0x P/S ($940M rev)'
          value: 1880
          unit: USD M
          note: Midpoint revenue × 2.0x; justified if profitability confirmed and Africa expansion tracks
        - label: 'OPay peer: 3x P/S ($940M rev)'
          value: 2820
          unit: USD M
          note: Applying OPay IPO-implied 3x multiple to Moniepoint revenue midpoint
        - label: 'Flutterwave peer: 5x P/S ($940M rev)'
          value: 4700
          unit: USD M
          note: Applying Flutterwave 2022 implied 5x multiple; upper bound; unverified revenue base
  - id: FV003
    type: range
    title: Valuation and Return Range by Scenario
    slug: valuation-return-range
    summary: >-
      Low/high valuation ranges and 5-year IRR bands under bear, base, and bull scenarios from entry at $1B+.
      USD-denominated returns assume naira-to-dollar conversion at exit.
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV039
    data:
      items:
        - label: Bear case valuation at exit (USD M)
          low: 500
          high: 700
          unit: USD M
          note: 0.8x–1.1x est. FY2025 revenue; NPL spike, CBN headwinds, FX erosion scenario
        - label: Base case valuation at exit (USD M)
          low: 800
          high: 1500
          unit: USD M
          note: 1x–1.5x FY2025 est. revenue near-term; ~2x FY2027 revenue at M&A; Nigeria-dominant
        - label: Bull case valuation at exit (USD M)
          low: 1500
          high: 3500
          unit: USD M
          note: 2x–3x FY2027 est. revenue; IPO or strategic acquisition; Africa expansion delivered
        - label: 5-year exit IRR (bear)
          low: -2
          high: 5
          unit: '%'
          note: Effectively flat to negative in USD after FX erosion; ~0.7x money-on-money
        - label: 5-year exit IRR (base)
          low: 20
          high: 25
          unit: '%'
          note: ~3x money-on-money; M&A exit at ~$3B; adequate but not exceptional for risk profile
        - label: 5-year exit IRR (bull)
          low: 35
          high: 42
          unit: '%'
          note: ~5–6x money-on-money; IPO/strategic exit at $6B+; requires pan-Africa success
