  evidenceGaps:
    - type: non-public-data
      severity: moderate
      topic: "Regulatory / legal risk register — completeness of litigation and enforcement (TR001)"
      missingEvidence: "Table TR001 reflects only publicly documented CBN enforcement actions, court filings, and press coverage. Undisclosed regulatory correspondence, sealed court proceedings, and unreported compliance incidents are not captured. The NDPC investigation outcome remains open as of May 2026."
      whyItMatters: "The visible regulatory footprint may understate Moniepoint's true enforcement risk; private CBN supervisory letters or unreported incidents could signal a broader compliance weakness not yet public."
      diligencePath: "Request the full CBN correspondence file, all regulatory letters received in 2023–2026, legal register of all pending claims, and NDPC investigation correspondence."
      relatedQuestionRefs: [QR005, QR006, QR022]
      relatedTableRefs: [TR001]

    - type: non-public-data
      severity: major
      topic: System-wide NPL ratio and credit loss provisioning
      missingEvidence: "Moniepoint has not publicly disclosed its total NPL ratio as a percentage of the ₦1 trillion credit book, nor has it disclosed its credit loss provisioning rate by borrower vintage. Only two named NPL borrowers (Alerzo and Shoprite Nigeria) have been reported in press; the true portfolio-wide default rate is unknown."
      whyItMatters: "Without the system-wide NPL ratio and provisioning data, it is impossible to assess whether Moniepoint's credit model is performing as intended or whether the aggressive 3x lending growth has created latent credit risk that will crystallise in 2026–2027 as the credit cycle turns."
      diligencePath: "Request complete NPL register segmented by borrower size, vintage, and sector from Moniepoint management; request credit loss provision schedule and write-off history by cohort; compare with Nigerian MFB sector NPL benchmarks from CBN supervisory data."
      relatedQuestionRefs: [QR011, QR030]

    - type: non-public-data
      severity: major
      topic: Capital adequacy ratio vs ₦5B national MFB minimum
      missingEvidence: "Moniepoint has stated that it meets the ₦5B national MFB minimum capital requirement but has not published a formal capital adequacy statement, CBN-verified tier-1 capital ratio, or regulatory capital certificate. Given the aggressive credit book growth and growing NPL, the headroom above the minimum floor is not publicly quantifiable."
      whyItMatters: "A capital adequacy breach would trigger CBN mandatory intervention and could impose restrictions on Moniepoint's ability to extend new credit or issue new terminal licences — a direct threat to the growth thesis."
      diligencePath: "Request the most recent capital adequacy certificate from CBN supervision, management-calculated tier-1 capital ratio, and stress-test results showing the capital position under a 5%, 10%, and 15% NPL scenario."
      relatedQuestionRefs: [QR014, QR035]

    - type: private-evidence-only
      severity: moderate
      topic: Multi-cloud disaster recovery architecture
      missingEvidence: "Moniepoint has publicly confirmed use of Google Cloud but has not disclosed any secondary cloud, on-premises backup, or formal disaster recovery architecture. RTO (Recovery Time Objective) and RPO (Recovery Point Objective) targets are not publicly stated."
      whyItMatters: "A single-cloud architecture at ₦412 trillion annual transaction volume creates a concentration risk that is unusual for a systemic payment infrastructure operator. Without DR documentation, investors cannot assess the severity of a GCP outage scenario."
      diligencePath: "Request cloud architecture documentation, DR runbook, RTO/RPO targets, and any multi-cloud or bare-metal backup plans from Moniepoint engineering; request GCP SLA documentation and incident history."
      relatedQuestionRefs: [QR018, QR031]

    - type: non-public-data
      severity: moderate
      topic: EMAAR lawsuit and ₦21B fraud case status and quantified liability
      missingEvidence: "The EMAAR class-action threat and the ₦21B Federal High Court case are both documented in press but the current procedural status, claimed damages, and legal counsel's assessment of the probability of adverse outcome are not publicly available."
      whyItMatters: "Contingent liabilities from litigation can materially affect enterprise value and create capital adequacy risk. Without a legal opinion and claim quantification, investors cannot model the downside scenario."
      diligencePath: "Request legal counsel's written opinion on the EMAAR and ₦21B cases, current procedural status, estimated range of potential liability, and insurance coverage; request copies of court filings."
      relatedQuestionRefs: [QR002, QR003, QR006, QR023]

    - type: private-evidence-only
      severity: minor
      topic: Agent fraud incident rate and KYC remediation plan post-CBN fine
      missingEvidence: "Moniepoint has not disclosed the rate of agent fraud incidents, the number of KYC enforcement failures that triggered the CBN fine, or the specific remediation plan submitted to the CBN following the ₦1B fine."
      whyItMatters: "The CBN fine signals a systemic KYC control gap; without understanding the scope and root cause, investors cannot assess whether the remediation addresses the underlying compliance failure or merely the surface manifestation."
      diligencePath: "Request the CBN enforcement letter, Moniepoint's formal response and remediation plan, and the KYC framework upgrade documentation with implementation timeline."
      relatedQuestionRefs: [QR001, QR021]

