company:
  name: Moniepoint
chapter:
  number: 7
  title: Risks
  summary: >-
    Moniepoint's risk profile is dominated by four interlocking categories: active regulatory enforcement
    (CBN ₦1B KYC/AML fine, pending litigation including a ₦21B fraud court case and potential EMAAR
    Ponzi class action, and a wave of new CBN compliance mandates), credit/NPL concentration (two
    borrowers account for the majority of a disclosed ₦7B NPL book against a ₦1 trillion credit
    portfolio), infrastructure concentration (80%+ on Google Cloud with no disclosed secondary provider),
    and macroeconomic FX exposure (naira down ~75% vs USD since 2022). The Series C $200M equity
    injection provides meaningful capital buffer, and the January 2026 national MFB licence upgrade
    confers regulatory stability, but the convergence of enforcement, litigation, and credit-cycle risk
    demands granular diligence before capital commitment.

sections:
  - id: Rch-S01
    title: Risk Overview and Severity Ranking
    body: |
      Moniepoint presents a risk profile asymmetrically weighted toward regulatory enforcement and
      credit concentration, with secondary exposures in infrastructure and macroeconomic risk.

      **Top-tier risks (critical / high impact + high likelihood):** Regulatory risk sits at the apex.
      Moniepoint was fined ₦1 billion by the CBN for KYC/AML violations in Q2 2024 — not a warning
      letter but a formal, material enforcement action. Active litigation compounds this: the Federal
      High Court joined Moniepoint in a ₦21 billion POS merchant fraud case, and victims of the EMAAR
      Ponzi scheme have threatened a class-action lawsuit alleging Moniepoint's lax KYC enabled the
      fraud. The CBN's demonstrated willingness to act against Nigeria's largest fintechs with material
      penalties means that a repeat violation or licence restriction is an investable scenario, not an
      extreme tail risk.

      **Second-tier risks (high impact / medium likelihood):** NPL concentration is the critical
      financial risk. Two borrowers — Alerzo (~₦4.38B outstanding) and Shoprite Nigeria (~₦2.4B) —
      represent the majority of the disclosed ₦7B NPL book. Against an aggressive ₦1 trillion credit
      disbursement in FY2025, the true system-wide NPL ratio is not publicly disclosed. A credit-cycle
      turn in Nigeria's 30%+ inflation environment could amplify NPL formation rapidly. Infrastructure
      concentration (Google Cloud as primary/sole provider) ranks alongside NPL risk: a single GCP
      regional outage could halt all Moniepoint operations simultaneously.

      **Third-tier risks (medium impact / medium likelihood):** FX/macro risk — the naira depreciated
      ~75% against the USD since 2022 — and MDR compression risk (a 0.1% CBN cap reduction would
      eliminate ~₦412B in annualised MDR revenue) represent material but partially hedged risks.
      People and execution risk — CEO concentration, unproven international expansion track record, and
      competitive talent market — round out the third tier.

      Investment implication: The risk profile is manageable if the regulatory compliance posture is
      strengthened, the NPL book is stress-tested, and a cloud redundancy plan is documented. Kill
      criteria include CBN licence suspension, NPL exceeding 10% of the credit book, or EMAAR
      class-action certification with damages exceeding ₦10B.
    claimRefs: [CR001, CR002, CR003, CR004, CR005, CR006]
    tableRefs: []
    figureRefs: [FR001]

  - id: Rch-S02
    title: Regulatory and Legal Risk
    body: |
      Moniepoint's regulatory and legal risk profile is the single most consequential risk category
      for investors, combining active enforcement actions, pending litigation, and a wave of new CBN
      mandates that impose compliance cost and operational constraints simultaneously.

      **CBN KYC/AML Enforcement:** In Q2 2024, the CBN fined Moniepoint ₦1 billion (approximately
      $633,990 USD at prevailing exchange rates) for KYC and AML violations alongside a similar fine
      on OPay. This was a formal enforcement action — not a warning — signalling the CBN's willingness
      to impose material penalties on Nigeria's largest fintechs. The Corporate Affairs Commission (CAC)
      subsequently recommended placing OPay and Moniepoint on a regulatory watchlist and reporting them
      to the CBN (December 2025). Repeated violations of KYC/AML requirements at this severity could
      trigger licence restrictions, enhanced supervision, or suspension of payment operations.

      **Active Litigation:** Two significant court cases are active as of the report date. The Federal
      High Court formally joined Moniepoint as a party in a ₦21 billion fraud case related to POS
      merchant fraud (2025). Separately, victims of the EMAAR Ponzi scheme have threatened or filed a
      class-action lawsuit against Moniepoint, alleging the company's inadequate KYC controls enabled
      the fraudulent scheme to operate at scale. If certified as a class action, the EMAAR lawsuit could
      generate material litigation liability and severe reputational damage. The Alerzo court order
      (secured by Moniepoint for ₦4.38B debt recovery) is an additional active legal proceeding.

      **NDPC Data Protection Investigation:** Nigeria's Data Protection Commission (NDPC) named
      Moniepoint in a 2025 investigation for potential non-compliance with the Nigeria Data Protection
      Act 2023. Enforcement could result in fines or mandatory remediation at a moment when the company
      handles financial data for 6M+ businesses — creating significant data-handling risk if the probe
      results in adverse findings.

      **New CBN Mandates (2025–2026):** The single-principal agent banking rule (October 2025) requires
      POS agents to work exclusively with one financial institution, potentially constraining Moniepoint's
      agent network if competing operators offer better terms. The POS geo-tagging mandate (August 2025)
      required 4.2 million terminals to be GPS-tagged within 60 days, imposing an operational sprint.
      The ISO 20022 migration deadline (October 2025) imposes a technical compliance requirement where
      non-compliance means disconnection from NIBSS — Nigeria's national payment switch. Meanwhile,
      the national MFB licence upgrade (January 2026) elevates minimum capital requirements to ₦5B
      and subjects Moniepoint to enhanced supervisory scrutiny.
    claimRefs: [CR007, CR008, CR009, CR010, CR011, CR012, CR013, CR014, CR015, CR016]
    tableRefs: [TR001]
    figureRefs: []

  - id: Rch-S03
    title: Operational and Technology Risk
    body: |
      Moniepoint's operational risk profile is defined by infrastructure concentration, hardware
      supply-chain dependencies, NIBSS systemic exposure, and the inherent fraud and cybersecurity
      risks of processing 14 billion transactions annually across 140,000+ POS terminals and 1,500+
      field agents.

      **Google Cloud Concentration:** 80%+ of Moniepoint's infrastructure runs on Google Cloud Platform
      (GCP), leveraging Google Kubernetes Engine (GKE) for container orchestration and Cloud Spanner
      for distributed transactional databases. No secondary cloud provider or formal multi-cloud
      architecture has been publicly disclosed. This creates a single-provider dependency at a scale
      of ₦412 trillion in annual transaction value: a major GCP regional outage, unilateral pricing
      change, or service termination could halt all Moniepoint operations simultaneously. For a company
      processing approximately 80% of Nigeria's in-person electronic payments, this is a systemic risk
      that extends beyond Moniepoint to Nigeria's broader payments infrastructure.

      **Confluent Cloud Dependency:** Moniepoint's real-time payment event streaming runs on Confluent
      Cloud's managed Apache Kafka service. Any Confluent service disruption would immediately impair
      real-time transaction processing and settlement flows. Unlike Google Cloud, Confluent is a
      single-vendor service with no disclosed fallback.

      **NIBSS Systemic Dependency:** All card and transfer settlements in Nigeria route through the
      Nigeria Inter-Bank Settlement System (NIBSS). NIBSS outages cascade directly to all Moniepoint
      transaction settlement regardless of Moniepoint's own infrastructure reliability. Nigeria's payment
      infrastructure has experienced intermittent NIBSS-related disruptions historically.

      **POS Hardware Supply Chain:** Moniepoint's 140,000+ terminals are Android-based devices sourced
      primarily from Chinese manufacturers. Trade disruptions, component shortages, or CBN restrictions
      on imported payment hardware could constrain terminal deployment and slow merchant acquisition.
      The geo-tagging mandate adds a compliance dimension — each terminal must be geo-tagged, requiring
      physical field-agent visits to existing terminal locations.

      **Field Agent and Cybersecurity Risk:** The 1,500+ field agent network represents a distributed
      operational risk — rogue agents could commit fraud, breach KYC protocols, or conduct social
      engineering attacks on merchants. At 14 billion transactions per year, fraud at scale is material:
      Trustpilot reviews consistently cite account freezes (linked to fraud-detection false positives)
      as Moniepoint's most common service failure mode, indicating both a fraud risk and a customer
      experience risk from overzealous fraud controls.
    claimRefs: [CR017, CR018, CR019, CR020, CR021, CR022, CR023, CR024, CR025, CR026]
    tableRefs: [TR002]
    figureRefs: [FR002]

  - id: Rch-S04
    title: Partner, Dependency, and Financial Risk
    body: |
      Moniepoint's financial risk profile centres on NPL concentration in its credit book, FX/macro
      exposure from naira devaluation, potential MDR cap compression, and partner dependencies that
      could disrupt operations or increase costs.

      **NPL Concentration:** The disclosed NPL book of ₦7 billion is highly concentrated in two
      borrowers. Alerzo (a B2B commerce company) defaulted on a ₦5B facility; ~₦4.38B remains
      outstanding, and Moniepoint has secured a court order forcing asset sales. Shoprite Nigeria's
      ~₦2.4B facility is also reportedly non-performing. Two borrowers representing the majority of a
      disclosed ₦7B NPL book against a ₦1 trillion FY2025 credit portfolio constitutes severe
      concentration risk. Crucially, the system-wide NPL ratio has not been publicly disclosed. The
      combination of 3x lending growth in FY2025 and Nigeria's 30%+ inflation environment significantly
      amplifies the risk of further NPL formation in FY2026.

      **FX and Macro Risk:** The naira depreciated from approximately ₦415/$ in 2022 to ₦1,600/$ by
      late 2025 — a ~75% USD-equivalent revenue reduction. While Moniepoint's cost base is also naira-
      denominated, any USD-denominated obligations (technology vendor contracts, international credit
      facilities, international investor reporting) are materially impacted. MonieWorld UK provides a
      small FX hedge but is pre-material.

      **MDR Compression Risk:** A significant portion of Moniepoint's payment revenue derives from
      the 0.5% Merchant Discount Rate (MDR) cap on POS transactions. A CBN cap reduction of even 0.1%
      (to 0.4%) would eliminate approximately ₦412 billion in annualised MDR revenue at current
      transaction volumes. The CBN has demonstrated willingness to intervene in payment pricing
      through prior MDR directives.

      **Partner Dependency Register:** Google Cloud (primary infrastructure), Confluent Cloud
      (event streaming), NIBSS (settlement rails), and Visa (card network + Series C investor) represent
      the four highest-impact partner dependencies. Visa's dual role as investor and card network creates
      a potential conflict: if Visa modifies network fees or card acceptance policies, Moniepoint faces
      pressure both as a financial partner and as an equity co-investor. IFC/World Bank concessional
      lending keeps Moniepoint MFB's cost of funds below commercial rates — any policy change would
      increase funding costs and compress net interest margin.

      **Capital Adequacy:** The national MFB licence requires ₦5B minimum capital. Moniepoint has
      claimed compliance but has not made a public capital adequacy disclosure. Given the aggressive
      lending growth and growing NPL risk, capital ratios warrant independent verification in diligence.
    claimRefs: [CR027, CR028, CR029, CR030, CR031, CR032, CR033, CR034, CR035, CR036]
    tableRefs: [TR003, TR004]
    figureRefs: [FR003]

  - id: Rch-S05
    title: Mitigations and Kill Criteria
    body: |
      Moniepoint has implemented or is in the process of implementing mitigations across its principal
      risk categories. Several mitigations are well-developed and structurally embedded; others are
      nascent and unproven at scale.

      **Key Mitigations in Place:** (1) Geographic diversification: MonieWorld UK (launched 2024) and
      Sumac Kenya (early-stage) provide FX and geographic hedge against naira concentration, though
      both are pre-material with 2–3 year revenue timelines. (2) Capital adequacy buffer: The Series C
      $200M equity injection provides a substantial cushion against the ₦5B national MFB minimum capital
      requirement and credit loss reserves. (3) Proprietary ML credit scoring: Moniepoint's credit risk
      model uses POS transaction history as alternative data for SME credit scoring — a proprietary
      approach that theoretically provides better risk signals than traditional bureau scores for informal
      merchants, though model performance has not been independently validated. (4) National MFB licence
      stability: The CBN upgrade to national MFB status in January 2026 reduces regulatory downgrade
      risk and signals institutional trust, while also elevating obligations. (5) IFC/World Bank
      partnership: Concessional credit facilities reduce cost of funds versus commercial lenders,
      supporting net interest margin. (6) POS offline-first design: Moniepoint's offline-capable POS
      terminals buffer in-store transactions during NIBSS or connectivity outages, partially mitigating
      the systemic settlement dependency.

      **Kill Criteria (Thesis-Break Triggers):** The following conditions would materially break the
      investment thesis and require immediate investor reassessment: (a) CBN licence suspension or
      restriction on payment operations or MFB activities; (b) Disclosed NPL ratio exceeding 10% of
      the ₦1T+ credit book without adequate provisioning; (c) EMAAR class-action lawsuit certified with
      claimed damages exceeding ₦10B, creating material contingent liability; (d) CBN MDR cap reduced
      below 0.3%, eliminating the core payment revenue model; (e) Google Cloud outage lasting >24
      hours during Nigerian business hours, demonstrating catastrophic single-cloud failure; (f) Failure
      to meet ₦5B national MFB minimum capital adequacy with confirmed CBN intervention.

      **Key Diligence Asks:** (1) Management accounts showing NPL ratio and provisioning by borrower
      vintage and sector; (2) Capital adequacy certificate from CBN or management calculation vs ₦5B
      minimum; (3) Status of EMAAR lawsuit and ₦21B fraud court case with legal counsel opinion;
      (4) Cloud architecture documentation including disaster recovery, RTO/RPO targets, and any
      multi-cloud or backup plans; (5) Agent fraud incident log and KYC remediation plan post-CBN fine;
      (6) NDPC investigation status and data protection compliance roadmap with timeline.
    claimRefs: [CR037, CR038, CR039, CR040, CR041]
    tableRefs: [TR005]
    figureRefs: []

