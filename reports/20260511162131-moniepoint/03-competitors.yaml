callouts:
  - calloutType: strength
    title: "MFB Licence as Decisive Regulatory Moat"
    body: "Moniepoint's National MFB licence (January 2026) separates it from PSB-licensed competitors (OPay, PalmPay, MTN MoMo), enabling on-balance-sheet lending unavailable to rivals. The ₦5B minimum capital requirement and multi-year CBN approval process create a high barrier to replication."
    claimRefs: [CP029, CP032]

  - calloutType: risk
    title: "CBN Single-Principal Window Is a Double-Edged Sword"
    body: "While the April 2026 single-principal rule advantages Moniepoint in agent retention, it also creates concentrated platform risk: agents who choose Moniepoint and experience terminal downtime or dispute resolution failures have no fallback. Execution risk is high during the 12-24 month consolidation window."
    claimRefs: [CP003, CP033, CP037]

  - calloutType: insight
    title: "Competitive Map Is Shifting From Consumer to SME"
    body: "In 2021-2023, the primary competitive arena was consumer wallet user count (OPay vs PalmPay). By 2026, the central competition has moved to SME banking and credit — where Moniepoint holds the clearest structural advantages. OPay and Flutterwave are both accelerating to close this gap."
    claimRefs: [CP002, CP019, CP035]
