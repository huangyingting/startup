company:
  name: Moniepoint
chapter:
  number: 3
  title: Competitive Landscape
  summary: >-
    Moniepoint commands approximately 80% of Nigeria's in-person payment volume and holds the dominant
    position in POS/agency-banking, while OPay (50M+ users) leads in consumer mobile wallets and PalmPay
    (40M+ users) contests the consumer segment. Flutterwave and Paystack occupy the B2B gateway niche;
    Kuda and MTN MoMo serve distinct consumer and telco-led segments respectively. The CBN single-principal
    rule (April 2026) is a consolidation catalyst that systematically advantages Moniepoint's scale and compliance
    readiness, reinforcing an already formidable network-effect moat.

sections:
  - id: Pch-S01
    title: Competitive Landscape Overview
    body: |
      Nigeria's fintech sector has evolved from a fragmented set of point-solution providers into a multi-layered
      ecosystem where four distinct competitive arenas are playing out simultaneously: (1) POS/agency-banking
      for merchant payment acceptance; (2) consumer digital wallets and mobile money; (3) B2B payment gateway
      APIs for e-commerce and SaaS; and (4) SME banking, credit, and embedded finance. No single player dominates
      all four arenas — but Moniepoint is the only company positioned to compete credibly across all of them
      while holding a National Microfinance Bank (MFB) licence that enables on-balance-sheet lending.

      The competitive landscape is shaped by five structural forces: (a) Nigeria's 112-million-adult population
      with 64% financial inclusion (leaving 40M unbanked adults); (b) CBN regulatory architecture that
      differentiates between Payment Service Banks (PSBs), agency-banking super-agents, and MFBs — each with
      different product and capital constraints; (c) the April 2026 single-principal POS rule that forces
      every agent to pick one exclusive provider; (d) a $32.2B SME financing gap that represents a massive
      credit opportunity; and (e) the naira's structural devaluation which compresses USD returns even as
      naira revenues grow.

      As of mid-2026, the main competitors can be grouped into three tiers. Tier-1 players with scale: OPay
      and PalmPay dominate consumer wallet share; Moniepoint dominates merchant-side POS volume. Tier-2
      gateway specialists: Flutterwave and Paystack compete for developer mindshare and B2B payment
      infrastructure. Tier-3 niche and legacy players: Kuda Bank (consumer digital), MTN MoMo (telco PSB),
      Interswitch (legacy infrastructure), and the tier-1 commercial banks (Access, GTCO, Zenith).
    claimRefs: [CP001, CP002, CP003, CP004, CP005]
    tableRefs: [TP001]

  - id: Pch-S02
    title: OPay — Consumer Wallet Giant Under IPO Pressure
    body: |
      OPay (Opera subsidiary backed by SoftBank Vision Fund 2) is Moniepoint's most formidable competitor
      by user count with 50 million+ registered users in Nigeria as of 2025, and an estimated $2.75 billion
      valuation despite a funding slowdown. OPay raised $400 million in its 2021 Series C — its last major
      round — and is reportedly targeting a $4 billion valuation with a planned US IPO in 2026, giving it
      a strong incentive to demonstrate growth metrics before listing.

      OPay's core product is a consumer mobile wallet enabling P2P transfers, bill payments, airtime top-up,
      and agent cash-in/cash-out services. It built its initial dominance through its agent network —
      reportedly crossing 300,000 POS agents by 2020 — and has since maintained a massive consumer user
      base. However, OPay has historically been weaker on the merchant-acquiring and SME banking side,
      where Moniepoint has superior infrastructure. OPay faced a temporary onboarding freeze by the CBN in
      April 2024 over compliance concerns, signalling regulatory friction that Moniepoint has not faced at
      the same scale.

      Under the CBN single-principal rule, OPay's agents — many of whom were running terminals from multiple
      providers — are forced to choose exclusively. OPay's massive agent base is both an asset and a
      liability: it now must retain those agents against Moniepoint's superior merchant tools and credit
      offering. Monthly transaction volume of $12B (mid-2025) underscores OPay's transaction scale, but its
      take-rate and profitability remain undisclosed.
    claimRefs: [CP006, CP007, CP008, CP009, CP010, CP011]
    tableRefs: [TP002]
    figureRefs: [FP001]

  - id: Pch-S03
    title: PalmPay — Transsion Distribution Engine
    body: |
      PalmPay operates under Transsnet Financial Services, a joint venture between Transsion Holdings
      (Africa's dominant smartphone manufacturer: Tecno, Infinix, itel brands) and NetEase (Chinese
      tech company). PalmPay's structural advantage is pre-installation on Transsion smartphones, giving
      it zero-cost acquisition of millions of first-time smartphone users in Nigeria, Ghana, Tanzania,
      and other African markets.

      By September 2025, PalmPay surpassed 40 million customers in Nigeria and was processing over
      15 million daily transactions — up from ~10 million daily in 2024, a 50% year-on-year jump. User
      engagement is reportedly high, with an average of 50 transactions per month per user and an estimated
      80% customer retention rate. PalmPay's 1 million+ agent network provides cash-in/cash-out services,
      giving it nationwide distribution similar to OPay.

      PalmPay's competitive weakness relative to Moniepoint is its limited SME banking and credit offering:
      PalmPay primarily serves consumers and micro-merchants through its wallet product, without the
      full-stack business banking (Moniebook), MFB-licensed credit, or Monnify-equivalent B2B gateway
      that Moniepoint offers. Its Transsion link also means it is more exposed to handset market dynamics
      and may struggle to serve merchants who use non-Transsion devices.
    claimRefs: [CP012, CP013, CP014, CP015, CP016, CP017]
    tableRefs: [TP003]

  - id: Pch-S04
    title: Flutterwave and Paystack — Gateway Infrastructure Specialists
    body: |
      Flutterwave and Paystack are Nigeria's most prominent B2B payment gateway operators, but they occupy
      a fundamentally different competitive position from Moniepoint. Both focus on API-based payment
      collection for online businesses, e-commerce platforms, and developers — not on physical POS terminals,
      SME banking, or on-balance-sheet lending.

      Flutterwave carries a $3 billion valuation (implied by 2022 Series D at $3B), has processed over
      $40 billion in lifetime payment volume, and secured a National MFB licence in 2026, signalling a
      strategic pivot toward banking services. This is the clearest competitive signal that Flutterwave
      is moving toward Moniepoint's territory. It charges local transactions at approximately 1.4%
      and international transactions at 3.8%+, generating substantially higher take-rates than the
      ~0.5% blended MDR in POS acquiring.

      Paystack was acquired by Stripe for approximately $200 million in 2020 and benefits from Stripe's
      global engineering and compliance capabilities. Paystack has expanded into consumer apps, microcredit,
      and a venture arm ("The Stack Group"). Its core strength is developer experience and API reliability.
      Paystack charges ~1.5% for local transactions and faces growing competition from Moniepoint's Monnify
      gateway on the B2B side.

      For Moniepoint, the competitive risk from Flutterwave and Paystack is primarily in the Monnify
      gateway segment (₦25T GPV in FY2025) rather than in the core POS and SME banking business. Their
      MFB licences give them theoretical access to SME credit, but Moniepoint's 6+ million active business
      customers and transaction history database for underwriting are a 7-year head start.
    claimRefs: [CP018, CP019, CP020, CP021, CP022, CP023]
    tableRefs: [TP004]
    figureRefs: [FP002]

  - id: Pch-S05
    title: Kuda Bank and MTN MoMo — Niche and Telco-Led Challengers
    body: |
      Kuda Bank is a digital-first consumer bank launched in 2019, backed by $91 million in funding,
      with approximately 5 million users as of 2025. Kuda's core product is a zero-fee consumer current
      account and savings products targeted at young urban Nigerians. It is not a meaningful competitor
      to Moniepoint in POS acquiring, SME banking, or lending — its focus is firmly on the retail consumer
      segment. Kuda's limited agent network and no POS hardware offering mean it cannot serve Moniepoint's
      core merchant customer segment.

      MTN MoMo operates as a Payment Service Bank (PSB) — a CBN licence category that allows deposit
      collection and payment services but prohibits lending. MTN's advantage is telco distribution across
      Nigeria's 36 states with 70M+ mobile subscribers, but its PSB status caps the product menu. MoMo
      cannot directly compete with Moniepoint's MFB lending products or its POS hardware infrastructure.
      The PSB-vs-MFB regulatory distinction is a structural moat for Moniepoint: telcos are explicitly
      excluded from lending under CBN PSB guidelines.

      Traditional commercial banks (Access Bank, GTCO, Zenith, UBA) have digital payment products but
      face structural disadvantages in serving micro-merchants: lengthy account-opening processes, minimum
      balance requirements, and slow transaction settlement. They are Moniepoint's indirect competitors
      for the SME banking wallet share, but their digital products have consistently lost ground to
      Moniepoint's merchant-optimised tools.
    claimRefs: [CP024, CP025, CP026, CP027, CP028]
    tableRefs: [TP005]

  - id: Pch-S06
    title: Moniepoint's Competitive Moat and Differentiation
    body: |
      Moniepoint's competitive position rests on four interlocking advantages that create a defensible moat:

      **1. Network effects in agency banking:** With approximately 80% of Nigeria's in-person payment volume,
      Moniepoint has reached a critical mass where merchants prefer its terminals because consumers expect
      Moniepoint to work. The CBN single-principal rule (April 2026) institutionalises this advantage:
      agents who have already invested time, training, and working capital with Moniepoint have every
      incentive to designate it as their sole principal. Smaller competitors cannot match Moniepoint's
      agent support infrastructure, dispute resolution speed, or liquidity float.

      **2. MFB licence enabling on-balance-sheet lending:** The CBN National MFB licence (January 2026)
      is the highest-value regulatory asset in Moniepoint's portfolio. It allows Moniepoint to hold
      deposits, lend at scale, and offer a full banking relationship — capabilities that OPay (PSB),
      PalmPay (payment service), Flutterwave (newly licensed MFB), and Paystack (MFB under Stripe) are
      either not yet using or only beginning to scale. Moniepoint's ₦1 trillion in SME loans disbursed
      in FY2025 demonstrates that this is live and at-scale, not aspirational.

      **3. Transaction data as underwriting moat:** Moniepoint's 412 trillion naira in transaction flow
      gives it a proprietary dataset for credit scoring that no commercial bank or new entrant can
      replicate quickly. Revenue-based underwriting — where loan eligibility and size are determined by
      a business's actual transaction history rather than traditional collateral — is both more inclusive
      and more accurate for Nigeria's informal SME segment.

      **4. Hardware-software integration:** Moniepoint's proprietary POS terminal (custom hardware with
      its own OS) creates a captive device relationship. Unlike software-only players like Paystack or
      Kuda, Moniepoint controls the physical payment experience. Terminal financing — where Moniepoint
      provides the hardware on installment terms — adds a financing relationship on top of the payment
      relationship, dramatically increasing switching costs.
    claimRefs: [CP029, CP030, CP031, CP032, CP033, CP034]
    tableRefs: [TP006]
    figureRefs: [FP003]

  - id: Pch-S07
    title: Competitive Threats and Risk Scenarios
    body: |
      Despite its strong competitive position, Moniepoint faces three material competitive threats over
      the 2026-2028 horizon:

      **Threat 1 — OPay's IPO-motivated aggression:** As OPay targets a $4B valuation for a US listing,
      it has strong incentives to demonstrate growth in merchant acquiring and SME banking — directly
      competing with Moniepoint's core market. With $570M raised historically and deep SoftBank backing,
      OPay could launch subsidised POS campaigns, offer higher agent commissions, or acquire a complementary
      MFB to match Moniepoint's lending capability. The agent network consolidation driven by the single-
      principal rule creates a critical 12-24 month window where OPay will fight hard for agent allegiance.

      **Threat 2 — Flutterwave's banking pivot:** Flutterwave's acquisition of an MFB licence and its
      Mono acquisition (open banking API) position it to offer integrated banking + gateway services
      to Nigerian SMEs. If it executes well, it could erode Moniepoint's Monnify gateway market share
      and compete for the formal SME banking segment (businesses using both a gateway and a bank account).
      Flutterwave's $3B valuation gives it capital for acquisitions and subsidised pricing.

      **Threat 3 — Regulatory tightening:** The CBN's ₦1B KYC fine (2024) demonstrates willingness to
      penalise even dominant players. As Moniepoint's national MFB status increases its regulatory
      scrutiny (₦5B minimum capital, enhanced AML reporting, consumer protection mandates), compliance
      costs will grow disproportionately. If regulators impose price controls on MDR or lending rates,
      Moniepoint's economics could compress rapidly.
    claimRefs: [CP035, CP036, CP037, CP038]
    figureRefs: [FP004]

