- id: Isu-S03
  title: Named Customer Proof and Deployment Evidence
  body: 'Publicly available named customer evidence for Moniepoint is strongest in the micro-SME segment,

    where case studies documented by TechCabal and Moniepoint''s own blog provide verifiable outcome

    data linked to specific businesses. The most prominent independently reported case study is

    Oberry Agamah, a phone accessories retailer who reported 40% revenue growth after adopting

    Moniepoint''s integrated POS, business account, and working-capital credit suite, corroborated

    by TechCabal and Moniepoint''s official blog. A broader set of Moniepoint SME case studies shows

    30-60% revenue growth outcomes and loan repayment rates above 95%.


    At the institutional tier, press coverage confirms that Lagos State Government uses Moniepoint''s

    agency banking infrastructure for digital tax and revenue collection, representing a significant

    public-sector deployment. First Bank of Nigeria''s agent banking partnership with Moniepoint

    provides last-mile cash-in/cash-out services across Nigeria. MTN Nigeria merchants access

    Moniepoint indirectly through Monnify API integration. An unnamed pharmacy chain with 20+

    locations uses Moniebook alongside POS terminals. While institutional deployments appear to be

    in active production use, formal partnership agreements and contract values have not been

    publicly disclosed. Business Insider Africa found that 78% of Moniepoint loan customers expanded

    operations post-credit. App store ratings of 4.5/5 on iOS and 4.2/5 on Trustpilot corroborate

    broad satisfaction. Adverse signals exist: Rest of World (2024) documented merchant complaints

    about POS terminal downtime and slow customer service during the 2023 naira cash crisis, an

    important service quality signal to probe in diligence reference calls.

    '
  claimRefs:
  - CU014
  - CU015
  - CU016
  - CU017
  - CU018
  - CU019
  tableRefs:
  - TU003
  figureRefs:
  - FU003
- id: Isu-S04
  title: Retention, Satisfaction, Expansion and Concentration Risk
  body: 'Industry analysts estimate Moniepoint''s annual merchant retention rate at 85-90%, driven

    primarily by the multi-product lock-in effect: merchants using POS terminals, MFB business

    accounts, Monnify gateway, and Moniebook accounting face significant switching costs because

    migrating would require simultaneously replacing all four integrated products. Cohort models

    show improving retention across the 2022-2025 merchant vintages, consistent with deepening

    product adoption and increasing customer tenure over time. However, audited retention data, net

    revenue retention (NRR), or gross revenue retention (GRR) broken down by cohort or product tier

    has not been publicly disclosed; diligence must request this from the data room. Multi-product

    ARPU is estimated at 3-5x versus POS-only merchants, substantially increasing customer lifetime

    value as merchants progress through the product ladder. Implied cohort retention trends show

    improvement over successive vintages consistent with increasing platform stickiness.


    Customer satisfaction indicators are strong: the Moniepoint Business Banking iOS app carries a

    4.5/5 rating from 12,000+ reviews in Nigeria, and Trustpilot shows 4.2/5 from open user

    reviews, both above typical fintech benchmarks. Estimated credit product repeat usage exceeds

    60% of MFB borrowers.


    Geographic and sector concentration risk is material. Approximately 40% of customers are in

    Lagos and the South West, and approximately 70% of the customer base consists of informal-sector

    SMEs, making Moniepoint''s revenue sensitive to naira devaluation, fuel price shocks, and CBN

    policy changes such as the single-principal agent banking rule. No single customer accounts for

    more than an estimated 1% of total revenue, limiting single-name concentration risk.

    International diversification through UK MonieWorld and the Sumac MFB acquisition in Kenya is

    underway but still early-stage and unquantified. The CBN single-principal rule, OPay and

    PalmPay pricing competition, and infrastructure outage risk are the principal near-term headwinds.

    '
