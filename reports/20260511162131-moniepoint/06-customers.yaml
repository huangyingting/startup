figures:
- id: FU001
  title: Customer Journey Map
  slug: customer-journey-map
  type: journey-map
  summary: Six-stage customer journey map illustrating how Moniepoint acquires, onboards, and locks in SME merchants through
    progressively deeper product integration, from initial POS adoption through full-platform dependence spanning banking,
    credit, and accounting.
  claimRefs:
  - CU001
  - CU005
  - CU008
  - CU011
  - CU014
  data:
    nodes:
    - id: awareness
      label: Market Awareness
      detail: SME merchant learns of Moniepoint via agent network, peer referral, or field agent visit; primary channel is
        word-of-mouth from satisfied merchants in the same market or street
      type: stage
    - id: onboarding
      label: POS Terminal Onboarding
      detail: Merchant registers via field agent or app; CBN-mandated BVN/NIN KYC verification; geo-tagged terminal installation
        within 24-48 hours; deposit of NGN10,000 terminal caution fee
      type: stage
    - id: first_payment
      label: First Payment Accepted
      detail: Merchant completes first card transaction; receives real-time settlement notification; same-day settlement to
        Moniepoint MFB business account removes bank dependency
      type: stage
    - id: banking
      label: Business Banking Adoption
      detail: Merchant opens Moniepoint MFB business current account; begins receiving settlement directly; unlocks access
        to Moniebook accounting software and payroll module
      type: stage
    - id: credit
      label: Working Capital Credit
      detail: After 6+ months of POS transaction history, merchant receives in-app credit offer; ML-scored loan approved same-day;
        repayment auto-debited from daily POS settlement
      type: stage
    - id: expansion
      label: Full Platform Lock-in
      detail: Merchant uses POS + banking + credit + Moniebook; switching costs become prohibitive; ARPU grows 3-5x vs POS-only;
        merchant recruits peers to Moniepoint via word-of-mouth
      type: stage
