company:
  name: Moniepoint
chapter:
  number: 6
  title: Customer Evidence
  summary: Moniepoint serves over 6 million active business customers across Nigeria as of FY2025, commanding an estimated
    40-45% of POS transaction volume by value and establishing itself as the largest SME-focused financial services platform
    in West Africa. Its customer base spans micro-retailers, market traders, pharmacies, Monnify API developers, and MFB borrowers,
    with annual merchant retention estimated at 85-90% driven by deep multi-product integration across POS terminals, business
    banking, working-capital credit, and Moniebook accounting. Key diligence gaps remain in audited cohort retention data,
    comprehensive named customer proof beyond the micro-SME tier, and UK MonieWorld traction metrics that would validate the
    international diversification thesis.
sections:
- id: Isu-S01
  title: Customer Segmentation and Base Overview
  body: 'Moniepoint''s active business customer base reached 6 million as of FY2025, establishing it as

    Nigeria''s dominant SME financial services platform and the largest of its kind in West Africa.

    The customer base is broad and diverse, spanning six primary segments: micro-retailers in food,

    fashion, and electronics (the largest segment, estimated at approximately 3 million businesses);

    small-to-medium merchants including pharmacies, salons, and restaurants (approximately 1.5

    million); agricultural and market traders operating in rural and peri-urban areas (an estimated

    800,000 businesses); online e-commerce merchants and developers integrated through the Monnify

    B2B payment gateway (50,000+ registered developers and hundreds of thousands of online

    merchants); SME microfinance borrowers accessing working-capital credit through Moniepoint MFB

    (70,000+ businesses); and a nascent UK-based Nigerian diaspora segment served through MonieWorld.


    Geographically, Moniepoint operates across all 36 Nigerian states, though customer concentration

    remains highest in Lagos, Kano, Rivers, and Ogun states. The agent banking network of

    approximately 250,000 field agents is the primary customer acquisition channel, extending

    Moniepoint''s reach into rural and peri-urban markets where traditional banking infrastructure is

    absent. Word-of-mouth referral by satisfied merchants is the primary organic acquisition

    mechanism, reinforced by the reliability of same-day settlement compared to competitors and

    traditional banks. Moniepoint''s Monnify gateway serves 50,000+ registered developers underpinning

    hundreds of thousands of online merchants. The UK MonieWorld product targets the 250,000+ strong

    Nigerian diaspora in Britain. Across all segments, Moniepoint commands an estimated 40-45% share

    of Nigeria''s POS transaction volume by value, ahead of OPay and PalmPay, driven by its

    integrated multi-product platform and structural switching costs built over the merchant lifecycle.

    '
