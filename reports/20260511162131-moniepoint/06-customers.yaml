- id: Isu-S02
  title: Adoption Trajectory and Growth Evidence
  body: 'Moniepoint''s adoption trajectory demonstrates consistent high-growth momentum across all

    measurable dimensions over the 2023-2025 period. Active business customers grew approximately

    50% year-over-year in 2025, from an estimated 4 million at end-2024 to over 6 million by

    year-end, reaching the milestone ahead of internal projections. POS transaction count expanded

    from 5.2 billion in 2023 to 14 billion in FY2025, a near-tripling of transaction volume in two

    years, while total transaction value reached NGN 412 trillion (approximately $294 billion).

    Active POS terminals grew from an estimated 80,000 in 2022 to 140,000+ by end-2025.


    The lending vertical expanded even faster: SME borrowers served by Moniepoint MFB grew from

    approximately 20,000 in 2023 to 70,000+ in FY2025, representing approximately 250% growth over

    two years, with total loans disbursed exceeding NGN 1 trillion. The Monnify developer platform

    grew to 50,000+ registered accounts. CNBC included Moniepoint in its global top 50 fintech

    rankings for 2025, citing 6 million business customers and $17 billion in monthly transaction

    volume. Moniepoint targets 9 million business customers by end-2026 through personal banking

    expansion and rural market penetration, implying continued 50% annual growth consistent with

    its 2023-2025 trajectory. The 2023 naira cash crisis proved to be a pivotal customer acquisition

    event, accelerating first-time electronic payment adoption among previously cash-dependent

    merchants. Each deployed POS terminal processes an estimated 2,500 transactions per month,

    generating high revenue density per deployed unit.

    '
  claimRefs:
  - CU009
  - CU010
  - CU011
  - CU012
