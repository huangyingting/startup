companyProfile:
  summary: >-
    Armis Security, founded in late 2015 by Yevgeny Dibrov (CEO), Nadir Izrael
    (CTO), and Tomer Schwartz, is a cybersecurity platform company specializing
    in agentless cyber exposure management. Its flagship product, Armis Centrix™,
    passively discovers, classifies, and monitors all connected assets — IT, OT,
    IoT, and IoMT — without deploying agents or active scanners. Powered by the
    Armis Asset Intelligence Engine, which tracks 7 billion+ devices globally,
    the platform delivers real-time risk prioritization, vulnerability management,
    and threat detection across converged enterprise environments. Armis was
    acquired by ServiceNow for $7.75 billion in April 2026, positioning Centrix
    as the cyber exposure management layer within ServiceNow's enterprise platform.

  foundedDate: "2015-10-01"

  founders:
    - name: Yevgeny Dibrov
      role: Co-Founder & CEO
      background: >-
        Israeli entrepreneur; previously served in the IDF's 8200 intelligence
        unit (cybersecurity); co-founded Armis in 2015.
    - name: Nadir Izrael
      role: Co-Founder & CTO
      background: >-
        Co-founded Armis with Dibrov; leads technical architecture and R&D;
        background in Israeli military intelligence and security research.
    - name: Tomer Schwartz
      role: Co-Founder
      background: >-
        Third co-founder; background in cybersecurity engineering and Israeli
        military intelligence unit operations.

  foundingLocation: "Tel Aviv, Israel"
  headquarters: "San Francisco, CA (global HQ); Tel Aviv, Israel (R&D center)"

  productSummary: >-
    Armis Centrix™ is a cloud-native SaaS platform for cyber exposure management.
    Modules include: Asset Management & Security (CAASM), OT/ICS Security
    (with on-premises/air-gapped support via OTORIO Titan), Medical Device /
    IoMT Security, Vulnerability Management Detection & Response (VMDR),
    Application Security, and Early Warning (threat intelligence). The platform
    integrates with 200+ security and IT tools (SIEM, SOAR, ITSM, NAC, CMDB)
    via a REST API v3 and Python SDK.

  customerFocus: >-
    Large enterprises and critical infrastructure operators across healthcare,
    manufacturing/OT, financial services, federal government, energy/utilities,
    and education. Primary buyer: CISO / VP of Security. 35+ Fortune 100
    customers including nine of Fortune 10.

  businessModel: >-
    B2B SaaS with annual/multi-year subscription contracts priced per-asset
    or per-port. Enterprise deals range from $26K (500–9,999 assets) to custom
    pricing for >10,000-asset environments. Land-and-expand motion: customers
    adopt core asset management, then expand into OT, IoMT, VMDR, or Early
    Warning modules.

  stage: "Acquired (by ServiceNow, April 2026)"

  fundingStatus: >-
    Raised ~$1.17B total across 7 rounds. Final private round: $435M Series E
    at $6.1B valuation (November 2025, led by Goldman Sachs Alternatives).
    Acquired by ServiceNow for $7.75B in April 2026 — a ~27% premium to the
    last private valuation.

  disclosureProfile: private-disclosed

