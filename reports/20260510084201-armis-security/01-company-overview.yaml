  - id: milestones-and-scale
    title: Company Milestones and Scale Metrics
    body: >
      Armis's trajectory from founding to acquisition spans ten years and includes significant milestones across
      founding, financing, product development, acquisitions, regulatory authorizations, and industry recognition. The
      company grew its ARR from zero to $300M by November 2025 and to $340M+ by December 2025, representing more than
      50% year-over-year growth. This growth trajectory was supported by three strategic acquisitions in under twelve
      months: CTCI (February 2024, early warning), Silk Security (April 2024, $150M, vulnerability remediation), and
      OTORIO (March 2025, $120M, OT/CPS on-premises security).

      Armis's customer base grew from deployments at more than 25% of the Fortune 100 in 2019 to over 35% by late 2025
      and nine of the Fortune 10 by April 2026. Named customers include United Airlines, Colgate-Palmolive, Mondelez
      International, Reckitt, Sysco Foods, and Allergan, in addition to dozens of federal agencies and state/local
      government entities. The platform achieves deployment scale not through agents but through passive network traffic
      analysis, enabling it to track nearly 7 billion devices globally in real time.

      On the regulatory and compliance front, Armis achieved FedRAMP Moderate and DISA IL4 authorization in 2023, and
      DoD Impact Level 5 authorization in February 2026, qualifying it for Controlled Unclassified Information (CUI)
      environments within the Department of Defense. The company was recognized as a Leader in the 2026 Gartner Magic
      Quadrant for CPS Protection Platforms (second consecutive year) and the Forrester Wave for IoT Security Solutions
      (Q3 2025) and Unified Vulnerability Management Solutions (Q3 2025).
