  - id: founders-and-leadership
    title: Founders and Executive Leadership
    body: >
      Armis was co-founded by Yevgeny Dibrov (CEO) and Nadir Izrael (CTO), both veterans of elite Israeli technology and
      military programs who brought complementary skills to the venture. Dibrov served on the executive team at cloud
      security startup Adallom — co-founded by members of what would later become the Wiz founding team — before Adallom
      was acquired by Microsoft for $320M in July 2015. Following a brief hiatus, Dibrov immediately began building
      Armis, recruiting Izrael to leave his position as a software engineer at Google, where he had worked on Google
      Maps and Google Autocomplete. Both founders attended the excellence program at the Technion and served in elite
      units of the Israel Defense Forces (IDF), including Unit 8200.

      Dibrov is widely credited as the primary commercial and customer-success driver at Armis, maintaining an intensive
      travel schedule to meet customers and partners globally. Izrael leads the technical and product vision, has
      overseen all three acquisitions (CTCI, Silk Security, OTORIO), and maintains significant cross-functional
      authority within the engineering and product organizations. Gili Raanan, founder of Cyberstarts, served as
      Chairman of the Board since before the Series A and represented the early investor base.

      By 2026, the executive leadership team had expanded significantly. Alex Mosher serves as President and Chief
      Revenue Officer (CRO). Jonathan Carr is Chief Financial Officer. Simon Mouyal was appointed Chief Marketing
      Officer in March 2026, bringing 25+ years of cybersecurity and SaaS marketing experience from organizations
      including CyberArk and athenahealth. Christian Terlecki leads public sector sales as Senior Vice President,
      overseeing the Armis Federal division and its government certifications.
