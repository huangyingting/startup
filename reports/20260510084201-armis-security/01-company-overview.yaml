  - id: adverse-and-gaps
    title: Adverse Findings and Evidence Gaps
    body: >
      Armis's record is largely clean of material security breaches or regulatory enforcement actions. The primary
      adverse finding involves post-acquisition workforce reductions: following its March 2025 acquisition of OTORIO for
      $120M, Armis laid off 45 of OTORIO's approximately 80 employees — more than half the acquired workforce —
      primarily in sales, marketing, finance, and HR, retaining approximately 35 development staff. This pattern is
      consistent with integration-focused M&A, where redundant go-to-market functions are eliminated while product
      engineering capacity is preserved, but it represents a material reduction in OTORIO's organizational footprint.

      Multiple areas of evidence remain unavailable due to Armis's private company status. Revenue, gross margin,
      operating loss/income, cash position, customer concentration metrics, and net revenue retention (NRR) are not
      publicly disclosed. The company disclosed ARR but not contract structure, renewal rates, or churn.
      Post-acquisition, Armis is now a subsidiary of ServiceNow, and its financial metrics will be reported (if at all)
      as part of ServiceNow's consolidated financial statements. Future diligence on financial performance will require
      either ServiceNow's investor disclosures or direct engagement with management.
    claimRefs:
      - CO031
      - CO030
      - CO036
      - CO015
