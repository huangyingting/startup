callouts:
  - calloutType: strength
    title: 'Exceptional Acquisition Outcome: $7.75B Exit via ServiceNow'
    body: >
      Armis achieved one of the largest cybersecurity company exits in history with the $7.75B ServiceNow acquisition,
      representing an approximately 27% premium to its last private valuation of $6.1B. This outcome reflects
      exceptional product-market fit, a defensible platform position, and strong revenue growth ($200M to $340M+ ARR in
      under 18 months). The acquisition also validates the XIoT/CPS security market thesis that Armis championed from
      founding.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO038
  - calloutType: risk
    title: Key-Person Dependency on Co-Founders
    body: >
      Armis's growth has been closely tied to the vision and execution of co-founders Dibrov and Izrael, both of whom
      are now operating within a large enterprise parent (ServiceNow). Retention of both founders under ServiceNow's
      corporate structure — and their authority over product and go-to-market strategy — represents a meaningful risk to
      Armis's continued innovation trajectory as a business unit.
    claimRefs:
      - CO005
      - CO006
      - CO030
  - calloutType: insight
    title: 'Post-Acquisition Status: Armis Is Now a ServiceNow Subsidiary'
    body: >
      As of the run date (May 10, 2026), Armis is no longer an independent company. It operates as a business unit
      within ServiceNow, with the acquisition having closed April 19-20, 2026. Armis Centrix™ remains available as a
      standalone product but is being integrated into the ServiceNow AI Platform. All future financial reporting for
      Armis will be within ServiceNow's consolidated disclosures.
    claimRefs:
      - CO014
      - CO002
      - CO033
