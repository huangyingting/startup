      title: Private-company unit-economics opacity
      description: >-
        Armis has never disclosed gross margin, net revenue retention, gross dollar retention, customer acquisition
        cost, CAC payback period, or free cash flow. As a wholly owned ServiceNow subsidiary post-April 2026, standalone
        P&L data is unlikely to become publicly available. Any financial model must rely on benchmarks and proxies with
        low confidence.
      relatedQuestionRefs:
