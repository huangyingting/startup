callouts:
  - id: CI_CALLOUT_001
    type: observation
    title: ARR Trajectory Is Compressed and Accelerating
    body: >-
      Armis grew from $200M to $300M to $340M+ ARR in approximately 16 months. This pace — $100M in new ARR added in
      under 12 months — indicates expansion ARR from the existing base is material alongside new logo growth. The ARR
      velocity is among the fastest observed in the OT/IoT security category and underpins the 22x ARR acquisition
      multiple.
    sourceRefs:
      - SF001
      - SF002
      - SF003
    claimRefs:
      - CI001
      - CI002
      - CI003
    tone: positive
  - id: CI_CALLOUT_002
    type: observation
    title: Channel Partner Pricing Confirms Tiered Enterprise ACV Model
    body: >-
      The May 2025 Armis channel partner price list (leaked via a security reseller) confirms a structured tiered model:
      $26K–$50K per asset block and $3,100–$3,500 per network port. This positions Armis ACVs in the $100K–$2M range for
      mid-to-large enterprise accounts. The pricing architecture supports high NRR through upsell of additional asset
      blocks and add-on modules.
    sourceRefs:
      - SF008
      - SF018
    claimRefs:
      - CI006
      - CI007
      - CI008
    tone: positive
  - id: CI_CALLOUT_003
    type: observation
    title: Armis Select Partner Program Signals Channel-First Revenue Pivot
    body: >-
      The January 2026 tier-free Armis Select Partner Program removes traditional volume thresholds that disadvantaged
      smaller specialized MSSPs. The outcome-based incentive structure aligns partner economic interests with recurring
      managed service delivery rather than one-time resale. This structural shift — if successful — would reduce direct
      S&M spend per dollar of indirect ARR, improving overall sales efficiency.
    sourceRefs:
      - SF009
      - SF010
    claimRefs:
      - CI010
      - CI018
      - CI019
    tone: positive
  - id: CI_CALLOUT_004
    type: risk
    title: Three Acquisitions in 13 Months Signal Negative FCF Through FY2025
    body: >-
      Armis deployed $270M+ in cash on three acquisitions between February 2024 and March 2025, while also carrying a
      heavy direct-sales headcount and R&D investment. This capital intensity — combined with the absence of any
      FCF-positive announcement — strongly implies negative free cash flow through at least mid-2025. The OTORIO
      integration layoffs (45/80 employees eliminated) signal cost discipline but also confirm meaningful integration
      overhead.
    sourceRefs:
      - SF005
      - SF016
    claimRefs:
      - CI035
      - CI025
    tone: warning
  - id: CI_CALLOUT_005
    type: risk
    title: Unit Economics Are Entirely Unverifiable From Public Sources
    body: >-
      Gross margin, NRR, GDR, CAC, and FCF are undisclosed. All figures cited in this chapter carry low confidence. An
      independent financial assessment would require access to Armis management accounts or ServiceNow investor segment
      disclosures. The 22x ARR acquisition multiple by ServiceNow is the strongest available proxy for market-clearing
      revenue quality, but it cannot substitute for verified unit economics.
    sourceRefs:
      - SF007
      - SF013
    claimRefs:
      - CI021
      - CI022
      - CI024
    tone: warning
  - id: CI_CALLOUT_006
    type: observation
    title: ServiceNow Acquisition Resolves Standalone Capital Risk
    body: >-
      Post-April 2026 close, Armis is wholly owned by ServiceNow (NYSE: NOW), a $180B+ enterprise with a strong balance
      sheet. Standalone runway, burn rate, and financing dependency are no longer relevant financial risk factors.
      Future Armis revenue will be reported as part of ServiceNow's security segment, and growth investment will be
      funded from ServiceNow's operating cash flow.
    sourceRefs:
      - SF004
      - SF025
    claimRefs:
      - CI033
      - CI032
    tone: positive
  - id: CI_CALLOUT_007
    type: observation
    title: Institutional Investors Validate Revenue Quality
    body: >-
      CapitalG (Alphabet) and Goldman Sachs Alternatives — both sophisticated institutional investors with access to
      private financial data through due diligence — participated in the November 2025 $435M round at $6.1B. Their
      continued conviction after reviewing management accounts is the strongest publicly available signal that gross
      margin and NRR metrics are defensible, even though the exact figures remain undisclosed.
    sourceRefs:
      - SF006
      - SF015
    claimRefs:
      - CI039
      - CI013
    tone: positive
  - id: CI_CALLOUT_008
    type: adverse
    title: Structural Financial Opacity Precludes Independent Diligence
    body: >-
      Armis has operated as a private company for its entire history without filing an S-1 or publishing audited GAAP
      financials. No audited P&L, balance sheet, or cash flow statement exists in the public domain. Post-acquisition,
      this opacity is compounded by integration into ServiceNow's reporting structure. Independent financial diligence
      is structurally blocked without direct ServiceNow investor access or an M&A data room.
    sourceRefs:
      - SF022
      - SF005
    claimRefs:
      - CI026
      - CI027
    tone: negative
  - id: CI_CALLOUT_009
    type: finding
    title: $7.75B at 22x ARR Is the Financial Verdict in the Absence of P&L Data
    body: >-
      The ServiceNow acquisition at $7.75B on $340M+ ARR — an approximately 22x multiple — represents a market-clearing
      signal of revenue quality. Top-quartile cybersecurity SaaS companies traded at 15–18x ARR in public markets in
      2025. The 22–23% premium reflects above-median growth rate, Fortune 100 penetration, and a platform with seven
      billion devices tracked. In the absence of gross margin and NRR data, this multiple is the most reliable external
