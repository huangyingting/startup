schemaVersion: report-v2
artifact: financials
slug: armis-security
runDate: '2026-05-10'
company:
  name: Armis Security
chapter:
  number: 4
  title: Financials
  summary: >-
    Armis Security entered 2026 with $340M+ ARR and >50% YoY growth, having raised $1.17B across venture rounds at a
    $6.1B pre-money valuation before ServiceNow's $7.75B all-cash acquisition closed in April 2026. All key
    unit-economics metrics—gross margin, NRR, CAC payback, and burn rate—remain undisclosed; this chapter triangulates
    estimates from publicly available pricing lists, headcount data, and industry SaaS benchmarks. Revenue is 100% SaaS
    subscription, priced per-asset and per-port, with a rapidly growing indirect/MSSP channel contribution. Three
    acquisitions in FY2024–FY2025 signal capital intensity. Financial quality appears high by ARR-growth trajectory and
    valuation multiples; structural opacity from private-company status is the primary diligence blocker.
sections:
  - title: Revenue Streams and Pricing Model
    body: >
      Armis generates revenue almost entirely through SaaS subscriptions on the Centrix platform. The core licensing
      model is asset-count-tiered: enterprises pay per block of managed devices ($26,000–$50,000 per block across
      500–9,999 assets) or per network port ($3,100–$3,500) for agentless network discovery deployments. Add-on modules
      — Armis AI risk scoring, threat intelligence feeds, and CAASM capabilities — are sold as incremental subscriptions
      layered on the base platform. Professional services (implementation, integration, and custom configuration) are
      estimated to account for less than 10% of revenue, consistent with Armis's partner-led deployment model. The MSSP
      and channel segment is growing, driven by the January 2026 Armis Select Partner Program. Revenue recognition
      follows ratable SaaS treatment for annual and multi-year contracts; deferred revenue and professional services
      delivery timing create a likely gap between ARR and recognized GAAP revenue, though no specific ARR-to-revenue
      reconciliation has been published.
    id: SI001
    tableRefs:
      - TI001
    figureRefs:
      - FI001
  - title: Go-to-Market Motion and Sales Efficiency
    body: >
      Armis sells primarily through a direct enterprise motion for large-scale deals in OT, healthcare, and government
      verticals, where sales cycles range from 6 to 18 months due to proof-of-concept requirements, multi-stakeholder
      approvals, and compliance reviews. The company has invested heavily in building a global system integrator (GSI)
      ecosystem, including co-sell and implementation partnerships with Accenture, KPMG, Deloitte, PwC, and cloud
      hyperscalers AWS and Google. In January 2026, Armis launched the tier-free Armis Select Partner Program, replacing
      volume-based partner tiers with outcome-oriented and engagement-based incentives. This structural shift is
      designed to lower onboarding friction for MSSPs and smaller specialized partners, expanding indirect distribution
      without proportional direct S&M overhead. Customer acquisition cost and CAC payback remain undisclosed; industry
      proxies for enterprise cybersecurity SaaS suggest payback periods of 12–24 months at comparable deal sizes. The
      revenue split between direct and indirect channels has not been disclosed.
    id: SI002
    tableRefs:
      - TI002
    figureRefs:
      - FI002
  - title: Cost Structure and Margin Drivers
    body: >
      Armis's cost structure is consistent with an engineering-intensive, cloud-native SaaS company with a heavy
      enterprise sales overlay. Gross margin is not disclosed but estimated at 70–80% based on SaaS cybersecurity peer
      benchmarks (CrowdStrike, Zscaler, Claroty). Cloud infrastructure, data ingestion processing for 7 billion tracked
      devices, and customer success headcount are the primary cost-of-goods-sold components. R&D is estimated at 25–35%
      of ARR ($75–105M in FY2025), reflecting three acquisitions in 13 months plus a sustained internal roadmap. Sales
      and marketing spend likely runs 50–70% of revenue based on enterprise SaaS benchmarks and Armis's aggressive
      direct-sales team build. Armis employs approximately 950 staff (52% US, 29% Israel), a distribution consistent
      with a commercial-heavy US operation supported by an Israeli R&D center. The March 2025 OTORIO integration
      resulted in 45 of 80 OTORIO employees being eliminated — a deliberate cost rationalization that signals
      management's willingness to prioritize financial discipline over headcount preservation post-acquisition.
    id: SI003
    tableRefs:
      - TI003
    figureRefs:
      - FI003
  - title: Capital Adequacy and Financing History
    body: >
      Armis completed three external capital rounds in 18 months: a $200M growth round at $4.3B valuation (October
      2024), a $100M employee secondary at $4.5B (July 2025), and a $435M pre-IPO round at $6.1B (November 2025) led by
      Goldman Sachs Alternatives with CapitalG and Evolution Equity participating. Total disclosed capital raised across
      all rounds is approximately $1.17B. The November 2025 round was intended to fund the path to $500M ARR at
      cash-flow positive status ahead of a 2026 IPO; that path was superseded by the ServiceNow acquisition. ServiceNow
      acquired Armis for $7.75B in all-cash consideration (a ~27% premium over the last round valuation), financed
      through cash on hand and a $4B unsecured term loan from JPMorgan Chase. The transaction closed April 19, 2026. As
      a wholly owned ServiceNow subsidiary, Armis's standalone runway and financing dependency are resolved; capital
      adequacy is now governed by ServiceNow's $180B+ public company balance sheet. The $7.75B acquisition price implies
      approximately a 22x ARR multiple on $340M+ ARR — a premium to 2025 public market cybersecurity comparables
      (15–18x) but reflective of Armis's hypergrowth trajectory and platform differentiation.
    id: SI004
    tableRefs:
      - TI004
    figureRefs:
      - FI004
  - title: Financial Gaps and Verdict
    body: >
      Armis's status as a private company throughout its operating history means that no audited GAAP financial
      statements are publicly available. Key undisclosed metrics include gross margin, NRR, GDR, customer acquisition
      cost, CAC payback period, operating loss, free cash flow, and the ACV distribution of its customer base. The CEO's
      public commitment to cash-flow positive status prior to IPO is a positive signal, but the three-acquisition M&A
      strategy in FY2024–FY2025 suggests negative FCF through at least mid-2025. ARR-based metrics are Armis's primary
      public financial currency; whether ARR quality is supported by high NRR, durable contract duration, and low churn
      is unverifiable from public data alone. The $7.75B acquisition at approximately 22x ARR, endorsed by institutional
      investors including Goldman Sachs and CapitalG, is the strongest available signal of revenue quality.
      Post-acquisition, Armis's financials will be embedded in ServiceNow's segment reporting, further reducing
      standalone financial visibility. The primary diligence verdict: revenue momentum and growth quality are
      compelling; structural financial opacity is the decisive limiting factor for any independent financial assessment.
    id: SI005
    tableRefs:
      - TI005
