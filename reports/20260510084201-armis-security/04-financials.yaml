  researchQuestions:
    - id: QI001
      question: What are Armis's primary revenue streams and their relative contribution to total ARR?
      type: freshness
      status: answered
      targets:
        - contentRequirements/0
      answerSummary: >-
        Platform SaaS subscription (~90%+ of ARR), with add-on modules (AI, threat intel, CAASM), professional services
        (<10%), MSSP channel resale, and premium support as secondary streams.
    - id: QI002
      question: What ARR milestones has Armis reached and at what year-over-year growth rates?
      type: quantification
      status: answered
      targets:
        - contentRequirements/3
      answerSummary: >-
        $200M ARR (Aug 2024, doubled in <18 months); $300M ARR (Aug 2025, >50% YoY growth); $340M+ ARR (Dec 2025, cited
        in acquisition announcement).
    - id: QI003
      question: >-
        How does Armis recognize revenue from annual vs. multi-year subscriptions, and what is the estimated gap between
        ARR and GAAP revenue?
      type: verification
      status: answered
      targets:
        - contentRequirements/0
      answerSummary: >-
        Subscription-based annual or multi-year contracts; recognized ratably. GAAP revenue estimated below ARR due to
        deferred multi-year portions; exact gap undisclosed. Professional services (<10%) recognized on delivery.
    - id: QI004
      question: What is the approximate ratio of professional services to license/subscription revenue?
      type: verification
      status: answered
      targets:
        - contentRequirements/0
      answerSummary: >-
        Estimated <10% professional services; Armis relies on partner-led implementation to keep professional services
        ancillary and protect software gross margins.
    - id: QI005
      question: What are Armis's per-asset, per-port, and block pricing tiers as of 2025–2026?
      type: quantification
      status: answered
      targets:
        - contentRequirements/0
        - plannedTables/pricing-monetization-table
      answerSummary: >-
        $3,100–$3,500 per port; $26K–$50K per block (500–9,999 assets); >10,000 assets quoted custom. Source: Armis May
        2025 channel partner price list.
    - id: QI006
      question: Are MSSP and channel partner pricing terms differentiated from direct customer pricing?
      type: mechanism
      status: answered
      targets:
        - contentRequirements/1
      answerSummary: >-
        Yes — the Armis Select Partner Program provides dedicated MSSP pricing and custom contract terms for
        managed-service delivery, distinct from direct customer pricing.
    - id: QI007
      question: Does Armis offer consumption-based or outcome-based pricing alternatives to subscription tiers?
      type: verification
      status: answered
      targets:
        - contentRequirements/0
        - plannedTables/pricing-monetization-table
      answerSummary: >-
        No evidence of consumption or outcome-based pricing. Model is subscription-based (annual/multi-year) with
        asset-count-tiered pricing. Custom enterprise pricing exists for large deployments.
    - id: QI008
      question: What is the typical enterprise sales cycle length for Armis, and how does it vary by segment?
      type: quantification
      status: answered
      targets:
        - contentRequirements/1
      answerSummary: >-
        6–18 months for large enterprise OT, healthcare, and government accounts requiring PoC, stakeholder alignment,
        and security review. Faster cycles possible for existing IT-customer expansion.
    - id: QI009
      question: What percentage of ARR is attributable to indirect (channel, MSSP, GSI) vs. direct sales?
      type: quantification
      status: unresolved
      targets:
        - contentRequirements/1
      answerSummary: >-
        Not disclosed. Channel is growing rapidly following the January 2026 Armis Select launch, but no revenue-mix
        split between direct and indirect has been published.
    - id: QI010
      question: How does the January 2026 Armis Select Partner Program change channel economics and partner incentives?
      type: mechanism
      status: answered
      targets:
        - contentRequirements/1
      answerSummary: >-
        Eliminates volume tiers; replaces with outcome-based incentives allowing any VAR, MSSP, or GSI to participate
        regardless of size. Expected to broaden indirect reach and reduce direct S&M cost per dollar of channel ARR.
    - id: QI011
      question: >-
        What are the key GSI and hyperscaler co-sell relationships Armis has developed, and what is their financial
        contribution?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/1
      answerSummary: >-
        Co-sell arrangements with AWS, Google, Accenture, KPMG, PwC, Deloitte, and WWT are publicly documented.
        Financial contribution not disclosed.
    - id: QI012
      question: What is Armis's gross margin, and how does it compare to SaaS cybersecurity benchmarks?
      type: quantification
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/unit-economics-table
      answerSummary: >-
        Not disclosed. Estimated 70–80% based on SaaS cybersecurity peer benchmarks (CrowdStrike ~75–78%, Zscaler ~79%).
        Cloud-native architecture and partner-led implementation support high gross margins.
    - id: QI013
      question: What percentage of revenue does Armis invest in research and development?
      type: quantification
      status: answered
      targets:
        - contentRequirements/2
        - plannedTables/unit-economics-table
      answerSummary: >-
        Not disclosed. Estimated 25–35% of ARR (~$75–105M in FY2025) based on headcount distribution (~29% Israel-based
        R&D center), three acquisitions in 13 months, and AI/OT roadmap investment.
    - id: QI014
      question: What is Armis's sales and marketing spend as a percentage of revenue, and what are the efficiency proxies?
      type: quantification
      status: partial
      targets:
        - contentRequirements/2
        - plannedTables/unit-economics-table
      answerSummary: >-
        Not disclosed. Estimated 50–70% of revenue in hypergrowth phase per SaaS benchmarks. High S&M spend consistent
        with 6–18 month enterprise cycles and dedicated channel investment.
    - id: QI015
      question: What are the primary components of Armis's cost of goods sold (COGS)?
      type: enumeration
      status: answered
      targets:
        - contentRequirements/2
      answerSummary: >-
        Estimated COGS components: cloud infrastructure/hosting (AWS/GCP), data ingestion and processing for 7B devices,
        customer success headcount, and security operations support — typical of agentless SaaS architectures.
    - id: QI016
      question: >-
        What has been the financial impact of three acquisitions (CTCI, Silk Security, OTORIO) on Armis's cost
        structure?
      type: mechanism
      status: answered
      targets:
        - contentRequirements/2
      answerSummary: >-
        $270M+ cash deployed. OTORIO integration included 45/80 layoffs (cost discipline). Acquisitions add R&D
        headcount and IP but also integration overhead. Net effect: higher R&D spend, partially offset by headcount
        rationalization.
    - id: QI017
      question: What public traction metrics has Armis disclosed — ARR, customer count, logo count, Fortune 100 penetration?
      type: quantification
      status: answered
      targets:
        - contentRequirements/3
        - plannedTables/revenue-streams-table
      answerSummary: >-
        Disclosed: $340M+ ARR, >50% YoY growth, >35% Fortune 100, nine of Fortune 10, 7B devices tracked. Not disclosed:
        total customer count, ACV, churn, NRR, GDR.
    - id: QI018
      question: Has Armis disclosed net revenue retention (NRR) or gross dollar retention (GDR)?
      type: verification
      status: answered
      targets:
        - contentRequirements/3
        - plannedTables/public-financial-gaps-table
      answerSummary: >-
        No. Neither NRR nor GDR has been published. Analyst estimates range 110–130% NRR based on platform expansion
        trajectory and upsell motion (CAASM, AI modules, OT-IT convergence).
    - id: QI019
      question: What is Armis's average contract value (ACV), contract duration, and new vs. renewal revenue mix?
      type: quantification
      status: unresolved
      targets:
        - contentRequirements/3
      answerSummary: >-
        Not disclosed. Pricing tiers imply ACVs of $26K–$500K+ depending on asset count; enterprise deals likely
        multi-year. Exact ACV distribution, contract duration, and renewal rate unknown.
    - id: QI020
      question: What is Armis's total venture capital raised and at what valuations across all rounds?
      type: quantification
      status: answered
      targets:
        - contentRequirements/4
        - plannedTables/capital-adequacy-table
      answerSummary: >-
        ~$1.17B raised: Oct 2024 ($200M, $4.3B valuation), Jul 2025 ($100M secondary), Nov 2025 ($435M pre-IPO, $6.1B).
        Acquired at $7.75B in April 2026.
    - id: QI021
      question: How did ServiceNow finance the $7.75B Armis acquisition, and what were the terms?
      type: verification
      status: answered
      targets:
        - contentRequirements/4
        - plannedTables/capital-adequacy-table
      answerSummary: >-
        ServiceNow combined existing cash with a $4B unsecured term loan (JPMorgan Chase led, matures October 2026). All
        cash to Armis shareholders. Armis issued no equity.
    - id: QI022
      question: What was Armis's estimated cash position and burn rate in the months prior to the acquisition?
      type: quantification
      status: partial
      targets:
        - contentRequirements/4
      answerSummary: >-
        Not disclosed. After the $435M November 2025 round, Armis had substantial cash reserves. CEO stated intent to
        reach cash-flow positive prior to IPO, suggesting managed burn. Exact cash position unknown.
    - id: QI023
      question: What was the stated use of proceeds for the $435M pre-IPO round?
      type: verification
      status: answered
      targets:
        - contentRequirements/4
      answerSummary: >-
        Stated uses: accelerate product innovation, expand market reach, fund strategic acquisitions, and build toward
        $500M ARR / cash-flow positive status ahead of planned IPO (subsequently superseded by ServiceNow deal).
    - id: QI024
      question: How was Armis tracking against its stated cash-flow positive target before the acquisition?
      type: mechanism
      status: unresolved
      targets:
        - contentRequirements/4
      answerSummary: >-
        Unknown. CEO indicated operating discipline toward public-company benchmarks; three acquisitions in 13 months
        suggest negative FCF through mid-2025. No quarterly cash-flow data available.
    - id: QI025
      question: What is the overall revenue quality and margin path assessment for Armis as a standalone entity?
      type: comparison
      status: answered
      targets:
        - contentRequirements/5
        - plannedTables/public-financial-gaps-table
      answerSummary: >-
        High revenue quality: SaaS subscription ARR with >50% growth, 22x ARR acquisition multiple, Fortune 100
        penetration, and CapitalG / Goldman Sachs validation. Margin path unverifiable: no public gross margin, NRR, or
        FCF data. Risk: capital-intensive acquisition strategy may depress margins.
    - id: QI026
      question: What are the top financial diligence blockers for Armis as of May 2026?
      type: adverse
      status: answered
      targets:
        - contentRequirements/5
        - plannedTables/public-financial-gaps-table
      answerSummary: >-
        Primary blockers: (1) no audited financials post-acquisition; (2) gross margin, NRR, and FCF undisclosed; (3)
        $270M+ M&A capex with partial integration; (4) channel revenue mix unknown; (5) Armis is now a ServiceNow
        subsidiary, making standalone diligence moot — future financials will be embedded in ServiceNow's segment
        reporting.
