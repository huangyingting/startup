    title: "Critical dependency map"
    type: dag
    slug: critical-dependency-map
    claimRefs: [CE001, CE005, CE006, CE015, CE016, CE017, CE029, CE036, CE037, CE032]
    approximationNotes: >-
      Dependency map shows key external dependencies for Armis Centrix platform operation. Edge direction
      indicates dependency: source depends on target. Criticality ratings are analyst assessments based on
      substitutability and failure impact. ServiceNow dependency elevated following April 2026 acquisition.
    data:
      nodes:
        - id: D1
          label: "Armis Centrix Platform"
          detail: "Core SaaS product; cloud-native on AWS. Central node — all other nodes are platform dependencies. Post-April 2026, a ServiceNow subsidiary."
          tone: neutral
        - id: D2
          label: "AWS Cloud Infrastructure"
          detail: "Primary cloud host (US-East, US-West, EU-West, GovCloud for federal). High criticality — full platform unavailability if AWS region fails. Multi-cloud redundancy not publicly confirmed."
          tone: warning
        - id: D3
          label: "OTORIO Titan (On-Prem OT Engine)"
          detail: "Air-gapped OT processing dependency for classified and isolated OT environments. Integration in progress H1 2026. Risk: OTORIO integration team capacity reduced to 35 of original 80 employees post-acquisition."
          tone: warning
        - id: D4
          label: "ServiceNow ITSM/CMDB Integration"
          detail: "Native ITSM workflow integration and CMDB enrichment; HAM/SAM Pro automation. Strategic dependency elevated post-acquisition (April 2026). Integration depth expansion is primary post-acquisition roadmap."
          tone: positive
        - id: D5
          label: "NVD / CVE Intelligence Databases"
          detail: "Vulnerability intelligence feeds for VMDR module. Dependency on NIST NVD timeliness and vendor advisory feeds. NVD processing delays documented in 2024 created industry-wide CVE backlog risk."
          tone: warning
        - id: D6
          label: "Armis AI/ML Models (CTCI plus Silk IP)"
          detail: "Proprietary device fingerprint database and risk scoring models accumulated over 9 years. Data provenance and refresh cadence of 7B-device training set not publicly disclosed."
          tone: neutral
        - id: D7
          label: "Third-Party Integration Connectors (SIEM/EDR/NAC)"
          detail: "200-plus connectors including Splunk, CrowdStrike, Cisco ISE, Palo Alto XSOAR. API stability from partner platforms is a dependency; major API changes require Armis connector updates."
          tone: neutral
