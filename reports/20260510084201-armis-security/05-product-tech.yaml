  researchQuestions:
    - id: QE001
      question: "What product modules and SKUs are included in the Armis Centrix platform as of H1 2026?"
      type: enumeration
      status: answered
      targets: [contentRequirements/0, contentRequirements/1]
      answerSummary: >-
        Seven modules confirmed: Asset Management and Security, OT/ICS Security, Medical Device/IoMT Security,
        CAASM, VMDR (launched 2025/2026), Application Security (early adoption 2025), and Secure Remote Access
        (OTORIO-derived, integration in progress). Sources: SE024, SE008, SE014, SE005.

    - id: QE002
      question: "How many OT, IoT, and industrial protocols does Armis Centrix support through deep packet inspection?"
      type: quantification
      status: answered
      targets: [contentRequirements/2]
      answerSummary: >-
        Armis claims 500-plus protocols including Modbus, DNP3, BACnet, Siemens S7, OPC-UA, PROFINET, DICOM,
        HL7, BLE, and Zigbee. The claim is company-stated; independent verification of the exact protocol count
        is not available from public sources. Sources: SE024, SE015, SE017, SE021.

    - id: QE003
      question: "Does Armis Centrix operate exclusively through passive monitoring with no active scanning of monitored devices?"
      type: verification
      status: answered
      targets: [contentRequirements/0, contentRequirements/2]
      answerSummary: >-
        Confirmed: Armis is 100 percent passive, using SPAN/mirror ports and network taps. No active scanning,
        no agents on monitored devices. Corroborated by multiple independent technical briefs from partner
        organizations. Sources: SE015, SE017, SE024.

    - id: QE004
      question: "How does the Armis AI-powered device fingerprinting and behavioral classification mechanism work at a technical level?"
      type: mechanism
      status: answered
      targets: [contentRequirements/2]
      answerSummary: >-
        Sensors capture metadata, transmit encrypted to cloud. Asset Intelligence Engine matches against 7B-plus
        behavioral fingerprints via AI/ML. CTCI acquisition (February 2024) added AI threat detection layer.
        Behavioral baselining flags anomalous protocol commands. Internal ML model architecture not disclosed.
        Sources: SE024, SE015, SE008.

    - id: QE005
      question: "What compliance certifications and regulatory standards does Armis Centrix currently hold as of H1 2026?"
      type: enumeration
      status: answered
      targets: [contentRequirements/5]
      answerSummary: >-
        Current certifications: FedRAMP Moderate (2023), DISA IL4 (2023), DoD IL5 (February 2026), SOC 2
        Type II, ISO 27001, ISO 27018, UK G-Cloud-14. FedRAMP High in process. Sources: SE003, SE004, SE011,
        SE019, SE024.

    - id: QE006
      question: "How many pre-built integration connectors does Armis Centrix provide and which major platforms are supported?"
      type: quantification
      status: answered
      targets: [contentRequirements/3]
      answerSummary: >-
        Armis claims 200-plus connectors spanning SIEM (Splunk, Sentinel), SOAR (XSOAR, Tines), ITSM
        (ServiceNow), EDR (CrowdStrike, SentinelOne), NAC (Cisco ISE, Aruba), CMDB (ServiceNow), and cloud
        (AWS, Azure, GCP). The 200-plus figure is company-claimed. Sources: SE024, SE015, SE016.

    - id: QE007
      question: "Has Armis achieved Department of Defense Impact Level 5 authorization for its federal platform?"
      type: verification
      status: answered
      targets: [contentRequirements/5]
      answerSummary: >-
        Confirmed: DISA IL5 authorization granted on February 23, 2026 to Armis Federal LLC. Corroborated by
        BusinessWire official press release, Armis blog, and Industrial Cyber independent reporting. Sources:
        SE003, SE004, SE009, SE011.

    - id: QE008
      question: "What integration execution risks arise from Armis completing three acquisitions (CTCI, Silk Security, OTORIO) within 13 months?"
      type: adverse
      status: answered
      targets: [contentRequirements/3]
      answerSummary: >-
        Risks confirmed: OTORIO eliminated 45 of 80 employees (56 percent) post-close. OTORIO Titan integration
        with Centrix cloud analytics remains in progress H1 2026. Three simultaneous integration workstreams
        compete for engineering bandwidth. Integration risk is the primary product and technology diligence
        concern for this chapter. Sources: SE006, SE007, SE010, SE025.

    - id: QE009
      question: "What is the end-to-end data processing mechanism from Armis edge sensors to cloud analytics?"
      type: mechanism
      status: answered
      targets: [contentRequirements/2]
      answerSummary: >-
        Edge sensor captures raw traffic metadata at SPAN/TAP points, performs local pre-processing, encrypts
        via TLS 1.3, transmits metadata only (not payloads) to Armis cloud. Cloud AI/ML classifies, fingerprints,
        and risk-scores assets. Air-gapped environments use OTORIO Titan for local processing with periodic
        secure sync to cloud analytics. Sources: SE012, SE015, SE017.

    - id: QE010
      question: "How does Armis's agentless passive-only approach compare to agent-based and active-scanning alternatives for enterprise security coverage?"
      type: comparison
      status: answered
      targets: [contentRequirements/4]
      answerSummary: >-
        Agentless passive covers OT/IoT/medical devices that cannot run agents; no scan disruption risk; limited
        by passive-only enforcement. Active scanning covers more enterprise IT but risks OT disruption and is
        prohibited in clinical environments. Agent-based provides deep endpoint telemetry but misses unmanaged
        devices. Passive architecture uniquely advantaged in OT/healthcare; less differentiated for pure IT.
        Sources: SE015, SE017, SE024.

    - id: QE011
      question: "How large is the Armis proprietary device knowledge base and what evidence supports the 7 billion device figure?"
      type: quantification
      status: answered
      targets: [contentRequirements/4]
      answerSummary: >-
        Armis claims 7B-plus devices tracked in its Asset Intelligence Engine. Company-stated figure from
        official platform materials, reinforced by third-party coverage. No independent verification of the
        exact count; the figure cited consistently since 2024 with no credible counter-claim. Sources: SE024,
        SE008, SE017.

    - id: QE012
      question: "What federal compliance authorizations does Armis hold and what workloads and data types does each cover?"
      type: enumeration
      status: answered
      targets: [contentRequirements/5]
      answerSummary: >-
        FedRAMP Moderate (2023): civilian agency data. DISA IL4 (2023): DoD non-classified missions. DoD IL5
        (February 2026): SECRET-level and NSS workloads. FedRAMP High: in process targeting H2 2026. All
        federal deployments through Armis Federal LLC on AWS GovCloud. Sources: SE003, SE004, SE009, SE011,
        SE018.

    - id: QE013
      question: "What deployment modes does Armis Centrix support and what are the constraints and use cases for each?"
      type: enumeration
      status: answered
      targets: [contentRequirements/3]
      answerSummary: >-
        Three modes: (1) Cloud-native SaaS on AWS (standard, fastest deployment, 1-7 days); (2) Hybrid (sensors
        on-prem, analytics cloud, most common enterprise); (3) Air-gapped on-premises via OTORIO Titan (classified
        OT, integration in progress). Federal uses AWS GovCloud. Sources: SE024, SE015, SE011, SE005.

    - id: QE014
      question: "What is the current completeness and timeline of the OTORIO Titan on-premises platform integration with Armis Centrix cloud analytics?"
      type: mechanism
      status: partial
      targets: [contentRequirements/2, contentRequirements/3]
      answerSummary: >-
        Partial: OTORIO acquisition closed March 2025. Titan on-premises integration with Centrix cloud described
        as in progress H1 2026. No specific feature-parity milestone or confirmed completion date published.
        Air-gapped OT customers and federal customers relying on Titan are the primary affected segments.

    - id: QE015
