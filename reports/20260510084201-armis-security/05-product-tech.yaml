figures:
  - id: FE001
    title: "Product architecture map"
    type: stack
    slug: product-architecture-map
    claimRefs: [CE001, CE003, CE004, CE005, CE006, CE007, CE025, CE039, CE041]
    approximationNotes: >-
      Layer boundaries are logical functional tiers, not strict deployment boundaries. The Armis platform is
      cloud-native SaaS. OTORIO Titan sits conceptually between the Collection and Intelligence layers for
      air-gapped deployments. Integration layer represents 200-plus connectors; only selected examples shown.
    data:
      layers:
        - id: L1
          label: "Collection Layer — Sensors and Protocol Decoders"
          detail: >-
            Armis virtual and physical sensors deployed at SPAN/TAP points; OTORIO Titan on-premises for air-gapped
            OT environments. Deep packet inspection of 500-plus protocols: Modbus, DNP3, BACnet, Siemens S7,
            OPC-UA, PROFINET, DICOM, HL7, BLE, Zigbee. Metadata-only extraction (no payload capture) encrypted
            via TLS 1.3 before cloud transmission.
          tone: neutral
        - id: L2
          label: "Intelligence Layer — AI Asset Intelligence Engine"
          detail: >-
            Armis cloud AI/ML engine: 7B-plus device behavioral fingerprints; CTCI-augmented AI threat detection
            (Feb 2024); Silk Security risk prioritization logic (Apr 2024). Continuous fingerprint database updates
            from all customer deployments create a compounding data flywheel accuracy advantage. Behavioral
            baselining flags anomalous protocol commands and communication patterns in real time.
          tone: positive
        - id: L3
          label: "Platform Layer — Centrix SaaS Modules"
          detail: >-
            Seven Centrix SKUs: Asset Management and Security; OT/ICS Security; Medical Device/IoMT Security;
            CAASM; VMDR (GA 2025/2026); Application Security (early adoption 2025); Secure Remote Access
            (OTORIO-derived, integration in progress). Single-pane-of-glass console with role-based dashboards
            for CISO, SOC analyst, OT engineer, and biomedical teams.
          tone: positive
        - id: L4
          label: "Action Layer — API, Integrations, and Ecosystem"
          detail: >-
            REST API v3; Python SDK (armis-sdk on PyPI); Armis Developer Portal (developers.armis.com);
            GitHub organization (ArmisSecurity). 200-plus pre-built integrations: ServiceNow (ITSM/CMDB/HAM/SAM),
            Splunk, Microsoft Sentinel, CrowdStrike, Palo Alto XSOAR, Cisco ISE, Aruba ClearPass, AWS, Azure, GCP.
            Enforcement delegated to integrated NAC/firewall/SOAR — Armis does not enforce inline.
          tone: positive
        - id: L5
          label: "Compliance and Trust Layer — Certifications and Controls"
          detail: >-
            FedRAMP Moderate (2023), DISA IL4 (2023), DoD IL5 (Feb 2026), FedRAMP High (in process), SOC 2
            Type II, ISO 27001, ISO 27018, UK G-Cloud-14. AES-256 at rest; TLS 1.3 in transit. Armis Federal
            LLC subsidiary for classified deployments on AWS GovCloud. Early Warning System (dark web plus
            honeypots) for proactive threat intelligence.
          tone: positive

  - id: FE002
    title: "Customer workflow / operating flow"
    type: flow
    slug: customer-workflow-operating-flow
    claimRefs: [CE003, CE005, CE007, CE009, CE025, CE027, CE029, CE030, CE028]
    approximationNotes: >-
      Flow represents the typical enterprise deployment journey from sensor installation through ongoing
      operations. Healthcare IoMT and OT workflows follow the same stages with domain-specific configuration
      at stages 3 and 4. Timelines are typical ranges from Armis implementation partner experience and
      publicly available deployment guides.
    data:
      nodes:
        - id: N1
          label: "1. Sensor Deployment"
          detail: "Install Armis virtual/physical sensors at SPAN/TAP points (or OTORIO Titan for air-gapped OT). No software on monitored endpoints. Typical timeline: 1-7 days for cloud/IT; 4-12 weeks for OT/Healthcare environments requiring change management."
          tone: neutral
        - id: N2
          label: "2. Passive Discovery"
          detail: "Sensors passively capture all network traffic metadata. No active scanning. No disruption to OT devices or medical equipment. Asset list populates within hours of sensor activation — full inventory typically complete within 72 hours."
          tone: positive
        - id: N3
          label: "3. AI Classification and Fingerprinting"
          detail: "Asset Intelligence Engine classifies each device against 7B-plus fingerprints. Identifies make, model, firmware, OS, protocols, and behavior baseline. CTCI IP adds AI threat detection layer. Clinical impact scoring applied for medical devices."
          tone: positive
        - id: N4
          label: "4. Risk Scoring and Prioritization"
          detail: "Silk Security-derived AI prioritizes assets by exploitability, business impact, and threat context. Clinical impact scoring for IoMT. CAASM quantifies total attack surface exposure. Early Warning System flags active threat campaigns targeting customer asset classes."
          tone: positive
        - id: N5
          label: "5. Alert and SIEM/SOAR Delivery"
          detail: "Alerts delivered to Centrix console and/or integrated SIEM (Splunk, Sentinel) and SOAR (XSOAR, Tines). Analyst receives context-rich, prioritized incidents rather than raw signatures — reducing alert fatigue."
          tone: positive
        - id: N6
          label: "6. Remediation and ITSM Ticketing"
