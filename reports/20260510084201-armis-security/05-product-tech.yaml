chapter:
  number: 5
  title: "Product & Technology"
  summary: >-
    Armis Centrix is a cloud-native, agentless SaaS platform that discovers, classifies, profiles, and protects
    every connected asset across IT, OT, IoT, and IoMT through passive monitoring, deep packet inspection of
    500-plus industrial protocols, and an AI-powered Asset Intelligence Engine that tracks 7 billion or more
    devices globally. The platform comprises seven modular SKUs: Asset Management, OT/ICS Security, Medical
    Device/IoMT Security, CAASM, VMDR, Application Security, and Secure Remote Access. Three acquisitions in 13
    months (CTCI, Silk Security, OTORIO) expanded AI threat detection, risk prioritization, and on-premises OT
    capability respectively. Armis holds DoD IL5 (February 2026), FedRAMP Moderate, DISA IL4, SOC 2 Type II,
    ISO 27001, and ISO 27018. The 200-plus pre-built integrations, REST API v3, Python SDK, and Armis Developer
    Portal create a broad developer and partner ecosystem. The primary diligence risk is integration complexity
    from three acquisitions in rapid succession, with the OTORIO Titan on-premises integration still in progress
    as of H1 2026 and a 56 percent OTORIO workforce reduction raising integration team capacity concerns.

sections:
  - id: SE_S001
    title: "Platform Definition and Customer Workflow"
    body: >-
      Armis Centrix addresses the core enterprise security problem of asset visibility: organizations cannot protect
      devices they cannot see, and traditional endpoint agents miss OT controllers, medical equipment, smart building
      systems, and unmanaged IoT, leaving 30 to 60 percent of enterprise attack surfaces invisible to security teams.
      Armis solves this by passively monitoring all network traffic using SPAN and mirror ports, fingerprinting every
      communicating device without installing software or disrupting operations. The customer workflow begins with
      deployment of Armis sensors (physical or virtual appliances) at network aggregation points. Within hours,
      Centrix discovers and classifies every asset in scope, building a live CMDB-enriched inventory. Security teams
      then consume alerts, risk scores, and remediation workflows through the Centrix console or integrated
      SIEM, SOAR, and ITSM tools, prioritizing response by business impact rather than raw signal volume. For OT
      environments including manufacturing, utilities, oil and gas, and critical infrastructure, Centrix decodes
      500-plus industrial protocols including Modbus, DNP3, BACnet, Siemens S7, OPC-UA, and PROFINET, enabling
      behavioral baselining of PLCs, SCADA systems, and industrial controllers without disrupting production cycles.
      In healthcare, the IoMT module adds FDA and HIPAA-mapped clinical impact scoring so biomedical engineers and
      security teams can triage infusion pumps, imaging systems, and ventilators by patient risk rather than raw
      CVSS scores. The unifying customer promise is continuous, comprehensive asset intelligence without operational
      disruption or deployment friction, making Centrix the authoritative source of truth for every connected device
      in the enterprise environment. This positions Armis in the Gartner-defined CPS Protection Platforms market
      as the broadest single-platform option spanning IT, OT, IoT, and IoMT simultaneously in one cloud instance.

  - id: SE_S002
    title: "Technical Architecture and Operating Model"
    body: >-
      The Armis Centrix architecture consists of three logical tiers: collection, intelligence, and action.
      At the collection tier, Armis sensors (software-defined virtual appliances deployable on commodity x86
      hardware, VMware, AWS, or Azure VMs) connect to SPAN ports or network taps and capture raw traffic
      metadata. The sensors perform local pre-processing and encryption before transmitting only metadata,
      not packet payloads, to the Armis cloud, preserving network performance and addressing data-residency
      concerns. For air-gapped OT environments, the OTORIO Titan on-premises platform captures and processes
      data locally with a secure periodic sync to Centrix cloud analytics, though this integration is still
      in progress as of H1 2026. At the intelligence tier, the Armis Asset Intelligence Engine, a proprietary
      AI and ML data lake, correlates captured metadata against a continuously updated knowledge base of 7 billion
      or more device behavioral fingerprints, vulnerability associations, and threat intelligence feeds to classify,
      score, and profile each asset. The engine applies deep packet inspection across 500-plus OT and IoT protocols
      using purpose-built protocol decoders, enabling it to identify firmware versions, communication patterns, and
      anomalous behavior in Siemens S7, Modbus, DNP3, BACnet, OPC-UA, and PROFINET without disturbing operational
      traffic. The AI models, augmented by CTCI acquisition IP from February 2024 and Silk Security risk
      prioritization logic from April 2024, score each asset on a multi-dimensional risk index that accounts for
      vulnerability criticality, asset business value, exposure context, and threat actor relevance. At the action
      tier, Centrix exposes REST API v3 and 200-plus pre-built connectors to SIEM, SOAR, ITSM, EDR, NAC, CMDB,
      and cloud platforms. Remediation actions such as quarantine, ticket creation, and firewall policy push flow
      through these integrations rather than through Armis directly, preserving the platform's passive and
      non-intrusive architecture. The Python SDK (armis-sdk on PyPI) and the Armis Developer Portal at
      developers.armis.com extend the platform for custom integrations and automated workflows.

  - id: SE_S003
    title: "Deployment, Integration, and Roadmap"
    body: >-
      Armis Centrix supports three deployment modes: full cloud-native SaaS on AWS (US-East, US-West, EU-West);
      hybrid, where sensors are on-premises and analytics is cloud-based; and air-gapped on-premises via OTORIO
      Titan for classified or isolated OT environments. Federal deployments run on AWS GovCloud through Armis
      Federal LLC, the dedicated federal subsidiary established to hold FedRAMP and DoD authorizations separately
      from commercial operations. FedRAMP Moderate and DISA IL4 were achieved in 2023; DoD IL5 was authorized on
      February 23, 2026, enabling classified workloads up to SECRET level. FedRAMP High authorization is in
      process as of H1 2026 with a company-committed target of H2 2026. Deployment complexity varies by
      environment: cloud SaaS deployments can be operational within days for IT-only use cases; OT and healthcare
      deployments typically require 4 to 12 weeks for sensor placement, protocol tuning, and policy configuration,
      often supported by Armis-certified integrators including Accenture, Deloitte, and KPMG. The Armis Select
      Partner Program, launched in January 2026, replaced tiered partner tiers with outcome-based incentives,
      reducing MSSP and regional integrator onboarding friction. Integration maturity is a key differentiator:
      200-plus pre-built connectors and native ServiceNow integration reduce the implementation burden for
      enterprise customers already invested in ITSM and SIEM ecosystems. The roadmap as of H1 2026 includes:
      FedRAMP High completion targeted H2 2026; Centrix for Application Security general availability with SDLC
      integration launched in 2025 and in early adoption; OTORIO Titan on-premises integration with Centrix cloud
      analytics currently in progress and partially complete; and deeper ServiceNow ITSM, SAM, and HAM workflow
      embedding following the April 2026 acquisition close. The three acquisitions of CTCI in February 2024,
      Silk Security in April 2024, and OTORIO in March 2025 each added roadmap surface area and integration
      workstreams that compete for engineering bandwidth with the core platform release cadence.

  - id: SE_S004
    title: "Differentiation and Competitive Moat"
    body: >-
      Armis's primary competitive moat rests on four reinforcing pillars. First, the agentless passive
      architecture: Centrix requires no software installation, no active scanning, and no network disruption,
      a critical differentiator for OT and healthcare environments where device owners prohibit agent installation
      and active scanning can trigger safety shutdowns or equipment malfunctions. No major CPS protection platform
      claims 100 percent passive operation across IT, OT, IoT, and IoMT simultaneously; Claroty and Nozomi require
      SPAN and TAP infrastructure for OT but do not extend native passive coverage to enterprise IT without
      additional tooling. Second, the proprietary device knowledge base: with 7 billion or more behavioral
      fingerprints accumulated over nine years across enterprise, OT, healthcare, and government customer
      environments, Armis has the largest proprietary device intelligence asset in the CPS security market by
      its own claim. This data flywheel, where every new deployment adds fingerprints that improve classification
      accuracy for all customers, creates a compounding accuracy advantage over competitors building their
      libraries from scratch or from open-source sources. Third, OT, IT, and IoT convergence in a single
      platform: competitors either specialize (Dragos for OT threat intelligence; Claroty for OT protocol depth)
      or generalize without depth (Microsoft Defender for IoT in non-Azure environments). Centrix is the only
      platform addressing all three attack surface types in a single cloud-native instance. Fourth, ecosystem
      depth: 200-plus pre-built integrations, the ServiceNow native integration enabling workflow automation
      for 8,100-plus ServiceNow enterprise customers, and the AI-powered risk prioritization from Silk Security
      IP (claiming approximately 90 percent reduction in analyst triage time) collectively lower the operational
      overhead of running Centrix at enterprise scale. The Early Warning System, combining dark web intelligence
      monitoring, dynamic honeypot deception, and threat actor modeling, adds proactive threat hunting capability
      that most CPS platform competitors do not offer natively. Post-ServiceNow acquisition, Armis gains
      distribution leverage through the ServiceNow enterprise agreement and platform ecosystem.

  - id: SE_S005
    title: "Trust, Compliance, and Quality Controls"
    body: >-
      Armis holds a comprehensive compliance portfolio spanning commercial, federal, and international standards.
      On the federal side, FedRAMP Moderate from 2023 and DISA IL4 from 2023 cover US federal civilian and DoD
      non-classified workloads; the DoD IL5 authorization issued by DISA on February 23, 2026 permits processing
      of Controlled Unclassified Information and National Security Systems data, a requirement for most DoD and
      intelligence community deployments; and FedRAMP High is in process with an H2 2026 target. For commercial
      and international compliance, Armis holds SOC 2 Type II covering security, availability, and confidentiality
      trust service criteria; ISO 27001 for information security management; and ISO 27018 for cloud personal
      data protection. The UK Government G-Cloud-14 listing enables UK public sector procurement of Armis
      Centrix without a separate tender process. The platform's passive-only architecture provides a structural
      privacy and safety advantage: because Centrix captures only metadata and never injects traffic, it cannot
      disrupt OT device operation, exfiltrate packet payloads, or cause network storms, a trust guarantee that
      active-scanning alternatives cannot match. Data in transit is encrypted using TLS 1.3 and data at rest
      uses AES-256 encryption. Role-based access controls, SSO and SAML integration, and audit logging are
      standard platform features. For healthcare deployments, the IoMT module maps findings to HIPAA Security
      Rule controls and FDA cybersecurity guidance for medical devices published in the 2023 final rule. Armis
      provides 24/7 enterprise support, a public status page, and defined SLAs for critical vulnerability
      intelligence delivery. The Early Warning System provides advance intelligence on novel threat actor
      campaigns targeting asset classes present in customer environments, enabling proactive patching and
      network segmentation before exploitation events occur.

