  - id: sec-bull-base-bear-scenarios
    title: Bull, Base, and Bear Scenarios
    contentRequirements:
      - 3
    body: >
      Three scenario cases bound the range of outcomes for ServiceNow's $7.75B acquisition of Armis. The bull case
      assumes Armis reaches $700M ARR by 2027 via ServiceNow's 8,000-person enterprise sales force, aggressive
      cross-sell into the 7,700+ ServiceNow customer base, and successful OTORIO integration opening new industrial OT
      contracts in energy, utilities, and manufacturing. At 15x forward ARR on $700M, the implied platform value is
      $10.5B — a 35% upside to the acquisition price. This requires ARR growth to reaccelerate from 50% to 60%+ in the
      18 months post-close. The base case assumes $500M ARR by 2027 at 15-17x forward multiple, implying $7.5-8.5B in
      platform value — essentially in line with the acquisition price. This scenario assumes ServiceNow ITSM synergy
      delivers 20-30% revenue lift above standalone trajectory, OTORIO integration completes by Q4 2026, and Armis holds
      its Gartner MQ Leader position. The bear case assumes integration disruption stalls ARR at $300M, Microsoft
      Defender for IoT displaces Armis in mid-market, OT depth gap criticism accelerates Claroty or Dragos displacement
      in industrial verticals, and the ARR multiple compresses to 15x — implying $4.5B in value and a potential goodwill
      impairment charge for ServiceNow. Key downside triggers: NRR below 110% (indicating churn exceeds expansion),
      OTORIO Titan integration delay past Q3 2026 (confirming OT depth gap persistence), FedRAMP High authorization
      denied or delayed, or CEO/CTO departure within 18 months. The probability distribution skews base: ServiceNow's
      integration track record and Armis's Fortune 10 customer density provide durable downside support, but the
      three-acquisitions-in-13-months integration burden is the primary uncertainty anchor.
