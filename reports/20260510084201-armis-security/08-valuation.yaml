  evidenceGaps:
    - type: missing-data
      severity: material
      topic: financial-opacity
      missingEvidence: >
        Armis net revenue retention rate (NRR) and gross revenue retention rate (GRR) for FY2025 and the quarters
        following the ServiceNow acquisition close. NRR is the single most important financial metric for validating
        land-and-expand efficiency and churn risk in a SaaS model.
      whyItMatters: >
        Without NRR, the valuation model cannot assess whether the Fortune 10 customer density translates into net
        dollar expansion or whether churn from smaller accounts is eroding growth. NRR below 110% would be a
        thesis-break signal even with strong ARR growth optics.
      diligencePath: >
        Request NRR and GRR disclosure in ServiceNow's next quarterly earnings call Q&A; cross-reference with Armis
        segment ARR commentary. If not disclosed, model NRR from customer count trajectory and ARR growth assuming flat
        headcount expansion implies 120%+ NRR minimum.
      relatedQuestionRefs:
        - QV026
    - type: missing-data
      severity: material
      topic: financial-opacity
      missingEvidence: >
        Armis gross margin, GAAP operating loss, EBITDA margin, and cash burn rate for FY2025. These metrics determine
        whether the $7.75B acquisition creates value at a path to profitability commensurate with the premium multiple,
        and whether ServiceNow's integration investment is dilutive to group operating margins.
      whyItMatters: >
        A SaaS company at $340M ARR with 50%+ growth could have gross margins ranging from 65% (infrastructure-heavy) to
        85% (pure-software). This spread implies a $50-70M annual difference in gross profit that materially affects the
        discounted cash flow and goodwill assessment. GAAP operating loss also indicates how much runway Armis required
        annually pre-acquisition.
      diligencePath: >
        Request Armis segment disclosure in ServiceNow quarterly earnings; compare to pure-play SaaS security benchmarks
        (CrowdStrike 75-78% gross margin). If not disclosed, use agentless SaaS architecture and 100% cloud delivery as
        proxies for 75%+ gross margin floor.
      relatedQuestionRefs:
        - QV027
    - type: incomplete-data
      severity: minor
      topic: comparable
      missingEvidence: >
        Publicly verified ARR and funding round details for private OT security peers Claroty and Nozomi Networks.
        Current ARR estimates for Claroty ($100M+) and Nozomi ($50M) are based on analyst estimates and market
        commentary, not confirmed financial disclosures.
      whyItMatters: >
        The comparable valuation table relies on estimated ARR for private OT peers to benchmark Armis's 22.8x multiple.
        If actual Claroty ARR is materially higher than $100M, the implied Claroty multiple would compress toward Armis
        levels, weakening the argument that Armis's multiple is conservative relative to OT security peers.
      diligencePath: >
        Monitor Claroty and Nozomi Networks for any press-release ARR disclosures or new funding round announcements
        with valuation context. Cross-reference with Forrester and IDC OT security market reports for analyst-estimated
        revenue ranges.
      relatedQuestionRefs:
        - QV016
      relatedTableRefs:
        - TV004
