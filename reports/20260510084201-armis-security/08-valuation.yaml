  - id: sec-valuation-context-financing
    title: Valuation Context and Financing History
    contentRequirements:
      - 2
    body: >
      ServiceNow announced the acquisition of Armis Security for $7.75B all-cash on December 22, 2025, with the
      transaction closing April 19-20, 2026. The acquisition price implies approximately 22.8x trailing ARR based on the
      company's estimated $340M ARR at announcement, extrapolated from the $300M ARR milestone reported in August 2025
      and the 50%+ YoY growth trajectory. Armis's last private financing was a $435M Series E at $6.1B valuation, closed
      in November 2025 — just four weeks before the acquisition announcement — with Goldman Sachs Alternatives leading.
      The $7.75B acquisition price represents a 27% premium to the Series E valuation, suggesting ServiceNow's
      acquisition outreach likely overlapped with the final funding round. Total disclosed funding across seven-plus
      rounds exceeded $1.17B, with investors including Google Ventures, CapitalG, Brookfield Asset Management, Goldman
      Sachs Alternatives, and Insight Partners. The 23x ARR multiple is consistent with premium SaaS companies growing
      at 40-50% ARR YoY in a durable secular market: CrowdStrike trades at approximately 21x ARR on $3.3B+ ARR (>30%
      YoY), confirming that large-scale, high-growth cybersecurity platforms command 20-25x ARR in public markets.
      Public SEC filings including the ServiceNow 8-K disclosures and S-4/A registration statement provide the most
      complete publicly available financial representations and warranties associated with the transaction, though
      Armis-specific segment financials were not separately disclosed. Dilution and preference overhang from $1.17B+ in
      cumulative funding across preferred share tranches will flow through the acquisition waterfall; no liquidation
      preference analysis has been publicly disclosed. Entry discipline for any ServiceNow investor evaluating the
      acquisition value creation requires tracking Armis ARR contribution in quarterly earnings commentary and watching
      for integration cost charges in operating expense lines.
