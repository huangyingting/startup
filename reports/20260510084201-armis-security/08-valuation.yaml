  - id: sec-comparable-valuation-benchmarks
    title: Comparable Valuation and Market Benchmarks
    contentRequirements:
      - 4
    body: >
      Armis's ~23x trailing ARR acquisition multiple sits within the fair-value band for high-growth cybersecurity SaaS
      leaders, above mature public multiples but below private OT security peers. CrowdStrike — the clearest public
      comparable for high-growth, cloud-native security SaaS — trades at approximately 21x ARR on $3.3B+ ARR with 30%+
      growth, providing a public market anchor for how investors value large, durable cybersecurity platforms at scale.
      Tenable, a slower growth vulnerability management incumbent at ~13% growth, trades at approximately 6.5x revenue,
      illustrating the severe multiple compression associated with decelerating growth. In the private OT security
      market, Claroty — Armis's closest direct competitor — raised at $3.5B on estimated $100M+ ARR, implying
      approximately 35x ARR; Nozomi Networks raised its Series E at $1.5B on an estimated $50M ARR, also implying
      approximately 30x ARR. Both private OT peers carry higher multiples on smaller revenue bases than Armis at
      acquisition, suggesting Armis's multiple is conservative relative to early-stage OT security market pricing. The
      $7.75B Armis multiple of ~23x ARR at $340M ARR (vs. Claroty at ~35x ARR at ~$100M ARR) reflects the expected
      multiple compression at scale — large ARR bases command lower multiples even at similar growth rates. IDC
      forecasts the CPS protection market at $25B+ by 2028 with 20%+ CAGR, confirming the TAM expansion supports premium
      valuation for the market leader. The Forrester Wave (Q4 2024) and dual Gartner MQ Leader credentials provide
      independent validation of platform positioning that justifies premium to the CrowdStrike comparable.
