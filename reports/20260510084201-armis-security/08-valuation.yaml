  title: Valuation
  summary: >
    ServiceNow acquired Armis Security for $7.75B all-cash on April 19-20, 2026, implying approximately 22.8x trailing
    ARR based on estimated $340M ARR at announcement. The acquisition price represents a 27% premium over Armis's $6.1B
    Series E valuation closed just four weeks prior. At 50%+ YoY ARR growth and Gartner Magic Quadrant Leader status in
    2025 and 2026, the multiple is defensible relative to cybersecurity SaaS peers: CrowdStrike trades at ~21x ARR on
    $3.3B+ ARR and >30% growth; private OT security peers Claroty (~35x ARR) and Nozomi Networks (~30x ARR) trade at
    richer multiples on smaller revenue bases. The bull case reaches $10.5B by 2027 if ServiceNow distribution lifts ARR
    to $700M; the base case holds at $7.5-8.5B with $500M ARR and ITSM synergy; the bear case implies $4.5B if
    integration fails and growth stalls at $300M ARR. Material diligence gaps remain: NRR and GRR have never been
    publicly disclosed, GAAP profitability and burn rate are unknown, and three acquisitions in 13 months create
    unquantified integration execution risk. Thesis-break triggers include NRR below 110%, OTORIO integration delay past
    Q3 2026, FedRAMP High denial, and CEO/CTO departure within 18 months of close.
sections:
  - id: sec-investment-thesis-recommendation
    title: Investment Thesis and Recommendation
    contentRequirements:
      - 0
      - 1
    body: >
      Armis Security's investment thesis rests on four converging pillars: (1) a decade-long secular growth market in
      cyber-physical systems (CPS), OT, and IoT security projected to exceed $25B by 2028; (2) platform leadership
      evidenced by Gartner Magic Quadrant Leader positions in 2025 and 2026, a 7-billion-device knowledge base, and the
      only agentless platform covering IT, OT, IoT, and IoMT in a single console; (3) enterprise customer density,
      including 9 of the Fortune 10 and 35+ Fortune 100 customers with an NPS of approximately 70; and (4) explosive ARR
      growth from $200M (August 2024) to $300M (August 2025) exceeding 50% YoY with trajectory toward $340M+ at
      acquisition announcement. The recommendation for the ServiceNow acquisition is Fair Value at Acquisition Price —
      the $7.75B all-cash price at ~23x trailing ARR is fully justified given growth velocity, customer quality, and
      platform positioning, though it leaves limited margin of safety if integration execution underperforms. Confidence
      is high for the market and product pillars; medium for the financial pillar given absence of NRR and GAAP
      profitability disclosure. Risk rating is Medium-High driven primarily by integration execution risk (three
      acquisitions in 13 months), OT depth gap flagged in Gartner Peer Insights, and Microsoft Defender for IoT
      competitive pressure in SME. Anti-thesis signals include: the acquisition announced four weeks after a $6.1B
      funding round (suggesting acquisition outreach may have pre-dated the round), OTORIO workforce reduction of 45 of
      80 employees creating OT engineering bench risk, and no public disclosure of NRR creating opacity in churn risk
      assessment. The acquisition thesis holds if ServiceNow preserves ARR growth above 30% YoY through ITSM
      distribution synergy, integrates OTORIO Titan OT capabilities by Q3 2026, and retains founding engineering
      leadership through the integration window. Target return on the ServiceNow investment is 15-20% IRR in a bull case
      over a three-to-five-year horizon through platform revenue contribution; the fair value hold is predicated on
      Armis becoming ServiceNow's security anchor contributing $700M+ ARR by 2027-2028.
