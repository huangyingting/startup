chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The Armis Centrix platform competes in the Gartner-defined CPS Protection Platform market, a category formally
    established with a Magic Quadrant in 2025 evaluating 13 vendors. The market provides agentless discovery and
    protection for all connected assets across IT, OT, IoT, and IoMT environments. The narrowest applicable analyst
    estimate (The Business Research Company) sizes the CPS security market at $10.05B in 2025 growing to $18.51B by
    2030 at 13% CAGR, while the broader OT security market (MarketsAndMarkets) stands at $23.47B in 2025 growing to
    $50.29B by 2030 at 16.5% CAGR. Growth is driven by EU NIS2 regulatory mandates, FDA medical device cybersecurity
    requirements, OT/IT convergence, and device proliferation (20B+ IoT devices globally). Primary buyers are enterprise
    CISOs across five verticals: enterprise IT, healthcare, government/federal, industrial/OT, and manufacturing.

