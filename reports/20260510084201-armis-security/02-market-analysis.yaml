sections:
  - id: SM-SEC-01
    title: Market Boundary and Category Definition
    body: >-
      Armis Centrix competes primarily within the Gartner-defined Cyber-Physical Systems (CPS) Protection Platform market,
      a category that Gartner formally established with a Magic Quadrant in 2025, evaluating 13 vendors. CPS protection
      platforms provide agentless, passive network monitoring that discovers, classifies, and continuously monitors all
      connected assets — including IT devices, operational technology (OT/SCADA/PLC), IoT sensors, building systems, and
      connected medical devices — without requiring software agents or active scanning that could disrupt operations.

      The market boundary is important to define precisely because analyst estimates for adjacent categories (OT Security,
      IoT Security, "CPS Market") yield dramatically different TAM figures. The OT Security market ($22-23.5B in 2025)
      includes hardware, services, and traditional network monitoring tools, inflating the figure. The IoT Security market
      ($35.5B in 2024) is broader still and includes consumer IoT-adjacent segments. The narrowest and most relevant
      estimate is the CPS Protection Platform market as defined by TBRC ($10.05B in 2025) — the sub-segment that most
      closely mirrors Gartner's MQ scope and Armis's direct competition set.

      The market excludes: endpoint detection and response (EDR/EPP) for managed computers; cloud security posture
      management (CSPM); pure-IT SIEM tools without device discovery scope; and consumer IoT security. The status-quo
      substitute is manual asset inventory via spreadsheets and periodic network scans — a process that systematically
      undercounts unmanaged OT and IoT devices and leaves organizations with incomplete risk visibility.

      Armis's agentless architecture is architecturally necessary for this market: PLCs, SCADA systems, legacy medical
      devices, and embedded IoT typically run proprietary or real-time operating systems that cannot support software
      agents. Warranty and change-control restrictions also prohibit agent installation on many OT devices. This structural
      constraint creates a durable requirement for agentless discovery that cannot be substituted by enterprise EDR vendors.

    calloutRefs: []
    claimRefs: [CM001, CM002, CM003, CM004, CM005, CM023]

  - id: SM-SEC-02
    title: Market Sizing — Multiple Analyst Lenses
    body: >-
      The OT and CPS security market is well-covered by analyst firms, but estimates vary significantly by methodology
      and scope definition. MarketsAndMarkets sizes the OT security market at $23.47B in 2025, growing to $50.29B by 2030
      at 16.5% CAGR. Mordor Intelligence offers a slightly lower estimate of $22.15B in 2025 growing to $47.95B by 2031
      at 13.74% CAGR. Both project doubling or near-doubling of the market over a 5-6 year period, confirming strong
      structural growth across methodologies.

      For a more specific proxy, the CPS Security market — defined narrowly to exclude hardware-only and services-only
      OT vendors — was valued at $10.05B in 2025 with 13% CAGR to $18.51B in 2030 (The Business Research Company).
      This is the closest public analog to the Gartner-defined CPS Protection Platform market in which Armis competes.

      Adjacent segments provide additional market context. The CAASM market ($1.88B in 2025, 25% CAGR to $5.72B by 2030)
      is growing faster than the core OT security market, driven by enterprise demand for continuous asset intelligence and
      AI-driven risk prioritization. Medical device security ($7.41-8.47B in 2025) is a distinct and growing vertical,
      with the healthcare IoT security sub-segment growing at 28.8% CAGR. The broader IoT security market ($35.5B in 2024
      at 26.8% CAGR to $141.8B by 2030) overstates the addressable opportunity for Armis but illustrates the scale of
      the device proliferation problem.

      Device proliferation is the underlying demand driver: there are approximately 19.8 billion connected IoT devices
      globally in 2025-2026 (DemandSage), with Ericsson projecting cellular IoT connections alone to reach 4.5B by end
      of 2025. This growing device footprint structurally increases the value of platforms that can discover and monitor
      them without agents.

      A bottom-up SAM estimate for Armis suggests $3-8B: applying $20-50 per asset per year (from the May 2025 partner
      price list) to approximately 200 Fortune 500 enterprises with 10,000-50,000 managed assets each. This is a rough
      proxy; the actual SAM depends on Armis's expansion into healthcare, government, and mid-market channels that are
      still early stage. Armis's current $340M ARR represents approximately 4-11% of this SAM estimate, implying
      significant runway if the market share thesis holds.

    calloutRefs: []
    claimRefs: [CM006, CM007, CM008, CM009, CM010, CM011, CM012, CM025, CM026, CM027, CM031, CM032, CM034, CM037]

  - id: SM-SEC-03
    title: Buyer and Segment Profiles
    body: >-
      The primary buyer for Armis Centrix is the enterprise Chief Information Security Officer (CISO), who controls the
      IT security budget and bears responsibility for device risk across all connected assets. In enterprise IT (Fortune
      500+), the CISO typically procures through an annual security tooling budget, with ROI justified through device
      visibility uplift and reduced exposure from previously unmanaged assets. This segment is Armis's strongest, with
      Fortune 100 penetration exceeding 35% at acquisition close.

      In healthcare, the buying authority is more distributed, shared among the CISO, the Chief Medical Information
      Officer (CMIO), and Biomedical Engineering. The primary adoption trigger is regulatory — FDA cybersecurity guidance
      and HIPAA breach notification obligations create compliance-driven urgency. Ransomware attacks on hospital systems
      (e.g., Ascension Health, Change Healthcare) have elevated the healthcare CISO to board-level visibility, driving
      security investment. Armis has established healthcare momentum and named customer references in this vertical.

      Federal government and DoD procurement follows a distinct pathway requiring FedRAMP authorization (Armis holds
      FedRAMP Moderate, IL4, and IL5) and often a formal RFP/tender process. Armis Federal operates as a separate
      business unit with dedicated DoD and civilian agency sales. Budget is sourced from congressional appropriations with
      multi-year commitments, but procurement cycles are typically 12-18+ months, the longest in Armis's portfolio.

      Industrial and critical infrastructure customers present the most complex buyer dynamic: procurement authority is
      split between the corporate CISO and OT/plant managers who prioritize operational continuity. OT managers have
      historically resisted security tools that could disrupt production, making Armis's agentless, passive-only approach
      a critical requirement. NIS2 compliance urgency in EU-regulated manufacturers has accelerated adoption in EMEA.
      The Armis OTORIO acquisition materially deepens OT/ICS product credibility and customer relationships.

    calloutRefs: []
    claimRefs: [CM013, CM014, CM015, CM016, CM017, CM028, CM029, CM035]

  - id: SM-SEC-04
    title: Growth Drivers and Adoption Catalysts
    body: >-
      Four structural forces are driving sustained growth in the CPS protection platform market through 2026 and beyond.

      Regulatory mandates provide the most durable demand floor. The EU NIS2 Directive, effective October 2024, requires
      18 critical sectors to implement asset inventory, network monitoring, and incident response capabilities — creating
      non-discretionary cybersecurity spending for OT and IoT environments across European operations. Penalties for
      non-compliance include multimillion-euro fines and executive liability. U.S. regulations add further pressure: FDA
      cybersecurity guidance for connected medical devices (2023) and OT manufacturing environments (2025) requires
      security-by-design and postmarket vulnerability management, directly benefiting platforms with device discovery and
      risk prioritization capabilities. CISA asset visibility directives similarly require federal agencies and critical
      infrastructure operators to maintain comprehensive device inventories.

      OT/IT convergence structurally expands the addressable device pool. Digital transformation and Industry 4.0
      initiatives have brought formerly air-gapped OT networks online, creating internet-accessible SCADA systems, PLCs,
      and connected sensors that are now reachable by threat actors but invisible to IT-centric security tools. Armis
      estimates that 60-70% of enterprise connected assets are not covered by traditional endpoint agents — a structural
      gap that Armis's platform is purpose-built to close.

      Threat escalation drives urgency. State-aligned attacks on critical infrastructure increased 49% in 2024, with
      manufacturing accounting for 25.7% of industrial cyber incidents. High-profile ransomware events (Change Healthcare,
      Colonial Pipeline) have elevated board-level awareness of OT/IoT security risk and accelerated budget approvals.
      AI-powered threat tools are enabling more sophisticated, targeted attacks on OT environments, raising the ROI of
      AI-powered defense platforms.

      Device proliferation sustains long-term demand. With 19.8B connected IoT devices globally (2025-2026) growing to
      40.6B by 2034, the attack surface addressed by CPS platforms will continue expanding independent of regulatory
      pressure, providing a structural tailwind for the next decade.

    calloutRefs: []
    claimRefs: [CM018, CM019, CM020, CM021, CM022, CM036]

  - id: SM-SEC-05
    title: Adoption Constraints and Market Risks
    body: >-
      Despite the strong growth trajectory, the CPS protection platform market faces several adoption constraints that
      discipline revenue velocity and addressable market expectations.

      Long sales cycles are the most significant structural constraint. Enterprise OT security procurements typically
      require 6-18 months from initial engagement to signed contract, driven by OT-specific proof-of-concept requirements,
      multi-stakeholder alignment (CISO + OT manager), security assessments, and regulatory certification requirements in
      government. Armis's ability to scale past $340M ARR despite this constraint is notable and suggests efficient
      sales motion, but the ceiling is set by pipeline capacity and cycle duration.

      Incumbent switching costs are real. Claroty, Nozomi Networks, and Dragos have established footholds in industrial
      environments, and customers with existing OT security tooling face integration migration costs and vendor relationship
      inertia. Armis must typically displace or complement an existing tool, which extends the sales cycle and reduces
      win rates in competitive replacements.

      Market consolidation creates competitive uncertainty. The 2024-2026 wave of M&A — ServiceNow acquiring Armis
      ($7.75B), Cisco acquiring Splunk ($28B), and Palo Alto's continued acquisitions — is compressing the standalone
      CPS platform market. Remaining independents (Claroty, Nozomi Networks) face both organic competition from bundled
      mega-platform providers and potential consolidation pressure. Post-acquisition, Armis's competitive positioning
      depends heavily on ServiceNow maintaining its standalone go-to-market motion.

      Market sizing uncertainty limits investment thesis confidence. Analyst TAM estimates for OT security vary by 6% in
      2025 and may diverge further at the 2030 forecast horizon; no public analyst has published a standalone CPS
      protection platform SAM that directly maps to Armis's go-to-market scope. Investors should seek bottom-up customer
      cohort data from ServiceNow to validate Armis's market share trajectory.

    calloutRefs: []
