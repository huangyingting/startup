figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: "Market sizing cascades from the broad OT/IoT security opportunity down to the CPS protection platform segment and Armis-accessible SAM, reflecting increasing specificity and decreasing size at each layer."
    data:
      nodes:
        - label: "Broad IoT + OT Security TAM: ~$57B (2025)"
