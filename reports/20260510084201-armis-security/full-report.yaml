      - number: '2.4'
        title: Growth Drivers and Adoption Catalysts
        blocks:
          - type: paragraph
            body: >-
              Four structural forces are driving sustained growth in the CPS protection platform market through 2026 and
              beyond.

              Regulatory mandates provide the most durable demand floor. The EU NIS2 Directive, effective October 2024,
              requires 18 critical sectors to implement asset inventory, network monitoring, and incident response
              capabilities — creating non-discretionary cybersecurity spending for OT and IoT environments across
              European operations. Penalties for non-compliance include multimillion-euro fines and executive liability.
              U.S. regulations add further pressure: FDA cybersecurity guidance for connected medical devices (2023) and
              OT manufacturing environments (2025) requires security-by-design and postmarket vulnerability management,
              directly benefiting platforms with device discovery and risk prioritization capabilities. CISA asset
              visibility directives similarly require federal agencies and critical infrastructure operators to maintain
              comprehensive device inventories.

              OT/IT convergence structurally expands the addressable device pool. Digital transformation and Industry
              4.0 initiatives have brought formerly air-gapped OT networks online, creating internet-accessible SCADA
              systems, PLCs, and connected sensors that are now reachable by threat actors but invisible to IT-centric
              security tools. Armis estimates that 60-70% of enterprise connected assets are not covered by traditional
              endpoint agents — a structural gap that Armis's platform is purpose-built to close.

              Threat escalation drives urgency. State-aligned attacks on critical infrastructure increased 49% in 2024,
              with manufacturing accounting for 25.7% of industrial cyber incidents. High-profile ransomware events
              (Change Healthcare, Colonial Pipeline) have elevated board-level awareness of OT/IoT security risk and
              accelerated budget approvals. AI-powered threat tools are enabling more sophisticated, targeted attacks on
              OT environments, raising the ROI of AI-powered defense platforms.

              Device proliferation sustains long-term demand. With 19.8B connected IoT devices globally (2025-2026)
              growing to 40.6B by 2034, the attack surface addressed by CPS platforms will continue expanding
              independent of regulatory pressure, providing a structural tailwind for the next decade.
