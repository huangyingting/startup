      - number: '3.5'
        title: Commoditization Risk and Displacement Threats
        blocks:
          - type: paragraph
            body: >-
              The primary commoditization risk is the convergence of asset discovery capabilities across the vendor set.
              As Armis, Claroty, Nozomi, Forescout, and Microsoft all expand their device knowledge bases, the asset
              discovery/inventory use case is commoditizing — differentiation is shifting toward threat intelligence
              depth, compliance reporting, SOAR integration, and enforcement capability. Armis's 7B-device knowledge
              base is a current moat but is not a permanent one if competitors invest aggressively in protocol libraries
              and AI-driven device fingerprinting.

              The Microsoft bundling risk is the most adverse near-term threat. Microsoft's inclusion of Defender for
              IoT in enterprise agreements creates a "good-enough" option for IT-centric organizations. Gartner analyst
              Dale Peterson noted that Gartner's OT Visibility MQ category framing does not fully capture the
              distinction between pure-OT security (where Armis has less depth than Claroty/Dragos) and IT/IoT
              convergence (where Armis leads). Organizations with primarily IT/enterprise IoT exposure may consolidate
              on Microsoft rather than purchasing Armis — a displacement vector that the ServiceNow acquisition
              partially mitigates via ecosystem positioning.

              Dragos's limited North American focus (critiqued by Gartner 2026) and Nozomi's loss of independence
              (Mitsubishi acquisition) are adverse signals for the pure-play OT segment: this consolidation benefits
              Armis and Claroty, but also signals that the standalone CPS platform market may consolidate further
              through acquisition or platform bundling in the next 2-3 years. The 2025-2026 acquisition wave (Nozomi by
              Mitsubishi, Armis by ServiceNow, partial OTORIO integration) suggests the market is entering a
              consolidation phase that benefits scale players.
            claimRefs: []
      - number: '3.6'
        title: Exhibits
        blocks:
