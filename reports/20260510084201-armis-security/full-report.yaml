  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Recommendation
        blocks:
          - type: paragraph
            body: >
              Armis Security's investment thesis rests on four converging pillars: (1) a decade-long secular growth
              market in cyber-physical systems (CPS), OT, and IoT security projected to exceed $25B by 2028; (2)
              platform leadership evidenced by Gartner Magic Quadrant Leader positions in 2025 and 2026, a
              7-billion-device knowledge base, and the only agentless platform covering IT, OT, IoT, and IoMT in a
              single console; (3) enterprise customer density, including 9 of the Fortune 10 and 35+ Fortune 100
              customers with an NPS of approximately 70; and (4) explosive ARR growth from $200M (August 2024) to $300M
              (August 2025) exceeding 50% YoY with trajectory toward $340M+ at acquisition announcement. The
              recommendation for the ServiceNow acquisition is Fair Value at Acquisition Price — the $7.75B all-cash
              price at ~23x trailing ARR is fully justified given growth velocity, customer quality, and platform
              positioning, though it leaves limited margin of safety if integration execution underperforms. Confidence
              is high for the market and product pillars; medium for the financial pillar given absence of NRR and GAAP
              profitability disclosure. Risk rating is Medium-High driven primarily by integration execution risk (three
              acquisitions in 13 months), OT depth gap flagged in Gartner Peer Insights, and Microsoft Defender for IoT
              competitive pressure in SME. Anti-thesis signals include: the acquisition announced four weeks after a
              $6.1B funding round (suggesting acquisition outreach may have pre-dated the round), OTORIO workforce
              reduction of 45 of 80 employees creating OT engineering bench risk, and no public disclosure of NRR
              creating opacity in churn risk assessment. The acquisition thesis holds if ServiceNow preserves ARR growth
              above 30% YoY through ITSM distribution synergy, integrates OTORIO Titan OT capabilities by Q3 2026, and
              retains founding engineering leadership through the integration window. Target return on the ServiceNow
              investment is 15-20% IRR in a bull case over a three-to-five-year horizon through platform revenue
              contribution; the fair value hold is predicated on Armis becoming ServiceNow's security anchor
              contributing $700M+ ARR by 2027-2028.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
