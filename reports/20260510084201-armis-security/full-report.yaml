        title: Adoption Constraints and Market Risks
        blocks:
          - type: paragraph
            body: >-
              Despite the strong growth trajectory, the CPS protection platform market faces several adoption
              constraints that discipline revenue velocity and addressable market expectations.

              Long sales cycles are the most significant structural constraint. Enterprise OT security procurements
              typically require 6-18 months from initial engagement to signed contract, driven by OT-specific
              proof-of-concept requirements, multi-stakeholder alignment (CISO + OT manager), security assessments, and
              regulatory certification requirements in government. Armis's ability to scale past $340M ARR despite this
              constraint is notable and suggests efficient sales motion, but the ceiling is set by pipeline capacity and
              cycle duration.

              Incumbent switching costs are real. Claroty, Nozomi Networks, and Dragos have established footholds in
              industrial environments, and customers with existing OT security tooling face integration migration costs
              and vendor relationship inertia. Armis must typically displace or complement an existing tool, which
              extends the sales cycle and reduces win rates in competitive replacements.

              Market consolidation creates competitive uncertainty. The 2024-2026 wave of M&A — ServiceNow acquiring
              Armis ($7.75B), Cisco acquiring Splunk ($28B), and Palo Alto's continued acquisitions — is compressing the
              standalone CPS platform market. Remaining independents (Claroty, Nozomi Networks) face both organic
              competition from bundled mega-platform providers and potential consolidation pressure. Post-acquisition,
              Armis's competitive positioning depends heavily on ServiceNow maintaining its standalone go-to-market
              motion.

              Market sizing uncertainty limits investment thesis confidence. Analyst TAM estimates for OT security vary
              by 6% in 2025 and may diverge further at the 2030 forecast horizon; no public analyst has published a
              standalone CPS protection platform SAM that directly maps to Armis's go-to-market scope. Investors should
              seek bottom-up customer cohort data from ServiceNow to validate Armis's market share trajectory.
            claimRefs:
