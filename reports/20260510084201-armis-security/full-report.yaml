  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Category Definition
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix competes primarily within the Gartner-defined Cyber-Physical Systems (CPS) Protection
              Platform market, a category that Gartner formally established with a Magic Quadrant in 2025, evaluating 13
              vendors. CPS protection platforms provide agentless, passive network monitoring that discovers,
              classifies, and continuously monitors all connected assets — including IT devices, operational technology
              (OT/SCADA/PLC), IoT sensors, building systems, and connected medical devices — without requiring software
              agents or active scanning that could disrupt operations.

              The market boundary is important to define precisely because analyst estimates for adjacent categories (OT
              Security, IoT Security, "CPS Market") yield dramatically different TAM figures. The OT Security market
              ($22-23.5B in 2025) includes hardware, services, and traditional network monitoring tools, inflating the
              figure. The IoT Security market ($35.5B in 2024) is broader still and includes consumer IoT-adjacent
              segments. The narrowest and most relevant estimate is the CPS Protection Platform market as defined by
              TBRC ($10.05B in 2025) — the sub-segment that most closely mirrors Gartner's MQ scope and Armis's direct
              competition set.

              The market excludes: endpoint detection and response (EDR/EPP) for managed computers; cloud security
              posture management (CSPM); pure-IT SIEM tools without device discovery scope; and consumer IoT security.
              The status-quo substitute is manual asset inventory via spreadsheets and periodic network scans — a
              process that systematically undercounts unmanaged OT and IoT devices and leaves organizations with
              incomplete risk visibility.

              Armis's agentless architecture is architecturally necessary for this market: PLCs, SCADA systems, legacy
              medical devices, and embedded IoT typically run proprietary or real-time operating systems that cannot
              support software agents. Warranty and change-control restrictions also prohibit agent installation on many
              OT devices. This structural constraint creates a durable requirement for agentless discovery that cannot
              be substituted by enterprise EDR vendors.
