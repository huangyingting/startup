      - number: '5.2'
        title: Technical Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              The Armis Centrix architecture consists of three logical tiers: collection, intelligence, and action. At
              the collection tier, Armis sensors (software-defined virtual appliances deployable on commodity x86
              hardware, VMware, AWS, or Azure VMs) connect to SPAN ports or network taps and capture raw traffic
              metadata. The sensors perform local pre-processing and encryption before transmitting only metadata, not
              packet payloads, to the Armis cloud, preserving network performance and addressing data-residency
              concerns. For air-gapped OT environments, the OTORIO Titan on-premises platform captures and processes
              data locally with a secure periodic sync to Centrix cloud analytics, though this integration is still in
              progress as of H1 2026. At the intelligence tier, the Armis Asset Intelligence Engine, a proprietary AI
              and ML data lake, correlates captured metadata against a continuously updated knowledge base of 7 billion
              or more device behavioral fingerprints, vulnerability associations, and threat intelligence feeds to
              classify, score, and profile each asset. The engine applies deep packet inspection across 500-plus OT and
              IoT protocols using purpose-built protocol decoders, enabling it to identify firmware versions,
              communication patterns, and anomalous behavior in Siemens S7, Modbus, DNP3, BACnet, OPC-UA, and PROFINET
              without disturbing operational traffic. The AI models, augmented by CTCI acquisition IP from February 2024
              and Silk Security risk prioritization logic from April 2024, score each asset on a multi-dimensional risk
              index that accounts for vulnerability criticality, asset business value, exposure context, and threat
              actor relevance. At the action tier, Centrix exposes REST API v3 and 200-plus pre-built connectors to
              SIEM, SOAR, ITSM, EDR, NAC, CMDB, and cloud platforms. Remediation actions such as quarantine, ticket
              creation, and firewall policy push flow through these integrations rather than through Armis directly,
              preserving the platform's passive and non-intrusive architecture. The Python SDK (armis-sdk on PyPI) and
              the Armis Developer Portal at developers.armis.com extend the platform for custom integrations and
              automated workflows.
