      - number: '7.3'
        title: Operational and Technology Risks
        blocks:
          - type: paragraph
            body: >
              Armis's SaaS architecture is hosted on AWS (commercial) and AWS GovCloud (federal) with no publicly
              disclosed multi-cloud or hybrid failover strategy. An extended AWS GovCloud outage could cause Armis
              platform unavailability for federal customers, triggering SLA penalties and potential FedRAMP
              non-compliance. AWS GovCloud is a premium-priced, compliance-driven environment with limited geographic
              redundancy relative to commercial AWS regions.

              The OTORIO acquisition introduced the Titan on-premises air-gapped OT platform as a separate code base
              that must be maintained in parallel with Armis Centrix. The integration of Titan air-gapped OT
              capabilities into Centrix was in progress as of H1 2026. Integration complexity is elevated by the March
              2025 layoff of 45 of approximately 80 OTORIO employees, reducing the experienced OT engineering bench. A
              Gartner Peer Insights review from a $30B+ manufacturer in December 2025 rated Armis 3.0/5 and cited that
              OT-specific options remain behind competitors, confirming OT feature depth as a persistent operational
              risk. PeerSpot reviewers noted occasional platform instability. The 200+ third-party integration ecosystem
              creates API dependency risk; if Splunk, Microsoft Sentinel, or CrowdStrike changes API contracts, affected
              integrations could disrupt customer security workflows. Armis has no manufacturing dependencies (100%
              software), limiting supply chain risk. Labor risk is moderate: cybersecurity engineering talent is highly
              competitive, and ServiceNow culture integration could trigger attrition among Armis's Israeli engineering
              team.
            claimRefs:
              - CR016
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
