  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Armis Security's customer base is concentrated in large enterprises operating complex, heterogeneous
              network environments spanning traditional IT, operational technology (OT), and Internet of Things (IoT)
              devices. The company's most penetrated verticals are Healthcare (IoMT security and clinical device
              management), Manufacturing and Industrial (OT/ICS asset visibility and security), Energy and Utilities
              (critical infrastructure protection), Federal Government (FedRAMP Moderate and DoD IL5 deployments),
              Financial Services, Education, and Telecommunications.

              Geographically, Armis is US-first — approximately 52% of its workforce is US-based, reflecting its primary
              customer concentration — with a growing presence in EMEA and APAC. The buyer profile is predominantly the
              enterprise CISO and VP of IT Security at organizations with 1,000+ employees; however, TrustRadius data
              confirms deployments in districts as small as 1,500 employees (East Moline School District 37). Deal size
              skews large: Fortune 500 and Global 2000 companies represent the highest-priority customer segment,
              evidenced by nine Fortune 10 companies and 35+ Fortune 100 companies in the active customer base. The
              product is sold almost exclusively as an enterprise SaaS subscription, with 1-3 year contracts typical.
              Channel and partner coverage spans 200+ technology integrations including Microsoft, Cisco, Palo Alto
              Networks, and Elisity, which uses the Armis Centrix API for policy enforcement in its microsegmentation
              platform.
