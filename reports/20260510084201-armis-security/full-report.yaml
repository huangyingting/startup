  - id: FM004
    title: Adoption funnel or value-chain map
    type: flow
    layout: wide
    summary: >-
      Enterprise CPS platform adoption follows a consistent pattern from triggered awareness through technical
      validation, procurement, and expansion — with the longest delays in OT-specific validation phases.
    data:
      nodes:
        - id: n1
          label: Triggered Awareness
          detail: >-
            Security incident, ransomware near-miss, regulatory mandate (NIS2, FDA), or CISO peer referral activates
            initial interest in OT/IoT visibility.
          tone: neutral
        - id: n2
          label: Discovery Evaluation / POC
          detail: >-
            Agentless passive deployment in limited environment (1-2 sites); CISO and OT team validate that Armis
            discovers unknown devices without disrupting operations.
          tone: positive
        - id: n3
          label: Stakeholder Alignment (IT + OT)
          detail: >-
            IT security CISO and OT plant/facility manager must both agree; OT stakeholder resistance to security tools
            disrupting production is the most common stall point.
          tone: warning
        - id: n4
          label: Procurement / Contract
          detail: >-
            Enterprise/government procurement process including legal review, security assessment, vendor vetting, and
            (in government) FedRAMP/IL validation; longest for regulated sectors.
          tone: warning
        - id: n5
          label: Full Deployment
          detail: >-
            Platform deployed across all sites; asset inventory complete; dashboards operational for CISO and board
            reporting.
          tone: positive
        - id: n6
          label: Platform Expansion
          detail: >-
            Land-and-expand: additional modules (VMDR, CAASM, healthcare IoMT), additional sites/geographies, and
            integration with ITSM/SOAR workflows (now accelerated via ServiceNow).
          tone: positive
