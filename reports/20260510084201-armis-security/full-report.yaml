      - number: '3.3'
        title: Incumbents and Adjacent Competitors
        blocks:
          - type: paragraph
            body: >-
              Forescout Technologies (Campbell, CA) is the incumbent network access control (NAC) and device visibility
              vendor, acquired by Advent International (PE) for $1.9B in 2020. Forescout reported strong FY2025 results:
              230+ new customers, 58 deals over $1M, 91% gross dollar retention, revenue growth >25% in financial
              services and >24% in healthcare, and the company exceeded the Rule of 40 for the third consecutive year.
              Forescout's ~1,200 employees and estimated $300-500M revenue make it larger than Armis at the time of
              acquisition, but its architecture (on-premises NAC, agent-based for some use cases) is less cloud-native
              than Armis. Forescout competes through existing enterprise NAC relationships, channel distribution, and
              asset visibility capabilities added via its eyeSight and eyeInspect products. Forescout was recognized as
              a Market Leader in CPS Security at the Global InfoSec Awards (2025/2026) and a Niche Player in the Gartner
              MQ.

              Microsoft Defender for IoT is the most significant platform consolidation threat. It is available to
              organizations with Microsoft 365 E5/Security and Azure Defender for Cloud licensing at minimal incremental
              cost — effectively free within the Microsoft enterprise agreement. The capability set is less
              comprehensive than Armis for heterogeneous OT environments (particularly non-Microsoft protocol stacks and
              proprietary industrial protocols), but for Microsoft-first enterprise IT environments, the bundling price
              pressure is severe. Microsoft has made the ServiceNow acquisition of Armis a partial mitigant — Armis can
              now be bundled into ServiceNow enterprise agreements and positioned as the OT/IoT layer complementary to
              Microsoft's IT-centric visibility.

              Tenable OT Security (formerly Indegy, acquired by Tenable in 2019) offers vulnerability-centric OT
              discovery and risk management, benefiting from Tenable's established IT vulnerability management customer
              base. Tenable is a public company (TENB, ~$5.3B market cap), giving it financial permanence but making it
              slower to innovate. Tenable OT competes more on vulnerability scoring and integration with Tenable.sc/
              Tenable.io than on real-time threat detection, making it a frequent co-deployment with Armis
              (vulnerability management + asset intelligence) rather than a pure displacement competitor. Palo Alto
              Networks (PANW) integrates IoT Security as a module of its XSIAM/SASE platform, competing through
              firewall-native enforcement and Prisma SD-WAN — a coverage advantage Armis lacks (Armis detects but cannot
              block inline).
