  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Armis operates in the Gartner-defined "CPS Protection Platforms" market category, formally established
              with a dedicated Magic Quadrant in 2025 (evaluating 13 vendors) and continuing through 2026. The 2026 MQ
              named four Leaders: Armis, Claroty, Dragos, and Nozomi Networks — the same four Leaders as 2025. This
              stability signals a maturing competitive landscape with entrenched leaders and diminishing likelihood of
              new entrant disruption at the top tier in the near term. The Challengers and Niche Players quadrants
              include Cisco, Fortinet, Tenable, and others primarily competing on adjacencies (NAC, firewalls,
              vulnerability management) rather than native CPS protection.

              The competitive landscape can be segmented into four tiers: (1) Direct peers — pure-play CPS/OT/IoT
              platforms that address the same buyer with overlapping capability sets; (2) Incumbents and adjacent
              vendors — established IT/network security vendors adding OT/IoT modules to existing enterprise
              relationships; (3) Platform consolidators — large-platform vendors (Microsoft, Palo Alto, Cisco) pursuing
              security consolidation that can displace point solutions through bundling; and (4) Status-quo and internal
              build — manual CMDB inventories, passive packet capture without analytics, or industrial-firewall-based
              visibility without a dedicated CPS platform. Armis faces meaningful competition across all four tiers,
              with the greatest near-term threat from platform consolidators via pricing leverage.
