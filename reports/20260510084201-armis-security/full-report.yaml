      - number: '7.4'
        title: Partner, Dependency, and Concentration Risks
        blocks:
          - type: paragraph
            body: >
              The ServiceNow acquisition has fundamentally restructured Armis's dependency landscape. Pre-acquisition,
              Armis depended on venture capital for growth capital; post-acquisition, it depends on ServiceNow for
              strategic direction, GTM resources, product roadmap prioritization, and integration investment.
              ServiceNow's enterprise software priorities may not perfectly align with Armis's cybersecurity product
              roadmap, and pricing, packaging, and go-to-market decisions will be influenced by ServiceNow's broader
              ITSM and platform strategy.

              AWS GovCloud dependency is the most critical infrastructure concentration risk. Armis's FedRAMP and DoD
              IL5 authorizations are scoped to AWS GovCloud; migrating to another cloud provider would require
              re-authorization taking 12-24 months, limiting negotiating leverage with AWS. Customer concentration risk
              is elevated: nine of the Fortune 10 use Armis, meaning adverse events affecting even a subset of these
              high-profile customers could generate disproportionate brand and revenue impact. The 200+ integration
              partner ecosystem creates dependency on API stability from Splunk, Microsoft, CrowdStrike, and Palo Alto.
              The Elisity technology partnership confirms production API integration usage but also illustrates that
              Armis API changes could break downstream partner products for shared customers.
            claimRefs:
              - CR023
              - CR024
              - CR025
              - CR026
              - CR027
              - CR028
          - type: table
            tableRef: TR003
