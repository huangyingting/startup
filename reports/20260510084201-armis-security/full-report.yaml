      - number: '6.5'
        title: Expansion Dynamics and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Armis operates a land-and-expand model in which customers typically begin with one product module — most
              commonly CAASM (Cyber Asset Attack Surface Management) or IoT Security — and subsequently add modules
              including OT Security, Healthcare Security (IoMT), Vulnerability Management and Detection Response (VMDR),
              and Early Warning (threat intelligence). Module expansion is the primary ARR growth driver within the
              existing installed base, complementing new logo acquisition. The ARR increase from $200M to $300M in 12
              months implies meaningful expansion revenue, though Armis has not segmented expansion vs. new logo ARR.

              Customer concentration risk is real but nuanced. Nine of the Fortune 10 being customers is a strong logo
              validation story but also a brand concentration risk — any public dissatisfaction or churn from this
              cohort would be disproportionately visible. No single customer appears to constitute a material revenue
              concentration given the breadth of the Fortune 100 customer base. Channel concentration risk has shifted
              with the ServiceNow acquisition: Armis is now a ServiceNow business unit, and future distribution will
              increasingly route through ServiceNow's enterprise sales force. This introduces risk that ServiceNow's own
              IT workflow customers may be steered toward native ServiceNow security capabilities rather than
              Armis-specific modules. New verticals — Application Security (2025) and Automotive — represent expansion
              bets that widen the addressable customer set.
