      - number: '2.2'
        title: Market Sizing — Multiple Analyst Lenses
        blocks:
          - type: paragraph
            body: >-
              The OT and CPS security market is well-covered by analyst firms, but estimates vary significantly by
              methodology and scope definition. MarketsAndMarkets sizes the OT security market at $23.47B in 2025,
              growing to $50.29B by 2030 at 16.5% CAGR. Mordor Intelligence offers a slightly lower estimate of $22.15B
              in 2025 growing to $47.95B by 2031 at 13.74% CAGR. Both project doubling or near-doubling of the market
              over a 5-6 year period, confirming strong structural growth across methodologies.

              For a more specific proxy, the CPS Security market — defined narrowly to exclude hardware-only and
              services-only OT vendors — was valued at $10.05B in 2025 with 13% CAGR to $18.51B in 2030 (The Business
              Research Company). This is the closest public analog to the Gartner-defined CPS Protection Platform market
              in which Armis competes.

              Adjacent segments provide additional market context. The CAASM market ($1.88B in 2025, 25% CAGR to $5.72B
              by 2030) is growing faster than the core OT security market, driven by enterprise demand for continuous
              asset intelligence and AI-driven risk prioritization. Medical device security ($7.41-8.47B in 2025) is a
              distinct and growing vertical, with the healthcare IoT security sub-segment growing at 28.8% CAGR. The
              broader IoT security market ($35.5B in 2024 at 26.8% CAGR to $141.8B by 2030) overstates the addressable
              opportunity for Armis but illustrates the scale of the device proliferation problem.

              Device proliferation is the underlying demand driver: there are approximately 19.8 billion connected IoT
              devices globally in 2025-2026 (DemandSage), with Ericsson projecting cellular IoT connections alone to
              reach 4.5B by end of 2025. This growing device footprint structurally increases the value of platforms
              that can discover and monitor them without agents.

              A bottom-up SAM estimate for Armis suggests $3-8B: applying $20-50 per asset per year (from the May 2025
              partner price list) to approximately 200 Fortune 500 enterprises with 10,000-50,000 managed assets each.
              This is a rough proxy; the actual SAM depends on Armis's expansion into healthcare, government, and
              mid-market channels that are still early stage. Armis's current $340M ARR represents approximately 4-11%
              of this SAM estimate, implying significant runway if the market share thesis holds.
