      - number: '5.4'
        title: Differentiation and Competitive Moat
        blocks:
          - type: paragraph
            body: >-
              Armis's primary competitive moat rests on four reinforcing pillars. First, the agentless passive
              architecture: Centrix requires no software installation, no active scanning, and no network disruption, a
              critical differentiator for OT and healthcare environments where device owners prohibit agent installation
              and active scanning can trigger safety shutdowns or equipment malfunctions. No major CPS protection
              platform claims 100 percent passive operation across IT, OT, IoT, and IoMT simultaneously; Claroty and
              Nozomi require SPAN and TAP infrastructure for OT but do not extend native passive coverage to enterprise
              IT without additional tooling. Second, the proprietary device knowledge base: with 7 billion or more
              behavioral fingerprints accumulated over nine years across enterprise, OT, healthcare, and government
              customer environments, Armis has the largest proprietary device intelligence asset in the CPS security
              market by its own claim. This data flywheel, where every new deployment adds fingerprints that improve
              classification accuracy for all customers, creates a compounding accuracy advantage over competitors
              building their libraries from scratch or from open-source sources. Third, OT, IT, and IoT convergence in a
              single platform: competitors either specialize (Dragos for OT threat intelligence; Claroty for OT protocol
              depth) or generalize without depth (Microsoft Defender for IoT in non-Azure environments). Centrix is the
              only platform addressing all three attack surface types in a single cloud-native instance. Fourth,
              ecosystem depth: 200-plus pre-built integrations, the ServiceNow native integration enabling workflow
              automation for 8,100-plus ServiceNow enterprise customers, and the AI-powered risk prioritization from
              Silk Security IP (claiming approximately 90 percent reduction in analyst triage time) collectively lower
              the operational overhead of running Centrix at enterprise scale. The Early Warning System, combining dark
              web intelligence monitoring, dynamic honeypot deception, and threat actor modeling, adds proactive threat
              hunting capability that most CPS platform competitors do not offer natively. Post-ServiceNow acquisition,
              Armis gains distribution leverage through the ServiceNow enterprise agreement and platform ecosystem.
