      - number: '1.3'
        title: Funding History, Valuation, and Investor Base
        blocks:
          - type: paragraph
            body: >
              Armis raised capital through a series of rounds totaling approximately $1.17 billion before its
              acquisition by ServiceNow. The first seed round was raised in 2015, followed by a $17M Series A in June
              2017, a $30M Series B in April 2018, and a $65M Series C in April 2019 that brought total funding to
              $112M. The Series C was led by Sequoia Capital, which had backed the company since its Series A in Israel.

              In February 2020, Insight Partners acquired Armis at a $1.1 billion valuation — Israel's largest cyber
              exit at that time — taking a majority stake and providing operational support including customer
              introductions, go-to-market assistance, and strategic M&A guidance. Insight Partners remained the majority
              owner through subsequent rounds. In February 2021, Armis raised $125M at a $2B valuation from Brookfield
              Technology Partners (as lead investor), CapitalG (Alphabet's growth fund), Georgian, and Insight Partners.
              In November 2021, it raised $300M at a $3.4B valuation led by One Equity Partners, which joined the board.

              After a period of operational maturation, Armis raised $200M at a $4.2B valuation in October 2024, led by
              General Catalyst and Alkeon Capital (new investors) alongside existing backers Brookfield Growth,
              Georgian, Insight Partners, CapitalG, and One Equity Partners. This was followed by an August 2025 tender
              offer at a $4.5B valuation and a final $435M pre-IPO round in November 2025 at a $6.1B valuation, led by
              Goldman Sachs Growth Equity with participation from CapitalG and new investor Evolution Equity Partners.
              The ServiceNow acquisition at $7.75B represented approximately a 27% premium over the last private
              valuation.
