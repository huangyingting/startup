  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Severity Ranking and Overview
        blocks:
          - type: paragraph
            body: >
              Armis Security enters the ServiceNow integration phase with a risk profile elevated relative to a
              standalone pre-IPO company. The three primary risk clusters — integration execution, regulatory
              compliance, and competitive OT displacement — are interlinked: integration delays erode engineering focus,
              which degrades product quality and creates conditions for regulatory non-compliance and customer churn.
              The $7.75B acquisition at approximately 23x trailing ARR creates a goodwill impairment risk if ARR growth
              decelerates materially.

              Severity ranking by expected residual impact: (1) Integration execution risk — highest severity given
              three acquisitions in 13 months (CTCI February 2024, Silk Security $150M April 2024, OTORIO $120M March
              2025) with documented OTORIO layoffs of 45 of approximately 80 employees within days of acquisition close,
              introducing OT Titan code-base fragmentation; (2) Regulatory and compliance risk — FedRAMP High
              authorization is in process and any delay blocks DoD expansion, while GDPR enforcement risk is non-trivial
              given EU-deployed telemetry sensors; (3) Competitive OT depth risk — Gartner Peer Insights received a
              3.0/5 review from a $30B+ manufacturer in December 2025 citing OT alert gaps, signaling Claroty and Dragos
              may displace Armis in industrial OT verticals; (4) ServiceNow dependency risk — Armis now operates as a
              business unit with ServiceNow controlling roadmap and capital allocation; (5) Financial model risk — no
              disclosed NRR, GRR, or burn rate creates diligence opacity. Investment implication: this is a high-growth
              platform with strong compliance moats, but risk-adjusted returns depend on integration execution fidelity,
              OT gap closure, and founder retention through the integration window.
