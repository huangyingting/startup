      - number: '3.4'
        title: Differentiation and Switching Costs
        blocks:
          - type: paragraph
            body: >-
              Armis's primary differentiators versus direct peers are: (1) Breadth — the largest proprietary device
              knowledge base covering 7B+ devices across IT, OT, IoT, and IoMT (including physical AI and cloud assets);
              (2) Architecture — agentless, cloud-native, passive monitoring with no SPAN/TAP required for IT assets
              (Wi-Fi and BLE radio-frequency monitoring); (3) Platform expansion — Centrix now includes CAASM, VMDR,
              healthcare IoMT security, and OT security in a single platform; and (4) ServiceNow integration — post-
              acquisition, Armis workflows can be embedded into ServiceNow ITSM/SOAR, creating distribution through
              ServiceNow's 8,000+ enterprise customers.

              Switching costs are high in this market. A full platform migration requires rebuilding the asset database
              (typically 3-6 months of passive learning in large environments), redeploying detection policies and alert
              thresholds, re-establishing integrations with SIEM/SOAR/ticketing systems, retraining SOC analysts, and
              re-baselining OT network behavior. These switching costs create meaningful net revenue retention advantage
              for the incumbent platform. PeerSpot and independent reviews note that both Armis and Claroty customers
              rate switching as a high-friction process, particularly in industrial environments where re-deployment
              requires change management and maintenance window coordination.

              Multi-homing is common at the enterprise level: organizations frequently deploy one vendor for OT/ICS
              environments (often Claroty or Dragos for depth) and a second for IT/IoT/enterprise (often Armis),
              creating co-existence rather than pure displacement. This multi-homing pattern is both a risk (slower
              full-platform adoption) and an opportunity (land with one use case, expand to others).
