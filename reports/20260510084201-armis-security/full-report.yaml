  - id: FM003
    title: Buyer / segment map
    type: matrix
    layout: wide
    summary: >-
      Buyer characteristics vary materially by vertical; enterprise IT and healthcare are Armis's proven segments, while
      government and industrial are high-growth but require longer procurement cycles.
    data:
      columns:
        - Budget Permanence
        - ROI Visibility
        - Regulatory Urgency
        - Sales Cycle Length
      rows:
        - label: Enterprise IT / Fortune 500
          values:
            - label: High
              tone: positive
              detail: Recurring security opex budgets; CISOs have established annual security tooling allocation.
            - label: High
              tone: positive
              detail: Immediate visibility into previously untracked devices; ROI narrative is clear and fast.
            - label: Medium
              tone: neutral
              detail: >-
                No single mandatory compliance driver but NIS2 (if EU operations) and cyber insurance requirements
                create urgency.
            - label: Medium
              tone: neutral
              detail: Typical enterprise security deal is 3-6 months; complex procurement in F500 can extend to 9-12 months.
        - label: Healthcare / Life Sciences
          values:
            - label: High
              tone: positive
              detail: >-
                Compliance-driven capex budget is Board-level mandated; healthcare has institutional security budget
                lines.
            - label: High
              tone: positive
              detail: FDA mandates make device visibility a compliance requirement, not an optional investment.
            - label: High
              tone: positive
              detail: >-
                FDA cybersecurity guidance and HIPAA create strong regulatory urgency; hospital CISO under legal
                exposure.
            - label: Medium
              tone: neutral
              detail: Healthcare procurement involves clinical IT, biomed, and legal review; 6-9 months typical.
        - label: Federal Government / DoD
          values:
            - label: High
              tone: positive
              detail: >-
                Congressional appropriations are stable and multi-year; FedRAMP-authorized vendors have procurement
                advantage.
            - label: Medium
              tone: neutral
              detail: ROI tied to compliance posture, not direct efficiency gain; harder to quantify for budget justification.
            - label: High
              tone: positive
              detail: >-
                CISA directives and FedRAMP/IL5 requirements create mandatory spend; Armis's IL5 authorization is a
                gate.
            - label: High
              tone: warning
              detail: Government procurement via RFP/tender; FedRAMP evaluation; 12-18+ months typical.
        - label: Industrial / Critical Infrastructure
          values:
            - label: Medium
              tone: neutral
              detail: OT security budget is often split between IT and operations; not always a single budget owner.
            - label: Medium
              tone: neutral
              detail: ROI narrative is operational continuity rather than direct cost savings; requires OT stakeholder buy-in.
            - label: High
              tone: positive
              detail: NIS2 (EU), NERC CIP (North America), and similar mandates create compliance-driven urgency.
            - label: High
              tone: warning
              detail: >-
                OT environments require extended POC and safety validation; 9-18 months typical; Armis must demonstrate
                no OT disruption.
        - label: Manufacturing (Mid-Market)
          values:
            - label: Medium
              tone: neutral
              detail: Smaller IT budgets; cybersecurity often competes with operational capex priorities.
            - label: Medium
              tone: neutral
              detail: Ransomware insurance requirements create some urgency but ROI may not justify Armis pricing tiers.
            - label: Medium
              tone: neutral
              detail: NIS2 applies to mid-market manufacturers with EU operations; domestic manufacturers have fewer mandates.
            - label: Medium
              tone: neutral
              detail: Mid-market sales through channel partners; 3-6 months via reseller; still an emerging channel for Armis.
