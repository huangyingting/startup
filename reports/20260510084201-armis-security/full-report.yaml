      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Armis is now a wholly-owned ServiceNow subsidiary post-April 2026 close; traditional exit readiness
              analysis applies to ServiceNow investors evaluating whether the acquisition created value. For strategic
              buyers or future carve-out scenarios, the key exit readiness signals are positive on platform maturity
              (FedRAMP Moderate and DoD IL5 achieved, SOC 2 Type II and ISO 27001 maintained, Gartner Leader in 2025 and
              2026) but incomplete on financial transparency (no NRR, GRR, GAAP metrics, or burn rate disclosed). The
              final diligence asks before confirming the thesis center on: (1) NRR and GRR disclosure in ServiceNow's
              next quarterly earnings call commentary on Armis, which would confirm whether land-and-expand efficiency
              matches the Fortune 10 density signal; (2) OTORIO Titan integration milestones and timeline from
              ServiceNow management, addressing the OT depth gap flagged in Gartner Peer Insights; (3) confirmation of
              CEO Yevgeny Dibrov and CTO Nadir Izrael retention packages and vesting lock-up schedules — founder
              departure within 18 months is a thesis-break trigger; (4) gross margin and GAAP operating margin
              disclosure to confirm path to profitability at scale; and (5) FedRAMP High authorization status update,
              which unlocks classified DoD and intelligence community contracts estimated at 2-3x the current federal
              TAM. Thesis-break triggers that warrant immediate re-evaluation: NRR below 110% upon first disclosure,
              more than two Fortune 100 customer losses within 12 months, OTORIO integration delay combined with a
              negative Gartner review update, FedRAMP High denied, or ServiceNow reporting a goodwill impairment charge
              related to the Armis acquisition.
            claimRefs:
              - CV023
