              tone: negative
              detail: >-
                Post-acquisition integration risk could delay roadmap 12+ months and drive enterprise customer attrition
                to Claroty or Nozomi.
            - label: GDPR/CCPA enforcement action
              tone: negative
              detail: >-
                Device telemetry collection in EU requires GDPR compliance; enforcement risk grows with EU customer
                expansion and NIS2 scrutiny.
        - label: High Impact
          values:
            - label: Key person departure (founders)
              tone: warning
              detail: >-
                CEO/CTO retention terms post-acquisition not disclosed; founder departure would signal cultural
                integration failure.
            - label: OT depth gap drives churn
              tone: warning
              detail: >-
                Gartner 3.0/5 review from $30B+ manufacturer; Claroty and Dragos could displace Armis in industrial OT
                verticals.
            - label: FedRAMP High delay
              tone: neutral
              detail: >-
                FedRAMP High in process; delay caps DoD classified-adjacent market expansion but does not affect
                existing Moderate/IL5 contracts.
        - label: Medium Impact
          values:
            - label: OTORIO integration shortfall
              tone: warning
              detail: >-
                45/80 OTORIO layoffs; air-gapped OT Titan integration in progress as of H1 2026 with thinned engineering
                bench.
            - label: Microsoft Defender IoT bundling
              tone: neutral
              detail: >-
                Microsoft bundling strategy could commoditize SME IoT security segment; limited enterprise impact given
                Armis Fortune 10 concentration.
            - label: Pricing compression in OT market
              tone: neutral
              detail: >-
                Claroty and Nozomi competitive pricing may compress Armis ASP in industrial verticals over the next
                12-24 months.
  - id: FR002
    title: Risk transmission map
    type: dag
    description: >
      Directed graph illustrating how integration execution risk and regulatory compliance failure transmit into
      customer attrition, ARR growth slowdown, and goodwill impairment risk for ServiceNow post-acquisition.
    claimRefs:
      - CR004
      - CR005
      - CR006
    data:
      nodes:
        - id: r1
          label: Integration Execution Risk
          detail: Three acquisitions in 13 months; OTORIO layoffs reduced OT engineering bench; Titan code-base fragmentation.
          tone: negative
        - id: r2
          label: Customer Attrition
          detail: ServiceNow integration uncertainty and OT depth gaps may drive enterprises to Claroty, Dragos, or Nozomi.
          tone: negative
        - id: r3
          label: ARR Growth Slowdown
          detail: If churn exceeds new bookings, ARR growth falls below 40-50% annual target implied by 23x acquisition price.
          tone: warning
        - id: r4
          label: Regulatory Compliance Failure
          detail: GDPR enforcement or FedRAMP High delay blocks EU and federal market expansion simultaneously.
          tone: warning
        - id: r5
          label: Goodwill Impairment Risk
          detail: >-
            ServiceNow paid 23x ARR; if ARR plateaus, a goodwill write-down on Armis acquisition appears on ServiceNow
            balance sheet.
          tone: negative
        - id: r6
          label: OT Competitive Loss
          detail: >-
            Persistent OT depth gap (Gartner critical review) if OTORIO integration is not completed on schedule in
            2026.
          tone: warning
      edges:
        - from: r1
          to: r2
        - from: r1
          to: r6
        - from: r2
          to: r3
        - from: r4
          to: r3
        - from: r6
          to: r2
        - from: r3
          to: r5
  - id: FR003
    title: Dependency map
    type: dag
    description: >
      Directed dependency graph for Armis post-ServiceNow acquisition illustrating infrastructure, regulatory, platform,
      and ecosystem dependencies and their interconnections.
    claimRefs:
      - CR007
      - CR008
      - CR009
    data:
      nodes:
        - id: d1
          label: AWS GovCloud
          detail: >-
            Primary cloud for FedRAMP and DoD IL5 workloads; no multi-cloud failover disclosed. Lock-in limits AWS
            negotiating leverage.
          tone: warning
        - id: d2
          label: ServiceNow Platform
          detail: >-
            Post-acquisition parent: controls GTM, roadmap funding, capital allocation, and ITSM integration strategy
            for Armis.
          tone: neutral
        - id: d3
          label: FedRAMP PMO (GSA)
          detail: >-
            Annual authorization renewal required; FedRAMP High in process — delay blocks classified federal contract
            expansion.
          tone: neutral
        - id: d4
          label: DISA / DoD IL5
          detail: IL5 customer contracts require DISA continuous monitoring compliance and annual recertification obligations.
          tone: neutral
        - id: d5
          label: Armis AI Device Engine
          detail: >-
            Proprietary device fingerprint database with 5B+ signatures; post-acquisition data governance is critical to
            preserving moat.
          tone: warning
        - id: d6
          label: 200+ Integration Partners
          detail: >-
            Splunk, Sentinel, Palo Alto, CrowdStrike APIs; API changes at any major partner could disrupt customer
            security workflows.
          tone: neutral
      edges:
        - from: d1
          to: d3
        - from: d2
          to: d5
        - from: d3
          to: d4
        - from: d2
          to: d6
        - from: d5
          to: d6
  - id: FV001
    slug: recommendation-logic
    title: Recommendation logic
    type: flow
    layout: standard
    data:
      nodes:
        - id: n1
          label: Market Opportunity
          detail: >-
            CPS/OT/IoT security market >$25B by 2028; Armis holds Gartner MQ Leader position 2025 and 2026; IDC confirms
            20%+ CAGR.
          tone: positive
        - id: n2
          label: Product Leadership
          detail: >-
            Agentless architecture + AI Asset Intelligence Engine; 7B+ device database; only platform covering
            IT+OT+IoT+IoMT in single console.
          tone: positive
        - id: n3
          label: Customer Traction
          detail: 35+ Fortune 100, 9 of Fortune 10; NPS 70; $300M ARR August 2025; DoD IL5 achieved February 2026.
          tone: positive
        - id: n4
          label: Acquisition at $7.75B (~23x ARR)
          detail: >-
            ServiceNow acquired Armis December 2025 announcement, April 2026 close; 27% premium over $6.1B Series E;
            all-cash.
          tone: neutral
        - id: n5
          label: Integration and Execution Risk
          detail: >-
            Three acquisitions in 13 months; OTORIO layoffs of 45/80 engineers; OT depth gap cited in Gartner Peer
            Insights 3.0/5 review.
          tone: warning
        - id: n6
          label: 'Recommendation: Acquired — Fair Value'
          detail: >-
            At ~23x ARR with >50% growth, acquisition price is defensible. Thesis holds if ServiceNow integration
            preserves ARR growth and expands via ITSM synergy to $500M+ ARR by 2027.
          tone: positive
      edges:
        - from: n1
          to: n4
        - from: n2
          to: n4
        - from: n3
          to: n4
        - from: n5
          to: n4
        - from: n4
          to: n6
  - id: FV002
    slug: valuation-sensitivity
    title: Valuation sensitivity
    type: bar
    layout: standard
    data:
      items:
        - id: b1
          value: 5.1
          label: 15x ARR — Stress Case
          detail: >-
            At 15x ARR on $340M ARR, implied value = $5.1B. Applicable if growth decelerates to <25% YoY or integration
            disrupts ARR momentum.
          tone: warning
        - id: b2
          value: 6.8
          label: 20x ARR — Base-Low
          detail: >-
            At 20x ARR on $340M ARR, implied value = $6.8B. Market precedent for high-growth SaaS at $300M+ ARR with
            40-50% growth.
          tone: neutral
        - id: b3
          value: 7.75
          label: 23x ARR — Actual Acquisition
          detail: >-
            ServiceNow paid $7.75B = ~23x ARR. Premium reflects platform leadership, Fortune 10 density, and CPS/OT TAM
            growth trajectory.
          tone: positive
        - id: b4
          value: 10.2
          label: 30x ARR — Bull Case
          detail: >-
            At 30x ARR on $340M, value = $10.2B. Requires revenue acceleration post-ServiceNow integration and new
            OT/federal vertical penetration.
          tone: positive
  - id: FV003
    slug: valuation-return-range
    title: Valuation / return range
    type: range
    layout: standard
    data:
      items:
        - label: ARR at Acquisition (Dec 2025 est.)
          low: 320
          mid: 340
          high: 360
          displayValue: ~$340M
          detail: >-
            Company-reported $300M ARR August 2025; estimated $340M+ at December 2025 announcement based on 50%+ YoY
            growth trajectory.
          tone: neutral
        - label: Implied ARR Multiple (x)
          low: 20
          mid: 22.8
          high: 25
          displayValue: ~22.8x
          detail: >-
            ServiceNow paid $7.75B. At $340M ARR, implied multiple is 22.8x; range reflects ARR estimate uncertainty of
            $320M-$360M.
          tone: positive
        - label: Bear Case Value ($B)
          low: 4.5
          mid: 5.1
          high: 5.8
          displayValue: $5.1B
          detail: >-
            Bear: integration fails, ARR plateaus at $300-340M, multiple compresses to 15-17x; goodwill impairment risk
            for ServiceNow.
          tone: negative
        - label: Base Case Value ($B)
          low: 6.5
          mid: 7.75
          high: 8.5
          displayValue: $7.75B
          detail: >-
            Base: acquisition price; ARR grows to $500M by 2027 with ServiceNow ITSM synergy; 15-17x forward ARR
            multiple.
          tone: neutral
        - label: Bull Case Value ($B)
          low: 9
          mid: 10.5
          high: 12
          displayValue: $10.5B
          detail: >-
            Bull: Armis reaches $700M ARR by 2027; platform becomes ServiceNow security anchor via enterprise
            distribution; 15x forward ARR.
          tone: positive
  - id: FV004
    slug: investment-kpis
    title: Investment KPIs
    type: kpi
    layout: standard
    data:
      items:
        - id: k1
          label: 'Market Score: 9/10'
          detail: >-
            CPS/OT/IoT security is a decade-long secular growth market exceeding $25B by 2028; Armis is the recognized
            multi-category platform leader.
          tone: positive
        - id: k2
          label: 'Product Score: 8/10'
          detail: >-
            Agentless architecture and AI Asset Intelligence Engine are structurally differentiated; OT depth gap vs.
            Claroty/Dragos is a real risk requiring OTORIO integration closure.
          tone: positive
        - id: k3
          label: 'Customer Score: 8/10'
          detail: >-
            Fortune 10 density (9/10) and NPS 70 are exceptional enterprise signals; NRR undisclosed is a meaningful gap
            that prevents full confidence.
          tone: positive
        - id: k4
          label: 'Financial Score: 7/10'
          detail: >-
            >50% ARR growth trajectory is excellent; burn rate, GAAP profitability, and gross margin are undisclosed —
            these gaps reduce the financial confidence score.
          tone: neutral
        - id: k5
          label: 'Risk Score: 5/10'
          detail: >-
            Integration risk from three acquisitions in 13 months, OTORIO layoffs, OT depth gap criticism, and founder
            retention uncertainty are collectively material downside risks.
          tone: warning
        - id: k6
          label: 'Valuation Score: 7/10'
          detail: >-
            22.8x ARR is rich but justified by growth rate and platform leadership; conservative vs. private OT peers
            (Claroty ~35x, Nozomi ~30x); fair for Gartner MQ Leader with Fortune 10 penetration.
          tone: neutral
