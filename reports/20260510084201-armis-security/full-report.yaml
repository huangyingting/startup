      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Armis faces multi-jurisdictional regulatory exposure across U.S. federal, EU, and sector-specific
              frameworks. In the United States, FedRAMP Moderate authorization is maintained and DoD Impact Level 5
              (IL5) was achieved in February 2026 through Armis Federal LLC. FedRAMP High — required for the most
              sensitive DoD and intelligence community contracts — remains in process. Denial or prolonged delay would
              cap the federal addressable market and could trigger attrition from DoD agencies requiring High
              authorization. DISA requires ongoing continuous monitoring compliance, creating annual recertification
              obligations.

              In the EU, Armis must comply with GDPR for device telemetry data collected by agentless sensors deployed
              within EU customer networks. Article 28 Data Processing Agreements (DPAs) are required with all EU
              customers. The EU NIS2 Directive (in force October 2024) creates compliance obligations for Armis's EU
              customers in critical infrastructure sectors (energy, healthcare, transport) and obligates Armis as a
              vendor to document its security practices. CISA ICS advisories and NIST NVD CVE disclosures create ongoing
              vulnerability disclosure obligations for Armis as an OT security vendor. A NIST NVD search shows no
              critical platform CVEs in Armis as of May 2026, but OTORIO integration code introduces new potential
              exposure. From a legal standpoint, Armis's Privacy Policy and Legal Compliance pages confirm GDPR, CCPA,
              SOC 2 Type II, and ISO 27001 postures. The ServiceNow S-4/A registration statement provides the most
              complete public disclosure of representations and warranties related to data processing, IP
              indemnification, and litigation exposure assumed during the acquisition.
