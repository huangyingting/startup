              - CR027
      - number: '7.5'
        title: Financial Model Risks and Mitigations
        blocks:
          - type: paragraph
            body: >
              ServiceNow paid $7.75B for Armis, implying approximately 23x trailing ARR based on $340M ARR as of
              December 2025. This creates goodwill impairment risk: if ARR growth decelerates or integration synergies
              fail to materialize, ServiceNow will face pressure to write down a portion of the acquisition premium.
              Total capital raised exceeded $1.17B (seed through Series E at $435M), meaning existing investor return
              expectations were priced into the acquisition. No publicly disclosed burn rate, EBITDA margin, or GAAP net
              income exists for Armis.

              Customer churn risk is unquantifiable without NRR or GRR. The absence of these metrics is an adverse
              signal; well-performing SaaS companies typically disclose NRR to validate land-and-expand efficiency.
              Stock-based compensation burden on GAAP profitability post-acquisition is unknown as ServiceNow has not
              separately disclosed Armis segment financials. Key mitigations: $300M+ ARR at 50%+ YoY growth provides
              revenue durability; FedRAMP and IL5 certifications create switching-cost moats in the federal segment;
              Gartner Leader status in 2025 and 2026 MQ creates a referenceable market position; ServiceNow's $28B+
              annual revenue provides a deep-pocketed parent to fund extended platform investment. Thesis-break
              triggers: (1) NRR below 110% upon post-acquisition financial disclosure; (2) OTORIO Titan integration
              delayed past Q3 2026 with persistent OT depth gap reviews; (3) FedRAMP High denied or delayed beyond 18
              months; (4) CEO Yevgeny Dibrov or CTO Nadir Izrael departure within 12-18 months of acquisition close; (5)
              ServiceNow reports Armis-related goodwill impairment charge. Monitoring indicators include ServiceNow
              quarterly earnings commentary on Armis ARR, the FedRAMP authorization registry for High status, Gartner
              Peer Insights score trajectory, and LinkedIn headcount velocity for the Armis engineering team.
            claimRefs:
