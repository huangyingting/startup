      - number: '5.3'
        title: Deployment, Integration, and Roadmap
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix supports three deployment modes: full cloud-native SaaS on AWS (US-East, US-West, EU-West);
              hybrid, where sensors are on-premises and analytics is cloud-based; and air-gapped on-premises via OTORIO
              Titan for classified or isolated OT environments. Federal deployments run on AWS GovCloud through Armis
              Federal LLC, the dedicated federal subsidiary established to hold FedRAMP and DoD authorizations
              separately from commercial operations. FedRAMP Moderate and DISA IL4 were achieved in 2023; DoD IL5 was
              authorized on February 23, 2026, enabling classified workloads up to SECRET level. FedRAMP High
              authorization is in process as of H1 2026 with a company-committed target of H2 2026. Deployment
              complexity varies by environment: cloud SaaS deployments can be operational within days for IT-only use
              cases; OT and healthcare deployments typically require 4 to 12 weeks for sensor placement, protocol
              tuning, and policy configuration, often supported by Armis-certified integrators including Accenture,
              Deloitte, and KPMG. The Armis Select Partner Program, launched in January 2026, replaced tiered partner
              tiers with outcome-based incentives, reducing MSSP and regional integrator onboarding friction.
              Integration maturity is a key differentiator: 200-plus pre-built connectors and native ServiceNow
              integration reduce the implementation burden for enterprise customers already invested in ITSM and SIEM
              ecosystems. The roadmap as of H1 2026 includes: FedRAMP High completion targeted H2 2026; Centrix for
              Application Security general availability with SDLC integration launched in 2025 and in early adoption;
              OTORIO Titan on-premises integration with Centrix cloud analytics currently in progress and partially
              complete; and deeper ServiceNow ITSM, SAM, and HAM workflow embedding following the April 2026 acquisition
              close. The three acquisitions of CTCI in February 2024, Silk Security in April 2024, and OTORIO in March
              2025 each added roadmap surface area and integration workstreams that compete for engineering bandwidth
              with the core platform release cadence.
