        title: Retention, Satisfaction, and Durability
        blocks:
          - type: paragraph
            body: >
              Armis does not publicly disclose Net Revenue Retention (NRR) or Gross Revenue Retention (GRR), which are
              standard private-company opaque metrics. Indirect indicators are strongly positive: a company-reported Net
              Promoter Score (NPS) of 70 is classified as "excellent" by NPS benchmarking standards (>50 threshold). G2
              shows a 4.5-star rating from 12 reviews as of late 2025. TrustRadius reviewers generally recommend Armis
              strongly. Armis notes bi-weekly onboarding calls as part of its customer success motion, suggesting active
              post-sales engagement.

              Adverse retention signals exist but are isolated. A Gartner Peer Insights review posted in December 2025
              from a reviewer at a $30B+ manufacturing company rated Armis 3.0/5, citing limitations in OT-specific
              alert customization and noting that "OT-specific options remain behind" competitor offerings. PeerSpot
              reviewers flagged occasional platform instability with the phrase "not completely stable, sometimes
              incidents may occur." Contract duration for enterprise SaaS is typically 1-3 years, which provides
