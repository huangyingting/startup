      - number: '2.3'
        title: Buyer and Segment Profiles
        blocks:
          - type: paragraph
            body: >-
              The primary buyer for Armis Centrix is the enterprise Chief Information Security Officer (CISO), who
              controls the IT security budget and bears responsibility for device risk across all connected assets. In
              enterprise IT (Fortune 500+), the CISO typically procures through an annual security tooling budget, with
              ROI justified through device visibility uplift and reduced exposure from previously unmanaged assets. This
              segment is Armis's strongest, with Fortune 100 penetration exceeding 35% at acquisition close.

              In healthcare, the buying authority is more distributed, shared among the CISO, the Chief Medical
              Information Officer (CMIO), and Biomedical Engineering. The primary adoption trigger is regulatory — FDA
              cybersecurity guidance and HIPAA breach notification obligations create compliance-driven urgency.
              Ransomware attacks on hospital systems (e.g., Ascension Health, Change Healthcare) have elevated the
              healthcare CISO to board-level visibility, driving security investment. Armis has established healthcare
              momentum and named customer references in this vertical.

              Federal government and DoD procurement follows a distinct pathway requiring FedRAMP authorization (Armis
              holds FedRAMP Moderate, IL4, and IL5) and often a formal RFP/tender process. Armis Federal operates as a
              separate business unit with dedicated DoD and civilian agency sales. Budget is sourced from congressional
              appropriations with multi-year commitments, but procurement cycles are typically 12-18+ months, the
              longest in Armis's portfolio.

              Industrial and critical infrastructure customers present the most complex buyer dynamic: procurement
              authority is split between the corporate CISO and OT/plant managers who prioritize operational continuity.
              OT managers have historically resisted security tools that could disrupt production, making Armis's
              agentless, passive-only approach a critical requirement. NIS2 compliance urgency in EU-regulated
              manufacturers has accelerated adoption in EMEA. The Armis OTORIO acquisition materially deepens OT/ICS
              product credibility and customer relationships.
