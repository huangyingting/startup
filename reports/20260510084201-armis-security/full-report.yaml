    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Corporate History
        blocks:
          - type: paragraph
            body: >
              Armis Inc. (operating as "Armis" or "Armis Security") is a California-headquartered cybersecurity company
              specializing in cyber exposure management and security for all connected assets — including IT, OT, IoT,
              medical devices (IoMT), physical AI, code, and cloud environments. The company was founded in late 2015 by
              Yevgeny Dibrov and Nadir Izrael, both graduates of the Technion — Israel Institute of Technology who had
              collaborated on academic projects before entering the workforce. The founding idea originated from
              extensive customer discovery: rather than building technology first, the founders cold-called CISOs and IT
              managers from Nadir Izrael's apartment in Tel Aviv to identify the biggest pain points, ultimately landing
              on the security gap created by unmanaged IoT devices.

              Armis moved its headquarters from Tel Aviv to Palo Alto, California in 2017 when it emerged from stealth,
              and has since established offices in New York, London, Munich, and Bucharest. By 2026, the company was
              headquartered in San Francisco, California. Armis operated as a privately held company through its entire
              independent lifecycle, except for a brief period as a majority-owned subsidiary of Insight Partners from
              February 2020 onward.

              The company's core product, the Armis Centrix™ platform, is an AI-powered, agentless cyber exposure
              management system that discovers, classifies, and secures every connected device in an organization's
              environment — from laptops and servers to industrial control systems, medical devices, and cloud workloads
              — without requiring software agents on endpoints. As of early 2026, the platform tracked nearly 7 billion
              devices in real time. On April 19-20, 2026, ServiceNow completed its $7.75 billion cash acquisition of
              Armis, integrating it into ServiceNow's AI Control Tower security and risk portfolio.
