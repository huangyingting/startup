      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Agentless Passive Architecture Is a Structural Moat in OT and Healthcare Environments
            body: >-
              Armis's 100 percent passive, agentless monitoring approach is a structural requirement for OT and
              healthcare environments where active scanning can trigger safety shutdowns, void equipment warranties, or
              violate biomedical equipment maintenance agreements. No major Gartner MQ Leader offers full passive
              coverage across IT, OT, IoT, and IoMT in a single cloud-native platform. This architecture means Armis can
              be deployed in live production OT environments without change management approval for active scanning,
              dramatically reducing the procurement and deployment friction that competing solutions face. The
              passive-only guarantee is also a patient-safety trust signal for healthcare CISOs evaluating clinical
              network security tools.
            calloutType: insight
            claimRefs:
              - CE003
              - CE025
          - type: callout
            title: Three Acquisitions in 13 Months Create Compounding Integration Execution Risk
            body: >-
              CTCI in February 2024, Silk Security in April 2024, and OTORIO in March 2025 each brought new technology,
              engineering teams, and customer commitments to integrate within 13 months. The OTORIO acquisition is the
              highest-risk integration: Armis eliminated 45 of 80 OTORIO employees (56 percent) post-close, the Titan
              on-premises platform integration with Centrix cloud analytics remains in progress as of H1 2026, and the
              Secure Remote Access SKU derived from OTORIO is listed as in integration status. Simultaneous integration
              of three acquisitions while sustaining core platform releases is a material execution risk that could
              delay roadmap commitments, particularly FedRAMP High and OTORIO Titan cloud integration milestones.
            calloutType: insight
            claimRefs:
              - CE032
              - CE033
              - CE034
          - type: callout
            title: DoD IL5 Authorization Unlocks the Highest-Value Federal Contract Category
            body: >-
              The February 2026 DoD IL5 authorization granted to Armis Federal LLC is one of the most significant
              compliance milestones in the company's history. IL5 permits processing of Controlled Unclassified
              Information at the highest sensitivity level and National Security Systems data, covering the majority of
              DoD program-of-record contracts previously inaccessible to Armis. With FedRAMP Moderate for civilian
              agencies and IL5 for defense both achieved, Armis can now compete across the entire US federal
              cybersecurity market. Federal is the highest-ACV vertical for CPS security platforms, with deal sizes
              typically 3 to 5 times commercial equivalents, and federal momentum now represents a major growth vector
              post-ServiceNow acquisition.
            calloutType: insight
            claimRefs:
              - CE021
              - CE019
              - CE018
          - type: callout
            title: Application Security SKU Expansion Raises Platform Focus Questions
            body: >-
              The 2025 launch of Centrix for Application Security is Armis's first major move outside its traditional
              network, OT, IoT, and IoMT security domain into the SDLC and AppSec market. This market has deeply
              entrenched incumbent tools (Snyk, Veracode, Checkmarx, GitHub Advanced Security) and different buyer
              personas (AppSec engineers versus CISO and IT security teams). Investors and customers should assess
              whether Armis has the engineering depth and GTM expertise to compete in AppSec, or whether this expansion
              dilutes focus from the OT/IoT/IoMT differentiation that drove Armis's 22x ARR acquisition premium from
              ServiceNow and could complicate platform positioning in the post-acquisition integration period.
            calloutType: insight
            claimRefs:
