        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >
              Armis generates revenue almost entirely through SaaS subscriptions on the Centrix platform. The core
              licensing model is asset-count-tiered: enterprises pay per block of managed devices ($26,000–$50,000 per
              block across 500–9,999 assets) or per network port ($3,100–$3,500) for agentless network discovery
              deployments. Add-on modules — Armis AI risk scoring, threat intelligence feeds, and CAASM capabilities —
              are sold as incremental subscriptions layered on the base platform. Professional services (implementation,
              integration, and custom configuration) are estimated to account for less than 10% of revenue, consistent
              with Armis's partner-led deployment model. The MSSP and channel segment is growing, driven by the January
              2026 Armis Select Partner Program. Revenue recognition follows ratable SaaS treatment for annual and
              multi-year contracts; deferred revenue and professional services delivery timing create a likely gap
              between ARR and recognized GAAP revenue, though no specific ARR-to-revenue reconciliation has been
              published.
