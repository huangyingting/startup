  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix addresses the core enterprise security problem of asset visibility: organizations cannot
              protect devices they cannot see, and traditional endpoint agents miss OT controllers, medical equipment,
              smart building systems, and unmanaged IoT, leaving 30 to 60 percent of enterprise attack surfaces
              invisible to security teams. Armis solves this by passively monitoring all network traffic using SPAN and
              mirror ports, fingerprinting every communicating device without installing software or disrupting
              operations. The customer workflow begins with deployment of Armis sensors (physical or virtual appliances)
              at network aggregation points. Within hours, Centrix discovers and classifies every asset in scope,
              building a live CMDB-enriched inventory. Security teams then consume alerts, risk scores, and remediation
              workflows through the Centrix console or integrated SIEM, SOAR, and ITSM tools, prioritizing response by
              business impact rather than raw signal volume. For OT environments including manufacturing, utilities, oil
              and gas, and critical infrastructure, Centrix decodes 500-plus industrial protocols including Modbus,
              DNP3, BACnet, Siemens S7, OPC-UA, and PROFINET, enabling behavioral baselining of PLCs, SCADA systems, and
              industrial controllers without disrupting production cycles. In healthcare, the IoMT module adds FDA and
              HIPAA-mapped clinical impact scoring so biomedical engineers and security teams can triage infusion pumps,
              imaging systems, and ventilators by patient risk rather than raw CVSS scores. The unifying customer
              promise is continuous, comprehensive asset intelligence without operational disruption or deployment
              friction, making Centrix the authoritative source of truth for every connected device in the enterprise
              environment. This positions Armis in the Gartner-defined CPS Protection Platforms market as the broadest
              single-platform option spanning IT, OT, IoT, and IoMT simultaneously in one cloud instance.
