      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              Claroty (New York, founded 2015) is Armis's closest peer: both are Gartner Leaders, both are
              agentless/passive, and both address OT, IoT, and IoMT. Claroty raised $900M+ through a January 2026 $100M
              strategic financing, valuing the company at $3B+, and is reported to be preparing for an IPO at $3.5-4B.
              Claroty's estimated ARR reached $200M+ in early 2026 with 800+ employees and 20% of the Fortune 100 as
              customers. Claroty's primary differentiation is deeper OT protocol decoding — covering Siemens S7,
              Rockwell CIP, Schneider Modbus/TCP at the ladder-logic level — and a lower perceived TCO for OT-centric
              buyers. Where Armis leads on breadth (all environments), Claroty leads on depth (pure OT/ICS
              environments).

              Nozomi Networks (San Francisco, founded 2013) was acquired by Mitsubishi Electric in September 2025 for an
              implied valuation of ~$800M, ending its independent trajectory. Prior to acquisition, Nozomi had $75M in
              revenue (~$266M raised) with ~390 employees, particularly strong in energy, oil/gas, and utilities. Post-
              acquisition, Nozomi is embedded in Mitsubishi's OT ecosystem and may gain distribution through
              Mitsubishi's industrial customer base, but its strategic independence and development velocity are
              uncertain. The acquisition reduces the independent competitive threat while potentially increasing
              Nozomi's reach in industrial verticals through OEM/channel.

              Dragos (Washington DC, founded 2016) is the clear OT threat intelligence leader: $154M revenue (2024),
              $439M total funding at a $1.7B valuation, 566-609 employees, and a 2026 Gartner MQ Leader distinction.
              Dragos differentiates on threat intelligence (OT-specific playbooks, sector-specific threat groups like
              CHERNOVITE and VOLTZITE), incident response services, and deep expertise in electric, oil/gas,
              manufacturing, and water sectors. Dragos was critiqued in the 2026 Gartner report for limited reach
              outside North America and channel-partner coverage gaps — the company is actively addressing this with a
              pure-channel GTM strategy. Dragos acquired Network Perception in 2024 to add network security policy
              management capabilities.
