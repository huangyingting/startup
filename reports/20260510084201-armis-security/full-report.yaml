      - number: '5.5'
        title: Trust, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >-
              Armis holds a comprehensive compliance portfolio spanning commercial, federal, and international
              standards. On the federal side, FedRAMP Moderate from 2023 and DISA IL4 from 2023 cover US federal
              civilian and DoD non-classified workloads; the DoD IL5 authorization issued by DISA on February 23, 2026
              permits processing of Controlled Unclassified Information and National Security Systems data, a
              requirement for most DoD and intelligence community deployments; and FedRAMP High is in process with an H2
              2026 target. For commercial and international compliance, Armis holds SOC 2 Type II covering security,
              availability, and confidentiality trust service criteria; ISO 27001 for information security management;
              and ISO 27018 for cloud personal data protection. The UK Government G-Cloud-14 listing enables UK public
              sector procurement of Armis Centrix without a separate tender process. The platform's passive-only
              architecture provides a structural privacy and safety advantage: because Centrix captures only metadata
              and never injects traffic, it cannot disrupt OT device operation, exfiltrate packet payloads, or cause
              network storms, a trust guarantee that active-scanning alternatives cannot match. Data in transit is
              encrypted using TLS 1.3 and data at rest uses AES-256 encryption. Role-based access controls, SSO and SAML
              integration, and audit logging are standard platform features. For healthcare deployments, the IoMT module
              maps findings to HIPAA Security Rule controls and FDA cybersecurity guidance for medical devices published
              in the 2023 final rule. Armis provides 24/7 enterprise support, a public status page, and defined SLAs for
              critical vulnerability intelligence delivery. The Early Warning System provides advance intelligence on
              novel threat actor campaigns targeting asset classes present in customer environments, enabling proactive
              patching and network segmentation before exploitation events occur.
