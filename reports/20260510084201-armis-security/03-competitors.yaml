            CPS security market as of 2026
        - label: Customer switching cost (self-assessed)
          value: High — 3-6 months rebuild
          tone: positive
          detail: >-
            Full platform migration requires asset database rebuild, policy redeploy, SIEM/SOAR re-integration, and SOC
            retraining; estimated 3-6 months in large environments
        - label: ServiceNow distribution lever
          value: 8,100+ ServiceNow enterprise customers
          tone: positive
          detail: >-
