        costs are high; multi-homing (Armis + Claroty/Dragos co-deployed) is more common than outright displacement.
        Specific win/loss rates are not publicly disclosed.
      targets:
        - contentRequirements/4
      sourceRefs:
        - SP014
        - SP013
