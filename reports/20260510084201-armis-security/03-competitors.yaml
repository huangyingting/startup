    - id: QP019
      type: mechanism
      status: answered
      question: What creates switching costs for customers using Armis, and how durable is the incumbent advantage?
      answer: >-
        Switching costs are created by: (1) asset database rebuild (3-6 months of passive learning for large
        environments); (2) detection policy and alert threshold redeploy; (3) SIEM/SOAR/ticketing integration rework;
        (4) SOC analyst retraining; (5) OT network change management for redeployment. High switching costs support
        strong NRR for incumbent platforms. Durability is 3-5+ years per customer.
      targets:
        - contentRequirements/3
        - plannedTables/moat-durability-competitive-risk-register
      sourceRefs:
        - SP014
        - SP013
    - id: QP020
      type: mechanism
      status: answered
      question: >-
        What is the mechanism by which Armis's device knowledge base creates a competitive moat, and what are the limits
        of this moat?
      answer: >-
        The 7B-device knowledge base provides superior fingerprinting accuracy (passive RF/network identification
        without active scanning) and behavioral baselines that improve with scale — a network effect within each
        customer's deployment. Moat limits: competitors are expanding protocol libraries (Claroty at 450+); Microsoft
        has AI at larger scale; data moat narrows as all vendors accumulate deployments. 3-5 year defensibility window.
      targets:
        - contentRequirements/3
      sourceRefs:
        - SP001
        - SP005
        - SP023
