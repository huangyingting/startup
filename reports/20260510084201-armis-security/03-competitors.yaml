        - SP021
        - SP025
    - id: QP004
      type: enumeration
      status: answered
      question: >-
        What substitutes and status-quo alternatives do enterprise buyers use instead of dedicated CPS protection
        platforms?
      answer: >-
        Status-quo alternatives include manual CMDB inventory (asset spreadsheets), industrial firewall-based passive
        monitoring (Cisco ISE NAC, Palo Alto NGFWs), IT endpoint management tools extended to IoT (Microsoft Intune),
        and passive packet capture without analytics (tcpdump/Wireshark). Internal build is rare due to protocol
        complexity.
      targets:
        - contentRequirements/0
      sourceRefs:
        - SP015
        - SP019
