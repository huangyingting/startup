company:
  name: Armis Security
chapter:
  number: 3
  title: Competitors
  summary: >-
    Armis competes in the Gartner-defined CPS Protection Platforms market, where four vendors share Leader status in the
    2026 Magic Quadrant: Armis, Claroty, Dragos, and Nozomi Networks. All four are agentless/passive monitoring
    platforms for OT/IoT/IT asset discovery and protection; Armis differentiates through breadth (IT+OT+IoT+IoMT
    unified), the largest proprietary device knowledge base (7B+ devices tracked), and its new ServiceNow integration
    providing ITSM/workflow bundling. Claroty leads on OT protocol depth and TCO for pure-OT buyers; Dragos leads on OT
    threat intelligence; Nozomi (acquired by Mitsubishi, Sept 2025) is strong in energy/utilities but now a subsidiary.
    Forescout (~$300-500M revenue, PE-owned) serves as a hybrid NAC/visibility incumbent. Microsoft Defender for IoT is
    the primary platform consolidation threat via free bundling for M365 E5/Azure enterprise customers. Switching costs
    are high due to asset database rebuilding, policy redeployment, and integration rework, but multi-homing is common
    for OT-only vs IT-IoT coverage gaps.
sections:
  - id: competitive-landscape
    title: Competitive Landscape Overview
    body: >-
      Armis operates in the Gartner-defined "CPS Protection Platforms" market category, formally established with a
      dedicated Magic Quadrant in 2025 (evaluating 13 vendors) and continuing through 2026. The 2026 MQ named four
      Leaders: Armis, Claroty, Dragos, and Nozomi Networks — the same four Leaders as 2025. This stability signals a
      maturing competitive landscape with entrenched leaders and diminishing likelihood of new entrant disruption at the
      top tier in the near term. The Challengers and Niche Players quadrants include Cisco, Fortinet, Tenable, and
      others primarily competing on adjacencies (NAC, firewalls, vulnerability management) rather than native CPS
      protection.

      The competitive landscape can be segmented into four tiers: (1) Direct peers — pure-play CPS/OT/IoT platforms that
      address the same buyer with overlapping capability sets; (2) Incumbents and adjacent vendors — established
      IT/network security vendors adding OT/IoT modules to existing enterprise relationships; (3) Platform consolidators
      — large-platform vendors (Microsoft, Palo Alto, Cisco) pursuing security consolidation that can displace point
      solutions through bundling; and (4) Status-quo and internal build — manual CMDB inventories, passive packet
      capture without analytics, or industrial-firewall-based visibility without a dedicated CPS platform. Armis faces
      meaningful competition across all four tiers, with the greatest near-term threat from platform consolidators via
      pricing leverage.
    tableRefs:
      - TP001
    figureRefs:
      - FP001
  - id: direct-competitor-profiles
    title: Direct Competitor Profiles
    body: >-
      Claroty (New York, founded 2015) is Armis's closest peer: both are Gartner Leaders, both are agentless/passive,
      and both address OT, IoT, and IoMT. Claroty raised $900M+ through a January 2026 $100M strategic financing,
      valuing the company at $3B+, and is reported to be preparing for an IPO at $3.5-4B. Claroty's estimated ARR
      reached $200M+ in early 2026 with 800+ employees and 20% of the Fortune 100 as customers. Claroty's primary
      differentiation is deeper OT protocol decoding — covering Siemens S7, Rockwell CIP, Schneider Modbus/TCP at the
      ladder-logic level — and a lower perceived TCO for OT-centric buyers. Where Armis leads on breadth (all
      environments), Claroty leads on depth (pure OT/ICS environments).

      Nozomi Networks (San Francisco, founded 2013) was acquired by Mitsubishi Electric in September 2025 for an implied
      valuation of ~$800M, ending its independent trajectory. Prior to acquisition, Nozomi had $75M in revenue (~$266M
      raised) with ~390 employees, particularly strong in energy, oil/gas, and utilities. Post- acquisition, Nozomi is
      embedded in Mitsubishi's OT ecosystem and may gain distribution through Mitsubishi's industrial customer base, but
      its strategic independence and development velocity are uncertain. The acquisition reduces the independent
      competitive threat while potentially increasing Nozomi's reach in industrial verticals through OEM/channel.

      Dragos (Washington DC, founded 2016) is the clear OT threat intelligence leader: $154M revenue (2024), $439M total
      funding at a $1.7B valuation, 566-609 employees, and a 2026 Gartner MQ Leader distinction. Dragos differentiates
      on threat intelligence (OT-specific playbooks, sector-specific threat groups like CHERNOVITE and VOLTZITE),
      incident response services, and deep expertise in electric, oil/gas, manufacturing, and water sectors. Dragos was
      critiqued in the 2026 Gartner report for limited reach outside North America and channel-partner coverage gaps —
      the company is actively addressing this with a pure-channel GTM strategy. Dragos acquired Network Perception in
      2024 to add network security policy management capabilities.
    tableRefs:
      - TP002
    figureRefs:
      - FP002
  - id: incumbents-adjacent
    title: Incumbents and Adjacent Competitors
    body: >-
      Forescout Technologies (Campbell, CA) is the incumbent network access control (NAC) and device visibility vendor,
      acquired by Advent International (PE) for $1.9B in 2020. Forescout reported strong FY2025 results: 230+ new
      customers, 58 deals over $1M, 91% gross dollar retention, revenue growth >25% in financial services and >24% in
      healthcare, and the company exceeded the Rule of 40 for the third consecutive year. Forescout's ~1,200 employees
      and estimated $300-500M revenue make it larger than Armis at the time of acquisition, but its architecture
      (on-premises NAC, agent-based for some use cases) is less cloud-native than Armis. Forescout competes through
      existing enterprise NAC relationships, channel distribution, and asset visibility capabilities added via its
      eyeSight and eyeInspect products. Forescout was recognized as a Market Leader in CPS Security at the Global
      InfoSec Awards (2025/2026) and a Niche Player in the Gartner MQ.

      Microsoft Defender for IoT is the most significant platform consolidation threat. It is available to organizations
      with Microsoft 365 E5/Security and Azure Defender for Cloud licensing at minimal incremental cost — effectively
      free within the Microsoft enterprise agreement. The capability set is less comprehensive than Armis for
      heterogeneous OT environments (particularly non-Microsoft protocol stacks and proprietary industrial protocols),
      but for Microsoft-first enterprise IT environments, the bundling price pressure is severe. Microsoft has made the
      ServiceNow acquisition of Armis a partial mitigant — Armis can now be bundled into ServiceNow enterprise
      agreements and positioned as the OT/IoT layer complementary to Microsoft's IT-centric visibility.

      Tenable OT Security (formerly Indegy, acquired by Tenable in 2019) offers vulnerability-centric OT discovery and
      risk management, benefiting from Tenable's established IT vulnerability management customer base. Tenable is a
      public company (TENB, ~$5.3B market cap), giving it financial permanence but making it slower to innovate. Tenable
      OT competes more on vulnerability scoring and integration with Tenable.sc/ Tenable.io than on real-time threat
      detection, making it a frequent co-deployment with Armis (vulnerability management + asset intelligence) rather
      than a pure displacement competitor. Palo Alto Networks (PANW) integrates IoT Security as a module of its
      XSIAM/SASE platform, competing through firewall-native enforcement and Prisma SD-WAN — a coverage advantage Armis
      lacks (Armis detects but cannot block inline).
    tableRefs:
      - TP003
    figureRefs:
      - FP003
  - id: differentiation-switching-costs
    title: Differentiation and Switching Costs
    body: >-
      Armis's primary differentiators versus direct peers are: (1) Breadth — the largest proprietary device knowledge
      base covering 7B+ devices across IT, OT, IoT, and IoMT (including physical AI and cloud assets); (2) Architecture
      — agentless, cloud-native, passive monitoring with no SPAN/TAP required for IT assets (Wi-Fi and BLE
      radio-frequency monitoring); (3) Platform expansion — Centrix now includes CAASM, VMDR, healthcare IoMT security,
      and OT security in a single platform; and (4) ServiceNow integration — post- acquisition, Armis workflows can be
      embedded into ServiceNow ITSM/SOAR, creating distribution through ServiceNow's 8,000+ enterprise customers.

      Switching costs are high in this market. A full platform migration requires rebuilding the asset database
      (typically 3-6 months of passive learning in large environments), redeploying detection policies and alert
      thresholds, re-establishing integrations with SIEM/SOAR/ticketing systems, retraining SOC analysts, and
      re-baselining OT network behavior. These switching costs create meaningful net revenue retention advantage for the
      incumbent platform. PeerSpot and independent reviews note that both Armis and Claroty customers rate switching as
      a high-friction process, particularly in industrial environments where re-deployment requires change management
      and maintenance window coordination.

      Multi-homing is common at the enterprise level: organizations frequently deploy one vendor for OT/ICS environments
      (often Claroty or Dragos for depth) and a second for IT/IoT/enterprise (often Armis), creating co-existence rather
      than pure displacement. This multi-homing pattern is both a risk (slower full-platform adoption) and an
      opportunity (land with one use case, expand to others).
    tableRefs:
      - TP004
  - id: commoditization-risk
    title: Commoditization Risk and Displacement Threats
    body: >-
      The primary commoditization risk is the convergence of asset discovery capabilities across the vendor set. As
      Armis, Claroty, Nozomi, Forescout, and Microsoft all expand their device knowledge bases, the asset
      discovery/inventory use case is commoditizing — differentiation is shifting toward threat intelligence depth,
      compliance reporting, SOAR integration, and enforcement capability. Armis's 7B-device knowledge base is a current
      moat but is not a permanent one if competitors invest aggressively in protocol libraries and AI-driven device
      fingerprinting.

      The Microsoft bundling risk is the most adverse near-term threat. Microsoft's inclusion of Defender for IoT in
      enterprise agreements creates a "good-enough" option for IT-centric organizations. Gartner analyst Dale Peterson
      noted that Gartner's OT Visibility MQ category framing does not fully capture the distinction between pure-OT
      security (where Armis has less depth than Claroty/Dragos) and IT/IoT convergence (where Armis leads).
      Organizations with primarily IT/enterprise IoT exposure may consolidate on Microsoft rather than purchasing Armis
      — a displacement vector that the ServiceNow acquisition partially mitigates via ecosystem positioning.

      Dragos's limited North American focus (critiqued by Gartner 2026) and Nozomi's loss of independence (Mitsubishi
      acquisition) are adverse signals for the pure-play OT segment: this consolidation benefits Armis and Claroty, but
      also signals that the standalone CPS platform market may consolidate further through acquisition or platform
      bundling in the next 2-3 years. The 2025-2026 acquisition wave (Nozomi by Mitsubishi, Armis by ServiceNow, partial
      OTORIO integration) suggests the market is entering a consolidation phase that benefits scale players.
