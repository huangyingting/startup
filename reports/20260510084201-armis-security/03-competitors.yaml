    approximationNotes: >-
      Axis positions are evidence-based ordinal scoring, not numeric measurements. X-axis (Platform Breadth) reflects
      coverage across IT, OT, IoT, IoMT, cloud environments. Y-axis (OT/ICS Depth) reflects protocol-level industrial
      protocol decoding, OT threat intelligence, and sector-specific expertise. Positions derived from Gartner MQ
      scoring, PeerSpot reviews, and independent analyst assessments.
    data:
      xAxis: Platform Breadth (IT+OT+IoT+IoMT Coverage)
      yAxis: OT/ICS Depth (Protocol Intelligence and Threat Detection)
      points:
        - label: Armis
          x: 9
          'y': 7
          tone: positive
          detail: >-
            Leader — broadest platform coverage (IT+OT+IoT+IoMT); strong but not deepest OT protocol decoding; Gartner
            Leader 2025 and 2026
        - label: Claroty
          x: 6
          'y': 9
          tone: positive
          detail: >-
            Leader — deepest OT protocol decoding and TCO for OT-centric buyers; xDome cloud + CTD on-prem; Gartner
            Leader 2025 and 2026
        - label: Dragos
          x: 3
          'y': 10
          tone: positive
          detail: >-
            Leader — best-in-class OT threat intelligence; sector-specific playbooks; limited breadth (OT-only, North
            America focus); Gartner Leader 2025 and 2026
        - label: Nozomi Networks
          x: 5
          'y': 8
          tone: neutral
          detail: >-
            Leader (now Mitsubishi subsidiary) — strong AI-powered OT detection; good in energy/utilities; uncertain
            post-acquisition roadmap; Gartner Leader 2025 and 2026
        - label: Forescout
          x: 7
          'y': 5
          tone: neutral
          detail: >-
            Niche Player — broad NAC+OT visibility; hybrid architecture; 91% GDR; less cloud-native than Leaders;
            PE-owned (Advent)
        - label: Microsoft Defender IoT
          x: 8
          'y': 3
          tone: warning
