            positioned but operational integration risk is real
        - label: Multi-homing frequency
          value: Common — OT+IT deployments often split
          tone: neutral
          detail: >-
            Enterprise customers frequently deploy Dragos or Claroty for OT depth alongside Armis for IT/IoT;
            multi-homing is a monetization risk and an expansion opportunity simultaneously
callouts:
  - id: CP_CALLOUT_001
    type: risk
    title: Microsoft Bundling is the Highest-Severity Near-Term Competitive Risk
    body: >-
      Microsoft Defender for IoT is available at effectively zero incremental cost for Microsoft 365 E5 enterprise
      customers. In organizations where the CISO is IT-centric and the IoT security use case is primarily enterprise
      (managed devices, Azure-connected assets), Microsoft's bundled offering creates pricing pressure that Armis cannot
      match on price alone. The ServiceNow acquisition partially mitigates this by repositioning Armis as an
      ITSM/operational efficiency tool rather than a standalone security product — but the migration timeline for this
      repositioning is 2-3 years.
    sourceRefs:
      - SP011
      - SP025
    claimRefs:
      - CP029
    tone: warning
  - id: CP_CALLOUT_002
    type: opportunity
    title: Nozomi Acquisition by Mitsubishi Creates Near-Term Competitive Vacuum
    body: >-
      Nozomi Networks' acquisition by Mitsubishi Electric (September 2025) removes an independent, well-funded pure-play
      competitor from the market. Organizations that were evaluating Nozomi as their primary CPS platform may now prefer
      a vendor with clearer independent roadmap — a position that Claroty and Armis are well-positioned to capture.
      Nozomi's estimated 390-person team and $75M revenue represent customer accounts that may be in-play during the
      12-24 month post-acquisition uncertainty period.
    sourceRefs:
      - SP004
      - SP024
    claimRefs:
      - CP008
      - CP032
    tone: opportunity
