            Forescout (NAC) and Palo Alto Networks (NGFW) offer enforcement in adjacent coverage areas
        - label: Microsoft bundling displacement risk
          value: High in IT/enterprise IoT segments
          tone: warning
          detail: >-
            Microsoft Defender for IoT is effectively free for M365 E5 customers; creates zero-price competition in
            IT-centric enterprise IoT segments; Armis must demonstrate ROI beyond price
