        versus peers on each category?
      answer: >-
        Six primary capability categories: agentless discovery, OT protocol depth, IT/enterprise IoT coverage, inline
        enforcement, OT threat intelligence, cloud-native architecture. Armis leads on IT+OT breadth and cloud-native;
        Claroty leads on OT protocol depth; Dragos leads on threat intelligence; none offer inline enforcement.
