evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: financials
    missingEvidence: Armis's actual revenue (vs. ARR), gross margin, operating loss/income, and cash position
    whyItMatters: >-
      ARR alone does not reveal unit economics; Armis could have high churn, low margins, or significant operating
      losses that affect the investment thesis
    diligencePath: >-
      Request audited financial statements from ServiceNow investor relations or Armis management under NDA; review
      ServiceNow 10-Q/K for Armis segment disclosures post-close
    relatedQuestionRefs:
      - QO005
  - type: private-evidence-only
    severity: material
    topic: customers
    missingEvidence: >-
      Total customer count (the often-cited 7,000+ figure was unverifiable in public sources), NRR, churn rate, and
      customer concentration
    whyItMatters: >-
      Customer count and retention are key predictors of ARR sustainability; Armis has disclosed ARR but not customer
      metrics in recent public communications
    diligencePath: >-
      Obtain customer metrics from Armis management or ServiceNow investor disclosures; cross-check with Gartner Peer
      Insights and customer reference calls
    relatedQuestionRefs:
      - QO008
  - type: missing-source
    severity: minor
    topic: post-acquisition integration
    missingEvidence: >-
      Confirmed product integration roadmap, team structure within ServiceNow, and customer go-to-market changes post
      April 2026 close
    whyItMatters: >-
      Integration execution risk is real; if Armis loses go-to-market autonomy or key talent under ServiceNow, revenue
      trajectory may diverge from historical growth
    diligencePath: >-
      Monitor ServiceNow quarterly earnings calls (Q1 2026, Q2 2026) for Armis-specific metrics and integration
      commentary
    relatedQuestionRefs:
