callouts:
  - id: CU_CALLOUT_001
    type: finding
    title: Fortune 10 Penetration Validates Enterprise Product-Market Fit
    body: >
      Nine of the Fortune 10 companies are active Armis customers, alongside 35+ of the Fortune 100. This level of
      penetration in the world's largest enterprises is rare for a company that crossed $300M ARR in August 2025 and
      signals strong product-market fit in the large enterprise segment. Combined with a company-reported NPS of 70, the
      evidence supports a high-quality, sticky customer base.
    sourceRefs:
      - SU001
      - SU012
    claimRefs:
      - CU001
      - CU008
    tone: positive
  - id: CU_CALLOUT_002
    type: risk
    title: 'OT/Manufacturing Retention Risk: Adverse Gartner Review Flags Product Gap'
    body: >
      A December 2025 Gartner Peer Insights review from a $30B+ manufacturing company gave Armis 3.0/5, explicitly
      citing that OT-specific options remain behind competitor offerings. Combined with PeerSpot reviewers noting
      platform instability, this represents a meaningful retention risk in the OT/manufacturing segment. The OTORIO
      acquisition (March 2025) is the primary mitigation, but integration timelines remain a risk factor.
    sourceRefs:
      - SU003
      - SU005
    claimRefs:
      - CU025
      - CU024
    tone: negative
  - id: CU_CALLOUT_003
    type: finding
    title: ServiceNow Acquisition Creates Channel Risk Alongside Distribution Opportunity
    body: >
      ServiceNow's $7.75B acquisition of Armis (completed April 2026) validates Armis's customer base but introduces
      structural channel risk. Future distribution through ServiceNow's sales force may favor native ServiceNow security
      capabilities over Armis-specific modules, particularly for ServiceNow's existing ITSM customer base. This
      dual-nature outcome — enhanced distribution versus product displacement risk — is the most material
      forward-looking customer risk factor.
    sourceRefs:
      - SU021
      - SU019
    claimRefs:
      - CU030
      - CU031
    tone: warning
