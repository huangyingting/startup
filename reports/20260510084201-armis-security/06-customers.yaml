  evidenceGaps:
    - id: EGU001
      title: NRR/GRR and Contract Duration Not Publicly Disclosed
      description: >
        Armis has not disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), or precise contract duration
        data in any public filing, press release, or investor communication. These are the most critical missing
        retention metrics for a private SaaS company at Armis's scale ($300M+ ARR). ARR growth trajectory provides an
        indirect upper-bound signal but cannot substitute for direct retention disclosure. Contract duration is inferred
        from reviewer comments and typical enterprise SaaS norms rather than confirmed by Armis. This gap is a standard
        limitation for pre-IPO private companies and is expected to be resolved if ServiceNow provides segment
        disclosures post-integration.
      relatedQuestionRefs:
        - QU020
        - QU007
        - QU024
      severity: medium
    - id: EGU002
      title: Named Production Customer Depth Limited for Healthcare and Fortune 10 Segments
      description: >
        Despite claiming nine Fortune 10 and 35+ Fortune 100 customers, Armis has not published named case studies for
        these accounts, limiting outcome verification. Healthcare (IoMT) customers are referenced in Armis marketing
        with clinical impact scoring claims, but no independently verified named healthcare case study was located on
        G2, TrustRadius, PeerSpot, Gartner Peer Insights, or KLAS Research. The KLAS Research report on Armis
        cybersecurity was not publicly accessible, and no public KLAS data was available to verify healthcare customer
        satisfaction. This gap means healthcare-specific retention and outcome evidence remains entirely
        company-claimed.
      relatedQuestionRefs:
        - QU016
        - QU018
      relatedTableRefs:
        - TU003
      severity: low
