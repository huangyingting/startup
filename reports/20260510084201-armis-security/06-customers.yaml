company:
  name: Armis Security
chapter:
  number: 6
  title: Customers
  summary: >
    Armis Security has assembled a high-quality enterprise customer base anchored by 35+ Fortune 100 companies—including
    nine of the Fortune 10—across healthcare (IoMT), manufacturing/OT, federal government, financial services, and
    education verticals. ARR grew from $200M (Aug 2024) to $300M (Aug 2025) and exceeded $340M by December 2025,
    reflecting more than 50% YoY growth driven by a land-and-expand model across five product modules. A
    company-reported NPS of 70, G2 rating of 4.5 stars, and strong TrustRadius reviews confirm broad customer
    satisfaction. Adverse signals are limited but real: a 3.0/5 Gartner Peer Insights review from a $30B+ manufacturer
    flagged OT-specific alert gaps, and PeerSpot reviewers noted occasional platform instability. No public NRR or GRR
    figures have been disclosed. ServiceNow's $7.75B acquisition (April 2026) validates customer base quality but
    introduces channel integration risk and potential product-priority displacement for customers of Armis-native
    modules.
sections:
  - id: SEC_CU_001
    title: Customer Base Segmentation
    contentRequirements:
      - 0
    body: >
      Armis Security's customer base is concentrated in large enterprises operating complex, heterogeneous network
      environments spanning traditional IT, operational technology (OT), and Internet of Things (IoT) devices. The
      company's most penetrated verticals are Healthcare (IoMT security and clinical device management), Manufacturing
      and Industrial (OT/ICS asset visibility and security), Energy and Utilities (critical infrastructure protection),
      Federal Government (FedRAMP Moderate and DoD IL5 deployments), Financial Services, Education, and
      Telecommunications.

      Geographically, Armis is US-first — approximately 52% of its workforce is US-based, reflecting its primary
      customer concentration — with a growing presence in EMEA and APAC. The buyer profile is predominantly the
      enterprise CISO and VP of IT Security at organizations with 1,000+ employees; however, TrustRadius data confirms
      deployments in districts as small as 1,500 employees (East Moline School District 37). Deal size skews large:
      Fortune 500 and Global 2000 companies represent the highest-priority customer segment, evidenced by nine Fortune
      10 companies and 35+ Fortune 100 companies in the active customer base. The product is sold almost exclusively as
      an enterprise SaaS subscription, with 1-3 year contracts typical. Channel and partner coverage spans 200+
      technology integrations including Microsoft, Cisco, Palo Alto Networks, and Elisity, which uses the Armis Centrix
      API for policy enforcement in its microsegmentation platform.
    tableRefs:
      - TU001
    figureRefs:
      - FU001
  - id: SEC_CU_002
    title: Adoption Trajectory and Growth Metrics
    contentRequirements:
      - 1
    body: >
      Armis's adoption trajectory is among the strongest in the cyber-physical systems (CPS) security market. The
      company disclosed ARR milestones of $200M in August 2024 and $300M in August 2025 — representing exactly 50% YoY
      growth in a 12-month period — and internally exceeded $340M ARR by December 2025 following the close of its $435M
      Series E funding round at a $6.1B valuation. The company tracks more than 7 billion devices globally across its
      customer fleet, a number that functions as a proxy for platform utilization and network breadth.

      Gartner named Armis a Leader in the Magic Quadrant for Cyber-Physical Systems Protection Platforms in both 2025
      and 2026, confirming increasing market recognition and enterprise adoption. The Series E funding and subsequent
      $7.75B ServiceNow acquisition (April 2026) serve as external validation of customer base quality and growth
      trajectory. The company also achieved FedRAMP Moderate authorization, unlocking federal civilian agency
      procurement channels, and DoD Impact Level 5 (IL5) authorization in February 2026, enabling classified-adjacent
      federal deployments through a dedicated Armis Federal LLC subsidiary. ARR from the federal segment is growing but
      undisclosed as a separate line item.
    tableRefs:
      - TU002
    figureRefs:
      - FU002
  - id: SEC_CU_003
    title: Named Customer Proof and Outcomes
    contentRequirements:
      - 2
    body: >
      Armis publishes a substantial library of case studies and third-party reviews. Named production deployments
      include East Moline School District 37 (1,500 employees, K-12 education), which deployed Armis for asset tracking,
      rogue device blocking, and traffic analysis — a TrustRadius reviewer from this organization described the product
      as having "saved incalculable time" on network analysis and confirmed production use. A Head of Cyber Defense
      Center at an IT services firm (under $50M revenue) gave a 4.0/5 on Gartner Peer Insights, specifically praising
      Armis's agentless architecture and Security Risk Assessment (SRA) capabilities in a highly regulated environment.
      PeerSpot reviewers from manufacturing contexts confirmed production OT/IT security deployments with emphasis on
      asset discovery and vulnerability identification.

      At the top of the market, nine of the Fortune 10 companies and more than 35 Fortune 100 organizations are Armis
      customers, though these are disclosed as aggregate metrics rather than named references with outcome data. Armis's
      technology partner Elisity publicly uses the Armis Centrix API in production for microsegmentation policy
      enforcement. The OTORIO acquisition (March 2025) added OT-native capabilities and presumably brought OT customer
      references, though these are not yet surfaced as public case studies. Healthcare (IoMT) customers are referenced
      in Armis marketing materials with clinical impact scoring claims, but no independently verified named healthcare
      case studies were located.
    tableRefs:
      - TU003
    figureRefs:
      - FU003
  - id: SEC_CU_004
    title: Retention, Satisfaction, and Durability
    contentRequirements:
      - 3
    body: >
      Armis does not publicly disclose Net Revenue Retention (NRR) or Gross Revenue Retention (GRR), which are standard
      private-company opaque metrics. Indirect indicators are strongly positive: a company-reported Net Promoter Score
      (NPS) of 70 is classified as "excellent" by NPS benchmarking standards (>50 threshold). G2 shows a 4.5-star rating
      from 12 reviews as of late 2025. TrustRadius reviewers generally recommend Armis strongly. Armis notes bi-weekly
      onboarding calls as part of its customer success motion, suggesting active post-sales engagement.

      Adverse retention signals exist but are isolated. A Gartner Peer Insights review posted in December 2025 from a
      reviewer at a $30B+ manufacturing company rated Armis 3.0/5, citing limitations in OT-specific alert customization
      and noting that "OT-specific options remain behind" competitor offerings. PeerSpot reviewers flagged occasional
      platform instability with the phrase "not completely stable, sometimes incidents may occur." Contract duration for
      enterprise SaaS is typically 1-3 years, which provides near-term revenue durability but also creates renewal
      decision windows. The OTORIO acquisition is expected to address OT-specific gaps that surfaced in adverse reviews.
    tableRefs:
      - TU004
    figureRefs:
      - FU004
  - id: SEC_CU_005
    title: Expansion Dynamics and Concentration Risk
    contentRequirements:
      - 4
    body: >
      Armis operates a land-and-expand model in which customers typically begin with one product module — most commonly
      CAASM (Cyber Asset Attack Surface Management) or IoT Security — and subsequently add modules including OT
      Security, Healthcare Security (IoMT), Vulnerability Management and Detection Response (VMDR), and Early Warning
      (threat intelligence). Module expansion is the primary ARR growth driver within the existing installed base,
      complementing new logo acquisition. The ARR increase from $200M to $300M in 12 months implies meaningful expansion
      revenue, though Armis has not segmented expansion vs. new logo ARR.

      Customer concentration risk is real but nuanced. Nine of the Fortune 10 being customers is a strong logo
      validation story but also a brand concentration risk — any public dissatisfaction or churn from this cohort would
      be disproportionately visible. No single customer appears to constitute a material revenue concentration given the
      breadth of the Fortune 100 customer base. Channel concentration risk has shifted with the ServiceNow acquisition:
      Armis is now a ServiceNow business unit, and future distribution will increasingly route through ServiceNow's
      enterprise sales force. This introduces risk that ServiceNow's own IT workflow customers may be steered toward
      native ServiceNow security capabilities rather than Armis-specific modules. New verticals — Application Security
      (2025) and Automotive — represent expansion bets that widen the addressable customer set.
    tableRefs:
      - TU005
