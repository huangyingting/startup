  topStrengths:
    - 连续两年（2025 和 2026）获评 CPS Protection Platforms 的 Gartner MQ 领导者
    - 35+ Fortune 100 客户，包括 Fortune 10 中的 9 家；NPS 70
    - 无代理架构叠加 70 亿+ 设备指纹数据库，拥有市场最大自有数据集
    - $300M ARR（2025 年 8 月）且同比增长 >50%；收购公告时已达 $340M+
