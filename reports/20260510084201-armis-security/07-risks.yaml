figures:
  - id: FR001
    title: "Risk heatmap"
    type: matrix
    description: >
      Two-dimensional risk heatmap plotting Armis's material risks by likelihood (columns) and impact
      (rows). Tone: negative = highest concern requiring immediate action, warning = elevated concern
      requiring active monitoring, neutral = managed risk with adequate mitigations in place.
    claimRefs: [CR001, CR002, CR003]
    data:
      columns: ["Low Likelihood", "Medium Likelihood", "High Likelihood"]
      rows:
        - label: "Critical Impact"
          values:
            - label: "AWS GovCloud single-cloud failure"
              tone: warning
              detail: "No multi-cloud fallback disclosed. Extended AWS GovCloud outage causes FedRAMP SLA breach and federal customer unavailability."
            - label: "ServiceNow integration failure"
              tone: negative
              detail: "Post-acquisition integration risk could delay roadmap 12+ months and drive enterprise customer attrition to Claroty or Nozomi."
            - label: "GDPR/CCPA enforcement action"
              tone: negative
              detail: "Device telemetry collection in EU requires GDPR compliance; enforcement risk grows with EU customer expansion and NIS2 scrutiny."
        - label: "High Impact"
          values:
            - label: "Key person departure (founders)"
              tone: warning
              detail: "CEO/CTO retention terms post-acquisition not disclosed; founder departure would signal cultural integration failure."
            - label: "OT depth gap drives churn"
              tone: warning
              detail: "Gartner 3.0/5 review from $30B+ manufacturer; Claroty and Dragos could displace Armis in industrial OT verticals."
            - label: "FedRAMP High delay"
              tone: neutral
              detail: "FedRAMP High in process; delay caps DoD classified-adjacent market expansion but does not affect existing Moderate/IL5 contracts."
        - label: "Medium Impact"
          values:
            - label: "OTORIO integration shortfall"
              tone: warning
              detail: "45/80 OTORIO layoffs; air-gapped OT Titan integration in progress as of H1 2026 with thinned engineering bench."
            - label: "Microsoft Defender IoT bundling"
              tone: neutral
              detail: "Microsoft bundling strategy could commoditize SME IoT security segment; limited enterprise impact given Armis Fortune 10 concentration."
            - label: "Pricing compression in OT market"
              tone: neutral
              detail: "Claroty and Nozomi competitive pricing may compress Armis ASP in industrial verticals over the next 12-24 months."

  - id: FR002
    title: "Risk transmission map"
    type: dag
    description: >
      Directed graph illustrating how integration execution risk and regulatory compliance failure
      transmit into customer attrition, ARR growth slowdown, and goodwill impairment risk for
      ServiceNow post-acquisition.
    claimRefs: [CR004, CR005, CR006]
    data:
      nodes:
        - id: r1
          label: "Integration Execution Risk"
          detail: "Three acquisitions in 13 months; OTORIO layoffs reduced OT engineering bench; Titan code-base fragmentation."
          tone: negative
        - id: r2
          label: "Customer Attrition"
          detail: "ServiceNow integration uncertainty and OT depth gaps may drive enterprises to Claroty, Dragos, or Nozomi."
          tone: negative
        - id: r3
          label: "ARR Growth Slowdown"
          detail: "If churn exceeds new bookings, ARR growth falls below 40-50% annual target implied by 23x acquisition price."
          tone: warning
        - id: r4
          label: "Regulatory Compliance Failure"
          detail: "GDPR enforcement or FedRAMP High delay blocks EU and federal market expansion simultaneously."
          tone: warning
        - id: r5
          label: "Goodwill Impairment Risk"
          detail: "ServiceNow paid 23x ARR; if ARR plateaus, a goodwill write-down on Armis acquisition appears on ServiceNow balance sheet."
          tone: negative
        - id: r6
          label: "OT Competitive Loss"
          detail: "Persistent OT depth gap (Gartner critical review) if OTORIO integration is not completed on schedule in 2026."
          tone: warning
      edges:
        - from: r1
          to: r2
        - from: r1
          to: r6
        - from: r2
          to: r3
        - from: r4
          to: r3
        - from: r6
          to: r2
        - from: r3
          to: r5

  - id: FR003
    title: "Dependency map"
    type: dag
    description: >
      Directed dependency graph for Armis post-ServiceNow acquisition illustrating infrastructure,
      regulatory, platform, and ecosystem dependencies and their interconnections.
    claimRefs: [CR007, CR008, CR009]
    data:
      nodes:
        - id: d1
          label: "AWS GovCloud"
          detail: "Primary cloud for FedRAMP and DoD IL5 workloads; no multi-cloud failover disclosed. Lock-in limits AWS negotiating leverage."
          tone: warning
        - id: d2
          label: "ServiceNow Platform"
          detail: "Post-acquisition parent: controls GTM, roadmap funding, capital allocation, and ITSM integration strategy for Armis."
          tone: neutral
        - id: d3
          label: "FedRAMP PMO (GSA)"
          detail: "Annual authorization renewal required; FedRAMP High in process — delay blocks classified federal contract expansion."
          tone: neutral
        - id: d4
          label: "DISA / DoD IL5"
          detail: "IL5 customer contracts require DISA continuous monitoring compliance and annual recertification obligations."
          tone: neutral
        - id: d5
          label: "Armis AI Device Engine"
          detail: "Proprietary device fingerprint database with 5B+ signatures; post-acquisition data governance is critical to preserving moat."
          tone: warning
        - id: d6
          label: "200+ Integration Partners"
          detail: "Splunk, Sentinel, Palo Alto, CrowdStrike APIs; API changes at any major partner could disrupt customer security workflows."
          tone: neutral
      edges:
        - from: d1
          to: d3
        - from: d2
          to: d5
        - from: d3
          to: d4
        - from: d2
          to: d6
        - from: d5
          to: d6

