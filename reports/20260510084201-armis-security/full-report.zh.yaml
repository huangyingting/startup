      - number: '5.3'
        title: 部署、集成与路线图
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix 支持三种部署模式：AWS 上完整云原生 SaaS（US-East, US-West, EU-West）；混合模式，即传感器 在本地、分析在云端；以及通过 OTORIO Titan
              面向机密或隔离 OT 环境的物理隔离本地部署。联邦部署通过 Armis Federal LLC 在 AWS GovCloud 上运行；该专门联邦子公司为单独持有 FedRAMP 和 DoD
              授权而设立，与商业运营隔离。FedRAMP Moderate 和 DISA IL4 于 2023 年取得；DoD IL5 于 2026 年 2 月 23 日获授权，使最高 SECRET
              级别的分类工作负载成为可能。截至 H1 2026，FedRAMP High 授权仍在推进，公司承诺目标为 H2 2026。部署复杂度随环境变化：仅 IT 用例的云 SaaS 部署可在数天内运行；OT
              和医疗部署通常需要 4 至 12 周，用于传感器布点、协议调优和策略配置，常由 Accenture、Deloitte、KPMG 等 Armis 认证集成商支持。2026 年 1 月推出的 Armis Select
              Partner Program 用按结果计励替代传统合作伙伴层级，降低 MSSP 和区域集成商入驻摩擦。集成成熟度是关键差异化：200-plus 个预构建连接器和原生 ServiceNow 集成，降低已投入
              ITSM 和 SIEM 生态的企业客户实施负担。截至 H1 2026，路线图包括：FedRAMP High 目标 H2 2026 完成；Centrix for Application Security 已在
              2025 年推出，带 SDLC 集成并处早期采用；OTORIO Titan 本地平台与 Centrix 云分析的整合正在推进且部分完成；2026 年 4 月收购交割后，更深嵌入 ServiceNow
              ITSM、SAM 和 HAM 工作流。2024 年 2 月 CTCI、2024 年 4 月 Silk Security、2025 年 3 月 OTORIO
              三笔收购，都增加了路线图表面积和整合工作流，与核心平台发布节奏争夺工程带宽。
