      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Armis 的 SaaS 架构托管在 AWS（商业）和 AWS GovCloud（联邦）上，没有公开披露多云或混合故障转移策略。AWS GovCloud 长时间故障可能导致联邦客户无法使用 Armis 平台，触发
              SLA 罚款和潜在 FedRAMP 不合规。相对商业 AWS 区域，AWS GovCloud 是高价、合规驱动环境，地理冗余有限。

              OTORIO 收购引入 Titan 本地物理隔离 OT 平台，作为独立代码库必须与 Armis Centrix 并行维护。截至 H1 2026，Titan 物理隔离 OT 能力整合进 Centrix
              仍在推进。2025 年 3 月裁撤约 80 名 OTORIO 员工中的 45 人，削弱了有经验的 OT 工程团队厚度，抬高整合复杂度。2025 年 12 月，来自一家 $30B+ 制造商的 Gartner
              Peer Insights 评论给 Armis 3.0/5，并指出 OT 专用选项仍落后于竞争对手，确认 OT 功能深度是持续运营风险。PeerSpot 评论者提到平台偶发不稳定。200+ 个第三方集成生态带来
              API 依赖风险；如果 Splunk、Microsoft Sentinel 或 CrowdStrike 修改 API 合同，受影响集成可能扰乱客户安全工作流。Armis 没有制造依赖（100%
              软件），供应链风险有限。劳动力风险中等：网络安全工程人才竞争激烈，ServiceNow 文化整合可能触发 Armis 以色列工程团队流失。
