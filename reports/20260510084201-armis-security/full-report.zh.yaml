      - CU041
    notes: >
      按细分估算留存队列。没有公开披露的 GRR 或 NRR；估计来自 ARR 增长轨迹、NPS 和评论平台信号。OT / 制造的负面信号来自 Gartner Peer Insights Dec 2025 评论。联邦细分反映
      FedRAMP 授权前后的增长阶段。
    data:
      columns:
        - 第 1 年（2023）
        - 第 2 年（2024）
        - 第 3 年（2025）
      rows:
        - label: 企业 IT 细分
          values:
            - label: ~90%+
              value: 90
              tone: positive
              detail: 基于 NPS 70 和多年期 SaaS 合同，估计留存较高；未披露 GRR。
            - label: ~90%+
              value: 90
              tone: positive
              detail: ARR 从 $100M 增至 $200M，意味着企业层面流失有限。
            - label: ~92%+
              value: 92
              tone: positive
              detail: ARR 从 $200M 增至 $300M，YoY 超过 50%，强烈暗示毛流失率较低。
        - label: OT / 制造细分
          values:
            - label: ~85%
              value: 85
              tone: neutral
              detail: OTORIO 收购（Mar 2025）补入 OT 原生能力；集成后留存改善。
            - label: ~80%
              value: 80
              tone: neutral
              detail: Gartner Dec 2025 负面评论（制造）：OT 专项告警相比竞品有限。
            - label: ~75%
              value: 75
              tone: warning
              detail: 来自 $30B+ 制造公司的 3.0/5 Gartner 评论；明确指出 OT 深度担忧。
        - label: 医疗（IoMT）
          values:
            - label: ~82%
              value: 82
              tone: neutral
              detail: 未披露医疗专属留存数据；KLAS 数据不可公开访问。仅为估计。
            - label: ~82%
              value: 82
              tone: neutral
              detail: KLAS Research 报告不可公开访问；未找到第三方 IoMT 留存数据。
            - label: ~85%
              value: 85
              tone: neutral
              detail: 2025 扩展临床影响评分和 IoMT 功能；客户流失数据未披露。
        - label: 联邦 / 政府
          values:
            - label: ~60%
              value: 60
              tone: neutral
              detail: 2023 获得 FedRAMP Moderate；2023 年联邦客户基础仍处早期。
            - label: ~75%
              value: 75
              tone: positive
              detail: DoD IL5（Feb 2026）支持更深的联邦渗透；Armis Federal LLC 已成立。
            - label: ~82%
              value: 82
              tone: positive
              detail: IL5 授权后联邦 ARR 组成部分在增长；专属联邦子公司已运营。
  - id: FR001
    title: 风险热力图
    type: matrix
    description: |
      二维风险热力图按可能性（列）和影响（行）绘制 Armis 的重大风险。Tone：negative = 需要立即行动的最高关注，warning = 需要主动监控的升高关注，neutral = 已有足够缓释的可管理风险。
    claimRefs:
      - CR001
      - CR002
      - CR003
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 关键影响
          values:
            - label: AWS GovCloud 单云故障
              tone: warning
              detail: 未披露多云后备。AWS GovCloud 长时间中断会造成 FedRAMP SLA 违约，并让联邦客户不可用。
            - label: ServiceNow 集成失败
              tone: negative
              detail: 收购后的集成风险可能让路线图延后 12+ 个月，并推动企业客户流向 Claroty 或 Nozomi。
            - label: GDPR/CCPA 执法行动
              tone: negative
              detail: 在 EU 采集设备遥测需要符合 GDPR；随着 EU 客户扩张和 NIS2 审查加强，执法风险上升。
        - label: 高影响
          values:
            - label: 关键人离职（创始人）
              tone: warning
              detail: 收购后 CEO/CTO 留任条款未披露；创始人离职会释放文化整合失败信号。
            - label: OT 深度缺口推高流失
              tone: warning
              detail: 来自 $30B+ 制造商的 Gartner 3.0/5 评论；Claroty 和 Dragos 可能在工业 OT 垂直替代 Armis。
            - label: FedRAMP High 延迟
              tone: neutral
              detail: FedRAMP High 推进中；延迟会限制 DoD 涉密邻近市场扩张，但不影响现有 Moderate/IL5 合同。
        - label: 中等影响
          values:
            - label: OTORIO 集成不达预期
              tone: warning
              detail: OTORIO 裁撤 45/80；物理隔离 OT Titan 集成截至 H1 2026 仍在推进，工程团队已经变薄。
            - label: Microsoft Defender IoT 捆绑
              tone: neutral
              detail: Microsoft 捆绑策略可能让 SME IoT 安全细分商品化；考虑到 Armis 在 Fortune 10 的集中度，企业影响有限。
            - label: OT 市场价格压缩
              tone: neutral
              detail: Claroty 和 Nozomi 的竞争性定价可能在未来 12-24 个月压缩 Armis 在工业垂直的 ASP。
  - id: FR002
    title: 风险传导图
    type: dag
    description: |
      有向图展示集成执行风险和监管合规失败，如何传导为客户流失、ARR 增长放缓，以及 ServiceNow 收购后面临的商誉减值风险。
    claimRefs:
      - CR004
      - CR005
      - CR006
    data:
      nodes:
        - id: r1
          label: 集成执行风险
          detail: 13 个月内三次收购；OTORIO 裁员削弱 OT 工程团队；Titan 代码库碎片化。
          tone: negative
        - id: r2
          label: 客户流失
          detail: ServiceNow 集成不确定性和 OT 深度缺口，可能推动企业转向 Claroty、Dragos 或 Nozomi。
          tone: negative
        - id: r3
          label: ARR 增长放缓
          detail: 如果流失超过新签，ARR 增长会跌破 23x 收购价隐含的 40-50% 年度目标。
          tone: warning
        - id: r4
          label: 监管合规失败
          detail: GDPR 执法或 FedRAMP High 延迟会同时挡住 EU 和联邦市场扩张。
          tone: warning
        - id: r5
          label: 商誉减值风险
          detail: ServiceNow 支付 23x ARR；如果 ARR 见顶，ServiceNow 资产负债表上会出现 Armis 收购的商誉减记。
          tone: negative
        - id: r6
          label: OT 竞争失利
          detail: 如果 OTORIO 集成未按 2026 计划完成，OT 深度缺口（Gartner 负面评论）会持续存在。
          tone: warning
      edges:
        - from: r1
          to: r2
        - from: r1
          to: r6
        - from: r2
          to: r3
        - from: r4
          to: r3
        - from: r6
          to: r2
        - from: r3
          to: r5
  - id: FR003
    title: 依赖图
    type: dag
    description: |
      Armis 被 ServiceNow 收购后的有向依赖图，展示基础设施、监管、平台和生态依赖及其相互连接。
    claimRefs:
      - CR007
      - CR008
      - CR009
    data:
      nodes:
        - id: d1
          label: AWS GovCloud
          detail: FedRAMP 和 DoD IL5 工作负载的主要云；未披露多云故障转移。锁定效应削弱对 AWS 的议价能力。
          tone: warning
        - id: d2
          label: ServiceNow 平台
          detail: 收购后的母公司：控制 Armis 的 GTM、路线图资金、资本配置和 ITSM 集成策略。
          tone: neutral
        - id: d3
          label: FedRAMP PMO（GSA）
          detail: 需要年度授权续期；FedRAMP High 推进中——延迟会阻断涉密联邦合同扩张。
          tone: neutral
        - id: d4
          label: DISA / DoD IL5
          detail: IL5 客户合同要求满足 DISA 持续监控合规和年度再认证义务。
          tone: neutral
        - id: d5
          label: Armis AI Device Engine
          detail: 专有设备指纹数据库，含 5B+ 个签名；收购后的数据治理对保住护城河至关重要。
          tone: warning
        - id: d6
          label: 200+ 集成伙伴
          detail: Splunk、Sentinel、Palo Alto、CrowdStrike API；任何主要伙伴的 API 变更都可能扰乱客户安全工作流。
          tone: neutral
      edges:
        - from: d1
          to: d3
        - from: d2
          to: d5
        - from: d3
          to: d4
        - from: d2
          to: d6
        - from: d5
          to: d6
  - id: FV001
    slug: recommendation-logic
    title: 推荐逻辑
    type: flow
    layout: standard
    data:
      nodes:
        - id: n1
          label: 市场机会
          detail: CPS/OT/IoT 安全市场到 2028 超过 $25B；Armis 在 2025 和 2026 保持 Gartner MQ Leader 位置；IDC 确认 20%+ CAGR。
          tone: positive
        - id: n2
          label: 产品领先
          detail: 无代理架构 + AI Asset Intelligence Engine；7B+ 设备数据库；唯一在单一控制台覆盖 IT+OT+IoT+IoMT 的平台。
          tone: positive
        - id: n3
          label: 客户牵引力
          detail: 35+ 家 Fortune 100、9 家 Fortune 10；NPS 70；$300M ARR August 2025；DoD IL5 于 February 2026 获得。
          tone: positive
        - id: n4
          label: $7.75B 收购（约 23x ARR）
          detail: ServiceNow 在 December 2025 宣布收购 Armis，April 2026 交割；较 $6.1B Series E 溢价 27%； 全现金。
          tone: neutral
        - id: n5
          label: 集成与执行风险
          detail: 13 个月内三次收购；OTORIO 裁撤 45/80 名工程师；Gartner Peer Insights 3.0/5 评论提到 OT 深度缺口。
          tone: warning
        - id: n6
          label: 建议：已收购 — 公允价值
          detail: 在 >50% 增长下，约 23x ARR 的收购价可以自洽。只要 ServiceNow 集成守住 ARR 增长，并通过 ITSM 协同到 2027 扩至 $500M+ ARR，投资逻辑就成立。
          tone: positive
      edges:
        - from: n1
          to: n4
        - from: n2
          to: n4
        - from: n3
          to: n4
        - from: n5
          to: n4
        - from: n4
          to: n6
  - id: FV002
    slug: valuation-sensitivity
    title: 估值敏感性
    type: bar
    layout: standard
    data:
      items:
        - id: b1
          value: 5.1
          label: 15x ARR — 压力情景
          detail: 以 $340M ARR 乘 15x ARR，隐含价值 = $5.1B。若增长放缓至 <25% YoY，或集成扰乱 ARR 动能，则适用该情景。
          tone: warning
        - id: b2
          value: 6.8
          label: 20x ARR — 基准偏低
          detail: 以 $340M ARR 乘 20x ARR，隐含价值 = $6.8B。$300M+ ARR、40-50% 增长的高增长 SaaS 有市场先例。
          tone: neutral
        - id: b3
          value: 7.75
          label: 23x ARR — 实际收购
          detail: ServiceNow 支付 $7.75B = 约 23x ARR。溢价反映平台领先、Fortune 10 密度和 CPS/OT TAM 增长轨迹。
          tone: positive
        - id: b4
          value: 10.2
          label: 30x ARR — 乐观情景
          detail: 以 $340M ARR 乘 30x ARR，价值 = $10.2B。需要 ServiceNow 集成后收入加速，并打入新的 OT / 联邦垂直。
          tone: positive
  - id: FV003
    slug: valuation-return-range
    title: 估值 / 回报区间
    type: range
    layout: standard
    data:
      items:
        - label: 收购时 ARR（Dec 2025 估计）
          low: 320
          mid: 340
          high: 360
          displayValue: ~$340M
          detail: 公司报告 August 2025 ARR 为 $300M；按 50%+ YoY 增长轨迹，估计 December 2025 公告时为 $340M+。
          tone: neutral
        - label: 隐含 ARR 倍数（x）
          low: 20
          mid: 22.8
          high: 25
          displayValue: ~22.8x
          detail: ServiceNow 支付 $7.75B。按 $340M ARR，隐含倍数为 22.8x；区间反映 $320M-$360M ARR 估计不确定性。
          tone: positive
        - label: 悲观情景价值（$B）
          low: 4.5
          mid: 5.1
          high: 5.8
          displayValue: $5.1B
          detail: 悲观：集成失败，ARR 在 $300-340M 平台化，倍数压缩至 15-17x；ServiceNow 面临商誉减值风险。
          tone: negative
        - label: 基准情景价值（$B）
          low: 6.5
          mid: 7.75
          high: 8.5
          displayValue: $7.75B
          detail: 基准：收购价；ARR 借 ServiceNow ITSM 协同到 2027 增至 $500M；15-17x 远期 ARR 倍数。
          tone: neutral
        - label: 乐观情景价值（$B）
          low: 9
          mid: 10.5
          high: 12
          displayValue: $10.5B
          detail: 乐观：Armis 到 2027 达到 $700M ARR；平台借企业分销成为 ServiceNow 的安全锚点；15x 远期 ARR。
          tone: positive
  - id: FV004
    slug: investment-kpis
    title: 投资 KPI
    type: kpi
    layout: standard
    data:
      items:
        - id: k1
          label: 市场评分：9/10
          detail: CPS/OT/IoT 安全是一个超过十年的结构性增长市场，2028 规模超过 $25B；Armis 是公认的跨品类平台领导者。
          tone: positive
        - id: k2
          label: 产品评分：8/10
          detail: 无代理架构和 AI Asset Intelligence Engine 具备结构性差异化；相较 Claroty/Dragos 的 OT 深度缺口是真实风险，需要完成 OTORIO 集成。
          tone: positive
        - id: k3
          label: 客户评分：8/10
          detail: Fortune 10 密度（9/10）和 NPS 70 是很强的企业信号；NRR 未披露是实质缺口，阻碍形成完全信心。
          tone: positive
        - id: k4
          label: 财务评分：7/10
          detail: '>50% ARR 增长轨迹优秀；烧钱率、GAAP 盈利能力和毛利率未披露——这些缺口拉低财务信心评分。'
          tone: neutral
        - id: k5
          label: 风险评分：5/10
          detail: 13 个月内三次收购、OTORIO 裁员、OT 深度缺口批评和创始人留任不确定性，合起来构成重大下行风险。
          tone: warning
        - id: k6
          label: 估值评分：7/10
          detail: >-
            22.8x ARR 偏贵，但由增长率和平台领先支撑；相对私有 OT 同行（Claroty 约 35x、Nozomi 约 30x）偏保守；对具备 Fortune 10 渗透的 Gartner MQ Leader
            而言公允。
          tone: neutral
