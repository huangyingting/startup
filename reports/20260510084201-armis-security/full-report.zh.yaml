      - number: '1.2'
        title: 创始人与高管团队
        blocks:
          - type: paragraph
            body: >
              Armis 由 Yevgeny Dibrov（CEO）和 Nadir Izrael（CTO）共同创立。二人均出身以色列精英技术和军事项目，能力互补。Dibrov 曾在云安全创业公司 Adallom
              的高管团队任职；Adallom 的联合创始人后来成为 Wiz 创始团队的一部分，并于 July 2015 被 Microsoft 以 $320M 收购。短暂休整后，Dibrov 立即开始搭建 Armis，并说服
              Izrael 离开 Google 软件工程师岗位；Izrael 当时参与 Google Maps 和 Google Autocomplete。两位创始人均就读于 Technion 卓越项目，也曾在 Israel
              Defense Forces（IDF）的精英部队服役，包括 Unit 8200。

              Dibrov 被广泛视为 Armis 商业化和客户成功的主要推动者，长期保持高强度全球出差，与客户和伙伴见面。Izrael 负责技术与产品愿景，主导了三起收购（CTCI、Silk
              Security、OTORIO），并在工程和产品组织内拥有重要跨职能权限。Cyberstarts 创始人 Gili Raanan 自 Series A 前起担任董事会主席，代表早期投资人基础。

              到 2026，高管团队已明显扩容。Alex Mosher 担任 President and Chief Revenue Officer（CRO）。Jonathan Carr 担任 Chief Financial
              Officer。Simon Mouyal 于 March 2026 被任命为 Chief Marketing Officer，带来来自 CyberArk、athenahealth 等机构的 25+ 年网络安全与
              SaaS 营销经验。Christian Terlecki 以 Senior Vice President 身份负责公共部门销售，统筹 Armis Federal 及其政府认证。
