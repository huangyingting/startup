  - id: TM004
    title: 增长驱动因素和约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时点
      - 对 Armis 的影响
      - 尽调问题
    rows:
      - - EU NIS2 指令（Oct 2024 生效）
        - 驱动因素
        - 立即 — EU 已在 2024 开始执法；罚则在 2025+
        - 在 EU 18 个行业以及有 EU 业务的全球公司中，合规驱动的采购紧迫性上升
        - 核实 2025 年 Armis EMEA 管线增长中，可归因于 NIS2 合规强制要求的部分
      - - FDA 医疗设备网络安全强制要求
        - 驱动因素
        - 分阶段 — 新设备要求 2023；OT 制造 2025
        - 推动医疗健康和制药制造垂直的 IoMT 安全支出；Armis 已建立医疗健康垂直
        - 确认医疗健康 ARR 占总 ARR 的百分比和 YoY 增速
      - - OT/IT 网络融合
        - 驱动因素
        - 持续 — Industry 4.0 和智能制造推动加速
        - 结构性扩大 Armis 可保护的设备底盘；每台新联网 OT 设备都可能成为 Armis 客户资产
        - 跟踪 Armis 客户群季度设备数增长；核实 > 15% CAGR
      - - 设备扩散（20B+ IoT）
        - 驱动因素
        - 长期 — 至 2030，每年持续增长 10-15%
        - 每台新增互联设备都可能变成安全事件；设备数增长会同时抬高问题严重性和 Armis 价值主张
        - 核实 Armis 设备跟踪指标增长（目前实时约 7B）
      - - AI 驱动的威胁升级
        - 驱动因素
        - 立即且到 2026 持续加速
        - AI 让针对 OT/IoT 目标的攻击更复杂；实时检测和响应更紧迫；Armis 销售 AI 驱动平台
        - 审查 Armis AI 威胁检测能力；核实相对 Claroty、Nozomi 的差异化
      - - 市场整合（ServiceNow、Cisco、Palo Alto 收购）
        - 混合
        - 立即 — ServiceNow-Armis 于 April 2026 交割
        - 对企业客户，捆绑平台可能带来优势；但如果 Armis 产品自主性在 ServiceNow 体系下降，也会产生整合风险
        - 监测 Armis 是否维持独立 GTM，还是并入 ITSM 工具包
      - - OT 安全销售周期长（6-18 个月）
        - 约束
        - 结构性 — 由采购规定和 POC 要求驱动
        - 限制收入速度；Armis 的 $340M ARR 表明，即便有这一约束，公司仍已规模化
        - 要求按垂直披露胜率和销售周期长度；对标 Claroty
      - - 工具泛滥疲劳
        - 约束
        - 当前 — CISO 预算在 2024-2025 受压
        - 买方在整合安全供应商；相比点状方案，Armis 的平台打法占优，但也要与企业级巨型平台竞争
        - 核实 Armis 平台扩展交易 vs. 替换交易比例
    notes: 当前市场成熟度下，驱动因素明显压过约束。监管强制要求（NIS2、FDA）给预算提供非自由裁量的底线。核心约束风险在于 ServiceNow 收购后的整合削弱 Armis 独立 GTM 敏捷性。
