      - number: '5.2'
        title: 技术架构与运营模型
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix 架构分为三个逻辑层：采集、智能和动作。采集层中，Armis 传感器（软件定义的虚拟设备，可部署在通用 x86 硬件、VMware、AWS 或 Azure VM 上）连接 SPAN
              端口或网络分流器，捕获原始流量元数据。传感器先在本地预处理和加密，再只把元数据而非 数据包载荷传到 Armis 云，既保护网络性能，也回应数据驻留顾虑。对物理隔离 OT 环境，OTORIO Titan
              本地平台在本地捕获和处理数据，并安全地定期同步到 Centrix 云分析；但截至 H1 2026，这项整合仍在推进。智能层中，Armis Asset Intelligence Engine 是专有 AI/ML
              数据湖，会把捕获的元数据与持续更新的知识库关联；知识库包含 7 billion 以上设备行为指纹、漏洞关联和威胁情报源，用于分类、评分并画像每个资产。该引擎用专门协议解码器，对 500-plus 种 OT 和
              IoT 协议做深度包检测，可在不扰动运营流量的情况下识别 Siemens S7、Modbus、DNP3、BACnet、OPC-UA 和 PROFINET 中的固件版本、通信模式和异常行为。AI 模型叠加 2024
              年 2 月 CTCI 收购 IP 和 2024 年 4 月 Silk Security
              风险优先级逻辑，在多维风险指数上为每项资产打分，纳入漏洞严重性、资产业务价值、暴露场景和威胁行为者相关性。动作层中，Centrix 暴露 REST API v3 和 200-plus 个预构建连接器，连接
              SIEM、SOAR、ITSM、EDR、NAC、CMDB 和云平台。隔离、创建工单、推送防火墙策略等修复动作经这些集成流转，而不是由 Armis 直接执行，从而保留平台的被动、非侵入式架构。Python
              SDK（PyPI 上的 armis-sdk）和 developers.armis.com 的 Armis Developer Portal，为自定义集成和自动化工作流扩展平台。
