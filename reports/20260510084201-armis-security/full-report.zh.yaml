      - number: '2.5'
        title: 采用约束与市场风险
        blocks:
          - type: paragraph
            body: >-
              尽管增长轨迹强劲，CPS 保护平台市场仍面临多项采用约束，压制收入速度和可触达市场预期。

              长销售周期是最重要的结构性约束。企业 OT 安全采购从初次接触到签约通常需要 6-18 个月，原因包括 OT 特定 PoC 要求、多利益相关方对齐（CISO + OT
              manager）、安全评估，以及政府场景中的监管认证要求。Armis 尽管有该约束，仍能扩张至 $340M ARR 以上，这一点值得注意，并说明销售 motion 高效；但天花板仍由 pipeline
              容量和周期时长决定。

              既有供应商切换成本真实存在。Claroty、Nozomi Networks 和 Dragos 已在工业环境建立据点；使用现有 OT 安全工具的客户面临集成迁移成本和供应商关系惯性。Armis
              通常必须替换或补充现有工具，这会拉长销售周期，并在竞争性替换中降低 win rate。

              市场整合制造竞争不确定性。2024-2026 的 M&A 浪潮——ServiceNow 收购 Armis（$7.75B）、Cisco 收购 Splunk（$28B），以及 Palo Alto
              持续收购——正在压缩独立 CPS 平台市场。剩余独立公司（Claroty、Nozomi Networks）既面临捆绑型 mega-platform 提供商的有机竞争，也面临潜在整合压力。收购后，Armis
              的竞争位置高度取决于 ServiceNow 是否维持其独立 go-to-market motion。

              市场规模不确定削弱投资论点信心。分析师对 OT 安全的 TAM 估算在 2025 年相差 6%，到 2030 预测窗口可能进一步分化；尚无公开分析师发布可直接映射 Armis go-to-market 范围的独立
              CPS 保护平台 SAM。投资人应向 ServiceNow 获取自下而上的客户 cohort 数据，以验证 Armis 市场份额轨迹。
