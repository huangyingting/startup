      - number: '8.5'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              April 2026 交割后，Armis 已是 ServiceNow 全资子公司；传统退出准备度分析现在适用于 ServiceNow 投资者，核心是判断这笔收购是否创造了价值。若面向战略买方或未来
              剥离场景，关键退出信号在平台成熟度上偏正面（已取得 FedRAMP Moderate 和 DoD IL5，维持 SOC 2 Type II 与 ISO 27001，2025 和 2026 年为 Gartner
              Leader），但财务透明度仍不完整（未披露 NRR、GRR、GAAP 指标或烧钱速度）。确认投资假设前，最终尽调问题集中在：(1) ServiceNow 下一次季度业绩会对 Armis 的评论中是否披露 NRR
              和 GRR，用以确认落地后扩张效率是否匹配 Fortune 10 密度信号；(2) ServiceNow 管理层给出的 OTORIO Titan 集成里程碑和时间表，用以回应 Gartner Peer
              Insights 标出的 OT 深度缺口；(3) 确认 CEO Yevgeny Dibrov 和 CTO Nadir Izrael 的留任激励、 归属锁定时间表——创始人 18
              个月内离职将触发投资假设失效；(4) 披露毛利率和 GAAP 经营利润率，以确认规模化盈利路径；(5) FedRAMP High 授权状态更新，该资质可打开估计为当前联邦 TAM 2-3x 的机密 DoD
              和情报机构合同。需要立即重评的投资假设失效触发项包括：首次披露 NRR 低于 110%；12 个月内流失超过两家 Fortune 100 客户；OTORIO 集成延迟叠加 Gartner
              负面评价更新；FedRAMP High 被拒；或 ServiceNow 报告与 Armis 收购有关的商誉减值。
