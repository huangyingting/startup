      - - 7B 设备知识库（数据护城河）
        - 最大的专有设备指纹数据库带来更高资产识别准确率和行为基线；小安装基础更难复制
        - Claroty 声称支持 450+ 协议；Nozomi AI 驱动基线；Microsoft 更大规模 AI — 所有厂商都在扩展协议库和 AI 指纹
        - 中 — 护城河存在但差距会缩小；3-5 年可防御窗口
        - 借 ServiceNow 8,100+ 企业客户基础继续扩展设备数据库；跟踪竞争对手协议库扩展公告；尽调时要求 Armis 提供第三方协议覆盖基准
      - - ServiceNow 分销杠杆（收购后）
        - 收购后可触达 ServiceNow 8,100+ 企业客户和 $10B+ 平台，作为分销和捆绑渠道
        - Palo Alto XSIAM 提供类似平台捆绑，且有执行优势；ServiceNow 整合时间表和深度不确定
        - 低-中 — 结构性优势存在，但整合时间表有执行风险；收益可能需要 12-24 个月才兑现
        - 跟踪 ServiceNow Q2-Q3 2026 产品公告，关注 Armis Centrix 集成发布；核实收购后 Armis 保留专属产品路线图团队
      - - Microsoft Defender for IoT（零价格威胁）
        - 对 M365 E5 企业客户，Microsoft Defender for IoT 实际免费；以 IT 为中心的 CISO 可能接受够用覆盖，而不是为 Armis 支付 $20-50/device/year
        - Microsoft 在企业协议中零增量成本捆绑，造成 Armis 在 Microsoft 标准化环境中无法匹配的定价压力
        - 高 — 零价格威胁是最难处理的竞争动态；对以 IT/IoT 为中心的细分影响最直接
        - Armis 必须靠运营 ROI 取胜（ITSM 集成、OT 广度、异构环境），不能只靠安全功能；ServiceNow 捆绑提供替代商业路径；跟踪 Microsoft OT 协议扩展公告
      - - OT/ICS 协议商品化
        - Armis 协议库广度是当前护城河；随着所有厂商扩展协议库，发现能力正在商品化，差异化转向别处
        - Claroty、Nozomi、Dragos 都在扩充协议库；Microsoft AI 正把 IT 设备指纹识别做规模化；执行缺口（无内联阻断）是所有 CPS 领导者的结构性弱点
        - 中 — 3-5 年窗口；执行缺口是结构性弱点，四家 MQ 领导者都尚未原生解决
        - Armis 必须在执行合作伙伴体系中证明价值（Cisco ISE、Palo Alto NGFW 集成）；在 SOAR 集成和合规报告自动化上加码，这块商品化更慢
      - - OT 威胁情报深度缺口（vs. Dragos）
        - Armis ARMIS AI 提供 OT 威胁情报，但 Dragos 在高风险工业环境里仍拥有同类最佳的 OT 专属威胁组织情报和 IR 处置剧本
        - Dragos 的行业专属威胁情报（CHERNOVITE、VOLTZITE）和 IR 预留服务会形成共同部署，而不是替代；这会压低 Armis 在关键基础设施客户中的整账户渗透率
        - 中 — 形成多宿主模式（Armis + Dragos 共同部署），而非替代；限制高风险 OT 垂直行业的平均合同价值
        - Armis 应借 OTORIO 收购整合加深 OT 威胁情报投入；考虑与 Dragos 合作，或提供 Dragos 兼容的导出格式；评估 IR 预留服务能否在 Armis/ServiceNow 规模下跑通
      - - Nozomi-Mitsubishi OEM 分销风险
        - Mitsubishi Electric 可能把 Nozomi 传感器嵌入工业设备 OEM，在 Mitsubishi 大量工厂设备装机基础中形成内置竞争选项
        - Mitsubishi 在日本 / APAC 拥有庞大工业客户群；在设备中 OEM 捆绑 CPS 安全传感器，可能让 Nozomi 在 APAC OT 部署中成为默认选项
        - 中长期 — OEM 捆绑时间线 2-3 年；Mitsubishi 集中在日本 / APAC，短期内与 Armis 的美国 / 欧洲企业重心直接重叠有限
        - 跟踪 Mitsubishi 产品公告，观察 Nozomi OEM 捆绑；Armis 在 APAC 的主要存在感可能来自 ServiceNow 的 APAC 企业关系——尽调中需评估 APAC GTM 策略
