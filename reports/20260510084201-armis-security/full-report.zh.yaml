  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与建议
        blocks:
          - type: paragraph
            body: >
              Armis Security 的投资论点建立在四个收敛支柱上：(1) 网络物理系统 (CPS)、OT 和 IoT 安全的十年结构性增长市场，预计到 2028 年超过 $25B；(2) 平台领导地位，有 2025
              和 2026 年 Gartner Magic Quadrant Leader 位置、7-billion-device 知识库，以及唯一在单一控制台中覆盖 IT、OT、IoT 和 IoMT 的无 agent
              平台作为证据；(3) 企业客户密度，包括 9 家 Fortune 10 和 35+ 家 Fortune 100 客户，NPS 约 70；(4) ARR 爆发式增长，从 $200M（2024 年 8 月）到
              $300M（2025 年 8 月），YoY 超过 50%，并在收购公告时朝 $340M+ 轨迹推进。对 ServiceNow 收购的建议是：收购价公允——$7.75B 全现金价格、约 ~23x 过去 12 个月
              ARR，在增长速度、客户质量和平台定位下完全有支撑；但如果整合执行不及预期，安全边际有限。市场和产品支柱置信度高；财务支柱置信度中等，因为缺少 NRR 和 GAAP
              盈利能力披露。风险评级为中高，主要由整合执行风险（13 个月三笔收购）、Gartner Peer Insights 标出的 OT 深度缺口，以及 Microsoft Defender for IoT 在 SME
              的竞争压力驱动。反论点信号包括：在 $6.1B 融资轮后四周即宣布收购（暗示收购接触可能早于该轮融资）、OTORIO 80 名员工中裁减 45 人导致 OT 工程团队厚度风险，以及没有公开披露 NRR
              使流失风险评估不透明。收购论点成立的条件是：ServiceNow 通过 ITSM 分发协同把 ARR 增长维持在 30% YoY 以上；到 Q3 2026 前整合 OTORIO Titan OT
              能力；并在整合窗口期留住创始工程领导层。ServiceNow 投资的目标回报是牛市情景下三到五年 15-20% IRR，靠平台收入贡献实现；公允价值持有判断建立在 Armis 到 2027-2028 年成为
              ServiceNow 安全锚点、贡献 $700M+ ARR 的前提上。
