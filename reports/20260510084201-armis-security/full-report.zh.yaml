  productSummary: >-
    Armis Centrix™ 是面向网络暴露管理的云原生 SaaS 平台。模块包括：资产管理与安全（CAASM）、OT/ICS 安全（借助 OTORIO Titan 支持本地 / 隔离网络）、医疗设备 / IoMT
    安全、漏洞管理检测与响应（VMDR）、应用安全，以及 Early Warning（威胁情报）。平台通过 REST API v3 和 Python SDK 接入 200+ 个安全与 IT
