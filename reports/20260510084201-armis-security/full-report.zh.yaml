          - type: callout
            title: Application Security SKU 扩张引发平台聚焦问题
            body: >-
              2025 年推出 Centrix for Application Security，是 Armis 第一次大规模从传统网络、OT、IoT、IoMT 安全领域进入 SDLC 和 AppSec
              市场。这个市场已有深度扎根的既有工具（Snyk、Veracode、Checkmarx、GitHub Advanced Security），买方画像也不同（AppSec 工程师，而非 CISO 和 IT
              安全团队）。投资者和客户需要评估：Armis 是否具备在 AppSec 竞争的工程深度和 GTM 能力；或者，这次扩张是否稀释了 OT/IoT/IoMT 差异化——正是这项差异化支撑 ServiceNow 对
