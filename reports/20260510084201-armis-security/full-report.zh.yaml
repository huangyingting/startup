      - number: '7.5'
        title: 财务模型风险与缓释
        blocks:
          - type: paragraph
            body: >
              ServiceNow 为 Armis 支付 $7.75B，按 2025 年 12 月 $340M ARR 计算，约为 23x 过去 12 个月 ARR。这带来 商誉减值风险：如果 ARR
              增长放缓或整合协同未兑现，ServiceNow 将面临压力，需要减记部分收购溢价。总融资额超过 $1.17B（从 seed 到 $435M Series E），意味着现有投资者的回报预期已计入收购价格。Armis
              没有公开披露现金消耗率、EBITDA 利润率或 GAAP 净利润。

              没有 NRR 或 GRR，客户流失风险无法量化。缺少这些指标是负面信号；表现良好的 SaaS 公司通常会披露 NRR，以验证先落地再扩张 效率。收购后，股权激励对 GAAP 盈利能力的负担未知，因为
              ServiceNow 尚未单独披露 Armis 分部财务。关键缓释因素：$300M+ ARR 且 YoY 增长 50%+，提供收入耐久性；FedRAMP 和 IL5 认证在联邦客户群创造转换成本护城河；2025
              和 2026 MQ 的 Gartner Leader 地位形成可引用的市场位置；ServiceNow $28B+ 年收入提供财力深厚的母公司，可为长期平台投资供血。论点破裂触发器：(1) 收购后财务披露显示
              NRR 低于 110%；(2) OTORIO Titan 整合延后至 Q3 2026 之后，且 OT 深度缺口评论持续；(3) FedRAMP High 被拒或延迟超过 18 个月；(4) CEO Yevgeny
              Dibrov 或 CTO Nadir Izrael 在收购交割后 12-18 个月内离职；(5) ServiceNow 报告 Armis 相关商誉减值费用。监控指标包括 ServiceNow 季度业绩中对
              Armis ARR 的评论、FedRAMP 授权登记库的 High 状态、Gartner Peer Insights 评分轨迹，以及 Armis 工程团队的 LinkedIn 人员增速。
