              ServiceNow 于 2025 年 12 月 22 日宣布以 $7.75B 全现金收购 Armis Security，交易在 2026 年 4 月 19-20 日交割。按公告时公司估计 $340M ARR
              计算，收购价约为 22.8x 过去 12 个月 ARR；这一 ARR 从 2025 年 8 月报告的 $300M ARR 里程碑和 50%+ YoY 增长轨迹外推而来。Armis 最后一轮私募融资是在 2025
              年 11 月完成的 $435M Series E，估值 $6.1B——距离收购公告仅四周——由 Goldman Sachs Alternatives 领投。$7.75B 收购价较 Series E 估值溢价
              27%，暗示 ServiceNow 的收购接触很可能与最后一轮融资重叠。七轮以上披露融资合计超过 $1.17B，投资者包括 Google Ventures、CapitalG、Brookfield Asset
              Management、Goldman Sachs Alternatives 和 Insight Partners。23x ARR 倍数符合在耐久结构性市场中、ARR YoY 增长 40-50% 的优质 SaaS
              公司：CrowdStrike 以 $3.3B+ ARR（>30% YoY）约 21x ARR 交易，确认大型、高增长网络安全平台在公开市场可获得 20-25x ARR。包括 ServiceNow 8-K 披露和
              S-4/A 注册声明在内的公开 SEC 文件，提供了与交易相关的最完整公开财务陈述与保证，不过 Armis 专属分部财务未单独披露。$1.17B+
              累计融资跨多轮优先股批次带来的稀释和优先权悬置，会通过收购分配瀑布流转；清算优先权分析没有公开披露。任何 ServiceNow 投资者若评估该收购的价值创造，入场纪律都需要跟踪季度业绩评论中的 Armis ARR
              贡献，并观察运营费用项目中是否出现整合成本费用。
