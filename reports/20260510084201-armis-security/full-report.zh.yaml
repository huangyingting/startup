      - number: '2.4'
        title: 增长驱动与采用催化剂
        blocks:
          - type: paragraph
            body: >-
              四股结构性力量正在推动 CPS 保护平台市场在 2026 及之后持续增长。

              监管要求提供了最持久的需求底座。EU NIS2 Directive 于 October 2024 生效，要求 18 个关键行业建立资产盘点、网络监控和事件响应能力——为欧洲运营中的 OT 与 IoT
              环境创造非自由裁量的网络安全支出。不合规处罚包括数百万欧元罚款和高管责任。美国监管进一步施压：面向联网医疗设备（2023）和 OT 制造环境（2025）的 FDA 网络安全指南要求
              security-by-design 和上市后漏洞管理，直接利好具备设备发现和风险排序能力的平台。CISA 资产可见性指令同样要求联邦机构和关键基础设施运营方维护完整设备清单。

              OT/IT 融合在结构上扩大了可触达设备池。数字化转型和 Industry 4.0 计划让过去隔离的 OT 网络上线，形成可被威胁行为者触达、却对 IT 中心安全工具不可见的联网 SCADA 系统、PLC
              和传感器。Armis 估计，60-70% 的企业联网资产没有被传统终端代理覆盖——这是 Armis 平台为之而建的结构性缺口。

              威胁升级带来紧迫性。2024 年，国家关联攻击针对关键基础设施增加 49%，制造业占工业网络事件的 25.7%。Change Healthcare、Colonial Pipeline
              等高知名度勒索事件提升了董事会对 OT/IoT 安全风险的认知，加速预算审批。AI 驱动的威胁工具让针对 OT 环境的攻击更复杂、更定向，抬升了 AI 驱动防御平台的 ROI。

              设备激增支撑长期需求。全球联网 IoT 设备为 19.8B 台（2025-2026），预计到 2034 增至 40.6B；CPS 平台覆盖的攻击面会在监管压力之外继续扩大，为未来十年提供结构性顺风。
