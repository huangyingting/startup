  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Armis 所处市场是 Gartner 定义的「CPS Protection Platforms」品类。Gartner 于 2025 通过专门的 Magic Quadrant 正式确立该品类（评估 13
              家供应商），并延续至 2026。2026 MQ 命名四家 Leaders：Armis、Claroty、Dragos 和 Nozomi Networks——与 2025 的四家 Leaders
              相同。这种稳定性说明竞争格局正在成熟，头部领导者已站稳，短期内新进入者颠覆最高层级的可能性下降。Challengers 和 Niche Players 象限包括 Cisco、Fortinet、Tenable
              等，主要在相邻领域竞争（NAC、防火墙、漏洞管理），而非原生 CPS 保护。

              竞争格局可分为四层：（1）直接同业——pure-play CPS/OT/IoT 平台，面向同一买方，能力集重叠；（2）既有与相邻供应商——成熟 IT / 网络安全供应商，在既有企业关系上增加 OT/IoT
              模块；（3）平台整合者——大型平台供应商（Microsoft、Palo Alto、Cisco）推进安全整合，可通过捆绑替代点状方案；（4）现状与内部自建——手工 CMDB
              清单、无分析能力的被动抓包，或基于工业防火墙但没有专门 CPS 平台的可见性方案。Armis 在四层都面临实质竞争，短期最大威胁来自平台整合者的定价杠杆。
