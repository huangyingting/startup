  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台定义与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix 解决企业安全的核心问题：资产可见性。组织看不见设备，就无法保护设备；传统终端 agent 又漏掉 OT 控制器、医疗设备、智能楼宇系统和未托管 IoT，使企业攻击面中有 30% 至
              60% 对安全团队不可见。Armis 的解法是用 SPAN 和镜像端口被动监控所有网络流量，在不安装软件、不打断运营的情况下，对每台通信设备做指纹识别。客户流程从在网络汇聚点部署 Armis
              传感器（物理或虚拟设备）开始。数小时内，Centrix 发现并分类范围内所有资产，生成带实时 CMDB 信息的清单。随后，安全团队通过 Centrix 控制台或已集成的 SIEM、SOAR、ITSM
              工具消费告警、风险分数和修复工作流，按业务影响而不是原始信号量排定响应优先级。面向制造、公用事业、油气和关键基础设施等 OT 环境，Centrix 解码 500-plus 种工业协议，包括
              Modbus、DNP3、BACnet、Siemens S7、OPC-UA 和 PROFINET，从而在不干扰生产周期的情况下，为 PLC、SCADA 系统和工业控制器建立行为基线。医疗场景中，IoMT 模块增加按
              FDA 和 HIPAA 映射的临床影响评分，让生物医学工程师和安全团队按患者风险而不是原始 CVSS
              分数分诊输液泵、影像系统和呼吸机。统一的客户承诺是：持续、全面的资产智能，不打断运营，也不增加部署摩擦；Centrix 因而成为企业环境中每台联网设备的权威事实源。这让 Armis 位于 Gartner 定义的
              CPS 保护平台 市场中，成为同时覆盖 IT、OT、IoT 和 IoMT、范围最广的单一平台选择，且运行在一个云实例中。
