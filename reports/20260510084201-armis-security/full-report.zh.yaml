  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险严重性排序与概览
        blocks:
          - type: paragraph
            body: >
              Armis Security 进入 ServiceNow 整合阶段时，风险画像高于独立 pre-IPO 公司。三大风险群——整合执行、监管合规、竞争性 OT
              替代——彼此相连：整合延迟会侵蚀工程聚焦，进而拉低产品质量，并为监管不合规和客户流失创造条件。按约 23x 过去 12 个月 ARR 完成的 $7.75B 收购，如果 ARR 增长显著减速，会带来商誉减值风险。

              按预期剩余影响排序：(1) 整合执行风险——严重性最高；13 个月内三笔收购（2024 年 2 月 CTCI、2024 年 4 月 Silk Security $150M、2025 年 3 月 OTORIO
              $120M），且记录显示 OTORIO 在收购交割后数日内裁撤约 80 名员工中的 45 人，引入 OT Titan 代码库分裂；(2) 监管与合规风险——FedRAMP High 授权仍在推进，任何延迟都会阻断
              DoD 扩张；考虑到部署在 EU 的遥测传感器，GDPR 执法风险也不可忽视；(3) 竞争性 OT 深度风险——2025 年 12 月，一家 $30B+ 制造商在 Gartner Peer Insights 给出
              3.0/5 评论，指出 OT 告警缺口，表明 Claroty 和 Dragos 可能在工业 OT 垂直替代 Armis；(4) ServiceNow 依赖风险——Armis
              现在作为业务单元运营，路线图和资本配置由 ServiceNow 控制；(5) 财务模型风险——未披露 NRR、GRR
              或现金消耗率，造成尽调不透明。投资含义：这是一个高增长平台，合规护城河强；但风险调整回报取决于整合执行质量、OT 缺口关闭，以及创始人在整合窗口期留任。
