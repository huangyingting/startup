      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Claroty（New York，创立 2015）是 Armis 最接近的同业：二者都是 Gartner Leaders，均为无代理 / 被动架构，并同时覆盖 OT、IoT 和 IoMT。Claroty 通过
              January 2026 的 $100M 战略融资，累计融资 $900M+，估值 $3B+，并据报正准备以 $3.5-4B 估值 IPO。Claroty 估算 ARR 在 early 2026 达到
              $200M+，员工 800+，客户覆盖 20% 的 Fortune 100。Claroty 的主要差异化是更深的 OT 协议解码——在 ladder-logic 层覆盖 Siemens S7、Rockwell
              CIP、Schneider Modbus/TCP——以及 OT 中心买方感知更低的 TCO。Armis 在广度（所有环境）领先，Claroty 在深度（纯 OT/ICS 环境）领先。

              Nozomi Networks（San Francisco，创立 2013）于 September 2025 被 Mitsubishi Electric 收购，隐含估值约
              $800M，独立路径终止。被收购前，Nozomi 收入 $75M（累计融资约 $266M），员工约 390 人，在能源、石油 / 天然气和公用事业尤其强。收购后，Nozomi 嵌入 Mitsubishi 的 OT
              生态，并可能通过 Mitsubishi 工业客户基础获得分发；但其战略独立性和开发速度存在不确定性。该收购降低了独立竞争威胁，同时可能通过 OEM / 渠道提升 Nozomi 在工业垂直的触达。

              Dragos（Washington DC，创立 2016）是明确的 OT 威胁情报领导者：2024 年收入 $154M，累计融资 $439M、估值 $1.7B，员工 566-609 人，并在 2026
              Gartner MQ 中被评为 Leader。Dragos 的差异化来自威胁情报（OT 特定 playbook、CHERNOVITE 和 VOLTZITE 等行业特定威胁组织）、事件响应服务，以及在电力、石油 /
              天然气、制造和水务行业的深度专长。2026 Gartner 报告批评 Dragos 在 North America 以外触达有限、渠道伙伴覆盖有缺口——公司正通过 pure-channel GTM
              策略积极修补。Dragos 于 2024 收购 Network Perception，补充网络安全策略管理能力。
