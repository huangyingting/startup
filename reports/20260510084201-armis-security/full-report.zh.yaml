            claimRefs:
              - CE032
              - CE033
              - CE034
          - type: callout
            title: DoD IL5 授权打开最高价值联邦合同类别
            body: >-
              2026 年 2 月授予 Armis Federal LLC 的 DoD IL5 授权，是公司历史上最重要的合规里程碑之一。IL5 允许处理最高敏感级别的 Controlled Unclassified
              Information 和 National Security Systems 数据，覆盖了此前 Armis 无法触达的大多数 DoD program-of-record 合同。民用机构 FedRAMP
              Moderate 和国防 IL5 均已取得后，Armis 现在可以竞争整个美国联邦网络安全市场。联邦是 CPS 安全平台中 ACV 最高的垂直领域，交易规模通常是商业等价客户的 3 至 5
              倍；ServiceNow 收购后，联邦动能已成为主要增长向量。
