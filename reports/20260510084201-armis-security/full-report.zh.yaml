      - number: '8.3'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: >
              三个情景框定 ServiceNow 以 $7.75B 收购 Armis 的结果范围。牛市情景假设，借助 ServiceNow 8,000 人企业销售团队、对 7,700+ ServiceNow
              客户基础的激进交叉销售，以及 OTORIO 成功整合打开能源、公用事业和制造业的新工业 OT 合同，Armis 到 2027 年达到 $700M ARR。按 $700M 的 15x 远期 ARR，隐含平台价值为
              $10.5B，较收购价上行 35%。这要求交割后 18 个月内 ARR 增速从 50% 重新加速到 60%+。基准情景假设 2027 年 ARR 为 $500M，远期倍数为 15-17x，隐含平台价值
              $7.5-8.5B，基本与收购价一致。该情景假设 ServiceNow ITSM 协同在独立轨迹之上带来 20-30% 收入提升，OTORIO 整合在 Q4 2026 完成，Armis 保持 Gartner MQ
              Leader 位置。熊市情景假设整合扰动使 ARR 停在 $300M，Microsoft Defender for IoT 在中端市场替代 Armis，OT 深度缺口批评加速 Claroty 或 Dragos
              在工业垂直的替代，并且 ARR 倍数压缩至 15x——隐含价值 $4.5B，ServiceNow 可能产生商誉减值费用。关键下行触发器：NRR 低于 110%（表示流失超过扩张）、OTORIO Titan
              整合延迟超过 Q3 2026（确认 OT 深度缺口持续）、FedRAMP High 授权被拒或延迟，或 CEO/CTO 在 18 个月内离职。概率分布偏向基准：ServiceNow 的整合记录和 Armis 的
              Fortune 10 客户密度提供耐久下行支撑，但 13 个月三笔收购的整合负担是主要不确定性锚。
            claimRefs:
              - CV027
