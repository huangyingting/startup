      - number: '3.3'
        title: 既有厂商与相邻竞争者
        blocks:
          - type: paragraph
            body: >-
              Forescout Technologies（Campbell, CA）是既有 network access control（NAC）和设备可见性供应商，2020 年被 Advent
              International（PE）以 $1.9B 收购。Forescout 公布强劲 FY2025 业绩：230+ 个新客户、58 笔超过 $1M 的交易、91% gross dollar
              retention，金融服务收入增长 >25%、医疗收入增长 >24%，并且连续第三年超过 Rule of 40。Forescout 约 1,200 名员工、估算 $300-500M 收入，使其在 Armis
              被收购时规模更大；但其架构（本地 NAC、部分场景基于代理）不如 Armis 云原生。Forescout 借助既有企业 NAC 关系、渠道分发，以及通过 eyeSight 和 eyeInspect
              产品补充的资产可见性竞争。Forescout 被 Global InfoSec Awards（2025/2026）评为 CPS Security Market Leader，并在 Gartner MQ 中为
              Niche Player。

              Microsoft Defender for IoT 是最重要的平台整合威胁。持有 Microsoft 365 E5/Security 和 Azure Defender for Cloud
              许可的组织，可用极低增量成本获得该产品——在 Microsoft 企业协议中等同免费。其能力集在异构 OT 环境中不如 Armis 全面（尤其是非 Microsoft 协议栈和专有工业协议），但对
              Microsoft-first 的企业 IT 环境而言，捆绑定价压力很强。Microsoft 让 ServiceNow 收购 Armis 成为部分缓释因素——Armis 现在可以打包进 ServiceNow
              企业协议，并定位为与 Microsoft IT 中心可见性互补的 OT/IoT 层。

              Tenable OT Security（前身 Indegy，2019 被 Tenable 收购）提供以漏洞为中心的 OT 发现和风险管理，受益于 Tenable 既有 IT 漏洞管理客户基础。Tenable
              是上市公司（TENB，约 $5.3B 市值），这带来财务持续性，但也让创新更慢。Tenable OT 更多围绕漏洞评分以及与 Tenable.sc / Tenable.io 的集成竞争，而非实时威胁检测，因此常与
              Armis 共同部署（漏洞管理 + 资产情报），而不是纯替换型竞争对手。Palo Alto Networks（PANW）将 IoT Security 作为 XSIAM/SASE 平台模块集成，通过防火墙原生执行和
              Prisma SD-WAN 竞争——这是 Armis 缺少的覆盖优势（Armis 能检测，但无法 inline 阻断）。
