      - number: '6.5'
        title: 扩张动力与集中度风险
        blocks:
          - type: paragraph
            body: >
              Armis 采用先落地再扩张模式，客户通常先从一个产品模块开始——最常见是 CAASM (Cyber Asset Attack Surface Management) 或 IoT Security——随后添加
              OT Security、Healthcare Security (IoMT)、Vulnerability Management and Detection Response (VMDR)、Early
              Warning（威胁情报）等模块。模块扩张是现有安装基数中的主要 ARR 增长驱动，与新增客户获取 互补。ARR 在 12 个月内从 $200M 增至 $300M，意味着扩张收入可观，不过 Armis 未拆分扩张
              ARR 与新客户 ARR。

              客户集中度风险真实存在，但需要细分看。9 家 Fortune 10 成为客户，是强客户标识背书故事，也带来品牌集中度风险——这个客户群 中任何公开不满或流失都会被过度放大。鉴于 Fortune 100
              客户基础广泛，单一客户似乎不构成重大收入集中度。渠道集中度风险已随 ServiceNow 收购而改变：Armis 现在是 ServiceNow 业务单元，未来分发会越来越多经由 ServiceNow
              企业销售团队。这引入一种风险：ServiceNow 自身 IT 工作流 客户可能被引向原生 ServiceNow 安全能力，而不是 Armis 专属模块。Application Security（2025）和
              Automotive 等新垂直是扩张押注，扩大了可触达客户集合。
