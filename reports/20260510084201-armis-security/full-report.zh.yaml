          tone: neutral
        - id: D7
          label: 第三方集成连接器（SIEM/EDR/NAC）
          detail: 200-plus 个连接器，包括 Splunk、CrowdStrike、Cisco ISE、Palo Alto XSOAR。依赖伙伴平台 API 稳定；重大 API 变更需要 Armis 更新连接器。
          tone: neutral
