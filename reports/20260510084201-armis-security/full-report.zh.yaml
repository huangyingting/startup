    claimRefs:
      - CE003
      - CE004
      - CE005
      - CE007
      - CE025
      - CE029
      - CE030
      - CE031
    rows:
      - - 资产发现与清单
        - 手工电子表格、周期性主动扫描、CMDB 手动更新；OT 和 IoT 中 30-60% 资产会漏掉
        - 通过 SPAN/tap 持续被动发现；实时自动分类并丰富 CMDB
        - 24-72 小时内完成资产清单；省掉手工 CMDB 更新工作
        - 初始传感器部署需要网络变更管理；为保证准确性，需要持续与 ServiceNow 做 CMDB 对账
      - - OT 威胁检测
        - 基于签名的 IDS 或手工日志审查；工业协议内容对 IT 中心化 SIEM 不透明
        - 对 Modbus、DNP3、BACnet、S7、OPC-UA、PROFINET 做深度包检测；行为基线；异常告警
        - 能发现 IT 安全工具看不到的协议级异常和未授权命令；零运营扰动
        - 仅被动意味着没有内联阻断；执行需要第三方 NAC 或防火墙集成
      - - 医疗设备风险优先级排序
        - 只看 CVSS 会把打印机和 ICU 呼吸机同等处理；生物医学团队被无差别告警淹没
        - 临床影响评分把设备关键性（连接患者、维持生命）映射到风险分数；纳入 HIPAA/FDA 语境
        - 优先处理影响患者的设备，从而减少生物医学安全告警积压
        - 临床影响评分方法未经独立审计；需要按医疗场景调优部署
      - - 漏洞优先级排序与修复
        - Tenable/Qualys 扫描会产生成千上万条 CVE；手工分诊耗时数周；OT 设备不兼容主动扫描
        - Centrix VMDR 把被动发现与 AI 风险评分（Silk Security IP）结合，按可利用性、暴露度和业务影响对 CVE 排序
        - 按公司说法，分析师分诊时间减少 ~90%；被动漏洞识别对 OT 安全
        - VMDR 是新 SKU；分诊准确性说法未独立基准测试；CVE 数据依赖 NVD/厂商公告
      - - 监管合规报告
        - 手工资产清单与合规框架交叉比对；过期电子表格导致审计发现
        - Centrix 自动把所有发现资产映射到 NERC CIP、HIPAA、IEC 62443、NIST SP 800-82 控制项
        - 自动生成合规证据；为 CISO 和审计团队提供实时态势仪表盘
        - 框架映射准确性取决于资产分类是否正确；定制 / 遗留资产可能需要手工打标签
