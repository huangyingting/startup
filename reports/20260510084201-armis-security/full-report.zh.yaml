  - id: TV005
    slug: thesis-break-and-kill-triggers-table
    title: 推翻论点和终止触发条件表
    notes: |
      触发条件是阈值事件，一旦发生，将实质改变 ServiceNow 股东评估 Armis 收购价值创造的投资论点。监测频率反映各类触发条件的紧迫性。
    columns:
