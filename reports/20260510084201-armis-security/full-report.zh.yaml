      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Armis 面临美国联邦、EU 以及特定行业框架下的多司法辖区监管敞口。在美国，FedRAMP Moderate 授权已维持，DoD Impact Level 5 (IL5) 通过 Armis Federal
              LLC 于 2026 年 2 月取得。FedRAMP High——最敏感 DoD 和情报社区合同所需——仍在推进。若被拒或长期延迟，将限制联邦可服务市场，并可能触发需要 High 授权的 DoD
              机构流失。DISA 要求持续监控合规，带来年度重新认证义务。

              在 EU，Armis 必须遵守 GDPR，因为无 agent 传感器部署在 EU 客户网络内并收集设备遥测数据。所有 EU 客户都需要 Article 28 Data Processing Agreements
              (DPAs)。EU NIS2 Directive（2024 年 10 月生效）为 Armis 在关键基础设施行业（能源、医疗、交通）的 EU 客户带来合规义务，也要求 Armis
              作为供应商记录其安全实践。CISA ICS advisories 和 NIST NVD CVE disclosures 使 Armis 作为 OT 安全供应商承担持续漏洞披露义务。NIST NVD 搜索显示，截至
              2026 年 5 月，Armis 没有 critical 级平台 CVE，但 OTORIO 整合代码引入新的潜在暴露。从法律角度，Armis 的 Privacy Policy 和 Legal Compliance
              页面确认其 GDPR、CCPA、SOC 2 Type II 和 ISO 27001 姿态。ServiceNow S-4/A 注册声明提供了交易中承接的数据处理、IP 赔偿和诉讼敞口相关陈述与保证的最完整公开披露。
