      - number: '3.4'
        title: 差异化与切换成本
        blocks:
          - type: paragraph
            body: >-
              Armis 相对直接同业的主要差异化是：（1）广度——最大的专有设备知识库，覆盖 IT、OT、IoT 和 IoMT（包括 physical AI 和云资产）中的 7B+
              台设备；（2）架构——无代理、云原生、被动监控，IT 资产无需 SPAN/TAP（Wi-Fi 与 BLE radio-frequency 监控）；（3）平台扩展——Centrix 现已在单一平台中包含
              CAASM、VMDR、医疗 IoMT 安全和 OT 安全；（4）ServiceNow 集成——收购后，Armis 工作流可嵌入 ServiceNow ITSM/SOAR，通过 ServiceNow 的
              8,000+ 企业客户获得分发。

              该市场切换成本很高。完整平台迁移需要重建资产数据库（大型环境通常需要 3-6 个月被动学习）、重新部署检测策略和告警阈值、重新打通 SIEM/SOAR / 工单系统、重新培训 SOC 分析师，并重新建立 OT
              网络行为基线。这些切换成本为既有平台创造了有意义的 net revenue retention 优势。PeerSpot 和独立评论指出，Armis 与 Claroty
              客户都认为切换是高摩擦过程，尤其在工业环境中，重新部署需要变更管理和维护窗口协调。

              企业层面的 multi-homing 很常见：组织经常为 OT/ICS 环境部署一家供应商（往往是 Claroty 或 Dragos，追求深度），为 IT/IoT / 企业环境部署第二家供应商（往往是
              Armis），形成共存而非纯替换。该 multi-homing 模式既是风险（全平台采用更慢），也是机会（先用一个用例落地，再扩展到其他用例）。
