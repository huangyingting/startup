  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与品类定义
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix 主要竞争在 Gartner 定义的 Cyber-Physical Systems（CPS）Protection Platform 市场。Gartner 于 2025 通过 Magic
              Quadrant 正式确立该品类，评估 13 家供应商。CPS 保护平台提供无代理、被动的网络监控，可发现、分类并持续监控所有联网资产——包括 IT 设备、运营技术（OT/SCADA/PLC）、IoT
              传感器、楼宇系统和联网医疗设备——无需部署软件代理，也无需可能扰乱运营的主动扫描。

              必须精确定义市场边界，因为相邻品类（OT Security、IoT Security、「CPS Market」）的分析师估算会给出差异很大的 TAM。OT Security 市场（2025 年
              $22-23.5B）包含硬件、服务和传统网络监控工具，抬高了规模。IoT Security 市场（2024 年 $35.5B）更宽，还包含消费者 IoT 相邻细分。最窄且最相关的估算，是 TBRC 定义的 CPS
              Protection Platform 市场（2025 年 $10.05B）——这个子细分最接近 Gartner MQ 范围和 Armis 的直接竞争集合。

              市场不包括：面向受管计算机的 endpoint detection and response（EDR/EPP）；cloud security posture management（CSPM）；没有设备发现范围的纯
              IT SIEM 工具；以及消费者 IoT 安全。现状替代方案是用电子表格和周期性网络扫描手工盘点资产——这套流程会系统性低估非托管 OT 和 IoT 设备，让组织缺少完整风险可见性。

              Armis 的无代理架构对该市场是架构性必要条件：PLC、SCADA 系统、遗留医疗设备和嵌入式 IoT 通常运行专有或实时操作系统，无法支持软件代理。许多 OT
              设备还受保修和变更控制限制，不能安装代理。这个结构性约束形成了对无代理发现的持久需求，企业 EDR 供应商无法替代。
