          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.4'
        title: 可比估值与市场基准
        blocks:
          - type: paragraph
            body: >
              Armis 按过去期 ARR 计约 23x 的收购倍数，落在高增长网络安全 SaaS 龙头的公允区间内：高于成熟上市公司倍数，但低于私营 OT 安全同业。CrowdStrike 是高增长、云原生安全 SaaS
              最清晰的上市可比公司；其 ARR 超过 $3.3B、增长 30%+，交易倍数约 21x ARR，为投资人如何给大规模、耐久的网络安全平台定价提供公开市场锚点。Tenable 是增速较慢的漏洞管理老牌厂商，增长约
              13%，交易倍数约 6.5x 收入，显示增速放缓会带来严重倍数压缩。私营 OT 安全市场里，Armis 最直接的竞争对手 Claroty 以估算 $100M+ ARR 支撑 $3.5B 估值，隐含约 35x
              ARR；Nozomi Networks 的 Series E 以估算 $50M ARR 支撑 $1.5B 估值，也隐含约 30x ARR。两家私营 OT 同业收入基数小于 Armis
              收购时水平，倍数却更高，说明相对早期 OT 安全市场定价，Armis 的倍数偏保守。Armis 在 $340M ARR 时以 $7.75B、约 23x ARR 交易（对比 Claroty 约 $100M
              ARR、约 35x ARR），体现规模化后的预期倍数压缩——即便增速相近，更大的 ARR 基数也拿不到同样高的倍数。IDC 预计 CPS 保护市场到 2028 年超过 $25B，CAGR 20%+，确认 TAM
              扩张足以支撑市场领导者的溢价估值。Forrester Wave（Q4 2024）以及双重 Gartner MQ Leader 资质提供了平台定位的独立验证，也支撑相对 CrowdStrike 可比公司的溢价。
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
