      - - CEO 或 CTO 在 18 个月内离职
        - Yevgeny Dibrov 或 Nadir Izrael 在 October 2027 前离职
        - LinkedIn；ServiceNow 新闻稿
        - 推翻论点
        - 创始人主导的文化和技术愿景对 ARR 增长至关重要；大型企业整合风险加速
      - - FedRAMP High 授权被拒，或延迟超过 18 个月
        - 到 October 2027 仍无 FedRAMP High 授权
        - FedRAMP Marketplace 注册表
        - 重大
        - 将 Armis 联邦 TAM 限制在 Moderate 级别；阻断估计为当前联邦基数 2-3x 的涉密 DoD 和 IC 合同
      - - ServiceNow 商誉减值计提
        - 任何归因于 Armis 收购的减值计提
        - ServiceNow 10-K 或 10-Q 文件
        - 终止
        - 确认 ARR 轨迹撑不起收购溢价；需要根本性重估
