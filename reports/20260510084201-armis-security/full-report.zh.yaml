  - id: FM004
    title: 采用漏斗或价值链地图
    type: flow
    layout: wide
    summary: 企业 CPS 平台采用通常从触发式认知开始，经技术验证、采购再到扩展；最长延迟出现在 OT 专属验证阶段。
    data:
      nodes:
        - id: n1
          label: 触发式认知
          detail: 安全事件、勒索软件未遂、监管要求（NIS2、FDA）或 CISO 同行推荐，会激活对 OT/IoT 可见性的初始兴趣。
          tone: neutral
        - id: n2
          label: 发现评估 / POC
          detail: 在有限环境（1-2 个站点）部署无代理被动方案；CISO 和 OT 团队验证 Armis 能发现未知设备，且不扰动运营。
          tone: positive
        - id: n3
          label: 利益相关方对齐（IT + OT）
          detail: IT 安全 CISO 与 OT 工厂 / 设施经理都必须同意；OT 利益相关方担心安全工具扰动生产，这是最常见卡点。
          tone: warning
        - id: n4
          label: 采购 / 合同
          detail: 企业 / 政府采购流程包括法务审查、安全评估、供应商尽调，以及（政府场景下）FedRAMP/IL 验证；受监管行业耗时最长。
          tone: warning
        - id: n5
          label: 全面部署
          detail: 平台部署到所有站点；资产清单完成；CISO 和董事会汇报所需仪表盘可用。
          tone: positive
        - id: n6
          label: 平台扩展
          detail: 先落地再扩张：增加模块（VMDR、CAASM、医疗 IoMT）、增加站点 / 地域，并接入 ITSM/SOAR 工作流（现在由 ServiceNow 加速）。
          tone: positive
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
