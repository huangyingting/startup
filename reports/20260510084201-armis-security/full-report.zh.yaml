      - number: '3.5'
        title: 商品化风险与替代威胁
        blocks:
          - type: paragraph
            body: >-
              主要商品化风险来自供应商集合中资产发现能力趋同。随着 Armis、Claroty、Nozomi、Forescout 和 Microsoft 都扩展设备知识库，资产发现 /
              清单用例正在商品化——差异化转向威胁情报深度、合规报告、SOAR 集成和执行能力。Armis 的 7B 设备知识库是当前护城河，但如果竞争对手大举投资协议库和 AI 驱动设备指纹识别，这道护城河并不永久。

              Microsoft 捆绑风险是短期最负面的威胁。Microsoft 将 Defender for IoT 纳入企业协议，为 IT 中心组织提供了「足够好」选项。Gartner 分析师 Dale Peterson
              指出，Gartner 的 OT Visibility MQ 品类框架未完全捕捉 pure-OT security（Armis 深度弱于 Claroty/Dragos）与 IT/IoT
              convergence（Armis 领先）之间的差异。主要暴露在 IT / 企业 IoT 的组织，可能整合到 Microsoft，而不是购买 Armis——这一替代路径可通过 ServiceNow
              收购带来的生态定位得到部分缓释。

              Dragos 的 North American 聚焦有限（被 Gartner 2026 批评）以及 Nozomi 失去独立性（Mitsubishi 收购），都是 pure-play OT
              细分的不利信号：该整合利好 Armis 和 Claroty，但也表明独立 CPS 平台市场可能在未来 2-3 年继续通过收购或平台捆绑整合。2025-2026 收购浪潮（Mitsubishi 收购
              Nozomi、ServiceNow 收购 Armis、OTORIO 部分整合）说明市场正进入有利于规模玩家的整合阶段。
            claimRefs: []
