      - number: '1.4'
        title: 公司里程碑与规模指标
        blocks:
          - type: paragraph
            body: >
              Armis 从创立到被收购历时十年，里程碑覆盖创立、融资、产品开发、收购、监管授权和行业认可。公司 ARR 从零增长到 November 2025 的 $300M，并在 December 2025 增至
              $340M+，同比增速超过 50%。这一增长由不到十二个月内三起战略收购支撑：CTCI（February 2024，early warning）、Silk Security（April
              2024，$150M，漏洞修复）和 OTORIO（March 2025，$120M，OT/CPS 本地安全）。

              Armis 客户基础从 2019 覆盖超过 25% 的 Fortune 100，增长到 late 2025 超过 35%，并在 April 2026 覆盖九家 Fortune 10。已具名客户包括 United
              Airlines、Colgate-Palmolive、Mondelez International、Reckitt、Sysco Foods 和 Allergan，另有数十家联邦机构及州 /
              地方政府实体。平台不是靠代理实现部署规模，而是靠被动网络流量分析，使其能够在全球实时跟踪近 7 billion 台设备。

              在监管与合规侧，Armis 于 2023 取得 FedRAMP Moderate 和 DISA IL4 授权，并在 February 2026 取得 DoD Impact Level 5 授权，使其可服务
              Department of Defense 内的 Controlled Unclassified Information（CUI）环境。公司被评为 2026 Gartner Magic Quadrant for
              CPS Protection Platforms 的 Leader（连续第二年），也进入 Forrester Wave for IoT Security Solutions（Q3 2025）和 Unified
              Vulnerability Management Solutions（Q3 2025）。
