      - number: '5.6'
        title: 证据项
        blocks:
          - type: callout
            title: 无 agent 被动架构是 OT 与医疗环境的结构性护城河
            body: >-
              Armis 100% 被动、无 agent 的监控方式，是 OT 和医疗环境的结构性要求；主动扫描可能触发安全停机、使设备保修失效，或违反生物医学设备维护协议。没有主要 Gartner MQ Leader
              在单一云原生平台中提供横跨 IT、OT、IoT 和 IoMT 的完整被动覆盖。这种架构意味着 Armis 可以部署在实时生产 OT
              环境中，无需为主动扫描取得变更管理批准，大幅降低竞争方案面临的采购和部署摩擦。只被动监控的保证，也是医疗 CISO 评估临床网络安全工具时的患者安全信任信号。
            calloutType: insight
            claimRefs:
              - CE003
              - CE025
          - type: callout
            title: 13 个月三笔收购带来复合整合执行风险
            body: >-
              2024 年 2 月 CTCI、2024 年 4 月 Silk Security、2025 年 3 月 OTORIO，三者都在 13 个月内带来新技术、工程团队和客户承诺，需要整合。OTORIO
              收购整合风险最高：Armis 在交割后裁掉 80 名 OTORIO 员工中的 45 人（56%）；Titan 本地平台与 Centrix 云分析的整合截至 H1 2026 仍在推进；源自 OTORIO 的
              Secure Remote Access SKU 也列为整合中状态。三笔收购同时整合，还要维持核心平台发布，这是实质性执行风险，可能拖延路线图承诺，尤其是 FedRAMP High 和 OTORIO Titan
              云整合里程碑。
