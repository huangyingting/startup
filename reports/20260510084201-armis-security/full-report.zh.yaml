      - number: '1.3'
        title: 融资历史、估值与投资人基础
        blocks:
          - type: paragraph
            body: >
              被 ServiceNow 收购前，Armis 多轮融资合计约 $1.17 billion。公司于 2015 完成首轮种子融资，随后在 June 2017 完成 $17M Series A，April 2018
              完成 $30M Series B，April 2019 完成 $65M Series C，累计融资达到 $112M。Series C 由 Sequoia Capital 领投；该机构自 Armis 在以色列的
              Series A 起即支持公司。

              February 2020，Insight Partners 以 $1.1 billion 估值收购 Armis——当时为以色列最大网络安全退出——取得多数股权，并提供运营支持，包括客户引荐、上市协助和战略
              M&A 指导。Insight Partners 在后续轮次中仍为多数股东。February 2021，Armis 以 $2B 估值融资 $125M，投资人包括 Brookfield Technology
              Partners（领投）、CapitalG（Alphabet 成长基金）、Georgian 和 Insight Partners。November 2021，公司以 $3.4B 估值融资 $300M，由 One
              Equity Partners 领投；该机构进入董事会。

              经历一段运营成熟期后，Armis 于 October 2024 以 $4.2B 估值融资 $200M，由 General Catalyst 和 Alkeon Capital（新投资人）领投，既有投资人
              Brookfield Growth、Georgian、Insight Partners、CapitalG 和 One Equity Partners 参与。之后，公司在 August 2025 以 $4.5B
              估值完成 tender offer，并于 November 2025 以 $6.1B 估值完成上市前最后一轮 $435M 融资，由 Goldman Sachs Growth Equity 领投，CapitalG
              和新投资人 Evolution Equity Partners 参与。ServiceNow 以 $7.75B 收购，较上一轮私募估值溢价约 27%。
