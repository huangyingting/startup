    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与企业沿革
        blocks:
          - type: paragraph
            body: >
              Armis Inc.（以「Armis」或「Armis Security」名义运营）是一家总部位于 California 的网络安全公司，专注所有联网资产的网络暴露管理与安全——包括
              IT、OT、IoT、医疗设备（IoMT）、physical AI、代码和云环境。公司由 Yevgeny Dibrov 与 Nadir Izrael 于 late 2015 创立；二人均毕业于 Technion —
              Israel Institute of Technology，入职前曾在学术项目中合作。创始想法来自大量客户访谈：创始人没有先做技术，而是在 Tel Aviv 的 Nadir Izrael 公寓里冷拨 CISO
              和 IT 经理，寻找最大痛点，最终锁定非托管 IoT 设备造成的安全缺口。

              Armis 于 2017 结束隐身期时，将总部从 Tel Aviv 迁至 California 的 Palo Alto，随后在 New York、London、Munich 和 Bucharest 设立办公室。到
              2026，公司总部位于 California 的 San Francisco。除 February 2020 起短暂成为 Insight Partners 控股子公司外，Armis
              在整个独立生命周期中均为私营公司。

              公司核心产品 Armis Centrix™ 平台，是一个 AI
              驱动、无代理的网络暴露管理系统，可发现、分类并保护组织环境中的每一台联网设备——从笔记本和服务器，到工业控制系统、医疗设备和云工作负载——无需在终端安装软件代理。截至 early 2026，平台实时跟踪近 7
              billion 台设备。April 19-20, 2026，ServiceNow 完成 $7.75 billion 现金收购 Armis，并将其并入 ServiceNow 的 AI Control Tower
              安全与风险组合。
