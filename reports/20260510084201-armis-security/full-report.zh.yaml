          tone: warning
        - id: D3
          label: OTORIO Titan（本地 OT 引擎）
          detail: 面向涉密和隔离 OT 环境的物理隔离 OT 处理依赖。H1 2026 集成推进中。风险：收购后 OTORIO 集成团队从原 80 人降至 35 人。
          tone: warning
        - id: D4
          label: ServiceNow ITSM/CMDB 集成
          detail: 原生 ITSM 工作流集成和 CMDB 丰富；HAM/SAM Pro 自动化。收购后（April 2026）战略依赖升高。加深集成是收购后的主路线图。
