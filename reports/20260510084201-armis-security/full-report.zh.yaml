      - number: '1.5'
        title: 负面发现与证据缺口
        blocks:
          - type: paragraph
            body: >
              Armis 记录总体干净，未见重大安全事件或监管执法。主要负面发现来自收购后的裁员：March 2025 以 $120M 收购 OTORIO 后，Armis 裁撤 OTORIO 约 80 名员工中的 45
              人——超过被收购团队一半——主要涉及销售、营销、财务和 HR，保留约 35 名开发人员。该模式符合整合导向的 M&A：削减重复的 go-to-market 职能，同时保留产品工程能力；但这仍意味着 OTORIO
              组织足迹出现实质收缩。

              由于 Armis 仍为私营公司，多项证据不可得。收入、毛利率、经营亏损 / 收入、现金头寸、客户集中度指标和 net revenue retention（NRR）均未公开披露。公司披露
              ARR，但未披露合同结构、续约率或流失率。收购后，Armis 已成为 ServiceNow 子公司；其财务指标即便披露，也会并入 ServiceNow 合并财务报表。后续财务表现尽调需要依赖 ServiceNow
