        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >
              Armis Security 的客户群集中在大型企业，这些企业运营复杂、异构的网络环境，横跨传统 IT、运营技术 (OT) 和物联网 (IoT) 设备。公司渗透最深的垂直行业包括医疗（IoMT
              安全和临床设备管理）、制造与工业（OT/ICS 资产可见性与安全）、能源与公用事业（关键基础设施保护）、联邦政府（FedRAMP Moderate 和 DoD IL5 部署）、金融服务、教育和电信。

              从地域看，Armis 以美国为先——约 52% 员工在美国，反映主要客户集中度——同时在 EMEA 和 APAC 持续扩张。买方画像主要是 1,000+ 员工组织中的企业 CISO 和 VP of IT
              Security；不过 TrustRadius 数据确认，小到 1,500 名员工的学区也有部署（East Moline School District 37）。交易规模偏大：Fortune 500 和
              Global 2000 公司是最高优先级客户群；活跃客户中有 9 家 Fortune 10 和 35+ 家 Fortune 100，印证这一点。产品几乎完全以企业 SaaS 订阅销售，典型合同为 1-3
              年。渠道和合作伙伴覆盖 200+ 项技术集成，包括 Microsoft、Cisco、Palo Alto Networks 和 Elisity；Elisity 在其 微分段平台中使用 Armis Centrix
              API 做策略执行。
