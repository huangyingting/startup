      - number: '2.3'
        title: 买方与细分画像
        blocks:
          - type: paragraph
            body: >-
              Armis Centrix 的主要买方是企业 Chief Information Security Officer（CISO），其掌握 IT 安全预算，并负责所有联网资产的设备风险。在企业 IT（Fortune
              500+）中，CISO 通常通过年度安全工具预算采购，ROI 由设备可见性提升和此前非托管资产暴露降低来证明。该细分是 Armis 最强市场，并购交割时 Fortune 100 渗透率超过 35%。

              医疗行业的采购权更分散，由 CISO、Chief Medical Information Officer（CMIO）和 Biomedical Engineering 共同参与。主要采用触发因素是监管——FDA
              网络安全指南和 HIPAA 数据泄露通知义务带来合规驱动的紧迫性。针对医院系统的勒索软件攻击（如 Ascension Health、Change Healthcare）把医疗 CISO
              推到董事会视野，带动安全投资。Armis 在该垂直已形成势能，并拥有具名客户背书。

              联邦政府和 DoD 采购走不同路径，需要 FedRAMP 授权（Armis 拥有 FedRAMP Moderate、IL4 和 IL5），且往往需要正式 RFP / 招标流程。Armis Federal
              作为独立业务单元运营，配备专门的 DoD 和民事机构销售。预算来自国会拨款，并带有多年承诺，但采购周期通常为 12-18+ 个月，是 Armis 组合中最长的。

              工业和关键基础设施客户的买方动态最复杂：采购权在企业 CISO 与重视运营连续性的 OT / 工厂经理之间分割。OT 经理过去一直抵触可能扰乱生产的安全工具，因此 Armis
              无代理、仅被动的方法成为关键要求。EU 监管制造商的 NIS2 合规紧迫性加速了 EMEA 采用。Armis 收购 OTORIO 显著加深了 OT/ICS 产品可信度和客户关系。
