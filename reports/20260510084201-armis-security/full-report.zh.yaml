    approximationNotes: 层级边界是逻辑功能层，不是严格部署边界。Armis 平台是云原生 SaaS。OTORIO Titan 在概念上位于采集层和智能层之间，用于隔离 OT 部署。集成层代表 200+ 连接器；图中只展示部分示例。
    data:
      layers:
        - id: L1
          label: 采集层——传感器和协议解码器
          detail: >-
            Armis 虚拟和物理传感器部署在 SPAN/TAP 点；OTORIO Titan 面向隔离 OT 环境采用本地部署。对 500+ 协议进行深度包检测：Modbus、DNP3、BACnet、Siemens
            S7、OPC-UA、PROFINET、DICOM、HL7、BLE、Zigbee。仅提取元数据（不捕获载荷），经 TLS 1.3 加密后再传输到云端。
          tone: neutral
        - id: L2
          label: 智能层——AI Asset Intelligence Engine
          detail: >-
            Armis 云端 AI/ML 引擎：7B+ 设备行为指纹；CTCI 增强的 AI 威胁检测（Feb 2024）；Silk Security 风险优先级逻辑（Apr
            2024）。所有客户部署持续更新指纹数据库，形成复利式数据飞轮和准确率优势。行为基线实时标记异常协议命令和通信模式。
          tone: positive
        - id: L3
          label: 平台层——Centrix SaaS 模块
          detail: >-
            七个 Centrix SKU：Asset Management and Security；OT/ICS Security；Medical Device/IoMT Security；CAASM； VMDR（GA
            2025/2026）；Application Security（2025 早期采用）；Secure Remote Access（源自 OTORIO， 集成推进中）。单一控制台提供按角色划分的仪表盘，覆盖
            CISO、SOC 分析师、OT 工程师和生物医学团队。
          tone: positive
        - id: L4
          label: 执行层 — API、集成与生态
          detail: >-
            REST API v3；Python SDK（PyPI 上的 armis-sdk）；Armis Developer Portal（developers.armis.com）；GitHub
            组织（ArmisSecurity）。200-plus 个预置集成：ServiceNow（ITSM/CMDB/HAM/SAM）、Splunk、 Microsoft Sentinel、CrowdStrike、Palo
            Alto XSOAR、Cisco ISE、Aruba ClearPass、AWS、Azure、GCP。执行动作 交给已集成的 NAC/防火墙/SOAR——Armis 不做内联执行。
          tone: positive
        - id: L5
          label: 合规与信任层 — 认证与控制
          detail: >-
            FedRAMP Moderate（2023）、DISA IL4（2023）、DoD IL5（Feb 2026）、FedRAMP High（推进中）、SOC 2 Type II、ISO 27001、ISO
            27018、UK G-Cloud-14。静态数据采用 AES-256；传输中使用 TLS 1.3。Armis Federal LLC 子公司负责 AWS GovCloud 上的涉密部署。Early Warning
            System（暗网 + 蜜罐）提供主动威胁情报。
          tone: positive
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    slug: customer-workflow-operating-flow
    claimRefs:
      - CE003
      - CE005
      - CE007
      - CE009
      - CE025
      - CE027
      - CE029
      - CE030
      - CE028
    approximationNotes: 该流程代表典型企业从安装传感器到持续运营的部署旅程。医疗 IoMT 和 OT 工作流阶段相同，只是在第 3 和第 4 阶段 加入领域专属配置。时间线是 Armis 实施伙伴经验和公开部署指南给出的典型区间。
    data:
      nodes:
        - id: N1
          label: 1. 传感器部署
          detail: >-
            在 SPAN/TAP 点部署 Armis 虚拟 / 物理传感器（或面向隔离 OT 的 OTORIO Titan）。受监控端点不安装软件。典型时间线： 云 / IT 环境 1-7 天；需要变更管理的 OT/医疗环境
            4-12 周。
          tone: neutral
        - id: N2
          label: 2. 被动发现
          detail: 传感器被动捕获全部网络流量元数据。不主动扫描。不干扰 OT 设备或医疗设备。传感器启用后数小时内开始填充资产清单—— 完整盘点通常在 72 小时内完成。
          tone: positive
        - id: N3
          label: 3. AI 分类与指纹识别
          detail: Asset Intelligence Engine 用 7B-plus 指纹分类每台设备。识别厂商、型号、固件、OS、协议和行为基线。CTCI IP 叠加 AI 威胁检测层。医疗设备另做临床影响评分。
          tone: positive
        - id: N4
          label: 4. 风险评分与优先级排序
          detail: >-
            来自 Silk Security 的 AI 按可利用性、业务影响和威胁语境排序资产。IoMT 做临床影响评分。CAASM 量化总攻击面暴露。 Early Warning System
            标记正在瞄准客户资产类别的活跃威胁活动。
          tone: positive
        - id: N5
          label: 5. 告警与 SIEM/SOAR 投递
          detail: 告警送达 Centrix 控制台，或送入已集成的 SIEM（Splunk、Sentinel）和 SOAR（XSOAR、Tines）。分析师拿到的是带上下文、 排好优先级的事件，而不是原始特征码——从而减少告警疲劳。
          tone: positive
        - id: N6
          label: 6. 修复与 ITSM 工单
          detail: ServiceNow 集成会为高风险发现自动创建工单。NAC/防火墙集成支持隔离。CMDB 随资产状态变化自动更新。工单关闭会触发 Centrix 重新计算风险分。
          tone: positive
        - id: N7
          label: 7. 持续监控与合规
          detail: 资产清单 24/7 实时维护。为 NERC CIP、HIPAA、IEC 62443、NIST 提供合规态势仪表盘。新资产接入网络后数分钟内被发现。 闭环回到发现阶段，维持持续覆盖。
          tone: positive
      edges:
        - from: N1
          to: N2
        - from: N2
          to: N3
        - from: N3
          to: N4
        - from: N4
          to: N5
        - from: N5
          to: N6
        - from: N6
          to: N7
        - from: N7
          to: N2
