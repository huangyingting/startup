      - number: '5.5'
        title: 信任、合规与质量控制
        blocks:
          - type: paragraph
            body: >-
              Armis 拥有覆盖商业、联邦和国际标准的完整合规组合。联邦侧，2023 年取得的 FedRAMP Moderate 和 DISA IL4 覆盖美国联邦民用与 DoD 非机密工作负载；DISA 于 2026 年
              2 月 23 日签发的 DoD IL5 授权允许处理 Controlled Unclassified Information 和 National Security Systems 数据，这是大多数 DoD
              和情报社区部署的要求；FedRAMP High 正在推进，目标为 H2 2026。商业和国际合规方面，Armis 持有 SOC 2 Type II，覆盖安全、可用性和保密性信任服务准则；ISO 27001
              覆盖信息安全管理；ISO 27018 覆盖云端个人数据保护。UK Government G-Cloud-14 名录 让英国公共部门无需单独招标流程即可采购 Armis
              Centrix。平台只做被动监控，带来结构性隐私和安全优势：Centrix 只捕获元数据、从不注入流量，因此不会扰动 OT
              设备运行、外传数据包载荷或引发网络风暴；主动扫描替代方案无法匹配这一信任保证。传输中数据使用 TLS 1.3 加密，静态数据使用 AES-256 加密。基于角色的访问控制、SSO 与 SAML
              集成、审计日志是标准平台功能。医疗部署中，IoMT 模块把发现项映射到 HIPAA Security Rule controls，以及 2023 最终规则发布的 FDA 医疗设备网络安全指南。Armis 提供
              24/7 企业支持、公开状态页，以及关键漏洞情报交付的明确 SLA。Early Warning System
              针对客户环境中存在的资产类别，提前提供新型威胁行为者活动情报，使客户能在利用事件发生前主动打补丁并做网络分段。
