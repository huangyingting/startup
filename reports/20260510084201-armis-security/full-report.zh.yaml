companyProfile:
  summary: >-
    Armis Security 由 Yevgeny Dibrov（CEO）、Nadir Izrael（CTO）和 Tomer Schwartz 于 late 2015 创立，是一家网络安全平台公司，专注无代理网络暴露管理。旗舰产品
    Armis Centrix™ 以被动方式发现、分类并监控所有联网资产——IT、OT、IoT 和 IoMT——无需部署代理或主动扫描器。平台由 Armis Asset Intelligence Engine 支撑，全球跟踪 7
    billion+ 台设备，可在融合型企业环境中提供实时风险排序、漏洞管理和威胁检测。ServiceNow 于 April 2026 以 $7.75 billion 收购 Armis，将 Centrix 定位为 ServiceNow
    企业平台中的网络暴露管理层。
