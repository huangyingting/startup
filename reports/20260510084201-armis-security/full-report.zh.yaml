      - number: '2.2'
        title: 市场规模——多种分析师口径
        blocks:
          - type: paragraph
            body: >-
              OT 与 CPS 安全市场有大量分析师覆盖，但估算会因方法和范围定义而显著不同。MarketsAndMarkets 估算 OT 安全市场在 2025 年为 $23.47B，并以 16.5% CAGR 增至
              2030 年 $50.29B。Mordor Intelligence 的估算略低，2025 年 $22.15B，并以 13.74% CAGR 增至 2031 年 $47.95B。两者都预测市场在 5-6
              年内翻倍或接近翻倍，说明不同方法下均存在强结构性增长。

              更具体的代理指标是 CPS Security 市场——狭义定义排除仅硬件和仅服务的 OT 供应商——2025 年规模为 $10.05B，并以 13% CAGR 增至 2030 年 $18.51B（The
              Business Research Company）。这是公开市场中最接近 Gartner 定义的 CPS Protection Platform 市场的类比，而 Armis 正在其中竞争。

              相邻细分提供了额外市场背景。CAASM 市场（2025 年 $1.88B，以 25% CAGR 增至 2030 年 $5.72B）增长快于核心 OT 安全市场，驱动力来自企业对连续资产情报和 AI
              驱动风险排序的需求。医疗设备安全（2025 年 $7.41-8.47B）是独立且增长中的垂直市场，其中医疗 IoT 安全子细分以 28.8% CAGR 增长。更宽的 IoT 安全市场（2024 年
              $35.5B，以 26.8% CAGR 增至 2030 年 $141.8B）夸大了 Armis 可触达机会，但展示了设备激增问题的规模。

              设备激增是底层需求驱动：2025-2026 年全球约有 19.8 billion 台联网 IoT 设备（DemandSage），Ericsson 预计仅蜂窝 IoT 连接数就将在 2025 年底达到
              4.5B。设备足迹扩大，结构性抬升了无需代理即可发现和监控设备的平台价值。

              对 Armis 的自下而上 SAM 估算为 $3-8B：将每项资产每年 $20-50（来自 May 2025 伙伴价格表）应用于约 200 家 Fortune 500 企业，每家拥有 10,000-50,000
              项受管资产。这只是粗略代理；实际 SAM 取决于 Armis 在医疗、政府和中端市场渠道中的扩张，而这些渠道仍处早期。Armis 当前 $340M ARR 约占该 SAM 估算的
              4-11%，如果市场份额论点成立，仍有显著 runway。
