    title: 买方 / 细分市场地图
    type: matrix
    layout: wide
    summary: 买方特征随垂直行业显著变化；企业 IT 和医疗是 Armis 已验证的细分市场，政府和工业增长更快，但采购周期更长。
    data:
      columns:
        - 预算稳定性
        - ROI 可见度
        - 监管紧迫性
        - 销售周期长度
      rows:
        - label: 企业 IT / Fortune 500
          values:
            - label: 高
              tone: positive
              detail: 经常性安全运营支出预算；CISO 已有年度安全工具配置。
            - label: 高
              tone: positive
              detail: 能立即看见过去未追踪的设备；ROI 叙事清晰且见效快。
            - label: 中
              tone: neutral
              detail: 没有单一强制合规驱动，但 NIS2（若有 EU 业务）和网络保险要求会制造紧迫性。
            - label: 中
              tone: neutral
              detail: 典型企业安全交易为 3-6 个月；F500 的复杂采购可拉长至 9-12 个月。
        - label: 医疗 / 生命科学
          values:
            - label: 高
              tone: positive
              detail: 合规驱动的资本支出预算由董事会层面强制要求；医疗机构有制度化的安全预算科目。
            - label: 高
              tone: positive
              detail: FDA 要求让设备可见性成为合规必需项，而不是可选投资。
            - label: 高
              tone: positive
              detail: FDA 网络安全指南和 HIPAA 形成强监管紧迫性；医院 CISO 面临法律暴露。
            - label: 中
              tone: neutral
              detail: 医疗采购涉及临床 IT、生物医学和法务审查；通常 6-9 个月。
        - label: 联邦政府 / DoD
          values:
            - label: 高
              tone: positive
              detail: 国会拨款稳定且跨多年；获得 FedRAMP 授权的供应商有采购优势。
            - label: 中
              tone: neutral
              detail: ROI 与合规姿态绑定，而非直接效率提升；预算论证更难量化。
            - label: 高
              tone: positive
              detail: CISA 指令和 FedRAMP/IL5 要求制造强制支出；Armis 的 IL5 授权是一道准入门槛。
            - label: 高
              tone: warning
              detail: 政府采购走 RFP/招标；需 FedRAMP 评估；通常 12-18+ 个月。
        - label: 工业 / 关键基础设施
          values:
            - label: 中
              tone: neutral
              detail: OT 安全预算常在 IT 与运营之间拆分；不一定有单一预算负责人。
            - label: 中
              tone: neutral
              detail: ROI 叙事是运营连续性，而非直接节省成本；需要 OT 利益相关方买入。
            - label: 高
              tone: positive
              detail: NIS2（EU）、NERC CIP（North America）及类似强制要求带来合规驱动的紧迫性。
            - label: 高
              tone: warning
              detail: OT 环境需要更长 POC 和安全验证；通常 9-18 个月；Armis 必须证明不会扰动 OT。
        - label: 制造业（中端市场）
          values:
            - label: 中
              tone: neutral
              detail: IT 预算较小；网络安全常与运营资本支出优先事项竞争。
            - label: 中
              tone: neutral
              detail: 勒索软件保险要求带来一定紧迫性，但 ROI 可能支撑不了 Armis 定价层级。
            - label: 中
              tone: neutral
              detail: NIS2 适用于有 EU 业务的中端制造商；本土制造商强制要求较少。
