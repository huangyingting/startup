      - number: '7.4'
        title: 合作伙伴、依赖与集中度风险
        blocks:
          - type: paragraph
            body: >
              ServiceNow 收购从根本上重塑了 Armis 的依赖格局。收购前，Armis 依赖风险资本提供增长资本；收购后，Armis 依赖 ServiceNow 提供战略方向、GTM
              资源、产品路线图优先级和整合投入。ServiceNow 的企业软件优先事项未必与 Armis 的网络安全产品路线图完全一致，定价、包装和 GTM 决策也会受到 ServiceNow 更广泛 ITSM
              与平台战略影响。

              AWS GovCloud 依赖是最关键的基础设施集中度风险。Armis 的 FedRAMP 和 DoD IL5 授权范围绑定 AWS GovCloud；迁移到另一家 云服务商需要 12-24
              个月重新授权，限制其对 AWS 的谈判杠杆。客户集中度风险偏高：9 家 Fortune 10 使用 Armis，意味着即便只影响其中一部分高知名度客户，负面事件也可能产生不成比例的品牌和收入影响。200+
              集成合作伙伴生态依赖 Splunk、Microsoft、CrowdStrike、Palo Alto 的 API 稳定性。Elisity 技术合作确认生产 API 集成使用，但也说明 Armis API
              变更可能打断共享客户所用的下游合作伙伴产品。
