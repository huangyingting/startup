        - 首次收购后 NRR 披露低于 110%
        - ServiceNow 季度业绩；分析师评论
        - 推翻论点
        - 立即重估 $7.75B 商誉；表明流失风险超过先落地再扩张带来的扩张收益
      - - OTORIO Titan 整合拖过 Q3 2026
        - 到 September 2026 仍未发布 Titan-Centrix 统一 OT 模块
        - ServiceNow 产品发布；Gartner Peer Insights 分数轨迹
        - 重大
