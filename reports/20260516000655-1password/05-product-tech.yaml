        1Password Business and Enterprise add SSO, SCIM provisioning, advanced audit logs, custom security policies, and
        dedicated CSM support, positioning the product as an end-to-end secrets / credential platform for organisations.
      type: observed
      topic: product-surface-business
      sourceRefs:
