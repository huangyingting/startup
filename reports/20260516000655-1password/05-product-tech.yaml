        The customer workflow for individuals centres on autofill, password generation, and secure note storage; for
        teams it adds shared vaults, role-based-access-control, and SCIM-driven provisioning; for developers it adds
        CLI-driven secret retrieval into shell, CI, and Kubernetes workflows.
      type: observed
