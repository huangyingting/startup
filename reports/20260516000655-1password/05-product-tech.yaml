    - id: CE003
      statement: >-
        The product modules include the password vault (consumer + team), Secrets Automation (developer secrets),
        Connect (self-hosted secrets API), CLI, Shell Plugins, SCIM bridge, Trelica SaaS-access-governance (post-acq),
        and Kolide device-trust (post-acq).
      type: observed
      topic: product-modules
