callouts:
  - calloutType: strength
    title: Zero-knowledge Secret Key architecture is a durable differentiator
    body: >-
      The Secret Key construct (128-bit local user-side key + master password) means 1Password cannot decrypt user data
      even server-side. Combined with the open Connect server, OP CLI, and shell-plugins ecosystem, this gives 1Password
      a defensible position in both consumer and developer markets that credential-only password managers cannot easily
      replicate.
    claimRefs:
      - CE005
      - CE006
      - CE007
      - CE016
      - CE024
  - calloutType: risk
    title: Platform and extension-policy dependencies are the dominant technology risk
    body: >-
      Browser-extension store policy shifts (Chrome / Safari / Firefox), OS autofill API changes (Apple, Microsoft,
      Google), and IdP SCIM API breaking changes are the upstream risks materially outside 1Password's control. Trelica
      / Kolide acquisitions add SaaS-API and endpoint-telemetry dependency layers; each integration shift can affect
      product reliability and the XAM thesis.
    claimRefs:
      - CE022
      - CE023
      - CE008
      - CE033
