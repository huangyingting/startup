  claims:
    - id: CE001
      statement: >-
        1Password's consumer-facing product is a cross-platform password manager delivered as native apps for macOS,
        Windows, Linux, iOS, Android, plus browser extensions for Chrome, Firefox, Safari, Edge, and Brave — covering
        the dominant personal-credential workflows.
      type: observed
      topic: product-surface-consumer
      sourceRefs:
