figures:
  - id: FE001
    title: Product architecture stack
    type: stack
    layout: standard
    summary: >-
      Vertical stack of product layers from consumer-facing UI to platform / OS dependencies, showing where Secret Key
      zero-knowledge architecture sits relative to sync and storage.
    data:
      layers:
        - id: l1
          label: Native apps + browser extensions (UX)
          detail: >-
            macOS / Windows / Linux desktop apps; iOS / Android mobile apps; Chrome / Firefox / Safari / Edge / Brave
            browser extensions for in-page autofill and passkey UX.
        - id: l2
          label: Rust core library (crypto + sync primitives)
          detail: >-
            Shared Rust core implementing crypto primitives, vault model, and sync logic — reused across desktop,
            mobile, and CLI surfaces.
        - id: l3
          label: Secret Key + master password (local unlock)
          detail: >-
            128-bit Secret Key combined with the user-chosen master password derives the local decryption key; never
            transmitted to the server.
        - id: l4
          label: AES-256-GCM vault encryption
          detail: Vault items encrypted client-side with AES-256-GCM; only ciphertext + metadata leaves the device.
        - id: l5
          label: 1Password sync server (encrypted blob + metadata)
          detail: Server stores encrypted blobs and routing metadata; cannot decrypt user vault content (zero-knowledge).
        - id: l6
          label: Cloud-hosting infrastructure
          detail: >-
            Cloud-provider hosting for sync server, status, and account-management surfaces; provider not publicly named
            in detail.
        - id: l7
          label: IdP / SCIM bridge (provisioning)
          detail: >-
            SCIM bridge provisions users from Okta, Azure AD, Google Workspace; SSO via SAML / OIDC for enterprise
            tenants.
        - id: l8
          label: Connect (on-prem secrets API)
          detail: >-
            Self-hosted HTTPS service running in customer Docker / Kubernetes; mediates between CI / workloads and the
            1Password sync.
        - id: l9
          label: XAM modules — Kolide device trust, Trelica SaaS access governance
          detail: >-
            Post-acquisition modules layered on top of the password / secrets core, extending control to device posture
            and SaaS-app access.
    claimRefs:
