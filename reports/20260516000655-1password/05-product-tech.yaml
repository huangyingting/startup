chapter:
  number: 5
  title: Product & Technology
  summary: >-
    1Password is a cross-platform password / secrets manager whose architectural distinctive is the Secret Key
    zero-knowledge design. The product spans consumer, business, and developer surfaces with a Rust + native-app
    polyglot stack, AES-256-GCM end-to-end encryption, SOC2 Type II and ISO/IEC 27001 certifications, and 100+
    open-source repositories spanning the OP CLI, Connect server, shell-plugins, and SCIM bridge. Post-2024 the XAM
    (Extended Access Management) positioning extends the platform into device trust (Kolide acquisition 2024) and SaaS
    access governance (Trelica acquisition 2025). Maturity is "category leader" on the core vault; XAM integration is
    early-to-middle. Dominant tech-risk vectors are OS / browser-extension platform dependencies, IdP SCIM API drift,
    and reputation contagion from peer-incident breaches.
sections:
  - id: product-surface-and-workflow
    title: Product surface, modules, and customer workflow
    body: >-
      1Password in 2026 is a cross-platform password and secrets manager delivered as native apps for macOS, Windows,
      Linux, iOS, Android, and browser extensions for Chrome, Firefox, Safari, Edge, and Brave. The business and
      enterprise SKUs layer SSO, SCIM provisioning, advanced audit logs, custom security policies, and dedicated CSM
      support on top of the core vault product, positioning the package as an end-to-end secrets / credential platform
      for organisations rather than a single-feature autofill utility. The product modules span the password vault for
      consumers and teams, Secrets Automation for developer secrets, Connect (a self-hosted HTTPS service for in-cluster
      secret retrieval), the OP CLI, Shell Plugins, the SCIM bridge, plus the post-acquisition Trelica
      SaaS-access-governance and Kolide device-trust modules. The customer workflow for individuals centres on autofill,
      password generation, and secure note storage; for teams it adds shared vaults, role-based-access-control, and
      SCIM-driven provisioning; for developers it adds CLI-driven secret retrieval into shell, CI, and Kubernetes
      workflows. Passkey support is generally available across platforms and a strategic positioning vector: 1Password
      ships passkey storage and autofill, positioning password managers as passkey custodians in the post-password
      authentication era. Watchtower — proactive breach / weak-password monitoring — is a differentiated feature
      included in all paid tiers, leveraging Have I Been Pwned and proprietary heuristics to surface compromised
      credentials.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
