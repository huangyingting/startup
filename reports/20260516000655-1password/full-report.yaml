      - number: '8.2'
        title: Valuation context, comparables, scenarios, and sensitivity
        blocks:
          - type: paragraph
            body: >-
              The last public valuation mark is the January 2022 Series C reported by Bloomberg: ICONIQ-led, $6.8B
              post-money, $620M raise. Three AgileBits Inc. Form D filings on SEC EDGAR corroborate the public
              fundraising record at multiple round dates, providing primary-source verification for the round
              chronology. Cumulative funding through 2022 exceeded $920M per Crunchbase News and Reuters aggregates; no
              fresh primary round has been publicly reported through 2026-05-16. The implied 2026 valuation marker in
              the absence of a fresh round remains the prior Series C $6.8B mark. Bottom-up business-tier ARR — 150,000
              business customers × $7.99 list × ~25–50 seats / customer with enterprise discount — lands in a $360–720M
              range; consumer + developer add-ons bring total ARR plausibly to $440–920M. At the prior $6.8B mark this
              implies a 7.4–15.5x revenue multiple, bracketing the public-comp band (SaaS-credential / identity-security
              peer revenue multiples in 2026 span 5–12x ARR across CyberArk, Okta, HashiCorp public-comp band).
              Comparable set includes: CyberArk (publicly traded identity-security peer, gross-margin and multiple
              anchor); Okta (IdP peer with related identity-security positioning); Delinea / BeyondTrust / HashiCorp
              Vault (PAM / secrets-management peers relevant for XAM positioning collision risk); Bitwarden / Dashlane /
              Keeper / NordPass (direct competitive consumer / SMB comp set); LastPass (adverse-stance comp post-2022
              breach + restructuring illustrating reputation contagion impairment); HashiCorp Vault and Cloudflare
              zero-trust adjacencies. Forrester Wave and Gartner Peer Insights consistently position 1Password in leader
              / strong-performer tiers, supporting analyst-tier valuation premium. Password / credential-management TAM
              in 2026 is projected $3.5B–$5B per Fortune Business Insights, MarketsandMarkets, and Statista; XAM
              addressable market layers on top. Three-case scenarios: bull (revenue > $920M, XAM attach > 30%, no
              incident — valuation expands above $6.8B); base (revenue $440–920M band, XAM attach 10–20%, no incident —
              valuation roughly in-line to modestly below $6.8B mark); bear (revenue at low end, customer concentration
              > 25% top-10, an incident or peer-incident contagion, passkey substitution accelerates — meaningful
              multiple compression and down-round risk). Probability signals: bull ~15%, base ~60%, bear ~25%. Multiple
              sensitivity: 1x multiple shift on $700M base ARR is ~$0.7B (~10% of the Series C mark). Revenue
              sensitivity is the largest lever (2x spread on revenue input absent disclosure). XAM attach sensitivity:
              10–30% attach at $15–25/seat premium swings ARR by $200–500M and valuation by $2–5B at 10x.
              Adverse-valuation signals: 2022–2026 private-SaaS multiple compression has been material; cumulative
              $920M+ funding with no exit starts to create LP-liquidity pressure that could compress exit pricing power.
