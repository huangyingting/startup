figures:
  - id: FO001
    title: Company milestone timeline
    type: timeline
    layout: wide
    summary: >-
      1Password's trajectory spans a 2005 Toronto bootstrap, three priced rounds (2019/2020/2022) culminating in a $6.8B
      Series C, and 2024-2025 platform expansion through the Kolide and Trelica acquisitions.
    data:
      items:
        - date: '2005-01-01'
          label: AgileBits founded
          detail: Toronto-based bootstrap by Dave Teare and Roustem Karimov.
          tone: positive
        - date: '2019-11-13'
          label: Series A — $200M
          detail: Accel-led; first outside investment in 14 years.
          tone: positive
        - date: '2020-07-08'
          label: Series B — $100M
          detail: Accel; Slack Fund; Atlassian; IBM Ventures participated.
          tone: positive
        - date: '2021-01-01'
          label: Co-founder Teare steps back
          detail: Generational governance shift; CEO Shiner consolidates lead.
          tone: neutral
        - date: '2022-01-19'
          label: Series C — $620M / $6.8B
          detail: ICONIQ Growth and Tiger Global co-led; Lightspeed participating.
          tone: positive
        - date: '2023-01-01'
          label: LastPass-related intrusion attempt
          detail: Low-severity activity contained; no customer vaults accessed.
          tone: negative
        - date: '2023-06-01'
          label: Passkeys available
          detail: Save / autofill / login with passkey shipped to consumer and business.
          tone: positive
        - date: '2024-03-01'
          label: Acquired Kolide
          detail: Device-trust capability folded into XAM.
          tone: positive
        - date: '2024-04-01'
          label: Extended Access Management launched
          detail: Identity + device + access governance bundle.
          tone: positive
        - date: '2025-04-01'
          label: Acquired Trelica
          detail: SaaS access governance / shadow-IT visibility extension.
          tone: positive
        - date: '2026-05-16'
          label: Run-date snapshot
          detail: Series C remains the latest priced round; no IPO filing on record.
          tone: neutral
    approximationNotes: >-
      Year-only or month-only events are placed at the first day of the period; precise acquisition close dates are not
      disclosed for Kolide and Trelica.
