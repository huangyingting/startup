      - number: '7.2'
        title: Operational, technical, partner, and financial risks
        blocks:
          - type: paragraph
            body: >-
              Operational risks centre on availability and quality. Outage of 1Password's sync service would impact
              business-customer NPS even when planned (status-page tracked); multi-hour outages would materially affect
              renewals. Secret Key loss by end-users is a frequent customer-support pain — by design, an end-user who
              loses both Secret Key and Emergency Kit cannot recover the vault. Supply-chain compromise of a published
              binary or extension would cascade to all customers; bug bounty plus signed-release pipeline mitigate but
              do not eliminate the risk. Browser-extension store deplatforming (Chrome, Safari, Firefox policy changes)
              can disable autofill mid-session, affecting all consumer customers; mitigation is multi-channel native-app
              install. Quality regression risk (Apple Silicon migration cycles, browser-API churn) could damage the
              Wirecutter / PCMag / CNET / Wired top-pick reputation engine. Incident-response maturity is partially
              documented; MTTR and playbook details are private — an unclear response to a near-miss could erode
              customer confidence faster than the incident itself. Technical risks include cryptographic algorithm
              deprecation (AES-256-GCM remains industry standard but post-quantum migration is a multi-year
              crypto-agility challenge) and vulnerability in Connect or SCIM bridge running in customer infrastructure
              (customer-hosted, but vulnerabilities can damage 1Password reputation and trigger CISA advisories).
              Partner risks include cloud-hosting provider dependency (a single-cloud sync architecture creates
              concentration risk; multi-cloud not publicly disclosed), IdP / SCIM API breaking changes (Okta, Azure AD,
              Google Workspace vendor-policy shifts force re-certification cycles), and Have I Been Pwned dependency for
              Watchtower (HIBP availability shift would degrade breach-detection differentiation). Financial risks are
              concentration of capital in the Series C tranche (ICONIQ / Tiger Global / Accel patience requires no
              Series D but a market shock could compress valuation expectations), interest-rate / discount-rate
              sensitivity of the next-round mark, and LP-liquidity pressure from cumulative $920M+ funding with no exit.
              FX exposure exists from CAD-corporate / USD-revenue mix but is not publicly quantified. Kolide / Trelica
              integration execution is a known value-destruction vector if mishandled; integration is in early-to-middle
              2026 phase. Enterprise sales-cycle elongation in security-buyer markets increases CAC and delays ARR
              recognition; 2026 macroeconomic conditions are an active sensitivity.
