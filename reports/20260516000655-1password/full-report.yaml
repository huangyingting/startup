      - number: '3.2'
        title: Capability, pricing, GTM, and trust comparison
        blocks:
          - type: paragraph
            body: >-
              On capability — vaulting, sharing, SCIM/SSO, MFA enforcement, passkeys, SSH/CLI integration — 1Password
              and Bitwarden show near-parity at the top, with Keeper and Dashlane tracking close behind; LastPass's
              enterprise feature parity is reduced post-2023 incident. On pricing list-prices, Bitwarden remains the
              lowest-cost paid option, 1Password sits in the mid-tier ($7.99/user/month Business), and Keeper / Dashlane
              are positioned similarly; Proton Pass is priced as part of Proton Unlimited bundles. On GTM motion the
              consumer leaders rely on direct online sales and review-led acquisition while enterprise leaders rely on
              direct sales plus MSSP / channel resellers and SSO IdP partnerships. On trust/regulatory posture, all top
              five paid managers publish SOC 2 attestations; the LastPass 2022 breach campaign reset trust calculus and
              FedRAMP authorisation (which Keeper holds) is a meaningful differentiator for U.S. public-sector
              procurement. Gartner Peer Insights aggregate ratings show 1Password and Bitwarden in the top tier with
              4.5+ averages; Keeper and Dashlane track behind by half-star increments; LastPass shows recovering ratings
              post-2023. TrustRadius and Software Advice corroborate. 1Password's enterprise customer page lists named
              customers (Salesforce, GitLab, IBM, Slack); independent partner pages (GitLab, Intercom, PagerDuty)
              corroborate cross-pollination — though competitive proof is not exclusive to any single vendor. The
              Forrester Wave password-manager evaluation profiles 1Password, Bitwarden, Keeper, Dashlane, and Proton
              Pass; LastPass is profiled with concerns.
