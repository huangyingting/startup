      - number: '2.3'
        title: Drivers, constraints, adverse signals, and sizing gaps
        blocks:
          - type: paragraph
            body: >-
              Major adoption drivers in 2024–2026 include the post-LastPass-breach migration tailwind, regulatory
              pressure (EU NIS2, US SEC cyber-disclosure rules), and AI-era access governance for SaaS and model-API
              credentials. CISA, OWASP, and Gartner Cybersecurity research all treat the category as priority. Adverse
              constraints include free-tier substitutes from browser vendors, procurement friction in the mid-market,
              and broader skepticism following multi-vendor security incidents — the LastPass 2022/2023 breach campaign
              continues to shape buyer trust calculus in favour of paid alternatives with structural architecture
              differentiators. The passkey transition introduces a structural shift: as services adopt passkeys, the
              password-manager category moves toward "passkey + credential vault + access broker". Multi-homing across
              password manager, PAM, and secrets manager is increasing, capping share-of-wallet expansion within any
              single vendor. 1Password's Extended Access Management positioning is the company's direct response,
              bundling identity, device trust, and SaaS governance into one vendor relationship through the Kolide and
              Trelica acquisitions. Open sizing gaps include the lack of disclosed share denominators across the top
              paid managers, conflicting publisher estimates (FBI vs Statista vs MarketsandMarkets) and the absence of
              broken-out passkey vs password attribution in any 2026 analyst sizing. In aggregate the diligence picture
              is one of secular growth in absolute spend, structurally capped consumer pricing, and a widening platform
              opportunity for vendors who bundle credential vaulting with passkeys, device trust, and SaaS access
              governance under a single procurement contract.
