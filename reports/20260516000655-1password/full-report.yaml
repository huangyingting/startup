            title: Revenue and multiple are the largest sensitivity levers in the valuation
            body: >-
              A 2x spread on the bottom-up ARR input ($440–920M) is the single largest valuation lever; a 1x multiple
              shift on $700M base ARR is ~$0.7B (10% of Series C mark). XAM attach sensitivity adds an additional $2–5B
              swing at 10x for 10–30% attach. Management-disclosed financials would compress the revenue spread; XAM
              attach disclosure would resolve the most leveraged of the three sensitivities.
