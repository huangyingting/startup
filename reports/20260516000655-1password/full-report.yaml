            body: >-
              1Password's revenue is predominantly subscription-based across Individual, Families, Teams Starter Pack,
              Business, and Enterprise tiers, with developer add-ons (Secrets Automation, CLI, Connect) and
              post-acquisition Trelica / Kolide products as expansion surfaces. Per the public pricing page, Individual
              is $2.99/month and Families is $4.99/month (5 family members); Teams Starter Pack is $19.95/month (10
              users); Business is $7.99/user/month; Enterprise is custom-priced. Pricing is per-user-per-month at the
              business tier — the dominant SaaS-credential monetisation pattern; consumer plans are flat-fee per
              household. Revenue mix between consumer and business is not publicly disclosed; Bloomberg's 2022 $6.8B
              valuation reporting noted business / EPM as the primary growth engine but did not disclose split. Sales
              motion is mixed: direct-to-consumer through 1password.com and app stores for Individual / Families;
              direct-sales and partner-channel through 1password.com/business and
              1password.com/enterprise-password-manager for SMB and enterprise tiers. Sales cycle, CAC, and payback
              period are not publicly disclosed; the public business page describes value propositions (deployment ease,
              SSO/SCIM, audit logs) but stops short of unit-economic disclosure. Channel / reseller margins are not
              publicly disclosed either. Customer references (Salesforce, GitLab, IBM, Slack) corroborate enterprise
