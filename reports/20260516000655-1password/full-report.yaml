      - number: '2.2'
        title: Sizing lenses and buyer / user / payer segmentation
        blocks:
          - type: paragraph
            body: >-
              Public market sizing of the workforce password manager segment is fragmented across analyst publishers.
              Fortune Business Insights sizes the global password management market at approximately $3.0 billion in
              2024 with a forecast to roughly $10–11 billion by 2032 at a CAGR in the 17–22% range. MarketsandMarkets
              estimates the market at approximately $2.5 billion in the early 2020s growing at a 20%+ CAGR toward the
              late 2020s. Statista's passwords topic indicates steady year-over-year growth in both consumer adoption
              and breach-driven enterprise investment. Gartner cybersecurity research and the Forrester Wave for
              password managers both place workforce password management in late-growth (not maturity) with continued
              expansion at the top of the table. For 1Password the realistic Serviceable Addressable Market (SAM) is the
              subset of paid workforce password manager spend in regulated markets (US, EU, UK, Canada, Australia),
              perhaps 60–70% of the global market on a spend-weighted basis. The Serviceable Obtainable Market (SOM) at
              1Password's current scale (~150k business customers and 15M individuals claimed) is in the 20–30% range of
              paid password manager spend depending on methodology. Enterprise procurement weights pricing simplicity,
              SCIM/SSO support, and breach posture above feature parity, narrowing competitive selection to roughly five
              paid vendors. Consumer buyer/user/payer is the same individual; SMB splits buyer (IT generalist) from
              payer (business); enterprise splits user (every employee) from payer (IT cost center) with the CISO as
              primary buyer.
