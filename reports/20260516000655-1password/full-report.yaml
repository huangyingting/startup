      - number: '5.2'
        title: Architecture, dependencies, security, and compliance
        blocks:
          - type: paragraph
            body: >-
              1Password's architectural distinctive is the Secret Key — a 128-bit local user-side key combined with the
              master password — which is required for vault decryption, meaning 1Password cannot decrypt user data even
              server-side. This is a zero-knowledge architecture, materially distinct from credential-only password
              managers and the basis of the GDPR / CCPA story (servers receive only encrypted blobs and metadata, never
              decrypted secrets). 1Password Connect, an on-premises HTTPS service users self-host, provides a
              programmable interface from CI / Kubernetes workloads to retrieve secrets without round-tripping to the
              SaaS — an enterprise-secrets-management pattern that is becoming a key XAM enabler. Integrations span SCIM
              (Okta, Azure AD, Google Workspace), SSO (SAML, OIDC), Slack notifications, plus CLI / Terraform / GitHub
              Actions / Kubernetes operator surfaces, and over 100 marketplace integrations via shell-plugins and the OP
              CLI. Trust and security controls publicly documented include SOC2 Type II, ISO/IEC 27001, GDPR / CCPA
              processing addenda, end-to-end encryption with AES-256-GCM, plus a public bug-bounty programme and
              third-party security audits. The compliance roadmap supports FedRAMP-adjacent enterprise needs through
              configurable data residency, though full FedRAMP authorisation status is not publicly disclosed through
              2026-05-16. Critical platform dependencies include Apple, Microsoft, Google (OS and browser autofill
              APIs), the cloud-hosting provider, and IdP partners for SCIM provisioning — each of which introduces an
              upstream risk vector. Browser extension dependencies introduce policy risk: Chrome / Safari extension
              policy changes can directly impact autofill performance and approval requirements. Privacy posture remains
              strong: 1Password collects minimal metadata, the zero-knowledge architecture prevents the server from
              reading vault content, and the breach-blast-radius is reduced compared to credential-only competitors.
            claimRefs:
