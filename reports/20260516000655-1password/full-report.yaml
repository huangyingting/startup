  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment thesis, anti-thesis, recommendation, and risk
        blocks:
          - type: paragraph
            body: >-
              Investment thesis: 1Password in 2026 is a category-leader private SaaS with 150,000+ business customers,
              15M+ individuals, named enterprise references (Salesforce, GitLab, IBM, Slack, Intercom, PagerDuty), and a
              credible XAM expansion (Kolide + Trelica acquisitions) that extends password / secrets management into
              device trust and SaaS access governance. The anti-thesis is built on three private inputs: revenue / ARR
              undisclosed, NRR / GRR undisclosed, customer concentration undisclosed; plus a multi-year platform-native
              passkey storage substitution risk from Apple, Google, and Microsoft consumer-tier wallet share
              compression. Recommendation: track / research-more at the current implied valuation, with a buy-stance
              contingent on management-disclosed revenue, NRR, and customer concentration figures that would resolve the
              dominant diligence gaps. Confidence is medium — public evidence supports product / customer / risk quality
              but financial inputs (revenue, margin, retention) are private, capping confidence at the level supported
              by triangulation rather than disclosure. Risk rating is moderate — residual risk concentrates in
              peer-incident contagion, platform / extension policy shifts, and customer-concentration opacity, mitigated
              by above-baseline security posture (SOC2, ISO/IEC 27001, bug bounty, Trust Center, transparent privacy
              policy). On Investment KPI scoring (out of 10): market opportunity 8, product moat 8, management quality
              8, evidence quality 6, profitability path 6, revenue proof 5, risk profile 5, valuation support 5 — a
              category-leader product / customer / management story with revenue-proof and valuation-support gating the
              call.
