            body: >-
              Cash-on-hand and burn are not publicly disclosed for 1Password; given Series C size ($620 million reported
              by Bloomberg) and SaaS gross-margin profile, runway is unlikely to be a near-term constraint. Planned use
              of Series C funds, per Bloomberg's 2022 reporting and ICONIQ commentary, was product development, market
              expansion (especially business / enterprise), and selective acquisitions — operationalised via the Kolide
              (2024) and Trelica (2025) acquisitions. Next-round trigger is not telegraphed publicly; ICONIQ and Tiger
              Global's holdings imply patience, and the absence of a Series D announcement through 2026-05-16 indicates
              1Password is operating to extend the prior round. Debt and project-finance obligations are not visible in
              any public filing; 1Password is private and has not disclosed any debt structure. 1Password's acquisition
              cadence implies cash-availability for M&A; both Kolide and Trelica were reported via 1Password's blog
              without public deal-size disclosure but neither acquired entity had a publicly reported nine-figure
              valuation pre-deal. On the financial verdict, the recurring-subscription model with high enterprise NRR
              typical for category leaders implies durable revenue; on margin path the XAM bundle is the lever; on
              capital intensity the model is light. Diligence blockers are five named gaps: revenue/ARR not disclosed,
              gross margin not disclosed, customer ARPU not disclosed, burn / runway not disclosed, channel economics
