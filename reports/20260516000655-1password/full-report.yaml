              services, healthcare, and government all visible in customer stories, with no single vertical dominating.
              Geographic mix skews North America + Western Europe, with named customers in the US (Salesforce, GitLab,
              PagerDuty), Ireland / US (Intercom), and similar Anglosphere geographies; enterprise traction in APAC and
              LATAM is not as publicly visible. Channel and partner customers include MSP / MSSP resellers, audit /
