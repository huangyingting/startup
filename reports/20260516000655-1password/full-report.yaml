      - number: '1.3'
        title: Capital formation, milestones, and adverse-event record
        blocks:
          - type: paragraph
            body: >-
              1Password's capital formation runs three priced rounds. In November 2019 Accel led a $200 million Series A
              — the first outside investment in the company's then 14-year history. In July 2020 Accel led a $100
              million Series B with strategic participation from Slack Fund, Atlassian Ventures, IBM Ventures, and
              Shopify executive Tobias Lütke. In January 2022 ICONIQ Growth and Tiger Global co-led a $620 million
              Series C at a $6.8 billion post-money valuation with Lightspeed Venture Partners and Backbone Angels
              participating, bringing cumulative disclosed equity to approximately $920 million. Subsequent
              corporate-development milestones include the March 2024 acquisition of Kolide (Boston-based device-trust)
              and the April 2025 acquisition of Trelica (UK-based SaaS access governance), both wired into the company's
              Extended Access Management platform introduced in 2024. On the adverse side, 1Password publicly disclosed
              a low-severity intrusion attempt in 2023 traced to the broader LastPass breach campaign — the company
              stated that no customer vaults were accessed and that activity was contained. Across the past decade the
              National Vulnerability Database lists a handful of 1Password-related CVEs, none rated critical with
              confirmed at-scale exploitation, supporting the company's security-track-record claim. The $6.8 billion
              private valuation has not been publicly refreshed by a priced round, and any tender offers or secondaries
              have not been disclosed, leaving the valuation anchor stale for diligence purposes.
