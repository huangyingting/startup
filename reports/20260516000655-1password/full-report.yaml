        title: Exhibits
        blocks:
          - type: callout
            title: Two-secret-key architecture plus XAM bundle is the differentiated moat
            body: >-
              The combined effect of 1Password's two-secret-key architecture (a structural security differentiator no
              other direct PWM ships) plus the Kolide / Trelica / passkey XAM bundle is the most durable competitive
              position in the field — neither Bitwarden (open-source + free tier) nor Keeper (FedRAMP) can match the
              bundle, and neither LastPass nor Dashlane has matched the architecture in 2026.
            calloutType: strength
            claimRefs:
