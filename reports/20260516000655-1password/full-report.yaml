  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory, legal, and compliance risks
        blocks:
          - type: paragraph
            body: >-
              1Password's regulatory and legal risk surface in 2026 is shaped by global privacy regimes, cyber-advisory
              exposure, and SOC2 / ISO/IEC 27001 renewal cycles. The dominant regulatory risks are: GDPR / UK-GDPR
              enforcement on a global SaaS that processes EEA-resident credentials (1Password publishes a DPA but
              enforcement-action exposure exists if breach or processing-purpose deviation occurs); CCPA / CPRA and US
              state-privacy laws creating ongoing privacy-litigation surface (Schrems-II-style data-transfer challenges,
              deletion-request SLAs); CISA / national-cyber-agency advisory exposure (a vulnerability in 1Password's
              client or sync would likely trigger a CISA advisory, materially affecting customer trust and procurement);
              and emerging US federal privacy legislation (the American Privacy Rights Act framework debate plus
              sector-specific carve-outs). International data-transfer regimes — Schrems-II for EEA → US, UK-US Data
              Bridge — require adequacy / SCC mechanisms aligned to 1Password's North-American hosting. Legal risks
              include terms-of-service / acceptable-use enforcement discretion (the ToS exposes service-level discretion
              that, if mishandled, could create customer-loss litigation), and class-action exposure following the
              LastPass 2022 breach class-action wave (no 1Password class action exists publicly through 2026-05-16, but
              industry-wide adverse-litigation exposure is real). Compliance renewal cadence is the active workstream:
              SOC2 Type II is annual and a lapse would damage enterprise procurement; ISO/IEC 27001
              statement-of-applicability scope must evolve as Trelica / Kolide are integrated, with out-of-scope
              acquisitions creating audit-finding exposure. FedRAMP is the headline compliance gap — 1Password has not
              publicly disclosed FedRAMP authorisation, materially constraining federal SLED addressable market.
              Vendor-dependency on certified-auditor capacity adds modest residual risk. Patent / IP infringement
              exposure includes possible claims from credential-management or device-trust competitors, with Kolide /
              Trelica acquisitions adding IP surfaces that could draw allegations.
