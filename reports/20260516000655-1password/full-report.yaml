  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, segments, and substitutes
        blocks:
          - type: paragraph
            body: >-
              1Password sells into the password and access management category, which sits at the intersection of
              identity (IAM), endpoint security, and SaaS governance. The relevant market splits into two functionally
              distinct segments. Workforce credential management — the consumer and business password manager segment —
              is 1Password's primary battleground, with status-quo substitutes including browser-built-in password
              managers (Chrome, Safari, Edge), OS keychains (Apple Keychain, Windows Credential Manager),
              spreadsheet-based credential sharing, and free / freemium tools. Developer secrets management — CI/CD
              secrets, machine identities, API keys — is an adjacent segment where 1Password Connect and the 1Password
              CLI compete on developer experience but ship narrower scope than the dominant infrastructure-secrets
              tooling. Privileged Access Management (PAM) is an adjacent-but-distinct category focused on privileged
              server and infrastructure credentials rather than the workforce app-login layer where 1Password sells. The
              Wikipedia password-manager category lists more than two dozen named products, evidencing a fragmented long
              tail below the top five paid leaders. CISA cybersecurity advisories and OWASP authentication guidance both
              reinforce that password management is a basic-hygiene control, framing the category as a non-discretionary
              purchase for regulated industries even before considering passkeys.
            claimRefs:
