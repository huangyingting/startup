      - number: '3.3'
        title: Moats, switching cost, displacement risk, and strategic direction
        blocks:
          - type: paragraph
            body: >-
              Switching cost in workforce PWM is moderate-but-real: export/import flows are supported by every major
              vendor, but in-flight credential workflows, browser integrations, SCIM mappings, and policy templates
              create friction. Multi-homing across PWM + PAM + Secrets Manager is increasing in enterprises, capping
              share-of-wallet expansion. Distribution power increasingly comes from SSO/IdP partnerships (Okta,
              Microsoft Entra) and MSP/MSSP channel programs; 1Password runs partner programs but specific reseller
              economics are not publicly disclosed. 1Password's structural moat candidates are (a) the two-secret-key
              architecture (a structural differentiator on the security side), (b) the Kolide / Trelica / passkey bundle
              (XAM positioning), and (c) consumer brand strength from family plans. Commoditisation pressure on price is
              real — Bitwarden's open-source free tier and OS-keychain bundling cap pricing power, particularly in SMB
              and consumer segments. Displacement risk is most credible from (a) Apple Keychain / Google Password
              Manager improvements at the OS layer for consumer, and (b) Microsoft Entra / Okta IdP bundles expanding
              into credential vaulting for enterprise. Adverse competitive evidence — the LastPass 2022/2023 breach
              campaign — frames the category as one where structural security architecture is itself a moat. Strategic
              direction: 1Password is bundling Extended Access Management; Bitwarden is investing in self-hosted
              enterprise and passkeys; Keeper is investing in FedRAMP; Dashlane is shifting consumer-to-business; Proton
              is bundling. On capital backing, CyberArk is publicly traded, LastPass / Dashlane / Keeper are PE-backed,
              Bitwarden has venture backing, Proton is independently funded; 1Password's ICONIQ / Accel / Tiger Global
              syndicate places it in the top private-financial-strength bracket.
