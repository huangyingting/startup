        title: Exhibits
        blocks:
          - type: callout
            title: Track / research-more at $6.8B Series C mark; buy contingent on financial disclosure
            body: >-
              Public evidence supports 1Password's product, customer, management, and risk quality but financial inputs
              (ARR, NRR, GRR, gross margin, customer concentration) are private. The right action is to track at the
              $6.8B mark and convert to buy only when management-disclosed financials support ARR > $700M with NRR >
              110% and top-10 concentration < 20%. Pass-stance triggers are a direct security incident or top-10
              concentration > 30%.
            calloutType: recommendation
            claimRefs:
