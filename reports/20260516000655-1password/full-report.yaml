  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Landscape and competitor profiles
        blocks:
          - type: paragraph
            body: >-
              The direct paid-workforce-password-manager competitor set in 2026 comprises Bitwarden, LastPass, Keeper
              Security, Dashlane, Proton Pass, and 1Password — five paid leaders plus an open-source / privacy-led
              challenger. Browser-built-in password managers (Chrome, Safari, Edge) and OS keychains (Apple Keychain,
              Windows Credential Manager) constitute the dominant free substitute set and the structural status-quo
              competitor. In adjacent Privileged Access Management (PAM), CyberArk, Delinea, and BeyondTrust dominate —
              they solve privileged-server credential problems rather than workforce app-login, so they are adjacent
              rather than head-to-head with 1Password. In developer secrets management HashiCorp Vault, AWS Secrets
              Manager, and CyberArk Conjur dominate; 1Password Connect and the 1Password CLI compete on developer
              experience but ship narrower scope. Bitwarden positions on open-source verifiability and a generous free
              tier, with paid Business tiers from $4/user/month. LastPass, now standalone post-GoTo carve-out, is
              recovering from the 2022/2023 breach campaign that materially reset its enterprise trust posture. Keeper
              Security holds FedRAMP authorisation and a strong U.S. public-sector footprint. Dashlane has refocused on
              the workforce-business segment. Proton Pass (launched 2023) bundles password management into a broader
              Proton privacy suite. CyberArk is publicly traded (Nasdaq: CYBR) with multi-billion-dollar market cap;
              Delinea was formed in 2021 from the Thycotic/Centrify merger under TPG; BeyondTrust competes on
              device-trust overlapping the Kolide layer; HashiCorp Vault is the dominant open-source secrets manager.
