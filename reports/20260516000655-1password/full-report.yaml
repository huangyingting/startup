  summary: >-
    1Password is the trade name of AgileBits Inc., a late-stage private Toronto-based access management company founded
    in 2005 by Dave Teare and Roustem Karimov. After bootstrapping for 14 years, it raised three priced rounds in
    2019-2022 totalling approximately $920M, culminating in a $620M Series C at a $6.8B post-money valuation co-led by
