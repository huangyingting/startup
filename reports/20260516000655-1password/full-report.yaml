    sections:
      - number: '1.1'
        title: Identity, product platform, and positioning
        blocks:
          - type: paragraph
            body: >-
              1Password is the trade name of AgileBits Inc., a private password management and access management company
              founded in 2005 in Toronto by Dave Teare and Roustem Karimov. The company's official site positions it as
              the global leader in access management for the modern, AI-driven workforce, offering consumer plans
              (Individual, Families), business plans (Teams, Business, Enterprise Password Manager), and developer
              surfaces (1Password CLI, 1Password Connect, Secrets Automation, SCIM Bridge). The product architecture
              rests on a distinctive two-secret-key model in which each vault is encrypted with both an account password
              chosen by the user and a 128-bit account-specific Secret Key generated locally on first sign-in. Because
              the Secret Key never leaves the user's devices and is not stored on 1Password servers, even 1Password
              employees cannot decrypt customer vaults, which the company markets as a structural advantage over
              single-secret alternatives. Beyond core vaulting the company ships passkeys (saving, autofill, and login
              using passkeys), a developer CLI, a Connect server for self-hosted secrets, Watchtower breach alerts,
              Travel Mode for border crossings, and a SCIM Bridge for enterprise identity provisioning. Native
              applications are available across macOS, Windows, Linux, iOS, Android, and as browser extensions for
              Chrome, Firefox, Edge, Brave, and Safari, putting 1Password on a cross-platform parity footing with
              Bitwarden, LastPass, Dashlane, and Keeper.
