      - number: '8.3'
        title: Exit pathway, diligence asks, and thesis-break triggers
        blocks:
          - type: paragraph
            body: >-
              Exit pathway is dominated by IPO as the canonical option, with secondary sale or strategic acquisition by
              an identity-security incumbent (Okta, CyberArk) or platform (Microsoft, Google) conceivable in a stress
              scenario. IPO readiness is supported by scale (15M+ users, 150k+ business customers, four-plus years
              post-Series-C, mature governance), but undisclosed financial transparency would need formalisation in an
              S-1. Dilution / preference overhang is governed by an ICONIQ-led Series C cap table with Accel, Tiger
              Global participation; the preference stack is private but standard 1x non-participating preferred would
              imply common-share dilution at down-round scenarios. Final diligence asks are four: (1)
              management-disclosed ARR, NRR, GRR, gross margin, and operating margin to convert the revenue-proof KPI
              from 5/10 to 8/10; (2) top-10 customer % of ARR + concentration by vertical to bound concentration risk;
              (3) FedRAMP roadmap, MTTR / IR playbook, post-quantum-crypto roadmap, public SBOM to close the compliance
              / security-disclosure surface; (4) XAM cross-sell attach metrics post-Trelica integration to validate the
              dominant 2026 expansion lever. Thesis-break triggers are three: a direct security incident in 1Password
              (vault disclosure or sync compromise) triggers immediate revaluation; a public revenue disclosure
              materially below the bottom-up $440–920M range would compress valuation by multiple turns; top-10 customer
              concentration above 30% of ARR would shift risk rating from moderate to high and compress acceptable
              multiple range. The overall valuation stance: track at the $6.8B Series C mark; buy if
              management-disclosed financials support ARR > $700M with NRR > 110% and concentration < 20%; pass if a
              direct security incident or concentration > 30% materialises.
