        title: Leadership, governance, headcount, and locations
        blocks:
          - type: paragraph
            body: >-
              Jeff Shiner has served as Chief Executive Officer since 2012 and was the operating executive who navigated
              the company through its three priced rounds (2019, 2020, 2022), the response to the 2022-2023 LastPass
              breach campaign, and the 2024 Kolide and 2025 Trelica acquisitions. Co-founders Dave Teare and Roustem
              Karimov retain long association with the company; Teare publicly stepped back from day-to-day operations
              in 2021 to focus on family and personal projects, with Karimov retaining a senior technical role per
              Wikipedia and AgileBits historical coverage. The legal entity AgileBits Inc. continues to be the
              contracting party on the Terms of Service and Privacy Notice. Public headcount estimates sit in the
              1,000-1,500 range per the company's LinkedIn profile and Built In, with growth accelerating after the 2022
              Series C and modest contraction through 2023-2024 in line with sector-wide rationalisation. The company
              remains headquartered in Toronto, Ontario, Canada, with a remote-first operating model and an active
              careers page that advertises security-engineering, sales, customer-success, and product-design openings
              across Toronto, Vancouver, and the United States. No 1Password IPO registration filing has been publicly
              disclosed as of 2026-05-16, leaving the company in private growth status anchored by the January 2022
              priced round.
