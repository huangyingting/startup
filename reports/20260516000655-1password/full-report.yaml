          - type: callout
            title: IdP bundling and OS keychains are the credible displacement vectors
            body: >-
              Microsoft Entra and Okta's IdP bundles, combined with Apple and Google OS-keychain improvements
              (passkey-first by 2026), constitute the most credible displacement risk — both leverage incumbent
              distribution that 1Password cannot match. Continued differentiation depends on the XAM bundle's adoption
              and on retaining consumer brand strength.
            calloutType: risk
