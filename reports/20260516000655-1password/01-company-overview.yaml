  - id: leadership-governance-and-headcount
    title: Leadership, governance, headcount, and locations
    body: >-
      Jeff Shiner has served as Chief Executive Officer since 2012 and was the operating executive who navigated the
      company through its three priced rounds (2019, 2020, 2022), the response to the 2022-2023 LastPass breach
      campaign, and the 2024 Kolide and 2025 Trelica acquisitions. Co-founders Dave Teare and Roustem Karimov retain
      long association with the company; Teare publicly stepped back from day-to-day operations in 2021 to focus on
      family and personal projects, with Karimov retaining a senior technical role per Wikipedia and AgileBits
      historical coverage. The legal entity AgileBits Inc. continues to be the contracting party on the Terms of Service
      and Privacy Notice. Public headcount estimates sit in the 1,000-1,500 range per the company's LinkedIn profile and
      Built In, with growth accelerating after the 2022 Series C and modest contraction through 2023-2024 in line with
      sector-wide rationalisation. The company remains headquartered in Toronto, Ontario, Canada, with a remote-first
      operating model and an active careers page that advertises security-engineering, sales, customer-success, and
      product-design openings across Toronto, Vancouver, and the United States. No 1Password IPO registration filing has
      been publicly disclosed as of 2026-05-16, leaving the company in private growth status anchored by the January
      2022 priced round.
    claimRefs:
      - CO003
      - CO004
      - CO005
      - CO011
      - CO013
      - CO019
      - CO029
    tableRefs:
      - TO002
  - id: capital-formation-milestones-and-adverse-events
    title: Capital formation, milestones, and adverse-event record
    body: >-
      1Password's capital formation runs three priced rounds. In November 2019 Accel led a $200 million Series A — the
      first outside investment in the company's then 14-year history. In July 2020 Accel led a $100 million Series B
      with strategic participation from Slack Fund, Atlassian Ventures, IBM Ventures, and Shopify executive Tobias
      Lütke. In January 2022 ICONIQ Growth and Tiger Global co-led a $620 million Series C at a $6.8 billion post-money
      valuation with Lightspeed Venture Partners and Backbone Angels participating, bringing cumulative disclosed equity
      to approximately $920 million. Subsequent corporate-development milestones include the March 2024 acquisition of
      Kolide (Boston-based device-trust) and the April 2025 acquisition of Trelica (UK-based SaaS access governance),
      both wired into the company's Extended Access Management platform introduced in 2024. On the adverse side,
      1Password publicly disclosed a low-severity intrusion attempt in 2023 traced to the broader LastPass breach
      campaign — the company stated that no customer vaults were accessed and that activity was contained. Across the
      past decade the National Vulnerability Database lists a handful of 1Password-related CVEs, none rated critical
      with confirmed at-scale exploitation, supporting the company's security-track-record claim. The $6.8 billion
      private valuation has not been publicly refreshed by a priced round, and any tender offers or secondaries have not
      been disclosed, leaving the valuation anchor stale for diligence purposes.
