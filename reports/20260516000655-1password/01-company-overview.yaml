callouts:
  - calloutType: strength
    title: Two-Secret-Key architecture and stable CEO tenure underpin enterprise trust
    body: >-
      The combination of a structural architecture that makes vault decryption impossible even for 1Password itself, a
      14-year stable CEO under Jeff Shiner, and 150,000+ business customers including marquee enterprise logos gives
      1Password a credible enterprise-trust moat that the LastPass post-breach migration accelerated.
    claimRefs:
      - CO004
      - CO010
      - CO012
      - CO025
  - calloutType: risk
    title: Stale 2022 valuation anchor with no public refresh
    body: >-
      The $6.8B post-money valuation set in January 2022 has not been refreshed by a priced round in over four years.
      Without disclosed secondaries, tenders, or down-round resets, the public valuation anchor is increasingly stale,
      complicating any 2026 diligence pricing exercise — a gap the Valuation chapter must price explicitly.
    claimRefs:
      - CO008
      - CO011
      - CO035
