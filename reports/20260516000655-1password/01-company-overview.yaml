company:
  name: 1Password
chapter:
  number: 1
  title: Company Overview
  summary: >-
    1Password (legal entity AgileBits Inc.) is a private Toronto-headquartered password and access management company
    founded in 2005 by Dave Teare and Roustem Karimov, led by CEO Jeff Shiner since 2012, and capitalised through three
    priced rounds totalling approximately $920 million culminating in a $620 million / $6.8 billion Series C in January
    2022 co-led by ICONIQ Growth and Tiger Global; the platform has expanded into Extended Access Management through the
    2024 Kolide and 2025 Trelica acquisitions while maintaining its two-secret-key zero-knowledge architecture, 150,000+
    business customers (claimed), and a stale-but-uncontested $6.8B valuation anchor.
sections:
  - id: identity-product-and-positioning
    title: Identity, product platform, and positioning
    body: >-
      1Password is the trade name of AgileBits Inc., a private password management and access management company founded
      in 2005 in Toronto by Dave Teare and Roustem Karimov. The company's official site positions it as the global
      leader in access management for the modern, AI-driven workforce, offering consumer plans (Individual, Families),
      business plans (Teams, Business, Enterprise Password Manager), and developer surfaces (1Password CLI, 1Password
      Connect, Secrets Automation, SCIM Bridge). The product architecture rests on a distinctive two-secret-key model in
      which each vault is encrypted with both an account password chosen by the user and a 128-bit account-specific
      Secret Key generated locally on first sign-in. Because the Secret Key never leaves the user's devices and is not
      stored on 1Password servers, even 1Password employees cannot decrypt customer vaults, which the company markets as
      a structural advantage over single-secret alternatives. Beyond core vaulting the company ships passkeys (saving,
      autofill, and login using passkeys), a developer CLI, a Connect server for self-hosted secrets, Watchtower breach
      alerts, Travel Mode for border crossings, and a SCIM Bridge for enterprise identity provisioning. Native
      applications are available across macOS, Windows, Linux, iOS, Android, and as browser extensions for Chrome,
      Firefox, Edge, Brave, and Safari, putting 1Password on a cross-platform parity footing with Bitwarden, LastPass,
      Dashlane, and Keeper.
    claimRefs:
