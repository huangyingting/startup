  topStrengths:
    - >-
      150,000+ business customers and a four-tier consumer-to-enterprise pricing ladder anchor a durable
      recurring-revenue platform with strong brand recognition among security-conscious SMB and developer buyers.
    - >-
      Two-secret-key architecture, SOC 2 Type II attestation, AES-256-GCM encryption, and a long unbroken
      vault-compromise track record provide a defensible security moat versus LastPass and consumer-grade competitors.
    - >-
      Kolide (March 2024) and Trelica (April 2025) acquisitions credibly reposition the company from "password manager"
      to "extended access management," opening expansion into device-trust and SaaS governance budgets.
  topRisks:
    - >-
      The $6.8B January 2022 post-money valuation has not been refreshed by a priced round and likely faces
      2023-2024-vintage mark-down pressure from Tiger / ICONIQ secondary marks that have not been publicly disclosed.
    - >-
      Audited revenue, ARR, NRR, gross margin, and burn are entirely non-public, making the implied 2026 entry multiple
      uninferrable and gating any priced-round participation on management disclosure.
    - >-
      Passkey-driven displacement of password managers, Bitwarden's accelerating open-source enterprise traction, and
      identity-provider (Okta / Microsoft Entra) bundling of password capabilities all compress the medium-term TAM
      growth path.
  unresolvedGaps:
    - Audited revenue, ARR, NRR, GRR, gross margin, operating margin, and cash runway are not publicly disclosed.
    - Top-10 customer concentration, vertical mix, and Fortune-500 attach rates are undisclosed.
    - Preference stack, liquidation waterfall, and any post-2022 secondary or tender pricing are not public.
    - Series D timing, target size, and announced milestones have not been disclosed.
    - XAM cross-sell attach metrics for Kolide and Trelica post-acquisition are not publicly available.
