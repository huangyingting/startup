callouts:
  - calloutType: strength
    title: Two-secret-key architecture plus XAM bundle is the differentiated moat
    body: >-
      The combined effect of 1Password's two-secret-key architecture (a structural security differentiator no other
      direct PWM ships) plus the Kolide / Trelica / passkey XAM bundle is the most durable competitive position in the
      field — neither Bitwarden (open-source + free tier) nor Keeper (FedRAMP) can match the bundle, and neither
      LastPass nor Dashlane has matched the architecture in 2026.
    claimRefs:
      - CP021
      - CP022
      - CP035
  - calloutType: risk
    title: IdP bundling and OS keychains are the credible displacement vectors
    body: >-
      Microsoft Entra and Okta's IdP bundles, combined with Apple and Google OS-keychain improvements (passkey-first by
      2026), constitute the most credible displacement risk — both leverage incumbent distribution that 1Password cannot
      match. Continued differentiation depends on the XAM bundle's adoption and on retaining consumer brand strength.
    claimRefs:
      - CP023
      - CP031
      - CP002
