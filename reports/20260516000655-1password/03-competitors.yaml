  - id: capability-pricing-gtm-trust
    title: Capability, pricing, GTM, and trust comparison
    body: >-
      On capability — vaulting, sharing, SCIM/SSO, MFA enforcement, passkeys, SSH/CLI integration — 1Password and
      Bitwarden show near-parity at the top, with Keeper and Dashlane tracking close behind; LastPass's enterprise
      feature parity is reduced post-2023 incident. On pricing list-prices, Bitwarden remains the lowest-cost paid
      option, 1Password sits in the mid-tier ($7.99/user/month Business), and Keeper / Dashlane are positioned
      similarly; Proton Pass is priced as part of Proton Unlimited bundles. On GTM motion the consumer leaders rely on
      direct online sales and review-led acquisition while enterprise leaders rely on direct sales plus MSSP / channel
      resellers and SSO IdP partnerships. On trust/regulatory posture, all top five paid managers publish SOC 2
      attestations; the LastPass 2022 breach campaign reset trust calculus and FedRAMP authorisation (which Keeper
      holds) is a meaningful differentiator for U.S. public-sector procurement. Gartner Peer Insights aggregate ratings
      show 1Password and Bitwarden in the top tier with 4.5+ averages; Keeper and Dashlane track behind by half-star
      increments; LastPass shows recovering ratings post-2023. TrustRadius and Software Advice corroborate. 1Password's
      enterprise customer page lists named customers (Salesforce, GitLab, IBM, Slack); independent partner pages
      (GitLab, Intercom, PagerDuty) corroborate cross-pollination — though competitive proof is not exclusive to any
      single vendor. The Forrester Wave password-manager evaluation profiles 1Password, Bitwarden, Keeper, Dashlane, and
      Proton Pass; LastPass is profiled with concerns.
    claimRefs:
      - CP014
      - CP015
      - CP016
      - CP017
      - CP025
      - CP026
      - CP027
      - CP028
      - CP029
      - CP030
    tableRefs:
      - TP002
      - TP003
    figureRefs:
      - FP002
  - id: moats-risks-strategy
    title: Moats, switching cost, displacement risk, and strategic direction
    body: >-
      Switching cost in workforce PWM is moderate-but-real: export/import flows are supported by every major vendor, but
      in-flight credential workflows, browser integrations, SCIM mappings, and policy templates create friction.
      Multi-homing across PWM + PAM + Secrets Manager is increasing in enterprises, capping share-of-wallet expansion.
      Distribution power increasingly comes from SSO/IdP partnerships (Okta, Microsoft Entra) and MSP/MSSP channel
      programs; 1Password runs partner programs but specific reseller economics are not publicly disclosed. 1Password's
      structural moat candidates are (a) the two-secret-key architecture (a structural differentiator on the security
      side), (b) the Kolide / Trelica / passkey bundle (XAM positioning), and (c) consumer brand strength from family
      plans. Commoditisation pressure on price is real — Bitwarden's open-source free tier and OS-keychain bundling cap
      pricing power, particularly in SMB and consumer segments. Displacement risk is most credible from (a) Apple
      Keychain / Google Password Manager improvements at the OS layer for consumer, and (b) Microsoft Entra / Okta IdP
      bundles expanding into credential vaulting for enterprise. Adverse competitive evidence — the LastPass 2022/2023
      breach campaign — frames the category as one where structural security architecture is itself a moat. Strategic
      direction: 1Password is bundling Extended Access Management; Bitwarden is investing in self-hosted enterprise and
      passkeys; Keeper is investing in FedRAMP; Dashlane is shifting consumer-to-business; Proton is bundling. On
      capital backing, CyberArk is publicly traded, LastPass / Dashlane / Keeper are PE-backed, Bitwarden has venture
      backing, Proton is independently funded; 1Password's ICONIQ / Accel / Tiger Global syndicate places it in the top
      private-financial-strength bracket.
