runDate: '2026-05-16'
company:
  name: 1Password
chapter:
  number: 3
  title: Competitors
  summary: >-
    Direct paid workforce password manager peers in 2026 are Bitwarden, LastPass, Keeper, Dashlane, Proton Pass, and
    1Password; PAM (CyberArk, Delinea, BeyondTrust) and secrets management (HashiCorp Vault) are adjacent. 1Password's
    differentiators are the two-secret-key architecture and the Kolide + Trelica + passkey Extended Access Management
    bundle. Bitwarden's open-source free tier, OS keychains, and IdP bundles are the most credible commoditisation /
    displacement vectors; LastPass's 2022/2023 breach campaign frames trust posture as the volatile competitive
    dimension.
sections:
  - id: landscape-and-profiles
    title: Landscape and competitor profiles
    body: >-
      The direct paid-workforce-password-manager competitor set in 2026 comprises Bitwarden, LastPass, Keeper Security,
      Dashlane, Proton Pass, and 1Password — five paid leaders plus an open-source / privacy-led challenger.
      Browser-built-in password managers (Chrome, Safari, Edge) and OS keychains (Apple Keychain, Windows Credential
      Manager) constitute the dominant free substitute set and the structural status-quo competitor. In adjacent
      Privileged Access Management (PAM), CyberArk, Delinea, and BeyondTrust dominate — they solve privileged-server
      credential problems rather than workforce app-login, so they are adjacent rather than head-to-head with 1Password.
      In developer secrets management HashiCorp Vault, AWS Secrets Manager, and CyberArk Conjur dominate; 1Password
      Connect and the 1Password CLI compete on developer experience but ship narrower scope. Bitwarden positions on
      open-source verifiability and a generous free tier, with paid Business tiers from $4/user/month. LastPass, now
      standalone post-GoTo carve-out, is recovering from the 2022/2023 breach campaign that materially reset its
      enterprise trust posture. Keeper Security holds FedRAMP authorisation and a strong U.S. public-sector footprint.
      Dashlane has refocused on the workforce-business segment. Proton Pass (launched 2023) bundles password management
      into a broader Proton privacy suite. CyberArk is publicly traded (Nasdaq: CYBR) with multi-billion-dollar market
      cap; Delinea was formed in 2021 from the Thycotic/Centrify merger under TPG; BeyondTrust competes on device-trust
      overlapping the Kolide layer; HashiCorp Vault is the dominant open-source secrets manager.
    claimRefs:
      - CP001
      - CP002
      - CP003
      - CP004
