chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The password and access management category sits at the intersection of identity, endpoint, and SaaS governance;
    1Password's primary battleground is paid workforce password management (TAM ~$3B in 2024 per Fortune Business
    Insights, forecast to $10–11B by 2032 at 17–22% CAGR) with adjacent developer secrets management and PAM.
    Post-LastPass migration and the passkey transition are durable drivers; browser-built-in substitutes and
    multi-homing across PWM / PAM / Vault cap pricing power and share-of-wallet expansion.
sections:
  - id: market-boundary-and-segments
    title: Market boundary, segments, and substitutes
    body: >-
      1Password sells into the password and access management category, which sits at the intersection of identity
      (IAM), endpoint security, and SaaS governance. The relevant market splits into two functionally distinct segments.
      Workforce credential management — the consumer and business password manager segment — is 1Password's primary
      battleground, with status-quo substitutes including browser-built-in password managers (Chrome, Safari, Edge), OS
      keychains (Apple Keychain, Windows Credential Manager), spreadsheet-based credential sharing, and free / freemium
      tools. Developer secrets management — CI/CD secrets, machine identities, API keys — is an adjacent segment where
      1Password Connect and the 1Password CLI compete on developer experience but ship narrower scope than the dominant
      infrastructure-secrets tooling. Privileged Access Management (PAM) is an adjacent-but-distinct category focused on
      privileged server and infrastructure credentials rather than the workforce app-login layer where 1Password sells.
      The Wikipedia password-manager category lists more than two dozen named products, evidencing a fragmented long
      tail below the top five paid leaders. CISA cybersecurity advisories and OWASP authentication guidance both
      reinforce that password management is a basic-hygiene control, framing the category as a non-discretionary
      purchase for regulated industries even before considering passkeys.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM010
      - CM020
      - CM023
      - CM024
    tableRefs:
      - TM001
    figureRefs:
      - FM003
  - id: sizing-buyer-segmentation
    title: Sizing lenses and buyer / user / payer segmentation
    body: >-
      Public market sizing of the workforce password manager segment is fragmented across analyst publishers. Fortune
      Business Insights sizes the global password management market at approximately $3.0 billion in 2024 with a
      forecast to roughly $10–11 billion by 2032 at a CAGR in the 17–22% range. MarketsandMarkets estimates the market
      at approximately $2.5 billion in the early 2020s growing at a 20%+ CAGR toward the late 2020s. Statista's
      passwords topic indicates steady year-over-year growth in both consumer adoption and breach-driven enterprise
      investment. Gartner cybersecurity research and the Forrester Wave for password managers both place workforce
      password management in late-growth (not maturity) with continued expansion at the top of the table. For 1Password
      the realistic Serviceable Addressable Market (SAM) is the subset of paid workforce password manager spend in
      regulated markets (US, EU, UK, Canada, Australia), perhaps 60–70% of the global market on a spend-weighted basis.
      The Serviceable Obtainable Market (SOM) at 1Password's current scale (~150k business customers and 15M individuals
      claimed) is in the 20–30% range of paid password manager spend depending on methodology. Enterprise procurement
      weights pricing simplicity, SCIM/SSO support, and breach posture above feature parity, narrowing competitive
      selection to roughly five paid vendors. Consumer buyer/user/payer is the same individual; SMB splits buyer (IT
      generalist) from payer (business); enterprise splits user (every employee) from payer (IT cost center) with the
      CISO as primary buyer.
    claimRefs:
      - CM005
      - CM006
      - CM007
      - CM008
      - CM009
      - CM011
      - CM012
      - CM013
      - CM014
      - CM027
