callouts:
  - calloutType: strength
    title: Post-LastPass migration plus passkey transition redefines category in 1Password's favour
    body: >-
      The combined effect of (a) the 2022/2023 LastPass breach campaign reshaping buyer trust toward
      architecturally-differentiated managers and (b) the passkey transition re-anchoring the category as a credential
      broker rather than a password vault gives 1Password sustained tailwinds that the bundled OS substitutes cannot
      fully neutralise.
    claimRefs:
      - CM015
      - CM016
      - CM019
      - CM035
  - calloutType: risk
    title: Conflicting TAM lenses and free-tier substitutes cap diligence confidence in single-point sizing
    body: >-
      Public sizing varies substantively across Fortune Business Insights, MarketsandMarkets, and Statista, and the
      bundled OS and browser substitutes structurally cap pricing power on the consumer side. Treat any single-point TAM
      in a diligence model as a corroborated range, not a number.
    claimRefs:
      - CM005
      - CM006
      - CM020
      - CM029
      - CM034
