  claims:
    - id: CM001
      statement: >-
        The password and access management market sits at the intersection of identity (IAM), endpoint security, and
        SaaS governance and is anchored by two functionally distinct segments: workforce credential management and
        developer secrets management.
      type: observed
      topic: market-boundary
      sourceRefs:
        - SM023
        - SM050
        - SM055
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM001
      contradictsClaimRefs: []
    - id: CM002
      statement: >-
        Workforce credential management (consumer + business password managers) is the primary battleground for
        1Password, with status-quo substitutes including browser-built-in password managers (Chrome, Safari, Edge),
        spreadsheet-based credential sharing, and free / freemium tools.
      type: observed
      topic: workforce-segment
      sourceRefs:
        - SM023
        - SM036
        - SM033
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM002
      contradictsClaimRefs: []
    - id: CM003
      statement: >-
        Developer secrets management (CI/CD secrets, machine identities, API keys) is an adjacent segment where
        1Password Connect and the 1Password CLI compete on developer experience but ship narrower scope than the
        dominant infrastructure-secrets tooling.
      type: observed
      topic: developer-segment
      sourceRefs:
        - SM032
        - SM031
        - SM037
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM003
      contradictsClaimRefs: []
    - id: CM004
      statement: >-
        Privileged Access Management (PAM) is an adjacent-but-distinct category focused on privileged server and
        infrastructure credentials rather than the workforce app-login layer where 1Password sells.
      type: observed
      topic: pam-adjacency
      sourceRefs:
        - SM055
        - SM053
        - SM023
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QM004
      contradictsClaimRefs: []
    - id: CM005
      statement: >-
        Fortune Business Insights sizes the global password management market at approximately $3.0 billion in 2024 with
        a forecast to roughly $10–11 billion by 2032 at a CAGR in the 17–22% range.
      type: third-party-reported
      topic: tam-fbi
      sourceRefs:
        - SM051
      confidence: medium
      freshness: historical
      answersQuestionRefs:
        - QM005
      contradictsClaimRefs: []
    - id: CM006
