callouts:
  - calloutType: recommendation
    title: Track / research-more at $6.8B Series C mark; buy contingent on financial disclosure
    body: >-
      Public evidence supports 1Password's product, customer, management, and risk quality but financial inputs (ARR,
      NRR, GRR, gross margin, customer concentration) are private. The right action is to track at the $6.8B mark and
      convert to buy only when management-disclosed financials support ARR > $700M with NRR > 110% and top-10
      concentration < 20%. Pass-stance triggers are a direct security incident or top-10 concentration > 30%.
    claimRefs:
      - CV003
      - CV004
      - CV043
      - CV044
      - CV050
  - calloutType: insight
    title: Revenue and multiple are the largest sensitivity levers in the valuation
    body: >-
      A 2x spread on the bottom-up ARR input ($440–920M) is the single largest valuation lever; a 1x multiple shift on
      $700M base ARR is ~$0.7B (10% of Series C mark). XAM attach sensitivity adds an additional $2–5B swing at 10x for
      10–30% attach. Management-disclosed financials would compress the revenue spread; XAM attach disclosure would
      resolve the most leveraged of the three sensitivities.
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
