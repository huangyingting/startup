  title: Valuation
  summary: >-
    At the prior 2022 Series C $6.8B post-money mark (ICONIQ-led, $620M raise) and cumulative $920M+ funding,
    1Password's implied 2026 valuation reference is unchanged absent a fresh round. Bottom-up business-tier ARR is
    $360–720M; total ARR plausibly $440–920M; this implies a 7.4–15.5x revenue multiple at the Series C mark, bracketing
    the SaaS-credential / identity-security public-comp band of 5–12x. Investment KPI scoring (out of 10): market 8,
    moat 8, management 8, evidence 6, profitability 6, revenue-proof 5, risk 5, valuation-support 5. Recommendation:
    track / research-more; buy contingent on management-disclosed ARR > $700M, NRR > 110%, concentration < 20%; pass on
    direct security incident or concentration > 30%. Risk rating: moderate. Dominant thesis-break triggers: direct
    security incident, revenue disclosure < $440M, concentration > 30%.
sections:
  - id: thesis-and-recommendation
    title: Investment thesis, anti-thesis, recommendation, and risk
    body: >-
      Investment thesis: 1Password in 2026 is a category-leader private SaaS with 150,000+ business customers, 15M+
      individuals, named enterprise references (Salesforce, GitLab, IBM, Slack, Intercom, PagerDuty), and a credible XAM
      expansion (Kolide + Trelica acquisitions) that extends password / secrets management into device trust and SaaS
      access governance. The anti-thesis is built on three private inputs: revenue / ARR undisclosed, NRR / GRR
      undisclosed, customer concentration undisclosed; plus a multi-year platform-native passkey storage substitution
      risk from Apple, Google, and Microsoft consumer-tier wallet share compression. Recommendation: track /
      research-more at the current implied valuation, with a buy-stance contingent on management-disclosed revenue, NRR,
      and customer concentration figures that would resolve the dominant diligence gaps. Confidence is medium — public
      evidence supports product / customer / risk quality but financial inputs (revenue, margin, retention) are private,
      capping confidence at the level supported by triangulation rather than disclosure. Risk rating is moderate —
      residual risk concentrates in peer-incident contagion, platform / extension policy shifts, and
      customer-concentration opacity, mitigated by above-baseline security posture (SOC2, ISO/IEC 27001, bug bounty,
      Trust Center, transparent privacy policy). On Investment KPI scoring (out of 10): market opportunity 8, product
      moat 8, management quality 8, evidence quality 6, profitability path 6, revenue proof 5, risk profile 5, valuation
      support 5 — a category-leader product / customer / management story with revenue-proof and valuation-support
      gating the call.
    claimRefs:
