companyProfile:
  summary: 1Password is the trade name of AgileBits Inc., a late-stage private Toronto-based access management company founded in 2005 by Dave Teare and Roustem Karimov. After bootstrapping for 14 years, it raised three priced rounds in 2019-2022 totalling approximately $920M, culminating in a $620M Series C at a $6.8B post-money valuation co-led by ICONIQ Growth and Tiger Global. The company reports more than 150,000 business customers and has pivoted positioning from consumer password manager to "extended access management" via the 2024 Kolide (device trust) and 2025 Trelica (SaaS governance) acquisitions. No IPO registration is on file and the $6.8B valuation has not been publicly refreshed.
  foundedDate: '2005-01-01'
  founders:
    - name: Dave Teare
      role: Co-founder; stepped back operationally in 2021
      background: Co-founded AgileBits in 2005 in Toronto; remains associated with the company in an advisory capacity.
      claimRefs: [CO001, CO005]
    - name: Roustem Karimov
      role: Co-founder
      background: Long-tenured technologist co-founder with continued association to the company.
      claimRefs: [CO001, CO005]
  foundingLocation: Toronto, Ontario, Canada
  headquarters: Toronto, Ontario, Canada
  productSummary: 1Password provides password management, secrets management, passkeys, SSO-augmenting access workflows, device-trust posture checks (Kolide), and SaaS access governance (Trelica) across consumer, family, business, and enterprise tiers. The product architecture is anchored by a two-secret-key model combining an account password and an account-specific Secret Key.
  customerFocus: 150,000+ business customers spanning startups through Fortune 500, plus consumer and family users.
  businessModel: Subscription SaaS — consumer plans starting at $2.99/month, Families at $4.99/month, Business at $7.99 per user/month (annual), and custom Enterprise pricing.
  stage: late-stage private
  fundingStatus: Privately held; latest public financing was a $620M Series C at $6.8B post-money in January 2022, co-led by ICONIQ Growth and Tiger Global, with Lightspeed and Backbone Angels participating. Total disclosed equity raised approximately $920M across the 2019 Series A, 2020 Series B, and 2022 Series C.
  claimRefs: [CO001, CO003, CO006, CO007, CO008, CO009, CO010, CO011]
summary:
  headline: 1Password has a credible 150k-business-customer XAM platform and a defensible security architecture, but the $6.8B 2022 valuation has not been refreshed and unit economics remain non-public.
