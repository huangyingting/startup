company:
  name: 1Password
chapter:
  number: 4
  title: Financials
  summary: >-
    1Password's revenue is subscription-based across Individual ($2.99/mo), Families ($4.99/mo), Teams Starter
    ($19.95/mo), Business ($7.99/user/mo), and custom Enterprise, plus developer and post-acquisition (Kolide, Trelica)
    surfaces. Bloomberg reported Series C at $6.8B in 2022 led by ICONIQ; Crunchbase News aggregates indicate >$920M
    cumulative funding. Audited revenue, gross margin, NRR, CAC, customer concentration, and burn / runway are all
    private — five material diligence blockers. Bottom-up reconstruction places business-tier ARR in the $360–720M
    range; total ARR plausibly $440–920M.
sections:
  - id: revenue-pricing-and-gtm
    title: Revenue streams, pricing, and GTM motion
    body: >-
      1Password's revenue is predominantly subscription-based across Individual, Families, Teams Starter Pack, Business,
      and Enterprise tiers, with developer add-ons (Secrets Automation, CLI, Connect) and post-acquisition Trelica /
      Kolide products as expansion surfaces. Per the public pricing page, Individual is $2.99/month and Families is
      $4.99/month (5 family members); Teams Starter Pack is $19.95/month (10 users); Business is $7.99/user/month;
      Enterprise is custom-priced. Pricing is per-user-per-month at the business tier — the dominant SaaS-credential
      monetisation pattern; consumer plans are flat-fee per household. Revenue mix between consumer and business is not
      publicly disclosed; Bloomberg's 2022 $6.8B valuation reporting noted business / EPM as the primary growth engine
      but did not disclose split. Sales motion is mixed: direct-to-consumer through 1password.com and app stores for
      Individual / Families; direct-sales and partner-channel through 1password.com/business and
      1password.com/enterprise-password-manager for SMB and enterprise tiers. Sales cycle, CAC, and payback period are
      not publicly disclosed; the public business page describes value propositions (deployment ease, SSO/SCIM, audit
      logs) but stops short of unit-economic disclosure. Channel / reseller margins are not publicly disclosed either.
      Customer references (Salesforce, GitLab, IBM, Slack) corroborate enterprise revenue at meaningful scale without
      disclosing $ figures.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI007
      - CI008
      - CI009
      - CI020
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001
  - id: cost-margins-and-traction
    title: Cost structure, margin path, and public traction
    body: >-
      Cost structure is dominated by R&D and S&M for a software-as-a-service business of this profile; gross-margin
      disclosure is private, but SaaS-credential peer benchmarks (CyberArk at 80%+ GM) suggest a structurally high
      gross-margin model. Working capital intensity is low — software-as-a-service prepayment cycles typically generate
      negative working-capital drag (cash collected ahead of revenue recognition); no public 1Password disclosure
      exists. Service-delivery costs are limited to hosting, customer success, and the support function, not
      capex-intensive, consistent with a SaaS infrastructure profile. 1Password publicly claims more than 150,000
      business customers and more than 100,000 developer team users across enterprise products; the 15 million
      individuals figure surfaces in several press iterations. ARR / revenue is not publicly disclosed; reported press
      and analyst commentary places 1Password's revenue scale in the upper-private-SaaS bracket but precise figures are
      not corroborated by 1Password directly. Public revenue / ARR gap is the single largest financial diligence gap —
      without 1Password disclosure, valuation modelling must rely on bottom-up customer-count × per-seat pricing
      reconciliation. On a per-seat revenue proxy basis (150k business customers × ~ $7.99/user/month × an estimated
      average of 25-50 seats per customer) a public revenue floor calculation places 1Password's business-tier ARR in
      the $360-720 million range, biased downward by enterprise list-price discounting that is not publicly disclosed.
      Margin path direction in 2026 is plausibly upward as the XAM bundle (Kolide + Trelica + passkey) supports
      cross-sell pricing power on existing customer base without proportional CAC.
    claimRefs:
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
      - CI022
      - CI023
