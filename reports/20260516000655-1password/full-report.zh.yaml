      - number: '5.2'
        title: 架构、依赖、安全与合规
        blocks:
          - type: paragraph
            body: >-
              1Password 的架构差异点是 Secret Key——一个 128-bit 本地用户侧密钥，与主密码组合后才可解密保险库，意味着 1Password
              即便在服务器侧也无法解密用户数据。这是一种零知识架构，与仅凭凭据的密码管理器实质不同，也是 GDPR / CCPA 叙事的基础（服务器只接收加密数据块和元数据，从不接收解密后的
              Secrets）。1Password Connect 是用户自托管的本地 HTTPS 服务，为 CI / Kubernetes 工作负载提供可编程接口，无需回到 SaaS 即可获取 Secrets——这种企业
              Secrets 管理模式正在成为 XAM 的关键使能层。集成覆盖 SCIM（Okta、Azure AD、Google Workspace）、SSO（SAML、OIDC）、Slack 通知，以及 CLI /
              Terraform / GitHub Actions / Kubernetes operator 界面，并通过 shell-plugins 和 OP CLI 提供超过 100
              个应用市场集成。公开记录的信任和安全控制包括 SOC2 Type II、ISO/IEC 27001、GDPR / CCPA 处理附录、AES-256-GCM
              端到端加密，以及公开漏洞赏金计划和第三方安全审计。合规路线图通过可配置数据驻留支持 FedRAMP 相邻的企业需求，但截至 2026-05-16，完整 FedRAMP 授权状态未公开披露。关键平台依赖包括
              Apple、Microsoft、Google（OS 和浏览器自动填充 API）、云托管提供商，以及用于 SCIM 预配的 IdP 合作伙伴——每一项都引入上游风险向量。浏览器扩展依赖带来政策风险：Chrome /
              Safari 扩展政策变化会直接影响自动填充性能和审批要求。隐私态势仍然强：1Password 只收集极少元数据，零知识架构阻止服务器读取保险库内容，相比仅凭凭据的竞争对手，泄露爆炸半径更小。
