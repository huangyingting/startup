  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层、规模与具名引用
        blocks:
          - type: paragraph
            body: >-
              从定价档位和客户案例页面看，1Password 服务三个核心买方分层：个人 / 家庭消费者（Individual + Families 档）、SMB / 中端组织（Teams Starter Pack +
              Business）以及企业（带 SCIM + SSO 的企业密码管理器）。第四个增长中的分层是开发者 / DevOps 用户，通过 CLI、Shell Plugins、Connect 和 SCIM bridge
              覆盖——这里买方和用户分离（安全或平台团队购买，开发者使用）。公开口径下，1Password 声称商业客户超过 150,000 家、个人用户超过 15 million，具名企业引用包括
              Salesforce、GitLab、IBM、Slack、Intercom 和 PagerDuty。每个具名引用锚定不同用例：GitLab 是开发者档旗舰；Intercom 印证 SaaS
              供应商企业分层；PagerDuty 锚定事件响应凭据用例；Salesforce
              锚定更广泛的企业凭据叙事。垂直集中度较宽——金融、科技、专业服务、医疗健康和政府都出现在客户案例中，没有单一垂直占主导。地域组合偏向北美 +
              西欧，具名客户位于美国（Salesforce、GitLab、PagerDuty）、爱尔兰 / 美国（Intercom）以及类似英语圈地区；APAC 和 LATAM
              的企业牵引力公开可见度较低。渠道和合作伙伴客户包括 MSP / MSSP 分销商、审计 / 合规伙伴，以及 IdP 应用市场伙伴（通过 SCIM bridge 暴露的 Okta、Azure AD、Google
              Workspace 集成），但单个伙伴经济性仍属私有。G2 评论把 1Password 定位为品类领导者，拥有数千条评论且满意度持续较高；Gartner Peer Insights
              印证分析师级接受度；消费者媒体（Wirecutter、PCMag、CNET、Wired）也持续推荐 1Password。
