              1Password 的现金余额和烧钱速度未公开披露；考虑到 Series C 规模（Bloomberg 报道为 $620 million）和 SaaS 毛利率画像，现金跑道短期内不太可能成为约束。按
              Bloomberg 2022 年报道和 ICONIQ 评论，Series C 资金计划用于产品开发、市场扩张（尤其是商业 / 企业）和选择性收购——这一路线已通过 Kolide（2024）和
              Trelica（2025）收购落地。下一轮融资触发点未公开传递；ICONIQ 和 Tiger Global 持股意味着耐心资本，且截至 2026-05-16 尚未宣布 Series D，说明 1Password
              正在拉长上一轮资金周期。公开文件中看不到债务和项目融资义务；1Password 是私有公司，没有披露任何债务结构。1Password 的收购节奏意味着有可用于 M&A 的现金；Kolide 和 Trelica
              均由 1Password 博客报道，但未公开交易规模，且两家被收购实体在交易前都没有公开报道的九位数估值。财务结论上，循环订阅模式叠加品类领导者常见的高企业 NRR，意味着收入具备耐久性；利润率路径的杠杆是
              XAM 套装；资本强度较轻。尽调阻塞项有五个：收入 / ARR 未披露、毛利率未披露、客户 ARPU 未披露、烧钱速度 /
              现金跑道未披露、渠道经济性未披露——它们实质性限制财务模型信心。反向信号是：BleepingComputer 对密码管理器事件风险的持续报道提示尾部风险；若 1Password
              被卷入，收入轨迹可能受到实质冲击；截至 2026-05-16 尚未发生这种事件。整体财务逻辑是：投资人背书强、产品面扩张、收入虽未披露但可可信重建为数亿美元中段
              ARR，且没有公开资本充足性担忧；同时，私有公司披露缺口仍是标准风险。
