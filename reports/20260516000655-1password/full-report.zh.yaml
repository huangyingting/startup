figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: >-
      1Password 从 2005 年在 Toronto 自举起步，走过 2019/2020/2022 三轮定价融资，最终做到 $6.8B Series C；2024-2025 年又靠收购 Kolide 和 Trelica
      扩展平台。
    data:
      items:
        - date: '2005-01-01'
          label: AgileBits 成立
          detail: Dave Teare 与 Roustem Karimov 在 Toronto 自举创办。
          tone: positive
        - date: '2019-11-13'
          label: Series A 轮 — $200M
          detail: Accel 领投；成立 14 年后首次引入外部投资。
          tone: positive
        - date: '2020-07-08'
          label: Series B 轮 — $100M
          detail: Accel、Slack Fund、Atlassian、IBM Ventures 参投。
          tone: positive
        - date: '2021-01-01'
          label: 联合创始人 Teare 退居二线
          detail: 治理代际交接；CEO Shiner 巩固主导权。
          tone: neutral
        - date: '2022-01-19'
          label: Series C 轮 — $620M / $6.8B
          detail: ICONIQ Growth 与 Tiger Global 共同领投；Lightspeed 参投。
          tone: positive
        - date: '2023-01-01'
          label: LastPass 相关入侵尝试
          detail: 低严重性活动得到控制；客户保险库没有遭访问。
          tone: negative
        - date: '2023-06-01'
          label: Passkey 可用
          detail: 面向消费者和企业上线 passkey 保存、自动填充和登录。
          tone: positive
        - date: '2024-03-01'
          label: 收购 Kolide
          detail: 设备信任能力并入 XAM。
          tone: positive
        - date: '2024-04-01'
          label: Extended Access Management 上线
          detail: 身份 + 设备 + 访问治理打包成套。
          tone: positive
        - date: '2025-04-01'
