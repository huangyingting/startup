      - number: '7.2'
        title: 运营、技术、合作伙伴与财务风险
        blocks:
          - type: paragraph
            body: >-
              运营风险集中在可用性和质量。1Password 同步服务宕机即便是计划内，也会影响企业客户 NPS（状态页可跟踪）；多小时宕机会实质影响续约。终端用户丢失 Secret Key
              是高频客服痛点——产品设计决定，用户同时丢失 Secret Key 和 Emergency Kit
              后无法恢复保险库。已发布二进制包或扩展若遭供应链入侵，会波及所有客户；漏洞赏金和签名发布流水线能缓释，但不能消除风险。浏览器扩展商店下架（Chrome、Safari、Firefox
              政策变化）可能在会话中禁用自动填充，影响所有消费客户；缓释手段是多渠道安装原生应用。质量回归风险（Apple Silicon 迁移周期、浏览器 API 变动）会损害 Wirecutter / PCMag /
              CNET / Wired 顶级推荐带来的声誉引擎。事件响应成熟度只披露了一部分；MTTR
              和预案细节不公开——对一次近失事件若回应不清，客户信心流失速度可能快过事件本身。技术风险包括密码算法退役（AES-256-GCM 仍是行业标准，但后量子迁移是多年期加密敏捷性挑战），以及运行在客户基础设施中的
              Connect 或 SCIM bridge 漏洞（虽由客户托管，漏洞仍会损害 1Password 声誉并触发 CISA
              通报）。合作伙伴风险包括云托管提供商依赖（单云同步架构带来集中度风险；多云未公开披露）、IdP / SCIM API 破坏性变更（Okta、Azure AD、Google Workspace
              供应商政策变化会迫使重新认证），以及 Watchtower 对 Have I Been Pwned 的依赖（HIBP 可用性变化会削弱泄露检测差异化）。财务风险包括 Series C 资金集中（ICONIQ /
              Tiger Global / Accel 的耐心意味着不必做 Series D，但市场冲击可能压缩估值预期）、下一轮标记对利率 / 折现率敏感，以及累计融资 $920M+ 但未退出带来的 LP 流动性压力。CAD
              公司主体 / USD 收入组合带来 FX 敞口，但公开信息没有量化。Kolide / Trelica 整合若处理不当，是已知的价值毁损向量；整合在 2026 年处于早中期。安全买方市场中，企业销售周期拉长会提高
              CAC 并推迟 ARR 确认；2026 年宏观环境是当前关键敏感变量。
