  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >-
              到 2026 年，1Password 的监管和法律风险面主要由全球隐私制度、网络安全通报敞口，以及 SOC2 / ISO/IEC 27001 续审周期共同塑造。核心监管风险有几类：GDPR / UK-GDPR
              对一家处理 EEA 居民凭据的全球 SaaS 执法（1Password 发布了 DPA，但一旦发生数据泄露或处理目的偏离，仍有执法风险）；CCPA / CPRA
              和美国州隐私法持续带来隐私诉讼面（Schrems-II 式数据传输挑战、删除请求 SLA）；CISA / 各国网络安全机构通报敞口（1Password 客户端或同步服务若出现漏洞，很可能触发 CISA
              通报，实质影响客户信任和采购）；以及仍在成形的美国联邦隐私立法（American Privacy Rights Act 框架争论，加上行业专项豁免）。国际数据传输机制——Schrems-II 约束 EEA →
              US，UK-US Data Bridge——要求 adequacy / SCC 机制与 1Password 的北美托管安排对齐。法律风险包括服务条款 / 可接受使用执行裁量（ToS
              暴露了服务层面的裁量权，若处理不当，可能引发客户流失诉讼），以及 LastPass 2022 年泄露后的集体诉讼潮带来的风险（截至 2026-05-16，公开信息中没有针对 1Password
              的集体诉讼，但全行业反向诉讼敞口真实存在）。合规续审节奏是当前工作流：SOC2 Type II 按年续审，失效会伤害企业采购；Trelica / Kolide 整合后，ISO/IEC 27001
              适用性声明范围必须跟着扩展，收购资产若仍在范围外，可能产生审计发现。FedRAMP 是最显眼的合规缺口——1Password 尚未公开披露 FedRAMP 授权，这实质限制了联邦 SLED
              可服务市场。认证审计师产能这一供应商依赖带来小幅残余风险。专利 / IP 侵权敞口包括凭据管理或设备信任竞争对手可能提出的权利主张；Kolide / Trelica 收购也新增了可能被指控的 IP 面。
