chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品平台与定位
        blocks:
          - type: paragraph
            body: >-
              1Password 是 AgileBits Inc. 的商业名称。这家私有密码管理和访问管理公司由 Dave Teare 与 Roustem Karimov 于 2005 年在 Toronto
              创立。公司官网把它定位为面向现代 AI 驱动劳动力的全球访问管理领导者，产品覆盖消费者套餐（Individual、Families）、商业套餐（Teams、Business、Enterprise Password
              Manager）以及开发者界面（1Password CLI、1Password Connect、Secrets Automation、SCIM
              Bridge）。产品架构的差异点是双密钥模型：每个保险库同时由用户选择的账户密码和首次登录时本地生成的 128-bit 账户专属 Secret Key 加密。Secret Key 不会离开用户设备，也不存放在
              1Password 服务器上，因此连 1Password 员工也无法解密客户保险库；公司把这一点包装成相对单密钥方案的结构性优势。核心保险库之外，公司还提供 passkeys（保存、自动填充和用 passkeys
              登录）、开发者 CLI、自托管 Secrets 的 Connect 服务器、Watchtower 泄露提醒、跨境 Travel Mode，以及用于企业身份预配的 SCIM Bridge。原生应用覆盖
              macOS、Windows、Linux、iOS、Android，并以浏览器扩展形式支持 Chrome、Firefox、Edge、Brave 和 Safari，让 1Password 在跨平台覆盖上与
              Bitwarden、LastPass、Dashlane 和 Keeper 大体齐平。
