      - number: '1.3'
        title: 资本形成、里程碑与负面事件记录
        blocks:
          - type: paragraph
            body: >-
              1Password 的资本形成包含三轮定价融资。2019 年 11 月，Accel 领投 $200 million Series A——这是公司成立 14 年来的第一笔外部投资。2020 年 7 月，Accel
              领投 $100 million Series B，Slack Fund、Atlassian Ventures、IBM Ventures 以及 Shopify 高管 Tobias Lütke
              作为战略方参与。2022 年 1 月，ICONIQ Growth 和 Tiger Global 共同领投 $620 million Series C，投后估值 $6.8 billion，Lightspeed
              Venture Partners 与 Backbone Angels 参与，使累计已披露股权融资达到约 $920 million。此后的公司发展里程碑包括 2024 年 3 月收购 Kolide（总部
              Boston 的设备信任公司）和 2025 年 4 月收购 Trelica（总部 UK 的 SaaS 访问治理公司）；两者都接入公司 2024 年推出的 Extended Access Management
              平台。负面侧，1Password 于 2023 年公开披露一次低严重度入侵尝试，溯源到更广泛的 LastPass 泄露事件余波——公司称没有客户保险库被访问，相关活动已被遏制。过去十年，National
              Vulnerability Database 只列出少数与 1Password 相关的 CVE，且没有评级为 critical 级并确认发生大规模利用的条目，支撑了公司的安全记录主张。$6.8 billion
              私有估值尚未通过定价轮公开刷新；任何要约收购或老股交易也未披露，因此尽调上这个估值锚已经过时。
