            body: >-
              1Password 从 2018 年不足 1,000 家商业客户增长到 2026 年超过 150,000 家，期间商业档客户数复合增长约
              150x——多轮媒体口径的客户数相互印证。每客户部署席位这个具体采用指标未公开披露；自下而上建模（约 25–50 席 / 客户）能与公开商业客户数对齐。主动使用代理指标（保险库解锁的 DAU /
              MAU）未公开披露；活动量与集成足迹（CLI 使用、浏览器扩展日打开）相关，但分析师无法追踪。NRR / GRR / 队列留存指标同样仍属私有；SaaS 凭据管理同业基准下，品类领导者 NRR 为
              105–115%，考虑到 1Password 的续约友好架构，公司可能位于或高于该区间。续约机制上，消费者 / SMB 采用信用卡自动续订订阅，企业采用年度发票；各档流失动态不同。客户满意度代理指标（G2
              星级、Gartner Peer Insights、Trustpilot）在各评测界面持续达到 4.5+/5，显示 NPS / 满意度具有耐久性。客户成功 / 专业服务附加率在 Enterprise
              档有文档记录（专属 CSM、具名集成支持）；SMB 附加率则通过自助服务和共享支持池完成。漏斗顶端获客主要来自自然流量（消费者评测、Wirecutter / PCMag）、口碑，以及合作伙伴 / IdP
              应用市场露出；付费营销规模未公开披露。客户证据新鲜度混合：客户案例页面并非统一标注日期；单个案例研究缺少日期戳，对留存尽调构成证据质量限制。公开引用标识说明客户广度，但不能直接证明留存或生产部署深度。
