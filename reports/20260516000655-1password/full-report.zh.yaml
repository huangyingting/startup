  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑、反向逻辑、建议与风险
        blocks:
          - type: paragraph
            body: >-
              投资逻辑：到 2026 年，1Password 是品类领先的私营 SaaS，拥有 150,000+ 企业客户、15M+
              个人用户、具名企业客户案例（Salesforce、GitLab、IBM、Slack、Intercom、PagerDuty），并通过可信的 XAM 扩张（Kolide + Trelica 收购），把密码 /
              secrets 管理延伸到设备信任和 SaaS 访问治理。反向逻辑建立在三项私有输入上：收入 / ARR 未披露、NRR / GRR 未披露、客户集中度未披露；还叠加 Apple、Google、Microsoft
              平台原生 passkey 存储替代带来的多年期风险，会压缩消费层钱包份额。建议：在当前隐含估值下观察 / 继续研究；只有管理层披露收入、NRR
              和客户集中度，并足以解决最主要尽调缺口时，才转为买入立场。置信度为中等——公开证据支撑产品、客户和风险质量，但财务输入（收入、利润率、留存）仍是私有信息，置信度只能到由推算而非披露支撑的水平。风险评级为中等——残余风险集中在同行事故传染、平台
              / 扩展政策变化和客户集中度不透明；高于基线的安全姿态（SOC2、ISO/IEC 27001、漏洞赏金、Trust Center、透明隐私政策）提供缓释。按投资 KPI 评分（满分 10）：市场机会
              8、产品护城河 8、管理层质量 8、证据质量 6、盈利路径 6、收入证明 5、风险画像 5、估值支撑 5——这是一个产品 / 客户 / 管理层叙事都像品类领导者的标的，但收入证明和估值支撑仍卡住最终判断。
