              $7.99/user/month；Enterprise 定制报价。商业档采用按用户按月定价——这是 SaaS
              凭据管理的主流变现模式；消费者套餐则按家庭收取固定费用。消费者与商业收入占比未公开披露；Bloomberg 2022 年关于 $6.8B 估值的报道提到 Business / EPM
              是主要增长引擎，但没有披露拆分。销售动作混合：Individual / Families 通过 1password.com 和应用商店面向消费者直销；SMB 与企业档通过
              1password.com/business 和 1password.com/enterprise-password-manager 进行直销和合作伙伴渠道销售。销售周期、CAC 和回本周期未公开披露；公开
