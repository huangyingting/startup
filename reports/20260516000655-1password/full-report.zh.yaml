      - number: '2.3'
        title: 驱动因素、约束、负面信号与规模测算缺口
        blocks:
          - type: paragraph
            body: >-
              2024–2026 年的主要采用驱动包括 LastPass 泄露后的迁移顺风、监管压力（EU NIS2、US SEC 网络披露规则），以及 AI 时代围绕 SaaS 和模型 API
              凭据的访问治理。CISA、OWASP 和 Gartner Cybersecurity
              研究都把该品类列为优先事项。负面约束包括浏览器厂商的免费档替代品、中端市场采购摩擦，以及多供应商安全事件后更广泛的怀疑情绪——LastPass 2022/2023
              泄露事件仍在影响买方信任计算，并有利于具备结构性架构差异的付费替代品。passkey 迁移带来结构性变化：服务采用 passkeys 后，密码管理器品类会从「密码保险库」走向「passkey + 凭据保险库 +
              访问经纪」。企业在密码管理器、PAM 和 Secrets 管理器之间多栖部署越来越多，限制单一供应商的钱包份额扩张。1Password 的 Extended Access Management
              定位正是直接回应：通过 Kolide 和 Trelica 收购，把身份、设备信任和 SaaS 治理打包进一个供应商关系。仍开放的规模测算缺口包括头部付费管理器没有披露份额分母、发布方估算相互冲突（Fortune
              Business Insights、Statista、MarketsandMarkets），以及任何 2026 年分析测算都没有拆分 passkey 与 password
              归因。合起来看，尽调图景是绝对支出长期增长、消费者定价受结构性上限约束，以及一类平台机会正在扩大：供应商若能在单一采购合同下把凭据保险库、passkeys、设备信任和 SaaS 访问治理打包，就能吃到更多预算。
