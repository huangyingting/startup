              年公开退出日常运营，转向家庭和个人项目；据 Wikipedia 与 AgileBits 历史资料，Karimov 仍保留高级技术角色。法律实体 AgileBits Inc.
              仍是服务条款和隐私声明中的签约主体。按公司 LinkedIn 主页与 Built In 估计，公开员工数在 1,000-1,500 区间；2022 年 Series C 后增长提速，2023-2024
              年随行业整体理性化出现温和收缩。公司总部仍在加拿大 Ontario 省 Toronto，采用远程优先运营模式；招聘页面仍在 Toronto、Vancouver
