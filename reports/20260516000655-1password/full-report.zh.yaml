  - id: FU001
    title: 客户旅程地图
    type: journey-map
    layout: wide
    summary: >-
      1Password 的主导客户旅程涵盖发现（评测网站、口碑、IdP 市场）、试用 / 个人账户、家庭或团队采用、带 SCIM / SSO 的 Business 升级、席位扩张，以及向设备信任和 SaaS 治理做 XAM
      交叉销售。
    data:
      nodes:
        - id: j1
          label: 发现——评测 / 口碑 / 伙伴入口
          detail: Wirecutter / PCMag / CNET / Wired 消费者评测给出首选推荐；IdP 市场露出（Okta）触达 IT 采购者。
        - id: j2
          label: 试用 / Individual 账户
          detail: 通过 1password.com 或应用商店免费试用，之后订阅 $2.99/mo 的 Individual 或 $4.99/mo 的 Families。
        - id: j3
          label: 家庭或团队采用
          detail: Families 计划为 5 人增加共享保险库；Teams Starter Pack 为 10 名用户增加共享 SMB 保险库。
        - id: j4
          label: 带 SCIM / SSO 的 Business 升级
          detail: IT 为 SCIM 预置、SSO、审计日志和管理员策略触发 Business / Enterprise 升级。
        - id: j5
          label: 按席位扩张 + 开发者采用
          detail: 客户人头增长带来席位增加；CLI / Connect 采用把使用场景扩展到开发者。
        - id: j6
          label: XAM 交叉销售（Kolide + Trelica）
          detail: XAM 套件在密码 / secrets 核心之上，增加设备信任 + SaaS 治理模块。
        - id: j7
          label: 续约 + 背书
          detail: 年度或自动续约 + 具名背书 / 案例研究发布，反哺发现漏斗。
