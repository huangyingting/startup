            title: 三条残余风险向量占主导：同行事故传染、平台政策变化和客户集中度不透明
            body: >-
              监管、运营、技术、合作伙伴、财务和反向立场风险合在一起看，按严重程度加权后的残余风险集中在三条向量：同行密码管理器事故带来的声誉传染（LastPass 2022 年立下先例）；浏览器扩展商店或 OS 自动填充
