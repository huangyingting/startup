      - number: '7.3'
        title: 反向、执行、残余敞口与投资逻辑失效触发因素
        blocks:
          - type: paragraph
            body: >-
              反向立场风险主要由声誉传染向量主导。同行事故的声誉传染（LastPass 2022 年泄露及后续集体诉讼定义了密码管理器品类风险；截至 2026-05-16，1Password
              未被卷入，但传染仍是尾部风险）。1Password 自身基础设施发生直接安全事件，是最大的尾部风险——会同时触发 CISA 通报、客户流失和集体诉讼敞口。密码管理器行业安全的负面媒体周期（The Hacker
              News、CSO Online、HelpNet、SecurityWeek、DarkReading、Reuters）会侵蚀整个品类的消费者信任。Hacker News
              的负面讨论串虽不是监管者，但在凭据管理品类里可以很快升级为主流媒体报道。Apple / Google / Microsoft 的平台原生 passkey
              替代，是多年期反向威胁，会挤压消费层钱包份额。Microsoft / Apple / Google 将企业级密码 / passkey 管理打包进 OS 或生产力套件，会对消费者 / SMB
              市场施加商品化压力。竞争风险包括 Bitwarden / NordPass / Proton / Dashlane / Keeper 功能趋同带来的消费价格压缩（尤其 Bitwarden 免费层），以及
              1Password 向设备信任和 SaaS 治理扩张后，与 CyberArk / Delinea / BeyondTrust / HashiCorp 在企业 secrets 管理上的碰撞。人员 /
              执行风险集中在关键管理层留任（CEO Jeff Shiner
              任期很长，但连续性没有公开对冲）和竞争激烈科技劳动力市场中的工程团队留任。客户基础风险：具名客户集中在科技垂直（Salesforce、GitLab、IBM、Slack、Intercom、PagerDuty），且与科技下行高度相关。核心安全风险的缓释成熟度高于行业基线：漏洞赏金、第三方审计、透明隐私政策和
              Trust Center。残余敞口集中在三条：同行事故声誉传染、平台 / 扩展政策变化、客户集中度 / NRR 不透明。最主要的投资逻辑失效触发因素是 1Password
              发生直接安全事件（保险库内容泄露或同步服务器被攻破）——会触发立即重估和转向反向立场。总体看，按严重程度加权后的残余风险为中等。
