          - type: callout
            title: 收入和倍数是估值里最大的敏感性杠杆
            body: >-
              自下而上 ARR 输入的 2x 跨度（$440–920M）是单一最大的估值杠杆；在 $700M 基准 ARR 上，1x 倍数变化约为 $0.7B（Series C 标记的 10%）。XAM 附着率敏感性在
              10–30% 附着率、10x 倍数下额外带来 $2–5B 摆动。管理层财务披露会压缩收入跨度；XAM 附着率披露会解决三项敏感性里杠杆最高的一项。
