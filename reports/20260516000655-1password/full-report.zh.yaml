      - number: '2.2'
        title: 规模测算视角与买方 / 用户 / 付款方分层
        blocks:
          - type: paragraph
            body: >-
              劳动力密码管理器板块的公开市场规模测算分散在多个分析机构之间。Fortune Business Insights 估算，全球密码管理市场 2024 年约 $3.0 billion，到 2032 年约增至
              $10–11 billion，CAGR 在 17–22% 区间。MarketsandMarkets 估算，市场在 2020 年代初约 $2.5 billion，并以 20%+ CAGR 增长到 2020
              年代后期。Statista 的 passwords 专题显示，消费者采用率和泄露驱动的企业投资都保持逐年增长。Gartner 网络安全研究和 Forrester Wave
              密码管理器报告均把劳动力密码管理置于后期增长阶段（尚未成熟），头部表格仍在扩张。对 1Password
              而言，现实的可服务市场（SAM）是受监管市场（US、EU、UK、Canada、Australia）中的付费劳动力密码管理器支出子集，按支出加权可能占全球市场的 60–70%。按 1Password 当前规模（约
              150k 商业客户、声称 15M 个人用户），可获取市场（SOM）约为付费密码管理器支出的 20–30%，具体取决于方法。企业采购更看重定价简单性、SCIM/SSO
              支持和泄露态势，而非功能完全齐平，因此竞争选择收窄到约五家付费供应商。消费者场景下买方、用户、付款方是同一个人；SMB 场景下买方（IT 通才）与付款方（企业）分离；企业场景下用户（每名员工）与付款方（IT
              成本中心）分离，CISO 是主要买方。
