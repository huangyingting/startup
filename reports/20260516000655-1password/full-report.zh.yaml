      - number: '3.2'
        title: 能力、定价、GTM 与信任对比
        blocks:
          - type: paragraph
            body: >-
              能力侧——保险库、共享、SCIM/SSO、MFA 强制、passkeys、SSH/CLI 集成——1Password 与 Bitwarden 在头部接近齐平，Keeper 和 Dashlane
              紧随其后；LastPass 在 2023 年事件后企业功能齐平度下降。标价侧，Bitwarden 仍是成本最低的付费选择，1Password 位于中档（Business 为
              $7.99/user/month），Keeper / Dashlane 定位相近；Proton Pass 作为 Proton Unlimited 捆绑的一部分定价。GTM
              动作上，消费者领导者依靠线上直销和评测带来的获客，企业领导者依靠直销加 MSSP / 渠道分销商以及 SSO IdP 合作。信任 / 监管态势上，前五大付费管理器都发布 SOC 2 证明；LastPass
              2022 泄露事件重置了信任计算，FedRAMP 授权（Keeper 拥有）则是美国公共部门采购的重要差异点。Gartner Peer Insights 汇总评分显示，1Password 与 Bitwarden
              处于头部梯队，均值 4.5+；Keeper 和 Dashlane 以半星级差距跟随；LastPass 在 2023 年后评分修复。TrustRadius 和 Software Advice
              也相互印证。1Password
              的企业客户页面列出具名客户（Salesforce、GitLab、IBM、Slack）；独立合作伙伴页面（GitLab、Intercom、PagerDuty）印证交叉渗透——但竞争证明并不专属于任何单一供应商。Forrester
              Wave 密码管理器评估覆盖 1Password、Bitwarden、Keeper、Dashlane 和 Proton Pass；LastPass 也被纳入，但带有担忧。
