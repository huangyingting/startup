            title: 平台与扩展政策依赖是主导技术风险
            body: >-
              浏览器扩展商店政策变化（Chrome / Safari / Firefox）、OS 自动填充 API 变化（Apple、Microsoft、Google），以及 IdP SCIM API
              破坏性变更，都是实质上超出 1Password 控制的上游风险。Trelica / Kolide 收购又增加了 SaaS-API 和端点遥测依赖层；每一次集成变化都可能影响产品可靠性和 XAM 逻辑。
