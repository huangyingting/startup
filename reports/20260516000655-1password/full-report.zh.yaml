  - id: FE001
    title: 产品架构栈
    type: stack
    layout: standard
    summary: 从面向消费者的 UI 到平台 / OS 依赖，垂直拆解产品层，标出 Secret Key 零知识架构在同步和存储链路中的位置。
    data:
      layers:
        - id: l1
          label: 原生应用 + 浏览器扩展（UX）
          detail: >-
            macOS / Windows / Linux 桌面应用；iOS / Android 移动应用；Chrome / Firefox / Safari / Edge / Brave 浏览器扩展，负责页面内自动填充和
            passkey UX。
        - id: l2
          label: Rust 核心库（加密 + 同步原语）
          detail: 共享 Rust 核心实现加密原语、保险库模型和同步逻辑，并复用于桌面、移动端和 CLI 界面。
        - id: l3
          label: Secret Key + 主密码（本地解锁）
          detail: 128-bit Secret Key 与用户选择的主密码结合，派生本地解密密钥；解密密钥从不传到服务器。
        - id: l4
          label: AES-256-GCM 保险库加密
          detail: 保险库条目在客户端用 AES-256-GCM 加密；离开设备的只有密文 + 元数据。
        - id: l5
          label: 1Password 同步服务器（加密 blob + 元数据）
          detail: 服务器存储加密 blob 和路由元数据；无法解密用户保险库内容（零知识）。
        - id: l6
          label: 云托管基础设施
          detail: 云服务商承载同步服务器、状态页和账户管理界面；服务商细节未公开点名。
        - id: l7
          label: IdP / SCIM 桥接（用户预置）
          detail: SCIM 桥接从 Okta、Azure AD、Google Workspace 预置用户；企业租户通过 SAML / OIDC 做 SSO。
        - id: l8
          label: Connect（本地 secrets API）
          detail: 客户在 Docker / Kubernetes 中自托管 HTTPS 服务；在 CI / 工作负载与 1Password 同步之间做中介。
        - id: l9
          label: XAM 模块——Kolide 设备信任、Trelica SaaS 访问治理
          detail: 收购后的模块叠在密码 / secrets 核心之上，把控制范围延伸到设备状态和 SaaS 应用访问。
    claimRefs:
