      - number: '3.3'
        title: 护城河、切换成本、替代风险与战略方向
        blocks:
          - type: paragraph
            body: >-
              劳动力 PWM 的切换成本中等但真实存在：各大供应商都支持导出 / 导入流程，但进行中的凭据工作流、浏览器集成、SCIM 映射和策略模板都会制造摩擦。企业在 PWM + PAM + Secrets Manager
              之间多栖部署越来越多，限制钱包份额扩张。分发力越来越来自 SSO/IdP 合作（Okta、Microsoft Entra）和 MSP/MSSP 渠道计划；1Password
              运营合作伙伴计划，但具体分销经济性未公开披露。1Password 的结构性护城河候选项包括：（a）双 Secret Key 架构（安全侧结构性差异点），（b）Kolide / Trelica / passkey
              套装（XAM 定位），以及（c）来自家庭套餐的消费者品牌强度。价格商品化压力真实存在——Bitwarden 的开源免费档和 OS 钥匙串捆绑限制定价权，尤其在 SMB
              和消费者板块。最可信的替代风险来自：（a）Apple Keychain / Google Password Manager 在 OS 层面面向消费者的改进，以及（b）Microsoft Entra / Okta
              IdP 套装向企业凭据保险库扩张。反向竞争证据——LastPass 2022/2023 泄露事件——把该品类塑造成一个结构性安全架构本身就是护城河的市场。战略方向上，1Password 正在打包 Extended
              Access Management；Bitwarden 投入自托管企业和 passkeys；Keeper 投入 FedRAMP；Dashlane 从消费者转向商业；Proton
              继续捆绑。资本背书方面，CyberArk 是上市公司，LastPass / Dashlane / Keeper 有 PE 支持，Bitwarden 有风投支持，Proton 独立融资；1Password 的
              ICONIQ / Accel / Tiger Global 财团让它处于私有财务实力最高的梯队。
