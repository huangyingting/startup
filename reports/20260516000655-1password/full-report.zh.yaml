      - number: '8.3'
        title: 退出路径、尽调问题与投资逻辑失效触发因素
        blocks:
          - type: paragraph
            body: >-
              退出路径以 IPO 作为标准选项，压力情景下也可能通过二级交易，或被身份安全现有厂商（Okta、CyberArk）或平台方（Microsoft、Google）战略收购。规模支撑 IPO 准备度（15M+
              用户、150k+ 企业客户、Series C 后四年以上、治理成熟），但未披露的财务透明度需要在 S-1 中正式化。稀释 / 优先权悬顶由 ICONIQ 领投、Accel 和 Tiger Global 参投的
              Series C 股权结构表决定；优先股堆叠不公开，但标准 1x 非参与型优先股意味着在 down round 情景下普通股会被稀释。最终尽调问题有四项：(1) 管理层披露
              ARR、NRR、GRR、毛利率和经营利润率，把收入证明 KPI 从 5/10 提到 8/10；(2) 前十大客户 ARR 占比 + 按垂直行业划分的集中度，为集中度风险设边界；(3) FedRAMP
              路线图、MTTR / IR 预案、后量子密码路线图、公开 SBOM，以关闭合规 / 安全披露面；(4) Trelica 整合后的 XAM 交叉销售附着指标，验证 2026
              年最主要扩张杠杆。投资逻辑失效触发因素有三项：1Password 发生直接安全事件（保险库泄露或同步被攻破）会触发立即重估；公开收入披露若显著低于自下而上 $440–920M
              区间，会压缩多个倍数档；前十大客户集中度超过 ARR 的 30%，会把风险评级从中等推到高，并压缩可接受倍数区间。整体估值立场：在 $6.8B Series C 标记下观察；若管理层披露的财务数据支撑 ARR >
              $700M、NRR > 110%、集中度 < 20%，则买入；若发生直接安全事件或集中度 > 30%，则放弃。
