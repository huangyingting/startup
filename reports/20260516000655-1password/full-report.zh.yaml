      - number: '6.3'
        title: 扩张、集中度风险与客户结论
        blocks:
          - type: paragraph
            body: >-
              第一大扩张驱动是从消费者 / Teams Starter 向 SSO / SCIM / Business
              档增购，这是一条有文档记录的升档路径；按席定价支持客户组织随着员工数增长先落地再扩张。第二大扩张驱动是面向现有 150k 商业客户交叉销售 XAM（Kolide + Trelica）套装，这是 2026
              年的主导扩张向量；量化附加率仍属私有。跨档迁移并不对称：Families → Individual 罕见，Consumer → SMB 升级具有机会性，但 SMB → Business / Enterprise
              是随招聘增长和安全成熟度提升而来的主导升档路径。客户集中度未公开披露；具名引用横跨差异很大的垂直和规模，暗示客户基础分散，但 top-10
              客户收入占比仍属私有——这是重大尽调缺口。渠道集中度上，1Password 的直销动作意味着相较 Keeper / Dashlane 这类高度依赖 MSP
              的同业，渠道集中度较低；不过单个伙伴经济性仍为私有。SMB 采购摩擦低（刷卡即可），企业采购摩擦中等（SCIM 集成 +
              安全审查）；企业销售周期通常跨几个季度，但细节为私有。反向信号是：BleepingComputer / The Hacker News / CSO Online 广泛报道过密码管理器事件风险（如 LastPass
              2022 泄露）；客户信任传染仍是行业级负面向量。客户流失驱动通常是仅 passkey 迁移（消费者可能整合到平台原生 passkey 存储）和凭据管理疲劳；1Password 的 passkey
              支持和生态广度缓解了这两点。客户驱动的负面信号有限：没有公开重大事件显示具名客户队列集体流失；Hacker News 和评测论坛中有小规模投诉，但截至 2026-05-16
              未发生与泄露相关的大规模流失事件。战略价值客户（具名企业引用）支撑可信的商业档引用网络；鉴于行业组合分散，它们带来的收入集中风险可能较低。总体看，1Password 在 2026 年客户基础宽（150k+
              商业客户 + 15M+ 消费者）、垂直和地域分散、由具名企业引用锚定，并通过按席扩张加 XAM 交叉销售增长；留存指标仍私有但可能高于同业区间。客户章节的头号尽调缺口是集中度、NRR 和席位级经济性。
