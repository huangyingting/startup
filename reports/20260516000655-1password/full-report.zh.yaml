        title: 成本结构、利润率路径与公开牵引力
        blocks:
          - type: paragraph
            body: >-
              对这种画像的 SaaS 公司而言，成本结构主要由 R&D 和 S&M 主导；毛利率披露仍属私有，但 SaaS 凭据管理同业基准（CyberArk 毛利率
              80%+）说明模型在结构上具有高毛利。营运资本强度低——软件即服务预收款周期通常带来负营运资本拖拽（现金先于收入确认收取）；1Password
              没有公开披露。服务交付成本主要是托管、客户成功和支持职能，不是资本开支密集型，符合 SaaS 基础设施画像。1Password 公开声称商业客户超过 150,000 家，企业产品上的开发者团队用户超过
              100,000；15 million 个人用户数字也出现在多轮新闻稿中。ARR / 收入未公开披露；媒体报道和分析师评论把 1Password 的收入规模放在高端私有 SaaS 档位，但精确数字没有得到
              1Password 直接佐证。公开收入 / ARR 缺口是最大的财务尽调缺口——没有 1Password 披露时，估值模型只能依靠客户数 × 每席定价的自下而上校验。按每席收入代理指标（150k 商业客户 × 约
              $7.99/user/month × 每客户平均估计 25-50 席）计算，公开收入底线把 1Password 商业档 ARR 放在 $360-720 million 区间；该估算因企业标价折扣未公开而偏低。到
              2026 年，利润率路径大概率向上，因为 XAM 套装（Kolide + Trelica + passkey）可在现有客户基础上支撑交叉销售定价权，而不需要同比例增加 CAC。
