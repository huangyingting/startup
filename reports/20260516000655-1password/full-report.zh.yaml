  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、细分板块与替代品
        blocks:
          - type: paragraph
            body: >-
              1Password 切入密码与访问管理品类，这个市场位于身份（IAM）、端点安全和 SaaS 治理的交叉点。相关市场可拆成两个功能上不同的板块。劳动力凭据管理——也就是消费者和商业密码管理器板块——是
              1Password 的主战场，现状替代品包括浏览器内置密码管理器（Chrome、Safari、Edge）、OS 钥匙串（Apple Keychain、Windows Credential
              Manager）、基于电子表格的凭据共享，以及免费 / 免费增值工具。开发者 Secrets 管理——CI/CD Secrets、机器身份、API key——是相邻板块，1Password Connect 和
              1Password CLI 在开发者体验上竞争，但覆盖范围窄于主流基础设施 Secrets 工具。特权访问管理（PAM）也是相邻但不同的品类，重点是特权服务器和基础设施凭据，而不是 1Password
              销售所在的员工应用登录层。Wikipedia 的密码管理器品类列出二十多个具名产品，说明前五大付费领导者下方仍有碎片化长尾。CISA 网络安全建议和 OWASP 认证指南都把密码管理定义为基础卫生控制；即便不考虑
              passkeys，该品类对受监管行业也属于非可选采购。
