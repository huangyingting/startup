      - number: '8.4'
        title: 图表
        blocks:
          - type: callout
            title: 在 $6.8B Series C 标记下观察 / 继续研究；买入取决于财务披露
            body: >-
              公开证据支撑 1Password 的产品、客户、管理层和风险质量，但财务输入（ARR、NRR、GRR、毛利率、客户集中度）仍是私有信息。正确动作是在 $6.8B 标记下观察，只有管理层披露的财务数据支撑 ARR
              > $700M、NRR > 110%、前十大客户集中度 < 20% 时，才转为买入。放弃立场的触发因素是直接安全事件或前十大客户集中度 > 30%。
