  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品面、模块与客户工作流
        blocks:
          - type: paragraph
            body: >-
              到 2026 年，1Password 是跨平台密码与 Secrets 管理器，通过 macOS、Windows、Linux、iOS、Android 原生应用，以及
              Chrome、Firefox、Safari、Edge 和 Brave 浏览器扩展交付。Business 和 Enterprise SKU 在核心保险库产品之上叠加 SSO、SCIM
              预配、高级审计日志、自定义安全策略和专属 CSM 支持，把套件定位为面向组织的端到端 Secrets / 凭据平台，而不是单一功能的自动填充工具。产品模块横跨消费者和团队密码保险库、面向开发者 Secrets 的
              Secrets Automation、Connect（用于集群内 Secrets 获取的自托管 HTTPS 服务）、OP CLI、Shell Plugins、SCIM bridge，以及收购后引入的
              Trelica SaaS 访问治理和 Kolide 设备信任模块。个人客户工作流围绕自动填充、密码生成和安全笔记存储；团队场景增加共享保险库、基于角色的访问控制和 SCIM 驱动的预配；开发者场景则把 CLI
              驱动的 Secrets 获取接入 shell、CI 和 Kubernetes 工作流。Passkey 支持已在各平台普遍可用，也是战略定位向量：1Password 提供 passkey
              存储和自动填充，把密码管理器定位为后密码认证时代的 passkey 托管方。Watchtower——主动监测泄露 / 弱密码——是所有付费档都包含的差异化功能，借助 Have I Been Pwned
              和自有启发式规则暴露已泄露凭据。
