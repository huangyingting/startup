  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 市场版图与竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              2026 年，直接付费劳动力密码管理器竞争集包括 Bitwarden、LastPass、Keeper Security、Dashlane、Proton Pass 和
              1Password——五家付费领导者，加上一家开源 / 隐私导向挑战者。浏览器内置密码管理器（Chrome、Safari、Edge）和 OS 钥匙串（Apple Keychain、Windows
              Credential Manager）构成主导性免费替代品，也是结构性的现状竞争者。在相邻的特权访问管理（PAM）中，CyberArk、Delinea 和 BeyondTrust
              占主导——它们解决特权服务器凭据问题，而不是员工应用登录，因此与 1Password 相邻而非正面竞争。在开发者 Secrets 管理中，HashiCorp Vault、AWS Secrets Manager 和
              CyberArk Conjur 占主导；1Password Connect 和 1Password CLI 在开发者体验上竞争，但覆盖范围更窄。Bitwarden 主打开源可验证性和慷慨免费档，付费
              Business 档从 $4/user/month 起。LastPass 在 GoTo 剥离后独立运营，仍在从 2022/2023 泄露事件对企业信任态势的实质性重置中恢复。Keeper Security 拥有
              FedRAMP 授权和较强的美国公共部门足迹。Dashlane 已重新聚焦劳动力商业板块。Proton Pass（2023 年推出）把密码管理捆绑进更广的 Proton 隐私套件。CyberArk
              为上市公司（Nasdaq: CYBR），市值数十亿美元；Delinea 于 2021 年由 TPG 旗下 Thycotic/Centrify 合并而成；BeyondTrust 在设备信任层与 Kolide
              有重叠；HashiCorp Vault 是主导性开源 Secrets 管理器。
