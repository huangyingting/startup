        - label: Teams Starter / Business upgrade
          value: 6
          detail: SMB IT triggers per-seat Business at $7.99/user/mo (illustrative).
        - label: Enterprise + SCIM + SSO
          value: 2
          detail: Custom Enterprise with SCIM bridge + named CSM (illustrative).
        - label: Expansion (seats + XAM)
