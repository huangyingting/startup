      - FU004
  - id: expansion-concentration-and-verdict
    title: Expansion, concentration risk, and customer verdict
    body: >-
      Expansion driver number one is SSO / SCIM / Business-tier upsell from consumer / Teams Starter — a documented
      up-tier path; per-seat pricing supports land-and-expand within each customer organisation as customer headcount
      grows. Expansion driver number two is XAM (Kolide + Trelica) bundle cross-sell to existing 150k business
      customers, the dominant 2026 expansion vector; quantitative attach is private. Cross-tier movement is asymmetric:
      families → individual is rare, consumer → SMB upgrade is opportunistic, but SMB → Business / Enterprise is the
      dominant up-tier path through hiring growth and security maturation. Customer concentration is not publicly
      disclosed; named references span very different verticals and sizes suggesting a diversified base, but top-10
      customer % of revenue is private — a material diligence gap. Channel concentration: 1Password's direct-sales
      motion suggests low channel concentration versus MSP-heavy peers like Keeper / Dashlane; however, per-partner
      economics are private. Procurement friction is low for SMB (credit-card swipe) and moderate for enterprise (SCIM
      integration + security review); enterprise sales cycles run several quarters typically but specifics are private.
      Adverse signal: BleepingComputer / The Hacker News / CSO Online have covered password-manager incident risk
      broadly (e.g., LastPass 2022 breach); customer trust contagion remains an industry-wide adverse vector. Customer
      churn drivers are typically passkey-only migration (consumers may consolidate on platform-native passkey storage)
      and credential-manager fatigue; both are mitigated by 1Password's passkey support and ecosystem breadth.
      Customer-driven adverse signals are limited: there is no major public incident with named customer cohorts walking
      away; small-scale complaints exist on Hacker News and review forums but no breach-related mass-churn event has
      occurred through 2026-05-16. Strategic-value customers (the named enterprise references) underwrite a credible
      business-tier reference network; revenue concentration risk among them is plausibly low given the diverse industry
      mix. Overall, 1Password's customer base in 2026 is broad (150k+ business + 15M+ consumers), diversified by
      vertical and geography, anchored by named enterprise references, growing via per-seat expansion plus XAM
      cross-sell, with private but plausibly above-peer-band retention metrics; the headline customer diligence gaps are
      concentration, NRR, and seat-level economics.
    claimRefs:
