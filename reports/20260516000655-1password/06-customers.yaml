schemaVersion: report-v2
artifact: customers
slug: 1password
runDate: '2026-05-16'
company:
  name: 1Password
chapter:
  number: 6
  title: Customers
  summary: >-
    1Password's customer base in 2026 spans 150,000+ business customers and 15M+ individuals, anchored by named
    enterprise references including Salesforce, GitLab, IBM, Slack, Intercom, and PagerDuty. Vertical / geographic
    concentration is broad and North-America / Europe-skewed. G2, Gartner Peer Insights, Wirecutter, and PCMag
    corroborate durable satisfaction. Adoption has grown ~150x in the business tier over 2018–2026. NRR / GRR / cohort
    retention, top-10 customer concentration, seat distribution, and active-vault DAU are all private — material
    customer-tier diligence gaps. Expansion is driven by per-seat land-and-expand plus XAM (Kolide + Trelica) cross-sell
    to the 150k business base.
sections:
  - id: segmentation-and-named-customers
    title: Customer segments, scale, and named references
    body: >-
      1Password serves three core buyer segments visible across pricing tiers and the customer-stories page: individual
      / family consumers (Individual + Families tiers), SMB / mid-market organisations (Teams Starter Pack + Business),
      and enterprise (Enterprise password manager with SCIM + SSO). A fourth growing segment is developer / DevOps
      users, addressed via CLI, Shell Plugins, Connect, and the SCIM bridge — buyers and users diverge here (security or
      platform team buys, developers use). Publicly 1Password claims more than 150,000 business customers and more than
      15 million individuals, with the named-enterprise reference list including Salesforce, GitLab, IBM, Slack,
      Intercom, and PagerDuty. Each named reference anchors a different use case: GitLab is the developer-tier flagship;
      Intercom corroborates the SaaS-vendor enterprise segment; PagerDuty grounds the incident-response credential use
      case; Salesforce anchors the broader corporate-credential story. Vertical concentration is broad — finance,
      technology, professional services, healthcare, and government all visible in customer stories, with no single
      vertical dominating. Geographic mix skews North America + Western Europe, with named customers in the US
      (Salesforce, GitLab, PagerDuty), Ireland / US (Intercom), and similar Anglosphere geographies; enterprise traction
      in APAC and LATAM is not as publicly visible. Channel and partner customers include MSP / MSSP resellers, audit /
      compliance partners, and IdP marketplace partners (Okta, Azure AD, Google Workspace integrations exposed via the
      SCIM bridge), though per-partner economics are private. G2 reviews position 1Password as a category leader with
      thousands of reviews and consistently high satisfaction ratings; Gartner Peer Insights corroborates analyst-tier
      reception; consumer press (Wirecutter, PCMag, CNET, Wired) consistently recommends 1Password.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
      - CU014
      - CU015
      - CU016
      - CU017
    tableRefs:
      - TU001
      - TU003
    figureRefs:
      - FU001
  - id: adoption-and-retention
    title: Adoption trajectory, retention, and satisfaction
    body: >-
      1Password has grown from sub-1,000 business customers in 2018 to more than 150,000 by 2026, a ~150x compounding
      business-tier customer growth over the period — corroborated by press iterations of the customer count. The
      specific adoption metric of seats deployed per customer is not publicly disclosed; bottom-up modelling (~25–50
      seats per customer) reconciles with the public business-customer count. Active-usage adoption proxies (DAUs / MAUs
      of vault unlocks) are not publicly disclosed; activity correlates with the integration footprint (CLI usage,
      browser-extension daily opens) but is not analyst-tractable. NRR / GRR / cohort retention metrics are similarly
      private; SaaS-credential peer-benchmark NRR is 105–115% for category leaders, suggesting 1Password sits in or
      above this band given the renewal-friendly architecture. Renewal mechanics are auto-renew subscription with
      credit-card billing for consumer / SMB, and annual invoice for enterprise; churn dynamics differ by tier. Customer
      satisfaction proxies (G2 star rating, Gartner Peer Insights, Trustpilot) consistently land 4.5+/5 across review
      surfaces, indicating durable NPS / satisfaction. Customer-success / professional-services attach is documented for
      Enterprise (dedicated CSM, named integrations support); attach for SMB is via self-serve plus shared support pool.
      Top-of-funnel acquisition is dominated by organic (consumer reviews, Wirecutter / PCMag), word-of-mouth, and
      partner / IdP marketplace placements; paid marketing presence is not publicly disclosed in scale. Customer
      evidence freshness is mixed: customer-stories page case studies are not uniformly dated; the lack of date stamping
      on individual case studies is an evidence-quality limitation for retention diligence. Public reference logos scale
      customer breadth but do not directly evidence retention or production-deployment depth.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU018
      - CU019
      - CU020
      - CU026
      - CU027
      - CU030
      - CU031
    tableRefs:
