figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      The dominant 1Password customer journey spans discovery (review sites, word-of-mouth, IdP marketplace), trial /
      individual account, household or team adoption, business upgrade with SCIM / SSO, expansion across seats, and XAM
      cross-sell to device-trust and SaaS-governance.
    data:
      nodes:
        - id: j1
          label: Discovery — reviews / WOM / partner placement
          detail: Wirecutter / PCMag / CNET / Wired top-pick consumer reviews; IdP marketplace placement (Okta) for IT buyers.
        - id: j2
          label: Trial / Individual account
          detail: Free trial then $2.99/mo Individual or $4.99/mo Families subscription via 1password.com or app stores.
        - id: j3
          label: Household or team adoption
          detail: Families plan adds shared vaults for 5; Teams Starter Pack adds shared SMB vaults for 10 users.
        - id: j4
          label: Business upgrade with SCIM / SSO
          detail: IT triggers Business / Enterprise upgrade for SCIM provisioning, SSO, audit logs, and admin policies.
        - id: j5
          label: Per-seat expansion + developer adoption
          detail: Customer headcount growth adds seats; CLI / Connect adoption expands into developer use cases.
        - id: j6
          label: XAM cross-sell (Kolide + Trelica)
          detail: XAM bundle adds device trust + SaaS-governance modules on top of password / secrets core.
        - id: j7
          label: Renewal + reference
          detail: Annual or auto-renew + named-reference / case-study publication contributes back to the discovery funnel.
    claimRefs:
      - CU001
      - CU002
      - CU008
      - CU021
      - CU022
      - CU031
      - CU032
  - id: FU002
    title: Adoption / deployment funnel
    type: funnel
    layout: standard
    summary: >-
      Discovery → trial → individual paid → team / business upgrade → expansion → XAM cross-sell. Absolute conversion
      rates are private; relative funnel stages map to 1Password's pricing and SCIM provisioning surface.
    data:
      items:
