    title: Diversified named-reference network anchors enterprise credibility
    body: >-
      Salesforce, GitLab, IBM, Slack, Intercom, and PagerDuty as named references span very different verticals and
      SaaS-vendor categories, supporting a credible enterprise reference story. Combined with 4.5+/5 G2 / Gartner /
      Trustpilot satisfaction across thousands of reviews and recurring Wirecutter / PCMag top-pick consumer
      recommendations, the customer-base credibility is unusually strong for a private SaaS at this scale.
    claimRefs:
