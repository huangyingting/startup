chapter:
  number: 7
  title: Risks
  summary: >-
    1Password's 2026 risk register spans regulatory (GDPR, CCPA, CISA, SOC2 / ISO renewal, FedRAMP gap), operational
    (sync outage, supply chain, extension deplatforming, quality regression, IR maturity), technical (PQC migration,
    Connect vuln), partner (cloud-provider concentration, IdP API drift, HIBP dependency), financial (next-round
    valuation mark, discount-rate sensitivity, LP-liquidity pressure), and adverse-stance (peer-incident contagion,
    direct breach, platform-native passkey substitution, consumer-price compression, enterprise-PAM collision) vectors.
    Severity-weighted residual risk concentrates in three vectors: peer-incident contagion, platform-policy shifts, and
    customer-concentration opacity. The dominant thesis-break trigger is a direct security incident. Mitigation maturity
    is above industry baseline (bug bounty + audits + Trust Center + SOC2 + ISO 27001), though FedRAMP, IR MTTR, public
    SBOM, and PQC roadmap remain documented gaps.
sections:
  - id: regulatory-legal-and-compliance
    title: Regulatory, legal, and compliance risks
    body: >-
      1Password's regulatory and legal risk surface in 2026 is shaped by global privacy regimes, cyber-advisory
      exposure, and SOC2 / ISO/IEC 27001 renewal cycles. The dominant regulatory risks are: GDPR / UK-GDPR enforcement
      on a global SaaS that processes EEA-resident credentials (1Password publishes a DPA but enforcement-action
      exposure exists if breach or processing-purpose deviation occurs); CCPA / CPRA and US state-privacy laws creating
      ongoing privacy-litigation surface (Schrems-II-style data-transfer challenges, deletion-request SLAs); CISA /
      national-cyber-agency advisory exposure (a vulnerability in 1Password's client or sync would likely trigger a CISA
      advisory, materially affecting customer trust and procurement); and emerging US federal privacy legislation (the
      American Privacy Rights Act framework debate plus sector-specific carve-outs). International data-transfer regimes
      — Schrems-II for EEA → US, UK-US Data Bridge — require adequacy / SCC mechanisms aligned to 1Password's
      North-American hosting. Legal risks include terms-of-service / acceptable-use enforcement discretion (the ToS
      exposes service-level discretion that, if mishandled, could create customer-loss litigation), and class-action
      exposure following the LastPass 2022 breach class-action wave (no 1Password class action exists publicly through
      2026-05-16, but industry-wide adverse-litigation exposure is real). Compliance renewal cadence is the active
      workstream: SOC2 Type II is annual and a lapse would damage enterprise procurement; ISO/IEC 27001
      statement-of-applicability scope must evolve as Trelica / Kolide are integrated, with out-of-scope acquisitions
      creating audit-finding exposure. FedRAMP is the headline compliance gap — 1Password has not publicly disclosed
      FedRAMP authorisation, materially constraining federal SLED addressable market. Vendor-dependency on
      certified-auditor capacity adds modest residual risk. Patent / IP infringement exposure includes possible claims
      from credential-management or device-trust competitors, with Kolide / Trelica acquisitions adding IP surfaces that
      could draw allegations.
