  - id: adverse-residual-and-thesis-break
    title: Adverse, execution, residual exposure, and thesis-break triggers
    body: >-
      Adverse-stance risks are dominated by reputation-contagion vectors. Peer-incident reputation contagion (LastPass
      2022 breach and subsequent class-actions framed password-manager category-risk; 1Password has not been implicated
      through 2026-05-16, but contagion remains a tail risk). A direct security incident in 1Password's own
      infrastructure is the dominant tail risk — would trigger CISA advisory, customer churn, and class-action exposure
      simultaneously. Adverse press cycles around password-manager industry security (The Hacker News, CSO Online,
      HelpNet, SecurityWeek, DarkReading, Reuters) erode consumer trust across the category. Adverse Hacker News thread
      cycles, while not a regulator, can escalate to mainstream press fast in the credential-manager category.
      Platform-native passkey substitution by Apple / Google / Microsoft is a multi-year adverse threat to consumer-tier
      wallet share. Microsoft / Apple / Google bundling of enterprise-grade password / passkey management into OS or
      productivity suites creates consumer / SMB commoditisation pressure. Competitive risks include consumer-price
      compression from Bitwarden / NordPass / Proton / Dashlane / Keeper feature-parity (Bitwarden free-tier in
      particular), and enterprise-secrets-management collision with CyberArk / Delinea / BeyondTrust / HashiCorp as
      1Password expands into device-trust and SaaS-governance. People / execution risk centres on key-management
      retention (Jeff Shiner CEO long-tenured but continuity not publicly hedged) and engineering retention in a
      competitive tech-labor market. Customer-base risk: named-reference concentration in technology vertical
      (Salesforce, GitLab, IBM, Slack, Intercom, PagerDuty are highly correlated to tech-downturn). Mitigation maturity
      is above-industry baseline for the core security risks: bug-bounty, third-party audits, transparent privacy
      policy, and a Trust Center. Residual exposure is concentrated in three vectors: peer-incident reputation
      contagion, platform / extension policy shifts, and customer concentration / NRR opacity. The dominant thesis-break
      trigger is a direct security incident in 1Password (vault-content disclosure or sync-server compromise) — would
      trigger immediate revaluation and adverse-stance shift. Overall the severity-weighted residual risk is moderate.
