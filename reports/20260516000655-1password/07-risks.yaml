  claims:
    - id: CR001
      statement: >-
        Regulatory risk — GDPR / UK-GDPR enforcement on a global SaaS that processes EEA-resident credentials: 1Password
        publishes a DPA but enforcement-action exposure exists if breach or processing-purpose deviation occurs.
      type: observed
      topic: gdpr-enforcement
      sourceRefs:
        - SR013
        - SR012
        - SR041
        - SR109
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
      contradictsClaimRefs: []
    - id: CR002
      statement: >-
        Regulatory risk — CCPA / CPRA and US state privacy laws: 1Password's consumer base in California and other US
        states creates ongoing privacy-litigation surface (Schrems-II-style data-transfer challenges, deletion-request
        SLAs).
      type: observed
      topic: us-state-privacy
      sourceRefs:
        - SR013
        - SR041
        - SR012
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR001
      contradictsClaimRefs: []
    - id: CR003
      statement: >-
        Regulatory risk — CISA / national-cyber-agency advisory exposure: a vulnerability in 1Password's client or sync
        would likely trigger a CISA advisory, materially affecting customer trust and procurement.
      type: observed
      topic: cisa-advisory-risk
      sourceRefs:
        - SR057
        - SR027
        - SR107
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR002
      contradictsClaimRefs: []
    - id: CR004
      statement: >-
        Legal risk — terms-of-service / acceptable-use enforcement: 1Password's ToS exposes service-level discretion
        that, if mishandled, could create customer-loss litigation; the ToS is publicly published.
      type: observed
      topic: tos-discretion-risk
      sourceRefs:
        - SR012
        - SR041
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR003
      contradictsClaimRefs: []
    - id: CR005
      statement: >-
        Legal risk — class-action exposure following peer-incident (LastPass 2022 breach) class-action wave; while no
        1Password class action exists publicly through 2026-05-16, the industry-wide adverse-litigation environment is
        real.
      type: third-party-reported
      topic: class-action-contagion
      sourceRefs:
        - SR028
        - SR102
        - SR045
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QR004
      contradictsClaimRefs: []
    - id: CR006
      statement: >-
        Operational risk — outage of 1Password sync service: customers depend on cloud-sync for vault availability;
        planned and unplanned outages are tracked on the public status page but multi-hour outages would materially
        impact business-customer NPS.
      type: observed
      topic: sync-outage-risk
      sourceRefs:
        - SR085
        - SR029
        - SR086
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR005
      contradictsClaimRefs: []
    - id: CR007
      statement: >-
        Operational risk — Secret Key loss: an end-user who loses both Secret Key and Emergency Kit cannot recover the
        vault (by design); this design choice limits 1Password's liability but is a frequent customer-support pain.
      type: observed
      topic: secret-key-loss
      sourceRefs:
        - SR015
        - SR085
        - SR013
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QR006
      contradictsClaimRefs: []
    - id: CR008
      statement: >-
        Operational risk — supply-chain compromise of a published 1Password binary or extension would cascade to all
        customers; bug bounty plus signed-release pipeline mitigate but do not eliminate the risk.
      type: inferred
      topic: supply-chain-binary-risk
