  - id: direct-competitors
    title: "Direct Competitors: Calico, Retro Biosciences, and NewLimit"
    body: |
      Calico (California Life Company) is Altos Labs' most direct institutional analogue —
      a deep-funded, basic-science-first longevity company built on the same premise that
      aging can be understood and reversed through molecular biology. Founded in 2013 by
      Google and AbbVie, Calico received approximately $750 million from each corporate
      backer for an estimated $1.5 billion in committed funding, making it the second
      best-funded company in the longevity therapeutics space after Altos Labs. Art Levinson,
      former CEO of Genentech, served as founding CEO. Calico's scientific approach centers
      on model organisms — C. elegans (roundworm) and mice — and computational biology to
      understand longevity mechanisms. Its AbbVie collaboration is intended to translate
      basic discoveries into drug development programs, but as of 2026, no clinical programs
      have been publicly disclosed. Calico has drawn significant criticism from longevity
      researchers for limited public scientific output relative to its multi-year, multi-hundred
      million dollar budget, raising questions about research productivity and organizational
      model.

      Retro Biosciences was founded in 2022 in South San Francisco, co-located with Altos
      Labs in the Bay Area biotech corridor. Sam Altman, CEO of OpenAI, personally committed
      $180 million to the company — a single-investor commitment structurally similar to
      a family office, not a traditional VC round. CEO Joe Betts-LaCroix leads a leaner
      team pursuing three parallel strategies: plasma-inspired interventions (inspired by
      parabiosis research), partial cellular reprogramming (direct overlap with Altos Labs),
      and macroautophagy enhancement. The plasma and autophagy tracks are directionally
      differentiated from Altos; the partial reprogramming track is a direct competitive
      overlap. Retro's $180M budget is a fraction of Altos Labs' capacity but may enable
      faster iteration with a smaller team.

      NewLimit, founded in 2021 in San Francisco, is the most technically specific of the
      direct competitors. Backed by Brian Armstrong (CEO of Coinbase) and led by CEO Blake
      Byers, NewLimit has raised $40 million to apply machine learning to the epigenome —
      systematically profiling and modifying DNA methylation patterns to extend human
      healthspan. The ML-native approach distinguishes NewLimit from Altos Labs' more
      traditional experimental biology platform, though both target epigenetic age reversal.
      At $40 million raised, NewLimit is undercapitalized relative to Altos Labs, limiting
      its ability to conduct large-scale wet-lab work, though its computational focus may
      yield faster early-stage insights. Table TP003 provides IP, publications, and
      partnerships data for key competitors. Figure FP003 visualizes the stark funding
      disparity across the field.
