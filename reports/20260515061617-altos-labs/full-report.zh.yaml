          - type: callout
            title: cMyc 致癌性是核心科学风险
            body: >-
              cMyc 是四个 Yamanaka 因子之一，也是特征明确的原癌基因。完整 OSKM 重编程会在动物模型中触发肿瘤发生。Altos Labs
              的部分重编程路径试图通过瞬时或周期性表达降低这一风险，但有益表观遗传重置与不可接受癌症诱导之间的安全边界，尚未在人类组织中确立。这是主要科学风险，也是从小鼠模型走向人类治疗应用的核心难题。
            calloutType: risk
            claimRefs:
              - CO027
              - CO023
          - type: callout
            title: $3B 资本基础意味着无收入情况下可跑 7–10 年
            body: >-
              按估计每年 $300–450 million 的烧钱速度计算，$3 billion 融资意味着自 2022 年 1 月交割起有 7 到 10 年现金跑道——在乐观情形下，最早潜在临床拐点约在 2029 到
              2032 年。这与创始人所称 10 到 20 年研究周期一致，但要求投资人具备传统风险投资少见的耐心。
            calloutType: insight
            claimRefs:
