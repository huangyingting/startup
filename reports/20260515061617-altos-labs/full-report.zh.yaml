  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: Altos Labs 风险画像：为何这是一家极高风险企业
        blocks:
          - type: paragraph
            body: >
              Altos Labs
              不是一家常规生物制药公司。它没有进入临床试验的先导候选物，没有经过验证的递送机制，没有清晰监管路径，也没有产品收入流。它是一家基础科学发现组织，追逐一个关于细胞衰老的假设；如果假设成立，最终可能产出变革性医学，但从假设到获批疗法至少需要
              15–20 年，而且要跨过多道从未被成功跨越的鸿沟：证明短暂 OSKM 表达在衰老人类细胞中安全（不只是年轻小鼠）；为一种作用于衰老过程本身的疗法获得监管批准（FDA
              尚未把这一靶点视为可获批适应症）；并在一个以转化失败而著称的领域，把体外和啮齿动物结果转化为人体临床结果。


              风险登记表（表
              TR001）按严重性排序，总结了科学、监管、财务、运营和竞争维度中优先级最高的八项风险。每项风险都有可能性评估、影响评估、严重性评级、明确缓释路径，以及缓释后的估计剩余风险。最严重的单项风险——cMyc
              致癌性——在所有当前可用缓释措施后，剩余严重性仍为「致命」；原因是 OSK 替代方案只是降低而非消除风险，同时还会把重编程效率降到可能低于治疗有效水平。图 FR001
              以可能性–影响热力图展示完整风险格局，显示风险在严重性矩阵中的聚集位置。热力图揭示出一个危险集中区：「高」和「致命」严重性风险集中在「中」与「高」可能性的交叉处；在公司存亡层面，没有「低」或「可忽略」风险。


              这一风险画像对应的投资含义很尖锐：评估 Altos Labs
              时，不应把它视为一家承担正常开发风险的生物制药投资，而应把它视为一个押注类别开创型科学突破的长期期权——期权归零的概率相当高，但一旦突破实现，价值也极其巨大。适合配置这类资本的，是能承受风险、拥有 20
              年时间维度、且持有多元化长寿组合的投资人；回报周期只有 7–10 年的传统生物科技基金，与其时间线和风险画像并不匹配。
