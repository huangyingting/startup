      - number: '7.2'
        title: 科学与安全风险：cMyc 致癌性、可重复性与转化缺口
        blocks:
          - type: paragraph
            body: >
              三类彼此不同的科学风险威胁 Altos Labs 的核心项目：cMyc 的致癌潜力、衰老生物学长期存在的可重复性危机，以及啮齿动物衰老发现转化到人类结局时一贯糟糕的历史记录。


              cMyc 致癌性风险最根本。cMyc（MYC 原癌基因的蛋白产物）是人类癌症中最常见的扩增基因之一，约 70%
              的癌症类型都牵涉其中；它会放大增殖、核糖体生物发生和代谢重编程等转录程序。老年人类细胞已经积累数十年的体细胞突变，即便 cMyc 只是短暂表达，也可能把一个处在边缘的癌前细胞推过癌变阈值。Salk
              Institute 2016
              年在体内证明部分重编程，使用的是早衰症（快速衰老）小鼠——一种病理性衰老模型，不是正常老年哺乳动物，更不是老年人类。这个差异极其关键：从突变负荷、染色质结构到表观遗传状态，老年人类细胞都与年轻小鼠细胞有质的不同。截至
              May 2026，没有数据证明含 cMyc 的 OSKM 重编程用于老年人类组织是安全的。


              OSK 替代方案（三因子，去掉 cMyc）降低了致癌风险，却带来另一重挑战：没有 cMyc
              提供的动力学加速，重编程效率会大幅下降。治疗窗口可能太窄，难以临床落地——既要产生足够的表观遗传时钟逆转，带来临床获益，又不能过度重编程，让细胞丢失身份或变得致瘤。


              可重复性危机进一步放大科学风险。许多由单个学术实验室发表的衰老生物学发现，独立团队无法复现。关键奠基结果——包括清除衰老细胞的疗效、表观遗传时钟逆转、部分重编程结果——大多没有在临床项目所需的规模和老年人类细胞多样性下被复现。Altos
              Labs 的多实验室设计能部分缓释这个问题：它采用分布式首席研究员模式，要求多个地点并行表征。但内部复现的证据力弱于跨机构复现，Altos Labs 自己的发现也尚未接受独立外部复现。


              长寿生物科技公司的历史记录（表 TR003）并不乐观。Unity Biotechnology 在清除衰老细胞疗法上的 Phase 2
              失败说明，即便资金充足、设计谨慎，一旦小鼠到人类的转化断裂，项目也会失败。Calico 运营研究 12+ 年却没有商业化产出，说明时间线有多现实。Theranos
              的崩塌则展示了抛弃可重复性纪律会带来什么后果。按所有可衡量标准，Altos Labs 的科学路径都比 Theranos 严谨得多——但从小鼠到人类的转化缺口仍然真正未知，而且历史上一直难以跨越。
