  - id: TV003
    title: 情景分析：Altos Labs 估值结果
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five scenarios covering the full plausible distribution of outcomes for Altos Labs from May 2026 through 2040.
        Scenarios were constructed to cover the complete probability space across science failure, partial success
        (licensing), platform success (clinical program), paradigm shift (FDA approval), and M&A exit. The five
        scenarios are designed to be mutually exclusive and collectively exhaustive at a meaningful level of
        granularity; probabilities sum to 100%. No material outcome pathway has been omitted. Valuations are analytical
        estimates; actual outcomes could differ materially. Investor return figures are relative to assumed $3B entry at
        the 2022 raise.
    columns:
      - 情景
      - 概率
      - 价值路径
      - 目标估值
      - 关键里程碑
      - 投资人回报
    rows:
      - - 悲观情景——科学失败
        - 35%
        - 清盘；IP 组合出售；数据资产授权
        - $100–300M（IP 残值）
        - 未能在衰老人类细胞或 NHP 中证明安全重编程；无人有授权兴趣
        - 投资人资本损失 ~90–97%
      - - 基准情景——IP 授权路径
        - 35%
        - 向大型药企授权重编程平台；没有大规模自有临床项目
        - 到 2030 年 $1–3B
        - 在 NHP 中完成临床前概念验证；至少一项大型药企授权交易；没有自有 Phase 1
        - 名义回报 0–1x（按资金时间价值计算亏损显著）
      - - 乐观情景——平台成功
        - 20%
        - 多个药企合作，并在明确适应症中推进自有 Phase 1 临床项目
        - 到 2035 年 $10–30B
        - 一个明确适应症的 Phase 1 安全数据；3+ 个药企合作；可防守的 IP 组合
        - 投资回报 3–10x
      - - 超乐观情景——范式转移
        - 5%
        - FDA 批准首个抗衰老 / 重编程疗法；疾病应用广泛
        - 到 2040 年 $50–100B
        - FDA 批准首个明确抗衰老适应症；在人体中证明安全性和有效性
        - 投资回报 15–30x
      - - 退出——大型药企 M&A
        - 5%
        - Roche、Pfizer、J&J 或 Novartis 为平台和团队发起收购
        - $5–10B 收购价
        - NHP 中有说服力的临床前证明；IP 地位强；管理层可信度未受损
        - 投资回报 1.5–3x
    notes: >-
      上述情景的概率加权预期价值约为 $5.5 billion，说明最初 $3B 融资价格大体符合公允预期价值计算。分布高度双峰：最可能的结果落在悲观或基准情景（合计 70% 概率），而超额回报需要乐观或超乐观情景（合计 25%
      概率）。所有概率和估值都是高不确定性的分析性估计。
