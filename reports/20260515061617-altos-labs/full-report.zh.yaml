      - number: '5.3'
        title: Altos Labs 的在研项目
        blocks:
          - type: paragraph
            body: >
              Altos Labs 采用分布式首席研究员模式运营：单个研究人员在三个地理研究所（San Francisco Bay Area、Cambridge UK、Kobe
              Japan）内领导独立项目，同时全部对齐整体年轻化使命。根据公开披露、论文和科学传播，可以识别出六个核心研究项目（表 TE002）。


              旗舰项目是 OSKM 部分重编程——在多种细胞类型中系统性地进行体外周期性 OSKM 方案表征，包括肝细胞、心肌细胞、神经元细胞和肌肉卫星细胞。项目目标包括建立安全参数（什么 OSKM
              剂量、周期长度和因子组合会导致去分化，什么设置可以实现安全的部分年轻化），以及疗效读数（Horvath 时钟移动多少，细胞是否恢复年轻态基因表达，功能能力是否改善）。多位首席研究员参与其中，Yamanaka
              的顾问影响则塑造方法论。


              由 Steve Horvath 直接领导的表观遗传时钟开发项目，目标是超越第一代泛组织 Horvath 时钟和 2019 年 GrimAge
              时钟（后者基于甲基化模式预测死亡风险），走向下一代时钟：在特定组织类型中有更高分辨率，对实验干预更敏感。这些下一代时钟，是检测早期、保守的部分重编程方案可能产生的更细微年轻化效果所必需的工具。


              Manuel Serrano 是细胞衰老和衰老相关分泌表型（SASP）领域的世界级权威，他在 Cambridge UK 研究所领导细胞衰老项目。衰老细胞——已经永久退出细胞周期但仍保持代谢活性的细胞——通过
              SASP 推动组织衰老；SASP 是一组炎症细胞因子和基质金属蛋白酶的混合物，会损伤邻近健康细胞。Serrano
              项目研究衰老启动机制，以及细胞衰老与表观遗传衰老之间的相互作用。部分重编程能否预防或逆转细胞衰老，或者是否必须与清除衰老细胞药物联用才能达到最佳效果，是一个关键研究问题。


              体内重编程项目正在小鼠模型中开展临床前研究，把体外部分重编程结果转化到活体生物中。该项目面对最重大的技术障碍：实现组织靶向、可控的 OSKM 递送；证明成年小鼠中全身或局部 OSKM
              表达可以产生可测量的年轻化，同时不形成肿瘤；建立剂量反应关系，为未来任何治疗窗口提供信息。这个项目是从概念验证走向临床转化的关键桥梁。


              递送技术项目与之并行，开发并评估 AAV 血清型、LNP 配方和其他递送载体，以实现对编码 OSKM 的核酸进行安全、组织特异、可控的表达。该项目有直接产生 IP 的潜力，因为新型递送系统即便脱离 Altos
              Labs 自有治疗项目，也可能独立具备价值。多器官衰老项目则协调肝、心、脑和骨骼肌组织场景中的研究，确保年轻化生物学不会无意间只在最容易处理的实验系统中完成表征，却漏掉器官特异性差异。
