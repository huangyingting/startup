      - number: '2.6'
        title: 图表
        blocks:
          - type: callout
            title: 人口顺风是结构性的，不是周期性的
            body: >-
              到 2050 年，全球 65 岁及以上人口将超过 1.5 billion（WHO），每天还有超过 10,000 名美国人满 65
              岁。不同于可能逆转的消费科技市场，老龄化市场有一个任何政策或产品都无法逆转的人口结构引擎。无论某一种具体技术——包括 Altos Labs
              的重编程路径——最终是否成功，长寿解决方案都会面对持久需求。市场一定存在；不确定的是哪条科学路径能拿下它。
            calloutType: insight
            claimRefs:
              - CM003
              - CM004
              - CM016
          - type: callout
            title: 营养补充品扭曲了抗衰老市场规模信号
            body: >-
              截至 2022 年，$44–63 billion
              抗衰老市场的大部分由营养补充品、膳食补充剂和化妆品构成，这些产品基本没有经过科学验证。它们靠营销和与抗衰老的文化联想销售，而不是靠临床证明。这会误导评估长寿疗法公司的投资人：Altos Labs 不会与 NAD+
              补充剂或面霜竞争。细胞年轻化疗法的可触达市场要小得多——今天或许只有 $2–5 billion——只有在底层生物学通过仍需多年才会到来的临床试验验证后，才会实质性增长。
            calloutType: risk
            claimRefs:
              - CM001
              - CM012
              - CM014
              - CM035
              - CM036
          - type: callout
            title: US 没有把抗衰老作为适应症的监管路径
            body: >-
              FDA 不承认「衰老」是疾病，也不把它作为药品审批适应症。这不只是程序障碍，而是对长寿疗法公司（包括未来 Altos Labs
              后续实体）设计临床项目方式的根本约束。任何疗法都必须针对某一种具体年龄相关疾病（Alzheimer's disease、骨质疏松、肌少症、黄斑变性）完成验证。Unity Biotechnology 在骨关节炎中的
              Phase 2 失败说明，即便是衰老背景下的单一疾病适应症，验证也极其困难。Targeting Aging with
              Metformin（TAME）试验正尝试把衰老纳入生物标志物终点，但这种监管演进仍不确定，并可能需要数十年。
            calloutType: risk
