chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份、使命与科学路径
        blocks:
          - type: paragraph
            body: >
              Altos Labs 是一家私营生物技术研究公司，注册于 Delaware，总部位于 California 的 San

              Francisco Bay Area。公司成立于 2021 年，并在 2022 年 1
              月正式亮相。其公开使命是细胞年轻化编程——借助部分表观遗传重编程，逆转衰老的分子标志，让细胞功能恢复年轻状态。公司建立在一个科学前提上：衰老不是不可避免的物理定律，而是可以在细胞层面逆转的生物过程。


              核心科学逻辑来自 Shinya Yamanaka 2006 年获得诺贝尔奖认可的发现：成熟体细胞只要表达四个转录因子——Oct4、Sox2、Klf4 和 cMyc（合称 OSKM 或 Yamanaka
              因子）——就能被重编程成类似多能干细胞的状态。Altos Labs 采用的是这一重编程周期的部分或瞬时版本：让 OSKM
              表达周期性开启和关闭，在不完成完全去分化的情况下恢复表观遗传年轻标记；完全去分化会抹掉细胞身份，而且 cMyc 作为已知原癌基因会带来癌症风险。由此产生的「部分重编程」旨在逆转表观遗传时钟里的衰老特征——用
              Steve Horvath 的 DNA 甲基化时钟衡量——同时保留组织特异性的细胞身份。


              公司明确把目标界定为延长人类健康寿命（健康、无病生活的时期），而不是单纯延长寿命本身。Altos Labs 将自己定位为临床前研究平台：截至 2026 年 5
              月，所有活动仍处在基础科学和平台搭建阶段，尚未宣布任何临床项目。定义 Altos Labs 模式的科学、资本和人才流动，见下方 Figure FO003。
