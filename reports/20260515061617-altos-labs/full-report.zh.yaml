      - number: '8.6'
        title: 展示材料
        blocks:
          - type: callout
            title: $3B 估值按预期价值看大体合理——但结果分布危险地双峰化
            body: >-
              按表 TV003 的五种情景做概率加权预期价值计算，结果约为 $5.5 billion——略高于 2022 年 $3 billion
              的融资价格。这似乎说明估值合理。然而，这一分析掩盖了关键事实：预期价值不是最可能的结果。最可能的单一结果组合（35% 悲观 + 35% 基准 = 70% 合计）要么带来资本损失，要么几乎没有回报。只有 25%
              的概率质量会产生超过 3x 投入资本的回报。投资人用 $3B 买了一张彩票：25% 的时间回报丰厚，70%
              的时间没有回报或更差。如果投资人规模足够大、足够分散、足够有耐心，这并非不理性——但它与任何传统生物科技投资都属于完全不同的风险画像。
            calloutType: insight
            claimRefs:
              - CV023
              - CV024
              - CV026
              - CV027
              - CV030
              - CV031
          - type: callout
            title: 截至 2026 年初，Altos Labs 自身没有发表科学产出，这是最大的负面估值信号
            body: >-
              Altos Labs 估值分析中最重要的负面信号，是截至 2026 年初——成立四年多后——没有任何围绕 Altos 研究议程工作的 Altos Labs
              研究人员发表同行评议科学论文。公司的估值完全基于团队履历和科学命题，而不是任何对平台功能的实证证明。按可比深科学研究公司的标准，这并不寻常；大多数公司创立两到三年内至少已经产出初步同行评议成果。哪怕只发表一项有说服力的体外实验证明，在老年人类细胞中可以安全实现部分重编程，也会构成有意义的去风险事件，支撑当前估值。一个
              $3B 项目推进四年后仍没有此类论文，是实质性的负面信号。
            calloutType: risk
            claimRefs:
              - CV004
