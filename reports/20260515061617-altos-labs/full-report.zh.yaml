      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: Unity Biotechnology 的 Phase 2 失败是核心警示先例
            body: >-
              Unity Biotechnology 的 UBX0101 在 2020 年针对膝骨关节炎的 Phase 2 试验失败，是评估 Altos Labs
              风险画像时最重要的竞争数据点。这次失败表明：（a）机制上扎实的长寿假设（清除衰老细胞）可能无法转化为具体疾病场景中的临床疗效；（b）衰老临床前模型无法可靠预测人体结果；（c）从基础科学走向 Phase 2
              概念验证，即便对资历很强、资金充足的团队来说，也漫长、昂贵且不确定。Altos Labs 的细胞重编程路径面对相当甚至更高的转化不确定性——它尚未在任何人体细胞模型中证明安全性，更不用说 IND 研究。投资人评估
              Altos Labs 的开发时间线和资本需求时，应高度重视 Unity 先例。
            calloutType: risk
            claimRefs:
              - CP007
              - CP008
              - CP035
              - CP036
          - type: callout
            title: 资本规模是 Altos Labs 近期最持久的竞争护城河
            body: >-
              在一个从基础科学走到监管批准往往需要 15–20 年的领域里，最重要的生存资源是资本。Altos Labs 的 $3 billion 资本基础——是 Retro Biosciences 的
              17×、NewLimit 的 75×——创造了没有直接竞争者能匹配的研究现金跑道。这种资本优势会复利：Altos Labs 能以高于市场的薪酬（据报道每年超过 $1
              million）招募全球最优秀的生物学家，同时运营三家独立研究所，并吸收多条实验方向失败，而不面临生存威胁。小竞争者（NewLimit、Retro）可能产生突破性洞见，但若没有外部融资，通常缺少把洞见转化为临床项目的资本深度；外部融资又可能稀释或重定向其使命。
            calloutType: insight
            claimRefs:
              - CP019
              - CP030
              - CP036
              - CP037
          - type: callout
            title: 制药巨头是尚未计价的潜在竞争风险
            body: >-
              长寿领域最大的尚未计价竞争风险，不是 Calico、Retro 或 NewLimit，而是一旦基础科学足够去风险后，大型制药公司可能入场。Pfizer、Novartis、AstraZeneca 和
              Genentech/Roche 各自每年在研发上投入 $5–15
              billion。如果部分重编程在哺乳动物中显示出有吸引力的临床前安全性和长寿信号，这些公司可以把大量内部资源转向该机制，或收购关键科学资产（也可能包括 Altos Labs 本身）。Altos Labs
              的策略似乎接受这一风险——其耐心资本结构和诺贝尔品牌科学可信度，可能让它成为理想收购标的或授权伙伴，而不是与大型制药公司正面对抗的直接竞争者。这种动态不是失败模式，而是一种退出策略可能性。
            calloutType: risk
            claimRefs:
              - CP036
              - CP037
  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: $3 Billion 融资与资本结构
        blocks:
          - type: paragraph
            body: >
              Altos Labs 于 2022 年 1 月完成创始资本轮，以单笔股权融资募集 $3 billion，没有公开披露债务部分。这轮融资是史上规模最大的单笔私营生物技术融资事件之一，比临床阶段生物技术公司典型
              Series A 大约高出两个数量级，也超过细胞重编程和长寿生物技术领域所有直接竞争者已宣布融资总额。


              资本结构很不寻常：锚定方不是传统机构生命科学 LP 基金，而是高净值个人和家族办公室。Jeff Bezos 通过个人投资工具 Bezos Expeditions 参与；Yuri Milner 通过其科技投资公司
              DST Global 参与；Vulcan Capital 是 Paul Allen 遗产旗下投资机构；Sam Altman 以个人身份参与；ARCH Venture Partners
              是财团中唯一的机构深科技风险投资方。这一组合给了公司耐心资本，但也把再融资风险集中到一小群人手里；他们的投资优先级可能变化。


              交割后估值约为 $3 billion——实际上等于融资金额——反映出公司无收入、临床前的属性，也反映出其明确传达的 15 到 20
              年研究周期。公司没有披露老股交易、结构化融资工具或可转债批次。自成立以来，公司完全依靠这一单笔融资运转。完整融资历史见 Table TI001，估计资本消耗瀑布图见 Figure FI001。
