      - number: '2.4'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              长寿疗法领域有少数资金充足的私营公司处于基础科学或早期临床前阶段，旁边还有一家上市先行者 Unity Biotechnology；它的临床挫折提供了警示性数据点。Calico 由 Google/Alphabet
              于 2013 年创立，资金约 $1.5 billion，专注通过模式生物研究和部分疾病合作理解衰老生物学；其模式与 Altos Labs 很接近，都把基础科学置于近期临床项目之上，但 Calico
              运营历史更长，也有数篇研究发表。Retro Biosciences 获 OpenAI 的 Sam Altman 约 $180 million
              支持，同时推进自噬增强、血浆蛋白干预和部分细胞重编程三条长寿策略，因此是 Altos Labs 更接近的科学对照。NewLimit 由 Coinbase 的 Brian Armstrong 共同创立，已募集约
              $40 million，聚焦用表观遗传重编程逆转生物衰老；尽管规模小得多，它是 Altos Labs 最直接的战略竞争者。


              Unity Biotechnology 追求的是另一套科学逻辑——清除衰老细胞的 senolytics。其 UBX0101 于 2020 年在肌肉骨骼应用中的 Phase 2
              失败，是该领域最醒目的临床挫折。Unity 此后转向眼科和神经学，仍是核心长寿疗法领域唯一上市公司；不过截至 2026 年，其市值约 $50–100 million，反映出投资人怀疑。AgeX
              Therapeutics 采用多能干细胞路径进行组织年轻化，临床探索阶段比 Altos Labs 更靠前，但资本规模只是后者的一小部分。
