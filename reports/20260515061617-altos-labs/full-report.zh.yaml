      - number: '6.2'
        title: 潜在客户细分：谁可能付费，何时付费
        blocks:
          - type: paragraph
            body: >
              虽然当前没有客户，Altos Labs 的技术平台仍可识别出若干潜在未来客户群。年度 R&D 预算超过 $1 billion
              的大型制药公司，是近期最可能出现的商业合作伙伴：它们有资本支持长周期研究合作，也有机构使命，在人体概念验证之前引入平台技术授权（CU009）。学术医学中心——包括隶属于 NIH 和 Howard Hughes
              Medical Institute 的大型研究医院——构成第二层潜在客户，可能购买 Altos Labs 的重编程检测和生物学工具（CU010）。


              聚焦年龄相关疾病（Alzheimer's、Parkinson's、心血管纤维化）的生物科技公司，是 Altos Labs 核心平台未来孵化治疗项目后的潜在下游客户（CU011）。政府资助方，主要是 NIH
              National Institute on Aging（NIA），以及 HHMI、Gates 等私人基金会，代表通过资助和合作研究协议获得的非稀释收入渠道（CU012）。诊断和精准医学公司，可能为临床研究用途授权
              Altos Labs 自有表观遗传时钟工具和衰老生物标志物面板（CU013）。


              消费级长寿和健康市场明确不是近期客户：缺乏 FDA 批准的抗衰老适应症，也没有任何人体安全性数据，因此 5 年内开发消费产品并不现实（CU014）。Genentech 和 BioNTech
              的技术授权先例确认，对研究阶段生物学平台来说，药企合作是历史上最被验证的早期收入路径（CU015）。截至 2026 年 5 月，本文识别的所有潜在客户细分，都没有公开与 Altos Labs 签约（CU017）。


