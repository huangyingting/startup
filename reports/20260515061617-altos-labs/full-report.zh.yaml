  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Altos Labs 科学平台：部分重编程为何重要
        blocks:
          - type: paragraph
            body: >
              Altos Labs
              不是一家传统药物发现公司。公司并不寻找抑制特定疾病靶点的小分子或生物制剂，而是在开发一个平台，调控细胞衰老的基础生物学：由表观遗传漂移驱动的细胞功能渐进式、多维度衰退。其创立时的科学命题认为，衰老很大程度上是一个信息问题：细胞会随着时间失去正确的表观遗传程序，而这种丢失推动了衰老标志，包括线粒体功能障碍、衰老细胞累积、再生能力受损和疾病易感性上升。如果这些表观遗传信息能够恢复，细胞——最终也包括机体——就可能在功能上重返年轻态。


              用来恢复这些信息的核心机制，是 Yamanaka 重编程系统。2006 年，Shinya Yamanaka 在 Kyoto University
              的实验室证明，在成年体细胞中表达四个转录因子——Oct4、Sox2、Klf4 和 cMyc——可以把它们转化回诱导多能干细胞（iPSC）状态。这一发现于 2012
              年获得诺贝尔奖，确立了细胞身份具有极强可塑性。但把 OSKM 完全重编程到 iPSC 状态，并不适合用作逆转衰老的治疗手段：iPSC 会失去所有组织特异性基因表达程序，而 cMyc
              过表达带来已有充分文献记录的癌症风险。Altos Labs 的差异化路径是部分、周期性重编程——短暂表达
              OSKM，重置与衰老相关的表观遗传标记，但不走到完全去分化。这种做法保留细胞身份，同时可能恢复年轻态基因表达模式，并在表观遗传时钟测量下降低生物年龄。


              该平台包含七个核心技术组件（表 TE001）：使用 OSKM 的部分重编程、表观遗传时钟测量、单细胞多组学、体外细胞培养系统、体内递送研究、AI/ML
              辅助表观基因组分析，以及更广泛的衰老标志靶向项目。这些组件共同定义了 Altos Labs 所称的「细胞年轻化编程」。公司创立命题引用的奠基性证据，包括 Izpisua Belmonte 实验室 2016 年在
              Salk Institute 的实验：在活体早衰小鼠模型中，周期性 OSKM 产生了细胞年轻化迹象，并带来温和的寿命延长。图 FE002 展示了 Altos Labs
              创立前后科学里程碑的时间线，把公司平台锚定在过去二十年的基础学术研究之上。


              平台的一个关键使能器，是 Steve Horvath 自 2013 年起开发的表观遗传时钟。Horvath 时钟利用特定 CpG 位点的 DNA 甲基化模式，能够在多种组织类型中高精度估计细胞生物年龄。该时钟是
              Altos Labs 研究的主要定量读数：科学家对细胞施加 OSKM
              处理后，会测量甲基化时钟向后「移动」了多少。如果没有这种可量化、非侵入式的年轻化生物标志物，平台就缺乏可操作的疗效终点。时钟本身的可用性——加上 Horvath 作为 Altos Labs
              研究人员直接参与——让公司相对那些没有经过验证衰老生物标志物的竞争者，拥有显著的方法学优势。
