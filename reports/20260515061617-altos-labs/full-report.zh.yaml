      - number: '1.2'
        title: 领导层、创始人与科学顾问委员会
        blocks:
          - type: paragraph
            body: >
              Altos Labs 组建了生物技术史上资历最强的领导和顾问团队之一，汇聚了诺贝尔奖得主、前政府科学官员和资深制药高管。


              Hal Barron 担任首席执行官。Barron 此前在
              GlaxoSmithKline（GSK）担任首席科学官兼研发负责人，管理这家制药巨头的整个研究组合。他的加入释放了一个信号：即便公司使命仍是纯发现研究，Altos 也会重视转化科学的严谨性。Rick
              Klausner 是 Altos Labs 愿景的主要共同创始人和架构师。Klausner 在 Clinton 总统任内担任 National Cancer Institute（NCI）主任，后来又出任
              Warner Bros Discovery 首席技术官；政府科学领导经验和媒体科技经历的罕见组合，塑造了他关于重编程生物学的判断。


              Hans Bishop 是 Juno Therapeutics 前 CEO（Juno 后被 Celgene 以 $9 billion 收购），在公司组建早期担任总裁，为 Altos
              带来了细胞疗法运营可信度。科学顾问委员会包括三位诺贝尔奖得主：Shinya Yamanaka（2012 年诺贝尔奖，iPSC 发现）、Jennifer Doudna（2020 年诺贝尔奖，CRISPR-Cas9
              基因编辑）和 David Baltimore（1975 年诺贝尔奖，病毒癌基因）。Steve Horvath 以开发用 DNA 甲基化衡量生物年龄的「表观遗传时钟」闻名，也以研究员身份加入。Manuel
              Serrano 是 Barcelona Institute for Science and Technology 的细胞衰老顶尖专家，担任 UK Cambridge 研究所的首席研究员。


              这种异常密集的科学背书有双重作用：对外部利益相关方验证公司的科学路径，也帮助公司招募顶级分子生物学家。据报道，相关薪酬超过每年 $1 million。完整领导团队见下方 Table TO002。
