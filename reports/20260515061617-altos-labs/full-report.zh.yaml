        - label: 高可能性
          values:
            - ''
            - ''
            - 监管路径未定义
            - cMyc 致癌性 | 临床转化失败
    approximationNotes: 所有可能性和影响位置均为基于截至 2026 年 5 月公开信息的定性评估。位置代表分析师的风险校准；实际可能性和影响可能与这些评估存在重大差异。高影响包括公司层面的项目受挫；致命影响代表威胁整个企业存续的风险。
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR006
      - CR011
      - CR027
      - CR034
      - CR035
  - id: FR002
    title: 从 2026 年 5 月起解决 Altos Labs 关键风险的估计年数
    type: bar
    layout: wide
    summary: >-
      该柱状图显示，从 2026 年 5 月起，每类 Altos Labs 主要风险需要多少年才可能被解决或大幅降险。cMyc 安全性证明（在老年人类细胞中证明安全）最早出现，但仍至少需要 8 年专门研究和临床前开发。10
      年内看不到监管路径里程碑；首次临床批准预计在 20 年或更久之后。这些估计假设没有意外科学突破；如果出现安全性失败，实际时间可能更长；如果仅 OSK 的方案被证明足够，时间可能缩短。
    data:
      xAxis: 风险类别
      yAxis: 自 2026 年 5 月起解决所需估计年数
      items:
        - label: cMyc 安全性证明（临床前）
          value: 8
          note: 首批有说服力的老年人类细胞和 NHP 安全数据；不包括临床验证
        - label: 首次 IND 申报
          value: 10
          note: 取决于递送方案和 pre-IND 监管沟通；假设 2030 年前不会启动项目
        - label: 监管路径明确
          value: 12
          note: FDA 接受疾病特异性适应证和终点；高度不确定
        - label: Phase 1 人体安全性数据
          value: 13
          note: 首个人体试验安全性和耐受性读数；假设 IND 约在 2034 年提交
        - label: 首次临床批准
          value: 20
          note: 最乐观情景下最早可能获得监管批准的日期；也可能远晚于此
    approximationNotes: >-
      所有估计都是分析预测，依据标准基因疗法开发时间表、从公开信息评估的 Altos Labs 当前科学阶段，以及新型疗法获 FDA
      批准的历史先例。实际时间线存在很大不确定性——既有正向可能（科学突破可能压缩时间），也有负向可能（安全性失败可能让开发完全重置）。Altos Labs 未公开披露内部时间表。
    claimRefs:
      - CR024
      - CR025
      - CR026
      - CR030
      - CR035
  - id: FR003
    title: Altos Labs 资本耗尽风险：年度预算组成瀑布图
    type: waterfall
    layout: wide
    summary: >-
      该瀑布图拆解 Altos Labs 初始 $3 billion 资本在一个代表性年份中各项年度成本类别上的消耗。研究耗材和运营（-$300M）以及员工成本（-$200M）是两大主要烧钱驱动项。设施和基础设施（-$50M）以及
      Phase 1 准备活动（-$150M，预计随时间增加）构成其余部分。按这一拆解，估计年度总烧钱约为 ~$700M，这意味着从 2022 年 1 月融资起，现金跑道约为 4.3 年——与截至 2026 年 5 月仍剩
      $1.0–1.5B 资本的估计相符。该瀑布图说明，资本耗尽是可预见的结构性风险，不是尾部事件；无论科学进展如何，公司都需要在规划期内获得新融资。
    data:
      items:
        - label: 起始资本（2022 年 1 月融资）
          value: 3000
          type: start
        - label: 研究运营和耗材（年度估计）
          value: -300
          type: change
        - label: 设施和基础设施（年度估计）
          value: -50
          type: change
        - label: 员工成本（薪资、股权、福利——年度估计）
          value: -200
          type: change
        - label: Phase 准备和监管活动（年度估计）
          value: -150
          type: change
        - label: 代表性年份后估计剩余资本
          value: 2300
          type: total
    approximationNotes: >-
      所有成本类别估计均为分析推断，依据截至 2026 年 5 月关于 Altos Labs 研究规模、员工数和设施布局的公开信息。年度成本数字代表单年估计烧钱额，并非自成立以来的累计。Altos Labs
      未发布财务报表，也未提供成本拆分。“剩余资本”柱仅作示意；基于 2022 年 1 月融资后四年、按 $350M/年基准烧钱估算，截至 2026 年 5 月实际剩余资本估计为 $1.0–1.5B。
    claimRefs:
      - CR006
      - CR011
      - CR018
      - CR035
  - id: FV001
    title: Altos Labs 情景估值估计（$B）
    type: bar
    layout: wide
    summary: >-
      该柱状图显示 Altos Labs 情景分析中五种情景的中心估值估计，单位为十亿美元。图中体现了结果分布的极端不对称：悲观情景几乎归零（$0.2B），超级乐观情景达到 $75B——情景间相差
      375x。基准情景（$2B）和乐观情景（$20B）框定最可能的上行区间。若平台价值在完整临床验证前通过收购兑现，M&A 退出（$7.5B）代表中间结果。所有数值均为表 TV003 情景区间的中心估计。
    data:
      xAxis: 情景
      yAxis: 估计估值（$B）
      items:
        - label: 悲观情景
          value: 0.2
          note: 科学失败；仅剩 IP 残值
        - label: 仅 IP 资产
          value: 0.5
          note: 无临床项目的平台 IP 出售
        - label: 基准情景
          value: 2
          note: 授权路径；无自有临床项目
        - label: 乐观情景
          value: 20
          note: 多个合作伙伴关系叠加 Phase 1 项目
        - label: 超级乐观情景
          value: 75
          note: 首个抗衰老疗法获 FDA 批准
    approximationNotes: >-
      所有估值数字都是从表 TV003 的情景区间推导出的中心点估计。悲观情景中心估计 $0.2B（区间 $0.1–0.3B）；基准情景 $2.0B（区间 $1–3B）；乐观情景 $20B（区间 $10–30B）；超级乐观情景
      $75B（区间 $50–100B）；M&A 退出 $7.5B（区间 $5–10B）。每种情景中的实际结果会随退出时点、市场环境、交易结构和已达成科学里程碑而变化。
    claimRefs:
      - CV001
      - CV002
      - CV019
      - CV020
      - CV025
  - id: FV002
    title: Altos Labs 基准情景公允价值拆解（瀑布图，$M）
    type: waterfall
    layout: wide
    summary: >-
      该瀑布图将 Altos Labs 基准情景下的估计公允价值拆为若干组成部分。分析从核心研究平台价值（$1,500M）开始——即在当前科学阶段下重编程平台的折现价值——再加上三项溢价：团队与科学家溢价（$800M）、IP
      组合可选性（$500M）和重编程先发优势（$300M）。现金和资产（$200M）加入剩余流动价值。随后扣除无收入风险折价（-$500M），得到总公允价值（基准）约 $2.8 billion——与 2022
      年融资估值一致。该拆解显示，估值高度依赖团队和平台溢价，而不是任何可证明的商业价值。
    data:
      items:
        - label: 核心研究平台价值
          value: 1500
        - label: 团队与科学家溢价
          value: 800
        - label: IP 组合可选性
          value: 500
        - label: 重编程先发优势
          value: 300
        - label: 现金和资产
          value: 200
        - label: 无收入风险折价
          value: -500
        - label: 总公允价值（基准）
          value: 2800
    approximationNotes: >-
      所有组成部分价值均为分析估计。核心研究平台价值（$1.5B）采用实物期权方法估算，假设进入 Phase 1 的概率为 15%、退出价值为 $10B。团队溢价（$800M）依据组建成本以及可比科学家 /
      高管招聘先例中的市场溢价估算。IP
      可选性（$500M）基于基因疗法平台中可比防御性专利组合。先发溢价（$300M）参考类似平台公司的品牌和网络效应溢价。无收入折价（-$500M）反映缺乏收入、临床数据和商业合作。所有数字都有很高分析不确定性。
    claimRefs:
      - CV009
      - CV010
      - CV013
      - CV020
      - CV022
  - id: FV003
    title: Altos Labs 各情景估值区间（$M）
    type: range
    layout: wide
    summary: >-
      该区间图显示 Altos Labs 五种情景各自的估值下限和上限，单位为百万美元。区间同时体现每种情景内部的不确定性，以及不同情景之间的差距。悲观情景为 $100–300M。IP 授权（基准情景）为
      $1,000–3,000M。平台成功（乐观情景）为 $10,000–30,000M。范式转移（超级乐观情景）为 $50,000–100,000M。M&A 退出为
      $5,000–10,000M。每个区间的宽度反映该情景自身的不确定性；图表从 $100M 到 $100B 的高度，则显示这笔投资异常二元化。
    data:
      items:
        - label: 悲观情景（科学失败）
          low: 100
          high: 300
        - label: IP 授权（基准情景）
          low: 1000
          high: 3000
        - label: 平台成功（乐观）
          low: 10000
          high: 30000
        - label: 范式转移（超级乐观）
          low: 50000
          high: 100000
        - label: M&A 退出
          low: 5000
          high: 10000
    approximationNotes: >-
      区间为分析估计，依据可比公司退出分析、情景加权 DCF 和既往药企 M&A 倍数。悲观情景区间（$100–300M）基于基因疗法中可比 IP
      资产出售先例。基准情景（$1–3B）锚定于处在类似里程碑的平台授权公司估值。乐观情景（$10–30B）基于拿到 Phase 1
      数据的可比临床阶段平台型生物科技公司。超级乐观情景（$50–100B）基于大型获批药物平台先例。M&A 退出（$5–10B）基于药企平台收购可比交易。
    claimRefs:
      - CV023
      - CV024
      - CV031
      - CV034
      - CV035
  - id: FV004
    title: Altos Labs 投资 KPI 记分卡
    type: kpi
    layout: standard
    summary: >-
      该 KPI 记分卡列出 Altos Labs 七个维度上的关键投资评估指标：市场潜力、科学阶段、团队质量、IP 地位、现金跑道、退出选项和投资风险。数值反映截至 2026 年 5
      月的分析评估。该记分卡用于投资委员会参考，不是量化模型。
    data:
      items:
        - label: 市场潜力（若科学路径跑通）
          value: Enormous — all age-related chronic disease
          status: growing
        - label: 科学阶段
          value: Pre-clinical (basic research only)
          status: neutral
        - label: 团队质量
          value: Exceptional (Nobel Laureates, Hal Barron)
          status: growing
        - label: IP 地位
          value: Building (applications filed, unvalidated)
          status: neutral
        - label: 现金跑道
          value: ~3–5 years remaining (est. from May 2026)
          status: declining
        - label: 退出选项
          value: M&A (5% probability) or IPO (2034+)
          status: neutral
        - label: 投资风险评级
          value: Very High (probability of capital loss ~35%)
          status: declining
    approximationNotes: >-
      所有 KPI 数值均为基于截至 2026 年 5 月公开信息的分析评估。现金跑道按 $350M/yr 烧钱速度和 $1.1–1.7B 剩余资本估计。科学阶段依据公开披露的研究议程；没有内部数据可用。IP 地位反映 Altos
      Labs 缺乏公开确认的已授权专利。风险评级反映情景分析中悲观情景（35%）和低于基准情景结果的合计概率。
    claimRefs:
      - CV003
      - CV007
      - CV021
      - CV036
      - CV037
      - CV039
      - CV040
