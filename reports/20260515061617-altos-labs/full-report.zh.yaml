companyProfile:
  summary: >-
    Altos Labs 成立于 2021 年，并在 2022 年 1 月完成 $3 billion 融资，这是史上规模最大的私营生物技术融资之一。 公司使命是开发基于 Yamanaka OSKM
    因子（Oct4、Sox2、Klf4、cMyc）的部分细胞重编程技术，恢复细胞健康并逆转年龄相关疾病。 Altos 由 Rick Klausner（前 NCI 主任）共同创立，并由 CEO Hal Barron（前 GSK
    首席医学官）领导；公司组建了世界级科学顾问委员会，成员包括诺贝尔奖得主 Jennifer Doudna、David Baltimore 和 Shinya Yamanaka。公司在 San Francisco Bay
    Area、Cambridge（UK）和 Japan 设有研究实验室，雇用 300 多名科学家。 截至 2026 年，Altos 仍无收入、没有临床项目，也没有已宣布的商业合作。
