      - number: '8.5'
        title: 不同类型投资人的净投资评估
        blocks:
          - type: paragraph
            body: >
              适合 Altos Labs 的投资人画像很窄。公司不适合回报周期 7–10
              年的传统生物科技风投基金、不适合寻找短期催化剂的公开市场投资人，也不适合风险承受能力有限的资本配置者。投资逻辑只适用于一类特定资本：耐心、久期长、风险容忍度高。


              对多数资本配置者，投资建议是「观察」：除非已经通过一个分散化长寿组合、且资本久期明确足够长，否则不要新建仓位。已经投资者，理性姿态是维持敞口，同时监测临床前去风险里程碑（NHP 安全性数据、Altos Labs
              首篇同行评议论文、IND 支持性研究）。转为「买入」需要在老年人类细胞或非人灵长类中证明安全性。转为「卖出 /
              回避」的触发条件，是资本耗尽但没有概念验证、关键人物离职，或出现重大安全挫折。投资信心水平为低到中，反映科学时间线和结果的极端不确定性。


              对拥有 20+ 年投资期限的主权财富基金和家族办公室来说，Altos Labs 的小仓位可以看作一张押注变革性医疗命题的长期期权。如果投资人确实不在乎全损，预期价值计算（$5.5B 对 $3B
              进入价）略为正。主导 2022 年融资的投资人——Yuri Milner、Bezos Expeditions、SoftBank、ARCH Venture Partners——正是这类画像。


              对机构型生物科技基金，Altos Labs 不符合标准组合构建。时间线比典型生物科技基金寿命长 3–4 倍，临床风险高于任何已获批药物模式，退出路径又依赖科学里程碑，而这些里程碑不太可能在标准基金窗口内到来。


              IPO 就绪度是进入公开市场的正式指标。表 TV004 按标准 IPO 就绪标准评估 Altos Labs。结论是，无论临床还是财务指标，Altos 都尚未达到 IPO 条件，未来 8–12 年内也不太可能达到。


              表 TV006 列出最终尽调问题——投资人在投入资本或重新确认现有投资前，需要独立验证的证据项。图 FV004 展示了关键评估维度上的投资 KPI 记分卡。
