  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 传统估值方法为何不适用于尚无收入的深科学公司
        blocks:
          - type: paragraph
            body: >
              Altos Labs 带来一个根本估值难题：公司没有收入、没有获批产品、没有临床阶段项目，也没有短期变现路径。传统估值框架——折现现金流（DCF）、收入倍数、EBITDA
              倍数和管线风险调整净现值（rNPV）——至少需要某种锚点：预期未来现金流、产品时间线，或一组临床候选管线。Altos Labs 没有提供任何锚点。DCF 基本失效：对 Altos
              而言，最早可能出现的自由现金流，是来自药企合作伙伴的授权费；而这在临床前概念验证数据出现之前不现实，即便在乐观假设下，保守看也不会早于 2030 年。折现率或终值增长率的小幅变化，会让隐含价值相差一个数量级；因此
              DCF 只给 5% 权重。


              更合适的框架是实物期权估值（ROV）。实物期权理论——通过 Black-Scholes-Merton 期权定价框架形式化——把公司看作一组押注未来科学和商业结果的期权组合。投入 Altos 的 $3
              billion，本质上是在购买一张细胞重编程治疗最终商业成功的看涨期权。在这个语境下，高波动性（科学不确定性）和长久期（15–25 年）反而会提高实物期权价值，因为它们保留了非对称上行。估值方法对比（表
              TV001）系统审视了全部六种估值方法、各自适用性、估计输出范围、关键限制，以及在综合公允价值估计中的权重。价值拆解瀑布图（图 FV002）展示了 $2.8 billion
              基准情景估计如何由各组成部分拼出：研究平台（$1.5B）、团队溢价（$800M）、IP 选择权（$500M）、先发优势（$300M）和现金（$200M），再扣除尚无收入风险折价（$500M）。


              投资逻辑建立在五个相互强化的支柱上：（1）世界级科学团队，组建耗时数十年，短期内无法以任何价格复制；（2）$3B 现金储备，提供 7–12
              年跑道来证明概念验证；（3）平台技术（部分重编程）一旦有效，市场几乎覆盖所有衰老相关慢性病；（4）在监管和 IP 进入壁垒不断提高的领域占据先发位置；（5）Hal Barron 带来的管理层可信度，他在 GSK
              和 Roche 将基础科学转化为获批药物的履历，是行业金标准。反向逻辑同样有力：公司自身没有发表科学产出，没有定义适应症，存在根本性的 cMyc 安全风险，而 $3B 的价格标签本质上买的是一场时间跨度
              15–20 年的基础科学实验。
