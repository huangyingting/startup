  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场概览：全球长寿与抗衰老市场
        blocks:
          - type: paragraph
            body: >
              全球抗衰老和长寿市场覆盖一组高度异质的产品类别，从化妆品、膳食补充剂，到先进疗法和数字健康平台。分析师对 2022 年总市场规模的估计在约 $44 billion 到 $63 billion
              之间，差异来自市场定义差别。最高估计纳入了营养补充品、功能性化妆品和非处方抗衰老产品；若定义收窄到临床疗法，规模会小得多。无论采用哪种定义，市场预计到 2032 年将达到 $93–127
              billion，意味着未来十年的复合年增长率约为 7–9 percent。


              增长由几股力量共同推动：全球人口快速老龄化（每天有超过 10,000 名美国婴儿潮一代满 65 岁）、前所未有的私人资本流入长寿科学、治疗疾病转向延长健康寿命的范式变化，以及表观基因组学、细胞重编程和 AI
              辅助生物研究的科学成熟。Altos Labs 尚未参与当前商业市场——截至 2026 年 5
              月，公司没有产品、没有收入、没有商业存在。其市场相关性在于未来可能成为细胞年轻化疗法的创造者。如果部分表观遗传重编程被证明在规模化应用中安全有效，Altos Labs
              技术的可触达市场可能覆盖多种年龄相关疾病；一些分析师推测，最终总机会可能达到万亿美元级别。这个情景仍高度投机，并取决于技术和监管进展；这些进展预计不会早于 2035–2045 年出现。
