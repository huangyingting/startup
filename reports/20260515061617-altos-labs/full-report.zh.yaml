      - number: '8.2'
        title: 可比公司如何校准这一阶段的价值
        blocks:
          - type: paragraph
            body: >
              评估 Altos Labs 价值时，一个最有启发的办法，是看类似公司在相近科学发展阶段如何定价。难点在于没有完美可比对象：没有其他公司曾在基础科学发现阶段单轮融资 $3
              billion，用来追逐时间线如此投机、潜力又如此巨大的平台技术。不过，尚无收入、处于研究阶段的平台型生物科技公司宇宙，仍能提供有用校准。


              Calico 是 Alphabet 旗下长寿研究公司，也是使命上最接近的类比。Calico 成立于 2013 年，由 Alphabet 出资，后来与 AbbVie 合作；截至 2026 年，它已经运营 12
              年以上，却没有产出商业获批治疗。Alphabet 从未披露 Calico 估值。Calico 的教训并不轻松：金钱和机构支持不能保证科学突破，即便资源充足的长寿项目，也可能运行十多年仍达不到临床里程碑。


              Moderna 的早期估值轨迹提供了更乐观的可比。Moderna 尚无获批产品、把 mRNA 作为平台技术推进时，2016 年 Series C 对公司的估值约为 $1.5 billion——当时已发展六年。随后
              Moderna 通过证明 mRNA 平台的多功能性，并最终推出 COVID-19 疫苗，支撑了这一估值。在同样早期阶段，Altos Labs 的估值大约是 Moderna 2016 年 Series C
              的两倍，科学不确定性却显著更高——Moderna 到 2016 年至少已有早期 mRNA 项目的人体免疫反应数据；Altos 没有任何类型的人体数据。


              Alnylam Pharmaceuticals 成立于 2002 年，商业化 RNA 干扰（RNAi），提供了另一组校准。Alnylam 于 2004 年上市，市值约 $2.4
              billion，当时没有收入——但它拥有机制上已验证的科学平台（RNAi 已在人类细胞中证明）、正在形成的 IP 位置，以及明确的临床路径。它的第一款 RNAi 药物在创立 16 年后获批（2018）。Altos
              Labs 缺少 Alnylam 早期机制性人类验证优势，但由于资本规模和平台雄心更大，隐含估值更高。


              BioNTech 成立于 2008 年，押注 mRNA 癌症免疫治疗；2018 年才完成首轮主要机构融资，金额约 $300 million——创立十年后。COVID-19 证明 mRNA 商业潜力之前，市场给
              mRNA 平台的早期估值并不高。Altos 创立时 $3 billion 的隐含估值，已经可比这些公司更后期的估值；这要么反映了市场为 Altos
              团队和平台潜力支付了极高溢价，要么意味着相对于科学进展可能定价过高。


              可比估值表（表 TV002）对六家可比公司做了系统比较。不同情景下的估值区间（图 FV003）展示了 Altos 在这些历史案例可观察结果区间中的位置。
