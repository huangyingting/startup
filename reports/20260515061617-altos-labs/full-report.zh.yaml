      - number: '2.2'
        title: 市场分层：从化妆品到细胞疗法
        blocks:
          - type: paragraph
            body: >
              抗衰老市场最适合理解为一个光谱：一端是科学含量低、销量高的消费品，另一端是科学含量高、销量低的实验性疗法。营养补充品、膳食补充剂和功能性化妆品——这些产品宣称有抗衰老益处，却不需要临床证明——占据当前市场支出的最大份额，估计约为抗衰老市场总收入的一半。该板块包括
              NAD+ 前体、白藜芦醇配方、胶原蛋白补充剂，以及大量护肤产品。其增长主要靠消费者需求和营销，而不是临床证据。


              长寿疗法子板块——那些追求类药物干预、靶向衰老生物学的公司——截至 2022 年估计只有 $2–5 billion，且所有主要项目都处在临床前或早期临床阶段。这是与 Altos Labs
              最相关的板块。衰老诊断和生物标志物构成技术相邻板块，包括开发表观遗传时钟、甲基化检测和多组学衰老评估的公司；该市场今天仍小，但随着生物年龄测量在预防医学中标准化，具备增长位置。临床前研究工具——单细胞测序平台、模式生物系统和表观基因组学试剂——是
              Altos Labs
              当前发现阶段最直接参与的板块，不过公司是这些工具的消费者，而非生产者。数字健康和长寿健康管理平台，包括应用、可穿戴设备和健康优化服务，是按单位量计算增长最快的板块，但它们与核心长寿生物学的连接往往很表层。
            claimRefs:
