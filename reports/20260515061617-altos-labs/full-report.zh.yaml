  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 长寿生物技术竞争格局概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，长寿生物技术竞争场由一小批资金充足的私营公司和一家上市公司构成；所有公司都处于商业化前阶段，没有任何获批疗法直接靶向衰老生物学。Altos Labs 位于资本分布顶端——其 2022
              年 1 月完成的 $3 billion 融资，超过所有其他直接竞争者已披露融资的总和。竞争格局横跨三类相互重叠的科学模态：细胞重编程（Altos Labs、NewLimit，以及 Retro
              Biosciences 的部分方向）、senolytics（Unity Biotechnology、Oisin Biotechnologies），以及多能干细胞或基因疗法路径（AgeX
              Therapeutics、Rejuvenate Bio）。


              截至 2026 年 5 月，还没有竞争者把靶向长寿的疗法推进到监管批准。Unity Biotechnology 曾最接近，旗下 senolytic 项目 UBX0101 进入过人体 Phase 2 临床试验，但在
              2020
              年膝骨关节炎试验中遭遇决定性失败，随后转向眼科和神经学。这次失败是该领域的标志性警示数据点：它说明清除衰老细胞这一机制上站得住脚的假设，并不会自动转化为某个具体疾病场景和时间线里的临床疗效。其他所有竞争者都比
              Unity 转型前阶段更早。


              这个竞争场的特点是研究周期长、转化时间线不确定，并且共同依赖公共领域科学发现（Yamanaka
              因子发现、表观遗传时钟技术、衰老标志框架）。没有竞争者拥有真正专有的基础发现；差异来自研究投入规模、科学领导力质量、路径聚焦度和平台开发速度。长寿竞争领域七个关键实体的结构化画像见下方 Table
