      - number: '4.4'
        title: 财务风险与资本依赖
        blocks:
          - type: paragraph
            body: >
              Altos Labs 面临一组高度集中的财务风险；以其科学规模来看，这些风险并不符合典型生物科技公司的常态。临床阶段生物科技公司可以围绕 Phase 1 或 Phase 2 里程碑发起后续融资，Altos
              Labs 则不同：公司没有临床资产，没有被验证的临床前到 IND 路径，也没有收入可用来验证修订后的估值。


              最实质的风险是完全依赖资本：公司收入为零，100% 依赖 2022 年 1 月募集的 $3 billion；一旦科学进展、投资人优先级或资本市场环境持续偏离预期，融资脆弱性会立刻暴露。单轮融资结构也没有机构 VC
              通常施加在被投公司上的分阶段、按里程碑释放资金机制。没有分期拨款，没有里程碑解锁，也没有披露的约束条款。资本一旦消耗完，就必须完整再融资。


              第二个主要风险来自投资人构成。科技企业家资本——Bezos、Milner、Altman——历史上的时间维度通常短于学术捐赠机构（HHMI、Wellcome Trust）或主权财富基金。虽然外界理解 2022
              年这一轮所有投资人都在押注长期科学使命，但没有公开披露的协议约束投资人在下一轮继续支持。如果任何主要锚定投资人调整优先级，成功再融资的概率都会显著下降。Financial Times 和 The
              Economist 的财务报道也质疑了价值创造时间线，指出公司没有临床项目，投资人无法用任何外部验证基准来评估科学进展。


              资本市场风险也需要点明：2022 年以来利率上行，提高了非流动、长久期资产的无风险收益门槛；投向商业化前生物学的耐心资本，相比固定收益替代品吸引力下降。若在当前或近期利率环境中再融资，投资人要求的回报预期会高于
              2022 年那一轮。
