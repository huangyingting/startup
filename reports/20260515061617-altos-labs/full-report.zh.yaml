      - number: '5.6'
        title: 展示材料
        blocks:
          - type: callout
            title: cMyc 致癌性是平台最根本、仍未解决的安全风险
            body: >-
              cMyc（MYC 原癌基因的蛋白产物）是高效重编程所必需的因子，但也是人类癌症中最常见的扩增基因之一。它在部分重编程方案中的角色引入了一个未解决风险：在一个携带数十年体细胞突变的衰老人类细胞中，即便短暂表达
              cMyc，也可能把边缘性癌前细胞推过转化阈值。OSK（三因子）替代方案可以降低这一风险，但要以重编程效率为代价，可能让治疗窗口窄到无法临床使用。除非这一风险在衰老人类细胞中被量化——而不只是小鼠胚胎成纤维细胞和年轻细胞系——否则部分重编程在人体治疗场景中的安全性画像仍确实不确定。
            calloutType: risk
            claimRefs:
              - CE003
              - CE010
              - CE012
              - CE033
          - type: callout
            title: 体内递送是阻挡临床转化的关键路径项
            body: >-
              目前还没有任何递送系统证明自己能同时满足临床级部分重编程所需的属性：组织特异性（让 OSKM
              只在需要的位置表达）、可控动力学（让表达按明确时间表开启和关闭）、长期安全性（包括没有持续载体残留、没有免疫毒性），以及制造可规模化。AAV 面临载荷限制和免疫挑战；LNP mRNA
              递送是短暂的，但需要重复给药；基于 CRISPR 的基因组整合又带来自身安全问题。在其中任何一种路径按临床现实方案在非人灵长类模型中得到验证之前，所有预计临床里程碑都取决于一个尚未发生的突破。
            calloutType: risk
            claimRefs:
              - CE008
              - CE009
              - CE022
              - CE023
              - CE034
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 没有商业客户：Altos Labs 完全处于收入前阶段
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Altos Labs 没有商业客户、没有产品收入，也没有披露任何授权协议。公司官网没有产品页、没有价格信息，也没有任何形式的商业化产品或服务（CU001、CU006）。公司于 2022
              年 1 月成立，获得约 $3 billion
              投资资金，并把前三年用于建设实验室基础设施和招聘科研人员（CU002）。自成立以来，公司没有公开宣布任何药企合作交易，也没有向投资人或公众披露任何类型的收入（CU003）。


              Altos Labs 官方把自己描述为一家基础研究机构，使命是理解细胞年轻化科学，而不是开发药物（CU005）。公司与 UCSF、Cambridge、Oviedo 以及其 San Francisco Bay
              Area 园区的科学家保持合作研究关系——这些是学术知识交流安排，不是商业协议（CU007）。诺贝尔奖得主 Shinya Yamanaka、Jennifer Doudna 和 David Baltimore
              担任科学顾问，为公司提供科学信誉，未来可能吸引合作伙伴，但这种关系本身并不产生收入（CU008）。


              表 TU002 勾勒了当前利益相关方和互动格局，表 TU005 列出了具名客户证明表，显示迄今所有互动本质上都是学术或顾问性质。图 FU001 展示了从当前阶段到潜在首次商业互动的预计时间线。
