      - number: '1.3'
        title: 融资历史、资本结构与投资人基础
        blocks:
          - type: paragraph
            body: >
              Altos Labs 在 2022 年 1 月完成了首次、也是截至 2026 年 5 月唯一已宣布的融资轮，从一组知名投资人手中募集 $3
              billion。这轮融资被广泛视为史上规模最大的单笔私营生物技术融资之一，比多数 Series A 基准高出一个数量级。融资后估值约为 $3
              billion，意味着公司当时的估值几乎等同于融资金额本身——这反映出公司仍处于投机性、无收入阶段，也反映出创始人明确传达的 10 到 20 年研究周期。


              投资人组合同时覆盖科技亿万富豪、生命科学风险投资专家和遗产资本。Jeff Bezos 通过个人投资工具 Bezos Expeditions 参与，使 Altos Labs
              成为他最突出的生命科学直接投资之一。Yuri Milner 是以早期投资 Facebook 和 Twitter 闻名的俄以科技投资人，也是本轮共同锚定投资人。OpenAI CEO、长寿领域爱好者 Sam
              Altman 以个人投资人身份参与。Paul Allen 遗产旗下投资机构 Vulcan Capital 延续了这位已故 Microsoft 联合创始人对前沿生物学的兴趣。专注深科技的风险投资机构 ARCH
              Venture Partners 则为股权结构表带来机构生物技术经验。


              截至 2026 年 5 月，Altos Labs 没有宣布任何后续融资轮、老股交易或信贷安排。公司收入为零——它是一家完全由 2022 年募集的 $3 billion 支撑的商业化前研究机构。KPI 快照见
              Table TO001，投资人图谱见 Table TO003。Figure FO002 汇总了关键财务和运营指标。
