  - id: TV004
    title: IPO 准备度评估
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Assessment of Altos Labs against the six standard criteria evaluated by investment bankers, institutional
        investors, and market participants for a biotech IPO. These six criteria — revenue, clinical data, IP portfolio,
        management team, financial governance, and market conditions — collectively cover the complete standard pre-IPO
        diligence checklist for biotechnology listings on NASDAQ and NYSE. The six-criterion framework is drawn from
        public market conventions and represents an exhaustive set for the chapter's purpose. Assessments reflect
        publicly available information about Altos Labs as of May 2026.
    columns:
      - 标准
      - 当前状态
      - 所需状态
      - 缺口
      - 准备就绪时间线
    rows:
      - - 收入
        - 尚无收入（$0 商业收入）
        - $50M+ ARR，或一项带预付款、证明商业可行性的大型药企合作
        - 显著——基准情景下 5 年内没有收入路径
        - 乐观情景下 5–8 年；悲观情景下永远不会
      - - 临床数据
        - 无临床项目；未提交 IND；没有 1 期数据
        - 至少一个适应症的 1 期安全性和耐受性数据；最好有 1/2 期读数
        - 重大 — 临床数据需要先跑通临床前、提交 IND，再经历 2-4 年 1 期时间线
        - 从 2026 年 5 月起至少 8–12 年
      - - IP 组合
        - 搭建中（已提交申请；尚无公开确认的重要授权专利）
        - 经过验证、可防御的专利资产，覆盖核心重编程方案和递送机制
        - 中等 — IP 申请仍在推进，但尚未在多方复审或诉讼中经受实战检验
        - 组合成熟还需 3–5 年
      - - 管理团队
        - 极强 — CEO Hal Barron（前 GSK CMO）、诺奖得主 SAB 成员、经验丰富的科学领导层
        - 上市公司级管理团队，配备经验丰富的 CFO、总法律顾问和投资者关系职能
        - 科学 / CEO 侧无缺口；仍需 CFO 和上市公司基础设施
        - 科学 / CEO 侧已就绪；完整上市公司基础设施还需 1–2 年
      - - 财务治理
        - 私营公司标准 — 财务报告不公开；未达到 SOX 合规
        - 上市公司报告能力：SOX 合规内控、经审计财务报表、季度报告
        - 中等 — 需要升级 CFO 配置、建立审计委员会，并推进 SOX 准备计划
        - 专项投入下需 2–3 年
      - - 市场环境
        - 私营公司；2026 年生物科技 IPO 窗口有选择性；长寿赛道尚未被公开市场验证
        - 生物科技 IPO 市场愿意接纳；有可比的上市长寿公司供投资者参考
        - 取决于宏观环境；需要生物科技市场情绪利好临床前平台
        - 未知 — 取决于市场；没有临床数据可能永远无法实现
    notes: >-
      Altos Labs 在 6 项标准中只有 1 项达到「就绪」（管理团队质量），财务治理为「接近就绪」。 所有临床和收入标准的缺口都以年计。2034 年前
      IPO，需要异常快的科学进展和极度有利的生物科技市场环境。投资者最可能的退出路径是 M&A（被大型制药公司收购），而不是公开市场上市。
