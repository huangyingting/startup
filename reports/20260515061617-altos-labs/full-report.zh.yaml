  - id: TV001
    title: 估值方法对比
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        This table covers all six primary valuation methodologies applicable or inapplicable to a pre-revenue,
        pre-clinical, basic-science research company. The methodologies span standard corporate finance (DCF), option
        pricing theory (real options), equity market practice (comparable company analysis), asset-based approaches,
        venture capital convention, and cost-based reconstruction. No additional standard valuation methodologies exist
        that are material to this analysis given the absence of revenue, clinical data, and commercial precedents as of
        May 2026. Weight in Analysis reflects the composite weighting used in the chapter's fair value estimate.
    columns:
      - 方法
      - 适用性
      - 结果
      - 局限
      - 分析权重
    rows:
      - - DCF（折现现金流）
        - 低——无收入；产生现金的时间未知
        - 基准情景下高度为负；乐观情景下无法定义
        - 需要收入预测；没有收入时间线；折现率小幅变化会带来数量级估值波动
        - 低（5%）
      - - 实物期权估值
        - 高——能捕捉研究平台可选性；适合长周期科学赌注
        - $500M–$5B，取决于假设成功概率和到期时间
        - 对波动率和底层资产价值假设高度敏感；概率估计主观
        - 高（40%）
      - - 可比公司分析
        - 中——真正可比公司很少；Moderna、Alnylam、BioNTech 提供部分类比
        - 按阶段、赛道和团队水准，区间为 $1B–$5B
        - 很少有公司在基础科学阶段融资 $3B；可比样本不完美，可能不能反映 Altos 特有风险
        - 高（30%）
      - - 资源基础 / 资产估值
        - 中——团队、IP 和基础设施有可重建成本
        - $250M–$500M（组建团队、获取 IP、建设基础设施的成本）
        - 忽略科学进展、平台可选性和未来潜力；如果科学跑通，会低估真实价值
        - 低（10%）
      - - VC 方法（退出倍数）
        - 中——适用于早期阶段；假设最终通过 IPO 或 M&A 退出
        - 高度依赖情景；从资本损失（悲观）到 $5–100B（乐观 / 超乐观）
        - 高度投机；退出时点和倍数现阶段无法知道；此类资产没有公开市场先例
        - 中（15%）
      - - 复制成本法
        - 低——低估科学进展和人力资本组建价值
        - ~$500M–$1B（重新招聘团队并重建研究基础设施的估计成本）
        - 没有捕捉已取得的科学进展；低估 Yamanaka、Doudna、Horvath 参与溢价的价值
        - 低（5%）
    notes: 权重反映对一家无收入、临床前、长周期平台科学公司最合适框架的分析判断。按这些权重，基准情景下的综合隐含公允价值约为 $1.5–3.0 billion。所有输出区间都是分析性估计；Altos Labs 未披露任何内部估值或评估。
