      - - Unity Biotechnology
        - 清除衰老细胞药物（ABT-263 / UBX0101）
        - 膝骨关节炎 Phase 2 临床失败；小鼠到人体转化断裂
        - 股价下跌 >90%；项目终止；转向眼科
        - 小鼠衰老模型结果不能可靠预测人体结果
      - - Calico (Google/Alphabet)
        - 长寿研究平台（AbbVie 合作）
        - 运营 12+ 年后仍无商业产出
        - 截至 2026 年仍无收入；AbbVie 合作商业产出有限
        - 基础长寿研究周期极长；基础科学不会自动商业化
