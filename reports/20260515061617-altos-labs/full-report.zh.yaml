  - id: FE001
    title: 部分重编程机制：OSKM 表达路径与致癌风险分支
    type: flow
    layout: wide
    summary: >-
      流程图展示衰老分化细胞中 OSKM 因子表达的双分支结果。左侧（安全）分支从受控周期性表达，经表观遗传重塑，到保留原始身份的再年轻化细胞。右侧（危险）分支展示过度表达或长时间暴露时会发生什么：去分化进入 iPSC
      状态，甚至更糟，出现染色体不稳定和癌症风险。该图说明，OSKM 表达的时间控制——Altos Labs 平台的核心技术挑战——不只是优化参数，而是类别性的安全要求。
    data:
      nodes:
        - id: aging-cell
          label: |-
            衰老细胞
            （表观遗传漂移，衰老标志）
          type: start
        - id: oskm-transient
          label: |-
            受控周期性 OSKM 表达
            （短脉冲，随后关闭）
          type: process
        - id: oskm-overexpressed
          label: |-
            OSKM 过度表达
            （连续或延长）
          type: danger
        - id: epigenetic-remodeling
          label: |-
            表观遗传重塑
            （时钟逆转，组蛋白重置）
          type: process
        - id: rejuvenated-cell
          label: |-
            再年轻化细胞
            （更年轻的表观遗传标记，身份保留）
          type: end-success
        - id: dedifferentiation
          label: |-
            去分化
            （丧失组织特异性身份）
          type: danger
        - id: ipsc-cancer
          label: |-
            iPSC 状态 / 癌症风险
            （cMyc 驱动致癌，畸胎瘤）
          type: end-danger
      edges:
        - from: aging-cell
          to: oskm-transient
          label: 安全方案
        - from: aging-cell
          to: oskm-overexpressed
          label: 不安全给药
        - from: oskm-transient
          to: epigenetic-remodeling
          label: ''
        - from: epigenetic-remodeling
          to: rejuvenated-cell
          label: 身份保留
        - from: oskm-overexpressed
          to: dedifferentiation
          label: ''
        - from: dedifferentiation
          to: ipsc-cancer
          label: cMyc 致癌性
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE018
      - CE019
  - id: FE002
    title: 技术发展时间线：部分重编程科学（2006–2032+）
    type: timeline
    layout: wide
    summary: >-
      这条时间线梳理了从 2006 年 Yamanaka 发现 OSKM，到 Altos Labs 成立，再到近期预计里程碑的关键科学节点。它显示，获诺贝尔奖的基础发现与第一家围绕部分重编程打造的大型公司成立之间隔了 15
      年；距离首次人体试验，估计还要再等 10+ 年。2024 年之后的里程碑均为分析估计；Altos Labs 尚未公布正式时间表。
    data:
      items:
        - date: '2006'
          label: Yamanaka 发现 OSKM
          note: Yamanaka 实验室证明，四个转录因子可将成年细胞重编程为 iPSC 状态（Cell，2006）
        - date: '2012'
          label: 诺贝尔奖；iPSC 得到验证
          note: Yamanaka 和 Gurdon 因 iPSC 研究获诺贝尔生理学或医学奖
        - date: '2013'
          label: Horvath 表观遗传时钟发表
          note: Steve Horvath 发表首个跨组织 DNA 甲基化衰老时钟（Genome Biology，2013）
        - date: '2016'
          label: 体内部分重编程（Salk）
          note: Izpisua Belmonte 实验室显示，周期性 OSKM 可在体内延长早衰小鼠寿命（Cell，2016）
        - date: '2019'
          label: GrimAge 时钟发表
          note: Horvath 及同事发表 GrimAge，这是一种可预测死亡时间的甲基化时钟
        - date: '2021'
          label: Altos Labs 成立
          note: 公司注册成立；Steve Horvath、Manuel Serrano 和 Shinya Yamanaka（顾问）加入
        - date: '2022'
          label: 多研究所科研启动
          note: 宣布完成 $3 billion 融资；旧金山湾区、英国 Cambridge 和日本研究所启动
        - date: 2024–2026
          label: 体外结果；早期论文
          note: 预计发表早期重编程特征数据（估计）
        - date: 2027–2030
          label: 临床前动物模型
          note: 预计转向体内小鼠和灵长类重编程研究（估计）
        - date: 2030–2032
          label: IND 准备（预计）
          note: 首个人体安全性研究的监管申报准备——取决于递送突破（估计）
        - date: 2032+
          label: 首次人体试验（预计）
          note: 针对特定疾病适应证的 Phase 1 人体安全性研究——并非健康寿命本身（估计）
