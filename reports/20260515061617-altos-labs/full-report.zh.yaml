      - number: '7.5'
        title: 风险缓释：Altos Labs 正在如何降低自身风险画像
        blocks:
          - type: paragraph
            body: >
              Altos Labs 在模式里嵌入了几项结构性缓释措施，可部分应对上述风险类别；但没有哪一项能消除核心生存风险。


              科学安全方面，主要缓释手段是继续开发 OSK（不含 cMyc 的三因子重编程），把它作为潜在更安全的变体。包括 Manuel Serrano 在内的 Altos Labs 研究人员已经发表或展示过 OSK
              方案，可在效率较低的情况下实现部分表观遗传时钟逆转。如果 OSK 能被证明在老年人类细胞中产生具有临床意义的表观遗传时钟变化，同时不带来致癌风险——这一发现尚未出现在已发表文献中——cMyc
              问题的风险会大幅下降。多实验室、多机构设计提供第二层科学缓释：在确定临床方向前，要求 Cambridge、San Francisco 和日本团队复现关键结果，可降低单一实验室复现失败演变成公司级灾难的概率。


              监管方面，主要的已表述缓释手段，是通过聘请经验丰富的药品监管顾问，并参与更广泛的 TAME 试验生态，尽早与 FDA 接触。Altos Labs CEO Hal Barron 曾领导
              GlaxoSmithKline 全球药物研发，拥有大量 FDA pre-IND
              沟通经验；一旦选定临床方向，这可能加快监管对齐。公司采取预竞争发表策略，也有助于在监管审评人员面前建立外部可信度，因为审评人员会参考已发表科学文献来校准新型治疗模式的证据状态。


              财务方面，$3 billion 的初始融资本身就反映出投资人承认：传统生物科技时间线不足以支撑这一类研究。投资人——ARCH Venture Partners 以及与 Jeff Bezos、Yuri Milner
              相关的实体——属于耐心资本，回报预期拉得很长。多项目研究策略（部分重编程、衰老细胞、表观遗传工具、多组学）提供了选择权：如果基于 cMyc 的重编程不可行，Altos
              可以转向清除衰老细胞项目，或其他通往临床应用路径更短的衰老标志靶点。针对关键人员风险的内部继任规划，以及面向研究员工的股票薪酬包，也是额外运营缓释措施，但具体细节尚未公开披露。


              尽管有这些缓释措施，Altos Labs 在各个维度上的剩余风险仍然极高。没有任何缓释能改变三项基本事实：部分重编程从未被证明可安全用于老年人类细胞；抗衰老治疗没有 FDA
              路径；公司需要在产生收入前很久就再次融资。缓释措施只能在边际上降低失败概率，不能改变这笔投资的基本类别：这是一个时间跨度 15–20 年的前沿科学赌注，无法按原始投资基础产生回报的概率也相应很高。表 TR005
              系统列出四类最高严重度风险的主要缓释措施、监测指标和投资逻辑破裂触发点。
