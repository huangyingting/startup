      - number: '1.5'
        title: 关键里程碑与科学轨迹
        blocks:
          - type: paragraph
            body: >
              催生 Altos Labs 的科学谱系跨越了二十年的基础生物学。2006 年，Shinya Yamanaka 及其 Kyoto University 同事在 Cell
              发表里程碑论文，证明四个转录因子——Oct4、Sox2、Klf4 和 cMyc——可以把已分化小鼠成纤维细胞重编程为诱导多能干细胞（iPSC）。这一发现于 2012
              年获得诺贝尔生理学或医学奖认可，也确立了一个原则：细胞命运并非不可逆。


              Altos Labs 科学逻辑的关键概念验证出现在 2016 年。当时 Juan Carlos Izpisua Belmonte 在 Salk Institute 的实验室发表于 Cell
              的研究显示，在活体小鼠模型中周期性、部分表达 OSKM 因子，可以在不导致畸胎瘤形成的情况下产生细胞年轻化迹象——这说明部分重编程或许能在体内逆转衰老标记，同时避免完整致癌风险。这一结果直接启发了 Altos
              Labs 的创立逻辑。


              Altos Labs 于 2021 年注册成立，并在 2022 年 1 月随着 $3 billion 融资完成而公开宣布。早期总裁 Hans Bishop 离任后，Hal Barron 于 2022 年获任
              CEO。Cambridge UK 和 Japan 研究所分别在 2022 年及 2022-2023 年设立。从 2023 年到 2026 年 5
              月，公司一直处在发现科学阶段，没有公开宣布临床项目、合作伙伴关系或追加融资。完整里程碑时间表见 Table TO004，视觉时间轴见 Figure FO001。
