      - number: '5.4'
        title: 技术风险：安全性、递送、可重复性与监管
        blocks:
          - type: paragraph
            body: >
              Altos Labs
              的技术平台带有独特且异常深的风险结构。小分子药物开发的主要风险是选择性、毒性和药代动力学；部分重编程则把风险引入基础细胞生物学层面：能否重编程细胞而不把它们推向癌变？能否把因子递送到活人体内的特定组织？能否在不同人群遗传背景下取得一致、可重复的结果？能否为一个此前没有任何监管机构评估过的全新治疗机制，定义并满足监管标准？


              cMyc 致癌性是讨论最广泛的风险。cMyc 是一个原癌基因——也就是说，其正常形式一旦过表达，会推动细胞周期进展，并在与其他突变叠加时导致癌症。在完全 OSKM 重编程实验中，cMyc 是 iPSC
              衍生物形成畸胎瘤的主要驱动因素。在部分重编程中，较低表达水平和较短暴露窗口被假设可以降低但不能消除这一风险。2016 年 Salk
              早衰实验及后续体内研究，没有在实验队列中报告肿瘤形成；但这些研究使用的是早衰小鼠（寿命被压缩，长期肿瘤监测困难）、动物数量有限，且随访时间短。在衰老人群中，重编程会作用于已经累积数十年体细胞突变的细胞；即便短暂
              cMyc 表达的致癌潜力，也确实不确定。部分研究人员已经完全转向 OSK（三因子）或替代因子组合，以避开这一风险，同时接受更慢或更弱的年轻化效果。


              体内递送可以说仍是近期最强的技术约束。AAV 载体面临载荷大小限制（四个 OSKM 编码序列加上调控元件，超过标准 AAV
              包装上限）、病毒衣壳蛋白可能引发免疫反应，以及单一载体血清型无法实现广泛组织覆盖。脂质纳米颗粒可以避免免疫预激，但只提供短暂 mRNA
              表达，因此需要重复给药。多西环素诱导型控制系统，又引入一层单独的小分子药理学。对于 OSKM 递送，还没有任何路径在非人灵长类中同时证明组织特异性、可控开关表达、长期安全性和可规模化制造，更不用说在人类中证明。


              跨细胞类型和遗传背景的可重复性，是第三个主要风险。最初的体外部分重编程结果，主要来自小鼠胚胎成纤维细胞和有限的人类细胞系。结果在细胞类型、供体年龄和传代次数之间呈现显著差异。要从 2–3
              个已发表体外数据集，扩展到覆盖与人类衰老和疾病相关的 200 多种细胞类型的稳健、可重复方案，需要极其庞大的系统表征工作。Altos Labs 的研究模型——300
              多名科学家在多个器官系统中并行工作——正是为了解决这种可重复性和覆盖范围挑战而设计的，但按任何合理预测，这项工作都需要多年。


              监管路径从根本上没有定义。FDA 没有针对「表观遗传年轻化」或「部分重编程」的获批治疗类别。最接近的类比是基因治疗（将监管 AAV 递送
              OSKM）和细胞治疗；这些领域已有监管框架，但「逆转衰老」甚至「降低生物年龄」从未被任何主要监管机构接受为临床试验主要终点。Altos Labs
              可能需要把首批临床项目围绕特定疾病设计（例如年龄相关性黄斑变性、Parkinson's disease 或心力衰竭），使用传统终点，而不是直接瞄准健康寿命延长——这可能限制商业模型，但也是近期唯一现实的监管策略。
