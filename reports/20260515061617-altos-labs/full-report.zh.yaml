      - number: '6.3'
        title: 互动模式：Altos Labs 如何产生收入
        blocks:
          - type: paragraph
            body: >
              Altos Labs 有多条潜在收入模式路径，但目前没有任何一条已经启动。最直接的近期机会，是研究工具授权：向学术和制药研究人员出售或授权 OSKM 递送载体、表观遗传时钟试剂和衰老检测套件，可以在 3–5
              年内产生温和的非稀释收入，且不需要临床验证（CU019）。生物制药平台技术授权交易，历史上通常带来 $10–100 million
              预付款，并附带与临床前和临床里程碑挂钩的或有付款（CU020）。围绕早期生物学平台的多靶点共同开发协议，总交易价值曾达到 $50 million 到超过 $1 billion（CU021）。


              Altos Labs 也可以通过自有衰老生物标志物数据库访问，产生早期机构收入——向研究衰老生物学的制药研究人员付费授权去标识化纵向表观基因组数据（CU022）。合作研究与开发协议（CRADAs）和 NIH
              SBIR/STTR 机制提供不需要商业伙伴的非稀释资助收入（CU023）。Calico 与 AbbVie
              的长期合作，是一种围绕多年研究合作搭建、没有近期产品义务的结构，说明机构型生物科技合作可以围绕研究里程碑而不是商业交付物来设计（CU024）。


              所有临床收入路径的关键监管障碍在于，FDA 尚未批准任何针对细胞衰老或表观遗传重编程的治疗适应症；因此，任何需要人体疗效数据才能商业化的 Altos Labs 产品，都面临很深的路径不确定性（CU018）。在
              2028 年之前，没有任何 Altos Labs 收入模式情景具有较高概率产生商业收入（CU025）。


              表 TU004 梳理了完整收入模式情景及其依赖项、上行空间和概率评估。
