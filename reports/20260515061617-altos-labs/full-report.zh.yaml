      - number: '4.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 完整财务尽调无法完成——没有公开财务数据
            body: >-
              Altos Labs 是一家 Delaware 私营公司，没有上市公司报告义务。公司没有发布经审计财务报表、Form
              990（它不是非营利组织），也没有发布任何其他财务披露。本章所有财务数字，都是基于公开员工数数据、薪酬基准和可比机构分析得出的估算。在做出任何投资或合作决定之前，投资人必须直接向管理层要求经审计财务、最新股权结构表、董事会批准的预算，以及剩余现金头寸确认。没有公开财务数据，是本章最重要的尽调阻塞项。
            calloutType: risk
            claimRefs:
              - CI003
              - CI033
          - type: callout
            title: 再融资风险重大——基准烧钱速度下，2030–2031 年前可能需要融资
            body: >-
              在基准烧钱假设（$350M/yr）下，截至 2026 年 5 月，Altos Labs 估计剩余 $1.5 billion 资本，可支撑约 4 年运营。这意味着公司大约在 2030–2031
              年需要再融资——届时公司预计仍不会有任何获批临床项目或收入。该阶段再融资，要么需要锚定投资人（Bezos、Milner）再次承诺出资，要么需要新投资人接受一个仅由临床前科学论文和平台进展支撑的估值。对于一个没有商业产品的临床前研究平台，公允估值很难建立，这会造成重大的再融资执行风险。
