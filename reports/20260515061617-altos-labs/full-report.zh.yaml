      - number: '4.5'
        title: 投资人经济账与耐心资本模型
        blocks:
          - type: paragraph
            body: >
              Altos Labs 的结构，是为了支持创始人所说的「耐心资本」：在 20 年时间维度里，把回报预期明确置于科学使命之后。这种表述在风险投资支持的生物科技公司中很少见，更接近 Howard Hughes
              Medical Institute 或 Wellcome Trust 这类学术捐赠机构的资本结构，而不是传统股权融资的疗法开发公司。


              2022 年 1 月这一轮融资时的投资人经济账，意味着交割时投后估值约为 $3 billion，也就是一美元资金对应一美元进入估值。对于投入 $500 million
              的投资人，回报路径完全取决于三种可能：未来被以显著高于投入资本的溢价收购（这要求 Altos Labs 开发并证明可转化到临床的资产）；未来
              IPO（对一个没有临床项目的纯平台公司来说概率不高）；或向另一名投资人转让老股（商业化前生物科技公司的非流动私募股权，二级市场很有限）。对 Bezos 和 Milner
              这类亿万富豪投资人，最可能的回报路径也许并不完全是财务性的——两人都公开表达过对长寿科学的个人兴趣，这一优先级独立于资本回报。


              ARCH Venture Partners 作为辛迪加中的机构投资人，面对不同的回报约束：其有限合伙人期待基金层面的 IRR 目标；如果缺乏二级市场流动性或定期资本事件，20 年时间维度与这些目标不兼容。ARCH
              历史上投资过早期科学公司，组合中包括 Moderna、Vir Biotechnology 等最终成为重磅公司的案例；它出现在 Altos 辛迪加中，说明其对转化路径有信心。不过，Altos
              任何流动性事件的时间线仍完全没有明确。表 TI004 比较了可比科学组织之间的研究投资成本结构。
