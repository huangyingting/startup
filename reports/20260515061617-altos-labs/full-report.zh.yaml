              FDA 从未批准过任何针对细胞衰老或表观遗传重编程的治疗适应症。除非监管路径被定义清楚——无论是新的衰老终点，还是锚定在衰老生物学上的传统疾病适应症——否则无论科学结果如何，Altos Labs
              都无法产生临床阶段制药收入。这是一个系统性行业约束，不是 Altos Labs 特有的失败；但对一家全部投资逻辑都依赖细胞年轻化的公司来说，影响尤其大。
