      - number: '3.2'
        title: 直接竞争者：Calico、Retro Biosciences 和 NewLimit
        blocks:
          - type: paragraph
            body: >
              Calico（California Life Company）是 Altos Labs
              最直接的机构类比对象——它同样是一家资金深厚、基础科学优先的长寿公司，建立在同一个前提上：衰老可以通过分子生物学被理解并逆转。Calico 由 Google 和 AbbVie 于 2013
              年创立，两家公司各投入约 $750 million，估计承诺资金合计 $1.5 billion，使其成为 Altos Labs 之后长寿疗法领域资金第二充足的公司。Genentech 前 CEO Art
              Levinson 担任创始 CEO。Calico 的科学路径以模式生物——C. elegans（线虫）和小鼠——以及计算生物学为中心，用来理解长寿机制。其与 AbbVie
              的合作旨在把基础发现转化为药物开发项目；但截至 2026 年，公司尚未公开披露临床项目。由于多年、数亿美元预算对应的公开科学产出有限，Calico
              受到长寿研究者的显著批评，也引发了关于研究生产率和组织模式的质疑。


              Retro Biosciences 于 2022 年在 South San Francisco 成立，与 Altos Labs 同处 Bay Area 生物技术走廊。OpenAI CEO Sam Altman
              个人向公司承诺 $180 million——这种单一投资人承诺在结构上更像家族办公室，而不是传统 VC 轮。CEO Joe Betts-LaCroix
              带领一支更精简的团队，并行推进三条策略：受异体共生研究启发的血浆型干预、部分细胞重编程（与 Altos Labs 直接重叠）以及巨自噬增强。血浆和自噬方向与 Altos
              有方向性差异；部分重编程方向则构成直接竞争重叠。Retro 的 $180M 预算只是 Altos Labs 能力的一小部分，但较小团队或许能更快迭代。


              NewLimit 于 2021 年在 San Francisco 创立，是直接竞争者中技术路径最具体的一家。公司由 Coinbase CEO Brian Armstrong 共同创立，并由 CEO Blake
              Byers 领导，已募集 $40 million，用机器学习作用于表观基因组——系统性描绘并改变 DNA 甲基化模式，以延长人类健康寿命。ML 原生路径把 NewLimit 与 Altos Labs
              更传统的实验生物学平台区分开来，尽管两者都瞄准表观遗传年龄逆转。NewLimit 融资 $40 million，相对 Altos Labs
              明显资本不足，限制了其开展大规模湿实验的能力；不过计算聚焦可能带来更快的早期洞见。关键竞争者的 IP、论文和合作数据见 Table TP003。Figure FP003 展示该领域悬殊的融资差距。
