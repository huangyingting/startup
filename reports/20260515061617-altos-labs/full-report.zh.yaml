      - number: '7.3'
        title: 监管与时间线风险：没有获批适应症，FDA 路径也未定义
        blocks:
          - type: paragraph
            body: >
              Altos Labs 任何治疗项目的监管路径不只是存在不确定性——而是完全没有定义。FDA
              从未批准过以「衰老」为主要适应症的药物，目前也不承认衰老本身是可获批的疾病终点。这不只是措辞问题，而是更深层的科学和监管缺口。要寻求 FDA 批准，Altos Labs
              必须先找出一个具体、可测量的疾病适应症，并证明部分重编程能产生可验证的临床获益。候选适应症包括年龄相关性黄斑变性、Hutchinson-Gilford
              早衰综合征、肌少症或其他定义明确的年龄相关疾病——但每一个选择都会大幅收窄公司的原始愿景：在全身层面逆转衰老。


              表 TR002 分析了 Altos Labs 任何治疗项目都会面对的五个关键监管维度。TAME（Targeting Aging with Metformin）试验是首次尝试用小分子建立 FDA
              认可的抗衰老终点；它使用全因死亡率和复合多病共存终点，而不是「返老还童」本身。即便 TAME 成功，它创造的先例也未必能迁移到使用 OSKM 重编程因子的基因治疗项目。基因治疗有自己的监管演进史：1999 年
              Jesse Gelsinger 因针对 OTC 缺陷的腺病毒基因治疗死亡后，FDA 曾大范围叫停临床试验；此后该领域虽已成熟，并批准了 Luxturna（视网膜营养不良）和
              Zolgensma（脊髓性肌萎缩），但新型基因治疗项目的监管门槛仍然极高。部分重编程项目需要全新的 IND 支持性毒理包、没有先例的安全监测方案，并且很可能要与 FDA 进行多年 pre-IND 沟通。


              Altos Labs 很可能希望把表观遗传时钟生物标志物用作临床终点或替代终点，但 FDA 尚未认定这些时钟是有效替代终点。生物标志物资格认定本身是漫长的独立流程，通常需要 5–10 年；资格完成前，Altos
              Labs 不能把这些时钟当作监管终点。图 FR002 展示了从 May 2026 起，解决各项重大监管风险所需的估计时间（年）。没有任何监管路径里程碑会在 8 年内到来；即便按最乐观假设，首次临床批准也预计要
              20+ 年。
