      - number: '2.3'
        title: 市场需求驱动因素与增长催化剂
        blocks:
          - type: paragraph
            body: >
              长寿和抗衰老市场由五类主要需求驱动，它们作用在不同时间尺度上。第一，人口结构的必然性：根据 World Health Organization，全球 65 岁及以上人口预计到 2050 年将超过 1.5
              billion；每天还有超过 10,000 名美国人满 65 岁。这创造了结构性、持续增长的需求，指向处理年龄相关衰退的产品和治疗。第二，2021–2022 年由亿万富豪推动的投资浪潮：Altos Labs（$3
              billion）、Retro Biosciences（Sam Altman 投入 $180 million）、NewLimit（Brian Armstrong 投入 $40 million）以及 Unity
              Biotechnology 历史上募集的 $700+ million，代表私人资本对长寿科学作出了史无前例的承诺。US National Institutes of Health 在 2023 年前后每年投入超过
              $3.8 billion 用于衰老研究，提供公共部门支持。


              第三，健康寿命优先于寿命的范式变化：科学家和创业者越来越多地关注延长健康、无病生活的时期，而不是最大寿命。这让长寿与主流预防医学对齐，也让医保支付方更容易理解这一市场。第四，表观基因组学进展：Hallmarks
              of Aging 框架的提出——整理出 9 到 14 种衰老分子机制——为长寿研究提供了科学分类法，使研究更可操作，吸引学术人才，也让投资逻辑更清晰。第五，AI
              和基因组学让研究加速：用于单细胞分析、蛋白结构预测和多组学整合的机器学习工具，正在压缩过去需要十年台架实验才能完成的发现周期。
