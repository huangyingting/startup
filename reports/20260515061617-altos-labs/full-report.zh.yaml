        - 端粒酶抑制 / 激活（imetelstat）
        - 20+ 年里临床反复受挫；早期期待很高
        - 项目延宕数十年；在狭窄血液学适应症中的商业成功有限
        - 衰老生物学机制转化很慢；应预期 20+ 年开发周期
      - - Human Longevity Inc.
        - 基于基因组学的衰老分析和诊断
        - 收入模式失败；过度押注直接面向消费者的健康基因组学
        - 多次出售资产；CEO Craig Venter 离任；大幅重组
        - 高烧钱、无收入的长寿公司需要清晰的近期收入路径
      - - Juvenescence
        - 多个衰老生物学项目（rapamycin、清除衰老细胞、重编程）
