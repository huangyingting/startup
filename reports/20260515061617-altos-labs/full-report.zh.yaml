      - number: '2.5'
        title: 地理市场动态与监管背景
        blocks:
          - type: paragraph
            body: >
              North America 主导全球抗衰老市场，估计占全球支出的 40–45 percent，推动因素包括消费者健康支出高、临床研究监管环境较有利，以及长寿生物技术投资集中。United States 承载了
              Altos Labs 三方面关键资源：科学领导层、最大份额的资金基础，以及位于 San Francisco Bay Area 的主研究所。具体到长寿疗法，US 监管挑战很大：FDA
              不承认「衰老」是一种疾病适应症，也就是说长寿疗法必须证明对特定年龄相关疾病（如 Alzheimer's、肌少症、黄斑变性）有效，而不是证明可以对抗衰老本身。


              Europe 以 Germany、France 和 United Kingdom 为最大子市场，在功能性化妆品和制药型抗衰老治疗方面较强，但在长寿生物技术投资上落后于 North America。European
              Medicines Agency 的监管框架采用传统药品审批标准，尚未容纳新型长寿终点。


              Japan 因对再生医学的监管开放度尤其值得关注。Act on the Safety of Regenerative
              Medicine（2014）及后续修订，为再生和细胞疗法提供了有条件批准路径；如果细胞年轻化产品达到临床准备状态，Japan 可能成为重要的首发市场。Altos Labs 在 Japan
              设有研究所，很可能也在关注这一监管入口。Asia-Pacific 整体是增长最快的区域市场，推动因素包括 Japan 的监管框架、South Korea 的化妆品产业、China 快速老龄化人口，以及 India
              不断扩大的中产阶级。
