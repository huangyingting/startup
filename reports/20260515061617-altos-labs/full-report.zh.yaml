  - id: TV006
    title: 最终尽调要求表
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        This table covers the complete set of material evidence items that cannot be resolved from public sources and
        that a prospective investor in Altos Labs would need to obtain from management under NDA before committing
        capital. Coverage is exhaustive at the level of material diligence gaps; minor non-material items are excluded.
        Each ask corresponds to a specific chapter evidence gap: financials (Chapter 4), scientific progress (Chapter
        5), risk mitigation (Chapter 7), or valuation (this chapter). These six items represent the minimum diligence
        package required to underwrite the investment thesis with reasonable confidence.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 经审计财务报表与现金状况
        - Altos Labs 未发布经审计财务报表、资产负债表或现金流量表；截至 2026 年 5 月，剩余资本仅能分析估计为 $1.1–1.7B
        - 现金跑道是最重要的近期投资风险；没有实际财务数据，我们估算中的 5 年不确定区间完全无法消解
        - 在 NDA 下向管理层索取 FY2022–2025 经审计财务报表和当前现金状况确认
      - - 临床前科学进展（内部数据）
        - 截至 2026 年初，Altos Labs 自身没有同行评议论文；内部科学进展未知
        - $3B 估值完全押在团队履历上；任何已发表或可在资料室查看的平台功能验证，都会实质降低风险
        - 索取截至 2026 年 Q1 的内部科学进展报告，或资料室中的临床前数据包访问权限
      - - 再融资投资者承诺
        - 未披露 Bezos、Milner、ARCH 或其他投资者对未来轮次的附函或续投承诺
        - 按烧钱速度，2028–2032 年几乎必然要再融资；成功概率取决于锚定投资者是否有非正式或正式承诺
        - 索取现有投资财团的任何附函、董事会批准的资本承诺函或口头承诺
      - - IP 组合状态与可防御性
        - 没有公开确认的授权专利；IP 申请已提交，但尚未针对现有技术或竞争对手权利主张完成验证
        - 平台 IP 是基准情景下许可路径的基石；没有可防御的 IP 资产，许可路径走不通
        - 索取完整 IP 组合摘要，包括已提交申请、授权专利、自由实施分析，以及任何未决 IPR 程序
      - - cMyc 安全性数据（如有）
        - Altos Labs 没有公开 cMyc 或 OSK 在衰老人类细胞中的安全性数据；公开领域所有重编程安全性数据都来自年轻细胞或啮齿动物模型
        - 这是最重大的单一科学风险；任何关于衰老人类细胞安全性或 NHP 安全性的内部数据，都会从根本上改变风险评估
        - 索取衰老人类原代细胞中的内部 cMyc 和 OSK 安全性数据；如有，索取 NHP 体内安全性研究
      - - 适应症策略与开发路线图
        - 未公开披露疾病适应症、临床开发计划或监管策略；公司没有说明会先做哪种疾病
        - 没有明确适应症，通往 1 期 IND、监管批准和商业收入的路径都未定义；估值也无法由模型支撑
        - 向管理层索取内部开发路线图、适应症选择依据、pre-IND 会议结果（如有），以及五年科学计划
    notes: 这六项尽调要求，是按正常投资标准承销 Altos Labs 所需的最低证据包。截至 2026 年 5 月，六项均未公开。公共来源研究再多，也无法替代管理层对这些事项的直接披露。任何不愿索取并审阅这套证据包的投资者，都不应投资。
