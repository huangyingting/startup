      - number: '8.3'
        title: 情景分析：Altos Labs 价值的乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              传统估值方法不适用，因此评估 Altos Labs 预期价值，最严谨的办法是做概率加权情景分析，明确建模不同科学和商业结果的概率及价值影响。这里考虑五种情景，从彻底失败到范式转移式成功。


              悲观情景（35% 概率）假设核心科学逻辑失败：部分重编程要么无法证明可安全用于老年人类细胞，要么无法产生临床有意义的疗效。剩余价值 $100–300 million 来自 IP 资产出售和数据授权。考虑到 $3
              billion 的进入价格，投资人的资本损失将接近全损。


              基准情景（35% 概率）假设部分重编程的安全性和有效性在临床前模型中得到确立，但 Altos 走授权路径，而不是自建临床项目。Altos 成为面向大型药企的平台授权方，产生版税流和里程碑付款。这一路径到 2030
              年带来约 $1–3 billion 估值——与初始融资价格大致一致，但考虑资金时间价值，基本等于零回报。


              乐观情景（20% 概率）假设 Altos 同时达成多项药企合作，并至少有一个自有 Phase 1 临床项目在定义明确的适应症中证明安全性。到 2035 年，Altos 的估值可达 $10–30
              billion。这是概率最高的上行情景，也最吸引风险调整后的投资人。


              超级乐观情景（5% 概率）假设 Altos 取得范式转移式结果：在多种年龄相关疾病中证明广泛部分重编程疗效，并具备可接受的安全性，进而推动史上首个抗衰老疗法获 FDA 批准。在这一情景下，Altos
              会成为史上最有价值的制药公司之一，潜在估值达 $50–100 billion。


              M&A 退出情景（5% 概率）假设大型制药公司以 $5–10 billion 收购其平台和团队。


              表 TV003 给出完整情景分析。图 FV001 显示各情景下的隐含估值。预期价值——对所有情景按概率加权——约为 $5.5 billion，说明按预期价值框架，约 $3 billion
              的初始融资价格大致合理；但实际结果会高度双峰化：最可能接近归零，或非常高。
