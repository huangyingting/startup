      - number: '8.4'
        title: 认为 $3B 估值过高的论点
        blocks:
          - type: paragraph
            body: >
              一个可信且有分量的观点是，截至 2026 年初可观察到的科学进展，并不支持 Altos Labs 约 $3 billion 的隐含估值；估值中的溢价反映了热潮、成熟投资人的
              FOMO，以及对重编程近期成功概率的高估。


              最根本的批评是，截至 2026 年初，Altos Labs 成立四年多后，仍没有发表任何自身科学数据。$3 billion
              估值完全建立在科学团队履历和科学命题承诺上，而不是公司自身任何经过实证验证的产出。即便按基础科学研究公司的标准，这也不寻常；大多数估值相近的可比公司至少已经产出过一些同行评议成果，证明平台功能。覆盖长寿领域的生物科技分析师把这种缺席视为重大担忧，有人称隐含估值「投机」，也有人把整个长寿板块描述为潜在投机泡沫。


              从反向视角看，Calico 先例是最有杀伤力的可比。Calico 成立于 2013 年，背靠 Alphabet——实际上拥有近乎无限资本——但运营超过 12 年仍没有商业获批治疗。如果 Alphabet 在
              12+ 年内都无法靠买或建找到抗衰老方案，那么只运营四年的 Altos Labs 要承担的举证责任极高。$3 billion 估值里的隐含假设，是 Altos 会在 Calico
              这种同等支持者尚未成功的地方成功。


              Moderna 对比尤其有启发。当 Moderna 处在类似早期阶段——运营六年、没有获批产品、靠投资人资本运转——它在 2016 年 Series C 的估值约为 $1.5 billion。Altos Labs
              创立时估值是这一数字的两倍，科学不确定性却显著更高。


              cMyc 致癌性问题构成一个结构性估值天花板，但乐观分析很少承认。如果 cMyc 不能安全纳入重编程方案——科学文献也无法排除这一点——那么 OSK
              替代方案可能无法产生具有临床意义的足够重编程效率。这会实质上推翻整个平台逻辑。


              最后，缺乏清晰适应症策略——Altos 治疗哪种疾病、哪类患者、用什么临床终点？——意味着没有定义好的监管批准路径。没有明确适应症，就无法测算可服务市场、估计临床试验成本，或具体建模商业结果。投资逻辑 /
              反向逻辑表（表 TV005）汇总了支持和反对 $3B 估值的乐观与悲观论点。
            claimRefs:
              - CV004
              - CV005
              - CV006
