  - id: TE004
    title: 信任、安全、质量和监管合规评估
    type: ENUMERATION
    enumerationScope:
      coverage: partial
      basis: >-
        Based on publicly available regulatory guidance for gene therapy and cell therapy, published safety literature,
        and Altos Labs public communications as of May 2026.
    columns:
      - 控制 / 风险领域
      - 当前状态
      - 关键担忧
      - 监管框架
      - 缺口 / 尽调要求
    rows:
      - - cMyc 致癌性安全
        - 仅处于研究阶段风险评估；无临床安全数据
        - 在衰老人类细胞中表达原癌基因，可能触发转化
        - FDA 基因疗法安全指南；IND 毒理学要求
        - 要求提供暴露后 12+ 个月动物肿瘤监测数据
      - - 体内递送安全
        - 临床前 AAV/LNP 研究；无公开 NHP 安全数据
        - 对病毒衣壳产生免疫反应；靶外组织表达
        - FDA/EMA 基因疗法 CMC 和非临床指南
        - 要求提供任何 NHP 研究中的生物分布和免疫原性数据
      - - 基因组整合风险
        - 整合型慢病毒载体已排除于临床用途之外；AAV 半随机
        - AAV 低频整合带来插入突变风险
        - FDA 基因疗法安全指南；ICH S12
        - 在临床前模型组织中刻画 AAV 整合位点
      - - 监管终点未定义
        - 衰老逆转或健康寿命作为主要终点，没有监管先例
        - FDA/EMA 尚未接受生物年龄作为可支持批准的临床终点
        - FDA CDER；潜在 Right-to-Try 或突破性疗法路径
        - 明确内部策略：走特定疾病终点还是衰老终点
      - - 质量 / GMP 制造
        - 处于 GMP 前研究阶段；尚未建立临床生产能力
        - 该用途下，AAV 或 LNP 能否放大到临床剂量尚未证实
        - FDA 21 CFR 1271；ICH Q10 质量体系
        - 要求提供制造放大路线图和 GMP 设施计划
      - - 数据隐私 / 研究伦理
        - 预计受机构 IRB 监督；政策未公开披露
        - 使用人体组织样本和遗传数据需要取得适当同意
        - HIPAA；45 CFR Part 46（Common Rule）；GDPR（英国研究所）
        - 确认人类细胞研究的 IRB 批准和捐赠者同意框架
    notes: 所有状态评估仅基于公开信息。Altos Labs 尚未发布质量管理体系说明、安全监测框架或合规认证清单。部分重编程的监管路径尚未公开与 FDA 讨论。所有缺口都是基于该项目临床前阶段得出的分析性推断。
