      - number: '4.2'
        title: 烧钱速度估算与成本结构
        blocks:
          - type: paragraph
            body: >
              Altos Labs 未披露财务报表、年度烧钱速度或现金头寸。本章所有烧钱速度数字，都是基于员工数代理指标、研究机构可比样本，以及研究密集型科学组织的公开基准推导出的分析估算。


              主要成本驱动项是人力。公司有 300 多名全职研究人员和支持员工；据报道，资深科学家的薪酬包中，首席研究员每年超过 $1 million。由此估计，工资和福利总负担每年为 $120–180
              million。公司运营三个实体研究所，分别位于 San Francisco Bay Area、Cambridge（UK）和
              Kobe（Japan）；每个地点都需要场地租赁、专用实验室设备、耗材和行政开销。这种规模的多地点运营，通常还会增加 $50–100 million
              的场地和非人力成本。先进分子生物学和基因组学平台（ATAC-seq、全基因组甲基化测序、细胞成像、CRISPR 筛选）的设备支出，很容易再带来每年 $30–60 million 的资本设备折旧和耗材开销。


              汇总这些部分，Altos Labs 年度现金消耗的中枢估计为 $300–450 million，基准情景约为每年 $350 million。作为对照，Howard Hughes Medical
              Institute（HHMI）是一家规模大得多、资产约 $30 billion 的科学捐赠机构，每年在研究项目上支出约 $500 million。Broad Institute 的年度运营预算约为 $800
              million，但支撑约 3,000 名科学家的研究群体，约为 Altos Labs 员工数的十倍；这意味着 Altos 因薪酬溢价，单名科学家的成本显著更高。表 TI002 将 Altos Labs
              与可比机构做了基准比较。图 FI002 展示了长寿生物科技同业之间的资金差距。
