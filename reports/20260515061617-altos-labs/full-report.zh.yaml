      - number: '1.4'
        title: 运营、规模与研究模式
        blocks:
          - type: paragraph
            body: >
              Altos Labs 运营三家研究所：主研究所位于 San Francisco Bay Area（California Redwood City），也是全球总部；第二家设在 United Kingdom 的
              Cambridge，与 Wellcome Genome Campus 附近更广泛的 UK 生命科学生态相邻；第三家设在 Japan，既体现 Shinya Yamanaka 的影响力（他在 Kyoto
              University 的实验室开创了 iPSC 科学），也反映 Japan 对长寿研究的战略兴趣。三家研究所共享统一科学愿景，但保留独立研究项目。


              根据公开报道，截至目前，公司雇用约 300 名或更多研究科学家和支持人员。Altos Labs
              有意采用学院式研究所模式，而不是传统生物技术药物开发管线结构：首席研究员围绕重编程生物学、表观遗传衰老和细胞衰老等基础科学问题，领导独立实验室。公司为研究人员提供有竞争力的薪酬，据报道每年超过 $1
              million，显著高于学术界和典型早期生物技术公司，目的在于吸引原本可能留在大学体系内的终身教职轨道科学家。


              截至 2026 年 5 月，公司没有临床项目、没有 IND 申报，也没有宣布制药合作伙伴关系。Altos 完全处在临床前发现阶段。根据人员规模和设施开销推算，估计年度烧钱速度为每年 $300 million 到
              $450 million，意味着 $3 billion 融资按当前支出水平可提供约 7 到 10 年现金跑道；不过实际数字并未公开披露。
