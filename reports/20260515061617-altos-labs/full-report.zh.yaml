      - number: '7.4'
        title: 运营与财务风险：资本耗尽、人才流失与关键人物依赖
        blocks:
          - type: paragraph
            body: >
              即便底层科学最终得到验证，Altos Labs 面对的运营和财务风险也很大。2022 年 1 月筹集的 $3 billion，按公司推断的每年 $250–400 million 烧钱速度，估计可支撑 7–12
              年；资金将用于 300+ 名科学家和员工的薪酬、三处全球研究设施（San Francisco Bay Area、Cambridge UK 和 Cambridge
              MA）、研究设备与试剂成本，以及行政开销。传统药企有管线产品，可以产生里程碑付款或授权收入；Altos Labs
              没有收入，也没有披露通往收入的路径——公司完全依赖投资人的善意，以及多轮融资中对平台的持续信念。如果科学在前 7–10
              年拿不出有说服力的临床前概念验证，公司在一个可能完全不同的宏观环境（利率上升、生物科技风险偏好下降、资本需求竞争加剧）中再融资，可能很难拿到有利条款，甚至根本融不到。


              人才风险是双向的。要把世界级科学家从大学吸引到商业实体，公司必须给出包含股权在内的高额薪酬包，这会给现有投资者带来稀释压力。但长期留住这些科学家同样不确定：学术激励（终身教职、发表自由、经费独立、培养研究生的能力）很强，可能把关键研究人员重新拉回大学，尤其当
              Altos 早期结果令人失望，或发表限制造成摩擦时。多名关键研究人员同时隶属于 Altos Labs 和原机构，这可能加快离职。


              关键人物风险集中在少数个人身上；任何一人离开，都会对信誉和项目推进造成实质损害。Shinya Yamanaka（创始诺奖得主和科学催化者）、Jennifer Doudna（CRISPR 诺奖得主、SAB
              成员）、Steve Horvath（表观遗传时钟开发者，其工具是平台的主要读数）以及 Hal
              Barron（CEO，其药企转化信誉支撑投资人信心）都各自至关重要。上述任何一人离开，都可能触发负面媒体报道、投资人担忧，并带来潜在的人才连锁流失。图 FR003
              按主要成本类别模拟资本耗尽情景，显示即便在降低烧钱速度的情景下，公司也很可能在建立临床前概念验证之前消耗掉大部分初始资本。表 TR004
              汇总了关键运营与安全风险——包括来自竞争性长寿项目的暴露——并给出发生可能性和缓释评估。
