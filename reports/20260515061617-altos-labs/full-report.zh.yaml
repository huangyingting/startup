            title: 科学顾问密度无人匹敌
            body: >-
              截至 2026 年 5 月，没有另一家私营生物技术公司能把三位诺贝尔奖得主作为活跃科学顾问（Yamanaka 2012、Doudna 2020、Baltimore 1975），并同时纳入表观遗传时钟发现者
              Horvath。这种阵容深度既是科学质量门槛，也是人才信号，能吸引原本可能留在学术界的研究人员。
            calloutType: strength
            claimRefs:
              - CO011
              - CO012
              - CO013
              - CO025
