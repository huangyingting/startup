      - number: '6.4'
        title: 客户开发风险：结构性与执行性障碍
        blocks:
          - type: paragraph
            body: >
              Altos Labs
              面临几类与长寿生物学商业化直接相关的结构性和执行性风险。第一类是定义风险：长寿生物科技公司天然难以界定付费客户，因为疾病预防无法清晰映射到现有药品报销框架——支付方报销的是已诊断疾病的治疗，而不是生物衰老过程（CU026）。这种结构性错配意味着，即便
              Altos Labs 取得稳健科学结果，通往可报销适应症的商业路径也完全没有定义。


              第二类风险是临床前状态：潜在药企客户和合作者在签署商业协议前，无法评估人体疗效证据，因为这种证据并不存在——Altos Labs 最先进的项目仍处于体外或早期动物模型阶段（CU027）。来自
              Calico、NewLimit、Retro Biosciences 以及 HHMI 机构学术项目的 IP 竞争，会削弱 Altos Labs 在未来任何授权谈判中的筹码（CU028）。


              如果收入没有落地，资本跑道风险会加剧：若到约 2030 年仍没有商业合作或资助收入，公司几乎肯定需要额外融资，引入稀释和投资人压力风险（CU029）。在没有任何具名客户证明的情况下，Altos Labs
              的商业可信度完全建立在科学声誉和高知名度支持者背书之上；一旦出现科学挫折或负面论文，这一基础会很脆弱（CU030）。
            claimRefs:
              - CU026
              - CU027
              - CU028
              - CU029
              - CU030
      - number: '6.5'
        title: 可比时间线：平台型生物科技收入史给出的线索
        blocks:
          - type: paragraph
            body: >
              历史类比，是估计 Altos Labs 何时可能产生首次商业收入时最有证据基础的方法。Genentech 被广泛视为平台型生物科技商业化的奠基样本；它成立于 1976 年，并在 1985
              年通过重组人生长激素（Protropin）产生第一笔有意义商业收入，距成立约 9 年（CU031）。Amgen 成立于 1980 年，1989 年通过
              Epogen（erythropoietin）获得第一笔主要产品收入，同样距成立约 9 年（CU032）。BioNTech 2008 年作为 mRNA 平台公司成立，直到 2021 年 COVID-19
              疫苗才产生大规模商业收入，距成立约 13 年（CU033）。


              套用这些可比样本，拥有新型生物学平台技术、尚无收入的生物科技公司，通常需要 8–15 年从成立走到首次商业收入（CU034）。对 2022 年 1 月成立的 Altos Labs
              来说，这一区间意味着首次收入窗口约在 2030–2037 年（CU035）。公司在 Nature、Science 和 Cell
              的科学发表记录，支撑了其平台可信度，并可能让合作时间线相较前辈公司的早期平均水平有所提前（CU036）。


              表 TU003 对尚无收入生物科技公司的可比时间线做了结构化比较。图 FU002 绘制了各可比公司的成立至收入年数指标，图 FU004 展示了分阶段商业开发管线。
