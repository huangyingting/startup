        - AbbVie 合作管线；~$1.5B 承诺资金；Alphabet 企业资源；2013 年以来持续运营
        - 基础科学发现并行推进：如果 Calico 先取得重编程突破，AbbVie 合作关系能让它迅速商业转化；Calico 在长寿生物学上领先 12 年
        - 中 — Calico 尚未发表有说服力的重编程结果；主要科学路线不同（模式生物与人类细胞重编程）
        - Altos Labs 的诺奖顾问和更深的人类细胞研究焦点，可能更快产出可转化结果；发表节奏不同，也限制 Calico 在具体 OSKM 发现上主张优先权
      - - Retro Biosciences
        - 多模态布局；精简 $180M 预算，迭代更快；有重叠的重编程路线
        - 科学收敛：如果 Retro 的部分重编程路线公开取得进展，可能削弱 Altos Labs 的科学新颖性主张，并让一支更小、行动更快的团队抢到发现优势
        - 低-中 — $180M 与 $3B 的资本差距决定性；Retro 不太可能匹配 Altos Labs 的研究深度
        - 资本优势；更大的研究团队；一个组织内覆盖更多科学学科
      - - NewLimit
        - ML 原生表观基因组谱分析；假设生成具备计算速度优势
        - 计算洞察：NewLimit 可能先发表表观基因组重编程发现，在 Altos Labs 发表类似结果前改写科学共识
        - 低 — $40M 与 $3B 的资本差距；计算结果需要湿实验验证，而 NewLimit 无法规模化开展
        - Altos Labs 拥有湿实验基础设施，可快速验证计算假设；也能用更高薪酬吸引 NewLimit 水平的 ML 人才
      - - Unity Biotechnology
        - 临床阶段经验；已建立的衰老细胞清除监管路径；已发表 Phase 2 数据
        - 监管先例：Unity 在衰老相关适应症中的临床经验（正负面都有）形成数据基础设施，未来 Altos Labs 临床项目必须处理；Unity 的 senolytic IP 可能阻挡相邻路线
        - 低 — 技术路线不同（衰老细胞清除与重编程）；Unity 的低市值（~$30–80M）显示投资者信心有限；重编程路线没有直接专利冲突
        - Altos Labs 的重编程路线不与 senolytic IP 竞争；Unity 的 Phase 2 数据有参考价值，但不构成阻断
      - - AgeX Therapeutics
        - 公开市场融资渠道；早期临床阶段多能干细胞工作；端粒 IP
        - 相邻科学可信度：基于干细胞的返老还童可能独立验证细胞重编程作为治疗方式的可行性，在 Altos Labs 准备好之前吸引药企关注该领域
        - 极低 — AgeX 市值（~$10–20M）和资金有限，不构成威胁；核心技术不同
        - Altos Labs 的科学差异化和资本位置占优；AgeX 成功会提升整个领域的可信度
      - - 药企新进入者
        - 药企 R&D 预算庞大；既有监管关系；临床执行基础设施
        - >-
          商品化风险：如果 Altos Labs 或同业发表有说服力的重编程数据，大型药企（例如 Pfizer、Novartis、AstraZeneca、Genentech/Roche）可能迅速扩大内部项目，或收购更小竞争者，把
          Altos Labs 挤出科学领导位置
        - 高（长期）— 大药企每家公司年度 R&D 预算超过 $10B；如果重编程显示疗效，它们可能以更大规模压过 Altos Labs；该风险要到 10–15 年后才会显现
        - Altos Labs 可能争取成为收购目标（为投资者创造退出路径），或在大药企全面进入前对外授权平台 IP；诺奖品牌背书和先发科学深度很难快速复制
    notes: >-
      威胁严重度评级为作者评估，依据资本对比、科学重叠度和时间窗口分析。“药企新进入者”是一个复合行，代表类别风险，而非单一具名实体。评级假设 Altos Labs 仍处于当前临床前阶段；如果公司推进到 IND
      申报，风险画像会发生实质变化。
