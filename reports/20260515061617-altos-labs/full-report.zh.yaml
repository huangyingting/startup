      - number: '5.5'
        title: 研究管线：从发现到临床应用
        blocks:
          - type: paragraph
            body: >
              Altos Labs 的管线不同于任何传统生物科技开发项目。公司没有临床阶段资产，没有 IND
              申报，也没有获批产品。现阶段所谓「管线」，更准确地说是一张分阶段研究路线图；重大阶段转换由生物学里程碑驱动，而不是由临床里程碑驱动（表 TE003）。


              公司目前处于发现阶段。该阶段始于 2021 年公司创立，预计持续到约 2027
              年。这个阶段的主要产出是同行评议论文、知识产权（递送方法、重编程方案和表观遗传测量工具相关专利），以及在多种细胞类型中对安全且有效的体外部分重编程条件进行表征。发现阶段的目标，是建立科学基础：确认部分重编程可以在人类细胞中可重复地推动表观遗传时钟回拨，同时不触发去分化或基因组不稳定；并界定优化年轻化收益与风险比例的定量参数（暴露时长、因子组合、周期间隔）。


              临床前开发阶段预计约在 2027–2030 年，把最被验证的体外方案转入体内模型——先是小鼠，之后可能是非人灵长类。该阶段的关键里程碑包括：使用临床级载体或配方，证明安全的全身或靶向 OSKM
              递送；在老年动物中看到组织层面的表观遗传时钟逆转证据；在疾病相关读数中看到功能改善（例如肌肉力量、心脏功能、视网膜敏锐度）；完成支持 IND 的研究，包括毒理学、生物分布和制造资质确认。成功标准包括：在 12
              个月观察窗口内不形成肿瘤，并在多个哺乳动物物种中取得可重复疗效。


              首次人类安全性评估的 IND 申报 / Phase 0 研究，预计约在 2030–2032 年；但鉴于递送挑战未解且需要监管对齐，这一时间线高度不确定。随后会进入 Phase 1
              人体安全性研究，可能选择特定疾病适应症而非健康衰老，主要终点是安全性和耐受性，加上生物标志物反应（表观遗传时钟变化）。Phase 2/3 疗效研究预计落在 2035–2042+
              窗口，是开发路径最后、也是最不确定的阶段。


              从创立到 Phase 1 的估计时间为 11–14 年（2032–2035），到完成 Phase 2/3 为 14–21 年（2035–2042+）。这些时间线见图
              FE003。作为背景，即便最快的基因治疗开发项目，从 IND 到获批也花了 7–10 年；Altos Labs 还没有提交 IND。公司创始人自己向投资人和公众传达的研究周期是 15–20
              年。它不是一家即将商业化发布的科技公司，而是一家仍处在最早阶段的科学机构，正在证明其核心假设究竟能否转化为治疗手段。
