      - number: '5.2'
        title: 核心技术：OSKM 部分重编程机制
        blocks:
          - type: paragraph
            body: >
              部分重编程的底层分子机制，始于四个 Yamanaka 转录因子。Oct4（也称 POU5F1 或
              OCT3/4）是多能性的主调控因子——一种含同源结构域的转录因子，控制染色质重塑并激活多能性基因网络。Sox2（sex-determining region Y-box 2）通过在名为 Sox-Oct motif
              的复合调控元件上共同结合，与 Oct4 协同作用；两个因子一起激活与胚胎干细胞身份相关的广泛转录程序。Klf4（Krüppel-like factor
              4）是一种锌指转录因子，促进多能性基因表达，同时抑制体细胞基因表达程序。cMyc（MYC
              原癌基因的蛋白产物）是一种多效性转录因子，会激活数千个参与细胞周期推进、核糖体生物发生和代谢重编程的靶基因；它能大幅加快重编程动力学，但也引入整个系统最主要的致癌安全负担。


              在完全 OSKM 重编程中，四个因子连续表达 10–20 天，会彻底擦除体细胞基因表达和表观遗传标记，并以多能状态取而代之。由此产生的 iPSC
              理论上可以分化成体内任何细胞类型。但完全重编程同时会擦除细胞身份，让细胞无法执行自身组织功能；更关键的是，如果植入体内的细胞未能正确分化，就存在形成畸胎瘤的风险。


              部分（周期性）重编程通过控制暴露时间来处理这些负担。在 Salk Institute 开创、如今成为 Altos Labs 研究核心的范式中，OSKM 因子以短周期表达（通常 2–5
              天），周期之间设置恢复期。在表达窗口内，与衰老相关的表观遗传标记——尤其是抑制性组蛋白修饰和异常 DNA
              甲基化模式——开始向更年轻的特征重置。关键在于，定义细胞身份的转录程序似乎比表观遗传衰老标记更抗擦除，因此细胞可以在每一轮重编程后保留其组织特异性基因表达，同时在时钟测量下显示生物年龄下降。图 FE001
              概括了这一过程及其分叉风险。


              实验场景下递送 OSKM 目前使用多种系统。在细胞培养（in vitro）中，多西环素诱导型慢病毒构建体允许精确开关因子表达。在体内啮齿动物研究中，携带多西环素诱导型 OSKM
              表达盒的腺相关病毒（AAV）载体是主流路径；动物接受全身或组织靶向 AAV 注射，并按周期性安排给予多西环素。携带编码 Yamanaka 因子的 mRNA
              的脂质纳米颗粒（LNP），是正在探索的新替代方案，可在不发生基因组整合的情况下实现短暂递送。在安全港基因组位点用 CRISPR knock-in 可诱导 OSKM 构建体，则是更长期的研究方向。


              一个以安全为导向的关键改造，是在部分实验方案中使用 OSK（三个因子，省略 cMyc）。由于 cMyc 是主要致癌负担，仅 OSK
              方案以牺牲重编程效率为代价降低癌症风险——细胞重编程更慢，也需要更长的因子暴露时间。包括部分 Altos Labs 项目在内的多家机构研究，正在评估 OSK 与 OSKM
              之间的取舍，以界定在不带来不可接受癌症风险的前提下，实现有意义表观遗传年轻化所需的最小因子组合。
