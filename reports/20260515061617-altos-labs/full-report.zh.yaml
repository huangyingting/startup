      - number: '4.3'
        title: 现金跑道情景与资本充足性
        blocks:
          - type: paragraph
            body: >
              将上述烧钱速度估算套用到 2022 年 1 月募集的 $3 billion，并考虑截至 2026 年 5 月报告日已过去约 4.3 年，我们得到三种现金跑道情景，分别锚定保守、基准和激进烧钱假设。


              在保守情景下（年度烧钱：$250 million），截至 2026 年 5 月累计支出约 $1.1 billion，原始 $3 billion 中约 $1.9 billion
              仍在账上。按这一烧钱速度，剩余资本还能支撑约 7.5 年运营，意味着 2033–2034 年之前无需再融资。在基准情景下（年度烧钱：$350 million），累计支出约 $1.5 billion，剩余约
              $1.5 billion。若继续按每年 $350 million 消耗，公司还剩约 4.3 年现金跑道，指向 2030–2031 年前后需要融资。在激进情景下（年度烧钱：$450 million），累计支出超过
              $1.9 billion，剩余资本低于 $1.1 billion，隐含现金跑道只有约 2.5 年，之后就需要再融资。


              结合员工规模、多研究所运营和设备成本，基准情景最可能发生。三种情景都假设没有新增收入、没有裁员、也没有资本市场交易。即便再融资 $1–2
              billion，也会显著延长现金跑道，但会引入新投资者，或要求现有投资者在缺乏临床阶段资产的情况下按难以确定的估值继续加码。完整情景矩阵见表 TI003；现金跑道区间的可视化见图 FI003。
