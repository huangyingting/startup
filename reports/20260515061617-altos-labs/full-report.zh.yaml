      - number: '7.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 老年人类细胞中的 cMyc 致癌性仍未解决，在现有方案下也可能无法解决
            body: >-
              Altos Labs 项目组合中最重要的未解风险，是 cMyc
              表达——即便短暂且周期性——对携带数十年累积体细胞突变的老年人类细胞是否安全。所有证明有效性的重编程研究都在年轻细胞、年轻小鼠或人工加速衰老的早衰模型中完成。没有任何研究在现实临床条件下使用老年人原代细胞。OSK
              替代方案降低了风险，却提出一个新问题：仅用 OSK 重编程，是否能在老年人类细胞中实现足够的表观遗传时钟逆转，从而具有临床意义。如果答案是否定的，那么按当前构想，整个 OSKM 平台要么需要
              cMyc（并承担未解决的癌症风险），要么在没有 cMyc 时无法达到临床有意义的效果。这不是一个靠结构设计就能缓释的风险；它需要多年人类细胞和非人灵长类（NHP）安全性研究来实证解决。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR012
              - CR016
              - CR021
              - CR034
              - CR040
          - type: callout
            title: 在概念验证之前耗尽资本，是最主要的生存性财务风险
            body: >-
              相比同业，Altos Labs 的资本位置很强，但面对所需时间线仍然有限。截至 May 2026，估计剩余 $1.0–1.5 billion，按每年 $250–400 million 消耗，意味着公司需要在
              3–6 年内再次融资——远早于任何临床数据可能出现的时间。公司必须在 2028–2032
              年仅凭临床前科学进展筹集追加资本，当时既没有收入，也没有获批产品。那一轮融资所处的宏观环境——利率、生物科技情绪、竞争性资本需求——尚不可知。如果届时可用的临床前数据没有在老年人类细胞或非人灵长类中给出有说服力的安全性和有效性信号，再融资会遇到显著阻力。再融资失败将迫使公司削减项目、流失人才，并可能以显著低于原始投资基础的价格战略性出售
              IP 资产。
            calloutType: risk
