      - number: '3.3'
        title: 临床阶段竞争者：Unity Biotechnology 与转化风险信号
        blocks:
          - type: paragraph
            body: >
              Unity Biotechnology（NASDAQ: UBX）是长寿领域唯一把项目推进到人体 Phase 2 临床试验的竞争者。公司成立于 2011 年，并在 2018 年 IPO
              上市；通过私募轮和公开市场合计募集约 $750 million。其科学逻辑是
              senolytics，即选择性清除随年龄累积、驱动炎症性组织功能障碍的衰老细胞的药物；这一机制得到临床前证据支持，也发表在同行评议文献中。


              Unity 历史上的定义性事件——也是整个长寿领域的警示信号——是其主导 senolytic 项目 UBX0101 在 2020 年针对中重度膝骨关节炎的 Phase 2 随机对照试验失败。尽管
              senolytic 机制有强临床前支持，UBX0101
              仍未达到主要终点（减轻疼痛）。外界普遍把这次失败解读为三点证据：（a）单靠清除衰老细胞并不能解决复杂的炎症性关节疾病，（b）衰老的临床前模型无法可靠预测人体临床结果，（c）从长寿生物学走向具体疾病终点的转化路径充满意外失败。


              Phase 2 受挫后，Unity 将管线转向眼科（UBX1325，靶向糖尿病黄斑水肿和年龄相关黄斑变性）和神经学，在这些领域 senolytic 机制可能有更强因果作用。截至 2026 年，Unity 市值已较
              IPO 高点大幅下跌，以约 $30–80 million 的小盘股区间交易——这鲜明说明，在尚未完成概念验证的领域里，一次临床失败就足以摧毁价值。Unity 先例是 Altos Labs
              的直接类比风险：即使科学假设基础扎实，也可能在临床转化中失败；Altos Labs 的细胞重编程路径，比 Unity 靶向 senolytic 机制的转化距离更远。
            claimRefs:
              - CP007
              - CP008
              - CP013
              - CP020
              - CP021
              - CP027
              - CP033
              - CP035
      - number: '3.4'
        title: 相邻竞争者：AgeX Therapeutics、Rejuvenate Bio 和 Oisin Biotechnologies
        blocks:
          - type: paragraph
            body: >
              AgeX Therapeutics 于 2017 年从 BioTime（现 Lineage Cell Therapeutics）剥离，并作为上市公司在 OTC 市场交易。AgeX
              的科学路径以多能干细胞技术诱导组织再生、端粒延长，以及通过一条完全不同于 Altos Labs 表观遗传重编程的生物路径实现细胞年轻化为中心。公司累计融资估计 $50–80 million，市值约 $10–20
              million，是一家研究能力受到严重资金约束的微盘公司。作为在 OTC 交易的上市公司，AgeX 提供了一个市场数据点——但其低估值反映出投资人既怀疑科学路径，也担心资本充足性。就资源或科学平台而言，AgeX
              对 Altos Labs 构不成实质竞争威胁；但它验证了多能干细胞路径可以作为细胞年轻化的独立路线。


              Rejuvenate Bio 由 Harvard 遗传学家 George Church 和 Noah Davidsohn
              共同创立，采用明显不同的模态：靶向衰老相关生物通路的多路复用基因疗法。公司已用遗传改造作用于年龄相关靶点开展动物研究（主要是狗），长期目标是转化到人类。Rejuvenate Bio 与 DARPA
              的早期资金合作，以及与 George Church 的 Harvard 实验室的关联，为公司带来可信度；但其私人资金基础有限，而且在健康人群中推进多路复用基因疗法的监管路径，比 Altos Labs
              未来可能采用的小分子或病毒递送重编程因子的治疗路径复杂得多。


              Oisin Biotechnologies 是一家位于 Seattle 的私营公司，由 Gary Hudson 共同创立，使用可编程脂质纳米颗粒基因疗法选择性清除衰老细胞和癌细胞。Oisin 与 SENS
              Research Foundation 有合作，聚焦精确 senolytic 路径，在组织选择性上可能具备优势。本次分析时，其 Wikipedia 页面不可用（Wikipedia
              上页面不存在），公开融资和管线数据也有限。Oisin 是技术上有创新但规模较小的竞争者；它对 Altos Labs
              的主要意义，是证明多种处理衰老细胞问题的路径正被并行探索。每个竞争者的护城河耐久度和竞争风险登记表见 Table TP004。
