      - CM009
      - CM017
      - CM025

callouts:
  - calloutType: insight
    title: Demographic Tailwinds Are Structural, Not Cyclical
    body: >-
      The global population aged 65 and older will exceed 1.5 billion by 2050 (WHO), and over 10,000
      Americans turn 65 each day. Unlike consumer technology markets that can reverse, the aging market
      has a structural demographic engine that no policy or product can reverse. This creates durable
      demand for longevity solutions regardless of whether any particular technology — including Altos
      Labs' reprogramming approach — ultimately succeeds. The market will exist; the uncertainty is
      which scientific approach will capture it.
    claimRefs:
      - CM003
      - CM004
      - CM016
  - calloutType: risk
    title: Nutraceuticals Distort the Anti-Aging Market Size Signal
    body: >-
      The majority of the $44–63 billion anti-aging market as of 2022 consists of nutraceuticals,
      dietary supplements, and cosmetics that are largely scientifically unvalidated. These products
      sell on marketing and cultural association with anti-aging rather than clinical proof. This
      creates a misleading market-size signal for investors evaluating longevity therapeutics companies:
      Altos Labs will not compete with NAD+ supplements or face cream. The addressable market for
      cellular rejuvenation therapeutics is far smaller — perhaps $2–5 billion today — and will only
      grow materially if the underlying biology is validated in clinical trials that remain years away.
    claimRefs:
      - CM001
      - CM012
      - CM014
      - CM035
      - CM036
  - calloutType: risk
    title: No US Regulatory Pathway for Anti-Aging as an Indication
    body: >-
      The FDA does not recognize "aging" as a disease or an indication for drug approval. This is not
      merely a procedural hurdle — it is a fundamental constraint on how longevity therapeutics companies
      (including eventual Altos Labs successors) must design clinical programs. Any therapeutic must be
      validated against a specific age-related condition (Alzheimer's disease, osteoporosis, sarcopenia,
      macular degeneration). Unity Biotechnology's Phase 2 failure in osteoarthritis illustrates how
      difficult this is even for single-disease indications within the aging context. The Targeting Aging
      with Metformin (TAME) trial is attempting to qualify aging as a biomarker endpoint, but this
      regulatory evolution is uncertain and multi-decade.
    claimRefs:
      - CM006
      - CM028
      - CM029
      - CM038

