  - id: competitive-landscape-overview
    title: "Competitive Landscape Overview"
    body: |
      The longevity therapeutics space features a handful of well-funded private companies at the
      basic-science or early-preclinical stage, alongside a public pioneer (Unity Biotechnology) whose
      clinical setbacks provide a cautionary data point. Calico, founded by Google/Alphabet in 2013
      and funded with approximately $1.5 billion, focuses on understanding the biology of aging through
      model organism research and select disease partnerships; its model closely resembles Altos Labs
      in that it prioritizes basic science over near-term clinical programs, though Calico has a
      longer operational history and several research publications. Retro Biosciences, backed by
      approximately $180 million from OpenAI's Sam Altman, pursues autophagy enhancement, plasma-protein
      interventions, and partial cellular reprogramming as parallel longevity strategies, positioning
      it as a closer scientific analog to Altos Labs. NewLimit, co-founded by Coinbase's Brian Armstrong
      with approximately $40 million raised, focuses specifically on epigenetic reprogramming to reverse
      biological aging, making it the most direct strategic competitor to Altos Labs despite its much
      smaller scale.

      Unity Biotechnology pursued a different scientific thesis — senolytics targeting senescent cells —
      and its Phase 2 failure of UBX0101 in musculoskeletal applications in 2020 serves as the field's
      most visible clinical setback. Unity has since pivoted to ophthalmology and neurology and remains
      the only public company in the core longevity therapeutics space, though its market capitalization
      of approximately $50–100 million as of 2026 reflects investor skepticism. AgeX Therapeutics
      pursues a pluripotent stem-cell approach for tissue rejuvenation and is at a more advanced clinical
      exploration stage than Altos Labs, though at a fraction of the capital scale.
