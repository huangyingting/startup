  - id: geographic-dynamics
    title: "Geographic Market Dynamics and Regulatory Context"
    body: |
      North America dominates the global anti-aging market, accounting for an estimated 40–45 percent
      of global spending, driven by a combination of high consumer health expenditure, a favorable
      regulatory environment for clinical research, and concentration of longevity biotech investment.
      The United States hosts all three of Altos Labs' scientific leadership, the largest share of its
      funding base, and its primary research institute in the San Francisco Bay Area. For longevity
      therapeutics specifically, the US regulatory challenge is significant: the FDA does not recognize
      "aging" as a disease indication, meaning that longevity therapeutics must demonstrate efficacy
      against specific age-related conditions (e.g., Alzheimer's, sarcopenia, macular degeneration)
      rather than against aging per se.

      Europe, with Germany, France, and the United Kingdom as the largest sub-markets, is strong in
      cosmeceuticals and pharmaceutical anti-aging treatments but lags North America in longevity
      biotech investment. The European Medicines Agency's regulatory framework applies conventional
      drug-approval standards that do not yet accommodate novel longevity endpoints.

      Japan is particularly notable for its regulatory openness to regenerative medicine. The Act on
      the Safety of Regenerative Medicine (2014) and subsequent amendments provide a conditional
      approval pathway for regenerative and cellular therapies, making Japan an important potential
      first-market for cellular rejuvenation products if they reach clinical readiness. Altos Labs
      maintains a research institute in Japan, likely with one eye on this regulatory access. Asia-Pacific
      broadly is the fastest-growing regional market, driven by Japan's regulatory framework, South
      Korea's cosmetics industry, China's rapidly aging population, and India's growing middle class.
