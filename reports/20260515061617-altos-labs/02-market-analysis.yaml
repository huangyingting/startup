  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: precise-longevity-therapeutics-TAM-2026
      missingEvidence: >-
        Precise, analyst-sourced total addressable market figure for longevity therapeutics specifically
        (excluding nutraceuticals, cosmetics, and generic research tools) as of 2026; authoritative
        market reports from Grand View Research, IMARC, and Allied Market Research are behind paywalls.
      whyItMatters: >-
        Without a precise longevity therapeutics sub-segment TAM, it is impossible to size Altos Labs'
        maximum addressable market if its reprogramming platform succeeds. The broad anti-aging market
        size ($44–127B) is misleading because Altos Labs does not compete in supplements or cosmetics.
      diligencePath: >-
        Purchase or access through institutional library: Grand View Research "Longevity and Anti-Aging
        Therapy Market" report; IMARC Group "Longevity and Anti-Aging Therapy Market: Global Industry
        Trends, Share, Size, Growth, Opportunity and Forecast." Cross-reference with Calico and Unity
        Biotechnology SEC filings for disclosed addressable market claims.
      relatedQuestionRefs:
        - QM001

    - type: missing-source
      severity: material
      topic: 2026-longevity-biotech-investment-flow
      missingEvidence: >-
        No comprehensive, publicly available data source summarizes total private investment into
        longevity biotech companies globally in 2026. Crunchbase and PitchBook data is incomplete for
        private rounds and does not segment longevity specifically.
      whyItMatters: >-
        The investment flow trend determines whether the 2021–2022 billionaire-funded investment wave
        is continuing, decelerating, or reversing; this directly affects whether Altos Labs can raise
        a follow-on round and whether competitors are scaling up.
      diligencePath: >-
        Subscribe to PitchBook Longevity vertical data; review Longevity Technology and Life Extension
        Advocacy Foundation (LEAF) annual longevity funding reports; query Crunchbase Pro for funding
        rounds tagged longevity/aging in 2024–2026.
      relatedQuestionRefs:
        - QM004

    - type: missing-source
      severity: minor
      topic: unity-biotechnology-2026-market-cap
      missingEvidence: >-
        Unity Biotechnology's precise market capitalization, stock price, and current pipeline status
        as of May 2026 were not retrievable during this research run; stock data requires real-time
        market data access.
      whyItMatters: >-
        Unity Biotechnology's market cap trajectory serves as the only public-market benchmark for
        investor sentiment on longevity therapeutics; persistent low valuation signals skepticism about
        the entire sub-sector.
      diligencePath: >-
        Access Yahoo Finance, Bloomberg, or SEC EDGAR for current UTBH/Unity Biotechnology market
        capitalization, shares outstanding, and most recent 10-Q filing; cross-reference with pipeline
        announcements on clinical.gov for current trial status.
      relatedQuestionRefs:
        - QM014

    - type: private-evidence-only
      severity: minor
      topic: calico-research-pipeline-2026
      missingEvidence: >-
        Calico's public-facing website was inaccessible (broken link) during this research run; detailed
        information about Calico's active research programs, publications, AbbVie partnership milestones,
        and 2026 operational status is not publicly available.
      whyItMatters: >-
        Calico is the closest analogue to Altos Labs in terms of scientific model (basic discovery
        science), capital scale, and corporate backer; understanding its current research trajectory
        and any partnership outputs provides a benchmark for what Altos Labs might achieve in 5–10 years.
      diligencePath: >-
        Search PubMed for publications by Calico Research LLC (2023–2026); review Alphabet annual
        reports for any Calico pipeline disclosures; check calico.com via Wayback Machine for last
        archived content; search Google Scholar for Calico-affiliated researcher publications.
      relatedQuestionRefs:
        - QM021

    - type: missing-source
      severity: material
      topic: active-longevity-clinical-trials-2026
      missingEvidence: >-
        No single publicly available database comprehensively lists all active Phase 1/2 clinical trials
        in longevity therapeutics as of May 2026 with clear segmentation by mechanism (senolytics,
        reprogramming, autophagy, NAD+, etc.) and primary endpoint.
      whyItMatters: >-
        The number and stage distribution of active longevity clinical trials directly measures whether
        the scientific field is progressing from discovery toward therapeutic validation; a barren trial
        landscape would confirm that the market is still primarily in basic science with no near-term
        commercial inflection.
      diligencePath: >-
        Search ClinicalTrials.gov for trials with condition "aging" or "longevity" in phases 1 and 2
        as of 2026; cross-reference with TAME (Targeting Aging with Metformin) trial status; review
        Unity Biotechnology pipeline page for current ophthalmology/neurology trials.
      relatedQuestionRefs:
        - QM026

    - type: enumeration-incomplete
      severity: minor
      topic: market-size-by-segment-tam001
      missingEvidence: >-
        TM001 (Market Size by Segment) covers six primary segments but does not separately enumerate
        prescription anti-aging drugs (e.g., off-label rapamycin, NMN supplements with clinical backing),
        cosmeceuticals as distinct from cosmetics, or genomic/proteomics diagnostics for aging.
      whyItMatters: >-
        The omitted segments could affect sizing accuracy for the segment most adjacent to Altos Labs
        (longevity diagnostics and precision medicine), which is expected to grow with increasing
        adoption of biological age measurement.
      diligencePath: >-
        Access a paid anti-aging market report that provides sub-segment granularity at the
        prescription drug and cosmeceutical level; cross-reference with IMS Health / IQVIA for
        prescription anti-aging drug spend data.
      relatedTableRefs:
        - TM001

