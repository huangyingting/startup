  - id: market-segments
    title: "Market Segmentation: From Cosmetics to Cellular Therapeutics"
    body: |
      The anti-aging market is best understood as a spectrum from low-science, high-volume consumer
      products to high-science, low-volume experimental therapeutics. Nutraceuticals, dietary supplements,
      and cosmeceuticals — products claiming anti-aging benefits without requiring clinical proof — account
      for the largest share of current market spending, estimated at roughly half of total anti-aging
      market revenue. This segment includes NAD+ precursors, resveratrol formulations, collagen
      supplements, and a vast array of skincare products. It grows largely on consumer demand and
      marketing rather than clinical evidence.

      The longevity therapeutics sub-segment — companies pursuing drug-like interventions targeting the
      biology of aging — is estimated at only $2–5 billion as of 2022, with all major programs in
      preclinical or early clinical stages. This is the segment most relevant to Altos Labs. Aging
      diagnostics and biomarkers represent a technically adjacent segment, including companies developing
      epigenetic clocks, methylation assays, and multi-omic aging assessments; this market is small today
      but positioned for growth as biological age measurement becomes standard in preventive medicine.
      Preclinical research tools — single-cell sequencing platforms, model organism systems, and
      epigenomics reagents — are the segment Altos Labs most directly operates within during its current
      discovery phase, though it is a consumer, not a producer, of these tools. Digital health and
      longevity wellness platforms, including apps, wearables, and health optimization services, represent
      the fastest-growing segment by unit volume, though their connection to core longevity biology is
      often superficial.
