callouts:
  - calloutType: risk
    title: "No Commercial Proof: Entire Pre-Revenue Stage Creates Binary Execution Risk"
    body: >-
      Altos Labs has zero commercial customers, zero revenue, and no disclosed revenue-generating
      agreement three years post-founding. The company's $3 billion in capital buys runway but not
      commercial traction. Any investor or partner evaluation must work entirely from scientific
      credibility, analogues, and management assertion — there is no customer evidence to anchor
      valuation or validate the commercial thesis.
    claimRefs:
      - CU001
      - CU003
      - CU017
      - CU030

  - calloutType: risk
    title: "No FDA-Approved Aging Indication Blocks Near-Term Clinical Revenue"
    body: >-
      FDA has never approved a therapeutic indication targeting cellular aging or epigenetic
      reprogramming. Until a regulatory path is defined — either a novel aging endpoint or a
      conventional disease indication anchored in aging biology — Altos Labs cannot generate
      clinical-stage pharmaceutical revenue regardless of scientific results. This is a systemic
      industry constraint, not an Altos Labs-specific failure, but it disproportionately affects
      a company whose entire thesis depends on cellular rejuvenation.
    claimRefs:
      - CU018
      - CU026
      - CU027

  - calloutType: insight
    title: "Pharma Collaboration Is Historically the Fastest Path to First Revenue for Platform Biology"
    body: >-
      Genentech, Amgen, and BioNTech each generated first meaningful commercial revenue through
      licensing or partnership deals with established pharmaceutical companies, not through direct
      product sales. Altos Labs' most capital-efficient path to first revenue follows the same
      playbook: a research collaboration or IP license with a large pharma company willing to
      fund multi-year biology research in exchange for licensing rights to resulting therapeutics.
    claimRefs:
      - CU015
      - CU031
      - CU032
      - CU033

