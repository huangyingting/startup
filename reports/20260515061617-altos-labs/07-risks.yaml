  - id: risk-mitigation
    title: "Risk Mitigation: What Altos Labs Is Doing to Reduce Its Risk Profile"
    body: |
      Altos Labs has built several structural mitigations into its model that partially address the
      risk categories described above, though none eliminates any of the core existential risks.

      On the scientific safety front, the primary mitigation is the continued development of OSK
      (three-factor reprogramming without cMyc) as a potentially safer variant. Altos Labs researchers
      including Manuel Serrano have published or presented on OSK protocols that achieve partial
      epigenetic clock reversal at reduced efficiency. If OSK can be demonstrated to produce clinically
      meaningful epigenetic clock changes in aged human cells without oncogenic risk — a finding that
      does not yet exist in the published literature — it would substantially de-risk the cMyc problem.
      The multi-lab, multi-institute design adds a second layer of scientific mitigation: requiring
      replication of key results across Cambridge, San Francisco, and Japan-based teams before committing
      to a clinical direction reduces the probability of a single-lab reproducibility failure becoming
      a company-level catastrophe.

      On the regulatory front, early engagement with the FDA — through Altos Labs' engagement of
      experienced pharmaceutical regulatory advisors and through participation in the broader TAME
      trial ecosystem — is the primary stated mitigation. Altos Labs' CEO Hal Barron's prior experience
      leading GlaxoSmithKline's global pharmaceutical R&D gives him substantial FDA pre-IND engagement
      experience that could accelerate the regulatory alignment process once a clinical direction is
      chosen. The company's strategy of publishing pre-competitively also helps build external credibility
      with regulatory reviewers who look to the published scientific literature to calibrate the state
      of evidence for novel therapeutic modalities.

      On the financial front, the $3 billion initial raise specifically reflects the recognition that
      conventional biotech timelines are inadequate for this category of research. The investors — ARCH
      Venture Partners and entities associated with Jeff Bezos and Yuri Milner — are patient capital
      with long-dated return expectations. The multi-program research strategy (partial reprogramming,
      senescence, epigenetic tools, multi-omics) provides optionality: if cMyc-based reprogramming
      proves unworkable, Altos can redirect toward senolytic programs or other aging hallmark targets
      that have shorter pathways to clinical application. Internal succession planning for key personnel
      risks and stock-based compensation packages for research staff are additional operational
      mitigations, though the specifics have not been publicly disclosed.

      Despite these mitigations, the residual risk profile of Altos Labs remains extremely high across
      all dimensions. No mitigation addresses the fundamental reality that partial reprogramming has
      never been demonstrated safe in an aged human cell, that no FDA pathway exists for an anti-aging
      therapeutic, and that the company will need to raise additional capital long before it could
      reach revenue. The mitigations reduce probability of failure at the margin but do not change
      the fundamental category of investment: this is a frontier science bet with a 15–20 year horizon
      and a correspondingly high probability of not generating returns on the original investment basis.
      Table TR005 provides a structured view of primary mitigations, monitoring indicators, and
      thesis-break triggers across the four highest-severity risk categories.
