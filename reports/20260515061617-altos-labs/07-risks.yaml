  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "altos-labs-risk-register"
      missingEvidence: >-
        Altos Labs has not published an internal enterprise risk management (ERM) report, risk
        register, or formal safety assessment of its partial reprogramming programs as of May 2026.
        Table TR001 is constructed from external analytical inference based on scientific literature,
        regulatory precedents, and industry comparables — not from disclosed internal risk assessments.
      whyItMatters: >-
        An investor diligencing Altos Labs cannot verify whether the company has formally assessed,
        quantified, or mitigated the cMyc oncogenicity and reproducibility risks identified here.
        The absence of disclosed risk management processes leaves open the possibility that internal
        risk management is either more sophisticated (with proprietary mitigations not disclosed)
        or less rigorous (with risks not yet formally recognized) than publicly inferrable.
      diligencePath: >-
        Request Altos Labs' formal risk register, safety monitoring protocols, and any internal
        documents addressing cMyc oncogenicity risk in aged human cells specifically. Review board
        meeting materials for evidence of formal risk governance frameworks. Ask for disclosure of
        any safety data from aged human cell reprogramming experiments regardless of publication status.
      relatedTableRefs:
        - TR001
      relatedQuestionRefs:
        - QR003
        - QR010

    - type: private-evidence-only
      severity: material
      topic: "regulatory-legal-risk-register"
      missingEvidence: >-
        Altos Labs' regulatory strategy, any pre-IND meeting outcomes with the FDA, and its specific
        plans for navigating the undefined anti-aging indication pathway are not publicly disclosed.
        Table TR002 is constructed from regulatory precedent analysis and public information about
        FDA requirements; actual regulatory timeline discussions are confidential.
      whyItMatters: >-
        The regulatory risk profile is the most consequential unknown for Altos Labs' commercial
        timeline. Without knowing the content of any regulatory pre-IND discussions, an external
        analyst cannot assess whether FDA has indicated conditional acceptability of a specific
        disease indication, or whether the company has encountered regulatory resistance that
        would fundamentally extend the timeline projections in Table TR002.
      diligencePath: >-
        Request disclosure of any FDA pre-IND correspondence, Type A or B meeting summaries, and
        regulatory strategy documents. Engage FDA biomarker qualification program offices to assess
        the feasibility of qualifying epigenetic clocks as surrogate endpoints on a 5–10 year path.
