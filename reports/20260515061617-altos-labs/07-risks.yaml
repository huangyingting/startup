callouts:
  - calloutType: risk
    title: "cMyc oncogenicity in aged human cells is unresolved and may be unresolvable under current protocols"
    body: >-
      The single most important unresolved risk in the Altos Labs portfolio is whether cMyc expression
      — even brief and cyclical — is safe in aged human cells carrying decades of accumulated somatic
      mutations. Every reprogramming study demonstrating efficacy has been conducted in young cells,
      young mice, or artificially-aged progeria models. None has been conducted in primary cells from
      elderly humans under realistic clinical conditions. The OSK alternative reduces the risk but
      introduces a new question: whether OSK-only reprogramming achieves sufficient epigenetic clock
      reversal in aged human cells to be clinically meaningful. If the answer is no, the entire OSKM
      platform as currently conceived either requires cMyc (and carries unresolved cancer risk) or does
      not work at a clinically meaningful level without it. This is not a tractable risk that can be
      mitigated structurally; it requires empirical resolution through multi-year human cell and NHP
      safety studies.
    claimRefs:
      - CR001
      - CR002
      - CR012
      - CR016
      - CR021
      - CR034
      - CR040
  - calloutType: risk
    title: "Capital depletion before proof-of-concept is the primary existential financial risk"
    body: >-
      Altos Labs' capital position is strong relative to peers but finite relative to the timeline
      required. An estimated $1.0–1.5 billion remaining as of May 2026, burning at $250–400 million
      per year, implies a re-raise requirement within 3–6 years — well before any clinical data could
      be available. The company will need to raise additional capital in 2028–2032 on the basis of
      preclinical scientific progress alone, with no revenue and no approved product. The macro
      environment for that raise — interest rates, biotech sentiment, competing capital demands — is
      unknown. If the preclinical data available at that time does not include a compelling safety and
      efficacy signal in aged human cells or non-human primates, the re-raise will face significant
      resistance. A failed re-raise would force program cuts, talent departure, and potentially a
      strategic sale of IP assets at a significant discount to the original investment basis.
    claimRefs:
      - CR006
      - CR018
      - CR019
      - CR035
      - CR036

