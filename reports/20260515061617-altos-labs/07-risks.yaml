figures:
  - id: FR001
    title: "Risk Heat Map: Likelihood × Impact Severity Matrix"
    type: matrix
    layout: wide
    summary: >-
      Heat map plotting Altos Labs' major enterprise risks on a likelihood (Y-axis: Low/Medium/High)
      versus impact (X-axis: Low/Medium/High/Critical) matrix. Risk labels identify where each risk
      clusters; the concentration of multiple High-severity risks at Medium-to-High likelihood indicates
      a portfolio of risks that are neither remote nor avoidable. The most dangerous cell — High
      Likelihood × Critical Impact — contains two existential risks: cMyc oncogenicity and clinical
      translation failure. Capital depletion anchors the Medium Likelihood × Critical Impact cell.
      No risks sit in the Low Likelihood × Low Impact zone; even minor risks have material implications
      for a pre-revenue company at this stage.
    data:
      columns:
