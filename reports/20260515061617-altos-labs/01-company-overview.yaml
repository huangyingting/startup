  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: financials-burn-rate-breakdown
      missingEvidence: >-
        Precise annual operating budget, allocation by program, and actual burn rate for Altos Labs as of
        2026; the company has not disclosed audited or reported financials as a private entity.
      whyItMatters: >-
        Burn rate determines remaining runway on the $3B raise and informs investors on capital adequacy
        for reaching meaningful scientific milestones before a follow-on round is required.
      diligencePath: >-
        Request financial statements or management accounts under NDA from Altos Labs investor relations;
        cross-reference with facilities and headcount to triangulate burn.
      relatedQuestionRefs:
        - QO026

    - type: private-evidence-only
      severity: material
      topic: research-pipeline-2026-milestones
      missingEvidence: >-
        No public disclosure of 2026 research milestones, publications list, or scientific pipeline progress
        from Altos Labs; the company operates in stealth on its specific research programs.
      whyItMatters: >-
        The absence of public scientific output makes it impossible to independently assess whether the
        platform research is on track, which programs are advancing, and whether the founding thesis is
        being validated or challenged experimentally.
      diligencePath: >-
        Search PubMed and bioRxiv for publications by Altos Labs researchers; attend scientific conferences
        where PI results may be presented; request investor update materials under NDA.
      relatedQuestionRefs:
        - QO027

    - type: private-evidence-only
      severity: material
      topic: in-vivo-delivery-mechanism
      missingEvidence: >-
        The specific delivery mechanism (viral vector type, lipid nanoparticle formulation, or other modality)
        used by Altos Labs to introduce Yamanaka factors into cells or tissues in vivo has not been disclosed.
      whyItMatters: >-
        The choice of delivery mechanism is a key technical risk and IP differentiator; adeno-associated
        viral (AAV) vectors have payload size limits and immunogenicity concerns, while alternatives have
        their own challenges. This is central to assessing feasibility of eventual therapeutic translation.
      diligencePath: >-
        Search patent filings by Altos Labs inventors; review preprint servers for methodology disclosures;
        interview scientific advisors or PIs at academic conferences.
      relatedQuestionRefs:
        - QO028

    - type: missing-source
      severity: minor
      topic: personnel-retention-scientist-departures
      missingEvidence: >-
        No publicly available information on scientist retention rates, senior researcher departures, or
        internal culture at Altos Labs since the 2022 launch; the company has not disclosed organizational
        changes or departures.
      whyItMatters: >-
        High-compensation recruiting of academic stars creates key-person dependency and potential for
        culture mismatch between academic freedom and corporate science goals; departure of key PIs
        would be a material adverse signal.
      diligencePath: >-
        Monitor LinkedIn for researcher profile changes; review preprint author affiliations for PI
        affiliation shifts; seek references from former employees or collaborators.
      relatedQuestionRefs:
        - QO029

    - type: private-evidence-only
      severity: material
      topic: post-2022-funding-rounds-and-partnerships
      missingEvidence: >-
        No public announcement of any funding round, strategic partnership, or licensing agreement by
        Altos Labs after the January 2022 $3 billion raise; whether additional capital has been raised
        privately or a pharmaceutical partner has been engaged is unknown.
      whyItMatters: >-
        Post-2022 capital events would directly affect remaining runway, dilution, and strategic direction;
        a pharma partnership would signal clinical pipeline ambition and validate the platform commercially.
      diligencePath: >-
        Monitor SEC Form D filings under Altos Labs entity names; check Crunchbase and PitchBook for
        disclosed rounds; review major pharma partner press releases for unnamed biotech collaborations.
      relatedQuestionRefs:
        - QO030

    - type: enumeration-incomplete
      severity: minor
      topic: complete altos labs leadership roster beyond publicly named figures
      missingEvidence: >-
        The full list of Principal Investigators, senior researchers, and operational executives at Altos
        Labs is not publicly disclosed; the company does not publish a comprehensive org chart or team page
        in accessible form.
      whyItMatters: >-
        Key-person risk assessment requires knowing which PIs lead which programs; undisclosed departures
        of program leads would not be visible from public sources.
      diligencePath: >-
        Fetch and review altoslabs.com/team when JavaScript rendering is available; monitor academic
        publications and conference speaker lists for PI affiliations.
      relatedTableRefs:
        - TO002

    - type: enumeration-incomplete
      severity: minor
      topic: complete investor cap table beyond publicly disclosed investors
      missingEvidence: >-
        The full investor cap table for the January 2022 Altos Labs round, including all participants,
        stake sizes, and economic terms, has not been disclosed; only selected investors have been named
        in public reporting.
      whyItMatters: >-
        Unknown investors may have governance rights, information rights, or strategic preferences that
        affect company direction; undisclosed sovereign wealth or pharmaceutical investors would be material.
      diligencePath: >-
        Review any Delaware Secretary of State filings or SEC Form D filings by Altos Labs entities;
        cross-reference with investor self-disclosures and industry databases.
      relatedTableRefs:
