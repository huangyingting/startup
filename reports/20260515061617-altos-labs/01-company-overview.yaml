chapter:
  number: 1
  title: "Company Overview"
  summary: >-
    Altos Labs is a private biotechnology company founded in 2021 in the San Francisco Bay Area, focused on
    cellular rejuvenation programming through partial epigenetic reprogramming using Yamanaka OSKM factors, with
    advisory support from three Nobel laureates including Shinya Yamanaka, Jennifer Doudna, and David Baltimore.
    The company raised $3 billion in January 2022 — one of the largest private biotech rounds in history —
    backed by Jeff Bezos, Yuri Milner, and ARCH Venture Partners, and operates three research institutes across
    the US, UK, and Japan with approximately 300+ researchers in a pure discovery-science phase with no clinical
    programs as of May 2026.
sections:
  - id: company-identity
    title: Company Identity, Mission, and Scientific Approach
    body: |
      Altos Labs is a private biotechnology research company incorporated in Delaware and headquartered in the San
      Francisco Bay Area, California. Founded in 2021 and formally unveiled in January 2022, the company's stated
      mission is cellular rejuvenation programming — restoring youthful cellular function by reversing the molecular
      hallmarks of aging using partial epigenetic reprogramming. The company operates under the scientific premise
      that aging is not an inevitable physical law but a biological process that can be reversed at the cellular level.

      The core scientific thesis builds on Shinya Yamanaka's 2006 Nobel Prize-winning discovery that mature somatic
      cells can be reprogrammed to a pluripotent stem-cell-like state by expressing four transcription factors —
      Oct4, Sox2, Klf4, and cMyc (collectively called OSKM or Yamanaka factors). Altos Labs' approach deploys a
      partial or transient version of this reprogramming cycle: cycling OSKM expression on and off to restore
      epigenetic youth markers without completing full dedifferentiation (which would erase cell identity and carry
      cancer risk from cMyc, a known proto-oncogene). The resulting "partial reprogramming" aims to reverse
      epigenetic clock aging signatures — as measured by Steve Horvath's DNA methylation clock — while preserving
      tissue-specific cell identity.

      The company explicitly frames its goal as extending human healthspan (the period of healthy, disease-free life)
      rather than simply extending lifespan per se. Altos Labs positions itself as a pre-clinical research platform:
      all activities as of May 2026 are in the basic science and platform-building phase, with no clinical programs
      announced. The flow of science, capital, and talent that defines the Altos Labs model is illustrated in
      Figure FO003 below.
