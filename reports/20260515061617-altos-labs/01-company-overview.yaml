  - id: operations-scale
    title: Operations, Scale, and Research Model
    body: |
      Altos Labs operates three research institutes: the primary institute is located in the San Francisco Bay
      Area (Redwood City, California), serving as global headquarters; a second institute is established in
      Cambridge, United Kingdom, co-located with the broader UK life-sciences ecosystem near the Wellcome Genome
      Campus; a third institute is based in Japan, reflecting both the influence of Shinya Yamanaka (whose lab
      at Kyoto University pioneered iPSC science) and Japan's strategic interest in longevity research. All
      three institutes operate under a unified scientific vision but maintain independent research programs.

      The company employs approximately 300 or more research scientists and support staff as of available
      reporting. Altos Labs deliberately adopted an academic-style research institute model — rather than a
      conventional biotech drug-development pipeline structure — in which principal investigators lead
      independent labs on basic science questions related to reprogramming biology, epigenetic aging, and
      cellular senescence. Researchers are offered competitive compensation reportedly exceeding $1 million
      per year, a significant premium above both academia and typical early-stage biotech, designed to attract
      tenure-track scientists who might otherwise remain in university settings.

      The company has no clinical programs, no IND filings, and no partner pharma relationships announced as
      of May 2026. It operates entirely in the pre-clinical discovery phase. The estimated annual burn rate —
      derived from staffing scale and facility overhead — is in the range of $300 million to $450 million per
      year, implying the $3 billion raise provides approximately 7 to 10 years of runway at current spend
      levels, though actual figures are not publicly disclosed.
