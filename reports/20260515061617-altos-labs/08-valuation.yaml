        platform technology with long timelines; (2) novel biological mechanism at founding; (3)
        analogous investor backing profile; or (4) direct longevity/aging research mission. No
        comparable is perfect; Altos Labs is arguably unique in combining the scale of its raise
        with the earliness of its scientific stage. Calico valuation is not publicly disclosed;
