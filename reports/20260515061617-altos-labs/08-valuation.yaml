  - id: investment-outlook
    title: "Net Investment Assessment for Different Investor Types"
    body: |
      The appropriate investor profile for Altos Labs is narrow. The company is not suited to
      conventional biotech venture capital funds with 7–10 year return cycles, public equity
      investors seeking near-term catalysts, or capital allocators with limited risk tolerance.
      The investment case makes sense only for a specific category of patient, long-duration,
      high-risk-tolerance capital.

      The investment recommendation is "track" for most allocators: do not initiate a new position
      unless already invested via a diversified longevity portfolio with explicit long-duration
      capital. For those already invested, the rational posture is to maintain exposure while
      monitoring for preclinical de-risking milestones (NHP safety data, first peer-reviewed
      publication from Altos Labs, IND-enabling studies). A shift to "buy" requires demonstrated
      safety in aged human cells or non-human primates. A shift to "sell/avoid" is triggered by
      capital depletion without proof of concept, key person departures, or a major safety setback.
      The investment confidence level is low to medium, reflecting the extraordinary uncertainty
      in scientific timelines and outcomes.

      For sovereign wealth funds and family offices with 20+ year investment horizons, a small
      position in Altos Labs represents a plausible long-duration option on a transformative
      healthcare thesis. The expected value calculation ($5.5B versus $3B entry) is marginally
      positive if the investor is genuinely indifferent to a complete loss. The investors who led
      the 2022 round — Yuri Milner, Bezos Expeditions, SoftBank, ARCH Venture Partners — represent
      exactly this profile.

      For institutional biotechnology funds, Altos Labs does not fit standard portfolio construction.
      The timeline is 3–4x longer than a typical biotech fund life, the clinical risk is higher than
      any approved drug modality, and the exit path requires scientific milestones unlikely to arrive
      within a standard fund's window.

      IPO readiness is the formal metric for public market access. Table TV004 assesses Altos Labs
      against standard IPO readiness criteria. The conclusion is that Altos is not IPO-ready on
      any clinical or financial metric and is unlikely to be within the next 8–12 years.

      Table TV006 provides the final diligence asks — the evidence items an investor would need to
      independently verify before committing capital or re-confirming an existing investment.
      Figure FV004 presents the Investment KPI scorecard across the key evaluation dimensions.
