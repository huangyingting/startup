callouts:
  - calloutType: insight
    title: "The $3B valuation is broadly fair on expected value — but the distribution is dangerously bimodal"
    body: >-
      A probability-weighted expected value calculation across the five scenarios in Table TV003
      produces approximately $5.5 billion — modestly above the 2022 raise price of $3 billion.
      This might suggest the valuation is fair. However, this analysis obscures the critical insight:
      the expected value is not the most likely outcome. The most probable single outcome
      (35% Bear + 35% Base = 70% combined) produces either capital loss or near-zero return.
      Only 25% of probability mass produces a return exceeding 3x invested capital. Investors
      paid $3B for a lottery ticket that pays off handsomely 25% of the time and returns nothing
      or less 70% of the time. This is not irrational if the investor is large enough, diversified
      enough, and patient enough — but it is a categorically different risk profile from any
      conventional biotech investment.
    claimRefs:
      - CV023
      - CV024
      - CV026
      - CV027
      - CV030
      - CV031
  - calloutType: risk
    title: "No published scientific output from Altos Labs itself by early 2026 is the single largest adverse valuation signal"
    body: >-
      The most significant adverse signal in the Altos Labs valuation analysis is the absence of
      any peer-reviewed scientific publication from Altos Labs researchers working on the Altos
      research agenda as of early 2026 — more than four years after founding. The company's
      valuation is entirely based on team pedigree and scientific thesis, not on any empirical
      demonstration of platform functionality. This is unusual by the standards of comparable
      deep-science research companies, most of which had produced at least preliminary peer-reviewed
      output within two to three years of founding. The publication of even a single convincing
      in vitro demonstration of safe partial reprogramming in aged human cells would represent a
      meaningful de-risking event that could support the current valuation. The continued absence
      of such publication, four years into a $3B program, is a material adverse signal.
    claimRefs:
      - CV004
      - CV005
      - CV007
      - CV032
      - CV033

