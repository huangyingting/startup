  - id: TV006
    title: "Final Diligence Asks Table"
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        This table covers the complete set of material evidence items that cannot be resolved from
        public sources and that a prospective investor in Altos Labs would need to obtain from
        management under NDA before committing capital. Coverage is exhaustive at the level of material
        diligence gaps; minor non-material items are excluded. Each ask corresponds to a specific
        chapter evidence gap: financials (Chapter 4), scientific progress (Chapter 5), risk mitigation
        (Chapter 7), or valuation (this chapter). These six items represent the minimum diligence
        package required to underwrite the investment thesis with reasonable confidence.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - "Audited financials and cash position"
        - "Altos Labs has not published audited financial statements, balance sheet, or cash flow statement; remaining capital is analytically estimated at $1.1–1.7B as of May 2026"
        - "Capital runway is the single most important near-term investment risk; the 5-year uncertainty range in our estimates is entirely unresolvable without actual financials"
        - "Request FY2022–2025 audited financials and current cash position confirmation from management under NDA"
      - - "Preclinical scientific progress (internal data)"
        - "No peer-reviewed publication from Altos Labs itself as of early 2026; internal scientific progress is unknown"
        - "The $3B valuation rests entirely on team pedigree; any published or data-room-accessible demonstration of platform functionality would be a material de-risking event"
        - "Request internal scientific progress reports or data-room access to preclinical data packages as of Q1 2026"
      - - "Re-raise investor commitments"
        - "No disclosed side letters or re-up commitments from Bezos, Milner, ARCH, or other investors for future rounds"
        - "A re-raise in 2028–2032 is almost certain given burn rate; probability of success depends on whether anchor investors have informal or formal commitments"
        - "Request any side letters, board-approved capital commitment letters, or verbal commitments from the existing investor syndicate"
      - - "IP portfolio status and defensibility"
        - "No publicly confirmed granted patents; IP applications are filed but not yet validated against prior art or competitor claims"
        - "Platform IP is a cornerstone of the Base Case licensing scenario; without a defensible IP estate, the licensing path is unviable"
        - "Request complete IP portfolio summary including filed applications, granted patents, freedom-to-operate analyses, and any pending IPR proceedings"
      - - "cMyc safety data (if any)"
        - "No public data on cMyc or OSK safety in aged human cells from Altos Labs; all reprogramming safety data in the public domain uses young cells or rodent models"
        - "This is the single most material scientific risk; any internal data on aged human cell safety or NHP safety would fundamentally change the risk assessment"
        - "Request internal cMyc and OSK safety data in aged human primary cells and, if available, NHP in vivo safety studies"
      - - "Indication strategy and development roadmap"
