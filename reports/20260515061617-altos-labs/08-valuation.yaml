        - "Validated, defensible patent estate covering core reprogramming protocols and delivery mechanisms"
        - "Moderate — IP applications active but not yet battle-tested in inter partes review or litigation"
        - "3–5 years to portfolio maturity"
      - - "Management Team"
        - "Exceptional — CEO Hal Barron (ex-GSK CMO), Nobel Laureate SAB members, experienced science leadership"
        - "Public-company-capable management team with experienced CFO, general counsel, and investor relations"
        - "None on scientific/CEO side; CFO and public-company infrastructure needed"
        - "Ready on science/CEO; 1–2 years to build full public-company infrastructure"
      - - "Financial Governance"
