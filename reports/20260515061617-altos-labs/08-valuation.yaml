  - id: TV003
    title: "Scenario Analysis: Altos Labs Valuation Outcomes"
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five scenarios covering the full plausible distribution of outcomes for Altos Labs from
        May 2026 through 2040. Scenarios were constructed to cover the complete probability space
        across science failure, partial success (licensing), platform success (clinical program),
        paradigm shift (FDA approval), and M&A exit. The five scenarios are designed to be mutually
        exclusive and collectively exhaustive at a meaningful level of granularity; probabilities
        sum to 100%. No material outcome pathway has been omitted. Valuations are analytical estimates;
        actual outcomes could differ materially. Investor return figures are relative to assumed $3B
        entry at the 2022 raise.
    columns:
      - Scenario
      - Probability
      - Path to Value
      - Target Valuation
      - Key Milestones
      - Investor Return
    rows:
      - - "Bear Case — Science fails"
        - "35%"
        - "Wind-down; IP portfolio sale; data asset licensing"
        - "$100–300M (IP residual value)"
        - "Failure to demonstrate safe reprogramming in aged human cells or NHPs; no licensing interest"
        - "~90–97% capital loss for investors"
      - - "Base Case — IP licensing path"
        - "35%"
        - "License reprogramming platform to major pharma; no proprietary clinical program at scale"
        - "$1–3B by 2030"
        - "Preclinical proof of concept in NHPs; at least one major pharma licensing deal; no own Phase 1"
        - "0–1x nominal return (substantial loss in time-value-of-money terms)"
      - - "Bull Case — Platform success"
        - "20%"
        - "Multiple pharma partnerships and own Phase 1 clinical program in defined indication"
        - "$10–30B by 2035"
        - "Phase 1 safety data in one defined indication; 3+ pharma partnerships; defensible IP estate"
        - "3–10x return on investment"
      - - "Super Bull — Paradigm shift"
        - "5%"
        - "FDA approval of first anti-aging / reprogramming therapy; broad disease application"
        - "$50–100B by 2040"
        - "FDA approval for a first defined anti-aging indication; demonstrated safety and efficacy in humans"
        - "15–30x return on investment"
      - - "Exit — M&A by Big Pharma"
        - "5%"
