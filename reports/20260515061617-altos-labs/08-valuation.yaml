tables:
  - id: TV001
    title: "Valuation Methodology Comparison"
    type: ENUMERATION
    enumerationScope:
      coverage: exhaustive
      basis: >-
        This table covers all six primary valuation methodologies applicable or inapplicable to a
        pre-revenue, pre-clinical, basic-science research company. The methodologies span standard
        corporate finance (DCF), option pricing theory (real options), equity market practice
        (comparable company analysis), asset-based approaches, venture capital convention, and cost-based
        reconstruction. No additional standard valuation methodologies exist that are material to this
        analysis given the absence of revenue, clinical data, and commercial precedents as of May 2026.
        Weight in Analysis reflects the composite weighting used in the chapter's fair value estimate.
    columns:
      - Method
      - Applicability
      - Result
      - Limitations
      - Weight in Analysis
    rows:
      - - "DCF (Discounted Cash Flow)"
        - "Low — no revenue; unknown timeframe to cash generation"
        - "Highly negative in base case; undefined in bull case"
        - "Requires revenue projections; no revenue timeline exists; small discount-rate changes produce order-of-magnitude valuation swings"
        - "Low (5%)"
      - - "Real Options Valuation"
        - "High — captures optionality of research platform; appropriate for long-duration science bets"
        - "$500M–$5B depending on assumed probability of success and time to expiry"
        - "Highly sensitive to volatility and underlying-asset value assumptions; subjective probability estimates"
        - "High (40%)"
      - - "Comparable Company Analysis"
        - "Medium — few true comparables; Moderna, Alnylam, BioNTech provide partial analogues"
        - "$1B–$5B range based on stage, sector, and team caliber"
        - "Few companies have raised $3B at basic-science stage; comps are imperfect and may not reflect Altos-specific risk"
        - "High (30%)"
      - - "Resource-based / Asset Valuation"
        - "Medium — team, IP, and infrastructure have reconstructable cost"
        - "$250M–$500M (cost to assemble team, secure IP, build infrastructure)"
        - "Ignores scientific progress, platform optionality, and future potential; understates true value if science works"
        - "Low (10%)"
      - - "VC Method (Exit Multiple)"
        - "Medium — applicable for early-stage; assumes eventual exit via IPO or M&A"
        - "Highly scenario-dependent; ranges from capital loss (bear) to $5–100B (bull/super-bull)"
        - "Highly speculative; exit timing and multiple are unknowable at this stage; no public market precedent for this asset type"
        - "Medium (15%)"
      - - "Cost-to-Replicate"
        - "Low — underestimates scientific progress and human capital assembly value"
        - "~$500M–$1B (estimated cost to re-hire team and rebuild research infrastructure)"
        - "Does not capture scientific progress made; understates value of Yamanaka, Doudna, Horvath participation premium"
        - "Low (5%)"
    notes: >-
      Weights reflect analytical judgment about the most appropriate framework for a pre-revenue,
      pre-clinical, long-duration platform science company. The composite implied fair value using
      these weights in the base case is approximately $1.5–3.0 billion. All output ranges are
      analytical estimates; Altos Labs has not disclosed any internal valuation or appraisal.
