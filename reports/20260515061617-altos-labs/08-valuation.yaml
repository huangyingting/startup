  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: altos-labs-no-followon-round-or-valuation-mark-2026
      missingEvidence: >-
        No public evidence is available confirming whether Altos Labs has raised additional capital,
        completed a secondary transaction with a publicly disclosed valuation mark, or received any
        new external valuation since the January 2022 close. Crunchbase and PitchBook data does not
        include any post-2022 funding event for Altos Labs as of May 2026. The absence of a follow-on
        round announcement in a 4-year period is itself informative but not conclusive.
      whyItMatters: >-
        A follow-on round at a higher valuation would validate the $3B entry price and reduce perceived
        investment risk. A follow-on round at a lower valuation (down round) would signal deteriorating
        investor confidence and create significant implications for existing equity holders. The absence
        of either is neutral to ambiguous.
      diligencePath: >-
        Request management confirmation of whether any secondary transactions or internal valuation
        marks have occurred since January 2022; request the current board-approved 409A or fair market
        value assessment of common equity.
      relatedQuestionRefs:
        - QV002

    - type: private-evidence-only
      severity: material
      topic: altos-labs-no-published-scientific-output-2026
      missingEvidence: >-
        No peer-reviewed publication from Altos Labs researchers specifically attributable to work
        conducted at Altos Labs (as distinct from prior academic roles) has been identified in a
        comprehensive PubMed and Google Scholar search as of May 2026. Scientists associated with
        Altos Labs have published in their academic capacities, but no institutional Altos Labs
        paper can be confirmed in the public scientific literature.
      whyItMatters: >-
        The scientific publication record is the principal external signal of research progress for
        a basic-science company. Four years of $300–400M/yr research investment with no published
        output is either a sign that publication is being strategically delayed (to protect IP before
        filing) or a sign that no publishable results have yet been obtained. Both interpretations
        are possible; neither is resolvable from public sources.
      diligencePath: >-
        Request from management a list of papers under review or accepted for publication with
        preprint/manuscript access; request the internal publication strategy and IP-protection
        protocol governing pre-publication data sharing.
      relatedQuestionRefs:
        - QV012

    - type: enumeration-incomplete
      severity: minor
      topic: comparable-valuation-table-tv002-imperfect-comps
      missingEvidence: >-
        Table TV002 (Comparable Valuation Table) covers the six most relevant comparable companies
        identified through public sources; however, no company is a true comparable to Altos Labs
        given its unique combination of $3B single-round raise, zero clinical programs, zero revenue,
        and four-year-old basic-science stage. Additional relevant companies may exist in the
        pre-clinical biotech space that were not identified in this search. The Calico valuation is
        undisclosed, making that row largely estimated. BioNTech and Moderna valuations at early
        rounds are sourced from secondary news reports, not primary offering documents.
      whyItMatters: >-
        A more complete comparable set might shift the fair value estimate upward or downward. If
        better comparables exist that priced basic-science platform companies at higher valuations
        at equivalent stages, the $3B Altos Labs price might look more conservative. If the comps
        are all priced lower at equivalent stages, the $3B price looks more aggressive. The partial
        coverage of TV002 introduces analytical uncertainty into the comparable analysis section.
      diligencePath: >-
        Commission a proprietary comparable company analysis from a specialist biotech investment
        bank covering private pre-clinical platform rounds from 2018–2026; obtain actual offering
        memoranda or PitchBook/Crunchbase data for BioNTech and Moderna early rounds to confirm
        the valuation figures used in TV002.
      relatedTableRefs:
        - TV002
      relatedQuestionRefs:
        - QV004

    - type: private-evidence-only
      severity: material
      topic: altos-labs-no-pharma-partnerships-announced-2026
      missingEvidence: >-
        No pharma partnership, licensing agreement, or collaboration agreement between Altos Labs
        and any major pharmaceutical company has been publicly announced as of May 2026. The absence
        of any licensing or partnership announcement after four years of operations with a $3B platform
        is a notable data point. Calico did announce the AbbVie partnership in its fifth year of
        operation (2018).
      whyItMatters: >-
        A pharma partnership would represent the first external validation of the Altos platform by
        a sophisticated commercial buyer, provide evidence that the science is progressing toward
        clinical utility, and establish a revenue pathway that partially de-risks the licensing Base
        Case scenario. Its continued absence is a material adverse signal.
      diligencePath: >-
        Request management disclosure of any active partnership discussions, term sheets, or
        preliminary agreements with pharmaceutical companies; understand whether partnerships are
        being pursued or deferred pending more scientific progress.
      relatedQuestionRefs:
        - QV019

