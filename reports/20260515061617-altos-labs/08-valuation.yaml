figures:
  - id: FV001
    title: "Altos Labs Scenario Valuation Estimates (in $B)"
    type: bar
    layout: wide
    summary: >-
      Bar chart showing the central valuation estimate for each of five scenarios considered in the
      Altos Labs scenario analysis, expressed in billions of dollars. The chart illustrates the extreme
      asymmetry of the outcome distribution: the Bear Case produces near-zero value ($0.2B) while the
      Super Bull produces $75B — a 375x spread across scenarios. The Base Case ($2B) and the Bull Case
      ($20B) frame the most probable upside range. The M&A Exit at $7.5B represents a middle-ground
      outcome if platform value is crystallized through acquisition before full clinical validation.
      All values are central estimates from the scenario ranges in Table TV003.
    data:
      xAxis: "Scenario"
      yAxis: "Estimated Valuation ($B)"
      items:
        - label: "Bear Case"
          value: 0.2
          note: "Science failure; IP residual only"
        - label: "IP Assets Only"
          value: 0.5
          note: "Platform IP sale without clinical programs"
        - label: "Base Case"
          value: 2.0
          note: "Licensing path; no proprietary clinical program"
        - label: "Bull Case"
          value: 20.0
          note: "Multiple partnerships plus Phase 1 program"
        - label: "Super Bull"
          value: 75.0
          note: "FDA approval of first anti-aging therapy"
    approximationNotes: >-
      All valuation figures are central point estimates derived from the scenario ranges in Table TV003.
      Bear Case central estimate $0.2B (range $0.1–0.3B); Base Case $2.0B (range $1–3B); Bull Case $20B
      (range $10–30B); Super Bull $75B (range $50–100B); M&A Exit $7.5B (range $5–10B). Actual outcomes
      within each scenario would vary based on timing, market conditions, deal structures, and scientific
      milestones achieved at any given exit point.
    claimRefs:
      - CV001
      - CV002
      - CV019
      - CV020
      - CV025

  - id: FV002
    title: "Altos Labs Base-Case Fair Value Decomposition (Waterfall, $M)"
    type: waterfall
    layout: wide
    summary: >-
      Waterfall chart decomposing Altos Labs' base-case estimated fair value into its constituent
      components. The analysis starts with the core Research Platform Value ($1,500M) — the discounted
      worth of the reprogramming platform given current scientific state — and adds three premiums:
      Team and Scientist Premium ($800M), IP Portfolio Optionality ($500M), and First-Mover in
      Reprogramming ($300M). Cash and Assets ($200M) adds the residual liquid value. A Discount for
      Pre-Revenue Risk (-$500M) is applied, producing a Total Fair Value (Base) of approximately
      $2.8 billion — consistent with the 2022 raise valuation. This decomposition illustrates that
      the valuation is heavily dependent on the team and platform premiums, not on any demonstrable
      commercial value.
    data:
      items:
        - label: "Core Research Platform Value"
          value: 1500
        - label: "Team & Scientist Premium"
          value: 800
        - label: "IP Portfolio Optionality"
          value: 500
        - label: "First-Mover in Reprogramming"
          value: 300
        - label: "Cash & Assets"
          value: 200
        - label: "Discount for Pre-Revenue Risk"
          value: -500
        - label: "Total Fair Value (Base)"
          value: 2800
    approximationNotes: >-
      All component values are analytical estimates. Core Research Platform Value ($1.5B) is estimated
      from real options methodology assuming a 15% probability of reaching Phase 1 and a $10B exit value.
      Team premium ($800M) is estimated from the cost-to-assemble and market premium observed in comparable
      scientist/executive hire precedents. IP optionality ($500M) is based on comparable defensive patent
      estates in gene therapy platforms. First-mover premium ($300M) is estimated from brand and network
      effect premiums in analogous platform companies. Pre-revenue discount (-$500M) reflects the absence
      of revenue, clinical data, and commercial partnerships. All figures carry high analytical uncertainty.
    claimRefs:
      - CV009
      - CV010
      - CV013
      - CV020
      - CV022

