        Assessment of Altos Labs against the six standard criteria evaluated by investment bankers,
        institutional investors, and market participants for a biotech IPO. These six criteria
        — revenue, clinical data, IP portfolio, management team, financial governance, and market
        conditions — collectively cover the complete standard pre-IPO diligence checklist for
        biotechnology listings on NASDAQ and NYSE. The six-criterion framework is drawn from public
        market conventions and represents an exhaustive set for the chapter's purpose. Assessments
        reflect publicly available information about Altos Labs as of May 2026.
    columns:
      - Criterion
      - Current Status
      - Required Status
      - Gap
      - Timeline to Ready
    rows:
      - - "Revenue"
        - "Pre-revenue ($0 commercial revenue)"
        - "$50M+ ARR or a major pharma partnership with upfront payment demonstrating commercial viability"
        - "Significant — no revenue path within 5 years under base case"
