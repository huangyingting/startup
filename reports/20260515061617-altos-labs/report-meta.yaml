  headquarters: "San Francisco Bay Area, CA, USA"
  productSummary: "Altos Labs does not yet have commercial products. Its core research platform is built on transient, cyclic expression of Yamanaka factors (OSKM) to achieve partial cellular reprogramming — resetting epigenetic marks in aged or diseased cells without full dedifferentiation. The company uses Steve Horvath's DNA methylation epigenetic clocks as primary assays to measure reprogramming efficacy. Future products could include licensed platform technologies, research tools (epigenetic clocks), or proprietary cellular therapies."
  customerFocus: "No current customers. Potential future customer segments include large pharmaceutical companies (for platform licensing), academic medical centers (research collaboration), and government agencies (grant-funded research)."
