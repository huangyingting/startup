companyProfile:
  summary: "Altos Labs was founded in 2021 and raised $3 billion in January 2022 in one of the largest private biotech funding rounds in history. The company's mission is to develop partial cellular reprogramming technologies based on the Yamanaka OSKM factors (Oct4, Sox2, Klf4, cMyc) to restore cellular health and reverse age-related disease. Co-founded by Rick Klausner (former NCI Director) and led by CEO Hal Barron (former GSK Chief Medical Officer), Altos has assembled a world-class scientific advisory board including Nobel laureates Jennifer Doudna, David Baltimore, and Shinya Yamanaka. The company operates research labs in the San Francisco Bay Area, Cambridge (UK), and Japan, and employs more than 300 scientists. As of 2026, Altos remains pre-revenue with no clinical programs and no announced commercial partnerships."
  foundedDate: "2021-01-01"
