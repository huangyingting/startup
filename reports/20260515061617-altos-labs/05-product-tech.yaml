callouts:
  - calloutType: risk
    title: "cMyc oncogenicity is the platform's most fundamental unresolved safety risk"
    body: >-
      cMyc (the protein product of the MYC proto-oncogene) is required for efficient reprogramming
      but is also one of the most commonly amplified genes in human cancer. Its role in partial
      reprogramming protocols introduces an unresolved risk: in an aged human cell carrying decades
      of somatic mutations, even brief cMyc expression may push borderline pre-cancerous cells over
      a transformation threshold. The OSK (three-factor) alternative reduces this risk but at a
      cost to reprogramming efficiency that may render the therapeutic window too narrow for
      clinical use. Until this risk is quantified in aged human cells — not just in mouse embryonic
      fibroblasts and young cell lines — partial reprogramming's safety profile in the human
      therapeutic context remains genuinely uncertain.
    claimRefs:
      - CE003
      - CE010
      - CE012
      - CE033
  - calloutType: risk
    title: "In vivo delivery is the critical path item blocking clinical translation"
    body: >-
      No delivery system has yet been demonstrated that achieves the combination of properties
      required for clinical-grade partial reprogramming: tissue specificity (so that OSKM is
      expressed only where needed), controllable kinetics (so that expression can be turned on
      and off on a defined schedule), long-term safety (including no sustained vector persistence
      and no immune toxicity), and manufacturing scalability. AAV faces cargo constraints and
      immune challenges; LNP mRNA delivery is transient but requires repeat dosing; CRISPR-based
      genomic integration raises its own safety questions. Until one of these approaches is
      validated in a non-human primate model under a clinically realistic protocol, every projected
      clinical milestone is contingent on a breakthrough that has not yet occurred.
    claimRefs:
      - CE008
      - CE009
      - CE022
      - CE023
      - CE034

