  - id: research-programs
    title: "Active Research Programs at Altos Labs"
    body: |
      Altos Labs operates through a distributed principal investigator model in which individual
      researchers lead independent programs within three geographic institutes (San Francisco Bay Area,
      Cambridge UK, Kobe Japan), all aligned to the overarching rejuvenation mission. Six core research
      programs are identifiable from public disclosures, publications, and scientific communication
      (Table TE002).

      The flagship program is OSKM partial reprogramming — systematic in vitro characterization of
      cyclic OSKM protocols across diverse cell types including hepatocytes, cardiomyocytes,
      neuronal cells, and muscle satellite cells. The program objectives are to establish safety
      parameters (what OSKM dose, cycle length, and factor combination causes dedifferentiation vs.
      safe partial rejuvenation) and efficacy readouts (how much does the Horvath clock move, do cells
      recover youthful gene expression, does functional capacity improve). Multiple PIs contribute,
      with Yamanaka's advisory influence shaping methodology.

      The epigenetic clock development program, led directly by Steve Horvath, aims to advance beyond
      the first-generation pan-tissue Horvath clock and the 2019 GrimAge clock (which predicts
      mortality risk based on methylation patterns) toward next-generation clocks with superior
      resolution in specific tissue types and responsiveness to experimental interventions. These
      next-generation clocks are essential for detecting subtler rejuvenation effects that early,
      conservative partial reprogramming protocols may produce.

      Manuel Serrano, a world authority on cellular senescence and the senescence-associated secretory
      phenotype (SASP), leads the senescence program at the Cambridge UK institute. Senescent cells —
      cells that have permanently exited the cell cycle while remaining metabolically active — are a
      major driver of tissue aging through the SASP, a cocktail of inflammatory cytokines and matrix
      metalloproteinases that damages adjacent healthy cells. The Serrano program investigates the
      mechanisms that drive senescence onset and the interplay between senescence and epigenetic aging.
      Understanding whether partial reprogramming can prevent or reverse senescence, or must be
      combined with senolytics for optimal effect, is a key research question.

      The in vivo reprogramming program is conducting preclinical studies in mouse models to
      translate in vitro partial reprogramming results to living organisms. This program faces the
      most significant technical hurdles: achieving tissue-targeted, controllable OSKM delivery;
      demonstrating that systemic or localized OSKM expression in adult mice produces measurable
      rejuvenation without tumor formation; and establishing dose-response relationships that will
      inform any future therapeutic window. This program is the critical bridge from proof-of-concept
      to clinical translation.

      The delivery technology program runs in parallel, developing and evaluating AAV serotypes,
      LNP formulations, and other delivery vehicles that can achieve safe, tissue-specific, controllable
      expression of OSKM-encoding nucleic acids. This program has direct IP generation potential,
      as novel delivery systems could be independently valuable outside Altos Labs' own therapeutic
      programs. The multi-organ aging program coordinates research across liver, heart, brain, and
      skeletal muscle tissue contexts, ensuring that rejuvenation biology is not inadvertently
      characterized only in the most tractable experimental system while missing organ-specific
      variation.
