    - type: private-evidence-only
      severity: minor
      topic: human-cell-clock-reversal-data-unavailable
      missingEvidence: >-
        There are no publicly available Altos Labs datasets or publications as of May 2026
        demonstrating epigenetic clock reversal in aged human cells (as opposed to mouse
        cells or immortalized cell lines) under partial reprogramming conditions. The specific
        magnitude and consistency of clock changes in primary human cells under OSKM treatment
        is unknown from public sources.
      whyItMatters: >-
        The central therapeutic value proposition of Altos Labs depends on demonstrating that
        partial reprogramming can reverse the biological age of human cells. Mouse results
        are encouraging but do not establish human translational relevance. The absence of
        published human-cell clock data makes it impossible to assess whether the platform's
        most critical efficacy claim — clock reversal in human cells — is empirically supported.
      diligencePath: >-
        Request any unpublished or in-progress data from Altos Labs on partial reprogramming
        outcomes in primary human cells, including the specific clock displacement observed,
        cell types tested, donor ages, and OSKM protocol parameters used. Review preprint
        servers (bioRxiv) for recent Altos Labs-affiliated preprints on human cell reprogramming.
      relatedQuestionRefs:
        - QE023

