  - id: core-technology
    title: "Core Technology: OSKM Partial Reprogramming Mechanism"
    body: |
      The molecular mechanism underlying partial reprogramming begins with the four Yamanaka transcription
      factors. Oct4 (also known as POU5F1 or OCT3/4) is a master regulator of pluripotency — a
      homeodomain-containing transcription factor that controls chromatin remodeling and activates
      pluripotency gene networks. Sox2 (sex-determining region Y-box 2) cooperates with Oct4 through
      shared binding at composite regulatory elements called Sox-Oct motifs; the two factors together
      activate a broad transcriptional program associated with embryonic stem cell identity. Klf4
      (Krüppel-like factor 4) is a zinc-finger transcription factor that promotes expression of
      pluripotency genes and simultaneously suppresses somatic gene expression programs. cMyc (the
      protein product of the MYC proto-oncogene) is a pleiotropic transcription factor that activates
      thousands of target genes involved in cell cycle progression, ribosome biogenesis, and metabolic
      reprogramming; it dramatically accelerates the kinetics of reprogramming but introduces the
      major oncogenic safety liability of the system.

      In full OSKM reprogramming, continuous expression of all four factors over 10–20 days drives
      a complete erasure of somatic gene expression and epigenetic marks, replacing them with the
      pluripotent state. The resulting iPSCs can theoretically differentiate into any cell type in the
      body. But full reprogramming simultaneously erases cell identity, makes cells incompetent at
      performing their tissue functions, and — critically — risks teratoma formation from any cells
      that fail to properly differentiate if implanted in vivo.

      Partial (cyclic) reprogramming addresses these liabilities by controlling exposure time. In the
      paradigm pioneered at the Salk Institute and now central to Altos Labs research, OSKM factors
      are expressed for short cycles (typically 2–5 days) separated by recovery periods. During the
      expression window, aging-associated epigenetic marks — particularly repressive histone
      modifications and aberrant DNA methylation patterns — begin to reset toward a younger signature.
      Crucially, the transcriptional programs that define cell identity appear more resistant to
      erasure than the epigenetic aging marks, allowing cells to emerge from each reprogramming cycle
      retaining their tissue-specific gene expression while showing reduced biological age by clock
      measurements. The process and its branching risks are schematized in Figure FE001.

      Delivery of OSKM in experimental settings currently uses several systems. In cell culture (in
      vitro), doxycycline-inducible lentiviral constructs allow precise on/off control of factor
      expression. For in vivo rodent studies, adeno-associated virus (AAV) vectors carrying
      doxycycline-inducible OSKM cassettes are the predominant approach; animals receive systemic or
      tissue-targeted AAV injections and are treated with doxycycline on a cyclic schedule. Lipid
      nanoparticles (LNPs) carrying mRNA encoding the Yamanaka factors are an emerging alternative
      being explored for transient delivery without genomic integration. CRISPR-based knock-in of
      inducible OSKM constructs at safe-harbor genomic loci is a longer-term research direction.

      A key safety-oriented modification is the use of OSK (three factors, omitting cMyc) in some
      experimental protocols. Because cMyc is the primary oncogenic liability, OSK-only regimens
      reduce cancer risk at the cost of reprogramming efficiency — cells reprogram more slowly and
      require longer factor exposure. Research at multiple institutions including some Altos Labs
      programs is evaluating OSK vs OSKM trade-offs to define the minimum factor set that achieves
      meaningful epigenetic rejuvenation without unacceptable cancer risk.
