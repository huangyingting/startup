  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: altos-labs-publications-output-unavailable
      missingEvidence: >-
        Altos Labs has not published a comprehensive list of peer-reviewed publications as of May 2026.
        While researchers at Altos Labs may have published individual papers through their institutional
        affiliations, the company has not issued a public portfolio of research outputs, patent filings,
        or a formal scientific progress report. The volume and quality of published scientific output
        from 300+ scientists working since 2021 is opaque.
      whyItMatters: >-
        Scientific output — publications and patents — is the primary indicator of progress for a
        pure-discovery company like Altos Labs. In the absence of clinical milestones, revenue, or
        products, published science is how the company demonstrates that its capital is generating
        knowledge. Without visibility into publication volume, quality (journal tier), and content
        (what results have been achieved), it is impossible to assess whether the platform is
        advancing on schedule or whether the 2027+ preclinical transition is realistic.
      diligencePath: >-
        Request a complete list of publications, preprints, and patent filings authored by Altos Labs
        employees or researchers since founding (2021–May 2026). Review patent office databases
        (USPTO, EPO) for Altos Labs patent applications covering reprogramming protocols, delivery
        methods, and epigenetic measurement tools. Review bioRxiv and medRxiv for preprint submissions.
      relatedQuestionRefs:
        - QE003
        - QE004
        - QE025

    - type: private-evidence-only
      severity: material
      topic: in-vivo-delivery-solution-status-unknown
      missingEvidence: >-
        There is no public disclosure indicating that Altos Labs has identified or validated a
        delivery approach for in vivo OSKM expression in non-human primates or that it has
        achieved clinically realistic controllable OSKM delivery in any mammalian model. The
        specific delivery research programs being conducted, and their current status, are not
        publicly known.
      whyItMatters: >-
        In vivo delivery is the critical path constraint for clinical translation. If Altos Labs
        has a credible delivery solution in late-stage preclinical validation, the timeline to
        IND could be much shorter than projected. If delivery remains unsolved, the 2030–2032
        IND projection is optimistic. An investor cannot assess clinical translation risk without
        knowing the current state of the delivery program.
      diligencePath: >-
        Request detailed briefings from Altos Labs delivery technology team on current AAV
        serotype performance data in aged mouse and primate models; LNP mRNA delivery efficiency
        and durability data; and assessment of any CRISPR-based knock-in approach under evaluation.
        Request any interim non-human primate safety data from delivery feasibility studies.
      relatedQuestionRefs:
        - QE009
        - QE017

