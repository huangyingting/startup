figures:
  - id: FE001
    title: "Partial Reprogramming Mechanism: OSKM Expression Pathway and Oncogenic Risk Branch"
    type: flow
    layout: wide
    summary: >-
      Flow diagram showing the two-branch outcome of OSKM factor expression in an aging differentiated
      cell. The left (safe) branch follows controlled cyclic expression through epigenetic remodeling
      to a rejuvenated cell that retains its original identity. The right (danger) branch shows what
      occurs under over-expression or prolonged exposure: dedifferentiation proceeds to iPSC state
      or, worse, chromosomal instability and cancer risk. The diagram illustrates why temporal control
      of OSKM expression — the central technical challenge of the Altos Labs platform — is not merely
      an optimization parameter but a categorical safety requirement.
