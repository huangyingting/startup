  - id: runway-scenarios
    title: "Runway Scenarios and Capital Adequacy"
    body: |
      Applying the burn rate estimates to the $3 billion raised in January 2022, and noting that approximately
      4.3 years have elapsed through the May 2026 report date, we derive three runway scenarios anchored to
      conservative, base, and aggressive burn assumptions.

      Under the conservative scenario (annual burn: $250 million), cumulative spend through May 2026 is
      approximately $1.1 billion, leaving roughly $1.9 billion of the original $3 billion intact. At this
      burn rate, the remaining capital supports approximately 7.5 more years of operation, implying no
      re-raise requirement before 2033–2034. Under the base scenario (annual burn: $350 million), cumulative
      spend is approximately $1.5 billion, leaving roughly $1.5 billion. At continued $350 million annual
      burn, this provides approximately 4.3 additional years of runway, pointing to a required capital raise
      around 2030–2031. Under the aggressive scenario (annual burn: $450 million), cumulative spend exceeds
      $1.9 billion, leaving less than $1.1 billion and an implied runway of only 2.5 additional years before
      a re-raise is needed.

      The base scenario is considered the most likely outcome given the staffing levels, multi-institute
      operations, and equipment costs described in the burn rate analysis. All three scenarios assume no
      incremental revenue, no headcount reductions, and no capital market activity. A re-raise of even
      $1–2 billion would materially extend the runway but would introduce new investors or require existing
      investors to re-up at a valuation that is difficult to establish without clinical-stage assets. See
      Table TI003 for the full scenario matrix and Figure FI003 for the visual runway range.
    claimRefs:
      - CI020
      - CI021
      - CI022
      - CI023
      - CI033
    tableRefs:
      - TI003
    figureRefs:
      - FI003

  - id: financial-risks
    title: "Financial Risks and Capital Dependency"
    body: |
      Altos Labs faces a concentrated set of financial risks that are atypical for biotechnology companies
      of its scientific scale. Unlike clinical-stage biotechs that can raise follow-on rounds tied to Phase 1
      or Phase 2 milestones, Altos Labs has no clinical assets, no demonstrated preclinical-to-IND pathway,
      and no revenue against which to validate a revised valuation.

      The most material risk is total capital dependency: with zero revenue and a 100% reliance on the $3
      billion raised in January 2022, any sustained deviation from expectations — whether in scientific
      progress, investor priorities, or capital markets conditions — creates immediate funding vulnerability.
      The single-round structure provides no staged milestone-based capital release mechanism of the kind
      that institutional VC funds impose on portfolio companies. There are no tranche releases, no milestone
      unlocks, and no disclosed covenants. Once the capital is consumed, a full re-raise is required.

      A second major risk involves investor composition. Tech-entrepreneur capital — Bezos, Milner, Altman —
      historically operates with shorter time horizons than academic endowments (HHMI, Wellcome Trust) or
      sovereign wealth funds. While all investors in the 2022 round were understood to be committing to a
      long-duration scientific mission, there is no publicly disclosed agreement governing investor support
      for a future round. If any major anchor investor shifts priorities, the likelihood of a successful
      re-raise diminishes significantly. Financial reporting by the Financial Times and The Economist has
      raised questions about the value-creation timeline, noting that the absence of clinical programs means
      investors cannot assess scientific progress against any externally validated benchmark.

      Capital markets risk also bears mention: rising interest rates since 2022 have raised the risk-free
      hurdle for illiquid, long-duration assets, making patient capital invested in pre-commercial biology
      relatively less attractive versus fixed-income alternatives. A re-raise in the current or near-future
      rate environment will face higher required return expectations from investors than the 2022 round did.
