company:
  name: "Altos Labs"
chapter:
  number: 4
  title: "Financials"
  summary: >-
    Altos Labs' financials are defined by a single landmark event: the $3 billion equity raise closed
    in January 2022 — one of the largest private biotech funding rounds in history — backed by Jeff Bezos
    (Bezos Expeditions), Yuri Milner (DST Global), Sam Altman, Vulcan Capital (Paul Allen estate), and
    ARCH Venture Partners. As of May 2026, the company has not disclosed any subsequent funding rounds,
    revenue, commercial products, or licensing agreements. The company operates as a pure-discovery
    research institution with zero revenue, burning through capital at an estimated $300–450 million per
    year across three global research institutes (US, UK, Japan) and a staff exceeding 300 scientists.
    With approximately 4.3 years elapsed since the raise and an estimated $1.1–1.7 billion of capital
    remaining as of May 2026, the implied additional runway ranges from roughly 3 to 5 years under base
    assumptions — indicating a likely need for additional capital before 2030. Key financial risks include
    total capital dependency on a non-institutional investor syndicate, the absence of any staged-milestone
    capital release mechanism, limited secondary market liquidity for early investors, and the absence of a
    near-term IPO or M&A path.

sections:
  - id: funding-overview
    title: "The $3 Billion Raise and Capital Structure"
    body: |
      Altos Labs closed its founding capital round in January 2022, raising $3 billion in a single tranche
      of equity financing with no publicly disclosed debt component. The round represents one of the largest
      single private biotech financing events in history, eclipsing the typical Series A for a clinical-stage
      biotechnology company by roughly two orders of magnitude and dwarfing the combined announced funding of
      every direct competitor in the cellular reprogramming and longevity biotech space.

      The capital structure is unusual in that it is anchored by high-net-worth individuals and family offices
      rather than traditional institutional life-science limited-partner funds. Jeff Bezos participated through
      Bezos Expeditions, his personal investment vehicle; Yuri Milner through DST Global, his technology
      investment firm; Vulcan Capital, the investment arm of the Paul Allen estate; Sam Altman in a personal
      capacity; and ARCH Venture Partners as the sole institutional deep-science venture firm in the syndicate.
      This composition gives the company patient capital but concentrates re-raise risk in the hands of a
      small group whose investment priorities could shift.

      The post-money valuation at close was approximately $3 billion — effectively equal to the amount raised —
      reflecting the pre-revenue, pre-clinical nature of the company and the explicitly communicated 15-to-20-year
      research horizon. No secondary market trades, structured financing vehicles, or convertible note tranches
      have been disclosed. The company has operated entirely on this single capital raise since inception. See
      Table TI001 for the full funding history and Figure FI001 for the estimated capital consumption waterfall.
    claimRefs:
      - CI001
      - CI002
      - CI011
      - CI012
      - CI013
      - CI014
