  - id: FI003
    title: "Altos Labs Remaining Runway Scenarios (Years from May 2026)"
    type: range
    layout: standard
    summary: >-
      Range chart showing the estimated additional runway for Altos Labs from May 2026 under three burn
      scenarios. The bull case (low $250M/yr burn) implies approximately 7.7 more years of capital;
      the base case ($350M/yr) implies approximately 4.3 more years; the bear case ($450M/yr) implies
      approximately 2.4 more years. All ranges are based on estimated remaining capital of ~$1.1–1.9
      billion as of May 2026 and carry substantial uncertainty. A re-raise before capital exhaustion
      is likely required under base and bear scenarios.
    data:
      items:
        - label: "Bull Case ($250M/yr burn)"
          low: 6.5
          mid: 7.7
          high: 9.0
          unit: "years"
          note: "~$1.9B remaining ÷ $250M/yr; high end reflects potential cost reductions"
        - label: "Base Case ($350M/yr burn)"
          low: 3.5
          mid: 4.3
          high: 5.2
          unit: "years"
          note: "~$1.5B remaining ÷ $350M/yr; range reflects estimation uncertainty in remaining capital"
        - label: "Bear Case ($450M/yr burn)"
          low: 1.8
          mid: 2.4
          high: 3.0
          unit: "years"
          note: "~$1.1B remaining ÷ $450M/yr; low end reflects further burn acceleration"
    approximationNotes: >-
      All values are analytical estimates. Remaining capital at the base case is approximately $1,495M
      based on $3,000M raised minus $1,505M estimated spend over 4.3 years. Conservative and aggressive
      remaining capital figures are $1,925M and $1,065M respectively. Range bounds include ±20%
      uncertainty on the remaining capital estimate. No revenue, debt service, or capital-markets
      activities assumed. Not an audited projection.
    claimRefs:
      - CI005
      - CI020
      - CI021
      - CI022
      - CI023

callouts:
  - calloutType: risk
    title: "Complete financial diligence is impossible — no public financials exist"
    body: >-
      Altos Labs is a private Delaware corporation with no public company reporting obligations. It has
      not published audited financial statements, Form 990 (it is not a nonprofit), or any other financial
      disclosure. Every financial figure in this chapter is an estimate derived from publicly available
      headcount data, compensation benchmarks, and comparable-institution analysis. Before any investment
      or partnership decision, an investor must demand audited financials, a current capitalization table,
      a board-approved budget, and confirmation of the remaining cash position directly from management.
      The absence of public financials is the single most significant diligence blocker in this chapter.
    claimRefs:
      - CI003
      - CI033
  - calloutType: risk
    title: "Re-raise risk is material — likely capital raise needed before 2030–2031 at base burn"
    body: >-
      Under the base-case burn assumption ($350M/yr), Altos Labs' estimated $1.5 billion of remaining
      capital as of May 2026 supports approximately 4 additional years of operation. This implies a
      re-raise requirement around 2030–2031 — before the company would be expected to have any
      approved clinical programs or revenue. A re-raise at that stage will require either anchor
      investors (Bezos, Milner) to re-commit, or new investors to enter at a valuation supported
      solely by preclinical scientific publications and platform progress. The difficulty of establishing
      a fair valuation for a pre-clinical research platform with no commercial products creates material
      re-raise execution risk.
    claimRefs:
      - CI022
      - CI023
      - CI025

