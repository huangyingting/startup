  - id: burn-rate-analysis
    title: "Burn Rate Estimation and Cost Structure"
    body: |
      Altos Labs has not disclosed its financial statements, annual burn rate, or cash position. All burn
      rate figures in this chapter are analytical estimates derived from headcount proxies, research institute
      comparables, and publicly available benchmarks for research-intensive science organizations.

      The primary cost driver is labor. With 300+ full-time researchers and support staff, and reported
      compensation packages for senior scientists exceeding $1 million per year for principal investigators,
      the total salary and benefits burden is estimated at $120–180 million annually. The company operates
      three physical research institutes — in San Francisco Bay Area, Cambridge (UK), and Kobe (Japan) —
      each requiring facility leases, specialized laboratory equipment, consumables, and administrative
      overhead. Multi-site operations of this scale typically add another $50–100 million in facility and
      non-labor costs. Equipment expenditure for advanced molecular biology and genomics platforms (ATAC-seq,
      whole-genome methylation sequencing, cell imaging, CRISPR screening) can easily add $30–60 million per
      year in capital equipment depreciation and consumable spend.

      Aggregating these components, the central estimate for Altos Labs' annual cash burn is $300–450 million,
      with a base case of approximately $350 million per year. For comparison, the Howard Hughes Medical
      Institute (HHMI), a far larger scientific endowment with ~$30 billion in assets, spends approximately
      $500 million per year on research programs. The Broad Institute has an annual operating budget of roughly
      $800 million but supports a research community of approximately 3,000 scientists — roughly ten times
      Altos Labs' headcount — implying a cost-per-scientist significantly higher at Altos due to compensation
      premiums. Table TI002 benchmarks Altos Labs against comparable institutions. Figure FI002 illustrates
      the funding disparity across the longevity biotech peer group.
    claimRefs:
      - CI005
      - CI006
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI027
