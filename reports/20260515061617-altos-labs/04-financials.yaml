  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: altos-labs-actual-financials-unavailable
      missingEvidence: >-
        Altos Labs has not published audited financial statements, a balance sheet, a cash flow statement,
        or any other formal financial disclosure as of May 2026. The company is a private Delaware
        corporation with no SEC reporting obligations and has not applied for nonprofit status. All burn
        rate and capital adequacy figures in this chapter are analytical estimates based on headcount
        proxies, compensation benchmarks, and comparable-institution analysis. The exact cash position,
        annual expenditure, and capitalization table are private.
      whyItMatters: >-
        The absence of public financials means that every capital adequacy assessment in this chapter
        carries material estimation uncertainty. Under the conservative scenario, Altos Labs has 7+
        years of runway; under the aggressive scenario, as few as 2.4 years. This 5-year gap is
        entirely unresolvable without access to actual financials. An investor cannot underwrite
        Altos Labs' capital adequacy without requesting and receiving audited financials under NDA.
      diligencePath: >-
        Request audited financial statements directly from Altos Labs management for fiscal years
        2022–2025; require a current cash position confirmation as of the most recent quarter end;
        review the board-approved annual budget; request a fully diluted capitalization table showing
        all equity holders and their entry valuations. These are standard pre-investment diligence
        items that no amount of public-source research can substitute.
      relatedQuestionRefs:
        - QI003
        - QI006
        - QI013

    - type: private-evidence-only
      severity: material
      topic: re-raise-investor-commitment-undisclosed
      missingEvidence: >-
        There are no disclosed investor agreements, side letters, or re-up commitments from any of
        the Altos Labs investors (Bezos Expeditions, DST Global, Vulcan Capital, Sam Altman, ARCH
        Venture Partners) regarding future funding rounds. It is not known whether any investor has
        committed to participate in a future round or under what conditions they would do so.
      whyItMatters: >-
        The probability of a successful re-raise around 2030–2031 is one of the most important
        forward-looking financial risk factors for Altos Labs. If anchor investors (Bezos, Milner)
        have informally committed to future rounds, this risk is substantially mitigated. If there
        are no such commitments, the company faces a cold-start fundraising challenge from a
        pre-commercial position with no revenue or clinical milestones.
      diligencePath: >-
        Request any side letters or re-up commitments from the existing investor syndicate; understand
        whether ARCH Venture Partners or other investors have explicit fund mandates that would support
        a future round; understand whether a new institutional life-science fund has been recruited to
        the Altos board or cap table since the 2022 close.
      relatedQuestionRefs:
        - QI022
        - QI025

    - type: enumeration-incomplete
      severity: minor
      topic: funding-history-table-partial-coverage
      missingEvidence: >-
        TI001 covers only the January 2022 $3 billion announced round and a placeholder for
        the pre-formation period. Any undisclosed bridge financing, side-car investments, laboratory
        infrastructure funding, or instrument financing arranged between January 2022 and May 2026
        would not appear in public sources and is not captured in TI001.
      whyItMatters: >-
        If Altos Labs arranged any debt financing, equipment leases capitalized as liabilities, or
        bridge notes to address near-term cash management, the net capital position would differ
        from the simple $3B minus cumulative burn estimate. This would affect both the remaining
        capital estimates in TI003 and the runway scenarios in FI003.
      diligencePath: >-
        Request a complete capitalization table and debt schedule from management, including any
        equipment finance agreements, real estate lease obligations (capital vs. operating classification),
        or convertible instruments. Review any disclosed credit facility agreements.
      relatedTableRefs:
        - TI001
      relatedQuestionRefs:
        - QI001
        - QI010

