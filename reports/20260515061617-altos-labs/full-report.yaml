      - number: '1.2'
        title: Leadership, Founders, and Scientific Advisory Board
        blocks:
          - type: paragraph
            body: >
              Altos Labs assembled one of the most credentialed leadership and advisory groups in biotechnology history,

              drawing on Nobel laureates, former government science officials, and veteran pharmaceutical executives.


              Hal Barron serves as Chief Executive Officer. Barron previously served as Chief Scientific Officer and
              Head

              of R&D at GlaxoSmithKline (GSK), where he oversaw the pharmaceutical giant's entire research portfolio.

              His appointment signaled a focus on translational rigor even within a pure discovery mandate. Rick
              Klausner

              is the principal co-founder and architect of the Altos Labs vision. Klausner served as Director of the

              National Cancer Institute (NCI) under President Clinton and later as Chief Technology Officer of Warner

              Bros Discovery, a rare combination of government science leadership and media-tech experience that
              informed

              his thesis on reprogramming biology.


              Hans Bishop, the former CEO of Juno Therapeutics (acquired by Celgene for $9 billion), served as early

              president during the formation phase, lending cell-therapy operational credibility. The Scientific
              Advisory

              Board includes three Nobel laureates: Shinya Yamanaka (Nobel 2012, iPSC discovery), Jennifer Doudna

              (Nobel 2020, CRISPR-Cas9 genome editing), and David Baltimore (Nobel 1975, viral oncogenes). Steve
              Horvath,

              known for developing the "epigenetic clock" that measures biological age via DNA methylation, joined as a

              researcher. Manuel Serrano, a leading expert in cellular senescence at the Barcelona Institute for Science

              and Technology, serves as a Principal Investigator at the Cambridge, UK institute.


              This extraordinary concentration of scientific credibility serves dual purposes: it validates the
              company's

              scientific approach to external stakeholders and enables recruiting of top-tier molecular biologists with

              compensation reportedly exceeding $1 million per year. See Table TO002 below for the full leadership
              roster.
