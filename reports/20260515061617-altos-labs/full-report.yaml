  - id: FE001
    title: 'Partial Reprogramming Mechanism: OSKM Expression Pathway and Oncogenic Risk Branch'
    type: flow
    layout: wide
    summary: >-
      Flow diagram showing the two-branch outcome of OSKM factor expression in an aging differentiated cell. The left
      (safe) branch follows controlled cyclic expression through epigenetic remodeling to a rejuvenated cell that
      retains its original identity. The right (danger) branch shows what occurs under over-expression or prolonged
      exposure: dedifferentiation proceeds to iPSC state or, worse, chromosomal instability and cancer risk. The diagram
      illustrates why temporal control of OSKM expression — the central technical challenge of the Altos Labs platform —
      is not merely an optimization parameter but a categorical safety requirement.
    data:
      nodes:
        - id: aging-cell
          label: |-
            Aging Cell
            (epigenetic drift, hallmarks of aging)
          type: start
        - id: oskm-transient
          label: |-
            Controlled Cyclic OSKM Expression
            (brief pulses, then off)
          type: process
        - id: oskm-overexpressed
          label: |-
            OSKM Over-expression
            (continuous or prolonged)
          type: danger
        - id: epigenetic-remodeling
          label: |-
            Epigenetic Remodeling
            (clock reversal, histone resetting)
          type: process
        - id: rejuvenated-cell
          label: |-
            Rejuvenated Cell
            (younger epigenetic marks, identity preserved)
          type: end-success
        - id: dedifferentiation
          label: |-
            Dedifferentiation
            (loss of tissue-specific identity)
          type: danger
        - id: ipsc-cancer
          label: |-
            iPSC State / Cancer Risk
            (cMyc-driven oncogenesis, teratoma)
          type: end-danger
      edges:
        - from: aging-cell
          to: oskm-transient
          label: Safe protocol
        - from: aging-cell
