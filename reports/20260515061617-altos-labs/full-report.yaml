      - number: '6.2'
        title: 'Potential Customer Segments: Who Could Pay, and When'
        blocks:
          - type: paragraph
            body: |
              Despite having no current customers, Altos Labs' technology platform has identifiable segments
              of potential future customers. Large pharmaceutical companies with annual R&D budgets exceeding
              $1 billion are the most plausible near-term commercial partners: they have the capital to fund
              long-horizon research collaborations and the institutional mandate to in-license platform
              technologies before human proof-of-concept (CU009). Academic medical centers — including major
              research hospitals affiliated with the NIH and Howard Hughes Medical Institute — represent a
              second tier of potential customers for Altos Labs' reprogramming assays and biological tools
              (CU010).

              Biotechnology companies focused on age-related diseases (Alzheimer's, Parkinson's, cardiovascular
              fibrosis) represent potential downstream customers for spinout therapeutics that Altos Labs'
              core platform could seed (CU011). Government funders, principally the NIH National Institute on
              Aging (NIA) and private foundations such as HHMI and Gates, represent non-dilutive revenue
              channels through grants and collaborative research agreements (CU012). Diagnostic and precision
              medicine companies could potentially license Altos Labs' proprietary epigenetic clock tools and
              aging biomarker panels for clinical research use (CU013).

              Consumer longevity and wellness markets are explicitly not near-term customers: the absence of
              FDA-approved anti-aging indications and the lack of any human safety data make consumer product
              development implausible within a 5-year horizon (CU014). Technology licensing precedents from
              Genentech and BioNTech confirm that pharma partnerships represent the most historically validated
              path to early revenue for research-stage biology platforms (CU015). None of the prospective
              customer segments identified here has publicly signed with Altos Labs as of May 2026 (CU017).

              Table TU001 enumerates the distinct customer segments with estimated engagement timelines and
              priorities. Figure FU003 plots each segment on a two-dimensional attractiveness vs. readiness
              matrix.
