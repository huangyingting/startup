      - number: '6.4'
        title: 'Customer Development Risks: Structural and Execution Barriers'
        blocks:
          - type: paragraph
            body: |
              Altos Labs faces several structural and execution risks that are specific to longevity biology
              commercialization. The first is definitional: longevity biotechnology companies face inherent
              difficulty in defining a paying customer because disease prevention does not map cleanly onto
              existing pharmaceutical reimbursement frameworks — payers reimburse treatments for diagnosed
              conditions, not the biological aging process (CU026). This structural mismatch means that even
              if Altos Labs achieves robust scientific results, the commercial pathway to a reimbursable
              indication is entirely undefined.

              The second risk is pre-clinical status: potential pharma customers and collaborators cannot
              evaluate in-human efficacy evidence before signing a commercial agreement because no such
              evidence exists — Altos Labs' most advanced programs are in vitro or early animal models (CU027).
              IP competition from Calico, NewLimit, Retro Biosciences, and academic programs at HHMI
              institutions reduces Altos Labs' leverage in any future licensing negotiation (CU028).

              Capital runway risk intensifies if revenue does not materialize: if no commercial partnership
              or grant revenue is secured by approximately 2030, the company would almost certainly require
              an additional capital raise, introducing dilution and investor pressure risk (CU029). Without
              any named customer proof, Altos Labs' commercial credibility rests entirely on scientific
              reputation and the association of high-profile backers — a fragile foundation in the event of
              scientific setbacks or adverse publications (CU030).
            claimRefs:
              - CU026
