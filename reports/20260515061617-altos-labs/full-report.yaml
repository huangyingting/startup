      - number: '5.6'
        title: Exhibits
        blocks:
          - type: callout
            title: cMyc oncogenicity is the platform's most fundamental unresolved safety risk
            body: >-
              cMyc (the protein product of the MYC proto-oncogene) is required for efficient reprogramming but is also
              one of the most commonly amplified genes in human cancer. Its role in partial reprogramming protocols
              introduces an unresolved risk: in an aged human cell carrying decades of somatic mutations, even brief
              cMyc expression may push borderline pre-cancerous cells over a transformation threshold. The OSK
              (three-factor) alternative reduces this risk but at a cost to reprogramming efficiency that may render the
              therapeutic window too narrow for clinical use. Until this risk is quantified in aged human cells — not
              just in mouse embryonic fibroblasts and young cell lines — partial reprogramming's safety profile in the
              human therapeutic context remains genuinely uncertain.
            calloutType: risk
            claimRefs:
              - CE003
              - CE010
              - CE012
              - CE033
          - type: callout
            title: In vivo delivery is the critical path item blocking clinical translation
            body: >-
              No delivery system has yet been demonstrated that achieves the combination of properties required for
              clinical-grade partial reprogramming: tissue specificity (so that OSKM is expressed only where needed),
              controllable kinetics (so that expression can be turned on and off on a defined schedule), long-term
              safety (including no sustained vector persistence and no immune toxicity), and manufacturing scalability.
              AAV faces cargo constraints and immune challenges; LNP mRNA delivery is transient but requires repeat
              dosing; CRISPR-based genomic integration raises its own safety questions. Until one of these approaches is
              validated in a non-human primate model under a clinically realistic protocol, every projected clinical
              milestone is contingent on a breakthrough that has not yet occurred.
            calloutType: risk
            claimRefs:
              - CE008
              - CE009
              - CE022
              - CE023
              - CE034
  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: 'No Commercial Customers: Altos Labs Is Entirely Pre-Revenue'
        blocks:
          - type: paragraph
            body: |
              As of May 2026, Altos Labs has no commercial customers, no product revenue, and no disclosed
              licensing agreements. The company's official website contains no product page, no pricing
              information, and no commercial offering of any kind (CU001, CU006). The company was founded in
              January 2022 with approximately $3 billion in investor funding and has spent its first three
              years building laboratory infrastructure and recruiting scientific staff (CU002). No pharmaceutical
              partnership deals have been publicly announced since founding, and no revenue of any type has
              been disclosed to investors or the public (CU003).

              Altos Labs officially describes itself as a basic research institution whose mission is to
              understand the science of cellular rejuvenation, not to develop drugs (CU005). The company
              operates collaborative research relationships with scientists at UCSF, Cambridge, Oviedo, and
              its San Francisco Bay Area campus — these are academic knowledge-exchange arrangements, not
              commercial agreements (CU007). Nobel laureates Shinya Yamanaka, Jennifer Doudna, and David
              Baltimore serve as scientific advisors, lending scientific credibility that may attract future
              partners but is not itself a revenue-generating relationship (CU008).

              Table TU002 maps the current stakeholder and engagement landscape, and Table TU005 provides
              the named customer proof table showing that all engagements to date are academic or advisory
              in nature. Figure FU001 illustrates the projected timeline from current stage to potential
              first commercial engagement.
