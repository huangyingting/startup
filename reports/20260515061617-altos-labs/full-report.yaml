      - number: '5.5'
        title: 'Research Pipeline: From Discovery to Clinical Application'
        blocks:
          - type: paragraph
            body: |
              The Altos Labs pipeline is unlike any conventional biotechnology development program. There are
              no clinical-stage assets, no IND filings, and no approved products. The "pipeline" at this
              stage is better described as a staged research roadmap with major phase transitions driven by
              biological milestones rather than clinical milestones (Table TE003).

              The company is currently in the Discovery Phase, which began with its founding in 2021 and is
              expected to run through approximately 2027. During this phase, the primary outputs are
              peer-reviewed publications, intellectual property (patents on delivery methods, reprogramming
              protocols, and epigenetic measurement tools), and the characterization of safe and efficacious
              in vitro partial reprogramming conditions across multiple cell types. The goal of the Discovery
              Phase is to establish the scientific foundation — confirming that partial reprogramming can
              reproducibly move the epigenetic clock in human cells without triggering dedifferentiation or
              genomic instability, and defining the quantitative parameters (exposure duration, factor
              combination, cycle interval) that optimize the rejuvenation-to-risk ratio.

              The Preclinical Development Phase, projected for approximately 2027–2030, would transition the
              most validated in vitro protocols into in vivo models — first in mice, then potentially in
              non-human primates. Key milestones in this phase would include: demonstration of safe systemic
              or targeted OSKM delivery using a clinical-grade vector or formulation; evidence of tissue-level
              epigenetic clock reversal in aged animals; functional improvements in disease-relevant readouts
              (e.g., muscle strength, cardiac function, retinal acuity); and completion of IND-enabling
              studies including toxicology, biodistribution, and manufacturing qualification. The success
              criteria include reproducible efficacy across multiple mammal species with no tumor formation
              over a 12-month observation window.

              An IND Filing / Phase 0 study for the first human safety assessment is projected for approximately
              2030–2032, though this timeline is highly uncertain given the unresolved delivery challenges and
              the need for regulatory alignment. Phase 1 human safety studies would follow, likely in a specific
              disease indication rather than healthy aging, with a primary endpoint of safety and tolerability
              plus biomarker response (epigenetic clock change). Phase 2/3 efficacy studies, projected for
              the 2035–2042+ window, represent the final and most uncertain stage of the development path.

              The estimated time from founding to Phase 1 is 11–14 years (2032–2035), and to Phase 2/3
              completion 14–21 years (2035–2042+). These timelines are illustrated in Figure FE003. For
              context, even the fastest gene therapy development programs have taken 7–10 years from IND to
              approval; Altos Labs has not yet filed an IND. The company's own founders have communicated
              a 15–20 year research horizon to investors and the public. This is not a technology company
              approaching commercial launch — it is a scientific institution in the earliest stages of
              establishing whether its core hypothesis is therapeutically actionable at all.
