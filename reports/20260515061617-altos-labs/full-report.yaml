      estimated assuming $350M/yr burn rate and $1.1–1.7B remaining capital. Scientific stage is based on publicly
      disclosed research agenda; no internal data is available. IP position reflects the absence of publicly confirmed
      granted patents from Altos Labs. Risk rating reflects the combined probability of the Bear Case (35%) and sub-par
      Base Case outcomes in the scenario analysis.
