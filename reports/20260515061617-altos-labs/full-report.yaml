      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Unity Biotechnology's Phase 2 Failure Is the Defining Cautionary Precedent
            body: >-
              Unity Biotechnology's 2020 Phase 2 trial failure of UBX0101 for knee osteoarthritis is the most important
              competitive data point for evaluating Altos Labs' risk profile. The failure demonstrates that (a)
              mechanistically sound longevity hypotheses (senescent cell clearance) can fail to translate into clinical
              efficacy in specific disease contexts, (b) preclinical models of aging do not reliably predict human
              outcomes, and (c) the path from basic science to Phase 2 proof-of-concept is long, expensive, and
              uncertain even for highly credentialed, well-funded teams. Altos Labs' cellular reprogramming approach
              faces comparable or greater translational uncertainty — it has not yet demonstrated safety in any human
              cell model, let alone in an IND study. Investors should weight the Unity precedent heavily when evaluating
              Altos Labs' development timeline and capital requirements.
            calloutType: risk
            claimRefs:
              - CP007
              - CP008
              - CP035
              - CP036
          - type: callout
            title: Capital Scale Is Altos Labs' Most Durable Near-Term Competitive Moat
            body: >-
              In a sector where translational timelines stretch 15–20 years from basic science to regulatory approval,
              the primary survival resource is capital. Altos Labs' $3 billion capital base — 17× Retro Biosciences and
              75× NewLimit — creates a research runway that no direct competitor can match. This capital advantage
              compounds: Altos Labs can recruit the world's best biologists with above-market compensation (reported
              exceeding $1 million per year), operate three independent research institutes simultaneously, and absorb
              multiple failed experimental directions without existential threat. Smaller competitors (NewLimit, Retro)
              could generate breakthrough insights, but are unlikely to have the capital depth to convert those insights
              into clinical programs without external funding that could dilute or redirect their mission.
            calloutType: insight
            claimRefs:
              - CP019
              - CP030
              - CP036
              - CP037
          - type: callout
            title: Pharmaceutical Giants Are the Unpriced Latent Competitive Risk
            body: >-
              The largest unpriced competitive risk in the longevity sector is not Calico, Retro, or NewLimit — it is
              the potential entry of large pharmaceutical companies once the basic science is sufficiently de-risked.
              Pfizer, Novartis, AstraZeneca, and Genentech/Roche individually spend $5–15 billion annually on R&D. If
              and when partial reprogramming demonstrates compelling preclinical safety and longevity signals in
              mammals, these companies could redirect substantial internal resources toward the mechanism or acquire key
              scientific assets (including potentially Altos Labs itself). Altos Labs' strategy appears to accept this
              risk — its patient-capital structure and Nobel-brand scientific credibility may position it as a desirable
              acquisition target or licensing partner rather than a direct head-to-head competitor with big pharma. This
              dynamic is not a failure mode but an exit strategy possibility.
            calloutType: risk
            claimRefs:
              - CP036
              - CP037
  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: The $3 Billion Raise and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Altos Labs closed its founding capital round in January 2022, raising $3 billion in a single tranche

              of equity financing with no publicly disclosed debt component. The round represents one of the largest

              single private biotech financing events in history, eclipsing the typical Series A for a clinical-stage

              biotechnology company by roughly two orders of magnitude and dwarfing the combined announced funding of

              every direct competitor in the cellular reprogramming and longevity biotech space.


              The capital structure is unusual in that it is anchored by high-net-worth individuals and family offices

              rather than traditional institutional life-science limited-partner funds. Jeff Bezos participated through

              Bezos Expeditions, his personal investment vehicle; Yuri Milner through DST Global, his technology

              investment firm; Vulcan Capital, the investment arm of the Paul Allen estate; Sam Altman in a personal

              capacity; and ARCH Venture Partners as the sole institutional deep-science venture firm in the syndicate.

              This composition gives the company patient capital but concentrates re-raise risk in the hands of a

              small group whose investment priorities could shift.


              The post-money valuation at close was approximately $3 billion — effectively equal to the amount raised —

              reflecting the pre-revenue, pre-clinical nature of the company and the explicitly communicated
              15-to-20-year

              research horizon. No secondary market trades, structured financing vehicles, or convertible note tranches

              have been disclosed. The company has operated entirely on this single capital raise since inception. See

              Table TI001 for the full funding history and Figure FI001 for the estimated capital consumption waterfall.
