      - number: '2.3'
        title: Market Demand Drivers and Growth Catalysts
        blocks:
          - type: paragraph
            body: |
              The longevity and anti-aging market is propelled by five primary demand drivers operating at
              different timescales. First, demographic inevitability: the global population aged 65 and older
              is projected to exceed 1.5 billion by 2050 according to the World Health Organization, and over
              10,000 Americans turn 65 each day. This creates structural, growing demand for products and
              treatments addressing age-related decline. Second, the billionaire-fueled investment wave of
              2021–2022: Altos Labs ($3 billion), Retro Biosciences ($180 million from Sam Altman), NewLimit
              ($40 million from Brian Armstrong), and Unity Biotechnology's historical $700+ million raised
              represent a historically unprecedented private capital commitment to longevity science. The US
              National Institutes of Health invested over $3.8 billion in aging research annually circa 2023,
              providing public sector support.

              Third, the healthspan-over-lifespan paradigm shift: scientists and entrepreneurs increasingly
              focus on extending the period of healthy, disease-free life rather than maximum lifespan, aligning
              longevity with mainstream preventive medicine and making the market more legible to healthcare
              payers. Fourth, advances in epigenomics: the discovery of the Hallmarks of Aging framework —
              cataloguing 9 to 14 molecular mechanisms of aging — provides a scientific taxonomy that makes
              longevity research tractable, attracts academic talent, and creates investment thesis clarity.
              Fifth, AI and genomics enabling faster research: machine learning tools for single-cell analysis,
              protein structure prediction, and multi-omic integration are accelerating discovery timelines that
              previously required a decade of bench work.
