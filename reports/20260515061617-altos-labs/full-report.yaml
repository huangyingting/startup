      - number: '1.5'
        title: Key Milestones and Scientific Trajectory
        blocks:
          - type: paragraph
            body: |
              The scientific lineage that gave rise to Altos Labs spans two decades of foundational biology. In 2006,
              Shinya Yamanaka and his colleagues at Kyoto University published a landmark paper in Cell demonstrating
              that four transcription factors — Oct4, Sox2, Klf4, and cMyc — could reprogram differentiated mouse
              fibroblasts into induced pluripotent stem cells (iPSCs), a discovery recognized with the Nobel Prize in
              Physiology or Medicine in 2012. This finding established the principle that cell fate is not irreversible.

              A critical proof-of-concept for the Altos Labs scientific thesis came in 2016, when Juan Carlos Izpisua
              Belmonte's laboratory at the Salk Institute published work in Cell showing that cyclic, partial expression
              of OSKM factors in a live mouse model could produce signs of cellular rejuvenation without causing
              teratoma formation — suggesting that partial reprogramming could reverse aging markers in vivo without
              full oncogenic risk. This result directly inspired the Altos Labs founding thesis.

              Altos Labs was incorporated in 2021 and publicly announced in January 2022 simultaneous with its $3
              billion funding close. Hal Barron was appointed CEO in 2022 following the departure of early president
              Hans Bishop. The Cambridge UK and Japan institutes were established in 2022 and 2022-2023 respectively.
              From 2023 through May 2026, the company has been in the discovery-science phase with no public
              announcement of clinical programs, partnerships, or additional fundraising. See Table TO004 for the
              complete milestone chronology and Figure FO001 for the visual timeline.
