  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: 'Market Overview: The Global Longevity and Anti-Aging Market'
        blocks:
          - type: paragraph
            body: |
              The global anti-aging and longevity market encompasses a heterogeneous set of product categories
              ranging from cosmetics and dietary supplements to advanced therapeutics and digital health platforms.
              Analyst estimates for the total market in 2022 range from approximately $44 billion to $63 billion,
              reflecting wide variation in how the market is defined. The highest estimates include nutraceuticals,
              cosmeceuticals, and over-the-counter anti-aging products; narrower definitions focusing on clinical
              therapeutics yield much smaller figures. Regardless of definition, the market is projected to reach
              $93–127 billion by 2032, implying a compound annual growth rate of approximately 7–9 percent over
              the decade.

              Growth is driven by several converging forces: a rapidly aging global population (more than 10,000
              US baby boomers turn 65 each day), unprecedented private capital flowing into longevity science,
              a paradigm shift from treating disease to extending healthspan, and scientific maturation in
              epigenomics, cellular reprogramming, and AI-assisted biological research. Altos Labs does not
              participate in the current commercial market — it has no products, no revenue, and no commercial
              presence as of May 2026. Its market relevance is as a potential future creator of cellular
              rejuvenation therapeutics. If partial epigenetic reprogramming proves safe and effective at scale,
              the addressable market for Altos Labs' technology could span multiple age-related diseases, with
              some analysts speculating the total opportunity could eventually reach into the trillions of dollars.
              This scenario remains highly speculative and is dependent on technological and regulatory progress
              not expected before 2035–2045.
