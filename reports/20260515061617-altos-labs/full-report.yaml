      - number: '6.3'
        title: 'Engagement Models: How Altos Labs Could Generate Revenue'
        blocks:
          - type: paragraph
            body: |
              Altos Labs has multiple potential revenue model pathways, none of which is yet active. The most
              immediate near-term opportunity is research tool licensing: selling or licensing OSKM delivery
              vectors, epigenetic clock reagents, and aging assay kits to academic and pharmaceutical
              researchers could generate modest non-dilutive revenue within 3–5 years without requiring
              clinical validation (CU019). Platform technology licensing deals in biopharmaceuticals have
              historically generated upfront payments of $10–100 million with milestone-based contingent
              payments tied to preclinical and clinical milestones (CU020). Multi-target co-development
              agreements for early-stage biology platforms have reached total deal values of $50 million to
              over $1 billion (CU021).

              Altos Labs could also generate early institutional revenue through proprietary aging biomarker
              database access — paid licensing of de-identified longitudinal epigenomic data to pharmaceutical
              researchers studying aging biology (CU022). Collaborative Research and Development Agreements
              (CRADAs) and NIH SBIR/STTR mechanisms offer non-dilutive grant revenue that does not require
              a commercial partner (CU023). Calico's long-term partnership with AbbVie — structured as a
              multi-year research collaboration without near-term product obligations — demonstrates that
              institutional biotech partnerships can be constructed around research milestones rather than
              commercial deliverables (CU024).

              The key regulatory barrier to all clinical-revenue pathways is that FDA has not approved any
              therapeutic indication targeting cellular aging or epigenetic reprogramming, creating deep path
              uncertainty for any Altos Labs product that requires human efficacy data before commercialization
              (CU018). No Altos Labs revenue model scenario carries a high probability of generating
              commercial revenue before 2028 (CU025).

              Table TU004 maps the full set of revenue model scenarios with dependencies, upsides, and
              probability assessments.
