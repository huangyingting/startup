      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear Cases for Altos Labs Value'
        blocks:
          - type: paragraph
            body: |
              Given the inapplicability of conventional valuation methods, the most rigorous approach to
              Altos Labs' expected value is a scenario-weighted analysis that explicitly models the
              probability and value implications of distinct scientific and commercial outcomes. Five
              scenarios are considered, spanning total failure through paradigm-shifting success.

              The Bear Case (35% probability) assumes that the core scientific thesis fails: partial
              reprogramming either cannot be demonstrated safe in aged human cells, or fails to produce
              clinically meaningful efficacy. Residual value of $100–300 million comes from IP asset sales
              and data licensing. Capital loss for investors would approach total loss given a $3 billion entry.

              The Base Case (35% probability) assumes that partial reprogramming safety and efficacy are
              established in preclinical models but that Altos pursues a licensing path rather than building
              its own clinical programs. Altos becomes a platform licensor to major pharmaceutical companies,
              generating royalty streams and milestone payments. This path produces a valuation of approximately
              $1–3 billion by 2030 — roughly consistent with the initial raise price but representing
              essentially zero return given the time value of money.

              The Bull Case (20% probability) assumes multiple pharmaceutical partnerships combined with at
              least one proprietary Phase 1 clinical program demonstrating safety in a defined indication.
              Altos would command a valuation of $10–30 billion by 2035. This is the highest-probability
              upside scenario and the most attractive for risk-adjusted investors.

              The Super Bull scenario (5% probability) assumes Altos achieves a paradigm-shifting result:
              demonstrating broad partial reprogramming efficacy across multiple age-related diseases with
              an acceptable safety profile, leading to FDA approval of the first anti-aging therapy in history.
              Under this scenario, Altos would become one of the most valuable pharmaceutical companies in
              history, with a potential valuation of $50–100 billion.

              The M&A Exit scenario (5% probability) assumes acquisition by a major pharmaceutical company
              for its platform and team at $5–10 billion.

              Table TV003 provides the full scenario analysis. Figure FV001 shows the implied valuation
              under each scenario. The expected value — probability-weighted across all scenarios — is
              approximately $5.5 billion, suggesting the initial raise price of approximately $3 billion
              is roughly fair given an expected-value framework, but that actual outcomes will be highly
              bimodal: most likely either near-zero or very high.
            claimRefs:
              - CV023
              - CV024
