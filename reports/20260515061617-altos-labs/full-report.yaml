      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Unmatched Scientific Advisory Concentration
            body: >-
              No other private biotechnology company as of May 2026 has assembled three Nobel laureates as active
              scientific advisors (Yamanaka 2012, Doudna 2020, Baltimore 1975) alongside the discoverer of the
              epigenetic clock (Horvath). This bench depth serves both as a scientific quality gate and a talent signal
              that draws researchers who might otherwise remain in academia.
            calloutType: strength
            claimRefs:
              - CO011
              - CO012
              - CO013
              - CO025
              - CO031
              - CO032
          - type: callout
            title: cMyc Oncogenicity Represents Core Scientific Risk
            body: >-
              cMyc, one of the four Yamanaka factors, is a well-characterized proto-oncogene. Full OSKM reprogramming
              triggers tumorigenesis in animal models. Altos Labs' partial reprogramming approach attempts to mitigate
              this by using transient or cyclic expression, but the safety boundary between beneficial epigenetic reset
              and unacceptable cancer induction has not been established in human tissue. This is the primary scientific
              risk and the central challenge in moving from mouse models to human therapeutic applications.
            calloutType: risk
            claimRefs:
              - CO027
              - CO023
          - type: callout
            title: $3B Capital Base Implies 7–10 Year Runway Without Revenue
            body: >-
              At an estimated burn rate of $300–450 million per year, the $3 billion raise implies 7 to 10 years of
              runway from the January 2022 close — placing the earliest potential clinical inflection point around 2029
              to 2032 at the optimistic end. This is consistent with the founders' stated 10-to-20-year research
              horizon, but requires investor patience atypical of traditional venture capital.
            calloutType: insight
            claimRefs:
              - CO001
              - CO033
