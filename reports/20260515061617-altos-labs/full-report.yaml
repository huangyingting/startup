      - number: '8.2'
        title: What Comparable Companies Suggest About Value at This Stage
        blocks:
          - type: paragraph
            body: |
              One of the most instructive approaches to valuing Altos Labs is to examine how analogous
              companies were priced at comparable stages of scientific development. The challenge is that
              there are no perfect comparables: no other company has raised $3 billion in a single round
              at a basic-science discovery stage to pursue a platform technology with such speculative
              timelines and such enormous potential. However, the universe of pre-revenue research-stage
              platform biotechs provides useful calibration.

              Calico, Alphabet's longevity research company, is the closest mission analog. Founded in
              2013 with funding from Alphabet and later the AbbVie partnership, Calico has operated for
              more than 12 years as of 2026 without producing a commercially approved therapeutic.
              Alphabet has never disclosed Calico's valuation. The lesson from Calico is sobering: money
              and institutional support do not guarantee scientific breakthroughs, and even well-resourced
              longevity programs can operate for over a decade without reaching clinical milestones.

              Moderna's early valuation arc provides a more optimistic comparable. At a stage when Moderna
              had no approved products and was pursuing mRNA as a platform technology, its Series C in
              2016 valued the company at approximately $1.5 billion — after six years of development.
              Moderna subsequently justified that valuation through demonstrated mRNA platform versatility
              and ultimately the COVID-19 vaccine. At the same early stage, Altos Labs is valued at
              approximately twice Moderna's 2016 Series C valuation, with significantly greater scientific
              uncertainty — Moderna at least had human immune response data for its early mRNA programs
              by 2016; Altos has no human data of any kind.

              Alnylam Pharmaceuticals, founded in 2002 to commercialize RNA interference (RNAi), provides
              another calibration. Alnylam went public in 2004 at approximately $2.4 billion market
              capitalization with no revenue — but with a mechanistically validated science platform (RNAi
              had been demonstrated in human cells), an emerging IP position, and a defined clinical pathway.
              Its first RNAi drug approval came 16 years after founding (2018). Altos Labs lacks Alnylam's
              early mechanistic human validation advantage but commands a higher implied valuation due to the
              scale of its capital and the ambition of its platform.

              BioNTech, founded in 2008 to pursue mRNA cancer immunotherapy, raised its first major
              institutional round in 2018 at approximately $300 million — a decade after founding — reflecting
              the modest early valuation assigned to the mRNA platform before COVID-19 demonstrated its
              commercial potential. Altos' implied valuation of $3 billion at founding compares to these
              comps' much-later-stage valuations, reflecting either extraordinary premium for the Altos team
              and platform potential or potential overpricing relative to scientific progress.

              The Comparable Valuation Table (Table TV002) provides a systematic comparison across six
              comparable companies. The Valuation Range Across Scenarios (Figure FV003) shows how Altos fits
              within the range of outcomes observable from these historical cases.
            claimRefs:
              - CV014
              - CV015
              - CV016
              - CV017
              - CV018
