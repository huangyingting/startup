      - number: '7.2'
        title: 'Scientific and Safety Risks: cMyc Oncogenicity, Reproducibility, and the Translation Gap'
        blocks:
          - type: paragraph
            body: |
              Three distinct categories of scientific risk threaten Altos Labs' core program: the oncogenic
              potential of cMyc, the reproducibility crisis endemic to aging biology, and the historically
              poor translation of rodent aging findings to human outcomes.

              The cMyc oncogenicity risk is the most fundamental. cMyc (the protein product of the MYC
              proto-oncogene) is among the most commonly amplified genes in human cancer, implicated in
              approximately 70% of cancer types through transcriptional amplification of proliferation,
              ribosome biogenesis, and metabolic reprogramming programs. When expressed even transiently in an
              aged human cell that carries decades of accumulated somatic mutations, cMyc could push a
              borderline pre-cancerous cell past the transformation threshold. The Salk Institute's 2016
              demonstration of partial reprogramming in vivo was performed in progeria (rapidly aging) mice
              — a pathological aging model, not a normal aged mammal, and certainly not an aged human. This
              matters enormously: an aged human cell is qualitatively different from a young mouse cell in
              terms of mutation burden, chromatin architecture, and epigenetic state. No data as of May 2026
              shows that cMyc-containing OSKM reprogramming is safe when applied to aged human tissue.

              The OSK alternative (three-factor, excluding cMyc) reduces oncogenic risk but introduces a
              different challenge: reprogramming efficiency drops substantially without the kinetic accelerant
              that cMyc provides. The therapeutic window — where enough epigenetic clock reversal occurs to
              produce a clinical benefit but not so much that cells lose identity or become tumorigenic —
              may be too narrow to be clinically actionable with OSK alone.

              The replication crisis compounds the scientific risk. Many aging biology findings published by
              individual academic labs have failed to replicate across independent groups. Key foundational
              results including senolytic efficacy, epigenetic clock reversal, and partial reprogramming
              outcomes are largely un-replicated at the scale and with the aged human cell diversity that a
              clinical program would require. Altos Labs' multi-lab design partially mitigates this: its
              distributed principal investigator model requires parallel characterization across multiple
              sites. But internal replication is weaker evidence than cross-institutional replication, and
              none of Altos Labs' own findings have been subject to independent external reproduction.

              The historical track record of longevity biotechs (Table TR003) is sobering. Unity Biotechnology's
              Phase 2 failure in senolytics demonstrated that even well-funded, carefully designed programs can
              fail when mouse-to-human translation breaks down. Calico's 12+ years of research operation without
              commercial output illustrates the timeline reality. Theranos' collapse shows what happens when
              reproducibility discipline is abandoned. The Altos Labs scientific approach is more rigorous than
              Theranos by every measurable criterion — but the translation gap from mouse to human remains
              genuinely unknown and historically difficult.
            claimRefs:
              - CR001
              - CR002
