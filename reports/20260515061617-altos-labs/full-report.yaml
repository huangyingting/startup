      - number: '1.3'
        title: Funding History, Capital Structure, and Investor Base
        blocks:
          - type: paragraph
            body: >
              Altos Labs completed its initial and — as of May 2026 — only announced financing round in January 2022,

              raising $3 billion from a syndicate of prominent investors. This round is widely cited as one of the

              largest single private biotech fundraises in history, eclipsing most Series A benchmarks by an order of

              magnitude. The round established a post-money valuation of approximately $3 billion, implying the company

              was valued essentially at its capital raise at the time — reflecting the speculative, pre-revenue nature
              of

              the enterprise and the 10-to-20-year research time horizon the founders explicitly communicated.


              The investor syndicate combines technology billionaires, life-science venture specialists, and estate

              capital. Jeff Bezos participated through his personal investment vehicle Bezos Expeditions, making Altos

              Labs one of his most prominent direct life-sciences bets. Yuri Milner, the Russian-Israeli technology

              investor known for early-stage Facebook and Twitter investments, is a co-anchor of the round. Sam Altman,

              CEO of OpenAI and a noted longevity enthusiast, participated as an individual investor. Vulcan Capital,

              the investment arm of the Paul Allen estate, extended the late Microsoft co-founder's interest in frontier

              biology. ARCH Venture Partners, a specialist deep-science venture firm, brought institutional
              biotechnology

              expertise to the cap table.


              No subsequent funding rounds, secondaries, or credit facilities have been announced by Altos Labs as of

              May 2026. The company's revenue is zero — it operates as a pre-commercial research institute funded

              entirely by the $3 billion raised in 2022. See Table TO001 for the KPI snapshot and Table TO003 for

              the investor map. Figure FO002 summarizes key financial and operational metrics.
