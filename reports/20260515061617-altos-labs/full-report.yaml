      - number: '7.4'
        title: 'Operational and Financial Risks: Capital Depletion, Talent, and Key Person Dependency'
        blocks:
          - type: paragraph
            body: |
              The operational and financial risks facing Altos Labs are substantial even if the underlying
              science ultimately validates. The $3 billion raised in January 2022 provides an estimated
              7–12 year runway at the company's inferred $250–400 million annual burn rate, which is projected
              to be consumed through salaries for 300+ scientists and staff, three global research facilities
              (San Francisco Bay Area, Cambridge UK, and Cambridge MA), research equipment and reagent costs,
              and administrative overhead. Unlike pharmaceutical companies with pipeline products that generate
              milestone payments or licensing revenues, Altos Labs has no revenue and no disclosed pathway to
              revenue — making it entirely dependent on investor goodwill and continued belief in the platform
              through multiple capital rounds. If the science does not produce a compelling preclinical
              proof-of-concept within the first 7–10 years, a re-raise in a potentially different macro
              environment (rising interest rates, risk-off biotech sentiment, competing capital demands) could
              be difficult at favorable terms or at all.

              The talent risk is two-directional. Attracting world-class scientists to a commercial entity
              rather than a university requires substantial compensation packages including equity, which
              introduces dilution pressure on existing investors. But retaining those scientists long-term
              in a commercial setting is also uncertain: academic incentives (tenure, publication freedom,
              grant independence, ability to train graduate students) are powerful forces that may draw
              key researchers back to universities, particularly if early Altos results are disappointing
              or publication restrictions create friction. Multiple key researchers have dual affiliations
              between Altos Labs and their home institutions, which could accelerate departure.

              The key person risk is concentrated in a small number of individuals whose departure would
              cause material credibility and programmatic damage. Shinya Yamanaka (the founding Nobel
              laureate and scientific catalyst), Jennifer Doudna (CRISPR Nobel laureate and SAB member),
              Steve Horvath (the epigenetic clock developer whose tools are the primary platform readout),
              and Hal Barron (the CEO whose pharma translation credibility anchors investor confidence)
              are each individually critical. The departure of any one of these individuals would likely
              trigger negative press coverage, investor concern, and potential talent cascade departures.
              Figure FR003 models the capital depletion scenario by major cost category, showing that even
              under a reduced-burn scenario, the company will have consumed the majority of its initial
              capital before reaching a point where preclinical proof-of-concept is likely established.
              Table TR004 summarizes the key operational and security risks — including competitive exposure
              from rival longevity programs — with likelihood and mitigation assessments.
