    title: Altos Labs Valuation Range Across Scenarios ($M)
    type: range
    layout: wide
    summary: >-
      Range chart showing the low and high valuation bounds for each of the five Altos Labs scenarios, expressed in
      millions of dollars. The ranges illustrate both the within-scenario uncertainty and the between-scenario spread.
      Bear Case spans $100–300M. IP Licensing (Base Case) spans $1,000–3,000M. Platform Success (Bull Case) spans
      $10,000–30,000M. Paradigm Shift (Super Bull) spans $50,000–100,000M. M&A Exit spans $5,000–10,000M. The width of
      each range reflects the inherent uncertainty within each scenario; the height of the chart — from $100M to $100B —
      illustrates the extraordinary binary nature of the investment.
    data:
      items:
        - label: Bear Case (Science Failure)
          low: 100
          high: 300
        - label: IP Licensing (Base Case)
          low: 1000
          high: 3000
        - label: Platform Success (Bull)
          low: 10000
          high: 30000
        - label: Paradigm Shift (Super Bull)
          low: 50000
          high: 100000
        - label: M&A Exit
          low: 5000
          high: 10000
    approximationNotes: >-
      Ranges are analytical estimates based on comparable company exit analysis, scenario-weighted DCF, and precedent
      pharmaceutical M&A multiples. Bear Case range ($100–300M) is based on comparable IP asset sale precedents in gene
      therapy. Base Case ($1–3B) is anchored to comparable licensing platform company valuations at similar milestones.
      Bull Case ($10–30B) is based on comparable clinical-stage platform biotechs at Phase 1 data. Super Bull ($50–100B)
      is based on major approved-drug platform precedents. M&A Exit ($5–10B) is based on pharma platform acquisition
      comparables.
