      - number: '4.5'
        title: Investor Economics and the Patient Capital Model
        blocks:
          - type: paragraph
            body: |
              Altos Labs is structured to enable what its founders call "patient capital" — an investment model in
              which return expectations are explicitly subordinated to scientific mission over a 20-year time horizon.
              This framing is unique in venture-funded biotechnology and more closely resembles the capital structure
              of academic endowments such as the Howard Hughes Medical Institute or the Wellcome Trust than a
              traditional equity-financed therapeutic development company.

              The investor economics at the time of the January 2022 round imply a post-money valuation of
              approximately $3 billion at close — a dollar-for-dollar entry. For an investor committing $500 million
              to the round, the return path is entirely dependent on either a future acquisition at a significant
              premium to invested capital (implying Altos Labs must develop and demonstrate clinically translatable
              assets), a future IPO (not probable for a pure platform play without clinical programs), or a secondary
              sale to another investor (limited secondary market exists for illiquid private equity in a
              pre-commercial biotech). The most plausible return path for billionaire investors like Bezos and Milner
              may not be purely financial — both have publicly stated interest in longevity science as a personal
              priority independent of return on capital.

              ARCH Venture Partners, as the institutional investor in the syndicate, faces different return
              constraints: its limited partners expect fund-level IRR targets that are incompatible with a 20-year
              horizon in the absence of secondary-market liquidity or periodic capital events. ARCH has historically
              invested in early-stage science companies with Moderna, Vir Biotechnology, and other eventual
              blockbusters in its portfolio, and its presence in the Altos syndicate suggests confidence in a
              translational path. However, the timeline to any liquidity event from Altos remains entirely
              unspecified. Table TI004 compares the research investment cost structure across comparable scientific
              organizations.
