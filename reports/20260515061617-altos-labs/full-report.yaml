      - number: '8.4'
        title: Arguments That the $3 Billion Valuation Is Too High
        blocks:
          - type: paragraph
            body: |
              A credible and substantial case exists that Altos Labs' $3 billion implied valuation is
              not supported by the scientific progress observable as of early 2026, and that the premium
              embedded in the valuation reflects hype, FOMO from sophisticated investors, and an
              overestimation of the near-term probability of reprogramming success.

              The most fundamental critique is that Altos Labs has published no scientific data of its
              own as of early 2026 — more than four years after founding. The $3 billion valuation is
              entirely based on the pedigree of the scientific team and the promise of the thesis, not
              on any empirically validated output from the company itself. This is unusual even by the
              standards of basic-science research companies; most comparable companies at similar
              valuations had produced at least some peer-reviewed outputs demonstrating platform
              functionality. Biotech analysts who cover the longevity sector have characterized this
              absence as a significant concern, with some describing the implied valuation as "speculative"
              and others framing the longevity sector broadly as a potential speculative bubble.

              The Calico precedent is the most damning comparable from the adverse perspective. Calico was
              founded in 2013 with the backing of Alphabet — effectively unlimited capital — and has operated
              for over 12 years with no commercially approved therapeutic. If Alphabet cannot buy or build
              its way to an anti-aging solution in 12+ years, the burden of proof on Altos Labs — which has
              been operating for only four years — is enormous. The implicit assumption in the $3 billion
              valuation is that Altos will succeed where Calico, with comparable backing, has not.

              The Moderna comparison is particularly instructive. When Moderna was at a comparable early
              stage — six years of operations, no approved products, running on investor capital — it was
              valued at approximately $1.5 billion at its 2016 Series C. Altos Labs, at founding, was
              valued at double that figure with significantly greater scientific uncertainty.

              The cMyc oncogenicity problem creates a structural valuation ceiling that is rarely
              acknowledged in bullish analyses. If cMyc cannot be safely included in reprogramming
              protocols — and the scientific literature cannot rule this out — then the OSK alternative
              may produce insufficient reprogramming efficiency to be clinically meaningful. This would
              effectively invalidate the entire platform thesis.

              Finally, the absence of a clear indication strategy — which disease does Altos cure, in
              which patient population, by what clinical endpoint? — means that there is no defined
              path to regulatory approval. Without a defined indication, it is impossible to size the
              addressable market, estimate clinical trial costs, or model commercial outcomes with any
              specificity. The Thesis / Anti-Thesis Table (Table TV005) summarizes the bull and bear
              arguments for and against the $3B valuation.
