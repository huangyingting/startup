      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Demographic Tailwinds Are Structural, Not Cyclical
            body: >-
              The global population aged 65 and older will exceed 1.5 billion by 2050 (WHO), and over 10,000 Americans
              turn 65 each day. Unlike consumer technology markets that can reverse, the aging market has a structural
              demographic engine that no policy or product can reverse. This creates durable demand for longevity
              solutions regardless of whether any particular technology — including Altos Labs' reprogramming approach —
              ultimately succeeds. The market will exist; the uncertainty is which scientific approach will capture it.
            calloutType: insight
            claimRefs:
              - CM003
              - CM004
              - CM016
          - type: callout
            title: Nutraceuticals Distort the Anti-Aging Market Size Signal
            body: >-
              The majority of the $44–63 billion anti-aging market as of 2022 consists of nutraceuticals, dietary
              supplements, and cosmetics that are largely scientifically unvalidated. These products sell on marketing
              and cultural association with anti-aging rather than clinical proof. This creates a misleading market-size
              signal for investors evaluating longevity therapeutics companies: Altos Labs will not compete with NAD+
              supplements or face cream. The addressable market for cellular rejuvenation therapeutics is far smaller —
              perhaps $2–5 billion today — and will only grow materially if the underlying biology is validated in
              clinical trials that remain years away.
            calloutType: risk
            claimRefs:
              - CM001
              - CM012
              - CM014
              - CM035
              - CM036
          - type: callout
            title: No US Regulatory Pathway for Anti-Aging as an Indication
            body: >-
              The FDA does not recognize "aging" as a disease or an indication for drug approval. This is not merely a
              procedural hurdle — it is a fundamental constraint on how longevity therapeutics companies (including
              eventual Altos Labs successors) must design clinical programs. Any therapeutic must be validated against a
              specific age-related condition (Alzheimer's disease, osteoporosis, sarcopenia, macular degeneration).
              Unity Biotechnology's Phase 2 failure in osteoarthritis illustrates how difficult this is even for
              single-disease indications within the aging context. The Targeting Aging with Metformin (TAME) trial is
              attempting to qualify aging as a biomarker endpoint, but this regulatory evolution is uncertain and
              multi-decade.
            calloutType: risk
            claimRefs:
              - CM006
              - CM028
              - CM029
              - CM038
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Overview of the Longevity Biotech Competitive Landscape
        blocks:
          - type: paragraph
            body: |
              The longevity biotech competitive field as of May 2026 is defined by a small cohort of
              well-funded private companies and one publicly traded entrant, all operating in the
              pre-commercial phase with no approved therapeutics targeting the biology of aging. Altos
              Labs sits at the apex of the capital distribution — its $3 billion January 2022 raise
              dwarfs the combined declared funding of every other direct competitor. The competitive
              landscape spans three overlapping scientific modalities: cellular reprogramming
              (Altos Labs, NewLimit, elements of Retro Biosciences), senolytics (Unity Biotechnology,
              Oisin Biotechnologies), and pluripotent stem cell or gene therapy approaches (AgeX
              Therapeutics, Rejuvenate Bio).

              No competitor has yet brought a longevity-targeted therapeutic to regulatory approval as
              of May 2026. Unity Biotechnology came closest with its senolytic UBX0101 program but
              suffered a decisive Phase 2 failure in knee osteoarthritis in 2020, later pivoting to
              ophthalmology and neurology. This failure is the defining cautionary data point in the
              sector: it illustrates that clearing senescent cells — a mechanistically sound hypothesis —
              does not automatically translate into clinical efficacy within a specific disease context
              and timeline. All other competitors remain earlier than Unity's pre-pivot stage.

              The competitive field is characterized by long research cycles, uncertain translational
              timelines, and a shared dependence on public-domain scientific discoveries (the Yamanaka
              factor discoveries, epigenetic clock technology, hallmarks-of-aging framework). No
              competitor has a truly proprietary fundamental discovery; differentiation derives from
              scale of research investment, quality of scientific leadership, approach specificity, and
              speed of platform development. Table TP001 below provides a structured profile of all
              seven key entities in the longevity competitive space. Figure FP001 maps their positions
              on clinical maturity and commercial focus axes.
