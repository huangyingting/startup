  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: 'Altos Labs Risk Profile: Why This Is an Extreme-Risk Enterprise'
        blocks:
          - type: paragraph
            body: |
              Altos Labs is not a conventional biopharmaceutical company. It does not have a lead candidate
              in clinical trials, a validated delivery mechanism, a defined regulatory pathway, or a product
              revenue stream. It is a basic-science discovery organization pursuing a hypothesis about cellular
              aging that, if correct, could eventually generate transformative medicine — but the path from
              hypothesis to approved therapy spans at minimum 15–20 years and crosses multiple chasms that
              have never been successfully bridged: demonstrating that brief OSKM expression is safe in aged
              human cells (not just young mice), securing regulatory approval for a therapeutic that acts on
              the aging process itself (a target the FDA does not yet recognize as an approvable indication),
              and translating in vitro and rodent results into human clinical outcomes in a field notorious
              for failed translation attempts.

              The risk register (Table TR001) provides a severity-ranked summary of the eight highest-priority
              risks across scientific, regulatory, financial, operational, and competitive dimensions. Each risk
              has a likelihood assessment, an impact assessment, a severity rating, a stated mitigation approach,
              and an estimated residual risk after mitigation. The single most severe risk — cMyc oncogenicity —
              remains at Critical residual severity after all currently available mitigations, because the OSK
              alternative reduces rather than eliminates the risk while simultaneously reducing reprogramming
              efficiency to potentially sub-therapeutic levels. Figure FR001 presents the full risk landscape
              as a likelihood–impact heat map showing where risks cluster across the severity matrix. The heat
              map reveals a dangerous concentration of High and Critical severity risks at the intersection of
              Medium and High Likelihood — there are no Low or Negligible risks at the company-existential level.

              The investment implication of this risk profile is stark: Altos Labs should be evaluated not as
              a biopharmaceutical investment with normal development risk, but as a long-dated option on a
              category-creating scientific breakthrough — one where the probability of the option expiring
              worthless is substantial, but the value of the breakthrough if achieved is enormous. Risk-tolerant
              investors with 20-year time horizons and diversified longevity portfolios are the appropriate
              capital allocators; conventional biotech funds with 7–10 year return cycles are mismatched to
              the timeline and risk profile.
