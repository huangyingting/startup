      - number: '6.5'
        title: 'Comparable Timelines: What History Says About Platform Biotech Revenue'
        blocks:
          - type: paragraph
            body: |
              Historical analogues provide the most evidence-grounded basis for estimating when Altos Labs
              might generate first commercial revenue. Genentech, widely considered the founding model for
              platform biotech commercialization, was founded in 1976 and generated its first meaningful
              commercial revenue from recombinant human growth hormone (Protropin) in 1985 — approximately
              9 years after founding (CU031). Amgen, founded in 1980, reached first major product revenue from
              Epogen (erythropoietin) in 1989, also approximately 9 years after founding (CU032). BioNTech,
              founded in 2008 as a mRNA platform company, did not generate large-scale commercial revenue until
              its COVID-19 vaccine in 2021 — approximately 13 years after founding (CU033).

              Applying these comparables, pre-revenue biotech companies with novel biology platform technologies
              typically require 8–15 years from founding to first commercial revenue (CU034). For Altos Labs,
              founded in January 2022, this range implies a first-revenue window of approximately 2030–2037
              (CU035). The company's scientific publication record in Nature, Science, and Cell supports the
              credibility of its platform and may accelerate a partnership timeline relative to the early-year
              averages of its predecessors (CU036).

              Table TU003 provides a structured comparison of comparable pre-revenue biotech timelines.
              Figure FU002 plots the years-to-revenue metric across comparables, and Figure FU004 illustrates
              the staged commercial development pipeline.
