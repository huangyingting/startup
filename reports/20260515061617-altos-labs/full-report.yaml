  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Why Traditional Valuation Methods Fail for Pre-Revenue Deep-Science Companies
        blocks:
          - type: paragraph
            body: |
              Altos Labs presents a fundamental valuation challenge: the company has no revenue, no approved
              products, no clinical-stage programs, and no near-term monetization pathway. Traditional
              valuation frameworks — discounted cash flow (DCF), revenue multiples, EBITDA multiples, and
              net present value of pipeline (rNPV) — all require at minimum some anchor to expected future
              cash flows, a timeline to product, or a pipeline of clinical candidates. Altos Labs provides
              none of these anchors. The DCF is essentially inoperative: for Altos, the earliest plausible
              free cash flow is a licensing fee from a pharmaceutical partner, which could not realistically
              occur before preclinical proof-of-concept data arrives — conservatively no earlier than 2030
              under optimistic assumptions. Small changes in discount rate or terminal growth rate produce
              order-of-magnitude differences in implied value; the DCF is therefore assigned only 5% weight.

              The more appropriate framework is Real Options Valuation (ROV). Real options theory — formalized
              through the Black-Scholes-Merton option pricing framework — values a company as a portfolio of
              options on future scientific and commercial outcomes. The $3 billion invested in Altos represents
              the purchase price of a call option on the eventual commercial success of cellular reprogramming
              therapeutics. High volatility (scientific uncertainty) and long duration (15–25 years) actually
              increase real options value in this context because they preserve asymmetric upside. The Valuation
              Methodology Comparison (Table TV001) provides a systematic review of all six valuation methods
              considered, their applicability, estimated output ranges, key limitations, and the weight
              assigned to each in the composite fair value estimate. The value decomposition waterfall
              (Figure FV002) illustrates how the $2.8 billion base-case estimate is constructed from its
              components: research platform ($1.5B), team premium ($800M), IP optionality ($500M),
              first-mover advantage ($300M), and cash ($200M), discounted by a pre-revenue risk haircut
              ($500M).

              The investment thesis rests on five reinforcing pillars: (1) a world-class scientific team
              that took decades to assemble and cannot be replicated at any price in the near term; (2) a
              $3B cash reserve providing 7–12 years of runway to demonstrate proof of concept; (3) a
              platform technology (partial reprogramming) whose market, if it works, encompasses virtually
              all chronic diseases of aging; (4) first-mover position in a field where regulatory and IP
              barriers to entry are growing; and (5) management credibility through Hal Barron, whose
              track record at GSK and Roche is the gold standard for translating basic science to approved
              drugs. The anti-thesis is equally forceful: no published scientific output from the company
              itself, no defined indication, a fundamental cMyc safety risk, and a $3B price tag for what
              is, in substance, a basic-science experiment with a 15-to-20-year time horizon.
            claimRefs:
