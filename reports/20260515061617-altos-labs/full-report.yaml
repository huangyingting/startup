            title: Complete financial diligence is impossible — no public financials exist
            body: >-
              Altos Labs is a private Delaware corporation with no public company reporting obligations. It has not
              published audited financial statements, Form 990 (it is not a nonprofit), or any other financial
              disclosure. Every financial figure in this chapter is an estimate derived from publicly available
              headcount data, compensation benchmarks, and comparable-institution analysis. Before any investment or
              partnership decision, an investor must demand audited financials, a current capitalization table, a
              board-approved budget, and confirmation of the remaining cash position directly from management. The
              absence of public financials is the single most significant diligence blocker in this chapter.
            calloutType: risk
            claimRefs:
              - CI003
              - CI033
          - type: callout
            title: Re-raise risk is material — likely capital raise needed before 2030–2031 at base burn
            body: >-
              Under the base-case burn assumption ($350M/yr), Altos Labs' estimated $1.5 billion of remaining capital as
              of May 2026 supports approximately 4 additional years of operation. This implies a re-raise requirement
              around 2030–2031 — before the company would be expected to have any approved clinical programs or revenue.
              A re-raise at that stage will require either anchor investors (Bezos, Milner) to re-commit, or new
              investors to enter at a valuation supported solely by preclinical scientific publications and platform
              progress. The difficulty of establishing a fair valuation for a pre-clinical research platform with no
              commercial products creates material re-raise execution risk.
            calloutType: risk
            claimRefs:
              - CI022
              - CI023
              - CI025
  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'The Altos Labs Scientific Platform: Why Partial Reprogramming Matters'
        blocks:
          - type: paragraph
            body: |
              Altos Labs is not a conventional drug-discovery company. Rather than identifying small molecules
              or biologics that inhibit specific disease targets, the company is developing a platform that
              modulates the fundamental biology of cellular aging — the progressive, multi-dimensional
              deterioration of cellular function driven by epigenetic drift. The founding scientific thesis
              holds that aging is largely an information problem: cells lose the correct epigenetic programming
              over time, and this loss drives the hallmarks of aging including mitochondrial dysfunction,
              senescence accumulation, impaired regeneration, and increased disease susceptibility. If that
              epigenetic information can be restored, the cells — and eventually the organism — can be
              functionally rejuvenated.

              The core mechanism leveraged to restore this information is the Yamanaka reprogramming system.
              In 2006, Shinya Yamanaka's laboratory at Kyoto University demonstrated that expressing four
              transcription factors — Oct4, Sox2, Klf4, and cMyc — in adult somatic cells could convert them
              back to an induced pluripotent stem cell (iPSC) state. This discovery, recognized with the Nobel
              Prize in 2012, established the profound plasticity of cellular identity. However, full OSKM
              reprogramming to iPSC status is not therapeutically useful for aging reversal: iPSCs lose all
              tissue-specific gene expression programs, and cMyc overexpression carries a well-documented
              cancer risk. Altos Labs' differentiated approach is partial, cyclic reprogramming — expressing
              OSKM transiently to reset aging-associated epigenetic marks while stopping short of full
              dedifferentiation. This preserves cell identity while potentially recovering youthful gene
              expression patterns and reducing biological age as measured by epigenetic clocks.

              The platform encompasses seven core technology components (Table TE001): partial reprogramming
              using OSKM, epigenetic clock measurement, single-cell multi-omics, in vitro cell culture systems,
              in vivo delivery research, AI/ML-assisted epigenome analysis, and a broader aging-hallmarks
              targeting program. Together these define what Altos Labs calls "cellular rejuvenation programming."
              The field-defining evidence cited in the company's founding thesis includes the 2016 Salk Institute
              demonstration by the Izpisua Belmonte laboratory that cyclic OSKM in a live mouse progeria model
              produced signs of cellular rejuvenation and modest lifespan extension. The timeline of scientific
              milestones leading to and following Altos Labs' founding is illustrated in Figure FE002, which
              anchors the company's platform in two decades of foundational academic research.

              A critical enabler of the platform is the epigenetic clock, developed by Steve Horvath starting in
              2013. The Horvath clock uses DNA methylation patterns at specific CpG sites to estimate the
              biological age of a cell with high accuracy across tissue types. This clock serves as the primary
              quantitative readout for Altos Labs research: when OSKM treatment is applied to cells, scientists
              measure how much the methylation clock "moves" backward. Without such a quantifiable, non-invasive
              biomarker of rejuvenation, the platform would lack a tractable efficacy endpoint. The availability
              of the clock — and Horvath's direct participation as an Altos Labs researcher — gives the company
              a significant methodological advantage over competitors working without validated aging biomarkers.
