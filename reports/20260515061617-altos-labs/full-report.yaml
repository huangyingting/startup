      - number: '7.3'
        title: 'Regulatory and Timeline Risks: No Approved Indication and an Undefined FDA Pathway'
        blocks:
          - type: paragraph
            body: |
              The regulatory pathway for any Altos Labs therapeutic program is not merely uncertain — it is
              entirely undefined. The FDA has never approved a drug whose primary indication is "aging," nor
              does it currently recognize aging as an approvable disease endpoint. This is not merely a
              terminology problem: it reflects a deeper scientific and regulatory gap. To seek FDA approval,
              Altos Labs must first identify a specific, measurable disease indication where partial
              reprogramming produces a verifiable clinical benefit. Candidate indications include age-related
              macular degeneration, Hutchinson-Gilford progeria syndrome, sarcopenia, or other defined
              age-related diseases — but each represents a significant narrowing of the company's original
              vision, which is to reverse aging across the whole organism.

              Table TR002 analyzes the five key regulatory dimensions facing any Altos Labs therapeutic program.
              The TAME (Targeting Aging with Metformin) trial is the first attempt to establish an FDA-approved
              anti-aging endpoint through a small molecule; it uses all-cause mortality and a composite
              multi-morbidity endpoint rather than rejuvenation as such. Even if TAME succeeds, the precedent
              it creates may not transfer to a gene therapy program using OSKM reprogramming factors. Gene
              therapy has its own evolving regulatory history: the FDA imposed sweeping clinical holds after
              Jesse Gelsinger's death in 1999 from an adenoviral gene therapy for OTC deficiency, and while
              the field has since matured with approvals of Luxturna (retinal dystrophy) and Zolgensma (spinal
              muscular atrophy), the regulatory bar for novel gene therapy programs remains extremely high.
              A partial reprogramming program would require novel IND-enabling toxicology packages, safety
              monitoring protocols without precedent, and likely multi-year pre-IND discussions with FDA.

              Epigenetic clock biomarkers, which Altos Labs would likely seek to use as clinical endpoints
              or surrogate endpoints, have not been qualified by the FDA as valid surrogate endpoints. Biomarker
              qualification is a lengthy independent process — typically 5–10 years — and Altos Labs cannot
              rely on the clocks as regulatory endpoints until that qualification is complete. Figure FR002
              shows the estimated timeline (in years from May 2026) to resolve each of the major regulatory
              risks. No regulatory pathway milestone arrives before 8 years out; a first clinical approval
              is projected at 20+ years under even the most optimistic assumptions.
