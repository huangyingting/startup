companyProfile:
  summary: Zetwerk is India's leading B2B managed-marketplace contract manufacturer, monetising a six-segment
    offering across industrial, aerospace and defence, renewables, electronics, capital goods, and cross-border
    programmes. FY24 revenue of approximately US$1.74B grew about 26% YoY but was paired with a roughly 9x
    widening net loss of about US$110M; the company has raised approximately US$873M cumulatively and was
    last marked at approximately US$3.1B in a Dec-2024 secondary. A SEBI DRHP filing is reported in process
    for a 2026 listing.
  foundedDate: '2018-01-01'
