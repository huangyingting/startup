  foundingLocation: Bengaluru, India
  headquarters: Bengaluru, India
  productSummary: Zetwerk operates a managed-marketplace plus managed-services platform that connects large
    OEM buyers with a long tail of qualified Indian fabrication, casting, machining, surface-treatment, and
    electronics-assembly partners across six end-segments.
  customerFocus: Indian industrial OEMs, aerospace and defence (HAL ecosystem), renewables developers (solar
    IPPs), consumer-electronics PLI brands, capital goods, and cross-border buyers (US / EU / UK).
  businessModel: Marketplace take-rate plus managed-services revenue, with growing inorganic and PLI-tied
    revenue streams from Zetwerk Electronics, Pinaka (defence), and Unimacts (renewables BoS).
  stage: Late-stage private / pre-IPO
  fundingStatus: Approximately US$873M raised across Sequoia Capital India, Lightspeed, Greenoaks, Khosla
    Ventures, D1 Capital, and others; last marked at approximately US$3.1B in a Dec-2024 secondary; SEBI
    DRHP filing reported in process for a 2026 listing.
