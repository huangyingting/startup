  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and legal risk
        blocks:
          - type: paragraph
            body: >-
              Zetwerk operates across multiple regulated domains: the Companies Act 2013 and SEBI ICDR/LODR regimes that
              govern its planned IPO; the PLI scheme that underwrites a meaningful slice of its consumer-electronics
              revenue; defence and aerospace approval frameworks (DPP/DAP, MoD offsets, defence-vendor registration)
              that govern HAL- and DRDO-adjacent programmes including the Pinaka acquisition; environmental clearance
              and pollution-board consent regimes for casting, fabrication, surface-treatment, and electronics-assembly
              facilities; GST/customs/DGFT regimes that govern domestic and export working capital; and labour and ESG
              regimes that govern multi-site contract-manufacturing operations. None of these are bespoke to Zetwerk,
              but cumulatively they create high regulatory surface area. The most underwriting-critical near-term
              regulatory event is the SEBI DRHP review and listing approval; the most underwriting-critical
              programme-level regulatory exposure is PLI policy continuity, where eligibility, milestones, and claw-back
              risk all materially affect Zetwerk Electronics revenue. Enforcement actions or open litigation are not
              visible in pre-DRHP public sources and must be confirmed via the MCA and Indian Kanoon during diligence.
              For underwriting purposes the practical sequence is: (a) confirm DRHP filing acceptance; (b) verify PLI
              milestone-attainment status at the Electronics segment; (c) cross-check MCA21 charges and any pending
              Indian Kanoon matters against the DRHP risk-factor disclosure.
            claimRefs:
