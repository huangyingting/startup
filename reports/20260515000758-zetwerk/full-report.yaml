      - number: '7.2'
        title: Operational, supply-chain, and partner risk
        blocks:
          - type: paragraph
            body: >-
              Operational risk in a managed-marketplace contract-manufacturer is dominated by quality, reliability, and
              supplier-failure exposure: programmes for HAL-adjacent Pinaka, renewables IPPs, and PLI-tied
              consumer-electronics brands all carry severe customer-impact penalties for late or out-of-spec delivery.
              Supplier risk is structurally elevated because the Zetwerk model depends on a long tail of independent
              SMEs whose own quality systems, working-capital health, and labour compliance are not directly controlled.
              ESG and labour risk - safety incidents at fabrication or casting partners, environmental notices on
              surface-treatment or paint shops, gender-pay or contract-labour notices - is also elevated. Cyber and
              IT-system risk is moderate and primarily operational rather than data-breach (no consumer PII at scale).
              Partner concentration is highest on the customer side (top-10 industrial-and-renewables buyers) and on the
              financing side (multi-bank working-capital lines and project finance for PLI-grade plants). Mitigation
              maturity is generally medium - supplier-tier quality programmes and ISO-style certifications are in place
              but evidence of audit-grade controls is not public; thesis-break triggers should focus on quality-recall
              events, ESG incidents at partner sites, and any single-customer revenue share exceeding 15-20%. For
              partner-tier audits the IC should expect to see, in DRHP or in vendor diligence, evidence of
              supplier-onboarding gates, in-process quality controls, partner-site safety incidents (or absence), and
              any cyber-incident remediation log; absence of these in the DRHP would itself be a flag.
