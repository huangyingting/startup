  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape across direct, incumbent, adjacent, and substitute alternatives
        blocks:
          - type: paragraph
            body: >-
              Zetwerk is best understood as a hybrid of three distinct businesses, which is why no single competitor
              maps one-to-one. (1) Direct peers are global digital contract manufacturers Xometry and Protolabs — both
              publicly listed, both selling instant-quote / on-demand parts via web platforms, both with
              multi-hundred-million-dollar revenue bases per their investor pages. (2) Incumbent EMS giants — Foxconn,
              Flex, Jabil, Celestica, Sanmina — operate at very different scale (tens of billions in revenue) but
              compete for enterprise CM mindshare and capacity, especially in electronics. (3) Indian B2B marketplaces —
              IndiaMART (listed on BSE/NSE), Moglix, Udaan, Infra.Market — overlap on supplier-network and
              procurement-software but typically do not own delivery and quality-control the way Zetwerk does. (4) Large
              Indian industrial conglomerates — Tata Group, Mahindra, Bharat Forge, HAL, BHEL — represent the
              indigenous-incumbent benchmark for aerospace, defence, and heavy machinery; they compete on long-cycle
              programmes Zetwerk's marketplace model is just beginning to qualify for. (5) OEM in-house procurement is
              the dominant status-quo substitute and the largest pool of "lost" addressable spend.
