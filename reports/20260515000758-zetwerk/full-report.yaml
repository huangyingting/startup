  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, business model, and operating scale
        blocks:
          - type: paragraph
            body: >-
              Zetwerk Manufacturing Businesses Pvt. Ltd. is a Bangalore-headquartered B2B custom-manufacturing
              marketplace that connects global enterprise and OEM buyers with a network of suppliers across India and
              abroad. The company's own surfaces describe a software-led intake-to-delivery flow that supports
              sheet-metal stampings, investment casting, precision machining, prototyping, assemblies, powder coating,
              painting, and anodizing. Industries served on the homepage span transportation, industrial machinery,
              consumer products and electronics, construction and infrastructure, energy and utilities, and aerospace
              and defense. The company headlines four operating metrics on its homepage: up to 50% reduction in lead
              times, 9 million+ parts manufactured, 1,800+ active customers, and delivery to 20+ countries.
              StartupTalky's March-2025 long-form profile reproduces those same KPIs and dates them to February 2024,
              suggesting the homepage figures are static-vintage rather than freshly updated. Revenue model is
              commission on transactions plus value-added services (quality control, logistics, managed inventory). The
              identity is therefore well established as a vertically-integrated marketplace rather than a pure listings
              or pure EMS player, with a software-first heritage that pivoted within thirty days of founding into the
              marketplace model.
