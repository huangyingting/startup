            body: >-
              Retention metrics — net revenue retention, gross revenue retention, churn, contract length,
              repeat-purchase cohort behaviour — are not publicly disclosed. The structural retention narrative is
              favourable in the sense that custom-manufacturing programmes typically renew across multiple delivery
              cycles once a supplier is qualified into a buyer's approved-vendor list, but the magnitude is unverifiable
              until DRHP. Expansion drivers visible from public communications include cross-sell across capability
              modules (a buyer starting in machining adding electronics or fabrication), geographic expansion (adding
              cross-border buyer accounts via the US / EU / UK channels), and segment expansion (an industrial buyer
              adopting renewables BoS). Concentration risk is the single most material customer-side risk: with FY24
              revenue at roughly US$1.74B and a buyer base in the multi-thousand range, the top-10 buyer share is almost
              certainly material; without DRHP disclosure the underwriting case must assume meaningful concentration.
              Channel and partner dependence includes large industrial conglomerates (whose programmes can shift mix
              significantly), defence procurement bodies (whose tendering cycles can swing volume), and PLI-tied
              electronics brand-owners (whose capacity-sourcing decisions can crowd out marketplace volume). Procurement
              friction in regulated segments — DGAQA / IATF / IPC qualifications — adds onboarding friction that is both
              a barrier to entry for competitors and a barrier to expansion for Zetwerk. The honest customer verdict is
              that retention is structurally favourable, expansion paths are credible, but concentration risk and
              per-customer economics are unknowable from public sources and will materially       affect IPO valuation
