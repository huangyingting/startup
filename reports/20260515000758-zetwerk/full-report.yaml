      - number: '3.2'
        title: Capability comparison and pricing posture
        blocks:
          - type: paragraph
            body: >-
              On capability, Zetwerk's marketplace controls a wider category breadth than Xometry / Protolabs (which
              lead in on-demand precision parts and additive) but a narrower regulated-segment qualification depth than
              Foxconn / Jabil (which dominate electronics manufacturing services at very large scale). The Zetwerk
              capability surface includes sheet-metal, casting, machining, painting, coating, anodizing, electronics
              PCBA, and aerospace precision. Xometry and Protolabs publish standardised pricing per part with
              instant-quote engines; Foxconn, Flex, Jabil, and Indian conglomerates negotiate enterprise contracts that
              are not publicly priced. Indian B2B marketplaces such as IndiaMART monetise via lead-generation
              subscriptions for suppliers — a fundamentally different revenue model from Zetwerk's
              commission-plus-services take. Pricing transparency is therefore a genuine differentiator only against EMS
              and conglomerate incumbents; it is parity (or modestly behind) versus Xometry / Protolabs. Capability gaps
              for Zetwerk include: no published instant-quote front-end at the Xometry / Protolabs sophistication,
              limited US-scale on-demand additive manufacturing, and a still-emerging enterprise sales motion for
              Fortune-500 EMS-class contracts.
