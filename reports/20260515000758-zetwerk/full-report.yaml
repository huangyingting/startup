            body: >-
              Cumulative equity raised across primary and secondary rounds is reported at roughly US$873M (multi-source
              synthesis from Indian press; refer to Company Overview for the round-by-round chronology). The Dec-2024
              secondary cleared at roughly a US$3.1B post-money mark. Cash on hand and monthly burn are not publicly
              disclosed; on conservative assumptions of US$110M annual loss and post-Dec-2024 cash balance of US$200M-
              US$300M (back-of-envelope from disclosed primary raises), runway extends to roughly 18-30 months — enough
              to reach a 2026 IPO window but not enough to absorb a delayed listing without an additional bridge.
              Planned use of funds (per IPO press) includes consumer-electronics capacity expansion (about INR 1,000 cr
              / US$120M), renewables / Unimacts scale-up (INR 500 cr / US$60M), and working capital. Debt and
              project-finance obligations are not publicly itemised; PLI-linked credit facilities and supplier-finance
              arrangements are likely material. The largest public-financial gaps are: audited segmented revenue, gross
              margin, monthly burn, working-capital cycle, debt schedule, and customer concentration — none of which are
              knowable until the DRHP filing. These gaps make valuation underwriting a directional, not diligence-grade,
              exercise as of mid-2026. The practical implication is that any pre-IPO secondary pricing should carry a
              discount for opacity, and the IPO itself will be the first opportunity to reconcile the headline growth
