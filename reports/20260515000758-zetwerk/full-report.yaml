  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue streams, pricing, and revenue quality
        blocks:
          - type: paragraph
            body: >-
              Zetwerk's revenue model is a marketplace take-rate (commission on transacted manufacturing volume) layered
              with managed value-added services — quality control, logistics, supplier financing, and project management
              — plus, increasingly, captive output from acquired entities such as Unimacts (renewables) and Pinaka
              (aerospace) that converts marketplace activity into vertically-integrated revenue. Public reporting from
              Indian press (StartupTalky, YourStory) places FY24 revenue at roughly INR 14,400 cr (about US$1.74B) with
              about 26% year-over-year growth, an exceptionally high absolute scale for an Indian B2B marketplace but
              down materially from the multi-x growth rates of FY21-FY23. Pricing is not publicly itemised: take-rate
              and managed-services fees are negotiated per programme. Revenue quality is unverifiable from public
              sources because the company has not yet published audited segmented revenue (marketplace take versus
              captive manufacturing versus services); the practical underwriting question is how much of US$1.74B is
              pass-through trading volume booked gross versus net commission. The IPO red-herring (DRHP) due in 2026
              will be the first authoritative resolution of revenue quality. A practical lens on quality is to compare
              the implied gross merchandise scale of US$1.74B against typical Indian B2B-marketplace take rates
              (mid-single-digit percentage), which would imply much lower net-commission revenue if the headline figure
              is in fact gross-booked transaction value — a question only audited segmentation can settle conclusively.
