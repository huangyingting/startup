      - number: '2.2'
        title: Sizing lenses — global, India machinery, and renewables / aerospace overlays
        blocks:
          - type: paragraph
            body: >-
              Three independent lenses bound the addressable market. (1) Global contract manufacturing — Grand View
              Research's healthcare-only slice was US$213B in 2024 and is projected to reach US$566B by 2033 at 11.69%
              CAGR, providing a rate anchor for the broader category. (2) India machinery and equipment output is
              projected around US$60B in 2024 with a 2.11% CAGR through 2028 per Statista, a closer proxy for Zetwerk's
              domestic industrial-customer base; the broader Indian manufacturing sector adds a Wikipedia-cited GVA
              target near US$500B by 2025 per IBEF and the Make in India programme. (3) Sector overlays — renewable
              energy (solar/wind), aerospace and defence, and consumer electronics each carry their own
              multi-billion-dollar addressable budgets, with the Indian renewable-energy sector and the Indian
              solar-power industry both explicitly targeted by Zetwerk's recent INR 500 crore renewables capacity
              announcement and INR 1,000 crore consumer-electronics plan. Each lens has limitations: Grand View's
              healthcare slice is not directly Zetwerk-served; Statista's machinery output measures production not
              procurement; and Indian-government programme targets blend public investment with private-sector
              projection. The honest read is that no single published TAM cleanly equals the served market, so the
              chapter preserves the three lenses and flags the contradictions.
