            body: >-
              Zetwerk's buyer side is segmented across at least six dimensions — vertical (auto, heavy industrial,
              aerospace / defence, renewables, consumer electronics, capital goods), buyer scale (large enterprise OEM
              vs. mid-market), geography (India domestic vs. cross-border), use-case (custom programme vs. repeat
              production), procurement model (single-counterparty managed vs. RFQ-only), and revenue band (top-tier
              strategic vs. long-tail). The largest revenue concentrations almost certainly sit in industrial
              conglomerates and renewables IPPs — the buyers with both scale and cadence to drive multi-programme
              relationships — though the company has not publicly disclosed top-customer share. Adoption signals visible
              from public surfaces include the growth of dedicated segment pages (electronics, aerospace, renewables,
              precision machining), expanding international site coverage (zetwerk.com/in/), the growth of named
              acquisitions that imply customer-driven capability decisions (Pinaka for defence buyers, Unimacts for
              solar buyers, Sharp Tanks for fabrication buyers), and aggressive engineering hiring (per careers and
              LinkedIn signals) that suggests sustained programme-volume growth. Without audited cohort data, however,
