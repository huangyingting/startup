      - number: '3.3'
        title: Moat durability, switching costs, and displacement risk
        blocks:
          - type: paragraph
            body: >-
              The strongest moats Zetwerk has built are (a) supplier-network depth in India (the company claims a
              10,000+ manufacturer network), (b) capability-vertical integration via acquisitions (Unimacts in
              renewables, Pinaka in aerospace, Sharp Tanks in fabrication), and (c) regulated-segment qualifications,
              which once earned are asymmetrically sticky. The biggest displacement risks are: Indian incumbent
              conglomerates expanding their own digital procurement (Tata, Mahindra), public Indian B2B platforms
              (IndiaMART) extending into managed fulfilment, EMS giants (Foxconn, Flex) winning large electronics
              PLI-driven contracts that crowd out marketplace volume, and global digital CM peers (Xometry) entering
              India via partnerships. Multi-homing risk is real on the buyer side — buyers routinely qualify multiple
              suppliers per programme — and channel power on the supplier side is moderate because manufacturers list on
              multiple marketplaces. Margin compression risk from public peers (Xometry / Protolabs) underscores that
              even at scale, digital CM does not deliver software-marketplace gross margins. The honest moat assessment
              is "durable in India for now, narrower than it looks globally, and contingent on continued capital access
              through IPO." Two further dynamics deserve explicit weight. First, supplier exclusivity is the single
              biggest unknown — Zetwerk's 10,000+ supplier claim does not disclose how many of those manufacturers are
              exclusive vs. multi-homed across IndiaMART, Moglix, Udaan, or direct OEM relationships, and that ratio
              determines pricing power. Second, government procurement and PLI-linked tender flow disproportionately
              favour either established defence PSUs (HAL, BHEL, BEL) for sensitive categories or large-scale EMS
              bidders (Foxconn, Flex) for electronics, leaving Zetwerk to win the long-tail and the Tier-2
              indigenisation slice. The cumulative competitive picture is one where Zetwerk has built a credible
              Indian-marketplace position with global aspirations, but its margin and multi-homing exposure remain its
              two most material competitive vulnerabilities going into IPO diligence.
