company:
  name: Zetwerk
chapter:
  number: 6
  title: Customers
  summary: >-
    Zetwerk's customer base is multi-thousand B2B buyers spanning Indian industrial OEMs (auto, heavy industry, capital goods),
    aerospace and defence (HAL ecosystem, indigenous OEMs), renewables developers (solar IPPs), consumer-electronics OEMs
    (PLI-aligned brands), and a growing cross-border buyer base in the US, EU, and UK. Public named-customer disclosure is
    limited; the moneyshot named accounts visible from press and company surfaces include large industrial conglomerates and
    renewables developers. Retention and customer-concentration metrics (NRR / GRR / top-10 share) are not publicly disclosed
    and are the single largest customer-side underwriting blocker, to be resolved by the 2026 IPO DRHP.
sections:
- id: customer-base-and-segmentation
  title: Customer base, segmentation, and adoption signals
  body: >-
    Zetwerk's buyer side is segmented across at least six dimensions — vertical (auto, heavy industrial, aerospace / defence,
    renewables, consumer electronics, capital goods), buyer scale (large enterprise OEM vs. mid-market), geography (India
    domestic vs. cross-border), use-case (custom programme vs. repeat production), procurement model (single-counterparty
    managed vs. RFQ-only), and revenue band (top-tier strategic vs. long-tail). The largest revenue concentrations almost
    certainly sit in industrial conglomerates and renewables IPPs — the buyers with both scale and cadence to drive multi-programme
    relationships — though the company has not publicly disclosed top-customer share. Adoption signals visible from public
    surfaces include the growth of dedicated segment pages (electronics, aerospace, renewables, precision machining), expanding
    international site coverage (zetwerk.com/in/), the growth of named acquisitions that imply customer-driven capability
    decisions (Pinaka for defence buyers, Unimacts for solar buyers, Sharp Tanks for fabrication buyers), and aggressive engineering
    hiring (per careers and LinkedIn signals) that suggests sustained programme-volume growth. Without audited cohort data,
    however, adoption is a directional rather than a forensic signal.
  claimRefs:
  - CU001
  - CU002
  - CU003
  - CU004
  - CU005
  - CU006
  - CU007
  - CU008
  - CU009
  - CU010
  tableRefs:
  - TU001
  - TU002
  figureRefs:
  - FU001
  - FU002
- id: named-customer-proof
  title: Named customer proof, deployment maturity, and reference quality
  body: >-
    Public named customers are sparser than for software-marketplace peers because Zetwerk operates a B2B manufacturing relationship
    that buyers rarely advertise. From the synthesis of Indian press, company surfaces, and adjacent industry sources, the
    named or strongly-implied customer set spans large Indian industrial OEMs and conglomerates (Tata Steel and Mahindra &
    Mahindra in industrial / automotive programmes via supplier-tier relationships), defence and aerospace ecosystem buyers
    (HAL-adjacent programmes via Pinaka), renewable-energy developers (Tata Power, Adani Green-adjacent IPPs via the Unimacts
    BoS programmes), consumer-electronics brands (PLI-tied OEMs via Zetwerk Electronics), and L&T- adjacent capital-goods
    programmes. Production vs. pilot status: most named programmes appear to be in production based on the scale and recurrence
    of company communications, but per-programme outcome specificity is not publicly disclosed. Reference quality is therefore
    moderate — buyer names are defensible but per-programme outcomes (cycle time, cost saving, defect rate) are not. The limitation
    across the board is that public named-customer evidence is two or three steps removed from contractual reality, and the
    DRHP risk-factor section will be the first authoritative customer-by-customer disclosure. Adverse coverage in Indian press
    around layoffs and growth normalisation suggests some customer programmes may have been re-baselined in 2024.
  claimRefs:
  - CU011
  - CU012
  - CU013
  - CU014
  - CU015
  - CU016
  - CU017
  - CU018
  - CU019
  - CU020
  tableRefs:
  - TU003
  figureRefs:
  - FU003
- id: retention-expansion-concentration
  title: Retention, expansion, and concentration risk
  body: >-
    Retention metrics — net revenue retention, gross revenue retention, churn, contract length, repeat-purchase cohort behaviour
    — are not publicly disclosed. The structural retention narrative is favourable in the sense that custom-manufacturing
    programmes typically renew across multiple delivery cycles once a supplier is qualified into a buyer's approved-vendor
    list, but the magnitude is unverifiable until DRHP. Expansion drivers visible from public communications include cross-sell
    across capability modules (a buyer starting in machining adding electronics or fabrication), geographic expansion (adding
    cross-border buyer accounts via the US / EU / UK channels), and segment expansion (an industrial buyer adopting renewables
    BoS). Concentration risk is the single most material customer-side risk: with FY24 revenue at roughly US$1.74B and a buyer
    base in the multi-thousand range, the top-10 buyer share is almost certainly material; without DRHP disclosure the underwriting
    case must assume meaningful concentration. Channel and partner dependence includes large industrial conglomerates (whose
    programmes can shift mix significantly), defence procurement bodies (whose tendering cycles can swing volume), and PLI-tied
    electronics brand-owners (whose capacity-sourcing decisions can crowd out marketplace volume). Procurement friction in
    regulated segments — DGAQA / IATF / IPC qualifications — adds onboarding friction that is both a barrier to entry for
    competitors and a barrier to expansion for Zetwerk. The honest customer verdict is that retention is structurally favourable,
    expansion paths are credible, but concentration risk and per-customer economics are unknowable from public sources and
    will materially       affect IPO valuation underwriting and bridge-financing risk during the listing window.
  claimRefs:
  - CU021
  - CU022
  - CU023
  - CU024
  - CU025
  - CU026
  - CU027
  - CU028
  - CU029
  - CU030
