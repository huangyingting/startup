      - number: '6.3'
        title: 留存、扩张与集中度风险
        blocks:
          - type: paragraph
            body: >-
              留存指标——净收入留存、总收入留存、流失率、合同期限、复购队列表现——均未公开披露。结构性留存叙事偏有利，因为定制制造项目中，供应商一旦进入买方合格供应商名单，通常会跨多个交付周期续约；但在 DRHP
              之前，强度无法验证。公开沟通可见的扩张驱动包括能力模块交叉销售（从机加工起步的买方增加电子或制造）、地理扩张（通过 US / EU / UK 渠道增加跨境买方账户）和板块扩张（工业买方采用可再生能源
              BoS）。集中度风险是客户侧最重要的单一风险：FY24 收入约 US$1.74B，买方基盘为数千级，top-10 买方占比几乎肯定重要；没有 DRHP
              披露，投资判断必须假设存在显著集中。渠道和伙伴依赖包括大型工业集团（其项目可显著改变组合）、国防采购机构（招标周期可大幅摆动产量）以及 PLI
              绑定的电子品牌方（其产能寻源决定可能挤出市场平台量）。受监管板块的采购摩擦——DGAQA / IATF / IPC 资质——增加入驻摩擦；它既是竞争对手的进入壁垒，也是 Zetwerk
              扩张的阻力。坦率的客户判断是：留存结构上有利，扩张路径可信，但集中度风险和单客户经济模型无法从公开来源得知，并会在上市窗口内实质影响 IPO 估值承销和过桥融资风险。
