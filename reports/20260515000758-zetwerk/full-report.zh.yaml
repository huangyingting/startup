      - number: '3.2'
        title: 能力对比与定价姿态
        blocks:
          - type: paragraph
            body: >-
              能力上，Zetwerk 的市场平台覆盖品类比 Xometry / Protolabs 更宽（后者强在按需精密零件和增材），但受监管板块的资质深度不如 Foxconn /
              Jabil（后者在超大规模电子制造服务中占主导）。Zetwerk 能力面覆盖钣金、铸造、机加工、喷漆、涂装、阳极氧化、电子 PCBA 和航空航天精密件。Xometry 和 Protolabs
              用即时报价引擎公开按件标准化定价；Foxconn、Flex、Jabil 和印度工业集团谈的是不公开定价的企业合同。IndiaMART 等印度 B2B 市场平台靠向供应商收取线索生成订阅费变现——这与
              Zetwerk 的“佣金 + 服务”抽成模式根本不同。因此，定价透明度只有相对于 EMS 和工业集团既有者才是真正差异化；相对于 Xometry / Protolabs，它只是持平（或略落后）。Zetwerk
              的能力缺口包括：没有达到 Xometry / Protolabs 成熟度的公开即时报价前端，US 规模的按需增材制造有限，面向 Fortune-500 EMS 级合同的企业销售动作仍在成形。
