        title: 客户基盘、分层与采用信号
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 买方侧至少可以按六个维度分层：垂直行业（汽车、重工业、航空航天 / 国防、可再生能源、消费电子、资本品）、买方规模（大型企业 OEM vs. 中端市场）、地理（印度国内 vs.
              跨境）、用例（定制项目 vs. 重复生产）、采购模式（单一交易对手托管 vs. 仅 RFQ）和收入层级（顶级战略客户 vs. 长尾）。最大收入集中几乎肯定落在工业集团和可再生能源
              IPP——这些买方既有规模，也有节奏来推动多项目关系——但公司没有公开披露头部客户占比。公开页面可见的采用信号包括专门板块页面增长（电子、航空航天、可再生能源、精密机加工）、国际站点覆盖扩大（zetwerk.com/in/）、具名收购增长并暗示客户驱动的能力决策（面向国防买方的
              Pinaka、面向太阳能买方的 Unimacts、面向制造买方的 Sharp Tanks），以及激进工程招聘（按 careers 和 LinkedIn
              信号），说明项目量持续增长。不过，没有经审计队列数据，采用只能作为方向性信号，不能作为可取证信号。
