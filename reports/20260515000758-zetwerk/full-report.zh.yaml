      - number: '3.3'
        title: 护城河耐久性、切换成本与替代风险
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 已构建的最强护城河是：（a）印度供应商网络深度（公司称有 10,000+ 制造商网络）；（b）通过收购实现能力纵向整合（可再生能源的 Unimacts、航空航天的 Pinaka、制造的 Sharp
              Tanks）；（c）受监管板块资质，一旦拿到就有不对称粘性。最大替代风险包括：印度既有工业集团扩张自有数字采购（Tata、Mahindra），印度公开 B2B 平台（IndiaMART）延伸到托管履约，EMS
              巨头（Foxconn、Flex）拿下大型电子 PLI 驱动合同并挤出市场平台量，以及全球数字 CM
              同业（Xometry）通过伙伴进入印度。买方侧多平台并行风险真实存在——买方通常会为每个项目认证多家供应商；供应商侧渠道权力中等，因为制造商会同时上多个市场平台。来自公开同业（Xometry /
              Protolabs）的毛利率压缩风险说明，即便达到规模，数字 CM 也给不出软件市场平台式毛利率。坦率的护城河判断是：“在印度眼下耐久；放到全球看比表面窄；并且取决于公司能否持续通过 IPO
              获得资本。”还要明确加权两个动态。第一，供应商独占性是最大未知数——Zetwerk 的 10,000+ 供应商说法没有披露其中多少制造商独家合作，多少同时在 IndiaMART、Moglix、Udaan 或直接
              OEM 关系中多平台并行；这个比例决定定价权。第二，政府采购和 PLI 绑定招标流，对敏感品类更偏向既有国防 PSU（HAL、BHEL、BEL），对电子领域更偏向大型 EMS
              投标者（Foxconn、Flex），留给 Zetwerk 的是长尾和 Tier-2 本土化切片。累计看，Zetwerk 已建立可信的印度市场平台位置，并有全球抱负；但毛利率和多平台并行暴露，是进入 IPO
              尽调时最重要的两个竞争脆弱点。
