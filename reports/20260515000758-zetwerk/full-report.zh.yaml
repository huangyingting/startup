  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 横跨多个受监管领域：Companies Act 2013 和 SEBI ICDR/LODR 制度约束其计划中的 IPO；PLI
              计划支撑其消费电子收入中的重要一块；国防和航空航天审批框架（DPP/DAP、MoD offsets、国防供应商注册）约束 HAL 和 DRDO 邻近项目，包括 Pinaka
              收购；环境许可和污染委员会同意制度约束铸造、制造、表面处理和电子组装设施；GST/customs/DGFT 制度约束国内和出口营运资本；劳动和 ESG 制度约束多站点合同制造运营。这些风险都不是 Zetwerk
              独有，但叠加后形成很高监管暴露面。短期内最影响投资判断的监管事件是 SEBI DRHP 审查和上市批准；项目层面最关键的监管暴露是 PLI 政策连续性，资格、里程碑和追回风险都会实质影响 Zetwerk
              Electronics 收入。DRHP 前公开来源未显示执法行动或未决诉讼，尽调时必须通过 MCA 和 Indian Kanoon 确认。承保实务顺序是：（a）确认 DRHP 申报被受理；（b）核验
              Electronics 板块 PLI 里程碑达成状态；（c）把 MCA21 charges 和任何未决 Indian Kanoon 事项与 DRHP 风险因素披露交叉核对。
