              试点状态：基于公司沟通的规模和重复出现频率，大多数具名项目似乎已进入生产，但单项目结果细节没有公开披露。推荐质量因此为中等——买方名称可防守，但单项目结果（周期、成本节约、缺陷率）不可防守。整体限制是，公开具名客户证据与合同现实相隔两到三步；DRHP
