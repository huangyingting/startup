      - number: '8.2'
        title: 乐观 / 基准 / 悲观情景与可比公司
        blocks:
          - type: paragraph
            body: >-
              基准情景（50% 概率）把 Zetwerk 的 IPO 估值标记定在 US$3.0-3.5B，与 Dec-2024 老股交易一致；假设 FY25 收入 US$2.0-2.2B（15-25% 增长）、亏损收窄至
              US$60-80M，且 DRHP 确认前 10 大客户收入占比低于 50%。乐观情景（20% 概率）估值 US$4.5-5.5B，需要 30%+ 增长、亏损到 FY27 收窄至盈亏平衡，并且 印度制造业可比公司在
              PLI / Make-in-India 动能下重估。悲观情景（30% 概率）估值 US$1.8-2.4B（~25-40%
              估值下修），触发因素是亏损收窄失败、客户集中度披露不利，或上市延后到更弱的市场窗口。可比公司组：Xometry (NASDAQ: XMTR) 以约 US$540M 收入对应约 US$0.5-0.8B 市值，隐含约
              1.0-1.5x EV/Revenue；Protolabs (NYSE: PRLB) 以约 US$500M 收入对应约 US$1.0-1.4B 市值，隐含约 1.3-1.6x
              EV/Revenue。印度制造业可比公司（Bharat Forge、L&T 式大盘股）交易倍数更高，但规模不可比。私募先例（Infra.Market、Udaan）达到独角兽级别，但增长与亏损画像不同于
              Zetwerk 定位。情景权重说明：悲观情景 30% 权重同时反映 2024 重组信号，以及 Udaan 为印度 B2B 私营市场留下的更广泛下轮先例；乐观情景 20% 权重需要可信的 PLI /
              Make-in-India 重估，而上市可比公司的交易表现尚未显示这一点。可比组限制：没有上市同行能覆盖 Zetwerk 的六细分托管型市场 + 托管服务混合模式，因此可比区间只能作为方向参考，而非决定性依据。
