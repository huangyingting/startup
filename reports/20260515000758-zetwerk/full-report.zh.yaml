      - number: '7.2'
        title: 运营、供应链与伙伴风险
        blocks:
          - type: paragraph
            body: >-
              托管型市场平台合同制造商的运营风险主要由质量、可靠性和供应商失效暴露主导：HAL 邻近的 Pinaka 项目、可再生能源 IPP、PLI
              绑定的消费电子品牌，都可能因延迟或不合规格交付触发严重客户影响罚则。供应商风险结构性偏高，因为 Zetwerk 模型依赖一条独立 SME 长尾，而这些 SME 的质量体系、营运资本健康度和劳动合规并不由
              Zetwerk 直接控制。ESG 和劳动风险——制造或铸造伙伴的安全事故、表面处理或喷漆车间的环保通知、性别薪酬或合同工通知——同样偏高。网络和 IT
              系统风险为中等，主要是运营风险，而非数据泄露风险（没有大规模消费者 PII）。伙伴集中度最高的地方在客户侧（top-10 工业和可再生能源买方）以及融资侧（多银行营运资本额度和 PLI
              级工厂项目融资）。缓释成熟度整体为中等——供应商分层质量项目和 ISO 风格认证已经存在，但公开证据不足以证明审计级控制；打破投资逻辑的触发器应聚焦质量召回事件、伙伴现场 ESG
              事故，以及任何单一客户收入占比超过 15-20%。对伙伴层级审计，IC 应预期在 DRHP 或供应商尽调中看到供应商入驻门槛、过程质量控制、伙伴现场安全事故（或不存在事故）的证据，以及任何网络事件修复日志；如果
              DRHP 缺少这些，本身就是警讯。
