      - number: '4.3'
        title: 资本充足性、融资依赖与公开财务缺口
        blocks:
          - type: paragraph
            body: >-
              据报道，公司通过新股和老股轮次累计融资约 US$873M（印度媒体多来源综合；轮次细节见公司概况）。Dec-2024 老股交易以约 US$3.1B 投后估值完成。账上现金和月度烧钱速度未公开；按 US$110M
              年亏损和 Dec-2024 后 US$200M-US$300M 现金余额的保守假设（基于已披露新股融资的粗略估算），现金跑道约 18-30 个月——足够撑到 2026 IPO
              窗口，但不足以在上市延后时不靠额外过桥融资。按 IPO 媒体报道，计划资金用途包括消费电子产能扩张（约 INR 1,000 cr / US$120M）、可再生能源 / Unimacts 扩产（INR 500 cr
              / US$60M）和营运资本。债务和项目融资义务未公开拆分；PLI
              绑定信贷额度和供应商融资安排可能很重要。最大的公开财务缺口包括：经审计分部收入、毛利率、月度烧钱速度、营运资本周期、债务期限表和客户集中度——这些都要等 DRHP 申报才知道。截至 2026
              年中，这些缺口让估值承销只能是方向性判断，而非尽调级判断。实务含义是，任何 IPO 前老股定价都应给不透明性打折；IPO 本身将是第一次用硬成本和现金披露来校准头部增长叙事的机会。
