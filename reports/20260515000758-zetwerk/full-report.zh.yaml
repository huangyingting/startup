      - number: '1.2'
        title: 创始人、领导层与关键人物依赖
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 由四位 Indian Institute of Technology 校友于 2018 年共同创立，四人至今仍是公司公开形象的核心。Amrit Acharya（IIT
              Madras，Electrical）担任 CEO，此前在 McKinsey、Robert Bosch、Avaya、Foundation Capital、Monsanto Growth Ventures 和 ITC
              工作。Srinath Ramakkrushnan（IIT Madras，Mechanical）有 General Motors、Acumen Fund、Selco India、ITC 和 BlackBuck
              经历。Vishal Chaudhary（IIT Kharagpur，Chemical）曾任职于 ITC 和 RIVIGO。Rahul Sharma（IIT Roorkee）曾在 Schlumberger 和
              BlackBuck 工作，并曾共同创办 Prepnut。创始人班底少见地厚，混合了硬件运营、供应链物流和影响力金融背景，但对 CEO Amrit Acharya 的关键人物集中度很高——融资、IPO
              时间表和战略资本部署都由他对外发声。公开来源没有披露董事会构成、独立董事人数和投资人投票权，这是核心治理缺口。Greenoaks、Khosla Ventures、Lightspeed、Sequoia（Peak
              XV）和 Accel 的伙伴 / 投资组合页面确认 Zetwerk
              仍是这些基金当前具名持仓，间接印证它们仍在投资人席位上。公开招聘页面和职业入口显示，公司有一支销售工程和供应链运营团队支撑四位创始人，但还没有在最重要的资本形成决策上替代他们。创始人叠加投资人的组合看起来背景扎实，但仍由创始人塑形；IPO
              过程最终必须把这一结构制度化为独立董事会监督。
