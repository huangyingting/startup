  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界：纳入与排除的支出
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 服务的市场，是由数字市场平台居间的定制 B2B
              合同制造；平台掌握买方关系、供应商筛选、质量控制和物流。因此，纳入支出覆盖企业采购定制金属件、组件、钣金冲压件、铸件、精密机加工件，并越来越多覆盖电子
              PCBA、太阳能制造和航空航天部件，以及托管库存、质量控制等增值服务。排除支出包括商品化现货工业用品（Moglix / 工业采购范围）、IndiaMART 这类被动目录市场（平台不负责交付），以及 OEM
              直接掌握供应商关系的纯 EMS 自有合同制造（Foxconn / Flex / Jabil
              范围）。现状替代方案是企业内部采购团队，在数百家小型制造商之间运行碎片化招标和供应商管理流程，再由区域分销商补位。因此，市场平台身份同时对抗三类对象：被动目录市场、传统 EMS，以及 OEM
              内部采购。边界足够宽，单一 TAM 数字很难干净捕捉；本章因此采用三种规模测算视角，而不是只给一个数字。
