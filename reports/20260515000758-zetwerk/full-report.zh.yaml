  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义、模块与客户工作流
        blocks:
          - type: paragraph
            body: >-
              从客户视角看，Zetwerk 的产品是一种单一交易对手体验，用于采购定制制造零件和组件；它替代了本应由买方主导、跨越数十家碎片化供应商的 RFQ
              到交付流程。公开页面可见的产品模块包括精密机加工、钣金制造、铸造和锻造、表面处理（喷漆、涂装、阳极氧化）、电子 PCBA
              与组装、航空航天与国防精密件，以及可再生能源系统平衡组件（BoS）。客户提交项目需求（图纸、BOM、目标产量、合规约束），Zetwerk 将需求匹配给其 10,000+
              网络中的合格供应商，或匹配给自有工厂（可再生能源的 Unimacts、航空航天的 Pinaka、制造的 Sharp Tanks），再执行质量控制、管理物流，并在单一 PO 下交付。因此，客户可见工作流是：RFQ
              → 匹配报价 → 项目执行 → 过程质量控制 → 交付 →
              售后支持。价值主张是缩短周期、单一交易对手负责，并接入一套合格供应商基盘；若由内部采购团队自建，这套基盘通常要花数年。市场平台表层之外，产品还捆绑融资和授信层（供应商预付款、营运资本额度）以及托管服务层（项目管理、质量控制、物流），共同把原本碎片化、多供应商的寻源工作转成面向买方的单一交易对手体验；这种捆绑是
              Zetwerk 区别于纯目录平台的核心商业主张。
