      - number: '7.3'
        title: 财务、执行与缓释触发器
        blocks:
          - type: paragraph
            body: >-
              财务风险是 Zetwerk 风险面中最直接影响投资的部分：FY24 收入 US$1.74B、累计股权融资 US$873M，但净亏损同比扩大约 9x 至约 US$110M，这意味着现金跑道和 IPO
              时间表不可分割。IPO 延迟或降价，会迫使公司选择成本高昂的过桥融资（很可能是结构化债务或优先权很重的股权），或显著削减成本；2024
              裁员周期说明管理层已部分动用了第二个选项。执行风险集中在快速新增板块（电子、国防、可再生能源 BoS）带来的管理带宽，以及并购动作（Unimacts、Pinaka、Sharp
              Tanks）的整合负担。缓释成熟度混合：成本纪律触发器可信（已经证明有裁员能力），但治理成熟度（独立董事、审计委员会深度、ESG 董事会监督）在 DRHP 前公开来源中仍不可验证。值得跟踪的否决标准：IPO 较
              US$3.1B Dec-2024 估值下调超过 25%；FY25/FY26 亏损收入比未能压缩；营运资本周期拉长超过 90 天；或 DRHP 财务报表出现任何重大保留审计意见。IC
              应把上市窗口前达成的任何结构化债务或优先权很重的过桥融资视为短期打破投资逻辑的事件，因为它会实质提高隐含资本成本、稀释现有普通股，并发出计划上市估值的承销支持减弱信号。
