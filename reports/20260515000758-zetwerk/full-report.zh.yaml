chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份定位、商业模式与运营规模
        blocks:
          - type: paragraph
            body: >-
              Zetwerk Manufacturing Businesses Pvt. Ltd. 是一家总部位于 Bangalore 的 B2B 定制制造市场平台，连接全球企业和 OEM
              买方，以及印度和海外供应商网络。公司公开页面描述了一条软件驱动、从需求接入到交付的流程，支持钣金冲压、熔模铸造、精密机加工、原型制作、组件、粉末涂装、喷漆和阳极氧化。官网首页覆盖的行业包括交通运输、工业机械、消费品与电子、建筑与基础设施、能源与公用事业，以及航空航天与国防。公司在首页突出四个运营指标：交付周期最高缩短
              50%、制造 9 million+ 个零件、1,800+ 活跃客户，并交付至 20+ 个国家。StartupTalky 在 March-2025 的长篇档案复用了同一组 KPI，并标注为 February
              2024，说明首页数字更像静态时点数据，而非最新更新。收入模式是交易佣金加增值服务（质量控制、物流、托管库存）。因此，Zetwerk 的身份已较清楚：它是纵向整合的市场平台，不是纯目录平台，也不是纯 EMS
              厂商；公司虽有软件优先的出身，但创立 30 天内就转向市场平台模式。
