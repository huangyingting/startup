      - number: '2.2'
        title: 规模测算视角——全球、印度机械，以及可再生能源 / 航空航天叠加
        blocks:
          - type: paragraph
            body: >-
              三个独立视角限定可寻址市场。（1）全球合同制造——Grand View Research 的医疗保健单一切片在 2024 年为 US$213B，预计到 2033 年达到 US$566B，CAGR 为
              11.69%，可作为更大品类的增速锚。（2）据 Statista，印度机械和设备产出在 2024 年约 US$60B，至 2028 年 CAGR 为 2.11%，更接近 Zetwerk
              国内工业客户基盘；更广义的印度制造业还叠加 Wikipedia 引用 IBEF 和 Make in India programme 给出的接近 US$500B 的 2025 GVA
              目标。（3）板块叠加——可再生能源（太阳能 / 风能）、航空航天与国防、消费电子各自都有数十亿美元级可寻址预算；Zetwerk 最近的 INR 500 crore 可再生能源产能公告和 INR 1,000
              crore 消费电子计划，明确指向印度可再生能源板块和印度太阳能产业。每个视角都有局限：Grand View 的医疗保健切片并非 Zetwerk 直接服务；Statista
              的机械产出衡量生产而非采购；印度政府项目目标混合了公共投资和私营部门预测。坦率看，没有一个公开 TAM 能干净等于 Zetwerk 的服务市场，所以本章保留三种视角，并标出其中矛盾。
