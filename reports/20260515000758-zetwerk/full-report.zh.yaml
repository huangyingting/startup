    sections:
      - number: '3.1'
        title: 横跨直接、既有、相邻和替代方案的竞争格局
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 最适合被理解为三种不同业务的混合体，所以没有任何单一竞争对手能一一对应。（1）直接同业是全球数字合同制造商 Xometry 和 Protolabs——两者均已上市，都通过网页平台销售即时报价 /
              按需零件，且按投资人页面披露都有数亿美元级收入基盘。（2）既有 EMS 巨头——Foxconn、Flex、Jabil、Celestica、Sanmina——规模完全不同（收入数百亿美元），但争夺企业 CM
              的心智和产能，尤其在电子领域。（3）印度 B2B 市场平台——IndiaMART（BSE/NSE 上市）、Moglix、Udaan、Infra.Market——在供应商网络和采购软件上重叠，但通常不像
              Zetwerk 一样掌握交付和质量控制。（4）印度大型工业集团——Tata Group、Mahindra、Bharat
              Forge、HAL、BHEL——是航空航天、国防和重型机械的本土既有者基准；它们竞争的是长周期项目，而 Zetwerk 的市场平台模式才刚开始进入资格圈。（5）OEM
              内部采购是主导性的现状替代方案，也是“流失”的可寻址支出中最大的一池。
