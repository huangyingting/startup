  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入流、定价与收入质量
        blocks:
          - type: paragraph
            body: >-
              Zetwerk 的收入模式是在市场平台抽佣（对成交制造量收取佣金）之上叠加托管增值服务——质量控制、物流、供应商融资和项目管理——并越来越多加入 Unimacts（可再生能源）和
              Pinaka（航空航天）等被收购主体的自有产出，把市场平台活动转成纵向整合收入。印度媒体（StartupTalky、YourStory）的公开报道显示，FY24 收入约 INR 14,400 cr（约
              US$1.74B），同比增长约 26%；这对印度 B2B 市场平台来说绝对规模异常高，但已明显低于 FY21-FY23
              的多倍增长。定价没有公开拆分：抽佣率和托管服务费按项目谈判。公司尚未发布经审计的分部收入（市场平台抽佣 vs. 自有制造 vs. 服务），因此收入质量无法从公开来源验证；实务上的投资判断问题是，US$1.74B
              中有多少是按总额入账的转手交易额，多少是真正净佣金。预计 2026 年提交的 IPO 红鲱鱼招股书（DRHP）将首次权威解决收入质量问题。评估质量的实用视角，是把 US$1.74B 隐含 GMV 规模与印度
              B2B 市场平台典型抽佣率（中个位数百分比）比较；如果头部数字其实是总额入账交易值，那么净佣金收入会低得多——这个问题只有经审计分部披露才能最终解决。
