  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              投资逻辑：Zetwerk 是印度领先的 B2B 托管型市场平台合同制造商，FY24 收入约 US$1.74B、同比增长
              26%，覆盖工业、航空航天与国防、可再生能源、电子、资本品和跨境项目六大板块，具备可信的并购护城河（Unimacts、Pinaka、Sharp Tanks），并受益于 PLI 和 Make in India
              顺风。IPO 事件窗口是自然退出 / 估值上调催化。反向逻辑：FY24 净亏损同比扩大约 9x 至约 US$110M，工业集团和可再生能源 IPP
              的客户集中度高但未经审计，营运资本周期未知，公开可比公司组合（Xometry、Protolabs）交易倍数低迷。Dec-2024 约 US$3.1B 估值意味着 ~1.8x EV/Revenue；只有在 DRHP
              中出现 FY25/FY26 亏损收窄、经审计集中度和经审计单位经济模型时，这个倍数才守得住。因此，IC 的承销问题是：Zetwerk 的 DRHP 披露能否支撑不低于 Dec-2024
              估值的上市估值，以及上市后自由流通盘是否会奖励增长多于惩罚亏损。承销桥接判断：考虑到 2022-2025 周期中，印度独角兽级 B2B 发行人的老股估值系统性高于上市价格，IC 应把 Dec-2024
              老股估值视为上限，而不是锚。真正的测试是，DRHP 披露的单位经济模型，而不是老股成交价，能否支撑重新标记到上市价格区间。
