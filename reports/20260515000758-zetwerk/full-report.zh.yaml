      - number: '1.3'
        title: 融资、估值、规模与里程碑
        blocks:
          - type: paragraph
            body: >-
              据 StartupTalky 的 March-2025 报道，Zetwerk 已通过 18 轮融资累计募集 US$873.3M，最近披露的机构事件是 12 December 2024 由 Khosla
              Ventures 和 Rakesh Gangwal 领投的 US$70M 融资，投后估值 US$3.1B。28-December-2021 由 Greenoaks 领投的 US$210M 融资以约 US$2.7B
              坐实独角兽身份。6 March 2025 的小额 US$5M Series F 追加融资，以及 March 2024 由 Rakesh Gangwal 参与的 US$20M
              风投轮，位于这些估值节点之间。值得注意的收购包括 Unimacts（US，可再生能源组件，US$39M，30-November-2022）、Pinaka Aerospace
              Solutions（4-July-2022，未披露）、Sharp Tanks（30-June-2022）和 Wardha Fabrication。CEO Acharya 曾公开描述 12-18 个月内通过
              Mumbai 上市完成 IPO，由 JP Morgan 担任银行，目标募资约 US$1B；同时，公司在 November 2024 宣布 INR 500 crore 资本计划，用于扩大可再生能源制造，还提出
              INR 1,000 crore 消费电子扩张计划。FY24 运营收入达到 INR 14,435.7 crore（~US$1.74B），同比增长 26%，但净亏损扩大约 9x 至 INR 919.2
              crore——这是公开报道中最紧张的矛盾，YourStory 对 December-2022 US$120M Greenoaks 债权 +
              股权融资的存档也在暗中放大这一点。本章冻结时间线，方便后续章节用同一条共识时间线审视单位经济模型、市场规模、客户组合和估值防守力。
