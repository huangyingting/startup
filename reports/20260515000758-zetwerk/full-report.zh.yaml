      - number: '5.2'
        title: 运营架构、技术栈与关键依赖
        blocks:
          - type: paragraph
            body: >-
              运营架构是一套分层栈——顶部是交易 / RFQ 引擎层，中间是供应商匹配和项目管理层，底部是物理执行层（第三方供应商工厂加 Zetwerk 自有工厂）。公开技术文档很少；公开职位和 LinkedIn
              活动显示，工程招聘偏向 Java / Python / Node 后端、React 风格网页前端，以及大型印度 B2B 平台常见的 AWS
              云基础设施。关键依赖包括：（1）供应商网络——没有它，市场平台没有库存；（2）被收购的自有工厂——没有它，受监管板块收入无法流动；（3）平台所需的 AWS
              或同等云基础设施；（4）受监管和激励板块所需的印度政府政策连续性（PLI、Make in India、DGAQA
              批准）；（5）营运资本所需的信贷和供应商融资伙伴（银行、NBFCs）；（6）单个工厂上的监管批准（ISO、AS9100、IATF、BIS）。最大的单一运营依赖是供应商网络：供应商层面任何实质性脱离或质量失误，都会直接级联到项目交付。最大的单一软件依赖是未公开文档的项目管理工作流；最大的外部依赖是政府政策。
