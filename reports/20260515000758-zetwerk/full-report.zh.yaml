      - number: '2.3'
        title: 买方分层、增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              买方分层能清楚映射到 Zetwerk 自有页面上的行业：交通运输 / 汽车、工业机械、消费电子、建筑与基础设施、能源与公用事业，以及航空航天与国防；每个行业都有不同预算负责人（采购 vs.
              工程）、采购周期和资质要求。顺风因素有充分证据：据 Wikipedia 和 DPIIT 页面，Make in India 与 PLI 计划在 14 个行业提供直接的生产挂钩补贴；Atmanirbhar
              Bharat 把进口替代强化为政策；World Economic Forum 和 BIS 将 China+1 供应链多元化描述为印度的结构性顺风；Invest India 和 IBEF
              则记录了一套协同推广机器。约束同样关键：定制制造需要前置采购材料，营运资本强度高；供应商质量和准时交付有风险；印度客户信用周期拉长；市场平台经营者自由现金流有限。Xometry（NASDAQ:XMTR）和
              Protolabs（NYSE:PRLB）公开财务文件所呈现的同业压力也说明，即便资本充足的全球数字 CM
              同业，毛利率仍然有限。买方旅程很长（资质、样件、试点、再到量产），切换成本不对称——航空航天或国防供应商一旦通过资质，买方很少重新招标。这种不对称有利于既有者，却让品类增速慢于软件市场平台。尽调含义是，显性顺风（PLI、本土化、China+1）和显性约束（营运资本、供应商质量、同业毛利率天花板）都会叠加；真正的规模问题不是“市场有多大？”，而是“一个资本效率足够高的市场平台经营者，能在不破坏单位经济模型的情况下吃下多少？”这一框架将延续到财务和估值章节。
