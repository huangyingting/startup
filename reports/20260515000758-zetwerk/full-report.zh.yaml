            body: >-
              按模块看成熟度：市场平台和托管服务已成熟（10,000+ 供应商网络、数千买方基盘）；自有电子和航空航天业务在增长（2024 年后收购与计划中的 INR 1,000 cr / INR 500 cr
              扩张）；跨境出口项目处在早期到增长阶段。信任、质量和合规姿态是最大不透明区：公司传达了被收购工厂的 ISO 和行业认证，但没有公开提供按工厂拆分的统一合规地图。航空航天与国防需要 DGAQA 批准和 AS9100
              作为门槛；电子领域通常需要 IATF / IPC。公开沟通中可见的路线图包括消费电子产能建设（Zetwerk Electronics
              旗下）、可再生能源扩张（Unimacts）、航空航天深化（Pinaka）以及计划中的 2026 IPO 上市。工程招聘活动（按职业页面和外部聚合器）显示，公司继续投入平台工程、供应商入驻工具和分析能力。反向 /
              风险视角：缺少公开质量事件报告本身就是尽调缺口——一个横跨数千供应商和受监管板块的市场平台，零公开事件并不大可能；DRHP 将首次有机会把经审计质量指标与公司的增长叙事对齐。产品净判断：Zetwerk
              在印度拥有成熟运营模型，但技术 IP 和质量认证不透明，并依赖持续资本和政策顺风。
