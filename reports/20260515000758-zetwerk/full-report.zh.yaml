        title: 建议、终止触发条件和最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              建议：DRHP 前保持观察，并写清上调和下调条件。在 Dec-2024 估值标记或以下可上调至买入，但需满足：（a）DRHP 确认经审计客户集中度中前 10 大客户占比低于 50%，且单一买方不超过
              15-20%；（b）FY25 P&L 显示亏损 / 收入比例低于 FY24；（c）披露经审计营运资本周期，并向 60-80 天收敛；（d）PLI Electronics
              细分达到里程碑。任一情况出现即下调至放弃：IPO 较 Dec-2024 标记估值下修超过 25%，单一买方收入占比超过 20%，经审计营运资本周期超过 90 天，或 DRHP
              中出现任何重大保留审计意见。信心：中；估值立场：按最新标记，但下行偏斜。风险评级：中高。最终尽调要求：DRHP 客户集中度、营运资本周期、AS9100/NADCAP 认证名单、MCA21 押记登记、合作伙伴场地
              SPCB 通知清单、Pinaka 项目经济性，以及 PLI 追缴风险量化。投资 KPI 在 KPI 图 FV004 中按市场、验证、护城河、经济性、风险、估值和证据质量评分；当前分数反映公开证据状态，DRHP
              披露会显著改变分数。顺序说明：IC 应把 DRHP
              文件获受理作为第一个决策点，把上市价格区间作为第二个，把上市后首个季度业绩作为第三个。每一步都要对照阈值表复核下行触发条件；至少前两个检查点通过后，才有条件上调至买入。
