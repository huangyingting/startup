      - number: '4.2'
        title: 成本结构、毛利率驱动与单位经济模型
        blocks:
          - type: paragraph
            body: >-
              成本结构由两部分主导：市场平台侧的直接制造转付成本（原材料、支付给供应商），以及自有收购主体侧的完整运营成本（Unimacts 工厂、Pinaka 设施）。公开报道显示，FY24 净亏损同比扩大约 9x 至约
              US$110M（印度媒体 / StartupTalky 综合），主要由消费电子制造产能激进扩张、可再生能源建设，以及收购项目持续整合成本推动。公司未公开毛利率，但公开同业 Xometry 和 Protolabs
              的可比毛利率区间（按投资者关系披露）显示，数字合同制造可达到的稳态毛利率大致在
              20%-30%——远低于软件市场平台范式。单位经济模型——CAC、回本周期、单项目贡献毛利——尚未披露；分析师代理指标指向多季度项目收入周期、营运资本吃重的运营（制造商付款期短于买方回款期），以及每个被收购工厂数十
              crore 级资本开支。结论是，收入真实且在增长，但通向经营性盈利的路径无法从公开来源验证，这是最重要的尽调卡点。
