company:
  name: Zetwerk
chapter:
  number: 3
  title: Competitors
  summary: >-
    Zetwerk competes simultaneously against three different classes of alternatives — global digital contract-manufacturing
    peers (Xometry NASDAQ:XMTR, Protolabs NYSE:PRLB), traditional EMS giants (Foxconn / Hon Hai, Flex NASDAQ:FLEX, Jabil NYSE:JBL,
    Celestica, Sanmina), and Indian B2B marketplaces / industrial procurement players (IndiaMART, Moglix, Udaan, Infra.Market)
    — plus large Indian industrial incumbents (Bharat Forge, Tata Group, Mahindra, HAL/BHEL) and OEM in-house procurement,
    which is the largest substitute. Differentiation rests on the marketplace-plus-managed-services model in India; durability
    will depend on margin defence as the playbook is copied.
sections:
- id: landscape
  title: Competitive landscape across direct, incumbent, adjacent, and substitute alternatives
  body: >-
    Zetwerk is best understood as a hybrid of three distinct businesses, which is why no single competitor maps one-to-one.
    (1) Direct peers are global digital contract manufacturers Xometry and Protolabs — both publicly listed, both selling
    instant-quote / on-demand parts via web platforms, both with multi-hundred-million-dollar revenue bases per their investor
    pages. (2) Incumbent EMS giants — Foxconn, Flex, Jabil, Celestica, Sanmina — operate at very different scale (tens of
    billions in revenue) but compete for enterprise CM mindshare and capacity, especially in electronics. (3) Indian B2B marketplaces
    — IndiaMART (listed on BSE/NSE), Moglix, Udaan, Infra.Market — overlap on supplier-network and procurement-software but
    typically do not own delivery and quality-control the way Zetwerk does. (4) Large Indian industrial conglomerates — Tata
    Group, Mahindra, Bharat Forge, HAL, BHEL — represent the indigenous-incumbent benchmark for aerospace, defence, and heavy
    machinery; they compete on long-cycle programmes Zetwerk's marketplace model is just beginning to qualify for. (5) OEM
    in-house procurement is the dominant status-quo substitute and the largest pool of "lost" addressable spend.
