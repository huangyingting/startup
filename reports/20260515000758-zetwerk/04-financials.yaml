- id: cost-structure-unit-economics
  title: Cost structure, gross margin drivers, and unit economics
  body: >-
    Cost structure is dominated by direct manufacturing pass-through (raw materials, supplier payouts) on the marketplace
    side, plus full operating cost on the captive-acquired side (Unimacts factories, Pinaka facilities). Public reporting
    indicates net loss widened roughly nine times year-on-year in FY24 to roughly US$110M (Indian press / StartupTalky synthesis),
    driven by aggressive expansion of consumer-electronics manufacturing capacity, the renewables build-out, and continued
    integration costs from the acquisition programme. Gross margin is not publicly reported, but the comparable margin envelope
    from public peers Xometry and Protolabs (per their investor relations disclosures) suggests the steady-state achievable
    gross margin for digital contract manufacturing is in the 20%-30% range — well below software-marketplace norms. Unit
    economics — CAC, payback, contribution margin per programme — are not disclosed; analyst proxies point to multi-quarter
    project-revenue cycles, working-capital-heavy operations (manufacturer payouts run on shorter terms than buyer collections),
    and capex per acquired plant in the tens-of-crores range. The verdict is that revenue is real and growing, but the path
    to operating profitability remains unverifiable from public sources and is the single most material diligence blocker.
  claimRefs:
  - CI012
  - CI013
  - CI014
  - CI015
  - CI016
  - CI017
  - CI018
  - CI019
  - CI020
