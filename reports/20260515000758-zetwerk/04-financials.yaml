company:
  name: Zetwerk
chapter:
  number: 4
  title: Financials
  summary: >-
    Zetwerk's financial profile is high-growth but capital-hungry: marketplace-plus-managed-services revenue of roughly US$1.74B
    in FY24 grew about 26% YoY but was paired with a net loss that widened roughly nine times year-on-year (to roughly US$110M),
    with cumulative equity raised of about US$873M against a Dec-2024 secondary mark of about US$3.1B. Capital adequacy is
    acceptable for the next 12-18 months but contingent on the planned IPO; underwriting requires audited segment economics,
    working-capital terms, and PLI-tied project finance disclosures that are not yet public.
sections:
- id: revenue-model-and-quality
  title: Revenue streams, pricing, and revenue quality
  body: >-
    Zetwerk's revenue model is a marketplace take-rate (commission on transacted manufacturing volume) layered with managed
    value-added services — quality control, logistics, supplier financing, and project management — plus, increasingly, captive
    output from acquired entities such as Unimacts (renewables) and Pinaka (aerospace) that converts marketplace activity
    into vertically-integrated revenue. Public reporting from Indian press (StartupTalky, YourStory) places FY24 revenue at
    roughly INR 14,400 cr (about US$1.74B) with about 26% year-over-year growth, an exceptionally high absolute scale for
    an Indian B2B marketplace but down materially from the multi-x growth rates of FY21-FY23. Pricing is not publicly itemised:
    take-rate and managed-services fees are negotiated per programme. Revenue quality is unverifiable from public sources
    because the company has not yet published audited segmented revenue (marketplace take versus captive manufacturing versus
    services); the practical underwriting question is how much of US$1.74B is pass-through trading volume booked gross versus
    net commission. The IPO red-herring (DRHP) due in 2026 will be the first authoritative resolution of revenue quality.
    A practical lens on quality is to compare the implied gross merchandise scale of US$1.74B against typical Indian B2B-marketplace
    take rates (mid-single-digit percentage), which would imply much lower net-commission revenue if the headline figure is
    in fact gross-booked transaction value — a question only audited segmentation can settle conclusively.
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI004
  - CI005
  - CI006
  - CI007
  - CI008
  - CI009
  - CI010
