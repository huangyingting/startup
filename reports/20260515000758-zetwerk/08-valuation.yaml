company:
  name: Zetwerk
chapter:
  number: 8
  title: Valuation
  summary: >-
    Zetwerk's most recent secondary mark of about US$3.1B (Dec-2024) sits against US$1.74B FY24 revenue (~26% YoY growth)
    and a roughly 9x-widened net loss of about US$110M. Public comparables Xometry (~1.0-1.5x EV/Revenue) and Protolabs (~1.3-1.6x
    EV/Revenue) imply a 1-2x EV/Revenue band for asset-light managed-marketplace contract manufacturers; Zetwerk's mark sits
    at ~1.8x, defensible if FY25/FY26 loss-to-revenue compresses and PLI/defence revenue mix grows. Recommendation: TRACK
    pending DRHP - upgrade to BUY only with audited customer concentration, working-capital cycle, and unit-economics evidence;
    downgrade to PASS if IPO down-round exceeds 25% vs Dec-2024 mark.
sections:
- id: thesis-anti-thesis
  title: Investment thesis and anti-thesis
  body: >-
    Thesis: Zetwerk is the leading Indian B2B managed-marketplace contract manufacturer at approximately US$1.74B FY24 revenue
    with 26% YoY growth, a six-segment offering across industrial, aerospace and defence, renewables, electronics, capital
    goods, and cross-border programmes, a credible inorganic moat (Unimacts, Pinaka, Sharp Tanks), and PLI- and Make-in-India-aligned
    tailwinds. The IPO event window is the natural exit / mark-up catalyst. Anti-thesis: net loss widened roughly 9x year-on-year
    to about US$110M in FY24, customer concentration in industrial conglomerates and renewables IPPs is high but unaudited,
    working-capital cycle is unknown, and the public comparable set (Xometry, Protolabs) trades at depressed multiples. The
    Dec-2024 mark of about US$3.1B implies ~1.8x EV/Revenue, defensible only if FY25/FY26 loss compression, audited concentration,
    and audited unit economics emerge in the DRHP. The IC's underwriting question is therefore whether Zetwerk's DRHP disclosures
    will support a listing valuation at or above the Dec-2024 mark and whether the post-listing free-float will reward growth
    more than it penalises losses. Underwriting bridge: the IC should treat the Dec-2024 secondary mark as a ceiling, not
    an anchor, given that secondary marks for Indian unicorn-scale B2B issuers have systematically over-marked listing prices
    over the 2022-2025 cycle. The relevant test is therefore whether DRHP-disclosed unit economics, not the secondary print,
    justifies a re-mark to the listing range.
  contentRequirementRefs:
  - 0
  claimRefs:
  - CV001
  - CV002
  - CV003
  - CV004
  - CV005
  - CV006
  - CV007
  - CV008
