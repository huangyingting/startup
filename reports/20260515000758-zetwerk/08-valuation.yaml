- id: scenarios-and-comparables
  title: Bull / base / bear scenarios and comparables
  body: >-
    Base case (50% probability) values Zetwerk at US$3.0-3.5B IPO mark in line with the Dec-2024 secondary; assumes FY25 revenue
    of US$2.0-2.2B (15-25% growth), loss compression to US$60-80M, and DRHP-confirmed top-10 customer share below 50%. Bull
    case (20% probability) values at US$4.5-5.5B, requiring 30%+ growth, loss compression to break-even by FY27, and a re-rating
    of Indian manufacturing comparables on PLI / Make-in-India momentum. Bear case (30% probability) values at US$1.8-2.4B
    (~25-40% down-round), driven by failed loss compression, adverse customer-concentration disclosure, or a delay to the
    listing into a weaker market window. Comparable set: Xometry (NASDAQ: XMTR) trades at roughly US$0.5-0.8B market cap on
    roughly US$540M revenue, implying approximately 1.0-1.5x EV/Revenue; Protolabs (NYSE: PRLB) trades at roughly US$1.0-1.4B
    market cap on roughly US$500M revenue, implying approximately 1.3-1.6x EV/Revenue. Indian manufacturing comparables (Bharat
    Forge, L&T-style large-cap) trade richer but are scale-different. Private precedents (Infra.Market, Udaan) are unicorn-scale
    but growth-and-loss profiles differ from Zetwerk's positioning. Scenario-weighting note: the Bear weight of 30% reflects
    both the 2024 reorganisation signal and the broader Indian B2B private down-round precedent set by Udaan; the Bull weight
    of 20% requires a credible PLI / Make-in-India re-rating that is not yet visible in listed-comp action. Comparable-set
    caveat: no listed peer captures Zetwerk's six-segment managed-marketplace + managed-services hybrid, so the comp band
    should be treated as directional rather than determinative.
  contentRequirementRefs:
