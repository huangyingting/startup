- id: recommendation-and-diligence-asks
  title: Recommendation, kill triggers, and final diligence asks
  body: >-
    Recommendation: TRACK pending DRHP, with explicit upgrade and downgrade conditions. Upgrade to BUY at Dec-2024 mark or
    below, contingent on (a) DRHP confirming audited customer concentration below 50% top-10 share with no single buyer above
    15-20%, (b) FY25 P&L showing loss-to-revenue compressing below the FY24 ratio, (c) audited working-capital cycle disclosed
    and trending toward 60-80 days, and (d) PLI Electronics segment showing milestone attainment. Downgrade to PASS at any
    of: IPO down-round exceeding 25% vs Dec-2024 mark, single-buyer revenue share exceeding 20%, audited working-capital cycle
    exceeding 90 days, or any material qualified audit opinion in the DRHP. Confidence: medium; valuation stance: at-mark
    with downside skew. Risk rating: medium-high. Final diligence asks: DRHP customer concentration, working-capital cycle,
    AS9100/NADCAP certification roster, MCA21 charge register, partner-site SPCB notice roster, Pinaka programme economics,
    and PLI claw-back exposure quantification. Investment KPIs are scored across market, proof, moat, economics, risk, valuation,
    and evidence quality on the KPI figure FV004; current scores reflect public-evidence state and will move materially on
    DRHP disclosure. Sequencing note: the IC should treat the DRHP filing acceptance as the first decision-point; the listing
    price band as the second; and the first listed-quarter print as the third. At each step, downside triggers should be re-checked
    against the threshold table; conditional upgrade to BUY only after at least the first two checkpoints clear.
