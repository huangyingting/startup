- id: architecture-and-dependencies
  title: Operating architecture, technology stack, and critical dependencies
  body: >-
    The operating architecture is a layered stack — a transactional / RFQ-engine layer at the top, a supplier-matching and
    programme-management layer in the middle, and a physical-execution layer at the bottom (third-party supplier plants plus
    captive Zetwerk plants). Public technical documentation of the software stack is sparse; engineering hiring patterns from
    public job posts and LinkedIn activity indicate a Java / Python / Node back-end, React-style web front-end, and AWS-based
    cloud infrastructure typical of large Indian B2B platforms. Critical dependencies are: (1) the supplier network — without
    it, the marketplace has no inventory; (2) acquired captive plants — without them, regulated-segment revenue cannot flow;
    (3) AWS or equivalent cloud infrastructure for the platform; (4) Indian government policy continuity (PLI, Make in India,
    DGAQA approvals) for regulated and incentivised segments; (5) credit and supplier-finance partners (banks, NBFCs) for
    working capital; and (6) regulatory approvals (ISO, AS9100, IATF, BIS) on individual plants. The single largest operational
    dependency is the supplier-network: any meaningful disengagement or quality lapse at the supplier level cascades directly
    to programme delivery. The single largest software dependency is the undocumented programme-management workflow; the single
    largest external dependency is government policy.
  claimRefs:
  - CE011
  - CE012
  - CE013
  - CE014
  - CE015
  - CE016
  - CE017
  - CE018
