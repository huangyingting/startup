chapter:
  number: 5
  title: Product and technology
  summary: >-
    Zetwerk's product is best understood as an operating system for B2B custom manufacturing — a digital marketplace plus
    managed-services workflow plus, increasingly, vertically-integrated captive plants. The technology stack underneath (RFQ
    engine, supplier matching, programme-management, quality-control workflow, logistics) is proprietary but largely undocumented
    publicly; the moat is the operating model, supplier network, and acquired manufacturing capability rather than novel software
    IP. Maturity is high in marketplace and managed services, growing in captive electronics and aerospace, and largely opaque
    on certifications and quality-control metrics until DRHP disclosure.
sections:
- id: product-and-workflow
  title: Product definition, modules, and customer workflow
  body: >-
    Zetwerk's product, in customer terms, is a single-counterparty experience for sourcing custom-manufactured parts and assemblies
    — replacing what would otherwise be a buyer-led RFQ-to-delivery effort spanning dozens of fragmented suppliers. The product
    modules visible from public surfaces include precision machining, sheet-metal fabrication, casting and forging, surface
    treatments (painting, coating, anodizing), electronics PCBA and assembly, aerospace and defence precision parts, and renewable-energy
    balance-of-system components. Customers post programme requirements (drawings, BOM, target volumes, compliance constraints),
    Zetwerk matches them to qualified suppliers from its 10,000+ network or to its own captive plants (Unimacts in renewables,
    Pinaka in aerospace, Sharp Tanks in fabrication), executes quality control, manages logistics, and delivers under a single
    PO. The customer-visible workflow is therefore: RFQ → matched quote → programme execution → in-process quality control
    → delivery → after-sales support. The benefit pitch is reduced cycle time, single-counterparty accountability, and access
    to a qualified supplier base that an in-house procurement team would otherwise have to build over years. Beyond the marketplace
    surface, the product also bundles a financing-and-credit overlay (supplier advances, working-capital facilities) and a
    managed-services overlay (programme management, quality control, logistics) that together transform what would normally
    be a fragmented multi-vendor sourcing effort into a single-counterparty experience for the buyer; this bundling is the
    central commercial proposition that distinguishes Zetwerk from listings-only platforms.
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE004
  - CE005
  - CE006
  - CE007
  - CE008
  - CE009
  - CE010
