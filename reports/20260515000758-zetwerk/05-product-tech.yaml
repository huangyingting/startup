- id: maturity-trust-and-roadmap
  title: Maturity, trust / quality / compliance, and product roadmap
  body: >-
    Maturity by module: marketplace and managed services are mature (10,000+ supplier network, multi-thousand-buyer base);
    captive electronics and aerospace are growing (post-2024 acquisitions and planned INR 1,000 cr / INR 500 cr expansions);
    cross-border export programmes are early-to-growing. Trust, quality, and compliance posture is the largest opacity area:
    the company communicates ISO and sectoral certifications across acquired plants, but a consolidated, plant-by-plant compliance
    map is not publicly available. For aerospace and defence, DGAQA approvals and AS9100 are gating; for electronics, IATF
    / IPC are typical. Roadmap items visible from public communications include the consumer-electronics capacity build (under
    Zetwerk Electronics), the renewables expansion (Unimacts), the aerospace deepening (Pinaka), and the planned 2026 IPO
    listing. Engineering hiring activity (per careers page and external aggregators) signals continued investment in platform
    engineering, supplier onboarding tooling, and analytics. Adverse / risk lens: the absence of public quality-incident reporting
    is itself a diligence gap — for a marketplace operating across thousands of suppliers and regulated segments, zero public
    incidents is unlikely; the DRHP will be the first opportunity to reconcile audited quality metrics with the company's
    growth narrative. Net product verdict: a mature operating model in India, opaque on technology IP and quality certifications,
    and dependent on continued capital and policy tailwinds.
