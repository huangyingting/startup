- id: founders-and-leadership
  title: Founders, leadership, and key-person dependence
  body: >-
    Zetwerk was co-founded in 2018 by four Indian Institute of Technology alumni who together remain the public face of the
    company. Amrit Acharya (IIT Madras, Electrical) leads as CEO with prior experience at McKinsey, Robert Bosch, Avaya, Foundation
    Capital, Monsanto Growth Ventures, and ITC. Srinath Ramakkrushnan (IIT Madras, Mechanical) brings General Motors, Acumen
    Fund, Selco India, ITC, and BlackBuck experience. Vishal Chaudhary (IIT Kharagpur, Chemical) was previously at ITC and
    RIVIGO. Rahul Sharma (IIT Roorkee) was at Schlumberger and BlackBuck and previously co-founded Prepnut. The founder bench
    is therefore unusually deep, mixing hardware operations, supply-chain logistics, and impact-finance backgrounds, but key-person
    concentration on CEO Amrit Acharya is high — he is the public spokesman on financing, IPO timing, and strategic capital
    deployment. Public board composition, independent-director count, and investor voting rights remain undisclosed in retained
    sources, which is the central governance gap. The Greenoaks, Khosla Ventures, Lightspeed, Sequoia (Peak XV), and Accel
    partner-portfolio pages confirm the company is a current, named portfolio holding for those funds, indirectly corroborating
    their continued involvement at the investor table. Public hiring pages and the careers surface suggest a sales-engineering
    and supply-chain operations bench that supports the four founders without yet substituting for them on the most material
    capital-formation decisions. The combined founder-plus-investor stack therefore reads as well-pedigreed but still founder-shaped,
    which the IPO process will eventually have to formalise into independent board oversight.
  claimRefs:
