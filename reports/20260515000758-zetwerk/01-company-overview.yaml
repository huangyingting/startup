- id: funding-scale-milestones
  title: Funding, valuation, scale, and milestone chronology
  body: >-
    Per StartupTalky's March-2025 reporting, Zetwerk has raised US$873.3M across 18 rounds, with the most recent disclosed
    institutional event being a US$70M round on 12 December 2024 led by Khosla Ventures and Rakesh Gangwal at a US$3.1B post-money
    valuation. The 28-December-2021 US$210M Greenoaks-led round was the unicorn-cementing financing at roughly US$2.7B. A
    small US$5M Series F follow-on on 6 March 2025 and a US$20M Rakesh Gangwal venture round in March 2024 sit between those
    marks. Notable acquisitions include Unimacts (US, renewable-energy components, US$39M, 30-November-2022), Pinaka Aerospace
    Solutions (4-July-2022, undisclosed), Sharp Tanks (30-June-2022), and Wardha Fabrication. CEO Acharya has publicly framed
    an IPO within 12-18 months via a Mumbai listing with JP Morgan as banker, targeting roughly US$1B raise, alongside an
    INR 500 crore capital plan to expand renewables manufacturing announced in November 2024 and an INR 1,000 crore consumer
    electronics expansion plan. FY24 revenue from operations reached INR 14,435.7 crore (~US$1.74B), up 26% year-over-year,
    but net loss widened roughly nine-fold to INR 919.2 crore — a publicly reported tension that the YourStory archive of
    the December-2022 US$120M Greenoaks debt-equity round implicitly amplifies. This chapter freezes the chronology so later
    chapters can interrogate unit economics, market sizing, customer mix, and valuation defensibility against a single agreed
    timeline.
