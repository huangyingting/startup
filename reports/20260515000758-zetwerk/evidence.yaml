evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: governance disclosure
    missingEvidence: >-
      Current board roster, independent-director count, and investor voting / preference rights are not publicly
      enumerated.
    whyItMatters: Affects key-person risk assessment and IPO readiness diligence.
    diligencePath: Request board composition, ESOP / preference stack, and shareholder agreements during management diligence.
    relatedQuestionRefs:
      - QO010
    relatedTableRefs:
      - TO002
      - TO003
  - type: enumeration-incomplete
    severity: minor
    topic: milestone completeness
    missingEvidence: >-
      Private internal launches, customer wins, and intra-company governance events are not represented in retained
      sources.
    whyItMatters: Timeline completeness affects product-velocity and partnership interpretation.
    diligencePath: Request internal corporate timeline.
    relatedTableRefs:
      - TO004
  - type: enumeration-incomplete
    severity: material
    topic: TM002 sizing lens completeness
    missingEvidence: Direct India contract-manufacturing TAM number from a single methodology-disclosed publisher.
    whyItMatters: Without it, every published TAM remains a proxy.
    diligencePath: Commission a bespoke TAM/SAM analysis or pull a paid analyst (Frost & Sullivan / Gartner) report.
    relatedQuestionRefs:
      - QM003
    relatedTableRefs:
      - TM002
  - type: missing-source
    severity: minor
    topic: export tariff exposure
    missingEvidence: Quantification of Zetwerk's US export exposure and tariff risk.
    whyItMatters: Tariff policy could compress export margins.
    diligencePath: Request export-revenue mix and customer-country breakdown from management.
    relatedQuestionRefs:
      - QM019
  - type: missing-source
    severity: material
    topic: Xometry India entry timing
    missingEvidence: Published Xometry plans for India market entry would tighten the moat-durability assessment.
    whyItMatters: India geographic moat is core to Zetwerk's near-term defensibility.
    diligencePath: Track Xometry investor calls and India press for partnership announcements.
    relatedQuestionRefs:
      - QP019
    relatedTableRefs:
      - TP004
  - type: enumeration-incomplete
