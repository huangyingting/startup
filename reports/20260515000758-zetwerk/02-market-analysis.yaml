company:
  name: Zetwerk
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    The market Zetwerk addresses sits at the intersection of India's machinery / engineering output (~US$60B of machinery
    alone per Statista), the global contract-manufacturing market (US$213B in healthcare alone in 2024 growing at 11.69% CAGR
    per Grand View Research), and India-specific tailwinds from Make in India, the PLI scheme, and China+1 supply-chain diversification
    — a large but heterogeneous TAM with substantial buyer-budget fragmentation and credible adoption constraints around quality,
    working capital, and trust.
sections:
- id: market-boundary
  title: Market boundary, included and excluded spend
  body: >-
    Zetwerk's served market is custom B2B contract manufacturing intermediated by a digital marketplace that owns the buyer
    relationship, supplier vetting, quality control, and logistics. Included spend therefore covers enterprise procurement
    of made-to-order metal parts, assemblies, sheet-metal stampings, castings, precision machining, and increasingly electronics
    PCBA, solar fabrication, and aerospace components, plus value-added services like managed inventory and quality control.
    Excluded spend includes commodity off-the-shelf industrial supplies (Moglix / industrial-buying territory), passive listings
    markets like IndiaMART (where the platform does not own delivery), and pure EMS captive contract manufacturing where the
    OEM owns the supplier relationship directly (Foxconn / Flex / Jabil scope). The status-quo substitutes are in-house procurement
    teams running a fragmented bid-and-vendor-manage process across hundreds of small fabricators, supplemented by regional
    distributors. The marketplace identity therefore competes against three different things at once: passive directory marketplaces,
    traditional EMS, and OEM in-house procurement. The boundary is wide enough that no single TAM number captures it cleanly,
    which is why this chapter uses three sizing lenses rather than one.
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM004
  - CM005
  - CM006
  - CM007
  - CM008
  tableRefs:
