- id: drivers-and-constraints
  title: Buyer segments, growth drivers, and adoption constraints
  body: >-
    Buyer segmentation maps cleanly to industries on Zetwerk's own surfaces — transportation/automotive, industrial machinery,
    consumer electronics, construction and infrastructure, energy and utilities, and aerospace and defence — each with different
    budget owners (procurement vs. engineering), purchasing cycles, and qualification requirements. Tailwinds are well documented:
    Make in India and the PLI scheme provide direct production-linked subsidies across 14 sectors per the Wikipedia and DPIIT
    pages; Atmanirbhar Bharat reinforces import substitution as policy; the World Economic Forum and BIS frame China+1 supply-chain
    diversification as a structural tailwind for India; and Invest India and IBEF document a coordinated promotion machine.
    Constraints, however, are equally material: working-capital intensity (custom manufacturing requires upfront materials
    buy), supplier quality and on-time-delivery risk, customer credit cycles in India, and limited free-cash-flow profiles
    for the marketplace operator. Public-comparable pressures from Xometry (NASDAQ:XMTR) and Protolabs (NYSE:PRLB) financial
    filings underscore that even well-capitalised global digital CM peers operate at modest gross margins. The buyer journey
    is long (qualification, sample, pilot, then volume) and switching cost asymmetric — once a supplier is qualified for aerospace
    or defence, the buyer rarely re-tenders. That asymmetry favours incumbents but slows category growth versus a software-marketplace
    pace. The diligence implication is that headline tailwinds (PLI, indigenisation, China+1) and headline constraints (working
    capital, supplier quality, peer-margin ceiling) both compound, so the right sizing question is not "how large is the market?"
    but "how much of it can a capital-efficient marketplace operator capture without breaking unit economics?" That framing
    carries forward into the financials and valuation chapters.
