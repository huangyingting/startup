  - id: market-sizing
    title: Market Sizing and Analyst Estimates
    body: >-
      Published estimates for the AI drug discovery market vary considerably based on scope
      definitions—ranging from roughly $1.5 billion (narrow: pure AI generative design
      platforms only) to $4.5 billion (broader: AI-enabled computational drug discovery tools)
      for 2024, with projected CAGRs between 25% and 40%. Drug discovery informatics more
      broadly—which includes cheminformatics, ML tools, and informatics platforms—is estimated
      at $3.5 billion by MarketsandMarkets for 2025 at 9.3% CAGR. The widest boundary,
      life science analytics, is estimated at $35.69 billion in 2024 growing to $68.81 billion
      by 2030 at 11.4% CAGR; this is significantly over-inclusive relative to Insilico's
      direct product footprint.

      Contradictory estimates are pervasive and should be treated with caution. Evaluate Pharma
      and industry analyst summaries place the AI drug discovery market at approximately $4.5
      billion with 25–35% CAGR, while more conservative estimates use narrower scope definitions.
      The IPF drug market can be proxied from Boehringer Ingelheim's Ofev annual revenues of
      approximately $2.4 billion (2022–2023), though the full IPF pharmaceutical market is
      somewhat larger. Global pharma R&D spend of ~$240–250 billion annually represents the
      outer TAM boundary from which AI platform tools compete for a fraction of computational
      and outsourced R&D budget allocation. All analyst estimates are based on paywalled primary
      reports or industry summaries; methodological differences—especially in whether pure-AI
      generative tools, broader cheminformatics, or all digital health analytics are included—
      explain most of the 3–10× spread between analyst estimates and constitute a material
      diligence gap.

      Insilico's serviceable obtainable market through 2026 is primarily limited to platform
      licensing deals with top-tier pharma, milestone payments from partnership programs such
      as the Eli Lilly deal ($2.75 billion total potential value, March 2026), and the potential
      future royalty stream from proprietary drug approvals. No drug primarily designed by AI has
      received full FDA approval as of 2026, which constrains pharma willingness to pay at the
      highest end of the deal value spectrum and preserves uncertainty in SOM sizing.
