company:
  name: Insilico Medicine
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Insilico Medicine operates at the intersection of the AI drug discovery platform market
    (~$1.5–4.5B in 2024 at 25–40% CAGR) and disease-specific therapeutic markets led by
    idiopathic pulmonary fibrosis (IPF) and oncology. Primary buyers are the top-20 global
    pharmaceutical companies—motivated by high drug development costs (~$2.6B/drug), 90%
    clinical failure rates, and $200B+ in patent-cliff revenue at risk through 2030. Growth
    drivers include AlphaFold2/3 disruption, FDA/EMA framework development, and post-COVID
    pharma digitalization. Constraints include the absence of a fully AI-approved drug, clinical
    trial bottlenecks, and IP friction in partnerships. The March 2026 Eli Lilly deal ($2.75B
    total potential value) validates premium market pricing. Analyst estimates for the AI
    drug discovery market vary by 3–10× due to scope inconsistencies, and the SAM for
    platform licensing to top pharma remains an unresolved diligence gap.

sections:
  - id: market-definition
    title: Market Definition and Boundary
    body: >-
      Insilico Medicine's addressable market spans two interconnected layers. The primary layer
      is the AI-powered drug discovery and development platform market—software and services
      encompassing AI-enabled target identification, generative molecule design, ADMET and
      toxicity prediction, and clinical trial design assistance. This market is distinct from
      general bioinformatics cloud infrastructure, contract research organization (CRO) wet-lab
      services, genomic sequencing platforms, or medical imaging AI, which fall outside Insilico's
      product footprint. The secondary layer comprises disease-specific therapeutic markets where
      Insilico holds proprietary clinical-stage assets: principally IPF (idiopathic pulmonary
      fibrosis) and oncology indications.

      The status-quo substitutes for AI drug discovery platforms include: (1) traditional
      computational chemistry suites (Schrödinger, Maestro, Molecular Operating Environment),
      maintained by in-house pharma computational chemistry groups; (2) CRO-based discovery
      services such as WuXi AppTec and Charles River, which provide wet-lab but limited
      generative AI capabilities; (3) academic collaborations for target validation; and
      (4) internal data science teams lacking dedicated generative AI-drug-design tooling.

      Within the disease markets, IPF affects approximately 130,000 US patients and up to
      6 million globally with interstitial lung disease. Annual incidence is roughly 50,000
      new IPF cases per year in the United States. Despite two approved treatments—nintedanib
      (Ofev, Boehringer Ingelheim, FDA approved October 2014) and pirfenidone (Esbriet,
      Genentech/Roche)—both drugs slow but do not reverse or cure IPF, leaving significant
      unmet clinical need that Insilico's ISM001-055 TNIK inhibitor program is designed to
      address. Global pharma R&D spending totals approximately $240–250 billion annually,
      of which AI-assisted platform tools are a small but rapidly growing fraction.
