  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: AI-platform-licensing-SAM
      missingEvidence: >-
        No independently published SAM exists for AI platform licensing to top-20 global
        pharmaceutical companies. The $3–8B SAM range in the pyramid figure is an analytical
        construct derived from assumed pharma BD budget allocations and deal-flow data, not
        from an authoritative published source. MarketsandMarkets and similar reports publish
        TAM figures for AI drug discovery broadly but do not segment platform licensing from
        internal AI tool spend.
      whyItMatters: >-
        Without a credible SAM, the market penetration story for Insilico's platform licensing
        is directional only; investors assessing the long-term platform revenue ceiling need a
        SAM that separates accessible partnership budget from inaccessible internal pharma spend.
      diligencePath: >-
        Obtain analyst briefings from Evaluate Pharma, GlobalData, or IQVIA for pharma
        outsourcing and AI platform sub-segment sizing; review top-20 pharma annual reports
        for disclosed computational chemistry and outsourcing spend; use Recursion, Exscientia,
        and Schrödinger public disclosures as comparable SAM proxies.
      relatedQuestionRefs: [QM010]

    - type: missing-source
      severity: material
      topic: ISM001-055-Phase2-efficacy-results
      missingEvidence: >-
        Phase II efficacy and safety results for ISM001-055 (NCT05938920, COMPLETED) were not
        publicly available or published in peer-reviewed literature as of this research cycle.
        ClinicalTrials.gov records confirm completion but do not include primary endpoint data.
        ISM001-055 Phase II results are critical for assessing IPF market opportunity and
        precedent for AI-drug regulatory approval.
      whyItMatters: >-
        Without Phase II data, the commercial potential of the IPF asset and the precedent-setting
        value of an AI-discovered drug in a pivotal trial cannot be assessed; this is a central
        valuation input for the therapeutic pipeline component of Insilico's market opportunity.
      diligencePath: >-
        Monitor Insilico investor relations and HKEX filings for Phase II result announcements;
        check ClinicalTrials.gov results database for NCT05938920 result submissions; search
        major pulmonology conference proceedings (ATS, ERS) for Insilico ISM001-055 presentations.
      relatedQuestionRefs: [QM022]

    - type: private-evidence-only
      severity: minor
      topic: platform-licensing-unit-economics
      missingEvidence: >-
        Specific deal economics—upfront licensing fees, milestone rates, royalty percentages—for
        Insilico's standard platform licensing agreements are not publicly disclosed. The Eli Lilly
        deal's $2.75B total value is disclosed but milestone structure, probability-weighting, and
        upfront versus contingent split are not publicly available.
      whyItMatters: >-
        Without unit economics on platform deals, it is not possible to compare Insilico's
        business model to either a pure pharma development model or to peer AI platforms
        (Recursion, Exscientia) on capital efficiency and revenue quality.
      diligencePath: >-
        Request deal structure breakdown from management; review HKEX filing disclosures for
        any milestone breakdowns; use industry deal databases (Evaluate Pharma, Citeline) to
        benchmark AI-pharma deal structures against Insilico's disclosed total value.
      relatedQuestionRefs: [QM025]

    - type: conflicting-data
      severity: minor
      topic: AI-drug-discovery-market-size-estimates
      missingEvidence: >-
        Published analyst estimates for the AI drug discovery market vary by 3–10× across
        reports, driven primarily by scope definition inconsistencies. MarketsandMarkets
        narrow scope ($1.5B), MarketsandMarkets drug discovery informatics ($3.5B), and
        Evaluate Pharma composite (~$4.5B) cannot be reconciled without access to primary
        paywalled reports. Market sizing for AI drug discovery has no standardized scope
        definition as of 2026.
      whyItMatters: >-
        Investors and acquirers citing AI drug discovery TAMs risk anchoring on incomparable
        figures; the true addressable market for Insilico's platform depends on which scope
        definition is used, and this uncertainty makes market penetration claims difficult to
        verify independently.
      diligencePath: >-
        Obtain primary MarketsandMarkets and Evaluate Pharma reports; request scope definition
        clarification from analysts; use bottom-up build from top-20 pharma computational
        chemistry budget disclosures as an independent cross-check.

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >-
      SM006 (MarketsandMarkets AI drug discovery) and SM014, SM015 (Nature Medicine and Nature
      Biotechnology) are paywalled sources. Market sizing claims derived from SM006 are supported
      by corroborating industry summaries (SM008 Evaluate Pharma) and are flagged with confidence
      levels of medium or low; no paywalled-only high-confidence claim is asserted without
      independent corroboration. Nature paywalls are acknowledged; key quotes extracted from
      accessible abstracts and media summaries.
  - dimension: unverifiedSource
    reason: >-
      SM021 (NCT05938920) and SM022 (NCT05975983) are ClinicalTrials.gov study records that
      were referenced in Chapter 1 (SO024, SO025) and are reused here. These records were
      verified in the Chapter 1 research cycle; the fetch-trail gap reflects the cross-chapter
      reuse pattern, not a failure to retrieve the underlying registry data.
