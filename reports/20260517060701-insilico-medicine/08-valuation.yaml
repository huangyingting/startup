      - TV001
    figureRefs:
      - FV004

  - id: financing-and-valuation-context
    title: Financing, Valuation Context, and Entry Discipline
    body: >-
      Insilico Medicine completed its HKEX IPO in late 2025, raising approximately $293M
      and listing as SEHK:3696. The Series E in April 2024 raised $95M at a post-money
      valuation of approximately $2.3B. The Eli Lilly deal (March 2026) contributed a
      $115M upfront payment, which represents 4.2% of the $2.75B headline value—the
      remaining $2.635B is back-loaded on milestone and royalty events that depend on
      Phase 3 success, regulatory approval, and commercial launch.

      Post-IPO cash is estimated at $280–440M assuming IPO net proceeds plus prior Series
      E capital net of pre-IPO burn, implying 2–4 years of runway at current scale. This
      is consistent with the $70–150M annual burn estimated from headcount and clinical
      trial activity. No confirmed audited financial statements are accessible from public
      sources as of the report date; all financial estimates are model-based.

      Entry discipline requires HKEX prospectus access. The prospectus would contain
      audited revenues, operating expenses, cash flow from operations, and use-of-proceeds—
      all currently unavailable. Without confirmed financials, any valuation model has a
      wide margin of error, and no intrinsic value anchor exists. The preference overhang
      and cap table structure are also unknown without the prospectus, making diluted share
      count estimates uncertain.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV016
      - CV041
      - CV042
