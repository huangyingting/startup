  - id: exit-readiness-and-diligence-asks
    title: Exit Readiness and Final Diligence Asks
    body: >-
      Insilico Medicine has already achieved the IPO exit via HKEX listing (SEHK:3696,
      late 2025), making it the only AI-first drug discovery company publicly listed in
      Asia. The IPO exit is confirmed; investors who participated in pre-IPO rounds have
      a public market exit path, subject to lock-up periods and free float constraints.

      The most likely future exit for acquirers is an M&A transaction by a major pharma
      company. If ISM001-055 completes Phase 3 successfully, Insilico would become an
      acquisition target for any large pharma seeking to (a) accelerate AI-driven drug
      discovery, (b) acquire an IPF-approved drug franchise, and (c) bring the Pharma.AI
      platform in-house. At Phase 3 success, acquisition interest from Lilly itself,
      Pfizer, AstraZeneca, Novartis, or Roche is plausible.

      Five diligence asks are critical before a buy recommendation can be issued: (1) HKEX
      annual report access for audited financials; (2) Eli Lilly milestone schedule details;
      (3) Phase 3 protocol and enrollment timeline; (4) post-IPO HKEX share price and
      market cap; (5) cap table structure and preference overhang post-IPO. Until these are
      resolved, valuation confidence remains low.
    claimRefs:
      - CV013
      - CV027
      - CV028
      - CV034
      - CV035
    tableRefs:
      - TV005
      - TV006

