      - FV003

  - id: bull-base-bear-scenarios
    title: Bull, Base, and Bear Scenario Analysis
    body: >-
      The bear case (~$1.2B) assumes ISM001-055 Phase 3 fails its primary efficacy endpoint
      (reduction in forced vital capacity decline vs. placebo at 52 weeks). In this scenario,
      Eli Lilly likely exercises its termination right, eliminating the back-loaded milestone
      revenue. The market would re-rate Insilico to a platform-only value, discounting
      residual pipeline value heavily due to sector loss of confidence in AI-designed drug
      clinical translation. A sector-wide multiple compression comparable to BenevolentAI's
      trajectory would apply.

      The base case ($2.5–3.5B) assumes Phase 3 initiates with a well-powered trial, early
      clinical hold risks are managed, Lilly milestones are partially realized over 3–5
      years, and 1–2 additional platform deals with mid-size pharma are signed. Platform
      ARR grows modestly. HKEX share price reflects pre-Phase 3 clinical-stage premium over
      pure platform peers.

      The bull case ($5–8B) requires Phase 3 success, ISM001-055 NDA/BLA filing, and
      approval in IPF. Milestone payments from Lilly would be triggered, generating
      substantial recognized revenue. M&A interest from major pharma would create an
      acquisition premium. Platform licensing would demonstrate clinical-stage premium,
      expanding the enterprise value. Phase 3 success in a novel AI-first IPF program
      would also validate the Chemistry42 generative design platform as clinically proven,
      driving further deal flow. The probability of reaching the bull case is low without
      Phase 3 interim data.
    claimRefs:
      - CV018
      - CV019
      - CV020
      - CV021
      - CV029
      - CV030
