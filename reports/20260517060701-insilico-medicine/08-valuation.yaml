      whyItMatters: "Without audited financial statements, no intrinsic value model can be constructed; cash adequacy, runway, and revenue quality are entirely unconfirmed. This gap also prevents confirmation of the comparable valuation table's financial context for Insilico."
      diligencePath: "Access hkex.com.hk Market Data or the company investor relations page to download the HKEX annual report for SEHK:3696; also check www1.hkexnews.hk for listing documents and interim reports filed since the October 2025 IPO."
