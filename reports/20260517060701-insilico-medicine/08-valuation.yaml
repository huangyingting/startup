  - id: recommendation-and-confidence
    title: Recommendation, Confidence, and Risk Rating
    body: >-
      The recommendation is Watch/Track with High Interest. This is not a buy
      recommendation because: (a) valuation confidence is LOW—HKEX financial statements
      (income statement, cash position, burn rate) are not accessible through public
      channels, making any intrinsic value model dependent on estimates; (b) Phase 3 for
      ISM001-055 introduces a binary event that can move valuation by several billion
      dollars in either direction; and (c) the entry price (HKEX IPO in late 2025) cannot
      be confirmed from available data. The confidence rating is LOW. The risk rating is
      HIGH reflecting Phase 3 clinical binary risk (>50% historical attrition in comparable
      fibrosis trials), single-deal revenue concentration (Eli Lilly >80%), and sector
      re-rating risk illustrated by peer trajectories.

      The valuation stance is research-stage premium with clinical-proof uplift. Insilico
      commands a meaningful premium over pure platform peers (e.g., Recursion RXRX at
      ~$1.2B market cap without Phase 2 completion) because of its Phase 2 data and
      commercial deal stack. The AI drug discovery total addressable market is estimated
      at $3–4B by 2025 with CAGR exceeding 30%, underpinning the sector growth premium.
      The AlphaFold Nobel Prize in Chemistry (2024) raised global awareness and mainstream
      investor attention. The investor should require Phase 3 initiation and HKEX financial
      access before upgrading to buy.
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV036
      - CV037
      - CV038
