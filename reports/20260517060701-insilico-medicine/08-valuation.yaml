      - TV003

  - id: comparable-valuation-set
    title: Comparable Valuation Set
    body: >-
      The comparable set for Insilico Medicine is constrained by the limited number of
      AI drug discovery companies that have completed Phase 2 trials. No perfect comparable
      exists. Recursion Pharmaceuticals (RXRX, NASDAQ) is the closest public market
      comparable by business model: pure-play AI drug discovery, public market, venture-
      backed. RXRX market cap is approximately $1.2B as of 2025–2026, but Recursion has
      not completed Phase 2 for any AI-designed drug, implying Insilico warrants a
      substantial clinical-stage premium over RXRX.

      Schrödinger (SDGR, NASDAQ) provides a physics-based simulation platform with
      estimated ARR of $130–150M and a market cap of approximately $2.3B, implying roughly
      16x ARR. Schrödinger is not primarily a generative-AI drug discovery company, and its
      higher ARR visibility reduces comparability for valuation modeling.

      The Exscientia/Sanofi acquisition (~$1.5B in 2024, prior to Phase 2 completion)
      establishes a floor M&A precedent: a company without Phase 2 clinical data was still
      acquired for over $1B, supporting the argument that Insilico's Phase 2 validated
      pipeline should command a higher premium.

      Isomorphic Labs (private, Alphabet-backed) received $2.1B in a Series B in 2026 and
      signed a Lilly collaboration valued at $1.745B with $45M upfront—directly comparable
      to Insilico's $2.75B / $115M deal. The Insilico deal headline is 57% larger with a
      156% higher upfront, reflecting Insilico's clinical-stage premium.

      BenevolentAI (LON:BAI) illustrates downside risk: once valued above $1.5B at SPAC
      listing, the company restructured and its market cap fell to under $200M, demonstrating
      that AI drug discovery valuations can collapse without Phase 2 clinical proof.
