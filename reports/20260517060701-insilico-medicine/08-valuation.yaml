chapter:
  number: 8
  title: Valuation
  summary: >-
    Insilico Medicine is the only AI drug discovery company to have completed a Phase 2
    clinical trial with an AI-designed drug (ISM001-055 in IPF), completed a HKEX IPO
    (~$293M raised, SEHK:3696, late 2025), and signed the largest AI-pharma collaboration
    to date ($2.75B headline / $115M upfront with Eli Lilly, March 2026). The base-case
    valuation is estimated at $2.5–3.5B, with a bull case of $5–8B contingent on Phase 3
    success and a bear case of ~$1.2B on Phase 3 failure or Lilly termination. The
    recommendation is Watch/Track with High Interest: the clinical and commercial proof
    points are industry-leading, but valuation confidence is LOW due to HKEX financial
    opacity and Phase 3 binary risk. The primary diligence blockers are the inaccessible
    HKEX prospectus and annual reports, and the undisclosed Lilly milestone schedule.

sections:
  - id: investment-thesis-and-anti-thesis
    title: Investment Thesis and Anti-Thesis
    body: >-
      The investment thesis for Insilico Medicine rests on three mutually reinforcing
      pillars: (1) unambiguous clinical proof—ISM001-055 is the first AI-designed small
      molecule to complete Phase 2 with statistically significant primary endpoints met,
      separating Insilico from every other AI drug discovery peer still in pre-clinical
      or Phase 1 stages; (2) commercial validation at unprecedented scale—the March 2026
      Eli Lilly collaboration ($115M upfront, $2.75B headline) is the largest AI drug
      discovery deal by headline value announced to date, exceeding Isomorphic Labs'
      competing Lilly deal ($1.745B); and (3) platform breadth—the Pharma.AI stack
      (Biology42, Chemistry42, Medicine42) spans target identification through clinical
      analytics, with 10+ top-20 global pharma confirmed as customers and 40+ discovery
      programs and 13 INDs representing best-in-class pipeline depth.

      The anti-thesis is equally grounded. First, Phase 3 for ISM001-055 in IPF is a
      high-stakes binary: fibrosis Phase 3 programs have historically failed more than
      half the time, and prior AI-drug-discovery Phase 2 signals have not always
      translated. Second, revenue is concentrated: the Eli Lilly deal likely represents
      more than 80% of near-term recognized collaboration revenue, and a Lilly
      termination would devastate the company's near-term financial position. Third,
      sector peers BenevolentAI and Exscientia both de-rated sharply from peak valuations,
      demonstrating that the AI drug discovery sector is not immune to re-rating risk.
      Fourth, the MIT Technology Review characterized AI drug discovery as a "hype" sector
      with claims exceeding validated output, a risk that extends to Insilico's platform
      productivity assertions. Finally, GAN-based molecular generation models have
      documented limitations in chemical diversity for certain target classes.
    claimRefs:
