callouts:
  - title: "Phase 3 is the Defining Catalyst"
    body: >-
      Insilico Medicine's valuation path hinges almost entirely on ISM001-055 Phase 3.
      Success would validate AI-designed drug discovery at the highest clinical level,
      trigger Lilly milestones, and likely attract M&A interest. Failure would eliminate
      the clinical premium and potentially trigger Lilly termination. Investors should
      monitor Phase 3 IND filing, enrollment initiation, and any data releases with
      extreme attention. This is a binary event that can move valuation by $3–6B.
    calloutType: recommendation
    claimRefs:
      - CV013
      - CV021
      - CV029

  - title: "HKEX Financial Opacity Is the Primary Diligence Blocker"
    body: >-
      Insilico is a public company (SEHK:3696) required to file annual reports with
      HKEX. The fact that audited financial statements are not accessible through public
      channels as of May 2026 is a material diligence gap. No buy recommendation can be
      supported without confirmed cash position, burn rate, and revenue quality. Accessing
      the HKEX prospectus and FY2025 annual report is the highest-priority action item.
    calloutType: risk
    claimRefs:
      - CV034
      - CV004

  - title: "Insilico Commands a Justified Clinical-Stage Premium Over Peers"
    body: >-
      Recursion RXRX trades at ~$1.2B without any AI-designed Phase 2 completion.
      Insilico has the only AI-designed drug at Phase 2 completion. This clinical-stage
      premium justifies a significant valuation multiple above RXRX. Even at the bear
      case (~$1.2B), the implied premium reflects the sector discount risk. The base
      case ($2.5–3.5B) values the Phase 2 proof appropriately relative to both public
      comparables and the Lilly deal validation.
    calloutType: strength
    claimRefs:
      - CV005
      - CV010
      - CV022

