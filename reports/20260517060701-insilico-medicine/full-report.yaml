            clinical data; public databases (ChEMBL, ZINC, gene-disease association databases)
        - label: AI Model Layer
          detail: >-
            50+ generative algorithms: GANs, VAEs, transformer molecular language models, reinforcement learning; ADMET
            predictive models; target scoring and network biology models; Phase 2/3 success prediction models
            (inClinico)
        - label: Product Module Layer
          detail: >-
            Biology42 / PandaOmics (target ID + validation) | Chemistry42 (de novo molecule design + optimization) |
            Medicine42 / inClinico (clinical trial analytics + failure prediction)
        - label: Drug Pipeline Layer
          detail: >-
            ISM001-055 Phase 2 complete (IPF/TNIK) | ISM3091 Phase 1/2 (oncology/USP1) | ISM8207 Phase 1 (KRASG12D) |
            ISM6331 Phase 1 (TEAD) | ISM5411 Phase 2 (UC/PHD) | 35+ additional programs
        - label: Delivery and Licensing Layer
          detail: >-
            Pharma.AI multi-tenant SaaS (AWS) for external pharma clients under enterprise licensing | Internal pipeline
            wholly owned by Insilico | Eli Lilly $2.75B collaboration (March 2026) as anchor deal
    approximationNotes: >-
      Layer boundaries are conceptual; exact software component boundaries and cloud architecture are not publicly
      documented.
    claimRefs:
      - CE001
      - CE003
      - CE016
      - CE019
      - CE020
      - CE031
  - id: FE002
    title: Customer workflow / operating flow
