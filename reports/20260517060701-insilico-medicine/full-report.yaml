      - number: '1.3'
        title: Funding History, Valuation, and Capital Structure
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine has raised capital through multiple rounds culminating in a successful HKEX IPO. By
              mid-2017, the company had raised approximately $8.26M from early investors including Deep Knowledge
              Ventures, JHU A-Level Capital, Jim Mellon, and Juvenescence. In 2019, it raised $37M in a Series B round
              from Fidelity Investments, Eight Roads Ventures, Qiming Venture Partners, WuXi AppTec, Baidu, Sinovation,
              Lilly Asia Ventures, Pavilion Capital, BOLD Capital, and others. In 2021, Insilico announced a $255M
              Series C "megaround" from Warburg Pincus, Sequoia Capital, OrbiMed, Mirae Asset Financial Group, and over
              25 other technology, healthcare, and AI investors—at the time, one of the largest AI drug discovery
              funding rounds globally. In 2022, an additional $60M Series D was raised. In April 2024, Insilico closed a
              $95M Series E round, reportedly at a post-money valuation of approximately $2.3B, with investors including
              B Capital Group, Lux Capital, and others. Total pre-IPO capital raised exceeded $400M. In late 2025,
              Insilico completed its IPO on the Hong Kong Stock Exchange (SEHK:3696), raising approximately $293M—one of
              the largest biotech listings in Hong Kong that year. As a post-IPO public company at the time of this
              report, the market capitalisation reflects a publicly traded valuation. The company's capital structure
              changed from private-undisclosed to fully public with the IPO, with SEC filings registered under CIK
              0001789097 (Insilico Medicine Cayman TopCo). The company also disposed of its Russian subsidiary in
              October 2022 following Russia's invasion of Ukraine.
