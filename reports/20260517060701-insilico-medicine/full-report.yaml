      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine was founded in 2014 by Alex Zhavoronkov, PhD, who serves as CEO and Chairman.
              Zhavoronkov was born in Latvia, received dual bachelor's degrees from Queen's University (Kingston,
              Canada), a master's degree in biotechnology from Johns Hopkins University, and a PhD in physics and
              mathematics from Moscow State University. He is also a director of the Biogerontology Research Foundation
              (UK) and, as of 2024, an adjunct professor of AI at the Buck Institute for Research on Aging. Feng Ren,
              PhD, serves as Co-Founder and Chief Scientific Officer, leading the discovery and translational science
              organization. Alex Aliper, PhD, is President of Insilico Medicine USA and a key figure in the clinical and
              AI development team. The company is known for a highly distributed talent model and recruits significantly
              through hackathons and competitions. Key-person dependency on Alex Zhavoronkov is a material risk, as he
              is the public face, primary inventor, and vision-setter for the organization. The board and governance
              structure changed materially with the HKEX IPO in late 2025. Investors including Warburg Pincus, OrbiMed,
              B Capital Group, Lilly Asia Ventures, Eight Roads Ventures, Mirae Asset, Qiming Venture Partners, WuXi
              AppTec, and Baidu Ventures have had representation and influence at the board/investor level. The Hong
              Kong Investment Corporation (HKIC), a patient-capital institution wholly owned by the Hong Kong SAR
              Government, highlighted an investment and strategic partnership relationship with Insilico in September
              2025.
