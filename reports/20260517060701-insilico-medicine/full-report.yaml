      - number: '1.4'
        title: Global Operations and Scale
        blocks:
          - type: paragraph
            body: >
              As of early 2026, Insilico Medicine operates globally with its corporate headquarters in Cambridge,
              Massachusetts, United States. Key offices and R&D facilities are located in: Hong Kong (Hong Kong Science
              Park, Pak Shek Kok—the original HQ); Shanghai (Pudong New Area, Chamtime Plaza); Suzhou (Biomedical
              Industrial Park); Yixing (Taodu Road); Taipei (Keelung Road, Xinyi District); Montreal, Canada
              (René-Lévesque Ouest—launched June 2022); New York (Park Avenue South, at The Cure by Deerfield); and Abu
              Dhabi, UAE (IRENA HQ Building, Masdar City—opened February 2023 as the Middle East regional HQ and
              described as the largest AI-powered biotech research center in the region). A Russian subsidiary (Insilico
              LLC, based in the Skolkovo Innovation Center) was fully disposed of in October 2022 in response to
              Russia's invasion of Ukraine; the subsidiary had been one of the largest Skolkovo Foundation grant
              recipients. The company has described its employee count as approximately 350 globally as of September
              2024. The pipeline spans over 40 programs with 13 IND approvals, 30 preclinical candidates nominated since
              2021, and 9 nominated in 2022 alone. The company has collaborated with 10 of the top 20 global
              pharmaceutical companies by 2021 revenues. A partnership with Syngenta was announced in 2021 for
              AI-designed weedkillers, demonstrating the platform's application beyond human drugs. In November 2025,
              Insilico was named by the journal Nature as one of the 50 leading corporate institutions in biological
              science research for 2025.
