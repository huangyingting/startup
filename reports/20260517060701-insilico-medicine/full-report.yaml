  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Headquarters, and Business Model
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine (HKEX:3696) is a clinical-stage AI biotechnology company that uses generative artificial
              intelligence, deep learning, and reinforcement learning to accelerate every stage of drug discovery—from
              target identification and molecule generation to clinical trial analytics. The company was incorporated
              with the legal entity "Insilico Medicine Cayman TopCo" and its US predecessor entity "Insilico Medicine,
              Inc." (Maryland). Originally headquartered in Baltimore, Maryland, then in Hong Kong, the company
              relocated its corporate headquarters to Cambridge/Boston, Massachusetts in mid-2024, while maintaining
              major R&D and operational offices in Hong Kong, Shanghai, Suzhou, Yixing, Taipei, Montreal, New York, and
              Abu Dhabi. As of September 2024, Insilico employed approximately 350 people globally. The company's core
              business model combines an internal proprietary drug pipeline (wholly owned and partnered assets) with an
              AI platform licensing and collaboration model, whereby large pharmaceutical companies pay Insilico for
              access to its Pharma.AI platform (comprising Biology42 for target identification, Chemistry42 for
              generative molecule design, and Medicine42/inClinico for clinical trial analytics). Revenue streams
              include upfront licensing fees, milestone-based payments as drugs advance through development, and
              potential royalties on commercialized products. In March 2026, a landmark $2.75B collaboration deal with
              Eli Lilly—including $115M upfront—cemented the commercial viability of this model.
