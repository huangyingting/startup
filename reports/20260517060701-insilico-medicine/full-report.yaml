companyProfile:
  summary: >-
    Insilico Medicine is a clinical-stage AI biotechnology company listed on the Hong Kong Stock Exchange (SEHK:3696)
    that uses its Pharma.AI platform — comprising Biology42 (target ID), Chemistry42 (generative molecular design), and
