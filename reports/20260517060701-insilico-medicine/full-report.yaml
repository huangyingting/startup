        title: Exhibits
        blocks:
          - type: callout
            title: Eli Lilly Deal Establishes Premium Market Pricing Reference
            body: >-
              The March 2026 Insilico Medicine–Eli Lilly deal ($2.75 billion total potential value) for AI-designed
              oncology candidates establishes a market price reference for top pharma willingness to pay milestone-heavy
              deal structures for AI-sourced clinical programs. This single deal validates the AI platform licensing
              model at a scale that most peers have not yet achieved and reduces buyer uncertainty for subsequent pharma
              partnerships.
            calloutType: strength
            claimRefs:
              - CM015
              - CM041
          - type: callout
            title: 'No AI-Designed Drug Approved: Near-Term Trust Barrier'
            body: >-
              No drug primarily designed by AI has received full FDA or EMA approval as of 2026. ISM001-055 (Insilico's
              TNIK inhibitor for IPF) would be a historic first if approved, but the absence of any approved AI-designed
              drug creates market trust barriers that slow enterprise pharma commitment to full-scale platform
              contracts. Pharma R&D culture is conservative; clinical proof at Phase III level in a priority indication
              is the key derisking milestone for broader platform adoption.
            calloutType: risk
            claimRefs:
              - CM027
              - CM028
