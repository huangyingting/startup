              Sales cycle duration for pharma platform partnerships is typically measured in quarters to years,
              reflecting the complexity of contract negotiation, due diligence, and committee approvals within large
              pharma organizations. The Eli Lilly deal (March 2026), valued at $2.75 billion headline, required
