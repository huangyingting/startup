  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Universe and Category Segmentation
        blocks:
          - type: paragraph
            body: |
              Insilico Medicine operates at the intersection of four competitive categories in the AI drug
              discovery landscape. The first category comprises full-stack AI drug discovery platforms with
              proprietary clinical pipelines: Recursion Pharmaceuticals (NASDAQ: RXRX, which acquired
              Exscientia for approximately $688M in January 2025), Isomorphic Labs (private, Alphabet-backed,
              exclusive AlphaFold3 commercial license), and BenevolentAI (knowledge graph-based, in strategic
              restructuring as of late 2025). These companies combine AI platforms with internal drug programs
              and milestone-based pharmaceutical partnerships.

              The second category is physics-based computational chemistry platform providers: Schrödinger
              (NASDAQ: SDGR), which uses FEP+, WaterMap, and LiveDesign tools relied upon by approximately
              18 of the top 20 global pharmaceutical companies. Schrödinger competes less directly on
              proprietary pipeline but competes for computational drug design budget.

              The third category includes specialist AI-pharma hybrids: XtalPi (quantum physics combined
              with AI, backed by Tencent, Sequoia, and Eli Lilly, focused on small molecule and crystal form
              prediction) and Numerion Labs (formerly Relay Therapeutics branding, ML superplatform targeting
              immune and inflammatory diseases). These companies overlap with Insilico in target segments but
              have narrower platform scope.

              The fourth category covers traditional incumbents: contract research organizations (WuXi AppTec,
              Charles River Laboratories, IQVIA) providing wet-lab drug discovery services without generative
              AI, and in-house pharma AI groups (AstraZeneca, Roche, Pfizer) that represent internal budget
              competition rather than direct market competitors. Status-quo alternatives for pharma customers
              include classic cheminformatics tools (OpenBabel, Molecular Operating Environment, Discovery
              Studio by Dassault Systèmes) combined with CRO outsourcing.

              Insilico differentiates as the only HKEX-listed AI drug discovery company with a completed
              Phase 2 trial from a generative AI platform, and the beneficiary of the largest commercial
              AI drug discovery deal globally ($2.75B Eli Lilly, March 2026). No competitor has simultaneously
              achieved public market status, Phase 2 clinical completion, and a multi-billion-dollar pharma
              collaboration for an AI-designed drug candidate.
