      - number: '3.3'
        title: Capability, Pricing, and GTM Comparison
        blocks:
          - type: paragraph
            body: |
              Across the competitive landscape, AI drug discovery companies differ substantially in platform
              capabilities, revenue model, and go-to-market distribution. Insilico's end-to-end integrated
              platform (Biology42 for target identification, Chemistry42 for generative molecule design,
              Medicine42/inClinico for clinical trial analytics) represents the broadest functional scope of
              any AI drug discovery platform across the full drug development continuum. Competitors typically
              specialize in one or two phases: Recursion leads in target identification via phenomics;
              Schrödinger leads in lead optimization via physics-based free energy calculations; Isomorphic
              Labs leads in structural biology prediction; XtalPi leads in crystal form and solid-state
              chemistry prediction.

              On pricing and packaging, AI drug discovery platforms operate on three primary models. Schrödinger
              uses a software licensing ARR model generating approximately $130–150M in software ARR as of 2024,
              the only player with meaningful standalone product revenue independent of milestone payments.
              Insilico and Recursion operate primarily on collaboration milestone models: large upfront payments,
              target nomination fees, and milestone-gated development payments. Insilico's Eli Lilly deal
              ($115M upfront + up to $2.635B in milestones) represents the premium end of sector deal terms.
              Isomorphic's Lilly deal ($45M upfront + $1.7B milestones) and Novartis deal ($37.5M + $1.2B)
              establish pricing comparables, positioning Insilico's upfront at a 2.6x premium attributable
              to Phase 2 clinical validation.

              On go-to-market distribution, Schrödinger has the deepest pharma penetration, with direct
              sales to 18 or more of the top 20 pharma companies. Insilico announced collaboration with 10
              of the top 20 pharma companies by 2021 revenues. Recursion's AstraZeneca and NVIDIA partnerships
              provide both technology and commercial validation. Isomorphic benefits from Alphabet's credibility
              but lacks its own commercial distribution network beyond direct pharma deal-making.

              Customer lock-in is strongest for Schrödinger via tool-level workflow integration, moderate
              for Insilico via platform integration and proprietary target data, and low for early-stage
              AI-only platforms lacking clinical validation. Multi-homing is common among pharma customers,
              which typically engage 2–4 computational or AI drug design vendors simultaneously. Insilico's
              Phase 2 clinical proof reinforces competitive advantage that pure-software competitors cannot
              replicate in the near term.
