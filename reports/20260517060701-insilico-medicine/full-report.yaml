  - id: FE004
    title: Product maturity / capability map
    type: matrix
    layout: standard
    summary: Maturity and capability assessment across the three Pharma.AI modules on five key dimensions.
    data:
      columns:
        - Chemistry42 (Generative Molecule Design)
        - Biology42 / PandaOmics (Target ID)
        - Medicine42 / inClinico (Clinical Analytics)
      rows:
        - label: Algorithm breadth
          values:
            - High — 50+ generative models (GANs, VAEs, transformers, RL); GENTRL open-sourced
            - High — multi-omics, network biology, gene-disease association models
            - Medium — phase success prediction and patient stratification models
        - label: Proprietary data depth
          values:
            - High — large chemical compound training corpus; partner compound data
            - High — multi-omics datasets (genomics, proteomics, transcriptomics)
            - Medium — historical clinical trial databases; partner trial data
        - label: Clinical validation
          values:
            - Validated — ISM001-055 Phase 2 complete; Eli Lilly $2.75B deal
            - Validated — TNIK target ID enabled ISM001-055 IND and Phase 2
