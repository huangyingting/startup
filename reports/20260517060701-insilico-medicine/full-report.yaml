              design platforms) to ~$4.5 billion or higher for 2024 depending on whether broader cheminformatics,
              informatics platforms, or all life science analytics are included. Investors and deal-makers citing AI
              drug discovery TAMs should always specify scope definition; MarketsandMarkets narrow AI platforms and Drug
              Discovery Informatics provide the most frequently cited midpoints, but both are paywalled estimates from
