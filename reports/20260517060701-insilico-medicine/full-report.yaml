  - id: FV001
    title: Recommendation logic
    type: flow
    layout: standard
    summary: >-
      Decision chain from clinical scale, platform proof, risk factors, and valuation anchors to the Watch/Track
      recommendation and required catalysts.
    claimRefs:
      - CV031
      - CV032
    data:
      nodes:
        - id: clinical_proof
          label: Clinical Scale Proof
          detail: ISM001-055 Phase 2 complete; primary endpoints met; only AI-designed drug at this stage among peers
        - id: platform_proof
          label: Platform Proof
          detail: 10+ top-20 pharma customers; 40+ programs; 13 INDs; Eli Lilly $2.75B deal confirms commercial traction
        - id: risk_factors
          label: Risk Assessment
          detail: >-
            Phase 3 binary (>50% attrition); Lilly revenue concentration >80%; HKEX financial opacity; sector re-rating
            risk
        - id: valuation_anchor
          label: Valuation Anchor
          detail: Base case $2.5–3.5B; bull case $5–8B contingent on Phase 3; bear case ~$1.2B on failure
        - id: recommendation
          label: Watch / Track with High Interest
          detail: >-
            Evidence-supported interest but insufficient confidence for buy; Phase 3 initiation and HKEX financials are
            required before upgrading
        - id: catalysts
          label: Required Catalysts
          detail: Phase 3 IND filing; HKEX annual report access; Lilly milestone confirmation; sector Phase 3 data
      edges:
        - from: clinical_proof
          to: recommendation
          label: Supports
        - from: platform_proof
          to: recommendation
          label: Supports
        - from: risk_factors
          to: recommendation
          label: Constrains
        - from: valuation_anchor
          to: recommendation
          label: Anchors
        - from: recommendation
          to: catalysts
          label: Conditional on
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: wide
    summary: >-
      Sensitivity of Insilico Medicine's estimated enterprise value (USD billion) to key drivers; positive bars add
      value, negative bars reduce it from base case midpoint.
    approximationNotes: >-
      All values are estimated sensitivity deltas relative to a base-case midpoint of ~$2.8B. No confirmed HKEX
      financial data was available for DCF input. Ranges reflect deal-comparable and sector-multiple analysis.
