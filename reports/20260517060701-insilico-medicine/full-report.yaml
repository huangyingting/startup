  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine's most material regulatory risk is the absence of FDA precedent for an AI-designed drug
              NDA. ISM001-055 (rentosertib) is advancing through Phase 3 for IPF (NCT05975983), but FDA has not issued
              binding guidance specific to AI-designed drug submissions. This creates review uncertainty at the NDA
              stage even if Phase 3 endpoints are achieved. The standard 505(b)(1) NDA pathway applies, but FDA
              reviewers have no comparator for adjudicating AI-origin compound claims.

              AI inventorship is a material legal risk. The DABUS rulings confirm that AI cannot be named as inventor on
              US patents. Insilico must document human inventive contribution for all AI-generated compound patents. The
              Nature Medicine paper (SR031) supports the human-inventorship argument for ISM001-055, but the adequacy of
              this documentation for broader pipeline patent prosecution is uncertain.

              Russia OFAC sanctions exposure remains incompletely documented. The 2022 Russia subsidiary disposal has
              not been publicly characterized in terms of counterparty, structure, or OFAC compliance. Residual IP
              license or data arrangements with the former Russian operations would create material sanctions liability.

              BIS export control regulations potentially apply to algorithmic IP transfers between US and Chinese
              operations. GDPR compliance obligations apply to EU-site clinical trial data. No regulatory enforcement
              actions have been identified in any jurisdiction, but compliance costs and risk are ongoing.
            claimRefs:
