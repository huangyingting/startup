  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: standard
    summary: >-
      Insilico Medicine's pharma customer journey from scientific credibility and platform awareness through initial
      licensing, co-development collaboration, and progressive deal expansion.
    data:
      nodes:
        - label: Scientific Credibility & Awareness
          description: >-
            300+ peer-reviewed publications, conference presence, and the Chemistry42/Biology42 academic record build
            credibility with pharma R&D leadership before any commercial engagement.
        - label: Platform Evaluation
          description: >-
            Pharma BD and R&D teams evaluate Biology42, Chemistry42, and Medicine42 via internal pilots, scientific
            benchmarking, and competitive assessments over a multi-quarter evaluation cycle.
        - label: Initial Platform Licensing
          description: >-
            Multi-year platform licensing agreement signed; annual recurring fee and program scope negotiated
            bilaterally. Deal terms are confidential; no published price list exists.
        - label: Co-Development Collaboration
          description: >-
            Full collaboration with milestone payments tied to IND submission, Phase 1 initiation, Phase 2 completion,
            and NDA/BLA filing events. Upfront payment confirmed for Eli Lilly ($115M).
        - label: Expanded Multi-Program Deal
          description: >-
            Anchor customers return for broader program scope and larger commitments, as demonstrated by Eli Lilly's
            progression from 2023 licensing to the $2.75B 2026 agreement.
        - label: Royalty Phase (Future)
          description: >-
            Approved drugs generate net sales royalties for Insilico. No FDA/EMA-approved AI-discovered drugs exist as
            of May 2026; this stage remains future-state for all current partners.
    approximationNotes: >-
      Journey map is constructed from disclosed partnership events and standard pharma deal lifecycle norms. Phase
      durations are inferred; actual sales cycles vary significantly by pharma organization size and decision-making
      structure.
    claimRefs:
      - CU003
      - CU015
      - CU033
      - CU038
