              Insilico Medicine's revenue model is a hybrid of recurring platform licensing fees, large upfront
              collaboration payments, contingent milestone payments, and eventual royalties on commercialized drugs. The
              Pharma.AI platform (comprising Biology42 for target identification, Chemistry42 for generative molecular
              design, and Medicine42 for clinical trial analytics) is licensed to pharmaceutical partners for an
              undisclosed annual fee. Published pricing is not available; enterprise deals are negotiated individually.
              As of 2026, the company has signed collaboration agreements with ten of the top twenty global
              pharmaceutical companies by 2021 revenues, though deal-level revenue amounts are not publicly disclosed.

              The most visible and confirmed revenue event is the March 2026 Eli Lilly collaboration, which included a
              $115 million upfront payment and up to $2.75 billion in total potential value composed of milestones and
              royalties. This upfront is recognized as a collaboration revenue event, not a drug-sale event. No drugs
              discovered using Insilico's platform have received regulatory approval as of the report date, meaning
              royalty revenue remains speculative. Government grant income—from the Canadian federal government
              supporting the Montreal center and from UAE government support for the Abu Dhabi center—constitutes a
              minor and non-recurring revenue stream. Revenue recognition for milestone payments follows the completion
              of defined clinical/regulatory events (IND, Phase 1 initiation, Phase 2 completion, NDA/BLA filing),
