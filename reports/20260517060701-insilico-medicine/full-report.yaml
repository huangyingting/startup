    notes: >-
      DAG shows dependency structure of Insilico Medicine's financial position on the Lilly collaboration, IPO proceeds,
      and milestone-driven revenue. Risk gates illustrate failure modes for financial sustainability. CR025 covers HKEX
      Chapter 18A obligations not covered by TR004.
