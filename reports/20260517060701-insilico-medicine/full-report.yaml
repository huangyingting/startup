      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >-
              The primary economic buyer for AI drug discovery platforms is the top-20 global pharmaceutical company.
              Decisions are controlled by R&D leadership (Chief Scientific Officers, VP of Discovery Chemistry) and
              Business Development executives, who evaluate platform partnerships for their ability to replenish
              patent-cliff-exposed pipelines at lower cost and faster timelines. The technical champion—who evaluates
              and advocates for platform adoption—is typically the medicinal chemist, computational biologist, or data
              science lead within pharma R&D. Finance committees and CFOs act as formal payer and approver, requiring
              ROI justification that AI discovery reduces preclinical attrition and development cost.

              The Eli Lilly–Insilico Medicine deal ($2.75 billion total potential value, March 2026) confirms that top
              pharma companies will pay milestone-heavy deal structures for AI-discovered oncology clinical candidates.
              AstraZeneca's $100 million deal with Recursion Pharmaceuticals in 2023 provides a further market
              validation point. Both demonstrate the pharma platform licensing model is commercially validated.

              Secondary buyer segments include mid-tier biopharma ($500M–$5B revenue), rare disease and orphan drug
              specialists (smaller absolute budgets but higher per-patient willingness to pay), biotech startups and
              academic spinouts (seeking discovery proof-of-concept data), and government or national research
              organizations (AI-enabled national drug discovery mandates). Generic and biosimilar manufacturers
              represent a tertiary segment seeking formulation optimization efficiency rather than novel drug design.
              The adoption trigger differs materially by segment: for top pharma it is patent cliff urgency; for rare
              disease specialists it is FDA orphan designation and breakthrough therapy designations; for startups it is
              pre-Series A proof-of-concept financing requirements.
