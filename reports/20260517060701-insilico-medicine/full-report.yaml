  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Pharma.AI Platform: Product Definition and Customer Workflow'
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine's commercial offering is the Pharma.AI platform, a cloud-delivered SaaS system that
              integrates three AI-powered modules—Biology42 (incorporating PandaOmics for target identification),
              Chemistry42 (for generative molecular design), and Medicine42 (incorporating inClinico for clinical trial
              analytics)—into a single workflow spanning the full drug-discovery lifecycle from disease biology to
              optimized drug candidate design and trial strategy.

              From the perspective of a pharmaceutical R&D team, Pharma.AI replaces or augments three distinct and
              historically manual or computationally fragmented workflows. In the target identification phase,
              PandaOmics processes multi-omics data (genomics, proteomics, transcriptomics) alongside gene-disease
              association databases and network biology models to score candidate targets for druggability and
              biological novelty, replacing manual literature review and gene panel screening. In the lead discovery and
              optimization phase, Chemistry42 takes the selected target (or a hit series as input) and generates de novo
              small-molecule candidates using over 50 generative algorithms—including generative adversarial networks
              (GANs), variational autoencoders (VAEs), transformer-based molecular language models, and reinforcement
              learning—outputting ranked candidate molecules with predicted ADMET (absorption, distribution, metabolism,
              excretion, toxicity) profiles. In the clinical development strategy phase, Medicine42/inClinico applies
              predictive models to identify optimal patient stratification, select endpoints, and forecast Phase 2/3
              success probability, reducing expert judgment burden and providing data-backed trial design rationale.

              The platform is delivered as multi-tenant SaaS under negotiated enterprise licensing agreements. As of May
              2026, Insilico has signed platform collaborations with at least ten of the top twenty global
              pharmaceutical companies by 2021 revenues, including the March 2026 collaboration with Eli Lilly valued at
              up to $2.75 billion ($115 million upfront), which encompasses both platform licensing and licensing of
              AI-designed drug candidates.
