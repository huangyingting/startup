  - id: FR002
    title: 'Regulatory Risk Dependency Graph: ISM001-055 NDA Pathway'
    type: dag
    order: 2
    insight: >-
      Phase 3 enrollment feeds two parallel risk gates (endpoint miss and clinical hold) before NDA preparation begins.
      The AI NDA precedent uncertainty risk gate at FDA review is the final and most novel risk in the pathway, with no
      historical comparator to calibrate probability.
    claimRefs:
      - CR001
      - CR002
      - CR013
      - CR015
      - CR029
    sourceRefs:
      - SR001
      - SR003
      - SR016
      - SR030
      - SR031
    notes: >-
      DAG shows the dependency structure of regulatory milestones and risk gates on the path from current Phase 3 to
      ISM001-055 NDA submission. Nodes represent milestones or risk gates; edges represent sequential dependencies.
    data:
      nodes:
        - id: p3-enroll
          label: Phase 3 Enrollment Complete
        - id: p3-endpoint
          label: Phase 3 Primary Endpoint Met
        - id: p3-safety
          label: Phase 3 Safety Profile Confirmed
        - id: nda-prep
          label: NDA Package Preparation
        - id: pre-nda
          label: FDA Pre-NDA Meeting
        - id: nda-submit
          label: NDA Submission
        - id: fda-review
          label: FDA Review — AI Drug No Precedent
        - id: fda-approval
          label: FDA Approval
        - id: risk-clinical-hold
          label: 'Risk Gate: Clinical Hold'
        - id: risk-endpoint-miss
          label: 'Risk Gate: Endpoint Miss'
        - id: risk-capital
          label: 'Risk Gate: Capital Shortfall'
        - id: risk-ai-precedent
          label: 'Risk Gate: AI NDA Precedent Uncertainty'
      edges:
        - from: p3-enroll
          to: p3-endpoint
        - from: p3-enroll
          to: p3-safety
        - from: p3-endpoint
          to: nda-prep
        - from: p3-safety
          to: nda-prep
        - from: nda-prep
          to: pre-nda
        - from: pre-nda
          to: nda-submit
        - from: nda-submit
          to: fda-review
        - from: fda-review
          to: fda-approval
        - from: risk-clinical-hold
          to: p3-enroll
        - from: risk-endpoint-miss
          to: p3-endpoint
        - from: risk-capital
          to: nda-prep
        - from: risk-ai-precedent
          to: fda-review
  - id: FR003
    title: Partner and Financial Risk Dependency Graph
    type: dag
    order: 3
    insight: >-
      Lilly deal termination and milestone miss are upstream risks that cascade to Phase 3 capital adequacy and
      ultimately financial sustainability. The burn rate risk gate operates independently and feeds into the financial
      sustainability node alongside capital market access risk.
