callouts:
  - calloutType: strength
    title: "HKEX IPO and Eli Lilly Deal Validate AI Drug Discovery at Scale"
    body: >
      The late-2025 HKEX IPO (~$293M) and the March 2026 $2.75B Eli Lilly deal with $115M upfront payment are the strongest commercial and capital market signals that AI-generative drug discovery has matured from concept to viable business. Insilico has more fully de-risked this model than any peer.
    claimRefs:
      - CO020
      - CO021
      - CO031

  - calloutType: risk
    title: "Key-Person Risk and Leadership Concentration"
    body: >
      Alex Zhavoronkov is uniquely identified as the embodiment of Insilico Medicine—the inventor, strategist, and public face. Departure or incapacitation of the CEO would likely cause significant disruption to the company's research direction, investor confidence, and partnership relationships.
    claimRefs:
      - CO008
      - CO012

  - calloutType: risk
    title: "Pre-Revenue Clinical-Stage Risk Profile"
    body: >
      Despite the Eli Lilly deal, Insilico's revenue profile (pre-commercial drug) remains heavily dependent on milestone payments and licensing fees rather than durable product revenue. ISM001-055 requires Phase 3 trials before potential approval, and no Insilico-discovered drug has yet received marketing authorization.
    claimRefs:
      - CO005
      - CO006
      - CO029

