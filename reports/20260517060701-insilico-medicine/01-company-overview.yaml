company:
  name: Insilico Medicine

chapter:
  number: 1
  title: Company Overview
  summary: >
    Insilico Medicine is a publicly listed (HKEX:3696) AI-driven drug discovery company that went public in late 2025, raising ~$293M. Founded in 2014 by Alex Zhavoronkov, the company has advanced the first AI-generative-design drug through Phase 2 clinical trials (ISM001-055 for IPF), built a 40+ program pipeline across oncology, fibrosis, and immunology, and in March 2026 signed a landmark $2.75B deal with Eli Lilly that included a $115M upfront payment—validating its AI platform at the highest commercial level.

sections:
  - id: identity-and-model
    title: Identity, Headquarters, and Business Model
    body: >
      Insilico Medicine (HKEX:3696) is a clinical-stage AI biotechnology company that uses generative artificial intelligence, deep learning, and reinforcement learning to accelerate every stage of drug discovery—from target identification and molecule generation to clinical trial analytics. The company was incorporated with the legal entity "Insilico Medicine Cayman TopCo" and its US predecessor entity "Insilico Medicine, Inc." (Maryland). Originally headquartered in Baltimore, Maryland, then in Hong Kong, the company relocated its corporate headquarters to Cambridge/Boston, Massachusetts in mid-2024, while maintaining major R&D and operational offices in Hong Kong, Shanghai, Suzhou, Yixing, Taipei, Montreal, New York, and Abu Dhabi. As of September 2024, Insilico employed approximately 350 people globally. The company's core business model combines an internal proprietary drug pipeline (wholly owned and partnered assets) with an AI platform licensing and collaboration model, whereby large pharmaceutical companies pay Insilico for access to its Pharma.AI platform (comprising Biology42 for target identification, Chemistry42 for generative molecule design, and Medicine42/inClinico for clinical trial analytics). Revenue streams include upfront licensing fees, milestone-based payments as drugs advance through development, and potential royalties on commercialized products. In March 2026, a landmark $2.75B collaboration deal with Eli Lilly—including $115M upfront—cemented the commercial viability of this model.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
