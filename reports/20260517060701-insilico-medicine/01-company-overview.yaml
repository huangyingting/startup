  - id: key-milestones
    title: Key Milestones and Adverse Events
    body: >
      Insilico Medicine's development history spans from foundational AI research through clinical validation and public listing. The company's most significant technical milestone is demonstrating, for the first time, that an AI platform could independently design a novel target AND a novel molecule for that target, then advance the resulting drug candidate (ISM001-055, a TNIK inhibitor for IPF) through Phase 2 clinical trials—with the Phase 2a trial completed in 2023 and Phase 2 completed by 2024, generating data sufficient to plan a Phase 3 program. In April 2024, the company's Series E round closed alongside this data readout, at a reported $2.3B valuation. The company's HKEX IPO in late 2025 (~$293M) positioned it as one of the few AI drug discovery companies globally to achieve a public listing. The March 2026 Eli Lilly deal ($2.75B headline value, $115M upfront) represents the largest commercial validation of an AI-generative drug discovery platform to date. Adverse events include: (1) The disposal of the Russian subsidiary following the Ukraine invasion in 2022, eliminating a research base and raising questions about geopolitical risk concentration; (2) Critics within the scientific community have challenged whether early GAN-based molecular generation platforms like those used by Insilico can achieve adequate molecular diversity and drug-like properties, as shown by the 2017 ChemGAN challenge study published on arXiv; (3) The company's high reliance on its CEO and the concentration of its pipeline in pre-revenue development-stage assets represent ongoing risks.
    claimRefs:
      - CO029
      - CO030
      - CO031
      - CO032
      - CO033
