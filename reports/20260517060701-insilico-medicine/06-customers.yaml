chapter:
  number: 6
  title: Customers
  summary: >-
    Insilico Medicine's customer base is anchored by at least 10 of the top 20 global
    pharmaceutical companies, with Eli Lilly as the dominant anchor customer (confirmed
    $115M upfront, $2.75B headline deal in March 2026) following a three-phase multi-year
    relationship that constitutes the strongest land-and-expand signal in AI drug discovery.
    Additional named partners include Servier ($888M), Qilu ($120M), Hengrui ($66M,
    Parkinson's), Exelixis, Sanofi, Fosun Pharma, and Menarini. No NRR, GRR, or
    customer-count data is publicly disclosed; retention evidence is limited to the Eli Lilly
    repeat engagement pattern. Eli Lilly alone represents material single-customer
    concentration risk exceeding 50% of near-term cash inflows.

sections:
  - id: customer-segmentation
    title: Customer Base Segmentation
    body: >-
      Insilico Medicine's Pharma.AI platform targets a narrow, high-value segment: the
      research and development functions of top-tier global pharmaceutical companies. The
      company's primary buyers are Chief Scientific Officers, Vice Presidents of Drug
      Discovery, and Business Development executives who evaluate platform licensing for
      multi-program AI-assisted drug discovery. As of 2026, Insilico's website claims
      partnerships with 10 of the top 20 global pharmaceutical companies by 2021 revenue,
      including Eli Lilly (US), Servier (France), Qilu Pharmaceutical (China), Hengrui Pharma
      (China), Exelixis (US), Sanofi (EU), Fosun Pharma (China), and Menarini (EU). This
      partner roster spans US, European, and Chinese pharma segments, reflecting a deliberate
      multi-regional penetration strategy facilitated by Insilico's geographic footprint
      across Hong Kong, San Francisco, Shanghai, Abu Dhabi, and Montreal. The primary use
      case is multi-program AI drug discovery—encompassing target identification (Biology42),
      generative molecular design (Chemistry42), and clinical trial analytics (Medicine42).
      A secondary non-revenue segment includes academic collaborators and government research
      centers, notably the Abu Dhabi center supported by UAE government funding. No mid-size
      biotech or SME customers have been confirmed in public disclosures.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU012
      - CU026
      - CU027
      - CU036
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: adoption-trajectory
    title: Adoption Trajectory and Deal Milestones
    body: >-
      The most concrete adoption signal is the March 2026 Eli Lilly collaboration, with a
      confirmed $115 million upfront payment as part of a $2.75 billion headline deal covering
      milestones and royalties across multiple programs. This deal was the third in a
      multi-year relationship: Insilico and Lilly first engaged on AI licensing in 2023,
      progressed to a $100 million deal in November 2025, and reached the $2.75 billion
      arrangement in March 2026—demonstrating a land-and-expand dynamic that is rare in
      early-stage AI biotech. Additional milestones include the $888 million Servier
      collaboration, the $120 million Qilu Pharmaceutical deal, and the $66 million Hengrui
      Parkinson's disease program. The HKEX IPO in late 2025 raised approximately $293 million
      and materially raised Insilico's visibility as a public company to global pharma
      procurement teams. The Phase 2a clinical trial of ISM001-055 (Rentosertib) in
      idiopathic pulmonary fibrosis—actively recruiting 60 patients at 12 US sites—provides
      the strongest independent clinical proof of platform productivity, which directly
      accelerates platform licensing conversations with prospective pharma buyers. No
      per-licensee revenue, annual recurring fee amounts, or licensee count beyond the
      company's "10 of top 20" claim is publicly disclosed.
    claimRefs:
      - CU004
      - CU005
      - CU006
      - CU008
      - CU009
      - CU010
      - CU016
      - CU017
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: named-customer-proof
    title: Named Customer Proof
    body: >-
      Insilico's named customer proof is anchored by the Eli Lilly collaboration (confirmed
      $115M upfront, $2.75B headline total) and buttressed by the Servier ($888M), Qilu
      ($120M), and Hengrui ($66M, Parkinson's disease) disclosed deals. All confirmed deals
      involve production-level engagements—full AI-driven drug discovery collaborations with
      financial commitments—as opposed to exploratory pilots or proof-of-concept exercises.
      The evidence quality varies significantly: the Eli Lilly deal is the best-substantiated,
      confirmed by FierceBiotech, BusinessWire, and company announcements, while Servier,
      Qilu, and Hengrui are corroborated primarily by a single FierceBiotech report. Exelixis,
      Sanofi, Fosun Pharma, and Menarini are named by pharmaphorum and company press materials
      but without disclosed financial terms. A critical limitation is that no pharma partner
      has published independent outcome data—clinical success rates, hit rate improvements, or
      drug candidate quality metrics—attributable to the Insilico platform. Clinical Trial
      NCT05975983 provides the most objective proxy: a Phase 2a trial of an AI-designed drug
      is actively recruiting, but trial results remain pending. The GAN-based molecular
      generation approach underlying Chemistry42 faces published academic criticism regarding
      chemical diversity relative to training data, which sophisticated pharma evaluators will
      scrutinize. The named proof base is more compelling than most AI drug discovery peers
      but remains limited by absent published outcome data.
    claimRefs:
      - CU004
      - CU007
      - CU008
      - CU009
      - CU010
      - CU011
      - CU013
      - CU014
      - CU015
      - CU028
    tableRefs:
      - TU003
    figureRefs:
      - FU003

  - id: retention-durability
    title: Retention and Durability
    body: >-
      Retention metrics for Insilico Medicine's pharma partnerships are entirely undisclosed.
      No Net Revenue Retention (NRR), Gross Revenue Retention (GRR), contract duration,
      renewal rate, or customer satisfaction score has been published in publicly accessible
      sources as of May 2026. This is structurally expected for an enterprise AI drug
      discovery platform operating under exclusive bilateral commercial arrangements—these
      metrics are proprietary and typically not disclosed until audited financial statements
      are filed. The most meaningful retention proxy is the Eli Lilly multi-phase
      relationship: three distinct commercial events in less than three years (2023 initial
      license, November 2025 $100M deal, March 2026 $2.75B collaboration) constitute the
      strongest evidence of contract renewal and progressive deal expansion available for any
      AI drug discovery company. No public customer churn events—terminations, non-renewals,
      or partner complaints—have been documented in any accessible source. No G2, Capterra,
      Gartner Peer Insights, or independent software review listing exists for Pharma.AI,
      which is expected given the exclusive enterprise B2B procurement model but limits
      third-party satisfaction validation. The fundamental diligence gap is the inaccessibility
      of verified HKEX annual and interim reports, which would disclose aggregate platform
      licensing revenue and confirm the number of currently active licensees.
    claimRefs:
      - CU019
      - CU020
      - CU021
      - CU022
      - CU029
      - CU035
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: expansion-concentration-risk
    title: Expansion Potential and Concentration Risk
    body: >-
      Insilico Medicine faces material single-customer concentration risk. Eli Lilly, as the
      largest disclosed partner ($2.75B headline, $115M confirmed upfront), dominates the
      near-term revenue and cash profile. If the $115M upfront represents the primary cash
      event from customer activity in 2025-2026, a single customer accounts for more than 50%
      of near-term cash inflows—a risk profile common in early-stage AI biotech but material
      from an investment diligence perspective. The top three disclosed deal values (Lilly
      $2.75B + Servier $888M + Qilu $120M) represent approximately $3.7 billion in aggregate
      headline value, dwarfing undisclosed partner deals. The milestone-contingent structure
      means the back-loaded risk-adjusted value of the Eli Lilly deal is materially lower than
      the $2.75B headline, as each milestone payment requires a successful clinical or
      regulatory event. The Lilly multi-phase relationship simultaneously demonstrates the
      positive concentration dynamic: three progressively larger deals from a single anchor
      customer generated $115M in confirmed cash, suggesting that anchored expansion is the
      primary growth lever. The mitigation path for concentration risk involves broadening the
      partner roster with mid-size European and Chinese pharma companies; Hengrui, Fosun, and
      Menarini signal early-stage traction in those segments.
    claimRefs:
      - CU023
      - CU024
      - CU025
      - CU031
      - CU037
    tableRefs:
      - TU005

