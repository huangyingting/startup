chapter:
  order: 7
  number: 7
  key: risks
  title: Risks
  letter: R
  summary: >-
    Insilico Medicine's primary risk cluster is regulatory: ISM001-055 (Rentosertib) for idiopathic
    pulmonary fibrosis must advance through Phase 3 without FDA precedent for an AI-designed NDA, creating a
    thesis-defining clinical and regulatory overhang. US-China geopolitical risks affect the company's
    Yixing/Suzhou manufacturing, WuXi AppTec partnership, and export-control exposure. The USD 2.75B Eli Lilly
    collaboration is the dominant near-term cash source and simultaneously the single largest concentration
    risk; deal collapse would create a material revenue cliff. AI inventorship uncertainty (post-DABUS
    rulings) threatens the validity of Insilico's patent claims on AI-designed compounds. Russia
    sanctions residual exposure from the 2022 subsidiary disposal remains incompletely documented in public
    sources. Financial risk is material: post-IPO burn rate, currency (HKD/USD/CNY) exposure, and an
    undisclosed capital runway make financial risk assessment partially opaque. Key-person concentration in
    CEO Alex Zhavoronkov is unmitigated by any disclosed succession plan.

