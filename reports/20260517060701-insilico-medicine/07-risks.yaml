sections:
  - id: regulatory-legal-risk
    title: Regulatory and Legal Risk
    order: 1
    body: >-
      Insilico Medicine's most material regulatory risk is the absence of FDA precedent for an AI-designed drug
      NDA. ISM001-055 (rentosertib) is advancing through Phase 3 for IPF (NCT05975983), but FDA has not issued
      binding guidance specific to AI-designed drug submissions. This creates review uncertainty at the NDA
      stage even if Phase 3 endpoints are achieved. The standard 505(b)(1) NDA pathway applies, but FDA
      reviewers have no comparator for adjudicating AI-origin compound claims.

      AI inventorship is a material legal risk. The DABUS rulings confirm that AI cannot be named as inventor
      on US patents. Insilico must document human inventive contribution for all AI-generated compound patents.
      The Nature Medicine paper (SR031) supports the human-inventorship argument for ISM001-055, but the
      adequacy of this documentation for broader pipeline patent prosecution is uncertain.

      Russia OFAC sanctions exposure remains incompletely documented. The 2022 Russia subsidiary disposal has
      not been publicly characterized in terms of counterparty, structure, or OFAC compliance. Residual IP
      license or data arrangements with the former Russian operations would create material sanctions liability.

      BIS export control regulations potentially apply to algorithmic IP transfers between US and Chinese
      operations. GDPR compliance obligations apply to EU-site clinical trial data. No regulatory enforcement
      actions have been identified in any jurisdiction, but compliance costs and risk are ongoing.
    claimRefs:
      - CR002
      - CR003
      - CR004
      - CR008
      - CR009
      - CR015
      - CR018
      - CR019
      - CR022
    calloutRefs: [CR-CALL-01]
    tableRefs: [TR001, TR002]
    figureRefs: [FR001]

  - id: operational-quality-security-risk
    title: Operational, AI Quality, and Cybersecurity Risk
    order: 2
    body: >-
      Insilico's AI platform risk centers on the known limitations of generative AI in chemistry. GAN-based
      molecule generation (ORGAN architecture) is documented to suffer from mode collapse and distribution
      shift, which can yield structurally plausible but synthetically intractable or metabolically unstable
      compounds. Phase 2a validation experiments for ISM001-055 mitigate this risk for the lead compound, but
      the 15+ pipeline compounds rely on the same platform and face the same model limitations without
      equivalent experimental confirmation.

      Phase 3 ADMET failure risk is non-trivial. TNIK inhibition in non-fibrotic tissues may produce
      immunosuppression or CNS effects not characterized in Phase 2a, and the general class failure rate for
      Phase 3 trials is 50-60%. AI-designed drugs have no Phase 3 completion precedent, making failure rate
      priors uncertain.

      Clinical execution capability is a risk. Insilico's origins as a computational company mean Phase 3
      execution will depend heavily on CRO partnerships; BIOSECURE Act restrictions on WuXi AppTec, if enacted,
      could disrupt CRO supply chain without adequate time to qualify alternatives.

      Cybersecurity risk is present but unverified. No public incidents have been reported, but Pharma.AI is a
      high-value target for industrial espionage. FDA cybersecurity guidance applies if any AI components are
      used in clinical contexts.
    claimRefs:
      - CR013
      - CR014
      - CR016
      - CR017
      - CR020
      - CR021
      - CR024
      - CR030
      - CR031
      - CR032
    calloutRefs: [CR-CALL-02]
    tableRefs: [TR003]
    figureRefs: [FR002]

  - id: partner-dependency-financial-risk
    title: Partner Dependency and Financial Risk
    order: 3
    body: >-
      The Eli Lilly collaboration (USD 2.75B total potential value) is Insilico's primary near-term revenue
      driver. Partner concentration at this scale is a structural risk: deal termination for convenience by
      Lilly would remove the majority of expected near-term cash inflows. The specific termination-for-
      convenience terms, minimum payment guarantees, and compound rights retention provisions are not publicly
      disclosed, preventing complete partner risk assessment.

      Financial sustainability risk is material. Insilico raised HKD 293M in its 2025 HKEX IPO and USD 95M in
      Series E. A typical Phase 3 IPF trial costs USD 150-300M. Combined capital is insufficient to fund Phase
      3 without Lilly milestone payments or a future raise. Burn rate and runway are not precisely disclosed
      from available public sources.

      Currency risk is present: USD-denominated R&D costs against HKD/CNY-denominated capital. HKD peg
      mitigates USD/HKD risk, but CNY exposure from mainland China operations is unhedged based on available
      disclosures.

      Market risk: post-IPO biotech valuation compression or loss of investor confidence in AI drug discovery
      could limit future capital access. HKEX Chapter 18A biotech listing conditions impose quarterly cash
      sufficiency disclosures and other ongoing obligations.
    claimRefs:
      - CR005
      - CR006
      - CR010
      - CR011
      - CR012
      - CR025
      - CR026
      - CR038
      - CR041
      - CR044
    calloutRefs: [CR-CALL-03]
    tableRefs: [TR004]
    figureRefs: [FR003]

  - id: people-execution-risk
    title: People, Execution, and Diligence Flags
    order: 4
    body: >-
      Key-person concentration in Alex Zhavoronkov is the most acute people risk. He serves as CEO and CSO, is
      the public face of Insilico, and has driven all major strategic deals including the Lilly collaboration.
      No successor or deputy has been publicly named. Departure of Zhavoronkov — whether voluntary or due to
      health, regulatory action, or governance dispute — would materially impair Insilico's investor relations,
      scientific credibility, and deal negotiation capability.

      ML team retention is a secondary risk. Insilico competes for AI/ML talent against Google DeepMind,
      OpenAI, and pharmaceutical AI divisions. Compensation competitiveness in the Hong Kong market for
      top-tier ML researchers is uncertain.

      Phase 3 clinical execution capability is a risk distinct from the scientific platform. Regulatory
      affairs, data management, and clinical operations headcount for multi-regional Phase 3 is not publicly
      confirmed; CRO dependency creates execution risk if key CRO relationships are disrupted.

      Priority diligence flags: (1) ISM001-055 Phase 3 clinical hold status; (2) Phase 3 endpoint powering
      adequacy confirmation; (3) Lilly termination clause review; (4) OFAC compliance documentation for Russia
      disposal; (5) Zhavoronkov succession plan confirmation.
    claimRefs:
      - CR007
      - CR035
      - CR036
      - CR037
      - CR020
      - CR023
      - CR033
      - CR034
    calloutRefs: [CR-CALL-04]
    tableRefs: [TR005]

