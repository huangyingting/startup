callouts:
  - id: CR-CALL-01
    type: warning
    title: "No FDA AI-Designed Drug NDA Precedent"
    body: >-
      As of May 2026, no AI-designed drug has completed Phase 3 and received FDA NDA approval. ISM001-055
      would be the first. FDA has not issued specific guidance for AI-designed drug NDA submissions. This
      creates regulatory uncertainty at the NDA stage that cannot be mitigated by clinical data quality alone
      — it is a structural novelty risk for the entire AI drug discovery thesis.
    claimRefs: [CR002, CR015]
    sourceRefs: [SR001, SR016]

  - id: CR-CALL-02
    type: warning
    title: "GAN Model Limitations Create Unquantified Late-Stage ADMET Risk"
    body: >-
      Insilico's Chemistry42 platform uses GAN-based generative architectures with documented mode collapse
      and distribution shift limitations. Phase 2a validation for ISM001-055 mitigates — but does not
      eliminate — the risk of late-stage ADMET failure from AI-generated compounds. The 15+ pipeline
      compounds rely on the same platform without equivalent Phase 2 experimental confirmation. A systematic
      ADMET failure pattern across the portfolio would impair the entire platform thesis.
    claimRefs: [CR016, CR017, CR030]
    sourceRefs: [SR032, SR033, SR034]

  - id: CR-CALL-03
    type: warning
    title: "Eli Lilly Concentration Exceeds 50% Near-Term Revenue"
    body: >-
      The USD 2.75 billion Eli Lilly collaboration is expected to represent greater than 50% of Insilico
      Medicine's near-term revenue. Termination-for-convenience provisions, milestone trigger conditions, and
      compound retention rights are not publicly disclosed. A Lilly exit would create a material revenue cliff
      that combined IPO and Series E proceeds could not bridge without an immediate capital raise.
    claimRefs: [CR005, CR006, CR041]
    sourceRefs: [SR021, SR027]

  - id: CR-CALL-04
    type: flag
    title: "CEO/CSO Key-Person Risk: No Succession Plan Disclosed"
    body: >-
      Alex Zhavoronkov serves simultaneously as CEO and Chief Scientific Officer with no disclosed succession
      plan, deputy CEO, or named successor as of May 2026. His departure — whether voluntary, due to health,
      or arising from a governance dispute — would materially impair investor relations, the Lilly
      partnership, and Insilico's scientific credibility. The board should be required to disclose a
      succession plan prior to any investment closing.
    claimRefs: [CR007, CR035, CR037]
    sourceRefs: [SR019, SR029]
