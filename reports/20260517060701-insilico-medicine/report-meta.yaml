companyProfile:
  summary: Insilico Medicine is a clinical-stage AI biotechnology company listed on the Hong Kong Stock Exchange (SEHK:3696) that uses its Pharma.AI platform — comprising Biology42 (target ID), Chemistry42 (generative molecular design), and Medicine42/inClinico (clinical analytics) — to accelerate small-molecule drug discovery. Founded in 2014 by Alex Zhavoronkov, the company has achieved the globally unprecedented milestone of an AI-designed drug completing Phase 2 clinical trials (ISM001-055 for idiopathic pulmonary fibrosis), signed a $2.75 billion collaboration with Eli Lilly in March 2026, and maintains 40+ programs with 13 IND approvals across fibrosis, oncology, and immunology.
  foundedDate: '2014-01-01'
  founders:
    - name: Alex Zhavoronkov
      role: CEO and Founder
      background: PhD in physics and mathematics from Moscow State University; MSc in biotechnology from Johns Hopkins; serial AI drug discovery entrepreneur and author.
      claimRefs: [CO008]
    - name: Feng Ren
      role: Co-Founder and Chief Scientific Officer
      background: PhD-level computational biology scientist leading Insilico's scientific platform development.
      claimRefs: [CO010]
  foundingLocation: Baltimore, Maryland, USA
  headquarters: Cambridge, Massachusetts, USA
  productSummary: Insilico Medicine sells access to its Pharma.AI platform to pharmaceutical companies as a SaaS/collaboration service and also advances its internal drug pipeline; lead asset ISM001-055 (TNIK inhibitor) completed Phase 2 in IPF and additional programs are in Phase 1/2 in oncology and inflammatory disease.
  customerFocus: Top global pharmaceutical companies (10 of top 20 have collaborated) seeking AI-accelerated small-molecule drug design and target identification, plus the company's own internal pipeline generating milestone and royalty economics.
  businessModel: Platform licensing fees and upfront collaboration payments from pharma partners, milestone payments tied to clinical and regulatory events, and potential future royalties on commercialized drugs; internal pipeline creates optionality for outright asset sales or spin-out economics.
  stage: public
  fundingStatus: Public company (HKEX SEHK:3696) since late 2025; raised ~$293M in IPO; prior private rounds totaled ~$450M (seed through Series E at $2.3B post-money).
  disclosureProfile: public
  claimRefs: [CO001, CO002, CO003, CO004, CO005, CV001, CV002, CV003]
