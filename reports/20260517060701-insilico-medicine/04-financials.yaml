callouts:
  - calloutType: risk
    title: "Milestone revenue concentration risk"
    body: >-
      The majority of Insilico's headline deal value ($2.75B from Eli Lilly) is back-loaded in
      milestones contingent on clinical and regulatory events that have not yet occurred.
      Historical pharmaceutical industry data shows that approximately 10% of drugs entering
      Phase 1 ultimately receive FDA approval. If ISM001-055 or other Lilly-partnered programs
      fail in late-stage trials, most of the $2.75B headline value will never be realized. The
      $115M upfront is the only confirmed cash received from this deal as of the report date.
    claimRefs:
      - CI023
      - CI041

  - calloutType: insight
    title: "Eli Lilly $115M upfront validates platform commercial pricing"
    body: >-
      The March 2026 Eli Lilly deal—with $115M upfront and $2.75B total potential value—is
      the largest single commercial validation of an AI-generative drug discovery platform to
      date. It establishes a pricing benchmark for large pharma co-development of AI-designed
      clinical candidates and confirms that Insilico's Pharma.AI platform commands nine-figure
      upfront payments from top-tier industry buyers. This validates the commercial model even
      in the absence of disclosed ARR or platform licensing revenue.
    claimRefs:
      - CI009
      - CI041

