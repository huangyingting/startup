    - type: missing-source
      severity: material
      topic: peer-comparison-capital-intensity
      missingEvidence: "Comparable capital intensity data (R&D spend, burn rate, programs per dollar deployed) for peer AI drug discovery companies (Recursion Pharmaceuticals, Exscientia, BenevolentAI) to benchmark Insilico."
      whyItMatters: "Without peer comparison, it is impossible to determine whether Insilico's capital efficiency is above or below the AI drug discovery sector norm, affecting the investment case."
