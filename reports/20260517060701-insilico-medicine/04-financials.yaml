company:
  name: Insilico Medicine

chapter:
  number: 4
  title: Financials
  summary: >-
    Insilico Medicine is a clinical-stage, pre-commercial AI drug discovery company with a
    hybrid revenue model combining platform licensing fees, milestone payments, and large
    upfront collaboration payments—most visibly the $115M upfront from Eli Lilly (March 2026)
    as part of a $2.75B headline deal. No drug-sale revenue exists yet. The company raised
    ~$293M in its HKEX IPO (late 2025) and ~$95M in a Series E (April 2024), but specific
    cash position, burn rate, gross margin, and ARR remain undisclosed. The principal diligence
    blocker is absence of the HKEX prospectus and annual report, which as a public company it
    is now required to file. Capital intensity is high; milestone revenue is lumpy and contingent;
    and the $2.75B headline Eli Lilly value is mostly back-loaded on clinical milestones that
    have yet to be achieved.

sections:
  - id: revenue-streams-and-pricing
    title: Revenue Streams and Pricing Model
    body: >-
      Insilico Medicine's revenue model is a hybrid of recurring platform licensing fees,
      large upfront collaboration payments, contingent milestone payments, and eventual
      royalties on commercialized drugs. The Pharma.AI platform (comprising Biology42 for
      target identification, Chemistry42 for generative molecular design, and Medicine42 for
      clinical trial analytics) is licensed to pharmaceutical partners for an undisclosed
      annual fee. Published pricing is not available; enterprise deals are negotiated
      individually. As of 2026, the company has signed collaboration agreements with ten of
      the top twenty global pharmaceutical companies by 2021 revenues, though deal-level
      revenue amounts are not publicly disclosed.

      The most visible and confirmed revenue event is the March 2026 Eli Lilly collaboration,
      which included a $115 million upfront payment and up to $2.75 billion in total potential
      value composed of milestones and royalties. This upfront is recognized as a collaboration
      revenue event, not a drug-sale event. No drugs discovered using Insilico's platform have
      received regulatory approval as of the report date, meaning royalty revenue remains
      speculative. Government grant income—from the Canadian federal government supporting the
      Montreal center and from UAE government support for the Abu Dhabi center—constitutes a
      minor and non-recurring revenue stream. Revenue recognition for milestone payments follows
      the completion of defined clinical/regulatory events (IND, Phase 1 initiation, Phase 2
      completion, NDA/BLA filing), making the timing of revenue inherently lumpy. [CI002][CI009][CI010][CI011][CI029][CI033][CI040]
    claimRefs:
      - CI002
      - CI009
      - CI010
      - CI011
      - CI029
      - CI033
      - CI040
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001

  - id: gtm-and-sales-efficiency
    title: Go-to-Market Motion and Sales Efficiency
    body: >-
      Insilico Medicine's go-to-market motion targets research and development leadership
      within top-twenty global pharmaceutical companies—specifically Chief Scientific Officers,
      Vice Presidents of Discovery Chemistry, and Business Development executives. The company
      competes for large multi-year platform licensing and co-development agreements rather
      than high-volume transactional deals. No channel partners, distributors, or resellers
      are publicly disclosed; the company appears to operate a direct enterprise sales model
      supported by scientific credibility (over 300 peer-reviewed publications) and demonstrated
      clinical proof-of-concept data from ISM001-055.

      Sales cycle duration for pharma platform partnerships is typically measured in quarters
      to years, reflecting the complexity of contract negotiation, due diligence, and committee
      approvals within large pharma organizations. The Eli Lilly deal (March 2026), valued at
      $2.75 billion headline, required significant prior relationship development and presumably
      leveraged Phase 2 clinical data from ISM001-055 as validation. Standard B2B SaaS metrics
      such as customer acquisition cost (CAC), payback period, and net revenue retention (NRR)
      are not publicly available and are not applicable without modification to this non-standard
      enterprise pharma licensing structure. The lack of any disclosed customer-by-customer
      revenue breakdown makes precise sales efficiency analysis impossible without HKEX
      filings. [CI019][CI026][CI032][CI036]
    claimRefs:
      - CI019
      - CI026
      - CI032
      - CI036

  - id: cost-structure-and-margins
    title: Cost Structure, Gross Margins, and Capital Intensity
    body: >-
      Insilico Medicine's cost structure is dominated by research and development expenditures
      characteristic of a clinical-stage biopharmaceutical company managing more than forty
      programs, thirteen IND approvals, and multiple active Phase 1 and Phase 2 clinical trials
      as of May 2026. With approximately 350 employees globally as of September 2024, the
      annualized salary and benefits burden alone is estimated at $50–80 million per year
      (using a blended global cost of $140,000–$230,000 per full-time equivalent weighted by
      geography). Clinical trial expenditures, contract research organization (CRO) fees, and
      investigational drug manufacturing costs add a further material layer; Phase 2 trials
      can cost $5–30 million per study depending on indication and geography, and the company
      is running multiple concurrent programs.

      Gross margin on Pharma.AI platform licensing cannot be confirmed without financial
      disclosures, but software/AI platform licensing businesses in the life sciences sector
      typically carry gross margins of 70–85 percent. The addition of collaboration-intensive
      co-development services or milestone-contingent deliverables may compress realized margins
      relative to pure-SaaS benchmarks. Working capital requirements are modest for a software
      licensing business, but the clinical pipeline generates substantial cash outflows (capex
      light, opex heavy). No debt facility or project finance obligation has been publicly
      disclosed. The company's disposal of its Russian subsidiary in October 2022 may have
      generated impairment charges whose magnitude is not publicly disclosed. [CI015][CI016][CI020][CI021][CI025][CI027][CI038]
    claimRefs:
      - CI015
      - CI020
      - CI021
      - CI025
      - CI027
      - CI038
    tableRefs:
      - TI003
    figureRefs:
      - FI002

  - id: capital-adequacy
    title: Capital Adequacy and Financing Dependency
    body: >-
      Insilico Medicine's capital base as of May 2026 reflects the cumulative effect of its
      funding history—seed ($8.26M), Series B ($37M, 2019), Series C ($255M, 2021), Series D
      ($60M, 2022), Series E ($95M, April 2024 at ~$2.3B post-money valuation), plus the HKEX
      IPO (~$293M, late 2025) and the Eli Lilly $115M upfront payment (March 2026). The
      combined gross cash inflows from the IPO and Lilly upfront alone total approximately
      $408M. After pre-IPO operating costs and ongoing clinical expenditures, the post-IPO
      cash position is estimated at $280–420M, though the precise figure requires HKEX
      prospectus and annual report access. Refer to the Company Overview chapter for the full
      round-by-round financing chronology; this section focuses on forward capital adequacy.

      Based on estimated annual burn rates of $70–150M per year (reflecting headcount of ~350
      plus multi-program clinical trial portfolio), the company's estimated runway ranges from
      approximately two years (high-burn scenario) to four years (low-burn scenario) from the
      IPO date. The $115M Eli Lilly upfront (confirmed, March 2026) materially extends runway.
      No debt facility, convertible notes, or project finance obligations have been publicly
      disclosed. The principal next-round trigger would be initiation and funding needs for a
      Phase 3 trial of ISM001-055, which requires significantly larger capital outlays than
      Phase 2. As a public company listed on HKEX, Insilico is now required to file semi-annual
      and annual financial reports under Hong Kong listing rules, which will provide verified
      cash position, burn rate, and use-of-proceeds data once accessed. [CI001][CI003][CI004][CI005][CI006][CI007][CI008][CI013][CI014][CI030][CI034][CI035]
    claimRefs:
