      missingEvidence: "Confirmed annual burn rate, cash balance, and monthly run-rate from audited HKEX financial statements or investor presentations."
      whyItMatters: "All runway and capital adequacy estimates in this chapter carry low confidence and are model-derived; material decisions cannot be made on estimated figures alone."
