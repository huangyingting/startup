      severity: blocking
      topic: HKEX-financial-statements
      missingEvidence: "Insilico Medicine's HKEX prospectus and annual/interim reports (SEHK:3696) containing revenue breakdown, gross margin, cash position, burn rate, and use-of-IPO-proceeds disclosures."
      whyItMatters: "As a public company since late 2025, Insilico is required to disclose audited financial statements. Without these, revenue quality, margin path, and capital adequacy cannot be assessed with any analytical confidence."
      diligencePath: "Access hkex.com.hk or the company's investor relations page to download the HKEX prospectus and latest annual/interim report for SEHK:3696. Review income statement, cash flow statement, and segment reporting."
      relatedQuestionRefs:
        - QI022
        - QI009

    - type: private-evidence-only
      severity: blocking
      topic: Eli-Lilly-milestone-schedule
      missingEvidence: "Detailed milestone schedule, per-milestone dollar amounts, royalty rates, exclusivity scope, and termination provisions for the March 2026 Eli Lilly agreement."
      whyItMatters: "The $2.75B headline value is almost entirely back-loaded in contingent milestones. Without the milestone schedule, the risk-adjusted present value of the deal cannot be modeled and the revenue quality assessment remains incomplete."
      diligencePath: "Review the material contract disclosure section of the HKEX prospectus or any Form 20-F equivalent; request term sheet in due diligence if not publicly disclosed."
      relatedQuestionRefs:
        - QI005
        - QI018

    - type: private-evidence-only
      severity: material
