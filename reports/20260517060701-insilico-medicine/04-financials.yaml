  - id: public-traction-and-gaps
    title: Public Traction vs. Private Metric Gaps
    body: >-
      The publicly available financial information for Insilico Medicine as of May 2026 is
      highly limited despite its status as an HKEX public company. The most concrete financial
      traction data point is the $115M upfront from Eli Lilly (March 2026). Beyond this, no
      revenue figures, ARR, gross margins, net loss, operating expenses, or cash balance have
      been surfaced in the research sources accessible for this report. The SEC EDGAR record
      for CIK 0001789097 (Insilico Medicine Cayman TopCo) shows Form D filings from prior
      funding rounds but no financial statements on the SEC platform. The HKEX listing page
      for SEHK:3696 is accessible but does not provide direct financial statements without
      accessing the formal prospectus and annual report documents.

      The ten pharma collaborations are confirmed in principle but without per-deal revenue
      amounts, contract lengths, renewal rates, or termination clauses being disclosed.
      Employee headcount of approximately 350 (September 2024) is the most recent staffing
      figure accessible; a 2026 update is unavailable in public sources. Pipeline breadth
      (40+ programs, 13 IND approvals) is verifiable through ClinicalTrials.gov API data, but
      this is a proxy for activity level—not a financial metric. The magnitude of government
      grants received from Canada and the UAE is not quantified in public sources. These gaps
      constitute the principal financial diligence blockers and are catalogued in the evidence
      gaps and in the public financial gaps table below. [CI012][CI024][CI028][CI031][CI035]
    claimRefs:
      - CI012
      - CI024
      - CI028
      - CI031
      - CI035
    tableRefs:
      - TI005
    figureRefs:
      - FI003

  - id: financial-verdict
    title: Financial Verdict
    body: >-
      Insilico Medicine presents a high-capital-intensity, pre-commercial revenue profile that
      is characteristic of clinical-stage AI-enabled biotechnology companies. The revenue
      quality assessment is mixed: platform licensing fees provide a recurring base (but amounts
      are undisclosed), while the most visible revenue events—upfront collaboration payments
      such as the $115M from Eli Lilly—are lumpy and non-recurring. The $2.75B headline Eli
      Lilly deal value is substantially contingent on milestones that depend on clinical and
      regulatory success events that have not yet occurred; the risk-adjusted value of the full
      deal is materially lower than the headline.

      The margin path cannot be modeled in the absence of disclosed financial statements. The
      platform licensing business likely carries high gross margins (70–85% by SaaS benchmarks),
      but the co-development, clinical, and operational layer suppresses operating margins
      significantly. Capital intensity is high due to multi-program clinical trials, and while
      the Eli Lilly upfront and IPO proceeds provide meaningful near-term runway, Phase 3
      initiation for ISM001-055 and expansion of the pipeline will require continued capital
      access. The fundamental diligence blocker is the inaccessibility (in this research run)
      of the HKEX prospectus and post-IPO annual/interim reports, which as a public company
      Insilico is required to file. Until those disclosures are reviewed, no underwriting-grade
      financial analysis is possible. [CI022][CI023][CI024][CI039][CI041]
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI039
      - CI041

