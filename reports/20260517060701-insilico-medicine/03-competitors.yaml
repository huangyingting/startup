  - id: SP004
    title: "Switching Costs, Lock-in, Multi-homing, and Distribution Power"
    body: |
      Switching costs in AI drug discovery vary substantially by platform type. For software-as-a-service
      platforms like Schrödinger, switching costs are structurally high because internal pharma teams
      build workflows, scripts, and institutional knowledge around specific tool suites. FEP+ calculations
      are embedded in validated computational workflows, and any switch requires revalidation over multiple
      years for regulated drug development. This creates a sticky installed base that is difficult for
      competitors including Insilico to displace through capability alone.

      For milestone-based collaboration models like those of Insilico, Recursion, and Isomorphic Labs,
      switching costs during active collaborations are contractually embedded through change-of-control
      provisions, milestone obligations, and co-ownership of IP generated under collaboration. These
      protect existing deal value but do not prevent pharma from entering concurrent deals with
      competitors. Multi-homing is the norm: AstraZeneca, Roche, and Pfizer maintain simultaneous
      relationships with multiple AI drug discovery providers.

      Network effects in AI drug discovery are limited but present at the data layer. Recursion's
      50-petabyte wet-lab dataset creates a data moat that improves with each additional experiment.
      Insilico's Biology42 target identification engine improves with data from each successful
      collaboration. However, foundational biological data (protein structures via AlphaFold2,
      public genomics databases, ChEMBL) is increasingly open-source, reducing the uniqueness
      premium of proprietary datasets over time.

      Supply and partner access barriers favor incumbents. Schrödinger's 18-plus top-20 pharma
      penetration means competitors must offer a compelling cost-performance trade-off to gain share.
      Insilico's HKEX listing, Eli Lilly deal, and clinical track record provide reputational access
      advantages that earlier-stage players (Xaira Therapeutics, Numerion Labs) must build from
      scratch. Regulatory relationships including FDA pre-IND meetings, EMA scientific advice
      interactions, and 13 IND approvals represent material barriers that new AI-first entrants
      face. WuXi AppTec, an investor in Insilico, controls significant wet-lab supply capacity,
      creating a complex competitive-partnership dynamic with traditional CRO incumbents.
