  - id: SP002
    title: "Competitor Profiles and Scale"
    body: |
      Recursion Pharmaceuticals (NASDAQ: RXRX) is the largest publicly traded AI drug discovery
      company as of 2026, following its acquisition of Exscientia for approximately $688M in
      all-stock in January 2025. Recursion operates the Recursion OS platform built on over 50
      petabytes of biological and chemical data spanning phenomics, transcriptomics, proteomics,
      ADME, and de-identified patient data. Its automated wet lab processes millions of cell
      experiments per week using robotics and computer vision. The clinical pipeline includes
      REC-4881 (MEK1/2 inhibitor for FAP, Phase 2 with Orphan Drug and Fast Track designations)
      and REC-3565 (MALT1 inhibitor for B-cell lymphoma, Phase 1 with first patient dosed).
      Recursion partnered with AstraZeneca in a deal exceeding $100M and with NVIDIA for the
      BioHive-2 supercomputer infrastructure.

      Schrödinger (NASDAQ: SDGR) is the dominant physics-based computational chemistry platform
      with FEP+, WaterMap, and LiveDesign as core products generating software ARR estimated at
      approximately $130–150M as of 2024. Its tools are used by an estimated 18 or more of the
      top 20 global pharmaceutical companies, providing deep distribution and high switching costs.

      Exscientia, an Oxford-based AI-first drug design company using the Alliptic platform, was
      acquired by Sanofi in 2024 for approximately $1.2–1.8B. This removed an independent competitor
      but validated AI drug discovery commercial pricing for pharma acquirers. Post-acquisition,
      Exscientia capabilities are embedded within Sanofi R&D.

      Isomorphic Labs (private, London, Alphabet subsidiary) holds the exclusive commercial license
      to AlphaFold3 for drug discovery. With approximately $2.7B total raised including a Series B
      of $2.1B announced May 2026, and partnerships with Eli Lilly ($45M upfront + up to $1.7B in
      milestones), Novartis ($37.5M + up to $1.2B), and Johnson & Johnson (January 2026), Isomorphic
      represents the best-funded private competitor. However, Isomorphic has not completed a Phase 1
      clinical trial as of May 2026.

      XtalPi is a Chinese AI drug discovery company using quantum physics, AI, and advanced robotics,
      backed by Tencent, Sequoia Capital, and Eli Lilly as a strategic investor. Numerion Labs
      operates an ML superplatform targeting immune and inflammatory diseases. BenevolentAI underwent
      a major strategic overhaul in December 2024 and proposed delisting from Euronext Amsterdam in
      February 2025, signaling financial distress.
