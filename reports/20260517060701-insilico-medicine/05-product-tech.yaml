  - id: trust-safety-compliance
    title: "Trust, Safety, Compliance, and Quality Controls"
    body: >-
      Insilico Medicine's trust and compliance posture spans three domains: regulatory
      compliance for clinical drug development, data privacy and security for the SaaS platform,
      and quality management for AI model outputs.

      For clinical development, the company operates under GxP-compliant frameworks (GLP for
      preclinical work, GCP for clinical trials) as mandated by FDA IND requirements and ICH
      guidelines. Thirteen INDs have been filed with the FDA as of 2024, and Phase 1 and Phase 2
      trials have been conducted under registered ClinicalTrials.gov protocols (NCT05938920 and
      NCT05975983 for ISM001-055). The EMA's scientific advice framework governs EU-facing
      regulatory strategy for European-market drug candidates. No third-party GxP audit report
      or form 483 observation history is publicly available; these are not required disclosures
      for investigational-stage companies. Insilico has participated in FDA Voluntary Framework
      discussions on AI/ML-based drug development tools, demonstrating regulatory engagement;
      however, this framework is voluntary and does not certify the Pharma.AI platform.

      For the Pharma.AI SaaS platform, critical trust gaps include: (1) no public SOC 2 Type II
      attestation has been located—a standard requirement for regulated pharmaceutical SaaS
      vendors; (2) no ISO 27001 certification is publicly confirmed; (3) HIPAA compliance
      posture for handling de-identified or anonymized clinical trial patient data is not
      publicly documented; and (4) GDPR compliance for EU and Hong Kong data operations is
      presumed but not externally audited. These gaps are material for regulated pharma buyers
      and require direct vendor disclosure requests during commercial diligence.
