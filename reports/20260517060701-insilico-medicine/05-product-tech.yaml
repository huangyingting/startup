  - id: module-asset-map
    title: "Module and Asset Map: Pharma.AI Modules and Drug Pipeline"
    body: >-
      Insilico Medicine operates both a platform licensing business and a wholly owned internal
      drug pipeline that are deeply integrated: the internal pipeline serves as the primary
      proof-of-concept for the Pharma.AI modules and generates the clinical validation data
      underpinning platform commercial credibility.

      Biology42's PandaOmics module is used for target identification and validation. It ingests
      gene-disease association data, expression profiling, and protein interaction networks to
      score targets for biological novelty and druggability. PandaOmics identified TNIK (TRAF2
      and NCK-interacting kinase) as a fibrosis driver in idiopathic pulmonary fibrosis (IPF)—a
      target subsequently drugged by Chemistry42 to produce ISM001-055. Chemistry42 employs over
      50 generative algorithms to design de novo small molecules; ISM001-055 was designed in
      approximately 46 days, compared to a traditional medicinal chemistry timeline of two to
      three years. Medicine42/inClinico applies predictive models to trial design; a
      company-affiliated Nature Biomedical Engineering paper (2022) reported a 79% improvement in
      Phase 2 success prediction accuracy, though independent replication is pending.

      The internal drug pipeline as of May 2026 spans over 40 programs with 13 IND approvals.
      Key clinical assets include: ISM001-055 (TNIK inhibitor, IPF, Phase 2 complete—the world's
      first AI-generatively-designed drug to complete Phase 2 globally), ISM3091 (USP1 inhibitor,
      solid tumor oncology, Phase 1/2), ISM8207 (KRASG12D inhibitor, pancreatic and lung cancer,
      Phase 1), ISM6331 (TEAD inhibitor, mesothelioma and NF2, Phase 1), and ISM5411 (PHD1/2/3
      inhibitor, ulcerative colitis, Phase 2). In March 2026, Eli Lilly entered a $2.75 billion
      collaboration covering licensing of AI-designed assets, with $115 million paid upfront.
