  - id: deployment-integration-roadmap
    title: "Deployment, Integration, Reliability, and Roadmap"
    body: >-
      Insilico Medicine's Pharma.AI platform is deployed as enterprise SaaS, requiring
      pharmaceutical partners to integrate via negotiated API connections into their existing
      drug discovery and clinical data infrastructure. No public integration guide, SDK, or API
      reference has been released as of May 2026; all integration specifications are understood
      to be defined within commercial licensing agreements.

      The primary deployment evidence comes from collaborative research outputs and milestone
      announcements. The Eli Lilly collaboration (March 2026), valued at up to $2.75 billion
      with $115 million upfront, represents the most significant public deployment event,
      encompassing platform licensing and AI-designed drug asset licensing. Prior collaborations
      with Pfizer (2020), Janssen (2021), Sanofi (2023), and other top-twenty pharma companies
      demonstrate broad enterprise adoption. Insilico operates global R&D and commercial offices
      in Cambridge MA, Hong Kong, Shanghai, Suzhou, Yixing, Taipei, Montreal, New York, and
      Abu Dhabi, providing regional support for partnership programs.

      The near-term roadmap is anchored on three streams: Phase 3 initiation for ISM001-055 in
      IPF (requiring substantially greater capital than Phase 2); advancement of ISM3091,
      ISM8207, ISM6331, and ISM5411 through Phase 1/2 milestones; and expansion of Pharma.AI
      platform collaborations beyond the current base, leveraging the Eli Lilly deal as
      commercial validation. As a public HKEX-listed company (SEHK:3696) following its late-2025
      IPO ($293M raised), Insilico now files semi-annual and annual reports providing future
      investment visibility. Nature recognized Insilico as one of the 50 top corporate
      institutions in biological sciences for 2025. No specific platform technology upgrade or
      new module release roadmap has been publicly disclosed for 2026.
