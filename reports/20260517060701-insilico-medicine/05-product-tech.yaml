  evidenceGaps:
    - type: missing-source
      severity: material
      topic: trust-compliance
      missingEvidence: >-
        SOC 2 Type II audit report, ISO 27001 certification certificate, and HIPAA Business
        Associate Agreement (BAA) template for the Pharma.AI SaaS platform.
      whyItMatters: >-
        Regulated pharmaceutical customers (FDA-regulated, EMA-regulated) conducting vendor
        assessments of the Pharma.AI platform will require SOC 2 Type II as a baseline security
        assurance. Absence of public attestation is a blocking diligence issue for enterprise
        procurement at large pharma companies.
      diligencePath: >-
        Request directly from Insilico Medicine's compliance or legal team: (1) SOC 2 Type II
        report under NDA; (2) ISO 27001 certificate if held; (3) HIPAA compliance posture
        statement and sample BAA; (4) confirmation of GDPR data processing mechanisms.
      relatedQuestionRefs:
        - QE014

    - type: private-evidence-only
      severity: material
      topic: phase-3-planning
      missingEvidence: >-
        Confirmed Phase 3 trial protocol, patient enrollment plan, CRO selection, estimated
        budget, and initiation timeline for ISM001-055 in IPF following Phase 2 completion.
      whyItMatters: >-
        Phase 3 represents the largest capital commitment in Insilico's clinical roadmap and
        is the pivotal event required for NDA filing and eventual commercial approval of
        ISM001-055. Without public Phase 3 details, it is impossible to assess capital adequacy,
        probability of success, or regulatory strategy.
      diligencePath: >-
        Review HKEX semi-annual and annual filings (SEHK:3696) once published; request Phase 3
        protocol summary from Insilico BD/IR team; monitor ClinicalTrials.gov for new NCT
        registrations tied to ISM001-055 Phase 3.
      relatedQuestionRefs:
        - QE017
        - QE019

    - type: missing-source
