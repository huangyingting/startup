      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              到 2026 年及之后，五个结构性驱动因素支撑 AI 药物发现采用。第一，药物开发经济账对 AI 采用高度有利：每个获批药物成本 $2.6 billion，临床失败率 90%；如果 AI
              工具能把临床前淘汰率减半，节省的成本足以支撑高额平台授权费，形成结构性需求引擎。第二，AlphaFold2 和 AlphaFold3（Google
              DeepMind）打破了蛋白结构预测成本曲线，把基于结构的药物设计成本从每个结构 $500,000+（X 射线晶体学）降到接近零，显著扩大了基于预测结构构建的 AI 药物设计工具可触达市场。第三，到 2030
              年前，头部制药公司的重磅药物因专利到期面临 $200 billion 以上收入风险，迫切需要 AI 加速补管线能力。第四，FDA 和 EMA 已建立适用于 AI 设计药物的监管指导框架，包括 FDA 的 Drug
              Development Tools 资格认定项目和 EMA 科学建议路径，降低了近期监管不确定性。第五，全球人口老龄化推高疾病负担：WHO 报告全球每年新增癌症诊断超过 20 million 例，IPF
              发病率也在上升，扩大了支撑长期市场增长的患者群体。

              四个实质约束拖慢采用。第一，截至 2026 年，尚无主要由 AI 设计的药物获得 FDA 或 EMA 完整批准；如果 Insilico 的 ISM001-055
              获批，将成为历史首例，但这一空白让保守的制药研发决策者在评估 AI 设计分子在后期试验中的记录时仍有不确定性。第二，AI 消除不了临床试验瓶颈：Phase I、II、III
              试验都需要招募人类患者，无论临床前工作被 AI 加速多少，试验仍要花费数年，限制了总开发周期压缩。第三，制药-AI 合作中的数据所有权和 IP 分配会制造合同摩擦；没有强 IP
              保护，制药公司不愿共享专有靶点和测定数据集，进而拖慢交易形成和谈判节奏。第四，黑箱 AI 可解释性挑战会增加监管申报难度，因为监管方希望看到分子设计选择的机制性论证；公开文献已把这列为 AI
              生成分子结构的挑战，也是 Insilico 监管申报中的尽调关注点。来自大型科技平台的竞争——Google DeepMind、Microsoft Azure for Life Sciences 和 NVIDIA
              BioNeMo——也带来长期被去中介化的潜在风险。
