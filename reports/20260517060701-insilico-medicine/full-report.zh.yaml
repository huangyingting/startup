  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 最重大的监管风险，是 FDA 尚无 AI 设计药物 NDA 的先例。ISM001-055（rentosertib）正在 IPF 适应症推进 Phase
              3（NCT05975983），但 FDA 尚未发布针对 AI 设计药物提交的有约束力指导。即便 Phase 3 达到终点，NDA 阶段仍存在审评不确定性。标准 505(b)(1) NDA 路径适用，但 FDA
              审评人员没有可用于裁定 AI 来源化合物主张的对照案例。

              AI 发明人身份是实质法律风险。DABUS 裁决确认，AI 不能在美国专利中被列为发明人。Insilico 必须为所有 AI 生成化合物专利记录人类发明贡献。Nature Medicine 论文（SR031）支撑
              ISM001-055 的人类发明人论点，但这套文件对更广泛管线专利申请是否充分，仍不确定。

              俄罗斯 OFAC 制裁暴露仍未完整记录。2022 年俄罗斯子公司处置在交易对手、结构或 OFAC 合规层面没有公开说明。若与原俄罗斯业务仍有残余 IP 授权或数据安排，将形成实质性制裁责任。

              BIS 出口管制规定可能适用于美国与中国运营之间的算法 IP 转移。GDPR 合规义务适用于 EU 站点的临床试验数据。尚未在任何司法辖区发现监管执法行动，但合规成本和风险仍在持续。
