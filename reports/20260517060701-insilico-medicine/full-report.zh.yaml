      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine 由 Alex Zhavoronkov, PhD 于 2014 年创立，他担任 CEO 和董事长。Zhavoronkov 出生于拉脱维亚，在 Queen's
              University（金斯顿，加拿大）取得两个学士学位，在 Johns Hopkins University 取得生物技术硕士学位，并在莫斯科国立大学取得物理和数学博士学位。他同时是英国
              Biogerontology Research Foundation 董事；截至 2024 年，也是 Buck Institute for Research on Aging 的 AI 兼职教授。Feng
              Ren, PhD 担任联合创始人兼首席科学官，负责发现与转化科学组织。Alex Aliper, PhD 是 Insilico Medicine USA 总裁，也是临床和 AI
              开发团队的关键人物。公司以高度分布式的人才模式著称，并大量通过黑客松和竞赛招聘。对 Alex Zhavoronkov 的关键人依赖是实质风险，因为他是公司的公众面孔、主要发明人和愿景设定者。2025 年底
              HKEX IPO 后，董事会和治理结构发生实质变化。Warburg Pincus、OrbiMed、B Capital Group、Lilly Asia Ventures、Eight Roads
              Ventures、Mirae Asset、Qiming Venture Partners、WuXi AppTec 和 Baidu Ventures 等投资者曾在董事会 / 投资者层面拥有代表和影响力。2025 年
              9 月，香港特区政府全资拥有的耐心资本机构 Hong Kong Investment Corporation (HKIC) 强调了其与 Insilico 的投资和战略合作关系。
