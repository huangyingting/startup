      - number: '6.3'
        title: 具名客户证明
        blocks:
          - type: paragraph
            body: >-
              Insilico 的具名客户证明以 Eli Lilly 合作（确认 $115M 首付款，名义总额 $2.75B）为锚，并由已披露的 Servier（$888M）、Qilu（$120M）和
              Hengrui（$66M，帕金森病）交易支撑。所有已确认交易都是生产级合作——带有财务承诺的完整 AI 驱动药物发现合作——而不是探索性试点或概念验证。证据质量差异很大：Eli Lilly 交易最扎实，由
              FierceBiotech、BusinessWire 和公司公告确认；Servier、Qilu、Hengrui 主要由一篇 FierceBiotech 报道交叉印证。Exelixis、Sanofi、Fosun
              Pharma 和 Menarini 由 pharmaphorum 与公司新闻材料点名，但没有披露财务条款。关键限制在于，没有任何药企伙伴发布可归因于 Insilico
              平台的独立结果数据——临床成功率、命中率提升或候选药物质量指标。临床试验 NCT05975983 提供了最客观的代理指标：一项 AI 设计药物的 Phase 2a
              试验正在招募，但试验结果仍未出炉。Chemistry42 底层的基于 GAN 的分子生成路线，面临关于相对训练数据化学多样性的公开学术批评，成熟药企评估方会重点审视。具名证明基础比多数 AI
              药物发现同行更有说服力，但仍受限于缺少已发布结果数据。
