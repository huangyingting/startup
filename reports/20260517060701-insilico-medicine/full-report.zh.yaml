      - number: '6.4'
        title: 留存与耐久性
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 药企合作的留存指标完全未披露。截至 May
              2026，公开可访问来源没有发布净留存率（NRR）、总留存率（GRR）、合同期限、续约率或客户满意度分数。对一个在排他性双边商业安排下运营的企业级 AI
              药物发现平台而言，这在结构上可以预期：这些指标属于专有信息，通常要等审计财务报表提交后才会披露。最有意义的留存代理是 Eli Lilly 的多阶段关系：不到三年里三次独立商业事件（2023
              初始授权、November 2025 $100M 交易、March 2026 $2.75B 合作），构成任何 AI
              药物发现公司可得的最强合同续约和逐步扩张证据。公开来源没有记录客户流失事件——终止、不续约或伙伴投诉。Pharma.AI 没有 G2、Capterra、Gartner Peer Insights
              或独立软件评价页面；鉴于其排他性企业 B2B 采购模式，这并不意外，但也限制了第三方满意度验证。根本尽调缺口，是无法取得经核验的 HKEX 年报和中报；这些文件会披露汇总平台授权收入，并确认当前活跃被授权方数量。
