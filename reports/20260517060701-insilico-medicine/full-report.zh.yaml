      - number: '7.4'
        title: 人才、执行与尽调红旗
        blocks:
          - type: paragraph
            body: >-
              Alex Zhavoronkov 的关键人集中，是最尖锐的人才风险。他同时担任 CEO 和 CSO，是 Insilico 的公众面孔，并推动了包括 Lilly
              合作在内的所有重大战略交易。公司未公开任命继任者或副手。Zhavoronkov 若离任——无论出于自愿、健康原因、监管行动还是治理争议——都会实质削弱 Insilico 的投资者关系、科学可信度和交易谈判能力。

              ML 团队留存是次级风险。Insilico 与 Google DeepMind、OpenAI 和药企 AI 部门争夺 AI/ML 人才。Hong Kong 市场对顶级 ML 研究人员的薪酬竞争力仍不确定。

              Phase 3 临床执行能力，是不同于科学平台的独立风险。多区域 Phase 3 所需的监管事务、数据管理和临床运营人员规模未公开确认；如果关键 CRO 关系被扰动，CRO 依赖会制造执行风险。

              优先尽调红旗：（1）确认 ISM001-055 Phase 3 临床暂停状态；（2）确认 Phase 3 终点统计把握度是否充分；（3）审阅 Lilly 终止条款；（4）俄罗斯 处置的 OFAC
              合规文件；（5）确认 Zhavoronkov 继任计划。
