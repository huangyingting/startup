      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine 经历多轮融资，最终成功在 HKEX IPO。到 2017 年中，公司已从 Deep Knowledge Ventures、JHU A-Level Capital、Jim
              Mellon、Juvenescence 等早期投资者筹集约 $8.26M。2019 年，公司完成 $37M Series B 轮，投资方包括 Fidelity Investments、Eight Roads
              Ventures、Qiming Venture Partners、WuXi AppTec、Baidu、Sinovation、Lilly Asia Ventures、Pavilion Capital、BOLD
              Capital 等。2021 年，Insilico 宣布完成 $255M Series C “巨额融资”，投资方包括 Warburg Pincus、Sequoia Capital、OrbiMed、Mirae
              Asset Financial Group 以及 25 多家科技、医疗和 AI 投资者；这在当时是全球最大的 AI 药物发现融资轮之一。2022 年，公司又完成 $60M Series D 轮。2024 年 4
              月，Insilico 完成 $95M Series E 轮，据报道投后估值约 $2.3B，投资者包括 B Capital Group、Lux Capital 等。IPO 前累计融资超过 $400M。2025
              年底，Insilico 在香港联交所完成 IPO（SEHK:3696），募资约 $293M，是当年香港规模最大的生物技术上市之一。作为本报告撰写时的 IPO 后上市公司，其市值反映公开交易估值。IPO
              使公司资本结构从私募、披露有限转为上市后完全公开；SEC 文件以 CIK 0001789097（Insilico Medicine Cayman TopCo）注册。俄罗斯入侵乌克兰后，公司还在 2022 年 10
              月处置了俄罗斯子公司。
