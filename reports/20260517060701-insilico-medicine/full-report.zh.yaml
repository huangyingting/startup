      - number: '7.3'
        title: 伙伴依赖与财务风险
        blocks:
          - type: paragraph
            body: >-
              Eli Lilly 合作（USD 2.75B 总潜在价值）是 Insilico 近期主要收入驱动。如此规模的伙伴集中是结构性风险：如果 Lilly
              便利终止交易，预期近期现金流入的大部分会被拿掉。具体的便利终止条款、最低付款保证和化合物权利保留安排没有公开披露，无法完整评估伙伴风险。

              财务可持续性风险很大。Insilico 在 2025 HKEX IPO 中募得 HKD 293M，并在 Series E 募得 USD 95M。典型 Phase 3 IPF 试验成本为 USD
              150-300M。若没有 Lilly 里程碑付款或未来融资，合计资本不足以资助 Phase 3。公开来源没有精确披露烧钱速度和现金跑道。

              汇率风险存在：USD 计价研发成本，对应 HKD/CNY 计价资本。HKD 联系汇率缓释 USD/HKD 风险，但基于可得披露，中国内地运营带来的 CNY 暴露未对冲。

              市场风险：IPO 后生物科技估值压缩，或投资者对 AI 药物发现信心下降，都可能限制未来融资渠道。HKEX Chapter 18A 生物科技上市条件要求季度现金充足性披露，并施加其他持续义务。
