      - number: '3.2'
        title: 竞争者画像与规模
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，Recursion Pharmaceuticals（NASDAQ: RXRX）是规模最大的公开交易 AI 药物发现公司；它在 2025 年 1 月以约 $688M 全股票交易收购
              Exscientia。Recursion 运营 Recursion OS 平台，基于超过 50 petabytes 的生物和化学数据，覆盖表型组学、转录组学、蛋白质组学、ADME
              和去标识化患者数据。其自动化湿实验室用机器人和计算机视觉每周处理数百万个细胞实验。临床管线包括 REC-4881（MEK1/2 抑制剂，用于 FAP，Phase 2，获孤儿药和 Fast Track 认定）以及
              REC-3565（MALT1 抑制剂，用于 B 细胞淋巴瘤，Phase 1，首例患者已给药）。Recursion 与 AstraZeneca 签署了超过 $100M 的交易，并与 NVIDIA 合作建设
              BioHive-2 超算基础设施。


              Schrödinger（NASDAQ: SDGR）是占主导地位的基于物理的计算化学平台，FEP+、WaterMap 和 LiveDesign 是核心产品；截至 2024 年，其软件 ARR 估计约
              $130–150M。估计 18 家或更多全球前 20 大制药公司使用其工具，带来深度分销和高切换成本。


              Exscientia 是一家位于 Oxford、使用 Alliptic 平台的 AI 原生药物设计公司，于 2024 年被 Sanofi 以约 $1.2–1.8B
              收购。这移除了一个独立竞争者，但也验证了制药收购方愿意为 AI 药物发现支付的商业价格。收购后，Exscientia 能力嵌入 Sanofi 研发体系。


              Isomorphic Labs（私营，伦敦，Alphabet 子公司）拥有 AlphaFold3 在药物发现领域的独家商业授权。公司累计融资约 $2.7B，其中包括 2026 年 5 月宣布的 $2.1B
              Series B，并与 Eli Lilly（$45M 首付款 + 最高 $1.7B 里程碑）、Novartis（$37.5M + 最高 $1.2B）和 Johnson & Johnson（2026 年 1
              月）建立合作，是资金最充足的私营竞争者。不过截至 2026 年 5 月，Isomorphic 尚未完成 Phase 1 临床试验。


              XtalPi 是一家中国 AI 药物发现公司，使用量子物理、AI 和先进机器人技术，投资方包括 Tencent、Sequoia Capital 和战略投资者 Eli Lilly。Numerion Labs
              运营面向免疫和炎症疾病的 ML 超级平台。BenevolentAI 在 2024 年 12 月启动重大业务战略调整，并于 2025 年 2 月提议从 Euronext Amsterdam 退市，显示财务困境。
