      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >-
              AI 药物发现平台的主要经济买方是全球前 20 大制药公司。决策由研发领导层（首席科学官、发现化学
              VP）和商务拓展高管控制，他们评估平台合作能否以更低成本、更快时间补充受专利悬崖冲击的管线。技术倡导者通常是制药研发体系内的药物化学家、计算生物学家或数据科学负责人，他们负责评估并推动平台采用。财务委员会和
              CFO 是正式付款方和审批方，会要求证明 AI 发现能够降低临床前淘汰率和开发成本，从而支撑 ROI。

              Eli Lilly–Insilico Medicine 交易（2026 年 3 月，总潜在价值 $2.75 billion）确认，头部制药公司愿意为 AI
              发现的肿瘤临床候选物支付高度依赖里程碑的交易结构。AstraZeneca 2023 年与 Recursion Pharmaceuticals 的 $100 million
              交易进一步提供了市场验证。两笔交易都说明，制药平台授权模式已获得商业验证。

              次级买方包括中型生物制药公司（收入 $500M–$5B）、罕见病和孤儿药专家（绝对预算更小，但单患者支付意愿更高）、生物技术初创公司和学术分拆公司（寻求发现概念验证数据），以及政府或国家级研究机构（AI
              赋能的国家药物发现任务）。仿制药和生物类似药厂商是第三级细分市场，它们追求的是制剂优化效率，而不是新药设计。不同细分市场的采用触发点差异很大：头部制药看专利悬崖压力；罕见病专家看 FDA
              孤儿药资格和突破性疗法认定；初创公司看 Pre-Series A 概念验证融资要求。
