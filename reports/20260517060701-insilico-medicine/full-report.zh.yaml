      - number: '3.3'
        title: 能力、定价与 GTM 对比
        blocks:
          - type: paragraph
            body: >
              整个竞争版图中，AI 药物发现公司在平台能力、收入模型和 GTM 分销上差异很大。Insilico 的端到端一体化平台（Biology42 负责靶点识别，Chemistry42
              负责生成式分子设计，Medicine42/inClinico 负责临床试验分析）覆盖完整药物开发连续体，是所有 AI 药物发现平台中功能范围最宽的一类。竞争者通常专注一两个阶段：Recursion
              通过表型组学领先靶点识别；Schrödinger 通过基于物理的自由能计算领先先导优化；Isomorphic Labs 领先结构生物学预测；XtalPi 领先晶型和固态化学预测。


              在定价和包装上，AI 药物发现平台主要有三种模式。Schrödinger 采用软件授权 ARR 模式，截至 2024 年产生约 $130–150M 软件
              ARR，是唯一拥有有意义独立产品收入、且不依赖里程碑付款的玩家。Insilico 和 Recursion 主要采用合作里程碑模式：大额首付款、靶点提名费，以及由里程碑触发的开发付款。Insilico 的 Eli
              Lilly 交易（$115M 首付款 + 最高 $2.635B 里程碑）代表行业交易条款的高端。Isomorphic 的 Lilly 交易（$45M 首付款 + $1.7B 里程碑）和 Novartis
              交易（$37.5M + $1.2B）构成定价可比项，也显示 Insilico 首付款有 2.6x 溢价，主要来自 Phase 2 临床验证。


              在 GTM 分销上，Schrödinger 的制药渗透最深，直接销售覆盖全球前 20 大制药公司中的 18 家或更多。Insilico 宣布已与按 2021 年收入计算的全球前 20 大制药公司中的 10
              家合作。Recursion 与 AstraZeneca 和 NVIDIA 的伙伴关系同时提供技术与商业验证。Isomorphic 受益于 Alphabet 的可信度，但除直接制药交易外，缺少自有商业分销网络。


              客户锁定效应方面，Schrödinger 最强，来自工具级工作流集成；Insilico 居中，来自平台集成和专有靶点数据；缺少临床验证的早期纯 AI 平台则较弱。制药客户普遍多供应商并行，通常同时接触 2–4
              家计算或 AI 药物设计供应商。Insilico 的 Phase 2 临床证明强化了竞争优势，这是纯软件竞争者短期内无法复制的。
