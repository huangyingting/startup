  - id: FR003
    title: 伙伴与财务风险依赖图
    type: dag
    order: 3
    insight: Lilly 交易终止和里程碑未达是上游风险，会传导到 Phase 3 资本充足性，最终影响财务可持续性。烧钱速度风险关口独立运作，并与资本市场准入风险一起指向财务可持续性节点。
    claimRefs:
      - CR005
      - CR006
      - CR010
      - CR011
      - CR025
    sourceRefs:
      - SR021
      - SR023
      - SR024
      - SR026
      - SR027
    notes: >-
      DAG 展示 Insilico Medicine 财务状况对 Lilly 合作、IPO 募资和里程碑驱动收入的依赖结构。风险关口展示财务可持续性的失败模式。CR025 覆盖 HKEX Chapter 18A 义务，TR004
      未覆盖。
