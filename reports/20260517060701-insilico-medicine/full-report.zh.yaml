    rows:
      - - 投资逻辑
        - ISM001-055 是首个完成 2 期且达到主要终点的 AI 设计药物——在所有 AI 药物发现同业中，临床验证独一份
        - 3 期主要疗效终点未达标，或中期分析因无效停止
      - - 投资逻辑
        - Eli Lilly $2.75B 合作（$115M 首付款，2026 年 3 月）按公告总额和首付款计算，是最大 AI 药物发现交易
        - Lilly 行使终止权，或大幅缩小交易范围
      - - 投资逻辑
        - Pharma.AI 端到端平台（Biology42、Chemistry42、Medicine42）已确认拿下 10+ 家全球前 20 大药企客户，覆盖 40+ 个项目、13 个 IND
        - 12 个月内流失超过 3 个主要药企客户；管线失败率显著高于行业平均
      - - 反向逻辑
        - ISM001-055 在 IPF 的 3 期历史淘汰概率 >50%；此前 AI 药物的 2 期信号并不总能转化为 3 期获批
        - 中期或最终分析达到 3 期主要终点
      - - 反向逻辑
        - Eli Lilly 交易可能贡献近期确认合作收入的 >80%；若 Lilly 终止，近期收入大多会消失
        - 3+ 家药企合作伙伴贡献多元化多笔收入，并披露金额
      - - 反向逻辑
        - 无法获取 HKEX 财务报表；截至 2026 年 5 月，未确认经审计利润表、现金余额或烧钱速度
        - HKEX 年报可访问，并确认现金跑道充足、收入质量可靠
      - - 反向逻辑
        - BenevolentAI（LON:BAI）和 Exscientia 均大幅下调估值；AI 药物发现板块对无收入公司存在系统性重估风险
        - AI 设计药物持续出现全行业 3 期成功，推动持久估值倍数扩张
