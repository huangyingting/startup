  - id: TP004
    title: 护城河耐久性 / 竞争风险登记表
    columns:
      - 护城河主张
      - 威胁
      - 严重度
      - 缓释措施 / 尽调问题
    rows:
      - - 首个完成 2 期临床的 AI 药物（ISM001-055 TNIK 抑制剂，IPF）
        - 如果 3 期临床失败，Insilico 将失去这个主要竞争差异点，并损害所有活跃药企合作中的平台可信度
        - 高
        - 向 Insilico 管理层核验 2 期疗效数据、盲法状态和生物标志物结果；索取 3 期设计方案和 CRO 选择状态
      - - 端到端一体化 AI 平台（Biology42+Chemistry42+Medicine42）
        - Recursion 完成 Exscientia 并购后正在搭建可比的全栈整合；开源工具也让资源充足的药企能拼出 best-of-breed 组合
        - 中
        - 将整合深度与 Recursion 合并后实体对标；量化 Insilico 工作流整合相较模块化替代方案是否缩短 time-to-IND
      - - Eli Lilly 交易头条金额 $2.75B —— AI 药物发现领域最大交易
        - 交易取决于里程碑；$115M 首付款是唯一保证支付；未来里程碑取决于项目推进和 Lilly 内部研发优先级
        - 中
        - 建模现金消耗与里程碑付款时间线；核验 $115M 首付款能否覆盖 18–24 个月运营成本；评估里程碑触发结构
      - - 40+ 个管线项目，13 项 IND 批准
        - 历史药物开发失败率超过 90%；管线宽度不保证成功；若多个项目同时遭遇监管或临床失败，冲击会很严重
        - 中
        - 评估项目在临床阶段的分布；核验 13 项 IND 是否全部仍活跃且未被放弃；索取项目级投资分配
      - - HKEX 公开上市资金（IPO 约 $293M）
        - HKEX 生物科技板块相较 NASDAQ 有流动性约束；美元计价成本与港元计价资本之间存在汇率风险；地缘政治风险（中国-香港）
        - 低
        - 审查 IPO 后锁定期到期安排；评估机构与散户投资者结构；跟踪美国交易所 ADS 计划进展
      - - Biology42 自研靶点识别 —— 泛组学衰老生物学路径
        - 开源生物数据库（UniProt、ChEMBL、OpenTargets）降低了 in-silico 靶点识别成本；Isomorphic 的 AlphaFold3 在基于结构的靶点发现上有优势
        - 中
        - 索取 Biology42 靶点识别输出相对开源替代方案在已验证历史数据集上的内部基准；评估新靶点提名率
      - - Chemistry42 生成式化学（基于 REINVENT，DDR1 Nature Biotechnology 2019）
        - 开源 REINVENT 工具已被药企和学界广泛采用；竞争者可以用自有数据集重新训练生成式模型；商品化风险真实存在
        - 中
        - 核验 Chemistry42 除已发表的 REINVENT 外，是否还有自研架构或数据组件；评估模型重训壁垒和 IP 防御性
      - - ISM001-055（IPF）的 3 期临床路径
        - 截至 2026 年 5 月，3 期时间线、患者入组策略和终点设计尚未公开确认；监管批准仍需多年推进
        - 高
        - 索取 3 期方案；CRO 选择；预计入组时间线；FDA pre-NDA 或 EMA 预提交沟通记录；2 期疗效数据包
      - - 药企合作记录（截至 2021 年覆盖 10 家 top-20 药企）
        - 药企多平台合作很常见；没有排他性保证；单一药企可以同时与 Insilico、Recursion 或 Isomorphic 合作而不违约
        - 低
        - 梳理当前活跃合作与历史合作；评估 Eli Lilly 交易的排他范围；核验 WuXi AppTec 投资者关系是否与其竞争性 CRO 业务产生冲突
      - - AI-only 设计药物尚无 FDA 批准（行业共同风险）
        - 如果首个 FDA 批准落在 Recursion 合作药物或 Schrödinger 合作资产，而不是 Insilico，Insilico 的“first-mover 临床验证”主张会明显变弱
        - 中
        - 跟踪 Recursion REC-4881 FAP 2 期和 Schrödinger 管线结果；跟踪监管机构对 AI 设计药物批准标准的表述；评估 Insilico 的 ISM001-055 3 期监管策略
    notes: 风险严重度基于截至 2026 年 5 月的公开信息定性判断（高 / 中 / 低）。尽调问题是建议核查方向，不代表已确认的数据缺口。
