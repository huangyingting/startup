      - number: '5.2'
        title: 模块与资产图谱：Pharma.AI 模块和药物管线
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 同时运营平台授权业务和全资内部药物管线，两者深度耦合：内部管线是 Pharma.AI 模块的主要概念验证，也产出支撑平台商业可信度的临床验证数据。

              Biology42 的 PandaOmics 模块用于靶点识别和验证。它摄入基因-疾病关联数据、表达谱和蛋白互作网络，为靶点的生物学新颖性和可成药性打分。PandaOmics 将 TNIK（TRAF2 and
              NCK-interacting kinase）识别为特发性肺纤维化（IPF）的纤维化驱动因子；随后 Chemistry42 将该靶点成药化，产出 ISM001-055。Chemistry42 使用超过 50
              种生成式算法设计 de novo 小分子；ISM001-055 的设计约用 46 天，而传统药物化学流程通常需要两到三年。Medicine42/inClinico 将预测模型用于试验设计；一篇公司相关的
              Nature Biomedical Engineering 论文（2022）报告称 Phase 2 成功预测准确率提升 79%，但独立复现仍待完成。

              截至 May 2026，内部药物管线覆盖 40 多个项目，已有 13 项 IND 批准。关键临床资产包括：ISM001-055（TNIK 抑制剂，IPF，Phase 2 完成——全球首个完成 Phase 2 的
              AI 生成式设计药物）、ISM3091（USP1 抑制剂，实体瘤肿瘤学，Phase 1/2）、ISM8207（KRASG12D 抑制剂，胰腺癌和肺癌，Phase 1）、ISM6331（TEAD 抑制剂，间皮瘤和
              NF2，Phase 1）以及 ISM5411（PHD1/2/3 抑制剂，溃疡性结肠炎，Phase 2）。March 2026，Eli Lilly 达成一项 $2.75 billion 合作，覆盖 AI
              设计资产授权，并支付 $115 million 首付款。
