      - number: '8.5'
        title: 可比估值组
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的可比公司集受限于已完成 Phase 2 试验的 AI 药物发现公司数量有限。不存在完美可比。Recursion
              Pharmaceuticals（RXRX，NASDAQ）按商业模式最接近公开市场可比：纯 AI 药物发现、上市公司、风险资本支持。RXRX 在 2025–2026 的市值约 $1.2B，但 Recursion
              尚未让任何 AI 设计药物完成 Phase 2，因此 Insilico 理应相对 RXRX 享有可观临床阶段溢价。

              Schrödinger（SDGR，NASDAQ）提供基于物理的模拟平台，估计 ARR 为 $130–150M，市值约 $2.3B，隐含约 16x ARR。Schrödinger 并非主要的生成式 AI
              药物发现公司，其更高的 ARR 可见度也降低了估值建模可比性。

              Exscientia/Sanofi 收购（2024 年约 $1.5B，发生在 Phase 2 完成前）建立了 M&A 底线先例：一家没有 Phase 2 临床数据的公司仍以超过 $1B 被收购，支撑
              Insilico 已由 Phase 2 验证的管线应获得更高溢价这一论点。

              Isomorphic Labs（私有公司，Alphabet 支持）在 2026 的 Series B 获得 $2.1B，并与 Lilly 签署价值 $1.745B、首付款 $45M 的合作——与 Insilico
              的 $2.75B / $115M 交易直接可比。Insilico 交易名义额高出 57%，首付款高出 156%，反映其临床阶段溢价。

              BenevolentAI（LON:BAI）展示下行风险：公司曾在 SPAC 上市时估值超过 $1.5B，随后重组，市值跌至 $200M 以下，说明没有 Phase 2 临床证明时，AI 药物发现估值可能崩塌。
