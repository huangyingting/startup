            body: >-
              Insilico Medicine 面临实质性单一客户集中风险。Eli Lilly 是已披露最大合作伙伴（名义 $2.75B，确认首付款 $115M），主导近期收入和现金画像。如果 $115M 首付款是
              2025-2026 客户活动中的主要现金事件，单一客户就贡献了近期现金流入的 50% 以上——这类风险画像在早期 AI 生物科技中常见，但从投资尽调角度看仍然重要。已披露前三大交易名义价值（Lilly
              $2.75B + Servier $888M + Qilu $120M）合计约 $3.7 billion，远高于未披露的伙伴交易。里程碑挂钩结构意味着 Eli Lilly 交易后置部分按风险调整后的价值，明显低于
              $2.75B 名义数，因为每笔里程碑付款都要求成功的临床或监管事件。Lilly 多阶段关系同时展现了正向集中动态：单一锚定客户连续贡献三笔规模递增的交易，产生 $115M
              已确认现金，说明锚定客户扩张是主要增长杠杆。缓释集中风险的路径，是用中型欧洲和中国药企拓宽伙伴名单；Hengrui、Fosun 和 Menarini 显示这些板块已有早期牵引。
