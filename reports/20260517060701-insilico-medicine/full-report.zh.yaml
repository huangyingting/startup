  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: Pharma.AI 平台：产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的商业产品是 Pharma.AI 平台：一个云端交付的 SaaS 系统，把三个 AI 驱动模块整合进同一条工作流——Biology42（纳入
              PandaOmics，用于靶点识别）、Chemistry42（用于生成式分子设计）和 Medicine42（纳入
              inClinico，用于临床试验分析）。这条工作流覆盖从疾病生物学到优化候选药物设计、再到试验策略的完整药物发现生命周期。

              站在药企研发团队视角，Pharma.AI 取代或增强了三类原本彼此割裂、依赖人工或计算流程拼接的工作。在靶点识别阶段，PandaOmics
              将多组学数据（基因组学、蛋白质组学、转录组学）、基因-疾病关联数据库和网络生物学模型一起处理，为候选靶点的可成药性和生物学新颖性打分，替代人工文献综述和基因面板筛选。在先导化合物发现与优化阶段，Chemistry42
              接收已选靶点（或命中系列）作为输入，使用超过 50 种生成式算法生成 de novo 小分子候选物——包括生成对抗网络（GANs）、变分自编码器（VAEs）、基于 transformer
              的分子语言模型和强化学习——输出按预测 ADMET（吸收、分布、代谢、排泄、毒性）特征排序的候选分子。在临床开发策略阶段，Medicine42/inClinico 用预测模型识别最佳患者分层、选择终点，并预测
              Phase 2/3 成功概率，从而减轻专家判断负担，并为试验设计提供数据支撑的理由。

              平台以多租户 SaaS 形态交付，通过协商后的企业授权协议销售。截至 May 2026，Insilico 已与按 2021 收入计全球前二十大药企中的至少十家签署平台合作，包括 March 2026 与 Eli
              Lilly 的合作；该合作最高价值 $2.75 billion（$115 million 首付款），同时覆盖平台授权和 AI 设计候选药物授权。
