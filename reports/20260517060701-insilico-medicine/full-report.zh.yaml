  - id: TV004
    title: 可比估值表
    enumerationScope:
      coverage: partial
      basis: >-
        Comparables limited to publicly traded AI drug discovery companies (RXRX, SDGR), recent M&A precedents
        (Exscientia/Sanofi), and private peers with disclosed deal context (Isomorphic Labs, BenevolentAI); excludes
        non-AI-first pharma and companies with no publicly accessible valuation data
