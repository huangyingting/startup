chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、总部与商业模式
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine (HKEX:3696) 是一家临床阶段 AI 生物技术公司，用生成式人工智能、深度学习和强化学习加速药物发现全流程：从靶点识别、分子生成到临床试验分析。公司的注册法律实体为
              "Insilico Medicine Cayman TopCo"，美国前身实体为 "Insilico Medicine, Inc."（马里兰）。公司最初总部在马里兰州巴尔的摩，之后迁至香港，并于 2024
              年中把公司总部迁至马萨诸塞州 Cambridge/Boston，同时在香港、上海、苏州、宜兴、台北、蒙特利尔、纽约和阿布扎比保留主要研发与运营办公室。截至 2024 年 9 月，Insilico 全球员工约
              350 人。公司核心商业模式把自有专有药物管线（全资和合作资产）与 AI 平台授权、合作模式结合起来，大型制药公司向 Insilico 付费使用 Pharma.AI 平台；该平台包括用于靶点识别的
              Biology42、用于生成式分子设计的 Chemistry42，以及用于临床试验分析的
              Medicine42/inClinico。收入来源包括授权首付款、药物开发推进后的里程碑付款，以及商业化产品的潜在版税。2026 年 3 月，公司与 Eli Lilly 达成标志性 $2.75B 合作，其中包括
              $115M 首付款，为这一模式的商业可行性提供了强验证。
