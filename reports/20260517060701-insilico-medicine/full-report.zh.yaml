      - number: '2.2'
        title: 市场规模与分析师估算
        blocks:
          - type: paragraph
            body: >-
              已发布的 AI 药物发现市场估算因口径不同差异很大：2024 年从约 $1.5 billion（窄口径：仅纯 AI 生成式设计平台）到 $4.5 billion（较宽口径：AI 赋能的计算药物发现工具）不等，预计
              CAGR 在 25% 到 40% 之间。更广义的药物发现信息学包括化学信息学、ML 工具和信息学平台；MarketsandMarkets 估计其 2025 年规模为 $3.5 billion，CAGR 为
              9.3%。最宽边界的生命科学分析市场估计 2024 年为 $35.69 billion，到 2030 年增至 $68.81 billion，CAGR 为 11.4%；相对 Insilico
              的直接产品覆盖范围，这一口径明显过宽。

              估算彼此冲突很普遍，应谨慎对待。Evaluate Pharma 和行业分析师摘要把 AI 药物发现市场规模放在约 $4.5 billion、CAGR 25–35%，更保守的估算则使用更窄口径。IPF 药物市场可用
              Boehringer Ingelheim 的 Ofev 年收入约 $2.4 billion（2022–2023）做代理变量，不过完整 IPF 药品市场略大。全球制药研发每年约 ~$240–250
              billion，是 AI 平台工具争取计算和外包研发预算份额的外层 TAM 边界。所有分析师估算都来自付费一级报告或行业摘要；方法差异——尤其是是否纳入纯 AI
              生成式工具、更广义化学信息学，或全部数字健康分析——解释了分析师估算之间 3–10× 差距的大部分，也构成重大尽调缺口。

              到 2026 年，Insilico 的可获取市场主要受限于与头部制药公司的平台授权交易、Eli Lilly 交易等合作项目的里程碑付款（2026 年 3 月，总潜在价值 $2.75
              billion），以及自有药物获批后未来可能产生的版税流。截至 2026 年，尚无主要由 AI 设计的药物获得 FDA 完整批准，这限制了制药公司在交易金额区间最高端的支付意愿，也使 SOM
              规模测算保留不确定性。
