        - 较 2022 年 SPAC 峰值（~$1.5B）大幅折价
        - 下行情景说明：AI 药物发现公司较峰值估值下调 >85%；2 期项目重叠（IPF）
        - 已重组公司；英国 SPAC 上市，市场不同；IPF 项目不是同一分子或机制
