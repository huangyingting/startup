        - id: lilly-milestones
          label: Lilly 里程碑付款已触发
        - id: ipo-proceeds
          label: HKEX IPO 募资 HKD 293M
        - id: series-e
          label: Series E 资本 USD 95M
        - id: p3-capital
          label: Phase 3 试验资金充足
        - id: fin-sustainability
          label: 2026-2028 年财务可持续性
        - id: risk-lilly-term
          label: 风险关口：Lilly 终止
        - id: risk-milestone-miss
          label: 风险关口：里程碑未触发
        - id: risk-burn
          label: 风险关口：烧钱速度超过现金跑道
        - id: risk-mkt
          label: 风险关口：HKEX 资本市场准入
        - id: future-raise
          label: 需要未来融资
      edges:
