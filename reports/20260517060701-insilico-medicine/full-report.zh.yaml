      - number: '5.5'
        title: 差异化：IP、数据、论文与监管里程碑
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的差异化建立在四根相互强化的支柱上：（1）受 20+ 项专利保护的自研多算法生成式化学引擎；（2）一个系统内垂直整合靶点识别、分子生成和临床分析，单模块 AI
              药物发现厂商无法匹配这种组合；（3）80+ 篇同行评审论文构成科学可信度护城河；（4）ISM001-055 作为全球首个完成 Phase 2 的 AI
              生成式药物，带来临床概念验证，也提供早期竞争对手没有的差异化证据。

              IP 组合包括 20 多项专利，覆盖生成式化学方法、药物设计流程和 PandaOmics 靶点识别。论文记录包括共同署名 MOSES，即分子生成模型的社区标准基准平台（arXiv:1811.12823）。2025
              年，Nature 将 Insilico 评为生物科学研究 50 家顶尖企业机构之一。GENTRL 开源仓库（github.com/insilicomedicine）拥有 638
              颗星，是生成式化学社区广泛引用的参考实现。

              March 2026 与 Eli Lilly 的合作名义价值 $2.75 billion（$115 million 首付款），是迄今 AI 生成式药物发现平台最重要的商业验证。Fierce Biotech 报道
              Lilly 正通过 Insilico 的 AI 引擎推进口服疗法。这笔交易验证的不只是理论潜力，也证明顶级全球药企愿意为 AI 设计候选药物支付可观首付款。ISM001-055 完成 Phase
              2，形成一个可复现锚点；尚未把 AI 设计药物推进到 Phase 2 的竞争对手无法匹配。主要护城河耐久性风险，在于开源模型、GPU 成本下降，以及 Recursion、Schrödinger
              等竞争平台可能让生成式化学平台商品化。
