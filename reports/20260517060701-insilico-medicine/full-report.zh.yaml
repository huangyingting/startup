      - number: '1.4'
        title: 全球运营与规模
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，Insilico Medicine 在全球运营，公司总部位于美国马萨诸塞州
              Cambridge。主要办公室和研发设施位于：香港（白石角香港科学园，原总部）；上海（浦东新区长泰广场）；苏州（生物医药产业园）；宜兴（陶都路）；台北（信义区基隆路）；加拿大蒙特利尔（René-Lévesque
              Ouest，2022 年 6 月启用）；纽约（Park Avenue South，位于 The Cure by Deerfield）；以及阿联酋阿布扎比（Masdar City 的 IRENA HQ
              Building，2023 年 2 月开设，作为中东区域总部，并被描述为该地区最大的 AI 驱动生物技术研究中心）。俄罗斯子公司 Insilico LLC 位于 Skolkovo Innovation
              Center；俄罗斯入侵乌克兰后，公司于 2022 年 10 月完全处置该子公司。该子公司曾是 Skolkovo Foundation 最大的拨款接受方之一。公司称，截至 2024 年 9 月，全球员工约 350
              人。管线覆盖 40 多个项目，拥有 13 项 IND 批准；自 2021 年以来提名 30 个临床前候选物，仅 2022 年就提名 9 个。按 2021 年收入计算，公司已与全球前 20 大制药公司中的 10
              家合作。2021 年，公司宣布与 Syngenta 合作开发 AI 设计除草剂，显示平台在人体药物之外也可应用。2025 年 11 月，Nature 期刊将 Insilico 评为 2025 年生物科学研究 50
              家领先企业机构之一。
