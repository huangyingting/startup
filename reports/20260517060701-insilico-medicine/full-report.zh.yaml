  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的投资逻辑建立在三根相互强化的支柱上：（1）清晰的临床证明——ISM001-055 是首个完成 Phase 2、且达到具有统计显著性的主要终点的 AI 设计小分子，把
              Insilico 与仍处于临床前或 Phase 1 的所有 AI 药物发现同行区分开；（2）空前规模的商业验证——March 2026 Eli Lilly 合作（$115M 首付款，名义
              $2.75B）是迄今按名义价值计最大 AI 药物发现交易，超过 Isomorphic Labs 与 Lilly 的竞争性交易（$1.745B）；（3）平台广度——Pharma.AI
              技术栈（Biology42、Chemistry42、Medicine42）覆盖靶点识别到临床分析，已确认 10+ 家全球前 20 大药企客户，40+ 个发现项目和 13 项 IND 代表同类最佳的管线深度。

              反向逻辑同样扎实。第一，ISM001-055 在 IPF 中的 Phase 3 是高风险二元事件：纤维化 Phase 3 项目历史上失败率超过一半，既往 AI 药物发现 Phase 2
              信号也并不总能转化。第二，收入高度集中：Eli Lilly 交易可能贡献近期已确认合作收入的 80% 以上，Lilly 终止将重创公司近期财务状况。第三，BenevolentAI 和 Exscientia
              等行业同行均从估值高点大幅降级，说明 AI 药物发现行业并不免疫重估风险。第四，MIT Technology Review 将 AI 药物发现描述为「hype」行业，认为主张超过已验证产出；这一风险也延伸到
              Insilico 的平台产能主张。最后，基于 GAN 的分子生成模型在部分靶点类别的化学多样性上存在已记录限制。
