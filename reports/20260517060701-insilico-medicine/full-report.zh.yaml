      - number: '5.6'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的信任与合规姿态覆盖三块：临床药物开发的监管合规、SaaS 平台的数据隐私与安全，以及 AI 模型输出的质量管理。

              临床开发方面，公司在 GxP 合规框架下运营（临床前工作适用 GLP，临床试验适用 GCP），这是 FDA IND 要求和 ICH 指南规定的。截至 2024 年，公司已向 FDA 提交 13 项
              IND，Phase 1 和 Phase 2 试验均在注册的 ClinicalTrials.gov 方案下开展（ISM001-055 对应 NCT05938920 和 NCT05975983）。EMA
              的科学建议框架约束面向 EU 的欧洲市场候选药监管策略。公开来源没有第三方 GxP 审计报告或 Form 483 观察记录；研究阶段公司无需披露这些文件。Insilico 曾参与 FDA 关于 AI/ML
              药物开发工具的 Voluntary Framework 讨论，显示其与监管方有互动；但该框架是自愿性质，并不认证 Pharma.AI 平台。

              Pharma.AI SaaS 平台的关键信任缺口包括：（1）未找到公开 SOC 2 Type II 鉴证，而这是受监管药企 SaaS 供应商的标准要求；（2）公开来源未确认 ISO 27001
              认证；（3）处理去标识化或匿名化临床试验患者数据时的 HIPAA 合规姿态未公开记录；（4）EU 和 Hong Kong 数据运营的 GDPR
              合规被假定存在，但未经外部审计。这些缺口对受监管药企买家具有实质意义，商业尽调时需要直接向供应商索取披露。
