              Lilly $115M 首付款（2026 年 3 月）。仅 IPO 与 Lilly 首付款合计，毛现金流入就约 $408M。扣除 IPO 前运营成本和持续临床支出后，IPO 后现金头寸估计为
              $280–420M，但精确数字需要查阅 HKEX 招股书和年报。完整逐轮融资时间线见公司概况章节；本节聚焦未来资本充足性。

              按估计年烧钱速度 $70–150M（反映约 350 名员工和多项目临床试验组合）计算，公司从 IPO 日期起估计现金跑道约两年（高烧钱情景）到四年（低烧钱情景）。2026 年 3 月已确认的 $115M Eli
              Lilly 首付款实质延长了现金跑道。公开资料未披露债务融资、可转债或项目融资义务。主要下一轮触发因素将是 ISM001-055 Phase 3 试验的启动和资金需求；Phase 3 所需资本开支显著高于
              Phase 2。作为 HKEX 上市公司，Insilico
              现在需要根据香港上市规则提交半年度和年度财务报告；获取后将能验证现金头寸、烧钱速度和募集资金用途数据。[CI001][CI003][CI004][CI005][CI006][CI007][CI008][CI013][CI014][CI030][CI034][CI035]
