  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: standard
    summary: 从临床规模、平台验证、风险因素和估值锚出发，推导观察 / 跟踪建议及所需催化剂的决策链。
    claimRefs:
      - CV031
      - CV032
    data:
      nodes:
        - id: clinical_proof
          label: 临床规模验证
          detail: ISM001-055 Phase 2 已完成；达到主要终点；同业中唯一推进到该阶段的 AI 设计药物
        - id: platform_proof
          label: 平台验证
          detail: 10+ 家全球前 20 大药企客户；40+ 个项目；13 个 IND；Eli Lilly $2.75B 交易验证商业牵引力
        - id: risk_factors
          label: 风险评估
          detail: Phase 3 成败二元（淘汰率 >50%）；Lilly 收入集中度 >80%；HKEX 财务不透明；板块重估风险
        - id: valuation_anchor
          label: 估值锚
          detail: 基准情景 $2.5–3.5B；乐观情景 $5–8B，取决于 Phase 3；失败时悲观情景 ~$1.2B
        - id: recommendation
          label: 高度关注 / 跟踪
          detail: 证据足以支撑持续关注，但买入信心不足；只有 Phase 3 启动且 HKEX 财务披露到位后，才可上调建议
        - id: catalysts
          label: 必要催化剂
          detail: Phase 3 IND 申报；可获取 HKEX 年报；Lilly 里程碑确认；板块 Phase 3 数据
      edges:
        - from: clinical_proof
          to: recommendation
          label: 支撑
        - from: platform_proof
          to: recommendation
          label: 支撑
        - from: risk_factors
          to: recommendation
          label: 约束
        - from: valuation_anchor
          to: recommendation
          label: 锚定
        - from: recommendation
          to: catalysts
          label: 取决于
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: Insilico Medicine 估计企业价值（USD billion）对关键驱动因素的敏感性；正向条形增加价值，负向条形相对基准情景中点扣减价值。
    approximationNotes: 所有数值均为相对基准情景中点（~$2.8B）的估计敏感性增减。未取得可用于 DCF 输入的经确认 HKEX 财务数据。区间来自可比交易和板块倍数分析。
    claimRefs:
      - CV019
      - CV020
    data:
      items:
        - label: Phase 3 成功溢价
          value: 3.5
        - label: Lilly 里程碑全额兑现
          value: 1.75
        - label: M&A 收购溢价
          value: 1.25
        - label: 新平台交易（每年 2+ 笔）
          value: 0.75
        - label: 板块倍数压缩（下行）
          value: -0.75
        - label: HKEX 财务不透明折价
          value: -0.4
        - label: Phase 3 失败（悲观情景）
          value: -1.6
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 基于情景假设和可比基准，列示悲观、基准、乐观情景下从低到高的估值区间（USD billion）。
    approximationNotes: 区间由模型给出，使用可比公司倍数、M&A 先例和交易价值基准。未使用经确认的 HKEX 财务数据。这些区间是有依据的估计，而非精确 DCF 输出。
    claimRefs:
      - CV018
      - CV019
      - CV020
    data:
      items:
        - label: 悲观情景
          low: 0.8
          mid: 1.2
          high: 1.5
          unit: USD billion
        - label: 基准情景
          low: 2
          mid: 2.8
          high: 3.5
          unit: USD billion
        - label: 乐观情景
          low: 4
          mid: 5.5
          high: 8
          unit: USD billion
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: 可直接提交 IC 的六维评分：市场验证、平台护城河、经济性、风险、估值和证据质量。
    claimRefs:
      - CV032
      - CV033
    data:
      items:
        - label: 临床市场验证
          value: High — Phase 2 completed; Lilly deal confirmed
          score: 8
        - label: 平台护城河
          value: High — end-to-end AI stack; 10+ top-20 pharma
          score: 7
        - label: 经济性可见度
          value: Low — HKEX financials not accessible
          score: 2
        - label: 风险水平
          value: High — Phase 3 binary; Lilly concentration
          score: 2
        - label: 估值信心
          value: Low — model-based estimates only
          score: 3
        - label: 证据质量
          value: Constrained — HKEX blocked; milestones undisclosed
          score: 3
