      - number: '5.3'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的技术架构分为三层：自研多模态数据层、生成式和预测式 AI 模型集合层，以及云端交付的 SaaS 平台层。

              数据层由自研多模态数据集构成，覆盖基因组学、蛋白质组学、转录组学以及庞大的化合物空间；这些数据来自内部数据整理、学术合作和药企合作中的数据共享。Insilico 研究人员共同署名了 Molecular
              Sets（MOSES）基准平台——由 Polykovskiy、Zhebrak 等人与 Alan Aspuru-Guzik 一同在 arXiv
              发表——该平台标准化分子生成模型的训练和比较，并成为该领域社区基准。Chemistry42 的 AI 模型层跨范式使用超过 50 种生成式算法：GANs、VAEs、基于 transformer
              的分子语言模型，以及针对靶点结合亲和力、合成可及性和 ADMET 属性优化的强化学习模型。Insilico 在 GitHub（github.com/insilicomedicine）开源了 GENTRL
              模型（Generative Tensorial Reinforcement Learning），已积累超过 630 颗星；insilicomedicine GitHub 组织托管了 40+ 个仓库，包括
              Jupyter notebook ML 模型、TypeScript 工具（DORA research assistant，42 颗星）和化学信息学工具。

              外部研究人员指出的关键技术限制，是基于 GAN 的分子生成模型容易复现接近训练数据分布的分子，却无法取得足够化学多样性。ChemGAN challenge
              论文（Benhenda，2017，arXiv:1708.08227）展示了这种失败模式：「一个非平凡的 AI 模型能否为目标分子复现自然化学多样性？两者在这一挑战中都失败了。」Insilico
              的多算法路线——使用 50+ 个模型而非单一生成器——旨在缓释这一风险，但 Chemistry42 相对竞争对手在化学多样性上的详细外部基准并未公开。

              平台部署在 AWS，采用多租户 SaaS 架构。Pharma.AI 平台没有公开状态页、正常运行时间 SLA 或灾难恢复规格。
