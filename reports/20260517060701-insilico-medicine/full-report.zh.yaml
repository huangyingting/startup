  - id: TP003
    title: 定价 / 打包对比
    columns:
      - 价格 / 单位 / 合同模式
      - 包含能力
      - 折扣 / 未知项
      - 对 Insilico 的影响
    rows:
      - - Insilico：里程碑合作（Eli Lilly 总额 $2.75B，首付款 $115M，2026 年 3 月）
        - 全平台访问（Biology42+Chemistry42+Medicine42）、靶点提名、分子设计、临床分析；按项目推进支付里程碑
        - 总价值取决于里程碑；特许权使用费未披露；交易不包含股权
        - 为 AI 药物发现交易定价树立高端基准；$115M 首付款是 Isomorphic-Lilly 交易（$45M）的 2.6x
      - - Insilico：平台授权（独立 Pharma.AI）
        - Biology42、Chemistry42、Medicine42 模块可单独或组合使用；授权给药企 R&D 团队
        - 价格未公开披露；按可比交易估计，top-20 药企每年 $10–50M+
        - 如果独立授权做到规模化，说明有机会形成经常性 ARR；但尚未披露公开 ARR
      - - Schrödinger：软件 ARR（站点许可模式）
        - FEP+、WaterMap、LiveDesign、Glide、Phase、Maestro 分子建模套件；GPU 云计算 token
        - 企业站点许可带量折扣；学术价格低约 50%；云计算按 token 计价
        - SDGR ~$130–150M ARR 验证药企愿意为计算工具付费；也是 Insilico 软件定价的参考点
      - - Recursion：里程碑合作（AstraZeneca $100M+）
        - Recursion OS 访问；通过表型组学做靶点识别和化合物筛选；在 AZ 治疗领域生成数据
        - 披露总额 $100M+；具体里程碑结构未披露；AZ 保留指定靶点的共同开发权
        - Recursion-AZ 交易标题金额（~$100M）显著小于 Insilico-Lilly 交易（$2.75B）；验证 Insilico Phase 2 定价溢价
      - - Isomorphic Labs：Lilly 交易（$45M 首付款 + $1.7B 里程碑款）
        - 基于 AlphaFold3 的靶点结构预测、IsoDDE 分子设计，以及横跨 5+ 个项目的多模态合作
        - 已确认首付款 / 里程碑款的具体拆分；版税和股权未披露
        - Insilico 的 Lilly 首付款（$115M）是 Isomorphic 的 2.6x；Insilico 的交易溢价似乎已计入 2 期临床验证
      - - Isomorphic Labs：Novartis 交易（$37.5M 首付款 + $1.2B 里程碑款）
        - 结构生物学预测、跨多个项目的分子设计合作
        - 完整条款通过英国监管文件披露了一部分；版税未说明
        - >-
          Isomorphic 的 Novartis 交易总额（$1.237B）相当于 Insilico Lilly 交易的 45%；Isomorphic 两笔交易合计（$2.98B）略高于 Insilico 单笔 Lilly
          交易
      - - XtalPi：按项目计费的晶型与制剂服务
        - 晶型筛选；固态表征；小分子设计；AI 辅助合成路线
        - 单项目价格未公开披露；主要是研究服务模式；不是 SaaS
        - 相邻市场分段；不是 Insilico 治疗性里程碑交易的直接竞争者；XtalPi 竞争的是制剂环节，而不是临床管线
      - - CRO 模式（WuXi AppTec、Charles River）：按服务费 / FTE 计费
        - 完整湿实验发现服务；实验开发；IND 支持研究；生产放大
        - FFS 或 FTE 混合费率；没有 IP 里程碑上行；标准方案不含 AI 生成式设计
        - CRO 定价缺少里程碑上行结构；药企在 CRO 与 AI 平台之间选择时会形成预算取舍
      - - BenevolentAI：历史合作（重组中）
        - 借助知识图谱做靶点识别和优先级排序；化合物再利用分析；数据授权
        - 条款未完全披露；截至 2025 年处于重组状态；交易流暂停
        - BenevolentAI 的战略下滑说明，AI 药物发现交易需要持续的临床验证，才能维持交易流
      - - Atomwise：AtomNet 小分子筛选
        - AtomNet 深度学习用于虚拟筛选；3T+ 可合成化合物库；以服务形式识别命中物
        - 按项目授权；未公开披露 ARR；可能存在里程碑交易
        - Atomwise 是专门的虚拟筛选服务，不是 Insilico 一体化方案的端到端平台竞争者
    notes: 定价数据来自截至 2026 年 5 月的公开新闻稿、SEC/HKEX 文件和分析师估计。多数交易条款受 NDA 约束。
