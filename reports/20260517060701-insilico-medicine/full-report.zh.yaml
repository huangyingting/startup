  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争版图与品类分层
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine 位于 AI 药物发现版图中四类竞争者的交汇处。第一类是拥有自有临床管线的全栈 AI 药物发现平台：Recursion Pharmaceuticals（NASDAQ:
              RXRX，2025 年 1 月以约 $688M 收购 Exscientia）、Isomorphic Labs（私营，Alphabet 支持，拥有 AlphaFold3 独家商业授权）和
              BenevolentAI（基于知识图谱，截至 2025 年底处于战略重组中）。这些公司把 AI 平台、内部药物项目和基于里程碑的制药合作结合起来。


              第二类是基于物理的计算化学平台提供商：Schrödinger（NASDAQ: SDGR）使用 FEP+、WaterMap 和 LiveDesign 工具，约 18 家全球前 20
              大制药公司依赖这些工具。Schrödinger 在自有管线上与 Insilico 的直接竞争较少，但会争夺计算药物设计预算。


              第三类包括专业 AI 与制药混合公司：XtalPi（量子物理结合 AI，由 Tencent、Sequoia 和 Eli Lilly 支持，聚焦小分子和晶型预测）和 Numerion Labs（原 Relay
              Therapeutics 品牌，面向免疫和炎症疾病的 ML 超级平台）。这些公司在目标细分市场与 Insilico 重叠，但平台范围更窄。


              第四类是传统既有玩家：合同研究组织（WuXi AppTec、Charles River Laboratories、IQVIA）提供不含生成式 AI 的湿实验药物发现服务，以及制药公司内部 AI
              团队（AstraZeneca、Roche、Pfizer）。后者代表的是内部预算竞争，而不是直接市场竞争者。制药客户的现状替代方案还包括经典化学信息学工具（OpenBabel、Molecular Operating
              Environment、Dassault Systèmes 的 Discovery Studio）与 CRO 外包结合。


              Insilico 的差异点在于，它是唯一一家在 HKEX 上市、并让生成式 AI 平台产生的药物完成 Phase 2 试验的 AI 药物发现公司，同时也是全球最大 AI 药物发现商业交易（2026 年 3 月
              Eli Lilly $2.75B）的受益方。尚无竞争者同时实现公开市场身份、Phase 2 临床完成，以及围绕 AI 设计候选药物的数十亿美元级制药合作。
