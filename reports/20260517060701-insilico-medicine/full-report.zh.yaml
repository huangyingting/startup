        title: 退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 已通过 HKEX 上市（SEHK:3696，late 2025）完成 IPO 退出，成为亚洲唯一上市的以 AI 为核心的药物发现公司。IPO 退出已经确认；参与 IPO
              前轮次的投资者拥有公开市场退出路径，但受锁定期和自由流通股约束。

              对收购方而言，未来最可能的退出，是由大型药企发起 M&A 交易。如果 ISM001-055 成功完成 Phase 3，任何希望（a）加速 AI 驱动药物发现、（b）获得 IPF 获批药物权益、（c）把
              Pharma.AI 平台纳入内部的大型药企，都会把 Insilico 视为收购标的。Phase 3 成功后，Lilly 本身、Pfizer、AstraZeneca、Novartis 或 Roche
              都可能产生收购兴趣。

              发出买入建议前，有五项关键尽调要求：（1）取得 HKEX 年报以审阅审计财务；（2）Eli Lilly 里程碑时间表细节；（3）Phase 3 方案和入组时间线；（4）IPO 后 HKEX
              股价和市值；（5）IPO 后股权结构表和优先权悬置。在这些问题解决前，估值置信度仍然偏低。
            claimRefs:
              - CV013
              - CV027
              - CV028
              - CV034
              - CV035
          - type: table
            tableRef: TV005
            claimRefs:
              - CV021
              - CV029
              - CV030
              - CV032
              - CV033
          - type: table
            tableRef: TV006
            claimRefs:
              - CV034
              - CV035
      - number: '8.7'
        title: 图表
        blocks:
          - type: callout
            title: Phase 3 是决定性催化剂
            body: >-
              Insilico Medicine 的估值路径几乎完全取决于 ISM001-055 Phase 3。成功会在最高临床层级验证 AI 设计药物发现，触发 Lilly 里程碑，并很可能吸引 M&A
              兴趣。失败则会抹掉临床溢价，并可能触发 Lilly 终止。投资者应极度关注 Phase 3 IND 提交、入组启动和任何数据发布。这是一个可能让估值变动 $3–6B 的二元事件。
            calloutType: recommendation
            claimRefs:
              - CV013
              - CV021
              - CV029
          - type: callout
            title: HKEX 财务不透明是主要尽调阻塞点
            body: >-
              Insilico 是上市公司（SEHK:3696），必须向 HKEX 提交年报。截至 May
              2026，经审计财务报表仍无法通过公开渠道取得，这是实质性尽调缺口。没有确认现金头寸、烧钱速度和收入质量，就无法支撑买入建议。取得 HKEX 招股书和 FY2025 年报，是最高优先级行动项。
            calloutType: risk
            claimRefs:
              - CV034
              - CV004
          - type: callout
            title: Insilico 相比同行享有合理的临床阶段溢价
            body: >-
              Recursion RXRX 交易市值约 ~$1.2B，且没有任何 AI 设计药物完成 Phase 2。Insilico 拥有唯一完成 Phase 2 的 AI
              设计药物。这种临床阶段溢价足以支撑其估值倍数显著高于 RXRX。即便在悲观情景（~$1.2B），隐含溢价也反映了行业折价风险。基准情景（$2.5–3.5B）相对公开可比和 Lilly 交易验证，恰当地定价了
              Phase 2 证明。
            calloutType: strength
            claimRefs:
              - CV005
              - CV010
              - CV022
