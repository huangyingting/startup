      - number: '1.5'
        title: 关键里程碑与反向事件
        blocks:
          - type: paragraph
            body: >
              Insilico Medicine 的发展从基础 AI 研究延伸到临床验证和公开上市。公司最重要的技术里程碑，是首次证明一个 AI
              平台能够独立设计全新靶点和针对该靶点的全新分子，并把由此产生的候选药物（ISM001-055，一款用于 IPF 的 TNIK 抑制剂）推进至 Phase 2 临床试验；其 Phase 2a 试验于 2023
              年完成，Phase 2 于 2024 年完成，数据足以规划 Phase 3 项目。2024 年 4 月，公司在这一数据读出的同时完成 Series E 轮，据报道估值为 $2.3B。2025 年底的 HKEX
              IPO（约 $293M）使其成为全球少数实现公开上市的 AI 药物发现公司之一。2026 年 3 月的 Eli Lilly 交易（名义价值 $2.75B，首付款 $115M）代表迄今对 AI
              生成式药物发现平台规模最大的商业验证。反向事件包括：（1）2022 年乌克兰战争后处置俄罗斯子公司，失去一个研究基地，也引发地缘政治风险集中度问题；（2）科学界批评者质疑 Insilico 早期使用的 GAN
              分子生成平台是否能实现足够的分子多样性和类药性质，2017 年发表在 arXiv 的 ChemGAN challenge 研究即有体现；（3）公司高度依赖
              CEO，且管线集中在尚未产生收入的开发阶段资产，这些仍是持续风险。
