    title: 技术 / 运营架构表
    slug: technology-operating-architecture-table
    type: matrix
    notes: 架构细节来自官方产品页、arXiv MOSES 预印本（arXiv:1811.12823）、GitHub 仓库分析（github.com/insilicomedicine）和新闻稿。AWS 部署为公司表述；内部算力细节未披露。
    columns:
