      - number: '4.3'
        title: 成本结构、毛利率与资本强度
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的成本结构由研发支出主导，这符合一家临床阶段生物制药公司的特征：截至 2026 年 5 月，公司管理 40 多个项目、13 项 IND 批准，以及多个活跃 Phase 1 和
              Phase 2 临床试验。截至 2024 年 9 月，公司全球约 350 名员工；仅薪酬和福利负担，按地区加权后的每名全职等效员工混合全球成本 $140,000–$230,000 估算，年化就约 $50–80
              million。临床试验支出、合同研究组织（CRO）费用和试验药物生产成本又叠加一层实质成本；Phase 2 试验可按适应症和地区不同，每项研究花费 $5–30 million，而公司正并行推进多个项目。

              没有财务披露，无法确认 Pharma.AI 平台授权的毛利率，但生命科学领域软件 / AI 平台授权业务通常毛利率为 70–85
              percent。加入合作密集型共同开发服务或与里程碑挂钩的交付物后，实际毛利率可能低于纯 SaaS
              基准。作为软件授权业务，营运资本需求有限；但临床管线会产生大量现金流出（资本开支轻、运营开支重）。公开资料未披露债务融资、项目融资义务。公司 2022 年 10
              月处置俄罗斯子公司，可能产生减值费用，但金额未公开披露。[CI015][CI016][CI020][CI021][CI025][CI027][CI038]
