            body: >-
              最具体的采用信号，是 March 2026 Eli Lilly 合作：确认支付 $115 million 首付款，并作为 $2.75 billion
              名义交易的一部分，覆盖多个项目的里程碑和特许权使用费。这是双方多年关系中的第三笔交易：Insilico 与 Lilly 在 2023 首次开展 AI 授权，November 2025 推进到一笔 $100
              million 交易，并在 March 2026 达成 $2.75 billion 安排——呈现出早期 AI 生物科技中少见的先落地、再扩张动态。其他里程碑包括 $888 million 的 Servier
              合作、$120 million 的 Qilu Pharmaceutical 交易，以及 $66 million 的 Hengrui 帕金森病项目。late 2025 的 HKEX IPO 募资约 $293
              million，也显著提高了 Insilico 作为上市公司在全球药企采购团队中的能见度。ISM001-055（Rentosertib）针对特发性肺纤维化的 Phase 2a 临床试验正在美国 12 个中心招募
              60 名患者，提供了平台产能最强的独立临床证明，并直接加速与潜在药企买家的平台授权对话。公司除「前 20 大中的 10 家」主张外，未公开披露单个被授权方收入、年度经常性费用金额或被授权方数量。
