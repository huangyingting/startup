  - id: TV005
    title: 投资逻辑破裂与止损触发表
    columns:
      - 触发因素
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - ISM001-055 3 期疗效失败
        - 主要终点未达标（52 周 FVC 下降较安慰剂）；中期分析因无效停止
        - 抹掉核心临床验证；摧毁乐观情景；可能触发 Lilly 终止；市场对 AI 药物设计的信心坍塌
        - 立即重估；建议卖出 / 退出；按低迷倍数重估纯平台剩余价值
      - - Eli Lilly 2026 合作终止
        - Lilly 按合同条款行使终止权；公开宣布交易缩减或结束
        - 移除近期收入基础的 >80%；抹掉 $2.75B 公告交易；释放 AI 药物发现商业可信度风险信号
        - 紧急组合复盘；每日监控 HKEX 公告；降低持仓敞口
      - - HKEX 文件披露财务困境
        - 披露现金余额 <6 个月跑道；审计师在 HKEX 年报中出具持续经营保留
        - 资本充足性失守，立即抬升稀释和违约风险；从根本上改变财务逻辑
        - 立即获取 HKEX 文件；对资本计划启动紧急尽调；评估过桥融资可能性
      - - 全行业 AI 药物 3 期失败
        - 12 个月内，两家或更多 AI 原生药物发现公司在 AI 设计药物 3 期失败
        - 全行业更可能认为 AI 的 2 期信号无法转化到 3 期；所有 AI 药企市场倍数压缩
        - 上调悲观情景概率权重；下调估值估算；升级前要求看到 3 期中期疗效信号
    claimRefs:
      - CV021
      - CV029
      - CV030
      - CV032
      - CV033
    notes: 止损触发都是二元事件；需要通过 HKEX 监管公告、ClinicalTrials.gov 更新和可获得后的业绩公告持续监控。
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 为何重要
      - 负责人 / 尽调路径
    rows:
      - - HKEX 财务报表
        - HKEX 年报（SEHK:3696）中的经审计利润表、现金流量表、烧钱速度和收入拆分
        - 没有确认的 P&L 就无法做财务模型；现金充足性和跑道未知；当前所有估算均基于模型且不确定性高
        - 访问 hkex.com.hk 投资者关系；下载 FY2025 HKEX 年报；联系公司 IR
      - - Eli Lilly 里程碑安排
        - 2026 年 3 月协议的单项里程碑 USD 金额、事件定义、特许权使用费率、排他范围和终止条款
        - $2.75B 公告总额 >95% 后置；没有里程碑安排，无法建模风险调整现值；交易质量未知
        - HKEX 重大合同披露；公司 IR；M&A 数据室请求
      - - 3 期方案和时间线
        - ISM001-055 的 3 期试验设计（主要终点、患者数量、随访时长）、入组时间线和 IND 申报日期
        - 3 期设计决定数据读出时间（典型 3–6 年）；对退出时点和现金跑道建模至关重要
        - ISM001-055 3 期 IND 申报后查看 ClinicalTrials.gov；HKEX IR 公告；公司管线更新
      - - HKEX IPO 后交易数据
        - IPO 后（2025 年 10 月–2026 年 5 月）的股价历史、自由流通比例、机构持股和分析师覆盖
        - IPO 后交易反映当前市场估值；没有 HKEX 股价数据，无法确认市值
        - HKEX Market Data 门户；Bloomberg 或 Refinitiv 终端；SEHK:3696 券商研究
      - - 股权结构表和优先权悬顶
        - 优先股堆叠、清算优先权倍数、反稀释条款和 IPO 后稀释后股份数
        - 普通股价值取决于优先权悬顶规模；真实稀释后市值需要 HKEX 招股书确认股份数
        - HKEX 招股书或上市文件；HKEX 公告中的 IPO 后流通股数
    claimRefs:
      - CV034
      - CV035
    notes: 五项尽调问题全部是买入建议的阻断项。HKEX 财务报表优先级最高；没有它们，无法做内在价值建模。
