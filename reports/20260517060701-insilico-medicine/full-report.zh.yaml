        - ARR 约 ~16x（估计）
        - 基于物理的模拟平台，披露 ARR；有公开市场数据
        - 并非生成式 AI 优先的药物发现；ARR 可见度和软件成分更高；商业模式组合不同
      - - Exscientia / Sanofi（M&A 2024）
        - 收购约 $1.5B（2024 估计）
        - 2 期前临床溢价
        - M&A 先例：AI 药物发现公司在完成 2 期前被大型药企收购
