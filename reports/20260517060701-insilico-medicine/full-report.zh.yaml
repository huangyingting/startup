      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的 GTM 动作瞄准全球前 20
              大制药公司内部研发领导层，具体包括首席科学官、发现化学副总裁和商务拓展高管。公司争夺的是大型多年期平台授权和共同开发协议，而不是高频交易型订单。公开资料未披露渠道合作伙伴、分销商或经销商；公司看起来采用直接企业销售模式，并以科学可信度（300
              多篇同行评议论文）和 ISM001-055 已展示的临床概念验证数据支撑销售。

              制药平台合作的销售周期通常以季度到年份计，因为大型制药组织内部合同谈判、尽调和委员会审批都很复杂。Eli Lilly 交易（2026 年 3 月，名义价值 $2.75
              billion）需要此前长期关系积累，也很可能借助了 ISM001-055 的 Phase 2 临床数据作为验证。获客成本（CAC）、回本周期和净留存率（NRR）等标准 B2B SaaS
              指标没有公开数据；若不改造，这些指标也不适用于这种非标准企业制药授权结构。没有披露按客户拆分的收入，意味着若无 HKEX 文件，无法精确分析销售效率。[CI019][CI026][CI032][CI036]
            claimRefs:
              - CI019
