      - number: '3.5'
        title: 护城河耐久性、商品化风险与竞争者反向证据
        blocks:
          - type: paragraph
            body: >
              Insilico 的竞争护城河建立在四根支柱上。第一，Phase 2 临床证明：ISM001-055（用于 IPF 的 TNIK 抑制剂）完成 Phase 2，是全球首个达到这一里程碑的生成式 AI
              药物。临床前竞争者无法复制这一里程碑，它也是平台可复现性最可信的证据。第二，端到端集成：Biology42、Chemistry42 和 Medicine42
              技术栈用单一工作流覆盖完整发现连续体，能够输出单模块竞争者无法匹配的一体化结果。第三，公开资本与商业验证：HKEX 上市（$293M）和 Eli Lilly 交易（名义 $2.75B，首付款
              $115M）代表已经验证的商业准入，而这对尚未产生收入的私营竞争者结构上不可得。第四，跨适应症管线深度，拥有 40 多个项目和 13 项 IND 批准。


              护城河耐久性的竞争威胁包括：开源 transformer 分子生成工具推动生成式 AI 商品化；Recursion 收购 Exscientia 后拥有更大的临床数据和人员规模；Isomorphic Labs 拥有
              AlphaFold3 独家结构生物学优势，可能在基于结构的设计上更优；以及 AstraZeneca、Roche、Pfizer 在制药公司内部建设 AI 能力。


              反向证据包括：截至 2026 年 5 月，包括 Insilico 在内，没有任何 AI 药物发现公司凭仅靠 AI 的设计产出 FDA 获批药物。ISM001-055 已完成 Phase
              2，但截至本报告日期，尚未公开发布经同行评议的 Phase 2 疗效数据或已确认的 Phase 3 方案。已发表的早期 GAN 分子生成平台科学批评（arXiv 2017，ChemGAN
              challenge）提出了生成模型分子多样性问题；Insilico 的平台自那些论文以来已有实质进展，但除 2019 年 DDR1 Nature Biotechnology 论文外，Chemistry42
              的独立基准测试仍有限。BenevolentAI 的战略下滑是全行业警示：AI 药物发现的承诺不保证商业成功；管线失败或负面监管信号都可能实质重置包括 Insilico 在内任何玩家的竞争位置。
