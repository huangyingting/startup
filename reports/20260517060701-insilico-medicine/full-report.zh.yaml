companyProfile:
  summary: >-
    Insilico Medicine 是一家在香港联交所上市的临床阶段 AI 生物技术公司（SEHK:3696）。公司用 Pharma.AI 平台加速小分子药物发现；平台由
    Biology42（靶点识别）、Chemistry42（生成式分子设计）和 Medicine42/inClinico（临床分析）组成。公司由 Alex Zhavoronkov 于 2014 年创立，已实现全球前所未有的里程碑：AI
    设计药物完成 Phase 2 临床试验（ISM001-055，用于特发性肺纤维化），并在 2026 年 3 月与 Eli Lilly 签署 $2.75 billion 合作，同时在纤维化、肿瘤和免疫领域拥有 40+ 项项目、13 项
    IND 批准。
