      - number: '5.4'
        title: 部署、集成、可靠性与路线图
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的 Pharma.AI 平台以企业 SaaS 形态部署，药企合作伙伴需要通过协商后的 API 连接，把平台接入既有药物发现和临床数据基础设施。截至 May
              2026，公司未发布公开集成指南、SDK 或 API 参考；所有集成规格应在商业授权协议中定义。

              主要部署证据来自合作研究产出和里程碑公告。Eli Lilly 合作（March 2026）最高价值 $2.75 billion、首付款 $115 million，是最重要的公开部署事件，覆盖平台授权和 AI
              设计药物资产授权。此前与 Pfizer（2020）、Janssen（2021）、Sanofi（2023）以及其他前二十大药企的合作，显示企业级采用范围较广。Insilico 在 Cambridge MA、Hong
              Kong、Shanghai、Suzhou、Yixing、Taipei、Montreal、New York 和 Abu Dhabi 设有全球研发和商业办公室，为合作项目提供区域支持。

              近期路线图锚定三条线：ISM001-055 在 IPF 中启动 Phase 3（资金需求将显著高于 Phase 2）；推动 ISM3091、ISM8207、ISM6331 和 ISM5411 通过 Phase
              1/2 里程碑；借助 Eli Lilly 交易的商业验证，在当前基础上扩大 Pharma.AI 平台合作。Insilico 在 late-2025 IPO 后成为 HKEX 上市公司（SEHK:3696，募资
              $293M），现在提交半年报和年报，为未来投资提供更高可见度。Nature 将 Insilico 列为 2025 年生物科学 50 家顶尖企业机构之一。公司未公开披露 2026
              的具体平台技术升级或新模块发布路线图。
