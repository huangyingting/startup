      - number: '7.2'
        title: 运营、AI 质量与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              Insilico 的 AI 平台风险集中在生成式 AI 用于化学时的已知限制。基于 GAN 的分子生成（ORGAN
              架构）被记录存在模式崩塌和分布漂移，可能产出结构看似合理、但合成不可行或代谢不稳定的化合物。ISM001-055 的 Phase 2a 验证实验缓释了先导化合物的这一风险，但 15+
              个管线化合物依赖同一平台，且没有同等实验确认，因此面临相同模型限制。

              Phase 3 ADMET 失败风险不低。TNIK 在非纤维化组织中的抑制可能产生 Phase 2a 尚未表征的免疫抑制或 CNS 影响，同类 Phase 3 试验的一般失败率为 50-60%。AI 设计药物没有
              Phase 3 完成先例，失败率先验并不确定。

              临床执行能力也是风险。Insilico 起源于计算公司，Phase 3 执行将高度依赖 CRO 合作；如果 BIOSECURE Act 对 WuXi AppTec 的限制落地，且没有足够时间认证替代方，CRO
              供应链可能被扰动。

              网络安全风险存在但未经验证。尚未报告公开事件，但 Pharma.AI 是工业间谍活动的高价值目标。如果任何 AI 组件用于临床场景，FDA 网络安全指导也会适用。
