      - number: '3.4'
        title: 切换成本、锁定效应、多供应商并行与分销权力
        blocks:
          - type: paragraph
            body: >
              AI 药物发现中的切换成本随平台类型显著不同。对 Schrödinger 这类 SaaS 平台，切换成本结构性较高，因为制药公司内部团队围绕特定工具套件建立工作流、脚本和组织知识。FEP+
              计算嵌入已验证的计算工作流；在受监管药物开发中，任何切换都需要多年重新验证。这造就了黏性很强的装机基础，Insilico 等竞争者很难仅凭能力将其替换。


              对 Insilico、Recursion 和 Isomorphic Labs 这类基于里程碑的合作模式，活跃合作期内的切换成本通过控制权变更条款、里程碑义务和合作产生 IP
              的共同所有权嵌入合同。这些安排保护既有交易价值，但不能阻止制药公司同时与竞争者达成并行交易。多供应商并行是常态：AstraZeneca、Roche 和 Pfizer 同时维持与多家 AI 药物发现提供商的关系。


              AI 药物发现的网络效应有限，但在数据层存在。Recursion 的 50-petabyte 湿实验数据集形成数据护城河，每增加一次实验都会增强。Insilico 的 Biology42
              靶点识别引擎也会从每次成功合作的数据中改进。不过，基础生物数据（通过 AlphaFold2 得到的蛋白结构、公共基因组数据库、ChEMBL）正越来越开源，随着时间推移会降低专有数据集的独特性溢价。


              供应和伙伴准入壁垒更有利于既有玩家。Schrödinger 渗透 18 家以上全球前 20 大制药公司，意味着竞争者必须拿出有吸引力的成本性能权衡才能拿份额。Insilico 的 HKEX 上市、Eli
              Lilly 交易和临床记录带来声誉准入优势，这是 Xaira Therapeutics、Numerion Labs 等更早期玩家必须从零建立的。包括 FDA pre-IND 会议、EMA 科学建议互动和 13 项
              IND 批准在内的监管关系，是 AI 原生新进入者面临的实质壁垒。WuXi AppTec 是 Insilico 的投资者，同时掌握重要湿实验供给能力，这让它与传统 CRO 既有玩家之间形成复杂的竞合关系。
