  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的收入模型混合了经常性平台授权费、大额合作首付款、或有里程碑付款，以及商业化药物最终可能带来的版税。Pharma.AI 平台（包括用于靶点识别的
              Biology42、用于生成式分子设计的 Chemistry42，以及用于临床试验分析的 Medicine42）以未披露的年度费用授权给制药伙伴。公开定价不可得；企业交易逐单谈判。截至 2026 年，公司已与按
              2021 年收入计算的全球前 20 大制药公司中的 10 家签署合作协议，但单笔交易收入金额未公开披露。

              最可见且已确认的收入事件，是 2026 年 3 月 Eli Lilly 合作，其中包括 $115 million 首付款，以及由里程碑和版税组成、最高 $2.75 billion
              的总潜在价值。这笔首付款被确认为合作收入事件，而不是药品销售事件。截至报告日期，使用 Insilico
              平台发现的药物尚未获得监管批准，因此版税收入仍属推测。政府补助收入——来自加拿大联邦政府对蒙特利尔中心的支持，以及阿联酋政府对阿布扎比中心的支持——构成较小且非经常性的收入来源。里程碑付款的收入确认跟随已定义临床
              / 监管事件完成（IND、Phase 1 启动、Phase 2 完成、NDA/BLA
              递交），因此收入时点天然不平滑。[CI002][CI009][CI010][CI011][CI029][CI033][CI040]
