        title: 融资、估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 在 late 2025 完成 HKEX IPO，募资约 $293M，并以 SEHK:3696 上市。April 2024 的 Series E 融资 $95M，投后估值约
              $2.3B。Eli Lilly 交易（March 2026）贡献 $115M 首付款，占 $2.75B 名义价值的 4.2%；剩余 $2.635B 后置于里程碑和特许权使用费事件，取决于 Phase 3
              成功、监管批准和商业化上市。

              假设 IPO 净募资加上此前 Series E 资本、扣除 IPO 前烧钱，IPO 后现金估计为 $280–440M；按当前规模可支撑 2–4 年现金跑道。这与根据员工数和临床试验活动估算的 $70–150M
              年烧钱相一致。截至报告日期，公开来源无法取得已确认的审计财务报表；所有财务估计均基于模型。

              入场纪律要求取得 HKEX
              招股书。招股书会包含经审计收入、运营费用、经营现金流和募资用途——这些目前都不可得。没有确认财务数据，任何估值模型误差区间都很宽，也不存在内在价值锚点。没有招股书，优先权悬置和股权结构表也未知，稀释后股数估计因此不确定。
