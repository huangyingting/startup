              Insilico Medicine 的 Pharma.AI 平台瞄准一个狭窄但高价值的细分市场：顶级全球药企的研发职能。公司主要买方是首席科学官、药物发现副总裁和业务拓展高管，他们评估平台授权，用于多项目 AI
              辅助药物发现。截至 2026，Insilico 网站称其已与按 2021 收入计全球前 20 大药企中的 10 家建立合作，包括 Eli Lilly（美国）、Servier（法国）、Qilu
              Pharmaceutical（中国）、Hengrui Pharma（中国）、Exelixis（美国）、Sanofi（EU）、Fosun Pharma（中国）和
              Menarini（EU）。这份伙伴名单横跨美国、欧洲和中国药企板块，反映出 Insilico 借助 Hong Kong、San Francisco、Shanghai、Abu Dhabi 和 Montreal
              的地理布局，有意推进多区域渗透。主要使用场景是多项目 AI
              药物发现，涵盖靶点识别（Biology42）、生成式分子设计（Chemistry42）和临床试验分析（Medicine42）。次要的非收入群体包括学术合作者和政府研究中心，尤其是由 UAE 政府资金支持的 Abu
              Dhabi 中心。公开披露尚未确认中型生物科技或 SME 客户。
