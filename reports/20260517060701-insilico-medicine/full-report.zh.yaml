  - id: TM004
    title: 增长驱动与约束表
    columns:
      - 增长驱动 / 约束
      - 方向
      - 时点
      - 对 Insilico 的影响
      - 尽调追问
    rows:
      - - 药物开发成本高（~$2.6B/个药）且临床失败率 90%
        - 增长驱动
        - 当下，结构性
        - AI 降低临床前淘汰率，ROI 逻辑随之变强；也支撑规模化授权费
        - 核验 Insilico 在已发表研究或合作披露研究中记录的淘汰率改善数据
      - - 专利悬崖：到 2030 年有 $200B+ 药企收入面临到期风险
        - 增长驱动
        - 紧迫，2024–2030
        - 迫使头部药企采用 AI 补管线；Insilico 的目标市场正是动机最强的买家
        - 跟踪 AI 来源项目的 BD 交易量；监测 Lilly 和 AZ 管线公告中的 AI 来源项目
      - - AlphaFold2/3 蛋白结构能力普及
        - 增长驱动
        - 当下，至 2026 年加速
        - 扩大基于结构设计的 TAM；移除 $500K+ 晶体学成本门槛；提升 Chemistry42 用处
        - 确认 Chemistry42 是否集成 AlphaFold；与 Schrödinger 和 Recursion 对标
      - - FDA/EMA 为 AI 设计药物建立监管路径
        - 增长驱动
        - 开始成形，2024–2027
        - 降低药企伙伴评估 AI 来源 IND 申报时的监管不确定性
        - 确认 FDA Drug Development Tools 指南是否适用；评估 Insilico 监管团队处理 AI 专项申报的能力
      - - 人口老龄化与疾病负担上升（全球每年 20M+ 新发癌症病例）
        - 增长驱动
        - 长期结构性
        - 患者群体扩大，支撑 IPF 和肿瘤适应症的长期药物市场增长
        - 监测 IPF 发病率趋势和肿瘤流行病学，判断 10 年期 SAM 是否扩张
      - - 截至 2026 年，还没有完全由 AI 设计的药物获 FDA/EMA 批准
        - 采用约束
        - 短期，2026–2027
        - 保守药企 R&D 更避险；企业级平台交易承诺会被推迟
        - 监测 FDA 对 ISM001-055 及任何全球 AI 药物批准的动作；跟踪行业内 Phase III 获批情况
      - - 临床试验瓶颈：Phase I–III 仍需招募人类患者
        - 采用约束
        - 结构性
        - AI 压缩不了试验阶段；总开发周期仍是 10–15 年；限制「速度」叙事
        - 评估 Insilico Phase II 时间线相对历史 IPF 试验常态的差异；评估 ISM001-055 Phase II 结果
      - - 药企-AI 合作中的 IP 与数据所有权摩擦
        - 采用约束
        - 当下，持续存在
        - 合作谈判周期长；药企不愿共享自有靶点数据，拖慢成单
        - 审查 Eli Lilly 交易的 IP 条款，以及 Insilico 标准合作合同中数据权利如何分配
    notes: >-
      驱动和约束来自 FDA 监管指南、EMA 科学咨询框架、AI 设计分子的已发表临床试验数据、AlphaFold 技术文献和 WHO 癌症统计。专利悬崖数据来自 IQVIA/PhRMA
      年度情报报告。没有单一来源覆盖全部驱动；这里的综合判断来自多类证据的收敛。
