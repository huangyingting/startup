      - 关键依赖
      - 风险
    rows:
      - - 多组学数据层（基因组学、蛋白质组学、转录组学）
        - PandaOmics / Biology42 靶点识别模型的核心输入数据
        - 专有数据采集和合作伙伴数据共享协议
        - 罕见病或代表性不足疾病存在数据覆盖缺口；公共组学数据集扩张后，数据护城河可能被削弱
      - - 化合物训练语料
        - Chemistry42 生成模型组合的训练数据
        - 内部清洗、公共数据库（ChEMBL、ZINC）、合作伙伴化合物数据
        - 训练分布之外模型表现下降（ChemGAN 挑战已有记录）；缺少多样性基准
      - - 生成式 AI 模型组合（GANs、VAEs、Transformer、RL — 50+ 种算法）
        - Chemistry42 的核心分子生成和多属性优化
        - GPU 算力基础设施（AWS + 内部 HPC）；模型版本管理和实验追踪
        - 多算法路径缓解了单一模型的多样性失效；但没有与竞品平台对照的外部基准
      - - ADMET 预测模块
        - 为生成分子打分并筛选成药性、预测安全性 / PK
        - 化学信息学库（RDKit、OpenBabel）；内部 QSAR 模型
        - 预测仍需湿实验验证；训练分布之外新骨架的准确性未验证
      - - 多租户 AWS SaaS 平台（Pharma.AI）
        - 向外部药企客户交付 Chemistry42、PandaOmics 和 inClinico 模块
        - AWS 基础设施可用性；网络安全；租户数据隔离控制
        - 没有公开状态页、正常运行时间 SLA 或 SOC 2 证明；受监管药企客户可能要求 VPC 或本地部署
      - - inClinico / Medicine42 临床分析引擎
        - 预测 Phase 2/3 试验成功概率；优化患者分层
        - 历史临床试验数据库和合作伙伴试验数据
        - 面向 AI 设计药物时，预测模型准确性可能不同于历史小分子训练分布
