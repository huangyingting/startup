  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 的可触达市场分为两个相互连接的层次。第一层是 AI 驱动的药物发现与开发平台市场，覆盖 AI 靶点识别、生成式分子设计、ADMET
              和毒性预测、临床试验设计辅助等软件与服务。这个市场不同于通用生物信息学云基础设施、合同研究组织（CRO）湿实验服务、基因组测序平台或医学影像 AI；这些都不在 Insilico 的产品覆盖范围内。第二层是
              Insilico 拥有自有临床阶段资产的具体疾病治疗市场，主要是 IPF（特发性肺纤维化）和肿瘤适应症。

              AI 药物发现平台的现状替代方案包括：（1）传统计算化学套件（Schrödinger、Maestro、Molecular Operating
              Environment），由制药公司内部计算化学团队维护；（2）WuXi AppTec、Charles River 等 CRO 发现服务，提供湿实验能力，但生成式 AI
              能力有限；（3）用于靶点验证的学术合作；（4）缺少专用生成式 AI 药物设计工具的内部数据科学团队。

              在疾病市场中，IPF 影响约 130,000 名美国患者，全球间质性肺病患者最高达 6 million。美国每年新增 IPF 病例约 50,000
              例。尽管已有两种获批治疗药物——nintedanib（Ofev，Boehringer Ingelheim，FDA 2014 年 10 月批准）和
              pirfenidone（Esbriet，Genentech/Roche）——两者都只能减缓 IPF，不能逆转或治愈，留下显著未满足临床需求；Insilico 的 ISM001-055 TNIK
              抑制剂项目正是为此设计。全球制药研发支出每年约 $240–250 billion，其中 AI 辅助平台工具占比仍小，但增长很快。
