      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >-
              Insilico Medicine 呈现出临床阶段 AI 赋能生物科技公司的典型画像：资本开支强度高，收入仍处于商业化前期。收入质量评价偏混合：平台授权费提供经常性基础（但金额未披露），最显眼的收入事件——例如
              Eli Lilly 的 $115M 首付款——则是离散、非经常性现金流。Eli Lilly 交易的 $2.75B 名义总额，主要取决于尚未发生的临床和监管里程碑；按风险调整后的完整交易价值明显低于名义数。

              缺少已披露财务报表，利润率路径无法建模。平台授权业务按 SaaS 标杆看，毛利率可能较高（70–85%），但共同开发、临床和运营层会显著压低经营利润率。多项目临床试验推高资本强度；Eli Lilly 首付款和
              IPO 募资能提供有意义的近期现金跑道，但 ISM001-055 启动 Phase 3、管线继续扩张，仍需要持续融资能力。根本尽调阻塞点在于，本次研究未能取得 HKEX 招股书和 IPO 后年报 /
              中报；作为上市公司，Insilico 依法必须提交这些披露。未审阅这些文件前，无法做承销级财务分析。[CI022][CI023][CI024][CI039][CI041]
