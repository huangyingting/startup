            body: >-
              建议为高度关注、持续观察。这不是买入建议，原因有三：（a）估值置信度为低——无法通过公开渠道取得 HKEX 财务报表（利润表、现金头寸、烧钱速度），任何内在价值模型都依赖估计；（b）ISM001-055 的
              Phase 3 引入二元事件，可能在任一方向推动估值变化数十亿美元；（c）入场价格（late 2025 的 HKEX IPO）无法从可得数据确认。置信度评级为低。风险评级为高，反映 Phase 3
              临床二元风险（可比纤维化试验历史淘汰率 >50%）、单笔交易收入集中（Eli Lilly >80%），以及同行走势显示的行业重估风险。

              估值立场是带临床证明溢价的研究阶段溢价。Insilico 相比纯平台同行（如 Recursion RXRX，市值约 ~$1.2B 且未完成 Phase 2）享有有意义的溢价，原因在于 Phase 2
              数据和商业交易组合。AI 药物发现总可用市场估计到 2025 年为 $3–4B，CAGR 超过 30%，支撑行业增长溢价。AlphaFold
              获得诺贝尔化学奖（2024）提高了全球认知和主流投资者关注。投资者应要求 Phase 3 启动并取得 HKEX 财务访问后，才将建议上调为买入。
