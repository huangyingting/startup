      - number: '8.4'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              悲观情景（~$1.2B）假设 ISM001-055 Phase 3 未达到主要疗效终点（52 周时用力肺活量下降相对安慰剂的减少）。在该情景下，Eli Lilly 很可能行使终止权，后置里程碑收入被清零。市场会把
              Insilico 重估为平台型价值，并因 AI 设计药物临床转化的行业信心受损，对残余管线价值大幅折价。类似 BenevolentAI 轨迹的全行业倍数压缩也会适用。

              基准情景（$2.5–3.5B）假设 Phase 3 以统计把握度充分的试验启动，早期临床暂停风险得到管理，Lilly 里程碑在 3–5 年内部分实现，并与中型药企签署 1–2 笔额外平台交易。平台 ARR
              温和增长。HKEX 股价体现 Phase 3 前临床阶段相对纯平台同行的溢价。

              乐观情景（$5–8B）要求 Phase 3 成功，ISM001-055 提交 NDA/BLA，并在 IPF 获批。Lilly 里程碑付款会被触发，产生可观确认收入。大型药企的 M&A
              兴趣会带来收购溢价。平台授权将展示临床阶段溢价，扩大企业价值。新型以 AI 为先的 IPF 项目若在 Phase 3 成功，也会将 Chemistry42 生成式设计平台验证为临床已证明，进一步带动交易流。在没有
              Phase 3 中期数据前，达到乐观情景的概率较低。
