  topStrengths:
    - >-
      ISM001-055 (TNIK inhibitor) is the world's first AI-generatively designed drug to complete Phase 2 clinical trials
      — a unique, independently verifiable proof point no competitor has matched.
    - >-
      The $2.75B Eli Lilly deal (March 2026, $115M upfront) is the largest disclosed commercial validation of an AI drug
      discovery platform globally, exceeding Isomorphic Labs' comparable Lilly deal by 2.5×.
    - >-
      The Pharma.AI end-to-end platform (Biology42 + Chemistry42 + Medicine42) has the broadest confirmed module
      coverage among pure-play AI drug discovery companies, with 10 of 20 top pharma collaborators.
    - >-
      A 40-program pipeline with 13 IND approvals provides multiple binary catalysts and diversification across IPF,
      oncology, and immunology.
  topRisks:
    - >-
      HKEX financial statements (income statement, cash position, burn rate, audited revenue) are inaccessible through
      available public channels, preventing intrinsic valuation modeling or runway assessment.
    - >-
      Phase 3 for ISM001-055 has not been announced; fibrosis Phase 3 trials historically fail at >50% rates, creating a
      binary event that could move valuation by several billion dollars in either direction.
    - >-
      Revenue is highly concentrated in Eli Lilly (>80% of disclosed deal value); deal restructuring or termination
      would severely impact near-term cash flows.
    - >-
      AI drug discovery commoditization is accelerating as AlphaFold (Nobel Prize 2024), Isomorphic Labs, Recursion, and
      internal pharma AI teams close capability gaps.
  unresolvedGaps:
    - >-
      HKEX prospectus and annual report are required to confirm audited revenue, cash position, burn rate, and runway
      before a buy recommendation can be issued.
    - Phase 3 protocol, enrollment timeline, and powering assumptions for ISM001-055 have not been publicly disclosed.
    - >-
      Eli Lilly milestone schedule (which events trigger which payments within the $2.75B headline) is not publicly
      available.
    - >-
      Post-IPO share price, market capitalization, and preference overhang structure are inaccessible from HKEX in
      available form.
    - >-
      Platform ARR, active licensee count, and NRR are not publicly disclosed; customer count across non-Lilly
      partnerships is unknown.
