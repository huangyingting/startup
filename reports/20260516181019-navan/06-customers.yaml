figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    layout: wide
    summary: "Discovery-to-expansion lifecycle for Navan customers across three segments (enterprise, mid-market, SMB), showing entry points, activation, cross-sell milestones, and retention reinforcement loops."
    data:
      items:
        - label: "Awareness / Discovery"
          detail: "Enterprise: analyst reports (Gartner, Forrester), event marketing, RFP/procurement. Mid-market: sales outreach, LinkedIn, G2/Capterra reviews. SMB: PLG self-serve, social, word-of-mouth."
          claimRefs: [CU003, CU004]
        - label: "Evaluation / Sales"
          detail: "Enterprise (SLG): account executive-led, 3-6 month cycle, POC, RFP, security review, legal/contract. Mid-market: shorter cycle, 4-8 weeks, product demo + pricing. SMB (PLG): self-serve sign-up, 1-7 day onboarding."
          claimRefs: [CU008, CU009]
        - label: "Onboarding / Activation"
          detail: "Customer success team manages launch: HRIS integration, travel policy configuration, card issuance. 90% of bookings self-serve post-onboarding. Activation milestone: first trip booked + policy enforced."
          claimRefs: [CU006, CU010]
        - label: "Core Usage (Travel)"
          detail: "Primary value delivery: online/mobile booking, policy enforcement, supplier content (600+ airlines, 2M+ hotels). Ava handles ~50% of support interactions autonomously. 7-min average booking time."
          claimRefs: [CU007, CU014]
        - label: "Cross-Sell Expansion"
          detail: "Navan Expense: add auto-capture receipts, AI coding, ERP integration. Navan Card: real-time policy at point of spend. Navan M&E: group travel. 36% of customers on 3+ products by Jan 2025."
          claimRefs: [CU021, CU022]
        - label: "Retention / Renewal"
          detail: "NRR >110% demonstrates expansion-driven retention. Annual/multi-year contracts for Expense. Switching cost: integrated card, expense, policy data; HRIS/ERP integrations. 96% CSAT; NPS 43."
          claimRefs: [CU016, CU017, CU018]
    claimRefs: [CU003, CU004, CU006, CU007, CU008, CU010, CU014, CU016, CU018, CU021]

