schemaVersion: "report-v2"
artifact: customers
slug: navan
runDate: "2026-05-16"
company:
  name: Navan
chapter:
  number: 6
  letter: U
  title: Customers
  mission: Identify who pays/uses the product, the proof of real adoption, durability, expansion, and concentration risks.

sections:
  - id: S01
    title: Customer Base Segmentation
    body: >
      Navan serves over 10,000 active customers as of January 31, 2025, spanning enterprise, mid-market, and small-and-medium
      businesses (SMBs) across diverse industries including software/technology, real estate, healthcare, media, retail, and finance.
      The company defines an "active customer" as any company that has transacted on the Navan platform six or more times in the
      preceding 12 months and generated usage-based revenue — a threshold designed to reflect genuine engagement rather than
      mere registration.

      The customer base is geographically distributed, with 41% of FY2025 revenue generated from customers outside the United
      States (39% for H1 FY2026). No single customer contributed more than 2% of total revenue for FY2025, indicating a
      highly diversified customer concentration profile relative to typical enterprise SaaS peers.

      Navan targets both "managed" customers (enterprises with established T&E programs) and "unmanaged" customers
      (typically SMBs with no prior travel management vendor), capturing the full corporate travel spectrum from startups
      to global multinationals.
    claimRefs: [CU001, CU002, CU003, CU004, CU005]
    tableRefs: [TU001]

  - id: S02
    title: Adoption Trajectory and Growth
    body: >
      Active customer count grew from over 8,000 as of January 31, 2024 to over 10,000 as of January 31, 2025 — approximately
      25% year-over-year growth in logo count. Gross Booking Volume grew from $3.7B (FY2024) to $6.6B (FY2025), implying
      a significant increase in spending intensity per customer alongside logo growth.

      The dual-pronged go-to-market strategy — Sales-Led Growth (SLG) for enterprise/mid-market via account executives and
      customer success teams, plus Product-Led Growth (PLG) via self-serve sign-ups for SMBs — has enabled broad market
      access. The PLG channel (low-touch) reduces customer acquisition cost for smaller accounts. Revenue per active
      customer grew from roughly $50K (FY2024: $403M / 8K customers) to roughly $54K (FY2025: $537M / 10K customers),
      implying slight ARPU expansion from cross-sell even as the customer base grew.

      Usage metrics confirm high platform engagement: 90% of FY2025 bookings made online or mobile (reducing support
      cost per booking), and 36% of customers as of January 31, 2025 were attached to three or more Navan offerings,
      demonstrating successful cross-sell execution.
    claimRefs: [CU006, CU007, CU008, CU009, CU010]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: S03
    title: Named Customer Proof
    body: >
      Named enterprise customers publicly attributed to Navan include Canva, HelloFresh, DoorDash, Duolingo, and Steelcase —
      spanning technology, food delivery, e-learning, and manufacturing verticals. These names were disclosed by Navan in
      blog/marketing contexts; they are not confirmed production deployments from independent third-party sources.

      The S-1/A does not name individual customers (citing diversity and concentration data instead). Navan's Gartner Peer
      Insights, G2, Trustpilot, and GetApp review presence provides third-party validation of customer experiences, though most
      review-site identities are anonymized or represent a self-selected subset.

      Customer outcomes reported by Navan include: median travel savings of approximately 15% vs. budgeted spend (with some
      customers saving up to 25%), 7-minute average booking time vs. 45-minute industry benchmark (per Booking.com), and
      a 96% CSAT and NPS of 43 for H1 FY2026.
    claimRefs: [CU011, CU012, CU013, CU014, CU015]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: S04
    title: Retention, Durability, and Satisfaction
    body: >
      Navan's Net Revenue Retention Rate (NRR) exceeded 110% as of January 31, 2025 and January 31, 2024 — a top-tier
      SaaS retention benchmark indicating that existing customers, on average, spent more than 10% more on Navan year-over-year
      through a combination of usage growth and product cross-sell. NRR >110% is consistent with strong gross logo retention
      (typically >85-90% for enterprise software platforms) plus meaningful net expansion.

      CSAT (96%) and NPS (43) are strong for enterprise travel platforms (industry CSAT benchmarks are typically 70-85%;
      NPS >40 is considered excellent in enterprise software). Both metrics are company-measured and not independently audited.

      The platform's land-and-expand structure creates natural durability: Navan's travel booking generates workflow lock-in
      via integrated expense, card, and policy management, making switching to a competitor operationally complex. Annual
      and multi-year subscription contracts (for expense management) create forward revenue visibility beyond the
      transaction-by-transaction travel booking model.
    claimRefs: [CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: S05
    title: Expansion and Concentration Risk
    body: >
      Land-and-expand is Navan's primary revenue growth engine: initial travel deployment leads to Expense, Card (Navan Card),
      Meetings & Events, VIP, and Bleisure adoption. As of January 31, 2025, 36% of customers are on 3+ offerings — demonstrating
      effective cross-sell, though the majority (64%) are still single-or-dual product customers, representing the largest
      expansion whitespace.

      Customer concentration is low: no single customer exceeded 2% of FY2025 revenue. Geographic exposure adds a different
      concentration dimension — 41% of revenue from outside the US introduces currency, regulatory, and macroeconomic risks in
      a global corporate travel cycle downturn.

      The SMB segment carries higher churn risk during economic downturns (smaller companies have less structural need for
      managed travel programs). Enterprise accounts drive the majority of GBV and revenue, but require longer sales cycles and
      higher implementation complexity. Navan's PLG channel (targeting unmanaged SMBs) may generate higher volume growth
      but at lower revenue quality.
    claimRefs: [CU021, CU022, CU023, CU024, CU025]
    tableRefs: [TU005]
    figureRefs: [FU001]

  - id: S06
    title: Adverse Signals and Diligence Gaps
    body: >
      Customer review profiles on Trustpilot, G2, Capterra, and GetApp present a mixed picture: Navan earns strong ratings
      from enterprise accounts with dedicated customer success support, but receives criticism for customer service quality,
      billing resolution delays, and reimbursement friction for individual travelers — common complaints for integrated
      T&E platforms. The active outage on status.navan.com as of May 16, 2026 ("Single Provider High Error Rate") illustrates
      the platform's supplier dependency risk and potential customer satisfaction impact.

      Key evidence gaps include: (1) gross revenue retention (GRR) is not publicly disclosed, only NRR; (2) no independent
      cohort retention data exists — the >110% NRR disclosure does not decompose into logo churn vs. expansion revenue;
      (3) named enterprise references are company-sourced, not independently verified; (4) the PLG/SMB churn rate is
      not disclosed, creating uncertainty about the quality of the 10,000+ active customer count.
    claimRefs: [CU026, CU027, CU028, CU029, CU030]

callouts:
  - title: "NRR >110% — but GRR undisclosed"
    body: "Navan reports Net Revenue Retention above 110% for FY2025 and FY2024. This demonstrates revenue durability via expansion but masks gross logo churn, which is not separately disclosed. Diligence should request GRR and cohort-level churn data."
    claimRefs: [CU016, CU017]
  - title: "Named customer evidence gap"
    body: "Named customers (Canva, HelloFresh, DoorDash, Duolingo, Steelcase) appear in Navan marketing materials but are not independently confirmed as enterprise production deployments. Request reference calls and deployment scope details in diligence."
    claimRefs: [CU011, CU013]

