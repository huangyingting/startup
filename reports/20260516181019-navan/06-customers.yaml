  evidenceGaps:
    - type: not-available
      severity: major
      topic: "Gross Revenue Retention (GRR) and multi-year contract renewal rate"
      missingEvidence: "Navan does not disclose GRR or gross logo retention separately from NRR. Multi-year vs. annual contract mix and renewal rate not disclosed."
      whyItMatters: "NRR >110% could mask high logo churn offset by aggressive expansion from retained accounts; understanding GRR and contract renewal rate is critical for assessing true customer durability"
      diligencePath: "Request GRR, segment-level churn data, vintage cohort retention, and multi-year contract renewal data in due diligence; these are the most critical missing metrics for the customers chapter"
      relatedQuestionRefs: [QU012, QU024]

    - type: partial-coverage
      severity: moderate
      topic: "Segment-level customer count and CAC by channel — table TU001 gaps"
      missingEvidence: "Navan discloses total active customer count (10,000+) but does not publicly break this down by enterprise/mid-market/SMB nor provide revenue per segment or CAC by acquisition channel (SLG vs. PLG)"
      whyItMatters: "Revenue quality depends heavily on segment mix; if 80% of revenue comes from 100 enterprise accounts, the concentration risk profile is very different. CAC determines unit economics and growth efficiency."
      diligencePath: "Request customer count and revenue by segment in due diligence; compare against peer company disclosures (TravelPerk, Brex, Concur); request SLG vs. PLG CAC data"
      relatedQuestionRefs: [QU006, QU023]

    - type: not-available
      severity: major
      topic: "Win/loss competitive data"
      missingEvidence: "No public source provides Navan's win rate vs. Concur, TravelPerk, Amex GBT, or Ramp in competitive evaluations; Navan's own website does not disclose this"
      whyItMatters: "Competitive win rate is a leading indicator of future customer growth; a declining win rate would indicate market share erosion before it appears in NRR"
      diligencePath: "Request win/loss data by competitor and segment in due diligence; check customer references for prior vendor and switching rationale"
      relatedQuestionRefs: [QU020]

    - type: not-available
      severity: moderate
      topic: "Average sales cycle length by segment and multi-year vs. annual contract mix"
      missingEvidence: "Navan does not disclose average sales cycle duration by segment (enterprise vs. SMB) or the proportion of customers on multi-year contracts. Sales cycle length is material for forecasting pipeline conversion and resource deployment."
      whyItMatters: "Enterprise SaaS sales cycle length determines CAC trajectory and sales capacity needs; multi-year contract mix indicates predictability of revenue and churn durability"
      diligencePath: "Request average sales cycle by segment, win rate by pipeline stage, and contract term mix in due diligence"
      relatedQuestionRefs: [QU022]

    - type: not-available
      severity: minor
      topic: "Named customer deployment scope — table TU003 sample coverage"
      missingEvidence: "Named customers (Canva, HelloFresh, DoorDash, Duolingo, Steelcase) appear in Navan marketing materials only; TU003 reflects only publicly disclosed names and is not exhaustive. No independent confirmation of deployment scope, product modules in use, or satisfaction level."
      whyItMatters: "Named customer logos are used to build credibility in enterprise procurement; unverified logos may reflect limited or discontinued deployments rather than full enterprise-grade production use"
      diligencePath: "Request reference calls with named customers; verify scale of deployment, modules deployed, and satisfaction; seek at least 3 enterprise reference calls as part of formal due diligence"
      relatedQuestionRefs: [QU009]
      relatedTableRefs: [TU003]

