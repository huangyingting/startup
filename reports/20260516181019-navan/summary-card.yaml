      Travel demand concentration (41% international GBV) creates macro cyclicality — COVID-type shock would impair
      revenue significantly
    - >-
      SAP Concur's deep ERP integrations defend the large enterprise segment; Ramp/Capital One expanding travel from
      expense beachhead
    - 'Dual-class governance (Class B: 30 votes/share) concentrates control with founders; limits investor influence'
    - >-
      FY2023 SOX material weakness remediated; first external 404(b) audit opinion not yet issued — governance
      uncertainty persists
    - >-
      AI model provider concentration (Ava's LLM dependency) is undisclosed — supply chain risk for the company's
      primary cost-reduction lever
  unresolvedGaps:
