companyProfile:
  summary: >-
    Navan, Inc.（原 TripActions）是一家 AI 驱动的企业差旅与费用管理平台，总部位于 California 州 Palo Alto。Ariel Cohen 和 Ilan Twig 于 2015
    年创立公司；2023 年，公司更名为 Navan，以反映产品套件已从差旅扩展到更多场景。Navan 于 2025 年 11 月以每股 $25 在 Nasdaq 完成 IPO，净募资约 $700M。截至 FY2026
    上半年，Navan 服务 16 个国家的 10,000+ 企业及中型市场客户，年化总预订额超过 $17B，公司卡平台支付额达 $3.7B。
