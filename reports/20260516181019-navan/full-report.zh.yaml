      - number: '2.3'
        title: 买方分层、用户画像与采用路径
        blocks:
          - type: paragraph
            body: >-
              企业 T&E 软件有三类需求和决策路径不同的买方 / 用户画像。（1）财务团队和 CFO 是主要经济买方，评估 TCO、政策合规、与 ERP / 会计系统集成，以及通过减少支出泄漏带来的 ROI。他们通常控制
              T&E 和企业卡项目预算。Navan 面向这一人群的卖点，是实时支出可视化、AI 驱动的政策执行，以及自动合规检查带来的成本节约。（2）差旅经理和高管助理是运营用户，负责配置差旅政策、管理航空公司 /
              酒店企业账户，并处理 VIP 和高管差旅。他们关注供应商网络广度、库存质量和例外处理便利性。（3）个人商务旅客（员工）是终端用户，直接体验预订流程、费用提交和卡权限。他们的痛点是政策摩擦拖慢个人效率；Navan
              用消费级移动 UX 解决这一点，平均 7 分钟完成一次行程预订，而传统 TMC 流程超过 45 分钟。按公司规模看，Navan 主要面向中型市场（100–2,000
              员工）和企业客户（2,000+）。由于实施复杂度和定价结构，SMB 在 Navan 当前模式下服务不足。地域上，North America（FY2025 收入的 59%）是核心；EMEA（剩余 41%
              中的大部分）是增长区域。APAC 和 LATAM 仍有低渗透潜力。费用管理和企业卡预算通常由 Finance / Treasury 掌握，差旅管理预算则由 Finance 或 Operations
              掌握。新客户采用路径通常从差旅预订开始（即时价值最高），再延伸到费用管理（自然扩展），最后采用公司卡（切换成本最高）。这种顺序采用形成漏斗，推动 Navan 达到 36% 多产品附着率和超过 110% 的
              NRR。
