            title: COVID 后商务差旅复苏推动 Navan 收入增长
            body: >-
              商务差旅支出已从 COVID 低点强劲恢复，GBTA 预测 2024 年为 $1.48 trillion，且 62% 的 CEO 计划增加预算。Navan FY2025 GBV 同比增长 32% 至
