      - number: '3.2'
        title: 主要竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              SAP Concur 是定义企业 T&E 市场的既有巨头。它 1993 年作为独立公司推出，2014 年被 SAP 以 $8.3 billion 收购，嵌入 SAP 生态，服务全球大企业。其竞争强项在于深度
              SAP ERP 集成、成熟政策引擎和市场领先装机基数；弱项包括用户界面复杂且被批评过时、作为 SAP 大业务单元创新周期偏慢，以及实施和维护的总体拥有成本高。SAP Concur 最近推出了用于差旅预订的
              'Agentic AI assistant'（Concur Travel AI）。Amex Global Business Travel（GBT）是全球最大 TMC，提供技术（Egencia
              平台）和人工差旅坐席服务的组合。2022 年，Amex GBT 通过 SPAC 合并上市（GBTG），获得公开市场资本。Amex GBT 争夺重视全服务 TMC 支持的企业账户。其 Egencia
              平台现在将差旅预订与费用对账和 SAP Concur Expense 集成。Ramp 是支出管理平台，服务 50,000+ 企业，提供公司卡、费用管理、应付账款和近期推出的差旅预订。Ramp 差旅产品使用
              Spotnana 基础设施完成预订。Ramp 的竞争优势包括 AI 驱动的财务自动化、有竞争力的交换费经济性（5% 现金返还），以及对 SMB / 中型市场摩擦更低的上手流程。Ramp 还没有 Navan
              在企业差旅上的 GDS / NDC 库存深度或供应商关系。Brex（被收购后成为 Capital One 子公司）是一体化支出管理平台，最初面向创业公司和高增长科技公司。Brex Empower
              包括公司卡、费用管理，以及基于 Spotnana 基础设施的差旅。Capital One 收购为其提供了资产负债表和银行能力。TravelPerk 是总部位于 Barcelona 的企业差旅平台，主要服务
              Europe 的 SMB 和中型市场，并越来越多进入 North America。TravelPerk 融资超过 $400M，并建立了与航空公司和酒店直接集成的模式，与 Navan 直接争夺 SMB
              账户。Expensify 拥有 15 million+ 成员，提供费用报告、公司卡和现在的差旅预订。它的强项在 SMB 和会计流程集成（QuickBooks、Xero）；但缺乏 SAP Concur 或
              Navan 的企业级 T&E 管理深度。
