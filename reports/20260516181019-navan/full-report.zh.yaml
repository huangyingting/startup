  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 业务与市场风险
        blocks:
          - type: paragraph
            body: >
              Navan 最重大的单一风险，是对企业差旅需求的深度依赖。差旅管理收入构成总收入的绝大部分；Navan 在 S-1/A 中明确披露，
              一旦出现长期差旅中断（疫情、宏观衰退、线下会议被虚拟会议长期替代），这种依赖会造成收入层面的生存风险。公司 FY2025 收入为 $536.8M， 来自 $6.6B GBV 上的 8.1% 有效抽佣率；如果
              GBV 下降 25%，约 $134M 收入会被抹掉，规模大致相当于公司从 FY2024 到 FY2025 的毛利改善。 IATA 的 June 2025
              展望指出航空业仍面临成本压力和地缘政治逆风，也说明企业差旅复苏的耐久性仍需打折。

              竞争格局构成第二项短期风险。SAP Concur 在企业 T&E 里根基很深，靠的是深度 ERP 集成；TravelPerk 正在欧洲激进扩张；金融科技竞争对手 Ramp 和 Brex（现为 Capital
              One 的一部分）也在进入一体化费用管理，直接威胁 Navan 的差旅 + 卡组合方案。Navan 的 NPS 43 和 CSAT 96%
              提供了一定缓冲，但公司未公开披露相对这些具体玩家的竞争胜率，这是关键尽调缺口。收入增长能否延续（FY2025 为 33%，H1 FY2026 为 30%），
              取决于企业差旅继续复苏、费用和卡产品交叉销售成功，以及拿下新的企业 logo。
            claimRefs:
