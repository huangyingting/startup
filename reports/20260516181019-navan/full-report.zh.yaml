      - number: '5.2'
        title: 技术架构与差异化
        blocks:
          - type: paragraph
            body: >-
              Navan 的技术架构是 AWS 云优先、基于微服务，API 集成分三层：供应商内容（航空：GDS / NDC /
              LCC；酒店：直连和聚合）、企业系统（HRIS：Workday、SuccessFactors；ERP：SAP、Oracle、NetSuite；财务：Concur 导入、QuickBooks；安全：通过
              Okta、Azure AD 接入 SSO / SAML）以及支付轨道（Navan Card 使用 Visa / Mastercard 发卡网络）。Navan Cognition 被描述为「第三代自研 AI
              框架」，在模块化图结构虚拟坐席工作流中，把 ML 模型（精度和预测能力）与
              LLM（推理能力）结合起来。该架构让专门的虚拟坐席处理复杂任务（行程修改、费用争议、政策解释），这些任务过去需要人工坐席。内置保护和实时监督保障 AI 驱动动作达到企业级可靠性。公司在多个区域可用区投入 AWS
              基础设施，使用 VPC、Security Groups、AWS KMS、传输中 TLS 和静态 AES 加密。安全项目包括年度渗透测试、CI/CD 集成安全扫描、24/7 威胁检测和事件响应预案。认证包括 SOC
              2 Type II（公司自称），并遵守 GDPR（通过欧洲子公司处理 EU 数据）、CCPA（California）和 PCI-DSS（卡支付数据）。技术差异化立在三根支柱上：（1）供应商集成深度（十多年 GBV
              规模积累出的 600+ 航空公司集成；NDC-first 架构支持更丰富内容）；（2）AI 数据优势（Navan Cognition
              使用多年企业差旅数据、预订行为和政策结果训练，竞争对手难以快速复制）；（3）统一数据层实时连接差旅预订、费用报告和卡交易，从而在支出发生点执行政策。
