      - number: '8.2'
        title: 估值背景：NAVN 指标、IPO 折价与融资历史
        blocks:
          - type: paragraph
            body: >
              Navan 的 November 2025 IPO 定价为 $25/股，按定价时约 6x LTM EV/Revenue 计算（IPO 前 LTM 收入约 $480M）。 $700M IPO
              净募资提供了强劲资产负债表跑道；按当前净亏损轨迹，现金跑道远超 FY2028。按当前 $18.46 股价，NAVN 隐含企业价值 （市值约 $3.6B 减现金约 $700M）约为 $2.9B，对应：EV/LTM
              Revenue 约 4.7x（$613M）、EV/Gross Profit 约 6.5x （按 70% 毛利率），Rule-of-40 得分约 33（30% 增长 + 3% 非 GAAP 经营利润率）。

              融资历史显示估值曾持续上行：Navan 在 September 2022 以 $9.2B 估值完成 $304M Series H；这意味着 $24-26/股的 IPO 相比 Series H 估值约折价
              60%，体现 2022-2024 年科技成长阶段估值重置。GBTA 的 2025 展望预计企业差旅支出到 2026 年恢复至疫情前水平， 并在 2029 年前每年增长 5-7%，为收入提供正向顺风。IATA 的
              June 2025 报告确认航空客运量较 2019 年高 4%，支撑 Navan 的 GBV 增长逻辑。
