      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >-
              Navan 所处市场的主要长期增长驱动，是企业财务与采购运营的持续数字化。仍依赖纸质票据、邮件审批或传统 TMC 关系的大企业，是 SaaS-first T&E 平台的天然目标。根据 GBTA 2025 BTI
              Outlook，62% 的 CEO 预计 2024 年差旅预算将高于 2023 年，说明疫情后复苏动能延续至 2025 和 2026 年。Navan 自有 Business Travel
              Index（BTI）显示，2025 年 4–6 月差旅活动按年化同比增长 15%。次级驱动来自分布式劳动力崛起：混合办公和远程员工分散在多地的公司，需要比传统总部中心化项目更复杂的费用与差旅管理。AI
              和自动化是最新增长催化剂：FY2026 上半年，Navan 的 Ava AI 聊天机器人处理约 50% 用户支持交互，证明其有潜力大规模降低 T&E 运营成本。主要采用约束包括：（1）既有系统切换成本——SAP
              Concur 与 SAP ERP 深度集成，大企业很难替换；（2）视频会议替代——Zoom、Teams 等工具压缩了常规会议的可自由支配商务差旅，限制总市场增长；（3）企业可持续 / ESG
              目标——越来越多企业承诺降低碳足迹，对商务差旅量形成逆风，但也创造了差旅数据和碳排报告工具需求，Navan 可从中变现；（4）宏观敏感性——下行周期中，企业差旅预算通常最先被砍；（5）监管复杂度——国际 T&E
              合规（VAT 退税、每日津贴规则、费用数据 GDPR）增加全球部署摩擦；（6）资本要求——Navan 的卡 / 支付产品需要营运资本和信用风险管理，带来纯 SaaS 竞争对手没有的财务复杂度。
