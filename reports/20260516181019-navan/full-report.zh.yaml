      - - 决策含义
        - 持有现有仓位；$14-16 加仓，或 GAAP 盈利消息出现后加仓；若 NRR 连续 2 个季度 <100%，退出投资逻辑
        - 以 $14-16 入场时，风险 / 回报不对称性明显改善
        - 乐观：8x FY2028E 收入；悲观：3.5x LTM 收入
    notes: 截至 2026 年 5 月 15 日（收盘价 $18.46），投资建议对价格和证据敏感。NAVN 上涨 10% 或 GAAP 亏损轨迹改善，都会把建议推向买入。非投资建议。
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    type: analysis
    description: Investment thesis arguments and counter-arguments for Navan (NAVN) as of May 2026
    sourceRefs:
      - SV013
      - SV004
      - SV010
      - SV001
    claimRefs:
      - CV004
