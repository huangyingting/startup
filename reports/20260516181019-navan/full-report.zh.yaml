      - number: '3.3'
        title: 功能对比、定价与护城河
        blocks:
          - type: paragraph
            body: >-
              相比既有玩家，Navan 的功能差异化建立在五根支柱上：（1）单一平台统一 T+E+card，而不是需要集成的点状方案；（2）消费级移动 UX，平均 7 分钟完成预订，优于传统网页界面；（3）Ava 带来的 AI
              自动化（处理约 50% 用户交互）；（4）GDS + NDC + LCC 库存，聚合 600+ 航空公司和 2M+ 住宿物业，与传统 TMC 可比；（5）通过公司卡集成，在支出发生点实时执行政策。Navan
              弱于既有玩家的地方包括：（1）SAP Concur 的 ERP 集成（SAP、Oracle、Workday）更强，对复杂企业政策配置更灵活；（2）Amex GBT 和 BCD 为复杂行程和 VIP
              高管提供人工坐席支持，而 Navan 只在高级层级提供这类服务；（3）Ramp 的 AP 自动化（应付账款、发票管理）和财务分析能力更强；（4）Brex / Capital One 在 T&E
              之外的金融产品上有银行关系优势。定价上，Navan 通常按平台订阅费加供应商经济性（航空 / 酒店佣金 / 费用）销售。企业定价通常逐单谈判。Ramp 将部分免费层作为获客策略。SAP Concur
              费用模块通常为每用户每月 $7–$9，差旅另加交易费。Navan 从 GBV 得到的 take rate 约为 8%（$537M 收入 / $6.6B GBV）。核心护城河来自：（a）跨产品切换成本——同时使用
              T+E+Card 的企业比单产品用户更难被替换；（b）供应商关系——600+ 航空 NDC / GDS 集成和十多年 GBV 规模积累出的优惠价格；（c）数据网络效应——处理的 GBV 越多，Navan
              的基准对比和异常检测越好。主要被替代风险在于 Ramp 和 Brex / Capital One 可以将费用和卡商品化，同时把差旅作为功能加入，尤其会冲击已使用其卡项目、价格敏感的 SMB 和中型市场公司。
