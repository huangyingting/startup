        title: 客户群分层
        blocks:
          - type: paragraph
            body: >
              截至 January 31, 2025，Navan 服务超过 10,000 名活跃客户，覆盖企业、中端市场和中小企业（SMB），行业横跨软件/科技、房地产、 医疗、媒体、零售和金融。公司把「活跃客户」定义为：过去
              12 个月内在 Navan 平台交易六次或以上，并产生按使用量计费收入的公司； 这个门槛意在区分真实使用和单纯注册。

              客户地域分布较广，FY2025 收入的 41% 来自美国以外客户（H1 FY2026 为 39%）。FY2025 没有单一客户贡献超过总收入的 2%， 相比典型企业 SaaS 同行，客户集中度很低。

              Navan 同时面向「受管理」客户（已有成熟 T&E 项目的企业）和「未受管理」客户（通常是此前没有差旅管理供应商的 SMB），从创业公司到全球跨国企业， 基本覆盖企业差旅全谱系。
