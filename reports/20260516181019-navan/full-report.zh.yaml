  - id: TI003
    title: 单位经济性表
    columns:
      - 指标
      - 数值 / 状态
      - 置信度
      - 重要性
      - 尽调问题
    rows:
      - - NRR（净留存率）
        - '>110%（持续披露，2+ 年）'
        - 高——公司在 S-1/A 中披露
        - 衡量现有客户扩张；>110% 代表基础客户带来有机增长
        - 索取过去 8 个季度按队列拆分的 NRR；确认按收入还是 GBV 口径计算
      - - 多产品附着率
        - 截至 Jan 31, 2025，36% 的客户使用 3+ 产品
        - 高——公司在 S-1/A 中披露
        - 切换成本深度的代理指标；多产品客户 LTV 更高
        - 披露多产品客户与单产品客户的平均收入
      - - GBV 抽成率
        - 约 8.1%（$536.8M 收入 / FY2025 $6.6B GBV）
        - 高——由公开披露指标计算
        - 平台经济性效率；优于传统 TMC（6–10%）和 OBT（2–4%）
        - 按收入流拆分抽成率（供应商经济性 vs. SaaS vs. 公司卡）
      - - 毛利率
        - FY2025 68%；H1 FY2026 72%
        - 高——公司已披露
        - 对 T&E 平台而言很强；接近 SaaS 水平毛利；印证产品组合变化
        - 按收入流披露毛利率；确认供应商经济性毛利率是在改善还是稳定
      - - CAC（获客成本）
        - 未披露
        - 无法获得——私有指标
        - 对判断回本周期和销售效率至关重要
        - 索取按客户细分（企业、中端市场、SMB）和渠道拆分的平均 CAC
      - - LTV（客户终身价值）
        - 未披露
        - 无法获得——私有指标
        - 两个指标都缺失时，无法计算 LTV/CAC；这是单位经济性承销的核心
        - 索取 LTV，或按队列提供平均合同价值和平均客户年限
      - - 回本周期
        - 未披露
        - 无法获得——私有指标
        - 资本效率关键指标；企业 T&E 通常为 12–24 个月
        - 索取或用（CAC / 每客户月毛利）估算
      - - 每活跃客户收入
        - 未披露；隐含约 $53K（$536.8M / 10,000 客户）
        - 低——分母（客户数）只是近似下限
        - ACV 代理指标；$53K+ 暗示中端市场定位；需确认客户定义
        - 索取准确客户数和每客户收入四分位分布
      - - 销售效率（魔数）
        - 未披露
        - 无法获得——私有指标
        - S&M 支出产生新增 ARR 的经营杠杆
        - 索取过去 8 个季度每季度新增 ARR / 每季度 S&M 支出
    notes: 标记为「高置信度」的指标已经披露。无法获得的指标需要在尽调中提出具体请求。 每客户收入测算假设客户数 ≥10,000；实际客户数未精确披露。
