      - number: '6.2'
        title: 采用轨迹与增长
        blocks:
          - type: paragraph
            body: >
              活跃客户数从 January 31, 2024 的 8,000 多家增至 January 31, 2025 的 10,000 多家，客户 logo 数同比约增 25%。 总预订额（GBV）从
              $3.7B（FY2024）增至 $6.6B（FY2025），意味着客户数增长之外，单客户支出强度也明显提升。

              双路径获客策略打开了更广的市场：企业/中端市场靠销售驱动增长（SLG），由客户经理和客户成功团队推进；SMB 则靠产品驱动增长（PLG），通过自助注册转化。 PLG
              这种低接触渠道降低了小客户的获客成本。每活跃客户收入从约 $50K（FY2024：$403M / 8K 客户）增至约 $54K （FY2025：$537M / 10K 客户）；即便客户基数扩大，交叉销售仍带来轻微
              ARPU 扩张。

              使用数据也印证了平台粘性：FY2025 预订中 90% 通过线上或移动端完成，降低了单笔预订支持成本；截至 January 31, 2025， 36% 的客户接入了三个或以上 Navan
              产品，说明交叉销售落地有效。
