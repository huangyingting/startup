        title: 单位经济、资本充足性与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Navan 披露的单位经济不完整。NRR 持续高于 110%，说明落地后扩张动力强。公司有 10,000+ 活跃客户，并称其中 36% 使用 3 个或更多产品；这种多产品附着是更高 LTV
              的代理指标。公司没有披露 CAC（获客成本）、LTV（客户终身价值）、回本周期或单客户收入，仅凭公开信息无法自下而上测算销售效率。68–72% 的毛利率对于一家有供应链（差旅库存）成本的 T&E
              平台而言较强；作为参照，SaaS 公司通常目标为 70–80%。毛利扩张来自收入结构转向更高毛利的卡交换费和 SaaS，以及供应商经济性流的运营杠杆。经营费用纪律已有体现：FY2025 净亏损同比改善
              57%，同时收入增长 33%，但 SBC 仍高（年化 $82M+）。IPO 后资本状况：2025 年 11 月 IPO 净募资约 $700M。结合 IPO 前手头现金（按融资历史估计为 $400M+），Navan
              在 IPO 日可能拥有 $1B+ 总现金。按 FY2026 上半年 GAAP 经营烧钱约每 6 个月 $113M（年化 $226M）计算，仅 IPO 募资就足够支撑超过 4 年。不过，实际现金消耗更低，因为
              FY2026 上半年 Non-GAAP 为正，说明现金烧钱正接近盈亏平衡。公司主要资本用途包括：销售和营销（获客）、R&D（产品开发）以及潜在 M&A（迄今已有 12+
              起收购）。公司历史上也发行过可转换票据；S-1/A 摘要章节未完整披露具体债务义务。S-1/A 披露了内部控制重大缺陷——公司重述了 FY2023 财务，并披露截至 2024 年 1 月 31
