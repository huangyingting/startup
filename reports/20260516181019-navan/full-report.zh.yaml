  - id: TU005
    title: 扩张与集中度风险表
    columns:
      - 扩张驱动 / 风险
      - 类型
      - 当前状态
      - 发生后的影响
      - 尽调路径
    rows:
      - - 产品交叉销售（Travel → Expense/Card/M&E）
        - 扩张驱动
        - 36% 客户使用 3+ 产品；64% 仍使用 1-2 个产品
        - 64% 单产品 / 双产品客户意味着仍有大量未开发收入；36% 已是多产品客户，证明模型跑得通
        - 每期跟踪 3+ 产品客户占比；索取按产品拆分的附着率队列数据
      - - SMB 客群流失风险
        - 集中度风险（客群质量）
        - 未披露 SMB 流失；PLG 渠道在增长
        - 如果 SMB 客群流失率高，10,000+ 客户数的质量会下降；NRR >110% 可能掩盖被企业扩张抵消的 SMB 流失
        - 尽调中索取按客户类型拆分的流失率；比较 PLG 队列与 SLG 队列留存
      - - 客户集中度（单一客户）
        - 集中度风险
        - FY2025 收入中无单一客户占比 >2%
        - 单客户集中度很低；相比典型 B2B SaaS 有利（前十大客户常占收入 >30-40%）
        - 后续持续监测；若收购规模更小的公司，这会是第一项尽调检查
      - - 地域集中度（美国 / 国际拆分）
        - 集中度风险
        - FY2025 美国 59%、国际 41%；H1 FY2026 美国 61%、国际 39%
        - 国际收入受欧盟宏观放缓、汇率、本地 TMC 竞争影响
        - 监测国际 NRR；尽调中索取按地区拆分的客户流失
      - - 供应商 API 依赖（差旅内容）
        - 影响留存的运营风险
        - May 16, 2026 仍在发生故障 — 航班预订报错；依赖 GDS/NDC
        - 预订失败会侵蚀客户信心并触发流失；1 天故障已在 status.navan.com 可见
        - 复核对客户的 SLA 承诺；询问事故响应时间和客户通知流程
      - - 落地后扩张速度
        - 扩张驱动
        - 36% 多产品；64% 单 / 双产品 = 扩张管线
        - 更快交叉销售节奏会拉高 NRR；若节奏放慢（Expense/Card 有竞品替代），NRR 会走低
        - 在季度指标中跟踪交叉销售转化率；按差旅队列年份比较 Expense 附着率
    claimRefs:
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
    notes: 集中度风险数据来自 S-1/A；扩张驱动分析来自 S-1/A 指标和模型假设。SMB 流失是推断风险，并非直接披露。
