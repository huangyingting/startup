chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、历史与公司结构
        blocks:
          - type: paragraph
            body: >-
              Navan, Inc. 是一家在 Delaware 注册的企业差旅与费用（T&E）管理平台，总部位于 3045 Park Boulevard, Palo Alto, California 94306。Ariel
              Cohen 和 Ilan Twig 于 2015 年 2 月以 TripActions 之名创立公司；两人此前联合创立 StreamOnce（2013 年被 Jive Software 收购）。2023
              年，TripActions 更名为 Navan，以反映产品组合已经越过差旅管理。Navan 采用双层股权结构：Class A 普通股每股 1 票，Class B 普通股每股 30 票，投票权集中在联合创始人
              Cohen（IPO 后约 24% 投票权）和 Twig（IPO 后约 43% 投票权）手中。公司于 2025 年 9 月 19 日提交 S-1，2025 年 10 月 10 日提交 S-1/A 修订稿，并于
              2025 年 11 月在 Nasdaq Global Select Market 完成 IPO，股票代码 NAVN。IPO 定价区间为每股 $24–$26，公司发行 30 million 股新 Class A
              股票，售股股东出售约 6.9 million 股。Navan 根据 JOBS Act 选择新兴成长公司身份。公司在
              Canada、UK、France、Germany、Ireland、Israel、Singapore、India、UAE、Australia 和 New Zealand 设有子公司，员工分布于 16 个国家。
