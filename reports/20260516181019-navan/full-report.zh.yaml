      - number: '8.3'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >
              Navan 的公开可比公司是 Amex GBT（GBTG），也是唯一上市的纯差旅管理公司。GBTG 交易在约 1.0-1.5x 收入，但这个比较容易误导： GBTG 以服务为主，毛利率为 30-40%，而
              Navan 是软件优先，毛利率为 72%。更合适的可比组是高增长 SaaS-金融科技公司： Ramp（私有，约 $7.65B，约 15-20x ARR）、TravelPerk（私有，估值约
              $1.4B）、Brex（Capital One 结构），以及以 5-9x 远期收入交易的上市企业 SaaS 公司。

              SAP（Concur 母公司）作为大型企业软件公司，交易在约 4.5-5x 收入；但 Concur 是 SAP 内部成熟产品，直接可比性有限。 Sabre Corporation 提供 Navan 依赖的 GDS
              基础设施，作为交易费基础设施业务交易在约 1-2x 收入。Amadeus IT 作为差旅高毛利技术平台， 交易在约 4-5x 收入。若按纯软件/金融科技可比口径（6-9x 远期收入），Navan 目前 4.7x
              LTM Revenue 看起来相对公允价值有 20-30% 折价； 这种上行可选性让当前价格比 IPO 价格更值得研究。

              可比分析的关键风险是估值倍数压缩。如果利率维持高位、SaaS 倍数继续压缩（到 4-5x 远期收入），即便在基准情景下，Navan 当前 4.7x LTM 的 EV/Revenue
              也只能提供有限上行。Reuters 报道指出，尽管非 GAAP 指标改善，Navan 的 GAAP 亏损仍压制投资者情绪。
            claimRefs:
              - CV016
              - CV017
              - CV018
