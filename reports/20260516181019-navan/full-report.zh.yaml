      - number: '3.4'
        title: 重点证据
        blocks:
          - type: callout
            title: Ramp 与 Brex / Capital One 正在加入差旅，是近期最实质威胁
            body: >-
              Ramp（50,000+ 客户）和 Brex（Capital One 子公司）都在基于 Spotnana
              基础设施，把差旅预订搭到自己的支出管理平台上。它们的卡和费用产品已经部署在数万家公司中，因此加入差旅是一个功能扩展，而不是一次全新产品销售，这会显著削弱 Navan
