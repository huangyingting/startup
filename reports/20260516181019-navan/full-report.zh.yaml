  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品平台与模块架构
        blocks:
          - type: paragraph
            body: >-
              Navan 平台由搭建在共享基础设施上的五个主要产品模块组成：（1）Navan Travel —— 面向航班、酒店、铁路和租车的在线预订工具（OBT），可通过网页和移动端访问，带有 AI 驱动搜索和 600+
              航空公司连接；（2）Navan Expense —— 自动化费用管理，捕捉票据、执行政策并更快关账；（3）Navan Card —— 嵌入费用流程的公司卡（通过发卡银行合作伙伴接入 Visa /
              Mastercard），用于实时支出控制和自动对账；（4）Navan Meetings & Events（M&E）—— 面向公司 offsite、会议和活动的团体差旅管理产品；（5）Navan Cognition
              —— 自研 AI 框架，驱动所有模块中的个性化、虚拟坐席和智能自动化。五个模块共享统一客户数据层和企业集成底座。平台服务三类用户：旅客（预订差旅的员工个人）、差旅经理 /
              财务团队（配置政策、审核支出并对账）和供应商（在 Navan 平台分销和零售的航空公司与酒店）。FY2025，90% 预订在线上或移动应用完成，显示自助采用率高。平均预订时间为 7 分钟，而外部渠道为 45
              分钟。FY2026 上半年，Ava（Navan 的 AI 虚拟坐席聊天机器人）在无人工坐席介入下处理约 50% 用户交互，显示公司已达到相当程度的 AI 自动化。
