        - ~$1.4B 估值（2022）；估计 2024 收入 ~$200-350M
        - ~4-7x EV/Revenue 估计
        - 最直接业务模式可比；以差旅为先的 SaaS，库存 + 软件模式
        - 私营公司；2022 估值可能陈旧；聚焦欧洲限制直接客户重叠
      - - SAP（Concur 母公司）
        - 企业 SaaS（大盘股）
        - ~$250B 市值；~$35B 收入
        - 估值倍数：~4.5-5x EV/Revenue
        - Concur 是 Navan 主要企业级竞争对手；SAP 倍数反映成熟、多元化业务
        - Concur 是 SAP 内部产品线；没有独立 Concur 倍数
