      - number: '8.4'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景（25% 概率）：Navan 到 FY2028 仍保持 25-28% 收入增长，毛利率扩至 75%+，到 FY2027 实现 GAAP 经营盈利， 并在盈利得到确认后受益于估值倍数扩张至 7-9x
              远期收入。按 FY2028E 收入（$1.0B）的 8x 计算，NAVN 隐含股价为 $40。 乐观情景需要企业差旅宏观环境稳定、费用/卡产品成功交叉销售至 50%+ 客户群，且没有对 SAP Concur 或
              Ramp 出现重大竞争流失。

              基准情景（45% 概率）：到 FY2028，收入增长放缓至 20-22%，毛利率稳定在 70-73%，GAAP 盈利到 FY2028 浮现。 按 FY2027E 收入（约 $850M）的 5.5-6.5x
              计算，NAVN 公允价值为 $22-28（较当前上行 20-50%）。基准情景假设存在一些宏观逆风 （选择性企业放缓）、SAP Concur 在大型企业中持续施压，以及适度 SBC 摊薄（每年约 3-4%）。

              悲观情景（30% 概率）：宏观衰退或企业差旅冻结（类似 COVID 冲击但更温和）使 GBV 下降 20-25%，收入增长降至个位数， 倍数压缩至 3-4x LTM 收入，把 NAVN 压到
              $12-15。在这种情景下，$700M IPO 现金垫能保住流动性，但投资者信心会被侵蚀。 双重股权结构会阻断激进投资者介入。
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
          - type: table
            tableRef: TV005
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
      - number: '8.5'
        title: 尽调问题与投资逻辑破裂触发点
        blocks:
          - type: paragraph
            body: >
              投资逻辑对三项近似二元风险最敏感：(1) GAAP 盈利时间——如果到 FY2027 净亏损仍持续高于 $100M，估值折价就是结构性的，不是周期性的； (2) 差旅需求耐久性——宏观因素导致 GBV 下滑
              20%+，会抹掉大部分盈利路径；(3) 竞争替代——如果 SAP Concur 赢走 Navan 企业续约的 15%+， 或 Ramp 获得实质差旅份额，NRR 会压到 100% 以下，单位经济性将被根本改写。

              加仓前的关键尽调问题：(a) 确认 FY2026 经审计 ICFR / SOX 404(b) 意见没有新的重大缺陷；(b) 用按季度、按分部（企业 vs. SMB） 拆分的队列数据验证 NRR >110%；(c)
              理解前 20 大客户续约日历，以及是否有任何账户存在风险；(d) 获取股权结构细节，包括 SAFE 转换、 期权池规模和 RSU 归属计划，以准确建模摊薄；(e) 理解 Navan Cognition 的 AI
              模型供应商集中度，以及对 OpenAI 或 Anthropic 的任何 MSA 依赖。

              Fortune 的 November 2025 IPO 报道和 Reuters 市场数据，为这些风险因素提供了定价背景。Amadeus 的企业差旅分部和 GBTA 数据确认市场顺风，
              但也凸显周期性风险，这让盈利时间问题变得尤其关键。
