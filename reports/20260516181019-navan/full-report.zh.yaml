      - CV007
    columns:
      - 投资逻辑
      - 证据
      - 反向逻辑
      - 哪些信号会改变判断
    rows:
      - - 平台集成护城河：差旅 + 费用 + 卡在同一系统
        - NRR >110%；36% 客户使用 3+ 产品；NPS 43
        - SAP Concur 的 ERP 集成更深，大型企业更难替换
        - Navan 在 Fortune 500 账户中证明可量化替换 Concur
      - - 毛利率扩张逻辑：FY2025 68% → H1 FY2026 72%
        - S-1/A；H1 FY2026 财务数据；支付量增长带动卡交换费规模
        - SBC 明显抬高 GAAP 成本；非 GAAP 利润率高估底层经济性
        - 季度文件披露经 SBC 调整利润率与 GAAP 利润率的完整调节表
      - - AI 驱动的成本结构：Ava 处理 50% 互动
        - Navan Cognition；S-1/A；Ava AI 智能体发布
        - 预订场景中的 AI 幻觉会增加运营责任；LLM 模型依赖没有对冲
        - 独立审计 Ava 准确率和预订错误频率
      - - 成长中的 T&E SaaS 类别市场领导者
        - GBTA 预计到 2029 年企业差旅支出年增 5-7%；NPS 43 高于竞争对手
        - Ramp 和 Brex（Capital One）从费用管理切入，扩展差旅能力
        - Ramp/Brex 若拿走 Navan 的 NRR 扩张管线 >15%，就会释放竞争威胁信号
      - - IPO 后估值重置创造有吸引力的入场点
        - 低于 IPO 价格 26%；4.7x EV/LTM Revenue，对比 SaaS-金融科技同行 6-9x
        - IPO 价格本身偏高；可比倍数正在压缩；GAAP 亏损是真实现金支出
        - GAAP FCF 连续 2 个季度为正
    notes: 论点都有证据支撑；每个投资逻辑要素都有具体信号，会促使分析师更新判断。并非完整清单——完整风险登记见第 7 章（风险）。
