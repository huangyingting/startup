  - id: TP003
    title: 定价 / 打包方案对比
    columns:
      - 竞争对手
      - 定价模式
      - 估计单位成本
      - 关键定价优势
      - 关键定价风险
    rows:
      - - Navan
        - 平台费 + 交易经济性（航司 / 酒店佣金）+ 卡交换费
        - 约 8% GBV 抽成率；企业合同单独议价
        - 平台价值打包；相比单点方案，总拥有成本（TCO）更低
        - Ramp/Brex 提供免费或低成本费用 + 卡方案，带来定价压力
      - - SAP Concur
        - 按用户收取 SaaS 费 + 预订交易费
        - 费用管理约 $7–9/用户/月；差旅 + 费用约 $14–16/用户/月
        - 深度企业集成支撑溢价
        - 实施成本高；合同复杂；TCO 难以横向比较
      - - Ramp
        - 基础计划免费；高级版 $12/用户/月；卡交换费模式
        - 基础功能免费；专业版 $12/用户/月
        - 免费层可作切入点；返现力度强（最高 5%）
        - 差旅深度弱于 Navan；免费层压低整个市场定价
      - - Brex (Capital One)
        - 卡交换费模式；部分 SaaS 订阅
        - 不固定；计划起价为每用户 $0
        - Capital One 银行业务集成；资产负债表可信度
        - 收购后的定价策略仍不清晰
      - - Expensify
        - 订阅 + 按报销单收费
        - 约 $5/活跃用户/月（Collect 计划）
        - 面向 SMB 简单且便宜
        - 相比企业级 T&E 平台，功能有限
      - - TravelPerk
        - 预订佣金 + StarterPerk/BusinessPerk 订阅
        - 约 $0–10/旅客/月 + 预订费
        - FlexiPerk 取消保障是独特差异点
        - 费用护城河仍在早期；定价尚未达到企业级
    claimRefs:
      - CP022
      - CP023
      - CP024
    notes: 定价估计来自公开来源（产品页面、媒体报道）以及 Navan S-1/A 的抽成率测算。 企业合同差异很大，且未公开披露。
  - id: TP004
    title: 护城河耐久度 / 竞争风险登记表
    columns:
      - 护城河 / 风险因素
      - 类别
      - Navan 站位
      - 耐久度评估
      - 风险等级
      - 备注
    rows:
      - - 多产品切换成本（T+E+Card）
        - 切换成本
        - 强：36% 的客户使用 3+ 产品；NRR >110%
        - 高——深度嵌入财务工作流
        - 多产品客户被替换风险低
        - 关键护城河；需要 2–3 年才能建成，难以替换
      - - 供应商库存接入（600+ 航司，2M+ 酒店）
        - 供给接入
        - 强：靠十多年 GBV 规模建起；拥有优选费率
        - 中——Spotnana 和 TravelPerk 也有深度集成
        - 中——并非独有；资本和时间可以复制
        - NDC 让部分优势商品化；开放 API 削弱护城河
      - - AI 原生 UX 和 Ava 虚拟智能体
        - 技术
        - 中等：Ava 处理约 50% 互动，但竞争对手也在推出 AI
        - 中——暂时优势；SAP Concur AI 等正在追赶
        - 中——到 2026 年，AI 正在变成标配
        - 必须持续投入；优势大概率只有 12–18 个月领先
      - - ERP / 会计集成
        - 数据锁定
        - 中等：集成 SAP、Oracle、Workday、NetSuite
        - 企业客户为高——数据集成深度让工作流更黏
        - 集成后为低——切换会带来数据迁移风险
        - SAP Concur 的 SAP 原生集成更深；Navan 在其他系统上基本对等
      - - 全球子公司布局（16 个国家）
        - 分销
        - 国际账户表现强；收购本地 TMC
        - 拥有自有子公司的市场为高；其他市场为中
        - 已覆盖市场为低；尚未覆盖的 APAC/LATAM 为中
        - 相比仅服务美国的平台有竞争优势；与全球 TMC 基本对等
      - - IPO 资金（$700M+ 募集净额）
        - 财务
        - 强：相较私有竞争对手拥有资本优势
        - 近期为高——可投入产品、销售和国际扩张
        - 低——IPO 前竞争对手短期内不易复制这种资本
        - Amex GBT 和 SAP 资产负债表更大；Ramp/Brex 资金也充足
      - - Ramp/Brex 把差旅作为相邻业务
        - 竞争威胁
        - 风险：二者都用 Spotnana 基础设施，在卡 / 费用产品旁边加入差旅
        - 中风险——Spotnana 缩小 Navan 的差旅护城河；交换费护城河承压
        - 高（增长风险）——如果 Ramp/Brex 做成差旅，Navan 会在重叠客群失去差异化
        - 近期最实质的竞争风险；已经在市场中发生
      - - SAP Concur 企业锁定效应
        - 竞争约束
        - 很难替换 SAP 占比高的企业中的 SAP Concur
        - 高（对 Navan 的约束）——没有 SAP 迁移，几乎不可能替换 SAP Concur ERP 集成
        - 高（机会成本）——大型企业客群大多被 Concur 锁住
        - 迫使 Navan 聚焦绿地中端市场和不满 Concur 的客户
    claimRefs:
      - CP021
      - CP022
      - CP024
      - CP025
      - CP026
    notes: 耐久度评估是基于 S-1/A 披露、竞品产品分析和行业报道作出的定性估计。 风险等级是相对于 Navan 竞争位置的判断。
  - id: TI001
    title: 收入流表
    columns:
      - 收入流
      - 机制
      - 单位经济性
      - 当前价值 / 状态
      - 收入质量
      - 尽调问题
    rows:
      - - 供应商经济性（差旅预订）
        - 每次预订的航司预订费、酒店佣金、供应商支付的超额返点；按净收入确认
        - 占 GBV 的百分比；差旅部分估计为 5–6%
        - 最大收入流；FY2025 约 $6.6B GBV 产生收入
        - 中——依赖差旅量周期；与 GBV 挂钩，不是经常性 SaaS
        - 按收入流披露收入；确认各收入流按净额还是总额处理
      - - SaaS 平台费
        - 向企业 / 中端市场客户收取按席位或按平台计费的订阅费
        - 每客户 ACV（年度合同价值）；未披露
        - 贡献重要；未单独披露
        - 高——经常性；NRR >110% 说明在扩张
        - 单独披露 SaaS ARR；确认合同期限结构和续约率
      - - 公司卡交换费
        - Navan Card（Visa/Mastercard）交易量产生的交换费收入；FY2025 支付量 $3.7B
        - 占支付量的百分比；标准交换费总额约 1.5–2.5%；扣除处理成本后净额约 0.5–1%
        - FY2025 支付量 $3.7B（同比 +35%）
        - 高——随公司卡采用率放大；经常性且自动发生
        - 披露留存的净交换费；确认公司卡项目经济性和发卡行条款
      - - 高级功能和内容费
        - 高级差旅内容接入（商务舱库存、酒店优选费率）、礼宾服务、 会议与活动管理收费
        - 混合；占总额小
        - 规模小但在增长；未单独量化
        - 中——平台附加项
        - 量化其占总收入比例；确认是否有重要企业合同包含高级层级
    notes: Navan 未在 S-1/A 中把收入拆分到这些收入流。收入流分配基于行业可比公司和隐含指标 （GBV 抽成率、支付量）估计。尽调问题按重要性排序。
