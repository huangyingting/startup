  - id: FV001
    title: 投资建议逻辑
    type: flow
    description: 从 Navan 基本面信号到风险因素，再到有条件持有建议和买入触发条件的决策链
    sourceRefs:
      - SV013
      - SV001
      - SV004
      - SV016
    notes: 流程代表投资建议的逻辑链；箭头表示因果 / 顺序依赖。建议截至 2026 年 5 月 15 日（NAVN 收盘价 $18.46）。
    data:
      nodes:
        - id: n1
          label: 平台基本面强
          description: NRR >110%，毛利率 72%，增长 30%，客户 10,000+，NPS 43 —— 在企业 SaaS 中位居前四分位
        - id: n2
          label: GAAP 盈利尚未确认
          description: FY2025 净亏损 $181M；FY2026 H1 净亏损 $100M；FY2026 H1 首次实现非 GAAP 利润 $11M；GAAP 缺口仍在
        - id: n3
          label: 相对可比公司估值有吸引力
          description: EV/LTM 收入 4.7x，而 SaaS 金融科技同业为 6-9x；IPO 折价 26%，提供安全边际
        - id: n4
          label: 存在重大风险
          description: 商旅集中度（国际业务 41%）、双重股权治理、GAAP 亏损、股价表现落后
        - id: n5
          label: 风险 / 回报平衡：中性到小幅正向
          description: 基准情景上行 20-50%；悲观情景在 $18.46 入场价下行 20-30%；$14-16 时不对称性改善
        - id: n6
          label: 有条件持有 — $14-16 或 GAAP 盈利时买入
          description: 持有现有仓位；只有在股价明显回调或 GAAP 盈利确认后加仓；投资逻辑仍在，但尚未被股价充分反映
        - id: n7
          label: 否决条件
