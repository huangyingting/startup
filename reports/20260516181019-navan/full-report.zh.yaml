      - number: '6.5'
        title: 扩张与集中度风险
        blocks:
          - type: paragraph
            body: >
              先落地再扩张是 Navan 最主要的收入增长引擎：先部署差旅，再带动 Expense、Card（Navan Card）、Meetings & Events、VIP 和 Bleisure。 截至 January
              31, 2025，36% 的客户使用 3+ 个产品，说明交叉销售有效；但多数客户（64%）仍只使用一到两个产品，也构成最大的扩张空白。

              客户集中度低：没有单一客户超过 FY2025 收入的 2%。地域敞口带来另一种集中度问题——41% 收入来自美国以外，一旦全球企业差旅周期下行， 货币、监管和宏观风险都会放大。

              SMB 客群在经济下行时流失风险更高，因为小公司对受管理差旅项目的结构性需求较弱。企业客户贡献大部分 GBV 和收入，但销售周期更长、实施复杂度更高。 Navan 面向未受管理 SMB 的 PLG
              渠道可能带来更高客户量增长，但收入质量更低。
