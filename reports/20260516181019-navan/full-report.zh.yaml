  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与来源
        blocks:
          - type: paragraph
            body: >-
              Navan 的收入模式由四类来源构成。最大一类是供应商经济性：航空预订费、酒店佣金和供应商支付的 override，类似传统 TMC；GBV
              流经平台时，这部分按净额确认。第二类是向企业客户按席位或平台访问权收取的 SaaS 平台费，提供类似订阅的经常性收入。第三类是公司卡交换费：使用 Navan Card（Visa /
              Mastercard）时，Navan 作为卡项目运营方捕捉交换费收入。第四类是面向旅客和差旅经理的供应商内容访问费和高级功能。Navan 未在 S-1/A 中按这些来源拆分收入，只披露总收入和毛利。公司对 GBV
              的有效 take rate 约为 8.1%（FY2025 收入 $536.8M / GBV $6.6B），高于传统 TMC 6–10% 的区间下沿并处于可比水平，也高于纯 OBT（在线预订工具）平台通常 2–4%
              的 take rate。这个溢价 take rate 暗示，除供应商经济性外，SaaS 费用和卡交换费也有实质贡献。收入主要在预订发生期间确认（供应商经济性、卡交换费），或在合同期内按比例确认（SaaS
              费用）。公司没有披露递延收入或 backlog，难以精确评估经常性收入质量。NRR 持续高于 110%，意味着现有客户在平台上的支出正在扩张，部分来自差旅自然恢复，部分来自多产品增购。
