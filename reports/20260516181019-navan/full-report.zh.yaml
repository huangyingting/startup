      - number: '6.4'
        title: 留存、耐久性与满意度
        blocks:
          - type: paragraph
            body: >
              截至 January 31, 2025 和 January 31, 2024，Navan 的净收入留存率（NRR）均超过 110%。这是一线 SaaS 留存水准， 说明既有客户平均每年在 Navan 上多花超过
              10%，来源是使用量增长和产品交叉销售。NRR >110% 通常对应强劲的客户 logo 留存 （企业软件平台一般 >85-90%）叠加有意义的净扩张。

              CSAT（96%）和 NPS（43）对企业差旅平台来说都很强（行业 CSAT 基准通常为 70-85%；企业软件 NPS >40 通常算优秀）。 两项指标均由公司自行测量，未经独立审计。

              平台的先落地再扩张结构带来自然耐久性：Navan 的差旅预订通过集成费用、卡和政策管理形成流程锁定，客户切换到竞争对手在运营上很复杂。 费用管理的年度和多年期订阅合同，也让收入可见度超出逐笔交易的差旅预订模型。
