        - 索取队列留存曲线、平均客户年限，以及按细分拆分的流失率
      - - 重大缺陷整改状态
        - FY2023 重述和 FY2024 内控重大缺陷抬高财务报表风险
        - 历史期间置信度低 —— 重大缺陷意味着过往财务数据可能含有错误
