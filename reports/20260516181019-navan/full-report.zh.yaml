      - number: '1.2'
        title: 管理层、董事会与治理
        blocks:
          - type: paragraph
            body: >-
              Ariel Cohen 于 2015 年 2 月联合创立 Navan，并自创立以来担任 CEO 和董事长。创立 Navan 之前，他在 StreamOnce 被 Jive 收购后担任 Jive Software
              产品管理副总裁（2013–2015），此前在 HP（2006–2010）担任高级职位。Cohen 拥有 College of Management Academic Studies 经济学学士学位，以及
              Northwestern Kellogg Executive MBA。Ilan Twig 联合创立 Navan，并自创立以来担任 CTO。他曾任 Jive Software 工程执行副总裁（2013–2015）和
              RockMelt 工程负责人（2010–2012）。Twig 拥有 Academic College of Tel-Aviv, Yaffo 计算机科学学士学位。Amy Butte 于 2024 年 6
              月加入并担任 CFO，曾任 New York Stock Exchange CFO（2004–2006）和 Man Financial CFO（2006–2008）。Michael Sindicich 于
              2025 年 3 月获任总裁，此前曾任 Navan Expense CEO（2023 年 4 月至 2025 年 3 月）。Howard Baik 担任总法律顾问兼秘书。董事会成员包括 Ben
              Horowitz（Andreessen Horowitz，2018 年 10 月加入）、Arif Janmohamed（Lightspeed Venture Partners，2017 年 4
              月加入）、Michael Kourey（Dialpad 和 Okta 前 CFO，2024 年 10 月加入）、Oren Zeev（Zeev Ventures）以及 Anré
              Williams。公司采用三类分期董事会。Cohen 与 Twig 在 IPO 后合计控制约 67% 投票权，构成显著关键人物风险，也限制了少数股东影响战略决策的能力。
