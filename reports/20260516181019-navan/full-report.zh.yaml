  productSummary: >-
    Navan 提供一体化平台，组合三块能力：（1）Travel —— AI 驱动的差旅预订，接入 GDS，并覆盖 2M+ 酒店和所有主要航空公司库存；（2）Expense —— 自动化费用报销、票据捕捉和政策执行；（3）Cards
    —— Navan Cards（Visa 企业卡），提供实时支出控制和自动对账。AI 层（Navan Cognition / Ava）处理约 50% 旅客交互，并自动执行政策合规。
  customerFocus: 企业和中型市场公司（主要为 100–10,000+ 员工）；国际差旅贡献 41% 的 GBV；36% 的客户使用 3 个或更多 Navan 产品。
  businessModel: 订阅 SaaS 费用，加上供应商佣金（GDS / 酒店返佣）、公司卡交换费收入（主要毛利扩张引擎）以及实施 / 服务费。来自 $3.7B 支付额的卡交换费，是毛利最高的收入流。
