    notes: 倍数是分析师基于截至 2026 年 5 月的公开市场数据和已披露私募融资轮所作估计；私营公司财务数据为估计值。该表不意在覆盖完整可比公司集合——只限最相关的公开可得基准。
  - id: TV005
    title: 投资逻辑破坏与止损触发因素表
    type: analysis
    description: >-
      Thesis-break and kill-criteria triggers for the Navan investment case — monitorable events that would cause a
      recommendation change
    sourceRefs:
      - SV013
      - SV001
      - SV004
      - SV016
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
    columns:
      - 触发因素
      - 阈值 / 事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - NRR 低于 100%
        - NRR 连续两个季度 <100%
        - 表明客户流失超过扩张——产品市场契合度削弱或被竞争替代
        - 卖出：核心多产品扩张逻辑破裂
      - - GAAP 净亏损较 H1 FY2026 速度扩大
        - FY2026 全年净亏损 >$200M（对比 H1 $100M）
        - 盈利时间表推迟到 FY2028 之后；烧钱加速；后续融资风险
        - 卖出或大幅减仓
      - - 重大差旅需求冲击（GBV -20%+）
        - GBV 连续两个季度同比下滑 >20%（宏观衰退或疫情）
        - 收入下滑；毛利率受压；GAAP 盈利无限期推迟
        - 降至最小仓位；等待复苏入场点
      - - 发现 SOX 404(b) 重大缺陷
        - 外部审计师在 FY2026 审计中发现新的重大缺陷
        - 可信度受损；潜在重述；投资者信心崩塌
        - 披露后立即卖出
      - - 关键客户流失信号
        - 披露具名企业客户离开（每家 >$20M ARR），或 NRR 披露显示企业细分 NRR <105%
        - 竞争替代得到确认；定价权变弱
        - 减仓；重新评估竞争护城河
      - - NAAM 股价低于 $12
        - NAVN 收盘价连续 5+ 个交易日低于 $12（意味着 <3x EV/Revenue）
        - 表明市场正计入严重悲观情景；可能存在流动性或治理风险
        - 重新评估：深度承压时可能买入；若基本面受损则退出
    notes: 触发因素是基于投资逻辑的启发式指标，不是正式投资规则。所有触发因素都需要重新评估投资逻辑——行动应结合最新公司披露和市场背景确认。
  - id: TV006
    title: 最终尽调问题清单
    type: analysis
    description: >-
      Prioritized list of outstanding diligence questions and information requests for Navan investor due diligence as
      of May 2026
    sourceRefs:
      - SV013
      - SV001
      - SV004
    claimRefs:
      - CV035
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 按季度拆分的 GAAP FCF 与烧钱速度
        - 尚未发布季度现金流量表，只有年度数据；H1 FY2026 非 GAAP 盈利与 GAAP 现金消耗之间关系不清楚
        - GAAP FCF 为正或持平，是上调至买入最重要单一信号
        - 投资者关系；可用时查看 8-K 季度文件
      - - 按客户细分的 NRR
        - NRR >110% 是公司整体口径；没有企业 vs. SMB 拆分；SMB 队列可能掩盖企业客户流失
        - 如果 SMB NRR 为 130%+、企业 NRR 为 100%，投资逻辑就比标题数字更弱
        - 管理层电话会；尽调数据室中的分细分 NRR 瀑布图
      - - SOX 404(b) 审计意见
        - 尚未出具（上市公司首个完整年度；FY2026 年末为 2026 年 1 月 31 日）；FY2025 管理层声明无异常
        - 新的重大缺陷会打破投资逻辑；无保留意见确认内部控制整改可持续
        - 10-K 文件；通过 IR 获取审计师函
      - - 股权结构表：SAFE、期权池、RSU 归属
        - S-1/A 显示 200M+ 完全摊薄股份；RSU 归属时间表、SAFE 转换条款和 IPO 后期权池披露不完整
        - SBC 每年带来 3-5% 稀释，可能在 3-5 年内实质压缩回报
        - S-1/A 股权结构表附件；管理层补充披露
      - - AI 供应商集中度
        - Navan Cognition（Ava）处理 50% 互动；LLM 供应商未披露；存在 OpenAI/Anthropic API 依赖风险
        - 供应商集中带来供应链风险；模型停用或价格变化会影响成本结构和可靠性
        - 直接询问管理层；对 AI 技术栈做技术尽调
      - - 企业客户续约日历
        - 未披露合同期限、续约日期或风险账户；最大客户 <2% 收入，但队列续约风险未知
        - 如果未来 12 个月有 20%+ GBV 续约，留存就是增长轨迹的关键
        - 投资者数据室；管理层管线沟通
    notes: 尽调问题按对投资逻辑的重要性排序；前 3 项是买入建议的门槛因素。第 4-6 项对仓位大小和情景校准重要。
