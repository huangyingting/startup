      - number: '7.4'
        title: 监管、网络安全与 AI 风险
        blocks:
          - type: paragraph
            body: >
              Navan 覆盖 16 个国家，监管敞口很大。EU/UK 业务必须满足 GDPR 合规，要求与所有企业客户签署数据处理协议、响应数据主体访问请求， 并在 72 小时内报告数据泄露。英国脱欧后的 UK GDPR
              成为独立制度，有自己的监管机构（ICO）。在新加坡，卡和支付业务适用 MAS 金融服务监管。 EU Interchange Fee Regulation（IFR）把消费者卡交换费上限设为 0.3%（信用卡）和
              0.2%（借记卡），限制了欧洲卡收入经济性， 虽然该法规未必适用于所有商业卡产品。作为新上市公司，SOX Section 404 合规义务又增加了美国本土监管负担。FTC 已加大对金融产品中 AI 宣称的审查，
              可能影响 Navan 如何营销 Navan Cognition 的费用分类和差旅推荐能力。

              对差旅管理公司来说，网络安全风险很尖锐。GovInfoSecurity 记录显示，差旅管理公司因持有大量个人、财务和行程数据，越来越多地成为网络犯罪目标。 Navan 为 10,000+
              企业客户处理敏感差旅、支付和 PII 数据；一旦发生重大数据泄露，就会触发多个司法辖区的监管通知要求，并可能损害客户信任。 发卡业务必须满足 PCI DSS Level 1 合规。

              Navan Cognition 和 Ava AI 智能体带来新的运营风险维度；后者在 H1 FY2026 处理约 50% 的客户互动。差旅预订中的 AI 幻觉可能导致预订错误、 违反政策或合规失败；模型依赖第三方
              LLM 供应商，会产生供应链风险；新兴 AI 监管还可能要求披露由 AI 生成的客户互动。
            claimRefs:
              - CR011
              - CR012
              - CR015
              - CR018
              - CR019
              - CR033
