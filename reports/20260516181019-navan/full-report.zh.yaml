  - id: TE002
    title: 工作流 / 使用场景表
    columns:
      - 用户待完成任务
      - 当前流程（不使用 Navan）
      - Navan 方案
      - 可衡量收益
      - 已知限制
    rows:
      - - 预订商务差旅
        - 员工进入 OBT（Concur、Egencia）或致电差旅代理；在 Expedia 比价；提交审批
        - 员工在 Navan（网页 / 移动端）预订；政策自动执行；600+ 个航司选项；平均用时 7 分钟
        - Booking.com 基准显示 7 分钟 vs. 外部 45 分钟；90% 自助；成本符合政策
        - 7 分钟基准来自 Booking.com，未独立验证；可能随行程复杂度变化
      - - 提交报销单
        - 员工收集票据；手动录入 Concur 或电子表格；提交经理审批；财务月底对账
        - Navan Card 自动采集交易；AI 自动编码类别；消费发生时执行政策；一键审批
        - 减少手工录入；接近实时对账；量化收益未披露
        - 票据采集准确率未独立跑分；复杂报销类型可能仍需人工介入
      - - 执行差旅政策
        - 差旅经理在 Concur 中配置政策；OBT 展示合规选项；超政策事项需要人工审批
        - Navan 在预订和刷卡时实时执行政策；内置升级流程；AI Ava 向差旅员工解释政策
        - 政策合规改善；超政策预订率未披露
        - 多政策轨道的全球企业配置复杂度未跑分
      - - 管理公司异地会议或活动
        - 活动策划用 Cvent 或 Envision 管理团队差旅；预订、邀约、成本管理各用一套工具
        - Navan M&E：集中管理参会者预订、RSVP 跟踪、团队酒店价、成本报告
        - 单一平台消除点状工具碎片化；成本节省未独立量化
        - M&E 不如纯活动管理工具成熟；大型活动上相对 Cvent 存在竞争差距
      - - 支持滞留旅客
        - 旅客致电 TMC 代理或直接联系航司；通常等待 30–60 分钟
        - Ava 虚拟智能体自动处理约 50% 的互动；升级事项可在数分钟内转 24/7 真人客服
        - 约 50% 的互动无需真人客服即可处理（H1 FY2026）；客服分流降低运营成本
        - Ava 处理率衡量的是客服分流，不是问题解决率；AI 处理案例的满意度未披露
