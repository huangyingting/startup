  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Navan 的竞争格局横跨三组重叠赛道。企业差旅管理中，它与 Amex GBT、BCD Travel 等靠人工坐席处理预订的传统差旅管理公司（TMC）竞争，也与 SAP Concur
              Travel、TravelPerk 等现代 OBT（在线预订工具）平台竞争。费用管理中，SAP Concur Expense 是主导型既有玩家，Expensify、Certify、Emburse 和 Zoho
              Expense 是第二梯队。企业卡和支出管理中，Ramp（现服务 50,000+ 企业）、Brex（自 2025–2026 年起为 Capital One 全资子公司）以及 Brex（收购 Brex
              的一方）构成主要竞争威胁，因为这些公司正在把差旅预订加到支出管理平台中。第四组竞争来自 ERP 厂商纵向整合：SAP S/4HANA 内嵌 Concur，对大企业形成锁定风险；Oracle
              Expenses（Oracle Cloud ERP 的一部分）服务 Oracle 既有客户群。没有单一竞争对手能在 Navan 的规模和深度上提供完整 T&E + 卡全栈整合。Amex GBT（American
              Express Global Business Travel）是全球最大 TMC，FY2023 收入约 $2.3 billion，服务数千个企业账户；它推出的 'Egencia' 统一 T&E 平台（原
              Booking Holdings 子公司）直接竞争 Navan 的现代预订 / 费用界面。SAP Concur 是主导型企业费用与差旅平台，并与 SAP ERP
              集成；按企业装机基数计算，它已经领先市场十多年。Spotnana 是新一代差旅基础设施创业公司（Travel-as-a-Service），为 Brex Empower 等平台和其他 TMC
              现代化项目提供底层能力；它在基础设施层竞争，不直接面向终端客户。
