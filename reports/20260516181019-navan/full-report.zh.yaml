      - number: '2.2'
        title: 市场规模、细分与 TAM/SAM/SOM
        blocks:
          - type: paragraph
            body: >-
              Global Business Travel Association（GBTA）估计，2024 年全球商务差旅支出为每年 $1.48 trillion，已从疫情低点强劲恢复。美国约占其中 $472
              billion（World Travel & Tourism Council / WTTC）。商务差旅市场预计到 2027 年达到 $829.5 billion（ReportLinker /
              多个预测来源）。这些数字涵盖企业旅客在航班、酒店、地面交通和餐饮上的全部支出，不只是软件 / 服务。Navan 自报的 $185 billion TAM 使用更窄的软件可服务口径：受管理差旅管理服务（约
              $86B）、费用管理软件（$39B）和企业卡支付交换费（$37B，加上 $24B 商务休闲旅行）。更保守的自下而上测算中，受管理企业差旅软件 / 服务市场（供应商收取服务费、SaaS
              费和供应商佣金）被行业分析师估计为 2024 年全球约 $15–20 billion，到 2028 年扩张至 $25–30 billion。费用管理软件市场本身（纯 SaaS）估计 2024 年为 $6.6
              billion，CAGR 约 10–12%（MarketsandMarkets 相邻估算）。Navan 的可服务市场（SAM）更适合定义为：（a）有国际差旅和费用管理需求的中型市场与企业客户（50–10,000+
              员工），（b）主要位于 North America 和 EMEA，（c）能够采用统一 SaaS + 卡解决方案。Navan 当前 10,000+ 活跃客户基数，大约覆盖美国 600,000+ 家 50+
              员工、可能受益于受管理 T&E 的企业中的 1–2%。近期可获取市场（SOM）受企业销售周期、既有系统切换成本（尤其是 SAP Concur）和 Navan 当前地域覆盖限制。Navan FY2025 的
              $6.6 billion 总预订额，大约相当于美国年度企业差旅支出的 1–2% 渗透率。
