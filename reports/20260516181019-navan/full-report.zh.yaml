      - number: '7.3'
        title: 财务与内部控制风险
        blocks:
          - type: paragraph
            body: >
              Navan 的财务风险集中在三点。第一，GAAP 经营亏损持续存在：$332M（FY2024）和 $181M（FY2025）的净亏损说明公司还没有证明可持续盈利。 H1 FY2026 首次实现非 GAAP
              经营利润（$11M）是积极里程碑，但 GAAP 盈利取决于能否控制股权激励费用（SBC）；SBC 大幅推高了报告亏损。 SBC 抬高了 FY2025 GAAP 成本，持续的 RSU 归属还会继续摊薄。

              第二，重大缺陷历史留下可信度尾部风险。Navan 在 FY2023 识别出内部控制重大缺陷，导致 FY2022 和 FY2023 财务报表重述。 截至 January 31,
              2025，公司宣布重大缺陷已修复；但作为新上市公司，Navan 需要提交首次 SOX Section 404(b) 审计师鉴证， 外部审计师继续发现控制缺陷的风险仍然较高。

              第三，NAVN 截至 May 15, 2026 的股价为 $18.46，较 November 2025 IPO 发行区间 $24-26 低约 25-28%，反映市场对盈利轨迹仍有疑虑。
              股价低迷会影响员工留任（股权激励水下）、未来融资（更高摊薄）和并购支付能力。可转债以 65% 折扣转股、SAFE 以 IPO 价格 85% 转股， 对以 $25 发行价买入的投资者造成了即时摊薄。
