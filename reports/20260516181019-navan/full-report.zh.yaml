      - number: '1.4'
        title: 规模、指标与关键里程碑
        blocks:
          - type: paragraph
            body: >-
              Navan 服务超过 10,000 个活跃客户（截至 2025 年 1 月 31 日），公司将其定义为过去 12 个月内在平台交易 6 次或以上并产生使用型收入的企业。截至 2025 年 7 月 31
              日，公司全球约有 3,400 名员工。收入从 FY2024（截至 2024 年 1 月 31 日）的 $402 million 增长至 FY2025（截至 2025 年 1 月 31 日）的 $537
              million，同比增长 33%；FY2026 上半年收入同比增长 30%（$329 million vs. $254 million）。FY2025 总预订额达到 $6.6 billion，较 FY2024 的
              $5.0 billion 增长 32%。FY2025 支付额增长 35% 至 $3.7 billion。截至 2025 年 1 月 31 日和 2024 年 1 月 31 日，净留存率（NRR）均超过
              110%，说明现有客户队列扩张强劲。毛利率从 FY2024 的 60% 提升至 FY2025 的 68%。FY2025 国际收入占总收入 41%。FY2026 上半年，Navan 的 AI 聊天机器人 Ava
              在无人工客服介入下处理约 50% 用户交互。公司收购了 6 家公司以扩大国际业务：R&M（UK，2021 年 4 月）、Comtravo（Germany，2022 年 2
              月）、Resia（Scandinavia，2022 年 3 月）、Atlanta（Spain，2022 年 11 月）、Tripeur（India，2023 年 4 月）和 Regent（Italy，2024 年
              6 月）。公司此前曾识别出内部控制重大缺陷（截至 2023 年 1 月 31 日的财年），并在 FY2025 结束前完全整改。
