  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              Navan 处在三个相邻市场的交汇点：企业差旅管理、费用管理、企业支付 / 公司卡。公司将全球总可用市场定义为约 $185 billion，构成为商务差旅管理（$86
              billion，含受管理与非受管理差旅）、费用管理（$39 billion）、企业支出带来的支付交换费 / 浮存收益（$37 billion），再加上商务休闲旅行（$24
              billion）。这些估算由公司自行定义，应视为方向性判断，而非权威口径；第三方对受管理 T&E 软件细分市场的研究规模要小得多。这里必须区分「总差旅支出」（总交易流水）与「软件 /
              服务可变现市场」：全球企业差旅支出（机票、酒店、铁路）规模达数千亿美元，但 Navan 这类供应商只能通过软件订阅费、实施 / 服务收入和公司卡支出交换费捕捉其中一部分。Navan FY2025 的 $6.6
              billion 总预订额代表其处理的差旅支出，只占总市场很小一部分；$537 million 收入才反映它从这些流水中实际捕捉的经济价值。现状替代方案包括传统差旅管理公司（TMC），如 Amex Global
              Business Travel（GBT）和 BCD
              Group，它们靠人工坐席处理预订；也包括员工在正式受管理差旅计划之外使用的消费级预订平台（Expedia、Booking.com）。费用管理方面，电子表格、邮件审批链和会计软件集成（QuickBooks、NetSuite）仍是
              SMB 常见替代方案。发卡机构（Citi、Amex、Chase）提供但未集成费用软件的企业卡项目，是另一类替代方案。相邻市场包括会议与活动（M&E）管理、HR / 薪资（与费用报销重叠）、采购（Ramp 和
              Brex 正在扩张）以及差旅风险管理（duty of care）。Navan 已用自研产品进入 M&E，但尚未宣布企业采购软件。若计入支付交换费，Navan 的潜在经济版图带有超越纯 SaaS
              的金融服务属性，类似 Brex 和 Ramp 将金融产品嵌入软件平台的策略。
