      - number: '1.5'
        title: 重点证据
        blocks:
          - type: callout
            title: 全栈 T&E 平台具备网络效应
            body: >-
              Navan 将差旅预订、费用管理和公司卡打成一体，形成交叉销售飞轮：36% 客户接入 3 个或更多产品，NRR 持续高于 110%。这种粘性让 Navan
              可以从存量客户获得耐久收入扩张，而不需要按比例增加新客获取成本。
