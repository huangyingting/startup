      - number: '4.2'
        title: 历史财务表现与趋势
        blocks:
          - type: paragraph
            body: >-
              Navan 收入从 FY2024（截至 2024 年 1 月 31 日）的 $402.3M 增长至 FY2025（截至 2025 年 1 月 31 日）的 $536.8M，增幅 33%。FY2026
              上半年（2025 年 2 月 1 日至 7 月 31 日）收入为 $329.4M，同比 FY2025 上半年增长 30%，折合年化运行率 $658.8M。GBV 从 FY2024 的 $5.0B 增至
              FY2025 的 $6.6B（同比 32%），支付额从 $2.7B 增至 $3.7B（同比 35%）。毛利显著扩大：毛利率从 FY2024 的 60% 提升至 FY2025 的 68%，再到 FY2026
              上半年的 72%；驱动因素包括收入结构转向更高毛利的 SaaS 和卡交换费、供应商经济性产生运营杠杆，以及人效提升。GAAP 净亏损大幅收窄：从 FY2024 的 $332M 降至 FY2025 的
              $181M，再到 FY2026 上半年的 $100M，说明通往盈利的路径在加速。Non-GAAP 经营利润在 FY2026 上半年转正至 +$11M，这是公司首次 Non-GAAP 经营期为正。这对 IPO
              叙事很关键：IPO 时，Navan 将自己定位为「Non-GAAP 基础上已盈利」。GAAP 与 Non-GAAP 结果之间的差额（FY2026 上半年约 $111M）主要来自股权激励费用（年化
              $82M）和收购相关摊销。截至 2025 年 7 月 31 日，公司累计亏损达到 $1,717M，反映多年增长投入。FY2026 上半年 GAAP 经营亏损约 $113M，在 +$11M 的 Non-GAAP
              正向调整前，意味着 Non-GAAP 调整约 $124M。
