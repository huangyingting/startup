      - number: '7.2'
        title: 基础设施与运营风险
        blocks:
          - type: paragraph
            body: >
              Navan 的运营基础设施有两项关键依赖风险。第一是 GDS 依赖：企业差旅预订需要接入航空库存、酒店价格和租车内容， 这些内容通过 Sabre、Amadeus 和 Travelport
              运营的全球分销系统分发。航空公司越来越多地通过绕开传统 GDS 的 NDC （New Distribution Capability）渠道提供独家内容；如果这种内容迁移加速，Navan 在没有大额 NDC
              集成投入的情况下， 会面临成本上升或内容质量下降。January 2026 与 Booking.com 的酒店库存合作补上了内容缺口，但也加深了对单一供应商关系的战略依赖。

              第二是银行合作伙伴集中度：Navan Card 的美国业务跑在 Celtic Bank（FDIC 保险）之上，EU/UK 业务使用 Stripe 和 Adyen N.V.。 Celtic Bank
              若出故障、遭监管处罚，或在重谈条款时变得不利，Navan 就需要迁移发卡项目；这通常要 6-18 个月。Adyen 受多套监管框架约束 （荷兰 DNB、英国 FCA、美国
              Fed），带来跨司法辖区合规风险。发卡业务必须达到 PCI DSS Level 1 合规；任何涉及卡数据的数据泄露， 都会触发强制通知、潜在罚款和声誉损害。

              平台可靠性是第三项运营风险。Navan 状态页在 May 16, 2026（本评估日期）记录了一起仍在进行的「Single Provider High Error Rate」事件，
              证实影响客户预订的线上平台中断确实会发生。Trustpilot 和 G2 评价者也反复提到客服响应和费用流程故障。
