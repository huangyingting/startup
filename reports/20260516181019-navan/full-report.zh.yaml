              S-1/A 没有列出单个客户名称，而是披露客户多样性和集中度数据。Navan 在 Gartner Peer Insights、G2、Trustpilot 和 GetApp 上有评价记录，
              为客户体验提供了一些第三方验证；但大多数评价网站身份匿名，或来自自我选择的样本。

              Navan 披露的客户成效包括：差旅支出相对预算的中位节省约 15%（部分客户最高节省 25%）、平均预订时间 7 分钟而行业基准为 45 分钟 （据 Booking.com），以及 H1 FY2026 的
              96% CSAT 和 43 NPS。
