      - number: '6.6'
        title: 反向信号与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Trustpilot、G2、Capterra 和 GetApp 上的客户评价呈现混合图景：有专属客户成功支持的企业账户给 Navan 较高评分，但个人差旅者批评客服质量、 账单处理延迟和报销摩擦；这也是一体化
              T&E 平台的常见抱怨。截至 May 16, 2026，status.navan.com 上仍有「Single Provider High Error Rate」
              活跃故障，凸显平台供应商依赖风险，以及可能对客户满意度造成的影响。

              关键证据缺口包括：(1) 总收入留存率（GRR）未公开披露，只有 NRR；(2) 没有独立的队列留存数据，>110% NRR 披露没有拆分客户 logo 流失和扩张收入； (3)
              具名企业客户引用来自公司，未经独立验证；(4) PLG/SMB 流失率未披露，使 10,000+ 活跃客户数的质量存在不确定性。
