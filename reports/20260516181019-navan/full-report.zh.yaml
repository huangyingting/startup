      - number: '1.3'
        title: 融资历史、估值与资本结构
        blocks:
          - type: paragraph
            body: >-
              自 2015 年创立以来，Navan 通过多轮融资累计募集超过 $1.2 billion 风险资本。关键融资节点包括 2022 年 7 月至 9 月完成的 Series G 和 Series G-1，募集约
              $154 million，Andreessen Horowitz 和 Lightspeed Venture Partners 参与；以及 2022 年 11 月以 $9.2 billion 估值完成的 $304
              million Series H。2020 年，公司发行 $125 million 无担保可转换票据；2025 年 2 月和 4 月，Navan 通过未来股权简单协议（SAFE）从包括 Premji Invest
              在内的投资方募集 $155 million。这些 SAFE 带有 12% 年回报率，并在 IPO 完成时转换为股份。公司还保有 Vista Facility（截至 2025 年 7 月 31 日账面价值约
              $117M）、ABL Facility（$34.5M）和 Warehouse Credit Facility（$148.2M）。IPO 后公司净募资估计约 $700 million。按 IPO 中点价
              $25/share、约 248 million 股备考摊薄股本计算，IPO 定价隐含市值约 $6.2 billion，明显低于 2022 年 $9.2 billion 的私募估值。IPO 前主要机构股东包括
              Lightspeed Venture Partners（约 24.8%）、Oren Zeev / Zeev Ventures（约 18.6%）、Greenoaks Capital（约
              7.1%）、Andreessen Horowitz（重要持有人）和 Sandesh Patnam（约 4.3%）。截至 2025 年 7 月 31 日，公司累计亏损 $1,717 million。
