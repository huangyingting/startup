company:
  name: "Navan"
chapter:
  number: 1
  title: "Company Overview"
  summary: "Navan, Inc. (formerly TripActions) is a Palo Alto-based corporate travel and expense management platform founded in 2015, which completed its Nasdaq IPO in November 2025 (ticker: NAVN) at a $24–$26 per share range, offering an end-to-end T&E solution combining travel booking, expense management, and corporate cards on a single AI-powered platform. With $537M in FY2025 revenue (33% YoY growth), over 10,000 active customers, and a net loss of $181M, Navan has demonstrated strong growth and improving unit economics while its co-founders retain majority voting control."

sections:
  - id: identity-and-history
    title: "Identity, History, and Corporate Structure"
    body: "Navan, Inc. is a Delaware-incorporated corporate travel and expense (T&E) management platform headquartered at 3045 Park Boulevard, Palo Alto, California 94306. The company was founded in February 2015 under the name TripActions by co-founders Ariel Cohen and Ilan Twig, who previously co-founded StreamOnce (acquired by Jive Software in 2013). TripActions rebranded to Navan in 2023 to reflect its expanded product portfolio beyond travel management. Navan operates as a dual-class corporation: Class A common stock carries 1 vote per share while Class B common stock carries 30 votes per share, concentrating voting control with co-founders Cohen (~24% of voting power post-IPO) and Twig (~43% of voting power). The company filed its S-1 on September 19, 2025, filed its S-1/A amendment on October 10, 2025, and completed its IPO in November 2025 on the Nasdaq Global Select Market under the ticker symbol NAVN. The IPO pricing range was $24–$26 per share with 30 million new Class A shares offered by the company and approximately 6.9 million shares by selling stockholders. Navan elected emerging growth company status under the JOBS Act. The company has subsidiaries in Canada, UK, France, Germany, Ireland, Israel, Singapore, India, UAE, Australia, and New Zealand, with employees in 16 countries."
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
    tableRefs: [TO001]
    figureRefs: [FO001]

  - id: leadership-and-governance
    title: "Leadership, Board, and Governance"
    body: "Ariel Cohen co-founded Navan in February 2015 and has served as CEO and Chairperson since inception. Before founding Navan, he was VP of Product Management at Jive Software (2013–2015) following Jive's acquisition of StreamOnce, and held senior roles at HP (2006–2010). Cohen holds a B.A. in Economics from College of Management Academic Studies and an Executive MBA from Northwestern Kellogg. Ilan Twig co-founded Navan and has served as CTO since inception. He previously served as EVP Engineering at Jive Software (2013–2015) and Head of Engineering at RockMelt (2010–2012). Twig holds a B.Sc. in Computer Science from the Academic College of Tel-Aviv, Yaffo. Amy Butte joined as CFO in June 2024, bringing experience as CFO of the New York Stock Exchange (2004–2006) and Man Financial (2006–2008). Michael Sindicich was appointed President in March 2025, having previously served as CEO of Navan Expense (April 2023–March 2025). Howard Baik serves as General Counsel and Secretary. The Board of Directors includes Ben Horowitz (Andreessen Horowitz, joined October 2018), Arif Janmohamed (Lightspeed Venture Partners, joined April 2017), Michael Kourey (former CFO of Dialpad and Okta, joined October 2024), Oren Zeev (Zeev Ventures), and Anré Williams. The company operates a classified board with three classes. A significant key-person risk exists as Cohen and Twig together control approximately 67% of voting power post-IPO, limiting minority shareholders' influence over strategic decisions."
    claimRefs:
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
    tableRefs: [TO002]

  - id: funding-and-capitalization
    title: "Funding History, Valuation, and Capital Structure"
    body: "Navan has raised total venture capital in excess of $1.2 billion across multiple funding rounds since its 2015 founding. Key financing milestones include Series G and Series G-1 rounds completed between July and September 2022, raising approximately $154 million with participation from Andreessen Horowitz and Lightspeed Venture Partners, and a Series H round in November 2022 raising $304 million at a $9.2 billion valuation. In 2020, the company issued $125 million in unsecured convertible notes; and in February and April 2025, Navan raised $155 million via Simple Agreements for Future Equity (SAFEs) from investors including Premji Invest. The SAFEs carried a 12% annual return rate and converted into shares at IPO completion. The company also maintains a Vista Facility (carrying value ~$117M as of July 31, 2025), an ABL Facility ($34.5M), and a Warehouse Credit Facility ($148.2M). Post-IPO net proceeds to the company are estimated at approximately $700 million. At the midpoint IPO price of $25/share, using roughly 248 million pro-forma diluted shares, the implied market capitalization at IPO pricing was approximately $6.2 billion, well below the 2022 private valuation of $9.2 billion. Principal institutional shareholders pre-IPO included Lightspeed Venture Partners (~24.8%), Oren Zeev/Zeev Ventures (~18.6%), Greenoaks Capital (~7.1%), Andreessen Horowitz (significant holder), and Sandesh Patnam (~4.3%). The company has an accumulated deficit of $1,717 million as of July 31, 2025."
    claimRefs:
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: scale-and-milestones
    title: "Scale, Metrics, and Key Milestones"
    body: "Navan serves over 10,000 active customers (as of January 31, 2025), defined as companies that transacted six or more times on the platform and generated usage-based revenue in the prior 12 months. The company had approximately 3,400 employees globally as of July 31, 2025. Revenue grew 33% year-over-year from $402 million in fiscal 2024 (ended January 31, 2024) to $537 million in fiscal 2025 (ended January 31, 2025), and 30% in the first half of fiscal 2026 ($329 million vs. $254 million). Gross booking volume reached $6.6 billion in fiscal 2025 (up 32% from $5.0 billion in fiscal 2024). Payment volume grew 35% to $3.7 billion in fiscal 2025. Net Revenue Retention (NRR) exceeded 110% as of both January 31, 2025 and January 31, 2024, indicating strong expansion within existing customer cohorts. Gross margin improved from 60% in fiscal 2024 to 68% in fiscal 2025. International revenue represented 41% of total revenue in fiscal 2025. Navan's AI chatbot Ava handled approximately 50% of user interactions without live agent intervention in the first half of fiscal 2026. The company acquired six companies to expand internationally: R&M (UK, April 2021), Comtravo (Germany, February 2022), Resia (Scandinavia, March 2022), Atlanta (Spain, November 2022), Tripeur (India, April 2023), and Regent (Italy, June 2024). The company previously identified a material weakness in internal controls (fiscal year ended January 31, 2023), which was fully remediated by the end of fiscal 2025."
    claimRefs:
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
      - CO029
      - CO030
      - CO031
      - CO032
      - CO033
