callouts:
  - calloutType: strength
    title: "Full-Stack T&E Platform with Network Effects"
    body: "Navan's unified travel booking + expense management + corporate card offering creates a cross-selling flywheel, as evidenced by 36% of customers attaching to three or more offerings and NRR consistently above 110%. This stickiness gives Navan durable revenue expansion from the existing base without proportional new customer acquisition costs."
    claimRefs: [CO028, CO029]

  - calloutType: risk
    title: "Dual-Class Voting Structure Concentrates Control"
    body: "Co-founders Cohen and Twig together hold approximately 67% of voting power post-IPO through 30-votes-per-share Class B common stock, leaving minority shareholders with limited ability to influence governance. The S-1/A explicitly flags this as a material risk to investor rights, including in change-of-control scenarios."
    claimRefs: [CO015, CO016]

  - calloutType: risk
    title: "Persistent Net Losses and Accumulated Deficit"
    body: "Navan has generated net losses in every year since inception. As of July 31, 2025, accumulated deficit reached $1,717 million. While the loss trajectory is improving (net loss fell from $332M in FY2024 to $181M in FY2025), the company has not yet achieved GAAP profitability and was explicit in the S-1/A that it may not achieve or sustain profitability."
    claimRefs: [CO030, CO036]

