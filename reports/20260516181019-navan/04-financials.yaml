company:
  name: "Navan"
chapter:
  number: 4
  title: "Financials"
  summary: "Navan generates revenue through a multi-stream model: transaction economics from GBV (supplier commissions/fees from airlines and hotels), SaaS platform fees, and corporate card interchange. FY2025 revenue was $536.8M (+33% YoY) on GBV of $6.6B; gross margin expanded from 60% in FY2024 to 68% in FY2025, reaching 72% in H1 FY2026. Net loss narrowed from $332M (FY2024) to $181M (FY2025) to $100M (H1 FY2026), with the first Non-GAAP operating income positive period in H1 FY2026 (+$11M). The November 2025 IPO raised approximately $700M in net proceeds, providing ~3.5 years of runway at current burn trajectory. Revenue quality is high (majority recurring, NRR >110%), margin trajectory is positive, but three diligence blockers remain: (1) exact CAC/LTV breakdown not disclosed; (2) revenue mix between supplier economics vs. SaaS is not disaggregated; (3) material weakness in internal controls (restated FY2023 and disclosed FY2024) casts uncertainty on reported historical financials."

sections:
  - id: revenue-model
    title: "Revenue Model and Streams"
    body: "Navan's revenue model combines four distinct streams. The largest is supplier economics: airline booking fees, hotel commissions, and supplier-paid overrides (similar to traditional TMCs) that are recognized on a net basis as GBV flows through the platform. Second is SaaS platform fees charged to enterprise customers on a per-seat or platform access basis, providing recurring subscription-like revenue. Third is corporate card interchange: when Navan Card (Visa/Mastercard) is used, Navan captures interchange revenue as the card program operator. Fourth is supplier content access fees and premium features for travelers and travel managers. Navan does not disaggregate revenue into these streams in its S-1/A, disclosing only total revenue and gross profit. The company's effective take rate on GBV is approximately 8.1% ($536.8M FY2025 revenue / $6.6B GBV), which compares favorably to traditional TMC take rates of 6–10% but is above the typical 2–4% take rate for pure OBT (online booking tool) platforms. This premium take rate suggests that SaaS fees and card interchange contribute materially alongside supplier economics. Revenue is recognized primarily in the period of booking (supplier economics, card interchange) or ratably over the contract term (SaaS fees). The company has not disclosed deferred revenue or backlog, making it difficult to assess recurring revenue quality precisely. NRR consistently above 110% implies that existing customers are expanding their spend on the platform, partially through natural travel recovery and partially through multi-product upsell."
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: financial-performance
    title: "Historical Financial Performance and Trajectory"
    body: "Navan's revenue grew from $402.3M in FY2024 (ending January 31, 2024) to $536.8M in FY2025 (ending January 31, 2025), a 33% increase. H1 FY2026 (February 1 – July 31, 2025) revenue was $329.4M, a 30% YoY increase over H1 FY2025, representing $658.8M annualized run rate. GBV grew from $5.0B in FY2024 to $6.6B in FY2025 (32% YoY) and payment volume from $2.7B to $3.7B (35% YoY). Gross profit expanded significantly: gross margin improved from 60% (FY2024) to 68% (FY2025) to 72% (H1 FY2026), driven by a shift toward higher-margin SaaS and card interchange revenue, operational leverage in supplier economics, and headcount efficiency. GAAP net loss narrowed substantially: from $332M (FY2024) to $181M (FY2025) to $100M (H1 FY2026), indicating accelerating path to profitability. The Non-GAAP operating income turned positive in H1 FY2026 at +$11M—the company's first positive non-GAAP operating period. This is critical for the IPO narrative: Navan positioned itself as 'profitable on a non-GAAP basis' at the time of IPO. The gap between GAAP and non-GAAP results (~$111M in H1 FY2026) reflects primarily stock-based compensation ($82M annualized) and acquisition-related amortization. The company's accumulated deficit reached $1,717M as of July 31, 2025, reflecting years of growth investment. Loss from operations (GAAP) was approximately $113M in H1 FY2026 before the $11M non-GAAP positive adjustment, implying approximately $124M in non-GAAP adjustments."
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
    tableRefs: []
    figureRefs: [FI003]

  - id: unit-economics-capital
    title: "Unit Economics, Capital Adequacy, and Diligence Gaps"
    body: "Navan's disclosed unit economics are partial. NRR consistently above 110% signals strong land-and-expand dynamics. The company has 10,000+ active customers with the company citing 36% on three or more products—this multi-product attach is a proxy for higher LTV. The company does not disclose CAC (customer acquisition cost), LTV (lifetime value), payback period, or revenue per customer, making bottom-up underwriting of sales efficiency impossible from public information alone. Gross margin of 68–72% is strong for a T&E platform that has supply chain (travel inventory) costs; for reference, SaaS companies typically target 70–80%. The driver of margin expansion is the mix shift toward higher-margin card interchange and SaaS, plus operational leverage in the supplier economics stream. Operating expense discipline is visible: net loss improved by 57% YoY in FY2025 while revenue grew 33%, but SBC remains high ($82M+ annually). Post-IPO capital position: the November 2025 IPO raised approximately $700M in net proceeds. Combined with cash on hand pre-IPO (estimated $400M+ based on financing history), Navan likely has $1B+ in total cash as of IPO date. At H1 FY2026 GAAP operating burn rate of approximately $113M per 6 months ($226M annually), runway exceeds 4 years from IPO proceeds alone. However, actual cash burn is lower because non-GAAP positive H1 FY2026 suggests cash burn is approaching breakeven. The company's primary capital use is: sales and marketing (to acquire customers), R&D (product development), and potential M&A (as evidenced by 12+ acquisitions to date). The company has also issued convertible notes historically; specific debt obligations are not fully disclosed in the S-1/A summary sections. A material weakness in internal controls was disclosed in the S-1/A—the company restated its FY2023 financials and disclosed a material weakness as of January 31, 2024—which is a significant diligence blocker for any investor relying on historical financial accuracy."
    claimRefs:
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
    tableRefs: [TI003, TI004, TI005]
    figureRefs: [FI002, FI004]

