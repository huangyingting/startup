      - number: '2.3'
        title: Buyer Segmentation, User Personas, and Adoption Path
        blocks:
          - type: paragraph
            body: >-
              Corporate T&E software has three distinct buyer/user personas with different needs and decision paths. (1)
              Finance teams and CFOs are the primary economic buyers, evaluating TCO, policy compliance, integration
              with ERP/accounting, and ROI from reducing spend leakage. They typically control the budget for both T&E
              and corporate card programs. Navan's pitch to this segment emphasizes real-time spend visibility,
              AI-driven policy enforcement, and cost savings through automated compliance checks. (2) Travel managers
              and executive assistants are the operational users who configure travel policies, manage corporate
              accounts with airlines/hotels, and handle VIP and executive travel. They care about supplier network
              breadth, inventory quality, and ease of exception handling. (3) Individual business travelers (employees)
              are end-users who directly experience the booking flow, expense submission, and card access. Their pain
              point is policy friction reducing personal productivity; Navan addresses this with a consumer-grade mobile
              UX that takes an average of 7 minutes to book a trip, vs. 45+ minutes for legacy TMC processes. By company
              size, Navan primarily targets mid-market (100–2,000 employees) and enterprise (2,000+) customers. SMBs are
              underserved by Navan's current model due to implementation complexity and pricing structures.
              Geographically, North America (59% of FY2025 revenue) is the core; EMEA (much of the remaining 41%) is the
              growth region. APAC and LATAM represent underpenetrated potential. Budget ownership typically sits with
              Finance/Treasury for expense management and corporate cards, and with either Finance or Operations for
              travel management. Adoption path for new customers typically begins with travel booking (highest immediate
              value), followed by expense management (natural extension), followed by corporate card adoption (highest
              switching cost). This sequential adoption creates the funnel that drives Navan's 36% multi-product
              attachment rate and >110% NRR.
            claimRefs:
              - CM017
              - CM018
              - CM019
              - CM020
