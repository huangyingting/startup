      - number: '8.2'
        title: 'Valuation Context: NAVN Metrics, IPO Discount, and Financing History'
        blocks:
          - type: paragraph
            body: >
              Navan's IPO in November 2025 was priced at $25 per share, representing approximately 6x LTM EV/Revenue at
              the time of pricing (LTM revenue approximately $480M pre-IPO). The $700M net IPO proceeds provide a strong
              balance sheet runway, extending the cash runway well beyond FY2028 at the current net loss trajectory. At
              the current price of $18.46, NAVN's implied enterprise value (market cap ~$3.6B less cash ~$700M) is
              approximately $2.9B, yielding: EV/LTM Revenue of ~4.7x ($613M), EV/Gross Profit of ~6.5x (at 70% margin),
              and a Rule-of-40 score of approximately 33 (30% growth + 3% non-GAAP operating margin).

              Financing history shows consistent valuation appreciation: Navan raised $304M Series H in September 2022
              at a $9.2B valuation — meaning the IPO at $24-26/share implied a ~60% discount to the Series H valuation,
              a signal of the growth-stage valuation reset that occurred across tech from 2022-2024. GBTA's 2025 outlook
              projects corporate travel spending to recover to pre-pandemic levels by 2026 and grow 5-7% annually
              through 2029, providing a positive revenue tailwind. IATA's June 2025 report confirms airline passenger
              volumes are tracking 4% above 2019 levels, supporting Navan's GBV growth thesis.
            claimRefs:
