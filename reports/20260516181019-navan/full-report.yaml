  - id: TV005
    title: Thesis-break and kill triggers table
    type: analysis
    description: >-
      Thesis-break and kill-criteria triggers for the Navan investment case — monitorable events that would cause a
      recommendation change
    sourceRefs:
      - SV013
      - SV001
      - SV004
      - SV016
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
    columns:
      - Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - NRR drops below 100%
        - Two consecutive quarters of NRR <100%
        - Signals customer churn exceeding expansion — product-market fit erosion or competitive displacement
        - 'SELL: core multi-product expansion thesis breaks'
      - - GAAP net loss widens from H1 FY2026 pace
        - Full-year FY2026 net loss >$200M (vs. $100M H1)
        - Profitability timeline extends beyond FY2028; cash burn accelerates; follow-on raise risk
        - SELL or significantly reduce position
      - - Material travel demand shock (GBV -20%+)
        - GBV declines >20% YoY for two quarters (macro recession or pandemic)
        - Revenue decline; margin compression; GAAP profitability deferred indefinitely
        - REDUCE to minimal position; watch for recovery entry
      - - SOX 404(b) material weakness identified
        - External auditor identifies new material weakness in FY2026 audit
        - Credibility impairment; potential restatement; investor confidence collapse
        - SELL immediately on disclosure
      - - Key customer loss signal
        - >-
          Disclosure of named enterprise customer departures (>$20M ARR each) or NRR disclosure showing
          enterprise-segment NRR <105%
        - Competitive displacement confirmed; pricing power weakens
        - REDUCE position; reassess competitive moat
      - - NAAM stock below $12
        - NAVN closes below $12 for 5+ trading days (implies <3x EV/Revenue)
        - Signals market pricing in severe bear case; potential liquidity or governance risk
        - 'REASSESS: potential BUY at deep distress or exit if fundamental impairment'
    notes: >-
      Triggers are heuristics based on the investment thesis; not formal investment rules. All triggers require thesis
      reassessment — action should be confirmed with updated company disclosures and market context.
  - id: TV006
    title: Final diligence asks table
    type: analysis
    description: >-
      Prioritized list of outstanding diligence questions and information requests for Navan investor due diligence as
      of May 2026
    sourceRefs:
      - SV013
      - SV001
      - SV004
    claimRefs:
      - CV035
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - GAAP FCF and burn rate by quarter
        - >-
          No quarterly cash flow statement published; only annual; H1 FY2026 non-GAAP profit vs. GAAP cash consumption
          unclear
        - GAAP FCF positive or neutral is the single most important signal for BUY upgrade
        - Investor relations; 8-K quarterly filing when available
      - - NRR by customer segment
        - NRR >110% is company-wide; no enterprise vs. SMB breakdown; SMB cohort could be masking enterprise churn
        - If SMB NRR is 130%+ and enterprise NRR is 100%, thesis is weaker than headline suggests
        - Management call; diligence data room NRR waterfall by segment
      - - SOX 404(b) audit opinion
        - >-
          Not yet issued (first full year as public company; FY2026 year-end Jan 31, 2026); FY2025 management assertion
          clean
        - New material weakness would be thesis-breaking; clean opinion confirms internal control remediation is durable
        - 10-K filing when available; auditor letter via IR
      - - 'Cap table: SAFE, option pool, RSU vesting'
        - >-
          S-1/A shows 200M+ fully diluted shares; RSU vesting schedule, SAFE conversion terms, and post-IPO option pool
          not fully detailed
        - Annual dilution of 3-5% from SBC could compress returns materially over 3-5 years
        - S-1/A cap table exhibits; management supplemental disclosure
      - - AI provider concentration
        - >-
          Navan Cognition (Ava) handles 50% of interactions; LLM provider(s) not disclosed; OpenAI/Anthropic API
          dependency risk
        - >-
          Provider concentration creates supply chain risk; model discontinuation or pricing change affects cost
          structure and reliability
        - Direct management inquiry; technology due diligence on AI stack
      - - Enterprise customer renewal calendar
        - >-
          No disclosure of contract terms, renewal dates, or at-risk accounts; largest customer <2% revenue but cohort
          renewal risk unknown
        - If 20%+ of GBV renews in next 12 months, retention is critical to the growth trajectory
        - Investor data room; management pipeline conversation
    notes: >-
      Diligence asks are prioritized by materiality to the investment thesis; the top 3 are gating factors for BUY
      recommendation. Items 4-6 are important for position sizing and scenario calibration.
