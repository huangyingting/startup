            body: >-
              As of May 16, 2026, status.navan.com reported an ongoing 'Single Provider High Error Rate' flight
              inventory issue affecting booking availability. This is an adverse signal: Navan's booking reliability
              depends on multiple supplier API connections, and single-provider failures directly impact the customer
              experience. The incident (active for 1+ day at research time) suggests that despite multi-provider
              architecture, single-provider concentration within any given content tier creates operational risk.
            calloutType: risk
