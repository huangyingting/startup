        title: Leadership, Board, and Governance
        blocks:
          - type: paragraph
            body: >-
              Ariel Cohen co-founded Navan in February 2015 and has served as CEO and Chairperson since inception.
              Before founding Navan, he was VP of Product Management at Jive Software (2013–2015) following Jive's
              acquisition of StreamOnce, and held senior roles at HP (2006–2010). Cohen holds a B.A. in Economics from
              College of Management Academic Studies and an Executive MBA from Northwestern Kellogg. Ilan Twig
              co-founded Navan and has served as CTO since inception. He previously served as EVP Engineering at Jive
              Software (2013–2015) and Head of Engineering at RockMelt (2010–2012). Twig holds a B.Sc. in Computer
              Science from the Academic College of Tel-Aviv, Yaffo. Amy Butte joined as CFO in June 2024, bringing
              experience as CFO of the New York Stock Exchange (2004–2006) and Man Financial (2006–2008). Michael
              Sindicich was appointed President in March 2025, having previously served as CEO of Navan Expense (April
              2023–March 2025). Howard Baik serves as General Counsel and Secretary. The Board of Directors includes Ben
              Horowitz (Andreessen Horowitz, joined October 2018), Arif Janmohamed (Lightspeed Venture Partners, joined
              April 2017), Michael Kourey (former CFO of Dialpad and Okta, joined October 2024), Oren Zeev (Zeev
              Ventures), and Anré Williams. The company operates a classified board with three classes. A significant
              key-person risk exists as Cohen and Twig together control approximately 67% of voting power post-IPO,
              limiting minority shareholders' influence over strategic decisions.
