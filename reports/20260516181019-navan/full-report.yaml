      - number: '2.2'
        title: Market Sizing, Segmentation, and TAM/SAM/SOM
        blocks:
          - type: paragraph
            body: >-
              Global business travel spending is estimated at $1.48 trillion annually for 2024 by the Global Business
              Travel Association (GBTA), recovering strongly from pandemic-driven lows. The US accounts for
              approximately $472 billion of that total (World Travel & Tourism Council / WTTC). The business travel
              market is projected to reach $829.5 billion by 2027 (ReportLinker/various forecast sources). These figures
              include all spend by corporate travelers on flights, hotels, ground transportation, and meals—not just
              software/services. Navan's self-reported TAM of $185 billion uses a narrower, software-addressable lens:
              managed travel management services (~$86B), expense management software ($39B), and corporate card
              payments interchange ($37B plus $24B bleisure). In a more conservative bottom-up sizing: the managed
              corporate travel software/services market (where vendors collect service fees, SaaS fees, and supplier
              commissions) is estimated by industry analysts at roughly $15–20 billion globally in 2024, expanding to
              $25–30 billion by 2028. The expense management software market specifically (pure SaaS) is estimated at
              $6.6 billion in 2024, growing at ~10–12% CAGR (MarketsandMarkets-adjacent estimates). Navan's serviceable
              addressable market (SAM) is better defined as: (a) mid-market and enterprise companies (employees
              50–10,000+) with international travel and expense needs, (b) primarily in North America and EMEA, (c) that
              can adopt a unified SaaS+card solution. Navan's current active customer base of 10,000+ companies captures
              roughly 1–2% of estimated 600,000+ US companies with 50+ employees that could benefit from managed T&E.
              The serviceable obtainable market (SOM) over the near term is constrained by enterprise sales cycles,
              incumbent switching costs (particularly from SAP Concur), and Navan's current geographic coverage. Navan's
              gross booking volume of $6.6 billion (FY2025) represents approximately 1–2% penetration of the US portion
              of annual corporate travel spend.
            claimRefs:
              - CM009
              - CM010
              - CM011
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
