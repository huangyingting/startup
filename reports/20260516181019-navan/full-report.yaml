      - number: '6.2'
        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: >
              Active customer count grew from over 8,000 as of January 31, 2024 to over 10,000 as of January 31, 2025 —
              approximately 25% year-over-year growth in logo count. Gross Booking Volume grew from $3.7B (FY2024) to
              $6.6B (FY2025), implying a significant increase in spending intensity per customer alongside logo growth.

              The dual-pronged go-to-market strategy — Sales-Led Growth (SLG) for enterprise/mid-market via account
              executives and customer success teams, plus Product-Led Growth (PLG) via self-serve sign-ups for SMBs —
              has enabled broad market access. The PLG channel (low-touch) reduces customer acquisition cost for smaller
              accounts. Revenue per active customer grew from roughly $50K (FY2024: $403M / 8K customers) to roughly
              $54K (FY2025: $537M / 10K customers), implying slight ARPU expansion from cross-sell even as the customer
              base grew.

              Usage metrics confirm high platform engagement: 90% of FY2025 bookings made online or mobile (reducing
              support cost per booking), and 36% of customers as of January 31, 2025 were attached to three or more
              Navan offerings, demonstrating successful cross-sell execution.
