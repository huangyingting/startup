      - number: '1.3'
        title: Funding History, Valuation, and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Navan has raised total venture capital in excess of $1.2 billion across multiple funding rounds since its
              2015 founding. Key financing milestones include Series G and Series G-1 rounds completed between July and
              September 2022, raising approximately $154 million with participation from Andreessen Horowitz and
              Lightspeed Venture Partners, and a Series H round in November 2022 raising $304 million at a $9.2 billion
              valuation. In 2020, the company issued $125 million in unsecured convertible notes; and in February and
              April 2025, Navan raised $155 million via Simple Agreements for Future Equity (SAFEs) from investors
              including Premji Invest. The SAFEs carried a 12% annual return rate and converted into shares at IPO
              completion. The company also maintains a Vista Facility (carrying value ~$117M as of July 31, 2025), an
              ABL Facility ($34.5M), and a Warehouse Credit Facility ($148.2M). Post-IPO net proceeds to the company are
              estimated at approximately $700 million. At the midpoint IPO price of $25/share, using roughly 248 million
              pro-forma diluted shares, the implied market capitalization at IPO pricing was approximately $6.2 billion,
              well below the 2022 private valuation of $9.2 billion. Principal institutional shareholders pre-IPO
              included Lightspeed Venture Partners (~24.8%), Oren Zeev/Zeev Ventures (~18.6%), Greenoaks Capital
              (~7.1%), Andreessen Horowitz (significant holder), and Sandesh Patnam (~4.3%). The company has an
              accumulated deficit of $1,717 million as of July 31, 2025.
