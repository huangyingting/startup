      - number: '4.2'
        title: Historical Financial Performance and Trajectory
        blocks:
          - type: paragraph
            body: >-
              Navan's revenue grew from $402.3M in FY2024 (ending January 31, 2024) to $536.8M in FY2025 (ending January
              31, 2025), a 33% increase. H1 FY2026 (February 1 – July 31, 2025) revenue was $329.4M, a 30% YoY increase
              over H1 FY2025, representing $658.8M annualized run rate. GBV grew from $5.0B in FY2024 to $6.6B in FY2025
              (32% YoY) and payment volume from $2.7B to $3.7B (35% YoY). Gross profit expanded significantly: gross
              margin improved from 60% (FY2024) to 68% (FY2025) to 72% (H1 FY2026), driven by a shift toward
              higher-margin SaaS and card interchange revenue, operational leverage in supplier economics, and headcount
              efficiency. GAAP net loss narrowed substantially: from $332M (FY2024) to $181M (FY2025) to $100M (H1
              FY2026), indicating accelerating path to profitability. The Non-GAAP operating income turned positive in
              H1 FY2026 at +$11M—the company's first positive non-GAAP operating period. This is critical for the IPO
              narrative: Navan positioned itself as 'profitable on a non-GAAP basis' at the time of IPO. The gap between
              GAAP and non-GAAP results (~$111M in H1 FY2026) reflects primarily stock-based compensation ($82M
              annualized) and acquisition-related amortization. The company's accumulated deficit reached $1,717M as of
              July 31, 2025, reflecting years of growth investment. Loss from operations (GAAP) was approximately $113M
              in H1 FY2026 before the $11M non-GAAP positive adjustment, implying approximately $124M in non-GAAP
              adjustments.
