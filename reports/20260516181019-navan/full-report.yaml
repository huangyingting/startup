            body: >
              Customer review profiles on Trustpilot, G2, Capterra, and GetApp present a mixed picture: Navan earns
              strong ratings from enterprise accounts with dedicated customer success support, but receives criticism
              for customer service quality, billing resolution delays, and reimbursement friction for individual
              travelers — common complaints for integrated T&E platforms. The active outage on status.navan.com as of
