          - type: callout
            title: SAP Concur Locks Out Large Enterprise Segment
            body: >-
              SAP Concur's deep integration with SAP ERP creates near-insurmountable switching costs for SAP-heavy
              enterprises. This segment (typically 5,000+ employees with SAP ERP) is largely inaccessible to Navan,
              constraining its enterprise growth to greenfield mid-market, SAP-dissatisfied accounts, and non-SAP
              enterprises. This limits Navan's upmarket expansion opportunity.
