        title: Exhibits
        blocks:
          - type: callout
            title: Post-COVID Business Travel Recovery Drives Navan's Revenue Growth
            body: >-
              Business travel spending has recovered strongly from COVID lows, with GBTA forecasting $1.48 trillion in
              2024 and 62% of CEOs planning budget increases. Navan's GBV grew 32% YoY to $6.6B in FY2025, significantly
              outpacing overall market growth, indicating market share gains on top of the secular recovery tailwind.
            calloutType: strength
            claimRefs:
              - CM009
              - CM025
              - CM026
          - type: callout
            title: 'TAM Inflation: Total Spend vs. Software-Monetizable Market'
            body: >-
              Navan's self-reported $185B TAM represents total transaction flows, not software revenue. The actual
              software-and-services addressable market is roughly 10–15x smaller at $15–20B for managed T&E software.
              This doesn't invalidate the opportunity, but diligence-grade sizing requires the narrower,
              software-monetizable lens.
            calloutType: risk
            claimRefs:
              - CM011
              - CM013
              - CM014
          - type: callout
            title: Macroeconomic and Video Conferencing Headwinds
            body: >-
              Corporate travel budgets are among the first cut during downturns, as demonstrated by COVID-19's
              near-existential impact on TripActions/Navan. Video conferencing substitution has permanently reduced
              discretionary travel by an estimated 10–20%. These structural headwinds mean Navan's growth is dependent
              on continuous market share gains rather than just riding secular growth.
            calloutType: risk
            claimRefs:
