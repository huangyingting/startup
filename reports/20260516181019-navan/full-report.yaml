      - number: '8.5'
        title: Diligence Asks and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              The investment thesis is most sensitive to three binary risks: (1) GAAP profitability timing — if net
              losses persist above $100M through FY2027, the valuation discount is structural, not cyclical; (2) travel
              demand durability — a 20%+ GBV decline from macro causes would eliminate most of the profitability path;
              and (3) competitive displacement — if SAP Concur wins 15%+ of Navan's enterprise renewals or Ramp gains
              material travel share, NRR would compress below 100%, fundamentally changing the unit economics.

              Key diligence asks before increasing position: (a) confirm FY2026 audited ICFR / SOX 404(b) opinion
              without new material weaknesses; (b) verify the NRR >110% figure with quarterly cohort data broken out by
              segment (enterprise vs. SMB); (c) understand the top-20 customer renewal calendar and whether any accounts
              are at risk; (d) obtain cap table detail including SAFE conversions, option pool size, and RSU vesting
              schedule to model dilution accurately; (e) understand Navan Cognition's AI model provider concentration
              and any MSA dependencies on OpenAI or Anthropic.

              Fortune's November 2025 IPO coverage and Reuters' market data provide the pricing context for these risk
              factors. Amadeus's corporate travel segment and GBTA data confirm the market tailwinds but also highlight
              the cyclicality risk that makes the profitability timing question so critical.
