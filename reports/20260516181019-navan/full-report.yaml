      - number: '7.2'
        title: Infrastructure and Operational Risks
        blocks:
          - type: paragraph
            body: >
              Navan's operational infrastructure carries two critical dependency risks. First, GDS reliance: corporate
              travel bookings require access to airline inventory, hotel rates, and car rental content distributed
              through global distribution systems operated by Sabre, Amadeus, and Travelport. Airlines are increasingly
              offering exclusive content through NDC (New Distribution Capability) channels that bypass traditional GDS;
              if this content shift accelerates, Navan faces rising costs or reduced content quality without significant
              NDC integration investment. The January 2026 Booking.com partnership for hotel inventory addresses a
              content gap but also deepens strategic dependency on a single supplier relationship.

              Second, banking partner concentration: Navan Card's U.S. operations run on Celtic Bank (FDIC-insured),
              while EU/UK operations use Stripe and Adyen N.V. A failure, regulatory sanction, or unfavorable
              renegotiation at Celtic Bank would require card program migration — typically a 6-18 month process. Adyen
              operates under multiple regulatory frameworks (DNB Netherlands, FCA UK, Fed U.S.), creating
              multi-jurisdictional compliance risk. PCI DSS Level 1 compliance is required for card-issuing operations,
              and any data breach involving card data would trigger mandatory notification, potential fines, and
              reputational damage.

              Platform reliability adds a third operational risk dimension. Navan's status page documented an active
              'Single Provider High Error Rate' incident on May 16, 2026 — the date of this assessment — confirming that
              live platform disruptions affecting customer bookings do occur. Trustpilot and G2 reviewers cite recurring
              support response and expense workflow glitches.
            claimRefs:
              - CR007
              - CR008
              - CR009
              - CR010
              - CR013
              - CR014
              - CR028
              - CR033
              - CR034
              - CR035
