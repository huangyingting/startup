  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Navan serves over 10,000 active customers as of January 31, 2025, spanning enterprise, mid-market, and
              small-and-medium businesses (SMBs) across diverse industries including software/technology, real estate,
              healthcare, media, retail, and finance. The company defines an "active customer" as any company that has
              transacted on the Navan platform six or more times in the preceding 12 months and generated usage-based
              revenue — a threshold designed to reflect genuine engagement rather than mere registration.

              The customer base is geographically distributed, with 41% of FY2025 revenue generated from customers
              outside the United States (39% for H1 FY2026). No single customer contributed more than 2% of total
              revenue for FY2025, indicating a highly diversified customer concentration profile relative to typical
              enterprise SaaS peers.

              Navan targets both "managed" customers (enterprises with established T&E programs) and "unmanaged"
              customers (typically SMBs with no prior travel management vendor), capturing the full corporate travel
              spectrum from startups to global multinationals.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
