      - number: '5.2'
        title: Technology Architecture and Differentiation
        blocks:
          - type: paragraph
            body: >-
              Navan's technical architecture is cloud-first on AWS, microservices-based, with API integrations at three
              layers: supplier content (GDS/NDC/LCC for airlines; direct and aggregated for hotels), enterprise systems
              (HRIS: Workday, SuccessFactors; ERP: SAP, Oracle, NetSuite; financial: Concur import, QuickBooks;
              security: SSO/SAML via Okta, Azure AD), and payment rails (Visa/Mastercard issuing network for Navan
              Card). Navan Cognition is described as a 'third-generation proprietary AI framework' that combines ML
              models (precision and predictive power) with LLMs (reasoning capabilities) in a modular graph-based
              virtual agent workflow. This architecture allows specialized virtual agents to handle complex tasks (trip
              modifications, expense disputes, policy explanations) that previously required human agents. Built-in
              safeguards and real-time oversight ensure enterprise-grade reliability for AI-driven actions. The company
              invested in AWS infrastructure across multiple regional availability zones, using VPCs, Security Groups,
              AWS KMS, TLS in-transit, and AES at-rest encryption. Security program includes annual penetration testing,
              CI/CD integrated security scanning, 24/7 threat detection, and incident response playbooks. Certifications
              include SOC 2 Type II (company-claimed) and compliance with GDPR (EU data handling via European
              subsidiaries), CCPA (California), and PCI-DSS (card payment data). The technical differentiation rests on
              three pillars: (1) supplier integration depth (600+ airline integrations built over a decade of GBV scale;
              NDC-first architecture enabling richer content); (2) AI data advantage (Navan Cognition trained on years
              of enterprise travel data, booking behavior, and policy outcomes — not replicable quickly by competitors);
              and (3) the unified data layer connecting travel bookings, expense reports, and card transactions in
              real-time, enabling policy enforcement at point of spend.
