  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Platform and Module Architecture
        blocks:
          - type: paragraph
            body: >-
              Navan's platform consists of five primary product modules built on a shared infrastructure: (1) Navan
              Travel — the online booking tool (OBT) for flights, hotels, rail, and car, accessible via web and mobile
              with AI-powered search and 600+ airline connections; (2) Navan Expense — automated expense management
              capturing receipts, enforcing policy, and closing books faster; (3) Navan Card — corporate card
              (Visa/Mastercard via issuing bank partner) embedded in the expense workflow for real-time spend control
              and auto-reconciliation; (4) Navan Meetings & Events (M&E) — a group travel management product for company
              offsites, conferences, and events; and (5) Navan Cognition — the proprietary AI framework powering
              personalization, virtual agents, and intelligent automation across all modules. All five modules share a
              unified customer data layer and enterprise integration fabric. The platform serves three types of users:
              travelers (individual employees who book travel), travel managers/finance teams (who configure policy,
              review spend, and reconcile), and suppliers (airlines and hotels who distribute and retail on Navan's
              platform). In FY2025, 90% of bookings were made online or via mobile applications, indicating high
              self-serve adoption. The average booking time is 7 minutes compared to 45 minutes via external channels.
              For H1 FY2026, Ava (Navan's AI virtual agent chatbot) handled approximately 50% of user interactions
              without live agent intervention, demonstrating the degree of AI automation achieved.
            claimRefs:
