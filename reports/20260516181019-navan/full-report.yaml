    title: Valuation sensitivity
    type: bar
    description: >-
      NAVN implied price per share under different EV/Revenue multiple scenarios applied to LTM revenue ($613M); current
      market price $18.46 shown as reference
    sourceRefs:
      - SV013
      - SV015
      - SV016
      - SV017
    notes: >-
      Implied prices assume ~200M fully diluted shares; EV computed as revenue × multiple, then adjusted for ~$700M net
      cash. Bear multiples reference Amex GBT-comparable service TMCs. Bull multiples reference Ramp/high-growth SaaS
      peers.
    data:
      items:
        - label: 'Bear: 3.0x LTM Revenue ($1.8B EV)'
          value: 5.5
          unit: $/share
        - label: 'Bear+: 3.5x LTM Revenue ($2.1B EV)'
          value: 8.5
          unit: $/share
        - label: 'Base-: 4.5x LTM Revenue ($2.8B EV)'
          value: 14
          unit: $/share
        - label: Current (May 2026, $18.46)
          value: 18.46
          unit: $/share
        - label: 'Base: 5.5x NTM Revenue ($4.1B EV, ~$750M NTM)'
          value: 23.5
          unit: $/share
        - label: 'Base+: 6.5x NTM Revenue ($4.9B EV)'
          value: 27.5
          unit: $/share
        - label: 'Bull: 8x NTM Revenue ($6.0B EV)'
          value: 35
          unit: $/share
        - label: 'Bull+: 10x NTM Revenue ($7.5B EV)'
          value: 43.5
          unit: $/share
