      - number: '8.3'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              Navan's public comparable is Amex GBT (GBTG), the only listed pure-play travel management company. GBTG
              trades at approximately 1.0-1.5x revenue — but this is a misleading comparison because GBTG is
              predominantly services-oriented with 30-40% gross margins vs. Navan's software-first 72% margin profile.
              The more appropriate comparable set is high-growth SaaS-fintech: Ramp (private, ~$7.65B at ~15-20x ARR),
              TravelPerk (private, ~$1.4B valuation), Brex (Capital One structure), and public enterprise SaaS names
              trading at 5-9x forward revenue.

              SAP (Concur parent) trades at approximately 4.5-5x revenue as a large enterprise software company — though
              Concur is a mature product within SAP, limiting direct comparability. The Sabre Corporation, which
              provides GDS infrastructure that Navan relies on, trades at approximately 1-2x revenue as a
              transaction-fee infrastructure business. Amadeus IT trades at approximately 4-5x revenue as a
              higher-margin technology platform for travel. On a pure software/fintech comparable basis (6-9x forward
              revenue), Navan at 4.7x LTM Revenue appears to offer a 20-30% discount to fair value — providing the
              upside optionality that makes the current price more interesting than the IPO price.

              The key risk to the comp analysis is multiple compression. If interest rates remain elevated and SaaS
              multiples compress further (to 4-5x forward), Navan's current EV/Revenue of 4.7x LTM provides limited
              upside even in the base scenario. Reuters' coverage noted that Navan's GAAP losses continue to weigh on
              investor sentiment despite improving non-GAAP metrics.
            claimRefs:
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
