  - id: FV001
    title: Recommendation logic
    type: flow
    description: >-
      Decision chain from Navan's fundamental signals through risk factors to the CONDITIONAL HOLD recommendation and
      BUY trigger conditions
    sourceRefs:
      - SV013
      - SV001
      - SV004
      - SV016
    notes: >-
      Flow represents the recommendation logic chain; arrows indicate causal/sequential dependency. Recommendation is as
      of May 15, 2026 ($18.46 NAVN close).
    data:
      nodes:
        - id: n1
          label: Strong Platform Fundamentals
          description: NRR >110%, 72% gross margin, 30% growth, 10,000+ customers, NPS 43 — top-quartile for enterprise SaaS
        - id: n2
          label: GAAP Profitability Not Yet Confirmed
          description: FY2025 net loss $181M; H1 FY2026 net loss $100M; first non-GAAP profit $11M H1 FY2026; GAAP gap remains
        - id: n3
          label: Valuation Attractive vs. Comps
          description: 4.7x EV/LTM Revenue vs. 6-9x for SaaS-fintech peers; 26% IPO discount provides margin of safety
        - id: n4
          label: Material Risks Present
          description: Travel concentration (41% international), dual-class governance, GAAP losses, stock underperformance
        - id: n5
          label: 'Risk/Reward Balance: Neutral to Slightly Positive'
          description: Base case 20-50% upside; bear case 20-30% downside at $18.46; asymmetry improves at $14-16
        - id: n6
          label: CONDITIONAL HOLD — BUY at $14-16 or GAAP Profit
          description: >-
            Hold existing; add only at material pullback or GAAP profit confirmation; thesis intact but not yet priced
            in
        - id: n7
          label: Kill Criteria
          description: NRR <100% for 2 quarters; GAAP loss widens; SOX material weakness; or GBV -20%+ YoY
      edges:
        - from: n1
          to: n5
        - from: n2
          to: n5
        - from: n3
          to: n5
        - from: n4
          to: n5
        - from: n5
          to: n6
        - from: n5
          to: n7
