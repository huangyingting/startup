        title: Scale, Metrics, and Key Milestones
        blocks:
          - type: paragraph
            body: >-
              Navan serves over 10,000 active customers (as of January 31, 2025), defined as companies that transacted
              six or more times on the platform and generated usage-based revenue in the prior 12 months. The company
              had approximately 3,400 employees globally as of July 31, 2025. Revenue grew 33% year-over-year from $402
