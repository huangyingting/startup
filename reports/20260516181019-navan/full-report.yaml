              fiscal 2024 to 68% in fiscal 2025. International revenue represented 41% of total revenue in fiscal 2025.
              Navan's AI chatbot Ava handled approximately 50% of user interactions without live agent intervention in
              the first half of fiscal 2026. The company acquired six companies to expand internationally: R&M (UK,
              April 2021), Comtravo (Germany, February 2022), Resia (Scandinavia, March 2022), Atlanta (Spain, November
              2022), Tripeur (India, April 2023), and Regent (Italy, June 2024). The company previously identified a
              material weakness in internal controls (fiscal year ended January 31, 2023), which was fully remediated by
              the end of fiscal 2025.
