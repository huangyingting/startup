  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >-
              Navan's revenue model combines four distinct streams. The largest is supplier economics: airline booking
              fees, hotel commissions, and supplier-paid overrides (similar to traditional TMCs) that are recognized on
              a net basis as GBV flows through the platform. Second is SaaS platform fees charged to enterprise
              customers on a per-seat or platform access basis, providing recurring subscription-like revenue. Third is
              corporate card interchange: when Navan Card (Visa/Mastercard) is used, Navan captures interchange revenue
              as the card program operator. Fourth is supplier content access fees and premium features for travelers
              and travel managers. Navan does not disaggregate revenue into these streams in its S-1/A, disclosing only
              total revenue and gross profit. The company's effective take rate on GBV is approximately 8.1% ($536.8M
              FY2025 revenue / $6.6B GBV), which compares favorably to traditional TMC take rates of 6–10% but is above
              the typical 2–4% take rate for pure OBT (online booking tool) platforms. This premium take rate suggests
              that SaaS fees and card interchange contribute materially alongside supplier economics. Revenue is
              recognized primarily in the period of booking (supplier economics, card interchange) or ratably over the
              contract term (SaaS fees). The company has not disclosed deferred revenue or backlog, making it difficult
              to assess recurring revenue quality precisely. NRR consistently above 110% implies that existing customers
              are expanding their spend on the platform, partially through natural travel recovery and partially through
              multi-product upsell.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
