  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Navan's competitive landscape spans three overlapping competitive sets. In corporate travel management, it
              competes with traditional travel management companies (TMCs) such as Amex GBT and BCD Travel that process
              bookings via human agents, and against modern OBT (online booking tool) platforms such as SAP Concur
              Travel and TravelPerk. In expense management, SAP Concur Expense is the dominant incumbent, with
              Expensify, Certify, Emburse, and Zoho Expense as secondary competitors. In corporate cards and spend
              management, Ramp (now serving 50,000+ businesses), Brex (a wholly-owned subsidiary of Capital One since
              2025–2026), and Brex (which acquired Brex) represent the primary competitive threat as these companies add
              travel booking to their spend management platforms. A fourth competitive set consists of vertical
              integration from ERP vendors: SAP S/4HANA with embedded Concur creates a lock-in risk for large
              enterprises, and Oracle Expenses (part of Oracle Cloud ERP) serves Oracle's installed base. No single
              competitor offers the full-stack T&E+card integration at Navan's scale and depth. Amex GBT (American
              Express Global Business Travel) is the largest TMC globally, with revenue of approximately $2.3 billion
              (FY2023) and serving thousands of enterprise accounts; it launched its 'Egencia' unified T&E platform
              (formerly a Booking Holdings subsidiary) that directly competes with Navan's modern booking/expense
              interface. SAP Concur is the dominant enterprise expense and travel platform with SAP ERP integration; it
              has been the market leader by enterprise installed base for over a decade. Spotnana is a next-generation
              travel infrastructure startup (Travel-as-a-Service) that powers platforms like Brex's Empower and other
              TMC modernization efforts; it competes in the infrastructure layer, not directly with end customers.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
              - CP007
          - type: table
