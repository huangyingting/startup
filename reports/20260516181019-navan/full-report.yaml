chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, History, and Corporate Structure
        blocks:
          - type: paragraph
            body: >-
              Navan, Inc. is a Delaware-incorporated corporate travel and expense (T&E) management platform
              headquartered at 3045 Park Boulevard, Palo Alto, California 94306. The company was founded in February
              2015 under the name TripActions by co-founders Ariel Cohen and Ilan Twig, who previously co-founded
              StreamOnce (acquired by Jive Software in 2013). TripActions rebranded to Navan in 2023 to reflect its
              expanded product portfolio beyond travel management. Navan operates as a dual-class corporation: Class A
              common stock carries 1 vote per share while Class B common stock carries 30 votes per share, concentrating
              voting control with co-founders Cohen (~24% of voting power post-IPO) and Twig (~43% of voting power). The
              company filed its S-1 on September 19, 2025, filed its S-1/A amendment on October 10, 2025, and completed
              its IPO in November 2025 on the Nasdaq Global Select Market under the ticker symbol NAVN. The IPO pricing
              range was $24–$26 per share with 30 million new Class A shares offered by the company and approximately
              6.9 million shares by selling stockholders. Navan elected emerging growth company status under the JOBS
              Act. The company has subsidiaries in Canada, UK, France, Germany, Ireland, Israel, Singapore, India, UAE,
              Australia, and New Zealand, with employees in 16 countries.
