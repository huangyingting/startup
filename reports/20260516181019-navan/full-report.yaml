  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Business and Market Risks
        blocks:
          - type: paragraph
            body: >
              Navan's single most material risk is its deep dependence on corporate travel demand. Travel Management
              revenue constitutes the substantial majority of total revenue — Navan explicitly discloses in its S-1/A
              that this dependency creates an existential revenue risk in the event of a prolonged travel disruption
              (pandemic, macro recession, secular shift to virtual meetings). The company's FY2025 revenue was $536.8M,
              driven by an 8.1% effective take rate on $6.6B GBV; a 25% reduction in GBV would erase approximately $134M
              in revenue — roughly equivalent to eliminating the company's gross profit improvement from FY2024 to
              FY2025. IATA's June 2025 outlook noted persistent cost pressures and geopolitical headwinds in the airline
              sector, adding context to the durability of the corporate travel recovery.

              The competitive landscape represents a second near-term risk. SAP Concur's incumbency in enterprise T&E is
              entrenched through deep ERP integrations; TravelPerk is scaling aggressively in Europe; and FinTech
              competitors Ramp and Brex (now part of Capital One) are expanding into integrated expense management that
              directly threatens Navan's combined travel + card proposition. Navan's NPS of 43 and CSAT of 96% provide
              some buffer, but competitive win rates vs. these specific players are not publicly disclosed and represent
              a key diligence gap. Revenue growth sustainability (33% FY2025, 30% H1 FY2026) depends on continued
              corporate travel recovery, successful cross-sell of expense and card products, and winning net-new
              enterprise logos.
            claimRefs:
              - CR001
              - CR002
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
              - CR026
              - CR038
