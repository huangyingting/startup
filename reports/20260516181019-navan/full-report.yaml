    title: Investment KPIs
    type: kpi
    description: >-
      IC-ready scoring of key investment dimensions for Navan (NAVN) as of May 2026: market, proof, moat, economics,
      risk, valuation, and evidence quality
    sourceRefs:
      - SV013
      - SV001
      - SV015
      - SV016
    notes: >-
      Status: confirmed = directly evidenced; estimated = analyst-derived; missing = not publicly available. Scores are
      qualitative assessments by the analyst.
    data:
      items:
        - label: NAMN Market Cap (May 15, 2026)
          value: ~$3.6B
          status: confirmed
          note: $18.46 × ~196M shares outstanding
        - label: LTM Revenue
          value: $613M
          status: confirmed
          note: FY2025 $537M + H1 FY2026 $329M - H1 FY2025 est. $253M
        - label: EV/LTM Revenue
          value: ~4.7x
          status: estimated
          note: EV ~$2.9B / LTM $613M
        - label: Revenue Growth (H1 FY2026)
          value: 30%
          status: confirmed
          note: YoY H1 FY2026 per S-1/A
        - label: Gross Margin (H1 FY2026)
          value: 72%
          status: confirmed
          note: Per S-1/A supplemental
        - label: Net Revenue Retention
          value: '>110%'
          status: confirmed
