companyProfile:
  summary: >-
    Navan, Inc. (formerly TripActions) is an AI-powered corporate travel and expense management platform headquartered
    in Palo Alto, California. Founded in 2015 by Ariel Cohen and Ilan Twig, the company rebranded to Navan in 2023 to
    reflect its expanded product suite. Navan completed its Nasdaq IPO in November 2025 at $25 per share, raising
    approximately $700M net. As of H1 FY2026, Navan serves 10,000+ enterprise and mid-market customers across 16
    countries, processing over $17B in annual gross booking value and $3.7B in payment volume on its corporate card
    platform.
  foundedDate: '2015-02-01'
  founders:
    - name: Ariel Cohen
      role: Co-founder and CEO
      background: Previously co-founded StreamOnce, acquired by Jive Software in 2013
      claimRefs:
        - CO003
    - name: Ilan Twig
      role: Co-founder and CTO
      background: Previously co-founded StreamOnce alongside Cohen; leads product and technology at Navan
      claimRefs:
        - CO003
  foundingLocation: Palo Alto, California, USA
  headquarters: 3045 Park Boulevard, Palo Alto, California 94306, USA
  productSummary: >-
    Navan offers an integrated platform combining: (1) Travel — AI-powered travel booking with GDS access, inventory
    from 2M+ hotels and all major airlines; (2) Expense — automated expense reporting, receipt capture, and policy
    enforcement; (3) Cards — Navan Cards (Visa corporate cards) with real-time spend controls and automatic
    reconciliation. The AI layer (Navan Cognition / Ava) handles approximately 50% of traveler interactions and
    automates policy compliance.
  customerFocus: >-
    Enterprise and mid-market corporations (primarily 100-10,000+ employees); 41% of GBV from international travel; 36%
    of customers use 3 or more Navan products.
  businessModel: >-
    Subscription SaaS fees plus supplier commissions (GDS/hotel rebates), corporate card interchange revenue (primary
    margin expansion driver), and implementation/service fees. Card interchange from $3.7B payment volume is the
    highest-margin revenue stream.
