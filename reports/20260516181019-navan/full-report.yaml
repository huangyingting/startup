      - number: '3.2'
        title: Key Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              SAP Concur is the market-defining incumbent in enterprise T&E. Launched as a standalone company in 1993
              and acquired by SAP for $8.3 billion in 2014, SAP Concur is embedded in SAP's ecosystem serving large
              enterprises globally. Its competitive strength lies in its deep SAP ERP integration, mature policy engine,
              and market-leading installed base; its weaknesses include a complex user interface criticized as dated,
              slow innovation cycles as a large SAP business unit, and high total cost of ownership for implementation
              and maintenance. SAP Concur recently launched an 'Agentic AI assistant' for travel bookings (Concur Travel
              AI). Amex Global Business Travel (GBT) is the world's largest TMC, offering a combination of technology
              (Egencia platform) and human travel agent services. In 2022, Amex GBT went public via SPAC merger (GBTG),
              giving it public market capital. Amex GBT competes for enterprise accounts where full-service TMC support
              is valued. Its Egencia platform now integrates travel booking with expense reconciliation and SAP Concur
              Expense integration. Ramp is a spend management platform serving 50,000+ businesses with corporate cards,
              expense management, accounts payable, and recently travel booking. Ramp's travel product uses Spotnana's
              infrastructure for booking. Ramp's competitive advantage includes its AI-driven finance automation,
              competitive interchange economics (5% cash back), and lower-friction onboarding for SMB/mid-market. Ramp
              does not yet have Navan's GDS/NDC inventory depth or supplier relationships for corporate travel. Brex
              (Capital One subsidiary since acquisition) is an all-in-one spend management platform originally targeting
              startups and high-growth tech companies. Brex Empower includes corporate cards, expense management, and
              travel via Spotnana infrastructure. Its acquisition by Capital One provides balance sheet access and
              banking capabilities. TravelPerk is a Barcelona-based corporate travel platform primarily serving SMBs and
              mid-market in Europe and increasingly North America. TravelPerk raised over $400M and built a direct
              integration model with airlines and hotels, competing directly with Navan for SMB accounts. Expensify has
              15 million+ members and offers expense reports, corporate cards, and now travel booking. Its strength is
              in SMB and accounting workflow integration (QuickBooks, Xero); it lacks the enterprise T&E management
              depth of SAP Concur or Navan.
            claimRefs:
              - CP008
              - CP009
              - CP010
              - CP011
              - CP012
