      - number: '6.4'
        title: Retention, Durability, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              Navan's Net Revenue Retention Rate (NRR) exceeded 110% as of January 31, 2025 and January 31, 2024 — a
              top-tier SaaS retention benchmark indicating that existing customers, on average, spent more than 10% more
              on Navan year-over-year through a combination of usage growth and product cross-sell. NRR >110% is
              consistent with strong gross logo retention (typically >85-90% for enterprise software platforms) plus
              meaningful net expansion.

              CSAT (96%) and NPS (43) are strong for enterprise travel platforms (industry CSAT benchmarks are typically
              70-85%; NPS >40 is considered excellent in enterprise software). Both metrics are company-measured and not
              independently audited.

              The platform's land-and-expand structure creates natural durability: Navan's travel booking generates
              workflow lock-in via integrated expense, card, and policy management, making switching to a competitor
              operationally complex. Annual and multi-year subscription contracts (for expense management) create
              forward revenue visibility beyond the transaction-by-transaction travel booking model.
