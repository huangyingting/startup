          note: 30% growth + 3% non-GAAP op margin; improving toward 40
        - label: Analyst Recommendation
          value: CONDITIONAL HOLD
          status: estimated
          note: 'BUY trigger: $14-16 or GAAP profit; Sell trigger: NRR <100%'
