      - number: '4.3'
        title: Unit Economics, Capital Adequacy, and Diligence Gaps
        blocks:
          - type: paragraph
            body: >-
              Navan's disclosed unit economics are partial. NRR consistently above 110% signals strong land-and-expand
              dynamics. The company has 10,000+ active customers with the company citing 36% on three or more
              products—this multi-product attach is a proxy for higher LTV. The company does not disclose CAC (customer
              acquisition cost), LTV (lifetime value), payback period, or revenue per customer, making bottom-up
              underwriting of sales efficiency impossible from public information alone. Gross margin of 68–72% is
              strong for a T&E platform that has supply chain (travel inventory) costs; for reference, SaaS companies
              typically target 70–80%. The driver of margin expansion is the mix shift toward higher-margin card
              interchange and SaaS, plus operational leverage in the supplier economics stream. Operating expense
              discipline is visible: net loss improved by 57% YoY in FY2025 while revenue grew 33%, but SBC remains high
              ($82M+ annually). Post-IPO capital position: the November 2025 IPO raised approximately $700M in net
              proceeds. Combined with cash on hand pre-IPO (estimated $400M+ based on financing history), Navan likely
              has $1B+ in total cash as of IPO date. At H1 FY2026 GAAP operating burn rate of approximately $113M per 6
              months ($226M annually), runway exceeds 4 years from IPO proceeds alone. However, actual cash burn is
              lower because non-GAAP positive H1 FY2026 suggests cash burn is approaching breakeven. The company's
              primary capital use is: sales and marketing (to acquire customers), R&D (product development), and
              potential M&A (as evidenced by 12+ acquisitions to date). The company has also issued convertible notes
              historically; specific debt obligations are not fully disclosed in the S-1/A summary sections. A material
              weakness in internal controls was disclosed in the S-1/A—the company restated its FY2023 financials and
              disclosed a material weakness as of January 31, 2024—which is a significant diligence blocker for any
              investor relying on historical financial accuracy.
