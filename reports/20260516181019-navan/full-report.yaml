      - number: '3.4'
        title: Exhibits
        blocks:
          - type: callout
            title: Ramp and Brex/Capital One Adding Travel — Most Material Near-Term Threat
            body: >-
              Ramp (50,000+ customers) and Brex (Capital One subsidiary) are both building travel booking on top of
              their spend management platforms using Spotnana's infrastructure. Since their card and expense products
              are already deployed with tens of thousands of companies, adding travel as a feature—rather than a new
              product sale—significantly reduces Navan's ability to win greenfield mid-market accounts. This 'travel as
              a feature' commoditization is the most material competitive risk to Navan's differentiated positioning.
            calloutType: risk
            claimRefs:
              - CP010
              - CP011
              - CP015
              - CP025
          - type: callout
            title: 'Unified Platform Moat: NRR >110% Reflects Switching Cost Depth'
            body: >-
              Navan's 36% multi-product attach rate and consistent NRR >110% demonstrate that its unified T+E+card
              platform creates durable switching costs. Once a company integrates Navan Cards into employee wallets,
              Navan Travel into booking policy, and Navan Expense into finance workflows, replacement requires a
              multi-system migration. No single competitor offers equivalent integration depth at Navan's scale and
              breadth of supplier access.
            calloutType: strength
            claimRefs:
              - CP021
