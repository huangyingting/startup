      - number: '7.3'
        title: Financial and Internal Control Risks
        blocks:
          - type: paragraph
            body: >
              Navan's financial risk profile centers on three concerns. First, sustained GAAP operating losses: net
              losses of $332M (FY2024) and $181M (FY2025) reflect a company that has not yet demonstrated durable
              profitability. The first non-GAAP operating profit ($11M in H1 FY2026) is an encouraging milestone, but
              GAAP profitability depends on controlling stock-based compensation, which significantly inflates reported
              losses. SBC inflated FY2025 GAAP costs and ongoing RSU vesting creates continuing dilution.

              Second, the material weakness history presents residual credibility risk. Navan identified a material
              weakness in internal controls in FY2023, which necessitated restatements of FY2022 and FY2023 financial
              statements. The material weakness was declared remediated as of January 31, 2025, but as a newly public
              company required to file its first SOX Section 404(b) auditor attestation, the risk of additional control
              deficiencies being identified by external auditors remains elevated.

              Third, NAVN stock trading at $18.46 as of May 15, 2026 — approximately 25-28% below the November 2025 IPO
              price range of $24-26 — reflects market skepticism about the profitability trajectory. Depressed stock
              price has implications for employee retention (underwater equity grants), future capital raises (higher
              dilution), and acquisition currency. The convertible note conversion at 65% discount and SAFE conversion
              at 85% of IPO price created immediate dilution for investors purchasing at the $25 offering price.
            claimRefs:
              - CR003
              - CR004
              - CR005
              - CR006
              - CR030
              - CR031
              - CR032
          - type: table
            tableRef: TR002
            claimRefs: []
          - type: figure
            figureRef: FR003
            claimRefs: []
      - number: '7.4'
        title: Regulatory, Cybersecurity, and AI Risks
        blocks:
          - type: paragraph
            body: >
              Navan's 16-country operations create substantial regulatory exposure. GDPR compliance is mandatory for
              EU/UK operations, requiring data processing agreements with all enterprise customers, response to data
              subject access requests, and 72-hour breach notification. Post-Brexit UK GDPR operates as a separate
              regime with its own supervisory authority (ICO). In Singapore, MAS financial services regulations apply to
              card and payment operations. EU Interchange Fee Regulation (IFR) caps interchange at 0.3% (credit) and
              0.2% (debit) for consumer cards — limiting card revenue economics in Europe, though the regulation may not
              apply to all commercial card products. SOX Section 404 compliance obligations as a newly public company
              add domestic regulatory burden. The FTC has increased scrutiny of AI claims in financial products,
              potentially affecting how Navan markets Navan Cognition's expense categorization and travel recommendation
              capabilities.

              Cybersecurity risk is acute for a travel management company. GovInfoSecurity has documented that travel
              management companies are increasingly targeted by cybercriminals due to their rich stores of personal,
              financial, and itinerary data. Navan processes sensitive travel, payment, and PII data for 10,000+
              enterprise customers; a material breach would trigger regulatory notification requirements across multiple
              jurisdictions and could impair customer trust. PCI DSS Level 1 compliance is mandatory for card-issuing
              operations.

              AI risk from Navan Cognition and the Ava AI agent (handling ~50% of customer interactions in H1 FY2026)
              introduces a novel operational dimension: AI hallucinations in travel booking could result in incorrect
              reservations, policy violations, or compliance failures; model dependency on third-party LLM providers
              creates supply chain risk; and emerging AI regulation may impose disclosure requirements on AI-generated
              customer interactions.
            claimRefs:
              - CR011
              - CR012
              - CR015
              - CR018
              - CR019
              - CR033
              - CR034
              - CR037
              - CR039
          - type: table
