      - number: '8.4'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              The bull case (25% probability): Navan sustains 25-28% revenue growth through FY2028, expands gross
              margins to 75%+, achieves GAAP operating profitability by FY2027, and benefits from multiple expansion to
              7-9x forward revenue as profitability is confirmed. At 8x FY2028E revenue ($1.0B), NAVN implied price is
              $40. The bull case requires a stable macro travel environment, successful cross-sell of expense/card to
              50%+ of the customer base, and no significant competitive losses to SAP Concur or Ramp.

              The base case (45% probability): Revenue growth decelerates to 20-22% by FY2028, gross margins stabilize
              at 70-73%, GAAP profitability emerges by FY2028. At 5.5-6.5x FY2027E revenue (~$850M), NAVN fair value is
              $22-28 (20-50% upside from current). The base case assumes some macro headwinds (selective enterprise
              slowdown), continued competitive pressure from SAP Concur in large enterprise, and moderate SBC dilution
              (~3-4% annually).

              The bear case (30% probability): A macro recession or corporate travel freeze (similar to COVID impact but
              more mild) reduces GBV by 20-25%, revenue growth falls to single digits, and multiple compression to 3-4x
              LTM revenue drives NAVN to $12-15. In this scenario, the $700M IPO cash cushion preserves liquidity but
              investor confidence erodes. The dual-class structure prevents activist intervention.
            claimRefs:
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
          - type: table
            tableRef: TV005
