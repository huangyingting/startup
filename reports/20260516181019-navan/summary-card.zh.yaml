summary:
  headline: Navan (NAAM) 是差异化清晰的企业差旅与费用（T&E）平台，NRR 强、利润率在扩张；但 GAAP 盈利尚未确认，$18.46 维持有条件持有，跌至 $14-16 或首个 GAAP 盈利季度出现后再触发买入。
