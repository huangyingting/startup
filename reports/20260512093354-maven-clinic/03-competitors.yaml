callouts:
  - calloutType: strength
    title: Full-Lifecycle Scope Creates Consolidation Opportunity
    body: >
      Maven's coverage of fertility, maternity, postpartum, menopause, and pediatrics in a single
      platform is unmatched by any competitor. As employers increasingly seek to consolidate
      point solutions into single-vendor benefits suites to reduce HR administrative complexity,
      Maven's breadth is a structural selling point that fertility-only competitors cannot replicate
      without substantial product investment and clinical network expansion.
    claimRefs:
      - CP001
      - CP017
      - CP035

  - calloutType: risk
    title: Competitor Distress May Indicate Sector-Wide Market Headwinds
    body: >
      Carrot Fertility's 2024 layoffs, Kindbody's revenue miss, and Progyny's revenue decline from
      $399M to $369M collectively signal pricing pressure and growth deceleration across the employer
      digital health benefits sector. While these adverse signals create near-term competitive
      breathing room for Maven, they may also foreshadow employer budget compression and increased
      competitive rebidding activity that could affect Maven's own renewal rates and PEPM pricing
      power going forward.
    claimRefs:
      - CP036
      - CP037
      - CP038

  - calloutType: insight
    title: Competitor Organizational Instability Opens Enterprise Account Acquisition
    body: >
      Carrot Fertility's executive turnover and 2024 layoffs create a customer acquisition
      opportunity for Maven, particularly among Carrot's mid-market clients seeking platform
      stability and organizational continuity. Kindbody's financial difficulties similarly suggest
      that its employer clients may reassess platform relationships at renewal. Maven's organizational
      scale and October 2024 Series F capital position it to capitalize on competitor client churn.
    claimRefs:
      - CP012
      - CP006
      - CP031

