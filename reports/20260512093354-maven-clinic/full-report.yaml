      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Full-Lifecycle Scope Creates Consolidation Opportunity
            body: >
              Maven's coverage of fertility, maternity, postpartum, menopause, and pediatrics in a single platform is
              unmatched by any competitor. As employers increasingly seek to consolidate point solutions into
              single-vendor benefits suites to reduce HR administrative complexity, Maven's breadth is a structural
              selling point that fertility-only competitors cannot replicate without substantial product investment and
              clinical network expansion.
