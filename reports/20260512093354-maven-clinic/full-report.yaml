      - number: '5.1'
        title: Platform Architecture and Delivery Model
        blocks:
          - type: paragraph
            body: >
              Maven Clinic operates a cloud-native software-as-a-service platform deployed entirely on Amazon Web
              Services, providing the reliability, scalability, and HIPAA-compliant data isolation required for
              enterprise clinical services at Fortune 500 scale. The member-facing experience is delivered through iOS
              and Android native mobile applications, enabling real-time access to care programs, appointment
              scheduling, and virtual consultations from any location. An employer-facing web portal gives HR and
              benefits administrators visibility into population health metrics, member enrollment management, and
              program ROI dashboards. The platform API integration layer connects to major HRIS platforms including
              Workday, SAP, and ADP, enabling automated employee enrollment and eligibility synchronization. Maven
              Intelligence, the company's proprietary AI layer launched in May 2023, operates across all clinical
              programs — routing members to appropriate clinical pathways, stratifying risk for high-acuity cases, and
              personalizing care recommendations in real time. EMR integration capabilities support clinical data
              handoffs to in-person care providers where employed. The architecture supports telehealth video
              consultations, asynchronous clinical messaging, and structured care protocols delivered through a single
              unified platform.
