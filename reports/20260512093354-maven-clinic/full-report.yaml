            body: >
              Carrot Fertility's 2024 layoffs, Kindbody's revenue miss, and Progyny's revenue decline from $399M to
              $369M collectively signal pricing pressure and growth deceleration across the employer digital health
              benefits sector. While these adverse signals create near-term competitive breathing room for Maven, they
