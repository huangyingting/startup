      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Carrot Fertility is Maven's most direct competitor in employer fertility benefits, serving over 1,000
              employer clients with a fertility-specific platform covering IVF navigation, egg freezing, surrogacy, and
              adoption support. Carrot raised $75 million in a Series C round led by Tiger Global and Spectrum Equity,
              achieving a peak valuation estimated at $7.1 billion in 2022. In April 2024, Carrot disclosed layoffs and
              executive changes, signaling organizational instability and potentially declining growth momentum.
              Carrot's provider network is estimated at approximately 2,000 specialists — roughly 40 percent of Maven's
              5,000+ network. Unlike Maven, Carrot does not offer maternity, postpartum, menopause, or pediatric
              programs, limiting its appeal to employers seeking a single-vendor lifecycle solution. Progyny (NASDAQ:
              PGNY) is the only publicly traded pure-play fertility benefits manager, generating approximately $369
              million in full-year 2024 revenue — a decline from $399 million in 2023 — reflecting headwinds in its
              fertility drug carve-out segment. Progyny served 361 enterprise clients in Q4 2024, predominantly large
              Fortune 500 employers attracted by its smart-cycle IVF program bundling treatment with medication
              benefits. Progyny's public market status provides financial transparency but also constraint: revenue
              shortfalls and missed analyst estimates in 2024 created market pressure. Kindbody operates a hybrid model
              combining physical fertility clinics with virtual benefits navigation, having raised approximately $300
              million. In 2024, Kindbody reportedly missed revenue targets and implemented cost reductions, raising
              questions about the hybrid model's unit economics. Kindbody's physical clinic footprint of over 30
              locations offers in-person care access that Maven cannot replicate, though at higher fixed cost and
              execution complexity.
