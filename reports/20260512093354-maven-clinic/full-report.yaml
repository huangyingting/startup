  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Maven Clinic competes in the emerging market for employer-sponsored virtual women's and family health
              benefits. The relevant TAM spans digital health platforms addressing the full female reproductive and
              family lifecycle: fertility and preconception care, pregnancy and prenatal management, postpartum and
              return-to-work support, pediatric care coordination, menopause management, and — beginning in 2026 — GLP-1
              and hormone care. Independent analysts define the global digital women's health market at approximately
              $2.1–3.2 billion in 2024, with projections ranging from $4.7 to $5.3 billion by 2026 at CAGRs of 15–21%. A
              broader US femtech definition (including devices, apps, and wellness) reaches $16.7 billion. Maven's
              market excludes traditional brick-and-mortar OB-GYN, fertility clinic, and hospital care, as well as
              direct-to-consumer app models (Flo, Glow) that lack Maven's clinical care team and payer-grade ROI
              orientation. Status-quo employer alternatives — EAPs, maternity case management firms, and standalone
              fertility clinic networks — define the competitive boundary from the customer's perspective. The employer
              health benefits market as a whole exceeds $800 billion in annual US spend, creating a large pool from
              which digital platforms compete for discretionary allocation. Maven's ability to define and claim a
              distinct sub-segment — specifically digital clinical-grade family health lifecycle benefits — is a key
              moat against undifferentiated telehealth substitutes.
            claimRefs:
              - CM001
