      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Maven's addressable market can be analyzed through three nested lenses. The TAM — global digital women's
              health — is estimated at $2.1–3.2 billion in 2024 by firms including Vantage Market Research, Data Bridge,
              and Grand View Research, expanding to $4.7–5.3 billion by 2026. A broader employer digital health SAM —
              the total employer-and-payer market for digital health benefit programs across all clinical categories in
              the US — is estimated at $20–30 billion, of which the women's and family health slice is a material but
              hard-to-isolate sub-segment. Maven's current ARR of approximately $268 million represents the company's
              SOM: roughly 8% of the narrow digital women's health TAM, or approximately 1% of the broad employer
              digital health SAM.

              The US fertility market alone is a critical sub-segment. IBISWorld projects the US fertility clinic
              industry to reach $10.9 billion by 2026. Harris Williams' Q3 2023 Fertility Market Overview estimated the
              broader employer-funded fertility benefit sub-market at $5.6–8.4 billion. With 42% of large US employers
              now offering fertility benefits — up from 13% in 2016 — and state mandates expanding in 2025–2026, this
              sub-market carries significant structural tailwind.

              Analyst CAGR estimates vary by scope. The narrowest femtech definitions (period tracking, fertility apps)
              yield lower CAGRs (~15%), while employer-grade clinical platforms with outcome guarantees command premium
              pricing and faster growth trajectories (~19–21%). Maven's all-in-one lifecycle approach positions it in
              the higher-CAGR tier of this market. Critically, the SAM and SOM estimates are approximations: Maven has
              not disclosed geographic or segment revenue breakdowns, and analyst methodologies differ substantially in
              how they bound the market.
