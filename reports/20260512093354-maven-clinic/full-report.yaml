      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Growth drivers for Maven's market are compounding in 2026. Employer healthcare costs rose 8.5–10%
              annually, making ROI-demonstrable digital interventions financially attractive. Talent competition in
              post-pandemic labor markets elevated family health benefits as a key differentiator, with McKinsey
              documenting large employers taking an activist role in benefits procurement to directly control costs.
              State fertility coverage mandates are expanding — IVF coverage is now legally mandated in 20+ states —
              creating regulatory tailwinds for fertility benefit platform adoption. Maven's own 2026 State of Benefits
              report found that 66% of employers plan to increase investment in family health programs within three
              years. Meanwhile, well-being benefit budgets are projected to grow more than 44% in 2026.

              The adoption constraint landscape is equally material. Digital health app fatigue — too many point
              solutions — reduces member engagement and employer ROI, with active utilization rates typically 5–15%
              despite broad eligibility. HRIS integration friction raises implementation costs for mid-market employers
              on legacy platforms. The post-Dobbs legislative environment creates state-by-state care navigation
              complexity, exposing Maven to legal and reputational risk in reproductive health. HIPAA and GDPR data
              privacy constraints limit Maven's AI personalization capabilities, especially for international expansion.
              And Maven's 2026 DTC expansion introduces a new customer acquisition challenge: convincing individual
              consumers to pay out-of-pocket for services previously subsidized by employers. These structural
              constraints must be managed as Maven moves beyond its Fortune 500 core into mid-market and consumer
              segments.
