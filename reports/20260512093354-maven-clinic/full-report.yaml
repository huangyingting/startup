  - id: TV005
    title: Exit Readiness and Diligence Asks Table
    description: >
      Maven Clinic's exit readiness assessment across IPO and M&A paths, plus the minimum diligence data required before
      a confident capital commitment at current valuation.
    enumerationScope:
      coverage: exhaustive
      basis: >
        All material exit paths and diligence gaps identified from prior chapters' evidence. Private company data
        limitations mean some items cannot be confirmed from public sources.
    claimRefs:
      - CV014
      - CV015
      - CV027
      - CV028
      - CV032
      - CV033
      - CV036
    columns:
      - Topic
      - Missing Evidence or Readiness Gap
      - Why It Matters for Investment Decision
      - Owner / Diligence Path
    rows:
      - - Audited financials and revenue quality
        - No audited financial statements; all ARR/revenue from estimates
        - Material risk that ARR figures are overstated; cannot confirm growth quality
        - Request 3-year audited financials and quarterly mgmt accounts
      - - Net Revenue Retention (NRR)
        - NRR not publicly disclosed; inferred above 100% from growth trajectory
        - NRR determines revenue durability; below 100% would be material negative signal
        - Request NRR by cohort and employer segment from CFO
      - - Employer revenue concentration
        - Top-client revenue share undisclosed; Herfindahl index unavailable
        - Concentration above 20% in top 5 clients creates single-event churn risk
        - Request top-20 client revenue share and renewal schedule
      - - Coretek patent litigation
        - Full pleadings and expert IP opinion not in public record
        - Adverse judgment could require royalty payments or product redesign
        - Request litigation dossier and IP counsel opinion from CLO
      - - FDA regulatory classification of Maven Intelligence
        - No public disclosure of SaMD classification or 510(k) status
        - FDA enforcement action could suspend Maven Intelligence operations
        - Request FDA correspondence and regulatory counsel memo
      - - Cap table and preference waterfall
        - Cap table structure undisclosed; preference stack not itemized
        - $425M+ in cumulative raises creates significant preference overhang
        - Request cap table with preference stack and waterfall analysis
      - - Path to profitability model
        - No public operating plan or profitability timeline
        - Without profitability visibility, IPO access and terminal multiple risk is high
        - Request 3-year operating plan with EBITDA bridge from CFO
      - - Dobbs-era legal opinions by state
        - State-by-state navigation protocols exist but legal opinions not reviewed
        - Criminal exposure for care navigation in restrictive states could be material
        - Request CLO's state-by-state legal opinions and protocol documentation
      - - DTC unit economics (GLP-1 launch)
        - No DTC CAC, LTV, or payback period data available
        - DTC channel could drag margins or prove unviable at scale
        - Request first-90-day DTC cohort unit economics from CMO
      - - IPO or M&A exit timeline and plan
        - No disclosed IPO timeline; board-level exit strategy undisclosed
        - Runway of 18–24 months creates time pressure without confirmed exit path
        - Discuss exit timeline, IPO preparation milestones, and M&A optionality with board
    notes: >
      All diligence asks should be completed before capital commitment at current or higher valuation. Several items
      (NRR, concentration, cap table) are data-room standard and should be immediately available if Maven is actively
      seeking investment. Absence of any of the top four items would be a material diligence red flag.
