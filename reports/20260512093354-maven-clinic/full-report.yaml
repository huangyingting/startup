      - number: '6.2'
        title: Adoption Trajectory and Growth
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's covered lives count has grown substantially from its founding in 2016 through the October
              2024 Series F disclosure of 17 million covered lives. The company has not disclosed granular year-by-year
              growth data, but key public milestones anchor the trajectory: the company served a few hundred thousand
              lives in its early years, crossed one million covered lives by approximately 2020-2021, and accelerated
              significantly during the COVID-19 era as employer demand for digital women's health benefits surged. By
              the time of the October 2024 Series F, Maven served 17 million covered lives across more than 2,000
              employer clients — approximately doubling since 2022. The employer client count grew from a few dozen in
              2018 to over 500 by 2021, and to the current 2,000-plus as of 2024. Adoption drivers include the expansion
              of IVF coverage mandates among large employers, increased employer awareness of maternal health cost
              drivers (C-sections, NICU stays, preterm births), and post-pandemic prioritization of women's health
              benefits for talent retention. The March 2026 DTC GLP-1 launch adds a new adoption vector, but no consumer
              enrollment data are yet available. Employee utilization rates among eligible workers are estimated at
              20–30% for active enrollment, consistent with employer benefit adoption benchmarks, but Maven has not
              publicly confirmed this figure.
