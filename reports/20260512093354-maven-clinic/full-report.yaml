      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Maven's market is structurally B2B2C: the buyer and payer is an employer or health plan; the user is an
              employee or covered dependent. This creates a two-sided market dynamic where Maven must simultaneously
              convince institutional buyers of ROI and engage individual users with clinical value. The four primary
              buyer segments are: (1) large self-insured employers (Fortune 500, typically 10,000+ employees), who are
              Maven's core market and first-mover clients; (2) mid-market employers (1,000–9,999 employees), an emerging
              growth tier as Maven scales its SMB offerings; (3) managed care organizations and health plans (e.g., UHC,
              BCBS), which embed Maven as a member benefit; and (4) government and public-sector employers, a relatively
              underpenetrated segment constrained by procurement complexity.

              The adoption path follows the annual benefits procurement cycle. Brokers and benefits consultants
              typically introduce Maven at the RFP stage (Q2–Q3). HR VPs evaluate clinical and ROI evidence; CFOs and
              Legal review contracts. Implementation typically takes 3–6 months, with value realization (lower maternity
              claims) visible within 12–18 months. Maven's primary buying trigger is demonstrated clinical ROI: the
              company cites $2,400–$5,000 in maternity cost savings per engaged member. For mid-market employers, broker
              relationships and peer pressure from Fortune 500 comparables also serve as adoption catalysts. Maven's
              2026 DTC launch extends its reach to individual consumers outside the employer channel for the first time,
              opening a new segment but also introducing new customer acquisition challenges.
