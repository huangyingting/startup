      - number: '7.3'
        title: Operational Risks
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's operational risk profile is driven primarily by the complexity of delivering
              clinical-quality care at scale through a virtual platform. The most acute operational risk is AI
              hallucination or erroneous recommendation from Maven Intelligence, the company's clinical AI layer: a
              single materially wrong recommendation affecting a high-acuity patient (e.g., medication dosage during
              fertility treatment or postpartum psychiatric care) could create patient-safety liability and reputational
              damage. Maven has not publicly disclosed the clinical validation protocols applied to Maven Intelligence
              outputs or whether the tool is classified as SaMD by the FDA. Provider-network quality control across
              5,000-plus credentialed virtual providers is inherently difficult to maintain at scale; Maven has not
              disclosed its provider credentialing methodology, adverse-event rates, or clinical outcome audits. HRIS
              integration failures during employer onboarding are a recurring challenge: Maven's eligibility data
              pipeline depends on Workday, SAP, and ADP APIs that vary in reliability across clients, and a failed
              integration can delay member activation and erode employer satisfaction. Reproductive-health data breaches
              represent the most severe tail risk: Maven's repositories contain highly sensitive protected health
              information (PHI) including fertility treatment records, pregnancy history, and psychiatric care notes,
              and Dobbs-era state laws could compel Maven to disclose reproductive health data in response to
              law-enforcement requests absent the HIPAA Privacy Rule protections. Maven holds SOC 2 Type II, ISO 27001,
              and HIPAA BAA certifications, which provide a partial but not complete mitigation. The November 2024
              workforce reduction of approximately 60 employees introduced organizational disruption and morale risk
              during a critical growth ramp; Maven's 2025 C-suite hires are still ramping into their roles. Kate Ryder's
              dual role as CEO and brand anchor creates key-person risk: her departure would likely trigger adverse
              market signaling and potential talent attrition.
