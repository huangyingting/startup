      - number: '5.2'
        title: Product Modules and SKU Map
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's commercial product portfolio spans eight modules covering the full reproductive and family
              health lifecycle. Maven Fertility covers preconception counseling, IVF and IUI navigation, fertility
              coaching, and egg freezing support, addressing the full employer fertility benefit from pre-cycle through
              IVF closure. Maven Pregnancy provides prenatal OB consultations, high-risk pregnancy management, and care
              coordination with in-person providers. Maven Postpartum addresses lactation support, postpartum depression
              screening, and return-to-work coaching for new mothers. Maven Parenting, expanded via the 2021 Bright
              Parenting acquisition, provides pediatric consultations and developmental milestone tracking through a
              content and community platform. Maven Menopause offers hormone management, symptom tracking, and
              telehealth access to menopause specialists, serving the growing peri- and post-menopausal workforce
              cohort. Maven GLP-1 and Hormone Care launched as a direct-to-consumer product line in March 2026,
              extending Maven's addressable market beyond employer-contracted populations for the first time. Maven
              Intelligence serves as an AI-powered coordination layer across all programs rather than a standalone
              module. An Employer Analytics Dashboard provides HR teams with population health reporting and ROI
              quantification tools. Together these modules create an expanding platform that can be bundled or sold
              individually.
