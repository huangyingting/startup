chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              Maven Clinic is a virtual healthcare platform purpose-built for women and families, covering the full
              reproductive lifecycle from fertility and pregnancy through pediatrics, parenting, and menopause. The
              company was founded in 2014 by Kate Ryder in New York City and remains headquartered there. Maven operates
              a business-to-business-to-consumer (B2B2C) model: it contracts directly with employers and health plans
              who offer Maven as an employee benefit. Members gain access through their employer's benefit package, not
              through a direct subscription. This model aligns Maven's incentives with employers who want to reduce
              maternal health costs and improve member outcomes while providing employees with specialized clinical
              access that primary care alone cannot offer. The platform connects members with over 5,000 specialists
              including OB-GYNs, midwives, doulas, fertility nurses, mental health providers, and pediatricians. Maven
              describes itself as the largest virtual clinic for women's and family health globally, operating across
              175 countries as of 2024. The company is a late-stage private company and has not filed for an initial
              public offering as of the report date, though leadership changes in 2024-2025 signal pre-IPO preparation.
              Harvard Business School has used Maven as a teaching case study, reflecting its recognition as a model for
              digital women's health innovation.
