            body: >
              Carrot Fertility's executive turnover and 2024 layoffs create a customer acquisition opportunity for
              Maven, particularly among Carrot's mid-market clients seeking platform stability and organizational
              continuity. Kindbody's financial difficulties similarly suggest that its employer clients may reassess
              platform relationships at renewal. Maven's organizational scale and October 2024 Series F capital position
              it to capitalize on competitor client churn.
