            title: Large and Growing Market with Structural Employer Tailwinds
            body: >
              The digital women's health market is growing at 15–21% CAGR from a $2.1–3.2 billion base in 2024, and
              employer-side structural forces — rising premium costs, fertility mandate expansion, and talent
              competition — are accelerating the buying cycle for Maven's platform. With 42% of large US employers now
              offering fertility benefits (vs. 13% in 2016), the market is in an early mainstream adoption phase where
              Maven's incumbent position and clinical outcomes data create durable competitive advantage.
            calloutType: strength
            claimRefs:
