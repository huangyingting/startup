        - Request last 2 years audited financials or investor reporting package
      - - Gross Margin (actual)
        - High
        - 60–70% estimate is a benchmark proxy; actual COGS split is unknown; material to profitability narrative
        - Request P&L with provider cost, infrastructure cost, and gross margin line item
      - - Net Revenue Retention Rate (NRR)
        - High
        - Without NRR, cannot assess organic growth quality vs. new logo dependency; key diligence blocker
        - Request NRR by employer cohort year and program scope
      - - Customer Acquisition Cost (CAC)
        - Medium
        - Cannot validate sales efficiency or payback period without CAC by channel
        - Request sales and marketing expense breakdown and cohort-level CAC
      - - Employer Revenue Concentration
        - Medium
        - If top-5 employers represent >40% ARR, concentration risk is material and affects revenue quality score
        - Request top-10 employer revenue concentration and contract renewal schedule
      - - Burn Rate and Cash Position
        - Medium
        - >-
          Runway estimate is derived from headcount benchmarks; actual burn and cash balance required for capital
          adequacy confirmation
        - Request last 6 months cash flow statement and treasury position
      - - DTC Channel Unit Economics
        - Medium
        - >-
          Consumer acquisition cost, churn rate, and LTV for the DTC channel are unknown; DTC launch in 2026 could
          affect overall unit economics
        - 'Request DTC pilot metrics: CAC, 6-month retention, ARPU, and cohort curves'
    notes: >
      These gaps do not prevent a preliminary financial assessment but represent material diligence blockers for
      underwriting Maven at a specific revenue multiple. All items should be requested in a formal data room.
