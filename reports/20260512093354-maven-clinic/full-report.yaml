    layout: wide
    summary: >
      Logic flow from market, product, customers, financials, and risk evidence through to the investment
      recommendation, showing how each evidence pillar contributes to or qualifies the WATCH/TRACK call. The
      recommendation is determined by the intersection of strong market position evidence, profitability uncertainty,
      and valuation discipline.
