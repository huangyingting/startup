            title: ISO 27001 and HIPAA Compliance Unlock Fortune 500 Procurement
            body: >
              Maven Clinic's ISO 27001 certification and HIPAA BAA program directly satisfy the security and compliance
              requirements of Fortune 500 employer procurement teams. These credentials reduce sales cycle friction for
              large enterprise accounts and serve as table stakes for vendor approval. Without these certifications,
