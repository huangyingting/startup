      - number: '3.3'
        title: Capability and Pricing Comparisons
        blocks:
          - type: paragraph
            body: >
              Maven's most significant capability differentiator is clinical breadth: it is the only employer benefits
              platform covering the full reproductive and family lifecycle from fertility through menopause and
              pediatrics. Carrot Fertility and Progyny are fertility-only platforms; Kindbody adds limited maternity but
              focuses primarily on fertility; Spring Health covers mental health but not fertility or maternity. This
              breadth allows Maven to serve as a single-vendor solution for employers seeking comprehensive women's
              health benefits, reducing point-solution proliferation. On pricing, all major competitors use PEPM-based
              subscription models comparable to Maven's estimated range of $2 to $15 per member per month depending on
              program scope. Progyny's pricing structure is partially transparent through SEC filings, showing per-cycle
              fees plus medication reimbursement that differ structurally from Maven's subscription model. Carrot's
              pricing is not publicly disclosed. Spring Health's $140 million-plus ARR and $3.3 billion valuation at
              4,500-plus employer clients confirms broad adoption of PEPM models across adjacent mental health platforms
              as well. In the go-to-market dimension, Maven distributes through enterprise direct sales, benefits
              consultant brokers, and health plan channel partnerships with UnitedHealthcare and Blue Cross Blue Shield.
              Competitors including Carrot and Progyny use similar enterprise sales and broker channels, reducing this
              as a standalone differentiator. From a regulatory standpoint, all players must navigate HIPAA, post-Dobbs
              reproductive care legislation, and ERISA plan design complexity — a shared compliance burden that does not
              significantly differentiate competitors. Teladoc Health, with more than $2 billion in annual revenue,
              operates as a substitute general telehealth platform lacking women's health specialization, positioning it
              as a budget-level substitute rather than a clinical peer.
