      - number: '6.5'
        title: Expansion Drivers and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's expansion within existing employer accounts is driven by three primary vectors: module
              upsell (adding menopause or GLP-1 programs to accounts that started with fertility only), covered lives
              expansion as employer headcount grows, and geographic expansion as multinational employers add
              international coverage. The company benefits from a sticky benefits integration model — once Maven is
              embedded in an employer's benefits stack with HRIS integration and SSO, switching costs are meaningful.
              Upsell potential is supported by the platform's modular architecture, which allows account managers to
              pitch additional SKUs without a full re-procurement. Concentration risk is moderate: Maven serves 2,000+
              employers with no single client disclosed as exceeding 10% of revenue, though the top tier of Fortune 100
              accounts likely represents a disproportionate share of total ARR. Health plan distribution through Cigna
              and Aetna creates indirect concentration exposure — if a carrier terminates its Maven relationship, a
              significant number of covered lives could be affected simultaneously. The March 2026 DTC launch introduces
              consumer channel risk and requires Maven to develop consumer acquisition and support capabilities outside
              its B2B competency. International expansion creates new regulatory compliance obligations, and healthcare
              data privacy laws vary significantly across the 175 countries where Maven claims telehealth operations.
              Overall, the employer concentration structure is manageable for a company at Maven's scale, though
              transparency on the top-10 customer revenue share would significantly strengthen the commercial durability
              case for institutional investors.
