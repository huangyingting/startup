        - id: product
          label: Product and Technology
          detail: Integrated multi-condition platform; Maven Intelligence AI; DTC optionality
        - id: customers
          label: Customer Proof
          detail: 2,000+ employers; 17M+ lives; 2–4x ROI; Fortune 100 penetration
        - id: financials
          label: Financial Trajectory
          detail: ~$268M ARR; ~50% YoY growth; NOT profitable; $50–80M burn; 18–24mo runway
        - id: risks
          label: Risk Profile
          detail: Post-Dobbs legal; Coretek patent; data breach; key-person; multiple compression
        - id: valuation
          label: Valuation Context
          detail: 6.3x ARR at $1.7B; base case $1.75–2.1B implies minimal upside at current mark
        - id: recommendation
