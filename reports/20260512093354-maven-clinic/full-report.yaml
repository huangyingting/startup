  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Stream Overview
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's primary revenue mechanism is a per-employee per-month subscription billed to self-insured
              employers for access to Maven's virtual clinical programs spanning fertility, maternity, menopause, and
              pediatrics. Employers pay a PEPM rate applied to the enrolled or eligible employee population, resulting
              in predictable recurring revenue. Maven's PEPM pricing is estimated at $2 to $15 per member per month,
              depending on clinical program scope, employer size, and contracted features. Enterprise accounts with
              Fortune 500 clients such as Amazon, Microsoft, AT&T, and Morgan Stanley likely fall in the upper PEPM tier
              given the breadth of program modules contracted. A secondary revenue stream derives from health plan
              licensing arrangements: Maven has disclosed channel partnerships with UnitedHealthcare and Blue Cross Blue
              Shield, where health plans embed Maven's virtual care platform into their plan benefits and pay a
              licensing or PEPM fee for covered member access. A tertiary consumer direct-to-consumer channel was
              launched in March 2026, covering GLP-1 weight management, hormone care, and reproductive health. Revenue
              recognition follows SaaS-convention monthly rateable recognition across the contract term, not
              per-encounter or usage-based billing, which limits revenue volatility but also limits upside from
              high-utilization cohorts. The employer B2B subscription model is the dominant revenue driver and is the
              basis for Maven's estimated ARR of approximately $268 million in 2024, representing roughly 50 percent
              year-over-year growth from 2023's estimated $179 million.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
