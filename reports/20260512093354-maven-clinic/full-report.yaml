  - id: FI002
    title: Employer Acquisition and Revenue Yield Flow
    type: flow
    layout: standard
    summary: >
      Flow diagram modeling Maven Clinic's employer unit economics from initial contract through gross margin,
      illustrating the key cost drivers and the estimated CAC payback pathway based on benchmark proxies.
    claimRefs:
      - CI010
      - CI015
      - CI018
      - CI030
    approximationNotes: >
      All values are estimates derived from industry benchmarks and third-party analyst triangulation. Maven has not
      disclosed CAC, NRR, or gross margin actuals. Inputs carry ±30% uncertainty.
    data:
      nodes:
        - id: new_employer
          label: New Employer Contract Won
          detail: Enterprise or mid-market employer signed via direct sales, broker, or health plan channel
        - id: cac
          label: 'CAC: Undisclosed'
          detail: Sales and marketing investment to acquire one employer contract — not publicly disclosed
        - id: contract_arr
          label: Annual Contract Value (ACV)
          detail: PEPM × enrolled lives × 12 months; ranges from ~$100K (mid-market) to $5M+ (Fortune 500)
        - id: gross_margin
          label: 'Gross Margin: ~60–70% est.'
          detail: Net of provider session fees, care navigator costs, platform infrastructure COGS
        - id: payback
          label: 'CAC Payback: ~12–18 months est.'
          detail: Benchmark-derived; actual payback dependent on undisclosed CAC and realized gross margin
        - id: nrr
          label: 'NRR: Not Disclosed'
          detail: Net revenue retention from upsell, cross-sell, and churn; key diligence blocker
        - id: ltv
          label: 'LTV: ~3–5x ACV est.'
          detail: Estimated lifetime value based on benchmark SaaS multiples; unconfirmed without NRR
      edges:
        - from: new_employer
          to: cac
          label: sales cost incurred
        - from: new_employer
          to: contract_arr
          label: generates ACV
        - from: contract_arr
          to: gross_margin
          label: less COGS
        - from: gross_margin
          to: payback
          label: covers CAC in est. 12–18 months
        - from: gross_margin
          to: nrr
          label: expansion or churn over renewal cycle
        - from: nrr
          to: ltv
          label: cumulative gross profit over lifetime
