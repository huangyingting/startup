      - number: '4.5'
        title: Capital Adequacy, Financing Dependency, and Financial Verdict
        blocks:
          - type: paragraph
            body: >
              Maven raised $125 million in its Series F round in October 2024, led by StepStone Group with participation
              from existing investors including Sequoia Capital. Total equity raised exceeds $425 million, and the
              post-money valuation of $1.7 billion implies a revenue multiple of approximately 6.3x on estimated 2024
              ARR. The $125 million Series F proceeds, combined with Maven's estimated pre-round cash position, provide
              an estimated 24 to 36 months of operating runway from the October 2024 close. Maven's November 2024
              reduction in force of approximately 60 employees — roughly 5 percent of the workforce — is consistent with
              efficiency rationalization ahead of a potential IPO and reduces the estimated monthly operating cost run
              rate. No publicly disclosed debt, credit facility, or convertible notes are documented in available
              sources, indicating Maven has not yet deployed debt-based leverage common in late-stage growth companies
              seeking to extend runway. Maven's next financing trigger is likely a growth milestone — either a revenue
              run rate reaching $300 to $400 million for a Series G or IPO readiness — or a burn acceleration trigger if
              the DTC channel launch in 2026 requires significant consumer marketing investment. The March 2026 DTC
              launch for GLP-1, hormone care, and reproductive health introduces a new consumer-facing revenue model
              with structurally different unit economics from the B2B employer segment. Financial verdict: Maven's
              revenue quality is strong, its growth trajectory is defensible, and its post-Series F capitalization
              provides adequate runway for near-term organic growth. The primary financial diligence blockers are gross
              margin actuals below estimated range, NRR below 100 percent indicating client churn, and DTC channel burn
              acceleration materially exceeding forecast.
