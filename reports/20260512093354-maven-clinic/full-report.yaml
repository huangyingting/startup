        title: Deployment, Integration, Reliability, and Roadmap
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's platform is deployed through enterprise software contracts and health plan licensing rather
              than on-premises installation. Employer onboarding involves HRIS data connection, employee eligibility
              file setup, and SSO configuration with the employer's identity provider. Integration quality varies across
              HRIS partners: Workday and SAP integrations are well-documented, while smaller platforms may require
              manual configuration. The company commits to a 99.9%+ uptime SLA for critical care pathways, though this
