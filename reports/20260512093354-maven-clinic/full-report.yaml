      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Kate Ryder is Maven Clinic's founder and has remained its Chief Executive Officer through the company's
              growth from a seed-stage startup to a $1.7B-valued digital health unicorn. Ryder previously worked at
              Index Ventures and the Financial Times, giving her exposure to both the venture capital ecosystem and
              international media markets. Her continued active leadership is a key-person concentration factor: Maven's
              fundraising narrative, strategic direction, and brand identity are closely associated with her vision for
              inclusive women's healthcare. In 2025, Maven significantly expanded its C-suite: Katie Rooney joined as
              CFO (previously at Alight), Stephanie Glenn as Chief Commercial Officer (previously at Salesforce), Susan
              Stick as Chief Legal and Administrative Officer (previously at Life360), and Sheila Tran as Chief
              Communications Officer (previously at Opendoor and Yahoo). Dr. Neel Shah serves as Chief Medical Officer,
              providing clinical credibility, while Jason Lee holds the Chief Product and Operating Officer role. The
              board includes representatives from General Catalyst, Sequoia Capital, Lux Capital, and Oak HC/FT,
              alongside independent directors. The 2025 C-suite build-out—including a new CFO after Kristina Campbell's
              departure—is consistent with companies preparing for an IPO, though Maven has not formally disclosed IPO
              plans as of the report date. The leadership expansion increases organizational depth but also introduces
              execution risk as multiple executives ramp up simultaneously.
