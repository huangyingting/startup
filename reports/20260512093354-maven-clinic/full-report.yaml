      - number: '1.5'
        title: Adverse Events and Risk Flags
        blocks:
          - type: paragraph
            body: >
              Maven Clinic has faced several adverse developments that merit ongoing monitoring. In November 2024, the
              company laid off approximately 60 employees (roughly 10% of its workforce) through a "strategic
              realignment," a notable event given the timing just weeks after completing a $125 million funding round.
              The juxtaposition of large fundraise and near-simultaneous workforce reduction drew industry scrutiny
              about organizational efficiency and burn rate. Additionally, Coretek Licensing LLC filed a patent
              infringement lawsuit against Maven Clinic in 2022, which was ongoing through at least 2024 and represents
              an IP litigation risk, though it has not been reported as materially disruptive to operations. The
              departure of CFO Kristina Campbell in late 2024 introduced financial leadership uncertainty during a
              strategically sensitive pre-IPO preparatory window. Maven's heavy reliance on its founder Kate Ryder as
              the central leadership figure introduces key-person risk. The company's B2B2C model means revenue is
              concentrated in employer-payer relationships; if employer benefit spending contracts—as occurred during
              some periods of economic uncertainty—Maven's growth could be affected. These risk factors are covered in
              greater depth in Chapter 7 (Risks).
