  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Severity-Ranked Risk Overview
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's aggregate risk profile is driven by five principal risk clusters, each with distinct
              likelihood, impact, and mitigation maturity characteristics. The highest-severity risks are post-Dobbs
              regulatory-legal exposure (high likelihood, high impact, developing mitigation), the unresolved Coretek
              patent lawsuit (medium likelihood, high impact, low mitigation), and an estimated $50–80M annual cash burn
              against an 18–24 month runway (medium likelihood of shortfall, high impact). A second tier of
              high-severity risks includes potential AI recommendation errors from Maven Intelligence, a major
              reproductive-health data breach, and employer-budget contraction triggered by an economic downturn.
              Mid-severity risks include AWS single-cloud dependency, HRIS integration failures, provider-network
              quality-control gaps, and key-person concentration in Kate Ryder. Each risk has been assessed against
              publicly available evidence; likelihood and impact ratings are estimates based on industry benchmarks and
              disclosed company facts rather than actuarial data. Residual severity reflects the authors' view after
              accounting for known mitigations. Investors seeking a comprehensive risk picture require access to Maven's
              internal risk register, legal dossier, insurance policies, and actuarial assessments from the formal data
              room.
