      - number: '5.5'
        title: Trust, Safety, Compliance, and Quality Controls
        blocks:
          - type: paragraph
            body: >
              Maven Clinic has built a multi-layer compliance and security program meeting the requirements of
              self-insured Fortune 500 employers. ISO 27001 certification confirms an internationally recognized
              information security management system, satisfying enterprise procurement security due diligence. HIPAA
              Business Associate Agreements are executed with all employer clients, establishing clear data handling and
              breach notification obligations under federal law. SOC 2 Type II compliance covers cloud infrastructure
              security, availability, and confidentiality controls, and is self-reported per industry norms. GDPR
              compliance supports European employer clients and multinational deployments. Maven's clinical quality
              program is aligned with NCQA maternal health standards, providing an evidence-based protocol framework —
              though Maven is not formally NCQA-accredited. Telehealth services are licensed across all 50 US states.
              The post-Dobbs regulatory environment introduced legal complexity for reproductive care navigation,
              requiring Maven to maintain state-specific protocol updates. An active patent lawsuit from Coretek
              Licensing (2022) remains unresolved. AI clinical recommendations carry a material patient safety risk from
              hallucination — incorrect AI-generated guidance — requiring ongoing model monitoring, human oversight
              protocols, and escalation paths for flagged clinical cases.
