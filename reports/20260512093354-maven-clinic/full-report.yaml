      - number: '6.4'
        title: Retention, Repeat Usage, and Satisfaction
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's retention profile is one of the most critical and least transparent dimensions of its
              commercial durability. The company does not publicly disclose Net Revenue Retention (NRR) — the gold
              standard SaaS metric measuring expansion revenue within the existing customer base, net of churn. Based on
              Maven's growth trajectory from approximately $100M ARR to $250M+ in a three-to-four year window, the
              implied NRR is likely above 100%, but this inference depends on the accuracy of public revenue estimates
              and is unverified. The company has stated employer contract renewal rates are strong but has not
              quantified them publicly. Industry benchmarks for comparable HR SaaS and employer benefit platforms
              suggest retention rates in the 80–95% range for mid-market and enterprise clients. Member-level
              satisfaction is reported at 90%+ across programs, which if accurate is strong but is company-stated.
              Third-party review platforms (G2, Capterra) surface positive employer platform reviews with some concerns
              about navigation complexity and onboarding. Glassdoor employee reviews, while focused on internal culture,
              note that member-facing support can be difficult to navigate during high-acuity clinical situations.
              Per-member-per-month (PMPM) pricing is undisclosed; industry benchmarks for employer fertility benefits
              suggest $5–25 PMPM depending on program scope. Utilization rates among eligible employees are estimated at
              20–35% for active program enrollment.
