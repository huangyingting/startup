      - number: '7.4'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's commercial model depends on a multi-layered ecosystem of technology, distribution, and
              capital partners whose failure or deterioration would directly impair operations. The most concentrated
              single-point dependency is AWS: Maven's entire cloud infrastructure runs on Amazon Web Services without a
              disclosed multi-cloud failover arrangement. While AWS publishes a 99.99% SLA for key services, a
              region-level outage or account-level security incident would take down the Maven platform entirely.
              Telehealth video-consult infrastructure relies on a third-party video platform; Maven has not publicly
              identified this vendor, making it impossible to independently assess platform redundancy. HRIS ecosystem
              dependency on Workday, SAP, and ADP APIs creates eligibility-data fragility across the employer base.
              Health plan partnerships with UnitedHealthcare and BCBS represent critical distribution channels; any
              re-scoping of these arrangements would reduce Maven's accessible covered-lives count without a direct
              employer contract to backstop the relationship. Employer channel concentration is a related risk: the top
              10–20 clients likely represent more than 25% of ARR based on the typical Pareto distribution in enterprise
              SaaS, though Maven has not disclosed its Herfindahl index or top-client revenue share. Benefits broker
              dependency is material for Maven's mid-market growth: brokers gatekeep SMB and mid-market employer
              accounts, and a broker preference shift to a competitor would slow new logo acquisition. StepStone Group's
              role as lead Series F investor gives them governance influence; any conflict between StepStone and Maven's
              management team over growth strategy, capital allocation, or exit timing could impair organizational
              cohesion.
