  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Segmentation
        blocks:
          - type: paragraph
            body: >
              Maven Clinic's primary customer is the large, self-insured US employer — Fortune 500 and Fortune 100
              companies that fund employee health benefits directly and purchase Maven as a vendor through their
              benefits administration stack. This segment accounts for the substantial majority of Maven's revenue and
              covered lives. Within the employer segment, technology, financial services, and media companies have been
              the earliest and most publicly identified adopters, with Amazon, Microsoft, Goldman Sachs, Snap, Airbnb,
              PayPal, Delta Airlines, and Johnson & Johnson among named enterprise partners cited in press coverage. A
              secondary distribution channel runs through national health plans — Cigna and Aetna have been identified
              as carrier distribution partners — giving Maven access to plan member populations that may not have a
              direct employer contract. A nascent direct-to-consumer channel launched in March 2026 through the GLP-1
              and hormone care product line, which represents Maven's first revenue stream outside the employer B2B
              model. Maven does not disclose customer counts by segment, revenue breakdown by channel, or average
              contract value (ACV) per employer, limiting precise segmentation analysis. The company's 17 million
              covered lives figure (October 2024, Series F) and a 28 million accessible lives figure cited in 2026
              employer materials represent a discrepancy that requires clarification of counting methodology — enrolled
              versus eligible versus accessible populations.
