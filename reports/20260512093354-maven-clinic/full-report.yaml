              scope, from $2.1 billion (narrow clinical) to $22 billion (broad femtech). Maven's large-employer
              penetration may be approaching a ceiling — with ~2,000 employer clients in a universe of ~500 Fortune 500
              companies, the next growth phase likely requires mid-market and DTC expansion, which carry different unit
              economics and higher customer acquisition costs.
