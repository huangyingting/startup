      - number: '4.6'
        title: Exhibits
        blocks:
          - type: callout
            title: PEPM Subscription Model Provides Highly Predictable Recurring Revenue
            body: >
              Maven's employer PEPM subscription structure generates predictable annual recurring revenue with
              SaaS-convention recognition, multi-year contract terms, and low in-period revenue volatility. At
              2,000-plus employer clients and 17 million covered lives, the diversified employer base reduces
              single-client concentration risk. The model is capital-light relative to physical health competitors like
              Kindbody, enabling Maven to scale revenue without proportionate increases in fixed infrastructure costs.
            calloutType: strength
            claimRefs:
              - CI001
              - CI004
              - CI014
          - type: callout
            title: Private Financial Opacity Creates Material Underwriting Gaps
            body: >
              Maven's status as a private company means its gross margin, net revenue retention, customer acquisition
              cost, employer revenue concentration, and cash burn are not publicly disclosed. The current financial
              assessment relies on third-party estimates with ±20 to 30 percent uncertainty. NRR below 100 percent would
              indicate employer churn is offsetting new logo additions — a scenario that cannot be ruled out given the
              November 2024 layoffs and sector headwinds affecting Progyny and Carrot. Any underwriting of Maven at or
              near its $1.7 billion Series F valuation requires resolution of these gaps through a formal data room.
            calloutType: risk
            claimRefs:
              - CI022
              - CI023
              - CI028
          - type: callout
            title: Gross Margin and Burn Estimates Carry High Uncertainty
            body: >
              The gross margin estimate of 60 to 70 percent and monthly burn estimate of $8 to $12 million are derived
              from industry benchmarks and are not confirmed by Maven disclosures. If actual gross margin is materially
              below 60 percent due to higher-than-expected provider utilization costs, or if the DTC channel launch in
              2026 accelerates burn significantly, runway could be materially shorter than the 24 to 36 months estimated
              here. These estimates should be treated as directional orientation, not underwriting inputs.
            calloutType: assumption
