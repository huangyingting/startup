      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Maven Clinic operates at the intersection of telehealth, reproductive health, and digital benefits
              management — three domains with rapidly evolving and frequently conflicting regulatory frameworks. The
              most acute regulatory risk is the post-Dobbs legal landscape: more than twenty states have enacted laws
              restricting or criminalizing certain reproductive care activities, and Maven's care-navigation role —
              directing members to appropriate clinical services including medication abortion — creates direct legal
              exposure in those jurisdictions. Maven's legal team, led by newly appointed CLO Susan Stick, has
              implemented state-by-state navigation protocols, but the patchwork remains dynamic and no protocol fully
              eliminates risk. The HIPAA Privacy Rule for Reproductive Health Care, published in the Federal Register on
              April 26, 2024, provides limited but meaningful protections for reproductive health data when covered
              entities seek to use or disclose it for law enforcement purposes; however, it does not override state
              criminal statutes. The FDA's 2025 updated guidance on AI/ML-enabled Software as a Medical Device directly
              applies to Maven Intelligence if its recommendations cross the SaMD threshold, and Maven has not publicly
              disclosed its regulatory classification or 510(k) pathway. The Coretek Licensing patent suit, filed in
              2022, alleges care-coordination IP infringement and remains unresolved as of 2026. A successful judgment
              could require royalty payments or a product redesign. State telehealth licensure requires Maven providers
              to be licensed in each member's state of residence, creating ongoing compliance overhead and episodic
              out-of-network risk. International expansion would trigger GDPR compliance obligations. Potential changes
              to ACA employer mandate incentives under a new federal administration could reduce the employer demand
              signal. The combination of these exposures makes regulatory and legal risk the single most material
              category in this risk assessment.
            claimRefs:
