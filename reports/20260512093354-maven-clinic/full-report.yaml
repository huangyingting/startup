            title: Active Coretek Patent Lawsuit — Unresolved IP Liability
            body: >
              A patent lawsuit filed by Coretek Licensing in 2022 targeting Maven Clinic's care coordination algorithms
              remains unresolved as of May 2026. Patent assertion entity (PAE) litigation can result in licensing fees,
              injunctions, or settlements that impact platform functionality and financials. The financial exposure and
              ultimate IP outcome are unknown without a formal data room review of the litigation file.
            calloutType: risk
            claimRefs:
