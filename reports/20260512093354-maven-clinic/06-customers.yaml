  evidenceGaps:
    - type: missing-source
      severity: blocker
      topic: "Maven Clinic Net Revenue Retention (NRR) and employer contract renewal cohort data"
      missingEvidence: >-
        Maven Clinic does not publicly disclose NRR, gross retention, or net retention metrics
        by employer segment or contract cohort. Employer contract renewal rates are company-stated
        at 80%+ but have not been independently verified. No quarterly or annual cohort retention
        analysis is publicly available.
      whyItMatters: >-
        NRR is the single most important commercial durability metric for a SaaS business. Without
        a confirmed NRR figure, it is impossible to determine whether Maven's revenue growth
        reflects healthy expansion within existing accounts or is masking high gross churn
        compensated by new client acquisition. This is a blocker for commercial quality assessment.
      diligencePath: >-
        Request in formal data room: quarterly NRR by employer segment and vintage cohort,
        gross retention (contract count), net retention (revenue), top-20 account revenue share,
        and churn analysis by employer size and program type.
      relatedQuestionRefs:
        - QU006
      relatedTableRefs:
        - TU003

    - type: missing-source
      severity: material
      topic: "Maven Clinic member enrollment and utilization rates by employer and program"
      missingEvidence: >-
        Maven Clinic has not publicly disclosed employee enrollment rates (active members / eligible
        employees) by employer account or program type, member activation timelines, or program
        completion rates at the account level. Utilization rate estimates are based on employer
        digital health industry benchmarks rather than Maven-confirmed data.
      whyItMatters: >-
        Low utilization rates undermine the per-member cost savings thesis and reduce the ROI
        employers can document. If Maven's utilization rate is below benchmark, employer renewal
        rates may be at risk. Utilization data is also needed to validate the scalability of
        Maven's customer success model as it grows from 2,000 to 5,000+ employer clients.
      diligencePath: >-
        Request enrollment rate by employer account cohort (% of eligible employees enrolled
        within 90 days), 6-month active usage rates, and program completion rates by program
        type. Cross-reference against employer satisfaction and renewal data.
      relatedQuestionRefs:
        - QU008

    - type: enumeration-incomplete
      severity: minor
      topic: "Named customer proof table covers fewer than 1% of Maven's 2,000+ employer clients"
      missingEvidence: >-
        The Named Customer Proof Table covers nine publicly named employer clients; Maven Clinic's
        2,000+ employer client base is not publicly enumerated. The majority of employers,
        contract details, deployment scope, and individual account outcomes are either NDA-protected
        or not publicly disclosed.
      whyItMatters: >-
        The named client list represents a best-available proxy for customer quality but cannot
        be used to characterize the full client population. A complete named client list with
        contract age and renewal history would substantially strengthen the commercial proof case.
      diligencePath: >-
        Request full client list with contract inception date, program deployed, contract size,
        and renewal history in formal data room. Prioritize Fortune 100 account list and
        any departing client analysis.
      relatedTableRefs:
        - TU002

    - type: private-evidence-only
      severity: minor
      topic: "Maven Clinic's 17M vs 28M covered lives counting methodology discrepancy"
      missingEvidence: >-
        The 17 million covered lives figure from Series F (October 2024) and the 28 million
        accessible lives in 2026 employer marketing have not been reconciled by the company.
        The specific counting methodology for each figure — contracted employer members,
        eligible-but-unenrolled members, or health plan accessible populations — has not been
        publicly clarified.
      whyItMatters: >-
        Investors and buyers rely on covered lives as a key scale metric. If the metric definition
        has shifted, prior period comparisons become unreliable, and the apparent 65% growth in
        accessible lives since October 2024 may reflect a methodology change rather than genuine
        market expansion.
      diligencePath: >-
        Request written methodology documentation for the "covered lives" metric with consistent
        historical data under the same definition from 2019 to present. Confirm whether health
        plan channel lives are included in any disclosed figure.
      relatedQuestionRefs:
        - QU022
