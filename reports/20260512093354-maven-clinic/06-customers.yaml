callouts:
  - calloutType: strength
    title: "Fortune 100 Anchor Accounts Validate Enterprise Product-Market Fit"
    body: >
      Maven Clinic's ability to win and retain 30%+ of the Fortune 100 as named clients —
      including Amazon, Microsoft, Goldman Sachs, and Johnson & Johnson — validates strong
      enterprise product-market fit. These accounts require rigorous security reviews, long
      procurement cycles, and demonstrated clinical outcomes, making them among the most
      defensible enterprise relationships in the employer benefits market. Their continued
      deployment also creates powerful reference selling that accelerates new enterprise
      account acquisition.
    claimRefs:
      - CU005
      - CU022

  - calloutType: strength
    title: "Health Plan Distribution Channel Expands Addressable Market Without Additional Sales Cost"
    body: >
      Carrier partnerships with Cigna and Aetna allow Maven to distribute to plan member
      populations outside the direct employer sales motion, extending its total addressable
      market without proportional sales cost increases. Embedded distribution within a carrier
      network also creates a second flywheel: as more health plans embed Maven, employer HR
      teams may encounter Maven through their carrier before or instead of a direct Maven
      sales call, reducing CAC and accelerating pipeline.
    claimRefs:
      - CU008
      - CU025

  - calloutType: risk
    title: "NRR and Commercial Durability Metrics Are Not Publicly Disclosed"
    body: >
      Maven Clinic's most critical commercial durability signal — Net Revenue Retention — is
      not publicly disclosed, making it impossible to independently verify that Maven is
      growing within existing accounts rather than offsetting churn with new client acquisition.
      Without NRR, the quality of Maven's growth cannot be assessed. A formal data room
      review must include quarterly cohort-level NRR, gross retention, and net retention
      separately, alongside contract renewal rate by employer segment and contract cohort year.
    claimRefs:
      - CU031
      - CU032

  - calloutType: risk
    title: "17M vs 28M Covered Lives Discrepancy Requires Methodology Clarification"
    body: >
      The October 2024 Series F announcement confirmed 17 million covered lives, but 2026
      employer marketing materials cite 28 million accessible lives — a 65% higher figure
      for what appears to be the same metric. The discrepancy likely reflects a shift from
      "contracted covered lives" to "eligible accessible lives" (including health plan
      channel populations who could access Maven), but this has not been explicitly clarified.
      For investor-grade diligence, the exact counting methodology must be confirmed and
      applied consistently across all reported metrics.
    claimRefs:
      - CU001
      - CU002
      - CU037

