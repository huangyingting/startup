  topStrengths:
    - >-
      Category leader with 2,000+ employer clients, 17M+ covered lives, and the deepest clinical specialist network
      (5,000+) in the employer digital women's health segment.
    - >-
      Strong employer ROI evidence ($2,400–$5,000 maternity cost savings per member) creates durable buying triggers and
      high switching costs in the core Fortune 500 segment.
    - >-
      Full reproductive lifecycle coverage (fertility to menopause) differentiates Maven from point-solution competitors
      (Carrot, Progyny) and creates upsell and expansion economics.
  topRisks:
    - >-
      Not profitable; estimated burn of $50–80M/year with 18–24 months runway post-Series F creates dependency on
      favorable IPO or refinancing conditions in 2026–2027.
    - >-
      Post-Dobbs regulatory complexity exposes Maven to legal risk in 20+ restrictive states for reproductive health
      care navigation, with potential for costly litigation or forced product restrictions.
    - >-
      Low active utilization rates (5–15% of eligible members) limit employer ROI demonstration and create vulnerability
      to contract non-renewal if outcomes are not visible.
  unresolvedGaps:
    - >-
      Audited GAAP revenue, gross margin, operating loss, and cash balance are not publicly available; all financial
      metrics rely on third-party estimates.
    - >-
      NRR, GRR, top-account revenue concentration, and contract term/renewal data are not disclosed, making customer
      durability assessment incomplete.
    - >-
      Maven's PEPM pricing, exact segment revenue breakdown, and Fortune 500 vs. mid-market client split are not public,
      limiting go-to-market efficiency analysis.
    - The Coretek Licensing patent lawsuit status and financial exposure remain unresolved as of the report date.
