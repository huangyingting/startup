summary:
  headline: >-
    Maven Clinic is the category-defining leader in employer-sponsored women's and family health, with strong traction
    and clinical ROI evidence, but an unproven path to profitability and a $1.7B valuation that requires sustained
    30–50% ARR growth to justify.
