      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的商业模式依赖多层技术、分发和资本伙伴生态，任何一层失败或恶化都会直接伤及运营。最集中的单点依赖是 AWS：Maven 的全部云基础设施都运行在 Amazon Web Services
              上，且未披露多云故障切换安排。虽然 AWS 为关键服务发布 99.99% SLA，但区域级宕机或账户级安全事件会让 Maven 平台整体下线。远程医疗视频问诊基础设施依赖第三方视频平台；Maven
              没有公开识别该供应商，因此无法独立评估平台冗余。对 Workday、SAP 和 ADP API 的 HRIS 生态依赖，使雇主基础中的资格数据较脆弱。与 UnitedHealthcare 和 BCBS
              的健康计划合作是关键分发渠道；任何重新划定合作范围，都会在缺少直接雇主合同托底的情况下减少 Maven 可触达覆盖人群。雇主渠道集中度也是一项风险：按企业 SaaS 典型 Pareto 分布估计，前 10–20
              大客户很可能贡献超过 25% ARR，尽管 Maven 没有披露 Herfindahl 指数或头部客户收入占比。福利经纪商依赖对 Maven 的中端市场增长很重要：经纪商把守 SMB
              和中端市场雇主账户入口，若经纪商偏好转向竞品，新客户获取会放慢。StepStone Group 作为 Series F 领投方拥有治理影响力；如果 StepStone 与 Maven
              管理层在增长战略、资本配置或退出时点上出现冲突，可能削弱组织凝聚力。
