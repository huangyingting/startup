      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Carrot Fertility 是 Maven 在雇主辅助生殖福利中最直接的竞争对手，服务超过 1,000 家雇主客户，平台专注辅助生殖，覆盖 IVF 导航、冻卵、代孕和领养支持。Carrot 完成由
              Tiger Global 和 Spectrum Equity 领投的 $75 million C 轮融资，2022 年峰值估值估计达到 $7.1 billion。2024 年 4 月，Carrot
              披露裁员和高管变动，显示组织不稳定，增长势头也可能下滑。Carrot 的服务者网络估计约 2,000 名专科人员，约为 Maven 5,000+ 网络的 40%。与 Maven 不同，Carrot
              不提供孕产、产后、更年期或儿科项目，对寻求单一供应商生命周期方案的雇主吸引力有限。Progyny（NASDAQ: PGNY）是唯一上市的纯辅助生殖福利管理公司，2024 全年收入约 $369 million，低于
              2023 年的 $399 million，反映其辅助生殖药品单列板块承压。Progyny 2024 年 Q4 服务 361 家企业客户，主要是大型 Fortune 500 雇主；它们被其 smart-cycle
              IVF 项目吸引，该项目把治疗与用药福利打包。Progyny 的公开市场身份带来财务透明度，也带来约束：2024 年收入不及预期、低于分析师估计，给市场施加压力。Kindbody
              采用混合模式，把实体辅助生殖诊所与虚拟福利导航结合，累计融资约 $300 million。据报道，Kindbody 2024 年未达收入目标并削减成本，引发外界对混合模式单位经济的疑问。Kindbody 超过
              30 个实体诊所网点提供 Maven 无法复制的线下护理入口，但固定成本和执行复杂度也更高。
