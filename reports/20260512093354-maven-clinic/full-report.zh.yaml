      - number: '3.3'
        title: 能力与定价对比
        blocks:
          - type: paragraph
            body: >
              Maven 最重要的能力差异化是临床宽度：它是唯一覆盖从辅助生殖到更年期和儿科完整生殖与家庭生命周期的雇主福利平台。Carrot Fertility 和 Progyny 只做辅助生殖；Kindbody
              增加了有限孕产服务，但核心仍在辅助生殖；Spring Health 覆盖心理健康，但不覆盖辅助生殖或孕产。这样的宽度让 Maven
              可以作为雇主寻求全面女性健康福利时的单一供应商方案，减少点状解决方案蔓延。在定价上，主要竞争者都使用 PEPM 订阅模式，与 Maven 估计的每名会员每月 $2–$15
              区间相近，具体取决于项目范围。Progyny 的定价结构通过 SEC 文件部分透明：每周期费用加用药报销，在结构上不同于 Maven 的订阅模式。Carrot 定价未公开披露。Spring Health 在
              4,500+ 家雇主客户下实现 $140 million+ ARR、估值 $3.3 billion，也印证了 PEPM 模式在邻近心理健康平台中的广泛采纳。GTM 维度上，Maven
              通过企业直销、福利顾问经纪人，以及与 UnitedHealthcare 和 Blue Cross Blue Shield 的医保计划渠道合作分销。Carrot 和 Progyny
              等竞争对手也使用类似的企业销售和经纪人渠道，因此这一点单独看差异化有限。监管层面，所有玩家都必须处理 HIPAA、Dobbs 判决后的生殖护理立法以及 ERISA
              计划设计复杂性——这是共同合规负担，并不能显著区分竞争者。Teladoc Health 年收入超过 $2 billion，是缺少女性健康专长的通用远程医疗替代平台，更像预算层面的替代品，而不是临床同侪。
