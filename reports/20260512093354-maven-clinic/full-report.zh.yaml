      - number: '7.5'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >
              截至 2024 年 10 月 Series F，Maven Clinic 尚未盈利；根据收入增长轨迹和同规模可比数字健康公司，估计年度现金消耗为 $50–80M。Series F 后现金余额估计为
              $100–150M，意味着在需要后续融资或 IPO 前有 18–24 个月现金跑道。这个烧钱期限让 Maven 对市场条件有中等敏感度：若数字健康融资寒冬延长或 IPO 窗口恶化，公司可能被迫以不利条款进行
              down round 或桥接融资。收入质量也有风险：2024 年约 $268M ARR 的估计完全来自第三方分析师和公司新闻稿，而非经审计财务；Maven
              也没有公开披露净收入留存率、平均合同价值或头部客户收入占比。雇主订阅收入天然受经济周期影响：衰退期间，可自由支配福利开支往往最先被削减，严重的雇主预算收缩可能放慢新增客户获取并推高流失。Maven 2026 年
              3 月 DTC GLP-1 发布带来新收入流，但其获客成本显著高于 B2B 雇主模式，单位经济也不同，造成短期利润率压力和贡献结构不确定性。2021 年高点后估值倍数压缩——医疗 SaaS / 数字健康现在按
              3–8x ARR 交易，而 2021 年为 15–25x——意味着 Maven 的 $1.7B Series F 估值需要持续 30–50% ARR 增长，才能在 IPO 或 M&A 退出时证明并扩大估值。
