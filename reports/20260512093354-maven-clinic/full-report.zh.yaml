          - type: callout
            title: 私营财务不透明造成重大投资判断缺口
            body: >
              Maven 作为私营公司，毛利率、净收入留存、获客成本、雇主收入集中度和现金烧钱都未公开披露。当前财务评估依赖第三方估计，存在 ±20–30% 不确定性。NRR 若低于
              100%，将意味着雇主流失正在抵消新增客户——考虑到 2024 年 11 月裁员以及影响 Progyny 和 Carrot 的行业逆风，这一情景无法排除。若要按 Maven 当前或接近 $1.7 billion
