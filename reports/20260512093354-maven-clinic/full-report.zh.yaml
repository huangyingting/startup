  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与交付模式
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 运营一套云原生 SaaS 平台，全部部署在 Amazon Web Services 上，支撑 Fortune 500 级企业临床服务所需的可靠性、可扩展性和符合 HIPAA
              的数据隔离。会员端体验通过 iOS 和 Android 原生移动应用交付，用户可随时访问护理项目、预约排期和虚拟问诊。雇主端 Web 门户让 HR 和福利管理者查看人群健康指标、管理会员注册，并跟踪项目 ROI
              仪表盘。平台 API 集成层接入 Workday、SAP、ADP 等主要 HRIS 平台，自动同步员工注册和资格。Maven Intelligence 是公司在 2023 年 5 月推出的自研 AI
              层，贯穿全部临床项目：把会员分流到合适的临床路径，识别高危病例，并实时个性化护理建议。在适用场景下，EMR
              集成功能支持向线下护理提供方交接临床数据。整体架构在统一平台内承载远程医疗视频问诊、异步临床消息和结构化护理协议。
