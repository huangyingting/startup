      - 隐含倍数
      - 备注
    rows:
      - - Maven Series F 轮（2024 年 10 月）
        - $1.7B 投后估值
        - ARR 约 $268M（估计）
        - ~6.3x ARR
        - 最近一次披露估值；后期投资人的入场基准
      - - Maven 乐观情景（2026–2027）
        - $2.8–4.0B
        - $350–400M ARR
        - 8–10x ARR
        - 需要 IPO/并购，以及市场为增长给出溢价
      - - Maven 基准情景（2027–2028）
        - $1.75–2.1B
        - ARR 约 $350M
        - 5–6x ARR
        - 较 $1.7B 的 Series F 轮入场价升值有限
      - - Maven 悲观情景（桥轮 / 下轮）
        - $0.9–1.2B
        - ARR 约 $290–300M
        - 3–4x ARR
        - 会稀释 Series F 轮投资人；若以 $900M（3x ARR）并购，亏损加深
      - - 数字健康 SaaS 中位数倍数（2025–2026）
        - N/A
        - N/A
        - 3–8x ARR
        - 按 50% 增长看，Maven 目前处在中上段
      - - Progyny 公开市场锚
        - 市值约 $1.2B
        - 收入约 $650M
        - 收入约 1.8x
        - 最直接的上市可比公司；倍数明显更低
      - - 实现 2x 回报所需的隐含入场折扣（基准情景）
        - ≤$1.05B
        - ARR 约 $350M
        - 退出时 5–6x ARR
        - 基准情景下，入场估值需在 $1.05B 或以下，才能实现 2x 回报
    notes: >
      所有 Maven 财务数字都是第三方估计，仍待经审计财务数据确认。基准情景下，为获得 1.5–2x 回报，当前合理估值区间为 $1.05–1.4B；Series F 轮的 $1.7B 定价高于该区间，因此支持在当前估值下观察 /
      跟踪、而非买入。
  - id: TV005
    title: 退出准备度与尽调要求表
    description: >
      Maven Clinic's exit readiness assessment across IPO and M&A paths, plus the minimum diligence data required before
      a confident capital commitment at current valuation.
    enumerationScope:
      coverage: exhaustive
      basis: >
        All material exit paths and diligence gaps identified from prior chapters' evidence. Private company data
        limitations mean some items cannot be confirmed from public sources.
    claimRefs:
      - CV014
      - CV015
      - CV027
      - CV028
      - CV032
      - CV033
      - CV036
    columns:
      - 主题
      - 缺失证据或准备度缺口
      - 对投资决策的影响
      - 负责人 / 尽调路径
    rows:
      - - 经审计财务数据与收入质量
        - 没有经审计财务报表；所有 ARR/收入来自估计
        - ARR 数字存在被高估的重大风险；无法确认增长质量
        - 要求提供 3 年经审计财务报表和季度管理账
      - - 净留存率（NRR）
        - NRR 未公开披露；仅从增长轨迹推断高于 100%
        - NRR 决定收入韧性；低于 100% 会是重大负面信号
        - 向 CFO 索取按队列和雇主分层的 NRR
      - - 雇主收入集中度
        - 头部客户收入占比未披露；Herfindahl 指数不可得
        - 前 5 大客户占比超过 20% 会带来单一事件流失风险
        - 索取前 20 大客户收入占比和续约排期
      - - Coretek 专利诉讼
        - 完整诉状和专家 IP 意见不在公开记录中
        - 不利判决可能要求支付许可费或重做产品设计
        - 向 CLO 索取诉讼档案和 IP 律师意见
      - - Maven Intelligence 的 FDA 监管分类
        - 未公开披露 SaMD 分类或 510(k) 状态
        - FDA 执法可能暂停 Maven Intelligence 运营
        - 索取 FDA 往来函件和监管律师备忘录
      - - 股权结构表与优先权瀑布
        - 股权结构表未披露；优先股堆叠未逐项列明
        - 累计融资 $425M+ 形成显著优先权悬置
        - 索取包含优先股堆叠和瀑布分析的股权结构表
      - - 盈利路径模型
        - 没有公开运营计划或盈利时间表
        - 看不到盈利路径，IPO 准入和终局倍数风险都高
        - 向 CFO 索取包含 EBITDA 调节桥的 3 年运营计划
      - - Dobbs 时代分州法律意见
        - 存在分州导航流程，但法律意见未审阅
        - 在限制性州提供照护导航，刑事风险可能重大
        - 索取 CLO 的分州法律意见和流程文件
      - - DTC 单位经济（GLP-1 上线）
        - 没有 DTC CAC、LTV 或回本周期数据
        - DTC 渠道可能拖累利润率，或在规模化后不可行
        - 向 CMO 索取前 90 天 DTC 队列单位经济数据
      - - IPO 或并购退出时间表与计划
        - IPO 时间表未披露；董事会层面退出策略未披露
        - 若退出路径未确认，18–24 个月现金跑道会形成时间压力
        - 与董事会讨论退出时间表、IPO 准备里程碑和并购可选性
    notes: |
      当前或更高估值下承诺出资前，应完成所有尽调要求。若 Maven 正在主动寻求投资，NRR、集中度、股权结构表等几项属于数据室标准材料，应能立即提供。前四项中任一缺失，都会是重大尽调红旗。
