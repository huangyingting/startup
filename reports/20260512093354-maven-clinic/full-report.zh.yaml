      - number: '5.6'
        title: 图表
        blocks:
          - type: callout
            title: 同行评议临床结果验证差异化
            body: >
              Maven Clinic 在 Health Affairs（2022）发表经过同行评议的研究，显示早产率下降 24%；叠加内部数据中 NICU 入院减少 44%、剖宫产减少
              52%，形成了多数数字健康竞品难以匹配的证据型差异化。通用远程医疗平台缺少已发表临床结果数据。这套证据基础也推动雇主续约，并扩大 Maven 的定价权。
            calloutType: strength
            claimRefs:
              - CE015
              - CE016
          - type: callout
            title: ISO 27001 与 HIPAA 合规打开 Fortune 500 采购门槛
            body: >
              Maven Clinic 的 ISO 27001 认证和 HIPAA BAA 体系，直接满足 Fortune 500
              雇主采购团队的安全与合规要求。这些资质降低大型企业客户的销售周期阻力，也是供应商获批的入场券。没有这些认证，Maven 无法服务 Amazon、Microsoft、Goldman Sachs 这一层级的雇主客户。
            calloutType: strength
            claimRefs:
              - CE017
              - CE018
          - type: callout
            title: Coretek 专利诉讼仍在进行——知识产权责任未决
            body: >
              Coretek Licensing 在 2022 年提起专利诉讼，指向 Maven Clinic 的护理协调算法；截至 2026 年 5
              月，案件仍未解决。专利主张实体（PAE）诉讼可能带来许可费、禁令或和解，从而影响平台功能和财务。若不正式查看数据室中的诉讼文件，财务敞口和最终知识产权结果都无法判断。
            calloutType: risk
            claimRefs:
              - CE022
          - type: callout
            title: AI 幻觉风险构成患者安全敞口
            body: >
              Maven Intelligence 生成 AI 临床建议，天然带有幻觉风险——系统可能生成错误临床指导。在生殖或孕产妇健康场景中，错误建议（例如错误剂量指导或漏掉高危标记）可能造成患者伤害。公司没有公开披露
              AI 错误率、临床监督协议或升级机制；没有正式产品安全审查，无法独立评估风险。
