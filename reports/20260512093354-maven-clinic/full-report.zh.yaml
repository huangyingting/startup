              - CV040
      - number: '8.6'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 最可能的退出路径是 IPO，时间估计在 2027–2028 年，前提包括：（1）烧钱速度明显收窄、接近盈亏平衡；（2）ARR 持续增长 25% 以上，支撑成长型公司定价；（3）Dobbs
              后与 Coretek 法律风险得到解决或控制；（4）IPO 市场愿意接纳数字健康公司。战略并购是第二可能的退出路径，潜在买家包括 UnitedHealthcare、CVS/Aetna、Cigna、Amazon
              Health（可借助 Amazon 与 Maven 现有客户关系）、Workday 或 ADP。健康保险公司可拿到嵌入式福利管理和临床数据，HRIS 厂商可补齐无缝福利生态，并购协同都很强。在 IPO
              或并购前，普通股股东和员工的二级市场流动性有限。若数字健康估值倍数没有修复，或 Maven 的增长不及预期，2028 年前 IPO 窗口关闭的风险是真实存在的。

              以当前估值投入资本前，最后的尽调问题包括：（1）过去三个财年的审计财务报表及最近一个季度的管理账；（2）净收入留存率和前 20 大客户收入占比；（3）诉讼材料包，包括 Coretek
              案完整诉状、知识产权专家律师意见和和解授权；（4）Maven Intelligence 的 FDA 监管分类备忘录；（5）详细股权结构表，含优先股堆叠和清算瀑布分析；（6）GLP-1 发布的 DTC
              单位经济模型；（7）按州梳理的 Dobbs 后护理导航流程法律意见；（8）带季度里程碑的盈利路径模型。
            claimRefs:
              - CV014
              - CV015
              - CV022
              - CV027
              - CV028
              - CV032
