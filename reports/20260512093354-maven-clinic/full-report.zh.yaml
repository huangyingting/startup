      - number: '6.4'
        title: 留存、重复使用与满意度
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的留存画像，是其商业耐久性中最关键也最不透明的维度之一。公司不公开披露净收入留存率（NRR）——这一 SaaS 黄金指标衡量现有客户基础内、扣除流失后的扩张收入。基于 Maven 从约
              $100M ARR 增长到 $250M+ 的三到四年轨迹，隐含 NRR 很可能高于 100%，但该推断依赖公开收入估计的准确性，尚未验证。公司称雇主合同续约率强劲，但没有公开量化。可比 HR SaaS
              和雇主福利平台的行业基准显示，中端市场和企业客户留存率约在 80–95%。会员层面满意度在各项目中据称为
              90%+；若准确，这一数字较强，但仍为公司自述。第三方评论平台（G2、Capterra）显示雇主平台评价正面，同时也提到导航复杂和上线方面的顾虑。Glassdoor
              员工评论虽然聚焦内部文化，但指出会员端支持在高危临床场景中可能难以导航。每会员每月（PMPM）定价未披露；雇主生育福利行业基准显示，视项目范围不同约为 $5–25 PMPM。具备资格员工的活跃项目注册使用率估计为
              20–35%。
