      - number: '6.5'
        title: 扩张驱动因素与集中度风险
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 在现有雇主账户内扩张，主要靠三条路径：模块增购（在只从生育力起步的账户中加入更年期或 GLP-1
              项目）、雇主员工数增长带来的覆盖人群扩张，以及跨国雇主增加国际覆盖后的地理扩张。公司受益于黏性较强的福利集成模式——一旦 Maven 通过 HRIS 集成和 SSO
              嵌入雇主福利栈，切换成本就不低。平台模块化架构支撑增购潜力，客户经理可以在不重新完整采购的情况下推销新增 SKU。集中度风险中等：Maven 服务 2,000+ 雇主，未披露任何单一客户收入超过 10%，但
              Fortune 100 顶层账户很可能贡献了不成比例的总 ARR。通过 Cigna 和 Aetna 的健康计划分发带来间接集中度敞口——如果某家承运方终止与 Maven
              的关系，大量覆盖人群可能同时受影响。2026 年 3 月的 DTC 发布引入消费者渠道风险，要求 Maven 在 B2B 能力之外建立消费者获客和支持能力。国际扩张带来新的监管合规义务，Maven
              声称开展远程医疗运营的 175 个国家，医疗数据隐私法律差异很大。总体看，Maven 这一规模下的雇主集中度结构可管理，但若能披露前 10 大客户收入占比，将显著强化机构投资者对商业耐久性的判断。
