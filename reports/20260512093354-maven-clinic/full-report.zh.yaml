chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 是一个为女性和家庭专门打造的虚拟医疗平台，覆盖从辅助生殖、孕期到儿科、育儿和更年期的完整生殖与家庭生命周期。公司由 Kate Ryder 于 2014 年在 New York City
              创立，总部至今仍设在那里。Maven 采用企业对企业对消费者（B2B2C）模式：公司直接与雇主和医保计划签约，由这些客户把 Maven 作为员工福利提供。会员通过雇主福利包获得使用权，而不是直接订阅。该模式让
              Maven 的激励与雇主对齐：雇主希望降低孕产健康成本、改善会员结果；员工则获得基层医疗单独难以提供的专科临床入口。平台把会员连接到 5,000 多名专科人员，包括
              OB-GYN、助产士、导乐、辅助生殖护士、心理健康服务者和儿科医生。Maven 自称是全球最大的女性与家庭健康虚拟诊所，截至 2024 年覆盖 175
              个国家。公司处于私营后期阶段，截至报告日尚未提交首次公开募股申请；不过 2024–2025 年的领导层变化显示公司在为 IPO 做准备。Harvard Business School 已将 Maven
              作为教学案例，反映其作为数字女性健康创新样本获得认可。
