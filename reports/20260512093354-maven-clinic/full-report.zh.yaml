      - number: '5.3'
        title: 知识产权、数据护城河与差异化
        blocks:
          - type: paragraph
            body: >
              Maven Clinic
              的竞争差异化来自几项相互强化的优势，合在一起构成有意义的知识产权和数据护城河。第一，公司积累了覆盖完整生殖生命周期的纵向会员健康数据集——从备孕、妊娠、产后一直延伸到更年期；在数字健康竞品中，这一数据集的范围很少见。第二，Maven
              Intelligence 把六个专科领域的自研临床路径算法编码进系统，算法来自内部临床数据；根据 Google Patents 查验，公司还为护理协调和风险分层工具提交了专利申请。第三，Maven
              发表了经过同行评议的临床结果研究，验证其对孕产妇健康的影响：Health Affairs 记录早产率下降 24%，公司数据称，入组会员相比全国平均水平 NICU 入院减少 44%，剖宫产减少
              52%。这些已发表结果提供了第三方验证的临床有效性证据，通用远程医疗平台不具备。第四，由 5,000 多名持证专科医生组成的提供方网络——其中部分与 Maven 有独家合作——构成竞争性准入壁垒。最后，2021
              年收购 Bright Parenting 带来内容和社区资产，把会员互动延伸到单次临床事件窗口之外，提升留存和生命周期价值。Coretek Licensing 在 2022
              年发起的未决专利诉讼，对知识产权主张构成风险。
