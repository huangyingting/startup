      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >
              Kate Ryder 是 Maven Clinic 创始人。从种子期创业公司到估值 $1.7B 的数字健康独角兽，她一直担任公司 CEO。Ryder 此前任职 Index Ventures 和 Financial
              Times，既接触风险投资生态，也熟悉国际媒体市场。她持续掌舵，带来关键人物集中风险：Maven 的融资叙事、战略方向和品牌身份，都与她对包容性女性医疗的愿景高度绑定。2025 年，Maven
              大幅扩充高管团队：Katie Rooney 加入担任 CFO（此前在 Alight），Stephanie Glenn 出任首席商务官（此前在 Salesforce），Susan Stick
              出任首席法务与行政官（此前在 Life360），Sheila Tran 出任首席传播官（此前在 Opendoor 和 Yahoo）。Dr. Neel Shah 担任首席医疗官，提供临床可信度；Jason Lee
              担任首席产品与运营官。董事会包括 General Catalyst、Sequoia Capital、Lux Capital 和 Oak HC/FT 的代表，以及独立董事。2025 年这轮高管补强——包括
              Kristina Campbell 离任后引入新 CFO——符合公司准备 IPO 的常见路径，但截至报告日，Maven 尚未正式披露 IPO 计划。领导层扩张增强组织纵深，也带来多名新高管同时磨合的执行风险。
