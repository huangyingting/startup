  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重程度排序的风险概览
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的总体风险画像由五类主要风险簇驱动，每一类都有不同的发生概率、影响程度和缓释成熟度。严重程度最高的是 Dobbs 判决后的监管和法律敞口（高概率、高影响、缓释仍在发展）、未解决的
              Coretek 专利诉讼（中等概率、高影响、低缓释），以及估计 $50–80M 年度现金消耗对应 18–24 个月现金跑道（缺口概率中等、高影响）。第二层高严重风险包括 Maven Intelligence
              可能出现 AI 推荐错误、重大生殖健康数据泄露，以及经济下行触发雇主预算收缩。中等严重风险包括 AWS 单云依赖、HRIS 集成失败、提供方网络质量控制缺口，以及 Kate Ryder
              关键人物集中度。每项风险均基于公开可得证据评估；概率和影响评级来自行业基准与公司披露事实，而非精算数据。剩余严重程度反映作者在纳入已知缓释后形成的观点。投资者若要获得完整风险图景，需要进入正式数据室查看
              Maven 的内部风险登记册、法律案卷、保险保单和精算评估。
