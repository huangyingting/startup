      - number: '1.4'
        title: 规模、运营指标与里程碑
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的规模指标显示，2020–2024 年在雇主采纳数字家庭健康福利的推动下，公司快速扩张。截至 2024 年，Maven 通过 2,000 多家雇主和医保计划客户估计覆盖 17
              million 人，客户包括 Amazon、Microsoft、AT&T、Morgan Stanley 和 L'Oréal。公司报告 2024 年年经常性收入（ARR）约 $268 million，高于 2023
              年的 $178.9 million，年同比增速约 50%。员工数约 1,100 人。Maven 的服务者网络覆盖 5,000 多名临床专科人员，专业包括辅助生殖、产科、助产、儿科、心理健康和更年期。公司 2017
              年推出首个企业产品 Maven Maternity，标志着它从直接面向消费者转向 B2B 福利模式。Maven 2021 年收购育儿指导平台 Bright Parenting，扩展产后和育儿内容。Maven
              Intelligence 是其 AI 驱动的照护平台，用于个性化会员路径。关键行业认可包括 CNBC Disruptor 50（2023）和 TIME Most Influential
              Companies（2026）。2024 年 11 月，Maven 在 F 轮融资刚完成不久后开展战略调整，涉及约 60 人裁员——约占员工数 10%——显示公司为潜在进入公开市场做准备，正在内部重组以提升效率。
