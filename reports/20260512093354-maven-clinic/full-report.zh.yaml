      - number: '4.3'
        title: 成本结构、毛利率与资本强度
        blocks:
          - type: paragraph
            body: >
              Maven 的收入成本主要由三部分驱动：支付给 5,000+ 名虚拟专科人员和护理导航员网络的服务者会话费用、Maven 平台技术基础设施成本，以及会员服务和护理协调成本。服务者会话费用是最大的可变 COGS
              项：随着会员在辅助生殖、孕产和更年期项目中的使用增加，会话量和总服务者成本会随参与度上升。Maven 将服务者定位为独立承包商，而非雇员，这降低了福利和薪资管理开销，但也让 COGS 随使用率变化。基于可比
              SaaS 邻近雇主健康平台基准和第三方分析师估计，Maven 毛利率估计为 60–70%，由于存在服务者交付环节，明显低于纯软件 SaaS 毛利率。该区间与 Forge/CFRA
              数字健康基准一致，后者把雇主虚拟护理平台放在 55–72% 的毛利率带。对 Maven
              而言，随着平台基础设施成本摊薄到不断扩大的会员基数，新增每名覆盖人群的边际成本会下降，规模扩大天然带来毛利率提升潜力。相较实体健康公司，资本开支较低：Maven 不拥有或运营临床设施，主要 capex
              等价投入是软件开发和平台工程员工。营运资本需求温和，因为雇主预付或提前支付订阅费，并在合同期内按比例确认收入。
            claimRefs:
              - CI009
