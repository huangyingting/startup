              收入和覆盖人群的绝大部分。在雇主客群内部，科技、金融服务和媒体公司最早采用，也最常公开露出；新闻报道点名的企业合作伙伴包括 Amazon、Microsoft、Goldman
              Sachs、Snap、Airbnb、PayPal、Delta Airlines、Johnson & Johnson。第二分发渠道来自全国性健康计划——Cigna 和 Aetna 已被识别为保险承运分发伙伴——让
              Maven 触达未必直接签雇主合同的计划会员。2026 年 3 月，Maven 通过 GLP-1 与激素护理产品线推出萌芽期 DTC 渠道，这是 Maven 首个雇主 B2B 模式之外的收入流。Maven
