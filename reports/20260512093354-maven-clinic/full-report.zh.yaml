      - number: '4.4'
        title: 公开牵引指标与私营财务缺口
        blocks:
          - type: paragraph
            body: >
              Maven 公开披露的牵引指标包括：截至 2024 年约 2,000 家雇主客户、覆盖 17 million 人，以及估计 ARR $268 million，高于 2023 年估计 $179 million。基于
              Sacra 和 Latka 的第三方收入估计，2021–2024 年三年 CAGR 约 39%；这些估计由员工数、融资历史和已披露客户指标三角校验得出。每名覆盖人群年收入估计约 $15.75（$268M /
              17M 人），大体符合 Maven 估计定价中档的 PEPM 订阅经济。未公开披露的关键私营财务指标包括：净收入留存率，用于确认增购更多项目模块是否在驱动有机增长；实际毛利率，用于确认服务者 COGS
              扩张是否沿预期轨迹运行；获客成本，用于说明 Maven 增长率相对销售和营销投入是否可持续；以及雇主层面的收入集中度，用于揭示是否依赖任何单一客户贡献不成比例的 ARR。考虑到雇主 SaaS
              式订阅结构、长销售周期以及年度或多年合同，收入质量被评为高耐久；但相较纯软件企业，由于存在服务者 COGS 和不透明 NRR，质量为中等。Progyny 在高峰年份披露的 NRR 约
              105–110%，可作为辅助生殖聚焦型雇主平台的方向性基准；不过 Maven 更宽的项目范围可能支撑由增购驱动的更高 NRR。Rock Health 2024
              年数字健康融资回顾称，雇主数字健康是大额交易活动最具韧性的板块。
