      - number: '7.6'
        title: 缓释、监测指标与投资逻辑破坏触发点
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 针对最高优先级风险的主要缓释包括：合规基础设施（SOC 2 Type II、ISO 27001、HIPAA BAA，以及网络和职业责任保险）、在首席法务官 Susan Stick
              领导下制定的逐州生殖健康护理导航协议、由 2,000+ 客户构成且限制单一客户集中度的多元雇主基础，以及对 Coretek
              专利案的持续法律管理。这些缓释有意义，但仍留下投资者必须监测的剩余敞口。关键可监测指标包括：（1）ARR 增长率相对 30% 底线——若减速至 25% 以下，说明模型承压；（2）现金跑道——若在没有签署 term
              sheet 的情况下低于 12 个月，就是关键阈值；（3）Coretek
              诉讼结果——不利判决若要求支付版税或重做产品，将立即构成重大事项；（4）数据泄露——任何涉及生殖健康记录的重大泄露都会触发监管、诉讼和声誉连锁反应；（5）雇主流失率——任何季度出现雇主收入净留存为负，都意味着市场收缩或竞争替代事件。需要从根本上重新评估
              Maven 投资逻辑的触发点包括：Kate Ryder 卸任 CEO；Coretek 专利案出现不利终审判决；发生涉及生殖健康数据的重大泄露；Progyny 或 Carrot Fertility
              收购大型竞争对手并取得主导性生育力市场份额；经济衰退导致雇主健康福利支出广泛收缩；或 FDA 因 Maven Intelligence 作为未获批准的 SaMD
              而采取监管行动。投资者在投入资本前，应优先获取证据缺口中列出的数据室材料，尤其是内部风险登记册、精算评估、法律案卷和经审计财务。
