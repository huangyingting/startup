      - number: '7.3'
        title: 运营风险
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的运营风险，主要来自通过虚拟平台规模化交付临床质量护理的复杂性。最急迫的运营风险是 Maven Intelligence 这一临床 AI
              层出现幻觉或错误建议：一条对高危患者产生实质影响的错误建议（例如生育治疗或产后精神护理中的药物剂量）可能带来患者安全责任和声誉损害。Maven 没有公开披露适用于 Maven Intelligence
              输出的临床验证协议，也没有说明该工具是否被 FDA 归类为 SaMD。5,000 多名持证虚拟提供方构成的网络，本身就难以在规模化下维持质量控制；Maven
              未披露提供方资质审核方法、不良事件率或临床结果审计。雇主上线期间，HRIS 集成失败是反复出现的挑战：Maven 的资格数据管线依赖 Workday、SAP 和 ADP API，而这些 API
              在不同客户中的可靠性不一；集成失败会推迟会员激活，并削弱雇主满意度。生殖健康数据泄露是最严重的尾部风险：Maven 的数据仓库包含高度敏感的受保护健康信息（PHI），包括生育治疗记录、妊娠史和精神护理笔记；在
              Dobbs 时代的州法律下，如果缺少 HIPAA Privacy Rule 保护，执法请求可能迫使 Maven 披露生殖健康数据。Maven 拥有 SOC 2 Type II、ISO 27001 和 HIPAA
              BAA 认证，能提供部分但不完整的缓释。2024 年 11 月约 60 人的裁员，在关键增长爬坡期带来组织扰动和士气风险；Maven 2025 年新任 C 级高管仍在上手。Kate Ryder 同时担任 CEO
              和品牌锚点，构成关键人物风险：若她离职，很可能触发负面市场信号和潜在人才流失。
