      - number: '1.5'
        title: 不利事件与风险信号
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 已出现几项值得持续跟踪的不利进展。2024 年 11 月，公司通过“战略调整”裁员约 60 人（约占员工数 10%）；考虑到这发生在完成 $125 million
              融资后仅数周，事件尤其值得注意。大额融资与几乎同步的裁员并置，引发业内对组织效率和烧钱速度的审视。此外，Coretek Licensing LLC 于 2022 年对 Maven Clinic
              提起专利侵权诉讼，诉讼至少持续到 2024 年，构成知识产权诉讼风险；不过尚无报道显示它对运营造成实质性扰动。CFO Kristina Campbell 于 2024 年底离任，使 Maven 在战略敏感的
              IPO 前准备窗口中面临财务领导层不确定性。Maven 对创始人 Kate Ryder 这一核心领导者依赖较重，带来关键人物风险。公司的 B2B2C
              模式意味着收入集中在雇主和支付方关系上；如果雇主福利支出收缩——经济不确定时期曾出现过这种情况——Maven 增长可能受影响。这些风险因素在第 7 章（风险）中有更深入讨论。
