      - number: '5.2'
        title: 产品模块与 SKU 图谱
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的商业产品组合覆盖八个模块，横跨生殖与家庭健康全生命周期。Maven Fertility 覆盖备孕咨询、IVF 和 IUI 导航、生育力教练、冻卵支持，从周期前到 IVF
              结束，覆盖雇主生育福利的完整流程。Maven Pregnancy 提供产前 OB 咨询、高危妊娠管理，并与线下提供方协同护理。Maven Postpartum
              面向新手母亲，提供哺乳支持、产后抑郁筛查和返岗教练。Maven Parenting 通过 2021 年收购 Bright Parenting 扩展而来，借助内容和社区平台提供儿科咨询与发育里程碑跟踪。Maven
              Menopause 提供激素管理、症状跟踪和面向更年期专家的远程医疗入口，服务不断扩大的围绝经期和绝经后员工群体。Maven GLP-1 and Hormone Care 在 2026 年 3 月作为 DTC
              产品线推出，首次把 Maven 的可触达市场扩展到雇主合同覆盖人群之外。Maven Intelligence 是贯穿所有项目的 AI 协调层，而不是独立模块。雇主分析仪表盘为 HR 团队提供人群健康报告和 ROI
              量化工具。这些模块共同构成可持续扩展的平台，可打包销售，也可单独销售。
