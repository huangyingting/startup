  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流概览
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的主要收入机制，是向自保型雇主按员工按月收取订阅费，换取 Maven 虚拟临床项目的访问权，项目覆盖辅助生殖、孕产、更年期和儿科。雇主按 PEPM
              费率为已登记或具备资格的员工群体付费，因此形成可预测的经常性收入。Maven 的 PEPM 定价估计为每名会员每月
              $2–$15，取决于临床项目范围、雇主规模和合同功能。Amazon、Microsoft、AT&T、Morgan Stanley 等 Fortune 500 企业客户，很可能因为签约项目模块更广而处在 PEPM
              上档。第二条收入流来自医保计划授权安排：Maven 已披露与 UnitedHealthcare 和 Blue Cross Blue Shield 的渠道合作，健康计划把 Maven
              虚拟护理平台嵌入计划福利，并为受保会员访问支付授权费或 PEPM 费用。第三条消费者 DTC 渠道于 2026 年 3 月上线，覆盖 GLP-1 体重管理、激素护理和生殖健康。收入确认遵循 SaaS
              惯例，在合同期内按月均匀确认，而非按就诊次数或使用量计费；这限制了收入波动，也限制了高使用队列带来的上行空间。雇主 B2B 订阅模式是主导收入驱动，也是 Maven 2024 年估计 ARR 约 $268
              million 的基础，较 2023 年估计 $179 million 同比增长约 50%。
