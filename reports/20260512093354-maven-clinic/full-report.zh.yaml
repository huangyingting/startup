      - number: '3.4'
        title: 切换成本、多平台并用与分销动态
        blocks:
          - type: paragraph
            body: >
              雇主使用 Maven 的切换成本高且具备结构性。一旦雇主把 Maven 与 Workday、SAP、ADP 等 HRIS
              平台、福利管理系统和医保计划数据流集成，更换供应商就需要重新采购、重新集成，并重新开展面向员工的沟通。这种集成锁定在企业数字健康供应商中很常见。Maven 的 Fortune 500 雇主基础——包括
              Amazon、Microsoft、AT&T 和 Morgan
              Stanley——拥有尤其高的组织切换成本：大型雇主全球员工队伍复杂，比中端市场企业承受更大的变更管理摩擦。员工行为参与还形成额外的软性切换成本：完成过辅助生殖旅程、接受过产后支持，或与 Maven
              服务者建立儿科护理关系的会员，不太可能在福利续约时主张更换平台。多平台并用——同时与多个重叠平台签约——可行，但随着雇主 HR 和福利团队试图减少供应商蔓延，这种做法越来越少。一些雇主会同时签 Maven 和
              Progyny 以扩大辅助生殖覆盖，或同时签 Maven 和 Spring Health
              以组合心理健康和孕产福利。不过，在成本压力和降低行政复杂度推动下，福利整合趋势在结构上有利于单一供应商、全生命周期平台。分销动态相对均衡：经纪人和福利顾问渠道对中端市场雇主决策有实质影响；把 Maven
              嵌入计划产品的健康保险公司，则让 Maven 触达大型自保资金池，否则需要单独外拓。Maven 与 UnitedHealthcare 和 Blue Cross Blue Shield
              的医保计划渠道合作，在嵌入式计划细分市场形成了有意义的分销护城河，挡住挑战者进入。
            claimRefs:
              - CP022
              - CP023
              - CP024
              - CP025
              - CP031
              - CP035
      - number: '3.5'
        title: 竞争护城河持久性与竞争对手反向证据
        blocks:
          - type: paragraph
            body: >
              Maven 的竞争护城河建立在四根相互强化的支柱上：5,000+ 名服务者构成的临床网络规模、任何单一竞争者都无法匹配的全生命周期产品宽度、证明雇主 ROI 的自有临床结果数据，以及以长期合同支撑的深度
              Fortune 500 企业关系。临床结果数据资产尤其持久：Maven 积累了孕产成本节省、NICU 入院率下降和剖宫产率下降等证据，竞争对手尚未在规模上复制。Maven Intelligence 这一 AI
              驱动的照护导航平台又叠加技术差异化，需要持续 R&D 投入才能追上。覆盖 175
              个国家的地理触达，对跨国雇主客户具有独特价值，任何单一直接竞争对手都没有复制这一维度。护城河持久性风险真实存在，但近期可控。随着辅助生殖和孕产福利平台增多、雇主议价能力上升，同质化风险存在，可能压缩整个行业的
              PEPM 费率。大型保险公司自建内部数字女性健康能力带来的竞争替代，是结构性长期风险，不过机构玩家的大规模执行历史上一直落后。竞争对手的负面信号短期内给 Maven 留出竞争喘息空间：Carrot 2024
              年高管变化和裁员显示组织挑战；Kindbody 2024 年收入未达目标，引发混合模式执行疑问；Progyny 2024 年收入从 $399 million 降至 $369
              million，反映辅助生殖药品单列领域的行业逆风。不过，Maven 自身 2024 年 11 月裁员也显示内部效率挑战；如果无法解决，可能削弱其单客成本优势，并让潜在 IPO 前的竞争定位叙事更复杂。
