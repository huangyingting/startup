  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的投资逻辑建立在四根支柱上：在最大且渗透不足的雇主健康福利子赛道中占据品类领导地位；B2B 经常性收入模式具备高切换成本；已证明的临床 ROI
              构成防御性采购理由；多产品平台从生育力到更年期持续占据预算份额。公司已用 2,000+ 雇主客户、超过 30% Fortune 100 渗透率、约 17 million 覆盖人群，证明了品类早期成立。估计
              $268M ARR、约 50% 同比增长，使 Maven 成为这一规模下增长最快的私营数字健康公司之一。Maven Intelligence AI
              和一体化多病种平台，相比单点解决方案竞品构成结构性差异化。2026 年 3 月 DTC GLP-1 发布，为模型增加了消费者可选性。国际市场尚无可比的一体化平台，提供长期扩张 TAM。

              反向逻辑同样实质。Maven 尚未盈利，估计每年烧钱 $50–80M，对应 18–24 个月现金跑道。$1.7B 估值已经计入显著持续增长，以当前倍数看安全边际有限。可比上市公司 Progyny 和
              Teladoc 的交易倍数分别为 1–2x 收入和低于 1x 收入，反映市场愿为未盈利数字健康公司支付的价格——这对 Maven 退出时构成显著倍数压缩风险。Dobbs
              判决后的法律敞口持续存在，且只能部分缓释。Coretek 专利诉讼仍未解决。Maven 没有公开披露经审计财务、NRR 或头部客户集中度数据，使当前乐观的 ARR
              和增长估计天然不确定。悲观情景——雇主预算削减、增长减速或倍数压缩——意味着估值低于 $1.2B，除早期投资者外，其他投资者都可能被摊薄。
