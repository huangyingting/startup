        blocks:
          - type: paragraph
            body: >
              三种情景界定 Maven Clinic 投资者的回报潜力。乐观情景下，Maven 在 2026–2027 年以 $350–400M ARR（约较当前估计基数增长 30–50%）和 8–10x ARR 倍数完成
              IPO 或战略收购，隐含退出估值 $2.8–4.0B。该情景要求公司维持高增长、国际扩张带来收入溢价、DTC 品类证明有吸引力的单位经济，并且 IPO 市场把 Maven
              重估到高于当前私募市场倍数。同时，公司还需要在盈利路径上取得足以满足公开市场投资者的进展。基准情景下，Maven 在 2027–2028 年以约 $350M ARR、5–6x ARR 倍数完成 IPO 或 M&A
              退出，隐含 $1.75–2.1B 估值。对于以 $1.7B 入场的投资者，这几乎没有升值，但仍是可行结果。基准情景假设雇主业务每年继续增长 20–30%、烧钱逐步收窄，并且 Maven
              在数字健康倍数恢复窗口进入公开市场。悲观情景下，雇主预算削减使 2026–2027 年增长降至 20% 以下，Maven 在盈利前耗尽现金跑道，不得不以持平或下行估值桥接融资。ARR 停滞在约 $300M，按
              3–4x ARR 倍数计算，隐含价值为 $0.9–1.2B——可能摊薄 Series F 投资者。按 3x ARR 战略收购则隐含约 $900M，远低于 Series F 价格。考虑 Maven
              当前轨迹，概率信号更偏向基准情景，尽管基准情景本身相对当前估值上行有限。
