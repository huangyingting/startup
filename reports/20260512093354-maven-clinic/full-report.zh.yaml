          detail: 由覆盖人群和 ARR 增长轨迹推断；公司未披露。可比 HR SaaS 平台（Progyny）报告 NRR 为 120–135%。
        - label: 雇主合同续约率（%）
          low: 80
          high: 95
          mid: 87
          detail: 公司声称续约率为 80%+；缺少独立验证。可比企业健康 SaaS 续约区间为 80–95%。
        - label: 会员再次注册率（%）
          low: 55
          high: 80
          mid: 68
          detail: 估算活跃会员中再次注册后续项目周期的比例（例如 IVF 失败后回到生育项目）。未披露。
        - label: 会员满意度得分（%）
          low: 87
          high: 95
          mid: 91
          detail: 公司称满意度为 90%+；G2/Capterra 第三方评价均值为 4.0–4.5/5.0，与 87–95% 区间一致。
  - id: FU004
    title: 分项目采用漏斗
    type: funnel
    layout: standard
    summary: |
      按单个雇主账户估算的会员采用漏斗，从符合条件的员工人群到项目注册、活跃参与和项目完成。数值为分析师基于雇主数字健康福利采用行业基准做出的估计；Maven 尚未公开披露各漏斗阶段的使用率。
    claimRefs:
      - CU015
      - CU036
      - CU041
    data:
      items:
        - label: 符合条件员工（100%）
          value: 10000
          detail: 代表性 10,000 人雇主账户中符合 Maven 福利条件的员工总数
        - label: 知晓福利
          value: 6000
          detail: 估计 60% 的福利知晓率；采用主动沟通活动的雇主数字健康项目通常处于该水平
        - label: 已注册（活跃账户）
          value: 2500
          detail: 估计 25% 注册率；与雇主数字健康福利基准（20–35%）一致
        - label: 活跃项目用户（过去 90 天）
          value: 1500
          detail: 估计 15% 活跃使用率；指已注册人群中主动使用临床项目的子集，而非被动注册
        - label: 完成项目用户（完整护理周期）
          value: 800
          detail: 估计 8% 项目完成率；指完成完整生育、孕产或更年期护理周期的会员
