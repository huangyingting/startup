      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 自创立以来已完成 9 轮融资，累计超过 $425 million，是女性健康赛道资本最充足的私营数字健康公司之一。公司最近一次融资是 2024 年 10 月完成的 $125
              million F 轮，由 StepStone Group 领投，存量投资人 General Catalyst、Sequoia Capital、Oak HC/FT、Icon Ventures、Dragoneer
              Investment Group 和 Lux Capital 参投。F 轮融资确定的投后估值为 $1.7 billion，使 Maven
              成为聚焦女性与家庭健康的数字健康公司中估值最高的一家。值得注意的是，投资人名单还包括 Oprah Winfrey、Mindy Kaling 和 Reese Witherspoon
              等名人投资人；她们参与了早期轮次，也为品牌放大声量。公司在 2022 年 E 轮融资中进入独角兽行列，当时募资 $90 million。此前轮次包括 2021 年 $110 million D 轮、2020 年
              $45 million C 轮、2018 年 $27 million B 轮、2016 年 $12 million A 轮。2014 年种子轮约融资 $3
              million。详细老股交易历史和当前股权结构表未公开披露。F 轮前，CFO Kristina Campbell 离任，据报道当时 Maven 正在为潜在 IPO 做准备；2025 年 Katie Rooney
              接任 CFO。
