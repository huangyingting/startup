      - number: '2.3'
        title: 买方分层与采纳路径
        blocks:
          - type: paragraph
            body: >
              Maven 的市场在结构上是 B2B2C：买方和支付方是雇主或医保计划；用户是员工或受保家属。这带来双边市场动态，Maven 必须同时让机构买方相信
              ROI，也要用临床价值吸引个人用户。四类主要买方包括：（1）大型自保型雇主（Fortune 500，通常 10,000+ 名员工），这是 Maven
              的核心市场和最早客户群；（2）中端市场雇主（1,000–9,999 名员工），随着 Maven 扩展中小企业产品，该层级正在成为增长来源；（3）管理式医疗组织和医保计划（如 UHC、BCBS），它们把 Maven
              嵌入会员福利；（4）政府和公共部门雇主，这一板块渗透率相对较低，受采购复杂性制约。

              采纳路径跟随年度福利采购周期。经纪人和福利顾问通常在 RFP 阶段（Q2–Q3）引入 Maven。HR 副总裁评估临床和 ROI 证据；CFO 与法务审阅合同。实施通常需要 3–6
              个月，价值兑现（较低孕产理赔）会在 12–18 个月内显现。Maven 的主要购买触发点是经证明的临床 ROI：公司称每名深度使用会员可节省 $2,400–$5,000 孕产成本。对中端市场雇主而言，经纪人关系和
              Fortune 500 可比客户带来的同侪压力，也会推动采纳。Maven 2026 年 DTC 上线，首次把触达延伸到雇主渠道之外的个人消费者，打开新客群，同时带来新的获客挑战。
