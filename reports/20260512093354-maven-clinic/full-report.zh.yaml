  - id: FR003
    title: 合作伙伴与依赖关系图
    type: flow
    layout: wide
    summary: >
      依赖关系图梳理 Maven Clinic 的关键技术、分销、资本和监管伙伴。AWS 单云依赖与健康计划渠道依赖构成最高集中的单点失效风险。HRIS 供应商
      API（Workday、SAP、ADP）让会员资格数据管道更脆弱。福利经纪人渠道是中端市场客户的主要增长抓手。StepStone Group 的董事会治理角色增加了与投资人利益一致的监督，但也可能形成战略方向张力。
