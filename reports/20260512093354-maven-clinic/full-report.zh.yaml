          detail: 核心平台——1,100 名员工、~$268M ARR、2,000+ 雇主客户
        - id: aws
          label: AWS 云基础设施
          detail: 单云提供商；整个平台托管在 AWS；未披露多云故障切换
        - id: workday
          label: Workday HRIS
