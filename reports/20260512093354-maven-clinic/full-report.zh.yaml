            body: >
              Maven Clinic 最近一次披露估值为 2024 年 10 月 Series F 后估值 $1.7B（融资 $125M），按估计 $268M ARR 计算隐含 6.3x ARR 倍数。公司累计融资超过
              $425M 至 Series F，形成有意义的优先股堆叠；在多数退出情景中，普通股股东和后期投资者拿到回报前，这一堆叠会先吸收退出收益。当前估值下，入场纪律很重要：相较可比上市数字健康公司，$1.7B
              估值并不显得便宜；投资者若在该水平入场，需要公司在未来 3–5 年持续实现 30–50% ARR 增长，基准情景下才可能达到目标回报。基准情景中（2027 年 $350M ARR、5–6x ARR），退出估值为
              $1.75–2.1B，相比 Series F 价格几乎没有升值。若要从当前估值获得显著上行，需要乐观情景（$350–400M ARR、8–10x
              ARR）。低于当前标记的入场——通过老股交易、较低估值桥接轮，或低于上一轮标记的 IPO 定价——将显著改善风险收益。2025–2026 年数字健康 IPO 市场环境仍具挑战；Maven
              需要证明可信的盈利路径，才能进入公开市场。累计 $425M+ 融资带来的摊薄和优先权悬置是结构性考量：优先股投资者的清算优先权（假设标准 1x 非参与型优先权）意味着任何退出收益中的前 $425M+
              都归优先股持有人，限制悲观退出中普通股股东和较晚入场投资者的回报。
