      - number: '8.4'
        title: 可比公司与交易集分析
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 的可比集横跨上市公司、后期私募轮和先例 M&A 交易，但没有任何一项能完美匹配 Maven
              的多产品一体化雇主健康福利模式。Progyny（PGNY）是生育福利子赛道中最直接的上市可比：其 2024 年收入约 $650M，但在公开市场按 1–2x
              收入交易，反映投资者对雇主数字健康渠道盈利能力的怀疑。Teladoc Health（TDOC）是更宽泛的上市远程医疗可比，交易倍数低于 1x 收入，因增长减速和 EBITDA 亏损受到重罚。两家上市可比都意味着
              Maven 公开退出时存在显著倍数压缩风险。私募轮中，Spring Health 2024 年按 $3.3B 估值融资，约为 12x ARR；该倍数高于 Maven
              当前倍数，但其聚焦心理健康，增长动态不同。Carrot Fertility 2021 年峰值估值约 $7.1B 很可能已被显著下调，不适合当前基准比较。最贴近的 M&A 先例是 Labcorp 2022 年收购
              Ovia Health（估计 $150–250M，隐含小规模女性健康平台 3–5x ARR）以及 Unified Women's Healthcare 2023 年收购 Gennev。两笔 M&A
              的倍数都显著低于 Maven 当前私募估值，支持一个判断：若没有 Maven 规模和市场地位带来的溢价，战略 M&A 可能低于当前标记。Maven 的多产品宽度和雇主关系，可以说相对 Ovia M&A 可比和
              Progyny 上市可比应享有溢价，但溢价幅度必须由退出时已证明的盈利进展支撑。
