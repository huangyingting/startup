          detail: 中型市场雇主分销渠道；Mercer、Aon、Willis Towers Watson 生态
        - id: stepstone
          label: StepStone Group
          detail: Series F 领投方（$125M）；董事会治理和战略影响力
        - id: providers
          label: 5,000+ 名虚拟医疗服务提供者
          detail: 经认证的服务者网络提供虚拟护理；规模扩大后质量控制风险上升
      edges:
