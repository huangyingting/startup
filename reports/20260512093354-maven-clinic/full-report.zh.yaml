        title: 展项
        blocks:
          - type: callout
            title: PEPM 订阅模式带来高度可预测的经常性收入
            body: >
              Maven 的雇主 PEPM 订阅结构带来可预测的年经常性收入，具备 SaaS 惯例收入确认、多年合同期限和期内低收入波动。2,000+ 家雇主客户和覆盖 17 million
              人构成多元化雇主基础，降低单一客户集中风险。相较 Kindbody 等实体健康竞争者，该模式资产更轻，使 Maven 能在不按比例增加固定基础设施成本的情况下扩大收入。
