      - number: '4.2'
        title: 定价、GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Maven 的 GTM 动作是直销企业销售模式，瞄准员工数 500 人及以上自保型雇主的 HR 和福利负责人。公司还借助经纪人和福利顾问渠道关系，并通过 UnitedHealthcare 和 Blue Cross
              Blue Shield 的医保计划合作伙伴分销。大型雇主数字健康平台的企业销售周期通常为：中端市场 6–12 个月，大型 Fortune 500 账户 12–24 个月。Maven 的 Fortune 500
              集中度意味着周期更长，但平均合同价值更高。Maven 未公开披露获客成本；不过 SVB Healthcare 调研给出的可比雇主福利平台基准显示，企业数字健康平台 CAC / 首年 ARR 比率为
              0.8x–1.2x，意味着按 Maven 的 PEPM 定价水平估算，CAC 回本周期为 12–18 个月。Maven 的 2,000+ 家雇主客户基础覆盖 17 million
              人，如果增购更多临床模块跟随增长，就能支撑强劲净收入留存。医保计划渠道的 CAC 经济性更好，但可能要求较低 PEPM 费率，相比直销企业账户形成单人收入权衡。标价 PEPM
              不等于实际净收入；雇主谈判折扣和医保计划渠道定价很可能把实际 PEPM 压到标价之下，大型企业合同尤其如此。B17 News 在 2026 年提到的 Maven CFO 过渡，显示组织正在为 IPO
              准备流程做准备，该流程通常包括强化财务报告基础设施。
