      - number: '8.7'
        title: 附录
        blocks:
          - type: callout
            title: ARR 规模 $268M、增长 50%，应享受行业溢价
            body: >
              Maven Clinic 在 $268M 基数上估计实现约 50% 的 ARR 同比增长，是数字健康公司里少见的规模化高增长。这一增速叠加 2,000+ 家雇主客户和 Fortune 100
              渗透率，足以支撑高于行业 3–5x ARR 中位数倍数的溢价。关键问题是，6.3x 是否已经把这份溢价完全计入，还是仍留下进一步升值空间。
            calloutType: strength
            claimRefs:
              - CV002
              - CV003
              - CV023
          - type: callout
            title: 当前 $1.7B 估值意味着基准情景上行空间有限
            body: >
              Maven 的基准情景退出估值为 $1.75–2.1B，仅略高于当前 $1.7B 的 Series F 估值。以接近 Series F
              价格进入的投资者，实质上是在承销乐观情景，才可能获得有意义的回报。公开可比公司 Progyny 的收入倍数为 1–2x，若市场倍数压缩，这是现实的下行情景。
            calloutType: risk
            claimRefs:
              - CV004
              - CV012
              - CV031
              - CV034
          - type: callout
            title: 无审计财务报表——无法给出高置信度建议
            body: >
              Maven
              所有财务数字（ARR、增长率、烧钱速度、现金跑道）都来自第三方估计或公司新闻稿披露，并非审计财务报表。投资逻辑和估值模型因此都有显著不确定性。无论正面还是负面，高置信度投资建议都需要先拿到审计财务报表和正式数据室。
            calloutType: risk
            claimRefs:
              - CV016
              - CV036
          - type: callout
            title: 健康保险公司战略并购可能打开溢价退出
            body: >
              若 UnitedHealthcare、CVS/Aetna、Cigna 或 Amazon Health 发起战略收购，估值可能高于财务买家的基准情景；前提是买方把 Maven 的雇主关系、临床数据和 AI
              平台视为战略资产，而不只是按 ARR 倍数定价。Amazon 与 Maven 既有客户关系，是一条自然的并购沟通线索。
            calloutType: strength
            claimRefs:
              - CV015
              - CV025
