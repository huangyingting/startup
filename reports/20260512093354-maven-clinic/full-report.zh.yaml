      - number: '8.5'
        title: 投资建议与估值立场
        blocks:
          - type: paragraph
            body: >
              对 Maven Clinic 的投资建议是 WATCH/TRACK（观察 /
              跟踪）：基本面证据显示公司具备品类领导地位和收入规模，但近期盈利路径证据不足、财务报告不透明，且当前估值相对基准情景退出区间缺少足够安全边际。信心为中等：Maven
              的增长和市场地位证据较充分，但缺少经审计财务、NRR 和雇主集中度数据，无法形成高信心的正向或负向判断。风险评级为高，驱动因素包括 Dobbs
              判决后的法律敞口、现金消耗、专利诉讼，以及退出时数字健康倍数压缩风险。估值立场为 NEUTRAL-TO-CAUTIOUS（中性偏谨慎），基于 $1.7B 估值：对于一家以 50% 增长、拥有 $268M ARR
              的公司，这一价格并非明显错误；但可比证据显示，基准情景下相对当前估值上行有限，悲观情景下下行显著。买入逻辑需要满足以下条件：入场估值在 $1.3–1.5B 或以下（例如老股交易、down-round
              桥接，或低于上一轮私募标记的 IPO 定价），或者公司在 18–24 个月内证明盈利路径，并有经审计财务确认。若 Maven 提交 IPO
              招股书（提供经审计财务和完整披露）、提前实现盈利，或以显著更高估值完成后续融资且提供强财务文件，应重新审视 WATCH/TRACK 立场。
            claimRefs:
              - CV032
              - CV033
              - CV034
              - CV036
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV016
              - CV021
