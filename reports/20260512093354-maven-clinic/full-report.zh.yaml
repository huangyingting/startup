  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 参与的是新兴的雇主赞助虚拟女性与家庭健康福利市场。相关 TAM
              覆盖面向女性生殖与家庭全生命周期的数字健康平台：辅助生殖和备孕护理、孕期和产前管理、产后和返岗支持、儿科护理协调、更年期管理，以及——从 2026 年开始——GLP-1 和激素护理。独立分析师将 2024
              年全球数字女性健康市场规模估计为约 $2.1–3.2 billion，并预计 2026 年达到 $4.7–5.3 billion，CAGR 为 15–21%。更宽口径的美国 femtech 定义（包括设备、App
              和健康管理）达到 $16.7 billion。Maven 的市场不包括传统线下 OB-GYN、辅助生殖诊所和医院护理，也不包括缺少 Maven 临床照护团队和支付方级 ROI 导向的 DTC App
              模式（Flo、Glow）。从客户视角看，现状替代方案——EAP、孕产个案管理公司和独立辅助生殖诊所网络——划定了竞争边界。整个雇主健康福利市场在美国每年支出超过 $800
              billion，为数字平台争夺自由配置预算提供了巨大资金池。Maven 能否定义并占据一个清晰子赛道——具体说，是数字化、临床级家庭健康全生命周期福利——是它抵御同质化远程医疗替代品的关键护城河。
