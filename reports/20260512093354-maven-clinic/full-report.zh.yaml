      - number: '5.5'
        title: 信任、安全、合规与质量控制
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 搭建了多层合规和安全体系，满足自保型 Fortune 500 雇主的要求。ISO 27001 认证确认其信息安全管理体系达到国际认可标准，满足企业采购中的安全尽调。Maven
              与所有雇主客户签署 HIPAA 商业伙伴协议，明确联邦法律下的数据处理和泄露通知义务。SOC 2 Type II 合规覆盖云基础设施安全、可用性和保密性控制，并按行业惯例由公司自报。GDPR
              合规支撑欧洲雇主客户和跨国部署。Maven 的临床质量项目与 NCQA 孕产妇健康标准对齐，提供基于证据的协议框架——但 Maven 并未正式获得 NCQA 认证。远程医疗服务已在美国 50
              个州取得许可。Dobbs 判决后的监管环境给生殖护理导航带来法律复杂性，要求 Maven 维护按州更新的协议。Coretek Licensing 在 2022 年提起的专利诉讼仍未解决。AI
              临床建议存在实质性患者安全风险：幻觉可能生成错误临床指导，因此需要持续模型监测、人工监督协议，以及对被标记临床案例的升级路径。
