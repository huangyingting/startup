      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 处在远程医疗、生殖健康和数字福利管理的交叉点——这三个领域的监管框架快速演变，且常常相互冲突。最急迫的监管风险来自 Dobbs 判决后的法律环境：20
              多个州已颁布法律，限制或刑事化某些生殖护理活动；Maven 的护理导航角色——把会员引导至包括药物流产在内的适当临床服务——在这些司法辖区内带来直接法律敞口。由新任首席法务官 Susan Stick 领导的
              Maven 法务团队，已落地逐州导航协议，但拼图式法律环境仍在变化，没有任何协议能彻底消除风险。2024 年 4 月 26 日刊登在 Federal Register 的 HIPAA Privacy Rule
              for Reproductive Health Care，在受覆盖实体为执法目的寻求使用或披露生殖健康数据时，提供有限但有意义的保护；但它不能凌驾州刑事法规。FDA 2025 年关于 AI/ML-enabled
              Software as a Medical Device 的更新指南，如果 Maven Intelligence 的建议跨过 SaMD 门槛，就会直接适用；Maven 尚未公开披露其监管分类或 510(k)
              路径。Coretek Licensing 2022 年提起的专利诉讼，指控护理协调知识产权侵权，截至 2026 年仍未解决。不利判决可能要求支付版税或重做产品。州级远程医疗执照要求 Maven
              提供方在每名会员居住州取得执照，带来持续合规开销和阶段性网外风险。国际扩张会触发 GDPR 合规义务。新一届联邦政府若改变 ACA
              雇主强制要求激励，可能削弱雇主需求信号。这些敞口叠加后，使监管与法律风险成为本次风险评估中最重要的一类。
