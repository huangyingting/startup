      - number: '2.2'
        title: 市场规模测算：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              Maven 的可服务市场可以用三层嵌套口径来分析。TAM——全球数字女性健康——据 Vantage Market Research、Data Bridge 和 Grand View Research
              等机构估计，2024 年为 $2.1–3.2 billion，到 2026 年扩大至 $4.7–5.3 billion。更宽的雇主数字健康 SAM——美国所有临床类别数字健康福利项目的雇主和支付方总市场——估计为
              $20–30 billion，其中女性与家庭健康切片规模可观，但很难单独拆出。Maven 当前 ARR 约 $268 million，代表公司的 SOM：约占狭义数字女性健康 TAM 的 8%，或广义雇主数字健康
              SAM 的约 1%。

              仅美国辅助生殖市场就是关键子赛道。IBISWorld 预计美国辅助生殖诊所行业到 2026 年将达到 $10.9 billion。Harris Williams 2023 年 Q3 Fertility
              Market Overview 估计，更宽的雇主资助辅助生殖福利子市场规模为 $5.6–8.4 billion。如今 42% 的美国大型雇主提供辅助生殖福利，高于 2016 年的 13%；叠加 2025–2026
              年州级强制覆盖扩大，该子市场具备显著结构性顺风。

              分析师对 CAGR 的估计随口径而变。最窄的 femtech 定义（月经追踪、备孕 App）给出的 CAGR 较低（约 15%）；面向雇主、具备临床能力且承诺结果的平台开户价更高，增长轨迹也更快（约
              19–21%）。Maven 一站式生命周期方案让它处在该市场 CAGR 更高的一层。关键是，SAM 和 SOM 估计都只是近似值：Maven 未披露地理或分部收入拆分，分析师划定市场边界的方法也差异很大。
