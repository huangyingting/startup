  - id: FI002
    title: 雇主获客与收入产出流程
    type: flow
    layout: standard
    summary: |
      流程图以从初始合同到毛利率的路径，建模 Maven Clinic 的单个雇主经济模型，展示关键成本驱动因素，以及基于基准代理估算的 CAC 回本路径。
    claimRefs:
      - CI010
      - CI015
      - CI018
      - CI030
    approximationNotes: |
      所有数值均为基于行业基准和第三方分析师交叉推算的估计。Maven 尚未披露 CAC、NRR 或毛利率实际值。输入存在 ±30% 不确定性。
    data:
      nodes:
        - id: new_employer
          label: 新签雇主合同
          detail: 通过直销、经纪人或健康计划渠道签下企业或中端市场雇主
        - id: cac
          label: CAC：未披露
          detail: 获取单个雇主合同所需的销售和营销投入——未公开披露
        - id: contract_arr
          label: 年度合同价值（ACV）
          detail: PEPM × 已登记人群 × 12 个月；区间从 ~$100K（中端市场）到 $5M+（Fortune 500）
        - id: gross_margin
          label: 毛利率：估计 ~60–70%
          detail: 扣除医疗服务会诊费、护理导航员成本和平台基础设施 COGS 后的净额
        - id: payback
          label: CAC 回本周期：估计 ~12–18 个月
          detail: 基于基准推算；实际回本取决于未披露的 CAC 和已实现毛利率
        - id: nrr
          label: NRR：未披露
          detail: 来自增购、交叉销售和流失的净收入留存；关键尽调阻塞点
        - id: ltv
          label: LTV：估计 ~3–5x ACV
          detail: 按 SaaS 基准倍数估算的客户终身价值；没有 NRR 无法确认
      edges:
        - from: new_employer
          to: cac
          label: 产生销售成本
        - from: new_employer
          to: contract_arr
          label: 生成 ACV
        - from: contract_arr
          to: gross_margin
          label: 扣除 COGS
        - from: gross_margin
          to: payback
          label: 估计 12–18 个月覆盖 CAC
        - from: gross_margin
          to: nrr
          label: 续约周期中的扩张或流失
        - from: nrr
          to: ltv
          label: 生命周期累计毛利
