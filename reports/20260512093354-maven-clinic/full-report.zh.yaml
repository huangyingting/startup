  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Maven Clinic 身处雇主赞助数字女性与家庭健康福利的竞争市场，面对辅助生殖和孕产福利的直接对手、心理健康和通用远程医疗的邻近竞争者，以及机构现状替代方案。直接竞争者是面向同一主要买方——自保型雇主的
              HR 和福利负责人——且临床范围重叠的平台。Carrot Fertility 和 Progyny 是雇主辅助生殖福利中最直接的对手，但两者都缺少 Maven 的全生命周期宽度。Kindbody
              在辅助生殖领域竞争，差异化来自自有实体诊所。Spring Health（心理健康）、Sword Health（肌肉骨骼福利）和 Teladoc（通用远程医疗）等邻近竞争者争夺同一份雇主数字健康预算，但并不直接复制
              Maven 的女性健康范围。替代和现状方案包括传统员工援助计划、独立辅助生殖诊所网络，以及大型健康保险公司提供的孕产个案管理项目。大型雇主也可能自建专有孕产个案管理平台，不过历史上，大规模执行一直落后。随着
              Maven 于 2026 年扩展到 DTC 渠道，Hims and Hers 与 Noom 在 GLP-1
              体重管理上的出现形成新的替代竞争前线。竞争强度正在上升：风险资本持续流入数字健康福利领域，大型健康保险公司也在投资自有数字护理能力。Maven 覆盖 5
              个以上临床类别的项目组合宽度，仍是任何单一雇主端竞争对手都无法匹配的。
