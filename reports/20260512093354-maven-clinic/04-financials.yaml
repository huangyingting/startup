company:
  name: Maven Clinic
chapter:
  number: 4
  title: Financials
  summary: >
    Maven Clinic's revenue model is an employer-facing PEPM subscription business generating an
    estimated $268 million ARR in 2024 — approximately 50 percent growth over 2023's estimated
    $179 million. Revenue derives primarily from self-insured employer contracts priced between
    $2 and $15 per member per month depending on program scope, supplemented by health plan
    licensing with UnitedHealthcare and Blue Cross Blue Shield. Maven raised $125 million in a
    Series F round in October 2024 at a $1.7 billion post-money valuation, providing an estimated
    24-to-36-month operating runway. Gross margin is estimated at 60-70 percent, driven by
    provider session costs, care navigator compensation, and platform infrastructure COGS.
    Unit economics are partially opaque for a private company: CAC, net revenue retention,
    and employer-level revenue concentration are not publicly disclosed. The November 2024
    reduction in force of approximately 60 employees signals operating cost optimization
    ahead of a potential IPO. Key financial diligence blockers include undisclosed NRR,
    CAC/payback, gross margin actuals, and revenue mix shift from the 2026 DTC channel launch.

sections:
  - id: SP001
    title: Revenue Model and Stream Overview
    body: >
      Maven Clinic's primary revenue mechanism is a per-employee per-month subscription billed
      to self-insured employers for access to Maven's virtual clinical programs spanning fertility,
      maternity, menopause, and pediatrics. Employers pay a PEPM rate applied to the enrolled
      or eligible employee population, resulting in predictable recurring revenue. Maven's PEPM
      pricing is estimated at $2 to $15 per member per month, depending on clinical program
      scope, employer size, and contracted features. Enterprise accounts with Fortune 500 clients
      such as Amazon, Microsoft, AT&T, and Morgan Stanley likely fall in the upper PEPM tier
      given the breadth of program modules contracted. A secondary revenue stream derives from
      health plan licensing arrangements: Maven has disclosed channel partnerships with
      UnitedHealthcare and Blue Cross Blue Shield, where health plans embed Maven's virtual
      care platform into their plan benefits and pay a licensing or PEPM fee for covered
      member access. A tertiary consumer direct-to-consumer channel was launched in March 2026,
      covering GLP-1 weight management, hormone care, and reproductive health. Revenue
      recognition follows SaaS-convention monthly rateable recognition across the contract
      term, not per-encounter or usage-based billing, which limits revenue volatility but
      also limits upside from high-utilization cohorts. The employer B2B subscription model
      is the dominant revenue driver and is the basis for Maven's estimated ARR of approximately
      $268 million in 2024, representing roughly 50 percent year-over-year growth from 2023's
      estimated $179 million.
    claimRefs:
      - CI001
