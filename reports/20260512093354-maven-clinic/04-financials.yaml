  - id: SP003
    title: Cost Structure, Gross Margin, and Capital Intensity
    body: >
      Maven's cost of revenue is primarily driven by three components: provider session fees
      paid to its 5,000-plus virtual specialist and care navigator network, technology
      infrastructure costs for the Maven platform, and member services and care coordination
      costs. Provider session fees are the largest variable COGS item: as member utilization
      increases across fertility, maternity, and menopause programs, session volume and
      total provider costs scale with engagement. Maven positions providers as independent
      contractors rather than employees, reducing benefits and payroll overhead but creating
      COGS variability correlated with utilization rates. Gross margin for Maven is estimated
      at 60 to 70 percent based on comparable SaaS-adjacent employer health platform
      benchmarks and third-party analyst estimates, representing a material reduction from
      pure-software SaaS margins due to the provider delivery component. This range is
      consistent with the Forge/CFRA digital health benchmarks that position employer
      virtual care platforms in the 55-to-72 percent gross margin band. For Maven, the
      marginal cost per additional covered life decreases as platform infrastructure costs
      are amortized over a growing member base, creating inherent gross margin expansion
      potential with scale. Capital expenditure is low relative to physical health companies:
      Maven does not own or operate clinical facilities, and its primary capex-equivalent
      investment is software development and platform engineering headcount. Working capital
      requirements are modest given upfront or advance employer subscription payments that
      are recognized ratably over contract terms.
    claimRefs:
      - CI009
      - CI012
      - CI013
      - CI020
      - CI021
      - CI031
