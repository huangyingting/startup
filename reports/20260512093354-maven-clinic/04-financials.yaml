  - id: SP002
    title: Pricing, GTM Motion, and Sales Efficiency
    body: >
      Maven's go-to-market motion is a direct enterprise sales model targeting HR and benefits
      leaders at self-insured employers with 500 or more employees. The company supplements
      direct sales with broker and benefits consultant channel relationships and health plan
      partner distribution through UnitedHealthcare and Blue Cross Blue Shield. Enterprise sales
      cycles for large employer digital health platforms typically range from 6 to 12 months
      for mid-market and 12 to 24 months for large Fortune 500 accounts. Maven's Fortune 500
      concentration suggests longer cycles with higher average contract values. Customer
      acquisition cost is not publicly disclosed for Maven, but comparable employer benefits
      platform benchmarks from SVB Healthcare surveys suggest CAC-to-first-year-ARR ratios
      of 0.8x to 1.2x for enterprise digital health platforms, implying an estimated CAC
      payback period of 12 to 18 months at Maven's PEPM pricing levels. Maven's 2,000-plus
      employer client base covering 17 million lives provides a foundation for strong net
      revenue retention if upsell into additional clinical modules tracks growth. Health plan
      channel economics are more favorable on CAC but may require lower PEPM rates, creating
      a revenue-per-life trade-off relative to direct enterprise accounts. List PEPM pricing
      is not realized net revenue; employer negotiated discounts and health plan channel
      pricing likely compress realized PEPM below list rate, particularly for large enterprise
      contracts. Maven's CFO transition noted by B17 News in 2026 signals organizational
      preparation for an IPO readiness process, which typically includes strengthened
      financial reporting infrastructure.
    claimRefs:
      - CI006
      - CI007
