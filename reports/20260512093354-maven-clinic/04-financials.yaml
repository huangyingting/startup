      - TI003

  - id: SP004
    title: Public Traction Metrics and Private Financial Gaps
    body: >
      Maven's publicly disclosed traction metrics include approximately 2,000 employer clients,
      17 million covered lives, and an estimated ARR of $268 million as of 2024, growing from
      an estimated $179 million in 2023. The three-year CAGR from 2021 to 2024 is approximately
      39 percent, based on third-party revenue estimates from Sacra and Latka that triangulate
      from employee count, funding history, and disclosed client metrics. Revenue per covered
      life is estimated at approximately $15.75 per year ($268M / 17M lives), broadly consistent
      with PEPM-based subscription economics at the mid-range of Maven's estimated pricing.
      Material private financial metrics that are not publicly disclosed include: net revenue
      retention rate, which would confirm whether upsell into additional program modules is
      driving organic growth; gross margin actuals, which would confirm whether provider COGS
      scaling is tracking the projected trajectory; customer acquisition cost, which would
      clarify whether Maven's growth rate is sustainable relative to its sales and marketing
      investment level; and employer-level revenue concentration, which would reveal dependency
      on any single client for a disproportionate share of ARR. Revenue quality is assessed
      as high-durability given the employer SaaS-style subscription structure with long sales
      cycles and annual or multi-year contracts, but moderate relative to pure software
      businesses given the provider COGS component and opaque NRR. Progyny's disclosed NRR
      of approximately 105 to 110 percent in its peak years provides a directional benchmark
      for fertility-focused employer platforms, though Maven's broader program scope may
      support a higher upsell-driven NRR. Rock Health's 2024 digital health funding review
      cites employer digital health as the most resilient sector for large-deal activity.
    claimRefs:
