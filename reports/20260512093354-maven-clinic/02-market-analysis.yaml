callouts:
  - calloutType: strength
    title: "Large and Growing Market with Structural Employer Tailwinds"
    body: >
      The digital women's health market is growing at 15–21% CAGR from a $2.1–3.2 billion base in
      2024, and employer-side structural forces — rising premium costs, fertility mandate expansion,
      and talent competition — are accelerating the buying cycle for Maven's platform. With 42% of
      large US employers now offering fertility benefits (vs. 13% in 2016), the market is in an
      early mainstream adoption phase where Maven's incumbent position and clinical outcomes data
      create durable competitive advantage.
    claimRefs:
      - CM001
      - CM002
      - CM006
      - CM017
  - calloutType: risk
    title: "Market Sizing Uncertainty and Saturation Risk in Large Enterprise"
    body: >
      Analyst TAM estimates for digital women's health span a factor of 10x depending on market
      definition scope, from $2.1 billion (narrow clinical) to $22 billion (broad femtech). Maven's
      large-employer penetration may be approaching a ceiling — with ~2,000 employer clients in a
      universe of ~500 Fortune 500 companies, the next growth phase likely requires mid-market and
      DTC expansion, which carry different unit economics and higher customer acquisition costs.
    claimRefs:
      - CM018
      - CM019
      - CM033
      - CM036

