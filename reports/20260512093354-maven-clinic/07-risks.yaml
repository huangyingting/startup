company:
  name: Maven Clinic
chapter:
  number: 7
  title: "Risks"
  summary: >
    Maven Clinic faces a multi-dimensional risk profile anchored by three high-severity clusters:
    post-Dobbs reproductive-health legal exposure affecting telehealth operations in 20-plus
    restrictive states, an unresolved patent lawsuit by Coretek Licensing alleging care-coordination
    IP infringement, and an estimated $50–80M annual cash burn that limits runway to approximately
    18–24 months post-Series F. Operational risks include AI hallucination in Maven Intelligence,
    provider-network quality control at scale across 5,000-plus credentialed providers, and HRIS
    integration failures that could impair onboarding. Partner and dependency risks center on
    AWS single-cloud concentration, HRIS API dependency, and health-plan channel reliance.
    Financial risks include revenue concentration, employer-budget discretion, and DTC unit
    economics uncertainty. Key mitigations include SOC 2 Type II, ISO 27001, and HIPAA BAA
    compliance infrastructure, state-by-state care-navigation legal protocols, and a newly
    appointed CLO. Thesis-break triggers are identified for each major risk cluster.

sections:
  - id: RP001
    title: "Severity-Ranked Risk Overview"
    body: >
      Maven Clinic's aggregate risk profile is driven by five principal risk clusters, each with
      distinct likelihood, impact, and mitigation maturity characteristics. The highest-severity
      risks are post-Dobbs regulatory-legal exposure (high likelihood, high impact, developing
      mitigation), the unresolved Coretek patent lawsuit (medium likelihood, high impact, low
      mitigation), and an estimated $50–80M annual cash burn against an 18–24 month runway
      (medium likelihood of shortfall, high impact). A second tier of high-severity risks includes
      potential AI recommendation errors from Maven Intelligence, a major reproductive-health
      data breach, and employer-budget contraction triggered by an economic downturn. Mid-severity
      risks include AWS single-cloud dependency, HRIS integration failures, provider-network
      quality-control gaps, and key-person concentration in Kate Ryder. Each risk has been
      assessed against publicly available evidence; likelihood and impact ratings are estimates
      based on industry benchmarks and disclosed company facts rather than actuarial data.
      Residual severity reflects the authors' view after accounting for known mitigations.
      Investors seeking a comprehensive risk picture require access to Maven's internal risk
      register, legal dossier, insurance policies, and actuarial assessments from the formal
      data room.
    claimRefs:
      - CR001
      - CR003
      - CR006
      - CR007
      - CR013
      - CR014
      - CR018
      - CR020
      - CR021
    tableRefs:
      - TR001
    figureRefs:
      - FR001

  - id: RP002
    title: "Regulatory and Legal Risks"
    body: >
      Maven Clinic operates at the intersection of telehealth, reproductive health, and digital
      benefits management — three domains with rapidly evolving and frequently conflicting
      regulatory frameworks. The most acute regulatory risk is the post-Dobbs legal landscape:
      more than twenty states have enacted laws restricting or criminalizing certain reproductive
      care activities, and Maven's care-navigation role — directing members to appropriate clinical
      services including medication abortion — creates direct legal exposure in those jurisdictions.
      Maven's legal team, led by newly appointed CLO Susan Stick, has implemented state-by-state
      navigation protocols, but the patchwork remains dynamic and no protocol fully eliminates
      risk. The HIPAA Privacy Rule for Reproductive Health Care, published in the Federal Register
      on April 26, 2024, provides limited but meaningful protections for reproductive health data
      when covered entities seek to use or disclose it for law enforcement purposes; however, it
      does not override state criminal statutes. The FDA's 2025 updated guidance on AI/ML-enabled
      Software as a Medical Device directly applies to Maven Intelligence if its recommendations
      cross the SaMD threshold, and Maven has not publicly disclosed its regulatory classification
      or 510(k) pathway. The Coretek Licensing patent suit, filed in 2022, alleges care-coordination
      IP infringement and remains unresolved as of 2026. A successful judgment could require
      royalty payments or a product redesign. State telehealth licensure requires Maven providers
      to be licensed in each member's state of residence, creating ongoing compliance overhead
      and episodic out-of-network risk. International expansion would trigger GDPR compliance
      obligations. Potential changes to ACA employer mandate incentives under a new federal
      administration could reduce the employer demand signal. The combination of these exposures
      makes regulatory and legal risk the single most material category in this risk assessment.
