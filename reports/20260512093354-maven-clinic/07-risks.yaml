  - id: RP006
    title: "Mitigations, Monitoring Indicators, and Thesis-Break Triggers"
    body: >
      Maven Clinic's primary mitigations for its top risks are a compliance infrastructure
      (SOC 2 Type II, ISO 27001, HIPAA BAA, and cyber plus professional liability insurance),
      state-by-state reproductive-health care-navigation protocols developed under CLO Susan
      Stick, a diversified employer base of 2,000-plus clients that limits single-client
      concentration, and ongoing legal management of the Coretek patent case. These mitigations
      are meaningful but leave residual exposure that investors must monitor. Key monitorable
      indicators include: (1) ARR growth rate versus 30% floor — deceleration below 25%
      signals model strain; (2) cash runway — any reduction to below 12 months without a
      signed term sheet is a critical threshold; (3) Coretek litigation resolution — an adverse
      judgment requiring royalties or a product redesign would be immediately material;
      (4) data breach — any significant breach involving reproductive health records would
      trigger regulatory, litigation, and reputational cascades; (5) employer churn rate —
      any quarter with net negative employer revenue retention signals a market contraction or
      competitive displacement event. Thesis-break triggers that would necessitate a fundamental
      re-evaluation of the Maven thesis include: Kate Ryder's departure as CEO; an adverse
      final judgment in the Coretek patent case; a major data breach involving reproductive
      health data; Progyny or Carrot Fertility acquiring a large competitor and achieving
      dominant fertility market share; a broad employer health-benefits spending contraction
      due to economic recession; or an FDA regulatory action against Maven Intelligence as an
      uncleared SaMD. Investors should prioritize access to the data room items identified
      in the evidence gaps — particularly the internal risk register, actuarial assessments,
      legal dossier, and audited financials — before committing capital.
    claimRefs:
      - CR011
      - CR012
      - CR025
      - CR028
      - CR034
      - CR035
      - CR036
    figureRefs:
      - FR004

