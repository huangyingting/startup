callouts:
  - calloutType: risk
    title: "Post-Dobbs Legal Exposure Is Persistent and Jurisdiction-Specific"
    body: >
      More than twenty US states have enacted laws restricting or criminalizing certain
      reproductive care activities. Maven's role in navigating members to clinical services
      including medication abortion creates ongoing corporate and provider liability exposure
      in those jurisdictions. State legislatures continue to amend these laws, meaning
      legal risk is dynamic and cannot be fully mitigated by any static protocol.
    claimRefs:
      - CR006
      - CR027
      - CR028

  - calloutType: risk
    title: "Coretek Patent Lawsuit Remains Unresolved — Outcome Unknown"
    body: >
      Coretek Licensing filed a patent infringement suit against Maven Clinic in 2022 alleging
      care-coordination IP violations. The case remains active as of 2026. A successful
      adverse judgment could require Maven to pay royalties or redesign core care-coordination
      functionality, either of which would be material. Investors should obtain Maven's litigation
      dossier and IP counsel opinion before committing capital.
    claimRefs:
      - CR001
      - CR029

  - calloutType: risk
    title: "Key-Person Risk: Kate Ryder as CEO and Brand Anchor"
    body: >
      Kate Ryder's dual role as founder-CEO and public brand anchor means her departure would
      likely trigger adverse market signaling, talent attrition risk, and potential customer
      relationship disruption. No succession plan has been publicly disclosed. This risk is
      heightened because the 2025 C-suite hires are still ramping.
    claimRefs:
      - CR018
      - CR037

  - calloutType: strength
    title: "Compliance Infrastructure Partially Mitigates Operational and Regulatory Tail Risk"
    body: >
      Maven's SOC 2 Type II, ISO 27001, and HIPAA BAA certifications, combined with its CLO
      appointment and state-by-state navigation protocols, represent a meaningful compliance
      infrastructure that reduces — though does not eliminate — operational and regulatory tail
      risk. Cyber and professional liability insurance further limits the direct financial impact
      of breach or clinical error events.
    claimRefs:
      - CR011
      - CR012
      - CR028
      - CR034

