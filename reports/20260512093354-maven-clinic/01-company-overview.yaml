company:
  name: Maven Clinic
chapter:
  number: 1
  title: Company Overview
  summary: >
    Maven Clinic is the world's largest virtual clinic for women's and family health, founded in
    2014 by Kate Ryder and headquartered in New York City. The company operates a B2B2C model,
    selling digital health benefits to over 2,000 employers who offer Maven to their workforce,
    covering 17 million lives across 175 countries. It raised a $125M Series F in October 2024
    at a $1.7B valuation, reaching an estimated $268M ARR, cementing its status as the highest-
    valued digital health company focused on women's and family health.

sections:
  - id: SO001
    title: Company Identity and Business Model
    body: >
      Maven Clinic is a virtual healthcare platform purpose-built for women and families, covering
      the full reproductive lifecycle from fertility and pregnancy through pediatrics, parenting, and
      menopause. The company was founded in 2014 by Kate Ryder in New York City and remains
      headquartered there. Maven operates a business-to-business-to-consumer (B2B2C) model: it
      contracts directly with employers and health plans who offer Maven as an employee benefit.
      Members gain access through their employer's benefit package, not through a direct subscription.
      This model aligns Maven's incentives with employers who want to reduce maternal health costs and
      improve member outcomes while providing employees with specialized clinical access that primary
      care alone cannot offer. The platform connects members with over 5,000 specialists including
      OB-GYNs, midwives, doulas, fertility nurses, mental health providers, and pediatricians. Maven
      describes itself as the largest virtual clinic for women's and family health globally, operating
      across 175 countries as of 2024. The company is a late-stage private company and has not filed
      for an initial public offering as of the report date, though leadership changes in 2024-2025
      signal pre-IPO preparation. Harvard Business School has used Maven as a teaching case study,
      reflecting its recognition as a model for digital women's health innovation.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO022
      - CO023
      - CO039
      - CO040
    tableRefs:
      - TO001
    figureRefs:
