      - TO002

  - id: SO003
    title: Funding History and Capital Structure
    body: >
      Maven Clinic has raised over $425 million across nine funding rounds since its founding,
      positioning it as one of the best-capitalized private digital health companies in the women's
      health segment. The company's most recent financing was a $125 million Series F completed in
      October 2024, led by StepStone Group with participation from existing investors General
      Catalyst, Sequoia Capital, Oak HC/FT, Icon Ventures, Dragoneer Investment Group, and Lux
      Capital. The Series F established a post-money valuation of $1.7 billion, making Maven the
      highest-valued digital health company focused on women's and family health. Notably, the
      investor base includes celebrity investors Oprah Winfrey, Mindy Kaling, and Reese Witherspoon,
      who participated in earlier rounds and provide brand amplification. The company achieved unicorn
      status in its Series E round in 2022, when it raised $90 million. Prior rounds include a
      $110 million Series D in 2021, $45 million Series C in 2020, $27 million Series B in 2018,
      and $12 million Series A in 2016. The seed round of approximately $3 million was raised in 2014.
      Detailed secondary transaction history and current capitalization table structure are not
      publicly disclosed. Prior to the Series F, CFO Kristina Campbell departed, reportedly as Maven
      prepared for a potential IPO, and she was replaced by Katie Rooney in 2025.
    claimRefs:
