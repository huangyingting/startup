callouts:
  - calloutType: strength
    title: "Category Leadership with Recurring Employer Revenue"
    body: >
      Maven Clinic is the most well-capitalized digital health company in the women's and family health
      space, with 2,000+ employer clients, $425M+ raised, and $268M estimated ARR. Its B2B2C model
      creates high switching costs and long-term recurring revenue streams, underpinned by clinical
      outcomes data that supports employer renewal decisions.
    claimRefs:
      - CO007
      - CO017
      - CO019
  - calloutType: risk
    title: "Key-Person Dependency and Pre-IPO Leadership Transition"
    body: >
      Maven's strategic narrative is tightly coupled to Kate Ryder's continued leadership. The 2024
      CFO departure and simultaneous hiring of multiple new C-suite executives creates execution risk
      during a sensitive pre-IPO window. If Ryder were to step back or the new leadership team struggles
      to integrate, investor confidence and customer retention could be impacted.
    claimRefs:
      - CO011
      - CO041
      - CO031

