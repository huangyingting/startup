  - id: SO004
    title: Scale, Operating Metrics, and Milestones
    body: >
      Maven Clinic's scale metrics reflect rapid growth from 2020 to 2024, driven by employer
      adoption of digital family health benefits. As of 2024, Maven serves an estimated 17 million
      lives through more than 2,000 employer and health plan clients, including Amazon, Microsoft,
      AT&T, Morgan Stanley, and L'Oréal. The company reported approximately $268 million in annual
      recurring revenue in 2024, up from $178.9 million in 2023—a year-over-year growth rate of
      roughly 50 percent. Headcount stands at approximately 1,100 employees. Maven's provider network
      includes more than 5,000 clinical specialists across specialties including fertility, obstetrics,
      midwifery, pediatrics, mental health, and menopause. The company launched Maven Maternity, its
      first enterprise product, in 2017, marking its pivot from direct-to-consumer to a B2B benefits
      model. Maven acquired the parent coaching platform Bright Parenting in 2021, expanding its
      postpartum and parenting content. Maven Intelligence, its AI-powered care platform, was launched
      to personalize member pathways. Key industry recognitions include CNBC Disruptor 50 (2023) and
      TIME's Most Influential Companies (2026). In November 2024, Maven conducted a strategic
      realignment involving approximately 60 layoffs—about 10% of its workforce—shortly after closing
      the Series F round, signaling internal restructuring to improve efficiency ahead of potential
      public market readiness.
