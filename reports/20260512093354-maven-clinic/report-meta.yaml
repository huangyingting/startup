companyProfile:
  summary: >-
    Maven Clinic is the world's largest virtual clinic for women's and family health, founded in
    2014 by Kate Ryder and headquartered in New York City. The company operates a B2B2C model,
    contracting with 2,000+ employers and health plans who offer Maven as a covered employee
    benefit. Maven's platform spans the full reproductive and family lifecycle — fertility,
    pregnancy, postpartum, parenting, pediatrics, and menopause — with 5,000+ clinical
    specialists. Maven raised a $125M Series F in October 2024 at a $1.7B post-money valuation,
    reaching an estimated $268M ARR. A November 2024 "strategic realignment" included 60
    layoffs (~10% of workforce), signaling efficiency focus ahead of a potential IPO.
  foundedDate: "2014-01-01"
  founders:
    - name: Kate Ryder
      role: Founder and CEO
      background: >-
        Previously at Index Ventures (venture capital) and the Financial Times. Founded Maven
        in 2014 and has led the company from seed through $1.7B valuation. Primary brand and
        strategy figure; high key-person dependency.
      claimRefs: [CO011, CO012]
  foundingLocation: New York City, New York, USA
  headquarters: New York City, New York
  productSummary: >-
    A B2B2C virtual health platform covering fertility, pregnancy, postpartum, parenting,
    pediatrics, menopause, and (from 2026) direct-to-consumer GLP-1 and hormone care. Maven
    Intelligence provides AI-powered care routing and risk stratification. The employer
    analytics dashboard delivers population health reporting and ROI measurement to HR leaders.
  customerFocus: >-
    Large self-insured employers (Fortune 500), mid-market employers (1,000–10,000 employees),
    managed care organizations and health plans, and (from 2026) direct-to-consumer members.
  businessModel: >-
    Primary: per-employee-per-month (PEPM) subscription charged to employers. Secondary: health
    plan premium contracts. Emerging: DTC subscription revenue for GLP-1/hormone care (2026).
  stage: late-stage private
  fundingStatus: >-
    Raised $425M+ across 9 rounds (2014–2024). Latest round: $125M Series F at $1.7B post-money
    valuation (October 2024), led by StepStone Group with General Catalyst, Sequoia Capital,
    Oak HC/FT, Dragoneer, and Lux Capital. Celebrity investors include Oprah Winfrey, Mindy
    Kaling, and Reese Witherspoon.
  claimRefs: [CO001, CO004, CO005, CO006, CO007, CO016, CO017, CO019, CO022, CO023]

summary:
  headline: >-
    Maven Clinic is the category-defining leader in employer-sponsored women's and family
    health, with strong traction and clinical ROI evidence, but an unproven path to profitability
    and a $1.7B valuation that requires sustained 30–50% ARR growth to justify.
  overallScore: 6.8
  recommendation: track
  confidence: medium
  riskRating: medium
  valuationStance: stretched
  keyMetrics:
    valuationUsdM: 1700
    revenueRunRateUsdM: 268
    arrUsdM: 268
    revenueGrowthYoYPct: 50
    grossMarginPct: null
    nrrPct: null
    totalRaisedUsdM: 425
    customerCount: 2000
    headcount: 1100
  topStrengths:
    - Category leader with 2,000+ employer clients, 17M+ covered lives, and the deepest clinical
      specialist network (5,000+) in the employer digital women's health segment.
    - Strong employer ROI evidence ($2,400–$5,000 maternity cost savings per member) creates
      durable buying triggers and high switching costs in the core Fortune 500 segment.
    - Full reproductive lifecycle coverage (fertility to menopause) differentiates Maven from
      point-solution competitors (Carrot, Progyny) and creates upsell and expansion economics.
  topRisks:
    - Not profitable; estimated burn of $50–80M/year with 18–24 months runway post-Series F
      creates dependency on favorable IPO or refinancing conditions in 2026–2027.
    - Post-Dobbs regulatory complexity exposes Maven to legal risk in 20+ restrictive states
      for reproductive health care navigation, with potential for costly litigation or
      forced product restrictions.
    - Low active utilization rates (5–15% of eligible members) limit employer ROI demonstration
      and create vulnerability to contract non-renewal if outcomes are not visible.
  unresolvedGaps:
    - Audited GAAP revenue, gross margin, operating loss, and cash balance are not publicly
      available; all financial metrics rely on third-party estimates.
    - NRR, GRR, top-account revenue concentration, and contract term/renewal data are
      not disclosed, making customer durability assessment incomplete.
    - Maven's PEPM pricing, exact segment revenue breakdown, and Fortune 500 vs. mid-market
      client split are not public, limiting go-to-market efficiency analysis.
    - The Coretek Licensing patent lawsuit status and financial exposure remain unresolved
      as of the report date.

