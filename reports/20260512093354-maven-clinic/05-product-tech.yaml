company:
  name: Maven Clinic
chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Maven Clinic delivers a cloud-native SaaS platform on AWS offering eight clinical product
    modules spanning fertility, pregnancy, postpartum, parenting, menopause, and GLP-1/hormone
    care, plus an AI care coordination layer (Maven Intelligence) and an employer analytics
    dashboard. The architecture combines a mobile-first member app, employer web portal, HRIS
    API integration layer, video consult infrastructure, and proprietary ML models for risk
    stratification and care routing. Differentiation rests on a longitudinal reproductive health
    dataset unique in scope, peer-reviewed clinical outcomes (24% preterm birth reduction, 44%
    NICU reduction, 52% fewer C-sections), a 5,000-plus specialist provider network, and
    published patent filings for care coordination algorithms. The compliance stack includes ISO
    27001 certification, SOC 2 Type II, HIPAA BAA with all employer clients, and NCQA-aligned
    clinical quality standards. Adverse flags include an active Coretek Licensing patent lawsuit
    and AI hallucination risk in clinical recommendations.

sections:
  - id: EP001
    title: "Platform Architecture and Delivery Model"
    body: >
      Maven Clinic operates a cloud-native software-as-a-service platform deployed entirely on
      Amazon Web Services, providing the reliability, scalability, and HIPAA-compliant data
      isolation required for enterprise clinical services at Fortune 500 scale. The member-facing
      experience is delivered through iOS and Android native mobile applications, enabling
      real-time access to care programs, appointment scheduling, and virtual consultations from
      any location. An employer-facing web portal gives HR and benefits administrators visibility
      into population health metrics, member enrollment management, and program ROI dashboards.
      The platform API integration layer connects to major HRIS platforms including Workday, SAP,
      and ADP, enabling automated employee enrollment and eligibility synchronization. Maven
      Intelligence, the company's proprietary AI layer launched in May 2023, operates across all
      clinical programs — routing members to appropriate clinical pathways, stratifying risk for
      high-acuity cases, and personalizing care recommendations in real time. EMR integration
      capabilities support clinical data handoffs to in-person care providers where employed.
      The architecture supports telehealth video consultations, asynchronous clinical messaging,
      and structured care protocols delivered through a single unified platform.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE028
      - CE029
      - CE035
    tableRefs:
      - TE002
    figureRefs:
      - FE001

  - id: EP002
    title: "Product Modules and SKU Map"
    body: >
      Maven Clinic's commercial product portfolio spans eight modules covering the full
      reproductive and family health lifecycle. Maven Fertility covers preconception counseling,
      IVF and IUI navigation, fertility coaching, and egg freezing support, addressing the full
      employer fertility benefit from pre-cycle through IVF closure. Maven Pregnancy provides
      prenatal OB consultations, high-risk pregnancy management, and care coordination with
      in-person providers. Maven Postpartum addresses lactation support, postpartum depression
      screening, and return-to-work coaching for new mothers. Maven Parenting, expanded via the
      2021 Bright Parenting acquisition, provides pediatric consultations and developmental
      milestone tracking through a content and community platform. Maven Menopause offers
      hormone management, symptom tracking, and telehealth access to menopause specialists,
      serving the growing peri- and post-menopausal workforce cohort. Maven GLP-1 and Hormone
      Care launched as a direct-to-consumer product line in March 2026, extending Maven's
      addressable market beyond employer-contracted populations for the first time. Maven
      Intelligence serves as an AI-powered coordination layer across all programs rather than
      a standalone module. An Employer Analytics Dashboard provides HR teams with population
      health reporting and ROI quantification tools. Together these modules create an expanding
      platform that can be bundled or sold individually.
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
      - CE011
      - CE012
      - CE032
    tableRefs:
      - TE001

  - id: EP003
    title: "IP, Data Moat, and Differentiation"
    body: >
      Maven Clinic's competitive differentiation rests on several reinforcing advantages that
      together create a meaningful IP and data moat. First, the company has assembled a
      longitudinal member health dataset spanning the full reproductive lifecycle — from
      preconception through pregnancy, postpartum, and into menopause — a dataset unique in
      scope among digital health competitors. Second, Maven Intelligence encodes proprietary
      clinical pathway algorithms across six specialty areas built from internal clinical data,
      supported by patent filings for care coordination and risk stratification tools per Google
      Patents review. Third, Maven has published peer-reviewed clinical outcomes studies
      validating its impact on maternal health: Health Affairs documented a 24% reduction in
      preterm births, and company data cite 44% fewer NICU admissions and 52% fewer C-sections
      among enrolled members versus national averages. These published outcomes provide
      third-party validated evidence of clinical efficacy that generic telehealth platforms lack.
      Fourth, the provider network of more than 5,000 credentialed specialists — some with
      exclusive Maven relationships — creates competitive access barriers. Finally, the Bright
      Parenting acquisition in 2021 added content and community assets that extend member
      engagement beyond the clinical episode window, improving retention and lifetime value.
      Outstanding Coretek Licensing patent litigation filed in 2022 represents a risk to IP claims.
    claimRefs:
      - CE013
      - CE014
      - CE015
      - CE016
      - CE020
      - CE022
      - CE034
      - CE036
      - CE040
    tableRefs:
      - TE003
    figureRefs:
      - FE004

  - id: EP004
    title: "Deployment, Integration, Reliability, and Roadmap"
    body: >
      Maven Clinic's platform is deployed through enterprise software contracts and health plan
      licensing rather than on-premises installation. Employer onboarding involves HRIS data
      connection, employee eligibility file setup, and SSO configuration with the employer's
      identity provider. Integration quality varies across HRIS partners: Workday and SAP
      integrations are well-documented, while smaller platforms may require manual configuration.
      The company commits to a 99.9%+ uptime SLA for critical care pathways, though this figure
      is company-stated and has not been independently audited. Maven's 2026 product roadmap
      includes AI-powered predictive analytics for employer population health, deepened mental
      health integration, international clinical network expansion, and provider performance
      analytics. The DTC GLP-1 and hormone care channel launched in March 2026 represents a
      new distribution vector on the near-term roadmap. Maven's roadmap is driven primarily by
      employer demand signals and competitive differentiation requirements rather than externally
      disclosed development timelines, creating uncertainty for enterprise buyers requiring firm
      delivery commitments. The platform supports telehealth regulatory compliance across all
      50 US states and in 175 countries of international operation.
    claimRefs:
      - CE021
      - CE025
      - CE026
      - CE027
      - CE030
      - CE037
    tableRefs:
      - TE005
    figureRefs:
      - FE003

  - id: EP005
    title: "Trust, Safety, Compliance, and Quality Controls"
    body: >
      Maven Clinic has built a multi-layer compliance and security program meeting the
      requirements of self-insured Fortune 500 employers. ISO 27001 certification confirms an
      internationally recognized information security management system, satisfying enterprise
      procurement security due diligence. HIPAA Business Associate Agreements are executed with
      all employer clients, establishing clear data handling and breach notification obligations
      under federal law. SOC 2 Type II compliance covers cloud infrastructure security,
      availability, and confidentiality controls, and is self-reported per industry norms.
      GDPR compliance supports European employer clients and multinational deployments. Maven's
      clinical quality program is aligned with NCQA maternal health standards, providing an
      evidence-based protocol framework — though Maven is not formally NCQA-accredited.
      Telehealth services are licensed across all 50 US states. The post-Dobbs regulatory
      environment introduced legal complexity for reproductive care navigation, requiring Maven
      to maintain state-specific protocol updates. An active patent lawsuit from Coretek
      Licensing (2022) remains unresolved. AI clinical recommendations carry a material patient
      safety risk from hallucination — incorrect AI-generated guidance — requiring ongoing model
      monitoring, human oversight protocols, and escalation paths for flagged clinical cases.
    claimRefs:
      - CE017
      - CE018
      - CE019
      - CE023
      - CE024
      - CE031
      - CE033
    tableRefs:
      - TE004
    figureRefs:
      - FE002

