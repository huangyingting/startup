  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Maven Clinic patent portfolio scope and Coretek litigation resolution"
      missingEvidence: >-
        Full patent portfolio details (number of patents granted, claims scope, expiration
        dates) are not publicly available. Coretek Licensing lawsuit status as of May 2026
        is unresolved; settlement terms, financial exposure, and IP outcome are unknown.
      whyItMatters: >-
        Patent litigation could result in licensing fees, injunctions, or platform feature
        modifications. Full IP portfolio assessment is required to evaluate the IP moat
        claim and litigation risk simultaneously.
      diligencePath: >-
        Request full IP docket in formal data room: all granted and pending patents, USPTO
        filing numbers, and litigation file for Coretek Licensing vs Maven Clinic including
        current status and outside counsel assessment.
      relatedQuestionRefs:
        - QE006
        - QE021
      relatedTableRefs:
        - TE001

    - type: missing-source
      severity: material
      topic: "Maven Intelligence AI hallucination risk mitigations and clinical oversight"
      missingEvidence: >-
        Maven has not publicly disclosed its AI error rate, hallucination incident history,
        clinical oversight protocol, human review escalation criteria, or model monitoring
        infrastructure for Maven Intelligence recommendations.
      whyItMatters: >-
        AI-generated clinical recommendations in reproductive health carry patient safety risk.
        Without documented safeguards, the platform faces regulatory and liability exposure if
        an incorrect recommendation leads to patient harm.
      diligencePath: >-
        Request AI safety documentation: error rate benchmarks, clinical review protocol,
        escalation procedures, adverse event log, and any regulatory engagement with FDA
        on the software as a medical device (SaMD) classification question.
      relatedQuestionRefs:
        - QE014

    - type: private-evidence-only
      severity: minor
      topic: "Maven Clinic HRIS integration quality by partner and manual fallback rate"
      missingEvidence: >-
        No independent assessment of HRIS integration quality by partner, percentage of
        employer implementations requiring manual fallback, or time-to-live for new HRIS
