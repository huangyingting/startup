callouts:
  - calloutType: strength
    title: "Peer-Reviewed Clinical Outcomes Validate Differentiation"
    body: >
      Maven Clinic's publication in Health Affairs (2022) of a peer-reviewed 24% preterm birth
      reduction, combined with internal data showing 44% NICU reduction and 52% fewer
      C-sections, creates an evidence-based differentiation that most digital health competitors
      cannot match. Generic telehealth platforms lack published clinical outcome data. This
      evidence base also drives employer contract renewals and expands Maven's pricing power.
    claimRefs:
      - CE015
      - CE016

  - calloutType: strength
    title: "ISO 27001 and HIPAA Compliance Unlock Fortune 500 Procurement"
    body: >
      Maven Clinic's ISO 27001 certification and HIPAA BAA program directly satisfy the
      security and compliance requirements of Fortune 500 employer procurement teams. These
      credentials reduce sales cycle friction for large enterprise accounts and serve as table
      stakes for vendor approval. Without these certifications, Maven could not serve the
      Amazon, Microsoft, and Goldman Sachs tier of employer clients.
    claimRefs:
      - CE017
      - CE018

  - calloutType: risk
    title: "Active Coretek Patent Lawsuit — Unresolved IP Liability"
    body: >
      A patent lawsuit filed by Coretek Licensing in 2022 targeting Maven Clinic's care
      coordination algorithms remains unresolved as of May 2026. Patent assertion entity
      (PAE) litigation can result in licensing fees, injunctions, or settlements that impact
      platform functionality and financials. The financial exposure and ultimate IP outcome
      are unknown without a formal data room review of the litigation file.
    claimRefs:
      - CE022

  - calloutType: risk
    title: "AI Hallucination Risk Represents a Patient Safety Exposure"
    body: >
      Maven Intelligence's AI-generated clinical recommendations carry an inherent hallucination
      risk — the potential for the system to generate incorrect clinical guidance. In a
      reproductive or maternal health context, a false recommendation (e.g., incorrect dosing
      guidance or missed high-risk flag) could cause patient harm. The company has not publicly
      disclosed its AI error rate, clinical oversight protocol, or escalation mechanisms, making
      independent risk assessment impossible without a formal product safety review.
    claimRefs:
      - CE024

