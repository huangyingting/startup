  - id: VP002
    title: "Valuation Context, Financing, and Entry Discipline"
    body: >
      Maven Clinic's last disclosed valuation is $1.7B post-money from its October 2024 Series F
      ($125M raised), implying a 6.3x ARR multiple on estimated $268M ARR. Total capital raised
      is $425M+ through the Series F, creating a meaningful preference stack that will absorb
      returns before common shareholders and later-stage investors receive proceeds in most exit
      scenarios. Entry discipline is important at the current mark: the $1.7B valuation is not
      obviously cheap relative to comparable public digital health companies, and investors
      entering at this level require sustained 30–50% ARR growth over 3–5 years to achieve
      target returns in the base case. In the base case (5–6x ARR on $350M ARR by 2027), the
      exit valuation of $1.75–2.1B implies minimal appreciation from the Series F price. The
      bull case (8–10x ARR on $350–400M ARR) would be required for substantial upside from the
      current mark. A below-mark entry — via secondary shares, a bridge round at lower
      valuation, or an IPO pricing below the last-round mark — would materially improve the
      risk-return profile. Digital health IPO market conditions in 2025–2026 remain challenging;
      Maven would need to demonstrate a credible path to profitability before accessing public
      markets. The dilution and preference overhang from $425M+ in cumulative raises is a
      structural consideration: liquidation preferences from preferred investors (assuming standard
      1x non-participating preference) mean the first $425M+ of any exit proceeds goes to
      preferred holders, limiting common-shareholder and later-entry-investor returns in a
      bear-case exit.
