  - id: VP003
    title: "Bull, Base, and Bear Scenario Analysis"
    body: >
      Three scenarios frame the return potential for Maven Clinic investors. In the bull case,
      Maven achieves an IPO or strategic acquisition in 2026–2027 at an 8–10x ARR multiple
      on $350–400M ARR (approximately 30–50% growth from current estimated base), implying a
      $2.8–4.0B exit valuation. This scenario requires sustained high growth, international
      expansion adding a revenue premium, the DTC category demonstrating attractive unit
      economics, and an IPO market that re-prices Maven above the current private-market
      multiple. It also requires progress toward profitability sufficient to satisfy public
      market investors. In the base case, Maven achieves an IPO or M&A exit in 2027–2028 at
      a 5–6x ARR multiple on approximately $350M ARR, implying a $1.75–2.1B valuation.
      This delivers minimal appreciation from the Series F mark for investors who entered at
      $1.7B but represents a viable outcome. The base case assumes employer growth continues
      at 20–30% annually, burn narrows progressively, and Maven accesses the public market
      during a window of recovering digital health multiples. In the bear case, employer budget
      cuts slow growth below 20% in 2026–2027, Maven exhausts its runway before profitability
      and must raise a bridge round at a flat or down valuation. ARR stalls around $300M,
      and at a 3–4x ARR multiple the implied value is $0.9–1.2B — potentially dilutive to
      Series F investors. A strategic acquisition at 3x ARR would imply approximately $900M,
      well below the Series F price. Probability signals favor the base case given Maven's
      current trajectory, though the base case itself offers limited upside from the current mark.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV017
      - CV018
      - CV039
    tableRefs:
      - TV003
    figureRefs:
      - FV002

  - id: VP004
    title: "Comparable Set Analysis"
    body: >
      Maven Clinic's comparable set spans public companies, late-stage private rounds, and
      precedent M&A transactions, none of which provide a perfect single match for Maven's
      multi-product integrated employer health benefits model. Progyny (PGNY) is the most
      direct public comparable for the fertility benefits sub-segment: it had approximately
      $650M in 2024 revenue but trades at 1–2x revenue on public markets, reflecting investor
      skepticism about profitability in the employer digital health channel. Teladoc Health
      (TDOC) is a broader public telehealth comparable at below 1x revenue — heavily penalized
      for growth deceleration and EBITDA losses. Both public comparables imply significant
      multiple compression risk for Maven at a public exit. Among private rounds, Spring Health
      raised at a $3.3B valuation in 2024, representing approximately 12x ARR; this is above
      Maven's current multiple but reflects a mental health focus with different growth dynamics.
      Carrot Fertility's 2021 peak valuation of approximately $7.1B has likely been marked down
      significantly and is not relevant for current benchmarking. The most directly relevant
      M&A precedents are the Ovia Health acquisition by Labcorp in 2022 (estimated $150–250M,
      implying 3–5x ARR for a sub-scale women's health platform) and Gennev's acquisition by
      Unified Women's Healthcare in 2023. Both M&A transactions were at materially lower
      multiples than Maven's current private valuation, supporting a view that strategic M&A
      would be below-current-mark without a premium for Maven's scale and market position.
      Maven's multi-product breadth and employer relationships arguably justify a premium to
      both the Ovia M&A comp and the Progyny public comp, but the magnitude of that premium
      must be justified by demonstrated profitability progress at exit.
