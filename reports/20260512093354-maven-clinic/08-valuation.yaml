  - id: VP005
    title: "Recommendation and Valuation Stance"
    body: >
      The investment recommendation for Maven Clinic is WATCH/TRACK, reflecting strong
      fundamental evidence of category leadership and revenue scale offset by insufficient
      evidence of a near-term path to profitability, opacity in financial reporting, and
      a current valuation that provides limited margin of safety from the base case exit
      range. Confidence is medium: Maven's growth and market position evidence is
      substantial, but the absence of audited financials, NRR, and employer concentration
      data prevents a high-confidence positive or negative call. Risk rating is HIGH,
      driven by post-Dobbs legal exposure, cash burn, patent litigation, and digital health
      multiple compression risk at exit. The valuation stance is NEUTRAL-TO-CAUTIOUS at
      $1.7B: the price is not obviously wrong for a company growing at 50% with $268M ARR,
      but the comparable evidence suggests limited upside from the current mark in the base
      case and meaningful downside in the bear case. A buy thesis would require: entry at
      or below $1.3–1.5B (e.g., secondary, down-round bridge, or IPO pricing below the
      last private mark), or a demonstrated path to profitability within 18–24 months with
      audited financial confirmation. The WATCH/TRACK stance should be reviewed if Maven
      files for an IPO with a prospectus (providing audited financials and full disclosure),
      if it achieves profitability ahead of expectations, or if it raises a follow-on round
      at a materially higher valuation with strong financial documentation.
    claimRefs:
      - CV032
      - CV033
      - CV034
      - CV036
    figureRefs:
      - FV004

  - id: VP006
    title: "Exit Readiness and Final Diligence Asks"
    body: >
      Maven Clinic's most likely exit path is an IPO, with timing estimated at 2027–2028
      contingent on: (1) demonstrated narrowing of cash burn toward breakeven, (2) sustained
      ARR growth above 25% to support growth-company pricing, (3) resolution or containment
      of post-Dobbs and Coretek legal risks, and (4) an IPO market receptive to digital health
      names. Strategic M&A is the second most probable exit, with potential acquirers including
      UnitedHealthcare, CVS/Aetna, Cigna, Amazon Health (leveraging Amazon's existing Maven
      client relationship), Workday, or ADP. M&A synergies would be strong for a health
      insurer (embedded benefits management, clinical data) or HRIS vendor (seamless benefits
      ecosystem). Secondary market liquidity for common shareholders and employees is limited
      until an IPO or M&A event. The risk of an IPO window closure through 2028 is real if
      digital health multiples do not recover or if Maven underperforms on growth expectations.

      Final diligence asks before a capital commitment at current valuation: (1) audited
      financials for last three fiscal years and most recent quarterly management accounts;
      (2) net revenue retention rate and top-20-client revenue share; (3) litigation dossier
      including Coretek case full pleadings, expert IP counsel opinion, and settlement authority;
      (4) FDA regulatory classification memo for Maven Intelligence; (5) detailed cap table
      with preference stack and liquidation waterfall analysis; (6) DTC unit economics model
      for the GLP-1 launch; (7) Dobbs-era legal opinion by state for care navigation protocols;
      and (8) path-to-profitability model with quarterly milestones.
    claimRefs:
      - CV014
      - CV015
      - CV022
      - CV027
      - CV028
      - CV032
    tableRefs:
