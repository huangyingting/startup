callouts:
  - calloutType: strength
    title: "50% ARR Growth at $268M Scale Commands Sector Premium"
    body: >
      Maven Clinic's estimated ~50% year-over-year ARR growth at a $268M base represents
      exceptional growth-at-scale for a digital health company. This growth rate, combined
      with 2,000+ employer clients and Fortune 100 penetration, justifies a premium over
      the sector median multiple of 3–5x ARR. The question is whether 6.3x fully prices
      in this premium or leaves room for further appreciation.
    claimRefs:
      - CV002
      - CV003
      - CV023

  - calloutType: risk
    title: "Current $1.7B Valuation Implies Minimal Base-Case Upside"
    body: >
      Maven's base case exit valuation of $1.75–2.1B is only marginally above its current
      $1.7B Series F mark. Investors entering at or near the Series F price are effectively
      underwriting the bull case to achieve a meaningful return. Multiple compression risk
      from public comparable Progyny (1–2x revenue) is a real downside scenario.
    claimRefs:
      - CV004
      - CV012
      - CV031
      - CV034

  - calloutType: risk
    title: "No Audited Financials — High Confidence Recommendation Not Possible"
    body: >
      All Maven financial figures (ARR, growth rate, burn, runway) are third-party
      estimates or company-stated press release data, not audited financials. This
      creates meaningful uncertainty in both the thesis and the valuation model.
      A high-confidence investment recommendation — positive or negative — requires
      access to audited financials and a formal data room.
    claimRefs:
      - CV016
      - CV036

  - calloutType: strength
    title: "Strategic M&A by Health Insurer Could Unlock Premium Exit"
    body: >
      A strategic acquisition by UnitedHealthcare, CVS/Aetna, Cigna, or Amazon Health
      could unlock a valuation premium above the financial-buyer base case, particularly
      if the acquirer values Maven's employer relationships, clinical data, and AI platform
      as strategic assets rather than solely on ARR multiple. The Amazon-Maven existing
      client relationship represents a natural M&A conversation thread.
    claimRefs:
      - CV015
      - CV025

