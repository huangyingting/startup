company:
  name: Back Market
chapter:
  number: 4
  title: Financials
  summary: >
    Back Market generated an estimated $415M (≈€380M) in revenue in 2024 on ~$2.8B GMV, with 2025 GMV confirmed at $3.5B+
    (+32% YoY) via official press release. The company transitioned from loss-making through 2022–2023 to European EBITDA
    profitability in late 2024 (35% EBITDA margin in Europe) and global EBITDA break-even in 2025. CEO Thibaud Hénin de
    Lassée stated the company is self-sustaining with no further fundraising required. Revenue is derived ~68% from seller
    commissions, ~14% consumer service fees, and ~18% add-on services; the $14.8% take rate is best-in-class among
    refurbished goods marketplaces. With $1.02B total raised at a $5.7B last valuation (Jan 2022), the principal financial
    risk is that the 2022 peak valuation now looks stretched at ~13.7x 2024 revenue relative to peers.
