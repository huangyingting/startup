      imports in India
    relatedQuestionRefs:
      - QO029
    relatedTableRefs:
      - TO004
  - type: private-evidence-only
    severity: minor
    topic: cap-table
    missingEvidence: >-
      Investor ownership percentages and cap table structure post-Series E; no secondary transactions or employee
      liquidity programs have been publicly disclosed
    whyItMatters: >-
      Cap table structure affects dilution, liquidation preferences, and the economics of any exit; founders' economic
      stake is unknown
    diligencePath: >-
      Request capitalization table from Back Market in due diligence; review any published French statutory filings for
      shareholder information
    relatedQuestionRefs:
      - QO005
      - QO007
    relatedTableRefs:
      - TO003
  - type: missing-source
    severity: material
    topic: clean-sam-som-isolation
    missingEvidence: >-
      No reviewed public source isolates a clean SAM or SOM for Back Market's exact curated marketplace model—
      separating it from OEM CPO channels, P2P platforms, and broader second-hand categories—in the same geography and
      time frame. Back Market GMV ($3.5B in 2025) is a useful proxy but is gross merchandise value, not the company's
      net revenue or a formal market-share figure.
    whyItMatters: >-
      Without a boundary-matched market definition, TAM/SAM estimates from analyst sources overstate the relevant
      opportunity by mixing categories that do not compete with Back Market's model. Valuation models using headline TAM
      without SAM/SOM isolation risk embedding 2–3x market size inflation.
    diligencePath: >-
      Request Back Market management's internal market-sizing deck with separate lenses for: (1) curated multi-brand
      refurbished marketplace GMV globally, (2) by geography, and (3) Back Market's estimated share within each.
    relatedQuestionRefs:
      - QM010
  - type: private-evidence-only
    severity: material
    topic: private-financial-metrics
    missingEvidence: >-
      Back Market's net revenue (take rate applied to GMV), gross margin, customer acquisition cost, repeat purchase
      rate, and seller count are not publicly disclosed. All publicly available figures are GMV (gross) and GMV growth
      rate. Unit economics, payback period, and profitability path cannot be underwritten from public data alone.
    whyItMatters: >-
      GMV growth of 32% is an encouraging demand signal but cannot be used directly for valuation modeling without the
      revenue conversion rate. The company's competitive economics relative to Refurbed are equally opaque.
    diligencePath: >-
      Request detailed management financials covering: net revenue, take rate by category, gross margin, seller
      economics, CAC/LTV, monthly GMV run rate split by geography, and EBITDA bridge for 2023–2025.
    relatedQuestionRefs:
      - QM024
  - type: conflicting-data
    severity: minor
    topic: market-sizing-methodology
    missingEvidence: >-
      The $64.8B–$127B range for the 2024 global refurbished electronics market reflects four independent analyst
      reports using different category boundaries (consumer portable only vs all second-hand electronics including
      appliances and P2P). No reviewed source provides a harmonized definition that allows direct comparison.
    whyItMatters: >-
      Analysts, investors, and management may cite different numbers from this range as "the market size" without
      disclosing their boundary assumptions, creating apparent but false conflicts. The chapter preserves the range
      explicitly to prevent this.
    diligencePath: >-
      Normalize analyst estimates to one market definition (curated consumer refurbished electronics, consumer portable
      devices only) and one forecast horizon before using in a valuation model. Flag any external estimate that uses the
