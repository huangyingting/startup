        - Legal compliance programme; Taylor Wessing analysis; seller onboarding requirements updated
        - high — seller-level compliance across 2,700 sellers is operationally complex and unverified
      - - EU Right to Repair Directive 2024/1799
        - EU
        - Entered force July 31 2024; transposition deadline July 31 2026
        - Compliance overhead for repair platform operator; spare-parts access standards for repair partners
        - Repair platform launched Sept 2025; tracks directive as competitive opportunity; legal counsel monitoring transposition
