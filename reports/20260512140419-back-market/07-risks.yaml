company:
  name: Back Market
chapter:
  number: 7
  title: Risks
  summary: >-
    Back Market's highest residual risks are regulatory compliance burden from GPSR and the EU Right to Repair Directive,
    competitive pressure from Refurbed's 2026 Germany overtake and platform giants, and a valuation overhang from a
    $5.7 billion Series E that is materially above current venture-market comparables. Quality and consumer trust risks
    are real but well-mitigated; financial self-sufficiency post-2022 restructuring provides meaningful runway, though
    no new external funding in over three years and smartphone revenue concentration create secondary exposure. Governance
    transparency is thin and key-person dependency on CEO Thibaud Hug de Larauze remains a diligence gap.
sections:
  - id: section-1
    title: Risk overview and severity framework
    body: >-
      Back Market's risk profile at mid-2026 spans five primary buckets: regulatory compliance, competitive market
      structure, financial and valuation, quality and consumer trust, and management and governance. The highest-severity
      and most time-sensitive risks are regulatory: GPSR entered application in December 2024 and the EU Right to Repair
      Directive entered force in July 2024 with a member-state transposition deadline of July 2026. Both regulations
      impose new obligations on Back Market as a marketplace operator of refurbished consumer electronics, and the
      company's compliance posture with GPSR's EU Safety Gate registration and product-liability framework is not fully
      disclosed in public materials. The second severity tier comprises competitive threats: Refurbed overtook Back Market
      in Germany growth metrics in 2026, and Amazon Renewed and eBay Refurbished bring ecosystem trust and distribution
      advantages that Back Market cannot replicate. Valuation overhang is a latent third-tier risk: the $5.7 billion
      Series E was priced in January 2022 at peak multiples, and current venture fair value is almost certainly below
      that watermark. The risk heatmap (FR001) plots all major risks by residual severity; the transmission map (FR002)
      shows how individual risk events cascade into revenue, margin, financing, and valuation.
    claimRefs:
      - CR011
      - CR013
      - CR001
      - CR017
      - CR021
      - CR039
    tableRefs:
      - TR001
    figureRefs:
      - FR001
      - FR002
      - FR004
  - id: section-2
    title: Regulatory and legal risks
    body: >-
      The EU General Product Safety Regulation (GPSR), which entered application in December 2024, represents the most
      immediate compliance risk. GPSR explicitly covers refurbished goods sold through marketplace platforms, imposing
      obligations on Back Market as the marketplace operator rather than just on individual sellers. Requirements include
      registration on the EU Safety Gate portal, maintaining an internal safety team, cooperating with market
      surveillance authorities, and implementing product withdrawal and recall procedures. Taylor Wessing's 2025 analysis
      identifies marketplace operators in the refurbished electronics space as a primary compliance target under GPSR.
      Back Market operates across 18 countries with approximately 2,700 sellers; verifying all sellers meet GPSR
      requirements is operationally complex and non-compliance by a single seller can trigger marketplace-level liability.

      The EU Right to Repair Directive 2024/1799 entered force on July 31, 2024, with member-state transposition
      required by July 31, 2026. The directive mandates that manufacturers make spare parts and tools available to
      independent repairers for five to ten years, and prohibits restricting independent repairers from accessing parts.
      This is broadly favourable for Back Market's repair platform (launched September 2025 in France, Germany, and
      Spain) but also adds compliance overhead as the repair platform operator must navigate the new framework. Clyde
      and Co and Fieldfisher legal analyses confirm the compliance timeline and scope. US right-to-repair laws enacted
      in New York, Oregon, Colorado, and Maine create a fragmented compliance landscape for Back Market's US operations.
      GDPR exposure is material given 17 million-plus customer records; any data breach would trigger regulatory and
      reputational consequences. The EU Digital Services Act imposes additional trust and safety obligations on
      marketplace operators. Cross-border VAT compliance across 18 countries adds further regulatory overhead that
      scales with GMV growth.
