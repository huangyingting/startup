callouts:
  - calloutType: risk
    title: GPSR compliance requires immediate seller-level verification
    body: >-
      GPSR has been in application since December 2024 and imposes marketplace-operator liability on Back Market.
      With 2,700 sellers, verifying that each meets EU Safety Gate registration, product-recall, and safety-team
      requirements is operationally complex. Taylor Wessing identifies refurbished electronics platforms as a
      primary GPSR enforcement target.
    claimRefs:
      - CR013
      - CR014
      - CR003
      - CR049
  - calloutType: risk
    title: Germany competitive reversal is a leading indicator for other markets
    body: >-
      Refurbed's documented overtake of Back Market in Germany in 2026 is a thesis-break signal for the competitive
      moat assumption. If Refurbed's capital-efficient model can replicate this in France and the UK, Back Market's
      take-rate and GMV growth assumptions require revision. The company's counter-moves—Premium tier, repair platform,
      carrier partnerships—are credible but not yet proven at scale.
    claimRefs:
      - CR001
      - CR002
      - CR031
      - CR050
  - calloutType: risk
    title: Valuation overhang is latent but structurally real
    body: >-
      The $5.7 billion Series E priced in January 2022 is almost certainly above current venture fair value given
      venture multiple compression since 2022. Back Market has not disclosed a new financing round or facility.
      Employee equity is likely underwater, creating talent retention risk. The CEO's stated self-sufficiency is
      credible given positive EBITDA, but a competitive pricing response or demand shock could change the calculus.
    claimRefs:
      - CR017
      - CR018
      - CR032
      - CR039
