  - id: section-5
    title: Quality, supply chain, governance, and ESG risks
    body: >-
      Quality and consumer trust risks are real but relatively well-mitigated compared to the regulatory and competitive
      stack. Back Market's devices carry an approximately 4 percent failure rate versus 3 percent for new devices—not
      dramatically different but enough to generate customer complaints in condition mismatch, battery degradation, and
      slow shipping categories. RatingFacts and AliDrop analyses document recurring complaint themes. The 2,700-seller
      marketplace creates inherent quality variance; Back Market's 25-point inspection standard, Piceasoft testing
      integration, seller quality scoring, and 1-year warranty provide meaningful mitigation, but a high-profile
      failure or fraud event on the platform could disproportionately damage brand trust given the company's size and
      media visibility.

      Supply chain risks are driven by concentration in Apple iPhone supply. Apple's trade-in expansion and self-service
      repair programs could reduce the volume of devices available to third-party refurbishers. US tariffs on Chinese
      electronic components could raise input costs for Back Market's seller network. Geopolitical tensions add a tail
      risk to the repair-component supply chain that affects all 18 markets.

      Governance transparency is thin: no independent board composition is publicly available, and Back Market's
      founder-controlled structure gives no external check on strategy. Key-person dependency on CEO Thibaud Hug de
      Larauze is the primary governance risk; the presence of co-founders as CTO and CCO provides some mitigation.
      The 2022 layoffs left cultural and morale overhang; India expansion paused at the same time and has not
      resumed, indicating difficulty entering complex markets. ESG risks include the 1.6 billion kg CO2 avoidance claim
      which uses company-calculated methodology without independent audit—a greenwashing risk that B-Corp certification
      status amplifies.
