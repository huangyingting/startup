  - id: section-4
    title: Financial and valuation risks
    body: >-
      Back Market's financial risk profile is bifurcated: the operating trajectory is improving—positive European
      profitability and global EBITDA achieved by 2025, CEO stated no new external funding is needed—but the capital
      structure carries a significant valuation overhang. The $5.7 billion Series E of January 2022 was priced at peak
      market conditions that have not recovered. Sacra and CB Insights analysis places current revenue at materially
      below the scale implied by that valuation multiple, and the venture market's multiple compression since 2022 means
      the company is effectively under water on paper. If Back Market required new growth capital or an employee
      liquidity event, the terms available today would be punitive relative to the Series E price.

      Revenue concentration is a second material financial risk. Smartphones—primarily iPhones—represent an estimated
      60 to 70 percent of GMV. Any Apple policy change affecting device locking, trade-in lock-in, or FMiP
      (Find My iPhone) compatibility could disrupt supply or demand in Back Market's highest-value category. Currency
      exposure across EUR/USD/GBP/JPY is non-trivial for a company consolidating revenue from 18 countries; USD
      strengthening reduces reported revenue when translated. Working capital management involves holding seller payments
      for approximately 14 days, creating accounts payable/receivable dynamics that scale with GMV but introduce
      counterparty risk. The 3.5-year gap without new external funding is manageable if profitability sustains, but
      leaves limited margin for a demand shock or competitive pricing response that compresses take rate. The financial
      risk table (TR003) maps each risk to its transmission mechanism and hedge options.
