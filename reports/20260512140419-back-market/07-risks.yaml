        - medium — obligations scale with platform size; compliance cost material at 17M+ users
      - - EU General Data Protection Regulation (GDPR)
        - EU and EEA
        - In force; ongoing compliance obligation
        - 17M+ customer records; breach notification obligations; data transfer and retention rules
