  evidenceGaps:
    - type: missing-source
      severity: material
      topic: gpsr-compliance
      missingEvidence: >-
        Confirmation of Back Market's EU Safety Gate registration status and internal GPSR compliance programme
        documentation as of December 2024 onwards.
      whyItMatters: >-
        If Back Market has not completed EU Safety Gate registration or established a GPSR-compliant safety team,
        the company faces enforcement risk and potential suspension of sales in EU markets. This is the highest-
        severity open compliance question.
      diligencePath: >-
        Request from Back Market's legal team confirmation of EU Safety Gate registration number; review GPSR
        compliance programme documentation; check national market surveillance authority databases.
      relatedQuestionRefs:
        - QR001
        - QR005
      relatedTableRefs:
        - TR002
    - type: missing-source
      severity: material
      topic: gdpr-risk
      missingEvidence: >-
        Confirmation of Back Market's Data Protection Officer appointment, current data processing agreements with
        all processor partners, and most recent GDPR Article 30 records of processing activities.
      whyItMatters: >-
        GDPR non-compliance with DPO appointment, processor contracts, or records of processing activities
        creates enforcement exposure given 17M+ customer records in the EU.
      diligencePath: >-
        Request DPO appointment document, sample data processing agreements with major seller-service providers,
        and a summary of Article 30 records from Back Market's legal counsel.
      relatedQuestionRefs:
        - QR006
      relatedTableRefs:
        - TR002
    - type: private-evidence-only
      severity: material
      topic: governance-opacity
      missingEvidence: >-
        Independent board composition, director appointment mechanism, founder share class structure, and any
        executed shareholder agreement provisions that restrict future governance changes.
      whyItMatters: >-
        Without board composition information, it is impossible to assess whether Back Market has independent
        oversight of management, appropriate audit and compensation governance, or dilution protection mechanisms.
      diligencePath: >-
        Request cap table and board structure from management; review articles of association; request shareholder
        agreement summary from company legal counsel.
      relatedQuestionRefs:
        - QR033
    - type: missing-source
      severity: material
      topic: greenwashing-risk
      missingEvidence: >-
        Independent third-party audit or verification of Back Market's CO2 avoidance methodology and the
        1.6 billion kg CO2 equivalent calculation.
      whyItMatters: >-
        If the CO2 avoidance methodology does not survive independent scrutiny, Back Market's B-Corp positioning
        and ESG narrative face reputational and potentially regulatory (EU Green Claims Directive) challenge.
      diligencePath: >-
        Request lifecycle assessment (LCA) methodology documentation; check whether B-Corp re-certification
        assessed CO2 claims; consult independent LCA specialist.
      relatedQuestionRefs:
        - QR034
    - type: missing-source
      severity: minor
      topic: funding-gap
      missingEvidence: >-
        Any disclosed credit facility, revolving credit agreement, or working capital facility that Back Market
        may have arranged since the January 2022 Series E.
      whyItMatters: >-
        A disclosed credit facility would provide financial flexibility evidence and reduce the concern about the
        3.5-year gap in external equity fundraising.
      diligencePath: >-
        Request management confirmation of any outstanding credit facilities or uncommitted lines from CFO;
        review Companies House filings for UK subsidiary charges.
      relatedQuestionRefs:
        - QR008
