  - id: TV006
    title: Final diligence asks table
    columns:
      - topic
      - missing evidence
      - why it matters
      - diligence path
    rows:
      - - Audited EBITDA margins by region
        - Back Market has announced global break-even but has not disclosed per-region EBITDA margins or gross
          margin percentages
        - The base case requires 6-8% global EBITDA by 2026; without regional margin data, the path is
          unverifiable
        - Request audited management accounts or CFO-prepared investor pack with segment EBITDA
      - - 2022 cap-table preference terms
        - Liquidation preferences, ratchets, anti-dilution rights, and participation terms for the $510M
          Series E round have never been publicly disclosed
        - New-money investors need to understand preference overhang before pricing secondary or late-stage
          primary shares
        - Request capitalization table summary and legal review of Series E preference terms
      - - Refurbed German GMV displacement data
        - Refurbito.com reports Refurbed overtook Back Market in Germany in 2026, but Back Market has not
          provided a response or disclosed Germany-specific GMV
        - Germany is Back Market's largest single European market; losing leadership there reduces the
          European moat premium
        - Request Back Market's Germany GMV trend for 2024-2025 from management or independent channel data
      - - Repair platform revenue run rate
        - The repair platform launched in France, Germany, and Spain in September 2025, but no revenue
          contribution or attach-rate data has been disclosed
        - Repair is a potential 1-2% incremental take-rate opportunity; without run-rate data, the bull case
          is unsubstantiated
        - Request pilot GMV, booking count, and margin contribution from the repair platform
      - - US market GMV share and growth rate
        - The US is described as the second-largest market but currently represents approximately 20% of
          customers; no US-specific GMV has been disclosed
        - US acceleration is the primary lever for the bull case; unverified US unit economics cannot support
          a 15x multiple
        - Request US GMV, take rate, and customer cohort retention from management
      - - Secondary market transaction terms and current cap table
        - No recent secondary transaction has been publicly documented with price, quantity, and buyer since
          2023 Sacra estimate
        - Institutional secondary trades signal where informed buyers actually price the equity today
        - Access cap table management system (Carta or equivalent) or request last three secondary trade
          disclosures from the company
    notes: >-
      These are investment-critical asks; each could directly move the recommendation or the acceptable entry
      price. They are ranked by decision impact, not by difficulty of access.
