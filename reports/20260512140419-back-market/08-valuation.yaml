  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: cap-table
      missingEvidence: >-
        Specific preference terms, liquidation rights, anti-dilution clauses, and any ratchet provisions
        from the 2022 Series E round have never been publicly filed or disclosed.
      whyItMatters: >-
        The effective return profile for new secondary investors depends critically on preference overhang;
        without this data, the headline valuation is economically incomplete for investment purposes.
      diligencePath: >-
        Request capitalization table summary and Series E legal documents from Back Market management or
        lead investor Sprints Capital legal counsel.
      relatedQuestionRefs:
        - QV030
    - type: private-evidence-only
      severity: material
      topic: profitability
      missingEvidence: >-
        Back Market has confirmed global EBITDA break-even but has not disclosed EBITDA margins by geography
        (Europe, US, other) or gross margin percentages for 2024 or 2025.
      whyItMatters: >-
        The base case and bull case both require 6-8 percent EBITDA margins within two years of break-even;
        without regional margin data the path to the $6.0B base valuation is not independently verifiable.
      diligencePath: >-
        Request audited management accounts or a CFO-prepared investor pack with segment EBITDA data from
        Back Market's finance team.
      relatedQuestionRefs:
        - QV029
    - type: enumeration-incomplete
      severity: material
      topic: comparables
      missingEvidence: >-
        The comparable valuation table covers the most accessible peers; several recommerce and M&A
        transaction comparables — including Vestiaire Collective, The RealReal, and Rebag — lack sufficient
        public financial data for inclusion.
      whyItMatters: >-
        A richer comparable set would allow tighter multiple bounds; incomplete comparables may bias the
        base-case range toward the Vinted ceiling and miss relevant transaction-multiple evidence.
      diligencePath: >-
        Obtain Vestiaire Collective and The RealReal investor disclosures or sell-side research to complete
        the comparable set; use announced M&A transactions in secondhand and recommerce categories as
        transaction comps.
      relatedTableRefs:
        - TV004
