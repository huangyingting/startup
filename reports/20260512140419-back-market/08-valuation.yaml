  - id: TV005
    title: Thesis-break and kill-criteria table
    columns:
      - trigger
      - evidence threshold
      - transmission to thesis
      - action implication
    rows:
      - - Refurbed reaches 30%+ German market share at Back Market's expense
        - Public GMV data or Refurbed fundraising announcement citing German leadership for 2026
        - Undermines moat premium; reduces addressable European GMV; forces multiple contraction to 8-9x
        - Downgrade recommendation; reduce target entry price to $4.0-4.5B
      - - EBITDA margins remain below 4% two years after break-even
        - 2026 or 2027 financial results or investor communications showing sub-4% global EBITDA
        - Base case requires 6-8% margins by 2026; failure to improve means profitability is fragile
        - Reassess whether scale economics are structural; defer buy unless price resets below $4.5B
      - - IPO or exit deferred beyond 2028 with no secondary liquidity event
        - No IPO filing, no continuation fund, no M&A announcement by end of 2028
        - Fund lifecycle pressure forces distressed secondary sales; implied valuation drops toward bear case
        - Require secondary pricing at 7-8x revenue or seek direct liquidity from existing holders
      - - GPSR compliance failure leads to material seller attrition
        - Regulatory enforcement action against Back Market or a measurable drop in certified seller count in
          the EU
        - Higher cost per certified unit compresses take rate; GMV growth decelerates below 15%
        - Pause investment work until compliance posture is clarified and seller attrition is measured
    notes: >-
      These are kill-criteria triggers, not generic risks. Each event directly impairs a specific assumption
      needed to defend the base-case $6.0B valuation. Monitoring each trigger requires a confirmed data event,
      not a rumor or analyst estimate.
