  - id: section-3
    title: >-
      Scenario analysis: revenue-multiple and GMV frameworks across bear, base, and bull cases
    body: >-
      Three revenue-multiple scenarios bracket the plausible enterprise value range. All scenarios anchor on $500
      million estimated 2025 revenue and assume Back Market maintains its ~14.8 percent take rate as GMV scales.


      The bear case (8x, $4.0 billion) models meaningful multiple compression driven by Refurbed gaining market share
      in Germany and Austria, EU General Product Safety Regulation certification costs squeezing gross margins below
      65 percent, and a delayed IPO window forcing investors to accept secondary liquidity at a discount. At 8x
      revenue the company would need to demonstrate only modest improvement over current operations to justify the
      mark, but the risk is that further competitive and regulatory headwinds prevent even that.


      The base case (12x, $6.0 billion) assumes Back Market sustains 25-30 percent annual GMV growth through 2026,
      reaches 8-10 percent EBITDA margins within two years of break-even, successfully monetizes the repair platform
      at 1-2 percent incremental take rate, and pursues an IPO or late-secondary round in 2026-2028. At 12x trailing
      revenue this is consistent with Vinted's January 2025 valuation of €8.2 billion at approximately 13.7x.


      The bull case (15x, $7.5 billion) requires US market acceleration toward 30 percent of GMV, repair-platform
      revenues contributing at scale, and public market multiples recovering to the 14-17x range that high-growth
      profitable marketplaces commanded in 2021. A DCF analysis using 25 percent sustained growth, 20 percent discount
      rate, and 3 percent terminal growth yields a similar $5-6 billion range, confirming the revenue-multiple
      framework is not an outlier.
