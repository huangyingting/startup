  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - argument
      - direction
      - what would change the view
    rows:
      - - Back Market delivered global EBITDA break-even in 2025 on $3.5B GMV — demonstrating the marketplace unit
          economics work at scale.
        - thesis
        - A reversal or further delay in margin expansion beyond break-even would materially weaken the premium case.
      - - The EU Right to Repair Directive creates a structural regulatory tailwind through 2027 that expands the
          addressable refurbishment market every year.
        - thesis
        - If implementation is delayed or watered down, the regulatory premium in the valuation model would shrink.
      - - Vinted's 13.7x revenue multiple at €8.2B in January 2025 confirms public market appetite for profitable
          European recommerce at Back Market's revenue scale.
        - thesis
        - If Vinted's IPO prices below 10x or macro conditions depress marketplace multiples, the peer ceiling drops.
      - - The 2022 Series E was priced at 28-32x revenue during peak-market conditions; current implied multiple of
          10-13x represents significant compression from the anchor that anchors existing investors' expectations.
        - anti-thesis
        - Filing audited EBITDA margins above 8% would justify moving toward the upper bound of the 10-13x range.
      - - Refurbed crossed €3B GMV in 2026 and claims to have overtaken Back Market in Germany, threatening the
          European moat that underpins the premium valuation.
        - anti-thesis
        - >-
          Public disclosure of Back Market's German GMV trajectory, or an observable Refurbed plateau, would resolve
          this risk.
    notes: >-
      Arguments are price-sensitive: they describe what the current valuation assumes, not just what is true about
      the product quality. The anti-thesis rows are the key diligence gates for any new investment.
