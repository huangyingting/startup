  - id: section-2
    title: >-
      Valuation context: $5.7 billion Series E anchor, CEO's €5.1 billion estimate, and secondary-market compression
    body: >-
      Back Market has raised approximately $912 million in total equity to date. The most recent formal round was a
      $510 million Series E in January 2022 at a $5.7 billion post-money valuation led by Sprints Capital, with
      participation from General Atlantic and Goldman Sachs among others. At that time the company's trailing revenue
      was approximately €180 million, implying a 28-32x revenue multiple — consistent with peak venture-growth
      multiples for high-conviction consumer marketplaces. No new primary equity has been raised in more than three
      years; the CEO has publicly stated the company is self-sustaining without new external capital.


      Translating that mark to the 2025 operating reality produces a materially lower effective multiple. On 2024
      revenue of approximately $415 million, the $5.7 billion mark implies 13.7x. On the CEO's self-reported €5.1
      billion enterprise value and estimated 2025 revenue of $480-520 million, the implied multiple falls to
      approximately 10.2-11.6x. That range — 10x to 14x trailing revenue — is reasonable for a profitable, high-growth
      recommerce marketplace, but it is not cheap given remaining competitive and regulatory uncertainty.


      The secondary market adds a complicating data point. Sacra's analysis of 2023 secondary trades placed the implied
      valuation at $3-4 billion, representing a 30-40 percent discount to the formal Series E mark. This gap reflects
      institutional impatience with the long hold period rather than a fundamental rejection of the business, but it
      signals that new-money investors entering via secondary should expect to negotiate closer to $4-5 billion rather
      than the 2022 headline. The cap table preference stack from the 2022 round has never been publicly disclosed,
      creating additional uncertainty around liquidation priorities for secondary purchasers.
