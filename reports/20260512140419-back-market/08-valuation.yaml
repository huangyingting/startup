callouts:
  - calloutType: recommendation
    title: 'Current call: track with conviction'
    body: >-
      Back Market earned its first EBITDA break-even milestone and commands a defensible marketplace premium.
      New money should target $4.5-5.5B entry with clear IPO or M&A timing as the trigger to upgrade.
    claimRefs:
      - CV001
      - CV009
      - CV022
  - calloutType: strength
    title: 'Profitability + Right-to-Repair = structural tailwind'
    body: >-
      Reaching EBITDA break-even at $3.5B GMV while simultaneously benefiting from EU repairability mandates
      creates a durable, regulation-reinforced growth curve through 2027.
    claimRefs:
      - CV009
      - CV028
      - CV044
  - calloutType: risk
    title: 'Refurbed German competition is the thesis-break risk'
    body: >-
      If Refurbed's 2026 claim of overtaking Back Market in Germany holds, the European moat premium that
      supports a 12x+ multiple is directly impaired and the valuation reverts toward the bear case.
    claimRefs:
      - CV021
      - CV030
      - CV032
  - calloutType: assumption
    title: 'Base case assumes auditable post-break-even margin improvement'
    body: >-
      The $6.0B base case only holds if EBITDA margins expand from break-even to 6-8% within two years.
      Without confirmable margin data, the call cannot be upgraded beyond track.
    claimRefs:
      - CV009
      - CV012
      - CV013
