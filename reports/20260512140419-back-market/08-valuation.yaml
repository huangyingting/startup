    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The track recommendation flows from confirmed GMV momentum and profitability meeting an unresolved
      valuation anchor and competitive risk, with cap-table opacity as the swing factor.
    data:
      nodes:
        - id: gmv
          label: '$3.5B 2025 GMV (+32%)'
          detail: >-
            Official GMV confirmed in January 2026 press release; represents fastest recommerce growth in the
            sector.
          tone: positive
        - id: profit
          label: '2025 EBITDA Break-even'
          detail: >-
            First global EBITDA-positive year confirmed by CEO; operating leverage from scale starting to flow
            through.
          tone: positive
        - id: regulation
          label: 'EU Right-to-Repair Tailwind'
          detail: >-
            EU Directive 2024/1782 mandates repairability across CE categories through 2027; directly expands
            TAM for refurbishment.
          tone: positive
        - id: price
          label: '$5.1-5.7B Valuation Range'
          detail: >-
            CEO cites €5.1B; Series E anchor $5.7B; secondary at $3-4B in 2023. Range of $2.7B creates
            price discipline imperative.
          tone: warning
        - id: competition
          label: 'Refurbed DE Competition Risk'
          detail: >-
            Refurbed crossed €3B GMV and claims German market leadership in 2026; no Back Market rebuttal
            data available.
          tone: warning
        - id: disclosure
          label: 'No Filed Financials'
          detail: >-
            Back Market is a French SAS with no public filings; EBITDA margins, preference stack, and
            cap table are opaque.
          tone: warning
        - id: output
          label: 'Track Recommendation'
          detail: >-
            Stay engaged. Define $4.5-5.5B entry price discipline. Upgrade to buy only on audited margins
            and confirmed exit path.
          tone: neutral
