  topStrengths:
    - >-
      Undisputed global market leader in refurbished electronics with $3.5B GMV, 17M+ customers, and operations in 18
      countries — the largest scale moat in its category.
    - >-
      First global EBITDA profitability in 2025 demonstrates a sustainable marketplace model with 70–75% gross margins
      and improving operating leverage.
    - >-
      Strong macro tailwinds: EU Right to Repair Directive, rising consumer cost-consciousness, and enterprise
      sustainability mandates structurally expand the total addressable market.
    - >-
      B-Corp certification and TIME100 Most Influential Companies 2026 recognition provide differentiated brand
      positioning that large tech incumbents cannot easily replicate.
    - >-
      Diversified revenue streams (commissions, insurance, financing, trade-in) and 56% repeat purchase rate support
      durable unit economics.
  topRisks:
    - >-
      Significant valuation reset risk: the 2022 Series E was priced at 28–32x trailing revenue at peak multiples;
      secondary market implies 40–50% compression to $3–4B, creating potential cap-table tension ahead of IPO.
    - >-
      Competitive erosion in Germany from Refurbed, which outgrew Back Market with 38.6% YoY growth in 2026, signals
      that no market is permanently defensible.
    - >-
      Amazon Renewed and eBay Refurbished leverage trillion-dollar ecosystem advantages that could commoditize Back
      Market's marketplace if consumer trust in those channels grows.
    - >-
      Platform concentration risk: take rate (~14.8%) is vulnerable to seller price pressure as the refurbisher base
      consolidates and gains negotiating leverage.
    - >-
      IPO execution risk: no filed prospectus, unclear cap-table preference terms, and unresolved multiple compression
      make the 2026–2028 IPO window uncertain.
  unresolvedGaps:
    - Series E cap-table details — preference stack, ratchets, liquidation terms
    - Audited revenue and EBITDA figures; gross margin by product line
    - Per-market GMV concentration (France vs. US vs. Germany breakout)
    - Cohort retention curves and net revenue retention by acquisition year
    - Seller quality distribution and refurbisher churn rate
