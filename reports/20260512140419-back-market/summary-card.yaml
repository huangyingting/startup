summary:
  headline: >
    Research-more: Back Market is the undisputed global leader in refurbished electronics with proven unit economics and
    first profitability, but its 2022 peak valuation ($5.7B) has compressed meaningfully; secondary signals and multiple
    compression suggest a fair-value range of $4.5–6.5B, warranting deeper diligence on cap-table structure, competitive
    erosion in Germany, and IPO timing risk.
