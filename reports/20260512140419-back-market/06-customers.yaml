  evidenceGaps:
    - type: missing-data
      severity: material
      topic: per-market GMV split and geographic revenue concentration
      missingEvidence: >-
        No public breakdown of Back Market's GMV or revenue by individual geography exists. Estimates are
        derived from customer-count geographic proxies and third-party analysis, not confirmed per-market figures.
      whyItMatters: >-
        Geographic concentration affects risk assessment: if France or the US contributes disproportionately
        more than 30% of GMV, the stated diversification thesis is weaker than the customer-count data implies.
      diligencePath: Request per-market GMV contribution, AOV, and repeat rate segmented by France, US, Germany, UK, and rest-of-world.
      relatedQuestionRefs:
        - QU010
      relatedTableRefs:
        - TU006
    - type: missing-data
      severity: material
      topic: cohort retention and NRR
      missingEvidence: >-
        No public NRR, GRR, annual churn rate, or cohort-level retention curve exists for Back Market. The 56%
        repeat purchase rate is an aggregate figure that does not show time-bucketed decay or vintage-level trends.
      whyItMatters: >-
        Without cohort retention data it is not possible to determine whether Back Market's repeat purchase signal
        is improving, stable, or deteriorating, or whether earlier acquisition cohorts are churning at higher rates
        than recently acquired buyers.
      diligencePath: >-
        Request monthly or quarterly repeat-purchase retention by acquisition year-cohort, per-market retention,
        B2B logo churn and GRR, and NRR across both B2C and B2B segments.
      relatedQuestionRefs:
        - QU022
      relatedTableRefs:
        - TU004
    - type: incomplete-research
      severity: material
      topic: seller QC consistency and audit trail
      missingEvidence: >-
        Back Market requires all sellers to apply a 25+ point testing standard, but no independent audit of
        seller compliance across all 2,700 refurbishers has been publicly confirmed or published.
      whyItMatters: >-
        If the testing standard is applied inconsistently by long-tail sellers, the customer experience guarantee
        is weaker than the marketing implies, creating latent refund and reputation liability.
      diligencePath: >-
        Request seller compliance audit results, rate of seller suspension or performance improvement plans,
        defect rate by seller tier, and the remediation process for underperforming refurbishers.
      relatedQuestionRefs:
        - QU015
      relatedTableRefs:
        - TU003
    - type: missing-data
      severity: minor
      topic: structural quality failure rate and systematic churn risk
      missingEvidence: >-
        No public aggregate data exists on the rate of warranty claims, device returns, or escalations that
        result from systematic rather than one-off seller failures.
      whyItMatters: >-
        Occasional seller failures are expected on a large marketplace. Systematic failures in a seller tier
        or device category could trigger reputational deterioration faster than the review signal captures.
      diligencePath: >-
        Request warranty claim rate, return rate, and escalation rate by device category, condition grade,
        seller tier, and geography.
      relatedQuestionRefs:
        - QU018
    - type: incomplete-research
      severity: material
      topic: SEO channel concentration and paid channel fallback
      missingEvidence: >-
        The split between organic search, paid acquisition, carrier channel, referral, and direct is not
        publicly disclosed, making it impossible to assess how heavily Back Market's acquisition cost structure
        depends on Google search ranking.
      whyItMatters: >-
        If organic search contributes more than 60–70% of new customer acquisition, a material algorithm update
        or competitive bid increase from well-funded entrants could rapidly increase CAC without a proven fallback channel.
      diligencePath: >-
        Request channel-level CAC, acquisition volume by channel, year-over-year trend, and management's
        contingency plan for a material reduction in organic search traffic.
      relatedQuestionRefs:
        - QU019
