callouts:
  - calloutType: strength
    title: Structural repeat purchase behavior is rare in the refurbished category
    body: >-
      A 56% repeat purchase rate is unusually strong for a marketplace business in a durable-goods category.
      Combined with 84 million cumulative devices sold across 17 million registered buyers — implying roughly
      5 lifetime purchases per customer — the data suggests Back Market has built genuine platform loyalty
      rather than one-time deal acquisition.
    claimRefs:
      - CU001
      - CU002
      - CU004
  - calloutType: insight
    title: CSRD turns compliance cost into Back Market Pro's B2B acquisition engine
    body: >-
      The EU CSRD creates a hard reporting obligation for thousands of European corporations to measure and
      reduce device lifecycle emissions. Back Market Pro's fleet reporting tools and named enterprise clients
      (Kering, Vinci, Air France) are positioned to benefit from this mandate without additional marketing
      spend; regulatory tailwind converts compliance anxiety into a direct sales conversation.
    claimRefs:
      - CU009
      - CU011
      - CU013
      - CU042
  - calloutType: risk
    title: Germany competitive reversal and SEO channel concentration are the two structural GTM risks
    body: >-
      Refurbed is outgrowing Back Market in Germany by a 3.5:1 margin in 2025, and Back Market has not
      publicly articulated a recovery plan. Simultaneously, organic search dominance creates a concentrated
      acquisition posture: if Google changes shopping-result rankings for refurbished device queries,
      paid channel economics may not fully compensate.
    claimRefs:
      - CU015
      - CU032
      - CU038
acknowledgedWarnings:
  - dimension: figureType
