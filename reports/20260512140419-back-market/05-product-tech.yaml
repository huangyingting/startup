  - id: SE_SEC006
    title: Security, Compliance, and Diligence Gaps
    body: >
      Back Market is GDPR-compliant (EU consumer data) and PCI DSS-compliant (payment card processing). The
      EU General Product Safety Regulation (GPSR), which entered into force in December 2024, explicitly covers
      refurbished goods and imposes new product documentation and traceability requirements on marketplace sellers.
      Back Market has acknowledged GPSR applicability; enforcement of seller compliance remains the critical
      implementation question. The EU Right to Repair Directive (national transposition required by July 2026)
      is a demand-side catalyst: it gives consumers rights to repair devices at reasonable cost, increasing
      the value of Back Market's repair platform launch timing.


      Key diligence gaps: No ISO 27001 or SOC 2 Type II certification has been publicly disclosed. The seller
      fraud detection methodology and AI/recommendation system architecture are undisclosed beyond marketing-level
      descriptions. Refurbed, Back Market's primary European competitor, reportedly overtook Back Market in
      European web traffic in 2026, signaling competitive pressure in the company's home region. The full
      technical stack powering search, ranking, and AI-assisted listings has not been independently documented.
    claimRefs:
      - CE029
      - CE037
      - CE038
      - CE039
      - CE040
    tableRefs: []
    figureRefs:
      - FE004

