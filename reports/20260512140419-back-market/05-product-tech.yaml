callouts:
  - title: Asset-Light Model Is the Core Economic Moat
    calloutType: strength
    body: >-
      By never owning inventory, Back Market eliminates warehousing capex, inventory write-down risk, and
      device-handling costs while collecting commission on each transaction. This structure means GMV growth
      (+32% in 2025 to $3.5B) flows to revenue with minimal incremental capital, creating favorable operating
      leverage vs any refurbisher building its own consumer brand.
    claimRefs:
      - CE001
      - CE002
      - CE036
  - title: Verified Premium Is a High-Quality Signal, But Also a Margin Risk
    calloutType: insight
    body: >-
      Verified Premium's 20% sales share at $400–450 ASP vs $330 average demonstrates real consumer willingness
      to pay a quality premium within refurbished. However, the higher inspection cost and quality threshold
      required may erode per-unit economics if sellers pass costs back to Back Market via higher commission
      expectations or non-compliance escalations.
    claimRefs:
      - CE020
      - CE021
      - CE022
  - title: Refurbed European Overtake Is a Competitive Alarm
    calloutType: risk
    body: >-
      Refurbed reportedly overtook Back Market in European web traffic in 2026, representing a material
      competitive development in Back Market's home region. Refurbed's profitability-focused model and strong
      DACH positioning creates direct pressure on Back Market's European core market as both companies
      pursue similar ESG-driven buyer segments.
    claimRefs:
      - CE039
  - title: Repair Platform Is Strategically Correct but Execution Risk Is High
    calloutType: insight
    body: >-
      The September 2025 Repair platform launch is well-timed relative to the EU Right to Repair Directive
      (July 2026 transposition deadline) and positions Back Market for circular electronics leadership. However,
      repair marketplace quality (technician reliability, NPS, geographic density) is notoriously hard to
      control in a three-sided market, and the early-stage Evy dependency creates a single-partner execution risk.
    claimRefs:
      - CE024
      - CE025
      - CE029

