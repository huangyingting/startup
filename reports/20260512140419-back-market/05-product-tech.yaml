  - id: TE002
    title: Workflow / Use-Case Table
    description: >-
      Key user jobs on the Back Market platform — consumer buying, seller fulfillment, corporate procurement —
      mapped to current workflow, Back Market's solution, measurable benefit, and limitations.
    notes: >-
      Benefit figures (savings vs new) are estimates derived from analyst pricing data. Return rates are company-reported
      ranges. Escrow duration is an estimate from secondary sources; Back Market has not publicly confirmed exact hold period.
