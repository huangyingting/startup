company:
  name: Back Market
chapter:
  number: 5
  title: Product & Technology
  summary: >
    Back Market operates an asset-light two-sided marketplace connecting 17M+ global consumers with ~2,700 vetted
    professional refurbishers across 18 countries. Quality infrastructure anchored by mandatory 25-point inspections,
    standardized condition grading, Piceasoft-powered diagnostics, and a 1-year platform warranty creates differentiated
    buyer trust. A 2024 Verified Premium tier (~20% of 2025 sales at $400–450 ASP) addresses premium-buyer perception
    gaps. The September 2025 Repair platform (powered by Evy, iFixit integration) expands the circular electronics
    flywheel into repair-as-a-service. B2B/Pro reaches 6,000 corporate customers in France alone. Refurbed's 2026
    European traffic gains and undisclosed AI/fraud-detection architecture are the primary product diligence flags.
sections:
  - id: SE_SEC001
    title: Platform Architecture and Operating Model
    body: >
      Back Market is a managed two-sided marketplace: it connects consumers seeking affordable, certified refurbished
      electronics with a curated network of approximately 2,700 professional refurbishers, but it never owns, warehouses,
      or ships inventory itself. This asset-light model is central to its unit economics — physical flow runs directly
      from refurbisher to consumer, while Back Market captures a commission on each transaction and provides the
      trust infrastructure (warranty, quality enforcement, payment escrow) that makes buyers willing to transact at all.


      The consumer journey begins with device discovery via the backmarket.com website or iOS/Android mobile apps, which
      are the primary channels. Buyers filter by device type, condition tier, price, and seller rating. At checkout,
      Back Market holds payment in a ~14-day escrow window before releasing funds to the seller — a key trust mechanism
      that gives buyers time to verify device quality and initiate returns if needed. Sellers are evaluated continuously
      on shipping time, return rate, and product quality scores; underperformers face listing suspension or removal.


      The back-end marketplace logic includes a custom search and ranking algorithm that weights price, seller quality
      scores, customer reviews, and device condition to surface optimal listings for each query. A pricing algorithm
      also provides fair-market-price recommendations to sellers, helping maintain competitive pricing across the
      fragmented refurbisher supply base. This combination of supply curation, quality enforcement, and algorithmic
      matching constitutes Back Market's core operating architecture.
    claimRefs:
      - CE001
      - CE002
      - CE005
      - CE006
      - CE007
      - CE008
    tableRefs:
      - TE001
      - TE002
    figureRefs:
      - FE001
