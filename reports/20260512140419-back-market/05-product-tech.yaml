  - id: SE_SEC003
    title: Product Portfolio and Category Economics
    body: >
      Smartphones dominate Back Market's GMV at approximately 60–70%, driven by high consumer demand for affordable
      iPhones and Samsung Galaxy devices, where refurbished savings relative to new retail prices are most visible.
      Laptops and MacBooks account for roughly 15–20% of GMV; tablets (iPad, Samsung Tab) contribute approximately
      10%; gaming consoles (PlayStation, Nintendo Switch) and audio equipment (AirPods, headphones) contribute around
      5% and 3% respectively; and home appliances represent the smallest category at approximately 2%.


      The 2024 introduction of Verified Premium materially shifts the ASP mix upward. Verified Premium devices carry
      an ASP of approximately $400–450 — roughly 21–36% above the platform's overall average of ~$330 — and already
      account for approximately 20% of Back Market's sales volume in 2025. This tier directly addresses the quality
      perception barrier that has historically kept premium-buyer segments from purchasing refurbished electronics.
      The segment also benefits from higher gross margins per transaction due to the elevated ASP, improving overall
      platform take-rate economics.


      An AI-assisted listings capability was introduced in 2025, providing automated product descriptions and
      condition-grading verification to sellers, and delivering personalized recommendations to consumers based on
      browsing and purchase history. The full technical architecture of these AI features has not been publicly
      disclosed beyond high-level marketing claims.
    claimRefs:
