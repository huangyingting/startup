      - CE011
      - CE027
    columns:
      - User Job
      - Pre-Back Market Workflow
      - Back Market Solution
      - Measurable Benefit
      - Known Limitation
    rows:
      - - Buy affordable smartphone
        - Purchase new at full retail or risk unverified eBay/Craigslist refurb
        - Browse 2,700+ vetted refurbishers; filter by condition tier, price, seller rating
        - Save avg $150–300 vs new retail; backed by 1-yr warranty + 30-day free return
        - ~4% device failure rate slightly above ~3% for new; condition-description mismatch complaints
      - - Verify refurbished device quality before purchase
        - Trust seller description alone; no standardized grading across sellers
        - Standardized 4-tier condition grading + Piceasoft diagnostics; 80% battery minimum enforced
        - Transparent, comparable quality tiers reduce information asymmetry
        - Minimum inspection is a floor, not a ceiling; depth varies by seller and device category
      - - Sell refurbished devices (professional refurbisher)
        - Build own e-commerce, manage returns, acquire customers independently
        - Marketplace with 17M+ buyer pool; seller dashboard; payment escrow; pricing algorithm
        - Instant access to large customer base; pricing guidance; reduced dispute risk via escrow
        - ~14-day payment hold constrains seller cash flow; Back Market commission reduces margin
      - - Corporate device procurement (IT/ESG)
        - Buy new devices at full price; no ESG tracking; complex supplier vetting
        - "Back Market Pro: bulk ordering, invoice management, asset tracking dashboard"
        - 40–60% cost savings potential vs new; meets ESG sustainable-procurement mandates
        - B2B ASP and NPS not disclosed; limited to France and early-stage US; feature depth vs enterprise MDM platforms unclear
      - - Repair a broken device
        - Find local independent repair shop; no quality guarantee or booking convenience
        - "Repair platform (Evy-powered): book nearby technician in app; guided by iFixit content"
        - Single-platform circular lifecycle management from buy to repair
        - Limited to France/Germany/Spain at launch; technician quality and coverage density vary

