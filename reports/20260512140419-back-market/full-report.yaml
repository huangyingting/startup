              On the regulatory front, the EU Right to Repair Directive creates a structural tailwind for refurbished
              electronics by mandating repairability and spare-parts availability, increasing the relative value of
              refurbished and repaired devices. The EU General Product Safety Regulation (GPSR) imposes compliance
              burdens on marketplace operators—a cost that well-resourced platforms like Back Market can absorb more
              readily than smaller rivals. Back Market raised approximately €448M in its 2021–2022 fundraising rounds
              with investors including Eurazeo and General Atlantic, reaching a $5.7B valuation in January 2022. This
