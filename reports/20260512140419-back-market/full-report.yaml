            title: GPSR compliance requires immediate seller-level verification
            body: >-
              GPSR has been in application since December 2024 and imposes marketplace-operator liability on Back
              Market. With 2,700 sellers, verifying that each meets EU Safety Gate registration, product-recall, and
              safety-team requirements is operationally complex. Taylor Wessing identifies refurbished electronics
              platforms as a primary GPSR enforcement target.
