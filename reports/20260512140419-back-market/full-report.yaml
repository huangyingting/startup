  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: >-
          Recommendation: track with conviction — EBITDA milestone earned, but 2022 price anchor and Refurbed risk cap
          upside
        blocks:
          - type: paragraph
            body: >-
              Back Market has crossed the most important operating threshold a private marketplace can reach: it
              delivered global EBITDA break-even for the first time in 2025, supported by $3.5 billion in GMV (up 32
              percent) and estimated revenue of approximately $500 million. That is not a speculative proof-of-concept
              anymore. The company operates across 18 markets, serves more than 16 million registered customers, and
              carries one of the most defensible take rates in recommerce at approximately 14.8 percent of GMV. A new
              repair platform launched in France, Germany, and Spain in September 2025 creates an adjacent monetization
              stream, and the Verizon carrier partnership extends US distribution into mainstream telecom channels.


              The valuation challenge is that the last formal mark — $5.7 billion at the January 2022 Series E led by
              Sprints Capital — was set at peak growth-equity multiples near 28-32x trailing revenue. By 2025 the
              implied multiple on the same mark has compressed to roughly 13.7x on $415 million 2024 revenue, and CEO
              Thibaud has himself cited an enterprise value of approximately €5.1 billion ($5.5 billion). Secondary
              market trades observed by Sacra in 2023 implied a steeper discount at $3-4 billion. The spread between
              these marks — nearly $2.5 billion — underlines that the price depends heavily on assumptions about
              sustained profitable growth and the exit window. Refurbed's emergence as a €3 billion GMV competitor
              challenging Back Market's German position is the most direct adverse signal on the moat premium. The call
              is track: stay engaged, define price discipline, and require confirmed post-break-even EBITDA margins
              before upgrading.
            claimRefs:
