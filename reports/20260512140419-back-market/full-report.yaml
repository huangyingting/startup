  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: B2C customer base — 17 million registered buyers across four distinct segments
        blocks:
          - type: paragraph
            body: >-
              Back Market reported more than 17 million registered customers globally as of 2025, with cumulative device
              sales exceeding 84 million units. The average transaction value is approximately $330 per device, and
              Sacra estimates that roughly 56% of purchases are made by repeat buyers — a cohort signal that suggests
              real platform stickiness rather than one-time deal-seeking behavior. Four distinct B2C buyer profiles
              emerge from the available evidence. Price-sensitive buyers represent the broadest segment: they seek
              flagship-quality devices at 40–70% below new retail price and are drawn primarily through organic search
              and paid acquisition. Environmental advocates are a structurally important second segment; Back Market
              estimates buying a refurbished smartphone saves approximately 70 kg of CO2 relative to a new device, and
              the company's B-Corp certification and carbon impact calculator give this segment tangible proof points.
              Performance buyers want the latest generation device at the price of the prior model — an iPhone 14 Pro at
              an iPhone 12 price — and are disproportionately active in the US market. Gift purchasers, the fourth
              segment, buy refurbished for family members and tend to concentrate purchase volume in seasonal periods.
              All four segments share a dependence on Back Market's trust architecture: the 1-year warranty, 30-day
              return window, and the platform's own consumer guarantee (under which Back Market absorbs liability if a
              seller fails to perform) are the primary conversion levers. App store ratings — 4.6/5 on iOS in the United
              States and approximately 4.5/5 on Google Play — indicate that post-purchase satisfaction is broadly
              positive, reinforcing repeat behavior.
