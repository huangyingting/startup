  - id: FV004
    title: Investment KPIs — IC-ready scoring for Back Market
    type: kpi
    layout: standard
    summary: >-
      Back Market scores well on market momentum and profitability milestone, but meaningful gaps in evidence quality
      and competitive clarity keep the composite at track.
    data:
      items:
        - label: Market size & growth
          score: 8
          detail: >-
            Refurbished electronics market projected at $182B+ by 2030 at 10-13% CAGR; regulatory tailwinds add
            incremental demand.
          tone: positive
        - label: GMV & revenue trajectory
          score: 8
          detail: $3.5B GMV (+32%), ~$500M estimated 2025 revenue, 14.8% take rate confirmed across 18 markets.
          tone: positive
        - label: Profitability milestone
          score: 7
          detail: >-
            First global EBITDA break-even in 2025; but margins above break-even not yet publicly confirmed and
            trajectory unclear.
          tone: positive
        - label: Moat & defensibility
          score: 6
          detail: >-
            16M+ customers and quality certification moat are strong; Refurbed ascent in Germany is a material challenge
            to the European premium.
          tone: positive
        - label: Comparable premium support
          score: 7
          detail: >-
            Vinted comp at 13.7x and DCF triangulation both support $5-6B base case; multiple compression from 2022 peak
            is structurally complete.
          tone: neutral
        - label: Competitive risk
          score: 4
          detail: >-
            Refurbed claims German leadership in 2026; Back Market has not publicly rebutted; creates moat uncertainty
            at the premium multiple.
          tone: warning
        - label: Valuation anchor risk
          score: 4
          detail: >-
            2022 $5.7B mark creates anchoring bias for existing investors; secondary market in 2023 implied 40%
            discount; new money must price independently.
          tone: warning
        - label: Evidence & disclosure quality
          score: 3
          detail: >-
            No public financial filings; EBITDA margins undisclosed; preference stack opaque; secondary transaction data
            limited to 2023 Sacra estimate.
          tone: warning
    approximationNotes: Scores are 0-10 ordinal judgments synthesized from the public evidence for IC discussion.
