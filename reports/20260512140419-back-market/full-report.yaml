      - number: '6.2'
        title: Back Market Pro — B2B corporate segment driven by sustainability mandates and cost savings
        blocks:
          - type: paragraph
            body: >-
              Back Market's B2B division, Back Market Pro, serves approximately 6,000 companies in France and 250 in the
              United States as of early 2025. Named enterprise clients include Kering, Vinci, Air France, and the French
              press outlet Le Point, signaling that adoption extends across luxury goods, infrastructure, aviation, and
              media rather than a narrow vertical. The B2B value proposition is dual-track: cost savings of 30–50%
              versus buying new devices, and a growing regulatory imperative. The EU Corporate Sustainability Reporting
              Directive (CSRD), which requires large companies to disclose and reduce the environmental impact of their
              supply chains from 2024 onward, makes device circularity a measurable KPI for the first time. Back Market
              Pro's fleet reporting and invoice management tools are directly positioned to serve this reporting
              requirement. Service features include bulk ordering, dedicated account managers, and consolidated billing
              — reducing procurement friction for IT and sustainability teams. B2B revenue is estimated at $30–50
              million (roughly 8–12% of total revenue), though Back Market does not publicly disaggregate this segment.
              The US corporate channel is notably earlier in its development than the French one, implying meaningful
              headroom if the CSRD framework or equivalent US ESG reporting standards expand the addressable corporate
              buyer pool. The Right to Repair Directive and General Product Safety Regulation also strengthen the supply
              side, giving refurbishers cleaner regulatory standing and improving the quality of devices available to
              corporate buyers at scale.
