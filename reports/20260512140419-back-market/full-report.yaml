      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Analyst estimates span 2x — preserve the range, not a midpoint
            body: >-
              The global refurbished electronics market carries 2024 estimates from $64.8B (SemiconductorInsight) to
