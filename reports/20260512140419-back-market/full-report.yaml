      - number: '7.2'
        title: Regulatory and legal risks
        blocks:
          - type: paragraph
            body: >-
              The EU General Product Safety Regulation (GPSR), which entered application in December 2024, represents
              the most immediate compliance risk. GPSR explicitly covers refurbished goods sold through marketplace
              platforms, imposing obligations on Back Market as the marketplace operator rather than just on individual
              sellers. Requirements include registration on the EU Safety Gate portal, maintaining an internal safety
              team, cooperating with market surveillance authorities, and implementing product withdrawal and recall
              procedures. Taylor Wessing's 2025 analysis identifies marketplace operators in the refurbished electronics
              space as a primary compliance target under GPSR. Back Market operates across 18 countries with
              approximately 2,700 sellers; verifying all sellers meet GPSR requirements is operationally complex and
              non-compliance by a single seller can trigger marketplace-level liability.

              The EU Right to Repair Directive 2024/1799 entered force on July 31, 2024, with member-state transposition
              required by July 31, 2026. The directive mandates that manufacturers make spare parts and tools available
              to independent repairers for five to ten years, and prohibits restricting independent repairers from
              accessing parts. This is broadly favourable for Back Market's repair platform (launched September 2025 in
              France, Germany, and Spain) but also adds compliance overhead as the repair platform operator must
              navigate the new framework. Clyde and Co and Fieldfisher legal analyses confirm the compliance timeline
              and scope. US right-to-repair laws enacted in New York, Oregon, Colorado, and Maine create a fragmented
              compliance landscape for Back Market's US operations. GDPR exposure is material given 17 million-plus
              customer records; any data breach would trigger regulatory and reputational consequences. The EU Digital
              Services Act imposes additional trust and safety obligations on marketplace operators. Cross-border VAT
              compliance across 18 countries adds further regulatory overhead that scales with GMV growth.
