            body: >-
              The competitive risk picture sharpened materially in 2026. Refurbito's analysis reports that Refurbed
              overtook Back Market as the leading refurbished electronics platform in Germany, with Refurbed posting
              approximately 38.6 percent growth versus Back Market's 10.8 percent in that market. Germany has
              historically been one of Back Market's strongest European markets, and losing the growth leadership
              position there signals that vertical-specialist competitors with a marketplace-of-curated-refurbishers
              model can outperform. Refurbed achieved approximately €3 billion in GMV in 2025 and has demonstrated
              capital efficiency, making it a credible challenger for other markets. ECDB data had previously ranked
              Back Market as the leading refurbished electronics marketplace in Germany, underscoring the significance
              of the reversal.

              Platform giants represent a structural threat that Back Market cannot fully mitigate. Amazon Renewed and
              eBay Refurbished benefit from massive customer bases, established trust, and fulfillment infrastructure.
              OEM certified programs from Apple and Samsung add OEM-brand credibility that marketplace sellers cannot
              match. Telecom carrier certified pre-owned programs from T-Mobile and AT&T target the highest-value
              segment—iPhone and Galaxy devices— which represent the bulk of Back Market's GMV. Back Market's 14.8
              percent take rate is exposed to price competition from lower-fee or no-fee alternatives, particularly as
              the refurbished category matures and sellers consider multi-channel strategies. Back Market's mitigation
              responses—Verified Premium tier, carrier partnerships (Verizon partnership confirmed), repair platform,
              and B2B expansion—are credible but not yet proven to sustainably defend take rate. The competitive threat
              table (TR004) ranks these threats by mechanism and severity.
