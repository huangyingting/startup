          - type: callout
            title: Germany competitive reversal is a leading indicator for other markets
            body: >-
              Refurbed's documented overtake of Back Market in Germany in 2026 is a thesis-break signal for the
              competitive moat assumption. If Refurbed's capital-efficient model can replicate this in France and the
              UK, Back Market's take-rate and GMV growth assumptions require revision. The company's
              counter-moves—Premium tier, repair platform, carrier partnerships—are credible but not yet proven at
              scale.
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
