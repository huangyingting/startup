      - number: '1.2'
        title: Founders and Leadership Team
        blocks:
          - type: paragraph
            body: >-
              Back Market was co-founded by three French entrepreneurs who remain active in senior roles as of 2026,
              which is notable among unicorn-stage companies. Thibaud Hug de Larauze serves as CEO and is the company's
              primary public face, representing Back Market at venues including the Ellen MacArthur Foundation's
              circular-economy forum and in investor and media interviews. He has guided Back Market through five
              funding rounds, a restructuring, and the transition to global profitability. Quentin Le Brouster is CTO
              and oversees the technical infrastructure underlying the marketplace, including testing and grading
              systems. Vianney Vaute holds the title of Chief Circular Officer (CCO) and leads sustainability and
              circular-economy positioning—areas central to Back Market's brand identity and increasingly to its
              regulatory positioning under the EU's Right to Repair framework. All three founders were active as of the
              run date, making founder attrition a lower near-term risk than at companies where co-founders have
              departed. CB Insights identifies the three co-founders on the leadership page; Back Market does not
              publish a detailed executive roster publicly. A key-person concentration risk exists with Thibaud Hug de
              Larauze, who has served as the singular face of the company's investor relations, strategic
              communications, and sustainability narrative since founding. No material leadership changes were
              identified in the research period.
