      - number: '5.5'
        title: Technology Partnerships and Ecosystem Moat
        blocks:
          - type: paragraph
            body: >
              Back Market's partnership network constitutes an increasingly layered ecosystem moat. The Piceasoft
              integration standardizes device testing across the supply base; the Verizon/Visible partnership (September
              2024) enables wireless plan upsells at US checkout, generating a revenue-share stream and deepening
              consumer lock-in; the iFixit integration enriches the consumer experience with free repair guides; and the
              Evy-powered Repair platform extends the transaction surface to device repair.


              The Verizon partnership is particularly notable: it signals carrier-side recognition of refurbished device
              market legitimacy and provides Back Market with an ancillary revenue channel while improving the "total
              device lifecycle" value proposition for US consumers. A parallel Bouygues Telecom partnership serves the
              French market with comparable functionality.


              Back Market also reportedly holds exclusive rights to sell officially refurbished Sony devices in certain
              markets — a supply-side advantage that is difficult for new marketplace entrants to replicate without
              Sony's direct cooperation. Platform scale itself (17M+ customers, 84M+ devices sold, $3.5B GMV in 2025)
              creates flywheel defensibility: more seller supply attracts more buyers, which in turn attracts more
