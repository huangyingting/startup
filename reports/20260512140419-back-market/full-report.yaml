      - number: '6.4'
        title: Customer experience — strong trust architecture with structural seller variance
        blocks:
          - type: paragraph
            body: >-
              Back Market's customer experience is built around three explicit trust commitments: a 1-year warranty on
              every purchase, a 30-day return window, and a platform-level consumer guarantee under which Back Market
              covers the buyer directly if a seller fails to deliver. The company targets a warranty claim resolution
              time of less than 24 hours (company-stated), and returns are free with the refurbishing seller bearing the
              shipping cost. These commitments are unusual in the broader secondhand electronics category, where most
              peer-to-peer marketplaces offer no post-sale recourse. Review analysis from Ratingfacts.com and Alidrop.co
              shows that positive sentiment centers on three recurring themes: devices arriving as described, prompt and
              consistent warranty honoring, and strong price-to-quality ratio. Recurring negative themes are shipping
              delays, cases where seller-stated shipping times were not met, and occasional discrepancies between the
              listed and received device condition grade. Back Market monitors review platforms actively and publicly
              responds to Trustpilot entries, which signals a managed-reputation posture that is more resource-intensive
              than typical marketplace operators. App store ratings of 4.6/5 on the US iOS App Store and approximately
              4.5/5 on Google Play are well above the category average and support the interpretation that the majority
              of transaction experiences close without escalation. The core structural risk in customer experience is
              seller variance: with approximately 2,700 professional refurbishers on the platform, the quality testing
              standard (a 25+ point check required of all sellers) cannot be independently audited in full at the level
              of granularity that would confirm consistent enforcement across every refurbisher and every device.
