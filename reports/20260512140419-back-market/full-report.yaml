      - number: '2.3'
        title: Geographic breakdown and buyer segmentation
        blocks:
          - type: paragraph
            body: >-
              Europe is Back Market's geographic stronghold, with France as the number-one market by GMV, followed by
              the United Kingdom, Germany, and Belgium. The DACH region is the most competitively contested territory,
              where Austrian competitor Refurbed holds deep local roots and reportedly reached approximately €3 billion
              in GMV in 2025, closely approaching Back Market's overall position. The United States is Back Market's
              second largest market and its fastest-growing corridor, reportedly growing approximately 40 percent faster
              than the company average in the second half of 2025. Japan represents a third distinct geography, a more
              recently entered market with different consumer dynamics.


              The consumer buyer map divides into three primary archetypes: the price-sensitive individual buyer, the
              sustainability-motivated circular economy buyer, and the B2B corporate IT buyer managing device lifecycle
              costs and ESG commitments. Apple products represent approximately 40 to 50 percent of smartphone sales on
              Back Market, confirming the platform's premium-brand orientation despite its value-price positioning. The
              B2B segment is growing faster than the consumer baseline as corporate sustainability mandates and IT cost
              pressures converge. Sacra's estimated average order value of approximately $330 confirms a value-access
              positioning rather than a premium-device strategy. An emerging segment—AI-feature-seeking consumers
              seeking iPhone 15 Pro or Pixel 8 at discount—was directly addressed by the Verified Premium tier launched
              in 2024.
