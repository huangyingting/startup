      - number: '1.4'
        title: Scale, Financial Metrics, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Back Market's financial and operating metrics demonstrate rapid growth combined with improving unit
              economics. In 2025, the company reported $3.5 billion in GMV, representing 32% year-over-year growth.
              Revenue for 2024 is estimated at approximately $415 million (approximately 25% year-over-year growth from
              2023's €320 million / ~$340 million), per analyst estimates by Sacra. Back Market achieved EBITDA
              profitability in France and Europe in 2024, and announced global EBITDA profitability in 2025. The
              platform serves over 17 million cumulative customers globally and has facilitated the sale of more than 84
              million refurbished devices since founding. The average selling price is approximately $330. Revenue is
              composed approximately 68% from seller commissions, 14% from consumer-facing service fees (including a ~2%
              buyer fee and a €0.49 per-transaction service charge), and 18% from add-on services including insurance,
              extended warranties, advertising, and carrier partnerships. Back Market's B2B division (Back Market Pro)
              serves approximately 6,000 corporate clients in France and 250 in the United States as of 2025, with
              notable clients including Kering, Vinci, and Air France. The company estimates its platform has avoided
              approximately 1.6 billion kilograms of CO2-equivalent emissions. The Verified Premium device tier,
              launched in 2024 to serve buyers seeking near-new-quality devices with additional guarantees, now accounts
              for approximately 20% of platform sales. Headcount is estimated at approximately 978 as of 2026,
              recovering from the post-2022-restructuring low of approximately 700.
