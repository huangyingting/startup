  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk overview and severity framework
        blocks:
          - type: paragraph
            body: >-
              Back Market's risk profile at mid-2026 spans five primary buckets: regulatory compliance, competitive
              market structure, financial and valuation, quality and consumer trust, and management and governance. The
              highest-severity and most time-sensitive risks are regulatory: GPSR entered application in December 2024
              and the EU Right to Repair Directive entered force in July 2024 with a member-state transposition deadline
              of July 2026. Both regulations impose new obligations on Back Market as a marketplace operator of
              refurbished consumer electronics, and the company's compliance posture with GPSR's EU Safety Gate
              registration and product-liability framework is not fully disclosed in public materials. The second
              severity tier comprises competitive threats: Refurbed overtook Back Market in Germany growth metrics in
              2026, and Amazon Renewed and eBay Refurbished bring ecosystem trust and distribution advantages that Back
              Market cannot replicate. Valuation overhang is a latent third-tier risk: the $5.7 billion Series E was
              priced in January 2022 at peak multiples, and current venture fair value is almost certainly below that
              watermark. The risk heatmap (FR001) plots all major risks by residual severity; the transmission map
              (FR002) shows how individual risk events cascade into revenue, margin, financing, and valuation.
