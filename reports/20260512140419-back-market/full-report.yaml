      - number: '4.2'
        title: Business Model and Revenue Decomposition
        blocks:
          - type: paragraph
            body: >
              Back Market operates a two-sided marketplace with a commission-dominant revenue model. The primary revenue
              stream — approximately 68% of total — is the seller commission: professional refurbishers pay
              approximately 10% of the sale price per transaction, plus a €50/month platform subscription fee. This
              commission structure creates high operating leverage: as GMV scales, commission revenue grows
              proportionally with minimal incremental fixed cost.


              The secondary revenue stream (~14%) is the consumer service fee: buyers pay approximately 2% of the device
              price plus a €0.49 per-transaction service charge. This fee covers buyer protection, dispute resolution,
              and platform services. Unlike dual-sided platforms (e.g. Etsy, Poshmark) that charge both buyers and
              sellers, Back Market layers both charges, enabling a total take rate of approximately 14.8% — meaningfully
              above eBay's ~10%.


              The fastest-growing segment (~18%) is add-on services: extended warranties and insurance (sold at point of
              purchase), marketplace advertising (sponsored positions for sellers), the Visible by Verizon carrier plan
              bundle (US market, enabling device + plan purchases), Sony partnership revenues, and iFixit integration.
              The B2B vertical (Back Market Pro) serves 6,000 French companies and 250 US companies with volume pricing
              and account management, estimated to contribute $30–50M (8–12% of revenue) and growing faster than B2C due
              to corporate sustainability mandates. The unit economics of a typical smartphone sale show: ~$330 average
              price × 14.8% take rate = ~$49 platform revenue × ~65% gross margin = ~$32 gross profit per device.
