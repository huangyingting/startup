chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Back Market (backmarket.com) is a Paris-headquartered two-sided marketplace that connects consumers
              directly with approximately 2,700 vetted professional refurbishers offering certified refurbished consumer
              electronics. The company was incorporated in Paris, France in 2014 and operates at the intersection of
              circular-economy principles and marketplace commerce. Its product catalog spans smartphones (Apple iPhone
              and Samsung Galaxy being top sellers), laptops, tablets, gaming consoles (PlayStation, Nintendo), audio
              equipment, and home appliances across 18 countries in Europe, North America (United States and Canada),
              Japan, and Australia. Back Market holds B-Corp certification, underscoring its environmental positioning.
              The company's current stage is late-stage private unicorn: it raised its most recent primary equity at a
              $5.7 billion post-money valuation in January 2022 and had not announced a new primary round as of May
              2026, with the CEO stating the business is self-funding. Back Market's one-line business model: a
              commission-plus-subscription marketplace charging sellers ~10% commission plus €50/month and buyers a ~2%
              service fee, yielding an effective take rate of approximately 14.8%. The refurbished consumer electronics
              market has grown from approximately 4% of total electronics sales in 2011 to an estimated 36% in 2025,
              representing a material structural tailwind that has driven Back Market's consistent revenue growth. The
              company's global headquarters are in Paris with additional offices in New York, Berlin, and Tokyo.
