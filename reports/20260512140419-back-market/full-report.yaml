        title: Geographic distribution — France anchors revenue while the US accelerates and Germany stalls
        blocks:
          - type: paragraph
            body: >-
              Back Market's geographic base spans 18 countries with no single market exceeding 30% of GMV, a
              diversification posture that reduces single-country risk but also means the company must sustain brand
              investment and seller network quality across a large and heterogeneous footprint. France is the largest
              market, accounting for an estimated 25% of customers and representing the most mature and
              highest-penetration geography. The United States is the second-largest market at approximately 20% of
              customers and is growing faster than any other market, supported by the Visible/Verizon carrier
              partnership and heavy SEO investment in iPhone-focused search terms. Germany is a problem market:
              Refurbed, a Vienna-based competitor backed by strong DACH region relationships, reported approximately
              38.6% GMV growth in 2025 while Back Market's estimated German growth was approximately 10.8%, suggesting a
              meaningful competitive reversal in what should be a core European market. The United Kingdom is a top-five
              market where post-Brexit supply chain friction — including import tariffs and regulatory divergence from
              the EU product safety framework — has introduced headwinds that do not affect Back Market's French and
              German operations. Back Market's 2025 total GMV of $3.5 billion (32% year-over-year growth) demonstrates
              that the aggregate business is expanding strongly, but the Germany underperformance is a geographic
              concentration risk that the company has not yet publicly explained with a concrete recovery plan.
              Expansion markets including Japan and Australia are growing but small; India expansion has been paused
              since 2022 due to market complexity.
