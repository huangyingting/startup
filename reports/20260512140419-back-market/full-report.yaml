      - number: '8.4'
        title: 'Comparable set: Vinted, eBay, StockX, Refurbed, and recommerce transactions'
        blocks:
          - type: paragraph
            body: >-
              The most decision-useful comparable is Vinted, which achieved a €8.2 billion valuation at €600 million
              revenue (approximately 13.7x EV/Revenue) in January 2025. Like Back Market, Vinted is a European
              recommerce marketplace with a two-sided network, high gross margins, and recent profitability. The key
              distinction is category: Vinted is fashion (lower per-item value) while Back Market is consumer
              electronics (higher per-item value, higher quality certification burden). Vinted's multiple is the natural
              ceiling for Back Market's public-market aspiration.


              eBay (NASDAQ: EBAY) serves as the mature public comp. With $73 billion in 2024 GMV and $10.1 billion in
              revenue, eBay trades at approximately 2.2x revenue and 0.3x GMV. That discount reflects slow growth and a
              commoditized general marketplace model, not Back Market's recommerce specialization and higher take rate.
              Applying Back Market's premium over eBay — justified by 32 percent GMV growth versus eBay's
              low-single-digit growth — produces a GMV-based value of $3.5 billion times 1.5x (eBay plus growth premium)
              equals approximately $5.25 billion.


              StockX ($3.8 billion at $400 million revenue, ~9.5x) is a useful peer for premium-niche marketplace
              dynamics but covers a declining collectibles segment. ThredUp (NASDAQ: TDUP) trades near 0.5x revenue
              because its consignment model carries inventory risk that Back Market's pure-marketplace model avoids.
              Transaction comparables in recommerce and secondhand market M&A suggest 10-14x revenue for strategic
              buyers and 8-10x for financial buyers. A strategic acquirer — most plausibly a major retailer (Best Buy,
              Carrefour, Fnac) or OEM (Samsung) — could pay a 20-30 percent premium above intrinsic value, implying
              $6.5-7.5 billion in an M&A exit scenario.
