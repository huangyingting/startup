      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Back Market's corporate history spans significant milestones across founding, financing, product
              expansion, partnerships, regulatory context, and one consequential adverse workforce event. The company
              launched in 2014 and grew through five funding rounds, culminating in France's largest startup funding
              round at the time of the Series E in January 2022. In mid-2022, amid a broader post-peak-funding
              environment and the global macroeconomic tightening, Back Market announced 93 layoffs representing
              approximately 13% of its then ~700-person workforce, primarily affecting public affairs and marketing
              roles. The CEO described this as a necessary recalibration to achieve profitability; the company did
              achieve European profitability by 2024 and global EBITDA profitability by 2025. Notable product milestones
              include the launch of the Verified Premium device tier in 2024, the Visible by Verizon carrier partnership
              in September 2024 (strengthening the US market), and the launch of a repair platform in France, Germany,
              and Spain in September 2025 powered by Evy. An iFixit partnership for repair guides was announced in April
              2025. The EU Right to Repair Directive (Directive 2024/1799), effective with a July 2026 transposition
              deadline, obliges EU member states to ensure repairability and is expected to reinforce the structural
              demand for refurbished and repairable electronics. Back Market was named to TIME's 100 Most Influential
              Companies for 2026. India expansion, explored since at least 2022, remains paused as of the run date. No
              material litigation, sanctions, or regulatory enforcement actions were identified against the company.
