            tracking, return initiation; Verified Premium and category-based discovery
        - id: marketplace-logic
          label: Marketplace Logic Layer
          detail: >-
            Custom search and ranking algorithm (price, quality score, reviews, condition); pricing recommendation
            engine for sellers; real-time inventory visibility across 2,700 refurbishers
        - id: quality-assurance
          label: Quality Assurance Layer
          detail: >-
            25-point minimum inspection standard; 4-tier condition grading (Excellent / Good / Fair / Verified Premium);
            Piceasoft automated diagnostics (battery 80% min, screen, connectivity); seller quality scoring (shipping
            time, return rate, product quality)
        - id: seller-services
          label: Seller Services Layer
          detail: >-
            Seller onboarding and vetting; listing management and bulk upload; payment escrow (~14-day hold); seller
            dashboard and analytics; seller suspension for quality underperformance
        - id: partnership-integration
          label: Partnership and Integration Layer
          detail: >-
            Carrier upsells at checkout (Verizon/Visible US, Bouygues FR); Evy repair platform booking; iFixit repair
            guides in-app; insurance partner APIs; Back Market Pro B2B portal
        - id: compliance-localization
          label: Compliance and Localization Layer
          detail: >-
            GDPR and PCI DSS compliance; EU GPSR seller documentation enforcement; 18-country
            currency/language/regulatory localization; Right to Repair Directive preparation
  - id: FE002
    title: Customer Workflow / Operating Flow
