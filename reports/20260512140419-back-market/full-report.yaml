      - number: '6.3'
        title: Go-to-market — SEO-led acquisition augmented by carrier partnerships and brand deals
        blocks:
          - type: paragraph
            body: >-
              Back Market's dominant acquisition channel is organic search. High-volume, high-intent queries such as
              "refurbished iPhone" and "used iPhone" generate substantial traffic that a brand of Back Market's size and
              domain authority can capture efficiently. This SEO advantage is structural but also creates channel
              concentration risk: any material Google algorithm change could reduce organic visibility without a clear
              paid-channel offset. Paid acquisition — primarily Google Shopping campaigns and Facebook, Instagram, and
              TikTok advertising — supplements SEO and supports seasonal demand spikes. In September 2024 Back Market
              and Visible by Verizon announced a US carrier partnership that allows shoppers to bundle a refurbished
              device purchase with a Visible wireless plan ($25–45/month) at checkout, increasing average order value
              and giving Back Market access to a pre-qualified audience at the moment of carrier switching. This is the
              first carrier-integrated go-to-market motion Back Market has publicly confirmed in the United States, and
              it targets the company's second-largest market at a time when US growth is being prioritized. Brand-level
              deals add further reach: Back Market holds exclusive refurbishment rights with Sony for certain device
              lines and a partnership with iFixit that taps into the repair-and-sustainability enthusiast community. In
              France, an integration with Bouygues Telecom facilitates device upgrades and trade-ins through telecom
              operator channels. On the earned-media side, Back Market's TIME100 Most Influential Companies 2026
              recognition, Forbes sustainability coverage, and CEO appearances at the World Economic Forum drive brand
              authority with institutional and ESG-oriented audiences. The referral program and B-Corp certification
              support organic brand-to-brand word-of-mouth, particularly among the environmental advocacy segment.
