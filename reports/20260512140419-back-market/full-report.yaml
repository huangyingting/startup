      - number: '1.3'
        title: Funding History and Capitalization
        blocks:
          - type: paragraph
            body: >-
              Back Market has raised approximately €850 million ($1 billion+) in disclosed primary equity across five
              rounds from 2017 through January 2022. The Series A closed in 2017 for approximately $7.4 million, co-led
              by Daphni and Aglaé Ventures (the Groupe Arnault venture arm), providing early institutional validation. A
              Series B of approximately $48 million followed in 2018 co-led by Eurazeo. The Series C in May 2020 raised
              approximately $120 million led by Goldman Sachs, providing substantial capital during the COVID-19 surge
              in refurbished-device demand. The Series D in May 2021 raised approximately $335 million, led by General
              Atlantic and joined by Goldman Sachs, Eurazeo, and Generation Investment Management; at that point Back
              Market was widely described as France's most valuable startup. The landmark Series E closed in January
              2022, raising $510 million at a post-money valuation of $5.7 billion, led by Sprints Capital with General
              Atlantic, Goldman Sachs, Generation Investment Management, and Eurazeo participating. As of September
              2025, market estimates placed Back Market's implied valuation at approximately €5.1 billion ($5.5
              billion), slightly below the January 2022 primary-round price. CEO Thibaud Hug de Larauze stated in
              November 2025 that no new primary funding round is expected and the company can fund itself. No publicly
              disclosed debt facilities, convertible notes, or secondary transactions beyond the equity rounds described
              have been identified.
