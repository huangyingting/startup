  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >
              Back Market is a managed two-sided marketplace: it connects consumers seeking affordable, certified
              refurbished electronics with a curated network of approximately 2,700 professional refurbishers, but it
              never owns, warehouses, or ships inventory itself. This asset-light model is central to its unit economics
              — physical flow runs directly from refurbisher to consumer, while Back Market captures a commission on
              each transaction and provides the trust infrastructure (warranty, quality enforcement, payment escrow)
              that makes buyers willing to transact at all.


              The consumer journey begins with device discovery via the backmarket.com website or iOS/Android mobile
              apps, which are the primary channels. Buyers filter by device type, condition tier, price, and seller
              rating. At checkout, Back Market holds payment in a ~14-day escrow window before releasing funds to the
              seller — a key trust mechanism that gives buyers time to verify device quality and initiate returns if
              needed. Sellers are evaluated continuously on shipping time, return rate, and product quality scores;
              underperformers face listing suspension or removal.


              The back-end marketplace logic includes a custom search and ranking algorithm that weights price, seller
              quality scores, customer reviews, and device condition to surface optimal listings for each query. A
              pricing algorithm also provides fair-market-price recommendations to sellers, helping maintain competitive
              pricing across the fragmented refurbisher supply base. This combination of supply curation, quality
              enforcement, and algorithmic matching constitutes Back Market's core operating architecture.
            claimRefs:
