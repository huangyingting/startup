      - number: '5.2'
        title: Quality and Trust Infrastructure
        blocks:
          - type: paragraph
            body: >
              Back Market's quality infrastructure is the company's primary moat against commodity marketplace
              competitors. Every device listed on the platform must pass a minimum 25-point inspection before being
              offered for sale — a floor requirement that covers battery health (minimum 80% capacity), screen
              integrity, connectivity, camera functionality, and core component checks. Condition grading is
              standardized across four tiers: Excellent (minimal cosmetic wear), Good (small scratches visible), Fair
              (visible scratches, functional), and Verified Premium (no signs of use, introduced 2024). This grading
              taxonomy reduces information asymmetry between buyers and fragmented refurbishers who might otherwise
              define "good condition" inconsistently.


              The quality enforcement layer is reinforced by Piceasoft, a Finnish diagnostics software approved as Back
              Market's official testing solution, used by approximately 500+ sellers. Piceasoft provides automated
              functional testing — standardizing battery, screen, and component checks across thousands of individual
              refurbishers. The seller scoring system (shipping time, return rate, product quality) creates performance
              incentives and enables suspension of chronic underperformers.


              Despite these controls, documented weaknesses persist: the device failure rate of approximately 4% is
              slightly above the ~3% baseline for new devices, and customer complaints on review platforms cite
              condition-description mismatches, delayed shipping, and difficulty with warranty claims. These are
              systemic challenges at marketplace scale rather than isolated incidents, representing a risk to platform
              NPS as volume grows.
