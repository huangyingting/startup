      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Vertically Integrated Quality Infrastructure
            body: >-
              Back Market's 25-point minimum inspection requirement, standardized 1-year warranty, and 30-day return
              policy across all sellers create a moat against unstructured resale platforms (eBay, Craigslist). The 4%
              device failure rate—comparable to 3% for new devices—suggests quality controls are working. The Verified
              Premium tier (launched 2024, ~20% of sales by 2025) captures higher-margin, premium-quality buyers and
              differentiates further from generalist marketplaces.
            calloutType: strength
            claimRefs:
              - CO036
              - CO037
              - CO038
          - type: callout
            title: Regulatory and Market Structural Tailwinds
            body: >-
              The EU Right to Repair Directive (Directive 2024/1799), with a transposition deadline of July 2026,
              structurally favors Back Market by extending product lifespans and increasing consumer familiarity with
              non-new electronics. Refurbished devices have grown from 4% of electronics market share in 2011 to an
              estimated 36% in 2025. Back Market's B-Corp certification and sustainability positioning are increasingly
              relevant to enterprise B2B procurement and ESG-focused investors.
            calloutType: strength
            claimRefs:
              - CO040
              - CO043
              - CO007
          - type: callout
            title: Valuation Erosion Below 2022 Primary Round
            body: >-
              Back Market's most recent primary valuation was $5.7 billion in January 2022. Market estimates as of
              September 2025 place the implied valuation at approximately €5.1 billion ($5.5 billion), a modest
              decrease. The company has not raised primary capital in over three years. While the CEO has stated the
              business is self-funding (November 2025), the absence of a recent market price creates uncertainty for any
              exit or secondary transaction. No IPO timeline has been confirmed.
            calloutType: risk
            claimRefs:
              - CO013
              - CO039
              - CO042
          - type: callout
            title: 2022 Layoff and Governance Opacity
            body: >-
              The 2022 layoff of 93 employees (13% of the workforce) was the principal adverse employment event in Back
              Market's history. While it preceded the company's profitability achievement, it reflects a period of
              strategic overreach in public affairs and marketing spend. Back Market does not publicly disclose its
              board composition, CFO identity, or governance documents, creating diligence friction for institutional
              investors and potential acquirers.
            calloutType: risk
            claimRefs:
              - CO021
              - CO022
  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, adjacencies, and sizing lenses
        blocks:
          - type: paragraph
            body: >-
              Back Market's relevant market is the curated multi-brand marketplace for refurbished and pre-owned
              consumer electronics, not the totality of electronics commerce. The company's model explicitly excludes
              new device retail, manufacturer direct stores (Apple Refurbished, Samsung Certified Re-Newed), unverified
              peer-to-peer platforms (eBay consumer listings, Facebook Marketplace), standalone repair services, and
              component-only markets. Back Market earns a commission on each transaction between professional
              refurbishers and end buyers, so the relevant SAM is the portion of global refurbished electronics commerce
              flowing through curated, warranted, multi-brand marketplace channels in Back Market's seven operating
              geographies. The SOM is approximated by Back Market's own GMV of $3.5 billion in 2025.


              Market sizing estimates for this space carry a two-times spread that must be preserved without merging
              into a single number. MarketResearchFuture places the global refurbished electronics market at
              approximately $67 billion in 2024, growing to $140.7 billion by 2032 at a 9.3 percent CAGR.
              SemiconductorInsight estimates 2024 at $64.8 billion with an 11.2 percent CAGR. Consegic Business
              Intelligence reports $76.5 billion growing to $140.8 billion by 2031. FundamentalBI estimates $127 billion
              for 2024—nearly twice the Consegic or MRFR figure for the same year—reflecting a materially broader
              category boundary that likely includes unverified peer-to-peer transactions, household appliances, and
              industrial equipment. For Back Market specifically, smartphones represent roughly 60 to 70 percent of
              refurbished market revenue, with laptops and tablets accounting for 15 to 20 percent. The multiple analyst
              estimates should be read as a range with explicit methodology caveats, not as interchangeable TAM inputs.
