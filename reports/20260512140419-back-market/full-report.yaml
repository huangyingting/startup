              Refurbed operates across 17+ countries with 2,400+ sellers and 7M+ customers but has no US market
              presence.

              eBay Refurbished leverages eBay's large buyer-seller base but is frequently cited as delivering uneven
              grading standards relative to specialist platforms, a quality-signal weakness in a segment where buyer
              trust is the core value proposition. eBay's total 2024 GMV was approximately $73B, with refurbished
              electronics estimated at $3–4B within that total. Amazon Renewed benefits from Prime shipping, Amazon's
