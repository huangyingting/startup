      - number: '4.4'
        title: Profitability Path and Capital Adequacy
        blocks:
          - type: paragraph
            body: >
              Back Market's path to profitability reflects a deliberate transition from growth-at-any-cost to
              sustainable operations. The company operated at a loss through 2022–2023, investing raised capital in
              marketing, technology, and geographic expansion. The austerity phase followed the funding drought of
              2022–2023: having raised $510M in January 2022 at peak valuations, the company prioritized efficiency as
              new venture capital became scarce globally.


              By late 2024, the European operations achieved EBITDA profitability with approximately 35% EBITDA margin —
              a strong signal that the underlying marketplace economics work at maturity. By 2025 full-year, the company
              reached global EBITDA break-even or better. CEO Thibaud Hénin de Lassée explicitly stated that "the
              company does not need to raise more money" and is "self-sustaining" — removing the near-term refinancing
              risk that weighs on many late-stage private technology companies.


              Back Market's marketplace model provides structurally favorable capital adequacy: no inventory
              accumulation, no manufacturing capex, and commission payments received at point of sale before seller
              payouts. The company has no publicly disclosed debt facility. Working capital is inherently positive: the
              platform collects buyer payments (including commission) at purchase and holds funds until post-delivery
              buyer confirmation. The absence of a future fundraise need, confirmed from management, reduces dilution
              risk for current investors but also reduces the near-term catalyst for a mark-up event.
