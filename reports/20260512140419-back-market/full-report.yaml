          value: 5.5
          detail: USD billions; CEO-stated €5.1B ($5.5B) enterprise value as of 2025; consistent with ~11x trailing revenue.
          tone: warning
        - label: Base case (12x)
          value: 6
          detail: >-
            USD billions; 12x on $500M 2025E revenue; aligns with profitable European marketplace comps and Vinted
            ceiling.
          tone: neutral
        - label: Vinted comp (13.7x)
          value: 6.85
          detail: >-
            USD billions; if Back Market commands Vinted's multiple of 13.7x on $500M; requires similar profitability
            evidence.
          tone: neutral
        - label: Bull case (15x)
          value: 7.5
          detail: USD billions; 15x on $500M 2025E revenue; requires US acceleration, repair-platform scale, and IPO premium.
          tone: positive
    approximationNotes: >-
      Enterprise values are simple EV/revenue bridges using $500M as the central 2025 revenue estimate; they are not
      discounted cash-flow outputs. CEO-implied figure converted from €5.1B at 1.08 EUR/USD.
