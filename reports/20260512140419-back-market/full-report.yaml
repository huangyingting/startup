  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >-
      Back Market's B2C customer journey runs from price-driven discovery through first purchase and warranty experience
      to repeat buying driven by satisfaction. The B2B path is separate, driven by sustainability mandate research and
      procurement approval rather than search intent.
    data:
      nodes:
        - id: discover
          label: Discover
          detail: >-
            B2C buyers find Back Market through organic search (refurbished iPhone), paid social, and environmental
            media. B2B buyers discover through LinkedIn or ESG consulting referrals.
          tone: positive
        - id: evaluate
          label: Evaluate
          detail: >-
            Trust signals (B-Corp, warranty, 30-day returns, app ratings) overcome the quality uncertainty inherent in
            refurbished devices. Price gap vs new is the primary conversion trigger.
          tone: neutral
        - id: purchase
          label: Purchase
          detail: >-
            Average transaction value ~$330. Carrier bundle option (Visible/Verizon in US) extends the basket. Device +
            case bundles available on platform.
          tone: positive
        - id: experience
          label: Post-purchase experience
          detail: >-
            Most buyers receive device as described (positive reviews dominant). A minority encounter shipping delays or
            condition discrepancies; <24h warranty claim target reduces abandonment.
          tone: neutral
        - id: repeat
          label: Repeat and refer
          detail: >-
            ~56% of purchases are repeat buyers. Referral program and environmental identity ("I buy refurbished") drive
            organic word-of-mouth and gifting to family.
          tone: positive
    approximationNotes: >-
      Journey steps are derived from review analysis and company-stated metrics; no public funnel conversion data
      between stages has been disclosed.
    claimRefs:
      - CU004
      - CU005
      - CU006
      - CU007
      - CU017
      - CU025
      - CU026
  - id: FU002
    title: Adoption / deployment funnel
    type: flow
    layout: wide
    summary: >-
      Back Market's customer acquisition flows from organic search dominance through platform trust conversion and into
      repeat purchase cohorts. The B2B path branches at the discovery stage and converges at the platform warranty and
      reporting layer.
    data:
      nodes:
        - id: search
          label: Search-intent discovery
          detail: >-
            Dominant organic search traffic for device-specific refurbished queries captures high-intent buyers before
            competitors. SEO advantage reinforced by domain authority and category breadth.
          tone: positive
        - id: trust
          label: Trust conversion
          detail: >-
            Quality page, B-Corp badge, app ratings 4.6/5, and 1-year warranty overcome refurbished stigma and drive
            checkout from first-time visitors.
          tone: positive
        - id: firstpurchase
          label: First purchase
          detail: >-
            ~$330 average transaction. Free returns and Back Market guarantee reduce post-purchase anxiety and set up
            positive first-experience conditions.
          tone: positive
        - id: satisfaction
          label: Post-purchase satisfaction
          detail: >-
            Warranty claims resolved target <24h. Majority of reviews positive on device quality and price-to-value.
            Minority encounter seller variance issues.
          tone: neutral
        - id: repeat
          label: Repeat cohort
          detail: >-
            56% repeat purchase rate indicates buyers return. Environmental identity and referral program reinforce
            brand relationship beyond single transaction.
          tone: positive
      edges:
        - from: search
          to: trust
        - from: trust
          to: firstpurchase
        - from: firstpurchase
          to: satisfaction
        - from: satisfaction
          to: repeat
    approximationNotes: >-
      Funnel conversion rates between stages are not publicly disclosed; steps are inferred from company strategy
      statements, review analysis, and Sacra research.
    claimRefs:
      - CU001
      - CU004
      - CU006
      - CU015
      - CU023
      - CU029
