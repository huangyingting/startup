  - id: FR001
    title: Risk heatmap — probability vs residual severity
    type: matrix
    layout: wide
    summary: >-
      Back Market's highest residual risks cluster around regulatory compliance (GPSR, Right to Repair) and competitive
      market structure (Refurbed, platform giants), with financial and governance risks at medium-high residual
      exposure.
    data:
      columns:
        - Probability
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: GPSR marketplace compliance
          values:
            - label: high
              tone: negative
              detail: December 2024 in-application; enforcement active across EU member states.
            - label: critical
              tone: negative
              detail: Marketplace liability; recall procedures; seller vetting across 2,700 sellers.
            - label: low-medium
              tone: warning
              detail: Compliance programme underway; not yet publicly verified at seller level.
            - label: high
              tone: negative
              detail: Residual exposure high until seller-level compliance confirmed.
        - label: EU Right to Repair Directive (July 2026 deadline)
          values:
            - label: high
              tone: negative
              detail: Transposition by July 2026; enforcement follows in 18 countries.
            - label: high
              tone: warning
              detail: Repair platform operator obligations; potential competitive advantage if compliant.
            - label: medium
              tone: warning
              detail: Repair platform launched; legal counsel tracking transposition.
            - label: medium-high
              tone: warning
              detail: Opportunity-risk balance; compliance overhead is real.
        - label: Refurbed competitive overtake in Germany
          values:
            - label: high
              tone: negative
              detail: Already confirmed in 2026; spread to France and other markets is credible.
            - label: high
              tone: negative
              detail: Germany was core market; take-rate pressure if replicated elsewhere.
            - label: medium
              tone: warning
              detail: Premium tier, repair, B2B, carrier partnerships partially offset.
            - label: medium-high
              tone: warning
              detail: Germany reversal confirmed; mitigation credible but not yet market-proven.
        - label: Valuation overhang at $5.7B Series E
          values:
            - label: high
              tone: negative
              detail: Venture multiples compressed 2022-2026; $5.7B likely above current fair value.
            - label: medium
              tone: warning
              detail: Employee morale from underwater options; punitive terms if capital needed.
            - label: medium
              tone: warning
              detail: Positive EBITDA achieved; CEO stated no new funding needed.
            - label: high
              tone: negative
              detail: Down-round or dilution risk persists as long as mark-to-market gap remains.
        - label: Smartphone revenue concentration
          values:
            - label: low-medium
              tone: warning
              detail: Apple policy unlikely to change materially near-term but tail risk is real.
            - label: high
              tone: negative
              detail: 60-70% GMV concentration; Apple supply or lock-policy shock is transmission mechanism.
            - label: medium
              tone: warning
              detail: Multi-brand, multi-geography seller base partially diversifies exposure.
            - label: medium-high
              tone: warning
              detail: Concentration without category disclosure creates underwriting uncertainty.
        - label: Key-person dependency (CEO)
          values:
            - label: low-medium
              tone: warning
              detail: Co-founders in CTO and CCO roles reduce but do not eliminate dependency.
            - label: high
              tone: warning
              detail: CEO is primary brand ambassador; departure would disrupt investor and media narrative.
            - label: medium
              tone: warning
              detail: Distributed co-founder leadership provides partial mitigation.
            - label: medium
              tone: warning
              detail: No succession disclosure; governance structure opaque.
        - label: GDPR and data breach risk
          values:
            - label: low-medium
              tone: warning
              detail: EU e-commerce baseline risk; no known incidents.
            - label: critical
              tone: negative
              detail: 17M+ customer records; regulatory fine and reputational consequence.
            - label: medium
              tone: warning
              detail: Standard GDPR compliance programme assumed; not independently audited.
            - label: medium
              tone: warning
              detail: Residual risk is inherent to any large consumer data custodian.
    approximationNotes: >-
      All ratings are source-backed qualitative ordinal assessments rather than modelled probabilities. Residual
      severity represents the combined assessment of probability, impact, and mitigation maturity as of May 2026.
    claimRefs:
      - CR011
      - CR013
      - CR001
      - CR017
      - CR020
      - CR024
      - CR016
