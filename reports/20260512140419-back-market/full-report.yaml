      - number: '8.5'
        title: 'Exit scenarios and final diligence asks: IPO window, M&A, and the path to investor-complete evidence'
        blocks:
          - type: paragraph
            body: >-
              Back Market CEO Thibaud has stated that an IPO is the company's natural exit path but is not imminent. The
              realistic window for an IPO is 2026-2028, contingent on sustaining global EBITDA profitability and
              reaching revenue scale that public markets will price at a premium. Vinted's anticipated IPO will serve as
              a key timing marker and multiple anchor for the broader European recommerce sector.


              The secondary and PE paths are live alternatives. General Atlantic and Goldman Sachs, both participants in
              the $5.7 billion Series E, face typical seven-to-ten year fund lifecycles; a continuation vehicle or PE
              buyout at $4-5 billion could offer partial liquidity in 2025-2026. A strategic M&A exit at $6.5-7.5
              billion would represent the most value-creative outcome for minority investors but requires a motivated
              counterparty with the regulatory bandwidth for a cross-border transaction.


              The most material diligence gaps blocking a confident buy call are: (1) absence of filed financial
              statements or audited EBITDA margin disclosure beyond the global break-even announcement; (2) opacity of
              the 2022 cap-table preference stack and any liquidation rights or ratchet provisions; (3) unverified
              impact of Refurbed's German expansion on Back Market's GMV concentration; and (4) no visibility into the
              repair-platform revenue run rate. The Right to Repair regulatory tailwind is real and well-evidenced, but
              until EBITDA margins and competitive intensity in Germany are publicly confirmed, the evidence set
              supports track rather than buy.
