          - type: callout
            title: Valuation overhang is latent but structurally real
            body: >-
              The $5.7 billion Series E priced in January 2022 is almost certainly above current venture fair value
              given venture multiple compression since 2022. Back Market has not disclosed a new financing round or
              facility. Employee equity is likely underwater, creating talent retention risk. The CEO's stated
              self-sufficiency is credible given positive EBITDA, but a competitive pricing response or demand shock
              could change the calculus.
            calloutType: risk
