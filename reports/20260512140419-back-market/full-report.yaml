      - number: '5.4'
        title: Innovation Roadmap and Recent Launches
        blocks:
          - type: paragraph
            body: >
              Back Market's 2024–2025 innovation activity is significant in breadth. The Verified Premium tier (launched
              2024) was the most impactful product addition, addressing a gap at the premium end of the refurbished
              market and achieving ~20% sales penetration within a year. The tier's no-wear standard (stricter than the
              existing "Excellent" grade which tolerates minor cosmetic wear) required incremental inspection investment
              but has driven measurable ASP uplift.


              In April 2025, Back Market launched a formal partnership with iFixit — the world's largest open-source
              repair guide platform — integrating device repair instructions directly within the Back Market consumer
              app. This positions Back Market not merely as a device marketplace but as a repair-enabling resource,
              anticipating the Right to Repair consumer demand and regulatory tailwind ahead of the EU Directive's July
              2026 transposition deadline.


              In September 2025, Back Market launched a dedicated Repair platform powered by Evy, a third-party repair
              marketplace startup, initially in France, Germany, and Spain. The platform connects consumers with local
              repair technicians and aims to reach 500 points of sale through distribution partnerships. This is a
              strategic expansion from a buy/sell marketplace to a full circular electronics lifecycle platform — though
              the repair service remains early-stage, with technician network depth and NPS not yet publicly validated.


              The B2B segment (Back Market Pro) has grown to 6,000 corporate customers in France and 250 in the US,
              serving enterprise ESG procurement mandates with bulk ordering, invoice management, and asset tracking
              tools.
