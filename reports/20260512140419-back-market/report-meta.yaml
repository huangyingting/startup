  foundingLocation: Paris, France
  headquarters: Paris, France
  productSummary: >
    A curated online marketplace for professionally refurbished electronics. Products are sold
    by third-party sellers under Back Market's quality standards and warranty framework. The
    platform also offers Back Market-branded protection plans, installment financing, and
    device trade-in in select markets.
  customerFocus: >
    Primarily B2C: cost-conscious and sustainability-minded consumers aged 25–45 seeking
    lower-cost alternatives to new devices. Growing B2B channel serving SME and enterprise
    IT procurement teams across Europe, leveraging sustainability commitments and cost savings.
  businessModel: >
    Revenue from seller commissions (primary), insurance/warranty attachment, consumer
    financing, and trade-in. The marketplace model carries minimal inventory risk; gross
    margin is estimated at 70–75%. Profitability milestone reached (global EBITDA break-even 2025).
  stage: Private, growth-stage
  fundingStatus: >
    Series E ($510M, January 2022, $5.7B pre-money valuation, led by Sprints Capital) is the
    most recent primary equity round. Total raised approximately $912M. IPO ambition acknowledged
    by CEO for 2026–2028 window; secondary market implied ~$3–4B valuation in 2023.
