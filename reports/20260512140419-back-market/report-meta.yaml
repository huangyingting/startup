companyProfile:
  summary: >
    Back Market was founded in 2014 by Thibaud Hug de Larauze (CEO), Quentin Le Brouster (CTO),
    and Vianney Vaute (CCO) in Paris. It operates a two-sided marketplace connecting consumers
    with vetted professional refurbishers, offering refurbished and renewed electronics — primarily
    smartphones, laptops, and tablets — with a 30-day return guarantee, up to a 12-month warranty,
    and a 25-point inspection standard. The platform generates revenue primarily through seller
    commissions (~14.8% take rate) plus insurance, financing, and trade-in services. After $912M
    in total capital raised across five rounds through January 2022, Back Market achieved global
    EBITDA profitability in 2025 and is targeting a 2026–2028 IPO window.
  foundedDate: '2014-01-01'
  founders:
    - name: Thibaud Hug de Larauze
      role: Co-founder and CEO
      background: French entrepreneur; previously worked at Deloitte and as a product manager; leads Back Market's overall strategy and external representation
      claimRefs:
