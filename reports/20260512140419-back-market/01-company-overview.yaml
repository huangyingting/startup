company:
  name: "Back Market"

chapter:
  number: 1
  title: "Company Overview"
  summary: "Back Market is a Paris-headquartered two-sided marketplace founded in 2014 by Thibaud Hug de Larauze (CEO), Quentin Le Brouster (CTO), and Vianney Vaute (CCO) that connects consumers with approximately 2,700 vetted professional refurbishers offering certified refurbished consumer electronics. The company has raised approximately €850 million ($1B+) through a January 2022 Series E at a $5.7 billion valuation led by Sprints Capital. In 2025 Back Market crossed $3.5 billion in GMV (32% YoY growth), achieved global EBITDA profitability, serves 17 million+ customers across 18 markets, and was named to TIME's 100 Most Influential Companies 2026. A 2022 workforce reduction of 93 employees (13%) was the principal adverse employment event; no new primary funding round has been announced since, with the CEO stating in November 2025 that the company is self-funding. The refurbished electronics market share has grown from 4% in 2011 to 36% in 2025, and the EU Right to Repair Directive creates structural regulatory tailwinds."

sections:
  - id: "company-identity"
    title: "Company Identity and Business Model"
    body: "Back Market (backmarket.com) is a Paris-headquartered two-sided marketplace that connects consumers directly with approximately 2,700 vetted professional refurbishers offering certified refurbished consumer electronics. The company was incorporated in Paris, France in 2014 and operates at the intersection of circular-economy principles and marketplace commerce. Its product catalog spans smartphones (Apple iPhone and Samsung Galaxy being top sellers), laptops, tablets, gaming consoles (PlayStation, Nintendo), audio equipment, and home appliances across 18 countries in Europe, North America (United States and Canada), Japan, and Australia. Back Market holds B-Corp certification, underscoring its environmental positioning. The company's current stage is late-stage private unicorn: it raised its most recent primary equity at a $5.7 billion post-money valuation in January 2022 and had not announced a new primary round as of May 2026, with the CEO stating the business is self-funding. Back Market's one-line business model: a commission-plus-subscription marketplace charging sellers ~10% commission plus €50/month and buyers a ~2% service fee, yielding an effective take rate of approximately 14.8%. The refurbished consumer electronics market has grown from approximately 4% of total electronics sales in 2011 to an estimated 36% in 2025, representing a material structural tailwind that has driven Back Market's consistent revenue growth. The company's global headquarters are in Paris with additional offices in New York, Berlin, and Tokyo."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006, CO007, CO008, CO040]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: "founders-leadership"
    title: "Founders and Leadership Team"
    body: "Back Market was co-founded by three French entrepreneurs who remain active in senior roles as of 2026, which is notable among unicorn-stage companies. Thibaud Hug de Larauze serves as CEO and is the company's primary public face, representing Back Market at venues including the Ellen MacArthur Foundation's circular-economy forum and in investor and media interviews. He has guided Back Market through five funding rounds, a restructuring, and the transition to global profitability. Quentin Le Brouster is CTO and oversees the technical infrastructure underlying the marketplace, including testing and grading systems. Vianney Vaute holds the title of Chief Circular Officer (CCO) and leads sustainability and circular-economy positioning—areas central to Back Market's brand identity and increasingly to its regulatory positioning under the EU's Right to Repair framework. All three founders were active as of the run date, making founder attrition a lower near-term risk than at companies where co-founders have departed. CB Insights identifies the three co-founders on the leadership page; Back Market does not publish a detailed executive roster publicly. A key-person concentration risk exists with Thibaud Hug de Larauze, who has served as the singular face of the company's investor relations, strategic communications, and sustainability narrative since founding. No material leadership changes were identified in the research period."
    claimRefs: [CO001, CO002, CO003, CO006, CO021, CO022]
    tableRefs: [TO002]

  - id: "funding-capitalization"
    title: "Funding History and Capitalization"
    body: "Back Market has raised approximately €850 million ($1 billion+) in disclosed primary equity across five rounds from 2017 through January 2022. The Series A closed in 2017 for approximately $7.4 million, co-led by Daphni and Aglaé Ventures (the Groupe Arnault venture arm), providing early institutional validation. A Series B of approximately $48 million followed in 2018 co-led by Eurazeo. The Series C in May 2020 raised approximately $120 million led by Goldman Sachs, providing substantial capital during the COVID-19 surge in refurbished-device demand. The Series D in May 2021 raised approximately $335 million, led by General Atlantic and joined by Goldman Sachs, Eurazeo, and Generation Investment Management; at that point Back Market was widely described as France's most valuable startup. The landmark Series E closed in January 2022, raising $510 million at a post-money valuation of $5.7 billion, led by Sprints Capital with General Atlantic, Goldman Sachs, Generation Investment Management, and Eurazeo participating. As of September 2025, market estimates placed Back Market's implied valuation at approximately €5.1 billion ($5.5 billion), slightly below the January 2022 primary-round price. CEO Thibaud Hug de Larauze stated in November 2025 that no new primary funding round is expected and the company can fund itself. No publicly disclosed debt facilities, convertible notes, or secondary transactions beyond the equity rounds described have been identified."
    claimRefs: [CO009, CO010, CO011, CO012, CO013, CO014, CO015, CO039, CO042]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: "scale-metrics"
    title: "Scale, Financial Metrics, and Business Model"
    body: "Back Market's financial and operating metrics demonstrate rapid growth combined with improving unit economics. In 2025, the company reported $3.5 billion in GMV, representing 32% year-over-year growth. Revenue for 2024 is estimated at approximately $415 million (approximately 25% year-over-year growth from 2023's €320 million / ~$340 million), per analyst estimates by Sacra. Back Market achieved EBITDA profitability in France and Europe in 2024, and announced global EBITDA profitability in 2025. The platform serves over 17 million cumulative customers globally and has facilitated the sale of more than 84 million refurbished devices since founding. The average selling price is approximately $330. Revenue is composed approximately 68% from seller commissions, 14% from consumer-facing service fees (including a ~2% buyer fee and a €0.49 per-transaction service charge), and 18% from add-on services including insurance, extended warranties, advertising, and carrier partnerships. Back Market's B2B division (Back Market Pro) serves approximately 6,000 corporate clients in France and 250 in the United States as of 2025, with notable clients including Kering, Vinci, and Air France. The company estimates its platform has avoided approximately 1.6 billion kilograms of CO2-equivalent emissions. The Verified Premium device tier, launched in 2024 to serve buyers seeking near-new-quality devices with additional guarantees, now accounts for approximately 20% of platform sales. Headcount is estimated at approximately 978 as of 2026, recovering from the post-2022-restructuring low of approximately 700."
    claimRefs: [CO016, CO017, CO018, CO019, CO020, CO021, CO023, CO024, CO025, CO026, CO027, CO028, CO034, CO035, CO036, CO037, CO038]
    figureRefs: [FO003]

  - id: "milestones-adverse"
    title: "Key Milestones and Adverse Events"
    body: "Back Market's corporate history spans significant milestones across founding, financing, product expansion, partnerships, regulatory context, and one consequential adverse workforce event. The company launched in 2014 and grew through five funding rounds, culminating in France's largest startup funding round at the time of the Series E in January 2022. In mid-2022, amid a broader post-peak-funding environment and the global macroeconomic tightening, Back Market announced 93 layoffs representing approximately 13% of its then ~700-person workforce, primarily affecting public affairs and marketing roles. The CEO described this as a necessary recalibration to achieve profitability; the company did achieve European profitability by 2024 and global EBITDA profitability by 2025. Notable product milestones include the launch of the Verified Premium device tier in 2024, the Visible by Verizon carrier partnership in September 2024 (strengthening the US market), and the launch of a repair platform in France, Germany, and Spain in September 2025 powered by Evy. An iFixit partnership for repair guides was announced in April 2025. The EU Right to Repair Directive (Directive 2024/1799), effective with a July 2026 transposition deadline, obliges EU member states to ensure repairability and is expected to reinforce the structural demand for refurbished and repairable electronics. Back Market was named to TIME's 100 Most Influential Companies for 2026. India expansion, explored since at least 2022, remains paused as of the run date. No material litigation, sanctions, or regulatory enforcement actions were identified against the company."
    claimRefs: [CO021, CO029, CO030, CO031, CO032, CO033, CO038, CO041, CO043]
    tableRefs: [TO004]

