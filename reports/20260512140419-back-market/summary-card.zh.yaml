summary:
  headline: >
    继续研究：Back Market 是翻新电子产品无可争议的全球龙头，单位经济模型已经跑通，并首次实现盈利，但 2022 年高点估值（$5.7B）已明显回落；二级市场信号与估值倍数压缩指向 $4.5–6.5B
    的公允价值区间，需要进一步尽调股权结构、德国竞争侵蚀和 IPO 时点风险。
