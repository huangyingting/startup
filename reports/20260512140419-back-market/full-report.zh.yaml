      - number: '5.2'
        title: 质量与信任基础设施
        blocks:
          - type: paragraph
            body: >
              Back Market 的质量基础设施，是公司对抗商品化市场竞争者的主要护城河。平台上架的每台设备，出售前都必须通过最低 25 项检查——这条底线覆盖电池健康度（最低 80%
              容量）、屏幕完整性、连接能力、摄像头功能和核心部件检查。成色分级统一为四档：Excellent（极少外观磨损）、Good（可见小划痕）、Fair（可见划痕但功能正常）和 Verified
              Premium（无使用痕迹，2024 年推出）。这套分级法降低了买家与分散翻新商之间的信息不对称，否则不同翻新商可能会把「成色良好」定义得各不相同。


              质量执法层由 Piceasoft 进一步加固。Piceasoft 是芬兰诊断软件，也是 Back Market 批准的官方测试方案，约 500+ 名卖家在使用。Piceasoft
              提供自动化功能测试，把电池、屏幕和部件检查标准化，覆盖数千家独立翻新商。卖家评分系统（发货时间、退货率、产品质量）建立了绩效激励，也让平台能暂停长期表现不佳者。


              即便有这些控制，已记录的弱点仍然存在：设备故障率约 4%，略高于新设备约 3%
              的基准；评论平台上的客户投诉提到成色描述不符、发货延迟和保修理赔困难。这些不是孤立事件，而是市场规模化后的系统性挑战；交易量增长时，平台 NPS 会承压。
