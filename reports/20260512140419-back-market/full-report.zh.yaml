      - number: '6.5'
        title: 地理分布——法国锚定收入，美国加速，德国停滞
        blocks:
          - type: paragraph
            body: >-
              Back Market 的地理基础覆盖 18 个国家，没有单一市场超过 GMV 的
              30%。这种多元化降低了单一国家风险，但也意味着公司必须在广阔且异质的版图上持续投入品牌，并维持卖家网络质量。法国是最大市场，估计占客户的 25%，也是最成熟、渗透率最高的地区。美国是第二大市场，约占客户
              20%，增速快于任何其他市场，背后有 Visible/Verizon 运营商合作和针对 iPhone 搜索词的大量 SEO 投入支撑。德国是问题市场：Refurbed 是一家总部在维也纳、背靠强 DACH
              区域关系的竞争对手，2025 年报告 GMV 增长约 38.6%；而 Back Market 在德国的估计增速约为
              10.8%，说明这个本应属于欧洲核心市场的地区出现了有意义的竞争逆转。英国是前五大市场；脱欧后的供应链摩擦——包括进口关税，以及与欧盟产品安全框架的监管分化——带来了法国和德国业务不会遇到的逆风。Back
              Market 2025 年总 GMV 为 $3.5 billion（同比增长
              32%），说明整体业务强劲扩张；但德国表现不佳是一个地理集中风险，公司尚未公开给出具体恢复计划。日本、澳大利亚等扩张市场在增长，但规模仍小；印度扩张自 2022 年起因市场复杂性暂停。
