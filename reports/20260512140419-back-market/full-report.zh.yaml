      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >-
              Back Market 由三位法国创业者共同创立；截至 2026 年，三人仍在高级岗位上活跃，这在独角兽阶段公司中值得注意。Thibaud Hug de Larauze 担任 CEO，是公司最主要的公共面孔，代表
              Back Market 出席 Ellen MacArthur Foundation 循环经济论坛等场合，并接受投资人与媒体采访。他带领 Back Market
              完成五轮融资、一轮重组，并过渡到全球盈利。Quentin Le Brouster 担任 CTO，负责支撑市场平台的技术基础设施，包括测试和评级系统。Vianney Vaute 的头衔是 Chief
              Circular Officer（CCO），负责可持续和循环经济定位——这些领域既是 Back Market
              品牌身份的核心，也在欧盟维修权框架下越来越影响监管定位。截至运行日，三位创始人均仍在任，因此短期创始人流失风险低于联合创始人已离开的公司。CB Insights 在领导层页面列出三位联合创始人；Back
              Market 未公开发布详细高管名单。Thibaud Hug de Larauze 构成关键人集中风险：自创立以来，他一直是公司投资者关系、战略沟通和可持续叙事的单一代表。研究期内未发现重大领导层变动。
