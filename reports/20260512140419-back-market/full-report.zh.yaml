  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议：坚定跟踪——EBITDA 里程碑已经兑现，但 2022 年价格锚点和 Refurbed 风险限制上行
        blocks:
          - type: paragraph
            body: >-
              Back Market 已跨过私营市场平台最重要的经营门槛：2025 年首次实现全球 EBITDA 收支平衡，背后是 $3.5 billion GMV（增长 32%）和估计约 $500 million
              收入支撑。这已经不再是投机性的概念验证。公司覆盖 18 个市场，服务超过 16 百万注册客户，并拥有循环电商领域最具防御性的抽佣率之一，约为 GMV 的 14.8%。2025 年 9
              月在法国、德国和西班牙推出的新维修平台，创造了相邻变现流；Verizon 运营商合作则把美国分发延伸到主流电信渠道。


              估值挑战在于，最近一次正式估值——2022 年 1 月由 Sprints Capital 领投的 Series E，估值 $5.7 billion——是在增长股权倍数峰值附近定下，约为过去十二个月收入的
              28–32x。到 2025 年，同一估值对应 $415 million 2024 年收入，隐含倍数已压缩到约 13.7x；CEO Thibaud 本人也曾引用约 €5.1 billion（$5.5
              billion）的企业价值。Sacra 观察到的 2023 年二级市场交易显示折扣更深，隐含估值为 $3–4 billion。这些估值之间的差距接近 $2.5
              billion，说明价格高度依赖持续盈利增长和退出窗口假设。Refurbed 作为 €3 billion GMV 竞争者崛起，并挑战 Back Market
              在德国的位置，是对护城河溢价最直接的不利信号。结论是跟踪：保持接触，明确价格纪律，并在升级前要求确认盈亏平衡后的 EBITDA 利润率。
