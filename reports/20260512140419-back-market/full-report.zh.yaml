    data:
      layers:
        - id: consumer-layer
          label: 消费者界面层
          detail: Web（backmarket.com）、iOS 应用、Android 应用；商品浏览 / 搜索、成色筛选、购物车、结账、订单跟踪、发起退货；Verified Premium 和基于品类的发现
        - id: marketplace-logic
          label: 市场逻辑层
          detail: 自定义搜索和排序算法（价格、质量评分、评价、成色）；面向卖家的定价推荐引擎；跨 2,700 家翻新商的实时库存可见性
        - id: quality-assurance
          label: 质量保障层
          detail: >-
            25 点最低检测标准；4 级成色分级（Excellent / Good / Fair / Verified Premium）；Piceasoft 自动诊断（电池最低
            80%、屏幕、连接性）；卖家质量评分（发货时间、退货率、产品质量）
        - id: seller-services
          label: 卖家服务层
          detail: 卖家入驻和审核；上架管理和批量上传；支付托管（约 14 天冻结）；卖家仪表盘和分析；质量表现不达标会暂停卖家
        - id: partnership-integration
          label: 合作伙伴与集成层
          detail: 结账时运营商增购（Verizon/Visible 美国、Bouygues 法国）；Evy 维修平台预约；应用内 iFixit 维修指南；保险合作伙伴 API；Back Market Pro B2B 门户
        - id: compliance-localization
          label: 合规与本地化层
          detail: GDPR 和 PCI DSS 合规；EU GPSR 卖家文档执行；18 个国家的货币 / 语言 / 监管本地化；为维修权指令做准备
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    summary: Back Market 消费者交易的端到端流程，从发现到设备交付、质量验证和付款释放。
    sourceRefs:
      - SE001
      - SE002
      - SE007
      - SE013
    claimRefs:
      - CE001
      - CE002
      - CE005
      - CE006
      - CE010
      - CE011
    data:
      nodes:
        - id: discovery
          label: 消费者发现 Back Market
          description: 通过 SEO、付费广告、iOS/Android 应用商店或口碑进入；17M+ 客户基础提供社会证明
        - id: browse-search
          label: 按品类 / 成色 / 价格浏览和搜索
          description: 自定义排序算法展示最优商品；Verified Premium 徽章区分近新品设备
        - id: select-listing
          label: 从已审核翻新商中选择商品
          description: 展示卖家质量评分、评价和成色等级；买家选择偏好的翻新商
        - id: checkout-escrow
          label: 结账——付款进入托管
          description: Back Market 持有全额付款；买家有 30 天退货窗口；提供运营商套餐增购（美国 / 法国）
        - id: refurbisher-ships
          label: 翻新商将设备直接发给消费者
          description: 翻新商用自有库存履约并直接发货——Back Market 从不接触设备
        - id: quality-verify
          label: 消费者验证设备质量
          description: 30 天退货窗口生效；1 年保修开始；消费者确认成色与商品描述一致
        - id: payment-release
          label: 付款释放给翻新商（约 14 天）
          description: 冻结期后释放托管款；卖家收到扣除 Back Market 佣金后的净付款
        - id: lifecycle-loop
          label: 消费者进入忠诚循环
          description: 复购、维修平台访问、iFixit 指南，以及潜在 Back Market Pro 升级
