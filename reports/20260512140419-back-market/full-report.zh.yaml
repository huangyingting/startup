      - number: '4.2'
        title: 商业模式与收入拆分
        blocks:
          - type: paragraph
            body: >
              Back Market 运营双边市场，收入模式以佣金为主。核心收入流——约占总收入 68%——是卖家佣金：专业翻新商每笔交易支付约销售价格 10% 的佣金，并支付
              €50/月的平台订阅费。佣金结构带来高运营杠杆：随着 GMV 放大，佣金收入按比例增长，而新增固定成本很少。


              第二收入流（约 14%）是消费者服务费：买家支付约设备价格 2% 的费用，另加每笔 €0.49 的交易服务费。该费用覆盖买家保护、纠纷解决和平台服务。Etsy、Poshmark
              等双边平台也向买卖双方收费；Back Market 则把两侧收费叠加，使总抽成率达到约 14.8%，明显高于 eBay 的约 10%。


              增长最快的板块（约 18%）是附加服务：延长保修和保险（购买时销售）、市场广告（卖家赞助位）、Visible by Verizon 运营商套餐捆绑（美国市场，支持设备 + 套餐购买）、Sony 合作收入和
              iFixit 集成。B2B 垂直业务（Back Market Pro）服务 6,000 家法国公司和 250 家美国公司，提供批量定价和账户管理，估计贡献 $30–50M（收入的
              8–12%），且受企业可持续要求推动，增速快于 B2C。一笔典型智能手机销售的单位经济模型为：约 $330 平均价格 × 14.8% 抽成率 = 约 $49 平台收入 × 约 65% 毛利率 = 每台约 $32
              毛利润。
