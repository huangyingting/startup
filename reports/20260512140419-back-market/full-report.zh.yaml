  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 分地区经审计 EBITDA 利润率
        - Back Market 已宣布全球盈亏平衡，但未披露分地区 EBITDA 利润率或毛利率
        - 基准情景要求 2026 年全球 EBITDA 达到 6-8%；没有地区利润率数据，路径无法验证
        - 要求提供经审计管理账或 CFO 准备、包含分部 EBITDA 的投资者材料包
      - - 2022 年股权结构表优先权条款
        - $510M Series E 轮的清算优先权、棘轮条款、反稀释权和参与权从未公开披露
        - 新资金投资者在给老股或后期新股定价前，需要理解优先权悬顶
        - 要求提供股权结构表摘要，并由法律审查 Series E 优先权条款
      - - Refurbed 德国 GMV 挤出数据
        - Refurbito.com 报道 Refurbed 2026 年在德国超过 Back Market，但 Back Market 尚未回应或披露德国特定 GMV
        - 德国是 Back Market 最大的单一欧洲市场；失去当地领先地位会削弱欧洲护城河溢价
        - 向管理层或通过独立渠道数据索取 Back Market 2024-2025 年德国 GMV 趋势
      - - 维修平台收入运行率
        - 维修平台 2025 年 9 月在法国、德国和西班牙上线，但未披露收入贡献或附加率数据
        - 维修可能带来 1-2% 增量抽佣率；没有运行率数据，乐观情景缺乏支撑
        - 索取维修平台试点 GMV、订单数和利润率贡献
      - - 美国市场 GMV 占比与增长率
        - 美国被描述为第二大市场，但目前约占客户的 20%；未披露美国特定 GMV
        - 美国加速是乐观情景的主要杠杆；未经验证的美国单位经济模型无法支撑 15x 倍数
        - 向管理层索取美国 GMV、抽佣率和客户队列留存
      - - 二级市场交易条款和当前股权结构表
        - 自 2023 年 Sacra 估计以来，近期老股交易没有公开记录价格、数量和买方
        - 机构老股交易能显示知情买家如今实际如何给股权定价
        - 访问股权结构表管理系统（Carta 或同类系统），或向公司索取最近三笔老股交易披露
    notes: 这些是投资关键问题；每一项都可能直接改变建议或可接受入场价格。排序依据是决策影响，而不是获取难度。
