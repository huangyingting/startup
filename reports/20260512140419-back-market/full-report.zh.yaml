  - id: FM004
    title: 采用漏斗 / 价值链地图
    type: flow
    layout: wide
    summary: Back Market 的消费者价值链从价格触发的认知开始，经过质量评估、购买、售后信任，再回到生命周期再进入；每个阶段都可能建立信任，也可能打破信任。
    data:
      nodes:
        - id: n1
          label: 消费者发现翻新渠道
          detail: 价格比价搜索、社会证明或 Back Market 品牌广告触发认知。主要入口是在搜索折扣设备型号时产生的自然搜索流量。
          tone: neutral
        - id: n2
          label: 评估设备等级、保修和卖家
          detail: 消费者评估 Back Market 质量层级（standard、certified、Verified Premium）、保修期限（12–24 个月）和卖家评分。这个阶段的信任是转化的主要门槛。
          tone: neutral
        - id: n3
          label: 通过 Back Market 市场购买
          detail: 交易形成 GMV。Back Market 从交易中赚取佣金。平均订单价值约 $330（Sacra）。估计 70% GMV 来自智能手机和笔记本电脑。
          tone: positive
        - id: n4
          label: 售后保修与支持
          detail: Back Market 支持的 12–24 个月保修，让平台与未经验证的 P2P 渠道区分开来。退货和支持流程是复购与 NPS 的关键。
          tone: positive
        - id: n5
          label: 设备生命周期与潜在以旧换新
          detail: 设备生命周期在消费者手中延续。最终以旧换新或转售会进入下一轮翻新周期。COVID-19 供给管线成熟，以及 iPhone 16 以旧换新，为 2025 年供给补货。
          tone: positive
        - id: n6
          label: 复购与平台忠诚度
          detail: 前一次交易建立的信任推动 LTV。B2B 细分与 Back Market Pro 形成重复设备采购关系。AI 升级周期可能加快复购节奏。
          tone: positive
      edges:
        - from: n1
          to: n2
        - from: n2
          to: n3
        - from: n3
          to: n4
        - from: n4
          to: n5
        - from: n5
          to: n6
