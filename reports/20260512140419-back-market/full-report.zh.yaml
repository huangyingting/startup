        - id: e2
          source: browse-search
          target: select-listing
          label: 搜索结果选择
        - id: e3
          source: select-listing
          target: checkout-escrow
          label: 加入购物车
        - id: e4
          source: checkout-escrow
          target: refurbisher-ships
          label: 订单确认
        - id: e5
          source: refurbisher-ships
          target: quality-verify
          label: 设备送达
        - id: e6
          source: quality-verify
          target: payment-release
          label: 满意度确认
        - id: e7
          source: payment-release
          target: lifecycle-loop
          label: 交易完成
