      - number: '8.4'
        title: 可比公司组合：Vinted、eBay、StockX、Refurbed 与循环电商交易
        blocks:
          - type: paragraph
            body: >-
              最具决策价值的可比公司是 Vinted。它在 2025 年 1 月以 €600 million 收入拿到 €8.2 billion 估值（约 13.7x EV/Revenue）。与 Back Market
              一样，Vinted 是欧洲循环电商市场，拥有双边网络、高毛利率，并且近期实现盈利。关键差异在品类：Vinted 是时尚（单件价值较低），Back Market
              是消费电子（单件价值较高，质量认证负担也更重）。Vinted 的倍数是 Back Market 公共市场愿景的天然上限。


              eBay（NASDAQ: EBAY）是成熟上市可比公司。eBay 2024 年 GMV 为 $73 billion、收入 $10.1 billion，交易倍数约为 2.2x 收入和 0.3x
              GMV。这个折价反映的是低增长和商品化综合市场模式，而不是 Back Market 的循环电商专精和更高抽佣率。给 Back Market 相对 eBay 的溢价——由 32% GMV 增长相对 eBay
              低个位数增长支撑——会得到基于 GMV 的价值：$3.5 billion 乘以 1.5x（eBay 加增长溢价），约等于 $5.25 billion。


              StockX（$3.8 billion 估值、$400 million 收入，约 9.5x）可用于观察高端垂直市场动态，但其覆盖的是下行中的收藏品细分。ThredUp（NASDAQ: TDUP）交易倍数接近
              0.5x 收入，因为其寄售模式承担库存风险，而 Back Market 的纯市场模式避开了这一点。循环电商和二手市场 M&A 交易可比样本显示，战略买家可给 10–14x 收入，财务买家为
              8–10x。战略收购方——最可能是大型零售商（Best Buy、Carrefour、Fnac）或 OEM（Samsung）——可能在内在价值上支付 20–30% 溢价，对应 M&A 退出情景下 $6.5–7.5
              billion。
