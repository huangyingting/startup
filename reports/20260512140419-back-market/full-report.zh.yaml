      - number: '2.2'
        title: 核心需求驱动与市场拐点
        blocks:
          - type: paragraph
            body: >-
              价格敏感度是这个市场最持久的需求驱动。翻新设备通常比可比新零售价低 25–80%；按 Sacra 估算，Back Market 约 $330 的平均售价仅相当于 $900 新智能手机均价的约
              37%。2022–2025 年通胀和生活成本周期中，消费者加速降级消费；Back Market 2025 年 GMV 增长 32% 至 $3.5B，说明这股结构性顺风仍在高速运行。


              第二个需求拐点来自 AI 设备能力。iPhone 15 Pro 支持 Apple Intelligence，Pixel 8 可在端侧运行 Gemini，两者如今都能在 Back Market
              以明显折扣买到。这让消费者可以用低于新机的价格获得 AI 功能，Verified Premium 层级正是 Back Market 在 2024 年对此作出的回应。2020–2022 年 COVID-19
              期间数字设备普及，形成了庞大的二级市场供给管道，并在 2023–2024 年逐步成熟；2024 年末 iPhone 16 系列以旧换新进一步加速翻新供给。随着 ESG 披露要求和范围 3 排放目标推动企业 IT
              买家转向认证翻新设备项目，B2B 企业采用正在增长。Back Market 在 2025 年公告中称，B2B
              是快速增长的垂直领域。不利面包括：市场规模放大后，假货和评级欺诈风险上升；行业缺少标准化评级定义，容易引发逆向选择；Apple 和 Samsung 的 OEM 认证二手项目直接在信任维度竞争，而这正是 Back
              Market 过去掌握的关键维度。
