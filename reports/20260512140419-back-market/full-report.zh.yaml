      - number: '3.4'
        title: 替代品、监管顺风与威胁评估
        blocks:
          - type: paragraph
            body: >-
              除直接市场竞争对手外，Back Market 还面临四类替代压力。OEM 认证项目——Apple Certified Refurbished 和 Samsung
              认证设备——通过制造商保修与品牌背书，在受控价位上直接争夺高端品牌买家。AT&T、Verizon 和 T-Mobile
              运营的运营商以旧换新项目，会在设备进入开放市场渠道之前截留翻新供给，压缩所有市场运营商的漏斗顶端设备流。包括 Facebook Marketplace 和 Craigslist 在内的 P2P
              替代品提供低信任、无保修、无审核的转售，吸引不在意质量保障的价格敏感买家。

              监管层面，欧盟维修权指令强制提高可维修性和备件可得性，提升翻新和维修设备的相对价值，给翻新电子产品带来结构性顺风。欧盟 General Product Safety
              Regulation（GPSR）给市场运营商施加合规负担——Back Market 这类资源充足的平台，比小型竞争对手更容易消化这些成本。Back Market 在 2021–2022 年融资约
              €448M，投资者包括 Eurazeo 和 General Atlantic，并在 2022 年 1 月达到 $5.7B
              估值。这条资本跑道优势形成了持久的融资护城河。欧洲市场情报确认，德国、法国和英国是核心翻新电子产品市场，其中法国稳稳落在 Back Market 阵营，DACH 仍有争夺。运营商以旧换新项目和卖家多平台挂售，是
              Back Market 供应链和利润率位置上最持久的两项结构性竞争压力。
