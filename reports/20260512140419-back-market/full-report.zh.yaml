      - number: '7.4'
        title: 财务与估值风险
        blocks:
          - type: paragraph
            body: >-
              Back Market 的财务风险画像分为两面：经营轨迹在改善——欧洲盈利转正，2025 年实现全球 EBITDA 转正，CEO 称不需要新的外部融资——但资本结构背着显著估值悬置。2022 年 1 月 $5.7
              billion Series E 发生在尚未恢复的市场峰值条件下。Sacra 和 CB Insights 分析显示，当前收入远低于该估值倍数隐含的规模；加上 2022
              年以来风险投资市场倍数压缩，公司纸面上实际上处于水下。如果 Back Market 需要新的增长资本或员工流动性事件，今天可获得的条款相对 Series E 价格会更苛刻。

              收入集中是第二个重要财务风险。智能手机——主要是 iPhone——估计占 GMV 的 60–70%。Apple 若调整设备锁、以旧换新锁定或 FMiP（Find My iPhone）兼容性政策，都可能扰动
              Back Market 最高价值品类的供给或需求。对一家从 18 个国家合并收入的公司而言，EUR/USD/GBP/JPY 汇率暴露并不小；美元走强会压低换算后的报告收入。营运资金管理涉及约 14
              天的卖家付款留存，形成随 GMV 扩大的应付 / 应收动态，也引入交易对手风险。3.5
              年没有新的外部融资，如果盈利持续就可控；但面对需求冲击或竞争性降价反应时，可承受抽佣率压缩的空间有限。财务风险表（TR003）把每项风险映射到传导机制和对冲选项。
