companyProfile:
  summary: >
    Back Market 于 2014 年由 Thibaud Hug de Larauze（CEO）、Quentin Le Brouster（CTO）和 Vianney
    Vaute（CCO）在巴黎创立。它运营双边市场，连接消费者与经过审核的专业翻新商，销售翻新和再生电子产品——主要是智能手机、笔记本电脑和平板电脑——并提供 30 天退货保障、最长 12 个月保修和 25
    点检测标准。平台收入主要来自卖家佣金（约 14.8% 综合抽成率），另有保险、融资和以旧换新服务。到 2022 年 1 月，Back Market 五轮累计融资 $912M；2025 年实现全球 EBITDA 盈利，目标 IPO
    窗口为 2026–2028 年。
