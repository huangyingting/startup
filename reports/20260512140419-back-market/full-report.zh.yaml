      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              2017 年至 2022 年 1 月，Back Market 通过五轮已披露一级股权融资累计募资约 €850M（$1B+）。Series A 于 2017 年完成，规模约 $7.4M，由 Daphni 和
              Aglaé Ventures（Groupe Arnault 旗下风投部门）共同领投，提供了早期机构背书。2018 年，公司完成约 $48M 的 Series B，由 Eurazeo 共同领投。2020 年 5
              月，Series C 融资约 $120M，由 Goldman Sachs 领投，为 COVID-19 期间翻新设备需求激增提供了大量资本。2021 年 5 月，Series D 融资约 $335M，由
              General Atlantic 领投，Goldman Sachs、Eurazeo、Generation Investment Management 参投；彼时 Back Market
              被广泛称为法国估值最高的初创公司。标志性的 Series E 于 2022 年 1 月完成，融资 $510M，post-money 估值 $5.7B，由 Sprints Capital 领投，General
              Atlantic、Goldman Sachs、Generation Investment Management 和 Eurazeo 参投。截至 2025 年 9 月，市场估算将 Back Market
              的隐含估值放在约 €5.1B（$5.5B），略低于 2022 年 1 月一级轮价格。CEO Thibaud Hug de Larauze 于 2025 年 11
              月表示，预计不会再进行新的一级融资，公司可以自我供血。除上述股权融资外，未发现公开披露的债务融资、可转债或二级交易。
