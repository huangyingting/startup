        - 第二大细分；约占翻新市场 15–20%；远程工作常态化带来强需求
      - - 消费级平板电脑和配件
        - 翻新 iPad、Surface 平板、智能手表、耳机
        - 新硬件首发购买、高端礼品购买渠道
        - 寻求二手设备购买性价比的消费者
        - 较小细分；仍在增长；配件补充主设备 GMV
      - - B2B 企业设备更新
        - 面向企业设备队列、带保修 SLA 的认证翻新笔记本电脑和智能手机
        - 新 OEM 批量采购、IT 资产管理租赁、ITAD 计划
        - 企业 IT 经理、采购总监
        - 增长很快；ESG 范围 3 报告和 IT 成本下降是主要触发因素；Back Market Pro 面向该细分
      - - 游戏和音频硬件
        - 翻新游戏主机、耳机、智能音箱
        - 新硬件发布、第一方平台销售
        - 休闲买家、发烧友
        - 机会型品类；供给由游戏主机以旧换新驱动；ASP 较低；不是 Back Market 的主要战略重心
      - - EU / GPSR 制度下销售的产品
        - 在法国、德国、英国、比利时、西班牙、日本和美国销售、具备 GPSR / 本地认证的所有设备品类
        - 未通过 GPSR 测试或不满足 Right to Repair 合规要求的产品
