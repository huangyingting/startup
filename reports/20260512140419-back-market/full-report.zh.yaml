  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Back Market 是一个受管理的双边市场：它连接想买高性价比、经认证翻新电子产品的消费者，以及约 2,700
              家经过筛选的专业翻新商；但公司自己不持有、不仓储、也不发货库存。这个轻资产模式是其单位经济模型的核心——实物流直接从翻新商到消费者，Back Market
              则从每笔交易中抽佣，并提供让买家愿意下单的信任基础设施（保修、质量执法、支付托管）。


              消费者旅程从 backmarket.com 网站或 iOS/Android 移动应用开始，这些是主要渠道。买家按设备类型、成色档位、价格和卖家评分筛选。结账后，Back Market 会把货款放进约 14
              天的托管窗口，再释放给卖家——这是关键的信任机制，让买家有时间核验设备质量，并在必要时发起退货。平台持续按发货时间、退货率和产品质量评分评估卖家；表现不佳者会被暂停上架或清退。


              后端市场逻辑包括一套自研搜索与排序算法，按价格、卖家质量评分、客户评价和设备成色加权，为每次查询呈现最优商品。定价算法也向卖家提供公平市场价建议，帮助这个碎片化翻新商供给侧维持有竞争力的价格。供给筛选、质量执法和算法匹配这三者，共同构成
              Back Market 的核心运营架构。
