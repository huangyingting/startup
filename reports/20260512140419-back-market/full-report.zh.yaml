      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              欧盟 General Product Safety Regulation（GPSR）于 2024 年 12 月开始适用，是最直接的合规风险。GPSR 明确覆盖通过市场平台销售的翻新商品，不只要求个体卖家履责，也对
              Back Market 作为市场运营商施加义务。要求包括在 EU Safety Gate 门户注册、维护内部安全团队、配合市场监管机构，以及落实产品下架和召回流程。Taylor Wessing 的 2025
              年分析把翻新电子产品领域的市场运营商列为 GPSR 主要合规目标。Back Market 横跨 18 个国家，拥有约 2,700 名卖家；核验所有卖家都满足 GPSR
              要求，运营上很复杂，而且单个卖家不合规就可能触发市场层面的责任。

              欧盟 Right to Repair Directive 2024/1799 于 2024 年 7 月 31 日生效，要求成员国在 2026 年 7 月 31 日前完成转化。该指令要求制造商在 5 到 10
              年内向独立维修商提供备件和工具，并禁止限制独立维修商获取零件。总体上，这有利于 Back Market 的维修平台（2025 年 9
              月在法国、德国、西班牙推出），但也增加了合规负担，因为维修平台运营商必须在新框架下运作。Clyde and Co 与 Fieldfisher
              的法律分析确认了合规时间线和范围。美国纽约、俄勒冈、科罗拉多和缅因州已制定维修权法律，为 Back Market 美国业务制造了碎片化合规环境。考虑到 17 百万+ 客户记录，GDPR
              暴露很重要；任何数据泄露都会带来监管和声誉后果。欧盟 Digital Services Act 还对市场运营商施加额外信任与安全义务。跨 18 个国家的跨境 VAT 合规，随着 GMV 增长会进一步增加监管开销。
