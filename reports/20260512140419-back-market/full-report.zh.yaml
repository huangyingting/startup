            body: >-
              Back Market 对所有卖家执行 25 点最低检测要求、标准化 1 年保修和 30 天退货政策，对非结构化转售平台（eBay、Craigslist）形成护城河。4% 的设备故障率接近新设备的
              3%，说明质量控制在发挥作用。Verified Premium 层级（2024 年推出，2025 年约占销售 20%）抓住了高利润率、追求高品质的买家，并进一步区别于通用型市场。
