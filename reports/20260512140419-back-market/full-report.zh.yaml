      - number: '5.5'
        title: 技术合作伙伴与生态护城河
        blocks:
          - type: paragraph
            body: >
              Back Market 的合作伙伴网络，正在构成层次越来越多的生态护城河。Piceasoft 集成把供给侧设备测试标准化；Verizon/Visible 合作（2024 年 9
              月）让美国结账环节可以追加销售无线套餐，产生收入分成，并加深消费者锁定；iFixit 集成用免费维修指南丰富消费者体验；由 Evy 驱动的 Repair 平台则把交易表面延伸到设备维修。


              Verizon 合作尤其值得关注：它代表运营商侧承认翻新设备市场的合法性，也为 Back Market 提供附加收入渠道，同时改善美国消费者的「完整设备生命周期」价值主张。类似的 Bouygues Telecom
              合作服务法国市场，功能相近。


              据报道，Back Market 还在部分市场拥有官方翻新 Sony 设备的独家销售权——这是供给侧优势，新进入的市场平台若没有 Sony 直接合作，很难复制。平台规模本身（17M+ 客户、84M+
              台设备售出、2025 年 $3.5B GMV）形成飞轮防御：更多卖家供给吸引更多买家，反过来又吸引更多卖家，并沉淀更丰富的质量评分数据。
