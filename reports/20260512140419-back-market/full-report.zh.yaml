  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、相邻领域与规模测算口径
        blocks:
          - type: paragraph
            body: >-
              Back Market 的相关市场是精选多品牌翻新和二手消费电子市场，而不是整个电子产品电商。公司的模式明确排除新设备零售、制造商直营店（Apple Refurbished、Samsung Certified
              Re-Newed）、未经验证的 P2P 平台（eBay 消费者列表、Facebook Marketplace）、独立维修服务和纯零部件市场。Back Market
              从专业翻新商与终端买家之间的每笔交易中收取佣金，因此相关 SAM 是全球翻新电子产品交易中，经由精选、有保修、多品牌市场渠道并落在 Back Market 七个经营地域内的部分。SOM 近似采用 Back
              Market 自身 2025 年 $3.5B GMV。


              这个市场的规模估算存在 2 倍跨度，必须保留差异，不能合并成一个数字。MarketResearchFuture 估计，全球翻新电子产品市场 2024 年约为 $67B，到 2032 年增至
              $140.7B，CAGR 为 9.3%。SemiconductorInsight 估计 2024 年为 $64.8B，CAGR 为 11.2%。Consegic Business Intelligence 报告为
              $76.5B，并增长至 2031 年 $140.8B。FundamentalBI 估计 2024 年为 $127B——几乎是 Consegic 或 MRFR
              同年数字的两倍——反映出其品类边界明显更宽，可能纳入未经验证的 P2P 交易、家电和工业设备。对 Back Market 而言，智能手机约占翻新市场收入的 60–70%，笔记本电脑和平板电脑占
              15–20%。多家分析师估算应被视为带有明确方法论限制的区间，而不是可互换的 TAM 输入。
