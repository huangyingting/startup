  - id: TV005
    title: 投资逻辑破裂与否决标准表
    columns:
      - 触发因素
      - 证据阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Refurbed 以挤压 Back Market 为代价，在德国市场份额达到 30%+
        - 公开 GMV 数据，或 Refurbed 融资公告称其 2026 年在德国领先
        - 削弱护城河溢价；减少可触达欧洲 GMV；迫使倍数收缩至 8-9x
        - 下调建议；将目标入场价降至 $4.0-4.5B
      - - 盈亏平衡两年后 EBITDA 利润率仍低于 4%
        - 2026 或 2027 年财务结果，或投资者沟通显示全球 EBITDA 低于 4%
        - 基准情景要求 2026 年利润率达到 6-8%；若无法改善，说明盈利能力脆弱
        - 重新评估规模经济是否具备结构性；除非价格重置到 $4.5B 以下，否则推迟买入
      - - IPO 或退出推迟到 2028 年之后，且没有老股流动性事件
        - 到 2028 年底没有 IPO 申报、延续基金或 M&A 公告
        - 基金生命周期压力迫使折价老股出售；隐含估值向悲观情景下移
        - 要求老股价格按收入 7-8x 定价，或从现有持有人寻求直接流动性
      - - GPSR 合规失败导致卖家明显流失
        - 监管对 Back Market 执法，或欧盟认证卖家数量出现可衡量下降
        - 单台认证成本上升压缩抽佣率；GMV 增长降至 15% 以下
        - 暂停投资工作，直到合规姿态厘清且卖家流失被量化
    notes: 这些是否决标准触发项，不是泛化风险。每个事件都会直接损害支撑基准情景 $6.0B 估值所需的具体假设。 监测每个触发项都需要已确认的数据事件，而不是传闻或分析师估计。
