  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 直接竞争格局与市场结构
        blocks:
          - type: paragraph
            body: >-
              Back Market 处在一个由它帮助开创的品类中，但如今需要防守的竞争集合横跨直接垂直竞争对手、平台型既有玩家、OEM 项目和 P2P 替代品。公司披露 2025 年 GMV 为 $3.5B，同比增长
              32%，这是其全球品类领导地位主张的锚点。结构上最相似的直接对手是 Refurbed，2025 年 GMV 约 €3B，已接近 Back Market 的规模，并在 DACH
              地区增长明显更快。一家独立跟踪来源称，Refurbed 于 2026 年超过 Back Market，成为 DACH 市场领导者；同一时期 Refurbed 在德国增长 38.6%，Back Market 为
              10.8%——这意味着关键欧洲市场出现了重大竞争逆转。

              平台既有玩家层面，eBay 于 2021 年推出专门的 Refurbished 品类，认证项目覆盖 Samsung、Apple、LG 和 Sony。Amazon Renewed 运行在 Prime
              生态内，全球认证翻新产品年销售额估计 $5B+。Swappa 服务美国 P2P 小众市场，GMV 估计 $150–200M——绝对威胁较小，但证明消费者愿意在没有市场保修基础设施的情况下购买翻新产品。Apple
              和 Samsung 也运营认证翻新项目，争夺 Back Market 最高价值 SKU 层级中的高端品牌买家。全球翻新电子产品市场预计到 2030 年将以 10–14% CAGR 增长至
              $80B+，确保竞争奖池会随着品类扩张大幅变大。
