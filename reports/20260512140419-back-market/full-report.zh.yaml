      - number: '7.3'
        title: 竞争与市场结构风险
        blocks:
          - type: paragraph
            body: >-
              2026 年，竞争风险图景明显变尖锐。Refurbito 的分析报告称，Refurbed 已在德国超过 Back Market，成为领先的翻新电子产品平台；Refurbed 在德国约增长 38.6%，Back
              Market 为 10.8%。德国历来是 Back Market 最强的欧洲市场之一；在那里失去增长领导位置，说明采用「精选翻新商市场」模式的垂直专精竞争者也能跑赢。Refurbed 2025 年实现约 €3
              billion GMV，并已证明资本效率，使其成为其他市场的可信挑战者。ECDB 数据此前曾把 Back Market 列为德国领先翻新电子产品市场，更凸显这次逆转的意义。

              平台巨头构成 Back Market 无法完全化解的结构性威胁。Amazon Renewed 和 eBay Refurbished 拥有庞大客户基础、既有信任和履约基础设施。Apple、Samsung 的 OEM
              认证项目带来 OEM 品牌可信度，市场卖家无法匹配。T-Mobile 和 AT&T 等电信运营商认证二手机项目，瞄准价值最高的细分——iPhone 和 Galaxy 设备——而它们构成 Back Market
              GMV 的大头。Back Market 14.8% 的抽佣率暴露在更低费率或零费率替代方案的价格竞争中，尤其当翻新品类成熟、卖家考虑多渠道策略时。Back Market 的应对——Verified Premium
              档位、运营商合作（Verizon 合作已确认）、维修平台和 B2B 扩张——具备可信度，但尚未证明能持续防守抽佣率。竞争威胁表（TR004）按机制和严重度排列这些威胁。
