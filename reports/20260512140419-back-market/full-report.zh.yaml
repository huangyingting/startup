chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              Back Market（backmarket.com）总部位于巴黎，是一个双边市场，直接连接消费者与约 2,700 家经过审核的专业翻新商，后者提供认证翻新的消费电子产品。公司 2014
              年在法国巴黎注册成立，业务落在循环经济原则与市场型电商的交叉点。产品目录覆盖智能手机（Apple iPhone 和 Samsung Galaxy
              是畅销品）、笔记本电脑、平板电脑、游戏主机（PlayStation、Nintendo）、音频设备和家电，市场遍及欧洲、北美（美国和加拿大）、日本、澳大利亚 18 个国家。Back Market 拥有 B-Corp
              认证，强化了环保定位。公司当前处于后期私有独角兽阶段：2022 年 1 月最近一轮一级股权融资的 post-money 估值为 $5.7B；截至 2026 年 5 月尚未宣布新的一级融资，CEO
              称业务已能自我供血。Back Market 的一句话商业模式是：佣金加订阅的市场平台，向卖家收取约 10% 佣金和 €50/月订阅费，向买家收取约 2% 服务费，形成约 14.8%
              的有效抽成率。翻新消费电子市场在 2011 年约占电子产品总销售的 4%，到 2025 年估计升至 36%，这条结构性顺风推动了 Back Market
              收入持续增长。公司全球总部在巴黎，并在纽约、柏林、东京设有办公室。
