          detail: 最大市场；渗透率高；B2B 增长是主要杠杆
          tone: positive
        - label: 美国
          value: ~22%
          detail: 增长最快；运营商合作；聚焦 Apple 设备
          tone: positive
        - label: 德国
          value: ~12%
          detail: 在 DACH 面临 Refurbed 竞争压力；增长落后
          tone: warning
        - label: 英国
          value: ~11%
          detail: Brexit 后供应摩擦；Music Magpie 和 eBay 在本地竞争
          tone: neutral
        - label: 世界其他地区
          value: ~28%
          detail: 另有 14 个国家；日本、澳大利亚、其他欧盟市场
          tone: neutral
    approximationNotes: GMV 份额百分比是根据 Sacra 研究、客户数地理披露和竞争情报推导的估计。Back Market 不公布各市场 GMV。数字应视为量级级别的方向性指标。
    claimRefs:
      - CU030
      - CU031
      - CU032
      - CU033
      - CU034
      - CU045
  - id: FR001
    title: 风险热力图——概率 vs 剩余严重性
    type: matrix
    layout: wide
    summary: Back Market 最高的剩余风险集中在监管合规（GPSR、维修权）和竞争性市场结构（Refurbed、平台巨头），财务和治理风险的剩余敞口也处于中高位。
    data:
      columns:
        - 概率
        - 影响
        - 缓释成熟度
        - 剩余严重性
      rows:
        - label: GPSR 市场平台合规
          values:
            - label: 高
              tone: negative
              detail: December 2024 开始适用；欧盟成员国已启动执法。
            - label: 极高
              tone: negative
              detail: 市场平台责任、召回流程，以及覆盖 2,700 名卖家的筛选。
            - label: 低-中
              tone: warning
              detail: 合规计划正在推进；卖家层面尚未公开验证。
            - label: 高
              tone: negative
              detail: 卖家层面合规确认前，剩余敞口仍高。
        - label: 欧盟维修权指令（July 2026 截止）
          values:
            - label: 高
              tone: negative
              detail: July 2026 前完成转化；随后在 18 个国家执法。
            - label: 高
              tone: warning
              detail: 维修平台运营方义务；若合规，可能形成竞争优势。
            - label: 中
              tone: warning
              detail: 维修平台已上线；法律顾问跟踪各国转化。
            - label: 中-高
              tone: warning
              detail: 机会与风险并存；合规负担是真实成本。
        - label: Refurbed 在德国反超的竞争风险
          values:
            - label: 高
              tone: negative
              detail: 2026 年已确认；向法国和其他市场扩散的可能性可信。
            - label: 高
              tone: negative
              detail: 德国曾是核心市场；若在其他地区复现，抽佣率会承压。
            - label: 中
              tone: warning
              detail: 高端分层、维修、B2B 和运营商合作能部分抵消。
            - label: 中-高
              tone: warning
              detail: 德国逆转已确认；缓释路径可信，但尚未经市场验证。
        - label: $5.7B E 轮估值包袱
          values:
            - label: 高
              tone: negative
              detail: 2022-2026 年风险投资倍数压缩；$5.7B 可能高于当前公允价值。
            - label: 中
              tone: warning
              detail: 期权跌破行权价影响员工士气；若需要资本，条款可能带惩罚性。
            - label: 中
              tone: warning
              detail: 已实现 EBITDA 为正；CEO 称不需要新融资。
            - label: 高
              tone: negative
              detail: 只要按市值重估缺口存在，降价轮或稀释风险就还在。
        - label: 智能手机收入集中
          values:
            - label: 低-中
              tone: warning
              detail: Apple 政策短期内不太可能大幅变化，但尾部风险真实存在。
            - label: 高
              tone: negative
              detail: GMV 60-70% 集中；Apple 供给或锁定政策冲击是传导机制。
            - label: 中
              tone: warning
              detail: 多品牌、多地域卖家基础部分分散敞口。
            - label: 中-高
              tone: warning
              detail: 集中度高且不披露品类，带来承销判断不确定性。
        - label: 关键人物依赖（CEO）
          values:
            - label: 低-中
              tone: warning
              detail: 联合创始人担任 CTO 和 CCO，可降低但不能消除依赖。
            - label: 高
              tone: warning
              detail: CEO 是主要品牌代言人；离任会扰动投资人与媒体叙事。
            - label: 中
              tone: warning
              detail: 联合创始人分布式领导提供部分缓释。
            - label: 中
              tone: warning
              detail: 未披露继任安排；治理结构不透明。
        - label: GDPR 与数据泄露风险
          values:
            - label: 低-中
              tone: warning
              detail: 欧盟电商基线风险；暂无已知事件。
            - label: 极高
              tone: negative
              detail: 17M+ 客户记录；可能带来监管罚款和声誉后果。
            - label: 中
              tone: warning
              detail: 假设有标准 GDPR 合规计划；未独立审计。
            - label: 中
              tone: warning
              detail: 大型消费者数据保管方天然存在剩余风险。
    approximationNotes: 所有评级都是有来源支撑的定性序数评估，并非模型化概率。剩余严重性代表截至 May 2026，对概率、影响和缓释成熟度的综合判断。
    claimRefs:
      - CR011
      - CR013
      - CR001
      - CR017
      - CR020
      - CR024
      - CR016
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Back Market 的关键风险通过少数通道传导到 GMV、抽佣率和融资条件；监管不合规、竞争份额流失和供给集中，最终都压到同一组压力点上。
    data:
      nodes:
        - id: gpsr
          label: GPSR 不合规
          detail: 市场平台层面责任、召回、移除不合规卖家。
          tone: negative
        - id: refurbed
          label: Refurbed 竞争压力
          detail: 德国市场份额被侵蚀；可能扩散到法国和英国。
          tone: warning
        - id: platform-giants
          label: Amazon / eBay Renewed 翻新渠道
          detail: 生态信任和分发削弱 Back Market 的价值主张。
          tone: warning
        - id: smartphone-concentration
          label: 智能手机 / Apple 集中
          detail: GMV 60-70%；Apple 政策或供给冲击会立即传导。
          tone: warning
        - id: valuation
          label: $5.7B 估值包袱
          detail: 员工股权跌破行权价；若需要资本，条款可能带惩罚性。
          tone: negative
        - id: trust
          label: 消费者信任侵蚀
          detail: 质量投诉、欺诈事件、监管行动都会削弱买家信心。
          tone: warning
        - id: gmv
          label: GMV 增长
          detail: 平台规模和网络效应；抽佣模型的收入基础。
          tone: warning
        - id: take-rate
          label: 抽佣率压缩
          detail: 竞争压力、卖家迁移和替代平台挤压 14.8% 抽佣率。
          tone: negative
        - id: margin
          label: 利润率压力
          detail: 抽佣率下降叠加合规和物流成本上升。
          tone: negative
        - id: financing
          label: 融资条件
          detail: EBITDA 为正降低融资需求；若环境恶化，估值包袱会放大风险。
          tone: warning
      edges:
        - from: gpsr
          to: trust
        - from: gpsr
          to: margin
        - from: refurbed
          to: gmv
        - from: refurbed
          to: take-rate
        - from: platform-giants
          to: gmv
        - from: platform-giants
          to: take-rate
        - from: smartphone-concentration
          to: gmv
        - from: trust
          to: gmv
        - from: gmv
          to: take-rate
        - from: take-rate
          to: margin
        - from: margin
          to: financing
        - from: valuation
          to: financing
    approximationNotes: 传导图是方向性、定性的；边表示因果方向，不代表概率权重。节点标签为便于阅读做了简化。
    claimRefs:
      - CR013
      - CR001
      - CR004
      - CR020
      - CR005
      - CR010
      - CR039
  - id: FR003
    title: 监管合规时间线——Back Market 关键里程碑
    type: timeline
    layout: wide
    summary: 2022 至 2026 年的关键监管截止日期和 Back Market 合规里程碑，显示欧盟监管义务的集中度以及公司的应对动作。
    data:
      items:
        - date: 2022-01
          label: E 轮融资与裁员
          detail: $5.7B 融资和 93 名员工重组；印度扩张暂停。
          tone: warning
        - date: 2023-09
          label: B-Corp 认证续期
          detail: 维持 B-Corp 身份；公布 CO2 避免排放指标。
          tone: positive
        - date: 2024-07
          label: 欧盟维修权指令生效
          detail: 指令 2024/1799 于 July 31 2024 生效；成员国需在 July 2026 前完成转化。
          tone: warning
        - date: 2024-12
          label: GPSR 开始适用
          detail: 《通用产品安全法规》自 December 2024 起适用；市场平台运营方义务生效。
          tone: negative
        - date: 2025-09
          label: 维修平台上线（法国、德国、西班牙）
          detail: Back Market 在三个欧盟市场上线维修服务；为维修权合规定位。
          tone: positive
        - date: 2026-05
          label: Refurbed 在德国超过 Back Market
          detail: Refurbed 报告在德国增长 +38.6%，Back Market 为 +10.8%；竞争风险已实质化。
          tone: negative
        - date: 2026-07
          label: 欧盟维修权转化截止
          detail: 成员国必须在 July 31 2026 前将指令 2024/1799 转化为国内法。
          tone: warning
        - date: 2027-01
          label: 预计 GPSR 首轮执法周期
          detail: 预计国家市场监管机构开展首轮系统性合规检查。
          tone: warning
    approximationNotes: 预计 2027 执法周期是基于典型欧盟监管执法节奏的估计；官方尚未发布公告。其他日期均来自官方或新闻来源。
    claimRefs:
      - CR011
      - CR013
      - CR017
      - CR022
      - CR001
      - CR035
  - id: FR004
    title: 按剩余严重性划分的风险类别分布
    type: bar
    layout: standard
    summary: 按风险类别给出剩余严重性得分，使用 1-5 定性序数尺度，其中 5 = 极高、1 = 低。监管和竞争风险的剩余严重性合计最高。
    data:
      xAxis: 风险类别
      yAxis: 综合剩余严重性得分（1–5 序数）
      items:
        - label: 监管合规
          value: 4
          note: GPSR + 维修权 + DSA + GDPR + 美国州法；未缓释风险栈最高。
          tone: negative
        - label: 竞争性市场结构
          value: 4
          note: Refurbed 反超已确认；Amazon/eBay 具结构性压力；OEM 和运营商计划活跃。
          tone: negative
        - label: 财务与估值
          value: 3
          note: 估值包袱高；经营轨迹改善；集中风险中-高。
          tone: warning
        - label: 质量与消费者信任
          value: 3
          note: 4% 故障率；2,700 名卖家；检查、质保和评分机制缓释较好。
          tone: warning
        - label: 治理与管理
          value: 3
          note: 关键人物依赖；治理不透明；印度暂停；员工股权跌破行权价。
          tone: warning
        - label: 供应链与宏观
          value: 2
          note: iPhone 集中；关税尾部风险；新品价格通缩情景。
          tone: warning
    approximationNotes: 得分是来自风险登记表的定性综合评估，并非量化模型输出。每个类别汇总多项风险；柱形代表该类别内最高剩余严重性。
    claimRefs:
      - CR011
      - CR001
      - CR039
      - CR010
      - CR024
      - CR038
  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 观察建议来自已确认的 GMV 动能和盈利里程碑，但仍要面对未解决的估值锚和竞争风险；股权结构表不透明是摇摆因素。
    data:
      nodes:
        - id: gmv
          label: $3.5B 2025 GMV（+32%）
          detail: 官方 GMV 已在 January 2026 新闻稿中确认；增速为该循环电商赛道最快。
          tone: positive
        - id: profit
          label: 2025 EBITDA 盈亏平衡
          detail: CEO 确认首个全球 EBITDA 转正年份；规模带来的经营杠杆开始释放。
          tone: positive
        - id: regulation
          label: 欧盟维修权顺风
          detail: 欧盟指令 2024/1782 将 CE 品类可维修性要求延续至 2027；直接扩大翻新 TAM。
          tone: positive
        - id: price
          label: $5.1-5.7B 估值区间
          detail: CEO 称 €5.1B；E 轮锚点为 $5.7B；2023 年老股交易为 $3-4B。$2.7B 的区间要求价格纪律。
          tone: warning
        - id: competition
          label: Refurbed 德国竞争风险
          detail: Refurbed GMV 突破 €3B，并称 2026 年在德国市场领先；Back Market 没有可用的反驳数据。
          tone: warning
        - id: disclosure
          label: 无已提交财务文件
          detail: Back Market 是法国 SAS，未公开提交财务文件；EBITDA 利润率、优先股堆叠和股权结构表都不透明。
          tone: warning
        - id: output
          label: 观察建议
          detail: 保持跟进。把入场价格纪律定在 $4.5-5.5B。只有审计后利润率和退出路径确认后，才上调至买入。
          tone: neutral
      edges:
        - from: gmv
          to: price
        - from: profit
          to: price
        - from: regulation
          to: price
        - from: price
          to: output
        - from: competition
          to: output
        - from: disclosure
          to: output
    approximationNotes: null
    claimRefs:
      - CV001
      - CV003
      - CV007
      - CV009
      - CV022
      - CV028
      - CV030
      - CV034
  - id: FV002
    title: 估值敏感性——基于 $500M 2025E 收入、不同收入倍数下的企业价值
    type: bar
    layout: standard
    summary: 悲观到乐观的估值区间为 $4.0-7.5B；CEO 所称约 $5.5B 对应 11x，与盈利型市场平台溢价一致，略低于 Vinted 可比倍数。
    data:
      items:
        - label: 悲观情景（8x）
          value: 4
          detail: 十亿美元；基于 $500M 2025E 收入的 8x；假设 Refurbed 压力、GPSR 成本和 IPO 推迟。
          tone: negative
        - label: CEO 隐含（~10-11x）
          value: 5.5
          detail: 十亿美元；CEO 所称截至 2025 年企业价值 €5.1B（$5.5B）；与约 11x 往绩收入一致。
          tone: warning
        - label: 基准情景（12x）
          value: 6
          detail: 十亿美元；基于 $500M 2025E 收入的 12x；与盈利型欧洲市场平台可比公司和 Vinted 上限对齐。
          tone: neutral
        - label: Vinted 可比（13.7x）
          value: 6.85
          detail: 十亿美元；若 Back Market 在 $500M 收入上拿到 Vinted 的 13.7x 倍数；需要类似的盈利证据。
          tone: neutral
        - label: 乐观情景（15x）
          value: 7.5
          detail: 十亿美元；基于 $500M 2025E 收入的 15x；需要美国加速、维修平台规模化和 IPO 溢价。
          tone: positive
    approximationNotes: 企业价值是以 $500M 作为 2025 年收入中枢估计的简单 EV/revenue 桥接，不是折现现金流输出。CEO 隐含数值按 1.08 EUR/USD 从 €5.1B 换算。
    claimRefs:
      - CV003
      - CV011
      - CV012
      - CV013
      - CV014
      - CV017
  - id: FV003
    title: 估值 / 回报区间——悲观、基准与乐观情景
    type: range
    layout: wide
    summary: 悲观到乐观区间为 $3.5-8.5B；$5.0-6.5B 的基准情景由收入倍数、GMV 倍数和 DCF 三角验证支撑。
    data:
      items:
        - label: 悲观情景
          low: 3500
          mid: 4000
          high: 4500
          displayValue: $3.5B-$4.5B
          detail: 8-9x 收入；Refurbed 竞争侵蚀护城河；GPSR 推高成本；IPO 推迟到 2028 之后。
          tone: negative
        - label: 基准情景
          low: 5000
          mid: 6000
          high: 6500
          displayValue: $5.0B-$6.5B
          detail: 10-13x 收入；EBITDA 里程碑延续；GMV 增长 25%+；IPO 窗口 2026-2028；与 CEO 估计和 Vinted 可比一致。
          tone: warning
        - label: 乐观情景
          low: 6500
          mid: 7500
          high: 8500
          displayValue: $6.5B-$8.5B
          detail: 13-17x 收入；美国加速、维修平台变现和战略 M&A 溢价；对标 Vinted 上限和 OEM 协同买家。
          tone: positive
    approximationNotes: 区间是基于 $500M 2025E 收入的情景化收入倍数输出。中点使用中枢倍数；上下限反映每个情景内 ±1x 的倍数范围。数值以百万美元表示。
