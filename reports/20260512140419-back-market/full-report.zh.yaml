      - number: '5.3'
        title: 产品组合与品类经济性
        blocks:
          - type: paragraph
            body: >
              智能手机贡献 Back Market 约 60–70% 的 GMV，是最大品类。需求主要来自消费者想以更低价格购买 iPhone 和 Samsung Galaxy
              等设备；这些产品相对新品零售价的翻新折扣最直观。笔记本电脑和 MacBook 约占 GMV 的 15–20%；平板（iPad、Samsung Tab）约贡献
              10%；游戏主机（PlayStation、Nintendo Switch）和音频设备（AirPods、耳机）分别约贡献 5% 和 3%；家电是最小品类，约 2%。


              2024 年推出的 Verified Premium 显著抬高了 ASP 组合。Verified Premium 设备 ASP 约 $400–450，比平台整体约 $330 的平均水平高约 21–36%；到
              2025 年，这一档位已约占 Back Market 销量的 20%。该档位直击质量感知壁垒，过去这道壁垒让高端买家群体不愿购买翻新电子产品。由于 ASP
              更高，该细分也带来更高的单笔交易毛利，改善平台整体抽佣率经济性。


              2025 年，公司推出 AI 辅助上架能力，为卖家自动生成产品描述并验证成色分级，同时基于浏览和购买历史向消费者提供个性化推荐。除高层次营销说法外，这些 AI 功能的完整技术架构尚未公开披露。
