      - number: '1.4'
        title: 规模、财务指标与商业模式
        blocks:
          - type: paragraph
            body: >-
              Back Market 的财务和运营指标显示，公司在快速增长的同时，单位经济模型也在改善。2025 年，公司披露 GMV 为 $3.5B，同比增长 32%。Sacra 等分析师估算，2024 年收入约
              $415M（相较 2023 年的 €320M / ~$340M 约增长 25%）。Back Market 于 2024 年在法国和欧洲实现 EBITDA 盈利，并于 2025 年宣布全球 EBITDA
              盈利。平台全球累计客户超过 17M，自成立以来促成超过 84M 台翻新设备售出。平均售价约 $330。收入结构约为：68% 来自卖家佣金，14% 来自面向消费者的服务费（包括约 2% 买家费和每笔 €0.49
              的交易服务费），18% 来自保险、延长保修、广告、运营商合作等附加服务。Back Market 的 B2B 部门（Back Market Pro）截至 2025 年服务法国约 6,000 家企业客户和美国 250
              家企业客户，知名客户包括 Kering、Vinci 和 Air France。公司估计平台已避免约 1.6B 千克 CO2 当量排放。Verified Premium 设备层级于 2024
              年推出，服务追求近新设备和额外保障的买家，目前约占平台销售的 20%。截至 2026 年，员工数估计约 978 人，已从 2022 年后重组低点的约 700 人恢复。
