      - number: '7.5'
        title: 质量、供应链、治理与 ESG 风险
        blocks:
          - type: paragraph
            body: >-
              质量与消费者信任风险真实存在，但相比监管和竞争风险堆栈，缓释程度相对更好。Back Market 设备故障率约 4%，新设备为
              3%——差距并不巨大，但足以在成色不符、电池老化、发货慢等类别中引发客户投诉。RatingFacts 和 AliDrop 分析记录了反复出现的投诉主题。2,700 家卖家的市场天然带来质量差异；Back
              Market 的 25 项检查标准、Piceasoft 测试集成、卖家质量评分和 1 年保修提供了有意义的缓释，但平台上一旦发生高曝光故障或欺诈事件，考虑到公司规模和媒体可见度，品牌信任可能被不成比例地伤害。

              供应链风险由 Apple iPhone 供给集中驱动。Apple 扩大以旧换新和自助维修项目，可能减少第三方翻新商可获得的设备量。美国对中国电子部件征收关税，可能抬高 Back Market
              卖家网络的投入成本。地缘政治紧张为维修部件供应链增加尾部风险，并影响所有 18 个市场。

              治理透明度较薄：公司未公开独立董事会构成，创始人控制结构让战略缺少外部制衡。CEO Thibaud Hug de Larauze 的关键人物依赖，是主要治理风险；联合创始人担任 CTO 和
              CCO，可提供一定缓释。2022 年裁员留下文化和士气悬置；印度扩张也在同一时期暂停且尚未恢复，显示公司进入复杂市场存在困难。ESG 风险包括 1.6 billion kg CO2
              减排说法，该指标采用公司自行计算方法，未经过独立审计——这是洗绿风险，而 B-Corp 认证状态会放大该风险。
