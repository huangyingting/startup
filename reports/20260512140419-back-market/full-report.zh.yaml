      - number: '6.2'
        title: Back Market Pro——由可持续要求和成本节省驱动的 B2B 企业板块
        blocks:
          - type: paragraph
            body: >-
              Back Market 的 B2B 部门 Back Market Pro，截至 2025 年初服务法国约 6,000 家公司、美国 250 家公司。已披露的企业客户包括 Kering、Vinci、Air
              France 和法国媒体 Le Point，说明采用范围横跨奢侈品、基础设施、航空和媒体，并非局限于狭窄垂直行业。B2B 价值主张有两条线：比购买新设备节省 30–50% 成本，以及越来越强的监管要求。欧盟
              Corporate Sustainability Reporting Directive（CSRD）自 2024 年起要求大型公司披露并降低供应链环境影响，首次让设备循环成为可衡量 KPI。Back Market
              Pro 的设备队列报告和发票管理工具，正是为这一报告要求而定位。服务功能包括批量订购、专属客户经理和合并账单，降低 IT 和可持续团队的采购摩擦。B2B 收入估计为 $30–50 million（约占总收入
              8–12%），但 Back Market 未公开拆分该板块。美国企业渠道明显比法国更早期；如果 CSRD 框架或类似美国 ESG 报告标准扩大可触达企业买家池，仍有显著上行空间。Right to Repair
              Directive 和 General Product Safety Regulation 也会强化供给侧，让翻新商拥有更清晰的监管地位，并提高大规模供应给企业买家的设备质量。
