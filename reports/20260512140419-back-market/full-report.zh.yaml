  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: Back Market 的 B2C 客户旅程从价格驱动的发现开始，经过首次购买和质保体验，再到满意度带来的复购。B2B 路径另走一条线：买家先研究可持续发展要求，再推进采购审批，而不是被搜索意图驱动。
    data:
      nodes:
        - id: discover
          label: 发现
          detail: B2C 买家通过自然搜索（翻新 iPhone）、付费社媒和环保媒体找到 Back Market。B2B 买家则通过 LinkedIn 或 ESG 咨询转介绍接触到公司。
          tone: positive
        - id: evaluate
          label: 评估
          detail: B-Corp、质保、30 天退货、App 评分等信任信号，抵消翻新设备天然的质量不确定性。相对新品的价差是主要转化触发点。
          tone: neutral
        - id: purchase
          label: 购买
          detail: 平均交易额约 $330。运营商捆绑选项（美国 Visible/Verizon）拉高客单价。平台还提供设备 + 保护壳捆绑。
          tone: positive
        - id: experience
          label: 购后体验
          detail: 多数买家收到的设备与描述一致（正面评价占主导）。少数遇到物流延迟或成色不符；<24h 的质保索赔目标降低流失。
          tone: neutral
        - id: repeat
          label: 复购与推荐
          detail: 约 56% 的购买来自复购买家。推荐计划和环保身份认同（「我买翻新机」）推动自然口碑，也带来面向家人的赠礼。
          tone: positive
    approximationNotes: 旅程步骤来自评论分析和公司披露指标；公司未公开披露各阶段之间的漏斗转化数据。
    claimRefs:
      - CU004
      - CU005
      - CU006
      - CU007
      - CU017
      - CU025
      - CU026
  - id: FU002
    title: 采用 / 部署漏斗
    type: flow
    layout: wide
    summary: Back Market 的获客从自然搜索优势开始，经过平台信任转化，再进入复购队列。B2B 路径在发现阶段分叉，最终在平台质保和报告层汇合。
    data:
      nodes:
        - id: search
          label: 搜索意图发现
          detail: 在设备特定的翻新查询上，自然搜索流量占优，能先于竞争对手截获高意图买家。域名权威和品类宽度进一步巩固 SEO 优势。
          tone: positive
        - id: trust
          label: 信任转化
          detail: 质量页面、B-Corp 徽章、App 评分 4.6/5 和 1 年质保，抵消翻新污名，推动首次访客结账。
          tone: positive
        - id: firstpurchase
          label: 首次购买
          detail: 平均交易约 $330。免费退货和 Back Market 保证降低购后焦虑，为良好的首次体验打底。
          tone: positive
        - id: satisfaction
          label: 购后满意度
          detail: 质保索赔目标在 <24h 内解决。多数评价肯定设备质量和性价比；少数买家遇到卖家差异问题。
          tone: neutral
        - id: repeat
          label: 复购队列
          detail: 56% 复购率说明买家会回来。环保身份认同和推荐计划让品牌关系不止于单次交易。
          tone: positive
      edges:
        - from: search
          to: trust
        - from: trust
          to: firstpurchase
        - from: firstpurchase
          to: satisfaction
        - from: satisfaction
          to: repeat
    approximationNotes: 各阶段之间的漏斗转化率未公开披露；步骤依据公司战略表述、评论分析和 Sacra 研究推断。
    claimRefs:
      - CU001
      - CU004
      - CU006
      - CU015
      - CU023
      - CU029
  - id: FU003
    title: 按市场划分的 GMV 地理分布
    type: kpi
    layout: standard
    summary: Back Market 的 GMV 分布在 18 个国家，没有单一市场超过 30%。法国和美国合计约占 GMV 的 45–50%，法国以外的欧洲贡献另外 35–40%。
    data:
      items:
        - label: 法国
