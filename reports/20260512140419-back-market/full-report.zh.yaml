              - CV044
          - type: callout
            title: Refurbed 德国竞争是击穿投资逻辑的风险
            body: 如果 Refurbed 2026 年声称在德国超过 Back Market 的说法成立，支撑 12x+ 倍数的欧洲护城河溢价会被直接削弱，估值也会回落到熊市情景。
            calloutType: risk
            claimRefs:
