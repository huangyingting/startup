      - number: '1.5'
        title: 关键里程碑与不利事件
        blocks:
          - type: paragraph
            body: >-
              Back Market 的公司历史覆盖创立、融资、产品扩张、合作、监管背景，以及一次影响较大的裁员事件。公司 2014 年上线，并通过五轮融资增长，最终在 2022 年 1 月 Series E
              时完成当时法国规模最大的初创公司融资。2022 年中，在融资高峰后环境和全球宏观收紧背景下，Back Market 宣布裁员 93 人，约占当时约 700 人团队的 13%，主要影响公共事务和市场岗位。CEO
              称这是实现盈利所需的再校准；公司随后在 2024 年实现欧洲盈利，2025 年实现全球 EBITDA 盈利。重要产品里程碑包括 2024 年推出 Verified Premium 设备层级，2024 年 9
              月达成 Visible by Verizon 运营商合作（强化美国市场），以及 2025 年 9 月在法国、德国、西班牙推出由 Evy 支持的维修平台。公司于 2025 年 4 月宣布与 iFixit
              合作提供维修指南。欧盟维修权指令（Directive 2024/1799）于 2026 年 7 月达到转置截止期限，要求欧盟成员国确保可维修性，预计将强化翻新和可维修电子产品的结构性需求。Back Market
              入选 TIME 2026 年 100 Most Influential Companies。公司至少自 2022 年起探索印度扩张，但截至运行日仍处于暂停状态。未发现针对公司的重大诉讼、制裁或监管执法行动。
