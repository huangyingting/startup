            title: 当前结论：坚定跟踪
            body: Back Market 已兑现首次 EBITDA 盈亏平衡里程碑，并拥有可防御的市场溢价。新资金应瞄准 $4.5–5.5B 入场价，并把清晰的 IPO 或 M&A 时点作为升级触发器。
            calloutType: recommendation
            claimRefs:
              - CV001
              - CV009
              - CV022
          - type: callout
            title: 盈利能力 + 维修权 = 结构性顺风
            body: 在 $3.5B GMV 上实现 EBITDA 盈亏平衡，同时受益于欧盟可维修性要求，会形成一条持续到 2027 年、并由监管强化的耐久增长曲线。
            calloutType: strength
            claimRefs:
              - CV009
