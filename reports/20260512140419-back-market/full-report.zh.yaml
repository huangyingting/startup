      - number: '4.3'
        title: 融资历史与资本效率
        blocks:
          - type: paragraph
            body: >
              2017 年至 2022 年 1 月，Back Market 通过五轮一级股权融资累计募资约 $1.02B（≈€850M）。Series A（$7.4M，2017）由 Daphni 和 Aglaé
              Ventures 领投；Series B（$48M，2018）由 Eurazeo 领投；Series C（$120M，2020）由 COVID 期间的 Goldman Sachs 领投；Series
              D（$335M，2021）由 General Atlantic 领投；Series E（$510M，2022 年 1 月）由 Sprints Capital 领投，估值
              $5.7B——这是公司最后一轮已知一级融资。Eurazeo 从 Series B 到 E 持续参投，仍是最大机构股东。


              从资本效率看，Back Market 的 GMV / 累计融资比约为 3.4x（$3.5B GMV / $1.02B 融资）。相比之下，Refurbed 仅融资 €100M 就达到 €3B GMV（约 30x
              效率），Back Market 明显不占优；不过 Refurbed 的地域覆盖和市场投放更小。资本效率差距部分来自 Back Market
              早期激进进入美国和亚洲市场、品牌建设上更高的市场投入（电视广告），以及在碎片化欧洲市场搭建信任基础设施（质量评级、卖家入驻、物流合作）的成本。


              以 $5.7B Series E 估值计算，隐含收入倍数约为 2024 年历史收入（$415M）的 13.7x，与 Vinted 的约 13.7x（€8.2B / €600M）相当。不过，据称 2023–2024
              年二级市场交易隐含较峰值约 30–47% 的估值折价，这与后期私营科技估值整体修正一致。
