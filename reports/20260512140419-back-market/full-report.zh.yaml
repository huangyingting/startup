      - number: '5.6'
        title: 安全、合规与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Back Market 符合 GDPR（欧盟消费者数据）和 PCI DSS（支付卡处理）。2024 年 12 月生效的欧盟 General Product Safety
              Regulation（GPSR）明确覆盖翻新商品，并对市场卖家提出新的产品文件和可追溯要求。Back Market 已承认 GPSR 适用；卖家合规能否被执行，仍是关键落地问题。欧盟 Right to
              Repair Directive（要求成员国在 2026 年 7 月前完成转化）是需求侧催化剂：它赋予消费者以合理成本维修设备的权利，从而放大 Back Market 推出维修平台的时点价值。


              核心尽调缺口：公司未公开披露 ISO 27001 或 SOC 2 Type II 认证。卖家欺诈检测方法以及 AI/推荐系统架构，除营销层描述外均未披露。据报道，Back Market 在欧洲的主要竞争对手
              Refurbed 于 2026 年在欧洲网站流量上超过 Back Market，显示公司本土区域存在竞争压力。支撑搜索、排序和 AI 辅助上架的完整技术栈，尚未有独立文件记录。
