      - number: '5.4'
        title: 创新路线图与近期发布
        blocks:
          - type: paragraph
            body: >
              Back Market 在 2024–2025 年的创新动作覆盖面很广。影响最大的产品新增项是 Verified Premium 档位（2024 年推出），它填补了翻新市场高端端口的空白，并在一年内达到约 20%
              的销售渗透率。该档位要求无磨损，标准高于现有允许轻微外观磨损的「Excellent」等级，因此需要追加检查投入，但已带来可衡量的 ASP 抬升。


              2025 年 4 月，Back Market 与 iFixit 正式建立合作。iFixit 是全球最大的开源维修指南平台；合作把设备维修说明直接整合进 Back Market 消费者应用。这让 Back
              Market 不只是设备交易市场，也成为支持维修的资源入口，提前承接维修权消费者需求和监管顺风——欧盟指令需在 2026 年 7 月前转化为成员国法律。


              2025 年 9 月，Back Market 推出由第三方维修市场创业公司 Evy 驱动的专门 Repair 平台，首批市场为法国、德国和西班牙。该平台连接消费者与本地维修技师，并计划通过分销合作达到 500
              个销售点。这是公司从买卖市场迈向完整循环电子产品生命周期平台的战略扩张——但维修服务仍处早期，技师网络深度和 NPS 尚未得到公开验证。


              B2B 板块 Back Market Pro 已在法国增长到 6,000 家企业客户，在美国达到 250 家，通过批量订购、发票管理和资产追踪工具，服务企业 ESG 采购要求。
