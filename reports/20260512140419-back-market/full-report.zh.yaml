  - id: FM001
    title: 市场规模测算视角
    type: pyramid
    layout: standard
    summary: Back Market 2025 年 $3.5B GMV 的可获取市场（SOM）落在欧洲约 $18B–$35B 的可服务市场（SAM）之内；按品类边界不同，全球总可用市场（TAM）在 $65B 至 $127B 之间。
    data:
      nodes:
        - label: 全球二手电子产品 TAM：$64.8B–$127B（2024）
          detail: 分析师来源给出的区间从 SemiconductorInsight 的低端 $64.8B 到 FundamentalBI 的高端 $127B。差距反映真实边界差异，不是预测错误。
          tone: positive
        - label: 全球翻新电子产品 TAM 预测：$140.7B–$140.8B（2031–2032）
          detail: MRFR 预测 2032 年达到 $140.7B（CAGR 9.3%）；Consegic BI 预测 2031 年达到 $140.8B（CAGR 9.1%）。尽管 2024 年基数不同，终值估计趋同。
          tone: positive
