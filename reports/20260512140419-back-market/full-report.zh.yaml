  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: B2C 客户基础——17 百万注册买家，分布在四个清晰细分
        blocks:
          - type: paragraph
            body: >-
              Back Market 报告称，截至 2025 年，其全球注册客户超过 17 百万，累计设备销量超过 84 百万台。平均交易额约为每台设备 $330；Sacra 估计，约 56%
              的购买来自复购买家——这说明平台黏性真实存在，而不只是一次性捡便宜行为。现有证据显示出四类清晰的 B2C 买家画像。价格敏感型买家是最广泛的群体：他们寻找比新品零售价低
              40–70%、但具备旗舰级质量的设备，主要通过自然搜索和付费获客进入。环保倡导者是结构上重要的第二类人群；Back Market 估计，购买一台翻新智能手机相对新设备可节省约 70 kg CO2，公司
              B-Corp 认证和碳影响计算器给了这一群体可触摸的证明点。性能型买家想用上一代价格买到最新一代设备——例如以 iPhone 12 的价格买 iPhone 14
              Pro——在美国市场尤其活跃。第四类是礼品购买者，他们为家人购买翻新设备，购买量往往集中在季节性周期。四类人群都依赖 Back Market 的信任架构：1 年保修、30
              天退货窗口，以及平台自己的消费者保证（卖家未履约时由 Back Market 承担责任），是主要转化杠杆。应用商店评分——美国 iOS 为 4.6/5，Google Play 约
              4.5/5——显示购后满意度整体偏正面，也强化了复购行为。
