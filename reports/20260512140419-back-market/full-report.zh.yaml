  - id: FV004
    title: 投资 KPI——Back Market 的 IC 就绪评分
    type: kpi
    layout: standard
    summary: Back Market 在市场动能和盈利里程碑上得分较好，但证据质量和竞争清晰度仍有明显缺口，综合结果停留在观察。
    data:
      items:
        - label: 市场规模与增长
          score: 8
          detail: 翻新电子市场预计到 2030 年超过 $182B，CAGR 为 10-13%；监管顺风增加增量需求。
          tone: positive
        - label: GMV 与收入轨迹
          score: 8
          detail: $3.5B GMV（+32%）、约 $500M 估计 2025 收入、14.8% 抽佣率已在 18 个市场确认。
          tone: positive
        - label: 盈利里程碑
          score: 7
          detail: 2025 年首次实现全球 EBITDA 盈亏平衡；但盈亏平衡以上的利润率尚未公开确认，轨迹也不清晰。
          tone: positive
        - label: 护城河与可防御性
          score: 6
          detail: 16M+ 客户和质量认证护城河很强；Refurbed 在德国上升，对欧洲溢价构成实质挑战。
          tone: positive
        - label: 可比溢价支撑
          score: 7
          detail: Vinted 可比 13.7x 和 DCF 三角验证都支撑 $5-6B 基准情景；相对 2022 峰值的倍数压缩已结构性完成。
          tone: neutral
        - label: 竞争风险
          score: 4
          detail: Refurbed 称 2026 年在德国领先；Back Market 尚未公开反驳；溢价倍数下的护城河因此不确定。
          tone: warning
        - label: 估值锚风险
          score: 4
          detail: 2022 年 $5.7B 标记会给现有投资人带来锚定偏差；2023 年老股市场隐含 40% 折价；新资金必须独立定价。
          tone: warning
        - label: 证据与披露质量
          score: 3
          detail: 没有公开财务文件；EBITDA 利润率未披露；优先股堆叠不透明；老股交易数据仅限 2023 年 Sacra 估计。
          tone: warning
    approximationNotes: 得分是为 IC 讨论而基于公开证据综合形成的 0-10 序数判断。
    claimRefs:
      - CV007
      - CV009
      - CV017
      - CV021
      - CV027
      - CV029
      - CV030
      - CV033
      - CV034
      - CV045
