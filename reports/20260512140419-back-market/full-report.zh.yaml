      - number: '4.4'
        title: 盈利路径与资本充足性
        blocks:
          - type: paragraph
            body: >
              Back Market 的盈利路径体现了从不计成本增长转向可持续运营的有意切换。公司在 2022–2023 年仍处亏损，将已融资资本投入市场、技术和地域扩张。2022–2023 年融资荒之后进入节俭阶段：公司已在
              2022 年 1 月峰值估值时融资 $510M，于是在全球新风投资本稀缺时优先提升效率。


              到 2024 年末，欧洲业务实现 EBITDA 盈利，EBITDA margin 约 35%——这是底层市场经济模型成熟后可行的强信号。到 2025 全年，公司达到全球 EBITDA 打平或更好。CEO
              Thibaud Hénin de Lassée 明确表示，「公司不需要再融资」，并且「能够自我维持」——这消除了许多后期私营科技公司面临的近期再融资风险。


              Back Market 的市场模式带来结构上有利的资本充足性：不积累库存、没有制造
              capex，且销售时先收到佣金，再向卖家付款。公司没有公开披露的债务融资。营运资本天然为正：平台在购买时收取买家付款（包括佣金），并持有资金直到交付后买家确认。管理层确认未来无需融资，降低了现有投资者的稀释风险，但也减少了短期估值上调事件的催化剂。
