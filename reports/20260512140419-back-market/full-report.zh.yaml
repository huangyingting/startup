      - number: '2.4'
        title: 政策顺风、监管逆风与结构性风险
        blocks:
          - type: paragraph
            body: >-
              欧盟维修权指令 2024/1799 于 2024 年 7 月 31 日生效，成员国必须在 2026 年 7 月 31
              日前转置为国内法。指令要求制造商向消费者和独立维修商提供备件、工具和维修信息，从结构上降低专业翻新的成本，并扩大 Back Market 卖家生态中具备经济可修性的设备池。Back Market
              是这项立法的直接受益方，因为它让独立翻新更具成本竞争力。另一个规则是欧盟 General Product Safety Regulation，2024 年 12
              月生效，明确覆盖欧洲市场销售的翻新商品，增加市场运营商的合规要求，但也提高新平台的进入成本，并强化成熟认证运营商的地位。


              结构性风险清单中有三项重要内容。第一，来自 Refurbed 的竞争压力——2025 年 GMV 接近
              €3B——说明欧洲市场领导权仍有争夺，并不存在明显垄断。第二，随着市场规模增长，假货和设备评级错误风险升级；行业缺少标准化评级定义，可能造成逆向选择，并在规模化后削弱消费者信任。第三，Apple 和
              Samsung 的 OEM 认证二手项目直接竞争 Back Market 过去掌握的信任维度。Ellen MacArthur Foundation 和 World Economic Forum
              对循环电子产品的认可，确认了有利的宏观政策环境；Back Market 的环境影响叙事也支撑品牌定位。不过，法国生态评分标签采用和 B-Corp
              认证是品牌差异点，不是阻挡竞争进入的结构性壁垒。这些风险仍是活跃尽调事项，而不是已经解决的结论。
