      - number: '2.3'
        title: 地域拆分与买家分层
        blocks:
          - type: paragraph
            body: >-
              欧洲是 Back Market 的地域大本营，法国按 GMV 是第一大市场，之后是英国、德国和比利时。DACH 地区竞争最激烈，奥地利竞争对手 Refurbed 在当地根基深厚，据称 2025 年 GMV 约
              €3B，已接近 Back Market 的整体位置。美国是 Back Market 的第二大市场，也是增长最快的通道，据称 2025 年下半年增速比公司平均水平快约
              40%。日本构成第三个独立地域，是公司较新进入、消费者动态不同的市场。


              消费者买家可以分成三类：价格敏感的个人买家、受可持续动机驱动的循环经济买家，以及管理设备生命周期成本和 ESG 承诺的 B2B 企业 IT 买家。Apple 产品约占 Back Market 智能手机销售的
              40–50%，说明平台虽定位于价值价格，但仍偏向高端品牌。企业可持续要求与 IT 成本压力汇合后，B2B 细分增速快于消费者基线。Sacra 估计的约 $330
              平均订单价值，确认了平台是价值可及定位，而不是高端设备策略。一个新兴人群是追求 AI 功能、希望打折购买 iPhone 15 Pro 或 Pixel 8 的消费者；Back Market 于 2024 年推出
              Verified Premium 层级，正面回应了这一需求。
