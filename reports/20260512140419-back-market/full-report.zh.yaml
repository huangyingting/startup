      - 改变观点的条件
    rows:
      - - Back Market 在 $3.5B GMV 上于 2025 年实现全球 EBITDA 盈亏平衡，证明平台单位经济模型在规模化后跑得通。
        - 投资逻辑
        - 若盈亏平衡后的利润率扩张逆转或继续推迟，溢价逻辑会被明显削弱。
      - - 欧盟维修权指令在 2027 年前提供结构性监管顺风，逐年扩大可触达的翻新市场。
        - 投资逻辑
        - 如果落地延迟或被削弱，估值模型中的监管溢价会收缩。
      - - Vinted 2025 年 1 月以 €8.2B 估值对应 13.7x 收入倍数，确认公开市场愿意买入 Back Market 收入规模的欧洲盈利型循环电商。
        - 投资逻辑
        - 如果 Vinted IPO 定价低于 10x，或宏观环境压低平台倍数，同业估值上限会下移。
      - - 2022 年 Series E 轮处于市场高点，定价为收入 28-32x；当前隐含 10-13x，已较既有投资者预期锚点大幅压缩。
        - 反向逻辑
        - 若披露经审计 EBITDA 利润率超过 8%，估值可向 10-13x 区间上沿移动。
      - - Refurbed 2026 年 GMV 跨过 €3B，并声称已在德国超过 Back Market，威胁支撑溢价估值的欧洲护城河。
        - 反向逻辑
        - 如果 Back Market 公开披露德国 GMV 轨迹，或 Refurbed 出现可观察的平台期，这一风险才会消除。
    notes: 这些论点对价格敏感：它们描述当前估值假设，而不只是产品质量本身。反向逻辑行是任何新投资的关键尽调关卡。
