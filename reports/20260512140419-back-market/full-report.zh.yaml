      - number: '8.5'
        title: 退出情景与最终尽调问题：IPO 窗口、M&A，以及走向投资者完整证据的路径
        blocks:
          - type: paragraph
            body: >-
              Back Market CEO Thibaud 表示，IPO 是公司的自然退出路径，但并不迫在眉睫。现实 IPO 窗口是 2026–2028 年，前提是维持全球 EBITDA
              盈利，并达到能让公开市场给予溢价的收入规模。Vinted 预期 IPO 将成为欧洲循环电商行业更广泛的关键时间标记和倍数锚点。


              二级市场和 PE 路径也是现实替代。General Atlantic 和 Goldman Sachs 都参与了 $5.7 billion Series E，面临典型 7 到 10
              年基金生命周期；2025–2026 年，以 $4–5 billion 估值设立延续基金或进行 PE 收购，都可能提供部分流动性。$6.5–7.5 billion 的战略 M&A
              退出会为少数股东创造最高价值，但需要有动机的交易对手，并具备处理跨境交易的监管带宽。


              阻碍给出有信心买入结论的最重要尽调缺口是：（1）除全球盈亏平衡公告外，没有已提交财务报表或经审计 EBITDA 利润率披露；（2）2022 年股权偏好堆栈以及任何清算权或反稀释条款不透明；（3）Refurbed
              德国扩张对 Back Market GMV 集中的影响未经验证；（4）看不到维修平台收入运行率。Right to Repair 监管顺风真实且证据充分，但在 EBITDA
              利润率和德国竞争强度公开确认前，证据集支持跟踪，而非买入。
