      - number: '6.4'
        title: 客户体验——强信任架构，但卖家差异是结构性问题
        blocks:
          - type: paragraph
            body: >-
              Back Market 的客户体验围绕三项明确信任承诺搭建：每笔购买享有 1 年保修、30 天退货窗口，以及平台级消费者保证——卖家未交付时，Back Market 直接覆盖买家。公司目标是保修索赔处理时间低于
              24 小时（公司表述），退货免费，运费由翻新卖家承担。在更广泛的二手电子品类里，这些承诺并不常见；多数点对点市场没有售后救济。Ratingfacts.com 和 Alidrop.co
              的评论分析显示，正面情绪集中在三类反复出现的主题：设备到货与描述一致、保修兑现迅速且稳定、价格与质量比强。反复出现的负面主题包括发货延迟、卖家承诺发货时间未达成，以及上架成色等级与收到设备偶有不一致。Back
              Market 主动监控评论平台，并公开回复 Trustpilot 条目，说明公司采取了受管理的声誉策略；这比典型市场运营商更消耗资源。美国 iOS App Store 评分 4.6/5、Google Play 约
              4.5/5，明显高于品类平均，支持这样一种判断：多数交易体验最终无需升级处理。客户体验的核心结构性风险是卖家差异：平台上有约 2,700 家专业翻新商，质量测试标准（所有卖家必须完成 25+
              项检查）无法在足够细粒度上被完全独立审计，因此很难确认每家翻新商、每台设备都得到一致执行。
