callouts:
  - calloutType: strength
    title: Back Market leads France and the US with defensible brand and network scale
    body: >-
      In its two largest markets, Back Market holds structural advantages that Refurbed and Amazon Renewed
      cannot quickly replicate: 10 years of consumer brand equity in France, a Verizon carrier partnership in
      the US, and a 2,700+ seller network that took years to build and certify. TIME 100 recognition in 2026
      reinforces the trust brand externally.
    claimRefs:
      - CP015
      - CP016
      - CP020
      - CP022
  - calloutType: risk
    title: Refurbed is the fastest-accelerating competitive threat in Back Market's core European market
    body: >-
      Refurbed's 38.6% Germany growth versus Back Market's 10.8%, combined with Refurbed's profitability
      and €100M+ funding, makes it the single highest-priority competitive risk. Refurbed's leaner
      operating model (~100 staff at ~€3B GMV) also suggests it can expand into adjacent EU markets
      at significantly lower cost than Back Market historically required.
    claimRefs:
      - CP004
      - CP006
      - CP009
  - calloutType: insight
    title: Seller multi-homing is a structural cap on Back Market's supply moat
    body: >-
      Professional refurbishers in Europe regularly list inventory on both Back Market and Refurbed
      simultaneously. This multi-homing dynamic limits the pricing power each platform can extract
      from its seller network and creates ongoing fee competition between marketplace operators for
      the same supply base.
    claimRefs:
      - CP023
      - CP035
