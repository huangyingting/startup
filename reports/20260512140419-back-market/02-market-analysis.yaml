  - id: FM004
    title: Adoption funnel or value-chain map
    type: flow
    layout: wide
    summary: >-
      Back Market's consumer value chain runs from price-triggered awareness through quality evaluation to purchase,
      post-sale trust, and lifecycle re-entry; each stage represents a trust-building or trust-breaking moment.
    data:
      nodes:
        - id: n1
          label: Consumer discovers refurbished channel
          detail: >-
            Price comparison search, social proof, or Back Market brand advertising triggers awareness. Primary entry
            point is organic search on device model at discount.
          tone: neutral
        - id: n2
          label: Evaluates device grade, warranty, and seller
          detail: >-
            Consumer evaluates Back Market quality tier (standard, certified, Verified Premium), warranty length (12–24
            months), and seller ratings. Trust at this stage is the primary conversion gate.
          tone: neutral
        - id: n3
          label: Purchases via Back Market marketplace
          detail: >-
            GMV captured. Back Market earns commission on transaction. Average order value approximately $330 (Sacra).
            70% of GMV from smartphones and laptops (estimated).
          tone: positive
        - id: n4
          label: Post-purchase warranty and support
          detail: >-
            12–24 month warranty backed by Back Market creates differentiation from unverified P2P channels. Return
            and support process is critical for repeat purchase and NPS.
          tone: positive
        - id: n5
          label: Device lifecycle and potential trade-in
          detail: >-
            Device lifecycle continues in consumer hands. Eventual trade-in or resale feeds next refurbishment cycle.
            COVID-19 supply pipeline maturity and iPhone 16 trade-ins feeding 2025 supply.
          tone: positive
        - id: n6
          label: Repeat purchase and platform loyalty
          detail: >-
            Trust established in prior transaction drives LTV. B2B segment develops recurring device procurement
            relationship with Back Market Pro. AI upgrade cycle may accelerate repeat cadence.
