  - id: section-policy-and-structural-risks
    title: Policy tailwinds, regulatory headwinds, and structural risks
    body: >-
      The EU Right to Repair Directive 2024/1799 entered into force on July 31, 2024, with member states required to
      transpose it into national law by July 31, 2026. The directive requires manufacturers to provide spare parts,
      tools, and repair information to consumers and independent repairers, which structurally lowers the cost of
      professional refurbishment and expands the pool of economically viable devices for Back Market's seller ecosystem.
      Back Market is a direct beneficiary of this legislation as it makes independent refurbishment more cost-competitive.
      Separately, the EU General Product Safety Regulation, effective December 2024, explicitly covers refurbished goods
      sold in the European market, adding compliance requirements for marketplace operators but simultaneously raising
      the cost-of-entry for new platforms and reinforcing established certified operators.


      The structural risk register carries three material items. First, competitive pressure from Refurbed—approaching
      €3 billion GMV in 2025—indicates European market leadership is contested and no apparent monopoly exists. Second,
      counterfeit and misgraded device risk escalates as market volumes grow; the absence of an industry-standard grading
      definition enables adverse selection and could undermine consumer trust at scale. Third, OEM certified pre-owned
      programs from Apple and Samsung compete directly on the trust dimension that Back Market has historically owned.
      Ellen MacArthur Foundation and World Economic Forum recognition of circular electronics confirms a favorable macro
      policy environment, and Back Market's environmental impact messaging supports brand positioning. However, the
      French eco-score label adoption and B-Corp certification are brand differentiators rather than structural barriers
      to competitive entry. These risks remain active diligence items rather than resolved conclusions.
    claimRefs:
