callouts:
  - calloutType: insight
    title: Analyst estimates span 2x — preserve the range, not a midpoint
    body: >-
      The global refurbished electronics market carries 2024 estimates from $64.8B (SemiconductorInsight) to $127B
      (FundamentalBI). The spread reflects genuine boundary differences—appliances, P2P, and industrial equipment
      in/out—not measurement error. Collapsing these into an average would misrepresent what Back Market can address.
      The relevant underwriting anchor is Back Market's own $3.5B GMV as a public SOM proxy, not any headline TAM.
    claimRefs:
      - CM001
      - CM003
      - CM011
      - CM013
  - calloutType: strength
    title: EU Right to Repair is a structural legislative tailwind
    body: >-
      Directive 2024/1799 entered into force July 31, 2024, requiring manufacturers to make spare parts and repair
      information available by July 2026 transposition. This directly lowers refurbishment cost and expands the pool of
      repairable devices, benefiting Back Market's seller ecosystem. Combined with GPSR validation requirements, the
      regulatory environment creates a moat for established marketplace operators while raising cost-of-entry for new
      platforms.
    claimRefs:
      - CM032
      - CM033
      - CM034
      - CM035
      - CM036
  - calloutType: risk
    title: Refurbed GMV parity and OEM programs challenge the trust moat
    body: >-
      Refurbed reached approximately €3B GMV in 2025, approaching Back Market's position and demonstrating that
      European market leadership is genuinely contested. OEM certified programs (Apple Refurbished, Samsung Certified
      Re-Newed) compete on brand trust that independent marketplaces must earn transaction by transaction. Counterfeit
      and grading-fraud risk escalates with volume. These forces collectively mean Back Market's market position is not
      structurally defended and requires ongoing trust investment.
    claimRefs:
      - CM025
      - CM026
      - CM038
      - CM039
      - CM040

