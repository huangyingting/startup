figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Back Market's SOM of $3.5B GMV in 2025 sits within a European SAM of approximately $18B–$35B and a global TAM
      ranging from $65B to $127B depending on category boundary.
    data:
      nodes:
        - label: 'Global second-hand electronics TAM: $64.8B–$127B (2024)'
          detail: >-
            Range across analyst sources: SemiconductorInsight low-end ($64.8B) to FundamentalBI high-end ($127B).
            Spread reflects genuine boundary differences; not a forecast error.
          tone: positive
        - label: 'Global refurbished electronics TAM projection: $140.7B–$140.8B (2031–2032)'
          detail: >-
            MRFR projects $140.7B by 2032 (CAGR 9.3%); Consegic BI projects $140.8B by 2031 (CAGR 9.1%). Convergent
            terminal estimates despite different 2024 bases.
          tone: positive
        - label: 'Europe refurbished/second-hand electronics SAM: $17.8B–~$35B (2024)'
          detail: >-
            DeepMarket ($17.8B, 7.1% CAGR) to GM Insights (~$35B USD equiv from EUR 32.7B, 4.2% CAGR). European
            market is Back Market's largest single geography cluster.
          tone: neutral
        - label: 'Back Market GMV: $3.5B+ (2025 proxy SOM)'
          detail: >-
            Company press release; GMV is the closest public SOM proxy. Back Market's commission revenue is a subset
            of GMV. Average selling price ~$330 (Sacra estimate).
          tone: positive
    approximationNotes: >-
      The TAM range reflects analyst boundary differences, not forecast variance. The SAM is approximated from European
      market reports and is not formally published by Back Market. The SOM (Back Market GMV) is company-reported and
      includes gross transaction value, not net revenue.
