  - id: section-demand-drivers-and-inflections
    title: Core demand drivers and market inflections
    body: >-
      Price sensitivity is the most durable demand driver in this market. Refurbished devices typically sell at 25 to 80
      percent below comparable new retail price, and Back Market's Sacra-estimated average selling price of approximately
      $330 sits at roughly 37 percent of the $900 new smartphone average. Consumer trade-down accelerated during the
      2022 to 2025 inflation and cost-of-living cycle, and Back Market's 32 percent GMV growth to $3.5 billion in 2025
      is consistent with that structural tailwind still running at speed.


      A second demand inflection is emerging from AI device capabilities. The iPhone 15 Pro supports Apple Intelligence
      and the Pixel 8 runs Gemini on-device, both now available at significant discount on Back Market. This makes
      premium-refurbished a viable path to AI features at sub-new-device prices, which Back Market addressed by launching
      its Verified Premium tier in 2024. COVID-19 digital device proliferation from 2020 to 2022 created a large
      secondary market supply pipeline that matured through 2023 and 2024, and iPhone 16 series trade-ins in late 2024
      further accelerated refurbished supply. B2B corporate adoption is growing as ESG reporting requirements and scope
      3 emissions targets push enterprise IT buyers toward certified refurbished device programs. Back Market described
      this B2B dynamic as a fast-growing vertical in its 2025 announcements. The adverse side includes rising counterfeit
      and grading-fraud risk as market volumes scale, the lack of standardized industry grading definitions that enable
      adverse selection, and OEM certified pre-owned programs from Apple and Samsung that compete directly on the trust
      dimension Back Market has historically owned.
