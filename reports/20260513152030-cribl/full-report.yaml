      - number: '8.5'
        title: Thesis-Break Monitoring and KPI Dashboard
        blocks:
          - type: paragraph
            body: |
              Post-investment monitoring requires a structured set of observable KPIs trackable via
              public data, analyst coverage, and investor information rights. Key performance indicators:
              ARR growth rate (target >= 50% YoY through 2026), NRR (target >= 125%), new logo
              additions (target >= 100 enterprise logos per quarter), federal ARR percentage (target
              >= 15% of total by 2027), and AI product revenue contribution (target > 5% by 2027).

              Thesis-break monitoring: NRR below 100% for two consecutive quarters is an immediate
              sell signal. CEO departure without confirmed successor is an immediate hold signal.
              Cisco/Splunk native pipeline announcement is a watch-list trigger requiring rapid customer
              reference diligence to quantify TAM risk. Series F below $3.5B valuation triggers
              anti-dilution provisions and requires thesis reassessment.

              Cribl's AI platform transition requires monitoring of ML/AI engineering headcount, Cribl
              Search adoption rates, and AI product revenue contribution. SiliconANGLE and TechCrunch
              provide early signals on product release velocity. Sacra quarterly updates on private
              market positioning offer the most reliable ongoing financial proxy. Gartner Peer Insights
              rating maintenance above 4.0/5.0 serves as an ongoing enterprise market validation signal.
