      - number: '6.4'
        title: Retention, Repeat Usage, and Customer Satisfaction
        blocks:
          - type: paragraph
            body: |
              Cribl does not publicly disclose Net Revenue Retention (NRR), Gross Revenue Retention
              (GRR), or formal churn rates, consistent with its private-company disclosure posture. The
              available proxies for retention quality are third-party review signals and directional
              indicators from the company's own public statements.

              On **G2**, Cribl Stream carries a 4.6/5.0 average across verified reviews as of early
              2026, with high marks for ease of pipeline configuration, vendor-neutral routing, and
              cost savings. Users in security and DevOps roles highlight positive ROI experiences.
              Common complaints include complexity of advanced configurations, need for Cribl-specific
              expertise, and inconsistency of support response times for non-enterprise tiers.

              On **PeerSpot**, the product carries a score of approximately 8.1/10, with reviewers
              citing production deployments at enterprise organizations. Critical reviews—which we
              classify as adverse signal—specifically mention: (1) pricing that scales steeply with
              data volume, creating budget risk as telemetry grows; (2) support tiering that
              disadvantages smaller customers; (3) occasional documentation gaps for edge-case
              configurations. These concerns, if widespread, could suppress renewal in mid-market
              segments.

              **Glassdoor** employee reviews are predominantly positive (4.2/5.0 overall), reflecting
              a healthy internal culture. High employee satisfaction typically correlates positively
              with customer satisfaction in enterprise SaaS. No product-specific customer churn signals
              were identified in Glassdoor reviews.

              **Capterra** and **Spiceworks** community discussions confirm active deployments in IT
              operations and security contexts, with practitioners sharing implementation tips—a leading
              indicator of engaged user communities and sticky adoption.

              The MSSP Alert report on the Series E funding round noted that Cribl's investor thesis
              was partly anchored in strong customer retention data shared in the fundraise process,
              suggesting the private NRR may be strong (industry-competitive enterprise SaaS NRR
              would be 110–130%+ for a company at this growth stage).

              Reddit's r/sysadmin community shows a mixed-to-critical picture: users praise Cribl's
              capabilities but specifically raise concerns about pricing model complexity and the
              learning curve, with some posts questioning whether the platform's total cost of ownership
              justifies the vendor relationship versus open-source alternatives like the OpenTelemetry
              Collector. This represents an adverse signal that warrants diligence in mid-market
              retention cohorts.
