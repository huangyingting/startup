  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Sizing
        blocks:
          - type: paragraph
            body: >-
              Cribl's addressable market spans three overlapping but distinct analyst segments: SIEM (security
              information and event management), general-purpose log management, and the nascent telemetry pipeline
              middleware category for which no standalone analyst coverage yet exists. MarketsandMarkets sized global
              SIEM at $6.4B in 2024 on a trajectory to $12.6B by 2029 (14.5% CAGR), while Mordor Intelligence pegged the
              same segment at $5.6B in 2024, rising to $10.5B by 2029 (13.4% CAGR). Statista's consensus figure of $5.4B
              for 2024 broadly corroborates both. The log management sub-market, sized at roughly $2.8B (Grand View
              Research) to $3.6B (MarketsandMarkets Cloud Log) in 2024, adds an adjacent layer. IDC's observability
              platform forecast of $10.5B by 2028 captures the broader operational intelligence landscape in which Cribl
              also competes. Cribl itself has publicly claimed a $20B total addressable market, which requires
              aggregating SIEM, log management, and observability estimates and assuming that a purpose-built pipeline
              layer can capture routing economics across all three. The lack of any dedicated analyst market sizing for
              telemetry pipeline middleware remains a material evidence gap. Estimated aggregate confidence is medium
              because no single analyst covers the combined segment Cribl defines, and TAM estimates vary by more than
              3x across publishers when scope assumptions differ.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
