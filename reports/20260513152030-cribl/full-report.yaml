companyProfile:
  summary: >
    Cribl is a San Francisco–based enterprise software company founded in 2018 by Clint Sharp (CEO), Dritan Bitincka
    (CTO), and Ledion Bitincka—all former Splunk engineers. The company builds a vendor-neutral telemetry pipeline
    platform that routes, transforms, and enriches security and observability data from any source to any destination
    without vendor lock-in. As of February 2026, Cribl has crossed $300M in ARR with 9,000+ customer deployments across
    50%+ of the Fortune 500, making it the clear independent market leader in the emerging telemetry pipeline middleware
