        - Material
        - Request vintage cohort NRR table covering at least 4 years; ask for gross churn separately
      - - Burn Rate and Cash Position
        - Burn rate, cash on hand, and EBITDA not disclosed
        - Required to assess runway and capital efficiency; affects exit timing and dilution risk
        - Material
