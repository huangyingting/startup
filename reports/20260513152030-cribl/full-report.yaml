            title: FedRAMP ATO First-Mover Advantage
            body: >
              Cribl achieved FedRAMP Authority to Operate in January 2026, becoming the first independent telemetry
              pipeline vendor to receive this federal authorization. In federal and DoD procurement, FedRAMP ATO is a
