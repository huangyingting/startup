      - number: '7.3'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: |
              AWS is Cribl's primary SaaS hosting provider and a critical customer-acquisition channel
              via AWS Marketplace. An AWS outage or Marketplace policy change would directly impact both
              SaaS customer availability and mid-market acquisition. AWS's own observability product
              development (Amazon CloudWatch, AWS Distro for OTel) could also limit addressable market
              within the AWS ecosystem.

              The Cisco acquisition of Splunk (closed March 2024) creates a well-capitalized competitor
              that could build native pipeline capabilities within Splunk, threatening Cribl's core
              SIEM-optimization use case. Cribl's partner directory documents diversification efforts
              including Google Cloud, Azure, multiple MSSPs, and SI integrators. The GV-led Series E
              signals strategic Google Cloud alignment but deepens single-partner dependency risk.

              The OpenTelemetry Foundation (CNCF) is a protocol compatibility dependency. Cribl has
              committed to OTel compatibility, and CNCF governance shifts that improve the native OTel
              Collector for enterprise routing could erode Cribl Stream differentiation. Cribl's 80+
              source and destination integration connectors create maintenance overhead where API or
              protocol changes in major data sources require rapid connector updates.
            claimRefs:
