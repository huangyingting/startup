          - type: callout
            title: 'Valuation Premium Risk: 11x ARR Multiple Assumes Sustained Hyper-Growth'
            body: >
              At $3.5B valuation against $300M ARR, Cribl trades at approximately 11.7x ARR—a premium that requires
              sustained high-growth to justify. Any ARR growth deceleration, increased competition from Cisco/Splunk
