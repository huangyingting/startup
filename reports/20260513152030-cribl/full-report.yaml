      - number: '1.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Founder-Market Fit: Ex-Splunkers Targeting Splunk''s Achilles Heel'
            body: >
              All three co-founders spent formative years at Splunk and deeply understand the cost and operational pain
              points that enterprise Splunk customers experience. This insider knowledge allows Cribl to design products
              that integrate seamlessly with existing Splunk deployments while offering substantial cost reduction and
              operational flexibility. The result is an unusually strong product-market fit validated by rapid ARR
              growth to $300M+ in under eight years.
            calloutType: strength
            claimRefs:
