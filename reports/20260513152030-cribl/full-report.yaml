      - number: '2.3'
        title: Buyer Segmentation and Willingness to Pay
        blocks:
          - type: paragraph
            body: >-
              Enterprise SecOps teams represent Cribl's primary buyer persona, typically anchoring deals between $100K
              and $1M annually, with CISOs or VP-level security engineering owning the budget decision and procurement
              cycles averaging six to twelve months. IT Ops and SRE teams constitute a secondary buyer cohort with
              smaller initial deal sizes ($50K to $500K) but faster adoption cycles, as they are motivated by
              operational observability cost reduction rather than security compliance. Federal government buyers
              command the highest-ACV deals ($200K to $2M range), with procurement accelerated by Cribl's FedRAMP High
              ATO obtained in early 2026. Financial services institutions mirror federal deal sizes while showing
              heightened concern for PCI-DSS 4.0 compliance deadlines that force a log pipeline audit. Each vertical
              exhibits distinct willingness to pay, driven by the regulatory surface area and by the cost savings
              achievable from routing and filtering data before ingestion into expensive SIEM storage. Buyer expansion
              from a stream-only licence to the full Cribl platform typically follows a successful proof-of-concept that
              demonstrates measurable storage cost reduction, often in the 30 to 60 percent range according to customer
              case studies published by Cribl itself.
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM014
          - type: table
            tableRef: TM003
            claimRefs: []
      - number: '2.4'
        title: Market Timing and Adoption Catalysts
        blocks:
          - type: paragraph
            body: >-
              Market timing is exceptionally favourable for a pipeline-first architecture. The Log4Shell vulnerability
              in December 2021 forced enterprise security teams to audit every log pipeline in their environment within
              days, creating acute demand for flexible, vendor-agnostic telemetry routing. Cribl closed a $200M Series C
              one month after the Log4Shell disclosure, a sequence that was not coincidental: the incident crystallised
              the operational risk of rigid, vendor-locked log forwarding. Subsequent capital raises, $150M Series D in
              June 2022 and $319M Series E in August 2024 at a maintained $3.5B valuation, each drew on a growing pool
              of enterprise customers migrating to a pipeline-first approach. The SEC cybersecurity incident disclosure
              rule (effective December 2023) requires public companies to disclose material breaches within four
              business days, compressing the permitted window between detection and reporting. Similarly, CMMC 2.0
              finalisation expanded mandatory log retention to a larger tier of U.S. defence contractors, and PCI-DSS
              4.0 accelerated procurement among payments-adjacent financial institutions. Cribl's recognition in
              Gartner's 2025 SIEM Magic Quadrant legitimises the product for risk-averse enterprise buyers who require
              analyst validation before budget approval.
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
      - number: '2.5'
        title: Market Risks and Evidence Gaps
        blocks:
          - type: paragraph
            body: >-
              Three structural risks require monitoring. First, hyperscalers including AWS Security Lake, Microsoft
              Sentinel, and Google Chronicle are extending native telemetry collection and routing capabilities within
              their own clouds, progressively reducing the switching incentive for customers already committed to a
              single-cloud architecture. Cribl's multi-cloud and cross-vendor neutrality story is the primary
              counter-argument, but that neutrality thesis depends on enterprises maintaining heterogeneous
              infrastructure rather than concentrating on a single platform. Second, the maturation of OpenTelemetry as
              a vendor-neutral standard could compress the unit-economics advantage of a proprietary pipeline layer if
              broad OTel adoption eliminates format translation work that currently creates value for Cribl Stream. The
              New Stack reported credible practitioner skepticism about whether a proprietary pipeline middleware
              remains necessary once OTel reaches enterprise-grade maturity. Third, the 3x spread in analyst SIEM and
              log management TAM estimates reflects genuinely different scope assumptions and methodology choices rather
              than simple measurement error. Investors should apply a conservative sizing lens that credits only the
              routing economics Cribl can capture rather than the full storage and analytics spend of adjacent
              categories. Evidence gaps constrain conviction: Cribl does not disclose product-line revenue splits, churn
              data is unavailable, and the most recent publicly cited ARR ($300M+) dates to early 2026.
            claimRefs:
              - CM027
              - CM028
              - CM029
              - CM030
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
              - CM037
              - CM038
      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Regulatory stack creates durable, near-term demand
            body: >-
              The convergence of SEC cyber-disclosure rules, CMMC 2.0, and PCI-DSS 4.0 in a two-to-three-year window
              produces audit-grade log pipeline mandates that are non-discretionary for regulated buyers. This
              regulatory demand is independent of macro budget cycles and substantially de-risks the Cribl near-term
              pipeline.
            calloutType: strength
            claimRefs:
              - CM023
              - CM024
              - CM025
          - type: callout
            title: 3x analyst TAM spread signals scope ambiguity
            body: >-
              Published SIEM TAM estimates range from $5.3B to $12.6B for 2024 depending on scope assumptions, and no
              analyst covers Cribl self-defined telemetry pipeline middleware category independently. Investors should
              not take the $20B TAM claim at face value without decomposing the routing-economics share Cribl can
              realistically capture.
            calloutType: risk
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM027
          - type: callout
            title: OpenTelemetry maturation is a slow-moving disruptor
            body: >-
              OTel standardisation eliminates proprietary format lock-in over a multi-year horizon. Cribl must
              demonstrate that its value proposition extends beyond format translation to enrichment, routing
              intelligence, and cost reduction that OTel alone cannot deliver.
            calloutType: risk
            claimRefs:
