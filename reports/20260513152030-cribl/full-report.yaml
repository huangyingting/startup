      - number: '8.3'
        title: Bull, Base, and Bear Return Scenarios
        blocks:
          - type: paragraph
            body: |
              Three exit scenarios are modeled on a 3-5 year horizon from the September 2024 Series E:

              Bull case (probability 30%): Cribl executes the AI platform transition, federal market
              grows to $50M+ ARR, Cisco/Splunk integration fails to displace core use case, NRR stays
              above 130%. Strategic acquisition by Cisco, Microsoft, or Google at 14-18x forward ARR
              in 2027-2028 for $7-10B. Implied gross return: 2.0-2.9x on $3.5B entry.

              Base case (probability 50%): Cribl reaches $450-500M ARR by 2027, NRR moderates to
              120-125%, IPO or Series F at 10-12x ARR in 2028-2029 for $5-6B. Implied gross return:
              1.4-1.7x. Series F dilution of 10-15% reduces net investor return to approximately 1.2-1.5x.

              Bear case (probability 20%): Cisco/Splunk native pipeline announced by Q4 2026, NRR
              declines to 105-110%, new logo acquisition slows. Series F at 6-8x ARR for $1.8-2.4B.
              Implied gross return: 0.5-0.7x on $3.5B entry, a partial loss.

              Probability-weighted expected value: (0.3 x 2.5) + (0.5 x 1.5) + (0.2 x 0.6) = 1.62x
              gross return. This exceeds the typical 1.5x minimum IRR-adjusted threshold for late-stage
              venture investment. SiliconANGLE, Yahoo Finance, and Sacra confirm the last-round pricing
              and ARR trajectory underpinning these models.
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
          - type: table
            tableRef: TV003
            claimRefs:
