      - number: '4.5'
        title: Financial Trajectory and Evidence Gaps
        blocks:
          - type: paragraph
            body: |
              Publicly available financial milestones allow construction of an approximate ARR growth
              curve. Cribl passed $100M ARR circa 2021–2022, grew to approximately $200M ARR by early
              2024 (implied by the June 2024 $150M growth round investor commentary), and officially
              surpassed $300M in February 2026. This trajectory implies roughly 50% CAGR over the
              2022–2026 period, a strong performance for an infrastructure SaaS company at this scale.

              However, the precise quarterly ARR trajectory is unknown, and growth could be decelerating
              from higher rates. The fact that Cribl moved from a peak $3.5B valuation in 2022 to a
              $3.0B growth round in June 2024 before recovering to $3.5B with the Series E suggests the
              company experienced a valuation contraction consistent with the broader SaaS market re-rating
              of 2022–2024. Whether ARR growth accelerated or decelerated during this period is unknown.

              At $3.5B valuation and $300M ARR, the implied multiple is approximately 11.7x forward ARR.
              Public-market comparables for infrastructure observability SaaS at $300M ARR in 2026 trade
              at approximately 10–15x NTM revenue. Cribl's multiple is within this band but at the higher
              end, requiring sustained high growth to justify. A deceleration to 25–30% YoY ARR growth
              would compress the justifiable multiple to 7–9x, implying a valuation of $2.1B–$2.7B—a
              potential 25–40% discount to the last round price. This is the primary financial risk for
              investors.

              Material evidence gaps include: exact ARR (company says $300M+, not the specific number),
              quarterly ARR trajectory, gross margin, NRR, CAC, burn rate, and any debt obligations.
              A full diligence process would require access to audited financial statements, a cohort
              revenue analysis showing NRR by vintage year, a CFO presentation on the path to
              profitability, and at minimum two years of historical P&L data.
