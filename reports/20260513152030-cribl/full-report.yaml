            title: 'Cisco/Splunk Bundling: Highest-Severity Competitive Threat'
            body: >
              Cisco's $28 billion acquisition of Splunk creates a potential bundling threat: if Cisco packages pipeline
              capabilities into Splunk Security Suite at zero incremental cost for existing customers, Cribl's primary
              market creation mechanism (Splunk cost reduction) is directly challenged. The realization timeline is 2–4
