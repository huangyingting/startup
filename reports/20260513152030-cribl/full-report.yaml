            body: |
              Cribl's public customer reference program lists named enterprises across industries.
              The cribl.io/customers/ page confirms production deployments at organizations including
              Western Digital, Adobe, Atlassian, Hyatt Hotels, Booking.com, and multiple financial
              services and government entities. These are not pilot or proof-of-concept arrangements—
