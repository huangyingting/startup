  - id: FE001
    title: Cribl Product Architecture Map
    type: flow
    summary: >
      Data flow from sources through Cribl Edge (collection), Cribl Stream (processing), and onward to destinations
      (Splunk, Datadog, Elastic, S3/Lake, Search). Shows the layered architecture of the Cribl platform.
    data:
      nodes:
        - id: sources
          label: Data Sources
          description: Servers, containers, cloud services, network devices, applications generating logs, metrics, traces
        - id: edge
          label: Cribl Edge (Agent Layer)
          description: Lightweight agent collecting data at source; performs local filtering and pre-processing; managed centrally
        - id: stream
          label: Cribl Stream (Processing Engine)
          description: 'Central stream processor: routes, filters, transforms, enriches, and aggregates telemetry in real time'
        - id: lake
          label: Cribl Lake (Object Storage)
          description: Long-term telemetry retention in Parquet format on customer cloud storage (S3/Blob/GCS)
        - id: search
          label: Cribl Search (Query Engine)
          description: Federated query across Lake and Stream without data movement; supports SQL and SPL
        - id: analytics
          label: Analytics Destinations
          description: Splunk, Datadog, Elastic, Chronicle, Microsoft Sentinel, Grafana, and 300+ other tools
        - id: control
          label: Cribl Control Plane
          description: >-
            Unified management UI and API for pipeline configuration, fleet management, and observability of the
            platform itself
      edges:
        - from: sources
          to: edge
          label: raw telemetry
        - from: edge
          to: stream
          label: pre-processed events
        - from: sources
          to: stream
          label: direct push (no Edge)
        - from: stream
          to: lake
          label: store raw / processed
        - from: stream
          to: analytics
          label: route to destination
        - from: lake
          to: search
          label: query at rest
        - from: stream
          to: search
          label: query in motion
        - from: control
          to: edge
          label: config & orchestration
        - from: control
          to: stream
          label: pipeline config
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
  - id: FE002
    title: Customer SIEM Cost-Optimization Workflow
    type: flow
    summary: >
      End-to-end workflow showing how a typical enterprise uses Cribl Stream to reduce SIEM ingest volume: from raw log
      generation through Cribl routing, filtering, and normalization, to selective delivery to SIEM versus low-cost cold
      storage.
    data:
      nodes:
        - id: log-sources
          label: Log Sources
          description: Firewall, endpoint, cloud audit logs, application logs generating high-volume raw events
        - id: cribl-ingest
          label: Cribl Stream Ingest
          description: Receives raw logs via Syslog, HEC, S3, or Kafka; begins pipeline processing
        - id: classify
          label: Event Classification
          description: 'Pipeline classifies events: high-value security events vs. noisy operational logs vs. raw replay candidates'
        - id: mask-enrich
          label: PII Masking & Enrichment
          description: Sensitive fields (PII, credentials) masked; threat intel lookup enrichment applied to security events
        - id: siem-route
          label: SIEM (Splunk / Sentinel)
          description: Only high-value, enriched, de-duplicated events forwarded to SIEM; volume reduced 30–60%
        - id: lake-store
          label: Cribl Lake / S3
          description: Raw full-fidelity logs stored cheaply in object storage for compliance, forensics, and replay
        - id: compliance-dest
          label: Compliance Archive
          description: PCI/HIPAA-scoped events routed to dedicated compliant storage or SIEM tenant
      edges:
        - from: log-sources
          to: cribl-ingest
          label: raw events (100%)
        - from: cribl-ingest
          to: classify
          label: event pipeline
        - from: classify
          to: mask-enrich
          label: security events
        - from: classify
          to: lake-store
          label: noisy / low-value logs
        - from: mask-enrich
          to: siem-route
          label: filtered & enriched (~40–70%)
        - from: mask-enrich
          to: compliance-dest
          label: regulated data subset
        - from: lake-store
          to: siem-route
          label: replay on demand
    claimRefs:
      - CE008
      - CE009
      - CE010
