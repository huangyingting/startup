      - number: '3.3'
        title: Incumbent Platform Competitors
        blocks:
          - type: paragraph
            body: |
              Splunk/Cisco, Elastic SIEM, New Relic, and LogRhythm/Exabeam represent the incumbent
              platforms where Cribl both complements and, increasingly, competes.

              Cisco's acquisition of Splunk for approximately $28 billion, completed March 2024, is the
              single most consequential competitive event in Cribl's history. Splunk had been Cribl's
              primary market reference: a platform whose high per-GB pricing ($1–$3.50/GB/day in
              enterprise contracts) created demand for Cribl Stream as a cost-reduction layer.
              Post-acquisition, Cisco gains Splunk's 15,000+ enterprise and government customers, $3.7+
              billion in annual revenue (fiscal year 2024), and deep relationships across the Fortune 500
              and federal government. The Splunk website's blog post comparing against Cribl as an
              alternative reflects active competitive positioning. Cisco now has both the market reach and
              financial resources to bundle pipeline functionality—potentially as a Splunk Heavy Forwarder
              enhancement or new Cisco product—at zero incremental cost to customers already paying Cisco
              security licensing fees.

              The bundling threat is real but has a 2–4 year realization timeline. Cisco has a historically
              mixed track record integrating large acquisitions (AppDynamics, Sourcefire), and Splunk's
              cloud replatforming from on-premises index-based architecture has consumed significant R&D
              capacity. SecurityWeek and Dark Reading coverage of Cribl's Series E confirms continued
              strong enterprise momentum even post-Cisco/Splunk acquisition, suggesting no near-term
              demand destruction. Splunk's pricing remains fundamentally high, and meaningful portions of
              Cribl's customer base use Cribl specifically to reduce Splunk costs.

              New Relic was taken private by Francisco Partners and TPG Capital in a transaction completed
              in 2024 at approximately $6.5 billion. Following acquisition, New Relic shifted strategic
              focus from aggressive growth to profitability optimization. Its pricing model was restructured,
              causing some customer churn as consumption-based pricing changes triggered contract
              renegotiations—reported customer evaluations of alternatives have reportedly benefited Cribl.
              New Relic's pipeline capability is limited to native agent collection without multi-destination
              routing, making it a Cribl target account rather than a direct head-to-head competitor.

              LogRhythm merged with Exabeam in August 2023 to form a combined next-generation SIEM entity.
              The combined company competes for security analytics budget but depends on log ingestion
              pipelines—Cribl is a complementary layer rather than a direct competitor in most
              LogRhythm/Exabeam deployments. LogRhythm's website confirms its focus on SIEM, UEBA, and
              security analytics rather than data routing middleware.
