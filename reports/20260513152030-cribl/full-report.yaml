        - No disclosed path to break-even, operating leverage milestones, or EBITDA targets
        - Late-stage investors need visibility on when company can be self-funding
        - Material
        - Request 3-year financial model from management; ask about rule-of-40 trajectory
    notes: >-
      All five gap areas represent private-company disclosure constraints, not suspected misconduct. A full financial
      data room would be required for underwriting at this valuation.
