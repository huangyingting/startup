      - number: '6.2'
        title: Customer Adoption and Growth Trajectory
        blocks:
          - type: paragraph
            body: |
              Cribl's growth metrics indicate sustained hypergrowth consistent with best-in-class
              enterprise SaaS companies at its stage. The company's customer count has grown from an
              estimated few hundred at the Series B (2020) to 9,000+ organizations as of early 2026—a
              compound annual customer growth rate that outpaces most infrastructure software peers. The
              $300M+ ARR milestone announced in February 2026 (via official Cribl press release on
              PR Newswire and the Cribl blog) represents a compound annual revenue growth rate above 50%
              over a multi-year span, consistent with the trajectory needed to justify a $3.5B valuation.

              Penetration of the Fortune 500 exceeds 50%, per Cribl's own product overview and confirmed
              in the February 2026 ARR press release. This is a strong adoption signal for a company at
              Cribl's stage, as Fortune 500 penetration typically implies long-duration enterprise
              contracts, validated security posture, and significant upsell runway. MSSP Alert's coverage
              of the Series E noted that Cribl's platform is used across a broad swath of the financial
              services and technology sectors.

              Product adoption breadth has expanded beyond the original Cribl Stream pipeline. Cribl Edge
              deployment signals broader footprint per endpoint or datacenter, increasing the number of
              billable nodes per customer. Cribl Lake and Cribl Search, launched in approximately
              2023–2024, expand the average contract value by providing storage and federated search
              capabilities that reduce dependency on external SIEM and data lake vendors.

              The AWS Marketplace listing for Cribl provides a low-friction procurement channel for
              mid-market and cloud-native customers, expanding the serviceable market beyond direct
              enterprise sales. The partner ecosystem documented on cribl.io/partners/ includes
              integration partners (Splunk, AWS, Azure, Google Cloud) and service delivery partners
              (MSSPs and SI integrators) that extend geographic reach.

              No publicly disclosed customer churn events, major contract losses, or negative renewal
              announcements were identified as of the report date, consistent with strong early retention.
