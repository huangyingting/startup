  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Environment
        blocks:
          - type: paragraph
            body: |
              Cribl operates as an enterprise data pipeline software vendor. Customers route their own
              telemetry through Cribl's software, making the customer the data controller responsible
              for GDPR and CCPA data subject rights compliance. This architectural design substantially
              reduces Cribl's direct regulatory exposure compared to SaaS companies that store or
              process personal data on behalf of customers.

              Cribl Guard (announced March 2026) provides background PII detection and redaction in
              pipelines, serving as a technical mitigation for inadvertent PII routing. FedRAMP
              Authority to Operate (ATO) was granted in January 2026 for U.S. federal civilian agencies,
              confirming NIST SP 800-53 control compliance. CISA cloud security guidelines set
              expectations for tools in federal environments; Cribl's ATO certifications meet or
              exceed CISA-recommended controls.

              Federal government spending efficiency reviews active in 2025–2026 could reduce agency
              IT procurement budgets and slow Cribl's federal segment growth. The Federal Register
              confirms ongoing OMB cloud software procurement guidance applicable to FedRAMP vendors.
              No active lawsuits, EEOC complaints, or regulatory enforcement actions against Cribl
              were identified in SEC EDGAR searches or public legal records as of May 2026.

              Export control regulations (EAR) apply to Cribl's encryption and cybersecurity software;
              no violations or compliance issues were identified in public records. Open-source license
              obligations from Apache 2.0 OTel libraries represent standard risk; Cribl has not
              publicly confirmed a formal SBOM or CLA compliance process.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
