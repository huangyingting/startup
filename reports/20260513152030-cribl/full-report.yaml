      - number: '3.4'
        title: Adjacent and Substitution Threats
        blocks:
          - type: paragraph
            body: |
              Datadog, hyperscaler-native routing tools, the OpenTelemetry Collector, and internal build
              represent credible substitution threats at different market segments.

              Datadog Observability Pipelines (generally available 2023) is the most technically capable
              competing product in this adjacent category. At approximately $2.7 billion ARR and $35–45
              billion market capitalization as of early 2026, Datadog has significant resources to enhance
              its pipeline product. Datadog's competitive blog comparing against Cribl acknowledges the
              multi-destination use case but emphasizes Datadog's integrated analytics advantage for
              observability data. The fundamental competitive gap remains: Datadog Observability Pipelines
              routes data primarily into Datadog, while Cribl routes to any destination including to
              Datadog's competitors. For customers fully committed to Datadog as their observability
              backend, Datadog's native pipeline reduces the need for a standalone Cribl deployment—this
              is the most credible adjacent substitution risk for cloud-native engineering teams.

              The OpenTelemetry Collector is a CNCF-maintained open-source component with vendor-neutral
              receivers, processors, and exporters for logs, metrics, and traces. Backed by Google,
              Microsoft, Datadog, Splunk, and hundreds of contributors, OTel has become the de facto open
              standard for telemetry collection. Cribl's strategic response is to embrace OTel
              compatibility and position its commercial platform as the enterprise management layer above
              the OTel Collector—providing RBAC, pipeline monitoring, compliance tooling, high
              availability, and scale that the open-source Collector cannot provide alone. The Collector's
              lack of enterprise management features (centralized config, audit logging, PII masking, SLA
              support) preserves Cribl's differentiation. Grafana's blog and ecosystem commentary confirm
              growing OTel adoption in cloud-native environments.

              Hyperscaler-native routing tools (AWS Kinesis Firehose/Security Lake, Azure Monitor DCR
              transformations, GCP Log Router/Pub-Sub) represent free or near-zero-cost substitutes
              within their respective cloud ecosystems. For single-cloud greenfield deployments, these
              tools can replicate limited Cribl routing functionality. Their limitation is multi-cloud and
              multi-destination routing: an enterprise routing to Splunk, Datadog, and Cribl Lake across
              AWS and Azure still requires Cribl's vendor-neutral layer. Cribl's customer base skews
              toward large hybrid enterprises, limiting hyperscaler substitution risk for the installed
              base.

              Internal build remains a substitution option for large enterprises with engineering capacity.
              Cribl's total cost of ownership messaging addresses this: a custom pipeline requires ongoing
              maintenance, lacks vendor support, and needs re-engineering for each new source or destination
              connector. Cribl's 80+ managed connectors represent thousands of hours of integration
              engineering that would need to be replicated in-house. Cribl's per-GB pricing, while higher
              than some alternatives, is competitive when measured against the engineering and operational
              cost of homegrown pipeline solutions.
            claimRefs:
              - CP025
              - CP026
              - CP027
              - CP028
              - CP029
              - CP030
