  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Buyer Personas
        blocks:
          - type: paragraph
            body: |
              Cribl's customer base divides into four primary segments that reflect both the buyers who
              authorize purchase and the users who operate the platform on a daily basis.

              The largest and most strategically important segment is **Enterprise Security Teams** at
              Fortune 1000 and Global 2000 companies. The buyer is typically a CISO, VP of Security
              Engineering, or Director of Security Operations; the user is the SOC analyst or security
              engineer managing SIEM pipelines. The primary use case is SIEM cost optimization—routing
              logs to Splunk, Microsoft Sentinel, or IBM QRadar while filtering out low-value events
              before ingestion, which customers report reducing Splunk licensing costs by 30–60%. This
              segment also covers compliance-driven log retention needs in banking, insurance, and
              healthcare verticals subject to PCI-DSS, HIPAA, and SOX requirements.

              The second segment is **DevOps and Platform Engineering Teams** at cloud-native and
              hybrid enterprises. The buyer is a VP of Engineering or Platform Engineering director; the
              user is a DevOps or SRE engineer. The primary use case is observability data routing—
              sending metrics, traces, and logs to Datadog, Grafana, or Prometheus while keeping costs
              manageable as telemetry volume scales. Cribl Edge is the primary product here, deployed as
              a lightweight agent at the data origin point.

              The **Federal and Government Segment** became fully addressable following Cribl's FedRAMP
              Authority to Operate granted in January 2026, plus prior DOD Impact Level 4 authorization.
              The buyer is a federal IT or cybersecurity program manager; use cases include log
              aggregation for civilian agencies and security telemetry pipelines for intelligence
              community workloads.

              The fourth segment is **Mid-Market Technology and SaaS Companies** (roughly 500–5,000
              employees), where Cribl competes on cost efficiency and ease of deployment versus
              full-platform alternatives. This segment is served partly through channel partners such as
              AWS Marketplace, which provides a friction-reduced procurement path.

              Geographically, Cribl's customer base is predominantly North America–centric, consistent
              with its San Francisco headquarters and enterprise U.S. go-to-market focus, with growing
              presence in Western Europe and emerging traction in APAC and the Middle East.
