  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Cribl's competitive landscape is unusual because the company occupies a horizontal
              infrastructure layer between data sources and analytics destinations rather than competing
              within a single product category. This creates three distinct competitive dynamics
              simultaneously.

              The first category comprises traditional SIEM, log management, and security analytics
              vendors: Splunk (now Cisco following the $28 billion acquisition completed March 2024),
              Elastic (ELK stack and Elastic Security), LogRhythm (merged with Exabeam in 2023), and IBM
              QRadar. These vendors' native ingestion pipelines overlap with Cribl Stream's routing
              functionality. Crucially, their high per-GB ingestion costs—particularly Splunk's—created
              the very demand that Cribl was designed to address. Cribl initially positioned itself as a
              Splunk complement: customers deployed Cribl Stream to filter, transform, and sample data
              before it reached Splunk, reducing Splunk costs by 30–80%. This paradox—where the largest
              competitor's pricing model is the primary market creation force—defines Cribl's origin story
              and growth engine.

              The second category is observability and APM platforms: Datadog, New Relic, Dynatrace, and
              Grafana. These vendors have built log management and, in Datadog's case, explicit pipeline
              routing features (Datadog Observability Pipelines, GA 2023) that compete directly with
              Cribl Stream for specific workloads. However, they remain destination-centric rather than
              routing-neutral—their pipeline tools primarily funnel data into their own proprietary
              backends. Cribl's differentiation is routing data to any destination, including these very
              platforms.

              The third category is emerging pure-play pipeline vendors and free substitutes: Mezmo
              (formerly LogDNA), Chronosphere, Observe Inc., Logz.io, and the OpenTelemetry Collector.
              The OTel Collector—a CNCF open-source project backed by Google, Microsoft, Amazon, Datadog,
              and Splunk—provides free log, metric, and trace routing that partially overlaps with Cribl
              Stream's core value. Cribl's strategic response is to embrace OTel compatibility rather than
              compete directly, positioning its commercial platform as the enterprise management and
              governance layer atop an OTel foundation.

              Hyperscaler routing services—AWS Kinesis Firehose, Azure Monitor DCR, and GCP Log
              Router—represent additional free substitutes for customers operating within a single cloud
              environment. For multi-cloud and hybrid enterprises, which represent the majority of Cribl's
              9,000+ deployment base including 50%+ of the Fortune 500, these tools remain insufficient
              substitutes due to multi-destination and multi-vendor requirements.
