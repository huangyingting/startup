      - number: '5.3'
        title: Technology Stack and Operating Architecture
        blocks:
          - type: paragraph
            body: |
              Cribl's technology stack reflects a combination of open standards adoption, cloud-native
              deployment patterns, and proprietary stream-processing logic. The key architectural choices
              are described below.

              **Runtime and Execution Layer**: Cribl Stream and Edge are written primarily in Node.js
              (JavaScript/TypeScript), with performance-critical path operations accelerated via native
              C++ bindings and WebAssembly (WASM) modules. The Node.js foundation enables rapid iteration
              on pipeline operators and integrations. Critics have noted that Node.js is not the conventional
              choice for high-throughput data processing, but Cribl's architecture offloads heavy computation
              to worker nodes, mitigating single-process throughput limitations. The 500B events/day claim
              implies the horizontal worker scaling model is effective in practice.

              **Integration Ecosystem**: Cribl maintains 300+ source/destination connectors ("packs"),
              including native connectors for Splunk, Elastic, Datadog, AWS CloudWatch, Azure Monitor,
              Google Cloud Logging, Kafka, Kinesis, and OpenTelemetry. The AWS Marketplace listing confirms
              integration depth with the AWS cloud ecosystem. The company claims support for the full
              OpenTelemetry Protocol (OTLP) stack, positioning it as an OTel-compatible collector that
              also provides proprietary processing capabilities beyond standard OTel collector configs.
              Fluentd/Fluent Bit compatibility is noted as a source input, allowing enterprises already
              using CNCF logging agents to route through Cribl without agent replacement.

              **Deployment Models**: Cribl supports three deployment models: (1) self-managed on-premises
              on customer infrastructure; (2) cloud-managed (Cribl.Cloud), a fully managed SaaS deployment
              hosted by Cribl; and (3) cloud-hosted customer-managed (BYOC) where the customer owns cloud
              accounts. Kubernetes is a first-class deployment target, with Helm charts and Kubernetes
              Operators available for Stream and Edge deployments. The Kubernetes deployment model is
              documented in Cribl's official documentation and enables auto-scaling worker pools.

              **Data Formats and Protocols**: Cribl processes data as event streams internally, with native
              support for JSON, key-value, CSV, CEF (Common Event Format), LEEF, Syslog (RFC3164/5424),
              and custom regex-parsed formats. Cribl Lake stores data in Apache Parquet format with Hive-
              compatible partitioning, enabling downstream analytics with tools like Athena, Spark, and
              Databricks. OpenTelemetry Protocol (OTLP) is supported for both input and output.

              **Cribl Guard**: Launched in 2025, Cribl Guard is a security layer that provides AI-powered
              anomaly detection on the telemetry pipeline itself—detecting data exfiltration, unexpected
              routing changes, and pipeline tampering. This capability is described as using behavioral
              baselines trained on normal pipeline operation patterns to flag deviations.

              **Dependencies**: Cribl's architecture has notable external dependencies including Apache
              Kafka (for high-throughput buffering), AWS/Azure/GCP cloud storage APIs (for Lake), and
              the OpenTelemetry specification (for protocol standards). Kubernetes and container runtime
              infrastructure are required for cloud-native deployments.
