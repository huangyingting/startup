      - number: '7.4'
        title: People, Key-Person, and Execution Risks
        blocks:
          - type: paragraph
            body: |
              Cribl's people risk profile has improved materially since founding: approximately 1,200
              employees (per LinkedIn, May 2026) enable functional depth. However, key-person dependency
              on CEO Clint Sharp and CTO Dritan Bitincka remains an investment risk. Sharp is the sole
              external spokesperson and investor relationship anchor; Bitincka owns core technical
              architecture and AI product differentiation. No CFO, COO, or CRO is publicly identified,
              representing an organizational transparency gap relative to peers at comparable ARR stages.

              Cribl's Glassdoor rating of 4.2/5.0 and Fortune Best Workplaces recognition suggest
              positive employee satisfaction, reducing near-term attrition risk. However, Cribl competes
              for engineering talent against Datadog, Cisco/Splunk, and well-funded observability
              startups, creating ongoing compensation pressure at 1,200+ employees.

              The transition from single-product (Stream) to multi-product platform (Stream, Edge, Lake,
              Search) requires a more consultative, longer-cycle sales motion. PeerSpot adverse reviews
              cite support quality inconsistency, indicating a customer success scaling execution risk.
              The March 2026 agentic AI positioning requires R&D reinvestment that could increase burn
              rate and pressure operating leverage relative to the $3.5B valuation justification.
            claimRefs:
