chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Overview
        blocks:
          - type: paragraph
            body: |
              Cribl, Inc. is a San Francisco-based enterprise software company founded in 2018 by three
              former Splunk engineers: Clint Sharp (CEO), Dritan Bitincka (co-founder), and Ledion Bitincka
              (co-founder). The company is headquartered at 22 4th Street, Suite 1300, San Francisco,
              California 94103, with additional operations in Austin, Texas. Cribl defines itself as the
              "AI Platform for Telemetry," empowering enterprises to manage and analyze machine-generated
              observability data—logs, metrics, traces, and configuration data—for both human and AI-driven
              use cases.

              The company's core value proposition centers on vendor-neutral telemetry pipeline infrastructure:
              rather than locking customers into a single analytics platform, Cribl enables organizations to
              collect data from any source, process it efficiently, and route it to any destination. This
              approach directly addresses the cost and complexity challenges created by the explosive growth
              of IT and security telemetry, which is expanding at approximately 30% compound annual growth
              rate (CAGR) while enterprise budgets remain constrained.

              Cribl operates as a privately held company and has not pursued an IPO as of the report date.
              Its SEC EDGAR registration confirms its principal offices at the San Francisco address. As of
              May 2026, the company employs approximately 1,200 people globally, per LinkedIn data showing
              1,203 listed employees, though the company's own headcount may differ. Cribl's products are
              available in cloud, on-premise, and hybrid deployments, serving organizations from mid-market
              to large enterprise and government sectors.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
