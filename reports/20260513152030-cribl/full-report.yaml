      - number: '3.2'
        title: Direct Competitors — Telemetry Pipeline Vendors
        blocks:
          - type: paragraph
            body: |
              The clearest direct competitors to Cribl are vendors that share its pipeline-first
              positioning: Mezmo, Elastic's agent stack (Beats/Elastic Agent/Logstash), and Chronosphere.

              Mezmo (formerly LogDNA) underwent a significant repositioning in 2022, rebranding from a
              cloud log management SaaS service to a dedicated telemetry pipeline platform. Mezmo Pipeline
              targets DevOps and platform engineering teams with developer-friendly UX, REST API-first
              configuration, and competitive per-GB pricing below Cribl's list price. Mezmo's primary
              limitation is scale: the company is smaller, has fewer enterprise-grade features (limited
              data masking, no native edge agent, no FedRAMP authorization), and lacks Cribl's 80+
              integration breadth. No public ARR or headcount data is available for Mezmo, limiting direct
              financial comparison. Logz.io's observability blog has tracked the telemetry pipeline
              competitive landscape and validates Mezmo's position as a direct Cribl alternative at lower
              price points for less complex use cases.

              Elastic's data collection stack (Beats lightweight shippers, Elastic Agent with Fleet
              management, and Logstash pipeline processor) provides mature log routing capability.
              However, Logstash's pipeline processing is tightly coupled to Elasticsearch as the preferred
              destination; multi-destination routing to non-Elastic backends requires custom output plugins
              and does not match Cribl Stream's managed multi-destination experience. Elastic's competitive
              comparison page against Cribl emphasizes the ELK stack's integrated analytics and search
              capabilities over standalone routing, reflecting Elastic's destination-centric approach.
              Elastic's fiscal year 2024 revenue of approximately $1.7 billion confirms significant scale,
              though the majority is search and observability cloud rather than pipeline-only.

              Chronosphere is a cloud-native observability platform focused on Prometheus-compatible
              metrics and distributed trace management for engineering teams. Its pipeline capability
              overlaps with Cribl primarily in the cloud-native DevOps use case (cost control for
              high-cardinality Prometheus data) rather than security and compliance use cases.
              Chronosphere targets engineering teams at cloud-native organizations rather than enterprise
              SecOps buyers, meaning direct competition with Cribl's primary security analytics buyer is
              limited. Chronosphere's company page confirms its focus on engineering team efficiency for
              cloud-native applications rather than SIEM routing or compliance.

              In the feature capability matrix, Cribl Stream is the only vendor to offer full
              multi-destination routing, production-grade data masking, and FedRAMP ATO simultaneously
              among dedicated pipeline vendors. Mezmo offers some masking capability but lacks FedRAMP;
              the OTel Collector offers routing but lacks masking and enterprise management; Elastic Agent
              is strong on ingest but destination-locked. Cribl Edge provides a lightweight distributed
              agent for log collection at remote locations, offering managed deployment and centralized
              policy management that differentiates it from bare OTel Collector deployments.
            claimRefs:
              - CP009
              - CP010
              - CP011
