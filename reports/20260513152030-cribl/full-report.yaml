      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Cribl was co-founded by three alumni of Splunk, giving the company deep domain expertise in
              the observability and log management space. Clint Sharp serves as CEO and is a recognized
              industry voice on data pipeline strategy. Dritan Bitincka (CTO/Chief Scientist) and his
              brother Ledion Bitincka bring technical depth rooted in large-scale distributed systems work
              at Splunk and earlier companies.

              The founding team's "ex-Splunker" background is strategically significant: they built the
              product with intimate knowledge of Splunk's architectural limitations and pricing model,
              enabling Cribl Stream to be positioned explicitly as a complement to and migration path from
              Splunk environments. Sequoia Capital's public portfolio description confirmed the company was
              "Founded by three ex-Splunkers on a mission to get the most out of machine data."

              The leadership team has remained stable since founding with no material announced executive
              departures as of the report date. This stability is notable given the turbulent 2022–2024
              period in the broader tech sector. Fortune magazine has recognized Cribl on multiple best
              workplaces lists, including Best Medium Workplaces and Best Workplaces in Technology,
              suggesting strong internal culture and talent retention. The LinkedIn profile as of May 2026
              shows 117,731 followers, a proxy for brand reach among technical practitioners. No publicly
              identified CFO or COO was found in available sources, representing a governance gap relative
              to peers at similar funding stages.
            claimRefs:
