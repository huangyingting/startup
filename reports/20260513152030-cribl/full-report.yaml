      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Fortune 500 Penetration Validates Enterprise Fit at Scale
            body: >
              More than 50% of the Fortune 500 using Cribl is a remarkable achievement for a $300M ARR company—it
              implies long-duration enterprise contracts, multi-environment deployments, and repeated purchasing
              behavior within the same accounts. Enterprise SaaS companies at this penetration level typically see NRR
              of 120%+ as volume-based pricing drives organic expansion alongside deliberate product cross-sell.
            calloutType: strength
            claimRefs:
              - CU010
              - CU011
              - CU012
          - type: callout
            title: 'Adverse Pricing Signal in Mid-Market: OTel and Reddit Friction'
            body: >
              Community discussions on Reddit r/sysadmin and PeerSpot adverse reviews consistently flag Cribl's pricing
              complexity and steep volume-based scaling as concerns. In the mid-market (500–5,000 employees), where IT
              budgets are tighter and the free OpenTelemetry Collector is a credible alternative, these signals warrant
              a focused diligence workstream on mid-market cohort churn rates and the NRR floor for sub-$100K ACV
              accounts.
            calloutType: risk
            claimRefs:
              - CU028
