      - number: '7.5'
        title: Strategic Risks and Mitigation Framework
        blocks:
          - type: paragraph
            body: |
              Cribl's most acute strategic risk is commoditization: the core telemetry routing and
              filtering function is increasingly available as a native feature in destination platforms.
              Platform incumbents (Datadog, Elastic, Google Chronicle) have invested in native log
              pipeline capabilities. The New Stack's coverage explicitly documents practitioner
              skepticism about commercial pipeline value given the free OTel Collector.

              Cisco's $28B acquisition of Splunk creates a large, well-capitalized competitor with
              both distribution and engineering resources to build native pipeline capabilities. MSSP
              Alert and HelpNetSecurity confirm this competitive dynamic is widely understood in the
              security community. Cribl's primary mitigations are: (1) moving up the stack into
              higher-value analytics (Search, AI features); (2) expanding into federal market where
              incumbents have less foothold; (3) deepening cloud partnerships; and (4) building AI
              capabilities the OTel Collector cannot match.

              Kill criteria for an investment thesis break: sustained NRR below 100% in two consecutive
              quarters; confirmed Cisco/Splunk native pipeline at no extra cost in Splunk licenses;
              CEO departure without confirmed successor; federal budget cuts greater than 20% to IT
              discretionary spending. The $319M Series E provides approximately 24–36 months of capital
              runway before dilutive Series F risk.
