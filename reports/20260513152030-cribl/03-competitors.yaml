callouts:
  - calloutType: strength
    title: "FedRAMP ATO First-Mover Advantage"
    body: >
      Cribl achieved FedRAMP Authority to Operate in January 2026, becoming the first independent
      telemetry pipeline vendor to receive this federal authorization. In federal and DoD
      procurement, FedRAMP ATO is a non-negotiable requirement that gives Cribl a structural
      12–24 month head start over pure-play pipeline competitors pursuing their own authorizations.
    claimRefs: [CP033, CP003]

  - calloutType: risk
    title: "Cisco/Splunk Bundling: Highest-Severity Competitive Threat"
    body: >
      Cisco's $28 billion acquisition of Splunk creates a potential bundling threat: if Cisco
      packages pipeline capabilities into Splunk Security Suite at zero incremental cost for
      existing customers, Cribl's primary market creation mechanism (Splunk cost reduction) is
      directly challenged. The realization timeline is 2–4 years, but diligence should monitor
      quarterly Splunk product release cadence for pipeline feature expansion.
    claimRefs: [CP031, CP018, CP020]

  - calloutType: insight
    title: "OTel Coexistence Strategy Reduces Commoditization Risk"
    body: >
      Rather than competing against the OpenTelemetry Collector, Cribl embraces OTel
      compatibility and positions its commercial platform as an enterprise orchestration and
      governance layer above OTel. This coexistence strategy reduces near-term existential risk
      from OTel commoditization while preserving Cribl's differentiation in data masking,
      compliance, and enterprise management capabilities.
    claimRefs: [CP032, CP026]

  - calloutType: strength
    title: "Vendor Neutrality as Structural Trust Moat"
    body: >
      Unlike every major competitor (Splunk, Elastic, Datadog, New Relic), Cribl does not
      compete with the destination systems to which it routes data. This structural neutrality
      creates a self-reinforcing trust advantage: enterprises deploy Cribl without displacing
      existing analytics investments, and Cribl has no incentive to favor any destination
      backend. This positioning grows more valuable as multi-SIEM and multi-cloud environments
      proliferate.
    claimRefs: [CP034, CP001, CP025]

