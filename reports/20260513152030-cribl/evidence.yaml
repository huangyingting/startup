evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: arr
    missingEvidence: >-
      Audited ARR figures and ARR growth rate trajectory; company announced $300M+ but has not disclosed the exact
      number or YoY growth percentage.
    whyItMatters: >-
      ARR growth rate is the primary valuation input; decelerating growth would significantly change the buy/sell/hold
      recommendation.
    diligencePath: Request from management in data room; compare to auditor-reviewed financials if available.
    relatedQuestionRefs:
      - QO004
      - QO025
      - QO027
  - type: private-evidence-only
    severity: material
    topic: governance
    missingEvidence: >-
      Board composition, Series E governance rights (board seats, protective provisions, liquidation preferences), and
      any secondary transactions by early investors.
    whyItMatters: Governance rights determine exit dynamics, investor alignment, and downside protection for future investors.
    diligencePath: Request cap table, board composition, and investor rights agreements from management.
    relatedQuestionRefs:
      - QO022
      - QO023
      - QO024
    relatedTableRefs:
      - TO003
  - type: private-evidence-only
    severity: material
    topic: unit-economics
    missingEvidence: Gross margin, operating margin, burn rate, and net revenue retention (NRR) are not publicly disclosed.
    whyItMatters: >-
      Unit economics determine whether the $300M ARR translates into a path to profitability or requires continued large
      capital infusions.
    diligencePath: Request P&L, cash flow statements, and NRR cohort data in diligence data room.
    relatedQuestionRefs:
      - QO025
      - QO027
      - QO021
  - type: enumeration-incomplete
    severity: minor
    topic: leadership
    missingEvidence: >-
      Full leadership team beyond three co-founders, including CFO, COO, CRO, and VP Engineering roles, not identified
      in public sources.
    whyItMatters: Key-person risk assessment requires understanding breadth of the management team.
    diligencePath: Review LinkedIn for full C-suite; request organizational chart from management.
    relatedQuestionRefs:
      - QO020
      - QO021
    relatedTableRefs:
      - TO002
  - type: stale
    severity: minor
    topic: founding-date
    missingEvidence: Conflict between LinkedIn (2018) and Sequoia portfolio (2017) on founding/incorporation year.
    whyItMatters: Accurate founding date affects milestone chronology and age of the company relative to funding pace.
    diligencePath: Request Delaware incorporation certificate from management or counsel.
    relatedQuestionRefs:
      - QO030
    relatedTableRefs:
      - TO004
  - type: missing-source
    severity: material
    topic: telemetry-pipeline-middleware-market-sizing
    missingEvidence: >-
      No independent analyst firm has published a standalone market sizing for telemetry pipeline middleware as a
      distinct software category. All available estimates cover SIEM, log management, or observability as broader
      segments.
    whyItMatters: >-
      Without an independent TAM estimate for the pipeline middleware category, the Cribl $20B TAM claim cannot be
      independently validated, and investors must rely on Cribl own scope framing rather than third-party corroboration.
    diligencePath: >-
      Commission or identify a bespoke analyst sizing study; triangulate from Cribl ARR growth rate, win-rate by
