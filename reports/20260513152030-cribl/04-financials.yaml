  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: arr-growth-rate
      missingEvidence: "Exact ARR (company says $300M+, not the precise figure) and quarterly ARR growth trajectory; no YoY growth rate has been disclosed."
      whyItMatters: "ARR growth rate is the single most important input to valuation; the difference between 35% and 55% YoY compresses or expands the justifiable multiple by 30–50%."
      diligencePath: "Request management-certified ARR detail in data room; obtain monthly billing data over trailing 8 quarters; compare to auditor-reviewed financials if available."
      relatedQuestionRefs: [QI001, QI002, QI015, QI027]
  
    - type: private-evidence-only
      severity: material
      topic: unit-economics
      missingEvidence: "Gross margin, NRR, CAC, LTV, and payback period are all undisclosed; no cohort data available publicly."
      whyItMatters: "Unit economics determine whether the $300M ARR translates to a path to profitability or requires continuous capital infusions; gross margin below 65% would materially change the valuation thesis."
      diligencePath: "Request audited P&L; CFO presentation on margin bridge by product; cohort NRR table covering at least 4 vintage years; gross vs. net churn separately."
      relatedQuestionRefs: [QI007, QI008, QI009]
      relatedTableRefs: [TI003]
  
    - type: private-evidence-only
      severity: material
      topic: burn-and-runway
      missingEvidence: "Burn rate, cash position, and EBITDA not disclosed; runway can only be estimated from Series E proceeds and benchmark assumptions."
      whyItMatters: "Burn determines whether the company can execute its product roadmap and federal expansion without bridge financing; undisclosed burn creates pricing risk for secondary investors."
      diligencePath: "Request quarterly cash flow statements and 13-week rolling cash forecast; ask CFO for monthly cash burn and trend over trailing 4 quarters."
      relatedQuestionRefs: [QI022, QI014]
      relatedTableRefs: [TI004]
  
