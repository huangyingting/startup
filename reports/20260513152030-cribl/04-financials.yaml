callouts:
  - calloutType: risk
    title: "ARR Multiple Premium Requires Sustained 40%+ YoY Growth to Justify"
    body: >
      At $3.5B valuation against $300M+ ARR, Cribl trades at approximately 11.7x forward ARR—
      above the 2024 public-market re-rating band of 8–10x for infrastructure SaaS at comparable
      scale. Any ARR growth deceleration below 35–40% YoY would compress the justifiable multiple
      to 7–9x, implying a 20–40% valuation haircut in a secondary or future financing event.
      The June 2024 step-down round at $3.0B—before the Series E recovered to $3.5B—demonstrates
      that investor sentiment can shift materially within 12–18 months. Diligence must stress-test
      the growth trajectory against competitive displacement risk from Cisco/Splunk bundling.
    claimRefs: [CI019, CI020, CI025, CI029, CI032]

  - calloutType: strength
    title: "Offensive Series E Capital with Multi-Year Runway Supports Platform Expansion"
    body: >
      The oversubscribed $319M Series E at the prior peak valuation, coinciding with the $300M ARR
      milestone and FedRAMP ATO, signals strong investor conviction in the platform's durability.
      With total capital of ~$864M and ARR above $300M, Cribl has the financial capacity to
      invest in AI features (Cribl Guard, AI Copilot Editor), federal market expansion, and
      international growth without near-term dilution pressure. The multi-product suite creates
      robust NRR mechanics that should compound free cash flow generation as gross margins mature.
    claimRefs: [CI002, CI003, CI007, CI028, CI037]

