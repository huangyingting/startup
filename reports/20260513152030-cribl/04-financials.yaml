company:
  name: Cribl
chapter:
  number: 4
  title: "Financials"
  summary: >
    Cribl's financial profile centers on a SaaS subscription model that surpassed $300M ARR in
    February 2026, with data-volume-based pricing spanning a Free-to-Enterprise tier structure.
    A $319M Series E at $3.5B valuation in late 2024 implies approximately 11.7x forward ARR,
    consistent with premium growth-stage infrastructure SaaS but above 2024 public-market
    re-rating levels. Unit economics—gross margin, NRR, CAC, LTV—cannot be directly verified
    from public sources, but observable signals suggest mid-to-high 70s gross margins and NRR
    above 120%. Capital adequacy appears strong with Series E proceeds and a growing ARR base;
    burn and cash position remain undisclosed. Full financial diligence must request audited
    financials, cohort NRR data, gross margin breakdown, and the ARR growth trajectory over
    the prior four quarters.

sections:
  - id: revenue-recognition
    title: "Revenue Model and Recognition Basis"
    body: |
      Cribl operates a SaaS subscription revenue model in which enterprise customers pay recurring
      fees based primarily on daily data ingest volume (measured in gigabytes per day) across one
      or more Cribl products. The company's primary revenue metric is Annual Recurring Revenue
      (ARR), which the company officially surpassed $300 million in February 2026 per its
      newsroom announcement. Monthly Recurring Revenue (MRR) is derivable from ARR but has not
      been separately disclosed. Because Cribl is a private company, GAAP revenue figures,
      deferred revenue balances, and P&L statements are not publicly available.

      Revenue recognition follows a subscription model consistent with ASC 606 principles: fees
      for software access are recognized ratably over the contract term, while professional
      services revenue is recognized as services are delivered. Most enterprise contracts are
      annual, with multi-year commitments available at negotiated rates. The company's FinOps
      Center tool—available to customers—helps track pipeline usage and cost, a signal that
      customers are cost-sensitive to volume overages and that Cribl's pricing is genuinely
      consumption-adjacent even if sold as subscription.

      The $300M ARR milestone is a company-claimed figure announced via press release and newsroom
      post, not an audited or independently verified number. Prior public financial markers include
      an implied $200M ARR level in early-to-mid 2024, based on growth round investor commentary
      and industry reporting. These milestone disclosures allow construction of an approximate ARR
      growth trajectory, though the exact quarterly cadence and YoY growth rate are not disclosed.

      Revenue cohorts consist of new customer ARR, expansion ARR from existing customers adopting
      additional products or higher data volumes, and renewal ARR. The company's expansion from a
      single pipeline product (Stream) to a four-product suite (Stream, Edge, Lake, Search) creates
      meaningful upsell vectors that likely underpin robust net revenue retention.
    claimRefs: [CI001, CI012, CI034, CI039]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: pricing-monetization
    title: "Pricing, Packaging, and Monetization Model"
    body: |
      Cribl's publicly visible pricing page lists a Free tier for low-volume environments alongside
      multiple paid subscription tiers. The Free tier is designed for developers and small teams
      testing the platform. Paid tiers scale by daily data ingest volume, with price per GB
      declining at higher volume commitments—a structure common in observability SaaS. The company
      also offers enterprise pricing with custom terms, professional services packages, and
      multi-year commitment discounts not shown on the public pricing page.

      Cribl Stream, Edge, Lake, and Search are each separately licensed, creating a platform
      land-and-expand motion. A customer might start with Stream for pipeline cost reduction, then
      add Edge for distributed endpoint collection, Lake for affordable telemetry retention, and
      Search for federated investigations. Each product cross-sell increases the customer's total
      contract value without requiring competitive displacement of a third-party product.

      Marketplace listings on AWS, Azure, and Google Cloud allow customers to purchase Cribl
      through existing cloud spending commitments (enterprise discount programs, EDP agreements),
      which reduces procurement friction for cloud-native enterprises. This channel also generates
      marketplace co-sell revenue and, for the cloud providers, positions Cribl as infrastructure
      that keeps data within those platforms.

      A FinOps Center capability helps customers optimize costs and monitor data volume trends.
      This is both a retention tool (customers who understand their costs churn less) and a
      potential upsell vehicle (clear visibility into data growth drives conversations about tier
      upgrades). Pricing complexity has been flagged by users as a challenge at enterprise scale,
      with some reviewers noting difficulty predicting costs as data volumes grow across multiple
      products.
    claimRefs: [CI004, CI005, CI013, CI021, CI022, CI030, CI032, CI033]
    tableRefs: [TI002]
    figureRefs: []

  - id: unit-economics
    title: "Unit Economics: CAC, LTV, Gross Margin, and NRR Estimates"
    body: |
      Cribl has not publicly disclosed gross margin, net revenue retention (NRR), customer
      acquisition cost (CAC), or customer lifetime value (LTV). All unit economics estimates
      for this chapter are derived from public signals, industry benchmarks for enterprise
      infrastructure SaaS, and comparable public-company data.

      Gross margin is estimated in the 65–75% range based on the following reasoning: Cribl's
      software is delivered as SaaS with hosting on hyperscaler infrastructure (AWS, Azure, GCP),
      and includes professional services revenue that is typically lower-margin (30–45%). At
      $300M ARR with a meaningful professional services mix, blended gross margin likely falls
      between 65% and 75%. This compares to Datadog at ~77% gross margin and Elastic at ~74%
      gross margin on a public-company basis. Cribl's gross margin may be lower than pure-play
      SaaS peers if the on-premise/hybrid deployment base requires dedicated support overhead.

      NRR is estimated above 120% based on three observable signals: (1) the four-product platform
      creates meaningful upsell vectors; (2) Cribl's customer base includes large enterprises whose
      data volumes typically grow 30–50% per year, mechanically increasing subscription costs;
      and (3) the competitive positioning as a cost-reduction tool means customers who expand
      data volumes have strong incentive to keep and expand Cribl to manage costs. An NRR above
      120% would be consistent with Cribl's reported ARR growth trajectory.

      CAC for enterprise security and observability SaaS is typically high in absolute terms.
      With approximately 1,200 employees and assuming a typical S&M expense ratio of 40–50% of
      ARR for a growth-stage company, annual S&M spend is estimated at $120M–$150M. Divided by
      new customer additions (estimated at 1,000–2,000 per year at this growth rate), enterprise
      segment CAC could exceed $50,000–$150,000 per net new customer.

      Revenue per employee is approximately $250,000 ($300M ARR / 1,200 employees), a healthy
      but not exceptional ratio for enterprise infrastructure SaaS at this stage.
    claimRefs: [CI006, CI007, CI008, CI009, CI010, CI011, CI025, CI031, CI035, CI036]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: capital-adequacy
    title: "Capital Structure, Burn Rate, and Runway"
    body: |
      Cribl has raised approximately $864 million in total equity capital across six disclosed
      funding rounds from 2019 through late 2024. The most recent financing event was a $319
      million Series E led by Google Ventures (GV) at a $3.5 billion valuation, announced in
      late 2024. This followed a June 2024 strategic growth round of $150 million at $3.0 billion
      valuation, which represented a modest step-down from the $3.5 billion Series D peak in
      June 2022. The Series E recovered the full prior valuation, suggesting renewed investor
      confidence correlated with the $300M ARR milestone disclosed in early 2026.

      Burn rate, cash and cash equivalents, and EBITDA are not publicly disclosed. In the absence
      of audited financials, burn must be estimated. If Cribl is growing at approximately 50% YoY
      from $200M to $300M ARR, and assuming a Rule-of-40 scenario where growth plus margin equals
      40 (growth = 50%, therefore margin ~= -10%), the company may be burning approximately $30M
      per year in cash. However, this is highly uncertain. Under a more aggressive investment
      scenario (growth rate priority, heavy S&M and R&D spend), burn could be $60–$120M annually.
      At Series E proceeds of $319M, this implies runway of 2.5–10 years depending on burn rate.

      The Series E appears to be offensive capital rather than defensive: the round was described
      as oversubscribed, the company had just passed $300M ARR, and the press release emphasized
      AI platform positioning and enterprise market expansion—language consistent with
      growth-oriented deployment. A defensive raise (avoiding a down-round, extending runway
      through a difficult macro) would not typically attract a $319M oversubscribed round at the
      prior peak valuation. This characterization implies Cribl plans to invest the proceeds into
      product development, go-to-market expansion, federal/government sales, and potentially
      international growth.

      No debt facilities, credit lines, or venture debt have been publicly disclosed. The capital
      structure appears to be equity-only, which is common for high-growth software companies at
      this stage but limits the ability to model leverage-adjusted returns.
    claimRefs: [CI002, CI003, CI014, CI015, CI016, CI017, CI018, CI019, CI023, CI024, CI027, CI028, CI037, CI038]
    tableRefs: [TI004]
    figureRefs: [FI004]

  - id: financial-trajectory-and-gaps
    title: "Financial Trajectory and Evidence Gaps"
    body: |
      Publicly available financial milestones allow construction of an approximate ARR growth
      curve. Cribl passed $100M ARR circa 2021–2022, grew to approximately $200M ARR by early
      2024 (implied by the June 2024 $150M growth round investor commentary), and officially
      surpassed $300M in February 2026. This trajectory implies roughly 50% CAGR over the
      2022–2026 period, a strong performance for an infrastructure SaaS company at this scale.

      However, the precise quarterly ARR trajectory is unknown, and growth could be decelerating
      from higher rates. The fact that Cribl moved from a peak $3.5B valuation in 2022 to a
      $3.0B growth round in June 2024 before recovering to $3.5B with the Series E suggests the
      company experienced a valuation contraction consistent with the broader SaaS market re-rating
      of 2022–2024. Whether ARR growth accelerated or decelerated during this period is unknown.

      At $3.5B valuation and $300M ARR, the implied multiple is approximately 11.7x forward ARR.
      Public-market comparables for infrastructure observability SaaS at $300M ARR in 2026 trade
      at approximately 10–15x NTM revenue. Cribl's multiple is within this band but at the higher
      end, requiring sustained high growth to justify. A deceleration to 25–30% YoY ARR growth
      would compress the justifiable multiple to 7–9x, implying a valuation of $2.1B–$2.7B—a
      potential 25–40% discount to the last round price. This is the primary financial risk for
      investors.

      Material evidence gaps include: exact ARR (company says $300M+, not the specific number),
      quarterly ARR trajectory, gross margin, NRR, CAC, burn rate, and any debt obligations.
      A full diligence process would require access to audited financial statements, a cohort
      revenue analysis showing NRR by vintage year, a CFO presentation on the path to
      profitability, and at minimum two years of historical P&L data.
    claimRefs: [CI020, CI025, CI026, CI029, CI031, CI038, CI039, CI040]
    tableRefs: [TI005]
    figureRefs: [FI003]

