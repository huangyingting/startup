      claimRefs: [CO009, CO010]
  foundingLocation: "San Francisco, California, USA"
  headquarters: "San Francisco, California, USA"
  productSummary: >
    Cribl's five-product portfolio addresses the full telemetry data lifecycle: Stream (data pipeline
    for routing, transforming, and enriching logs, metrics, and traces), Edge (lightweight distributed
    agent for collection at the edge), Lake (schema-on-read object storage layer for cheap log retention),
    Search (federated query across live and archived data without pre-ingestion), and Guard (background
    sensitive-data detection and masking). All products share vendor-neutral architecture with 80+ source
    and destination connectors. Launched in March 2026, Guard extends Cribl into data security posture.
  customerFocus: >
    Large enterprises and mid-market organizations in financial services, federal and defense, healthcare,
    technology, and retail—all sectors with high regulatory log compliance burden (PCI-DSS 4.0, CMMC 2.0,
    SEC cyber rules, DORA). Primary buyer is the enterprise SecOps team; secondary buyers include IT
    Operations, Platform Engineering, and SRE teams.
  businessModel: >
    Volume-based SaaS subscription priced in GB per day of telemetry data ingest, aligning revenue
    incentives with customer cost-reduction goals. Cribl generates additional revenue through professional
    services, training, and a free tier for low-volume users that drives pipeline adoption. Land-and-expand
    motion: customers typically start with Stream for SIEM cost reduction, then expand to Edge, Lake,
    and Search.
  stage: "Series E"
  fundingStatus: >
    Series E: $319M at $3.5B valuation, August 2024, led by GV (Google Ventures), with participation
    from IVP, Sequoia Capital, Greylock, and Redpoint. Prior rounds include Series D ($150M, 2022),
    Series C ($200M, 2021), Series B ($35M, 2020). Total raised estimated at approximately $700M+.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO006, CO007, CO008, CO009, CO010, CO013, CO020, CO021, CO022, CO023, CO024, CO025]

