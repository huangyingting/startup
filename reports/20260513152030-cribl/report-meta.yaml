companyProfile:
  summary: >
    Cribl is a San Francisco–based enterprise software company founded in 2018 by Clint Sharp (CEO),
    Dritan Bitincka (CTO), and Ledion Bitincka—all former Splunk engineers. The company builds a
    vendor-neutral telemetry pipeline platform that routes, transforms, and enriches security and
    observability data from any source to any destination without vendor lock-in. As of February 2026,
    Cribl has crossed $300M in ARR with 9,000+ customer deployments across 50%+ of the Fortune 500,
    making it the clear independent market leader in the emerging telemetry pipeline middleware category.
    A $319M Series E at $3.5B valuation (August 2024, led by GV) and a FedRAMP ATO (January 2026)
    confirm its late-stage growth trajectory and federal market readiness. Products span Stream (routing
    and transformation), Edge (distributed agent), Lake (schema-on-read data lake), Search (federated
    log search), and Guard (sensitive data detection), giving Cribl a platform story beyond pure pipeline.
  foundedDate: "2018-01-01"
  founders:
    - name: "Clint Sharp"
      role: "Co-Founder & CEO"
      background: "Former Splunk engineer; leads GTM, strategy, and fundraising at Cribl."
      claimRefs: [CO007, CO010]
    - name: "Dritan Bitincka"
      role: "Co-Founder & CTO / Chief Scientist"
      background: "Former Splunk engineer and data systems architect; leads product and engineering."
