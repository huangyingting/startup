callouts:
- id: KE001
  type: key-finding
  title: Four-Product Suite Reduces Single-Point Revenue Concentration
  body: 'Cribl''s expansion from Stream to a four-product platform (Stream, Edge, Lake, Search) diversifies its ARR base and increases average contract value per customer. Each additional product creates
    an expansion motion tied to existing relationships, supporting the NRR signal. The risk is increased implementation complexity and a longer sales cycle for new logo acquisition.

    '
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE004
  - CE005
- id: KE002
  type: risk
  title: Node.js Runtime Represents a Scalability Risk at Extreme Throughput
  body: 'Cribl''s use of Node.js as the primary runtime for Stream is a technical architecture choice that has been critiqued in the platform engineering community. While horizontal worker scaling mitigates
    single-process limits, multi-petabyte deployments may require architectural changes or rewriting of hot-path components. No public disclosure of a Rust/Go migration roadmap exists.

    '
  claimRefs:
  - CE015
  - CE016
  - CE036
