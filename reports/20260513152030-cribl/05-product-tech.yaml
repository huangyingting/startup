chapter:
  number: 5
  title: Product & Technology
  summary: 'Cribl has evolved from a single Splunk-centric pipeline tool into a four-product telemetry platform—Stream, Edge, Lake, and Search—anchored by the concept of vendor-neutral data control. Stream
    processes over 500 billion events per day across the installed base and integrates with 300+ sources and destinations. The architecture combines a distributed, agent-based deployment model (Edge) with
    a centralized stream processing engine (Stream) and decoupled object-store analytics (Lake/Search). Cribl''s FedRAMP ATO (January 2026), 140+ compliance certifications, and SOC 2 Type II attestation
    address the enterprise trust baseline. Technical risks include architectural complexity as the product set expands, dependence on OpenTelemetry ecosystem adoption, AI/ML capability differentiation,
    and competition from cloud-native observability stacks. The product roadmap is privately held; key diligence questions include the Cribl Copilot AI feature maturity, GenAI pipeline capabilities, and
    progress on the Search product''s query-engine performance at scale.

    '
sections:
- id: product-architecture
  title: Product Architecture and Module Overview
  body: 'Cribl''s platform comprises four distinct but interoperable products: Cribl Stream, Cribl

    Edge, Cribl Lake, and Cribl Search. Together they are marketed as the "Cribl Suite" or

    "AI Platform for Telemetry," designed to give enterprises sovereignty over their telemetry

    data—logs, metrics, traces, and events—regardless of which analytics backend they use.


    **Cribl Stream** is the core product and original offering. It is a distributed stream

    processing engine that routes, transforms, filters, enriches, and replays machine-generated

    data in real time. Stream operates via a leader/worker node model: the leader node manages

    configuration, processing pipelines, and worker management, while worker nodes execute data

    transformation logic. Stream ingests data from virtually any source (Syslog, Splunk forwarders,

    Elastic Beats, Kafka, HTTP/S, S3, cloud logs) and routes to any destination (Splunk, Elastic,

    Datadog, Chronicle, S3, and 300+ others). Version 4.8 (the current GA release as of 2026)

    includes features such as multi-tenancy improvements, edge orchestration enhancements, and

    expanded AI/ML pipeline operators.


    **Cribl Edge** is a lightweight, distributed agent deployed at the source—on servers, VMs,

    containers, or edge devices—to collect and pre-process telemetry before forwarding it upstream

    to Stream or directly to destinations. Edge replaces traditional heavyweight log shippers

    (Filebeat, Splunk Universal Forwarder) with a manageable, pipeline-capable agent that can

    perform local filtering and enrichment. Edge is managed centrally through the same Stream

    control plane, providing a unified fleet management interface for distributed deployments.


    **Cribl Lake** is an object-storage-based data lake purpose-built for telemetry. It stores

    raw and processed observability data in open columnar formats (Parquet) in customer-controlled

    cloud storage (AWS S3, Azure Blob, GCS). Lake includes lifecycle policies, tiered retention,

    and replay capabilities that allow organizations to retain raw telemetry cheaply and selectively

    rehydrate it for analysis. The separation of storage from compute avoids vendor lock-in at the

    analytics tier.


    **Cribl Search** provides a federated query interface that spans Stream, Lake, and third-party

    data stores. Rather than requiring data centralization, Search executes queries across distributed

    data at rest and in motion, enabling analysts to investigate incidents without prior data movement.

    The query engine is designed to support both SQL-like syntax and SPL (Splunk Processing Language)

    for migration use cases.


    The four products share a unified control plane (Worker/Fleet management), a common configuration

    schema (YAML/JSON pipelines), and a centralized UI. This architecture enables enterprises to

    adopt incrementally—starting with Stream for cost reduction and expanding to Edge, Lake, and

    Search as observability maturity increases.

    '
