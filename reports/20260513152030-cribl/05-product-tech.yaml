- id: workflow-use-cases
  title: Key Workflows and Use Cases
  body: 'Cribl''s platform addresses five primary enterprise workflows that span security operations,

    IT operations, cloud infrastructure, and cost optimization.


    **Security Information and Event Management (SIEM) Cost Optimization** is the primary

    initial wedge use case. Organizations with Splunk, Microsoft Sentinel, or IBM QRadar

    deployments use Cribl Stream to filter redundant or low-value log data before it enters

    the SIEM, reducing licensing costs directly proportional to data volume reduction. Cribl

    customers report average log volume reductions of 30–60% using Stream''s filtering and

    aggregation capabilities. Cribl''s inclusion in the 2024 and 2025 Gartner Magic Quadrant

    for SIEM (as an adjacent/enabling technology) validates this use case''s significance to

    the security buyer.


    **Observability Pipeline and Tool Migration** enables IT and DevOps teams to change or

    run multiple observability backends in parallel without reconfiguring every data source.

    This allows organizations to migrate from legacy platforms (Splunk) to modern alternatives

    (Datadog, Elastic, OpenTelemetry collectors) or run hybrid multi-tool environments during

    transition periods. The OpenTelemetry native support positions Cribl well as enterprises

    adopt the CNCF standard.


    **Compliance and Data Governance** workflows use Cribl''s masking, redaction, and routing

    capabilities to ensure PII, PHI, and PCI data is scrubbed or redirected to compliant

    destinations before reaching non-compliant analytics stores. This is particularly relevant

    for healthcare, financial services, and government customers.


    **AI/ML Data Pipeline** is an emerging use case where Cribl routes telemetry to AI training

    pipelines or LLM inference infrastructure, enabling AI-driven anomaly detection and alerting.

    Cribl''s "Cribl Copilot" feature (announced 2025) uses generative AI to assist operators in

    building pipeline configurations using natural language prompts.


    **Edge and IoT Telemetry Collection** uses Cribl Edge to collect telemetry from distributed

    infrastructure—cloud workloads, on-premises servers, edge devices—and applies local processing

    to reduce bandwidth and latency before centralized analysis. This use case is growing as

    organizations instrument Kubernetes workloads and containerized microservices.


    Platform Engineering teams use Cribl to standardize telemetry collection across squads,

    enforcing schema compliance and routing rules via centralized pipeline configuration rather

    than per-team toolchain choices.

    '
