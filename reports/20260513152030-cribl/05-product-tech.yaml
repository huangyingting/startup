  title: Cribl Product Architecture Map
  type: flow
  summary: 'Data flow from sources through Cribl Edge (collection), Cribl Stream (processing), and onward to destinations (Splunk, Datadog, Elastic, S3/Lake, Search). Shows the layered architecture of the
    Cribl platform.

    '
