  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: copilot-accuracy-benchmarks
    missingEvidence: No public benchmarks or independent evaluations of Cribl Copilot's accuracy in generating correct pipeline configurations from natural language prompts are available.
    whyItMatters: If Copilot produces incorrect configurations, it could route data to unintended destinations or misconfigure masking rules, creating security and compliance risk in production deployments.
    diligencePath: Request Copilot accuracy benchmarks and internal test suites from Cribl; evaluate against real-world pipeline configuration scenarios in a controlled POC environment.
    relatedQuestionRefs:
    - QE012
    - QE026
  - type: private-evidence-only
    severity: material
    topic: search-query-performance
    missingEvidence: No public performance benchmarks for Cribl Search at scale (petabyte-range data sets) are available; query latency and cost versus Elastic, Splunk, and cloud-native alternatives are
      unverified.
    whyItMatters: Search's competitiveness against incumbent query tools determines whether it can drive incremental ARR or remains limited to Cribl Lake-only queries with limited standalone value.
    diligencePath: Request Cribl Search performance benchmarks; conduct independent POC with representative data volumes; compare query latency and cost to Splunk SPL and Elastic DSL on equivalent workloads.
    relatedQuestionRefs:
    - QE023
    - QE028
  - type: unverified-claim
    severity: material
    topic: nodejs-throughput-ceiling
    missingEvidence: Cribl's 500B events/day claim is self-reported; no independent verification of sustained throughput at this scale under production conditions exists in public sources.
    whyItMatters: If Node.js runtime becomes the bottleneck before the stated 500B events/day ceiling, enterprise customers with extreme-volume use cases may face unplanned scaling costs or require architectural
      redesign.
    diligencePath: Request customer references with verified high-throughput deployments; ask for load test results at 2–5x current peak; investigate whether any production deployments have triggered Node.js
      runtime limitations.
    relatedQuestionRefs:
    - QE027
  - type: private-evidence-only
    severity: important
    topic: roadmap-timeline
    missingEvidence: Cribl does not publish a public product roadmap; timelines for Copilot GA, Guard GA, Search parity with SPL, and FedRAMP High ATO are unverifiable from public sources.
    whyItMatters: Roadmap execution risk is a material factor in valuation; delays to key features (Copilot GA, Search SPL parity) could impact retention and competitive positioning.
    diligencePath: Request a detailed product roadmap with quarterly milestones in the data room; assess engineering team size and product release cadence as proxies for roadmap execution capability.
    relatedQuestionRefs:
    - QE028
    - QE023
    - QE012
  - type: partial-disclosure
    severity: important
    topic: guard-false-positive-rate
    missingEvidence: Cribl Guard's behavioral anomaly detection false-positive and false-negative rates in production environments are not disclosed; the model training approach and baseline period requirements
      are described qualitatively only.
    whyItMatters: High false-positive rates in pipeline integrity alerts could create alert fatigue for SecOps teams and undermine trust in Guard as a security control; false negatives create undetected
      data exfiltration risk.
    diligencePath: Request Guard pilot customer references; ask for precision/recall metrics from production deployments; evaluate baseline training period and alert tuning requirements in enterprise proof-of-concept.
    relatedQuestionRefs:
    - QE011
  - type: partial-disclosure
    severity: important
    topic: search-query-language-parity
    missingEvidence: Cribl Search SQL/SPL completeness versus full Splunk SPL or ANSI SQL is not publicly documented; exact supported syntax and known gaps are unverified.
    whyItMatters: If Search lacks key SPL functions, it cannot serve as a drop-in replacement for Splunk queries, reducing its value for Splunk migration use cases.
    diligencePath: Request a Search query language reference card and known gap list from Cribl; run representative SPL queries in a POC environment to verify completeness.
    relatedQuestionRefs:
    - QE005
    - QE016
    - QE017
