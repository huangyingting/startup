      label: Data Sources
      description: Servers, containers, cloud services, network devices, applications generating logs, metrics, traces
    - id: edge
      label: Cribl Edge (Agent Layer)
      description: Lightweight agent collecting data at source; performs local filtering and pre-processing; managed centrally
    - id: stream
      label: Cribl Stream (Processing Engine)
      description: 'Central stream processor: routes, filters, transforms, enriches, and aggregates telemetry in real time'
    - id: lake
      label: Cribl Lake (Object Storage)
      description: Long-term telemetry retention in Parquet format on customer cloud storage (S3/Blob/GCS)
    - id: search
      label: Cribl Search (Query Engine)
      description: Federated query across Lake and Stream without data movement; supports SQL and SPL
    - id: analytics
      label: Analytics Destinations
      description: Splunk, Datadog, Elastic, Chronicle, Microsoft Sentinel, Grafana, and 300+ other tools
    - id: control
      label: Cribl Control Plane
      description: Unified management UI and API for pipeline configuration, fleet management, and observability of the platform itself
