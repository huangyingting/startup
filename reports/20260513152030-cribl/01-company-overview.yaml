callouts:
  - calloutType: strength
    title: "Founder-Market Fit: Ex-Splunkers Targeting Splunk's Achilles Heel"
    body: >
      All three co-founders spent formative years at Splunk and deeply understand the cost and
      operational pain points that enterprise Splunk customers experience. This insider knowledge
      allows Cribl to design products that integrate seamlessly with existing Splunk deployments
      while offering substantial cost reduction and operational flexibility. The result is an
      unusually strong product-market fit validated by rapid ARR growth to $300M+ in under eight
      years.
    claimRefs: [CO007, CO008, CO009, CO020]

  - calloutType: risk
    title: "Valuation Premium Risk: 11x ARR Multiple Assumes Sustained Hyper-Growth"
    body: >
      At $3.5B valuation against $300M ARR, Cribl trades at approximately 11.7x ARR—a premium
      that requires sustained high-growth to justify. Any ARR growth deceleration, increased
      competition from Cisco/Splunk bundling, or market re-rating of SaaS multiples could result
      in significant valuation compression in a future fundraise or IPO. Enterprise SaaS companies
      transitioning from growth to maturity typically see multiples compress to 5–8x ARR. Review
      site feedback indicates rising pricing complexity and occasional support challenges, which
      could affect net revenue retention at scale.
    claimRefs: [CO013, CO019, CO020, CO034, CO035]

