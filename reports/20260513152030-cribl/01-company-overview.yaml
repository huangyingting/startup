company:
  name: Cribl
chapter:
  number: 1
  title: "Company Overview"
  summary: >
    Cribl, founded in 2018 by three ex-Splunk engineers, has grown into the leading telemetry
    pipeline platform, surpassing $300M ARR as of February 2026 and achieving FedRAMP ATO in
    January 2026. The company operates four products—Stream, Edge, Lake, and Search—and serves
    over 50% of the Fortune 500, backed by a marquee investor roster including Google Ventures,
    IVP, Greylock, and Sequoia Capital.

sections:
  - id: company-identity
    title: "Company Identity and Overview"
    body: |
      Cribl, Inc. is a San Francisco-based enterprise software company founded in 2018 by three
      former Splunk engineers: Clint Sharp (CEO), Dritan Bitincka (co-founder), and Ledion Bitincka
      (co-founder). The company is headquartered at 22 4th Street, Suite 1300, San Francisco,
      California 94103, with additional operations in Austin, Texas. Cribl defines itself as the
      "AI Platform for Telemetry," empowering enterprises to manage and analyze machine-generated
      observability data—logs, metrics, traces, and configuration data—for both human and AI-driven
      use cases.

      The company's core value proposition centers on vendor-neutral telemetry pipeline infrastructure:
      rather than locking customers into a single analytics platform, Cribl enables organizations to
      collect data from any source, process it efficiently, and route it to any destination. This
      approach directly addresses the cost and complexity challenges created by the explosive growth
      of IT and security telemetry, which is expanding at approximately 30% compound annual growth
      rate (CAGR) while enterprise budgets remain constrained.

      Cribl operates as a privately held company and has not pursued an IPO as of the report date.
      Its SEC EDGAR registration confirms its principal offices at the San Francisco address. As of
      May 2026, the company employs approximately 1,200 people globally, per LinkedIn data showing
      1,203 listed employees, though the company's own headcount may differ. Cribl's products are
      available in cloud, on-premise, and hybrid deployments, serving organizations from mid-market
      to large enterprise and government sectors.
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO006]
    figureRefs: [FO002]

  - id: founders-leadership
    title: "Founders and Leadership"
    body: |
      Cribl was co-founded by three alumni of Splunk, giving the company deep domain expertise in
      the observability and log management space. Clint Sharp serves as CEO and is a recognized
      industry voice on data pipeline strategy. Dritan Bitincka (CTO/Chief Scientist) and his
      brother Ledion Bitincka bring technical depth rooted in large-scale distributed systems work
      at Splunk and earlier companies.

      The founding team's "ex-Splunker" background is strategically significant: they built the
      product with intimate knowledge of Splunk's architectural limitations and pricing model,
      enabling Cribl Stream to be positioned explicitly as a complement to and migration path from
      Splunk environments. Sequoia Capital's public portfolio description confirmed the company was
      "Founded by three ex-Splunkers on a mission to get the most out of machine data."

      The leadership team has remained stable since founding with no material announced executive
      departures as of the report date. This stability is notable given the turbulent 2022–2024
      period in the broader tech sector. Fortune magazine has recognized Cribl on multiple best
      workplaces lists, including Best Medium Workplaces and Best Workplaces in Technology,
      suggesting strong internal culture and talent retention. The LinkedIn profile as of May 2026
      shows 117,731 followers, a proxy for brand reach among technical practitioners. No publicly
      identified CFO or COO was found in available sources, representing a governance gap relative
      to peers at similar funding stages.
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012]
    tableRefs: [TO002]
    figureRefs: []

  - id: funding-investors
    title: "Funding History and Investors"
    body: |
      Cribl has assembled a strong investor syndicate across multiple funding rounds totaling
      approximately $864 million or more in disclosed equity capital, reflecting high conviction
      among top-tier venture investors in the observability pipeline market. The most recent
      confirmed major funding event is a $319 million Series E round led by Google Ventures (GV),
      which valued the company at $3.5 billion, as reported by Forbes. This round was described as
      oversubscribed.

      The investor base includes Greylock Partners, Redpoint Ventures, IVP (Insight Venture
      Partners), CRV (Charles River Ventures), and Sequoia Capital as earlier-stage backers, with
      Google Ventures leading the most recent round. IVP and Greylock portfolio pages confirm
      active portfolio status. GV's portfolio listing confirms Cribl as a current investment.
      Sequoia's portfolio page shows a partnership formed in 2020 when Sequoia joined the Series B.

      The $3.5B valuation at the Series E represents approximately 11.7x forward ARR (against the
      $300M ARR announced in February 2026), a premium multiple consistent with high-growth
      enterprise SaaS companies but elevated compared to 2024 public market comps. Prior rounds
      included a $200 million Series C in 2021 at a $1.5 billion valuation and a $150 million Series D
      in 2022 at $3.5 billion. A strategic growth round of $150 million was raised in June 2024 at
      $3.0 billion, representing a valuation step-down from the 2022 Series D peak.

      Investors have not disclosed any secondary transactions or preferred liquidation preferences,
      and Cribl has not filed an S-1. The disclosure profile is private-undisclosed for detailed
      financials.
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: cover-metrics
    title: "Cover Metrics and Scale"
    body: |
      As of early 2026, Cribl has achieved several meaningful scale milestones. In February 2026,
      the company announced it had surpassed $300 million in Annual Recurring Revenue (ARR), a
      threshold that positions it among the fastest-growing infrastructure software companies of
      the current era. This represents a significant increase from the approximately $200 million
      ARR milestone that Forbes noted as achieved in January of a prior period.

      The company serves more than 9,000 organizations globally according to company claims, with
      its products trusted by more than 50% of the Fortune 500, as stated on the Cribl products
      overview page. Specific named customers include organizations in financial services,
      healthcare, government, retail, and technology sectors. Customer concentration in enterprises
      reflects the company's go-to-market strategy centered on direct enterprise sales supplemented
      by channel partnerships.

      LinkedIn data from May 2026 shows 1,203 employees, placing Cribl in the 1,001–5,000 employee
      bracket on LinkedIn's classification. Annual revenue per employee at approximately $250,000+
      (based on $300M ARR / 1,200 employees) is competitive with SaaS peers at this stage. The
      company's headquarters in San Francisco puts it in proximity to major enterprise accounts and
      talent markets, while the Austin presence enables cost-efficient scaling.

      FedRAMP Authority to Operate (ATO) was achieved in January 2026, enabling Cribl to sell
      into U.S. federal government agencies. DOD Impact Level 4 authorization was previously
      obtained. These certifications significantly expand the addressable federal market and are
      rare accomplishments for a company at Cribl's stage.
    claimRefs: [CO020, CO021, CO022, CO023, CO024, CO025, CO026]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: milestones
    title: "Key Milestones and Corporate History"
    body: |
      Cribl's corporate history traces an arc from a bootstrapped observability tool to a
      full-platform enterprise software company in under eight years. The founding team incorporated
      the company in 2018, initially launching the product as "LogStream," a Splunk-complementary
      log pipeline tool. Early traction came from organizations seeking to reduce their Splunk
      licensing costs by filtering and routing data more efficiently before ingestion.

      Product expansion has been systematic: Cribl Edge was launched as a lightweight distributed
      agent for endpoint telemetry collection, followed by Cribl Lake as a scalable cloud-native
      data lake for telemetry retention, and Cribl Search as a federated search capability enabling
      investigations across data in place without requiring rehydration. More recently, Cribl has
      introduced AI-powered features including Copilot Editor for pipeline authoring and AI-driven
      Cribl Search enhancements, positioning the company for the agentic AI workload era.

      Regulatory milestones are critical validators for the government market: DOD Impact Level 4
      authorization preceded FedRAMP ATO (January 2026), which opens civilian federal agency
      procurement. A March 2026 announcement introduced "Cribl Guard," a new data security
      capability with background sensitive data detection. The company's newsroom entries in early
      2026 demonstrate active product velocity and continued enterprise expansion. Adverse events
      such as layoffs, leadership changes, or legal actions were not identified in available sources,
      which may reflect the scarcity of investigative coverage rather than the absence of such events.
    claimRefs: [CO027, CO028, CO029, CO030, CO031, CO032, CO033]
    tableRefs: [TO004]
    figureRefs: []

