summary:
  headline: >-
    Cribl is the dominant independent telemetry pipeline vendor with $300M+ ARR, 9,000+ enterprise deployments, and a
    five-product platform that makes switching costs substantial and churn unlikely—a compelling late-stage buy at
    current $3.5B valuation.
