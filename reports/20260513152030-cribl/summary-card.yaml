  topStrengths:
    - >-
      Market leadership in telemetry pipeline middleware with 9,000+ enterprise deployments including 50%+ of Fortune
      500, creating strong incumbency effects
    - >-
      $300M+ ARR crossing (Feb 2026) up from $200M at Series E close (Aug 2024), implying ~50% ARR growth in 18 months
      without a disclosed round
    - >-
      Ex-Splunk founding team with deep domain expertise plus Cisco's Splunk acquisition creating structural enterprise
      anxiety that benefits Cribl's positioning
    - >-
      FedRAMP ATO (Jan 2026) unlocking federal procurement at the moment CMMC 2.0 creates maximum demand from 300,000
      defense contractors
    - >-
      Platform expansion from Stream to Lake, Search, and Guard gives cross-sell runway and builds switching costs well
      beyond pure pipeline competitors
    - Volume-based pricing creates a natural land-and-expand flywheel as data volumes grow 30% annually
  topRisks:
    - >-
      Cloud-native log routing services from AWS (Firehose), Azure (Monitor Ingest), and GCP (Log Router) represent
      credible substitutes for single-cloud simple-routing use cases
    - >-
      Cisco/Splunk integration execution could either create or eliminate Cribl's primary sales narrative depending on
      post-acquisition Splunk product trajectory
    - >-
      OpenTelemetry's growing routing capabilities (Log Bridge API, OTLP for logs) may narrow Cribl's differentiation in
      pure collection use cases over 2-4 year horizon
    - >-
      No publicly disclosed NRR or gross margin prevents verification of unit economics that underpin the $3.5B
      valuation
    - >-
      11.7x ARR multiple is above typical late-stage SaaS re-rating range of 5-8x; IPO or secondary market exit at
      premium requires sustained growth >30%
    - >-
      Product complexity and SPL-to-CriblQL migration friction cited by enterprise practitioners as implementation
      barriers
  unresolvedGaps:
    - >-
      Net revenue retention (NRR) and gross margin not publicly disclosed; cannot verify whether unit economics justify
      $3.5B valuation
    - >-
      Product-level ARR breakdown across Stream, Edge, Lake, Search not disclosed; unclear which products drive growth
      and which are nascent
    - >-
      Customer count not updated since August 2024 (9,000+ at Series E); expansion velocity and new customer acquisition
      rate unverifiable
    - >-
      Federal segment revenue contribution unverifiable due to redacted case studies; FedRAMP ATO impact on bookings
      unquantified
    - >-
      OpenTelemetry's medium-term impact on Cribl differentiation in collection use cases remains a material open
      question
    - IPO timeline and sponsor liquidity expectations not publicly disclosed
