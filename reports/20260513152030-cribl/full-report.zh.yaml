      - number: '4.2'
        title: 定价、打包与货币化模型
        blocks:
          - type: paragraph
            body: >
              Cribl 的公开定价页把面向低流量环境的 Free 层和多个付费订阅层并列展示。Free 层面向测试平台的开发者和小团队；付费层按每日数据摄入量扩展，承诺量越高，每 GB 单价越低——这是可观测性 SaaS
              里常见的结构。公司还提供企业级定价，包含公开定价页没有列出的定制条款、专业服务包和多年期承诺折扣。


              Cribl Stream、Edge、Lake 和 Search 分别授权，形成平台式落地后扩张路径。客户可能先用 Stream 降低管道成本，再加 Edge 做分布式端点采集、加 Lake 做低成本遥测留存、加
              Search 做联邦式调查。每一次产品交叉销售都会抬高客户总合同价值，而且不必替换第三方竞品。


              AWS、Azure 和 Google Cloud 的 Marketplace 上架，让客户可以用既有云消费承诺采购 Cribl（企业折扣计划、EDP 协议），降低云原生企业的采购阻力。该渠道也带来
              Marketplace 联合销售收入；对云厂商来说，Cribl 也被定位成把数据留在其平台内的基础设施。


              FinOps Center
              能力帮助客户优化成本并监控数据量趋势。它既是留存工具（客户看清成本之后更不容易流失），也是潜在增购入口（数据增长透明之后，更容易引出层级升级讨论）。用户也把定价复杂度标为企业级规模下的挑战；部分评论者指出，多个产品的数据量同时增长时，成本很难预测。
