      - number: '6.4'
        title: 留存、复用与客户满意度
        blocks:
          - type: paragraph
            body: >
              Cribl 未公开披露净留存率（NRR）、总留存率（GRR）或正式流失率，这与私营公司披露姿态一致。可用的留存质量代理指标，是第三方评论信号和公司自身公开表述中的方向性指标。


              在 **G2** 上，截至 2026 年初，Cribl Stream 在已验证评论中平均评分为 4.6/5.0，在管道配置易用性、供应商中立路由和成本节约方面得分较高。安全和 DevOps 角色用户强调了正向
              ROI 体验。常见抱怨包括高级配置复杂、需要 Cribl 专门知识，以及非企业层级支持响应时间不稳定。


              在 **PeerSpot** 上，该产品得分约
              8.1/10，评论者提到企业组织中的生产部署。我们归类为反向信号的批评性评论具体提到：（1）定价随数据量快速上升，遥测增长时带来预算风险；（2）支持分层让小客户处于不利位置；（3）边缘场景配置偶尔存在文档缺口。如果这些问题普遍存在，可能压低中型市场分层的续约。


              **Glassdoor** 员工评论整体偏正面（总分 4.2/5.0），反映健康的内部文化。企业 SaaS 中，高员工满意度通常与客户满意度正相关。Glassdoor 评论中未发现指向具体产品的客户流失信号。


              **Capterra** 和 **Spiceworks** 社区讨论确认，IT 运营和安全场景中存在活跃部署，实践者会分享实施技巧——这是用户社区参与度高、采用粘性强的领先指标。


              MSSP Alert 关于 Series E 融资轮的报道指出，Cribl 的投资逻辑部分建立在融资过程中分享的强客户留存数据上，说明私有 NRR 可能很强（同阶段公司具备行业竞争力的企业 SaaS NRR
              通常为 110–130%+）。


              Reddit 的 r/sysadmin 社区呈现混合偏批评的图景：用户认可 Cribl 能力，但明确担心定价模型复杂、学习曲线陡峭；部分帖子质疑，相比 OpenTelemetry Collector
              等开源替代方案，该平台的总体拥有成本是否足以支撑供应商关系。这是一个反向信号，需要在中型市场留存队列中尽调。
