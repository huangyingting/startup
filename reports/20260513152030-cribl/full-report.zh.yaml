companyProfile:
  summary: >
    Cribl 是一家总部位于 San Francisco 的企业软件公司，由 Clint Sharp（CEO）、Dritan Bitincka（CTO）和 Ledion Bitincka 于 2018 年创立，三人均曾任 Splunk
    工程师。公司打造厂商中立的遥测管道平台，可把安全与可观测性数据从任意来源路由、转换、增强到任意目的地，避免厂商锁定。截至 February 2026，Cribl 的 ARR 已突破 $300M，在 Fortune 500 中覆盖
    50%+，客户部署超过 9,000 个，已经成为新兴遥测管道中间件类别中明确的独立市场领导者。August 2024 公司完成由 GV 领投、估值 $3.5B 的 $319M Series E；January 2026 获得
    FedRAMP ATO，验证其后期增长轨迹和联邦市场就绪度。产品覆盖 Stream（路由与转换）、Edge（分布式代理）、Lake（读时模式数据湖）、Search（联邦日志搜索）和 Guard（敏感数据检测），让 Cribl
    的叙事从单一管道扩展为平台。
