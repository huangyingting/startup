      - number: '6.3'
        title: 具名客户证据与案例质量
        blocks:
          - type: paragraph
            body: >
              Cribl 的公开客户案例项目列出了跨行业具名企业。cribl.io/customers/ 页面确认，Western Digital、Adobe、Atlassian、Hyatt
              Hotels、Booking.com 以及多家金融服务和政府实体已经生产部署。这些不是试点或概念验证安排——案例描述的是成本节约和合规赋能等生产部署结果。


              **Western Digital** 部署 Cribl Stream 管理 petabyte 级存储遥测，更高效地路由日志，同时显著降低下游 SIEM 成本。这代表存储行业：遥测量极高，成本优化 ROI
              直接且可衡量。


              **Hyatt Hotels** 使用 Cribl 聚合酒店网络安全遥测，并在全球物业组合中优化 SIEM，这是酒店行业常见场景，把 PCI-DSS 合规要求与日志成本管理结合起来。


              **Kroger**（大型零售）在 Cribl 客户成功材料中被提及，使用该平台做企业日志聚合。零售企业持续产生 POS 系统和电商日志量，使 SIEM 优化具备吸引力。


              **Adobe** 和 **Atlassian** 代表高增长 SaaS 技术垂直领域，Cribl 的 DevOps 和可观测性场景在这里最强——两家公司都要管理来自云原生软件产品的巨大遥测量。


              **联邦政府客户** 由 FedRAMP ATO 佐证（2026 年 1 月，经 GovInfoSecurity 和官方 PR Newswire 新闻稿确认）。该认证证明 Cribl
              已达到联邦安全标准，并拥有活跃的联邦机构客户。


              第三方评论也提供佐证：PeerSpot 和 G2 上来自具名行业（金融服务、医疗、技术）的已验证评论确认了生产部署。PeerSpot 列出的评论来自 1,000–10,000
              名员工规模段公司，与企业级重点一致。部分评论指出，复杂管道配置需要内部专业能力或专业服务支持，这限制了自助式采用。
