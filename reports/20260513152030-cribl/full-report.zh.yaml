      - number: '4.3'
        title: 单位经济模型：CAC、LTV、毛利率与 NRR 估计
        blocks:
          - type: paragraph
            body: >
              Cribl 未公开披露毛利率、净留存率（NRR）、获客成本（CAC）或客户终身价值（LTV）。本章所有单位经济模型估计，都来自公开信号、企业基础设施 SaaS 的行业基准，以及可比上市公司数据。


              毛利率估计在 65–75% 区间，理由如下：Cribl 以 SaaS 方式交付软件，托管在超大规模云基础设施上（AWS、Azure、GCP），同时包含通常毛利率较低的专业服务收入（30–45%）。在 $300M
              ARR 且专业服务占比有一定规模的情况下，综合毛利率可能落在 65% 到 75% 之间。相比之下，Datadog 上市公司口径毛利率约 77%，Elastic 约 74%。如果本地部署 /
              混合部署客户需要额外专属支持开销，Cribl 的毛利率可能低于纯 SaaS 同业。


              NRR 估计高于 120%，基于三个可观察信号：（1）四产品平台带来明确增购向量；（2）Cribl 客户包含大型企业，其数据量通常每年增长 30–50%，会机械性推高订阅成本；（3）Cribl
              的竞争定位是降本工具，数据量扩张的客户有强动机继续使用并扩大 Cribl，以控制成本。NRR 高于 120% 也符合 Cribl 披露的 ARR 增长轨迹。


              企业安全和可观测性 SaaS 的 CAC 绝对值通常很高。Cribl 约有 1,200 名员工；若按成长阶段公司销售与市场（S&M）费用占 ARR 40–50% 的典型比例估算，年度 S&M 支出约为
              $120M–$150M。按新增客户数分摊（以该增长率估计每年新增 1,000–2,000 家），企业客群 CAC 可能超过每个净新增客户 $50,000–$150,000。


              在这一阶段的企业基础设施 SaaS 中，人均收入约 $250,000（$300M ARR / 1,200 名员工），水平健康，但并不突出。
