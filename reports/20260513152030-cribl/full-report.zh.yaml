      - number: '2.3'
        title: 买方分层与支付意愿
        blocks:
          - type: paragraph
            body: >-
              企业 SecOps 团队是 Cribl 的核心买方画像，典型交易额为每年 $100K 到 $1M，由 CISO 或 VP 级安全工程负责人掌握预算决策，采购周期平均六到十二个月。IT Ops 和 SRE
              团队构成第二买方群体，初始交易额较小（$50K 到 $500K），但采用周期更快，因为他们的动机是降低运营可观测性成本，而不是安全合规。联邦政府买方拥有最高 ACV 交易（$200K 到 $2M
              区间），Cribl 在 2026 年初获得 FedRAMP High ATO 后，采购得以加速。金融服务机构交易规模接近联邦客户，同时更关注 PCI-DSS 4.0
              合规截止期限，这会倒逼日志管道审计。各垂直行业支付意愿不同，主要由监管覆盖面和把数据路由、过滤后再进入昂贵 SIEM 存储所能节省的成本驱动。买方从仅 Stream 许可扩展到完整 Cribl
              平台，通常发生在一次成功的概念验证之后；该验证能展示可衡量的存储成本下降，Cribl 自己发布的客户案例中常见区间为 30% 到 60%。
            claimRefs:
              - CM011
              - CM012
              - CM013
              - CM014
