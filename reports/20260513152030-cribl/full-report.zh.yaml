      - number: '3.2'
        title: 直接竞争对手——遥测管道厂商
        blocks:
          - type: paragraph
            body: >
              Cribl 最清晰的直接竞争对手，是同样坚持管道优先定位的厂商：Mezmo、Elastic 的代理栈（Beats/Elastic Agent/Logstash）和 Chronosphere。


              Mezmo（原 LogDNA）在 2022 年大幅重定位，从云日志管理 SaaS 服务改名并转向专用遥测管道平台。Mezmo Pipeline 面向 DevOps 和平台工程团队，强调开发者友好的 UX、REST
              API 优先配置，以及低于 Cribl 标价的有竞争力每 GB 定价。Mezmo 的主要限制是规模：公司更小，企业级功能更少（数据脱敏有限、无原生边缘代理、无 FedRAMP 授权），也缺少 Cribl 的
              80+ 集成广度。Mezmo 没有公开 ARR 或员工数，限制了直接财务比较。Logz.io 的可观测性博客跟踪了遥测管道竞争格局，并验证 Mezmo 在复杂度较低用例中作为低价 Cribl 替代的定位。


              Elastic 的数据采集栈（Beats 轻量转发器、带 Fleet 管理的 Elastic Agent，以及 Logstash 管道处理器）提供成熟的日志路由能力。不过，Logstash 的管道处理与
              Elasticsearch 作为首选目的地深度绑定；把数据路由到非 Elastic 后端的多目的地场景需要自定义输出插件，体验达不到 Cribl Stream 托管式多目的地路由水平。Elastic 与
              Cribl 的竞争比较页面强调 ELK stack 的集成分析和搜索能力，而不是独立路由，反映 Elastic 以目的地为中心的取向。Elastic 2024 财年收入约 $1.7
              billion，确认其规模显著，尽管大部分收入来自搜索和可观测性云，而不是纯管道。


              Chronosphere 是云原生可观测性平台，聚焦 Prometheus 兼容指标和分布式链路追踪管理，主要服务工程团队。其管道能力与 Cribl 的重叠集中在云原生 DevOps 用例（高基数
              Prometheus 数据的成本控制），而不是安全与合规用例。Chronosphere 瞄准云原生组织中的工程团队，而非企业 SecOps 买方，因此与 Cribl
              核心安全分析买方的直接竞争有限。Chronosphere 公司页面确认，其重点是云原生应用的工程团队效率，而不是 SIEM 路由或合规。


              在功能能力矩阵中，Cribl Stream 是专用管道厂商里唯一同时提供完整多目的地路由、生产级数据脱敏和 FedRAMP ATO 的厂商。Mezmo 有部分脱敏能力但缺少 FedRAMP；OTel
              Collector 提供路由但缺少脱敏和企业管理；Elastic Agent 摄取能力强，但锁定目的地。Cribl Edge 为远程地点日志采集提供轻量分布式代理，具备托管部署和集中策略管理，这使其区别于裸
              OTel Collector 部署。
