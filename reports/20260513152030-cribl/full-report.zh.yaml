  - id: FE001
    title: Cribl 产品架构图
    type: flow
    summary: |
      数据从来源流经 Cribl Edge（采集）、Cribl Stream（处理），再到目的地（Splunk、Datadog、Elastic、S3/Lake、Search）。展示 Cribl 平台的分层架构。
    data:
      nodes:
        - id: sources
          label: 数据来源
          description: 服务器、容器、云服务、网络设备和应用产生日志、指标与追踪
        - id: edge
          label: Cribl Edge（代理层）
          description: 轻量代理在源头采集数据；执行本地过滤和预处理；由中央统一管理
        - id: stream
          label: Cribl Stream（处理引擎）
          description: 中央流处理器：实时路由、过滤、转换、丰富和聚合遥测
        - id: lake
          label: Cribl Lake（对象存储）
          description: 用客户云存储（S3/Blob/GCS）以 Parquet 格式长期保留遥测
        - id: search
          label: Cribl Search（查询引擎）
          description: 无需移动数据，跨 Lake 和 Stream 做联邦查询；支持 SQL 和 SPL
        - id: analytics
          label: 分析目的地
          description: Splunk、Datadog、Elastic、Chronicle、Microsoft Sentinel、Grafana 以及 300+ 其他工具
        - id: control
          label: Cribl 控制平面
          description: 用统一管理 UI 和 API 配置管道、管理机群，并监控平台自身的可观测性
      edges:
        - from: sources
          to: edge
          label: 原始遥测
        - from: edge
          to: stream
          label: 预处理事件
        - from: sources
          to: stream
          label: 直接推送（无 Edge）
        - from: stream
          to: lake
          label: 存储原始 / 处理后数据
        - from: stream
          to: analytics
          label: 路由到目的地
        - from: lake
          to: search
          label: 查询静态数据
        - from: stream
          to: search
          label: 查询流动数据
        - from: control
          to: edge
          label: 配置与编排
        - from: control
          to: stream
          label: 管道配置
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
  - id: FE002
    title: 客户 SIEM 成本优化工作流
    type: flow
    summary: |
      端到端工作流展示典型企业如何用 Cribl Stream 降低 SIEM 摄取量：从原始日志生成，到 Cribl 路由、过滤和标准化，再选择性送往 SIEM 或低成本冷存储。
    data:
      nodes:
        - id: log-sources
          label: 日志来源
          description: 防火墙、端点、云审计日志和应用日志产生高容量原始事件
        - id: cribl-ingest
          label: Cribl Stream 摄取
          description: 通过 Syslog、HEC、S3 或 Kafka 接收原始日志；开始管道处理
        - id: classify
          label: 事件分类
          description: 管道对事件分类：高价值安全事件、嘈杂运营日志、原始回放候选
        - id: mask-enrich
          label: PII 脱敏与丰富
          description: 屏蔽敏感字段（PII、凭据）；用威胁情报查询丰富安全事件
        - id: siem-route
          label: SIEM (Splunk / Sentinel)
          description: 仅将高价值、已富化、去重后的事件转发到 SIEM；数据量减少 30–60%
        - id: lake-store
          label: Cribl Lake / S3
          description: 原始全保真日志低成本存入对象存储，用于合规、取证和回放
        - id: compliance-dest
          label: 合规归档
          description: PCI/HIPAA 范围内事件路由到专用合规存储或 SIEM 租户
      edges:
        - from: log-sources
          to: cribl-ingest
          label: 原始事件（100%）
        - from: cribl-ingest
          to: classify
          label: 事件管道
        - from: classify
          to: mask-enrich
          label: 安全事件
        - from: classify
          to: lake-store
          label: 噪声 / 低价值日志
        - from: mask-enrich
          to: siem-route
          label: 已过滤并富化（约 40–70%）
        - from: mask-enrich
          to: compliance-dest
          label: 受监管数据子集
        - from: lake-store
          to: siem-route
          label: 按需回放
    claimRefs:
      - CE008
      - CE009
      - CE010
