              根据范围假设不同，已发布的 2024 年 SIEM TAM 估算从 $5.3B 到 $12.6B 不等，且没有分析师独立覆盖 Cribl 自定义的遥测管道中间件类别。投资者不应按面值接受 $20B TAM
              主张，而要拆解 Cribl 能现实捕获的路由经济份额。
            calloutType: risk
