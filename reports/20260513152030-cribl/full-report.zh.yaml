        title: 图表与要点
        blocks:
          - type: callout
            title: 监管堆栈制造持久且近期的需求
            body: >-
              SEC 网络披露规则、CMMC 2.0 和 PCI-DSS 4.0 在两到三年窗口内叠加，产生审计级日志管道要求；对受监管买方而言，这不是可自由裁量开支。该监管需求不依赖宏观预算周期，并大幅降低 Cribl
              近期管道风险。
