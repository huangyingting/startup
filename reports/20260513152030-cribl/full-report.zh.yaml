      - number: '1.4'
        title: 封面指标与规模
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，Cribl 已达到几个有意义的规模里程碑。February 2026，公司宣布年经常性收入（ARR）突破 $300 million，这一门槛把它放进当下增长最快的基础设施软件公司行列。相较
              Forbes 此前提到公司在 January 达到的约 $200 million ARR 里程碑，这是一次显著提升。


              根据公司说法，Cribl 在全球服务超过 9,000 家组织；Cribl 产品概览页面称，其产品获得 Fortune 500 中 50%
              以上企业信任。具名客户覆盖金融服务、医疗、政府、零售和技术行业。客户集中在企业端，反映公司以企业直销为核心、渠道合作伙伴补充的 GTM 策略。


              May 2026 的 LinkedIn 数据显示 Cribl 有 1,203 名员工，在 LinkedIn 分类中落入 1,001–5,000 人区间。按 $300M ARR / 1,200
              名员工计算，年收入/员工约 $250,000+，与该阶段 SaaS 同行相比具备竞争力。公司总部位于 San Francisco，贴近大型企业客户和人才市场；Austin 布局则支撑更具成本效率的扩张。


              FedRAMP Authority to Operate（ATO）于 January 2026 获得，使 Cribl 能进入美国联邦政府机构销售。此前公司已取得 DOD Impact Level 4
              授权。这些认证显著扩大可触达联邦市场；以 Cribl 所处阶段看，能拿到这些认证并不常见。
