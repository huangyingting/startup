      - number: '6.5'
        title: 扩张机制与集中度风险
        blocks:
          - type: paragraph
            body: >
              Cribl 的收入架构围绕 land-and-expand 模型设计：先在一种数据源类型（如安全日志）部署 Cribl
              Stream，形成使用熟悉度，再扩展到更多数据类型（指标、链路追踪、端点遥测）、更多产品（Edge、Lake、Search），以及同一企业内更多地域或业务单元。


              公司基于数据量的定价模型是结构性扩张驱动因素：企业遥测量每年增长 20–30%（这是有充分记录的行业趋势）时，既有客户无需新的销售周期，也会自然提高合同承诺。这在主动增购努力之外，也形成了强净留存机制。


              **集中度风险** 是重大未知。Cribl 不披露按客户划分的收入集中度，因此无法判断是否有任何单一客户占 ARR 超过 5%。9,000+ 总客户和 50%+ Fortune 500
              渗透带来一定结构性分散，但最大企业合同（可能为 100–1,000+ TB/day 吞吐承诺）单个就可能贡献 $2–10M ARR。如果前 10 大客户占 ARR 15–25%（该阶段企业 SaaS
              的典型区间），总客户集中度会有意义但仍可管理。


              **垂直集中度** 可以衡量：根据具名案例和投资者材料，金融服务、技术和政府似乎是主导垂直行业。金融服务数据留存规则的监管变化，或主要云厂商原生管道能力的大规模
              build-out，都可能对这些分层造成不成比例的影响。


              **通过 Splunk 生态形成的渠道集中度** 风险真实存在：Cribl 初始客户群中相当一部分来自 Splunk 相邻场景。Cisco 收购 Splunk（2024 年 3 月完成）改变了竞争格局；如果
              Cisco 把管道能力打包进 Splunk 授权，可能削弱许多 Cribl 部署背后的 SIEM 优化场景。


              合作伙伴生态（cribl.io/partners/ 有记录）包含分散化渠道：AWS Marketplace、Azure Marketplace 和 MSSP 伙伴关系提供了较少依赖 Splunk
              生态的收入来源。Google Cloud 通过 GV 投资，也释放出战略合作伙伴关系可能扩展分销的信号。
