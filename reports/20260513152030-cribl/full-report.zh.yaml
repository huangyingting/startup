        - 纯管道厂商
        - 私有公司；私募股权支持；估计 ARR 低于 $50M
        - DevOps 和平台工程团队；SMB 至中端市场组织
        - 开发者友好的 API 优先管道；价格有竞争力；云原生架构
        - 集成广度较小；没有 FedRAMP 授权；没有原生边缘代理；企业级功能深度有限
      - - Chronosphere
        - 云原生可观测性
        - 私有公司；累计融资约 $120M；聚焦云原生工程
        - 云原生工程团队；Prometheus 和 OpenMetrics 用户；Kubernetes 原生组织
        - 为 Prometheus 环境控制指标和链路追踪成本；云原生架构
        - 与安全和 SIEM 重叠很少；没有 PII 脱敏；买方仅限 DevOps；不聚焦企业 SecOps 或合规
      - - New Relic
        - 可观测性与 APM
        - 私募股权持有（Francisco Partners/TPG，2024 年私有化）；估计 ARR 约 $900M
        - 企业 DevOps；应用性能监控；全栈可观测性买方
        - 全栈可观测性；按用量定价；AI 驱动分析；庞大客户基础
        - 管道路由有限；定价重构导致客户流失；没有 FedRAMP；重心从增长转向盈利能力
      - - OpenTelemetry Collector
        - 免费 OSS 管道
        - CNCF 项目；由 Google、Microsoft、Datadog、Splunk 支持；无直接收入
        - 云原生组织；技术能力强的团队；兼容 OTel 的环境
        - 免费、厂商中立的 CNCF 标准；100+ 接收器和导出器；社区增长；契合 OTel 生态
        - 没有企业级管理（RBAC、HA、集中配置）；没有 PII 脱敏或合规工具；没有厂商 SLA 支持
      - - LogRhythm（与 Exabeam 合并）
        - SIEM 与安全分析
        - 私有公司（私募股权持有）；与 Exabeam 合并（2023 年 8 月）；估计 ARR 约 $200M
        - 企业 SecOps；金融服务；中端市场 SIEM 买方
        - 具备 UEBA 能力的云原生下一代 SIEM；合并带来规模和客户基础
        - 依赖日志摄取管道；Cribl 在多数部署中是互补层；不是管道厂商
