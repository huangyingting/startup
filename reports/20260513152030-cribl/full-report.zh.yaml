    title: 客户旅程图
    type: journey-map
    summary: 不同客户群体如何在完整生命周期里发现、采用、扩张并续约 Cribl。
    data:
      nodes:
        - id: awareness
          label: 认知
          description: 来自 Splunk 生态推荐、AWS Marketplace、会议曝光（KubeCon、RSA）和同行推荐
        - id: evaluation
          label: 评估 / PoC
          description: 30–90 天概念验证；验证 SIEM 成本节省或可观测性路由；通常通过免费层自助启动
        - id: purchase
          label: 采购
          description: Fortune 500 走企业销售；中端市场通过 AWS Marketplace 自助；渠道则由 MSSP 打包
        - id: deployment
          label: 初始部署
          description: Cribl Stream 用于安全日志路由；Edge 代理采集端点遥测；典型见效时间 30–60 天
        - id: expansion
          label: 扩张
          description: 交叉销售 Edge、Lake、Search；扩展数据源；增加地区或业务单元；由数据量驱动 ARR 增长
        - id: renewal
          label: 续约 / 倡导
          description: 年度续约伴随用量提升；参与客户背书计划；在 GitHub 社区贡献
        - id: churn-risk
          label: 流失风险信号
          description: 用量增长带来价格冲击；中端市场可能被 OTel Collector 替代；Cisco/Splunk 原生打包形成威胁
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU008
      - CU032
      - CU033
  - id: FU002
    title: 采用 / 部署漏斗
    type: funnel
    summary: Cribl 企业客户从发现到扩张的转化路径，并给出各阶段客户规模估计。
    approximationNotes: 各阶段客户数根据 9,000+ 总客户、Fortune 500 渗透率 >50% 以及典型企业 SaaS 转化率估算；Cribl 未披露。
    data:
      items:
        - label: 潜在客户池（可触达企业市场）
          value: 50000
        - label: 活跃评估 / PoC
          value: 5000
        - label: 转为付费客户
          value: 9000
        - label: 生产部署（≥1 条管道）
          value: 7500
        - label: 多产品扩张（≥2 个产品）
          value: 3000
        - label: Fortune 500 背书质量
          value: 250
    claimRefs:
      - CU008
      - CU009
      - CU010
      - CU011
  - id: FU003
    title: 客户证据矩阵
    type: matrix
    summary: 按客户细分和证据维度映射证据质量与部署成熟度。
    data:
      columns:
        - Fortune 500 企业
        - 中端科技企业
        - 政府 / 联邦
        - 酒店 / 零售
      rows:
        - label: 生产部署已确认
          values:
            - 是 – 多个具名客户
            - 是 – 社区评价
            - 是 – FedRAMP ATO
            - 是 – Hyatt、Kroger 具名
        - label: 已发布量化成效
          values:
            - 部分 – 定性引用
            - 低 – 仅有评价片段
            - 低 – 仅合规指标
            - 低 – 无节省金额
        - label: 合同期限信号
          values:
            - 长（2–3 年企业合同）
            - 中（通常 1 年）
            - 长（多年联邦合同）
            - 中到长（与合规绑定）
        - label: 反向 / 批评性评价
          values:
            - 提到定价复杂
            - OTel 替代风险
            - 销售周期长的风险
            - 公开证据有限
        - label: 总体证据评级
          values:
            - 中高
            - 中
            - 中
            - 中低
    claimRefs:
