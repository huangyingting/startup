          - type: callout
            title: 估值溢价风险：11x ARR 倍数假设持续超高增长
            body: >
              以 $3.5B 估值对照 $300M ARR，Cribl 交易倍数约为 11.7x ARR——这一溢价需要持续高增长支撑。任何 ARR 增速放缓、Cisco/Splunk 捆绑竞争加剧，或市场重估 SaaS
              倍数，都可能在未来融资或 IPO 中造成显著估值压缩。企业 SaaS 公司从增长转向成熟时，倍数通常压缩到 5–8x ARR。评论网站反馈显示定价复杂度上升，偶尔也有支持挑战，规模化后可能影响净收入留存率。
