      - number: '8.4'
        title: 最终建议与尽调要求
        blocks:
          - type: paragraph
            body: |
              建议：有条件投资。Cribl 符合核心投资标准：ARR 增长强劲、NRR 持久、客户基础分散、
              产品路线图可信，且管理团队已经把公司执行到 $300M+ ARR。参考高增长基础设施软件的
              上市市场倍数，$3.5B 估值可以成立。

              投资条件：（1）信息权，涵盖季度 ARR、NRR 和流失；（2）董事会观察员席位或保护性条款；
              （3）针对 Clint Sharp（CEO）和 Dritan Bitincka（CTO）的关键人条款；（4）未来融资低于
              $3.5B 时触发反稀释保护；（5）确认 FedRAMP ATO 维持状态，以及联邦 ARR 占总 ARR 比例。

              承诺出资前的关键尽调要求包括：经审计或管理账口径 P&L，包含毛利率和烧钱速度；前 20 大
              客户按队列年份拆分的 NRR；联邦板块 ARR 占比；组织架构图，包含 CRO/VP Sales 的身份和
              任期；完整股权结构表及 Series E 条款清单。Gartner SIEM Magic Quadrant 认可和 SEC Form D
              文件确认无监管障碍。PR Newswire 官方公告和 SiliconANGLE 财务报道相互印证了所有重大
              财务主张。
