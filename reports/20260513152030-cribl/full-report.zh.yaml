  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买方画像
        blocks:
          - type: paragraph
            body: >
              Cribl 客户群分为四个主要分层，既反映授权采购的买方，也反映日常操作平台的用户。


              最大且最具战略重要性的分层，是 Fortune 1000 和 Global 2000 企业中的 **企业安全团队**。买方通常是 CISO、安全工程 VP 或安全运营总监；用户则是管理 SIEM 管道的 SOC
              分析师或安全工程师。主要场景是 SIEM 成本优化——把日志路由到 Splunk、Microsoft Sentinel 或 IBM QRadar，同时在摄入前过滤低价值事件；客户报告称，这可将 Splunk
              授权成本降低 30–60%。该分层还覆盖银行、保险、医疗等受 PCI-DSS、HIPAA 和 SOX 要求约束行业的合规驱动日志留存需求。


              第二个分层是云原生和混合企业中的 **DevOps 与 Platform Engineering 团队**。买方是工程 VP 或 Platform Engineering 负责人；用户是 DevOps 或 SRE
              工程师。主要场景是可观测性数据路由——在遥测规模扩大时，把指标、链路追踪和日志送往 Datadog、Grafana 或 Prometheus，同时控制成本。Cribl Edge 是这里的核心产品，作为轻量级
              agent 部署在数据源头。


              **联邦与政府分层** 在 Cribl 于 2026 年 1 月获得 FedRAMP Authority to Operate 之后全面可触达，叠加此前的 DOD Impact Level 4 授权。买方是联邦
              IT 或网络安全项目经理；场景包括民用机构日志聚合，以及情报机构工作负载的安全遥测管道。


              第四个分层是 **中型市场技术和 SaaS 公司**（约 500–5,000 名员工），Cribl 以成本效率和易部署性对抗全平台替代方案。该分层部分通过 AWS Marketplace
              等渠道伙伴服务，后者提供摩擦更低的采购路径。


              从地域看，Cribl 客户群以北美为主，这与其旧金山总部和美国企业级 go-to-market 重点一致；同时，公司在西欧的存在感提升，并在 APAC 和中东开始出现牵引力。
