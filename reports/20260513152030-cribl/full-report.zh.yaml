  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品架构与模块概览
        blocks:
          - type: paragraph
            body: >
              Cribl 平台由四个彼此独立但可互操作的产品组成：Cribl Stream、Cribl Edge、Cribl Lake 和 Cribl Search。公司把它们合称为「Cribl Suite」或「AI
              Platform for Telemetry」，目标是让企业掌握自身遥测数据主权——日志、指标、链路追踪和事件——不论企业使用哪一种分析后端。


              **Cribl Stream** 是核心产品，也是最早的产品。它是分布式流处理引擎，可以实时路由、转换、过滤、丰富和回放机器生成数据。Stream 采用 leader / worker 节点模型：leader
              节点管理配置、处理管道和 worker 管理，worker 节点执行数据转换逻辑。Stream 几乎可从任何来源摄入数据（Syslog、Splunk forwarders、Elastic
              Beats、Kafka、HTTP/S、S3、cloud logs），并路由到任何目的地（Splunk、Elastic、Datadog、Chronicle、S3 以及 300+ 其他目的地）。Version
              4.8（截至 2026 年的当前 GA 版本）包含多租户改进、边缘编排增强、扩展的 AI/ML 管道算子等功能。


              **Cribl Edge** 是轻量级分布式 agent，部署在数据源处——服务器、VM、容器或边缘设备——在遥测上游转发到 Stream 或直接到目的地之前完成采集和预处理。Edge 用可管理、具备管道能力的
              agent 替代传统重型日志 shipper（Filebeat、Splunk Universal Forwarder），可在本地过滤和丰富数据。Edge 通过同一 Stream
              控制平面集中管理，为分布式部署提供统一舰队管理界面。


              **Cribl Lake** 是基于对象存储、专为遥测构建的数据湖。它以开放列式格式（Parquet）把原始和已处理的可观测性数据存入客户控制的云存储（AWS S3、Azure Blob、GCS）。Lake
              包含生命周期策略、分层留存和回放能力，让组织低成本保留原始遥测，并按需选择性 rehydrate 以便分析。存储与计算分离，也避免了分析层的供应商锁定。


              **Cribl Search** 提供联邦查询界面，横跨 Stream、Lake 和第三方数据存储。Search
              不要求数据集中化，而是在分布式静态数据和流动数据上执行查询，让分析师无需提前迁移数据就能调查事件。该查询引擎设计上同时支持类 SQL 语法和 SPL（Splunk Processing
              Language），服务迁移场景。


              四个产品共享统一控制平面（Worker/Fleet 管理）、通用配置 schema（YAML/JSON pipelines）和集中 UI。该架构支持企业渐进采用——先用 Stream
              降本，再随着可观测性成熟度提高，扩展到 Edge、Lake 和 Search。
