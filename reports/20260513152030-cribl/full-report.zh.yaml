      - number: '3.3'
        title: 既有平台竞争对手
        blocks:
          - type: paragraph
            body: >
              Splunk/Cisco、Elastic SIEM、New Relic 和 LogRhythm/Exabeam 是 Cribl 既补充、也越来越多参与竞争的既有平台。


              Cisco 以约 $28 billion 收购 Splunk，并于 March 2024 完成交易；这是 Cribl 历史上最重要的单一竞争事件。Splunk 一直是 Cribl
              的主要市场参照物：这个平台高昂的每 GB 定价（企业合同中 $1–$3.50/GB/day）创造了对 Cribl Stream 作为降本层的需求。收购后，Cisco 获得 Splunk 的 15,000+
              企业和政府客户、$3.7+ billion 年收入（2024 财年），以及覆盖 Fortune 500 和联邦政府的深厚关系。Splunk 网站发布了与 Cribl
              替代方案比较的博客，反映其正在主动竞争定位。Cisco 现在既有市场触达，也有财务资源，可以把管道功能打包进产品——可能作为 Splunk Heavy Forwarder 增强或 Cisco 新产品——对已支付
              Cisco 安全许可费的客户以零增量成本提供。


              捆绑威胁真实存在，但兑现时间线是 2–4 年。Cisco 整合大型收购的历史表现参差不齐（AppDynamics、Sourcefire），Splunk 从本地索引架构向云端重平台化也占用了大量 R&D
              产能。SecurityWeek 和 Dark Reading 对 Cribl Series E 的报道确认，即便在 Cisco/Splunk 收购后，企业势头仍然强劲，说明短期需求没有被摧毁。Splunk
              定价本质上仍高，Cribl 客户基础中有相当一部分专门用 Cribl 来降低 Splunk 成本。


              New Relic 在 2024 年由 Francisco Partners 和 TPG Capital 完成私有化，交易估值约 $6.5 billion。收购后，New Relic
              战略重心从激进增长转向盈利优化。其定价模型被重构，基于用量的定价变化触发合同重新谈判，导致部分客户流失；据报道，客户评估替代方案让 Cribl 受益。New Relic
              的管道能力局限于原生代理采集，不具备多目的地路由，因此更像 Cribl 的目标账户，而非正面对抗竞争者。


              LogRhythm 于 August 2023 与 Exabeam 合并，组成一家合并后的下一代 SIEM 实体。合并公司争夺安全分析预算，但依赖日志摄取管道；在多数 LogRhythm/Exabeam
              部署中，Cribl 是补充层，而不是直接竞争者。LogRhythm 网站确认，其重点是 SIEM、UEBA 和安全分析，而非数据路由中间件。
