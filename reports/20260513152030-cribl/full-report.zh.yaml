      - number: '3.4'
        title: 相邻与替代威胁
        blocks:
          - type: paragraph
            body: >
              Datadog、超大规模云原生路由工具、OpenTelemetry Collector 和内部自建，在不同市场分段构成可信替代威胁。


              Datadog Observability Pipelines（2023 年 GA）是这一相邻类别中技术能力最强的竞争产品。截至 2026 年初，Datadog ARR 约 $2.7 billion，市值
              $35–45 billion，拥有充足资源增强其管道产品。Datadog 与 Cribl 比较的竞争博客承认多目的地用例，但强调 Datadog 在可观测性数据上的集成分析优势。根本竞争差距仍在：Datadog
              Observability Pipelines 主要把数据路由进 Datadog，而 Cribl 可把数据路由到任意目的地，包括 Datadog 的竞争对手。对已完全押注 Datadog
              作为可观测性后端的客户来说，Datadog 原生管道会降低独立部署 Cribl 的必要性；这是云原生工程团队中最可信的相邻替代风险。


              OpenTelemetry Collector 是 CNCF 维护的开源组件，为日志、指标和链路追踪提供厂商中立的接收器、处理器和导出器。它由 Google、Microsoft、Datadog、Splunk
              以及数百名贡献者支持，已经成为遥测采集事实上的开放标准。Cribl 的战略回应是拥抱 OTel 兼容性，并把商业平台定位为 OTel Collector 之上的企业管理层——提供
              RBAC、管道监控、合规工具、高可用和规模能力，这些仅靠开源 Collector 无法提供。Collector 缺少企业管理功能（集中配置、审计日志、PII 脱敏、SLA 支持），保住了 Cribl
              的差异化。Grafana 博客和生态评论确认 OTel 在云原生环境中采用率上升。


              超大规模云原生路由工具（AWS Kinesis Firehose/Security Lake、Azure Monitor DCR transformations、GCP Log
              Router/Pub-Sub）在各自云生态内是免费或近乎零成本替代。对单云新建部署来说，这些工具可以复制有限的 Cribl 路由功能。它们的限制在多云和多目的地路由：一家企业如果跨 AWS 和 Azure
              把数据路由到 Splunk、Datadog 和 Cribl Lake，仍需要 Cribl 的厂商中立层。Cribl 客户基础偏向大型混合企业，因此安装基础中的超大规模云替代风险有限。


              对具备工程能力的大型企业来说，内部自建仍是一个替代选项。Cribl 用总拥有成本叙事回应这一点：自研管道需要持续维护，缺少厂商支持，而且每增加一个来源或目的地连接器都要重新工程化。Cribl 的 80+
              托管连接器代表数千小时集成工程，若内部复制也要投入同等工作量。Cribl 每 GB 定价虽高于部分替代方案，但若对照自研管道的工程和运营成本，仍具竞争力。
            claimRefs:
              - CP025
              - CP026
              - CP027
              - CP028
              - CP029
