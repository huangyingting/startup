      - number: '8.5'
        title: 投资逻辑失效监控与 KPI 仪表盘
        blocks:
          - type: paragraph
            body: |
              投后监控需要一组结构化、可观察的 KPI，可通过公开数据、分析师覆盖和投资人信息权跟踪。
              关键绩效指标包括：ARR 增速（目标为 2026 年前保持 >= 50% YoY）、NRR（目标 >= 125%）、
              新 logo 增加数（目标每季度 >= 100 个企业 logo）、联邦 ARR 占比（目标到 2027 年达到总额
              >= 15%），以及 AI 产品收入贡献（目标到 2027 年 > 5%）。

              投资逻辑失效监控：NRR 连续两个季度低于 100%，是立即卖出信号。CEO 离任且无明确继任者，
              是立即持有信号。Cisco/Splunk 宣布原生管道，则触发观察名单，需要迅速做客户访谈尽调，
              量化 TAM 风险。Series F 估值低于 $3.5B，会触发反稀释条款，并要求重新评估投资逻辑。

              Cribl 的 AI 平台转型需要监控 ML/AI 工程人数、Cribl Search 采用率和 AI 产品收入贡献。
              SiliconANGLE 和 TechCrunch 可提供产品发布速度的早期信号。Sacra 关于私人市场定位的
              季度更新，是最可靠的持续财务代理指标。Gartner Peer Insights 评分维持在 4.0/5.0 以上，
              可作为企业市场持续验证信号。
