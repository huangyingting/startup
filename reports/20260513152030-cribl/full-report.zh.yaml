      - number: '8.2'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: |
              核心投资逻辑建立在四个支柱上：（1）管道位于关键任务链路，带来结构性留存；（2）平台
              扩张驱动持久的 130%+ NRR；（3）借 FedRAMP ATO 拓展联邦市场，形成可防守的细分护城河；
              （4）通过 Cribl Search 可信地转向 AI 平台，抬高产品天花板。

              Cribl 入选 2025 年 Gartner Magic Quadrant for SIEM，且在 Gartner Peer Insights 上拥有
              4.4/5.0 评分和 300+ 条企业评价，说明市场验证来自独立第三方。Sequoia Capital 仍在组合
              中参与，Google Ventures 以 $3.5B 估值领投 Series E，也构成机构背书。GV 的投资意味着
              GV 自身判断的估值上限显著高于入场价格。

              主要反向逻辑是商品化：如果 Cisco/Splunk 将原生管道打包进 Splunk 核心授权，或 OTel
              Collector 达到功能平价，Cribl 的定价权会被侵蚀，NRR 也会向 100% 回落。G2 企业评价记录
              了定价复杂性这一价值顾虑，是 NRR 可持续性的反向信号。在 9,000+ 客户和 $300M+ ARR
              的规模上，中端市场扩张可能受限，因为只有遥测量足以支撑 Cribl 授权成本的企业才在
              可服务范围内。
            claimRefs:
              - CV008
              - CV009
              - CV010
              - CV011
              - CV012
              - CV013
              - CV014
