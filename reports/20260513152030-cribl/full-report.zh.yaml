      - number: '1.5'
        title: 关键里程碑与公司历史
        blocks:
          - type: paragraph
            body: >
              Cribl 的公司历史在不到八年里走出一条弧线：从自举起步的可观测性工具，成长为全平台企业软件公司。创始团队于 2018 年注册公司，最初以「LogStream」推出产品，是一款补充 Splunk
              的日志管道工具。早期牵引力来自希望在数据摄取前更高效过滤和路由、从而降低 Splunk 许可成本的组织。


              产品扩张一直较为系统：Cribl Edge 作为轻量分布式代理推出，用于端点遥测采集；随后推出 Cribl Lake，作为可扩展的云原生数据湖用于遥测留存；再推出 Cribl
              Search，提供联邦搜索能力，让调查可在原地数据上跨源进行，无需把数据重新载入热存储。最近，Cribl 加入了 AI 驱动功能，包括用于管道编写的 Copilot Editor 和 AI 驱动的 Cribl
              Search 增强，把公司推向智能体 AI 工作负载时代。


              监管里程碑是政府市场的关键验证：DOD Impact Level 4 授权先于 FedRAMP ATO（January 2026）取得，后者打开了民用联邦机构采购。March 2026，公司发布「Cribl
              Guard」，新增后台敏感数据检测的数据安全能力。公司在 2026
              年初的新闻室条目显示产品速度活跃、企业扩张延续。公开来源未发现裁员、领导层变动或法律行动等负面事件；这可能反映调查性报道稀缺，而不一定意味着事件不存在。
