            title: Cisco/Splunk 捆绑：最高烈度竞争威胁
            body: >
              Cisco 以 $28 billion 收购 Splunk，制造了潜在捆绑威胁：如果 Cisco 将管道能力打包进 Splunk Security Suite，并对既有客户零增量收费，Cribl
              的主要造市机制（降低 Splunk 成本）将被直接挑战。兑现时间线为 2–4 年，但尽调应每季度监控 Splunk 产品发布节奏，关注管道功能扩张。
            calloutType: risk
            claimRefs:
