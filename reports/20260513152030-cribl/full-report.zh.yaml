      - number: '7.2'
        title: 运营、质量与安全风险
        blocks:
          - type: paragraph
            body: >
              Cribl 核心产品是关键任务基础设施：管道故障会直接影响客户 SIEM 摄入、合规日志存储和安全监控。Cribl 持有 Trust Center 记录的 SOC 2 Type II、FedRAMP ATO 和
              ISO 27001 认证，建立了成熟的安全合规姿态。不过，Cribl Trust Center 未公布具体 SLA 承诺或历史 uptime 指标，相比企业基础设施预期，这是治理透明度缺口。


              作为处理安全和运营日志的数据管道，Cribl 根据 MITRE ATT&CK framework（technique T1195）是供应链攻击的潜在目标。Cribl
              管道一旦被攻破，攻击者可能获得对安全日志路由的可见性或控制权。截至 2026 年 5 月，在审查 MITRE CVE 数据库和 HelpNetSecurity 覆盖后，未发现 Cribl 核心管道引擎的 CVE
              披露。


              PeerSpot 企业评论把极端规模下的性能调优挑战列为运营风险。Cribl 的 SaaS 部署托管在 AWS；单一云架构带来集中度风险，AWS 宕机会直接影响 SaaS 客户。Cribl 自研 CEL
              表达式语言形成客户切换成本，有利于留存；但如果 OTel-native 替代方案接近功能对等，也可能引发客户不满。
