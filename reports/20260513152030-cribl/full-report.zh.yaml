  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与确认基础
        blocks:
          - type: paragraph
            body: >
              Cribl 采用 SaaS 订阅收入模型，企业客户主要按每日数据摄取量（以 GB/day 计）为一个或多个 Cribl 产品支付经常性费用。公司核心收入指标是年经常性收入（ARR）；根据公司新闻室公告，Cribl
              已在 February 2026 正式突破 $300 million ARR。月经常性收入（MRR）可由 ARR 推导，但公司未单独披露。由于 Cribl 是私营公司，GAAP 收入、递延收入余额和 P&L
              报表均未公开。


              收入确认遵循符合 ASC 606 原则的订阅模型：软件访问费用在合同期内按比例确认，专业服务收入在服务交付时确认。多数企业合同为年度合同，多年期承诺可按协商费率签订。公司向客户提供的 FinOps Center
              工具帮助跟踪管道使用量和成本，这说明客户对用量超额成本敏感，也说明即便 Cribl 以订阅形式销售，其定价实质上接近消费型。


              $300M ARR 里程碑是公司通过新闻稿和新闻室文章宣布的口径，并非经审计或独立核验数字。此前公开财务标记包括 early-to-mid 2024 隐含的 $200M ARR
              水平，依据是增长轮投资人评论和行业报道。这些里程碑披露可以拼出大致 ARR 增长轨迹，但准确季度节奏和 YoY 增速没有披露。


              收入队列包括新客户 ARR、来自既有客户采用更多产品或更高数据量的扩张 ARR，以及续约
              ARR。公司从单一管道产品（Stream）扩展到四产品套件（Stream、Edge、Lake、Search），创造了有意义的增购向量，很可能支撑强劲的净收入留存。
