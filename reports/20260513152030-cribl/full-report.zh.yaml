      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >
              Cribl 由三位 Splunk 校友共同创立，公司因此在可观测性和日志管理领域有很深的行业经验。Clint Sharp 担任 CEO，是数据管道战略上颇受认可的行业声音。Dritan
              Bitincka（CTO/首席科学家）和他的兄弟 Ledion Bitincka 带来扎根于 Splunk 及更早公司大规模分布式系统工作的技术深度。


              创始团队的「ex-Splunker」背景具有战略意义：他们深知 Splunk 的架构限制和定价模型，因此能把 Cribl Stream 明确定位为 Splunk 环境的补充工具和迁移路径。Sequoia
              Capital 的公开组合描述确认，公司「由三名前 Splunker 创立，使命是把机器数据价值榨到最大」。


              自创立以来，领导团队保持稳定，截至报告日期没有重大公开高管离职。考虑到 2022–2024 年科技行业整体震荡，这种稳定性值得关注。Fortune magazine 多次将 Cribl 列入最佳工作场所榜单，包括
              Best Medium Workplaces 和 Best Workplaces in Technology，显示内部文化和人才留存较强。May 2026 的 LinkedIn 页面显示其有 117,731
              名关注者，可作为技术从业者中品牌触达的代理指标。公开来源未找到明确的 CFO 或 COO；相较同融资阶段同行，这是一个治理缺口。
