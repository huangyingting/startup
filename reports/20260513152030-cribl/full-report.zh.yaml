          - type: callout
            title: OpenTelemetry 成熟是缓慢推进的颠覆因素
            body: 在多年维度上，OTel 标准化会消除专有格式锁定。Cribl 必须证明自身价值不止格式转换，还包括数据增强、路由智能和降本；这些是 OTel 单独无法交付的。
