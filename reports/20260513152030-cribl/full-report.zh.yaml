chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与概况
        blocks:
          - type: paragraph
            body: >
              Cribl, Inc. 是一家总部位于 San Francisco 的企业软件公司，2018 年由三名前 Splunk 工程师创立：Clint Sharp（CEO）、Dritan Bitincka（联合创始人）和
              Ledion Bitincka（联合创始人）。公司总部位于 22 4th Street, Suite 1300, San Francisco, California 94103，并在 Austin, Texas
              设有运营团队。Cribl 将自己定义为「AI Platform for Telemetry」，帮助企业管理和分析机器生成的可观测性数据——日志、指标、链路追踪和配置数据——服务人工和 AI 驱动场景。


              Cribl 的核心价值主张是厂商中立的遥测管道基础设施：不把客户锁进单一分析平台，而是让组织从任意来源采集数据，高效处理后路由到任意目的地。IT 和安全遥测爆发式增长，约以 30% CAGR
              扩张，而企业预算仍受约束；这套方法正面解决由此产生的成本和复杂性。


              截至报告日期，Cribl 仍为私营公司，尚未推进 IPO。其 SEC EDGAR 注册确认主要办公地址为上述 San Francisco 地址。截至 May 2026，LinkedIn 数据显示公司全球约
              1,200 名员工，列名员工为 1,203 人，但公司自有口径可能不同。Cribl 产品可在云端、本地部署和混合环境中使用，服务从中端市场到大型企业和政府部门的组织。
