      - number: '5.3'
        title: 技术栈与运行架构
        blocks:
          - type: paragraph
            body: >
              Cribl 的技术栈结合了开放标准采用、云原生部署模式和自研流处理逻辑。关键架构选择如下。


              **运行时与执行层**：Cribl Stream 和 Edge 主要以 Node.js（JavaScript/TypeScript）编写，性能关键路径操作通过原生 C++ bindings 和
              WebAssembly（WASM）模块加速。Node.js 基础让管道算子和集成可以快速迭代。批评者指出，Node.js 并不是高吞吐数据处理的常规选择，但 Cribl 架构把重计算卸载到 worker
              节点，缓解了单进程吞吐限制。500B events/day 的说法意味着水平 worker 扩展模型在实践中有效。


              **集成生态**：Cribl 维护 300+ source / destination connectors（「packs」），包括 Splunk、Elastic、Datadog、AWS
              CloudWatch、Azure Monitor、Google Cloud Logging、Kafka、Kinesis 和 OpenTelemetry 的原生连接器。AWS Marketplace 上架确认了其与
              AWS 云生态的集成深度。公司称支持完整 OpenTelemetry Protocol（OTLP）栈，把自己定位为 OTel 兼容 collector，同时提供超出标准 OTel collector config
              的自研处理能力。Cribl 还把 Fluentd/Fluent Bit 兼容性列为来源输入，已经使用 CNCF logging agents 的企业无需替换 agent，也能经 Cribl 路由。


              **部署模型**：Cribl 支持三种部署模型：（1）客户基础设施上的自管理本地部署；（2）云托管（Cribl.Cloud），由 Cribl 托管的全托管 SaaS
              部署；（3）云托管但客户自管理（BYOC），客户拥有云账号。Kubernetes 是一等部署目标，Stream 和 Edge 部署均提供 Helm charts 和 Kubernetes
              Operators。Cribl 官方文档记录了 Kubernetes 部署模型，并支持 worker pools 自动扩缩容。


              **数据格式与协议**：Cribl 内部以事件流方式处理数据，原生支持 JSON、key-value、CSV、CEF（Common Event
              Format）、LEEF、Syslog（RFC3164/5424）和自定义 regex-parsed formats。Cribl Lake 以 Apache Parquet 格式存储数据，并采用
              Hive-compatible partitioning，让 Athena、Spark、Databricks 等工具可以做下游分析。OpenTelemetry Protocol（OTLP）同时支持输入和输出。


              **Cribl Guard**：Cribl Guard 于 2025 年推出，是一个安全层，在遥测管道本身上提供 AI
              驱动的异常检测——识别数据外泄、意外路由变更和管道篡改。官方描述称，该能力使用基于正常管道运行模式训练出的行为基线来标记偏离。


              **依赖项**：Cribl 架构存在若干重要外部依赖，包括 Apache Kafka（高吞吐缓冲）、AWS/Azure/GCP 云存储 API（Lake）以及 OpenTelemetry
              specification（协议标准）。云原生部署还需要 Kubernetes 和容器运行时基础设施。
