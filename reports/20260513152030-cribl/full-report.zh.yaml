      - number: '7.4'
        title: 人员、关键人物与执行风险
        blocks:
          - type: paragraph
            body: |
              Cribl 创立至今，人员风险已明显下降：LinkedIn 显示截至 2026 年 5 月约有 1,200
              名员工，足以支撑职能深度。但 CEO Clint Sharp 和 CTO Dritan Bitincka 的关键人依赖
              仍是投资风险。Sharp 是唯一的外部发声人，也是投资人关系锚点；Bitincka 掌握核心技术
              架构和 AI 产品差异化。公开信息未显示 CFO、COO 或 CRO；相对于 ARR 阶段相近的同业，
              这构成组织透明度缺口。

              Cribl 的 Glassdoor 评分为 4.2/5.0，并入选 Fortune Best Workplaces，说明员工满意度较好，
              也降低了近期流失风险。但 Cribl 争夺工程人才时，要同时面对 Datadog、Cisco/Splunk
              以及资金充足的可观测性初创公司；员工数超过 1,200 人后，薪酬压力会持续存在。

              从单一产品（Stream）转向多产品平台（Stream、Edge、Lake、Search），销售动作也从简单成交
              变成更偏顾问式、周期更长的流程。PeerSpot 的负面评价提到支持质量不稳定，说明客户成功
              扩张存在执行风险。2026 年 3 月的智能体 AI 定位需要重新投入研发，可能推高烧钱速度，
              并让运营杠杆承压，进而影响 $3.5B 估值的支撑力度。
