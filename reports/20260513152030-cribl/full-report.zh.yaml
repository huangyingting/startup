    title: 留存 / 复购队列
    type: cohort
    summary: 按客户细分估计随时间变化的留存比例；基于企业 SaaS 基准（无公开 Cribl 数据）。
    approximationNotes: >-
      所有数值均根据 $100M–$500M ARR 基础设施公司企业 SaaS 基准区间估计（Bessemer Cloud Index、BVP State of the Cloud）；Cribl 未公开披露
      NRR/GRR/留存队列。实际数字可能有重大差异。
    data:
      columns:
