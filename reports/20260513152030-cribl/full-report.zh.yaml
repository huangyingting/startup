    Cribl
    的五款产品覆盖遥测数据全生命周期：Stream（用于日志、指标和链路追踪路由、转换、增强的数据管道）、Edge（在边缘侧采集的轻量分布式代理）、Lake（用于低成本日志留存的读时模式对象存储层）、Search（无需预摄取即可跨实时和归档数据做联邦查询）以及
