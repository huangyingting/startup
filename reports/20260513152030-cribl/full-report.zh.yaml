      - number: '4.5'
        title: 财务轨迹与证据缺口
        blocks:
          - type: paragraph
            body: >
              公开可得的财务里程碑可以拼出一条近似 ARR 增长曲线。Cribl 大约在 2021–2022 年突破 $100M ARR，至 2024 年初增长到约 $200M ARR（由 2024 年 6 月 $150M
              增长轮的投资者评论推断），并在 2026 年 2 月正式超过 $300M。该轨迹意味着 2022–2026 年期间 CAGR 约 50%，对这一规模的基础设施 SaaS 公司来说表现强劲。


              不过，精确的季度 ARR 轨迹未知，增长也可能已从更高水平放缓。Cribl 从 2022 年 $3.5B 的估值高点，先在 2024 年 6 月增长轮降至 $3.0B，再通过 Series E 恢复到
              $3.5B，说明公司经历了与 2022–2024 年 SaaS 市场整体重估一致的估值收缩。该期间 ARR 增长是加速还是减速，外部并不清楚。


              在 $3.5B 估值和 $300M ARR 下，隐含倍数约为 11.7x forward ARR。2026 年，$300M ARR 规模的基础设施可观测性 SaaS 上市可比公司，交易倍数约为 10–15x
              NTM revenue。Cribl 的倍数处于这一区间内，但偏上沿，需要持续高增长支撑。若 ARR 同比增长放缓至 25–30%，合理倍数会压缩到 7–9x，对应估值
              $2.1B–$2.7B——较上一轮价格可能折价 25–40%。这是投资者面临的主要财务风险。


              重大证据缺口包括：精确 ARR（公司称 $300M+，没有给出具体数字）、季度 ARR 轨迹、毛利率、NRR、CAC、烧钱速度，以及任何债务义务。完整尽调需要查看经审计财务报表、按 vintage year 展示
              NRR 的队列收入分析、CFO 关于盈利路径的说明，以及至少两年历史 P&L 数据。
