      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              AWS 是 Cribl 主要 SaaS 托管提供商，也是通过 AWS Marketplace 获客的关键渠道。AWS 宕机或 Marketplace 政策变化，会直接影响 SaaS
              客户可用性和中型市场获客。AWS 自身可观测性产品开发（Amazon CloudWatch、AWS Distro for OTel）也可能限制 Cribl 在 AWS 生态内的可服务市场。


              Cisco 收购 Splunk（2024 年 3 月完成）带来了资本充足的竞争者，后者可能在 Splunk 内构建原生管道能力，威胁 Cribl 核心 SIEM 优化场景。Cribl
              合作伙伴目录记录了分散化努力，包括 Google Cloud、Azure、多家 MSSP 和 SI 集成商。GV 领投的 Series E 释放出与 Google Cloud
              战略对齐的信号，但也加深了单一伙伴依赖风险。


              OpenTelemetry Foundation（CNCF）是协议兼容性依赖。Cribl 已承诺 OTel 兼容；如果 CNCF 治理变化让原生 OTel Collector 的企业路由能力增强，可能削弱
              Cribl Stream 差异化。Cribl 的 80+ source and destination integration connectors 带来维护负担；主要数据源 API
              或协议变化时，需要快速更新连接器。
