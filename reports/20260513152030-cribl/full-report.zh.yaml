      - number: '5.4'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              2024–2026 年，Cribl 的信任与安全姿态明显增强；2026 年 1 月，Cribl.Cloud 获得 FedRAMP Moderate ATO（Authority to
              Operate，运行授权）。这使 Cribl 成为少数拥有云托管部署联邦授权的遥测管道厂商之一，也打开了直接及通过渠道伙伴销售给美国联邦政府的大门。


              **合规认证**：Cribl 称其平台覆盖 140+ 合规框架控制项，包括 SOC 2 Type II、ISO 27001、PCI DSS Level 1、HIPAA、FedRAMP
              Moderate、StateRAMP 和 FIPS 140-2 加密模块合规。安全信任页面（cribl.io/security/）提供合规矩阵，并链接到企业潜在客户可在 NDA 下获取的审计报告。


              **数据主权与隐私架构**：相较传统 SaaS 分析平台，Cribl 架构天然更有利于隐私保护，因为数据不必离开客户基础设施。在自管理和 BYOC 部署模型中，Cribl
              软件在客户网络边界内处理数据；没有遥测数据进入 Cribl 基础设施。在 Cribl.Cloud 中，数据会经过并在 Cribl 管理的基础设施中处理，但受符合 GDPR、CCPA 和 HIPAA
              要求的数据处理协议（DPA）约束。公司安全页面明确说明，未经同意，客户数据不会用于产品改进或 AI 训练。


              **漏洞管理与事件响应**：Cribl 在 HackerOne 上维护公开安全披露计划和 bug bounty。信任页面记录了 CVE 跟踪和负责任披露。作为处理组织全部遥测的管道，Cribl
              一旦被攻破，影响面会很大——这是企业安全团队在采购评审中会标记的风险。


              **Cribl Guard（安全层）**：Cribl Guard 提供管道完整性监控，扩展了平台自身安全姿态。这意味着 Stream 的定位从单纯数据搬运工具，转向安全执行点。Guard
              能力也形成了产品主导的安全叙事，增强面向 CISO 的销售动作。


              **Gartner 认可**：Cribl 进入 2024 和 2025 年 Gartner SIEM（Security Information and Event Management）魔力象限，定位为
              Niche Player 或相邻技术，证明它确实进入了安全买方工具箱。SIEM 认可与 SIEM 厂商本身不同——Cribl 不直接竞争 SIEM，而是让 SIEM 摄入更具成本效率。
