      - number: '6.2'
        title: 客户采用与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Cribl 的增长指标显示，公司维持了与同阶段最佳企业 SaaS 公司相符的高速增长。客户数量从 Series B（2020 年）时估计的数百家，增长到 2026 年初 9,000+
              家组织；复合年客户增长率超过多数基础设施软件同业。2026 年 2 月宣布的 $300M+ ARR 里程碑（通过 Cribl 官方 PR Newswire 新闻稿和 Cribl 博客披露）代表多年跨度内超过
              50% 的复合年收入增长率，符合支撑 $3.5B 估值所需的轨迹。


              按 Cribl 自身产品概览，并经 2026 年 2 月 ARR 新闻稿确认，Fortune 500 渗透率超过 50%。以 Cribl 所处阶段看，这是一项强采用信号，因为 Fortune 500
              渗透通常意味着长期企业合同、经验证的安全姿态和显著增购空间。MSSP Alert 对 Series E 的报道指出，Cribl 平台被金融服务和技术行业的广泛客户使用。


              产品采用宽度已经超出最初的 Cribl Stream 管道。Cribl Edge 部署意味着每个端点或数据中心的足迹更大，增加每个客户的可计费节点数。Cribl Lake 和 Cribl Search 大约在
              2023–2024 年推出，提供存储和联邦搜索能力，降低对外部 SIEM 与数据湖厂商的依赖，从而扩大平均合同价值。


              Cribl 在 AWS Marketplace 上架，为中型市场和云原生客户提供低摩擦采购渠道，把可服务市场扩展到直接企业销售之外。cribl.io/partners/
              记录的合作伙伴生态包括集成伙伴（Splunk、AWS、Azure、Google Cloud）和服务交付伙伴（MSSP 与 SI 集成商），扩大了地域覆盖。


              截至报告日期，未发现公开披露的客户流失事件、重大合同损失或负面续约公告，这与早期强留存相符。
