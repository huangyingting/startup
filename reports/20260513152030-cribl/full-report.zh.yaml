  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Cribl 的竞争格局不寻常：公司占据的是数据源和分析目的地之间的横向基础设施层，而不是在单一产品类别内竞争。这同时产生三种不同竞争动态。


              第一类是传统 SIEM、日志管理和安全分析厂商：Splunk（$28 billion 收购于 March 2024 完成后归属 Cisco）、Elastic（ELK stack 和 Elastic
              Security）、LogRhythm（2023 年与 Exabeam 合并）和 IBM QRadar。这些厂商的原生摄取管道与 Cribl Stream 的路由功能重叠。关键在于，它们高昂的每 GB
              摄取成本——尤其是 Splunk——创造了 Cribl 被设计来解决的那类需求。Cribl 最初把自己定位为 Splunk 的补充：客户在数据进入 Splunk 前部署 Cribl Stream
              来过滤、转换和采样，从而将 Splunk 成本降低 30–80%。这种悖论——最大竞争对手的定价模型反而是主要造市力量——定义了 Cribl 的起源故事和增长引擎。


              第二类是可观测性和 APM 平台：Datadog、New Relic、Dynatrace 和 Grafana。这些厂商已经构建日志管理能力；Datadog 还具备明确的管道路由功能（Datadog
              Observability Pipelines，GA 2023），在特定工作负载上与 Cribl Stream 直接竞争。但它们仍以目的地为中心，而非路由中立；其管道工具主要把数据导入自有专有后端。Cribl
              的差异化在于把数据路由到任意目的地，包括这些平台本身。


              第三类是新兴纯管道厂商和免费替代品：Mezmo（原 LogDNA）、Chronosphere、Observe Inc.、Logz.io 和 OpenTelemetry Collector。OTel
              Collector 是由 Google、Microsoft、Amazon、Datadog 和 Splunk 支持的 CNCF 开源项目，提供免费的日志、指标和链路追踪路由，与 Cribl Stream
              核心价值部分重叠。Cribl 的战略回应不是正面竞争，而是拥抱 OTel 兼容性，把商业平台定位为 OTel 基础之上的企业管理和治理层。


              超大规模云厂商的路由服务——AWS Kinesis Firehose、Azure Monitor DCR 和 GCP Log Router——是单一云环境客户的额外免费替代。对于多云和混合企业，Cribl 的
              9,000+ 部署基础（包括 Fortune 500 的 50%+）大多属于这一类；由于多目的地和多厂商需求，这些工具仍不足以替代。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
