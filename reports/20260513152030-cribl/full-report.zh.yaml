      - number: '8.3'
        title: 乐观、基准与悲观回报情景
        blocks:
          - type: paragraph
            body: |
              以下三个退出情景以 2024 年 9 月 Series E 后的 3-5 年为期限：

              乐观情景（概率 30%）：Cribl 完成 AI 平台转型，联邦市场增长至 $50M+ ARR，Cisco/Splunk
              整合未能替代核心用例，NRR 保持在 130% 以上。2027-2028 年由 Cisco、Microsoft 或 Google
              以 14-18x 远期 ARR 战略收购，对应 $7-10B。隐含总回报：以 $3.5B 入场，回报 2.0-2.9x。

              基准情景（概率 50%）：Cribl 到 2027 年达到 $450-500M ARR，NRR 回落至 120-125%，
              2028-2029 年以 10-12x ARR 完成 IPO 或 Series F，对应 $5-6B。隐含总回报：1.4-1.7x。
              Series F 稀释 10-15%，将净投资人回报降至约 1.2-1.5x。

              悲观情景（概率 20%）：Cisco/Splunk 在 2026 年 Q4 前宣布原生管道，NRR 降至 105-110%，
              新 logo 获取放缓。以 6-8x ARR 完成 Series F，对应 $1.8-2.4B。隐含总回报：以 $3.5B
              入场仅 0.5-0.7x，形成部分亏损。

              概率加权期望值：（0.3 x 2.5）+（0.5 x 1.5）+（0.2 x 0.6）= 1.62x 总回报。该结果高于
              后期风险投资常用的 1.5x 最低 IRR 调整门槛。SiliconANGLE、Yahoo Finance 和 Sacra
              确认了上一轮定价和 ARR 轨迹，这些模型以此为基础。
            claimRefs:
              - CV015
              - CV016
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
