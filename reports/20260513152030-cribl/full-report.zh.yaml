      - number: '1.6'
        title: 图表与要点
        blocks:
          - type: callout
            title: 创始人-市场契合：前 Splunk 员工瞄准 Splunk 的阿喀琉斯之踵
            body: >
              三位联合创始人都在 Splunk 度过了关键成长年份，深知企业 Splunk 客户遭遇的成本和运营痛点。这种内部人知识让 Cribl 能设计出与既有 Splunk
              部署无缝集成的产品，同时带来实质降本和运营灵活性。结果就是罕见强的产品-市场契合：不到八年 ARR 快速增长至 $300M+。
            calloutType: strength
            claimRefs:
