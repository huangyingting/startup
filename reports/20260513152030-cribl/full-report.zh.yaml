      - number: '1.3'
        title: 融资历史与投资者
        blocks:
          - type: paragraph
            body: >
              Cribl 已在多轮融资中聚拢强势投资者财团，公开披露股权融资合计约 $864 million 或更高，反映顶级风险投资人对可观测性管道市场的高信念。最近一次确认的大型融资是 Google
              Ventures（GV）领投的 $319 million Series E；Forbes 报道该轮把公司估值推至 $3.5 billion，并称其超额认购。


              投资者包括 Greylock Partners、Redpoint Ventures、IVP（Insight Venture Partners）、CRV（Charles River Ventures）和
              Sequoia Capital 等早期支持者，Google Ventures 领投最近一轮。IVP 和 Greylock 的组合页面确认 Cribl 仍为活跃投资组合公司。GV 的组合列表确认 Cribl
              是当前投资。Sequoia 的组合页面显示双方在 2020 年建立合作，当时 Sequoia 参与 Series B。


              $3.5B 估值相当于约 11.7x 前瞻 ARR（对照 February 2026 宣布的 $300M ARR），属于高增长企业 SaaS 公司可见的溢价倍数，但高于 2024
              年公开市场可比公司水平。此前轮次包括 2021 年 $200 million Series C、估值 $1.5 billion，以及 2022 年 $150 million Series D、估值 $3.5
              billion。June 2024 又完成一轮 $150 million 战略增长融资，估值 $3.0 billion，较 2022 Series D 峰值有所下调。


              投资者未披露任何老股交易或优先清算权，Cribl 也未提交 S-1。详细财务的披露画像仍是私营未披露。
