  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与规模
        blocks:
          - type: paragraph
            body: >-
              Cribl 的可触达市场横跨三个相互重叠但边界不同的分析师分段：SIEM（安全信息与事件管理）、通用日志管理，以及新生的遥测管道中间件类别；后者尚无独立分析师覆盖。MarketsandMarkets 估算，全球
              SIEM 市场 2024 年为 $6.4B，并将以 14.5% CAGR 增至 2029 年 $12.6B；Mordor Intelligence 对同一分段的估算为 2024 年 $5.6B、2029 年
              $10.5B（13.4% CAGR）。Statista 对 2024 年 $5.4B 的共识数字大体印证了两者。日志管理子市场在 2024 年约为 $2.8B（Grand View Research）到
              $3.6B（MarketsandMarkets Cloud Log），构成相邻层。IDC 对可观测性平台到 2028 年 $10.5B 的预测覆盖了 Cribl 也参与竞争的更广义运营智能版图。Cribl
              自己公开声称总可用市场（TAM）为 $20B；这个口径需要合并
              SIEM、日志管理和可观测性估算，并假设专用管道层能在三类市场中捕获路由经济。遥测管道中间件缺少专门分析师市场规模测算，仍是重大证据缺口。综合估算信心为中等，因为没有单一分析师覆盖 Cribl
              定义的合并分段；当范围假设不同，不同发布方的 TAM 估算相差超过 3x。
