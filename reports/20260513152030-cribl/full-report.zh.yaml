      - number: '2.4'
        title: 市场时点与采用催化剂
        blocks:
          - type: paragraph
            body: >-
              市场时点对管道优先架构格外有利。December 2021 的 Log4Shell 漏洞迫使企业安全团队在数天内审计环境中的每条日志管道，柔性、厂商无关的遥测路由需求急剧上升。Log4Shell
              披露一个月后，Cribl 完成 $200M Series C；这个顺序并非巧合：事件把僵硬、厂商锁定日志转发的运营风险具象化。此后融资——June 2022 的 $150M Series D，以及 August
              2024 在 $3.5B 估值下完成的 $319M Series E——都建立在越来越多企业客户转向管道优先方法之上。SEC 网络安全事件披露规则（December 2023
              生效）要求上市公司在四个工作日内披露重大安全事件，压缩了检测和报告之间允许的窗口。同样，CMMC 2.0 最终版把强制日志留存扩大到更多层级的美国国防承包商，PCI-DSS 4.0
              则加速了支付相关金融机构采购。Cribl 进入 Gartner 2025 SIEM Magic Quadrant，为需要分析师验证后才批预算的风险厌恶型企业买方提供了合法性背书。
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
              - CM026
      - number: '2.5'
        title: 市场风险与证据缺口
        blocks:
          - type: paragraph
            body: >-
              三类结构性风险需要跟踪。第一，AWS Security Lake、Microsoft Sentinel、Google Chronicle
              等超大规模云厂商正在各自云内扩展原生遥测采集和路由能力，逐步降低已投入单一云架构客户的切换动机。Cribl
              的主要反驳是多云和跨厂商中立叙事，但中立性命题依赖企业继续维持异构基础设施，而不是集中到单一平台。第二，OpenTelemetry 作为厂商中立标准逐渐成熟；如果 OTel 广泛采用，消除了目前为 Cribl
              Stream 创造价值的格式转换工作，专有管道层的单位经济优势可能被压缩。The New Stack 报道了可信的从业者质疑：一旦 OTel 达到企业级成熟度，专有管道中间件是否仍有必要。第三，分析师对 SIEM
              和日志管理 TAM 的估算相差 3x，反映的是范围假设和方法选择确实不同，而非简单测量误差。投资者应采用保守规模测算，只计入 Cribl
              能捕获的路由经济，而不是相邻类别全部存储和分析支出。证据缺口限制信念：Cribl 不披露产品线收入拆分，流失数据不可得，最近公开引用的 ARR（$300M+）截至 2026 年初。
