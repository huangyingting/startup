      - number: '5.2'
        title: 关键工作流与使用场景
        blocks:
          - type: paragraph
            body: >
              Cribl 平台覆盖五类主要企业工作流，横跨安全运营、IT 运营、云基础设施和成本优化。


              **安全信息与事件管理（SIEM）成本优化** 是最主要的初始切入场景。部署 Splunk、Microsoft Sentinel 或 IBM QRadar 的组织，用 Cribl Stream 在日志进入
              SIEM 前过滤冗余或低价值数据，按数据量减少幅度直接降低授权成本。Cribl 客户报告称，使用 Stream 的过滤和聚合能力后，日志量平均减少 30–60%。Cribl 进入 2024 和 2025 年
              Gartner SIEM 魔力象限（作为相邻 / 使能技术），验证了该场景对安全买方的重要性。


              **可观测性管道与工具迁移** 让 IT 和 DevOps
              团队无需重新配置每一个数据源，就能更换可观测性后端，或并行运行多个后端。组织因此可以从传统平台（Splunk）迁移到现代替代方案（Datadog、Elastic、OpenTelemetry
              collectors），也可以在过渡期运行混合多工具环境。原生支持 OpenTelemetry，让 Cribl 在企业采用 CNCF 标准时处于有利位置。


              **合规与数据治理** 工作流借助 Cribl 的脱敏、删改和路由能力，确保 PII、PHI 和 PCI 数据在进入不合规分析存储前被清洗或重定向到合规目的地。该场景对医疗、金融服务和政府客户尤其重要。


              **AI/ML 数据管道** 是新兴场景：Cribl 将遥测路由到 AI 训练管道或 LLM 推理基础设施，支持 AI 驱动的异常检测和告警。Cribl 的「Cribl Copilot」功能（2025
              年宣布）使用生成式 AI，帮助操作员用自然语言提示构建管道配置。


              **边缘和 IoT 遥测采集** 使用 Cribl Edge 从分布式基础设施采集遥测——云工作负载、本地服务器、边缘设备——并在集中分析前先在本地处理，以降低带宽和延迟。组织越来越多为 Kubernetes
              工作负载和容器化微服务埋点，该场景也在增长。


              Platform Engineering 团队用 Cribl 在不同 squad 之间标准化遥测采集，靠集中管道配置强制执行 schema 合规和路由规则，而不是让每个团队自行选择工具链。
