      - number: '2.2'
        title: 市场增长驱动与逆风
        blocks:
          - type: paragraph
            body: >-
              企业遥测管道基础设施需求正在三股叠加结构性力量下加速。第一，多云采用率上升，78% 企业在两个或更多云上运行工作负载，数据采集面被打散，传统 SIEM 原生转发器难以高效应对。第二，AI/ML
              工作负载推高遥测量，增长速度快于存储成本下降，日志摄取预算承压，过滤和路由方案吸引力上升。第三，自 2022 年以来，网络安全数据留存和披露的监管堆栈明显变厚：SEC 网络安全披露规则、CMMC 2.0 和
              PCI-DSS 4.0 共同扩大了必须维护可辩护、可审计日志管道的组织范围。顺风之外也有两股明显逆风：传统 SIEM 厂商正在压低每 GB
              价格以降低切换动机，超大规模云厂商也在扩展原生可观测性能力，可能削弱独立路由层的必要性感知。Cribl 的落地后扩张定价模型，加上低于 1 TB/day
              的免费层，已经证明能在无需资本审批的情况下建立初始部署；但要扩展到全平台 ACV，仍需要重新谈预算。
            claimRefs:
