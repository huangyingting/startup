  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险环境
        blocks:
          - type: paragraph
            body: >
              Cribl 是一家企业数据管道软件供应商。客户通过 Cribl 软件路由自己的遥测，因此客户是数据控制者，负责 GDPR 和 CCPA 数据主体权利合规。相比代表客户存储或处理个人数据的 SaaS
              公司，这一架构设计显著降低了 Cribl 的直接监管暴露。


              Cribl Guard（2026 年 3 月宣布）在管道中提供后台 PII 检测和删改，是避免 PII 被意外路由的技术缓解措施。Cribl 于 2026 年 1 月获得面向美国联邦民用机构的 FedRAMP
              Authority to Operate（ATO），确认符合 NIST SP 800-53 控制项。CISA 云安全指南对联邦环境中的工具设定预期；Cribl 的 ATO 认证达到或超过 CISA 推荐控制。


              2025–2026 年活跃的联邦政府支出效率审查，可能削减机构 IT 采购预算，并拖慢 Cribl 联邦分层增长。Federal Register 确认，OMB 云软件采购指南仍适用于 FedRAMP
              供应商。截至 2026 年 5 月，在 SEC EDGAR 搜索或公开法律记录中，未发现针对 Cribl 的活跃诉讼、EEOC 投诉或监管执法行动。


              出口管制法规（EAR）适用于 Cribl 的加密和网络安全软件；公开记录中未发现违规或合规问题。Apache 2.0 OTel libraries 带来的开源许可证义务属于标准风险；Cribl 尚未公开确认正式
              SBOM 或 CLA 合规流程。
