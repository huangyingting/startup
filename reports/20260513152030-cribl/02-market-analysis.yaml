  evidenceGaps:
  - type: missing-source
    severity: material
    topic: telemetry-pipeline-middleware-market-sizing
    missingEvidence: >-
      No independent analyst firm has published a standalone market sizing for telemetry
      pipeline middleware as a distinct software category. All available estimates
      cover SIEM, log management, or observability as broader segments.
    whyItMatters: >-
      Without an independent TAM estimate for the pipeline middleware category, the
      Cribl $20B TAM claim cannot be independently validated, and investors must rely
      on Cribl own scope framing rather than third-party corroboration.
    diligencePath: >-
      Commission or identify a bespoke analyst sizing study; triangulate from Cribl
      ARR growth rate, win-rate by segment, and competitive pipeline product revenue
      disclosures by publicly traded comparables.
    relatedQuestionRefs:
    - QM004
    - QM006
  - type: private-evidence-only
    severity: material
    topic: product-line-revenue-breakdown
    missingEvidence: >-
      Cribl does not disclose revenue or ARR by product line (Stream, Edge, Search,
      Lake). All public figures are company-total ARR, with no decomposition by module
      or segment.
    whyItMatters: >-
      Without product-line revenue splits it is impossible to determine whether Cribl
      is primarily a single-product Stream vendor or a genuine multi-product platform,
      materially affecting valuation multiple assumptions.
    diligencePath: >-
      Request product-line revenue waterfall in management due-diligence session;
      triangulate from partner and channel disclosures, job postings by product area,
      and customer reference interviews.
    relatedQuestionRefs:
    - QM012
  - type: stale
    severity: minor
    topic: cribl-arr-deployment-currency
    missingEvidence: >-
      The most recent publicly verifiable Cribl ARR figure ($300M+) was announced
      in February 2026. Independent verification of post-announcement growth trajectory
      is not yet available.
    whyItMatters: >-
      For a 2026 investment analysis, ARR figures that cannot be independently confirmed
      after their announcement date introduce a staleness risk that widens the confidence
      interval on forward projection assumptions.
    diligencePath: >-
      Request monthly or quarterly ARR bridge and cohort retention data in diligence;
      cross-check with reseller and cloud-marketplace revenue disclosures where available.
    relatedQuestionRefs:
    - QM028
  - type: missing-source
    severity: material
    topic: buyer-churn-and-retention
    missingEvidence: >-
      No public data source discloses Cribl customer churn rate, net revenue retention,
      or contract non-renewal patterns. Practitioner commentary suggests some configuration
      complexity but does not constitute churn data.
    whyItMatters: >-
      Customer churn and net revenue retention are the most important leading indicators
      of whether the Cribl land-and-expand model is sustaining value delivery at scale.
      Without this data, growth quality cannot be independently assessed.
    diligencePath: >-
      Request gross and net revenue retention cohort analysis in due diligence; conduct
      structured customer reference interviews probing for renewal friction and competitive
      displacement events.
    relatedQuestionRefs:
    - QM020
  - type: missing-source
    severity: minor
    topic: federal-cybersecurity-budget-pipeline-allocation
    missingEvidence: >-
      Published federal cybersecurity budget totals are available, but no public source
      breaks out the fraction allocated specifically to log management, telemetry
      routing, or pipeline infrastructure versus endpoint, network, or identity security.
    whyItMatters: >-
      Without a pipeline-specific federal budget sub-line, the federal segment TAM
      must be estimated by inference from total cybersecurity spend and broad log-retention
      mandate headcounts, introducing significant imprecision.
    diligencePath: >-
      Review individual agency IT modernisation budget justifications (ITDB data);
