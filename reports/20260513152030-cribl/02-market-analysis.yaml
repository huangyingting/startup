company:
  name: Cribl
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Cribl competes across converging markets: SIEM, log management, and emerging telemetry
    pipeline middleware, with analyst estimates placing a plausible combined TAM near
    $20B by 2029. Growth is propelled by multi-cloud fragmentation, AI/ML telemetry
    volume expansion, and a mounting regulatory stack (SEC cyber-disclosure, CMMC
    2.0, PCI-DSS 4.0). Enterprise SecOps, IT Ops/SRE, federal, and financial-services
    buyers each exhibit distinct deal profiles. Key risks include analyst TAM estimate
    variance, hyperscaler native observability encroachment, and OpenTelemetry standardisation
    risk.
sections:
- id: CR0
  title: Market Definition and Sizing
  body: >-
    Cribl's addressable market spans three overlapping but distinct analyst segments:
    SIEM (security information and event management), general-purpose log management,
    and the nascent telemetry pipeline middleware category for which no standalone
    analyst coverage yet exists. MarketsandMarkets sized global SIEM at $6.4B in 2024
    on a trajectory to $12.6B by 2029 (14.5% CAGR), while Mordor Intelligence pegged
    the same segment at $5.6B in 2024, rising to $10.5B by 2029 (13.4% CAGR). Statista's
    consensus figure of $5.4B for 2024 broadly corroborates both. The log management
    sub-market, sized at roughly $2.8B (Grand View Research) to $3.6B (MarketsandMarkets
    Cloud Log) in 2024, adds an adjacent layer. IDC's observability platform forecast
    of $10.5B by 2028 captures the broader operational intelligence landscape in which
    Cribl also competes. Cribl itself has publicly claimed a $20B total addressable
    market, which requires aggregating SIEM, log management, and observability estimates
    and assuming that a purpose-built pipeline layer can capture routing economics
    across all three. The lack of any dedicated analyst market sizing for telemetry
    pipeline middleware remains a material evidence gap. Estimated aggregate confidence
    is medium because no single analyst covers the combined segment Cribl defines,
    and TAM estimates vary by more than 3x across publishers when scope assumptions
    differ.
  tableRefs:
