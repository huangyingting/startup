callouts:
- calloutType: strength
  title: Regulatory stack creates durable, near-term demand
  body: >-
    The convergence of SEC cyber-disclosure rules, CMMC 2.0, and PCI-DSS 4.0 in a
    two-to-three-year window produces audit-grade log pipeline mandates that are non-discretionary
    for regulated buyers. This regulatory demand is independent of macro budget cycles
    and substantially de-risks the Cribl near-term pipeline.
  claimRefs:
  - CM023
  - CM024
  - CM025
- calloutType: risk
  title: 3x analyst TAM spread signals scope ambiguity
  body: >-
    Published SIEM TAM estimates range from $5.3B to $12.6B for 2024 depending on
    scope assumptions, and no analyst covers Cribl self-defined telemetry pipeline
    middleware category independently. Investors should not take the $20B TAM claim
    at face value without decomposing the routing-economics share Cribl can realistically
    capture.
  claimRefs:
  - CM001
  - CM002
  - CM003
  - CM027
- calloutType: risk
  title: OpenTelemetry maturation is a slow-moving disruptor
  body: >-
    OTel standardisation eliminates proprietary format lock-in over a multi-year horizon.
    Cribl must demonstrate that its value proposition extends beyond format translation
    to enrichment, routing intelligence, and cost reduction that OTel alone cannot
    deliver.
  claimRefs:
  - CM032
  - CM033
  - CM036
