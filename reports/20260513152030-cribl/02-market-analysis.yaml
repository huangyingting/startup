- id: CR1
  title: Market Growth Drivers and Headwinds
  body: >-
    Demand for enterprise telemetry pipeline infrastructure is accelerating under
    three compounding structural forces. First, multi-cloud adoption with 78% of enterprises
    running workloads across two or more clouds has fragmented data collection surfaces
    in ways that legacy SIEM-native forwarders cannot efficiently address. Second,
    the rise of AI/ML workloads generates telemetry volumes that grow faster than
    storage costs fall, creating acute pressure on log ingestion budgets and driving
    interest in filtering and routing solutions. Third, the regulatory stack for cybersecurity
    data retention and disclosure has thickened materially since 2022: the SEC cybersecurity
    disclosure rule, CMMC 2.0, and PCI-DSS 4.0 collectively expand the population
    of organisations required to maintain defensible, auditable log pipelines. Against
    these tailwinds sit two notable headwinds: legacy SIEM vendors are compressing
    per-GB pricing to reduce switching incentives, and hyperscalers are extending
    native observability capabilities that could reduce the perceived need for a standalone
    routing layer. Cribl's land-and-expand pricing model, with a free tier at under
    1 TB/day, has proven effective at establishing initial deployment without capital
    approval, though expansion to full-platform ACV requires renewed budget negotiation.
  tableRefs:
  - TM004
  figureRefs:
  - FM003
  - FM004
  claimRefs:
