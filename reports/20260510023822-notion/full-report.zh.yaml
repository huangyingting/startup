      - number: '5.4'
        title: 基础设施可靠性、安全与合规
        blocks:
          - type: paragraph
            body: >-
              Notion 的基础设施按企业级可用性和监管合规来设计。Business 和 Enterprise plans 提供合同约定的 99.9% uptime SLA， 背后是全球分布式 AWS
              部署、Cloudflare edge caching 和 DDoS protection。公开状态页 status.notion.so 展示 Notion 核心服务的实时运行状态。 企业安全功能包括与主要 IdP
              providers（Okta、Azure AD、Google Workspace）的 SAML SSO、用于自动化用户生命周期管理的 SCIM provisioning、细粒度 audit
              logs，以及带页面级权限覆盖的 workspace 级访问控制。截至 2026，Notion 的合规认证包括 SOC 2 Type 2、 ISO 27001、ISO 27701（隐私信息管理）、ISO
              27017（云安全）、ISO 27018（云个人数据保护）、面向医疗客户的 HIPAA BAA、BSI C5 （德国联邦云安全标准）、面向 EU data subjects 的 GDPR
              compliance，以及面向 California residents 的 CCPA compliance。 数据驻留可选美国、欧盟、日本和韩国（后两者在 2025–2026 期间新增）。Enterprise
              plan 下，Notion 为 AI 功能提供零数据保留， 即 prompt inputs 和 outputs 不用于模型训练。HackerOne bug bounty program
              为安全研究员披露提供正式渠道。February 2024 收购 Skiff 引发安全社区的隐私担忧，因为 Notion 关闭了 Skiff 的端到端加密服务；这对重视隐私的企业买家构成负面信任信号。
              该收购尚未关联任何正式监管行动，但它代表一种声誉风险，企业采购团队可能会在供应商评估中提出。
