  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: Notion 从 2013 年的互联笔记工具，走到 2026 年拥有 100 万个 Agent 的代理式工作空间。
    data:
      items:
        - date: '2013'
          label: 在 San Francisco 创立
          detail: Ivan Zhao 和 Simon Last 推出 Notion；互联工作空间概念成形（年份据 Tracxn）。
          tone: positive
        - date: '2021-09-28'
          label: Series D 估值 $10–11B
          detail: 已披露最大融资轮确立 Notion 作为一线企业 SaaS 独角兽的地位。
          tone: positive
        - date: '2022'
          label: 渗透 Fortune 100 和 Forbes Cloud 100
          detail: Notion 覆盖 62% Fortune 100 和 98% Forbes Cloud 100，支撑企业叙事。
          tone: positive
        - date: '2024'
          label: 推出 EU 数据驻留
          detail: 多区域架构推动欧洲受监管行业采用。
          tone: positive
        - date: '2024-04-10'
          label: 更新隐私政策
          detail: 符合 GDPR/CCPA 的隐私政策生效，整合信任基础设施。
          tone: neutral
        - date: 2025-H2
          label: Custom Agents beta 开放
          detail: 首个代理式工作流功能进入 beta；引入按用量计费的 credit 定价。
          tone: positive
        - date: '2026-02-24'
          label: Custom Agents GA 发布
          detail: Agents 进入 GA，价格为 $10/1,000 credits；显示平台转向自主 AI。
          tone: positive
        - date: 2026-04
          label: 100 万个 Agent 里程碑
          detail: GA 发布后两个月内，团队创建 1M+ 个 Agent，验证企业采用速度很快。
          tone: positive
        - date: 2026-05
          label: APAC 数据驻留与 Agent 治理
          detail: 发布日本 / 韩国数据驻留，以及 Custom Agents 的管理员控制。
          tone: positive
    approximationNotes: Pre-2021 里程碑日期为近似值；2021 Series D 日期据 Tracxn。2022 采用数据来自公司口径， 没有独立验证的日历锚点。
