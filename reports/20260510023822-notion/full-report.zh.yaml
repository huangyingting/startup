      - number: '3.3'
        title: AI 差异化与新兴 agent 竞争层
        blocks:
          - type: paragraph
            body: >-
              Notion 在 February 2026 发布 Custom Agents，是 AI workspace market 竞争动态中的重要拐点。该产品让 autonomous AI agents 能在
              Slack、Gmail、Linear、Figma 和 custom MCP servers 等 connected tools 间处理 recurring workflows——task routing、Q&A
              answering、competitive monitoring 和 status compilation。private beta 阶段已构建超过 21,000 agents；general
              availability 后已创建 more than one million Custom Agents。企业客户 Ramp 已部署超过 300 active Custom
              Agents，并报告生产力工具成本降低 70%。Remote 用一个 Custom Agent 替代 IT help desk，团队每周节省 20 hours。以 May 2026 计，这些成果让 Notion
              在自主 AI 工作流执行上可衡量地领先多数直接竞争者。Atlassian 通过嵌入 Confluence 和 Jira 的 Atlassian Intelligence 引入 AI capabilities，支持
              AI-assisted editing 和 semantic search——但 agent workflow execution 的深度和自主性尚未在相近规模上被记录。Microsoft Copilot 与
              Microsoft Loop、Teams、Outlook 和 Word 集成；鉴于 Microsoft 的企业分发、Azure AI infrastructure 和现有 Trust Center
              credibility，它是资源最充足的 AI competitive threat。不过，Copilot 并不作为 standalone productivity platform 销售——它以每用户每月额外
              $30 绑定在 Microsoft 365 licenses 上，商业框架不同于 Notion 的 usage-based credit model。Notion 的战略风险是 AI
              commoditization：当 AI writing、search 和 agent features 成为 productivity tools 的 table stakes，差异化必须从功能新颖性转向
              data network effects、agent ecosystem size 和 enterprise distribution depth。Notion 已承认 Custom Agents
              architecture 中的 prompt-injection risks，并正在投入 guardrails；但这仍是所有 agentic AI vendors 都必须穿越的 operational risk。
