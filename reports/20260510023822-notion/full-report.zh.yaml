      - number: '8.2'
        title: 建议与风险评级
        blocks:
          - type: paragraph
            body: >-
              建议：按当前 secondary market prices 买入（约 $11B implied valuation），中等信心、中等风险评级。相对 public market comparables，
              当前估值偏紧，但考虑到 Notion 的增长率差异和 AI monetization maturity，仍可辩护。买入建议至少需要对三项条件有信心：第一， ARR growth 将在 2026-2027 维持
              above 30% year-over-year，延续 2025 观察到的 AI-enabled customer acceleration；第二， NRR 披露时将 above 115%，确认现有客户基础内
              expansion 有意义；第三，Custom Agents platform 将获得主流企业采用，并在 base seat subscription 之外贡献 incremental ARR。建议的主要风险是
              multiple compression：如果 public SaaS multiples 从当前水平进一步 de-rate，Notion secondary market pricing 可能跟随下修，无论底层
              fundamentals 如何。次要风险是 Notion 的 AI features 比预期更快 commoditize，因为 OpenAI、Anthropic、 Google 和 Microsoft
              都提供价值主张不同但重叠的 AI workspace capabilities。如果 ARR growth 跌破 25%，或 IPO 前出现重大安全事件或监管 enforcement action 带来
              headline risk，建议将下调为持有。估值立场：当前水平偏高，但鉴于增长画像并不非理性。2027-2028 IPO scenario 下的目标回报： base case 从当前 entry 起
              20-40%，客户基础的 strategic value 提供一定 downside protection。
            claimRefs:
              - CV019
              - CV022
