      - number: '5.2'
        title: 产品模块、SKU 与平台能力
        blocks:
          - type: paragraph
            body: >-
              到 2026，Notion 的产品套件包括八个独立模块。每个模块都瞄准一个具体的知识工作场景，同时共用底层 workspace 数据模型和权限层。Notion Docs 提供协作式长文档编辑，带 AI
              写作辅助、行内评论和版本历史。Notion Wikis 提供结构化知识库， 支持嵌套页面层级、访问控制和验证工作流，用来浮出权威公司信息。Notion Projects 把任务管理、Kanban
              boards、timeline views （Gantt-style）和 workload views 直接放进 workspace，让项目规划和文档待在同一处，而不是分散在不同工具里。Notion
              Database 支撑平台内所有结构化数据——客户记录、内容日历、sprint backlogs——支持 15 种属性类型、关系链接、rollups、公式和 API 访问。 Notion AI Core（包含在
              Business 及以上计划中）提供 AI 写作辅助、自动摘要、翻译、基于 workspace 内容的 Q&A、会议记录转写， 以及 AI 驱动的数据库查询。Notion Enterprise Search
              让用户通过一个搜索界面检索 Notion 内容和已连接的第三方应用（Google Drive、 Slack、Jira、GitHub、Salesforce）。Notion Sites 让团队把 Notion
              页面发布为带自定义域名和 SEO 控制的公开网站。Notion Calendar 提供智能排期、会议记录集成和团队日历可见性。Notion Mail（截至 2026 仍处 beta）把 Gmail 收件箱管理与
              AI 驱动的邮件动作、 Notion workspace 上下文结合起来。这些模块合在一起，让 Notion 有能力替代包含 Confluence（wiki）、Jira（项目）、Google Drive
              （文档）和 Microsoft Outlook（日历 / 邮件）的多工具栈。
