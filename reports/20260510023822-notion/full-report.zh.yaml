  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Notion 处在 enterprise SaaS 中监管最密集的数据环境之一。作为处理 100 多个国家用户个人数据的全球平台，Notion 受 European Union General Data
              Protection Regulation（GDPR）、California Consumer Privacy Rights Act（CCPA/CPRA），以及不断增长的各国 AI governance
              frameworks 约束。GDPR penalties 可达到全球年收入的 4 percent 或每次违规 20 million euros，两者取高；对 $500M-plus ARR 的公司而言，
              这意味着单次事件最高约 $20M 风险敞口。Notion Privacy Policy 承诺采用 EU Standard Contractual Clauses，并提供 EU data residency；
              但执法风险仍在，因为 EU regulators 已表现出对大型 SaaS 平台开罚的意愿。EU AI Act effective August 2024，并在 2025-2026 分阶段执行，按风险层级划分
              AI systems；执行 workplace tasks 的 autonomous AI agents 可能被归入 high-risk 或 limited-risk systems， 需要
              transparency disclosures 和 human oversight documentation，而 Notion Custom Agents 公开材料尚未完全回应这些要求。2024 Skiff
              acquisition 后，隐私倡导者提出担忧，指出 Notion architecture 不提供用户级端到端加密。Notion Terms of Service 将责任上限封顶在过去 12 months
              已付费用或 $500 两者较低值。HIPAA BAA 可用性为医疗行业提供进入路径，但也带来增量合规义务。截至 May 2026，未发现公开的重大诉讼。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR009
              - CR010
              - CR012
