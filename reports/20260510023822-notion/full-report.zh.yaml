companyProfile:
  summary: >-
    Notion 是一体化 AI 工作空间平台，2013 成立，总部位于 San Francisco。公司把 wiki、文档、数据库、项目管理、日历和 AI 智能体放在同一个协作环境。全球用户超过 100 million，Fortune
    100 渗透率 62%，截至 September 2025 ARR 超过 $500M；Notion 已是知识管理和团队生产力平台的市场领导者，覆盖从初创公司到最大型企业的团队。
  foundedDate: '2013-01-01'
  founders:
    - name: Ivan Zhao
      role: 联合创始人兼 CEO
    - name: Simon Last
      role: 联合创始人
  headquarters: San Francisco, California
  productSummary: >-
    Notion 的核心产品是灵活的 block-based 工作空间，整合 wiki、文档、数据库、项目跟踪和日历。2023 年，公司推出 Notion AI，用于写作辅助和内容生成。2026 年，公司推出 Custom
    Agents——自主 AI 智能体，可在 Notion 及已连接的外部服务中执行多步骤工作流，按 credits 计费。平台支持 1,000+ 个集成，并有活跃的开发者 API 生态。
  customerFocus: >-
    Notion 覆盖从个人知识工作者和初创公司（免费层慷慨）、中端市场团队，到 OpenAI、Figma、Ramp、Toyota、Vercel 等企业账户的广谱客户。GTM 是产品驱动增长：个人先采用
    Notion，再在组织内传播。超过 50% 的 YC 支持初创公司和 62% 的 Fortune 100 公司以某种形式使用 Notion。
  businessModel: >-
    Notion 采用免费增值、按席位计费的 SaaS 模型，分四档：Free、Plus ($10/seat/month)、Business ($15/seat/month) 和 Enterprise（定制）。AI
    功能作为席位订阅之上的附加包提供（每 1,000 credits $10）。Custom Agents 按用量费率消耗 credits。该模型把可预测的席位收入，与随工作流自动化采用而扩张的按用量计费 AI credits
    层结合起来。
  stage: Late Stage Private
  fundingStatus: >-
    Notion 自 2013 以来累计完成约 $330M-$418M 一级风险资本融资；最醒目的轮次是 October 2021 以 $10B valuation 融资 $275M。January 2026，一笔 $270M
    二级要约以 $11B valuation 完成，GIC、Sequoia Capital 和 Index Ventures 买入现有股东股权。2021 年以来未再融资一级资本，说明公司运营上可能已能自给。
  disclosureProfile: private-undisclosed
chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与运营模式
        blocks:
          - type: paragraph
            body: >-
              Notion 是一家 AI-native 工作空间公司，总部在 San Francisco, California，并在 New York、Dublin、Hyderabad、Tokyo、Seoul 和
              Sydney 设有办公室。Tracxn 记录其成立于 2013（部分二级资料给出不同成立日期；缺少公司一手披露，本报告无法消除该冲突）。Notion
              最初是结构化笔记和关联文档工具，之后扩展为全栈生产力与知识管理平台。公司的公开使命是让地球上每个人都能按自身需求定制工具；这种愿景体现在高度灵活的 block-based editor 中。


              截至 May 2026，产品定位为 AI 工作空间：把传统 wiki、项目管理工具和文档编辑器压缩到一个统一连接界面，并由 24/7 AI 智能体增强。Notion 称 98% of the Forbes
              Cloud 100 和 62% of the Fortune 100 已采用，说明其在高增长科技公司和传统企业环境中都有深度渗透。公司采用免费增值 SaaS
              模型，包含分层套餐（Plus、Business、Enterprise）和按用量计费的 AI credit 层，价格为每 1,000 credits $10。Notion
              仍为私营公司，不发布经审计的财务报表；因此关键指标必须从投资者数据库、媒体报道和公司主导的对外沟通中推导，每类来源都有自身验证限制。
