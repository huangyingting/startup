      - number: '4.4'
        title: 财务披露限制与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Notion 作为不发布 audited financial statements 的私营公司，财务尽调环境从根本上受限。所有 revenue figures 都是 media reports 或公司控制的
              tender offer/product communications 中的 disclosures——没有任何数字经 independently audited or verified。公司未提交任何
              prospectus、S-1 或 equivalent document；这些文件本会要求披露 revenue、gross margin、operating expenses、headcount costs 或
              net income。Headcount estimates 本身也有争议：Forbes 列约 1,300 employees，Tracxn 列 5,698——差异 4.4x，对估算 revenue per
              employee、payroll burden 和 operating leverage 都很重要。按 Forbes 来源的 ~1,300 headcount 与 $500M ARR 计算，revenue per
              employee 约 $385,000；这对 enterprise SaaS company 偏高，但与 highly product-led, low-touch sales model 一致。缺少
              audited financials，以下关键 financial metrics 无法从公开来源验证：gross margin percentage、net revenue retention
              rate、customer acquisition cost、average contract value by segment、churn rate、operating income or loss、free
              cash flow、burn rate 和 cash balance。任何围绕 Notion 搭建的 financial model 都必须承认，输入变量来自有限披露下的 estimates or
