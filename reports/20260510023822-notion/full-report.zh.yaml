      - number: '2.4'
        title: 增长驱动、采用约束与仍未关闭的证据缺口
        blocks:
          - type: paragraph
            body: >-
              几个增长驱动具备耐久性。AI 工作空间需求最重要：Notion pricing page 将 AI credits 纳入付费层的原生组件，enterprise page 强调 AI-powered search
              和治理，product-development page 的 94% Forbes AI 50 penetration 表明 AI-first companies
              已是重度用户。模板和伙伴生态效应形成网络侧粘性：template gallery 上 30,000-plus community templates 扩大了已记录用例的覆盖面；覆盖
              technology、solutions 和 security-compliance specialists 的 partner ecosystem，把 Notion 延伸进仅靠 direct sales
              motion 难以服务的企业采购渠道。startup-program funnel 是长尾获客引擎，会在 early-stage companies
              扩张时把它们转化为潜在企业账户。采用约束同样真实。最结构性的约束是 bundled competition：多数 enterprise IT organizations 默认采购 Microsoft 365 和
              Google Workspace 作为文档与协作层，其价格已包含文字处理、email、calendar、video 和 spreadsheet functions，形成很高切换惯性。买方若选择 Notion
              做知识管理，就必须证明在已购 suite 之上再跑第二个协作平台是合理的。AppFlowy 作为 open-source alternative 强调用户控制自身数据，释放出数据主权与自托管压力信号——这是
              Notion 未服务的 segment，在 regulated 或 government markets 中可能变得更重要。Enterprise procurement friction——security
              reviews、SSO configuration、SCIM、data residency requirements——拉长 cycle time，并限制 bottom-up expansion
