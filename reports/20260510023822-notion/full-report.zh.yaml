  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与核心架构
        blocks:
          - type: paragraph
            body: >-
              Notion 是一体化 AI 工作空间平台，用单一基于 block 的数据模型统一六个不同产品类别：wiki 和知识库、协作文档、关系型数据库 (Notion Database)、项目管理 (Notion
              Projects)、跨连接应用的企业搜索，以及自主 AI 智能体 (Custom Agents)。核心架构抽象是 “block”——内容的原子单元（text、image、embed、database row、AI
              action），可嵌套、链接，并同时以多种视图类型渲染。该 block model 让 Notion 页面可作为文档、结构化数据库、项目看板、日历或 AI
              辅助工作流使用，不需要切换独立应用上下文。底层技术基础设施以 Amazon Web Services (AWS) 为主要计算和存储层，Cloudflare 提供 CDN、边缘安全、DDoS mitigation
              和全球分布式边缘交付。Data 按 workspace 组织；每个 workspace 的静态和传输中加密使用 AES-256 和 TLS 1.2+。Notion web application 是基于
              React 的单页应用，并有 native iOS 和 Android 移动应用。自 February 2026 release 起，Notion 还发布 Notion Mail（AI-assisted
              Gmail integration）和增强版 Notion Calendar（meeting and scheduling intelligence），把 workspace
              延伸到沟通和时间管理工作流。Custom Agents（launched February 24, 2026）在 workspace permission model 内运行，可使用 prompt-driven
              instruction set，在 Notion proprietary AI model routing 支持下读取、写入、操作 Notion pages、databases 和 API
              connections。
