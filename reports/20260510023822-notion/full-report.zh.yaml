      - number: '5.5'
        title: 产品差异化、路线图与技术风险
        blocks:
          - type: paragraph
            body: >-
              Notion 的核心差异化主张，是把结构化数据（databases）、非结构化内容（docs / wikis）、项目协同（projects / calendar） 和自主 AI 工作流（Custom
              Agents）统一在一个 block-based 数据模型和权限系统内。这个一体化模型减少了知识工作者的上下文切换， 理论上也让 AI agents
              可以跨完整组织知识图谱推理，而不是困在单个文档孤岛里。Confluence（Atlassian）和 Coda 等竞争者提供了这些功能的某种组合， 但缺少同等级的统一 block 模型和原生 AI agent
              基础设施。Microsoft Loop 提供类似的 block 模型，但嵌在 Microsoft 365 生态内， 且缺少独立 AI agent 层。Notion 截至 2026 的 G2 ratings
              显示其宽度感知很强：knowledge base 第一、AI enterprise search 第一、 AI writing 第一，反映了经用户验证的多品类强度。关键技术风险包括：AI
              基础设施成本和模型依赖（前沿模型成本可能压缩利润率）； Custom Agents 的提示词注入漏洞（Notion 工程团队已披露）；Enterprise Search 跨第三方 connectors
              的数据同步延迟； 潜在 API rate-limiting 影响开发者构建的集成；以及管理多形态产品套件（docs + projects + agents + mail + calendar）的复杂度， 一旦
              feature creep 损害核心可靠性，风险会放大。活跃发布节奏（January 到 May 2026 至少发布六份公开 changelogs）显示工程速度健康，
              但并行产品表面积过宽；如果任一模块达不到企业级质量标准，执行风险就会上升。
            claimRefs:
              - CE026
              - CE027
              - CE028
              - CE029
              - CE030
      - number: '5.6'
        title: 佐证材料
        blocks:
          - type: callout
            title: 统一 block 模型让 AI agents 覆盖完整组织知识图谱
            body: >-
              相比单点方案，Notion 的核心架构优势在于 Custom Agents 可以在所有内容类型（docs、databases、projects、calendars）上运行， 并使用同一个权限模型。竞争性 AI
              工具通常只能访问一种内容类型（例如 Confluence AI 读取 pages，但不读取 project tasks）。 Notion 的统一数据模型让一个 agent 可以在单个工作流里读取 project
              database、合成 status update、更新 wiki page，并发布 Slack message； 这种跨内容自动化，在碎片化工具栈里没有复杂胶水代码就很难做到。这是企业 AI
              采用中最主要的结构性差异点。
