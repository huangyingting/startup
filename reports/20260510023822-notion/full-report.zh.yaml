              - CV010
              - CV020
              - CV021
      - number: '8.6'
        title: 退出准备度与最终尽调要求
        blocks:
          - type: paragraph
            body: >-
              Notion 最可能的退出路径是在 2027-2028 IPO，届时 ARR 为 $700M-$1B；这一规模与可比 enterprise SaaS companies 进入公开市场时相符。 Atlassian
              于 2015 IPO，当时 ARR 约 $450M；monday.com 于 2021 在有利市场条件下 IPO，当时 ARR 约 $300M；Notion 更大的规模和更强品牌位置， 支撑 IPO 前更高的
              ARR bar。战略收购是次要退出路径——Microsoft、Google、Salesforce 或 ServiceNow 可能收购 Notion， 以强化其 enterprise workspace
              position，但大型科技收购的监管审查已经加强。Notion 需要证明的主要 IPO readiness indicators 包括： ARR growth 持续 above 30%，并有两年 audited
              financials；path to profitability 或清晰的 gross margin expansion trajectory； NRR above 120%，作为 enterprise
              retention health 信号；以及适合上市公司的 governance structure（board composition、independent directors、 audit
              committee）。当前 governance 未公开披露。承销前的最终尽调要求包括：FY2024 和 FY2025 audited financials；trailing 8 quarters 按 plan
              tier 拆分的 NRR 和 GRR；cash position 和 burn rate；AI-enabled ARR 及其定义的详细拆分；客户合同条款，包括 MSA structure、 SLA
              commitments 和 renewal rates；board composition 和 investor preference stack；以及 Custom Agents 的 independent
              security audit results。 包含这些项目的 data room 将解决本报告识别出的多数阻塞性尽调缺口。
            claimRefs:
              - CV017
              - CV018
              - CV025
              - CV030
              - CV031
              - CV033
              - CV034
              - CV035
              - CV042
          - type: table
            tableRef: TV006
            claimRefs:
              - CV025
              - CV031
              - CV033
              - CV035
              - CV042
      - number: '8.7'
        title: 佐证材料
        blocks:
          - type: callout
            title: 当前 Secondary 价格买入——中等信心
            body: >-
              Notion 的 $11B valuation 偏高，但考虑到 AI-enabled growth acceleration，仍可辩护。$13B 的 probability-weighted expected
              value 意味着 base case 下相对 entry 有 18% upside。如果 data room access 确认 NRR above 120% 且 gross margin above 75%，
              conviction 将上调至高。
            calloutType: recommendation
            claimRefs:
              - CV028
              - CV023
          - type: callout
            title: NRR 是最重要的未披露指标
            body: >-
              Net Revenue Retention 是决定 $11B valuation 是否合理的单一最关键指标。NRR above 130% 将确认 bull case；below 110% 将推翻 base
              case。没有任何 public proxy 可用于 Notion NRR。这是承销前的阻塞性尽调事项。
            calloutType: risk
            claimRefs:
              - CV035
          - type: callout
            title: AI 变现真实存在，不是投机假设
            body: >-
              不同于 2025-2026 年许多 AI 平台投资——AI 收入仍停留在愿景层面，Notion 到 2025 年底 AI 相关 ARR 占比超过 50%，证明 AI 功能今天已经在带来可观的增量收入。Q1
              2026 Custom Agents 上线后创建的智能体超过 1M 个，进一步证明采用速度。
            calloutType: strength
            claimRefs:
              - CV003
              - CV004
          - type: callout
            title: 基准情景假设 ARR 增长 30% 可持续至 2027 年
            body: >-
              IPO 时 $12-15B 的基准情景估值，要求 2026-2027 年 ARR 同比增速持续在 30%。鉴于 2025 年观察到 AI 加速，这一假设可信，但尚未得到确认。任何指引或实际数据若显示增长低于
              25%，都需要立即下调基准情景。
            calloutType: assumption
            claimRefs:
              - CV023
              - CV032
