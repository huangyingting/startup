      - number: '7.5'
        title: 缓释措施与投资论点破裂触发项
        blocks:
          - type: paragraph
            body: >-
              Notion 的风险缓释画像，在公司已经投入安全认证和文档的领域最强：通过 SOC 2 Type 2、ISO suite 和 HIPAA BAA 建立合规姿态； 通过 multi-region AWS 和
              Cloudflare 提升基础设施韧性；通过覆盖 prompt injection guardrails、shared responsibility model 和 agent permissions
              framework 的 AI safety documentation 管理 AI 风险。应按季度监控的投资论点破裂触发项包括：第一，Notion AI 遭遇重大 GDPR 或 EU AI Act
              enforcement action，罚款超过 $10M，表明监管者认为平台不合规；第二，ARR growth deceleration 连续两个季度低于 20 percent year-over-year，说明
              AI-enabled customer surge 未能维持增长；第三，OpenAI 或 Ramp 等两个或更多具名企业 anchor customers 在 6-month 窗口内公开流失；第四，Custom
              Agents 发生重大安全事件，在企业客户处造成 data exfiltration 或 destructive automation 并公开披露； 第五，Microsoft 或 Google
              宣布把能力等同的免费 native AI agents 捆绑进现有企业协议。监控指标包括 G2 和 Capterra ratings trajectory、 HackerOne vulnerability
              disclosure volume、EU DPA 对 AI workspace tools 的 guidance，以及公开报道的客户 wins 或 losses。 年度尽调更新应索取 audited
              financials、NRR、GRR 和 cohort retention data。
