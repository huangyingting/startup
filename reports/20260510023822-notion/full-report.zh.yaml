      - number: '6.4'
        title: 客户留存、满意度与负面信号
        blocks:
          - type: paragraph
            body: >-
              公开来源无法评估 Notion 的客户留存画像，因为公司不披露 net revenue retention（NRR）、gross revenue retention（GRR）、 churn rate 或
              customer cohort data。留存健康度的主要代理指标是 AI-enabled ARR 扩张信号：AI-enabled 客户在十二个月内从约 20–25% 增至超过 50% of
              ARR，意味着现有客户基础内 expansion revenue 很强，并与 NRR above 100% 一致。不过，这一推断没有经审计数据确认。 G2 reviews 提供了量化满意度信号：Notion 在
              G2 平台上的 ease of use score 为 86%、ease of admin score 为 90%、 “meets requirements” score 为 91%，相对 workspace
              tool benchmarks 表现强。评论平台上的负面信号包括：反复出现的定价复杂性抱怨 （credit model 不透明）、数千页面的大 workspace 中性能问题，以及移动 app
              离线功能有限。February 2024 收购并关闭隐私导向平台 Skiff， 引发负面媒体报道（TechRadar）和依赖 Skiff 端到端加密用户的社区反弹。虽然该事件没有明显压制 Notion 的 ARR
              增长轨迹， 但它在重视隐私的企业买家群体中留下长期声誉风险，尤其是法律、医疗和政府行业。Capterra 和 TrustRadius 评论者经常提到 Notion free plan 限制，以及构建大型组织
              wiki 的复杂度；在 setup support 有限的 SMB segment，这可能推高 churn。上述负面信号均未被公开数据量化。
            claimRefs:
              - CU021
              - CU022
              - CU023
              - CU024
              - CU025
              - CU026
