              公开可得的最强财务信号，是 Notion 自己披露 AI-enabled customers 在 year-end 2025 贡献超过 50% of ARR——较 prior year 约 20–25% more
              than doubled。这意味着 Notion 正以加速速度，把 free user base 转化为 paid AI-enabled relationships；这是 future ARR growth 和
              multiple expansion 最重要的 leading indicator。若趋势延续，随着 Custom Agents credit layer 增加 incremental usage-based
              revenue stream，2026 年 ARR growth 可能超过 30% YoY。
