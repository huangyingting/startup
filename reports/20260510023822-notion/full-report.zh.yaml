      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: >-
              Notion 的安全姿态处于 productivity software 类别前列。公司持有 SOC 2 Type 2、ISO 27001、ISO 27701 Privacy Information
              Management、 ISO 27017 Cloud Security、ISO 27018 Cloud Privacy、HIPAA BAA、BSI C5，以及 GDPR/CCPA compliance
              certifications。 基础设施运行在多区域 Amazon Web Services 上，由 Cloudflare 提供 CDN 和 DDoS mitigation。99.9 percent uptime
              SLA 背后还有 HackerOne bug bounty program，提供独立漏洞披露渠道。但运营风险并未消除。Notion status page 记录了历史 incidents， January
              2026 release cycle 引入的平台变化可能造成过临时服务降级。最重要的新兴运营风险是 Custom Agents platform：autonomous agents 可以使用
              OAuth-granted permissions 在第三方系统中执行动作，攻击面比传统文档编辑工作流更宽。Notion 明确承认 prompt injection 是已知漏洞类别， 并提供
              permissions scoping、version control 和 audit logs 等 guardrails。即便有已记录的缓解措施，prompt injection attack
              在连接系统中造成非预期 data exfiltration 或 destructive actions 的残余风险仍不可忽视。Shared Responsibilities Model 页面记录了
              Notion-managed controls 与 customer-managed controls 的边界。启用 zero data retention 的企业客户获得额外保护，但 ZDR adoption
              未披露。Custom Agents 没有公开的独立 red-team audit results。
            claimRefs:
