      - number: '3.4'
        title: 定价格局与竞争市场定位
        blocks:
          - type: paragraph
            body: >-
              Notion 的 pricing ladder 包括适合个人使用的 free tier、annually billed 每 member 每月 $10 的 Plus、每 member 每月 $15 且包含 AI
              features and SSO 的 Business，以及 custom pricing 的 Enterprise（含 dedicated customer success management、SCIM
              provisioning、audit logging、zero data retention with LLM providers）。Custom Agents 作为按用量计费的 credits 附加包提供给
              Business 和 Enterprise plans，价格为每月 1,000 credits $10；此前 free beta 持续到 May 3, 2026。相较之下，Atlassian Confluence
              Standard 每 user 每月约 $5.75，Confluence Premium 每 user 每月约 $11——纸面上 Notion Business plan 略高于 Confluence
              Premium，尽管 Notion 在 Business tier 中打包 AI Core features。Monday.com Business plan 按 annual billing 每 seat 每月
              $24，显著高于 Notion 同等 tier。ClickUp Business plan 价格约为每 member 每月 $12。Coda Teams plan 采用 document-maker-only
              model，对 document maker 每月收费 $30，viewers 免费，结构上不同于 Notion per-seat pricing。Nuclino 和 Slite 以每 user 每月 $6–$8
              提供更轻量的 team wiki tools，在 segment 低端竞争。Notion $10/$15 的 per-seat base pricing 对 mid-market buyers
              位置较好，credit-based AI layer 提供 upsell mechanism，可能随 agent adoption 增长扩大 average revenue per user。主要定价脆弱点仍是
              Microsoft 365 和 Google Workspace bundling：enterprise buyers 已为 M365 E3/E5 每 user 每月支付 $22–$38，会把补充 wiki
              支出视为 incremental budget，必须相对 built-in equivalents 证明自身合理——这是 Notion migration tooling 和 G2 differentiation
