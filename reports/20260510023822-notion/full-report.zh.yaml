      - number: '6.6'
        title: 佐证材料
        blocks:
          - type: callout
            title: Fortune 100 渗透率 62%，且未披露企业销售队伍规模
            body: >-
              最醒目的客户牵引信号，是 Notion 在未披露显著规模企业销售组织的情况下（headcount estimates range from 1,300 to 5,698）， 已渗透 62% 的 Fortune
              100。这意味着相当一部分 Fortune 100 渗透是通过 PLG 有机实现：个人和团队采用 Notion，最终触发企业采购。 这是产品病毒性和企业级可靠性的强信号；如果 Notion 不能满足
              Fortune 100 IT 和安全团队的合规要求（SOC 2、ISO 27001、SAML SSO、 SCIM、audit logs），这些团队不会批准使用。
            calloutType: strength
            claimRefs:
              - CU003
              - CU004
              - CU005
          - type: callout
            title: 关键留存指标完全未解——NRR、Churn、GRR 均未披露
            body: >-
              Notion 不披露 net revenue retention（NRR）、gross revenue retention（GRR）、churn rate 或 customer cohort survival
              curves。 AI-enabled ARR 扩张信号与 NRR above 100% 一致，但这一推断没有得到确认。如果 Notion 的 SMB cohort 高 churn 被企业扩张抵消，
              净留存数字可能低于其 AI 动能暗示的水平。任何基于 Notion 的投资模型都必须对留存设置宽不确定性区间，因为长期 ARR 价值最关键的驱动项——客户耐久性—— 无法从公开来源验证，必须从
              management data room 获取。
            calloutType: risk
            claimRefs:
              - CU021
              - CU025
              - CU026
          - type: callout
            title: Ramp 与 Remote 是企业 AI ROI 证明点——证据质量最高
            body: >-
              在 Notion 九个公开具名企业客户中，只有 Ramp（300 个 agents、实质性成本节省）和 Remote（每周节省 20 hours）有量化 Custom Agents 结果，且可具体归因于
              Notion。这两个数据点是目前 Notion AI platform 可获得的最高质量企业 ROI 证据。投资者应在验证 AI 采用论点时提高这些案例权重， 并把它们作为 reference call
              targets：直接与部署 agents 的 Ramp 或 Remote operations leads 交流，将提供 audited financial data room 之外最可信的 AI 价值评估。
            calloutType: insight
            claimRefs:
