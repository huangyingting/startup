      - number: '6.2'
        title: 采用轨迹与增长信号
        blocks:
          - type: paragraph
            body: >-
              Notion 的用户增长经历了三个阶段。第一阶段（2016–2019）靠 power users 和 early adopters 的口碑自举，最终在 2019
              出现一个重要病毒式时刻：公司在单个里程碑公告中披露首个 100 万用户。第二阶段（2020–2022）由疫情推动加速；远程办公普及创造了对灵活、 cloud-native workspace tools
              的需求，把用户基础从约 100 万拉到数千万，并支撑了 September 2021 的 $10 billion Series D。 第三阶段（2023–2026）以 AI 驱动扩张为特征：Notion AI 于
              February 2023 推出，Custom Agents 于 February 2026 推出， 截至 year-end 2025 的十二个月内，AI-enabled 客户占 ARR 的比例从约 20–25%
              翻倍至超过 50%。从文档工具转向 AI workspace， 推动 ARR 增长加速，却没有要求人头按比例扩张；CNBC 在 September 2025 报道 Notion 突破 $500 million
              ARR，暗示人均收入相当可观。 平台的 1.4 million 社区成员和集成者，是未来企业采用的先行指标；社区构建的 templates、integrations 和 use-case
              documentation 会降低企业 onboarding 门槛。Notion 在 Custom Agents 发布时同步宣布注册用户超过 100 million，说明公司会策略性使用用户里程碑，
              向企业买家和媒体传递动能。
