      - number: '8.5'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: >-
              Notion 最合适的 public market comparables，是具备实质 AI capabilities 和强 PLG motion 的 enterprise collaboration 与
              productivity SaaS companies。Atlassian（TEAM）是最接近的战略可比公司——一个多产品 enterprise collaboration platform，FY2025
              revenue 约 $4.8B， market cap 约 $40-50B，隐含 8-10x trailing ARR multiple。monday.com（MNDY）FY2025 revenue 超过
              $1B，market cap 约 $11-13B， 隐含 11-13x ARR multiple，是 Notion 最接近的 multiple-to-scale reference。Asana（ASAN）因单一
              project management 产品焦点而可比性较弱， 但提供了较低规模 PLG SaaS 的数据点。Smartsheet 估值倍数更低，反映其更 legacy 的 enterprise
              positioning。Notion 22x implied ARR multiple 相对 monday.com 有 70-100% premium，相对 Atlassian 有 150-175%
              premium。该 premium 部分可由 Notion 更快的 ARR growth rate （2025 估计 40-50% YoY，而 monday.com 为 30%、Atlassian 为
              25%）、更强的 AI monetization mix（50%+ AI ARR，同行仍在 emerging）， 以及 private company illiquidity discount
              被吸收到价格中而非额外叠加来解释。不过，这一 premium 需要持续超额表现才能成立——任何 ARR growth 放缓都会把 multiple 压向 peer group，即便 revenue 仍在增长，绝对
              dollar level 的估值也会受损。2021 bubble period 的历史 SaaS 估值数据显示，Notion 当前倍数相对 comparable companies 峰值 40-80x ARR
              并不夸张，说明当前环境反映了更理性的定价机制。
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV015
              - CV020
              - CV021
              - CV026
              - CV027
              - CV037
