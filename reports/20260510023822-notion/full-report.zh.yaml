  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层与基础盘概览
        blocks:
          - type: paragraph
            body: >-
              Notion 的客户基础覆盖很宽：从使用 free plan 的个人知识工作者和学生，到使用 Plus 和 Business plans 的 mid-market teams， 再到签署 custom
              Enterprise agreements 的全球企业组织。超过 100 million 的注册用户代表 Notion 的总可触达社区，但绝大多数处在免费层， 并不直接贡献
              ARR。付费客户分为四个计划层级：Free（零收入）、Plus（$10/seat/month，面向个人和小团队）、Business （$15/seat/month，面向需要 AI Core 和 SSO
              的成长型团队）和 Enterprise（custom pricing，面向有治理要求的大型组织）。 地理上，Notion 北美基础强（总部在 San Francisco，最大办公室在 New York），APAC
              存在感正在上升，January 2026 tender offer 特别提到在 Singapore、Tokyo、Seoul 和 Sydney 开设办公室；欧洲客户则受 GDPR compliance
              要求约束。按行业看，Notion 客户案例证据偏向技术公司
              （OpenAI、Figma、Vercel、Cursor、Ramp）、金融服务（Ramp、Deel）、汽车（Toyota）和专业服务；但平台横向属性意味着它几乎已经以某种规模进入各个行业。 Fortune 100
              渗透率达到 62%，对一家未披露企业销售 headcount 的公司而言很突出，说明仅靠 PLG 模式，Notion 在正式销售辅助扩张前就已拿下相当多企业入口。 超过 50% 的 Y Combinator
              portfolio companies 使用 Notion，反映其在创业生态中扎得很深；当 YC companies 扩张时，这会喂给 Notion 未来企业买家的管线。
