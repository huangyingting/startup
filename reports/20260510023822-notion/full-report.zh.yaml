            title: 无经审计财务——阻塞型尽调缺口
            body: >-
              Notion 未发布 audited financial statements，作为私营公司也没有义务发布。本章引用的所有 financial metrics——ARR、growth
              rate、AI-enabled customer mix——要么是公司在 blog posts 中控制的 disclosures，要么是单一来源的 media estimates。任何投资决策在 closing
              前，都必须以从 Notion management data room 取得 audited financials、gross margin data、net revenue retention 和 churn
