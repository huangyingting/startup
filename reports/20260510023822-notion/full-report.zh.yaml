      - number: '2.2'
        title: 规模测算视角——上市公司锚点、渗透信号与分析师估算的限制
        blocks:
          - type: paragraph
            body: >-
              因为 Notion 是私营公司且不披露 revenue，用公开来源构建 Notion-specific TAM、SAM 或
              SOM，只能借助间接视角，而不是已验证数字。最稳妥的锚是直接相邻上市公司的合计公开收入。Atlassian FY2025 total revenue 约 $4.8 billion；monday.com
              FY2024 revenue 约 $966 million；Smartsheet FY2025 revenue 约 $1.1 billion；Asana FY2025 revenue 约 $724
              million。这四家公司单独就代表超过 $7.5 billion 年收入，来自与 Notion 交付内容高度重叠的工具。这个数字是下限，不是上限：它排除了
              Coda、ClickUp、Airtable、Nuclino、Slite、Obsidian、Fibery，以及更广的 Google Workspace 和 Microsoft 365 文档工作流支出，而这些也是
              Notion 竞争的支出。第二个视角是渗透率统计。Notion product page 引用 100 million-plus users 的说法，enterprise page 给出 98% Forbes
              Cloud 100 和 62% Fortune 100 penetration figures。这些统计说明，即使转化率、席位深度和实际合同规模仍是私有信息，Notion 已经触达大多数最高 ACV
              企业账户。第三个视角是市场研究：MarketsandMarkets 发布 collaborative office productivity tools market 数据，可作为相邻规模锚点，但无法干净映射到
              Notion 的准确范围。实际结论是，纳入所有替代品后，相邻总市场几乎肯定超过 $15 billion 年度软件支出；但公开来源无法分离出干净的 Notion-specific SAM，没有
              revenue、seat count 或 ACV data，任何 SOM estimate 都是推测性的。
