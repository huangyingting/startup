    type: flow
    layout: standard
    summary: Notion 的产品、资本、客户、合规与代理式层如何相互连接，拼出当前业务系统。
    data:
      nodes:
        - id: founders
          label: 创始团队
          detail: Ivan Zhao 和 Simon Last；产品哲学驱动的领导力，同时存在集中的关键人物风险。
          tone: neutral
        - id: platform
          label: AI 工作空间平台
          detail: 基于 block 的编辑器 + wiki + 项目管理 + AI Agent 汇入同一个界面。
          tone: positive
        - id: enterprise
          label: 企业客户
          detail: 62% Fortune 100 / 98% Forbes Cloud 100；基于用量的 AI credits 叠加在 SaaS 订阅之上。
          tone: positive
