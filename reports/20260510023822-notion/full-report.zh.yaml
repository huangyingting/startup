      - number: '7.6'
        title: 佐证材料
        blocks:
          - type: callout
            title: EU AI Act 合规缺口
            body: >-
              Notion Custom Agents platform 可能落入 EU AI Act 对与用户交互或处理敏感数据 AI systems 的 limited-risk 或 high-risk
              classification。 截至 May 2026，Notion 尚未发布 EU AI Act compliance roadmap 或 conformity assessment。对
              EU-regulated industries（金融、医疗、 public sector）的企业客户而言，这一缺口可能延迟或阻断 procurement approval，成为 EMEA 扩张的实质销售阻塞风险。
            calloutType: risk
            claimRefs:
              - CR010
          - type: callout
            title: 提示词注入是头号运营风险
            body: >-
              Notion 明确承认 prompt injection 是 Custom Agents architecture 中的风险。不同于传统 SaaS 漏洞，prompt injection attacks 可能让
              agents 执行非预期动作，包括 data deletion、unauthorized sharing 或 external API calls，且不触发常规安全警报。guardrails
              之后的残余风险仍高，因为没有独立 red-team audit results 发布，且每增加一个新的 agent connector，攻击面都会扩大。
            calloutType: risk
            claimRefs:
              - CR019
              - CR041
          - type: callout
            title: Secondary Tender 不补充现金
            body: >-
              January 2026 的 $270M tender offer 是 secondary transaction，GIC、Sequoia 和 Index Ventures 从现有 shareholders
              手中购股， 而不是从 Notion 本身购股。Notion 资产负债表没有收到这笔 proceeds。在看不到 primary capital raised、burn rate 或 cash position
              的情况下， 仅靠公开信息无法评估公司融资风险和 runway。这是阻塞性尽调缺口。
            calloutType: insight
            claimRefs:
              - CR027
          - type: callout
            title: 五项优先尽调请求
            body: >-
              任何投资交割前：第一，索取 Custom Agents 的 EU AI Act readiness assessment 和 compliance roadmap；第二，trailing four
              quarters 的 NRR 和 GRR；第三，cash position、burn rate，以及与 secondary tender proceeds 区分开的 primary capital
              history；第四，Custom Agents platform 的独立 red-team 或 penetration test results；第五，客户合同条款，包括 enterprise master
              service agreements 中的 SLA commitments 和 liability cap treatment。
            calloutType: recommendation
            claimRefs:
              - CR027
              - CR030
              - CR039
