            title: Custom Agents 提示词注入风险——Notion 工程团队已披露
            body: >-
              Notion 工程博客明确承认 Custom Agents 存在提示词注入风险：Notion 页面或已连接数据源里的恶意内容可能劫持 agent 动作。虽然 Notion 已落地
              guardrails（权限范围控制、执行沙盒、版本控制、audit logs），agentic AI systems 的提示词注入仍是活跃研究领域，防御尚未完全解决。
              受监管行业的企业买家（金融、医疗、政府）应在供应商安全审查中明确评估该风险。在更强技术缓解措施得到验证前，Custom Agents 处理的任何数据都应按潜在对抗性数据处理。
