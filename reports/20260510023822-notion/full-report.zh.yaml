      - number: '7.3'
        title: 伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >-
              Notion 的基础设施和产品能力实质依赖一组集中的上游 providers。AWS 是唯一 cloud backbone；虽然 Notion 跨多个 AWS regions 运营， 但 AWS
              全服务中断或涨价会直接影响可用性和成本结构。Cloudflare 提供 CDN 和 DDoS protection，是第二个关键 provider。AWS 和 Cloudflare 依赖集中是 SaaS
              的常态，但不容易分散。最重要的新兴依赖来自第三方 Large Language Model providers，尤其是 OpenAI，以及可能支撑 Notion AI writing、Q&A 和 Custom
              Agents 功能的其他 providers。如果 LLM provider 调整价格、access terms、model performance 或 data retention policies，
              Notion 就需要在短时间内重新谈判合同或重构功能。AI 功能的企业 zero data retention 承诺要求 LLM providers 也以 ZDR mode 运行，增加合同复杂度。 Notion
              Calendar 来自 2021 年 Cron acquisition，Notion Mail 是更新的产品，进一步扩大依赖面。超过 1M developer integrations 的 API
              生态形成了一张外部 counterparties 网络，其可靠性 Notion 无法保证。财务投资者 Sequoia、Index 和 GIC 不是运营伙伴；January 2026 secondary
              tender offer 确认投资者在 $11B valuation level 仍有信心，但没有产生新的运营依赖。
            claimRefs:
              - CR021
              - CR022
