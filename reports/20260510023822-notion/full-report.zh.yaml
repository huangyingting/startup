      - number: '6.3'
        title: 具名客户证明与案例证据
        blocks:
          - type: paragraph
            body: >-
              Notion 维护一个公开客户案例库，包含具名企业 references，展示多个行业的生产级部署。质量最高的客户证据来自 Ramp：这家金融科技公司部署了超过 300 个活跃 Notion Custom
              Agents，用于财务运营工作流，包括 accounts payable automation、budget tracking 和 spend analytics，并自报生产率提升。 OpenAI
              作为全球最突出的 AI 公司，把 Notion 用作集中式公司知识库；COO Brad Lightcap 提到一种「campsite principle」， 即每个 Notion page
              离开时都比接手时更好，工程团队通过 Notion AI 在 data science reporting 上每周约节省 1 小时。Figma 是全球企业设计师使用的设计协作平台，用 Notion
              管理团队知识和产品文档。Toyota 作为全球最大汽车制造商之一，是具名 Notion enterprise customer； 这验证了 Notion 赢下传统行业 Fortune 500
              账户的能力，而不只是技术原生公司。其他具名客户包括 Vercel（cloud deployment platform）、 Cursor（AI code editor）、Clay（B2B data
              enrichment platform）和 Deel（global HR and payroll）。Remote 这家全球 HR 平台部署了一个 Custom Agent，在特定运营工作流中每周节省 20
              小时手工工作。整体看，这些具名 references 覆盖三个行业（技术、金融服务、汽车 / 制造）， 既包括 product-led growth 入口（个人团队采用 Notion），也包括 top-down
              enterprise agreements（Toyota 组织级采用）。相对 Notion 私营公司身份，具名客户证据的宽度和质量都很强；但缺少量化 deal sizes、contract lengths 或
              renewal rates，限制了基于公开来源分析 churn 和 expansion 的深度。
