      席位），再到 AI 启用客户占比（>50% ARR），再到 Custom Agents 企业部署（1M+ 个 Agents， 其中 Ramp 这类企业账户拥有 300+ 个），转化逐层明显收窄。客户越深地嵌入 Notion AI
      生态， 每一层都代表收入质量的实质提升。
