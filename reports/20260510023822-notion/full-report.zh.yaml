  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界——纳入支出、排除支出与现状替代品
        blocks:
          - type: paragraph
            body: >-
              Notion 自己的产品表述，比任何分析师品类标签都更精确地界定市场。产品页描述了一个结合 wiki、docs 和 projects 的连接式工作空间；enterprise page 强调 AI-powered
              search、治理控制和知识整合；product-development page 将 Notion 定位为 AI 工作空间平台，并称 94% of Forbes AI 50 companies
              使用。合在一起，这些框架把纳入支出放在至少四个重叠类别：（a）团队 wiki
              和知识库软件——存放政策、runbooks、文档和组织记忆；（b）协作文档编辑——长文档、会议纪要、提案和项目简报；（c）项目与工作管理——任务、路线图、数据库和轻量问题跟踪；（d）AI 工作空间——AI
              辅助起草、语义搜索、知识综合和面向智能体的数据结构。排除支出规模也大且重要：CRM、email、视频会议、企业资源规划、薪酬和安全监控软件，都不是 Notion
              解决的支出。大体上，凡主要交付物是结构化交易数据、财务记录或实时通信的工具，都在边界之外。Notion 最常替代的现状组合是 Google Docs + Sheets + Drive、Microsoft Word
              + SharePoint + Teams、Confluence + Jira，以及分散的 Slack 消息 + 电子表格。这些替代品没有一个会灾难性失败；它们会逐渐退化成碎片化和搜索失败，而这正是 Notion
              marketing 瞄准的痛点。
