      - number: '1.2'
        title: 创始人、领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Notion 由 Ivan Zhao (CEO) 和 Simon Last 联合创立。Tracxn 将二者均列为联合创始人；Zhao 通过产品发布和投资者沟通，是公司主要的外部面孔。Forbes 在公司
              profile 中确认 Zhao 的 CEO 角色。除联合创始人外，本章审阅的任何来源均未公开 Notion
              的完整高管团队构成、董事会、独立董事代表或正式治理结构。这是治理尽调的重大信息缺口：仅凭公开材料，投资者无法评估董事会独立性、投资人席位分配或关键人物继任安排。


              Tracxn 将公司成立时间置于 2013，本报告将其作为参考年份，因为这是可用一手数据库来源中最具体的来源。根据 Tracxn，Series D 于 September 28, 2021 关闭，将隐含估值推至
              $10–11 billion。本章审阅的公开来源集中，未发现重大领导层离职、治理争议或监管制裁。Ivan Zhao 的关键人物集中风险是后续章节需要独立核查的尽调项——他的产品哲学和公众形象与 Notion
              品牌高度绑定；考虑到公司转向 agentic AI，除创始二人外，还需要可信的技术领导层。
