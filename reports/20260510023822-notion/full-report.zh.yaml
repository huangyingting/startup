  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Notion 横跨至少四个重叠产品类别竞争：团队 wiki 和知识管理、协作文档编辑、轻量项目和任务管理、AI
              增强工作空间基础设施。这种多品类定位带来异常宽的竞争面——没有单一竞争者能在四类中同时以相近深度或规模运营。主要直接竞争者包括 Atlassian Confluence（背靠 Atlassian FY2025
              total revenues 约 $4.8 billion，并与 Jira 及更广 Atlassian suite 深度集成）、Coda（database-driven collaborative
              document platform）、ClickUp（一体化项目管理和 wiki 工具）、Airtable（database-first collaboration platform），以及
              monday.com（工作管理平台，FY2025 revenues 超过 $1 billion）。相邻威胁包括绑定进 Microsoft 365 enterprise suites 的 Microsoft
              Loop、绑定进 Google Workspace 的 Google Docs 和 Sites，以及 Nuclino、Slite、Obsidian、Fibery 和完全 open-source 的
              AppFlowy 等更聚焦工具的增长集群。Evernote 在面向消费者的 note-taking segment 竞争，但相对 Notion 的 GTM 重心，enterprise relevance
              有限。Notion 在该领域最强的结构性优势，是连续三年保持 #1 G2 knowledge base ranking、100 million-plus registered users，以及 62% of
              the Fortune 100 和 98% of the Forbes Cloud 100 的 penetration figures——这些统计表明它在 enterprise 和 high-growth
              technology segments 都有广泛 market presence。不过，多品类策略也意味着 Notion 必须在每个 specialist competitor 的主场竞争，带来 informed
              users 和 review platforms 已指出的深度与性能取舍。
