  - id: FU001
    title: Notion 客户旅程地图 — 从免费用户到企业 AI 客户
    type: journey-map
    summary: >-
      客户旅程地图追踪 Notion 典型企业采用路径：从最初发现免费层，经团队扩张，到企业授权和 AI Agent 部署。 该旅程展示 Notion 的自下而上 PLG
      模型，并叠加自上而下的企业扩张。关键阶段包括：个人发现（免费层）、 团队协作（Plus 计划）、组织采用（带 AI Core 的 Business 计划）、企业治理（带 SSO/SCIM/audit 的 Enterprise
      计划）和 AI 扩张（Custom Agents credit 消耗）。每个阶段，Notion 产品都提供增量价值， 让升级决策摩擦较低。
    data:
      items:
        - label: 发现（免费层）
          description: 个人用户通过社区、推荐或搜索发现 Notion。采用免费计划，用于个人笔记、任务或作品集。
        - label: 团队邀请（免费到 Plus）
          description: 用户邀请队友；团队超出免费计划限制。升级到 Plus（$10/seat/mo），获得无限协作 blocks 和页面历史。
        - label: 组织采用（Business 计划）
          description: IT 或运营团队将 Notion 标准化到所有团队。升级到 Business（$15/seat/mo），获得 SSO、AI Core、 私有 teamspaces、Enterprise Search。
        - label: 企业治理（Enterprise 计划）
          description: CISO/IT 要求 SCIM 配置、审计日志和合规。签署定制 Enterprise 协议，覆盖零数据留存和定制 SLA。
        - label: AI 扩张（Custom Agents）
          description: 运营或工程团队部署 Custom Agents 做工作流自动化。Credit 消耗独立于人数增长。 Ramp 示例：300 个 Agent。
    claimRefs:
      - CU001
      - CU004
      - CU007
      - CU027
      - CU028
  - id: FU002
