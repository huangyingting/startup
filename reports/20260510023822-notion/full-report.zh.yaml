      - number: '2.3'
        title: 买方、用户与付款方分层——谁付费、谁使用、采用如何开始
        blocks:
          - type: paragraph
            body: >-
              Notion 买方图谱至少覆盖四个不同 segment，各自有不同的经济买方、用户、付款方和采用触发点。个人与 prosumer
              segment——students、freelancers、researchers、solo creators——买方和付款方是同一个人，用个人信用卡使用 free 或 Plus tier。该 segment
              推动漏斗顶部规模，但对 enterprise ACV 贡献很小。startup 与 early-scale company segment 中，采用通常从小型 engineering 或 product team
              开始，用 Notion 做 company wiki，再自然扩展到各职能。经济触发点是 Confluence complexity 的痛感，或缺少 company knowledge layer。付款方通常是
              founder 或早期 CTO，预算非正式且低。mid-market segment 的采用更正式：IT 或 operations leaders 批准 Notion 作为 official knowledge
              platform，各部门拥有 wikis，预算进入集中软件预算。具名客户故事支持这一点：Ramp 用 Notion 运行财务和运营工作流；Vercel 把它作为 engineering knowledge
              base；Deel 在平台上管理全球 HR 运营文档。enterprise segment 中，经济买方转向 procurement、IT 或 knowledge-management platform
              owners；决策涉及 security review、SSO、SCIM provisioning 和合规控制；合同通常是 annual 或 multi-year。Toyota 和 OpenAI
              作为具名客户显示，enterprise segment 同时覆盖非科技 verticals 和 AI-first companies。Enterprise page 强调 CISO-ready
              controls、audit logging 和 enterprise search，也印证企业买方在部署前需要治理。第五个 segment——Cursor 这类 AI-first product
              teams——把 Notion 用作 agents 和 AI-assisted workflows 的结构化上下文，而不只是文档仓库；这增加了一个与 AI toolchain investments
              绑定的新采用触发点。
