      - number: '5.3'
        title: Custom Agents、AI 架构与开发者生态
        blocks:
          - type: paragraph
            body: >-
              February 24, 2026 推出的 Notion Custom Agents，是 Notion 历史上最重要的产品演进。Custom Agents 是可配置的自主 AI 工作流，可以读写 Notion
              数据库、查询已连接应用、执行多步推理链，并按计划或事件触发产出结构化结果；这一切都在 Notion workspace 权限模型内完成。截至 May 3, 2026 的两个月 beta 期内，企业团队创建了
              21,000 个 agents。发布时，Notion 称累计创建的 agents 已超过 100 万个。Ramp 的部署展示了真实规模：300 个活跃 Custom Agents
              处理财务运营工作流，包括特定任务上自报成本下降 70%， 以及 Remote 凭一个自动化 workflow agent 每周节省 20 小时。Custom Agents 使用 Notion 内部 AI
              模型路由层，会按任务类型、 成本和延迟要求把任务分发给前沿模型（合作方未完全披露）。Notion 在工程博客中明确承认提示词注入风险，缓解措施包括权限范围控制、 版本控制、使用分析和沙盒执行环境。平台的 AI
              安全控制记录在 Notion 的 shared responsibilities model、AI security practices 帮助页面，以及专门的 prompt injection risk
              guide 中。支撑产品的开发者生态已经相当厚实：官方 Notion REST API 覆盖 blocks、 pages、databases 和 users 的完整 CRUD 操作；官方 SDK 覆盖
              JavaScript/TypeScript、Python 和 Ruby；notion-sdk-js package 在 GitHub 上有超过 12,000 stars；npm package
              每周下载量也很可观。到 2026，Notion 拥有超过 1.4 million 名社区集成者。 developer API changelog 显示更新持续推进，包括新增 webhook 支持、改进
              search APIs、扩展 block type 覆盖。
