      - number: '4.2'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >-
              Notion 的融资历史以一笔记录充分的后期一级融资轮为主，同时主要投资者数据库对累计融资额存在重大冲突。根据 Tracxn，Series D 于 September 28, 2021 关闭；按当时
              TechCrunch 和 CNBC 报道，该轮以 $10 billion post-money valuation 融资 $275 million。本轮由 Sequoia Capital 领投，Index
              Ventures 等参与。Series D 之前，Notion 在 April 2021 以 $2 billion valuation 融资约 $50 million 的 Series C，并在 April
              2020 完成约 $50 million 的 Series B。累计机构融资存在重大争议：Forbes 报 $330 million，Tracxn 报 $418 million——两者存在
              87-million-dollar 差异，公开来源无法解释；可能来自对二级交易、可转债或国际融资轮的不同处理。最近的资本事件是 January 2026 employee tender
              offer，GIC、Sequoia Capital 和 Index Ventures 从现任及前 Notion employees 手中购买约 $270 million in
              shares——该交易不向公司资产负债表注入 new primary capital，但确立当前 $11 billion valuation reference。tender offer structure
              值得注意：它表明现有投资人愿意在 $11B 增加经济敞口；公司优先解决 employee liquidity，而不是走 full secondary 或 IPO process；且公司看起来并非因运营原因需要
              primary capital raise，这与 $500M+ ARR SaaS business 所隐含的 operating leverage 一致。Notion 是否已达到 cash-flow
              breakeven 或 profitability 并未公开披露；此前投资人沟通暗示 Notion 历史上更重视 growth investment 而非 profitability，但 income
              statement 的当前状态仍是关键未解尽调项。
