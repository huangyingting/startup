      - number: '8.3'
        title: 融资与估值背景
        blocks:
          - type: paragraph
            body: >-
              Notion 自 2013 创立以来，在多轮融资中累计获得约 $330M 到 $418M primary capital。最重要的已披露轮次包括 2021 的 $50M Series B， 以及 October
              2021 以 $10B valuation 融资 $275M，参与方包括 Sequoia Capital、Index Ventures 和 Coatue。January 2026 的 $270M tender
              offer 是与 GIC、Sequoia 和 Index Ventures 共同安排的 secondary transaction，它们以 $11B valuation 购买 existing
              shareholder equity； Notion 本身没有收到 proceeds，意味着这次事件不反映 primary balance sheet position。因此，$11B valuation 是
              institutional investors 确认的 secondary market clearing price，而非 primary capital raise。这对 dilution analysis
              很重要：以 $11B 进入的投资者，买入的是一个具体 preference stack、 liquidation waterfall 和 series-specific conversion terms
              均未披露的 capitalization structure。按 $500M ARR 和 $11B valuation 计算， 隐含 ARR multiple 约为 22x trailing ARR。如果
              Notion 到 year-end 2026 以 30% growth 把 ARR 做到 $650M，隐含 forward multiple 约为 17x，相对 public comps 更容易辩护。自 2021
              以来没有 primary capital raises，说明 Notion 可能依靠既有现金储备和 operating cash flow 自给自足，但没有 audited financials
              无法确认。2026-2027 的任何 pre-IPO round 或 primary capital raise，都会是 IPO timing 和 burn management 的重要信号。
            claimRefs:
              - CV001
              - CV012
              - CV013
              - CV014
              - CV008
              - CV009
              - CV025
              - CV033
      - number: '8.4'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: >-
              Notion 的 bull case 假设 Custom Agents 成为标准企业 workflow automation layer，在 seat revenue 之上贡献 AI credits
              revenue， 并在两年内把 ARPU 提高 40-60%。在该情景下，Notion 到 2027 达到 $900M ARR，YoY growth 为 50%，NRR above 130%，IPO 时获得
              20-25x ARR multiple，隐含 $18-22B valuation，相对 $11B entry point 回报 60-100%。base case 假设 2026-2027 维持 30% ARR
              growth， 2026 达到 $650M，2027 达到 $850M。NRR 假设为 115-120%，gross margin 为 75-78%（与 SaaS peers 一致），IPO multiple 为
              $850M ARR 上的 14-18x，隐含 $12-15B valuation 和 20-40% return。bear case 假设由于 Microsoft/Google competitive
              bundling， ARR growth 降至 15% YoY，NRR 跌破 110%，multiple compression 把估值压到 2027 年 $575M ARR 上的 8-12x，隐含 $5-7B
              valuation， 较 entry 亏损 35-55%。三个情景的 probability-weighted expected value（30% bull、50% base、20% bear）隐含约 $13B
              expected valuation， 即相对当前 entry 约 18% upside——对该风险画像而言是中等回报。情景之间的关键杠杆是 ARR growth rate，而它完全取决于 Custom
              Agents adoption velocity 和 NRR trajectory。这些指标必须在 closing 前通过 management data room access 确认。
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV032
              - CV035
              - CV036
              - CV037
              - CV038
