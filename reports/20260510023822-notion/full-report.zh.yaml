  - id: FE002
    title: Custom Agent 工作流 — 从触发到输出的执行流程
    type: flow
    summary: >-
      流程图展示 Notion Custom Agent 如何执行多步自动化任务。流程从触发器（schedule、webhook 或手动激活） 开始，进入 Agent 从 Notion
      数据库和连接应用（Slack、GitHub、Jira）读取上下文， 再由 LLM 推理判断下一步动作，执行写入 Notion 页面或外部 API 的操作，并产出结构化输出 （更新后的数据库行、Slack
      消息或邮件草稿）。安全控制（权限范围、版本控制、审计日志）施加在执行层和写入层。
    data:
      nodes:
        - label: 触发（schedule / webhook / 手动）
          description: Agent 激活方式
        - label: 上下文检索（Notion DB + 连接应用）
          description: 读取 Notion 工作空间和第三方数据源
        - label: LLM 推理链
          description: 多步推理；应用 prompt injection 防护
        - label: 动作执行（写入 Notion / 外部 API）
