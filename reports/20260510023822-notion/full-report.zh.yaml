      - number: '7.4'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >-
              作为私营公司，Notion 不提供 audited financials、SEC filings 或 investor disclosures。所有财务指标，包括 $500M-plus ARR 和 $11B
              valuation， 都来自媒体报道和公司披露的新闻稿，未获独立验证。这给依赖公开尽调的潜在投资者留下结构性信息缺口。NRR 是企业 SaaS 健康度关键指标，但 Notion 未披露。如果 NRR 低于 115
              percent，将说明 Notion 的增长主要来自新客户获取，而非 expansion revenue，长期成本更高。PLG-to-enterprise motion 让 free tier
              的销售周期可见，但企业交易的 conversion economics 不透明。Burn rate 未知；Notion 历史上已融资 $330M-$418M，January 2026 最近的 $270M
              tender offer 是 secondary transaction，意味着 Notion 资产负债表没有收到这笔 proceeds。竞争性定价压力是真实风险，因为 Microsoft Loop 和
              Google Workspace 在既有企业协议内不增加增量成本。AI credits pricing model 为 $10 per 1,000 credits，带来与 agent usage
              绑定的收入上行，但也可能造成价格冲击并压制采用。考虑到 SMB / mid-market 基础，credit concentration risk 较低；但企业交易集中度未知， 无法从公开数据评估。
