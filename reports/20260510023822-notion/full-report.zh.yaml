      - number: '6.5'
        title: 客户扩张、集中度风险与渠道动态
        blocks:
          - type: paragraph
            body: >-
              Notion 的扩张模型是典型 land-and-expand：个人用户或小团队先采用 free tier 或 Plus plan，向组织证明价值，再触发组织层面的 Business 或 Enterprise
              licensing 自上而下采购。AI credit model 在 seat growth 之外增加了第二个扩张杠杆：随着企业账户内 Custom Agent 使用增加， credit consumption
              可独立于 headcount 增长，让未增加净新 seats 的账户也能提升 ARPU。Ramp 单一账户部署 300 个 agents，说明对高自动化企业账户而言， credit revenue
              最终可能超过基础订阅收入。公开来源无法量化客户集中度风险，因为 Notion 不披露 top accounts 的收入贡献。不过， Fortune 100 渗透率 62% 且 mid-market
              存在感广，说明单一客户可能不会超过 ARR 的 5%；对横向平台而言，这是积极的集中度信号。Notion 在 notion.so/partners 页面记录的 partner ecosystem
              包括咨询和实施伙伴，他们协助企业客户完成 Notion 部署和定制，显示服务生态正在成长； 这可能推动间接渠道收入，并通过实施锁定降低 churn。APAC
              地理扩张（日本、韩国数据驻留；Singapore、Tokyo、Seoul、Sydney 办公室） 正由本地 enterprise sales 和 success infrastructure 支撑；GIC
              的合作关系提供区域投资背书，可能加速 APAC 企业采购决策。
            claimRefs:
              - CU027
              - CU028
              - CU029
              - CU030
              - CU031
