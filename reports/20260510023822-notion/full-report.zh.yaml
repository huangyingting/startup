      - number: '1.3'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >-
              Notion 的资本画像由一笔高关注度后期轮，以及两个最可信公共数据库中相互冲突的累计融资额共同定义。Tracxn 记录 Series D 于 September 28, 2021
              关闭，是最近一次已识别的机构轮；Forbes 和 Tracxn 都未列出后续公开轮次，说明公司自 2021 年以来靠 Series D 资金和内生收入增长运营。该轮投后估值被报道为 $10
              billion（Tracxn）或 $11 billion（Forbes）；二者方向一致，可能反映投前 / 投后口径或四舍五入。


              更尖锐的冲突在累计融资额：Forbes 报 $330 million，Tracxn 报 $418 million——差异 27%，仅凭公开来源无法消除，本报告将其视为证据缺口。Forbes 报告月收入 $41.7
              million（隐含 roughly $500 million annualized），但公司未确认该数字，且依赖单一媒体来源。Headcount 同样有争议：Forbes 列 1,300
              employees，Tracxn 列 5,698，差异 4.4×，可能来自不同测量方法、地域口径或是否纳入承包商。公司在 investor update 或监管文件中披露 headcount
              前，两个数字都应低置信度处理。Notion 的股权结构表、二级交易历史以及债务或授信安排均未公开。
