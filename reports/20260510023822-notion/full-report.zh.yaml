      - number: '1.4'
        title: 产品演进与企业牵引力
        blocks:
          - type: paragraph
            body: >-
              Notion 产品经历三个可见阶段：灵活的笔记与 wiki 工具 (2013–2020)、企业知识管理平台 (2021–2024)、AI-agent 工作空间 (2025–present)。Agentic
              phase 是最重要的战略拐点：February 2026，Notion 推出 Custom Agents 的全面可用版本，并披露 beta 期间团队创建了超过 one million agents。到 May
              2026，公司发布了 Custom Agents 管理员控制和 Custom Agent Directory。Custom Agents 采用 usage-credit 模型，价格为每 1,000 credits
              $10；Business 和 Enterprise plans 包含月度共享 credit 配额。Notion AI 底层模型提供商包括 OpenAI 和 Anthropic，Enterprise plans
              获得零数据留存 embeddings。


              客户成效证据来自 Notion 自有案例：Ramp 将生产力工具成本降低 70%，运行 300+ custom agents；Vercel 发版速度提升 35%，每周节省 9 hours；Toyota
              将审批周期缩短 3×；Clay 在一周内部署 80+ agents；Cursor 将工具数量减少 5×，并消除信息孤岛。这些成效由 Notion 自报，应视为公司声称，而非独立验证。企业安全姿态包括 SOC 2
              Type 2、ISO 27001、ISO 27701、ISO 27017 和 ISO 27018 认证，以及 GDPR 和 CCPA 合规、HackerOne bug bounty、SAML、SCIM 和
              audit log 支持。数据驻留覆盖 EU、Japan 和 South Korea。
