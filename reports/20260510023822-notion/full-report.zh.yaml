              year more than doubled。合起来看，AI-driven ARR contribution 暗示从 2024 年约 20–25% of ARR，增长到 end of 2025 超过 50%，说明
              2025 财年的主要增长引擎，是从 free 或 basic plans 向 AI-enabled Business 和 Enterprise tiers 的产品上行销售。Forbes 引用的月收入约 $41.7
              million——隐含 roughly $500M annualized——与 CNBC 数字方向一致，但来自单一未验证来源，不能视为 audited。Notion
              的免费增值模型以免费拉动初始采用，收入主要来自四类：Plus ($10/seat/month) 和 Business ($15/seat/month) plans 的按席位订阅费、custom
              Enterprise contracts、每 1,000 credits $10 的按用量 AI credit 购买，以及 Custom Agents credit consumption；后者在
              two-month free beta 后，于 May 4, 2026 开始计费。基于 credits 的 AI 层是新的、且可能重要的收入流；在 $500M ARR 披露时它尚未 fully ramped，说明
