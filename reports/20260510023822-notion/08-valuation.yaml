  - id: TV005
    title: Thesis-Break and Exit Triggers Table
    columns:
      - Risk Event
      - Trigger
      - Threshold
      - Action
    rows:
      - - ARR growth deceleration
        - Quarterly ARR growth visible from media disclosures
        - YoY growth below 20% for two consecutive quarters
        - Downgrade to hold; reassess exit multiple assumptions
      - - GDPR or EU AI Act enforcement
        - EU DPA enforcement action against Notion AI
        - Fine exceeding $10M or revenue restriction in EU
        - Immediate reassessment of EMEA TAM and multiple; potential downgrade to sell
      - - Enterprise anchor customer churn
        - Public customer announcements or platform migration
        - Two or more named tier-1 accounts departing within 6 months
        - Full churn root-cause analysis; reassess NRR assumptions
      - - Competitive bundling event
        - Microsoft 365 or Google Workspace AI agent announcement
        - Free AI agent capabilities at no incremental cost to existing enterprise agreements
        - Reassess TAM, pricing power, and NRR sustainability; potential downgrade to hold
      - - IPO filing or pre-IPO round
        - S-1 filing or primary capital raise announcement
        - Any public disclosure of IPO intention or new primary capital
        - Upgrade to strong buy if at or below current valuation with improved transparency
    notes: >-
      Trigger thresholds are based on observable public signals and are illustrative.
      Actual internal monitoring thresholds would be calibrated with management after
      data room access. Regulatory enforcement events may not be publicly announced
      until after formal proceedings begin.
    claimRefs:
      - CV022
      - CV024
      - CV038
      - CV039

