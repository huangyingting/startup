  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: Net revenue retention rate
      missingEvidence: >-
        Notion has not disclosed NRR or GRR for any period. This is the single most important
        missing metric for valuation underwriting. Without NRR, the scenario probability
        assignments in the bull/base/bear model are based on management-disclosed metrics
        only (AI-enabled ARR mix) that are insufficient for independent validation.
      whyItMatters: >-
        NRR below 110% would shift the base case from $13B to closer to $7B probability-weighted
        EV, effectively inverting the expected return from +18% to -35% from the $11B entry.
        This is a thesis-changing data point that must be obtained before investment.
      diligencePath: >-
        Request NRR and GRR for trailing 8 quarters by plan tier. Ask for cohort retention
        analysis. Request definition of AI-enabled ARR cohort versus AI credit payers.
      relatedQuestionRefs: [QV026]
    - type: private-evidence-only
      severity: material
      topic: Investor preference stack and liquidation terms
      missingEvidence: >-
        Capitalization table, liquidation preferences, and conversion terms for existing Notion
        investors across all series are private and not accessible without data room access.
        The preference stack affects actual equity value distribution in any exit scenario.
      whyItMatters: >-
        In a bear case exit at $6-7B, substantial liquidation preferences from earlier rounds
        could result in common stockholders (including employees) receiving significantly less
        than the nominal per-share valuation. New investors entering at $11B secondary prices
        need to understand where they sit in the waterfall.
      diligencePath: >-
        Request full capitalization table, investor preference terms by series, and legal
        opinions on how the preference stack resolves in various exit scenarios.
      relatedQuestionRefs: [QV020]
    - type: missing-source
      severity: material
      topic: Gross margin and burn rate
      missingEvidence: >-
        Notion has not disclosed gross margin, operating margin, or cash burn rate.
        Without gross margin, the base case assumes 75-78% (consistent with SaaS peers)
        which may overstate profitability if AI infrastructure costs are high.
      whyItMatters: >-
        LLM inference costs for AI features could compress gross margins below 70%, which
        would reduce Notion's normalized EBITDA multiple and compress the exit valuation
        in a profitability-focused IPO environment.
      diligencePath: >-
        Request FY2024 and FY2025 audited financial statements with gross margin breakdowns
        by product line (AI vs. core workspace) and infrastructure cost per user.
      relatedQuestionRefs: [QV026]
    - type: enumeration-incomplete
      severity: minor
      topic: Comparable valuation set completeness
      missingEvidence: >-
        The comparable valuation table covers only public market companies. Private market
        comparables for AI-first productivity platforms (Figma at $12.5B acquisition,
        Canva at $26B implied valuation, Miro at $17.5B) provide alternative reference
        points not included due to limited public financial data.
      whyItMatters: >-
        Private market AI productivity comps at similar scale suggest that $11B may be
        a moderate valuation rather than stretched, if the AI workspace category commands
        premium multiples similar to design and visual collaboration tools.
      diligencePath: >-
        Research recent private market transactions in the productivity and AI workspace
        category to supplement the public market comparable set.
      relatedQuestionRefs: []
      relatedTableRefs: [TV004]
    - type: missing-source
      severity: material
      topic: Board governance and independent director composition
      missingEvidence: >-
        Notion's board composition, number of independent directors, audit committee
        membership, and corporate governance structure are not publicly disclosed.
        Private companies have no legal obligation to disclose this information,
        but it is a material input for IPO readiness assessment and risk analysis.
      whyItMatters: >-
        Board governance quality is a material risk factor for IPO readiness. Insufficient
        independent oversight may delay the IPO timeline or require board restructuring
        that could change investor dynamics and governance terms.
      diligencePath: >-
        Request board composition, committee structure, and governance documentation
        from Notion management as part of the data room package.
      relatedQuestionRefs: [QV032]
