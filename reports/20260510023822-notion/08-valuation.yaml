callouts:
  - calloutType: recommendation
    title: "Buy at Current Secondary Prices — Medium Confidence"
    body: >-
      Notion's $11B valuation is stretched but defensible given its AI-enabled growth
      acceleration. The probability-weighted expected value of $13B implies 18% upside
      from entry in the base case. Conviction would upgrade to high if data room access
      confirms NRR above 120% and gross margin above 75%.
    claimRefs: [CV028, CV023]
  - calloutType: risk
    title: NRR Is the Most Important Undisclosed Metric
    body: >-
      Net Revenue Retention is the single metric that most determines whether the $11B
      valuation is justifiable. An NRR above 130% would confirm the bull case; below 110%
      would invalidate the base case. No public proxy for Notion NRR exists. This is a
      blocking diligence item before underwriting.
    claimRefs: [CV035]
  - calloutType: strength
    title: AI Monetization Is Real, Not Speculative
    body: >-
      Unlike many AI platform investments in 2025-2026 where AI revenue is aspirational,
      Notion's over 50% AI-enabled ARR mix at year-end 2025 confirms that AI features
      are driving meaningful incremental revenue today. The Custom Agents launch with
      1M-plus agents created in Q1 2026 provides additional evidence of adoption velocity.
    claimRefs: [CV003, CV004]
  - calloutType: assumption
    title: Base Case Assumes 30% ARR Growth Sustained Through 2027
    body: >-
      The base case valuation of $12-15B at IPO requires sustained 30% YoY ARR growth
      through 2026-2027. This assumption is plausible given the AI acceleration observed
      in 2025 but is not confirmed. Any guidance or actual data showing growth below 25%
