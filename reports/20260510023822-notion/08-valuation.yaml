  - id: exit-readiness-and-diligence
    title: Exit Readiness and Final Diligence Asks
    body: >-
      Notion's exit path is most likely an IPO in 2027-2028 at an ARR of $700M-$1B, consistent
      with the scale at which comparable enterprise SaaS companies have accessed public markets.
      Atlassian IPO'd in 2015 at approximately $450M ARR; monday.com IPO'd in 2021 at
      approximately $300M ARR during favorable conditions; Notion's larger scale and stronger
      brand position support a higher ARR bar before IPO. Strategic acquisition is a secondary
      exit path — Microsoft, Google, Salesforce, or ServiceNow could acquire Notion to
      strengthen their enterprise workspace position, though regulatory scrutiny of large tech
      acquisitions has increased. The primary IPO readiness indicators that Notion needs to
      demonstrate are: consistent ARR growth above 30% with two years of audited financials;
      path to profitability or clear gross margin expansion trajectory; NRR above 120% as a
      signal of enterprise retention health; and governance structure (board composition,
      independent directors, audit committee) appropriate for a public company. Current
      governance is not publicly disclosed. The final diligence asks before underwriting
      include: audited financials for FY2024 and FY2025; NRR and GRR by plan tier for
      trailing 8 quarters; cash position and burn rate; detailed breakdown of AI-enabled ARR
      and its definition; customer contract terms including MSA structure, SLA commitments,
      and renewal rates; board composition and investor preference stack; and independent
      security audit results for Custom Agents. A data room with these items would resolve
      most of the blocking diligence gaps identified in this report.
    claimRefs:
      - CV017
      - CV018
      - CV025
      - CV030
      - CV031
