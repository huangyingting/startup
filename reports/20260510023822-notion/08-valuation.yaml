        - Core unit economics metric; NRR below 110% invalidates bull and base cases
      - - Audited Financials
        - P1 — Blocking
        - FY2024 and FY2025 audited financial statements
        - No public financials exist; gross margin, burn, and operating leverage are unknown
      - - AI-enabled ARR definition
        - P2 — Material
        - Exact definition of "AI-enabled" ARR cohort used in disclosures
        - Definition may include any user with AI features enabled vs. active paid AI usage
      - - Investor preference stack
        - P2 — Material
        - Full capitalization table with liquidation preferences by series
        - Determines actual downside protection and equity value distribution at exit
      - - Custom Agents revenue
        - P2 — Material
        - ARR from AI credits vs. seat subscriptions; cohort data on agent adoption
        - Credits revenue is usage-based and harder to forecast; key to bull case validation
      - - Security audit results
        - P3 — Important
