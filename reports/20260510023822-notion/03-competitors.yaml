callouts:
  - calloutType: strength
    title: Sustained G2 Leadership and Scale Moat
    body: >-
      Notion's #1 G2 knowledge base ranking for three consecutive years, 100M+ registered users, and penetration across
      62% of Fortune 100 and 98% of Forbes Cloud 100 represent a durable social-proof moat. Competitors like Coda and
      Nuclino lack the brand recognition and review-driven network effects that Notion has accumulated, making it
      structurally harder for smaller competitors to win enterprise evaluations against Notion's established G2 position
      and reference-customer base.
    claimRefs:
      - CP003
      - CP004
      - CP005
      - CP006
  - calloutType: risk
    title: Microsoft Loop — Structural Distribution Threat via M365 Bundling
    body: >-
      Microsoft Loop, integrated into Microsoft 365 enterprise suites alongside Copilot AI, represents a structurally
      difficult competitive threat: it requires no additional budget approval for enterprise buyers already paying for
      M365. Notion must justify incremental per-seat spend against a functionally adequate bundled alternative in every
      M365-mandated organization. As Microsoft deepens Copilot agent capabilities in Loop, the AI differentiation gap
      that Notion currently holds may compress in enterprise environments where M365 is already mandated by IT
      procurement policy.
    claimRefs:
      - CP022
      - CP023
      - CP024
      - CP025
  - calloutType: insight
    title: Custom Agents First-Mover Advantage — Window Estimated at 12–18 Months
    body: >-
      Notion's Custom Agents — with 1M+ agents created and 21,000+ built in beta — give it a measurable first-mover
      advantage in autonomous workplace AI among productivity tools as of May 2026. The agent network effect (more
      agents → more templates → faster enterprise adoption) could compound competitive advantage if Notion converts
      agent usage into higher Enterprise ACV before competitors close the feature gap. The window is estimated at 12–18
      months before major competitors ship comparable autonomous agent capabilities at scale.
    claimRefs:
      - CP019
      - CP020
      - CP021
      - CP026
