    type: quadrant
    summary: >-
      This quadrant maps Notion's primary competitors on two dimensions: product breadth (x-axis, from narrow specialist
      to broad all-in-one platform) and AI integration depth (y-axis, from limited AI to deep autonomous agent
      capabilities). Notion occupies the upper-right quadrant as a broad all-in-one platform with the deepest documented
      autonomous AI agent capabilities among pure-play productivity tools. Microsoft Loop approaches from the AI depth
      axis with strong Copilot integration but operates primarily as a bundled M365 component. Atlassian Confluence is
      broad but mid-tier on autonomous AI. ClickUp and monday.com are broad but AI-partial. Coda and Airtable are
      specialist platforms with moderate AI. Obsidian and AppFlowy are narrow specialists with limited AI.
