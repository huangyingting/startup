  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Coda financial scale and competitive viability
      missingEvidence: >-
        Coda's total funding, annual revenue, customer count, and recent growth rate are not publicly disclosed. As a
        private company with no regulatory filing requirements, its competitive scale and financial health relative to
        Notion cannot be independently verified from public sources.
      whyItMatters: >-
        Understanding Coda's financial health and growth trajectory is important for assessing whether it will remain a
        viable mid-market competitor or become an acquisition target. A well-funded Coda could accelerate product
        development, while a struggling Coda might exit the market through consolidation.
      diligencePath: >-
        Request Coda's self-disclosed revenue and funding figures through Crunchbase Pro or proprietary investor deal
        databases. Monitor for M&A signals, talent migration, or investor announcements.
      relatedQuestionRefs:
        - QP021
    - type: missing-source
      severity: material
      topic: Enterprise competitive win/loss data
      missingEvidence: >-
        No public data exists on Notion's competitive win/loss rates against Microsoft Loop, Atlassian Confluence, or
        ClickUp in enterprise procurement processes. Without this data, it is impossible to assess whether Notion's G2
        leadership translates to commercial success in competitive RFPs — particularly in M365-mandated environments.
      whyItMatters: >-
        Win/loss data is essential for understanding whether Notion's differentiation narrative holds up in actual
        enterprise buying decisions. High G2 ratings do not guarantee wins against bundled M365 offerings that require
        no incremental budget.
      diligencePath: >-
        Request internal win/loss analytics from Notion management. Conduct reference calls with enterprise customers
        who evaluated Notion against Microsoft Loop or Atlassian in recent procurement cycles.
      relatedQuestionRefs:
        - QP024
    - type: enumeration-incomplete
      severity: minor
      topic: Competitor landscape completeness
      missingEvidence: >-
        The competitor landscape table (TP001) covers 12 named competitors but excludes AI-native workspace entrants
        that may emerge from foundation model providers (OpenAI, Anthropic, Google) or open-source projects building on
        LLM APIs.
      whyItMatters: >-
        AI-native entrants from foundation model providers could rapidly displace traditional productivity tools if they
        ship workspace-integrated products leveraging their model distribution channels and API user bases.
      diligencePath: >-
        Monitor product launches from OpenAI, Anthropic, and Google Labs; track Product Hunt and GitHub for emerging
        open-source AI workspace projects. Update competitor landscape table quarterly.
      relatedQuestionRefs:
        - QP001
      relatedTableRefs:
        - TP001
    - type: missing-source
      severity: minor
      topic: Competitor registered user counts
      missingEvidence: >-
        Registered user counts for Notion's primary competitors (Atlassian Confluence, ClickUp, Coda, Airtable) are not
        publicly disclosed in comparable form to Notion's 100M+ figure. This makes direct user-count comparison
        impossible from public sources.
      whyItMatters: >-
        User count is a key leading indicator of growth trajectory and long-term competitive position. Without peer user
        counts, market share dynamics remain opaque.
      diligencePath: >-
        Monitor competitor press releases and investor days for user metric disclosures. Consult third-party traffic
        analytics (SimilarWeb, Semrush) for proxy data.
      relatedQuestionRefs:
        - QP010
    - type: missing-source
      severity: minor
      topic: Enterprise migration friction data
      missingEvidence: >-
        No independent third-party data on actual switching costs or migration completion rates for organizations moving
        between major knowledge management platforms was identified. All migration ease claims come from
        vendor-controlled content.
      whyItMatters: >-
        Migration complexity is a key determinant of net revenue retention in enterprise accounts. If switching costs
        are lower than Notion claims, churn risk is higher.
      diligencePath: >-
        Commission independent customer interviews with organizations that have completed Confluence-to-Notion or
        ClickUp-to-Notion migrations at scale (500+ users).
      relatedQuestionRefs:
        - QP015
