chapter:
  number: 3
  title: Competitive Landscape
  summary: >-
    Notion competes across knowledge management, collaborative docs, project management, and AI workspace software
    against a field that includes Atlassian Confluence (backed by Atlassian's ~$4.8B FY2025 revenues), monday.com ($1B+
    FY2025), ClickUp, Coda, Airtable, and bundled offerings from Microsoft and Google. Notion's #1 G2 knowledge base
    ranking for three consecutive years and its February 2026 Custom Agents launch differentiate it from direct
    competitors, though Microsoft Loop's M365 bundling and Atlassian's revenue base represent structurally advantaged
    incumbent threats. Pricing is competitive at $10–$15 per seat for mid-market tiers, with a usage-based AI credit
    layer creating ARPU expansion potential as agent adoption scales.
sections:
  - id: competitive-landscape-overview
    title: Competitive Landscape Overview
    body: >-
      Notion competes across at least four overlapping product categories: team wikis and knowledge management,
      collaborative document editing, lightweight project and task management, and AI-augmented workspace
      infrastructure. This multi-category positioning creates an unusually wide competitive surface — no single
      competitor operates simultaneously in all four with comparable depth or scale. The primary direct competitors are
      Atlassian Confluence, supported by Atlassian's approximately $4.8 billion in FY2025 total revenues and deep
      integration with Jira and the broader Atlassian suite; Coda, a database-driven collaborative document platform;
      ClickUp, an all-in-one project management and wiki tool; Airtable, a database-first collaboration platform; and
      monday.com, a work management platform with FY2025 revenues exceeding $1 billion. Adjacent threats include
      Microsoft Loop bundled into Microsoft 365 enterprise suites, Google Docs and Sites bundled into Google Workspace,
      and a growing cluster of more focused tools including Nuclino, Slite, Obsidian, Fibery, and the fully open-source
      AppFlowy. Evernote competes in the consumer-facing note-taking segment but has limited enterprise relevance
      relative to Notion's go-to-market focus. Notion's strongest structural advantage across this field is its #1 G2
      knowledge base ranking held for three consecutive years, its 100 million-plus registered users, and penetration
      figures of 62% of the Fortune 100 and 98% of the Forbes Cloud 100 — statistics that signal broad market presence
      in both enterprise and high-growth technology segments. However, the multi-category strategy also means Notion
      faces each specialist competitor on the latter's home turf, creating depth and performance trade-offs that
      informed users and review platforms have noted.
    claimRefs:
