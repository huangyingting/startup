  claims:
    - id: CE001
      statement: >-
        Notion's core architectural abstraction is the 'block' — an atomic unit of content that can be nested, linked,
        and rendered in multiple view types, enabling docs, databases, project boards, and AI workflows to share a
        single unified data model.
      type: observed
      topic: core architecture
      sourceRefs:
        - SE001
        - SE003
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
    - id: CE002
      statement: >-
        Notion's infrastructure is built on Amazon Web Services (AWS) as the primary compute and storage layer, with
        Cloudflare providing CDN, DDoS mitigation, SSL termination, and globally distributed edge delivery.
      type: observed
      topic: cloud infrastructure
      sourceRefs:
        - SE005
        - SE010
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE003
    - id: CE003
      statement: >-
        Notion publishes a REST API at developers.notion.com supporting full CRUD operations on blocks, pages,
        databases, and users via HTTPS/JSON, with official JavaScript/TypeScript, Python, and Ruby SDK libraries.
      type: observed
      topic: developer API
      sourceRefs:
        - SE007
        - SE021
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE004
    - id: CE004
      statement: >-
        Notion encrypts all data at rest using AES-256 and in transit using TLS 1.2 or higher, with per-workspace key
        management.
      type: observed
      topic: data encryption
      sourceRefs:
        - SE005
        - SE006
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE028
    - id: CE005
      statement: >-
        Notion's web application is a React-based single-page application (SPA) with native iOS (Swift) and Android
        (Kotlin) mobile apps available on the App Store and Google Play.
      type: observed
      topic: client architecture
      sourceRefs:
        - SE001
        - SE005
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE001
    - id: CE006
      statement: >-
        Notion Docs provides collaborative long-form document editing with AI writing assistance, inline comments, and
        version history, targeting replacement of Google Docs and Microsoft Word in enterprise workflows.
      type: observed
      topic: Notion Docs module
      sourceRefs:
        - SE001
        - SE018
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE002
        - QE023
    - id: CE007
      statement: >-
        Notion Wikis provides a structured knowledge base with nested page hierarchies, access controls, and
        verification workflows, and has been rated number one knowledge base on G2 for three consecutive years.
      type: observed
      topic: Notion Wikis module
      sourceRefs:
        - SE001
        - SE009
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QE002
    - id: CE008
