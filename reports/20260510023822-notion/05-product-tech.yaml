  - id: reliability-security-compliance
    title: Infrastructure Reliability, Security, and Compliance
    body: >-
      Notion's infrastructure is designed for enterprise availability and regulatory compliance. The platform delivers a
      contractual 99.9% uptime SLA on Business and Enterprise plans, backed by a globally distributed AWS deployment
      with Cloudflare edge caching and DDoS protection. The public status page at status.notion.so shows Notion's
      real-time operational status across its core services. Enterprise security features include SAML SSO with major
      IdP providers (Okta, Azure AD, Google Workspace), SCIM provisioning for automated user lifecycle management,
      granular audit logs, and workspace-level access controls with page-level permission overrides. Notion's compliance
      certifications as of 2026 include SOC 2 Type 2, ISO 27001, ISO 27701 (privacy information management), ISO 27017
      (cloud security), ISO 27018 (cloud personal data protection), HIPAA BAA for healthcare customers, BSI C5 (German
      federal cloud security standard), GDPR compliance for EU data subjects, and CCPA compliance for California
      residents. Data residency is available in the United States, European Union, Japan, and South Korea (the last two
      added in the 2025–2026 timeframe). For the Enterprise plan, Notion offers zero data retention for AI features,
      meaning prompt inputs and outputs are not used for model training. The HackerOne bug bounty program provides a
      formal channel for security researcher disclosures. The Skiff acquisition in February 2024 raised privacy concerns
      from the security community because Notion shut down Skiff's end-to-end encrypted service, which represented an
      adverse trust signal for privacy-sensitive enterprise buyers. This acquisition has not been associated with any
      formal regulatory action but represents a reputational risk that enterprise procurement teams may raise during
      vendor assessments.
    claimRefs:
      - CE019
