  - id: FE002
    title: Custom Agent Workflow — Trigger-to-Output Execution Flow
    type: flow
    summary: >-
      Flow diagram illustrating how a Notion Custom Agent executes a multi-step automation task. The flow begins with a
      trigger (schedule, webhook, or manual activation), proceeds to the agent reading context from Notion databases and
      connected apps (Slack, GitHub, Jira), then performs LLM reasoning to determine next actions, executes write
      operations to Notion pages or external APIs, and produces a structured output (updated database row, Slack
      message, or email draft). Security controls (permission scoping, version control, audit logging) are applied at
      the execution and write layers.
    data:
      nodes:
        - label: Trigger (schedule / webhook / manual)
          description: Agent activation method
        - label: Context Retrieval (Notion DB + connected apps)
          description: Read Notion workspace and third-party data sources
        - label: LLM Reasoning Chain
          description: Multi-step reasoning; prompt injection guards applied
        - label: Action Execution (write to Notion / external API)
          description: Permission-scoped write operations; audit logged
        - label: Output (updated DB row / Slack message / report)
          description: Structured result delivered to workspace or external system
    claimRefs:
      - CE013
      - CE014
      - CE015
      - CE016
