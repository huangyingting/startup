  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Frontier LLM model partners powering Notion AI
      missingEvidence: >-
        Notion has not publicly disclosed which frontier LLM providers power Custom Agents and AI Core features. This
        creates model dependency risk that cannot be assessed from external sources. The routing layer described by
        Notion engineering implies at least two or more model providers but names none.
      whyItMatters: >-
        Model partner concentration risk, API cost structure, and license terms with frontier LLM providers could
        materially affect Notion's gross margins and technology independence as credit-based AI revenue scales. Contract
        terms with model providers are a diligence item for any investor evaluating AI gross margin sustainability.
      diligencePath: >-
        Request disclosure of model partnerships, API cost structure, and switching costs from Notion management. Assess
        whether Notion has any proprietary model fine-tuning or is entirely dependent on third-party frontier models.
      relatedQuestionRefs:
        - QE016
    - type: enumeration-incomplete
      severity: minor
      topic: Complete product module feature specification
      missingEvidence: >-
        Notion's detailed feature matrix (properties, API limits, view types, formula language capabilities) across all
        modules has not been fully enumerated from public sources. Some enterprise-specific capabilities (custom success
        manager, SLA terms, dedicated infra options) are only disclosed through private sales processes.
      whyItMatters: >-
        Enterprise buyers evaluating Notion against Confluence or Jira require granular feature-by-feature comparison.
        Incomplete public feature specifications could lead to underestimating feature gaps for specific enterprise
        workflows.
      diligencePath: >-
        Request product capability matrix and roadmap with GA dates from Notion product team. Conduct structured
        technical POC (proof of concept) with enterprise engineering team to validate fit for target workflows.
      relatedQuestionRefs: []
