callouts:
  - calloutType: strength
    title: Unified Block Model Enables AI Agents Across Full Organizational Knowledge Graph
    body: >-
      Notion's core architectural advantage over point solutions is that Custom Agents operate across all content types
      (docs, databases, projects, calendars) using a single permission model. Competing AI tools typically access only
      one content type (e.g., Confluence AI reads pages but not project tasks). Notion's unified data model allows an
      agent to, for example, read a project database, synthesize a status update, update a wiki page, and post a Slack
      message in a single workflow — a cross-content automation not achievable in fragmented tool stacks without complex
      glue code. This is the primary structural differentiator for enterprise AI adoption.
    claimRefs:
      - CE001
      - CE012
      - CE015
      - CE026
  - calloutType: risk
    title: Custom Agents Prompt Injection Risk — Disclosed by Notion Engineering
    body: >-
      Notion's engineering blog explicitly acknowledges prompt injection risks in Custom Agents, in which malicious
      content in a Notion page or connected data source could hijack agent actions. While Notion has implemented
      guardrails (permission scoping, execution sandboxing, version control, audit logs), prompt injection in agentic AI
      systems is an active research area without fully solved defenses. Enterprise buyers in regulated industries
      (finance, healthcare, government) should explicitly assess this risk during vendor security reviews. Any data
      processed by Custom Agents should be treated as potentially adversarial until stronger technical mitigations are
      validated.
    claimRefs:
      - CE014
      - CE015
      - CE023
      - CE025
  - calloutType: insight
    title: G2 Three-Peat and Developer Community Signal Unique Market Position
    body: >-
      Notion's G2 rankings as of 2026 — number one in knowledge base for three consecutive years, number one in AI
      enterprise search, and number one in AI writing — represent rare multi-category dominance that validates the
      platform's breadth positioning. Combined with 1.4 million community members and 12,000+ GitHub stars on the
      JavaScript SDK, the developer ecosystem signal is significantly stronger than any single-use-case alternative.
      This dual signal (user satisfaction + developer adoption) is a key leading indicator of enterprise platform
      stickiness and future API revenue growth.
    claimRefs:
      - CE017
      - CE018
      - CE026
      - CE029
