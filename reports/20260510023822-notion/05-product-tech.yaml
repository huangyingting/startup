chapter:
  number: 5
  title: Product and Technology
  summary: >-
    Notion's product platform has evolved from a note-taking and wiki tool into a unified AI workspace that integrates
    documents, databases, project management, autonomous AI agents, enterprise search, calendar, mail, and a website
    builder. The January 2026 Custom Agents launch and the February 2026 Notion Mail introduction represent the most
    significant product expansions in the company's history, positioning Notion as an AI-native operating system for
    knowledge work. The platform is built on AWS and Cloudflare infrastructure with a globally distributed data model,
    and achieves SOC 2 Type 2, ISO 27001, HIPAA BAA, and BSI C5 compliance. Developer ecosystem engagement is strong
    with a REST API, official JavaScript/Python/Ruby SDKs, 12,000+ GitHub stars, and 1.4M+ community integrators.
sections:
  - id: product-definition-and-architecture
    title: Product Definition and Core Architecture
    body: >-
      Notion is an all-in-one AI workspace platform that unifies six distinct product categories within a single,
      block-based data model: wikis and knowledge bases, collaborative documents, relational databases (Notion
      Database), project management (Notion Projects), enterprise search across connected applications, and autonomous
      AI agents (Custom Agents). The core architectural abstraction is the "block" — an atomic unit of content (text,
      image, embed, database row, AI action) that can be nested, linked, and rendered in multiple view types
      simultaneously. This block model enables Notion pages to serve as documents, structured databases, project boards,
      calendars, or AI-assisted workflows without requiring separate application contexts. The underlying technical
      infrastructure is built on Amazon Web Services (AWS) as the primary compute and storage layer, with Cloudflare
      providing CDN, edge security, DDoS mitigation, and globally distributed edge delivery. Data is organized by
      workspace, with per-workspace encryption at rest and in transit using AES-256 and TLS 1.2+. Notion's web
      application is a React-based single-page app with native iOS and Android mobile apps. As of the February 2026
      release, Notion also ships Notion Mail (AI-assisted Gmail integration) and an enhanced Notion Calendar (meeting
      and scheduling intelligence) that extend the workspace into communication and time management workflows. Custom
      Agents (launched February 24, 2026) operate within the workspace permission model and can read, write, and
      manipulate Notion pages, databases, and API connections using a prompt-driven instruction set backed by Notion's
      proprietary AI model routing.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
    tableRefs:
      - TE003
    figureRefs:
      - FE001
  - id: product-modules-and-capabilities
    title: Product Modules, SKUs, and Platform Capabilities
    body: >-
      Notion's product suite in 2026 comprises eight distinct modules, each targeting a specific knowledge-work use case
      while sharing the underlying workspace data model and permission layer. Notion Docs provides collaborative
      long-form document editing with AI writing assistance, inline comments, and version history. Notion Wikis provides
      a structured knowledge base with nested page hierarchies, access controls, and verification workflows for
      surfacing authoritative company information. Notion Projects integrates task management, Kanban boards, timeline
      views (Gantt-style), and workload views directly into the workspace so that project planning and documentation are
      co-located rather than siloed across separate tools. Notion Database underpins all structured data in the platform
      — customer records, content calendars, sprint backlogs — with support for 15 property types, relational linking,
      rollups, formulas, and API access. Notion AI Core (included in Business and above) provides AI writing assistance,
      automatic summaries, translation, Q&A over workspace content, meeting notes transcription, and AI-powered database
      queries. Notion Enterprise Search allows users to search across Notion content and connected third-party
      applications (Google Drive, Slack, Jira, GitHub, Salesforce) from a single search interface. Notion Sites allows
      teams to publish Notion pages as public websites with custom domains and SEO controls. Notion Calendar provides
      smart scheduling, meeting notes integration, and team calendar visibility. Notion Mail (beta as of 2026)
      integrates Gmail inbox management with AI-powered email actions and Notion workspace context. Together these
      modules position Notion as a replacement for multiple-tool stacks including Confluence (wiki), Jira (projects),
      Google Drive (docs), and Microsoft Outlook (calendar/mail).
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
