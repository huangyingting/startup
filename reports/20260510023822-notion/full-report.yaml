      - number: '7.4'
        title: Financial and Model Risks
        blocks:
          - type: paragraph
            body: >-
              As a private company, Notion provides no audited financials, SEC filings, or investor disclosures. All
              financial metrics including the $500M-plus ARR figure and the $11B valuation are derived from media
              reports and company-disclosed press releases that have not been independently verified. This creates a
              structural information gap for prospective investors relying on public diligence alone. Net Revenue
              Retention which is a critical indicator of enterprise SaaS health is not disclosed. If NRR is below 115
              percent it would suggest Notion is growing primarily through new customer acquisition rather than
              expansion revenue, which carries higher long-term cost. The PLG-to-enterprise motion means sales cycles
              are visible at the free tier but conversion economics for enterprise deals are opaque. Burn rate is
              unknown; Notion has raised $330M-$418M historically and the most recent $270M tender offer in January 2026
              was a secondary transaction meaning Notion did not receive those proceeds on its balance sheet.
              Competitive pricing pressure is a real risk since Microsoft Loop and Google Workspace are available at no
              incremental cost within existing enterprise agreements. The AI credits pricing model at $10 per 1,000
              credits creates revenue upside tied to agent usage but also potential sticker shock that could suppress
              adoption. Credit concentration risk is low given the SMB/mid-market base but enterprise deal concentration
              is unknown and cannot be assessed from public data.
