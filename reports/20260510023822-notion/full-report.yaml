              - CV007
              - CV008
              - CV009
              - CV010
              - CV020
              - CV021
      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >-
              Notion's exit path is most likely an IPO in 2027-2028 at an ARR of $700M-$1B, consistent with the scale at
              which comparable enterprise SaaS companies have accessed public markets. Atlassian IPO'd in 2015 at
              approximately $450M ARR; monday.com IPO'd in 2021 at approximately $300M ARR during favorable conditions;
              Notion's larger scale and stronger brand position support a higher ARR bar before IPO. Strategic
              acquisition is a secondary exit path — Microsoft, Google, Salesforce, or ServiceNow could acquire Notion
              to strengthen their enterprise workspace position, though regulatory scrutiny of large tech acquisitions
              has increased. The primary IPO readiness indicators that Notion needs to demonstrate are: consistent ARR
              growth above 30% with two years of audited financials; path to profitability or clear gross margin
              expansion trajectory; NRR above 120% as a signal of enterprise retention health; and governance structure
              (board composition, independent directors, audit committee) appropriate for a public company. Current
              governance is not publicly disclosed. The final diligence asks before underwriting include: audited
              financials for FY2024 and FY2025; NRR and GRR by plan tier for trailing 8 quarters; cash position and burn
              rate; detailed breakdown of AI-enabled ARR and its definition; customer contract terms including MSA
              structure, SLA commitments, and renewal rates; board composition and investor preference stack; and
              independent security audit results for Custom Agents. A data room with these items would resolve most of
              the blocking diligence gaps identified in this report.
            claimRefs:
              - CV017
              - CV018
              - CV025
              - CV030
              - CV031
              - CV033
              - CV034
              - CV035
              - CV042
          - type: table
            tableRef: TV006
            claimRefs:
              - CV025
              - CV031
              - CV033
              - CV035
              - CV042
      - number: '8.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Buy at Current Secondary Prices — Medium Confidence
            body: >-
              Notion's $11B valuation is stretched but defensible given its AI-enabled growth acceleration. The
              probability-weighted expected value of $13B implies 18% upside from entry in the base case. Conviction
              would upgrade to high if data room access confirms NRR above 120% and gross margin above 75%.
            calloutType: recommendation
            claimRefs:
              - CV028
              - CV023
          - type: callout
            title: NRR Is the Most Important Undisclosed Metric
            body: >-
              Net Revenue Retention is the single metric that most determines whether the $11B valuation is justifiable.
              An NRR above 130% would confirm the bull case; below 110% would invalidate the base case. No public proxy
              for Notion NRR exists. This is a blocking diligence item before underwriting.
            calloutType: risk
            claimRefs:
              - CV035
          - type: callout
            title: AI Monetization Is Real, Not Speculative
            body: >-
              Unlike many AI platform investments in 2025-2026 where AI revenue is aspirational, Notion's over 50%
              AI-enabled ARR mix at year-end 2025 confirms that AI features are driving meaningful incremental revenue
              today. The Custom Agents launch with 1M-plus agents created in Q1 2026 provides additional evidence of
              adoption velocity.
            calloutType: strength
            claimRefs:
              - CV003
              - CV004
          - type: callout
            title: Base Case Assumes 30% ARR Growth Sustained Through 2027
            body: >-
              The base case valuation of $12-15B at IPO requires sustained 30% YoY ARR growth through 2026-2027. This
              assumption is plausible given the AI acceleration observed in 2025 but is not confirmed. Any guidance or
              actual data showing growth below 25% would require immediate downward revision of the base case.
            calloutType: assumption
            claimRefs:
              - CV023
              - CV032
