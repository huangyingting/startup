      - number: '7.2'
        title: Operational and Security Risks
        blocks:
          - type: paragraph
            body: >-
              Notion security posture is among the strongest in the productivity software category. The company holds
              SOC 2 Type 2, ISO 27001, ISO 27701 Privacy Information Management, ISO 27017 Cloud Security, ISO 27018
              Cloud Privacy, HIPAA BAA, BSI C5, and GDPR/CCPA compliance certifications. Infrastructure runs on Amazon
              Web Services across multiple regions with Cloudflare providing CDN and DDoS mitigation. The 99.9 percent
              uptime SLA is backstopped by a HackerOne bug bounty program providing an independent vulnerability
              disclosure channel. However operational risk has not been eliminated. Notion status page documents
              historical incidents and the January 2026 release cycle introduced platform changes that may have caused
              temporary service degradation. The most significant emerging operational risk is the Custom Agents
              platform: autonomous agents can take actions in third-party systems using OAuth-granted permissions,
              creating a broader attack surface than traditional document editing workflows. Notion explicitly
              acknowledges prompt injection as a known vulnerability class and provides guardrails including permissions
              scoping, version control, and audit logs. The residual risk of a prompt injection attack causing
              unintended data exfiltration or destructive actions in connected systems remains non-negligible even after
              documented mitigations. The Shared Responsibilities Model page documents the boundary between
              Notion-managed and customer-managed controls. Enterprise customers with zero data retention enabled
              receive additional protections but ZDR adoption is not disclosed. No independent red-team audit results
              for Custom Agents are public.
            claimRefs:
