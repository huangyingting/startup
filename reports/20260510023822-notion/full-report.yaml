      - number: '7.5'
        title: Mitigations and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >-
              The risk mitigation profile for Notion is strongest in areas where the company has invested in security
              certifications and documentation: compliance posture via SOC 2 Type 2, ISO suite, and HIPAA BAA;
              infrastructure resilience via multi-region AWS and Cloudflare; and AI safety documentation covering prompt
              injection guardrails, shared responsibility model, and agent permissions framework. Investment
              thesis-break triggers that should be monitored on a quarterly basis include: first, a material GDPR or EU
              AI Act enforcement action against Notion AI with a fine exceeding $10M indicating that regulators view the
              platform as non-compliant; second, ARR growth deceleration below 20 percent year-over-year for two
              consecutive quarters suggesting the AI-enabled customer surge is not sustaining growth; third, loss of two
              or more named enterprise anchor customers such as OpenAI or Ramp announced publicly within a 6-month
              window; fourth, a material security incident involving Custom Agents that causes data exfiltration or
              destructive automation at an enterprise customer with public disclosure; and fifth, Microsoft or Google
              announcing free native AI agents with equivalent capabilities bundled into existing enterprise agreements.
              Monitoring indicators include G2 and Capterra ratings trajectory, HackerOne vulnerability disclosure
              volume, EU DPA guidance on AI workspace tools, and publicly reported customer wins or losses. An annual
              diligence refresh should include requests for audited financials, NRR, GRR, and cohort retention data.
