      - number: '5.3'
        title: Custom Agents, AI Architecture, and Developer Ecosystem
        blocks:
          - type: paragraph
            body: >-
              The February 24, 2026 launch of Notion Custom Agents marks the most significant product evolution in
              Notion's history. Custom Agents are configurable autonomous AI workflows that can read and write to Notion
              databases, query connected applications, perform multi-step reasoning chains, and produce structured
              outputs on a scheduled or event-triggered basis — all within the Notion workspace permission model. During
              the two-month beta period ending May 3, 2026, 21,000 agents were created by enterprise teams. By launch,
              Notion reports over one million agents created in total. The Ramp deployment demonstrates real-world
              scale: 300 active Custom Agents processing financial operations workflows, including a self-reported 70%
              cost reduction on specific tasks and 20 hours per week saved for Remote through a single automated
              workflow agent. Custom Agents use Notion's internal AI model routing layer, which dispatches tasks to
              frontier models (partners not fully disclosed) depending on task type, cost, and latency requirements.
              Prompt injection risks are explicitly acknowledged by Notion in engineering blog posts, and mitigations
              include permission scoping, version control, usage analytics, and a sandbox execution environment. The
              platform's AI security controls are documented in Notion's shared responsibilities model, AI security
              practices help page, and a dedicated prompt injection risk guide. The developer ecosystem supporting the
              product is substantial: the official Notion REST API covers full CRUD operations on blocks, pages,
              databases, and users; official SDKs exist for JavaScript/TypeScript, Python, and Ruby; the notion-sdk-js
              package has over 12,000 GitHub stars; and the npm package receives significant weekly downloads. Notion
              had over 1.4 million community integrators as of 2026. The developer API changelog shows regular updates
              including addition of webhook support, improved search APIs, and expanded block type coverage.
