      Range chart showing three ARR scenarios for Notion in 2026 based on assumptions about seat subscription growth and
      Custom Agents credit consumption. Bear case assumes 10% ARR growth to ~$550M. Base case assumes 30% growth to
      ~$650M driven by continued AI customer expansion. Bull case assumes 50% growth to ~$750M driven by Custom Agents
      credit revenue ramp-up following May 2026 billing launch. All scenarios are speculative extrapolations from the
