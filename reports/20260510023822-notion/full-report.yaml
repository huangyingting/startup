  - id: FU001
    title: Notion Customer Journey Map — Free User to Enterprise AI Customer
    type: journey-map
    summary: >-
      Customer journey map tracing Notion's typical enterprise adoption path from initial free-tier discovery through
      team expansion to enterprise licensing and AI agent deployment. The journey illustrates Notion's bottom-up PLG
      model with a top-down enterprise expansion overlay. Key stages are: individual discovery (free tier), team
      collaboration (Plus plan), organizational adoption (Business plan with AI Core), enterprise governance (Enterprise
      plan with SSO/SCIM/audit), and AI expansion (Custom Agents credit consumption). At each stage, Notion's product
      provides incremental value that makes upgrade decisions low-friction.
    data:
      items:
        - label: Discovery (Free Tier)
          description: >-
            Individual user finds Notion via community, referral, or search. Adopts free plan for personal notes, tasks,
            or portfolio.
        - label: Team Invitation (Free to Plus)
          description: >-
            User invites teammates; team outgrows free plan limits. Upgrades to Plus ($10/seat/mo) for unlimited
            collaborative blocks and page history.
        - label: Organizational Adoption (Business Plan)
          description: >-
            IT or operations team standardizes on Notion for all teams. Upgrades to Business ($15/seat/mo) for SSO, AI
            Core, private teamspaces, Enterprise Search.
        - label: Enterprise Governance (Enterprise Plan)
          description: >-
            CISO/IT mandates SCIM provisioning, audit logs, and compliance. Custom Enterprise agreement signed for zero
            data retention and custom SLA.
        - label: AI Expansion (Custom Agents)
          description: >-
            Operations or engineering teams deploy Custom Agents for workflow automation. Credit consumption grows
            independently of headcount. Ramp example: 300 agents.
    claimRefs:
