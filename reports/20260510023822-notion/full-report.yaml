      - number: '2.2'
        title: Sizing lenses — public-comp anchors, penetration signals, and the limits of analyst estimates
        blocks:
          - type: paragraph
            body: >-
              Because Notion is private and does not disclose revenue, constructing a Notion-specific TAM, SAM, or SOM
              from public sources requires using indirect lenses rather than verified numbers. The most defensible
              anchor is the combined public revenue of directly adjacent public companies. Atlassian's FY2025 total
              revenue was approximately $4.8 billion; monday.com's FY2024 revenue was approximately $966 million;
              Smartsheet's FY2025 revenue was approximately $1.1 billion; and Asana's FY2025 revenue was approximately
              $724 million. These four companies alone represent over $7.5 billion in annual revenues from tools that
              substantially overlap with what Notion delivers. That figure is a floor, not a ceiling: it excludes Coda,
              ClickUp, Airtable, Nuclino, Slite, Obsidian, Fibery, and the broader Google Workspace and Microsoft 365
              document-workflow spend that Notion also competes against. The second lens is penetration statistics.
              Notion's claim of 100 million-plus users is cited on its product page, and the 98% Forbes Cloud 100 and
              62% Fortune 100 penetration figures appear on its enterprise page. These statistics indicate that Notion
              has already reached most of the highest-ACV enterprise accounts, even if conversion rates, seat depth, and
              actual contract sizes remain private. The third lens is market research: MarketsandMarkets publishes data
              on the collaborative office productivity tools market, which provides an adjacent sizing anchor, though it
              cannot be cleanly mapped to Notion's exact scope. The practical conclusion is that the total adjacent
              market almost certainly exceeds $15 billion in annual software spend when all substitutes are counted, but
              a clean Notion-specific SAM cannot be isolated from public sources, and any SOM estimate is speculative
              without revenue, seat count, or ACV data.
