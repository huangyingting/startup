      - number: '6.4'
        title: Customer Retention, Satisfaction, and Adverse Signals
        blocks:
          - type: paragraph
            body: >-
              Notion's customer retention profile cannot be assessed from public sources because the company does not
              disclose net revenue retention (NRR), gross revenue retention (GRR), churn rate, or customer cohort data.
              The primary proxy for retention health is the AI-enabled ARR expansion signal: the fact that AI-enabled
              customers grew from approximately 20–25% to over 50% of ARR in twelve months implies strong expansion
              revenue within the existing customer base, which is consistent with NRR above 100%. However, this
              inference is not confirmed by audited data. G2 reviews provide quantitative satisfaction signals: Notion's
              ease of use score of 86%, ease of admin score of 90%, and "meets requirements" score of 91% on the G2
              platform are strong versus workspace tool benchmarks. Adverse signals from review platforms include
              recurring complaints about pricing complexity (credit model opacity), performance issues in large
              workspaces with thousands of pages, and limited offline functionality on the mobile app. The February 2024
              acquisition and shutdown of Skiff, a privacy-focused platform, generated adverse press coverage
              (TechRadar) and community backlash from users who had relied on Skiff's end-to-end encryption. While this
              event did not visibly suppress Notion's ARR growth trajectory, it created a lasting reputational risk with
              privacy-sensitive enterprise buyer segments, particularly in legal, healthcare, and government verticals.
              Capterra and TrustRadius reviewers frequently cite concerns about Notion's free plan limitations and the
              complexity of structuring large organizational wikis, which could contribute to churn in the SMB segment
              where setup support is limited. None of these adverse signals are quantified in publicly available data.
