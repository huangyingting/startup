      - number: '7.3'
        title: Partner and Dependency Risks
        blocks:
          - type: paragraph
            body: >-
              Notion infrastructure and product capability are materially dependent on a concentrated set of upstream
              providers. AWS serves as the exclusive cloud backbone; while Notion operates across multiple AWS regions,
              a service-wide AWS disruption or pricing increase would directly impact availability and cost structure.
              Cloudflare provides CDN and DDoS protection as a second critical provider. The dependency concentration in
              AWS and Cloudflare is standard for SaaS but not easily diversified. The most significant emerging
              dependency is on third-party Large Language Model providers, specifically OpenAI and potentially others
              powering Notion AI writing, Q&A, and Custom Agents functionality. If an LLM provider changes pricing,
              access terms, model performance, or data retention policies, Notion would need to renegotiate contracts or
              re-engineer features on short notice. The enterprise zero data retention commitment for AI features
              requires LLM providers to also operate in ZDR mode, creating contractual complexity. Notion Calendar was
              built from the Cron acquisition in 2021, and Notion Mail is a newer product extending the dependency
              surface further. The API ecosystem with over 1M developer integrations creates a network of external
              counterparties whose reliability Notion cannot guarantee. Financial investors Sequoia, Index, and GIC are
              not operational partners; the secondary tender offer in January 2026 confirms continued investor
              confidence at the $11B valuation level without creating new operational dependency.
            claimRefs:
