      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Notion competes in at least four overlapping markets simultaneously
            body: >-
              The broadest TAM framing for Notion (all knowledge management, docs, project management, and AI workspace
              software) exceeds $15 billion annually based on the public revenues of direct substitutes alone. But the
              strategically relevant question is not how large the outer TAM is — it is whether Notion can own enough of
              the buyer's daily workflow to command the per-seat pricing and multi-year contract lengths that drive
              high-ACV enterprise revenue. The multi-category positioning is both the opportunity and the risk.
            calloutType: insight
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM024
              - CM031
              - CM032
          - type: callout
            title: Enterprise penetration statistics do not validate revenue depth without ACV disclosure
            body: >-
              Notion's 98% Forbes Cloud 100 and 62% Fortune 100 penetration figures suggest near-universal presence in
              the highest-value enterprise accounts. But without average contract value, seat density, expansion rates,
              or ARR disclosure, an investor cannot determine whether this presence reflects deep multi-year enterprise
              contracts or shallow free-tier or startup-tier usage that has not converted to material revenue. The SAM
              and SOM estimates in this chapter are structurally uncertain until Notion discloses financial metrics.
            calloutType: risk
            claimRefs:
              - CM002
