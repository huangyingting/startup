      - number: '6.5'
        title: Customer Expansion, Concentration Risk, and Channel Dynamics
        blocks:
          - type: paragraph
            body: >-
              Notion's expansion model is the classic land-and-expand pattern: individual users or small teams adopt the
              free tier or Plus plan, demonstrate value to their organization, and trigger a top-down procurement
              decision for Business or Enterprise licensing at the organizational level. The AI credit model adds a
              second expansion lever beyond seat growth: as Custom Agent usage increases within an enterprise account,
              credit consumption grows independently of headcount, enabling ARPU expansion within accounts that are not
              adding net new seats. The Ramp deployment (300 agents in a single account) illustrates how credit revenue
              could eventually exceed the base subscription revenue for high-automation enterprise accounts. Customer
              concentration risk is not quantifiable from public sources because Notion does not disclose the revenue
              contribution of its top accounts. However, the breadth of Fortune 100 penetration (62%) and mid-market
              presence suggests that no single customer is likely to represent more than 5% of ARR — a positive
              concentration indicator for a horizontal platform. Notion's partner ecosystem, documented on the
              notion.so/partners page, includes consulting and implementation partners who assist enterprise customers
              with Notion deployment and customization, indicating a growing services ecosystem that could drive
              indirect channel revenue and reduce churn through implementation lock-in. Geographic expansion into APAC
              (Japan, South Korea data residency; offices in Singapore, Tokyo, Seoul, Sydney) is being supported by
              local enterprise sales and success infrastructure, with GIC's partnership providing regional investment
              credibility that may accelerate APAC enterprise procurement decisions.
