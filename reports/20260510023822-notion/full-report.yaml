            body: >-
              Notion's product suite in 2026 comprises eight distinct modules, each targeting a specific knowledge-work
              use case while sharing the underlying workspace data model and permission layer. Notion Docs provides
              collaborative long-form document editing with AI writing assistance, inline comments, and version history.
              Notion Wikis provides a structured knowledge base with nested page hierarchies, access controls, and
              verification workflows for surfacing authoritative company information. Notion Projects integrates task
              management, Kanban boards, timeline views (Gantt-style), and workload views directly into the workspace so
              that project planning and documentation are co-located rather than siloed across separate tools. Notion
              Database underpins all structured data in the platform — customer records, content calendars, sprint
              backlogs — with support for 15 property types, relational linking, rollups, formulas, and API access.
              Notion AI Core (included in Business and above) provides AI writing assistance, automatic summaries,
              translation, Q&A over workspace content, meeting notes transcription, and AI-powered database queries.
              Notion Enterprise Search allows users to search across Notion content and connected third-party
              applications (Google Drive, Slack, Jira, GitHub, Salesforce) from a single search interface. Notion Sites
              allows teams to publish Notion pages as public websites with custom domains and SEO controls. Notion
              Calendar provides smart scheduling, meeting notes integration, and team calendar visibility. Notion Mail
              (beta as of 2026) integrates Gmail inbox management with AI-powered email actions and Notion workspace
              context. Together these modules position Notion as a replacement for multiple-tool stacks including
              Confluence (wiki), Jira (projects), Google Drive (docs), and Microsoft Outlook (calendar/mail).
