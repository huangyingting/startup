      - number: '2.3'
        title: Buyer, user, and payer segmentation — who pays, who uses, and how adoption starts
        blocks:
          - type: paragraph
            body: >-
              Notion's buyer map spans at least four distinct segments with different economic buyers, users, payers,
              and adoption triggers. In the individual and prosumer segment — students, freelancers, researchers, and
              solo creators — the buyer and payer are the same person, using personal credit cards for the free or Plus
              tier. This segment drives top-of-funnel volume but contributes little to enterprise ACV. In the startup
              and early-scale company segment, adoption typically starts with a small engineering or product team that
              adopts Notion for the company wiki and expands organically across functions. The economic trigger is pain
              with Confluence complexity or the absence of a company knowledge layer. The payer is usually the founder
              or early CTO, and the budget is informal and low. In the mid-market segment, adoption is more formalized:
              IT or operations leaders approve Notion as the official knowledge platform, departments own wikis, and the
              budget moves to a centralized software budget. Named customer stories support this: Ramp runs financial
              and operational workflows through Notion; Vercel uses it as an engineering knowledge base; Deel manages
              global HR operations documentation on the platform. In the enterprise segment, the economic buyer shifts
              to procurement, IT, or knowledge-management platform owners; the decision involves security review, SSO,
              SCIM provisioning, and compliance controls; and the contract is typically annual or multi-year. Toyota and
              OpenAI as named customers illustrate that the enterprise segment spans non-tech verticals and AI-first
              companies alike. The enterprise page's emphasis on CISO-ready controls, audit logging, and enterprise
              search corroborates that the enterprise buyer requires governance before deployment. A fifth segment —
              AI-first product teams like Cursor — uses Notion as structured context for agents and AI-assisted
              workflows rather than purely as a document repository, which adds a new adoption trigger tied to AI
              toolchain investments.
