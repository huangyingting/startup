      - number: '4.2'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >-
              Notion's funding history is characterized by a single well-documented late-stage primary round and
              materially conflicting aggregate funding figures from major investor databases. The Series D closed on
              September 28, 2021 according to Tracxn, raising $275 million at a $10 billion post-money valuation as
              reported by TechCrunch and CNBC at the time. This round was led by Sequoia Capital and included
              participation from Index Ventures and others. Prior to the Series D, Notion raised a Series C of
              approximately $50 million at a $2 billion valuation in April 2021, and a Series B of approximately $50
              million in April 2020. Total lifetime institutional capital raised is in material dispute: Forbes reports
              $330 million while Tracxn reports $418 million — an 87-million-dollar discrepancy that cannot be resolved
              from public sources and may reflect different treatment of secondary transactions, convertible notes, or
              international funding rounds. The most recent capital event is the January 2026 employee tender offer in
              which GIC, Sequoia Capital, and Index Ventures purchased approximately $270 million in shares from current
              and former Notion employees — a transaction that does not inject new primary capital into the company
              balance sheet but establishes the current $11 billion valuation reference. The tender offer structure is
              notable: it signals that existing investors are willing to increase their economic exposure at $11B, that
              employee liquidity was prioritized without a full secondary or IPO process, and that the company does not
              appear to need primary capital raise for operational reasons, which is consistent with the implied
              operating leverage of a $500M+ ARR SaaS business. Whether Notion has reached cash-flow breakeven or
              profitability is not publicly disclosed; prior investor communications suggested Notion has historically
              prioritized growth investment over profitability, but the current state of the income statement is a
              critical unresolved diligence item.
