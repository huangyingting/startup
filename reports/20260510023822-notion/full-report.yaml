  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Core Architecture
        blocks:
          - type: paragraph
            body: >-
              Notion is an all-in-one AI workspace platform that unifies six distinct product categories within a
              single, block-based data model: wikis and knowledge bases, collaborative documents, relational databases
              (Notion Database), project management (Notion Projects), enterprise search across connected applications,
              and autonomous AI agents (Custom Agents). The core architectural abstraction is the "block" — an atomic
              unit of content (text, image, embed, database row, AI action) that can be nested, linked, and rendered in
              multiple view types simultaneously. This block model enables Notion pages to serve as documents,
              structured databases, project boards, calendars, or AI-assisted workflows without requiring separate
              application contexts. The underlying technical infrastructure is built on Amazon Web Services (AWS) as the
              primary compute and storage layer, with Cloudflare providing CDN, edge security, DDoS mitigation, and
              globally distributed edge delivery. Data is organized by workspace, with per-workspace encryption at rest
              and in transit using AES-256 and TLS 1.2+. Notion's web application is a React-based single-page app with
              native iOS and Android mobile apps. As of the February 2026 release, Notion also ships Notion Mail
              (AI-assisted Gmail integration) and an enhanced Notion Calendar (meeting and scheduling intelligence) that
              extend the workspace into communication and time management workflows. Custom Agents (launched February
              24, 2026) operate within the workspace permission model and can read, write, and manipulate Notion pages,
              databases, and API connections using a prompt-driven instruction set backed by Notion's proprietary AI
              model routing.
