      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >-
              Notion was co-founded by Ivan Zhao (CEO) and Simon Last. Tracxn identifies both as co-founders, with Zhao
              serving as the primary external face of the company through product announcements and investor
              communications. Forbes confirms Zhao's CEO role in its company profile. Beyond the co-founders, Notion's
              full executive team composition, board of directors, independent director representation, and formal
              governance structure are not publicly disclosed in any source reviewed for this chapter. This represents a
              material information gap for governance diligence: investors cannot assess board independence,
              investor-seat allocations, or key-person succession arrangements from public materials alone.


              Tracxn places the company's founding in 2013, which this report treats as the reference year because it is
              the most specific primary-database source available. The Series D closed on September 28, 2021 per Tracxn,
              pushing the implied valuation to $10–11 billion. No material leadership departures, governance disputes,
              or regulatory sanctions were identified in the public source set reviewed for this chapter. Key-person
              concentration risk on Ivan Zhao—whose product philosophy and public persona are tightly coupled to
              Notion's brand—is a diligence item that later chapters should probe independently, particularly given the
              company's agentic AI pivot, which requires a credible technical leadership layer beyond the founding pair.
