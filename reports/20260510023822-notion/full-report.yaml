  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary — included spend, excluded spend, and status-quo substitutes
        blocks:
          - type: paragraph
            body: >-
              Notion's own product framing defines the market more precisely than any analyst category label. The
              product page describes a connected workspace combining wiki, docs, and projects; the enterprise page
              emphasizes AI-powered search, governance controls, and knowledge consolidation; and the
              product-development page positions Notion as an AI-workspace platform used by 94% of Forbes AI 50
              companies. Taken together, those frames place the included spend in at least four overlapping categories:
              (a) team wiki and knowledge base software — tools that store policies, runbooks, documentation, and
              institutional memory; (b) collaborative document editing — long-form documents, meeting notes, proposals,
              and project briefs; (c) project and work management — tasks, roadmaps, databases, and lightweight issue
              tracking; and (d) AI workspace — AI-assisted drafting, semantic search, knowledge synthesis, and
              agent-ready data structures. The excluded spend is large and important: CRM, email, video conferencing,
              enterprise resource planning, payroll, and security-monitoring software are all spend that Notion does not
              address. Broadly, any tool where structured transactional data, financial records, or real-time
              communications are the primary deliverable sits outside the boundary. The status-quo substitutes that
              Notion most often displaces are combinations of Google Docs plus Sheets plus Drive, Microsoft Word plus
              SharePoint plus Teams, Confluence plus Jira, and scattered Slack messages plus spreadsheets. None of these
              substitutes fails catastrophically; they degrade gradually into fragmentation and search failures, which
              is exactly the pain point Notion's marketing targets.
