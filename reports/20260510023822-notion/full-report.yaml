      - number: '6.2'
        title: Adoption Trajectory and Growth Signals
        blocks:
          - type: paragraph
            body: >-
              Notion's user growth trajectory has evolved through three distinct phases. The first phase (2016–2019) was
              bootstrapped word-of-mouth among power users and early adopters, culminating in a notable viral moment in
              2019 when the company reported its first million users in a single milestone announcement. The second
              phase (2020–2022) was pandemic-driven acceleration as remote work adoption created demand for flexible,
              cloud-native workspace tools, driving the user base from approximately one million to tens of millions and
              supporting the $10 billion Series D in September 2021. The third phase (2023–2026) is characterized by
              AI-driven expansion: Notion AI launched in February 2023, Custom Agents launched in February 2026, and the
              AI-enabled customer percentage of ARR doubled from approximately 20–25% to over 50% in the twelve months
              ending at year-end 2025. This transition from a document tool to an AI workspace has accelerated ARR
              growth without requiring proportional headcount expansion, as evidenced by CNBC's September 2025 report
              that Notion crossed $500 million ARR — implying significant revenue per employee. The platform's 1.4
              million community members and integrators represent a leading indicator of future enterprise adoption, as
              community-built templates, integrations, and use-case documentation lower the barrier to enterprise
              onboarding. The number of registered users crossing 100 million was announced by Notion as a milestone
              alongside the Custom Agents launch, suggesting the company uses user milestones strategically to signal
              momentum to enterprise buyers and media.
            claimRefs:
              - CU007
