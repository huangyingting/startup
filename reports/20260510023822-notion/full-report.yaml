      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: EU AI Act Compliance Gap
            body: >-
              Notion Custom Agents platform may fall under the EU AI Act limited-risk or high-risk classification for AI
              systems interacting with users or processing sensitive data. As of May 2026, Notion has not published an
              EU AI Act compliance roadmap or conformity assessment. For enterprise customers in EU-regulated industries
              (finance, healthcare, public sector), this gap could delay or block procurement approval, representing a
              material sales blocker risk for EMEA expansion.
            calloutType: risk
            claimRefs:
              - CR010
          - type: callout
            title: Prompt Injection Is the Top Operational Risk
            body: >-
              Notion explicitly acknowledges prompt injection as a risk in its Custom Agents architecture. Unlike
              traditional SaaS vulnerabilities, prompt injection attacks can cause agents to perform unintended actions
              including data deletion, unauthorized sharing, or external API calls without triggering conventional
              security alerts. The residual risk after guardrails remains high because no independent red-team audit
              results have been published and the attack surface expands with each new agent connector added to the
              ecosystem.
            calloutType: risk
            claimRefs:
              - CR019
              - CR041
          - type: callout
            title: Secondary Tender Does Not Replenish Cash
            body: >-
              The January 2026 $270M tender offer was a secondary transaction where GIC, Sequoia, and Index Ventures
              purchased shares from existing shareholders, not from Notion itself. Notion balance sheet did not receive
              those proceeds. Without visibility into primary capital raised, burn rate, or cash position, the company
              financing risk and runway cannot be assessed from public information alone. This is a blocking diligence
              gap.
            calloutType: insight
            claimRefs:
              - CR027
          - type: callout
            title: Five Priority Diligence Requests
            body: >-
              Before closing any investment: first, request EU AI Act readiness assessment and compliance roadmap for
              Custom Agents; second, NRR and GRR for trailing four quarters; third, cash position, burn rate, and
              primary capital history separate from secondary tender proceeds; fourth, independent red-team or
              penetration test results for Custom Agents platform; fifth, customer contract terms including SLA
              commitments and liability cap treatment in enterprise master service agreements.
