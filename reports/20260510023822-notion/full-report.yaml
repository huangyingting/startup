      - number: '2.4'
        title: Growth drivers, adoption constraints, and evidence gaps that remain open
        blocks:
          - type: paragraph
            body: >-
              Several growth drivers are durable. AI workspace demand is the most important: Notion's pricing page
              includes AI credits as a native component of paid tiers, its enterprise page emphasizes AI-powered search
              and governance, and the product-development page's 94% Forbes AI 50 penetration suggests that AI-first
              companies are already heavy users. Template and partner ecosystem effects create network-side stickiness:
              the 30,000-plus community templates on the template gallery increase the surface area of documented use
              cases, and the partner ecosystem spanning technology, solutions, and security-compliance specialists
              extends Notion's reach into enterprise procurement channels it cannot serve through a direct sales motion
              alone. The startup-program funnel is a long-tail acquisition engine that converts early-stage companies
              into potential enterprise accounts as they scale. Adoption constraints are equally real. The most
              structural is bundled competition: Microsoft 365 and Google Workspace are purchased by most enterprise IT
              organizations as the default document and collaboration layer, and their pricing includes word processing,
              email, calendar, video, and spreadsheet functions that create high switching inertia. A buyer choosing
              Notion for knowledge management must justify running a second collaboration platform on top of an
              already-purchased suite. Data sovereignty and self-hosting pressure is signaled by AppFlowy's positioning
              as an open-source alternative where users control their own data — a segment that Notion does not serve
              and that could become more material in regulated or government markets. Enterprise procurement friction —
              security reviews, SSO configuration, SCIM, data residency requirements — adds cycle time and limits the
              speed of bottom-up expansion into formal budget lines. The critical evidence gap is the absence of any
              public Notion revenue figure, ACV, or seat density data, which prevents verifying whether the enterprise
              penetration statistics translate into meaningful ARR, and limits outside investors' ability to size the
              SOM with confidence.
