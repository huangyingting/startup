            body: >-
              Notion maintains a public customer case library with named enterprise references that demonstrate
              production deployments across multiple verticals. The highest-quality customer evidence comes from Ramp, a
              financial technology company that deployed over 300 active Notion Custom Agents for financial operations
              workflows, including accounts payable automation, budget tracking, and spend analytics — with
              self-reported productivity gains. OpenAI, the world's most prominent AI company, uses Notion as its
              centralized company knowledge base; COO Brad Lightcap described a "campsite principle" in which every
              Notion page is left better than it was found, and engineering teams save approximately one hour per week
              in data science reporting through Notion AI. Figma, a design collaboration platform used by enterprise
              designers globally, uses Notion for team knowledge management and product documentation. Toyota, one of
              the world's largest automotive manufacturers, is a named Notion enterprise customer — a validation of
              Notion's ability to win Fortune 500 accounts in traditional industries rather than only technology-native
              companies. Additional named customers include Vercel (cloud deployment platform), Cursor (AI code editor),
              Clay (B2B data enrichment platform), and Deel (global HR and payroll). Remote, a global HR platform,
