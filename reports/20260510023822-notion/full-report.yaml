              launch of its AI agent, and the company's own January 2026 tender offer disclosure stating that AI-enabled
              customers represented more than 50% of ARR at year-end 2025 and that this percentage had more than doubled
              over the prior year. Together these data points imply that AI-driven ARR contribution grew from roughly
              20–25% of ARR in 2024 to greater than 50% by end of 2025, suggesting that the broader product upsell from
              free or basic plans to AI-enabled Business and Enterprise tiers was the primary growth engine in fiscal
              2025. The monthly revenue figure of approximately $41.7 million cited in Forbes — implying roughly $500M
              annualized — is directionally consistent with the CNBC figure but derives from a single unverified source
              and cannot be treated as audited. Notion's freemium model drives initial adoption at no cost but generates
              revenue primarily from four sources: per-seat subscription fees on Plus ($10/seat/month) and Business
              ($15/seat/month) plans, custom Enterprise contracts, usage-based AI credit purchases at $10 per 1,000
              credits, and Custom Agents credit consumption that became billable from May 4, 2026 after a two-month free
              beta. The credit-based AI layer represents a new and potentially significant revenue stream that had not
              fully ramped at the time of the $500M ARR disclosure, suggesting runway for further ARR expansion in 2026
              as credit consumption from the 1M+ deployed Custom Agents accumulates. No quarterly revenue breakdown,
