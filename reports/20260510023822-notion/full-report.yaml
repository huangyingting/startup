  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Base Overview
        blocks:
          - type: paragraph
            body: >-
              Notion's customer base spans a wide spectrum from individual knowledge workers and students on the free
              plan through mid-market teams on Plus and Business plans to global enterprise organizations on custom
              Enterprise agreements. The registered user base of over 100 million represents Notion's total addressable
              community, though the vast majority are on the free tier and do not directly contribute ARR. The paying
              customer base is segmented into four plan tiers: Free (zero revenue), Plus ($10/seat/month, targeting
              individuals and small teams), Business ($15/seat/month, targeting growing teams needing AI Core and SSO),
              and Enterprise (custom pricing, targeting large organizations with governance requirements).
              Geographically, Notion has a strong North American base (headquarters in San Francisco, largest office in
              New York), a growing APAC presence highlighted in the January 2026 tender offer (offices opened in
              Singapore, Tokyo, Seoul, and Sydney), and European customers subject to GDPR compliance requirements. By
              vertical, Notion's customer case evidence skews toward technology companies (OpenAI, Figma, Vercel,
              Cursor, Ramp), financial services (Ramp, Deel), automotive (Toyota), and professional services, though the
              platform's horizontal nature means it has penetrated virtually every industry vertical at some scale. The
              Fortune 100 penetration rate of 62% is notable for a company that does not disclose enterprise sales
              headcount, suggesting that the PLG model alone has driven significant enterprise land before any formal
              sales-assisted expansion. Over 50% of Y Combinator portfolio companies use Notion, reflecting deep
              entrenchment in the startup ecosystem that feeds the pipeline of future enterprise buyers as YC companies
              scale.
