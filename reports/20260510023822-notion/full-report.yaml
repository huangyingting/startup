      - number: '1.4'
        title: Product Evolution and Enterprise Traction
        blocks:
          - type: paragraph
            body: >-
              Notion's product has evolved through three visible phases: flexible note-taking and wiki tool (2013–2020),
              enterprise knowledge-management platform (2021–2024), and AI-agent workspace (2025–present). The agentic
              phase represents the most consequential strategic inflection: in February 2026 Notion launched Custom
              Agents for general availability and disclosed that teams had created more than one million agents during
              the beta. By May 2026 the company had released admin controls for Custom Agents and a Custom Agent
              Directory. Custom Agents are priced on a usage-credit model at $10 per 1,000 credits, with monthly shared
              credit allocations included in Business and Enterprise plans. Notion AI uses OpenAI and Anthropic as
              underlying model providers, and Enterprise plans receive zero-data-retention embeddings.


              Customer outcome evidence, drawn from Notion's own case studies, includes: Ramp cutting productivity-tool
              costs by 70% and running 300+ custom agents; Vercel shipping 35% faster and saving 9 hours per week;
              Toyota reducing approval timelines by 3×; Clay deploying 80+ agents in a single week; and Cursor reducing
              its tool count by 5× and eliminating information silos. These outcomes are self-reported by Notion and
              should be treated as company-claimed rather than independently verified. Enterprise security posture
              includes SOC 2 Type 2, ISO 27001, ISO 27701, ISO 27017, and ISO 27018 certifications, plus GDPR and CCPA
              compliance, HackerOne bug bounty, SAML, SCIM, and audit log support. Data residency is available in the
              EU, Japan, and South Korea.
