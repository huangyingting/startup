  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Notion operates in one of the most regulated data environments in enterprise SaaS. As a global platform
              processing personal data of users in over 100 countries, Notion is subject to the European Union General
              Data Protection Regulation (GDPR), California Consumer Privacy Rights Act (CCPA/CPRA), and a growing web
              of national AI governance frameworks. GDPR penalties can reach 4 percent of global annual revenue or 20
              million euros per violation, whichever is greater; for a company at $500M-plus ARR this translates to
              approximately $20M maximum exposure per incident. Notion Privacy Policy commits to EU Standard Contractual
              Clauses and provides EU data residency; however enforcement risk remains as EU regulators have shown
              willingness to fine major SaaS platforms. The EU AI Act effective August 2024 with phased enforcement
              through 2025-2026 classifies AI systems by risk tier; autonomous AI agents performing workplace tasks may
              qualify as high-risk or limited-risk systems requiring transparency disclosures and human oversight
              documentation that Notion Custom Agents does not yet fully address publicly. Privacy advocates raised
              concerns following the 2024 Skiff acquisition noting that Notion architecture does not offer user-level
              end-to-end encryption. Notion Terms of Service cap liability at the lesser of fees paid in the prior 12
              months or $500. HIPAA BAA availability provides a healthcare sector pathway but creates incremental
              compliance obligations. No material litigation has been publicly identified as of May 2026.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR009
              - CR010
              - CR012
