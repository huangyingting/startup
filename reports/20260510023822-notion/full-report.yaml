      - number: '3.4'
        title: Pricing Landscape and Competitive Market Positioning
        blocks:
          - type: paragraph
            body: >-
              Notion's pricing ladder spans a free tier suitable for individual use, Plus at $10 per member per month
              billed annually, Business at $15 per member per month with AI features and SSO included, and Enterprise at
              custom pricing with dedicated customer success management, SCIM provisioning, audit logging, and zero data
              retention with LLM providers. Custom Agents are available as a usage-based credits add-on priced at $10
              per 1,000 monthly credits for Business and Enterprise plans, following a free beta period that ran through
              May 3, 2026. Against this structure, Atlassian Confluence Standard is priced at approximately $5.75 per
              user per month and Confluence Premium at approximately $11 per user per month — placing Notion's Business
              plan at a slight premium to Confluence Premium on paper, though Notion bundles AI Core features in its
              Business tier. Monday.com's Business plan is $24 per seat per month billed annually — materially higher
              than Notion's equivalent tier. ClickUp's Business plan is priced at approximately $12 per member per
              month. Coda's Teams plan charges $30 per document maker per month in a document-maker-only model where
              viewers are free, which is structurally different from Notion's per-seat pricing. Nuclino and Slite offer
              lighter team wiki tools at $6–$8 per user per month, competing at the lower end of the segment. Notion's
              $10/$15 per-seat base pricing is well-positioned for mid-market buyers, and the credit-based AI layer
              creates an upsell mechanism that may expand average revenue per user as agent adoption grows. The primary
              pricing vulnerability remains Microsoft 365 and Google Workspace bundling: enterprise buyers already
              paying $22–$38 per user per month for M365 E3/E5 view supplemental wiki spending as incremental budget
              that must justify itself against built-in equivalents — a structural friction that Notion's migration
