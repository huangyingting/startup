  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >-
              The Notion investment thesis rests on five reinforcing pillars. First, category leadership: Notion is the
              G2-ranked number one knowledge base and AI enterprise search platform for three consecutive years, with
              100M-plus users and 62% Fortune 100 penetration representing a formidable distribution moat. Second,
              AI-enabled growth acceleration: over 50% of ARR at year-end 2025 came from AI-enabled customers, a
              percentage that more than doubled year-over-year, suggesting that AI monetization is not a future promise
              but a current revenue driver. Third, product velocity: the Custom Agents platform launched in February
              2026 with 21,000 agents built in beta and over 1M agents created post-launch, indicating strong developer
              and enterprise adoption of the automation layer. Fourth, global expansion: APAC growth was explicitly
              highlighted in the January 2026 tender offer communications, and data residency expansion to Japan and
              South Korea opens new enterprise markets. Fifth, platform stickiness: Notion's all-in-one workspace
              strategy creates deep workflow integration that is difficult to displace once embedded at the team level.
              The anti-thesis centers on three vulnerabilities: valuation multiple risk at 22x trailing ARR is stretched
              relative to public comps; NRR and gross margin are undisclosed, preventing independent assessment of unit
              economics; and competitive bundling from Microsoft Loop and Google Workspace at zero incremental cost
              represents a structural pricing threat that could compress Notion's net new customer economics in large
              enterprises.
            claimRefs:
