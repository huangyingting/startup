  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Notion competes across at least four overlapping product categories: team wikis and knowledge management,
              collaborative document editing, lightweight project and task management, and AI-augmented workspace
              infrastructure. This multi-category positioning creates an unusually wide competitive surface — no single
              competitor operates simultaneously in all four with comparable depth or scale. The primary direct
              competitors are Atlassian Confluence, supported by Atlassian's approximately $4.8 billion in FY2025 total
              revenues and deep integration with Jira and the broader Atlassian suite; Coda, a database-driven
              collaborative document platform; ClickUp, an all-in-one project management and wiki tool; Airtable, a
              database-first collaboration platform; and monday.com, a work management platform with FY2025 revenues
              exceeding $1 billion. Adjacent threats include Microsoft Loop bundled into Microsoft 365 enterprise
              suites, Google Docs and Sites bundled into Google Workspace, and a growing cluster of more focused tools
              including Nuclino, Slite, Obsidian, Fibery, and the fully open-source AppFlowy. Evernote competes in the
              consumer-facing note-taking segment but has limited enterprise relevance relative to Notion's go-to-market
              focus. Notion's strongest structural advantage across this field is its #1 G2 knowledge base ranking held
              for three consecutive years, its 100 million-plus registered users, and penetration figures of 62% of the
              Fortune 100 and 98% of the Forbes Cloud 100 — statistics that signal broad market presence in both
              enterprise and high-growth technology segments. However, the multi-category strategy also means Notion
              faces each specialist competitor on the latter's home turf, creating depth and performance trade-offs that
              informed users and review platforms have noted.
