      - number: '8.3'
        title: Financing and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Notion has raised approximately $330M to $418M in primary capital across multiple rounds since founding in
              2013. The most prominent disclosed rounds are a $50M Series B in 2021 and a $275M raise in October 2021 at
              a $10B valuation, with participation from Sequoia Capital, Index Ventures, and Coatue. The January 2026
              $270M tender offer was a secondary transaction orchestrated with GIC, Sequoia, and Index Ventures
              purchasing existing shareholder equity at an $11B valuation; Notion itself did not receive the proceeds,
              meaning the primary balance sheet position is not reflected in this event. The $11B valuation is therefore
              a secondary market clearing price confirmed by institutional investors rather than a primary capital
              raise. This is important for dilution analysis: incoming investors at $11B are buying into a
              capitalization structure whose exact preference stack, liquidation waterfall, and series-specific
              conversion terms are undisclosed. At $500M ARR and $11B valuation, the implied ARR multiple is
              approximately 22x trailing ARR. If Notion grows ARR to $650M by year-end 2026 at 30% growth, the implied
              forward multiple would be approximately 17x, which is more defensible relative to public comps. The
              absence of primary capital raises since 2021 suggests that Notion may be self-sustaining on existing cash
              reserves and operating cash flow, though this cannot be confirmed without audited financials. Any pre-IPO
              round or primary capital raise in 2026-2027 would be a significant signal for IPO timing and burn
              management.
            claimRefs:
              - CV001
              - CV012
              - CV013
              - CV014
              - CV008
              - CV009
              - CV025
              - CV033
      - number: '8.4'
        title: Bull, Base, and Bear Case Scenarios
        blocks:
          - type: paragraph
            body: >-
              The bull case for Notion assumes that Custom Agents become a standard enterprise workflow automation
              layer, contributing AI credits revenue on top of seat revenue and expanding ARPU by 40-60% over two years.
              In this scenario, Notion reaches $900M ARR by 2027 at 50% YoY growth, achieves NRR above 130%, and
              commands a 20-25x ARR multiple at IPO, implying a $18-22B valuation and a 60-100% return from the $11B
              entry point. The base case assumes 30% ARR growth sustained through 2026-2027, reaching $650M in 2026 and
              $850M in 2027. NRR is assumed at 115-120%, gross margin at 75-78% (consistent with SaaS peers), and IPO
              multiple at 14-18x ARR on $850M, implying a $12-15B valuation and a 20-40% return. The bear case assumes
              ARR growth decelerates to 15% YoY due to competitive bundling by Microsoft/Google, NRR falls below 110%,
              and multiple compression brings valuation to 8-12x ARR on $575M ARR in 2027, implying a $5-7B valuation
              and a 35-55% loss from entry. Probability-weighted expected value across the three scenarios (30% bull,
              50% base, 20% bear) implies an expected valuation of approximately $13B, suggesting approximately 18%
              upside from current entry — a moderate return for the risk profile. The key lever between scenarios is ARR
              growth rate, which is entirely dependent on Custom Agents adoption velocity and NRR trajectory. These
              metrics must be confirmed through management data room access before closing.
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV032
              - CV035
              - CV036
              - CV037
              - CV038
