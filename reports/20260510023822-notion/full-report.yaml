      - number: '1.3'
        title: Capital Structure and Funding History
        blocks:
          - type: paragraph
            body: >-
              Notion's capital profile is defined by a single high-profile late-stage round and materially conflicting
              aggregate funding figures from the two most credible public databases. Tracxn records a Series D closed on
              September 28, 2021 as the most recent identified institutional round; neither Forbes nor Tracxn lists
              subsequent public rounds, suggesting the company has been operating on its Series D capital and organic
              revenue growth since 2021. The post-money valuation at that round is reported at $10 billion (Tracxn) or
              $11 billion (Forbes); the two are directionally consistent and likely reflect pre- vs. post-money
              conventions or rounding.


              The conflict is sharper on total lifetime raised: Forbes reports $330 million while Tracxn reports $418
              million—a 27% discrepancy that cannot be resolved from public sources alone and is treated as an evidence
              gap. Monthly revenue is reported by Forbes at $41.7 million (implying roughly $500 million annualized),
              but this figure is unconfirmed by the company and relies on a single media source. Headcount is similarly
              contested: Forbes lists 1,300 employees while Tracxn lists 5,698, a 4.4× discrepancy that likely reflects
              different measurement methodologies, geographies, or contractor inclusion policies. Both figures should be
              treated with low confidence until the company discloses headcount in an investor update or regulatory
              filing. Notion's cap table structure, secondary transaction history, and debt or credit facilities are not
              publicly available.
