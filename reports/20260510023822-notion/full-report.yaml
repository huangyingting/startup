companyProfile:
  summary: >-
    Notion is an all-in-one AI workspace platform founded in 2013 and headquartered in San Francisco. The company offers
    wikis, docs, databases, project management, calendar, and AI agents in a single collaborative environment. With over
    100 million users worldwide, 62% Fortune 100 penetration, and ARR exceeding $500M as of September 2025, Notion is
    the market-leading knowledge management and productivity platform for teams ranging from startups to the largest
    enterprises.
  foundedDate: '2013-01-01'
  founders:
    - name: Ivan Zhao
      role: Co-founder & CEO
    - name: Simon Last
      role: Co-founder
  headquarters: San Francisco, California
  productSummary: >-
    Notion's core product is a flexible block-based workspace combining wikis, documents, databases, project tracking,
    and calendaring. In 2023 the company launched Notion AI for writing assistance and content generation. In 2026 it
    launched Custom Agents — autonomous AI agents that execute multi-step workflows across Notion and connected external
    services using a credits-based pricing model. The platform supports 1,000+ integrations and an active developer API
    ecosystem.
  customerFocus: >-
    Notion serves a broad spectrum from individual knowledge workers and startups (with a generous free tier) through
    mid-market teams to enterprise accounts including OpenAI, Figma, Ramp, Toyota, and Vercel. The go-to-market motion
    is product-led growth: individuals adopt Notion, then evangelize within their organizations. Over 50% of YC-backed
    startups and 62% of Fortune 100 companies use Notion in some capacity.
  businessModel: >-
    Notion operates a freemium seat-based SaaS model with four tiers: Free, Plus ($10/seat/month), Business
    ($15/seat/month), and Enterprise (custom). AI features are available as an add-on ($10 per 1,000 credits) on top of
    seat subscriptions. Custom Agents consume credits at usage-based rates. The model combines predictable seat revenue
    with a growing usage-based AI credits layer that scales with workflow automation adoption.
  stage: Late Stage Private
  fundingStatus: >-
    Notion has raised approximately $330M-$418M in primary venture capital since 2013, with the most prominent round
    being $275M in October 2021 at a $10B valuation. In January 2026 a $270M secondary tender offer was completed at an
    $11B valuation, with GIC, Sequoia Capital, and Index Ventures purchasing existing shareholder equity. No primary
    capital has been raised since 2021, suggesting operational self-sufficiency.
  disclosureProfile: private-undisclosed
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Notion is an AI-native workspace company headquartered in San Francisco, California, with additional
              offices in New York, Dublin, Hyderabad, Tokyo, Seoul, and Sydney. Founded in 2013 according to Tracxn
              (some secondary profile sources suggest alternative founding dates, a conflict this report cannot resolve
              without primary company disclosure), Notion began as a tool for structured notes and connected documents
              before expanding into a full-stack productivity and knowledge-management platform. The company's public
              mission is to make it possible for every person on earth to tailor their tools to their own needs, an
              aspiration reflected in its highly flexible block-based editor.


              As of May 2026, the product is positioned as an AI workspace that collapses conventional wikis,
              project-management tools, and document editors into a single connected surface augmented by 24/7 AI
              agents. Notion claims adoption by 98% of the Forbes Cloud 100 and 62% of the Fortune 100, indicating deep
              penetration in both high-growth technology companies and legacy enterprise environments. The company
              operates on a freemium SaaS model with tiered plans (Plus, Business, Enterprise) and a usage-based AI
              credit layer priced at $10 per 1,000 credits. Notion remains privately held, does not publish audited
              financial statements, and key metrics must therefore be derived from investor databases, media reports,
              and company-controlled communications, each of which carries its own verification limitations.
