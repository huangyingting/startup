      - number: '8.5'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >-
              Notion's best-fit public market comparables are enterprise collaboration and productivity SaaS companies
              with meaningful AI capabilities and strong PLG motion. Atlassian (TEAM) is the closest strategic
              comparable — a multi-product enterprise collaboration platform generating approximately $4.8B in FY2025
              revenue with a market cap of approximately $40-50B, implying an 8-10x trailing ARR multiple. monday.com
              (MNDY) reported revenue exceeding $1B in FY2025 with a market cap of approximately $11-13B, implying a
              11-13x ARR multiple — the closest multiple-to-scale reference for Notion. Asana (ASAN) is a weaker
              comparable given its single-product focus on project management, but provides a data point on PLG SaaS at
              lower scale. Smartsheet trades at a lower multiple reflecting its more legacy enterprise positioning.
              Notion's 22x implied ARR multiple represents a 70-100% premium to monday.com and a 150-175% premium to
              Atlassian. This premium is partially justified by Notion's faster ARR growth rate (estimated 40-50% YoY in
              2025 vs. 30% for monday.com and 25% for Atlassian), stronger AI monetization mix (50%+ AI ARR vs. emerging
              for peers), and private company illiquidity discount being absorbed into the price rather than added on
              top. However, the premium requires sustained outperformance to justify — any deceleration in ARR growth
              would compress the multiple toward the peer group, resulting in valuation erosion at the absolute dollar
              level even with revenue growth. Historical SaaS valuation data from the 2021 bubble period shows Notion's
              multiple is modest compared to peak 2021 multiples of 40-80x ARR for comparable companies, suggesting the
              current environment reflects a more rational pricing regime.
            claimRefs:
              - CV004
              - CV005
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV015
              - CV020
