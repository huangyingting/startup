      Flow diagram showing the logical path from key evidence inputs to the final buy recommendation with medium
      confidence. Starting from the confirmed $11B valuation and $500M-plus ARR evidence nodes, the flow passes through
      growth rate validation (50%+ AI ARR mix, Custom Agents traction), risk assessment (NRR opacity, competitive
      threats), scenario analysis (18% probability-weighted upside), and arrives at the recommendation node. The flow
      makes the data-to-decision chain explicit, highlighting that the key unresolved node is NRR data which would shift
      the confidence from medium to high.
