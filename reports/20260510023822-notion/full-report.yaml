  - id: FE001
    title: Notion Product Architecture Stack — Layers from Infrastructure to AI Agents
    type: stack
    summary: >-
      Stack diagram showing Notion's product architecture from infrastructure base through platform services to product
      modules and AI capabilities. The bottom layer is the cloud infrastructure (AWS + Cloudflare). Above it sits the
      core platform layer (block data model, REST API, permission system, encryption). The product layer comprises docs,
      wikis, projects, database, sites, calendar, and mail modules. The AI layer at the top adds AI Core, Enterprise
      Search, and Custom Agents that operate across all product modules. This architecture illustrates Notion's
      horizontal AI integration strategy rather than point-specific AI features.
    data:
      items:
        - label: Infrastructure (AWS + Cloudflare)
          value: 1
          unit: layer
        - label: Platform Services (block model, API, permissions, encryption)
          value: 2
          unit: layer
        - label: Product Modules (Docs, Wikis, Projects, Database, Sites, Calendar, Mail)
          value: 3
          unit: layer
        - label: AI Layer (AI Core, Enterprise Search, Custom Agents)
          value: 4
          unit: layer
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE015
  - id: FE002
    title: Custom Agent Workflow — Trigger-to-Output Execution Flow
    type: flow
    summary: >-
      Flow diagram illustrating how a Notion Custom Agent executes a multi-step automation task. The flow begins with a
      trigger (schedule, webhook, or manual activation), proceeds to the agent reading context from Notion databases and
      connected apps (Slack, GitHub, Jira), then performs LLM reasoning to determine next actions, executes write
      operations to Notion pages or external APIs, and produces a structured output (updated database row, Slack
      message, or email draft). Security controls (permission scoping, version control, audit logging) are applied at
      the execution and write layers.
    data:
      nodes:
        - label: Trigger (schedule / webhook / manual)
          description: Agent activation method
        - label: Context Retrieval (Notion DB + connected apps)
          description: Read Notion workspace and third-party data sources
        - label: LLM Reasoning Chain
          description: Multi-step reasoning; prompt injection guards applied
        - label: Action Execution (write to Notion / external API)
          description: Permission-scoped write operations; audit logged
        - label: Output (updated DB row / Slack message / report)
          description: Structured result delivered to workspace or external system
    claimRefs:
      - CE013
      - CE014
      - CE015
      - CE016
  - id: FE003
    title: Notion Developer Ecosystem — Critical Dependency Map
    type: dag
    summary: >-
      Directed acyclic graph showing critical dependencies in Notion's developer ecosystem. The Notion REST API is the
      central node on which SDKs, Custom Agent connections, third-party integrations, and the Enterprise Search
      connectors all depend. Frontier LLM model partners are a dependency for Custom Agents and AI Core features, while
      Cloudflare is a dependency for the API edge delivery. This dependency structure highlights that any disruption to
      the Notion REST API or Cloudflare edge could cascade across the entire developer-facing product surface.
    data:
      nodes:
        - label: Notion REST API
          description: Central integration hub; all developer integrations depend on this
        - label: JavaScript/TypeScript SDK
          description: notion-sdk-js; 12,000+ GitHub stars
        - label: Python SDK
          description: Official Python client library
        - label: Custom Agent Connections
          description: Slack, GitHub, Jira, Google Drive connectors
        - label: Enterprise Search Connectors
          description: Cross-app search feeds from third-party data sources
        - label: Frontier LLM Partners
          description: Undisclosed model providers powering Custom Agents and AI Core
        - label: Cloudflare Edge
          description: Edge delivery and security layer for all API traffic
        - label: Community Integrations (1.4M+)
          description: Third-party tools and automations built on the public API
      edges:
        - from: Cloudflare Edge
          to: Notion REST API
        - from: Notion REST API
          to: JavaScript/TypeScript SDK
        - from: Notion REST API
          to: Python SDK
        - from: Notion REST API
