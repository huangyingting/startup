companyProfile:
  summary: >-
    Notion is an all-in-one AI workspace platform founded in 2013 and headquartered
    in San Francisco. The company offers wikis, docs, databases, project management,
    calendar, and AI agents in a single collaborative environment. With over 100 million
    users worldwide, 62% Fortune 100 penetration, and ARR exceeding $500M as of
    September 2025, Notion is the market-leading knowledge management and productivity
    platform for teams ranging from startups to the largest enterprises.
  foundedDate: '2013-01-01'
  founders:
    - name: Ivan Zhao
      role: Co-founder & CEO
    - name: Simon Last
      role: Co-founder
  headquarters: San Francisco, California
  productSummary: >-
    Notion's core product is a flexible block-based workspace combining wikis,
    documents, databases, project tracking, and calendaring. In 2023 the company
    launched Notion AI for writing assistance and content generation. In 2026 it
    launched Custom Agents — autonomous AI agents that execute multi-step workflows
    across Notion and connected external services using a credits-based pricing model.
    The platform supports 1,000+ integrations and an active developer API ecosystem.
  customerFocus: >-
    Notion serves a broad spectrum from individual knowledge workers and startups
    (with a generous free tier) through mid-market teams to enterprise accounts
    including OpenAI, Figma, Ramp, Toyota, and Vercel. The go-to-market motion
    is product-led growth: individuals adopt Notion, then evangelize within their
    organizations. Over 50% of YC-backed startups and 62% of Fortune 100 companies
    use Notion in some capacity.
  businessModel: >-
    Notion operates a freemium seat-based SaaS model with four tiers: Free, Plus
    ($10/seat/month), Business ($15/seat/month), and Enterprise (custom). AI features
    are available as an add-on ($10 per 1,000 credits) on top of seat subscriptions.
    Custom Agents consume credits at usage-based rates. The model combines predictable
    seat revenue with a growing usage-based AI credits layer that scales with workflow
    automation adoption.
  stage: Late Stage Private
  fundingStatus: >-
    Notion has raised approximately $330M-$418M in primary venture capital since 2013,
    with the most prominent round being $275M in October 2021 at a $10B valuation.
    In January 2026 a $270M secondary tender offer was completed at an $11B valuation,
    with GIC, Sequoia Capital, and Index Ventures purchasing existing shareholder equity.
    No primary capital has been raised since 2021, suggesting operational self-sufficiency.
  disclosureProfile: private-undisclosed

