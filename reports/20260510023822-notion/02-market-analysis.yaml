tables:
  - id: TM001
    title: Market definition table
    columns:
      - segment/category
      - included spend
      - excluded spend
      - buyer/payer
      - relevance
    rows:
      - - Team wiki and knowledge base
        - Software for storing policies, runbooks, docs, and institutional memory across teams
        - Transactional databases, CRM, and ERP systems with record-of-system status
        - IT or knowledge-management platform owners / central software budget
        - Core Notion use case; directly competes with Confluence and Tettra
      - - Collaborative document editing
        - Long-form docs, meeting notes, proposals, project briefs, and shared writing surfaces
        - Email, video, messaging, and any tool where real-time communication is the deliverable
        - Team leads, operations, marketing / departmental SaaS budget
        - Competes with Google Docs, Notion Pages, Coda, and Word; strong Notion wedge
      - - Project and work management
        - Tasks, roadmaps, databases, lightweight issue tracking, and status dashboards
        - Dedicated CRM, service desk, financial planning, and payroll workflows
        - Product and engineering leaders / engineering or product tooling budget
        - Overlapping with Asana, monday.com, ClickUp, and Linear; Notion is less specialized
      - - AI workspace and knowledge synthesis
        - AI-assisted drafting, semantic search, knowledge synthesis, and agent-readable data
        - Standalone AI coding copilots without a workspace or knowledge-management layer
        - AI-first teams, engineering leaders / AI productivity budget
        - Fastest-growing lens; Notion AI and enterprise AI controls are primary differentiators
      - - Status-quo substitute stack
        - Google Drive plus Docs plus Sheets; Confluence plus Jira; SharePoint plus Teams; scattered notes
        - Situations where financial, legal, or operational transactional records are the core need
        - Existing enterprise suite owners / existing Microsoft or Google contract
        - Most common displacement target according to Notion customer and product messaging
    notes: >-
      Boundary is evidence-constrained and explicitly excludes spend that Notion does not address.
      The multi-category nature of the market means some rows overlap at the margin; the table
      maps the dominant spend lens for each category rather than claiming exhaustive separation.
    enumerationScope:
      coverage: partial
      basis: >-
        Rows cover the main categories supported by retained Notion product and customer evidence,
        but do not enumerate every knowledge-management or collaboration sub-segment globally.
