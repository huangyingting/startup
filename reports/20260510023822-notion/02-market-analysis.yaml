      - - Absence of Notion revenue disclosure limiting SAM and SOM quantification
        - constraint
        - current
        - Investors cannot verify penetration depth or revenue pool from public sources alone
        - Request management-disclosed ARR, ACV distribution, seat density, and enterprise NRR
