  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: evidence-gap
      missingEvidence: >-
        Notion-disclosed revenue, ARR, ACV distribution, and enterprise seat density data — the financial
        metrics required to construct a verified SAM or SOM.
      whyItMatters: >-
        Without Notion's internal revenue metrics, any market-share or SOM estimate relies on inference
        from user count and enterprise penetration statistics that do not reveal paid mix, contract sizes,
        or expansion rates. The pyramid and range figures in this chapter are illustrative rather than
        investor-grade.
      diligencePath: >-
        Request management-disclosed ARR, ACV quartiles, enterprise seat counts, and NRR during
        primary diligence. Ask for a segment breakdown by free, Plus, Business, and Enterprise tiers.
      relatedQuestionRefs:
        - QM002
        - QM003
        - QM024
      relatedTableRefs:
        - TM002
    - type: missing-source
      severity: material
      topic: market-size
      missingEvidence: >-
        Analyst market sizing specifically covering the overlapping docs/wiki/knowledge-base/project-management
        AI-workspace category as defined for Notion — not the broader collaboration market or the narrower
        project management market.
      whyItMatters: >-
        All available public market reports cover either too broad a category (all collaboration software)
        or too narrow a slice (project management only). Without a market-research source covering Notion's
        exact multi-category scope, the TAM remains a rough assembly of adjacent estimates rather than
        a sourced market figure.
      diligencePath: >-
        Commission or purchase a bespoke market sizing from Gartner, IDC, or Forrester covering the
        AI workspace and knowledge management software convergence category specifically. Review the full
        MarketsandMarkets collaborative productivity report for a headline TAM figure.
      relatedQuestionRefs:
        - QM001
        - QM014
      relatedTableRefs:
        - TM002
    - type: missing-source
      severity: material
      topic: competitor-market-share
      missingEvidence: >-
        Independent market share data for Notion versus Confluence, ClickUp, Airtable, Coda, and other
        direct substitutes — ideally from an analyst firm with seat-count or revenue-share methodology.
      whyItMatters: >-
        Without market share data, the segment/buyer map and adoption funnel are directional rather
        than precise. The absence of competitive market share data means that win/loss patterns and
        displacement rates are inferred from product and pricing positioning alone rather than verified.
      diligencePath: >-
        Request win-loss analysis data from Notion management. Search G2 Grid reports, Gartner Peer Insights,
        and Forrester Wave for knowledge management and collaboration platform market share. Request enterprise
        sales pipeline data showing primary competitive scenarios.
      relatedQuestionRefs:
        - QM012
        - QM025
      relatedTableRefs:
        - TM003
