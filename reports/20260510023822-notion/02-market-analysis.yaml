      - - Hybrid and distributed work patterns sustaining async knowledge demand
        - driver
        - current
        - Sustains demand for persistent, searchable, linkable knowledge rather than ephemeral chat
        - Request retention data segmented by distributed versus co-located customer organizations
      - - Template and partner ecosystem flywheel
        - driver
        - current
        - 30,000-plus community templates lower onboarding friction and expand documented use cases
        - Request template engagement metrics and partner-channel revenue contribution
      - - Startup-program top-of-funnel expanding the long-tail enterprise pipeline
        - driver
        - current
        - Converts funded startups at adoption into potential enterprise accounts at scale
        - Request startup-program cohort conversion rate from free or startup tier to Business/Enterprise
      - - Bundled suite competition from Microsoft 365 and Google Workspace
        - constraint
        - current
        - High inertia from already-purchased suites reduces willingness to add a second knowledge layer
        - Request win-loss data specifically against incumbent-suite displacement; ask for ICP criteria
      - - Data sovereignty and self-hosting demand signaled by open-source alternatives
        - constraint
