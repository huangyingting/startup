chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Notion competes in a uniquely multi-category market that spans knowledge management, team wikis,
    project management, collaborative docs, and AI-powered workspace — categories that do not cleanly
    map to a single analyst bucket or public revenue pool. The broadest proxy for the adjacent market
    is the combined public revenue of direct substitutes: Atlassian, monday.com, Smartsheet, and Asana
    together exceeded $7 billion in FY2024-FY2025 revenues, providing a lower-bound anchor without
    constituting a Notion-specific SAM. Notion's own penetration statistics — 100 million-plus users,
    98% of Forbes Cloud 100, and 62% of Fortune 100 — signal meaningful enterprise presence, but the
    absence of public revenue disclosure prevents construction of a verified bottom-up SAM or SOM.
    Demand drivers are real and durable (AI workspace adoption, tool consolidation, hybrid work), but
    constraints are equally visible: bundled suites from Microsoft and Google, data-sovereignty pressure
    signaled by open-source alternatives like AppFlowy, and enterprise procurement friction.
sections:
  - id: section-1
    title: Market boundary — included spend, excluded spend, and status-quo substitutes
    body: >-
      Notion's own product framing defines the market more precisely than any analyst category label.
      The product page describes a connected workspace combining wiki, docs, and projects; the
      enterprise page emphasizes AI-powered search, governance controls, and knowledge consolidation;
      and the product-development page positions Notion as an AI-workspace platform used by 94% of
      Forbes AI 50 companies. Taken together, those frames place the included spend in at least four
      overlapping categories: (a) team wiki and knowledge base software — tools that store policies,
      runbooks, documentation, and institutional memory; (b) collaborative document editing —
      long-form documents, meeting notes, proposals, and project briefs; (c) project and work
      management — tasks, roadmaps, databases, and lightweight issue tracking; and (d) AI workspace
      — AI-assisted drafting, semantic search, knowledge synthesis, and agent-ready data structures.
      The excluded spend is large and important: CRM, email, video conferencing, enterprise resource
      planning, payroll, and security-monitoring software are all spend that Notion does not address.
      Broadly, any tool where structured transactional data, financial records, or real-time
      communications are the primary deliverable sits outside the boundary. The status-quo substitutes
      that Notion most often displaces are combinations of Google Docs plus Sheets plus Drive, Microsoft
      Word plus SharePoint plus Teams, Confluence plus Jira, and scattered Slack messages plus
      spreadsheets. None of these substitutes fails catastrophically; they degrade gradually into
      fragmentation and search failures, which is exactly the pain point Notion's marketing targets.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
      - CM008
      - CM032
      - CM037
  - id: section-2
    title: Sizing lenses — public-comp anchors, penetration signals, and the limits of analyst estimates
    body: >-
      Because Notion is private and does not disclose revenue, constructing a Notion-specific TAM,
      SAM, or SOM from public sources requires using indirect lenses rather than verified numbers.
      The most defensible anchor is the combined public revenue of directly adjacent public companies.
      Atlassian's FY2025 total revenue was approximately $4.8 billion; monday.com's FY2024 revenue
      was approximately $966 million; Smartsheet's FY2025 revenue was approximately $1.1 billion;
      and Asana's FY2025 revenue was approximately $724 million. These four companies alone represent
      over $7.5 billion in annual revenues from tools that substantially overlap with what Notion
      delivers. That figure is a floor, not a ceiling: it excludes Coda, ClickUp, Airtable, Nuclino,
      Slite, Obsidian, Fibery, and the broader Google Workspace and Microsoft 365 document-workflow
      spend that Notion also competes against. The second lens is penetration statistics. Notion's
      claim of 100 million-plus users is cited on its product page, and the 98% Forbes Cloud 100 and
      62% Fortune 100 penetration figures appear on its enterprise page. These statistics indicate
      that Notion has already reached most of the highest-ACV enterprise accounts, even if conversion
      rates, seat depth, and actual contract sizes remain private. The third lens is market research:
      MarketsandMarkets publishes data on the collaborative office productivity tools market, which
      provides an adjacent sizing anchor, though it cannot be cleanly mapped to Notion's exact scope.
      The practical conclusion is that the total adjacent market almost certainly exceeds $15 billion
      in annual software spend when all substitutes are counted, but a clean Notion-specific SAM
      cannot be isolated from public sources, and any SOM estimate is speculative without revenue,
      seat count, or ACV data.
    claimRefs:
