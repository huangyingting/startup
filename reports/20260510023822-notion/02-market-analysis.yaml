  - id: FM004
    title: Adoption funnel and expansion path
    type: flow
    layout: standard
    summary: >-
      Notion adoption follows a bottom-up path that starts with individual or small-team use,
      expands through organic knowledge-base growth, and converts to enterprise contracts only
      after IT approval and governance review.
    data:
      nodes:
        - id: n1
          label: 'Entry: individual or small team adopts Notion free or Plus (wiki, notes, or project)'
        - id: n2
          label: Cross-functional expansion — more teams and departments add wikis and docs
        - id: n3
          label: 'Knowledge-base growth triggers pain: search fails, permissions need management'
        - id: n4
          label: Internal champion proposes formal adoption — IT review, SSO, SCIM setup
        - id: n5
