figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Constrained TAM/SAM/SOM estimate for Notion's overlapping market scope. All layers are
      evidence-anchored estimates, not company-disclosed or analyst-verified figures; the pyramid
      preserves uncertainty rather than overclaiming precision.
    data:
      items:
        - label: 'TAM — All docs/wiki/project-management/AI-workspace software spend (global, 2025 estimate)'
          value: 25
          unit: '$B (estimated midpoint; range $15–40B)'
        - label: 'SAM — Spend on tools substitutable by a unified Notion-style workspace (global, 2025 estimate)'
          value: 10
          unit: '$B (estimated midpoint; range $5–18B)'
        - label: 'SOM — Notion near-term capturable revenue given current penetration (2026 estimate)'
          value: 2
          unit: '$B (estimated midpoint; range $0.5–4B; unverified without Notion ARR disclosure)'
    approximationNotes: >-
      TAM midpoint of $25B is anchored by the $7.5B-plus public-comp revenue floor from Atlassian,
      monday.com, Smartsheet, and Asana (SEC filings) plus estimated adjacent spend from Google Workspace
      document workflows, Microsoft SharePoint, ClickUp, Coda, and Airtable that falls outside those
      four companies. SAM midpoint of $10B represents spend on tools that Notion could plausibly
      substitute — excluding spend locked into Microsoft/Google suites with deep transactional integration.
      SOM of $2B is a rough estimate based on 62% Fortune 100 penetration (likely high ACV) and a broad
      100M-plus user base (mostly low ACV or free); it is entirely speculative without Notion revenue data
      and should not be used in valuation models without management-disclosed ARR.
    claimRefs:
      - CM002
      - CM003
      - CM024
