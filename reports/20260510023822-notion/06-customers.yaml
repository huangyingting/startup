  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: Customer retention metrics (NRR, GRR, churn)
      missingEvidence: >-
        Notion has not published net revenue retention, gross revenue retention, customer churn rate, or cohort survival
        data for any plan tier or customer segment. The AI-enabled ARR expansion signal is the best available proxy but
        does not directly confirm NRR.
      whyItMatters: >-
        Customer retention is the single most important driver of ARR durability and long-term enterprise value. Without
        NRR, it is impossible to assess whether Notion's ARR growth is driven by durable expansion or masked by new
        customer acquisition offsetting high churn in the SMB free-to-Plus cohort.
      diligencePath: >-
        Request quarterly NRR and GRR by plan tier for the trailing eight quarters from Notion management data room.
        Conduct reference calls with churned enterprise customers to understand exit reasons. Request cohort survival
        data for 2023 and 2024 cohorts.
      relatedQuestionRefs: []
    - type: private-evidence-only
      severity: material
      topic: Named customer deal sizes and contract terms
      missingEvidence: >-
        No publicly named Notion customer has disclosed contract size, renewal rate, contract length, or pricing terms.
        The named customer list confirms breadth of enterprise adoption but does not allow quantification of ACV
        distribution or customer durability.
      whyItMatters: >-
        Average contract value and contract length drive LTV and churn risk modeling. Enterprise contracts with
        multi-year terms and high ACV represent qualitatively different ARR durability than month-to-month Plus
        subscriptions.
      diligencePath: >-
        Request ACV distribution by plan tier, contract length distribution, and renewal rate by cohort from Notion
        management data room. Conduct structured reference calls with 3–5 named enterprise customers to validate
        deployment depth and renewal intent.
      relatedQuestionRefs: []
    - type: enumeration-incomplete
      severity: minor
      topic: Named customer enumeration
      missingEvidence: >-
        Only 9 enterprise customers have been publicly named by Notion in its customer case library. The Fortune 100
        penetration claim (62%) implies at least 60 additional unnamed enterprise customers. The evidence base for named
        customer proof is therefore a small and potentially unrepresentative sample of the full customer base.
      whyItMatters: >-
        If named customers are cherry-picked to include only the most successful deployments, the observed outcomes (300
        agents at Ramp, 20 hours/week at Remote) may overstate the typical enterprise deployment outcome.
      diligencePath: >-
        Request a full enterprise account list with ARR contribution by tier from the Notion management data room. Ask
        for customer reference contacts from three verticals not currently represented in the public case library (e.g.,
        government, healthcare, retail).
      relatedQuestionRefs: []
      relatedTableRefs:
        - TU003
