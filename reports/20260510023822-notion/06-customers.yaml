callouts:
  - calloutType: strength
    title: Fortune 100 Penetration at 62% Without Disclosed Enterprise Sales Force
    body: >-
      The most striking customer traction signal is that Notion has penetrated 62% of the Fortune 100 without disclosing
      an enterprise sales organization of significant scale (headcount estimates range from 1,300 to 5,698). This
      implies that a substantial portion of the Fortune 100 penetration was achieved organically through PLG, with
      individuals and teams adopting Notion and eventually triggering enterprise procurement. This is a strong signal of
      product virality and enterprise-grade reliability, as Fortune 100 IT and security teams would not approve Notion
      without meeting their compliance requirements (SOC 2, ISO 27001, SAML SSO, SCIM, audit logs).
    claimRefs:
      - CU003
      - CU004
      - CU005
  - calloutType: risk
    title: Key Retention Metrics Entirely Unresolved — NRR, Churn, GRR Not Disclosed
    body: >-
      Notion does not disclose net revenue retention (NRR), gross revenue retention (GRR), churn rate, or customer
      cohort survival curves. The AI-enabled ARR expansion signal is consistent with NRR above 100%, but this inference
      is not confirmed. If Notion's SMB cohort churns at high rates offset by enterprise expansion, the net retention
      figure could be lower than its AI momentum implies. Any investment model built on Notion must carry a wide
      uncertainty band on retention, as the single most important driver of long-term ARR value — customer durability —
      is unverifiable from public sources and must be obtained from the management data room.
    claimRefs:
      - CU021
      - CU025
      - CU026
  - calloutType: insight
    title: Ramp and Remote as Enterprise AI ROI Proof Points — Highest Evidence Quality
    body: >-
      Among Notion's nine publicly named enterprise customers, only Ramp (300 agents, material cost savings) and Remote
      (20 hours/week saved) have quantified Custom Agents outcomes attributable to Notion specifically. These two data
      points are the highest-quality enterprise ROI evidence available for Notion's AI platform. Investors should weight
      these case studies heavily in AI adoption thesis validation and use them as reference call targets: speaking
      directly with the Ramp or Remote operations leads who deployed the agents would provide the most credible AI value
      assessment available outside of an audited financial data room.
    claimRefs:
      - CU014
      - CU020
      - CU028
