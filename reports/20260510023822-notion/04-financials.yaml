callouts:
  - calloutType: risk
    title: "No Audited Financials — Blocking Diligence Gap"
    body: >-
      Notion has not published audited financial statements and is not required to do so as a
      private company. All financial metrics referenced in this chapter — ARR, growth rate,
      AI-enabled customer mix — are either company-controlled disclosures in blog posts or
      media estimates from single sources. Any investment decision must be conditioned on
      obtaining audited financials, gross margin data, net revenue retention, and churn rates
      from a Notion management data room before closing. This is a blocking gap, not a minor
      caveat.
    claimRefs:
      - CI023
      - CI024
      - CI025
      - CI026

  - calloutType: strength
    title: "AI-Enabled ARR Acceleration — Strongest Financial Signal Available"
    body: >-
      The strongest financial signal publicly available is Notion's own disclosure that
      AI-enabled customers represented more than 50% of ARR at year-end 2025 — having more
      than doubled from approximately 20–25% the prior year. This implies that Notion is
      successfully converting its free user base to paid AI-enabled relationships at an
      accelerating rate, which is the most important leading indicator of future ARR growth
      and multiple expansion. If this trend continues, ARR growth could exceed 30% YoY in
      2026 as the Custom Agents credit layer adds an incremental usage-based revenue stream.
    claimRefs:
      - CI003
      - CI004
      - CI006
      - CI007

  - calloutType: assumption
    title: "Headcount and Revenue-per-Employee Estimates Are Highly Uncertain"
    body: >-
      This chapter's financial model assumptions are materially sensitive to headcount, which
      is contested by a factor of 4.4x between Forbes (~1,300) and Tracxn (~5,698). At $500M
      ARR, these imply revenue per employee of $385K or $88K respectively — the former
      consistent with a highly product-led efficiency model, the latter with a more traditional
      enterprise sales organization. Until headcount is verified, all per-employee productivity
      and expense-ratio estimates carry substantial uncertainty.
    claimRefs:
      - CI026
      - CI027
      - CI028

