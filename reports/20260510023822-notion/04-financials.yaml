  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Audited financial statements
      missingEvidence: >-
        Notion has published no audited financial statements, prospectus, S-1, or equivalent
        regulatory filing that discloses gross margin, operating income, churn rate, net revenue
        retention, or free cash flow. All revenue figures are from media estimates or
        company-controlled blog disclosures.
      whyItMatters: >-
        Without audited financials, it is impossible to verify the $500M ARR figure, assess
        the quality of revenue (recurring vs. one-time, gross vs. net), or model the income
        statement. This is the most critical blocking gap in Notion financial diligence.
      diligencePath: >-
        Request audited financial statements for FY2024 and FY2025 as a condition of investment
        from the Notion management data room. Obtain gross margin, NRR, churn, ACV, and
        operating income data before any investment committee decision.
      relatedQuestionRefs: []
    - type: missing-source
      severity: blocking
      topic: Net revenue retention and churn
      missingEvidence: >-
        No public source discloses Notion's net revenue retention (NRR) rate or customer churn
        rate by tier. NRR is the single most important financial metric for a SaaS company
        because it determines whether the revenue base is compounding or eroding.
      whyItMatters: >-
        If NRR is below 100%, Notion is churning more revenue from existing customers than it
        retains, which would require constant new customer acquisition to sustain ARR growth.
        An NRR of 120%+ (common for leading enterprise SaaS) would imply revenue compounding
        entirely from expansion within the existing customer base.
      diligencePath: >-
        Request NRR by plan tier and customer cohort from management data room. Conduct reference
        calls with churned enterprise customers to understand exit reasons.
      relatedQuestionRefs: []
    - type: conflicting-data
      severity: material
      topic: Total funding raised ($330M vs $418M discrepancy)
      missingEvidence: >-
        Forbes and Tracxn differ by $88 million in reported total institutional funding. The
        discrepancy cannot be explained by the known rounds and may reflect unreported instruments
        such as SAFEs, convertible notes, or international funding tranches.
      whyItMatters: >-
        The capital structure determines dilution, liquidation preference stack, and effective
        equity ownership. An unaccounted $88M funding tranche could alter cap table analysis
        materially.
      diligencePath: >-
        Request a complete cap table and funding history with liquidation preferences from Notion
        management as part of data room preparation. Reconcile against primary transaction
        documents.
      relatedQuestionRefs: []
    - type: missing-source
      severity: material
      topic: ARR growth rate and new vs expansion ARR split
      missingEvidence: >-
        The exact year-over-year ARR growth rate and the split between new customer ARR and
        expansion ARR within existing accounts are not publicly disclosed. The tender offer
        disclosure only states that growth "accelerated" and AI-enabled ARR percentage doubled.
      whyItMatters: >-
        ARR growth rate is the most fundamental input to DCF and exit multiple analysis.
        Without it, all valuation scenarios carry enormous uncertainty. The new/expansion split
        determines whether growth is driven by sales efficiency or product stickiness.
      diligencePath: >-
        Request quarterly ARR bridge reports (new ARR, expansion ARR, churn ARR) covering at
        least eight quarters from the management data room.
      relatedQuestionRefs: [QI024]
    - type: missing-source
      severity: material
      topic: Enterprise vs SMB revenue split
      missingEvidence: >-
        The revenue contribution from Enterprise vs SMB and Plus plan customers is not
        disclosed. This split is critical for assessing average contract value, sales efficiency,
        and gross margin, as Enterprise contracts typically carry higher ACV and lower churn.
      whyItMatters: >-
        A heavy SMB mix at $500M ARR would imply higher churn risk and lower gross margin
        than an Enterprise-weighted mix, materially affecting valuation and risk assessment.
      diligencePath: >-
        Request segment revenue breakdown by plan tier from management data room. Review
        Enterprise contract examples for ACV and term length characteristics.
      relatedQuestionRefs: [QI024]
    - type: missing-source
      severity: material
      topic: APAC revenue materiality
      missingEvidence: >-
        Notion's January 2026 tender offer disclosed APAC as a primary growth region but did
        not quantify APAC revenue contribution, growth rate, or customer count.
      whyItMatters: >-
        If APAC is a primary growth driver, then data residency regulations, currency risk,
        and GIC's APAC expertise become more material to the investment thesis than indicated
        by the headline ARR figure alone.
      diligencePath: >-
        Request geographic revenue breakdown by region for FY2024 and FY2025 from management
        data room. Assess data residency compliance requirements in key APAC markets.
      relatedQuestionRefs: []
