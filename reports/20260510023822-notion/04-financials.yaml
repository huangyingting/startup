  - id: FI003
    title: Notion Revenue Model — Freemium-to-Paid Conversion and AI Credit Upsell Flow
    type: flow
    summary: >-
      Flow diagram illustrating Notion's revenue model progression from free user acquisition
      through seat-based subscription conversion to AI credit upsell. The model has three
      distinct revenue layers: the free tier (100M+ users, zero revenue, drives virality),
      the seat subscription tier (Plus $10/seat, Business $15/seat, Enterprise custom), and
      the usage-based AI credit tier ($10 per 1,000 credits for Custom Agents, billable from
      May 2026). Each layer feeds the next through natural workspace expansion: individuals
      invite teams, teams upgrade to Business for AI Core, and AI-power-users consume credits
      via Custom Agents at scale. Ramp's 300+ agents illustrates how a single enterprise
      account can drive material credit revenue above the base subscription cost.
    data:
      nodes:
        - label: Free Tier (100M+ users)
          description: "Zero cost; drives organic virality and team discovery"
        - label: Plus Plan ($10/seat/mo)
          description: "First paid step; unlimited blocks, 90-day history, basic AI trial"
        - label: Business Plan ($15/seat/mo)
          description: "Full AI Core, SSO, private teamspaces, Enterprise Search"
        - label: Enterprise (custom)
          description: "SCIM, audit log, zero data retention, Custom Agents, CSM"
        - label: AI Credits ($10/1,000)
          description: "Usage-based layer; Custom Agents billable May 2026; variable upside"
    claimRefs:
