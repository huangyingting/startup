  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: Net revenue retention rate
      missingEvidence: >-
        Notion has not disclosed NRR or GRR for any period. This is a critical SaaS health
        metric that cannot be estimated from public information. Media estimates for comparable
        PLG companies range from 110 to 130 percent NRR.
      whyItMatters: >-
        NRR below 110 percent would suggest Notion is growing primarily through new customer
        acquisition rather than expansion, significantly increasing execution risk at the
        $11B valuation multiple.
      diligencePath: >-
        Request NRR and GRR for trailing 4 quarters, and cohort retention analysis by plan
        tier from the data room.
      relatedQuestionRefs: [QR021]
    - type: missing-source
      severity: material
      topic: EU AI Act compliance readiness
      missingEvidence: >-
        No public evidence of Notion having conducted an EU AI Act conformity assessment for
        Custom Agents or having published a compliance roadmap. EU AI Act enforcement for
        general-purpose AI model providers began August 2025 with phased rollout.
      whyItMatters: >-
        Enterprise customers in EU-regulated industries may require EU AI Act compliance
        documentation before approving AI-enabled Notion deployments, creating a potential
        sales blocker in EMEA.
      diligencePath: >-
        Request internal EU AI Act readiness assessment; ask legal team for AI risk tier
        classification analysis for Custom Agents; confirm LLM sub-processors have published
        EU AI Act conformity documentation.
      relatedQuestionRefs: [QR001, QR028]
    - type: private-evidence-only
      severity: material
      topic: GDPR enforcement posture
      missingEvidence: >-
        No EU DPA investigations, enforcement actions, or regulatory correspondence involving
        Notion were identified in public databases. This is partially reassuring but cannot
        confirm that no informal inquiries exist privately.
      whyItMatters: >-
        GDPR enforcement in the AI/SaaS sector has accelerated significantly post-ChatGPT.
        AI companies processing EU personal data are subject to increased DPA scrutiny,
        particularly regarding LLM sub-processor data flows.
      diligencePath: >-
        Request legal team disclosure of any open DPA inquiries, formal investigations,
        or regulatory correspondence received in the last 24 months, including informal
        requests for information from EU supervisory authorities.
      relatedQuestionRefs: [QR001]
