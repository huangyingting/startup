        regimes may apply as Notion expands: Japan APPI, South Korea PIPA, Brazil LGPD,
        Singapore PDPA, and sector-specific regulations in financial services and healthcare.
        FERPA and COPPA may apply for education-sector customers.
      whyItMatters: >-
        As Notion accelerates APAC growth highlighted in January 2026 tender offer
        communications, APAC data privacy compliance complexity increases materially
        and could require additional legal infrastructure investment.
      diligencePath: >-
        Commission legal counsel review of applicable data privacy and AI governance
