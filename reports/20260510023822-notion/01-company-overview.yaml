  evidenceGaps:
  - type: conflicting-data
    severity: material
    topic: total-raised
    missingEvidence: Certified cap table or company-disclosed total funding amount reconciling the $330M (Forbes) and $418M
      (Tracxn) figures
    whyItMatters: A 27% discrepancy in total capital raised materially affects ownership dilution estimates, leverage analysis,
      and any cash-efficiency benchmarking. Without a reconciled number, neither investor nor analyst can accurately model
      capital structure.
    diligencePath: Request certified cap table and round-by-round investor disclosure from Notion management or legal counsel
      in formal diligence.
    relatedQuestionRefs:
    - QO005
    relatedTableRefs:
    - TO001
    - TO003
    - TO004
  - type: conflicting-data
    severity: material
    topic: headcount
    missingEvidence: Primary source (LinkedIn data pull, company disclosure, or regulatory filing) for current employee count
      that reconciles the 1,300 (Forbes) and 5,698 (Tracxn) figures
    whyItMatters: A 4.4x discrepancy in headcount prevents meaningful burn-rate estimation, cost-structure analysis, and talent-concentration
      risk assessment. The lower figure implies a lean team; the higher figure implies a large enterprise workforce with different
      unit economics.
    diligencePath: Request current headcount by department from Notion management; cross-check against LinkedIn profiles and
      any regulatory filings.
    relatedQuestionRefs:
    - QO007
    relatedTableRefs:
    - TO001
  - type: enumeration-incomplete
    severity: material
    topic: governance
    missingEvidence: Full board of directors composition, independent director identification, investor board-seat allocations,
      and governance charter for Notion
    whyItMatters: Without board composition data, investors cannot assess board independence, key-person succession risk,
      or whether investor interests have adequate representation relative to founder control. This is a standard diligence
      requirement for any pre-IPO investment.
    diligencePath: Request board composition, governance charter, voting agreement, and investor rights agreement from Notion
      in formal diligence.
    relatedQuestionRefs:
    - QO010
    - QO009
    relatedTableRefs:
    - TO002
    - TO003
  - type: private-evidence-only
    severity: material
    topic: revenue
    missingEvidence: Audited or company-confirmed ARR, GAAP revenue, or gross margin data for any fiscal period
    whyItMatters: The only revenue figure available is Forbes's $41.7M monthly revenue estimate, which is a single secondary
      source and cannot be cross-checked. Without primary revenue disclosure, valuation multiples and growth-rate assessments
      rest on unconfirmed data.
    diligencePath: Request audited financial statements or investor-grade revenue schedules directly from Notion management.
    relatedQuestionRefs:
    - QO008
    - QO018
    relatedTableRefs:
    - TO001
  - type: missing-source
    severity: minor
    topic: competitive-positioning
    missingEvidence: Independent third-party analysis comparing Notion's AI-agent workspace positioning against Microsoft 365
      Copilot and Google Workspace AI, with specific capability gaps, pricing differentials, and switching-cost evidence
    whyItMatters: Notion competes with deeply embedded enterprise suites backed by Microsoft and Google; the competitive
      intensity and differentiation durability of Notion's agentic layer versus these incumbents cannot be assessed from
      company-owned materials alone. Buyers evaluating Notion often do so in a direct comparison with M365 and Google Workspace.
    diligencePath: Obtain analyst reports (Gartner, Forrester) or independent product benchmarks comparing Notion AI Agents
      with Microsoft Copilot Pages and Google Workspace AI; gather customer win/loss data from Notion's GTM team.
    relatedQuestionRefs:
    - QO020
