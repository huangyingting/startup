company:
  name: Notion
chapter:
  number: 1
  title: Company Overview
  summary: Notion is a San Francisco-based AI workspace company founded in 2013 (per Tracxn) by Ivan Zhao and Simon Last.
    It serves 62% of the Fortune 100 and 98% of the Forbes Cloud 100 with a connected wiki, project-management, and AI-agent
    platform. The company raised a reported Series D in September 2021, reaching an $11 billion valuation; total funding is
    disputed between $330 million (Forbes) and $418 million (Tracxn). Headcount is similarly contested (1,300 vs 5,698). A
    major agentic product pivot launched February 2026 with Custom Agents reaching one million creations in two months, signalling
    a shift from productivity software to autonomous enterprise AI infrastructure.
sections:
- id: identity-and-operating-model
  title: Identity and Operating Model
  body: 'Notion is an AI-native workspace company headquartered in San Francisco, California, with additional offices in New
    York, Dublin, Hyderabad, Tokyo, Seoul, and Sydney. Founded in 2013 according to Tracxn (some secondary profile sources
    suggest alternative founding dates, a conflict this report cannot resolve without primary company disclosure), Notion
    began as a tool for structured notes and connected documents before expanding into a full-stack productivity and knowledge-management
    platform. The company''s public mission is to make it possible for every person on earth to tailor their tools to their
    own needs, an aspiration reflected in its highly flexible block-based editor.


    As of May 2026, the product is positioned as an AI workspace that collapses conventional wikis, project-management tools,
    and document editors into a single connected surface augmented by 24/7 AI agents. Notion claims adoption by 98% of the
    Forbes Cloud 100 and 62% of the Fortune 100, indicating deep penetration in both high-growth technology companies and
    legacy enterprise environments. The company operates on a freemium SaaS model with tiered plans (Plus, Business, Enterprise)
    and a usage-based AI credit layer priced at $10 per 1,000 credits. Notion remains privately held, does not publish audited
    financial statements, and key metrics must therefore be derived from investor databases, media reports, and company-controlled
    communications, each of which carries its own verification limitations.'
  claimRefs:
  - CO001
  - CO002
  - CO003
  - CO008
  - CO009
  - CO030
  - CO042
  - CO045
- id: founders-leadership-and-governance
  title: Founders, Leadership, and Governance
  body: 'Notion was co-founded by Ivan Zhao (CEO) and Simon Last. Tracxn identifies both as co-founders, with Zhao serving
    as the primary external face of the company through product announcements and investor communications. Forbes confirms
    Zhao''s CEO role in its company profile. Beyond the co-founders, Notion''s full executive team composition, board of directors,
    independent director representation, and formal governance structure are not publicly disclosed in any source reviewed
    for this chapter. This represents a material information gap for governance diligence: investors cannot assess board independence,
    investor-seat allocations, or key-person succession arrangements from public materials alone.


    Tracxn places the company''s founding in 2013, which this report treats as the reference year because it is the most specific
    primary-database source available. The Series D closed on September 28, 2021 per Tracxn, pushing the implied valuation
    to $10–11 billion. No material leadership departures, governance disputes, or regulatory sanctions were identified in
    the public source set reviewed for this chapter. Key-person concentration risk on Ivan Zhao—whose product philosophy and
    public persona are tightly coupled to Notion''s brand—is a diligence item that later chapters should probe independently,
    particularly given the company''s agentic AI pivot, which requires a credible technical leadership layer beyond the founding
    pair.'
  claimRefs:
  - CO004
  - CO005
  - CO006
  - CO007
  - CO019
- id: capital-structure-and-funding-history
  title: Capital Structure and Funding History
  body: 'Notion''s capital profile is defined by a single high-profile late-stage round and materially conflicting aggregate
    funding figures from the two most credible public databases. Tracxn records a Series D closed on September 28, 2021 as
    the most recent identified institutional round; neither Forbes nor Tracxn lists subsequent public rounds, suggesting the
    company has been operating on its Series D capital and organic revenue growth since 2021. The post-money valuation at
    that round is reported at $10 billion (Tracxn) or $11 billion (Forbes); the two are directionally consistent and likely
    reflect pre- vs. post-money conventions or rounding.


    The conflict is sharper on total lifetime raised: Forbes reports $330 million while Tracxn reports $418 million—a 27%
    discrepancy that cannot be resolved from public sources alone and is treated as an evidence gap. Monthly revenue is reported
    by Forbes at $41.7 million (implying roughly $500 million annualized), but this figure is unconfirmed by the company and
    relies on a single media source. Headcount is similarly contested: Forbes lists 1,300 employees while Tracxn lists 5,698,
    a 4.4× discrepancy that likely reflects different measurement methodologies, geographies, or contractor inclusion policies.
    Both figures should be treated with low confidence until the company discloses headcount in an investor update or regulatory
    filing. Notion''s cap table structure, secondary transaction history, and debt or credit facilities are not publicly available.'
  claimRefs:
  - CO010
  - CO011
  - CO012
  - CO013
  - CO014
  - CO015
  - CO016
  - CO017
  - CO018
- id: product-evolution-and-enterprise-traction
  title: Product Evolution and Enterprise Traction
  body: 'Notion''s product has evolved through three visible phases: flexible note-taking and wiki tool (2013–2020), enterprise
    knowledge-management platform (2021–2024), and AI-agent workspace (2025–present). The agentic phase represents the most
    consequential strategic inflection: in February 2026 Notion launched Custom Agents for general availability and disclosed
    that teams had created more than one million agents during the beta. By May 2026 the company had released admin controls
    for Custom Agents and a Custom Agent Directory. Custom Agents are priced on a usage-credit model at $10 per 1,000 credits,
    with monthly shared credit allocations included in Business and Enterprise plans. Notion AI uses OpenAI and Anthropic
    as underlying model providers, and Enterprise plans receive zero-data-retention embeddings.


    Customer outcome evidence, drawn from Notion''s own case studies, includes: Ramp cutting productivity-tool costs by 70%
    and running 300+ custom agents; Vercel shipping 35% faster and saving 9 hours per week; Toyota reducing approval timelines
    by 3×; Clay deploying 80+ agents in a single week; and Cursor reducing its tool count by 5× and eliminating information
    silos. These outcomes are self-reported by Notion and should be treated as company-claimed rather than independently verified.
    Enterprise security posture includes SOC 2 Type 2, ISO 27001, ISO 27701, ISO 27017, and ISO 27018 certifications, plus
    GDPR and CCPA compliance, HackerOne bug bounty, SAML, SCIM, and audit log support. Data residency is available in the
    EU, Japan, and South Korea.'
  claimRefs:
