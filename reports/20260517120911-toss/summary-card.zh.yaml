summary:
  headline: Toss 是韩国估值最高的未上市金融科技公司，超级 App 模型已经跑通，收入也超过 $330M；但 $7.4B 的 2021 年估值正被 IPO 一再推迟、金融科技市场重估，以及各业务线尚未规模化证明持续盈利三件事挤压。
