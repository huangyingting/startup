  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: revenue
    missingEvidence: Viva Republica has not published audited financial statements or IFRS-compliant accounts
      in English since FY 2020 data was disclosed via Forbes. Revenue, gross margin, and net income for
      FY 2021-2025 are entirely undisclosed.
    whyItMatters: Without post-2021 financial data, it is impossible to assess whether Toss has achieved
      profitability, how Toss Bank's loan portfolio is performing, or whether the company can sustain
      operations through an IPO process.
    diligencePath: Request Viva Republica's audited Korean GAAP (K-GAAP) financial statements from DART
      (Data Analysis, Retrieval and Transfer System), South Korea's corporate disclosure system; Toss
      Bank as a licensed bank is required to publish financial statements under FSC regulations.
    relatedQuestionRefs:
    - QO009
    - QO026
    - QO029
  - type: private-evidence-only
    severity: material
    topic: governance
    missingEvidence: No public documentation of Viva Republica's board composition, governance structure,
      audit committee, investor board seats, or succession planning has been identified.
    whyItMatters: For a company at this stage and valuation, governance opacity creates risk around related-party
      transactions, capital allocation (e.g., the Tada acquisition), and alignment between founder and
      minority shareholder interests.
    diligencePath: Review Korean corporate registry filings (상업등기부등본) for board composition; request shareholder
      agreement disclosures from investor relations contacts at Altos Ventures, Kleiner Perkins, or Alkeon
      Capital.
    relatedQuestionRefs:
    - QO005
    - QO027
    - QO028
    relatedTableRefs:
    - TO002
  - type: missing-source
    severity: material
    topic: ipo-plans
    missingEvidence: No confirmed IPO prospectus, registration statement, or official Toss press release
      about the IPO has been identified as of the May 2026 run date. Reuters and Yonhap reports cite anonymous
      sources.
    whyItMatters: IPO timeline slippage from the originally targeted 2024-2025 window to unknown creates
      uncertainty about exit liquidity for existing investors and about the company's readiness for public
      scrutiny.
    diligencePath: Monitor Korea Exchange (KRX) and DART for any preliminary registration statements (예비심사청구서)
      filed by Viva Republica; track FSC announcements about Toss Bank's capital adequacy.
    relatedQuestionRefs:
    - QO016
    - QO017
    relatedTableRefs:
    - TO004
  - type: missing-source
    severity: material
    topic: regulatory
    missingEvidence: No specific FSC enforcement actions, corrective orders, or regulatory sanctions against
      Toss, Toss Bank, or Toss Securities have been identified in English-language sources. Korean-language
      regulatory filings were not reviewed.
    whyItMatters: As a regulated entity holding banking and brokerage licences in South Korea, any regulatory
      actions against Toss could constrain its business model or delay the IPO.
    diligencePath: Review FSC enforcement database in Korean; consult FSS (Financial Supervisory Service)
      public sanctions records; review Toss Bank's published regulatory capital ratios under Korean banking
      law.
    relatedQuestionRefs:
    - QO020
    - QO023
  - type: missing-source
    severity: minor
    topic: competition
    missingEvidence: Direct comparative data on Toss vs. KakaoBank (market share, revenue, loan-book size)
      in 2024-2026 was not identified in sources reviewed.
    whyItMatters: KakaoBank went public in 2021 and publishes audited financials. Comparing Toss Bank's
      metrics to KakaoBank's public disclosures would establish relative competitive positioning.
    diligencePath: Obtain KakaoBank's published annual reports from DART and compare user counts, loan-book
      size, NIM, and NPL ratios to Toss Bank estimates.
    relatedQuestionRefs:
    - QO022
  - type: enumeration-incomplete
    severity: minor
    topic: investors
    missingEvidence: The Viva Republica cap table, secondary transactions, and any debt or convertible
      financing are not publicly documented; GIC and Sequoia participation rounds are not precisely confirmed.
    whyItMatters: Knowing who holds what stake, and whether any secondary transactions or liquidation
      preferences exist, is essential for valuation and exit scenario analysis.
    diligencePath: Request investor schedule from Viva Republica investor relations; obtain Korean corporate
      registry (상업등기부등본) disclosing major shareholders; check D-Corp filings with the Korean Fair Trade
      Commission for affiliated entities.
    relatedQuestionRefs:
    - QO008
    - QO027
    - QO028
    relatedTableRefs:
    - TO003
  - type: missing-source
    severity: minor
    topic: international-expansion
    missingEvidence: No post-2021 data on Toss Vietnam's performance (user growth, revenue, or operational
      status) was identified in English-language sources. The last confirmed figure was 3 million monthly
      active users as of June 2021.
    whyItMatters: Vietnam is Toss's only confirmed overseas market; updated performance data would inform
      assessment of the international expansion thesis and any valuation premium assigned to it.
    diligencePath: Review Toss Vietnam's local social media and Vietnamese fintech publications; contact
      Toss investor relations for a Vietnam update; review any CIMB Vietnam announcements.
