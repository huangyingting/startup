acknowledgedWarnings:
- dimension: tableNotes
  reason: TO001 is a KPI snapshot table drawing directly from primary sources (TechCrunch, Forbes) cited
    in the table cells; the notes field already documents data vintage and gaps. The tableNotes warning
    is non-actionable because every cell already carries a source column and the notes field is populated
    with data-source context.
- dimension: paywallRisk
  reason: 11 of 28 sources are paywalled or blocked because Bloomberg, Reuters, and Nikkei are systematically
    bot-blocked for Toss coverage; all key factual claims are corroborated by the 17 fully-accessible
    sources including official Toss sites, TechCrunch, Forbes, CNBC, and Wikipedia. Paywall sources supplement
    but do not form the primary evidence base.
- dimension: unverifiedSource
  reason: Toss (Viva Republica) is a private Korean company with limited direct URL accessibility; cited
    URLs were identified via source-discovery passes referencing TechCrunch, Forbes, CNBC, Bloomberg,
    and official Toss properties, all representing best-available public documentation as of run date
    2026-05-17
