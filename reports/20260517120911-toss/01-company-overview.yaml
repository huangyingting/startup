company:
  name: Toss (Viva Republica)
chapter:
  number: 1
  title: Company Overview
  summary: Toss (operated by Viva Republica Inc.) is South Korea's leading fintech super-app, founded
    by former dentist Lee Seung-gun in 2013 and commercially launched in 2015 as a peer-to-peer money
    transfer service. Having raised $410 million at a $7.4 billion valuation in its Series G round (June
    2021), Toss has since expanded into internet banking (Toss Bank, launched September 2021), retail
    brokerage (Toss Securities), merchant payments (Toss Payments), insurance, and offline kiosks (Toss
    Place), becoming one of the most valuable privately-held fintech companies in Asia. Revenue reportedly
    tripled to approximately 390 billion Korean won (~$330 million) in 2020, and the company has been
    pursuing a KOSPI IPO, having reportedly engaged JP Morgan and Citigroup as advisers in early 2025.
sections:
- id: identity-and-business-model
  title: Identity and Business Model
  body: 'Viva Republica Inc. (Korean: 주식회사 비바리퍼블리카) is a Seoul-based private technology company operating
    under the consumer brand Toss (토스). Headquartered in the Gangnam District of Seoul, South Korea, Viva
    Republica was established in 2013 and launched its flagship Toss app commercially in 2015. The company
    describes itself as a financial super-app whose mission is to make every financial service simple,
    transparent, and accessible to all Koreans.

    The core business model is a multi-sided platform: Toss aggregates financial data (bank accounts,
    credit cards, loans, insurance policies) from partner institutions and surfaces them through a single
    mobile interface. Revenue is generated through multiple streams— transaction fees on P2P money transfers
    (historically free to build engagement, now a strategic asset), lead-generation and referral fees
    from partner banks and lenders (Toss connects users to credit products and earns referral income),
    interchange and merchant fees through Toss Payments, interest-rate margin through Toss Bank''s lending
    book, brokerage commissions through Toss Securities, and insurance distribution fees. Toss Bank, holding
    a South Korean internet banking licence, focuses specifically on consumer lending at competitive rates,
    differentiating itself from other challenger banks by leveraging proprietary transaction data to improve
    credit scoring and reduce delinquency rates.

    As of mid-2021, more than 20% of all bank accounts and credit cards in South Korea were registered
    on Toss, giving the platform extraordinary breadth relative to its home market. The company has also
    expanded to Vietnam (launched 2020) and explored further Southeast Asian markets, though the primary
    revenue base remains domestic.'
