      - number: '5.5'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              Toss 的金融业务在多套牌照制度下接受 Financial Services Commission（FSC）监管。Toss Bank 按 Internet Specialized Bank Act 运营，并于
              2021 年获得 FSC 牌照。Toss Securities 是 Financial Investment Services and Capital Markets Act
              下的持牌金融投资业务实体。支付子公司持有支付服务运营商牌照。这种多牌照架构带来显著合规义务，但也形成监管护城河：互联网银行牌照稀缺且很难取得。


              安全侧，Toss 对登录和高价值交易使用生物识别与 PIN 认证，并在所有支付流程中应用实时交易监控和 AML 控制。App 累计下载量超过 50
              million，说明用户信任持续存在。截至研究日期，公开资料中没有发现归因于 Toss 的重大数据泄露或监管处罚。关键尽调问题仍在于正式渗透测试证据、FSS 检查结论以及 Toss
