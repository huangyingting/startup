            title: 数据隐私监管执法会侵蚀所有韩国金融科技超级 App 的护城河
            body: >-
              2025 年 4 月，韩国金融监督院因 Kakao Pay 和 Toss 未经明确同意使用大规模用户数据，分别罚款 ₩15B 和
              ₩6B。这些执法行动显示，支撑韩国金融科技护城河的替代数据信用评分和数据网络效应打法，正受到更严格法律约束。未来执法或立法变化可能限制跨实体数据共享，缩小 Toss 自有信用模型与传统评分之间的竞争差距。
