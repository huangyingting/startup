      - number: '8.5'
        title: 退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              Reuters 在 January 2025 报道，Toss 已选择 JP Morgan 和 Citigroup 担任 IPO 主承销商，这是公开证据中最可信的一条，说明正式 IPO 流程已经启动。目标交易所是
              KOSPI；根据 CEO 2021 年表态，美国双重上市也在考虑中。不过截至 May
              2026，公开可得来源尚未确认正式招股书。承销商已进场、申报却未确认，这个缺口符合一种情形：流程在等待承销商要求的财务表现里程碑。IPO 延后模式已经横跨 2022、2023、2024，并可能延伸到
              2026，这带来的治理和信誉风险独立于底层财务指标。IPO 之外，并购仍是可能退出路径：Toss
              这一超级应用资产，可能吸引韩国大型金融集团，或希望进入韩国市场的区域科技平台。市场没有报道任何并购讨论。二级交易市场不透明，也没有证据显示 2021 年之后仍有交易按 $7.4B 估值完成。
            claimRefs: []
