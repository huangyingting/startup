      - number: '5.2'
        title: 技术架构
        blocks:
          - type: paragraph
            body: >
              Toss 工程团队搭建了基于微服务的后端，按金融领域边界拆分。Toss Payments 平台开放 REST API，让商户接入银行卡支付、虚拟账户转账和海外支付处理。Toss Payments
              开发者门户（developers.tosspayments.com）提供沙盒测试环境、React 和 JavaScript SDK 示例、AI 辅助代码生成以及实时开发者支持聊天，体现出开发者优先的商业支付策略。


              Toss Bank 在云基础设施上运行核心银行系统，不使用独立移动应用，而是通过内部 API 直接接入 Toss 超级 App。App 通过 FSC 监管的开放银行接口聚合了韩国 20%
              以上银行账户和信用卡注册数据，让 Toss 能近实时看到用户完整财务状态。这条实时数据管线支撑跨 App 余额同步，也驱动 Toss 的 AI 个性化和信用评分系统。Toss Bank 在 2023
              年实现首次年度盈利，说明纯云、嵌入 App 的银行模式在韩国可以跑出可持续单位经济。
