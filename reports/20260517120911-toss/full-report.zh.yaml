              年上市以来每年都扩展产品范围，并在客户基础增长快于 Toss 最近一次确认轨迹的同时，逐步缩小广度差距。竞争问题在于，KakaoBank 借助 KakaoTalk 的更强分发加入相邻产品时，Toss
