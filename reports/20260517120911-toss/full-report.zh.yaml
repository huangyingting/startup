      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              TAM（总可寻址市场）：Toss 覆盖多个垂直领域，没有单一公开估算能完整覆盖，因此需要多个视角。视角 1——自上而下看韩国金融服务：韩国约 42M 成年人口乘以每名成年人每年 $500–800
              的金融科技可服务支出估算，得到理论 TAM 为 $21B–34B。视角 2——分析师市场研究估算：Grand View Research、Mordor Intelligence 和 Statista 分别估算
              2024–2026 年韩国金融科技市场为 $10B–40B，CAGR 为 10–22%，但定义和方法不同，且多数报告在付费墙之后。视角 3——可比同业收入：KakaoBank 2025 年在约 $3B+
              收入基础上实现 ₩649.4B 营业利润（约 $448M），而 Toss Bank 合并收入未公开披露；三家互联网银行合计只占整体金融科技收入池的一小部分。

              SAM（可服务可寻址市场）：Toss 的 SAM 由韩国（公司持有所有活跃产品牌照，并拥有约 20M+ 用户）加上早期越南业务限定。在韩国，Toss 争夺估计 40M+
              拥有智能手机、可能使用数字金融服务的成年人。KakaoBank 26.7M 客户（2025 年底）和 2027 年 30M 目标，为互联网银行 SAM 提供锚点。Toss 更宽的超级 App SAM
              还包括韩国零售证券经纪市场（2021 年高峰期 16M+ 交易账户）和消费贷款市场；Toss 的贷款比价引擎聚合 30+ 家持牌贷款机构的报价。

              SOM（可服务可获取市场）：Toss 披露截至 2021 年中拥有 20M 韩国用户；该数字未公开更新。Viva Republica 披露 FY2020 收入 ₩390B（约 $330M），较上一年增长三倍。自
              2021 年以来，Toss 已推出 Toss Bank、Toss Securities 和 Toss Insurance 等独立子公司，均贡献合并收入基础。公司 2021 年 6 月 $7.4B Series G
              估值，以及 2023 年 2 月 SoftBank 等投资方后续 $405M 融资，意味着投资人预期收入会实质增长，但当前精确收入并未公开披露。要尽调 2021 年后实际 SOM 渗透率，需要非公开财务数据。

              多个分析师估算相互冲突：Grand View Research 和 Mordor Intelligence 发布的韩国金融科技市场数字因定义差异相差 2–4
              倍（是否纳入银行保险保费、信用卡交换费、政府支持的数字支付）。这些相互矛盾的估算被保留为明确的尽调缺口。
