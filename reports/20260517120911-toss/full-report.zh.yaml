companyProfile:
  summary: >-
    Viva Republica, Inc.（以 Toss 名义运营）是一家总部位于首尔的金融科技控股公司，2013 年由前牙医、后转型连续创业者的 Lee Seung-gun（SG Lee）创立。Toss 起步于点对点免费银行转账
    App，切入韩国复杂的电汇体系；此后演进为垂直整合的金融超级 App，覆盖 Toss Payments（商户收单）、Toss Bank（纯互联网银行）、Toss Securities（支持零股的零售证券经纪）、Toss
    Insurance（保险比价与分销）和 Toss Vietnam（国际扩张）。公司 2021 年 6 月完成 $410M Series G，投后估值 $7.4B，由 Alkeon Capital Management
    领投，Sequoia、SoftBank、GIC 和 Kleiner Perkins 参投。累计股权融资超过 $940M。收入从 2019 年到 2020 年增长逾三倍，约 $330M（390B KRW）。2021 年以来，Toss
    多次推迟 CEO 曾预计会在 2024 年发生的 IPO。截至运行日，公司尚未提交正式注册文件。
