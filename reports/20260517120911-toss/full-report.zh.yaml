    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              Viva Republica Inc.（韩文：주식회사 비바리퍼블리카）是一家总部位于韩国首尔的私营科技公司，以消费者品牌 Toss（토스）运营。Viva Republica 总部位于首尔江南区，2013
              年成立，2015 年正式推出旗舰 Toss App。公司将自身定位为金融超级 App，使命是让每一项金融服务都变得简单、透明，并能被所有韩国人使用。

              核心商业模式是多边平台：Toss 聚合来自合作机构的金融数据（银行账户、信用卡、贷款、保险保单），再通过一个移动界面呈现。收入来自多条线——P2P
              转账交易费（历史上免费以积累参与度，如今成为战略资产）、来自合作银行和贷款机构的获客与推荐费（Toss 将用户导向信贷产品并获得推荐收入）、通过 Toss Payments 获得的交换费和商户费用、通过 Toss
              Bank 贷款账簿获得的利差、通过 Toss Securities 获得的证券经纪佣金，以及保险分销费用。Toss Bank
              持有韩国互联网银行牌照，重点做有竞争力利率的消费贷款；它借助自有交易数据改进信用评分、降低逾期率，以此区别于其他挑战者银行。

              截至 2021 年中，韩国超过 20% 的银行账户和信用卡已注册到 Toss，按本土市场衡量，平台覆盖面极宽。公司也扩张到越南（2020 年上线），并探索过更多东南亚市场，但主要收入基础仍在韩国国内。
