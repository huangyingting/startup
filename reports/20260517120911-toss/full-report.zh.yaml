      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              Toss 及更广泛韩国金融科技市场的关键增长驱动：（1）韩国拥有全球最高水平的智能手机渗透率之一，4G/5G 覆盖近乎无处不在，各年龄层都有重度移动 App
              使用文化。世界银行将韩国列为数字金融和创新的全球领先者，在 2025 年全球创新指数中排名第 4。（2）年轻、移动优先的消费者（18–35 岁）对用金融科技替代传统银行服务接受度高，背后是不满传统 UX
              和收费结构。（3）无现金商业的长期迁移：韩国政府积极推动二维码支付和数字钱包，加速商户采用 App 支付受理。（4）传统银行惰性：韩国传统银行（KB
              Kookmin、Shinhan、Hana、Woori、NH）历史上开户和转账流程摩擦重，留下大规模可服务痛点。（5）信用评分基础设施缺口：相当一部分韩国年轻成年人和自雇者缺乏传统征信局给出的优质信用评分，为
              Toss 的替代信用评分和贷款匹配平台创造了大市场。

              关键约束：（1）信任与主银行惯性：多数韩国消费者仍把主要银行关系放在持牌商业银行；新型银行通常是次级账户，限制存款余额和净息收入。KakaoBank 2025 年底 ₩68.3T
              存款基础证明这道鸿沟可以跨过，但用了 8 年以上。（2）监管资本要求：运营 Toss Bank 需要维持 FSC 设定的资本充足率，限制杠杆和增长速度。（3）新型银行三寡头内部竞争：KakaoBank 已有
              26.7M 客户，K Bank 也在快速新增客户，韩国新型银行总市场正在三家持牌机构之间分化；自然份额增长需要实质产品差异化。（4）证券和保险监管复杂度：Toss Securities 和 Toss
              Insurance Broker 需要单独 FSC 牌照，扩展到新金融产品（住房贷款、衍生品）还需要额外批准。（5）国际规模有限：Toss
              主要在韩国运营，除早期越南业务外，国际市场暴露有限。这种地理集中带来单一国家监管和宏观风险，与拥有多市场分散的 Revolut 和 Nubank 形成对比。
