      - number: '4.5'
        title: 资本充足率与融资依赖
        blocks:
          - type: paragraph
            body: >
              Toss 的资本结构反映了其历史：一家风险投资支持的私营公司，在多个受监管业务线上高速增长、且盈利前持续投入。公司概况章节记录了完整融资时间线；本节聚焦未来资本充足率。

              **历史融资摘要（财务背景）：** 截至 2021 年 6 月 Series G，Viva Republica 已累计融资超过 $940 M。多篇可信报道显示，公司在 2022–2023
              年又完成后续融资（不同报道称 SoftBank 等投资方投入 $405 M，使累计融资约为 $1.5 B+），但无法从可直接访问来源确认具体轮次细节。

              **Toss Bank 资本充足率：** 作为持牌银行，Toss Bank 必须在韩国 Banking Act 和 FSC 指引下维持最低资本比率。韩国互联网银行必须维持最低 BIS 比率（通常
              8%+）。Toss Bank 贷款账本快速增长，需要母公司 Viva Republica 持续注资以维持监管资本比率。这带来可预见、但规模可能很大的资本依赖，而且不受母公司自身融资上限约束。

              **IPO 轨迹：** 截至 2024 年初，Reuters 和 Bloomberg 报道称 Viva Republica 目标在 2025 年 IPO，并考虑韩国 +
              美国双重上市。这将是公司的主要流动性事件，也是投资者回收资本的重要机会。2021 年 Series G 中 CEO 的表述指向“再进行一轮私募融资后三年”上市——隐含 2024/2025 年 IPO。截至
              2026 年 5 月，IPO 尚未公开宣布，说明时间表已经推迟，或流程仍在推进。

              **现金头寸与烧钱速度：** Viva Republica 未披露现金头寸、月度烧钱或现金跑道。考虑到一个 4,000+
              员工组织（根据招聘信息估计）同时运营银行、券商、支付处理商和保险聚合器，当前规模下年运营费用估计为 $500 M–$1.0 B。如果公司如报道所称在 2024 年实现盈利，烧钱为零或转正；2023
              年前运营亏损可从 2020 年基线估计（收入 $330 M、亏损 72.5 B KRW / ~$61 M）。

              **债务与项目融资：** Toss Bank 作为吸收存款机构，可进入韩国同业融资市场，并以零售存款作为贷款账本资金来源。这不是股权资本依赖，而是正常银行负债。零售存款规模和同业融资成本未公开披露。
            claimRefs:
              - CI025
              - CI026
              - CI027
              - CI028
              - CI029
