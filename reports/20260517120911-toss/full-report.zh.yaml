        - 生死攸关——没有替代牌照制度
        - FSC 吊销或暂停 Toss Bank 牌照
        - 致命
        - 持续满足资本合规；保持监管沟通
        - 生死攸关；概率低；但非零
      - - Kakao 生态（KakaoTalk、KakaoPay、KakaoBank）
        - Kakao Corp.
        - 拥有 54M 用户分发的主导型竞争超级应用
        - 高——替代性超级应用生态
        - 用户迁移到 Kakao 的一体化金融服务
        - 高——用户与收入流失
        - 更快产品迭代；聚焦细分客户
        - 偏高——Kakao 的分发护城河具备结构性
      - - CIMB Bank Vietnam
        - CIMB Group Holdings
        - 越南业务的本地银行合作方
        - 越南业务高——未披露替代方
        - CIMB 退出合作或出现监管冲突
        - 中——拖累东南亚扩张
        - 合作协议；Toss 提供运营投入
        - 未量化；治理条款未公开
      - - Korea Credit Bureau（KCB）
        - KCB（Korea Credit Bureau）
        - 信用评分和回测验证合作方
        - Toss Bank 信用模型校准依赖高
        - KCB 撤回数据访问或调整评分基础设施
        - 中——需要重新校准信用模型
        - 自有补充数据（行为、交易历史）
        - 中等；Toss 模型纳入 KCB 以外信号
      - - 云 / 基础设施供应商
        - 未披露（可能是 AWS 或同等级供应商）
        - 核心计算、存储和网络
        - 很高——未披露多云策略
        - 供应商宕机或终止合同
        - 高——所有服务中断
        - 标准云灾备；韩国 FSC 合规框架
        - 中等——韩国金融科技同业普遍面临
      - - 应用商店平台（Apple App Store、Google Play）
        - Apple / Google
        - 移动端分发
        - 高——没有可规模化替代分发渠道
        - 应用商店政策变化或下架
        - 中——获客和更新分发受阻
        - 未披露缓释措施
        - 中等；标准应用生态依赖
    notes: 合作伙伴依赖风险基于已披露合同关系和公开文件评估；自有合同条款和 SLA 细节无法审阅。
  - id: TR004
    title: 人才 / 执行风险登记表
    columns:
      - 角色 / 职能
      - 依赖或缺口
      - 可能性
      - 严重性
      - 缓释措施
      - 尽调路径
    rows:
      - - SG Lee（创始人 / CEO）
        - 战略、文化和监管关系全部集中在一人身上
        - 低至中（自愿离职；健康；监管行动）
        - 致命——失去主要架构师和监管关系负责人
        - 未公开接班计划；董事会构成未披露
        - 向管理层索取接班框架和董事会章程
      - - 监管事务能力
        - 6 家持牌实体都需要深度 FSC/FSS 关系
        - 低（Lee 自 2014 年起管理监管关系）
        - 高——关系管理失效会带来牌照风险
        - Lee 离职后存在机构知识流失风险
        - 确认第二、第三梯队监管负责人
      - - 财务 CFO / 资本市场负责人
        - IPO 准备需要有公开市场经验的 CFO
        - 中（IPO 延迟；CFO 梯队深度未知）
        - 高——IPO 执行风险；投资者信心缺口
        - 未披露；公开资料未找到具名 CFO
        - 确认 CFO 任期和上市公司财务经验
      - - 信用风险管理团队
        - Toss Bank 贷款组合表现取决于模型和人工监督
        - 低至中（模型为自研；团队经验未知）
        - 高——信用周期亏损；资本受损
        - KCB 合作提供外部模型验证锚点
        - 索取 CRO 履历和信贷委员会治理结构
      - - 多业务线工程 / 产品人才
        - 同时扩张六条产品线；首尔人才战激烈
        - 中（首尔科技人才市场竞争激烈）
        - 中——产品执行延迟；质量漂移
        - 有竞争力薪酬；股票期权
        - 确认各事业部员工增长和自愿离职率
    notes: 人才风险评级为分析师根据公开披露、LinkedIn 数据和媒体报道给出的评估；内部接班计划和股权授予安排未公开。
  - id: TR005
    title: 缓释与终止标准表
    columns:
      - 风险
      - 可监测触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 数据隐私事件复发
        - FSS 或 PIPC 向 Viva Republica 或任一子公司发出新的调查通知
        - 2026 年 5 月后，FSS 或 PIPC 开启任何新的正式调查
        - 重大损害；重新评估监管关系；降低仓位
      - - Toss Bank 牌照吊销
        - FSC 向 Toss Bank 发出业务改进令或停业通知
        - FSC 采取罚款以外执法行动（业务限制或暂停）
        - 投资逻辑破裂；全仓退出
      - - IPO 估值下轮
        - Toss 以低于 $7.4B 的估值提交 S-1 或 KRX 上市申请
        - 上市估值 < $6.0B（较 Series G 折价 >20%）
        - 重新测算增长模型；重估股权价值
      - - 信用模型失效
        - Toss Bank 在任一披露期内不良贷款率（NPL）超过 3%
        - NPL 率 > 3%，或季度贷款损失拨备 > ₩100B
        - Toss Bank 子投资逻辑破裂；重估集团整体投资逻辑
      - - SG Lee 离职或遭监管行动
        - Lee 公开卸任、休假，或被列入 FSS/PIPC 调查
        - 任何经确认的离职公告或监管点名
        - 投资逻辑破裂；30 天内全面复核
      - - KakaoBank 市占率拐点
        - KakaoBank 互联网银行存款份额超过 50%，或 Toss Bank 存款增长连续两个季度同比下降
        - KakaoBank 连续两期文件显示市占率持续逆转
        - 竞争逻辑削弱；下调估值模型中的增长溢价
      - - Kakao 超级应用上线借贷
        - Kakao 在 KakaoTalk 推出面向次优或近优客群的一体化信贷产品
        - 产品发布公告和用户采用证据
        - 竞争替代加速；Toss Bank 净息差扩张概率下降
    notes: 缓释评估基于公开信息；有效性评级为指示性判断，需管理层确认内部控制状态。
  - id: TV001
