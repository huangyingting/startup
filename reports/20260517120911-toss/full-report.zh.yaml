            body: >
              KakaoBank 的公开财务（KRX: 323410）为韩国互联网银行 SAM 提供了少见的主要来源锚点：截至 2025 年底存款 ₩68.3T、贷款 ₩46.9T，非息收入 ₩1.09T 首次突破
              ₩1T。这证明韩国数字原生银行可以达到有意义的存款规模和平台收入，也为三家互联网银行市场设定了可信下限。
