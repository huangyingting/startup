      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Toss 通过六个持牌实体（Toss Bank、Toss Payments、Toss Securities、Toss Insurance、Toss Feed 和核心 App）运营，接受 Financial
              Services Commission（FSC）及其执行机构 Financial Supervisory Service（FSS）监管。截至 2026 年 4 月，FSC 主席为 Lee
              Eog-weon。监管方已证明愿意开出实质处罚：2024 年，FSS 因 Toss（Viva Republica）在 2021 年 11 月至 2022 年 4 月未经用户同意使用超过 29 million
              条消费者记录，对其罚款 ₩6 billion。同一轮执法中，KakaoPay 因未经授权向 Alipay 传输数据，被 FSS 罚款 ₩15 billion，并被 Personal Information
              Protection Commission 罚款 ₩5.9 billion，给出了清晰的严重度基准。韩国 PIPA 允许对重大数据违规处以最高相关收入 3% 的罚款，意味着以当前 Toss 规模再犯，罚款可能是
              2024 年处罚的数倍。监管风险还被 FSC 2026 年 4 月修订的云 SaaS 网络分离规则放大：后台职能免于沙盒预审批，但围绕个人身份和信用信息的要求收紧——直接限制 Toss Bank
              在核心银行技术栈上部署 AI 和云服务。SG Lee 曾花一年多说服监管机构在 2015 年允许 Toss 初始转账产品上线；监管关系持续存在，但每增加一张产品牌照，合规负担都会变重。
