      - number: '6.2'
        title: 客户增长轨迹
        blocks:
          - type: paragraph
            body: >
              Toss 于 2015 年以 Venmo 式点对点转账服务上线，并在 2018 年成长为独角兽。到 2019 年中，它已有 14 million 注册用户，累计促成超过 $48 billion
              支付，在一个由传统银行主导的市场里证明了快速采用。平台的低摩擦入门策略——一键转账、不需要二次 App 认证——靠口碑带动病毒式增长。2021 年 6 月 Series G 披露 20 million 注册用户和
              11 million MAU，同时 Toss Securities 上线三个月拿到 3.5 million 用户、Toss Bank 于 2021 年 9 月上线。到 2025 年 1 月，累计下载量已超过 50
              million，这一数字由 Korea Times 报道。2020 年收入增长超过三倍，达到约 $330 million（390 billion won）。从上线到 Series G
              的增长轨迹，意味着用户基数大约每 18–24 个月复合翻倍。Toss Bank 连续四年被 Forbes 评为韩国排名第一银行，再加上超级 App 中提供 40 多项金融服务，说明用户基础正从最初 P2P
              转账场景继续加深参与。
