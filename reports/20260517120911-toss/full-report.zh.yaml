      - number: '2.5'
        title: 尽调缺口与相互矛盾的估算
        blocks:
          - type: paragraph
            body: >
              几个实质缺口限制了本市场分析的精度：（1）Toss 2021 年后的收入和用户数：Viva Republica 是私营公司，自 FY2020 以来没有发布经审计财务。最近公开披露的收入数字是 FY2020 的
              ₩390B，公开来源无法量化当前 SOM 渗透率。（2）Toss Bank 贷款账簿和存款基础：KakaoBank 按季度发布财务（KRX 上市），但 Toss Bank 资产负债表不可公开获得。监管申报系统
              DART 包含部分披露，但完整数据需要获取提交给 FSC 的报告。（3）韩国金融科技 TAM 估算冲突：Grand View Research、Mordor Intelligence 和 Statista
              对同一地域和时间窗口发布的市场规模从 $10B 到 $40B+ 不等，反映口径定义不一致（信用卡交换费、银行保险、机构数字支付被纳入或排除，且没有统一方法）。（4）Toss Securities
              市场份额：2021 年高峰期韩国有 40M+ 个活跃零售证券账户，可服务市场很大，但繁荣之后可持续交易量不确定。Toss Securities 实际市场份额未公开披露。（5）越南市场贡献：Toss
              在越南运营，但当地收入、用户或市场份额数据均未公开。
