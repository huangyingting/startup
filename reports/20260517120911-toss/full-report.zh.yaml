      - - 风险评级
        - 高
        - 2022 年创纪录亏损 $500M；IPO 多次延迟；集团层面盈利未确认；优先股压力未知
      - - 估值立场
        - 偏高
        - 上一轮私募估值 $7.4B 来自 2021 年高点；基准情景隐含价值 $6-8B，安全边际有限
      - - 决策含义
