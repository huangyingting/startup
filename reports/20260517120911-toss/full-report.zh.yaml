      - number: '7.4'
        title: 财务、资本与信用风险
        blocks:
          - type: paragraph
            body: >-
              Viva Republica FY2020 报告净亏损 ₩72.5 billion，较 FY2019 的 ₩115 billion 收窄，但随着公司重投入 Toss Bank 上线和越南扩张，亏损延续到 2022
              年。Finextra 在 2024 年报道称 Toss Bank 已转正，但合并集团走向盈利和自由现金流转正的时间表，在公开来源中仍未披露。公司 2021 年 6 月 Series G 以 $7.4
              billion 估值融资 $410 million，累计融资超过 $900 million，但 IPO 已从 2023
              年目标窗口至少两次推迟，给后期投资人带来退出压力。若上市前宏观环境恶化，下轮估值下调风险存在。Toss Bank 的信用模型经 KCB 回测，相比 KCB 基准逾期率低 30%、区分能力高
              150%，但它尚未经历完整韩国本土信用周期或衰退检验。银行聚焦服务不足借款人，让贷款账本对失业冲击和利率飙升更敏感。净息差压缩是结构性风险，因为 K-Bank、KakaoBank、Toss Bank
              三家互联网银行都在争夺存款和贷款，而 KakaoBank 的规模优势让它能更激进定价。互联网银行资本充足要求也给以增长为目标的贷款扩张增加监管约束。
