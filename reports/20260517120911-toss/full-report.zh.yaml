      - number: '3.4'
        title: 定价与打包：基础服务趋同于零费用，贷款利率成为主战场
        blocks:
          - type: paragraph
            body: >-
              到 2018 年，韩国互联网银行市场的基础服务已趋同于零费用。Toss 2015 年上线时率先提供免费 P2P 转账；当时韩国国内银行电汇每笔收费 ₩500–₩2,000。KakaoBank 和 Kakao
              Pay 随后复制该模式，点对点转账费不再是 Toss 的商业差异化。

              贷款定价是剩下的关键战场。KakaoBank、Toss Bank 和 K Bank 都用自有数据驱动信用模型，给出低于传统银行区间的消费贷款 APR。四大银行的消费贷款定价通常在
              5%–22%，互联网银行则借助更好的信用区分能力，把目标区间设在 4%–20%。Toss Bank
              声称的优势在于，能用行为数据把有信用价值但征信薄的借款人——年轻成年人和首次寻求信用的人——与风险更高的征信薄借款人区分开来，从而可能同时提升定价准确性并降低违约率。

              证券经纪定价同样竞争激烈。Toss Securities
              对零售股票交易收取的佣金与传统折扣券商相当或更低。保险以按佣金收费的平台形式分销，而不是承保产品；这限制了利润率，但降低资产负债表风险。互联网银行外汇费用按单位看仍与传统银行相当，不过整体流程更快且完全数字化。
            claimRefs:
              - CP029
              - CP034
          - type: table
            tableRef: TP003
            claimRefs: []
      - number: '3.5'
        title: 转换成本、多栖使用与分发锁定
        blocks:
          - type: paragraph
            body: >-
              韩国金融科技的正式转换成本很低。关闭数字银行账户没有提前退出罚金，监管框架也支持账户可携。多数韩国金融科技超级 App 允许用户链接和聚合外部银行账户，因此用户无需完全押注单一提供商，也能访问多平台数据。

              主要锁定机制是行为性的，而非合同性的。KakaoTalk 整合为 Kakao Pay 和 KakaoBank 带来软锁定：Kakao
              账户已经嵌入用户日常通讯体验，用户不太可能刻意用单独提供商重建这种便利。Toss 依赖通知互动、信用分监控这一反复出现的日常入口，以及多产品交叉销售。用户若持有 Toss Bank 账户、通过 Toss
              信用分功能监控信用，并通过 Toss Securities 交易，即使离开没有财务罚金，也会产生真实的认知和习惯转换成本。

              多栖使用很常见。证据显示，多数数字活跃的韩国消费者会同时持有 Toss 和 KakaoBank 账户，这意味着 Toss
              的竞争护城河不太取决于排他性，而更取决于用户选择哪个平台作为主要金融入口。KakaoBank 的 KakaoTalk 分发优势，让其未来产品扩张拥有更低的获客成本上限。Toss
              的护城河最终扎根于产品广度，以及免费转账飞轮启动的日常参与循环。
            claimRefs:
              - CP005
              - CP012
              - CP023
              - CP029
              - CP032
              - CP033
      - number: '3.6'
        title: 护城河耐久性、替代风险与反向竞争证据
        blocks:
          - type: paragraph
            body: >-
              Toss 的竞争护城河建立在三根支柱上：超级 App 广度、行为信用数据，以及锚定日常参与的免费 P2P 飞轮。每根支柱都面临结构性挑战。

              超级 App 广度是真实的，但争夺越来越激烈。KakaoBank 2025 年利润创纪录，并系统性拓宽产品范围；KakaoTalk 分发优势使其增量产品扩张的获客成本低于
              Toss。免费转账飞轮已不再差异化：Kakao Pay 在 KakaoTalk 内复制了它，KakaoBank 也提供同样服务，侵蚀了 Toss 最初的获客楔子。

              行为信用数据护城河存在监管风险。2025 年 4 月，韩国金融监督院因 Kakao Pay 未经明确同意向 Alipay 分享 40M 用户数据而罚款 ₩15B，并因 Toss 在同一执法周期中未获得充分同意使用
              29M 客户记录而罚款 ₩6B。两项行动都表明，韩国监管机构正在收紧支撑互联网银行信用评分的替代数据打法，可能压缩贷款中数据驱动差异化的空间。

              最清晰的替代风险来自 KakaoBank 的规模轨迹。如果 KakaoBank 到 2027 年达到 30M 客户目标，它将从 2017 年几乎为零增长到超过 Toss 最近一次公开确认的用户数——即便没有匹配
              Toss 的产品广度，但拥有公开资产负债表、受监管存款基础、更强贷款账簿和完整 Kakao Group 生态支持。WeBank 和 Nubank
              等全球对标案例进一步显示，一旦数字银行达到关键规模，就能快速加入相邻服务，侵蚀超级 App 既有玩家的差异化。
            claimRefs:
