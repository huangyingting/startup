      - number: '7.3'
        title: 运营与网络安全风险
        blocks:
          - type: paragraph
            body: >-
              Toss 的超级 App 架构把 40+
              金融服务聚合到一个移动平台上，形成单通道依赖，也会放大任何技术故障的影响半径。平台每天处理数百万笔支付和银行交易；长时间宕机会同时中断转账、贷款发放、证券交易和保险理赔，跨多条产品线损害用户信任。Toss
              基础设施高度依赖公有云服务；尽管公司未公开披露主要云供应商，韩国金融监管要求金融机构遵守 Electronic Financial Transactions Act 的 IT 安全标准，包括网络分离、半年一次
              CISO 合规审查，以及 2026 年 4 月修订规则下 Financial Security Institute（FSI）对 SaaS 工具的预筛查。重大网络安全泄露会触发 PIPA 通知义务和 FSS
              监管审查，可能冻结产品上线直到整改完成。贷款中的欺诈风险偏高：Toss Bank 聚焦信用历史非标准的服务不足借款人，如果替代评分模型在真实压力信用环境中的表现不同于 KCB
              回测，就会增加逆向选择风险。2021–2022 年数据误用事件最终导致 2024 年 FSS 罚款，说明合规执行曾落后于产品增长；随着 Toss 扩张到证券、保险和国际市场，这种模式可能重演。
