      - number: '1.3'
        title: 融资历史与投资人
        blocks:
          - type: paragraph
            body: >-
              自 2013 年成立以来，Viva Republica 多轮股权融资累计约 $940M 或以上。Altos Ventures 是一家位于硅谷、深耕韩国市场的 VC 机构，2014
              年成为公司首家机构投资方。PayPal 在 2018 年 12 月前约 18 个月领投 $48M Series C，为 Toss 奠定国际投资人基础。2018 年 12 月，Kleiner Perkins 和
              Ribbit Capital 领投的 $80M 融资把公司估值推过 $1B 门槛，使其成为韩国第四家科技独角兽。该轮还包括 Bessemer Venture Partners、Goodwater
              Capital、PayPal 和 Qualcomm Ventures。

              2020 年，Viva Republica 完成 $173M Series F。随后在 2021 年 6 月，公司以 $7.4B 投后估值完成 $410M Series
              G——这是最后一轮已披露的私募融资。Series G 由美国投资机构 Alkeon Capital Management 领投，Korea Development Bank 作为新投资人加入，老股东 Altos
              Ventures 和 Greyhound Capital 继续参投。Series G 时，CEO Lee 公开表示 Toss 计划在 IPO 前再完成一轮私募融资（约 $300M），暂定三年时间表，指向
              2024–2025 年前后上市。

              截至运行日（2026 年 5 月），没有确认的 Series G 后股权融资。2023–2025 年间，多家可信新闻机构报道称 Toss 正在推进 KOSPI 上市；2025 年 1 月，Reuters
              等机构援引消息人士称 Toss 已聘请 JP Morgan 和 Citigroup 担任 IPO 流程顾问。2020 年之后的收入和盈利数据未公开披露。Toss Bank
              作为持牌互联网银行，接受韩国金融服务委员会（FSC）的银行监管。
