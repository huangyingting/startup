      - number: '6.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 超级 App 锁定效应形成多服务参与飞轮
            body: >
              Toss 最持久的竞争优势不是某个单一产品，而是把 40+ 金融服务聚合到一个生物识别认证界面下。用户每激活一个新服务——Toss Bank 日常储蓄、Toss Securities
              股票交易、保险、信用评分——切换到替代提供商的成本就会上升。55% 的 MAU / 注册用户比率，以及 91,000+ App Store 评价、4.3 / 5 分，提供了量化证据：超级 App
              模型产生的是习惯性、重复参与，而非一次性使用。这种结构性锁定，是预测长期留存韧性的主要依据。
            calloutType: strength
            claimRefs:
              - CU001
              - CU016
              - CU017
          - type: callout
            title: IPO 延迟释放投资者准备度和资本配置风险
            body: >
              Toss 自 2022 年以来多次推迟计划中的 KRX 上市，理由包括市场环境，以及需要证明持续盈利（Toss Bank
              已达到首次盈利里程碑，但母公司总体财务仍受审视）。每一次延迟都会推后进入公开资本市场，也给后期私募投资人带来不确定性。如果全球股市环境进一步恶化，或 Toss 在 IPO
              窗口重开前增长明显放缓，下轮融资下调估值或大幅估值压缩风险就会实质化。这会削弱 Toss 以有竞争力速度为东南亚扩张提供资金的能力。
            calloutType: risk
            claimRefs:
              - CU027
              - CU025
          - type: callout
            title: 越南让 Toss 成为东南亚领先韩国金融科技出口者
            body: >
              截至 2021 年 6 月，Toss 在越南拥有 3 million+ 月活用户，每月新增 500,000 活跃用户，已经建立了所有韩国金融科技公司中最大的国际足迹。CIMB Bank
              合作模式——由对方提供持牌银行通道，Toss 贡献 UX
              和评分引擎——为更多东南亚市场提供了可复制蓝图。如果越南能证明可持续盈利，它将成为第一条有实质意义的非韩国收入流，并大幅降低目前被识别为主要结构性脆弱点的地域集中风险。
