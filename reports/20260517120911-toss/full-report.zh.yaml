  - id: FV001
    title: 投资建议逻辑
    type: flow
    sectionRef: S8V001
    claimRefs:
      - CV001
      - CV008
      - CV015
      - CV042
      - CV045
    data:
      nodes:
        - id: scale
          label: Toss 规模
          detail: 20M+ 用户，上轮估值 7.4B，40+ 项服务
          tone: positive
        - id: proof
          label: 证据点
          detail: Toss Bank 2023-24 年盈利；独立估值 2.3B 的独角兽
          tone: positive
        - id: risks
          label: 重大风险
          detail: 2022 年亏损 500M；IPO 延迟 3+ 次；未提交招股书
          tone: negative
        - id: valuation
          label: 估值背景
          detail: 2021 年高点估值 7.4B；基准情景 6-8B；Series H 未披露
          tone: warning
        - id: gap
          label: 关键证据缺口
          detail: 无 2023-24 年合并财务数据；未确认 IPO 文件
          tone: negative
