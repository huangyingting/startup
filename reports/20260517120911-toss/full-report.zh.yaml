  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱与优先级
        blocks:
          - type: paragraph
            body: >-
              Toss 的风险宇宙由五组风险支撑：监管和法律合规、运营与网络安全可靠性、财务可持续性和信用质量、Kakao 生态竞争替代，以及关键人物执行依赖。严重度最高的是可能触发牌照吊销或重大监管处罚的风险：FSS
              对数据误用的执法记录会直接影响投资人信心，Personal Information Protection Act（PIPA）下若再发生类似事件，可能同时带来财务罚款和用户流失。第二层是财务风险：Toss 在截至
              2022 年的每个已披露财年都报告净亏损，尽管 Toss Bank 据称在 2024 年转正，但公开文件无法确认合并集团盈利。IPO 执行风险偏高；上市原本目标 2023 年，至少两次推迟，截至 2026 年 5
              月仍未宣布。第三层是竞争替代：KakaoBank FY2025 创纪录业绩和 Kakao 54 million 用户消息分发，给了它 Toss
              难以复制的获客成本不对称优势。运营风险和关键人物风险补齐风险清单。风险热力图按发生可能性和严重度汇总所有风险。
