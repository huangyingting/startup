    rows:
      - - 数据隐私问题复发（PIPA）
        - 韩国
        - 活跃风险——2024 年 FSS 罚款先例已形成
        - 中（此前违规已确认；系统已更新，但合规文化缺口未被证明已补上）
        - 高——最高可罚收入的 3%；用户信任受侵蚀
        - 更新用户授权架构；落实 CISO 问责
        - 重大；取决于 FSS 后续检查
        - 要求提供 FSS 检查时间表和整改关闭函
      - - 互联网银行牌照吊销（FSC）
        - 韩国
        - 活跃——需要持续满足资本充足率和监管合规要求
        - 低（无吊销先例；政治成本高）
        - 致命——Toss Bank 运营将完全停止
        - 维持资本比率；与 FSC 保持沟通
        - 一旦触发就是生存风险；概率很低
        - 要求披露 Toss Bank 资本比率和 FSC 往来函件
      - - FSS 执法升级
        - 韩国
        - 活跃——FSS 正在执行金融科技监管计划
        - 中（同一轮中已有两家同业被罚；按模式执法）
        - 高——运营受限或业务暂停
        - 主动监管沟通；投入合规建设
        - 鉴于 2024–2025 年同业执法模式，风险偏高
        - 跟踪 FSS 年度金融科技检查报告
      - - AML / VASP 规则（稳定币 / 加密）
        - 韩国
        - 待定——FSC 稳定币法律框架正在制定中（2026）
        - 低–中（Toss 目前不是主要加密玩家）
        - 中——可能限制 Toss 支付产品演进
        - 跟踪监管路线图；保持在 VASP 范围之外
        - 当前敞口有限；若 Toss 扩张到加密支付，敞口会上升
        - 向管理层确认 Toss 当前加密产品范围
      - - 越南监管合规（CIMB 合作）
        - 越南
        - 活跃——通过 CIMB Vietnam 获得外资银行牌照
        - 中（跨境执法更难监控）
        - 中——声誉外溢；削弱 SEA 扩张逻辑
        - 依赖本地合作伙伴；Toss 直接控制有限
        - 公开来源无法量化剩余风险
        - 要求提供 CIMB Vietnam 合规状态和 Toss 治理权
      - - 云 SaaS 网络隔离（Electronic Financial Transactions Act）
        - 韩国
        - 2026 年 4 月修订——后台 SaaS 获得豁免；个人数据仍受限制
        - 低–中（过渡窗口存在不合规风险）
        - 中——FSS 可能在合规完成前限制产品部署
        - FSI 预筛查计划；CISO 半年度审查
        - 可通过流程投入管理；AI/AX 推出期间尤为关键
        - 确认 FSI SaaS 审批管线和 CISO 审查节奏
    notes: 严重性和概率为分析师基于公开 FSS 执法记录、监管文件和新闻给出的评估；实际概率分布未经独立精算。
