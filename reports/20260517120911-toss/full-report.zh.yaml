  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Toss 有五条主要收入流，按产品线和变现机制区分。超级 App 架构让各业务之间可以交叉销售、复用数据，但 Viva Republica 作为合并主体，并未公开披露收入结构，也没有披露各分部的相对贡献。

              **支付处理（Toss Payments / MDR 模式）：** Toss Payments 通过线上支付网关和 Toss Place POS
              处理交易，并向商户收取商户折扣率（MDR）。官方定价页列出的费率与韩国支付处理商基准相近，银行卡线上交易约 1.5–3.5%；具体签约 MDR 未公开。总支付额（GPV）未确认，但公司曾披露，截至 2019
              年中累计支付处理规模达到 $48 B+（当时总用户数为 14 M）。到 2021 年，随着总用户数达到 20 M、商户合作扩大，估计支付 TPV 已大幅增长。

              **银行净利息收入（Toss Bank）：** Toss Bank 于 2021 年 9 月上线，是韩国第三家纯互联网银行，个人贷款（无抵押贷款、信用贷款、按揭）是主要收入驱动。CEO SG Lee
              明确表示，Toss Bank 会把重点放在贷款，而不是支付交换费，因为超级 App 已覆盖支付服务。贷款账本产生的净利息收入（NII）构成银行业务核心收入来源。多家新闻报道称，Toss Bank 在
              2023/2024 年达到盈利里程碑，说明它已经扩到能够产生正净利润的规模。

              **券商佣金（Toss Securities / Toss Invest）：** Toss Securities（也可通过 tossinvest.com 访问）于 2021 年 3 月上线，前三个月吸引 3.5
              M 用户，获客能力很强。收入来自韩国本土和国际股票交易的券商佣金，也可能来自融资融券利息。具体佣金率未公开，但估计与韩国券商基准相比具备竞争力。

              **保险保费与导流费：** Toss App 聚合保险产品，帮助用户比较并购买保险计划。这条收入流可能包括保险提供商支付的导流费，也可能包括直接保费承保收入，但具体模式未披露。

              **广告与金融产品导流：** 作为拥有 20 M+ 用户的金融聚合平台，Toss 通过合作金融机构的金融产品导流（贷款、储蓄账户、信用卡）变现用户意图。导流费收入未量化，但很可能已经是有分量的收入来源。

              **收入确认：** Toss 收入由支付处理费（按交易时点确认）、银行 NII（权责发生制）以及导流 /
              佣金收入（按事件确认）混合构成，收入确认方式按分部而不同。作为无需发布合并财务报表的私营公司，其收入确认政策没有公开。
