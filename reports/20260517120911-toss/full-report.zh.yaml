      - number: '5.4'
        title: AI 与数据智能
        blocks:
          - type: paragraph
            body: >
              Toss Bank 部署了自研 AI 信用评分模型，使用消费模式、现金流历史和账户余额等替代行为数据，而不是只依赖传统 KCB 征信分。该模型在超过 2 million 用户数据上回测，相比传统模型，区分能力高
              150%，逾期率约降低 30%。Toss 使用 Korea Credit Bureau（KCB）数据做回测验证，结果让 Toss Bank 能服务过去被传统贷款机构排除的薄文件借款人。


              AI 引擎由 Toss 少见的数据位置供能：一个 App 聚合韩国 20%+ 银行账户和信用卡，持续产生交易级行为信号，而产品足迹更窄的竞争对手拿不到这些数据。这个数据护城河会随时间复利。除信用外，App
              还用行为信号做个性化产品推荐、交叉销售定向和实时欺诈检测。Toss Bank 在 2024 年用基于 AI 的评估扩大了贷款产品范围，公司也继续把 AI 基础设施作为核心差异化能力。App
              还提供免费实时信用分监测，形成反馈循环，鼓励用户改善财务状况，也加深其与贷款和保险产品的互动。
