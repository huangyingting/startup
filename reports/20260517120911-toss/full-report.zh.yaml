      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >-
              Lee Seung-gun（이승건）常以首字母 SG Lee 为人所知，他的职业路径并不典型。Lee
              在韩国最负盛名的院校之一首尔大学接受牙医训练，曾在三星附属医院执业，之后转向创业。在发现韩国银行体系的缺口之前，他连续经历八次创业失败，尝试过多种商业概念：韩国拥有世界级的智能手机普及率和信用卡使用率，但一次简单转账仍需要超过
              37 次点击和 5 个密码。

              Lee 用了约一年时间与韩国金融监管机构沟通，拿到简化移动转账产品的批准。Toss 于 2015 年上线，并很快获得牵引力。到 2021 年，Lee 已成为亿万富豪——Forbes 按 Series G 后
              $7.4B 估值估算，他持有 Viva Republica 约 18% 股份，价值约 $1.2B。Lee 仍是 Viva Republica 唯一公开披露的创始人和公众面孔，这带来了有意义的关键人物集中风险。

              Viva Republica 未在英文沟通中公开披露完整高管团队或董事会构成。公司没有发布年度报告；本章审阅的独立可核验公开来源中，也未列出任何其他 C 级高管。Lee 头衔为创始人兼
              CEO；没有公开记录显示公司存在联合创始人或继任计划。独立治理监督——董事会构成、审计委员会、投资人董事席位持有人——同样未公开披露，这对尽调构成实质缺口。
