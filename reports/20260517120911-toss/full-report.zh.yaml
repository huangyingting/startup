  - id: FV002
    title: 估值敏感性
    type: bar
    sectionRef: S8V004
    claimRefs:
      - CV032
      - CV033
      - CV034
      - CV039
    approximationNotes: |
      数值是基于可比倍数和部分财务数据估计的示意区间。不是正式财务模型；合并财务披露后，应以自下而上的模型替换。
    data:
      items:
        - label: 乐观：美国双重上市 + 集团盈利
          value: 11
          unit: USD billion
          note: 需要确认集团利润和 US SEC 注册
        - label: 偏乐观：KOSPI + Toss Bank 强 P/B
          value: 9.5
          unit: USD billion
          note: KakaoBank 1.5x P/B 可比；Payments 按 4x 收入
        - label: 基准：KOSPI + Toss Bank 接近 KakaoBank P/B
          value: 7
          unit: USD billion
          note: 最符合现有证据；低于 2021 年私募估值
        - label: 偏低基准：持续亏损 + KOSPI 折价
          value: 5.5
          unit: USD billion
          note: IPO 较内在价值折价 20%；母公司亏损未解决
        - label: 悲观：下调估值或被迫老股交易
          value: 3.5
          unit: USD billion
          note: 第 4 次 IPO 延迟 + 优先股重组
  - id: FV003
    title: 估值 / 回报区间
    type: range
    sectionRef: S8V004
    claimRefs:
      - CV032
      - CV033
      - CV034
    approximationNotes: |
      回报假设以上一轮已知私募估值 7.4B 为入场价，并假定持有 2 年，到 2026-2027 年出现假设性流动性。IRR 仅作方向判断，取决于优先股结构和退出机制，包括 IPO、老股交易或 M&A。
    data:
      items:
        - label: 乐观情景
          low: 10
          high: 12
          unit: USD billion valuation
          note: 从 7.4B 入场价计算，总回报 35-60%；IRR 约 15-25%
        - label: 基准情景
          low: 6
          high: 8
          unit: USD billion valuation
          note: 从 7.4B 入场价计算，总回报 -19% 至 +8%；IRR 持平至为负
        - label: 悲观情景
          low: 3
          high: 4
          unit: USD billion valuation
          note: 从 7.4B 入场价计算，总回报 -46% 至 -59%；资本大幅受损
        - label: 上轮私募估值 Series G
          low: 7.4
          high: 7.4
          unit: USD billion valuation
          note: 2021 年 6 月参考点；Series H 未披露
  - id: FV004
    title: 投资 KPI
    type: kpi
    sectionRef: S8V005
    claimRefs:
      - CV001
      - CV015
      - CV020
      - CV042
      - CV045
      - CV047
    data:
      items:
        - label: 市场机会
          value: High
          tone: positive
          note: 韩国金融科技 TAM 在增长；Toss 以 40%+ 用户渗透率占据主导
        - label: 产品验证
          value: Medium-High
          tone: positive
          note: 超级 App 已验证；Toss Bank 盈利；Toss Securities 上线即有 3.5M 用户
        - label: 竞争护城河
          value: Medium
          tone: neutral
          note: 网络效应存在，但 KakaoBank 和既有银行正在重金投入数字化
        - label: 财务轨迹
          value: Low-Medium
          tone: warning
          note: Toss Bank 盈利，但集团 2022 年亏损 500M；2024-25 年未知
        - label: 管理层质量
          value: High
          tone: positive
          note: SG Lee 是经验证的创始人；经历 8 次被拒后做成独角兽；约 18% 持股保持利益一致
        - label: 估值纪律
          value: Low
          tone: negative
          note: 上轮估值 7.4B 来自 2021 年高点；10B 是目标；基准情景 6-8B 仍意味着入场价偏高
        - label: 退出清晰度
          value: Low
          tone: negative
          note: JP Morgan 和 Citi 已获委任，但未确认 IPO 文件；3+ 轮延期
        - label: 证据质量
          value: Low-Medium
          tone: warning
          note: 未见合并财务报表；DART 只能查询到子公司层面；IPO 状态未确认
appendices:
  - id: A
    title: 覆盖说明与方法论
    blocks:
      - type: paragraph
        body: >-
          本报告基于研究运行期间抓取的公开来源，基准日期为 2026-05-17。Toss（Viva Republica）是一家私营公司，不披露经审计财务报表。收入估计来自部分披露（Forbes 引用的 2020
          年年度业绩）、记者报道，以及可比数字银行基准。所有财务数字都应视为方向性估计；拿到经审计财务报表后，可能需要大幅修订。
        claimRefs: []
      - type: paragraph
        body: >-
          估值分析基于可比上市金融科技公司的交易倍数（KakaoBank 在 KOSPI 上市、Nubank 在 NYSE 上市、Revolut 私募估值）以及韩国市场 IPO 折价分析。以 2021 年 6 月上一轮 $7.4B
          估值为锚；当前隐含公允价值反映截至运行日期 2026-05-17 的市场条件。报告指出，截至运行日期，Toss 尚未在任何交易所提交 IPO 申请。
        claimRefs: []
