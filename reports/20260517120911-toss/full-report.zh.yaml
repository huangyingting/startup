      - number: '3.3'
        title: 功能与能力对比：Toss 领先之处，以及对手缩小差距之处
        blocks:
          - type: paragraph
            body: >-
              Toss 在金融服务广度上领先。它的超级 App 整合 40 多项不同金融服务，覆盖免费 P2P 转账、Toss Bank 数字账户、通过 Toss Securities
              提供的证券经纪、保险比价、信用分监控、贷款撮合平台、外汇汇款，以及通过 Toss Payments 提供的商户支付处理。目前没有单一竞争者能匹配这种广度。

              KakaoBank 在纯银行业务上更窄但更深：无网点模式下，它提供包括存款、贷款、借记卡和海外汇款在内的优秀核心银行服务，并受益于 KakaoTalk
              分发渠道，但不提供证券经纪、保险市场平台或信用分监控。Kakao Pay 在嵌入式社交支付上领先，但缺少完整银行牌照，也没有证券经纪或信用评分。Naver Pay 和 Samsung Pay
              是单层支付工具，没有额外金融产品套件。

              传统银行在贷款、外汇和存款产品上匹配或超过 Toss，但缺少信用分透明层、保险市场平台，或移动 UX 质量可比的证券经纪。竞争图谱中最清晰的缺口是，尚无对手在同等用户体验质量下提供同等跨产品广度——不过
              KakaoBank 自 2021 年 IPO 以来持续扩展产品，正在逐步缩小这道差距。Toss Securities 在 2021 年 3 月上线后三个月内吸引约 3.5M 用户，说明 Toss
              可以非常快地把用户基础转化到新金融产品垂直领域。
