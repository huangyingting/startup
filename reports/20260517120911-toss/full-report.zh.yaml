      - number: '6.3'
        title: 分产品采用与具名证明
        blocks:
          - type: paragraph
            body: >
              Toss 在多条产品线上积累了实质性的具名客户证明。量化最充分的是 Toss Securities：2021 年 3 月上线，前三个月吸引 3.5 million
              用户，成为韩国金融科技史上增长最快的零售投资产品上线之一。在越南，Toss 与 CIMB Bank 合作打造金融超级 App，截至 2021 年 6 月拥有超过 3 million 月活用户，每月新增超过
              500,000 活跃用户。这让 Toss 成为东南亚最大的韩国金融科技存在。信用分析侧，Korea Credit Bureau（KCB）用超过 2 million 用户数据回测 Toss
              自研信用评分引擎，发现其区分能力比传统征信模型高 150%，逾期率低 30%。这三个数据点——Securities 采用速度、越南 MAU、KCB 回测结果——构成第三方对 Toss
              分产品采用和客户结果的独立验证。消费者队列层面的具名证明很强；除 Toss Payments 商户和 KCB 合作外，公开披露中的企业 / B2B 客户引用有限。
