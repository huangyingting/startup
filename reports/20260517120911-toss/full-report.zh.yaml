  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: 按发生可能性（x 轴）和严重程度（y 轴）绘制 Toss 主要风险，可见数据隐私问题复发与竞争替代是综合风险最高的节点。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 极高严重度
          values:
            - label: 牌照撤销
              tone: warning
              detail: FSC 撤销 Toss Bank 互联网银行牌照；关乎生死，但概率低
            - label: SG Lee 离任
              tone: warning
              detail: 关键人物依赖；未披露接班计划
            - label: —
              tone: neutral
              detail: 未识别出极高严重度 / 高可能性风险
        - label: 高严重度
          values:
            - label: IPO 下调估值
              tone: warning
              detail: 上市估值低于 Series G；需要宏观环境恶化
            - label: 数据隐私问题复发
              tone: adverse
              detail: FSS 2024 年罚 Toss ₩6B；再次发生会带来更高处罚
            - label: 信用模型失效
              tone: adverse
              detail: 向薄信用档案借款人发放无抵押贷款；未经过衰退周期检验
        - label: 中等严重度
          values:
            - label: 越南合作失败
              tone: warning
              detail: 依赖 CIMB Vietnam；治理条款未公开
            - label: 云 SaaS 合规缺口
              tone: warning
              detail: FSC 2026 年 4 月规则修订；AI 部署受限
            - label: KakaoBank 竞争替代
              tone: adverse
              detail: FY2025 利润创纪录达 ₩480.3B；用户 26.7M；结构性 CAC 优势
        - label: 低严重度
          values:
            - label: App Store 依赖
              tone: neutral
              detail: 标准数字平台依赖；所有金融科技同业都有
            - label: AML / VASP 扩张
              tone: neutral
              detail: 加密货币监管风险；当前敞口有限
            - label: 工程人才竞争
              tone: neutral
              detail: Seoul 科技人才市场竞争；靠薪酬可控
    claimRefs:
      - CR002
      - CR008
      - CR024
      - CR033
      - CR021
      - CR043
  - id: FR002
    title: 风险传导图
    type: dag
    insight: 数据隐私执法和牌照暂停是下游传导最强的两个节点；两者都可能同时引发用户流失、合作伙伴流失和融资困难。信用模型失效是上游节点，会直接传导至资本充足率和 IPO 受损。
    data:
      nodes:
        - id: n1
          label: FSS 数据隐私执法
          type: regulatory
        - id: n2
          label: Toss Bank 牌照风险
          type: regulatory
        - id: n3
          label: 信用模型表现不及预期
          type: financial
        - id: n4
          label: SG Lee 离任
          type: people
        - id: n5
          label: KakaoBank 竞争替代
          type: competitive
        - id: n6
          label: 用户信任侵蚀
          type: impact
        - id: n7
          label: 收入 / MAU 下滑
          type: impact
        - id: n8
          label: 资本充足率跌破要求
          type: impact
        - id: n9
          label: IPO 延迟 / 下调估值
          type: impact
        - id: n10
          label: 合作伙伴 / 投资人信心流失
          type: impact
        - id: n11
          label: 集团估值受损
          type: impact
      edges:
        - from: n1
          to: n6
          label: 声誉受损推高流失
        - from: n1
          to: n10
          label: 执法释放治理风险信号
        - from: n2
          to: n7
          label: Toss Bank 业务暂停使贷款收入停摆
        - from: n2
          to: n9
          label: 牌照风险阻断 IPO 路演
        - from: n3
          to: n8
          label: 贷款损失消耗 Toss Bank 资本
        - from: n3
          to: n9
          label: 不良贷款激增压低上市估值
        - from: n4
          to: n2
          label: 监管关系削弱
        - from: n4
          to: n10
          label: CEO 离任打击投资人信心
        - from: n5
          to: n7
          label: 用户和存款迁移到 Kakao
        - from: n6
          to: n7
          label: 流失拖低 MAU 和交叉销售
        - from: n7
          to: n9
          label: 收入不达预期削弱上市倍数
        - from: n8
          to: n9
          label: 资本缺口迫使稀释性融资
        - from: n9
          to: n11
          label: 下调估值压缩股权价值
        - from: n10
          to: n11
          label: 信心流失加快估值压缩
