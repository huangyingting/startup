      - number: '2.3'
        title: 买方与用户分层
        blocks:
          - type: paragraph
            body: >
              Toss 在韩国的用户基础横跨四个主要分层，各自经济性和采用路径不同。最大分层是大众零售用户（18–45 岁、数字活跃的韩国成年人），贡献 20M+ 用户的大多数；他们用 Toss
              做免费转账、信用分监控和账户聚合。获客主要来自应用商店自然流量和推荐（Toss 的免费转账模式边际成本为零，会自然带来口碑传播）。预算归个人所有；该分层 ARPU 较低，但构成向付费产品追加销售的漏斗顶部。

              第二个分层是寻求贷款和建立信用的用户。Toss 贷款比价引擎聚合来自 30+
              家持牌韩国金融机构的消费贷款报价，并在成功放款时收取推荐费。预算来自个人收入或企业经营现金；采用由财务需求事件触发（大额购买、再融资）。该分层 ARPU 显著高于免费转账用户，一直是主要收入驱动。

              第三个分层是使用 Toss Securities 的零售投资者。2020–2021 年股市繁荣期，个人投资者入场推动韩国开立超过 40M 个零售证券账户，零售经纪市场很大但竞争激烈。Toss Securities
              通过 UX 简洁（在主 Toss App 内一键买股）、部分产品零佣金和零股交易形成差异化。ARPU 取决于交易量。预算来自个人储蓄。

              第四个分层是使用 Toss 处理商业支付、POS（Toss Place）和商户结算的小企业主。韩国有约 7M 自雇者和小企业主，是 Toss B2B
              金融工具的高意向人群。预算归企业经营账户。采用触发因素是商户不满既有支付处理商收费。

              KakaoBank 的分层提供了有用基准：其 26.7M 客户偏年轻（依托 KakaoTalk 覆盖韩国 88% 人口的分发），2025 年非息收入 ₩1.09T 首次突破
              ₩1T，证明韩国互联网银行市场的平台费和推荐收入可以做到规模化。
