      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Toss 消费端超级 App 主要走 B2C GTM 路径，Toss Payments 和 Toss Place（销售点终端）则走 B2B 渠道。两条路径的销售周期和成本结构差异明显。

              **消费端超级 App（B2C）：** Toss 的消费增长靠病毒式口碑、一个密码即可转账的低摩擦价值主张（替代韩国银行约 37 步流程）以及推荐机制拉动。公司到 2019 年中从零增长到 14 M 注册用户，到
              2021 年 6 月达到 20 M 总用户（11 M MAU），约占韩国 51.7 M 人口的三分之一到 40%。按当时累计股权融资约 $940 M
              计算，这条增长曲线意味着综合获客成本（CAC）显著低于每名新增用户 $10，也显示出很强的自然病毒增长。到 2018 年，公司预计年交易运行率为 $18 B；到 2019 年，累计处理 $48 B+。

              **支付网关（B2B / Toss Payments）：** Toss Payments 面向商户提供 API 优先的支付集成，与 KG Inicis、NHN KCP 和 Kakao Pay
              竞争。支付网关集成面向中型商户的 B2B 销售周期通常为 2–8 周。Toss Payments 的客户 CAC 未披露。渠道经济性由 MDR 费率减去卡组织交换费驱动，支付处理毛利率估计为
              20–40%（与全球支付处理商基准一致）。

              **金融产品聚合：** 在银行、券商和保险产品上，Toss 把现有用户群用作 App 内漏斗，基于用户信用分、消费模式和画像展示金融产品推荐。既有装机基础在手，交叉销售的边际 CAC 极低。

              **没有公开 CAC / 回本数据：** Toss 未在任何公开文件或新闻稿中披露 CAC、LTV 或回本周期指标。作为私营公司，这些单位经济指标属于内部数据。用累计融资和用户数推算，消费端综合 CAC
              大约为每名注册用户 $5–15，但这是高度不确定的估计。
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
      - number: '4.3'
        title: 成本结构、毛利率与单位经济
        blocks:
          - type: paragraph
            body: >
              Toss 的成本结构反映了多分部业务特征：纯软件 / 聚合功能（支付网关软件、金融产品导流）的边际成本较低，受监管的银行和券商业务则需要更高资本和合规投入。

              **主要成本驱动：** - **监管资本要求：** 作为持牌银行，Toss Bank 必须维持 BIS 资本充足率（Tier 1 资本比率）。韩国互联网银行必须满足 FSC
              最低资本要求。投入银行子公司的资本受资本约束，也会减少集团层面的自由现金流。 - **贷款损失拨备：** 银行业收入（NII）会被贷款账本上的信用损失拨备抵消。Toss Bank 的风险模型由 Korea
              Credit Bureau（KCB）基于 2 M+ 用户验证，逾期率比传统模型低 30%——这意味着拨备率可能低于传统银行，也是 Toss Bank 的毛利优势。 - **技术与平台研发：**
              作为科技公司，Toss 需要持续投入平台开发、欺诈检测和信用评分基础设施。成本细节未披露。 - **获客与营销：** 病毒式增长让消费端获客成本相对较低，但为维持增长，营销支出仍是重要成本。未公开披露。 -
              **监管合规：** 业务横跨银行、券商、支付和保险垂直领域，需要应对多重监管合规（FSC、FSS 监督），抬高了管理费用。

              **毛利率估计：** - 支付处理（Toss Payments）：估计毛利率 20–40%（MDR 扣除交换费和清算成本），与全球支付处理商基准一致。 - 银行（Toss Bank）：贷款账本净息差估计为
              2–4%；信用评分较强时，拨备成本应低于市场平均。按 NII 口径看，银行毛利率在扣除运营成本前可超过 60–70%。 - 券商（Toss
              Securities）：佣金模式边际成本低；交易费毛利率高，但受监管资本要求约束。

              **营运资本与资本开支：** Toss Payments 和软件平台的营运资本需求很低。但 Toss Bank 的贷款账本增长需要资本投入。根据 BIS 框架，每增加一单位 KRW
              贷款，都需要按比例计提资本。这让贷款账本增长依赖融资。

              **盈利路径：** 2020 年账目（最后披露数据）显示，在收入增至 390 B KRW、约为三倍的同时，净亏损从 115 B KRW 收窄到 72.5 B KRW——亏损率快速改善至收入的约
              18.6%，而上一年约为 100%+。多家新闻来源称 Toss Bank 在 2023/2024 年实现单体盈利，说明 2021 年 Toss Bank 上线后，合并主体亏损轨迹可能继续改善。
            claimRefs:
