      建议以无法取得 2023-2024 年合并财务数据为前提。所有信心和风险评级反映截至 2026 年 5 月可获得的信息。若出现经确认且含审计财务数据的 IPO 招股说明书，建议很可能会随披露的财务轨迹转为放弃或有条件买入。
