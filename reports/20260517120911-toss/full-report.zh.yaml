      - number: '3.2'
        title: 竞争对手画像：新型银行对手、支付传统玩家与大银行挑战者
        blocks:
          - type: paragraph
            body: >-
              KakaoBank 是 Toss 在零售数字银行中最重要的直接对手。KakaoBank 2021 年 8 月在 KOSPI 上市，首日股价上涨约 80%，Kakao Corp 保留 31.62% 股权。其
              2025 年业绩——净利润 ₩480.3B，同比增长 9.1%，营业利润 ₩649.4B——证明无网点模式可以产出持久利润率。到 2025 年底，KakaoBank 拥有 26.7M 客户和 20M
              月活用户，是韩国最大的零售数字存款基础，并公开目标到 2027 年达到 30M 客户和 ₩90T 存款。KakaoBank 也在国际扩张，2026 年 1 月宣布与泰国 SCBX
              组建虚拟银行合资公司，并已在印尼运营 Superbank。

              Kakao Pay 是主导型支付对手。Kakao Pay 于 2021 年 11 月上市，并获得 Ant Financial $200M 投资；它在 KakaoTalk 内运营，触达约 50M
              韩国用户，无需单独下载 App——这是 Toss 没有可比通讯平台时无法复制的内生分发优势。2025 年 4 月，韩国金融监督院因 Kakao Pay 未经明确同意向 Alipay 分享 40M 用户数据而罚款
              ₩15B，暴露生态中的结构性监管风险。

              Naver Pay 依托 Naver 的电商和门户生态，2015 年上线。Samsung Pay 控制三星设备上的 NFC 非接触支付层。K Bank 是韩国第一家纯互联网银行，借助 KT
              电信合作伙伴关系，客户数已超过 10M。四大传统银行各自拥有 20–30M 客户，2025 年合计录得 ₩18T 净利润。
