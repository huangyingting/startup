      - number: '5.3'
        title: 开发者体验与开源
        blocks:
          - type: paragraph
            body: >
              Toss 对开源工程投入不小，运营 GitHub 组织（github.com/toss），拥有 15 个以上公开仓库。最突出的项目是 es-toolkit，这是一个现代 JavaScript /
              TypeScript 工具库，到 2026 年 5 月获得超过 11,000 GitHub stars，基准测试执行速度比广泛使用的 Lodash 快 2–3×。es-toolkit 每周 npm 下载量约
              2.87 million，并有 472 个依赖包，说明它在更广泛 JavaScript 生态里已有实质采用。其他值得注意的项目包括 Slash（3,000+ stars，现已归档）、es-hangul（韩国
              NLP 工具库，1,800+ stars）和 Suspensive（React Suspense 辅助库）。


              公开开发者足迹有强项，也有缺口。截至 2026 年 5 月，Stack Overflow 上 "toss-payments" 标签显示零个问题，说明 Toss Payments
              集成社区很小，英文开发者支持更多通过私有渠道而非开放论坛完成。开发者门户提供了补偿渠道——AI 代码生成辅助、沙盒和实时聊天——但缺少公开社区讨论，对企业集成采用仍是风险。
