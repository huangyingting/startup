  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 用户基础概览
        blocks:
          - type: paragraph
            body: >
              Toss（Viva Republica）靠消除日常金融交易摩擦，做出了韩国最大的金融科技消费者基础之一。截至 2021 年 6 月——最近一个完全相互印证的公开数据点——Toss 有 20 million
              注册用户和 11 million 月活用户，覆盖韩国 51.7 million 人口的三分之一以上。当时，韩国 20% 以上银行账户和信用卡已注册到 Toss。该 App 在韩国 Apple App Store
              上基于 91,000 多条用户评价获得 4.3 / 5 分，说明在极大的评论基数上仍保持较高满意度。Toss 服务多个重叠客户群：使用免费 P2P
              转账和统一金融看板的大众零售消费者；寻求数字优先银行和有竞争力贷款利率的 Toss Bank 客户；追求便捷零售投资的 Toss Securities 用户；使用 Toss KCB
              集成评分引擎的信用受限借款人；以及使用 Toss Payments 的中小企业经营者。Financial Services Commission（FSC）根据 Electronic Financial
              Transactions Act 向 Toss 及其子公司发牌，建立了支撑消费者信任的监管底线。
