  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局：新型银行、支付网络、传统机构与全球对标公司
        blocks:
          - type: paragraph
            body: >-
              韩国零售金融服务市场呈现全球最集中的金融科技竞争格局之一。Toss 占据独特的超级 App 位置，但同时在几个不同竞争者类别中作战。

              直接新型银行类别由 KakaoBank 领跑。它是韩国资本最充足的互联网银行，到 2025 年底拥有 26.7M 注册客户，2021 年 8 月已在 KOSPI 上市；K Bank
              是韩国第一家纯互联网银行（2017 年创立），部分依托 KT 电信基础设施整合来建立客户基础。支付 App 类别由 Kakao Pay 和 Naver Pay
              主导，二者分别嵌入韩国最大的两个互联网生态（KakaoTalk 和 Naver Shopping），再加上控制三星设备 NFC 硬件支付层的 Samsung Pay。传统机构类别是所谓四大银行（KB
              Financial、Shinhan、Woori、Hana），2025 年合计产生 ₩18T 净利润，并保有规模、网点信任和企业银行关系；这些能力尚无纯数字竞争者完全复制。

              现状替代也重要。许多韩国消费者在多家银行保持账户，却没有任何整合平台；Toss 的主要替代品不是某个具体竞争者，而是它原本要替代的默认多银行行为。最后，Revolut（2026 年 70M 客户、$75B
              估值）和 Nubank（拉美 94M 客户）等全球对标公司为长期超级 App 路径提供基准，但目前并不在韩国竞争。
