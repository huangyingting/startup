      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >
              **收入质量：** Toss 的多收入流模型在结构上质量较高。银行 NII（Toss Bank）基于贷款账本规模和 NIM 提供可预测的利差收入；支付处理（Toss Payments）提供与 TPV
              增长挂钩的经常性交易费收入；券商（Toss Securities）受市场影响，但随用户基数增长。保险和金融产品导流分散了收入基础。尽调中最大的不确定性是：合并主体按综合口径是否拥有正毛利率——考虑到 Toss
              Bank 的监管盈利里程碑，答案很可能是肯定的，但尚未确认。

              **利润率路径：** 从 2020 年（18.6% 净亏损率）走向 Toss Bank 在 2023/2024 年首次盈利，显示出运营杠杆。银行子公司现在很可能已经贡献正利润，Toss Payments
              达到规模后也应体现运营杠杆。集团层面盈利路径取决于三点：(1) Toss Bank 的贷款账本继续增长，且信用损失不失衡；(2) Toss Payments 在 Kakao Pay 和 Samsung Pay
              的竞争压力下守住 MDR；(3) Toss Securities 维持券商交易量。

              **资本强度：** 主要资本强度来自 Toss Bank 作为持牌银行的监管资本要求。支付和券商业务相对轻资本。银行贷款账本增长需要持续注资，消耗母公司层面现金——压低集团自由现金流转化。如果 IPO
              提供预期流动性，这一问题可控，但它仍是结构性依赖。

              **尽调阻塞点：** 1. 没有 2021–2025 年合并 P&L——最后确认的收入数字（390 B KRW，FY2020）已经滞后 5+ 年。 2. Toss Bank DART
              监管文件理论上可访问，但需要韩语能力和 DART 系统导航；公开渠道没有英文摘要。 3. 现金头寸、烧钱速度和现金跑道完全未披露。 4. 单位经济（CAC、LTV、回本周期、各分部贡献利润率）属于内部数据。 5.
              IPO 时间表不清晰——最初目标是 2024 年，按 2024 年新闻延至 2025 年，截至 2026 年 5 月仍未公开确认。
            claimRefs:
              - CI031
              - CI032
              - CI033
              - CI034
              - CI035
      - number: '4.7'
        title: 展示材料
        blocks:
          - type: callout
            title: 多元收入模型降低单一收入流风险
            body: >
              Toss 的五条收入流模型（支付、银行、券商、保险、导流）提供了有意义的分散化。如果支付收入在 Kakao Pay 的竞争压力下被压缩，Toss Bank 的银行 NII
              可以对冲；如果熊市导致券商佣金下降，消费贷款可能保持稳定。处在 Toss 阶段的私营金融科技公司很少拥有这种结构，它也让利润率画像比单一收入流竞争对手更有防御性。
            calloutType: strength
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
          - type: callout
            title: 银行资本依赖带来持续股权需求
            body: >
              Toss Bank 的贷款账本增长，需要按韩国 FSC 的 BIS 指引配置相应 Tier 1 资本。每新增一韩元贷款增长，都会消耗母公司层面的股权资本。对银行来说这很正常，但意味着 Viva Republica
              的现金头寸会被银行子公司的增长野心持续抽走——形成结构性资本依赖，必须靠 IPO 解决。在 IPO 前，外部融资一旦放慢，就可能限制 Toss Bank 的增长速度。
            calloutType: risk
            claimRefs:
              - CI026
              - CI027
              - CI030
          - type: callout
            title: 5 年收入数据缺口——首要尽调阻塞点
            body: >
              最后一个已确认合并收入数字（390 B KRW / ~$330 M）来自 FY2020，距离本报告日期已有五年。之后所有财务数据都需要直接访问 Toss Bank 子公司的 DART 文件（韩文），或在 NDA
              下向管理层取得。可访问来源中没有找到近期 Toss 财务表现的英文摘要。这是最关键的尽调阻塞点：没有当前经审计财务，就无法承销这家公司。
            calloutType: risk
            claimRefs:
              - CI022
              - CI024
              - CI033
              - CI034
          - type: callout
            title: Toss Bank 盈利是里程碑，但不是集团故事
            body: >
              多家新闻来源（Reuters、Bloomberg、Nikkei——均有付费墙或限流）报道 Toss Bank 在 2023/2024 年首次盈利。但这是银行子公司，不是 Viva Republica
              合并主体。集团还包括券商、保险聚合、网约车（VCNC / Tada）和越南业务，这些业务可能仍在亏损。仅银行盈利不能证明集团层面盈亏平衡。
            calloutType: insight
