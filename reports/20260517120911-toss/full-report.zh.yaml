      - number: '6.4'
        title: 客户满意度与留存
        blocks:
          - type: paragraph
            body: >
              Toss 的客户满意度信号很强，尤其是在用户信任至关重要的金融服务应用里。韩国 iOS App Store 上，Toss 在 91,000 多条评价中获得 4.3 / 5
              分，显著高于韩国金融应用平均水平，后者通常评价更少且两极分化更明显。55% 的月活 / 注册用户比率（11M MAU / 20M 注册）按超级 App 标准也很高，意味着多数用户至少每月活跃。Toss Bank
              连续四年被 Forbes 独立评为韩国第一银行，反映其数字银行客户体验优于传统机构。年流失率、净收入留存和队列级生存曲线等正式留存指标未公开披露；这对 Toss 阶段的私营金融科技公司并不少见。未披露 NRR
              本身不是红旗，但限制了外部对长期韧性的验证。超级 App 的深度交叉销售架构——添加 Toss Bank 和 Toss Securities
              的用户更有工具性理由每天使用多项服务——在结构上改善了相对于单产品金融科技 App 的留存。Toss 的 24/7 客服、符合 PIPA 的数据处理和 FSC 牌照，也进一步夯实信任基础。
