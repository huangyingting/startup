            body: >
              KakaoBank 依托 KakaoTalk 分发；KakaoTalk 覆盖 88% 韩国人，给了它结构性的获客优势，Toss 无法自然复制。KakaoBank 上线前两周客户达到 2M，2025 年达到
              26.7M。Toss 依赖口碑和免费转账钩子，这很强，但缺少 KakaoTalk 的内嵌分发规模。这限制了 Toss Bank 相对 KakaoBank 的存款增长路径。
