      - number: '7.5'
        title: 竞争与合作伙伴依赖风险
        blocks:
          - type: paragraph
            body: >-
              KakaoBank FY2025 创纪录净利润 ₩480.3 billion、注册用户 26.7 million，并借助 Kakao 54 million 用户 KakaoTalk 消息分发，是 Toss
              Bank 增长逻辑中最清晰的竞争威胁。KakaoBank 存款基础达 ₩68.3 trillion，远高于公开可得的 Toss Bank 数据；它的获客成本在结构上更低，因为 KakaoTalk
              为现有用户预置金融发现入口。KakaoPay 的超级 App 野心、Naver Pay 的电商整合，以及传统五大银行 App（KB、Shinhan、Hana、Woori、NH）共同饱和了 Toss
              的目标用户群。Toss 通过与 CIMB Bank Vietnam 的合作运营越南业务，使集团暴露于外国监管风险、新兴市场信用风险和汇率折算风险，而这些风险在公开来源中都没有详细披露。Toss
              的多子公司结构带来监管复杂性：每个子公司都需要自己的牌照、资本隔离和合规基础设施，随着集团扩张，执行负担会增加。收入集中在韩国市场（几乎所有收入都来自本土），也让公司容易受到韩国国内宏观放缓或监管收紧的冲击，而这些冲击会不成比例地影响金融科技玩家。
