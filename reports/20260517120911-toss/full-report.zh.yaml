      - number: '4.4'
        title: 公开牵引指标与私有财务缺口
        blocks:
          - type: paragraph
            body: >
              Toss 是私营公司，没有发布合并财务报表的义务。最后一个已确认收入数字（390 B KRW / ~$330
              M，FY2020）截至本报告日期已经超过四年。公开牵引数据（用户数、产品采用里程碑）是判断财务规模的主要代理指标。

              **已确认的公开牵引数据：** - 截至 2021 年 6 月，韩国总注册用户 20 M（公司披露，TechCrunch 和 Forbes 确认）。 - 截至 2021 年 6 月，韩国月活跃用户（MAU）11
              M（公司通过 TechCrunch 披露）。 - Toss Securities：2021 年 3 月上线后的前三个月获得 3.5 M 用户。 - 截至 2019 年，累计处理支付 $48 B+（公司通过
              CNBC 披露）。 - 2018 年预计年交易运行率约 $18 B（据 TechCrunch 2018）。 - 2020 年进入越南，拥有 3 M+ MAU 和每月 500 K+ 新增活跃用户。 - Toss
              Bank：连续 4 年获 Forbes 评选为韩国 #1 银行（公司通过 tossbank.com 声称）。这是客户满意度指标，不是财务指标。 - Toss Bank 于 2021 年上线，2023/2024
              年据报道达到首次盈利里程碑。

              **收入轨迹估计（推断）：** 从 2020 年已确认的 390 B KRW（$330 M）基数出发，考虑到注册用户从约 18 M（2020 年估计）增长到 20 M+（2021 年中）、Toss Bank
              贷款账本上线（2021 年 9 月）以及 Toss Securities 快速采用，估计 2024 年合并收入为 $1.0–1.8 B，Toss Bank NII
              很可能是最大单一贡献者——但这些都是高度不确定的估计，不是已确认数字。

              **私有财务指标缺口：** 合并 P&L、EBITDA、现金头寸、烧钱速度和贷款账本规模都未公开披露。Toss Bank 向 DART（韩国版 EDGAR）和韩国 Financial Supervisory
              Service 提交监管报告，提供监管资本指标（BIS 比率、Tier 1 资本比率），但这些信息披露在韩文监管文件中，需要直接访问 DART 才能查看。截至本研究日期，可访问的公开来源中未发现 Toss
              Bank DART 文件的英文摘要。
