          - type: callout
            title: Toss 财务不透明带来规模测算不确定性
            body: >
              Viva Republica 是私营公司，自 FY2020（收入 ₩390B）以来没有发布经审计财务。2021 年后收入、用户数和 Toss Bank 资产负债表均未披露，估算 Toss 实际 SOM
              渗透率只能外推。₩7.4B–$10B 估值和 SoftBank $405M 融资意味着显著增长，但收入 / 估值比和当前亏损率未知。任何依赖收入质量的投资判断，都必须先补上这一阻断性尽调缺口。
