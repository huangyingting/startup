  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    sectionRef: S8V001
    notes: |
      每条投资逻辑都对应会改变判断的具体证据或尽调路径。各条按确信度从高到低排序。
    columns:
      - 论点
      - 改变判断的因素
    rows:
      - - 韩国超级应用护城河：20M+ 用户、40+ 项金融服务和数据飞轮共同构成结构性竞争壁垒
        - 2026 年用户增长停在 25M 以下，或核心支付 TPV 相对 Kakao Pay 下滑
      - - Toss Bank 以独立 $2.3B 独角兽估值和 2023-2024 年首次盈利验证盈利能力
        - NPL 率超过 2%，或 Toss Bank 需要母公司注入股权资本
      - - JP Morgan 和 Citigroup 已获 IPO 委任，KOSPI 上市可为投资者带来流动性事件
        - 2026 年出现第四轮连续 IPO 延迟，或承销商退出委任
      - - CEO 利益一致：SG Lee 持股约 18%，创始人激励与股东回报一致
        - Lee 通过老股出售大幅减持，或退出管理层
      - - 市场化利率信用模型：经 KCB 回测的 Toss 信用引擎区分能力高 150%，逾期率低 30%
        - NPL 率显著高于 KakaoBank 基准，或 FSC 介入放贷做法
      - - 反向：集团亏损不可持续，2022 年亏损 $500M 且 2023 年仍在亏损，说明超级应用模型尚未跑出资本效率
        - 公开披露显示 2024 年集团层面 EBITDA 转正或净利润打平
      - - 反向：$7.4B 估值标记停留在 2021 年高点；Series H 估值未披露；TechCrunch 报道 2022 年曾寻求下调估值
        - 公允老股交易或 IPO 招股书定价达到或高于 $7.4B
      - - 反向：IPO 公告与确认申报之间已相隔 4+ 年，延迟模式带来治理可信度风险
        - KRX 或 FSC 公开文件确认 2026 年正式注册
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    sectionRef: S8V004
    notes: |
      所有情景均根据可比倍数和部分财务数据估算。披露 2023-2024 年合并财务数据前，所有情景信心都较低。概率信号为定性评估，不是量化概率。适用换算使用 1350:1 的 KRW/USD 汇率。
    columns:
