            title: 超级 App 策略放大单用户 TAM
            body: >
              Toss 把 7+ 类金融产品整合在一个 App 下，一个获客用户可同时被转账、贷款、信用、证券、保险、报税和支付等场景触达。免费转账 → 贷款比价 →
              证券交易的交叉销售漏斗，可以在不增加获客成本的情况下，让每个用户群的 ARPU 复合增长——这是相对单一产品金融科技公司的结构性优势，也是 $7.4B 估值叙事的关键驱动。
