      - number: '1.5'
        title: 里程碑与产品演进
        blocks:
          - type: paragraph
            body: >-
              Viva Republica 的路径遵循一套有意设计的超级 App 剧本：先用一个高频工具（免费转账）建立大规模用户信任，再叠加相邻金融服务变现。公司 2013 年注册成立。SG Lee
              与韩国监管机构谈判约一年后，Toss App 于 2015 年商业化上线。2018 年，Toss 注册用户突破 10M，并通过 $80M 融资跻身独角兽。2020 年，公司进入越南并宣布获得 Toss Bank
              互联网银行牌照。

              Toss Bank 于 2021 年 9 月商业化上线，把自己定位为以贷款为重点的挑战者银行。许多新型银行靠银行卡交换费竞争，Toss Bank 则聚焦无抵押个人贷款和住房贷款，并把 Toss App
              的交易数据用作自有信用评分信号。Toss Securities 于 2021 年 3 月上线，专门降低首次零售投资者的门槛；这些用户此前因传统券商界面复杂而避开券商服务。

              2021 年 11 月，Viva Republica 收购 VCNC 的多数股权；VCNC 在韩国运营 Tada
              网约车服务，显示公司野心已超出纯金融科技。这笔收购是不寻常的战略动作，也引发外界对聚焦和资本配置的疑问。最初指向 2024 年的 IPO 计划似乎滑到 2025 年；Reuters 等媒体 2025 年 1
              月报道称，公司已委任 JP Morgan 和 Citigroup 牵头上市流程。截至 2026 年 5 月运行日，尚无公开确认的 IPO 申报。
