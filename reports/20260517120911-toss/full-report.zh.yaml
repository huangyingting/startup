  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品模块概览
        blocks:
          - type: paragraph
            body: >
              Toss 由 Viva Republica 运营，是韩国领先的金融超级 App，把 40 多项金融服务打包进一个 iOS 和 Android 移动应用。旗舰能力是点对点（P2P）转账：传统网银需要 37+
              步，Toss 只用收款人手机号和几次点击就能完成。这个 UX 跃迁带来快速采用：到 2025 年 1 月，韩国下载量突破 50 million；截至 2021 年中，公司披露 20 million 注册用户和
              11 million 月活用户，覆盖韩国成年人中的相当大比例。


              转账之外，Toss 还提供信用分监测（免费、实时）、消费贷款、保险分销、外汇和本土股票交易平台。Toss Securities 于 2021 年 3 月上线，三个月内超过 3.5 million 用户。Toss
              Bank 是韩国 Financial Services Commission 批准的第三家纯互联网银行，2021 年 9 月上线，并直接嵌入主 App，无需额外下载。Toss 目标到 2026 年达到 25
              million 月活用户，反映其产品组合还在继续扩张。超级 App 模型形成强交叉销售循环：查信用分的用户会被推荐相关贷款或信用卡产品，投资用户也能直接用 Toss Bank 账户给交易入金。
