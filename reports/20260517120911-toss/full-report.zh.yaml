        - 低至中；按已观察到的模式，每个单独触发项都有不可忽视的概率
  - id: TV004
    title: 可比估值表
    sectionRef: S8V003
    enumerationScope:
      coverage: partial
      basis: >
        Comparables selected from publicly accessible neobank and digital bank data covering Korean listed (KakaoBank),
        global listed (Nubank), large-cap private (Revolut, WeBank), and internal subsidiary mark (Toss Bank standalone
        April 2023 round).
    notes: |
      所有标记为估算的倍数都来自有限数据估算，投资决策前应使用当前财务数据重新计算。Toss Bank 与 KakaoBank 的对比最可用于基于 P/B 的底部估值。
    claimRefs:
      - CV019
      - CV020
      - CV021
      - CV023
      - CV024
      - CV026
      - CV027
      - CV029
      - CV033
    columns:
      - 可比公司 / 资产
      - 关键指标
      - 倍数 / 估值
      - 相关性
      - 局限
    rows:
      - - KakaoBank（KOSPI 323410）
        - 营业利润、客户数、成本收入比
        - 2025 年营业利润 649.4B KRW；26.7M 客户；2021H1 成本收入比 44%
        - 韩国持牌互联网银行，存款和贷款模型相似，是直接可比对象；为 Toss Bank 提供 P/B 底部
        - 独立实体；Toss 集团则有多家子公司；当前 P/B 需要实时 KRX 数据，本研究未捕捉
      - - 'Nubank（NYSE: NU）'
        - 收入、估值、客户数
        - 2023 年收入 $8.03B；2021 年 12 月 IPO 估值 $45B；100M+ 客户
        - 展示新兴市场新银行估值上限；说明增长期 P/S 倍数可超过 10x
        - 拉美 TAM 覆盖 200M+ 人口，远大于韩国 51M；收入规模和可服务市场不可比
      - - Revolut（私营）
        - 收入、估值、客户数
        - 2025 年收入 £4,516M；2025 年 11 月估值 $75B；50M+ 客户
        - 盈利型全球多币种平台可达到的估值上限，Revolut 已给出标尺
        - 全球多币种覆盖和英国监管套利带来 Toss 无法获得的溢价；韩国中心业务应大幅折价
      - - WeBank（私营，中国）
        - 估计估值
        - 2019 年分析师估计约 $21B USD
        - 若有大型科技平台和大国内市场支撑，亚洲新银行存在上行空间
        - 有国家背景且具中国特定性；Tencent 支持使估值不可直接比较；仅作为理想上限
      - - Toss Bank（私募子公司估值标记）
        - 私募独角兽轮估值
        - 2023 年 4 月投资轮估值 $2.3B USD
        - 直接子公司估值，为 Toss Bank 在集团分部加总中的贡献提供底部锚
        - 私募轮估值不可交易；公允性取决于条款；不包含 Toss Payments、Securities 和海外业务
  - id: TV005
    title: 投资逻辑破裂与终止触发因素表
    sectionRef: S8V005
    notes: |
      触发项按未来 18-24 个月估计概率排序。每项应按季度跟踪公开文件、DART 披露、KRX 公告和主要媒体报道。截至 2026 年 5 月，没有当前证据确认任何触发项已发生。
    columns:
      - 触发因素
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 第四次连续 IPO 延迟，错过 2026 年窗口
        - 到 2026 年 Q4 仍未提交 KRX 注册声明
        - 暗示公司系统性无法满足承销商财务门槛或监管要求；意味着集团财务仍未达到 IPO 准备状态；形成治理可信度缺口
        - 通过二级市场退出，或按下调估值持有；启动管理层沟通
      - - 2025 年集团层面净亏损仍在 $300M+
        - 2025 财年披露年净亏损达到或超过 400B KRW（约 $300M USD）
        - 削弱盈利路径逻辑；提高 IPO 前稀释性股权融资风险；把基准情景压向悲观区间
        - 降低确信度；要求更新股权结构透明度；压力测试优先股堆叠
      - - Toss Bank NPL 率超过 2%，且拨备上升
        - 公开披露 NPL 达到或超过 2%，或拨备成本超过净利息收入的 50%
        - 削弱管理层声称的风险模型优势；意味着信用损失吃掉 2023-2024 年声称的盈利；使 Toss Bank 独立估值低于 $2.3B 标记
        - 需要完整信用模型审计；独立信用审查完成前不投入资本
      - - FSC 监管处罚限制 Toss Bank 放贷或平台运营
        - FSC 发出的业务限制、牌照暂停或影响 Toss Bank 运营的重大罚款
        - 给 Toss Bank 估值底部带来风险；放贷受监管约束，会限制支撑盈利逻辑的净利息收入
        - 在监管问题解决前立即放弃；评估 Kakao Pay FSC 罚款先例
      - - CEO SG Lee 离职或重大老股出售
        - 公开披露 Lee 离职，或在二级市场出售超过 5% 持股
        - 移除创始人-市场契合带来的利益一致性；大额老股出售传递其对估值或流动性时点的个人判断
        - 召开投委会；评估继任管理层是否具备同等可信度
  - id: TV006
    title: 最终尽调问题表
    sectionRef: S8V005
    notes: |
      尽调问题按优先级排序。标为阻断项的事项，必须在任何按或高于 6B 隐含估值投资前解决。标为重大项 的事项应在投资前解决；例外需投委会明确批准并记录假设。
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 路径
    rows:
      - - 2023 和 2024 年合并经审计财务数据
        - >-
          Viva Republica FY2023 和 FY2024 完整合并 P&L、资产负债表和现金流量表；目前只有 Bloomberg 关于 2022 年创纪录亏损和 JoongAng Daily 关于 2023
          年趋势的部分数据
        - 阻断项：没有当前财务数据，任何估值情景都无法建立有意义的信心；建议不能推进到继续研究以外
        - 向投资者关系索取；以 dart.fss.or.kr 上 DART 注册的 Toss Bank 子公司报表作为起点
      - - IPO 申报状态和招股书确认
        - 确认截至 2026 年 5 月是否已向 KRX 或 FSC 提交正式 IPO 注册，或取得带里程碑的修订时间表
        - 阻断项：IPO 时间决定退出期限，也独立验证承销商已审阅并认可当前财务轨迹
        - 跟踪 KRX IPO 日历、FSC DART，并直接接触 JP Morgan 或 Citigroup 股票资本市场团队
      - - Series H 估值条款和优先股堆叠
        - Series H（SoftBank，2023 年 2 月）及更早轮次的投后估值、清算优先权条款、反稀释条款和参与权
        - 重大项：优先股压力决定低于 $7B 退出情景下普通股股东可获得什么；没有这些信息，无法为非优先投资者建模回报
        - 审阅 SoftBank Vision Fund II 披露文件；向管理层索取条款清单；核查韩国工业部数据库中的 FDI 文件
      - - 用于 Toss Bank 对标的当前 KakaoBank 市值和 P/B
        - 获取 KakaoBank (323410) 实时 KRX 报价，计算当前 P/B 和 P/E 倍数，并套用于 Toss Bank 已披露权益资本
        - 重大项：没有当前 KakaoBank 交易数据，基于 P/B 的 Toss Bank 估值底部只能依赖估算，而非市场证据
        - 访问 KRX 或 Bloomberg Terminal 获取 KakaoBank 实时价格数据；交叉核对 Toss Bank 在 DART 披露的权益资本
      - - Toss Bank 权益资本账面价值和一级资本充足率
        - Toss Bank 作为持牌银行通过 DART 可获得银行监管披露中的权益资本，从而可计算 P/B
        - 重大项：锚定 Toss Bank 对分部加总估值贡献的最关键单一数据点
        - 访问 DART 获取 Toss Bank 银行监管报告；FSC 要求所有持牌银行公开披露该报告
