      - number: '1.4'
        title: 规模与关键指标
        blocks:
          - type: paragraph
            body: >-
              Toss 已从小众转账 App 长成韩国主导型金融平台。2021 年 6 月 Series G 公告时，Viva Republica 披露总用户 20M、月活用户 11M——相当于韩国约 51.7M
              人口的三分之一以上。当时，韩国超过 20% 的银行账户和信用卡已注册在 Toss 平台。2019 年，CNBC 报道 Toss 已处理超过 $48B 支付。

              财务表现上，Viva Republica（据 Forbes）披露 2020 年收入约 390B 韩元（约 $330M），较上一年增长三倍。亏损从 2019 年的 115B 韩元收窄至 2020 年约 72.5B
              韩元——公司仍在亏损，但正向盈利靠近。2021–2026 年收入数字未公开披露。

              Toss Securities 于 2021 年 3 月上线，前三个月吸引超过 3.5M 用户，显示超级 App 很强的交叉销售能力。Toss 还在 2020 年进入越南；2021 年 6 月 Series G
              公告称，当地月活用户 3M，且每月新增月活 500,000。

              公司尚未公开确认 2021 年后的用户数、员工数或收入。行业估算和新闻报道显示，Toss Bank 到 2024 年突破 10M 客户，Toss App 月活超过
              25M，但本章审阅的主要来源未能确认这些数字。员工数同样由媒体估算约 5,000 人，公司未正式披露。
