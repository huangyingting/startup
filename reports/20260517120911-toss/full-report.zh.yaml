  - id: FU001
    title: 客户旅程图
    type: journey-map
    summary: |
      从首次尝试 P2P 转账到主动推荐超级 App，五阶段客户旅程勾出 Toss 的飞轮：免费转账拉动病毒式获客，持续扩张的产品套件则在后续参与阶段逐步锁住用户。
    data:
      items:
        - label: 认知：免费 P2P 转账
          description: |
            用户通过朋友推荐或社交媒体发现 Toss，下载 App 只为发起一笔免费银行转账。零费用、10 秒内完成，第一次体验就足够强。
        - label: 激活：账户同步
          description: |
            用户借助 KFTC Open Banking API 关联所有银行账户和信用卡。生物识别登录抹掉摩擦，统一余额看板成了主要金融首页。
        - label: 参与：日常财务管理
          description: |
            用户每天查看 Toss Bank 利息、复盘支出分析、缴账单、盯信用分。超级 App 成为默认金融入口，每周会打开多次。
        - label: 扩展：采用新产品
          description: |
            用户开通 Toss Securities（股票交易），通过贷款比价平台申请贷款，或在 App 内面板购买保险。每多用一个产品，锁定效应就加深一层。
        - label: 推荐：评价与转介绍
          description: |
            满意用户在 App Store 留下评价（91K+，4.3/5），也通过 App 内转账邀请推荐朋友。口碑仍是 Toss 最主要的 CAC 渠道。
