      - number: '7.6'
        title: 人员、执行风险与终止标准
        blocks:
          - type: paragraph
            body: >-
              SG Lee（Lee Seung-gun）是 Toss 创始人、CEO 和主要战略架构师。他持有 Viva Republica 约 18% 股份，自 2013
              年公司创立以来，推动了每一次重大产品扩张、监管关系和融资事件。创办 Toss 前，Lee
              经历八次创业失败，最终从牙医职业转向创业——这段背景让他能以非常规视角看消费者痛点，但他并没有规模化金融服务运营的正式经历。战略、文化和监管信任集中在一个人身上，形成严重关键人物风险：如果 Lee
              离职、失能或遭遇监管审查，可能引发管理层不确定、合作伙伴谨慎和潜在投资人赎回。董事会治理结构、继任规划和 Lee
              之下的管理梯队深度均未公开披露。多垂直领域快速扩张也放大执行风险——银行、支付、证券、保险和国际市场同时建设，拉伸工程、合规和监管带宽。以下表格汇总所有风险清单、缓释措施和投资逻辑终止触发点。
