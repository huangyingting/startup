          - type: callout
            title: FY2024 收入区间假设 2020 年后继续增长
            body: >
              FY2024 估算收入区间 $900 M–$1.8 B，假设收入在 2020 年已确认三倍增长后继续扩张。Toss Bank 于 2021 年 9 月上线（从零新增 NII）、Toss Securities 于
              2021 年 3 月上线（新增券商收入），再加上用户基数增长，方向上支撑这个假设。但可访问来源中没有管理层或投资人给出的具体收入指引或前瞻预测。
