  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Toss 在韩国同时参与多个相互重叠的金融服务市场，每个市场都有不同买方动态和监管要求。最窄口径是韩国互联网银行（纯数字银行账户及配套支付轨道），这是由 KakaoBank、Toss Bank 和 K Bank
              组成的三方市场，三者均由金融服务委员会（FSC）发牌。仅 KakaoBank 一家，到 2025 年底就拥有 26.7M 客户和 ₩68.3T 存款，提供了规模标尺。第二个视角是数字支付：韩国支付市场包括移动
              POS、数字钱包、二维码支付和点对点转账，背后驱动因素是近乎普及的智能手机渗透率和政府对无现金商业的积极推动。

              第三个、更宽的视角是韩国整体金融科技收入池。分析师估算其每年约 $10B–40B，取决于是否纳入保险保费、证券经纪佣金、贷款利差和平台推荐费。Toss
              可服务市场之外的是机构资本市场、批发银行和外汇批发流。相邻机会包括网约车（历史上探索过但未继续推进）、员工福利管理和政府福利发放。

              Toss 每条产品线的现状替代品各不相同。转账的替代品是传统银行电汇（通常收费、时间受限）。贷款的替代品是网点银行贷款，需要线下提交材料。信用评分的替代品是通过独立渠道获取 Korea Credit
              Bureau（KCB）报告。证券经纪的替代品是 Mirae Asset、Kiwoom、Samsung Securities 等全服务券商。保险的替代品是代理人经纪保单。Toss
              在各垂直的价值主张都是无摩擦移动访问——把多步骤、重纸面的流程替换为 App 内一分钟以内完成。
