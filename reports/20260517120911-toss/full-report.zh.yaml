      - number: '6.5'
        title: B2B 商户与金融机构网络
        blocks:
          - type: paragraph
            body: >
              除直接面向消费者的板块外，Toss 也建立了一个面向 B2B 的网络，形成平台级粘性。Toss Payments 服务需要线上收款和企业财务管理的商户，在韩国 PG 市场与 KakaoPay 和 NHN KCP
              竞争。贷款比较市场聚合来自 75 家金融机构的实时贷款报价，其中包括 16 家 Tier-1 银行，让消费者在 60
              秒内比较有条件报价。这种机构深度在韩国金融科技市场中最大，既形成消费者获客渠道（更低贷款利率吸引用户来到 Toss），也形成 B2B 收入流（来自合作贷款机构的发起费）。越南 CIMB Bank 合作证明
              Toss 能执行受监管的国际金融合作，也为进入更多东南亚市场提供模板。主要集中度风险在于收入基础高度依赖韩国；公司已明确表示计划进入更多东南亚市场。2022 年以来 IPO 延迟，让 Toss
              进入公开资本市场的时间表充满不确定，也可能影响其按所需速度为国际扩张提供资金、实现实质收入多元化的能力。KPMG 和 H2 Ventures 在 2019 年把 Toss 列为全球第 29
              名金融科技公司，佐证其在消费者渠道之外也获得机构认可。
