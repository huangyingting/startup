callouts:
  - calloutType: strength
    title: Diversified Revenue Model Reduces Single-Stream Risk
    body: >
      Toss's five-stream revenue model (payments, banking, brokerage, insurance, referrals)
      provides meaningful diversification. If payment revenue compresses under competitive
      pressure from Kakao Pay, banking NII from Toss Bank can offset. If brokerage
      commissions decline in a bear market, consumer lending may remain stable. This
      structure is unusual for a private fintech at Toss's stage and provides a more
      defensible margin profile than single-stream competitors.
    claimRefs: [CI001, CI002, CI003, CI004, CI005]

  - calloutType: risk
    title: Banking Capital Dependency Creates Ongoing Equity Need
    body: >
      Toss Bank's loan book growth requires proportional Tier 1 capital under Korean FSC
      BIS guidelines. Each incremental won of loan growth consumes parent-level equity.
      While this is normal for banks, it means Viva Republica's cash position is
      perpetually drawn down by the banking subsidiary's growth ambitions — creating a
      structural capital dependency that the IPO must resolve. Pre-IPO, any slowdown in
      external funding could constrain Toss Bank's growth rate.
    claimRefs: [CI026, CI027, CI030]

  - calloutType: risk
    title: 5-Year Revenue Data Gap — Primary Diligence Blocker
    body: >
      The last confirmed consolidated revenue figure (390 B KRW / ~$330 M) is from FY2020
      — five years before this report date. All subsequent financials require either DART
      Toss Bank subsidiary access (in Korean) or NDA with management. No English-language
      summary of recent Toss financial performance has been found from accessible sources.
      This is the single most critical diligence blocker: the business cannot be
      underwritten without current audited financials.
    claimRefs: [CI022, CI024, CI033, CI034]

  - calloutType: insight
    title: Toss Bank Profitability Is a Milestone But Not a Group Story
    body: >
      Multiple news sources (Reuters, Bloomberg, Nikkei — all paywalled/rate-limited)
      report that Toss Bank achieved first-ever profitability in 2023/2024. However, this
      is the subsidiary banking entity, not Viva Republica consolidated. The group entity
      includes the brokerage, insurance aggregator, ride-hailing (VCNC/Tada), and Vietnam
      operations, which may still be loss-making. Bank-only profitability does not
      confirm group-level breakeven.
    claimRefs: [CI017, CI018, CI021, CI031]

  - calloutType: assumption
    title: FY2024 Revenue Range Assumes Continued Post-2020 Growth
    body: >
      The FY2024 estimated revenue range of $900 M–$1.8 B assumes that revenue growth
      continued after 2020's confirmed tripling. Given Toss Bank's launch in September
      2021 (adding NII from zero), Toss Securities' launch in March 2021 (adding brokerage
      revenue), and user base growth, the growth assumption is directionally supported.
      However, no specific revenue guidance or forward projections from management or
      investors are available from accessible sources.
    claimRefs: [CI019, CI020]

