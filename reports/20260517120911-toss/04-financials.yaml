  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: consolidated-group-financials
      missingEvidence: >
        Viva Republica's consolidated revenue, gross margin, EBITDA, net income, cash
        position, and burn rate for FY2021–2025. The last confirmed figure is FY2020
        revenue of 390 B KRW ($330 M).
      whyItMatters: >
        Cannot size the business, assess growth rate, or build a financial model without
        current revenue and margin data. The business has transformed fundamentally since
        FY2020 with the launch of Toss Bank, Toss Securities, and VCNC — all material
        revenue contributors absent from the last disclosed period.
      diligencePath: >
        Request audited consolidated financial statements (FY2021–2025) under NDA before
        any investment decision. Obtain DART filing access for Toss Bank subsidiary in
        Korean (dart.fss.or.kr, search: 토스뱅크주식회사).
      relatedQuestionRefs: [QI002, QI012]
      relatedTableRefs: [TI005]

    - type: private-evidence-only
      severity: blocking
      topic: cash-burn-runway
      missingEvidence: >
        Viva Republica cash on hand, monthly burn rate, and runway as of the most recent
        reporting period. No proxy metric is accessible.
      whyItMatters: >
        Cannot assess capital adequacy, likelihood of needing additional equity before
        IPO, or creditor risk without knowing the cash position relative to burn.
      diligencePath: >
        Request CFO disclosure of cash balance and 12-month burn forecast under NDA.
      relatedQuestionRefs: [QI012, QI014]
      relatedTableRefs: [TI004]

    - type: access-blocked
      severity: material
      topic: toss-bank-dart-filings
      missingEvidence: >
        Toss Bank's annual reports filed with DART (Korea's financial disclosure system)
        containing loan book size, NIM, BIS ratio, Tier 1 capital ratio, and NPL ratio.
        These filings exist but are in Korean and require direct DART system navigation.
      whyItMatters: >
        Toss Bank's banking NII is likely the largest single revenue contributor post-2021
        launch. Without the DART annual report, cannot quantify the loan book, credit
        quality, or NII contribution.
      diligencePath: >
        Engage a Korean-language financial analyst to access DART (dart.fss.or.kr) and
        retrieve Toss Bank's (토스뱅크주식회사) most recent annual report filing.
      relatedQuestionRefs: [QI007, QI018]
      relatedTableRefs: [TI003, TI005]

    - type: private-evidence-only
      severity: material
      topic: unit-economics-cac-ltv
      missingEvidence: >
        CAC by acquisition channel, customer LTV by cohort vintage, ARPU by product
        segment, and contribution margin by business line.
      whyItMatters: >
        Without segment-level unit economics, cannot assess the sustainability of growth
        spend or the true profitability of each revenue stream.
      diligencePath: >
        Request unit economics dashboard from CFO/VP Finance under NDA; specifically
        cohort retention analysis, ARPU by product, and CAC by channel for 2022–2024.
      relatedQuestionRefs: [QI005, QI021]
      relatedTableRefs: [TI003]

    - type: stale
      severity: material
      topic: payment-tpv-current
      missingEvidence: >
        Annual TPV for Toss Payments for 2022–2025. Last known figure is the $48 B+
        cumulative to 2019 and ~$18 B annual run-rate in 2018.
      whyItMatters: >
        Payment revenue = MDR × TPV. Without current TPV, cannot model payment revenue
        or assess share vs. Kakao Pay and Samsung Pay.
      diligencePath: >
        Request annual TPV and merchant count from Toss Payments (tosspayments.com) or
        access regulatory filings for the payments subsidiary.
      relatedQuestionRefs: [QI011]
      relatedTableRefs: [TI001, TI005]

    - type: missing-source
      severity: material
      topic: ipo-status-2026
      missingEvidence: >
        Confirmation of IPO filing status, target exchange, and revised timeline as of
        May 2026. Reuters and Bloomberg reported a 2025 target in early 2024, but no
        accessible source confirms whether an S-1 or Korean IPO application has been
        filed as of this research date.
      whyItMatters: >
        IPO timing materially affects capital adequacy, existing investor liquidity, and
        potential dilution scenarios for new investors.
      diligencePath: >
        Check Korea Exchange (KRX) IPO calendar and SEC EDGAR for any filed F-1 (foreign
        issuer IPO registration). Contact investor relations directly.
      relatedQuestionRefs: [QI013]
      relatedTableRefs: [TI004]

acknowledgedWarnings:
  - dimension: tableNotes
    reason: >
      All five tables include notes fields documenting estimation methodology, data
      sources, and coverage limitations. The tableNotes warning is not applicable
      to this chapter as all tables have substantive notes.
  - dimension: paywallRisk
    reason: >
      Seven sources are paywalled or rate-limited (Bloomberg ×2, WSJ ×2, Reuters ×2,
      NYT ×1). These are high-reputation independent outlets covering Toss's fundraising,
      IPO plans, and banking profitability — information not available from any accessible
      primary source. Each paywall source is cited only for claims that are corroborated
      by at least one accessible source or that are explicitly flagged as unconfirmed.
      No paywall source is used as the sole basis for any high-confidence claim.
