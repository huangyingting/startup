  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Factor
      - Type
      - Mechanism
      - Impact on Toss
      - Evidence Strength
    rows:
      - - High smartphone penetration and 5G infrastructure
        - Driver
        - "Korea: 4th in Global Innovation Index 2025; mature mobile market; near-universal 5G"
        - Zero-friction digital banking acquisition; no branch or ATM capex
        - high
      - - Government cashless economy promotion
        - Driver
        - FSC and MOF policies incentivising digital payment adoption over cash
        - Expands TAM of digital payments; reduces merchant resistance to app-based POS
        - medium
      - - Incumbent bank friction and fee dissatisfaction
        - Driver
        - Legacy banks charge transfer fees and require branch visits for account opening
        - Toss's free-transfer hook converts fee-paying bank customers at near-zero CAC
        - high
      - - Credit gap for young and gig-economy workers
        - Driver
        - Thin-file consumers cannot access prime lending rates via traditional banks
        - Toss credit-scoring and loan comparison captures underserved borrowers
        - medium
      - - Retail investment democratisation wave (2020–2021)
        - Driver
        - 40M+ Korean retail brokerage accounts opened peak 2021; demand for low-friction investing
        - Toss Securities launched into a market with high retail investor demand
        - medium
      - - Primary bank inertia and trust deficit
        - Constraint
        - Majority of consumers keep primary banking relationship at incumbent bank
        - Limits Toss Bank deposit balance growth and NIM contribution
        - high
      - - Regulatory capital requirements (FSC)
        - Constraint
        - Internet banks require BIS capital ratio maintenance; FSC approval for new products
        - Slows product expansion and limits leverage; requires separate licences per product line
        - high
      - - KakaoBank competitive dominance
        - Constraint
        - KakaoBank has 26.7M customers (vs Toss's ~20M 2021) and ₩68.3T deposits; growing 10%+ annually
        - Market leader with distribution advantage via KakaoTalk 88%-penetration; harder share gains
        - high
      - - Single-country revenue concentration
        - Constraint
        - South Korea represents ~100% of Toss revenue; Vietnam is nascent
        - Full exposure to Korean macro, regulatory, and competitive cycles
        - medium
      - - Post-IPO profitability pressure
        - Constraint
        - Toss targeting IPO; investors and underwriters require demonstrated profitability path
        - Must balance growth investment (Toss Bank capital, Securities build-out) with margin
        - medium
    notes: >-
      Evidence strength reflects the availability of corroborating public data. High = multiple independent
      sources; medium = inferred or single source. KakaoBank's 2025 results provide the strongest
      public benchmark for the Korean internet banking market.
