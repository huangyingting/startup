  - id: s5
    title: Diligence Gaps and Contradictory Estimates
    body: >
      Several material gaps limit the precision of this market analysis: (1) Toss's post-2021
      revenue and user count: Viva Republica is private and has not published audited financials
      since FY2020. The most recent publicly disclosed revenue figure is ₩390 billion for FY2020,
      making it impossible to quantify current SOM penetration from public sources. (2) Toss Bank
      loan book and deposit base: while KakaoBank publishes quarterly financials (listed on KRX),
      Toss Bank's balance sheet is not publicly available. The regulatory filing body DART contains
      some disclosures, but comprehensive data requires access to FSC-filed reports. (3) Korean
      fintech TAM conflicting estimates: analyst reports from Grand View Research, Mordor Intelligence,
      and Statista publish market sizes ranging from $10B to $40B+ for the same geography and time
      window, reflecting inconsistent scope definitions (credit card interchange, bancassurance, and
      institutional digital payments are included or excluded without consistent methodology).
      (4) Toss Securities market share: with 40+ million Korean retail brokerage accounts active
      during the 2021 peak, the addressable market is large but the sustainable trading volume
      post-boom is uncertain. Toss Securities' actual market share is not publicly disclosed.
      (5) Vietnam market contribution: Toss operates in Vietnam but no revenue, user, or market
      share data for that market is publicly available.
