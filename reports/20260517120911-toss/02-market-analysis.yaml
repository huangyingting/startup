callouts:
  - calloutType: strength
    title: KakaoBank Peer Data Anchors SAM Sizing
    body: >
      KakaoBank's public financials (listed KRX: 323410) provide a rare primary-source anchor for the
      South Korean internet banking SAM: ₩68.3T in deposits and ₩46.9T in loans by end-2025, with
      non-interest income of ₩1.09T exceeding the ₩1T mark for the first time. This validates that
      a digital-native Korean bank can reach meaningful deposit scale and platform revenue — and sets
      a credible floor for the three-bank internet banking market.
    claimRefs:
      - CM007
      - CM008
      - CM026
  - calloutType: risk
    title: Toss Financial Opacity Creates Sizing Uncertainty
    body: >
      Viva Republica is private and has not published audited financials since FY2020 (₩390B revenue).
      With no disclosed post-2021 revenue, user count, or Toss Bank balance sheet, estimating Toss's
      actual SOM penetration requires extrapolation. The ₩7.4B–$10B valuation and $405M SoftBank
      raise imply significant growth, but the revenue-to-valuation ratio and current loss rate are
      unknown. This is a blocking diligence gap for any investment thesis dependent on revenue quality.
    claimRefs:
      - CM005
      - CM013
      - CM035
  - calloutType: insight
    title: Super-App Strategy Multiplies TAM Per User
    body: >
      Toss's integration of 7+ financial product categories under one app means each acquired user
      is simultaneously addressable across transfers, loans, credit, securities, insurance, tax filing,
      and payments. The cross-sell funnel from free transfer → loan comparison → securities trading
      enables compounding ARPU growth per cohort without incremental acquisition cost — a structural
      advantage over single-product fintechs and a key driver of the $7.4B valuation narrative.
    claimRefs:
      - CM003
      - CM015
      - CM020
  - calloutType: risk
    title: KakaoBank Distribution Advantage is Structural
    body: >
      KakaoBank's distribution via KakaoTalk — used by 88% of South Koreans — gave it a structural
      customer acquisition advantage that Toss cannot replicate organically. KakaoBank reached 2 million
      customers in its first two weeks and 26.7 million by 2025. Toss relies on word-of-mouth
      and its free-transfer hook, which is powerful but lacks the embedded-distribution scale of
      KakaoTalk. This constrains Toss Bank's deposit growth path relative to KakaoBank.
    claimRefs:
      - CM016
      - CM031
      - CM030
