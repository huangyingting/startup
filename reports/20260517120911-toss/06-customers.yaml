sections:
  - id: s1
    title: User Base Overview
    body: >
      Toss (Viva Republica) has built one of South Korea's largest fintech consumer bases by
      eliminating friction from daily financial transactions. As of June 2021 — the most recent
      fully corroborated public data point — Toss had 20 million registered users and 11 million
      monthly active users, representing more than one-third of South Korea's 51.7 million
      population. Over 20% of all South Korean bank accounts and credit cards were registered
      on Toss at that date. The app is rated 4.3 out of 5 stars based on over 91,000 user reviews
      on the Korean Apple App Store, indicating sustained high satisfaction across a very large
      review base. Toss serves multiple overlapping customer segments: mass retail consumers using
      free P2P transfers and a unified financial dashboard; Toss Bank customers seeking digital-first
      banking and competitive loan rates; Toss Securities users pursuing accessible retail investing;
      credit-constrained borrowers leveraging Toss's KCB-integrated scoring engine; and small-to-medium
      business operators using Toss Payments. The Financial Services Commission (FSC) licenses
      Toss and its subsidiaries under the Electronic Financial Transactions Act, establishing a
      regulatory floor that underpins consumer trust.
    tableRefs:
      - TU001
    figureRefs:
      - FU001
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004

  - id: s2
    title: Customer Growth Trajectory
    body: >
      Toss launched in 2015 as a Venmo-style peer-to-peer transfer service and grew to unicorn
      status by 2018. By mid-2019, it had 14 million registered users and had facilitated more
      than $48 billion in cumulative payments, demonstrating rapid adoption in a market dominated
      by incumbent banks. The platform's strategy of frictionless onboarding — one-tap transfers
      requiring no secondary app authentication — drove viral growth through word-of-mouth. The
      Series G round in June 2021 disclosed the 20 million registered user milestone with 11
      million MAU, underpinned by the simultaneous launches of Toss Securities (3.5 million users
      in three months) and the September 2021 launch of Toss Bank. By January 2025, cumulative
      downloads had surpassed 50 million, a figure reported by Korea Times. Revenue more than
      tripled to approximately $330 million (390 billion won) in 2020. The growth trajectory from
      launch to Series G represents a compound doubling of the user base roughly every 18–24
      months. Toss Bank's four consecutive years as Forbes's top-ranked bank in Korea, combined
      with 40-plus financial services offered in the super-app, suggests the user base is
      progressively deepening engagement beyond the original P2P transfer use case.
    tableRefs:
      - TU002
    figureRefs:
      - FU002
    claimRefs:
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009

  - id: s3
    title: Product-Specific Adoption and Named Proof
    body: >
      Toss has accumulated substantive named customer proof across several product lines. The most
      quantified example is Toss Securities: launched in March 2021, it attracted 3.5 million users
      in its first three months — a pace that made it the fastest-growing retail investment product
      launch in Korean fintech history. In Vietnam, Toss built a financial super-app in partnership
      with CIMB Bank, accumulating over 3 million monthly active users and adding more than 500,000
      new actives per month as of June 2021. This established Toss as the largest Korean fintech
      presence in Southeast Asia. On the credit analytics side, Korea Credit Bureau (KCB) backtested
      Toss's proprietary credit-scoring engine using data from over two million users and found it
      performed 150% better in differential power analysis and 30% lower in delinquency rates
      compared to traditional bureau models. These three data points — Securities adoption rate,
      Vietnam MAU, and KCB backtesting results — represent independent third-party validation of
      Toss's product-specific adoption and customer outcomes. Named proof at the consumer cohort
      level is strong; named enterprise/B2B customer references beyond Toss Payments merchants and
      the KCB partnership are limited in public disclosures.
    tableRefs:
      - TU003
    figureRefs:
      - FU003
    claimRefs:
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015

  - id: s4
    title: Customer Satisfaction and Retention
    body: >
      Toss exhibits strong customer satisfaction signals, particularly for a financial services
      application where user trust is paramount. The Korean iOS App Store rating of 4.3 out of 5
      from over 91,000 reviews places Toss significantly above average for Korean financial
      applications, which typically receive fewer and more polarized reviews. The 55% monthly
      active-to-registered user ratio (11M MAU / 20M registered) is high by super-app standards
      and implies that the majority of users actively engage at least monthly. Toss Bank has
      been independently ranked as the number-one bank in South Korea by Forbes for four
      consecutive years, reflecting superior digital banking customer experience relative to
      incumbents. Formal retention metrics such as annual churn rate, net revenue retention,
      and cohort-level survival curves are not publicly disclosed; this is common for private
      fintech companies at Toss's stage. The lack of disclosed NRR is not itself a red flag,
      but it limits external validation of long-term durability. The deep cross-sell architecture
      of the super-app — where users who add Toss Bank and Toss Securities are instrumentally
      more likely to use multiple services daily — structurally improves retention versus
      single-product fintech apps. Toss's 24/7 customer support, PIPA-compliant data handling,
      and FSC licensing further reinforce the trust foundation.
    tableRefs:
      - TU004
    figureRefs:
      - FU004
    claimRefs:
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020

  - id: s5
    title: B2B Merchant and Financial Institution Network
    body: >
      Beyond its direct-to-consumer segments, Toss has built a B2B-facing network that creates
      platform-level stickiness. Toss Payments serves merchants who require online payment
      acceptance and business finance management, competing with KakaoPay and NHN KCP in the
      Korean PG market. The loan comparison marketplace aggregates real-time loan offers from
      75 financial institutions — including 16 Tier-1 banks — enabling consumers to compare
      conditional offers within 60 seconds. This institutional depth, the largest of any Korean
      fintech marketplace, creates both a consumer acquisition channel (lower loan rates drive
      users to Toss) and a B2B revenue stream (origination fees from partner lenders). The CIMB
      Bank partnership in Vietnam demonstrates that Toss can execute regulated international
      financial partnerships, a template for additional Southeast Asia market entry. The primary
      concentration risk is South Korea's geographic dominance of the revenue base; the company
      has explicitly signalled plans to enter additional Southeast Asian markets. IPO delays since
      2022 create uncertainty about the timeline for Toss to access public capital markets, which
      could affect its ability to fund international expansion at the pace required to achieve
      material revenue diversification. KPMG and H2 Ventures ranked Toss as the 29th best fintech
      globally in 2019, corroborating its institutional recognition beyond consumer channels.
    tableRefs:
      - TU005
    claimRefs:
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
      - CU027

