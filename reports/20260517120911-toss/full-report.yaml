      - number: '7.4'
        title: Financial, Capital and Credit Risks
        blocks:
          - type: paragraph
            body: >-
              Viva Republica reported a net loss of ₩72.5 billion in FY2020, narrowed from ₩115 billion in FY2019, but
              losses continued through 2022 as the company invested heavily in Toss Bank's launch and geographic
              expansion into Vietnam. Finextra reported in 2024 that Toss Bank turned profitable, but the consolidated
              group's path to profitability and timeline to positive free cash flow remain undisclosed in public
              sources. The company raised $410 million at a $7.4 billion valuation in its Series G round in June 2021
              and has raised over $900 million in aggregate, yet the IPO has been delayed at least twice from the 2023
              target window, creating exit pressure on late-stage investors. A down-round risk exists if macro
              conditions deteriorate before listing. Toss Bank's credit model—which KCB backtested as having 30% lower
              delinquency than the KCB benchmark and 150% better differential power—has not been tested through a full
              domestic credit cycle or a recession. The bank's focus on underserved borrowers increases the sensitivity
              of its loan book to unemployment shocks and rate spikes. Net interest margin compression is a structural
              risk as all three internet banks (K-Bank, KakaoBank, Toss Bank) compete for deposits and loans in a market
              where KakaoBank's scale advantage allows it to price aggressively. Capital adequacy requirements for
              internet banks impose additional regulatory constraints on growth-funded lending expansion.
            claimRefs:
              - CR014
              - CR015
              - CR016
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
              - CR031
              - CR041
              - CR042
              - CR043
      - number: '7.5'
        title: Competitive and Partner Dependency Risks
        blocks:
          - type: paragraph
            body: >-
              KakaoBank's record FY2025 net profit of ₩480.3 billion and 26.7 million registered users—serviced via
              Kakao's 54-million-user KakaoTalk messaging distribution—represent the clearest competitive threat to Toss
              Bank's growth thesis. KakaoBank's deposit base of ₩68.3 trillion dwarfs publicly available Toss Bank
              figures, and its customer acquisition cost is structurally lower because KakaoTalk pre-loads financial
              discovery for its existing user base. KakaoPay's super-app ambitions, Naver Pay's e-commerce integration,
              and the traditional big-five bank apps (KB, Shinhan, Hana, Woori, NH) collectively saturate Toss's target
              user segments. Toss's Vietnam operations through its partnership with CIMB Bank Vietnam expose the group
              to foreign regulatory risk, credit risk in an emerging market, and currency translation risk—none of which
              are disclosed in detail in public sources. Toss's multi-subsidiary structure creates regulatory
              complexity: each subsidiary requires its own licence, capital ring-fencing, and compliance infrastructure,
              which increases the execution burden as the group scales. Concentration in the Korean market (nearly all
              revenue is domestic) creates vulnerability to any domestic macroeconomic slowdown or regulatory tightening
              that disproportionately affects fintech players.
            claimRefs:
              - CR023
              - CR024
              - CR025
              - CR026
              - CR027
              - CR028
