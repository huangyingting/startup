      - number: '2.3'
        title: Buyer and User Segmentation
        blocks:
          - type: paragraph
            body: >
              Toss's user base in South Korea spans four primary segments with distinct economics and adoption pathways.
              The largest segment — mass retail (digitally active Korean adults aged 18–45) — accounts for the majority
              of the 20+ million users who use Toss for free money transfers, credit score monitoring, and account
              aggregation. Acquisition is primarily app-store organic and referral (Toss's free-transfer model has zero
              marginal cost and creates natural word-of-mouth). Budget ownership is personal; ARPU in this segment is
              low but serves as the funnel top for upsell to paid products.

              The second segment comprises loan-seeking and credit-building users. Toss's loan comparison engine
              aggregates consumer loan offers from 30+ licensed Korean financial institutions, taking a referral fee on
              successful originations. Budget ownership is personal income or business operating cash; adoption is
              triggered by financial need events (large purchase, refinancing). This segment carries materially higher
              ARPU than free-transfer users and has been a major revenue driver.

              The third segment is retail investors using Toss Securities. With over 40 million retail brokerage
              accounts opened in Korea during the 2020–2021 stock market boom (driven by individual investors entering
              the market), the retail brokerage segment is large but competitive. Toss Securities differentiates on UX
              simplicity (single-tap stock purchase integrated into the main Toss app), zero commission on some
              products, and fractional shares. ARPU depends on trading volume. Budget ownership is personal savings.

              The fourth segment is small business owners using Toss for business payments, POS (Toss Place), and
              merchant settlement. South Korea has ~7 million self-employed and small business owners who represent a
              high-intent segment for Toss's B2B financial tools. Budget ownership is business operating accounts.
              Adoption is triggered by merchant fee dissatisfaction with incumbent payment processors.

              KakaoBank's segmentation offers a useful benchmark: its 26.7 million customers skew younger (distributed
              via KakaoTalk's 88%-of-Korea-population penetration) and its non-interest income of ₩1.09 trillion
              exceeded the ₩1T mark for the first time in 2025, confirming that platform fee and referral revenue is
              achievable at scale in the Korean internet banking market.
