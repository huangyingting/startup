      - number: '6.4'
        title: Customer Satisfaction and Retention
        blocks:
          - type: paragraph
            body: >
              Toss exhibits strong customer satisfaction signals, particularly for a financial services application
              where user trust is paramount. The Korean iOS App Store rating of 4.3 out of 5 from over 91,000 reviews
              places Toss significantly above average for Korean financial applications, which typically receive fewer
              and more polarized reviews. The 55% monthly active-to-registered user ratio (11M MAU / 20M registered) is
              high by super-app standards and implies that the majority of users actively engage at least monthly. Toss
              Bank has been independently ranked as the number-one bank in South Korea by Forbes for four consecutive
              years, reflecting superior digital banking customer experience relative to incumbents. Formal retention
              metrics such as annual churn rate, net revenue retention, and cohort-level survival curves are not
              publicly disclosed; this is common for private fintech companies at Toss's stage. The lack of disclosed
              NRR is not itself a red flag, but it limits external validation of long-term durability. The deep
              cross-sell architecture of the super-app — where users who add Toss Bank and Toss Securities are
              instrumentally more likely to use multiple services daily — structurally improves retention versus
              single-product fintech apps. Toss's 24/7 customer support, PIPA-compliant data handling, and FSC licensing
