  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definitions
        blocks:
          - type: paragraph
            body: >
              Toss competes across multiple overlapping financial services markets in South Korea, each with distinct
              buyer dynamics and regulatory requirements. The narrowest definition — South Korean internet banking
              (digital-only bank accounts and associated payment rails) — is a three-player market comprising KakaoBank,
              Toss Bank, and K Bank, all licensed by the Financial Services Commission (FSC). KakaoBank alone held 26.7
              million customers and ₩68.3 trillion in deposits by end-2025, setting the scale benchmark. The second lens
              is digital payments: South Korea's payments market encompasses mobile POS, digital wallets, QR payments,
              and peer-to-peer transfers, driven by near-universal smartphone penetration and active government
              promotion of cashless commerce.

              A third and broader lens is the full Korean fintech revenue pool, which analyst estimates place at $10–40
              billion annually depending on whether insurance premiums, brokerage commissions, lending spread, and
              platform referral fees are included. Excluded from Toss's addressable market are institutional capital
              markets, wholesale banking, and foreign currency wholesale flows. Adjacent opportunities include
              ride-hailing (historically explored but not pursued), employee benefits administration, and government
              benefit disbursement.

              Status-quo substitutes to each Toss product line differ by vertical. For transfers, the substitute is
              legacy bank wire (typically fee-bearing, limited hours). For loans, the substitute is branch-based bank
              lending requiring in-person documentation. For credit scoring, the substitute is Korea Credit Bureau (KCB)
              reports accessed through separate channels. For brokerage, the substitute is full-service securities firms
              such as Mirae Asset, Kiwoom, and Samsung Securities. For insurance, the substitute is agent-brokered
              policies. Toss's value proposition in each vertical is frictionless mobile access — replacing multi-step,
              paper-heavy processes with sub-minute in-app completion.
