      - number: '4.6'
        title: Financial Verdict
        blocks:
          - type: paragraph
            body: >
              **Revenue quality:** Toss's multi-stream revenue model is structurally high-quality. Banking NII (Toss
              Bank) provides predictable spread income based on the loan book size and NIM; payment processing (Toss
              Payments) provides recurring transaction-fee income tied to TPV growth; brokerage (Toss Securities) is
              market-sensitive but grows with the user base. Insurance and financial product referrals diversify the
              revenue base. The single largest diligence uncertainty is whether the consolidated entity has a positive
              gross margin on a blended basis — likely yes given Toss Bank's regulatory profitability milestone, but not
              confirmed.

              **Margin path:** The trajectory from 2020 (18.6% net loss ratio) toward Toss Bank's first profit in
              2023/2024 demonstrates operational leverage. The banking subsidiary likely now makes a positive
              contribution, and Toss Payments at scale should exhibit operating leverage. The consolidated path to
              group-level profitability depends on: (1) Toss Bank's loan book continuing to grow without
              disproportionate credit losses; (2) Toss Payments maintaining MDR against competitive pressure from Kakao
              Pay and Samsung Pay; (3) Toss Securities sustaining brokerage volumes.

              **Capital intensity:** The primary capital intensity driver is Toss Bank's regulatory capital requirements
              as a licensed bank. Payment and brokerage operations are relatively capital-light. The bank's loan book
              growth requires ongoing capital injections that consume parent-level cash — moderating the group's free
              cash flow conversion. This is manageable if the IPO provides the intended liquidity, but is a structural
              dependency.

              **Diligence blockers:** 1. No consolidated P&L for 2021–2025 — the last confirmed revenue figure (390 B
              KRW,
                 FY2020) is stale by 5+ years.
              2. Toss Bank DART regulatory filings are accessible in theory but require Korean
                 language and DART system navigation; no English summary is publicly available.
              3. Cash position, burn rate, and runway are completely undisclosed. 4. Unit economics (CAC, LTV, payback,
              contribution margin by segment) are proprietary. 5. IPO timeline is unclear — originally targeted for
              2024, extended to 2025 per
                 2024 news, and not publicly confirmed as of May 2026.
            claimRefs:
              - CI031
              - CI032
              - CI033
              - CI034
              - CI035
      - number: '4.7'
        title: Exhibits
        blocks:
          - type: callout
            title: Diversified Revenue Model Reduces Single-Stream Risk
            body: >
              Toss's five-stream revenue model (payments, banking, brokerage, insurance, referrals) provides meaningful
              diversification. If payment revenue compresses under competitive pressure from Kakao Pay, banking NII from
              Toss Bank can offset. If brokerage commissions decline in a bear market, consumer lending may remain
              stable. This structure is unusual for a private fintech at Toss's stage and provides a more defensible
              margin profile than single-stream competitors.
            calloutType: strength
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
          - type: callout
            title: Banking Capital Dependency Creates Ongoing Equity Need
            body: >
              Toss Bank's loan book growth requires proportional Tier 1 capital under Korean FSC BIS guidelines. Each
              incremental won of loan growth consumes parent-level equity. While this is normal for banks, it means Viva
              Republica's cash position is perpetually drawn down by the banking subsidiary's growth ambitions —
              creating a structural capital dependency that the IPO must resolve. Pre-IPO, any slowdown in external
              funding could constrain Toss Bank's growth rate.
            calloutType: risk
            claimRefs:
              - CI026
              - CI027
              - CI030
          - type: callout
            title: 5-Year Revenue Data Gap — Primary Diligence Blocker
            body: >
              The last confirmed consolidated revenue figure (390 B KRW / ~$330 M) is from FY2020 — five years before
              this report date. All subsequent financials require either DART Toss Bank subsidiary access (in Korean) or
              NDA with management. No English-language summary of recent Toss financial performance has been found from
              accessible sources. This is the single most critical diligence blocker: the business cannot be
              underwritten without current audited financials.
            calloutType: risk
            claimRefs:
              - CI022
              - CI024
              - CI033
              - CI034
          - type: callout
            title: Toss Bank Profitability Is a Milestone But Not a Group Story
            body: >
              Multiple news sources (Reuters, Bloomberg, Nikkei — all paywalled/rate-limited) report that Toss Bank
              achieved first-ever profitability in 2023/2024. However, this is the subsidiary banking entity, not Viva
              Republica consolidated. The group entity includes the brokerage, insurance aggregator, ride-hailing
              (VCNC/Tada), and Vietnam operations, which may still be loss-making. Bank-only profitability does not
              confirm group-level breakeven.
            calloutType: insight
            claimRefs:
              - CI017
              - CI018
