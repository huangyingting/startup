      - number: '6.2'
        title: Customer Growth Trajectory
        blocks:
          - type: paragraph
            body: >
              Toss launched in 2015 as a Venmo-style peer-to-peer transfer service and grew to unicorn status by 2018.
              By mid-2019, it had 14 million registered users and had facilitated more than $48 billion in cumulative
              payments, demonstrating rapid adoption in a market dominated by incumbent banks. The platform's strategy
              of frictionless onboarding — one-tap transfers requiring no secondary app authentication — drove viral
              growth through word-of-mouth. The Series G round in June 2021 disclosed the 20 million registered user
              milestone with 11 million MAU, underpinned by the simultaneous launches of Toss Securities (3.5 million
              users in three months) and the September 2021 launch of Toss Bank. By January 2025, cumulative downloads
              had surpassed 50 million, a figure reported by Korea Times. Revenue more than tripled to approximately
              $330 million (390 billion won) in 2020. The growth trajectory from launch to Series G represents a
              compound doubling of the user base roughly every 18–24 months. Toss Bank's four consecutive years as
              Forbes's top-ranked bank in Korea, combined with 40-plus financial services offered in the super-app,
              suggests the user base is progressively deepening engagement beyond the original P2P transfer use case.
            claimRefs:
