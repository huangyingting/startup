  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              Toss (Viva Republica) is the most advanced and diversified Korean fintech super-app with a compelling
              structural thesis: 20 million plus registered users generating cross-sell across payments, banking,
              brokerage, and insurance create a data flywheel that is structurally difficult to replicate. Toss Bank
              first profitability milestone confirmed in 2023-2024 reporting validates the neobank core. CEO SG Lee
              credibility as a founder who turned a failed dental career into Korea dominant fintech provides founding
              conviction. The anti-thesis is equally compelling: the $7.4 billion 2021 mark was set at peak-cycle
              conditions before global fintech multiples compressed 50 to 70%. At least three IPO delay cycles in 2022,
              2023, and 2024 with no confirmed filing as of May 2026 signal that consolidated financials do not yet meet
              underwriter or regulatory thresholds. Bloomberg reported a record $500 million loss for 2022, and Korea
              JoongAng Daily confirmed continued losses in 2023. An investment at or near the 2021 private mark
              therefore requires either believing the path-to-profitability is now imminent at the group level, or
              accepting that the entry price is stretched and return depends on multiple re-rating.
            claimRefs: []
          - type: table
            tableRef: TV001
            claimRefs: []
          - type: table
            tableRef: TV002
            claimRefs: []
          - type: figure
            figureRef: FV001
            claimRefs:
              - CV001
              - CV008
              - CV015
              - CV042
              - CV045
      - number: '8.2'
        title: Valuation Context and Financing History
        blocks:
          - type: paragraph
            body: >
              Viva Republica last confirmed private valuation is $7.4 billion, set in June 2021 when global fintech
              multiples were at peak and Korean neobank sentiment was euphoric following KakaoBank 60 percent plus
              first-day IPO pop. Since then, the company raised $405 million in a February 2023 Series H led by SoftBank
              without disclosing a new valuation mark, an unusual omission that likely reflects market conditions
              constraining the headline figure. TechCrunch reported in July 2022 that Toss was seeking a valuation cut
              in fundraising, directly acknowledging that the $7.4B mark could not be sustained in a risk-off market.
              WSJ and Bloomberg reported a $10 billion IPO aspirational target for 2025, while Nikkei Asia corroborated
              this figure. However, Reuters also cited 2 trillion Korean won as a KOSPI listing figure for the parent
              entity only, creating ambiguity about whether the $10B target reflects the consolidated group or an
              inflated aspirational mark. Given KakaoBank post-IPO trading trajectory, a critical diligence question is
              whether Toss KOSPI listing would price at or below its private mark.
            claimRefs: []
      - number: '8.3'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: >
              The comparable set for Toss is constrained by geography, regulatory regime, and stage. KakaoBank is the
              single most relevant comparable: it is a Korean-licensed internet bank with similar user demographics,
              regulated lending focus, and a public market history providing direct multiple benchmarks. As of 2025,
              KakaoBank reported 649.4 billion Korean won operating profit, 26.7 million customers, and 20 million MAU.
              Its cost-income ratio of 44% in H1 2021 illustrates the efficiency premium of digital banking that Toss
              Bank is tracking. Internationally, Nubank at $45B IPO and $8B 2023 revenue demonstrates the ceiling for
              emerging-market neobanks with 100M plus customer scale; Toss 20M user base in a 51M-person market implies
              a much smaller addressable pool. Revolut at $75B and 4.5B British pounds revenue shows a European premium
              from multi-currency global reach unavailable to Toss. WeBank at an estimated $21B is high-ceiling but
              state-linked and demographically incommensurable. Applying a 5 to 6 times price-to-revenue multiple, Toss
              would need $1.6 to $2B consolidated revenue to justify a $10B valuation. A sum-of-parts approach is
              analytically more rigorous but requires unpublished subsidiary financials.
            claimRefs: []
          - type: table
            tableRef: TV004
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV023
              - CV024
              - CV026
              - CV027
              - CV029
              - CV033
      - number: '8.4'
        title: Bull Base and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Three scenarios bracket the range of defensible valuations. The bull case of $10 to $12B requires
              group-level profitability by 2025-2026, Toss Bank valued at or above its $2.3B standalone mark, a US
              dual-listing premium, and Korean tech multiple re-rating. The probability signals are positive given Toss
              Bank profitability and JP Morgan and Citigroup engagement, but not confirmed given persistent group losses
              and no IPO filing yet. The base case of $6 to $8B reflects Toss Bank profitable and valued modestly below
              KakaoBank implied P/B for similar equity base, parent-level losses narrowed but not eliminated, KOSPI
              listing only, and standard 15 to 20% IPO discount. This is the most evidence-consistent outcome given
              available data. The bear case of $3 to $4B is driven by forced down-round or IPO failure, rising NPLs in
              Toss Bank unsecured loan book, fintech multiple compression to 2023 trough levels, or a fourth consecutive
              IPO delay. All three scenarios are constrained by the absence of current consolidated financials; ranges
              will tighten materially once a prospectus or audited group filing is accessible.
            claimRefs: []
          - type: table
            tableRef: TV003
            claimRefs: []
          - type: figure
            figureRef: FV002
            claimRefs:
              - CV032
              - CV033
              - CV034
              - CV039
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV032
              - CV033
              - CV034
      - number: '8.5'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Toss has selected JP Morgan and Citigroup as lead IPO underwriters per Reuters in January 2025,
              representing the most credible public evidence that a formal IPO process is underway. The target exchange
              is KOSPI, with US dual-listing under consideration based on CEO statements from 2021. However, as of May
              2026, no formal prospectus has been confirmed in publicly accessible sources. This gap — underwriters
              engaged but no filing confirmed — is consistent with a process that is delayed pending financial
              performance milestones required by underwriters. The IPO delay pattern now spans 2022, 2023, 2024, and
              potentially 2026, which creates governance and credibility risk independent of underlying financial
              metrics. Beyond IPO, M&A remains a plausible exit: Toss super-app asset could attract interest from large
              Korean financial conglomerates or regional tech platforms seeking Korea market entry. No M&A discussions
              have been reported. The secondary sale market is opaque, with no evidence of transactions at the $7.4B
              mark post-2021.
            claimRefs: []
