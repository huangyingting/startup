      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              TAM (Total Addressable Market): Multiple lenses are required because no single published estimate covers
              Toss's full multi-vertical scope. Lens 1 — top-down Korean financial services: South Korea's ~42 million
              adult population multiplied by an estimated annual fintech-addressable spend of $500–800 per adult yields
              a theoretical TAM of $21–34 billion. Lens 2 — analyst market-research estimates: Grand View Research,
              Mordor Intelligence, and Statista independently estimate the South Korean fintech market at $10–40 billion
              for 2024–2026, growing at 10–22% CAGR, though definitions and methodologies differ and most reports sit
              behind paywalls. Lens 3 — comparable peer revenue: KakaoBank generated operating profit of ₩649.4 billion
              (~$448M) in 2025 on a ~$3B+ revenue base, while Toss Bank's combined revenue is not publicly disclosed;
              the combined three internet banks represent only a fraction of the total fintech revenue pool.

              SAM (Serviceable Addressable Market): Toss's SAM is bounded by South Korea (where it holds all active
              product licenses and ~20+ million users) plus an embryonic Vietnam operation. Within Korea, Toss competes
              for the estimated 40+ million smartphone-owning adults who are potential digital financial services
              customers. KakaoBank's 26.7 million customers (end-2025) and its 30-million target by 2027 provide an
              anchor for the internet banking SAM. Toss's broader super-app SAM includes the Korean retail brokerage
              market (16+ million trading accounts at peak 2021 volumes) and the consumer lending market where Toss's
              loan comparison engine aggregates offers from 30+ licensed lenders.

              SOM (Serviceable Obtainable Market): Toss reported 20 million Korean users as of mid-2021; this figure has
              not been publicly updated. Viva Republica reported ₩390 billion (~$330 million) in revenue in FY2020,
              tripling from the prior year. Since 2021, Toss has launched Toss Bank, Toss Securities, and Toss Insurance
              as distinct subsidiaries, all contributing to a consolidated revenue base. The company's $7.4 billion
              Series G valuation (June 2021) and the subsequent $405 million raise from SoftBank and others in February
              2023 imply investor expectations of material revenue growth, though the precise current revenue is not
              publicly disclosed. Diligence into actual post-2021 SOM penetration requires non-public financial data.

              Multiple analyst estimates conflict: Grand View Research and Mordor Intelligence publish Korean fintech
              market figures that differ by 2–4× due to definitional gaps (inclusion/exclusion of bancassurance
              premiums, credit card interchange, and government-backed digital payments). These contradictory estimates
              are preserved as an explicit diligence gap.
