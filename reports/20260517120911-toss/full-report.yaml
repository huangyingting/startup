        - Any new formal investigation opened by FSS or PIPC after May 2026
        - Material impairment; re-evaluate regulatory relationship; reduce position
      - - Toss Bank Licence Revocation
        - FSC issues business improvement order or suspension notice to Toss Bank
        - FSC enforcement action beyond a fine (business restriction or suspension)
        - Thesis-break; full position exit
      - - IPO Down-Round
        - Toss files S-1 or KRX listing application at valuation below $7.4B
        - Listing valuation < $6.0B (>20% discount to Series G)
        - Re-underwrite growth model; reassess equity stake value
      - - Credit Model Failure
        - Toss Bank non-performing loan (NPL) ratio exceeds 3% in any disclosed period
        - NPL ratio > 3% or quarterly loan loss provision > ₩100B
        - Thesis-break for Toss Bank sub-investment; re-evaluate consolidated thesis
      - - SG Lee Departure or Regulatory Action
        - Lee publicly steps down, takes leave, or is named in FSS/PIPC investigation
        - Any confirmed departure announcement or regulatory naming
        - Thesis-break; full review within 30 days
      - - KakaoBank Market Share Inflection
        - >-
          KakaoBank's internet banking deposit share exceeds 50% OR Toss Bank deposit growth declines YoY for two
          consecutive quarters
        - Sustained market share reversal evidenced by two consecutive KakaoBank filings
        - Competitive thesis weakened; revise growth premium in valuation model
      - - Kakao Super-App Launch in Lending
        - Kakao launches integrated credit product in KakaoTalk at sub-prime or near-prime segment
        - Product launch announcement and user adoption evidence
        - Accelerates competitive displacement; lower probability of Toss Bank NIM expansion
    notes: >-
      Mitigation assessments based on publicly available information; effectiveness ratings are indicative and require
      management confirmation of internal control status.
  - id: TV001
    title: Recommendation Summary Table
    sectionRef: S8V001
    notes: >
      Recommendation is conditioned on unavailability of consolidated 2023-2024 financials. All confidence and risk
      ratings reflect current information available as of May 2026. A confirmed IPO prospectus with audited financials
      would likely shift recommendation to pass or conditional-buy depending on the disclosed financial trajectory.
    columns:
      - Dimension
      - Value
      - Rationale
    rows:
      - - Recommendation
        - Research-more / Track
        - Missing consolidated financials and unconfirmed IPO filing prevent a definitive buy or pass
      - - Confidence
        - Low-Medium
        - High uncertainty from undisclosed financials, IPO delay pattern, and ambiguous valuation marks
      - - Risk Rating
        - High
        - >-
          Record $500M 2022 loss; repeated IPO delays; group-level profitability unconfirmed; preference overhang
          unknown
      - - Valuation Stance
        - Stretched
        - Last private mark $7.4B from 2021 peak; base-case implied value $6-8B implies limited margin of safety
      - - Decision Implication
        - Do not commit capital without current audited financials and confirmed IPO timeline; monitor IPO progress
        - ''
  - id: TV002
    title: Thesis / Anti-Thesis Table
    sectionRef: S8V001
    notes: >
      Each thesis arm is paired with the specific evidence or diligence path that would change the view. Thesis arms are
      ordered by conviction level from highest to lowest.
    columns:
      - Argument
      - What Would Change the View
    rows:
      - - >-
          Korea super-app moat with 20M plus users, 40 plus financial services, and data flywheel creating structural
          competitive barriers
        - User growth stalls below 25M by 2026, or core payment TPV declines relative to Kakao Pay
      - - Toss Bank profitability validated by standalone $2.3B unicorn mark and first profit in 2023-2024
        - NPL ratio exceeds 2% or Toss Bank requires equity capital injection from parent
      - - IPO catalyst with JP Morgan and Citigroup mandated and KOSPI listing creating liquidity event for investors
        - A fourth consecutive IPO delay cycle in 2026, or underwriters withdraw from mandate
      - - CEO alignment with SG Lee holding approximately 18% stake aligning founder incentives with shareholder return
        - Lee reduces stake materially through secondary sales or exits management role
      - - >-
          Market-rate credit model with KCB-backtested Toss credit engine as 150% better differential power and 30%
          lower delinquency
        - NPL rate rises significantly above KakaoBank benchmark or FSC intervenes in lending practices
      - - >-
          ANTI: group losses unsustained with $500M loss in 2022 and continued losses in 2023 suggesting the super-app
          model has not achieved capital efficiency
        - Public disclosure showing group-level EBITDA-positive or net-income breakeven for 2024
      - - >-
          ANTI: valuation mark stale at $7.4B from 2021 peak; Series H valuation not disclosed; TechCrunch reported
          valuation cut sought in 2022
        - An arm's-length secondary transaction or IPO prospectus pricing at or above $7.4B
      - - >-
          ANTI: IPO delay pattern with 4 plus year gap between IPO announcement and confirmed filing creating governance
          credibility risk
        - KRX or FSC public filing confirming formal registration in 2026
  - id: TV003
    title: Bull / Base / Bear Scenario Table
    sectionRef: S8V004
    notes: >
      All scenarios are estimated from comparable multiples and partial financial data. Confidence is low for all
      scenarios pending disclosure of consolidated 2023-2024 financials. Probability signals are qualitative
      assessments, not quantitative probabilities. KRW to USD rate of 1350 to 1 used for conversions where applicable.
    columns:
      - Scenario
      - Key Assumptions
      - Valuation Range
      - Return Implication
      - Key Risks
      - Probability Signal
    rows:
      - - Bull
        - >-
          Group profitability achieved 2025; Toss Bank valued at 1.5x KakaoBank P/B implied; US dual-listing with 30-40%
          premium; Toss Payments at 3x revenue; revenue $2B+
        - 10-12 billion USD
        - Upside of 35-60% from $7.4B last mark; 15-25% IRR over 2-year horizon if IPO in 2026-2027
        - Requires disclosed profitability; US listing requires SEC registration complexity
        - Low-to-medium; JP Morgan mandate and Toss Bank profitability are positive; group losses persist
      - - Base
        - >-
          Toss Bank profitable; valued at 1.0-1.2x KakaoBank P/B; parent losses narrowing; KOSPI listing only; standard
          15-20% IPO discount; revenue $1.2-1.6B estimated
        - 6-8 billion USD
        - Flat-to-negative from $7.4B last mark; breakeven to -20% return depending on entry price
        - Group losses narrow but not eliminated; KOSPI listing subject to market sentiment
        - Medium; most consistent with available evidence of Toss Bank trajectory and KOSPI context
      - - Bear
        - >-
          IPO fails or delayed past 2027; down-round or forced secondary at 40-50% discount; NPL issues or regulatory
          sanction; fintech multiples at 2023 trough
        - 3-4 billion USD
        - '-50% or worse from $7.4B mark; early preference holders protected but common equity impaired'
        - Fourth IPO delay, NPL deterioration, FSC enforcement, global fintech risk-off
        - Low-to-medium; each individual trigger has non-trivial probability given pattern observed
  - id: TV004
    title: Comparable Valuation Table
    sectionRef: S8V003
    enumerationScope:
      coverage: partial
      basis: >
        Comparables selected from publicly accessible neobank and digital bank data covering Korean listed (KakaoBank),
        global listed (Nubank), large-cap private (Revolut, WeBank), and internal subsidiary mark (Toss Bank standalone
        April 2023 round).
    notes: >
      All multiples marked as approximate are estimated from limited data and should be recalculated with current
      financials before investment decision. Toss Bank comparison to KakaoBank is the most actionable for P/B-based
      floor valuation.
    claimRefs:
