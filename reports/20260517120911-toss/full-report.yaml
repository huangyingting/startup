      - number: '5.3'
        title: Developer Experience and Open Source
        blocks:
          - type: paragraph
            body: |
              Toss has made a material investment in open-source engineering, operating a GitHub
              organisation (github.com/toss) with more than 15 public repositories. The most prominent
              project is es-toolkit, a modern JavaScript/TypeScript utility library that reached over
              11,000 GitHub stars by May 2026 and is benchmarked at 2–3× faster execution than the
              widely-used Lodash library. es-toolkit is downloaded approximately 2.87 million times
              per week on npm and has 472 dependent packages, demonstrating meaningful adoption in
              the broader JavaScript ecosystem. Other notable projects include Slash (3,000+ stars,
              now archived), es-hangul (a Korean NLP utility library with 1,800+ stars), and
              Suspensive (a React Suspense helper library).

              The public developer footprint has both strengths and gaps. The Stack Overflow tag
              "toss-payments" shows zero questions as of May 2026, suggesting that the Toss Payments
              integration community is small and English-language developer support is handled via
              private channels rather than open forums. The developer portal provides compensating
              channels — AI code generation assistance, sandbox, and real-time chat — but the
              absence of public community discussion is an adoption risk for enterprise integrations.
