      - number: '4.4'
        title: Public Traction Metrics and Private Financial Gaps
        blocks:
          - type: paragraph
            body: >
              Toss is a private company with no obligation to publish consolidated financial statements. The last
              confirmed revenue figure (390 B KRW / ~$330 M, FY2020) is more than four years old as of this report date.
              Public traction data (user counts, product adoption milestones) serves as the primary proxy for financial
              scale.

              **Confirmed public traction data:** - 20 M total registered users in South Korea as of June 2021
              (company-disclosed,
                confirmed by TechCrunch and Forbes).
              - 11 M monthly active users (MAU) in South Korea as of June 2021 (company-disclosed
                via TechCrunch).
              - Toss Securities: 3.5 M users within the first 3 months post-March 2021 launch. - $48 B+ cumulative
              payments processed as of 2019 (company-disclosed via CNBC). - ~$18 B annual transaction run-rate projected
              for 2018 (per TechCrunch 2018). - Vietnam launch in 2020 with 3 M+ MAU and 500 K+ monthly new active
              users. - Toss Bank: Forbes-selected #1 bank in Korea 4 years running (company-claimed
                via tossbank.com). This is a customer satisfaction metric, not financial.
              - Toss Bank launched 2021, achieved first profit milestone reported in 2023/2024.

              **Revenue trajectory estimate (inferred):** From a confirmed base of 390 B KRW ($330 M) in 2020, and given
              user growth from ~18 M registered users (2020 estimate) to 20 M+ (mid-2021), Toss Bank's loan book launch
              (Sept 2021), and Toss Securities' rapid adoption, consolidated 2024 revenues are estimated at $1.0–1.8 B,
              with Toss Bank NII likely the largest single contributor — but these are estimates with high uncertainty,
              not confirmed figures.

              **Private financial metric gaps:** Consolidated P&L, EBITDA, cash position, burn rate, and loan book size
              are not publicly disclosed. Toss Bank files regulatory reports with DART (Korea's EDGAR equivalent) and
              Korea's Financial Supervisory Service, providing regulatory capital metrics (BIS ratio, Tier 1 capital
              ratio), but these are disclosed in Korean regulatory filings that require direct DART access to review. No
              English-language summary of Toss Bank's DART filings has been found in accessible public sources as of
