      - number: '1.5'
        title: Milestones and Product Evolution
        blocks:
          - type: paragraph
            body: >-
              Viva Republica's trajectory follows a deliberate super-app playbook: establish massive user trust through
              a single high-frequency utility (free money transfer), then layer on adjacent financial services to
              monetize. The company was incorporated in 2013. The Toss app launched commercially in 2015 after SG Lee
              spent approximately a year negotiating with South Korean regulators. In 2018, Toss crossed 10 million
              registered users and achieved unicorn status via an $80 million funding round. In 2020 it launched in
              Vietnam and announced the Toss Bank internet banking licence.

              Toss Bank commercially launched in September 2021, positioning itself as a lending-focused challenger
              bank. Unlike many neobanks that compete on card interchange fees, Toss Bank focused on unsecured personal
              loans and mortgages, using the Toss app's transaction data as a proprietary credit-scoring signal. Toss
              Securities launched in March 2021, specifically designed to lower the barrier for first-time retail
              investors who had avoided traditional brokerages due to complex interfaces.

              In November 2021, Viva Republica acquired a majority stake in VCNC, which operates the Tada ride-hailing
              service in South Korea, signalling ambitions beyond pure fintech. This acquisition represented an unusual
              strategic move and raised questions about focus and capital allocation. IPO plans that were initially
              targeted for 2024 appear to have slipped to 2025, with Reuters and other outlets in January 2025 reporting
              that the company had mandated JP Morgan and Citigroup to lead the listing process. As of the May 2026 run
              date, no IPO filing has been publicly confirmed.
