      - number: '3.2'
        title: 'Competitor profiles: neobank rivals, payment incumbents, and big-bank challengers'
        blocks:
          - type: paragraph
            body: >-
              KakaoBank is Toss's most significant direct rival in retail digital banking. Listed on the KOSPI in August
              2021, KakaoBank's shares surged approximately 80% on debut, with Kakao Corp retaining a 31.62% stake. The
              bank's 2025 results—₩480.3 billion net profit, up 9.1% year-on-year, on ₩649.4 billion operating
              profit—demonstrate that the no-branch model can produce durable margins. Its 26.7 million customers and 20
              million monthly active users at end-2025 give it the largest retail digital deposit base in Korea, and it
              publicly targets 30 million customers and ₩90 trillion in deposits by 2027. KakaoBank is also expanding
              internationally, announcing a virtual-bank joint venture with Thailand's SCBX in January 2026 and already
              operating Superbank in Indonesia.

              Kakao Pay is the dominant payment rival. Listed in November 2021 and backed by Ant Financial's $200
              million investment, Kakao Pay operates within KakaoTalk and reaches approximately 50 million Korean users
              without requiring a separate app download—an inherent distribution advantage Toss cannot replicate without
              a comparable messaging platform. The Financial Supervisory Service fined Kakao Pay ₩15 billion in April
              2025 for sharing 40 million users' data with Alipay without explicit consent, exposing a structural
              regulatory risk in the ecosystem.

              Naver Pay is anchored in Naver's e-commerce and portal ecosystem and launched in 2015. Samsung Pay
              controls the NFC contactless layer on Samsung devices. K Bank, South Korea's first internet-only bank, has
              grown above 10 million customers via its KT telecom partnership. The big four traditional banks each hold
              20–30 million customers and collectively recorded ₩18 trillion in net profit in 2025.
            claimRefs:
