      - number: '5.2'
        title: Technology Architecture
        blocks:
          - type: paragraph
            body: |
              Toss's engineering organisation has built a microservices-based backend decomposed along
              financial domain boundaries. The Toss Payments platform exposes REST APIs enabling
              merchants to accept card payments, virtual-account transfers, and overseas payment
              processing. The Toss Payments developer portal (developers.tosspayments.com) provides
              sandbox testing environments, React and JavaScript SDK examples, AI-assisted code
              generation, and real-time developer support chat, reflecting a developer-first
              commercial-payment strategy.

              Toss Bank operates core banking on cloud infrastructure without a separate mobile
              application, integrating directly into the Toss super-app through internal APIs.
              The app aggregates data from over 20% of Korean bank accounts and credit card registrations
              via open banking interfaces regulated by the FSC, giving Toss a near-real-time view of
              users' complete financial position. This real-time data pipeline underpins cross-app
              balance synchronisation and powers Toss's AI-based personalisation and credit-scoring
              systems. Toss Bank posted its first annual profit in 2023, demonstrating that a
              pure-cloud, app-embedded banking model can achieve sustainable unit economics in Korea.
