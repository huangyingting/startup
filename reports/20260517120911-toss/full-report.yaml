appendices:
  - id: A
    title: Coverage Notes and Methodology
    blocks:
      - type: paragraph
        body: >-
          This report is based on public sources fetched during the research run with canonical date 2026-05-17. Toss
          (Viva Republica) is a private company and does not publish audited financials. Revenue estimates are derived
          from partial disclosures (2020 annual results cited by Forbes), journalist reporting, and comparable
          digital-banking benchmarks. All financial figures should be treated as directional estimates subject to
          material revision upon access to audited financials.
        claimRefs: []
      - type: paragraph
        body: >-
          Valuation analysis is based on comparable public fintech trading multiples (KakaoBank KOSPI listing, Nubank
          NYSE listing, Revolut private mark) and Korea-market IPO discount analysis. The $7.4B last-round valuation
          (June 2021) is used as the anchor; implied current fair value reflects market conditions as of run date
          2026-05-17. The report notes that Toss has not filed for an IPO on any exchange as of the run date.
        claimRefs: []
