companyProfile:
  summary: >-
    Viva Republica, Inc. (trading as Toss) is a Seoul-based fintech holding company founded in 2013 by Lee Seung-gun (SG
    Lee), a former dentist turned serial entrepreneur. Toss started as a peer-to-peer free bank transfer app disrupting
    Korea's complex wire-transfer system, and has since evolved into a vertically integrated financial super app
    encompassing Toss Payments (merchant acquiring), Toss Bank (internet-only bank), Toss Securities (retail brokerage
    with fractional shares), Toss Insurance (comparison and distribution), and Toss Vietnam (international expansion).
    The company raised a $410M Series G in June 2021 at a $7.4B post-money valuation led by Alkeon Capital Management
    and including Sequoia, SoftBank, GIC, and Kleiner Perkins. Total equity raised exceeds $940M. Revenue more than
    tripled from 2019 to 2020 to approximately $330M (390B KRW). Since 2021, Toss has repeatedly deferred an IPO that
    the CEO projected would occur by 2024. As of the run date, no formal registration has been filed.
