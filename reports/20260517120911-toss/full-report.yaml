  - id: FU001
    title: Customer journey map
    type: journey-map
    summary: >
      The five-stage customer journey from initial P2P transfer trial through super-app advocacy highlights Toss's
      flywheel: free transfers drive viral acquisition, while the expanding product suite locks users in at successive
      engagement stages.
    data:
      items:
        - label: 'Awareness: Free P2P Transfer'
          description: >
            User discovers Toss via friend referral or social media; downloads app to send a single free bank transfer.
            Zero fee and sub-10-second completion create strong first-impression.
        - label: 'Activation: Account Sync'
          description: >
            User links all bank accounts and credit cards via KFTC Open Banking API. Biometric login removes friction.
            Unified balance dashboard becomes the primary financial home screen.
        - label: 'Engagement: Daily Financial Management'
          description: >
            User checks daily Toss Bank interest, reviews spending analytics, pays bills, monitors credit score.
            Super-app becomes the default financial interface used multiple times per week.
        - label: 'Expansion: New Product Adoption'
          description: >
            User activates Toss Securities (stock trading), applies for a loan via the comparison marketplace, or
            purchases insurance through the in-app panel. Each new product deepens lock-in.
        - label: 'Advocacy: Reviews and Referrals'
          description: >
            Satisfied users leave App Store reviews (91K+ at 4.3/5) and refer friends via in-app transfer invitations.
            Word-of-mouth remains Toss's dominant CAC channel.
    claimRefs:
      - CU003
      - CU016
