            body: >
              Toss has accumulated substantive named customer proof across several product lines. The most quantified
              example is Toss Securities: launched in March 2021, it attracted 3.5 million users in its first three
              months — a pace that made it the fastest-growing retail investment product launch in Korean fintech
              history. In Vietnam, Toss built a financial super-app in partnership with CIMB Bank, accumulating over 3
