      - number: '6.5'
        title: B2B Merchant and Financial Institution Network
        blocks:
          - type: paragraph
            body: >
              Beyond its direct-to-consumer segments, Toss has built a B2B-facing network that creates platform-level
              stickiness. Toss Payments serves merchants who require online payment acceptance and business finance
              management, competing with KakaoPay and NHN KCP in the Korean PG market. The loan comparison marketplace
              aggregates real-time loan offers from 75 financial institutions — including 16 Tier-1 banks — enabling
              consumers to compare conditional offers within 60 seconds. This institutional depth, the largest of any
              Korean fintech marketplace, creates both a consumer acquisition channel (lower loan rates drive users to
              Toss) and a B2B revenue stream (origination fees from partner lenders). The CIMB Bank partnership in
              Vietnam demonstrates that Toss can execute regulated international financial partnerships, a template for
              additional Southeast Asia market entry. The primary concentration risk is South Korea's geographic
              dominance of the revenue base; the company has explicitly signalled plans to enter additional Southeast
              Asian markets. IPO delays since 2022 create uncertainty about the timeline for Toss to access public
              capital markets, which could affect its ability to fund international expansion at the pace required to
              achieve material revenue diversification. KPMG and H2 Ventures ranked Toss as the 29th best fintech
