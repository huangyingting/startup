              Lee Seung-gun is the sole publicly identified decision-maker at Viva Republica. No succession plan,
              co-founder, or publicly disclosed C-suite has been identified in English-language sources. With the
              founder holding approximately 18% of equity and driving all product and strategic decisions, the company
              carries material key-person dependency risk that is typical of founder-led companies at this stage but is
              particularly acute given the complexity of Toss's multi-licence, multi-product regulatory footprint.
