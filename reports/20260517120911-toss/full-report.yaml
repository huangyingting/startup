              After multiple reported delays—initial targets pointed to 2024, then 2025—Toss's IPO has not been
              confirmed as of May 2026. The company does not publish audited financials or English-language governance
              disclosures, creating opacity around revenue growth, profitability trajectory, Toss Bank's loan-book
              quality, and the capital adequacy of its regulated entities. This opacity is a structural risk for
              prospective investors and limits independent diligence.
