  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Competitive landscape: neobanks, payment networks, incumbents, and global analogues'
        blocks:
          - type: paragraph
            body: >-
              South Korea's retail financial services market presents one of the world's most concentrated fintech
              competitive landscapes. Toss occupies a distinctive super-app position but competes across several
              distinct competitor classes simultaneously.

              The direct neobank class is led by KakaoBank—South Korea's best-capitalised internet bank, with 26.7
              million registered customers by end-2025 and a KOSPI listing since August 2021—and K Bank, the country's
              first internet-only bank (founded 2017), which built its customer base partly through integration with KT
              telecommunications infrastructure. The payment-app class is dominated by Kakao Pay and Naver Pay, each
              embedded in South Korea's two largest internet ecosystems (KakaoTalk and Naver Shopping), plus Samsung
              Pay, which controls the NFC hardware payment layer on Samsung devices. The incumbent class—the so-called
              big four banks (KB Financial, Shinhan, Woori, Hana)—generated a combined ₩18 trillion in net profit in
              2025 and retain scale, branch trust, and corporate banking relationships that no digital-only competitor
              has yet replicated.

              Status-quo alternatives also matter. Many Korean consumers maintain accounts at multiple banks without any
              consolidating platform; the primary substitute for Toss is not a specific competitor but the default
              multi-bank behaviour it was designed to replace. Finally, global analogues including Revolut (70 million
              customers, $75 billion valuation as of 2026) and Nubank (94 million customers in Latin America) provide
              benchmarks for long-run super-app trajectories but do not currently compete in Korea.
            claimRefs:
              - CP001
              - CP013
              - CP018
