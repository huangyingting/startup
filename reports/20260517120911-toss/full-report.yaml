              - CI031
          - type: callout
            title: FY2024 Revenue Range Assumes Continued Post-2020 Growth
            body: >
              The FY2024 estimated revenue range of $900 M–$1.8 B assumes that revenue growth continued after 2020's
              confirmed tripling. Given Toss Bank's launch in September 2021 (adding NII from zero), Toss Securities'
              launch in March 2021 (adding brokerage revenue), and user base growth, the growth assumption is
              directionally supported. However, no specific revenue guidance or forward projections from management or
              investors are available from accessible sources.
