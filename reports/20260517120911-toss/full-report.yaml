      - CV021
      - CV023
      - CV024
      - CV026
      - CV027
      - CV029
      - CV033
    columns:
      - Comparable
      - Key Metric
      - Multiple / Valuation
      - Relevance
      - Limitation
    rows:
      - - KakaoBank (KOSPI 323410)
        - Operating profit, Customers, Cost-income
        - 649.4B KRW op profit 2025; 26.7M customers; 44% cost-income ratio H1-2021
        - >-
          Direct comp as Korean licensed internet bank with similar deposit and lending model; provides P/B floor for
          Toss Bank
        - >-
          Standalone entity vs. Toss group with multiple subsidiaries; current P/B requires live KRX data not captured
          in this research
      - - 'Nubank (NYSE: NU)'
        - Revenue, Valuation, Customers
        - $8.03B revenue 2023; $45B IPO valuation Dec 2021; 100M+ customers
        - >-
          Shows ceiling for neobank valuation in emerging markets; demonstrates P/S multiples can exceed 10x during
          growth phase
        - >-
          Latin American TAM of 200M+ population vastly larger than Korea at 51M; revenue scale and addressable market
          not comparable
      - - Revolut (private)
        - Revenue, Valuation, Customers
        - £4,516M revenue 2025; $75B valuation Nov 2025; 50M+ customers
        - Leading global neobank showing maximum achievable valuation for profitable multi-currency platform
        - >-
          Global multi-currency reach and UK regulatory arbitrage create premium Toss cannot access; Korea-centric
          business warrants steep discount
      - - WeBank (private, China)
        - Estimated valuation
        - ~$21B USD 2019 analyst estimate
        - Shows Asia neobank upside if backed by major tech platform and large domestic market
        - >-
          State-linked and China-specific; Tencent backing makes valuation incommensurable; treat as aspirational
          ceiling only
      - - Toss Bank (private subsidiary mark)
        - Private unicorn round valuation
        - $2.3B USD April 2023 investment round
        - Direct subsidiary valuation anchoring the floor for Toss Bank contribution to group sum-of-parts
        - >-
