      - number: '1.4'
        title: Scale and Key Metrics
        blocks:
          - type: paragraph
            body: >-
              Toss has grown from a niche money-transfer app into a dominant Korean financial platform. At the time of
              the June 2021 Series G announcement, Viva Republica reported 20 million total users and 11 million monthly
              active users—representing more than one-third of South Korea's approximately 51.7 million population. More
              than 20% of all South Korean bank accounts and credit cards were registered on the Toss platform at that
              time. In 2019, CNBC reported that Toss had processed over $48 billion in payments.

              In terms of financial performance, Viva Republica reported (per Forbes) that revenue reached approximately
              390 billion Korean won (~$330 million) in 2020, representing a tripling of revenue from the prior year.
              Losses narrowed to approximately 72.5 billion won in 2020 from 115 billion won in 2019—indicating the
              company was loss-making but trending towards profitability. No revenue figures for 2021-2026 have been
              publicly disclosed.

              Toss Securities, launched in March 2021, attracted more than 3.5 million users within its first three
              months, demonstrating the super-app's strong cross-selling capability. Toss also launched in Vietnam in
              2020 with 3 million monthly active users and 500,000 new monthly active users per month as reported in the
              June 2021 Series G announcement.

              The company has not publicly confirmed post-2021 user counts, headcount, or revenue figures. Industry
              estimates and press reports suggest Toss Bank crossed 10 million customers by 2024 and the Toss app
              exceeded 25 million monthly active users, but these figures are not confirmed in primary sources reviewed
              for this chapter. Headcount is similarly estimated by press reports at approximately 5,000 employees but
              not officially disclosed.
