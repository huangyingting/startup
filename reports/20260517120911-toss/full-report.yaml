  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    sectionRef: S8V005
    notes: >
      Triggers are ordered by estimated probability within the next 18 to 24 months. Each trigger should be monitored
      quarterly by tracking public filings, DART disclosures, KRX announcements, and major press coverage. No current
      evidence confirms any trigger has been activated as of May 2026.
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Fourth consecutive IPO delay missing 2026 window
        - No KRX registration statement filed by Q4 2026
        - >-
          Signals systemic inability to meet underwriter financial thresholds or regulatory requirements; implies group
          financials still not IPO-ready; creates governance credibility deficit
        - Exit secondary market or hold at reduced mark; initiate management conversation
      - - Group-level net loss continues at $300M+ through 2025
        - Disclosed annual net loss at or above 400 billion KRW (~$300M USD) for fiscal year 2025
        - >-
          Undermines path-to-profitability thesis; increases risk of dilutive equity raise before IPO; compresses
          base-case to bear-case range
        - Reduce conviction; seek updated cap-table transparency; stress-test preference stack
      - - Toss Bank NPL ratio exceeds 2% with rising provisioning
        - Publicly disclosed NPL at or above 2% or provisioning cost above 50% of net interest income
        - >-
          Undermines the risk-model advantage cited by management; implies credit losses absorbing profitability claimed
          for 2023-2024; reduces Toss Bank standalone valuation below $2.3B mark
        - Full credit model audit required; do not commit capital until independent credit review
      - - FSC regulatory sanction limiting Toss Bank lending or platform operations
        - FSC-issued business restriction, license suspension, or major fine affecting Toss Bank operations
        - >-
          Creates floor risk for Toss Bank valuation; regulatory constraint on lending limits the net interest income
          that drives the profitability thesis
        - Immediate pass until regulatory situation resolved; assess precedent from Kakao Pay FSC fine
      - - CEO SG Lee departure or significant secondary equity sale
        - Public disclosure of Lee departure or sale of more than 5% stake in secondary market
        - >-
          Removes founder-market fit alignment; large secondary sale signals personal view on valuation or liquidity
          timing
        - Convene IC; assess whether successor leadership has comparable credibility
  - id: TV006
    title: Final Diligence Asks Table
    sectionRef: S8V005
    notes: >
      Diligence asks are ordered by priority. Items marked blocking must be resolved before any investment commitment at
      or above 6 billion implied valuation. Items marked material should be resolved before commitment; exceptions
      require explicit IC approval with documented assumptions.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Path
    rows:
      - - Consolidated audited financials 2023 and 2024
        - >-
          Full Viva Republica consolidated P&L, balance sheet, and cash flow statement for FY2023 and FY2024; currently
          only partial figures from Bloomberg 2022 record loss and JoongAng Daily 2023 direction
        - >-
          Blocking: without current financials no valuation scenario can be modeled with meaningful confidence;
          recommendation cannot advance beyond research-more
        - >-
          Request from investor relations; DART-registered Toss Bank subsidiary statements at dart.fss.or.kr as starting
          point
      - - IPO filing status and prospectus confirmation
        - >-
          Confirmation that a formal IPO registration has been submitted to KRX or FSC by May 2026, or a revised
          timeline with milestones
        - >-
          Blocking: IPO timing determines exit horizon and provides independent validation that underwriters have
          reviewed and approved current financial trajectory
        - >-
          Monitor KRX IPO calendar, FSC DART, and direct engagement with JP Morgan or Citigroup equity capital markets
          teams
      - - Series H valuation terms and preference stack
        - >-
          Post-money valuation, liquidation preference terms, anti-dilution provisions, and participation rights for
          Series H SoftBank February 2023 and earlier rounds
        - >-
          Material: preference overhang determines what common equity holders receive in sub-$7B exit scenarios; without
          this, return modeling for non-preferred investors is impossible
        - >-
          Review SoftBank Vision Fund II disclosure documents; request term sheet from management; check FDI filings in
          Korea Ministry of Industry database
      - - Current KakaoBank market cap and P/B for Toss Bank benchmarking
        - >-
          Live KRX quote for KakaoBank (323410) to calculate current P/B and P/E multiples for application to Toss Bank
          reported equity capital
        - >-
          Material: without current KakaoBank trading data, the P/B-based Toss Bank valuation floor is based on
          estimates not market evidence
        - >-
          Access KRX or Bloomberg Terminal for live KakaoBank price data; cross-reference Toss Bank DART-disclosed
          equity capital
      - - Toss Bank equity capital book value and tier-1 capital ratio
        - >-
          Toss Bank reported equity capital from its banking supervisory disclosure available via DART as a licensed
          bank, enabling P/B calculation
        - >-
          Material: the single most critical data point for anchoring the Toss Bank contribution to the sum-of-parts
          valuation
        - >-
          Access DART for Toss Bank banking supervisory report; the FSC requires this to be publicly disclosed for all
          licensed banks
