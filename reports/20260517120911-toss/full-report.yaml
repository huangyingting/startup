      Toss's operating model has five critical single-point dependencies: the FSC internet banking licence, CIMB Vietnam
      for international operations, the undisclosed cloud infrastructure provider, the Kakao-dominated app-store
      distribution channel, and SG Lee as primary regulatory relationship owner.
