  - id: FR002
    title: Risk transmission map
    type: dag
    insight: >-
      Data privacy enforcement and licence suspension are the two nodes with the highest downstream transmission; both
      can simultaneously trigger user churn, partner loss, and financing difficulty. Credit model failure is an upstream
      node that feeds directly into capital adequacy and IPO impairment.
    data:
      nodes:
        - id: n1
          label: FSS Data Privacy Enforcement
          type: regulatory
        - id: n2
          label: Toss Bank Licence Risk
          type: regulatory
        - id: n3
          label: Credit Model Underperformance
          type: financial
        - id: n4
          label: SG Lee Departure
          type: people
        - id: n5
          label: KakaoBank Competitive Displacement
          type: competitive
        - id: n6
          label: User Trust Erosion
          type: impact
        - id: n7
          label: Revenue / MAU Decline
          type: impact
        - id: n8
          label: Capital Adequacy Breach
          type: impact
        - id: n9
