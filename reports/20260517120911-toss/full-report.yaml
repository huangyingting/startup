    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Viva Republica Inc. (Korean: 주식회사 비바리퍼블리카) is a Seoul-based private technology company operating under the
              consumer brand Toss (토스). Headquartered in the Gangnam District of Seoul, South Korea, Viva Republica was
              established in 2013 and launched its flagship Toss app commercially in 2015. The company describes itself
              as a financial super-app whose mission is to make every financial service simple, transparent, and
              accessible to all Koreans.

              The core business model is a multi-sided platform: Toss aggregates financial data (bank accounts, credit
              cards, loans, insurance policies) from partner institutions and surfaces them through a single mobile
              interface. Revenue is generated through multiple streams— transaction fees on P2P money transfers
              (historically free to build engagement, now a strategic asset), lead-generation and referral fees from
              partner banks and lenders (Toss connects users to credit products and earns referral income), interchange
              and merchant fees through Toss Payments, interest-rate margin through Toss Bank's lending book, brokerage
              commissions through Toss Securities, and insurance distribution fees. Toss Bank, holding a South Korean
              internet banking licence, focuses specifically on consumer lending at competitive rates, differentiating
              itself from other challenger banks by leveraging proprietary transaction data to improve credit scoring
              and reduce delinquency rates.

              As of mid-2021, more than 20% of all bank accounts and credit cards in South Korea were registered on
              Toss, giving the platform extraordinary breadth relative to its home market. The company has also expanded
              to Vietnam (launched 2020) and explored further Southeast Asian markets, though the primary revenue base
              remains domestic.
