  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: User Base Overview
        blocks:
          - type: paragraph
            body: >
              Toss (Viva Republica) has built one of South Korea's largest fintech consumer bases by eliminating
              friction from daily financial transactions. As of June 2021 — the most recent fully corroborated public
              data point — Toss had 20 million registered users and 11 million monthly active users, representing more
              than one-third of South Korea's 51.7 million population. Over 20% of all South Korean bank accounts and
              credit cards were registered on Toss at that date. The app is rated 4.3 out of 5 stars based on over
              91,000 user reviews on the Korean Apple App Store, indicating sustained high satisfaction across a very
              large review base. Toss serves multiple overlapping customer segments: mass retail consumers using free
              P2P transfers and a unified financial dashboard; Toss Bank customers seeking digital-first banking and
              competitive loan rates; Toss Securities users pursuing accessible retail investing; credit-constrained
              borrowers leveraging Toss's KCB-integrated scoring engine; and small-to-medium business operators using
              Toss Payments. The Financial Services Commission (FSC) licenses Toss and its subsidiaries under the
              Electronic Financial Transactions Act, establishing a regulatory floor that underpins consumer trust.
            claimRefs:
              - CU001
