      - number: '1.3'
        title: Funding History and Investors
        blocks:
          - type: paragraph
            body: >-
              Viva Republica has raised approximately $940 million or more in total equity financing across multiple
              rounds since its 2013 founding. Altos Ventures, a Silicon Valley-based VC firm with deep Korean market
              expertise, was the company's first institutional backer in 2014. PayPal led a $48 million Series C round
              approximately 18 months before December 2018, establishing Toss's international investor base. In December
              2018, a Kleiner Perkins and Ribbit Capital-led $80 million round pushed the company past the $1 billion
              valuation threshold and made it South Korea's fourth technology unicorn. That round also included Bessemer
              Venture Partners, Goodwater Capital, PayPal, and Qualcomm Ventures.

              In 2020, Viva Republica completed a $173 million Series F round. Then in June 2021, the company raised
              $410 million in its Series G at a post-money valuation of $7.4 billion—its last reported private round.
              The Series G was led by Alkeon Capital Management (a US investment firm), with participation from Korea
              Development Bank as a new investor, and returning investors Altos Ventures and Greyhound Capital. At the
              time of the Series G, CEO Lee publicly indicated that Toss planned to raise one additional private round
              (~$300 million) before pursuing an IPO, with a tentative three-year timeline that would have pointed to a
              listing around 2024-2025.

              There is no confirmed post-Series G equity raise as of the run date (May 2026). Multiple credible news
              outlets reported throughout 2023-2025 that Toss was pursuing a KOSPI listing, and in January 2025, sources
              cited by Reuters and others indicated that Toss had engaged JP Morgan and Citigroup as advisers for its
              IPO process. Revenue and profitability data for years beyond 2020 are not publicly disclosed. Toss Bank
              (as a licensed internet bank) operates under Korean banking regulatory oversight by the Financial Services
              Commission (FSC).
