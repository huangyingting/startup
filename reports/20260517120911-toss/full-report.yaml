      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              Toss's capital structure reflects its history as a venture-backed private company with high growth and
              pre-profitability investment in multiple regulated business lines. The Company Overview chapter documents
              the full funding chronology; this section focuses on forward capital adequacy.

              **Historical funding summary (Financials context):** As of the Series G in June 2021, Viva Republica had
              raised more than $940 M in equity funding. Multiple credible reports indicate a subsequent fund-raise in
              2022–2023 (variously reported as $405 M from SoftBank and others, bringing total funding to approximately
              $1.5 B+), though the specific round details were not confirmed from directly accessible sources.

              **Toss Bank capital adequacy:** As a licensed bank, Toss Bank must maintain minimum capital ratios under
              the Korean Banking Act and FSC guidance. Internet-only banks in South Korea must maintain a minimum BIS
              ratio (typically 8%+). Toss Bank's rapid loan book growth requires ongoing capital injections from the
              parent entity (Viva Republica) to maintain regulatory capital ratios. This creates a predictable but
              potentially large capital dependency that is not capped by the parent entity's own funding.

              **IPO trajectory:** As of early 2024, Reuters and Bloomberg reported that Viva Republica was targeting an
              IPO in 2025, with a dual listing (Korea + US) under consideration. This would be the company's primary
              liquidity event and a major capital recycling opportunity for its investors. The 2021 Series G CEO quote
              indicated a target of 3 years after one more private raise — implying 2024/2025 IPO. As of May 2026, no
              IPO has been publicly announced, suggesting the timeline has slipped or the process is ongoing.

              **Cash position and burn rate:** Viva Republica has not disclosed cash position, monthly burn, or runway.
              Given the combined operating costs of a 4,000+ employee organization (estimated from job postings) running
              a bank, brokerage, payments processor, and insurance aggregator, annual operating expenses are estimated
              at $500 M–$1.0 B at current scale. If the company achieved profitability in 2024 as reported, burn is zero
              or positive; pre-2023 operating losses are estimated from the 2020 baseline (72.5 B KRW / ~$61 M loss on
              $330 M revenue).

              **Debt and project finance:** Toss Bank, as a deposit-taking institution, has access to the Korean
              interbank funding market and retail deposits as sources of funds for the loan book. This is NOT equity
              capital dependency but normal banking liabilities. Retail deposit volumes and interbank funding costs are
              not publicly disclosed.
            claimRefs:
              - CI025
              - CI026
