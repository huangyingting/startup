      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >-
              Lee Seung-gun (이승건), widely known by his initials SG Lee, founded Viva Republica after an unconventional
              career path. Trained as a dentist at Seoul National University — one of South Korea's most prestigious
              institutions — Lee practiced at a Samsung-affiliated hospital before pivoting to entrepreneurship. He
              endured eight consecutive startup failures across a range of business concepts before identifying a gap in
              South Korea's banking system: the country had world-class smartphone penetration and credit-card usage,
              yet a simple money transfer required more than 37 clicks and five passwords.

              Lee spent approximately a year working with South Korean financial regulators to win approval for a
              simplified mobile money transfer product. Toss launched in 2015 and quickly gained traction. By 2021, Lee
              had become a billionaire—Forbes estimated his stake at roughly 18% of Viva Republica, worth approximately
              $1.2 billion at the post-Series G $7.4 billion valuation. Lee has remained the sole disclosed founder and
              public face of Viva Republica, creating meaningful key-person concentration risk.

              Viva Republica does not publicly disclose the composition of its full executive team or board of directors
              in English-language communications. The company has not published an annual report or listed any other
              C-suite executives in independently verifiable public sources reviewed for this chapter. Lee holds the
              title of founder and CEO; no co-founder or successor plan is publicly documented. Independent governance
              oversight—board composition, audit committee, and investor seat holders—is also not publicly disclosed,
              representing a material gap for due-diligence purposes.
