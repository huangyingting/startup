        title: Exhibits
        blocks:
          - type: callout
            title: Super-App Moat with Financial Data Network Effects
            body: >-
              Toss has achieved penetration of more than 20% of all South Korean bank accounts and credit cards, giving
              it a proprietary transaction-data advantage that incumbent banks and new entrants cannot easily replicate.
              This data moat is the foundation for Toss Bank's superior credit-scoring model—independently back-tested
              to show 150% better differential power analysis versus bureau data alone—enabling lower lending rates and
              higher loan-market share.
            calloutType: strength
