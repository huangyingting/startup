  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >
              Toss operates five primary revenue streams, differentiated by product line and monetization mechanism. The
              platform's super-app architecture creates cross-sell and data leverage across streams, but the revenue mix
              and relative contribution of each segment are not publicly disclosed for Viva Republica as a consolidated
              entity.

              **Payment Processing (Toss Payments / MDR model):** Toss Payments charges merchants a Merchant Discount
              Rate (MDR) on each transaction processed through its online payment gateway and Toss Place POS. The
              official pricing page lists rates comparable to Korean payment processor benchmarks of approximately
              1.5–3.5% for card-based online transactions; exact contracted MDR is not publicly disclosed. Gross payment
              value (GPV) is unconfirmed, but the company cited a $48 B+ cumulative payment processing milestone as of
              mid-2019 (at which point total users were 14 M). By 2021, with 20 M total users and expanded merchant
              partnerships, payment TPV is estimated to have grown substantially.

              **Banking Net Interest Income (Toss Bank):** Toss Bank, launched in September 2021 as South Korea's third
              internet-only bank, focuses on personal lending (unsecured loans, credit loans, mortgages) as its primary
              revenue driver. CEO SG Lee explicitly stated that Toss Bank would focus on loans rather than payments
              interchange, since the super-app already covers payment services. Net Interest Income (NII) from the loan
              book constitutes the primary banking revenue stream. Toss Bank disclosed a profitability milestone in
              2023/2024 per multiple news reports, confirming it has scaled to generating positive net income.

              **Brokerage Commissions (Toss Securities / Toss Invest):** Toss Securities (also accessible via
              tossinvest.com) launched in March 2021 and attracted 3.5 M users within the first three months,
              demonstrating strong user acquisition. Revenue comes from brokerage commissions on equity trades (domestic
              and international) and potentially from interest on margin lending. Exact commission rates are not
              publicly disclosed but are estimated to be competitive with Korean brokerage benchmarks.

              **Insurance Premiums and Referral Fees:** The Toss app aggregates insurance products and facilitates
              comparisons and purchases of insurance plans. Revenue from this stream likely includes referral fees from
              insurance providers and potentially direct premium underwriting income, though the exact model is
              undisclosed.

              **Advertising and Financial Product Referrals:** As a financial aggregation platform with 20 M+ users,
              Toss monetizes user intent through financial product referrals (loans, savings accounts, credit cards)
              from partner financial institutions. Referral fee income is an unquantified but likely meaningful revenue
              stream.

              **Revenue recognition:** Given the mix of payment processing fees (point-in-time), banking NII (accrual),
              and referral/commission income (event-based), Toss's revenue recognition approach varies by segment. As a
              private company with no obligation to publish consolidated financials, revenue recognition policies are
              undisclosed.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
              - CI006
              - CI007
          - type: table
            tableRef: TI001
            claimRefs:
