      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Toss operates a primarily B2C GTM motion for its consumer super-app, with a B2B channel for Toss Payments
              and Toss Place (point-of-sale). The two motions have distinct sales cycles and cost structures.

              **Consumer super-app (B2C):** Toss's consumer growth has been driven by viral word-of-mouth, the
              frictionless value proposition of one-password money transfer (replacing the ~37-step Korean banking
              process), and referral mechanics. The company grew from zero to 14 M registered users by mid-2019 and to
              20 M total users (11 M MAU) by June 2021 — representing approximately one-third to 40% of South Korea's
              51.7 M population. This growth trajectory implies a blended CAC well below $10 per acquired user given
              total equity raised of ~$940 M to that point, and suggests strong organic viral growth. By 2018, the
              company was projecting an $18 B annual transaction run-rate, and by 2019 had processed $48 B+
              cumulatively.

              **Payment gateway (B2B/Toss Payments):** Toss Payments targets merchants with an API-first payment
              integration offering, competing with KG Inicis, NHN KCP, and Kakao Pay. The B2B sales cycle for payment
              gateway integrations is typically 2–8 weeks for mid-market merchants. CAC for payment gateway customers is
              not disclosed. Channel economics for Toss Payments are driven by MDR take-rate minus card network
              interchange fees, with gross margins in payment processing estimated at 20–40% (consistent with global
              payment processor benchmarks).

              **Financial product aggregation:** For banking, brokerage, and insurance products, Toss leverages its
              existing user base as an in-app funnel, displaying financial product recommendations based on user credit
              scores, spending patterns, and profiles. This represents an extremely low marginal CAC for cross-selling
              given the existing installed base.

              **No public CAC/payback data:** Toss has not disclosed CAC, LTV, or payback period metrics in any public
              filing or press release. As a private company, these unit economics are proprietary. Proxies inferred from
              total funding and user count suggest blended consumer CAC of approximately $5–15 per registered user, but
              this is an estimate with high uncertainty.
            claimRefs:
              - CI008
              - CI009
              - CI010
              - CI011
              - CI012
      - number: '4.3'
        title: Cost Structure, Gross Margin, and Unit Economics
        blocks:
          - type: paragraph
            body: >
              Toss's cost structure reflects the multi-segment nature of its business: relatively low marginal cost for
              pure software/aggregation functions (payment gateway software, financial product referrals), combined with
              higher capital and compliance costs for regulated banking and brokerage operations.

              **Primary cost drivers:** - **Regulatory capital requirements:** As a licensed bank, Toss Bank must
              maintain
                BIS capital adequacy ratios (Tier 1 capital ratio). Internet banks in Korea are
                required to meet FSC minimum capital requirements. Capital deployed into the
                banking subsidiary is capital-constrained and reduces group-level free cash flow.
              - **Loan-loss provisioning:** Banking revenue (NII) is offset by credit loss
                provisions on the loan book. Toss Bank's risk model, validated by Korea Credit
                Bureau (KCB) against 2 M+ users, showed 30% lower delinquency rates than
                traditional models — suggesting provisioning rates lower than traditional banks,
                which is a gross margin advantage for Toss Bank.
              - **Technology and platform R&D:** As a technology company, significant costs go
                toward continuous platform development, fraud detection, and credit scoring
                infrastructure. Cost details are undisclosed.
              - **Customer acquisition and marketing:** Consumer acquisition cost has been
                relatively low given viral growth, but marketing spend is a material cost for
                sustaining growth. Not publicly disclosed.
              - **Regulatory compliance:** Operating across banking, brokerage, payment, and
                insurance verticals requires multi-regulatory compliance (FSC, FSS oversight),
                adding to overhead costs.

              **Gross margin estimates:** - Payment processing (Toss Payments): estimated 20–40% gross margin (MDR less
                interchange and settlement costs), consistent with global payment processor
                benchmarks.
              - Banking (Toss Bank): net interest margin estimated at 2–4% on the loan book;
                with strong credit scoring, provisioning costs should be below market average.
                Banking gross margins at the NII level can exceed 60–70% before operating costs.
              - Brokerage (Toss Securities): commission-based with low marginal cost; high gross
                margin on transaction fees but constrained by regulatory capital requirements.

              **Working capital and capex:** Toss Payments and the software platform have minimal working capital
              requirements. However, Toss Bank's loan book growth requires capital deployment. Each incremental KRW of
              loans requires proportional capital set-aside under BIS framework. This creates a financing dependency for
              loan book growth.

              **Financial path to profitability:** The 2020 accounts (last disclosed) showed net losses narrowing from
              115 B KRW to 72.5 B KRW while revenue tripled to 390 B KRW — a rapidly improving loss ratio of ~18.6% of
              revenue vs ~100%+ in the prior year. Multiple news sources report that Toss Bank achieved standalone
              profitability in 2023/2024, suggesting the consolidated entity's loss trajectory continued to improve
              post-2021 Toss Bank launch.
            claimRefs:
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
              - CI018
