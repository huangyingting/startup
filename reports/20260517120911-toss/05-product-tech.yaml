  - Pre-Toss Workflow
  - Toss Solution
  - Measurable Benefit
  - Limitation
  rows:
  - - Send money to friend
    - Open banking app; log in; navigate; enter account; verify (37+ steps)
    - Tap name/number; confirm biometric; done
    - From 37 steps to ~3 steps per company claims
    - Only for domestic KRW transfers
  - - Check credit score
    - Register with bureau; wait; pay per check
    - Free real-time score on home screen
    - Removes cost and friction; drives loan cross-sell
    - Score model inputs not independently audited
  - - Invest in stocks
    - Open brokerage account (multi-day process)
    - Open Toss Securities in-app; KYC in minutes
    - 3.5M users in 3 months at launch
    - Limited to Korean equities (as of 2021)
  - - Pay merchant online
    - Enter card details each transaction
    - Toss Payments widget; one-tap; saved credentials
    - Reduces checkout abandonment for merchants
    - Developer community small; limited English docs
  - - Apply for consumer loan
    - Visit bank branch or website; separate KYC
    - AI pre-screening; instant decision inside app
    - Reaches thin-file borrowers via alternative data
    - Loan terms and rejection criteria not disclosed
  notes: Workflow complexity data from company marketing materials; benefit metrics from 2021 press reporting; not independently verified.
  claimRefs: [CE003, CE008, CE011, CE026]

