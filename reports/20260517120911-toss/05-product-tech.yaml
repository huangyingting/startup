  evidenceGaps:
  - type: missing-source
    severity: material
    topic: technology-architecture
    missingEvidence: Cloud infrastructure provider names, IaaS vendor contracts, and hosting architecture for Toss Bank core banking have not been publicly disclosed.
    whyItMatters: Cloud provider concentration and contractual dependencies are material infrastructure risks that affect uptime SLA obligations, data residency compliance, and exit costs.
    diligencePath: Request infrastructure architecture disclosure or cloud provider confirmation from Viva Republica management during due diligence.
    relatedQuestionRefs: [QE002]
  - type: private-evidence-only
    severity: minor
    topic: ai-credit-scoring
    missingEvidence: Independent third-party audit or validation of Toss Bank's AI credit model beyond the company-reported KCB backtesting result has not been found in public sources.
    whyItMatters: Model-based credit decisions at scale require independent validation to confirm that reported performance (150% differential power, 30% delinquency improvement) holds out-of-sample and is free of data-snooping bias.
    diligencePath: Request independent audit reports from Toss Bank's compliance function; review FSS examination findings if accessible.
    relatedQuestionRefs: [QE011]
  - type: stale
    severity: minor
    topic: international-expansion
