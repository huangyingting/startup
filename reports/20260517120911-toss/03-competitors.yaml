- id: section-3
  title: 'Feature and capability comparison: where Toss leads and where rivals narrow the gap'
  body: 'Toss leads on financial service breadth. Its super-app integrates more than 40 distinct financial
    services spanning free P2P money transfers, Toss Bank digital accounts, securities brokerage through
    Toss Securities, insurance comparison, credit score monitoring, loan marketplace, FX remittance, and
    merchant payment processing through Toss Payments. No single competitor currently matches this breadth.

    KakaoBank is narrower but deeper in pure banking: it provides excellent core banking including deposits,
    loans, debit cards, and overseas remittances through its no-branch model and benefits from the KakaoTalk
    distribution channel, but does not offer brokerage, an insurance marketplace, or credit score monitoring.
    Kakao Pay leads in embedded social payments but lacks a full banking licence and has no brokerage
    or credit scoring. Naver Pay and Samsung Pay are single-layer payment instruments with no additional
    financial product suite.

    Traditional banks match or exceed Toss on lending, FX, and deposit products but lack a credit score
    transparency layer, an insurance marketplace, or a brokerage at comparable mobile UX quality. The
    clearest gap in the competitive map is that no rival yet offers equivalent cross-product breadth at
    equivalent user-experience quality—though KakaoBank''s consistent product expansion since its 2021
    IPO has been gradually narrowing that gap. Toss Securities enrolled approximately 3.5 million users
    within three months of launching in March 2021, illustrating how rapidly Toss can convert its user
    base to new financial product verticals.'
  claimRefs:
  - CP006
  - CP013
  - CP019
  - CP026
  - CP027
  - CP031
