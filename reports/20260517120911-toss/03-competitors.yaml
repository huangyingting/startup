- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - moat claim
  - competitive threat
  - severity
  - mitigation / diligence ask
  rows:
  - - Super-app breadth and cross-product network effects across 40+ integrated services
    - KakaoBank systematically expanding product scope post-IPO; Kakao Pay broadening beyond payments
    - High
    - Monitor KakaoBank product roadmap for brokerage and insurance launches; track time-to-launch vs
      Toss
  - - Proprietary credit scoring using alternative behavioural data (Toss Bank AI model)
    - Regulatory tightening of alternative-data use; FSC may mandate data minimisation in AI lending models
    - Medium
    - Audit ML model compliance; track FSC rule-making on AI scoring; confirm model portability if data
      rules change
  - - Free P2P transfer flywheel as primary customer-acquisition engine
    - KakaoBank and Kakao Pay both replicated zero-fee P2P; moat already commoditised
    - Medium
    - Quantify current cross-sell revenue per P2P user; model what replaces transfer fees as acquisition
      wedge
  - - KakaoBank scale lead widening (26.7M vs Toss ~20M estimate)
    - If KakaoBank reaches 30M customers by 2027, it surpasses Toss's known user count with a public balance
      sheet
    - High
    - Require updated 2026 Toss MAU / registered-user data before finalising competitive ranking
  - - Toss Bank cost-of-funds advantage vs traditional banks
    - Big 4 launching fee-free digital sub-brands (e.g. KB Star Banking); deposit rate competition intensifying
    - Medium
    - Track deposit rate evolution and market share for internet banks vs digital bank arms of incumbents
  - - Data-privacy regulatory risk from large-scale data collection and sharing
    - FSS 2025 fines on Toss (₩6B) and Kakao Pay (₩15B) signal escalating enforcement against data-network
      plays
    - High
    - Conduct data-governance review; verify consent framework covers all cross-entity data flows; monitor
      FSS guidance
  - - KakaoTalk distribution moat for Kakao Pay and KakaoBank
    - Kakao Group antitrust scrutiny (KFTC) may limit exclusive bundling or force access to rivals
    - Medium
    - Monitor KFTC proceedings against Kakao Corp; scenario-plan Toss impact if KakaoTalk opens to third-party
      wallets
  notes: Moat ratings are analyst assessments based on publicly available competitive signals; severity
    scores are indicative, not actuarial.
