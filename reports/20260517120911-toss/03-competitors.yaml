callouts:
- calloutType: risk
  title: Regulatory data-privacy enforcement is a moat-erosion risk for all Korean fintech super-apps
  body: In April 2025, South Korea's Financial Supervisory Service fined Kakao Pay ₩15 billion and Toss
    ₩6 billion for using large-scale user data without explicit consent. These enforcement actions demonstrate
    that the alternative- data credit scoring and data-network-effects playbook underpinning Korean fintech
    moats operates under tightening legal constraint. Future enforcement or legislative change could restrict
    cross-entity data sharing, narrowing the competitive gap between Toss's proprietary credit model and
    conventional scoring.
  claimRefs:
  - CP010
  - CP011
  - CP036
  - CP037
- calloutType: insight
  title: Toss's super-app breadth remains unmatched but is increasingly contested by KakaoBank
  body: No single Korean fintech competitor currently offers the same combination of P2P transfers, digital
    banking, brokerage, insurance, credit monitoring, and merchant payments under one interface. However,
    KakaoBank has expanded its product scope every year since listing in 2021 and has closed the breadth
    gap incrementally while growing its customer base faster than Toss's last confirmed trajectory. The
    competitive question is whether Toss's head-start in breadth can be defended as KakaoBank adds adjacent
    products with superior distribution through KakaoTalk.
  claimRefs:
  - CP001
  - CP003
  - CP026
  - CP031
- calloutType: recommendation
  title: Obtain current Toss MAU and registered-user data before finalising competitive ranking
  body: All competitive analyses that compare Toss's user base to KakaoBank's 26.7 million customers rely
    on Toss's 2021 Series G disclosure of 20 million users. No updated Toss user count has been publicly
    confirmed as of the run date. Diligence should require management to provide at least current registered
    users, monthly active users, and daily active users before concluding whether Toss is still ahead
    of or behind KakaoBank by customer count.
  claimRefs:
  - CP025
