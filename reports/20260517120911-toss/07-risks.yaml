- id: operational-risks
  title: Operational and Cybersecurity Risks
  body: 'Toss''s super-app architecture aggregates 40+ financial services on a single mobile platform,
    creating a single-channel dependency that amplifies the blast radius of any technical outage. The
    platform processes millions of daily payment and banking transactions; a prolonged downtime event
    would simultaneously disrupt transfers, lending disbursements, securities trades, and insurance claims—damaging
    user trust across multiple product lines at once. Toss''s infrastructure relies heavily on public
    cloud services; while the company has not publicly disclosed its primary cloud provider, Korean financial
    regulations require financial institutions to comply with the Electronic Financial Transactions Act''s
    IT security standards including network separation, semi-annual CISO compliance reviews, and Financial
    Security Institute (FSI) pre-screening for SaaS tools under the April 2026 revised rules. A material
    cybersecurity breach would trigger both PIPA notification obligations and FSS supervisory scrutiny,
    potentially freezing product launches until remediation is complete. Fraud risk is elevated in lending:
    Toss Bank focuses on underserved borrowers with non-standard credit histories, increasing adverse
    selection risk if its alternative scoring model performs differently in a live stressed-credit environment
    than in KCB backtesting. The 2021-2022 data misuse incident—resulting in the 2024 FSS fine—demonstrates
    that compliance execution has lagged product growth, a pattern that could recur as Toss expands into
    securities, insurance, and international markets.'
  claimRefs:
  - CR002
  - CR005
  - CR006
  - CR011
  - CR012
  - CR013
  - CR039
  - CR040
