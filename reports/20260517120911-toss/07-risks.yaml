  columns:
  - Risk / Rule / Case
  - Jurisdiction
  - Status
  - Likelihood
  - Severity
  - Mitigation
  - Residual Exposure
  - Diligence Path
  rows:
  - - Data Privacy Recurrence (PIPA)
    - South Korea
    - Active risk — 2024 FSS fine precedent established
    - Medium (prior violation confirmed; systems updated but culture gap unproven)
    - High — fine up to 3% revenue; user trust erosion
    - Updated consent architecture; CISO accountability
    - Material; depends on FSS follow-up examination
    - Request FSS examination schedule and remediation closure letter
  - - Internet Banking Licence Revocation (FSC)
    - South Korea
    - Active — ongoing capital adequacy and supervisory compliance required
    - Low (no precedent for revocation; high political cost)
    - Critical — halts Toss Bank operations entirely
    - Maintain capital ratios; FSC engagement programme
    - Existential if triggered; remote probability
    - Request Toss Bank capital ratio disclosures and FSC correspondence
  - - FSS Enforcement Escalation
    - South Korea
    - Active — FSS has active fintech oversight programme
    - Medium (two peers fined in same wave; pattern-based)
    - High — operational restriction or business suspension
    - Proactive regulatory dialogue; compliance investment
    - Elevated given peer enforcement pattern in 2024-2025
    - Monitor FSS annual fintech inspection reports
  - - AML / VASP Rules (stablecoin / crypto)
    - South Korea
    - Pending — FSC stablecoin legal framework in development (2026)
    - Low-medium (Toss not primarily a crypto player today)
    - Medium — could restrict Toss's payments product evolution
    - Monitor regulatory roadmap; stay outside VASP scope
    - Limited current exposure; increases if Toss expands into crypto payments
    - Confirm Toss's current crypto product scope with management
  - - Vietnam Regulatory Compliance (CIMB partnership)
    - Vietnam
    - Active — foreign banking licence via CIMB Vietnam
    - Medium (cross-border enforcement harder to monitor)
    - Medium — reputational spillover; impairs SEA expansion thesis
    - Local partner dependency; limited Toss direct control
    - Residual risk unquantified from public sources
    - Request CIMB Vietnam compliance status and Toss governance rights
  - - Cloud SaaS Network Separation (Electronic Financial Transactions Act)
    - South Korea
    - Revised April 2026 — exemption granted for back-office SaaS; personal data still restricted
    - Low-medium (non-compliance risk during transition window)
    - Medium — FSS may restrict product deployment pending compliance
    - FSI pre-screening programme; semi-annual CISO review
    - Manageable with process investment; key during AI/AX rollout
    - Confirm FSI SaaS approval pipeline and CISO review cadence
  notes: Severity and probability are analyst assessments based on public FSS enforcement records, regulatory
    filings, and news; actual probability distributions are not independently actuarial.
