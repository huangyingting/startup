- id: financial-credit-risks
  title: Financial, Capital and Credit Risks
  body: Viva Republica reported a net loss of ₩72.5 billion in FY2020, narrowed from ₩115 billion in FY2019,
    but losses continued through 2022 as the company invested heavily in Toss Bank's launch and geographic
    expansion into Vietnam. Finextra reported in 2024 that Toss Bank turned profitable, but the consolidated
    group's path to profitability and timeline to positive free cash flow remain undisclosed in public
    sources. The company raised $410 million at a $7.4 billion valuation in its Series G round in June
    2021 and has raised over $900 million in aggregate, yet the IPO has been delayed at least twice from
    the 2023 target window, creating exit pressure on late-stage investors. A down-round risk exists if
    macro conditions deteriorate before listing. Toss Bank's credit model—which KCB backtested as having
    30% lower delinquency than the KCB benchmark and 150% better differential power—has not been tested
    through a full domestic credit cycle or a recession. The bank's focus on underserved borrowers increases
    the sensitivity of its loan book to unemployment shocks and rate spikes. Net interest margin compression
    is a structural risk as all three internet banks (K-Bank, KakaoBank, Toss Bank) compete for deposits
    and loans in a market where KakaoBank's scale advantage allows it to price aggressively. Capital adequacy
    requirements for internet banks impose additional regulatory constraints on growth-funded lending
    expansion.
  claimRefs:
  - CR014
  - CR015
  - CR016
  - CR017
  - CR018
