  - - Financial CFO / capital markets leadership
    - IPO preparation requires experienced public-market CFO
    - Medium (IPO delayed; CFO bench strength unknown)
    - High — IPO execution risk; investor confidence gap
    - Undisclosed; no CFO named in public sources found
    - Confirm CFO tenure and public-company finance experience
  - - Credit risk management team
    - Toss Bank loan book performance depends on model and human oversight
    - Low-medium (model is proprietary; team experience unknown)
    - High — credit cycle losses; capital impairment
    - KCB partnership provides external model validation anchor
    - Request CRO background and credit committee governance structure
  - - Multi-vertical engineering / product talent
    - Scaling six product lines simultaneously; talent war in Seoul
    - Medium (Seoul tech talent market is competitive)
    - Medium — product execution delays; quality drift
    - Competitive compensation; stock options
