chapter:
  number: 7
  title: Risks
  summary: 'Toss (Viva Republica) carries a multi-layered risk profile anchored by three structural constraints:
    Korea''s tightly licensed three-bank internet banking regime, an FSS enforcement action that fined
    Toss ₩6 billion for using 29 million consumer records without consent, and persistent net losses across
    all disclosed fiscal years. Intensifying competition from KakaoBank—which posted record ₩480.3 billion
    net profit in FY2025—and a key-person concentration in founder-CEO SG Lee define the primary investment
    thesis boundary conditions. These risks are partially offset by Toss Bank''s 2024 return to profitability,
    a diversified revenue model across six financial service verticals, and a deep regulatory relationship
    earned through years of licence negotiations.'
sections:
- id: risk-overview
  title: Risk Landscape and Prioritization
  body: 'Toss''s risk universe is anchored by five clusters: regulatory and legal compliance, operational
    and cybersecurity reliability, financial sustainability and credit quality, competitive displacement
    by Kakao''s ecosystem, and key-person execution dependency. The highest-severity risks are those that
    could trigger licence revocation or material regulatory sanction: the FSS''s enforcement record on
    data misuse directly affects investor confidence, and any recurrence under the Personal Information
    Protection Act (PIPA) could precipitate both financial penalties and user attrition. The second tier
    covers financial risks: Toss has reported net losses in every disclosed fiscal year through 2022,
    and while Toss Bank reportedly turned profitable in 2024, consolidated group profitability is unconfirmed
    from public filings. IPO execution risk is elevated; the listing was targeted for 2023, delayed at
    least twice, and as of May 2026 remains unannounced. The third tier covers competitive displacement:
    KakaoBank''s record FY2025 results and Kakao''s 54-million-user messaging distribution create an asymmetric
    advantage in customer acquisition cost that Toss cannot easily replicate. Operational and key-person
    risks complete the register. The risk heatmap summarises all risks by likelihood and severity.'
  claimRefs:
  - CR001
  - CR002
  - CR008
  - CR009
  - CR014
  - CR021
  - CR024
  - CR033
  figureRefs:
  - FR001
- id: regulatory-legal-risks
  title: Regulatory and Legal Risks
  body: 'Toss operates across six licensed sub-entities (Toss Bank, Toss Payments, Toss Securities, Toss
    Insurance, Toss Feed, and the core app) under the supervisory jurisdiction of the Financial Services
    Commission (FSC) and its operational arm, the Financial Supervisory Service (FSS). The FSC—chaired
    by Lee Eog-weon as of April 2026—has demonstrated willingness to impose material sanctions: in 2024
    the FSS fined Toss (Viva Republica) ₩6 billion for using over 29 million consumer records without
    user consent between November 2021 and April 2022. In the same enforcement wave, KakaoPay received
    a ₩15 billion FSS fine and a ₩5.9 billion Personal Information Protection Commission fine for unauthorised
    data transfer to Alipay, establishing a clear severity benchmark. South Korea''s PIPA permits fines
    of up to 3% of relevant revenue for material data violations, meaning a recurrence at current Toss
    scale could carry fines multiples larger than the 2024 penalty. Compounding the regulatory risk, the
    FSC revised cloud-SaaS network-separation rules in April 2026, exempting back-office functions from
    sandbox pre-approval while tightening requirements around personal identification and credit information—directly
    constraining how Toss Bank can deploy AI and cloud services on its core banking stack. SG Lee spent
    over a year convincing regulators to permit Toss''s initial money-transfer product in 2015; the regulatory
    relationship is durable but the compliance burden grows with each new product licence.'
  claimRefs:
  - CR001
  - CR002
  - CR003
  - CR004
  - CR005
  - CR006
  - CR007
  - CR008
  - CR009
  - CR010
