- id: people-execution-risks
  title: People, Execution Risks and Kill Criteria
  body: 'SG Lee (Lee Seung-gun) is the founder, CEO, and primary strategic architect of Toss. He holds
    approximately 18% of Viva Republica and has driven every major product expansion, regulatory relationship,
    and fundraising event since the company''s founding in 2013. Prior to founding Toss, Lee failed eight
    businesses, ultimately pivoting from a dental career—a background that provides an unconventional
    lens on consumer pain points but no formal financial services operating experience at scale. The concentration
    of strategic, cultural, and regulatory trust in a single individual creates severe key-person risk:
    departure, incapacitation, or regulatory scrutiny of Lee would likely trigger management uncertainty,
    partner caution, and potential investor redemptions. The board''s governance structure, succession
    planning, and bench strength below Lee are not publicly disclosed. Execution risk is compounded by
    the rapid pace of multi-vertical expansion—banking, payments, securities, insurance, and international
    markets are being built simultaneously, stretching engineering, compliance, and regulatory bandwidth.
    The following tables summarise all risk registers with mitigations and thesis-break triggers.'
  claimRefs:
