      thesis; additional minor compliance obligations exist across all six licensed sub-entities but are
      not individually material.
    basis: Risks enumerated from FSC and FSS regulatory actions, PIPA enforcement history, internet banking
      licence framework, and news coverage of Korean fintech regulatory enforcement between 2021 and 2026.
