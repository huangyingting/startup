- id: TV002
  title: Thesis / Anti-Thesis Table
  sectionRef: S8V001
  notes: 'Each thesis arm is paired with the specific evidence or diligence path that
    would change the view. Thesis arms are ordered by conviction level from highest
    to lowest.

    '
  columns:
  - Argument
  - What Would Change the View
  rows:
  - - Korea super-app moat with 20M plus users, 40 plus financial services, and data
      flywheel creating structural competitive barriers
    - User growth stalls below 25M by 2026, or core payment TPV declines relative
      to Kakao Pay
  - - Toss Bank profitability validated by standalone $2.3B unicorn mark and first
      profit in 2023-2024
    - NPL ratio exceeds 2% or Toss Bank requires equity capital injection from parent
  - - IPO catalyst with JP Morgan and Citigroup mandated and KOSPI listing creating
      liquidity event for investors
    - A fourth consecutive IPO delay cycle in 2026, or underwriters withdraw from
      mandate
  - - CEO alignment with SG Lee holding approximately 18% stake aligning founder incentives
      with shareholder return
    - Lee reduces stake materially through secondary sales or exits management role
  - - Market-rate credit model with KCB-backtested Toss credit engine as 150% better
      differential power and 30% lower delinquency
    - NPL rate rises significantly above KakaoBank benchmark or FSC intervenes in
      lending practices
  - - 'ANTI: group losses unsustained with $500M loss in 2022 and continued losses
      in 2023 suggesting the super-app model has not achieved capital efficiency'
    - Public disclosure showing group-level EBITDA-positive or net-income breakeven
      for 2024
  - - 'ANTI: valuation mark stale at $7.4B from 2021 peak; Series H valuation not
      disclosed; TechCrunch reported valuation cut sought in 2022'
    - An arm's-length secondary transaction or IPO prospectus pricing at or above
      $7.4B
  - - 'ANTI: IPO delay pattern with 4 plus year gap between IPO announcement and confirmed
      filing creating governance credibility risk'
    - KRX or FSC public filing confirming formal registration in 2026
