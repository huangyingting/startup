chapter:
  number: 8
  title: Valuation
  summary: 'Toss (Viva Republica) last priced at $7.4 billion in its June 2021 Series
    G. As of May 2026 the company has not filed for an IPO despite announcing plans
    repeatedly since 2021, has posted a record ~$500 million net loss in 2022, and
    carries a structural parent-level deficit even as Toss Bank turned its first profit
    in 2023-2024. The comparable set — KakaoBank (KOSPI), Nubank, and Revolut — shows
    neobank valuations are now a function of demonstrated profitability, not user-growth
    multiples alone. At the last known private mark the risk/return profile is stretched:
    our base case implies roughly $6–8 billion equity value on a sum-of-parts basis,
    below the 2021 mark, and the bear case reaches $3–4 billion under multiple compression.
    A buy decision would require current consolidated financials, a credible IPO timeline,
    and evidence of group-level path-to-profitability. Our recommendation is research-more
    / track.

    '
