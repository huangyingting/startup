acknowledgedWarnings:
- dimension: paywallRisk
  reason: 'Nine sources are paywalled or rate-limited including Bloomberg times four,
    Reuters times three, WSJ times one, and Nikkei times one. These are tier-one outlets
    providing the only accessible coverage of Toss IPO plans, financing terms, and
    record 2022 loss. Each paywalled source is corroborated by at least one accessible
    source or explicitly noted as unconfirmed in the relevant claim. No paywalled
    source is the sole basis for any high-confidence claim.

    '
- dimension: unverifiedSource
  reason: 'DART regulatory filing portal appears as a filing source but is not present
    in the fetch-url trail because DART requires JavaScript rendering to access individual
    filing documents and the URL fetched returns a JavaScript-only page. The DART
    portal URL is cited as a diligence path to audited Toss Bank financials, not as
    a source for specific numeric claims. All specific financial claims use press-accessible
    sources that are independently corroborated.

    '
