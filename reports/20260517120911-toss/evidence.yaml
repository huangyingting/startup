      downloads milestone from January 2025. No granular MAU or registered user figure for 2025 or 2026 has been located
      in public sources. Toss Bank customer count since its September 2021 launch has not been independently reported.
      Vietnam MAU (3M+ as of Jun 2021) also lacks a 2025-2026 update.
