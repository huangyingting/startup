evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: revenue
    missingEvidence: >-
      Viva Republica has not published audited financial statements or IFRS-compliant accounts in English since FY 2020
      data was disclosed via Forbes. Revenue, gross margin, and net income for FY 2021-2025 are entirely undisclosed.
    whyItMatters: >-
      Without post-2021 financial data, it is impossible to assess whether Toss has achieved profitability, how Toss
      Bank's loan portfolio is performing, or whether the company can sustain operations through an IPO process.
    diligencePath: >-
      Request Viva Republica's audited Korean GAAP (K-GAAP) financial statements from DART (Data Analysis, Retrieval and
      Transfer System), South Korea's corporate disclosure system; Toss Bank as a licensed bank is required to publish
      financial statements under FSC regulations.
