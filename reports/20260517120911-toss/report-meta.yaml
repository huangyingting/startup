companyProfile:
  summary: >-
    Viva Republica, Inc. (trading as Toss) is a Seoul-based fintech holding company
    founded in 2013 by Lee Seung-gun (SG Lee), a former dentist turned serial
    entrepreneur. Toss started as a peer-to-peer free bank transfer app disrupting
    Korea's complex wire-transfer system, and has since evolved into a vertically
    integrated financial super app encompassing Toss Payments (merchant acquiring),
    Toss Bank (internet-only bank), Toss Securities (retail brokerage with fractional
    shares), Toss Insurance (comparison and distribution), and Toss Vietnam (international
    expansion). The company raised a $410M Series G in June 2021 at a $7.4B post-money
    valuation led by Alkeon Capital Management and including Sequoia, SoftBank, GIC,
    and Kleiner Perkins. Total equity raised exceeds $940M. Revenue more than tripled
    from 2019 to 2020 to approximately $330M (390B KRW). Since 2021, Toss has repeatedly
    deferred an IPO that the CEO projected would occur by 2024. As of the run date,
    no formal registration has been filed.
  foundedDate: "2013-01-01"
  founders:
    - name: "Lee Seung-gun (SG Lee)"
      role: "Founder & CEO"
      background: >-
        Former dentist who pivoted to entrepreneurship; built Toss from scratch as a
        peer-to-peer transfer app solving Korea's complex banking friction. Forbes
        estimated his stake at ~18% at $7.4B valuation.
      claimRefs: [CO008]
  foundingLocation: "Seoul, South Korea"
  headquarters: "Seoul, South Korea"
  productSummary: >-
    Unified fintech super app spanning free peer-to-peer bank transfers, Toss Payments
    merchant acquiring, Toss Bank internet-only bank, Toss Securities retail brokerage,
    Toss Insurance product comparison, and financial product aggregation from 25+ partner
    institutions.
  customerFocus: >-
    Korean retail consumers (primary: mobile-first millennials and Gen Z), small and
    medium business owners via Toss Payments, and international expansion in Vietnam.
  businessModel: >-
    Multi-revenue-stream model: (1) payment processing MDR fees via Toss Payments;
    (2) net interest margin from Toss Bank consumer loans; (3) brokerage commissions
    from Toss Securities; (4) insurance referral/distribution fees; (5) financial
    product referral fees from partner banks and insurers.
  stage: "Series G"
  fundingStatus: >-
    Series G: $410M at $7.4B post-money valuation (June 2021), led by Alkeon Capital
    Management. Total raised: ~$940M+ across multiple rounds since 2013.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO008, CO015, CO020, CO025, CU030]

summary:
  headline: >-
    Toss is Korea's most valuable private fintech with a proven super-app model and
    $330M+ revenue trajectory, but its $7.4B 2021 valuation faces compression from
    repeated IPO delays, a fintech market re-rating, and the challenge of growing into
    a multiple that requires sustained profitability none of its business lines has
    yet achieved at scale.
