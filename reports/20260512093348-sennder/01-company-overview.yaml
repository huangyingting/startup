  name: sennder

chapter:
  number: 1
  title: Company Overview
  summary: >
    sennder Technologies GmbH is Europe's leading digital road freight forwarder, founded in July 2015
    in Berlin by David Nothacker, Julius Köhler, and Nicolaus Schefenacker. Through a combination of
    proprietary technology, aggressive M&A, and strong investor backing, sennder has grown to ~$1.1B
    in annual revenue, achieved a $1.3B valuation in its June 2024 Series E, and completed its largest
    acquisition to date — C.H. Robinson's European Surface Transportation business — in February 2025,
    expanding its workforce to approximately 1,600 employees and its European footprint to 20+ countries.

sections:
  - id: identity-and-business-model
    title: Identity and Business Model
    body: >
      sennder Technologies GmbH is a Berlin-headquartered digital road freight forwarder that connects
      enterprise shippers with small and medium-sized trucking companies through a proprietary technology
      platform. Founded in July 2015, sennder has repositioned the traditional freight brokerage model
      by digitizing load matching, pricing, real-time tracking, and invoicing. The company operates
      exclusively in full truck load (FTL) road freight in Europe, a market estimated at €400 billion+
      annually. Its platform, branded sennOS, automates carrier onboarding, route optimization, and
      payment — reducing the average carrier payment cycle from industry-standard 45–60 days to under
      3 days. The company deploys over 40,000 trucks across Europe with access to more than 120,000
      vehicles, completing over 1 million FTL shipments per year. sennder's vision is to "fast forward
      road logistics" by creating an efficient, transparent, and sustainable road freight network.
      Shippers gain real-time visibility and cost control; carriers gain access to enterprise-quality
      loads and faster payment. The company earns revenue as a freight forwarder, taking a margin on
      freight brokerage transactions rather than owning physical assets. Its competitive differentiation
      stems from data network effects — the more loads and carriers on the platform, the better the
      matching algorithm performs, reducing empty miles and improving pricing efficiency.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
    figureRefs:
      - FO002
    tableRefs:
      - TO001

  - id: founders-and-leadership
    title: Founders and Leadership Team
    body: >
      sennder was co-founded in July 2015 by David Nothacker, Julius Köhler, and Nicolaus Schefenacker,
      who met through studies and professional networks. David Nothacker, the CEO, previously studied at
      WHU – Otto Beisheim School of Management and INSEAD, and worked at Roland Berger Strategy
      Consultants before identifying road freight as a ripe market for digital disruption. Julius Köhler,
      Co-Founder and Chief Digital Officer, gained experience at Rocket Internet before joining sennder.
      Nicolaus Schefenacker, Co-Founder, oversees M&A strategy, having assembled a team to systematically
      monitor and pursue acquisition targets. The management team expanded significantly in 2024 following
      the C.H. Robinson acquisition: Susanne Schroeter-Crossan joined as CFO in April 2024, bringing
      financial leadership experience from Zalando SE, HelloFresh SE, and LEG Immobilien. Kollen Glynn
      became CTO after previously serving as VP of Core Software Engineering at C.H. Robinson, providing
      critical technical bridge for the integration. David Vismans joined as CPO from Booking.com. Post-
      acquisition C-suite additions from the C.H. Robinson EST team include Chris Mills (COO), Christoffer
      Haldemar (CCO), and Arkadiusz Glinka (Chief Growth Officer). The breadth of the leadership team
      represents both startup agility and institutional enterprise operational capability, though
      concentration risk around co-founder David Nothacker as the public face and primary strategic voice
      remains a material dependency.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
    tableRefs:
      - TO002

  - id: funding-and-investors
    title: Funding History and Investor Base
    body: >
      sennder has raised over $413 million across 11 funding rounds since inception, establishing itself
      as one of Europe's most heavily backed logistics technology companies. The company's early rounds
      were seeded by strategic investor Scania Growth Capital and HV Capital, which provided both capital
      and industry credibility in the carrier ecosystem. Series B ($29.7M, April 2019, led by Accel)
      and Series C ($70M, July 2019, led by Lakestar) funded rapid geographic expansion across Europe.
      A transformative Series D in January 2021 ($160M, led by Accel and Lakestar) was followed by a
      June 2021 extension ($80M, with Baillie Gifford joining), which catapulted sennder to unicorn
      status at a $1 billion valuation. A December 2022 Series D tranche ($63.2M) and August 2023 Scania
      Growth Capital round sustained operations through a freight market downturn. The most recent
      capital event is a June 2024 Series E of $160M led by Lakestar, setting a post-money valuation of
      $1.3 billion — a 30% premium to the $1B unicorn mark reached in 2021. Existing investors Accel,
      HV Capital, Scania Growth Capital, Baillie Gifford, and Insight Partners all participated,
      signaling strong institutional conviction. Total raised of approximately $413M positions sennder
      well for the capital-intensive integration of C.H. Robinson EST and continued platform development.
      Investec Morgan Stanley acted as financial advisor on the C.H. Robinson deal.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
    tableRefs:
      - TO003
    figureRefs:
      - FO001

  - id: scale-and-geographic-presence
    title: Scale, Revenue, and Geographic Presence
    body: >
      Prior to the C.H. Robinson EST acquisition, sennder reported revenue of approximately $1.1B for
      2024 with a headcount of ~929 employees. The acquisition, which closed on February 1, 2025, added
      approximately 700 employees and was expected to roughly double revenue to approximately €1.4B
      ($1.5B), positioning the combined company among Europe's top five FTL providers. The company
      currently operates in more than 20 European markets across 20+ physical locations, having expanded
      from its original footprint in Germany. Key offices include Berlin (HQ), Amsterdam, Barcelona,
      Bucharest, Madrid, Milan, Paris, Riga, Rotterdam, and Wrocław. New countries added through the
      C.H. Robinson acquisition include the United Kingdom and Turkey. The combined entity employs
      approximately 1,600 people and serves over 73 nationalities in its workforce. sennder operates
      over 40,000 vetted trucks with access to 250,000+ vehicles across the continent. The company
      completed over 1 million FTL shipments in 2024. Scale brings critical network density advantages:
      a broader carrier base across geographies enables lower empty mile rates and better price discovery.
      Revenue concentration risk is mitigated by a diversified customer base spanning automotive, FMCG,
      food & beverage, fashion, retail, and industrial manufacturing sectors across Europe.
    claimRefs:
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
      - CO023
    figureRefs:
      - FO003

  - id: milestones-and-acquisitions
    title: Corporate Milestones and M&A History
    body: >
      sennder's growth trajectory has been punctuated by a series of transformative milestones since its
      founding. Beginning with a pivot from last-mile e-commerce delivery to full truck load freight in
      2015-2016, the company rapidly built its carrier network through in-person recruitment and early
      technology development. Strategic M&A has been a core growth lever, with six acquisitions completed
      through 2024: Everoad (French digital forwarder, 2020) expanded the company's French presence;
      Uber Freight Europe (all-stock deal, September 2020) provided a shipper base and Amsterdam office;
      Cars & Cargo (Dutch forwarder, May 2021) added Benelux capacity; Innroute (Spanish competitor)
      extended Iberian reach. The most consequential transaction was the C.H. Robinson European Surface
      Transportation acquisition, announced July 30, 2024, and closed February 1, 2025, which was the
      largest in company history by employee count and revenue impact. Key adverse events include a
      freight market downturn in 2022-2023, which pressured revenue growth and necessitated a lower
      bridge round in December 2022. The company has maintained a "digital-first" identity throughout
      all acquisitions, integrating acquired companies under the sennder brand and operating system.
      Investor exits and secondary transactions have not been publicly disclosed.
    claimRefs:
      - CO024
      - CO025
      - CO026
      - CO027
      - CO028
    tableRefs:
      - TO004

