- id: platform-and-marketplace-plays
  title: Platform and Marketplace Plays
  body: 'Transporeon and TimoCom occupy a different competitive position: they are neutral digital infrastructure layers connecting
    shippers and carriers without acting as freight agents. Transporeon was acquired by Trimble (NASDAQ: TRMB) in April 2023.
    The platform processes over €55B in freight annually, connecting 150,000+ carriers, 1,400+ shippers and retailers across
    27 countries, supporting 110,000+ daily transport executions. Transporeon competes indirectly with sennder by empowering
    shippers to self-manage carrier relationships — reducing the addressable base who might otherwise outsource to a forwarder.
    Its SaaS model (dock/yard management, procurement, ERP integrations) provides capabilities sennder currently lacks, particularly
    deep shipper-side workflow integration. TimoCom, a German B2B freight exchange founded in 1997, hosts 55,000–58,000 verified
    companies and 156,000 total marketplace users, with up to 1 million freight offers daily. Its $84–158M estimated revenue
    and subscription model position it as infrastructure for smaller SME brokers and carriers, not a direct enterprise forwarder
    competitor to sennder.

    '
