  topStrengths:
    - >-
      EU market leadership: pro-forma revenue of ~€1.4B, 40,000+ trucks, 20+ countries — widest network density among
      digital-native freight platforms.
    - >-
      Structural market tailwinds: EU road freight at €431B with <10% digitized; EU Mobility Package and ETS 2030
      accelerate platform adoption.
    - >-
      Revenue floor from Poste Italiane JV: 10-year partnership with €2.3B commercial value provides downside protection
      independent of spot market conditions.
    - >-
      Proprietary sennOS platform: automated load matching, real-time tracking, and carrier payment tooling create
      switching costs for enterprise accounts.
    - >-
      CHR acquisition doubles addressable network: UK and Turkish lanes materially expand shipper-carrier density and
      cross-border coverage.
  topRisks:
    - >-
      CHR integration execution risk: integrating 12 jurisdictions, legacy systems, and ~800 employees from a
      traditional broker is the largest near-term single-point-of-failure.
    - >-
      Pre-profitability with undisclosed cost structure: no EBITDA, gross margin, or contribution margin data is public;
      investment thesis validation requires data-room access.
    - >-
      Sector multiple compression: Forto ($2.1B → distressed), Convoy ($3.8B → bankruptcy), and InstaFreight
      (insolvency) show digital freight burn risk at valuation inflection.
    - >-
      Regulatory burden: EU Mobility Package cabotage rules, BALM enforcement, and ETS road freight expansion add
      compliance cost and carrier pricing complexity.
    - >-
      Capital structure opacity: liquidation preference stack, CHR acquisition consideration, and venture debt terms are
      undisclosed — materially affects return waterfall.
  unresolvedGaps:
    - EBITDA, gross margin, and contribution margin per load by account type — unavailable without data-room access.
    - Series E post-money valuation and full cap table with liquidation preference stack.
    - CHR acquisition consideration and integration cost budget; Q1 2025 actuals vs. plan.
    - Poste Italiane JV break-clause conditions and minimum revenue guarantees.
    - Carrier acceptance rate by lane and service level threshold data.
