      Illustrates how a shipper booking converts into sennder's gross profit through the
      freight forwarding intermediation model. Boxes represent value-transfer nodes; edges
      show the direction of funds and obligations.
    data:
      nodes:
        - id: N1
          label: "Shipper Booking"
          detail: "Enterprise shipper requests FTL lane(s); contracted or spot rate agreed"
        - id: N2
