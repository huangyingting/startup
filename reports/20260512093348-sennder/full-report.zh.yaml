      - number: '3.5'
        title: sennder 的竞争位置与差异化
        blocks:
          - type: paragraph
            body: >
              sennder 联合创始人 Julius Köhler 称，公司按收入已在欧洲 FTL 排名第 3（略高于 €1B），而该 FTL 子市场规模约 €130B，公司目标是冲到第
              1。这个位置主要靠买入并整合策略打造，涉及三层收购：同阶段数字创业公司（Everoad、Uber Freight Europe）、创始人经营的传统货代（Innroute、Cars&Cargo）以及大型传统 CHR
              European Surface Transportation 部门（2025 年 2 月完成）。仅 CHR 交易就新增约 700 名员工、6,500 个新客户和 15,000 个新承运商。sennder
              的核心护城河包括 40,000+ 辆经过审核的承运商卡车（形成双边市场网络效应）、自研 sennOS 平台自动化定价和调度、20+ 个欧盟国家地理覆盖，以及带 CO2 追踪的可持续性背书。关键竞争风险包括数字
              FTL 利润率薄、连续收购带来的整合复杂度、DSV-Schenker 规模逼近，以及整个数字类别可见的盈利压力。Forto 若被困境出售，既可能让 sennder
              变强（通过客户获取），也可能引入一个资源充足的新混合竞争者（若传统玩家收购 Forto）。
