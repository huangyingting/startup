      - number: '2.5'
        title: 监管环境与合规逆风
        blocks:
          - type: paragraph
            body: >
              2026 年欧洲公路货运监管格局，是 Mobility Package 之后影响最大的一轮。ETS2——把欧盟排放交易体系扩展至公路运输燃料——要求受监管实体自 2025 年 1 月 1
              日起持有温室气体许可并缴纳配额，2026 年相关 CO2 价格预计为每吨 EUR 55–65。这会抬高所有承运商柴油成本，并压缩缺乏碳追踪基础设施的运营商利润率。欧盟 Fit for 55 一揽子计划要求到
              2050 年运输部门温室气体排放较 1990 年降低 90%，现在就约束车队投资决策。欧盟 AI Act 将于 2026 年在物流领域全面生效，把路线优化、车队管理和货运匹配算法归类为高风险 AI
              应用，需接受风险评估、文档记录和人工监督。eFTI Regulation 要求货运信息通过认证数字平台交换，把纸质运输单据（CMR、运单）转为结构化、机器可读数据。2026 年 7 月 1 日起，3.5
              吨以下国际货运厢式车必须安装智能行车记录仪，把工时合规成本扩展至 LCV 细分。德国 2026 年 1 月将最低工资上调至每小时 EUR 13.90，仅德国就估计增加承运商劳动成本 EUR
              2.2B。奥地利、比利时、捷克共和国、法国、匈牙利、荷兰、波兰和罗马尼亚上调公路通行费，进一步增加运营成本压力。合在一起，这些监管变化把竞争优势推向原生嵌入合规数据的数字平台。
