      - number: '4.5'
        title: 资本充足性与融资依赖
        blocks:
          - type: paragraph
            body: >
              sennder 的融资年表（详见第 1 章——公司概览）止于 2024 年 6 月完成的 $160M Series E，投后估值 $1.3B，由 Lakestar 领投，Accel、HV
              Capital、Scania Growth Capital、Baillie Gifford 和 Insight Partners 参投。全部轮次累计融资约 $413M。

              CHR 收购以现金结算，价格未披露。考虑到 $160M Series E 于 2024 年 6 月完成，交易于 2024 年 7 月宣布、2025 年 2 月交割，该收购看起来由 Series E 所得和 /
              或既有经营现金流支持。CEO 在 2024 年 7 月表示 sennder 没有新一轮融资计划，暗示内部资金足够。

              资本充足性信号：（1）Series E 后未宣布裁员；（2）CHR 整合据称按计划推进（公司博客，2025 年 2
              月）；（3）收入翻倍轨迹说明经营可能产生正现金，或至少在运营层面自筹整合成本。不过，营运资金强度（<3 天向承运商付款）意味着必须谨慎管理经营现金流，或用信贷额度补充。

              尽调需要：Series E 交割时与 CHR 交易交割时的现金及等价物；循环信贷额度条款；债务权益比；月度现金消耗；以及 CHR 是否存在业绩对赌式延期付款或或有付款。
