  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              sennder
              的核心可服务市场是欧洲公路货运运输——通过卡车在欧盟及周边市场的起点和终点之间移动货物。范围包括整车（FTL）、零担（LTL）、冷藏货运、危险品运输和集装箱公路配送；不包括空运、海运、铁路多式联运和纯仓储服务。传统公路货运经纪商（人工调度员电话撮合货运）是直接现状替代品：它们掌握大部分交易量，却无法提供
              ETS2 和 eFTI 现在要求的实时可视化、碳追踪、自动开票和合规数据。相邻市场包括多式联运货代（公路是其中一段）和末端包裹配送（颗粒度太细，不符合 sennder 的 FTL
              聚焦）。数字货运经纪——由平台撮合并自动匹配货源——是 sennder 直接竞争的子赛道。按吨位计，公路占欧盟内陆货运总量的 80% 以上，是按量计占主导的运输方式。IBISWorld 口径下欧盟市场有 100
              多万个商业参与者、约 600 万行业员工，说明其经济重要性。
            claimRefs:
              - CM001
