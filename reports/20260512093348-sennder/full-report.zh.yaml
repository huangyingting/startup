      - number: '3.2'
        title: 数字原生 FTL 挑战者
        blocks:
          - type: paragraph
            body: >
              Forto（前身 FreightHub）2016 年成立于柏林，是 sennder 最接近的数字原生竞争对手。Forto 在 $2.1B 估值下融资 $540–615M（2022 年 Series E，由
              SoftBank Vision Fund 2 领投），2025 年 ARR 估计为 $269–366M，约比 sennder 的 €1.1B+ 收入低 3–4 倍。Forto
              覆盖海运、空运、公路和铁路，并提供清关和履约——这种多式联运模式相较 sennder 的 FTL 聚焦，扩大了可服务市场。Forto 约有 500–800 名员工、2,000–2,500
              个客户，已开始承受盈利压力，2025 年传出潜在出售流程。InstaFreight 是一家总部位于柏林的 AI 驱动 FTL 市场，管理过 100 万+ 次运输、服务 2,000+ 客户，但在投资人撤资后于
              2023 年 12 月申请破产——这一事件说明未达到关键规模的数字 FTL 平台资本强度风险。其技术继续以 cargomotion 品牌运营。Cargonexx 运营 AI 驱动货运市场，连接 100,000+
              辆卡车，并称可通过路线优化降低最高 20% 成本；但这些卡车只是市场连接车辆（非审核 / 独家），不同于 sennder 的托管承运商网络。法国平台 Fretlink
              聚焦区域公路货运，并以联合国背书的可持续性做差异化。
