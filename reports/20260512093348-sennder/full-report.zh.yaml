      - number: '1.5'
        title: 公司里程碑与并购历史
        blocks:
          - type: paragraph
            body: >
              sennder 成立以来，增长轨迹由一系列转折性里程碑推动。2015–2016 年，公司先从末端电商配送转向整车货运，再靠线下招募和早期技术开发快速搭建承运商网络。战略并购一直是核心增长杠杆，至 2024
              年已完成六笔收购：Everoad（法国数字货代，2020 年）扩展了法国业务；Uber Freight Europe（全股票交易，2020 年 9 月）带来货主基础和阿姆斯特丹办公室；Cars &
              Cargo（荷兰货代，2021 年 5 月）增加比荷卢运力；Innroute（西班牙竞争对手）延伸伊比利亚覆盖。最重要的交易是 C.H. Robinson European Surface
              Transportation 收购，2024 年 7 月 30 日宣布、2025 年 2 月 1 日交割，按员工数量和收入影响看都是公司史上最大交易。主要负面事件包括 2022–2023
              年货运市场下行，压制收入增长，并迫使公司在 2022 年 12 月完成一轮较低的过桥融资。所有收购中，公司始终维持「数字优先」身份，把被收购公司整合进 sennder
              品牌和操作系统。投资人退出和二级交易尚未公开披露。
