      - number: '1.2'
        title: 创始人与领导团队
        blocks:
          - type: paragraph
            body: >
              sennder 由 David Nothacker、Julius Köhler 和 Nicolaus Schefenacker 于 2015 年 7 月共同创立，三人通过学习和职业网络相识。CEO David
              Nothacker 曾就读于 WHU – Otto Beisheim School of Management 和 INSEAD，并曾任职 Roland Berger Strategy
              Consultants，之后看准公路货运适合被数字化颠覆。联合创始人兼首席数字官 Julius Köhler 加入 sennder 前曾在 Rocket Internet 积累经验。联合创始人 Nicolaus
              Schefenacker 负责并购战略，组建团队系统性跟踪和推进收购目标。2024 年 C.H. Robinson 收购后，管理团队明显扩容：Susanne Schroeter-Crossan 于 2024 年
              4 月加入担任 CFO，带来 Zalando SE、HelloFresh SE 和 LEG Immobilien 的财务领导经验。Kollen Glynn 此前任 C.H. Robinson Core
              Software Engineering 副总裁，之后出任 CTO，为整合提供关键技术桥梁。David Vismans 从 Booking.com 加入担任 CPO。收购后来自 C.H. Robinson EST
              团队的高管层新成员包括 Chris Mills（COO）、Christoffer Haldemar（CCO）和 Arkadiusz
              Glinka（首席增长官）。领导团队的厚度同时体现创业公司的敏捷和大型企业运营能力，但联合创始人 David Nothacker 作为公开门面和核心战略声音，仍构成实质关键人依赖。
