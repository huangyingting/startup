            body: >
              sennder 面向欧洲整车（FTL）公路货运的大型企业货主。买方画像一贯是年物流支出可观的大型组织：€1M+ FTL 合同、20+
              个运营市场，以及更适合由托管、集成式货代层处理而非内部运输管理的复杂度。服务的关键垂直行业包括 CPG/FMCG（AB InBev、Beam Suntory、Nestlé）、邮政 / 包裹物流（Poste
              Italiane），以及汽车 / 制造（Scania 作为 JV 伙伴并被暗示为客户）。从地理看，sennder 的货主基础集中在德语区和西欧市场，意大利业务通过 Poste Italiane JV
              管理。中端市场货主可通过自助门户进入，但公司公开表述的商业焦点是企业合同运量。
