  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              sennder
              以轻资产货代运营，对货主承担合同承运人角色，再把执行分包给承运商网络中的卡车运输公司。收入是向货主收取的全包价；收入成本是支付给承运商的款项。两者价差——货运经纪毛利——构成核心经济单元。公司正在开发第二条
              SaaS 收入流（TMS / 承运商管理软件），作为面向既有承运商和货主的附加层；该收入流仍处早期，尚未在披露数据中形成实质贡献。sennder 几乎只聚焦欧洲整车（FTL）公路货运；LTL
              和托盘拼货尚未被公开宣布为当前产品。收入按每票运输在交付时确认（总额计费模式），符合 IFRS 15 下非资产型货代惯例。

              CHR 前 FY2024 收入由 Reuters（经 kelo.com）报道为约 €700M；2025 年 2 月交割的 CHR European Surface Transportation
              收购预计把合并收入带到约 €1.4B。Latka 数据库的第三方估算引用 $1.1B；考虑汇率以及 GMV 与净收入方法差异，这与 Reuters 数字大体一致。

              sennder 还通过增值服务赚取附属收入：实时追踪 API、面向货主 ESG 报告的排放监测数据，以及承运商融资 / 快速付款项目。上述业务均未公开披露贡献利润率。
