  - id: FU001
    title: sennder 货主客户旅程图
    type: journey-map
    layout: standard
    summary: |
      sennder 货主旅程的关键阶段，从初次发现到企业锁定和可持续运输追加销售，并标出每个节点的代表性客户细分。
    data:
      nodes:
        - id: discovery
          label: 发现与 RFQ
          detail: |
            企业货主发现 FTL 运力缺口，或背负降本任务；sennder 的销售主张聚焦保价、数字 TMS 和泛欧洲覆盖。主要目标：年 FTL 支出 ≥€1M 的货主。
        - id: onboarding
          label: TMS 集成与上线
          detail: |
            货主通过 TMS API 或 shipper portal 接入；订单摄取、GPS 跟踪和 ETA 供给上线。集成先形成初始转换成本。企业客户周期通常为数周到数月。
        - id: contract_ftl
          label: 合同 FTL 部署
          detail: |
            货主承诺在指定线路投放合同货量；sennder 保证价格和运力。AB InBev、Beam Suntory、Nestlé 都以合同 FTL 作为切入点。
        - id: green_upsell
          label: 绿色运输追加销售
          detail: >
            货主采用 HVO100（可再生柴油）和 / 或电动卡车来降低 Scope 3 排放。Nestlé 路径：合同 FTL（2021）→ HVO（2022）→ 电动卡车（2024）。2023 年，平台绿色需求同比增长
            6×。
        - id: control_tower
          label: 控制塔（100% FTL 托管）
          detail: |
            货主把 100% FTL 运营交给 sennder；获得完整货后分析、主动延误通知和 SLA 管理。该阶段转换成本最高；Poste Italiane JV 模式隐含这一形态。
        - id: jv_partnership
          label: JV / 战略伙伴关系
          detail: |
            最大的企业关系演进为合资公司（Poste Italiane：75%/25% 股权、10 年、€2.3B）或长期商业协议（Scania/JUNA）。这代表客户转为伙伴的最高形态，也带来最深锁定。
    claimRefs:
      - CU003
      - CU004
      - CU024
