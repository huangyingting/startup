      - number: '1.3'
        title: 融资历史与投资人基础
        blocks:
          - type: paragraph
            body: >
              sennder 成立以来已在 11 轮融资中募集超过 $413M，成为欧洲融资最充分的物流科技公司之一。公司早期轮次由战略投资人 Scania Growth Capital 和 HV Capital
              播种，二者既提供资金，也在承运商生态中提供行业信用。Series B（$29.7M，2019 年 4 月，Accel 领投）和 Series C（$70M，2019 年 7 月，Lakestar
              领投）支持公司在欧洲快速地理扩张。2021 年 1 月，转折性的 Series D（$160M，Accel 和 Lakestar 领投）之后，公司又在 2021 年 6 月完成延期轮（$80M，Baillie
              Gifford 加入），把 sennder 推至 $1B 估值的独角兽。2022 年 12 月 Series D 分批融资（$63.2M）和 2023 年 8 月 Scania Growth Capital
              轮帮助公司穿过货运市场下行期。最近一次资本事件是 2024 年 6 月由 Lakestar 领投的 $160M Series E，投后估值 $1.3B——较 2021 年达到的 $1B 独角兽标记溢价
              30%。既有投资人 Accel、HV Capital、Scania Growth Capital、Baillie Gifford 和 Insight Partners 均参与，释放出较强机构信心。累计约
              $413M 的融资，让 sennder 有更好条件承接 C.H. Robinson EST 的资本密集型整合和持续平台开发。Investec Morgan Stanley 担任 C.H. Robinson
              交易财务顾问。
