            body: >
              账户内扩张遵循「落地后扩张」路径：托运人关系通常从合同 FTL 开始，再扩展到即期货载、绿色运输叠加方案（HVO、电动卡车）和 Control Tower 全服务管理。Nestlé
              的路径就是样本：先做合同货载，再扩到 HVO 绿色运输，之后通过 JUNA/Scania JV 上电动卡车。集中度风险实质存在：Poste Italiane JV 预计十年贡献 €2.3B（约
