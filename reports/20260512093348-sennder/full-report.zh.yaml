  - id: FR001
    title: 风险热力图 — sennder 风险登记表：发生概率与影响
    type: matrix
    layout: wide
    summary: |
      风险热力图按发生概率（x 轴列）和影响（y 轴行）映射已识别风险，单元格数值标明风险类别和严重度层级。
    data:
      columns:
        - id: low_likelihood
          label: 低概率
        - id: med_likelihood
          label: 中概率
        - id: high_likelihood
          label: 高概率
      rows:
        - id: high_impact
          label: 高影响
          values:
            - GDPR / 网络安全泄露；平台宕机；Scania JUNA 失败
            - CHR 集成超支；针对 TMS 的网络攻击；现货市场崩盘
            - Poste Italiane JV 终止；EU ETS 2027 挤压利润率；司机短缺危机
        - id: med_impact
          label: 中影响
          values:
            - 关键人物（Nothacker）离职；eFTI 合规缺口
            - 智能行驶记录仪改装导致承运商池收缩；承运商质量失效
            - EU Mobility Package 运营约束；德国通行费转嫁失败
        - id: low_impact
          label: 低影响
          values:
            - CHR 反垄断救济（交易已完成）；多式联运替代竞争
            - 地缘政治走廊中断（乌克兰过境）
            - 竞争对手平台复制；IP 挑战
