              自合作启动以来，货量连续实现同比两位数增长。Black Friday 2023 高峰周，整车货量最高比平均水平高 65%，说明托运人需求明显集中在季节性事件。2023 年，宏观逆风拖累即期市场同比下滑 47%；但
