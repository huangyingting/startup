      - number: '4.4'
        title: 公开牵引力与私有指标缺口
        blocks:
          - type: paragraph
            body: |
              sennder 是私营 GmbH，即便其收入规模已达到披露门槛暗示的大型公司水平，公开牵引力指标仍有限。可观察指标包括：
              收入：FY2024 约 €700M（CHR 前，Reuters 来源报道）；CHR 后预计约 €1.4B（公司提供给 Reuters）。第三方数据库估算：$1.1B（Latka）。
              运量：CEO 曾表示 2021 年目标为 100 万+ 车次；之后未披露运量。CHR 后，合并欧洲网络隐含 40,000+ 辆卡车，并覆盖 20+ 个国家运力。
              员工：Tracxn 和公司相邻来源显示 2024 年约 929 人；CHR 整合后约 1,600 人。
              每员工收入：约 €753K（FY2024，CHR 前）；若协同兑现，CHR 后改善至约 €875K——可比中端数字货运平台，高于传统货代。
              承运商网络：40,000+ 辆卡车（公司发布）。货主数量：未披露。
              缺失的私有指标：毛利率、EBITDA、净利润、现金头寸、烧钱速度、流失率、CAC、LTV、ARR（SaaS 层）、NRR 和承运商利用率均未公开。CHR 收购价格未披露。
