      - number: '3.3'
        title: 平台与市场型玩家
        blocks:
          - type: paragraph
            body: >
              Transporeon 和 TimoCom 处在不同竞争位置：它们是中立数字基础设施层，连接货主和承运商，但不担任货运代理。Transporeon 于 2023 年 4 月被 Trimble（NASDAQ:
              TRMB）收购。该平台每年处理超过 €55B 货运，连接 150,000+ 承运商、1,400+ 货主和零售商，覆盖 27 个国家，并支撑 110,000+ 次每日运输执行。Transporeon
              通过赋能货主自行管理承运商关系，间接与 sennder 竞争——这会缩小原本可能外包给货代的可服务客户基础。其 SaaS 模式（码头 / 堆场管理、采购、ERP 集成）提供了 sennder
              目前缺少的能力，尤其是货主侧深度工作流集成。TimoCom 是德国 B2B 货运交易所，1997 年成立，拥有 55,000–58,000 家已验证公司和 156,000 名总市场用户，每天最多 100
              万条货运报价。其 $84–158M 估算收入和订阅模式，让它更像服务中小经纪商和承运商的基础设施，而不是 sennder 的直接企业货代竞争者。
