            body: >
              sennder 平台拆成多个清晰服务线。Shipper Portal 提供预订（合同、现货或包车）、带动态 ETA 和主动延误通知的实时 GPS 追踪、仓库时段优化、SLA 合规监控，以及 TMS/ERP API
              连接。Carrier Portal 提供合同货运入口以稳定收入、现货货运竞价以灵活利用运力，以及包车安排。数字发票保理可在 15 分钟内向承运商付款。Green Business
              层新增两条脱碳垂直：高级生物燃料（HVO）方案最多减少 90% CO₂，以及 eMobility 服务（与 Scania 的 JUNA JV），提供电动重卡，最多实现 100% CO₂ 减排。RoadPulse
              是基于 sennder 自有货运数据的月度市场报告，作为面向货主和行业分析师的数据产品。面向第三方物流提供商授权 sennOS 的 SaaS 模式已经宣布，但仍处早期。
