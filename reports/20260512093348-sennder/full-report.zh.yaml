    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              sennder Technologies GmbH 是一家总部位于柏林的数字化公路货代，通过自研技术平台，把企业货主与中小型卡车运输公司连接起来。公司 2015 年 7
              月成立，靠数字化货运匹配、定价、实时追踪和开票，重塑传统货运经纪模式。sennder 只做欧洲整车（FTL）公路货运，这是一个年规模超过 €400B 的市场。其平台 sennOS
              自动化承运商准入、路线优化和付款——把承运商平均收款周期从行业常见的 45–60 天压到 3 天以内。公司在欧洲部署 40,000 多辆卡车，可调用超过 120,000 辆车，每年完成超过 100 万票 FTL
              运输。sennder 的愿景是「fast forward road
              logistics」，打造高效、透明、可持续的公路货运网络。货主获得实时可视化和成本控制；承运商获得企业级货源和更快回款。公司以货代身份赚取收入，在货运经纪交易中抽取利润，而不是持有实体资产。其竞争差异来自数据网络效应——平台上的货源和承运商越多，匹配算法表现越好，空驶里程越低，定价效率越高。
