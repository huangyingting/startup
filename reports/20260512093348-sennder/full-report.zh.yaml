  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              sennder 在欧洲公路货运市场面对三类不同竞争者。第一类是数字原生 FTL 平台——有风投资本支持的创业公司，用技术自动化整车运输的货源匹配、承运商选择和价格发现。第二类是成熟数字市场和 SaaS 平台，如
              Transporeon（Trimble）和 TimoCom，它们提供采购和执行基础设施，但不拥有货运关系。第三类是传统大型货代——DB Schenker、DHL Freight、Kuehne+Nagel 和
              DSV——它们拥有庞大承运商网络、全球销售队伍和长期客户关系，但历史上在自动化上落后于专门打造的平台。竞争强度因细分而异：数字挑战者拼价格透明和技术；SaaS
              平台争夺货主工作流集成；传统玩家靠可靠性和服务广度竞争。sennder 的主战场是数字原生 FTL，其中 Forto 是最直接同业，其后是更小平台和已破产的 InstaFreight（更名为
              cargomotion）。
