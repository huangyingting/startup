      - number: '3.4'
        title: 传统货代在位者
        blocks:
          - type: paragraph
            body: >
              传统在位者在规模上远超数字原生玩家，但较少在价格透明和自动化上竞争。DB Schenker 2024 年收入 €19.2B（EBIT €1.1B），正被 DSV 收购；该交易将打造全球最大物流公司，合并收入超过
              €30B。DHL Freight 隶属 Deutsche Post DHL Group（2024 年上半年收入 €40.9B），在欧洲公路货运保持前三地位。Kuehne+Nagel 2024 年净销售额 CHF
              24.8B，陆运 EBIT 达到创纪录的 CHF 227M，并在 Gartner 3PL/4PL Magic Quadrant
              中被认可为领导者。这些在位者提供全球多式联运覆盖、清关、仓储和长期合同可靠性，sennder 在企业关系层面尚未达到这一水平。不过，它们依赖人工流程、遗留 IT 栈和不透明定价，使数字原生平台在 FTL
              细分的货主价格透明和单票效率上拥有结构性优势。DSV-Schenker 合并加大所有中型欧洲货代的竞争压力，但大型传统玩家过去侵蚀数字 FTL 平台效率优势的速度一直较慢。
