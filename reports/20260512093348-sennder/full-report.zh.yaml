      - number: '2.3'
        title: 买方与分层结构
        blocks:
          - type: paragraph
            body: >
              欧洲公路货运需求由三个货主垂直行业支撑。零售和电商约占公路货运量的 38%，由补货周期、准时交付和电商激增推动（欧洲电商规模超过 USD 600B）。食品饮料约占需求的
              30–35%，受温控配送链、新鲜产品周转速度和日益严格的食品安全文件要求推动。汽车占 10–20%，依赖从中东欧制造枢纽到西欧 OEM 工厂的精准 JIT
              零部件排序；波兰—德国、捷克共和国—意大利是欧洲最高频走廊之一。建筑和工业制造合计再占 5–10%，医药与医疗物流占
              5–8%，并要求最高的合规和冷链标准。每个垂直行业里，预算负责人通常是中大型企业货主的采购总监或供应链副总裁，日常用户是物流运营负责人。数字化采用触发点因行业而异：零售看运量增长和补货速度；食品饮料看冷链合规和新鲜度
              SLA；汽车看 JIT 排序可追溯性。
