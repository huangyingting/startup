      - number: '1.4'
        title: 规模、收入与地理覆盖
        blocks:
          - type: paragraph
            body: >
              收购 C.H. Robinson EST 前，sennder 报告 2024 年收入约 $1.1B，员工约 929 人。该收购于 2025 年 2 月 1 日交割，新增约 700 名员工，并预计把收入大致翻倍至约
              €1.4B（$1.5B），使合并后公司进入欧洲前五大 FTL 提供商之列。公司目前在 20 多个欧洲市场、20+
              个实体地点运营，从最初德国市场向外扩张。关键办公室包括柏林（总部）、阿姆斯特丹、巴塞罗那、布加勒斯特、马德里、米兰、巴黎、里加、鹿特丹和弗罗茨瓦夫。通过 C.H. Robinson
              收购新增的国家包括英国和土耳其。合并实体约 1,600 名员工，员工来自 73 个以上国籍。sennder 运营超过 40,000 辆经过审核的卡车，并可在欧洲大陆调用 250,000+ 辆车辆。公司 2024
              年完成超过 100 万票 FTL 运输。规模带来关键网络密度优势：横跨多地的更广承运商基础降低空驶率，也改善价格发现。客户基础分散在欧洲汽车、FMCG、食品饮料、时尚、零售和工业制造等行业，缓解了收入集中风险。
