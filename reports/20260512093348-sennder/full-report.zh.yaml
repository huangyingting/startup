appendices:
  - id: A
    title: 入场条件与监控框架
    blocks:
      - type: callout
        calloutType: recommendation
        title: 观察 — 备考收入 <2.5x 时有条件入场（约 €3.5B EV）
        body: >
          建议保持观察，只有三项条件同时满足才入场：（1）交割后 6 个月复盘（2025 年下半年）确认 CHR 整合里程碑，货量和服务连续性按计划推进；（2）季度管理账显示，入场后 12 个月内 EBITDA
          走势转正；（3）入场估值低于 2.5x 备考收入（收入 €1.4B 时约 €3.5B EV）。乐观退出估值为 €4.0–4.8B EV（2.5–3.0x 收入），持有 5 年可实现 1.3–1.6x MOIC。悲观情景为
          €1.8–2.5B EV，只能实现 0.6–0.8x MOIC —— 资本受损。
        claimRefs:
          - CV001
          - CV005
          - CV006
          - CV015
      - type: list
        title: 入场后监控 KPI
        items:
          - CHR 整合健康度：交割后 6 个月和 12 个月，CHR 原有线路月度货量对比收购前基线
          - Poste Italiane 合资公司收入：月度收入对比 €23M/月收入运行率目标；关注重谈信号
          - Control Tower 边际贡献：季度管理账；12 个月内必须转正
          - 承运商接单率：合同线路低于 70% 即提示运营承压
          - 行业倍数基准：Forto 出售与 Flexport 老股交易；压缩到 1.5x 以下即触发悲观情景修订
          - EBITDA 走势：季度管理账；现金跑道对比计划
        claimRefs:
          - CV020
          - CV022
          - CV025
