      - number: '4.2'
        title: GTM 策略与销售效率
        blocks:
          - type: paragraph
            body: >
              sennder 采用咨询式企业 B2B
              销售模式，目标是大型货主（制造商、零售商、消费品公司），它们在多个欧洲国家有复杂、高运量公路货运需求。典型销售周期持续数月，原因是尽调要求、采购流程，以及多线路、定制定价主货运协议的合同谈判。

              客户获取主要靠直销企业销售团队，并由区域客户经理支持。公司不运营自助式或交易型市场；现货货源入口存在，但战略账户主导收入。公开资料未披露 CAC、CAC 回收期或销售人员数量。

              CEO 在 2021 年提到过逐年收入翻倍目标，这意味着先落地再扩张模式：既有账户中的新地理区域和新服务线路贡献净收入留存。CHR 收购带来一个已建立的大型企业客户基础和既有合约线路，等于买入
              NRR，并降低欧洲覆盖扩张的 CAC。

              外部可观察的关键销售效率代理指标：CHR 前每 FTE 收入约 €750,000（2024 年 €700M 收入 / 约 929 名员工）；高于典型非科技货代，但低于纯 SaaS 基准。CHR 后（约 1,600
              名 FTE、预计 €1.4B），若协同兑现，该比率接近 €875,000/FTE，说明人均生产率有温和但有意义的提升。
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
