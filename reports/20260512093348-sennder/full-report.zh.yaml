  - id: FR002
    title: 风险传导图 — 主要风险如何流向财务结果
    type: dag
    layout: standard
    summary: |
      有向无环图展示主要运营、监管和伙伴风险如何传导到收入、利润率、融资和估值。
    data:
      nodes:
        - id: driver_shortage
          label: 司机短缺
          detail: 426K+ 个岗位空缺；预计到 2026 年空缺率达 60%
        - id: eu_ets
          label: EU ETS 2027
          detail: 公路柴油碳价；估算运输成本增加 5–15%
        - id: poste_conc
          label: Poste Italiane 集中度
          detail: 约占备考收入 ~16–20%；10 年 JV 期限
        - id: chr_integration
          label: CHR 集成风险
          detail: 1,700 名员工、12 个司法辖区；2024 年 Q4 交割
        - id: carrier_costs
          label: 承运商成本上升
          detail: 工资、燃油、通行费、行驶记录仪改装成本走高
        - id: carrier_pool
          label: 承运商池缩小
          detail: 不合规承运商退出；运力受限
        - id: margin_compression
          label: 利润率承压
          detail: 成本若未完全转嫁，毛利率下降
        - id: revenue_risk
          label: 收入风险
          detail: 现货下滑、Poste 终止、CHR 流失
        - id: financing_risk
          label: 融资 / 现金跑道风险
          detail: 尚未盈利；集成资本开支高
        - id: valuation_impact
          label: 估值影响
          detail: 利润率收缩和收入不确定性压低倍数
