      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              公路货运运力需求获得电商扩张、中东欧制造整合和供应链从亚洲转向近岸外包趋势的结构性支撑。到 2025 年，欧洲物流行业在技术数字化上投资超过 USD
              10B，显示平台采用动能强劲。数字货运匹配平台已占欧盟公路货运交易的 35% 以上，实时可视化正成为企业货主的默认要求。不过，结构性约束同样显著。长期司机短缺约 400,000 张 HGV
              许可证，集中在德国、法国、意大利、波兰和西班牙，这限制可用运力，并在需求疲弱期支撑底价。当前欧盟卡车司机中超过 45% 年龄在 50 岁及以上，形成中期替换危机。2026
              年八个欧盟国家上调公路通行费，进一步加重承运商成本压力。EU Mobility Package
              要求东欧承运商返回基地，移除了西部走廊的半永久运力，收紧关键线路的现货可得性。数字平台采用还受到长尾分散中小承运商阻力，它们缺乏技术素养和 API 连接能力。sennder
              的承运商准入自动化和快速付款模式，正面处理这些结构性摩擦点。
