      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              不同测算口径会给出差异很大的绝对值，关键在于范围。Verified Market Research 将纯欧盟公路货运市场定为 2024 年 USD 412B，并以 3% CAGR 增长至 2032 年 USD
              521.9B。IBISWorld 更宽的行业定义把所有货运公路运输服务纳入，2025 年规模达到 €554.8B（约 USD 600B）。Market Data Forecast
              口径更宽，包含所有基于公路的物流服务，2025 年达到 USD 814.4B。Seagate Logistics 引用 Ti Insight 数据，预计欧洲公路货运到 2026 年达到 €431.4B——2021
              至 2026 年实际 CAGR 为 3%，较 2019 年实际增长 23.1%。整个欧洲货运与物流行业涵盖所有运输方式和 3PL 服务，2025 年估算为 USD 1.48T，并预计到 2030 年以 3.31%
              CAGR 增至 USD 1.74T。数字货运经纪——sennder 的竞争赛道——2024 年欧洲规模为 USD 2.15B（Cognitive Market Research），其中德国单一市场占 USD
              425M。GM Insights 估算全球数字货运经纪市场 2026 年为 USD 5.2B，到 2035 年增至 USD 8.6B，CAGR 仅 5.8%，反映其口径差异和更保守方法。sennder
              的可服务可得市场聚焦 20+ 个欧洲国家的 FTL 走廊，基于按运量加权的走廊数据，估计在 USD 10–20B 区间。
