      - number: '4.6'
        title: 财务结论
        blocks:
          - type: paragraph
            body: >
              收入质量中等：FY2024（CHR 前）€700M 真实、增长，并由多个独立估算佐证；但该收入是总额计费，真正捕获的经济利润率未披露，且 FTL 数字经纪几乎肯定在 10–15% 区间，意味着在大量 opex
              前毛利约 €70–105M。按 $1.3B Series E 估值，投资人支付的收入倍数约为 1.8–3.7×（基于总额计费），符合高增长物流平台，而非 SaaS
              公司。这意味着投资逻辑必须依赖三者之一：（a）通过软件层增长把利润率拉到 SaaS 水平；（b）继续扩大收入以支撑公开市场可比估值；或（c）通过并购推动市场份额整合，直到形成定价权。

              利润率路径：不确定。行业毛利率基准显示，如果没有有意义的 SaaS / 平台贡献，短期上行空间有限。即便利润率稳定，营运资金强度也会约束自由现金流。

              资本强度：中高。<3 天承运商付款周期需要永久性营运资金融资，并随收入线性扩大。在 €1.4B 收入下，隐含月度营运资金缺口约为 €100M+。

              尽调阻塞项：缺少（1）毛利率，（2）EBITDA，（3）现金头寸，（4）烧钱速度，（5）CHR 收购价格和整合成本。这些是投资承销的标准项目，无法用公开来源以可接受置信度估算。
            claimRefs:
              - CI029
              - CI030
              - CI031
              - CI032
              - CI033
  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台概览与客户工作流
        blocks:
          - type: paragraph
            body: >
              sennder 构建并运营 sennOS，这是一个自研端到端运输管理系统，覆盖从订舱、调度、实时 GPS
              追踪到数字开票的完整运输生命周期。平台服务两类主要用户：预订整车（FTL）运力的企业货主，以及寻找并执行货源的中小承运商。货主通过自助门户预订合同、现货和包车货运，查看实时运输可视化并管理
              SLA；承运商获取货源匹配、付款和运营数据。平台通过 REST API 直接接入企业货主 TMS/ERP 系统。sennder 每月在 20+ 个欧洲市场处理 50,000+ 票货运，由 40,000+
              家经审核承运商和 250,000+ 辆车支撑。Apple App Store 和 Google Play 上的移动应用，把入口延伸给承运商司机和调度员。
