  - id: TV005
    title: 投资逻辑破裂与否决触发表
    layout: standard
    notes: |
      投资逻辑破裂事件需要投委会立即复核。监测触发项是应按季度跟踪的领先指标。它们是在第 7 章风险登记表（TR005）之外的增量项。
    columns:
      - 触发事件
      - 领先指标
      - 影响
      - 复核时间线
    rows:
      - - Poste Italiane 合资公司重新谈判或终止
        - Poste Italiane 新闻稿；意大利监管机构审查邮政运营商合资公司
        - 收入减少约 €230M/年；若 18 个月内无法替代，则打破投资逻辑
        - 立即 — 任何消息出现后 48 小时内
      - - CHR 整合成本超支或收入流失 >10%
        - 收购后整合预算偏差 >25%，或 CHR 客户流失 >10%
        - 将估值重设至悲观情景；重新审视进入价格上限
        - 6 个月和 12 个月整合里程碑复核
      - - 行业倍数压缩至 1.5x 以下
        - Forto 以低于 $1B 完成困境出售；Flexport 老股市场 <1.0x
        - 将基准情景 EV 下调至悲观区间；推迟进入，直到盈利能力得到证明
        - 按季度 — 监测 Forto 出售进程和 Flexport 老股交易
      - - sennder 以 <€2B EV 融资
        - 新披露融资轮或老股交易，隐含估值 <€2B
        - 下轮估值下调信号；高于该水平进入会立即产生按市值计价损失
        - 立即 — 监测 EU-Startups、Sifted 和公司公告
      - - 导致罚款 >€5M 的 GDPR/NIS2 执法行动
        - DPA 调查通知或公开泄露披露
        - 流动性风险；关键货主复核企业合同；合规成本
        - 立即 — 监测德国和 EU 数据保护机构公告
      - - EBITDA 盈亏平衡较既定目标延误 >12 个月
        - 若无新股本，现金跑道 <18 个月；未给出公开盈亏平衡承诺
        - 融资需求；稀释；投资逻辑承压
        - 每年 — 在数据室跟踪；索取季度管理账
    claimRefs:
      - CV015
      - CV016
