      - number: '4.3'
        title: 成本结构与毛利驱动
        blocks:
          - type: paragraph
            body: >
              作为轻资产数字货代，sennder 最大成本项是承运商付款（收入成本），估计占总额计费的 80–90%。FTL 公路货运数字经纪的行业基准显示毛利率为 10–25%，纯数字 FTL
              平台因承运商定价近似商品化、增值差异有限，处在较低端（10–15%）。传统全服务货代通过货运拼载、清关和多式联运服务实现 15–25% 毛利率，而这些并不在 sennder 核心 FTL 模式中。

              sennder 的营运资金周期结构性昂贵：公司在三个工作日内向承运商付款（吸引承运商的竞争工具），而行业常态是 45–60 天。在 €700M 收入、约 85%
              收入三天内付给承运商的情况下，隐含应付账款浮存融资需求约为每月 €58M，需要循环信贷额度或大量运营现金储备。

              运营费用主要由三部分构成：（1）技术和产品开发（截至 2021 年，sennder 维持 200
              人技术团队，是欧洲物流领域最大团队之一）；（2）销售和客户管理人员；（3）面向承运商侧的客户管理，以保障网络质量和合规。由于 sennder 不拥有卡车，资本开支较低。公司未公开披露
              EBITDA、经营现金流或净利率数据。
