    severity: high
    relatedQuestionRefs:
      - QV005
      - QV015
  - id: EGV003
    topic: EBITDA, gross margin, and contribution margin by account type
    description: >
      No profitability metric has been publicly disclosed by sennder. Contribution margin per load for Control Tower vs.
      spot accounts is the primary investment thesis validator. This data is available only via data-room access to
      management accounts. The German Bundesanzeiger HRB 179571 filing discloses only total revenue and balance sheet —
      not segment or per-load unit economics.
    severity: high
    relatedQuestionRefs:
      - QV004
      - QV007
      - QV010
  - id: EGV004
    topic: Capital structure and liquidation preference stack
    description: >
      sennder's full cap table, per-round liquidation preferences, and any venture debt or convertible instruments have
      not been publicly disclosed. The return waterfall for new investors is unquantifiable without this data.
    severity: medium
    relatedQuestionRefs:
