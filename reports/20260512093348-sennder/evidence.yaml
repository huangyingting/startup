    description: >
      sennder has not publicly disclosed any security certifications (ISO 27001, SOC 2 Type II, or equivalent).
      Enterprise buyers typically require such certifications before onboarding logistics platforms with access to
      supply-chain data. This gap warrants direct inquiry in due diligence.
