    topic: Adverse evidence for sennder customer churn or complaints
    description: >
      No public complaints, churn events, or adverse reviews from sennder enterprise shippers were found through May
      2026. Trustpilot, G2, and Capterra profiles for sennder are either absent or inaccessible. Absence of negative
      evidence does not confirm absence of churn.
    severity: medium
    relatedQuestionRefs:
      - QU013
      - QU023
  - id: EGU007
    topic: Average annual contract value per enterprise shipper
    description: >
      sennder has not disclosed the average annual contract value (ACV) per enterprise shipper account. The CEO
      confirmed contracts start at €1M+/year but no distribution, median, or average ACV has been published. This is a
      key input for estimating customer lifetime value.
    severity: medium
    relatedQuestionRefs:
      - QU017
  - id: EGU008
    topic: Geographic distribution of enterprise shipper base
    description: >
      sennder has not disclosed the country or regional breakdown of its enterprise shipper base. German and Italian
      market concentration is implied by the CEO's comments and the Poste Italiane JV, but no data on France, Spain,
      Poland, or other markets is publicly available.
    severity: low
    relatedQuestionRefs:
      - QU019
  - id: EGU009
    topic: Green transport adoption rate among shippers (HVO/EV fraction)
    description: >
      sennder reports that green transport demand grew 6× YoY in 2023 but does not disclose what fraction of total loads
      or total shipper accounts use green transport options. The penetration rate and upsell conversion rate from
      standard FTL to green overlay is unknown.
    severity: low
    relatedQuestionRefs:
      - QU026
  - id: EGU005
    topic: Competitor customer base comparison
    description: >
      No reliable public data allows direct comparison of sennder's enterprise shipper density versus Forto,
      InstaFreight, or Cargonexx. InstaFreight's 2024 bankruptcy and Forto's funding struggles reduce directly
      comparable peers.
    severity: low
    relatedQuestionRefs:
      - QU014
      - QU028
  - id: EGR001
    topic: Platform uptime SLA and disaster recovery architecture
    description: >
      sennder does not publicly disclose uptime SLAs, cloud provider identity, multi-region redundancy architecture, or
      disaster recovery plans. Enterprise shippers depend on the platform for GPS tracking and ETA provision; an outage
      SLA gap is a material open risk.
    severity: high
    relatedQuestionRefs:
      - QR010
      - QR013
  - id: EGR002
    topic: NIS2 Directive compliance and ISO 27001 certification status
    description: >
      sennder has not disclosed whether it holds ISO 27001 certification or has assessed its obligations under the NIS2
      Directive (effective October 2024), which extends cybersecurity requirements to transport infrastructure
      operators.
    severity: high
    relatedQuestionRefs:
      - QR008
  - id: EGR003
    topic: Profitability timeline and cash runway
    description: >
      No EBITDA margin, net income, or cash runway figure has been publicly disclosed by sennder. Pre-profitability
      exposure is a key investment risk; the timeline to breakeven and capital requirements post-CHR integration are
      unknown.
    severity: high
    relatedQuestionRefs:
      - QR015
      - QR016
  - id: EGR004
    topic: Poste Italiane JV break-clause and termination conditions
    description: >
      The 10-year JV extension signed July 2023 does not disclose break-clause terms, minimum revenue guarantees, or
      conditions under which Poste Italiane can exit. These terms are critical to assessing the durability of the
      concentration risk.
    severity: high
    relatedQuestionRefs:
      - QR011
  - id: EGR005
    topic: CHR integration cost budget and milestone plan
    description: >
      No public integration budget, milestone plan, or post-close progress update has been disclosed for the CHR
      acquisition. The integration spans 12 jurisdictions and 1,700 employees; cost overrun risk is unquantifiable
      without data-room access.
    severity: medium
    relatedQuestionRefs:
