      - QV017
  - id: EGV005
    topic: Poste Italiane JV break-clause and exit conditions
    description: >
      The 10-year JV extension (€2.3B commercial value) does not publicly disclose break-clause conditions, minimum
      revenue guarantees, or Italian regulatory approval status. These terms are material to the revenue floor thesis.
    severity: high
    relatedQuestionRefs:
