  - id: EGR006
    topic: TR001 regulatory risk register — completeness of enforcement record
    description: >
      The regulatory / legal risk register (TR001) is based on public sources and may not capture all active regulatory
      or licensing proceedings. No German or EU authority enforcement record for sennder was found in public databases;
      data room review of regulatory correspondence and licensing filings is required for exhaustive coverage.
    severity: medium
    relatedTableRefs:
      - TR001
    relatedQuestionRefs:
      - QR005
      - QR026
  - id: EGV001
    topic: sennder Series E post-money valuation — not publicly disclosed
    description: >
      The Series E round (€160M raised, June 2024) has not been accompanied by any valuation disclosure. No term sheet,
      regulatory filing, or investor statement reveals the post-money implied enterprise value. Entry pricing is
      therefore fully dependent on data-room access to cap table and shareholder documentation.
    severity: high
    relatedQuestionRefs:
      - QV001
      - QV002
  - id: EGV002
    topic: CHR acquisition price and integration cost budget
    description: >
      The consideration paid for C.H. Robinson's European Surface Transportation business has not been publicly
      disclosed. Integration cost budget, milestone plan, and Q1 2025 actuals vs. plan are required to assess execution
