  - id: EGV006
    topic: TV004 comparable valuation table — private company data completeness
    description: >
      The comparable valuation table (TV004) is based on last publicly disclosed round valuations for private companies
      (Forto, Flexport) and publicly reported M&A prices (Transporeon). Private company current marks may differ
      materially from last round values. No real-time secondary market data or current fund mark was available for any
      digital freight peer. The table is partial and may not reflect current sector sentiment accurately.
    severity: medium
    relatedTableRefs:
      - TV004
    relatedQuestionRefs:
