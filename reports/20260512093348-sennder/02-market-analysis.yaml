- id: market-sizing
  title: Market Sizing — TAM, SAM, and SOM
  body: 'Multiple sizing lenses produce materially different absolute values depending on scope. Verified Market Research
    pegs the pure EU road freight market at USD 412 billion in 2024, growing to USD 521.9 billion by 2032 at 3% CAGR. IBISWorld''s
    broader industry definition reaches €554.8 billion (~USD 600 billion) in 2025 for all freight road transport services.
    Market Data Forecast''s even wider definition, which includes all road-based logistics services, lands at USD 814.4 billion
    in 2025. Seagate Logistics, citing Ti Insight data, projects European road freight at €431.4 billion by 2026 — a 3% real
    CAGR from 2021 to 2026 and 23.1% growth in real terms since 2019. The European freight and logistics sector overall, encompassing
    all modes and 3PL services, is estimated at USD 1.48 trillion in 2025 and projected to reach USD 1.74 trillion by 2030
    at a 3.31% CAGR. Digital freight brokerage — sennder''s competitive segment — is sized at USD 2.15 billion in Europe in
    2024 (Cognitive Market Research), with Germany alone accounting for USD 425 million. GM Insights sizes the global digital
    freight brokerage market at USD 5.2 billion in 2026, growing to USD 8.6 billion by 2035 at a much lower 5.8% CAGR, reflecting
    scope differences and more conservative methodology. sennder''s serviceable addressable market, focused on FTL corridors
    across 20+ European countries, is estimated in the USD 10–20 billion range based on volume-weighted corridor data.

    '
