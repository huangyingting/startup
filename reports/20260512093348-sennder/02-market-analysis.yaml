    - SM008
    confidence: medium
    freshness: current
  - id: CM027
    statement: 'The automotive sector contributes approximately 10–20% of EU road freight demand, concentrated on CEE-to-Western-Europe
      component corridors linking Bratislava, Gyor, Ostrava, and Wrocław to OEM plants in Germany, France, and Italy. Automotive
      plants can receive up to 15 daily truck shipments from CEE suppliers in JIT operations.

      '
    type: third-party-reported
