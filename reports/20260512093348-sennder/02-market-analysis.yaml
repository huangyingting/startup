  - id: CM013
    statement: 'ETS2 — the EU Emissions Trading System extended to road transport fuels — requires regulated entities (fuel
      distributors for road and building use) to hold greenhouse gas permits and surrender allowances from 1 January 2025,
      as established by EU Directive 2023/959. This directly affects fuel pricing for all European road freight carriers.

      '
    type: observed
    topic: regulation
    sourceRefs:
    - SM010
    - SM016
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QM007
  - id: CM014
    statement: 'ETS2 CO2 pricing for road transport fuels is projected at EUR 55–65 per ton in 2026, materially increasing
      diesel costs for freight operators. The Netherlands will additionally introduce a separate CO2 toll system, and Germany''s
      CO2-based truck toll has been extended and differentiated with new emission classes under EU Directive requirements.

      '
    type: third-party-reported
    topic: regulation
    sourceRefs:
    - SM006
    - SM005
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QM008
  - id: CM015
    statement: 'The EU Fit for 55 package mandates a 90% reduction in transport sector greenhouse gas emissions by 2050 versus
      1990 levels, as adopted by the EU Council. Individual policies include revised CO2 standards for heavy-duty vehicles
      requiring 45% reduction by 2030 and 90% by 2040 versus 2019.

      '
    type: third-party-reported
    topic: regulation
    sourceRefs:
    - SM010
    - SM014
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QM018
  - id: CM016
    statement: 'The EU eFTI (Electronic Freight Transport Information) Regulation mandates that regulatory freight information
      be provided through certified digital platforms, creating a structural mandate for shippers and carriers to migrate
      from paper-based transport documents to digital platforms by 2026.

      '
    type: inferred
    topic: regulation
    sourceRefs:
    - SM004
    confidence: medium
    freshness: current
  - id: CM017
    statement: 'The EU AI Act enters full operational force for logistics companies in 2026, classifying route optimization
      algorithms, fleet management AI, and automated driver surveillance systems as high-risk AI applications requiring risk
      assessments, technical documentation, transparency, and human oversight.

      '
    type: inferred
    topic: regulation
    sourceRefs:
    - SM006
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QM016
  - id: CM018
    statement: 'From 1 July 2026, vans with gross vehicle weight up to 3.5 tonnes engaged in international freight must be
      equipped with second-generation smart tachographs (G2V2), extending working-time compliance obligations previously limited
      to heavier HGVs to the light commercial vehicle segment.

      '
    type: observed
    topic: regulation
    sourceRefs:
    - SM005
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QM015
  - id: CM019
    statement: 'Advanced Emergency Braking Systems (AEB) became mandatory for newly produced trucks from 7 July 2026 under
      the EU General Safety Regulation (GSR), and all newly homologated buses and trucks must now be equipped with Event Data
      Recorders (EDRs) — mandatory for all vehicles in these categories from 2029.

      '
    type: observed
    topic: regulation
    sourceRefs:
    - SM005
    confidence: medium
    freshness: current
  - id: CM020
    statement: 'Germany''s statutory minimum wage rose to EUR 13.90 per hour on 1 January 2026, with a further increase to
      EUR 14.60/hr planned for 2027. The German government estimates this generates EUR 2.2B in additional carrier labor costs
      in 2026 and EUR 3.4B in 2027, materially affecting all carriers operating on Germany-corridor routes — the six of the
      top-10 EU cross-border lanes.

      '
    type: third-party-reported
    topic: regulation
    sourceRefs:
    - SM005
    - SM006
    confidence: medium
    freshness: current
  - id: CM021
    statement: 'The EU road freight sector faces a structural driver shortage of approximately 400,000 qualified HGV operators
      in 2026, with the most acute gaps in Germany, France, Italy, Poland, and Spain, where vacancy rates in long-distance
      haulage exceed 15%. This is cited by both ExFreight and Market Data Forecast citing European Commission workforce data.

      '
    type: third-party-reported
    topic: supply-constraint
    sourceRefs:
    - SM009
    - SM014
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QM009
  - id: CM022
    statement: 'Over 45% of currently active EU truck drivers are aged 50 or older, and replacement rates from new license
      entrants remain insufficient, creating a medium-to-long-term structural capacity risk that suppresses supply-side response
      to demand increases.

      '
    type: third-party-reported
    topic: supply-constraint
    sourceRefs:
    - SM014
    confidence: medium
    freshness: current
  - id: CM023
    statement: 'The EU Mobility Package''s return-to-base mandate — requiring vehicles to return to their country of establishment
      every eight weeks — has reshaped Eastern European fleet operations on Western corridors, removing semi-permanent carrier
      capacity and creating tighter spot availability on Poland-Germany, Czech Republic-Italy, and Baltic-Western lanes.

      '
    type: inferred
    topic: regulation
    sourceRefs:
    - SM009
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QM025
  - id: CM024
    statement: 'Average FTL spot rates in Western Europe (Germany, France, Netherlands, Northern Italy) range from EUR 1.30
      to EUR 1.80 per kilometer in 2026. Eastern European corridors run more competitively at EUR 0.95 to EUR 1.30/km, though
      Mobility Package compliance costs have narrowed the East-West differential compared to 2022.

      '
    type: third-party-reported
    topic: pricing
    sourceRefs:
    - SM009
    confidence: medium
    freshness: current
    answersQuestionRefs:
    - QM010
    - QM022
  - id: CM025
    statement: 'Retail and wholesale trade accounts for approximately 38% of the European road freight market by volume, driven
