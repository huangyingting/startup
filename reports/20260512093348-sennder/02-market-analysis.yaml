  evidenceGaps:
  - id: EG_M01
    dimension: structural barriers to SME carrier digital adoption
    description: 'Public data on SME carrier technology adoption barriers (API literacy, onboarding cost, hardware requirements
      for ELDs and smart tachographs) is primarily qualitative and anecdotal. No comprehensive European carrier technology
      adoption survey was accessible in open sources. sennder''s internal carrier onboarding funnel data would be necessary
      to quantify this gap.

      '
    relatedQuestionRefs:
    - QM020
    severity: moderate
  - id: EG_M02
    dimension: sennder serviceable addressable market (SAM/SOM)
    description: 'sennder''s precise SAM and SOM within European FTL freight cannot be calculated from public data. The company
      does not disclose shipper count, active corridor volumes, or revenue per lane. The TAM/SAM/SOM table''s SOM row is an
      analyst estimate (USD 10–20B) based on geographic footprint and industry corridor data, not a management-confirmed figure.
      Actual SAM requires disclosure of sennder''s active carrier density by corridor, shipper concentration, and take rate
      per shipment.

      '
    relatedQuestionRefs:
    - QM021
    relatedTableRefs:
    - TM002
    severity: high
  - id: EG_M03
    dimension: electric truck adoption rate in European road freight
    description: 'While electric truck models (Volvo FH Electric, Daimler eActros 600, MAN eTruck) are operational on corridors
      up to 500 km, comprehensive market share data for electric HGVs as a percentage of total EU truck fleet in active commercial
      service is not publicly available in accessible open-source reports. ACEA fleet data was inaccessible at the time of
      research. EU Green Deal fleet-renewal subsidies and CBAM/ETS2 cost signals are expected to accelerate adoption, but
      quantified penetration rates remain a diligence gap.

      '
    relatedQuestionRefs:
    - QM027
    severity: low
  - id: EG_M04
    dimension: digital freight brokerage CAGR methodology comparison
    description: 'The published CAGR estimates for digital freight brokerage diverge significantly: Cognitive Market Research
      reports 31.1% for Europe (2024–2031), while GM Insights reports 5.8% for the global market (2026–2035). The reasons
      for this divergence — differing geographic scopes, inclusion of different platform types, differing base-year revenue
      definitions — cannot be fully adjudicated from publicly available methodology documentation. Investors should obtain
      direct analyst methodology calls before relying on either figure for sizing decisions.

      '
    relatedQuestionRefs:
    - QM028
    severity: moderate
  - id: EG_M05
    dimension: pharmaceutical and construction segment precise market shares
    description: 'Precise EU road freight market share data for pharmaceutical/healthcare logistics and construction/ industrial
      freight verticals is not uniformly published in open-source analyst reports. The segment shares in TM003 (5–10% for
      construction, 5–8% for pharma) are indicative cross-referenced estimates. IBISWorld and paid Mordor Intelligence full-report
      data would provide more granular breakdowns.

      '
    relatedTableRefs:
    - TM003
    severity: low
