chapter:
  number: 2
  title: Market Analysis
  summary: 'European road freight is a USD 412–555 billion market (2024–2025 estimates depending on scope), growing at approximately
    3% annually under a near-consensus view or 6.8% under a broader transport definition. The digital freight brokerage segment
    — sennder''s competitive home — is far smaller at USD 2.15 billion in Europe in 2024 but expanding at a 31.1% CAGR (Cognitive
    Market Research). The market is extraordinarily fragmented: the top five incumbents hold barely 6% combined share. Retail
    and e-commerce shippers dominate demand (~38%), followed by food and beverage (~30–35%) and automotive (~10–20%). 2026
    is a watershed regulatory year for European road freight: ETS2 extends carbon pricing to road fuels, the EU AI Act enters
    full force, smart tachograph mandates expand to vans, German minimum wages rise, and eight EU countries increase road
    tolls. These compliance headwinds create a structural tailwind for digital platforms that can embed carbon tracking, e-CMR,
    and automated compliance data into the freight workflow. Digital penetration is estimated at 10–15% of EU freight by value
    in 2026, leaving the majority of the market still to be captured.

    '
sections:
- id: market-boundary-and-scope
  title: Market Boundary and Scope
  body: 'The primary addressable market for sennder is European road freight transport — the movement of goods between origin
    and destination by truck across EU and adjacent markets. This includes full truck load (FTL), less-than-truck-load (LTL),
    refrigerated freight, hazardous materials transport, and containerized road delivery. It excludes air freight, maritime
    shipping, rail intermodal, and warehousing-only services. Traditional road freight brokers (phone-based freight matching
    by human dispatchers) are the direct status-quo substitute: they hold the majority of transaction volume but cannot offer
    the real-time visibility, carbon tracking, automated invoicing, and compliance data that ETS2 and eFTI now require. Adjacent
    markets include intermodal freight forwarding (where road is one leg) and last-mile parcel delivery (too granular for
    sennder''s FTL focus). Digital freight brokerage — platform-mediated, automated load matching — is the sub-segment where
    sennder directly competes. Road accounts for over 80% of total EU inland freight tonnage, making it the dominant mode
    by volume. The EU market''s 1 million+ business participants (per IBISWorld) and roughly 6 million industry employees
    illustrate its economic significance.

    '
  claimRefs:
