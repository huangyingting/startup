  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              sennder competes across three distinct archetypes in the European road freight market. First are
              digital-native FTL platforms — venture-backed startups using technology to automate load matching, carrier
              selection, and price discovery for full-truck-load shipments. Second are established digital marketplaces
              and SaaS platforms such as Transporeon (Trimble) and TimoCom, which provide procurement and execution
              infrastructure without owning the freight relationship. Third are traditional large-scale freight
              forwarders — DB Schenker, DHL Freight, Kuehne+Nagel, and DSV — which possess vast carrier networks, global
              sales forces, and long-standing customer relationships but historically lagged purpose-built platforms in
              automation. The competitive intensity varies by segment: digital challengers compete on price transparency
              and technology; SaaS platforms compete for shipper workflow integration; traditional players compete on
              reliability and service breadth. sennder's primary competitive field is digital-native FTL, where Forto
              represents the most direct peer, followed by smaller platforms and the now-insolvent InstaFreight
              (rebranded cargomotion).
            claimRefs:
