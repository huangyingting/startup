      - number: '4.5'
        title: Capital Adequacy and Financing Dependency
        blocks:
          - type: paragraph
            body: >
              sennder's funding chronology (detailed in Chapter 1—Company Overview) culminates in a $160 million Series
              E raised in June 2024 at a $1.3 billion post-money valuation, led by Lakestar and joined by Accel, HV
              Capital, Scania Growth Capital, Baillie Gifford, and Insight Partners. Cumulative capital raised across
              all rounds is approximately $413 million.

              The CHR acquisition was settled in cash, with price undisclosed. Given that the Series E of $160 million
              was raised in June 2024 and the deal was announced in July 2024 and closed in February 2025, the
              acquisition appears to have been funded from Series E proceeds and/or existing operating cash flow. The
              CEO stated in July 2024 that sennder had no plans for a new financing round, implying internal funding was
              sufficient.

              Capital adequacy signals: (1) no layoffs announced post-Series E; (2) CHR integration reportedly on plan
              (company blog, Feb 2025); (3) revenue doubling trajectory suggests positive cash generation from
              operations or at least self-funding of integration costs at the operating level. However, working-capital
              intensity (paying carriers in <3 days) means operating cash flows must be managed carefully or
              supplemented with credit facilities.

              Diligence requires: cash and equivalents at Series E close vs. at close of CHR deal; revolving credit
              facility terms; debt-to-equity ratio; monthly cash burn; and whether there are earnouts or contingent
              payments related to CHR.
