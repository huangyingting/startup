chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: >
              sennder Technologies GmbH is a Berlin-headquartered digital road freight forwarder that connects
              enterprise shippers with small and medium-sized trucking companies through a proprietary technology
              platform. Founded in July 2015, sennder has repositioned the traditional freight brokerage model by
              digitizing load matching, pricing, real-time tracking, and invoicing. The company operates exclusively in
              full truck load (FTL) road freight in Europe, a market estimated at €400 billion+ annually. Its platform,
              branded sennOS, automates carrier onboarding, route optimization, and payment — reducing the average
              carrier payment cycle from industry-standard 45–60 days to under 3 days. The company deploys over 40,000
              trucks across Europe with access to more than 120,000 vehicles, completing over 1 million FTL shipments
              per year. sennder's vision is to "fast forward road logistics" by creating an efficient, transparent, and
              sustainable road freight network. Shippers gain real-time visibility and cost control; carriers gain
              access to enterprise-quality loads and faster payment. The company earns revenue as a freight forwarder,
              taking a margin on freight brokerage transactions rather than owning physical assets. Its competitive
              differentiation stems from data network effects — the more loads and carriers on the platform, the better
              the matching algorithm performs, reducing empty miles and improving pricing efficiency.
