appendices:
  - id: A
    title: Entry Conditions and Monitoring Framework
    blocks:
      - type: callout
        calloutType: recommendation
        title: TRACK — Conditional Entry at <2.5x Pro-Forma Revenue (~€3.5B EV)
        body: >
          Recommend TRACK with conditional entry when three conditions are met: (1) CHR integration milestone
          confirmation at 6-month post-close review (H2 2025) shows load volume and service continuity on-track; (2)
          EBITDA trajectory confirmed positive within 12 months of entry via quarterly management accounts; (3) Entry
          valuation <2.5x pro-forma revenue (~€3.5B EV at €1.4B revenue). Bull exit at €4.0–4.8B EV (2.5–3.0x revenue)
          delivers 1.3–1.6x MOIC over 5-year hold. Bear case at €1.8–2.5B EV delivers 0.6–0.8x MOIC — capital
          impairment.
        claimRefs:
          - CV001
          - CV005
          - CV006
          - CV015
      - type: list
        title: Post-Entry Monitoring KPIs
        items:
          - >-
            CHR Integration Health: monthly load volumes on CHR-legacy lanes vs. pre-acquisition baseline at 6m and 12m
            post-close
          - 'Poste Italiane JV Revenue: monthly vs. €23M/month run-rate target; watch for renegotiation signals'
          - 'Control Tower Contribution Margin: quarterly management accounts; must trend positive within 12 months'
          - 'Carrier Acceptance Rate: threshold below 70% on contracted lanes signals operational stress'
          - >-
            Sector Multiple Benchmarks: Forto sale and Flexport secondary trades; compression below 1.5x triggers
            bear-case revision
          - 'EBITDA Trajectory: quarterly management accounts; cash runway vs. plan'
        claimRefs:
          - CV020
          - CV022
          - CV025
