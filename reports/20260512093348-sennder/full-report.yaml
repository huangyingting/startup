      - number: '1.3'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              sennder has raised over $413 million across 11 funding rounds since inception, establishing itself as one
              of Europe's most heavily backed logistics technology companies. The company's early rounds were seeded by
              strategic investor Scania Growth Capital and HV Capital, which provided both capital and industry
              credibility in the carrier ecosystem. Series B ($29.7M, April 2019, led by Accel) and Series C ($70M, July
              2019, led by Lakestar) funded rapid geographic expansion across Europe. A transformative Series D in
              January 2021 ($160M, led by Accel and Lakestar) was followed by a June 2021 extension ($80M, with Baillie
              Gifford joining), which catapulted sennder to unicorn status at a $1 billion valuation. A December 2022
              Series D tranche ($63.2M) and August 2023 Scania Growth Capital round sustained operations through a
              freight market downturn. The most recent capital event is a June 2024 Series E of $160M led by Lakestar,
              setting a post-money valuation of $1.3 billion — a 30% premium to the $1B unicorn mark reached in 2021.
              Existing investors Accel, HV Capital, Scania Growth Capital, Baillie Gifford, and Insight Partners all
              participated, signaling strong institutional conviction. Total raised of approximately $413M positions
              sennder well for the capital-intensive integration of C.H. Robinson EST and continued platform
              development. Investec Morgan Stanley acted as financial advisor on the C.H. Robinson deal.
