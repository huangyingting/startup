      - number: '1.4'
        title: Scale, Revenue, and Geographic Presence
        blocks:
          - type: paragraph
            body: >
              Prior to the C.H. Robinson EST acquisition, sennder reported revenue of approximately $1.1B for 2024 with
              a headcount of ~929 employees. The acquisition, which closed on February 1, 2025, added approximately 700
              employees and was expected to roughly double revenue to approximately €1.4B ($1.5B), positioning the
              combined company among Europe's top five FTL providers. The company currently operates in more than 20
              European markets across 20+ physical locations, having expanded from its original footprint in Germany.
              Key offices include Berlin (HQ), Amsterdam, Barcelona, Bucharest, Madrid, Milan, Paris, Riga, Rotterdam,
              and Wrocław. New countries added through the C.H. Robinson acquisition include the United Kingdom and
              Turkey. The combined entity employs approximately 1,600 people and serves over 73 nationalities in its
              workforce. sennder operates over 40,000 vetted trucks with access to 250,000+ vehicles across the
              continent. The company completed over 1 million FTL shipments in 2024. Scale brings critical network
              density advantages: a broader carrier base across geographies enables lower empty mile rates and better
              price discovery. Revenue concentration risk is mitigated by a diversified customer base spanning
              automotive, FMCG, food & beverage, fashion, retail, and industrial manufacturing sectors across Europe.
