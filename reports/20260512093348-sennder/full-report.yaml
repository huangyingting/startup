      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Sennder follows a consultative enterprise B2B sales model, targeting large shippers (manufacturers,
              retailers, consumer goods companies) with complex, high-volume road freight needs across multiple European
              countries. The typical sales cycle runs several months due to due-diligence requirements, procurement
              processes, and contract negotiations on multi-lane, custom-priced master freight agreements.

              Customer acquisition is primarily through a direct enterprise sales force supported by regional account
              managers. The company does not operate a self-serve or transactional marketplace; spot-load access exists
              but strategic accounts dominate revenue. No public CAC, CAC payback period, or sales headcount data are
              disclosed.

              The CEO cited as of 2021 a target of doubling revenue year-on-year, which implies a land-and-expand model
              where new geographies and service lanes within existing accounts contribute to net revenue retention. The
              CHR acquisition brought a large established enterprise customer base with existing contracted lanes,
              effectively purchasing NRR and reducing CAC for European coverage expansion.

              Key sales efficiency proxies observable externally: Revenue per FTE pre-CHR was approximately €750,000
              (€700M revenue / ~929 employees in 2024); this is above typical non-tech freight forwarding but below pure
              SaaS benchmarks. Post-CHR (~1,600 FTEs, €1.4B projected), the ratio approaches €875,000/FTE if synergies
              are realized, indicating modest but meaningful productivity per head.
            claimRefs:
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
