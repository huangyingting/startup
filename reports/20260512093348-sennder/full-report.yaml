      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Demand for road freight capacity is structurally supported by e-commerce expansion, CEE manufacturing
              integration, and nearshoring trends diverting supply chains from Asia. The European logistics sector
              invested over USD 10 billion in technology digitalization by 2025, demonstrating strong platform adoption
              momentum. Digital freight matching platforms now account for more than 35% of EU road freight
              transactions, with real-time visibility becoming an expected baseline for enterprise shippers. However,
              structural constraints are significant. A chronic driver shortage of approximately 400,000 HGV licenses —
              concentrated in Germany, France, Italy, Poland, and Spain — caps available capacity and supports floor
              pricing even in soft demand periods. Over 45% of current EU truck drivers are aged 50 or above, creating a
              medium-term replacement crisis. Road toll increases across eight EU countries in 2026 compound cost
              pressure on carriers. The EU Mobility Package's return-to-base mandate for Eastern European carriers
              removed semi-permanent Western-corridor capacity, tightening spot availability on key lanes. Digital
              platform adoption faces resistance from the long tail of fragmented SME carriers that lack technology
              literacy and API connectivity. sennder's carrier onboarding automation and rapid-payment model directly
              address these structural friction points.
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM032
