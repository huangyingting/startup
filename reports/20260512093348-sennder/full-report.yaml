      - number: '4.6'
        title: Financial Verdict
        blocks:
          - type: paragraph
            body: >
              Revenue quality is moderate: €700M (pre-CHR) FY2024 is real, growing, and corroborated by multiple
              independent estimates; however, the revenue figure is gross billing—the actual economic margin captured is
              undisclosed and almost certainly in the 10–15% range for FTL digital brokerage, implying €70–105M gross
              profit before significant opex. At a $1.3B Series E valuation, investors are paying approximately 1.8–3.7×
              revenue multiple (on gross billing), which is consistent with a high-growth logistics platform, not a SaaS
              business. This implies the investor thesis requires either (a) margin expansion to SaaS-like levels via
              software layer growth, (b) continued revenue scaling to justify public-market comps, or (c) M&A-driven
              market share consolidation to a point of pricing power.

              Margin path: uncertain. Industry gross margin benchmarks suggest limited near-term upside without a
              meaningful SaaS/platform contribution. Working-capital intensity constrains free cash flow even at stable
              margins.

              Capital intensity: medium-high. The <3-day carrier payment cycle requires permanent working capital
              financing that scales linearly with revenue. At €1.4B revenue, the implied monthly working capital gap
              approximates €100M+.

              Diligence blockers: absence of (1) gross margin, (2) EBITDA, (3) cash position, (4) burn rate, (5) CHR
              acquisition price and integration cost. These are standard items for investment underwriting that cannot
              be estimated with acceptable confidence from public sources.
            claimRefs:
              - CI029
              - CI030
              - CI031
              - CI032
              - CI033
  - number: 5
