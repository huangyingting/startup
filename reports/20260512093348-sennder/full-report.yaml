              platform automating pricing and dispatch, geographic coverage in 20+ EU countries, and sustainability
              credentials with CO2 tracking. Key competitive risks include thin digital FTL margins, integration
              complexity from successive acquisitions, the looming scale of DSV-Schenker, and profitability pressure
