      - number: '1.5'
        title: Corporate Milestones and M&A History
        blocks:
          - type: paragraph
            body: >
              sennder's growth trajectory has been punctuated by a series of transformative milestones since its
              founding. Beginning with a pivot from last-mile e-commerce delivery to full truck load freight in
              2015-2016, the company rapidly built its carrier network through in-person recruitment and early
              technology development. Strategic M&A has been a core growth lever, with six acquisitions completed
              through 2024: Everoad (French digital forwarder, 2020) expanded the company's French presence; Uber
              Freight Europe (all-stock deal, September 2020) provided a shipper base and Amsterdam office; Cars & Cargo
              (Dutch forwarder, May 2021) added Benelux capacity; Innroute (Spanish competitor) extended Iberian reach.
              The most consequential transaction was the C.H. Robinson European Surface Transportation acquisition,
              announced July 30, 2024, and closed February 1, 2025, which was the largest in company history by employee
              count and revenue impact. Key adverse events include a freight market downturn in 2022-2023, which
              pressured revenue growth and necessitated a lower bridge round in December 2022. The company has
              maintained a "digital-first" identity throughout all acquisitions, integrating acquired companies under
              the sennder brand and operating system. Investor exits and secondary transactions have not been publicly
              disclosed.
