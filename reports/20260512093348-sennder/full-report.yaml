      - number: '4.3'
        title: Cost Structure and Gross Margin Drivers
        blocks:
          - type: paragraph
            body: >
              As an asset-light digital forwarder, sennder's dominant cost item is carrier payouts (cost of revenue),
              representing an estimated 80–90% of gross billing. Industry benchmarks for FTL road freight digital
              brokers indicate gross margins of 10–25%, with pure-digital FTL platforms at the lower end (10–15%) due to
              commodity-like carrier pricing and limited value-add differentiation. Traditional full-service freight
              forwarders achieve 15–25% gross margin through freight consolidation, customs, and multi-modal services
              not present in sennder's core FTL model.

              sennder's working-capital cycle is structurally costly: the company pays carriers within three business
              days (a competitive tool to attract carriers) versus an industry norm of 45–60 days. On €700 million
              revenue with ~85% of revenue paid to carriers in three days, the implied accounts-payable float financing
              need is approximately €58 million per month, requiring either a revolving credit facility or significant
              operating cash reserves.

              Operating expenses are dominated by: (1) technology and product development (sennder maintained a
              200-person tech team as of 2021, one of Europe's largest in logistics); (2) sales and account management
              headcount; (3) carrier-side account management for network quality and compliance. Capex is low as sennder
              owns no trucks. No public EBITDA, operating cash flow, or net margin figures have been disclosed.
            claimRefs:
              - CI012
