  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              sennder operates as an asset-light freight forwarder, acting as the contractual carrier to shippers and
              subcontracting execution to trucking companies from its carrier network. Revenue is the all-in rate billed
              to the shipper; cost of revenue is the carrier payout. The spread—freight broker gross profit—constitutes
              the primary economic unit. A secondary SaaS stream (TMS/carrier management software) is under development
              as an add-on for existing carriers and shippers; this stream is nascent and not yet material in disclosed
              figures. Sennder focuses almost exclusively on FTL (full truckload) road freight across Europe; LTL and
              pallet consolidation have not been publicly announced as current offerings. Revenue is recognized on a
              per-shipment basis at point of delivery (gross billing model), consistent with non-asset-based forwarding
              practice under IFRS 15.

              Pre-CHR revenue for FY2024 was reported by Reuters (via kelo.com) as approximately €700 million; the CHR
              European Surface Transportation acquisition, closed in February 2025, is projected to bring combined
              revenue to approximately €1.4 billion. A third-party estimate from Latka database cites $1.1 billion,
              consistent with the Reuters figure when accounting for FX and possible GMV versus net-revenue methodology
              differences.

              sennder also earns ancillary revenue from value-added services: real-time tracking APIs, emissions
              monitoring data for shipper ESG reporting, and carrier financing / quick-pay programs. None of these have
              publicly disclosed contribution margins.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
