        title: Founders and Leadership Team
        blocks:
          - type: paragraph
            body: >
              sennder was co-founded in July 2015 by David Nothacker, Julius Köhler, and Nicolaus Schefenacker, who met
              through studies and professional networks. David Nothacker, the CEO, previously studied at WHU – Otto
              Beisheim School of Management and INSEAD, and worked at Roland Berger Strategy Consultants before
              identifying road freight as a ripe market for digital disruption. Julius Köhler, Co-Founder and Chief
              Digital Officer, gained experience at Rocket Internet before joining sennder. Nicolaus Schefenacker,
              Co-Founder, oversees M&A strategy, having assembled a team to systematically monitor and pursue
              acquisition targets. The management team expanded significantly in 2024 following the C.H. Robinson
              acquisition: Susanne Schroeter-Crossan joined as CFO in April 2024, bringing financial leadership
              experience from Zalando SE, HelloFresh SE, and LEG Immobilien. Kollen Glynn became CTO after previously
              serving as VP of Core Software Engineering at C.H. Robinson, providing critical technical bridge for the
              integration. David Vismans joined as CPO from Booking.com. Post- acquisition C-suite additions from the
              C.H. Robinson EST team include Chris Mills (COO), Christoffer Haldemar (CCO), and Arkadiusz Glinka (Chief
              Growth Officer). The breadth of the leadership team represents both startup agility and institutional
              enterprise operational capability, though concentration risk around co-founder David Nothacker as the
              public face and primary strategic voice remains a material dependency.
