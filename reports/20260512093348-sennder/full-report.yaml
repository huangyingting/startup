      - number: '2.5'
        title: Regulatory Environment and Compliance Headwinds
        blocks:
          - type: paragraph
            body: >
              The 2026 regulatory landscape for European road freight is the most consequential since the Mobility
              Package. ETS2 — the EU Emissions Trading System extended to road transport fuels — requires regulated
              entities to hold greenhouse gas permits and surrender allowances from 1 January 2025, with the associated
              CO2 price projected at EUR 55–65 per ton in 2026. This raises diesel costs across all carriers and
              compresses margins for operators without carbon-tracking infrastructure. The EU Fit for 55 package
              mandates a 90% transport sector GHG reduction by 2050 versus 1990, binding fleet investment decisions now.
              The EU AI Act enters full operational force in 2026 for logistics, classifying route optimization, fleet
              management, and freight-matching algorithms as high-risk AI applications subject to risk assessments,
              documentation, and human oversight requirements. The eFTI Regulation mandates that freight information be
              exchanged through certified digital platforms, converting paper-based transport documents (CMR, waybills)
              into structured machine-readable data. Smart tachographs become mandatory for international freight vans
              under 3.5 tonnes from 1 July 2026, extending working-time compliance costs to the LCV segment. Germany's
              minimum wage increase to EUR 13.90 per hour in January 2026 added EUR 2.2 billion in estimated additional
              carrier labor costs in Germany alone. Road toll hikes in Austria, Belgium, Czech Republic, France,
              Hungary, the Netherlands, Poland, and Romania add further operating cost pressure. Together, these
              regulatory changes tilt competitive advantage toward digital-native platforms that embed compliance data
              natively.
            claimRefs:
              - CM013
              - CM014
              - CM015
              - CM016
              - CM017
              - CM018
