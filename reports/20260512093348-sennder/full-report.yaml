              startups (Everoad, Uber Freight Europe), owner-managed traditional forwarders (Innroute, Cars&Cargo), and
              the large legacy CHR European Surface Transportation division (completed February 2025). The CHR deal
              alone added ~700 employees, 6,500 new customers, and 15,000 new carriers. sennder's core moats include
