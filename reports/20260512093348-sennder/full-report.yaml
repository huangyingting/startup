      - number: '2.3'
        title: Buyer and Segment Structure
        blocks:
          - type: paragraph
            body: >
              European road freight demand is anchored by three shipper verticals. Retail and e-commerce accounts for
              approximately 38% of road freight volume, driven by replenishment cycles, just-in-time delivery, and the
              surge in e-commerce (European e-commerce exceeds USD 600 billion). Food and beverage occupies
              approximately 30–35% of demand, propelled by temperature-sensitive distribution chains, fresh product
              velocity, and increasingly stringent food-safety documentation. Automotive, at 10–20%, relies on precision
              just-in-time sequencing of components from CEE manufacturing hubs to Western European OEM plants;
              Poland-Germany and Czech Republic-Italy are among the highest-frequency corridors in Europe. Construction
              and industrial manufacturing combined represent a further 5–10%, while pharmaceutical and healthcare
              logistics account for 5–8% and demand the highest compliance and cold-chain standards. In each vertical,
              the budget owner is typically the procurement director or VP of supply chain at mid-to-large enterprise
              shippers, with the head of logistics operations acting as the daily user. Digital adoption triggers vary
              by segment: for retail, it is volume growth and speed of replenishment; for food and beverage, it is
              cold-chain compliance and freshness SLAs; for automotive, it is JIT sequencing traceability.
            claimRefs:
              - CM025
