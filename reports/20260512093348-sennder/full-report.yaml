      - number: '3.4'
        title: Traditional Forwarder Incumbents
        blocks:
          - type: paragraph
            body: >
              The traditional incumbents dwarf digital-native players in scale but compete less on price transparency
              and automation. DB Schenker reported €19.2B in 2024 revenue (EBIT €1.1B) and is being acquired by DSV in a
              deal that would create the world's largest logistics company, with combined revenues exceeding €30B. DHL
              Freight operates under Deutsche Post DHL Group (€40.9B in H1 2024 revenue), maintaining a top-three road
              freight presence in Europe. Kuehne+Nagel reported CHF 24.8B net sales in 2024 with a record land transport
              EBIT of CHF 227M, and is recognized in the Gartner Magic Quadrant for 3PL/4PL leadership. These incumbents
              offer global multi-modal coverage, customs, warehousing, and long-term contract reliability that sennder
              cannot yet match at the enterprise relationship level. However, their reliance on manual processes, legacy
              IT stacks, and opaque pricing gives digital-native platforms a structural advantage in shipper price
              transparency and per-shipment efficiency within the FTL segment. The DSV-Schenker merger intensifies
              competitive pressure for all mid-size European forwarders, but large traditional players have historically
              been slow to erode digital FTL platforms' efficiency advantages.
