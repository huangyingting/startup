  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Scope
        blocks:
          - type: paragraph
            body: >
              The primary addressable market for sennder is European road freight transport — the movement of goods
              between origin and destination by truck across EU and adjacent markets. This includes full truck load
              (FTL), less-than-truck-load (LTL), refrigerated freight, hazardous materials transport, and containerized
              road delivery. It excludes air freight, maritime shipping, rail intermodal, and warehousing-only services.
              Traditional road freight brokers (phone-based freight matching by human dispatchers) are the direct
              status-quo substitute: they hold the majority of transaction volume but cannot offer the real-time
              visibility, carbon tracking, automated invoicing, and compliance data that ETS2 and eFTI now require.
              Adjacent markets include intermodal freight forwarding (where road is one leg) and last-mile parcel
              delivery (too granular for sennder's FTL focus). Digital freight brokerage — platform-mediated, automated
              load matching — is the sub-segment where sennder directly competes. Road accounts for over 80% of total EU
              inland freight tonnage, making it the dominant mode by volume. The EU market's 1 million+ business
              participants (per IBISWorld) and roughly 6 million industry employees illustrate its economic
              significance.
            claimRefs:
              - CM001
              - CM004
              - CM030
              - CM031
          - type: table
            tableRef: TM001
            claimRefs:
