    - id: CR001
      statement: "The EU Mobility Package (Regulation 2020/1054) imposes cabotage limits (3 domestic deliveries within 7 days, 4-day cooling-off), uniform driver rest rules, and accommodation requirements for weekly rest periods that directly constrain carrier routing on sennder's platform."
      type: third-party-reported
      topic: regulatory risk — EU Mobility Package
      sourceRefs:
        - SR004
        - SR001
      confidence: high
      freshness: current
      answersQuestionRefs:
