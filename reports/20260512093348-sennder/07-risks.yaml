  - id: TR005
    title: Mitigation and Kill Criteria
    layout: standard
    notes: >
      Kill criteria represent thesis-breaking events that would fundamentally alter the
      investment case. Monitoring triggers are leading indicators. Actions are illustrative
      and depend on investment terms.
    columns:
      - Risk
      - Monitorable Trigger
      - Kill Criterion / Threshold
      - Action Implication
    rows:
      - - Poste Italiane concentration
        - JV renegotiation notice or Italian regulatory review of postal operator JV
        - JV termination or revenue reduction >20% from Poste
        - Material revenue impairment; thesis-break if not replaceable within 2 years
      - - CHR integration overrun
        - Integration budget variance >25% or timeline delay >6 months
        - Total integration costs >€50M or revenue attrition >10%
        - Rebase growth model; accelerate profitability timeline
      - - EU ETS 2027 margin compression
        - Carbon price on road transport fuel exceeds €50/tonne
        - Gross margin compression >2pp without offsetting green premium
        - Accelerate EV/HVO product mix; renegotiate enterprise contracts
      - - GDPR/cyber enforcement
        - DPA investigation notice or disclosed breach affecting >10K users
        - Fine exceeding €5M or remediation cost >€10M
        - Liquidity review; enterprise contract force majeure risk
      - - "Driver shortage: capacity crisis"
        - Carrier acceptance rate falls below 70% on contracted lanes
        - Platform unable to fulfill >10% of contracted loads consistently
        - Contractual SLA breach risk; renegotiate enterprise agreements
      - - Profitability timeline slip
        - EBITDA-positive target missed by >12 months vs. plan
        - Cash runway <18 months without additional capital raise
        - Bridge financing or strategic acquirer review
    claimRefs:
      - CR025
      - CR026
      - CR027

