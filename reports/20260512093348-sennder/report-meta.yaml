companyProfile:
  summary: >
    sennder Technologies GmbH is a Berlin-based digital full truck load (FTL) freight forwarder
    that connects enterprise shippers with small and mid-sized carriers across Europe via its
    proprietary sennOS platform. Founded in 2015 and backed by Sequoia Capital Europe and Lakestar,
    sennder has grown to become Europe's leading digital freight platform, with pro-forma revenue of
    ~€1.4B following its February 2025 acquisition of C.H. Robinson's European Surface Transportation
    business. The company operates in 20+ EU countries and maintains a 10-year commercial partnership
    with Poste Italiane covering Italian postal logistics (€2.3B commercial value). sennder is
    pre-profitability but has built the network density, customer relationships, and technology
    infrastructure required to be a durable EU freight platform.
  foundedDate: "2015-01-01"
  founders:
    - name: David Nothacker
      role: CEO and Co-founder
      background: Co-founded sennder with logistics and marketplace expertise; has led the company through six funding rounds and three major acquisitions.
      claimRefs: [CO001]
    - name: Julius Köhler
      role: COO and Co-founder
      background: Co-founder who oversees operations and M&A integration including the CHR acquisition.
      claimRefs: [CO028]
    - name: Nicolaus Schefenacker
      role: Co-founder
      background: Co-founder who helped establish sennder's initial carrier network in Germany.
      claimRefs: [CO001]
  foundingLocation: Berlin, Germany
  headquarters: Berlin, Germany
  productSummary: >
    sennOS is sennder's proprietary transport management system (TMS) that automates carrier
    onboarding, load matching, route optimization, real-time tracking, and automated invoicing.
    The platform serves enterprise shippers (automotive, FMCG, retail) with Control Tower accounts
    for dedicated capacity management and integrates with carrier management tools including the
    JUNA electric truck joint venture with Scania.
  customerFocus: Large enterprise shippers in automotive, FMCG, retail, and food & beverage sectors requiring multi-lane, multi-country European FTL capacity.
  businessModel: Asset-light freight brokerage (earns spread between shipper all-in rate and carrier subcontractor cost); emerging SaaS/TMS layer for carriers and shippers.
  stage: late-stage private (Series E, June 2024)
  fundingStatus: >
    Series E (€160M, June 2024); total raised ~€413M across 11 rounds (2015–2024). Last public
    round valuation not disclosed. Unicorn status achieved at $1B+ in October 2021.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003, CO019, CO020, CO021, CO031]
