- id: deployment-integration
  title: Deployment, Integration & Roadmap
  body: 'sennder integrates with enterprise shipper TMS/ERP systems via standardised REST APIs, with an OpenAPI-specification-driven
    approach enabling typed client generation across languages. The platform is deployed across 20+ European markets with
    offices in six countries. The technology roadmap reflects a three-stage evolution: (1) 2020–2021 – platform foundation
    via Everoad merger and 200-person engineering build-out; (2) 2023–2025 – vertical expansion into eMobility (JUNA JV) and
    major customer partnerships (Nestlé, Poste Italiane); (3) 2025–2026+ – SaaS licensing of sennOS to third-party logistics
    providers and post-CHR integration. The C.H. Robinson European acquisition closed in February 2025, adding technology
    assets and network scale requiring active integration. Mobile apps provide operational coverage for carrier drivers. RoadPulse
    reports are published monthly and demonstrate a data product capability.

    '
  claimRefs:
  - CE006
  - CE022
  - CE023
  - CE031
  - CE032
  - CE038
