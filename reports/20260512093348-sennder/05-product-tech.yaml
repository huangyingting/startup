- id: technology-architecture
  title: Technology Architecture & Stack
  body: 'sennOS is built on a proprietary Python-based REST API stack with OpenAPI specification-driven interfaces. The open-sourced
    python-client-generator repository on GitHub generates typed Python httpx/Pydantic API clients from OpenAPI specs, revealing
    an API-first engineering culture. The web application (app.sennder.com) runs on Google Firebase Hosting, indicating adoption
    of Google Cloud infrastructure for the frontend layer. ML/AI algorithms underpin route optimisation, load matching, capacity
    prediction, demand management, and empty-kilometre reduction. Real-time GPS data from 250,000+ vehicles feeds the tracking
    and ETA system. Digital invoice factoring is powered by undisclosed banking/payments partners. The technology team comprised
    over 200 engineers as of 2021, reported as the largest in European logistics at the time, led by CPO David Vismans (ex-Booking.com)
    and CTO Kollen Glynn (ex-C.H. Robinson). The platform codebase is proprietary; the python-client-generator is the only
    publicly available code artefact.

    '
