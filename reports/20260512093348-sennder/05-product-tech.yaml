- id: trust-compliance
  title: Trust, Safety & Compliance
  body: 'sennder operates as an EU-based data processor subject to GDPR; all shipper and carrier personal and shipment data
    handling falls under this framework. The carrier vetting programme screens 40,000+ carriers for EU licensing, safety,
    and compliance before network admission. SLA compliance monitoring with proactive delay alerts and dynamic ETA is active
    across all live shipments. The Green Business product provides per-load CO₂ reporting for shipper ESG accounts, though
    independent third-party audits of emission calculations have not been publicly confirmed. No security certifications (ISO
    27001, SOC 2, or equivalent) have been publicly disclosed as of 2026, representing a diligence gap for enterprise buyers.

    '
  claimRefs:
