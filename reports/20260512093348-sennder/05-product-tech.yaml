- id: platform-modules
  title: Platform Modules & Service Lines
  body: 'The sennder platform is organised into distinct service lines. The Shipper Portal provides booking (contract, spot,
    or charter), real-time GPS tracking with dynamic ETA and proactive delay notifications, warehouse slot optimisation, SLA
    compliance monitoring, and TMS/ERP API connectivity. The Carrier Portal offers access to contracted freight for revenue
    stability, spot freight bidding for flexible capacity utilisation, and charter arrangements. Digital invoice factoring
    delivers payment to carriers in 15 minutes. The Green Business layer adds two decarbonisation verticals: advanced biofuel
    (HVO) solutions reducing CO₂ by up to 90 %, and an eMobility service (JUNA JV with Scania) offering electric heavy-duty
    trucks for up to 100 % CO₂ reduction. RoadPulse, a monthly market report based on sennder''s proprietary freight data,
    serves as a data product for shippers and industry analysts. A SaaS licensing model for sennOS to third-party logistics
    providers is announced but in an early stage.

    '
