company:
  name: sennder
chapter:
  number: 5
  title: Product & Technology
  summary: 'sennder''s proprietary platform, sennOS, serves as an end-to-end transport management and operating system for
    European full-truckload road freight. The platform comprises a Shipper Portal (booking, real-time tracking, SLA management,
    TMS/ERP API integration), a Carrier Portal (contract/spot/charter load access, digital invoice factoring with 15-minute
    payment), and a Green Business layer (HVO advanced biofuels for up to 90 % CO₂ reduction; JUNA electric-truck JV with
    Scania for up to 100 % reduction). An open-sourced Python/OpenAPI client generator on GitHub signals an API-first engineering
    culture; the app subdomain runs on Google Firebase Hosting. ML/AI algorithms drive route optimisation, empty-kilometre
    reduction, and capacity prediction across 50,000+ monthly loads. The SaaS licensing of sennOS to third parties is announced
    but nascent. Key gaps include undisclosed security certifications, limited public API documentation, and opaque JUNA fleet
    scale. The technology team (200+ engineers in 2021, largest in European logistics) is led by CPO David Vismans (ex-Booking.com)
    and CTO Kollen Glynn (ex-C.H. Robinson).

    '
sections:
- id: product-overview
  title: Platform Overview & Customer Workflow
  body: 'sennder built and operates sennOS, a proprietary end-to-end transport management system covering the full shipment
    lifecycle from booking through dispatch, real-time GPS tracking, and digital invoicing. The platform serves two primary
    user bases: enterprise shippers booking full-truckload (FTL) capacity and small-to-medium carriers finding and executing
    loads. Shippers access a self-service portal for contract, spot, and charter freight booking, real-time shipment visibility,
    and SLA management; carriers access load matching, payment, and operational data. The platform integrates directly with
    enterprise shipper TMS/ERP systems via REST APIs. sennder processes 50,000+ monthly loads across 20+ European markets,
    supported by 40,000+ vetted carriers and 250,000+ vehicles. Mobile apps on Apple App Store and Google Play extend access
    for carrier drivers and dispatchers.

    '
