figures:
  - id: FU001
    title: sennder Shipper Customer Journey Map
    type: journey-map
    layout: standard
    summary: >
      Key stages in the sennder shipper journey from initial discovery through enterprise
      lock-in and sustainability upsell, with representative customer segments at each node.
    data:
      nodes:
        - id: discovery
          label: Discovery & RFQ
          detail: >
            Enterprise shipper identifies FTL capacity gap or cost-reduction mandate;
            sennder pitch focuses on guaranteed price, digital TMS, and pan-European coverage.
            Primary target: shippers with ≥€1M annual FTL spend.
        - id: onboarding
          label: TMS Integration & Onboarding
          detail: >
            Shipper integrates via TMS API or shipper portal; order ingestion, GPS tracking,
            and ETA provision go live. Integration creates initial switching cost. Timeline
            typically weeks to months for enterprise.
        - id: contract_ftl
          label: Contract FTL Deployment
          detail: >
            Shipper commits to contract loads across defined corridors; sennder guarantees price
            and capacity. AB InBev, Beam Suntory, and Nestlé all use contract FTL as entry point.
        - id: green_upsell
          label: Green Transport Upsell
          detail: >
            Shipper adopts HVO100 (renewable diesel) and/or electric trucks for Scope 3 emission
            reduction. Nestlé pathway: contract FTL (2021) → HVO (2022) → electric trucks (2024).
            In 2023, green demand grew 6× YoY on the platform.
        - id: control_tower
          label: Control Tower (100% FTL Managed)
          detail: >
            Shipper delegates 100% of FTL operations to sennder; full post-shipment analytics,
            proactive delay notifications, and SLA management. Highest switching cost; implicit
            in Poste Italiane JV model.
        - id: jv_partnership
          label: JV / Strategic Partnership
          detail: >
            Largest enterprise relationships evolve into joint ventures (Poste Italiane: 75%/25%
            stake, 10-year, €2.3B) or long-term commercial agreements (Scania/JUNA). Represents
            ultimate customer-to-partner conversion and deepest lock-in.
    claimRefs:
      - CU003
      - CU004
      - CU024

