company:
  name: sennder
chapter:
  number: 6
  title: Customers
  summary: >
    sennder serves large European enterprise shippers across CPG/FMCG, postal, manufacturing,
    and retail verticals. Named production customers include Nestlé Germany (electric-truck
    green-logistics partnership since 2021, 3,000+ green loads, 2,000+ tonnes CO2e reduced),
    Poste Italiane (€2.3 billion 10-year JV extension signed July 2023, double-digit YoY growth),
    AB InBev and Beam Suntory (named enterprise references on the shipper page). The platform
    moves 50,000+ monthly loads across 20+ markets through 40,000+ vetted carriers. sennder's
    Control Tower model locks in 100% of a customer's FTL business, creating deep switching costs;
    the Poste Italiane JV (est. ~16–20% of pro-forma revenue) is the most significant concentration
    risk. No public NRR, GRR, or churn data are disclosed; retention durability is inferred from
    multi-year partnerships and decade-long contractual frameworks. Customer acquisition focuses
    on minimum €1M+ annual FTL contract shippers, restricting the addressable buyer pool but
    enabling dense, repeatable volumes.

sections:
  - id: S1
    title: Customer Segmentation
    body: >
      sennder targets large enterprise shippers for full truckload (FTL) road freight across
      Europe. The buyer profile is consistently large organisations with significant annual
      logistics spend: €1M+ FTL contracts, 20+ markets of operation, and complexity that
      favours a managed, integrated freight-forwarding layer over in-house transport management.
      Key verticals served include CPG/FMCG (AB InBev, Beam Suntory, Nestlé), postal/parcel
      logistics (Poste Italiane), and automotive/manufacturing (Scania as JV partner and
      implied customer). Geographically, sennder's shipper base is concentrated in German-speaking
      and Western European markets, with Italian operations managed through the Poste Italiane JV.
      Mid-market shippers are accessible through the self-serve portal but the stated commercial
      focus is on enterprise contract volumes.
    tableRefs:
      - TU001
    figureRefs:
      - FU001

  - id: S2
    title: Adoption Trajectory
    body: >
      sennder's platform processes 50,000+ monthly loads as of 2024, served by 40,000+ vetted
      carriers and 250,000+ vehicles across 20+ European markets. The Poste Italiane JV has
      delivered continuous year-over-year double-digit volume growth since the partnership's
      inception. During the Black Friday 2023 peak week, truckload volumes peaked at 65% above
      average, indicating significant shipper demand concentration around seasonal events.
      The spot market declined 47% YoY in 2023 due to macroeconomic headwinds, but sennder's
      Control Tower model—which takes over 100% of a customer's FTL business—insulates contract
      volumes from spot volatility. In 2023, demand for green transportation solutions grew
      six-fold YoY on sennder's platform. Named enterprise customer additions of scale (Nestlé
      eMobility Jan 2025) confirm continued enterprise penetration despite industry-wide rate
      pressure.
    tableRefs:
      - TU002
    figureRefs:
      - FU002

  - id: S3
    title: Named Customer Proof
    body: >
      sennder's strongest publicly evidenced customer relationships are Nestlé Germany, Poste
      Italiane, AB InBev, and Beam Suntory. Nestlé Germany's Vice President of Supply Chain,
      Matthias Fleischer, directly quoted: "Partnering with sennder to implement electric trucks
      in Germany has been a critical step in ensuring our transport operations are both efficient
      and sustainable." This is the clearest production-use endorsement in the public record.
      Poste Italiane extended the Italian JV for a decade in July 2023, generating an expected
      €2.3 billion in revenues for sennder Italia over the term; sennder CEO Nothacker described
      the deal as a "true win-win." Beam Suntory engaged sennder for a cinematic case study video
      featuring green business outcomes, filmed across Madrid, Chicago, and Amsterdam. AB InBev
      and Beam Suntory are explicitly named as enterprise reference customers on sennder's shipper
      page, validating production deployment at scale. The lack of named customer outcomes data
      for AB InBev specifically (NPS, volume share, savings achieved) represents a diligence gap.
    tableRefs:
      - TU003
    figureRefs:
      - FU003

  - id: S4
    title: Retention and Durability
    body: >
      sennder does not publicly disclose net or gross revenue retention, churn rates, or cohort
      renewal data. Proxy indicators are available: the Nestlé partnership has been active since
      2021 (4+ years as of 2025), the Poste Italiane JV has been extended to a decade, and the
      Control Tower model—which requires full TMS integration and takes over 100% of a shipper's
      FTL volume—creates high switching costs. Carriers access dedicated fleet management software,
      automated notifications, and utilization reporting, further increasing dependency. sennder
      competes for contract volumes of at least €1M per annum, a threshold that implies multi-year
      procurement cycles and relatively low customer turnover at the enterprise level. Industry
      benchmarks for digital freight platforms indicate annualized gross retention of 80–90% for
      enterprise contract segments, though sennder's specific figures remain private.
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: S5
    title: Expansion and Concentration Risk
    body: >
      Expansion within accounts follows a "land-and-expand" trajectory: shipper relationships
      typically begin with contract FTL and expand into spot loads, green-transport overlays
      (HVO, electric trucks), and Control Tower full-service management. Nestlé's journey
      exemplifies this: starting with contract loads, expanding to HVO green transport, then
      electric trucks under the JUNA/Scania JV. Concentration risk is material: the Poste
      Italiane JV is expected to generate €2.3 billion over ten years (~€230M/year), representing
      an estimated 16–20% of pro-forma combined revenues of ~€1.4 billion (post CHR integration).
      The top customer or JV partner likely represents a significant share of total EBITDA given
      the Italian market's operational density. Revenue diversification depends on growing
      enterprise shippers in Germany, France, Spain, and Poland. A single large-shipper departure
      could materially impact revenues without equivalent replacement pipeline visibility.
    tableRefs:
      - TU005

