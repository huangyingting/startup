  - id: TV005
    title: Thesis-Break and Kill Triggers Table
    layout: standard
    notes: >
      Thesis-break events require immediate investment committee review. Monitoring triggers
      are leading indicators to track quarterly. These are additive to the risk register in
      Chapter 7 (TR005).
    columns:
      - Trigger Event
      - Leading Indicator
      - Impact
      - Timeline for Review
    rows:
      - - Poste Italiane JV renegotiation or termination
        - Poste Italiane press release; Italian regulatory review of postal operator JV
        - Revenue reduction of ~€230M/year; thesis-break if not replaceable within 18 months
        - Immediate — within 48 hours of any news
      - - CHR integration cost overrun or revenue attrition >10%
        - Integration budget variance >25% or CHR customer churn >10% post-acquisition
        - Rebase valuation to bear case; revisit entry price ceiling
        - 6-month and 12-month integration milestone reviews
      - - Sector multiple compression below 1.5x
        - Forto completes distressed sale below $1B; Flexport secondary market <1.0x
        - Revise base case EV to bear territory; delay entry until profitability demonstrated
        - Quarterly — monitor Forto sale process and Flexport secondary trades
      - - sennder raises capital at <€2B EV
        - New disclosed funding round or secondary at <€2B implied valuation
        - Down-round signal; entry above this level creates immediate mark-to-market loss
        - Immediate — monitor EU-Startups, Sifted, and company announcements
      - - GDPR/NIS2 enforcement action resulting in fine >€5M
        - DPA investigation notice or public breach disclosure
        - Liquidity risk; enterprise contract review by key shippers; compliance cost
        - Immediate — monitor German and EU data protection authority announcements
      - - EBITDA breakeven miss >12 months vs. stated target
        - Cash runway <18 months without new equity; no public breakeven commitment given
        - Capital raise requirement; dilution; thesis pressure
        - Annual — track in data room; request quarterly management accounts
    claimRefs:
      - CV015
      - CV016

  - id: TV006
    title: Final Diligence Asks Table
    layout: standard
    notes: >
      Priority is ordered by investment decision weight. All asks are data-room items unless
      noted as public-source checkable. These asks map to evidence gaps from Chapters 1–7.
    columns:
      - Topic
      - Specific Ask
      - Priority
      - Current Gap
    rows:
      - - Profitability and unit economics
        - EBITDA by year, contribution margin by account type (Control Tower vs. spot), and 24-month breakeven roadmap
        - "Critical"
        - No public disclosure of any profitability metric
      - - CHR integration cost and milestone plan
        - Total integration budget, by-jurisdiction milestone plan, technology migration timeline, and Q1 2025 actuals vs. plan
        - "Critical"
        - No public disclosure; deal closed Q4 2024
      - - Poste Italiane JV terms
        - Full JV agreement including break-clause conditions, minimum revenue guarantees, and Italian regulatory approvals
        - "Critical"
        - 10-year extension disclosed but break-clause terms undisclosed
      - - sennder GmbH Bundesanzeiger financials
        - Cross-reference FY2022 and FY2023 Bundesanzeiger filing with management-stated revenue; check for any contingent liabilities
        - "High"
        - FY2022/23 filings may be available; gap is whether they match stated revenue trajectory
      - - Capital structure and preference stack
        - Full cap table, liquidation preferences by round, any convertible debt or venture debt
        - "High"
        - No public disclosure; critical for return waterfall
      - - Platform uptime and cybersecurity posture
        - SLA to enterprise shippers, cloud provider identity, redundancy architecture, ISO 27001 or NIS2 compliance status
        - "Medium"
        - Zero public disclosure; required for enterprise contract risk assessment
      - - Carrier network quality metrics
        - Carrier vetting criteria, OTIF rate by segment, carrier churn rate, and compliance with EU tachograph mandate
        - "Medium"
        - No public disclosure of operational quality metrics
      - - JUNA JV terms and EV pipeline
        - JUNA JV agreement, EV truck delivery schedule, pricing to shippers, and JUNA P&L
        - "Medium"
        - JUNA operational but terms undisclosed
    claimRefs:
      - CV020
      - CV021

