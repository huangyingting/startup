  - id: financing-valuation-context
    title: 'Financing History and Valuation Context'
    body: >-
      Koloma's financing history comprises three disclosed tranches totaling approximately $453
      million. The Series B, announced August 27, 2024, raised $403 million from Khosla Ventures,
      Breakthrough Energy Ventures, United Airlines Ventures, BP Ventures, MHI, and Osaka Gas,
      making it one of the largest single venture rounds in the global natural hydrogen sector.
      A separate $50 million strategic investment from Osaka Gas was announced October 1, 2024,
      reflecting continued conviction from the Japanese energy conglomerate and bringing total
      disclosed funding to approximately $453 million. Earlier Series A funding has not been
      fully publicly disclosed, though CB Insights and Tracxn profiles confirm the company has
      been venture-funded since its founding in 2021.

      The post-money valuation from the Series B is not publicly confirmed by any investor, SEC
      filing, or company disclosure. The range of $600–900 million inferred here is derived from
      the $403 million fundraise amount and the typical pricing conventions for early-stage clean
      energy venture rounds in 2024, where capital-intensive exploration companies have commanded
      2–4× the round size in post-money valuations. This inference is speculative and cannot be
      corroborated from public data. PitchBook and Tracxn provide company profiles for Koloma but
      do not disclose the post-money valuation. Koloma's SEC Form D filing confirms the Regulation D
      offering structure but does not disclose preference terms, liquidation waterfall, or pro-rata
      rights — all of which are material to assessing dilution exposure for earlier investors.

      The financial sustainability risk is material. With approximately 69 staff and active
      exploration operations in Kansas and Idaho, Koloma's estimated annual operating expenditure
      is $40–100 million per year. At the midpoint, the $403 million Series B implies a cash runway
      of approximately four to seven years, suggesting the company should have capital through
      2028–2031 without additional raises. However, if commercial results are delayed or disappointing,
      a bridge round or Series C under adverse terms could significantly dilute early investors.
      BNEF projects green hydrogen costs declining to $2–3/kg by 2030, which would partially erode
      the cost-competitiveness narrative if natural hydrogen production costs exceed their targets.
      No commercial revenue is expected before 2029 in any scenario.
