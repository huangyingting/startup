  - id: comparables-exit-readiness
    title: 'Comparable Valuation, Exit Readiness, and Final Diligence Asks'
    body: >-
      The comparable set for Koloma is thin and inherently imperfect, reflecting the novelty of
      natural hydrogen as a commercial asset class. Gold Hydrogen (GHY.AX), listed on the ASX, is
      the most directly comparable public company: a pre-revenue natural hydrogen exploration company
      with acreage in South Australia, trading at approximately $40–80 million AUD market
      capitalization in 2024–2025. The 10–20× valuation premium implied by Koloma's $600–900
      million implied post-money valuation versus Gold Hydrogen's public market value may partially
      reflect Koloma's larger US acreage position, more advanced exploration program, and deeper
      investor base — but it also introduces significant overvaluation risk relative to the public
      market benchmark for natural hydrogen exploration stage companies.

      Plug Power (PLUG), trading at approximately $1.2 billion USD market capitalization on NASDAQ
      in 2024–2025, provides a distant revenue-stage reference for how public markets value hydrogen
      companies. However, Plug Power generates over $800 million in annual revenue from fuel cell
      and electrolyzer systems, making direct comparability to Koloma's pre-commercial, pre-revenue
      stage limited. FuelCell Energy (FCEL) at $200–400 million market cap provides a similar
      distant revenue-stage reference. Hydroma Inc., operating a small natural hydrogen pilot
      in Mali at approximately 5 Nm³/hr, is the only other entity with documented natural hydrogen
      production, but its scale is far below commercial thresholds and its business model is not
      publicly disclosed. CB Insights and McKinsey have both placed natural hydrogen in the early
      exploration phase with transformative but unproven commercial potential.

      Koloma is not IPO-ready as of May 2026. The company has no revenue, no commercial production,
      and no product revenue forecast — all minimum requirements for a successful cleantech IPO under
      current market conditions. A strategic acquisition by MHI, BP, Osaka Gas, or another major
      energy company is the more probable near-term exit pathway, contingent on positive well data.
      The five final diligence asks that must be addressed before any investment recommendation
      upgrade are: public disclosure of commercial well flow rates and hydrogen purity from Kansas
      and Idaho test wells; confirmation of IRA 45V certification status and timeline from DOE or
      Treasury; Series B term sheet disclosure including preference terms and dilution structure;
      binding offtake or letter of intent from at least one strategic investor-customer; and full
      patent portfolio scope disclosure with geographic coverage and claims.
