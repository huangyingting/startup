callouts:
  - calloutType: recommendation
    title: 'Current Call: TRACK / CONDITIONAL'
    body: >-
      Koloma receives a TRACK / CONDITIONAL call as of May 2026. The recommendation is not a buy
      and not a pass. Three simultaneous gate conditions must be met before any buy signal can be
      issued: (1) public disclosure of commercial well flow rate exceeding 1 MMscf/d at H2 purity
      above 95%, (2) confirmed DOE or Treasury IRA 45V certification pathway for natural hydrogen,
      and (3) at least one binding offtake agreement with a strategic investor-customer. The current
      implied valuation of $600–900M is stretched for a pre-revenue, pre-commercial company.
    claimRefs:
      - CV013
      - CV016
      - CV018

  - calloutType: risk
    title: Critical Risk — Zero Commercial Evidence After $453M Raised
    body: >-
      The single most important adverse signal in this diligence is the complete absence of any
      publicly disclosed commercial well result after $453 million raised. S&P Global''s January
      2025 report explicitly noted Koloma was "quiet on next steps." The RMI critical analysis and
      GeoExpro''s geological critique both highlight that commercial-scale natural hydrogen production
      has not been demonstrated at any comparable geological environment in the United States. This
      information asymmetry between management and outside investors is the dominant risk factor
      governing the low confidence and critical risk rating.
    claimRefs:
      - CV002
      - CV003
      - CV005
      - CV007

