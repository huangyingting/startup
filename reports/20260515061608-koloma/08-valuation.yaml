chapter:
  number: 8
  title: Valuation
  summary: >-
    Koloma occupies a rare and high-risk position in the clean-energy landscape: the best-funded
    natural hydrogen exploration startup globally, with $453 million raised across Series A, Series B
    (August 2024, $403 million), and a strategic Osaka Gas investment (October 2024, $50 million),
    yet with zero publicly disclosed commercial production data as of May 2026. The investment
    recommendation is TRACK / CONDITIONAL — not a buy and not a pass. The implied post-money
    valuation of $600–900 million, inferred from the Series B terms and stage, is speculative and
    cannot be supported by discounted cash flow; an option value framework is more appropriate.
    The bull scenario (15% probability) reaches $2–5 billion by 2030 if commercial wells are proven
    and IRA 45V certification is obtained; the base scenario (50% probability) yields $300–700
    million under a delayed commercial path requiring further dilutive rounds; the bear scenario
    (35% probability) converges toward zero if no commercial scale is achieved by 2032. The
    comparable set is thin: Gold Hydrogen (GHY.AX) on the ASX is the closest direct peer at
    $40–80 million AUD market cap; Plug Power (PLUG) at ~$1.2 billion provides a distant
    revenue-stage reference. Five thesis-break triggers govern the call: well flow rate
    disclosure, regulatory clarity, Series C terms, binding offtake, and Tom Darrah''s
    continued leadership.

sections:
  - id: investment-thesis-anti-thesis
    title: 'Investment Thesis and Anti-Thesis'
    body: >-
      Koloma's investment thesis rests on six interconnected pillars that collectively describe a
      potentially transformative clean-energy opportunity. First, Koloma is the acknowledged first
      mover in systematic natural hydrogen exploration in the United States, with no direct competitor
      at comparable funding or acreage scale domestically. Second, if the company's geological models
      prove correct, it can produce hydrogen at $0.50–1.50 per kilogram — a target that would make
      natural hydrogen the cheapest clean hydrogen source in the world, substantially undercutting
      green hydrogen at $3–7/kg and grey hydrogen at $1–2/kg. Third, the potential availability of
      the IRA Section 45V clean hydrogen production tax credit (up to $3/kg for near-zero-carbon
      hydrogen) would, if certified for natural hydrogen, push the effective realized price to
      $3.50–4.50/kg and dramatically improve the economics of any offtake agreement. Fourth, the
      strategic investor base — Mitsubishi Heavy Industries, Osaka Gas, United Airlines Ventures, BP
      Ventures, and Breakthrough Energy Ventures — validates demand-side conviction from major
      corporations that would plausibly be anchor offtake customers. Fifth, McKinsey's and the
      Hydrogen Council's analyses support a multi-trillion-dollar global clean hydrogen market by
      2050, within which natural hydrogen at low cost would command an enormous share. Sixth, Koloma's
      scientific foundation at Ohio State EAIC under founder-scientist Tom Darrah represents a
      genuine intellectual barrier to replication.

      The anti-thesis is equally compelling. Zero commercially produced hydrogen has been disclosed
      after $453 million raised and four-plus years of operations. S&P Global explicitly noted in
      January 2025 that Koloma, despite holding the bulk of its Series B funding, was "quiet on next
      steps." The RMI published a critical analysis questioning whether natural hydrogen can be
      produced at commercial scale, noting that the scientific evidence base for large, exploitable
      accumulations outside West Africa remains thin. GeoExpro questioned whether Koloma's geological
      models for Kansas craton formations transfer to Idaho basalt, where hydrogen generation
      mechanisms differ. No federal regulatory framework exists for natural hydrogen production,
      leaving the IRA 45V pathway unestablished. None of the five strategic investor-customers has
      signed a binding offtake agreement. The company has no revenue, no disclosed burn rate, and
      will require at least one additional capital raise before any commercial production milestone —
      creating material dilution risk for existing investors. Taken together, the anti-thesis
      arguments are not speculative: they are structural, present, and monitorable.
