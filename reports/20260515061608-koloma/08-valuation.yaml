  - id: scenario-analysis
    title: 'Bull / Base / Bear Scenario Analysis'
    body: >-
      Three scenarios bracket the credible range of Koloma outcomes. The bull scenario, assigned a
      15% probability, requires Koloma to achieve a commercial well producing over 1 MMscf/d of
      hydrogen at purity above 95% by 2028; secure IRA Section 45V certification for natural
      geological hydrogen from the US Department of Energy or Treasury; and sign a binding offtake
      agreement with MHI or Osaka Gas by 2029. Under these conditions, the realized hydrogen price
      including the 45V tax credit of up to $3/kg would be $3.50–4.50/kg, making natural hydrogen
      competitive with all clean hydrogen alternatives. Valuation in the bull case is estimated at
      $2–5 billion by 2030, supporting a potential IPO or strategic acquisition. The probability
      reflects the genuine possibility of the science working but the large number of binary gates
      that must all pass simultaneously.

      The base scenario, assigned a 50% probability, envisions limited commercial production by
      2030–2031 with regulatory uncertainty persisting and at least one additional dilutive financing
      round required. The IRA 45V certification may be partial or delayed. Offtake agreements are
      executed but at smaller scale than the bull case. The valuation in the base case is $300–700
      million — roughly flat to the current implied post-money valuation — reflecting a path where
      the science works at limited scale but the economics do not generate the transformative outcome
      originally envisioned. A Series C or D round at or below the Series B valuation would signal
      a base case trajectory.

      The bear scenario, assigned a 35% probability, models Koloma failing to achieve commercial
      scale by 2032. The drivers are well productivity below economic thresholds, absence of federal
      regulatory framework, capital exhaustion forcing a distressed funding round, or Tom Darrah
      departing. Under the bear scenario, Koloma's equity value converges toward zero. Potential
      outcomes include IP sale to a major energy company, acreage licensing, or asset liquidation.
      Rystad Energy's observation that natural hydrogen exploration quadrupled over three years also
      implies a growing probability that a competitor achieves commercial results before Koloma,
      reducing Koloma's first-mover premium. The valuation sensitivity analysis demonstrates that
      IRA 45V certification acts as a binary multiplier: its presence or absence alone accounts for
      a $500–1,500 million difference in projected value across the scenarios.
