companyProfile:
  summary: >
    Koloma is a Denver-based, Delaware-incorporated natural hydrogen company founded in 2021
    by Pete Johnson (CEO), Paul Harraka (CBO), and Tom Darrah (CTO). The company applies
    AI-driven geological modeling, seismic imaging, satellite data, and proprietary geochemical
    sampling to identify and develop subsurface formations where hydrogen is generated abiotically
    through serpentinization of ultramafic rocks. Koloma emerged from stealth in July 2023 when
    it announced a $91 million Series A led by Breakthrough Energy Ventures, followed by a
    $245.7 million Series B in February 2024 led by Khosla Ventures and a $52.4 million
    extension in October 2024 that brought in Mitsubishi Heavy Industries and Osaka Gas as
    strategic investors. As of May 2026, Koloma has raised approximately $403 million in total,
    employs roughly 69 people, and operates exploration programs in Kansas (as High Plains
    Resources) and Idaho (as Cascade Exploration), with a research hub at Ohio State University's
    Energy Advancement and Innovation Center. The company is pre-revenue and has not publicly
    disclosed well flow-rate or production results.
  foundedDate: "2021-01-01"
  founders:
    - name: "Pete Johnson"
