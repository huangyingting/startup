- id: section-4
  title: Growth drivers, adoption constraints and contradictory data
  body: 'Growth drivers anchor on the policy stack — U.S. DOE Hydrogen Hubs subsidies, EU Hydrogen Bank auctions, RefuelEU SAF mandates, and corporate voluntary net-zero pledges that are willing to pay a premium for low-carbon molecules. The Trump administration''s 2025 reversal of certain hydrogen tax incentives is a notable countervailing political risk that should be carried forward in the diligence file. Adoption constraints are structural: subsurface mineral-rights regulation differs by U.S. state, midstream and transport infrastructure for low-volume hydrogen is sparse, the IEA''s 2024 review flagged slow low-emissions FID conversion, and industrial-gas incumbents (Air Liquide, Linde, Air Products) have the balance sheet either to absorb pure-plays via M&A or to compete head-on once supply scales. Adverse public commentary — from S&P Global Commodity Insights, Canary Media and GEO ExPro — explicitly preserves doubt about whether natural hydrogen will play any role in the energy transition. The contradictory-data picture is preserved deliberately: optimistic analyst sizing, cautious IEA volume estimates, skeptical operator-side commentary, and a still-unfilled rigorous SOM estimate.'
