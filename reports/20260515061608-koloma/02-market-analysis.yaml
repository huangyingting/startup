- id: section-3
  title: Buyer segmentation and adoption path
  body: 'Hydrogen buyers split into industrial commodity demand (refining, ammonia, methanol — the bulk of today''s grey-hydrogen consumption) and emerging low-carbon demand (steel direct reduction, aviation SAF, gas-utility blending and grid firming). Industrial buyers are highly cost-parity sensitive and dominated by procurement organizations whose budget owners typically demand price equivalence to grey hydrogen plus only modest sustainability premium. Emerging buyers — driven by EU CBAM, RefuelEU, U.S. SAF Grand Challenge and corporate net-zero commitments — accept higher prices but have weaker procurement readiness in 2026. Koloma''s cap-table signal is informative: United Airlines Ventures suggests aviation SAF demand interest, while Mitsubishi Heavy Industries and Osaka Gas signal Asian industrial and gas-utility demand. The adoption funnel runs from reservoir discovery through pilot production to commercial offtake, with each stage''s conversion rate unproven for natural hydrogen specifically. Local-permitting risk — already visible in citizen concerns about Koloma''s Idaho Cascade drilling — represents a constraint not yet captured in mainstream sizing models.'
