chapter:
  number: 2
  title: Market Analysis
  summary: The hydrogen market sized at roughly $224B in 2024 (MarketsandMarkets) is the TAM, with the clean/low-emissions sub-segment (<1% of supply per IEA) the SAM, and natural/geologic hydrogen a still-unquantified SOM directionally framed at $1-3B by 2030. Adoption depends on beating the grey-hydrogen $1-2/kg price floor, with strong policy drivers (DOE Hubs, EU Hydrogen Bank, SAF mandates) but real constraints (slow FIDs, mineral-rights patchwork, skeptical commentary).
sections:
- id: section-1
  title: Market boundary, included and excluded spend
  body: The natural-hydrogen market relevant to Koloma sits inside the broader global hydrogen market, but is not coextensive with it. Total global hydrogen demand was approximately 97 million tonnes in 2023 according to the IEA, with low-emissions hydrogen accounting for less than 1% of supply. The clean-hydrogen sub-segment — green electrolysis, blue with CCS and natural/geologic — is the SAM relevant to Koloma; conventional grey hydrogen produced from steam methane reforming is the status-quo substitute and the price floor (roughly $1-2/kg) Koloma must beat. The natural-hydrogen segment specifically excludes any manufactured-hydrogen pathway and includes all spend associated with subsurface exploration, drilling capex and surface processing. Adjacent demand surfaces — sustainable aviation fuel, green ammonia for shipping, steel decarbonization via direct reduced iron — also matter because the strategic investor signal embedded in Koloma's cap table (United Airlines Ventures, Osaka Gas, Mitsubishi Heavy Industries) maps directly onto those adjacent buyer pools.
  claimRefs:
  - CM001
  - CM005
  - CM007
  - CM008
  - CM017
  - CM027
  - CM029
  - CM030
  tableRefs:
  - TM001
- id: section-2
  title: TAM/SAM/SOM and multi-lens sizing
  body: 'Sizing the market requires multiple lenses because no single publisher produces a rigorous natural-hydrogen revenue forecast. MarketsandMarkets sizes total hydrogen at roughly $224 billion in 2024 growing to about $311 billion by 2030 at 6.8% CAGR — a TAM lens. The IEA expresses demand in volume terms (97 Mt) and flags that less than 1% is low-emissions, framing the SAM. The U.S. DOE Clean Hydrogen Strategy and Roadmap projects U.S. hydrogen demand could rise to 50 million tonnes by 2050 across heavy-duty transport, industry and power. For natural hydrogen specifically, the public record is investment-led: Drilling for Hydrogen reports private capital crossed $1 billion globally in early 2026, and Rystad Energy counts about 40 active explorers (up from 10 in 2020). A serviceable obtainable market for natural hydrogen by 2030 is best framed today as a directional $1-3B band — derived top-down from substituting roughly 1% of grey hydrogen demand at $1-2/kg pricing, and explicitly flagged as an internal estimate rather than a peer-reviewed figure.'
