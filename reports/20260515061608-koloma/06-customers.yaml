  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: commercial-gap
      missingEvidence: >-
        Specific terms, price thresholds, volume commitments, delivery milestones, or binding frameworks
        that would trigger any investor-customer''s conversion to a paying offtake buyer — none are publicly
        disclosed. No LOI, heads of agreement, or preliminary commercial terms from any of the five named
        investor-customers are available in the public record.
      whyItMatters: >-
        Without binding commercial terms or at least a preliminary LOI, it is impossible to assess
        whether Koloma''s investor-customer relationships will translate into revenue; the entire commercial
        thesis rests on a set of equity signals without contractual backing.
      diligencePath: >-
        Request under NDA any preliminary commercial term sheets, data-room sharing agreements with investor-customers,
        or internal LOI drafts that indicate offtake conversion progress. Ask management directly for the
        commercial milestone gates agreed with MHI, Osaka Gas, and UAL.
      relatedQuestionRefs:
        - QU012
        - QU015

    - type: missing-source
      severity: material
      topic: undisclosed-pipeline
      missingEvidence: >-
        Any arm''s-length or non-equity customer prospects in Koloma''s commercial pipeline beyond the five
        named investor-customers. No public source identifies any non-investor buyer engagement, commercial
        trial, or pipeline customer that has not already invested in the company.
      whyItMatters: >-
        The absence of an arm''s-length customer pipeline means that all customer proof rests on
        parties with a financial incentive to remain publicly positive about Koloma; independent commercial
        demand signals would materially strengthen the customer thesis.
      diligencePath: >-
        Ask management for any non-equity offtake inquiries, RFP responses, or preliminary supply discussions
        with industrial hydrogen buyers who are not current shareholders. Request a summary of commercial
        pipeline activity under NDA.
      relatedQuestionRefs:
        - QU011

