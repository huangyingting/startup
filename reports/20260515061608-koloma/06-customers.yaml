company:
  name: Koloma
chapter:
  number: 6
  title: Customers
  summary: >-
    Koloma is a pre-revenue natural hydrogen exploration company with no paying customers as of May 2026.
    Its customer base consists entirely of five named strategic investor-customers — Mitsubishi Heavy Industries,
    Osaka Gas, United Airlines Ventures, BP Ventures, and Breakthrough Energy Ventures — who have signaled
    future offtake intent through equity investment rather than binding commercial agreements. No letters of
    intent, offtake agreements, or commercial supply arrangements have been publicly disclosed. Customer proof
    is entirely equity-based; NRR, GRR, and churn metrics cannot be computed. The critical near-term milestones
    are first commercial-flow-rate well disclosure and conversion of at least one investor-customer to a binding LOI.

sections:
  - id: customer-landscape-overview
    title: Customer Landscape Overview
    body: >-
      Koloma occupies a unique and challenging commercial position: it is a pre-revenue, pre-commercial natural
      hydrogen exploration company whose entire disclosed "customer" base consists of strategic equity investors
      who have signaled future offtake intent through capital commitment rather than through binding supply
      agreements. As of May 2026, the company has raised approximately $453 million in total disclosed funding,
      yet has not publicly disclosed a single letter of intent, offtake contract, pilot supply agreement, or
      binding volume commitment from any counterparty. S&P Global Commodity Insights explicitly flagged this
      discrepancy in January 2025, noting that Koloma had been "quiet on next steps" despite its substantial
      capital base. The company's five publicly named investor-customers — Mitsubishi Heavy Industries, Osaka
      Gas, United Airlines Ventures, BP Ventures, and Breakthrough Energy Ventures — represent the entirety of
      disclosed named customer relationships. This pre-commercial stage is not unusual for the natural hydrogen
      sector globally, where no company has yet delivered hydrogen to a paying customer at commercial scale.
      Koloma's customer development challenge is threefold: convert strategic equity investors into binding
      offtake customers, achieve the commercial production milestones necessary to underpin supply agreements,
      and diversify its customer pipeline beyond the five named investor-customer relationships that currently
      define its demand-side strategy.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
    tableRefs: []
    figureRefs: []

  - id: customer-segmentation-and-use-cases
    title: Customer Segmentation and Target Use Cases
    body: >-
      Koloma's target customer segments map directly to the largest industrial hydrogen use cases globally.
      The industrial hydrogen market — dominated by ammonia synthesis for fertilizers, petroleum refining and
      desulfurization, and increasingly steel decarbonization — consumes approximately 90 million tonnes per
      year globally according to the IEA. These segments require delivered hydrogen at large scale and continuous
      supply, making them natural targets for geological hydrogen if cost and reliability can be demonstrated.
      Mitsubishi Heavy Industries anchors the industrial and refining segment: MHI operates refineries and
      ammonia plants across Japan and Asia that consume hydrogen as a primary feedstock. Osaka Gas represents
      the gas utility segment in Japan, exploring hydrogen for grid blending and heating decarbonization as
      part of Japan's national hydrogen strategy. United Airlines Ventures represents the sustainable aviation
      fuel pathway, where clean hydrogen serves as a feedstock for Fischer-Tropsch SAF synthesis. BP Ventures
      anchors the integrated energy major segment, with refinery hydrogen demand across its global asset base.
      Breakthrough Energy Ventures represents the deep-tech climate segment whose investment signals that natural
      hydrogen fits within the broader industrial decarbonization thesis. Koloma targets a delivered price of
      $0.50-1.50 per kilogram, which would be substantially below green hydrogen at $3-7 per kilogram, making
      it highly attractive to all five customer segments if production can be demonstrated at scale.
    claimRefs:
      - CU005
      - CU006
      - CU007
      - CU008
      - CU009
    tableRefs:
      - TU001
    figureRefs:
      - FU002

  - id: named-investor-customers-proof-analysis
    title: Named Strategic Investor-Customers — Proof Analysis
    body: >-
      The five named strategic investor-customers represent qualitatively different types of industrial hydrogen
      demand and varying degrees of customer proof. Mitsubishi Heavy Industries participated in Koloma's
      Series B financing round in August 2024, and its re-investment in the extended round signals sustained
      multi-year commitment. MHI confirmed in its October 2024 press release that the investment is intended
      to secure future access to natural hydrogen supply for its industrial operations, making it the strongest
      customer-proof source available for Koloma. Osaka Gas issued its own press release confirming a $50 million
      strategic investment in October 2024, with the stated rationale of diversifying its hydrogen procurement
      strategy. United Airlines Ventures is a founding member of the Sustainable Flight Fund (launched 2022)
      and participated in Koloma's early funding rounds, connecting natural hydrogen to the sustainable aviation
      fuel supply chain as a potential clean feedstock. BP Ventures participated as an early investor in Koloma's
      seed and Series A rounds, representing the integrated energy major refinery hydrogen demand segment. Breakthrough
      Energy Ventures provided early-stage capital since Koloma's founding in 2021, representing the deep-tech
      climate investor signal rather than a direct industrial hydrogen buyer. Despite this diverse investor-customer
      base, all five relationships lack any binding commercial commitment: no LOI, no pilot delivery, no volume
      or price terms have been publicly disclosed. S&P Global's January 2025 adverse coverage flagged this gap
      explicitly, and Breaking Energy and BusinessWire corroborated the investment facts without reporting any
      offtake progress. The customer proof is entirely equity-based and pre-commercial in nature.
    claimRefs:
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
      - CU021
    tableRefs:
      - TU003
    figureRefs:
      - FU003

  - id: customer-adoption-trajectory
    title: Customer Adoption Trajectory
    body: >-
      Koloma's customer adoption trajectory is best understood as a staged funnel from broad industrial hydrogen
      market awareness to strategic equity commitment, with the critical commercial conversion stages — LOI,
      pilot supply, and commercial offtake — yet to be achieved. The global pool of industrial hydrogen buyers
      consuming more than 10,000 tonnes per year is estimated at approximately 200 entities globally, based
      on IEA and Hydrogen Council demand data. Of these, a small fraction are currently aware of and engaged
      with natural hydrogen exploration opportunities. Koloma has successfully converted five of these engaged
      parties to equity investor status, demonstrating meaningful pull from high-quality industrial hydrogen
      buyers. However, zero offtake commitments have been executed across the entire natural hydrogen sector
      globally as of May 2026, establishing a sector-wide pre-commercial baseline. Koloma's adoption timeline
      requires first: achieving a commercial-flow-rate well result that can underpin offtake economics;
      second: converting that result into an LOI or heads of agreement with at least one investor-customer;
      third: executing a pilot supply agreement for initial deliveries; and fourth: scaling to full commercial
      supply contracts. None of these stages have been reached. The drilling for hydrogen sector has grown
      rapidly — from approximately $0 to $1 billion in disclosed funding in three years — suggesting increasing
      competitive pressure on Koloma to demonstrate adoption progress before rivals do. Canary Media, Bloomberg,
      and Axios have all covered Koloma's funding without reporting customer adoption milestones, reinforcing
      the absence of commercial traction.
    claimRefs:
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
    tableRefs:
      - TU002
    figureRefs:
      - FU001

  - id: retention-commitment-durability
    title: Retention, Commitment, and Investor-Customer Durability
    body: >-
      In the absence of commercial customer relationships, investor-customer retention — measured by continued
      equity commitment — serves as the only available proxy for customer durability. All five named investor-customers
      have maintained their equity positions in Koloma through the latest disclosed funding rounds, with no
      public reports of divestiture, reduced commitment, or investor-customer conflict as of May 2026. MHI's
      participation extended from an initial Series B investment to re-investment in the extended round, providing
      the strongest multi-year retention signal available. Osaka Gas issued a positive press statement upon
      its October 2024 investment, with no subsequent adverse signals. United Airlines Ventures has remained
      active in sustainability communications without retracting its Koloma investment. BP Ventures has made
      no public update since the Series B, but absence of adverse signals is consistent with continued commitment.
      Breakthrough Energy Ventures maintains Koloma as an active portfolio company. These signals are positive
      but limited: equity retention does not equal commercial commitment, and the conversion from investor to
      paying customer requires Koloma to demonstrate actual hydrogen production at competitive economics. No
      commercial NRR, GRR, churn rate, or customer satisfaction score can be computed because no commercial
      customer relationships exist. The retention proxy is therefore one-dimensional and may not predict commercial
      offtake conversion rates once production is demonstrated and real supply economics become transparent.
      The critical diligence ask is whether any investor-customer has entered a data-room review or preliminary
      offtake scoping exercise, which would be a more meaningful retention signal than equity position alone.
    claimRefs:
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
    tableRefs:
      - TU004
    figureRefs:
      - FU004

  - id: expansion-and-concentration-risk
    title: Expansion Potential and Concentration Risk
    body: >-
      Koloma's customer portfolio carries significant concentration risk across multiple dimensions. First,
      all five named customers are simultaneously equity investors, creating a structural conflict between
      investor return maximization and offtake price negotiation: a customer seeking the lowest possible hydrogen
      price may conflict with an investor seeking the highest possible company valuation. This dual-role dynamic
      has no established governance framework in Koloma's public disclosures. Second, geographic concentration
      is material: Mitsubishi Heavy Industries and Osaka Gas together represent Japan-centric industrial demand,
      accounting for a disproportionate share of Koloma's disclosed strategic capital. Third, sector concentration
      exists in the industrial fossil-fuel transition use cases, with three of five named customers tied to
      petroleum refining or ammonia production — sectors whose hydrogen demand could be at risk from longer-term
      structural decline in fossil fuel refining as the energy transition progresses. Fourth, and most critically,
      zero binding commitments exist across all five customers: if Koloma achieves commercial production but
      fails to convert any of its five investor-customers to paying offtake buyers, its revenue concentration
      risk becomes an existential commercial failure. Expansion beyond the current five named investor-customers
      requires Koloma to develop an arm's-length customer pipeline — utilities, industrial buyers, or offtakers
      with no equity stake — which has not yet been publicly initiated. The Hydrogen Council's demand forecasts
      support large addressable volumes in ammonia and refining, but converting sector demand into Koloma-specific
      signed contracts requires production proof that does not yet exist.
    claimRefs:
      - CU032
      - CU033
      - CU034
      - CU035
      - CU036
      - CU037
    tableRefs:
      - TU005
    figureRefs: []

