callouts:
  - calloutType: strength
    title: High-quality industrial buyer signal through equity commitment
    body: >-
      Koloma has secured equity investment from five of the highest-quality industrial hydrogen buyers and
      deep-tech investors in the world: MHI (Japan''s largest industrial conglomerate), Osaka Gas (Japan''s
      second-largest gas utility), United Airlines Ventures (founding member of the Sustainable Flight Fund),
      BP Ventures (integrated energy major), and Breakthrough Energy Ventures (Bill Gates-backed deep-tech fund).
      These investor-customers validate the industrial demand thesis and create a pre-seeded demand pipeline
      that most pre-commercial energy startups lack. Their official press releases constitute genuine customer-proof
      evidence of future offtake intent.
    claimRefs:
      - CU003
      - CU010
      - CU012
      - CU014

  - calloutType: risk
    title: Zero binding commitments despite $453M raised — critical commercial gap
    body: >-
      Despite raising approximately $453 million in disclosed funding, Koloma has not publicly disclosed a
      single letter of intent, offtake agreement, pilot supply contract, or even a preliminary commercial
      framework with any of its five named investor-customers as of May 2026. S&P Global explicitly flagged
      this in January 2025 as a transparency and commercial progress concern. The dual role of investor-customers
      as both equity holders and potential buyers creates structural tension, and the absence of arm''s-length
      offtake negotiations raises questions about whether investor relationships will convert to commercial
      supply agreements once production economics become clear.
    claimRefs:
      - CU004
      - CU017
      - CU018
      - CU034

  - calloutType: insight
    title: Japan concentration creates geopolitical optionality and single-market risk
    body: >-
      MHI and Osaka Gas together represent Japan''s dominant industrial hydrogen demand signal within Koloma''s
      investor-customer base, reflecting Japan''s aggressive national hydrogen strategy and its geographic
      distance from US natural hydrogen production sites. This concentration creates both an opportunity
      (Japan''s policy-driven hydrogen demand is among the most credible globally) and a risk (Japanese buyers
      may face logistical, regulatory, or geopolitical constraints in sourcing US-produced natural hydrogen).
      Koloma''s $0.50-1.50/kg target would need to survive transportation and terminal costs to be competitive
      at Japanese industrial sites, a factor not yet publicly addressed in any investor communication.
    claimRefs:
      - CU033
      - CU009
      - CU035

