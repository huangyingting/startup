figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    summary: >-
      Journey of an industrial hydrogen buyer from initial market awareness through strategic equity investment
      to first commercial hydrogen delivery, showing the stages Koloma''s investor-customers have completed
      and the stages that remain ahead. All five named investor-customers have reached Stage 3 (strategic equity
      commitment). Stages 4-7 are forward-looking milestones yet to be achieved.
    data:
      nodes:
        - id: n1
          label: Industrial Buyer Identifies H2 Need
          description: Refinery, ammonia producer, steel manufacturer, gas utility, or airline identifies a large-volume clean hydrogen requirement driven by decarbonization mandates or economics
        - id: n2
          label: Evaluates Natural H2 Economics
          description: 'Comparative cost analysis: natural H2 target $0.50-1.50/kg vs green H2 $3-7/kg vs grey H2 $1-2/kg; assesses supply security and carbon intensity'
        - id: n3
          label: Strategic Equity Investment
          description: Buyer signals long-term offtake intent via equity investment in Koloma (all five named customers completed this stage between 2022-2024)
        - id: n4
          label: Technical Due Diligence and Data Review
          description: Review of geological data, well results, reservoir models, production timeline, and carbon intensity certification methodology
        - id: n5
          label: LOI or Offtake Framework Negotiation
          description: Preliminary binding intent negotiation covering price, volume, delivery terms, IRA 45V PTC pass-through, and carbon certification (not yet reached by any customer)
        - id: n6
          label: Pilot Supply Agreement
          description: First commercial-scale supply contract for pilot hydrogen deliveries upon proven well productivity (not yet reached; requires commercial well result first)
        - id: n7
          label: Full Commercial Offtake Contract
          description: Long-term supply agreement at commercial volume and price; requires demonstrated reservoir sustainability, regulatory clarity, and delivery infrastructure (not yet achieved globally)
    approximationNotes: >-
      All five named investor-customers (MHI, Osaka Gas, UAL Ventures, BP Ventures, BEV) have completed
      stages 1-3 via equity investment. Stages 4-7 are forward-looking and depend on commercial production
      milestones that have not yet been achieved by Koloma or any natural hydrogen company globally as of May 2026.
    claimRefs:
      - CU022
      - CU023
      - CU025

