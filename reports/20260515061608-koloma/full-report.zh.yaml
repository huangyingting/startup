companyProfile:
  summary: >
    Koloma 是一家总部位于 Denver、注册在 Delaware 的天然氢公司，2021 年由 Pete Johnson（CEO）、Paul Harraka（CBO）和 Tom Darrah（CTO）创立。公司用 AI
    驱动的地质建模、地震成像、卫星数据和自研地球化学采样，寻找并开发地下构造；这些构造中的氢通过超镁铁质岩蛇纹石化等非生物过程生成。Koloma 于 2023 年 7 月走出隐身，宣布由 Breakthrough Energy
    Ventures 领投的 $91 million Series A；随后在 2024 年 2 月完成由 Khosla Ventures 领投的 $245.7 million Series B，并在 2024 年 10 月完成
    $52.4 million 延展轮，引入 Mitsubishi Heavy Industries 和 Osaka Gas 作为战略投资方。截至 2026 年 5 月，Koloma 累计融资约 $403 million，员工约 69
    人，在 Kansas（以 High Plains Resources 名义）和 Idaho（以 Cascade Exploration 名义）推进勘探项目，并在 Ohio State University 的 Energy
    Advancement and Innovation Center 设有研究枢纽。公司尚无收入，也未公开披露井流量或生产结果。
  foundedDate: '2021-01-01'
  founders:
    - name: Pete Johnson
      role: CEO 兼联合创始人
      background: 连续创业者、能源行业高管，曾创办清洁能源公司。
