              研究枢纽合作和机构化股权结构，近期仍站得住；但如果技术结果落后于资本规模，这些优势会被侵蚀。其声称的 AI 勘探模型在油藏结果验证之前仍难以差异化。来自 S&P Global Commodity
              Insights（「quiet on next step」）、GEO ExPro（「Koloma Enigma」以及明确提出 Cascade Exploration 可能是在氢叙事下勘探烃类）和 Canary
              Media（地质氢是否发挥任何作用仍是开放问题）的反向评论，都是不对称风险，因为它们瞄准的是 Koloma
              本身，而非整个板块。工业气体巨头带来的替代风险——一旦油藏经济性得到证明，它们可以收购纯玩家，或凭基础设施直接竞争——是最重要的长期威胁。近期看，由于油藏不可互换，同质化风险较低；若中游管道出现，风险会上升。
