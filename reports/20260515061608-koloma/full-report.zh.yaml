              家活跃天然氢勘探公司，多数披露融资低于 $50 million。直接同业包括 Hyterra（ASX 上市，Kansas 勘探区块毗邻 Koloma 的 High Plains Resources
              子公司）、Gold Hydrogen（ASX 上市，South Australia）和 Natural Hydrogen Energy LLC（美国先行者，2019 年在 Nebraska
              钻探了早期井）。现有工业气体生产商——Air Liquide、Linde 和 Air Products——凭灰氢 SMR 以及选择性绿氢 / 蓝氢项目主导全球氢生产，但尚未进入天然氢勘探。相邻绿氢生产商（Plug
              Power、Nel、ITM Power）以更高成本的生产基础，争夺同一低碳氢需求池。潜在进入者包括具备地下专业能力的油气巨头——BP Ventures 和 Chevron Technology Ventures
