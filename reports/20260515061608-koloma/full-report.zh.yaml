      - number: '2.2'
        title: TAM/SAM/SOM 与多视角测算
        blocks:
          - type: paragraph
            body: >-
              市场测算需要多重视角，因为没有单一发布方给出严谨的天然氢收入预测。MarketsandMarkets 估算，整体氢市场 2024 年约 $224 billion，到 2030 年约 $311
              billion，CAGR 为 6.8%——这是 TAM 视角。IEA 用体量表达需求（97 Mt），并指出低排放氢占比不到 1%，从而界定 SAM。U.S. DOE Clean Hydrogen Strategy
              and Roadmap 预计，到 2050 年，美国氢需求可升至 50 million tonnes，覆盖重型运输、工业和电力。天然氢本身的公开记录仍由投资牵引：Drilling for Hydrogen
              报道，全球私人资本在 2026 年初跨过 $1 billion；Rystad Energy 统计约 40 家活跃勘探公司（2020 年为 10 家）。到 2030
              年，天然氢可服务可获取市场今天最好只给一个方向性的 $1-3B 区间——该区间自上而下来自以 $1-2/kg 价格替代约 1% 灰氢需求，并明确标注为内部估算，而非同行评审数字。
