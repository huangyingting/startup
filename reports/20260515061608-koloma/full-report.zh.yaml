      - number: '6.3'
        title: 具名战略投资者兼客户——证据分析
        blocks:
          - type: paragraph
            body: >-
              五个具名战略投资者兼客户代表不同类型的工业氢需求，也提供强弱不一的客户证据。Mitsubishi Heavy Industries 参与了 Koloma 2024 年 8 月的 Series B
              融资，并在延长轮中继续投资，显示出多年持续承诺。MHI 在 2024 年 10 月的新闻稿中确认，投资目的在于为其工业运营锁定未来天然氢供应，因此它是 Koloma 目前最强的客户证据来源。Osaka Gas 在
              2024 年 10 月发布新闻稿，确认 $50 million 战略投资，并称理由是分散氢采购策略。United Airlines Ventures 是 Sustainable Flight Fund（2022
              年启动）的创始成员，也参与了 Koloma 的早期融资，把天然氢作为潜在清洁原料接入可持续航空燃料供应链。BP Ventures 是 Koloma 种子轮和 Series A
              的早期投资者，代表综合能源巨头的炼油氢需求板块。Breakthrough Energy Ventures 自 Koloma 2021
              年创立以来提供早期资本，更多代表深科技气候投资者信号，而不是直接的工业氢买方。尽管投资者兼客户基础多元，五段关系都没有任何有约束力的商业承诺：没有 LOI，没有试点交付，也没有公开披露任何产量或价格条款。S&P
              Global 2025 年 1 月的反向报道明确指出这一缺口；Breaking Energy 和 BusinessWire
              也只佐证了投资事实，没有报道任何承购进展。客户证据完全建立在股权基础上，性质仍是商业化前。
