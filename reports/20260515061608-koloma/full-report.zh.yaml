      - number: '2.3'
        title: 买家分层和采用路径
        blocks:
          - type: paragraph
            body: >-
              氢买家分为两类：工业商品需求（炼油、氨、甲醇——当前灰氢消费的大头）和新兴低碳需求（钢铁直接还原、航空
              SAF、燃气公用事业掺混和电网调峰）。工业买家对成本平价高度敏感，采购组织占主导，预算负责人通常要求价格与灰氢相当，最多只接受小幅可持续溢价。新兴买家受 EU CBAM、RefuelEU、U.S. SAF
              Grand Challenge 和企业净零承诺驱动，愿意接受更高价格，但 2026 年的采购成熟度较弱。Koloma 的股权结构信号有信息量：United Airlines Ventures 暗示航空 SAF
              需求兴趣，Mitsubishi Heavy Industries 和 Osaka Gas
              则暗示亚洲工业和燃气公用事业需求。采用漏斗从油藏发现到试点生产，再到商业承购；每个阶段的转化率对天然氢而言都尚未被证明。本地许可风险——Koloma 的 Idaho Cascade
              钻探已引发居民担忧——是主流测算模型尚未纳入的约束。
