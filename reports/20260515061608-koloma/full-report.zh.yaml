      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Koloma 面临的最重要单一风险，是天然氢勘探和生产缺少联邦监管框架。石油、天然气、煤炭和地热能源都有成熟的许可制度、租赁结构和环境审查流程；天然氢截至 2026 年 5
              月仍处在监管真空。美国土地管理局（BLM）尚未明确，氢气是否属于 1920 年 Mineral Leasing Act 所管辖的、可租赁矿产；该法管理联邦土地地下资源开采。这种不确定性给 Koloma
              在联邦土地上的任何运营都提出根本问题：公司需要标准油气租约、地热租约，还是一种新的氢专属租约？DLA Piper 2024 年 6
              月对天然氢的法律分析明确点出这一缺口，称联邦天然氢监管仍处萌芽期，没有成熟许可先例。EPA 在 Clean Air Act
              权限下拥有一般氢安全法规，但大型天然氢开采场址的专门空气质量许可路径尚未建立，也未经过测试。

              IRA Section 45V 清洁氢生产税收抵免为生命周期排放低于 0.45 kg CO2e/kg H2 的绿氢提供最高 $3/kg 的补贴，但并未明确承认或认证天然氢。DOE 的 Clean Hydrogen
              Strategy and Roadmap 承认天然氢是潜在来源，却没有建立认证路径。Koloma 若想受益于 45V，需要 DOE 或财政部作出专门裁定，覆盖天然氢的生命周期碳强度。这一监管不确定性意味着
              Koloma 的天然氢目前会在没有 45V 补贴的情况下销售，而绿氢竞争对手可以拿到补贴，从而削弱成本竞争力叙事。S&P Global 2025 年 3
              月的监管报道确认，联邦框架仍未定义。知识产权方面，Koloma 没有公开披露带有具体专利号或范围的完整专利组合，存在 IP 泄漏风险。地表权与矿权冲突在美国油气业务中常见；天然氢尚未经历检验，但在 Koloma
              持有矿权而不持有地表所有权的任何地块，都可能引发诉讼风险。
