      - number: '8.5'
        title: 可比估值、退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              Koloma 的可比公司集合很薄，而且天然不完美，因为天然氢作为商业资产类别仍很新。澳交所上市的 Gold Hydrogen（GHY.AX）是最直接的上市可比公司：同样是尚无收入的天然氢勘探公司，在 South
              Australia 拥有地块，2024–2025 年市值约为 $40–80 million AUD。Koloma $600–900 million 隐含投后估值相对 Gold Hydrogen 公开市场价值的
              10–20× 溢价，可能部分反映其更大的美国地块、更先进的勘探项目和更深的投资者基础；但相对天然氢勘探阶段公司的公开市场基准，也引入了显著高估风险。

              Plug Power（PLUG）2024–2025 年在 NASDAQ 的市值约 $1.2 billion USD，为公开市场如何给氢能公司定价提供了远距离收入阶段参照。不过 Plug Power
              每年从燃料电池和电解槽系统获得超过 $800 million 收入，与 Koloma 商业化前、尚无收入的阶段直接可比性有限。FuelCell Energy（FCEL）$200–400 million
              市值提供了类似的远距离收入阶段参照。Hydroma Inc. 在 Mali 运营一个约 5 Nm³/hr 的小型天然氢试点，是唯一另一个有记录天然氢生产的实体，但规模远低于商业阈值，商业模式也未公开披露。CB
              Insights 和 McKinsey 都把天然氢置于早期勘探阶段：商业潜力可能改变格局，但尚未证明。

              截至 2026 年 5 月，Koloma 还不具备 IPO 条件。公司没有收入、没有商业化生产，也没有产品收入预测；在当前市场环境下，这些都是成功清洁技术 IPO 的最低要求。更可能的近期退出路径，是被
              MHI、BP、Osaka Gas 或其他大型能源公司战略收购，前提是井数据为正面。任何投资建议上调前，必须回答五个最终尽调问题：公开披露 Kansas 和 Idaho 测试井的商业井流量与氢纯度；确认 DOE
              或财政部 IRA 45V 认证状态和时间线；披露 Series B 条款清单，包括优先条款和稀释结构；至少与一个战略投资者兼客户签署有约束力承购或意向书；完整披露专利组合范围，包括地域覆盖和权利要求。
