      - number: '4.6'
        title: 关于收入质量、利润率路径和资本强度的财务结论
        blocks:
          - type: paragraph
            body: >-
              2026 年看 Koloma 的财务结论很直接：收入质量无法验证，因为没有披露收入；利润率路径理论上有吸引力（若油藏规模化验证，$0.50-1.50/kg
              目标意味着很高毛利），但商业层面未证实；资本强度高且前置；有约束力的尽调堵点是单井经济、已签承购承诺和油藏工程验证。S&P Global Commodity Insights
              已明确把资本与进展的比例描述为财务担忧。清晰的上行情景取决于：（a）Kansas 和 / 或 Idaho 的成功井验证并给出商业流量，（b）DOE Hydrogen Hub
              或规模化拨款延长现金跑道，（c）战略投资人围绕前瞻承购提供过桥融资。下行情景则是 Koloma 已融资 $403M 却继续没有商业验证，最终被迫以无法保住可信度的估值下调轮融资。无论哪种情形，未来 24
              个月的井结果和承购披露，都是任何承销模型最重要的输入。
