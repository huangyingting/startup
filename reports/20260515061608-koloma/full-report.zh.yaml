      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Koloma 的运营风险主要来自商业规模井产能的根本不确定性。公司在 Nemaha Ridge, Kansas（2022-2023）和 Twin Peaks 1W, Idaho（2024）钻了测试井。S&P
              Global 2025 年 1 月报道 Kansas 井结果令人鼓舞但未披露细节，Hydrogen Fuel News 也报道 Idaho 测试井释放积极信号。不过截至 2026 年 5 月，Koloma
              没有公开披露任何商业井流量、氢纯度或储层寿命估计。这是核心运营不确定性：整个投资逻辑都押在公司能以商业规模和纯度生产氢气，证据却仍完全私有。GeoExpro 对 Koloma 方法论的批判分析提出疑问：为
              Kansas 克拉通内部氢聚集开发的地质模型，能否直接迁移到 Idaho 玄武岩地层；两个地质省中的氢生成机制差异很大。

              氢纯度是关键技术变量。天然氢储层通常含有 H2、甲烷、氦气、CO2、氮气和微量烃类的混合物。甲烷伴产会拉高采出气的碳强度，可能抹掉支撑 Koloma 目标定价的清洁能源经济性。地下微生物消耗 H2
              是学术文献中已有充分记录的现象，会随时间显著降低有效流量，并可能让储层枯竭早于模型预期。SPE 天然氢技术委员会指出，储层枯竭和微生物污染是全球天然氢勘探的主要技术风险之一。Koloma
              的运营执行还依赖第三方技术伙伴：Fleet Space Technologies 提供被动源地震勘测，Xcalibur Mapping 提供航空电磁勘测数据。Koloma 没有披露自有地震或 AEM
              勘测能力，结构上依赖这两家供应商。Electrek 和 Canary Media 发表过怀疑分析，质疑天然氢能否实现商业规模生产，以及地质模型能否跨地质环境迁移。
