      - number: '6.4'
        title: 客户采用路径
        blocks:
          - type: paragraph
            body: >-
              Koloma 的客户采用路径，更像一个分阶段漏斗：从广泛工业氢市场认知，走到战略股权承诺；关键的商业转化阶段——LOI、试点供货和商业承购——还没有发生。基于 IEA 和 Hydrogen Council
              的需求数据，全球每年消耗超过 10,000 tonnes 的工业氢买方估计约 200 家。其中只有一小部分目前了解并参与天然氢勘探机会。Koloma
              已经成功把五个参与方转化为股权投资者，说明高质量工业氢买方确实有拉力。但截至 2026 年 5 月，全球整个天然氢行业承购承诺仍为零，这构成行业层面的商业化前基线。Koloma
              的采用时间线必须先取得可支撑承购经济性的商业流量井结果；再把该结果转成与至少一个投资者兼客户的 LOI
              或条款协议；之后签署初始交付的试点供货协议；最后扩大到完整商业供货合同。这些阶段没有一个已经达成。氢气钻探板块增长很快——三年内已披露融资从约 $0 增至 $1 billion——这意味着 Koloma
              在竞争对手之前证明采用进展的压力正在加大。Canary Media、Bloomberg 和 Axios 都报道了 Koloma 融资，却没有报道任何客户采用里程碑，进一步印证商业牵引缺位。
