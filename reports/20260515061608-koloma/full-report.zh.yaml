  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 地下科学和地质基础
        blocks:
          - type: paragraph
            body: >-
              Koloma 的勘探逻辑建立在成熟地球科学之上：自然存在的分子氢通过两种主要机制在地下富集。第一是蛇纹石化，即水与富含铁或镁的超镁铁质岩（橄榄岩、纯橄岩）反应，在橄榄石氧化过程中生成 H2
              副产物。第二是辐解，即结晶基底岩中的铀、钍和钾-40 释放 alpha 粒子，把水分子裂解。两种机制都写入了同行评审文献，包括 2024 年 Nature Communications Engineering
              综述和 Geological Society of America 的 2023 年 Geology 论文；USGS 也承认这是新兴能源资源。Kansas 的 Nemaha Ridge 是 Koloma
              的首要目标：它是古老构造缝合带，薄层沉积盖层下暴露超镁铁质和镁铁质结晶基底岩，为蛇纹石化生成的 H2 富集创造了有利条件。Idaho 玄武岩地层是次级且更具争议的目标，其地质适配性已被 GeoExpro
              质疑。甲烷是天然 H2 系统中的常见副产物，因为微生物可能消耗 H2 并产生 CH4，从而影响纯度和碳强度。天然 H2 生成的地球科学基础扎实，但 Koloma
              目标点位是否存在足够油藏并具备可持续流量，商业问题在公开记录中仍无答案。
