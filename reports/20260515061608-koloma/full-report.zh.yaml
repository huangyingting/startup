      - number: '5.2'
        title: 技术栈、自研方法和竞争差异化
        blocks:
          - type: paragraph
            body: >-
              Koloma 的勘探平台整合了五个不同技术层：现场地球化学采样、航空电磁测量、卫星地震成像、AI 地质靶区选择和地下井开发。地表地球化学调查使用便携式气相色谱仪，在土壤或近地表检测 H2
              通量，从而以低成本快速筛选盆地。航空 EM 层由 Xcalibur Smart Mapping 提供；这家公司专长航空电磁和磁测，可在盆地尺度绘制地下构造特征。卫星地震层由 Fleet Space
              Technologies 提供；其 ExoSphere 系统用卫星连接节点记录的环境地震噪声，生成全波形 3D 地下模型。AI
              建模引擎吸收上述全部输入——地球物理异常、地球化学信号、地震速度数据和已发表地质图——按可行 H2 富集概率排序并优先安排钻探目标。Koloma
              声称这种整合构成自研勘探系统，但具体算法细节、训练数据来源和模型验证记录均未公开。相较 Gold Hydrogen（Australia，土壤气采样和浅层地震）与 HyTerra（Kansas /
              Nemaha，磁测），Koloma 的竞争差异化主要来自多模态数据整合、Fleet Space 卫星地震能力（截至 2025 年初在天然 H2 板块独有）以及 Ohio State EAIC 合作。截至 2026
              年 5 月，未公开识别到 Koloma 技术已授权的美国专利。估计碳强度为 0.4 kg CO2e/kg H2（Rystad / Energy Institute），是其区别于灰氢（$\sim$10 kg
              CO2e/kg）和蓝氢（$\sim$3-5 kg CO2e/kg）的关键点。
