  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重程度排序的风险概览
        blocks:
          - type: paragraph
            body: >-
              Koloma 的风险画像由四个关键级风险主导，且短期没有缓释路径：天然氢生产缺少联邦监管框架、商业规模井产能未经证明、创始科学家 Tom Darrah
              造成关键人物集中，以及零收入覆盖下继续依赖风险资本。其下第二层高严重度风险包括 BLM 矿权不确定性、合作伙伴技术集中、无法使用 IRA 45V 税收抵免，以及 Idaho
              玄武岩地层地质不确定性。公司尚无收入，意味着所有财务和商业风险同时升高——没有收入缓冲可以吸收执行延误、监管受挫或关键人物流失。

              六个风险域——监管 / 法律、运营 / 技术、合作伙伴 / 依赖、财务 / 模型、人员 / 执行，以及市场 /
              商业——中，关键到高严重度风险登记表至少包含十五个单项重大风险。风险热力图（FR001）显示，风险最密集的区域是高到关键影响、且高到中等可能性的象限；这对投资者最危险：风险既可能发生，破坏力也大。监管真空是投资逻辑级风险：如果联邦框架不出现，BLM
              也不明确氢气矿权地位，Koloma 无法大规模获得钻探许可，已投入的 $453 million 资本会被困住。反过来，如果监管清晰度出现，且首批商业井结果公开披露、流量超过 1 MMscf/d
              且纯度较高，风险画像会大幅收缩。每个头部风险都有可监测触发器，并在缓释表 TR005 中定义了投资逻辑失效阈值。
