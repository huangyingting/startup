  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户格局概览
        blocks:
          - type: paragraph
            body: >-
              Koloma 的商业位置独特也艰难：它是一家尚无收入、尚未商业化的天然氢勘探公司，已披露的 “客户” 全部是战略股权投资者；他们用资本承诺表达未来承购意向，而不是签下有约束力的供货协议。截至 2026 年 5
              月，公司已披露融资总额约 $453 million，但没有公开披露任何意向书、承购合同、试点供货协议，或任何交易对手的有约束力产量承诺。S&P Global Commodity Insights 在 2025 年
              1 月明确点出这一落差：Koloma 资本充足，却一直 “quiet on next steps”。公司公开点名的五个投资者兼客户——Mitsubishi Heavy Industries、Osaka
              Gas、United Airlines Ventures、BP Ventures 和 Breakthrough Energy
              Ventures——就是全部已披露具名客户关系。天然氢行业全球都处在商业化前阶段，还没有公司向付费客户实现商业规模供氢，因此 Koloma
              的阶段并不反常。它的客户开发难题有三层：把战略股权投资者转成有约束力的承购客户；先跑出足以支撑供货协议的商业化生产里程碑；并把客户管线从目前定义需求侧策略的五个具名投资者兼客户之外扩展开。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: 客户分层与目标用例
        blocks:
          - type: paragraph
            body: >-
              Koloma 的目标客户分层直接对应全球最大的工业氢用例。IEA 数据显示，全球工业氢市场每年消耗约 90 million
              tonnes，主要用在化肥合成氨、炼油与脱硫，以及越来越多的钢铁脱碳。这些场景需要大规模、连续供氢；如果成本和可靠性能被证明，地质氢自然会成为目标。Mitsubishi Heavy Industries
              锚定工业和炼油板块：MHI 在日本和亚洲运营炼厂和合成氨装置，氢是核心原料。Osaka Gas 代表日本燃气公用事业板块，正按日本国家氢能战略探索掺氢入网和供暖脱碳。United Airlines
              Ventures 代表可持续航空燃料路径，清洁氢可作为费托 SAF 合成原料。BP Ventures 锚定综合能源巨头板块，其全球资产都有炼油氢需求。Breakthrough Energy Ventures
              代表深科技气候板块，它的投资说明天然氢符合更大的工业脱碳逻辑。Koloma 的目标到货价为 $0.50-1.50/kg，远低于 $3-7/kg 的绿氢；如果能证明可规模化生产，五类客户都会高度感兴趣。
            claimRefs:
              - CU005
              - CU006
              - CU007
              - CU008
              - CU009
