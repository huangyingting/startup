  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入和排除的支出
        blocks:
          - type: paragraph
            body: >-
              与 Koloma 相关的天然氢市场位于更大的全球氢市场之内，但二者并不等同。IEA 称，2023 年全球氢总需求约为 97 million tonnes，低排放氢占供给不到 1%。清洁氢子板块——绿电电解、带
              CCS 的蓝氢，以及天然 / 地质氢——才是与 Koloma 相关的 SAM；传统蒸汽甲烷重整制得的灰氢是现状替代品，也是 Koloma 必须打穿的价格地板（约
              $1-2/kg）。天然氢板块本身排除所有人工制氢路径，纳入地下勘探、钻探 capex 和地面处理相关支出。相邻需求面——可持续航空燃料、航运用绿氨、直接还原铁带来的钢铁脱碳——同样重要，因为 Koloma
              股权结构中的战略投资人信号（United Airlines Ventures、Osaka Gas、Mitsubishi Heavy Industries）直接对应这些相邻买家池。
            claimRefs:
              - CM001
