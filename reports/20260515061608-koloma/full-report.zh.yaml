              估计为低个位数百万美元，但会随深度和地理位置显著变化；Koloma 没有披露单井经济。按 $0.50-1.50/kg 目标价格看，毛利经济理论上有吸引力，但前提是把钻探 capex
              在多年油藏寿命内摊到高体量油藏上——这个假设在商业规模上未经验证。R&D opex（Ohio State 研究枢纽、Darrah 牵头科学）应与钻探 capex 分开建模。服务交付成本高度依赖第三方供应商，因为约
