              截至 2026 年 5 月，尽管已披露融资约 $453 million，Koloma 仍没有公开披露与五个具名投资者兼客户中任何一方签署的意向书、承购协议、试点供货合同，甚至初步商业框架。S&P Global 在
              2025 年 1 月明确把这点列为透明度和商业进展问题。投资者兼客户既是股东又是潜在买方，这种双重角色制造结构性张力；没有公平交易承购谈判，也让人质疑一旦生产经济性变得清晰，这些投资者关系能否转成商业供货协议。
