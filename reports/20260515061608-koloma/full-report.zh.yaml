      - number: '6.6'
        title: 扩张潜力与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Koloma
              的客户组合在多个维度上存在显著集中度风险。第一，五个具名客户同时都是股权投资者，结构上会在投资回报最大化和承购价格谈判之间制造冲突：希望拿到最低氢价的客户，可能与追求最高公司估值的投资者相冲突。Koloma
              的公开披露中没有为这种双重角色设定治理框架。第二，地域集中度很重：Mitsubishi Heavy Industries 和 Osaka Gas 共同代表以日本为中心的工业需求，占 Koloma
              已披露战略资本的份额过高。第三，行业集中在工业化石燃料转型用例；五个具名客户中有三个与炼油或合成氨生产相关，随着能源转型推进，化石燃料炼制长期结构性下行可能威胁这些板块的氢需求。第四，也是最关键的一点，五个客户都没有有约束力的承诺：如果
              Koloma 实现商业化生产，却无法把五个投资者兼客户中的任何一个转成付费承购买方，它的收入集中度风险会直接变成生存级商业失败。要走出当前五个具名投资者兼客户，Koloma
              需要建立公平交易的客户管线——公用事业、工业买方，或没有股权的承购方——但公开信息尚未显示公司已经启动。Hydrogen Council 的需求预测支持合成氨和炼油中的大规模可触达体量，但把行业需求转成
              Koloma 自己签下的合同，还需要尚不存在的生产证据。
