      - number: '7.6'
        title: 图表与证据
        blocks:
          - type: callout
            title: 监管真空是近期最重大的投资风险
            body: >-
              天然氢生产缺少联邦监管框架，不只是程序缺口，而是 Koloma 商业时间线的生存级风险。没有 BLM 矿权清晰度、EPA 许可先例和 IRA 45V 认证，Koloma
              就无法在联邦土地上合法商业规模开采和销售天然氢，也无法申请绿氢竞争对手可用的补贴。DLA Piper 2024 年 6 月分析确认，美国天然氢法律仍处早期；S&P Global 2025 年 3
              月报道指出监管框架仍未定义。监管真空每拖一个月，商业化生产时间线就延长一个月，也继续消耗有限的 $453 million 资本基础。
            calloutType: risk
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
          - type: callout
            title: 对 Tom Darrah 的关键人物依赖带来非对称下行风险
            body: >-
              Tom Darrah 同时是 Koloma
              联合创始人、首席科学家，也是让公司区别于所有竞争对手的地球化学指纹识别方法的学术架构师。他离职不只是留下一个领导岗位空缺，而会削弱核心科学方法。公司没有披露继任计划，也没有点名同等学术伙伴。对于按 Series
              B 估值投入资本的投资者来说，没有披露关键人物缓释安排会造成非对称下行：Darrah 留任的上行已被计入价格；他离职的下行没有。
            calloutType: risk
            claimRefs:
              - CR036
              - CR037
              - CR038
              - CR039
          - type: callout
            title: 未经证明的井产能是所有风险之上的投资逻辑失效枢纽
            body: >-
              监管真空是最显眼的即时风险，但最终让投资逻辑失效的是井产能。如果 Koloma 披露商业井流量超过 1 MMscfd、H2
              纯度较高，监管路径会在投资者和政策压力下跟上——经济性足够诱人，可以撬动政治意愿。反过来，如果披露井结果低于商业阈值，再多监管清晰度也救不了投资案。因此，投资者的监测优先级应放在井结果披露，而不是监管案卷跟踪；前者才是最可执行的投资逻辑信号。
            calloutType: insight
            claimRefs:
