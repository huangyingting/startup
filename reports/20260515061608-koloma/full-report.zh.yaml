            title: 高质量工业买方通过股权承诺发出信号
            body: >-
              Koloma 已获得全球最高质量工业氢买方和深科技投资者中的五家股权投资：MHI（日本最大的工业集团）、Osaka Gas（日本第二大燃气公用事业）、United Airlines
              Ventures（Sustainable Flight Fund 创始成员）、BP Ventures（综合能源巨头）和 Breakthrough Energy Ventures（Bill Gates
              支持的深科技基金）。这些投资者兼客户验证了工业需求逻辑，也预先种下了一条多数商业化前能源初创公司不具备的需求管线。它们的官方新闻稿构成真实的客户证据，说明未来存在承购意向。
