      - number: '5.4'
        title: 技术成熟度、信任和合规位置
        blocks:
          - type: paragraph
            body: >-
              Koloma 各模块的技术就绪度差异很大。地表地球化学采样（便携式 H2 GC 分析）是成熟技术（TRL 7-8），只是应用到改造后的场景。航空 EM 和磁测是行业标准地球物理方法（方法本身 TRL 8-9，用于
              H2 定向则为 TRL 5-6），由 Xcalibur 基于现有商业合同运营。Fleet Space 的 ExoSphere 卫星地震系统已在矿产勘探中得到证明（基础技术 TRL 6-7），但尚未在天然 H2
              上规模化测试（该应用 TRL 4-5）。Koloma 自研 AI 地质建模引擎最不透明；鉴于缺少与商业结果相对照的验证，它很可能处在 TRL 3-5。结晶基底钻井为 TRL
              6-7（把标准深井钻探用于特殊目标地层）。天然 H2 的商业开采、净化和交付基础设施尚不存在，处于 TRL 1-2。信任和合规支柱包括：ARPA-E 资金同行评审（约 $0.9M R&D 验证）、OSU EAIC
              独立学术岩芯分析、Kansas 和 Idaho 州级井许可，以及钻探作业的标准行业健康安全协议。截至 2026 年 5 月，美国没有联邦天然氢生产监管框架，给商业开发带来法律不确定性。未公开识别到 Koloma
              的 AI 模型或测量协议有已授权美国专利；商业秘密保护可能是主要路径。若 DOE 认证生命周期方法，IRA 45V 生产税收抵免（H2 <0.45 kg CO2e/kg H2 时为 $3/kg）可适用于天然
              H2，带来重要合规上行。
