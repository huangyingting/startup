      - number: '8.3'
        title: 融资历史与估值背景
        blocks:
          - type: paragraph
            body: >-
              Koloma 的融资历史包括三笔已披露资金，合计约 $453 million。2024 年 8 月 27 日宣布的 Series B，从 Khosla Ventures、Breakthrough Energy
              Ventures、United Airlines Ventures、BP Ventures、MHI 和 Osaka Gas 融资 $403 million，是全球天然氢板块最大单笔风险投资轮之一。Osaka
              Gas 在 2024 年 10 月 1 日单独宣布 $50 million 战略投资，显示这家日本能源集团继续看好，也把已披露融资总额推至约 $453 million。更早的 Series A
              没有完整公开披露，但 CB Insights 和 Tracxn 档案确认，公司自 2021 年创立以来一直获得风险资本支持。

              Series B 的投后估值没有得到任何投资者、SEC 文件或公司披露公开确认。这里推断的 $600–900 million 区间，来自 $403 million 融资额，以及 2024
              年早期清洁能源风险投资轮的典型定价惯例；资本密集型勘探公司通常能拿到融资额 2–4× 的投后估值。这个推断具有投机性，无法从公开数据佐证。PitchBook 和 Tracxn 提供 Koloma
              公司档案，但没有披露投后估值。Koloma 的 SEC Form D 文件确认了 Regulation D 发行结构，但没有披露优先条款、清算瀑布或按比例跟投权；这些信息对评估早期投资者稀释暴露都很重要。

              财务可持续性风险很大。Koloma 约有 69 名员工，并在 Kansas 和 Idaho 主动勘探，估计年运营支出为 $40–100 million。按中位数计算，$403 million Series B
              意味着大约四到七年的现金跑道，公司无需追加融资也应有资本支撑到 2028–2031 年。不过，如果商业结果延后或令人失望，条款不利的桥接轮或 Series C 会显著稀释早期投资者。BNEF 预测，到 2030
              年绿氢成本会降至 $2–3/kg；如果天然氢生产成本高于目标，这会部分侵蚀成本竞争力叙事。任何情景下，2029 年前都不预期有商业收入。
