    summary: Koloma 在乐观、基准、悲观情景下的低到高估值区间（$M），并与当前推断的隐含投后估值比较。
    data:
      items:
        - label: 乐观情景估值（$M）
          low: 2000
          high: 5000
        - label: 基准情景估值（$M）
          low: 300
          high: 700
        - label: 悲观情景估值（$M）
          low: 0
          high: 80
        - label: 当前隐含 PMV（$M，推断）
          low: 600
          high: 900
    approximationNotes: PMV 根据 $403M Series B 规模和 2024 年清洁能源风险投资定价惯例推断；未获任何公开来源确认。情景区间是尽调估计，不是精算结果。
    claimRefs:
      - CV023
      - CV031
      - CV032
      - CV033
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: wide
    summary: 截至 2026 年 5 月，Koloma 在八个投资维度上的 IC 可用评分，反映市场潜力与已验证证据之间的不对称。
    data:
      items:
        - label: 市场机会
          score: 9/10
          note: 全球清洁 H2 到 2050 年需求巨大；若天然 H2 可被证明达到 $0.50–1.50/kg，会改写市场
        - label: 技术验证
          score: 2/10
          note: 融资 $453M、钻探四年多后，仍没有公开披露流量或纯度数据
        - label: 成本竞争力（理论）
          score: 7/10
          note: $0.50–1.50/kg 目标远低于绿氢 $3–7/kg；但全球任何商业规模下都尚未验证
        - label: 监管准备度
          score: 2/10
          note: 无联邦许可框架；截至 2026 年 5 月，天然 H2 无法获得 IRA 45V 认证
        - label: 战略投资者深度
          score: 7/10
          note: MHI、Osaka Gas、UAL、BP Ventures 验证需求；没有一家转化为约束性承购协议
        - label: 估值纪律
          score: 3/10
          note: 收入前隐含 $600–900M PMV 高度投机，相比公开天然 H2 可比公司也偏高
        - label: 退出准备度
          score: 2/10
          note: 尚不具备 IPO 条件；由大型能源公司进行战略收购是最可能退出路径
        - label: 证据质量
          score: 2/10
          note: 所有实质性证据均为私有；没有商业里程碑被公开确认；S&P Global 指出其未说明下一步
    claimRefs:
      - CV019
      - CV039
      - CV044
