      background: 地质学博士（University of Rochester）；曾任 Ohio State 地球科学正教授；拥有 20+ 年地下气体地球化学经验。
      claimRefs:
        - CO003
  foundingLocation: Dublin, OH (initial SEC filing address); later moved to Denver, CO
  headquarters: 1900 Grant Street, Suite 1250, Denver, CO 80203
  productSummary: >
    Koloma 的产品是从超镁铁质和结晶基底岩层中发现并开采的地质（天然）氢。公司用一套自研勘探流程，把 AI
    地质模型、航空电磁与磁测、地震采集、地球化学采样结合起来。公司钻探测试井，评估地下氢浓度和纯度，再开发生产井。目标产物是高纯度（可能 >85%）氢，预计井口成本为
    $0.50–$1.50/kg，显著低于绿氢（$3–7/kg），并可与灰氢（$1–2/kg）竞争。
  customerFocus: >
    近期：战略工业气体合作伙伴（Mitsubishi Heavy Industries、Osaka Gas），它们既是投资方，也是潜在承购方。长期：需要低碳氢的炼油厂、氨 / 化肥生产商、钢铁制造商和航空业（United
    Airlines）。
  businessModel: |
    天然氢资源开采和批发供应。报告日仍处于商业化前阶段；无收入。预期收入模式是与工业买家签订长期承购合同。若碳强度达到 <0.45 kg CO2e/kg H2 门槛，IRA 清洁氢生产税收抵免（最高 $3/kg）可能带来显著上行空间。
  stage: Series B
