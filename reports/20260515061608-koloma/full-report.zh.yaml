            body: >-
              分销权明显偏向工业气体巨头。Air Liquide、Linde 和 Air Products
              拥有绝大多数既有氢管道和卡车运输网络，任何天然氢运营商都必须接入或复制这些网络。天然氢供应商之间很难多供应商并行，因为油藏不可互换——如果没有尚未存在的中游运输网络，买家很难逐个油藏切换供应商。这意味着一旦天然氢油藏达到商业生产，长期会有锁定收益，但前提是中游基础设施先建起来。最大工业买家的内部自建风险真实存在：炼油商和氨生产商历史上曾自建自用氢产能，可能选择投资自有油藏邻近生产，而不是从
              Koloma 这类供应商采购。Koloma 与 MHI、Osaka Gas 的关系，是战略供应侧动作，提供了小型同业没有的软性需求侧护城河，但尚未形成约束。
