      - number: '5.5'
        title: 开发路线图和关键技术合作
        blocks:
          - type: paragraph
            body: >-
              Koloma 的技术路线图已从地质逻辑（2021）推进到 Kansas 测试井（2022-23），再到多合作伙伴测量启动（2024-25）。2023 年 12 月，Ohio State Energy
              Advancement and Innovation Center（EAIC）启动，使学术 - 产业研究合作正式化，并为岩芯样本提供独立地球化学验证节点。2024 年 10 月的 Xcalibur Smart
              Mapping 航空 EM 合作，补上了商业地球物理测量能力。Fleet Space Technologies 卫星地震合作（2024 年 10 月宣布，2025 年 2
              月扩展）是技术上最有辨识度的部分：ExoSphere 全波形 3D 地下模型此前未应用于天然 H2 勘探，给 Koloma 带来潜在的 3D 成像先发优势。CTO 兼联合创始人 Tom Darrah 从 Ohio
              State University 带来 20 多年地下气体地球化学经验，直接锚定勘探逻辑的科学可信度。arxiv 和 GSA 论文给出的天然 H2 板块 TRL 基准确认，H2
              生成核心科学（蛇纹石化、辐解）已成熟，但从工程上转化为商业生产仍未证实。2026 年及之后的路线图需要三件事：首次披露商业流量井、签署首份承购协议，以及解决美国天然 H2
              监管框架。三项里程碑均仍未完成。该板块已从 2018 年约 5 家公司增长到 2025 年 40+ 家，加大了 Koloma 在先发优势窗口关闭前证明商业结果的竞争压力。
