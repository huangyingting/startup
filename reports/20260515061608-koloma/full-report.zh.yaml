      - number: '2.4'
        title: 增长驱动、采用约束和矛盾数据
        blocks:
          - type: paragraph
            body: >-
              增长驱动锚定在政策堆栈上——U.S. DOE Hydrogen Hubs 补贴、EU Hydrogen Bank 拍卖、RefuelEU SAF 强制要求，以及愿意为低碳分子支付溢价的企业自愿净零承诺。Trump
              政府在 2025 年逆转部分氢税收激励，是一个值得在尽调文件中继续保留的显著反向政治风险。采用约束更偏结构性：美国各州地下矿权监管不同，低体量氢的中游和运输基础设施稀薄，IEA 2024 年评审指出低排放项目
              FID 转化缓慢，工业气体巨头（Air Liquide、Linde、Air Products）又有资产负债表能力，在供应放量后通过 M&A 吸收天然氢纯玩家，或正面竞争。来自 S&P Global
              Commodity Insights、Canary Media 和 GEO ExPro 的反向公开评论，明确保留了天然氢是否会在能源转型中发挥任何作用的疑问。矛盾数据图景被有意保留：乐观的分析师测算、谨慎的
              IEA 体量估计、运营方侧的怀疑评论，以及仍未补上的严谨 SOM 估算。
