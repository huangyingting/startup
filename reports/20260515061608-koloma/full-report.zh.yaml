      - number: '8.4'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: >-
              三个情景勾勒出 Koloma 结果的可信区间。乐观情景被赋予 15% 概率，要求 Koloma 到 2028 年实现一口商业井，氢气产量超过 1 MMscf/d、纯度高于
              95%；从美国能源部或财政部取得天然地质氢的 IRA Section 45V 认证；并在 2029 年前与 MHI 或 Osaka Gas 签署有约束力的承购协议。在这些条件下，包含最高 $3/kg 45V
              税收抵免的实现氢价将达到 $3.50–4.50/kg，使天然氢能与所有清洁氢替代方案竞争。乐观情景下，到 2030 年估值预计为 $2–5 billion，支持潜在 IPO
              或战略收购。这个概率反映科学确实可能跑通，但需要同时通过大量二元门槛。

              基准情景被赋予 50% 概率，假设到 2030–2031 年实现有限商业化生产，监管不确定性持续，并且至少需要一轮追加稀释性融资。IRA 45V
              认证可能是部分覆盖或被推迟。承购协议会签下，但规模小于乐观情景。基准情景估值为 $300–700
              million——大致持平于当前隐含投后估值——对应一条科学在有限规模上成立，但经济性没有产生最初设想的变革性结果的路径。如果 Series C 或 D 按照等于或低于 Series B
              估值融资，就会显示公司正在走向基准情景。

              悲观情景被赋予 35% 概率，模型假设 Koloma 到 2032 年仍无法达到商业规模。驱动因素包括井产能低于经济阈值、缺少联邦监管框架、资本耗尽导致困境融资，或 Tom Darrah
              离职。在悲观情景下，Koloma 股权价值趋近于零。可能结果包括向大型能源公司出售 IP、许可地块，或清算资产。Rystad Energy 观察到天然氢勘探三年增长四倍，也意味着竞争对手先于 Koloma
              取得商业结果的概率正在上升，从而削弱 Koloma 的先发溢价。估值敏感性分析显示，IRA 45V 认证是一个二元放大器：单是有无认证，就解释了不同情景下预测价值 $500–1,500 million 的差距。
