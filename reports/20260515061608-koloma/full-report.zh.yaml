      - number: '5.3'
        title: 运营模型：从盆地筛选到井测试
        blocks:
          - type: paragraph
            body: >-
              Koloma 的运营模型沿着分阶段勘探漏斗推进。第 1 阶段（盆地筛选），现场地球化学人员在潜在点位采集 H2 通量样本，识别与地下生成相关的异常地表渗漏。第 2 阶段（地球物理测量），Xcalibur 航空
              EM 测量和 Fleet Space 卫星地震成像部署在优先盆地上，绘制地下架构——断裂带、基底地形和构造圈闭。第 3 阶段（AI 靶区选择），整合后的数据集进入 Koloma
              地质建模平台，识别概率最高的钻探点位。第 4 阶段（井开发），Koloma 聘用第三方钻井承包商，把勘探井和测试井钻入结晶基底；岩芯样本送至 OSU EAIC 做地球化学分析。第 5
              阶段（数据分析和决策），流量测试和纯度评估决定某一地点是否值得评价或开发。Koloma 在 2022-2023 年完成 Kansas 测试井（Nemaha Ridge，High Plains Resources
              子公司），并在 2024 年完成 Idaho 测试井（Twin Peaks 1W，Cascade Exploration 子公司）。S&P Global 报道 Kansas 井取得「encouraging
              results」，但具体流量和纯度数据未披露。GeoExpro 认为 Idaho 玄武岩地层中的该井存在技术争议。工业氢买家的客户工作流与勘探周期并行：MHI、Osaka Gas 和 United
              Airlines 等买家通过战略投资参与，释放未来承购意向，但没有公开披露有约束力的 LOI 或承购协议。除 Mali 的 Bourakébougou 外，全球没有任何商业阶段 H2 生产，这为 Koloma
              的运营环境确立了全球商业化前基线。
