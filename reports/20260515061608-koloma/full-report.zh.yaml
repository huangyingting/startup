      - number: '7.4'
        title: 合作伙伴、依赖与财务风险
        blocks:
          - type: paragraph
            body: >-
              Koloma 最严重的合作伙伴依赖，是关键地球化学专长集中在 Tom Darrah 领导的 Ohio State EAIC 研究合作关系中。这不是标准大学合作；它与 Koloma 的基础 IP
              交织在一起：Darrah 博士在 Ohio State 的研究组一直是地球化学指纹识别方法的主要来源，而这一方法区分了 Koloma 的勘探路径。如果 Darrah 博士离开 Ohio State，EAIC
              合作可能中断，进而影响 Koloma 的数据管线和研究产出。公开披露中没有这段研究关系的长期合同框架。Fleet Space Technologies 是唯一已披露的被动源地震数据提供方，Xcalibur
              Mapping 是唯一已披露的航空 EM 勘测数据提供方；公开来源中没有为任何一方点名备用供应商。Koloma 没有自有钻井能力，井作业完全依赖第三方承包商。

              财务依赖是第二个主要风险维度。Koloma 已披露融资总额约 $453 million，但没有收入，运营完全靠投资者资本。公司没有披露月度烧钱速度、当前现金余额或预计现金跑道。处在 Series B 阶段、拥有
              69 名员工，并在两个州开展主动勘探，保守估计年运营成本为 $40-100 million。若商业井结果不披露或令人失望，降估值融资、条款不利的桥接融资，或投资者抽身的风险就会变得重大。Bloomberg 和
              Axios 对 Series B 的报道确认，融资时没有披露收入、客户或已签合同。市场风险进一步叠加：IEA 和 BNEF 预测，到 2030 年绿氢生产成本会降至 $2-3/kg；如果天然氢无法按目标以
              $0.50-1.50/kg 生产并交付，Koloma 的成本竞争力会被削弱。五个战略投资者兼客户没有任何一方签署有约束力的承购协议。
