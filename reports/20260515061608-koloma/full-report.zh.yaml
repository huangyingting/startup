  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >-
              Koloma 的投资逻辑建立在六个相互连接的支柱上，共同指向一个可能改变清洁能源格局的机会。第一，Koloma
              是美国系统性天然氢勘探中公认的先行者，国内没有直接竞争对手能在融资规模或地块规模上相当。第二，如果公司的地质模型被证明正确，它可以用 $0.50–1.50/kg
              的成本生产氢气——这个目标会让天然氢成为全球最便宜的清洁氢来源，显著低于 $3–7/kg 的绿氢和 $1–2/kg 的灰氢。第三，如果 IRA Section 45V 清洁氢生产税收抵免（近零碳氢最高
              $3/kg）认证覆盖天然氢，有效实现价格会推高到 $3.50–4.50/kg，大幅改善任何承购协议的经济性。第四，战略投资者基础——Mitsubishi Heavy Industries、Osaka
              Gas、United Airlines Ventures、BP Ventures 和 Breakthrough Energy
              Ventures——验证了大型企业的需求侧信念，这些企业有可能成为锚定承购客户。第五，McKinsey 和 Hydrogen Council 的分析支持到 2050
              年全球清洁氢市场达到数万亿美元规模；低成本天然氢会在其中占据巨大份额。第六，Koloma 在 Ohio State EAIC、由创始科学家 Tom Darrah 牵头的科学基础，构成真实的复制壁垒。

              反向逻辑同样有力。公司已融资 $453 million、运营四年多，却没有披露任何商业化生产的氢气。S&P Global 在 2025 年 1 月明确指出，Koloma 尽管持有 Series B
              大部分资金，却一直 “quiet on next steps”。RMI 发布批判分析，质疑天然氢能否商业规模生产，并指出除 West Africa 外，可大规模开采聚集的科学证据基础仍薄。GeoExpro 质疑
              Koloma 为 Kansas 克拉通地层建立的地质模型能否迁移到 Idaho 玄武岩，因为两地氢生成机制不同。天然氢生产没有联邦监管框架，IRA 45V
              路径尚未建立。五个战略投资者兼客户没有任何一个签署有约束力的承购协议。公司没有收入、没有披露烧钱速度，并且在任何商业化生产里程碑前至少还需要再融资一次，这会给现有投资者带来重大稀释风险。合在一起，反向逻辑并非猜测：它们是结构性的、当下存在的，并且可监测。
