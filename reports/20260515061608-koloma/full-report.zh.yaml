      - number: '2.5'
        title: 测算尽调缺口和未解决矛盾
        blocks:
          - type: paragraph
            body: >-
              核心市场测算尽调缺口很明确。第一，到 2030 年天然氢板块没有严谨第三方
              SOM——所有引用数字要么来自整体氢市场测算的派生，要么是投资追踪代理。第二，实际生产天然氢的同行评审成本数据缺失，因为没有运营商进入商业生产；$0.50-$1.50/kg
              目标只是行业倡导者的愿景。第三，活动地域分布（美国约 50%、Australia 次之、Europe
              刚起步）反映了监管和资本流，但不能清晰映射到需求侧付款结构，因此哪个地区率先证明价格平价仍是开放问题。第四，乐观分析师评论与 IEA 慢 FID
              警示之间的冲突，应作为未解决尽调问题继续推进，而不是被消解。这些缺口已写入本章 evidenceGaps，并应拿来检验任何提出具体天然氢 TAM 或 SOM 的未来管理层预测。
