  - id: FU001
    title: 客户旅程图
    type: journey-map
    summary: >-
      这张图梳理工业氢买家的路径：从最初知道市场机会，到战略股权投资，再到首次商业化氢气交付；同时标出 Koloma 的投资者客户已经走到哪一步、后续还剩哪些阶段。五家已披露名称的投资者客户均已到达第 3 阶段（战略性股权承诺）。第
      4-7 阶段仍是前瞻性里程碑，尚未落地。
    data:
      nodes:
        - id: n1
          label: 工业买家识别 H2 需求
          description: 炼油厂、氨生产商、钢铁制造商、燃气公用事业或航空公司在脱碳要求或经济性驱动下，确认需要大规模清洁氢。
        - id: n2
          label: 评估天然 H2 经济性
          description: 比较成本：天然 H2 目标为 $0.50-1.50/kg，绿氢为 $3-7/kg，灰氢为 $1-2/kg；同时评估供应安全和碳强度。
        - id: n3
          label: 战略股权投资
          description: 买家通过投资 Koloma 股权，释放长期承购意向；五家已披露客户均在 2022-2024 年完成该阶段。
        - id: n4
          label: 技术尽调与数据审查
          description: 审查地质数据、井结果、储层模型、生产时间表和碳强度认证方法。
        - id: n5
          label: LOI 或承购框架谈判
          description: 围绕价格、数量、交付条款、IRA 45V PTC 转付和碳认证谈判初步约束性意向；尚无客户到达该阶段。
        - id: n6
          label: 试点供应协议
          description: 在井产能得到验证后，签署首份商业规模供应合同，用于试点氢气交付；尚未到达，需先有商业井结果。
        - id: n7
          label: 完整商业承购合同
          description: 按商业化规模和价格签署长期供应协议；需先证明储层可持续、监管清晰，并具备交付基础设施；全球范围内尚未实现。
    approximationNotes: >-
      五家已披露名称的投资者客户（MHI、Osaka Gas、UAL Ventures、BP Ventures、BEV）均已通过股权投资完成第 1-3 阶段。第 4-7 阶段仍属前瞻，取决于商业化生产里程碑；截至 2026 年 5
      月，Koloma 或全球任何天然氢公司都尚未实现这些里程碑。
