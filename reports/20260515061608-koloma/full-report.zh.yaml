    sections:
      - number: '1.1'
        title: 身份、总部和阶段
        blocks:
          - type: paragraph
            body: >-
              Koloma 将自己定位为一家总部位于 Colorado 州 Denver 的天然氢勘探与生产公司，成立于 2021 年，目标是把地质氢商业化，作为低碳、低成本的清洁燃料来源。公司官网和 About
              页面把使命放在寻找地下自然分子氢富集体，并以有意义的规模开采。Canary Media 和 S&P Global 的公开报道把 Koloma 定位为尚无收入、仍处于勘探和试点阶段；截至 2026 年 5
              月，公司未披露商业承购。公司注册在 Delaware，并以 CIK 0001881912 在 SEC
              登记；对现阶段的私人勘探公司来说，这种监管可见度并不常见。合在一起，这些来源支撑了后续章节可复用的清晰身份：一家总部在美国、创始人主导、尚无收入的天然氢开发商，资本雄厚，但运营披露有限。
