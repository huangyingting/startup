      - number: '6.5'
        title: 留存、承诺与投资者兼客户耐久性
        blocks:
          - type: paragraph
            body: >-
              没有商业客户关系时，只能用投资者兼客户留存——即持续股权承诺——来近似衡量客户耐久性。截至 2026 年 5 月，五个具名投资者兼客户都通过最新披露融资轮维持了 Koloma
              的股权头寸，没有公开报道显示撤资、降低承诺或与投资者兼客户冲突。MHI 从最初 Series B 投资延伸到延长轮再投资，是目前最强的多年留存信号。Osaka Gas 在 2024 年 10
              月投资时发布了正面声明，此后没有反向信号。United Airlines Ventures 仍活跃于可持续发展沟通，没有撤回 Koloma 投资。BP Ventures 自 Series B
              后没有公开更新，但没有反向信号，与继续承诺相符。Breakthrough Energy Ventures 仍将 Koloma
              列为活跃组合公司。这些信号正面但有限：股权留存不等于商业承诺；从投资者转成付费客户，还要求 Koloma 证明实际氢气生产具有竞争力的经济性。由于不存在商业客户关系，无法计算商业
              NRR、GRR、流失率或客户满意度得分。因此这个留存代理变量是一维的；一旦生产得到证明、真实供给经济性变得透明，它未必能预测商业承购转化率。尽调中最关键的问题是，是否有任何投资者兼客户已经进入资料室
              审阅或初步承购范围界定；这会比单纯持股更能说明留存质量。
