            title: 当前判断：观察 / 有条件
            body: >-
              截至 2026 年 5 月，Koloma 获得观察 / 有条件判断。该建议不是买入，也不是放弃。任何买入信号发出前，必须同时满足三个门槛条件：（1）公开披露商业井流量超过 1 MMscf/d、H2 纯度高于
              95%；（2）确认 DOE 或财政部为天然氢提供 IRA 45V 认证路径；（3）与战略投资者兼客户签署至少一份有约束力的承购协议。当前 $600–900M 隐含估值，对一家尚无收入、尚未商业化的公司来说偏高。
            calloutType: recommendation
            claimRefs:
              - CV013
              - CV016
              - CV018
          - type: callout
            title: 关键风险——融资 $453M 后仍没有商业证据
            body: >-
              本次尽调中最重要的反向信号，是融资 $453 million 后仍完全没有公开披露任何商业井结果。S&P Global 2025 年 1 月报告明确指出 Koloma 一直 “quiet on next
              steps”。RMI 的批判分析和 GeoExpro 的地质批评都强调，在美国任何可比地质环境中，商业规模天然氢生产尚未得到证明。管理层与外部投资者之间的信息不对称，是低信心和关键风险评级背后的主导风险因素。
            calloutType: risk
            claimRefs:
              - CV002
              - CV003
              - CV005
              - CV007
