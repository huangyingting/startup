      - number: '7.5'
        title: 人员、执行风险与缓释
        blocks:
          - type: paragraph
            body: >-
              Koloma 的人员风险集中在科学架构顶端。Tom Darrah 是公司联合创始人兼首席科学家，在天然氢地质和地球化学上具备独特组合能力；Koloma 已披露团队中没有任何人能复制这一组合。Darrah 博士的
              Ohio State 实验室一直是 Koloma 用来识别和验证天然氢聚集的地球化学指纹识别方法的主要产出方。他离职会造成非对称信息缺口：竞争对手可能招募他，带走尚未完全沉淀到专利或已披露方法中的组织知识。截至
              2026 年 5 月，公开来源没有显示继任计划、备用科学负责人或替代首席科学家。

              更广泛的管理团队不透明又放大了这一风险。与多数 Series B 公司不同，Koloma 除 Darrah 博士以及联合创始人 Pete Johnson、Paul Harraka
              外，没有公开披露完整高管名单。截至 2026 年 5 月，审阅过的公开来源均未识别 CEO、CFO、COO 或业务发展负责人，因此无法评估团队深度、继任规划或商业执行能力。缓释方面，Koloma
              已采取部分措施：Ohio State Innovation District 枢纽把研究关系正式化；Fleet Space 和 Xcalibur 合作提供外部勘测能力；$453 million
              资本基础提供现金跑道。不过管理层没有公开提出正式的投资逻辑失效阈值。缓释与监测标准表（TR005）定义了投资者应从外部使用的可观察触发事件。如果 Tom Darrah 离职，首批井结果令人失望，2026
              年底前仍没有联邦监管路径，或 2027 年中前没有宣布下一轮融资，每个事件都应触发投资逻辑重评。
