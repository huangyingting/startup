              Koloma 尚无收入。截至 2026 年 5 月，保留的公开来源没有披露任何客户名单、已确认收入、收入运行率或已签承购协议；唯一已实现现金流入是约 $8.4 million 的联邦非稀释支持（ARPA-E 约
              $0.9M、DOE 约 $7.5M）。眼前唯一可信的收入机制，是把生产出的天然氢直接战略承购给工业买家——先是炼油、氨和甲醇消纳点，股权结构（United Airlines Ventures、Mitsubishi
              Heavy Industries、Osaka Gas）也暗示可选的航空 SAF 和亚洲公用事业衍生需求。Koloma 对外的天然氢价格目标为 $0.50-$1.50/kg，显著低于灰氢的 $1-2/kg
              地板，也远低于绿氢 $3-7/kg 的成本基础。因此，本章所有收入行都带有「无收入」状态，尽调基线应测试已签承购、LOI 和前瞻框架状态。
