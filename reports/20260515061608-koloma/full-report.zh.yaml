  - id: FR002
    title: 风险传导图
    type: dag
    summary: 有向无环图展示 Koloma 的主要上游风险如何经公司向下游传导，造成收入缺口、资本耗尽和潜在运营停摆。监管框架空白和井产能失败是两个根因节点；传导路径在生产延误节点汇合，并级联到收入和融资失败结果。
    data:
      nodes:
        - id: r1
          label: 无联邦监管框架
          description: 联邦层面对天然氢生产许可仍是空白；BLM 尚未给出矿权分类；截至 2026 年 5 月，IRA 45V 路径尚未建立。
        - id: r2
          label: 井产能未验证
          description: 未披露商业规模流量和 H2 纯度；Kansas 和 Idaho 两地的地质模型都尚未在生产规模得到验证。
        - id: r3
          label: 生产受阻或延误
          description: 没有许可或经验证的井经济性，商业化氢气开采就无法推进；钻探计划需等待监管或技术问题解决。
        - id: r4
          label: 未产生商业收入
          description: 氢气销售为零；五家投资者客户均仍处于承购前；全行业没有约束性供应协议。
        - id: r5
          label: 融资条件恶化
          description: 无法证明里程碑会迫使公司接受降价轮或过桥融资；没有披露井数据或监管进展，投资者信心被侵蚀。
        - id: r6
          label: 现金跑道耗尽
          description: 没有收入和新资本，运营现金被耗尽；随后会削减员工并收缩勘探计划。
        - id: r7
          label: 公司陷入运营困境
          description: 如果无法融资且生产受阻，Koloma 将面临重组或运营停摆；投资者资本存在减值风险。
      edges:
        - from: r1
          to: r3
          label: 阻断许可路径
        - from: r2
          to: r3
          label: 让生产经济性不可行
        - from: r3
          to: r4
          label: 阻止氢气交付
        - from: r3
          to: r5
          label: 消除投资者信心信号
        - from: r4
          to: r5
          label: 零收入迫使公司依赖资本
        - from: r5
          to: r6
          label: 无资本流入耗尽现金储备
        - from: r6
          to: r7
          label: 运营资不抵债风险兑现
    approximationNotes: 边代表基于 Koloma 已披露商业模式和收入前阶段的合理因果链。为便于阅读，图中省略了许多中间步骤和缓释因素。每个节点代表一种风险状态，可能持续数月或数年才会解决。两个根节点（r1 和 r2）彼此独立，但会叠加。
    claimRefs:
      - CR002
      - CR009
      - CR010
      - CR018
      - CR031
      - CR041
