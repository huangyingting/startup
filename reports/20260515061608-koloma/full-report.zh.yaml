      - number: '8.2'
        title: 建议、信心与风险评级
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 5 月，对 Koloma 的尽调建议是观察 /
              有条件。这不是买入信号，也不是放弃。这个建议反映的是：公司科学基础可信、投资者支持深厚，所在市场一旦成功回报巨大；但所有商业上决定性的证据——井流量、氢纯度、成本曲线、承购经济性和监管批准——都仍是私有且未披露。现有公开数据无法支撑任何入场价格。只有三个事件同时发生，建议才会上调至
              买入：公开披露至少一口商业井，氢气流量超过 1 MMscf/d、纯度高于 95%；DOE 或财政部确认天然地质氢的 45V 认证路径；并与一个锚定战略客户签署至少一份有约束力的承购协议。

              信心水平为低。估值模型中每个商业上重要的输入，要么缺失，要么私有。风险评级为关键，反映了未经证明的生产逻辑、缺失的联邦监管框架、持续烧钱却没有收入覆盖，以及 Tom Darrah
              关键人物集中同时存在。估值立场偏高：从 $403 million Series B 推断出的 $600–900 million
              投后估值，放在一家尚无收入、没有商业化生产的公司身上，无法用任何标准估值方法支撑。没有收入、利润率或成本数据，折现现金流跑不起来。期权价值框架把 Koloma
              每口井视为二元地质期权，这在智识上更诚实，但需要概率输入，而这些输入本身无法从公开来源验证。

              Koloma 的投资评分矩阵呈现出市场潜力与已证明证据之间的强烈不对称。市场机会得分 9/10——全球清洁氢市场巨大，$0.50–1.50/kg 的天然氢会带来变革。技术验证得分
              2/10——没有流量、没有纯度数据，也没有公开确认的井结果。监管准备度得分 2/10——没有联邦许可框架，也没有 IRA 45V 路径。估值纪律得分
              3/10——当前隐含估值对这一阶段来说偏投机。战略投资者深度得分 7/10——即使没有有约束力承购，MHI、Osaka Gas 和 UAL 也代表真实需求侧验证。目标监测窗口为 12–18
              个月；在投资逻辑门槛条件达成前，没有可执行入场价格。
