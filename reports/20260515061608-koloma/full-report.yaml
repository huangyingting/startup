      - number: '8.2'
        title: Recommendation, Confidence, and Risk Rating
        blocks:
          - type: paragraph
            body: >-
              The diligence recommendation for Koloma as of May 2026 is TRACK / CONDITIONAL. This is not a buy signal
              and not a pass. The recommendation reflects a company with a credible scientific foundation and deep
              investor support, operating in a market where the prize for success is enormous, but where all
              commercially decisive evidence — well flow rates, hydrogen purity, cost curves, offtake economics, and
              regulatory approvals — remains private and undisclosed. No investment entry price can be supported by
              available public data. The recommendation would upgrade to BUY conditional on three simultaneous events:
              public disclosure of at least one commercial well exceeding 1 MMscf/d hydrogen flow at purity above 95%; a
              confirmed DOE or Treasury 45V certification pathway for natural geological hydrogen; and at least one
              binding offtake agreement with an anchor strategic customer.

              The confidence level is low. Every commercially material input to the valuation model is either
              unavailable or private. The risk rating is critical, reflecting the simultaneous presence of an unproven
              production thesis, an absent federal regulatory framework, zero revenue coverage against ongoing capital
              burn, and key-person concentration in Tom Darrah. The valuation stance is stretched: the implied $600–900
              million post-money valuation, inferred from the $403 million Series B into a pre-revenue company with no
              commercial production, is not supportable by any standard valuation method. A discounted cash flow cannot
              be run without revenue, margin, or cost data. An option value framework treats each Koloma well as a
              binary geological option, which is the more intellectually honest approach, but requires probabilistic
              inputs that are themselves unverifiable from public sources.

              The investment scoring matrix for Koloma captures the stark asymmetry between market potential and
              demonstrated proof. Market opportunity scores 9/10 — the global clean hydrogen market is massive, and
              natural hydrogen at $0.50–1.50/kg would be transformative. Technical validation scores 2/10 — no flow
              rate, no purity data, no publicly confirmed well results. Regulatory readiness scores 2/10 — no federal
              permitting framework, no IRA 45V pathway. Valuation discipline scores 3/10 — the current implied valuation
              is speculative for the stage. Strategic investor depth scores 7/10 — MHI, Osaka Gas, and UAL represent
              genuine demand-side validation, even without binding offtake. The target monitoring horizon is 12–18
              months; no actionable entry price is available until the thesis-gating conditions are met.
            claimRefs:
              - CV013
              - CV014
              - CV015
              - CV016
              - CV017
