      - number: '8.3'
        title: Financing History and Valuation Context
        blocks:
          - type: paragraph
            body: >-
              Koloma's financing history comprises three disclosed tranches totaling approximately $453 million. The
              Series B, announced August 27, 2024, raised $403 million from Khosla Ventures, Breakthrough Energy
              Ventures, United Airlines Ventures, BP Ventures, MHI, and Osaka Gas, making it one of the largest single
              venture rounds in the global natural hydrogen sector. A separate $50 million strategic investment from
              Osaka Gas was announced October 1, 2024, reflecting continued conviction from the Japanese energy
              conglomerate and bringing total disclosed funding to approximately $453 million. Earlier Series A funding
              has not been fully publicly disclosed, though CB Insights and Tracxn profiles confirm the company has been
              venture-funded since its founding in 2021.

              The post-money valuation from the Series B is not publicly confirmed by any investor, SEC filing, or
              company disclosure. The range of $600–900 million inferred here is derived from the $403 million fundraise
              amount and the typical pricing conventions for early-stage clean energy venture rounds in 2024, where
              capital-intensive exploration companies have commanded 2–4× the round size in post-money valuations. This
              inference is speculative and cannot be corroborated from public data. PitchBook and Tracxn provide company
              profiles for Koloma but do not disclose the post-money valuation. Koloma's SEC Form D filing confirms the
              Regulation D offering structure but does not disclose preference terms, liquidation waterfall, or pro-rata
              rights — all of which are material to assessing dilution exposure for earlier investors.

              The financial sustainability risk is material. With approximately 69 staff and active exploration
              operations in Kansas and Idaho, Koloma's estimated annual operating expenditure is $40–100 million per
              year. At the midpoint, the $403 million Series B implies a cash runway of approximately four to seven
              years, suggesting the company should have capital through 2028–2031 without additional raises. However, if
              commercial results are delayed or disappointing, a bridge round or Series C under adverse terms could
              significantly dilute early investors. BNEF projects green hydrogen costs declining to $2–3/kg by 2030,
              which would partially erode the cost-competitiveness narrative if natural hydrogen production costs exceed
              their targets. No commercial revenue is expected before 2029 in any scenario.
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
      - number: '8.4'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >-
              Three scenarios bracket the credible range of Koloma outcomes. The bull scenario, assigned a 15%
              probability, requires Koloma to achieve a commercial well producing over 1 MMscf/d of hydrogen at purity
              above 95% by 2028; secure IRA Section 45V certification for natural geological hydrogen from the US
              Department of Energy or Treasury; and sign a binding offtake agreement with MHI or Osaka Gas by 2029.
              Under these conditions, the realized hydrogen price including the 45V tax credit of up to $3/kg would be
              $3.50–4.50/kg, making natural hydrogen competitive with all clean hydrogen alternatives. Valuation in the
              bull case is estimated at $2–5 billion by 2030, supporting a potential IPO or strategic acquisition. The
              probability reflects the genuine possibility of the science working but the large number of binary gates
              that must all pass simultaneously.

              The base scenario, assigned a 50% probability, envisions limited commercial production by 2030–2031 with
              regulatory uncertainty persisting and at least one additional dilutive financing round required. The IRA
              45V certification may be partial or delayed. Offtake agreements are executed but at smaller scale than the
              bull case. The valuation in the base case is $300–700 million — roughly flat to the current implied
              post-money valuation — reflecting a path where the science works at limited scale but the economics do not
              generate the transformative outcome originally envisioned. A Series C or D round at or below the Series B
              valuation would signal a base case trajectory.

              The bear scenario, assigned a 35% probability, models Koloma failing to achieve commercial scale by 2032.
              The drivers are well productivity below economic thresholds, absence of federal regulatory framework,
              capital exhaustion forcing a distressed funding round, or Tom Darrah departing. Under the bear scenario,
              Koloma's equity value converges toward zero. Potential outcomes include IP sale to a major energy company,
              acreage licensing, or asset liquidation. Rystad Energy's observation that natural hydrogen exploration
              quadrupled over three years also implies a growing probability that a competitor achieves commercial
              results before Koloma, reducing Koloma's first-mover premium. The valuation sensitivity analysis
              demonstrates that IRA 45V certification acts as a binary multiplier: its presence or absence alone
              accounts for a $500–1,500 million difference in projected value across the scenarios.
            claimRefs:
