    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, headquarters and stage
        blocks:
          - type: paragraph
            body: >-
              Koloma presents itself as a Denver, Colorado-based natural hydrogen exploration and production company
              founded in 2021 to commercialize geologic hydrogen as a low-carbon, low-cost source of clean fuel. Its
              corporate website and About page describe a mission centered on locating subsurface accumulations of
              naturally occurring molecular hydrogen and producing them at meaningful scale. Public coverage from Canary
              Media and S&P Global frames Koloma as pre-revenue and still in the exploration and pilot phase, with no
              commercial offtake disclosed through May 2026. The company is incorporated in Delaware and registered with
              the SEC under CIK 0001881912, an unusual signal of regulatory visibility for a private exploration company
              at this stage. Together these sources support a clean identity reusable by later chapters: a
              U.S.-headquartered, founder-led, pre-revenue natural-hydrogen developer with deep capital but limited
              operating disclosure.
