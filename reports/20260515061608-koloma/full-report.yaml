        title: Adverse signals and remaining diligence gaps
        blocks:
          - type: paragraph
            body: >-
              The chapter must preserve adverse-tone evidence alongside the positive funding narrative. S&P Global
              Commodity Insights published a January 2025 piece characterizing Koloma as quiet about its next
              operational steps despite roughly $400 million in funding, and GEO ExPro's 2024 'Koloma Enigma' feature
