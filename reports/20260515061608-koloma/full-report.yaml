        title: Exhibits
        blocks:
          - type: callout
            title: Natural-hydrogen sizing is investment-led, not revenue-led
            body: >-
              All public data points to capital flow ($1B+ globally, ~40 explorers) rather than revenue or volume; the
              segment's market value is best understood through proxy lenses today.
            calloutType: insight
            claimRefs:
