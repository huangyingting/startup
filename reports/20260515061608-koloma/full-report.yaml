  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Landscape: direct peers, incumbents, adjacents and likely entrants'
        blocks:
          - type: paragraph
            body: >-
              The natural-hydrogen competitive landscape in 2026 is best described as 'one big leader, long tail.'
              Koloma sits alone with roughly $403 million in disclosed funding, while Rystad Energy counts approximately
              40 active natural-hydrogen explorers globally — most with disclosed funding below $50 million. Direct
              peers include Hyterra (ASX-listed, with Kansas exploration acreage adjacent to Koloma's High Plains
              Resources subsidiary), Gold Hydrogen (ASX-listed, South Australia), and Natural Hydrogen Energy LLC (the
              U.S. first-mover, which drilled an early Nebraska well in 2019). Incumbent industrial-gas producers — Air
              Liquide, Linde and Air Products — dominate global hydrogen production via grey-SMR and selective
              green/blue projects but have not entered natural-hydrogen exploration. Adjacent green-hydrogen producers
              (Plug Power, Nel, ITM Power) compete for the same low-carbon hydrogen demand pool from a higher-cost
              production base. Likely entrants include oil-and-gas majors with subsurface expertise — BP Ventures and
              Chevron Technology Ventures have both publicly tracked the segment.
