            body: >-
              Koloma's target customer segments map directly to the largest industrial hydrogen use cases globally. The
              industrial hydrogen market — dominated by ammonia synthesis for fertilizers, petroleum refining and
              desulfurization, and increasingly steel decarbonization — consumes approximately 90 million tonnes per
