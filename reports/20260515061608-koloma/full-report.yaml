  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Subsurface Science and Geological Basis
        blocks:
          - type: paragraph
            body: >-
              Koloma's exploration thesis rests on well-established geoscience: naturally occurring molecular hydrogen
              accumulates in the subsurface through two principal mechanisms. The first is serpentinization, the
              reaction between water and iron- or magnesium-rich ultramafic rocks (peridotites, dunites) that generates
              H2 as a byproduct of olivine oxidation. The second is radiolysis, the splitting of water molecules by
              alpha particles emitted by uranium, thorium, and potassium-40 present in crystalline basement rocks. Both
              mechanisms are documented in peer-reviewed literature including a 2024 Nature Communications Engineering
              review and a 2023 Geology paper from the Geological Society of America, and are acknowledged by the USGS
              as an emerging energy resource. The Nemaha Ridge in Kansas is Koloma's primary target: it is an ancient
              tectonic suture zone exposing ultramafic and mafic crystalline basement rocks beneath a thin sedimentary
              cover, creating conditions favorable for serpentinization-generated H2 accumulation. Idaho basalt
              formations represent a secondary, more controversial target whose geological suitability has been
              questioned by GeoExpro. Methane is a common co-product in natural H2 systems because microorganisms can
              consume H2 and produce CH4, affecting purity and carbon intensity. The geoscientific basis for natural H2
              generation is solid, but the commercial question of whether adequate reservoirs with sustainable flow
              rates exist at the Koloma target sites remains unanswered in the public record.
            claimRefs:
              - CE001
              - CE002
              - CE008
              - CE019
              - CE025
              - CE028
              - CE040
