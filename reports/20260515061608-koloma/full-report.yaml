      - number: '7.5'
        title: People, Execution Risks, and Mitigations
        blocks:
          - type: paragraph
            body: >-
              Koloma's people risk is concentrated at the top of its scientific structure. Tom Darrah, the company's
              co-founder and chief scientist, holds a unique combination of geological and geochemical expertise in
              natural hydrogen that is not replicated by any other disclosed Koloma team member. Dr. Darrah's Ohio State
              laboratory has been the primary producer of the geochemical fingerprinting methodology that Koloma uses to
