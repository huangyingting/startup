  foundingLocation: Dublin, OH (initial SEC filing address); later moved to Denver, CO
  headquarters: 1900 Grant Street, Suite 1250, Denver, CO 80203
  productSummary: >
    Koloma's product is geologic (natural) hydrogen, discovered and extracted from ultramafic and crystalline basement
    rock formations. The company uses a proprietary exploration workflow combining AI geological models, airborne
    electromagnetic and magnetic surveys, seismic acquisition, and geochemical sampling. It drills test wells to assess
    subsurface hydrogen concentration and purity before developing production wells. Target output is high-purity
    (potentially >85%) hydrogen with a projected wellhead cost of $0.50–$1.50/kg, substantially below green hydrogen
    ($3–7/kg) and competitive with grey hydrogen ($1–2/kg).
  customerFocus: >
    Near-term: strategic industrial-gas partners (Mitsubishi Heavy Industries, Osaka Gas) who are both investors and
    offtake candidates. Long-term: oil refineries, ammonia/fertilizer producers, steel manufacturers, and aviation
    (United Airlines) requiring low-carbon hydrogen.
  businessModel: >
    Resource extraction and wholesale supply of natural hydrogen. Pre-commercial at report date; no revenue. Anticipated
    revenue model is long-term offtake contracts with industrial buyers. IRA Clean Hydrogen Production Tax Credit (up to
    $3/kg) provides significant potential upside if carbon intensity meets the <0.45 kg CO2e/kg H2 threshold.
