  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Severity-Ranked Risk Overview
        blocks:
          - type: paragraph
            body: >-
              Koloma's risk profile is dominated by four critical-severity risks with no near-term mitigation pathway:
              the absence of a federal regulatory framework for natural hydrogen production, unproven commercial-scale
              well productivity, key-person concentration in founder-scientist Tom Darrah, and capital dependency on
              continued venture funding with zero revenue coverage. Below these critical risks sits a second tier of
              high-severity concerns including BLM mineral rights uncertainty, partner technology concentration, IRA 45V
              tax credit inaccessibility, and geological uncertainty in Idaho basalt formations. The company's
              pre-revenue status means that all financial and commercial risks are simultaneously elevated — there is no
              revenue cushion to absorb execution delays, regulatory setbacks, or key-person losses.

              Across six risk domains — regulatory/legal, operational/technical, partner/dependency, financial/model,
              people/execution, and market/commercial — the critical-to-high-severity risk register contains at least
              fifteen individually material items. The risk heatmap (FR001) shows that the highest-concentration zone is
              High-to-Critical impact with High-to-Medium likelihood, the quadrant most dangerous for investors: risks
              that are both likely and devastating. The regulatory void represents a thesis-level risk: if no federal
              framework emerges and BLM does not clarify mineral rights status for hydrogen, Koloma cannot obtain
              drilling permits at scale, which would strand all $453 million of invested capital. Conversely, if
              regulatory clarity emerges and first commercial well results are publicly disclosed with flow rates
              exceeding 1 MMscf/d at high purity, the risk profile collapses substantially. Each top risk has a
              monitorable trigger and a thesis-break threshold defined in the mitigation table TR005.
