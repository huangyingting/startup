          score: 2/10
          note: Zero publicly disclosed flow rate or purity data after $453M raised and four-plus years of drilling
        - label: Cost competitiveness (theoretical)
          score: 7/10
          note: $0.50–1.50/kg target far below green H2 $3–7/kg; but unproven at any commercial scale globally
        - label: Regulatory readiness
          score: 2/10
          note: No federal permitting framework; IRA 45V certification not available for natural H2 as of May 2026
        - label: Strategic investor depth
          score: 7/10
          note: MHI, Osaka Gas, UAL, BP Ventures validate demand; none has converted to binding offtake agreement
        - label: Valuation discipline
          score: 3/10
          note: Implied $600–900M PMV pre-revenue is highly speculative and stretched vs. public natural H2 comps
        - label: Exit readiness
          score: 2/10
          note: Not IPO-ready; strategic acquisition by major energy company is most plausible exit pathway
        - label: Evidence quality
          score: 2/10
          note: >-
            All material evidence private; no commercial milestone publicly confirmed; S&P Global noted silence on next
            steps
