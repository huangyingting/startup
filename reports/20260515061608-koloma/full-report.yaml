  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, included and excluded spend
        blocks:
          - type: paragraph
            body: >-
              The natural-hydrogen market relevant to Koloma sits inside the broader global hydrogen market, but is not
              coextensive with it. Total global hydrogen demand was approximately 97 million tonnes in 2023 according to
              the IEA, with low-emissions hydrogen accounting for less than 1% of supply. The clean-hydrogen sub-segment
              — green electrolysis, blue with CCS and natural/geologic — is the SAM relevant to Koloma; conventional
              grey hydrogen produced from steam methane reforming is the status-quo substitute and the price floor
              (roughly $1-2/kg) Koloma must beat. The natural-hydrogen segment specifically excludes any
              manufactured-hydrogen pathway and includes all spend associated with subsurface exploration, drilling
              capex and surface processing. Adjacent demand surfaces — sustainable aviation fuel, green ammonia for
              shipping, steel decarbonization via direct reduced iron — also matter because the strategic investor
              signal embedded in Koloma's cap table (United Airlines Ventures, Osaka Gas, Mitsubishi Heavy Industries)
              maps directly onto those adjacent buyer pools.
            claimRefs:
              - CM001
              - CM005
              - CM007
              - CM008
              - CM017
              - CM027
              - CM029
              - CM030
