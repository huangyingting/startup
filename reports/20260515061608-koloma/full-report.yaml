      - number: '5.2'
        title: Technology Stack, Proprietary Methods, and Competitive Differentiation
        blocks:
          - type: paragraph
            body: >-
              Koloma's exploration platform integrates five distinct technology layers: field geochemical sampling,
              airborne electromagnetic survey, satellite-based seismic imaging, AI geological targeting, and subsurface
              well development. The surface geochemical survey uses portable gas chromatographs to detect H2 flux at the
              soil or near-surface level, enabling rapid basin screening at low cost. The aero-EM layer is provided by
              Xcalibur Smart Mapping, a specialist in airborne electromagnetic and magnetic surveys that map subsurface
              structural features at basin scale. The satellite seismic layer is provided by Fleet Space Technologies,
              whose ExoSphere system uses ambient seismic noise recorded by satellite-linked nodes to generate full-wave
              3D subsurface models. The AI modeling engine ingests all these inputs—geophysical anomalies, geochemical
              signals, seismic velocity data, and published geological maps—to rank and prioritize drilling targets by
              probability of viable H2 accumulation. Koloma claims this integration constitutes a proprietary
              exploration system, though the specific algorithmic details, training data sources, and model validation
              records are not publicly disclosed. Competitive differentiation versus Gold Hydrogen (Australia, soil-gas
              sampling and shallow seismic) and HyTerra (Kansas/Nemaha, magnetic surveys) rests primarily on Koloma's
              multi-modal data integration, the Fleet Space satellite seismic capability (unique in the natural H2
              sector as of early 2025), and the Ohio State EAIC partnership. No granted US patents are publicly
              identified for Koloma's technology as of May 2026. Estimated carbon intensity at 0.4 kg CO2e/kg H2
              (Rystad/Energy Institute) is the key differentiation from both grey H2 ($\sim$10 kg CO2e/kg) and blue H2
              ($\sim$3-5 kg CO2e/kg).
