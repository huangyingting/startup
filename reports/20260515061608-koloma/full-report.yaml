      - number: '2.5'
        title: Sizing diligence gaps and unresolved contradictions
        blocks:
          - type: paragraph
            body: >-
              The principal market-sizing diligence gaps are explicit. First, no rigorous third-party SOM exists for the
              natural-hydrogen segment by 2030 — every cited figure is either a derivative of total hydrogen sizing or
              an investment-tracker proxy. Second, peer-reviewed cost data on actual produced natural hydrogen is absent
              because no operator has reached commercial production; the $0.50-$1.50/kg target is an industry-advocate
              aspiration. Third, the geographic distribution of activity (U.S. ~50%, Australia secondary, Europe
              nascent) mirrors regulatory and capital flows but does not map cleanly to demand-side payer structures,
              leaving an open question about which geography first proves price parity. Fourth, the conflict between
              optimistic analyst commentary and IEA's slow-FID warning needs to be carried forward as an unresolved
              diligence ask, not normalized. These gaps are captured in the chapter's evidenceGaps and should be tested
              against any forward management projection that posits a specific natural-hydrogen TAM or SOM.
            claimRefs:
              - CM015
              - CM016
              - CM020
              - CM025
              - CM026
              - CM032
              - CM033
              - CM034
              - CM035
              - CM036
