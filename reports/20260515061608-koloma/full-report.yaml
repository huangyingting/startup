      - number: '2.2'
        title: TAM/SAM/SOM and multi-lens sizing
        blocks:
          - type: paragraph
            body: >-
              Sizing the market requires multiple lenses because no single publisher produces a rigorous
              natural-hydrogen revenue forecast. MarketsandMarkets sizes total hydrogen at roughly $224 billion in 2024
              growing to about $311 billion by 2030 at 6.8% CAGR — a TAM lens. The IEA expresses demand in volume terms
              (97 Mt) and flags that less than 1% is low-emissions, framing the SAM. The U.S. DOE Clean Hydrogen
              Strategy and Roadmap projects U.S. hydrogen demand could rise to 50 million tonnes by 2050 across
              heavy-duty transport, industry and power. For natural hydrogen specifically, the public record is
              investment-led: Drilling for Hydrogen reports private capital crossed $1 billion globally in early 2026,
              and Rystad Energy counts about 40 active explorers (up from 10 in 2020). A serviceable obtainable market
              for natural hydrogen by 2030 is best framed today as a directional $1-3B band — derived top-down from
              substituting roughly 1% of grey hydrogen demand at $1-2/kg pricing, and explicitly flagged as an internal
              estimate rather than a peer-reviewed figure.
