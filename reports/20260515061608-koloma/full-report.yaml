      - number: '3.3'
        title: Capability comparison and pricing
        blocks:
          - type: paragraph
            body: >-
              Capability comparison is constrained by the segment's overall disclosure thinness. Koloma asserts a
              proprietary AI-driven geological exploration model alongside seismic mapping and satellite imaging, but no
              peer-reviewed validation has been published. Hyterra and Gold Hydrogen do not disclose comparable AI
              claims. Active drilling is concentrated at Koloma (Kansas via High Plains Resources, Idaho via Cascade
              Exploration) and Hyterra (Kansas licensed acreage). Pricing comparison is essentially empty across
              natural-hydrogen peers because no operator has reached commercial production. Koloma's stated
              $0.50-$1.50/kg target frames the aspirational price point; grey hydrogen at $1-2/kg sets the parity floor;
              adjacent green hydrogen at $3-7/kg highlights the economic upside if natural hydrogen delivers. Switching
              cost for industrial buyers from grey to natural hydrogen is dominated by transport and purification
              infrastructure — areas where industrial-gas incumbents hold structural advantage.
            claimRefs:
              - CP009
              - CP012
              - CP014
