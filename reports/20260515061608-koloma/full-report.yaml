      - number: '3.4'
        title: Switching cost, lock-in, distribution and supply access
        blocks:
          - type: paragraph
            body: >-
              Distribution power decisively favors industrial-gas incumbents. Air Liquide, Linde and Air Products own
              the vast majority of existing hydrogen pipeline and trucking networks, which any natural-hydrogen operator
              must access or duplicate. Multi-homing among natural-hydrogen suppliers is structurally low because
              reservoirs are non-fungible — buyers cannot easily switch suppliers reservoir-by-reservoir without a
              midstream transport network that does not yet exist. This implies a longer-term lock-in benefit if and
              when natural-hydrogen reservoirs reach commercial production, but only after midstream infrastructure is
              built. Internal-build risk is real for the largest industrial buyers: refiners and ammonia producers have
              historically built captive hydrogen capacity and could choose to invest in their own reservoir-adjacent
              production rather than buy from Koloma-class suppliers. Strategic supply-side moves — Koloma's MHI and
              Osaka Gas relationships — provide a soft demand-side moat that smaller peers do not have, but are not yet
              binding.
