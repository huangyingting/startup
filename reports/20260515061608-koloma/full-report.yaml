      - number: '5.4'
        title: Technology Maturity, Trust, and Compliance Position
        blocks:
          - type: paragraph
            body: >-
              Koloma's technology readiness varies significantly by module. Surface geochemical sampling (portable H2 GC
              analysis) is a well-established technique (TRL 7-8) applied in an adapted context. Aero-EM and magnetic
              surveys are industry-standard geophysical methods (TRL 8-9 for the method itself, TRL 5-6 for H2-specific
              targeting) operated by Xcalibur under existing commercial contracts. Fleet Space's ExoSphere satellite
              seismic system is proven in mineral exploration (TRL 6-7 for base technology) but untested for natural H2
              at scale (TRL 4-5 for this application). Koloma's proprietary AI geological modeling engine is the most
              opaque component; it is likely at TRL 3-5 given limited validation against commercial outcomes. Well
              drilling in crystalline basement is TRL 6-7 (standard deep drilling adapted for unusual target
              formations). Commercial H2 extraction, purification, and delivery infrastructure does not yet exist for
              natural H2, placing it at TRL 1-2. Trust and compliance pillars include: ARPA-E funding peer review
              (~$0.9M R&D validation), OSU EAIC independent academic core analysis, state-level well permitting in
              Kansas and Idaho, and standard industry health and safety protocols for drilling operations. No federal
              regulatory framework for natural hydrogen production exists in the US as of May 2026, creating legal
              uncertainty for commercial development. No granted US patents are publicly identified for Koloma's AI
              model or survey protocols; trade-secret protection is the likely approach. The IRA 45V Production Tax
              Credit ($3/kg for H2 <0.45 kg CO2e/kg H2) could apply to natural H2 if DOE certifies the lifecycle
              methodology, representing a major compliance upside.
