      - number: '5.3'
        title: 'Operating Model: From Basin Screening to Well Test'
        blocks:
          - type: paragraph
            body: >-
              Koloma's operating model follows a phased exploration funnel. In Phase 1 (basin screening), field
              geochemists conduct H2 flux sampling at potential sites to identify anomalous surface seeps that correlate
              with subsurface generation. In Phase 2 (geophysical survey), Xcalibur aero-EM surveys and Fleet Space
              satellite seismic imaging are deployed over priority basins to map the subsurface architecture—fault
              zones, basement topography, and structural traps. In Phase 3 (AI targeting), the integrated dataset is
              processed through Koloma's geological modeling platform to identify the highest-probability drill sites.
              In Phase 4 (well development), Koloma engages third-party drilling contractors to drill exploration and
              test wells into the crystalline basement; core samples are sent to the OSU EAIC for geochemical analysis.
              In Phase 5 (data analysis and decision), flow rate testing and purity assessment determine whether a site
              warrants appraisal or development. Koloma completed test wells in Kansas in 2022-2023 (Nemaha Ridge, High
              Plains Resources subsidiary) and Idaho in 2024 (Twin Peaks 1W, Cascade Exploration subsidiary). S&P Global
              reported "encouraging results" from the Kansas wells, but specific flow rates and purity data have not
              been disclosed. The Idaho well in basalt formations is considered technically controversial by GeoExpro.
              The customer workflow for industrial hydrogen buyers runs parallel to this exploration cycle: buyers like
              MHI, Osaka Gas, and United Airlines engaged via strategic investment, signaling future offtake intent, but
              no binding LOI or offtake agreement has been publicly disclosed. There is no commercial-stage H2
              production anywhere outside Bourakébougou, Mali, establishing a global pre-commercial baseline for
              Koloma's operating context.
            claimRefs:
