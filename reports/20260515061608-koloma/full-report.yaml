          - type: callout
            title: Status-quo substitute sets a hard $1-2/kg parity bar
            body: >-
              Grey hydrogen from SMR remains the price floor; until natural hydrogen demonstrates production at or below
              that range, demand activation will lag supply ambition.
            calloutType: risk
            claimRefs:
