            body: >-
              Koloma's technology roadmap has progressed from geological thesis (2021) through Kansas test wells
              (2022-23) to multi-partner survey activation (2024-25). The December 2023 launch of the Ohio State Energy
              Advancement and Innovation Center (EAIC) formalized the academic-industry research partnership and
              provides an independent geochemical validation node for core samples. The October 2024 Xcalibur Smart
              Mapping aero-EM partnership added a commercial geophysical survey capability. The Fleet Space Technologies
              satellite seismic partnership (announced October 2024, expanded February 2025) is the most technologically
              distinctive element: ExoSphere full-wave 3D subsurface models have not previously been applied to natural
              H2 exploration, giving Koloma a potential first-mover advantage in 3D imaging. Tom Darrah, CTO and
              co-founder, brings over 20 years of subsurface gas geochemistry expertise from Ohio State University,
              directly anchoring the scientific credibility of the exploration thesis. The natural H2 sector TRL
              benchmark from arxiv and GSA publications confirms that the core science of H2 generation
              (serpentinization, radiolysis) is well-established, while the engineering translation to commercial
              production remains unproven. The 2026 and beyond roadmap requires: first commercial-flow-rate well
              disclosure, first signed offtake agreement, and resolution of the US regulatory framework for natural H2.
              All three remain open milestones. The sector has grown from approximately 5 companies in 2018 to 40+ by
