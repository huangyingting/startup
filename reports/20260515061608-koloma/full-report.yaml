            body: >-
              Koloma's customer portfolio carries significant concentration risk across multiple dimensions. First, all
              five named customers are simultaneously equity investors, creating a structural conflict between investor
              return maximization and offtake price negotiation: a customer seeking the lowest possible hydrogen price
              may conflict with an investor seeking the highest possible company valuation. This dual-role dynamic has
              no established governance framework in Koloma's public disclosures. Second, geographic concentration is
              material: Mitsubishi Heavy Industries and Osaka Gas together represent Japan-centric industrial demand,
              accounting for a disproportionate share of Koloma's disclosed strategic capital. Third, sector
              concentration exists in the industrial fossil-fuel transition use cases, with three of five named
              customers tied to petroleum refining or ammonia production — sectors whose hydrogen demand could be at
              risk from longer-term structural decline in fossil fuel refining as the energy transition progresses.
              Fourth, and most critically, zero binding commitments exist across all five customers: if Koloma achieves
              commercial production but fails to convert any of its five investor-customers to paying offtake buyers,
              its revenue concentration risk becomes an existential commercial failure. Expansion beyond the current
              five named investor-customers requires Koloma to develop an arm's-length customer pipeline — utilities,
              industrial buyers, or offtakers with no equity stake — which has not yet been publicly initiated. The
              Hydrogen Council's demand forecasts support large addressable volumes in ammonia and refining, but
              converting sector demand into Koloma-specific signed contracts requires production proof that does not yet
              exist.
