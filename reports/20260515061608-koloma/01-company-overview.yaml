  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Latest valuation undisclosed in retained Series B coverage
    missingEvidence: Exact post-money valuation, share price and any 2025-2026 secondary pricing references for Koloma.
    whyItMatters: Latest valuation is a required cover metric and an input for later financial chapters, but no retained source
      discloses one.
    diligencePath: Obtain the Series B and extension term sheets, latest 409A or secondary pricing memo, and board-approved
      financing summary.
    relatedQuestionRefs:
    - QO008
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Customer roster and revenue undisclosed for Koloma in 2026
    missingEvidence: Customer count, contracted offtake, recognized revenue and run-rate figures.
    whyItMatters: These are cover metrics for the report and necessary for judging commercialization pace.
    diligencePath: Request customer roster, signed offtake agreements, revenue bridge and forward booked-orders schedule from
      finance and commercial leadership.
    relatedQuestionRefs:
    - QO022
    relatedTableRefs: []
  - type: missing-source
    severity: material
    topic: No public board roster or governance map for Koloma
    missingEvidence: Current board members, observer rights, committee assignments and investor protective provisions.
    whyItMatters: Company Overview should anchor governance for later risk and valuation work, and public sources do not yet
      resolve the governing body behind the disclosed executives.
    diligencePath: Request the latest board deck, charter documents, investor rights agreement and cap-table governance summary
      from management.
    relatedQuestionRefs:
    - QO005
    relatedTableRefs:
    - TO002
  - type: enumeration-incomplete
    severity: material
    topic: Stakeholder or investor map covers visible investors only, not full cap table
    missingEvidence: Ownership percentages, board seats, liquidation preferences, pro-rata rights and government-grant obligations.
    whyItMatters: The table can name visible institutional and strategic investors but not the full power structure behind
      future financing decisions.
    diligencePath: Request the latest cap table, investor rights schedule, side letters and DOE/ARPA-E award agreements with
      milestones and IP covenants.
    relatedQuestionRefs: []
    relatedTableRefs:
    - TO003
  - type: enumeration-incomplete
    severity: minor
    topic: Milestone table omits private board actions and undisclosed field results
    missingEvidence: Internal program-review gates, exact dates of Kansas/Idaho production tests and undisclosed contract
      signings.
    whyItMatters: The chapter has a usable public chronology, but later diligence should not mistake it for a complete internal
      operating history.
    diligencePath: Ask management for the internal milestone tracker, well-test schedule and signed commercial timeline by
      project.
    relatedQuestionRefs: []
    relatedTableRefs:
    - TO004
  - type: missing-source
    severity: minor
    topic: Material 2024-2026 leadership changes only partially visible from current public pages
    missingEvidence: Dated executive-change log covering departures, new hires and any board transitions at Koloma.
    whyItMatters: Key-person diligence depends on knowing whether current executives are stable, newly hired or interim during
      scale-up.
    diligencePath: Request executive employment history, appointment dates and any recent succession or search processes.
    relatedQuestionRefs:
    - QO024
    relatedTableRefs:
    - TO002
