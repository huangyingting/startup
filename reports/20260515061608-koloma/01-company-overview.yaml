- id: section-4
  title: Operating footprint, partnerships and field activity
  body: 'Koloma''s operating footprint is split between a Denver corporate base, the Ohio State Energy Advancement and Innovation
    Center research hub opened in December 2023, and field exploration through two named subsidiaries: High Plains Resources
    in Kansas (where five-plus test wells were drilled between 2022 and 2023) and Cascade Exploration in Idaho (where the
    Twin Peaks 1W well was reported drilled in Canyon County in November 2025). Strategic partnerships disclosed by 2026 include
    Mitsubishi Heavy Industries and Osaka Gas (October 2024 Series B extension and Japanese commercialization linkage), Fleet
    Space Technologies (February 2025 satellite imaging collaboration), and Xcalibur Smart Mapping (October 2024 airborne
    magnetic surveys). Australia expansion announced in February 2025 represents the company''s first international footprint.
    Headcount is reported informally at roughly 69 employees as of March 2026 by independent databases. The technical mechanism
    Koloma articulates publicly combines AI-driven geological modeling, seismic mapping, satellite imaging and physical core
    sampling, but neither the physics nor the unit economics have been disclosed in detail.'
  claimRefs:
  - CO015
