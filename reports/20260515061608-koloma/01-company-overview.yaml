company:
  name: Koloma
chapter:
  number: 1
  title: Company Overview
  summary: Koloma is a Denver, Colorado-based natural-hydrogen exploration and production company founded in 2021 by Pete
    Johnson, Paul Harraka and Tom Darrah. Retained public sources support roughly $403 million of disclosed funding, a 69-person
    team, operating footprints in Kansas and Idaho via the High Plains Resources and Cascade Exploration subsidiaries, and
    a research hub at Ohio State. The main unresolved items are latest valuation, customer or revenue disclosure, board composition
    and detailed Kansas/Idaho field results.
sections:
- id: section-1
  title: Identity, headquarters and stage
  body: 'Koloma presents itself as a Denver, Colorado-based natural hydrogen exploration and production company founded in
    2021 to commercialize geologic hydrogen as a low-carbon, low-cost source of clean fuel. Its corporate website and About
    page describe a mission centered on locating subsurface accumulations of naturally occurring molecular hydrogen and producing
    them at meaningful scale. Public coverage from Canary Media and S&P Global frames Koloma as pre-revenue and still in the
    exploration and pilot phase, with no commercial offtake disclosed through May 2026. The company is incorporated in Delaware
    and registered with the SEC under CIK 0001881912, an unusual signal of regulatory visibility for a private exploration
    company at this stage. Together these sources support a clean identity reusable by later chapters: a U.S.-headquartered,
    founder-led, pre-revenue natural-hydrogen developer with deep capital but limited operating disclosure.'
  claimRefs:
  - CO001
  - CO002
  - CO004
  - CO008
  - CO021
  - CO033
  tableRefs:
  - TO001
  figureRefs:
  - FO002
- id: section-2
  title: Founders, leadership and governance visibility
  body: 'Founder attribution is consistent across retained sources. Koloma names Pete Johnson as Chief Executive Officer,
    Paul Harraka as Chief Business Officer, and Tom Darrah as Chief Technology Officer; the three are the publicly identified
    co-founders. Tom Darrah anchors the technical narrative as a former full professor of earth sciences at The Ohio State
    University with a PhD in geology from the University of Rochester and more than two decades of subsurface gas-geochemistry
    research, which directly underwrites Koloma''s exploration thesis and the December 2023 launch of its Ohio State research
    hub. Beyond the three founders, Koloma''s website does not publish a full executive bench, a board roster, or a dated
    leadership-change log. The result is a relatively thin governance disclosure surface: investors and operating leadership
    are partially visible via funding announcements, but key-person dependence on the three founders, especially Darrah for
    technical credibility, is high and should be carried forward as a diligence question.'
  claimRefs:
  - CO002
  - CO003
  - CO017
  - CO030
  - CO031
  - CO034
  tableRefs:
  - TO002
- id: section-3
  title: Capital formation, investor mix and non-dilutive support
  body: Koloma's funding chronology follows a fast climb from a June 2023 $91 million Series A led by Breakthrough Energy
    Ventures, through a February 2024 $245.7 million Series B led by Khosla Ventures, to an October 2024 Series B extension
    of approximately $52 million in which Mitsubishi Heavy Industries and Osaka Gas added roughly $50 million combined. Cumulative
    disclosed capital, including ARPA-E (~$0.9M, February 2024) and a U.S. Department of Energy award (~$7.5M, May 2025),
    totals approximately $403 million by mid-2025. The investor mix blends climate-focused venture capital (Khosla, Breakthrough,
    Energy Impact Partners, Prelude, Piva, Evok, Astutia) with strategic corporates (Amazon Climate Pledge Fund, United Airlines
    Ventures, Mitsubishi Heavy Industries, Osaka Gas) and non-dilutive federal capital. SEC filings under CIK 0001881912 corroborate
    the financing activity but no post-money valuation has been disclosed in any retained public source through May 2026,
    leaving valuation a material public unknown.
  claimRefs:
  - CO005
  - CO006
  - CO007
  - CO008
  - CO009
  - CO010
