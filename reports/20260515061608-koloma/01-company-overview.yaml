- id: section-5
  title: Adverse signals and remaining diligence gaps
  body: 'The chapter must preserve adverse-tone evidence alongside the positive funding narrative. S&P Global Commodity Insights
    published a January 2025 piece characterizing Koloma as quiet about its next operational steps despite roughly $400 million
    in funding, and GEO ExPro''s 2024 ''Koloma Enigma'' feature highlighted skepticism inside the geoscience community about
    Koloma''s secrecy and technical opacity. Drilling for Hydrogen reports that the natural hydrogen industry crossed $1 billion
    of cumulative private investment by January 2026, with Koloma representing roughly 85 percent of that pool — a position
    that is both a competitive moat and a concentration risk if scientific or regulatory headwinds materialize. The remaining
    underwriting gaps are concrete: no published valuation, no customer or revenue disclosure, no board roster, no public
    production data from Kansas or Idaho, and limited transparency on the unit economics that would justify the company''s
    capital lead. Each of these gaps is captured in the chapter''s evidenceGaps and should be carried forward as explicit
    diligence asks rather than normalized into false precision.'
  claimRefs:
  - CO012
  - CO013
  - CO023
  - CO024
  - CO025
  - CO032
  - CO034
