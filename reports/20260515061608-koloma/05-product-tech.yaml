chapter:
  number: 5
  title: Product & Technology
  summary: Koloma's product is a proprietary natural-hydrogen exploration platform that layers surface geochemical sampling, satellite and aero-electromagnetic surveys, AI-driven geological modeling, and deep well drilling to locate and characterize pre-existing subsurface hydrogen reservoirs in crystalline basement rocks. The technology integrates partner capabilities from Fleet Space Technologies and Xcalibur Smart Mapping with independent validation at the Ohio State EAIC. All major modules are operational at the exploration stage but remain pre-commercial; no flow rates, purity data, or per-well economics have been publicly disclosed as of May 2026.
sections:
  - id: subsurface-science-geological-basis
    title: Subsurface Science and Geological Basis
    body: 'Koloma''s exploration thesis rests on well-established geoscience: naturally occurring molecular hydrogen accumulates in the subsurface through two principal mechanisms. The first is serpentinization, the reaction between water and iron- or magnesium-rich ultramafic rocks (peridotites, dunites) that generates H2 as a byproduct of olivine oxidation. The second is radiolysis, the splitting of water molecules by alpha particles emitted by uranium, thorium, and potassium-40 present in crystalline basement rocks. Both mechanisms are documented in peer-reviewed literature including a 2024 Nature Communications Engineering review and a 2023 Geology paper from the Geological Society of America, and are acknowledged by the USGS as an emerging energy resource. The Nemaha Ridge in Kansas is Koloma''s primary target: it is an ancient tectonic suture zone exposing ultramafic and mafic crystalline basement rocks beneath a thin sedimentary cover, creating conditions favorable for serpentinization-generated H2 accumulation. Idaho basalt formations represent a secondary, more controversial target whose geological suitability has been questioned by GeoExpro. Methane is a common co-product in natural H2 systems because microorganisms can consume H2 and produce CH4, affecting purity and carbon intensity. The geoscientific basis for natural H2 generation is solid, but the commercial question of whether adequate reservoirs with sustainable flow rates exist at the Koloma target sites remains unanswered in the public record.'
    claimRefs:
      - CE001
      - CE002
      - CE008
      - CE019
      - CE025
