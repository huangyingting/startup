    body: 'Koloma is the only natural hydrogen exploration company that has publicly announced integration of satellite ambient-noise seismic (Fleet Space), airborne EM (Xcalibur), AI geological modeling, and an academic geochemistry lab (OSU EAIC) into a single exploration workflow as of early 2025. This multi-modal approach improves pre-drill confidence versus single-method competitors and reduces the risk of dry holes.'
