company:
  name: Koloma
chapter:
  number: 4
  title: Financials
  summary: Koloma is pre-revenue with no customer count, recognized revenue, cash-on-hand, monthly burn or runway publicly disclosed through May 2026. Cumulative disclosed funding sums to roughly $403 million across Series A, Series B, Series B extension and ~$8.4M of federal non-dilutive support, with SEC Form D filings under CIK 0001881912 anchoring the institutional record. The financial verdict turns on per-well economics, first signed offtake and reservoir-engineering validation; S&P Global has flagged the capital-to-progress ratio as a concern.
sections:
- id: section-1
  title: Revenue streams, pricing and recognition issues
  body: Koloma is pre-revenue. No retained public source through May 2026 discloses any customer roster, recognized revenue, run-rate, or signed offtake agreement; the only realized cash inflow is approximately $8.4 million of federal non-dilutive support (ARPA-E ~$0.9M and DOE ~$7.5M). The only credible revenue mechanism on the horizon is direct strategic offtake of produced natural hydrogen to industrial buyers — refining, ammonia and methanol pour-points first, with optional aviation SAF and Asian utility derivatives signaled by the cap table (United Airlines Ventures, Mitsubishi Heavy Industries, Osaka Gas). Koloma's public price target is $0.50-$1.50 per kilogram for natural hydrogen, materially below grey hydrogen's $1-2/kg floor and far below green hydrogen's $3-7/kg cost basis. All revenue rows in this chapter accordingly carry 'no revenue' status, and the diligence baseline is to test signed-offtake, LOI and forward-framework status.
  claimRefs:
  - CI001
  - CI002
  - CI003
  - CI017
  - CI022
  - CI028
  - CI034
  tableRefs:
  - TI001
  - TI002
- id: section-2
  title: GTM motion and sales-efficiency proxies
  body: 'GTM disclosure is essentially empty: Koloma has not published CAC, sales-cycle data, channel economics or pipeline conversion rates. The most defensible inference is a direct strategic offtake motion — selling produced hydrogen directly to large industrial counterparties — rather than channel or reseller distribution. The strategic-investor signature on the cap table is the closest public proxy for sales pipeline: Mitsubishi Heavy Industries and Osaka Gas anchor an Asian industrial-and-utility demand thesis, and United Airlines Ventures anchors an aviation-SAF demand thesis. Sales efficiency cannot be measured today; for a pre-revenue exploration company the more useful proxies are exploration acreage held, drilled wells per dollar of capex, and partner-of-the-month signaling. Koloma scores well on the latter (Fleet Space, Xcalibur Smart Mapping, Ohio State, MHI, Osaka Gas), but capex efficiency per drilled well is not publicly disclosed.'
  claimRefs:
  - CI004
  - CI005
  - CI019
  - CI028
  figureRefs:
  - FI001
- id: section-3
  title: Cost structure, gross margin drivers and capital intensity
  body: Cost structure for natural-hydrogen exploration is decisively capex-heavy. Drilling rigs, seismic surveys, satellite imaging, AI modeling infrastructure and surface processing dominate the spend, with limited inventory or working-capital intensity (since there is no finished-goods inventory yet). Per-well capex is estimated in the low single-digit millions but varies materially with depth and geography; Koloma has not disclosed per-well economics. Gross-margin economics are theoretically attractive at the $0.50-1.50/kg price target but require amortizing drilling capex across high-volume reservoirs over multi-year reservoir life — an assumption that is unverified at commercial scale. R&D opex (Ohio State research hub, Darrah-led science) should be modeled distinctly from drilling capex. Service-delivery cost is heavy on third-party providers because the ~69-person headcount cannot internalize seismic, satellite or drilling operations. The unit-economics table accordingly carries mostly null cells with explicit diligence asks.
  claimRefs:
  - CI006
  - CI007
  - CI008
  - CI024
  - CI030
  - CI035
  tableRefs:
  - TI003
  figureRefs:
  - FI002
- id: section-4
  title: Public traction proxies versus private-metric gaps
  body: 'Public traction proxies for Koloma substitute for revenue: two active drilling subsidiaries (High Plains Resources in Kansas, Cascade Exploration in Idaho), an Ohio State research hub, a roughly 69-person headcount, partnerships with Fleet Space and Xcalibur, and Series B participation by Mitsubishi Heavy Industries and Osaka Gas. None of these substitute for a P&L. Private-metric gaps are large and material: no cash on hand, no monthly burn, no runway, no per-well capex, no signed offtake, no customer count, no revenue, and no post-money valuation. S&P Global Commodity Insights flagged the same pattern in January 2025 (~$400M in funding while remaining quiet on operational next steps). GEO ExPro raised an adverse signal that Koloma''s Idaho Cascade Exploration drilling could be hydrocarbon-prospecting under a hydrogen framing — a capex-quality concern. The public financial gaps table treats each missing metric as an explicit diligence path rather than as a number to be guessed.'
  claimRefs:
  - CI004
  - CI011
  - CI013
  - CI015
  - CI019
  - CI020
  - CI026
  - CI032
  tableRefs:
  - TI005
- id: section-5
  title: Capital adequacy and financing dependency
  body: This section refers to the Company Overview chapter's milestone-of-record chronology of equity rounds without copying its claim ids; financing facts needed here are minted as local Financials claims (CI009 for the cumulative ~$403M, CI016 for the SEC Form D filings, CI017 for federal non-dilutive support, CI033 for the institutional financing baseline). Cash on hand and monthly burn are not publicly disclosed. A directional burn estimate of $50-100 million per year is plausible from the public headcount and capex signals (~69 employees plus active drilling in two states plus an Ohio State research hub), implying a 3-5 year runway from the disclosed capital base. Planned use of funds spans drilling capex (Kansas, Idaho, Australia), AI/seismic R&D, Ohio State hub support and corporate G&A. Next-round trigger is most likely tied to validation of commercial flow rates and/or the first signed offtake agreement; neither has been publicly disclosed. No project finance, debt or convertible facility has been disclosed. Strategic-investor (MHI / Osaka Gas / United Airlines) participation suggests near-term bridge optionality if needed.
  claimRefs:
