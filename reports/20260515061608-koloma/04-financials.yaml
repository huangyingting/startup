- id: section-6
  title: Financial verdict on revenue quality, margin path and capital intensity
  body: 'The financial verdict on Koloma in 2026 is straightforward: revenue quality is unverifiable because there is none disclosed; margin path is theoretically attractive (the $0.50-1.50/kg target implies very high gross margin if reservoirs validate at scale) but unproven at commercial level; capital intensity is high and front-loaded; and the binding diligence blockers are per-well economics, signed offtake commitments, and reservoir-engineering validation. S&P Global Commodity Insights has explicitly framed the capital-to-progress ratio as a financial concern. The clear upside case rests on (a) successful well validation in Kansas and/or Idaho producing commercial flow rates, (b) DOE Hydrogen Hub or scale-up grant awards that extend runway, and (c) strategic-investor bridge financing tied to forward offtake. The downside case is that Koloma''s $403M raised continues without commercial validation, eventually forcing a down-round at a non-credibility-preserving valuation. Either way, the next 24 months of well results and offtake disclosure are the most important inputs to any underwriting model.'
  claimRefs:
  - CI021
  - CI025
  - CI027
  - CI028
  - CI031
  - CI032
