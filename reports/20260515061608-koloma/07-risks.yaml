callouts:
  - calloutType: risk
    title: 'Regulatory void is the most material near-term investment risk'
    body: >-
      The absence of a federal regulatory framework for natural hydrogen production is not merely
      a procedural gap — it is an existential risk to Koloma's commercial timeline. Without BLM
      mineral rights clarity, EPA permitting precedent, and IRA 45V certification, Koloma cannot
      legally extract and sell natural hydrogen at commercial scale on federal lands or claim the
      subsidies available to green hydrogen competitors. DLA Piper's June 2024 analysis confirmed
      the nascent state of US natural hydrogen law, and S&P Global's March 2025 coverage noted
      the regulatory framework remains undefined. Every month of regulatory void extends the
      commercial production timeline and burns the finite $453 million capital base.
    claimRefs:
      - CR009
      - CR010
      - CR011
      - CR012

  - calloutType: risk
    title: 'Key-person dependency on Tom Darrah poses asymmetric downside risk'
    body: >-
      Tom Darrah is simultaneously Koloma's co-founder, chief scientist, and the academic architect
      of the geochemical fingerprinting methodology that differentiates the company from all
      competitors. His departure would not merely create a leadership vacancy — it would impair
      the core scientific methodology. No succession plan is disclosed and no equivalent academic
      partner is named. For an investor committing capital at Series B valuation, the absence of
      disclosed key-person mitigation represents an asymmetric downside: the upside of Darrah
      staying is priced in; the downside of his departure is not.
    claimRefs:
      - CR036
      - CR037
      - CR038
      - CR039

  - calloutType: insight
    title: 'Unproven well productivity is the thesis-break linchpin above all other risks'
    body: >-
      While the regulatory void is the most immediately visible risk, the ultimate thesis-break
      risk is well productivity. If Koloma discloses commercial well flow rates above 1 MMscfd at
      high H2 purity, the regulatory path will follow investor and policy pressure — the economics
      are compelling enough to unlock political will. Conversely, if disclosed well results fall
      below commercial threshold, no amount of regulatory clarity rescues the investment case.
      This means the surveillance priority for investors is well result disclosure, not regulatory
      docket monitoring, as the most actionable thesis signal.
    claimRefs:
      - CR006
      - CR007
      - CR018
      - CR019

