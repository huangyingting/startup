  - id: partner-dependency-financial-risks
    title: 'Partner, Dependency, and Financial Risks'
    body: >-
      Koloma's most severe partner dependency is the concentration of critical geochemical expertise
      in the Ohio State EAIC research partnership led by Tom Darrah. Unlike a standard university
      collaboration, this relationship is intertwined with Koloma's foundational IP: Dr. Darrah's
      research group at Ohio State has been the primary source of the geochemical fingerprinting
      methodology that distinguishes Koloma's exploration approach. If Dr. Darrah were to leave Ohio
      State, the EAIC partnership could be disrupted, potentially affecting Koloma's data pipeline
      and research output. No long-term contractual framework for the research relationship has been
      publicly disclosed. Fleet Space Technologies is the sole disclosed provider of ambient seismic
      data, and Xcalibur Mapping is the sole disclosed provider of airborne EM survey data; neither
      has a named backup in any public source. Koloma has no in-house drilling capability and depends
      entirely on third-party contractors for well execution.

      Financial dependency is the second major risk dimension. With approximately $453 million in
      disclosed total funding and no revenue, Koloma operates entirely on investor-provided capital.
      The company has not disclosed its monthly burn rate, current cash balance, or projected cash
      runway. At a Series B stage with 69 staff and active exploration in two states, a conservative
      estimate of annual operating costs would be $40-100 million per year. The risk of a down-round,
      bridge financing under adverse terms, or investor disengagement becomes material if commercial
      well results are not disclosed or are disappointing. Bloomberg and Axios coverage of the Series
      B confirmed no disclosed revenue, customers, or signed contracts at the time of financing.
      Market risks compound the picture: green hydrogen production costs are forecast to decline to
      $2-3 per kilogram by 2030 per IEA and BNEF projections, which could undermine Koloma's
      cost-competitiveness if natural hydrogen cannot be produced and delivered at $0.50-1.50 per
      kilogram as targeted. None of Koloma's five strategic investor-customers have signed binding
      offtake agreements.
