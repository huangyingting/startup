figures:
  - id: FR001
    title: Risk heatmap
    type: matrix
    summary: >-
      Two-dimensional risk heatmap positioning Koloma's key risks by likelihood (Y-axis, three levels)
      and impact (X-axis, four levels). The highest-risk quadrant (High Likelihood x Critical Impact)
      contains the regulatory void and commercial timeline failure. The High Likelihood x High Impact
      quadrant contains well productivity uncertainty. The Medium Likelihood x Critical Impact quadrant
      contains capital dependency. Low-likelihood catastrophic risks include total funding loss and
      surface rights litigation.
    data:
      columns:
        - 'Low Impact'
        - 'Medium Impact'
        - 'High Impact'
        - 'Critical Impact'
      rows:
        - label: 'High Likelihood'
          values:
            - ''
            - 'Commercial timeline slippage'
            - 'Well productivity unproven'
            - 'No federal regulatory framework'
        - label: 'Medium Likelihood'
          values:
            - 'Minor operational delay'
            - 'Partner tech concentration'
            - 'Key-person dependency (Darrah)'
            - 'Capital dependency (zero revenue)'
        - label: 'Low Likelihood'
          values:
            - 'Routine equipment failure'
            - 'Data security breach'
            - 'Surface rights litigation'
            - 'Total funding loss and wind-down'
    approximationNotes: >-
      Likelihood and impact assignments are analyst judgments based on reviewed public evidence.
      The regulatory framework void is placed at High Likelihood because no rulemaking is currently
      proposed and the legislative calendar is uncertain. Well productivity is placed at High Impact
      rather than Critical because there is a non-zero chance that a partial well result, while below
      commercial threshold, still demonstrates proof-of-concept value. Partner concentration and
      key-person risk are placed at Medium Likelihood because they have not occurred but have no
      disclosed mitigation to reduce their probability.
