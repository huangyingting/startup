company:
  name: Koloma
chapter:
  number: 7
  title: Risks
  summary: >-
    Koloma faces a multi-layered risk profile that is unusually severe for a pre-revenue startup at
    Series B stage. The most critical risks are structural: no federal regulatory framework exists
    specifically governing natural hydrogen exploration and production; Bureau of Land Management
    mineral rights classification of hydrogen gas is legally undefined; and no IRA Section 45V
    production tax credit pathway has been established for natural hydrogen. These regulatory voids
    compound operational uncertainty from undisclosed well results in Kansas and Idaho. Partner
    concentration is elevated: Fleet Space Technologies and Xcalibur Mapping supply critical survey
    data with no disclosed backup. The most severe single-point risk is key-person dependency on
    founder-scientist Tom Darrah, whose departure could critically impair Koloma's geological and
    geochemical knowledge base. Financial sustainability risk is high: with $453 million raised but
    no revenue, burn rate and cash runway are undisclosed, and the company requires continued capital
    raises to sustain operations. No commercial-scale well flow rate has been publicly confirmed.
    Thesis-break triggers center on well productivity falling below economic thresholds, failure to
    obtain federal permits, or inability to raise a next funding round before cash depletion.

sections:
  - id: severity-ranked-risk-overview
    title: 'Severity-Ranked Risk Overview'
    body: >-
      Koloma's risk profile is dominated by four critical-severity risks with no near-term mitigation
      pathway: the absence of a federal regulatory framework for natural hydrogen production, unproven
      commercial-scale well productivity, key-person concentration in founder-scientist Tom Darrah,
      and capital dependency on continued venture funding with zero revenue coverage. Below these
      critical risks sits a second tier of high-severity concerns including BLM mineral rights
      uncertainty, partner technology concentration, IRA 45V tax credit inaccessibility, and
      geological uncertainty in Idaho basalt formations. The company's pre-revenue status means that
      all financial and commercial risks are simultaneously elevated — there is no revenue cushion
      to absorb execution delays, regulatory setbacks, or key-person losses.

      Across six risk domains — regulatory/legal, operational/technical, partner/dependency,
      financial/model, people/execution, and market/commercial — the critical-to-high-severity risk
      register contains at least fifteen individually material items. The risk heatmap (FR001) shows
      that the highest-concentration zone is High-to-Critical impact with High-to-Medium likelihood,
      the quadrant most dangerous for investors: risks that are both likely and devastating. The
      regulatory void represents a thesis-level risk: if no federal framework emerges and BLM does
      not clarify mineral rights status for hydrogen, Koloma cannot obtain drilling permits at scale,
      which would strand all $453 million of invested capital. Conversely, if regulatory clarity
      emerges and first commercial well results are publicly disclosed with flow rates exceeding
      1 MMscf/d at high purity, the risk profile collapses substantially. Each top risk has a
      monitorable trigger and a thesis-break threshold defined in the mitigation table TR005.
