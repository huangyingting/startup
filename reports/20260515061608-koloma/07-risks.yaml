      Dependency arrows point toward the recipient of the dependency (Koloma). All five external
      nodes supply critical inputs with no disclosed redundancy. The Ohio State EAIC node is also
      the founder-scientist key-person node (Tom Darrah), making it simultaneously an academic
      partnership risk and a people risk. The capital investor node aggregates four distinct
      investors whose combined continued commitment is required to sustain operations.
