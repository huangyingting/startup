  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: operational-risk
      missingEvidence: >-
        Commercial well flow rates, hydrogen purity levels, reservoir pressure profiles, and
        production decline curves from Koloma's test wells at Nemaha Ridge (Kansas) and Twin Peaks
        1W (Idaho). These data are the most critical operational evidence for the investment thesis
        and have not been publicly disclosed despite drilling completing in 2022-2024.
      whyItMatters: >-
        Without commercial-scale well data, it is impossible to assess whether Koloma's geological
        model produces hydrogen at rates and purity levels that justify the $453 million invested.
        All financial projections, offtake economics, and partner negotiations depend on this data.
      diligencePath: >-
        Request full well production data package under NDA, including flow rates, purity analysis,
        pressure decline curves, reservoir volume estimates, and any independent engineering audit.
        Require disclosure of the metrics management uses to define encouraging results.
      relatedQuestionRefs:
        - QR013

    - type: private-evidence-only
      severity: material
      topic: financial-risk
      missingEvidence: >-
        Koloma's monthly cash burn rate, current cash balance, quarterly operating expenditure
        breakdown, and projected cash runway from the August 2024 Series B close. None of these
        financial metrics have been publicly disclosed in any press release, investor update, or
        regulatory filing reviewed as of May 2026.
      whyItMatters: >-
        Without knowing the burn rate and runway, investors cannot assess how much time Koloma
        has before needing to raise additional capital, directly affecting the risk of a down-round,
        distress financing, or operational curtailment if commercial milestones are delayed.
      diligencePath: >-
        Request audited or management-prepared financial statements under NDA covering at minimum
        the twelve months from Series B close, including burn rate by function, capex for drilling,
        and projected cash runway under base and adverse scenarios.
      relatedQuestionRefs:
        - QR022

    - type: missing-source
      severity: blocking
      topic: regulatory-risk
      missingEvidence: >-
        A clear federal regulatory approval pathway specifying which agencies, licenses, and
        environmental reviews are required before Koloma can begin commercial natural hydrogen
        extraction and sale in the United States. No agency has issued formal guidance, proposed
        rulemaking, or policy letter specifically addressing natural hydrogen production permitting.
      whyItMatters: >-
        The lack of a regulatory pathway is not merely procedural — it means Koloma cannot obtain
        permits to operate at commercial scale and cannot access IRA 45V subsidies. This creates
        a fundamental timeline risk that no amount of geological or financial progress can resolve
        without federal regulatory action.
      diligencePath: >-
        Monitor DOE, BLM, and EPA rulemaking dockets for natural hydrogen proposals. Engage
        regulatory counsel to obtain informal guidance letters from BLM regarding mineral rights
        classification. Track legislative activity in Congress for natural hydrogen-specific policy.
      relatedQuestionRefs:
        - QR028

    - type: missing-source
      severity: material
      topic: ip-risk
      missingEvidence: >-
        Koloma's specific patent portfolio including patent numbers, claims, filing dates, expiration
        dates, and freedom-to-operate analysis covering its core geochemical fingerprinting
        methodology and geological targeting model. No patent identifiers are publicly disclosed.
      whyItMatters: >-
        Without knowing the IP protection scope, investors cannot assess whether Koloma's
        competitive moat is defensible or whether competitors can replicate its exploration
        methodology by publishing in academic literature or independently developing equivalent
        approaches based on publicly available geological science.
      diligencePath: >-
        Request a complete IP register under NDA, including patent numbers, claims, jurisdictions,
        expiration dates, and a freedom-to-operate opinion from IP counsel covering Koloma's
        core exploration methodology and any licensed Ohio State EAIC research.
      relatedQuestionRefs:
        - QR030

    - type: enumeration-incomplete
      severity: material
      topic: regulatory-legal-risk-register
      missingEvidence: >-
        Complete enumeration of all state-level regulatory frameworks for natural hydrogen mineral
        rights classification across Kansas, Idaho, and any other Koloma exploration states;
        potential DOE production certification rules; EPA site-specific permitting requirements for
        each well location; international regulatory regimes applicable to Japanese investor-customers;
        and any pending litigation or regulatory challenges from surface landowners.
      whyItMatters: >-
        The partial enumeration in TR001 covers the six most visible federal regulatory touchpoints
        but may understate the total regulatory burden. State-level hydrogen regulation varies
        significantly and any gap in the regulatory register could represent an unidentified
        material risk that is not captured in the current analysis.
      diligencePath: >-
        Commission a comprehensive state-by-state regulatory survey for natural hydrogen across
        all states where Koloma holds or may acquire mineral rights. Engage environmental counsel
        for a site-specific NEPA checklist for each existing and planned well location.
      relatedQuestionRefs:
        - QR007
        - QR032
      relatedTableRefs:
        - TR001

