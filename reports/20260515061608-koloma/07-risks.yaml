  - id: people-execution-mitigations
    title: 'People, Execution Risks, and Mitigations'
    body: >-
      Koloma's people risk is concentrated at the top of its scientific structure. Tom Darrah, the
      company's co-founder and chief scientist, holds a unique combination of geological and
      geochemical expertise in natural hydrogen that is not replicated by any other disclosed Koloma
      team member. Dr. Darrah's Ohio State laboratory has been the primary producer of the
      geochemical fingerprinting methodology that Koloma uses to identify and validate natural
      hydrogen accumulations. His departure would create an asymmetric information gap: competitors
      could potentially recruit him, taking institutional knowledge not fully embodied in patents
      or disclosed methodologies. No succession plan, backup scientific lead, or alternative chief
      scientist has been identified in any public source as of May 2026.

      The broader management team opacity compounds this risk. Unlike most Series B companies,
      Koloma has not publicly disclosed a full executive team roster beyond Dr. Darrah and
      co-founders Pete Johnson and Paul Harraka. The CEO identity, CFO, COO, and Head of Business
      Development are not identified in any reviewed public source as of May 2026, making it
      impossible to assess team depth, succession planning, or commercial execution capability.
      On the mitigation side, Koloma has taken partial steps: the Ohio State Innovation District
      hub formalizes the research relationship; the Fleet Space and Xcalibur partnerships provide
      external survey capabilities; and the $453 million capital base provides financial runway.
      However, no formal thesis-break thresholds have been publicly articulated by management.
      The mitigation and monitoring criteria table (TR005) defines observable trigger events that
      investors should apply from the outside. If Tom Darrah departs, first well results are
      disappointing, no federal regulatory pathway emerges by late 2026, or no next funding round
      is announced by mid-2027, each event should trigger a thesis reassessment.
