  - id: regulatory-legal-risks
    title: 'Regulatory and Legal Risks'
    body: >-
      The single most consequential risk Koloma faces is the absence of a federal regulatory framework
      governing natural hydrogen exploration and production. Unlike oil, natural gas, coal, or
      geothermal energy — all of which have established permitting regimes, lease structures, and
      environmental review protocols — natural hydrogen occupies a regulatory void as of May 2026.
      The Bureau of Land Management does not have a clearly established position on whether hydrogen
      gas constitutes a leasable mineral under the Mineral Leasing Act of 1920, which governs
      subsurface resource extraction on federal lands. This uncertainty creates a fundamental question
      for any Koloma operation on federal land: does the company need a standard oil-and-gas lease,
      a geothermal lease, or a novel hydrogen-specific lease? DLA Piper's June 2024 legal analysis
      of natural hydrogen explicitly flagged this gap, noting that federal natural hydrogen regulation
      is nascent with no established permitting precedent. The EPA has general hydrogen safety
      regulations under its Clean Air Act authority, but no specific air quality permit pathway for
      large-scale natural hydrogen extraction sites has been established or tested.

      The IRA Section 45V clean hydrogen production tax credit, which provides up to $3 per kilogram
      for green hydrogen with lifecycle emissions below 0.45 kg CO2e per kg H2, does not explicitly
      recognize or certify natural hydrogen. The DOE's Clean Hydrogen Strategy and Roadmap
      acknowledges natural hydrogen as a potential source but does not establish a certification
      pathway. For Koloma to benefit from 45V, it would need a DOE or Treasury ruling specifically
      covering natural hydrogen's carbon intensity lifecycle. This regulatory uncertainty means
      Koloma's natural hydrogen would currently be sold without the 45V subsidy that green hydrogen
      competitors can access, undermining the cost-competitiveness narrative. S&P Global's March
      2025 regulatory coverage confirmed the federal framework remains undefined. On the IP front,
      Koloma has not publicly disclosed a comprehensive patent portfolio with specific patent numbers
      or scope, creating IP leakage risk. Surface rights versus mineral rights conflicts — common in
      US oil and gas operations — are untested for natural hydrogen but represent a plausible
      litigation risk at any acreage where Koloma holds mineral rights but not surface ownership.
