  - id: operational-technical-risks
    title: 'Operational and Technical Risks'
    body: >-
      Koloma's operational risk profile is dominated by fundamental uncertainty surrounding
      commercial-scale well productivity. The company drilled test wells at Nemaha Ridge, Kansas
      (2022-2023) and Twin Peaks 1W, Idaho (2024). S&P Global reported encouraging but undisclosed
      results from the Kansas wells in January 2025, and Hydrogen Fuel News reported encouraging
      signals from the Idaho test well. However, no commercial well flow rate, hydrogen purity level,
      or reservoir longevity estimate has been publicly disclosed by Koloma as of May 2026. This is
      the central operational uncertainty: the entire investment thesis rests on the ability to
      produce hydrogen at commercial scale and purity, and the evidence remains entirely private.
      GeoExpro's critical analysis of Koloma's methodology questioned whether the geological models
      developed for craton-interior hydrogen accumulations in Kansas can transfer directly to the
      basalt formations in Idaho, noting that the hydrogen generation mechanisms in these two
      geological provinces are materially different.

      Hydrogen purity is a critical technical variable. Natural hydrogen reservoirs typically contain
      mixtures of H2, methane, helium, CO2, nitrogen, and trace hydrocarbons. Methane co-production
      degrades the carbon intensity of the extracted gas, potentially eliminating the clean energy
      economics that justify Koloma's target pricing. Microbial consumption of H2 in the subsurface —
      a well-documented phenomenon in academic literature — can significantly reduce effective flow
      rates over time and create reservoir depletion scenarios faster than modeled. The SPE natural
      hydrogen technical committee has noted that reservoir depletion and microbial contamination are
      among the primary technical risks for natural hydrogen exploration globally. Koloma's
      operational execution also depends on third-party technology partners: Fleet Space Technologies
      provides ambient seismic surveying and Xcalibur Mapping provides airborne electromagnetic
      survey data. Koloma has no disclosed in-house seismic or AEM survey capability, making it
      structurally dependent on these two suppliers. Electrek and Canary Media published skeptical
      analyses questioning whether natural hydrogen can be produced at commercial scale and whether
      geological models are transferable across geological environments.
