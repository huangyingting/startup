    type: dag
    summary: >-
      Directed dependency graph showing the five critical external dependencies that Koloma requires
      for exploration and operational continuity, with arrows indicating what each dependency supplies
      to Koloma. The Ohio State EAIC and capital funding dependencies are the most severe single-point
      risks; all five dependencies lack disclosed contractual redundancy or backup providers.
    data:
      nodes:
        - id: d1
          label: 'Koloma Inc.'
          description: >-
            Central exploration operator; coordinates all partner data and capital inputs for
            geological targeting and well drilling across Kansas and Idaho
        - id: d2
          label: 'Ohio State EAIC (Tom Darrah)'
          description: >-
            Provides geochemical fingerprinting methodology, subsurface fluid analysis, and
            academic credibility; founder-level key-person dependency with no disclosed backup
        - id: d3
          label: 'Fleet Space Technologies'
          description: >-
            Provides ambient seismic survey data via AGEIS platform; sole disclosed provider
            of surface-to-subsurface velocity models for Koloma exploration
        - id: d4
          label: 'Xcalibur Smart Mapping'
          description: >-
            Provides airborne electromagnetic survey maps; sole disclosed provider of AEM
            structural geology data for Koloma basement mapping
        - id: d5
          label: 'Third-party Drilling Contractors'
          description: >-
            Execute all well drilling and completion operations; Koloma has no in-house
            drilling capability or drilling equipment
        - id: d6
          label: 'Strategic Investors (BEV, BP, MHI, Osaka Gas)'
          description: >-
            Provide 100 percent of operating capital through equity investment; zero revenue
            means total capital dependency on continued investor commitment
