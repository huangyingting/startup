  topStrengths:
    - Largest natural hydrogen funding position globally (~$403M, ~85% of total private sector investment in the space)
    - >-
      Blue-chip investor syndicate (Khosla Ventures, Breakthrough Energy Ventures, Amazon, United Airlines, Mitsubishi
      HI, Osaka Gas) providing both capital and strategic offtake pathways
    - >-
      Differentiated CTO: Tom Darrah brings rare 20+ years of subsurface gas geochemistry expertise and an Ohio State
      University research infrastructure
    - >-
      Target geology (Nemaha Ridge, Kansas) features well-characterized ultramafic crystalline basement rocks with
      established serpentinization hydrogen-generation mechanisms
    - >-
      IRA Production Tax Credit of up to $3/kg provides substantial economics upside if carbon-intensity threshold met,
      potentially making natural H2 the lowest-cost hydrogen at scale
    - >-
      Proprietary AI-driven exploration platform combining satellite, seismic, and geochemical data creates a defensible
      exploration advantage over smaller peers
  topRisks:
    - >-
      Pre-commercial exploration: no publicly disclosed well flow-rate results or proof of commercial-scale H2
      accumulations; 'quiet on next steps' (S&P Global, Jan 2025)
    - >-
      Geological uncertainty: Idaho Twin Peaks 1W well targets basaltic formations widely considered higher-risk than
      ultramafic geology; GeoExpro geoscientists characterize it as 'very risky'
    - >-
      No global commercial precedent: the only commercial natural H2 site (Bourakébougou, Mali) produces ~5 tonnes/year
      at small scale; Koloma's scale thesis is entirely unproven
    - >-
      Methane co-production risk: natural H2 reservoirs commonly contain methane, adding greenhouse-gas liability and
      purification cost
    - 'Regulatory vacuum: no US federal or state framework for natural hydrogen resource rights, permitting, or offtake'
    - >-
      Key-person dependency: Tom Darrah's departure would materially impair technical credibility and exploration
      capability
    - >-
      Green hydrogen cost deflation: rapid electrolyzer cost reductions could erode natural H2's price advantage before
      commercialization
  unresolvedGaps:
    - >-
      Well productivity data: Koloma has not disclosed H2 concentrations, flow rates, or reservoir volumes from any
      Kansas or Idaho well
    - 'Production cost actuals: modeled $0.50–1.50/kg wellhead cost lacks empirical grounding from operating wells'
    - >-
      Regulatory pathway: no US regulatory framework exists; timeline and structure of resource rights, permitting, and
      offtake contract enforcement are undefined
    - >-
      Carbon intensity measurement: whether natural H2 qualifies for IRA PTC ($3/kg) at commercial scale requires full
      lifecycle analysis not yet published
    - >-
      Board composition and governance: board members not publicly disclosed; governance structure at $400M+ funding
      round opaque
    - >-
      Runway: disclosed funding suggests 3–5 years of runway at estimated burn rates, but no public burn rate or cash
      position data
