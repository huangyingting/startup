summary:
  headline: >
    Koloma is the best-funded natural hydrogen explorer worldwide, backed by tier-1 climate and energy investors, but
    remains pre-revenue with unconfirmed well results and significant geological, commercial, and regulatory uncertainty
    at a likely $600–900M implied valuation.
