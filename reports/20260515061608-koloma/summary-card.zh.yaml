summary:
  headline: |
    Koloma 是全球融资最多的天然氢勘探公司，背后有一线气候与能源投资人，但公司仍未产生收入，井口结果未获确认，地质、商业和监管不确定性都很高，隐含估值可能在 $600–900M。
