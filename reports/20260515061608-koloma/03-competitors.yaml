- id: section-2
  title: 'Profiles: scale, funding, target customer and strategic direction'
  body: 'Koloma''s funding scale dwarfs the named natural-hydrogen peer set: Series A $91M plus Series B $245.7M plus extension $52.4M plus DOE awards approaches $403M, against ASX-listed peers (Hyterra, Gold Hydrogen) below $50M and Natural Hydrogen Energy with only sparse disclosed activity. Strategically, Koloma targets U.S. industrial buyers and Asian utility/aviation offtake (signaled by Mitsubishi Heavy Industries, Osaka Gas and United Airlines Ventures on the cap table). Hyterra targets Kansas reservoir geographies with public-market disclosure discipline but no disclosed strategic offtake. Gold Hydrogen targets South Australian acreage. None of the natural-hydrogen pure-plays has disclosed binding offtake agreements by May 2026. Industrial-gas incumbents serve the same eventual buyer base via existing grey-H2 infrastructure with take-or-pay long-term contracts. Adjacent green-hydrogen producers serve the same low-carbon hydrogen segment but at a $3-7/kg cost basis that is materially above natural hydrogen''s $0.50-$1.50/kg target.'
  claimRefs:
  - CP007
  - CP008
  - CP020
  - CP022
  - CP024
  - CP034
  - CP035
  tableRefs:
  - TP002
- id: section-3
  title: Capability comparison and pricing
  body: Capability comparison is constrained by the segment's overall disclosure thinness. Koloma asserts a proprietary AI-driven geological exploration model alongside seismic mapping and satellite imaging, but no peer-reviewed validation has been published. Hyterra and Gold Hydrogen do not disclose comparable AI claims. Active drilling is concentrated at Koloma (Kansas via High Plains Resources, Idaho via Cascade Exploration) and Hyterra (Kansas licensed acreage). Pricing comparison is essentially empty across natural-hydrogen peers because no operator has reached commercial production. Koloma's stated $0.50-$1.50/kg target frames the aspirational price point; grey hydrogen at $1-2/kg sets the parity floor; adjacent green hydrogen at $3-7/kg highlights the economic upside if natural hydrogen delivers. Switching cost for industrial buyers from grey to natural hydrogen is dominated by transport and purification infrastructure — areas where industrial-gas incumbents hold structural advantage.
  claimRefs:
  - CP009
  - CP012
  - CP014
  - CP016
  - CP018
  - CP024
  - CP028
  tableRefs:
  - TP003
  figureRefs:
  - FP002
- id: section-4
  title: Switching cost, lock-in, distribution and supply access
  body: 'Distribution power decisively favors industrial-gas incumbents. Air Liquide, Linde and Air Products own the vast majority of existing hydrogen pipeline and trucking networks, which any natural-hydrogen operator must access or duplicate. Multi-homing among natural-hydrogen suppliers is structurally low because reservoirs are non-fungible — buyers cannot easily switch suppliers reservoir-by-reservoir without a midstream transport network that does not yet exist. This implies a longer-term lock-in benefit if and when natural-hydrogen reservoirs reach commercial production, but only after midstream infrastructure is built. Internal-build risk is real for the largest industrial buyers: refiners and ammonia producers have historically built captive hydrogen capacity and could choose to invest in their own reservoir-adjacent production rather than buy from Koloma-class suppliers. Strategic supply-side moves — Koloma''s MHI and Osaka Gas relationships — provide a soft demand-side moat that smaller peers do not have, but are not yet binding.'
  claimRefs:
  - CP014
  - CP015
  - CP016
  - CP017
  - CP022
  - CP025
  - CP026
  tableRefs:
  - TP004
- id: section-5
  title: Moat durability, displacement risk and adverse competitor evidence
  body: Koloma's moats are real but uneven. Its capital advantage (~8x the nearest natural-H2 peer), Ohio State research-hub partnership, and institutional cap table are durable in the near term but erode if technical results lag capital scale. Its asserted AI exploration model remains undifferentiated until validated by reservoir results. Adverse commentary from S&P Global Commodity Insights ('quiet on next step'), GEO ExPro ('Koloma Enigma' and the explicit suggestion that Cascade Exploration could be prospecting for hydrocarbons under a hydrogen framing), and Canary Media (open question about whether geologic hydrogen plays any role at all) are all asymmetric risks because they target Koloma specifically rather than the segment generally. Displacement risk from industrial-gas incumbents — who could acquire pure-plays or compete on infrastructure once reservoir economics are proven — is the most material long-term threat. Commoditization risk is low near term given non-fungible reservoirs but rises if midstream pipelines emerge.
  claimRefs:
  - CP010
  - CP011
  - CP013
  - CP017
