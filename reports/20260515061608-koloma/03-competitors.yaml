company:
  name: Koloma
chapter:
  number: 3
  title: Competitors
  summary: Koloma is the dominant funded leader of a one-big-leader/long-tail natural-hydrogen landscape in 2026, with roughly 8x the capital of named ASX-listed peers (Hyterra, Gold Hydrogen) and dwarfing the early U.S. first-mover Natural Hydrogen Energy. Industrial-gas incumbents own the distribution moat and represent the most material long-term displacement risk. Adverse competitor evidence is asymmetric — targeted at Koloma's pace and transparency rather than at segment viability.
sections:
- id: section-1
  title: 'Landscape: direct peers, incumbents, adjacents and likely entrants'
  body: The natural-hydrogen competitive landscape in 2026 is best described as 'one big leader, long tail.' Koloma sits alone with roughly $403 million in disclosed funding, while Rystad Energy counts approximately 40 active natural-hydrogen explorers globally — most with disclosed funding below $50 million. Direct peers include Hyterra (ASX-listed, with Kansas exploration acreage adjacent to Koloma's High Plains Resources subsidiary), Gold Hydrogen (ASX-listed, South Australia), and Natural Hydrogen Energy LLC (the U.S. first-mover, which drilled an early Nebraska well in 2019). Incumbent industrial-gas producers — Air Liquide, Linde and Air Products — dominate global hydrogen production via grey-SMR and selective green/blue projects but have not entered natural-hydrogen exploration. Adjacent green-hydrogen producers (Plug Power, Nel, ITM Power) compete for the same low-carbon hydrogen demand pool from a higher-cost production base. Likely entrants include oil-and-gas majors with subsurface expertise — BP Ventures and Chevron Technology Ventures have both publicly tracked the segment.
  claimRefs:
  - CP001
  - CP002
  - CP003
  - CP004
  - CP005
  - CP006
