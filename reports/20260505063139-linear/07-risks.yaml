runDate: '2026-05-05'
company:
  name: Linear
chapter:
  number: 7
  title: Risks
  summary: >-
    Linear’s public risk profile is more about dependency density than a single existential defect. The company shows a
    mature security and privacy posture for its size—SOC 2, GDPR-oriented documents, enterprise access controls, and a
    visible DPA—but it also routes key workflows through a long stack of third-party AI, cloud, monitoring, support, and
    communication vendors. That creates a compound residual exposure: outages or policy changes at Google Cloud, OpenAI,
    Anthropic, Cohere, Slack, GitHub, Sentry, or other counterparties can directly affect issue intake, triage,
    automation, and customer trust. The absence of public enterprise SLA details, cap-table terms, customer
    concentration data, and a verified revenue bridge keeps underwriting confidence below what the June 2025 unicorn
    mark would otherwise suggest.
