sections:
  - id: S701
    title: Legal, regulatory, and privacy risk
    body: >-
      Linear has built a stronger public compliance surface than many comparably sized workflow-software companies: it
      publishes a DPA, privacy policy, detailed security documentation, and enterprise access-control features. That
      lowers baseline diligence friction. The residual legal risk is not that nothing exists; it is that the public
      stack is still thinner than what a premium enterprise multiple ultimately has to withstand. The DPA confirms
      primary processing in the United States and a broad subprocessor list that includes Google, Cloudflare, AWS,
      OpenAI, Anthropic, and Cohere. The EU AI Act now has live GPAI obligations and brings high-risk and transparency
      duties into force from August 2026 and 2027, so any expansion of Linear’s AI workflows into more consequential
      customer use cases would raise the compliance bar quickly. Separately, Linear’s terms remain firmly
      vendor-protective, with no-interruption warranties, liability caps near twelve months of fees, and customer-borne
      third-party app risk. That is normal for self-serve software, but it becomes material when customers rely on
      Linear as operational infrastructure rather than a lightweight productivity tool.
    claimRefs:
      - CR003
      - CR004
      - CR007
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR014
      - CR019
      - CR034
      - CR035
      - CR036
      - CR037
    tableRefs:
      - TR001
  - id: S702
    title: Operational and partner-dependency risk
    body: >-
      Operationally, Linear’s risk surface is concentrated in the exact integrations that make the product valuable.
      GitHub sync can move issues automatically as PRs evolve; Slack can create and update issues from conversations;
      Sentry can auto-create issues from alerts; Zendesk and Vercel push customer and preview feedback directly into
      engineering workflows. That means the platform is not just a database of work — it is a routing layer for work.
      Independent incident monitors show enough recent disruption to treat this as a real rather than hypothetical
      exposure: IsDown reports 16 incidents over the prior 90 days with a median duration above two hours and
      specifically calls out Slack-agent and task-processing issues; StatusGator lists an officially acknowledged outage
      in late April 2026; Statusfield notes that outages can break API access, PR linking, branch naming, and sprint
      rituals. Linear’s own status page was healthy at review time, but public materials do not disclose error budgets,
      incident postmortems, or recovery-time commitments for enterprise customers.
    claimRefs:
      - CR013
      - CR014
      - CR015
      - CR016
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
      - CR030
      - CR031
      - CR032
      - CR033
    tableRefs:
      - TR002
      - TR003
    figureRefs:
      - FR002
      - FR003
  - id: S703
    title: Financial-model and execution risk
    body: >-
      Linear does not read as a distressed company. The Series C announcement says the company is profitable, remote,
      and used by more than 15,000 companies, while TechCrunch says profits grew 280% in the prior year. Those are
      positives. The residual financial and execution risk comes from missing precision rather than visible weakness.
      Public sources do not verify recognized ARR, gross margin, enterprise NRR, customer concentration, or support
      intensity. Third-party trackers disagree on employee count and revenue estimates, with Tracxn listing 209
      employees as of March 2026 and Growjo estimating roughly $18.8 million of revenue and 135 employees. If the real
      revenue base is materially higher, the June 2025 unicorn mark may be easier to defend; if not, the company may be
      underwriting enterprise-grade reliability and AI expansion off a relatively small financial base. The premium
      tiers do show a path to higher monetization because AI workflows, agent features, issue SLAs, and deeper support
      live in Business and Enterprise plans, but that same roadmap increases product, support, and compliance
      complexity.
    claimRefs:
      - CR021
      - CR022
      - CR038
      - CR039
      - CR040
      - CR041
      - CR042
      - CR043
    tableRefs:
      - TR004
  - id: S704
    title: Mitigations, monitoring indicators, and thesis-break triggers
    body: >-
      Linear’s strongest mitigation is that it has documented the stack honestly enough for a buyer to know where the
      real questions are. The company publishes security controls, subprocessor governance, no-training language for AI,
      region options, and a visible status page; that already places it ahead of many private-software peers. But a risk
      chapter has to convert those facts into monitorable triggers. The main ones are straightforward: incident
      frequency on workflow-critical integrations, any evidence of AI controls lagging new regulatory requirements,
      signs that enterprise contracts still look like self-serve terms, and proof that key AI features are overly
      concentrated on one vendor path. The public kill criterion is not a single outage; it is repeated workflow
      failures or contract/compliance findings that prevent larger customers from standardizing on Linear. If private
      diligence cannot close ARR, NRR, SLA-credit, and provider-mix gaps, the safer posture is to treat the current
      valuation as more fragile than the product quality alone would suggest.
    claimRefs:
      - CR001
