  - id: TR005
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold / event
      - action implication
    rows:
      - - AI-governance / regulatory slippage
        - Enterprise customer notices or regulator updates
        - Any evidence that Linear’s AI features require controls the current public stack does not document
        - Pause underwriting until AI-control mapping and product scoping are validated.
      - - Outage frequency on workflow-critical integrations
        - Independent incident monitors
        - More than one material workflow incident per month for two consecutive quarters
        - Re-rate reliability risk upward and assume lower enterprise willingness to standardize on Linear.
      - - Third-party AI concentration
        - Management diligence or revised subprocessor list
        - Meaningful feature dependence on a single model vendor without tested fallback
        - Lower conviction on margins and product durability.
      - - Contract terms too customer-unfriendly for enterprise expansion
        - Enterprise MSA / SLA review
        - Liability caps and no-interruption remedies remain close to standard self-serve terms for large customers
        - Treat expansion into regulated or large accounts as slower and more services-intensive.
      - - Operating leverage fails to materialize
        - Private diligence on ARR, NRR, and support load
        - Verified revenue efficiency and renewals do not improve with scale
        - Current valuation should be treated as vulnerable to a flat or down round.
