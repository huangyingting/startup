  - id: T806
    title: Final diligence asks table
    columns:
      - topic
      - missing evidence
      - why it matters
      - owner or diligence path
    rows:
      - - Recognized ARR and revenue bridge
        - Actual ARR / revenue, recognized vs billed mix, and growth by customer cohort
        - The price support question is mostly denominator risk.
        - CFO data room, board deck, and auditor-prepared revenue bridge.
      - - Gross margin and AI cost load
        - Inference cost burden, cloud spend, and gross margin by product / tier
        - Premium valuation only works if monetization outruns AI and infrastructure cost.
        - Finance diligence and infrastructure-cost review.
      - - Net revenue retention and expansion
        - NRR, seat expansion, and enterprise churn by cohort
        - PLG plus premium upsell is the core value-creation claim.
        - Revenue-operations and cohort-retention analysis.
      - - Cap table and preferences
        - Preference stack, liquidation rights, MFN clauses, ratchets, and secondary economics
        - Headline valuation can be misleading if economics are investor-unfriendly.
        - Counsel review of financing documents.
      - - Enterprise contract quality
        - SLA credits, indemnities, security addenda, and negotiated exceptions
        - Upmarket success depends on contract acceptability, not just product appeal.
        - Legal / customer diligence.
      - - Customer concentration and deployment depth
        - Top-customer share, multi-team deployment, and mission-criticality inside accounts
        - The comp gap is less scary if the product is deeply embedded in large accounts.
        - Customer-reference calls and cohort data.
    notes: If these asks cannot be answered cleanly, the correct posture is patience rather than price-taking.
