chapter:
  number: 8
  title: Valuation
  summary: >-
    Linear is clearly a quality software asset, but the current public evidence is not strong enough to defend the June
    2025 unicorn mark with high conviction. The business shows real positives—profitability, 15,000+ customers, strong
    product reputation, PLG pricing, and genuine AI / automation upsell paths—yet the public record still lacks
    recognized ARR, NRR, gross margin, enterprise contract quality, and cap-table economics. Using only public evidence,
    Linear looks far more expensive than public workflow and developer-software comps: low-single-digit revenue
    multiples for Asana, Atlassian, and GitLab versus a roughly 66x implied multiple if one uses the available
    low-confidence revenue estimate. That does not automatically make the company uninvestable; it means the burden of
    proof now sits on private diligence rather than public narrative.
