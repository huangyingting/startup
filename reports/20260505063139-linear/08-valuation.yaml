    title: Recommendation summary table
    columns:
      - dimension
      - value
      - rationale
    rows:
      - - Recommendation
        - research-more
        - Public evidence is too thin on ARR, NRR, and gross margin to underwrite the last round price confidently.
      - - Confidence
        - medium
        - The qualitative business case is good, but the quantitative valuation bridge is weak.
      - - Risk Rating
        - high
        - >-
          A premium private multiple is resting on limited public financial disclosure and a still-demanding software
          market.
      - - Valuation Stance
        - expensive
        - The last round price screens far above accessible public comp multiples on public revenue estimates.
      - - Decision implication
        - Stay engaged, but do not accept the June 2025 price without data-room proof on revenue quality and economics.
        - The gap is evidence, not product quality.
    notes: >-
      This recommendation is explicitly price-sensitive: better private evidence or a lower entry price would move the
      call more than another incremental product testimonial.
    claimRefs:
      - CV001
      - CV002
      - CV007
      - CV024
      - CV025
      - CV026
      - CV033
  - id: TV002
    title: Thesis / anti-thesis table
    columns:
      - argument
      - thesis
      - what would change the view
    rows:
      - - Product quality and PLG pull
        - Linear has strong customer love, profitable operations, and a clear premium-tier upsell model.
        - >-
          If customer count growth is broad but monetization per customer is shallow, the PLG narrative would not
          justify the price.
      - - AI monetization
        - AI workflows and agent features create real expansion vectors inside existing seats and workflows.
        - If AI becomes table stakes or inference costs eat the upside, premium pricing power could collapse.
      - - Enterprise expansion
        - The company is using new capital to move further upmarket.
        - If enterprise MSAs, SLA terms, or support maturity lag the ambition, expansion will take longer and cost more.
      - - Price support
        - A very high-quality workflow asset can command a scarcity premium in private markets.
        - Without verified ARR, NRR, and gross margin, that premium can easily outrun fundamentals.
      - - Comp context
        - Engineering- and design-oriented software still trades at better multiples than weaker SaaS cohorts.
        - >-
          Even premium public comps are still mostly single-digit revenue multiples, far below the implied public bridge
          for Linear.
    notes: >-
      The anti-thesis is mostly about denominator risk: the public market can only support the price if private
      operating metrics are much stronger than public evidence shows.
    claimRefs:
