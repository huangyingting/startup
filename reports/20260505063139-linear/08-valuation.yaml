  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold
      - transmission to thesis
      - action implication
    rows:
      - - Verified ARR is far below implied support threshold
        - Data room shows ARR materially below ~$60M with no extraordinary margin profile
        - The June 2025 price would remain difficult to defend even on generous private multiples
        - Do not invest at the last round price.
      - - Enterprise economics disappoint
        - NRR <110%, gross margin compressed by AI costs, or support burden unusually high
        - The PLG plus AI upsell narrative loses its leverage case
        - Re-cut valuation on lower multiples and slower growth.
      - - Software multiples remain compressed
        - Public workflow / dev-software comps stay in low-single-digit revenue multiples
        - Scarcity premium has less room to outrun fundamentals
        - Demand a materially lower entry or better terms.
      - - AI differentiation commoditizes
        - Competitors match Linear’s automation features without equivalent pricing uplift
        - The premium expansion story weakens and public comp ceiling matters more
        - Lower bull-case probability and treat valuation as stretched to expensive.
      - - Cap-table terms are investor-unfriendly
        - Preferences, ratchets, or liquidation overhang reduce real economics for new money
        - Headline valuation stops representing investable economics
        - Pause until terms improve or price resets.
    notes: >-
      These triggers are deliberately price-oriented. They are not generic business risks; they are events that would
      make the current valuation hard to own.
