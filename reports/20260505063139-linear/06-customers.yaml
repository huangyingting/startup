        - Structured context for internal coding agents and AI workflows
        - Ramp and Coinbase case studies
        - Positions Linear as AI-native workflow layer, not just tracker
        - Adoption may still be concentrated in sophisticated engineering cultures
      - - Cross-functional business teams
        - COO, product ops, support, people ops / mixed internal users
        - Request intake, roadmap visibility, execution beyond engineering
        - Pulley, Mercury, Retool, Automattic
        - Supports land-and-expand narrative beyond engineering seats
        - No public share of seats outside engineering
