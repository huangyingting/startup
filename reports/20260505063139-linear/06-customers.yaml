      - - Product Hunt reviews
        - Broad satisfaction themes and feature complaints
        - Current, large sample
        - Community review mix is not a retention metric
      - - PeerSpot
        - Directional enterprise recommendation signal
        - Current but tiny sample
        - One visible review is not representative
      - - StackShare / GitHub / npm
        - Developer-led footprint and ecosystem interest
        - Current
        - Signals adoption, not paying-customer durability
      - - Blocked review surfaces (G2, Capterra, Trustpilot)
        - Potential wider sentiment sampling
        - Visible but inaccessible in session
        - Could not be used as primary evidence
    notes: >-
      This table intentionally substitutes for the planned cohort figure because no public 0-100 retention cohort data
      was found.
