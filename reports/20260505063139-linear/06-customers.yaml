  - id: T605
    title: Expansion and Concentration Risk Table
    description: Public expansion vectors and where commercial concentration remains opaque.
    columns:
      - Expansion driver
      - Concentration / friction risk
      - Impact
      - Diligence path
    rows:
      - - Expand from engineering to product, ops, support, people, and CX teams
        - Seat expansion may still depend on keeping the workflow opinionated rather than highly customized
        - Supports land-and-expand within one workspace
        - Request seat mix by function and attach rates for Asks, Insights, and Releases
      - - Agent-first development use cases at Ramp and Coinbase
        - Expansion may be strongest in sophisticated engineering orgs rather than the median buyer
        - Could raise ACV among AI-forward companies
        - Request ICP split between AI-native and conventional teams
      - - Unified roadmap / portfolio layer for enterprise
        - Public proof is strong on rollout, weak on renewal or multi-year durability
        - Supports larger enterprise standardization motions
        - Request cohort renewal and gross retention by account size
      - - Migration away from complex Jira estates
        - Buyers with extreme customization needs may stop expanding if missing workflow depth remains painful
        - Can open the door to large enterprise conversions
        - Collect lost-deal reasons tied to workflow flexibility, boards, or multi-assignee support
      - - Broad 25,000-org installed-base claim
        - No public top-customer or segment concentration data
        - Could hide ARR concentration despite broad logo footprint
        - Request top-10 revenue share, ARR mix, and average contract size by segment
