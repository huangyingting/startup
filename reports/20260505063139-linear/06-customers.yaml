      - Buyer / user / payer
      - Use case
      - Scale
      - Revenue / strategic value
      - Gap
    rows:
      - - High-growth software product teams
        - VP Eng / PM / engineers / software budget
        - Issue tracking, sprint planning, roadmap visibility
        - 25,000+ org claim anchored by many startup references
        - Core self-serve and expansion base
        - No public segment-level customer counts or ARPU
      - - Enterprise engineering + product orgs
        - Engineering/Product leadership / cross-functional EPD / enterprise software budget
        - Unified roadmap, portfolio visibility, migration off Jira
        - OpenAI 3,000 users; Remote 1,000-person team; Automattic 600-person EPD; Oscar 600+ migration
        - Validates enterprise rollout credibility
        - No public renewal, seat-expansion, or enterprise ARR disclosure
      - - Regulated / high-complexity teams
        - Engineering / product / operations in healthcare, fintech, infra
        - Complex workflow coordination under compliance pressure
        - Oscar Health, Brex, Ramp, Mercury
        - High-quality reference value for diligence
        - No public security-review duration or procurement friction data
      - - Agent-first engineering orgs
        - Engineering leaders / developers / platform teams
        - Structured context for internal coding agents and AI workflows
        - Ramp and Coinbase case studies
        - Positions Linear as AI-native workflow layer, not just tracker
        - Adoption may still be concentrated in sophisticated engineering cultures
      - - Cross-functional business teams
        - COO, product ops, support, people ops / mixed internal users
        - Request intake, roadmap visibility, execution beyond engineering
        - Pulley, Mercury, Retool, Automattic
        - Supports land-and-expand narrative beyond engineering seats
        - No public share of seats outside engineering
    notes: null
