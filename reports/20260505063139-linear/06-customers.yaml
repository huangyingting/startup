      - CU016
      - CU019
      - CU023
      - CU024
      - CU025
  - id: TU006
    title: Review Sentiment and Proof-Quality Table
    description: Substitute table for the unavailable cohort figure; compares evidence quality across public proof surfaces.
    columns:
      - Proof surface
      - What it supports
      - Freshness / visibility
      - Main limitation
    rows:
      - - Official Linear customer stories
        - Named deployments, workflow specifics, migration detail
        - Current and rich
