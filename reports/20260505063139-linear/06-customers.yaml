      - - Enterprise engineering + product orgs
        - Engineering/Product leadership / cross-functional EPD / enterprise software budget
        - Unified roadmap, portfolio visibility, migration off Jira
        - OpenAI 3,000 users; Remote 1,000-person team; Automattic 600-person EPD; Oscar 600+ migration
        - Validates enterprise rollout credibility
        - No public renewal, seat-expansion, or enterprise ARR disclosure
      - - Regulated / high-complexity teams
        - Engineering / product / operations in healthcare, fintech, infra
        - Complex workflow coordination under compliance pressure
        - Oscar Health, Brex, Ramp, Mercury
