company:
  name: Linear
chapter:
  number: 6
  title: Customers
  summary: >-
    Linear’s public customer proof is strongest among software-native product organizations, with
    named users including OpenAI, Ramp, Remote, Brex, Oscar Health, Mercury, Coinbase,
    Automattic, and others. Public case studies show rollouts ranging from hundreds to thousands
    of users and some expansion beyond engineering into broader operational workflows.
runDate: '2026-05-05'
sections:
  - id: sec601
    title: Customer Segments and Who the Product Serves
    body: >-
      Linear’s public customer proof is strongest in software-native organizations where product, engineering, and
      design all need a shared operating system. The broadest company-level claim is that Linear serves more than 25,000
      organizations, but the more useful evidence comes from the named stories: OpenAI, Ramp, Remote, Brex, Oscar
      Health, Mercury, Coinbase, Automattic, Opendoor, Retool, Cohere, Pulley, and Raycast. Those references span AI
      labs, fintech, healthcare, HR software, developer tools, and real estate technology.


      The buyer is usually an engineering, product, or operations leader; the users are cross-functional product teams;
      and the payer is typically an internal software budget rather than a line-of-business department. Several stories
      also show Linear expanding beyond core engineering. Mercury uses it across execution, feedback intake, and
      performance observation. Pulley says adoption spread into finance, marketing, people, and customer experience.
      That pattern matters because it suggests the product can move from “developer issue tracker” toward a broader
      coordination system when customers standardize on its workflow model.
    claimRefs:
      - C215
      - C229
      - C231
      - C241
  - id: sec602
    title: Adoption Trajectory and Named Production Proof
    body: >-
      Public adoption proof is unusually concrete for a private workflow software company. OpenAI’s story says the tool
      scaled from a small trial to more than 2,000 people, while the headline frames the rollout at 3,000 users. Remote
      says its 1,000-person team switched in 2023. Oscar says it migrated 600+ people in roughly a month despite one of
      the most complex Jira instances it had ever seen. Automattic says its 600-person engineering, product, and design
      organization moved in 2025 and now produces more than 12,000 issues per month with over 80% weekly usage.


      Brex contributes the cleanest quantified pilot evidence: higher daily usage, higher satisfaction, better
      issue-tracking efficiency, and better project-status understanding after a measured trial. Ramp and Coinbase
      provide another dimension of proof: Linear is not only used for ticketing, but as the structured layer that agent
      workflows and automated bug-to-PR loops depend on. That makes the named proof set richer than a logo wall. It
      shows production use in large organizations, cross-team migration from Jira, and AI-native workflows that would be
      hard to fake with a superficial rollout.
    claimRefs:
      - C216
      - C217
      - C219
      - C221
      - C226
      - C234
      - C235
      - C236
  - id: sec603
    title: Satisfaction, Durability, and Evidence Quality
    body: >-
      The public satisfaction signal is positive but uneven. Product Hunt gives Linear 4.9 stars from 390 reviews and
      summarizes the dominant praise as speed, cleanliness, easy adoption, and strong integrations. PeerSpot is also
      positive, but the visible sample is just one review, so it is directionally helpful rather than decisive.
      StackShare and GitHub/npm activity support the idea that Linear has a real developer-led footprint, but those are
      better interpreted as adoption proxies than as direct proof of renewal or enterprise durability.


      The key diligence caveat is that the public record is much stronger on deployment and enthusiasm than on retention
      economics. None of the reviewed sources disclose NRR, GRR, paid churn, or customer concentration. That means the
      chapter can show production proof and migration success, but it cannot prove long-term contract durability from
      public evidence alone. There is also a real adverse thread in external feedback: Product Hunt reviewers note
      missing depth in roadmap views, boards, custom workflows, swim lanes, and multi-assignee support. For buyers with
      highly customized planning needs, that can cap expansion even if basic adoption is strong.
    claimRefs:
      - C243
      - C245
      - C246
      - C247
      - C252
      - C254
      - C257
  - id: sec604
    title: Expansion Paths and Concentration Risks
    body: >-
      The expansion story is credible at the workflow level. Public case studies show Linear widening from engineering
      execution into product planning, leadership visibility, internal request intake, and even non-product functions.
      Mercury uses Projects, Insights, Slack sync, and Asks in one operating system. Retool uses Triage plus GitHub and
      Slack automation to route customer feedback into engineering work. Automattic describes a unified roadmap for
      ecosystem products. Those examples support a land-and-expand motion based on adding more teams and more workflow
      depth after the initial rollout.


      However, public materials do not answer the hardest commercial questions. There is no disclosure of segment mix,
      top-customer concentration, or renewal rates, so it is impossible to tell how much ARR comes from a long tail of
      startup teams versus a smaller number of very large accounts. The curated success-story set also naturally
      understates failed deployments, procurement blockers, or stalled expansions. As a result, the public customer
      picture supports “real adoption and credible product pull,” but not “fully underwritten durability” without
      private diligence on retention, concentration, and enterprise security-review friction.
    claimRefs:
      - C237
      - C239
      - C241
      - C253
      - C254
