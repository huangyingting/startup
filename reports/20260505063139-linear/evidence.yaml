evidenceGaps:
  - type: missing-source
    severity: material
    topic: Board composition for T102 and T103
    missingEvidence: >-
      A current board roster, observer rights, and voting/control structure were not disclosed in reviewed public
      sources.
    whyItMatters: Founder control, investor governance rights, and escalation paths matter for later underwriting and risk review.
    diligencePath: Request the current board list, charter package, and post-Series C cap-table/governance summary from management.
    relatedQuestionRefs:
      - RQ009
    relatedTableRefs:
      - T102
      - T103
  - type: private-evidence-only
    severity: material
    topic: Debt or credit facilities
    missingEvidence: No reviewed public source disclosed venture debt, credit lines, or other financing obligations.
    whyItMatters: Debt can change dilution risk, cash runway, and downside protection analysis.
    diligencePath: Ask for debt schedules, lender agreements, covenant package, and any undrawn facilities.
    relatedQuestionRefs:
      - RQ016
    relatedTableRefs: []
  - type: private-evidence-only
    severity: blocking
    topic: Revenue and ARR disclosure
    missingEvidence: Public sources disclosed profitability and growth rates but no canonical revenue or ARR figure.
    whyItMatters: Later financial and valuation chapters cannot underwrite growth quality without absolute revenue data.
    diligencePath: Request monthly recurring revenue, ARR history, gross margin, and retention cohorts from finance.
    relatedQuestionRefs:
      - RQ019
    relatedTableRefs:
      - T101
  - type: conflicting-data
    severity: material
    topic: Headcount precision for T101
    missingEvidence: >-
      Public headcount references differ across company, press, and database sources, and no official current total was
      found.
    whyItMatters: Headcount is a canonical scale metric and a key input to efficiency comparisons.
    diligencePath: Request current employee count, contractor count, and geographic split directly from management or HR systems.
    relatedQuestionRefs:
      - RQ018
    relatedTableRefs:
      - T101
  - type: enumeration-incomplete
    severity: minor
    topic: Chronology completeness for T104
    missingEvidence: Public sources do not guarantee that every material governance, partnership, or product milestone was captured.
    whyItMatters: Later chapters need a reliable but clearly bounded chronology to avoid accidental date drift.
    diligencePath: >-
      Ask management for an internal timeline covering launches, major enterprise wins, governance changes, and
      incidents.
    relatedQuestionRefs: []
    relatedTableRefs:
      - T104
  - type: enumeration-incomplete
    severity: material
    topic: No clean public SAM for Linear
    missingEvidence: >-
      Retained sources size broad PM software and adjacent work-management categories, but none isolate a
      developer-first Linear-specific SAM.
    whyItMatters: A precise market model is necessary for disciplined valuation work and penetration assumptions.
    diligencePath: Request management's internal market segmentation, ICP sizing by company size, and enterprise ACV assumptions.
    relatedQuestionRefs:
      - RQ006
    relatedTableRefs:
      - T202
  - type: missing-source
    severity: blocking
    topic: No public SOM or win-rate evidence
    missingEvidence: No retained public source established Linear conversion rates, win rates versus Jira, or share in any segment.
    whyItMatters: Without share evidence, external models cannot justify aggressive penetration assumptions.
    diligencePath: Request pipeline conversion, win/loss analysis, and segment-level customer counts from sales or finance.
    relatedQuestionRefs:
      - RQ007
      - RQ024
    relatedTableRefs: []
  - type: private-evidence-only
    severity: material
    topic: Budget owner and contract size precision
    missingEvidence: >-
      Retained sources show likely buyers and payers, but not actual ACV ranges, contract length, or departmental budget
      allocation.
    whyItMatters: Buyer-map quality affects CAC assumptions, sales motion analysis, and enterprise expansion forecasts.
    diligencePath: Request pricing realization, ACV distribution, enterprise seat counts, and renewal motion by segment.
    relatedQuestionRefs:
      - RQ022
    relatedTableRefs:
      - T203
  - type: missing-source
    severity: material
    topic: Vertical and geography mix
    missingEvidence: >-
      Public sources do not break Linear demand into vertical, geography, or company-size cohorts with enough detail for
      a rigorous market model.
    whyItMatters: Segment mix determines how portable the current growth story is beyond tech-forward buyers.
    diligencePath: Request customer mix by industry, geography, and company size plus NRR by segment.
    relatedQuestionRefs:
      - RQ023
    relatedTableRefs:
      - T203
  - type: conflicting-data
    severity: minor
    topic: Forecast dispersion in T202
    missingEvidence: >-
      Public market reports disagree materially on long-range market size and CAGR, and methodologies are not directly
      comparable.
    whyItMatters: Investors need to preserve contradictory market estimates instead of smoothing them into false precision.
    diligencePath: >-
      Use management's bottom-up segmentation model and compare it against a single chosen external benchmark,
      documenting the differences.
    relatedQuestionRefs:
      - RQ021
    relatedTableRefs:
      - T202
  - type: missing-source
    severity: material
    topic: Enterprise discounting in pricing / packaging comparison
    missingEvidence: >-
      Public sources do not disclose negotiated enterprise discounts, minimum commitments, or realized seat pricing for
      Linear, Jira, Asana, Monday, or GitLab contracts.
    whyItMatters: Realized enterprise pricing determines whether Linear is truly cheaper or merely has a lower public list price.
    diligencePath: >-
      Request redacted order forms, annual commits, and average selling price by cohort from management and at least
      three reference customers.
    relatedQuestionRefs:
      - RQ322
    relatedTableRefs:
      - T303
  - type: missing-source
    severity: minor
    topic: Multi-homing behavior in moat durability / competitive risk register
    missingEvidence: >-
      Reviewed public sources do not quantify how many teams actively keep Linear alongside Jira, GitHub, or Notion
      after migration.
    whyItMatters: Multi-homing weakens switching-cost claims and makes displacement easier if incumbents improve UX.
    diligencePath: >-
      Request product telemetry on active integrations, dual-tool overlap, and win-loss migration reasons by account
      segment.
    relatedQuestionRefs:
      - RQ326
    relatedTableRefs:
      - T304
  - type: missing-source
    severity: blocking
    topic: Cash balance and runway in capital adequacy table
    missingEvidence: No reviewed public source disclosed current cash on hand, monthly burn, or runway months for Linear.
    whyItMatters: >-
      Without cash and burn, capital adequacy cannot be underwritten beyond a directional view that the recent raise
      reduced near-term financing pressure.
    diligencePath: >-
      Request monthly board reporting, current cash balance, trailing 12-month burn, and management runway model under
      base and downside cases.
    relatedQuestionRefs:
      - RQ416
    relatedTableRefs:
      - T404
  - type: private-evidence-only
    severity: material
    topic: Revenue mix in revenue streams table
    missingEvidence: >-
      Public sources describe pricing and enterprise motion but do not disclose the mix between self-serve revenue,
      enterprise contracts, and any other stream.
    whyItMatters: Revenue concentration by stream affects retention quality, gross margin, and GTM risk.
    diligencePath: Request ARR bridge by plan, enterprise versus self-serve revenue split, and cohort expansion data by segment.
    relatedQuestionRefs:
      - RQ408
    relatedTableRefs:
      - T401
  - type: missing-source
    severity: material
    topic: public SLA commitments for Linear 2026
    missingEvidence: >-
      The reviewed status and security pages provide point-in-time uptime and controls but no public SLA document or
      historical incident log.
    whyItMatters: >-
      Enterprise diligence needs contractual uptime, credits, and incident transparency, not just a status-page
      snapshot.
    diligencePath: Request standard MSA/SLA language, uptime commitments by plan, and a 12-month incident postmortem log.
    relatedQuestionRefs:
      - RQ523
  - type: private-evidence-only
    severity: material
    topic: self-hosting or private-cloud deployment for Linear 2026
    missingEvidence: >-
      No reviewed official page described self-hosted, dedicated-single-tenant, or customer-managed cloud deployment
      options.
    whyItMatters: Deployment model affects regulated buyers, data-residency posture, and implementation risk.
    diligencePath: >-
      Ask sales or security for deployment options, dedicated-environment availability, and customer-managed key
      support.
    relatedQuestionRefs:
      - RQ524
  - type: missing-source
    severity: minor
    topic: data residency and subprocessors for Linear 2026
    missingEvidence: >-
      The reviewed materials cite GDPR/HIPAA/SOC 2 and US hosting for the Slack app, but do not publish a fuller
      residency or subprocessor matrix.
    whyItMatters: >-
      Large enterprise and regulated buyers often require region-by-region storage, support, and subprocessors before
      rollout.
    diligencePath: Request DPA, subprocessor list, regional hosting map, and any EU data-boundary commitments.
    relatedQuestionRefs:
      - RQ526
  - type: enumeration-incomplete
    severity: minor
    topic: Product module / asset matrix coverage
    missingEvidence: >-
      The public site shows major modules, but it does not enumerate every internal feature flag, beta surface, or
      enterprise-only admin screen.
    whyItMatters: >-
      A buyer evaluating breadth needs to know which modules are GA versus supporting infrastructure versus internal
      tooling.
    diligencePath: Validate the public module list in a demo and request a feature availability matrix by plan and by region.
    relatedTableRefs:
      - T501
  - type: private-evidence-only
    severity: material
    topic: public retention metrics for Linear 2026
    missingEvidence: Reviewed sources did not disclose NRR, GRR, logo churn, renewal rate, or cohort retention by segment.
    whyItMatters: >-
      Durability is a core underwriting question; satisfaction and rollout stories do not replace paid retention
      evidence.
    diligencePath: >-
      Request cohort retention, logo churn, renewal, and seat-expansion metrics split by SMB, mid-market, and
      enterprise.
    relatedQuestionRefs:
      - RQ614
  - type: private-evidence-only
    severity: material
    topic: customer concentration and revenue mix for Linear 2026
    missingEvidence: No reviewed public source disclosed top-customer ARR, segment mix, or channel concentration.
    whyItMatters: A business can look broad on logos while still being concentrated in ARR or on a few outsized enterprise accounts.
    diligencePath: Request top-10 customer revenue share, segment ARR mix, and expansion concentration by channel or geography.
    relatedQuestionRefs:
      - RQ615
  - type: missing-source
    severity: minor
    topic: procurement friction and failed deployment evidence for Linear 2026
    missingEvidence: >-
      Public stories focus on successful migrations and positive pilots; there is little public evidence on blocked
      security reviews or failed enterprise rollouts.
    whyItMatters: Without failed-deployment evidence, the downside view of enterprise adoption remains incomplete.
    diligencePath: Ask for lost-deal reasons, average security review duration, and deployment blockers by customer segment.
    relatedQuestionRefs:
      - RQ622
  - type: access-blocked
    severity: minor
    topic: third-party review coverage for Linear 2026
    missingEvidence: >-
      G2, Capterra, and Trustpilot were either JS-blocked or unavailable in this session, so they could not be used as
      durable evidence.
    whyItMatters: >-
      Broader third-party review coverage would improve confidence that public sentiment is not cherry-picked by
      official stories.
    diligencePath: >-
      Re-run review collection with authenticated browser access or archived captures and compare review themes against
      Product Hunt and PeerSpot.
    relatedQuestionRefs:
      - RQ617
  - type: enumeration-incomplete
    severity: minor
    topic: Named customer proof table coverage
    missingEvidence: >-
      Linear publishes many customer stories, but the public set does not prove that it is exhaustive across all
      segments, geographies, or most-recent deployments.
    whyItMatters: >-
      Named proof is helpful for reference quality, but buyers should not confuse a curated success page with a full
      customer census.
    diligencePath: Request a customer reference matrix by segment, deployment status, and renewal stage.
    relatedTableRefs:
      - T603
  - type: private-evidence-only
    severity: material
    topic: 'Risks: exact dependence on third-party AI vendors'
    missingEvidence: >-
      Public sources identify OpenAI, Anthropic, and Cohere as subprocessors but do not quantify traffic share, fallback
      routing, or unit-cost exposure by vendor.
    whyItMatters: That gap prevents precise underwriting of margin sensitivity and product continuity under partner policy changes.
    diligencePath: Request provider-level usage mix, failover playbooks, and any model-specific contractual constraints.
    relatedQuestionRefs:
      - RQ026
  - type: missing-source
    severity: material
    topic: 'Risks: enterprise SLA credits and negotiated remedies'
    missingEvidence: >-
      Public materials reviewed did not disclose enterprise SLA credits, uptime remedies, or negotiated indemnity
      carve-outs.
    whyItMatters: These terms determine whether incident risk is commercially absorbable for larger customers.
    diligencePath: Review standard enterprise MSA, SLA, security addendum, and examples of negotiated redlines.
    relatedQuestionRefs:
      - RQ027
  - type: missing-source
    severity: minor
    topic: 'Risks: regulator or court actions against Linear'
    missingEvidence: >-
      No public regulator database or court record directly confirming a material action against Linear was retained in
      this review window.
    whyItMatters: >-
      The absence of visible enforcement reduces immediate concern but does not prove there are no private or
      inaccessible matters.
    diligencePath: Run counsel-led litigation, enforcement, and sanctions checks across all operating jurisdictions.
    relatedQuestionRefs:
      - RQ028
  - type: private-evidence-only
    severity: material
    topic: 'Risks: verified revenue, gross margin, and support burden'
    missingEvidence: Public evidence does not close actual ARR, gross margin, support intensity, or enterprise renewal quality.
    whyItMatters: >-
      Those metrics are necessary to judge whether Linear can sustain premium product quality while expanding AI
      workflows.
    diligencePath: Request audited or board-level revenue bridge, cohort retention, gross margin, and support-ops metrics.
    relatedQuestionRefs:
      - RQ025
      - RQ030
  - type: enumeration-incomplete
    severity: minor
    topic: Regulatory / legal risk register is partial rather than exhaustive
    missingEvidence: >-
      Public sources do not reveal all private customer contracts, negotiated exceptions, regulator correspondence, or
      non-public disputes.
    whyItMatters: The legal register should be treated as decision-useful but not complete.
    diligencePath: Have counsel validate the public register against litigation searches, enterprise templates, and compliance logs.
    relatedTableRefs:
      - T701
    relatedQuestionRefs:
      - RQ029
  - type: stale
    severity: minor
    topic: 'Risks: current outage and status precision'
    missingEvidence: >-
      Independent status aggregators show recent incident counts, but they do not provide customer-segment impact,
      credit issuance, or postmortem quality.
    whyItMatters: Without richer outage telemetry, severity scoring remains partly inferred.
    diligencePath: Request internal incident calendar, severity definitions, and postmortem archive for the last twelve months.
    relatedQuestionRefs:
      - RQ028
  - type: private-evidence-only
    severity: blocking
    topic: 'Valuation: verified ARR, NRR, and gross margin'
    missingEvidence: Public sources retained here do not verify recognized ARR, NRR, gross margin, or cash conversion for Linear.
    whyItMatters: These are the core inputs needed to judge whether the June 2025 price is expensive, fair, or merely early.
    diligencePath: >-
      Request board-level revenue bridge, cohort retention, gross margin by product tier, and audited or reviewed
      financial statements.
    relatedQuestionRefs:
      - RQ025
  - type: private-evidence-only
    severity: material
    topic: 'Valuation: cap table and preference stack'
    missingEvidence: >-
      Public sources do not disclose liquidation preferences, ratchets, veto rights, or exact economics of the secondary
      component.
    whyItMatters: Headline valuation can materially differ from investable economics for new money.
