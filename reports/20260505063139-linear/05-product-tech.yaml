  - id: TE003
    title: Technology / Operating Architecture Table
    description: Publicly visible layers of the Linear operating model rather than hidden backend implementation details.
    columns:
      - Layer / component
      - Role
      - Dependency
      - Risk
    rows:
      - - Issue graph
        - Core execution object for bugs, tasks, asks, and releases
        - Depends on consistent team/state/project structure
        - Over-customization pressure is intentionally constrained rather than fully open-ended
      - - Project layer
        - Binds issues, milestones, docs, and updates into a launchable unit
        - Depends on disciplined project-lead ownership and regular updates
        - Portfolio visibility weakens if teams do not keep projects current
      - - Initiative layer
        - Rolls multiple projects into objective-level planning and health
        - Depends on project updates and leadership review cadence
        - No public confidentiality mode for initiatives
      - - Intake layer (Asks)
        - Routes Slack, email, and web-form requests into triage queues
        - Depends on integration setup and template design
        - Poor intake design could create noisy queues or weak metadata
      - - Analytics layer (Insights)
        - Turns issue data into a lightweight analytical dataset
        - Depends on good issue hygiene and shared views
        - Weak issue hygiene will degrade insight quality
      - - Delivery layer (Releases)
        - Maps merged/shipped code to environments and release pipelines
        - Depends on CI/CD integration quality and path-filter logic
        - Public docs do not show vendor coverage breadth or failure modes
      - - Ecosystem layer
        - GitHub, Slack, Teams, Zapier, other crafted and third-party apps
        - Depends on external platform APIs and permissions
        - Partner outages or permission misconfiguration can break workflow automations
    notes: >-
      Because Linear does not publish backend service topology, this table models the public operating architecture
      buyers actually interact with.
    claimRefs:
