        - Single source of truth from planning to status updates
        - One issue can only belong to one project at a time
      - - Turn chat into work
        - Slack / Microsoft Teams
        - Chat messages become issues, projects, asks, or documents via @Linear or message actions
        - Lower coordination friction and less context switching
        - Requires admin setup and external app permissions
      - - Handle internal or customer requests
        - Slack / email / web forms
        - Linear Asks captures intake and routes it into team triage
        - Requests enter the same workflow graph as product work
        - Enterprise-only web forms limit broad SMB access
      - - Inspect team delivery patterns
        - Insights panel and shared views
        - Issue data becomes a real-time analytics dataset
        - Leaders can spot blockers and prioritization patterns without exporting first
        - No public evidence on large-scale BI replacement
      - - See what actually shipped
        - Releases + CI/CD
        - Issues are grouped into releases by environment and pipeline
        - “Done” becomes closer to deploy reality
        - Supported CI/CD vendors are not fully enumerated publicly
      - - Run agent-assisted execution
        - Agent + MCP + coding tool hooks
        - Agents can pull external context and open work in supported or custom coding tools
        - Makes Linear the orchestration layer for AI-enabled product delivery
        - Guardrails and token/usage economics are not publicly detailed
