      - - Initiatives
        - Leadership / portfolio owners
        - GA
        - Objective-level rollup with health and active-project status across teams
        - No public private-initiative mode for confidential strategic work
      - - Linear Asks
        - Ops, support, product, IT
        - GA on Business / Enterprise
        - Turns Slack, email, and web requests into triageable issues inside the same system
        - Advanced routing and intake volumes are not publicly quantified
      - - Insights
        - Managers / PMs / engineering leads
        - GA on Business / Enterprise
        - Real-time analytics over issue data without exporting to BI first
        - No public benchmark on dashboard scale or refresh latency
      - - Releases
        - Engineering / release managers
        - New GA (Apr 2026)
        - Connects CI/CD status to issues and environments so “done” maps closer to “shipped”
        - No public list of supported CI/CD vendors or enterprise rollout numbers
      - - Agents + MCP
        - Engineers / PMs / AI-forward teams
        - Rapidly expanding, public changelog evidence in Apr 2026
        - Linear is positioning itself as an orchestration hub for agent-assisted product work
        - Agent pricing, guardrails, and usage limits are not publicly detailed
    notes: Rows reflect only publicly visible modules on marketing, docs, and changelog surfaces as of 2026-05-05.
    enumerationScope:
      coverage: partial
      basis: >-
