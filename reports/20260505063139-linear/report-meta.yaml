companyProfile:
  summary: Linear is a private San Francisco-founded software company building a fast, opinionated system for product planning, issue tracking, and increasingly agent-native software workflows. The company has built a strong brand among high-performance software teams by pairing product craft with low-friction workflows, and by 2025-2026 it had expanded from classic issue tracking toward automations, AI assistance, and orchestration for coding agents. Public evidence supports real customer depth and premium product positioning, but not enough financial detail to underwrite the last private round with high conviction.
