  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California, USA
  productSummary: Linear sells a seat-based SaaS platform for software product development, covering issues, projects, initiatives, cycles, roadmaps, integrations, and AI/agent workflows. The stack now extends beyond classic issue tracking into automations, triage intelligence, an agent SDK, MCP connectivity, and context surfaces that let human teams and coding agents work from the same structured system.
  customerFocus: Product, engineering, and design teams ranging from startups to large enterprise software organizations.
  businessModel: Subscription SaaS with Free, Basic, Business, and custom Enterprise tiers; monetization expands through seat growth, premium admin/security controls, and higher-value AI / automation workflows.
  stage: Series C private / unicorn
  fundingStatus: $82M Series C in June 2025 at $1.25B valuation; roughly $134.2M total raised publicly attributed.
