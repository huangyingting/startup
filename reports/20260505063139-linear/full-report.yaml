              - C291
              - C292
              - C293
              - C294
      - number: '8.3'
        title: Financial-model and execution risk
        blocks:
          - type: paragraph
            body: >-
              Linear does not read as a distressed company. The Series C announcement says the company is profitable,
              remote, and used by more than 15,000 companies, while TechCrunch says profits grew 280% in the prior year.
              Those are positives. The residual financial and execution risk comes from missing precision rather than
              visible weakness. Public sources do not verify recognized ARR, gross margin, enterprise NRR, customer
              concentration, or support intensity. Third-party trackers disagree on employee count and revenue
              estimates, with Tracxn listing 209 employees as of March 2026 and Growjo estimating roughly $18.8 million
              of revenue and 135 employees. If the real revenue base is materially higher, the June 2025 unicorn mark
              may be easier to defend; if not, the company may be underwriting enterprise-grade reliability and AI
              expansion off a relatively small financial base. The premium tiers do show a path to higher monetization
              because AI workflows, agent features, issue SLAs, and deeper support live in Business and Enterprise
              plans, but that same roadmap increases product, support, and compliance complexity.
            claimRefs:
              - C281
              - C282
              - C299
              - C300
              - C301
              - C302
              - C303
              - C304
      - number: '8.4'
        title: Mitigations, monitoring indicators, and thesis-break triggers
        blocks:
          - type: paragraph
            body: >-
              Linear’s strongest mitigation is that it has documented the stack honestly enough for a buyer to know
              where the real questions are. The company publishes security controls, subprocessor governance,
              no-training language for AI, region options, and a visible status page; that already places it ahead of
              many private-software peers. But a risk chapter has to convert those facts into monitorable triggers. The
              main ones are straightforward: incident frequency on workflow-critical integrations, any evidence of AI
              controls lagging new regulatory requirements, signs that enterprise contracts still look like self-serve
              terms, and proof that key AI features are overly concentrated on one vendor path. The public kill
              criterion is not a single outage; it is repeated workflow failures or contract/compliance findings that
              prevent larger customers from standardizing on Linear. If private diligence cannot close ARR, NRR,
              SLA-credit, and provider-mix gaps, the safer posture is to treat the current valuation as more fragile
              than the product quality alone would suggest.
            claimRefs:
