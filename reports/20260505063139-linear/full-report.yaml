  - number: 6
    title: Product & Technology
    sections:
      - number: '6.1'
        title: Product Surface and Core Workflow
        blocks:
          - type: paragraph
            body: >-
              Linear’s public product surface is tightly opinionated around software product development rather than
              general-purpose work management. The homepage frames the system around planning and building products with
              AI-era workflows, and it consistently exposes the same core objects: issues for execution, projects for
              outcome-bound delivery, initiatives for company-level rollups, cycles for planning cadence, and newer
              layers such as Asks, Customer Requests, Insights, and Agents. In practice, this means Linear is selling a
              unified operating model rather than a bundle of disconnected point features.


              The docs reinforce that operating model. Projects are the main container for a feature launch or other
              bounded work package, while initiatives roll multiple projects into an objective-level view for
              leadership. Asks routes bug reports, questions, and internal requests into the same issue graph, which
              keeps work intake inside the core system rather than off to the side in email or chat. The result is a
              workflow where customer feedback, prioritization, execution, and release visibility all point back to the
              same issue and project structure. That coherence is the main product advantage visible in public
              materials.
            claimRefs:
              - C162
              - C164
              - C165
              - C176
              - C179
              - C181
      - number: '6.2'
        title: Integration Layer, Agents, and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Linear’s workflow increasingly assumes that chat tools, code hosts, and AI agents are first-class
              participants in execution. The integrations directory highlights GitHub, Slack, GitLab, Figma, Intercom,
              and Google Sheets as essential apps, while the deeper Slack and Teams pages show a consistent design
              pattern: conversations become issues, issue context flows back into the collaboration surface, and people
              can act without opening a separate admin console. Slack supports issue creation, bidirectional thread
              sync, rich link unfurls, and channel notifications. Microsoft Teams extends that same pattern with @Linear
              prompts that can create issues, update projects, and generate documents.


              The newest layer is agent-native workflow. Linear’s April 2026 changelog added MCP support for Linear
              Agent so it can pull context from external systems such as Granola, Glean, Notion, and PostHog. That
              matters because it turns Linear from a destination UI into an orchestration hub for structured product
              work. The same changelog also added custom coding tool integrations for tools outside the built-in list,
              indicating that Linear expects the “issue to coding agent to review loop” to become a standard enterprise
              pattern rather than a one-off experiment.
            claimRefs:
              - C168
              - C169
              - C170
              - C174
              - C189
              - C190
              - C192
      - number: '6.3'
        title: Deployment, Analytics, and Release Maturity
        blocks:
          - type: paragraph
            body: >-
              Linear’s public documentation is unusually concrete on how planning data carries through execution and
              into delivery. Insights turns issue data into a live analytics dataset that teams can filter by status,
              assignee, project, or timeframe to inspect blockers and work patterns. Releases, launched at the end of
              April 2026, ties CI/CD systems back to issues so teams can see which changes have actually shipped to
              which environment. That closes a common gap in product systems where “done” in the tracker does not mean
              “live for users.” The release docs explicitly support both continuous deployment and scheduled release
              models, and they note that Linear itself uses multiple pipelines inside a monorepo with path filters.


              This is an important maturity signal: Linear is no longer just a fast issue tracker, but a workflow graph
              spanning planning, execution, analytics, and deployment context. The public status page also gives
              regional API/application uptime snapshots, which is useful operationally, but public materials stop short
              of providing contractual SLA terms or a richer historical incident record. For diligence, the reliability
              story is directionally positive, but still lighter than what a regulated enterprise buyer would want
              before standardizing globally.
            claimRefs:
              - C183
              - C184
              - C185
              - C186
              - C187
              - C199
      - number: '6.4'
        title: Trust, Security, and Publicly Visible Gaps
        blocks:
          - type: paragraph
            body: >-
              Trust materials emphasize enterprise readiness more than deep backend disclosure. Linear publicly lists
              SOC 2 Type II, GDPR, and HIPAA compliance, and its security page states TLS 1.2 for data in transit plus
              AES-256 for data at rest. It also documents practical admin controls such as app approvals, private teams,
              guest accounts, and IP restrictions. The Slack marketplace listing adds another useful operational detail:
              the Slack app uses OpenAI APIs with zero data retention and lists US data-center location for that app
              context.


              What remains missing is also material. Public sources reviewed here do not document self-hosting or
              private-cloud options, do not publish a detailed subprocessor or data-boundary matrix, and do not provide
              a public SLA document with service-credit mechanics. External review evidence is broadly positive on speed
              and usability, but it also flags limits around advanced roadmap views, custom workflows, swim lanes, and
              multi-assignee support. That makes the product look strongest for organizations that value opinionated
              operating discipline and AI-ready structured workflows over deep configurability or bespoke deployment
              models.
            claimRefs:
              - C195
              - C196
              - C197
