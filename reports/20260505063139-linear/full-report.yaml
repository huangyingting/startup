      - number: '5.2'
        title: Public traction, GTM motion, and unit-economics signals
        blocks:
          - type: paragraph
            body: >-
              The strongest public traction signals are customer scale, enterprise progression, and profitability
              language rather than disclosed ARR or margin tables. Linear’s Series C post says more than 15,000
              companies use the product and that the company operates profitably. TechCrunch independently reported the
              same 15,000+ customer count, said profits grew 280% in the prior year, and placed team size at roughly 80
              employees. The Stripe case study adds important color: the product and billing stack that worked at 10
              customers still works at tens of thousands of customers, and bespoke pricing now extends to Fortune 100
              accounts. That combination suggests the company has moved beyond a purely bottoms-up startup tool and is
              building a more structured enterprise motion. Built In’s report that Series C proceeds will be used for
              product development and enterprise customer acquisition reinforces that interpretation. These are
              directionally positive unit-economics signals because profitable operation and modest headcount against
              broad customer adoption imply decent capital efficiency. But they are still proxies. Public sources do not
              disclose ARR, net revenue retention, gross margin, CAC, payback, enterprise seat count, or churn. So the
              analytical stance here should be: healthy recurring-revenue architecture and improving GTM sophistication
              are visible, while the actual unit-economics stack remains private.
            claimRefs:
