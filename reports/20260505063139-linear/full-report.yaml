  - number: 3
    title: Market Analysis
    sections:
      - number: '3.1'
        title: Market boundary, included spend, and the right comparison set
        blocks:
          - type: paragraph
            body: >-
              The broadest public market lens for Linear is project management and work management software, but that
              boundary is too loose to explain why teams choose the product. Linear’s own product, enterprise, and agent
              pages describe something more specific: a structured system for issues, projects, cycles, initiatives,
              customer requests, and increasingly AI-mediated work. That places the company inside the larger project
              management market while narrowing the most relevant spend to engineering-, product-, and platform-led
              workflow budgets. The included spend is software for issue tracking, roadmap coordination, status
              visibility, customer-feedback intake, and developer-adjacent workflow automation. The excluded spend is
              generic CRM, sales execution, service desk, or broad horizontal collaboration budgets unless they directly
              govern software delivery work. Public customer stories reinforce that boundary. Remote, Oscar, Brex, Ramp,
              and Coinbase did not adopt Linear as a general business work OS; they adopted it to replace or rationalize
              product-development coordination and issue-management workflows. The cleanest competitive frame is
              therefore Jira and adjacent work-management platforms, not all enterprise software.
            claimRefs:
