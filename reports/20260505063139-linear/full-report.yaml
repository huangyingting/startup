  - number: 9
    title: Valuation
    sections:
      - number: '9.1'
        title: Investment thesis and anti-thesis
        blocks:
          - type: paragraph
            body: >-
              The positive case for Linear is easy to understand. The company has a strong product brand, a premium
              workflow experience, profitable operations, more than 15,000 customers, and an expanding monetization
              surface that now includes AI workflows and agent products. In a private market that still rewards scarce,
              design-forward software assets, those qualities matter. The negative case is also easy to understand:
              public evidence on the actual financial denominator is very weak. There is no public, filing-grade ARR
              disclosure, no verified gross margin, no public NRR, and no cap-table detail. Public market references for
              high-quality workflow and developer software still cluster around low-single-digit revenue multiples, not
              the kind of multiple one would need if Linear’s real revenue is anywhere near the public estimate. That
              means the anti-thesis is not that Linear is a weak company. It is that the public case for the price is
              much weaker than the public case for the product.
            claimRefs:
              - C306
              - C307
              - C308
              - C313
              - C314
              - C316
              - C326
              - C327
              - C339
              - C340
              - C341
              - C343
              - C348
      - number: '9.2'
        title: Financing context and entry discipline
        blocks:
          - type: paragraph
            body: >-
              The June 2025 round set the headline anchor: $82 million raised at a $1.25 billion valuation, with both
              primary and secondary components. That is useful because it proves real investor support and some
              liquidity. It is not enough on its own to prove economic attractiveness for a new investor in 2026. The
              public market bridge is harsh. Asana screens at roughly 2.2x revenue, Atlassian at about 4.3x, and GitLab
              at about 4.4x based on accessible market-cap and revenue pages. Even generous public SaaS multiple
              commentary from Multiples.vc and Aventis still assumes growth, profitability, and AI premium matter
              together. If one pairs Linear’s official valuation with Growjo’s public revenue estimate, the implied
              multiple is about 66.5x. That number may overstate reality if public revenue is understated, but it still
              defines the entry-discipline problem: an investor has to believe private metrics are dramatically better
              than public evidence shows.
            claimRefs:
              - C306
              - C310
              - C311
              - C313
              - C317
              - C318
              - C319
              - C320
              - C321
              - C322
              - C323
              - C324
              - C325
              - C326
              - C328
              - C339
              - C340
      - number: '9.3'
        title: Bull, base, and bear cases
        blocks:
          - type: paragraph
            body: >-
              The bull case requires Linear’s true revenue base to be much larger than public estimators imply, with
              premium pricing and AI upsell translating into something like $100 million to $120 million of revenue
              within a few years and a still-elevated 10x to 12x revenue multiple. That scenario can roughly justify or
              slightly exceed the last round price. The base case is harsher: even good execution that takes the company
              to $60 million to $75 million of revenue may still produce only a $420 million to $680 million valuation
              if public-market discipline persists. The bear case is simple multiple compression plus slower
              monetization, yielding material downside from the current mark. Importantly, these scenarios are not a
              statement that Linear is overvalued in all states of the world. They are a statement that the public
              record is insufficiently precise to make the June 2025 price look safe. That is why price discipline
              matters more than admiration of the product.
            claimRefs:
              - C313
              - C324
              - C325
              - C338
              - C339
              - C340
              - C344
              - C345
              - C346
              - C347
              - C348
      - number: '9.4'
        title: Recommendation, exit readiness, and final diligence asks
        blocks:
          - type: paragraph
            body: >-
              The right public-data recommendation is research-more with medium confidence, high risk, and an expensive
              valuation stance at the last round price. A stronger call would require private evidence on ARR, NRR,
              gross margin, cap-table economics, and enterprise contract quality. Exit readiness is also not obviously
              proven from public materials alone. The company may well become a valuable long-duration asset, but public
              sources do not yet show the kind of disclosure breadth that makes a premium mark easy to syndicate or
              defend in a tougher software tape. The main diligence asks are therefore straightforward: verify the
              actual revenue bridge, understand AI and infrastructure cost load, inspect preference and liquidation
              rights, confirm enterprise renewal quality, and test whether larger customers are truly standardizing on
              Linear rather than merely admiring it. If those answers are strong, the company could still merit a
              premium. If not, the sensible stance is patience.
            claimRefs:
              - C307
              - C308
              - C311
              - C313
              - C281
              - C314
              - C341
              - C342
              - C343
              - C344
              - C348
      - number: '9.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Current call
            body: >-
              Research-more at the June 2025 price. The company looks strong; the publicly verified valuation bridge
              does not.
            calloutType: recommendation
            claimRefs:
              - C306
              - C339
              - C340
              - C341
              - C348
          - type: callout
            title: Main valuation hazard
            body: >-
              The biggest downside is denominator risk: if true ARR is much lower than bulls assume, public comps imply
              large multiple compression.
            calloutType: risk
            claimRefs:
              - C313
              - C339
              - C340
              - C344
          - type: callout
            title: What keeps the story live
            body: >-
              Profitability, product quality, PLG pricing, and AI / agent upsell paths are good enough to keep diligence
              open rather than dismiss the asset.
            calloutType: strength
            claimRefs:
              - C307
              - C308
              - C281
              - C314
              - C343
