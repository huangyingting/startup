      - number: '2.4'
        title: Operating scale, disclosure limits, and public readiness signals
        blocks:
          - type: paragraph
            body: >-
              Linear’s public operating disclosure is strongest on customer reach, product posture, and security
              posture, and weakest on financial detail. Company-owned pages repeatedly state that more than 25,000
              companies or product teams use Linear, and the pricing and enterprise pages show a standard SaaS model
              with business and enterprise controls such as SAML, SCIM, migration support, and admin governance. The
              company also claims long-running profitability: the Series B post said Linear had been operating
              profitably since 2021, Forbes reported profitability for the prior two years, and Reuters said profits
              grew 280% in the year before the Series C. Even so, there is no public ARR or revenue number that can be
              treated as canonical. Headcount is also directionally clear but not precise. The official Series B post
              said the company had 50 people in September 2023, Reuters described roughly 80 people in June 2025, and
              Tracxn showed 106 employees in April 2026. That supports a growth trend, not a clean point estimate, so
              later underwriting work should treat headcount as a public range rather than a settled KPI.
