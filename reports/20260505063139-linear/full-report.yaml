      - number: '3.2'
        title: 'Sizing lenses: big category, messy adjacency, limited SAM precision'
        blocks:
          - type: paragraph
            body: >-
              The available public sizing evidence supports a meaningful category opportunity, but not a clean
              Linear-specific TAM/SAM/SOM stack. Grand View sized the global project management software market at $6.59
              billion in 2022 with a path to $20.47 billion by 2030, while Mordor sized the market at $11.27 billion in
              2026 and $23.09 billion by 2031. FMI and Straits publish still larger long-range endpoints, with FMI at
              $9.60 billion in 2026 to $32.27 billion by 2036 and Straits at $8.72 billion in 2024 to $40.12 billion by
              2033. Those numbers all point in the same strategic direction — a large, growing market — but they do not
              carve out the specific developer-first issue-tracking and product-workflow slice that Linear serves best.
              The practical conclusion is that Linear sells into a substantial adjacent market, but public sources are
              better for boundary-setting and growth direction than for precise SAM or SOM quantification. That
              limitation should be preserved rather than papered over with a false pyramid.
            claimRefs:
              - C065
              - C066
              - C068
              - C069
              - C070
              - C071
              - C072
              - C073
              - C081
              - C082
      - number: '3.3'
        title: Buyer, user, payer, and adoption path
        blocks:
          - type: paragraph
            body: >-
              Buyer evidence points to product-development organizations rather than generic PMO budgets. Remote’s story
              centers on a distributed product organization that wanted a simpler issue-tracking source of truth.
              Oscar’s migration shows that highly regulated companies can still be buyers when Jira complexity becomes a
              drag on execution. Brex’s story makes budget ownership legible: the need was not just for engineers to
              like the tool, but for leadership to consolidate fragmented roadmaps across Jira, Monday.com, Atlas, and
              spreadsheets. Coinbase and Ramp add a newer buyer lens in which engineering leaders want a structured
              coordination layer that agents can act against, not just humans. In that framing, the economic buyer is
              typically a VP Engineering, Head of Product Engineering, CTO office, or product-operations leader; the
              day-to-day users are engineers, product managers, designers, and adjacent operational teams; and the payer
              is usually a centralized engineering or product tooling budget. Adoption typically begins with issue
              tracking pain, migrates through a focused pilot or import, and expands only after users trust the workflow
              enough to keep it updated.
            claimRefs:
              - C048
              - C049
              - C050
              - C051
              - C052
              - C053
