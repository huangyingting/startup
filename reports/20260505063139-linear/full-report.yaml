companyProfile:
  summary: >-
    Linear is a private San Francisco-founded software company building a fast, opinionated system for product planning,
    issue tracking, and increasingly agent-native software workflows. The company has built a strong brand among
    high-performance software teams by pairing product craft with low-friction workflows, and by 2025-2026 it had
    expanded from classic issue tracking toward automations, AI assistance, and orchestration for coding agents. Public
    evidence supports real customer depth and premium product positioning, but not enough financial detail to underwrite
    the last private round with high conviction.
  foundedDate: '2019-01-01'
  founders:
    - name: Karri Saarinen
      role: Co-founder, CEO
      background: Former Airbnb design leader; earlier startup Kippt was acquired by Coinbase.
      claimRefs: []
    - name: Jori Lallo
      role: Co-founder, CPO
      background: Former Coinbase engineer and long-time collaborator with Saarinen.
      claimRefs: []
    - name: Tuomas Artman
      role: Co-founder, CTO
      background: Former Uber engineering leader with deep workflow and infrastructure credibility.
      claimRefs: []
  foundingLocation: San Francisco, California, USA
  headquarters: San Francisco, California, USA
  productSummary: >-
    Linear sells a seat-based SaaS platform for software product development, covering issues, projects, initiatives,
    cycles, roadmaps, integrations, and AI/agent workflows. The stack now extends beyond classic issue tracking into
    automations, triage intelligence, an agent SDK, MCP connectivity, and context surfaces that let human teams and
    coding agents work from the same structured system.
  customerFocus: Product, engineering, and design teams ranging from startups to large enterprise software organizations.
  businessModel: >-
    Subscription SaaS with Free, Basic, Business, and custom Enterprise tiers; monetization expands through seat growth,
    premium admin/security controls, and higher-value AI / automation workflows.
  stage: Series C private / unicorn
  fundingStatus: $82M Series C in June 2025 at $1.25B valuation; roughly $134.2M total raised publicly attributed.
  disclosureProfile: private-undisclosed
  claimRefs: []
chapters:
  - number: 2
    title: Company Overview
    sections:
      - number: '2.1'
        title: Identity, product scope, and what is firmly public
        blocks:
          - type: paragraph
            body: >-
              Linear publicly describes itself as a system for planning, building, and shipping products, with issue
              tracking and project workflows at the center of the product. The clearest company-owned identity sources
              are the About, Pricing, Security, and Enterprise pages, which together frame Linear as a subscription
              software platform for product and engineering organizations rather than a generic task manager. Linear’s
              own About page says the company was founded in 2019 and is now used by more than 25,000 companies, while
              the customer page broadens that claim to 25,000 organizations ranging from startups to enterprise and
              Fortune 20 companies. External databases and investors line up on the same founding year and San Francisco
              headquarters, so those are the safest canonical facts for later chapters. The company also emphasizes
              remote work across North America and Europe, which matters because it suggests a distributed operating
              model rather than a single-site software vendor.
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
              - C006
              - C007
              - C008
              - C009
      - number: '2.2'
        title: Founders, leadership bench, and key-person dependence
        blocks:
          - type: paragraph
            body: >-
              The public founder record is unusually consistent. Linear’s About page, Sequoia’s portfolio page, Accel’s
              company page, and Contrary’s profile all name Karri Saarinen, Jori Lallo, and Tuomas Artman as founders,
              with Saarinen serving as CEO, Lallo as CPO, and Artman as CTO. Contrary also provides the best synthesized
              background context, linking the trio to prior roles at Airbnb, Coinbase, and Uber and to shared roots in
              Finland’s startup ecosystem. Public disclosures on the broader bench are thinner, but Linear’s About page
              and Forbes both identify Cristina Cordova in a senior operating role, reflecting a deliberate expansion
              from founder-led product building toward commercial scale. Even with that added bench, the company still
              appears meaningfully dependent on the founding trio for product direction, design philosophy, and
              technical architecture, because the clearest public narratives about quality, roadmap, and workflow all
              route back to the founders.
            claimRefs:
              - C004
              - C005
              - C006
              - C010
              - C011
              - C012
              - C013
              - C014
              - C015
      - number: '2.3'
        title: Capital formation, investors, and employee-liquidity signals
        blocks:
          - type: paragraph
            body: >-
              Linear’s capital history is now well supported by both company and third-party sources. The official
              Series B post announced a $35 million round in September 2023 led by Accel with Sequoia and 01A
              participation, while the official Series C post announced an $82 million round in June 2025 at a $1.25
              billion valuation. TechCrunch, Reuters, Sacra, and Tracxn all converge on roughly $134 million total
              capital raised by the Series C. Sequoia’s company page also shows it partnered with Linear in 2019, while
              Accel’s page dates its initial investment to 2023, which helps separate the long-tenured seed backer from
              the later growth lead. A notable governance and compensation signal arrived in August 2025 when Linear
              completed its first tender offer at the same $1.25 billion valuation, giving current and former teammates
              partial liquidity. That is not a substitute for full cap-table diligence, but it does indicate the company
              had enough balance-sheet confidence and investor support to run a secondary component instead of keeping
              liquidity entirely deferred.
