      - number: '3.4'
        title: Growth drivers, constraints, and what matters for valuation
        blocks:
          - type: paragraph
            body: >-
              Several drivers are durable across retained sources. Grand View, Mordor, and FMI all highlight cloud
              delivery, hybrid work, cross-team coordination, integration depth, and analytics as structural demand
              supports for project-management platforms. FMI goes further by arguing that AI-assisted planning,
              predictive scheduling, and workflow intelligence are moving from optional differentiators to baseline
              enterprise requirements. Those themes line up closely with Linear’s product evolution toward agents,
              backlog intelligence, and structured context for automation. The constraints are equally visible. Grand
              View and Straits both flag data security and implementation cost as adoption brakes, while customer
              stories from Oscar and Brex show that migration only works when a buyer is willing to leave behind years
              of custom fields, workaround processes, and fragmented reporting. Jira and other incumbents still
              advertise flexible workflows and deep integration breadth, which means Linear wins where speed and clarity
              matter more than maximal configurability. For valuation, that translates into a real market opportunity
              with clear workflow pain, but also into meaningful execution risk around enterprise breadth, buyer
              expansion beyond product organizations, and the absence of a clean public SAM.
            claimRefs:
