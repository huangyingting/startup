  - id: F802
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >-
      The last round price becomes easier to defend only if Linear’s real revenue base is far above the available public
      estimate.
    data:
      items:
        - label: Revenue needed at 5x
          value: 250
          detail: >-
            USD millions of annual revenue required to support a $1.25B valuation at a mature but still respectable
            multiple.
          tone: negative
        - label: Revenue needed at 10x
          value: 125
          detail: USD millions required at a strong premium-software multiple.
          tone: warning
        - label: Revenue needed at 20x
          value: 62.5
          detail: USD millions required if scarcity premium remains unusually high.
          tone: neutral
        - label: Public revenue estimate
          value: 18.8
          detail: Low-confidence third-party estimate used only as a public-data anchor.
          tone: negative
    approximationNotes: Thresholds are simple valuation / revenue bridges anchored to the June 2025 $1.25B mark, not DCF outputs.
    claimRefs:
      - C313
      - C339
      - C345
      - C346
      - C347
  - id: F803
    title: Valuation / return range
    type: range
    layout: wide
    summary: >-
      Using only public evidence, the range is wide and mostly below the last round price unless Linear’s true revenue
      base is much larger than public estimates suggest.
    data:
      items:
        - label: Bear case
          low: 120
          mid: 180
          high: 240
          displayValue: $120M-$240M
          detail: Revenue stalls near $30M-$40M and public multiples compress to 4x-6x.
          tone: negative
        - label: Base case
          low: 420
          mid: 550
          high: 680
          displayValue: $420M-$680M
          detail: Revenue grows to roughly $60M-$75M and the market awards 7x-9x.
          tone: warning
        - label: Bull case
          low: 1000
          mid: 1220
          high: 1440
          displayValue: $1.0B-$1.44B
          detail: Revenue scales to roughly $100M-$120M and Linear keeps a premium 10x-12x multiple.
          tone: positive
    approximationNotes: >-
      These ranges are scenario-based revenue-multiple outputs for investment-committee discipline, not management
      guidance.
    claimRefs:
      - C313
      - C324
      - C325
      - C339
      - C340
      - C344
  - id: F804
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      Linear scores highly on product and product-led quality, but weakly on evidence sufficiency and current price
      support.
    data:
      items:
        - label: Product quality
          score: 9
          detail: Strong public reputation, profitability signal, and premium packaging.
          tone: positive
        - label: Monetization upside
          score: 7
          detail: AI workflows and agent features create credible upsell optionality.
          tone: positive
        - label: Market proof
          score: 7
          detail: 15,000+ customers and continued funding support real demand.
          tone: positive
        - label: Evidence quality
          score: 4
          detail: Key revenue, margin, and cap-table inputs are still missing publicly.
          tone: warning
        - label: Valuation support
          score: 2
          detail: Public comp data does not come close to supporting the current price on public estimates.
          tone: negative
        - label: Risk burden
          score: 4
          detail: Execution, AI cost, and multiple compression risk all matter.
          tone: warning
        - label: Exit readiness
          score: 3
          detail: Public evidence is too thin on economics to treat the current mark as comfortably exit-ready.
          tone: negative
    approximationNotes: >-
      Scores are ordinal 0-10 investment judgments anchored to the cited public evidence rather than company-provided
      KPI disclosures.
