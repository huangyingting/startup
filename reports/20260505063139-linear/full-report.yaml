  - number: 8
    title: Risks
    sections:
      - number: '8.1'
        title: Legal, regulatory, and privacy risk
        blocks:
          - type: paragraph
            body: >-
              Linear has built a stronger public compliance surface than many comparably sized workflow-software
              companies: it publishes a DPA, privacy policy, detailed security documentation, and enterprise
              access-control features. That lowers baseline diligence friction. The residual legal risk is not that
              nothing exists; it is that the public stack is still thinner than what a premium enterprise multiple
              ultimately has to withstand. The DPA confirms primary processing in the United States and a broad
              subprocessor list that includes Google, Cloudflare, AWS, OpenAI, Anthropic, and Cohere. The EU AI Act now
              has live GPAI obligations and brings high-risk and transparency duties into force from August 2026 and
              2027, so any expansion of Linear’s AI workflows into more consequential customer use cases would raise the
              compliance bar quickly. Separately, Linear’s terms remain firmly vendor-protective, with no-interruption
              warranties, liability caps near twelve months of fees, and customer-borne third-party app risk. That is
              normal for self-serve software, but it becomes material when customers rely on Linear as operational
              infrastructure rather than a lightweight productivity tool.
            claimRefs:
              - C260
              - C261
              - C265
              - C266
              - C268
              - C270
              - C271
              - C272
              - C274
              - C279
              - C295
              - C296
              - C297
              - C298
      - number: '8.2'
        title: Operational and partner-dependency risk
        blocks:
          - type: paragraph
            body: >-
              Operationally, Linear’s risk surface is concentrated in the exact integrations that make the product
              valuable. GitHub sync can move issues automatically as PRs evolve; Slack can create and update issues from
              conversations; Sentry can auto-create issues from alerts; Zendesk and Vercel push customer and preview
              feedback directly into engineering workflows. That means the platform is not just a database of work — it
              is a routing layer for work. Independent incident monitors show enough recent disruption to treat this as
              a real rather than hypothetical exposure: IsDown reports 16 incidents over the prior 90 days with a median
              duration above two hours and specifically calls out Slack-agent and task-processing issues; StatusGator
              lists an officially acknowledged outage in late April 2026; Statusfield notes that outages can break API
              access, PR linking, branch naming, and sprint rituals. Linear’s own status page was healthy at review
              time, but public materials do not disclose error budgets, incident postmortems, or recovery-time
              commitments for enterprise customers.
            claimRefs:
              - C273
              - C274
              - C275
              - C276
              - C284
              - C285
              - C286
              - C287
              - C288
              - C289
