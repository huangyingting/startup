      - number: '5.3'
        title: Capital adequacy and diligence blockers
        blocks:
          - type: paragraph
            body: >-
              Linear’s latest public capital anchor is constructive but incomplete. The company says it raised $82M at a
              $1.25B valuation in June 2025, and TechCrunch reports that total raised reached about $134.2M. That fresh
              capital, combined with explicit claims of profitability, materially lowers immediate financing risk
              relative to a cash-burning startup that has not yet found a repeatable revenue model. It also suggests
              next capital is more likely to be strategic than existential. However, the underwriting gap remains large
              because no reviewed public source disclosed cash on hand, monthly burn, runway months, debt facilities,
              project-finance obligations, or the actual trigger for a next round or liquidity event. Public-company
              comparables such as Atlassian, GitLab, and monday.com all expose far more detail through filings and
              investor relations pages, which highlights the asymmetry a diligence process must close for a private
              company like Linear. The right verdict is therefore balanced: Linear likely has better revenue quality
              than a pure usage-based AI tool because core monetization is recurring and seat-based, and the 2025 round
              reduced capital pressure. But without cash, burn, retention, margin, and revenue-mix disclosure, a
              financial underwrite remains incomplete and should be treated as blocked on management materials rather
              than solved by public sources alone.
