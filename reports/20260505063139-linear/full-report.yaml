  - id: F801
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The recommendation stays cautious because quality signals are real, but public valuation support is weak relative
      to the price.
    data:
      nodes:
        - id: q
          label: Product quality
          detail: Profitability, customer traction, and premium-tier packaging are all positive.
          tone: positive
        - id: m
          label: Monetization upside
          detail: AI workflows and agent features can expand premium seats inside customer accounts.
          tone: positive
        - id: p
          label: Price support gap
          detail: Public ARR / margin evidence is too weak to justify the last round price confidently.
          tone: warning
        - id: c
          label: Public comp reality
          detail: Atlassian, Asana, and GitLab still screen in low-single-digit revenue multiples.
          tone: warning
        - id: d
          label: Decision
          detail: Research-more at the June 2025 price; engage only if private diligence closes the denominator gap.
          tone: neutral
