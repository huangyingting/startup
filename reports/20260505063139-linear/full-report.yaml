      - number: '4.3'
        title: Durability, switching costs, and displacement risk
        blocks:
          - type: paragraph
            body: >-
              The best public evidence for Linear’s moat is not proprietary data or a visible cost advantage; it is
              adoption by teams that actively wanted to leave heavier systems. Linear’s customer page highlights OpenAI
              at 3,000 users and an Oscar story explicitly framed around leaving a complex Jira estate, which suggests
              the product can replace legacy tooling when UX, speed, and engineering fit matter enough. Its security
              page also shows that enterprise trust controls are no longer a barrier to consideration. But those
              positives do not create a cleanly durable moat. Atlassian, GitHub, and GitLab all combine planning with
              broader ecosystems that can reduce buying friction, while Asana, Notion, ClickUp, and monday continue to
              push product and AI workflow narratives into adjacent use cases. Plane adds an open-source pressure point
              for teams that want modern issue tracking without a premium SaaS contract. In practice, Linear’s position
              looks strongest for software organizations that want a focused system of record for product development
              and are willing to keep docs, CRM, or other operational workflows elsewhere. Its position is weaker where
              procurement prefers suite consolidation, where buyers are satisfied with bundled GitHub/GitLab planning,
              or where price-sensitive teams can multi-home across lightweight substitutes. The central competitive risk
              is therefore imitation and bundling pressure, not lack of product quality.
            claimRefs:
              - C086
              - C087
              - C088
              - C089
              - C090
