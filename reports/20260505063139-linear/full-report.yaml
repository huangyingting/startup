  - id: F701
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Linear’s heaviest residual exposure sits where legal obligations overlap with third-party dependency and recent
      workflow incidents.
    data:
      columns:
        - Likelihood
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: AI / privacy compliance
          values:
            - label: medium
              tone: warning
              detail: AI obligations are real but product scope is still flexible.
            - label: high
              tone: negative
              detail: Mis-scoped automation could affect enterprise trust and EU distribution.
            - label: medium
              tone: warning
              detail: DPA, no-training statement, and security controls help but are not a full AI-control stack.
            - label: medium-high
              tone: warning
              detail: Residual exposure is driven by regulation arriving faster than public disclosures.
        - label: Workflow-partner outages
          values:
            - label: medium-high
              tone: negative
              detail: Independent monitors captured recent incidents affecting Slack and processing flows.
            - label: high
              tone: negative
              detail: Issue intake and PR sync are mission-critical for product teams.
            - label: medium
              tone: warning
              detail: Status visibility exists, but postmortem and SLA detail are missing.
            - label: high
              tone: negative
              detail: Dependencies sit directly in the customer workflow.
        - label: Cloud / AI vendor concentration
          values:
            - label: medium-high
              tone: warning
              detail: Google Cloud and several model vendors appear in the DPA subprocessor list.
            - label: high
              tone: negative
              detail: Cost, quality, and availability can all move through these nodes.
            - label: low-medium
              tone: warning
              detail: Public fallback design is not disclosed.
            - label: high
              tone: negative
              detail: Residual exposure stays high until routing and failover are clearer.
        - label: Execution / support scaling
          values:
            - label: medium
              tone: warning
              detail: The company is scaling from a lean base into enterprise AI workflows.
            - label: moderate
              tone: warning
              detail: Execution misses would more likely slow valuation support than cause immediate insolvency.
            - label: medium
              tone: neutral
              detail: Profitability and PLG pricing provide some cushion.
            - label: medium
              tone: warning
              detail: The main gap is missing operating detail, not obvious distress.
