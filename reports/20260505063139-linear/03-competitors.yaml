      - - Plane
        - Open-source substitute
        - 46,000+ GitHub stars; 50,000+ teams claimed
        - Self-hosting or budget-conscious teams
        - Open-source and self-hosted option
        - Less enterprise proof and breadth than major incumbents
    notes: >-
      Status-quo substitutes also include spreadsheets, internal tools, and lightweight GitHub-only workflows; exact
      enterprise discounting is usually private.
