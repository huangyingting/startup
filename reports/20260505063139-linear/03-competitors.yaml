  - id: SEC302
    title: Capability, pricing, and distribution comparison
    body: >-
      On list pricing, Linear sits in a relatively competitive middle position. Its Basic plan at $10 per user per month
      billed yearly is close to Asana Starter at $10.99 and below Notion Business at $20 and GitLab Premium at $29.
      ClickUp’s Unlimited tier is cheaper at $7, while monday.com’s published 10-seat examples imply Basic around $9 per
      seat and Standard around $12. This means Linear is not winning by being structurally cheaper than every rival;
      instead, it appears to be asking buyers to pay for workflow fit, speed, and a product-development-first
      experience. Capability breadth is where the trade-off becomes clearer. Linear markets an end-to-end workflow from
      customer discovery to planning and execution, but broader suites still span more adjacent work outside
      engineering. Asana and Notion lean into cross-functional coordination, GitHub and GitLab attach planning to code,
      and Jira benefits from Atlassian’s larger enterprise footprint. Customer-proof pages across incumbents show that
      sophisticated teams already run these alternatives at scale, which limits any claim that Linear is uniquely
      enterprise-ready. The strongest comparison case for Linear is therefore not maximum breadth; it is focused depth
      for teams that value faster execution and a more opinionated product workflow than legacy suites typically
      provide.
    claimRefs:
