chapter:
  number: 3
  title: Competitors
  summary: >-
    Linear competes most directly with Jira, GitHub, ClickUp, Monday Dev, Asana, Notion, GitLab, Shortcut, and
    open-source substitutes such as Plane; its advantage is engineering-native speed, while its main risk is suite
    bundling and rapid feature imitation.
sections:
  - id: SEC301
    title: Landscape and competitor classes
    body: >-
      Linear competes in a crowded workflow market where buyers can choose a dedicated engineering-first tool, a broader
      work-management suite, a developer platform with embedded planning, or a lightweight substitute. The most direct
      proprietary rivals are Jira, ClickUp, Shortcut, and monday dev, all of which sell task or issue tracking to
      software teams. Asana and Notion are more cross-functional than Linear, but they still compete whenever product,
      design, and operations leaders want one system to cover planning beyond engineering. GitHub and GitLab matter
      because they package planning directly next to code review, CI/CD, and repository workflows, which lowers adoption
      friction for engineering organizations that prefer fewer vendors. Plane represents the open-source/self-hosted
      lane for cost-sensitive teams that want modern issue tracking without a long-term SaaS commitment. Internal build,
      spreadsheets, and lightweight GitHub Issues workflows remain the status quo substitutes for smaller teams that do
      not yet need a full product-development system of record. Review ecosystems such as The Digital Project Manager,
      Zapier, Capterra, and G2 still present the category as broad and substitutable in 2026, which reinforces that
      Linear does not sell into an uncontested niche. The competitive frame is therefore not just “Linear versus Jira”;
      it is “Linear versus bundled suites, cheaper substitutes, and broader work platforms” across multiple buyer
      archetypes.
    claimRefs:
      - CP001
      - CP002
      - CP003
