      - - Asana
        - Adjacent suite
        - Large enterprise customer base; multi-plan pricing
        - Cross-functional work management buyers
        - Strong non-engineering coordination and enterprise controls
        - Less engineering-native positioning than Linear
      - - monday dev
        - Adjacent direct rival
        - Published dev product plus broad monday platform
        - Product and dev teams needing workflow flexibility
        - Visual workflows plus broader work-management platform
        - Generalist platform positioning can be less opinionated for software execution
      - - GitLab
        - Incumbent bundled suite
        - Public DevSecOps platform with enterprise planning seats
        - Engineering organizations consolidating code and planning
        - Planning sits beside source control, CI/CD, and security
