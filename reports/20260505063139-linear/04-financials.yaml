  - id: SEC402
    title: Public traction, GTM motion, and unit-economics signals
    body: >-
      The strongest public traction signals are customer scale, enterprise progression, and profitability language
      rather than disclosed ARR or margin tables. Linear’s Series C post says more than 15,000 companies use the product
      and that the company operates profitably. TechCrunch independently reported the same 15,000+ customer count, said
      profits grew 280% in the prior year, and placed team size at roughly 80 employees. The Stripe case study adds
      important color: the product and billing stack that worked at 10 customers still works at tens of thousands of
      customers, and bespoke pricing now extends to Fortune 100 accounts. That combination suggests the company has
      moved beyond a purely bottoms-up startup tool and is building a more structured enterprise motion. Built In’s
      report that Series C proceeds will be used for product development and enterprise customer acquisition reinforces
      that interpretation. These are directionally positive unit-economics signals because profitable operation and
      modest headcount against broad customer adoption imply decent capital efficiency. But they are still proxies.
      Public sources do not disclose ARR, net revenue retention, gross margin, CAC, payback, enterprise seat count, or
      churn. So the analytical stance here should be: healthy recurring-revenue architecture and improving GTM
      sophistication are visible, while the actual unit-economics stack remains private.
    claimRefs:
      - C129
      - C130
      - C131
      - C137
      - C138
      - C139
      - C140
      - C141
      - C153
      - C155
      - C158
  - id: SEC403
    title: Capital adequacy and diligence blockers
    body: >-
      Linear’s latest public capital anchor is constructive but incomplete. The company says it raised $82M at a $1.25B
      valuation in June 2025, and TechCrunch reports that total raised reached about $134.2M. That fresh capital,
      combined with explicit claims of profitability, materially lowers immediate financing risk relative to a
      cash-burning startup that has not yet found a repeatable revenue model. It also suggests next capital is more
      likely to be strategic than existential. However, the underwriting gap remains large because no reviewed public
      source disclosed cash on hand, monthly burn, runway months, debt facilities, project-finance obligations, or the
      actual trigger for a next round or liquidity event. Public-company comparables such as Atlassian, GitLab, and
      monday.com all expose far more detail through filings and investor relations pages, which highlights the asymmetry
      a diligence process must close for a private company like Linear. The right verdict is therefore balanced: Linear
      likely has better revenue quality than a pure usage-based AI tool because core monetization is recurring and
      seat-based, and the 2025 round reduced capital pressure. But without cash, burn, retention, margin, and
      revenue-mix disclosure, a financial underwrite remains incomplete and should be treated as blocked on management
      materials rather than solved by public sources alone.
    claimRefs:
      - C129
      - C138
      - C141
      - C142
