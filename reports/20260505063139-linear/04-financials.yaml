  - id: T405
    title: Public financial gaps table
    columns:
      - Missing private metric
      - Impact
      - Current public substitute
      - Why substitute is insufficient
      - Exact diligence path
    rows:
      - - Cash balance
        - Blocks runway analysis
        - Fresh funding amount
        - Capital raised does not equal cash remaining
        - Request latest balance sheet and monthly cash report
      - - Monthly burn
        - Blocks capital adequacy under downside scenarios
        - Profitability statement
        - Profitability does not reveal cash burn or working-capital swings
        - Request 12-month burn and budget versus actual
      - - ARR / revenue by segment
        - Blocks revenue-mix underwriting
        - 15,000+ customer count and public pricing
        - Customer count does not reveal monetized seats or ARPU
        - Request ARR bridge by self-serve, enterprise, and geography
      - - NRR / churn / retention
        - Blocks revenue-quality verdict
        - Customer proofs and profitability signal
        - References say nothing about cohort durability
        - Request cohort tables by plan, logo churn, and seat expansion
      - - Gross margin / CAC / payback
        - Blocks margin-path and GTM-efficiency view
        - Public-company filings for comps
        - Comp filings only show what good disclosure looks like, not Linear’s actual metrics
        - Request gross margin bridge, sales efficiency metrics, and CAC by channel
    notes: >-
