  title: Financials
  summary: >-
    Linear’s public economics point to a recurring seat-based SaaS model with an increasingly enterprise-oriented sales
    motion, but cash, burn, revenue mix, retention, and gross margin remain undisclosed underwriting gaps.
sections:
  - id: SEC401
    title: Revenue model and monetization architecture
    body: >-
      Linear’s public materials support a relatively clean software revenue model: self-serve recurring seat
      subscriptions, annual and monthly billing options, and a managed enterprise motion for larger accounts. The
      company’s own billing documentation says customers are billed for unsuspended users within a workspace, while
      yearly plans true-up through automated pro-rated charges and credits. That implies expansion revenue is driven
      mainly by seat count, plan mix, and upgrades rather than variable usage metering. Public pricing currently shows
      Free, Basic at $10 per user per month billed yearly, and Business at $16 per user per month billed yearly, with
      Enterprise handled through a sales process. The Stripe case study fills in the evolution behind that model. Linear
      originally used a free tier and even a pay-what-you-want subscription approach, then added multiple pricing tiers
      and bespoke enterprise pricing as it expanded from startups toward mid-market, high-growth businesses, and some
      public companies. Stripe also says Linear now has three billing tiers plus custom enterprise pricing and uses
      subscription schedules to simplify invoice management when seat counts change. Put together, the evidence points
      to a classic recurring SaaS monetization architecture with increasing enterprise sophistication. What remains
      missing is not the mechanism of monetization; it is the actual revenue mix across self-serve versus enterprise and
      the realized ASP after discounts.
    claimRefs:
