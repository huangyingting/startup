      - C032
      - C033
  - id: section-5
    title: Milestones, enterprise proof points, and adverse events to carry forward
    body: >-
      The reusable chronology runs from a 2019 founding and Sequoia partnership, to a 2020 Series A, to a 2023 Series B
      that publicly positioned Linear as profitable and growing, to a 2025 Series C and tender offer, and then to a
      March 2026 security incident with an unusually detailed April postmortem. Customer stories add important
      enterprise proof points to that sequence: Remote described moving a 1,000-person team to Linear, Oscar migrated
      more than 600 people out of a highly customized Jira environment in one month, and Coinbase and Ramp showed that
      Linear was becoming a control plane for agent-centric development workflows. The adverse event is material. Linear
      disclosed that a March 24, 2026 code change temporarily let workspace members access private-team data within the
      same workspace for about an hour. The company said no credentials, API keys, or tokens were exposed, but the
      incident still demonstrates that permission-boundary failures are not theoretical. That event should be preserved
      as a live risk marker alongside the otherwise strong growth and product narrative.
    claimRefs:
