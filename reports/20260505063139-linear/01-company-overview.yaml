callouts:
  - calloutType: insight
    title: Capital efficiency is real, but public disclosure is selective
    body: >-
      Linear has unusually strong public evidence for profitability, investor quality, and customer adoption for a
      private software company, but still does not publicly disclose the revenue, ARR, or precise headcount needed for
      full underwriting.
    claimRefs:
      - C017
      - C018
      - C021
      - C031
      - C032
  - calloutType: risk
    title: Security trust is now a first-order diligence item
    body: >-
      The March 2026 permissions incident did not expose credentials, but it did expose private-team data boundaries for
      about an hour, which raises questions about auth-path testing and enterprise trust.
    claimRefs:
      - C038
      - C039
      - C040
