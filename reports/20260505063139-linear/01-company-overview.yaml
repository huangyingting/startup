chapter:
  number: 1
  title: Company Overview
  summary: >-
    Linear is a private San Francisco-founded software company building a developer-first system for product planning
    and issue tracking. Public materials support a 2019 founding by Karri Saarinen, Jori Lallo, and Tuomas Artman, a
    2023 Series B, and an $82 million Series C in June 2025 at a $1.25 billion valuation. The strongest current scale
    signals are 25,000-plus organizations on Linear’s own website, enterprise-oriented security and admin controls, and
    a remote-first team that external coverage still described as roughly 80 people in mid-2025. The main diligence
    caveats are incomplete public disclosure on board composition, revenue, exact headcount, and office footprint, plus
    the March 2026 permission-boundary incident that should carry into later risk work.
sections:
  - id: section-1
    title: Identity, product scope, and what is firmly public
    body: >-
      Linear publicly describes itself as a system for planning, building, and shipping products, with issue tracking
      and project workflows at the center of the product. The clearest company-owned identity sources are the About,
      Pricing, Security, and Enterprise pages, which together frame Linear as a subscription software platform for
      product and engineering organizations rather than a generic task manager. Linear’s own About page says the company
      was founded in 2019 and is now used by more than 25,000 companies, while the customer page broadens that claim to
      25,000 organizations ranging from startups to enterprise and Fortune 20 companies. External databases and
      investors line up on the same founding year and San Francisco headquarters, so those are the safest canonical
      facts for later chapters. The company also emphasizes remote work across North America and Europe, which matters
      because it suggests a distributed operating model rather than a single-site software vendor.
    claimRefs:
      - C001
      - C002
      - C003
      - C004
      - C005
      - C006
      - C007
      - C008
      - C009
  - id: section-2
    title: Founders, leadership bench, and key-person dependence
    body: >-
      The public founder record is unusually consistent. Linear’s About page, Sequoia’s portfolio page, Accel’s company
      page, and Contrary’s profile all name Karri Saarinen, Jori Lallo, and Tuomas Artman as founders, with Saarinen
      serving as CEO, Lallo as CPO, and Artman as CTO. Contrary also provides the best synthesized background context,
      linking the trio to prior roles at Airbnb, Coinbase, and Uber and to shared roots in Finland’s startup ecosystem.
      Public disclosures on the broader bench are thinner, but Linear’s About page and Forbes both identify Cristina
      Cordova in a senior operating role, reflecting a deliberate expansion from founder-led product building toward
      commercial scale. Even with that added bench, the company still appears meaningfully dependent on the founding
      trio for product direction, design philosophy, and technical architecture, because the clearest public narratives
      about quality, roadmap, and workflow all route back to the founders.
    claimRefs:
      - C004
      - C005
      - C006
      - C010
      - C011
      - C012
      - C013
      - C014
      - C015
  - id: section-3
    title: Capital formation, investors, and employee-liquidity signals
    body: >-
      Linear’s capital history is now well supported by both company and third-party sources. The official Series B post
      announced a $35 million round in September 2023 led by Accel with Sequoia and 01A participation, while the
      official Series C post announced an $82 million round in June 2025 at a $1.25 billion valuation. TechCrunch,
      Reuters, Sacra, and Tracxn all converge on roughly $134 million total capital raised by the Series C. Sequoia’s
      company page also shows it partnered with Linear in 2019, while Accel’s page dates its initial investment to 2023,
      which helps separate the long-tenured seed backer from the later growth lead. A notable governance and
      compensation signal arrived in August 2025 when Linear completed its first tender offer at the same $1.25 billion
      valuation, giving current and former teammates partial liquidity. That is not a substitute for full cap-table
      diligence, but it does indicate the company had enough balance-sheet confidence and investor support to run a
      secondary component instead of keeping liquidity entirely deferred.
    claimRefs:
      - C016
      - C017
      - C018
      - C019
      - C020
      - C021
      - C022
      - C023
      - C024
      - C025
      - C026
  - id: section-4
    title: Operating scale, disclosure limits, and public readiness signals
    body: >-
      Linear’s public operating disclosure is strongest on customer reach, product posture, and security posture, and
      weakest on financial detail. Company-owned pages repeatedly state that more than 25,000 companies or product teams
      use Linear, and the pricing and enterprise pages show a standard SaaS model with business and enterprise controls
      such as SAML, SCIM, migration support, and admin governance. The company also claims long-running profitability:
      the Series B post said Linear had been operating profitably since 2021, Forbes reported profitability for the
      prior two years, and Reuters said profits grew 280% in the year before the Series C. Even so, there is no public
      ARR or revenue number that can be treated as canonical. Headcount is also directionally clear but not precise. The
      official Series B post said the company had 50 people in September 2023, Reuters described roughly 80 people in
      June 2025, and Tracxn showed 106 employees in April 2026. That supports a growth trend, not a clean point
      estimate, so later underwriting work should treat headcount as a public range rather than a settled KPI.
    claimRefs:
      - C002
      - C003
      - C007
      - C009
      - C014
      - C018
      - C021
      - C027
      - C028
      - C029
      - C030
