  - id: TM005
    title: Sizing / adoption diligence gaps table
    columns:
      - Gap
      - Current public state
      - Why it matters
      - Exact diligence path
    rows:
      - - Linear-specific SAM
        - No retained public source isolates a developer-first SAM for Linear
        - Without SAM, penetration assumptions can become arbitrary
        - Request management segmentation by company size, seat count, and workflow type.
      - - Linear-specific SOM
        - No retained public source established public market share or realistic near-term share ceiling
        - SOM is required for disciplined valuation modeling
        - Request customer counts and win rates by segment and region.
      - - Buyer economics
        - Public sources imply likely budgets but do not disclose ACV, contract length, or seat density
        - Sales efficiency and expansion analysis depend on this
        - Request ACV distribution, expansion cohorts, and enterprise seat counts.
      - - Segment mix
        - Public sources do not disclose customer mix by vertical, geography, or company size
        - Mix affects market portability beyond tech-forward users
        - Request customer mix and NRR by segment.
