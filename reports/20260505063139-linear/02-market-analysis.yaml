callouts:
  - calloutType: insight
    title: Linear participates in a large market but wins on a narrower job
    body: >-
      The broad category is project and work management software, but the strongest retained evidence says Linear wins
      where product-development teams want fewer custom fields, faster issue workflows, and a better source of truth for
      humans and agents.
    claimRefs:
      - CM001
      - CM006
      - CM009
      - CM010
      - CM014
      - CM020
  - calloutType: risk
    title: Market size is real; market precision is not
    body: >-
      Public market reports support a multi-billion-dollar opportunity, but none of them isolate a clean developer-first
      SAM or SOM for Linear, so investors should resist false precision in valuation models.
    claimRefs:
      - CM020
      - CM023
      - CM026
      - CM028
