      - - Incumbent configurability and integration breadth
        - constraint
        - current
        - Jira and broader suites remain strong where custom process wins over speed
        - Request win/loss data versus Jira, Asana, and Monday.
      - - No clean public SAM / SOM
        - constraint
        - current
        - Limits external precision in market-underwriting models
        - Request internal market segmentation and enterprise ACV ranges.
