chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Linear sits inside a broad and growing project-management and work-management software market, but its real wedge is
    narrower: developer-first issue tracking and product-development workflow orchestration for teams that want faster
    execution, fewer custom fields, and increasing support for AI agents. Public market reports on project management
    software point to a multi-billion-dollar category growing at low-to-high teens CAGRs, with cloud delivery,
    distributed work, analytics, and AI-assisted planning as durable demand drivers. Customer stories show that buyers
    are typically engineering, product, and platform leaders who care less about generic task lists than about
    coordination quality, source-of-truth integrity, and migration away from over-customized legacy setups. The biggest
    market constraint is boundary precision: public sources do not isolate a clean Linear-specific SAM or SOM, and
    incumbent suites still win on configurability, integrations, and broader departmental budgets.
sections:
  - id: section-1
    title: Market boundary, included spend, and the right comparison set
    body: >-
      The broadest public market lens for Linear is project management and work management software, but that boundary
      is too loose to explain why teams choose the product. Linear’s own product, enterprise, and agent pages describe
      something more specific: a structured system for issues, projects, cycles, initiatives, customer requests, and
      increasingly AI-mediated work. That places the company inside the larger project management market while narrowing
      the most relevant spend to engineering-, product-, and platform-led workflow budgets. The included spend is
      software for issue tracking, roadmap coordination, status visibility, customer-feedback intake, and
      developer-adjacent workflow automation. The excluded spend is generic CRM, sales execution, service desk, or broad
      horizontal collaboration budgets unless they directly govern software delivery work. Public customer stories
      reinforce that boundary. Remote, Oscar, Brex, Ramp, and Coinbase did not adopt Linear as a general business work
      OS; they adopted it to replace or rationalize product-development coordination and issue-management workflows. The
      cleanest competitive frame is therefore Jira and adjacent work-management platforms, not all enterprise software.
    claimRefs:
      - C043
      - C044
      - C045
      - C046
      - C048
      - C049
      - C052
      - C053
      - C057
      - C060
      - C061
      - C063
      - C077
  - id: section-2
    title: 'Sizing lenses: big category, messy adjacency, limited SAM precision'
    body: >-
      The available public sizing evidence supports a meaningful category opportunity, but not a clean Linear-specific
      TAM/SAM/SOM stack. Grand View sized the global project management software market at $6.59 billion in 2022 with a
      path to $20.47 billion by 2030, while Mordor sized the market at $11.27 billion in 2026 and $23.09 billion by
      2031. FMI and Straits publish still larger long-range endpoints, with FMI at $9.60 billion in 2026 to $32.27
      billion by 2036 and Straits at $8.72 billion in 2024 to $40.12 billion by 2033. Those numbers all point in the
      same strategic direction — a large, growing market — but they do not carve out the specific developer-first
      issue-tracking and product-workflow slice that Linear serves best. The practical conclusion is that Linear sells
      into a substantial adjacent market, but public sources are better for boundary-setting and growth direction than
      for precise SAM or SOM quantification. That limitation should be preserved rather than papered over with a false
      pyramid.
    claimRefs:
      - C065
      - C066
      - C068
      - C069
      - C070
      - C071
      - C072
      - C073
      - C081
      - C082
  - id: section-3
    title: Buyer, user, payer, and adoption path
    body: >-
      Buyer evidence points to product-development organizations rather than generic PMO budgets. Remote’s story centers
      on a distributed product organization that wanted a simpler issue-tracking source of truth. Oscar’s migration
      shows that highly regulated companies can still be buyers when Jira complexity becomes a drag on execution. Brex’s
      story makes budget ownership legible: the need was not just for engineers to like the tool, but for leadership to
      consolidate fragmented roadmaps across Jira, Monday.com, Atlas, and spreadsheets. Coinbase and Ramp add a newer
      buyer lens in which engineering leaders want a structured coordination layer that agents can act against, not just
      humans. In that framing, the economic buyer is typically a VP Engineering, Head of Product Engineering, CTO
      office, or product-operations leader; the day-to-day users are engineers, product managers, designers, and
      adjacent operational teams; and the payer is usually a centralized engineering or product tooling budget. Adoption
      typically begins with issue tracking pain, migrates through a focused pilot or import, and expands only after
      users trust the workflow enough to keep it updated.
    claimRefs:
      - C048
      - C049
      - C050
      - C051
      - C052
      - C053
      - C054
      - C055
      - C056
      - C057
