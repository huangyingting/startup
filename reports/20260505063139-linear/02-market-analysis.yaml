  - id: T204
    title: Growth drivers and constraints table
    columns:
      - driver/constraint
      - direction
      - timing
      - implication
      - diligence ask
    rows:
      - - Hybrid and remote work complexity
        - driver
        - current
        - Supports demand for structured async coordination and visibility
        - Ask for retention and expansion by distributed-team customers.
      - - Cloud delivery and SaaS integrations
        - driver
        - current
        - Favors subscription workflow platforms over installed legacy stacks
        - Request integration attach rates and ecosystem dependency data.
      - - AI-assisted planning and agent workflows
        - driver
        - current to medium-term
        - Expands Linear beyond manual issue tracking into workflow automation budgets
        - Request usage and monetization split for AI and agent features.
      - - Large-enterprise coordination needs
        - driver
        - current
        - Creates willingness to replace fragmented legacy reporting stacks
        - Request pipeline mix by SMB, mid-market, and enterprise.
      - - Data security and privacy concerns
        - constraint
        - current
        - Can slow adoption for regulated buyers and increase diligence burden
        - Request security review results and enterprise objection data.
      - - Migration and implementation cost
        - constraint
        - current
        - Makes rip-and-replace harder when legacy customization is deep
