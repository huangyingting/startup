    rows:
      - - Developer-first issue tracking
        - Issue creation, triage, bug tracking, sprint/cycle planning, roadmap-linked execution
        - Generic to-do apps and team chat not tied to structured product work
        - Engineering and product tooling owners
        - Closest core wedge for Linear
      - - Product development workflow orchestration
        - Projects, initiatives, customer feedback intake, roadmap visibility, status reporting
        - General BI and knowledge-only tools without workflow execution
        - VP Engineering, product operations, CTO staff
        - Explains cross-functional expansion beyond simple ticketing
      - - AI-assisted engineering coordination
        - Agent assignment, issue delegation, structured context, workflow automation
        - Standalone coding copilots with no workflow system of record
        - Engineering leaders funding AI productivity
        - Fast-growing adjacency where Linear has clear product messaging
      - - Broad project / work management software
        - Cloud project management, collaboration, planning, reporting, and resource views
        - Unrelated CRM, ERP, or service desk spend
        - Enterprise IT and PMO budgets
        - Useful TAM lens but over-broad for direct underwriting
      - - Legacy substitute stack
        - Jira plus surrounding spreadsheets, docs, and custom process layers
        - Non-product departmental stacks without engineering workflows
        - Existing platform admins and engineering operations
        - Status quo Linear often displaces according to customer stories
    notes: >-
      Boundary intentionally narrows from broad PM software TAM toward the developer and product workflow slices where
      retained customer evidence is strongest.
