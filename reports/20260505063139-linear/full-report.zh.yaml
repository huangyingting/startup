      - number: '2.4'
        title: 增长驱动、约束和估值关键变量
        blocks:
          - type: paragraph
            body: >-
              多个驱动因素在所保留来源中都很稳定。Grand View、Mordor 和 FMI 都强调云交付、混合办公、跨团队协调、集成深度和分析能力， 是项目管理平台的结构性需求支撑。FMI 进一步认为，AI
              辅助规划、预测式排期和工作流智能，正从可选差异化变成企业基线要求。 这些主题与 Linear 向 agents、待办智能和面向自动化的结构化上下文演进高度一致。约束同样清楚。 Grand View 和
              Straits 都把数据安全和实施成本列为采用刹车；Oscar 和 Brex 的客户故事也显示，迁移只有在买方愿意放弃多年自定义字段、 临时流程和碎片化报表时才跑得通。Jira
              和其他在位厂商仍在宣传灵活工作流和深度集成广度，这意味着 Linear 只有在速度和清晰度比最大可配置性更重要时才会赢。
              对估值而言，这转化为真实的市场机会和明确工作流痛点，但也带来围绕企业广度、买方能否扩展到产品组织之外，以及缺少干净公开 SAM 的实质执行风险。
