  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、纳入支出，以及正确的比较集合
        blocks:
          - type: paragraph
            body: >-
              从最宽口径看，Linear 所在公开市场是项目管理和工作管理软件，但这个边界太松，解释不了团队为什么选择它。 Linear 自己的产品页、企业页和 agent 页面描述的是更具体的东西：一套围绕
              issues、projects、cycles、initiatives、客户请求， 以及越来越多 AI
              介导工作的结构化系统。这把公司放在更大的项目管理市场里，同时把最相关支出收窄到工程、产品和平台团队主导的工作流预算。
              纳入支出包括问题跟踪、路线图协调、状态可视化、客户反馈接入，以及开发者邻近的工作流自动化软件。排除支出包括通用 CRM、销售执行、服务台，
              或宽泛横向协作预算，除非它们直接治理软件交付工作。公开客户故事强化了这个边界。Remote、Oscar、Brex、Ramp 和 Coinbase 并不是把 Linear 当作通用业务工作操作系统采用；它们用
              Linear 替换或理顺产品开发协调和问题管理工作流。因此最干净的竞争框架是 Jira 及相邻工作管理平台， 而不是全部企业软件。
