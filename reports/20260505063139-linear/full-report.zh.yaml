      - number: '6.2'
        title: 采用轨迹和具名生产证明
        blocks:
          - type: paragraph
            body: >-
              对一家私营工作流软件公司来说，公开采用证明异常具体。OpenAI 的故事称工具从小范围试用扩展到 2,000 多人， 标题则把部署规模写成 3,000 用户。Remote 称其 1,000 人团队在 2023
              年切换。Oscar 称尽管它拥有见过的最复杂 Jira 实例之一， 仍在大约一个月内迁移了 600+ 人。Automattic 称其 600 人工程、产品和设计组织在 2025 年迁移，如今每月产生超过
              12,000 个 issues， 周使用率超过 80%。


              Brex 提供了最干净的量化试点证据：经过可衡量试验后，日使用率更高、满意度更高、问题跟踪效率更好、项目状态理解也更好。 Ramp 和 Coinbase 提供了另一维度证明：Linear
              不只是用于工单处理，也是一层结构化基础，agent 工作流和自动 bug-to-PR 闭环都依赖它。 这让具名证明集比 logo 墙更厚。它展示了大组织中的生产使用、从 Jira
