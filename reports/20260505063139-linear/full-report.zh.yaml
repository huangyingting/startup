      - number: '6.4'
        title: 扩张路径和集中度风险
        blocks:
          - type: paragraph
            body: >-
              扩张故事在工作流层面可信。公开案例研究显示 Linear 从工程执行扩展到产品规划、领导层可见性、内部请求接入，甚至非产品职能。 Mercury 在一个运营系统中使用
              Projects、Insights、Slack sync 和 Asks。Retool 用 Triage 加 GitHub 和 Slack 自动化， 将客户反馈路由到工程工作。Automattic
              描述了面向生态产品的统一路线图。这些例子支持一种先落地再扩张动作： 初始部署后，通过加入更多团队和更深工作流来扩张。


              然而，公开材料没有回答最难的商业问题。没有客群组合、头部客户集中度或续约率披露， 因此无法判断 ARR
              有多少来自初创团队长尾，又有多少来自较少数超大账户。经过策划的成功故事集也自然低估失败部署、采购阻塞或停滞扩张。
              因此，公开客户图景支持「真实采用和可信产品拉力」，但如果没有关于留存、集中度和企业安全审查摩擦的私下尽调， 还不能支持「耐久性已完整承销」。
