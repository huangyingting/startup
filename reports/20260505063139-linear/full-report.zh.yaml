  - id: FV001
    title: 建议逻辑
    type: flow
    layout: wide
    summary: 建议保持谨慎：质量信号真实存在，但相对于价格，公开估值支撑偏弱。
    data:
      nodes:
        - id: q
          label: 产品质量
          detail: 盈利能力、客户牵引和高级套餐包装都是正向信号。
          tone: positive
        - id: m
          label: 变现上行空间
          detail: AI 工作流和智能体功能能在客户账户内扩张高级席位。
          tone: positive
        - id: p
          label: 价格支撑缺口
          detail: 公开 ARR / 利润率证据太弱，不足以有把握地支撑上一轮价格。
          tone: warning
        - id: c
          label: 公开可比公司现实
          detail: Atlassian、Asana 和 GitLab 的收入倍数筛选结果仍是低个位数。
          tone: warning
        - id: d
          label: 决策
          detail: 按 June 2025 价格，结论是继续研究；只有私下尽调补上分母缺口才接触。
          tone: neutral
      edges:
        - from: q
          to: d
        - from: m
          to: d
        - from: p
          to: d
        - from: c
          to: d
    approximationNotes: null
    claimRefs:
