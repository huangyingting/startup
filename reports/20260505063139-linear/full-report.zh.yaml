      - number: '8.4'
        title: 建议、退出准备度和最终尽调问题
        blocks:
          - type: paragraph
            body: >-
              基于公开数据，合理建议是继续研究；置信度中等，风险高，按上一轮价格看估值昂贵。若要给出更强结论，需要私下核实
              ARR、NRR、毛利率、股权结构经济性和企业合同质量。仅凭公开材料，也还看不出公司已经具备清晰的退出准备度。Linear
              很可能成为有价值的长期资产，但公开来源尚未展示足够宽的披露面，无法让溢价标记在更艰难的软件市场中容易被辛迪加接受或防守。因此，主要尽调问题很直接：核实真实收入桥，弄清 AI
              和基础设施成本负荷，检查优先权和清算权，确认企业续约质量，并测试大客户是否真的把 Linear 标准化采用，而不只是欣赏它。如果这些答案够强，公司仍可能配得上溢价；否则，更理性的姿态是耐心等待。
