              detail: DPA、不训练声明和安全控制有帮助，但还不是完整的 AI 控制栈。
            - label: 中高
              tone: warning
              detail: 剩余敞口来自监管推进快于公开披露。
        - label: 工作流合作方中断
          values:
            - label: 中高
              tone: negative
              detail: 独立监测记录了近期影响 Slack 和处理流程的事故。
            - label: 高
              tone: negative
              detail: 问题收集和 PR 同步对产品团队是关键任务。
            - label: 中
              tone: warning
              detail: 状态可见性已有，但缺少事后复盘和 SLA 细节。
            - label: 高
              tone: negative
              detail: 依赖项直接嵌在客户工作流里。
        - label: 云 / AI 供应商集中
          values:
            - label: 中高
              tone: warning
              detail: DPA 子处理方名单中出现 Google Cloud 和多家模型供应商。
            - label: 高
              tone: negative
              detail: 成本、质量和可用性都可能经由这些节点波动。
            - label: 中低
              tone: warning
              detail: 公开资料未披露回退设计。
            - label: 高
              tone: negative
              detail: 路由和故障切换更清楚之前，剩余敞口仍高。
        - label: 执行 / 支持扩张
          values:
            - label: 中
              tone: warning
              detail: 公司正从精简底座切入企业 AI 工作流。
            - label: 中等
              tone: warning
              detail: 执行失误更可能拖慢估值支撑，而不是立刻导致资不抵债。
            - label: 中
              tone: neutral
              detail: 盈利能力和 PLG 定价提供一定缓冲。
            - label: 中
              tone: warning
              detail: 主要缺口是运营细节缺失，而非明显困境。
