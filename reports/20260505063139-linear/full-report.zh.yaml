      - number: '2.2'
        title: 规模测算视角：大品类、邻近市场混杂、SAM 精度有限
        blocks:
          - type: paragraph
            body: >-
              现有公开规模证据支持一个有意义的品类机会，但无法拼出干净的 Linear 专属 TAM/SAM/SOM 体系。Grand View 估算全球项目管理软件市场 2022 年为 $6.59 billion，并有望在
              2030 年达到 $20.47 billion；Mordor 估算该市场 2026 年为 $11.27 billion、2031 年为 $23.09 billion。FMI 和 Straits
              给出更大的长期终点：FMI 从 2026 年 $9.60 billion 到 2036 年 $32.27 billion，Straits 从 2024 年 $8.72 billion 到 2033 年
              $40.12 billion。这些数字都指向相同战略方向——市场大且在增长——但没有切出 Linear 最擅长服务的 开发者优先的问题跟踪和产品工作流细分。务实结论是，Linear
              销售进入了一个相当大的相邻市场；但公开来源更适合界定边界和增长方向， 不适合精确量化 SAM 或 SOM。这个限制应保留，而不是用虚假的金字塔掩盖。
