chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、产品范围，以及已经扎实公开的事实
        blocks:
          - type: paragraph
            body: >-
              Linear 公开把自己描述为一套用于规划、构建和交付产品的系统，问题跟踪和项目工作流位于产品中心。 最清晰的公司自有身份来源是 About、Pricing、Security 和 Enterprise
              页面；这些页面共同把 Linear 定位为面向产品和工程组织的订阅软件平台， 而不是通用任务管理器。Linear 自己的 About 页面称公司成立于 2019 年，目前被超过 25,000 家公司使用；
              客户页面进一步把口径扩展为 25,000 家组织，覆盖初创公司、企业和 Fortune 20 公司。外部数据库和投资人也指向相同的成立年份和 San Francisco
              总部，因此这些是后续章节最稳妥的规范事实。公司还强调在 North America 和 Europe 远程办公； 这很重要，因为它暗示 Linear 是分布式运营模式，而不是单一地点的软件供应商。
