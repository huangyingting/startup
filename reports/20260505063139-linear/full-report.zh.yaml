  - id: FR003
    title: 依赖图
    type: dag
    layout: wide
    summary: 作为工作流产品，Linear 的依赖面异常密集，因为 AI、协作、支持和工程自动化都会触到核心问题 系统。
    data:
      nodes:
        - id: core
          label: Linear 核心平台
          description: 问题跟踪、项目和工作流自动化。
        - id: gcp
          label: Google Cloud
          description: 托管、数据库和备份。
        - id: ai
          label: OpenAI / Anthropic / Cohere
          description: AI 功能和智能体工作流。
        - id: slack
          label: Slack
          description: 问题收集、线程同步、通知。
        - id: github
          label: GitHub
          description: PR 同步、提交关联、问题状态自动化。
        - id: sentry
          label: Sentry
          description: 告警驱动的问题创建和异常收集。
        - id: zendesk
          label: Zendesk
          description: 支持工单到工程的闭环。
        - id: vercel
          label: Vercel
          description: 预览评论触发问题创建。
        - id: cust
          label: 客户工作流
          description: 日常产品开发执行。
      edges:
        - from: gcp
          to: core
        - from: ai
          to: core
        - from: slack
          to: core
        - from: github
          to: core
        - from: sentry
          to: core
        - from: zendesk
          to: core
        - from: vercel
          to: core
        - from: core
          to: cust
