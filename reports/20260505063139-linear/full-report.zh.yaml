      - number: '5.4'
        title: 信任、安全和公开可见缺口
        blocks:
          - type: paragraph
            body: >-
              信任材料更强调企业就绪度，而不是深度后端披露。Linear 公开列出 SOC 2 Type II、GDPR 和 HIPAA 合规； 安全页称传输中数据使用 TLS 1.2，静态数据使用
              AES-256。它还记录了应用审批、私有团队、访客账户和 IP 限制 等实用管理控制。Slack marketplace listing 又补上一个有用运营细节：Slack app 使用 OpenAI APIs
              且零数据保留， 并列出该 app 场景的 US 数据中心位置。


              缺失内容同样重要。这里审阅的公开来源没有记录自托管或私有云选项，没有发布详细子处理方或数据边界矩阵， 也没有提供带服务抵扣机制的公开 SLA 文件。外部评测证据总体上认可速度和易用性，但也指出高级路线图视图、
              自定义工作流、泳道和多负责人支持的限制。这让产品在重视有主张运营纪律和 AI 就绪结构化工作流、 胜过深度可配置性或定制部署模式的组织中显得最强。
