            body: >-
              Linear 的工作流越来越假设聊天工具、代码托管平台和 AI agents 都是一线执行参与者。集成目录把 GitHub、Slack、GitLab、Figma、Intercom 和 Google Sheets
              列为核心应用；更深入的 Slack 和 Teams 页面展示出一致设计模式：对话变成 issues， issue 上下文流回协作界面，人们无需打开单独管理控制台也能行动。Slack 支持创建
              issue、双向线程同步、富链接展开和频道通知。 Microsoft Teams 则用 @Linear prompts 延展同一模式，可以创建 issues、更新 projects 并生成文档。


              最新一层是 agent-native 工作流。Linear 2026 年 4 月更新日志为 Linear Agent 增加 MCP 支持， 让它可以从 Granola、Glean、Notion、PostHog
              等外部系统拉取上下文。这很重要，因为 Linear 因此从目的地 UI 变成结构化产品工作的编排中心。 同一更新日志还为内置列表之外的工具加入自定义编码工具集成，说明 Linear 预期「issue 到
              coding agent 再到评审闭环」 会成为标准企业模式，而不是一次性实验。
