      - number: '8.3'
        title: 乐观、基准和悲观情景
        blocks:
          - type: paragraph
            body: >-
              乐观情景要求 Linear 的真实收入基数远高于公开估算器暗示的水平，靠溢价定价和 AI 增购，在几年内把收入推到大约 $100 million 至 $120 million，并且市场仍愿意给 10x 至 12x
              的较高收入倍数。这个情景大致可以支撑、甚至略微超过上一轮价格。基准情景更严苛：即便执行不错，公司收入达到 $60 million 至 $75 million，只要公开市场纪律延续，估值可能仍只有 $420
              million 至 $680 million。悲观情景很简单：倍数压缩叠加变现放慢，当前账面价格会出现实质下行。重要的是，这些情景并不是说 Linear 在所有状态下都被高估，而是说公开记录不够精确，无法让
              2025 年 6 月价格显得安全。因此，价格纪律比对产品的欣赏更重要。
