        - 继续研究
        - 公开证据对 ARR、NRR 和毛利率披露太薄，无法有把握地支撑上一轮价格。
      - - 置信度
        - 中
        - 定性的商业逻辑不错，但量化估值桥接偏弱。
      - - 风险评级
        - 高
        - 溢价私募倍数建立在有限的公开财务披露和仍然严苛的软件市场之上。
      - - 估值立场
        - 昂贵
        - 按公开收入估计，上一轮价格显著高于可获得的公开可比公司倍数。
      - - 决策含义
        - 保持跟进，但没有收入质量和经济性的数据室证明，不应接受 2025 年 6 月的价格。
        - 缺口在证据，不在产品质量。
    notes: 这一建议明确对价格敏感：更好的私有证据或更低的入场价格，会比又一条增量产品背书更能改变判断。
