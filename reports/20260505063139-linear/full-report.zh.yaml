        title: 满意度、耐久性和证据质量
        blocks:
          - type: paragraph
            body: >-
              公开满意度信号正面但不均衡。Product Hunt 基于 390 条评论给 Linear 4.9 星，并把主要赞誉概括为速度、干净、易采用和强集成。 PeerSpot
              也偏正面，但可见样本只有一条评论，因此只能提供方向帮助，不能成为决定性证据。StackShare 和 GitHub/npm 活跃度支持 Linear
              有真实开发者主导足迹，但这些更适合作为采用代理指标，而不是续约或企业耐久性的直接证明。


              关键尽调提醒在于，公开记录在部署和热情上强得多，在留存经济上弱得多。审阅来源没有披露 NRR、GRR、付费流失率或客户集中度。
              这意味着本章可以展示生产证明和迁移成功，但无法仅凭公开证据证明长期合同耐久性。外部反馈中还有一条真实反向线索： Product Hunt 评论者提到路线图视图、看板、自定义工作流、泳道和多负责人支持深度不足。
              对规划需求高度定制的买方来说，即便基础采用强，这也可能限制扩张。
