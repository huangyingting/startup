  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人或尽调路径
    rows:
      - - 经确认的 ARR 与收入桥接
        - 实际 ARR / 收入、确认收入与账单收入组合，以及按客户队列的增长
        - 价格支撑问题主要是分母风险。
        - CFO 数据室、董事会材料和审计师准备的收入桥接。
      - - 毛利率与 AI 成本负载
        - 推理成本负担、云支出，以及按产品 / 层级拆分的毛利率
        - 只有变现跑赢 AI 和基础设施成本，溢价估值才成立。
        - 财务尽调和基础设施成本审查。
      - - 净收入留存与扩张
        - 按队列拆分的 NRR、席位扩张和企业流失
        - PLG 加高阶套餐增购是核心价值创造主张。
        - 收入运营和队列留存分析。
      - - 股权结构表与优先权
        - 优先股堆叠、清算权、MFN 条款、棘轮条款和老股交易经济性
        - 如果经济性对投资人不友好，名义估值会误导。
        - 律师审查融资文件。
      - - 企业合同质量
        - SLA 赔付、赔偿条款、安全附录和谈判例外
        - 上探高端市场能否成功，取决于合同可接受度，不只是产品吸引力。
        - 法律 / 客户尽调。
      - - 客户集中度与部署深度
        - 头部客户占比、多团队部署，以及账户内的任务关键性
        - 如果产品深度嵌入大客户，可比公司差距就没那么吓人。
        - 客户访谈和队列数据。
    notes: 如果这些问题无法干净回答，正确姿态是等待，而不是接受价格。
