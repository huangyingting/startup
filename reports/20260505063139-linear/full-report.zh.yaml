            body: >-
              Linear 看起来不像一家陷入困境的公司。Series C 公告称公司盈利、远程办公，并被超过 15,000 家公司使用； TechCrunch 称前一年利润增长
              280%。这些都是正面因素。剩余财务和执行风险来自精度缺失，而不是可见弱点。 公开来源没有验证已确认 ARR、毛利率、企业 NRR、客户集中度或支持强度。第三方追踪器在员工数和收入估算上并不一致： Tracxn
              列出截至 2026 年 3 月 209 名员工，Growjo 估计收入约 $18.8 million、员工 135 人。如果真实收入基数明显更高， 2025 年 6
              月的独角兽标记可能更容易防守；如果不是，公司可能是在相对小的财务基础上承销企业级可靠性和 AI 扩张。 高级档位确实显示出更高变现路径，因为 AI 工作流、agent 功能、issue SLA 和更深支持都在
