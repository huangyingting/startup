  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品界面和核心工作流
        blocks:
          - type: paragraph
            body: >-
              Linear 的公开产品界面紧紧围绕软件产品开发，而不是通用工作管理。首页把系统放在 AI 时代工作流中的产品规划和构建上， 并持续暴露同一组核心对象：用于执行的 issues、用于结果绑定交付的
              projects、用于公司层级汇总的 initiatives、用于规划节奏的 cycles， 以及 Asks、Customer Requests、Insights、Agents 等新层。实践中，这意味着
              Linear 销售的是统一运营模型， 而不是一组彼此断开的点功能。


              文档强化了这个运营模型。Projects 是功能发布或其他有边界工作包的主要容器，initiatives 则把多个 projects 汇入目标层视图， 供领导层查看。Asks 将 bug
              报告、问题和内部请求路由进同一张 issue 图， 让工作接入留在核心系统内，而不是散落在邮件或聊天旁路中。结果是一条工作流：客户反馈、优先级排序、执行和发布可见性， 都回到同一套 issue 和 project
              结构。公开材料中可见的主要产品优势，就是这种一致性。
