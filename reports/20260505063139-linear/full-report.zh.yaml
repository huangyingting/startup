      - number: '8.2'
        title: 融资背景和入场纪律
        blocks:
          - type: paragraph
            body: >-
              2025 年 6 月这一轮融资给估值定了锚：公司以 $1.25 billion 估值融资 $82
              million，同时包含新股和老股交易。这一点有价值，因为它证明了真实的投资人支持，也释放了部分流动性。但单凭这一点，还不足以证明 2026
              年新投资人的经济回报足够有吸引力。通向公开市场的桥很陡。基于可访问的市值和收入页面，Asana 的收入倍数大约为 2.2x，Atlassian 约 4.3x，GitLab 约 4.4x。即便
              Multiples.vc 和 Aventis 对公开 SaaS 倍数的评论较为宽松，也仍然同时看增长、盈利和 AI 溢价。如果把 Linear 官方估值与 Growjo 的公开收入估计放在一起，隐含倍数约为
              66.5x。若公开收入被低估，这个数字可能夸大现实，但它仍然定义了入场纪律问题：投资人必须相信，私有指标远好于公开证据显示的水平。
