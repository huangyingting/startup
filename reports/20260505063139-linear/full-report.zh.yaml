  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律、监管和隐私风险
        blocks:
          - type: paragraph
            body: >-
              相比许多同体量工作流软件公司，Linear 已建立更强的公开合规界面：它发布 DPA、隐私政策、详细安全文档和企业访问控制功能。
              这降低了基础尽调摩擦。剩余法律风险不在于什么都没有，而在于公开栈仍薄于一个高端企业倍数最终需要承受的标准。 DPA 确认主要在 United States 处理数据，并列出一个宽泛子处理方清单，包括
              Google、Cloudflare、AWS、OpenAI、Anthropic 和 Cohere。 EU AI Act 现在已有生效中的 GPAI 义务，并将在 2026 年 8 月和 2027
              年把高风险和透明度义务推入执行； 因此如果 Linear 的 AI 工作流扩展到更具后果性的客户用例，合规门槛会迅速抬高。另一个维度是，Linear 条款仍明显保护供应商：
              无中断保证、接近十二个月费用的责任上限，以及由客户承担的第三方 app 风险。这对自助式软件很正常， 但当客户把 Linear 当作运营基础设施，而不是轻量生产力工具时，就会变得重要。
