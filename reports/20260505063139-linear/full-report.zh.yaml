  - id: TV005
    title: 投资逻辑破裂与终止触发项表
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 经验证 ARR 远低于隐含支撑门槛
        - 数据室显示 ARR 明显低于约 $60M，且没有异常出色的利润率画像
        - 即使用宽松的私募倍数，2025 年 6 月价格仍难辩护
        - 不要按上一轮价格投资。
      - - 企业经济性不达预期
        - NRR <110%、毛利率被 AI 成本压缩，或支持负担异常高
        - PLG 加 AI 增购叙事失去杠杆逻辑
        - 按更低倍数和更慢增长重切估值。
      - - 软件倍数持续承压
        - 公开工作流 / 开发者软件可比公司仍停留在低个位数收入倍数
        - 稀缺溢价跑赢基本面的空间变小
        - 要求明显更低的入场价格或更好条款。
      - - AI 差异化商品化
        - 竞争对手补齐 Linear 的自动化功能，却没有对应价格抬升
        - 溢价扩张故事走弱，公开可比公司的天花板更重要
        - 下调乐观情景概率，并把估值视为偏高到昂贵。
      - - 股权结构条款对投资人不友好
        - 优先权、棘轮条款或清算悬压削弱新资金的真实经济性
        - 名义估值不再代表可投资经济性
        - 等条款改善或价格重置后再推进。
    notes: 这些触发项刻意围绕价格。它们不是泛泛的业务风险，而是会让当前估值难以持有的事件。
