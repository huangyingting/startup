        title: 资本形成、投资人和员工流动性信号
        blocks:
          - type: paragraph
            body: >-
              Linear 的资本历史现在已有公司和第三方来源双重支撑。官方 Series B 文章宣布，2023 年 9 月由 Accel 领投、Sequoia 和 01A 参投， 融资 $35 million；官方
              Series C 文章宣布，2025 年 6 月公司以 $1.25 billion 估值融资 $82 million。 TechCrunch、Reuters、Sacra 和 Tracxn 都收敛到 Series
              C 后累计融资约 $134 million。Sequoia 的公司页面还显示其在 2019 年与 Linear 合作，而 Accel 页面把初始投资时间列为 2023
              年，这有助于区分长期种子轮支持者和后来的成长轮领投方。 2025 年 8 月出现了一个值得关注的治理和薪酬信号：Linear 以同样 $1.25 billion 估值完成首次 tender offer，
              向现任和前任队友提供部分流动性。这不能替代完整股权结构尽调，但确实表明公司有足够资产负债表信心和投资人支持， 可以加入老股交易，而不是把流动性完全后置。
