      - number: '4.2'
        title: 公开牵引、GTM 动作和单位经济信号
        blocks:
          - type: paragraph
            body: >-
              最强的公开牵引信号是客户规模、企业化推进和盈利表述，而不是已披露 ARR 或利润率表。Linear 的 Series C 文章称超过 15,000 家公司使用产品， 且公司盈利运营。TechCrunch
              独立报道了同样的 15,000+ 客户数，称前一年利润增长 280%，并把团队规模放在约 80 人。 Stripe 案例研究提供了重要细节：适用于 10
              个客户的产品和账单栈，在数万客户规模下仍然适用；定制价格现在也扩展到 Fortune 100 账户。 这个组合说明公司已经超出纯自下而上初创工具阶段，正在搭建更结构化的企业销售动作。Built In 报道
              Series C 资金将用于产品开发和企业客户获取， 也强化了这一判断。这些都是方向性正面的单位经济信号，因为盈利运营、相对克制的员工数和广泛客户采用放在一起，暗示资本效率不错。
              但它们仍是代理指标。公开来源没有披露 ARR、净收入留存、毛利率、CAC、回本周期、企业席位数或流失率。因此这里的分析姿态应是： 健康的循环收入架构和提升中的 GTM 成熟度可见，但真实单位经济栈仍属私密。
