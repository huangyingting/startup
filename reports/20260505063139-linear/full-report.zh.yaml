  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 论点
      - 投资逻辑
      - 什么会改变判断
    rows:
      - - 产品质量与 PLG 拉力
        - Linear 有强客户口碑、盈利运营和清晰的高阶套餐增购模型。
        - 如果客户数增长很广，但单客变现很浅，PLG 叙事就无法支撑价格。
      - - AI 变现
        - AI 工作流和智能体功能在现有席位与工作流内打开真实扩张路径。
        - 如果 AI 变成标配，或推理成本吃掉上行空间，溢价定价能力可能坍塌。
      - - 企业扩张
        - 公司正用新资本继续上探高端市场。
        - 如果企业 MSA、SLA 条款或支持成熟度跟不上目标，扩张会更慢、更烧服务。
      - - 价格支撑
        - 极高质量的工作流资产可以在私募市场拿到稀缺溢价。
        - 没有经验证的 ARR、NRR 和毛利率，溢价很容易跑在基本面前面。
      - - 可比公司背景
        - 面向工程和设计的软件，交易倍数仍好于较弱的 SaaS 队列。
        - 即便是优质公开可比公司，收入倍数大多仍是个位数，远低于 Linear 隐含的公开市场桥接。
    notes: 反向逻辑主要在分母风险：只有私有运营指标远强于公开证据，公开市场才支撑得住这个价格。
