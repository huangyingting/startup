      - number: '5.3'
        title: 部署、分析和发布成熟度
        blocks:
          - type: paragraph
            body: >-
              Linear 的公开文档在规划数据如何穿过执行并进入交付这件事上异常具体。Insights 把 issue 数据变成实时分析数据集， 团队可按状态、负责人、项目或时间范围过滤，检查阻塞点和工作模式。2026 年
              4 月底推出的 Releases 把 CI/CD 系统接回 issues， 让团队看到哪些变更已经实际发布到哪个环境。这补上了产品系统里的常见缺口：tracker 里显示「done」，并不等于「用户可用」。
              发布文档明确支持持续部署和计划发布两种模型，并注明 Linear 自己在单体仓库中使用多条流水线和路径过滤器。


              这是一个重要成熟度信号：Linear 不再只是一个快速问题跟踪器，而是一张跨越规划、执行、分析和部署上下文的工作流图。 公开状态页也给出区域 API / 应用可用性快照，对运营有用；但公开材料没有给出合同 SLA
              条款或更丰富的历史事件记录。 对尽调而言，可靠性叙事方向正面，但在受监管企业买方全球标准化之前，仍比他们希望看到的材料更轻。
