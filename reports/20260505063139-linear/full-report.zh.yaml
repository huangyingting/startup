  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 格局和竞争者类别
        blocks:
          - type: paragraph
            body: >-
              Linear 所在工作流市场拥挤，买方可以选择专注工程的工具、更宽的工作管理套件、内嵌规划的开发者平台，或轻量替代品。 最直接的自研闭源对手是 Jira、ClickUp、Shortcut 和 monday
              dev，它们都向软件团队销售任务或问题跟踪。Asana 和 Notion 比 Linear 更跨职能，但当产品、设计和运营领导想用一个系统覆盖工程之外的规划时，它们仍会竞争。GitHub 和 GitLab 重要，
              因为它们把规划直接打包在代码审查、CI/CD 和仓库工作流旁边，降低了偏好少供应商工程组织的采用摩擦。Plane 代表开源 / 自托管路线， 面向想要现代问题跟踪、又不愿长期绑定 SaaS
              合同的成本敏感团队。内部自建、电子表格和轻量 GitHub Issues 工作流， 仍是尚不需要完整产品开发记录系统的小团队的现状替代。The Digital Project
              Manager、Zapier、Capterra 和 G2 等评测生态， 到 2026 年仍把这个品类呈现为宽泛且可替代，这强化了 Linear 并不是在无竞争利基里销售。竞争框架因此不只是「Linear 对
              Jira」； 而是在多个买方画像中，「Linear 对打包套件、更便宜替代品和更宽工作平台」。
