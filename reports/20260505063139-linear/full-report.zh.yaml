        title: 资本充足性和尽调堵点
        blocks:
          - type: paragraph
            body: >-
              Linear 最新的公开资本锚点是建设性的，但不完整。公司称 2025 年 6 月以 $1.25B 估值融资 $82M， TechCrunch 报道累计融资达到约
              $134.2M。这笔新资金叠加明确盈利表述，相比尚未找到可重复收入模式的烧钱型初创公司， 大幅降低了短期融资风险。它也暗示下一笔资本更可能是战略性，而不是生存性。然而，承销缺口仍然很大，
              因为没有已审阅公开来源披露现金余额、月度烧钱、现金跑道月数、债务额度、项目融资义务，或下一轮融资 / 流动性事件的真实触发条件。 Atlassian、GitLab、monday.com
              等上市可比公司通过监管文件和投资者关系页面暴露更多细节， 这凸显了尽调流程必须为 Linear 这样的私营公司补齐的信息不对称。正确结论应保持平衡：由于核心变现是循环且按席位收费， Linear
              的收入质量可能优于纯用量型 AI 工具，2025 年融资也降低了资本压力。但如果没有现金、烧钱、留存、利润率和收入组合披露， 财务承销仍不完整，应视为卡在管理层材料上，而不是被公开来源解决。
