      - number: '3.2'
        title: 能力、定价和分发比较
        blocks:
          - type: paragraph
            body: >-
              从标价看，Linear 处在相对有竞争力的中间位置。Basic 年付价格为每用户每月 $10，接近 Asana Starter 的 $10.99， 低于 Notion Business 的 $20 和
              GitLab Premium 的 $29。ClickUp 的 Unlimited 档更便宜，为 $7；monday.com 公开的 10-seat 示例暗示 Basic 约 $9 / seat、Standard
              约 $12。这意味着 Linear 并不是靠结构性比所有对手便宜取胜； 它更像是在要求买方为工作流契合、速度和产品开发优先体验付费。能力广度上，取舍更清楚。 Linear
              宣传从客户发现到规划和执行的端到端工作流，但更宽的套件仍覆盖更多工程之外的相邻工作。Asana 和 Notion 强调跨职能协调， GitHub 和 GitLab 把规划接到代码上，Jira 则受益于
              Atlassian 更大的企业足迹。各在位厂商的客户证明页显示， 成熟团队已经在规模化使用这些替代方案，这限制了任何关于 Linear 独一无二具备企业级就绪度的说法。Linear
              最强的比较案例因此不是最大广度； 而是面向重视更快执行、也重视比传统套件更有主张产品工作流的团队，提供聚焦深度。
