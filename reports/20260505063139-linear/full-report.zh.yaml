  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Linear 的风险沿几条共同通道传导：合规、合作方可靠性、企业信任和估值支撑。
    data:
      nodes:
        - id: n1
          label: AI / 隐私义务
          description: EU AI Act、GDPR 义务，以及客户数据处理预期。
        - id: n2
          label: 合作方中断或政策变化
          description: 对云、模型或工作流集成的依赖。
        - id: n3
          label: 企业信任
          description: 安全审查结果、支持信心和合同可接受性。
        - id: n4
          label: 工作流连续性
          description: 问题创建、分诊、PR 同步、告警和支持闭环。
        - id: n5
          label: 席位扩张 / 留存
          description: 高级套餐能否在客户内部持续扩张。
        - id: n6
          label: 利润率 / 支持负载
          description: AI 成本、事故负担和服务强度。
        - id: n7
          label: 下一轮估值支撑
          description: 独角兽估值能否继续站得住。
      edges:
        - from: n1
          to: n3
        - from: n1
          to: n6
        - from: n2
          to: n4
        - from: n2
          to: n3
        - from: n4
          to: n5
        - from: n3
          to: n5
        - from: n5
          to: n7
        - from: n6
          to: n7
