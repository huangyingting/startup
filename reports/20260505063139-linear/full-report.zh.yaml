      - - AI 治理 / 监管滑坡
        - 企业客户通知或监管更新
        - 只要出现证据显示 Linear 的 AI 功能需要当前公开控制栈未记录的控制措施
        - 暂停承销判断，直到 AI 控制映射和产品范围得到验证。
      - - 关键工作流集成的中断频率
        - 独立事故监测
        - 连续两个季度每月超过一次重大工作流事故
        - 上调可靠性风险评级，并假设企业标准化采用 Linear 的意愿下降。
      - - 第三方 AI 集中度
        - 管理层尽调或更新后的分包处理方名单
        - 关键功能实质依赖单一模型供应商，且没有经过测试的回退
        - 下调对利润率和产品耐久性的信心。
      - - 合同条款过于不利于客户，拖累企业扩张
        - 企业 MSA / SLA 审查
        - 大客户的责任上限和中断补救仍接近标准自助条款
        - 把进入受监管客户或大客户的节奏视为更慢、服务投入更重。
      - - 经营杠杆未能兑现
        - 针对 ARR、NRR 和支持负载的私下尽调
        - 经验证的收入效率和续约表现没有随规模改善
        - 应将当前估值视为容易遭遇平轮或下轮。
    notes: 这些触发项旨在作为可观察的尽调检查点，而不是模糊的战略担忧。
