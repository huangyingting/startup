        - 基于 $1.25B 估值和约 $18.8M 估计收入，收入倍数约 66.5x
        - 如果公开收入估计方向上正确，该行显示当前价格意味着什么。
        - 收入估计权威性低，可能明显低估真实规模。
      - - Atlassian
        - 公开市值 / 收入
        - 基于 $24.57B 市值和 $5.75B 收入，约 4.3x
        - 规模化工作流 / 开发者软件中最好的参考，企业分销也强。
        - 规模大得多，也更多元，且具备上市公司成熟度。
      - - Asana
        - 公开市值 / 收入
        - 基于 $1.71B 市值和 $0.79B 收入，约 2.2x
        - 更接近的工作流软件可比对象，收入有监管文件支撑，也仍受公开市场约束。
