  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式和变现架构
        blocks:
          - type: paragraph
            body: >-
              Linear 的公开材料支持一个相对清晰的软件收入模式：自助式循环席位订阅、年付和月付选项，以及面向较大账户的托管企业销售动作。
              公司自己的账单文档称，客户按工作区内未暂停用户付费；年付计划会通过自动按比例收费和抵扣完成补差结算。 这意味着扩张收入主要由席位数、套餐组合和升级驱动，而不是可变用量计费。公开定价目前显示
              Free、Basic（年付每用户每月 $10）和 Business（年付每用户每月 $16），Enterprise 则走销售流程。Stripe 案例研究补上了该模式背后的演化。 Linear
              最初使用免费档，甚至采用随心付费订阅方式；随着从初创公司扩展到中端市场、高增长企业和部分上市公司， 它加入多个定价档位和定制企业定价。Stripe 还称 Linear
              现在有三个计费档位加定制企业定价，并用订阅排程 简化席位数变化时的发票管理。合在一起，证据指向经典循环 SaaS 变现架构，企业级成熟度也在提高。仍然缺失的不是变现机制，
              而是自助式与企业收入之间的真实组合，以及折扣后的实际 ASP。
