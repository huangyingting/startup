      - number: '3.3'
        title: 耐久性、切换成本和替代风险
        blocks:
          - type: paragraph
            body: >-
              Linear 护城河最好的公开证据，不是自有数据或可见成本优势，而是被主动想离开更重系统的团队采用。Linear 客户页突出 OpenAI 的 3,000 用户，Oscar 故事明确围绕离开复杂 Jira
              体系展开；这说明当 UX、速度和工程契合足够重要时，产品可以替换遗留工具。 安全页也表明，企业信任控制已不再是被考虑的门槛。但这些正面因素并没有形成干净耐久的护城河。Atlassian、GitHub 和
              GitLab 都把规划与更宽生态结合起来，可以降低采购摩擦；Asana、Notion、ClickUp 和 monday 继续把产品和 AI 工作流叙事推进相邻用例。 Plane 则为想要现代问题跟踪、但不想付高端
              SaaS 合同的团队提供开源压力点。实践中，Linear 的位置最强，出现在那些想要聚焦产品开发记录系统、 并愿意把文档、CRM
              或其他运营工作流放在别处的软件组织。它的位置较弱，出现在采购偏好套件整合、买方满足于打包的 GitHub/GitLab 规划，
