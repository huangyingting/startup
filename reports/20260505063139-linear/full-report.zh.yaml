  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户细分和产品服务对象
        blocks:
          - type: paragraph
            body: >-
              Linear 的公开客户证明，在软件原生组织中最强；这些组织的产品、工程和设计都需要共享运营系统。 最宽的公司级说法是 Linear 服务超过 25,000
              家组织，但更有用的证据来自具名故事：OpenAI、Ramp、Remote、Brex、Oscar Health、Mercury、
              Coinbase、Automattic、Opendoor、Retool、Cohere、Pulley 和 Raycast。这些引用覆盖 AI 实验室、金融科技、医疗健康、HR 软件、 开发者工具和房地产科技。


              买方通常是工程、产品或运营负责人；用户是跨职能产品团队；付款方通常是内部软件预算，而不是业务线部门。多个故事也显示 Linear 正在扩展到核心工程之外。Mercury
              在执行、反馈接入和绩效观察上使用它。Pulley 称采用扩散到财务、营销、 人力和客户体验。这个模式重要，因为它暗示当客户标准化 Linear 的工作流模型后，产品可以从「开发者问题跟踪器」 走向更宽的协调系统。
