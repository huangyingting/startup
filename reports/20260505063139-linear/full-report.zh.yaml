      - number: '2.3'
        title: 买方、用户、付款方和采用路径
        blocks:
          - type: paragraph
            body: >-
              买方证据指向产品开发组织，而不是通用 PMO 预算。Remote 的故事围绕一个分布式产品组织展开，它需要更简单的问题跟踪事实源。 Oscar 的迁移表明，即便是高度受监管公司，只要 Jira
              复杂性拖慢执行，也会成为买方。Brex 的故事让预算归属更清晰： 需求不只是让工程师喜欢这个工具，而是让领导层整合散落在 Jira、Monday.com、Atlas 和电子表格里的路线图。 Coinbase 和
              Ramp 加入了新的买方视角：工程领导希望有一个结构化协调层，agents 可以在上面行动，而不只是人类使用。 在这个框架下，经济买方通常是 VP Engineering、Head of Product
              Engineering、CTO office 或产品运营负责人； 日常用户是工程师、产品经理、设计师和相邻运营团队；付款方通常是集中的工程或产品工具预算。采用通常从问题跟踪痛点开始，
              经由聚焦试点或导入迁移，只有当用户足够信任工作流、愿意持续更新它之后才会扩张。
