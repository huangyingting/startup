              NRR，也没有股权结构细节。高质量工作流和开发者软件的公开市场参照，仍集中在低个位数收入倍数， 而不是在 Linear 真实收入接近公开估计时所需的那种倍数。因此反向逻辑并不是 Linear 是一家弱公司；
