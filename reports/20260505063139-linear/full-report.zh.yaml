      - CV003
      - CV008
      - CV009
      - CV024
      - CV025
      - CV026
      - CV033
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 上一轮价格只有在 Linear 真实收入基数远高于现有公开估计时，才更容易守住。
    data:
      items:
        - label: 5x 所需收入
          value: 250
          detail: 要用成熟但仍体面的倍数支撑 $1.25B 估值，需要的年收入（百万美元）。
          tone: negative
        - label: 10x 所需收入
          value: 125
          detail: 强势优质软件倍数下所需收入（百万美元）。
          tone: warning
        - label: 20x 所需收入
          value: 62.5
          detail: 稀缺性溢价仍异常高时所需收入（百万美元）。
          tone: neutral
        - label: 公开收入估计
          value: 18.8
          detail: 低置信度第三方估计，仅用作公开数据锚点。
          tone: negative
    approximationNotes: 这些阈值只是以 June 2025 $1.25B 估值标记为锚的简单估值 / 收入桥，不是 DCF 输出。
    claimRefs:
      - CV007
      - CV024
      - CV030
      - CV031
      - CV032
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 仅看公开证据，区间很宽；除非 Linear 真实收入基数远高于公开估计，否则大多低于上一轮价格。
    data:
      items:
        - label: 悲观情景
          low: 120
          mid: 180
          high: 240
          displayValue: $120M-$240M
          detail: 收入停在 $30M-$40M 附近，公开市场倍数压缩到 4x-6x。
          tone: negative
        - label: 基准情景
          low: 420
          mid: 550
          high: 680
          displayValue: $420M-$680M
          detail: 收入增至大约 $60M-$75M，市场给予 7x-9x。
          tone: warning
        - label: 乐观情景
          low: 1000
          mid: 1220
          high: 1440
          displayValue: $1.0B-$1.44B
          detail: 收入放大至大约 $100M-$120M，Linear 保住 10x-12x 溢价倍数。
          tone: positive
    approximationNotes: 这些区间是为投资委员会纪律设定的情景化收入倍数输出，不是管理层指引。
    claimRefs:
      - CV007
      - CV018
      - CV019
      - CV024
      - CV025
      - CV029
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: Linear 在产品和 PLG 质量上得分高，但证据充分性和当前价格支撑偏弱。
    data:
      items:
        - label: 产品质量
          score: 9
          detail: 公开口碑强，盈利信号和高级套餐包装也正面。
          tone: positive
        - label: 变现上行空间
          score: 7
          detail: AI 工作流和智能体功能带来可信的增购选择权。
          tone: positive
        - label: 市场验证
          score: 7
          detail: 15,000+ 客户和持续融资支撑真实需求。
          tone: positive
        - label: 证据质量
          score: 4
          detail: 关键收入、利润率和股权结构表输入仍未公开。
          tone: warning
        - label: 估值支撑
          score: 2
          detail: 以公开估计看，公开可比公司数据远不足以支撑当前价格。
          tone: negative
        - label: 风险负担
          score: 4
          detail: 执行、AI 成本和倍数压缩风险都重要。
          tone: warning
        - label: 退出准备度
          score: 3
          detail: 公开经济性证据太薄，不能放心把当前估值视为已具备退出准备。
          tone: negative
    approximationNotes: 评分是基于所引公开证据的 0-10 顺序投资判断，不是公司披露的 KPI。
    claimRefs:
