            body: >-
              Linear 的公开运营披露，在客户触达、产品姿态和安全姿态上最强，在财务细节上最弱。公司自有页面反复称超过 25,000 家公司或产品团队使用 Linear；定价页和企业页显示其采用标准 SaaS 模式，并提供
              SAML、SCIM、迁移支持、管理员治理等 Business 和 Enterprise 控制能力。 公司还声称长期盈利：Series B 文章称 Linear 自 2021 年以来一直盈利运营，Forbes
