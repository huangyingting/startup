companyProfile:
  summary: >-
    Linear 是一家私营软件公司，创立于 San Francisco，产品围绕产品规划、问题跟踪，以及越来越多的 agent-native 软件工作流展开。公司把产品打磨和低摩擦工作流结合起来，在高绩效软件团队中做出了很强品牌； 到
    2025-2026 年，Linear 已从传统问题跟踪扩展到自动化、AI 辅助和 coding agent 编排。公开证据支持真实客户深度和高端产品定位， 但财务细节不足，无法高置信度承销上一轮私募价格。
