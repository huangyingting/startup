      - number: '1.2'
        title: 创始人、领导层厚度和关键人依赖
        blocks:
          - type: paragraph
            body: >-
              公开创始人记录异常一致。Linear 的 About 页面、Sequoia 的组合公司页面、Accel 的公司页面和 Contrary 的简介， 都把 Karri Saarinen、Jori
              Lallo、Tuomas Artman 列为创始人，并注明 Saarinen 任 CEO、Lallo 任 CPO、Artman 任 CTO。 Contrary 还提供了最好的综合背景，把三人与
              Airbnb、Coinbase、Uber 的早期职位，以及 Finland 创业生态的共同根源连起来。 更大管理层的公开披露较薄，但 Linear 的 About 页面和 Forbes 都指出 Cristina
              Cordova 担任高级运营职位， 反映公司有意从创始人主导的产品打造转向商业化规模扩张。即便补上了这层管理厚度，公司对三位创始人在产品方向、设计哲学和技术架构上的依赖仍然明显，
              因为关于质量、路线图和工作流的最清晰公开叙事，最终都回到创始人身上。
