      - number: '3.4'
        title: 能力对比与功能分析
        blocks:
          - type: paragraph
            body: >
              Aurora、Torc 和 Kodiak 都瞄准美国公共州际高速公路 Class 8 卡车的 SAE Level 4，因此与 Stack AV 处在同一 ODD 类别。截至 2026 年中，只有 Aurora
              展示了持续无安全驾驶员商业运营。主要长途 AV 竞争者都没有公开可供外部分析师访问、经独立验证的安全里程、脱离接管率或审计安全绩效基准；NHTSA 的 Standing General Order
              要求报告碰撞事件，但不要求基于里程的基准。这种信息不对称意味着，直接性能比较只能依赖里程碑公告和代理信号，而不是经验证指标。

              Stack AV 的差异化定位来自四点：（1）Argo AI 技术继承，包括一个从 Ford 和 Volkswagen 获得约 $3.6 billion 总投资项目的传感器套件和感知栈；（2）由 Bryan
              Salesky（Argo AI CEO）和 Peter Rander（Argo AI COO）领导的创始团队，加上约 40+ 名 Argo AI 校友带来的组织连续性；（3）从创立起就专注货运，没有
              robotaxi 技术债；（4）来自 Sequoia Capital 的 Series A 融资。主要能力尽调缺口在于，Stack AV 尚未发布可与 Aurora 对比的 Safety Case
              Framework 或 VSSA，因此难以独立比较安全架构。

              Torc 的 OEM 集成路径不同于 Stack AV 和 Aurora 的可移植软件栈：Torc 在 Freightliner 硬件内共同开发，带来更紧密集成，但限制了可服务卡车范围。Gatik 和
              Einride 证明今天可以实现商业收入，但它们所在 ODD（固定中程线路；私人工业走廊）比 Stack AV 的开放高速目标简单得多。
