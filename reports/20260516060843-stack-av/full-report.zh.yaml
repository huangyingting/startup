  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Stack AV 竞争的市场是美国商用卡车市场，具体是长途（>250 英里）枢纽到枢纽细分市场；这一市场最适合 SAE Level 4 自动驾驶运营。2024 年，美国卡车运输市场总收入为 $906
              billion，是美国国内货运的主导模式，按重量占全部货运的 72.7%。其中，长途整车细分市场以受控入口州际公路上的配送枢纽间点到点线路为特征，估计占总收入的 35–40%，即约 $300–360
              billion。这就是自动驾驶卡车平台近期可以现实替代的可服务市场。

              市场边界不包括本地和区域配送（最后一英里）、需要复杂交接的零担（LTL）集拼网络，以及需要人工判断的特种货物（危险品、平板车、装载复杂的温控货物）。车队管理软件、运输管理系统（TMS）和相邻物流 SaaS
              也不属于直接收入机会，它们更多是 Stack AV 的集成界面。

              主要现状替代方案是由个体车主或雇佣司机驾驶的 Class 8 卡车。美国约有 2.235 million 名重型卡车司机就业，年薪中位数为 $57,440；这代表约 $128 billion
              年度司机劳动力成本，自动驾驶系统可能部分替代。SAE J3016 Level 4 自动化定义了 Stack AV 系统必须在其中无需人工介入运行的 operational design
              domain（ODD），因此初始部署只能落在定义清晰、天气韧性强、货运量大的走廊。
