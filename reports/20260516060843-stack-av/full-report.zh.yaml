      - number: '8.4'
        title: 图表
        blocks:
          - type: callout
            title: TRACK 建议：期权价值锚定 FMCSA 豁免
            body: >
              Stack AV 的投资逻辑是单一催化剂驱动的二元期权：FMCSA 无人驾驶豁免打开商业化；缺失豁免则使业务在规模上无法合法运营。Aurora 2025 年 4 月商业发布和 McLane 协议证明，企业级 AV
              卡车买方存在，且愿意为无人驾驶服务付费。Stack AV 的 Argo AI 背景与 Tier-1 VC 支持提供技术和资本可信度。但在没有 FMCSA 申请、首个客户或审计财务的公开证据前，当前
              $500M–$1B 的隐含估值无法独立证实。建议姿态是主动监控，并设置清晰尽调清单：FMCSA 申请确认、首份签署 LOI、财务报表。如果这些事项到 2027 年中前正向解决，$1.5B–$3B
              的基准估值区间支持启动持仓。[CV001] [CV002] [CV005] [CV028]
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
              - CV005
              - CV028
          - type: callout
            title: TuSimple 先例：Series B 估值要求无人驾驶证据
            body: >
              TuSimple 的轨迹——2021 年 4 月 $1.1B IPO、峰值 $8.5B、2024 年 1 月以 $0.30/股自愿退市——是最清楚的数据点，说明 AV
              卡车公司无法把资本转化为商业运营后会发生什么。Stack AV 在 Series B 阶段与 TuSimple 有三项结构性相似：收入前、无人驾驶前，以及深度依赖监管。差别在于，Stack AV 继承了 Argo
              AI 更强的 IP，并拥有 Sequoia 与 SoftBank 的信心，而非 TuSimple 的企业合作伙伴。即便如此，TuSimple 的失败提高了 AV
              卡车商业化前投资应采用的折现率，也要求资本投入前设置更高的尽调门槛。Goldman Sachs 对 Aurora 维持 $5 Hold 目标价（较 2026 年 5 月价格下行
              35%），说明在大型卖方机构眼中，即便已商业发布的 AV 卡车龙头也有显著执行风险。[CV021] [CV020] [CV030]
            calloutType: insight
            claimRefs:
              - CV020
              - CV021
              - CV030
