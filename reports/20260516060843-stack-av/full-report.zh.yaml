      - number: '8.3'
        title: 投资 KPI、尽调问题与打穿投资逻辑的触发器
        blocks:
          - type: paragraph
            body: >
              Stack AV 的投资案例需要按顺序达成四个里程碑，才能验证 2028 年 $1.5B–$3B 的基准估值：（1）确认 FMCSA 无人驾驶豁免，否则任何商业部署都没有法律授权；（2）至少部署 100
              辆卡车并产生 AaaS 收入；（3）至少签署一份具名承运商的商业 AaaS 合同；（4）证明运营成本低于 $3/英里，这是与人类司机运营竞争的成本门槛。Aurora 公开提出的
              sub-$2/英里目标设定了商业基准。截至 2026 年 5 月，Stack AV 尚未公开确认任何上述里程碑。[CV028] [CV037] [CV038] [CV041]

              到商业发布前的资本需求估计为 $500M–$1B，假设 Stack AV 从 2026 年起为商业就绪扩张，年 burn rate 为 $150–200M。约 $150M 的 Series B 在交割后（2024
              年 8 月）大致提供 12–18 个月 runway，意味着最迟到 2026 年 Q1–Q2 需要 Series C。如果到 2026 年 5 月仍未披露 Series C，要么实际 burn
              低于估计，要么公司在考虑内部融资。公司完全没有公开财务披露，使这项 runway 分析带有推测性。[CV029] [CV031] [CV032]

              Aurora、TuSimple、Luminar 等 SPAC 上市 AV 公司，在上市后 24 个月内股价都下跌超过 80%，为 Stack AV 未来任何流动性事件勾勒了风险轮廓。以 $500M–$1B 的
              Series B 隐含入场估值计算，投资人要获得 5–10x 回报，需要 $5B–$10B 退出；只有在牛市情景下达到 1,000+ 辆卡车和 $300M+ AaaS 收入才可能实现，而这一水平超过了截至
              2026 年中 Aurora 已商业达成的规模。[CV030] [CV033] [CV034]

              有组织劳工风险（Teamsters、OOIDA）、2027+ 车型年份卡车的 EPA Clean Trucks Plan 合规要求，以及司机短缺这把双刃剑（支撑 AV
              需求，也强化劳工反对），都给商业化时间线增加复杂度。美国卡车司机缺口超过 80,000，形成自动化的结构性需求；但有组织反对可能在联邦 FMCSA 框架建立后，继续拉长州层面监管时间线。[CV035]
              [CV036] [CV039] [CV040] [CV042]
