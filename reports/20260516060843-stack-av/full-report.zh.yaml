      - number: '6.2'
        title: 采用轨迹
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车的宏观采用轨迹正由 Aurora Innovation 建立；截至 2026 年中，Aurora 是该行业唯一的商业无人驾驶运营商。Aurora 于 2025 年 4 月下旬在
              Dallas–Houston 走廊商业化推出无人驾驶货运，Werner Enterprises 和 Uber Freight 是锚定合作伙伴，代表美国首次在商业规模下产生收入、无司机在场的自动驾驶货运。Stack
              AV 的商业化前开发轨迹将以这一里程碑为参照。[CU010] [CU011]

              按 Mordor Intelligence 估计，全球自动驾驶卡车市场 2026 年为 $42.63B，并以 11.73% CAGR 增长至 2031 年的 $74.23B。McKinsey
              估计，自动驾驶卡车在完全部署规模下可将长途每英里成本降低 30–45%——这是技术风险可接受后，承运商采用在经济上成立的根本价值主张。[CU009] [CU013]

              Stack AV 的采用信号是间接的。截至 2026 年 Q2，五条走廊的活跃 CDL-A 招聘证明测试在扩张；FreightWaves（2025）CTO
              访谈描述的是聚焦工程里程碑的技术开发路线图，而不是客户获取，这符合商业化前姿态。FMCSA 尚未发布商业自动驾驶卡车运营的具体认证框架，意味着监管放行时间仍是任何承运商采购决策的主要门槛。反过来，GAO
              认为自动驾驶车辆采用需要解决责任、保险和联邦标准缺口，这也说明 Stack AV 的首批商业客户必须在技术接受之外，同时进行定制化监管沟通。[CU012] [CU015] [CU016]

              JB Hunt（美国最大整车运输承运商之一，每天运营数万票货运）截至 2026 年中尚未宣布任何 AV 卡车合作，这代表 Aurora 初始伙伴集之外，大型承运商行业采用仍存在重要缺口。[CU014]
