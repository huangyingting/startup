      - number: '6.5'
        title: 扩张与集中风险
        blocks:
          - type: paragraph
            body: >
              Stack AV 横跨五条走廊（Denver–Atlanta、Phoenix、Dallas、Miami）的测试项目，暗示其扩张模式会先集中在南部和西南部，再走向全国，类似 Aurora 优先 Texas
              的战略。如果 Stack AV 复制 Aurora 的锚定租户模式，近期客户基础可能只有 2–3 家承运商、1–2 条走廊，这会造成严重收入集中风险：任何单一承运商暂停或延迟，都将不成比例地影响 Stack AV
              的商业爬坡。[CU031] [CU032]

              州级 AV 法律拼图进一步强化了地理集中。全国扩张需要按走廊逐一取得州级监管放行；友好州（Texas、Arizona、Florida）会率先部署，其他州则需要额外立法铺垫。这把早期客户获取限制在 AV
              友好司法辖区拥有线路货量的承运商中，压缩了发布后前 2–3 年的可触达客户基础。[CU033] [CU036]

              OEM 集成依赖代表供给侧渠道集中：Stack AV 在承运商规模部署前必须与 PACCAR、Volvo 或 Daimler Truck 签下集成协议，使少数 OEM 伙伴拥有结构性议价能力。Uber
              Freight 为 Aurora 扮演货运匹配中介，建立了一个可能适用于 Stack AV 的 3PL 渠道依赖模式：单一 3PL 中介控制 AV 运力订舱入口，就能影响承运商定价和货量。[CU034]
              [CU035]

              竞争格局（Aurora、Torc、Kodiak、Plus.ai、Einride）让大型承运商在商业规模下拥有多个 AV 卡车供应商选择，这会削弱 Stack AV
              定价权，并提高合同续约时的潜在流失风险。Stack AV 的 Series A 现金跑道支持其走到商业发布，但没有披露时间表或客户承诺，首笔收入时间仍是关键未解变量。[CU037] [CU038]
