      - number: '1.3'
        title: 技术平台
        blocks:
          - type: paragraph
            body: >
              Stack AV 的自动驾驶卡车系统以三项专有技术组件为中心。StackOS 是公司专为自动驾驶车辆打造的操作系统，为传感器处理、感知、预测和规划模块提供实时执行环境。Clockwork
              是中间件层，负责管理这些模块之间对时序敏感的编排，确保系统在高速公路驾驶条件下表现确定。Deploy Manager 是面向车队规模的软件部署基础设施，支持运营卡车车队的 OTA 更新和版本管理。

              技术团队按功能性 AI/ML 领域组织：Perception（目标检测、传感器融合）、Tracking（目标状态估计与预测）、Trajectory and Controls（运动规划与车辆控制）。这些团队在 PA
              匹兹堡工作，并有运营人员分布在 PA New Stanton，以及另外六个州的测试市场。Stack AV 采用 24/7 mission control 模式，由夜间 Mission Control
              Specialist 远程监督自动驾驶运营。

              Stack AV 的目标是 SAE Level 4 自动驾驶，即在 Operational Design Domain（ODD）内不需要人类驾驶员的自动驾驶。按照 SAE J3016 分类，Level 4
              系统必须在 ODD 内处理所有驾驶任务和紧急情况，无需驾驶员介入。Stack AV 的 ODD 是配送枢纽之间的高速公路长途线路。公司已发布 Voluntary Safety
              Self-Assessment（VSSA）报告，遵循包括 National Highway Traffic Safety Administration 在内的机构确立的行业最佳实践透明度规范。
