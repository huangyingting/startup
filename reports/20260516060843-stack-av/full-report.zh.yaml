      - number: '2.4'
        title: 增长驱动因素与市场约束
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车最持久的增长驱动因素是结构性司机短缺。American Trucking Associations 已连续多年把司机供给列为行业头号关切之一；ATA
              新闻稿记录了尽管工资上涨，承运商仍难以吸引和留住合格 CDL 持有人。FMCSA 工时规定把货运司机限制在 14 小时工作窗口内最多驾驶 11 小时，连续驾驶 8 小时后必须休息 30 分钟，并设有每周
              60/70 小时上限。自动驾驶卡车一旦在 ODD 内连续运行，就能消除这些生产率天花板，理论上相比人类驾驶的等价线路带来 50–100% 的吞吐优势。

              EPA Phase 3 GHG 标准通过 2024 年 Federal Register 规则制定最终确定，要求从 2032 车型年开始，Class 8 重型车新车销售中 40% 必须为零排放。这会推动 AV
              采用与电动化汇合：自动驾驶系统更适合管理电动重卡的续航优化线路，可能加速 OEM 和投资 ZE 基础设施的车队采用 AV 平台。货运量增长是长期顺风；FHWA Freight Analysis Framework
              预计美国货运到 2050 年仍将持续增长，主要州际走廊预计维持货量增长。

              约束包括监管碎片化（Level 4 卡车没有统一联邦框架）、保险责任标准尚不成熟、传感器硬件成本高（2025 年价格约
              $50K/车），以及公众信任风险。一次高调安全事故就可能拖慢多个州的监管时间线，乘用车自动驾驶领域此前事故引发的监管连锁反应已经证明了这一点。
