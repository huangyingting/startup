      - number: '6.4'
        title: 留存与耐久性
        blocks:
          - type: paragraph
            body: >
              由于 Stack AV 尚未进入商业运营，无法确定 NRR、GRR、流失、续约、队列或满意度数据。截至 2026 年中，Aurora
              的商业项目也不足一年，其承运商合同条款——包括每英里定价、合同期限、排他性和续约结构——尚未公开披露。因此，留存分析只能依赖 AV 卡车落地后的经济性和切换成本做结构性推断。[CU025] [CU026]

              AV 卡车的结构性留存耐久性预计高于软件 SaaS
              基准，因为采用需要在自有或租赁卡车上安装硬件、完成场站级集成、重新培训司机，并重配调度系统。这些不是合同锁定，而是集成成本；即使没有长期合同，理性上也会抑制切换。类比 ERP 采用：一旦承运商围绕 AV
              系统重新设计运营，多数情景下切换成本都会超过增量合同节省。[CU027]

              两个结构性因素会降低拥有工会化劳动力承运商的预期留存。第一，Teamsters 民调显示，83% 的 Pennsylvania 选民对无人驾驶半挂卡车感到不安；任何签有 Teamsters
              合同的承运商都会面临内部反对，可能把 AV 系统采用限制在非工会走廊。第二，OOIDA 的 150,000+ 个体车主运营商成员反对缺少人类安全操作员要求的 AV
              立法，表明独立卡车运输群体在可预见未来会抵制无人驾驶运营。两股力量叠加，会结构性压缩 Stack AV 未来商业项目可锁定的大型承运商买方基础。[CU028] [CU029]

              长期合同耐久性取决于正常运行时间 / 可靠性保证、保险承运人接受度和 FMCSA 合规认证——截至 2026 年中，Stack AV 尚未定义其中任何一项。[CU030]
