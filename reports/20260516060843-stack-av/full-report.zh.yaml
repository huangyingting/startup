      - number: '6.3'
        title: 具名客户证明
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，Stack AV 自身没有任何具名客户证明。因此，本章的具名客户证据完全来自 Aurora Innovation 的商业项目；它是行业基准，定义了生产规模下 AV
              卡车客户关系应是什么样。Aurora 的投资者关系披露和货运页面列出了 Werner Enterprises、FedEx、Hirschbach Motor Lines、Schneider
              National、Uber Freight、Ryder、PACCAR、Toyota、Volvo Trucks 和 Volvo Autonomous Solutions 等合作伙伴。[CU017]

              Werner Enterprises 是最高曝光度的生产参考客户，属于美国前 10 大整车运输承运商。Werner CDO Rhonda Robb 公开背书该项目，且承运商将与 Aurora
              的试点项目扩大三倍，延伸到 Fort Worth–Phoenix 走廊——这是行业内最强的具名客户背书。Uber Freight 在 Dallas–Houston 无人驾驶线路上担任订舱中介，是大型 3PL
              首次进行商业自动驾驶货运经纪。Hirschbach VP Rachel Carr 提供具名证言，提到司机生活质量收益。FedEx 在 Aurora IR 材料中既是投资人也是合作伙伴。[CU018]
              [CU019] [CU020] [CU022]

              Stack AV 没有同等关系。FreightWaves CTO 访谈（2025）确认的是技术优先路线图；没有提到客户承诺。具名客户证明缺失，对 Stack AV 现阶段的商业化前 AV
              公司而言并不异常，但这意味着本章所有客户证明主张都在描述 Stack AV 必须复制什么，而不是它已经取得什么。尽调应追踪任何未披露 LOI 或可能在公开视野之外发生的承运商引荐。[CU021] [CU023]
              [CU024]
