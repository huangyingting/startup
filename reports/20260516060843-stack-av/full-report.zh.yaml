      - 改变观点的条件
    rows:
      - - 投资逻辑
        - 大型结构性 TAM：美国 Class 8 卡车运输年规模超过 $900B，80,000+ 名司机缺口推动 AV 渗透，这是结构性而非周期性顺风。
        - Mordor Intelligence：AV 卡车市场从 2026 年 $42.63B 增至 2031 年 $74.23B（CAGR 11.73%）。BLS 的卡车司机短缺数据支持需求侧逻辑。
        - 到 2032 年，监管障碍或技术表现不及预期使 AV 渗透率低于 5%。
      - - 投资逻辑
        - 一线 VC 信念：Sequoia Capital（Series A，$81M）和 SoftBank Vision Fund 2（Series B，约 $150M）表明其认可创始团队质量和市场逻辑。
        - >-
          PitchBook 融资数据；FreightWaves 对 Bryan Salesky 的问答确认，Sequoia 领投 $81M Series A（2024 年 1 月），SoftBank VF2 领投约 $150M
          Series B（2024 年 8 月）。
        - SoftBank 不领投也不参与 Series C，意味着信念流失。
      - - 投资逻辑
        - Argo AI 技术血统：Stack AV 创始团队由 Argo AI 的 CEO、CTO 和 President 组成，继承了来自 $3.6B 项目的深科技 AV 经验、安全系统和潜在 IP。
        - FreightWaves 对 Bryan Salesky 的问答；Aurora FY2025 10-K 将 Stack AV 列为竞争对手，验证了创始团队的行业合法性。
        - 独立 IP 审计显示，从 Argo AI 转入且可防御的 IP 有限，将显著削弱技术先发优势。
      - - 反向逻辑
        - >-
          Aurora 拥有 18+ 个月商业领先：2025 年 4 月开通无人驾驶路线，拥有 7 个付费客户，并在 2026 年 5 月签下 McLane（Berkshire Hathaway），另有 Hirschbach
          500 辆卡车 MOU。
        - Aurora FY2025 10-K；Aurora 2026 年 Q1 新闻稿（BusinessWire，2026 年 5 月）；TechCrunch 2026 年 5 月对 McLane 交易的报道。
        - Stack AV 在 12 个月内宣布首条商业无人驾驶路线，并具名承运客户。
      - - 反向逻辑
        - TuSimple 失败是具体警示先例：36 个月内从 $8.5B 峰值估值跌到以 $0.30/股退市，治理、延迟报告和监管均失守。
        - FreightWaves：TuSimple 2024 年 1 月自愿从 Nasdaq 退市；KPMG 辞任审计师；SEC 文件逾期。
        - 监管框架成熟，且 24 个月内没有 AV 卡车运输失败案例重演。
      - - 反向逻辑
        - 财务和运营完全不透明：无收入、无客户、无经审计财务报表、未披露 FMCSA 申请——对投资尽调而言几乎是黑箱。
        - Stack AV 网站；PitchBook；无 SEC 文件（私人公司）；Aurora 10-K 将 Stack AV 列为竞争对手，但未提供 Stack AV 财务信息。
        - 尽调资料室披露经审计财务报表和具名客户签署的 LOI。
