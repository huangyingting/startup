  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Stack AV 的产品是面向 Class 8 长途货运卡车的自动驾驶系统，目标是在起点和终点物流枢纽之间的指定高速走廊上替代人类司机。公司专门瞄准 hub-to-hub
              场景，因为州际高速驾驶的车道几何更可预测，行人交互有限，边缘案例密度也低于城市环境——这些条件让 SAE Level 4 自动驾驶在当下传感器和计算技术下更容易落地。[CE001] [CE006]

              在客户工作流中，承运商或托运人在起点场站把货运任务分配给一辆搭载 Stack AV 的卡车。运营专员——持 CDL-A 执照的安全驾驶员——完成行前检查并监督出发。车辆进入高速后，StackOS
              在整个高速路段管理自动驾驶运行。Mission Control 提供实时远程监控。到达终点场站后，运营专员监督抵达和行后流程。[CE022] [CE033]

              这一 hub-to-hub 模式直接切中长途卡车运输的两大结构性痛点：司机短缺（ATA 预测估计缺口 60,000 人，到 2030 年可能达到 160,000 人）和工时约束（人类司机每班最多 11
              小时）。在定义清晰的 ODD 内运行的自动驾驶系统原则上可以连续运行 24 小时，大幅提升资产利用率。[CE035] [CE006]

              截至 2026 年 Q1，Stack AV 正在至少五条州际走廊上进行有运营专员随车的主动高速测试：Denver-to-Atlanta（CO/GA）、Phoenix（AZ）、Dallas（TX）和
              Miami（FL）路线都有活跃 CDL-A 招聘信息作为证据。公司尚未宣布商业化无人驾驶发布时间表。[CE022] [CE031]
            claimRefs:
              - CE001
              - CE006
