        title: 图表与附录
        blocks:
          - type: callout
            title: 工会和个体车主运营商反对压缩大型承运商买方基础
            body: >
              Teamsters 民调（83% 的 Pennsylvania 选民对无人驾驶半挂卡车感到不安）和 OOIDA 对缺少人类安全操作员要求的无人驾驶 AV
              立法的有组织反对，并不是边缘信号——它们代表了拥有立法关系、资源充足的结构化倡议力量。任何签有 Teamsters 合同的 Stack AV
              目标承运商都会面临内部反对，进而把近期可触达市场结构性缩小到非工会承运商，或能够取得工会豁免的承运商群体。尽调必须梳理 Stack AV 潜在承运商伙伴的工会化比例。
            calloutType: risk
            claimRefs:
              - CU028
              - CU029
          - type: callout
            title: 具名客户证明缺口符合阶段，但需要主动尽调缓释
            body: >
              截至 2026 年中，Stack AV 零具名客户证明与其商业化前开发阶段一致——Aurora 自身也是进入商业测试阶段相当一段时间后才宣布具名承运商合作。然而，这一缺口是尽调风险，不是验证点：缺少已披露
              LOI、承运商引荐或试点协议，意味着分析无法确认商业客户获取已经开始。投资人应通过行业网络做承运商参考访谈，并要求管理层提供任何未披露的意向书，作为尽调条件。
            calloutType: insight
