      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Stack AV 的技术栈围绕三层自研软件组织，这三层位于硬件平台之上、运营支持工具链之下。StackOS
              是专为自动驾驶车辆打造的操作系统，为传感器处理、感知、预测和运动规划提供实时执行环境。不同于通用操作系统，StackOS 面向安全关键型 AV 应用的严格延迟、确定性和功能安全要求设计。[CE002]
              [CE003]

              Clockwork 是中间件层，负责 StackOS 模块之间对时序敏感的编排。确定性中间件对自动驾驶系统架构至关重要：如果感知模块晚 50
              毫秒交付检测更新，规划模块就可能基于过期世界状态生成轨迹——这种失效模式会级联到安全关键的车辆执行。Clockwork 通过确定性任务调度、模块间消息代理和时序看门狗来解决这一问题。[CE004] [CE014]

              Deploy Manager 处理车队规模的软件分发和 OTA 更新，使 Stack AV 无需逐车人工干预，就能向整个测试车队推送感知模型更新、规划算法变更和安全补丁。这是区分开发阶段 AV 与商业阶段 AV
              的关键规模化基础设施之一：ML 栈的持续改进需要一个安全、可靠、可审计的更新交付系统。[CE005] [CE037]

              传感器套件由多模态输入组成：长距 LiDAR 生成 3D 点云并测距，多通道雷达估计速度并增强恶劣天气鲁棒性，多光谱摄像头检测车道线和交通信号，GNSS/IMU 提供绝对定位。这些输入进入 StackOS
              的感知模块，由其进行传感器融合并生成统一世界模型。高性能边缘计算硬件——与 NVIDIA DRIVE AGX 或同等级车规 GPU 平台一致——为感知和预测的神经网络推理加速。[CE007] [CE008]
              [CE009] [CE013]

              该架构符合研究文献广泛记录的端到端 AV 栈范式：原始传感器输入被处理成世界模型，世界模型供动态物体轨迹预测使用，预测结果再进入运动规划器生成车辆轨迹，最后低层车辆控制器通过卡车底盘 CAN
              总线接口执行。Baidu 的 Apollo 开源平台和 Torc Robotics 的 SEE-THINK-ACT 框架，是这种方法的公开参考架构。[CE010] [CE011] [CE015]
