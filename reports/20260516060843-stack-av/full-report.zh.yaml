        - 说明投资人信心崩塌；现有入场价格被下调；稀释加速；意味着里程碑未按预期时间线完成。
        - 高
        - 若退出价格意味着 Series B 入场回报 <2x，则卖出；只有出现新的 FMCSA 进展证据时才持有。
      - - Bryan Salesky（CEO）或 Brett Browning（CTO）离职
        - CEO 或 CTO 宣布离开或辞去 Stack AV 职务
        - Argo AI IP 链条和技术路线图面临风险；关键人风险兑现；投资人信心和 Sequoia / SoftBank 信念动摇。
        - 中
        - 触发全面尽调复核；在确认接班前暂停任何追加资本承诺。
  - id: TV006
    slug: final-diligence-asks-table
    title: 最终尽调要求
    notes: 投资承诺前必须完成全部六项尽调。第 1–3 项是阻断项：没有 FMCSA 豁免状态、财务报表和客户合同，任何基准情景都无法验证。第 4–6 项属于重大事项。
    claimRefs:
      - CV031
      - CV032
      - CV036
      - CV037
      - CV042
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人
      - 尽调路径
    rows:
      - - FMCSA 无人驾驶豁免申请
        - 未见 Stack AV 与 FMCSA 的公开文件、豁免申请或监管通信确认任何豁免策略或时间线。
        - 没有联邦豁免，无论技术准备度如何，所有商业无人驾驶计划在法律上都会被堵住；这是最关键的单项尽调。
        - Stack AV 管理层和监管律师
        - 索取已提交的任何 FMCSA 豁免申请或询问信；确认内部监管时间线估计，以及是否已与 FMCSA 讨论 AV 专用 CDL 豁免。
      - - 经审计财务报表和现金跑道
        - 公开渠道没有经审计 P&L、资产负债表、烧钱速度或持续经营评估。Series B 于 2024 年 8 月完成，但此后没有财务披露。
        - 无法判断 Stack AV 是否会在需要追加资本前达到下一个商业或技术里程碑；现金跑道不确定是主要持续经营风险。
        - Stack AV CFO
        - 要求经审计或审阅的财务报表；18 个月现金流预测；由 CFO 确认当前现金余额和月度烧钱速度。
      - - 已签收入合同或意向书
        - 截至 2026 年 5 月，未披露客户、已签路线或 AaaS 合同意向书。
        - 商业准备度无法验证；没有客户证据，所有收入时间线主张都缺乏依据；AV 卡车运输的企业买家已经被证明存在（Aurora / McLane）。
        - Stack AV 商务拓展和销售
        - 索取已签署 LOI 或有约束力合同；确认客户身份、合同条款、路线地理、定价和任何排他条款。
      - - Argo AI IP 转让文件
        - 没有公开文件确认 Argo AI 专利、商业秘密、训练数据和软件 IP 已转让给 Stack AV；Brett Browning 是活跃 Argo AI LLC 专利的署名发明人。
        - 未转让的 Argo AI IP 可能被 Ford、Volkswagen 或 Argo AI 债权人主张，进而阻断商业运营或要求支付许可费。
        - 外部独立 IP 律师
        - 委托独立 IP 转让审计；审查所有创始工程师的雇佣合同；与 Ford 和 Volkswagen 律师确认 Argo AI LLC 清算时的 IP 处置。
      - - 股权结构表和优先权结构
        - Series A 或 Series B 轮未公开披露股权结构表、清算优先权条款、反稀释条款、认股权证或棘轮条款。
        - 不知道优先权悬置和稀释堆叠，就无法计算真实投资人回报；若清算金额低于全部优先权，普通股退出回款可能接近零。
        - Stack AV 总法律顾问
        - 索取截至 Series B 完成时的股本结构表，完整包含所有优先权条款、转换比例、认股权证和棘轮条款。
      - - ADS 独立技术评估
        - Stack AV 尚未披露任何第三方对其 ADS 传感器套件性能、安全论证、ODD 边界或系统架构的公开验证。
        - 相比 Aurora 和 Kodiak 的竞争护城河说法无法独立核验；没有外部评估，技术风险和差异化都无法量化。
        - 独立 AV 工程公司
        - 委托独立技术评估，覆盖 ADS 架构、传感器套件性能边界、ODD 边界、安全论证完整性和软件验证证据。
figures:
  - id: FO001
    title: Stack AV 公司里程碑时间线
    type: timeline
    layout: wide
    summary: 从 Argo AI 关闭，到 Stack AV 创立、走出隐身期，以及据报道完成 Series B 的关键事件。
    data:
      items:
        - date: 2022-10
          label: Argo AI 关闭
          detail: Ford 和 Volkswagen 撤回资金；Argo AI 在融资超过 $2.6B、峰值估值 $12.4B 后关闭。
          tone: adverse
          claimRefs:
            - CO041
            - CO042
        - date: 2022-11
          label: Stack AV 创立（隐身）
          detail: Salesky、Rander 和 Browning 在隐身状态下创办 Stack AV；StackOS 和 Clockwork 开始研发。
          tone: neutral
          claimRefs:
            - CO009
            - CO010
            - CO011
        - date: '2023-09-07'
          label: 走出隐身期 + SoftBank 公告
          detail: Stack AV 公开亮相；SoftBank Vision Fund 2 的支持披露；据报道承诺资金超过 $1B。
          tone: positive
          claimRefs:
            - CO031
            - CO032
        - date: '2023-09-22'
          label: CEO FreightWaves 访谈
          detail: Bryan Salesky 首次接受详细访谈；谈到 Class 8 聚焦、承认 AV 尚未规模化，以及资本效率逻辑。
          tone: neutral
          claimRefs:
            - CO043
        - date: 2024-08
          label: $150M Series B（据报道）
          detail: Stack AV 据报道完成 $150M Series B，由 SoftBank Vision Fund 2 领投；细节未获验证。
          tone: positive
          claimRefs:
            - CO033
        - date: '2024'
          label: 多州测试运营
          detail: 测试扩展至 CO、GA、AZ、TX、FL；24/7 Mission Control 运营证实公司处于商业化前规模。
          tone: neutral
          claimRefs:
            - CO036
            - CO037
        - date: 2024-2025
