  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，自动驾驶卡车竞争格局由技术进展、资本出清和战略退出共同塑造，活跃长途玩家从 2021 年的十余家收缩到约五家可信竞争者。Aurora Innovation 在 2025 年 5 月 1
              日实现行业首个商业里程碑——Level 4 无人驾驶卡车——为商业经济性建立了第一批真实世界证据。Torc Robotics 背靠 Daimler Truck AG
              的资产负债表和分销网络，是资本安全性最高的竞争者，但商业化运营推进最慢。Kodiak Robotics 通过军方合同多元化形成差异化，在商业货运市场之外取得收入和测试里程。Plus AI 以 ADAS
              优先模式竞争，在迈向完整 Level 4 的同时产生当前订阅收入。

              两个相邻竞争者 Gatik AI 和 Einride 处在结构不同的细分市场。Gatik 已在固定中程线路（15–80 英里）证明商业无人驾驶运营，与 Stack AV 的开放高速长途目标不重叠。Einride
              在 US DOT 豁免下，为私人 / 专用货运走廊打包电动自动驾驶服务，按英里计费，服务有零排放要求而非追求最大线路覆盖的客户。两者今天都不是 Stack AV
              长途业务的直接威胁，但都证明了商业无人货运经济性可以在更窄 ODD 中跑通。

              三次重大退出重塑了格局。Embark Trucks 曾通过 SPAC 募集约 $614 million，在未能达到商业里程碑且缺少后续资本后，于 2023 年 2 月关闭。TuSimple/Hydron 在
              SEC 因涉嫌未披露与中国关联 Hydron Inc. 数据共享而执法之后，到 2023 年基本退出美国市场。Waymo Via 原本凭借 Alphabet 资产负债表会是财务上最强大的竞争者，但在
              2023–2024 年逐步关闭商业卡车开发，转向聚焦 Waymo One 乘用车网约车。现状替代方案仍是人类 CDL 司机，约 2.24 million
              名持证重型卡车驾驶员在所有线路上提供完全可扩展的既有劳动力。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP027
      - number: '3.2'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              Aurora Innovation 是 Stack AV 最领先的直接竞争者。Aurora 由 Chris Urmson（前 Waymo CTO）、Sterling Anderson（前 Tesla
              Autopilot VP）和 Drew Bagnell（前 Uber ATG 负责人）于 2017 年创立，把 robotaxi 与货运经验整合到单一技术平台。公司 2021 年 10 月通过与 Reinvent
              Technology Partners Y 的 SPAC 合并上市（Nasdaq: AUR），累计股权融资约 $3.5 billion 或更多。Aurora 的商业服务于 2025 年 5 月 1 日在
              Dallas–Houston–El Paso 走廊上线，使用 Peterbilt 579 卡车，合作伙伴包括 Werner Enterprises、Uber Freight 和 FedEx。Aurora
              Driver 平台包括已发布的 Voluntary Safety Self-Assessment（VSSA）和专有 Safety Case Framework（SCF）。公司的主要弱点是财务：约 $600
              million 年运营亏损，以及 10-K 文件中的 going-concern 披露，体现出对持续资本市场访问的依赖。

              Torc Robotics 提供一种结构不同的模式。约自 2022 年起，Torc 由 Daimler Truck AG 全资拥有，受益于 OEM 资本托底，并可接入 Freightliner 在 North
              America 的 2,400 个经销商网点。其 Level 4 栈在 Freightliner Cascadia 卡车平台内共同开发，可实现紧密软硬件整合，但也把可服务车队限制在 Freightliner
              品牌车辆内。自 2019 年收购以来，Daimler 支持的开发已超过六年；截至 2026 年中，Torc 仍未宣布商业服务上线日期。

              Kodiak Robotics 由 Don Burnette 及来自 Google/Waymo、Uber ATG 和 Cruise 的同事于 2018 年创立，是资本效率最高的独立竞争者。Kodiak 已融资超过
              $250 million，与 Werner Enterprises 和 Prime Inc. 保持货运合作，并获得总额超过 $140 million
              的美国陆军自动驾驶物流合同。这些军方订单提供非商业收入和真实世界自动驾驶里程，让 Kodiak 在货运市场下行时更有缓冲。截至 2026 年中，Kodiak 尚未宣布公共道路商业无人货运运营。

              Plus AI 通过 SuperDrive Level 2+ 产品走 ADAS 优先商业策略；该产品在中国和美国市场的 Peterbilt 579 与 PACCAR 卡车上通过硬件套件产生经常性收入。Plus
              AI 与 PACCAR 和 FAW Group 的 OEM 合作形成从改装到 OEM 的过渡路径，但其对 Stack AV 的近期竞争威胁是间接的：Plus 用一个风险更低、已产生收入的 ADAS
              产品争夺承运商技术预算，可能推迟承运商对纯 Level 4 供应商的承诺。
