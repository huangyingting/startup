chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与战略
        blocks:
          - type: paragraph
            body: >
              Stack AV Co 是一家自动驾驶卡车初创公司，总部位于宾夕法尼亚州匹兹堡，并在 PA 的 New Stanton 设有第二运营设施。公司的核心任务是把 SAE Level 4 自动驾驶技术商业化，落到
              Class 8 长途货运卡车上——也就是承载美国州际走廊大部分货物的 53
              英尺半挂车。它的产品是一套完整自动驾驶系统，在特定高速公路条件下不需要人类驾驶员，目标市场是枢纽到枢纽的长途货运；这类线路更可预测，也最适合 Level 4 落地。

              2023 年 9 月 7 日，Stack AV 在 SoftBank Vision Fund 2 作为主要投资方支持下结束隐身。公司由 Argo AI 老兵创立。Argo AI 曾是 Ford 和
              Volkswagen 共同推进的自动驾驶项目，估值一度达到 $12.4 billion；2022 年 10 月，两家车企撤资后项目关闭。Stack AV 的战略围绕 Argo AI
              的教训展开：产品范围更窄（只做长途卡车，不做 robotaxi 或最后一英里）、资本纪律更严，并把安全优先的开发方法建立在正式 Safety Advisory Council 之上，成员包括前联邦机构负责人。

              公司的技术栈围绕三个核心组件搭建：StackOS，一套专为自动驾驶车辆设计的操作系统；Clockwork，负责编排对时序敏感 AV 功能的中间件层；Deploy
              Manager，服务车队规模软件部署的基础设施工具链。这些专有组件体现了创始团队的判断：自动驾驶卡车需要在 AI/ML 栈、实时系统层和实体硬件平台之间做紧密垂直整合。
