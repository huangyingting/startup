      - number: '1.6'
        title: 里程碑历史与不利背景
        blocks:
          - type: paragraph
            body: >
              Stack AV 的创立故事离不开 Argo AI 在 2022 年 10 月的崩塌；这是自动驾驶汽车领域最显眼的资本坍塌之一。Argo AI 从 Ford 和 Volkswagen 获得超过 $2.6
              billion 融资，估值一度达到 $12.4 billion，最终在两家车企撤资后关闭，撤资理由是实现商业规模所需的时间和资本。Stack AV 结束隐身后，Bryan Salesky 在
              FreightWaves 访谈中明确承认这段历史，并指出自动驾驶卡车领域「no one's actually scaled anything yet」。

              在这一背景下，Stack AV 的里程碑从 Argo AI 关闭延伸到公司创立、隐身运营、2023 年 9 月公开亮相，以及已报道的 2024 年 8 月 Series
              B。公司在地理扩张、安全治理和监管透明度（通过 VSSA 发布）上取得了可衡量进展，但尚未披露任何商业货运收入或具名承运商客户。

              在 Stack AV 隐身和结束隐身之后，自动驾驶卡车竞争格局发生了明显变化。同样背靠大量资本的 Aurora Innovation 于 2025 年 5 月 1
              日率先在美国推出商业无人驾驶卡车运营。Kodiak AI 和 Torc Robotics（Daimler 子公司）仍活跃在该领域。Stack AV 尚未宣布商业运营，因此在商业化时间线上落后于 Aurora
              Innovation。
