    rows:
      - - 美国长途卡车运输（>250 英里路线）
        - $906B 卡车总 TAM（2024）；估算长途细分为 $300–360B
        - 本地 / 区域配送、LTL 城市集拼、特种货物（hazmat、flatbed）
        - 资产型 TL 承运商、车主兼司机、大型托运人采购运力
        - 核心 TAM；hub-to-hub 州际路线是 Level 4 AV 的主要部署目标
      - - 自动驾驶卡车平台（SaaS / RaaS 收入）
        - 技术许可费、按英里计费的自动驾驶服务费、安全系统订阅
        - 卡车硬件采购价、司机工资、非 AV 里程燃油成本
        - 授权 AV 系统的承运商；托运人通过承运商转嫁定价付款
        - Stack AV 的直接收入模式；SAM 受可部署且符合 ODD 的路线约束
      - - 自动驾驶卡车传感器 / 硬件（估算 $50K/车）
        - LiDAR、摄像头、雷达、计算、执行器的单车物料清单
        - 不计入 AV 软件 TAM；构成每辆卡车的 COGS 和资本开支
        - 从 tier-1 OEM 供应商采购传感器套件的 AV 技术公司
        - 2025 年价格下每车约 $50K 成本，限制车队部署速度和单位经济
      - - 车队管理 / TMS（相邻）
        - 路线优化、装载规划、合规工具、ELD 集成
        - 不属于 AV 平台支出；相邻 SaaS 垂直
        - 管理运输运营的承运商、3PL、货运经纪
        - 集成界面：AV 平台必须接入现有 TMS / 调度工作流才能规模化
      - - 司机劳动力市场（风险价值）
        - 估算美国司机年人工成本 ~$128B（2.235M 司机 × $57,440 中位工资）
        - AV 平台不能直接捕获；代表自动化释放的经济价值
        - 作为司机雇主和工资付款方的承运商；司机则是被替代劳动力
        - 承运商采用自动驾驶卡车的长期 ROI 主要来源
