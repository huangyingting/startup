      - number: '1.4'
        title: 投资方支持与融资
        blocks:
          - type: paragraph
            body: >
              Stack AV 的主要财务支持方是 SoftBank Vision Fund 2，即 SoftBank Group Corporation 旗舰科技投资工具的第二期。2023 年 9 月公司结束隐身时，有报道称
              SoftBank 将向 Stack AV 承诺投入 $1 billion 或更多——这对该阶段公司而言异常庞大。SoftBank 对 Stack AV 的兴趣，反映了其在自动驾驶出行领域的更大判断，以及
              Vision Fund 2 在深科技物流上的组合策略。

              2024 年 8 月，据报道 Stack AV 完成 $150 million Series B 融资。但截至本报告撰写时，无法通过直接一手来源核验具体投资方、估值和轮次条款；所有可公开访问的报道 URL 均返回
              404 错误或访问限制。本分析将 $150M 数字视为已报道但未核实；除 SoftBank 已确认参与外，投资方构成仍是开放证据缺口。

              Stack AV 的融资总额（包括已报道 Series B 以及 SoftBank 承诺的任何先前 tranche）没有公开确认。创始团队股权、二级交易和 cap table 结构也未披露。考虑到 Argo AI
              在关闭前烧掉 Ford 和 Volkswagen 超过 $2.6 billion 资金，Stack AV 的资本效率是一个关键尽调维度，但目前无法仅凭公开来源充分评估。
