  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Stack AV 面临多层且未解决的监管与法律风险栈，这是商业化的主要障碍。最关键的监管缺口，是缺少联邦 FMCSA 无人驾驶豁免：49 CFR §383.3 要求所有商用机动车（CMV）运营都必须有 CDL
              持有人，FMCSA 尚未发布允许全自动无人驾驶 CMV 在美国公共道路上运营的最终规则。没有这项豁免，无论技术是否就绪，Stack AV 都无法商业运营无人驾驶卡车。[CR002]

              NHTSA 关于碰撞报告的常设总令（第三次修正案于 2025 年 6 月生效）对所有 ADS 运营商施加强制事故报告义务，罚金最高可达每次违规每日 $27,874（相关系列上限 $139M）。任何 Stack
              AV ADS 在事故前后 30 秒内涉及的碰撞都会触发公开报告，给每起事故带来声誉和监管暴露。[CR001]

              州级层面，Stack AV 目标走廊横跨 TX、PA、CA 和 AZ——四个州的 AV 测试和运营规则差异明显，带来合规开销，并限制近期哪些走廊能以无人驾驶方式运营。Texas Transportation
              Code §545 允许无司机 AV 运营，但 FMCSA 联邦叠加规则让商业化变复杂。California Vehicle Code §38750 要求商业无人驾驶部署取得单独 DMV 制造商批准。NCSL
              AV Legislation Database 跟踪 50 多个州不断演进的 AV 法律，记录了这种拼图式风险。[CR003] [CR004] [CR005] [CR039]

              产品责任暴露尚未确定：没有联邦法规明确把 ADS 事故责任最终归于 ADS 开发商、OEM 或承运商。若发生碰撞，在缺少确定联邦标准的情况下，Stack AV 面临灾难性侵权责任暴露；其 49 USC
              §30120 召回补救义务也会适用于任何有缺陷的 ADS 组件。[CR010] [CR011] [CR012]

              IP 风险重要。Argo AI 专利（CTO Brett Browning 被列为发明人）已转让给 Argo AI LLC；Argo AI 通过创始团队到 Stack AV 的 IP
              链条需要独立法律核验。Aurora Innovation 和 Waymo 持有覆盖轨迹预测、地图和传感器融合系统的大量 AV 专利组合，与 Stack AV 的技术路线存在重叠。[CR006] [CR007]

              EPA 的清洁卡车计划对 2027+ 车型年的重型卡车平台施加 NOx 和 GHG 标准；Stack AV 的 OEM 卡车采购必须合规，否则会面临非合规车队风险。FTC 保障规则下的数据隐私暴露可能适用于
              Stack AV 对地理空间、货运路线和操作员数据的收集。[CR008] [CR009] [CR041]
