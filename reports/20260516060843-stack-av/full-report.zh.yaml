    slug: thesis-anti-thesis-table
    title: 投资逻辑与反向逻辑
    notes: 投资逻辑与反向逻辑行反映截至 2026 年 5 月的公开证据。证据支持为每项论点引用具体来源或代理指标。改变观点项是可证伪条件，若发生会改变评级。
