  - id: TI003
    title: 单位经济模型表
    description: >
      Key unit economics metrics for Stack AV's autonomous trucking business, with best-available estimates, confidence
      levels, materiality, and required diligence steps. Stack AV has not disclosed any of these metrics publicly; all
      Stack AV values are estimated from analogies.
    columns:
