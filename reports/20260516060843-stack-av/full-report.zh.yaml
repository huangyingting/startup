      - - 可归因于 Stack AV ADS 的致命 AV 事故
        - NHTSA 事故报告公开点名 Stack AV ADS 卷入致死事故
        - 任何经 NHTSA 确认、Stack AV ADS 处于启用状态的致死事故
        - 停止投资活动；等待 NTSB 调查结论；重新承保安全案例
      - - Aurora 或 Waymo 对 Stack AV 的 IP 禁令
        - 联邦法院 TRO、初步禁令或 ITC 排除令针对 Stack AV 提交
        - 任何限制 Stack AV 商业部署的 IP 禁令救济获准
