      - number: '1.2'
        title: 创立故事与领导团队
        blocks:
          - type: paragraph
            body: >
              Stack AV 的创始团队全部来自 Argo AI。Argo AI 是 Ford Motor Company 和 Volkswagen AG 合资的自动驾驶公司，2016 年由 Bryan Salesky 和
              Peter Rander 共同创立，Ford 最初承诺投入 $1 billion。Argo AI 巅峰期估值 $12.4 billion，员工超过 2,000 人；2022 年 10 月，Ford 和
              Volkswagen 撤回支持，公司随即关闭。关闭之后，Salesky、Rander 和 CTO Brett Browning 以隐身模式创立了 Stack AV。

              Bryan Salesky（CEO、联合创始人）2002 年获 University of Pittsburgh 计算机工程理学学士学位，职业生涯一直在机器人和自动驾驶系统领域。他先后在 Carnegie
              Mellon University 和 Google 工作，2016 年共同创立 Argo AI。Peter Rander（President、联合创始人）1998 年在 Carnegie Mellon
              University 获机器人学博士学位，后来在 Uber ATG 领导自动驾驶车辆开发，再共同创立 Argo AI。Brett Browning（CTO）2000 年获 University of
              Queensland 电气工程博士学位，履历同样贯穿 CMU 研究、Uber ATG 和 Argo AI。

              Stack AV 还组建了由五名前联邦机构领导组成的 Safety Advisory Council：Robert Sumwalt，前 National Transportation Safety Board
              主席；Annette Sandberg，前 Federal Motor Carrier Safety Administration 署长；David Kelly，前 National Highway
              Traffic Safety Administration 代理署长；Christopher Doss，前 FBI Assistant Director；以及 Don Osterberg，前 Schneider
              National 安全高级副总裁。这套外部安全治理结构释放了监管可信度信号，在商业化前 AV 初创公司中并不常见。
