      - number: '2.2'
        title: 市场规模：TAM、SAM 和 SOM
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车市场规模需要从多个角度交叉估算，因为没有单一权威公开估计能精确定义 serviceable addressable market。total addressable market（TAM）最适合以
              American Trucking Associations 的 2024 年数据锚定：美国卡车运输总收入 $906 billion。如果自动驾驶系统完全替代全部卡车运营，这就是理论天花板；短期并不现实，但可作为
              TAM 锚点。

              自动驾驶卡车专属市场——技术驱动的 AV 平台收入、硬件和服务——据 Mordor Intelligence 估算，2026 年全球规模为 $42.6 billion，2031 年升至 $74.2
              billion，CAGR 为 11.73%。North America 约占全球市场 37.5%，即 2026 年约 $16 billion 可归因 AV 卡车价值。Level 4 系统是增长最快的细分，估计
              CAGR 为 15.21%，与 Stack AV 的技术目标一致。

              自下而上的 hub-to-hub AV trucking SAM 估算，从美国卡车运输收入中的长途细分份额（约 $317 billion）出发，再按近期监管、线路就绪度和车队电动化约束打折。合理 SAM 估计落在
              $100–200 billion 区间，对应未来 10 年美国完整可服务市场。Stack AV 这类商业化前初创公司在 2025–2030 年的 serviceable obtainable
              market（SOM）没有公开量化，但 Aurora Innovation 在 Texas 特定走廊的商业上线说明，最初可渗透 SOM 以数百条卡车线路和数十亿美元计，而不是数百亿美元。

              司机劳动力成本是另一个规模测算角度：美国司机年工资为 $128 billion，即便 10 年内有 20% 被自动驾驶替代，也意味着每年 $25 billion 的经济价值处于可争夺状态。
            claimRefs:
