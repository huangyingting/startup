  - id: FU001
    title: 客户旅程地图
    type: journey-map
    layout: wide
    summary: |
      从承运商认知到车队扩张的五阶段客户旅程，映射 Stack AV 必须跑通的获客与留存路径，才能形成商业收入。
    data:
      items:
        - label: 承运商认知
          detail: |
            货运承运商通过 OEM 合作伙伴介绍、行业会议，或关于 Aurora 商业项目的竞争情报，识别 AV 卡车试点机会。关键触发点：司机短缺痛点达到决策者阈值。
        - label: LOI / 试点协议
          detail: >
            承运商针对特定 hub-to-hub 走廊签署意向书或试点协议。前提是走廊所在州获得监管许可、保险协议落地，以及 CDL-A Operations Specialist 配岗计划到位。Stack AV
            尚未走到这一阶段。
        - label: 有监督测试
          detail: >
            CDL-A Operations Specialists 在指定走廊监控 AV 系统。安全事件数据被收集；承运商运营团队接受 mission control 界面培训。截至 2026 年 Q2，Stack AV
            已在五条走廊处于这一阶段。
        - label: 商业无人驾驶上线
          detail: |
            获得监管许可并完成安全里程碑签核后，承运商在获批走廊启用商业无人驾驶货运。Aurora 于 2025 年 4 月做到这一点。Stack AV 尚未宣布无人驾驶上线日期。
        - label: 车队扩张
          detail: |
            承运商把自动驾驶单元扩展到更多走廊；3PL 订舱中介将 AV 运力接入货运匹配平台。扩张受限于 OEM 卡车供应、更多州的监管许可，以及按英里计的经济性。
    claimRefs:
      - CU001
      - CU004
      - CU006
      - CU007
      - CU027
      - CU036
