    rows:
      - - Aurora Innovation
        - 按英里车队服务
        - 每英里（载货）
        - 目标约 $0.75–$1.00/mile（与司机成本持平）
        - AV 技术栈 + 安全监控 + 调度集成 + Werner 车队
        - 实际费率私密；排他条款未知；批量折扣未披露
        - 将按英里模式树为行业基准；Stack AV 定价会被拿来对照 Aurora 的商用费率
      - - Torc Robotics
        - OEM 内嵌（待定）
        - 按卡车授权或订阅（待定）
        - 未披露（商业化前）
        - Freightliner Cascadia 硬件集成 + AV 软件
        - 无公开定价；商业模式未公布；OEM 模式可能不同于 SaaS
        - OEM 集成卡车在 TCO 上可能与 Stack AV 按英里模式竞争；模式仍不确定
      - - Kodiak Robotics
        - 商业货运 + 军方合同
        - 按英里（商业，待定）+ 固定合同（军方）
        - 商业：未披露；军方：合同合计 $140M+
        - AV 技术栈 + Werner / Prime 车队 + 军事物流集成
        - 商业定价未公开；军方合同条款保密
        - 军方收入能缓冲 Kodiak 受货运市场波动的影响；之后可能支撑更激进的商业定价
      - - Plus AI (SuperDrive)
        - 硬件套件 + 订阅
        - 按卡车 / 年订阅
        - 初始硬件约 $15K–$50K + 年订阅（估计）
        - 面向 Peterbilt 579 的 ADAS Level 2+ 套件；SuperDrive 软件订阅
        - L4 定价模式未定义；订阅费率未公开；中国与美国定价可能不同
        - 低成本 ADAS 产品会挤占承运商投向全 L4 的技术变革预算
      - - Gatik AI
        - 按英里或车队合同
        - 按英里（估计）
        - 未公开披露
        - AV 技术栈 + 固定路线测绘 + 专用路线车队管理
        - 与 Walmart / Loblaw 签有独家路线合同；定价未公开
        - 专用路线模式限制 TAM，但能较早锁定收入确定性；市场不同于 Stack AV
      - - Einride
        - 按英里捆绑定价
        - 按英里（全包：车辆 + 电力 + 运营）
        - 估计约 €3–5/km 捆绑（ZE+AV）
        - T-pod EV + 自动驾驶 + 远程运营中心 + 维护
        - 美国具体定价未确认；捆绑 ZE 模式很难与柴油 AV 对比
        - 按英里捆绑模式证明了定价可行性，但只适用于狭窄 ZE / 专用细分
      - - 现状（人类司机）
        - 每英里可变成本
        - 每英里（全负荷）
        - 约 $2.00–$2.50/mile（长途，全包）
        - CDL 司机 + 车辆 + 燃油 + 合规开销
        - 司机短缺推高有效成本；流失和招聘带来隐性成本
        - AV 按英里定价必须接近司机成本平价，才能撬动承运商 ROI；相比当前估计，需要约 2–3 倍改善
