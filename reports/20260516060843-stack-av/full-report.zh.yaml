companyProfile:
  summary: >
    Stack AV 是一家位于宾夕法尼亚州匹兹堡的自动驾驶卡车公司，由 Argo AI 核心领导团队在 2022 年创立，创始人包括 Bryan Salesky（CEO）、Peter Rander（President）和 Brett
    Browning（CTO）。Argo AI 曾是 Ford 与 Volkswagen 合资的 AV 项目，估值 $12.4 billion，2022 年 10 月关闭。Stack AV 随即转向长途自动驾驶卡车，2023 年 9
    月结束隐身，据报道获得 SoftBank Vision Fund 2 提供的 $1 billion 以上支持。公司的专有自动驾驶系统由三部分组成：StackOS（实时 AV 操作系统）、Clockwork（对时序敏感的中间件）和
    Deploy Manager（面向车队规模的 OTA 软件分发）。Stack AV 在 Pennsylvania 和 Texas 的公共高速公路上运营测试卡车，目标是在指定州际线路上实现 SAE Level 4 无人驾驶。截至
    2026 年中，公司仍处于商业化前阶段，未披露收入，且正等待 FMCSA 批准无人卡车运营。
