  - id: TM004
    title: 增长驱动因素与约束表
    description: Key growth drivers and adoption constraints for the autonomous trucking market, with timing and diligence asks.
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 对 Stack AV 的影响
      - 尽调问题
    rows:
      - - 结构性司机短缺与招聘困难
        - 驱动因素（正向）
        - 近期（2024–2030）
        - 加快承运商为 AV 部署算清 ROI；从车队经济性看，降低对自动化的抵触
        - 量化每季度实际空缺 CDL 岗位；评估各地区司机供给差异
      - - FMCSA 工时服务（HOS）带来的生产率天花板
        - 驱动因素（正向）
        - 持续 / 监管基线
        - AV 绕开 11 小时 / 14 小时工作窗口和每周 60/70 小时上限；相比合规人类司机，长途线路吞吐量可提升约 50%
        - FMCSA 是否发布或提出过适用于 Level 4 运营的 AV 专属 HOS 豁免框架？
      - - EPA Phase 3 温室气体要求（MY2032 年 ZE 销量 40%）
        - 驱动因素（正向）
        - 2027–2032（爬坡）
        - 推动 OEM 和车队投资零排放 Class 8 卡车；AV 系统更适配以续航最优为目标的 ZE 路线管理；可能加快 AV+ZE 捆绑部署
        - OEM 电动化时间表与 Class 8 的 AV 系统集成时间表如何匹配？
      - - 长期货运量增长（FHWA FAF 2050 预测）
        - 驱动因素（正向）
        - 长期（2025–2050）
        - 关键州际走廊的货运吨英里增加，提高固定 ODD 的 AV 系统利用率经济性；降低盈亏平衡所需的线路密度
        - FHWA 货运预测是否按走廊拆分，以识别最适合自动驾驶部署的高密度路线？
      - - 联邦 / 州监管碎片化（无统一 AV 框架）
        - 约束（负向）
        - 近期（2024–2028）
        - 每条跨州线路都要同时满足多个州的许可制度；没有联邦优先立法时，全国部署扩张会被拖慢
        - NHTSA 或国会是否推进过针对商用 AV 卡车运营的联邦优先提案？
      - - 早期 AV 保险与责任框架
        - 约束（负向）
        - 近期（2024–2028）
        - 保险公司缺少 Level 4 卡车精算数据；早期部署规模下保费可能高到难以承受；多方事故中的承运商责任边界不清
        - 在现行州法下，Level 4 AV 事故由谁承担碰撞责任？是否已有承运商拿到 AV 专属商业保险？
      - - 传感器硬件成本（按 2025 年价格约 $50,000 / 车）
        - 约束（负向）
        - 中期（下降中）
        - 当前价格压低单车经济性和部署速度；LiDAR / 摄像头价格预期下降，2027–2030 年有望降低这一门槛
        - 当前传感器成本曲线如何？在 500 辆卡车车队中，AV 货运需要降到多少 $/vehicle 才能跑出正向单位经济性？
      - - 公众信任与安全事故风险
        - 约束（负向）
        - 持续
        - 一起公开报道的死亡事故或重大事故就可能触发多州暂停；监管时间表对公众观感敏感；NHTSA SGO 要求 24 小时内报告事故
        - NHTSA 的 Standing General Order 数据迄今是否披露过 Level 4 卡车事故？Aurora 自 2025 年 5 月上线以来事故率是多少？
