      - number: '5.3'
        title: 产品差异化与 IP 位置
        blocks:
          - type: paragraph
            body: >
              Stack AV 的首要技术差异化是机构性资产：创始团队（Salesky、Rander、Browning）在 Argo AI 累计了超过六年的 AV 专项研发经验，包括在 Miami 和 Austin
              的真实公共道路自动驾驶载人部署。这段经历意味着训练过的感知算法语料、安全方法论框架和工程流程 know-how，新进入者要复制这些资产，需要多年时间和数亿美元资金。除 Aurora 和 Torc 之外，没有其他
              Level 4 AV 卡车初创公司拥有同等创始团队履历。[CE016] [CE017]

              公司战略上只聚焦 SAE Level 4 高速长途卡车（不做城市 robotaxi、不做短途配送、不做 Level 2/3 驾驶辅助），相较尝试更宽 ODD 的同行，降低了产品运营复杂度。聚焦 ODD
              让公司能更深入验证更窄的一组驾驶场景——这是 Argo AI 在乘用车多 ODD 开发经验中明确得到的教训。[CE018]

              StackOS + Clockwork + Deploy Manager 三层自研垂直整合，使 Stack AV 能控制完整软件栈，不依赖 Apex.AI 或 ROS-based 平台等商业 AV
              中间件供应商，避免商业规模下的供应商锁定或许可风险。Bosch、NVIDIA 和其他 Tier-1 技术供应商已经开发出广泛 AV 软件栈，Stack AV
              要么授权其中组件，要么在垂直整合层与其竞争。[CE019] [CE020]

              Luminar 等供应商的 LiDAR 传感器技术进步显著，长距探测能力如今已面向商用车应用调校。传感器供应商选择、集成方法和训练数据管线构成执行层差异化，虽然公开不可见，却是关键尽调面。Daimler
              Truck 和其他 OEM 已投资 AV 集成项目，这些项目既可能成为合作路径，也可能形成竞争向量。[CE021] [CE036] [CE039]
            claimRefs:
