      - number: '2.6'
        title: 展示材料
        blocks:
          - type: callout
            title: 司机短缺制造持久需求信号
            body: >
              美国结构性司机短缺是自动驾驶卡车近期最有说服力的需求驱动因素。ATA 数据确认承运商招聘持续困难；BLS 预计到 2034 年就业仅增长
              4%，而长期货运量仍在增加。不同于周期性货运下行，司机供给是由人口结构和职业偏好推动的长期约束。这给自动驾驶部署提供了持久 ROI 依据，不必完全依赖技术成本降到与人力成本平价。
            calloutType: insight
            claimRefs:
              - CM003
              - CM017
              - CM019
              - CM037
          - type: callout
            title: 市场规模估算不确定性高
            body: >
              本章审阅的所有自动驾驶卡车市场规模估计，都来自单一来源分析师报告，方法论无法独立核验。Mordor Intelligence 的 2026 年 $42.6 billion 数字，无法与其他已发布预测交叉验证。基于
              ATA 总收入和长途细分份额的一阶原理 SAM 估算，也高度依赖线路可用性和近期可部署性假设。投资者和分析师应把所有具体 TAM/SAM 数字视为方向性的数量级锚点，而非精确预测。
            calloutType: insight
            claimRefs:
              - CM006
              - CM007
              - CM043
              - CM044
          - type: callout
            title: EPA Phase 3 推动 AV 与 ZE 部署汇合
            body: >
              EPA Phase 3 GHG 标准要求到 2032 车型年，Class 8 卡车新车销售 40%
              为零排放，这与自动驾驶部署之间存在被低估的汇合动态。电池电动重卡面临续航和充电基础设施约束，最容易在定义清晰的枢纽到枢纽线路上解决——而这些线路也正是 Level 4 AV 最可行的线路。AV
              系统能以人类司机做不到的方式优化 ZE 续航管理，可能让 AV+ZE 组合比单一技术更具经济吸引力。2024–2027 年投入 $50B+ ZE 基础设施的 OEM 和车队，可能更偏好能接入其电动化战略的 AV
              平台。
            calloutType: insight
            claimRefs:
              - CM020
              - CM021
              - CM029
          - type: callout
            title: Hub-to-Hub SAM 估算是一阶原理近似
            body: >
              本章引用的美国 hub-to-hub 自动驾驶卡车 $100–200 billion SAM 区间，来自一阶原理：ATA 卡车运输总收入（$906B）× 估计长途细分份额（35–40%）× 对近期 ODD
              约束的可用性折扣。未找到任何独立公开研究直接用这一方法测算美国 hub-to-hub 自动驾驶卡车 SAM。Stack AV 自身 SOM
              也没有公开量化。投资者尽调应使用专有线路密度和承运商采用模型验证这些数字。
            calloutType: insight
