      - number: '3.3'
        title: 相邻竞争者与替代品分析
        blocks:
          - type: paragraph
            body: >
              Gatik AI 已在固定 B2B 中程线路上证明商业无人驾驶（无安全驾驶员）运营，线路长度约 15–80 英里，客户包括 Arkansas 和 Texas 的 Walmart，以及 Canada Ontario
              的 Loblaw。Gatik 更短、更受控的线路 ODD 让监管批准更早，但代价是可服务市场远小于开放州际长途。Gatik 不是 Stack AV
              长途业务的直接竞争威胁，但它的商业成功验证了无人货运运营今天可以在更窄 ODD 中具备经济可行性。

              Einride 在美国（Tennessee、Wisconsin、Florida、California）的私人和专用货运线路上运营自动驾驶电动 T-pod 车辆，并依靠 US DOT 对远程操作车辆的豁免。客户包括
              GE Appliances、Electrolux 和 DB Schenker。Einride 按英里为打包服务收费，覆盖车辆、电力、维护和远程运营。Einride 的价值主张依赖零排放转型；它不是与 Stack
              AV 柴油卡车长途业务正面竞争的、货运无关型 Level 4 对手。不过，Einride 证明了按英里打包定价的自动货运模式可以吸引企业托运人。

              Waymo Via 在 2023–2024 年关闭商业卡车业务，把 Alphabet 无限资本优势从近期竞争格局中移除。它的缺席为资本受限的独立公司在 2025–2030 年窗口内建立车队关系打开空间，之后
              Alphabet 仍可能重新进入。现状替代方案——人类 CDL 司机——仍是主导既有力量。约 2.24 million 名持证重型卡车司机构成完全可扩展的劳动力，长途运营全口径成本估计为每英里
              $2.00–$2.50，这设定了 AV 按英里定价最终必须接近或低于的基准，才能驱动承运商 ROI。
