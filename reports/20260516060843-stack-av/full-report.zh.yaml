      - number: '7.2'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Stack AV 的运营与技术风险画像集中在五个相互嵌套的暴露上：传感器硬件供应链集中、恶劣天气性能限制、网络安全漏洞、OTA 软件失效风险，以及 OEM 集成依赖。

              传感器硬件集中度很高。Luminar Technologies 是包括 Argo AI 遗留栈在内多家 AV 开发商的主要 LiDAR 供应商，2024–2025
              年报告了财务挑战，包括裁员，提升了单一来源传感器供应商的破产风险。NVIDIA DRIVE 是 AV 训练和推理的主导计算平台；Stack AV
              尚未公开披露替代计算栈。感知和计算硬件都存在单一来源依赖，形成可能叫停测试或延迟商业化的供应链脆弱性。[CR016] [CR017]

              恶劣天气性能是 LiDAR 依赖型 AV 系统已有记录的行业性挑战。雨、冰、雪会降低点云质量和传感器精度。Stack AV 起源于 Pittsburgh，并有 PA
              走廊雄心，直接面对恶劣天气约束。尚无独立验证公开证明 Stack AV 的全天候性能边界。[CR013] [CR020]

              配备 ADS 的卡车因 OTA 软件交付和车联网数据传输需要远程访问，网络安全风险更高。Stack AV 尚未公开披露任何第三方 ADS
              安全审计。车辆劫持或数据泄露事件会造成责任、监管和声誉损害，并级联冲击客户和投资人信心。[CR015]

              车队规模 OTA 软件更新失败——即一次有缺陷的软件推送触达所有已部署车辆——会触发 NHTSA 权限下的召回，并带来安全事故风险。Stack AV 仍处商业化前阶段，OTA 架构尚未经过独立验证。对
              Peterbilt 和 / 或 Freightliner 平台 by-wire 系统的 OEM 集成依赖，如果 OEM 合作优先级变化，也会带来发布风险。[CR018] [CR019] [CR021]

              Stack AV 创始团队把 Argo AI 的技术设计决策带入 Stack AV 平台；来自前公司的 IP 转让核验和软件来源证明，仍是未解决的尽调事项。[CR022]
