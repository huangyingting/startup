      - number: '2.3'
        title: 买方分层与采用路径
        blocks:
          - type: paragraph
            body: >
              自动驾驶卡车市场有分层买方结构。最上层是大型资产型整车（TL）承运商——例如 Werner Enterprises、Hirschbach Motor Lines，以及类似拥有 500+
              牵引车的运营商——它们是主要技术买方和最早采用者。这些承运商拥有卡车、持有运营许可并承担责任，因此是 AV 技术授权或按英里自动驾驶服务费的直接付款方。它们的采用触发点是司机供给约束叠加长期降本目标；Werner
              和 Hirschbach 与 Aurora Innovation 的合作表明，美国大型承运商正在积极评估 AV 技术。

              大型托运人与第三方物流供应商（3PL）是第二层买方：它们向承运商采购货运运力，并制造需求信号，证明承运商投资自动驾驶技术是合理的。托运人关心货运可靠性、停留时间降低和可预测线路定价；它们不直接购买 AV
              技术，但当可靠性提升时，会偏好具备 AV 能力的线路，从而影响承运商采用。原始设备制造商（OEM）如 Daimler Truck（通过 Torc Robotics）和 Volvo Autonomous
              Solutions 构成第三类买方；它们在硬件层集成 AV 技术，形成不同于纯软件授权的买方—技术关系。

              采用路径遵循一个监管漏斗：技术验证 → FMCSA 豁免或州级许可 → 承运商试点项目 → 特定走廊商业上线 → 地理扩张。Aurora 2025 年 5 月的商业上线，是美国 Level 4
              自动驾驶卡车首次跑通这一漏斗，证明路径存在，也为 Stack AV 建立了竞争先例。
            claimRefs:
              - CM014
              - CM015
              - CM016
              - CM019
              - CM026
