      - number: '8.2'
        title: 估值情景与可比公司分析
        blocks:
          - type: paragraph
            body: >
              Stack AV 的可比公司集合很薄，且并不完美。Aurora Innovation（AUR）是唯一直接的公开 AV 卡车同业，市值 $15.12B，对应 FY2025 收入 $3M——隐含收入倍数约
              5,040x，反映的是纯期权价值，而非当前财务表现。Aurora 从 $5.71B（2025 年 6 月）重估至 $15.12B（2026 年 5 月），由 2025 年 4 月商业无人驾驶发布以及 McLane
              / Hirschbach 公告推动，说明市场会给首次商业发布催化剂赋予巨大的非线性价值。[CV016] [CV017] [CV018] [CV026]

              Mobileye（MBLY）市值 $8.44B，对应 FY2025 收入 $1.89B（约 4.5x P/S），为 Stack AV 达到商业规模后的收入倍数提供底部参照。Aurora 的 5,040x
              期权价值倍数与 Mobileye 的 4.5x 成熟收入倍数之间，就是 Stack AV 必须穿越的估值弧线：$750M–$1B 的收入前入场估值意味着市场已为其达到商业规模定价了可观概率，但相较 Aurora
              当前溢价仍有大幅折价。[CV019] [CV025] [CV026] [CV027]

              TuSimple 的轨迹仍是任何 Stack AV 情景模型的警示锚点。2021 年 4 月 $1.1B IPO、峰值估值 $8.5B、2024 年 1 月以 $0.30/股自愿退市——峰谷跌幅超过
              99%——这就是一家 AV 卡车公司未能把资本转化为商业运营后的已实现下行。Goldman Sachs 分析师 Mark Delaney 对 Aurora 维持 $5 Hold 目标价（较 2026 年 5
              月水平有 35% 下行），代表即便对已商业发布的龙头，也存在偏空的离群观点。[CV020] [CV021] [CV022] [CV024]

              Waymo 在 2024 年 Alphabet 融资轮中估值约 $45B，确立了行业天花板，但并非直接可比同业（robotaxi、Alphabet 支持、没有卡车 AaaS 模型）。Kodiak Robotics
              是最接近的私有 AV 卡车可比公司，但自 2021 年 Series B 后未披露估值，也没有商业部署的无人驾驶车队。[CV023] [CV024]
