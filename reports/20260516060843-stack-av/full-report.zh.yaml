  - id: TP003
    title: 定价 / 包装对比
    description: >-
      Known and inferred revenue models and pricing structures for autonomous trucking competitors and the status-quo
      alternative. All AV pricing is private; figures are estimates or inferences.
    columns:
      - 公司
      - 收入模式
      - 定价单位
      - 已知 / 推断费率
      - 包含能力
      - 关键未知
