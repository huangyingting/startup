          detail: Aurora Innovation 在 Texas 启动商业无人驾驶卡车运输——美国首例。Stack AV 尚未宣布商业运营。
          tone: adverse
          claimRefs:
            - CO046
            - CO047
    approximationNotes: |
      在没有精确公开日期时，里程碑日期为近似值。Stack AV 创立日期估计为 2022 年末，依据是 CEO 称 Argo AI 于 2022 年 10 月关闭，Stack AV 随后成立。
