      - number: '5.6'
        title: 图表与附录
        blocks:
          - type: callout
            title: 自研三层栈：StackOS + Clockwork + Deploy Manager
            body: >
              Stack AV 选择把 StackOS、Clockwork 和 Deploy Manager 打造成自研组件，而不是依赖开源 ROS 或商业中间件，由此形成一个垂直整合栈，能完整看见实时确定性、安全属性和
              OTA 更新安全。这种架构控制相较使用商品化中间件的竞争对手，是有意义的技术护城河；但它也把工程风险集中在内部，并限制了外部生态工具的可用性。
            calloutType: insight
            claimRefs:
              - CE002
              - CE004
              - CE005
              - CE019
          - type: callout
            title: 技术成熟度缺口：商业发布时间表尚未确认
            body: >
              截至 2026 年 Q1，Stack AV 尚未公开披露商业无人驾驶发布时间表，尚未发布安全论证或自愿安全自评，也尚未为无人驾驶运营提交 FMCSA 豁免文件。最先进的竞争对手 Aurora Innovation
              从成立到商业无人驾驶发布用了四年多。Stack AV 距 2022 年成立约 3.5 年，尚无公开宣布的商业化门槛里程碑。这一缺口是投资人的主要技术阶段风险。
            calloutType: insight
            claimRefs:
              - CE028
              - CE029
              - CE031
              - CE034
          - type: callout
            title: Aurora 2025 年 4 月商业发布是行业基准
            body: >
              Aurora Innovation 于 2025 年 4 月 28 日启动商业无人驾驶卡车运营，这是美国历史上首次商业化无人驾驶 Class 8 卡车运营，为 Stack AV
              必须达成的目标建立了具体基准。Aurora 的路径包括 400,000 英里自动驾驶安全论证、FMCSA 豁免文件、Texas 特定许可，以及承运商和保险合作伙伴承诺。Stack AV
              的投资人和管理团队应把自身商业化关键路径，对照 Aurora 已记录的监管和运营门槛建模。
            calloutType: insight
            claimRefs:
              - CE028
              - CE034
          - type: callout
            title: 计算平台和传感器供应商是推断，并非确认
            body: >
              本章提到 NVIDIA DRIVE-class 计算硬件和 Luminar-class LiDAR，是基于 Level 4 AV 系统行业惯例和供应商市场背景的推断。Stack AV
              尚未披露其计算平台供应商、传感器供应商或物料清单配置。尽调应具体确认硬件合作伙伴、单车传感器成本和供应集中风险。
            calloutType: insight
            claimRefs:
              - CE007
              - CE008
              - CE021
  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层
        blocks:
          - type: paragraph
            body: >
              Stack AV 的可触达客户基础，是约 580,000 家活跃美国机动车承运商，它们共同竞争每年 $900B+
              的卡车运输市场。在这个总体中，第一代自动驾驶卡车系统真正可行动的买方群体更窄：大型整车运输承运商（100+
              动力单元）和第三方物流提供商（3PL），它们拥有固定线路合同和采购基础设施，能承受多年试点周期。[CU001] [CU002]

              AV 卡车的买方 / 用户 / 付款方分层比典型 SaaS 销售更复杂。用户是运营卡车的承运商运营团队；买方通常是评估技术合作的承运商 VP of Innovation 或 CDO；付款方是承运商
              P&L，部分成本可能由 3PL 订舱中介带来的货运收入抵消。Aurora 与 Uber Freight 的商业模式——Uber Freight（管理 $17B+ 货运，服务 1/3 的 Fortune 500
              托运商）在 Aurora 无人驾驶运力上订舱——说明 Stack AV 很可能也需要复制这种 3PL 中介付款结构。[CU003] [CU008]

              目标用例是在超过 250 英里的州际走廊上进行 hub-to-hub 长途高速货运，这类场景运营域可预测性最高，司机短缺痛点也最尖锐。大型车队承运商和 3PL
              是战略买方群体，因为它们拥有固定线路货量、有财务规模吸收试点成本，也有工程资源在场站和调度层集成 AV 系统。LTL
              承运商和个体车主运营商因多站路线复杂、规模经济不足，被结构性排除在初始可触达群体之外。[CU004] [CU005] [CU006]

              截至 2026 年中，Stack AV 尚未宣布任何具名客户关系。至少五条走廊（Denver–Atlanta、Phoenix、Dallas、Miami）的 CDL-A
              运营专员招聘信息确认了主动测试，但不能证明商业客户获取。[CU007]
