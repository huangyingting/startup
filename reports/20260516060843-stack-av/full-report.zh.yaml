      - number: '7.5'
        title: 图表
        blocks:
          - type: callout
            title: FMCSA 无人驾驶豁免是关键路径上的监管卡点
            body: >
              FMCSA 尚未出台允许商用无人驾驶 CMV 运营的规则；49 CFR §383.3 下的 CDL 要求仍然适用。没有联邦豁免，即便技术准备就绪，Stack AV 也无法商业部署无人驾驶卡车。Aurora 已为其
              Dallas–Houston 无人驾驶项目取得运营许可，但所有 AV 开发商取得 FMCSA 无人驾驶豁免的路径仍未定义。这是最重要的监管尽调项：确认 Stack AV
              是否已提交豁免申请，以及申请处于哪个阶段。若到 2028 年仍未取得联邦框架许可，将构成打穿投资逻辑的触发器。
            calloutType: insight
            claimRefs:
              - CR002
              - CR012
          - type: callout
            title: SoftBank 集中度制造收入前二元融资风险
            body: >
              SoftBank Vision Fund 作为 Stack AV $81M Series A 领投方，使一家收入前公司依赖单一资金点，而公司还需要 $500M+ 才能达到商业发布规模。SoftBank
              Vision Fund 1 与 2 的组合损失合计减记超过 $30B，包括 WeWork；LP 对后续加码信心的压力偏高。如果 SoftBank 不领投或不实质性参与 Series B，Stack AV
              将面临持续经营情景。投资人在投入更多资本前，应要求看到 Series B 管线多元化和替代资本来源的证据。
