      - number: '4.4'
        title: 对标 Aurora Innovation 的财务基准
        blocks:
          - type: paragraph
            body: >
              Aurora Innovation, Inc.（Nasdaq: AUR）是唯一一家上市的纯 Level 4 自动驾驶卡车公司，因此其 SEC 申报财务数据是判断 Stack AV
              预期财务轨迹时最严格的可用代理。Aurora FY2024 10-K 披露，研发费用 $676 million、SG&A $110 million，零收入下净亏损 $748 million。Aurora
              FY2025 10-K 于 2026 年提交，覆盖截至 2025 年 12 月 31 日的年度，记录了公司商业运营第一年：收入 $3 million、收入成本 $17 million、研发 $745
              million、SG&A $142 million，净亏损 $816 million。2025 年 12 月 31 日，Aurora 流动性约 $1.46 billion——现金 $221
              million、短期投资 $1.055 billion、长期投资 $183 million——由 FY2025 通过 ATM 股权发行净募资 $874 million，以及 2024 年 8 月公开发行所得
              $466 million 支撑。

              Aurora 在 FY2024 10-K 的持续经营披露中承认，如果无法持续获得资本，预计经营亏损可能引发对持续经营能力的疑虑。2025 年 5 月商业发布和随后融资部分缓解了这一披露，但 Aurora
              FY2025 商业收入 $3 million、收入成本 $17 million，毛利率约为 -467%——这符合资本密集型服务爬坡的特征：基础设施投资先于运营规模。Stack AV
              商业化第一年应预期出现类似甚至更极端的负毛利率。Aurora 的货运页面描述了轻资产 DaaS 模式：合作伙伴拥有、融资并维护实体卡车资产，Aurora 以及推而广之的 Stack AV
              按自动驾驶运营英里收费，而不是赚取资产所有权回报。Aurora FY2023–FY2025 研发支出稳定在 $676–$745 million，说明商业级 Level 4 卡车平台的技术开发成本平台大约在每年
              $600–$750 million，而 Stack AV 当前融资远未达到这一完整规模。
