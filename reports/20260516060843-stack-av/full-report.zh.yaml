      - number: '2.5'
        title: 竞争格局与市场动态
        blocks:
          - type: paragraph
            body: >
              自动驾驶长途卡车竞争格局集中在少数资金充足的玩家手中。Aurora Innovation（NASDAQ: AUR）按商业部署进度看最领先，已在 2025 年 5 月与 Werner
              Enterprises、Hirschbach Motor Lines 和 Volvo Autonomous Solutions 作为承运商合作伙伴，在 Dallas–Houston
              走廊推出无人货运运营。Aurora 截至 2025 年初约 $4.6 billion 的市值，说明机构投资者仍愿意押注该领域，但也加大了 Stack AV 等新进入者的竞争压力。

              Torc Robotics 被 Daimler Truck 收购，作为 OEM 集成型自动驾驶卡车系统运营，专注枢纽到枢纽高速公路自动化，并持续在美国州际公路公开路测。Kodiak Robotics
              专注长途自动驾驶卡车，采用与 Stack AV 类似的枢纽到枢纽运营模式；Plus AI（Plus）则走有监督自动化路线，以技术授权模式瞄准 Class 8 卡车。Waymo 的开放数据集体现了与高速公路 AV
              相关的传感器感知成熟度，尽管 Waymo 通过 Waymo One 主要聚焦 robotaxi，而非长途卡车。竞争差异最终取决于安全记录、线路覆盖、OEM
              合作和每自动驾驶英里成本——这些指标需要多年商业运营才能验证。

              UNCTAD 自动驾驶车辆就绪度指数把美国列为 AV 商业化准备度最高的国家之一，驱动因素包括公共基础设施质量和技术投资。Congressional Research Service
              分析指出，联邦是否优先覆盖州级 AV 监管仍未解决，这让寻求全国规模化的运营商持续面对合规复杂性。
