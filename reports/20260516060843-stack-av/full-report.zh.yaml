      - - Stack AV 商业发布时毛利率（估算）
        - 首年深度为负（–300% 至 –600%），与 Aurora FY2025 –467% 一致
        - 低 — 基于 Aurora 建模；Stack AV 规模会不同
        - 早期毛利率是单位经济模型路径最清晰的信号；投资人需要它来建模盈亏平衡
        - 索取包含收入成本构成和车队规模假设的备考单位经济模型
      - - 成熟期 AV 每英里成本（技术充分摊销）
        - 车队规模 >10,000 辆时估计 $0.30–$0.70/英里
        - 很低 — 第一性原理模型；没有公开 AV 公司披露成熟期单位经济模型
        - 决定长期毛利率潜力；必须优于司机成本平价，才能支撑投资逻辑
        - 基于 Aurora 规模化成本结构建模；用公开云计算成本基准交叉验证
      - - 相比 CDL 司机的卡车利用率提升（小时/天）
        - AV 系统：20–22 hours/day vs. CDL 司机：最高 11 hours/day (FMCSA HOS)
        - 中 — FMCSA HOS 规则公开；AV 利用率是理论上限
        - 利用率差异是单车经济模型的关键价值驱动；利用率越高，单资产收入越高
        - 索取测试卡车实际运行 uptime 数据；评估 20+ 小时可用性是否能达到商业质量水平
      - - 单车资本开支（传感器 + 计算技术栈）
        - 按 2025–2026 年传感器价格估计，每车 $40,000–$80,000
        - 低 — 无公开披露；区间来自公开的自动驾驶卡车改装行业估算
        - 商业规模下，车队 capex 或经营租赁成本是主要营运资本驱动
        - 索取 Stack AV 物料清单或供应商指示性报价；评估 capex 由公司持有，还是打包进 DaaS 费用
