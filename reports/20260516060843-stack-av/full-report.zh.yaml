      - number: '4.5'
        title: 资本充足性与现金跑道评估
        blocks:
          - type: paragraph
            body: >
              Stack AV 的资本充足性无法精确评估，因为实际现金余额和月度烧钱速度都未公开披露。按已披露财务信息计算，2024 年 8 月 $150 million 的 Series B，加上估算的种子轮和 Series
              A $111 million，累计融资 $261 million。从 2023 年 9 月到 2026 年中，若扣除估计累计消耗现金 $30–$60 million，剩余流动性估计为 $200–$231
              million。按每月 $3–$6 million 的估计烧钱速度，这意味着从 2026 年中起有 33–77 个月现金跑道——但这个区间并不可靠，因为它遗漏了未宣布的 SoftBank
              分期出资，以及任何商业收入贡献。更关键的情景是假设 Stack AV 必须在 2026–2027 年融资 Series C，以支撑商业发布阶段，而这一阶段历史上需要的资本明显高于商业化前阶段。Aurora 在
              2024 年 8 月融资 $466 million，并在 FY2025 融资 $874 million 来支撑商业爬坡；Stack AV
              的商业发布同样需要在卡车购置或租赁、安全监控基础设施、客户导入和扩张外场运营上追加投资。

              RAND Corporation 的 AV 政策研究指出，自动驾驶车辆部署收益的兑现可能比乐观预测更久——投资人应将这一风险纳入 Stack AV 商业化时间表。SoftBank 据报道超过 $1 billion
              的承诺，如果按技术或商业里程碑分期发放，既提供资本后盾，也可能约束部署节奏。如果基于里程碑的分期资金无法按 Stack AV 所需时间表到账，Series C
              融资就会变成关键依赖，并可能需要从新投资人处取得。由于没有任何公开披露的未来融资、商业收入时间线或备考模型，资本充足性评估完全建立在估算和 Aurora 公开申报文件的类比上。
