  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与变现策略
        blocks:
          - type: paragraph
            body: >
              Stack AV 的收入模式是 Driver-as-a-Service（DaaS）按自动驾驶英里收费机制：车队运营商在 Stack AV 的 Level 4 系统无人驾驶 Class 8
              卡车时，按英里支付费用。这一模式与 Aurora Innovation 已商业部署的 DaaS 结构相似；Aurora FY2025 10-K
              将其描述为向承运商合作伙伴按运营中的自动驾驶英里收取服务费。按英里模式对自动驾驶卡车在结构上有吸引力，因为它直接替代 CDL 司机的可变人工成本——仅工资估计为每英里
              $0.45–$0.80，若计入福利、保险和差旅补贴则为每英里 $1.20–$1.60——这让承运商车队运营商在评估自建或购买时，经济对比更清晰。CEO Bryan Salesky 在 2023 年 9 月
              FreightWaves Q&A 中确认了按英里变现模式，但未披露具体定价或合同条款。

              截至 2026 年中，Stack AV 尚未公开披露具体 DaaS 定价、目标每英里费用，或任何已签署的创收合同。Aurora FY2025 10-K 披露，其商业服务于 2025 年 5 月 1
              日上线，首个完整商业年度产生 $3 million 收入，收入成本为 $17 million；这说明早期单位经济性处于深度负毛利状态，符合商业上线初期运营规模低、固定基础设施开销高的特征。Stack AV 与
              aurora.tech/freight 可比的定位描述了一种轻资产 DaaS 模式：AV
              技术提供商不拥有或融资卡车车队，相比垂直整合的车队所有权模式降低资本需求。次级收入流——受监督自动驾驶爬坡期的安全监控费、向 OEM 和保险公司授权数据、按车平台订阅费——仍属推测；截至 2026
              年中，没有公开证据支持任何自动驾驶卡车供应商已经跑通这些模式。
