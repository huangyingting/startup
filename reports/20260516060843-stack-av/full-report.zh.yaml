      - number: '4.2'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Stack AV 的融资形成了压缩的三轮结构，从一开始就由 SoftBank Vision Fund 2（VF2）担任领投方或锚定出资方。公司于 2023 年 9 月 7 日走出隐身状态，当时披露了
              SoftBank 的出资承诺，创始团队来自 Argo AI。隐身期前的种子轮融资估计约 $30 million，这一判断来自公司 2023 年的运营员工数和基础设施规模；在 SEC EDGAR 中，以 Stack
              AV Co 及可能的实体变体检索，尚未找到 Form D 文件。2024 年 1 月由 Sequoia Capital 领投的 Series A 约 $81 million，在 VF2
              之外引入了有声望的共同投资方，也是首个公开披露规模的轮次。CEO Salesky 在 2023 年 9 月 FreightWaves 问答中承认，SoftBank「据报道将向 Stack AV 投入 $1
              billion 或更多」，但这一数字仍未在正式文件中确认。

              2024 年 8 月由 SoftBank Vision Fund 2 领投、约 $150 million 的 Series B，是最近一次披露的机构融资。截至 2026 年中，没有公开证据显示公司已完成
              Series C 或其他机构轮次。到 2026 年中，已披露加估算融资合计 $261 million，显著低于 Aurora 约 $3.5 billion 的累计股权融资，但以 Stack AV
              当前员工数和开发阶段看，仍代表一个资金较充足的商业化前 AV 项目。缺少 Form D 文件是重要尽调缺口：投资人无法独立核验轮次规模、投资人身份、稀释情况，以及未偿还的可转债或
              SAFE。Post-Gazette 对 Stack AV 2023 年 9 月走出隐身状态的报道确认了 SoftBank 支持，但没有披露轮次机制或估值。
            claimRefs:
              - CI009
              - CI010
      - number: '4.3'
        title: 成本结构与烧钱速度分析
        blocks:
          - type: paragraph
            body: >
              Stack AV 没有公开披露运营成本结构。公司仍处于商业化前阶段，成本画像大约 70–85% 会落在研发上，这与 Aurora FY2024 研发占总运营费用 86%（$676 million / $786
              million）一致。Stack AV 规模更小——估计 200–300 名员工，而 Aurora 商业发布时约 1,800 人——意味着绝对烧钱额按比例更低。若用 Aurora FY2024
              每名员工总运营费用（每年 $438,000）套到 Stack AV 250 人的估算上，隐含年成本为 $109 million，即每月 $9 million。这个人均代理指标很可能高估 Stack AV
              的烧钱速度，因为 Aurora 已承担商业服务交付成本（收入成本、外场运营基础设施），而 Stack AV 尚未发生这些成本。按每名员工 $150,000–$290,000
              的下限估算——更符合没有商业服务开销的早期工程组织——公司估计每月消耗现金 $3–6 million。

              Stack AV 的主要成本驱动项包括感知、运动规划、仿真和系统工程的工程员工数；GPU 训练与仿真计算基础设施；测试卡车车队的所有权和运营成本；以及用于车队仪表化的传感器硬件。BLS
              工伤和疾病数据确认，长途卡车运输属于受伤率最高的职业之一，这为承运商采用框架中的安全价值主张提供了补充，叠加每英里定价。FMCSA 的强制商业驾驶执照要求规定了现有人工标准；按工时规定，CDL
              持有人每天法定驾驶上限为 11 小时，而自动驾驶系统理论上每天可运行 22 小时或更久，这构成 AV 溢价定价的利用率论据。ATA 报告称，2024 年美国卡车运输总收入为 $906
              billion，司机人工约占总货运成本的 35–40%——估计每年可替代的司机成本为 $317–$362 billion，锚定了 AV DaaS 提供商的收入机会。
