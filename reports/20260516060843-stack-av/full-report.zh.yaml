      - number: '3.6'
        title: 展示材料
        blocks:
          - type: callout
            title: Aurora 的 Going-Concern 风险也是行业风险
            body: >
              Aurora Innovation 的 $600 million 年运营亏损和 going-concern 披露，是整个 Level 4 卡车行业的系统性风险。如果 Aurora
              在实现商业规模收入之前失败——就像 Embark 和 TuSimple 此前那样——Level 4 卡车的声誉受损可能让承运商在 12–24 个月内降低与任何 AV 供应商合作的意愿。Stack AV
              的上线时间应纳入这一情景：在 Aurora 证明持续商业可行性后上线，可以降低技术风险；上线过近，则可能共同暴露在任何早期 Aurora 事故带来的声誉风险中。
            calloutType: insight
            claimRefs:
              - CP009
              - CP027
              - CP043
          - type: callout
            title: Waymo Via 退出移除了最危险的长期竞争者
            body: >
              Waymo 决定关闭 Via（卡车）业务，把近期格局中财务上最强大的潜在竞争者移出场。Alphabet 的资产负债表，加上 Waymo One 的世界级 AV
              技术，本可承受长期亏损，并在车队合作中激进抢地盘，这是资本受限的独立公司无法匹敌的。Waymo Via 缺席为 Stack AV 在 2025–2030 年建立车队关系打开窗口，之后 Alphabet
              仍可能重新进入。投资者应跟踪 Waymo Arizona 卡车测试，把它作为重新进入的领先指标。
            calloutType: insight
            claimRefs:
              - CP003
              - CP025
          - type: callout
            title: 竞争者退出验证了资本强度护城河
            body: >
              Embark 和 TuSimple 的退出反而强化了资金充足幸存者的投资逻辑，尽管两家公司巅峰期拥有的公开资本都超过 Stack AV。商业规模 Level 4 AV 系统的实证成本达到 $1–3 billion
              或更多，构成以经验证据支撑的新进入财务壁垒。截至 2026 年中，竞争格局很可能已接近商业阶段的最终阵容，关键问题不再是「市场有多拥挤？」，而是「剩下五家谁能活到商业规模？」
            calloutType: insight
            claimRefs:
              - CP002
              - CP026
              - CP027
              - CP042
          - type: callout
            title: Plus AI 的 ADAS 模式推迟承运商对完整 Level 4 的承诺
            body: >
              Plus AI 商业上成功的 SuperDrive ADAS 产品，对 Stack AV 构成间接竞争风险：它给车队运营商提供了成本更低、风险更低且能改善司机表现的技术产品，从而降低承运商承诺 Level 4
              的紧迫感。已经支付 ADAS 订阅费的车队运营商，技术变更预算更少，也可能把 Level 4 视为未来升级。Stack AV 应跟踪 Plus AI 的承运商渗透率，把它作为 Level 4
