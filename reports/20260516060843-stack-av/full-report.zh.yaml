      - number: '7.4'
        title: 风险总结、缓释措施与终止标准
        blocks:
          - type: paragraph
            body: >
              合并风险热力图显示，四项残余严重度为 Critical 的风险都可能打穿投资逻辑：（1）FMCSA 阻断无人驾驶豁免，使商业运营无法启动；（2）SoftBank 撤回融资，引发持续经营问题；（3）致命 AV
              事故触发监管停摆与责任连锁反应；（4）Aurora 或 Waymo 的 IP 禁令叫停部署。残余高风险包括 50 州监管拼图、网络安全暴露、规模化 OTA 失败和关键人离职。残余中风险包括 EPA 排放不合规和
              OEM 集成延误。[CR001] [CR002] [CR006] [CR014] [CR023] [CR026]

              缓释充分性差异很大。监管缓释偏弱——Stack AV 尚未公开向 FMCSA 提交无人驾驶豁免申请，也未披露专门的监管事务团队。IP 缓释尚未确认——公司没有发布
              freedom-to-operate（FTO）分析，也没有确认 Argo AI 专利转让。财务缓释仅限于 $81M Series A runway。运营缓释更成熟——团队的 Argo AI
              背景带来安全工程基础设施，但没有发布第三方 safety case 验证。[CR019] [CR033] [CR038]

              终止标准可以明确监测，应该嵌入投资人监控框架。五个打穿投资逻辑的事件是：（1）FMCSA 拒绝或无限期拖延无人驾驶豁免路径；（2）SoftBank 未在 18 个月内承诺 Series B；（3）Stack AV
              的 ADS 导致致命 AV 事故；（4）Aurora 或 Waymo 发出 IP 禁令；（5）CEO 或 CTO 在第 1–3 年离职。次级监控触发器包括 Aurora 商业化节奏（投资逻辑基准）、Luminar
              财务健康，以及各州 AV 立法日程。[CR014] [CR032] [CR033]

              尽调优先事项：（1）确认 FMCSA 豁免申请状态；（2）确认 Argo AI 校友的 IP 转让；（3）OEM 合同条款；（4）保险结构与限额；（5）网络安全审计；（6）持续经营披露审查；（7）以 Aurora
              货运量为基准，判断监管可行性时间。
