  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反逻辑
        blocks:
          - type: paragraph
            body: >
              Stack AV 的投资逻辑建立在三根结构性支柱上。第一，美国 Class 8 卡车市场年规模超过 $900B，且天然暴露于自动驾驶颠覆：有记录的司机缺口超过 80,000 个岗位（ATA
              2023），燃油和人工成本占运营费用超过 60%，监管窗口则奖励那些在规模化商业化前先拿到 FMCSA 无人驾驶豁免的早行动者。AV 卡车市场预计 2026 年为 $42.63B，到 2031 年增至
              $74.23B，CAGR 为 11.73%；Level 4 平台预计 CAGR 为 15.21%。[CV009] [CV035] [CV036] [CV039]

              第二，Sequoia Capital 与 SoftBank Vision Fund 2 是顶级资本配置方，且直接押注创始团队。Bryan Salesky（CEO）、Brett Browning（CTO）与
              Peter Rander（President）是 Argo AI 联合创始人，在 Stack AV 创立前已在 AV 技术前沿运营六年。Argo AI IP 传承，包括在 Ford 与 Volkswagen
              支持的 $3.6B 项目中开发的传感器融合架构和安全系统，为公司提供了从零起步的创业公司没有的技术先手。Aurora Innovation 在 FY2025 10-K 中明确将 Stack AV
              列为竞争对手，确认了其行业合法性。[CV001] [CV004] [CV007] [CV010]

              反逻辑同样有充分证据。Aurora Innovation 领先商业化超过 18 个月，已有真实付费客户（截至 2026 年 Q1 为 7 家）、签署 McLane 协议，并取得 Hirschbach 500
              辆卡车 MOU——这些都发生在 Stack AV 公开宣布任何商业路线或客户之前。TuSimple 的失败说明，AV 卡车的治理、监管和执行风险不是理论问题：三年内摧毁了 $8.5B 价值。截至 2026 年 5
              月，Stack AV 在财务和运营上完全不透明——无收入、无客户、无审计财务、未披露 FMCSA 申请——使外部几乎无法基于公开资料独立尽调。熊市情景概率为 45%（bear + extreme bear
              合计），反映的就是这种结构性不透明。[CV005] [CV006] [CV008] [CV011] [CV012]
