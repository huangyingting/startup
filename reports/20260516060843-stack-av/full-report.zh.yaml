      - number: '4.6'
        title: 财务风险与投资人考量
        blocks:
          - type: paragraph
            body: >
              Stack AV 投资人的财务风险画像包括五大类。第一，商业化延迟风险：如果技术就绪、监管许可或承运商采用在 2028 年之后继续延迟，公司无收入期会被拉长，累计资本需求也会大幅增加。Aurora
              的轨迹——开发六年、融资约 $3.5 billion 后才产生第一年 $3 million 收入——说明满规模 Level 4 卡车需要多深的资本池。如果 Stack AV
              需要相近资本深度，盈利前总资金需求可能达到 $1.5–$3 billion，远高于当前融资。

              第二，资本市场准入风险：自动驾驶卡车公司对股权市场环境维持运营连续性有严重依赖。2022–2023 年 SPAC 泡沫破裂淘汰了 Embark Trucks（约 $614 million
              融资，关闭时零商业收入），也让 Aurora 出现持续经营疑虑。若市场再次恶化，Stack AV 以可行条款融资 Series C 或后续轮次的能力会被严重削弱。第三，Aurora 竞争锁定风险：如果
              Aurora 快速扩大商业运营，并通过多年期 DaaS 协议锁定主要 TL 承运商——已披露伙伴包括 Werner Enterprises、Uber Freight、FedEx 和
              Hirschbach——Stack AV 商业发布时可触达的合作伙伴池会收窄。第四，SoftBank 集中风险：据报道 SoftBank 占 Stack AV 已承诺资本的大部分，如果 SoftBank
              Vision Fund 2 战略或基金表现发生变化，后续投资可能减少，或引入限制运营灵活性的里程碑条件。第五，持续经营先例：Aurora FY2024 10-K 的持续经营披露，是公开资料中最清晰的信号，表明
              Level 4 商业可行性需要股权市场持续支持；Stack AV 作为更早期、无公开财务披露的私营公司，面临同样的结构性依赖，却没有 SEC 注册报告带来的透明度。
