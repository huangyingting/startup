  - id: FE001
    slug: product-architecture-map
    title: 产品架构图——Stack AV
    type: stack
    summary: |
      自动驾驶卡车六层技术栈，从物理感知到实时 OS、中间件、AI 流水线、车队管理和运营支持。
    approximationNotes: |
      架构层依据公司公开披露（stackav.com、招聘页面）和 AV 行业惯例推断。Stack AV 尚未发布正式架构图。
    claimRefs:
      - CE002
      - CE003
      - CE004
      - CE005
      - CE007
      - CE015
    data:
      layers:
        - id: l1
          label: 传感器套件
          detail: 物理感知层，为 StackOS 提供多模态环境感知输入
          modules:
            - 远距 LiDAR（3D 点云、物体测距）
            - 多通道雷达（速度、恶劣天气鲁棒性）
            - 多光谱摄像头（车道线、交通信号、物体分类）
            - GNSS / IMU（绝对定位、航位推算）
        - id: l2
          label: 边缘计算平台
          detail: 车规级 GPU 计算硬件，在 AV 延迟要求下执行神经网络推理
          modules:
            - 车规级 GPU（NVIDIA DRIVE AGX 级或同等）
            - 硬件安全模块（OTA 完整性）
            - 定制 BSP / 合格驱动
        - id: l3
          label: StackOS——自动驾驶车辆操作系统
          detail: 专为 AV 打造的实时 OS，提供确定性执行、安全分区和传感器流水线
          modules:
            - 实时任务调度器
            - 传感器输入处理流水线
            - 内存隔离与安全分区
            - 功能安全接口层
        - id: l4
          label: Clockwork——确定性中间件
          detail: 对时间敏感的模块间编排，确保 AV 模块通信同步且受延迟边界约束
          modules:
            - 模块间时序编排
            - 消息代理（发布-订阅）
            - 时序看门狗与截止时间执行
        - id: l5
          label: AI / 自动驾驶流水线
          detail: 由 ML 驱动的感知、预测和规划技术栈，消费传感器数据并输出车辆执行指令
          modules:
            - 感知与传感器融合（物体检测、状态估计）
            - 预测引擎（动态主体轨迹预测）
            - 运动规划器（路线 + 轨迹生成）
            - 车辆控制器（CAN 总线执行指令）
        - id: l6
          label: Deploy Manager + 运营支持
          detail: 支持持续改进飞轮的车队级软件分发、远程监控和数据分析
          modules:
            - 车队级 OTA 软件分发
            - 软件版本注册表与回滚
            - Mission Control（24/7 远程监控）
            - 分诊与数据分析（事件标注、模型改进循环）
