      - number: '3.5'
        title: 竞争护城河与反向证据
        blocks:
          - type: paragraph
            body: >
              Aurora 的先发商业合作带来初始转换成本：Werner Enterprises、Uber Freight 和 FedEx 将 Aurora Driver 接入调度、车联网和维护体系后，替换周期可能需要
              12–24 个月。如果这些安排存在排他条款（未公开披露），Stack AV 切入同一批承运商的路径会受到实质限制。Torc 的 Daimler 分销护城河很厚，但范围很窄——只惠及购买新 Freightliner
              卡车的客户。Kodiak 的军方合同多元化提供了商业市场单一玩家没有的独特财务缓冲。Stack AV 的护城河建立在技术继承和人才密度之上，而非商业锁定，因此外部更难评估其耐久性。

              不利竞争动态很明显。Aurora 的 $600 million 年运营亏损和 going-concern 披露构成系统性风险：如果 Aurora 在实现商业规模收入之前失败——就像 Embark 和
              TuSimple 此前那样——Level 4 卡车整体声誉受损，可能让所有 AV 供应商的承运商合作延后 12–24 个月。高资本强度既是护城河，也是脆弱性：开发一套经验证、可商业规模化的 Level 4 AV
              系统，估计成本为 $1–3 billion 或更多；这一门槛已经被证明是区分幸存者（Aurora、Torc、Kodiak、Stack AV）和失败者（Embark、TuSimple）的生死线。2023–2024
              年货运衰退进一步压缩卡车运输行业资本开支预算，推迟了承运商 AV 投资决策。
