      - number: '5.5'
        title: 路线图、部署与技术成熟度
        blocks:
          - type: paragraph
            body: >
              2022 年 10 月 Argo AI 关闭后，Stack AV 经过约一年开发，于 2023 年 9 月走出隐身状态。创始团队在首次公开声明中披露 StackOS、Clockwork 和 Deploy
              Manager 为自研技术支柱，并称 SoftBank Vision Fund 2 是初始投资人。据报道，公司在 2024 年 8 月宣布 $150M Series
              B，但截至撰写时，未能取得确认条款的一手来源（新闻稿或 SEC 文件）。[CE016] [CE031]

              截至 2025 年中，Denver（CO）、Atlanta（GA）、Phoenix（AZ）、Dallas（TX）和 Miami（FL）的 CDL-A
              运营专员招聘信息证明公司正在多州开展主动测试，Pittsburgh 和 New
              Stanton（PA）也有相关岗位。招聘页面还列出合同分诊分析师职位，负责审查真实道路驾驶和仿真中的自动驾驶事件，按问题类型和优先级标注，并整理绩效报告。这透露出一个结构化、数据驱动的测试闭环，符合成熟 AV
              开发项目特征。[CE022] [CE032]

              Stack AV 的夜间车队监控与支持专员（3rd shift）岗位确认 Mission Control 运营已经活跃。夜间自动驾驶运营期间的远程监督，是无人驾驶商业运营模式的前置条件。[CE033]

              Aurora 2025 年 4 月在 Texas 的 Fort Worth-to-Dallas 和 Fort Worth-to-Houston 走廊商业无人驾驶发布，证明 FMCSA 豁免、州级 AV
              法律（Texas 对 AV 友好）、承运商保险框架和安全论证发布，共同构成商业无人驾驶运营的关键路径。Stack AV 在自身发布前也必须走完同一路径。[CE034]

              截至 2026 年 Q1，Stack AV 尚未公开披露商业发布时间表，整体技术成熟度仍处于开发和早期测试阶段。可能延迟商业化的关键技术风险包括：恶劣天气（雨、雪、雾、眩光）下感知系统鲁棒性、LiDAR
              硬件供应链集中、高单车传感器和计算成本（估计每辆卡车 ~$50K）、OEM
              集成复杂度，以及监管批准周期不可预测。数据飞轮——采集、标注、训练、验证、部署——必须在车队规模跑通，才能针对具体边缘案例提出安全论证。[CE038] [CE040] [CE012]
