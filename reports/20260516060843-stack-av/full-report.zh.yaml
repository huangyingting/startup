      - number: '7.3'
        title: 财务、合作伙伴与人员风险
        blocks:
          - type: paragraph
            body: >
              Stack AV 的财务风险集中在两个点：公司尚未产生收入、业务高度吃资本，以及 SoftBank Vision Fund 领投 $81M Series A 后形成的单一投资人集中度。按 Aurora
              的路径，AV 卡车行业要跑到商业发布规模，需要 $500M–$2B+ 资金；Stack AV 大概率还要 18–36 个月才能商业发布，且必须在现金耗尽前完成 Series B。SoftBank Vision
              Fund 的组合历史——包括 WeWork 在内累计减记超过 $30B——会引发 LP 审视，可能压低后续加码的信心。Sequoia Capital 参与了 Series A，但承诺规模更小。[CR023]
              [CR024] [CR025] [CR026]

              持续经营风险是二元的：如果 Stack AV 无法在 Series A 交割后约 12–18 个月内完成 Series B，公司就会撞上 runway
              cliff。目前没有披露收入、客户或商业协议可对冲这项风险。CRS 与 RAND 的研究文献也确认，AV 商业化高度吃资本，并依赖尚无明确时间表的监管落地。[CR027] [CR029] [CR031]

              保险风险重大且未解决。面向无人驾驶卡车规模化运营的商业保险定价尚不存在；Stack AV 需要自保，或设计类似 Lloyd's
              的定制化保障，任何撞车事故都会把风险压到资产负债表上。未披露保险安排，是尽调缺口。[CR030]

              合作伙伴集中度风险横跨三条线：（1）SoftBank 是主要资本来源；（2）NVIDIA 与 Luminar 是集中的硬件供应商；（3）Peterbilt 和 / 或 Freightliner 是 OEM
              卡车平台伙伴，但未披露合同条款。[CR017] [CR021] [CR024]

              人员风险关键。CEO Bryan Salesky、CTO Brett Browning 与 President Dax Rander 都是 Argo AI 前高管。CTO 是覆盖核心 AV IP 的 Argo
              AI 专利发明人；一旦离职，会同时触发关键人风险和潜在 IP 归属争议。Aurora、Waymo、Tesla 争抢同一批计算机视觉工程师，抬高流失风险。有组织劳工反对也在加压——Teamsters（350
              万会员）和 OOIDA（车主兼司机群体）积极游说反对自动驾驶卡车立法，拉长收入前 runway 风险，并在关键走廊州制造政治逆风。[CR032] [CR033] [CR034] [CR035] [CR036]
              [CR037] [CR038]
