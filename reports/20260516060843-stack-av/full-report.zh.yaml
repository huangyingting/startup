      - number: '1.5'
        title: 地理运营与规模
        blocks:
          - type: paragraph
            body: >
              截至报告日期，Stack AV 的测试和运营足迹覆盖美国七个地点。公司在 PA 匹兹堡保留核心技术开发，在 PA New Stanton 设有卡车运营枢纽。根据当前针对 CDL-A Operations
              Specialist 和 Mission Control 岗位的招聘信息，已确认活跃测试市场包括 CO Denver、GA Atlanta、AZ Phoenix、TX Dallas 和 FL Miami。

              CDL-A Operations Specialist 是主要路面岗位，要求商业驾驶执照，职责描述更接近安全驾驶员或测试操作员，而不是创收货运运营。Mission Control Specialist
              岗位被描述为夜间远程监控岗位，说明公司正在运行 24/7 自动化运营，并需要人工监督，符合 Level 4 商业化部署前阶段特征。

              截至本报告，Stack AV 尚未公开披露任何具名货运承运商合作伙伴、托运客户或创收商业货运合同。公司的运营状态看起来仍处于商业化前测试阶段，类似 Aurora Innovation 在 2025 年 5 月
              Texas 商业无人驾驶上线之前的阶段。
