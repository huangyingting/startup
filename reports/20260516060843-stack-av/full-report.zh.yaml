      - - 安全服务监控费（早期阶段）
        - 可选按英里或按趟收费，覆盖有人远程监控和受监督自动驾驶商业爬坡期的后备监督
        - 推测性；纯 AV 卡车公司尚无证据披露这类收费结构
        - 低 — 从早期商业运营要求推断；尚无公司公开把它披露为独立收入线
        - 询问 Stack AV，受监督自动驾驶阶段是否单独收安全费，还是并入基础 DaaS 价格
      - - 数据授权（长期）
        - 向 OEM、保险公司、HD-map 供应商和政府研究项目授权自有运营数据（传感器、安全事件、线路表现）
        - 推测性；截至 2026 年中，AV 卡车领域没有披露可比案例
        - 低 — 未来收入流有合理性，但没有牵引证据；Aurora 10-K 未披露数据授权收入
        - 索取与 OEM 或保险合作伙伴围绕运营数据价值的任何 MOU 或讨论记录；评估数据排他条款
