      - number: '5.4'
        title: 信任、安全与合规框架
        blocks:
          - type: paragraph
            body: >
              Stack AV 的安全治理从安全顾问委员会开始。该委员会由五名前联邦机构领导人组成：Robert Sumwalt（NTSB）、Annette Sandberg（FMCSA）、David
              Kelly（NHTSA）、Christopher Doss（FBI）和 Don Osterberg（Schneider National）。这个外部机构提供战略监督和监管可信度，在商业化前 AV
              初创公司中并不常见。委员会的存在表明，Stack AV 正在朝正式安全论证提交方向建设，而不是只依赖内部验证。[CE023]

              美国自动驾驶卡车监管框架依赖自愿遵守 NHTSA 的 AV 政策框架（AV 4.0 及后续指引），该框架鼓励但不强制进行上市前安全自评。FMCSA 规则管理商用卡车运营，并要求无人驾驶车辆取得豁免。SAE
              J3016 的 Level 4 定义约束了运营设计域：Level 4 系统必须在其 ODD 内完成所有驾驶任务，且无需人类后备接管。[CE024] [CE025] [CE026]

              安全论证方法——用支持证据构成结构化论证，证明系统在定义 ODD 内安全性可接受——正在成为 Level 4 AV 卡车商业化前事实门槛。Aurora Innovation 在 2025 年 4 月 Texas
              商业无人驾驶发布前公布了安全论证，为这类文件应包含什么提供了公开基准。截至 2026 年 Q1，Stack AV 尚未发布自愿安全自评或等效文件。[CE027] [CE028] [CE029]

              Stack AV 带安全驾驶员（运营专员）的运营，符合商业化前受监督 AV 测试协议。公司尚未提交 NHTSA 常设总令事故报告，而这类报告仅在 AV
              事故达到特定阈值时才要求提交——这与当前规模的开发阶段运营一致。ISO 26262 功能安全和 ISO 21434 网络安全标准，是硬件和软件架构预期遵循的合规框架，但正式认证状态尚未公开确认。[CE030]
              [CE027]

              Einride 2024 年获得 NHTSA 批准，可在美国公共道路上运营专门设计的无人驾驶电动卡车，这证明新型 AV 配置存在监管路径；不过每项批准都绑定具体配置，Stack AV 的 Class 8
              高速卡车仍需要自己与 NHTSA 和 FMCSA 沟通。[CE024] [CE025]
