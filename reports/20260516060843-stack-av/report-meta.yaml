      claimRefs: [CO008]
  foundingLocation: "Pittsburgh, PA"
  headquarters: "Pittsburgh, PA (with San Jose, CA office)"
  productSummary: >
    An SAE Level 4 autonomous trucking system for Class 8 long-haul freight
    consisting of StackOS (proprietary AV operating system), Clockwork (deterministic
    middleware), and Deploy Manager (fleet OTA management), delivered as
    Autonomy-as-a-Service (AaaS) on defined interstate routes.
  customerFocus: >
    Large truckload (TL) and less-than-truckload (LTL) freight carriers operating
    high-frequency Class 8 truck lanes on US interstate highways, particularly
    Texas–Southeast corridors.
  businessModel: >
    Autonomy-as-a-Service (AaaS): per-mile pricing for driverless freight transport
    on approved routes; fleet operators retain trucks while Stack AV provides the
    autonomous software stack and operational support.
  stage: "Series B (pre-commercial)"
  fundingStatus: >
    ~$261M raised across seed, Series A ($81M, Sequoia Capital, Jan 2024), and
    Series B (~$150M, SoftBank Vision Fund 2, Aug 2024). SoftBank reportedly
    committed $1B+ to the company.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO003, CO006, CO007, CO008, CI010, CI011]

summary:
  headline: >
    Stack AV offers a compelling team and AV trucking thesis but remains
    pre-commercial with high capital intensity and unresolved regulatory,
    technology, and commercialization risks — warranting a Track recommendation.
  overallScore: 6
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: unknown
