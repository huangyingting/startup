  topStrengths:
    - >
      World-class founding team: Argo AI co-founders Bryan Salesky, Peter Rander,
      and Brett Browning bring 10+ years of combined AV development experience
      at Ford/VW's $12B joint venture.
    - >
      Well-capitalized with SoftBank Vision Fund 2 as primary investor, providing
      a reported $1B+ commitment and multi-year runway at estimated burn rates.
    - >
      Large and structurally addressable TAM: US long-haul trucking represents
      $500B+ in annual revenue with chronic driver shortage and cost-reduction
      pressure making AV adoption economically compelling.
    - >
      Proprietary technology stack (StackOS, Clockwork, Deploy Manager) representing
      significant engineering depth, with Aurora Innovation's April 2025 commercial
      launch validating the AV trucking market timeline.
    - >
      Focused SAE Level 4 highway-only approach reduces technical complexity versus
      full urban AV, improving odds of successful commercialization by 2027–2028.
  topRisks:
    - >
      Pre-commercial with no revenue: extended pre-revenue period increases capital
      intensity risk; Aurora's going-concern warnings ($700M+ cash, heavy burn) signal
      sector-wide capital challenges even after commercial launch.
    - >
      FMCSA driverless exemption uncertainty: commercial scale requires federal
      regulatory approval that has not been granted; delays of 12–24 months
      would compress runway and require additional fundraising.
    - >
      SoftBank concentration risk: single-investor reliance creates follow-on
      funding vulnerability; SoftBank's portfolio stress (WeWork, FTX exposure)
      raises questions about commitment durability.
    - >
      Highly competitive landscape: Aurora Innovation (commercially launched),
      Waymo Via (strategic alternative), and incumbents Torc (Daimler-backed)
      and Plus all compete for the same OEM and fleet partnerships.
    - >
      No named commercial customers: Stack AV has not publicly announced any
      fleet carrier partnerships, creating significant go-to-market execution risk
      relative to Aurora's Werner, FedEx, and Uber Freight relationships.
  unresolvedGaps:
    - >
      Confirm post-money valuation for Series B and any anti-dilution or
      liquidation preference structure that affects common equity returns.
    - >
      Obtain FMCSA driverless exemption application status and timeline.
    - >
      Verify actual monthly cash burn rate and runway at current spending levels.
    - >
      Identify any named fleet carrier pilot or letter-of-intent partners.
    - >
      Assess SoftBank's follow-on commitment conditions and tranching structure.
    - >
      Confirm patent portfolio strength and exposure to Aurora/Waymo IP claims.

