  - id: retention-durability
    title: Retention and Durability
    body: >
      No NRR, GRR, churn, renewal, cohort, or satisfaction data can be established for Stack AV
      because the company has not entered commercial operations. Aurora's commercial program is
      less than one year old as of mid-2026 and its carrier contract terms — including per-mile
      pricing, contract length, exclusivity, and renewal structures — have not been publicly
      disclosed. Retention analysis must therefore rely on structural inference about the
      economics and switching costs of AV trucking adoption once deployed. [CU025] [CU026]

      Structural retention durability in AV trucking is expected to be high relative to software
      SaaS benchmarks because adoption requires hardware installation on owned or leased trucks,
      terminal-level integration, driver retraining, and reconfiguration of dispatch systems.
      These are not contractual lock-ins; they are integration costs that rationally discourage
      switching even in the absence of long-term contracts. The analogy is ERP adoption: once a
      carrier redesigns operations around an AV system, the switching cost exceeds incremental
      contract savings in most scenarios. [CU027]

      Two structural factors reduce expected retention for carriers with unionized workforces.
      First, Teamsters polling data shows 83% of Pennsylvania voters are uncomfortable with
      driverless semi-trucks; any carrier with Teamsters contracts faces internal opposition
      that could limit AV system adoption to non-union corridors. Second, OOIDA's 150,000+
      owner-operator members have opposed AV legislation lacking human safety operator
      requirements, signaling that the independent trucking segment will resist driverless
      operations for the foreseeable future. Together these forces structurally reduce the
      captive large-carrier buyer base for Stack AV's eventual commercial program. [CU028] [CU029]

      Long-term contract durability depends on uptime/reliability guarantees, insurance carrier
      acceptance, and FMCSA compliance certification — none of which are defined for Stack AV
      as of mid-2026. [CU030]
    claimRefs:
