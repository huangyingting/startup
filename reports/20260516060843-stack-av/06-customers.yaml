callouts:
  - calloutType: risk
    title: Union and Owner-Operator Opposition Constrains Large-Carrier Buyer Base
    body: >
      Teamsters polling (83% of Pennsylvania voters uncomfortable with driverless semi-trucks)
      and OOIDA's organized opposition to driverless AV legislation without human safety
      operator requirements are not fringe signals — they reflect structured, well-resourced
      advocacy with legislative relationships. Any Stack AV target carrier with Teamsters
      contracts will face internal opposition to AV adoption, structurally reducing the
      non-union or union-waiver carrier segment to the near-term addressable market. Diligence
      must map unionization rates across Stack AV's prospective carrier partners.
    claimRefs:
      - CU028
      - CU029

  - calloutType: insight
    title: Named Customer Proof Gap Is Expected for Stage but Requires Active Diligence Mitigation
    body: >
      Stack AV's zero named customer proof as of mid-2026 is consistent with its pre-commercial
      development stage — Aurora itself did not announce named carrier partnerships until well
      into its commercial testing phase. However, the gap is a diligence risk, not a validation
      point: the absence of disclosed LOIs, carrier introductions, or pilot agreements means the
      analysis cannot confirm that commercial customer acquisition has begun. Investors should
      pursue carrier reference checks through industry networks and request any undisclosed
      letters of intent from management as a condition of due diligence.
    claimRefs:
      - CU007
      - CU021
      - CU023

