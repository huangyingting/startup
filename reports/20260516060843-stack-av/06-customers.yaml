chapter:
  number: 6
  title: Customers
  summary: >
    Stack AV is pre-commercial as of mid-2026 and has disclosed no named paying customers,
    pilot agreements, or letters of intent. The company benchmarks against Aurora Innovation's
    April 2025 commercial driverless launch on the Dallas–Houston corridor — anchored by Werner
    Enterprises, Uber Freight, Hirschbach, and FedEx as Aurora's production carrier partners —
    as the nearest-term reachable customer model. Structural demand drivers are strong: a 60,000+
    driver shortage, 72.7% freight share by weight, and a $42.63B global market in 2026 growing
    at 11.73% CAGR. Adoption friction is material: Teamsters union opposition, OOIDA advocacy
    against driverless ops, and an incomplete federal regulatory framework all constrain the
    captive carrier buyer base. Customer concentration risk is high if Stack AV replicates
    Aurora's anchor-tenant corridor model. No retention, NRR, or cohort data can be established
    pre-commercially; diligence must pursue carrier reference checks and any undisclosed LOIs.

sections:
  - id: customer-segmentation
    title: Customer Segmentation
    body: >
      Stack AV's addressable customer base consists of the approximately 580,000 active US motor
      carriers competing for a share of the $900B+ annual trucking market. Within this universe,
      the actionable buyer segment for a first-generation autonomous trucking system is narrower:
      large truckload carriers (100+ power units) and third-party logistics providers (3PLs) with
      dedicated lane contracts and procurement infrastructure to absorb a multi-year pilot cycle.
      [CU001] [CU002]

      The buyer/user/payer segmentation in AV trucking is more complex than in typical SaaS sales.
      The user is the carrier operations team operating the truck; the buyer is typically the
      carrier's VP of Innovation or CDO who evaluates technology partnerships; the payer is the
      carrier's P&L, which may be partially offset by load revenue from 3PL booking intermediaries.
      Aurora's commercial model with Uber Freight — where Uber Freight ($17B+ in freight under
      management, serving 1 in 3 Fortune 500 shippers) books loads on Aurora's driverless
      capacity — illustrates the 3PL-as-intermediary payer structure Stack AV will likely need
      to replicate. [CU003] [CU008]

      The target use case is hub-to-hub long-haul highway freight on interstate corridors over
      250 miles, where operating domain predictability is highest and the driver shortage pain is
      most acute. Large-fleet carriers and 3PLs are the strategic buyer segment because they have
      dedicated lane volumes, the financial scale to absorb pilot costs, and the engineering
      resources to integrate AV systems at the terminal and dispatch level. LTL carriers and
      owner-operators are structurally excluded from the initial addressable segment due to
      multi-stop route complexity and insufficient economies of scale. [CU004] [CU005] [CU006]

      As of mid-2026, Stack AV has not announced any named customer relationships. Job postings
      for CDL-A Operations Specialists across at least five corridors (Denver–Atlanta, Phoenix,
      Dallas, Miami) confirm active testing but not commercial customer acquisition. [CU007]
