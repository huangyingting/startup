  - calloutType: risk
    title: Sector History of Capital Destruction
    body: >
      Argo AI—directly founded by the same team leading Stack AV—burned through more than $2.6 billion in
      venture capital before a catastrophic shutdown. No autonomous trucking company had achieved commercial
      scale at the time Stack AV was founded. Bryan Salesky himself acknowledged this in public. Investors
      face a sector with proven capital intensity and uncertain ROI timelines.
    claimRefs:
      - CO041
      - CO042
      - CO043

  - calloutType: risk
    title: Funding Verification Gap
    body: >
      The reported $150M Series B (August 2024) and SoftBank's $1B+ commitment could not be independently
      verified from accessible public sources. All press release and news article URLs attempted returned
      404 errors. Investors should treat funding figures as reported but unconfirmed pending direct
      company or investor disclosure.
    claimRefs:
      - CO033
      - CO034

  - calloutType: insight
    title: Regulatory Credibility Through Safety Council
    body: >
      Stack AV's Safety Advisory Council includes five former heads of federal agencies (NTSB, FMCSA,
      NHTSA, FBI) and a major trucking company safety executive. This is an unusual and credible signal
      of regulatory seriousness for a pre-commercial AV startup, suggesting early relationship-building
      with the agencies that will ultimately certify commercial operations.
