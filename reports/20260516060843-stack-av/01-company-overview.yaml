  - id: geographic-operations
    title: Geographic Operations and Scale
    body: >
      Stack AV's testing and operations footprint spans seven locations across the United States as of the
      report date. The company maintains its core technology development in Pittsburgh, PA, and truck
      operations hub at New Stanton, PA. Active test market operations are confirmed in Denver, CO;
      Atlanta, GA; Phoenix, AZ; Dallas, TX; and Miami, FL, based on current job postings for CDL-A
      Operations Specialists and Mission Control roles in each market.

      The CDL-A Operations Specialist role is the primary on-road role, requiring a commercial driver's
      license and describing responsibilities consistent with safety driver or test operator functions rather
      than revenue-generating freight operations. Mission Control Specialist roles—described as overnight
      remote monitoring positions—indicate the company is running 24/7 automated operations that require
      human supervisory oversight, consistent with a pre-Level 4-commercial-deployment stage.

      Stack AV has not publicly disclosed any named freight carrier partners, shipper customers, or
      revenue-generating commercial freight contracts as of this report. The company's operations appear
      consistent with a pre-commercial testing phase, analogous to where Aurora Innovation was before its
      May 2025 commercial driverless launch in Texas.
    claimRefs:
      - CO036
      - CO037
      - CO038
      - CO039
      - CO040

  - id: milestone-history
    title: Milestone History and Adverse Context
    body: >
      Stack AV's founding story is inseparable from the October 2022 collapse of Argo AI, which represents
      the most visible capital implosion in the autonomous vehicle sector. Argo AI raised over $2.6 billion
      from Ford and Volkswagen, was once valued at $12.4 billion, and was shut down when both automakers
      withdrew funding, citing the timeline and capital requirements for achieving commercial scale. Bryan
      Salesky's FreightWaves interview after Stack AV's stealth exit explicitly acknowledged this history
      and noted that "no one's actually scaled anything yet" in autonomous trucking.

      Against this backdrop, Stack AV's milestone history tracks from the Argo AI shutdown through founding,
      stealth operations, the September 2023 public emergence, and the reported August 2024 Series B. The
      company has made measurable progress in geographic expansion, safety governance, and regulatory
      transparency (through the VSSA publication), but has not disclosed any commercial freight revenue or
      named carrier customers.

      The autonomous trucking competitive landscape has evolved significantly during Stack AV's stealth and
      post-stealth period. Aurora Innovation, also backed by major capital, became the first company to
      launch commercial driverless trucking operations in the United States on May 1, 2025. Kodiak AI and
      Torc Robotics (a Daimler subsidiary) remain active in the space. Stack AV has not announced commercial
      operations, meaning it trails Aurora Innovation on the commercialization timeline.
