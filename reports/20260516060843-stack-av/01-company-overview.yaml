  evidenceGaps:
    - type: missing-source
      severity: material
      topic: funding-series-b
      missingEvidence: >
        Verified primary source (press release, SEC filing, or first-tier news article) confirming the
        $150M Series B funding round in August 2024, including specific investors, valuation, and terms.
        Dozens of URL variants attempted; all returned 404 or access-blocked status.
      whyItMatters: >
        The $150M Series B is the most recent and significant disclosed financial event. Without
        verification, total capital raised, cap table composition, and post-money valuation cannot be
        confirmed. This affects financial risk assessment and capital adequacy analysis.
      diligencePath: >
        Request cap table and Series B term sheet directly from company. Alternatively, obtain
        confirmation from SoftBank Vision Fund 2 LP communications or the company's legal counsel.
      relatedQuestionRefs:
        - QO009
        - QO012
      relatedTableRefs:
        - TO003

    - type: private-evidence-only
      severity: material
      topic: headcount-revenue
      missingEvidence: >
        Stack AV has not disclosed employee count, annual revenue, or any operational financial
        metrics in any accessible public source. As a private company, no filing obligations apply.
      whyItMatters: >
        Without headcount, unit economics cannot be estimated. Without revenue, burn rate, runway,
        and capital efficiency are unverifiable. These are critical inputs to any valuation model.
      diligencePath: >
        Request management accounts, board deck, and cap table in formal diligence process.
        Alternatively, triangulate headcount from LinkedIn profile counts and job posting volume.
      relatedQuestionRefs:
        - QO005
        - QO006
        - QO007
        - QO008

    - type: private-evidence-only
      severity: material
      topic: cap-table-equity
      missingEvidence: >
        Founding team equity percentage, post-Series B dilution, board composition, and any
        secondary transactions have not been publicly disclosed.
      whyItMatters: >
        Founder equity alignment, board control dynamics, and key-person incentive structures are
        critical to assessing governance and long-term commitment. Key-person concentration is
        already high (3 founders hold all named executive roles).
      diligencePath: >
        Obtain capitalization table in diligence. Confirm vesting schedules and any existing
        secondary sales by founders. Request board composition and meeting minutes.
      relatedQuestionRefs:
        - QO020
      relatedTableRefs:
        - TO002

    - type: missing-source
      severity: minor
      topic: patents-ip
      missingEvidence: >
        No accessible public patent filings were found for Stack AV Co, StackOS, Clockwork, or
        related autonomous vehicle technologies in the USPTO database or accessible patent aggregators.
      whyItMatters: >
        Patent protection for core middleware (Clockwork, StackOS) is relevant to competitive moat
        assessment. Lack of public filings may indicate provisional patents, trade secret strategy,
        or genuinely limited IP protection.
      diligencePath: >
        Conduct formal USPTO PAIR search using Stack AV Co as applicant. Request IP schedule from
        company, including any trade secret protection agreements.
      relatedQuestionRefs:
        - QO019

    - type: missing-source
      severity: minor
      topic: founding-date-exact
      missingEvidence: >
        The exact Stack AV Co incorporation date and state are not publicly disclosed. The company
        emerged from stealth September 7, 2023, but was likely incorporated in late 2022 or early 2023.
      whyItMatters: >
        Precise founding date affects milestone timeline construction and is relevant for evaluating
        the speed of development from inception to test operations.
      diligencePath: >
        Delaware Division of Corporations or Secretary of State filings (if incorporated in Delaware)
        for Stack AV Co will show exact incorporation date. Request from company directly.
