chapter:
  number: 1
  title: Company Overview
  summary: >
    Stack AV Co is a Pittsburgh-based autonomous trucking startup founded by the core team behind Argo AI—Bryan
    Salesky (CEO), Peter Rander (President), and Brett Browning (CTO)—following Argo AI's October 2022
    shutdown. Backed by SoftBank Vision Fund 2 with a reported $1 billion-plus commitment and a reported $150M
    Series B in August 2024, Stack AV is building a Class 8 SAE Level 4 autonomous trucking system built around
    its proprietary StackOS operating system and Clockwork middleware, with active test operations spanning seven
    U.S. states and a credentialed Safety Advisory Council drawn from former NTSB, FMCSA, and NHTSA leadership.

sections:
  - id: company-identity-strategy
    title: Company Identity and Strategy
    body: >
      Stack AV Co is an autonomous trucking startup headquartered in Pittsburgh, Pennsylvania, with a secondary
      operations facility in New Stanton, PA. The company's core mission is to commercialize SAE Level 4
      autonomous driving technology for Class 8 long-haul freight trucks—the 53-foot semis that carry the bulk
      of U.S. goods across interstate corridors. Its product is a full autonomous driving system that eliminates
      the need for a human operator under defined highway conditions, targeting the hub-to-hub long-haul market
      where predictable routes make Level 4 deployment most tractable.

      Stack AV emerged from stealth on September 7, 2023, with the backing of SoftBank Vision Fund 2 as its
      primary investor. The company was founded by veterans of Argo AI, Ford and Volkswagen's joint autonomous
      vehicle effort that was once valued at $12.4 billion before shutting down in October 2022 when both
      automakers withdrew. Stack AV's strategy centers on lessons learned from Argo AI: a narrower product
      scope (long-haul trucks only, not robotaxis or last-mile), tighter capital discipline, and a safety-first
      development methodology anchored by a formal Safety Advisory Council with former federal agency heads.

      The company's technology stack is built around three core components: StackOS, a purpose-built autonomous
      vehicle operating system; Clockwork, the middleware layer that orchestrates timing-critical AV functions;
      and Deploy Manager, the infrastructure toolchain for fleet-scale software deployment. These proprietary
      components reflect the founding team's view that autonomous trucking requires tight vertical integration
      between the AI/ML stack, the real-time systems layer, and the physical hardware platform.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
