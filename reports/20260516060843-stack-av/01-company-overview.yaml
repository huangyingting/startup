callouts:
  - calloutType: strength
    title: Founding Team Depth
    body: >
      Bryan Salesky, Peter Rander, and Brett Browning collectively hold doctorates from Carnegie Mellon
      University and the University of Queensland, have founded and led a $12.4B peak-valuation autonomous
      vehicle company, and carry direct relationships with SoftBank capital and former senior federal
      regulators. This is the deepest founding team pedigree in autonomous trucking.
    claimRefs:
