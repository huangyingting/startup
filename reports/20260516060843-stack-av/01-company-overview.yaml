  - id: technology-platform
    title: Technology Platform
    body: >
      Stack AV's autonomous trucking system is centered on three proprietary technology components. StackOS is
      the company's purpose-built autonomous vehicle operating system, providing the real-time execution
      environment for sensor processing, perception, prediction, and planning modules. Clockwork is the
      middleware layer that governs the timing-critical orchestration between these modules, ensuring
      deterministic behavior under highway driving conditions. Deploy Manager is the fleet-scale software
      deployment infrastructure that enables over-the-air updates and version management across the operating
      truck fleet.

      The technical team is organized around functional AI/ML domains: Perception (object detection, sensor
      fusion), Tracking (object state estimation and prediction), and Trajectory and Controls (motion planning
      and vehicle control). These teams work in Pittsburgh, PA, with additional operations personnel in New
      Stanton, PA, and test markets across six additional states. Stack AV operates on a 24/7 mission control
      model, with overnight Mission Control Specialist roles overseeing autonomous operations remotely.

      Stack AV targets SAE Level 4 autonomy, defined as automated driving with no human operator required
      within the Operational Design Domain (ODD). Under the SAE J3016 taxonomy, Level 4 systems must handle
      all driving tasks and emergencies within their ODD without driver intervention. Stack AV's ODD is
      highway long-haul routes between distribution hubs. The company has published a Voluntary Safety
      Self-Assessment (VSSA) report following industry best-practice transparency norms established by
      organizations including the National Highway Traffic Safety Administration.
    claimRefs:
