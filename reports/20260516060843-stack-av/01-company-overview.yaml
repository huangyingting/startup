  - id: investor-backing-funding
    title: Investor Backing and Funding
    body: >
      Stack AV's primary financial backer is SoftBank Vision Fund 2, the second iteration of SoftBank Group
      Corporation's flagship technology investment vehicle. At the time of the company's September 2023 stealth
      exit, SoftBank was reported to be committing $1 billion or more to Stack AV—an unusually large commitment
      for a company at its stage. SoftBank's interest in Stack AV reflects its broader thesis on autonomous
      mobility and the Vision Fund 2's portfolio strategy in deep-technology logistics.

      In August 2024, Stack AV was reported to have raised a $150 million Series B funding round. However,
      verification of the specific investors, valuation, and round terms from direct primary sources was not
      possible at the time of this report; all reporting accessible via public URL returned 404 errors or
      access restrictions. The $150M figure is treated as reported but unverified for this analysis, and the
      investor composition beyond SoftBank's confirmed participation remains an open evidence gap.

      The total capital raised by Stack AV (including both the reported Series B and any prior tranches of
      SoftBank commitment) is not publicly confirmed. The founding team's equity position, secondary
      transactions, and cap table structure are not disclosed. Given Argo AI burned through more than $2.6
      billion of Ford and Volkswagen capital before shutdown, Stack AV's capital efficiency is a critical
      diligence dimension that cannot yet be fully assessed from public sources.
    claimRefs:
      - CO031
      - CO032
      - CO033
      - CO034
      - CO035
