      competitive differentiation has been published. No patent filings in Stack AV''s name are publicly identifiable in the
      USPTO database as of May 2026.

      '
    whyItMatters: 'Stack AV''s competitive differentiation claims versus Aurora cannot be independently validated; without
      technical assessment, the thesis premium above Kodiak comparables ($500M) cannot be justified from public evidence.

