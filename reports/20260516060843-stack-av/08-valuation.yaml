  evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: financial-statements-runway
    missingEvidence: 'Stack AV has no obligation to publish financial statements as a private company. No P&L, balance sheet,
      cash burn rate, going-concern assessment, or Series B close date has been made public. The company''s runway, monthly
      burn, and milestone-funding alignment are entirely unknown from public sources.

      '
    whyItMatters: 'Without confirmed runway and burn rate data, investors cannot assess whether Stack AV will reach its next
      commercial or technical milestone before requiring additional capital. A funding gap could force a down-round, distressed
      sale, or closure — the primary bear case catalyst.

      '
    diligencePath: 'Request audited or reviewed financial statements, board-approved budget, and 18-month cash flow forecast
      from Stack AV management; confirm Series B close date, current cash balance, and monthly burn rate through CFO.

      '
    relatedQuestionRefs:
    - QV006
    - QV018
    - QV023
    relatedTableRefs:
    - TV006
  - type: missing-source
    severity: blocking
    topic: fmcsa-exemption-petition
    missingEvidence: 'No public FMCSA docket, petition, or exemption application by Stack AV has been identified. FMCSA''s
      publicly available exemption database does not contain any Stack AV filing as of May 2026.

      '
    whyItMatters: 'The absence of an FMCSA petition means the regulatory critical path has not been formally initiated by
      Stack AV; without this filing, the base case timeline (exemption by 2027) is not anchored to any regulatory process,
      making it speculative.

      '
    diligencePath: 'Check FMCSA public exemption docket; request from Stack AV management any regulatory correspondence with
      FMCSA including pre-filing consultations, letters of inquiry, or informal agency feedback.

      '
    relatedQuestionRefs:
    - QV028
    - QV013
    relatedTableRefs:
