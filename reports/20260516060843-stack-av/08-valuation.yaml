    statement: 'Stack AV has raised approximately $261M in total disclosed funding across three rounds: a Seed round of approximately
      $30M in late 2022–early 2023, a Series A of $81M led by Sequoia Capital in January 2024, and a Series B of approximately
      $150M led by SoftBank Vision Fund 2 in August 2024.

