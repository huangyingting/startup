chapter:
  number: 8
  title: Valuation
  summary: 'Stack AV warrants a TRACK / Research-More recommendation with Medium confidence and a High risk rating. The company
    has raised ~$261M across Seed (~$30M), Series A ($81M Sequoia, Jan 2024), and Series B (~$150M SoftBank Vision Fund 2,
    Aug 2024) with no disclosed post-money valuation; the implied range of $500M–$1B is estimated from round size and sector
    comparables only. Aurora Innovation (AUR), the closest public peer, trades at $15.12B market cap in May 2026 after launching
    commercial driverless operations in April 2025 and signing McLane (Berkshire Hathaway) in May 2026, establishing a premium
    option-value benchmark. Mobileye ($8.44B on $1.89B revenue, ~4.5x P/S) anchors a revenue-multiple floor once Stack AV
    achieves scale. TuSimple''s collapse from $8.5B IPO peak to Nasdaq delisting at $0.30/share is the sector''s central cautionary
    precedent. The bull case ($3B–$6B, 2028E) requires FMCSA driverless exemption, 500+ truck fleet, and $150M+ AaaS revenue;
    the base case ($1.5B–$3B) requires exemption in 2027 and 100–300 trucks — neither is verifiable from public sources as
    of mid-2026. No commitment of capital is appropriate until FMCSA exemption status, audited financials, and at least one
    signed revenue contract are confirmed.

    '
callouts:
- id: CV-call1
  type: info
  title: 'TRACK Recommendation: Option Value Anchored on FMCSA Exemption'
  body: 'Stack AV''s investment thesis is a single-catalyst, binary option: FMCSA driverless exemption unlocks commercialization;
    its absence makes the business legally inoperable at scale. Aurora''s April 2025 commercial launch and the McLane deal
    validate that enterprise AV trucking buyers exist and will pay for driverless service. Stack AV''s Argo AI heritage and
    Tier-1 VC backing provide technological and capital credibility. However, without public evidence of an FMCSA petition,
    first customer, or audited financials, the current implied valuation of $500M–$1B cannot be independently substantiated.
    The recommended posture is active monitoring with a defined diligence checklist: FMCSA filing confirmation, first signed
    LOI, and financial statements. If these are resolved positively by mid-2027, the base case valuation range of $1.5B–$3B
    supports initiating a position. [CV001] [CV002] [CV005] [CV028]

    '
  claimRefs:
  - CV001
  - CV002
  - CV005
  - CV028
- id: CV-call2
  type: risk
  title: 'TuSimple Precedent: Series B Valuation Demands Driverless Proof'
  body: 'TuSimple''s trajectory — $1.1B IPO in April 2021, $8.5B peak, voluntary delisting at $0.30/share in January 2024
    — is the clearest data point on what happens to an AV trucking company that cannot convert capital into commercial operations.
    Stack AV shares three structural parallels with TuSimple at its Series B stage: pre-revenue, pre-driverless, and deep
    regulatory dependency. The difference is that Stack AV inherits superior IP from Argo AI and has Sequoia and SoftBank
    conviction rather than TuSimple''s corporate partners. Nevertheless, the TuSimple failure raises the appropriate discount
    rate for AV trucking pre-commercial investments and argues for a demanding diligence bar before capital commitment. Goldman
    Sachs maintains a $5 Hold target on Aurora (a 35% downside from May 2026 prices), signaling that even the commercially-launched
    AV trucking leader carries significant execution risk in the eyes of a major sell-side firm. [CV021] [CV020] [CV030]

    '
  claimRefs:
  - CV020
  - CV021
  - CV030
sections:
- id: investment-thesis
  title: Investment Thesis and Anti-Thesis
  body: 'Stack AV''s investment thesis rests on three structural pillars. First, the US Class 8 trucking market exceeds $900B
    annually and is structurally exposed to autonomous disruption: a documented driver shortage exceeding 80,000 positions
    (ATA 2023), fuel and labor costs representing over 60% of operating expenses, and a regulatory window that rewards early
    movers who secure FMCSA driverless exemptions before scale commercialization. The AV trucking market is estimated at $42.63B
    in 2026, growing to $74.23B by 2031 at 11.73% CAGR, with Level 4 platforms projected at 15.21% CAGR. [CV009] [CV035] [CV036]
    [CV039]

    Second, Sequoia Capital and SoftBank Vision Fund 2 represent top-tier allocators with direct conviction in the founding
    team. Bryan Salesky (CEO), Brett Browning (CTO), and Peter Rander (President) are Argo AI co-founders who operated at
    the frontier of AV technology for six years before Stack AV''s founding. The Argo AI IP inheritance, including sensor
    fusion architecture and safety systems developed under a $3.6B program backed by Ford and Volkswagen, provides a technical
    head-start unavailable to startups building from scratch. Aurora Innovation explicitly named Stack AV as a competitor
    in its FY2025 10-K, confirming industry legitimacy. [CV001] [CV004] [CV007] [CV010]

    The anti-thesis is equally well-supported. Aurora Innovation has an 18+ month commercial lead with real paying customers
    (7 as of Q1 2026), a signed McLane deal, and a Hirschbach 500-truck MOU — all achieved before Stack AV has publicly announced
    a single commercial route or customer. TuSimple''s failure demonstrates that AV trucking governance, regulatory, and execution
    risks are not theoretical: they destroyed $8.5B in value within three years. Stack AV''s complete opacity on financials
    and operations — no revenue, no customers, no audited financials, no FMCSA filing disclosed — makes independent diligence
    effectively impossible from public sources as of May 2026. The bear case probability of 45% (bear + extreme bear combined)
    reflects this structural opacity. [CV005] [CV006] [CV008] [CV011] [CV012]

    '
