    - TV006
  - type: private-evidence-only
    severity: material
    topic: cap-table-preferences
    missingEvidence: 'No public cap table, liquidation preference structure, anti-dilution provisions, warrants, or ratchet
      terms have been disclosed for Stack AV''s Series A or Series B rounds.

      '
    whyItMatters: 'True investor return calculations are impossible without the preference overhang; in a sub- threshold exit
      (below $500M), common equity holders may receive zero proceeds; the effective entry valuation for common-equivalent
      exposure is materially higher than the implied $500M–$1B.

      '
    diligencePath: 'Request capitalization table as of Series B close; confirm all preference terms, conversion ratios, participation
      rights, anti-dilution provisions, and any board-approved warrants.

      '
