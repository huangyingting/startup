- dimension: paywallRisk
  reason: 'Morningstar (SV005) is the only paywalled source in this chapter; it contributes one analyst headline quote and
    is not cited as the sole evidence for any claim. All other 29 sources are accessible. The paywalled source (1/30 = 3.3%)
    is far below the report-level ceiling.

    '
