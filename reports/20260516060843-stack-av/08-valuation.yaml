- id: investment-kpis-diligence
  title: Investment KPIs, Diligence Asks, and Thesis-Break Triggers
  body: 'Stack AV''s investment case requires four ordered milestones to validate the base-case valuation of $1.5B–$3B by
    2028: (1) FMCSA driverless exemption confirmation, without which no commercial deployment is legally authorized; (2) minimum
    fleet deployment of 100 trucks generating AaaS revenue; (3) at least one signed commercial AaaS contract with a named
    carrier; and (4) demonstrated operating cost below $3/mile, the threshold for cost competitiveness with human-driver operations.
    Aurora''s publicly stated goal of sub-$2/mile sets the commercial benchmark. None of these milestones have been publicly
    confirmed for Stack AV as of May 2026. [CV028] [CV037] [CV038] [CV041]

    Capital requirements through commercial launch are estimated at $500M–$1B through 2028, assuming a burn rate of $150–200M
    per year beginning in 2026 as Stack AV scales toward commercial readiness. The Series B of ~$150M provides roughly 12–18
    months of runway beyond close (August 2024), implying a Series C required by Q1–Q2 2026 at the latest. If a Series C has
    not been disclosed by May 2026, either burn is lower than estimated or internal financing is being considered. The complete
    absence of public financial disclosures makes this runway analysis speculative. [CV029] [CV031] [CV032]

    Comparable SPAC-listed AV companies — Aurora, TuSimple, Luminar — all experienced >80% post-listing price declines within
    24 months, structuring the risk profile for any future Stack AV liquidity event. Investor returns at the $500M–$1B Series
    B implied entry require a $5B–$10B exit for a 5–10x return, achievable only under bull case assumptions of 1,000+ trucks
    and $300M+ AaaS revenue — a level that exceeds what Aurora has achieved commercially as of mid-2026. [CV030] [CV033] [CV034]

    The organized labor risk (Teamsters, OOIDA), EPA Clean Trucks Plan compliance requirements for 2027+ model year trucks,
    and the driver shortage as a double-edged dynamic (supports AV demand but also powers labor opposition) add additional
    complexity to the commercialization timeline. The US truck driver shortage exceeding 80,000 creates structural demand
    for automation, but organized opposition could extend state-level regulatory timelines even after federal FMCSA framework
    is established. [CV035] [CV036] [CV039] [CV040] [CV042]

    '
