  - Action
  rows:
  - - FMCSA driverless exemption denied or indefinitely delayed
    - No federal driverless CMV framework issued by December 2028
    - Complete thesis break — no commercial driverless operations legally permitted nationally
    - High
    - Downgrade to AVOID; enter negative watch; evaluate IP-only exit options.
  - - Fatal ADS crash triggering regulatory moratorium
    - Any Stack AV or sector-wide incident causing NHTSA/FMCSA to suspend AV trucking test permits
    - Industry-wide pause; Stack AV commercial deployment frozen; investor confidence and insurance coverage destroyed.
    - Critical
    - Immediate sell trigger; monitor post-moratorium regulatory response before any re-entry.
  - - Aurora reaches 1,000+ trucks before Stack AV reaches 100
    - Aurora Hirschbach MOU (500 trucks) converts and begins deployment at scale before Stack AV achieves any commercial driverless
      operations.
    - Competitive moat gap widens beyond addressable range; Stack AV becomes permanently second-tier in AV trucking; customer
      switching costs favor Aurora.
    - High
    - Downgrade from TRACK to AVOID; reassess only if Stack AV secures a top-5 US carrier as anchor customer.
  - - Series C at flat or down-round valuation
    - New financing at or below ~$750M implied valuation from Series B
    - Signals investor confidence collapse; marks-down existing entry; dilution accelerates; indicates milestones were not
      met on expected timeline.
    - High
    - Sell if exit price implies <2x on Series B entry; hold only with new FMCSA progress evidence.
  - - Departure of Bryan Salesky (CEO) or Brett Browning (CTO)
    - CEO or CTO announces departure or resignation from Stack AV
    - Argo AI IP chain and technical roadmap at risk; key-man risk crystallizes; investor confidence and Sequoia/SoftBank
      conviction destabilized.
    - Medium
    - Trigger full diligence review; pause any additional capital commitment pending succession confirmation.
- id: TV006
  slug: final-diligence-asks-table
  title: Final Diligence Asks
  notes: 'All six diligence items are required before investment commitment. Items 1-3 are blocking: without FMCSA exemption
    status, financials, and a customer contract, no base-case scenario can be validated. Items 4-6 are material.'
  claimRefs:
  - CV031
  - CV032
  - CV036
  - CV037
  - CV042
  columns:
  - Topic
  - Missing Evidence
  - Why It Matters
  - Owner
  - Diligence Path
  rows:
  - - FMCSA Driverless Exemption Filing
    - No public filing, exemption petition, or regulatory correspondence by Stack AV with FMCSA confirming any exemption strategy
      or timeline.
    - Without federal exemption, all commercial driverless plans are legally blocked regardless of technical readiness; this
      is the single most critical diligence item.
    - Stack AV management and regulatory counsel
    - Request any FMCSA exemption petition or letter of inquiry filed; confirm internal regulatory timeline estimate and whether
      AV-specific CDL exemption has been discussed with FMCSA.
  - - Audited Financials and Cash Runway
    - No audited P&L, balance sheet, burn rate, or going-concern assessment publicly available. Series B closed August 2024
      but no financial disclosures followed.
    - Cannot determine if Stack AV will reach its next commercial or technical milestone before requiring additional capital;
      runway uncertainty is a primary going-concern risk.
    - Stack AV CFO
    - Require audited or reviewed financial statements; 18-month cash flow forecast; current cash balance and monthly burn
      rate confirmed by CFO.
  - - Signed Revenue Contracts or Letters of Intent
    - No disclosed customers, signed routes, or letters of intent for AaaS contracts announced as of May 2026.
    - Commercial readiness cannot be verified; all revenue timeline claims are unsubstantiated without customer evidence;
      enterprise buyers for AV trucking demonstrably exist (Aurora / McLane).
    - Stack AV BD and Sales
    - Request executed LOIs or binding contracts; confirm customer identity, contract terms, route geography, pricing, and
      any exclusivity provisions.
  - - Argo AI IP Assignment Documentation
    - No public documentation confirming IP transfer of Argo AI patents, trade secrets, training data, and software to Stack
      AV; Brett Browning named inventor on active Argo AI LLC patents.
    - Unassigned IP from Argo AI could be asserted by Ford, Volkswagen, or Argo AI creditors, potentially blocking commercial
      operations or requiring royalty payments.
    - Outside independent IP counsel
    - Commission independent IP assignment audit; review employment contracts of all founding engineers; confirm Argo AI LLC
      wind-down IP disposition with Ford and Volkswagen counsel.
  - - Cap Table and Preference Structure
    - No public cap table, liquidation preference terms, anti-dilution provisions, warrants, or ratchets disclosed for Series
      A or Series B rounds.
    - True investor return calculation is impossible without knowing preference overhang and dilution stack; exit payoff to
      common at sub-full-preference liquidation may approach zero.
    - Stack AV general counsel
    - Request capitalization table as of Series B close including all preference terms, conversion ratios, warrants, and ratchets
      in full.
  - - Independent Technical Assessment of ADS
    - No published third-party validation of Stack AV's ADS sensor suite performance, safety case, ODD boundaries, or system
      architecture has been disclosed.
    - Competitive moat claims versus Aurora and Kodiak cannot be independently verified; technology risk and differentiation
      cannot be quantified without external assessment.
    - Independent AV engineering firm
    - Commission independent technical assessment of ADS architecture, sensor suite performance envelope, ODD boundaries,
      safety case completeness, and software validation evidence.
