          - type: callout
            title: Competitor Exits Validate the Capital Intensity Moat
            body: >
              The exits of Embark and TuSimple—both of which had more public capital than Stack AV at their
              peak—paradoxically strengthen the investment thesis for well-funded survivors. The demonstrated cost of a
              commercial Level 4 AV system at scale is $1–3 billion or more, creating a financial barrier to new entry
              grounded in empirical evidence. The competitive field as of mid-2026 is likely near its final composition
              for the commercial phase, making the key question not "how crowded is the market?" but "which of the
              remaining five will survive to commercial scale?"
