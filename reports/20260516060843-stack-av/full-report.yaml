  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              Stack AV's investment thesis rests on three structural pillars. First, the US Class 8 trucking market
              exceeds $900B annually and is structurally exposed to autonomous disruption: a documented driver shortage
              exceeding 80,000 positions (ATA 2023), fuel and labor costs representing over 60% of operating expenses,
              and a regulatory window that rewards early movers who secure FMCSA driverless exemptions before scale
              commercialization. The AV trucking market is estimated at $42.63B in 2026, growing to $74.23B by 2031 at
              11.73% CAGR, with Level 4 platforms projected at 15.21% CAGR. [CV009] [CV035] [CV036] [CV039]

              Second, Sequoia Capital and SoftBank Vision Fund 2 represent top-tier allocators with direct conviction in
              the founding team. Bryan Salesky (CEO), Brett Browning (CTO), and Peter Rander (President) are Argo AI
              co-founders who operated at the frontier of AV technology for six years before Stack AV's founding. The
              Argo AI IP inheritance, including sensor fusion architecture and safety systems developed under a $3.6B
              program backed by Ford and Volkswagen, provides a technical head-start unavailable to startups building
              from scratch. Aurora Innovation explicitly named Stack AV as a competitor in its FY2025 10-K, confirming
              industry legitimacy. [CV001] [CV004] [CV007] [CV010]

              The anti-thesis is equally well-supported. Aurora Innovation has an 18+ month commercial lead with real
              paying customers (7 as of Q1 2026), a signed McLane deal, and a Hirschbach 500-truck MOU — all achieved
              before Stack AV has publicly announced a single commercial route or customer. TuSimple's failure
              demonstrates that AV trucking governance, regulatory, and execution risks are not theoretical: they
              destroyed $8.5B in value within three years. Stack AV's complete opacity on financials and operations — no
              revenue, no customers, no audited financials, no FMCSA filing disclosed — makes independent diligence
              effectively impossible from public sources as of May 2026. The bear case probability of 45% (bear +
              extreme bear combined) reflects this structural opacity. [CV005] [CV006] [CV008] [CV011] [CV012]
