        - >-
          Tier-1 VC conviction: Sequoia Capital (Series A, $81M) and SoftBank Vision Fund 2 (Series B, ~$150M) signal
          confidence in founding team quality and market thesis.
        - >-
          PitchBook funding data; FreightWaves Q&A with Bryan Salesky confirming $81M Series A led by Sequoia (Jan 2024)
          and ~$150M Series B led by SoftBank VF2 (Aug 2024).
        - SoftBank does not lead or participate in Series C, signaling conviction loss.
      - - Thesis
        - >-
          Argo AI technical heritage: Stack AV's founding team are Argo AI's CEO, CTO, and President, inheriting
          deep-tech AV expertise, safety systems, and potential IP from a $3.6B program.
        - >-
          FreightWaves Q&A with Bryan Salesky; Aurora FY2025 10-K names Stack AV as competitor, validating industry
          legitimacy of the founding team.
