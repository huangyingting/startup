      pathway that Stack AV must execute to reach commercial revenue.
    data:
      items:
        - label: Carrier Awareness
          detail: >
            Freight carrier identifies AV trucking pilot opportunity via OEM partner introduction, industry conference,
            or competitive intelligence on Aurora's commercial program. Key trigger: driver shortage pain reaching
            decision-maker threshold.
        - label: LOI / Pilot Agreement
          detail: >
            Carrier signs letter of intent or pilot agreement for a specific hub-to-hub corridor. Requires regulatory
            clearance in corridor states, insurance agreement, and CDL-A Operations Specialist staffing plan. Stack AV
            has not reached this stage.
        - label: Supervised Testing
          detail: >
            CDL-A Operations Specialists monitor the AV system on the defined corridor. Safety event data is collected;
            carrier operations team trains on mission control interface. Stack AV is in this stage across five corridors
            as of Q2 2026.
        - label: Commercial Driverless Launch
          detail: >
            Carrier activates commercial driverless freight on approved corridor after regulatory clearance and safety
            milestone sign-off. Aurora achieved this in April 2025. Stack AV has not announced a driverless launch date.
        - label: Fleet Expansion
          detail: >
            Carrier scales autonomous units across additional corridors; 3PL booking intermediaries integrate AV
            capacity into load-matching platforms. Expansion is gated by OEM truck supply, regulatory clearance in
            additional states, and per-mile economics.
    claimRefs:
      - CU001
      - CU004
      - CU006
      - CU007
      - CU027
      - CU036
