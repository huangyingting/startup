            title: FMCSA Driverless Exemption Is the Critical-Path Regulatory Block
            body: >
              FMCSA has not issued a rule permitting commercial driverless CMV operations; CDL requirements under 49 CFR
              §383.3 continue to apply. Without a federal exemption, Stack AV cannot deploy driverless trucks
              commercially regardless of technical readiness. Aurora obtained operating authority for its Dallas–Houston
              driverless program, but the path to FMCSA driverless exemptions for all AV developers remains undefined.
              This is the single most important regulatory diligence item: confirm whether Stack AV has filed an
              exemption petition and at what stage. A failure to achieve federal framework clearance by 2028 constitutes
              a thesis-break trigger.
