  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Stack AV competes in the US commercial trucking market, specifically the long-haul (>250-mile) hub-to-hub
              segment that is most tractable for SAE Level 4 autonomous operation. The total US trucking market
              generated $906 billion in revenue in 2024, making it the dominant domestic freight mode at 72.7% of all
              freight by weight. Within this, the long-haul truckload segment—characterized by point-to-point routes
              between distribution hubs on controlled-access interstates—accounts for an estimated 35–40% of total
              revenue, or roughly $300–360 billion. This is the serviceable market that autonomous trucking platforms
              can realistically displace in the near term.

              The market boundary excludes local and regional delivery (final-mile), less-than-truckload (LTL)
              consolidation networks requiring complex handoffs, and specialized cargo requiring human judgment (hazmat,
              flatbed, temperature-sensitive freight with complex loading). It also excludes fleet management software,
              transport management systems (TMS), and adjacent logistics SaaS, which represent integration surfaces
              rather than direct revenue opportunities for Stack AV.

              The principal status-quo substitutes are human-driven Class 8 trucks operated by owner-operators or
              employed drivers. Approximately 2.235 million heavy truck drivers are employed in the US, earning a median
              wage of $57,440 per year—representing roughly $128 billion in annual driver labor costs that autonomous
              systems could partially displace. SAE J3016 Level 4 automation defines the operational design domain (ODD)
              within which Stack AV's system must perform without human intervention, limiting the initial deployment to
              well-defined, weather-resilient, high-volume freight corridors.
