      - number: '5.4'
        title: Trust, Safety, and Compliance Framework
        blocks:
          - type: paragraph
            body: >
              Safety governance at Stack AV begins with its Safety Advisory Council, comprising five former federal
              agency leaders: Robert Sumwalt (NTSB), Annette Sandberg (FMCSA), David Kelly (NHTSA), Christopher Doss
              (FBI), and Don Osterberg (Schneider National). This external body provides strategic oversight and
              regulatory credibility that is uncommon among pre-commercial AV startups. The council's existence signals
              that Stack AV is building toward a formal safety case submission rather than relying solely on internal
              validation. [CE023]

              The U.S. regulatory framework for autonomous trucking relies on voluntary compliance with NHTSA's AV
              policy framework (AV 4.0 and subsequent guidance), which encourages but does not mandate pre-market safety
              self-assessments. FMCSA regulations govern commercial truck operations and require exemptions for
              driverless vehicles. SAE J3016's Level 4 definition constrains the operational design domain: a Level 4
              system must perform all driving tasks within its ODD with no human fallback required. [CE024] [CE025]
              [CE026]

              The safety case methodology — a structured argument with supporting evidence that a system is acceptably
              safe for a defined ODD — is emerging as the de facto pre-commercial gate for Level 4 AV trucks. Aurora
              Innovation published its safety case before its April 2025 commercial driverless launch in Texas,
              providing a public benchmark for what such documentation entails. Stack AV has not yet published a
              Voluntary Safety Self-Assessment or equivalent document as of Q1 2026. [CE027] [CE028] [CE029]

              Stack AV's operations with Safety Drivers (Operations Specialists) are consistent with pre-commercial
              supervised AV testing protocols. The company has not filed NHTSA Standing General Order crash reports,
              which are required only for AV incidents meeting specific thresholds — consistent with development-phase
              operations at current scale. ISO 26262 functional safety and ISO 21434 cybersecurity standards are the
              expected compliance framework for the hardware and software architecture, though formal certification
              status is not publicly confirmed. [CE030] [CE027]

              Einride's 2024 NHTSA approval to operate a purpose-built driverless electric truck on U.S. public roads
              demonstrates that the regulatory pathway exists for novel AV configurations, though each approval is
              configuration-specific and Stack AV's Class 8 highway truck will require its own engagement with NHTSA and
              FMCSA. [CE024] [CE025]
