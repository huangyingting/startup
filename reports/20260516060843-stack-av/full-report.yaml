      - number: '1.6'
        title: Milestone History and Adverse Context
        blocks:
          - type: paragraph
            body: >
              Stack AV's founding story is inseparable from the October 2022 collapse of Argo AI, which represents the
              most visible capital implosion in the autonomous vehicle sector. Argo AI raised over $2.6 billion from
              Ford and Volkswagen, was once valued at $12.4 billion, and was shut down when both automakers withdrew
              funding, citing the timeline and capital requirements for achieving commercial scale. Bryan Salesky's
              FreightWaves interview after Stack AV's stealth exit explicitly acknowledged this history and noted that
              "no one's actually scaled anything yet" in autonomous trucking.

              Against this backdrop, Stack AV's milestone history tracks from the Argo AI shutdown through founding,
              stealth operations, the September 2023 public emergence, and the reported August 2024 Series B. The
              company has made measurable progress in geographic expansion, safety governance, and regulatory
              transparency (through the VSSA publication), but has not disclosed any commercial freight revenue or named
              carrier customers.

              The autonomous trucking competitive landscape has evolved significantly during Stack AV's stealth and
              post-stealth period. Aurora Innovation, also backed by major capital, became the first company to launch
              commercial driverless trucking operations in the United States on May 1, 2025. Kodiak AI and Torc Robotics
              (a Daimler subsidiary) remain active in the space. Stack AV has not announced commercial operations,
              meaning it trails Aurora Innovation on the commercialization timeline.
