  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Monetization Strategy
        blocks:
          - type: paragraph
            body: >
              Stack AV's revenue model is a Driver-as-a-Service (DaaS) fee-per-autonomous-mile pricing mechanism in
              which fleet operators pay a per-mile fee when Stack AV's Level 4 system drives a Class 8 truck without a
              human operator. This model mirrors Aurora Innovation's commercially deployed DaaS structure, described in
              Aurora's FY2025 10-K as a service fee charged to carrier partners on operational autonomous miles. The
              per-mile model is structurally compelling for autonomous trucking because it directly displaces the
              variable labor cost of a CDL driver—estimated at $0.45–$0.80 per mile for wages alone, or $1.20–$1.60 per
              mile including benefits, insurance, and per-diem—making the economic comparison legible for carrier fleet
              operators evaluating the make-or-buy decision. CEO Bryan Salesky confirmed a per-mile monetization model
              in a September 2023 FreightWaves Q&A without disclosing specific pricing or contract terms.

              Stack AV has not publicly disclosed specific DaaS pricing, target per-mile fee, or any signed
              revenue-generating contracts as of mid-2026. Aurora's FY2025 10-K reports that its commercial service
              launched May 1, 2025, generated $3 million in revenue in its first full commercial year, with $17 million
              in cost of revenue—indicating early-stage unit economics at deeply negative gross margin, consistent with
              a commercial launch involving low operational scale and high fixed infrastructure overhead. Stack AV's
              aurora.tech/freight-comparable positioning describes an asset-light DaaS model where the AV technology
              provider does not own or finance the truck fleet, which reduces capital requirements relative to a
              vertically integrated fleet ownership approach. Secondary revenue streams—safety monitoring fees during
              supervised autonomy ramp, data licensing to OEMs and insurers, and per-truck platform subscription
              fees—are speculative and not supported by public evidence for any autonomous trucking provider as of
              mid-2026.
            claimRefs:
