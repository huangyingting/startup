      - number: '4.4'
        title: Financial Benchmarking Against Aurora Innovation
        blocks:
          - type: paragraph
            body: >
              Aurora Innovation, Inc. (Nasdaq: AUR) is the only publicly traded pure-play Level 4 autonomous trucking
              company, making its SEC-filed financials the most rigorous available proxy for Stack AV's expected
              financial trajectory. Aurora's FY2024 10-K discloses $676 million in R&D expenses, $110 million in SG&A,
              and a $748 million net loss on zero revenue. Aurora's FY2025 10-K, filed in 2026 for the year ended
              December 31, 2025, records the company's first year of commercial operations: $3 million in revenue, $17
              million in cost of revenue, $745 million in R&D, $142 million in SG&A, and an $816 million net loss.
              Aurora's liquidity at December 31, 2025 was approximately $1.46 billion—$221 million in cash, $1.055
              billion in short-term investments, and $183 million in long-term investments—sustained by $874 million in
              net ATM equity proceeds raised during FY2025 and $466 million from a public offering in August 2024.

              Aurora's going-concern disclosures in its FY2024 10-K acknowledged that projected operating losses without
              continued capital access could raise doubt about ability to continue as a going concern. This disclosure
              is partially resolved by the May 2025 commercial launch and subsequent capital raises, but Aurora's
              commercial revenue of $3 million against $17 million in cost of revenue yields a gross margin of
              approximately negative 467 percent in FY2025—consistent with a capital-intensive service ramp where
              infrastructure investment precedes operational scale. Stack AV should be expected to exhibit similar or
              more extreme negative gross margins in its first commercial year. Aurora's freight page describes the
              asset-light DaaS approach in which partners own, finance, and service the physical truck assets, with
              Aurora and by extension Stack AV earning per-mile fees on autonomous operation rather than asset ownership
              returns. R&D spending has been flat at $676–$745 million across FY2023–FY2025 at Aurora, suggesting the
              technology development cost plateau for a commercial-scale Level 4 trucking platform is in the $600–$750
              million annual range, which Stack AV's current funding does not approach at full scale.
