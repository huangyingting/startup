companyProfile:
  summary: >
    Stack AV is a Pittsburgh, Pennsylvania-based autonomous trucking company founded in 2022 by the core leadership team
    of Argo AI — Bryan Salesky (CEO), Peter Rander (President), and Brett Browning (CTO). Argo AI was the $12.4 billion
    joint AV venture of Ford and Volkswagen that shut down in October 2022. Stack AV pivoted immediately to long-haul
    autonomous trucking, exiting stealth in September 2023 with reported SoftBank Vision Fund 2 backing of $1 billion or
    more. The company's proprietary autonomous system consists of three components: StackOS (the real-time AV operating
    system), Clockwork (timing-critical middleware), and Deploy Manager (fleet-scale OTA software distribution). Stack
    AV operates test trucks on public highways in Pennsylvania and Texas targeting SAE Level 4 driverless operation on
    defined interstate lanes. As of mid-2026, the company remains pre-commercial with no disclosed revenue, pending
    regulatory approval from FMCSA for driverless truck operation.
