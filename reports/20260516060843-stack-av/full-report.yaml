      - number: '3.3'
        title: Adjacent Competitors and Substitute Analysis
        blocks:
          - type: paragraph
            body: >
              Gatik AI has demonstrated commercially driverless (no safety driver) operations on fixed B2B middle-mile
              routes of approximately 15–80 miles for Walmart in Arkansas and Texas and for Loblaw in Ontario, Canada.
              Gatik's shorter, controlled-route ODD enables earlier regulatory approval but at the cost of a far smaller
              addressable market than open interstate long-haul. Gatik is not a direct competitive threat to Stack AV's
              long-haul business, though its commercial success validates that driverless freight operations are
              economically viable in narrower ODDs today.

              Einride operates autonomous electric T-pod vehicles on private and dedicated freight routes in the US
              (Tennessee, Wisconsin, Florida, California) under a US DOT waiver for remote-operated vehicles. Customers
              include GE Appliances, Electrolux, and DB Schenker. Einride charges per mile for a bundled service
              covering vehicle, electricity, maintenance, and remote operations. Einride's value proposition depends on
              the zero-emission transition—it is not a freight-agnostic Level 4 competitor to Stack AV's diesel-truck
              long-haul business. However, Einride demonstrates that a per-mile bundled pricing model for autonomous
              freight can attract enterprise shippers.

              Waymo Via wound down its commercial trucking segment in 2023–2024, removing Alphabet's unlimited capital
              advantage from the near-term competitive field. Its absence opens the 2025–2030 window for
              capital-constrained independents to establish fleet relationships before potential re-entry. The
              status-quo alternative—human CDL drivers—remains the dominant incumbent. Approximately 2.24 million
              licensed heavy truck drivers provide a fully scalable workforce at estimated all-in costs of $2.00–$2.50
              per mile for long-haul operations, setting the benchmark that AV per-mile pricing must eventually approach
              or undercut to drive carrier ROI.
