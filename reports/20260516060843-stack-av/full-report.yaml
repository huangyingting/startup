      - number: '6.5'
        title: Expansion and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Stack AV's testing program across five corridors (Denver–Atlanta, Phoenix, Dallas, Miami) suggests an
              expansion model concentrated in the South and Southwest before national rollout, mirroring Aurora's
              Texas-first strategy. If Stack AV replicates Aurora's anchor-tenant model, a near-term customer base of
              2–3 carriers on 1–2 corridors would create severe revenue concentration risk: any single carrier's
              suspension or delay would disproportionately affect Stack AV's commercial ramp. [CU031] [CU032]

              Geographic concentration is further reinforced by the patchwork of state AV laws. National expansion
              requires corridor-by-corridor regulatory clearance at the state level; permissive states (Texas, Arizona,
              Florida) will receive first deployment, while others require additional legislative groundwork. This
              limits early customer acquisition to carriers with lane volumes in AV-permissive jurisdictions,
              compressing the addressable customer base in the first 2–3 years post-launch. [CU033] [CU036]

              OEM integration dependency represents a supply-side channel concentration: Stack AV must secure
              integration agreements with PACCAR, Volvo, or Daimler Truck before deploying at carrier scale, giving a
              small number of OEM partners structural leverage. Uber Freight's role as load-matching intermediary for
              Aurora establishes a 3PL channel dependency pattern that could apply to Stack AV: a single 3PL
              intermediary controlling booking access to AV capacity can shape carrier pricing and volume. [CU034]
              [CU035]

              The competitive landscape (Aurora, Torc, Kodiak, Plus.ai, Einride) gives large carriers multiple AV
              trucking vendor options at commercial scale, which will reduce Stack AV's pricing power and increase
              potential churn risk at contract renewal. Stack AV's Series A runway supports reaching commercial launch,
              but without a disclosed timeline or customer commitments, time-to-first-revenue remains the key open
              variable. [CU037] [CU038]
