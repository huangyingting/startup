      - number: '1.2'
        title: Founding Story and Leadership
        blocks:
          - type: paragraph
            body: >
              Stack AV's founding team is drawn entirely from Argo AI, the joint autonomous vehicle venture of Ford
              Motor Company and Volkswagen AG. Argo AI was co-founded in 2016 by Bryan Salesky and Peter Rander with an
              initial $1 billion commitment from Ford. At its peak, Argo AI was valued at $12.4 billion and employed
              over 2,000 people before Ford and Volkswagen withdrew their support in October 2022, precipitating the
              company's shutdown. Following the shutdown, Salesky, Rander, and CTO Brett Browning founded Stack AV in
              stealth mode.

              Bryan Salesky (CEO, co-founder) holds a Bachelor of Science in Computer Engineering from the University of
              Pittsburgh (2002) and has spent his career in robotics and autonomous systems. He worked at Carnegie
              Mellon University and Google before co-founding Argo AI in 2016. Peter Rander (President, co-founder)
              earned his PhD in Robotics from Carnegie Mellon University in 1998 and later led autonomous vehicle
              development at Uber ATG before co-founding Argo AI. Brett Browning (CTO) holds a PhD in Electrical
              Engineering from the University of Queensland (2000) and has a similar trajectory through CMU research,
              Uber ATG, and Argo AI.

              Stack AV has also assembled a Safety Advisory Council of five former federal agency leaders: Robert
              Sumwalt, former Chairman of the National Transportation Safety Board; Annette Sandberg, former
              Administrator of the Federal Motor Carrier Safety Administration; David Kelly, former Acting Administrator
              of the National Highway Traffic Safety Administration; Christopher Doss, former FBI Assistant Director;
              and Don Osterberg, former Senior Vice President of Safety at Schneider National. This external safety
              governance structure signals regulatory credibility and is uncommon among pre-commercial AV startups.
