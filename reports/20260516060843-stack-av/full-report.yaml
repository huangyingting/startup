            body: >
              Stack AV has zero named customer proof of its own as of mid-2026. The chapter's named customer evidence is
              therefore drawn entirely from Aurora Innovation's commercial program, which serves as the sector benchmark
              that defines what AV trucking customer relationships look like at production scale. Aurora's investor
              relations disclosures and freight page name Werner Enterprises, FedEx, Hirschbach Motor Lines, Schneider
              National, Uber Freight, Ryder, PACCAR, Toyota, Volvo Trucks, and Volvo Autonomous Solutions as partners.
              [CU017]

              Werner Enterprises, a top-10 US truckload carrier, is the highest-profile production reference. Werner's
              CDO Rhonda Robb publicly endorsed the program and the carrier tripled its pilot program with Aurora
              expanding to the Fort Worth–Phoenix corridor — the strongest named customer endorsement in the sector.
              Uber Freight's role as booking intermediary on the Dallas–Houston driverless lane is the first commercial
              autonomous freight brokerage by a major 3PL. Hirschbach's VP Rachel Carr provided a named testimonial
              citing driver quality-of-life benefits. FedEx is listed as both an investor and partner in Aurora's IR
              materials. [CU018] [CU019] [CU020] [CU022]

              Stack AV has no equivalent relationships. The FreightWaves CTO interview (2025) confirms a
              technology-first roadmap; no customer commitments were mentioned. The absence of named customer proof is
              not unusual for a pre-commercial AV company at Stack AV's stage, but it means all customer-proof claims in
              this chapter describe what Stack AV must replicate, not what it has achieved. Diligence should pursue any
              undisclosed LOIs or carrier introductions that may have occurred outside public view. [CU021] [CU023]
