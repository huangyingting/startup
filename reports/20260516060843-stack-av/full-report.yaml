  - id: FE001
    slug: product-architecture-map
    title: Product Architecture Map — Stack AV
    type: stack
    summary: >
      Six-layer autonomous trucking stack from physical sensing through real-time OS, middleware, AI pipeline, fleet
      management, and operational support.
    approximationNotes: >
      Architecture layers are inferred from company public disclosures (stackav.com, careers page) and AV industry
      norms. Stack AV has not published a formal architecture diagram.
    claimRefs:
      - CE002
      - CE003
      - CE004
      - CE005
      - CE007
      - CE015
    data:
      layers:
        - id: l1
          label: Sensor Suite
          detail: Physical sensing layer providing multi-modal environmental perception inputs to StackOS
          modules:
            - Long-Range LiDAR (3D point cloud, object ranging)
            - Multi-Channel Radar (velocity, adverse-weather robustness)
            - Multi-Spectral Cameras (lane marking, traffic signal, object classification)
            - GNSS / IMU (absolute positioning, dead reckoning)
        - id: l2
          label: Edge Compute Platform
          detail: Automotive-grade GPU compute hardware executing neural network inference at AV latency requirements
          modules:
            - Automotive-grade GPU (NVIDIA DRIVE AGX-class or equivalent)
            - Hardware Security Module (OTA integrity)
            - Custom BSP / Qualified Drivers
        - id: l3
          label: StackOS — Autonomous Vehicle Operating System
          detail: Purpose-built real-time AV OS providing deterministic execution, safety partitioning, and sensor pipeline
          modules:
            - Real-Time Task Scheduler
            - Sensor Input Processing Pipeline
            - Memory Isolation and Safety Partitioning
            - Functional Safety Interface Layer
        - id: l4
          label: Clockwork — Deterministic Middleware
          detail: Timing-critical inter-module orchestration ensuring synchronized, latency-bound AV module communication
          modules:
            - Inter-Module Timing Orchestration
            - Message Broker (publish-subscribe)
            - Timing Watchdogs and Deadline Enforcement
        - id: l5
          label: AI / Autonomy Pipeline
          detail: >-
            ML-driven perception, prediction, and planning stack consuming sensor data and outputting vehicle actuation
            commands
          modules:
            - Perception and Sensor Fusion (object detection, state estimation)
            - Prediction Engine (trajectory forecasting for dynamic agents)
            - Motion Planner (route + trajectory generation)
            - Vehicle Controller (CAN bus actuation commands)
        - id: l6
          label: Deploy Manager + Operational Support
          detail: >-
            Fleet-scale software distribution, remote monitoring, and data analytics supporting the continuous
            improvement flywheel
          modules:
            - Fleet-Scale OTA Software Distribution
            - Software Version Registry and Rollback
            - Mission Control (24/7 remote monitoring)
            - Triage and Data Analytics (event annotation, model improvement loop)
