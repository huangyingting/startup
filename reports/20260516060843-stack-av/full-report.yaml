      - number: '6.2'
        title: Adoption Trajectory
        blocks:
          - type: paragraph
            body: >
              The macro adoption trajectory for autonomous trucking is being established by Aurora Innovation, the
              sector's sole commercial driverless operator as of mid-2026. Aurora commercially launched driverless
              freight on the Dallas–Houston corridor in late April 2025 with Werner Enterprises and Uber Freight as
              anchor partners, representing the first revenue-generating, driver-absent autonomous freight movement at
              commercial scale in the US. Stack AV's pre-commercial development trajectory will be measured against this
              milestone. [CU010] [CU011]

              The global autonomous truck market is estimated at $42.63B in 2026 growing at 11.73% CAGR to $74.23B by
              2031, per Mordor Intelligence. McKinsey estimated autonomous trucking could reduce long-haul per-mile
              costs by 30–45% at full deployment scale — the fundamental value proposition that makes carrier adoption
              economically rational once the technology risk is acceptable. [CU009] [CU013]

              Stack AV's adoption signals are indirect. Active CDL-A hiring across five corridors as of Q2 2026
              evidences testing expansion; the CTO interview in FreightWaves (2025) describes a technology development
              roadmap focused on engineering milestones rather than customer acquisition, consistent with a
              pre-commercial posture. The FMCSA has not issued a specific certification framework for commercial
              autonomous truck operations, meaning regulatory clearance timing remains the primary gating factor for any
              carrier's procurement decision. Conversely, GAO's assessment that autonomous vehicle adoption requires
              resolution of liability, insurance, and federal standard gaps signals that Stack AV's first commercial
              customers will need bespoke regulatory engagement alongside technology acceptance. [CU012] [CU015] [CU016]

              JB Hunt (one of the largest US truckload carriers, operating tens of thousands of loads per day) had not
              announced any AV trucking partnership as of mid-2026, representing a material gap in large-carrier sector
              adoption beyond Aurora's initial partner set. [CU014]
