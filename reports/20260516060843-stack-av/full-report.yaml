      - number: '5.5'
        title: Roadmap, Deployment, and Technology Maturity
        blocks:
          - type: paragraph
            body: >
              Stack AV emerged from stealth in September 2023 after roughly a year of development following the Argo AI
              shutdown in October 2022. The founding team disclosed StackOS, Clockwork, and Deploy Manager as the
              proprietary technical pillars in that first public statement, and reported SoftBank Vision Fund 2 as the
              initial investor. A reported $150M Series B was announced in August 2024, though no primary source (press
              release or SEC filing) confirming the terms was accessible at time of writing. [CE016] [CE031]

              Active multi-state testing operations are evidenced by CDL-A Operations Specialist job postings in Denver
              (CO), Atlanta (GA), Phoenix (AZ), Dallas (TX), and Miami (FL) as of mid-2025, with roles also in
              Pittsburgh and New Stanton (PA). The careers page also lists a Contract Triage Analyst role — responsible
              for reviewing autonomous events from real-world driving and simulation, annotating them by issue type and
              priority, and assembling performance reports. This reveals a structured, data-driven testing loop typical
              of mature AV development programs. [CE022] [CE032]

              A Overnight Fleet Monitoring and Support Specialist (3rd shift) role at Stack AV confirms that Mission
              Control operations are active. Remote oversight during overnight autonomous operations is a precursor to
              the driverless commercial operation model. [CE033]

              Aurora's April 2025 commercial driverless launch on the Fort Worth-to-Dallas and Fort Worth- to-Houston
              corridors in Texas demonstrated that FMCSA exemptions, state-level AV laws (Texas is AV-permissive),
              carrier insurance frameworks, and safety case publication together constitute the critical path to
              commercial driverless operations. Stack AV must navigate the same path before its own launch. [CE034]

              Stack AV has not publicly disclosed a commercial launch timeline as of Q1 2026, and the overall technology
              maturity remains at the development and early-testing stage. Key technical risks that could delay
              commercialization include: perception system robustness in adverse weather (rain, snow, fog, glare), LiDAR
              hardware supply chain concentration, high per-vehicle sensor and compute costs (~$50K estimated per
              truck), OEM integration complexity, and the unpredictable duration of regulatory approval. The data
              flywheel — collect, label, train, validate, deploy — must operate at fleet scale before safety case
              arguments can be made for specific edge cases. [CE038] [CE040] [CE012]
