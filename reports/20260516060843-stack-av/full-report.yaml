          - type: callout
            title: Waymo Via's Exit Removes the Most Dangerous Long-Term Competitor
            body: >
              Waymo's decision to wind down Via (trucking) removes the most financially formidable potential competitor
              from the near-term landscape. Alphabet's balance sheet and world-class AV technology from Waymo One would
              have enabled sustained losses and aggressive land-grabbing in fleet partnerships that capital-constrained
              independents could not match. Waymo Via's absence opens the 2025–2030 window for Stack AV to build fleet
              relationships before Alphabet's potential re-entry. Investors should monitor Waymo Arizona truck testing
              as a re-entry leading indicator.
