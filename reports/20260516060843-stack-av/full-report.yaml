      - number: '7.2'
        title: Operational and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Stack AV's operational and technical risk profile centers on five interlocking exposures: sensor hardware
              supply chain concentration, adverse-weather performance limits, cybersecurity vulnerabilities, OTA
              software failure risk, and OEM integration dependency.

              Sensor hardware concentration is significant. Luminar Technologies — the primary LiDAR supplier for
              several AV developers including Argo AI's legacy stack — reported financial challenges in 2024–2025
              including workforce reductions, raising insolvency risk for a single-source sensor supplier. NVIDIA DRIVE
              is the dominant compute platform for AV training and inference; no alternative compute stack has been
              publicly disclosed by Stack AV. Single-source dependencies on both perception and compute hardware create
              supply chain vulnerability that could halt testing or delay commercialization. [CR016] [CR017]

              Adverse-weather performance is a documented industry-wide challenge for LiDAR-dependent AV systems. Rain,
              ice, and snow degrade point-cloud quality and sensor accuracy. Stack AV's Pittsburgh origin and PA
              corridor ambitions directly confront adverse-weather constraints. No independent validation of Stack AV's
              all-weather performance envelope has been published. [CR013] [CR020]

              Cybersecurity risk in ADS-equipped trucks is elevated given remote access for OTA software delivery and
              telematics data transmission. No third-party security audit of Stack AV's ADS has been publicly disclosed.
              A vehicle hijacking or data breach event would create liability, regulatory, and reputational damage
              cascading through customer and investor confidence. [CR015]

              OTA software update failures at fleet scale — where a defective software push reaches all deployed units —
              represent a recall trigger under NHTSA's authority and a safety incident risk. Stack AV's pre-commercial
              status means no OTA architecture has been independently validated. OEM integration dependency on Peterbilt
              and/or Freightliner platforms for by-wire systems creates launch risk if OEM partnerships shift priority.
              [CR018] [CR019] [CR021]

              Stack AV's founding team carries Argo AI technical design decisions into Stack AV's platform; IP
              assignment verification and software provenance from the prior company are unresolved diligence items.
              [CR022]
