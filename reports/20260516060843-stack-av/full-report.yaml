  - id: TV005
    slug: thesis-break-and-kill-triggers-table
    title: Thesis-Break and Kill Triggers
    notes: >-
      Triggers are ordered by severity. Threshold values are the specific observable conditions that would cause a
      rating downgrade or exit. All triggers are binary or near-binary events; none represent gradual deterioration
      scenarios.
    claimRefs:
