  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >
              Stack AV's product is an autonomous driving system for Class 8 long-haul freight trucks, designed to
              replace the human driver on defined highway corridors between origin and destination logistics terminals.
              The company targets the hub-to-hub segment specifically because interstate highway driving offers
              predictable lane geometry, limited pedestrian interaction, and lower edge-case density compared to urban
              environments — conditions that make SAE Level 4 autonomy most tractable with today's sensor and compute
              technology. [CE001] [CE006]

              In the customer workflow, a carrier or shipper assigns a load to a Stack AV-equipped truck at an origin
              terminal. An Operations Specialist — a CDL-A licensed safety driver — performs a pre-trip inspection and
              supervises departure. Once on the highway, StackOS manages autonomous operation for the duration of the
              highway segment. Mission Control provides real-time remote monitoring. At the destination terminal, the
              Operations Specialist supervises arrival and post-trip procedures. [CE022] [CE033]

              This hub-to-hub model directly addresses the two largest structural pain points in long-haul trucking:
              driver shortage (estimated 60,000-unit gap that could reach 160,000 by 2030 per ATA projections) and
              hours-of-service constraints that cap human drivers at 11 hours per shift. An autonomous system operating
              within a defined ODD can in principle run 24 hours continuously, dramatically improving asset utilization.
              [CE035] [CE006]

              As of Q1 2026, Stack AV is conducting active highway testing with Operations Specialists aboard across at
              least five interstate corridors: Denver-to-Atlanta (CO/GA), Phoenix (AZ), Dallas (TX), and Miami (FL)
              routes are evidenced by active CDL-A job postings. The company has not announced a commercial driverless
              launch timeline. [CE022] [CE031]
