  - id: TR005
    slug: mitigation-and-kill-criteria-table
    title: Mitigation and Kill Criteria Table
    notes: >
      Kill criteria are thesis-break events that should trigger immediate investment re-underwriting or halt of
      additional capital deployment. Monitoring triggers are observable leading indicators. All thresholds are defined
      relative to public observable events.
    claimRefs:
      - CR001
      - CR002
      - CR014
      - CR023
      - CR026
      - CR032
      - CR033
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Kill Event
      - Action Implication
    rows:
      - - FMCSA Driverless Exemption Denied or Indefinitely Delayed
        - FMCSA ANPRM or NPRM on ADS driverless CMV exemptions published or explicitly shelved
        - No federal exemption pathway confirmed by Q4 2028
        - Halt additional capital; require regulatory path-to-approval plan before proceeding
      - - SoftBank Pulls Follow-On Funding
        - No Series B commitment from SoftBank within 18 months of Series A close (est. July 2025)
        - Runway drops below 12 months with no credible Series B pipeline
        - Mandate bridge financing evidence; flag going-concern risk; mark to recovery scenario
      - - Fatal AV Crash Attributable to Stack AV ADS
        - NHTSA crash report naming Stack AV ADS involvement in fatality filed publicly
        - Any NHTSA-confirmed fatality with Stack AV ADS engaged
        - Halt investment activity; await NTSB investigation findings; re-underwrite safety case
      - - Aurora or Waymo IP Injunction Against Stack AV
        - Federal court TRO, preliminary injunction, or ITC exclusion order filed against Stack AV
        - Any injunctive IP relief granted restricting Stack AV commercial deployment
        - Flag as potential thesis break; halt deployment; engage IP litigation counsel
      - - CEO or CTO Departure in Years 1–3
        - Bryan Salesky or Brett Browning resignation, termination, or departure announcement
        - Either departure within 3 years of founding
        - Re-underwrite leadership team and IP position before committing further capital
      - - No Commercial Launch by Q4 2028 While Aurora Expands
        - Aurora achieves multi-corridor expansion without Stack AV reaching commercial driverless
        - Stack AV still pre-commercial when Aurora exits its second major expansion corridor
        - Thesis break on competitive timing; evaluate strategic alternatives, pivot, or exit
