        title: Competitive Moats and Adverse Evidence
        blocks:
          - type: paragraph
            body: >
              Aurora's first-mover commercial partnerships create initial switching costs: Werner Enterprises, Uber
              Freight, and FedEx integrating Aurora Driver into dispatch, telematics, and maintenance frameworks face
              12–24-month replacement cycles. If Aurora has exclusivity provisions in these arrangements (not publicly
              disclosed), Stack AV's path to the same carriers is materially constrained. Torc's Daimler distribution
              moat is substantial but narrow—it only benefits customers buying new Freightliner trucks. Kodiak's
              military contract diversification provides a unique financial buffer unavailable to commercial-only
              competitors. Stack AV's moat rests on technology inheritance and talent density rather than commercial
              lock-in, making its durability harder to assess externally.

              Adverse competitive dynamics are significant. Aurora's $600 million annual operating loss and
              going-concern disclosures represent a systemic risk: if Aurora fails before achieving commercial- scale
              revenue—as Embark and TuSimple did before it—the reputational damage to Level 4 trucking broadly could
              delay carrier partnerships for 12–24 months across all AV providers. High capital intensity creates both
              moat and fragility: the estimated cost of developing a validated Level 4 commercial-scale AV system is
              $1–3 billion or more, which has proved to be the existential barrier separating survivors (Aurora, Torc,
              Kodiak, Stack AV) from failures (Embark, TuSimple). The 2023–2024 freight recession further delayed
              carrier AV investment decisions by reducing available capital expenditure budgets across the trucking
