      - number: '8.2'
        title: Valuation Scenarios and Comparable Analysis
        blocks:
          - type: paragraph
            body: >
              The comparable set for Stack AV is thin and imperfect. Aurora Innovation (AUR), the only direct AV
              trucking public peer, trades at $15.12B market cap on $3M FY2025 revenue — an implied revenue multiple of
              approximately 5,040x reflecting pure option value rather than current financial performance. Aurora's
              re-rating from $5.71B (June 2025) to $15.12B (May 2026) was driven by the April 2025 commercial driverless
              launch and the McLane/Hirschbach announcements, suggesting that the market assigns enormous non-linear
              value to the first commercial launch catalyst. [CV016] [CV017] [CV018] [CV026]

              Mobileye (MBLY) trades at $8.44B market cap on $1.89B FY2025 revenue (~4.5x P/S), providing a
              revenue-multiple floor once Stack AV achieves commercial scale. The gap between Aurora's 5,040x
              option-value multiple and Mobileye's 4.5x mature-revenue multiple defines the valuation arc Stack AV must
              traverse: a $750M–$1B pre-revenue entry implies the market prices significant probability of reaching
              commercial scale, but at a steep discount to Aurora's current premium. [CV019] [CV025] [CV026] [CV027]

              TuSimple's trajectory remains the cautionary anchor for any Stack AV scenario model. A $1.1B IPO in April
              2021, $8.5B peak valuation, and voluntary delisting at $0.30/share in January 2024 — a >99% peak-to-trough
              decline — is the realized downside for an AV trucking company that failed to convert capital into
              commercial operations. Goldman Sachs analyst Mark Delaney maintains a $5 Hold target on Aurora (35%
              downside from May 2026 levels), representing the bearish outlier view even for the commercially-launched
              leader. [CV020] [CV021] [CV022] [CV024]

              Waymo, valued at approximately $45B in its 2024 Alphabet funding round, establishes the sector ceiling but
              is not a directly comparable peer (robotaxi, Alphabet backing, no trucking AaaS model). Kodiak Robotics,
              the closest private AV trucking comparable, has not disclosed a valuation since its 2021 Series B and has
              no commercially deployed driverless fleet. [CV023] [CV024]
