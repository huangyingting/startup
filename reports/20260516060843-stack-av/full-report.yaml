      - number: '3.4'
        title: Capability Comparison and Feature Analysis
        blocks:
          - type: paragraph
            body: >
              Aurora, Torc, and Kodiak all target SAE Level 4 on public US interstate highways in Class 8 trucks,
              placing them in the same ODD class as Stack AV. Only Aurora has demonstrated sustained commercial
              operations without a safety driver as of mid-2026. None of the primary long-haul AV competitors publish
              independently verified safety miles, disengagement rates, or audited safety performance benchmarks
              accessible to external analysts; NHTSA's Standing General Order requires crash incident reporting but not
              miles-based benchmarking. This information asymmetry means direct performance comparisons rely on
              milestone announcements and proxy signals rather than verified metrics.

              Stack AV's differentiated positioning derives from: (1) Argo AI technology inheritance, including sensor
              suite and perception stack from a program that received approximately $3.6 billion in total investment
              from Ford and Volkswagen; (2) a founding team led by Bryan Salesky (Argo AI CEO) and Peter Rander (Argo AI
              COO) with approximately 40+ Argo AI alumni providing institutional continuity; (3) a freight-specific
              founding identity without robotaxi technical debt; and (4) Series A funding from Sequoia Capital. The
              primary capability diligence gap is that Stack AV has not published a Safety Case Framework or VSSA
              comparable to Aurora's, making it difficult to independently compare safety architectures.

              Torc's OEM-integrated approach differs from Stack AV's and Aurora's portable software stacks: Torc
              co-develops within Freightliner hardware, enabling tighter integration but limiting addressable trucks.
              Gatik and Einride demonstrate that commercial revenue is achievable today, but only in substantially
              simpler ODDs (fixed middle-mile routes; private industrial corridors) than Stack AV's open-highway target.
