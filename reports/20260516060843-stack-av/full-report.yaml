  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation
        blocks:
          - type: paragraph
            body: >
              Stack AV's addressable customer base consists of the approximately 580,000 active US motor carriers
              competing for a share of the $900B+ annual trucking market. Within this universe, the actionable buyer
              segment for a first-generation autonomous trucking system is narrower: large truckload carriers (100+
              power units) and third-party logistics providers (3PLs) with dedicated lane contracts and procurement
              infrastructure to absorb a multi-year pilot cycle. [CU001] [CU002]

              The buyer/user/payer segmentation in AV trucking is more complex than in typical SaaS sales. The user is
              the carrier operations team operating the truck; the buyer is typically the carrier's VP of Innovation or
              CDO who evaluates technology partnerships; the payer is the carrier's P&L, which may be partially offset
              by load revenue from 3PL booking intermediaries. Aurora's commercial model with Uber Freight — where Uber
              Freight ($17B+ in freight under management, serving 1 in 3 Fortune 500 shippers) books loads on Aurora's
              driverless capacity — illustrates the 3PL-as-intermediary payer structure Stack AV will likely need to
              replicate. [CU003] [CU008]

              The target use case is hub-to-hub long-haul highway freight on interstate corridors over 250 miles, where
              operating domain predictability is highest and the driver shortage pain is most acute. Large-fleet
              carriers and 3PLs are the strategic buyer segment because they have dedicated lane volumes, the financial
              scale to absorb pilot costs, and the engineering resources to integrate AV systems at the terminal and
              dispatch level. LTL carriers and owner-operators are structurally excluded from the initial addressable
              segment due to multi-stop route complexity and insufficient economies of scale. [CU004] [CU005] [CU006]

              As of mid-2026, Stack AV has not announced any named customer relationships. Job postings for CDL-A
              Operations Specialists across at least five corridors (Denver–Atlanta, Phoenix, Dallas, Miami) confirm
              active testing but not commercial customer acquisition. [CU007]
