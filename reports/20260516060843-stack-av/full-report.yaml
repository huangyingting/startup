      - number: '1.5'
        title: Geographic Operations and Scale
        blocks:
          - type: paragraph
            body: >
              Stack AV's testing and operations footprint spans seven locations across the United States as of the
              report date. The company maintains its core technology development in Pittsburgh, PA, and truck operations
              hub at New Stanton, PA. Active test market operations are confirmed in Denver, CO; Atlanta, GA; Phoenix,
              AZ; Dallas, TX; and Miami, FL, based on current job postings for CDL-A Operations Specialists and Mission
              Control roles in each market.

              The CDL-A Operations Specialist role is the primary on-road role, requiring a commercial driver's license
              and describing responsibilities consistent with safety driver or test operator functions rather than
              revenue-generating freight operations. Mission Control Specialist roles—described as overnight remote
              monitoring positions—indicate the company is running 24/7 automated operations that require human
              supervisory oversight, consistent with a pre-Level 4-commercial-deployment stage.

              Stack AV has not publicly disclosed any named freight carrier partners, shipper customers, or
              revenue-generating commercial freight contracts as of this report. The company's operations appear
              consistent with a pre-commercial testing phase, analogous to where Aurora Innovation was before its May
              2025 commercial driverless launch in Texas.
