      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Driver Shortage Creates Durable Demand Signal
            body: >
              The structural US driver shortage is the single most compelling near-term demand driver for autonomous
              trucking. ATA data confirms ongoing carrier recruitment difficulty; BLS projects only 4% employment growth
              through 2034 against backdrop of secular freight volume increases. Unlike cyclical freight downturns,
              driver availability is a long-run constraint driven by demographics and career preferences. This creates a
              durable ROI justification for autonomous deployment that does not depend on technology cost declining to
              parity with human labor.
            calloutType: insight
            claimRefs:
              - CM003
              - CM017
              - CM019
              - CM037
          - type: callout
            title: Market Sizing Estimates Carry High Uncertainty
            body: >
              All autonomous truck market size estimates reviewed for this chapter derive from single-source analyst
              reports without independently verifiable methodology. Mordor Intelligence's $42.6 billion 2026 figure
              cannot be cross-validated against other published projections. First-principles SAM estimates based on ATA
              total revenue and long-haul segment share involve substantial assumptions about route eligibility and
              near-term deployability. Investors and analysts should treat all specific TAM/SAM figures as directional
              order-of-magnitude anchors rather than precise forecasts.
            calloutType: insight
            claimRefs:
              - CM006
              - CM007
              - CM043
              - CM044
          - type: callout
            title: EPA Phase 3 Creates Convergence Pressure Between AV and ZE Deployment
            body: >
              EPA Phase 3 GHG standards requiring 40% zero-emission Class 8 truck sales by model year 2032 create an
              underappreciated convergence dynamic with autonomous deployment. Battery-electric heavy trucks face range
              and charging infrastructure constraints that are most tractable on well-defined, hub-to-hub
              routes—precisely the routes where Level 4 AV is most viable. AV systems can optimize ZE range management
              in ways human drivers cannot, potentially making AV+ZE bundles more economically attractive than either
              technology alone. OEMs and fleets making $50B+ ZE infrastructure commitments in 2024–2027 may prefer AV
              platforms that integrate with their electrification strategies.
            calloutType: insight
            claimRefs:
              - CM020
              - CM021
              - CM029
          - type: callout
            title: Hub-to-Hub SAM Estimate is First-Principles Approximation
            body: >
              The $100–200 billion SAM range cited in this chapter for US hub-to-hub autonomous trucking is derived from
              first-principles: ATA total trucking revenue ($906B) × estimated long-haul segment share (35–40%) ×
              eligibility discount for near-term ODD constraints. No independent published study was found that directly
              sizes the US hub-to-hub autonomous trucking SAM with this methodology. The SOM for Stack AV specifically
              is not publicly quantified. These figures should be validated in investor diligence with proprietary
              route-density and carrier-adoption modeling.
            calloutType: insight
            claimRefs:
              - CM043
              - CM044
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The autonomous trucking competitive landscape as of mid-2026 has been shaped by a combination of technical
              progress, capital attrition, and strategic exits that have narrowed the field from more than ten active
              players in 2021 to approximately five credible long-haul contenders. Aurora Innovation achieved the
              sector's first commercial milestone—Level 4 driverless trucking on May 1, 2025—establishing the first
              real-world evidence base for commercial economics. Torc Robotics, backed by Daimler Truck AG's balance
              sheet and distribution network, represents the most capital-secure competitor but has been the slowest to
              reach commercial operations. Kodiak Robotics has differentiated through military contract diversification,
              providing revenue and testing miles outside the commercial freight market. Plus AI competes via an
              ADAS-first model that generates current subscription revenue while building toward full Level 4.

              Two adjacent competitors—Gatik AI and Einride—operate in structurally distinct segments. Gatik has proven
              commercial driverless operations on fixed middle-mile routes (15–80 miles) that do not overlap with Stack
              AV's open-highway long-haul target. Einride bundles electric autonomy for private/dedicated freight
              corridors under a US DOT waiver, with a per-mile model that serves customers with zero-emission mandates
              rather than maximum route coverage. Neither is a direct competitive threat to Stack AV's long-haul
              business today, though both demonstrate that commercial driverless freight economics are achievable in
              narrower ODDs.

              Three significant exits reshaped the landscape. Embark Trucks, a SPAC that raised approximately $614
              million, shut down in February 2023 after failing to reach commercial milestones without follow-on
              capital. TuSimple/Hydron effectively exited the US market by 2023 after SEC enforcement actions for
              alleged undisclosed data sharing with Chinese-connected Hydron Inc. Waymo Via—which would have been the
              most financially formidable competitor given Alphabet's balance sheet—wound down commercial trucking
              development in 2023–2024 to focus on Waymo One passenger ride-hailing. The status-quo alternative remains
              human CDL drivers, with approximately 2.24 million licensed heavy truck operators providing a fully
              scalable incumbent labor force across every route.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP027
      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Aurora Innovation is Stack AV's most advanced direct competitor. Founded in 2017 by Chris Urmson (formerly
              Waymo CTO), Sterling Anderson (former VP Tesla Autopilot), and Drew Bagnell (former Uber ATG lead), Aurora
              combines robotaxi and freight expertise in a single technology platform. It went public in October 2021
              via a SPAC merger with Reinvent Technology Partners Y (Nasdaq: AUR) and has raised approximately $3.5
              billion or more in total equity. Aurora's commercial service launched May 1, 2025 on Dallas–Houston–El
              Paso corridors using Peterbilt 579 trucks with Werner Enterprises, Uber Freight, and FedEx as partners.
              Aurora's Aurora Driver platform includes a published Voluntary Safety Self-Assessment (VSSA) and a
              proprietary Safety Case Framework (SCF). The company's principal weakness is financial: annual operating
              losses of approximately $600 million and going- concern disclosures in its 10-K filings reflect dependence
              on continued capital market access.

              Torc Robotics offers a structurally distinct model. Wholly owned by Daimler Truck AG since approximately
              2022, Torc benefits from an OEM capital backstop and access to Freightliner's 2,400-location North
              American dealer network. Its Level 4 stack is co-developed within the Freightliner Cascadia truck
              platform, enabling tight hardware-software integration but limiting its addressable fleet to
              Freightliner-branded vehicles. Despite more than six years of Daimler- backed development since the 2019
              acquisition, Torc had not announced a commercial service launch date as of mid-2026.

              Kodiak Robotics, founded in 2018 by Don Burnette and colleagues from Google/Waymo, Uber ATG, and Cruise,
              represents the most capital-efficient independent competitor. Kodiak has raised more than $250 million,
              maintained freight partnerships with Werner Enterprises and Prime Inc., and secured US Army autonomous
              logistics contracts totaling more than $140 million. These military awards provide non-commercial revenue
              and real-world autonomous miles that insulate Kodiak from freight market downturns. Kodiak had not
              announced public-road commercial driverless freight operations as of mid-2026.

              Plus AI pursues an ADAS-first commercial strategy through its SuperDrive Level 2+ product, which generates
              recurring revenue via hardware kits in Peterbilt 579 and PACCAR trucks across both China and US markets.
              Plus AI's OEM partnerships with PACCAR and FAW Group create a retrofit-to- OEM transition pathway, but its
              near-term competitive threat to Stack AV is indirect: Plus competes for carrier technology budget with a
              lower-risk, revenue-generating ADAS product that may delay carrier commitment to pure-Level 4 providers.
