      - number: '7.3'
        title: Financial, Partner, and People Risks
        blocks:
          - type: paragraph
            body: >
              Stack AV's financial risk centers on its pre-revenue, capital-intensive position and the single-investor
              concentration created by SoftBank Vision Fund's lead role in the $81M Series A. The AV trucking sector
              requires $500M–$2B+ in funding to reach commercial launch scale based on Aurora's trajectory; Stack AV is
              likely 18–36 months from commercial launch and must raise a Series B before cash runs out. SoftBank Vision
              Fund's portfolio history — including $30B+ in cumulative write-downs including WeWork — creates LP
              scrutiny that may constrain follow-on conviction. Sequoia Capital co-invested in the Series A but
              represents a smaller commitment. [CR023] [CR024] [CR025] [CR026]

              Going-concern risk is binary: if Stack AV cannot raise a Series B within approximately 12–18 months of
              Series A close, the company faces a runway cliff. No revenue, customers, or commercial agreements have
              been disclosed that would offset this risk. The CRS and RAND research literature confirms that AV
              commercialization is capital-intensive and dependent on regulatory resolution that remains unscheduled.
              [CR027] [CR029] [CR031]

              Insurance risk is material and unresolved. No commercial insurance pricing exists for driverless trucking
              operations at scale; Stack AV would need to self-insure or structure bespoke Lloyd's-style coverage,
              creating balance sheet exposure in any crash scenario. The absence of disclosed insurance arrangements is
              a diligence gap. [CR030]

              Partner concentration risk is significant across three vectors: (1) SoftBank as primary capital source,
              (2) NVIDIA and Luminar as concentrated hardware suppliers, and (3) Peterbilt and/or Freightliner as OEM
              truck platform partners without disclosed contractual terms. [CR017] [CR021] [CR024]

              People risk is critical. CEO Bryan Salesky, CTO Brett Browning, and President Dax Rander are all former
              Argo AI executives. The CTO is named as inventor on Argo AI patents covering core AV IP; his departure
              would simultaneously create key-person risk and potential IP ownership disputes. Talent competition from
              Aurora, Waymo, and Tesla for the same CV engineer pool raises attrition risk. Organized labor opposition —
              Teamsters (3.5M member base) and OOIDA (owner-operator truckers) — actively lobbies against autonomous
              trucking legislation, extending the pre-revenue runway risk and creating political headwinds in key
              corridor states. [CR032] [CR033] [CR034] [CR035] [CR036] [CR037] [CR038]
