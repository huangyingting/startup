  - id: TM004
    title: Growth Drivers and Constraints Table
    description: Key growth drivers and adoption constraints for the autonomous trucking market, with timing and diligence asks.
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Stack AV
      - Diligence Ask
    rows:
      - - Structural driver shortage and recruitment difficulty
        - Driver (Positive)
        - Near-term (2024–2030)
        - >-
          Accelerates carrier ROI justification for AV deployment; reduces resistance to automation from fleet economics
          perspective
        - Quantify actual unfilled CDL positions per quarter; assess regional variation in driver availability
      - - FMCSA Hours-of-Service (HOS) productivity ceiling
        - Driver (Positive)
        - Ongoing / regulatory baseline
        - >-
          AV bypasses 11-hr/14-hr window and 60/70-hr weekly limits; unlocks ~50% throughput gain on long-haul routes
          vs. compliant human drivers
        - Has FMCSA issued or proposed any AV-specific HOS exemption framework that would apply to Level 4 operations?
      - - EPA Phase 3 GHG mandates (40% ZE sales by MY2032)
        - Driver (Positive)
        - 2027–2032 (ramp)
        - >-
          Creates OEM and fleet investment in zero-emission Class 8 trucks; AV systems better suited to range-optimal ZE
          route management; may accelerate AV+ZE bundled deployments
        - How do OEM electrification timelines align with AV system integration timelines for Class 8?
      - - Secular freight volume growth (FHWA FAF 2050 projection)
        - Driver (Positive)
        - Long-term (2025–2050)
        - >-
          More freight ton-miles on key interstate corridors increases utilization economics for fixed-ODD AV systems;
          reduces break-even route density requirement
        - Are FHWA freight projections segmented by corridor to identify highest-density autonomous-deployable routes?
      - - Federal / state regulatory fragmentation (no unified AV framework)
        - Constraint (Negative)
        - Near-term (2024–2028)
        - >-
          Each state-crossing route requires compliance with multiple state permit regimes; slows national deployment
          scale without federal preemption legislation
        - Has NHTSA or Congress advanced any federal preemption proposal for commercial AV truck operations?
      - - Nascent AV insurance and liability framework
        - Constraint (Negative)
        - Near-term (2024–2028)
        - >-
          Insurers lack actuarial data for Level 4 trucks; premiums may be prohibitively high at early deployment scale;
          carrier liability exposure undefined in multi-party crashes
        - >-
          Who bears crash liability in a Level 4 AV crash under current state law? Has any carrier obtained AV-specific
          commercial insurance coverage?
      - - Sensor hardware cost (~$50,000 per vehicle at 2025 prices)
        - Constraint (Negative)
        - Medium-term (declining)
        - >-
          Limits per-vehicle economics and deployment speed at current price; declining LiDAR/camera prices are expected
          to reduce this barrier by 2027–2030
        - >-
          What is the current sensor cost trajectory? At what $/vehicle does AV trucking reach positive unit economics
          for a 500-truck fleet?
      - - Public trust and safety incident risk
        - Constraint (Negative)
        - Ongoing
        - >-
          Single publicized fatality or major incident could trigger multi-state moratoriums; regulatory timelines are
          sensitive to public perception; NHTSA SGO requires 24-hour incident reporting
        - >-
          Has NHTSA's Standing General Order data revealed any Level 4 truck incidents to date? What is Aurora's
          incident rate since May 2025 launch?
