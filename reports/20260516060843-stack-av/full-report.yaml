      - number: '2.5'
        title: Competitive Landscape and Market Dynamics
        blocks:
          - type: paragraph
            body: >
              The autonomous long-haul trucking competitive landscape is concentrated among a small set of
              well-capitalized players. Aurora Innovation (NASDAQ: AUR) is the most advanced competitor by commercial
              deployment, having launched driverless freight operations on the Dallas–Houston corridor in May 2025 with
              Werner Enterprises, Hirschbach Motor Lines, and Volvo Autonomous Solutions as carrier partners. Aurora's
              market capitalization of approximately $4.6 billion as of early 2025 signals institutional investor
              commitment to the sector but also heightened competitive pressure on entrants like Stack AV.

              Torc Robotics, acquired by Daimler Truck, operates as an OEM-integrated autonomous trucking system focused
              on hub-to-hub highway automation, with ongoing public road tests on US interstates. Kodiak Robotics
              focuses on long-haul autonomous trucking with a hub-to-hub operating model similar to Stack AV, while Plus
              AI (Plus) pursues a supervised automation approach targeting Class 8 trucks under a technology-licensing
              model. Waymo's open dataset demonstrates sensor perception maturity relevant to highway AV, though Waymo
              via its Waymo One service focuses primarily on robotaxi rather than long-haul trucking. Competitive
              differentiation will ultimately rest on safety record, route coverage, OEM partnerships, and cost per
              autonomous mile—metrics that will take years of commercial operation to validate.

              The UNCTAD autonomous vehicle readiness index identifies the United States among the highest- readiness
              nations for AV commercialization, driven by public infrastructure quality and technology investment.
              Congressional Research Service analysis notes that federal preemption of state-level AV regulations
              remains unresolved, creating ongoing compliance complexity for operators seeking national scale.
            claimRefs:
              - CM014
              - CM016
              - CM023
              - CM026
