              Vision Fund 1 and 2 have collectively written down over $30B in portfolio losses including WeWork; LP
              pressure on follow-on conviction is elevated. If SoftBank does not lead or participate meaningfully in the
              Series B, Stack AV faces a going-concern scenario. An investor should require evidence of Series B
