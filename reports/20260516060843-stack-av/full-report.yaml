      - number: '8.4'
        title: Exhibits
        blocks:
          - type: callout
            title: 'TRACK Recommendation: Option Value Anchored on FMCSA Exemption'
            body: >
              Stack AV's investment thesis is a single-catalyst, binary option: FMCSA driverless exemption unlocks
              commercialization; its absence makes the business legally inoperable at scale. Aurora's April 2025
              commercial launch and the McLane deal validate that enterprise AV trucking buyers exist and will pay for
              driverless service. Stack AV's Argo AI heritage and Tier-1 VC backing provide technological and capital
              credibility. However, without public evidence of an FMCSA petition, first customer, or audited financials,
              the current implied valuation of $500M–$1B cannot be independently substantiated. The recommended posture
              is active monitoring with a defined diligence checklist: FMCSA filing confirmation, first signed LOI, and
              financial statements. If these are resolved positively by mid-2027, the base case valuation range of
              $1.5B–$3B supports initiating a position. [CV001] [CV002] [CV005] [CV028]
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
              - CV005
              - CV028
          - type: callout
            title: 'TuSimple Precedent: Series B Valuation Demands Driverless Proof'
            body: >
              TuSimple's trajectory — $1.1B IPO in April 2021, $8.5B peak, voluntary delisting at $0.30/share in January
              2024 — is the clearest data point on what happens to an AV trucking company that cannot convert capital
              into commercial operations. Stack AV shares three structural parallels with TuSimple at its Series B
              stage: pre-revenue, pre-driverless, and deep regulatory dependency. The difference is that Stack AV
              inherits superior IP from Argo AI and has Sequoia and SoftBank conviction rather than TuSimple's corporate
              partners. Nevertheless, the TuSimple failure raises the appropriate discount rate for AV trucking
              pre-commercial investments and argues for a demanding diligence bar before capital commitment. Goldman
              Sachs maintains a $5 Hold target on Aurora (a 35% downside from May 2026 prices), signaling that even the
              commercially-launched AV trucking leader carries significant execution risk in the eyes of a major
