              AV: by providing fleet operators with a lower-cost, lower-risk technology product that improves driver
              performance, Plus AI reduces carrier urgency to commit to Level 4. Fleet operators already paying ADAS
              subscriptions have reduced technology change budgets and may treat Level 4 as a future upgrade. Stack AV
              should monitor Plus AI's carrier penetration as a proxy for fleet operator technology saturation in the
              pre-Level 4 window.
