            title: Aurora's Going-Concern Risk Is Also a Sector Risk
            body: >
              Aurora Innovation's $600 million annual operating loss and going-concern disclosures represent a systemic
              risk for the entire Level 4 trucking sector. If Aurora fails before achieving commercial- scale revenue—as
              Embark and TuSimple did before it—the reputational damage to Level 4 trucking could reduce carrier
              willingness to partner with any AV provider for 12–24 months. Stack AV's launch timing should factor in
              this scenario: launching after Aurora demonstrates sustained commercial viability reduces technology risk,
              while launching too close risks shared reputational exposure to any early Aurora incident.
