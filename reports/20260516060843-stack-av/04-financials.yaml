  - id: funding-history
    title: Funding History and Capital Stack
    body: >
      Stack AV's capital formation follows a compressed three-round structure dominated by SoftBank
      Vision Fund 2 (VF2) as lead or anchor backer from the outset. The company emerged from stealth
      on September 7, 2023 with a disclosed SoftBank commitment and a founding team from Argo AI.
      Pre-stealth seed financing of approximately $30 million is estimated from the company's 2023
      operational headcount and infrastructure scale; no Form D filing has been located for Stack AV
      Co in SEC EDGAR under that entity name or likely entity variants. The Series A round of
      approximately $81 million, led by Sequoia Capital in January 2024, established a prestige
      co-investor alongside VF2 and represented the first publicly disclosed round size. CEO Salesky
      acknowledged in a September 2023 FreightWaves Q&A that SoftBank was "reportedly putting
      $1 billion or more" into Stack AV, a figure that remains unconfirmed in formal filings.

      The Series B round of approximately $150 million, led by SoftBank Vision Fund 2 in August 2024,
      is the most recent disclosed institutional financing. No public evidence of a Series C or other
      institutional round has emerged as of mid-2026. Total disclosed plus estimated financing of
      $261 million through mid-2026 is substantially below Aurora's approximately $3.5 billion in
      total equity, but is representative of a well-resourced pre-commercial AV program at Stack AV's
      approximate headcount and development stage. The absence of a Form D filing is a material
      diligence gap: it prevents independent verification of round sizes, investor identities, dilution,
      and convertible or SAFEs outstanding. Post-Gazette coverage of Stack AV's September 2023
      emergence confirms the SoftBank backing but does not disclose round mechanics or valuations.
    claimRefs:
      - CI009
      - CI010
    tableRefs: []
    figureRefs: []

  - id: cost-structure
    title: Cost Structure and Burn Rate Analysis
    body: >
      Stack AV's operating cost structure is not publicly disclosed. The company's pre-commercial
      phase implies a cost profile that is approximately 70–85 percent research and development,
      consistent with Aurora's FY2024 R&D ratio of 86 percent of total operating expenses ($676 million
      of $786 million). Stack AV's smaller scale—estimated 200–300 employees versus Aurora's
      approximately 1,800 at commercial launch—implies proportionally lower absolute burn. Applying
      Aurora's total operating expense per employee ($438,000 annually in FY2024) to a 250-person
      Stack AV estimate yields an implied annual cost of $109 million, or $9 million per month.
      This per-employee proxy likely overstates Stack AV's burn because Aurora carries commercial
      service delivery costs (cost of revenue, field operations infrastructure) that Stack AV has not
      yet incurred. A lower-bound estimate of $150,000–$290,000 per employee—consistent with an
      earlier-stage engineering organization without commercial service overhead—yields $3–6 million
      per month in estimated cash consumption.

      The principal cost drivers for Stack AV are engineering headcount in perception, motion planning,
      simulation, and systems engineering; GPU training and simulation computing infrastructure; test
      truck fleet ownership and operating costs; and sensor hardware for fleet instrumentation. BLS
      injury and illness data confirms that long-haul trucking is among the highest-injury occupations,
      providing a safety-value argument that supplements per-mile pricing in carrier adoption
      frameworks. FMCSA's mandatory commercial driver's license requirements govern the incumbent
      labor standard; a CDL holder's legal limit of 11 hours of driving per day under hours-of-service
      regulations compares with an autonomous system's theoretical operational availability of 22 or
      more hours daily, providing the utilization argument for AV premium pricing. The ATA reports
      $906 billion in total US trucking revenue in 2024, with driver labor representing approximately
      35–40 percent of total freight cost—an estimated $317–$362 billion in annual addressable
      driver-cost displacement that anchors the revenue opportunity for AV DaaS providers.
