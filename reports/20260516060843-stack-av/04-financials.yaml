  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: stack-av-operating-financials-not-disclosed
      missingEvidence: >
        Stack AV has not publicly disclosed operating expenses, burn rate, cash balance, revenue
        contracts, or any financial statements. No Form D was located in SEC EDGAR under Stack AV
        Co or likely entity variants for either the Series A or Series B rounds, preventing
        independent verification of round sizes, investor ownership percentages, or the existence
        of SAFE or convertible note instruments. All financial estimates in this chapter are derived
        from employee-count proxies benchmarked against Aurora's public 10-K financials and may
        differ materially from actual Stack AV financial performance.
      whyItMatters: >
        Without operating expense detail, burn rate, and cash position, investors cannot calculate
        precise runway, verify capital adequacy, or underwrite the Series C timing. The absence of
        Form D filings prevents verification that the reported round sizes ($81M Series A, $150M
        Series B) match legally recorded amounts. At a company burning an estimated $36–$72 million
        annually with a capital requirement estimated at $1.5–$3 billion to reach positive gross
        margin, the uncertainty around current cash position is a primary diligence blocker.
      diligencePath: >
        Request audited or management-reviewed financial statements for FY2023–FY2025 from Stack AV
        management. Request investor update deck with operating expense line items. Search state
        corporate filings (Delaware, Pennsylvania) for Stack AV Co entity registration documents.
        Request cap table summary with fully diluted shares, option pool size, and any outstanding
        convertible instruments. Verify Series B round mechanics directly with Sequoia Capital and
        SoftBank Vision Fund 2 IR contacts.
      relatedQuestionRefs:
        - QI012
        - QI013
        - QI014
        - QI019
        - QI020
        - QI022

    - type: private-evidence-only
      severity: material
      topic: stack-av-commercial-pipeline-undisclosed
      missingEvidence: >
        Stack AV has not disclosed any commercial customer relationships, letters of intent,
        pilot agreements, or framework contracts with fleet operators as of mid-2026. The
        company's target customers—large TL carriers such as Werner, McLane, DHL, and Ryder—are
        the same carriers that Aurora has signed as commercial partners, creating ambiguity about
        whether Stack AV has parallel discussions in progress or whether Aurora's first-mover
        commercial relationships have constrained Stack AV's early-adopter pool.
      whyItMatters: >
        The absence of any disclosed commercial pipeline prevents investors from assessing Stack
        AV's revenue ramp, first-year DaaS unit economics, or the carrier adoption rate assumption
        underlying Stack AV's business plan. If Stack AV cannot name at least one anchor carrier
        partner by the time it raises its Series C, the commercial revenue model remains entirely
        theoretical, which is a material risk for a round expected to fund commercial service launch.
      diligencePath: >
        Request Stack AV management to disclose the carrier pipeline in a diligence data room,
        including LOI status, estimated contract value per truck-year, and exclusivity provisions.
        Contact Werner Enterprises, McLane, and Ryder freight procurement contacts to assess
        openness to multi-vendor AV sourcing versus Aurora exclusivity. Review Aurora NHTSA SGO
        filings for disclosed route data and fleet sizes to understand geographic scope of Aurora's
        exclusivity claims.
      relatedQuestionRefs:
        - QI016
        - QI017
        - QI018
        - QI027

    - type: missing-source
      severity: material
      topic: stack-av-cap-table-unverified
      missingEvidence: >
        No SEC Form D filing has been located for Stack AV Co in EDGAR for any of its disclosed
        funding rounds. This means the legal entity name, round sizes, investor names, and
        instrument types (equity, SAFE, convertible note) are unverified from public filings.
        The unconfirmed SoftBank $1 billion-plus commitment—reported by FreightWaves' Salesky
        Q&A—has not appeared in any regulatory filing, making it impossible to determine whether
        this is a committed capital guarantee, a planned investment, or an informal statement of
        intent.
      whyItMatters: >
        An unverified cap table is a material diligence blocker for lead investors in any
        Series C. If SoftBank's $1 billion commitment is actually a series of milestone-gated
        tranches rather than a committed guarantee, Stack AV's effective available capital may
        be substantially below the $1 billion-plus headline figure. Conversely, if additional
        tranches are already contractually committed, the runway estimate improves substantially.
      diligencePath: >
        Search SEC EDGAR for all Form D filings by Stack AV Co, Stack AV Holdings, and similar
        entity names. Review Delaware Secretary of State corporate filing for the issuer entity.
        Request cap table from management with verification against the incorporation and
        financing documents. Request SoftBank Vision Fund 2 side letter or commitment agreement
        to verify the total commitment structure.
      relatedQuestionRefs:
        - QI003
        - QI004
        - QI011
        - QI019
        - QI025

    - type: missing-source
      severity: moderate
      topic: stack-av-unit-economics-model-unavailable
      missingEvidence: >
        No public source provides Stack AV's target per-mile DaaS fee, projected cost structure
        at commercial scale, gross margin timeline, or pro forma financial model. Aurora's
        FY2025 cost of revenue ($17 million) and revenue ($3 million) provide the only public
        data point for first-year commercial AV trucking unit economics, but Aurora's fleet
        scale, route mix, and pricing are also undisclosed, limiting the usefulness of the
        Aurora proxy for underwriting Stack AV's specific economics.
      whyItMatters: >
        Without a unit economics model, investors cannot assess whether Stack AV's DaaS business
        will achieve positive gross margin before or after Series D, the magnitude of operating
        leverage achievable at fleet scale, or the working capital dynamics of the commercial
