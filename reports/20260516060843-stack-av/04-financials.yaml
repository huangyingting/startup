  - id: financial-risks
    title: Financial Risks and Investor Considerations
    body: >
      The financial risk profile for Stack AV investors encompasses five primary categories. First,
      commercialization-delay risk: a delay in technical readiness, regulatory permitting, or carrier
      adoption beyond 2028 would extend the pre-revenue period and materially increase cumulative
      capital requirements. Aurora's trajectory—six years of development and approximately $3.5
      billion in capital before generating $3 million in first-year revenue—illustrates the capital
      depth required for Level 4 trucking at full scale. If Stack AV requires comparable capital depth,
      total pre-profitability requirements could reach $1.5–$3 billion, well above current financing.

      Second, capital market access risk: autonomous trucking companies have demonstrated severe
      dependence on equity market conditions for operational continuity. The SPAC bubble collapse in
      2022–2023 eliminated Embark Trucks (approximately $614 million raised, zero commercial revenue
      at shutdown) and created going-concern conditions at Aurora. A repeat market deterioration
      would severely impair Stack AV's ability to raise its Series C or beyond at viable terms.
      Third, Aurora competitive-lock risk: if Aurora scales commercial operations rapidly and locks
      in major TL carriers under multi-year DaaS agreements—Werner Enterprises, Uber Freight, FedEx,
      and Hirschbach are disclosed partners—Stack AV's addressable partner pool at commercial
      launch narrows. Fourth, SoftBank concentration risk: with SoftBank reportedly comprising the
      majority of Stack AV's committed capital, a change in SoftBank Vision Fund 2 strategy or
      fund performance could reduce follow-on investment or introduce milestone conditions that
      constrain operational flexibility. Fifth, going-concern precedent: Aurora's FY2024 10-K
      going-concern disclosure is the clearest published signal that Level 4 commercial viability
      requires sustained equity market support, and Stack AV—as an earlier-stage, private company
      with no public financial disclosure—faces this same structural dependency without the
      transparency benefit of SEC-registered reporting.
    claimRefs:
      - CI032
      - CI035
      - CI036
      - CI037
      - CI038
    tableRefs:
