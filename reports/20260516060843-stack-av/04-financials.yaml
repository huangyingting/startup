  claims:
    - id: CI001
      statement: >
        Stack AV's primary revenue model is a Driver-as-a-Service (DaaS) fee-per-autonomous-mile
        mechanism: fleet carriers pay Stack AV a per-mile fee when the Level 4 autonomous system
        operates the truck without a human driver on commercial routes.
      type: observed
      topic: revenue-model
      sourceRefs:
        - SI005
        - SI014
        - SI010
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QI001

    - id: CI002
      statement: >
        Stack AV has generated no disclosed revenue as of mid-2026; the company is in the
        pre-commercial engineering validation phase and has not announced a commercial service
        launch date, initial route, or fleet size.
      type: observed
      topic: revenue-status
      sourceRefs:
        - SI001
        - SI003
        - SI005
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QI002

    - id: CI003
      statement: >
        Aurora Innovation's FY2025 10-K describes an asset-light DaaS commercial structure in
        which the AV technology provider does not own the truck fleet; carrier partners handle
        vehicle purchase or leasing, financing, service, and maintenance, while Aurora earns a
        fee on autonomous miles driven.
      type: observed
      topic: daas-asset-light-model
      sourceRefs:
        - SI012
        - SI014
        - SI011
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QI001

    - id: CI004
      statement: >
        Secondary revenue streams for Stack AV—including safety monitoring fees, data licensing
        to OEMs and insurers, and per-truck platform subscription fees—are speculative with no
        supporting public evidence for any autonomous trucking provider as of mid-2026.
      type: inferred
      topic: secondary-revenue-streams
      sourceRefs:
        - SI011
        - SI005
      confidence: low
      freshness: current
      answersQuestionRefs:
        - QI001

    - id: CI005
      statement: >
        Industry and Aurora-derived estimates suggest an autonomous trucking DaaS fee target of
        approximately $1.30–$2.00 per autonomous mile is required to achieve price parity with
        a fully-loaded CDL driver cost of $1.80–$2.40 per mile for long-haul operations.
      type: estimated
      topic: per-mile-pricing-target
      sourceRefs:
        - SI005
        - SI006
        - SI007
        - SI014
      confidence: low
      freshness: current
      answersQuestionRefs:
        - QI017

    - id: CI006
      statement: >
        Aurora Innovation's FY2025 10-K commercial service generated $3 million in total revenue
        in its first full commercial year (April–December 2025), implying an average realized
        per-mile fee that cannot be calculated without disclosed fleet scale and autonomous miles
        driven in the period.
      type: observed
      topic: aurora-first-year-revenue
      sourceRefs:
        - SI012
        - SI022
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QI003

    - id: CI007
      statement: >
        Aurora Innovation's FY2025 cost of revenue was $17 million on $3 million in revenue,
        yielding a gross margin of approximately negative 467 percent in its first commercial year,
        consistent with infrastructure-intensive commercial ramp where fixed costs precede revenue scale.
      type: observed
      topic: aurora-first-year-gross-margin
      sourceRefs:
        - SI012
        - SI022
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QI003

    - id: CI008
      statement: >
        The fully-loaded cost of a CDL long-haul truck driver—including wages, benefits, insurance,
        and per-diem—is estimated at $1.80–$2.40 per loaded mile or approximately $120,000–$150,000
        per driver per year, based on BLS median wage data and ATA industry cost benchmarks.
      type: estimated
      topic: cdl-driver-cost-per-mile
      sourceRefs:
        - SI007
        - SI006
        - SI017
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QI010

