  - id: capital-adequacy
    title: Capital Adequacy and Runway Assessment
    body: >
      Stack AV's capital adequacy cannot be assessed precisely because neither the actual cash
      balance nor the monthly burn rate is publicly disclosed. Using disclosed financials, the $150
      million Series B in August 2024 plus estimated $111 million from seed and Series A totals
      $261 million raised. Subtracting an estimated $30–$60 million in cumulative cash consumed from
      September 2023 through mid-2026, estimated remaining liquidity is $200–$231 million. At $3–$6
      million per month in estimated burn, this implies 33–77 months of runway from mid-2026—but
      this range is unreliable because it omits unannounced SoftBank tranches and any commercial
      revenue contribution. The more material scenario assumes Stack AV must raise a Series C in
      2026–2027 to fund the commercial launch phase, which historically requires substantially more
      capital than the pre-commercial phase. Aurora raised $466 million in August 2024 and $874
      million in FY2025 to sustain its commercial ramp; Stack AV's commercial launch will similarly
      require incremental investment in truck acquisition or leasing, safety monitoring infrastructure,
      customer onboarding, and expanded field operations.

      The RAND Corporation's AV policy research has noted that autonomous vehicle deployment
      benefits may take longer to materialize than optimistic projections suggest—a risk investors
      should weigh against Stack AV's commercialization schedule. SoftBank's reported $1 billion-plus
      commitment, if structured in tranches tied to technical or commercial milestones, provides both
      a capital backstop and a potential constraint on deployment timing. If milestone-based tranches
      do not deploy on Stack AV's required timeline, the Series C raise becomes a critical dependency
      that may need to be sourced from new investors. The absence of any publicly disclosed future
      raise, commercial revenue timeline, or pro forma model means capital adequacy assessment
      rests entirely on estimates and analogies from Aurora's public filings.
