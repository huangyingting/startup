company:
  name: Stack AV

chapter:
  number: 4
  title: Financials
  summary: >
    Stack AV Co is a pre-revenue autonomous trucking startup that has raised an estimated $261 million
    across three disclosed rounds—a stealth-phase seed (~$30 million, early 2023), a Sequoia-led Series A
    (~$81 million, January 2024), and a SoftBank Vision Fund 2–led Series B (~$150 million, August 2024).
    SoftBank has reportedly committed $1 billion or more in total, though the tranche structure and
    conditions are not publicly confirmed. Stack AV has generated no disclosed revenue as of mid-2026.
    With an estimated 200–300 employees and R&D-intensive operations, the company's implied monthly
    cash consumption is approximately $3–6 million, yielding an estimated runway of 18–36 months from
    mid-2026 before a Series C raise becomes necessary. Aurora Innovation's publicly filed FY2025
    10-K—the only available comparator for a pure-play Level 4 trucking company—shows $901 million in
    operating losses on $3 million of inaugural commercial revenue and $1.46 billion in liquidity, with
    $874 million raised via ATM equity in 2025. Stack AV's financial trajectory hinges on three factors:
    the pace of commercial deployment and per-mile DaaS fee ramp, access to follow-on capital before
    depletion, and whether SoftBank's reported commitment is drawn down in tranches that bridge to
    commercial revenue. Key diligence blockers include absence of disclosed revenue contracts, no
    publicly available operating expense data, an unverified cap table, and no disclosed pro forma
    unit economics for the commercial phase.

sections:
  - id: revenue-model
    title: Revenue Model and Monetization Strategy
    body: >
      Stack AV's revenue model is a Driver-as-a-Service (DaaS) fee-per-autonomous-mile pricing
      mechanism in which fleet operators pay a per-mile fee when Stack AV's Level 4 system drives
      a Class 8 truck without a human operator. This model mirrors Aurora Innovation's commercially
      deployed DaaS structure, described in Aurora's FY2025 10-K as a service fee charged to carrier
      partners on operational autonomous miles. The per-mile model is structurally compelling for
      autonomous trucking because it directly displaces the variable labor cost of a CDL driver—estimated
      at $0.45–$0.80 per mile for wages alone, or $1.20–$1.60 per mile including benefits, insurance,
      and per-diem—making the economic comparison legible for carrier fleet operators evaluating the
      make-or-buy decision. CEO Bryan Salesky confirmed a per-mile monetization model in a September
      2023 FreightWaves Q&A without disclosing specific pricing or contract terms.

      Stack AV has not publicly disclosed specific DaaS pricing, target per-mile fee, or any signed
      revenue-generating contracts as of mid-2026. Aurora's FY2025 10-K reports that its commercial
      service launched May 1, 2025, generated $3 million in revenue in its first full commercial year,
      with $17 million in cost of revenue—indicating early-stage unit economics at deeply negative
      gross margin, consistent with a commercial launch involving low operational scale and high fixed
      infrastructure overhead. Stack AV's aurora.tech/freight-comparable positioning describes an
      asset-light DaaS model where the AV technology provider does not own or finance the truck fleet,
      which reduces capital requirements relative to a vertically integrated fleet ownership approach.
      Secondary revenue streams—safety monitoring fees during supervised autonomy ramp, data licensing
      to OEMs and insurers, and per-truck platform subscription fees—are speculative and not supported
      by public evidence for any autonomous trucking provider as of mid-2026.
