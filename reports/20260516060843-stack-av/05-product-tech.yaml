chapter:
  number: 5
  title: Product & Technology
  summary: >
    Stack AV is building a SAE Level 4 autonomous trucking system for Class 8 long-haul freight,
    anchored by three proprietary software components: StackOS (purpose-built AV operating system),
    Clockwork (deterministic real-time middleware), and Deploy Manager (fleet-scale OTA software
    distribution). The product targets hub-to-hub highway corridors where predictable operating
    conditions limit edge-case exposure. The sensor suite integrates long-range LiDAR, multi-channel
    radar, multi-spectral cameras, and GNSS/IMU on high-performance edge compute hardware.
    Differentiation rests on the founding team's Argo AI heritage — six-plus years of perception
    and planning algorithm development and real-world deployment — combined with a strategically
    narrowed operational design domain. As of mid-2026, Stack AV remains in active development and
    multi-state testing; commercial driverless operations have not launched. Aurora Innovation's
    April 2025 commercial driverless debut in Texas is the primary benchmark. Key risks include
    sensor supply-chain concentration, perception reliability in adverse weather, compute cost at
    scale, and the unconfirmed timeline to regulatory approval.

sections:
  - id: product-definition-customer-workflow
    title: Product Definition and Customer Workflow
    body: >
      Stack AV's product is an autonomous driving system for Class 8 long-haul freight trucks,
      designed to replace the human driver on defined highway corridors between origin and destination
      logistics terminals. The company targets the hub-to-hub segment specifically because interstate
      highway driving offers predictable lane geometry, limited pedestrian interaction, and lower
      edge-case density compared to urban environments — conditions that make SAE Level 4 autonomy
      most tractable with today's sensor and compute technology. [CE001] [CE006]

      In the customer workflow, a carrier or shipper assigns a load to a Stack AV-equipped truck at
      an origin terminal. An Operations Specialist — a CDL-A licensed safety driver — performs a
      pre-trip inspection and supervises departure. Once on the highway, StackOS manages autonomous
      operation for the duration of the highway segment. Mission Control provides real-time remote
      monitoring. At the destination terminal, the Operations Specialist supervises arrival and
      post-trip procedures. [CE022] [CE033]

      This hub-to-hub model directly addresses the two largest structural pain points in long-haul
      trucking: driver shortage (estimated 60,000-unit gap that could reach 160,000 by 2030 per ATA
      projections) and hours-of-service constraints that cap human drivers at 11 hours per shift.
      An autonomous system operating within a defined ODD can in principle run 24 hours continuously,
      dramatically improving asset utilization. [CE035] [CE006]

      As of Q1 2026, Stack AV is conducting active highway testing with Operations Specialists aboard
      across at least five interstate corridors: Denver-to-Atlanta (CO/GA), Phoenix (AZ), Dallas (TX),
      and Miami (FL) routes are evidenced by active CDL-A job postings. The company has not announced
      a commercial driverless launch timeline. [CE022] [CE031]
