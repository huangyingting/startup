  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: product-line-sku-definition
      missingEvidence: >
        Stack AV has not published a formal product definition, pricing model, SKU breakdown, or
        service-level specification for freight carriers. The company discloses autonomous trucking
        as its focus area but does not describe distinct product tiers, asset ownership models
        (truck-as-a-service vs. BYOT bring-your-own-truck), or per-mile pricing structures.
      whyItMatters: >
        Without a defined product and commercial model, investors cannot assess addressable market
        penetration rate, contract economics, or competitive positioning relative to Aurora (which
        has published carrier and shipper program terms). The carrier go-to-market strategy is
        effectively opaque until a commercial launch announcement.
      diligencePath: >
        Request product specification, carrier term sheets, and pricing model in due diligence;
        interview pilot carrier partners under NDA to validate commercial structure and willingness
        to pay at scale.
      relatedQuestionRefs:
        - QE012

    - type: private-evidence-only
      severity: material
      topic: compute-hardware-platform
      missingEvidence: >
        Stack AV has not publicly disclosed its in-vehicle compute hardware vendor or platform
        specification. References to NVIDIA DRIVE AGX or equivalent are analyst inferences based
        on industry norms and competitor practices, not confirmed by Stack AV.
      whyItMatters: >
        The compute platform determines inference latency, thermal constraints, power consumption,
        and per-vehicle hardware cost. Compute cost at scale (~$10K–30K per truck estimate) is a
        critical unit economics input and represents a potential supply-chain concentration risk
        if a single vendor (e.g., NVIDIA) is used across the fleet.
      diligencePath: >
        Request compute platform disclosure in diligence; review engineering job descriptions
        for CUDA, TensorRT, DriveOS, or specific GPU architecture references; review BOM in
        any data room materials.
      relatedQuestionRefs:
        - QE011

    - type: missing-source
      severity: material
      topic: product-roadmap-commercial-timeline
      missingEvidence: >
        Stack AV has not published a product roadmap, commercial launch timeline, or technology
        maturity milestones. No investor communications, press releases, or regulatory filings
        confirming a target commercialization date were accessible.
      whyItMatters: >
        Without a disclosed timeline, investors cannot assess how long the company's current
        capital runway (~$150M reported Series B) supports development before the next funding
        event or commercial revenue onset. Aurora required ~4 years from founding to commercial
        launch; Stack AV is ~3.5 years into its life cycle.
      diligencePath: >
        Request internal roadmap in due diligence; ask management directly about target commercial
        launch date, ODD expansion plan, and FMCSA exemption filing schedule.
      relatedQuestionRefs:
        - QE026

    - type: missing-source
      severity: material
      topic: sensor-supplier-and-OEM-integration
      missingEvidence: >
        Stack AV has not confirmed its sensor suppliers (LiDAR, radar, camera vendors), compute
        hardware vendor, or truck OEM integration partner. All supplier identities in this chapter
        are analyst inferences based on industry norms and competitor disclosures.
      whyItMatters: >
        Supplier concentration risk, hardware cost trajectory, exclusivity or partnership terms,
        and OEM-specific integration engineering overhead are all diligence-material and cannot
        be assessed without knowing the actual supplier and OEM relationships.
      diligencePath: >
        Request supplier disclosure and partnership agreements in data room; review engineering
        job descriptions for vendor-specific technology mentions; review equipment financing if any.
      relatedQuestionRefs:
        - QE020
        - QE029

    - type: private-evidence-only
      severity: minor
      topic: IP-patents
      missingEvidence: >
        No patents filed by Stack AV were identified via Google Patents or USPTO searches. The
        proprietary StackOS, Clockwork, and Deploy Manager names are mentioned publicly but no
        formal IP registrations have been disclosed.
      whyItMatters: >
        Patent protection (or trade secret strategy) for core AV architecture components affects
        the defensibility of Stack AV's technical moat, especially given the competitive landscape
        of AV trucking with well-capitalized incumbents and large OEMs.
      diligencePath: >
        Request IP schedule in diligence; review any pending patent applications; assess trade
        secret protection strategy and employment agreements for IP assignment clauses.
      relatedQuestionRefs:
        - QE018
