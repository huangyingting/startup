callouts:
  - id: CE-call1
    type: strength
    title: "Proprietary Three-Layer Stack: StackOS + Clockwork + Deploy Manager"
    body: >
      Stack AV's decision to build StackOS, Clockwork, and Deploy Manager as proprietary components
      rather than relying on open-source ROS or commercial middleware creates a vertically integrated
      stack with full visibility into real-time determinism, safety properties, and OTA update
      security. This architectural control is a meaningful technical moat relative to competitors
      using commodity middleware, though it concentrates engineering risk internally and limits
      access to external ecosystem tooling.
    claimRefs:
      - CE002
      - CE004
      - CE005
      - CE019

  - id: CE-call2
    type: risk
    title: "Technology Maturity Gap: No Confirmed Commercial Launch Timeline"
    body: >
      As of Q1 2026, Stack AV has not publicly disclosed a commercial driverless launch timeline,
      has not published a safety case or Voluntary Safety Self-Assessment, and has not filed FMCSA
      exemption paperwork for driverless operation. Aurora Innovation — the most advanced competitor
      — took more than four years from founding to commercial driverless launch. Stack AV is roughly
      3.5 years from its 2022 founding with no public commercialization gate milestone announced.
      This gap is the primary technology-stage risk for investors.
    claimRefs:
      - CE028
      - CE029
      - CE031
      - CE034

  - id: CE-call3
    type: insight
    title: "Aurora's April 2025 Commercial Launch as the Sector Benchmark"
    body: >
      Aurora Innovation's commercial driverless trucking debut on April 28, 2025 — the first
      commercial driverless Class 8 truck operation in U.S. history — establishes a concrete
      benchmark for what Stack AV must achieve. Aurora's path included a 400,000-mile autonomous
      safety case, FMCSA exemption filings, Texas-specific permitting, and carrier and insurance
      partner commitments. Stack AV's investors and management team should model their own
      commercialization critical path against Aurora's documented regulatory and operational gates.
    claimRefs:
      - CE028
      - CE034

  - id: CE-call4
    type: assumption
    title: "Compute Platform and Sensor Supplier Are Inferred, Not Confirmed"
    body: >
      This chapter's references to NVIDIA DRIVE-class compute hardware and Luminar-class LiDAR
      are inferences based on industry norms for Level 4 AV systems and supplier market context.
      Stack AV has not disclosed its compute platform vendor, sensor suppliers, or bill-of-materials
      configuration. Diligence should include specific confirmation of hardware partnerships,
      per-unit sensor cost, and supply concentration risk.
    claimRefs:
      - CE007
      - CE008
      - CE021

