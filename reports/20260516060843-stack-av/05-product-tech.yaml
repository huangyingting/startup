  - id: technology-architecture-operating-model
    title: Technology Architecture and Operating Model
    body: >
      Stack AV's technology stack is organized around three proprietary software layers that sit
      above the hardware platform and below the operational support toolchain. StackOS is the
      purpose-built autonomous vehicle operating system that provides the real-time execution
      environment for sensor processing, perception, prediction, and motion planning. Unlike
      general-purpose operating systems, StackOS is designed to meet the strict latency, determinism,
      and functional safety requirements of a safety-critical AV application. [CE002] [CE003]

      Clockwork is the middleware layer that governs timing-critical orchestration between StackOS
      modules. Deterministic middleware is architecturally essential in autonomous systems: if the
      perception module delivers a detection update 50 milliseconds late, the planning module may
      generate a trajectory based on stale world state — a failure mode that cascades to safety-
      critical vehicle actuation. Clockwork addresses this by providing deterministic task scheduling,
      inter-module message brokering, and timing watchdogs. [CE004] [CE014]

      Deploy Manager handles fleet-scale software distribution and over-the-air updates, enabling
      Stack AV to push perception model updates, planning algorithm changes, and safety patches to
      its entire test fleet without per-truck manual intervention. This is one of the key scaling
      infrastructure components that separates development-phase AV from commercial-phase AV:
      continuous improvement of the ML stack requires a safe, reliable, and auditable update
      delivery system. [CE005] [CE037]

      The sensor suite comprises multi-modal inputs: long-range LiDAR for 3D point cloud generation
      and object ranging, multi-channel radar for velocity estimation and adverse-weather robustness,
      multi-spectral cameras for lane marking and traffic signal detection, and GNSS/IMU for absolute
      positioning. These inputs feed into StackOS's perception module, which performs sensor fusion
      to produce a unified world model. High-performance edge compute hardware — consistent with
      NVIDIA DRIVE AGX or equivalent automotive-grade GPU platforms — accelerates neural network
      inference for perception and prediction. [CE007] [CE008] [CE009] [CE013]

      The architecture reflects the end-to-end AV stack paradigm documented extensively in the
      research literature: raw sensor inputs are processed into a world model, which feeds prediction
      of dynamic object trajectories, which in turn feeds a motion planner that generates the vehicle's
      trajectory, which is executed by the low-level vehicle controller via the truck chassis CAN bus
      interface. Baidu's Apollo open-source platform and Torc Robotics' SEE-THINK-ACT framework are
      public reference architectures for this approach. [CE010] [CE011] [CE015]
