company:
  name: Stack AV
chapter:
  number: 7
  title: Risks
  summary: 'Stack AV''s risk profile is dominated by two interlocking critical-path exposures: the absence of a federal driverless
    exemption from FMCSA CDL requirements — which legally blocks commercial driverless CMV operations nationally — and SoftBank
    Vision Fund''s concentration as lead investor creating binary funding risk in a capital-intensive pre-revenue company.
    Regulatory and legal risks are broadly severe: a 50-state AV legislative patchwork, unresolved product liability frameworks
    for ADS crashes, Argo AI patent IP exposure carried through the founding team, and NHTSA''s crash-reporting regime all
    constrain commercialization. Operationally, sensor hardware concentration (Luminar LiDAR, NVIDIA compute), adverse-weather
    performance limits, cybersecurity gaps, and OEM integration dependencies layer material execution risk. People risk is
    outsized — the CEO, CTO, and President are all Argo AI alumni whose departure would simultaneously threaten investor confidence,
    IP position, and technical roadmap. Financial risk centers on the multi-year pre-revenue burn and the going-concern exposure
    that arises if Series B fundraising is delayed. Organized labor (Teamsters, OOIDA) opposition compounds regulatory headwinds.
    Kill criteria include FMCSA exemption denial, a fatal AV crash, Aurora IP injunction, or SoftBank funding withdrawal.

    '
sections:
- id: regulatory-legal-risks
  title: Regulatory and Legal Risks
  body: 'Stack AV faces a layered and unresolved regulatory and legal risk stack that represents the primary barrier to commercialization.
    The most critical regulatory gap is the absence of a federal FMCSA driverless exemption: 49 CFR §383.3 requires a CDL-holder
    for all commercial motor vehicle (CMV) operations, and FMCSA has not issued a final rule permitting fully autonomous driverless
    CMV operations on US public roads. Without this exemption, Stack AV cannot commercially operate driverless trucks regardless
    of technical readiness. [CR002]

    NHTSA''s Standing General Order on Crash Reporting (third amendment effective June 2025) imposes mandatory crash reporting
    obligations on all ADS operators, with penalties up to $27,874 per violation per day ($139M cap for related series). Any
    crash involving Stack AV''s ADS within 30 seconds of the incident triggers a public report, creating reputational and
    regulatory exposure at each incident. [CR001]

    At the state level, Stack AV''s target corridors span TX, PA, CA, and AZ — four states with meaningfully different AV
    testing and operations rules, creating compliance overhead and restricting which corridors can be operated driverlessly
    in the near term. Texas Transportation Code §545 permits AV operation without a driver, but FMCSA federal overlay complicates
    commercialization. California''s Vehicle Code §38750 requires separate DMV manufacturer approval for commercial driverless
    deployment. The NCSL AV Legislation Database tracks over 50 states'' evolving AV laws, documenting the patchwork risk.
    [CR003] [CR004] [CR005] [CR039]

    Product liability exposure is unsettled: no federal statute assigns ADS crash liability conclusively to the ADS developer,
    OEM, or carrier. Stack AV faces catastrophic tort exposure in a crash scenario without settled federal standards, and
    its 49 USC §30120 recall remedy obligations would apply to any defective ADS component. [CR010] [CR011] [CR012]

    IP risk is material. Argo AI patents (named CTO Brett Browning as inventor) were assigned to Argo AI LLC; the IP chain
    from Argo AI to Stack AV through the founding team requires independent legal verification. Aurora Innovation and Waymo
    hold extensive AV patent portfolios covering trajectory prediction, mapping, and sensor fusion systems that overlap with
    Stack AV''s technical approach. [CR006] [CR007]

    EPA''s Clean Trucks Plan imposes model year 2027+ NOx and GHG standards on heavy-duty truck platforms; Stack AV''s OEM
    truck sourcing must comply or face non-compliant fleet risk. Data privacy exposure under the FTC Safeguards Rule may apply
    to Stack AV''s collection of geospatial, freight route, and operator data. [CR008] [CR009] [CR041]

    '
