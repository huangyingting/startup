callouts:
- id: CR-call1
  type: risk
  title: FMCSA Driverless Exemption Is the Critical-Path Regulatory Block
  body: 'FMCSA has not issued a rule permitting commercial driverless CMV operations; CDL requirements under 49 CFR §383.3
    continue to apply. Without a federal exemption, Stack AV cannot deploy driverless trucks commercially regardless of technical
    readiness. Aurora obtained operating authority for its Dallas–Houston driverless program, but the path to FMCSA driverless
    exemptions for all AV developers remains undefined. This is the single most important regulatory diligence item: confirm
    whether Stack AV has filed an exemption petition and at what stage. A failure to achieve federal framework clearance by
    2028 constitutes a thesis-break trigger.

    '
  claimRefs:
  - CR002
  - CR012
- id: CR-call2
  type: risk
  title: SoftBank Concentration Creates Binary Pre-Revenue Funding Risk
  body: 'SoftBank Vision Fund''s role as lead investor in Stack AV''s $81M Series A creates single-point funding dependency
    in a pre-revenue company that requires $500M+ more to reach commercial launch scale. SoftBank Vision Fund 1 and 2 have
    collectively written down over $30B in portfolio losses including WeWork; LP pressure on follow-on conviction is elevated.
    If SoftBank does not lead or participate meaningfully in the Series B, Stack AV faces a going-concern scenario. An investor
    should require evidence of Series B pipeline diversification and alternative capital sources before committing additional
    capital.

    '
  claimRefs:
  - CR023
  - CR024
