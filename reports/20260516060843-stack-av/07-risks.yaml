  claims:
  - id: CR001
    statement: 'NHTSA''s third amended Standing General Order (effective June 16, 2025) requires ADS operators to report crashes
      involving fatalities or injuries within 5 days, and less severe crashes monthly; civil penalties may reach $27,874 per
      violation per day up to $139M for a series of related violations.

      '
    type: observed
    topic: regulatory-risk
    sourceRefs:
    - SR009
    - SR010
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR002
  - id: CR002
    statement: 'FMCSA regulations under 49 CFR §383.3 require a CDL holder for all commercial motor vehicle operations; no
      final FMCSA rule as of May 2026 creates a blanket driverless exemption for ADS-equipped trucks, meaning commercial driverless
      CMV operations lack a clear federal authorization pathway.

      '
    type: observed
    topic: regulatory-risk
    sourceRefs:
    - SR002
    - SR012
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR001
  - id: CR003
    statement: 'California Vehicle Code §38750 requires manufacturers to obtain DMV testing permits for AV testing on public
      roads and a separate manufacturer approval for commercial driverless deployment, imposing state-level regulatory requirements
      in addition to any FMCSA federal obligations.

      '
    type: observed
    topic: regulatory-risk
    sourceRefs:
    - SR005
    - SR004
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR003
  - id: CR004
    statement: 'The NCSL AV Legislation Database tracks AV-related legislation in all 50 states since 2017; as of 2025, states
      apply widely different frameworks for commercial AV operations, testing permits, liability rules, and operator requirements,
      creating a compliance overhead risk for AV trucking companies operating across multiple state corridors.

      '
    type: observed
    topic: regulatory-risk
    sourceRefs:
    - SR004
    - SR022
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR003
  - id: CR005
    statement: 'Texas Transportation Code §545 was amended to permit the operation of fully automated motor vehicles on public
      roads without a licensed human driver, making Texas among the more permissive US states for AV trucking operations;
      however, FMCSA federal CDL requirements still overlay state permissions for interstate commercial freight.

      '
    type: observed
    topic: regulatory-risk
    sourceRefs:
    - SR008
    - SR004
    confidence: high
    freshness: recent
    answersQuestionRefs:
    - QR003
  - id: CR006
    statement: 'Argo AI LLC patents, accessible through Justia, name Stack AV CTO Brett Browning as inventor on multiple AV
      systems including vehicle trajectory generation, collision avoidance, and map generation technologies; the chain of
      IP ownership from Argo AI LLC to Stack AV through the founding team requires independent legal verification and is not
      publicly confirmed.

      '
    type: observed
    topic: legal-risk
    sourceRefs:
    - SR003
    - SR017
    confidence: high
    freshness: current
    answersQuestionRefs:
    - QR004
  - id: CR007
    statement: 'Aurora Innovation and Waymo hold extensive AV patent portfolios covering trajectory prediction, sensor fusion,
      and mapping systems that overlap with the technical domains addressed in Argo AI''s patent portfolio; Aurora''s acquisition
      of Uber ATG''s assets created a combined IP estate that represents a plausible FTO risk for Stack AV''s Argo AI-derived
      technology stack.

