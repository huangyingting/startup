- id: risk-summary-mitigations
  title: Risk Summary, Mitigations, and Kill Criteria
  body: 'The consolidated risk heatmap shows four Critical-residual-severity risks that each represent potential thesis breaks:
    (1) FMCSA driverless exemption block preventing commercial operations; (2) SoftBank funding withdrawal triggering going-concern;
    (3) a fatal AV crash triggering regulatory shutdown and liability cascades; and (4) an Aurora or Waymo IP injunction halting
    deployment. High-residual risks include the 50-state regulatory patchwork, cybersecurity exposure, OTA failure at scale,
    and key-person departure. Medium-residual risks include EPA emissions non-compliance and OEM integration delays. [CR001]
    [CR002] [CR006] [CR014] [CR023] [CR026]

    Mitigation adequacy varies widely. Regulatory mitigation is weak — Stack AV has not publicly engaged FMCSA for a driverless
    exemption petition, and no dedicated regulatory affairs team has been disclosed. IP mitigation is unconfirmed — no freedom-to-operate
    (FTO) analysis or Argo AI patent assignment confirmation has been published. Financial mitigation is limited to the $81M
    Series A runway. Operational mitigation is more mature — the team''s Argo AI heritage provides safety engineering infrastructure,
    but no third-party safety case validation has been published. [CR019] [CR033] [CR038]

    Kill criteria are explicitly monitorable and should be embedded in investor monitoring frameworks. The five thesis-break
    events are: (1) FMCSA denies or indefinitely delays the driverless exemption pathway; (2) SoftBank does not commit to
    a Series B within 18 months; (3) a fatal AV crash attributable to Stack AV''s ADS; (4) an IP injunction from Aurora or
    Waymo; (5) CEO or CTO departure in years 1–3. Secondary monitoring triggers include the Aurora commercialization pace
    (thesis benchmark), Luminar financial health, and state AV legislative calendars. [CR014] [CR032] [CR033]

    Diligence priorities: (1) FMCSA exemption petition status confirmation; (2) IP assignment from Argo AI alumni; (3) OEM
    contract terms; (4) insurance structure and limits; (5) cybersecurity audit; (6) going-concern disclosure review; and
    (7) Aurora freight volume benchmarks for regulatory feasibility timing.

    '
