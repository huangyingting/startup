callouts:
  - id: CP-call1
    type: risk
    title: "Aurora's Going-Concern Risk Is Also a Sector Risk"
    body: >
      Aurora Innovation's $600 million annual operating loss and going-concern disclosures represent a
      systemic risk for the entire Level 4 trucking sector. If Aurora fails before achieving commercial-
      scale revenue—as Embark and TuSimple did before it—the reputational damage to Level 4 trucking
      could reduce carrier willingness to partner with any AV provider for 12–24 months. Stack AV's
      launch timing should factor in this scenario: launching after Aurora demonstrates sustained
      commercial viability reduces technology risk, while launching too close risks shared reputational
      exposure to any early Aurora incident.
    claimRefs:
      - CP009
      - CP027
      - CP043
    sourceRefs:
      - SP002
      - SP012

  - id: CP-call2
    type: insight
    title: "Waymo Via's Exit Removes the Most Dangerous Long-Term Competitor"
    body: >
      Waymo's decision to wind down Via (trucking) removes the most financially formidable potential
      competitor from the near-term landscape. Alphabet's balance sheet and world-class AV technology
      from Waymo One would have enabled sustained losses and aggressive land-grabbing in fleet
      partnerships that capital-constrained independents could not match. Waymo Via's absence opens
      the 2025–2030 window for Stack AV to build fleet relationships before Alphabet's potential
      re-entry. Investors should monitor Waymo Arizona truck testing as a re-entry leading indicator.
    claimRefs:
      - CP003
      - CP025
    sourceRefs:
      - SP011
      - SP020

  - id: CP-call3
    type: strength
    title: "Competitor Exits Validate the Capital Intensity Moat"
    body: >
      The exits of Embark and TuSimple—both of which had more public capital than Stack AV at their
      peak—paradoxically strengthen the investment thesis for well-funded survivors. The demonstrated
      cost of a commercial Level 4 AV system at scale is $1–3 billion or more, creating a financial
      barrier to new entry grounded in empirical evidence. The competitive field as of mid-2026 is
      likely near its final composition for the commercial phase, making the key question not "how
      crowded is the market?" but "which of the remaining five will survive to commercial scale?"
    claimRefs:
      - CP002
      - CP026
      - CP027
      - CP042
    sourceRefs:
      - SP012
      - SP014

  - id: CP-call4
    type: risk
    title: "Plus AI's ADAS Model Delays Full-Level 4 Carrier Commitment"
    body: >
      Plus AI's commercially successful SuperDrive ADAS product creates an indirect competitive risk
      for Stack AV: by providing fleet operators with a lower-cost, lower-risk technology product that
      improves driver performance, Plus AI reduces carrier urgency to commit to Level 4. Fleet operators
      already paying ADAS subscriptions have reduced technology change budgets and may treat Level 4
      as a future upgrade. Stack AV should monitor Plus AI's carrier penetration as a proxy for fleet
      operator technology saturation in the pre-Level 4 window.
    claimRefs:
      - CP019
      - CP022
      - CP036
    sourceRefs:
      - SP005
      - SP013

