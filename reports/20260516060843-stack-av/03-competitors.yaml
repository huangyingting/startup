    - id: CP001
      statement: >
        As of mid-2026 the SAE Level 4 autonomous long-haul trucking market has four primary direct
        competitors to Stack AV: Aurora Innovation (commercial), Torc Robotics (Daimler-owned,
        pre-commercial), Kodiak Robotics (independent, pre-commercial, military-active), and Plus AI
        (ADAS-revenue generating with Level 4 on roadmap).
      type: observed
      topic: competitive-landscape
      sourceRefs:
        - SP001
        - SP003
        - SP004
        - SP005
      confidence: high
      freshness: current
      answersQuestionRefs:
        - QP001

    - id: CP002
      statement: >
        Two previously significant AV trucking entrants have exited the market as of 2026: Embark Trucks
        (shut down February 2023 after SPAC failure and capital depletion) and TuSimple/Hydron (effectively
        exited the US market by 2023 following SEC investigations and governance scandals related to
        undisclosed data sharing with Chinese-connected Hydron Inc.).
      type: observed
      topic: competitor-exits
      sourceRefs:
        - SP012
        - SP014
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP013
        - QP014
        - QP017

    - id: CP003
      statement: >
        Waymo Via, Alphabet's autonomous trucking segment, wound down commercial trucking development
        in 2023–2024 to concentrate resources on Waymo One passenger ride-hailing operations in Phoenix
        and San Francisco, removing the most financially formidable potential competitor from the
        near-term AV trucking field.
      type: observed
      topic: waymo-via-exit
      sourceRefs:
        - SP011
        - SP014
        - SP020
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - QP003
        - QP021

    - id: CP004
      statement: >
