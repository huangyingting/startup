  - id: capability-comparison
    title: Capability Comparison and Feature Analysis
    tableRefs:
      - TP002
    figureRefs:
      - FP001
      - FP002
    body: >
      Aurora, Torc, and Kodiak all target SAE Level 4 on public US interstate highways in Class 8
      trucks, placing them in the same ODD class as Stack AV. Only Aurora has demonstrated sustained
      commercial operations without a safety driver as of mid-2026. None of the primary long-haul AV
      competitors publish independently verified safety miles, disengagement rates, or audited safety
      performance benchmarks accessible to external analysts; NHTSA's Standing General Order requires
      crash incident reporting but not miles-based benchmarking. This information asymmetry means
      direct performance comparisons rely on milestone announcements and proxy signals rather than
      verified metrics.

      Stack AV's differentiated positioning derives from: (1) Argo AI technology inheritance,
      including sensor suite and perception stack from a program that received approximately $3.6
      billion in total investment from Ford and Volkswagen; (2) a founding team led by Bryan Salesky
      (Argo AI CEO) and Peter Rander (Argo AI COO) with approximately 40+ Argo AI alumni providing
      institutional continuity; (3) a freight-specific founding identity without robotaxi technical
      debt; and (4) Series A funding from Sequoia Capital. The primary capability diligence gap is
      that Stack AV has not published a Safety Case Framework or VSSA comparable to Aurora's, making
      it difficult to independently compare safety architectures.

      Torc's OEM-integrated approach differs from Stack AV's and Aurora's portable software stacks:
      Torc co-develops within Freightliner hardware, enabling tighter integration but limiting
      addressable trucks. Gatik and Einride demonstrate that commercial revenue is achievable today,
      but only in substantially simpler ODDs (fixed middle-mile routes; private industrial corridors)
      than Stack AV's open-highway target.
    claimRefs:
      - CP028
      - CP029
      - CP030
      - CP031
      - CP046

  - id: competitive-moats
    title: Competitive Moats and Adverse Evidence
    tableRefs:
      - TP003
      - TP004
    figureRefs:
      - FP003
    body: >
      Aurora's first-mover commercial partnerships create initial switching costs: Werner Enterprises,
      Uber Freight, and FedEx integrating Aurora Driver into dispatch, telematics, and maintenance
      frameworks face 12–24-month replacement cycles. If Aurora has exclusivity provisions in these
      arrangements (not publicly disclosed), Stack AV's path to the same carriers is materially
      constrained. Torc's Daimler distribution moat is substantial but narrow—it only benefits
      customers buying new Freightliner trucks. Kodiak's military contract diversification provides
      a unique financial buffer unavailable to commercial-only competitors. Stack AV's moat rests
      on technology inheritance and talent density rather than commercial lock-in, making its
      durability harder to assess externally.

      Adverse competitive dynamics are significant. Aurora's $600 million annual operating loss and
      going-concern disclosures represent a systemic risk: if Aurora fails before achieving commercial-
      scale revenue—as Embark and TuSimple did before it—the reputational damage to Level 4 trucking
      broadly could delay carrier partnerships for 12–24 months across all AV providers. High capital
      intensity creates both moat and fragility: the estimated cost of developing a validated Level 4
      commercial-scale AV system is $1–3 billion or more, which has proved to be the existential
      barrier separating survivors (Aurora, Torc, Kodiak, Stack AV) from failures (Embark, TuSimple).
      The 2023–2024 freight recession further delayed carrier AV investment decisions by reducing
      available capital expenditure budgets across the trucking sector.
    claimRefs:
      - CP033
      - CP034
      - CP037
      - CP038
