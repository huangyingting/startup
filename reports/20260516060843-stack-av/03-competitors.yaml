  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: aurora-commercial-contract-terms-undisclosed
      missingEvidence: >
        Aurora's actual realized per-mile pricing, contract duration, exclusivity provisions, and
        fleet operator economics in its Werner/Uber Freight/FedEx agreements are not publicly
        disclosed. Without this information it is impossible to determine whether Aurora's first-mover
        pricing creates a durable benchmark or whether Stack AV can compete on price at equivalent cost.
      whyItMatters: >
        Aurora's commercial pricing will serve as the de facto benchmark for Level 4 trucking contracts.
        If Aurora has exclusivity provisions with major TL carriers, Stack AV's path to the same fleet
        partners is materially constrained. Without pricing visibility, investor models of Stack AV's
        revenue potential rest on estimates rather than anchored comparables.
      diligencePath: >
        Request Aurora's commercial contract structure from industry contacts at Werner Enterprises or
        Uber Freight. Model pricing bounds from Aurora's stated driver-cost-parity target and available
        freight spot rate data (DAT trendlines). Screen Aurora NHTSA SGO filings for incident data that
        may correlate with operational scale.
      relatedQuestionRefs:
        - QP009
        - QP010

    - type: missing-source
      severity: material
      topic: no-verified-safety-performance-benchmarks
      missingEvidence: >
        No AV trucking competitor—including Aurora—publishes independently verified safety miles,
        disengagement rates, or third-party validated safety performance data comparable to California
        DMV's AV disengagement report requirement. NHTSA's Standing General Order requires crash
        reporting but not miles-based safety benchmarking, creating a structural evidence gap for
        external safety comparisons.
      whyItMatters: >
        Investors cannot independently assess Stack AV's relative safety progress versus Aurora,
        Kodiak, or Torc. Safety performance is the critical gating factor for commercial deployment
        and carrier insurance framework development; without public benchmarks, all comparative
        claims rely on company-reported milestone announcements.
      diligencePath: >
        Request safety miles, ADAS intervention rates, and disengagement data from Stack AV management
        under NDA. Review Aurora NHTSA Standing General Order crash reports for incident frequency.
        Commission independent safety audit against Aurora's published Safety Case Framework as a
        comparable methodology.
      relatedQuestionRefs:
        - QP009
        - QP029

    - type: private-evidence-only
      severity: minor
      topic: waymo-via-reentry-timeline-unknown
      missingEvidence: >
        Waymo Via's current truck testing activity level and internal commercial trucking re-entry
        timeline are not publicly disclosed. Waymo's strategic communications since the 2023–2024
        wind-down have been minimal, making it impossible to assess re-entry risk timing or the
        strategic conditions under which Alphabet would recommit to commercial trucking.
      whyItMatters: >
        Waymo's potential re-entry with Alphabet's balance sheet is the highest-impact tail risk for
        the AV trucking competitive landscape. If Waymo re-enters commercial trucking within 3–5 years,
        its ability to sustain operating losses indefinitely while building fleet relationships would
        disadvantage all capital-constrained competitors including Stack AV.
      diligencePath: >
        Monitor Waymo NHTSA Standing General Order crash reports for Class 8 truck incidents. Track
        Arizona DMV AV testing permits for Waymo commercial truck classes. Review Alphabet investor
        communications for any mention of Waymo Via or trucking segment activity.
      relatedQuestionRefs:
        - QP021
