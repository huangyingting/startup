      - TM003
    figureRefs:
      - FM003

  - id: growth-drivers
    title: Growth Drivers and Market Constraints
    body: >
      The most durable growth driver for autonomous trucking is the structural driver shortage.
      The American Trucking Associations has identified driver availability as a top industry concern for
      multiple consecutive years; ATA press releases document ongoing carrier difficulty attracting and
      retaining qualified CDL holders despite wage increases. FMCSA hours-of-service regulations limit
      property-carrying drivers to 11 hours of driving within a 14-hour work window, with a mandatory
      30-minute break after 8 consecutive hours and a 60/70-hour weekly cap. An autonomous truck
      eliminates these productivity ceilings by operating continuously within its ODD, yielding
      theoretical throughput advantages of 50–100% over human-driven equivalents on long-haul routes.

      EPA Phase 3 GHG standards, finalized in 2024 via Federal Register rulemaking, require 40% of
      new Class 8 heavy-duty vehicle sales to be zero-emission starting with model year 2032. This
      creates convergence pressure between AV adoption and electrification: autonomous systems are
      better suited to manage range-optimized routes for battery-electric trucks, potentially
      accelerating AV platform adoption by OEMs and fleets investing in ZE infrastructure. Freight
      volume growth is a secular tailwind; FHWA Freight Analysis Framework projects continued US
      freight growth through 2050, with major interstate corridors expected to see sustained volume
      increases.

      Constraints include regulatory fragmentation (no uniform federal framework for Level 4 trucks),
      nascent insurance liability standards, high sensor hardware costs (~$50K per vehicle at 2025
      prices), and public trust risks. A single high-profile safety incident could delay regulatory
      timelines across multiple states, as evidenced by the regulatory ripple effects from prior
      autonomous vehicle incidents in the passenger car space.
