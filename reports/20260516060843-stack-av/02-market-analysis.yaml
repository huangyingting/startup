chapter:
  number: 2
  title: Market Analysis
  summary: >
    The US trucking industry generated $906 billion in revenue in 2024, carrying 72.7% of all domestic
    freight by weight across approximately 580,000 carriers and 3.58 million drivers. Stack AV targets the
    hub-to-hub long-haul segment—routes exceeding 250 miles on predictable interstate corridors—which
    represents an estimated 35–40% of total US trucking revenue, or roughly $317 billion in addressable
    spend. The global autonomous truck market is valued at approximately $42.6 billion in 2026 and is
    projected to reach $74.2 billion by 2031 at an 11.73% CAGR (Mordor Intelligence), with North America
    holding a 37.5% share. Key demand drivers include a structural driver shortage, FMCSA hours-of-service
    limits that cap human driver productivity, EPA Phase 3 GHG mandates targeting 40% zero-emission heavy-
    duty sales by model year 2032, and growing shipper demand for freight reliability. Aurora Innovation's
    commercial launch on May 1, 2025 establishes market precedent but also marks the beginning of the
    most intensive competitive phase. Key constraints include regulatory fragmentation across US states,
    nascent insurance liability frameworks, and high sensor hardware costs (~$50,000 per vehicle).

sections:
  - id: market-boundary
    title: Market Boundary and Definition
    body: >
      Stack AV competes in the US commercial trucking market, specifically the long-haul (>250-mile)
      hub-to-hub segment that is most tractable for SAE Level 4 autonomous operation. The total US trucking
      market generated $906 billion in revenue in 2024, making it the dominant domestic freight mode at
      72.7% of all freight by weight. Within this, the long-haul truckload segment—characterized by
      point-to-point routes between distribution hubs on controlled-access interstates—accounts for an
      estimated 35–40% of total revenue, or roughly $300–360 billion. This is the serviceable market that
      autonomous trucking platforms can realistically displace in the near term.

      The market boundary excludes local and regional delivery (final-mile), less-than-truckload (LTL)
      consolidation networks requiring complex handoffs, and specialized cargo requiring human judgment
      (hazmat, flatbed, temperature-sensitive freight with complex loading). It also excludes fleet
      management software, transport management systems (TMS), and adjacent logistics SaaS, which represent
      integration surfaces rather than direct revenue opportunities for Stack AV.

      The principal status-quo substitutes are human-driven Class 8 trucks operated by owner-operators or
      employed drivers. Approximately 2.235 million heavy truck drivers are employed in the US, earning a
      median wage of $57,440 per year—representing roughly $128 billion in annual driver labor costs that
      autonomous systems could partially displace. SAE J3016 Level 4 automation defines the operational
      design domain (ODD) within which Stack AV's system must perform without human intervention, limiting
      the initial deployment to well-defined, weather-resilient, high-volume freight corridors.
    claimRefs:
      - CM001
      - CM002
      - CM003
