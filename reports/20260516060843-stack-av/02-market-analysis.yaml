  - id: buyer-segmentation
    title: Buyer Segmentation and Adoption Path
    body: >
      The autonomous trucking market has a layered buyer structure. At the top, large asset-based
      truckload (TL) carriers—companies like Werner Enterprises, Hirschbach Motor Lines, and similar
      operators with 500+ tractors—are the primary technology buyers and earliest adopters. These carriers
      own the trucks, hold the operating authority, and bear the liability, making them the direct payer
      of AV technology licenses or per-mile autonomous service fees. Their adoption trigger is a
      combination of driver availability constraints and long-term cost reduction targets; Werner and
      Hirschbach's partnerships with Aurora Innovation signal that large US carriers are actively
      evaluating AV technology.

      Large shippers and third-party logistics providers (3PLs) are the secondary buyer segment—they
      procure freight capacity from carriers and create the demand signal that justifies carrier investment
      in autonomous technology. Shippers care about freight reliability, dwell time reduction, and
      predictable lane pricing; they do not buy AV technology directly but influence carrier adoption by
      preferring AV-capable lanes when reliability improves. Original equipment manufacturers (OEMs) like
      Daimler Truck (via Torc Robotics) and Volvo Autonomous Solutions represent a third segment—they
      integrate AV technology at the hardware level, creating a different buyer-technology relationship
      than pure software licensing.

      The adoption path follows a regulatory funnel: technology validation → FMCSA exemptions or
      state-level permits → carrier pilot programs → commercial launch on specific corridors → geographic
      scaling. Aurora's May 2025 commercial launch represents the first proven traversal of this funnel
      for Level 4 autonomous trucks in the US, validating that the path exists and establishing a
      competitive precedent for Stack AV.
    claimRefs:
      - CM014
      - CM015
      - CM016
      - CM019
      - CM026
      - CM040
