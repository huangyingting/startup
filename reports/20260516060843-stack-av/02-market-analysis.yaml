  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and SOM"
    body: >
      Market sizing for autonomous trucking requires triangulating multiple lenses because no single
      authoritative public estimate defines the serviceable addressable market with precision. The total
      addressable market (TAM) is best anchored by the American Trucking Associations' 2024 data: $906
      billion in total US trucking revenue. This represents the theoretical ceiling if autonomous systems
      fully displaced all truck operations—an unrealistic near-term scenario but a useful TAM anchor.

      The autonomous truck market specifically—technology-enabled AV platform revenue, hardware, and
      services—is estimated at $42.6 billion globally in 2026, rising to $74.2 billion by 2031 at an
      11.73% CAGR, per Mordor Intelligence. North America holds approximately 37.5% of global market
      share, or roughly $16 billion in 2026 attributable AV trucking value. Level 4 systems represent the
      fastest-growing segment at an estimated 15.21% CAGR, which aligns with Stack AV's technology target.

      A bottom-up SAM estimate for hub-to-hub AV trucking derives from the long-haul segment share of
      US trucking revenue (~$317 billion) discounted for near-term regulatory, route-readiness, and fleet
      electrification constraints. Reasonable SAM estimates land in the $100–200 billion range for the
      full US addressable market over a 10-year horizon. The serviceable obtainable market (SOM) for
      pre-commercial startups like Stack AV in 2025–2030 is not publicly quantified, but Aurora
      Innovation's commercial launch on specific Texas corridors suggests the initial penetrable SOM is
      measured in hundreds of truck-routes and billions rather than tens of billions of dollars.

      Driver labor cost is an alternative sizing lens: at $128 billion in annual US driver wages, even
      20% autonomous substitution over 10 years represents $25 billion in annual economic value at stake.
