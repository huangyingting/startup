  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: stack-av-som-deployment-targets-undisclosed
      missingEvidence: >
        Stack AV has not publicly disclosed its serviceable obtainable market estimate, near-term route
        targets, commercial deployment timeline, or carrier partner agreements. No independent analyst
        estimate sizes Stack AV's specific SOM. Aurora's DFW–Houston corridor launch provides a
        structural proxy but is not a directly applicable SOM benchmark for Stack AV, which remains
        pre-commercial as of mid-2026.
      whyItMatters: >
        Without a defined SOM, investors cannot assess whether Stack AV's capital allocation and runway
        are commensurate with its deployment ambition. The gap between theoretical SAM ($100–200B) and
        accessible SOM for a pre-commercial startup is likely 10–50x, making the specific SOM critical
        to valuation and milestones.
      diligencePath: >
        Request proprietary route pipeline, commercial LOIs or carrier agreements, and deployment
        sequencing plan from Stack AV management. Model bottom-up from lane-level freight density data
        (FHWA Freight Analysis Framework) against Stack AV's ODD and stated vehicle count targets.
      relatedQuestionRefs:
        - QM025

    - type: conflicting-data
      severity: material
      topic: conflicting-autonomous-market-size-projections
      missingEvidence: >
        Only one independent analyst estimate (Mordor Intelligence, $42.6B in 2026 to $74.2B by 2031)
        was accessible for the global autonomous truck market. No cross-validated projection from a
        second major analyst (IHS Markit, BloombergNEF, McKinsey, S&P Global) was accessible due to
        paywalls. The Mordor estimate cannot be independently verified, and its methodology (revenue
        from technology sales, hardware, and services bundled) may double-count OEM hardware revenue
        with software platform revenue.
      whyItMatters: >
        Market sizing is a foundation for valuation comparables. A single-source estimate without
        cross-validation creates material uncertainty in any DCF or market-penetration model for
        Stack AV or sector comparables.
      diligencePath: >
        License a second analyst report (IHS Markit, BloombergNEF, or Guidehouse Insights) for
        cross-validation. Alternatively, build a first-principles bottom-up TAM from FHWA freight
        ton-miles × AV cost-per-mile premium vs. human driver equivalent.
      relatedQuestionRefs:
        - QM018
        - QM026

    - type: missing-source
      severity: minor
      topic: state-level-av-trucking-permit-requirements
      missingEvidence: >
        Comprehensive, current listings of state-by-state AV truck permit requirements were not
        accessible through publicly available sources. Texas, Arizona, and a limited number of other
        states have enacted AV-friendly frameworks, but a definitive multi-state permitting map for
        Level 4 commercial trucks as of mid-2026 was not found. NHTSA and USDOT resources provide
        federal-level guidance only.
      whyItMatters: >
        Stack AV's route expansion will require state-by-state permitting. If multiple target states
        lack clear permitting frameworks for Level 4 trucks (no human in cab), deployment could be
        delayed regardless of technology readiness.
      diligencePath: >
        Review each target state's AV-specific statutes via state DMV and transportation department
        websites. Engage autonomy-specialized legal counsel to map the permitting landscape for Level 4
        commercial trucks across Stack AV's disclosed test markets (PA, CO, GA, AZ, TX, FL).
      relatedQuestionRefs: []
