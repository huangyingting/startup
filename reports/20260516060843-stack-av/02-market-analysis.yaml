callouts:
  - id: CM-call1
    type: strength
    title: "Driver Shortage Creates Durable Demand Signal"
    body: >
      The structural US driver shortage is the single most compelling near-term demand driver for autonomous
      trucking. ATA data confirms ongoing carrier recruitment difficulty; BLS projects only 4% employment
      growth through 2034 against backdrop of secular freight volume increases. Unlike cyclical freight
      downturns, driver availability is a long-run constraint driven by demographics and career preferences.
      This creates a durable ROI justification for autonomous deployment that does not depend on technology
      cost declining to parity with human labor.
    claimRefs:
      - CM003
      - CM017
      - CM019
      - CM037
    sourceRefs:
      - SM001
      - SM005
      - SM022

  - id: CM-call2
    type: risk
    title: "Market Sizing Estimates Carry High Uncertainty"
    body: >
      All autonomous truck market size estimates reviewed for this chapter derive from single-source analyst
      reports without independently verifiable methodology. Mordor Intelligence's $42.6 billion 2026 figure
      cannot be cross-validated against other published projections. First-principles SAM estimates based on
      ATA total revenue and long-haul segment share involve substantial assumptions about route eligibility
      and near-term deployability. Investors and analysts should treat all specific TAM/SAM figures as
      directional order-of-magnitude anchors rather than precise forecasts.
    claimRefs:
      - CM006
      - CM007
      - CM043
      - CM044
    sourceRefs:
      - SM002

  - id: CM-call3
    type: insight
    title: "EPA Phase 3 Creates Convergence Pressure Between AV and ZE Deployment"
    body: >
      EPA Phase 3 GHG standards requiring 40% zero-emission Class 8 truck sales by model year 2032 create
      an underappreciated convergence dynamic with autonomous deployment. Battery-electric heavy trucks face
      range and charging infrastructure constraints that are most tractable on well-defined, hub-to-hub
      routes—precisely the routes where Level 4 AV is most viable. AV systems can optimize ZE range
      management in ways human drivers cannot, potentially making AV+ZE bundles more economically attractive
      than either technology alone. OEMs and fleets making $50B+ ZE infrastructure commitments in 2024–2027
      may prefer AV platforms that integrate with their electrification strategies.
    claimRefs:
      - CM020
      - CM021
      - CM029
    sourceRefs:
      - SM006
      - SM014

  - id: CM-call4
    type: assumption
    title: "Hub-to-Hub SAM Estimate is First-Principles Approximation"
    body: >
      The $100–200 billion SAM range cited in this chapter for US hub-to-hub autonomous trucking is derived
      from first-principles: ATA total trucking revenue ($906B) × estimated long-haul segment share
      (35–40%) × eligibility discount for near-term ODD constraints. No independent published study was
      found that directly sizes the US hub-to-hub autonomous trucking SAM with this methodology. The SOM
      for Stack AV specifically is not publicly quantified. These figures should be validated in investor
      diligence with proprietary route-density and carrier-adoption modeling.
    claimRefs:
      - CM043
      - CM044
    sourceRefs:
      - SM001
      - SM002

