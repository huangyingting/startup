  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Microsoft M365 Copilot AI video roadmap — avatar authoring and SCORM timeline
      missingEvidence: >-
        Microsoft's public roadmap for adding avatar-presenter authoring or SCORM/LMS export to M365 Copilot video
        generation capability
      whyItMatters: >-
        If Microsoft adds these features within 24 months, it creates a zero-incremental-cost alternative for
        Synthesia's entire enterprise L&D value proposition within the M365 installed base
      diligencePath: >-
        Review Microsoft Ignite/Build session recordings; engage analyst coverage of M365 Copilot product roadmap;
        assess whether Synthesia management tracks Microsoft as a primary competitive threat
      relatedQuestionRefs:
        - RQ320
    - type: missing-source
      severity: material
      topic: Synthesia enterprise win/loss rate against direct competitors
      missingEvidence: >-
        Verified data on how often Synthesia wins competitive evaluations against HeyGen, Colossyan, or Deepbrain AI; or
        evidence of accounts that churned to a competitor
      whyItMatters: >-
        Win/loss data would validate whether Synthesia's compliance and integration moat translates to durable pricing
        power or whether it is being competed down in renewal negotiations
      diligencePath: >-
        Request competitive win/loss analysis from Synthesia management; review Gong/CRM competitive intelligence data
        if available in due diligence
      relatedQuestionRefs:
        - RQ322
    - type: missing-source
      severity: moderate
      topic: 3-year competitive disruption scenario — big-tech avatar authoring entry
      missingEvidence: >-
        Analyst scenario analysis of Microsoft or Google acquiring a direct competitor (HeyGen, Deepbrain) to accelerate
        avatar-authoring capability
      whyItMatters: >-
        A Microsoft or Google acquisition of HeyGen would combine distribution scale with existing avatar technology,
        representing the highest-severity single-event risk to Synthesia's market position
      diligencePath: >-
        Model acquisition probability using HeyGen's $500M valuation vs. Microsoft and Google M&A appetite; assess
        whether Synthesia has right-of-first-refusal or M&A defense provisions
      relatedQuestionRefs:
        - RQ323
    - type: missing-source
      severity: moderate
      topic: Deepfake controversy impact on Synthesia enterprise procurement and churn
      missingEvidence: >-
        Customer attrition or pipeline loss data attributable to the 2024 avatar propaganda misuse controversy;
        enterprise buyer sentiment survey evidence
      whyItMatters: >-
        If the controversy caused measurable churn or pipeline stalls in regulated sectors (government, finance), it
        would indicate a reputational liability that discounts future revenue growth assumptions
      diligencePath: >-
        Request customer success data segmented by industry for Q3–Q4 2024 relative to pre-controversy baselines; review
        whether any enterprise customers cited the controversy as a cancellation reason
      relatedQuestionRefs:
        - RQ325
