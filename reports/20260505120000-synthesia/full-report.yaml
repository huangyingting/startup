            title: Deepfake Controversy Exposes Content Governance Gaps
            body: |
              The 2024 propaganda misuse incidents — where Synthesia avatars appeared in
              disinformation campaigns for authoritarian regimes without actors' consent — represent
              a material reputational and regulatory risk. Equity (UK performers' union) has
              campaigned publicly, and evolving EU AI Act and UK AI regulation may impose stricter
              controls. While Synthesia has issued updated guidelines and joined the PAI framework,
              the adequacy of these controls is actively contested.
