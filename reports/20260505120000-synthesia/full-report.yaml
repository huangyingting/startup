            title: Rapid Revenue Scaling and Enterprise Traction
            body: |
              Synthesia crossed $100 M ARR in April 2025 and reached an estimated $146 M by
              September 2025 — implying strong net retention and enterprise expansion. Over 70 % of
              Fortune 100 companies are reported customers, providing durable logo quality and
              upsell optionality. The combination of a $4 B valuation and confirmed revenue milestone
              anchors the investment case.
