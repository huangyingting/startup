companyProfile:
  summary: >
    Synthesia (est. 2017, London) is the world's leading enterprise AI video generation platform. Founded by CEO Viktor
    Riparbelli, COO/CFO Steffen Tjerrild, and academic co-founders Prof. Matthias Niessner (TU Munich) and Prof. Lourdes
    Agapito (UCL), the company enables enterprises to create AI avatar video at scale in 140+ languages without cameras,
    studios, or professional actors. Synthesia raised a $200M Series E in October 2025 led by GV (Google Ventures) and
    NVIDIA NVentures at a $4.0B valuation — nearly doubling its $2.1B Series D valuation from January 2025. The company
    crossed $100M ARR in April 2025 and reached an estimated $146M ARR by September 2025. HolonIQ added Synthesia to its
    global EdTech unicorn list in December 2025 at $4.0B, validating the company's status as the enterprise L&D AI
    platform market leader.
  foundedDate: '2017-01-01'
  founders:
    - name: Viktor Riparbelli
      role: CEO and Co-founder
      background: >
        Danish entrepreneur; previously co-founded and exited an analytics startup; serial founder with product-led
        go-to-market background. Has led Synthesia through five funding rounds from seed to $4.0B Series E.
      claimRefs: []
    - name: Steffen Tjerrild
      role: COO and CFO, Co-founder
      background: >
        Prior experience in finance and operations; serves dual executive role covering financial governance and
        operational leadership alongside Riparbelli as CEO.
      claimRefs: []
    - name: Prof. Matthias Niessner
      role: Co-founder and Chief Scientist (part-time, TU Munich)
      background: >
        Professor of Visual Computing at TU Munich; pioneer of neural face rendering and deepfake detection research;
        brings academic AI provenance to Synthesia's Express-2 model development.
      claimRefs: []
    - name: Prof. Lourdes Agapito
      role: Co-founder (part-time, UCL)
      background: >
        Professor of Computer Vision at University College London; specialist in 3D reconstruction and human motion;
        provides academic research depth to Synthesia's avatar and motion modelling.
      claimRefs: []
  foundingLocation: London, United Kingdom
  headquarters: London, United Kingdom
  productSummary: >
    Synthesia's core product is an AI video authoring platform enabling enterprise users to create video content using
    230+ built-in AI avatars or custom personal AI avatars in 140+ languages. Synthesia 2.0 (June 2024) introduced
    full-body avatars and Express-1 models. Express-2 (September 2025, released on all plans) delivers real-time,
    hyper-realistic AI avatar video. Synthesia 3.0 / Video Agents (October 2025) adds real-time interactive
    conversational AI avatars for use in HR screening, compliance training, customer onboarding, and personalized
    learning — expanding the product from video authoring into AI-native workflow automation.
  customerFocus: >
    Enterprise and mid-market organizations across L&D, internal communications, HR, and sales enablement. 70%+ of
    Fortune 100 companies are customers. Named enterprise customers include Heineken (70,000-employee deployment),
    DuPont (L&D cost savings), Zoom (90% faster video production), Spirit Airlines (76% reduction in live-agent
    inquiries), Orange (9x learner retention improvement), and BSH Group (60,000-employee training deployment).
  businessModel: >
    SaaS subscription with per-seat and enterprise tiering. Enterprise contracts include custom avatar creation,
    dedicated customer success, API access, and SCORM/LRS integration. Land-and-expand motion: customers begin with
    departmental adoption and expand to enterprise-wide deployment. The 142% NRR reflects strong expansion from initial
    seats to broader organizational contracts. International revenues are significant with EU, UK, and North America all
    represented in the customer base.
  stage: Series E / Late-Stage Private
  fundingStatus: >
    $200M Series E (October 2025, GV-led, $4.0B post-money); $180M Series D (January 2025, NEA-led, $2.1B post-money);
    $90M Series C (June 2023, Accel-led, $1.0B post-money); earlier rounds include Series A and B. Total raised:
    approximately $530M across all rounds.
  disclosureProfile: private-disclosed
  claimRefs: []
chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Model
        blocks:
          - type: paragraph
            body: |
              Synthesia (full legal name Synthesia Ltd) is a private technology company headquartered
              in London, United Kingdom, with offices in New York, Copenhagen, and other locations.
              It was incorporated in 2017 and operates as a B2B SaaS platform. The company's core
              product — Synthesia STUDIO — allows enterprise users to turn text scripts into
              professional-quality videos featuring lifelike AI avatars speaking in 140+ languages
              without any on-camera recording or traditional production workflow. The business model
              is subscription-based, with tiers ranging from a free/starter plan through Creator and
              Enterprise plans; the majority of revenue derives from enterprise contracts. Synthesia
              is classified in the AI-generated video, synthetic media, and workplace learning
              authoring-tool categories. HolonIQ added Synthesia to its Global EdTech Unicorn list in
              December 2025, categorising it under "Authoring Tools (AI)" given substantial adoption
              by corporate L&D and training teams. The company's original unicorn designation came
              from its June 2023 Series C at a $1.0 B post-money valuation.
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Synthesia was co-founded in 2017 by four individuals with complementary expertise in
              AI research, computer vision, and entrepreneurship. Viktor Riparbelli (CEO) is the
              commercial and strategic leader who has steered the company from research project to
              $4 B enterprise platform. Steffen Tjerrild, co-founder and now COO/CFO, oversees
              operations and finance. Prof. Matthias Niessner (Technical University of Munich) and
              Prof. Lourdes Agapito (University College London), both distinguished computer-vision
              researchers, co-founded the company and provide ongoing scientific leadership;
              Niessner's work on neural rendering underpins much of Synthesia's avatar technology.
              Jonathan Starck serves as CTO, leading engineering; Peter Hill joined as a senior
              technology executive around the Series D close in January 2025. The board includes
              representatives from key investors GV (Google Ventures), Accel, NEA, and Kleiner
              Perkins. Key-person risk is concentrated around Viktor Riparbelli, whose public profile
              and vision drive press and investor relations; however, the academic co-founders provide
              technical credibility and institutional depth that partially mitigates this risk.
            claimRefs:
              - C006
              - C007
              - C008
              - C009
              - C010
              - C011
      - number: '1.3'
        title: Funding History and Valuation
        blocks:
          - type: paragraph
            body: |
              Synthesia has raised approximately $530 M in total equity funding across six rounds
              since its founding. The seed/Series A in April 2019 raised approximately $3.8 M from
              LDV Capital, Mark Cuban, and Seedcamp. A $12.5 M round in April 2021 (FirstMark,
              LDV Capital) preceded the landmark $50 M Series B in December 2021 led by Kleiner
              Perkins — a round that brought in GV (Google Ventures), Accel, and angel investors
              Patrick Collison and John Collison at a reported $1 B post-money valuation. The
              $90 M Series C in June 2023 (led by Accel, with NVentures/Nvidia and GV) solidified
              unicorn status at a $1 B valuation. Synthesia then raised $180 M in January 2025
              (Series D, NEA-led, $2.1 B valuation) and $200 M in October 2025 (Series E,
              Google Ventures-led, $4.0 B valuation). The Series E included a secondary share
              sale facility facilitated with Nasdaq, enabling employees to cash out. Adobe Ventures
              made a strategic investment in April 2025 alongside the company's $100 M ARR
              milestone. The company was classified as an EdTech unicorn by HolonIQ in December 2025
              at the $4.0 B Series E valuation because of its education and training authoring use
              case — though its original unicorn round was the June 2023 Series C at $1 B.
            claimRefs:
