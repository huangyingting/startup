      - number: '3.6'
        title: 反向证据与否定信号
        blocks:
          - type: paragraph
            body: >
              多个信号挑战 Synthesia 竞争地位的耐久性。HeyGen 的资本效率（约 $100M ARR、157 名员工，对比 Synthesia 约 $146M ARR 的分析师估计和约 700
              名员工）说明，在价格战中 Synthesia 的成本结构可能成为负担。Colossyan 的无限分钟定价直接压迫 Synthesia 在中型市场的计量模式；注重预算的 L&D
              团队可能把量放在合规深度之前。公开市场上没有独立基准比较 Synthesia、HeyGen 和 Deepbrain AI
              的数字人逼真度、延迟或输出一致性——市场评论中的所有能力比较都依赖厂商撰写内容或用户主观评估，使客观差异化主张无法验证。此外，Synthesia 2024 年 deepfake 争议（数字人在 Venezuela
              和 Burkina Faso 政治宣传中被滥用）尚未被独立证明导致企业客户流失，但它会给受监管行业增加采购审查风险，尤其是政府和金融服务。
            claimRefs: []
      - number: '3.7'
        title: 图表
        blocks:
          - type: callout
            title: 优势——合规与内容锁定构成耐久护城河
            body: >
              Synthesia 结合 ISO 42001 AI 治理认证和深度 LMS 集成，形成复合护城河。ISO 42001 在企业 AI
              视频领域并不常见，并越来越出现在受监管行业的采购门槛中。叠加内容库切换成本，即便直接竞争者在定价和逼真度上接近对等，Synthesia 仍有望留住企业账户。
            calloutType: strength
            claimRefs:
              - CP021
              - CP023
              - CP024
          - type: callout
            title: 风险——HeyGen 的资本效率构成结构性定价威胁
            body: >
              HeyGen 以 157 名员工产生约 $100M ARR——按员工收入看，这一比率意味着其运营杠杆显著低于 Synthesia 约 700 人的组织。该结构性效率可能让 HeyGen
              在不触及盈利约束的情况下维持激进定价，或吸收企业销售投入；而 Synthesia 更大的固定成本基础可能限制定价灵活性。
            calloutType: risk
            claimRefs:
              - CP029
              - CP030
          - type: callout
            title: 风险——Microsoft 的 M365 分发构成零成本打包威胁
            body: >
              Microsoft 365 Copilot 集成 Sora 2 视频生成，尽管今天技术上仍有限（25 秒片段、无数字人主持人工作流），但代表不对称竞争风险。如果 Microsoft 加入 SCORM
              导出或数字人创作能力——无论自研还是通过收购——它都可能以零增量成本向现有 M365 企业订阅者提供功能上可比的产品，压缩 Synthesia 在 SMB 和中型市场的定价权。
            calloutType: risk
