      - number: '5.3'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              截至 2025 年，Synthesia 在企业 AI 视频领域拥有最完整的合规体系。SOC 2 Type II 认证自 2022
              年起持续有效，覆盖安全、可用性、处理完整性、保密性和隐私控制，每年接受第三方审计。ISO/IEC 27001:2022（信息安全管理体系）和 ISO/IEC
              27701:2019（隐私信息管理体系）覆盖访问控制、加密、事件响应及跨境数据传输治理。最值得关注的是，Synthesia 是全球首家获得 ISO/IEC 42001:2023（AI 管理体系）认证的 AI
              视频平台，由 A-LIGN 于 2024 年 9 月颁发——认证范围涵盖 AI 透明度、公平性及 EU AI Act 合规。数据治理遵循"3Cs"框架（Consent 知情同意、Control
              控制权、Collaboration 协作）：定制 avatar 须获得个人的书面同意；未经明确授权，客户数据绝不用于训练 Synthesia 模型；所有内容均经过自动化与人工审核。Synthesia
              是内容真实性倡议（Content Authenticity Initiative）和 Partnership on AI
              的成员。信任中心（security.synthesia.io）实时展示安全态势、认证证书及渗透测试报告。
            claimRefs: []
