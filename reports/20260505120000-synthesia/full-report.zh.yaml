              监管风险。英国演员工会 Equity 已公开发起倡导行动；不断演进的欧盟《AI 法案》和英国 AI 监管可能施加更严格的管控要求。
              尽管 Synthesia 已发布更新准则并加入 PAI 框架，这些管控措施是否充分仍存有争议。
