      - number: '1.4'
        title: 规模、指标与地域足迹
        blocks:
          - type: paragraph
            body: |
              截至 2026 年初，Synthesia 报告平台拥有超过 65,000 家企业客户和超过 1 million 名
              注册用户。超过 70 % 的 Fortune 100 公司是活跃客户。年经常性收入（ARR）在 2025 年
              4 月越过 $100 M，分析师估计到 2025 年 9 月 ARR 约为 $145–146 M。收入在美国与
              国际市场之间大致 50/50 分布。到 2026 年初，员工数增至约 700 人，工程和 AI 研究
