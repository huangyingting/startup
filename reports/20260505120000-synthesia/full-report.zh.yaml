      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: |
              自成立以来，Synthesia 已在六轮融资中累计募集约 $530 M 股权资金。2019 年 4 月的
              种子轮 / Series A 从 LDV Capital、Mark Cuban 和 Seedcamp 募得约 $3.8 M。2021 年
              4 月一轮 $12.5 M 融资（FirstMark、LDV Capital）之后，2021 年 12 月迎来由
              Kleiner Perkins 领投的标志性 $50 M Series B；该轮引入 GV（Google Ventures）、
              Accel，以及天使投资人 Patrick Collison 和 John Collison，报道投后估值为 $1 B。
              2023 年 6 月 $90 M Series C（Accel 领投，NVentures/Nvidia 和 GV 参投）以 $1 B
              估值巩固了独角兽地位。此后，Synthesia 于 2025 年 1 月融资 $180 M（Series D，
              NEA 领投，估值 $2.1 B），并于 2025 年 10 月融资 $200 M（Series E，Google
              Ventures 领投，估值 $4.0 B）。Series E 包含通过 Nasdaq 促成的老股出售安排，
              让员工可以套现。Adobe Ventures 于 2025 年 4 月在公司达到 $100 M ARR 里程碑时
              进行战略投资。HolonIQ 在 2025 年 12 月以 $4.0 B Series E 估值将公司列为 EdTech
              独角兽，原因是其教育和培训创作场景——尽管公司最早成为独角兽是在 2023 年 6 月
              $1 B 估值的 Series C。
