              HeyGen 以 157 名员工创造约 $100M ARR，单人产值大幅高于 Synthesia 约 700 人组织所隐含水平。这一结构性效率差距使 HeyGen
              得以维持激进定价或承担企业销售投入而不触及盈利约束，而 Synthesia 较大的固定成本基础则可能限制其定价灵活性。
