            title: 风险——人均营收差距揭示运营杠杆约束
            body: >
              Synthesia 人均营收约 $209K（$146M ARR 除以约 700 人）与 HeyGen 在相近 ARR 规模下约 $637K 的人均水平相比处于明显 劣势。这 3 倍差距表明 Synthesia
              的成本结构更重，可能反映了服务 Fortune 100 客群所需的企业销售动作（客户管理、合规 开销、专业服务）。在 AI 模型进步可能将虚拟人质量商品化的市场中，这一成本结构限制了定价灵活性，可能制约
