  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与来源
        blocks:
          - type: paragraph
            body: >
              Synthesia 的多流 SaaS 收入模式以年度企业合同为核心锚点（约占 ARR 的 70%），同时保有覆盖 SMB 和个人创作者的自助 订阅尾部。主要收入流为按三档公开定价的席位订阅：入门版（$18/ 席位
              / 月）、Creator 版（$64/ 席位 / 月）和企业版 （定制，中位年费约 $30K）。次要收入流为 API 按量计费，嵌入企业合同或作为付费附加项提供大规模程序化视频生成。第三流
              为定制虚拟人制作服务，按一次性或周期性项目定价，公开定价未披露。多语言翻译与本地化能力驱动最显著的扩张收入：约 40% 的 Synthesia
              生成视频是源内容的翻译版本，意味着每家企业客户随语言覆盖扩展持续产生增量收入。企业账户从基础席位 和分钟配额起步，随培训、入职和内部沟通工作量增长自然扩张——形成具有历史性强劲增购表现的先落地后扩张 GTM
              结构。
