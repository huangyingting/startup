  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: |
              Synthesia 的可触达市场跨越三层嵌套类别。最宽的框架是全球 AI 视频市场——涵盖面向
              消费者、媒体和企业垂直领域的所有 AI 生成或 AI 增强视频创作、编辑和流媒体。这个
              市场对 Synthesia 当前的企业聚焦过宽。更相关的中层框架是企业 AI 视频平台市场：
              这类软件工具帮助企业规模化创建、个性化和本地化视频内容，主要服务内部沟通、培训、
              入职、销售赋能和客户教育，并绕开传统制作流程。在其中，Synthesia 最紧的竞争空间是
              企业 eLearning 和培训创作工具——具体说，是用 AI 数字人驱动的视频内容替代或增强
              PowerPoint / 真人讲师工作流的 AI 平台。HolonIQ 正是在这一类别下把 Synthesia 归为
              EdTech 独角兽。

              明确排除在 Synthesia 的 SAM 之外的支出包括：广播和流媒体视频平台（Netflix、
              Disney+、YouTube 基础设施）、传统视频制作代理和影棚、通用视频编辑软件（Adobe
              Premiere、DaVinci）、娱乐 / 游戏 AI 视频，以及视频监控 / 安防。相邻增长机会——面向
              客户的营销视频、互动产品导览、销售用 AI 视频智能体——代表扩张路径，但尚未在
              Synthesia 当前收入结构中形成规模。Synthesia 替代或竞争的现状方案包括：企业内部
              视频制作工作室、专业视频代理、录屏 + 配音工具栈（Camtasia、Loom）、PowerPoint +
              旁白，以及传统讲师主导培训。
