      - number: '5.3'
        title: 信任、安全、信息安全与合规
        blocks:
          - type: paragraph
            body: >
              截至 2025 年，Synthesia 在企业 AI 视频赛道拥有最完整的合规栈。SOC 2 Type II 认证自 2022
              年起已经到位，覆盖安全性、可用性、处理完整性、保密性和隐私控制，并持续接受年度第三方审计。ISO/IEC 27001:2022（信息安全管理体系）和 ISO/IEC
              27701:2019（隐私信息管理体系）覆盖访问控制、加密、事件响应和跨境数据传输治理。最有辨识度的是，Synthesia 是首个获得 ISO/IEC 42001:2023（AI 管理体系）认证的 AI
              视频平台；该认证由 A-LIGN 于 September 2024 签发，指向 AI 透明度、公平性和 EU AI Act
              合规。数据治理遵循「3Cs」框架（Consent、Control、Collaboration，即同意、控制、协作）：定制虚拟人必须取得本人明确且有记录的同意；未经明确授权，客户数据绝不会用于训练
              Synthesia 的模型；所有内容都经过自动化和人工审核。Synthesia 是 Content Authenticity Initiative 和 Partnership on AI 的成员。Trust
              Center（security.synthesia.io）提供实时安全态势、证书和渗透测试报告。
            claimRefs: []
          - type: table
            tableRef: TE004
            claimRefs:
              - CE015
              - CE016
              - CE017
              - CE018
              - CE019
      - number: '5.4'
        title: 部署、集成与开发者体验
        blocks:
          - type: paragraph
            body: >
              Synthesia 支持三种部署方式：Web 浏览器（面向多数用户的浏览器版 Studio）、REST API（供企业 IT 和开发团队以编程方式生成视频），以及 LMS/SCORM
              集成（无需手动传文件，内容可直接交付到学习管理系统）。API 采用 RESTful 设计并异步生成视频：请求提交后，云端 GPU 基础设施负责处理；视频完成后，可通过 webhook 通知和下载 URL
              获取。API 支持 OpenAPI/Swagger 规范、Postman 集合，以及基于 webhook 的事件处理。SCORM 导出可生成符合 SCORM 1.2 和 xAPI（Tin Can
              API）的包，用于上传到 Cornerstone OnDemand、SAP SuccessFactors、Moodle、Docebo 等 LMS 平台。企业身份提供商可通过 SAML 2.0
              使用单点登录（SSO）。正常运行时间和 SLA 数据通过 Trust Center 管理，未公开具体百分比；Synthesia 为企业账户提供标准 SaaS 可靠性承诺。
            claimRefs: []
      - number: '5.5'
        title: 产品路线图与开发阶段
        blocks:
          - type: paragraph
            body: >
              Synthesia 到 2025 年的公开产品路线图显示，公司正在从静态虚拟人视频转向交互式、智能体视频体验。从 Synthesia 2.0 到 3.0（June 2024 to October
              2025）的推进，意味着 16 个月内完成两次大版本迭代：2.0 推出全身虚拟人和 Express-1（上下文自适应表情）；3.0 推出 Video Agents（实时对话式 AI 虚拟人）和
              Express-2（超写实、全身、任意时长、1080p/30fps）。Video Agents 是短期内最有差异化的能力——在一次视频会话中，用户可以与 AI 主持人双向互动，潜在场景包括入职培训、HR
              筛选、合规培训评估和客户支持自动化。Express-2 研究团队已通过 Synthesia Research GitHub 页面发布结果，说明公司采用研究先行的产品开发模式。2025
              年公开沟通提到的后续能力包括：更高级的文本提示生成虚拟人定制（从文本提示中选择外观、场景和服装），以及把 B-roll / 素材视频与动态场景中的虚拟人叠加集成。
            claimRefs: []
