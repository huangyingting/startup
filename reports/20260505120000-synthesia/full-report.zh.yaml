      - number: '8.3'
        title: 当前估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >
              Synthesia E 轮估值 40 亿美元，对应约 1.46 亿美元 ARR（2025 年 9 月），隐含约 27 倍历史 ARR 倍数和约 23 倍预期远期 ARR（约 1.75 亿美元，基于 Sacra
              增速轨迹估算）。该倍数远高于上市 SaaS 中位值（2025 年上市 SaaS EV/Revenue 中位约 4–6 倍），但与符合以下条件的最高增速企业 AI SaaS 公司队列一致：（1）ARR 同比增速 >
              60%；（2）NRR > 130%；（3）毛利率 > 70%；（4）可防御的市场领导地位。参考对比：Datadog 交易于约 11 倍 EV/Revenue，ServiceNow 约 15
              倍——两者增速较慢但已实现盈利。在 Synthesia 这一增速下，品类定义型 AI 平台的私有市场溢价相对上市 SaaS 历史上为 1.5–2 倍可比公开倍数，意味着按当前指标的公允价值区间约为 35 亿至
              45 亿美元——恰好是 Synthesia 的定价区间。E 轮 2 亿美元含老股交易部分（现有股东流动性）；实际流入运营的新股净额未披露，低于账面 2 亿美元。五轮融资的优先股堆叠（累计融资 5.3
              亿美元以上）对任何低于 40 亿美元的退出均形成实质性的普通股摊薄负担。以 40 亿美元入场，须在 IPO 时实现 15–20 倍 NTM 收入倍数（对应 2028 年 IPO 时预计 ARR 3–4
              亿美元），才能产生 2–3 倍投入资本回报——可行但依赖持续执行。
