    title: 公司概况
    sections:
      - number: '1.1'
        title: 主体认定与商业模式
        blocks:
          - type: paragraph
            body: |
              Synthesia（法定全称 Synthesia Ltd）是一家总部位于英国伦敦的私营科技公司，在纽约、哥本哈根等地设有办公室，
              2017 年注册成立，以 B2B SaaS 平台形式运营。核心产品 Synthesia STUDIO 让企业用户无需出镜录制或传统制作流程，
              即可将文字脚本转化为以 140 多种语言发音的专业级 AI 虚拟人视频。商业模式为订阅制，从免费 / 入门版到 Creator 版和
              Enterprise 版分级定价，主要收入来自企业合同。Synthesia 被归类于 AI 生成视频、合成媒体和职场学习创作工具三大类目。
              2025 年 12 月，HolonIQ 将 Synthesia 纳入全球教育科技独角兽名单，以"创作工具（AI）"分类，理由是其在企业 L&D 和
              培训团队中的广泛采用。公司最初的独角兽认定来自 2023 年 6 月 Series C，post-money 估值 $1.0B。
