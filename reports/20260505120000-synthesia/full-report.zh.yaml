      - number: '1.3'
        title: 融资历史与估值
        blocks:
          - type: paragraph
            body: |
              Synthesia 自创立以来已完成六轮股权融资，累计约 $530M。2019 年 4 月种子 / Series A 轮融资约 $3.8M，
              投资方为 LDV Capital、Mark Cuban 和 Seedcamp。2021 年 4 月完成 $12.5M 融资（FirstMark、LDV Capital），
              随后于 2021 年 12 月完成具有里程碑意义的 $50M Series B，由 Kleiner Perkins 领投，GV（Google Ventures）、
              Accel 及天使投资人 Patrick Collison 和 John Collison 跟投，据报 post-money 估值 $1B。2023 年 6 月 $90M
              Series C（Accel 领投，NVentures/Nvidia 和 GV 跟投）确立独角兽地位，估值 $1B。此后公司于 2025 年 1 月完成
              $180M Series D（NEA 领投，估值 $2.1B），并于 2025 年 10 月完成 $200M Series E（Google Ventures 领投，
              估值 $4.0B）。Series E 含一项与纳斯达克合作的老股转让安排，员工可借此套现。Adobe Ventures 于 2025 年 4 月
              完成战略投资，恰逢公司 ARR 突破 $100M。HolonIQ 于 2025 年 12 月以 Series E 估值 $4.0B 将 Synthesia 列为
              教育科技独角兽，理由是其教育培训创作工具的定位——尽管公司最初的独角兽轮次是 2023 年 6 月 Series C（估值 $1B）。
