      - number: '6.3'
        title: 具名客户验证
        blocks:
          - type: paragraph
            body: >
              Synthesia 的公开案例库包括一批具名企业客户，覆盖 FMCG（Heineken）、化工 / 科学（DuPont）、航空（Spirit Airlines）、科技（Zoom）、电信（Orange）和制造 /
              家电（BSH）。每个案例都记录了生产级部署（不是试点），并给出量化结果。按结果质量看，最强的案例是 Spirit Airlines（员工支持咨询减少 76%）、DuPont（每支视频节省
              $10,000+，制作速度提升 80%）和 Orange（知识留存提升 9x）。这些结果是公司引用数字，未经独立审计，应视为方向性指标，而非精确验证。具名案例横跨
              FMCG、化工、航空、电信、制造和科技，说明产品具备横向适用性。截至研究日期，公开来源中未识别出带量化结果的金融服务或医疗健康具名案例；鉴于 Synthesia 声称的 Fortune 100
              渗透率，这一点值得注意，也可能反映受监管行业偏好 NDA。
            claimRefs: []
