      - number: '2.5'
        title: 典型案例
        blocks:
          - type: callout
            title: 市场边界分散度高，SAM 框架需保守
            body: |
              分析机构对 Synthesia 可寻址市场的估算从 $717M（AI 视频生成软件）到 $10.3B（广义 AI 视频）跨越 14 倍。尽调应将
              电子学习创作工具细分（$6–7B）和企业 AI 视频创作子细分（约 $2–3B）作为最具可比性的边界锚点。Synthesia 约 $146M ARR
              对应 5–7% SAM 渗透率，显示尚有充足上升空间——但需要持续的产品质量和定价权。
            calloutType: insight
            claimRefs:
              - CM004
              - CM007
              - CM011
          - type: callout
            title: LMS 平台巨头威胁将创作层商品化
            body: |
              Workday、SAP SuccessFactors 和 Cornerstone OnDemand 均在 LMS 平台中加入原生 AI 内容创作能力。若这些老牌厂商原生
              嵌入 AI 视频创作，Synthesia 的整合优势将被侵蚀，其 SAM 或将收窄至愿意为专属虚拟人视频制作付费的高端细分市场。这一
              风险因 Synthesia $4B 估值所隐含的 TAM 占领逻辑而更趋紧张——该逻辑要求持久的类目领导地位。
            calloutType: risk
            claimRefs:
              - CM022
              - CM024
          - type: callout
            title: 多语言能力是全球企业 SAM 中的结构性护城河
            body: |
              Synthesia 支持 140 多种语言，填补了传统企业视频制作的结构性缺口：大多数全球企业无法以足够快的速度或可承受的成本
              制作 20 多种语言的培训内容。这形成切换成本效应——一旦企业在 Synthesia 上构建了多语言视频库，迁移到其他平台重新录制
              的成本很高。这是 Synthesia 在市场侧最具防御性的优势。
