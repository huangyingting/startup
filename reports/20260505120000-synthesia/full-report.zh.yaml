      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >
              Synthesia 客户数从 Series C（June 2023）时估计不足 10,000 家企业，增长到 late 2025 的 65,000+——约 30 个月内账户数约增长 7x。ARR 增长大体同步：从
              $43M（2023）到 $146M（September 2025 估计），同期收入增长 3.4x，这意味着随着客户组合扩展到更小账户，单账户收入约减半。企业采用才是更具经济意义的主线：70%+ 的 Fortune
              100 渗透率，是企业愿意规模化部署的高质量指标。关键采用驱动来自「落地后扩张」动作：企业通常先从一个试点开始（一个团队、一个用例），随后随着内容库扩大，扩展到更多部门、语言和用例。Synthesia 视频中约
              40% 被翻译（Translation/Dubbing 模块的交叉销售触发点），支撑了这一扩张叙事。HolonIQ 于 December 2025 以 $4.0B 估值将 Synthesia 纳入 EdTech
              独角兽名单，反映市场认可 Synthesia 在企业学习和培训内容创作中的相关性提升——这也是教育和劳动力培训领域客户采用质量的验证。
            claimRefs: []
