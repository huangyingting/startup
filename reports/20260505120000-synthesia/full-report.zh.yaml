      - 处罚 / 风险敞口
      - Synthesia 应对措施
      - 来源
    rows:
      - - 欧盟《AI 法案》第 50 条——深度伪造标注
        - 欧盟（适用于向欧盟分发内容的全球主体）
        - 已生效（2025 年 8 月 2 日）
        - 确保 AI 生成视频输出带有机器可读的合成标记；部署方须向观看者披露 AI 生成属性
        - 3,500 万欧元或全球年营业额 7%；按 ARR $146M 折算约 1,000 万欧元
        - ISO 42001 认证；加入 CAI；部分缓解，但水印实施尚未经独立审计
        - S701, S703
      - - 欧盟《AI 法案》——高风险分类（雇佣 / HR 用途）
        - 欧盟
        - 已生效；执法于 2026 年启动
        - Video Agents 用于招聘 / HR 筛选时，可能被归类为高风险 AI 系统，须进行符合性评估、技术文档编制及透明度义务履行
        - 违反高风险义务将面临 3,000 万欧元或全球营业额 6% 的处罚
        - Synthesia AI 治理页面涵盖用途治理；Video Agents 在 HR 场景的符合性评估尚未公开发布
        - S701, S709
      - - GDPR / 英国 GDPR——生物特征数据处理（形象创建）
        - 欧盟、英国
        - 已生效
        - 自定义虚拟形象创建涉及生物特征数据处理（面部录制）；每位主体须有明确同意、合法依据、DPA 合规及数据最小化要求
        - 欧盟可处 2,000 万欧元或全球营业额 4%；英国 GDPR 下同样面临重大罚款
        - 虚拟形象同意框架及与客户的 DPA 协议；ISO 27701 认证；个人同意文件记录
        - S704, S703
      - - 美国州级深度伪造立法（截至 2026 年已有 14+ 个州）
        - 美国（州级——加利福尼亚州、德克萨斯州、弗吉尼亚州等）
        - 多部法律已生效，各州规定不一
        - 各州要求不一：部分要求披露标签，部分禁止未经同意使用，部分专门规范政治深度伪造；加州另增设数字身份盗窃条款
        - 各州民事及刑事处罚不同；对以美国为主要市场的客户群而言，累计风险敞口不可忽视
        - 客户服务条款；内容审核；法务团队审查；目前无单一统一的美国合规计划公开记录
        - S706, S707
      - - 美国《NO FAKES 法案》（拟议联邦立法）
        - 美国联邦
        - 拟议中（截至 2026 年 5 月尚未颁布）
        - 将为未经授权创建个人数字副本设立联邦民事责任；即便形象创建时已获同意，若使用超出约定范围，也须履行同意及下架义务
        - 每次违规面临民事赔偿；肖像被用于宣传的当事人存在集体诉讼风险
        - 将要求对同意框架进行重大升级；Synthesia 尚未公开表明对《NO FAKES 法案》的合规立场
        - S708, S705
      - - 美国《TAKE IT DOWN 法案》（2025）
        - 美国联邦
        - 已签署成法（2025 年）
        - 要求平台删除非合意亲密深度伪造内容；Synthesia 主要面向企业而非消费者，但若其 API 被用于生成此类内容，仍可能承担相关义务
        - 下架义务；若平台被认定促成此类内容生成，可能面临执法行动
        - 内容审核及服务条款；面向用户的 API 控制；标记机制
        - S707, S705
      - - 英国《刑事司法法案》——亲密深度伪造（2024）
        - 英国
        - 已颁布（英国 2024 年）
        - 将创建亲密深度伪造内容入刑；Synthesia 的 API 与平台不得助长此类内容生成；英国业务须建立内容治理管控
        - 个人面临刑事指控；若平台对促成创建的管控不足，则面临平台责任
        - 服务条款；内容审核；同意框架；英国总部所在地使英国监管风险敞口居于最高优先级
        - S709, S712
