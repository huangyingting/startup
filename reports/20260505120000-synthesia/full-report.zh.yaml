      - number: '4.5'
        title: 公开财务缺口与尽调障碍
        blocks:
          - type: paragraph
            body: >
              Synthesia 作为英国私营公司，合并集团财务数据不对外公开。FY2023 英国 Companies House 申报是唯一有审计基础的数据
              锚点，且仅覆盖英国实体，时间节点早于公司最重要的增长拐点。获客成本（CAC）、回本周期、LTV/CAC 比率、总客户流失率 及销售周期长度均未披露。收入确认政策（ARR
              代表合同价值还是已确认收入，以及如何处理多年预付款）亦不可查。六轮融资 中的债务工具、可转换票据或清算优先权堆叠均无公开信息。上述缺口意味着仅凭公开数据无法完成标准 SaaS 承销，需要管理层
              提供完整尽调材料才能验证任何估值模型。
