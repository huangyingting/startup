              截至 2026 年初，Synthesia 公告拥有逾 6.5 万家企业客户和逾 100 万注册用户，Fortune 100 中超过 70% 已成为活跃客户。
              年经常性收入（ARR）于 2025 年 4 月突破 $100M，分析机构估算 2025 年 9 月已达约 $145–146M。收入大致各半来自美国和
              国际市场。截至 2026 年初，员工规模增至约 700 人，工程和 AI 研究方向占比较高。产品面向全球开放，商业重点覆盖北美、
