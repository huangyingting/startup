      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: |
              主要增长驱动因素包括：（1）AI 拉低内容成本——Synthesia 最多可把视频制作时间减少
              90 %，将过去资本开支重的视频制作转为运营开支型 SaaS 支出，这是扩大买方池的结构性
              转变。（2）多语言 / 全球员工需求——扩张到 Asia、LATAM 和 EMEA 的企业需要规模化本地
              视频，传统制作无法做到；Synthesia 的 140+ 语言支持是结构性优势。（3）生成式 AI 平台
              成熟——随着数字人质量提升、企业 AI 支出增长（2025 年 73 % 的全球组织使用 AI），买方
              更愿意把 AI 视频部署到合规和对外培训。（4）Fortune 100 社会证明——一旦前 100 强中
              70 %+ 使用某个产品，同业企业的采用门槛会大幅下降。（5）Adobe Ventures 和 Google
              Ventures 背书释放生态集成潜力信号，可加快企业采购决策。

              关键约束和逆风：（1）数字人逼真度天花板——合成数字人在内部培训中被广泛接受，但在
              销售演示、客户成功电话等面向客户的场景里遇到阻力，因为这些场景需要真人温度。这限制了
              Synthesia 在内部场景之外扩张总可用市场（TAM）。（2）Deepfake / 伦理信任赤字——2024 年
              宣传争议（见第 1 章）留下了信任税，受监管行业（金融服务、制药）和面临采购审查的公共
              部门买方尤其敏感。（3）EU AI Act 和英国 AI 监管——演进中的法律可能对合成媒体平台施加
              强制披露、水印或同意要求，抬高合规成本并放慢企业采购。（4）LMS 集成复杂度——多数企业
              L&D 预算绑定 LMS 平台（Workday Learning、SAP SuccessFactors、Cornerstone）；Synthesia
              必须顺畅集成，否则当这些平台加入原生 AI 视频时可能被替代。（5）竞争商品化——开源模型
              （Stable Video Diffusion、RunwayML）和低成本竞争者（HeyGen、D-ID）正在快速缩小质量差距，
              威胁 Synthesia 的溢价定价。（6）参与度 ROI 衡量缺口——企业难以证明 AI 视频带来可衡量的
              学习结果，预算续约周期因此产生摩擦。
