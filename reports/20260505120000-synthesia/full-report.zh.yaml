      - number: '6.5'
        title: 扩张机制与集中度风险
        blocks:
          - type: paragraph
            body: >
              Synthesia 的扩张机制有充分证据支撑：从单一团队和使用场景起步的客户，会向更多部门（HR → 法务 → 产品）、更多地区（英语 → 多语言翻译插件）、更多视频类型（静态培训 → Video
              Agents）扩张——每次扩张都带来增量 ARR，并通过加深内容库和 avatar 投入提升切换成本。40% 的翻译率印证了英语之外的跨语言实质部署。客户集中度风险是中度隐患：65,000
              家客户的表面数字掩盖了一个现实——少数大型企业账户（很可能是 Fortune 100 客户关系）贡献了不成比例的 ARR。若仅 10–15 家大型企业账户就占 ARR 的 25%–30%（在这一规模的企业
              SaaS 中属正常区间），失去几个关键客户可能对收入产生实质影响。渠道和合作伙伴依赖度较低：Synthesia 主要通过直接企业销售和自助网站获客，合作伙伴渠道收入披露有限。HolonIQ EdTech
              认可（2025 年 12 月，估值 40 亿美元）提升了教育领域的渠道知名度，但合作伙伴销售的企业 EdTech 体量未在公开来源中量化。
            claimRefs: []
