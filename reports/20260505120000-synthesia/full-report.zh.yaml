      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >
              从 C 轮（2023 年 6 月）时估计不足 10,000 家，到 2025 年底超过 65,000 家，Synthesia 的客户数在约 30 个月内增长约 7 倍。ARR 走势同步：从 2023 年的
              4,300 万美元增至 2025 年 9 月估计的 1.46 亿美元，同期收入增长 3.4 倍——这意味着随着客户结构向小型账户扩张，单账户收入大约减半。企业端采用是经济价值更大的向量：Fortune 100 超
              70% 的渗透率是企业大规模部署意愿的高质量指标。关键采用驱动力是"落地扩张"模式：企业通常从一个团队、一个使用场景的试点起步，随内容库扩大逐步延伸至更多部门、语言和场景。约 40% 的 Synthesia
              视频经过翻译（翻译/配音模块的交叉销售触发器），印证了这一扩张叙事。HolonIQ 于 2025 年 12 月将 Synthesia 纳入 EdTech 独角兽榜单，估值 40 亿美元，体现了 Synthesia
              在企业学习与培训内容制作领域日益凸显的地位——也是客户采用质量在教育和员工培训领域的一次验证。
