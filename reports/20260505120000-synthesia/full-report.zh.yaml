  - id: TR001
    title: 监管 / 法律风险登记表
    enumeration: true
    enumerationScope:
      coverage: sample
      basis: >-
        Primary regulatory and legal risks for an AI synthetic media / avatar video platform with EU, UK, and US
        enterprise customers as of May 2026. Covers deepfake labeling, digital replica liability, data protection, and
        content governance obligations. Excludes jurisdiction-specific labor and environmental law.
    columns:
      - 法规 / 法律
      - 司法辖区
      - 状态
      - Synthesia 的义务
      - 处罚 / 暴露
      - Synthesia 缓释措施
      - 来源
    rows:
      - - EU AI Act Article 50 — 深度伪造标识
        - EU（对在 EU 分发的内容全球适用）
        - 已生效（Aug 2, 2025）
        - 确保 AI 生成视频输出带有机器可读的合成标记；部署方必须向观看者披露其 AI 生成性质
        - €35M 或全球年营业额 7%；按 $146M 年经常性收入（ARR）运行率约 €10M
        - ISO 42001 认证；CAI 成员身份；部分缓释，但水印落地未获独立审计
        - S701, S703
      - - EU AI Act — 高风险分类（就业 / HR 用途）
        - EU
        - 已生效；2026 开始执法
        - 用于招聘 / HR 筛选的 Video Agents 可能被归类为高风险 AI 系统，需要符合性评估、技术文档和透明度义务
        - 违反高风险义务最高 €30M 或全球营业额 6%
        - Synthesia AI 治理实践页面覆盖用例治理；未发布 Video Agents 用于 HR 的公开符合性评估
        - S701, S709
      - - GDPR / UK GDPR — 生物识别数据处理（数字人创建）
        - EU, UK
        - 已生效
        - 自定义数字人创建会处理生物识别数据（面部录制）；每个主体都需要明确同意、合法依据、DPA 对齐和数据最小化
        - €20M 或全球营业额 4%（EU）；UK GDPR 下可能有重大罚款
        - 数字人同意框架和客户 DPA；ISO 27701 认证；个人同意文件
        - S704, S703
      - - US 州级深度伪造立法（截至 2026 年 14+ 个州）
        - US（州级 — California、Texas、Virginia 等）
        - 多项法律已生效，各州不同
        - 州级要求各不相同：有的要求披露标签，有的禁止未经同意使用，有的专门监管政治深度伪造；California 还加入数字身份盗窃条款
        - 民事和刑事处罚因州而异；对 US 客户占比较高的客群，合计暴露不低
        - 客户服务条款；内容审核；法律团队审查；未公开记录单一统一的 US 合规计划
        - S706, S707
      - - US NO FAKES Act（拟议联邦立法）
        - US 联邦
        - 拟议中（截至 May 2026 尚未颁布）
        - 若通过，将为未经授权创建个人数字复制品设立联邦民事责任；即便数字人创建时获得同意，若超出约定范围使用，也会触发同意和下架义务
        - 单次违规民事损害赔偿；若人才肖像被用于宣传，存在集体诉讼风险
        - 需要大幅升级同意框架；Synthesia 未公开说明 NO FAKES 合规姿态
        - S708, S705
      - - 美国 US TAKE IT DOWN Act（2025）
        - US 联邦
        - 已签署成法（2025）
        - 要求平台移除未经同意的亲密深度伪造内容；Synthesia 不是以消费者平台为主，但若其 API 被用于生成此类内容，仍可能承担义务
        - 下架义务；若平台被认定协助生成，可能触发执法行动
        - 内容审核和服务条款；面向用户的 API 控制；举报机制
        - S707, S705
      - - UK Criminal Justice Bill — 亲密深度伪造（2024）
        - UK
        - 已颁布（UK 2024）
        - 将创建亲密深度伪造定为犯罪；Synthesia 的 API 和平台不得协助生成此类内容；UK 业务需要内容治理控制
        - 个人可能面临刑事指控；若平台对协助创建控制不足，可能承担责任
        - 服务条款；内容审核；同意框架；总部位于 UK，使 UK 监管暴露优先级最高
        - S709, S712
    claimRefs:
