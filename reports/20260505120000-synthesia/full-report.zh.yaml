      - number: '5.4'
        title: 部署、集成与开发者体验
        blocks:
          - type: paragraph
            body: >
              Synthesia 支持三种部署方式：网页浏览器（面向大多数用户的 Studio）、REST API（供企业 IT 和开发团队程序化生成视频）以及 LMS/SCORM
              集成（直接将内容推送至学习管理系统，无需手动传输文件）。API 采用 RESTful 异步视频生成模式：提交请求后，云端 GPU 基础设施完成渲染，视频通过 webhook 通知和下载链接交付。API 支持
              OpenAPI/Swagger 规范、Postman 集合及基于 webhook 的事件处理。SCORM 导出生成符合 SCORM 1.2 和 xAPI（Tin Can API）标准的包，可上传至
              Cornerstone OnDemand、SAP SuccessFactors、Moodle、Docebo 等 LMS 平台。企业身份提供商可通过 SAML 2.0 启用单点登录（SSO）。正常运行时间和 SLA
              数据通过信任中心管理，不公开具体百分比；Synthesia 向企业客户提供标准 SaaS 可靠性承诺。
            claimRefs: []
      - number: '5.5'
        title: 产品路线图与开发阶段
        blocks:
          - type: paragraph
            body: >
              Synthesia 2025 年公开路线图呈现从静态 avatar 视频向交互式智能体视频体验的转型。从 Synthesia 2.0 到 3.0（2024 年 6 月至 2025 年 10 月），16
              个月内完成两次代际迭代：2.0 引入全身 avatar 和 Express-1（上下文自适应表情）；3.0 引入 Video Agents（实时对话式 AI avatar）和
              Express-2（超写实、全身、1080p/30fps、任意时长）。Video Agents 是近期最具差异化的能力——允许用户在视频会话中与 AI 主持人双向互动，可用于入职培训、HR
              面试筛选、合规培训考核及客户支持自动化。Express-2 研究团队已通过 Synthesia Research GitHub 页面发表成果，体现了以研究驱动产品的开发模式。2025
              年公开通讯中披露的未来能力包括：从文本提示自定义 avatar 外观、场景和服装，以及在动态场景中将 B-roll/素材库片段与 avatar 叠加集成。
            claimRefs: []
