      - number: '7.6'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              得益于 77% 以上的毛利率（英国实体，2023 财年）、已确认超 1 亿美元的 ARR 以及 2 亿美元 E 轮带来的充足现金跑道，Synthesia 的财务模式风险低于多数 AI
              创业公司。但三项财务风险仍然实质性存在。第一，烧钱速度与亏损规模：英国公司注册处 2023 财年数据显示运营亏损显著（收入 2,600 万英镑，毛利润 2,000 万英镑，但运营亏损较大）；以 1.46 亿美元
              ARR 和 77% 毛利率估算，增量毛利润约 1.13 亿美元——但公司在研发和销售上持续大量投入，表明仍处于亏损状态。第二，收入模式风险：若 Synthesia
              在竞争压力下将定价从按席位和按用量模式转向固定企业许可，AWS 渲染成本保持可变的情况下毛利率可能受压。第三，E 轮 2 亿美元包含老股交易部分（现有股东流动性），意味着并非全部 2
              亿美元流入公司；实际用于运营的新股净额未披露，可能低于账面 2 亿美元。盈利路径和预计烧钱时间表未公开披露。
            claimRefs: []
