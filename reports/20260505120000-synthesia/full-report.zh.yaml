      - number: '2.2'
        title: 市场规模——多维估算
        blocks:
          - type: paragraph
            body: |
              分析机构对 Synthesia 相关市场的估算因边界定义不同而差异显著。最宽泛且可信的估算来自 Grand View Research：全球 AI 视频
              市场 2024 年规模为 $3.86B，以 30–35% CAGR 增长，预计 2033 年达 $42.3B。Precedence Research 将 2025 年市场规模定为
              $10.3B，预测 2034 年增至 $156B（约 35% CAGR）——明显更为激进，可能将流媒体 AI 应用纳入其中。Fortune Business Insights
              将 AI 视频生成软件细分市场（与 Synthesia 定位更可比）的 2025 年规模估算为约 $717M，2034 年将以 18.8% CAGR 增至
              $3.35B。企业视频通信市场被 Allied Market Research 单独估算为 2023 年 $16.6B，至 2032 年增至 $49B（12% CAGR）——这是
              涵盖视频会议的更广泛类目。

              就 HolonIQ 所关注的电子学习创作工具市场而言，Research and Markets 和 TechSci Research 的估算在 2025 年为
              $6.1–7.2B，以 17–19% CAGR 增长至 2030 年的 $13.9–17.6B。Grand View Research 估算更广泛的企业电子学习市场 2024 年
              规模为 $104B，预计 2030 年达 $335B（21.7% CAGR）。Market.us 将 L&D 领域 AI 市场 2025 年规模估算为 $9.3B，2034 年将
              达 $97B（26% CAGR）。

              自下而上的合理性验证：Synthesia 报告 65,000 多家客户、约 $146M ARR（2025 年 9 月估算）。假设企业 AI 视频创作市场
              直接可寻址年度支出约为 $2–3B（不含消费 / 媒体），则 Synthesia 已占据约 5–7% 的 SAM——早期阶段的强势地位，尚有充足
              上升空间。
