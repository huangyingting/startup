  productSummary: >
    Synthesia 的核心产品是一套 AI 视频创作平台，企业用户可用 230+ 个内置 AI 数字人或定制个人 AI 数字人，以 140+ 种语言创建视频内容。Synthesia 2.0（2024 年 6 月）推出全身数字人和
    Express-1 模型。Express-2（2025 年 9 月，在所有套餐发布）交付实时、超逼真的 AI 数字人视频。Synthesia 3.0 / Video Agents（2025 年 10 月）加入实时互动对话式 AI
    数字人，可用于 HR 筛选、合规培训、客户入门和个性化学习——产品边界从视频创作扩展到 AI 原生工作流自动化。
  customerFocus: >
    客户集中在 L&D、内部沟通、HR 和销售赋能场景中的大型企业与中型市场组织。70%+ 的 Fortune 100 公司是客户。已具名企业客户包括 Heineken（部署覆盖 70,000 名员工）、DuPont（节省 L&D
    成本）、Zoom（视频制作速度提升 90%）、Spirit Airlines（真人客服咨询减少 76%）、Orange（学习者留存提升 9x）和 BSH Group（部署覆盖 60,000 名员工的培训）。
  businessModel: >
    SaaS 订阅模式，按席位收费并设置企业级分层。企业合同包含定制数字人创建、专属客户成功、API 访问，以及 SCORM/LRS 集成。GTM 路径是先落地再扩张：客户先在部门内采用，再扩展到全企业部署。142% NRR
    反映从初始席位扩张到更广组织合同的强劲势能。国际收入占比显著，客户基础覆盖欧盟、英国和北美。
