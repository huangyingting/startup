  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与模块图谱
        blocks:
          - type: paragraph
            body: >
              Synthesia 提供云原生 AI 视频创作平台，可把文本脚本、上传文档（PDF、PowerPoint、DOCX）和既有视频内容转成打磨完成的主持人讲解视频，使用 AI
              数字人，不需要摄像机、影棚或演员。平台采用模块化结构：核心 Video Studio 模块通过浏览器 UI 处理文本到视频创作；API / 程序化模块让开发者和企业 IT 团队通过 REST API
              自动化规模化视频创建；Translation and Dubbing 模块用 140+ 种语言生成多语言内容，并实现唇形同步的数字人本地化；Custom Avatar 模块通过线下影棚录制创建品牌化 AI
              主持数字人；SCORM/LMS export 模块把视频内容打包，可直接交付到任何符合 SCORM 的学习管理系统；Video Agents 模块（Synthesia 3.0，2025 年 10 月）支持实时互动
              AI 数字人对话。Synthesia 2.0 平台（2024 年 6 月）推出全身数字人和 Express-1 AI 模型；Synthesia 3.0（2025 年 10 月）推出 Express-2 模型和互动
              Video Agents——代表产品能力在 16 个月内完成两次重要代际跃迁。
