      - number: '8.5'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              三种情景主要在四个变量上存在差异：（1）NRR 轨迹；（2）大型科技公司的竞争性替代；（3）EU AI Act 带来的监管阻力；（4）IPO 时机和可实现的公开市场倍数。乐观情景假设 NRR 维持在 130%
              以上，Microsoft/Google AI 视频捆绑在 24 个月内未对 Synthesia 造成实质性替代，EU 合规在无执法行动的情况下得到管理，并以 3.5 亿美元 ARR（2028 年）在 20–25
              倍 NTM 收入倍数下完成 IPO。这意味着约 70–80 亿美元的 IPO 估值，以 40 亿美元入场价对应 1.75–2.0 倍 MOIC——对风险投资而言回报适中，但对晚期轮次属于强势表现。悲观情景假设
              NRR 降至 100%–110%（表明基础留存问题或企业端竞争失利），Microsoft/Google 重磅 AI 视频功能在 2026 年 Q4 前上线，监管逆风导致欧盟市场采购冻结——意味着 ARR 停滞于
              1.75–2 亿美元，公司以 35 亿美元或更低估值完成平价或下行轮融资。基准情景假设 ARR 于 2028 年达到 3 亿美元，NRR 维持在 120%–130%，公开市场接受 17–20 倍 NTM
              收入倍数，对应 50–60 亿美元 IPO——约为 40 亿美元入场价的 1.25–1.5 倍（若计入二级市场时间折价的回报，约为 2–2.5 倍）。
