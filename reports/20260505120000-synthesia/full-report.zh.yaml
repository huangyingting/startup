      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: |
              Synthesia 于 2017 年由四位背景互补的成员共同创立，能力覆盖 AI 研究、计算机视觉
              和创业。Viktor Riparbelli（CEO）负责商业和战略，把公司从研究项目带到 $4 B
              企业平台。联合创始人 Steffen Tjerrild 现任 COO/CFO，负责运营与财务。Prof.
              Matthias Niessner（Technical University of Munich）和 Prof. Lourdes Agapito
              （University College London）都是知名计算机视觉研究者，参与创立公司并持续提供
              科学领导力；Niessner 的神经渲染研究支撑了 Synthesia 数字人技术的很大一部分。
              Jonathan Starck 担任 CTO，领导工程；Peter Hill 在 2025 年 1 月 Series D 完成
              前后加入，担任资深技术高管。董事会包括关键投资方 GV（Google Ventures）、Accel、
              NEA 和 Kleiner Perkins 的代表。关键人风险集中在 Viktor Riparbelli 身上，他的
              公开形象和愿景驱动媒体与投资者关系；不过，学术联合创始人带来的技术可信度和
              机构厚度，部分缓解了该风险。
