        - 欧盟监管机构向 Synthesia 发出正式执法通知或处以罚款；或新法规要求实时标注，打破企业视频工作流
        - 索取 Synthesia 针对欧盟 AI 法案第 50 条的技术合规文件；确认水印实施方法
        - 6–12 个月（监管行动通常以正式调查为前奏）
      - - 竞争（HeyGen / 大型科技公司）
        - HeyGen ARR 突破 2 亿美元；Microsoft M365 Copilot 与 Sora 集成至企业 LMS；Google Workspace AI 视频功能发布公告
        - 在任意滚动 12 个月内，3 家以上 Fortune 100 企业客户流向某一具名竞争对手；或 Microsoft/Google 将 AI 视频免费捆绑入 M365/Workspace
        - 索取 ARR 桥接表（新客户与扩张客户拆分）；询问过去 12 个月赢得与失去的具名企业客户
        - 3–6 个月（竞争替代通常在产品发布后 6–12 个月销售周期内发生）
      - - 深度伪造/法律（宣传事件重演）
        - Synthesia 虚拟形象被再次用于传播虚假信息；美国联邦深度伪造立法落地；演员工会提起集体诉讼
        - 24 个月内再次发生经确认的 Synthesia 虚拟形象传播虚假信息事件；或集体诉讼索赔金额超过 5,000 万美元
        - 索取最新知情同意框架文件；要求对同意签名核验流程进行审计；索取关于 NO FAKES Act 法律风险的法律意见书
        - 1–3 个月（事件在新闻周期内可见）
      - - 人员（关键人物离职）
        - 联合创始人 LinkedIn 动态；学术论文产出下降；董事会成员变动
        - 12 个月内两名以上联合创始人离职；E 轮后 18 个月内更换 CEO
        - 索取创始人股权归属计划；了解前 5 名高管的留任协议详情；确认董事会继任方案
        - 1–2 周（离职会体现在公开备案或公告中）
      - - 财务（ARR 增长减速）
        - 月度 ARR 新增量与上季度对比；NRR 趋势（目标：持续 >130%）；季度业务回顾中披露的 GRR
        - 连续两个季度 NRR 跳破 110%；连续两个季度同比 ARR 增速低于 50%（较当前轨迹大幅减速）
        - 索取过去 6 个季度的月度 ARR 桥接表（新增、扩张、收缩、流失）；按客户分部索取 GRR 与客户流失率
        - 滞后 1–2 个季度（ARR 指标通常在董事会报告中以月度频率更新）
