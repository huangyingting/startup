      - number: '3.6'
        title: 反向证据与反驳信号
        blocks:
          - type: paragraph
            body: >
              多项信号对 Synthesia 竞争地位持续性构成挑战。HeyGen 的资本效率（约 $100M ARR 配 157 名员工，而 Synthesia 约 $146M ARR 对应约 700
              名员工）表明，在价格战中 Synthesia 的成本结构可能成为负担。Colossyan 的无限时长定价在中市场 直接施压 Synthesia 的按量计费模式——预算有限的 L&D
              团队可能优先考虑视频量而非合规深度。目前没有公开的独立基准可 跨 Synthesia、HeyGen 和 Deepbrain AI 比较虚拟人真实感、延迟或输出一致性——市场评测中所有能力比较均依赖厂商编写的
              内容或用户主观评估，使客观差异化主张无从核实。Synthesia 2024 年的 deepfake 争议（委内瑞拉和布基纳法索政治宣传中的
              虚拟人滥用）尚未被独立证明导致企业客户流失，但对受监管行业——尤其是政府和金融服务——的采购审查风险有所增加。
            claimRefs: []
