      - number: '1.2'
        title: 创始人与管理层
        blocks:
          - type: paragraph
            body: |
              Synthesia 于 2017 年由四位创始人共同创立，分别在 AI 研究、计算机视觉和创业领域各有所长。CEO Viktor Riparbelli
              主导商业战略，带领公司从研究项目成长为估值 $4B 的企业平台。联合创始人 Steffen Tjerrild 现任 COO/CFO，统管运营与财务。
              慕尼黑工业大学 Prof. Matthias Niessner 和伦敦大学学院 Prof. Lourdes Agapito 均是杰出的计算机视觉学者，持续提供
              科学领导力；Niessner 在神经渲染领域的研究支撑了 Synthesia 虚拟人技术的核心。Jonathan Starck 担任 CTO 主导工程研发；
              Peter Hill 于 2025 年 1 月 Series D 完成前后以高级技术高管身份加入。董事会包括 GV（Google Ventures）、Accel、NEA 和
              Kleiner Perkins 等核心投资方的代表。关键人物风险集中于 Viktor Riparbelli——其公众形象和愿景推动着媒体与投资者关系的维系；
              不过，学术联合创始人提供的技术可信度和学术深度在一定程度上对冲了这一风险。
