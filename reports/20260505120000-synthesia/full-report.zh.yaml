      - number: '6.4'
        title: 留存、满意度与续约证据
        blocks:
          - type: paragraph
            body: >
              Synthesia 公开可得且最可靠的留存指标是净留存率（NRR）：Sacra 报告其 2024 年为 119%，到 late 2025 升至 142%。142% 的 NRR
              意味着现有客户的扩张收入足以抵消任何流失和降级——与强劲的落地后扩张动作一致。总留存率（GRR，即扩张前的基础留存）未公开披露；没有 GRR，就无法区分两种情形：高 NRR 掩盖了有意义的 logo
              流失，只是被大额扩张抵消；或者基础留存和扩张都很强。产品满意度评分持续为正：截至 March 2026，Synthesia 在 Capterra 上为 4.6/5（313 条已验证评论），在 G2 上为
              4.7/5。评论中提到的摩擦点包括严格的虚拟人创建政策（同意框架被体验为限制）以及偶发的支持流程延迟。Synthesia 于 early 2025 与 ChurnZero（客户成功平台）合作，使用 AI
              个性化视频做客户入门和互动——这是用自家产品服务客户成功的自指式案例，也说明公司在留存项目上有实质投入。
            claimRefs: []
