            - TTS / 语音合成（部分第三方）
            - 翻译 / 唇形同步引擎
            - 定制数字人流水线
        - label: 云基础设施
          modules:
            - AWS 计算（GPU 渲染）
            - 多租户隔离存储
            - CDN 视频交付
            - 审计日志与监控
