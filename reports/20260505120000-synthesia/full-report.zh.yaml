      - number: '1.5'
        title: 负面事件与治理问题
        blocks:
          - type: paragraph
            body: |
              Synthesia 曾因 AI 数字人在政治宣传中被滥用，引发实质性的声誉和伦理争议。多名曾
              将肖像出售给 Synthesia 用于创建数字人的演员发现，自己的数字肖像出现在支持
              Venezuela 和 Burkina Faso 威权政权的虚假信息视频中——这些用途并未获得演员同意。
              英国演员工会 Equity 于 2024 年详细记录了至少一个案例，并通过「Stop AI Stealing
              the Show」倡议推动更强法律保护。VICE、WION 和 International Business Times 等
              批评者报道称，Synthesia 的内容审核防护不足以阻止宣传用途。作为回应的一部分，
              Synthesia 参与了 Partnership on AI（PAI）合成媒体框架，并随后发布更新后的负责任
              AI 指南，但这些控制是否足够仍存在争议。截至报告日期，公开记录尚未确认针对
              Synthesia 的正式诉讼；在不断演进的 EU AI Act 和英国 AI 监管框架下，监管敞口仍是
              前瞻性风险。
            claimRefs:
              - CO027
              - CO028
              - CO029
              - CO030
