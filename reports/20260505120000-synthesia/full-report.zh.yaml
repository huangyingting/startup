chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Synthesia（完整法定名称 Synthesia Ltd）是一家总部位于英国伦敦的私营科技公司，
              在 New York、Copenhagen 等地设有办公室。公司成立于 2017 年，以 B2B SaaS 平台
              运营。核心产品 Synthesia STUDIO 让企业用户把文本脚本转成专业级视频，视频中由
              逼真的 AI 数字人以 140+ 种语言讲述，全程不需要镜头拍摄，也不需要传统制作流程。
              商业模式为订阅制，层级从免费 / 入门计划到 Creator 和 Enterprise 计划不等；收入
              大部分来自企业合同。Synthesia 被归入 AI 生成视频、合成媒体和职场学习创作工具
              等类别。HolonIQ 于 2025 年 12 月将 Synthesia 纳入 Global EdTech Unicorn 名单，
              考虑到企业 L&D 和培训团队的大规模采用，将其归类为「Authoring Tools (AI)」。
              公司最初的独角兽身份来自 2023 年 6 月 Series C，当时投后估值为 $1.0 B。
