      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: |
              主要增长驱动因素：（1）AI 驱动的内容成本通缩——Synthesia 将视频制作时间缩短高达 90%，将历史上资本密集的制作支出转化为
              经营性 SaaS 支出，这一结构性转变扩大了总买家池。（2）多语言 / 全球员工需求——向亚洲、拉美和欧非中东扩张的企业需要以
              传统制作无法企及的规模制作本地化视频，Synthesia 支持 140 多种语言是结构性优势。（3）生成式 AI 平台成熟度提升——随着
              虚拟人质量提升、企业 AI 支出增长（2025 年全球 73% 的组织已使用 AI），买家更愿意将 AI 视频用于合规和面向公众的培训。
              （4）Fortune 100 社会背书——一旦前 100 强中超过 70% 都在使用某产品，同类企业的采购门槛将大幅降低。（5）Adobe Ventures
              和 Google Ventures 的背书释放生态系统整合潜力，加速企业采购决策。

              主要制约因素与逆风：（1）虚拟人真实感天花板——合成虚拟人在内部培训中被广泛接受，但在面向客户的场景（销售演示、客户
              成功通话）中面临阻力，因为人情温度在此类场景中举足轻重，这限制了 Synthesia 向内部用例以外扩展 TAM 的空间。（2）
              Deepfake / 伦理信任赤字——2024 年宣传滥用争议（见第 1 章）留下残余信任损耗，尤其影响受监管行业（金融服务、制药）和
              面临采购审查的公共部门买家。（3）欧盟《AI 法案》和英国 AI 监管——不断演进的立法可能对合成媒体平台施加强制披露、水印
              或同意要求，推高合规成本并拖慢企业采购。（4）LMS 整合复杂性——大多数企业 L&D 预算绑定于 LMS 平台（Workday Learning、
              SAP SuccessFactors、Cornerstone）；Synthesia 必须实现无缝整合，否则当这些平台推出原生 AI 视频功能时将面临替代风险。
              （5）竞争商品化——开源模型（Stable Video Diffusion、RunwayML）和低成本竞争对手（HeyGen、D-ID）正在迅速缩小质量差距，
              威胁 Synthesia 的溢价定价能力。（6）参与度 ROI 衡量缺口——企业难以量化 AI 视频带来的可测量学习成果，在预算续约周期
              中形成阻力。
