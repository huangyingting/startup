    title: Synthesia 融资与估值时间线
    type: timeline
    layout: standard
    summary: |
      Synthesia 融资里程碑时间轴：从 2017 年创立，至 2025 年 10 月 E 轮完成，
      呈现各轮次估值跃升及关键战略事件，包括深度伪造争议与 HolonIQ 教育科技独角兽认证。
    data:
      items:
        - date: '2017'
          label: 创立——英国伦敦
          detail: Riparbelli、Tjerrild、Niessner、Agapito 联合创立；专注 AI 视频合成
          tone: positive
        - date: 2019-04
          label: 种子轮 380 万美元
          detail: LDV Capital、Mark Cuban、Seedcamp 等投资方
          tone: positive
        - date: 2021-04
          label: A 轮 1,250 万美元
          detail: FirstMark、LDV Capital、MMC Ventures 等投资方
          tone: positive
        - date: 2021-12
          label: B 轮 5,000 万美元——估值 10 亿美元
          detail: Kleiner Perkins 领投；GV、Accel、Collison 兄弟跟投
          tone: positive
        - date: 2023-06
          label: C 轮 9,000 万美元——独角兽地位确认，估值 10 亿美元
          detail: Accel 领投；Nvidia NVentures 加入；获 HolonIQ 独角兽认证
          tone: positive
        - date: '2024'
          label: 深度伪造 / 虚假宣传争议
          detail: 演员肖像被用于威权主义宣传片；演员工会发起维权运动
          tone: warning
        - date: 2025-01
