            body: >
              Synthesia 不公开集团合并财务数据。最精确的数据点是英国子公司 FY2023 Companies House 申报文件（Synthesia Limited， 英国公司编号 10933652），报告营业额
              £26M（约 $33M），毛利润 £20M，暗示英国实体当年毛利率为 77%。这与分析机构对 类似成本结构的企业 AI SaaS 平台 70–90%
              毛利率的估算相符。营收成本的主要构成包括模型推理算力（视频渲染的云 GPU 成本）、多语言 TTS / 唇形同步、虚拟人个性化及标准套餐下有限的客户支持。2025 年底 NRR 142%（较 2024 年
              119% 提升） 确认净扩张大幅超出流失，是定价权和客户健康度的领先指标。以 $146M ARR 除以 65,000 客户计算，隐含单客年均收入 （ARPU）约
              $2,246，表明定价存在显著分层：企业账户单独贡献可能超过 $30K–$50K，而庞大的 SMB / 创作者基数则将账户 数量锚定于低得多的 ARPU 水平。以 $146M ARR 除以约 700
              名员工计算，人均营收约 $209K，与 HeyGen 等资本高效竞争对手 相比处于劣势（HeyGen 在相近 ARR 规模下人均约 $637K）。
