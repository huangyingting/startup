    layout: wide
    summary: |
      对 Synthesia 具名客户证据做序数质量评估，覆盖五个维度：结果量化、部署规模、用例多样性、行业广度和证据独立性。 评分由分析师给出（1–4 分）；越高代表证据越强。
    data:
      columns:
        - Heineken
        - DuPont
        - Spirit Airlines
        - Zoom
        - Orange
        - BSH
      rows:
        - label: 结果量化
          values:
            - label: 2 — 定性改善，指标有限
              tone: warning
            - label: 4 — 每条视频节省 $10K；速度提升 80%
              tone: positive
            - label: 4 — 咨询量减少 76%；互动度 600%
              tone: positive
            - label: 3 — 制作速度提升 90%
              tone: positive
            - label: 3 — 留存提升 9x
              tone: positive
            - label: 2 — 互动度改善；细节有限
              tone: warning
        - label: 部署规模
          values:
            - label: 4 — 全球 70,000 名员工
              tone: positive
            - label: 3 — 全球员工队伍
              tone: positive
            - label: 3 — 一线 + 企业员工
              tone: positive
            - label: 3 — 1,000+ 名销售员工
              tone: positive
            - label: 3 — 全球学习团队
              tone: positive
            - label: 4 — 60,000 名员工
              tone: positive
        - label: 用例
          values:
            - label: 培训 / L&D
              tone: neutral
            - label: 培训 / 技能提升
              tone: neutral
            - label: 内部沟通 / HR
              tone: neutral
            - label: 销售培训
              tone: neutral
            - label: 多语言 L&D
              tone: neutral
            - label: 内部沟通报告
              tone: neutral
        - label: 证据独立性
          values:
            - label: 2 — 公司来源案例研究
              tone: warning
            - label: 2 — 公司 + 第三方
              tone: warning
            - label: 2 — 公司来源案例研究
              tone: warning
            - label: 2 — 公司 + 媒体
              tone: warning
            - label: 2 — 公司来源案例研究
              tone: warning
            - label: 2 — 公司 + 奖项
              tone: warning
    approximationNotes: 评分为分析师给出的顺序等级。所有案例研究结果均为 Synthesia 营销材料引用的公司口径数据；未见任何结果经过独立审计。
    claimRefs:
      - CU026
  - id: FU004
    title: 留存 / 重复队列
    type: cohort
    layout: standard
    summary: |
      净留存率（NRR）在 2024 至 2025 年末的轨迹，展示 Synthesia 收入留存的变化方向。每个数据点对应 Sacra 分析师在不同时间点给出的估算；Synthesia 没有公开月度队列数据。
    data:
      columns:
        - 2024（估算）
        - 2025（估算）
      rows:
        - label: 企业客户数留存率（估算）
          values:
            - 92
            - 94
        - label: SMB 客户数留存率（估算）
          values:
            - 74
            - 77
        - label: 整体混合 GRR（估算）
          values:
            - 82
            - 86
    approximationNotes: >-
      所有留存值均为分析师估算。Synthesia 不披露 GRR 或分群流失数据。企业端估算由 142% 净留存率（NRR）加上典型 SaaS 扩张区间推导；SMB 估算参照典型 SaaS SMB 留存基准。这些数字仅指示方向；实际
      GRR 是尽调需索取的项目。
    claimRefs:
      - CU027
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: wide
    summary: |
      风险热力图从两个维度绘制 Synthesia 的关键风险：发生可能性（x 轴：低 / 中 / 高）和对投资论点的影响（y 轴：低 / 中 / 高 / 关键）。每个单元格列出适用的风险名称。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 关键影响
          values:
            - label: 企业安全泄露（数字人生物识别数据）
              tone: warning
            - label: EU AI Act 执法罚款（全球营业额 7%）
              tone: negative
            - label: 大型科技 AI 视频捆绑包在 M365/Workspace 中挤掉 Synthesia
              tone: negative
        - label: 高影响
          values:
            - label: AWS 多日宕机；CEO 离任；学术联合创始人离任
              tone: warning
            - label: 第二起深度伪造宣传事件；AI 模型质量回退；关键企业客户流失（3+ 个账户）
              tone: warning
            - label: 净留存率（NRR）持续降至 <110%；AI 研究人才流失
              tone: negative
        - label: 中等影响
          values:
            - label: GPU 算力短缺；NO FAKES Act 立法生效（美国联邦）
              tone: neutral
            - label: 美国州级深度伪造监管碎片化带来的合规负担；TTS 供应商宕机
              tone: warning
            - label: SMB 流失上升；深度伪造检测改善，削弱数字人真实性价值
              tone: warning
        - label: 低影响
          values:
            - label: 视频生成延迟 SLA 未达标
              tone: neutral
            - label: UK Criminal Justice Bill 执法案例
              tone: neutral
            - label: G2/Capterra 评论情绪小幅下滑
              tone: neutral
    approximationNotes: 风险热力图由分析师基于公开信息评估；可能性和影响评分都是顺序等级估算，不是概率模型。实际风险概率需要管理层内部数据。
    claimRefs:
      - CR028
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: |
      有向无环图展示触发事件如何级联为下游投资论点影响。根节点是触发事件；终端节点是击穿投资论点的结果。
    data:
      nodes:
        - id: propaganda
          label: 深度伪造宣传事件（复发）
        - id: lawsuit
          label: 出镜人才发起集体诉讼
        - id: eu_act
          label: EU AI Act 执法行动
        - id: regulatory_fine
          label: 监管罚款（全球营业额 7%）
        - id: enterprise_churn
          label: 企业客户流失（Fortune 100）
        - id: competitor
          label: 大型科技公司捆绑竞争者（MS/Google）
        - id: arr_decel
          label: 年经常性收入（ARR）增长减速（同比 <50%）
        - id: nrr_decline
          label: 净留存率（NRR）降至 110% 以下
        - id: valuation
          label: IPO/Series F 时估值倍数压缩
        - id: ipo_delay
          label: IPO 时间表延后
      edges:
        - from: propaganda
          to: lawsuit
        - from: propaganda
          to: eu_act
        - from: eu_act
          to: regulatory_fine
        - from: regulatory_fine
          to: enterprise_churn
        - from: lawsuit
          to: enterprise_churn
        - from: competitor
          to: enterprise_churn
        - from: enterprise_churn
          to: arr_decel
        - from: enterprise_churn
          to: nrr_decline
        - from: arr_decel
          to: valuation
        - from: nrr_decline
          to: valuation
        - from: valuation
          to: ipo_delay
    approximationNotes: 传导路径由分析师推导；实际风险传导取决于触发事件的严重程度和发生时点。
    claimRefs:
      - CR029
  - id: FR003
    title: 依赖关系图
    type: dag
    layout: standard
    summary: |
      有向无环图列出 Synthesia 的关键外部依赖及其对运营能力的下游影响。每个节点是一个系统或供应商；边表示依赖关系（上游 → 下游影响路径）。
    data:
      nodes:
        - id: aws
          label: AWS 基础设施（关键单一供应商）
        - id: tts
          label: 第三方 TTS 供应商（未披露 — 高度不透明）
        - id: gpu
          label: 云 GPU 算力（AWS 托管）
        - id: express2
          label: Express-2 AI 模型（专有 — 内部）
        - id: rendering
          label: 视频渲染流水线
        - id: delivery
          label: CDN 视频分发
        - id: api
          label: 客户 API / 集成
        - id: lms
          label: 企业 LMS / 客户系统
      edges:
        - from: aws
          to: rendering
        - from: aws
          to: delivery
        - from: gpu
          to: rendering
        - from: express2
          to: rendering
        - from: tts
          to: rendering
        - from: rendering
          to: delivery
        - from: delivery
          to: api
        - from: api
          to: lms
    approximationNotes: 依赖关系图由分析师根据公开文档推导。TTS 供应商身份未披露；内部架构细节基于 Trust Center 和 API 文档。
    claimRefs:
      - CR030
  - id: FV001
    title: 建议逻辑流程
    type: flow
    layout: standard
    summary: |
      决策树展示关键可观察输入（净留存率（NRR）、竞争态势、监管合规）如何导向“有条件推进”建议及相应风险条件。
    data:
      nodes:
        - id: start
          label: Synthesia 估值 $4B
        - id: metrics
          label: 财务指标：净留存率（NRR）142% / 毛利率 77% / 年经常性收入（ARR）$146M，同比增长 66%
        - id: moat
          label: 市场位置：Fortune 100 渗透率 70%+ / Express-2 专有 AI / ISO 42001
        - id: risk
          label: 重大风险：EU AI Act 未审计 / MS-Google 捆绑威胁 / GRR 未披露
        - id: conditional
          label: 有条件推进
        - id: proceed
          label: 全面推进：若确认 GRR >85% + EU 合规完成审计 + MS/Google 未发布 AI 视频捆绑包
        - id: pause
          label: 暂停：若 GRR <80%，或 EU 提起执法行动，或 MS 在 M365 发布 AI 数字人
      edges:
        - from: start
          to: metrics
        - from: start
          to: moat
        - from: metrics
          to: conditional
        - from: moat
          to: conditional
        - from: risk
          to: conditional
        - from: conditional
          to: proceed
        - from: conditional
          to: pause
    approximationNotes: null
    claimRefs:
      - CV024
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: |
      条形图展示在一系列 ARR 倍数（10x 至 35x）下 Synthesia 的隐含企业估值；倍数分别应用于当前 ARR（$146M，2025）和估算远期 ARR（$175M NTM，2028 基准 $280M）。
    data:
      items:
        - label: 10x 历史 ARR（$146M）
          value: 1.46
        - label: 15x 历史 ARR（$146M）
          value: 2.19
        - label: 20x 历史 ARR（$146M）
          value: 2.92
        - label: 25x 历史 ARR（$146M）
          value: 3.65
        - label: 27x 历史 ARR — 当前 Series E
          value: 4
        - label: 30x 历史 ARR（$146M）
          value: 4.38
        - label: 35x 历史 ARR（$146M）
          value: 5.11
        - label: 15x 2028 基准 ARR（$280M）
          value: 4.2
        - label: 20x 2028 基准 ARR（$280M）
          value: 5.6
        - label: 25x 2028 基准 ARR（$280M）
          value: 7
        - label: 30x 2028 基准 ARR（$280M）
          value: 8.4
      xAxis:
        label: 收入倍数（x ARR）
      yAxis:
        label: 隐含估值（US$ billions）
    approximationNotes: 估值数字为分析师估算，基于 Sacra ARR 估算和基准情景预测套用 ARR 倍数。实际 IPO 估值取决于盈利能力、IPO 日期时可比上市公司倍数和市场状况。
    claimRefs:
      - CV025
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: |
      区间图展示 Synthesia 在 IPO（估计 2027–2028 年）时从熊市情景到牛市情景的隐含退出估值区间，以及 $4.0B 入场投资对应的 MOIC 区间。
    data:
      items:
        - label: 熊市情景 IPO 估值
          low: 2
          high: 3
          unit: US$ billions
        - label: 基准情景 IPO 估值
          low: 5
          high: 6.5
          unit: US$ billions
        - label: 牛市情景 IPO 估值
          low: 7.5
          high: 9.5
          unit: US$ billions
        - label: MOIC 区间 — 熊市情景（基于 $4B）
          low: 0.5
          high: 0.75
          unit: x MOIC
        - label: MOIC 区间 — 基准情景（基于 $4B）
          low: 1.25
          high: 1.63
          unit: x MOIC
        - label: MOIC 区间 — 牛市情景（基于 $4B）
          low: 1.88
          high: 2.38
          unit: x MOIC
    approximationNotes: 所有估值区间均为分析师估算，基于可比公司倍数和情景假设。实际回报取决于 IPO 时点、市场状况、未来轮次稀释和优先权结构。
    claimRefs:
      - CV026
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: wide
    summary: |
      关键绩效指标汇总 Synthesia 在 $4.0B Series E 入场点的投资论点指标。
    data:
      items:
        - label: ARR（Sep 2025 估算）
          value: $146M annual recurring revenue
        - label: ARR 同比增长
          value: ~66% year-over-year
        - label: 净留存率（NRR）
          value: 142% (late 2025, Sacra est.)
        - label: 毛利率
          value: 77%+ (UK entity FY2023)
        - label: Series E 估值
          value: $4.0B (October 2025)
        - label: 历史 ARR 倍数
          value: 27x EV / trailing ARR
        - label: Fortune 100 渗透率
          value: 70%+ Fortune 100 customers
        - label: 累计融资
          value: ~$530M across all rounds
        - label: IPO 基准情景 MOIC
          value: 1.3–1.6x on $4B entry (2027–2028)
        - label: Capterra / G2 评分
          value: 4.6–4.7 / 5 verified reviews
    approximationNotes: KPI 结合了已确认的公开数据（ARR $100M+，Apr 2025 已确认；Series E $4B，Oct 2025）和分析师估算（Sacra 的年经常性收入（ARR）和净留存率（NRR）；MOIC 区间为分析师预测）。
    claimRefs:
      - CV027
