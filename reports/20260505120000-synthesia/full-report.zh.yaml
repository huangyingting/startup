      - number: '6.3'
        title: 具名客户案例
        blocks:
          - type: paragraph
            body: >
              Synthesia 公开案例库涵盖多个行业的具名企业客户：快消品（Heineken）、化工/科学（DuPont）、航空（Spirit
              Airlines）、科技（Zoom）、电信（Orange）及制造/家电（BSH）。每个案例记录的均为生产环境部署（非试点），并附有量化结果。结果质量最高的案例为 Spirit Airlines（员工支持问询减少
              76%）、DuPont（每个视频节省 10,000 美元以上，生产速度提升 80%）和 Orange（知识留存提升 9
              倍）。上述数据均为客户引用的自报数字，未经独立审计，应视为方向性参考而非精确核实数据。案例集覆盖快消品、化工、航空、电信、制造和科技等行业，是横向适用性的积极信号。截至研究日期，在公开来源中未发现金融服务或医疗健康领域含量化成果的具名案例——鉴于
              Synthesia 声称的 Fortune 100 渗透率，这一空白值得关注，或反映受监管行业偏好签署保密协议。
