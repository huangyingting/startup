  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: |
              Synthesia 的可寻址市场涵盖三个嵌套层次。最宽泛的框架是全球 AI 视频市场，横跨消费、媒体和企业三大垂直领域，覆盖所有
              AI 生成或 AI 增强的视频创作、编辑与流媒体，这一口径过宽，与 Synthesia 当前的企业级定位不符。更切实的中间层是企业 AI
              视频平台市场：帮助企业大规模创建、个性化和本地化视频内容的软件工具，主要用于内部沟通、培训、入职引导、销售赋能和客户教育，
              无需传统制作流程。在此之内，Synthesia 竞争最激烈的领域是企业电子学习与培训创作工具——具体指用 AI 虚拟人视频内容替代或
              增强 PowerPoint / 线下讲师工作流的 AI 驱动平台。HolonIQ 正是以此类目将 Synthesia 列为教育科技独角兽。

              明确排除在 Synthesia SAM 之外的支出包括：广播和流媒体视频平台（Netflix、Disney+、YouTube 基础设施）、传统视频制作机构
              和摄影棚、通用视频编辑软件（Adobe Premiere、DaVinci）、娱乐 / 游戏类 AI 视频及视频监控 / 安防。相邻增长机会——面向
              客户的营销视频、互动产品导览、销售用 AI 视频代理——目前在 Synthesia 收入结构中尚未形成规模。Synthesia 所取代或竞争的
              现状替代方案包括：内部视频制作团队、专业视频机构、屏幕录制加配音工具栈（Camtasia、Loom）、PowerPoint 加旁白，以及
              传统讲师主导培训。
            claimRefs:
              - CM001
