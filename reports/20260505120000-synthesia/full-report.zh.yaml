      - number: '2.3'
        title: 买方与细分格局
        blocks:
          - type: paragraph
            body: |
              Synthesia 的主要买方是企业 L&D（Learning and Development）团队，其次是大公司内部的
              HR、内部沟通和营销职能。典型买方是一家 500+ 员工公司的 L&D 或 HR 经理；企业级套餐
              需要 IT 或采购签字。预算归属 HR/L&D 成本中心，历史上这类中心会把总薪酬的 3–5 %
              分配给培训支出。付款方几乎总是企业部门或业务单元，而不是最终学习者。

              按职能划分的关键细分：（1）企业培训与合规——最大且最可预测的细分；由数据隐私、健康
              与安全、反贿赂等监管要求驱动，这些要求需要年度再认证。（2）员工入职——由招聘周期
              触发的高频场景；视频入职缩短达产时间并降低单名新员工成本。（3）产品与流程培训——在
              分布式销售和支持团队中规模化传递复杂产品知识。（4）内部沟通与高管信息传达——COO/CEO
              面向全员规模化沟通，尤其适合多语言全球员工队伍。（5）客户与合作伙伴教育——增长中的
              细分，客户把 Synthesia 视频视作真人演示者的等价替代。

              Synthesia 报告的 70 %+ Fortune 100 渗透率说明，企业段最高端已被相当程度拿下。未来
              单位经济取决于：（a）在现有大客户内扩大平均合同价值；（b）向中型市场（500–10,000
              名员工）扩张，在那里品牌认知较低，Articulate Storyline / Adobe Captivate / Canva
              会围绕价格敏感度竞争。
            claimRefs:
              - CM012
              - CM013
              - CM014
              - CM015
              - CM016
