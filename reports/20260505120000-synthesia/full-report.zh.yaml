      - number: '1.5'
        title: 不利事件与治理问题
        blocks:
          - type: paragraph
            body: |
              Synthesia 因其 AI 虚拟人遭滥用于政治宣传而面临重大声誉和伦理争议。多名将肖像授权给 Synthesia 用于虚拟人制作的演员，
              发现自己的数字形象出现在支持委内瑞拉和布基纳法索威权政权的虚假信息视频中——这些使用均未经其本人授权。英国演员工会
              Equity 于 2024 年详细记录了至少一起案例，并在其"Stop AI Stealing the Show"倡议下呼吁加强法律保护。VICE、WION
              及《国际商业时报》等媒体报道称 Synthesia 的内容审核机制不足以防范宣传滥用。Synthesia 加入了 Partnership on AI
              （PAI）的合成媒体框架作为回应，并发布了更新后的负责任 AI 准则，但这些管控措施是否充分仍存争议。截至报告日，公开记录中
              尚无任何针对 Synthesia 的正式诉讼被确认；在不断演进的欧盟《AI 法案》和英国 AI 监管框架下，监管风险仍是前瞻性的潜在敞口。
            claimRefs:
              - CO027
              - CO028
              - CO029
              - CO030
