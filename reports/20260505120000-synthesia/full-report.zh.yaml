  productSummary: >
    Synthesia 核心产品是一套 AI 视频创作平台，企业用户可调用 230 多个内置 AI 虚拟人或定制个人 AI 虚拟人，以 140 多种语言生产视频内容。 Synthesia 2.0（2024 年 6 月）引入全身虚拟人和
    Express-1 模型；Express-2（2025 年 9 月，全计划开放）实现实时超真实 AI 虚拟人视频。 Synthesia 3.0 / Video Agents（2025 年 10 月）新增实时交互式对话 AI
    虚拟人，适用于 HR 初筛、合规培训、客户引导和个性化学习， 将产品从视频创作延伸至 AI 原生工作流自动化。
  customerFocus: >
    目标客户为 L&D、内部沟通、HR 和销售赋能领域的大型及中型企业，Fortune 100 中逾 70% 已成为客户。具名企业客户包括 Heineken（7 万员工规模部署）、 DuPont（L&D
    降本）、Zoom（视频制作效率提升 90%）、Spirit Airlines（在线客服咨询量减少 76%）、Orange（学员留存率提升 9 倍）和 BSH Group（6 万员工培训部署）。
  businessModel: >
    按席位和企业级分层的 SaaS 订阅模式。企业合同涵盖定制虚拟人、专属客户成功、API 访问及 SCORM/LRS 集成。增长路径是先落地再扩张：客户从部门级 采用起步，逐步扩展至全企业部署。NRR 142%
    印证了从初始席位向更大规模组织合同的强劲扩张。客户来源遍布欧盟、英国和北美，国际收入占比可观。
