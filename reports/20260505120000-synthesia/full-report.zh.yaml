  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概述
        blocks:
          - type: paragraph
            body: >
              Synthesia 的竞争横跨五类对手：直接 AI 视频虚拟人平台（HeyGen、D-ID、Colossyan、Deepbrain AI）、电子学习创作工具 老牌厂商（Articulate
              360）、相邻个性化平台（Tavus）、可能将 AI 视频捆绑进企业套件的大型科技公司（Microsoft 365 Copilot 集成 Sora、Google Workspace
              Vids/Veo），以及传统视频制作和内部 AI 工程自建等现状替代方案。没有任何竞争对手 能覆盖 Synthesia 所服务的全部五个价值维度：企业合规、虚拟人真实感、多语言规模、SCORM/LMS
              工作流整合及内容治理。 这一分散格局折射出市场的早期阶段，也为 Synthesia 在大型科技平台实现功能对等之前建立持久锁定效应提供了窗口期。近期 最尖锐的压力来自 HeyGen——唯一一家在营收规模上接近
              Synthesia 的直接竞争对手；而结构性长期威胁则是 Microsoft 和 Google 将 AI 视频以零边际成本功能捆绑进现有企业协议的能力。
