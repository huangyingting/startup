      - number: '4.3'
        title: ARR 增长轨迹与公开牵引力指标
        blocks:
          - type: paragraph
            body: >
              Synthesia 的 ARR 增长呈加速态势：2023 年 $43M，2024 年底约 $88M（同比约 105%），2025 年 4 月经确认突破 $100M， Sacra 估算 2025 年 9 月达
              $146M。2025 年 4 月 $100M ARR 里程碑由 Synthesia 通过新闻稿直接确认，是目前可得数据中 最接近审计基准的数据点。Sacra 的 $146M 9
              月估算属分析机构预测，非公司披露。NRR 142% 意味着在零新增客户的情况下， 仅凭现有客户十二个月内即可产生 $207M ARR，显示既有客群中蕴含强劲的内生增长动能。截至 2025 年中，客户数超过
              65,000 家，Fortune 100 中 70%+ 已被确认为活跃客户。地域收入大致各半来自美国和世界其他地区（主要是欧洲和亚洲）。 上述指标均为公司披露，尚未经独立审计，亦无四大审计函或 SEC 文件佐证。
            claimRefs: []
      - number: '4.4'
        title: 资本结构与充裕度
        blocks:
          - type: paragraph
            body: >
              截至 2025 年底，Synthesia 已完成六轮融资（Series A 至 E），累计约 $530M。Series E（$200M，2025 年 10 月，GV 领投， post-money
              $4.0B）是最近一次融资事件，含老股转让部分，使早期员工和投资人得以部分套现——这是股权结构健康的积极信号， 但也意味着 $200M 总募资中有一部分并非一级股本投资。英国实体 FY2023 现金余额
              £81M（$102M）提供了 Series D 前的 基准：Synthesia 以约 $102M 现金加上 Series D $180M（理论总额 $282M）进入 2025 年，之后再扣除全年运营消耗。
              Series E 完成后，总现金估算舒适地超过 $200M，即使在较高烧钱速度下也意味着逾 24 个月的现金跑道。以约 700 名员工、 每人全包成本 $150–200K 估算，仅人力成本年度支出即约
              $105–140M，表明消耗不容小觑。目前尚无任何债务融资、项目融资 或保理安排被公开披露。
