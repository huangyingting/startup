      - number: '8.4'
        title: 可比估值集
        blocks:
          - type: paragraph
            body: >
              Synthesia 的估值对标四类可比：（1）高增速上市 AI 原生 SaaS 公司（Datadog、ServiceNow）；（2）私有 AI 平台领头羊（Databricks，估值 430 亿美元 / ARR
              超 10 亿美元）；（3）私有 AI 视频/L&D 竞争对手（HeyGen，约 5 亿美元 / ARR 约 1 亿美元）；（4）企业 SaaS 私有转上市的可比并购（Articulate，2021 年由 PE
              财团以约 21 倍 ARR 的 15 亿美元收购）。分析价值最高的可比是 Databricks：研究驱动的 AI 数据平台，自研模型、NRR 超 100%，走企业 SaaS 路线——Databricks 在
              ARR 超 10 亿美元时的 430 亿美元估值意味着约 40–43 倍 ARR 倍数，反映市场愿意为顶级 AI 基础模型平台支付 40 倍以上。Synthesia 27 倍 ARR 与 Databricks
              相比显得定价偏低，尽管两者对比并不完美：Databricks 是覆盖面更广的数据基础设施平台，企业切入点更多元。HeyGen 是最直接的对标，但规模更小、客户结构更偏中小企业/创作者，也无 NRR
              公开数据——意味着 Synthesia 理应获得显著溢价。ServiceNow 15 倍是对成熟、高渗透、具备工作流自动化的企业 SaaS 最相关的上市可比——暗示 Synthesia 在 IPO 时须维持 >
              40% 的营收同比增速，才能守住 20 倍以上的公开市场倍数。
