        - Fortune 100 渗透率 70%+；65,000 个客户；企业 AI 视频市场领导者
        - 如果 AI 视频商品化，市场定义可能收窄；在消费者或创作者市场没有主导地位
        - 支持论点更强 — Fortune 100 护城河是高质量企业验证
      - - AI 模型护城河
        - Express-2 为自研且由研究驱动；学术来源来自 TU Munich 和 UCL
        - 神经渲染技术已发表；资金充足的竞争对手用 1–3 年跑道可以复现
        - 短期论点成立；若持续 R&D 投入不足，3 年以上维度会削弱
      - - 财务指标
        - 142% NRR；77%+ 毛利率；$146M ARR 同比增长 66% — 位居私有 SaaS 全市场前十分位
        - GRR 未披露；NRR 方法未经审计；盈利路径未披露
        - 指标有吸引力，但需要核验；标准尽调问题
      - - 监管合规
        - ISO 42001（全球首个 AI 视频平台）；SOC 2 Type II；GDPR；CAI 成员
        - EU AI Act Article 50 水印未经过独立审计；2024 年宣传事件显示同意框架可以被绕过
        - 部分成立 — 认证带来差异化，但合规缺口仍在
      - - 产品差异化
        - Video Agents 打开新品类；Express-2 真实感同类最佳；140+ 种语言
        - Microsoft/Google 可能以零增量成本向 M365/Workspace 用户打包同类 AI 视频功能
        - 关键风险 — 大型科技公司打包威胁是首要论点失效情景；12–24 个月窗口最重要
      - - 退出路径
        - GV 领投 Series E；HolonIQ EdTech 验证；$100M+ ARR；市场地位具备 IPO 条件
        - 经营亏损显著；IPO 前盈利叙事尚未建立；$530M 融资带来较大的优先权压力
        - IPO 路径可信，但路演前需要补上盈利叙事和监管审计
