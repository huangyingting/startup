      - number: '3.2'
        title: 直接 AI 视频虚拟人竞争对手
        blocks:
          - type: paragraph
            body: >
              HeyGen 是按营收和增长轨迹衡量最近似的直接竞争对手。截至 2025 年底，HeyGen ARR 约 $95–100M，客户总数 85,000， 仅有 157 名员工，展现出 Synthesia 700
              人组织无法企及的资本效率。HeyGen 的差异化在于出色的语音克隆（支持 40 多种 语言的真人视频配音）、面向创作者的产品设计和更易上手的自助服务定价梯级。不过，HeyGen 的合规态势弱于
              Synthesia： 截至 2025 年中，其尚未获得 SOC 2 Type II 认证，且更多面向 SMB 和营销团队，而非受监管的企业 L&D。D-ID 于 2025 年 9 月收购 Simpleshow
              扩大企业版图，获得包括 Adobe、Microsoft 和 Deutsche Bank 在内的 1,500 多家企业客户，但其 2024 年约 $34M ARR 仍远低于 Synthesia。Colossyan
              是企业 L&D 细分中针对 Synthesia 最具竞争力的替代品，以 $88/ 席位 / 月提供无限视频时长——直接压制 Synthesia 的按量计费模式。Deepbrain AI 在虚拟人真实感上与
              Synthesia 相当，支持 150 多种语言且具备 ISO/SOC 合规认证，但其模板驱动的工作流限制了非标准化内容的创意灵活性。
