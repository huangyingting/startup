              - CR037
          - type: callout
            title: 风险——deepfake 宣传事件历史构成持续性声誉风险
            body: >
              2024 年，Synthesia avatar
              被用于专制政权（布基纳法索、委内瑞拉）宣传视频的事件表明，知情同意框架可通过虚假陈述使用意图的方式被绕过。若该事件再次发生——尤其是规模更大或涉及知名度更高的个人——将产生：（1）与融资或 IPO
              时间重合的头条风险；（2）受影响肖像权人的潜在集体诉讼敞口；（3）英国信息专员办公室（ICO）或欧盟数据保护机构的监管审查。Synthesia 已承诺改进流程，但事件后的整改工作迄今未发布任何第三方审计报告。
