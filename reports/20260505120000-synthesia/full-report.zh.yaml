      - number: '2.3'
        title: 买家图谱与细分市场
        blocks:
          - type: paragraph
            body: |
              Synthesia 的主要买家是企业 L&D（学习与发展）团队，其次是大型企业内部的 HR、内部沟通和市场职能部门。典型买家是员工
              规模 500 人以上公司的 L&D 或 HR 经理，企业级采购需要 IT 或采购部门审批。预算归口于 HR/L&D 成本中心，历史上该中心
              通常将工资总额的 3–5% 用于培训支出；付款方几乎始终是企业部门或业务单元，而非最终学习者。

              按职能划分的主要细分市场：（1）企业合规培训——规模最大、最可预期的细分，受需要年度重新认证的监管要求驱动（数据隐私、
              健康安全、反贿赂）。（2）员工入职——受招聘周期驱动的高频场景，视频入职可缩短生产效率达成时间并降低人均招聘成本。
              （3）产品与流程培训——向分散的销售和支持团队大规模传递复杂产品知识。（4）内部沟通与高管信息传递——在多语言全球员工
              队伍中实现 COO/CEO 大规模沟通。（5）客户与合作伙伴教育——一个增长中的细分，客户将 Synthesia 视频视同真人讲师的替代品。

              Synthesia 报告的 70%+ Fortune 100 渗透率表明，企业高端市场已基本覆盖。未来单位经济学取决于：（a）在现有大客户内
              扩大平均合同金额；（b）向中市场（500–10,000 名员工）扩张，该层级品牌认知度较低，Articulate Storyline /
              Adobe Captivate / Canva 在价格敏感度上具有竞争力。
