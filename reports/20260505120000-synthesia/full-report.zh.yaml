      - number: '6.4'
        title: 留存、满意度与续约证据
        blocks:
          - type: paragraph
            body: >
              Synthesia 最可靠的公开留存指标是净收入留存率（NRR），Sacra 报告 2024 年为 119%，2025 年底升至 142%。142% 的 NRR
              意味着现有客户的扩张收入超过流失与降级的损耗——与强劲的落地扩张模式一致。总收入留存率（GRR，衡量扩张前的基础留存）未公开披露；缺少 GRR，无法区分高 NRR
              究竟是掩盖了大量客户流失后靠大规模扩张补回，还是留存与扩张双强的结果。产品满意度持续良好：Synthesia 在 Capterra 获得 4.6/5 评分（截至 2026 年 3 月有 313
              条经过验证的评价），G2 评分为 4.7/5。评价中提及的摩擦点包括严格的 avatar 创建政策（知情同意框架被部分用户视为障碍）和偶发的支持响应延迟。2025 年初，Synthesia 与客户成功平台
              ChurnZero 达成合作，将 AI 个性化视频用于客户入职与互动——将自家产品用于客户成功的自我参照式应用，体现了对留存项目的认真投入。
            claimRefs: []
