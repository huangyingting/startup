  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与模块图谱
        blocks:
          - type: paragraph
            body: >
              Synthesia 提供云原生 AI 视频创作平台，无需摄像机、摄影棚或演员，即可将文字脚本、上传文档（PDF、PowerPoint、DOCX） 和现有视频内容转化为由 AI
              虚拟人呈现的精致主播式视频。平台采用模块化架构：核心 Video Studio 模块通过浏览器 UI 处理文字转视频创作；API / 程序化模块让开发者和企业 IT 团队通过 REST API
              大规模自动化视频制作；翻译与配音模块处理 多语言内容生成，支持 140 多种语言的唇形同步虚拟人本地化；定制虚拟人模块通过真人摄影棚录制创建品牌化 AI 主播虚拟人； SCORM/LMS
              导出模块将视频内容打包以直接交付至任何符合 SCORM 标准的学习管理系统；Video Agents 模块（Synthesia 3.0， 2025 年 10 月）实现实时交互式 AI
              虚拟人对话。Synthesia 2.0（2024 年 6 月）引入全身虚拟人和 Express-1 AI 模型； Synthesia 3.0（2025 年 10 月）推出 Express-2 模型和交互式
              Video Agents——在 16 个月内实现了两次重大代际跨越。
