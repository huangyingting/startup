companyProfile:
  summary: >
    Synthesia（2017 年创立于伦敦）是全球领先的企业级 AI 视频生成平台。CEO Viktor Riparbelli、COO/CFO Steffen Tjerrild 以及学术联合创始人 Prof. Matthias
    Niessner（慕尼黑工业大学）和 Prof. Lourdes Agapito（伦敦大学学院）共同创办，让企业无需摄像机、摄影棚或专业演员，即可用 140 多种语言大规模制作 AI 虚拟人视频。2025 年 10 月，公司完成
    $200M Series E 融资，由 GV（Google Ventures）和 NVIDIA NVentures 领投， 估值 $4.0B——较 2025 年 1 月 Series D 的 $2.1B 估值近乎翻番。公司 ARR
    于 2025 年 4 月突破 $100M，据估算 9 月已达 $146M。HolonIQ 于 2025 年 12 月将 Synthesia 纳入全球教育科技独角兽榜单（估值 $4.0B），印证其作为企业 L&D AI
    平台市场领导者的地位。
