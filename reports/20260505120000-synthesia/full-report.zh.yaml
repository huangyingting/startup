  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              Synthesia 运营多收入流 SaaS 模式，核心锚在年度企业合同（约占 ARR 的 70%），另有覆盖 SMB
              和个人创作者的自助订阅长尾。主要收入流是三档公开套餐的按席位订阅访问：Starter（$18/seat/month）、Creator（$64/seat/month）和 Enterprise（定制，中位数约
              $30K/year）。第二条收入流是 API
              用量计费，嵌入企业合同，或作为付费附加项支持规模化程序化视频生成。第三条收入流是定制数字人创建服务，可作为一次性或经常性项目收费；公开价格未披露。多语言翻译和本地化能力驱动最重要的扩张收入：约 40% 的
              Synthesia
              生成视频是源内容的翻译版本，也就是说，每个企业客户为既有视频库增加语言覆盖时，都会带来增量收入。企业账户从基础席位和分钟数配额开始，随着培训、入职和内部沟通工作负载增长而自然扩张——形成先落地再扩张的 GTM
              结构，历史追加销售表现强劲。
            claimRefs: []
          - type: table
            tableRef: TI001
            claimRefs:
