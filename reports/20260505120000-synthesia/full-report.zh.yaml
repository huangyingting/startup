  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与严重性框架
        blocks:
          - type: paragraph
            body: >
              Synthesia 面临集中在三大主题上的实质性风险：（1）监管深度合成媒体/deepfake 的法规环境持续演变加速，对平台及其企业客户均施加合规义务；（2）对自研 AI
              模型（Express-2）的结构性依赖——该竞争优势在技术上可被复制且未获全面专利保护；（3）规模化高增长企业 SaaS 公司的常见执行和财务风险。其中，监管风险对 2025/2026
              年的投资决策最具特殊性、最为紧迫：EU AI Act 第 50 条 deepfake 标注要求已于 2025 年 8 月生效，直接适用于 Synthesia 作为 AI 生成视频提供商；美国 NO FAKES
              Act（草案）将对未经授权的数字复制品追究联邦责任；2024 年一起事件中，Synthesia avatar
              在未获适当同意的情况下被用于国家宣传视频，证明技术层面的知情同意控制在实践中可被绕过。Synthesia 的 ISO 42001 认证和 Content Authenticity Initiative
              成员身份提供了部分缓解，但截至本报告发布时，监管风险尚未完全化解。
            claimRefs: []
          - type: figure
            figureRef: FR001
            claimRefs:
              - CR028
      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Synthesia 运营于合成媒体监管的前沿地带。EU AI Act 第 50 条（2025 年 8 月 2 日生效）要求 AI 系统提供商确保与真实人物外貌相似的输出内容以机器可读格式标记为 AI
              生成；公开发布此类内容的部署方须明确披露其 AI 生成属性。违规罚款上限为 3,500 万欧元或全球年营业额的 7%，以较高者为准。Synthesia 的 ISO 42001 认证和 CAI
              成员身份旨在展示合规姿态，但覆盖所有客户视频输出的持久水印及元数据的具体技术实现尚未经独立审计。美国监管环境较为分散：截至 2026 年初，14 个以上美国州已颁布 deepfake 专项立法（NCSL
              追踪），美国 TAKE IT DOWN Act（2025 年签署）针对非经同意的私密 deepfake，NO FAKES
              Act（联邦草案）将对未经同意创建未授权数字复制品引入民事责任。英国法律方面：《刑事司法法案》（英国，2024 年）将创建私密 deepfake 列为刑事犯罪；截至 2026 年初，英国尚无针对企业的通用
              deepfake 披露法。Avatar 知情同意合规方面：2024 年宣传事件揭示，Synthesia
              的知情同意框架被不良行为者通过虚假陈述获取同意签名的方式绕过——这是与技术故障不同的治理漏洞。截至研究日期，未发现针对 Synthesia
              的已立案诉讼，但该事件已加剧受影响肖像权人及监管机构对内容溯源合规监控的诉讼风险。
            claimRefs: []
          - type: table
            tableRef: TR001
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
              - CR007
      - number: '7.3'
        title: 运营、质量与安全风险
        blocks:
          - type: paragraph
            body: >
              Synthesia 的运营风险集中在四个方面。第一，单云 AWS 依赖：整个视频生成、渲染和交付管道均运行于 AWS；AWS 发生重大区域性中断将导致全面服务中断，且无多云故障转移的公开文档。第二，AI
              模型质量回退：Express-2 是核心差异化因素；任何输出质量回退（来自重新训练、数据集漂移或推理基础设施变更）都将以高度可见的方式直接损害客户体验——这是 AI 模型依赖型 SaaS 相对传统 SaaS
              特有的风险。第三，deepfake 检测绕过：随着监管机构、记者和企业安全团队的检测技术提升，Synthesia avatar
              若更容易被识别为合成内容，其在需要高度真实感的场景（高管通讯、客户向视频）中的有效性将下降。第四，企业安全漏洞：作为持有企业定制 avatar（高价值生物特征 AI 资产）的平台，一旦发生暴露定制 avatar
              数据的安全漏洞，将面临法律责任（依据 GDPR 生物特征处理规则）和严重的声誉损失。
            claimRefs: []
          - type: table
            tableRef: TR002
            claimRefs:
              - CR008
              - CR009
              - CR010
              - CR011
              - CR012
          - type: figure
            figureRef: FR002
            claimRefs:
              - CR029
      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Synthesia 的关键外部依赖构成供应链风险。AWS 是最实质的单一供应商风险：所有视频生成和交付均经由 AWS 基础设施；AWS 持续中断（历史概率低但多日量级并非为零）将导致全面服务中断。第三方 TTS
              供应商（身份未披露）代表显著的不透明风险：若 Synthesia 某一重要语言队列的语音合成依赖单一外部 TTS
              API，供应商停止服务、调价或竞争性退出可能在未提前通知客户的情况下降低受影响语言市场的多语言输出质量。GPU 算力稀缺：视频渲染是 GPU 密集型工作；在 AI 行业 GPU 需求集中爆发（如 GPT-5
              发布后）期间，云端 GPU 供应和价格可能趋紧，推高 Synthesia 的渲染成本，并对大型企业批量视频作业产生吞吐约束。大客户依赖：若 3–5 家 Fortune 100 客户占 ARR 的
              25%–35%（鉴于企业集中度规律，属合理情景），因竞争性替代、预算削减或大型超大规模云厂商客户决定自建而失去单个关键账户，可能造成实质性 ARR 缺口。
            claimRefs: []
