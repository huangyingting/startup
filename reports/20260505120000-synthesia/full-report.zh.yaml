      - number: '3.3'
        title: eLearning 既有厂商与相邻平台
        blocks:
          - type: paragraph
            body: >
              Articulate 360（Storyline、Rise）凭深度 SCORM/xAPI 课件、互动分支和庞大的教学设计师装机基础，主导传统 eLearning 创作。它不是直接的视频数字人平台——而是依赖导入由
              Synthesia 等工具制作的视频文件。这形成一种共生依赖：很多企业 L&D 团队用 Synthesia 制作视频资产，再嵌入 Articulate 课程，因此短期内两者更互补，而非彼此替代。不过，如果
              Articulate 集成原生 AI 数字人生成能力，它可能取代 Synthesia 作为视频创作层的角色。Tavus 是 AI 视频领域的相邻威胁：其 API
              驱动的个性化视频能力面向销售和营销触达（一对多规模化个性化），而不是 L&D 创作；但在尚未按用例拆分视频支出的账户里，它会争夺可自由支配的 AI 视频预算。
            claimRefs: []
      - number: '3.4'
        title: 大型科技进入者与平台威胁
        blocks:
          - type: paragraph
            body: >
              Microsoft 365 Copilot 于 2025 年末通过 OpenAI 的 Sora 2 集成生成式视频，让企业用户可直接在 Teams、Word 和 PowerPoint
              中用文本提示生成视频片段。当前技术限制——最长片段约 25 秒、没有数字人主持人工作流、没有 SCORM 导出——使 Microsoft 今天还无法替代 Synthesia 的 L&D
              创作功能。不过，Microsoft 的分发优势具有结构性不对称：数亿企业席位已经为 M365 付费，意味着 AI 视频生成可能对现有订阅者变成零增量成本。Google Workspace 的 Vids 产品由
              Veo 3.1 驱动，在 Google Workspace 环境内提供带同步音频的 60 秒 HD 视频生成。与 Microsoft 类似，Google
              当前聚焦生成式场景视频，而非真人数字人主持人工作流。因此，2025–2026 年窗口期是 Synthesia 在任一平台加入数字人创作能力或收购专业竞争者之前，加深企业锁定的关键时期。两者今天是间接威胁，但在
              3–5 年视角内是结构性威胁。
            claimRefs: []
      - number: '3.5'
        title: 护城河耐久性与切换成本分析
        blocks:
          - type: paragraph
            body: >
              Synthesia
              的竞争护城河建立在四个相互强化的机制上。第一，定制数字人创建需要在严格同意框架下进行线下影棚录制——数字人无法跨平台携带，也不易迁移；任何已投资高管或讲师数字人的组织，都会形成个人层面的锁定。第二，企业内容库带来组织层面的切换成本：拥有数百或数千条
              Synthesia 制作视频的组织，迁移时需要实质性重录，典型大型部署估计要耗费数周制作时间。第三，Synthesia 的 LMS 和 SCORM 生态集成（Cornerstone OnDemand、SAP
              SuccessFactors、Moodle、Docebo）把 Synthesia 嵌入学习运营工作流的管理层，而不只是创作层。第四，Synthesia 的 ISO 42001 认证——AI
              管理体系标准——在竞争者中少见，并越来越成为要求 AI 治理文件的企业买方采购门槛。短期内这些护城河耐久，但如果数字人可携带标准出现，或合规认证商品化，护城河会被侵蚀。
            claimRefs: []
