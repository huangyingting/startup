      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Synthesia 的执行风险集中于学术联合创始人依赖和 AI 研究人才留存。Matthias Niessner 教授（慕尼黑工业大学，神经渲染）和 Lourdes Agapito 教授（伦敦大学学院，3D
              计算机视觉）是学术型联合创始人，其持续研究贡献和机构学术网络嵌入在 Synthesia 的技术差异化叙事中；任一联合创始人离开都将造成技术能力缺口，并向评估研究可信度的投资者和企业客户发出声誉风险信号。CEO
              Viktor Riparbelli 是主要的外部发言人和融资面孔；其离开可能延迟潜在的公开上市，并影响 E 轮增长叙事。AI 研究人才是 2025 年全球竞争最激烈的招聘市场；Synthesia 与 Google
              DeepMind、Anthropic、Meta AI 和 Microsoft Research 争抢同类研究人员，这些机构均提供丰厚的股权和薪酬，私有公司在 Synthesia 现阶段并不总能匹配。此外，40%
              的研发人员占比创造了显著的运营杠杆上行空间，但也意味着公司高度依赖维持高绩效研究文化；随着员工数从约 700 人扩张至 2026–2027 年的潜在 1,000 人以上，文化退化是标准的规模化执行风险。
