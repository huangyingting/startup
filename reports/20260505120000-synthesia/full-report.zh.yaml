      - number: '2.2'
        title: 市场规模——多重视角
        blocks:
          - type: paragraph
            body: |
              对 Synthesia 相关市场的分析师估计差异很大，取决于市场边界怎么定义。最宽且可靠的
              估计（Grand View Research）把 2024 年全球 AI 视频市场定为 $3.86 B，并以 30–35 %
              CAGR 增长，到 2033 年估计达 $42.3 B。Precedence Research 估计 2025 年市场规模为
              $10.3 B，并预测到 2034 年增长至 $156 B（≈35 % CAGR）——这个估计激进得多，可能包含
              流媒体 AI 应用。与 Synthesia 定位更可比的 AI 视频生成软件细分市场，Fortune Business
              Insights 估计 2025 年约为 $717 M，到 2034 年以 18.8 % CAGR 达到 $3.35 B。企业视频
              通信市场另有估计：2023 年为 $16.6 B，到 2032 年增长至 $49 B（Allied Market
              Research，12 % CAGR）——这是更宽的类别，包含实时视频会议。

              对 HolonIQ 相关的 eLearning 创作工具市场，估计范围为 2025 年 $6.1–7.2 B（Research
              and Markets、TechSci Research），到 2030 年以 17–19 % CAGR 增长至 $13.9–17.6 B。
              Grand View Research 估计更宽的企业 eLearning 市场在 2024 年为 $104 B，到 2030 年
              达到 $335 B（21.7 % CAGR）。Market.us 估计 L&D 中的 AI 市场在 2025 年为 $9.3 B，
              到 2034 年达到 $97 B（26 % CAGR）。

              一个自下而上的合理性校验：Synthesia 报告 65,000+ 客户贡献约 $146 M ARR（2025 年
              9 月估计）。若企业 AI 视频创作市场的可直接触达年支出约为 $2–3 B（排除消费者 / 媒体），
              Synthesia 已拿下其 SAM 的约 5–7 %——早期位置强劲，且仍有实质增长空间。
