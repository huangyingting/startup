              CAC 未披露、回本周期未披露、收入确认政策未披露、运营消耗未披露、Series E 新老股比例未披露——这些缺口的叠加意味着 仅凭公开数据无法构建完整的 SaaS 财务模型。英国 Companies House
              FY2023 申报是唯一有审计基础的锚点，但仅覆盖增长 拐点前的英国实体。任何仅依赖 ARR 倍数而缺乏队列经济学的估值模型在结构上都是不完整的，应仅作为参考性估算。
