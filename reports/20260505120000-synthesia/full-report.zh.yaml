      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Synthesia 的技术架构是基于 AWS 的云原生架构，采用租户隔离环境，以完全托管服务形式提供 SaaS 视频生成。核心 AI 层由 Synthesia 自研基础模型（Express-1 和
              Express-2）构成，由 Prof. Matthias Niessner 和 Prof. Lourdes Agapito 共同
              参与创立的研究团队开发——两位均是神经渲染和三维计算机视觉领域的学术领军人物。这些模型负责虚拟人动画、面部表情合成、 手势生成和唇形同步——平台技术差异化最强的核心组件。语音合成层将 Synthesia
              自研的文字转语音模型与第三方 TTS 供应商 结合以覆盖更广泛的语言；具体的第三方 TTS 依赖关系未公开披露。视频渲染在云 GPU 基础设施（AWS，托管）上进行，异步 交付：Video API 通过 REST
              接受创建请求，触发异步渲染，完成后通过 webhook 通知客户。前端是基于浏览器的协作式创作 工作室，支持拖放编辑、品牌套件管理和实时评论。API
              分为七个模块：Video、Templates、Assets、Webhooks、Translations、 Dubbing 和 Audit Logs。
