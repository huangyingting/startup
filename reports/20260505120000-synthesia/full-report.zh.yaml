      - number: '6.6'
        title: 反向客户证据与风险
        blocks:
          - type: paragraph
            body: >
              以下反向信号值得尽调关注。第一，65,000 家客户中包含大量中小企业/免费增值队列，其流失行为与企业客户差异显著；缺少分段流失数据，整体 NRR
              指标可能掩盖大量中小企业客户流失被企业端扩张所抵消的实质情况。第二，具名案例结果（Spirit Airlines、DuPont、Orange）均为客户自报，源于 Synthesia
              的客户营销活动，未经第三方审计独立核实——这是客户证明材料的标准局限，尽调应予以认可。第三，Capterra 评价指出 Synthesia avatar
              创建知情同意政策存在摩擦，部分客户将其视为快速自助部署的障碍——可能加剧客户群底层中小企业的流失。第四，缺少金融服务或医疗健康领域含量化成果的具名案例，可能表明受监管行业仍处于早期或试点阶段，尚未实现大规模生产部署——这对评估最高价值企业垂直市场的渗透率有重要意义。
            claimRefs: []
      - number: '6.7'
        title: 附录
        blocks:
          - type: callout
            title: 优势——70% 以上 Fortune 100 渗透率是高质量的客户验证信号
            body: >
              Synthesia 声称 Fortune 100 中 70% 以上为其客户——若属实，意味着全球安全意识最强、合规要求最严、供应商审核最严格的企业已完成供应商安全评估，批准 Synthesia
              进入企业采购，并在生产环境中完成部署。这是极具说服力的企业背书信号：Fortune 100 采购审批周期通常需要 6 至 18 个月，并要求 SOC 2 Type II 认证和合同审查。Fortune 100
              客户的安装基础也提高了竞争对手在任意账户中取代 Synthesia 的政治成本。
            calloutType: strength
            claimRefs:
              - CU002
