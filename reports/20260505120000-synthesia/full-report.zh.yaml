        title: 典型案例
        blocks:
          - type: callout
            title: 优势——合规与内容锁定是持久护城河
            body: >
              Synthesia 将 ISO 42001 AI 治理认证与深度 LMS 整合相结合，构建起复合护城河。ISO 42001 在企业 AI 视频领域属稀缺
              认证，日益成为受监管行业的采购门槛。叠加内容库切换成本，Synthesia 有望在直接竞争对手接近定价和真实感对等水平时， 仍能留住企业客户。
            calloutType: strength
