      - number: '5.2'
        title: 技术架构与运营模式
        blocks:
          - type: paragraph
            body: >
              Synthesia 的技术架构是基于 AWS 的云原生架构，并采用隔离租户环境，以全托管服务交付 SaaS 视频生成。核心 AI 层由 Synthesia 自研基础模型（Express-1 和
              Express-2）组成，这些模型由研究团队开发；该团队由 Prof. Matthias Niessner 和 Prof. Lourdes Agapito 共同创立，两人是神经渲染和 3D
              计算机视觉领域的学术领军者。这些模型处理数字人动画、面部表情合成、手势生成和唇形同步——这是平台技术差异化最强的组件。语音合成层结合 Synthesia 自研文本转语音模型和第三方 TTS
              供应商，以扩大语言覆盖；具体第三方 TTS 依赖未公开披露。视频渲染在云 GPU 基础设施（AWS，托管）上完成，并以异步方式交付：Video API 通过 REST 接收创建请求，触发异步渲染，并在完成时通过
              webhook 通知客户。前端是基于 Web 的协作工作室，包含拖拽式编辑、品牌套件管理和实时评论。API
              分为七个模块：Video、Templates、Assets、Webhooks、Translations、Dubbing 和 Audit Logs。
