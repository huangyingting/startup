companyProfile:
  summary: >
    Synthesia（2017 年成立，伦敦）是全球领先的企业 AI 视频生成平台。公司由 CEO Viktor Riparbelli、COO/CFO Steffen Tjerrild，以及学术联合创始人 Prof. Matthias
    Niessner（TU Munich）和 Prof. Lourdes Agapito（UCL）创立，帮助企业不靠摄像机、影棚或专业演员，就能用 140+ 种语言规模化创建 AI 数字人视频。2025 年 10 月，Synthesia
    完成由 GV（Google Ventures）和 NVIDIA NVentures 领投的 $200M Series E，估值 $4.0B，几乎较 2025 年 1 月 $2.1B 的 Series D 估值翻倍。公司在 2025
    年 4 月越过 $100M ARR，并在 2025 年 9 月达到估计 $146M ARR。HolonIQ 于 2025 年 12 月以 $4.0B 估值将 Synthesia 纳入全球 EdTech 独角兽名单，印证其企业 L&D
    AI 平台市场领导者地位。
