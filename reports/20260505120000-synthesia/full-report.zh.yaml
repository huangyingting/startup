      - number: '3.2'
        title: 直接 AI 视频数字人竞争者
        blocks:
          - type: paragraph
            body: >
              按收入和增长轨迹看，HeyGen 是最接近的直接竞争者。截至 2025 年末，HeyGen ARR 约 $95–100 million、总客户 85,000 家、员工仅 157 人，显示出 Synthesia
              700 人组织无法匹配的资本效率。HeyGen 的差异化来自更强的语音克隆（支持对现有真人视频做 40+ 种语言配音）、以创作者为中心的产品设计，以及更易进入的自助定价梯度。不过，HeyGen 的合规能力弱于
              Synthesia：截至 2025 年中，它缺少 SOC 2 Type II 认证，目标也更多是 SMB 和营销团队，而非受监管的企业 L&D。D-ID 于 2025 年 9 月收购
              Simpleshow，扩张了企业足迹，获得 1,500+ 家企业客户，包括 Adobe、Microsoft 和 Deutsche Bank；但其 2024 年 ARR 约 $34 million，仍远低于
              Synthesia。Colossyan 是企业 L&D 细分中最强的 Synthesia 替代方案，按 $88/seat/month 提供无限视频分钟数，直接压低 Synthesia
              的计量模式。Deepbrain AI 在数字人逼真度上可比，并支持 150+ 种语言及 ISO/SOC 合规，但其模板驱动工作流限制了非标准化内容的创作灵活性。
