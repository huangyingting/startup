company:
  name: Synthesia
chapter:
  number: 1
  title: Company Overview
  summary: |
    Synthesia is a London-based AI enterprise video platform founded in 2017 that enables
    businesses to create scalable, multilingual video content using photorealistic AI avatars
    and synthesised voices — without cameras, studios, or actors. The company reached
    unicorn status in June 2023 ($1 B Series C) and was subsequently added to HolonIQ's
    global EdTech unicorn list in December 2025 at a $4.0 B valuation, reflecting its
    education/training authoring-tool relevance. As of early 2026 the company has raised
    more than $530 M across six rounds, reports ARR of approximately $146 M, serves more
    than 65,000 customers including 70 %+ of Fortune 100 companies, and employs ~700 people.
sections:
  - id: s1
    title: Identity and Business Model
    body: |
      Synthesia (full legal name Synthesia Ltd) is a private technology company headquartered
      in London, United Kingdom, with offices in New York, Copenhagen, and other locations.
      It was incorporated in 2017 and operates as a B2B SaaS platform. The company's core
      product — Synthesia STUDIO — allows enterprise users to turn text scripts into
      professional-quality videos featuring lifelike AI avatars speaking in 140+ languages
      without any on-camera recording or traditional production workflow. The business model
      is subscription-based, with tiers ranging from a free/starter plan through Creator and
      Enterprise plans; the majority of revenue derives from enterprise contracts. Synthesia
      is classified in the AI-generated video, synthetic media, and workplace learning
      authoring-tool categories. HolonIQ added Synthesia to its Global EdTech Unicorn list in
      December 2025, categorising it under "Authoring Tools (AI)" given substantial adoption
      by corporate L&D and training teams. The company's original unicorn designation came
      from its June 2023 Series C at a $1.0 B post-money valuation.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
  - id: s2
    title: Founders and Leadership
    body: |
      Synthesia was co-founded in 2017 by four individuals with complementary expertise in
      AI research, computer vision, and entrepreneurship. Viktor Riparbelli (CEO) is the
      commercial and strategic leader who has steered the company from research project to
      $4 B enterprise platform. Steffen Tjerrild, co-founder and now COO/CFO, oversees
      operations and finance. Prof. Matthias Niessner (Technical University of Munich) and
      Prof. Lourdes Agapito (University College London), both distinguished computer-vision
      researchers, co-founded the company and provide ongoing scientific leadership;
      Niessner's work on neural rendering underpins much of Synthesia's avatar technology.
      Jonathan Starck serves as CTO, leading engineering; Peter Hill joined as a senior
      technology executive around the Series D close in January 2025. The board includes
      representatives from key investors GV (Google Ventures), Accel, NEA, and Kleiner
      Perkins. Key-person risk is concentrated around Viktor Riparbelli, whose public profile
      and vision drive press and investor relations; however, the academic co-founders provide
      technical credibility and institutional depth that partially mitigates this risk.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
  - id: s3
    title: Funding History and Valuation
    body: |
      Synthesia has raised approximately $530 M in total equity funding across six rounds
      since its founding. The seed/Series A in April 2019 raised approximately $3.8 M from
      LDV Capital, Mark Cuban, and Seedcamp. A $12.5 M round in April 2021 (FirstMark,
      LDV Capital) preceded the landmark $50 M Series B in December 2021 led by Kleiner
      Perkins — a round that brought in GV (Google Ventures), Accel, and angel investors
      Patrick Collison and John Collison at a reported $1 B post-money valuation. The
      $90 M Series C in June 2023 (led by Accel, with NVentures/Nvidia and GV) solidified
      unicorn status at a $1 B valuation. Synthesia then raised $180 M in January 2025
      (Series D, NEA-led, $2.1 B valuation) and $200 M in October 2025 (Series E,
      Google Ventures-led, $4.0 B valuation). The Series E included a secondary share
      sale facility facilitated with Nasdaq, enabling employees to cash out. Adobe Ventures
      made a strategic investment in April 2025 alongside the company's $100 M ARR
      milestone. The company was classified as an EdTech unicorn by HolonIQ in December 2025
      at the $4.0 B Series E valuation because of its education and training authoring use
      case — though its original unicorn round was the June 2023 Series C at $1 B.
    claimRefs:
      - CO012
      - CO013
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
  - id: s4
    title: Scale, Metrics, and Geographic Footprint
    body: |
      As of early 2026, Synthesia reports more than 65,000 business customers and over
      1 million registered users on its platform. More than 70 % of Fortune 100 companies
      are active customers. Annual recurring revenue (ARR) crossed $100 M in April 2025
      and analyst estimates placed ARR at approximately $145–146 M by September 2025.
      Revenue is split roughly 50/50 between the United States and international markets.
      Headcount grew to approximately 700 employees by early 2026, with a heavy
      engineering and AI research weighting. The product is available globally, with
      active commercial emphasis in North America, the United Kingdom, continental Europe,
      Japan, and Australia. The platform supports 240+ AI avatars, 1,000+ AI voices, and
      more than 140 languages, making localization a major enterprise value driver.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
  - id: s5
    title: Adverse Events and Governance Issues
    body: |
      Synthesia has faced material reputational and ethical controversy stemming from
      the misuse of its AI avatars in political propaganda. Multiple actors who had sold
      their likeness to Synthesia for avatar creation discovered their digital likenesses
      appearing in disinformation videos supporting authoritarian regimes in Venezuela
      and Burkina Faso — uses the actors had not consented to. UK performers' union Equity
      documented at least one case in detail in 2024 and has campaigned for stronger legal
      protections under its "Stop AI Stealing the Show" initiative. Critics including VICE,
      WION, and the International Business Times reported that Synthesia's content
      moderation safeguards were insufficient to prevent propaganda use. Synthesia
      participated in the Partnership on AI (PAI) synthetic media framework as part of
      its response, and has since published updated responsible-AI guidelines, but the
      adequacy of these controls remains contested. No formal lawsuit against Synthesia has
      been confirmed in public records as of the report date; regulatory exposure under
      evolving EU AI Act and UK AI regulation frameworks remains a forward-looking risk.
    claimRefs:
      - CO027
      - CO028
      - CO029
      - CO030
