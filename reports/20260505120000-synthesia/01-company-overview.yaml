callouts:
  - calloutType: strength
    title: Rapid Revenue Scaling and Enterprise Traction
    body: |
      Synthesia crossed $100 M ARR in April 2025 and reached an estimated $146 M by
      September 2025 — implying strong net retention and enterprise expansion. Over 70 % of
      Fortune 100 companies are reported customers, providing durable logo quality and
      upsell optionality. The combination of a $4 B valuation and confirmed revenue milestone
      anchors the investment case.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO024
  - calloutType: risk
    title: Deepfake Controversy Exposes Content Governance Gaps
    body: |
      The 2024 propaganda misuse incidents — where Synthesia avatars appeared in
      disinformation campaigns for authoritarian regimes without actors' consent — represent
      a material reputational and regulatory risk. Equity (UK performers' union) has
      campaigned publicly, and evolving EU AI Act and UK AI regulation may impose stricter
      controls. While Synthesia has issued updated guidelines and joined the PAI framework,
      the adequacy of these controls is actively contested.
    claimRefs:
      - CO027
      - CO028
      - CO029
      - CO030
  - calloutType: insight
    title: HolonIQ EdTech Listing Reflects Training-Tool Reclassification
    body: |
      Synthesia's original unicorn round was the June 2023 Series C at $1 B. HolonIQ
      independently added Synthesia to its global EdTech unicorn list in December 2025 at
      the $4.0 B Series E valuation because of the company's substantial adoption as a
      corporate learning and training authoring tool. This classification underscores
      Synthesia's dual identity: a general-purpose AI video platform that has achieved
      dominant penetration specifically in enterprise L&D and workforce training contexts.
    claimRefs:
      - CO003
      - CO018
      - CO019
      - CO020
