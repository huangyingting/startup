companyProfile:
  summary: >
    Synthesia (est. 2017, London) is the world's leading enterprise AI video generation platform.
    Founded by CEO Viktor Riparbelli, COO/CFO Steffen Tjerrild, and academic co-founders Prof.
    Matthias Niessner (TU Munich) and Prof. Lourdes Agapito (UCL), the company enables enterprises
    to create AI avatar video at scale in 140+ languages without cameras, studios, or professional
    actors. Synthesia raised a $200M Series E in October 2025 led by GV (Google Ventures) and
    NVIDIA NVentures at a $4.0B valuation — nearly doubling its $2.1B Series D valuation from
    January 2025. The company crossed $100M ARR in April 2025 and reached an estimated $146M ARR
    by September 2025. HolonIQ added Synthesia to its global EdTech unicorn list in December 2025
    at $4.0B, validating the company's status as the enterprise L&D AI platform market leader.
  foundedDate: "2017-01-01"
  founders:
    - name: Viktor Riparbelli
      role: CEO and Co-founder
      background: >
        Danish entrepreneur; previously co-founded and exited an analytics startup; serial founder
        with product-led go-to-market background. Has led Synthesia through five funding rounds
        from seed to $4.0B Series E.
      claimRefs: []
    - name: Steffen Tjerrild
      role: COO and CFO, Co-founder
      background: >
        Prior experience in finance and operations; serves dual executive role covering financial
        governance and operational leadership alongside Riparbelli as CEO.
      claimRefs: []
    - name: Prof. Matthias Niessner
      role: Co-founder and Chief Scientist (part-time, TU Munich)
      background: >
        Professor of Visual Computing at TU Munich; pioneer of neural face rendering and deepfake
        detection research; brings academic AI provenance to Synthesia's Express-2 model development.
      claimRefs: []
    - name: Prof. Lourdes Agapito
      role: Co-founder (part-time, UCL)
      background: >
        Professor of Computer Vision at University College London; specialist in 3D reconstruction
        and human motion; provides academic research depth to Synthesia's avatar and motion modelling.
      claimRefs: []
  foundingLocation: "London, United Kingdom"
  headquarters: "London, United Kingdom"
  productSummary: >
    Synthesia's core product is an AI video authoring platform enabling enterprise users to create
    video content using 230+ built-in AI avatars or custom personal AI avatars in 140+ languages.
    Synthesia 2.0 (June 2024) introduced full-body avatars and Express-1 models. Express-2
    (September 2025, released on all plans) delivers real-time, hyper-realistic AI avatar video.
    Synthesia 3.0 / Video Agents (October 2025) adds real-time interactive conversational AI avatars
    for use in HR screening, compliance training, customer onboarding, and personalized learning —
    expanding the product from video authoring into AI-native workflow automation.
  customerFocus: >
    Enterprise and mid-market organizations across L&D, internal communications, HR, and sales
    enablement. 70%+ of Fortune 100 companies are customers. Named enterprise customers include
    Heineken (70,000-employee deployment), DuPont (L&D cost savings), Zoom (90% faster video
    production), Spirit Airlines (76% reduction in live-agent inquiries), Orange (9x learner
    retention improvement), and BSH Group (60,000-employee training deployment).
  businessModel: >
    SaaS subscription with per-seat and enterprise tiering. Enterprise contracts include custom
    avatar creation, dedicated customer success, API access, and SCORM/LRS integration. Land-and-expand
    motion: customers begin with departmental adoption and expand to enterprise-wide deployment.
    The 142% NRR reflects strong expansion from initial seats to broader organizational contracts.
    International revenues are significant with EU, UK, and North America all represented in the
    customer base.
  stage: "Series E / Late-Stage Private"
  fundingStatus: >
    $200M Series E (October 2025, GV-led, $4.0B post-money); $180M Series D (January 2025, NEA-led,
    $2.1B post-money); $90M Series C (June 2023, Accel-led, $1.0B post-money); earlier rounds include
    Series A and B. Total raised: approximately $530M across all rounds.
  disclosureProfile: private-disclosed
  claimRefs: []

summary:
  headline: >
    Synthesia is the enterprise AI video market leader — a conditional investment at $4.0B. The company's
    top-decile metrics (142% NRR, 66% ARR growth, 77%+ gross margin, 70%+ Fortune 100 penetration)
    justify a premium revenue multiple, but the 27x trailing ARR valuation leaves little margin for
    execution error. Key risks — EU AI Act compliance gap, undisclosed GRR, and Microsoft/Google AI
    video bundling — require diligence completion before commitment. CONDITIONAL PROCEED for high
    risk-tolerance investors with AI regulatory expertise. HolonIQ added Synthesia to its EdTech
    unicorn list in December 2025 at $4.0B, validating enterprise L&D adoption quality.
  overallScore: 7.2
  recommendation: track
  confidence: medium
  riskRating: high
  valuationStance: stretched

