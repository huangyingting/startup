  evidenceGaps:
    - type: missing-source
      severity: blocking
      topic: Consolidated group P&L and revenue recognition policy for Synthesia global entity
      missingEvidence: >-
        Audited consolidated financial statements for the Synthesia global group (UK holdco and all subsidiaries)
        including revenue by stream, COGS breakdown, and operating expenses
      whyItMatters: >-
        Without consolidated financials, gross margin, operating burn, and revenue mix estimates are single-source
        analyst projections that cannot be independently verified — a blocking gap for underwriting
      diligencePath: >-
        Request FY2024 management accounts or audited financials covering all entities; confirm revenue recognition
        policy for ARR (is it contractual value or recognized revenue?)
      relatedQuestionRefs:
        - RQ416
    - type: private-evidence-only
      severity: material
      topic: CAC, payback period, and LTV/CAC ratio by customer segment
      missingEvidence: >-
        Cohort-level unit economics data: CAC by enterprise vs. SMB vs. self-serve; sales cycle length; payback period
        at median ACV; LTV assumptions at current churn rates
      whyItMatters: >-
        These metrics are the foundation of standard SaaS valuation models; without them, growth-stage ARR multiples
        cannot be validated against underlying economics
      diligencePath: >-
        Request CRM/Salesforce cohort analysis by customer segment; ask for CAC by segment across the last 4 quarters;
        validate with CFO-level financial model
      relatedQuestionRefs:
        - RQ417
    - type: private-evidence-only
      severity: material
      topic: Series E primary vs. secondary capital composition
      missingEvidence: >-
        Exact split between primary (new cash to company) and secondary (existing shareholder liquidity) within the
        $200M Series E
      whyItMatters: >-
        If the secondary fraction is material (e.g., 30%), the company received only $140M in primary operating capital
        from the Series E — materially changing runway calculations and signaling investor appetite for partial exit at
        this stage
      diligencePath: >-
        Request Series E investment agreements or investor communication that discloses primary/secondary split; confirm
        with lead investor (GV) term sheet
      relatedQuestionRefs:
        - RQ414
        - RQ421
    - type: conflicting-data
      severity: material
      topic: NRR methodology and reliability of 142% figure
      missingEvidence: >-
        Definition of NRR used (cohort-based trailing 12-month? rolling 12-month? does it include pricing increases?);
        audited or CFO-attested NRR calculation for Synthesia
      whyItMatters: >-
        NRR of 142% would be top-decile for any SaaS company; if it includes pricing uplifts or favorable multi-year
        prepayment timing, the organic expansion signal may be overstated — materially affecting growth projections
      diligencePath: >-
        Request NRR calculation methodology from management; request historical cohort retention analysis by vintage
        year
      relatedQuestionRefs:
        - RQ424
    - type: missing-source
      severity: moderate
      topic: Attribution of Synthesia ARR growth acceleration — AI efficiency versus enterprise sales team scaling
      missingEvidence: >-
        Management commentary or internal metrics distinguishing expansion revenue from new logo growth; sales team
        headcount data over time; PLG vs. enterprise-led growth contribution
      whyItMatters: >-
        If ARR acceleration is primarily sales headcount-driven rather than AI model efficiency-driven, the operating
        leverage thesis (higher revenue per employee over time) is weakened and cost per dollar of growth remains
        elevated
      diligencePath: >-
        Request quarterly new logo ARR versus expansion ARR breakdown; correlation analysis between sales headcount
        growth and new ARR
      relatedQuestionRefs:
        - RQ422
