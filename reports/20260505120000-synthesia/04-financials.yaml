company:
  name: Synthesia
chapter:
  number: 4
  title: Financials
sections:
  - id: SEC401
    title: Revenue Model and Streams
    body: >
      Synthesia operates a multi-stream SaaS revenue model anchored in annual enterprise contracts (approximately 70% of
      ARR), with a self-serve subscription tail covering SMBs and individual creators. The primary revenue stream is
      per-seat subscription access across three public tiers: Starter ($18/seat/month), Creator ($64/seat/month), and
      Enterprise (custom, median ~$30K/year). A secondary stream is API usage-based billing, embedded in enterprise
      contracts or available as a paid add-on for programmatic video generation at scale. A third stream is custom
      avatar creation services, priced as a one-time or recurring engagement; list pricing is not publicly disclosed.
      Multilingual translation and localization capabilities drive the most material expansion revenue: approximately
      40% of all Synthesia-generated videos are translated versions of source content, meaning each enterprise customer
      generates incremental revenue as they add language coverage for existing video libraries. Enterprise accounts
      start with base seat and minute quotas and expand organically as training, onboarding, and internal comms
      workloads grow — creating a land-and-expand GTM structure with historically strong upsell performance.
    tableRefs:
      - T401
      - T402
    figureRefs:
      - F401
  - id: SEC402
    title: Unit Economics and Margin Profile
    body: >
      Synthesia does not publish consolidated group-level financials. The most precise data point is the UK subsidiary's
      FY2023 Companies House filing (Synthesia Limited, UK company number 10933652), which reported turnover of £26M
      (~$33M) and gross profit of £20M, implying a 77% gross margin for the UK entity in that fiscal year. This is
      consistent with analyst estimates of 70–90% gross margin for enterprise AI SaaS platforms with similar cost
      structures. The key cost of revenue components are model inference compute (cloud GPU costs for video rendering),
      multilingual TTS/lip-sync, avatar personalization, and limited customer support at standard tiers. Net Revenue
      Retention of 142% in late 2025 (up from 119% in 2024) confirms net expansion substantially exceeds churn, a
      leading indicator of pricing power and customer health. The implied average annual revenue per customer (ARPU) of
      approximately $2,246 (at $146M ARR / 65,000 customers) suggests significant pricing stratification: enterprise
      accounts likely contribute $30K–$50K+ individually, while the large SMB/creator base anchors the account count at
      much lower ARPU. Revenue-per-employee of approximately $209K (at $146M ARR / ~700 employees) compares unfavorably
      to capital-efficient competitors like HeyGen ($637K/employee at similar ARR scale).
    tableRefs:
      - T403
    figureRefs:
      - F402
      - F403
    calloutRefs:
      - CA401
  - id: SEC403
    title: ARR Trajectory and Public Traction Metrics
    body: >
      Synthesia's ARR growth exhibits acceleration: from $43M in 2023 to approximately $88M at year-end 2024
      (approximately 105% YoY) to $100M+ confirmed in April 2025 to an analyst estimate of $146M by September 2025. The
      April 2025 $100M ARR milestone was confirmed directly by Synthesia via press release, making it the clearest
      audited-equivalent data point available. The Sacra $146M September 2025 estimate is an analyst projection, not
      company-disclosed. NRR of 142% implies that existing customers alone — with zero new logo additions — would
      generate $207M ARR in twelve months, indicating strong inherent growth momentum embedded in the installed base.
      Customer count exceeded 65,000 businesses as of mid-2025, with 70%+ of Fortune 100 companies confirmed as active
      customers. Geographic revenue split is approximately 50% US, 50% rest of world (primarily Europe and Asia). These
      metrics are all company-disclosed rather than independently audited, and no Big Four audit letter or SEC filing
      corroborates them.
    tableRefs: []
    figureRefs: []
  - id: SEC404
    title: Capital Structure and Adequacy
    body: >
      Synthesia has raised approximately $530M across six rounds (Series A through E) as of late 2025. The Series E
      ($200M, October 2025, led by GV at a $4.0B post-money valuation) is the most recent capital event and included a
      secondary component enabling early employees and investors to partially liquidate positions — a positive signal
      for cap table health but one that means some fraction of the $200M gross was not primary investment capital. The
      UK entity's FY2023 cash balance of £81M ($102M) provides a pre-Series D baseline: Synthesia entered 2025 with
      approximately $102M cash plus the Series D $180M ($282M theoretical gross), before operational burn through
      calendar year 2025. Post-Series E, gross cash is estimated comfortably above $200M, implying more than 24 months
      of runway even at elevated burn rates. With ~700 employees and an assumed fully-loaded cost of $150–200K per
      employee, annual personnel cost alone is estimated at $105–140M, suggesting burn is material. No debt financing,
      project finance, or factoring arrangements have been publicly disclosed.
    tableRefs:
      - T404
    figureRefs:
      - F404
    calloutRefs:
      - CA402
  - id: SEC405
    title: Public Financial Gaps and Diligence Blockers
    body: >
      Synthesia's status as a private UK company means its consolidated group financials are not publicly available. The
      FY2023 UK Companies House filing is the sole audited data anchor, covering only the UK entity for a period prior
      to the company's most significant growth inflection. CAC, payback period, LTV/CAC ratio, gross logo churn, and
      sales cycle length are entirely undisclosed. Revenue recognition policies (whether ARR represents contractual
      value or recognized revenue, and how it accounts for multi-year prepayments) are not available for review. No
      information is available on debt instruments, convertible notes, or liquidation preference stacking across the six
      funding rounds. These gaps mean standard SaaS underwriting cannot be completed from public data alone; a full
      diligence package from management is required to validate any valuation model.
    tableRefs:
      - T405
    figureRefs: []
    calloutRefs:
      - CA403
  - id: SEC406
    title: Financial Verdict
    body: >
      Synthesia's publicly available financial signals are broadly positive: triple-digit ARR growth, 142% NRR, a 77%
      gross margin anchor from UK filings, strong Fortune 100 penetration, and a well-capitalized balance sheet
      post-Series E. The revenue model is durable — annual enterprise contracts with land-and-expand dynamics create
      inherent revenue visibility and reduce dependence on new logo acquisition alone. However, the absence of
      consolidated audited financials, undisclosed CAC and burn metrics, and the meaningful headcount-driven cost base
      introduce material uncertainty into any forward-looking valuation model. The ARR-to-valuation multiple of
      approximately 27x (at the $4B Series E) prices in aggressive continued growth, with limited margin for
      deceleration. The highest-priority diligence asks are: consolidated P&L with revenue recognition detail,
      cohort-level NRR and churn by customer tier, CAC/payback by segment, and the secondary-to-primary ratio in the
      Series E structure.
    tableRefs: []
    figureRefs: []
