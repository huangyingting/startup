  evidenceGaps:
    - type: missing-source
      severity: material
      topic: Gross Revenue Retention (GRR) — base retention before expansion
      missingEvidence: >-
        Synthesia's GRR by customer segment (enterprise vs. SMB); logo churn rate by cohort; average contract duration
        by ACV band; whether SMB trial-to-paid conversion rates are declining
      whyItMatters: >-
        NRR of 142% is impressive but could mask significant logo churn in the SMB base if enterprise expansion is very
        large; GRR is the gating metric for assessing whether the base business is stable or shrinking; without it, the
        65,000 customer claim is not interpretable
      diligencePath: >-
        Request segmented cohort analysis by account size, vintage, and use case; request GRR and logo churn rate for
        enterprise and SMB cohorts separately; review monthly ARR bridge (new, expansion, contraction, churn)
      relatedQuestionRefs:
        - RQ606
        - RQ622
    - type: missing-source
      severity: moderate
      topic: Named Customer Proof Table (T603) — incomplete universe of customers with quantified outcomes
      missingEvidence: >-
        Quantified deployment outcomes from Synthesia's customers in financial services, healthcare, pharma, and
        regulated industries; case studies from customers with >$500K ARR; outcomes from Video Agents (Synthesia 3.0)
        early adopters
      whyItMatters: >-
        The 6 named case studies in T603 represent a sample of 65,000+ customers and are concentrated in non-regulated
        industries; this limits the ability to extrapolate outcomes to the full customer base, particularly for
        regulated verticals where proof is most valuable for procurement decisions
      diligencePath: >-
        Request permission-to-reference customer letters from 5–10 key accounts; ask for anonymized case study outcomes
        in financial services and healthcare; request references from Fortune 100 customers willing to discuss
        deployment outcomes under NDA
      relatedQuestionRefs:
        - RQ610
      relatedTableRefs:
        - T603
    - type: missing-source
      severity: moderate
      topic: EdTech and education sector customer deployments — evidence for HolonIQ classification
      missingEvidence: >-
        Named education institution or EdTech company customers; deployment outcomes in formal learning contexts
        (university LMS, K-12 training, certification providers); any higher education or corporate education vendor
        partnerships
      whyItMatters: >-
        HolonIQ added Synthesia to its EdTech unicorn list in December 2025 at $4.0B, implying significant EdTech
        relevance; but public case studies are exclusively corporate enterprise, not education institutions — creating a
        potential classification discrepancy that should be explained
      diligencePath: >-
        Ask Synthesia for education vertical customer list and ARR contribution; identify whether any LMS integration
        partners serve primarily education; review Synthesia case study library for any higher education examples
      relatedQuestionRefs:
        - RQ616
    - type: private-evidence-only
      severity: moderate
      topic: Individual customer ARR contribution and concentration analysis
      missingEvidence: >-
        Revenue contribution of top 10 customers as a percentage of total ARR; average ACV by customer tier; number of
        customers above $100K ARR; customer lifetime value by segment
      whyItMatters: >-
        Standard venture diligence requires understanding whether ARR is distributed or concentrated; a scenario where
        5–10 Fortune 100 accounts represent 30–40% of ARR creates meaningful customer concentration risk that a
        high-level 65,000-customer metric obscures
      diligencePath: >-
        Request ARR waterfall by customer size band; request list of top-20 customers by ARR (anonymized) with tenure
        and ARR; ask for percentage of ARR from customers with >3-year relationship
      relatedQuestionRefs:
        - RQ620
    - type: missing-source
      severity: moderate
      topic: Customer count definition — net vs. gross and SMB churn rate
      missingEvidence: >-
        Whether Synthesia's 65,000-customer figure is net of churned accounts or cumulative gross; SMB 30-day trial
        cancellation rate; definition of 'customer' (paid account vs. free trial vs. enterprise contract)
      whyItMatters: >-
        A gross customer count that includes trial accounts and churned SMB accounts would overstate the health of the
        customer base; clarifying the definition is essential for assessing the quality of the 65,000 number
      diligencePath: >-
        Request the definition of 'customer' used in the 65,000 figure; request monthly paid customer count net of churn
        for last 12 months; request SMB trial-to-paid conversion rate
      relatedQuestionRefs:
        - RQ617
