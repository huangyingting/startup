callouts:
  - id: CA601
    title: Strength — 70%+ Fortune 100 Penetration Is a High-Quality Customer Validation Signal
    calloutType: strength
    body: >
      Synthesia's claim that 70%+ of Fortune 100 companies are customers — if accurate — implies that the world's most
      security-conscious, compliance-heavy, and vendor-scrutinizing organizations have completed vendor security
      assessments, approved Synthesia for enterprise procurement, and deployed the platform in production. This is a
      powerful enterprise reference signal: Fortune 100 procurement approval cycles typically take 6–18 months and
      require SOC 2 Type II and contract review. The installed base of Fortune 100 logos also increases the political
      risk for competitors trying to displace Synthesia in any given account.
    claimRefs:
      - C177
      - C178
  - id: CA602
    title: Strength — NRR of 142% (Late 2025) Implies Strong Land-and-Expand Execution
    calloutType: strength
    body: >
      An NRR of 142% (if the Sacra estimate is correct and is measuring trailing 12-month cohort expansion net of churn)
      would place Synthesia at the top decile of enterprise SaaS companies globally — above the long-run NRR of leading
      expansion-driven SaaS businesses like Snowflake or Datadog at comparable ARR scale. The 40% translation rate
      provides a concrete product-led expansion trigger that can be observed in usage data. This NRR level, if
      sustained, supports the valuation premium implied by Synthesia's $4.0B Series E valuation.
    claimRefs:
      - C192
      - C193
  - id: CA603
    title: Risk — No Independent Audit of Case Study Outcomes; GRR Not Disclosed
    calloutType: risk
    body: >
      Every quantified outcome claim in Synthesia's case study portfolio (Spirit Airlines 76% inquiry reduction, DuPont
      $10K/video savings, Orange 9x retention) is self-reported by the customer via Synthesia's marketing-driven case
      study program. No third-party audit of these claims has been identified. Additionally, the absence of Gross
      Revenue Retention (GRR) disclosure means that it is impossible to determine whether the high NRR reflects genuine
      base retention + expansion or a pattern of high logo churn in SMB accounts masked by large enterprise expansion —
      a structurally different and lower-quality business performance.
    claimRefs:
      - C194
      - C196
