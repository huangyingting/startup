chapter:
  number: 6
  title: Customers
sections:
  - id: SEC601
    title: Customer Base Segmentation
    body: >
      Synthesia serves a customer base of 65,000+ businesses as of 2025, spanning large enterprise, mid-market, and SMB
      segments, with an enterprise-heavy revenue mix of approximately 70% enterprise and 30% SMB/self-serve (consistent
      with the company's stated prioritization of enterprise sales post-Series C). By industry vertical, the dominant
      use cases are concentrated in Learning and Development/HR (estimated ~55% of deployments), Internal Communications
      (~20%), Sales Enablement (~15%), and Customer Support/Other (~10%). Geographically, Synthesia's customer base
      skews toward North America and Western Europe, reflecting its UK headquarters and US-focused enterprise sales
      investment. The company claims that 70%+ of the Fortune 100 are customers — the highest-prestige concentration
      metric in the company's public narrative. The 65,000-customer figure conflates enterprise contract holders with
      SMB/freemium accounts; the proportion of enterprise versus SMB accounts by count is not publicly disclosed.
      Revenue is disproportionately enterprise: the top customer cohort (enterprise accounts with annual spend above
      $50K) likely represents well over 70% of ARR despite being a small fraction of total account count.
    tableRefs:
      - T601
    figureRefs:
      - F601
  - id: SEC602
    title: Customer Growth and Adoption Trajectory
    body: >
      Synthesia's customer count grew from an estimated sub-10,000 businesses at Series C (June 2023) to 65,000+ by late
      2025 — approximately 7x growth in account count over roughly 30 months. ARR growth tracks similarly: from $43M
      (2023) to $146M (September 2025 estimate), a 3.4x increase in revenue over the same period, implying that revenue
      per account roughly halved as the customer mix expanded into smaller accounts. Enterprise adoption is the more
      economically significant vector: 70%+ Fortune 100 penetration is a high-quality indicator of enterprise
      willingness to deploy at scale. A key adoption driver is the "land and expand" motion: enterprises typically begin
      with a pilot (one team, one use case) and expand to additional departments, languages, and use cases as the
      content library scales. The approximately 40% of Synthesia videos that are translated (cross-sell trigger for the
      Translation/Dubbing module) supports this expansion narrative. HolonIQ added Synthesia to its EdTech unicorn list
      in December 2025 at a $4.0B valuation, reflecting recognition of Synthesia's growing relevance in enterprise
      learning and training authoring specifically — a validation of customer adoption quality in the education and
      workforce training sector.
    tableRefs:
      - T602
    figureRefs:
      - F602
  - id: SEC603
    title: Named Customer Proof
    body: >
      Synthesia's public case study library includes named enterprise customers spanning FMCG (Heineken),
      chemicals/science (DuPont), aviation (Spirit Airlines), technology (Zoom), telecom (Orange), and
      manufacturing/appliances (BSH). Each case study documents production deployments (not pilots) with quantified
      outcomes. The strongest case studies by outcome quality are Spirit Airlines (76% reduction in employee support
      inquiries), DuPont ($10,000+ saved per video, 80% faster production), and Orange (9x knowledge retention
      improvement). These outcomes are company-cited figures, not independently audited, and should be treated as
      directionally indicative rather than precisely verified. The breadth of industries in the named case study set —
      spanning FMCG, chemicals, aviation, telecom, manufacturing, and technology — is a positive indicator of horizontal
      applicability. No financial services or healthcare named case studies with quantified outcomes were identified in
      public sources as of the research date, which is notable given Synthesia's claimed Fortune 100 penetration and may
      reflect NDA preferences in regulated industries.
    tableRefs:
      - T603
    figureRefs:
      - F603
  - id: SEC604
    title: Retention, Satisfaction, and Renewal Evidence
    body: >
      The most reliable publicly available retention metric for Synthesia is Net Revenue Retention (NRR), reported by
      Sacra at 119% for 2024 rising to 142% by late 2025. A 142% NRR implies that the expansion revenue from existing
      customers more than offsets any churn and downgrades — consistent with a strong land-and-expand motion. Gross
      retention rate (GRR, measuring base retention before expansion) is not publicly disclosed; without GRR, it is not
      possible to distinguish between a scenario where high NRR masks meaningful logo churn offset by large expansions
      versus a scenario of both strong retention and expansion. Product satisfaction scores are consistently positive:
      Synthesia holds a 4.6/5 rating on Capterra (313 verified reviews as of March 2026) and 4.7/5 on G2. Noted friction
      points in reviews include strict avatar creation policies (the consent framework experienced as a limitation) and
      occasional support workflow delays. Synthesia partnered with ChurnZero (a customer success platform) in early 2025
      to deploy AI-personalized video for customer onboarding and engagement — a self-referential use of their own
      product for customer success, indicating meaningful engagement with retention programs.
    tableRefs:
      - T604
    figureRefs:
      - F604
  - id: SEC605
    title: Expansion and Concentration Risk
    body: >
      Synthesia's expansion mechanism is well-evidenced: customers who begin with a single team and use case expand
      across departments (HR → Legal → Product), geographies (English → multilingual translation add-on), and video
      types (static training → Video Agents) — each expansion trigger generating incremental ARR and increasing
      switching costs by deepening the content library and avatar investment. The 40% translation rate confirms
      meaningful cross-language deployment beyond English. Customer concentration risk is a moderate concern: the
      top-line claim of 65,000 customers masks the reality that a small number of large enterprise accounts (likely
      Fortune 100 relationships) likely contribute a disproportionate share of ARR. If even 10–15 large enterprise
      accounts represent 25–30% of ARR (typical for enterprise SaaS at this scale), loss of a few key accounts could
      materially affect revenue. Channel and partner dependence is low: Synthesia appears to operate primarily through
      direct enterprise sales and self-serve web acquisition, with limited disclosed partner-channel revenue. The
      HolonIQ EdTech recognition (December 2025, $4.0B valuation) adds channel awareness in the education sector, but
      partner-sold enterprise EdTech volume is not quantified in public sources.
    tableRefs:
      - T605
    figureRefs: []
    calloutRefs:
      - CA601
      - CA602
      - CA603
  - id: SEC606
    title: Adverse Customer Evidence and Risks
    body: >
      Several adverse signals warrant diligence attention. First, the 65,000 customer figure includes a substantial
      SMB/freemium cohort whose churn behavior differs materially from enterprise accounts; without segmented churn
      data, the overall NRR metric may obscure meaningful SMB logo churn offset by enterprise expansion. Second, named
      case study outcomes (Spirit Airlines, DuPont, Orange) are all self-reported by the companies, originated from
      Synthesia's customer marketing operation, and not independently verified by third-party auditors — a standard
      limitation for customer proof claims that diligence should acknowledge. Third, Capterra reviews note friction with
      Synthesia's avatar creation consent policies, which some customers experience as an obstacle to rapid self-serve
      deployment — potentially contributing to SMB churn at the lower end of the customer base. Fourth, the absence of
      named financial services or healthcare case studies with quantified outcomes may indicate that regulated
      industries are in early or pilot stages rather than full production deployment at scale — a gap relevant to
      assessing penetration of the highest-value enterprise verticals.
    tableRefs: []
    figureRefs: []
