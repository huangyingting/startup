  evidenceGaps:
    - type: missing-source
      severity: moderate
      topic: Video Agents enterprise scalability — concurrent session capacity and SLA
      missingEvidence: >-
        Published SLA for Video Agents concurrent session handling; maximum concurrent interactive sessions before
        performance degradation; latency benchmarks for interactive avatar responses
      whyItMatters: >-
        Video Agents is positioned as a major new product category (HR screening, training simulation); without
        scalability data, enterprise buyers cannot assess whether it can replace structured processes at the scale of
        Fortune 100 HR or compliance teams
      diligencePath: >-
        Request Video Agents technical architecture documentation; ask for pilot customer case study at scale; request
        concurrent session capacity and SLA terms from Synthesia product team
      relatedQuestionRefs:
        - RQ522
    - type: missing-source
      severity: material
      topic: Third-party TTS vendor identity and contract structure
      missingEvidence: >-
        Identity of third-party TTS vendors used for Synthesia's 140+ language voice synthesis; contract duration;
        exclusivity terms; contingency plan if a key vendor exits a language or changes API terms
      whyItMatters: >-
        If Synthesia's multilingual advantage depends on a single TTS provider for a significant number of languages, a
        vendor change could disrupt a core product feature without customer-visible warning — a supply chain opacity
        risk
      diligencePath: >-
        Request vendor list from Synthesia CTO; review API provider agreements for key languages; ask whether any single
        TTS vendor covers more than 20% of supported languages
      relatedQuestionRefs:
        - RQ512
    - type: missing-source
      severity: moderate
      topic: Express-2 model — independent benchmark for avatar realism and output quality
      missingEvidence: >-
        Published independent technical benchmark comparing Express-2 avatar output quality to HeyGen, Deepbrain AI, and
        open-source alternatives on standardized tasks (lip-sync accuracy, gesture naturalness, expression fidelity)
      whyItMatters: >-
        Without an independent benchmark, Synthesia's claim to be the market leader in avatar realism is based solely on
        vendor-authored or user-subjective reviews; an independent evaluation would validate or challenge this
        differentiation claim
      diligencePath: >-
        Commission an independent technical evaluation comparing Express-2 output quality to HeyGen and Deepbrain AI
        across standardized language and content scenarios
      relatedQuestionRefs:
        - RQ524
    - type: conflicting-data
      severity: moderate
      topic: Prompt-to-avatar roadmap (2026) versus avatar consent framework moat
      missingEvidence: >-
        Whether Synthesia's planned prompt-to-avatar capability (avatar creation from text prompt without in-person
        recording) will require the same consent framework as current custom avatars, or whether it creates a
        non-consent pathway for avatar generation
      whyItMatters: >-
        If prompt-to-avatar bypasses in-person consent recording, it eliminates the custom avatar lock-in moat and may
        create new EU AI Act compliance concerns about AI-generated synthetic likenesses
      diligencePath: >-
        Request clarification from Synthesia product team on whether prompt-to-avatar requires human subject consent;
        review planned data governance documentation for this feature
      relatedQuestionRefs:
        - RQ521
