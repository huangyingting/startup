  title: Product & Technology
sections:
  - id: SEC501
    title: Product Definition and Module Map
    body: >
      Synthesia delivers a cloud-native AI video authoring platform that converts text scripts, uploaded documents (PDF,
      PowerPoint, DOCX), and existing video content into polished presenter-led videos using AI avatars, without
      cameras, studios, or actors. The platform is modular: the core Video Studio module handles text-to-video authoring
      via a browser UI; the API/programmatic module enables developers and enterprise IT teams to automate video
      creation at scale via REST API; the Translation and Dubbing module handles multilingual content generation with
      lip-synced avatar localization in 140+ languages; the Custom Avatar module creates branded AI presenter avatars
      via in-person studio recording; the SCORM/LMS export module packages video content for direct delivery into any
      SCORM-compliant learning management system; and the Video Agents module (Synthesia 3.0, October 2025) enables
      real-time interactive AI avatar conversations. The Synthesia 2.0 platform (June 2024) introduced full-body avatars
      and the Express-1 AI model; Synthesia 3.0 (October 2025) introduced the Express-2 model and interactive Video
      Agents — representing two significant generational leaps in product capability within a 16-month period.
    tableRefs:
      - T501
      - T502
    figureRefs:
      - F501
  - id: SEC502
    title: Technology Architecture and Operating Model
    body: >
      Synthesia's technical architecture is cloud-native on AWS with segregated tenant environments, delivering SaaS
      video generation as a fully managed service. The core AI layer consists of Synthesia's proprietary foundation
      models (Express-1 and Express-2), developed by the research team co-founded by Prof. Matthias Niessner and Prof.
      Lourdes Agapito, two academic leaders in neural rendering and 3D computer vision. These models handle avatar
      animation, facial expression synthesis, gesture generation, and lip-sync — the most technically differentiating
      component of the platform. The voice synthesis layer combines Synthesia's proprietary text-to-speech models with
      third-party TTS vendors for language coverage breadth; specific third-party TTS dependency is not publicly
      disclosed. Video rendering occurs on cloud GPU infrastructure (AWS, managed) and is delivered asynchronously: the
      Video API accepts creation requests via REST, triggers asynchronous rendering, and notifies customers via webhook
      on completion. The frontend is a web-based collaborative studio with drag-and-drop editing, brand kit management,
      and real-time commenting. The API is organized into seven modules: Video, Templates, Assets, Webhooks,
      Translations, Dubbing, and Audit Logs.
    tableRefs:
      - T503
    figureRefs:
      - F502
      - F503
  - id: SEC503
    title: Trust, Safety, Security, and Compliance
    body: >
      Synthesia holds the most comprehensive compliance stack in the enterprise AI video sector as of 2025. SOC 2 Type
      II certification has been in place since 2022, covering security, availability, processing integrity,
      confidentiality, and privacy controls, with ongoing annual third-party audits. ISO/IEC 27001:2022 (Information
      Security Management System) and ISO/IEC 27701:2019 (Privacy Information Management System) cover access control,
      encryption, incident response, and cross-border data transfer governance. Most distinctively, Synthesia was the
      first AI video platform to receive ISO/IEC 42001:2023 (AI Management System) certification, issued by A-LIGN in
      September 2024 — addressing AI transparency, fairness, and EU AI Act compliance. Data governance follows the "3Cs"
      framework (Consent, Control, Collaboration): custom avatars require explicit documented consent from the
      individual; customer data is never used to train Synthesia's models without explicit authorization; and all
      content undergoes automated and human moderation. Synthesia is a member of the Content Authenticity Initiative and
      Partnership on AI. The Trust Center (security.synthesia.io) provides real-time security posture, certificates, and
      penetration test reports.
    tableRefs:
      - T504
    figureRefs: []
    calloutRefs:
      - CA501
  - id: SEC504
    title: Deployment, Integration, and Developer Experience
    body: >
      Synthesia supports three deployment modalities: web browser (browser-based Studio for most users), REST API
      (programmatic video creation for enterprise IT and developer teams), and LMS/SCORM integration (direct content
      delivery into learning management systems without manual file transfer). The API is RESTful with asynchronous
      video generation: requests are submitted, processing occurs on cloud GPU infrastructure, and completed videos are
      accessible via webhook notification and download URL. The API supports OpenAPI/Swagger specifications, Postman
      collections, and webhook-based event handling. SCORM export generates SCORM 1.2 and xAPI (Tin Can API) compliant
      packages for upload to Cornerstone OnDemand, SAP SuccessFactors, Moodle, Docebo, and other LMS platforms. Single
      Sign-On (SSO) is available via SAML 2.0 for enterprise identity providers. Uptime and SLA data are managed via the
      Trust Center and are not publicly disclosed at specific percentages; Synthesia operates standard SaaS reliability
      commitments for enterprise accounts.
    tableRefs: []
    figureRefs: []
  - id: SEC505
    title: Product Roadmap and Development Stage
    body: >
      Synthesia's public product roadmap through 2025 demonstrates a shift from static avatar video toward interactive,
      agentic video experiences. The Synthesia 2.0 to 3.0 progression (June 2024 to October 2025) represents two major
      generational releases in 16 months: 2.0 introduced full-body avatars and Express-1 (contextually adaptive
      expression); 3.0 introduced Video Agents (real-time conversational AI avatars) and Express-2 (hyper-realistic,
      full-body, any-duration at 1080p/30fps). Video Agents are the most differentiated near-term capability — enabling
      two-way interaction with an AI presenter within a video session, with potential use cases in onboarding, HR
      screening, compliance training assessment, and customer support automation. The Express-2 research team has
      published results via the Synthesia Research GitHub page, indicating a research-first product development model.
      Forthcoming capabilities indicated in 2025 public communications include advanced prompt-to-avatar customization
      (choose appearance, setting, and wardrobe from a text prompt) and B-roll/stock footage integration with avatar
      overlays in dynamic scenes.
    tableRefs:
      - T505
    figureRefs:
      - F504
    calloutRefs:
      - CA502
      - CA503
  - id: SEC506
    title: Adverse Evidence and Technical Risk
    body: >
      Several technical risks are material. First, Synthesia's core AI advantage — the Express model series — is
      proprietary but not formally patent-protected in all jurisdictions; the underlying neural rendering techniques are
      published in academic literature, making replication feasible for well-funded competitors with sufficient training
      data and compute. Second, voice synthesis breadth (140+ languages) depends partially on third-party TTS providers
      whose specific identity and contract structure are undisclosed; any vendor change or outage creates a delivery
      risk for multilingual content. Third, Synthesia's asynchronous video generation model (not real-time for most
      workloads) limits use cases requiring instantaneous output (e.g., live customer interactions), creating a feature
      gap relative to real-time video AI competitors. Fourth, the 2024 deepfake misuse incident (avatar consent
      framework bypassed for propaganda content) demonstrates that consent-layer technology can be circumvented,
      creating ongoing reputational and regulatory exposure. Fifth, as of late 2025, no published independent technical
      audit of Synthesia's AI model outputs for bias, hallucination risk, or factual accuracy exists; this is a
      compliance gap for regulated industries deploying training video at scale.
    tableRefs: []
    figureRefs: []
