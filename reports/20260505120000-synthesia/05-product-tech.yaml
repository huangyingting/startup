  claims:
    - id: C501
      statement: >-
        Synthesia's core product is a cloud-native AI video authoring platform organized into six modules: Video Studio
        (browser UI), API/Programmatic Video, Translation and Dubbing, Custom Avatar Creation, SCORM/xAPI Export, and
        Video Agents (interactive, launched Oct 2025).
      type: observed
      topic: product module structure
      sourceRefs:
        - S501
        - S505
        - S517
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ501
    - id: C502
      statement: >-
        Synthesia 2.0 (June 2024) introduced full-body avatars, the Express-1 AI model (context-adaptive expression and
        gesture), an AI video assistant for script-to-video automation, interactive video elements, and webcam-based
        personal avatar creation from a brief recording session.
      type: observed
      topic: Synthesia 2.0 release
      sourceRefs:
        - S509
        - S510
        - S511
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ502
    - id: C503
      statement: >-
        The Express-2 model, rolled out to all Synthesia plans in September 2025, delivers hyper-realistic full-body
        avatar video at 1080p/30fps for any video duration, with professional speaker-grade gesture adaptation,
        emotional depth, and enhanced lip-sync quality.
      type: observed
      topic: Express-2 model capabilities
      sourceRefs:
        - S507
        - S514
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ503
    - id: C504
      statement: >-
        Synthesia 3.0, launched October 2025, introduced Video Agents: real-time interactive AI avatar sessions enabling
        two-way conversation during video playback, enabling use cases including HR screening, interactive onboarding,
        and live compliance assessment.
      type: observed
      topic: Synthesia 3.0 Video Agents
      sourceRefs:
        - S501
        - S518
        - S519
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ504
    - id: C505
      statement: >-
        Synthesia's API supports asynchronous video generation organized into seven modules (Video, Templates, Assets,
        Webhooks, Translations, Dubbing, Audit Logs), with REST endpoints, OpenAPI specification, Postman collections,
        and webhook-based completion notification.
      type: observed
      topic: API architecture
      sourceRefs:
        - S505
        - S506
        - S515
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ505
    - id: C506
      statement: >-
        A standard enterprise use case is multilingual compliance training: compliance teams write a script in English,
        Synthesia generates the base video, the AI dubbing and translation module produces lip-synced versions in each
        target language, and the output is packaged as a SCORM bundle for LMS deployment — reducing production time from
        weeks to hours.
      type: observed
      topic: compliance training workflow
      sourceRefs:
        - S517
        - S521
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ506
    - id: C507
      statement: >-
        Synthesia supports programmatic video personalization at scale via API: enterprise systems send customer or
        employee data to the Synthesia API, which generates a unique avatar-narrated video per recipient using template
        logic, triggered via webhook on completion.
      type: observed
      topic: programmatic personalization workflow
      sourceRefs:
        - S505
        - S516
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ507
    - id: C508
      statement: >-
        Custom avatar creation requires an in-person studio recording session; the consenting individual records in
        controlled conditions to produce a photorealistic AI avatar under Synthesia's documented consent framework — the
        resulting avatar is contractually tied to the individual's identity and cannot be transferred across
        organizations.
      type: observed
      topic: custom avatar creation workflow
      sourceRefs:
        - S502
        - S503
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ508
    - id: C509
      statement: >-
        SCORM 1.2 and xAPI (Tin Can API) export is natively supported, enabling direct upload of Synthesia video content
        into any SCORM-compliant LMS including Cornerstone OnDemand, SAP SuccessFactors, Moodle, and Docebo — without
        manual file conversion.
      type: observed
      topic: SCORM/LMS integration
      sourceRefs:
        - S505
        - S503
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ509
    - id: C510
      statement: >-
        Synthesia's core AI foundation models (Express-1 and Express-2) are proprietary, developed internally by
        Synthesia Research under co-founders Prof. Matthias Niessner (TU Munich) and Prof. Lourdes Agapito (UCL), two
        leading academic researchers in neural rendering and 3D computer vision.
      type: observed
      topic: proprietary AI model ownership
      sourceRefs:
        - S514
        - S509
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ510
    - id: C511
      statement: >-
        Synthesia's infrastructure is fully cloud-native on Amazon Web Services (AWS), with segregated multi-tenant
        environments, multi-factor authentication using FIDO2/WebAuthn for internal staff, and regular penetration
        testing and third-party security audits.
      type: observed
      topic: cloud infrastructure
      sourceRefs:
        - S503
        - S504
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ511
    - id: C512
      statement: >-
        Voice synthesis (covering 140+ languages) is a combination of Synthesia's proprietary text-to-speech models and
        undisclosed third-party TTS vendors; the specific identity and contract terms of third-party TTS providers are
        not publicly disclosed.
      type: observed
      topic: TTS dependency
      sourceRefs:
        - S505
        - S517
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ512
    - id: C513
      statement: >-
        Synthesia's REST API operates asynchronously for standard video generation: requests are submitted, video is
        rendered on cloud GPU infrastructure (typically minutes per video), and customers are notified via webhook on
        completion — not suitable for synchronous real-time video generation at arbitrary resolution and length.
      type: observed
      topic: API latency model
      sourceRefs:
        - S505
