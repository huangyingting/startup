callouts:
  - id: CA501
    title: Strength — ISO 42001 (World First) Is a Genuine Procurement Moat
    calloutType: strength
    body: >
      Synthesia was the first AI video platform globally to receive ISO/IEC 42001:2023 AI Management System
      certification (issued by A-LIGN in September 2024). This certification directly aligns with EU AI Act requirements
      for high-risk AI system governance and is increasingly appearing as a procurement gate in regulated industry RFPs.
      No identified direct competitor holds this certification as of late 2025, making it a temporary but meaningful
      differentiator in regulated enterprise sales cycles.
    claimRefs:
      - C158
      - C156
  - id: CA502
    title: Strength — Proprietary Express-2 Model Creates a Defensible AI Core
    calloutType: strength
    body: >
      Synthesia's Express-2 foundation model is proprietary, developed internally by Synthesia Research (co-founded by
      two academic leaders in neural rendering), and published in peer-reviewed venues — indicating research depth that
      goes beyond vendor integration. The model's ability to produce 1080p/30fps full-body avatar video of any duration
      with context-adaptive expression and lip-sync quality surpassing publicly available alternatives represents a
      genuine technical lead over competitors who rely on third-party model providers.
    claimRefs:
      - C150
      - C161
      - C162
  - id: CA503
    title: Risk — Third-Party TTS Dependency and Non-Real-Time Architecture Limit Use Cases
    calloutType: risk
    body: >
      Two technical risks limit Synthesia's addressable product scope. First, voice synthesis breadth (140+ languages)
      depends partially on undisclosed third-party TTS vendors; a vendor change or API deprecation could disrupt
      multilingual delivery without customer-visible warning. Second, Synthesia's asynchronous video generation model
      (typically minutes of latency) is not suitable for real-time interactive video sessions beyond the constrained
      Video Agents use case — a gap that prevents Synthesia from competing for live customer service or real-time
      personalization at scale.
    claimRefs:
      - C152
      - C170
      - C171
