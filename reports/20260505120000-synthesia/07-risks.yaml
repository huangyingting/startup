    title: Risk — EU AI Act Enforcement Creates Time-Bound Compliance Obligation for Synthesia
    calloutType: risk
    body: >
      The EU AI Act Article 50 deepfake labeling requirement took effect August 2, 2025 and applies directly to
      Synthesia as a provider of AI-generated video content resembling real persons. Non-compliance penalties reach €35M
      or 7% of global annual turnover. At $146M ARR (~€135M), 7% would be ~€9.4M — material but not existential. The
      more serious risk is enterprise customer concern: if EU procurement officers determine that customer-deployed
      Synthesia videos are out of compliance with EU AI Act transparency requirements, procurement freezes in EU markets
      could follow. Synthesia's ISO 42001 certification provides a strong compliance signal, but the specific technical
      watermarking implementation has not been independently audited at the time of research.
    claimRefs:
      - C211
      - C212
      - C242
  - id: CA702
    title: Risk — Competitive Displacement by Microsoft/Google AI Video Bundle Is the Highest-Severity Long-Term Threat
    calloutType: risk
    body: >
      Synthesia's deepest structural risk is not regulatory but competitive: Microsoft's ability to embed AI video
      generation (via Sora or a successor model) into M365 Copilot for the 345 million enterprise M365 users — at no
      incremental per-seat cost — would reframe Synthesia from a strategic enterprise investment to a redundant
      standalone tool for the majority of the market. This threat is not imminent (Microsoft has not yet shipped a
      comparable AI avatar enterprise video product as of late 2025), but the plausibility and timing are within a 12–24
      month product cycle. It represents the single scenario most likely to cause a valuation multiple compression and
      IPO delay for Synthesia.
    claimRefs:
      - C246
      - C247
  - id: CA703
    title: Risk — Deepfake Propaganda Incident History Creates Recurring Reputational Exposure
    calloutType: risk
    body: >
      The 2024 incident where Synthesia avatars were used in propaganda videos for authoritarian regimes (Burkina Faso,
      Venezuela) demonstrated that the consent framework can be bypassed through misrepresentation of intended use. A
      recurrence of this incident — particularly at scale or with higher-profile individuals — would create: (1)
      headline risk coincident with fundraising or IPO; (2) potential class action exposure from affected talent; (3)
      regulatory scrutiny from the ICO (UK) or EU data protection authorities. Synthesia has pledged process
      improvements, but no third-party audit of the post-incident remediation has been published.
    claimRefs:
      - C243
      - C244
      - C245
