  claims:
    - id: C701
      statement: >-
        The EU AI Act Article 50 (effective August 2, 2025) requires providers of AI systems generating synthetic media
        resembling real persons to mark outputs in machine-readable format as AI-generated; non-compliance penalties
        reach €35M or 7% of global annual turnover, whichever is higher.
      type: observed
      topic: EU AI Act Article 50 obligations
      sourceRefs:
        - S701
        - S709
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ701
    - id: C702
      statement: >-
        Synthesia's Video Agents product — enabling AI avatars to conduct real-time interviews and assessments — may be
        classified as a high-risk AI system under EU AI Act Annex III (employment/HR screening), triggering conformity
        assessment, technical documentation, and transparency disclosure obligations beyond Article 50.
      type: inferred
      topic: EU AI Act high-risk classification for Video Agents
      sourceRefs:
        - S701
        - S711
      confidence: low
      freshness: current
      answersQuestionRefs:
        - RQ702
    - id: C703
      statement: >-
        Custom avatar creation processes biometric data (facial recordings of real individuals) under GDPR Article 9
        special category data provisions, requiring explicit consent, a lawful processing basis, and data minimization —
        obligations already embedded in Synthesia's consent framework but creating ongoing compliance exposure if
        consent records are challenged.
      type: inferred
      topic: GDPR biometric data exposure
      sourceRefs:
        - S704
        - S703
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ703
    - id: C704
      statement: >-
        As of early 2026, 14+ US states have enacted deepfake-specific legislation, tracked by NCSL; requirements vary
        by state (consent, political disclosure, intimate deepfake prohibition) and collectively create a patchwork
        compliance burden for enterprise customers deploying Synthesia-generated video across US state boundaries.
      type: observed
      topic: US state deepfake legislation
      sourceRefs:
        - S703
        - S704
      confidence: high
      freshness: current
      answersQuestionRefs:
        - RQ704
    - id: C705
      statement: >-
        The proposed US NO FAKES Act, if enacted, would create federal civil liability for creating unauthorized digital
        replicas without documented consent, and could impose retroactive liability for prior-generated avatars whose
        consent scope did not explicitly cover all subsequent uses — a material risk for Synthesia's pre-2025 custom
        avatar library.
      type: inferred
      topic: US NO FAKES Act risk
      sourceRefs:
        - S705
        - S708
      confidence: low
      freshness: current
      answersQuestionRefs:
        - RQ705
    - id: C706
      statement: >-
        The US TAKE IT DOWN Act (signed 2025) requires platforms to remove nonconsensual intimate deepfakes; while
        Synthesia is primarily an enterprise platform, its API accessibility means synthetic intimate content creation
        attempts cannot be fully excluded, requiring active content moderation and API monitoring.
      type: observed
      topic: TAKE IT DOWN Act
      sourceRefs:
        - S707
        - S705
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ706
    - id: C707
      statement: >-
        The UK Criminal Justice Bill (2024) criminalized creation of intimate deepfakes; Synthesia's UK headquarters
        places it under UK legal jurisdiction at highest priority, requiring robust content governance controls for all
        UK-origin video generation involving representations of real individuals.
      type: observed
      topic: UK Criminal Justice Bill deepfake provision
      sourceRefs:
        - S709
        - S712
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ707
    - id: C708
      statement: >-
        Synthesia's entire video generation, rendering, and delivery pipeline runs on AWS; a sustained AWS regional
        outage would cause a full service disruption with no publicly documented multi-cloud failover strategy —
        representing a standard but material single-vendor infrastructure dependency.
      type: observed
      topic: AWS single-cloud operational dependency
      sourceRefs:
        - S717
        - S725
      confidence: medium
      freshness: current
      answersQuestionRefs:
        - RQ708
    - id: C709
      statement: >-
        AI model quality regression — a risk unique to AI-dependent SaaS — could manifest if Express-2 model retraining
        or inference infrastructure changes cause observable degradation in avatar realism, lip-sync accuracy, or
        expression quality; such degradation would be immediately visible to enterprise customers reviewing produced
        video content.
      type: inferred
      topic: AI model quality regression risk
      sourceRefs:
