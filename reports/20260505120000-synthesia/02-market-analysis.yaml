  - id: s3
    title: Buyer and Segment Landscape
    body: |
      Synthesia's primary buyers are enterprise L&D (Learning and Development) teams,
      followed by HR, internal communications, and marketing functions within large
      corporations. The typical buyer is an L&D or HR manager at a company with 500+
      employees, with an IT or procurement sign-off required for enterprise tiers. Budget
      ownership sits in HR/L&D cost centres, which have historically allocated 3–5 % of
      total payroll to training spend. The payer is almost always a corporate department
      or business unit — not the end learner.

      Key segments by function: (1) Corporate training and compliance — the largest and
      most predictable segment; driven by regulatory mandates (data privacy, health and
      safety, anti-bribery) that require annual recertification. (2) Employee onboarding —
      a high-frequency use case triggered by hiring cycles; video onboarding reduces
      time-to-productivity and cost per hire. (3) Product and process training — scaling
      knowledge of complex products across distributed sales and support teams. (4) Internal
      communications and executive messaging — COO/CEO communication at scale, especially
      for multilingual global workforces. (5) Customer and partner education — a growing
      segment where customers view Synthesia video as an equivalent to a human presenter.

      Synthesia's reported 70 %+ Fortune 100 penetration signals that the top end of the
      enterprise segment is substantially captured. Future unit economics depend on (a)
      expansion of average contract value within existing large accounts, and (b) expansion
      into mid-market (500–10,000 employees) where brand-recognition is lower and
      Articulate Storyline / Adobe Captivate / Canva compete on price-sensitivity.
