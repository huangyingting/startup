  - id: s4
    title: Growth Drivers and Adoption Constraints
    body: |
      Primary growth drivers include: (1) AI-driven content-cost deflation — Synthesia
      reduces video production time by up to 90 %, converting historically capex-heavy
      production into opex SaaS spend, a structural shift that expands the total buyer
      pool. (2) Multilingual/global workforce demand — enterprises expanding to Asia, LATAM,
      and EMEA require localised video at a scale impossible for traditional production;
      Synthesia's 140+ language support is a structural advantage. (3) Generative AI
      platform maturation — as avatar quality improves and enterprise AI spending grows
      (73 % of global organisations using AI in 2025), buyers are more willing to deploy
      AI video for compliance and public-facing training. (4) Fortune 100 social proof —
      once 70 %+ of the top 100 use a product, the barrier for peer enterprises drops
      substantially. (5) Adobe Ventures and Google Ventures endorsement signals
      ecosystem integration potential that accelerates enterprise procurement decisions.

      Key constraints and headwinds: (1) Avatar-realism ceiling — synthetic avatars
      are widely accepted for internal training but face resistance in customer-facing
      contexts (sales demos, customer success calls) where human warmth matters. This
      limits Synthesia's TAM expansion beyond internal use cases. (2) Deepfake/ethical
      trust deficit — the 2024 propaganda controversy (see Chapter 1) created a residual
      trust tax, particularly with regulated industries (financial services, pharma) and
      public-sector buyers who face procurement scrutiny. (3) EU AI Act and UK AI regulation
      — evolving legislation may impose mandatory disclosures, watermarking, or consent
      requirements on synthetic-media platforms, increasing compliance costs and slowing
      enterprise procurement. (4) LMS integration complexity — most enterprise L&D budgets
      are tied to LMS platforms (Workday Learning, SAP SuccessFactors, Cornerstone);
      Synthesia must integrate cleanly or risk displacement when these platforms add native
      AI video. (5) Competitive commoditisation — open-source models (Stable Video Diffusion,
      RunwayML) and lower-cost competitors (HeyGen, D-ID) are rapidly narrowing the quality
      gap, threatening Synthesia's premium pricing. (6) Engagement-ROI measurement gap —
      enterprises struggle to demonstrate measurable learning outcomes from AI video,
      creating friction in budget renewal cycles.
