summary:
  headline: >-
    Orca Security 是无代理 CNAPP 的先行者，但 Wiz 正把竞争压力推到生死线；Wiz 估计 ARR 领先 3 倍、双方 IP 诉讼仍在进行， 加上 2022 年后网络安全后期融资被持续压价，Orca 的 $1.8B
    Series C 估值有明显减记风险。
