        to precisely calculate SOM and validate the $300–700M heuristic range.
      whyItMatters: >-
        Without confirmed ARR or customer count, the SOM estimate is a low-confidence heuristic that
        cannot be validated against actual market capture; materially affects SOM-based investment judgment
        and relative market share positioning.
      diligencePath: >-
        Request Orca management data package during due diligence including trailing twelve months ARR,
        net revenue retention, customer count by segment and geography, and average contract value.
      relatedQuestionRefs: [QM006, QM008]
      relatedTableRefs: [TM002]
