  - id: FM003
    title: Buyer / segment map
    type: matrix
    layout: wide
    summary: >-
      Matrix mapping the primary CNAPP buyer segments against buyer profile, compliance driver, procurement
      pattern, and Orca product fit. The matrix shows that BFSI and healthcare are the highest-fit segments
      driven by mandatory compliance (PCI-DSS, HIPAA), while technology/SaaS is the highest-growth segment
      driven by DevSecOps adoption. Government/public sector shows high potential but is gated by FedRAMP
      authorization status.
    data:
      columns:
        - "Compliance/Regulation Driver"
        - "Procurement Pattern"
        - "Primary Capability Need"
        - "Orca Fit Assessment"
      rows:
        - label: "BFSI enterprise"
          values:
            - "PCI-DSS v4.0; SOX; GLBA; OFR cloud guidelines; SWIFT CSP"
            - "Annual contract $500K–$2M+; CISO-led; 6–9 month cycle; multi-year preferred"
            - "PCI cardholder data environment scanning; DSPM; CIEM; compliance reporting automation"
            - "Very high — Paidy (fintech) documented case study; PCI-DSS and DSPM align directly; largest CNAPP vertical (21%+)"
        - label: "Healthcare / life sciences"
