  - id: section-2
    title: TAM, SAM, and SOM sizing with multiple analytical lenses
    body: >
      The global CNAPP market was estimated at $9.79 billion in 2023 and is projected to reach $38.01
      billion by 2030, representing a CAGR of 21.8% from 2024 to 2030 (Grand View Research). The
      broader cloud security market stood at $35.84 billion in 2024 and is forecast to reach $75.26
      billion by 2030 at a 13.3% CAGR. The higher CNAPP growth rate reflects platform consolidation
      dynamics: integrated CNAPP platforms are displacing fragmented point solutions, gaining share
      within the broader cloud security TAM. Multiple analyst firms confirm this trajectory — Gartner's
      2024 Magic Quadrant for CNAPP provides vendor-positioning insight, while its proprietary market
      sizing data and those of IDC and Forrester are available only through paid subscriptions. Grand
      View Research's publicly accessible summary data and secondary coverage from media suggest IDC
      and Forrester estimates for the near-term CNAPP market range of $10–15 billion are broadly
      consistent with GVR's trajectory but carry ±20% estimation uncertainty at the 5–7 year horizon.


      Orca Security's Serviceable Addressable Market (SAM) represents the enterprise and upper
      mid-market slice of the CNAPP TAM. Grand View Research data confirms that large enterprises
      account for 58%+ of CNAPP market revenue; applying this share to the 2023 CNAPP TAM yields an
      estimated SAM of approximately $5.7 billion in 2023, growing at the CNAPP CAGR to an estimated
      $22+ billion by 2030. North American organizations represent approximately 39% of CNAPP spend,
      with the U.S. sub-market growing at a 20.5% CAGR, reinforcing the enterprise North America
      go-to-market focus. The BFSI sector alone accounts for 21%+ of CNAPP market revenue (Grand View
      Research), making financial services the single largest demand vertical and a natural ICP anchor.


      Orca's Serviceable Obtainable Market (SOM) — the near-term capturable share — is not derivable
      from public data because Orca does not disclose ARR, customer count, or win-rate metrics.
      A heuristic range of $300–700 million in near-term ARR is framed by Orca's $1.8 billion Series C
      valuation (2022) and Gartner Magic Quadrant Leader status (2024), though this estimate carries
      low confidence absent disclosed financials. The failed sizing path is preserved: direct SOM
      quantification requires Orca ARR data, which is a blocking diligence item for any valuation-
      sensitive analysis. Contradictory signals from Wiz's aggressive fundraising ($12B valuation,
      $1B funding in 2024) suggest Orca may be losing pipeline to a better-funded competitor,
      which could compress the near-term SOM toward the lower end of the heuristic range.
