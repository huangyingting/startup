  - id: section-5
    title: Market maturity, adoption lifecycle, and CNAPP evolution
    body: >
      The CNAPP market is in the early-growth phase of adoption, approximately two to three years past
      the initial category definition and moving toward mainstream enterprise procurement. Gartner's
      2024 Magic Quadrant for Cloud-Native Application Protection Platforms, in which Orca was named
      a Leader, represents the analyst community's institutionalization of the category — a milestone
      that typically precedes large-scale enterprise RFP inclusion and security budget standardization.
      The platform segment accounts for 60%+ of CNAPP market revenue, growing faster than the
      managed services segment (14.7% CAGR), confirming buyer preference for platform ownership.
      This pattern mirrors the historical trajectories of SIEM and EDR: both categories consolidated
      into platform vendors before further integration into security suites, suggesting CNAPP will
      follow the same arc.


      AI Security Posture Management (AI SPM) is the category's next expansion wave. Orca's AI SPM
      module positions the platform at the leading edge of securing AI workloads and model
      infrastructure, an incremental TAM expansion that could add 10–20% to the addressable market
      as AI infrastructure proliferates across enterprises. Cloud Security Alliance blog coverage as
      of May 2026 confirms that AI agent security, multi-cloud visibility, and DevSecOps integration
      remain active practitioner discourse themes, indicating a market not yet at the commoditization
      phase. TechCrunch cloud security coverage reflects continued venture and M&A activity in the
      category. The adoption funnel begins with a CISO identifying a cloud security gap, proceeds
      through Gartner MQ shortlisting and proof-of-concept evaluation, and terminates in multi-year
      enterprise contracts with expansion driven by new modules and accounts.
