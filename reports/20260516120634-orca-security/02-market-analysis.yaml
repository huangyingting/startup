        - "Ongoing; Wiz $12B valuation (2024) signals sustained investment"
        - "Wiz can outspend Orca on go-to-market and product investment; active lawsuit (2023) creates legal overhead and potential discovery risk"
        - "Track Wiz and Orca G2 and Gartner Peer Insights rating trajectories; assess Orca lawsuit status and settlement likelihood"
      - - "Enterprise budget rationalization and vendor consolidation"
        - Constraint
        - "Cyclical; elevated 2024–2025; recurring in economic slowdowns"
        - "CISOs consolidating to fewer vendors favor platform vendors with broader coverage over pure-play CNAPP; may compress renewal rates"
        - "Monitor Orca net revenue retention; assess whether Orca positions itself as a platform consolidator or best-of-breed point solution"
      - - "CSPM commoditization as hyperscalers expand native capabilities"
        - Constraint
        - "Medium-term structural (2025–2030)"
        - "If CSPM is perceived as commodity, Orca's premium pricing requires stronger differentiation on CIEM, DSPM, AI SPM, and attack-path intelligence"
