      whyItMatters: >-
        Without vendor-level market share data, the segment buyer map cannot quantify Orca's position
        relative to competitors; BFSI and healthcare segment fit assessments are qualitative only.
      diligencePath: >-
        Request Orca win/loss analysis and customer count by vertical in due diligence; triangulate
        against Gartner Peer Insights rating trajectories and G2 review volume.
      relatedQuestionRefs: [QM025, QM029]
      relatedTableRefs: [TM003]
    - type: enumeration-incomplete
      severity: minor
      topic: global regulatory landscape completeness
      missingEvidence: >-
        Comprehensive mapping of industry-specific and country-specific cloud security regulations beyond
        the frameworks referenced in the chapter (e.g., DORA for EU financial institutions, SOX cloud
        workload requirements, APRA CPS 234 in Australia, Saudi Arabia NCA, UAE IA regulations,
        sector-specific EU frameworks for critical infrastructure).
      whyItMatters: >-
        The chapter covers the highest-impact regulatory frameworks but is not exhaustive; Orca's actual
        compliance addressability depends on the specific industries and geographies of its enterprise
        customer base and competitive footprint.
      diligencePath: >-
        Review Orca's compliance pack documentation for the full list of supported frameworks; commission
        a regulatory landscape mapping from a cybersecurity compliance specialist for key expansion geographies.
      relatedTableRefs: [TM004]

