figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Pyramid chart showing the nested sizing lenses from the broader cloud security TAM down to Orca's
      estimated Serviceable Obtainable Market (SOM). The pyramid illustrates how the $35.84B cloud security
      overall TAM contains the $9.79B CNAPP segment, which in turn contains the ~$5.7B enterprise CNAPP SAM,
      narrowing to the $300–700M near-term SOM heuristic for Orca. Each layer reflects publicly available
      analyst data or derived estimates, with confidence decreasing as the layers narrow.
    data:
      items:
        - label: "Cloud Security Overall TAM (2024)"
          detail: "$35.84B → $75.26B (2030); CAGR 13.3%; includes CSPM, CWPP, CASB, IAM, network security; Grand View Research"
          tone: neutral
        - label: "Cloud Security Enterprise TAM (2024E)"
          detail: "~$26.5B; 74%+ of cloud security market is large enterprise spend; Grand View Research"
          tone: neutral
        - label: "CNAPP Segment TAM (2023)"
          detail: "$9.79B → $38.01B (2030); CAGR 21.8%; CNAPP displacing fragmented point solutions; Grand View Research"
          tone: positive
        - label: "CNAPP Enterprise TAM (2023E)"
          detail: "~$5.7B; 58%+ of CNAPP revenue from large enterprise; grows to ~$22B by 2030 at CNAPP CAGR"
          tone: positive
        - label: "CNAPP Enterprise North America (2023E)"
          detail: "~$2.2B; 39%+ of CNAPP is North America; US CAGR 20.5%; primary Orca go-to-market geography"
          tone: positive
        - label: "Orca SAM — High-intent enterprise CNAPP (2023E)"
          detail: "~$2–4B globally; organizations with >$10M cloud spend, 2+ hyperscalers, active CNAPP evaluation"
          tone: positive
        - label: "Orca SOM — Estimated near-term ARR"
          detail: "$300M–$700M heuristic; 5–15% SAM capture; low confidence; Orca ARR not disclosed; blocking diligence gap"
          tone: neutral
    approximationNotes: >-
      All values are analytical estimates derived from Grand View Research published figures or top-down
      derivations from publicly stated enterprise segment shares. Orca SAM and SOM are constructed analytical
      estimates, not published analyst figures. Enterprise share (58%+) applied to CNAPP TAM for SAM; 39%
      North America share applied for North America subset. SOM is a heuristic range based on $1.8B Orca
      valuation (2022) and industry 5–15% SAM-capture benchmarks; Orca ARR is not publicly disclosed.
    claimRefs:
      - CM001
      - CM002
      - CM005
      - CM006
      - CM007

