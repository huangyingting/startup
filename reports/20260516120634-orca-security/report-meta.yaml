companyProfile:
  summary: >-
    Orca Security, Inc. is a Delaware-incorporated company founded in 2019
    by Avi Shua (CEO) and Gil Geshuri (CPO) in Tel Aviv, Israel, now
    headquartered in Portland, Oregon, with additional offices in Tel Aviv
    and London. The company pioneered agentless cloud security via its
    patented SideScanning™ technology, which reads cloud workload block
    storage via read-only cloud-provider APIs without deploying agents or
    network scanners. Its CNAPP platform addresses CSPM, CWPP, CIEM, DSPM,
    Container Security, AI SPM, CDR, API Security, and compliance in a
    Unified Data Model. Orca has raised approximately $630–650M across Seed
    through Series C (October 2022, $340M at $1.8B post-money), backed by
    ICONIQ Growth, GGV Capital, Capital One Ventures, Tiger Global, and
    Salesforce Ventures. An active July 2023 trade-secret lawsuit against
    arch-rival Wiz represents significant legal and reputational risk.
