      - ["Net Revenue Retention (NRR)", "NRR not disclosed; assumed 100–120% from peer benchmarks but unverified", "Determines expansion vs. churn balance; NRR below 100% would dramatically change the bull case", "Request NRR and GRR cohort curves from data room; cross-reference with named account expansions"]
      - ["Cap table and liquidation preference stack", "Preferred share structure, seniority, and total preference overhang not publicly available", "Affects realized exit proceeds at $1.5B base case; heavy preference could impair common equity recovery", "Request full capitalization table, CPAS, and any secondary transaction marks from counsel"]
      - ["Status and exposure of Wiz litigation", "July 2023 lawsuit filed; no public resolution as of May 2026; damages and injunctive relief scope unknown", "IP restrictions or damages could impair SideScanning product and create investor overhang", "Monitor court docket at PACER; request outside counsel litigation assessment and exposure estimate"]
    notes: "Diligence asks represent minimum gating requirements before underwriting a primary investment at the current $1.8B valuation mark. Secondary-market positions should also obtain cap table and litigation data before trading."
    claimRefs: [CV012, CV028, CV033, CV034]

figures:
  - id: FV001
    type: range
    title: "Valuation / Return Range"
    insight: >-
      Orca's three exit scenarios span a $0.9B bear case to a $5B bull case, with the $1.5B–$2.5B
      base-case acquisition range most probable given competitive dynamics and M&A activity in cloud
      security. The current $1.8B mark sits within the base case, implying limited downside protection
      at entry but moderate upside in a strategic sale.
    data:
      items:
        - label: "Bear Case (down-round / stasis)"
          low: 0.9
          mid: 1.2
          high: 1.5
        - label: "Base Case (strategic acquisition)"
          low: 1.5
          mid: 2.0
          high: 2.5
        - label: "Bull Case (IPO / premium acquisition)"
          low: 3.0
          mid: 4.0
          high: 5.0
    approximationNotes: "Ranges in USD billions. Low/high endpoints represent analyst scenario bounds; mid is the probability-weighted midpoint estimate. All values are forward-looking exit scenarios, not current marks."
    claimRefs: [CV024, CV025, CV026]

  - id: FV002
    type: kpi
    title: "Investment KPIs"
    insight: >-
      Six headline investment KPIs confirm Orca's scale as a late-stage venture asset while exposing
      the critical data gap — ARR and revenue multiple remain ranges rather than confirmed figures,
      preventing full conviction at the current valuation.
    data:
      items:
        - label: Last Round Valuation
          value: "$1.8B"
          status: confirmed
          note: "Series C, October 2022 (Temasek-led)"
        - label: Total Capital Raised
          value: "~$628M"
          status: confirmed
          note: "Seed through Series C (PitchBook / About page)"
        - label: Lead Series C Investor
          value: "Temasek Holdings"
          status: confirmed
          note: "Singapore sovereign wealth fund"
        - label: Estimated ARR Multiple
          value: "9x–18x"
          status: estimated
          note: "Based on $100–200M ARR analyst estimate; not confirmed"
        - label: Cloud Security TAM (2026E)
          value: "$50B–$77B"
          status: estimated
          note: "IDC and MarketsandMarkets projections"
        - label: Peer Median Multiple
          value: "~12–15x NTM"
          status: estimated
          note: "Public comps: CrowdStrike, Palo Alto, Qualys"
    claimRefs: [CV001, CV005, CV009, CV018, CV016, CV035]

  - id: FV003
    type: bar
    title: "Valuation Sensitivity"
    insight: >-
      Orca's valuation is highly sensitive to the assumed ARR base. At 12x on $150M ARR (base midpoint),
      the $1.8B mark is exactly at fair value. At 9x on $100M ARR, the company is overvalued by ~50%.
      Resolving the ARR uncertainty is the single highest-leverage diligence action.
    data:
      items:
        - label: "9x × $100M ARR (bear floor)"
          value: 900
        - label: "9x × $150M ARR (base-low)"
          value: 1350
        - label: "12x × $150M ARR (base-mid)"
          value: 1800
        - label: "12x × $200M ARR (base-high)"
          value: 2400
        - label: "15x × $200M ARR (bull)"
          value: 3000
    approximationNotes: "Values in USD millions. ARR inputs are analyst estimates; multiple inputs derived from peer median analysis. Current $1.8B mark shown at 12x × $150M (third bar)."
    claimRefs: [CV009, CV013, CV016]

  - id: FV004
    type: flow
    title: "Recommendation Logic"
    insight: >-
      The conditional positive recommendation flows from converging evidence on market position,
      technology moat, and investor quality, tempered by competitive, financial-transparency, and
      litigation headwinds. Verification of ARR and NRR is the gating condition for upgrading to
      an unconditional positive.
    data:
      nodes:
        - id: n1
          label: "Market Position (Strong)"
          description: "Gartner CNAPP MQ Leader 2024; cloud security TAM $50B+ by 2026 at 15-20% CAGR"
        - id: n2
          label: "Technology Moat (Established)"
          description: "Patented SideScanning; agentless architecture; 2019-origin IP advantage"
        - id: n3
          label: "Investor Quality (Institutional)"
          description: "$628M raised; Temasek, ICONIQ Capital, CapitalG, Accel; strategic exit facilitation"
        - id: n4
          label: "Competitive Risk (High)"
          description: "Wiz at $12B valuation signals second-place position in same segment"
        - id: n5
          label: "Financial Transparency (Low)"
          description: "ARR, NRR, burn all undisclosed; 9x-18x multiple range prevents conviction"
        - id: n6
          label: "Litigation Overhang (Material)"
          description: "July 2023 suit vs. Wiz; no resolution as of May 2026; IP risk unresolved"
        - id: n7
          label: "Conditional Positive Recommendation"
          description: "Track at $1.8B; invest on ARR/NRR verification and cap-table review; size for base-case exit"
    claimRefs: [CV022, CV023, CV027]

