    notes: "Triggers and thresholds are analyst-defined based on public competitive and financial benchmarks. Actual thresholds may differ from observable public signals; management disclosures and investor data room access required for precise monitoring."
    claimRefs: [CV023, CV027, CV028, CV030]

  - id: TV006
    title: "Final Diligence Asks Table"
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
