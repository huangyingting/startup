company:
  name: Orca Security
  website: https://orca.security

chapter:
  number: 8
  order: 8
  letter: V
  title: "Valuation & Investment Thesis"
  summary: |
    Orca Security last raised $340 million at a $1.8 billion post-money valuation in October 2022 —
    led by Temasek with ICONIQ Capital and CapitalG participating — bringing total capital to
    approximately $628 million. At $1.8 billion against an estimated ARR of $100–200 million, the implied
    revenue multiple of 9x–18x is broadly in line with 2022-vintage cloud security SaaS peers. The
    conditional positive investment thesis rests on Gartner CNAPP Magic Quadrant leadership, a
    differentiated agentless architecture, and a large ($50B+) addressable market growing at 15–20% CAGR.
    The primary downside risk is Wiz, whose $12 billion valuation in 2024 signals it has become the
    market-share leader; a bear-case down-round or stasis scenario of $0.9B–$1.5B is plausible if
    competitive pressure continues. Actual ARR, NRR, and cap table structure remain undisclosed,
    preventing full underwriting conviction without data room access.

sections:
  - id: sv-thesis
    title: "Investment Thesis & Diligence Summary"
    body: |
      Orca Security presents a conditional positive investment signal at its $1.8 billion Series C
      valuation. The thesis rests on four pillars: (1) a structurally differentiated cloud security
      platform built on patented SideScanning technology that creates meaningful switching friction;
      (2) Gartner CNAPP Magic Quadrant Leader recognition in April 2024 validating enterprise
      acceptance; (3) a deep-pocketed investor syndicate (Temasek, ICONIQ Capital, CapitalG, Accel)
      providing strategic exit facilitation; and (4) a cloud security total addressable market
      projected to exceed $50 billion by 2026 at a 15–20% CAGR. The anti-thesis is equally clear:
      Wiz's $12 billion valuation by June 2024 implies Orca has been relegated to a secondary
      competitive position in the same agentless CNAPP segment; an undisclosed ARR leaves the revenue
      multiple unanchored at a 9x–18x range too wide for investment conviction; and the July 2023
      lawsuit against Wiz introduces legal risk and management distraction. The recommendation is
      conditional positive with required verification of ARR, NRR, and cap table before capital
      deployment. The key diligence gate is whether actual ARR supports the current $1.8 billion
      mark at a defensible multiple versus public and private comparables. Risk rating is high owing
      to competitive, financial-transparency, and litigation factors.
    claimRefs: [CV022, CV023, CV016, CV017, CV018, CV019, CV020, CV027, CV032]
    tableRefs: [TV001, TV002]
    figureRefs: [FV002, FV004]

  - id: sv-financing
    title: "Financing History & Capital Structure"
    body: |
      Orca Security has raised approximately $628 million across five funding events since its
      2019 founding. The financing trajectory reflects accelerating investor conviction during the
      2021–2022 cloud security bull market. The seed round of approximately $6 million in 2019
      seeded product development and early enterprise proofs-of-concept. A Series A of approximately
      $68 million followed in March 2021, enabling headcount scale-up and US go-to-market build.
      The Series B of $210 million at approximately $1.2 billion post-money valuation in November
      2021 was led by ICONIQ Capital and CapitalG, Alphabet's independent growth equity fund,
      providing both strategic validation from a top-tier technology investor and deep enterprise
      distribution contacts. The landmark Series C of $340 million at $1.8 billion post-money
      valuation in October 2022 was led by Singapore sovereign wealth fund Temasek Holdings,
      extending the investor quality to global institutional capital. SEC EDGAR Form D filings
      confirm all rounds were conducted as Regulation D exempt private placements, consistent
      with standard venture capital structuring. Total capital of $628 million implies substantial
      runway from the October 2022 close — estimated at 24–48 months based on benchmark burn
      assumptions — placing a potential next financing event in the 2024–2026 window. The preferred
      share structure and liquidation preference stack are not publicly available and must be
      confirmed in the investor data room before assessing common equity dilution.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV007, CV008, CV010, CV029, CV037]
    tableRefs: [TV006]
    figureRefs: [FV003]

  - id: sv-comparables
    title: "Valuation Framework & Comparable Analysis"
    body: |
      Orca's $1.8 billion valuation is assessed using a revenue multiple framework benchmarked
      against public cloud security comparables and disclosed private-round data points. The
      primary public comparables are CrowdStrike, Palo Alto Networks (Prisma Cloud), and Qualys.
      CrowdStrike trades at approximately 22x next-twelve-month revenue as of early 2025, reflecting
      its market-leading platform position and superior growth rates. Palo Alto Networks' cloud
      security segment trades at approximately 12x NTM, constrained by the company's total-portfolio
      blended multiple. Qualys trades at approximately 12x NTM, providing a floor for a scaled
      pure-play posture management vendor. The peer median of 12–15x NTM implies a fair-value
      range of $1.2B–$3.0B for Orca at the $100M–$200M ARR range — meaning the $1.8B mark is
      defensible at the high end of the ARR estimate but aggressive at the low end. The most
      relevant private comparable is Wiz, which raised at a $12 billion valuation in June 2024.
      Wiz's approximately 24x ARR multiple reflects market-share leadership in the CNAPP segment
      and signals that Orca commands a meaningful discount for finishing second. IDC projects the
      cloud security market at $77 billion by 2026, and MarketsandMarkets projects a 17.5% CAGR,
      both supporting the market growth component of a growth equity multiple. Statista's cloud
      security market sizing adds a third analytical anchor at $62 billion by 2026. The comparable
      valuation table reflects an exhaustive look at the most relevant public and private benchmarks
      available with public data; private company ARR figures are analyst estimates unless otherwise
      noted.
    claimRefs: [CV009, CV011, CV013, CV014, CV015, CV016, CV017, CV018, CV019, CV039, CV040, CV043, CV044]
    tableRefs: [TV004]
    figureRefs: [FV001]

  - id: sv-scenarios
    title: "Bull / Base / Bear Scenarios"
    body: |
      Three exit scenarios capture the distribution of outcomes for an investment in Orca Security
      at the current $1.8 billion mark. The bull case envisions a $3.0B–$5.0B exit via IPO or
      premium strategic acquisition, requiring Orca to achieve $250–350 million ARR, demonstrate
      NRR above 115%, and benefit from a reopened IPO market or a contested auction process among
      hyperscaler acquirers. The probability signal for the bull case is low-to-medium, as it
      requires Orca to re-capture competitive momentum against a better-funded Wiz and execute
      a capital-efficient growth path. The base case is a $1.5B–$2.5B strategic acquisition by
      Palo Alto Networks, Cisco, Google, Microsoft, or AWS — any of whom would value Orca's
      installed enterprise base, CNAPP platform, and SideScanning IP as an accelerant for cloud
      security product portfolios. At $150–200 million ARR, an 8–12x revenue multiple yields
      $1.2B–$2.4B enterprise value, consistent with the base case range. The probability signal
      is medium, as strategic M&A in cloud security has been active and Orca has the scale and
      investor pedigree to attract a credible buyer. The bear case of $0.9B–$1.5B encompasses a
      down-round or flat financing event in which Wiz's continued market-share dominance erodes
      Orca's enterprise pipeline and ARR growth slows materially. If Orca's ARR stagnates at
      $80–120 million, a 9–10x multiple yields $720M–$1.2B enterprise value — implying a
      meaningful impairment on the $1.8B mark. Downside triggers include adverse litigation
      outcome, CEO execution miss, or continued IPO market closure forcing a bridge round.
    claimRefs: [CV009, CV012, CV024, CV025, CV026, CV031, CV033, CV034, CV042]
    tableRefs: [TV003]
    figureRefs: []

  - id: sv-exit
    title: "Exit Readiness & Liquidity Path"
    body: |
      Orca's exit readiness is moderate-to-strong on qualitative factors but constrained by the
      absence of disclosed financial metrics. The Gartner Magic Quadrant Leader designation in
      2024 validates enterprise market acceptance and would support a premium in an IPO S-1
      registration statement or M&A data room. The Temasek, ICONIQ Capital, and CapitalG investor
      syndicate collectively manages trillions in assets under management and has deep relationships
      with strategic acquirers in cloud infrastructure and cybersecurity. These relationships
      meaningfully improve Orca's access to a structured exit process. The five most credible
      strategic acquirers are identified as AWS (cloud security consolidation), Microsoft Azure
      (Defender for Cloud augmentation), Google Cloud (Security Command Center expansion), Palo
      Alto Networks (Prisma Cloud broadening), and Cisco (cloud security platform build). Each
      has the balance sheet and strategic rationale to absorb Orca at the base-case valuation.
      The IPO path is less immediate: the cybersecurity SaaS IPO market has been largely closed
      in 2023–2025, and Orca would need to demonstrate at least $200M ARR with strong NRR and
      positive free-cash-flow trajectory before filing an S-1. The thesis-break and kill triggers
      table codifies the specific observable thresholds that would invalidate the investment case.
      The final diligence asks table enumerates the four data room requests that are gating for
      underwriting this position. Resolution of the Wiz litigation and confirmation of the cap
      table preferred stack are both prerequisites for assessing downside protection.
    claimRefs: [CV027, CV028, CV029, CV030, CV031, CV032, CV033, CV034]
    tableRefs: [TV005]
    figureRefs: []

