  evidenceGaps:
    - id: EGV001
      type: private-evidence-only
      severity: blocking
      topic: "ARR and comparable valuation table coverage"
      missingEvidence: "Orca's actual ARR, ACV, and year-over-year growth rate are not publicly disclosed; analyst estimates span $100–200M, a range too wide for multiple-based underwriting. Additionally, the comparable valuation table cannot be exhaustively enumerated due to sparse private-company ARR disclosures."
      whyItMatters: "The ARR gap means the $1.8B valuation represents anywhere from 9x to 18x trailing revenue — the difference between fair value and a 2x overvaluation vs. public peers. The comparable table coverage gap means peer pricing may shift materially as new private rounds are announced."
      diligencePath: "Request audited ARR, ACV, and cohort revenue data from the investor data room. For comparables, monitor PitchBook and CB Insights for new private-round announcements in the CNAPP space."
      relatedQuestionRefs: [QV003]
      relatedTableRefs: [TV004]

    - id: EGV002
      type: private-evidence-only
      severity: material
      topic: "cap table and liquidation preference stack"
      missingEvidence: "Orca's capitalization table, preferred share seniority, liquidation preference multiples, and any anti-dilution provisions are not available in public filings or databases. The SEC Form D confirms preferred share issuance but does not disclose terms."
      whyItMatters: "At a $1.5B base-case exit, the realized proceeds for common equity holders depend critically on the preference overhang; heavy 2x or 3x liquidation preferences could render common equity value near zero."
      diligencePath: "Request capitalization table, CPAS, and preferred share term summary from Orca's investor relations or legal counsel. Cross-reference with secondary market transaction data if available."
