figures:
  - id: FI001
    title: Revenue model bridge
    description: "How cloud-account onboarding converts to subscription revenue and gross profit at Orca."
    type: flow
    layout: wide
    summary: >-
      Orca converts cloud-account coverage into recurring subscription revenue through
      an agentless licensing model; gross profit is high but the exact realized margin
      is undisclosed.
    data:
      nodes:
        - id: cloud_onboard
          label: Cloud accounts onboarded
          detail: Customer connects cloud accounts (AWS, GCP, Azure) via API key; no agents installed.
          tone: positive
        - id: sidescanning
          label: Agentless SideScanning coverage
          detail: SideScanning reads cloud-workload snapshots without performance impact; broad coverage per account.
          tone: positive
        - id: platform_license
          label: Annual platform subscription
          detail: Recurring license fee scales with number of cloud accounts and/or assets covered.
          tone: positive
        - id: module_upsell
          label: Compliance and AI module add-ons
          detail: Incremental license fees for compliance packs (SOC 2, GDPR, HIPAA) and AI-SPM module.
          tone: neutral
        - id: marketplace
          label: Cloud marketplace distribution
          detail: AWS, GCP, Azure marketplace listings reduce procurement friction; marketplace take-rate reduces net revenue.
          tone: neutral
        - id: gross_profit
          label: Gross profit pool
          detail: >-
            Estimated gross margin 70–80% based on SaaS comp benchmarks; actual margin undisclosed.
            Pure-software delivery means no hardware COGS.
          approximationNotes: "Gross margin estimated from CrowdStrike/Palo Alto Networks SaaS benchmarks; not confirmed by Orca."
          tone: positive
    claimRefs: [CI004, CI005, CI030]

  - id: FI002
    title: Unit economics bridge
    description: "Public evidence coverage breaks down before CAC, payback, and NRR can be quantified for Orca."
    type: flow
    layout: wide
    summary: >-
      Top-of-funnel demand and product quality signals are visible; CAC, payback, and NRR
      remain undisclosed, preventing a closed unit-economics model.
    data:
      nodes:
        - id: tam
          label: CNAPP TAM $10B+ by 2026
          detail: Cloud-native application protection market growing rapidly; Orca positioned as a Leader per Gartner 2024.
          tone: positive
        - id: icp
          label: Enterprise ICP
          detail: Mid-market and large cloud-first companies; confirmed logos include Autodesk, Unity, SAP, Gannett.
          tone: positive
        - id: cac
          label: CAC undisclosed
          detail: Direct enterprise sales motion with field AEs and channel partners; CAC not publicly available.
          approximationNotes: "Industry SaaS enterprise CAC/ACV ratio: 0.8–1.5× first-year ACV."
          tone: warning
        - id: payback
          label: Payback period unknown
          detail: Without confirmed ACV and CAC, payback cannot be computed; benchmark estimate 12–24 months.
          approximationNotes: "SaaS benchmark for enterprise security: 12–24 months payback."
          tone: warning
        - id: nrr
          label: NRR undisclosed
          detail: "Expansion via growing cloud footprint expected; NRR not published. Cloud security SaaS peers: 110–130%."
          approximationNotes: "Peer NRR range: CrowdStrike 124%, Zscaler 127%; Orca not disclosed."
          tone: warning
        - id: ltv
          label: LTV / CAC uncomputable
          detail: Without NRR and gross margin confirmation, LTV/CAC ratio cannot be closed from public data.
          tone: negative
    claimRefs: [CI009, CI011, CI012, CI013]

  - id: FI003
    title: Financial estimate range
    description: "Wide-range financial estimates for Orca reflecting private-company data opacity as of mid-2026."
    type: range
    layout: wide
    summary: >-
      Orca's private status and lack of financial disclosure produce very wide ranges
      for all key metrics; the revenue multiple range (9×–36×) alone spans four turns,
      making valuation conviction impossible without ARR confirmation.
    data:
      items:
        - label: "ARR estimate (2022, $M)"
          low: 50
          mid: 100
          high: 200
          detail: "Based on $1.8B valuation and implied SaaS revenue multiples; no confirmed figure."
          tone: warning
        - label: "Gross margin estimate (%)"
          low: 65
          mid: 75
          high: 82
          detail: "Inferred from pure-SaaS delivery model and peer benchmarks (CrowdStrike, Palo Alto Networks)."
          tone: neutral
        - label: "Annual burn rate estimate ($M)"
          low: 48
          mid: 80
          high: 120
          detail: "Derived from 1,000+ headcount proxy × estimated all-in cost per head; unverified."
          tone: warning
        - label: "Runway from Oct 2022 Series C (months)"
          low: 18
          mid: 30
          high: 48
          detail: "Burn range applied to $340M Series C; excludes prior cash balances and unverified revenue offset."
          tone: neutral
        - label: "Implied revenue multiple at $1.8B valuation"
          low: 9
          mid: 18
          high: 36
          detail: "Computed as $1.8B / high and low ARR estimates; illustrates how critical ARR confirmation is."
          tone: warning
    claimRefs: [CI009, CI022, CI023, CI024]

  - id: FI004
    title: Capital intensity / cash-flow map
    description: "Orca capital deployment by round, with estimated ongoing operating cost and capital structure."
    type: flow
    layout: wide
    summary: >-
      Orca has deployed ~$630M across four rounds; the pure-SaaS delivery model means
      capex is negligible, but aggressive sales and R&D spend represent the primary
      cash-consumption drivers.
    data:
      nodes:
        - id: early_rounds
          label: Seed + Series A (~$27M)
          detail: Seed ~$6M (YL Ventures, 2019) + Series A $20.5M (GV + YL Ventures, 2020). R&D formation phase.
          tone: neutral
        - id: series_b
          label: Series B $210M (Nov 2021)
          detail: ICONIQ Capital + CapitalG led; $1.2B valuation. Aggressive GTM and engineering scale-up.
          tone: positive
        - id: series_c
          label: Series C $340M (Oct 2022)
          detail: Temasek-led; $1.8B valuation. Total raised ~$630M. Runway extension and competitive positioning.
          tone: positive
        - id: opex_profile
          label: Operating expense profile
          detail: >-
            Primary spend: S&M (~40–50% of revenue typical for growth-stage SaaS), R&D (~25–35%), G&A (~10–15%).
            Negligible capex; pure-software delivery model.
          approximationNotes: "Spend mix estimated from SaaS industry benchmarks; Orca has not disclosed P&L breakdown."
          tone: neutral
        - id: capital_needs
          label: Next capital event
          detail: >-
            Estimated runway through 2024–2026 at mid-case burn; IPO, strategic acquisition,
            or Series D likely in this window given market conditions.
          tone: warning
    claimRefs: [CI001, CI002, CI003, CI014, CI032]

