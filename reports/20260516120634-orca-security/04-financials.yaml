schemaVersion: report-v2
artifact: financials
slug: orca-security
runDate: "2026-05-16"
company:
  name: Orca Security

chapter:
  order: 4
  number: 4
  title: Financials
  summary: |
    Orca Security operates a pure-SaaS subscription model priced on cloud accounts
    covered, generating revenue through platform licensing, compliance module add-ons,
    and cloud marketplace channels (AWS, GCP, Azure). Exact list pricing is not
    publicly disclosed; enterprise contracts are negotiated directly. As of October 2022
    Orca had raised approximately $630 million across seed, Series A, Series B, and Series C
    rounds at a $1.8 billion valuation. Key unit-economics inputs—ARR, gross margin, NRR,
    CAC, and burn rate—are undisclosed; SaaS-benchmark estimates suggest ARR of
    $50–200 million, gross margin 70–80%, and estimated monthly burn of $4–8 million.
    Estimated runway from the $340 million Series C extends 24–48 months from October 2022.
    Critical financial diligence blockers: actual ARR, net revenue retention, customer
    acquisition cost, and verified cash-burn rate remain private and must be sourced
    from the data room before underwriting.

sections:
  - id: SI-revenue
    title: Revenue Model and Pricing Structure
    body: |
      Orca Security generates revenue primarily through annual SaaS subscription licenses
      scoped to the number of cloud accounts or assets monitored. The agentless
      SideScanning technology eliminates per-host agent licensing, enabling simple
      asset-level pricing that scales with the customer's cloud footprint. Orca's own
      About page describes a platform that covers workloads, data, and identities across
      cloud environments—indicating a broad attack-surface coverage scope rather than
      point-product pricing. Revenue streams extend to compliance module add-ons
      (SOC 2, GDPR, HIPAA, PCI-DSS packs), an AI security posture management module,
      and professional services for onboarding and integration. The company distributes
      through direct enterprise sales and cloud marketplace listings (AWS Marketplace,
      Google Cloud Marketplace, Azure Marketplace), with cloud provider relationships
      confirmed by Google Cloud's official partner listing. Revenue recognition follows
      standard SaaS subscription accounting: annual contracts recognized ratably over
      the contract period. List pricing is not publicly disclosed; Gartner and G2 reviews
      confirm enterprise customers negotiate pricing directly. This opacity makes public
      revenue estimation highly uncertain and underscores the need for ACV and ARR data
      from the investor data room before any financial model can be anchored.
    claimRefs: [CI004, CI005, CI030]
    tableRefs: [TI001]
    figureRefs: [FI001]

  - id: SI-gtm
    title: GTM Motion and Sales Efficiency
    body: |
      Orca employs a sales-led GTM motion targeting enterprise security and platform
      engineering teams at mid-market and large cloud-first companies. The product is
      distributed through direct field sales and an inside-sales motion complemented by
      three primary leverage channels: cloud provider marketplaces (AWS, GCP, Azure),
      VAR/MSSP resellers, and global system integrators such as Deloitte and KPMG.
      Google Cloud's official security partner page confirms Orca's ISV status and
      marketplace integration, indicating a cloud-credit consumption model that lowers
      procurement friction for enterprise buyers. The company's GitHub public presence
      covers Terraform providers and open-source tooling, functioning as a bottom-up
      developer-relations channel that complements the top-down enterprise sales motion.
      As a mid-stage company with a 1,000+ employee headcount proxy (LinkedIn), Orca
      likely runs a blended go-to-market with quota-carrying AEs supported by solutions
      engineers. Customer acquisition cost, sales cycle length, and channel mix
      percentages are not publicly disclosed. Industry benchmarks for cloud security SaaS
      suggest a CAC payback period of 12–24 months for enterprise motions of this scale,
      but without ACV and new-logo data this cannot be independently verified. The
      absence of a self-serve product-led growth motion is confirmed by pricing opacity
      and the absence of any freemium tier on the company website.
    claimRefs: [CI006, CI007, CI025, CI026, CI037]
    tableRefs: [TI002]

  - id: SI-unit-economics
    title: Unit Economics and Capital Efficiency
    body: |
      Orca's unit economics profile is characteristic of an enterprise SaaS business
      in the cloud-native security vertical: high gross margins driven by pure-software
      delivery, deferred profitability due to aggressive sales and marketing investment,
      and a revenue expansion model that relies on growing cloud footprint within
      existing accounts. Gross margin is estimated at 70–80%, consistent with peers
      such as Palo Alto Networks' cloud security units and CrowdStrike, both of which
      report 73–78% software gross margins. Net revenue retention (NRR) is not disclosed;
      industry peers in cloud security SaaS with expansion-led models report NRR in the
      110–130% range. Customer acquisition cost is not published; for enterprise sales-led
      SaaS, CAC/first-year-ACV ratios typically fall in the 0.8–1.5x range, implying
      payback periods of 10–18 months assuming similar dynamics. Orca's pure-SaaS
      delivery model implies minimal capital expenditure: no physical hardware, no
      distribution infrastructure, and no inventory, so free cash flow generation is
      a function of subscription revenue minus operating expense. The absence of any
      disclosed capex, debt facilities, or project-finance obligations suggests Orca
      operates as a standard software-subscription business with working capital tied
      primarily to accounts receivable and deferred revenue. All unit-economics estimates
      in this chapter are inferences from benchmark comps and should be verified against
      Orca's investor data room.
    claimRefs: [CI010, CI011, CI012, CI013, CI034]
    tableRefs: [TI003]
    figureRefs: [FI002]

  - id: SI-traction
    title: Public Financial Traction and Metrics
    body: |
      Orca has not disclosed ARR, revenue, customer count, or NRR publicly. The
      strongest public traction signals come from qualitative growth disclosures and
      third-party recognition. Forbes reported in 2022 that Orca's client list had
      tripled year-over-year, naming Unity, Gannett, and SAP as customer examples.
      Orca's case study library publicly references Autodesk, Paidy, and Digital Turbine
      as named customers, providing a floor count of at least 3–5 enterprise logos
      disclosed by name. LinkedIn follower count of 127,786 (observed May 2026) serves
      as a rough headcount proxy; Orca's About page describes the company as globally
      distributed with offices in multiple locations. Gartner named Orca a Magic Quadrant
      Leader for CNAPP in April 2024, signaling broad market acceptance and validating
      the product's competitive position. G2 reviews reflect 4.5+ aggregate scores with
      strong enterprise adoption. Revenue is estimated at $50–200 million ARR based on
      the combination of $630 million total capital raised, peer revenue multiples at
      $1.8 billion valuation, and pace of commercial announcements; however, this range
      is wide precisely because no disclosed financial datapoint anchors it. The analyst
      database CBInsights lists Orca as an active venture-backed company without
      confirmed revenue figures. All revenue estimates carry low confidence and must
      be treated as orientation ranges, not fact.
    claimRefs: [CI009, CI016, CI017, CI018, CI029, CI031, CI033, CI035, CI036]
    tableRefs: [TI005]

  - id: SI-capital
    title: Capital Adequacy and Financial Verdict
    body: |
      Orca completed its Series C round in October 2022, raising $340 million at a
      $1.8 billion post-money valuation led by Temasek, with participation from existing
      investors including ICONIQ Capital and CapitalG. Total capital raised reached
      approximately $630 million as stated on Orca's official About page, consistent with
      the cumulative sum of confirmed round announcements: a Series B of $210 million
      (November 2021) plus the $340 million Series C, plus earlier seed and Series A
      rounds that account for the balance. SEC EDGAR Form D searches confirm Orca's
      formal Regulation D filings with the SEC, consistent with exempt private placements
      under Rule 506. Estimated monthly burn of $4–8 million (derived from headcount of
      approximately 1,000 employees and typical SaaS cost benchmarks) implies a runway
      from the Series C of 24–48 months, placing a hypothetical next fundraising event
      in the 2024–2026 window. Gil Geron replaced co-founder Avi Shua as CEO in March
      2023, introducing leadership-transition risk during the growth phase. Competition
      from Wiz—which reportedly reached $100 million ARR in 18 months—creates pricing
      pressure in the agentless cloud security segment and may compress Orca's realized
      pricing and retention metrics. At $1.8 billion valuation against a wide ARR estimate
      of $50–200 million, the implied revenue multiple spans 9x to 36x—a range too wide
      for conviction without confirmed ARR. The financial verdict: revenue quality appears
      high (recurring SaaS, enterprise logos), margin path looks favorable (pure software),
      but capital intensity is moderate due to aggressive sales spend, and three material
      diligence blockers—actual ARR, NRR, and verified burn rate—prevent underwriting
      confidence at this stage.
    claimRefs: [CI001, CI002, CI003, CI008, CI014, CI015, CI019, CI020, CI021, CI022, CI023, CI024, CI027, CI028, CI032, CI038]
    tableRefs: [TI004]
    figureRefs: [FI003, FI004]

