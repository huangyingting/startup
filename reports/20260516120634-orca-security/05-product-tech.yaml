  - id: section-3
    title: Cloud platform support and integration ecosystem
    body: >
      Orca's cloud platform partnerships reflect strategic investment in the three dominant
      hyperscalers. Orca is an Advanced AWS Security Competency Partner and won the 2022
      AWS Global Security Partner of the Year award, and in January 2025 became the first
      pure-play CNAPP vendor to achieve AWS ISV Accelerate status—enabling co-sell support
      with AWS's field sales organization. The platform is integrated with more than 100 AWS
      services and products, including Amazon ECS, S3, GuardDuty, CloudTrail, Amazon Security
      Lake, Amazon Inspector, and AWS Security Hub.


      On Azure, Orca continuously scans all Azure assets and integrates with Azure Security
      Center, Azure Sentinel (Microsoft Sentinel), and Azure Active Directory SSO. The
      company announced that Orca leverages Microsoft Azure OpenAI Service GPT-4 to
      accelerate remediation guidance. Orca is available on the Azure Marketplace. On
      Google Cloud Platform, Orca is a Google Advantage Partner supporting Chronicle
      SIEM/SOAR, Security Command Center, Pub/Sub, SSO, and Vertex AI; the platform is
      available on the Google Cloud Marketplace.


      Beyond cloud provider integrations, Orca offers a broad integration ecosystem
      for security operations and developer workflows. Ticketing and workflow: Jira and
      ServiceNow with bidirectional integration for remediation project management.
      Communication: Slack and PagerDuty for real-time alerts and on-call routing. SIEM and
      SOAR: Splunk, Microsoft Sentinel, AWS Security Hub, and Google Chronicle for event
      export and correlated investigation. Developer and IaC: a Terraform provider published
      under the orcasecurity/orca namespace on the Terraform Registry (MPL-2.0 license),
      and GitHub Actions workflows for CI/CD shift-left security scanning. The integration
      page describes Orca as partnering with "leading technology vendors to identify,
      prioritize, and address cloud risks."


      For managed service providers (MSPs), Orca offers a multi-tenancy deployment model
      enabling managed cloud security as a service with shared platform economics. The
      partner program provides pre-sales support and co-marketing programs for channel
      partners. Orca's solutions page lists the platform as covering all cloud security
      needs including CSPM, CWPP, CIEM, DSPM, Vulnerability Management, API Security,
      Compliance, and more in a single centralized platform.
