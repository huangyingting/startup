  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: engineering-headcount
      missingEvidence: >-
        No public source discloses Orca Security's total engineering headcount or the specific
        size of the Tel Aviv R&D center.
      whyItMatters: >-
        Engineering team size is a key signal of R&D capacity, competitive product velocity,
        and organizational scaling. Without headcount data, R&D investment assessment is
        constrained to indirect signals such as GitHub activity and funding levels.
      diligencePath: >-
        Request headcount breakdown by function (engineering, sales, marketing) and geography
        (Israel, USA, other) directly from Orca as part of due diligence data request.
      relatedQuestionRefs:
        - QE017
    - type: private-evidence-only
      severity: minor
      topic: r-and-d-spend
      missingEvidence: >-
        Orca Security does not publicly disclose R&D spend as a percentage of revenue or in
        absolute dollar terms, as a private company with no public financial filings.
      whyItMatters: >-
        R&D intensity relative to revenue is a core indicator of innovation velocity and
        platform investment, particularly in a competitive CNAPP market where feature parity
        can erode quickly.
      diligencePath: >-
        Request audited or management-prepared financial statements showing R&D expense lines
        for 2022–2025 as part of due diligence materials.
      relatedQuestionRefs:
        - QE018
    - type: stale
      severity: minor
      topic: competitive-comparison
      missingEvidence: >-
        No comprehensive 2025/2026 third-party benchmark comparing Orca's attack path analysis
        depth and specificity against Wiz's equivalent capability was found in public sources.
      whyItMatters: >-
        Attack path analysis is a primary CNAPP differentiation claim for both Orca and Wiz;
        without independent benchmarks, product claims from each vendor cannot be objectively
        compared.
      diligencePath: >-
        Commission an independent technical proof-of-concept or request a Gartner Critical
        Capabilities CNAPP report that scores attack path analysis functionality by vendor.
      relatedQuestionRefs:
        - QE014
        - QE016
    - type: stale
      severity: minor
      topic: ai-spm-competitive
      missingEvidence: >-
        No independent 2026 benchmark or analyst note comparing Orca's AI SPM maturity against
        Wiz's equivalent AI security offering or Prisma Cloud's AI security features.
      whyItMatters: >-
        AI SPM is an early-stage module and competitive differentiation is likely to compress
        rapidly as other CNAPP vendors add AI workload scanning; first-mover advantage lifespan
        is uncertain without comparative data.
      diligencePath: >-
        Monitor analyst notes (Gartner, Forrester) on AI SPM market evolution; request Orca
        engineering roadmap for AI SPM feature expansion in 2026 during diligence calls.
      relatedQuestionRefs:
        - QE023
    - type: missing-source
      severity: minor
      topic: patent-details
      missingEvidence: >-
        The specific US patent number(s) for SideScanning technology were not found in publicly
        searchable USPTO databases or Orca's press releases during this research cycle.
      whyItMatters: >-
        Patent scope and enforceability directly affect the durability of Orca's technical moat.
        Without the patent number, it is not possible to assess claim breadth, remaining
        exclusivity term, or pending continuation applications.
      diligencePath: >-
        Request Orca's patent portfolio summary (numbers, filing dates, claim abstracts) as
        part of IP due diligence. Search USPTO full-text database for "SideScanning" and Orca
        Security inventors (Avi Shua and co-inventors).
      relatedQuestionRefs:
        - QE005
