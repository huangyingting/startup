  - id: section-4
    title: Innovation track record and AI capabilities
    body: >
      Orca's innovation trajectory begins with the founding insight in 2019 that cloud security
      required a fundamentally different architecture. The company's Series B blog from 2021
      documents how Orca's team—even before the platform was widely commercialized—used
      SideScanning to scan thousands of virtual appliances across Dell, Cisco, IBM, Symantec,
      Splunk, and Oracle, helping hundreds of organizations improve security posture of
      their shipped products. This early use case demonstrated the platform's applicability
      beyond direct enterprise deployment.


      The period 2021–2022 saw rapid module expansion. Kubernetes security capabilities were
      added alongside extended CIEM and DSPM functions as cloud-native architectures matured.
      By October 2022, Orca's Series C investment of $340 million at a $1.8 billion valuation
      reflected market recognition of the platform's breadth. In 2022, Orca was also named to
      the Forbes Cloud 100 and received the AWS Global Security Partner of the Year award.


      In 2023–2024, Orca launched Cloud Detection and Response (CDR) through the Orca Sensor,
      addressing the real-time detection gap that had been identified as the primary limitation
      of agentless scanning. AI SPM was introduced in 2024 as organizations began deploying
      AI/ML workloads at scale. The AI SPM announcement positioned Orca alongside early CNAPP
      movers into the AI security space, with Shai Alon and Shir Sadon framing AI model
      security as a novel attack surface where "sensitive data and intellectual property in
      training data" create outsized risk.


      In April 2024, Gartner named Orca Security a Leader in its Magic Quadrant for
      Cloud-Native Application Protection Platforms—a milestone that validated the platform's
      breadth and market execution. In January 2025, Orca achieved AWS ISV Accelerate status,
      becoming the first pure-play CNAPP vendor to do so, providing material sales channel
      benefits. The Orca AI initiative (AI Code Fixes, AI Discovery, AI Assistant, AI Agents)
      was announced as part of continued innovation in AI-assisted security operations.


      Platform velocity signals from GitHub show active open-source maintenance as of May 2026:
      the orca-skills repository had 42 stars and was updated on May 14, 2026; the
      terraform-provider-orcasecurity was updated May 5, 2026 with active commit history.
      The CLI (orca-cli) was updated May 11, 2026, maintaining programmatic access tooling.
      These signals indicate continued R&D investment and developer-facing product work.
