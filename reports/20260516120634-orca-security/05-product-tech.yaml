  - id: section-2
    title: CNAPP product module coverage
    body: >
      Orca's Cloud-Native Application Protection Platform (CNAPP) consolidates capabilities
      that would otherwise require separate point solutions. The platform's core modules span
      the full security lifecycle from posture and compliance through workload protection,
      identity risk, data security, AI workload security, and real-time detection.


      Cloud Security Posture Management (CSPM) was part of the original product at launch and
      identifies misconfigurations, compliance policy violations, and insecure configurations
      across cloud infrastructure. Cloud Workload Protection Platform (CWPP) covers vulnerability
      scanning of running workloads, operating system CVE detection, and malware identification
      through the SideScanning data pipeline. Both CSPM and CWPP are considered mature
      capabilities in Orca's portfolio.


      Cloud Infrastructure Entitlement Management (CIEM) was added as cloud identity risks
      became a leading attack vector, covering excessive permissions, cross-account access paths,
      and IAM misconfigurations. Data Security Posture Management (DSPM) scans cloud storage
      buckets, databases, and data services to classify sensitive data (PII, credentials, IP,
      secrets) and identify exposure risks. Container Security and Kubernetes Security Posture
      Management (KSPM) provide posture management, container image scanning, and—via the
      optional Orca Sensor—runtime protection for Kubernetes clusters.


      AI Security Posture Management (AI SPM) was launched in 2024, reflecting the rapid
      adoption of AI/ML workloads in cloud environments. AI SPM scans AI models, training
      datasets, ML pipelines, and AI service configurations for security risks including
      exposed model weights, unprotected training data, and misconfigured AI endpoints. Shai
      Alon (Director of AI Innovation) and Shir Sadon (Cloud Security Researcher) presented the
      capability at an Orca webinar, framing it as addressing risks specific to AI resources that
      include sensitive intellectual property in training data.


      Cloud Detection and Response (CDR) provides runtime threat detection through the Orca
      Sensor, an optional lightweight agent deployed where real-time visibility is required.
      API Security covers API inventory and exposure detection. Compliance reporting automates
      policy checks against frameworks including CIS, NIST, PCI-DSS, HIPAA, SOC 2, and GDPR.
      The CNAPP platform also integrates shift-left capabilities: CI/CD pipeline scanning for
      IaC templates, container images, secrets, and SAST findings, traced back from production
      findings to their code origins.


      The Orca AI initiative layers AI capabilities across all modules: AI Code Fixes
      generates remediation code for IaC and CLI; AI Discovery translates natural-language
      queries into cloud asset searches; AI Assistant provides a chat interface to all of
      Orca's context; and AI Agents autonomously analyze, conclude, and initiate remediation
      workflows. This AI layer is positioned as an acceleration tool for security operations
      teams facing alert volume and skill gap pressures.
