  - id: TE003
    title: Orca CNAPP technical architecture components
    columns:
      - Component
      - Description
      - Technology Approach
      - Advantage
      - Limitation
    rows:
      - - SideScanning Engine
        - Reads cloud workload runtime block storage out-of-band via read-only cloud APIs
        - Cloud provider API integration; no agent deployed; no code executed in workload
        - Zero performance impact; minute-level onboarding; covers non-agent-capable assets
        - Snapshot-based; introduces latency; cannot detect in-memory fileless attacks in real time
      - - Unified Data Model
        - Correlates findings across infrastructure, workload, identity, and data layers in a single graph
        - Graph-based proprietary schema; cross-domain entity resolution
        - Enables attack path analysis; surfaces toxic combinations across layers
        - Complexity may affect query performance at extreme cloud estate scale
      - - Context and Risk Engine
        - Prioritizes alerts based on attack paths, blast radius, asset criticality, and sensitive data at risk
        - ML-based scoring; contextual alert ranking
        - Reduces alert fatigue; focuses remediation on highest-impact risks
        - Risk scoring calibration requires tuning for specific organizational risk profiles
      - - Attack Path Analysis
        - Graphical visualization of lateral movement risk chains through toxic combinations
        - Graph traversal on Unified Data Model; dynamic re-scoring on new findings
        - Identifies multi-hop attack chains invisible to point solutions
        - May not capture attack paths involving runtime ephemeral containers
      - - Orca Sensor (CDR)
        - Optional lightweight agent for real-time runtime threat detection
        - Kernel-level sensor; runtime telemetry; complements agentless scanning
        - Closes real-time detection gap; detects fileless execution and in-memory threats
        - Requires deployment on workloads; adds operational overhead; undermines pure agentless claim
      - - Orca AI Engine
        - AI-powered capabilities across all modules including code fixes, natural-language search, AI agents
        - LLM integration (Azure OpenAI GPT-4 + internal models); RAG over Unified Data Model
        - Accelerates remediation and investigation; lowers skill bar for security operations
        - AI-generated code fixes require human review; model hallucinations possible
    notes: >-
      Architecture descriptions derived from Orca's official platform and blog pages.
      Technology details reflect company-claimed mechanisms; internal implementation specifics
      are not publicly disclosed.
