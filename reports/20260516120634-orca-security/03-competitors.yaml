  evidenceGaps:
  - id: EGP001
    type: private-evidence-only
    severity: material
    topic: wiz-post-acquisition-pricing
    missingEvidence: Wiz's specific pricing tiers, discount levels, and contract structure post-Google acquisition have not
      been publicly disclosed. No independent pricing benchmark or third-party analysis of post-acquisition contract economics
      is available.
    whyItMatters: Wiz's ability to deploy aggressive pricing subsidized by Google is the most frequently cited competitive
      threat to Orca. Without verified pricing data, the severity of this threat cannot be accurately quantified and deal
      win/loss analysis is incomplete.
    diligencePath: Request Orca win/loss data by account type; obtain customer-reported Wiz pricing from primary interviews;
      review investor-facing competitor pricing data in any confidential disclosure.
    relatedQuestionRefs:
    - QP006
  - id: EGP002
    type: private-evidence-only
    severity: material
    topic: competitor-arr-revenue
    missingEvidence: Wiz's ARR and CrowdStrike's cloud security revenue as standalone business lines are not publicly disclosed.
      Wiz as a Google subsidiary no longer files separate financials; CrowdStrike reports cloud security revenue as part of
      a module bundle, not separately.
    whyItMatters: Without competitor revenue data, the relative market share positions of Orca and its primary peers cannot
      be quantified, making TAM penetration and revenue growth rate comparisons impossible to verify objectively.
    diligencePath: Request Orca's internal win/loss tracking and competitive deal data; seek third-party analyst estimates
      from IDC or Forrester; review any available broker research on CrowdStrike's module-level ARR.
    relatedQuestionRefs:
    - QP028
  - id: EGP003
    type: stale
    severity: minor
    topic: lacework-fortinet-integration-status
    missingEvidence: Detailed technical integration roadmap and timeline for the Lacework-Fortinet product suite post-merger.
      No public documentation of which Lacework capabilities have been fully integrated into the Fortinet Security Fabric
      as of May 2026.
    whyItMatters: The pace of integration determines whether Lacework/Fortinet represents a near-term competitive threat to
      Orca's mid-market positioning or remains a fragmented offering that is easier to displace during the integration period.
    diligencePath: Review Fortinet earnings call transcripts for CNAPP integration milestones; check Fortinet product documentation
      and release notes for Lacework integration status.
    relatedQuestionRefs:
    - QP021
  - id: EGP004
    type: missing-source
    severity: material
    topic: orca-wiz-lawsuit-outcome
    missingEvidence: No court filings, press releases, or credible media reports confirming resolution, settlement, dismissal,
      or pending trial date for the Orca Security vs. Wiz lawsuit filed in July 2023 have been identified as of May 2026.
    whyItMatters: The lawsuit's outcome is material to assessing the durability of Orca's patent moat. A dismissal or unfavorable
      ruling would significantly weaken Orca's IP position against Wiz; a favorable ruling would strengthen it. The open status
      represents a material unknown for diligence.
    diligencePath: Search federal court PACER for the case docket; request legal update from Orca management; verify whether
      any settlement has been reached under NDA.
    relatedQuestionRefs:
    - QP024
  - id: EGP005
    type: stale
    severity: minor
    topic: fortune100-penetration-trajectory
    missingEvidence: No public data is available on Orca Security's Fortune 100 or Fortune 500 customer count, making it impossible
      to quantify the size of the Fortune 100 penetration gap between Orca (unknown) and Wiz (50%+), or to project a timeline
      for closing it.
    whyItMatters: Fortune 100 penetration is the most widely cited metric for CNAPP enterprise market leadership. The size
      of the gap between Orca and Wiz on this metric is the most critical indicator of Orca's competitive trajectory.
    diligencePath: Request Orca management's enterprise customer count and Fortune 500/1000 penetration data in due diligence;
      compare to Wiz's stated 50%+ Fortune 100 figure.
    relatedQuestionRefs:
    - QP030
