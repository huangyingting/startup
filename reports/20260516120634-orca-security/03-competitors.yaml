- id: section-P05
  title: Competitive moat and displacement risk
  body: 'Orca''s strongest structural moat is its granted US patent on the SideScanning™ agentless cloud security architecture.
    Filed in 2019 and granted subsequently, the patent provides legal protection for the core mechanism by which Orca reads
    cloud workload data without agent installation. Orca filed suit against Wiz in July 2023 alleging copyright infringement
    and trade secret theft by former Orca employees who joined Wiz; the case reflects both the strength of Orca''s IP position
    and the seriousness with which it treats competitive threats to that position. Customer switching costs represent a secondary
    moat: Orca customers integrate via cloud provider API tokens, onboard custom policies and compliance rules, and connect
    ticketing, SIEM, and SOAR workflows over time. The accumulated configuration and workflow investment creates meaningful
    retention friction. Orca''s ecosystem of 100-plus integrations deepens this lock-in by embedding Orca into existing security
    workflows.


    The primary displacement risks facing Orca are: first, Wiz''s Google-backed pricing aggression and distribution leverage
    through the Google Cloud sales channel; second, hyperscaler commoditization of basic CSPM capabilities through free or
    bundled native tools that reduce willingness to pay for CSPM-only use cases; and third, platform consolidation by large
    incumbents such as Palo Alto Networks, which bundles CNAPP with its firewall and endpoint portfolio and offers multiyear
    enterprise licensing that can make standalone CNAPP economics unfavorable for certain buyer profiles. Lacework''s merger
    with Fortinet, completed in 2024, represents the same platform-bundling dynamic playing out with a midmarket entrant.
    Against these pressures, Orca''s best defense is to maintain its breadth advantage, deepen runtime protection through
    CDR capabilities that are harder to replicate with agentless-only approaches, and leverage its AWS co-sell relationship
    to offset Wiz''s Google distribution advantage.

    '
