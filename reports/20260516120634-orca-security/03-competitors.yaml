- id: section-P04
  title: Hyperscaler-native and platform-bundled alternatives
  body: 'Microsoft Defender for Cloud is Microsoft''s integrated CNAPP offering for Azure and multicloud environments. It
    provides CSPM, cloud workload protection, and DevOps security capabilities, and offers both free and paid tiers. The free
    basic CSPM tier is automatically enabled for Azure subscriptions, giving Microsoft a distribution advantage that independent
    CNAPP vendors cannot replicate. For enterprises with predominantly Azure workloads and an existing Microsoft security
    investment, Defender for Cloud can reduce the perceived need for a third-party CNAPP tool, particularly at the CSPM level.


    AWS Security Hub consolidates security findings from AWS-native services and partner integrations into a single dashboard
    with automated compliance checks. Amazon GuardDuty provides continuous threat detection using AI and ML, monitoring CloudTrail
    logs, VPC flow logs, DNS queries, and EKS control plane activity. Together they offer deep AWS-native visibility at no
    marginal cost for AWS compute workloads already paying for AWS services. Their limitation is primarily scope: Security
    Hub and GuardDuty are optimized for AWS environments and provide limited value for organizations with significant Azure
    or GCP footprints. Orca''s multi-cloud coverage across AWS, Azure, GCP, and OCI is a direct response to this limitation.


    Google Security Command Center provides default always-on security for Google Cloud workloads, including built-in threat
    detection, virtual red teaming using attack simulation against a digital twin model of a customer''s GCP environment,
    and AI workload protection. Its integration with Wiz post-acquisition has the potential to create a deeply integrated
    GCP-native CNAPP that could further erode the addressable market for independent CNAPP vendors among large GCP-primary
    users. Orca''s counter-positioning is multi-cloud breadth and vendor independence—benefits that resonate with security
    teams at organizations that cannot or will not consolidate on a single hyperscaler.

    '
