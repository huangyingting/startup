company:
  name: Orca Security
chapter:
  number: 3
  title: Competitors
  summary: Orca Security competes in the Cloud-Native Application Protection Platform (CNAPP) market against a rapidly evolving
    set of rivals spanning pure-play agentless vendors, agent-based and converged platforms, and hyperscaler-native bundles.
    Wiz—acquired by Google for approximately $32 billion in 2025—is Orca's closest peer and has surpassed it in Fortune 100
    penetration. Palo Alto Networks Prisma Cloud, CrowdStrike Falcon Cloud Security, Aqua Security, Lacework (now part of
    Fortinet), and Sysdig round out the specialist CNAPP field. Microsoft Defender for Cloud, AWS Security Hub plus GuardDuty,
    and Google Security Command Center represent platform-bundled alternatives that compete on price and hyperscaler integration
    depth. Orca's key differentiators—patented SideScanning™ technology, agentless deployment, and Unified Data Model—provide
    a moat against agent-centric incumbents but face escalating pressure from Wiz's Google-backed resources and from hyperscaler
    commoditization of CSPM baseline capabilities. Gartner named Orca a Magic Quadrant Leader for CNAPP in 2024, the same
    year Wiz also achieved Leader status, underscoring the intensity of the top-tier rivalry.
sections:
- id: section-P01
  title: Competitive landscape overview
  body: 'The Cloud-Native Application Protection Platform (CNAPP) market has consolidated around a two-tier structure: a small
    group of pure-play specialist vendors that compete on breadth and depth of cloud-specific coverage, and a larger group
    of hyperscaler-native tools bundled with cloud subscriptions. Orca Security occupies the upper tier, competing principally
    with Wiz, Palo Alto Networks Prisma Cloud, CrowdStrike Falcon Cloud Security, Aqua Security, Lacework/Fortinet, and Sysdig.
    The second tier, comprising Microsoft Defender for Cloud, AWS Security Hub with GuardDuty, and Google Security Command
    Center, presents a different kind of competitive challenge: lower price points backed by the purchasing leverage of dominant
    infrastructure providers.


    Gartner''s Magic Quadrant for CNAPP—the industry''s most widely cited analyst framework for this market—placed both Orca
    and Wiz as Leaders in the 2024 edition, indicating that both vendors are seen by enterprise buyers as strong and visionary.
    Palo Alto Networks is also frequently cited as a Leader or high-profile Challenger, reflecting its comprehensive platform
    portfolio. G2 peer reviews and Gartner Peer Insights both show Orca and Wiz with high ratings (4.6–4.8 out of 5 range),
    with Wiz having a larger review volume consistent with its faster revenue growth and broader Fortune 100 penetration.
    The competitive landscape is thus not static: deal velocity, partner ecosystem leverage, and the Google-Wiz integration
    represent material shifts in the competitive order that Orca must navigate.

    '
