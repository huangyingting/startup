  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: SideScanning architecture and agentless data acquisition
        blocks:
          - type: paragraph
            body: >
              Orca Security's foundational technical innovation is SideScanning™, described by founder Avi Shua as "an
              MRI for your cloud environment." Rather than deploying software agents inside cloud workloads,
              SideScanning integrates with cloud provider APIs to read the runtime block storage of virtual machines,
              containers, and other cloud assets out-of-band while they are running. The system uses open, read-only
              cloud APIs to access the same bits and bytes the operating system reads and writes, enabling it to
              reconstruct a complete map of a cloud estate's security posture without executing a single opcode within
              the customer environment. Orca holds a patent on this method of agentless cloud workload scanning, which
              the company describes as the industry's first such approach.


              The practical consequences of this architecture are significant. A cloud account can be onboarded and
              fully scanned in minutes rather than the days or weeks required to deploy agents across a large workload
              fleet. There is no performance impact on running workloads because SideScanning operates entirely
              out-of-band. Coverage extends to serverless functions, managed database services, stopped instances, and
              other assets that cannot host conventional agents—a category that is growing rapidly as organizations
              adopt cloud-native architectures. The company claims 100% workload-deep coverage as the baseline outcome
              of a successful account connection.


              Multi-cloud support spans AWS, Azure, Google Cloud Platform (GCP), Oracle Cloud Infrastructure (OCI),
              Alibaba Cloud, and Tencent Cloud, with Kubernetes clusters treated as first-class infrastructure across
              all providers. The SideScanning approach is complemented by the Unified Data Model, which correlates
              findings across infrastructure, workload, identity, and data layers within a single graph-based context
              engine. This cross-layer correlation powers the attack path analysis capability, which surfaces chains of
              risk—called "toxic combinations"—that span misconfigurations, exposed credentials, vulnerable software,
              and identity over-permissions. The context engine uses this correlated view to prioritize what Orca calls
              the "1% of alerts that truly matter," reducing alert fatigue without requiring manual triage.


              Compared to agent-based alternatives, SideScanning provides breadth and speed at the expense of depth in
              individual workload runtime visibility. Agent-based solutions can detect fileless malware and in-memory
              execution in true real time because they run inside the workload; SideScanning operates on snapshots and
              therefore provides near-real-time rather than continuous runtime coverage. Orca acknowledges this
              trade-off in its own public documentation and addresses it through an optional lightweight Orca Sensor for
              Cloud Detection and Response (CDR) use cases requiring true runtime threat detection.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
              - CE008
