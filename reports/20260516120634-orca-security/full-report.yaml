      - number: '8.2'
        title: Financing History & Capital Structure
        blocks:
          - type: paragraph
            body: |
              Orca Security has raised approximately $628 million across five funding events since its
              2019 founding. The financing trajectory reflects accelerating investor conviction during the
              2021–2022 cloud security bull market. The seed round of approximately $6 million in 2019
              seeded product development and early enterprise proofs-of-concept. A Series A of approximately
              $68 million followed in March 2021, enabling headcount scale-up and US go-to-market build.
              The Series B of $210 million at approximately $1.2 billion post-money valuation in November
              2021 was led by ICONIQ Capital and CapitalG, Alphabet's independent growth equity fund,
              providing both strategic validation from a top-tier technology investor and deep enterprise
              distribution contacts. The landmark Series C of $340 million at $1.8 billion post-money
              valuation in October 2022 was led by Singapore sovereign wealth fund Temasek Holdings,
              extending the investor quality to global institutional capital. SEC EDGAR Form D filings
              confirm all rounds were conducted as Regulation D exempt private placements, consistent
              with standard venture capital structuring. Total capital of $628 million implies substantial
              runway from the October 2022 close — estimated at 24–48 months based on benchmark burn
              assumptions — placing a potential next financing event in the 2024–2026 window. The preferred
              share structure and liquidation preference stack are not publicly available and must be
              confirmed in the investor data room before assessing common equity dilution.
            claimRefs:
              - CV001
