      - number: '5.6'
        title: Developer experience, IP portfolio, and engineering culture
        blocks:
          - type: paragraph
            body: >
              Orca's developer-facing toolkit reflects a platform strategy of extending security into the CI/CD pipeline
              and IaC workflows. The primary developer surfaces are: (1) a Terraform provider (orcasecurity/orca on the
              Terraform Registry, MPL-2.0 license, updated May 2026) that enables policy-as-code configuration of Orca's
              scanning policies; (2) a CLI tool (orca-cli, PowerShell-based with a Homebrew formula for macOS) for
              programmatic platform access; (3) six GitHub Actions for shift-left scanning: shiftleft-sast-action
              (static analysis), shiftleft-secrets-action (secret detection), shiftleft-sca-action (software composition
              analysis), shiftleft-fs-action (filesystem scanning), shiftleft-container-image-action (container image
              scanning), and shiftleft-iac-action (infrastructure-as-code scanning, 15 stars); (4) the orca-skills
              repository providing plugins for security workflow acceleration, updated May 14, 2026 with 42 stars.


              Orca's IP portfolio is anchored by the SideScanning patent, which covers the core method of reading cloud
              workload runtime data without agents. The company's About page describes the SideScanning patent as the
              cornerstone of Orca's claim to have "pioneered the path for modern cloud security." The July 2023
              litigation against Wiz asserts that proprietary technical information related to SideScanning was among
              the trade secrets allegedly taken by former employees. This positions the patent as both a competitive
              moat and a litigation asset that the company is actively defending.


              Orca's engineering culture is rooted in the Israeli cybersecurity ecosystem. Both co-founders (Avi Shua
              and Gil Geron) have backgrounds in the Israel Intelligence Corps (Unit 8200) and Check Point Software
              Technologies. The R&D center is in Tel Aviv, consistent with the company's LinkedIn and press materials.
              LinkedIn lists Orca as having 127,000 followers; the company does not publicly disclose headcount, but
              industry estimates and LinkedIn signal suggest an engineering organization of several hundred engineers,
              with a significant portion in Tel Aviv. The $630–650 million in funding raised through the 2022 Series C
              implies substantial R&D capacity.


              Autodesk uses Orca for securing generative AI workloads on AWS, per the Orca case study. Digital Turbine's
              CISO Vivek Menon stated "Orca adds value practically from the first day of use. With other tools, we wait
              months to see value coming from them." Paidy (Japanese fintech) reported saving two FTEs and $500,000 per
              year in cloud security management costs after adopting Orca. These case studies reflect the product value
              proposition—rapid time-to-value from agentless deployment—that the engineering culture appears designed to
              continuously reinforce.
