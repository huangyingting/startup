    title: Market definition table
    columns:
      - segment/category
      - included spend
      - excluded spend
      - buyer/payer
      - relevance to Orca
    rows:
      - - CNAPP (Orca core market)
        - CSPM, CWPP, CIEM, KSPM, DSPM, CDR, AI SPM integrated platforms; full-lifecycle cloud workload security
        - Standalone point solutions (CSPM-only, CWPP-only); EDR; network firewalls; SIEM/SOAR; IAM as standalone
        - CISO (budget owner); security engineering team (evaluator/user); CFO approval for >$500K contracts
        - Direct TAM; Orca's primary competitive arena; GVR $9.79B (2023) → $38.01B (2030)
      - - Cloud security overall (broader context)
        - >-
          CNAPP plus standalone CASB, network security (WAF, DDoS), traditional IAM, cloud-native SIEM, DevSecOps
          tooling
        - Endpoint EDR, on-premise security, physical security, network infrastructure (switches/routers)
        - CISOs, VP Engineering, infrastructure teams; broader IT and operations budget
        - Indirect context; GVR $35.84B (2024); CNAPP is ~27% of cloud security TAM (2023)
      - - CSPM standalone (status-quo substitute)
        - Cloud configuration posture scanning; compliance reporting; misconfiguration detection
        - Workload protection, identity entitlements, runtime detection, data security
        - Cloud architects, DevOps teams, GRC managers
        - Direct substitute for Orca's CSPM capability; hyperscalers offer native CSPM at low/no incremental cost
      - - CWPP standalone (status-quo substitute)
        - Virtual machine and container workload protection; agent-based vulnerability scanning
        - Posture management, identity, data, Kubernetes security, runtime orchestration
        - Security operations team, vulnerability management team
        - Direct substitute; Orca's agentless SideScanning displaces agent-based CWPP by eliminating deployment friction
      - - Hyperscaler native security (status-quo substitute)
        - >-
          AWS Security Hub, Azure Defender for Cloud, Google Cloud SCC; native CSPM and basic workload scanning for
          single-cloud
        - Multi-cloud visibility, CIEM, DSPM, AI SPM, CDR, Kubernetes-native security orchestration
        - DevOps and cloud operations teams; no incremental license cost for cloud customers
        - >-
          Highest-friction substitute; constrains pure-play CNAPP TAM for single-cloud organizations; multi-cloud drives
          Orca need
      - - Point-solution stack (status-quo substitute)
        - >-
          Multiple best-of-breed tools integrated by customer: separate CSPM vendor + CWPP vendor + CIEM vendor +
          compliance tool
        - Integrated risk context, unified data model, automated attack-path analysis
        - Security engineering team; multi-vendor procurement; higher integration and maintenance overhead
        - >-
          Primary displacement opportunity; tool sprawl, alert fatigue, and integration costs drive consolidation to
          CNAPP
      - - GRC/compliance platform (partial substitute)
        - Governance, risk, and compliance audit workflows; regulatory reporting; policy documentation
        - Real-time cloud risk detection, workload protection, identity security, active threat response
        - Compliance officers, legal and risk teams; audit-cycle procurement
        - >-
          Partial substitute for regulatory reporting; does not address real-time detection; Orca's compliance packs
          supplement GRC
      - - Manual cloud security review (status-quo)
        - Ad hoc security assessment by cloud architects; periodic cloud configuration audits; console-based review
        - Continuous monitoring, automated misconfiguration detection, workload vulnerability scanning
        - Cloud architects, DevOps leads; no dedicated security budget line
        - >-
          Lowest bar substitute; Orca displaces by providing continuous automated coverage that manual review cannot
          match at scale
    notes: >-
      Market boundary definitions align with Grand View Research segmentation for cloud security (overall market) and
      CNAPP (platform-specific market). Orca's product capabilities span all CNAPP sub-categories listed above. The
      distinction between status-quo substitutes and the CNAPP TAM is material for sizing: hyperscaler native tools and
      point-solution stacks are outside the CNAPP TAM but inside the broader cloud security market. This distinction
      matters for understanding Orca's true addressable pool vs. competitive pressure sources.
