          CNAPP ROI
        - Quantify Orca's customer cloud account expansion rate; track AWS, Azure, Google Cloud workload growth rates
      - - Data breach cost pressure ($4.4M average per IBM 2025)
        - Driver
        - Ongoing; breach frequency elevated by AI-aided attacker tooling
        - >-
