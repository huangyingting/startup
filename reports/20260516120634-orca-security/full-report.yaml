      - number: '7.5'
        title: Financial and Capital Risks
        blocks:
          - type: paragraph
            body: >-
              Orca Security completed a $340 million Series C financing round in October 2022, co-led by CapitalG
              (Google's growth equity fund) and Coatue Management, at a $1.8 billion post-money valuation. Prior rounds
              include a $210 million Series B in 2021 and a $20 million Series A in 2020, bringing total disclosed
              venture funding to approximately $592 million. As a private company, Orca does not disclose revenue,
              EBITDA, or cash-burn figures publicly. Industry analysts estimate ARR in the range of $100-200 million as
              of late 2024, indicating the company has likely not yet reached operating profitability. The primary
              financial risk is that Orca's $1.8 billion valuation established at the peak of the 2021-2022
              growth-investment cycle may be difficult to maintain or exceed in a 2025-2026 financing environment
              characterized by higher interest rates, compressed SaaS revenue multiples, and LP-driven investor pressure
              for profitability. If ARR growth decelerates below 40-50 percent year-over-year, future financing events
              could occur at flat or down-round valuations, increasing dilution risk for existing shareholders and
              creating talent-retention challenges through underwater option grants. The ongoing Wiz litigation adds an
              uncertain but potentially material cash liability. Current comparable public company revenue multiples for
              cloud security platforms suggest Orca needs at least $120-180 million in ARR to support a $1.8 billion
              valuation, a threshold at the lower bound of analyst estimates that leaves limited margin for growth-rate
              misses or market-share losses to Wiz and platform security vendors.
