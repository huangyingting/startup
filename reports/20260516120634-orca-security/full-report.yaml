  - id: FV001
    type: range
    title: Valuation / Return Range
    insight: >-
      Orca's three exit scenarios span a $0.9B bear case to a $5B bull case, with the $1.5B–$2.5B base-case acquisition
      range most probable given competitive dynamics and M&A activity in cloud security. The current $1.8B mark sits
      within the base case, implying limited downside protection at entry but moderate upside in a strategic sale.
    data:
      items:
        - label: Bear Case (down-round / stasis)
          low: 0.9
          mid: 1.2
          high: 1.5
        - label: Base Case (strategic acquisition)
          low: 1.5
          mid: 2
          high: 2.5
        - label: Bull Case (IPO / premium acquisition)
          low: 3
          mid: 4
          high: 5
    approximationNotes: >-
      Ranges in USD billions. Low/high endpoints represent analyst scenario bounds; mid is the probability-weighted
      midpoint estimate. All values are forward-looking exit scenarios, not current marks.
    claimRefs:
      - CV024
      - CV025
      - CV026
  - id: FV002
    type: kpi
    title: Investment KPIs
    insight: >-
      Six headline investment KPIs confirm Orca's scale as a late-stage venture asset while exposing the critical data
      gap — ARR and revenue multiple remain ranges rather than confirmed figures, preventing full conviction at the
      current valuation.
    data:
      items:
        - label: Last Round Valuation
          value: $1.8B
          status: confirmed
          note: Series C, October 2022 (Temasek-led)
        - label: Total Capital Raised
          value: ~$628M
          status: confirmed
          note: Seed through Series C (PitchBook / About page)
        - label: Lead Series C Investor
