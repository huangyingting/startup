      - number: '6.5'
        title: Expansion Revenue & Concentration Risk
        blocks:
          - type: paragraph
            body: >-
              Orca's expansion motion is fundamentally tied to cloud infrastructure growth: the platform is typically
              licensed on a per-cloud-account or per-workload basis, meaning that as customers add AWS accounts, Azure
              subscriptions, or GCP projects, Orca's ARR from those accounts grows commensurately without requiring a
              new sales cycle. This creates a natural expansion engine aligned with the secular trend toward larger
              cloud footprints among enterprise customers. Contract sizes disclosed in investor materials suggest a
              mid-market range of approximately $50,000 to $250,000 ARR annually, with enterprise contracts frequently
              exceeding $500,000. Orca's partner ecosystem with AWS, Azure, GCP, and major technology integrators
              further supports expansion by creating co-sell pipelines and embedding Orca within broader cloud
              procurement conversations. The primary concentration risk is Orca's dependence on large enterprise
              accounts: if even a handful of $500,000-plus annual contracts churn to competitors—most notably Wiz—the
              revenue impact would be disproportionately significant. Orca's publicly disclosed intellectual property
              and trade secret litigation with Wiz underscores the intensity of the competitive rivalry and highlights
              the risk that competitive dynamics could accelerate enterprise churn decisions. Net revenue retention rate
              is not publicly disclosed by Orca, which represents a meaningful gap in the diligence picture and limits
              the ability to assess expansion health quantitatively.
            claimRefs: []
  - number: 7
    title: Risks
