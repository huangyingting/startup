      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - Actual ARR and growth rate
        - Orca has not disclosed ARR publicly; analyst range $100–200M is too wide for valuation conviction
        - >-
          Anchors revenue multiple; determines whether $1.8B mark is 9x or 18x ARR; the difference is the difference
          between fair value and overvaluation
        - Request audited ARR, ACV, and year-over-year growth rate from investor data room
      - - Net Revenue Retention (NRR)
        - NRR not disclosed; assumed 100–120% from peer benchmarks but unverified
        - Determines expansion vs. churn balance; NRR below 100% would dramatically change the bull case
        - Request NRR and GRR cohort curves from data room; cross-reference with named account expansions
      - - Cap table and liquidation preference stack
        - Preferred share structure, seniority, and total preference overhang not publicly available
        - Affects realized exit proceeds at $1.5B base case; heavy preference could impair common equity recovery
        - Request full capitalization table, CPAS, and any secondary transaction marks from counsel
      - - Status and exposure of Wiz litigation
        - July 2023 lawsuit filed; no public resolution as of May 2026; damages and injunctive relief scope unknown
        - IP restrictions or damages could impair SideScanning product and create investor overhang
        - Monitor court docket at PACER; request outside counsel litigation assessment and exposure estimate
    notes: >-
      Diligence asks represent minimum gating requirements before underwriting a primary investment at the current $1.8B
      valuation mark. Secondary-market positions should also obtain cap table and litigation data before trading.
