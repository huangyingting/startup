          points
      - - Zero-trust mandates (NIST CSF 2.0, U.S. EO June 2025)
        - Driver
        - Near-term acceleration (2025–2026 federal; commercial lagging 12–18 months)
        - >-
          Regulated sector and government contractors require zero-trust-aligned cloud security; Orca's CIEM and access
          visibility align with zero-trust architecture requirements
        - Verify whether Orca has released a zero-trust alignment whitepaper or compliance mapping document
      - - Regulatory compliance (HIPAA, PCI-DSS, GDPR, NIS2, FedRAMP)
        - Driver
        - Ongoing; NIS2 full enforcement through 2025–2026; FedRAMP pipeline building
        - >-
          Compliance mandates create non-discretionary security budget; Orca's compliance packs directly address HIPAA
          and PCI; FedRAMP gap limits government opportunity
        - >-
