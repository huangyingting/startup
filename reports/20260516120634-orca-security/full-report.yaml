              The November 2021 round of $210 million, typically referenced as the extended Series B in later reporting,
              was led by Tiger Global and Accel, with GGV Capital, ICONIQ Growth, and others participating, at a $1.2
              billion post-money valuation. The October 2022 Series C of $340 million was led by CapitalG (Alphabet's
              independent growth fund) and T. Rowe Price, with Temasek, CapitalG, and additional financial investors
              bringing the post-money valuation to $1.8 billion. Orca's about page states "nearly $630 million in
              combined funds at a $1.8 billion valuation," while Forbes reports $650 million raised; both anchor the
              $1.8 billion post-money valuation. No subsequent round has been publicly announced as of the research date
