      - number: '8.4'
        title: Bull / Base / Bear Scenarios
        blocks:
          - type: paragraph
            body: |
              Three exit scenarios capture the distribution of outcomes for an investment in Orca Security
              at the current $1.8 billion mark. The bull case envisions a $3.0B–$5.0B exit via IPO or
              premium strategic acquisition, requiring Orca to achieve $250–350 million ARR, demonstrate
              NRR above 115%, and benefit from a reopened IPO market or a contested auction process among
              hyperscaler acquirers. The probability signal for the bull case is low-to-medium, as it
              requires Orca to re-capture competitive momentum against a better-funded Wiz and execute
              a capital-efficient growth path. The base case is a $1.5B–$2.5B strategic acquisition by
              Palo Alto Networks, Cisco, Google, Microsoft, or AWS — any of whom would value Orca's
              installed enterprise base, CNAPP platform, and SideScanning IP as an accelerant for cloud
              security product portfolios. At $150–200 million ARR, an 8–12x revenue multiple yields
              $1.2B–$2.4B enterprise value, consistent with the base case range. The probability signal
              is medium, as strategic M&A in cloud security has been active and Orca has the scale and
              investor pedigree to attract a credible buyer. The bear case of $0.9B–$1.5B encompasses a
              down-round or flat financing event in which Wiz's continued market-share dominance erodes
              Orca's enterprise pipeline and ARR growth slows materially. If Orca's ARR stagnates at
              $80–120 million, a 9–10x multiple yields $720M–$1.2B enterprise value — implying a
              meaningful impairment on the $1.8B mark. Downside triggers include adverse litigation
              outcome, CEO execution miss, or continued IPO market closure forcing a bridge round.
            claimRefs:
              - CV009
              - CV012
              - CV024
              - CV025
              - CV026
              - CV031
              - CV033
              - CV034
              - CV042
