          tone: positive
        - id: sidescanning
          label: Agentless SideScanning coverage
          detail: SideScanning reads cloud-workload snapshots without performance impact; broad coverage per account.
          tone: positive
        - id: platform_license
          label: Annual platform subscription
          detail: Recurring license fee scales with number of cloud accounts and/or assets covered.
          tone: positive
        - id: module_upsell
          label: Compliance and AI module add-ons
          detail: Incremental license fees for compliance packs (SOC 2, GDPR, HIPAA) and AI-SPM module.
          tone: neutral
        - id: marketplace
          label: Cloud marketplace distribution
          detail: AWS, GCP, Azure marketplace listings reduce procurement friction; marketplace take-rate reduces net revenue.
          tone: neutral
        - id: gross_profit
          label: Gross profit pool
          detail: >-
            Estimated gross margin 70–80% based on SaaS comp benchmarks; actual margin undisclosed. Pure-software
            delivery means no hardware COGS.
          approximationNotes: Gross margin estimated from CrowdStrike/Palo Alto Networks SaaS benchmarks; not confirmed by Orca.
          tone: positive
