        title: Severity-Ranked Risk Register
        blocks:
          - type: paragraph
            body: >-
              Orca Security operates at the intersection of rapid market growth and intense competitive pressure in the
              cloud-native application protection platform (CNAPP) segment. The company's risk profile is shaped by its
              position as an agentless cloud security pioneer now contending with well-capitalized competition, active
              intellectual property litigation, and mounting regulatory complexity across multiple jurisdictions. The
              severity-ranked risk register assigns composite scores on a 1-10 scale based on likelihood of occurrence
              within a 24-month horizon and potential financial or strategic impact on the business. Competitive
              displacement by Wiz receives the highest severity rating of 9 out of 10 given Wiz's capital advantage of
              over $1 billion raised at a $12 billion valuation and its estimated ARR lead of approximately $300 million
              versus Orca's estimated $100-200 million. Active IP litigation from the July 2023 trade secret lawsuit
              rates 8 out of 10, combining management distraction, legal spending, and reputational exposure. Market
              commoditization by AWS Security Hub, Microsoft Defender for Cloud, and GCP Security Command Center rates 7
              out of 10. Financial valuation risk rates 7 out of 10 given the 2022 peak-cycle valuation and compressed
              2025-2026 software multiples. Regulatory compliance complexity and key-person dependency each rate 6 out
              of 10. Operational API dependency rates 5 out of 10 as a moderate but manageable risk. Each risk has
              defined mitigations but carries residual exposure warranting investor and board-level monitoring through
              the 2026 horizon.
