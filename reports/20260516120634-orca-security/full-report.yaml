      - number: '2.4'
        title: Customer and buyer segmentation
        blocks:
          - type: paragraph
            body: >
              Orca Security's ideal customer profile (ICP) centers on enterprise organizations with significant
              multi-cloud deployments — typically organizations with $10 million or more in annual cloud spend across
              two or more hyperscalers. Grand View Research confirms that large enterprises represent over 58% of CNAPP
              market revenue and over 74% of the broader cloud security market, validating the enterprise-first
              go-to-market strategy. These organizations have the cloud complexity, regulatory exposure, and security
              team sophistication to recognize the value of an integrated CNAPP platform over a collection of point
              solutions. Orca's agentless deployment model is particularly advantageous in enterprise environments where
              agent management at scale is operationally expensive — eliminating the deployment friction that
              complicates agent-based alternatives in complex cloud environments.


              By industry vertical, BFSI accounts for over 21% of the CNAPP market — the single largest end-use vertical
              — driven by PCI-DSS, SOX, and GLBA compliance requirements combined with high cloud adoption for core
              banking modernization. Healthcare organizations face HIPAA-mandated technical safeguards for cloud-hosted
              ePHI, creating compliance-driven demand. Technology and SaaS companies, cloud-native by design, require
              KSPM, IaC scanning, and CDR capabilities aligned with DevSecOps workflows. Government and public sector
              represents an emerging segment gated by FedRAMP authorization; Orca's public documentation does not
              confirm FedRAMP authorization as of May 2026, representing a potential gap for government market access.


              Buying patterns follow a CISO-led model with three-to-nine-month deal cycles and proof-of- concept stages.
              Orca's public case studies demonstrate the pattern: Paidy (fintech, multi-cloud visibility, PCI-DSS
              compliance) and Digital Turbine (mobile advertising, rapid deployment) both selected Orca based on
              agentless deployment speed and depth of coverage. Large enterprise accounts tend toward multi-year
              contracts with expansion driven by new cloud account onboarding, vertical-specific compliance pack
              adoption, and new CNAPP capability modules (DSPM, AI SPM, CDR). Budget ownership resides with the CISO,
              with security engineering managers as technical evaluators; CFO and board involvement increases for
              contracts above $500K annually. The path from cloud security awareness to contracted CNAPP deployment
              involves analyst report shortlisting, proof-of-concept evaluation, security engineer sign-off, and CISO
              final approval.
