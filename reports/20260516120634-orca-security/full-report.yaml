          likelihood
      - - Enterprise budget rationalization and vendor consolidation
        - Constraint
        - Cyclical; elevated 2024–2025; recurring in economic slowdowns
        - >-
          CISOs consolidating to fewer vendors favor platform vendors with broader coverage over pure-play CNAPP; may
          compress renewal rates
        - >-
