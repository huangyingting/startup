      - number: '7.3'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >-
              Orca Security faces a bifurcated regulatory risk profile spanning data-processor obligations and
              sector-specific compliance requirements. The company's agentless SideScanning technology creates read-only
              snapshots of customer workloads that may contain personally identifiable information, protected health
              information, or financial data, triggering GDPR Article 28 obligations for EU customers including formal
              data processing agreements, data residency controls, and cross-border transfer restrictions. GDPR
              violations can result in administrative fines of up to 4 percent of global annual revenue. HIPAA Business
              Associate Agreements are required for healthcare industry deployments. PCI-DSS data-scope rules apply when
              scanning payment-card processing environments. CCPA consumer privacy obligations arise for
              California-domiciled enterprise customers. Orca has obtained SOC 2 Type II certification and ISO 27001
              compliance and publishes a comprehensive privacy policy governing data handling practices. On the
              litigation front, Orca filed suit in July 2023 in U.S. District Court against Wiz, alleging trade secret
              misappropriation, copyright infringement, and tortious interference. The complaint alleges that Wiz hired
              approximately eight former Orca employees who carried proprietary code and internal knowledge to Wiz's
              product team. Trade secret litigation of this complexity typically requires two to four years to resolve
              and carries legal costs potentially reaching tens of millions of dollars with uncertain outcomes. Orca
              could obtain injunctive relief and monetary damages, lose on the merits, or negotiate a settlement. The
              litigation consumes executive attention and financial resources that could otherwise accelerate product
              development and enterprise sales execution.
