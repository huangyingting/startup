  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segments & Buyer Profile
        blocks:
          - type: paragraph
            body: >-
              Orca Security's primary market is enterprise organizations that operate significant workloads across one
              or more major cloud providers—AWS, Microsoft Azure, and Google Cloud Platform. Within that universe, the
              company has built the deepest traction in five verticals: financial services, including fintechs,
              neo-banks, and traditional institutions modernizing in the cloud; healthcare and life sciences, where
              continuous HIPAA and SOC 2 visibility is a compliance imperative; technology and SaaS, where cloud-native
              builders prioritize developer-friendly security tooling; retail and e-commerce, which carry PCI-DSS-scoped
              cloud workloads; and media and entertainment platforms with content delivery and streaming infrastructure.
              The typical economic buyer is the CISO or VP of Security, while the technical champion is a cloud security
              engineer or DevOps lead. Deals are commonly initiated through proof-of-concept evaluations demonstrating
              Orca's agentless deployment speed—a critical advantage over legacy agent-based tooling for organizations
              managing hundreds of cloud accounts. Orca's product positioning addresses the complexity and scale
              problem: enterprises with dozens to hundreds of ephemeral cloud accounts find that deploying and
              maintaining traditional agents is operationally untenable, making the agentless approach a compelling
              operational and cost upgrade. Technology companies represent the largest concentration of reference
              customers, followed closely by financial services where regulatory mandates accelerate procurement
              decisions.
