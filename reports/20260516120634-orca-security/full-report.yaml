          expansion
      - - DevSecOps adoption and AI SPM category emergence
        - Driver
        - Medium-term mainstream (2025–2028); AI SPM nascent and growing
        - >-
          DevSecOps expands buyer base into developer teams; AI SPM is an incremental TAM expansion opportunity in AI
          workload security
        - >-
          Track adoption of Orca's IaC scanning, CI/CD integration, and AI SPM modules in customer base; assess ARR
          contribution from these modules
      - - Hyperscaler native security tooling (AWS Security Hub, Azure Defender, Google Cloud SCC)
        - Constraint
        - Ongoing; expanding with hyperscaler investment
        - >-
          Single-cloud organizations may default to native tools; constrains pure-play CNAPP addressable pool to
          multi-cloud organizations
        - >-
          Quantify what share of Orca's pipeline is single-cloud vs multi-cloud; assess win/loss rate against native
          tool alternatives
      - - Platform bundling (Palo Alto Prisma Cloud, CrowdStrike Falcon, Cisco)
        - Constraint
        - Near-to-medium term (2024–2027 peak bundling pressure)
        - >-
          Bundled CNAPP at discount compresses Orca's pricing power; enterprises with existing PANW or CRWD contracts
          face high switching cost to Orca
        - >-
          Assess Orca's competitive win rate in deals involving Palo Alto or CrowdStrike incumbents; track average deal
          size trends
      - - Wiz competitive pressure and well-funded pure-play rivals
        - Constraint
        - Ongoing; Wiz $12B valuation (2024) signals sustained investment
        - >-
          Wiz can outspend Orca on go-to-market and product investment; active lawsuit (2023) creates legal overhead and
