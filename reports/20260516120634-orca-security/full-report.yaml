  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary, definition, and status-quo substitutes
        blocks:
          - type: paragraph
            body: >
              The relevant market for Orca Security's analysis is cloud-native application protection platforms (CNAPP)
              — an integrated security category that consolidates Cloud Security Posture Management (CSPM), Cloud
              Workload Protection Platform (CWPP), Cloud Infrastructure Entitlement Management (CIEM), Kubernetes
              Security Posture Management (KSPM), Data Security Posture Management (DSPM), Cloud Detection and Response
              (CDR), and AI Security Posture Management (AI SPM) into a single unified platform. CNAPP sits within the
              broader cloud security market, which encompasses additional categories not included in CNAPP: traditional
              network security (firewalls, web application firewalls, DDoS protection), identity and access management
              (IAM) as a standalone category, Security Information and Event Management (SIEM), Security Operations
              Center (SOC) platforms, Cloud Access Security Brokers (CASB) as standalone tools, and endpoint detection
              and response (EDR). These adjacent categories are excluded from the CNAPP TAM but represent potential
              platform expansion adjacencies for Orca.


              The primary status-quo substitutes that CNAPP displaces are: (1) point-solution stacks where organizations
              deploy separate tools for CSPM, CWPP, and CIEM from different vendors, creating integration and alert
              fatigue overhead; (2) manual cloud security review processes by cloud architects and DevOps teams
              reviewing security configurations in vendor consoles; (3) hyperscaler native security tools including AWS
              Security Hub, Azure Defender for Cloud, and Google Cloud Security Command Center, which provide baseline
              posture management at low incremental cost for single-cloud deployments; and (4) compliance-only tools
              (audit software, GRC platforms) that address regulatory reporting without real-time risk detection. The
              CNAPP value proposition displaces all four by offering continuous, automated, agentless coverage across
              multi-cloud environments with contextualized risk prioritization. Grand View Research and Gartner both
              confirm that CNAPP's displacement of fragmented point solutions is the primary driver of the platform
              category's above-market growth rate (21.8% CAGR vs 13.3% for the broader cloud security market). Adjacent
              spend categories that cloud security overlaps with but does not include in CNAPP TAM include DevSecOps
              tooling, API security gateways, secrets management, and cloud infrastructure entitlement management when
              sold as standalone products.
