    title: Thesis-Break and Kill Triggers Table
    columns:
      - Trigger
      - Observable Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Wiz competitive dominance deepens
        - Wiz captures >50% CNAPP market share per Gartner or IDC; Orca loses multiple named enterprise renewals
        - Material ARR growth deceleration; downward NTM multiple re-rating below 8x
        - Exit or pass; re-evaluate only at entry price implying <6x confirmed ARR
      - - Orca v. Wiz litigation adverse outcome
        - Court orders injunction or >$50M damages against Orca; SideScanning IP restricted
        - Product differentiation impaired; investor confidence hit; funding risk elevated
        - Reassess product roadmap and IP risk; monitor court docket actively
      - - CEO execution miss post-transition
        - ARR growth slows below 20% Y/Y under Gil Geron; engineering or sales leadership attrition >15%
        - Pipeline risk; sales efficiency deterioration; series D pricing pressure
        - Request management reference calls; track LinkedIn headcount quarterly
      - - Down-round or bridge financing
        - Next capital event priced below $1.5B post-money; bridge financing required within 18 months of Series C
        - Market confirmation of overvaluation at $1.8B; prior-round investors potentially losing confidence
        - Accelerate exit if invested; defer entry if not yet committed capital
