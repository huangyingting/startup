      - number: '3.2'
        title: Primary CNAPP competitor profiles
        blocks:
          - type: paragraph
            body: >
              Wiz, founded in 2020 by former Microsoft Azure engineers, reached a $12 billion valuation by mid-2022 and
              was acquired by Google for approximately $32 billion, with the acquisition completing in early 2025. Wiz
              uses an agentless architecture similar to Orca's, scanning cloud environments via API integrations, and
              its Wiz AI-Application Protection Platform spans CSPM, CWPP, KSPM, CIEM, CDR, and AI security. By May 2026
              Wiz claims that more than 50 percent of Fortune 100 companies are customers, giving it superior enterprise
              penetration relative to Orca. Wiz's G2 rating stands at 4.7 out of 5 from 772 or more reviews, above
              Orca's 4.6 from approximately 280 reviews—a gap that reflects both faster commercial execution and the
              marketing leverage of a Google-backed balance sheet.


              Palo Alto Networks Prisma Cloud is the most comprehensive CNAPP platform in the enterprise market,
              recently rebranded as Cortex Cloud and integrated into the broader Cortex AI-powered security operations
              suite. Prisma Cloud supports both agentless and agent-based deployment and covers the full CNAPP surface
              area. Its strength lies in Palo Alto Networks' overall $8 billion-plus security portfolio, which provides
              cross-selling leverage into firewall, endpoint, and network security buyers.


              CrowdStrike Falcon Cloud Security converges endpoint detection and response (EDR) leadership with cloud
              security, following CrowdStrike's dominant position in endpoint security as validated by MITRE ATT&CK
              evaluations. CrowdStrike achieved 100% detection in MITRE's first cloud-specific evaluation, leveraging
              its Falcon sensor for runtime protection while offering agentless CSPM posture management. The platform
              manages intelligence on over 281 adversaries and tracks more than 300 million real-time indicators,
              providing a threat-intelligence depth that pure-play CNAPP vendors have difficulty matching.


              Aqua Security, founded in 2015 and headquartered in Boston and Ramat Gan, focuses on container and
              Kubernetes security and serves over 500 large enterprises. Aqua's platform integrates code-to-cloud
              security across the full development lifecycle, combining agentless and agent-based capabilities. Its
              strength is developer toolchain integration and runtime enforcement. Lacework, now part of Fortinet
              following a 2024 merger, brings ML-based anomaly detection and behavioral analysis to the market. Sysdig,
              built on the open-source Falco project, specializes in runtime security with sub-second threat detection
              for containerized and Kubernetes environments, positioning itself as the real-time detection specialist.
