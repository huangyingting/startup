      - number: '8.5'
        title: Exit Readiness & Liquidity Path
        blocks:
          - type: paragraph
            body: |
              Orca's exit readiness is moderate-to-strong on qualitative factors but constrained by the
              absence of disclosed financial metrics. The Gartner Magic Quadrant Leader designation in
              2024 validates enterprise market acceptance and would support a premium in an IPO S-1
              registration statement or M&A data room. The Temasek, ICONIQ Capital, and CapitalG investor
              syndicate collectively manages trillions in assets under management and has deep relationships
              with strategic acquirers in cloud infrastructure and cybersecurity. These relationships
              meaningfully improve Orca's access to a structured exit process. The five most credible
              strategic acquirers are identified as AWS (cloud security consolidation), Microsoft Azure
              (Defender for Cloud augmentation), Google Cloud (Security Command Center expansion), Palo
              Alto Networks (Prisma Cloud broadening), and Cisco (cloud security platform build). Each
              has the balance sheet and strategic rationale to absorb Orca at the base-case valuation.
              The IPO path is less immediate: the cybersecurity SaaS IPO market has been largely closed
              in 2023–2025, and Orca would need to demonstrate at least $200M ARR with strong NRR and
              positive free-cash-flow trajectory before filing an S-1. The thesis-break and kill triggers
              table codifies the specific observable thresholds that would invalidate the investment case.
              The final diligence asks table enumerates the four data room requests that are gating for
              underwriting this position. Resolution of the Wiz litigation and confirmation of the cap
              table preferred stack are both prerequisites for assessing downside protection.
            claimRefs:
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
