      - number: '7.2'
        title: Competitive and Market Risks
        blocks:
          - type: paragraph
            body: >-
              Orca Security's primary competitive risk originates from Wiz, founded in 2020 by former Microsoft Azure
              security engineers, which has achieved enterprise market penetration arguably surpassing Orca in account
              volume and annual recurring revenue. Wiz's reported approximately $300 million ARR as of mid-2023,
              compared to Orca's estimated $100-200 million, represents a meaningful and widening gap despite Orca's
              first-mover advantage in agentless scanning. Wiz's Series D funding of $300 million at a $10 billion
              valuation in February 2023, and subsequent capital raises bringing total disclosed funding above $1
              billion, creates a capital moat enabling aggressive enterprise sales hiring, deep customer discounting,
              and sustained product investment. Beyond Wiz, Palo Alto Networks Prisma Cloud offers a comprehensive CNAPP
              suite backed by a roughly $65 billion market-cap company with a large installed base. CrowdStrike Falcon
              Cloud Security benefits from integration into a $35 billion-plus endpoint-and-identity platform. Lacework,
              Sysdig, and Aqua Security target mid-market accounts with specialized capabilities. Most significantly,
              AWS Security Hub, Microsoft Defender for Cloud, and Google Security Command Center bundle free or deeply
              discounted CSPM functionality with cloud services, creating structural price competition in the lower-end
              market. Orca's strategic response is to invest in AI-driven attack path analysis, comprehensive API
              security, and a unified CNAPP platform that goes beyond basic CSPM. However, Wiz has launched comparable
              AI features, narrowing Orca's differentiation window and requiring sustained product investment to
              maintain competitive parity across enterprise accounts.
