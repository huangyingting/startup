      the $9.79B CNAPP segment, which in turn contains the ~$5.7B enterprise CNAPP SAM, narrowing to the $300–700M
      near-term SOM heuristic for Orca. Each layer reflects publicly available analyst data or derived estimates, with
      confidence decreasing as the layers narrow.
