        title: Funding history and investor base
        blocks:
          - type: paragraph
            body: >
              Orca Security has raised approximately $630–650 million across five disclosed funding rounds since its
              2019 founding, reaching a post-money valuation of $1.8 billion. The financing history begins with a seed
              round from YL Ventures in 2019, followed by a $20.5 million Series A co-led by YL Ventures and GGV Capital
