  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive landscape overview
        blocks:
          - type: paragraph
            body: >
              The Cloud-Native Application Protection Platform (CNAPP) market has consolidated around a two-tier
              structure: a small group of pure-play specialist vendors that compete on breadth and depth of
              cloud-specific coverage, and a larger group of hyperscaler-native tools bundled with cloud subscriptions.
              Orca Security occupies the upper tier, competing principally with Wiz, Palo Alto Networks Prisma Cloud,
              CrowdStrike Falcon Cloud Security, Aqua Security, Lacework/Fortinet, and Sysdig. The second tier,
              comprising Microsoft Defender for Cloud, AWS Security Hub with GuardDuty, and Google Security Command
              Center, presents a different kind of competitive challenge: lower price points backed by the purchasing
              leverage of dominant infrastructure providers.


              Gartner's Magic Quadrant for CNAPP—the industry's most widely cited analyst framework for this
              market—placed both Orca and Wiz as Leaders in the 2024 edition, indicating that both vendors are seen by
              enterprise buyers as strong and visionary. Palo Alto Networks is also frequently cited as a Leader or
              high-profile Challenger, reflecting its comprehensive platform portfolio. G2 peer reviews and Gartner Peer
              Insights both show Orca and Wiz with high ratings (4.6–4.8 out of 5 range), with Wiz having a larger
              review volume consistent with its faster revenue growth and broader Fortune 100 penetration. The
              competitive landscape is thus not static: deal velocity, partner ecosystem leverage, and the Google-Wiz
              integration represent material shifts in the competitive order that Orca must navigate.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
