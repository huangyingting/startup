      - number: '2.3'
        title: Growth drivers, regulatory tailwinds, and market constraints
        blocks:
          - type: paragraph
            body: >
              Four structural forces drive sustained expansion of the cloud security and CNAPP market. First,
              multi-cloud and hybrid cloud adoption has dramatically expanded enterprise attack surfaces; AWS
              documentation explicitly positions cloud-native security as foundational to migration strategy. Second,
              data breach costs — $4.4 million global average per IBM's 2025 report — create sustained CFO-level
              pressure to increase security investment. AI-aided detection saves organizations $1.9 million versus
              non-AI peers, creating pull-through demand for AI-integrated CNAPP capabilities. Third, zero-trust
              mandates from U.S. executive orders and NIST's Cybersecurity Framework 2.0 compel regulated-sector
              investment in cloud security — a U.S. EO signed June 6, 2025 charges NIST and federal agencies to further
              strengthen cybersecurity posture. Fourth, DevSecOps practices and AI workload proliferation expand the
              CNAPP buyer base into developer teams and AI infrastructure teams, structurally growing the addressable
              pool and expanding per-seat economics. Cloud Security Alliance blog coverage confirms cloud
              misconfigurations as a persistent primary attack vector.


              Regulatory compliance mandates are the single most durable budget driver in enterprise security. HIPAA
              requires covered healthcare entities to implement technical safeguards for ePHI in cloud, creating direct
              mandates for access controls and audit capabilities. PCI-DSS v4.0 mandates continuous vulnerability
              scanning and configuration monitoring; fewer than 50% of organizations maintain full PCI compliance
              year-over-year, driving persistent compliance automation demand. GDPR and CCPA impose data protection and
              breach notification requirements that CNAPP DSPM capabilities directly address. NIST CSF 2.0 and U.S.
              executive orders formalize zero-trust for federal agencies. The EU's NIS2 Directive extends cybersecurity
              risk management obligations to essential entities across energy, banking, healthcare, and digital
              infrastructure. FedRAMP authorization opens government procurement for qualifying cloud vendors. Google
              Cloud's and AWS's compliance documentation both confirm that cloud shared-responsibility models require
              customers to own their application and data security layers — exactly the CNAPP value proposition.


              Market headwinds constrain the rate of CNAPP adoption and compress pure-play vendor margins. Hyperscaler
              native tools (AWS Security Hub, Azure Defender, Google Cloud SCC) provide baseline CSPM at low incremental
              cost for single-cloud deployments, constraining the addressable pool for pure-play CNAPP. Platform
              bundling by Palo Alto Networks Prisma Cloud and CrowdStrike Falcon Cloud Security allows these vendors to
              price CNAPP below standalone rates when cross-sold with existing enterprise contracts. Wiz's $12 billion
              valuation and $1 billion funding round (2024) signals an exceptionally funded pure-play rival that can
              sustain aggressive pricing and go-to-market investment. Enterprise budget rationalization cycles benefit
              platform consolidators over specialized point solutions. CSPM commoditization is a medium-term structural
              risk as hyperscalers expand native capabilities.
