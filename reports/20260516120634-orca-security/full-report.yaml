chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and business model
        blocks:
          - type: paragraph
            body: >
              Orca Security was incorporated in 2019 and is headquartered in Portland, Oregon, with additional offices
              in Tel Aviv and London. The company describes itself as the pioneer of agentless cloud security and frames
              its core mission as empowering organizations to thrive securely in the cloud. That mission is
              operationalized through a Cloud-Native Application Protection Platform (CNAPP) built on proprietary
              SideScanning™ technology, which reads cloud workload runtime data by integrating with cloud provider APIs
              rather than deploying agents inside workloads. The name "Orca" derives from the orca whale, whose sonar
              capabilities mirror the company's claim of scanning cloud environments deeply and widely with minimal
              operational impact.


              The business model is SaaS-based, sold primarily to enterprise and mid-market security teams responsible
              for multi-cloud environments. Orca competes in the CNAPP market alongside Wiz, Palo Alto Networks Prisma
              Cloud, CrowdStrike Falcon Cloud Security, and others. The company's value proposition centers on three
              principles it calls the "3 Cs": Comprehensive coverage of all cloud assets, Coverage without friction
              through agentless deployment, and Contextualized risk assessment that prioritizes the 1% of alerts that
              matter most. LinkedIn describes the company as the "agentless cloud security pioneer for AWS, Azure,
              Google Cloud, Kubernetes," with 127,000 followers as of the research date.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
              - CO006
