      - number: '5.5'
        title: Technical limitations and competitive risk factors
        blocks:
          - type: paragraph
            body: >
              The core architectural trade-off in Orca's SideScanning approach is well-documented even in Orca's own
              public materials: agentless security provides near-real-time rather than true real-time monitoring. Orca's
              agentless-vs-agent blog post states explicitly that "agentless solutions provide visibility through
              snapshots of cloud environments" and that "while providing organizations with near-real-time intelligence,
              it includes a slight delay and doesn't occur in actual time." This means that a threat actor who
              compromises a workload and performs lateral movement within a single scanning cycle may not be detected
              until the next snapshot is processed.


              A related limitation is ephemeral container coverage. Containers that spin up and terminate within a
              single scanning interval—which can be measured in hours for snapshot-based platforms—may not be fully
              captured. As Kubernetes and serverless workloads become shorter-lived, this gap grows in practical impact.
              Orca does address idle, stopped, and orphaned workloads that agent-based solutions often miss, but the
              direction of coverage asymmetry differs between the two approaches.


              Agent-based alternatives can detect fileless execution and in-memory attacks in runtime—threat techniques
              that manipulate memory without touching disk, making them invisible to snapshot-based scanners. Orca's own
              competitive guide acknowledges this capability gap and positions it as a trade-off that most enterprise
              cloud environments are willing to accept in exchange for deployment simplicity and breadth. The optional
              Orca Sensor addresses this for organizations requiring CDR, but it requires deployment and introduces the
              operational overhead that agentless scanning was designed to eliminate.


              Competitive risk is significant. Wiz—Orca's closest comparable competitor—surpassed Orca in valuation by
              mid-2024, reaching a reported $32 billion versus Orca's last-known $1.8 billion from the 2022 Series C.
              The July 2023 trade secret and copyright infringement lawsuit filed by Orca against Wiz alleges that Wiz
              hired former Orca employees who took source code and proprietary technical information; as of May 2026, no
              public resolution of this litigation has been reported. This case introduces IP uncertainty that diligence
              should probe.


              G2 user reviews of the Orca platform (280+ reviews, 4.6/5 overall) include feedback mentioning scanning
              latency, alert volume management, and the learning curve for new users navigating the unified platform.
              Gartner Peer Insights rates Orca at 4.8/5, with implementation time averaging approximately one month per
              G2's aggregate data. These user signals confirm that the platform is well-regarded overall but that the
              snapshot model generates specific user experience friction that Wiz (also agentless but with a different
              underlying architecture) and other competitors actively address in their positioning.
            claimRefs:
              - CE035
              - CE036
              - CE037
              - CE038
              - CE039
              - CE040
