      - number: '7.4'
        title: Operational and Technology Risks
        blocks:
          - type: paragraph
            body: >-
              Orca's agentless SideScanning architecture is simultaneously its primary competitive differentiator and
              its most critical operational dependency. The technology creates ephemeral read-only snapshots of customer
              cloud workloads via hyperscaler APIs, specifically the AWS EC2 CreateSnapshot mechanism, Azure Managed
              Disk export capability, and GCP persistent-disk snapshot interface, without deploying agents on individual
              hosts. Any breaking API changes, access policy restrictions, or rate-limiting measures introduced by AWS,
              Azure, or GCP could simultaneously disrupt scanning functionality across Orca's entire customer base.
              Unlike an agent-based product where a provider change affects only new deployments, an API deprecation at
              a major cloud provider could trigger widespread customer impact instantaneously. A secondary operational
              risk arises from data-pipeline reliability at scale. Orca processes cloud environment telemetry across
              many concurrent customer tenants and processing delays or outages could result in missed threat detections
              or late alerts, directly undermining the continuous-visibility value proposition. Customer SLA commitments
              create financial exposure in outage events. Additionally, as Orca expands into runtime security
              capabilities including container runtime protection and Kubernetes posture management, agent-based
              components have been introduced which partially undercut the agentless messaging and add deployment,
              versioning, and compatibility management overhead. Key-person risk centers on co-founders Avi Shua as CEO
              and Gil Geron as CTO, whose technical vision and enterprise relationships are deeply embedded in the
              product roadmap and top-tier customer engagement. Departure of either co-founder would significantly
              disrupt product direction and top-tier customer retention.
