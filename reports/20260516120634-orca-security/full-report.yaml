        title: Leadership and organizational structure
        blocks:
          - type: paragraph
            body: >
              Orca Security was co-founded by Avi Shua and Gil Geron, both of whom bring deep Israeli cybersecurity
              lineage from Check Point Software Technologies and IDF Unit 8200. Avi Shua served as CEO from founding in
              2019 until March 2023, when he transitioned to Chief Innovation Officer, remaining responsible for
              technical strategy and the SideScanning and Unified Data Model architectures. Gil Geron, who was Chief
              Product Officer during the same period, assumed the CEO role in March 2023 and has led the company since.
              Orca's official materials describe Geron as having more than twenty years of cybersecurity product
              leadership experience.


              The broader leadership team includes Raf Chiodo (CRO, formerly at Lacework and Dell/EMC), Gera Dorfman
              (CPO, formerly VP of Network Security Products at Check Point), Oded Edri (CFO, formerly Chief Accounting
              Officer at Payoneer and CFO at MakerBot), Yoav Alon (CTO, former Unit 8200 researcher and security
              architect at Check Point), Rachel Nislick (CMO, formerly at Darktrace, Mimecast, and Veracode), and Gal
              Tanchelson (SVP HR, background at Check Point and Payoneer). The heavy Check Point alumni density across
              engineering, product, and HR reflects the founders' origins and may represent a key-person concentration
              at the functional leadership level even beyond the co-founders.
