      - number: '1.2'
        title: SideScanning technology and CNAPP platform
        blocks:
          - type: paragraph
            body: >
              Orca's core technical differentiator is SideScanning™, a patent-pending (now patented) technology that
              performs deep workload inspection by reading cloud provider block storage snapshots or out-of-band data
              exports rather than installing agents on virtual machines or containers. This approach eliminates
              deployment friction, avoids performance impact on production workloads, and enables coverage of cloud
              assets that cannot run conventional agents such as serverless functions and managed database services. The
              company claims 100% workload-deep coverage within minutes of connecting a cloud account.


              The CNAPP platform integrates capabilities that would otherwise require separate point solutions: Cloud
              Security Posture Management (CSPM), Cloud Workload Protection Platform (CWPP), Kubernetes Security Posture
              Management (KSPM), Cloud Infrastructure Entitlement Management (CIEM), Data Security Posture Management
              (DSPM), AI Security Posture Management (AI SPM), Cloud Detection and Response (CDR), vulnerability
              management, API security, and compliance reporting. The Unified Data Model underpins cross-capability
              context, enabling the platform's attack-path analysis to surface chains of risk that individual point
              solutions would miss. Multi-cloud coverage spans AWS, Azure, Google Cloud, Kubernetes, and Oracle Cloud
              Infrastructure (OCI).
