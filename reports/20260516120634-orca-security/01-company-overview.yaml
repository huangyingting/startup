  - id: section-4
    title: Funding history and investor base
    body: >
      Orca Security has raised approximately $630–650 million across five disclosed funding rounds
      since its 2019 founding, reaching a post-money valuation of $1.8 billion. The financing
      history begins with a seed round from YL Ventures in 2019, followed by a $20.5 million Series A
      co-led by YL Ventures and GGV Capital in March 2020. A $55 million round led by ICONIQ Growth
      with participation from YL Ventures, GGV Capital, and the SVCI (a group of CISOs) closed in
      approximately April 2021. Orca's own blog described this as a "Series B" at the time; the
      total raised to that point was reported as exceeding $82 million.


      The November 2021 round of $210 million, typically referenced as the extended Series B in
      later reporting, was led by Tiger Global and Accel, with GGV Capital, ICONIQ Growth, and others
      participating, at a $1.2 billion post-money valuation. The October 2022 Series C of $340
      million was led by CapitalG (Alphabet's independent growth fund) and T. Rowe Price, with
      Temasek, CapitalG, and additional financial investors bringing the post-money valuation to
      $1.8 billion. Orca's about page states "nearly $630 million in combined funds at a $1.8 billion
      valuation," while Forbes reports $650 million raised; both anchor the $1.8 billion post-money
      valuation. No subsequent round has been publicly announced as of the research date in May 2026.
    claimRefs:
