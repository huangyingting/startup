company:
  name: Orca Security
chapter:
  number: 1
  title: Company Overview
  summary: >-
    Orca Security is a Portland, Oregon–based cloud security company founded in 2019 by Avi Shua and
    Gil Geron. Its patented SideScanning™ technology delivers agentless Cloud-Native Application
    Protection Platform (CNAPP) capabilities across AWS, Azure, Google Cloud, and Kubernetes without
    deploying agents. The company raised approximately $630–650 million across five rounds, reaching a
    $1.8 billion valuation with the October 2022 Series C. A July 2023 lawsuit against rival Wiz for
    copyright infringement and trade secret theft is the most material adverse event on record. Gartner
    named Orca a Magic Quadrant Leader for CNAPP in 2024.
sections:
  - id: section-1
    title: Identity, mission, and business model
    body: >
      Orca Security was incorporated in 2019 and is headquartered in Portland, Oregon, with additional
      offices in Tel Aviv and London. The company describes itself as the pioneer of agentless cloud
      security and frames its core mission as empowering organizations to thrive securely in the cloud.
      That mission is operationalized through a Cloud-Native Application Protection Platform (CNAPP)
      built on proprietary SideScanning™ technology, which reads cloud workload runtime data by
      integrating with cloud provider APIs rather than deploying agents inside workloads. The name
      "Orca" derives from the orca whale, whose sonar capabilities mirror the company's claim of
      scanning cloud environments deeply and widely with minimal operational impact.


      The business model is SaaS-based, sold primarily to enterprise and mid-market security teams
      responsible for multi-cloud environments. Orca competes in the CNAPP market alongside Wiz,
      Palo Alto Networks Prisma Cloud, CrowdStrike Falcon Cloud Security, and others. The company's
      value proposition centers on three principles it calls the "3 Cs": Comprehensive coverage of
      all cloud assets, Coverage without friction through agentless deployment, and Contextualized
      risk assessment that prioritizes the 1% of alerts that matter most. LinkedIn describes the
      company as the "agentless cloud security pioneer for AWS, Azure, Google Cloud, Kubernetes,"
      with 127,000 followers as of the research date.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
  - id: section-2
    title: SideScanning technology and CNAPP platform
    body: >
      Orca's core technical differentiator is SideScanning™, a patent-pending (now patented) technology
      that performs deep workload inspection by reading cloud provider block storage snapshots or
      out-of-band data exports rather than installing agents on virtual machines or containers. This
      approach eliminates deployment friction, avoids performance impact on production workloads, and
      enables coverage of cloud assets that cannot run conventional agents such as serverless functions
      and managed database services. The company claims 100% workload-deep coverage within minutes of
      connecting a cloud account.


      The CNAPP platform integrates capabilities that would otherwise require separate point solutions:
      Cloud Security Posture Management (CSPM), Cloud Workload Protection Platform (CWPP), Kubernetes
      Security Posture Management (KSPM), Cloud Infrastructure Entitlement Management (CIEM), Data
      Security Posture Management (DSPM), AI Security Posture Management (AI SPM), Cloud Detection
      and Response (CDR), vulnerability management, API security, and compliance reporting. The
      Unified Data Model underpins cross-capability context, enabling the platform's attack-path
      analysis to surface chains of risk that individual point solutions would miss. Multi-cloud
      coverage spans AWS, Azure, Google Cloud, Kubernetes, and Oracle Cloud Infrastructure (OCI).
    claimRefs:
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
      - CO014
    tableRefs:
      - TO001
    figureRefs:
      - FO002
  - id: section-3
    title: Leadership and organizational structure
    body: >
      Orca Security was co-founded by Avi Shua and Gil Geron, both of whom bring deep Israeli
      cybersecurity lineage from Check Point Software Technologies and IDF Unit 8200. Avi Shua
      served as CEO from founding in 2019 until March 2023, when he transitioned to Chief Innovation
      Officer, remaining responsible for technical strategy and the SideScanning and Unified Data
      Model architectures. Gil Geron, who was Chief Product Officer during the same period, assumed
      the CEO role in March 2023 and has led the company since. Orca's official materials describe
      Geron as having more than twenty years of cybersecurity product leadership experience.


      The broader leadership team includes Raf Chiodo (CRO, formerly at Lacework and Dell/EMC),
      Gera Dorfman (CPO, formerly VP of Network Security Products at Check Point), Oded Edri (CFO,
      formerly Chief Accounting Officer at Payoneer and CFO at MakerBot), Yoav Alon (CTO, former
      Unit 8200 researcher and security architect at Check Point), Rachel Nislick (CMO, formerly at
      Darktrace, Mimecast, and Veracode), and Gal Tanchelson (SVP HR, background at Check Point and
      Payoneer). The heavy Check Point alumni density across engineering, product, and HR reflects
      the founders' origins and may represent a key-person concentration at the functional leadership
      level even beyond the co-founders.
