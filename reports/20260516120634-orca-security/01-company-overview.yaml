  - id: section-5
    title: Market position, recognition, and adverse events
    body: >
      Orca has earned external validation from analyst and peer-review platforms. Gartner named Orca
      Security a Leader in its 2024 Magic Quadrant for Cloud-Native Application Protection Platforms
      (CNAPP). On G2, the product carries a 4.6/5 rating from more than 280 reviews as of the
      research date. The case studies listing page notes a Gartner score of 4.8/5. Orca was included
      on the Forbes Cloud 100 in 2022 and received the AWS Global Security Partner of the Year award
      for 2022. In January 2025 the company became the first pure-play CNAPP vendor to achieve AWS
      ISV Accelerate status, which provides co-sell support with AWS's field sales teams.


      The single most material adverse event in Orca's public record is a lawsuit filed in July 2023
      against competitor Wiz, alleging copyright infringement and trade secret theft. Dark Reading
      reported that Orca accused Wiz of hiring former Orca employees who allegedly took source code
      and proprietary technical information. The claim is material to diligence because Wiz has
      surpassed Orca in public valuation metrics (Wiz reached a $32 billion valuation by mid-2024)
      and the litigation reflects the intensity of the competitive rivalry between the two companies.
      An earlier adverse signal occurred in April 2021 when Palo Alto Networks sent Orca a cease-
      and-desist over a product comparison, which Orca publicly rejected; Orca's blog characterized
      this as a competitive attempt to suppress a factual benchmark rather than a substantive legal
      threat. Both events are documented in the milestone table and represent distinct adverse
      evidence categories—competitor litigation and competitive pressure from an incumbent—that later
      chapters should treat as live diligence items.
    claimRefs:
