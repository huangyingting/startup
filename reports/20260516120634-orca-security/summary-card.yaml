  topStrengths:
    - >-
      Patented SideScanning™ technology enables genuinely agentless cloud security with near-zero deployment friction, a
      defensible technical moat that drove early enterprise adoption across Autodesk, Robinhood, and Databricks.
    - >-
      Broad CNAPP platform spanning CSPM, CWPP, CIEM, DSPM, Container Security, AI SPM, and CDR in a single Unified Data
      Model reduces enterprise integration overhead relative to point-solution stacks.
    - >-
      Strong blue-chip customer logos and public case studies from Autodesk, Robinhood, Databricks, and DigitalOcean
      provide reference quality above early-stage peers.
    - >-
      $630–650M raised from ICONIQ Growth, GGV Capital, Tiger Global, Capital One Ventures, and Salesforce Ventures
      provides extended runway through a down-market.
  topRisks:
    - >-
      Wiz raised $1B+ at a $12B+ valuation with ~$300M estimated ARR vs. Orca's ~$100–200M, representing a growing
      capital and revenue gap that threatens Orca's enterprise win rate in competitive deals.
    - >-
      Active July 2023 trade-secret and copyright-infringement lawsuit against Wiz creates material legal liability,
      management distraction, and potential damages; litigation outcome is binary and unquantifiable.
    - >-
      $1.8B Series C mark (October 2022) was set at peak multiples; no new public round since 2022 leaves significant
      down-round or mark-to-market risk if market conditions force a raise.
    - >-
      Structural regulatory risk for EU-domiciled and regulated-industry customers using agentless read-only cloud
      scanning under GDPR, PCI-DSS, and HIPAA; privacy-by-design model must be continuously validated as regulatory
      enforcement evolves.
    - >-
      Cloud-provider API dependency creates single-point-of-failure risk if AWS, Azure, or GCP restrict or change the
      APIs that SideScanning relies on.
  unresolvedGaps:
    - >-
      Audited consolidated financials (ARR, revenue growth, gross margin, operating loss, cash runway) are not public;
      all estimates are inferred from press coverage and analyst commentary.
    - >-
      Litigation outcome and total potential damages from the Wiz trade-secret lawsuit are unquantifiable without court
      filings beyond the public record.
    - >-
      Cap table, preference stack, and liquidation waterfall post-Series C are not disclosed; investor protection terms
      are unknown.
    - Customer retention (NRR, GRR, churn) and expansion revenue dynamics are not publicly disclosed.
    - >-
      Leadership stability post-2022 funding peak and any cost-reduction measures (layoffs, hiring freezes) are not well
      documented publicly.
