summary:
  headline: >-
    Orca Security is the agentless CNAPP pioneer under existential competitive pressure from Wiz; its $1.8B Series C
    mark is at severe risk of markdown given Wiz's 3x estimated ARR lead, active IP litigation, and a financing
    environment that has penalised cybersecurity late-stage rounds since 2022.
