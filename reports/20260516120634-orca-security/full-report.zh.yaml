      - number: '6.3'
        title: 具名客户验证点
        blocks:
          - type: paragraph
            body: >-
              Orca 已拿下并公开披露一组有分量的企业客户标识，验证产品适用于复杂多云环境。Autodesk 这家设计和制造软件公司采用 Orca 保护横跨 AWS 和 Azure
              的多云环境，并称部署速度和全面可见性是它相对传统代理方案选择 Orca 的关键标准。 Robinhood 这家金融科技交易平台部署 Orca，是为了在快速扩展的云原生基础设施中满足金融监管合规要求；
              在这种环境下，代理开销在运营上不可行。领先的数据湖仓平台 Databricks 使用 Orca， 为支撑企业数据工作负载的大规模 AWS 和 Azure 部署做云安全。云基础设施提供商 DigitalOcean
              借助 Orca 的无代理平台保护自身云环境；对一家专业构建并运营云基础设施的公司来说，这是值得注意的背书。 Check Point Software 作为全球最大的网络安全厂商之一，也是公开提及的 Orca
              客户； 考虑到更广泛安全平台领域的竞争动态，这一点尤其重要。这些案例研究托管在 Orca 官网， 并被投资人材料和新闻报道引用，因此其真实性和深度具备合理可信度。
