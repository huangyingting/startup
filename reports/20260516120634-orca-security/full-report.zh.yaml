      - number: '8.3'
        title: 估值框架与可比分析
        blocks:
          - type: paragraph
            body: |
              Orca 的 $1.8 billion 估值用收入倍数框架评估，基准是公开云安全可比公司
              和已披露私募轮数据点。主要公开可比公司是 CrowdStrike、Palo Alto Networks
              （Prisma Cloud）和 Qualys。截至 2025 年初，CrowdStrike 约以 22x
              未来十二个月收入交易，反映其市场领先平台地位和更优增长率。
              Palo Alto Networks 的云安全业务板块约以 12x NTM 交易，受公司整体组合
              混合倍数约束。Qualys 约以 12x NTM 交易，为规模化纯态势管理
              厂商提供底部参照。同业中位数 12–15x NTM 意味着，若 Orca ARR 落在
              $100M–$200M 区间，公允价值范围为 $1.2B–$3.0B；也就是说，$1.8B 估值
              在 ARR 估算高端站得住脚，在低端则偏激进。最相关的私人可比公司是 Wiz，
              它在 2024 年 6 月以 $12 billion 估值融资。Wiz 约 24x ARR 倍数反映其在
              CNAPP 细分的市场份额领导地位，也表明 Orca 因第二名位置而承受有意义的折价。
              IDC 预计云安全市场到 2026 年达到 $77 billion，MarketsandMarkets 预计
              CAGR 为 17.5%，二者都支撑成长型股权投资倍数的市场增长部分。
              Statista 的云安全市场规模测算提供第三个分析锚点：2026 年 $62 billion。
              可比估值表用公开数据尽可能完整覆盖最相关的公开和私人基准；除另有说明外，
              私人公司 ARR 数字均为分析师估计。
