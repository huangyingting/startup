  - id: FM003
    title: 买方 / 细分市场地图
    type: matrix
    layout: wide
    summary: >-
      矩阵将主要 CNAPP 买方细分市场映射到买方画像、合规驱动、采购模式和 Orca 产品匹配度。矩阵显示，BFSI 和医疗健康由强制合规（PCI-DSS、HIPAA）驱动，是匹配度最高的细分；技术 / SaaS 由
      DevSecOps 采用驱动，是增长最高的细分。政府 / 公共部门潜力高，但受 FedRAMP 授权状态卡住。
    data:
      columns:
        - 合规 / 监管驱动
        - 采购模式
        - 主要能力需求
        - Orca 匹配评估
      rows:
        - label: BFSI 企业
          values:
            - PCI-DSS v4.0；SOX；GLBA；OFR 云指南；SWIFT CSP
            - 年合同 $500K–$2M+；CISO 主导；6–9 个月周期；偏好多年期
            - PCI 持卡人数据环境扫描；DSPM；CIEM；合规报告自动化
            - 很高 — Paidy（fintech）案例研究有记录；PCI-DSS 和 DSPM 直接对齐；最大 CNAPP 垂直（21%+）
        - label: 医疗健康 / 生命科学
          values:
            - HIPAA Security Rule（云中 ePHI）；FDA 网络安全指南；SOC 2
            - 由合规预算驱动；6–12 个月周期；GRC 影响采购；CISO 与 VP Compliance 共同决策
            - ePHI 数据发现；访问控制审计；审计日志覆盖；HIPAA 合规报告
            - 高 — HIPAA 合规包；DSPM 提供 ePHI 可见性；访问控制审计；医疗数据泄露成本敏感
        - label: 技术 / SaaS
          values:
            - SOC 2 Type II；ISO 27001；客户安全问卷；开发者主导安全文化
            - 工程或安全预算；3–6 个月周期；DevSecOps 集成式评估；按消费或按云账户计费模型
            - KSPM 覆盖 Kubernetes；IaC 扫描；CI/CD 管线集成；CDR；API 安全；开发者安全左移
            - 高 — 云原生架构契合 Orca 无代理方案；KSPM 和 IaC 扫描是强差异点
        - label: 政府 / 公共部门
          values:
            - FedRAMP 授权（必需）；NIST SP 800-53；FISMA；零信任 EO 要求；国防 CMMC
            - 12–18 个月采购；正式 RFP 流程；需要 ATO（authority to operate）；多年期合同
            - 经 FedRAMP 授权的云工作负载保护；零信任架构合规；供应链风险可见性
            - 中 — 潜力高；截至 2026 年 5 月，Orca FedRAMP 授权未确认；政府机会存在重大缺口
        - label: 零售 / 电商
          values:
            - 持卡人数据 PCI-DSS；州级数据泄露通知法；CCPA；客户数据保护
            - IT 安全预算；4–8 个月周期；CISO 或 VP Technology 决策；季节性预算规划
            - PCI-DSS 云环境扫描；客户数据保护；第三方风险；云工作负载漏洞管理
            - 中高 — 与 BFSI 用例在 PCI-DSS 上重叠；未记录具体 Orca 零售案例研究
        - label: 能源 / 关键基础设施
          values:
            - NIS2 Directive（欧盟）；NERC CIP（美国电力）；TSA 网络安全指令；行业 OT/IT 融合
            - 合规预算；采购周期长且需运营评审；评估 OT 安全集成
            - OT/IT 云安全融合；面向云托管工业系统的 CSPM；NIS2 风险管理
            - 中低 — 早期；OT/云安全融合创造未来机会；未记录 Orca OT 案例研究
        - label: 中高端中型市场多云客户
          values:
            - SOC 2；ISO 27001；客户安全问卷；初始合规认证
            - IT 安全或工程预算；3–5 个月周期；CTO 或 IT Manager 决策；首次购买 CNAPP
            - 快速无代理部署；多云可见性；风险优先级排序；云安全姿态基线
            - 高 — 安全人手有限时，无代理部署优势最明显；价值兑现快
        - label: 摘要：ICP 核心与新兴
          values:
            - 核心 ICP：BFSI + 医疗健康（强制合规）；高增长：技术 / SaaS（DevSecOps 驱动）
            - 核心 ICP：6–12 个月企业周期；高增长：3–6 个月技术 / SaaS 周期
            - 核心需求：合规覆盖 + DSPM + CIEM；新兴需求：AI SPM + IaC 扫描 + CDR
            - FedRAMP 缺口限制政府市场；OT/IT 仍在早期；低成本档位可推动中型市场扩张
    approximationNotes: >-
      买方画像综合 Orca 案例研究（Paidy、Digital Turbine）、Grand View Research CNAPP 细分数据、HHS HIPAA 文件、NIST 监管框架以及 AWS/Google
      合规文件。采购周期和交易规模是基于行业模式的方向性估计；Orca 未披露销售周期数据。政府 / 公共部门的 Orca FedRAMP 状态未确认——本评估基于缺乏确认，而不是确认不存在。
    claimRefs:
      - CM029
      - CM030
      - CM032
      - CM034
      - CM036
      - CM037
  - id: FM004
    title: 采用漏斗或价值链地图
    type: funnel
    layout: standard
    summary: >-
      漏斗图展示企业 CNAPP 从初始认知到合同扩张的购买和部署生命周期。数值是归一化后的相对群体规模，顶部认知阶段指数为 100。漏斗说明企业 CNAPP 典型交易周期为 3–9 个月，最大流失发生在 POC
      短名单与供应商选择之间。
    data:
      items:
        - label: 认知 — CISO 识别云安全缺口
          value: 100
          detail: 由泄露事件、审计发现、监管压力、Gartner MQ 认知或超大规模云厂商原生工具局限触发
          tone: neutral
        - label: 教育 — 分析师报告 / Gartner MQ 短名单
          value: 75
          detail: 安全团队审阅 Gartner MQ、Peer Insights、Dark Reading 报道；收窄到 3–5 家供应商进入正式评估
          tone: neutral
        - label: 评估 — 概念验证（30–90 天）
          value: 35
          detail: 安全工程团队开展无代理 POC；评估覆盖广度、风险上下文化、部署时间和合规报告
          tone: neutral
        - label: 选择 — CISO/CFO 采购批准
          value: 12
          detail: 董事会级安全预算批准；多年期合同；年价值 $100K–$2M+；最终供应商收窄到 1–2 家
          tone: positive
        - label: 上线 — 云账户连接和覆盖基线
          value: 11
          detail: API 连接所有云账户；Orca 声称数分钟内完成覆盖；部署合规包；初始风险评估
          tone: positive
        - label: 扩张 — 新模块和云账户增长
          value: 8
          detail: 采用 DSPM、AI SPM、CDR 模块；组织增长带来新云账户；NRR 驱动因素；多年期合同扩张
          tone: positive
    approximationNotes: >-
      漏斗数值是归一化后的相对群体指数（不是绝对客户数或市场百分比）。数值来自 Orca 案例研究、CNAPP 行业交易周期模式和分析师对企业安全采购评论的定性综合。Orca 未公开披露胜率、POC
      到成交率或销售漏斗转化指标。阶段标签和比例反映一般企业 CNAPP 销售动作，不是 Orca 特定数据。从评估（35）到选择（12）的大幅下降，反映企业 POC 评估竞争激烈。
    claimRefs:
      - CM029
      - CM031
      - CM035
      - CM037
  - id: FP001
    title: 竞争定位图
    type: quadrant
    summary: >-
      供应商按部署复杂度（x 轴：1=最低无代理，10=复杂且重代理）和 CNAPP 覆盖广度（y 轴：1=狭窄 / 专项，10=全面全 CNAPP）绘制。位置是基于截至 2026 年 5
      月公开产品文件和分析师评测的序位判断，不来自正式评分方法。
    data:
      points:
        - label: Orca Security
          x: 2
          'y': 9
          description: 借助无代理 SideScanning 降低部署复杂度；无代理 CNAPP 覆盖最宽，包括 CSPM、CWPP、KSPM、CIEM、CDR、DSPM、AI SPM。
        - label: Wiz
          x: 3
          'y': 9
          description: 与 Orca 类似的无代理架构；CNAPP 广度相当；因运行时传感器选项和企业配置开销，复杂度略高。
        - label: PANW Prisma Cloud
          x: 7
          'y': 10
          description: 所有供应商中 CNAPP 广度最全面；因代理 + 无代理混合、Cortex 集成和企业上线，部署复杂度高。
        - label: CrowdStrike Falcon Cloud
          x: 6
          'y': 8
          description: EDR + 云安全融合能力强；Falcon 传感器代理增加部署复杂度；CNAPP 广度在扩张，但仍偏 EDR 血统。
        - label: Aqua Security
          x: 5
          'y': 6
          description: 容器 / K8s 深度强，聚焦开发生命周期；复杂度中等；相较全 CNAPP 同行，云姿态广度较窄。
        - label: Lacework / Fortinet
          x: 5
          'y': 7
          description: 基于 ML 的行为分析叠加 CNAPP；Fortinet 集成增加复杂度；覆盖广度中等，异常检测有差异化。
        - label: Sysdig
          x: 6
          'y': 6
          description: 基于 Falco 的运行时专家；核心检测需要代理；K8s 深度强，但姿态管理广度较薄。
        - label: MS Defender for Cloud 平台
          x: 4
          'y': 7
          description: Azure 原生客户复杂度中等；多云增加配置；在 Microsoft 生态内提供广泛 CNAPP 覆盖；免费档位降低入门摩擦。
        - label: AWS Security Hub
          x: 2
          'y': 5
          description: AWS 原生客户部署复杂度很低；覆盖范围窄，主要限于 AWS 服务；多云适用性有限。
        - label: GCP Security Command Center
          x: 2
          'y': 5
          description: GCP 原生部署复杂度低；AI 工作负载保护在扩张；Wiz 收购整合潜力可能显著扩大广度。
    claimRefs:
      - CP001
      - CP002
      - CP007
      - CP023
