      - number: '2.4'
        title: 客户与买方分层
        blocks:
          - type: paragraph
            body: >
              Orca Security 的理想客户画像（ICP）集中在拥有大量多云部署的企业组织——通常是在两个或更多超大规模云厂商上每年云支出达到 $10M 以上的组织。Grand View Research
              确认，大型企业贡献 CNAPP 市场收入超过 58%，并贡献更广义云安全市场超过 74%，验证了企业优先的 GTM 策略。这些组织具备云复杂度、监管暴露和安全团队成熟度，能够看出一体化 CNAPP
              平台相较一组单点工具的价值。在企业环境中，大规模代理管理运营成本高，Orca 的无代理部署模型尤其有利——它消除了基于代理的替代方案在复杂云环境中遇到的部署摩擦。


              按行业垂直看，BFSI 占 CNAPP 市场超过 21%，是最大的终端使用垂直；驱动因素是 PCI-DSS、SOX 和 GLBA 合规要求，以及核心银行现代化中的高云采用。医疗组织面对 HIPAA 对云托管
              ePHI 的技术保护要求，形成合规驱动需求。技术和 SaaS 公司天生云原生，需要与 DevSecOps 工作流匹配的 KSPM、IaC 扫描和 CDR 能力。政府和公共部门是一个新兴细分市场，但进入门槛是
              FedRAMP 授权；截至 2026 年 5 月，Orca 公开文档未确认 FedRAMP 授权，这可能是政府市场准入缺口。


              采购模式由 CISO 牵头，交易周期为三到九个月，并包含概念验证阶段。Orca 公开案例研究展示了这一模式：Paidy（金融科技、多云可见性、PCI-DSS 合规）和 Digital
              Turbine（移动广告、快速部署）都因为 Orca 的无代理部署速度和覆盖深度而选择它。大型企业账户更倾向多年合同；扩张来自新增云账户接入、垂直行业合规包采用，以及新的 CNAPP 能力模块（DSPM、AI
              SPM、CDR）。预算所有权在 CISO 手中，安全工程经理担任技术评估者；年度合同超过 $500K 时，CFO 和董事会参与度会上升。从意识到云安全问题到签订 CNAPP
              部署合同，路径通常包括分析师报告入围、概念验证评估、安全工程师签字和 CISO 最终批准。
