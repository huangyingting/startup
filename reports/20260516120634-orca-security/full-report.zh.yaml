  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资论点与尽调摘要
        blocks:
          - type: paragraph
            body: |
              Orca Security 在 $1.8 billion Series C 估值下呈现有条件的正面投资信号。
              论点建立在四个支柱上：（1）基于专利 SideScanning 技术的云安全平台，
              在结构上差异化，并制造有意义的切换摩擦；（2）2024 年 4 月获评
              Gartner CNAPP Magic Quadrant Leader，验证企业接受度；（3）投资人
              财团资金雄厚（Temasek、ICONIQ Capital、CapitalG、Accel），
              可为战略退出提供便利；（4）云安全 TAM 预计到 2026 年超过
              $50 billion，CAGR 为 15–20%。反论点同样清晰：Wiz 到 2024 年 6 月
              估值 $12 billion，意味着 Orca 在同一无代理 CNAPP 细分中已退居次要
              竞争位置；ARR 未披露，使收入倍数悬在 9x–18x 的宽区间内，难以形成
              投资确信度；2023 年 7 月针对 Wiz 的诉讼带来法律风险和管理层分心。
              建议为有条件正面，但部署资本前必须核验 ARR、NRR 和股权结构表。
              关键尽调关口是实际 ARR 能否以相对公开和私人可比公司的可辩护倍数支撑
              当前 $1.8 billion 估值。风险评级为高，原因是竞争、财务透明度和诉讼因素。
