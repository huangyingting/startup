  - id: FV001
    type: range
    title: 估值 / 回报区间
    insight: >-
      Orca 的三种退出情景从 $0.9B 悲观情景延伸到 $5B 乐观情景；考虑云安全竞争动态和 M&A 活跃度，$1.5B–$2.5B 的基准情景收购区间最可能。当前 $1.8B
      标记估值落在基准情景内，意味着入场下行保护有限，但若发生战略出售仍有中等上行。
    data:
      items:
        - label: 悲观情景（降价轮 / 停滞）
          low: 0.9
          mid: 1.2
          high: 1.5
        - label: 基准情景（战略收购）
          low: 1.5
          mid: 2
          high: 2.5
        - label: 乐观情景（IPO / 溢价收购）
          low: 3
          mid: 4
          high: 5
    approximationNotes: 区间以十亿美元计。低 / 高端点代表分析师情景边界；中位值是概率加权中点估计。所有数值都是前瞻退出情景，不是当前标记估值。
    claimRefs:
      - CV024
      - CV025
      - CV026
  - id: FV002
    type: kpi
    title: 投资 KPI
    insight: 六个核心投资 KPI 确认 Orca 已具备后期风投资产规模，同时暴露关键数据缺口——ARR 和收入倍数仍是区间而非确认值，当前估值下无法形成充分信心。
    data:
      items:
        - label: 上轮估值
          value: $1.8B
          status: confirmed
          note: Series C，2022 年 10 月（Temasek 领投）
        - label: 累计融资
          value: ~$628M
          status: confirmed
          note: Seed 至 Series C（PitchBook / About 页面）
        - label: Series C 领投方
          value: Temasek Holdings
          status: confirmed
          note: 新加坡主权财富基金
        - label: 估计 ARR 倍数
          value: 9x–18x
          status: estimated
          note: 基于分析师估计 ARR $100–200M；未确认
        - label: 云安全 TAM（2026E）
          value: $50B–$77B
          status: estimated
          note: IDC 和 MarketsandMarkets 预测
        - label: 同行中位倍数
          value: ~12–15x NTM
          status: estimated
          note: 公开可比公司：CrowdStrike、Palo Alto、Qualys
    claimRefs:
      - CV001
      - CV005
      - CV009
      - CV018
      - CV016
      - CV035
  - id: FV003
    type: bar
    title: 估值敏感性
    insight: >-
      Orca 估值对 ARR 假设高度敏感。若按 $150M ARR（基准中点）和 12x 计算，$1.8B 标记估值正好等于公允价值。若按 $100M ARR 和 9x 计算，公司高估约 50%。厘清 ARR
      不确定性，是本次尽调杠杆最高的一件事。
    data:
      items:
        - label: 9x × $100M ARR（悲观底线）
          value: 900
        - label: 9x × $150M ARR（基准低值）
          value: 1350
        - label: 12x × $150M ARR（基准中值）
          value: 1800
        - label: 12x × $200M ARR（基准高值）
          value: 2400
        - label: 15x × $200M ARR（乐观情景）
          value: 3000
    approximationNotes: 数值以百万美元计。ARR 假设为分析师估计；倍数假设来自同业中位数分析。当前 $1.8B 估值标记落在 12x × $150M（第三根柱）。
    claimRefs:
      - CV009
      - CV013
      - CV016
  - id: FV004
    type: flow
    title: 投资建议逻辑
    insight: 市场地位、技术护城河和投资人质量三条证据同时指向正面，因此给出有条件正面建议；但竞争压力、财务透明度不足和诉讼阴影压低结论。只有验证 ARR 和 NRR，才能把建议上调为无条件正面。
    data:
      nodes:
        - id: n1
          label: 市场地位（强）
          description: Gartner 2024 年 CNAPP MQ 领导者；到 2026 年，云安全 TAM 超过 $50B，CAGR 为 15-20%
        - id: n2
          label: 技术护城河（已成型）
          description: SideScanning 专利；无代理架构；2019 年起步的知识产权优势
        - id: n3
          label: 投资人质量（机构级）
          description: 已融资 $628M；Temasek、ICONIQ Capital、CapitalG、Accel；可协助战略退出
        - id: n4
          label: 竞争风险（高）
          description: Wiz 估值 $12B，显示同一细分市场已有领先者，公司处在第二位
        - id: n5
          label: 财务透明度（低）
          description: ARR、NRR、烧钱速度均未披露；9x-18x 的倍数区间难以支撑高确信度
        - id: n6
          label: 诉讼阴影（重大）
          description: 2023 年 7 月起诉 Wiz；截至 2026 年 5 月仍未解决；知识产权风险未消除
        - id: n7
          label: 有条件正面建议
          description: $1.8B 估值下保持观察；验证 ARR/NRR 并审查股权结构表后再投资；仓位按基准情景退出设计
    claimRefs:
      - CV022
      - CV023
      - CV027
