      - number: '3.5'
        title: 竞争护城河与替代风险
        blocks:
          - type: paragraph
            body: >
              Orca 最强的结构性护城河，是其 SideScanning™ 无代理云安全架构已获授的美国专利。该专利 2019 年提交、后续获批，为 Orca 不安装代理读取云工作负载数据的核心机制提供法律保护。Orca 于
              2023 年 7 月起诉 Wiz，指控加入 Wiz 的前 Orca 员工侵犯版权并窃取商业秘密；该案既反映 Orca 知识产权位置的强度，也反映它对竞争威胁的严肃态度。客户切换成本是次级护城河：Orca
              客户通过云服务商 API token 集成，接入自定义策略和合规规则，并随着时间连接 ticketing、SIEM 和 SOAR 工作流。累积的配置和工作流投入带来有意义的留存摩擦。Orca 的 100+
              集成生态把 Orca 嵌入既有安全工作流，进一步加深锁定效应。


              Orca 面临的主要替代风险有三类。第一，Wiz 借 Google 支持可以激进定价，并通过 Google Cloud 销售渠道获得分发杠杆。第二，超大规模云厂商通过免费或捆绑的原生工具将基础 CSPM
              商品化，降低客户为仅 CSPM 用例付费的意愿。第三，Palo Alto Networks 等大型既有厂商推动平台整合，将 CNAPP 与防火墙和终端组合捆绑，并提供多年企业许可，可能让部分买方画像下的独立
              CNAPP 经济性变差。Lacework 于 2024 年完成与 Fortinet 合并，代表同样的平台捆绑动态在中型市场进入者身上发生。面对这些压力，Orca
              最好的防守是维持广度优势，借更难用纯无代理路径复制的 CDR 能力加深运行时保护，并利用 AWS 联合销售关系抵消 Wiz 的 Google 分发优势。
