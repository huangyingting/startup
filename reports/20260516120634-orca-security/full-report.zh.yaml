        - 推导估计；用 58% 企业占比代理 Orca 可服务范围；实际 ICP 可能更窄或更宽
      - - 推导 — Orca SOM
        - 2026 年近期
        - 全球（初始企业账户）
        - $300M–$700M ARR（启发式）
        - 不适用
        - 启发式取 SAM 的 5–15%；参照 Orca $1.8B 估值（2022）和 Gartner MQ 领导者地位（2024）
        - 低
        - Orca ARR 和客户数未公开披露；这是卡住尽调的缺口；启发式区间不是预测
      - - IBM / Ponemon（投资驱动因素）
        - 2025 年研究
        - 全球
        - 平均数据泄露成本 $4.4M（安全支出驱动因素）
        - 不适用
        - Cost of a Data Breach Report 2025；调研 604 家组织；AI 辅助检测相较未使用 AI 的同行降低成本 $1.9M
        - 高
        - 泄露成本是安全投资驱动因素，不是市场规模指标；用于支撑需求侧压力
    notes: >-
      不同分析师机构的市场规模估计采用不同范围定义、地理覆盖和预测方法。Grand View Research 的 CNAPP TAM（2023 年 $9.79B，2030 年 $38.01B）是主要公开可访问测算视角；IDC 和
      Forrester 的一手估计需要付费订阅。推导 SAM（$5.7B）和 SOM（$300M–700M ARR）是低置信度分析构造；没有 Orca ARR，就无法估计 SOM。所有数字均为美元。CNAPP
      与云安全整体是不同市场范围，不能相加。
