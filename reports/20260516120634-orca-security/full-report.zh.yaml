      - number: '4.5'
        title: 资本充足性与财务结论
        blocks:
          - type: paragraph
            body: >
              Orca 于 2022 年 10 月完成 Series C，融资 $340M，投后估值 $1.8B，由 Temasek 领投，既有投资人 ICONIQ Capital 和 CapitalG 等参投。Orca 官方
              About 页面称累计融资约 $630M，这与已确认轮次公告的累计和一致：2021 年 11 月 $210M Series B 加上 $340M Series C，再加上此前种子轮和 Series A
              补足余额。SEC EDGAR Form D 检索确认，Orca 向 SEC 提交了正式 Regulation D 文件，符合 Rule 506 下豁免私募。估计每月烧钱 $4–8M（由约 1,000 名员工和典型
              SaaS 成本基准推导）意味着 Series C 后现金跑道为 24–48 个月，把假设中的下一次融资事件放在 2024–2026 年窗口。Gil Geron 于 2023 年 3 月接替联合创始人 Avi
              Shua 担任 CEO，在增长阶段引入领导层交接风险。Wiz 据称在 18 个月内达到 $100M ARR，给无代理云安全细分带来定价压力，并可能压缩 Orca 的实际定价和留存指标。在 $1.8B 估值、ARR
              估计区间 $50–200M 下，隐含收入倍数为 9x 至 36x；没有确认 ARR，区间过宽，难以形成确信。财务结论是：收入质量看起来较高（经常性
              SaaS、企业客户标识），利润率路径较好（纯软件），但由于激进销售支出，资本强度中等；实际 ARR、NRR 和经验证的烧钱速度这三项重大尽调阻塞项，使当前阶段无法形成承销信心。
