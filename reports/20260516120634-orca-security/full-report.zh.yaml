      - number: '8.2'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: |
              Orca Security 自 2019 年创立以来，已通过五次融资事件筹集约 $628 million。
              融资轨迹反映出投资人在 2021–2022 年云安全牛市中信心加速增强。
              2019 年约 $6 million 种子轮支持产品开发和早期企业概念验证（PoC）。
              2021 年 3 月，约 $68 million Series A 随后完成，推动人员扩张和美国
              GTM 建设。2021 年 11 月，ICONIQ Capital 和 CapitalG 领投 $210 million
              Series B，投后估值约 $1.2 billion；CapitalG 是 Alphabet 独立
              成长股权基金，因此这一轮既带来顶级技术投资人的战略验证，也带来深厚
              企业分发关系。2022 年 10 月，里程碑式 $340 million Series C 完成，
              投后估值 $1.8 billion，由新加坡主权财富基金 Temasek Holdings
              领投，把投资人质量延伸到全球机构资本。SEC EDGAR Form D 申报确认所有
              轮次均按 Regulation D 豁免私募进行，符合标准风投结构。
              总资本 $628 million 意味着 2022 年 10 月交割后跑道相当充足——按
              基准现金消耗假设估计为 24–48 个月——因此潜在下一次融资事件落在
              2024–2026 年窗口。优先股结构和清算优先权层级未公开，评估普通股稀释前
              必须在投资人数据室核实。
