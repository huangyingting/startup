      - number: '1.2'
        title: SideScanning 技术与 CNAPP 平台
        blocks:
          - type: paragraph
            body: >
              Orca 的核心技术差异点是
              SideScanning™。这项曾处于专利申请中、现已获专利的技术，不在虚拟机或容器上安装代理，而是读取云服务商的块存储快照或带外数据导出，完成深度工作负载检查。该路径消除了部署摩擦，避免影响生产工作负载性能，也能覆盖无法运行传统代理的云资产，例如
              serverless 函数和托管数据库服务。公司称，连接一个云账户后数分钟内即可实现 100% 工作负载深度覆盖。


              CNAPP 平台把原本需要多个单点工具的能力整合在一起：云安全态势管理（CSPM）、云工作负载保护平台（CWPP）、Kubernetes
              安全态势管理（KSPM）、云基础设施权限管理（CIEM）、数据安全态势管理（DSPM）、AI 安全态势管理（AI SPM）、云检测与响应（CDR）、漏洞管理、API 安全和合规报告。Unified Data
              Model 支撑跨能力语境，让平台的攻击路径分析能浮出单点工具会漏掉的风险链条。多云覆盖包括 AWS、Azure、Google Cloud、Kubernetes 和 Oracle Cloud
              Infrastructure（OCI）。
