  - id: TV005
    title: 投资逻辑破裂与止损触发表
    columns:
      - 触发因素
      - 可观察阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - Wiz 竞争主导加深
        - Gartner 或 IDC 显示 Wiz 拿下 >50% CNAPP 市占率；Orca 流失多个具名企业续约
        - ARR 增长显著放缓；NTM 倍数下修至 8x 以下
        - 退出或放弃；只有入场价隐含 <6x 已确认 ARR 时才重新评估
      - - Orca 诉 Wiz 案出现不利结果
        - 法院对 Orca 下达禁令或判赔 >$50M；SideScanning IP 受限
        - 产品差异化受损；投资者信心受冲击；融资风险上升
        - 重新评估产品路线图和 IP 风险；主动跟踪法院案卷
      - - CEO 交接后执行失误
        - Gil Geron 任内 ARR 同比增长放缓至 20% 以下；工程或销售管理层流失率 >15%
        - 管线承压；销售效率恶化；Series D 定价承压
        - 要求与管理层背调对象通话；按季度跟踪 LinkedIn 员工数
      - - 降价轮或过桥融资
        - 下一次融资事件投后估值低于 $1.5B；Series C 后 18 个月内需要过桥融资
        - 市场确认 $1.8B 估值过高；上一轮投资者可能失去信心
        - 若已投资则加速退出；若尚未出资则推迟入场
    notes: 触发因素和阈值由分析师基于公开竞争和财务基准定义。实际阈值可能不同于可观察的公开信号；精确监控需要管理层披露和投资者数据室访问权限。
    claimRefs:
