      - number: '2.2'
        title: 用多重分析视角测算 TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              2023 年全球 CNAPP 市场估计为 $9.79B，预计到 2030 年达到 $38.01B，对应 2024–2030 年 21.8% CAGR（Grand View Research）。更广义云安全市场
              2024 年为 $35.84B，预计到 2030 年达到 $75.26B，CAGR 为 13.3%。CNAPP 更高的增速反映了平台整合：一体化 CNAPP 平台正在替代碎片化单点方案，并在更大的云安全 TAM
              中拿份额。多家分析机构确认这一轨迹——Gartner 2024 年 CNAPP Magic Quadrant 给出厂商定位视角；其自有市场规模数据，以及 IDC 和 Forrester
              的数据，只能通过付费订阅获得。Grand View Research 公开摘要数据和媒体二级报道表明，IDC 与 Forrester 对近期 CNAPP 市场 $10–15B 区间的估计，大体与 GVR
              轨迹一致，但在 5–7 年维度上有 ±20% 的估计不确定性。


              Orca Security 的可服务市场（SAM）是 CNAPP TAM 中的企业和高端中型市场切片。Grand View Research 数据确认，大型企业贡献 CNAPP 市场收入的
              58%+；将该比例套用到 2023 年 CNAPP TAM，可得 2023 年 SAM 约 $5.7B，并按 CNAPP CAGR 增长，到 2030 年估计超过 $22B。北美组织约占 CNAPP 支出的
              39%，美国子市场 CAGR 为 20.5%，进一步支撑面向北美企业的 GTM 重心。BFSI 行业单独贡献 CNAPP 市场收入的 21%+（Grand View
              Research），使金融服务成为最大需求垂直，也成为自然的 ICP 锚点。


              Orca 的可获取市场（SOM）——短期可捕获份额——无法从公开数据推导，因为 Orca 不披露 ARR、客户数或胜率指标。基于 Orca $1.8B Series C 估值（2022 年）和 Gartner
              Magic Quadrant Leader 地位（2024 年），可粗略框定短期 ARR 为 $300–700M；但缺少已披露财务数据，该估计置信度低。失败的测算路径需要保留：直接量化 SOM 需要 Orca
              ARR 数据，这是任何估值敏感分析的阻塞性尽调事项。Wiz 激进融资释放相反信号（2024 年 $12B 估值、$1B 融资）：Orca 可能正把销售管线输给资金更充足的竞争对手，从而把短期 SOM
              压向启发式区间下沿。
