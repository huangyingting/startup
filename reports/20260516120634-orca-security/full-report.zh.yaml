  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户细分与买方画像
        blocks:
          - type: paragraph
            body: >-
              Orca Security 的主要市场是跨一个或多个主要云厂商——AWS、Microsoft Azure 和 Google Cloud Platform——运行大量工作负载的企业组织。
              在这个范围内，公司在五个垂直领域积累了最深牵引力：金融服务，包括金融科技公司、新银行和正在上云现代化的传统机构； 医疗健康和生命科学，这些行业把持续 HIPAA 和 SOC 2 可见性视为合规刚需；技术和
              SaaS， 云原生开发团队更看重开发者友好的安全工具；零售和电商，承载 PCI-DSS 范围内的云工作负载； 以及拥有内容分发和流媒体基础设施的媒体与娱乐平台。典型经济买方是 CISO 或 VP of
              Security， 技术推动者是云安全工程师或 DevOps lead。交易通常从概念验证（PoC）评估启动， 用来展示 Orca 无代理部署速度；对管理数百个云账户的组织来说，这是相对传统代理工具的关键优势。
              Orca 的产品定位直击复杂度和规模问题：拥有数十到数百个短生命周期云账户的企业，会发现部署和维护传统代理在运营上不可承受，
              因此无代理方案成为有吸引力的运营和成本升级。技术公司是参考客户最集中的类别，其次是金融服务； 在金融服务中，监管要求会加快采购决策。
