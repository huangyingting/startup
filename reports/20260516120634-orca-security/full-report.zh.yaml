  - id: TE003
    title: Orca CNAPP 技术架构组件
    columns:
      - 组件
      - 描述
      - 技术路径
      - 优势
      - 限制
    rows:
      - - SideScanning Engine
        - 通过只读云 API 带外读取云工作负载的运行时块存储
        - 集成云厂商 API；不部署代理；不在工作负载中执行代码
        - 零性能影响；分钟级接入；覆盖无法安装代理的资产
        - 基于快照；会带来延迟；无法实时检测内存中的无文件攻击
      - - Unified Data Model
        - 在单一图谱中关联基础设施、工作负载、身份和数据层发现
        - 基于图的自研模式；跨域实体解析
        - 支持攻击路径分析；暴露跨层高危组合
        - 在极大云资产规模下，复杂度可能影响查询性能
      - - 上下文与风险引擎
        - 根据攻击路径、爆炸半径、资产重要性和面临风险的敏感数据排列告警优先级
        - 基于 ML 的评分；上下文告警排序
        - 降低告警疲劳；让修复聚焦最高影响风险
        - 风险评分校准需要按组织自身风险画像调校
      - - 攻击路径分析
        - 以图形方式展示由高危组合串起的横向移动风险链
        - 在 Unified Data Model 上做图遍历；出现新发现后动态重新评分
        - 识别点状工具看不到的多跳攻击链
        - 可能捕捉不到涉及运行时临时容器的攻击路径
      - - Orca Sensor（CDR）
        - 可选轻量代理，用于实时运行时威胁检测
        - 内核级传感器；运行时遥测；补足无代理扫描
        - 补上实时检测缺口；检测无文件执行和内存威胁
        - 需要部署到工作负载；增加运维开销；削弱纯无代理叙事
      - - Orca AI Engine
        - 所有模块都嵌入 AI 能力，包括代码修复、自然语言搜索、AI 智能体
        - 集成 LLM（Azure OpenAI GPT-4 + 内部模型）；基于 Unified Data Model 做 RAG
        - 加速修复和调查；降低安全运营技能门槛
        - AI 生成的代码修复需要人工审查；模型可能幻觉
    notes: 架构描述来自 Orca 官方平台页和博客页。技术细节反映公司自称机制；内部实现细节未公开披露。
