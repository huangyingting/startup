  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: SideScanning 架构与无代理数据获取
        blocks:
          - type: paragraph
            body: >
              Orca Security 的基础技术创新是 SideScanning™。创始人 Avi Shua 称它是「云环境里的 MRI」。 它不在云工作负载内部部署软件代理，而是接入云厂商
              API，在虚拟机、容器和其他云资产运行时， 以带外方式读取其运行时块存储。系统使用开放、只读的云 API 访问操作系统正在读写的同一组比特和字节，
              因此无需在客户环境中执行任何操作码，就能重建云资产安全态势的完整地图。Orca 持有这种无代理云工作负载扫描方法的专利， 并称这是业内首个此类方法。


              这套架构的落地影响很大。一个云账户可在数分钟内接入并完成全量扫描， 而不是像大型工作负载集群部署代理那样耗费数天甚至数周。SideScanning 全程带外运行，
              不会拖慢运行中的工作负载。覆盖范围还延伸到无服务器函数、托管数据库服务、已停止实例， 以及其他无法承载传统代理的资产；随着组织采用云原生架构，这类资产增长很快。Orca 称， 账户连接成功后的基线结果是实现
              100% 工作负载深度覆盖。


              多云支持覆盖 AWS、Azure、Google Cloud Platform（GCP）、Oracle Cloud Infrastructure（OCI）、 Alibaba Cloud 和 Tencent
              Cloud；Kubernetes 集群在所有云厂商中都被视为一等基础设施。 SideScanning 之外，Unified Data Model
              将基础设施、工作负载、身份和数据层的发现项关联到同一个图上下文引擎。 跨层关联支撑攻击路径分析能力，浮现跨越错误配置、暴露凭据、漏洞软件和身份过度授权的风险链； Orca
              称之为「有毒组合」。上下文引擎利用这种关联视图，优先处理 Orca 所说「真正重要的 1% 告警」， 在不依赖人工分诊的情况下降低告警疲劳。


              与基于代理的替代方案相比，SideScanning 换来了覆盖广度和上线速度，但牺牲了单个工作负载运行时可见性的深度。
              代理方案运行在工作负载内部，因此能真正实时发现无文件恶意软件和内存执行；SideScanning 基于快照工作， 所以提供的是近实时，而非连续运行时覆盖。Orca 在公开文档中承认这种取舍， 并用可选的轻量级
              Orca Sensor 补足需要真实运行时威胁检测的云检测与响应（CDR）场景。
