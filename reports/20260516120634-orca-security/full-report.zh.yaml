      - number: '5.5'
        title: 技术局限与竞争风险因素
        blocks:
          - type: paragraph
            body: >
              Orca 的 SideScanning 路线存在核心架构取舍，且在 Orca 自己的公开材料中也有明确记录： 无代理安全提供近实时监控，而不是真正实时监控。Orca 的 agentless-vs-agent
              博客明确称， 「无代理方案通过云环境快照提供可见性」，并且「虽然为组织提供近实时情报，但存在轻微延迟， 并不在实际时间发生」。这意味着，如果威胁行为者攻陷一个工作负载，并在一个扫描周期内横向移动，
              系统可能要等下一次快照处理后才发现。


              另一个局限是对短生命周期容器的覆盖。若容器在一次扫描间隔内启动又终止——对快照平台而言， 这个间隔可能以小时计——就可能无法被完整捕获。Kubernetes 和无服务器工作负载生命周期越短，
              这个缺口的实际影响越大。Orca 的确能覆盖代理方案常漏掉的闲置、已停止和孤立工作负载， 但两种路线的覆盖不对称方向不同。


              基于代理的替代方案能在运行时检测无文件执行和内存攻击——这些威胁手法操纵内存、不触盘， 因此快照式扫描器看不见。Orca 自己的竞争指南承认这一能力缺口，并将其定位为多数企业云环境愿意接受的取舍：
              用它换部署简单性和覆盖广度。可选的 Orca Sensor 可为需要 CDR 的组织补上这一点， 但需要部署，也带来无代理扫描本来要消除的运维开销。


              竞争风险很高。Wiz 是 Orca 最接近的可比竞争对手，到 2024 年中估值已超过 Orca： 据报道达到 $32 billion，而 Orca 最近一次已知估值是 2022 年 Series C 的
              $1.8 billion。 2023 年 7 月，Orca 对 Wiz 提起商业秘密和版权侵权诉讼，指控 Wiz 聘用了带走源代码和专有技术信息的前 Orca 员工；截至 2026 年 5
              月，未见公开报道显示该诉讼已有结果。该案带来 IP 不确定性， 尽调应重点核查。


              G2 对 Orca 平台的用户评价（280+ 条，整体 4.6/5）包含关于扫描延迟、告警量管理， 以及新用户上手统一平台学习曲线的反馈。Gartner Peer Insights 给 Orca 4.8/5；按
              G2 汇总数据， 实施时间平均约一个月。这些用户信号确认平台整体口碑较好，但快照模型会带来具体用户体验摩擦； Wiz（同样无代理，但底层架构不同）和其他竞争对手正主动在定位中打这个点。
            claimRefs:
              - CE035
              - CE036
              - CE037
              - CE038
              - CE039
              - CE040
