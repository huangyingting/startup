      - number: '5.2'
        title: CNAPP 产品模块覆盖
        blocks:
          - type: paragraph
            body: >
              Orca 的云原生应用保护平台（CNAPP）把原本需要多个单点方案的能力整合到一起。 平台核心模块覆盖完整安全生命周期：从态势与合规，到工作负载保护、身份风险、数据安全、 AI 工作负载安全和实时检测。


              云安全态势管理（CSPM）是产品发布时的原始模块，用于识别云基础设施中的错误配置、合规政策违规和不安全配置。 云工作负载保护平台（CWPP）通过 SideScanning 数据管道覆盖运行中工作负载的漏洞扫描、
              操作系统 CVE 检测和恶意软件识别。CSPM 和 CWPP 在 Orca 产品组合中都属于成熟能力。


              云基础设施权限管理（CIEM）是在云身份风险成为主要攻击向量后加入的，覆盖过度授权、 跨账户访问路径和 IAM 错误配置。数据安全态势管理（DSPM）扫描云存储桶、数据库和数据服务，
              对敏感数据（PII、凭据、IP、密钥）分类，并识别暴露风险。容器安全和 Kubernetes 安全态势管理（KSPM）提供态势管理、容器镜像扫描， 并借助可选的 Orca Sensor 为 Kubernetes
              集群提供运行时保护。


              AI 安全态势管理（AI SPM）于 2024 年推出，反映出 AI/ML 工作负载在云环境中的快速采用。 AI SPM 扫描 AI 模型、训练数据集、ML 流水线和 AI 服务配置，查找暴露模型权重、
              未受保护训练数据、AI 端点配置错误等安全风险。Shai Alon（Director of AI Innovation） 和 Shir Sadon（Cloud Security Researcher）在 Orca
              一场线上研讨会中介绍了该能力， 将其定位为应对 AI 资源特有风险；这类资源的训练数据中包含敏感知识产权。


              云检测与响应（CDR）通过 Orca Sensor 提供运行时威胁检测；Orca Sensor 是可选的轻量级代理， 部署在需要实时可见性的地方。API Security 覆盖 API
              资产清单和暴露检测。合规报告针对 CIS、 NIST、PCI-DSS、HIPAA、SOC 2、GDPR 等框架自动执行政策检查。CNAPP 平台还整合左移能力： 扫描 CI/CD 流水线中的 IaC
              模板、容器镜像、密钥和 SAST 发现项， 并把生产环境发现项追溯到代码源头。


              Orca AI 计划在所有模块上叠加 AI 能力：AI Code Fixes 为 IaC 和 CLI 生成修复代码； AI Discovery 将自然语言查询转成云资产搜索；AI Assistant 提供面向
              Orca 全部上下文的聊天界面； AI Agents 自主分析、下结论并启动修复工作流。Orca 将这层 AI 定位为安全运营团队的提速工具， 用来缓解告警量和技能缺口压力。
