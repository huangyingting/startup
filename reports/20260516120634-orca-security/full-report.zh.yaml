        - 可考虑老股仓位；未进入数据室前，不按当前估值标记领投新股
      - - 风险评级
        - 高 — Wiz 竞争性挤出、ARR 未披露、CEO 交接、诉讼阴影、IPO 市场不确定性
        - 中
        - 仓位规模需反映高风险；按基准情景退出而非乐观 IPO 规划
    notes: 评估和置信度评级只由分析师基于公开证据得出；未审阅任何非公开财务数据。风险评级汇总了竞争、财务透明度、领导层和法律风险因素。
