      - number: '7.5'
        title: 财务与资本风险
        blocks:
          - type: paragraph
            body: >-
              Orca Security 于 2022 年 10 月完成 $340 million Series C 融资，由 CapitalG （Google 的成长股权基金）和 Coatue Management
              共同领投，投后估值 $1.8 billion。 此前融资包括 2021 年 $210 million Series B 和 2020 年 $20 million Series A， 披露风险投资融资总额约
              $592 million。作为私营公司，Orca 不公开披露收入、EBITDA 或现金消耗。 行业分析师估计，截至 2024 年末 ARR 在 $100–200 million
              区间，说明公司大概率尚未达到运营盈利。 主要财务风险在于，Orca 的 $1.8 billion 估值形成于 2021–2022 年增长投资周期高点； 到了 2025–2026 年融资环境，利率更高、SaaS
              收入倍数压缩、LP 推动投资人要求盈利， 该估值可能难以维持或提高。如果 ARR 同比增速降至 40–50% 以下，未来融资可能以平价融资
              或降价融资估值完成，增加现有股东稀释风险，并因期权授予水下而带来人才留存挑战。 持续中的 Wiz 诉讼增加了一项不确定但可能重大的现金负债。当前可比上市云安全平台的收入倍数表明， Orca 至少需要
              $120–180 million ARR 才能支撑 $1.8 billion 估值；这个门槛位于分析师估算下沿， 留给增长不及预期或向 Wiz 及平台安全厂商丢失份额的余地有限。
            claimRefs: []
