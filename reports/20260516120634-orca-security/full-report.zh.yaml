          detail: $9.79B → $38.01B（2030）；CAGR 21.8%；CNAPP 正在替代碎片化点状方案；Grand View Research
          tone: positive
        - label: CNAPP 企业 TAM（2023E）
          detail: ~$5.7B；CNAPP 收入 58%+ 来自大型企业；按 CNAPP CAGR 到 2030 年增至 ~$22B
          tone: positive
        - label: CNAPP 企业北美市场（2023E）
