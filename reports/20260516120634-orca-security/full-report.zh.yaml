  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界、定义与现状替代方案
        blocks:
          - type: paragraph
            body: >
              分析 Orca Security
              时，相关市场是云原生应用保护平台（CNAPP）——一个整合型安全类别，将云安全态势管理（CSPM）、云工作负载保护平台（CWPP）、云基础设施权限管理（CIEM）、Kubernetes
              安全态势管理（KSPM）、数据安全态势管理（DSPM）、云检测与响应（CDR）和 AI 安全态势管理（AI SPM）收束到单一统一平台。CNAPP 位于更广义的云安全市场之内；后者还包括不计入 CNAPP
              的类别：传统网络安全（防火墙、Web 应用防火墙、DDoS
              防护）、作为独立类别的身份和访问管理（IAM）、安全信息和事件管理（SIEM）、安全运营中心（SOC）平台、作为独立工具的云访问安全代理（CASB）以及端点检测与响应（EDR）。这些相邻类别不纳入 CNAPP
              TAM，但构成 Orca 潜在的平台扩张邻域。


              CNAPP 主要替代四类现状方案：（1）单点工具堆栈，组织从不同供应商部署 CSPM、CWPP、CIEM 等工具，带来集成成本和告警疲劳；（2）由云架构师和 DevOps
              团队在供应商控制台中人工审查安全配置的流程；（3）超大规模云厂商原生安全工具，包括 AWS Security Hub、Azure Defender for Cloud 和 Google Cloud
              Security Command Center，它们能以低增量成本为单云部署提供基础态势管理；（4）只做合规的工具（审计软件、GRC 平台），解决监管报告，却没有实时风险检测。CNAPP
              的价值主张用持续、自动化、无代理的多云覆盖和语境化风险排序替代上述四类方案。Grand View Research 和 Gartner 都确认，CNAPP
              替代碎片化单点工具，是该平台类别增速高于市场的主要驱动（21.8% CAGR，而更广义云安全市场为 13.3%）。与云安全支出重叠、但不计入 CNAPP TAM 的相邻类别包括 DevSecOps 工具、API
              安全网关、密钥管理，以及作为独立产品销售的云基础设施权限管理。
