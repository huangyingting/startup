      - number: '3.2'
        title: 主要 CNAPP 竞争对手画像
        blocks:
          - type: paragraph
            body: >
              Wiz 由前 Microsoft Azure 工程师在 2020 年创立，到 2022 年中估值达到 $12B，并以约 $32B 被 Google 收购，交易于 2025 年初完成。Wiz 使用与 Orca
              类似的无代理架构，通过 API 集成扫描云环境；其 Wiz AI-Application Protection Platform 覆盖 CSPM、CWPP、KSPM、CIEM、CDR 和 AI 安全。截至
              2026 年 5 月，Wiz 称 Fortune 100 中超过 50% 是其客户，相比 Orca 拥有更强企业渗透。Wiz 在 G2 上评分为 4.7/5，评论至少 772 条，高于 Orca 约 280
              条评论下的 4.6 分——这一差距反映了更快商业执行，也反映了 Google 支持的资产负债表带来的营销杠杆。


              Palo Alto Networks Prisma Cloud 是企业市场最完整的 CNAPP 平台，最近更名为 Cortex Cloud，并并入更广泛的 Cortex AI 驱动安全运营套件。Prisma
              Cloud 同时支持无代理和基于代理的部署，覆盖完整 CNAPP 能力面。其强项在于 Palo Alto Networks 超过 $8B 的整体安全产品组合，可向防火墙、终端和网络安全买方交叉销售。


              CrowdStrike Falcon Cloud Security 把端点检测与响应（EDR）领导地位与云安全结合；CrowdStrike 在终端安全中的主导地位已由 MITRE ATT&CK
              评估验证。CrowdStrike 在 MITRE 首次云专项评估中达到 100% 检出率，依靠 Falcon 传感器提供运行时保护，同时提供无代理 CSPM 态势管理。平台管理超过 281
              个对手的情报，并跟踪超过 300M 个实时指标，威胁情报深度是纯 CNAPP 厂商难以匹敌的。


              Aqua Security 成立于 2015 年，总部位于 Boston 和 Ramat Gan，专注容器与 Kubernetes 安全，服务超过 500 家大型企业。Aqua
              平台整合贯穿开发生命周期的代码到云安全，结合无代理和基于代理的能力。其优势是开发者工具链集成和运行时执行。Lacework 在 2024 年并入 Fortinet 后，为市场带来基于 ML
              的异常检测和行为分析。Sysdig 基于开源 Falco 项目，专攻容器化和 Kubernetes 环境中的运行时安全，能够在亚秒级发现威胁，并把自己定位为实时检测专家。
