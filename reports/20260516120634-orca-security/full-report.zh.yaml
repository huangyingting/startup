  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间节奏
      - 对 Orca 的含义
      - 尽调问题
    rows:
      - - 云工作负载扩张与多云采用
        - 驱动
        - 持续的结构性趋势（2024–2030）
        - 每新增一个云账户，都可能接入 Orca 平台；多云复杂度抬高无代理 CNAPP 的 ROI
        - 量化 Orca 客户的云账户扩张率；跟踪 AWS、Azure、Google Cloud 工作负载增长率
      - - 数据泄露成本压力（IBM 2025 平均 $4.4M）
        - 驱动
        - 持续存在；AI 辅助攻击工具推高泄露频率
        - CFO 和董事会更清楚泄露成本，云安全预算因此被拉动；Orca 的风险优先级排序缩短平均响应时间
        - 评估 Orca 是否跟踪客户安全事件下降指标，并将其作为留存和扩张证明
      - - 零信任要求（NIST CSF 2.0、美国 2025 年 6 月行政令）
        - 驱动
        - 短期加速（2025–2026 年联邦；商业市场滞后 12–18 个月）
        - 受监管行业和政府承包商需要符合零信任的云安全；Orca 的 CIEM 和访问可视性契合零信任架构要求
        - 核实 Orca 是否发布零信任对齐白皮书或合规映射文档
      - - 监管合规（HIPAA、PCI-DSS、GDPR、NIS2、FedRAMP）
        - 驱动
        - 持续；NIS2 在 2025–2026 年全面执行；FedRAMP 管线建设中
        - 合规要求把安全预算变成刚性支出；Orca 的合规包直接覆盖 HIPAA 和 PCI；FedRAMP 缺口限制政府机会
        - 确认 Orca FedRAMP 授权状态；评估 NIS2 和 GDPR 合规包对欧盟扩张的覆盖深度
      - - DevSecOps 采用与 AI SPM 品类兴起
        - 驱动
        - 中期走向主流（2025–2028）；AI SPM 刚起步但在增长
        - DevSecOps 将买方扩展到开发团队；AI SPM 是 AI 工作负载安全上的增量 TAM 机会
        - 跟踪 Orca 在客户群中 IaC 扫描、CI/CD 集成和 AI SPM 模块的采用；评估这些模块的 ARR 贡献
      - - 超大规模云厂商原生安全工具（AWS Security Hub、Azure Defender、Google Cloud SCC）
        - 约束
        - 持续；随超大规模云厂商投入扩大
        - 单云组织可能默认使用原生工具；纯 CNAPP 的可触达池会被压缩到多云组织
        - 量化 Orca 管线中单云 vs 多云占比；评估对原生工具替代方案的赢单 / 输单率
      - - 平台捆绑（Palo Alto Prisma Cloud、CrowdStrike Falcon、Cisco）
        - 约束
        - 近中期（2024–2027 捆绑压力峰值）
        - 折扣捆绑的 CNAPP 压缩 Orca 定价权；已有 PANW 或 CRWD 合同的企业切换到 Orca 成本高
        - 评估 Orca 在 Palo Alto 或 CrowdStrike 既有供应商参与交易中的竞争赢单率；跟踪平均交易规模趋势
      - - Wiz 竞争压力与资金充足的纯 CNAPP 对手
        - 约束
        - 持续；Wiz $12B 估值（2024）显示投入会延续
        - Wiz 能在销售、市场拓展和产品投入上压过 Orca；活跃诉讼（2023）带来法律开销和潜在证据开示风险
        - 跟踪 Wiz 和 Orca 在 G2、Gartner Peer Insights 的评分走势；评估 Orca 诉讼状态和和解可能性
      - - 企业预算理性化与供应商整合
        - 约束
        - 周期性；2024–2025 高企；经济放缓时反复出现
        - CISO 将预算集中到更少供应商，覆盖更广的平台厂商会优于纯 CNAPP；续约率可能受压
        - 监控 Orca 净收入留存；评估 Orca 将自己定位为平台整合者，还是同类最佳单点方案
      - - 超大规模云厂商扩展原生能力后，CSPM 商品化
        - 约束
        - 中期结构性（2025–2030）
        - 一旦 CSPM 被视为商品化能力，Orca 的溢价定价就需要在 CIEM、DSPM、AI SPM 和攻击路径情报上拿出更强差异化
        - 跟踪超大规模云厂商 CSPM 功能与 Orca 核心 CSPM 的对齐程度；评估 Orca 差异化是否转向更难商品化的能力
    notes: >-
      驱动因素和约束评估综合 Grand View Research 市场分析、IBM 泄露报告数据、NIST/HHS 监管文件、AWS 和 Google Cloud 厂商定位、The Register 与 Dark Reading
      安全新闻报道，以及 Orca 官方文档。时间和含义评估是定性判断；没有单一来源提供 CNAPP 市场完整排序的驱动 / 约束矩阵。尽调问题是正式尽调中应向 Orca 管理层厘清的问题。
    claimRefs:
