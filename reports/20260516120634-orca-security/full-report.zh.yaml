  - id: TM001
    title: 市场定义表
    columns:
      - 细分 / 品类
      - 纳入支出
      - 排除支出
      - 买方 / 付款方
      - Orca 关联
    rows:
      - - CNAPP（Orca 核心市场）
        - CSPM、CWPP、CIEM、KSPM、DSPM、CDR、AI SPM 集成平台；全生命周期云工作负载安全
        - 独立点工具（仅 CSPM、仅 CWPP）；EDR；网络防火墙；SIEM/SOAR；独立 IAM
        - CISO（预算负责人）；安全工程团队（评估方 / 用户）；>$500K 合同需 CFO 批准
        - 直接 TAM；Orca 主战场；GVR：$9.79B（2023）→ $38.01B（2030）
      - - 云安全整体（更广语境）
        - CNAPP 加独立 CASB、网络安全（WAF、DDoS）、传统 IAM、云原生 SIEM、DevSecOps 工具
        - 端点 EDR、本地部署安全、物理安全、网络基础设施（交换机 / 路由器）
        - CISO、工程 VP、基础设施团队；更广 IT 和运营预算
        - 间接参照；GVR：$35.84B（2024）；CNAPP 约占云安全 TAM 的 27%（2023）
      - - CSPM 独立产品（现状替代）
        - 云配置态势扫描；合规报告；错误配置检测
        - 工作负载保护、身份权限、运行时检测、数据安全
        - 云架构师、DevOps 团队、GRC 经理
        - 直接替代 Orca 的 CSPM 能力；超大规模云厂商以低增量成本或零增量成本提供原生 CSPM
      - - CWPP 独立产品（现状替代）
        - 虚拟机和容器工作负载保护；基于代理的漏洞扫描
        - 态势管理、身份、数据、Kubernetes 安全、运行时编排
        - 安全运营团队、漏洞管理团队
        - 直接替代；Orca 的无代理 SideScanning 消除部署摩擦，替代基于代理的 CWPP
      - - 超大规模云厂商原生安全（现状替代）
        - AWS Security Hub、Azure Defender for Cloud、Google Cloud SCC；面向单云的原生 CSPM 和基础工作负载扫描
        - 多云可见性、CIEM、DSPM、AI SPM、CDR、Kubernetes 原生安全编排
        - DevOps 和云运营团队；云客户无增量许可成本
        - 竞争摩擦最大的替代方案；限制单云组织中的纯 CNAPP TAM；多云才推高 Orca 需求
      - - 点工具堆栈（现状替代）
        - 客户自行集成多个最佳单点工具：独立 CSPM 厂商 + CWPP 厂商 + CIEM 厂商 + 合规工具
        - 一体化风险上下文、统一数据模型、自动化攻击路径分析
        - 安全工程团队；多厂商采购；集成和维护开销更高
        - 主要替换机会；工具蔓延、告警疲劳和集成成本推动采购向 CNAPP 整合
      - - GRC / 合规平台（部分替代）
        - 治理、风险与合规审计工作流；监管报告；政策文档
        - 实时云风险检测、工作负载保护、身份安全、主动威胁响应
        - 合规官、法务和风险团队；围绕审计周期采购
        - 监管报告场景的部分替代；不覆盖实时检测；Orca 的合规包补充 GRC
      - - 手工云安全审查（现状）
        - 云架构师临时安全评估；周期性云配置审计；基于控制台的审查
        - 持续监控、自动化错误配置检测、工作负载漏洞扫描
        - 云架构师、DevOps 负责人；没有专门安全预算项
        - 门槛最低的替代；Orca 靠持续自动化覆盖替换手工审查，后者在规模化场景下跟不上
    notes: >-
      市场边界定义与 Grand View Research 对云安全（整体市场）和 CNAPP（平台型市场）的分段一致。Orca 的产品能力覆盖上述所有 CNAPP 子品类。区分现状替代和 CNAPP TAM
      对测算很关键：超大规模云厂商原生工具和点工具堆栈不在 CNAPP TAM 内，但属于更广云安全市场。这个区分有助于理解 Orca 真实可服务池与竞争压力来源。
    claimRefs:
      - CM001
      - CM002
      - CM013
      - CM023
      - CM028
