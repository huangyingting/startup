      - number: '6.5'
        title: 扩张收入与集中度风险
        blocks:
          - type: paragraph
            body: >-
              Orca 的扩张路径本质上绑定云基础设施增长：平台通常按云账户或工作负载授权，因此客户新增 AWS 账户、 Azure 订阅或 GCP 项目时，这些账户贡献的 Orca ARR 会同步增长，无需新的销售周期。
              它形成了一个自然扩张引擎，与企业客户云足迹变大的长期趋势一致。投资人材料披露的合同规模显示， 中端市场 ARR 约为 $50,000 到 $250,000，企业合同则经常超过 $500,000。Orca 与
              AWS、 Azure、GCP 和主要技术集成商的伙伴生态进一步支持扩张，方式是创造联合销售管线， 并把 Orca 嵌入更广泛的云采购对话。主要集中度风险来自 Orca 对大型企业账户的依赖： 如果少数几个
              $500,000 以上年合同流失给竞争对手，尤其是 Wiz，收入影响会不成比例地大。 Orca 公开披露的与 Wiz 之间的知识产权和商业秘密诉讼凸显竞争对抗强度，也提示竞争动态可能加速企业流失决策。 Orca
              未公开披露净收入留存率（NRR），这是尽调图景中的重要缺口，也限制了定量评估扩张健康度的能力。
            claimRefs: []
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重度排序的风险登记表
        blocks:
          - type: paragraph
            body: >-
              Orca Security 处在云原生应用保护平台（CNAPP）细分市场的高速增长与激烈竞争交叉点。 公司的风险画像由三件事塑造：作为无代理云安全先行者，如今要应对资本充足的竞争；
              仍有活跃知识产权诉讼；还要处理多个司法辖区日益复杂的监管要求。严重度排序风险登记表按 1–10 分给出综合分数，依据是未来 24 个月发生概率，以及对业务的潜在财务或战略影响。 Wiz
              造成竞争替代的严重度最高，为 9/10；原因是 Wiz 已在 $12 billion 估值下融资超过 $1 billion，且估算 ARR 约领先 $300 million，而 Orca 估算 ARR 为
              $100–200 million。 2023 年 7 月商业秘密诉讼带来的活跃知识产权诉讼评分为 8/10，综合了管理层分心、 法律支出和声誉暴露。AWS Security Hub、Microsoft
              Defender for Cloud 和 GCP Security Command Center 推动市场商品化，评分 7/10。考虑到 2022 年周期高点估值和 2025–2026 年软件估值倍数压缩，
              财务估值风险评分 7/10。监管合规复杂度和关键人物依赖各为 6/10。运营 API 依赖为 5/10， 属于中等但可管理风险。每项风险都有明确缓释措施，但仍有剩余暴露，值得投资人和董事会在 2026
              年前持续监控。
