      - number: '1.5'
        title: 市场地位、认可与负面事件
        blocks:
          - type: paragraph
            body: >
              Orca 已获得分析机构和同行评测平台的外部验证。Gartner 在 2024 年 Cloud-Native Application Protection Platforms（CNAPP）Magic
              Quadrant 中将 Orca Security 评为 Leader。截至研究日，产品在 G2 上获得 4.6/5 评分，评论超过 280 条。案例研究列表页提到 Gartner 评分为 4.8/5。Orca
              入选 2022 年 Forbes Cloud 100，并获得 2022 年 AWS Global Security Partner of the Year。2025 年 1 月，公司成为首个获得 AWS ISV
              Accelerate 资格的纯 CNAPP 厂商，该资格可获得 AWS 一线销售团队的联合销售支持。


              Orca 公开记录中最重大的负面事件，是 2023 年 7 月针对竞争对手 Wiz 提起的诉讼，指控其侵犯版权并窃取商业秘密。Dark Reading 报道称，Orca 指控 Wiz 招募前 Orca
              员工，而这些员工涉嫌带走源代码和专有技术信息。该主张对尽调很重要：Wiz 在公开估值指标上已经超过 Orca（到 2024 年中 Wiz 估值达到
              $32B），而诉讼也反映两家公司竞争的激烈程度。另一个较早的负面信号发生在 2021 年 4 月，当时 Palo Alto Networks 因产品对比向 Orca 发出停止侵权函，Orca 公开拒绝；Orca
              博客将其描述为竞争对手试图压制事实基准，而非实质性法律威胁。两起事件均记录在里程碑表中，代表不同类型的反向证据——竞争对手诉讼和来自既有巨头的竞争压力；后续章节应将其视为仍在发生作用的尽调事项。
