    type: pyramid
    layout: standard
    summary: >-
      金字塔图展示从更广义云安全 TAM 到 Orca 估计可获取市场（SOM）的嵌套测算口径。金字塔说明 $35.84B 云安全总体 TAM 如何包含 $9.79B CNAPP 细分市场，后者又包含约 ~$5.7B 企业 CNAPP
