  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与定价结构
        blocks:
          - type: paragraph
            body: >
              Orca Security 的收入主要来自年度 SaaS 订阅许可，范围按监控的云账户或资产数量确定。无代理 SideScanning
              技术取消了按主机代理授权，使按资产层级定价更简单，并能随客户云足迹扩张而增长。Orca 自家 About
              页面描述的平台覆盖云环境中的工作负载、数据和身份，说明其覆盖的是广义攻击面，而非单点产品定价。收入流还包括合规模块附加项（SOC 2、GDPR、HIPAA、PCI-DSS 包）、AI
              安全态势管理模块，以及用于上线和集成的专业服务。公司通过企业直销和云市场上架分发（AWS Marketplace、Google Cloud Marketplace、Azure
              Marketplace）；Google Cloud 官方合作伙伴列表确认了云服务商关系。收入确认遵循标准 SaaS 订阅会计：年度合同在合同期内按比例确认。公开标价未披露；Gartner 和 G2
              评论确认企业客户直接谈价。这种不透明使公开收入估计高度不确定，也凸显在任何财务模型获得锚点之前，需要从投资人数据室取得 ACV 和 ARR 数据。
