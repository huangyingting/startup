      - number: '3.4'
        title: 超大规模云厂商原生与平台捆绑替代方案
        blocks:
          - type: paragraph
            body: >
              Microsoft Defender for Cloud 是 Microsoft 面向 Azure 和多云环境的一体化 CNAPP 产品。它提供 CSPM、云工作负载保护和 DevOps
              安全能力，并提供免费与付费层级。免费的基础 CSPM 层级会为 Azure 订阅自动启用，给了 Microsoft 独立 CNAPP 厂商无法复制的分发优势。对于以 Azure 工作负载为主、且已有
              Microsoft 安全投入的企业，Defender for Cloud 会降低其对第三方 CNAPP 工具的感知需求，尤其是在 CSPM 层面。


              AWS Security Hub 将 AWS 原生服务和合作伙伴集成中的安全发现汇总到单一仪表盘，并提供自动化合规检查。Amazon GuardDuty 用 AI 和 ML 做持续威胁检测，监控
              CloudTrail 日志、VPC flow logs、DNS 查询和 EKS 控制平面活动。两者合起来，为已经支付 AWS 服务费用的 AWS 计算工作负载提供深度 AWS
              原生可见性，且没有边际成本。它们的限制主要在范围：Security Hub 和 GuardDuty 为 AWS 环境优化，对于拥有大量 Azure 或 GCP 足迹的组织价值有限。Orca 覆盖
              AWS、Azure、GCP 和 OCI 的多云能力，正是对这一限制的直接回应。


              Google Security Command Center 为 Google Cloud 工作负载提供默认常开安全，包括内置威胁检测、基于客户 GCP 环境数字孪生模型的攻击模拟式虚拟红队，以及 AI
              工作负载保护。收购后与 Wiz 的整合，有可能打造一个深度集成的 GCP 原生 CNAPP，进一步侵蚀大型 GCP 为主用户中独立 CNAPP 厂商的可触达市场。Orca
              的反向定位是多云广度和供应商独立性——对于不能或不愿押注单一超大规模云厂商的组织安全团队，这两个利益点更有共鸣。
