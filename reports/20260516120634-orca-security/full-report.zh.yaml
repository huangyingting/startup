  - id: FI001
    title: 收入模型桥接图
    description: Orca 如何把云账户接入转化为订阅收入和毛利。
    type: flow
    layout: wide
    summary: Orca 靠无代理授权模型，把云账户覆盖转成经常性订阅收入；毛利较高，但实际兑现的毛利率未披露。
    data:
      nodes:
        - id: cloud_onboard
          label: 云账户接入
          detail: 客户通过 API key 连接云账户（AWS、GCP、Azure）；无需安装代理。
          tone: positive
        - id: sidescanning
          label: 无代理 SideScanning 覆盖
          detail: SideScanning 读取云工作负载快照，不影响性能；单账户覆盖范围广。
          tone: positive
        - id: platform_license
          label: 年度平台订阅
          detail: 经常性授权费随云账户数量和 / 或覆盖资产规模增长。
          tone: positive
        - id: module_upsell
          label: 合规与 AI 模块加购
          detail: 合规包（SOC 2、GDPR、HIPAA）和 AI-SPM 模块带来增量授权费。
          tone: neutral
        - id: marketplace
          label: 云市场分发
          detail: 上架 AWS、GCP、Azure 市场降低采购摩擦；平台抽成压低净收入。
          tone: neutral
        - id: gross_profit
          label: 毛利池
          detail: 参照 SaaS 可比公司，估计毛利率为 70–80%；实际毛利率未披露。纯软件交付意味着没有硬件 COGS。
          approximationNotes: Gross margin estimated from CrowdStrike/Palo Alto Networks SaaS benchmarks; not confirmed by Orca.
          tone: positive
