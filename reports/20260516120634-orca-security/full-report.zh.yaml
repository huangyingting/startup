      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >-
              Orca Security 的主要竞争风险来自 Wiz。Wiz 由前 Microsoft Azure 安全工程师在 2020 年创立， 其企业市场渗透在账户数量和 ARR 上可以说已经超过 Orca。Wiz 截至
              2023 年中据报约 $300 million ARR，相比 Orca 估算 $100–200 million，代表一个有意义且不断拉大的差距， 尽管 Orca 在无代理扫描上有先发优势。Wiz 2023 年 2
              月完成 $300 million Series D， 估值 $10 billion；后续融资使披露总融资超过 $1 billion，形成资本护城河，使其能激进招聘企业销售、 深度折扣获客，并持续投入产品。Wiz
              之外，Palo Alto Networks Prisma Cloud 背靠市值约 $65 billion、拥有庞大装机基础的公司，提供综合 CNAPP 套件。CrowdStrike Falcon Cloud
              Security 受益于并入一个 $35 billion 以上的终端与身份平台。Lacework、Sysdig 和 Aqua Security 用专业能力争夺中端市场账户。 最重要的是，AWS Security
              Hub、Microsoft Defender for Cloud 和 Google Security Command Center 将免费或深度折扣的 CSPM
              功能与云服务捆绑，在低端市场形成结构性价格竞争。Orca 的战略回应是投资 AI 驱动的攻击路径分析、综合 API 安全和统一 CNAPP 平台，超越基础 CSPM。但 Wiz 已推出可比 AI 功能， 压缩了
              Orca 的差异化窗口，也要求 Orca 持续投入产品，以在企业账户中维持竞争对等。
