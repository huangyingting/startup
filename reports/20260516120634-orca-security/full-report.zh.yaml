      - number: '1.4'
        title: 融资历史与投资人基础
        blocks:
          - type: paragraph
            body: >
              自 2019 年成立以来，Orca Security 已完成五轮已披露融资，累计融资约 $630–650M，投后估值达到 $1.8B。融资历史从 2019 年 YL Ventures 的种子轮开始；随后是
              2020 年 3 月由 YL Ventures 和 GGV Capital 共同领投的 $20.5M Series A。约 2021 年 4 月，公司完成由 ICONIQ Growth 领投、YL
              Ventures、GGV Capital 和 SVCI（一组 CISO）参投的 $55M 融资。Orca 当时在自家博客中称其为「Series B」；截至那时，累计融资据报已超过 $82M。


              2021 年 11 月的 $210M 融资在后续报道中通常称为扩展 Series B，由 Tiger Global 和 Accel 领投，GGV Capital、ICONIQ Growth 等参投，投后估值
              $1.2B。2022 年 10 月的 $340M Series C 由 CapitalG（Alphabet 独立成长基金）和 T. Rowe Price 领投，Temasek、CapitalG
              及其他财务投资人加入，把投后估值推至 $1.8B。Orca 的 About 页面称，公司「合计融资近 $630M，估值 $1.8B」；Forbes 则报道其融资 $650M。两者都锚定 $1.8B
              的投后估值。截至 2026 年 5 月的研究日，公司没有公开宣布后续融资。
