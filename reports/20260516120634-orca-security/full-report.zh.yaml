      - CV023
  - id: TV002
    title: 投资逻辑 / 反向逻辑表
    columns:
      - 维度
      - 投资逻辑
      - 反向逻辑
      - 什么会改变判断
    rows:
      - - 市场
        - 到 2026 年，云安全总可用市场（TAM）达 $50B–$77B，复合年增长率（CAGR）为 15–20%；Orca 作为 CNAPP 领导者站位较好
        - 超大规模云厂商建设原生安全能力，可能在 3–5 年内让第三方 CNAPP 商品化
        - 跟踪云安全支出调研和超大规模云厂商原生安全收入披露
      - - 产品
        - 2024 年 Gartner MQ 领导者；获专利的 SideScanning 增加切换摩擦；AI-SPM 模块扩大 TAM
        - Wiz 产品广度追平或超过 Orca；客户赢单 / 输单转向不利
        - 按季度跟踪 G2 和 Gartner Peer Insights 评分；向数据室索取赢单 / 输单数据
      - - 财务情况
        - 已融资约 $628M；估计 ARR $100–200M，毛利率 70–80%；资产负债表强
        - ARR 和 NRR 未披露；烧钱速度与现金跑道不确定；9–18x 倍数区间太宽，难以下结论
        - 投资前，向投资者数据室索取经审计 ARR、NRR 和烧钱速度
      - - 估值
        - 2022 年 10 月 $1.8B 估值标记；按 ARR 区间高端计为 9–18x，相对同行 12–15x 中位数有支撑
        - Wiz 2024 年 $12B 估值意味着 Orca 明显落后；相对估值倍数有压缩风险
        - 跟踪 Wiz 市占率数据；Orca 披露 ARR 或发生老股交易后，估值倍数会重新锚定
    notes: 投资逻辑和反向逻辑来自公开来源；所有 ARR 和市占率数字均为估计。未使用任何专有竞争情报。
    claimRefs:
