      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              Orca 采用销售驱动的 GTM 动作，瞄准中型市场和大型云优先公司的企业安全与平台工程团队。产品通过直销外勤和内勤销售分发，并由三类主要杠杆渠道补充：云服务商市场（AWS、GCP、Azure）、VAR/MSSP
              经销商，以及 Deloitte、KPMG 等全球系统集成商。Google Cloud 官方安全合作伙伴页面确认 Orca 的 ISV 身份和市场集成，说明客户可用云额度抵扣采购，降低企业采购摩擦。公司的
              GitHub 公开存在覆盖 Terraform providers 和开源工具，作为自下而上的开发者关系渠道，补充自上而下的企业销售动作。作为一家中期公司，Orca 的员工数代理值为
              1,000+（LinkedIn），很可能运行混合 GTM，由背配额 AE 搭配解决方案工程师。获客成本、销售周期长度和渠道组合百分比均未公开。云安全 SaaS 行业基准显示，这一规模的企业销售动作 CAC
              回本期为 12–24 个月；但没有 ACV 和新客户数据，无法独立验证。公司网站定价不透明且没有任何免费增值层级，确认其缺少自助式产品驱动增长动作。
