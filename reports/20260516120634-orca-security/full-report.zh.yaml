      - number: '8.5'
        title: 退出准备度与流动性路径
        blocks:
          - type: paragraph
            body: |
              Orca 在定性因素上的退出准备度中等偏强，但受限于未披露财务指标。2024 年
              Gartner Magic Quadrant Leader 认定验证了企业市场接受度，可在 IPO S-1
              注册声明或 M&A 数据室中支撑溢价。Temasek、ICONIQ Capital 和 CapitalG
              投资人财团合计管理数万亿美元资产，与云基础设施和网络安全领域战略收购方
              关系深厚。这些关系实质性改善 Orca 进入结构化退出流程的机会。五个最可信战略收购方
              分别是 AWS（云安全整合）、Microsoft Azure（增强 Defender for Cloud）、
              Google Cloud（扩展 Security Command Center）、Palo Alto Networks
              （拓宽 Prisma Cloud）和 Cisco（建设云安全平台）。每一家都有资产负债表能力和战略理由，
              以基准情景估值吸收 Orca。IPO 路径没那么近：2023–2025 年网络安全 SaaS IPO 市场
              基本关闭；Orca 在提交 S-1 之前，需要证明至少 $200M ARR，且 NRR 强劲、
              自由现金流轨迹转正。论点破坏和叫停触发因素表编码了会使投资案例失效的
              具体可观察阈值。最终尽调问题表列出了承销该仓位前必须满足的四项数据室请求。
              Wiz 诉讼解决和股权结构表中的优先股层级确认，都是评估下行保护的前置条件。
