      - number: '5.4'
        title: 创新记录与 AI 能力
        blocks:
          - type: paragraph
            body: >
              Orca 的创新轨迹始于 2019 年的创立洞察：云安全需要一套根本不同的架构。 公司 2021 年 Series B 博客记录，Orca 团队在平台尚未大规模商业化前，就用 SideScanning 扫描
              Dell、Cisco、IBM、Symantec、Splunk 和 Oracle 的数千台虚拟设备， 帮助数百家组织提升已出货产品的安全态势。这个早期用例证明，平台不只适用于企业直接部署。


              2021–2022 年，模块扩展很快。随着云原生架构成熟，Orca 增加了 Kubernetes 安全能力， 并扩展 CIEM 和 DSPM 功能。到 2022 年 10 月，Orca 以 $1.8
              billion 估值完成 $340 million Series C，反映市场认可平台广度。2022 年，Orca 还入选 Forbes Cloud 100， 并获得 AWS Global Security
              Partner of the Year。


              2023–2024 年，Orca 通过 Orca Sensor 推出云检测与响应（CDR）， 补上此前被视为无代理扫描主要局限的实时检测缺口。随着组织开始大规模部署 AI/ML 工作负载， AI SPM 于
              2024 年发布。AI SPM 发布使 Orca 进入 AI 安全领域的早期 CNAPP 参与者行列； Shai Alon 和 Shir Sadon 将 AI
              模型安全定义为新的攻击面，因为「训练数据中的敏感数据和知识产权」 会放大风险。


              2024 年 4 月，Gartner 在 Cloud-Native Application Protection Platforms Magic Quadrant 中将 Orca Security 评为
              Leader，这一里程碑验证了平台广度和市场执行力。2025 年 1 月， Orca 获得 AWS ISV Accelerate 资格，成为首个做到这一点的纯 CNAPP 厂商，并带来实质销售渠道收益。 Orca
              AI 计划（AI Code Fixes、AI Discovery、AI Assistant、AI Agents）作为 AI 辅助安全运营持续创新的一部分发布。


              GitHub 上的平台速度信号显示，截至 2026 年 5 月，开源维护仍然活跃：orca-skills 仓库 有 42 个 star，并在 2026 年 5 月 14
              日更新；terraform-provider-orcasecurity 于 2026 年 5 月 5 日更新，提交历史活跃。CLI（orca-cli）在 2026 年 5 月 11 日更新，
              继续维护编程式访问工具。这些信号表明，Orca 仍在投入 R&D 和面向开发者的产品工作。
