      - number: '4.3'
        title: 单位经济与资本效率
        blocks:
          - type: paragraph
            body: >
              Orca 的单位经济画像符合云原生安全垂直中的企业 SaaS：纯软件交付带来高毛利，激进销售和营销投入推迟盈利，并依靠既有账户内云足迹扩大来扩张收入。毛利率估计为 70–80%，与 Palo Alto
              Networks 云安全单元和 CrowdStrike 等同行一致；两者报告的软件毛利率为 73–78%。净留存率（NRR）未披露；采用扩张驱动模型的云安全 SaaS 同行报告 NRR 在 110–130%
              区间。获客成本未公布；对于企业销售驱动 SaaS，CAC/首年 ACV 比通常落在 0.8–1.5x 区间，在类似动态假设下意味着 10–18 个月回本期。Orca 的纯 SaaS
              交付模型意味着资本开支极低：没有实体硬件、没有分发基础设施，也没有库存，因此自由现金流生成取决于订阅收入减去运营费用。没有披露任何 capex、债务额度或项目融资义务，说明 Orca
              按标准软件订阅业务运营，营运资本主要绑定在应收账款和递延收入上。本章所有单位经济估计都来自基准可比公司推断，应与 Orca 投资人数据室核对。
