      - number: '1.3'
        title: 领导层与组织结构
        blocks:
          - type: paragraph
            body: >
              Orca Security 由 Avi Shua 和 Gil Geron 联合创办，两人都带有深厚的以色列网络安全背景，曾在 Check Point Software Technologies 和 IDF
              Unit 8200 工作。Avi Shua 从 2019 年创立起担任 CEO，直到 2023 年 3 月转任首席创新官，继续负责技术战略以及 SideScanning 和 Unified Data Model
              架构。Gil Geron 同期担任首席产品官，并于 2023 年 3 月接任 CEO，之后一直领导公司。Orca 官方材料称，Geron 拥有超过二十年的网络安全产品领导经验。


              更广的领导团队包括 Raf Chiodo（CRO，曾任职 Lacework 和 Dell/EMC）、Gera Dorfman（CPO，曾任 Check Point 网络安全产品副总裁）、Oded
              Edri（CFO，曾任 Payoneer 首席会计官和 MakerBot CFO）、Yoav Alon（CTO，前 Unit 8200 研究员、Check Point 安全架构师）、Rachel
              Nislick（CMO，曾任职 Darktrace、Mimecast 和 Veracode）以及 Gal Tanchelson（SVP HR，背景来自 Check Point 和 Payoneer）。工程、产品和
              HR 体系中 Check Point 校友密度很高，反映了创始人的来源；即便不看两位联合创始人，公司在职能领导层也可能存在关键人集中风险。
