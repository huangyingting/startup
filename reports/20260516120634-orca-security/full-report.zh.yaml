      - number: '8.4'
        title: 牛 / 基准 / 熊情景
        blocks:
          - type: paragraph
            body: |
              三个退出情景刻画了以当前 $1.8 billion 估值投资 Orca Security 的结果分布。
              牛市情景设想通过 IPO 或溢价战略收购实现 $3.0B–$5.0B 退出；前提是
              Orca 达到 $250–350 million ARR、NRR 超过 115%，并受益于 IPO 市场重启
              或超大规模云厂商收购方之间的竞价拍卖。牛市情景的概率信号为低到中，因为它
              要求 Orca 从资本更充足的 Wiz 手中重新夺回竞争动能，并跑通资本效率更高的
              增长路径。基准情景是由 Palo Alto Networks、Cisco、Google、Microsoft 或
              AWS 以 $1.5B–$2.5B 战略收购；任何一方都会把 Orca 的已安装企业客户基础、
              CNAPP 平台和 SideScanning IP 视为云安全产品组合的加速器。在
              $150–200 million ARR 下，8–12x 收入倍数对应 $1.2B–$2.4B 企业价值，
              与基准情景范围一致。概率信号为中等，因为云安全战略 M&A 一直活跃，Orca 也具备
              吸引可信买家的规模和投资人背书。熊市情景为 $0.9B–$1.5B，涵盖降价融资
              或平价融资事件；在这种情形中，Wiz 持续主导市场份额，侵蚀 Orca
              企业管线，ARR 增长明显放缓。如果 Orca ARR 停滞在 $80–120 million，
              9–10x 倍数对应 $720M–$1.2B 企业价值，意味着相对 $1.8B 估值
              出现有意义减值。下行触发因素包括诉讼结果不利、CEO 执行失误，
              或 IPO 市场持续关闭迫使桥接融资。
            claimRefs:
              - CV009
              - CV012
              - CV024
              - CV025
              - CV026
