chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Orca Security 成立于 2019 年，总部位于 Oregon 州 Portland，并在 Tel Aviv 和 London
              设有办公室。公司自称是无代理云安全的先行者，核心使命是帮助组织在云端安全发展。Orca 通过一套建立在自研 SideScanning™ 技术上的云原生应用保护平台（CNAPP）落地这项使命：平台与云服务商 API
              集成，读取云工作负载运行时数据，而不是在工作负载内部部署代理。「Orca」之名来自虎鲸；虎鲸的声呐能力呼应了公司对自身产品的定位——以较低运维影响，深入、广泛地扫描云环境。


              Orca 的商业模式是 SaaS，主要卖给负责多云环境的企业和中型市场安全团队。在 CNAPP 市场中，Orca 与 Wiz、Palo Alto Networks Prisma Cloud、CrowdStrike
              Falcon Cloud Security 等公司竞争。公司的价值主张围绕其所谓的「3 Cs」：覆盖所有云资产的全面覆盖（Comprehensive
              coverage）、通过无代理部署实现的低摩擦覆盖（Coverage without friction），以及把最关键 1% 告警排到前面的语境化风险评估（Contextualized risk
              assessment）。LinkedIn 将 Orca 描述为「面向 AWS、Azure、Google Cloud、Kubernetes 的无代理云安全先行者」；截至研究日，公司有 127,000 名关注者。
