      - number: '3.3'
        title: Orca 差异化与竞争定位
        blocks:
          - type: paragraph
            body: >
              Orca Security 的主要差异点是已获专利的 SideScanning™ 技术：平台通过与云服务商 API
              集成并访问只读块存储快照来读取云工作负载数据，而不是在客户工作负载内部部署代理。这一架构选择消除了代理部署摩擦，避免运行时性能开销，也能覆盖无法运行传统代理的资产，例如 serverless
              函数、托管数据库和遗留虚拟机。Orca 称，连接一个云账户后数分钟内即可实现 100% 工作负载深度覆盖；相比需要数周或数月才能在大型企业中达到完整覆盖的基于代理竞争对手，这一部署速度更有优势。


              Unified Data Model 是第二个差异化支柱。Orca 将 CSPM、CWPP、KSPM、CIEM、DSPM、CDR 和 AI SPM
              的数据关联到单一图谱中，浮出由单个低严重性发现串成的高严重性攻击路径。Orca 称，语境驱动的风险排序只呈现真正重要的 1% 告警，直接解决困扰基于代理单点方案的告警疲劳问题。Wiz 也用类似概念打造
              Security Graph；随着两家厂商迭代，这种架构趋同意味着 Orca 在这一维度的差异化正在下降。


              面对 Prisma Cloud 和较早 CrowdStrike CNAPP 配置等传统重代理平台，Orca 的部署模型优势最明显。面对 Wiz，差异化更窄，主要集中在定价、客户支持质量、集成生态成熟度，以及
              Orca 在无代理架构中的更早专利位置。Orca 的 AWS ISV Accelerate 资格——截至 2025 年 1 月为首个获得该资格的纯 CNAPP 厂商——通过 AWS 一线联合销售提供 GTM
              杠杆；Wiz 尚未通过这一特定机制获得同类优势，尽管 Wiz 与 Google 的关系带来自己的渠道优势。Orca 覆盖 AWS、Azure、GCP、Kubernetes 和 OCI
              的多云广度，也补足了其相对超大规模云厂商专属替代方案的定位。
