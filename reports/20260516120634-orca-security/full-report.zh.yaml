      - number: '6.2'
        title: 客户获取与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              Orca 于 2019 年商业化发布，并在 2020 年拿下第一批标杆企业参考客户，包括 Autodesk 和 Robinhood。 到 2021 年底——在 $210 million Series B
              融资之后——公司付费组织数已超过 200 家。 2022 年 10 月宣布的 $340 million Series C，估值 $1.8 billion；投资人材料和新闻稿提到 800+ 家组织客户，意味着公告前
              12 个月约 3x 增长。这条轨迹由早期灯塔账户的强口碑、 Gartner CNAPP 与云工作负载保护研究覆盖、AWS 和 Azure 联合销售伙伴关系， 以及 Series B
              资本支持的全球销售扩张共同推动。COVID-19 期间及之后，云迁移加速， 企业快速搬迁工作负载，却没有运营能力部署传统基于代理的安全工具；Orca 的无代理叙事因此格外有共鸣。 GTM
              组合一边做入站需求生成——内容营销、Gartner 收录、分析师沟通会—— 一边用主动企业销售队伍锁定拥有 500 个以上云工作负载的组织。Gartner 和 Forrester 覆盖提供第三方背书， 让
              Orca 进入企业候选名单；否则它可能面对更长、更激烈的销售周期。
