      - number: '7.3'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >-
              Orca Security 面临分叉的监管风险画像，横跨数据处理方义务和行业特定合规要求。 公司的无代理 SideScanning 技术会生成客户工作负载的只读快照，其中可能包含个人身份信息、
              受保护健康信息或金融数据，从而触发欧盟客户的 GDPR Article 28 义务，包括正式数据处理协议、 数据驻留控制和跨境传输限制。违反 GDPR 可能导致最高达全球年收入 4% 的行政罚款。
              医疗行业部署需要 HIPAA 业务伙伴协议。扫描支付卡处理环境时，PCI-DSS 数据范围规则适用。 加州注册地企业客户会触发 CCPA 消费者隐私义务。Orca 已取得 SOC 2 Type II 认证和
              ISO 27001 合规， 并发布全面隐私政策来规范数据处理做法。诉讼方面，Orca 于 2023 年 7 月在美国联邦地区法院起诉 Wiz， 指控其挪用商业秘密、侵犯版权和侵权干预。诉状称，Wiz
              雇用了约八名前 Orca 员工， 这些人将专有代码和内部知识带入 Wiz 产品团队。此类复杂商业秘密诉讼通常需要两到四年才能解决， 法律成本可能达到数千万美元，结果不确定。Orca
              可能获得禁令救济和金钱赔偿，也可能在实体问题上败诉， 或协商和解。诉讼消耗高管注意力和财务资源，而这些资源本可用于加速产品开发和企业销售执行。
            claimRefs: []
