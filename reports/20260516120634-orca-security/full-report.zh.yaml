      - CV027
      - CV028
      - CV030
  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - 实际 ARR 和增长率
        - Orca 未公开披露 ARR；分析师区间 $100–200M 太宽，无法支撑估值判断
        - 锚定收入倍数；决定 $1.8B 标记对应 9x 还是 18x ARR；差别就是公允价值与估值过高的差别
        - 向投资者数据室索取经审计 ARR、ACV 和同比增长率
      - - 净收入留存率（NRR）
        - NRR 未披露；按同行基准假设为 100–120%，但未经验证
        - 决定扩张与流失的平衡；NRR 低于 100% 会大幅改写乐观情景
        - 向数据室索取 NRR 和 GRR 队列曲线；与具名账户扩张交叉核对
      - - 股权结构表和清算优先权堆叠
        - 优先股结构、顺位和总优先权负担未公开
        - 影响 $1.5B 基准情景下的实际退出回款；沉重优先权可能削弱普通股回收
        - 向律师索取完整股权结构表、CPAS 以及任何老股交易标记
      - - Wiz 诉讼状态和风险敞口
        - 2023 年 7 月已起诉；截至 2026 年 5 月无公开结果；赔偿和禁令救济范围未知
        - IP 限制或赔偿可能削弱 SideScanning 产品，并给投资者留下悬置风险
        - 在 PACER 跟踪法院案卷；要求外部律师提供诉讼评估和风险敞口估计
    notes: 这些尽调问题是按当前 $1.8B 估值标记承销新股投资前的最低门槛。交易老股头寸前，也应取得股权结构表和诉讼数据。
    claimRefs:
      - CV012
      - CV028
      - CV033
      - CV034
