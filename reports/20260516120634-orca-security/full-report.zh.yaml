      - number: '7.4'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >-
              Orca 的无代理 SideScanning 架构既是主要竞争差异点，也是最关键的运营依赖。 该技术通过超大规模云厂商 API 生成客户云工作负载的短生命周期只读快照，具体包括 AWS EC2
              CreateSnapshot 机制、Azure Managed Disk 导出能力和 GCP persistent-disk snapshot 接口， 无需在单个主机上部署代理。AWS、Azure 或 GCP
              一旦推出破坏性 API 变更、访问政策限制或限流措施， 都可能同时扰乱 Orca 整个客户群的扫描功能。与代理产品不同，云厂商变更对代理产品通常只影响新部署； 主要云厂商的 API
              废弃可能瞬间触发大范围客户影响。第二个运营风险来自规模化数据管道可靠性。 Orca 处理许多并发客户租户的云环境遥测数据；处理延迟或宕机可能导致威胁漏检或告警滞后， 直接削弱持续可见性的价值主张。客户 SLA
              承诺会在宕机事件中带来财务暴露。此外， Orca 扩展到运行时安全能力，包括容器运行时保护和 Kubernetes 态势管理后，引入了基于代理的组件，
              这部分削弱了无代理叙事，并增加部署、版本和兼容性管理开销。关键人物风险集中在联合创始人 CEO Avi Shua 和 CTO Gil Geron；两人的技术愿景和企业关系深度嵌入产品路线图和顶级客户互动。
              任一联合创始人离开，都会显著扰乱产品方向和顶级客户留存。
