  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              云原生应用保护平台（CNAPP）市场已经收敛为两层结构：一小批纯专注型厂商，围绕云专用覆盖的广度和深度竞争；以及更大一组随云订阅捆绑的超大规模云厂商原生工具。Orca Security 位于上层，主要与
              Wiz、Palo Alto Networks Prisma Cloud、CrowdStrike Falcon Cloud Security、Aqua Security、Lacework/Fortinet 和
              Sysdig 竞争。第二层包括 Microsoft Defender for Cloud、带 GuardDuty 的 AWS Security Hub，以及 Google Security Command
              Center，带来另一类竞争挑战：更低价格点，背后是主导型基础设施提供商的采购杠杆。


              Gartner 的 CNAPP Magic Quadrant 是该市场最常被引用的分析师框架；2024 年版本将 Orca 和 Wiz 都列为 Leaders，说明企业买方认为两家厂商都有强执行力和愿景。Palo
              Alto Networks 也经常被列为 Leader 或高曝光 Challenger，反映其完整平台组合。G2 同行评论和 Gartner Peer Insights 都显示 Orca 与 Wiz
              评分很高（4.6–4.8/5 区间）；Wiz 评论量更大，与其更快收入增长和更广 Fortune 100 渗透一致。因此，竞争格局并非静态：交易速度、合作伙伴生态杠杆，以及 Google-Wiz 整合，都是
              Orca 必须应对的竞争秩序实质变化。
