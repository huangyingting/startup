      - number: '5.6'
        title: 开发者体验、IP 组合与工程文化
        blocks:
          - type: paragraph
            body: >
              Orca 面向开发者的工具包体现出一条平台策略：把安全延伸进 CI/CD 流水线和 IaC 工作流。 主要开发者触点包括：（1）Terraform provider（Terraform Registry 上的
              orcasecurity/orca， MPL-2.0 许可证，2026 年 5 月更新），支持用策略即代码配置 Orca 扫描策略；（2）CLI 工具 （orca-cli，基于 PowerShell，并为
              macOS 提供 Homebrew formula），用于编程式访问平台； （3）六个用于左移扫描的 GitHub Actions：shiftleft-sast-action（静态分析）、
              shiftleft-secrets-action（密钥检测）、shiftleft-sca-action（软件成分分析）、
              shiftleft-fs-action（文件系统扫描）、shiftleft-container-image-action（容器镜像扫描） 和 shiftleft-iac-action（基础设施即代码扫描，15 个
              star）；（4）orca-skills 仓库， 提供安全工作流提速插件，2026 年 5 月 14 日更新，有 42 个 star。


              Orca 的 IP 组合以 SideScanning 专利为核心，覆盖无需代理读取云工作负载运行时数据的核心方法。 公司 About 页面称，SideScanning 专利是 Orca
              声称「为现代云安全开辟路径」的基石。 2023 年 7 月针对 Wiz 的诉讼主张，被前员工涉嫌带走的商业秘密中包含与 SideScanning 相关的专有技术信息。
              这使该专利既是竞争护城河，也是公司正在积极防御的诉讼资产。


              Orca 的工程文化扎根于以色列网络安全生态。两位联合创始人 Avi Shua 和 Gil Geron 都有 Israel Intelligence Corps（Unit 8200）和 Check Point
              Software Technologies 背景。 R&D 中心位于 Tel Aviv，与公司 LinkedIn 和新闻材料一致。LinkedIn 显示 Orca 有 127,000
              名关注者；公司未公开披露员工数，但行业估计和 LinkedIn 信号显示，工程组织有数百名工程师， 其中相当一部分在 Tel Aviv。2022 年 Series C 前累计融资 $630–650
              million， 意味着公司具备可观 R&D 能力。


              根据 Orca 案例研究，Autodesk 使用 Orca 保护 AWS 上的生成式 AI 工作负载。Digital Turbine 的 CISO Vivek Menon 表示：「Orca
              几乎从使用第一天起就创造价值。换其他工具，我们要等数月才能看到价值。」 Paidy（日本金融科技公司）报告称，采用 Orca 后每年节省两个 FTE 和 $500,000 云安全管理成本。
              这些案例研究反映了产品价值主张——无代理部署带来的快速见效——也呼应了工程文化似乎在持续强化的方向。
