      - number: '2.3'
        title: 增长驱动、监管顺风与市场约束
        blocks:
          - type: paragraph
            body: >
              四股结构性力量推动云安全和 CNAPP 市场持续扩张。第一，多云和混合云采用显著扩大了企业攻击面；AWS 文档明确把云原生安全定位为迁移战略的基础。第二，数据泄露成本持续推高安全投资压力——IBM 2025
              年报告显示，全球平均成本为 $4.4M，这已进入 CFO 层级。与非 AI 同行相比，AI 辅助检测可为组织节省 $1.9M，进而拉动对 AI 集成型 CNAPP 能力的需求。第三，美国行政令和 NIST
              Cybersecurity Framework 2.0 的零信任要求，迫使受监管行业投资云安全——2025 年 6 月 6 日签署的一项美国 EO 要求 NIST
              和联邦机构进一步强化网络安全态势。第四，DevSecOps 实践和 AI 工作负载扩散，把 CNAPP 买方扩展到开发团队和 AI 基础设施团队，结构性扩大可触达池，也抬高每席经济性。Cloud Security
              Alliance 博客报道确认，云错误配置仍是持续存在的主要攻击向量。


              监管合规要求是企业安全预算最持久的驱动。HIPAA 要求受覆盖医疗实体为云端 ePHI 落实技术保护措施，直接要求访问控制和审计能力。PCI-DSS v4.0 要求持续漏洞扫描和配置监控；能逐年保持完全 PCI
              合规的组织不到 50%，持续推高合规自动化需求。GDPR 和 CCPA 设置数据保护与泄露通知要求，CNAPP 的 DSPM 能力可直接覆盖。NIST CSF 2.0 和美国行政令将联邦机构零信任正式化。欧盟
              NIS2 Directive 将网络安全风险管理义务扩展到能源、银行、医疗和数字基础设施等关键实体。FedRAMP 授权为符合条件的云供应商打开政府采购。Google Cloud 和 AWS
              的合规文档均确认，云共享责任模型要求客户自行负责应用和数据安全层——这正是 CNAPP 的价值主张。


              市场逆风限制 CNAPP 采用速度，并压缩纯厂商利润率。超大规模云厂商原生工具（AWS Security Hub、Azure Defender、Google Cloud SCC）以低增量成本为单云部署提供基础
              CSPM，限制纯 CNAPP 厂商可触达池。Palo Alto Networks Prisma Cloud 和 CrowdStrike Falcon Cloud Security
              的平台捆绑，使这些厂商在与既有企业合同交叉销售时，可以把 CNAPP 价格压到独立报价之下。Wiz 2024 年 $12B 估值和 $1B 融资显示，它是资金异常充足的纯厂商对手，能够持续投入激进定价和
              GTM。企业预算合理化周期利好平台整合者，而不是专业化单点方案。随着超大规模云厂商扩展原生能力，CSPM 商品化是中期结构性风险。
