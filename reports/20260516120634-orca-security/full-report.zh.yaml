          tone: positive
        - id: icp
          label: 企业级 ICP
          detail: 中端市场和大型云优先公司；已确认客户包括 Autodesk、Unity、SAP、Gannett。
          tone: positive
        - id: cac
          label: CAC 未披露
          detail: 企业直销靠一线 AE 和渠道伙伴推进；CAC 未公开。
