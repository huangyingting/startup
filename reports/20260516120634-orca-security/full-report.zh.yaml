      - number: '5.3'
        title: 云平台支持与集成生态
        blocks:
          - type: paragraph
            body: >
              Orca 的云平台合作关系体现出其对三大超大规模云厂商的战略投入。Orca 是 Advanced AWS Security Competency Partner，获得 2022 AWS Global
              Security Partner of the Year；2025 年 1 月， 它成为首个取得 AWS ISV Accelerate 资格的纯 CNAPP 厂商，由此获得 AWS 一线销售团队的联合销售支持。
              平台已与 100 多项 AWS 服务和产品集成，包括 Amazon ECS、S3、GuardDuty、CloudTrail、 Amazon Security Lake、Amazon Inspector 和 AWS
              Security Hub。


              在 Azure 上，Orca 持续扫描所有 Azure 资产，并与 Azure Security Center、Azure Sentinel （Microsoft Sentinel）和 Azure Active
              Directory SSO 集成。公司宣布，Orca 使用 Microsoft Azure OpenAI Service GPT-4 加速修复建议生成。Orca 已上架 Azure Marketplace。在
              Google Cloud Platform 上，Orca 是 Google Advantage Partner，支持 Chronicle SIEM/SOAR、 Security Command
              Center、Pub/Sub、SSO 和 Vertex AI；平台已上架 Google Cloud Marketplace。


              在云厂商集成之外，Orca 还为安全运营和开发者工作流提供广泛集成生态。工单与工作流： Jira 和 ServiceNow，支持修复项目管理的双向集成。沟通：Slack 和 PagerDuty，
              用于实时告警和值班路由。SIEM 与 SOAR：Splunk、Microsoft Sentinel、AWS Security Hub 和 Google Chronicle，用于事件导出和关联调查。开发者与
              IaC：Terraform Registry 上 orcasecurity/orca 命名空间下发布的 Terraform provider（MPL-2.0 许可证）， 以及用于 CI/CD 左移安全扫描的
              GitHub Actions 工作流。集成页面称，Orca 与 「领先技术供应商合作，识别、优先排序并处理云风险」。


              面向托管服务提供商（MSPs），Orca 提供多租户部署模型，让托管云安全服务可以复用同一平台经济性。 合作伙伴计划为渠道伙伴提供售前支持和联合营销项目。Orca
              解决方案页面列出平台在单一集中平台中覆盖全部云安全需求， 包括 CSPM、CWPP、CIEM、DSPM、漏洞管理、API 安全、合规等。
