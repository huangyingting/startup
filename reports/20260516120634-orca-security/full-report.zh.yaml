      items:
        - label: 云安全总体 TAM（2024）
          detail: $35.84B → $75.26B（2030）；CAGR 13.3%；包括 CSPM、CWPP、CASB、IAM、网络安全；Grand View Research
          tone: neutral
        - label: 云安全企业 TAM（2024E）
