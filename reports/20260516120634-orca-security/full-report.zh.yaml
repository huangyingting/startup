      - number: '6.4'
        title: 留存、NPS 与满意度信号
        blocks:
          - type: paragraph
            body: >-
              Orca 公开报告的 Net Promoter Score 为 72，明显高于企业软件约 30–40 的中位数， 显示有一批高度满意、会主动推荐平台的客户。在 G2 上，Orca 基于 150+ 条评价获得
              4.5/5； 企业买方持续称赞无代理部署速度、云资产可见性广度，以及与现有工单和告警工作流集成的便利性。 TrustRadius 评价者给 Orca 4.3/5，企业买方特别强调风险优先级排序和合规自动化。
              PeerSpot 样本更小，截至 2023 年有 16 条评价，也给平台 4.3/5。 各评价平台上的主要负面情绪集中在告警量管理，尤其是调校信噪比的复杂度，以及与 Wiz 的比较； 部分评价者认为 Wiz
              的用户界面更精致、更现代。G2 上 Orca 与 Wiz 的正面对比显示， Wiz 评分 4.7/5，高于 Orca 的 4.5；这一差距反映了 Wiz 激进的产品投入和营销动能。 CloudZero
              的独立评测指出，成本分摊可见性和多租户计费管理存在局限；对云成本架构复杂的组织来说， 这些是相关担忧。尽管竞争信号不一，Orca 核心客户群看起来总体粘性较强，因为 Orca 数据深度嵌入
              SIEM、工单和通知系统，进而嵌入日常安全工作流。
