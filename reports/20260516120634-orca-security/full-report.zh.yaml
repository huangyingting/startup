      - number: '2.5'
        title: 市场成熟度、采用生命周期与 CNAPP 演进
        blocks:
          - type: paragraph
            body: >
              CNAPP 市场处于采用早期增长阶段，距离最初品类定义约两到三年，正在进入主流企业采购。Gartner 2024 年 Cloud-Native Application Protection Platforms
              Magic Quadrant 将 Orca 评为 Leader，标志着分析师群体对该类别的制度化认可——这类里程碑通常发生在大规模企业 RFP 纳入和安全预算标准化之前。平台细分贡献 CNAPP 市场收入的
              60%+，增速快于托管服务细分（14.7% CAGR），确认买方更偏好拥有平台。这一模式类似 SIEM 和 EDR 的历史路径：两个类别都先向平台厂商整合，再进一步并入安全套件，说明 CNAPP
              很可能沿同一弧线演进。


              AI 安全态势管理（AI SPM）是该类别的下一波扩张。Orca 的 AI SPM 模块把平台放到 AI 工作负载和模型基础设施安全的前沿；随着企业 AI 基础设施扩散，这一增量 TAM 扩张可能为可触达市场增加
              10–20%。截至 2026 年 5 月，Cloud Security Alliance 博客报道确认，AI 智能体安全、多云可见性和 DevSecOps
              集成仍是从业者活跃讨论的主题，说明市场还没进入商品化阶段。TechCrunch 的云安全报道也显示，该类别仍有持续的风险投资和并购活动。采用漏斗从 CISO 识别云安全缺口开始，经过 Gartner MQ
              入围和概念验证评估，最后进入多年企业合同，并由新模块和新账户驱动扩张。
