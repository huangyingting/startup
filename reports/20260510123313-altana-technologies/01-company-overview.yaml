company:
  name: Altana Technologies
chapter:
  number: 1
  title: Company Overview
  summary: >
    Altana Technologies is a New York-based AI supply chain intelligence company founded in 2019 that built
    the world's first Value Chain Management System — a federated knowledge graph covering more than 50% of
    global trade flows. The company reached unicorn status in July 2024 after raising a $200M Series C at
    a $1B valuation, counts Maersk, US Customs & Border Protection, and multiple Fortune 500 companies as
    customers, and is executing an ambitious strategy to become the global compliance infrastructure layer
    for trusted trade.

sections:
  - id: identity-and-mission
    title: Company Identity, Mission, and Founding
    body: >
      Altana Technologies, Inc. was founded in 2019 in New York City by Evan Smith (CEO), Peter Swartz
      (Chief Science Officer), and Raphael Tehranian (Chief Operating Officer). The company's stated
      mission is to create the world's trusted trade infrastructure — an AI-powered network that maps
      global value chains so governments and enterprises can understand, comply with, and manage
      cross-border commerce at scale. Altana describes its market as the intersection of trade compliance,
      national security, and sustainability, all converging around supply chain data.


      The company operates as a SaaS platform with a federated learning architecture: customers share data
      insights without surrendering proprietary supply chain information. Altana applies machine learning
      to billions of customs filings, logistics records, and corporate registration data to build a dynamic
      knowledge graph that it claims covers more than 50% of global trade flows. The graph is described as
      "more than twice as rich" as any publicly available dataset, because approximately 50% of its
      facility-to-facility linkages come from private network participants.


      As of Q1 2026, Altana employs approximately 278 people and is headquartered at 285 Fulton Street,
      New York, NY. The company is at the Series C stage — a post-revenue, pre-profitability growth company
      with significant government and enterprise traction, but private financials. Altana introduced the
      label "Value Chain Management System" (VCMS) in June 2024 to differentiate itself from narrow
      supply chain risk or visibility tools, encompassing compliance, Scope 3 carbon tracking, tariff
      planning, disruption simulation, and collaborative workflows. The platform has achieved FedRAMP High
      authorization on AWS GovCloud, enabling deployment in the most sensitive US government environments.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO027
      - CO028
      - CO029
    tableRefs:
      - TO001
    figureRefs:
      - FO003

  - id: leadership-and-governance
    title: Leadership, Board, and Governance
    body: >
      Evan Smith, CEO and Co-Founder, is the public face of Altana and its primary spokesperson. Prior to
      Altana he was an early-stage technology entrepreneur; Forbes reported that he grew up in a fishing
      town in Alaska and studied economics at Yale University, writing his high school senior thesis in
      2003 on "the pending collapse of globalization." Smith describes the supply chain as one of the
      "dirtiest industries on Earth" and frames Altana's mission as cleaning it up through AI transparency.
      His long-held conviction on globalization fragility gives him credibility as a domain advocate.


      Peter Swartz (Chief Science Officer and Co-Founder) leads AI/ML research and the knowledge graph
      architecture. Raphael Tehranian (Chief Operating Officer and Co-Founder) manages business
      operations. Gary Sims serves as Chief Technology Officer, overseeing engineering execution. In
      March 2025, Altana appointed Michael Capellas — former CEO of Compaq and veteran supply chain board
      member at Flextronics and Blue Yonder — as Chairman of the Board, signaling a push toward enterprise
      governance credibility ahead of potential public market preparation.


      The company's governance structure reflects its dual government-and-enterprise go-to-market: Capellas'
      experience with large-account enterprise sales and supply chain infrastructure is directly relevant.
      The founding team of three co-founders with complementary CEO/CSO/COO roles is typical of
      AI-infrastructure startups. Key-person dependency on Evan Smith is significant given his public
      profile, investor relationships, and government advocacy role. The board includes representatives
      from GV (the largest shareholder), Activate Capital, USIT, and others, but detailed board
      composition is not publicly disclosed.
    claimRefs:
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
    tableRefs:
      - TO002

  - id: funding-and-investors
    title: Funding History and Investor Landscape
    body: >
      Altana has raised approximately $322M–$343M across four primary funding rounds since its 2019
      founding. The seed round (~$7M, 2020) involved AlleyCorp, Working Capital, Amadeus Capital Partners,
      and Schematic Ventures — a typical early-stage AI infrastructure syndicate. The Series A ($15M,
      September 2021) was led by Floating Point, with participation from Schematic Ventures, Amadeus
      Capital Partners, GV (Google Ventures), and Ridgeline Partners. GV became the largest shareholder
      at the Series A. The Series B ($100M, October 2022) significantly scaled the capital base, with
      participation from ReefKNoT Investments, Activate Group, OMERS Ventures, and Prolog Ventures.


      The landmark Series C ($200M, announced July 29, 2024) was led by Thomas Tull's US Innovative
      Technology Fund (USIT) — a defense-focused venture firm — and brought in new strategic investors
      Generation Investment Management (Al Gore's climate-focused growth fund), March Capital, and
      Salesforce Ventures. All major existing investors participated, confirming continued conviction.
      The Series C set Altana's post-money valuation at $1 billion, granting it unicorn status. The
      investor mix is notable: USIT's defense focus, Generation's climate mandate, and Salesforce's
      enterprise SaaS distribution create a strategically diverse syndicate aligned with Altana's
      government, ESG, and enterprise go-to-market motions.


      The Series C proceeds are earmarked for AI-driven product development to power collaborative
      workflows on top of the data platform, and for accelerated go-to-market with both government and
      enterprise buyers globally. No secondary transactions or debt facilities are publicly disclosed.
    claimRefs:
      - CO012
