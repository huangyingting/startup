callouts:
  - calloutType: strength
    title: Unmatched Knowledge Graph with Compounding Network Effects
    body: >
      Altana's proprietary knowledge graph — covering more than 50% of global trade flows with 2.8B+ shipments
      and 125M+ facility-to-facility connections — is built from both public and private network participant data.
      The federated learning architecture ensures that as more logistics providers and enterprises join the network,
      the graph becomes richer, creating a compounding moat that is structurally difficult for competitors to replicate.
      The CBP Product Passport mandate and Maersk partnership embed Altana further into trade infrastructure.
    claimRefs:
      - CO019
      - CO021
      - CO022
      - CO025

  - calloutType: risk
    title: Private Financials and Revenue Opacity Create Diligence Blind Spot
    body: >
      Altana does not publicly disclose revenue, ARR, gross margin, or burn rate. Estimated ARR of $40–80M
      is derived from headcount comparables and stage benchmarks rather than disclosed data. This opacity makes
      it impossible to verify whether the $1B valuation is supported by actual revenue traction, and whether
      the Maersk and CBP contracts translate to contracted ARR. The absence of verified buyer reviews on G2 or
      Capterra also limits independent product quality assessment.
    claimRefs:
      - CO030
      - CO031

  - calloutType: insight
    title: Government Infrastructure Lock-In Is Altana's Strongest Defensive Moat
    body: >
      The CBP Global Business Identifier Program selection — which makes Altana's Product Passports the
      de facto identifier for CTPAT-certified importers seeking expedited customs clearance — converts the
      platform from optional to structurally embedded. Combined with FedRAMP High authorization, this
      government-mandated infrastructure position is not replicable on a 12-month product roadmap,
      creating a 2–3 year procurement barrier for competitors seeking federal contracts.
    claimRefs:
      - CO022
      - CO028

