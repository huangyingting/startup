      - CO018
    tableRefs:
      - TO003

  - id: products-scale-milestones
    title: Products, Scale, and Key Milestones
    body: >
      Altana's core product is the Value Chain Management System (VCMS), introduced in June 2024 as an
      umbrella platform that unifies supply chain mapping, compliance workflows, Scope 3 carbon reporting,
      tariff simulation, and Product Passports. The VCMS is built on a proprietary knowledge graph
      comprising more than 2.8 billion shipments, tracking over 500 million companies and 850 million
      facilities down to the part-site level, with more than 125 million distinct facility-to-facility
      relationships. Altana claims this graph grows more than 30% annually as more participants join the
      network.


      Product Passports — Altana's newest feature — are digital identity documents that trace a product's
      full origin story from raw materials to end consumer. They are central to the 2025-2026 Maersk
      partnership, which is building a digital trade network across the Gemini Cooperation (Maersk +
      Hapag-Lloyd, launched February 2025), covering 70% of global trade through 12 major international
      ports. US Customs and Border Protection has selected Altana's Product Passports as the product-level
      identifier for its Global Business Identifier Program, a structural wedge that converts the Altana
      network from optional to potentially required for CTPAT-certified importers seeking expedited
      customs clearance.


      Altana's Tariff Scenario Planner, launched in late 2025, saw a reported 213% usage spike during
      the February 2026 US Supreme Court tariff ruling news cycle and was featured in the Wall Street
      Journal, CNBC, and Fortune. The company has approximately 140 million buyer-supplier connections
      on platform and counts five of the world's ten largest logistics providers among its Product
      Passport-sharing network. Security certifications include FedRAMP High (AWS GovCloud), IC C2E,
      ISO/IEC 27001, SOC 2 Type 2, and IRAP, among others. Former US Secretary of Commerce Gina Raimondo
      has publicly endorsed Altana's platform as critical to national economic security and competitiveness.
