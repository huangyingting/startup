  - id: product-roadmap
    title: "Product Roadmap, Maturity and Technical Risks"
    body: >
      Altana's product roadmap is not publicly disclosed, but inferred priorities emerge from regulatory
      developments, public partnership announcements, and usage patterns. The Tariff Scenario Planner's
      213% usage spike in February 2026 suggests near-term investment in tariff simulation depth, HS code
      coverage breadth, and multi-scenario workflow tooling. The CBP GBI Product Passport contract implies
      a scale-out phase for the trade identity infrastructure through H2 2026 and beyond, as CBP begins
      mandating GBI adoption across the importer community. International compliance modules targeting EU
      Carbon Border Adjustment Mechanism (CBAM) obligations and Corporate Sustainability Due Diligence
      Directive (CSDDD) supply chain transparency requirements are a strongly inferred roadmap priority,
      given Altana's existing relationships with multinational compliance buyers.


      Maturity assessment: Supply Chain Intelligence and Risk and Compliance are generally available,
      enterprise-grade modules with documented government deployments. The Tariff Scenario Planner is in
      a scaling phase. The Product Passport/GBI module is in early availability. AI-driven disruption
      simulation — referenced in VCMS marketing materials — appears to be in active development but has
      no independently confirmed GA release date.


      Key technical risks include: absence of independent third-party accuracy benchmarking for the knowledge
      graph; single-cloud AWS concentration risk; undisclosed ML model architecture limiting technical due
      diligence; potential regulatory restriction of customs data access in non-US markets; and network-
      effect dependency on continued member network growth. CBInsights has noted that the absence of
      independent verification of Altana's coverage claims represents a diligence gap for enterprise buyers
      evaluating the platform. The Register has published sceptical commentary on the scalability of
      commercial supply chain graph accuracy claims more broadly.
    claimRefs:
      - CE016
      - CE033
      - CE034
      - CE040
    tableRefs:
      - TE005
    figureRefs:
      - FE004

