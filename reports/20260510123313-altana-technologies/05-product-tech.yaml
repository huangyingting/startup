chapter:
  number: 5
  title: "Product & Technology"
  summary: >
    Altana Technologies operates the world's first commercially available Value Chain Management System (VCMS),
    built on a federated AI knowledge graph spanning 2.8 billion-plus shipments, 500 million-plus companies,
    and 850 million-plus facilities across more than 50% of global trade flows. The platform comprises five
    primary modules — Supply Chain Intelligence, Risk & Compliance, Tariff Scenario Planner, Government / IC
    Platform, and Product Passport / GBI — deployed on AWS GovCloud with FedRAMP High, IC C2E, ISO/IEC 27001,
    SOC 2 Type II, IRAP, and FedRAMP Moderate certifications. The Tariff Scenario Planner recorded a 213%
    usage spike in February 2026, and the CBP Global Business Identifier contract positions Altana as mandated
    trade identity infrastructure. Core technical risks include undisclosed graph database architecture, limited
    third-party accuracy benchmarking, and single-cloud AWS concentration. The product roadmap is not publicly
    disclosed, but inferred priorities include EU compliance module expansion (CBAM/CSDDD), Product Passport
    scale-out, and AI-driven disruption simulation.

sections:
  - id: platform-architecture
    title: "Platform Architecture and Knowledge Graph"
    body: >
      Altana's core technical asset is a federated AI knowledge graph that maps global supply chain relationships
      at a scale unmatched by any publicly available dataset. As of Q1 2026, the graph contains more than 2.8
      billion shipments, 500 million-plus companies, 850 million-plus facilities, 125 million-plus
      facility-to-facility links, and 140 million buyer-supplier connections — covering more than 50% of global
      trade flows. Approximately 50% of the facility-level linkages originate from Altana's proprietary member
      network, whose participants contribute data insights under a federated model that avoids centralised raw
      data pooling.


      The federated learning architecture is Altana's primary technical differentiation: customers contribute
      signal enrichment without surrendering proprietary supply chain intelligence, creating a data flywheel that
      grows more accurate as network membership expands. The graph ingests customs filings from CBP, HMRC,
      EU Customs, and other global trade authorities, combined with logistics EDI feeds, corporate registration
      databases, and private member network data. Entity resolution — disambiguating 850 million-plus facility
      records across languages, transliterations, and jurisdictions — is handled by proprietary machine learning
      models developed under the leadership of CSO Peter Swartz.


      The graph is hosted on AWS GovCloud to satisfy FedRAMP High requirements, making Altana one of the very
      few commercial supply chain intelligence vendors authorised to operate in the most sensitive US government
      computing environments. The graph database technology is not publicly disclosed, but the architecture is
      consistent with commercial graph database patterns analogous to Neo4j-class systems, augmented by
      Altana's proprietary embedding and inference layers. Gary Sims, Chief Technology Officer, leads the
      engineering execution of the platform.
    claimRefs:
