  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: product-roadmap
      missingEvidence: "Altana's detailed product roadmap for 2026-2027, including EU compliance modules (CBAM, CSDDD), AI disruption simulation GA dates, and specific engineering investment priorities."
      whyItMatters: "Without roadmap visibility, competitive positioning against emerging rivals and the pace of international expansion cannot be independently assessed; roadmap slippage risk is unquantifiable."
      diligencePath: "Request CPO roadmap briefing and engineering headcount allocation by module during due diligence data room access."
      relatedQuestionRefs:
        - QE023

    - type: missing-source
      severity: material
      topic: legal-regulatory-privacy
      missingEvidence: "Independent records of any legal challenges, data privacy complaints, regulatory investigations, or GDPR/cross-border data transfer issues affecting Altana's supply chain data collection and processing."
      whyItMatters: "Altana processes billions of cross-border trade records; any GDPR enforcement, CCPA complaint, or CBP data-access restriction could materially impair the graph coverage and customer trust."
      diligencePath: "Search PACER for federal filings, EU DPA complaint registers, and FedRAMP continuous monitoring incident records; obtain legal representations and warranties in due diligence."
      relatedQuestionRefs:
        - QE024

    - type: private-evidence-only
      severity: blocking
      topic: ml-model-architecture
      missingEvidence: "Altana's specific AI model architecture for entity resolution, embedding generation, and supply chain signal inference — including training data composition, model refresh cadence, and accuracy metrics."
      whyItMatters: "Entity resolution quality is the core differentiation of the knowledge graph; inability to independently assess model accuracy limits confidence in the 50%+ coverage claim and graph quality benchmarks."
      diligencePath: "Request technical due diligence session with CSO Peter Swartz; obtain model accuracy evaluation on held-out customs filing sample; review any independent red-teaming or accuracy audit reports."
      relatedQuestionRefs:
        - QE025

    - type: enumeration-incomplete
      severity: material
      topic: enterprise-customers
      missingEvidence: "Full list of named enterprise customers using each Altana VCMS module, with contract values, renewal status, and cross-module adoption rates as of 2026."
      whyItMatters: "Customer concentration is the primary revenue risk for a private company at this ARR stage; inability to enumerate customers prevents assessment of revenue concentration, churn risk, and NRR."
      diligencePath: "Request customer revenue schedule, contract list with ACV and renewal dates, and NPS or churn data from the Series C data room; cross-reference with public CBP and IC contract award databases."
      relatedQuestionRefs:
        - QE026

