  - id: product-modules
    title: "Product Modules and VCMS"
    body: >
      Altana introduced the Value Chain Management System (VCMS) brand in June 2024 to unify five discrete but
      interconnected product modules under a single commercial offering. Supply Chain Intelligence is the core
      graph query and visualisation surface, enabling enterprise procurement, operations, and compliance teams
      to trace multi-tier supply chains, identify sub-tier suppliers, and model disruption scenarios against the
      2.8 billion-plus shipment graph. Risk and Compliance automates UFLPA forced-labour screening, OFAC and
      UN sanctions list matching, and conflict-mineral disclosure workflows against the 850 million-plus facility
      layer — collapsing supplier review cycles from weeks to hours.


      The Tariff Scenario Planner, launched and scaled through the trade disruption of 2025-2026, recorded a
      213% usage spike in February 2026 as enterprises modelled exposure across new US tariff packages. The
      module maps HS code-level tariff schedules onto a customer's sourcing footprint, simulates alternative
      origin scenarios, and generates board-level exposure summaries. The Government and IC Platform is a
      separately provisioned FedRAMP High instance serving US intelligence community agencies and CBP, with
      IC C2E certification enabling deployment in classified environments. The Product Passport and Global
      Business Identifier (GBI) module, for which Altana won the CBP contract, establishes a standardised
      trade identity for every import transaction — a foundational infrastructure role that creates regulatory
      lock-in with US Customs.


      Maersk's Gemini Cooperation partnership, covering 12 ports and approximately 70% of global trade
      by volume, adds real-time ocean freight data to the graph. Altana's estimated ARR of $40–80 million
      reflects early-stage monetisation relative to the graph's breadth.
