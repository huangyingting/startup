  - id: security-compliance
    title: "Security, Compliance and Trust"
    body: >
      Altana has assembled one of the most comprehensive security and compliance credential stacks of any
      commercial supply chain software vendor. FedRAMP High authorisation on AWS GovCloud — achieved in
      approximately 2024 — certifies that the platform satisfies the National Institute of Standards and
      Technology SP 800-53 Rev 5 High baseline, encompassing 325-plus security controls. This authorisation
      is a necessary precondition for any commercial platform to serve US government agencies processing
      Controlled Unclassified Information or higher-sensitivity supply chain data.


      The Intelligence Community Commercially Available Cloud Services (C2E) certification extends Altana's
      authorised deployment scope to intelligence community workloads, making it one of the few commercial
      supply chain platforms available in classified IC environments. ISO/IEC 27001 certification covers the
      information security management system underlying all Altana operations. SOC 2 Type II attestation —
      audited annually by an AICPA-accredited firm — confirms the platform's controls over availability,
      security, processing integrity, and confidentiality. IRAP assessment enables Australian government
      customers to deploy the platform under Australian Signals Directorate security frameworks. FedRAMP
      Moderate authorisation, the earlier certification track that predates the High authorisation, remains
      active on the FedRAMP Marketplace.


      The certification stack creates a significant competitive moat: replicating FedRAMP High and IC C2E
      simultaneously requires years of engineering investment and government relationship-building that
      startup competitors cannot shortcut. No publicly documented security incidents, data breaches, or
      compliance failures have been identified for Altana as of May 2026.
    claimRefs:
