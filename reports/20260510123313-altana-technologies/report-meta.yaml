companyProfile:
  summary: |
    Altana Technologies is a New York-based AI company founded in 2019 that operates the world's
    largest commercial supply chain knowledge graph, mapping 500 million companies, 2.8 billion
    shipments, 850 million facilities, and 140 million buyer-supplier connections. Its Value Chain
    Management System (VCMS) enables enterprises and US government agencies to achieve end-to-end
    supply chain transparency, forced labor compliance (UFLPA), trade compliance, and tariff
    scenario planning. Altana is the only supply chain software vendor holding both FedRAMP High
    (on AWS GovCloud) and Intelligence Community C2E dual certifications, giving it exclusive
    access to classified US government use cases. The company raised $200M Series C in July 2024
    at a $1B valuation from investors including USIT (Thomas Tull), Generation Investment Management,
    March Capital, Salesforce Ventures, and GV.
  foundedDate: "2019-01-01"
  founders:
    - name: "Evan Smith"
      role: "Co-Founder & CEO"
      background: "Former Goldman Sachs technology executive; supply chain intelligence entrepreneur; USIT investor relationship."
      claimRefs: ["CO003"]
    - name: "Peter Swartz"
      role: "Co-Founder & CSO (Chief Science Officer)"
      background: "Data science and network graph expert; leads knowledge graph architecture and AI/ML research."
      claimRefs: ["CO003"]
    - name: "Raphael Tehranian"
      role: "Co-Founder & COO"
      background: "Operations and business development executive; leads commercial enterprise go-to-market."
      claimRefs: ["CO003"]
  foundingLocation: "New York, NY"
  headquarters: "New York, NY"
  productSummary: |
    Altana sells the Value Chain Management System (VCMS) — a modular SaaS platform built on a
    proprietary AI knowledge graph. Key modules include: Supply Chain Intelligence (multi-tier
    supplier mapping, risk scoring), Trade Compliance (UFLPA/forced labor, denied party screening,
    OFAC/sanctions), Tariff Scenario Planner (trade policy impact modeling), and Government
    (FedRAMP High + IC C2E classified deployments including the CBP Global Business Identifier
    Program). Revenue is generated through annual enterprise SaaS subscriptions, US government
    contracts, and professional services implementation fees.
  customerFocus: "Large enterprise importers, manufacturers, retailers, pharmaceutical companies, and US government agencies (CBP, DoD, Intelligence Community) requiring supply chain transparency and trade compliance."
  businessModel: "Annual SaaS subscriptions (land-and-expand model with module upsells); US government multi-year contracts; professional services attach on implementation."
  stage: "Series C"
  fundingStatus: "$200M Series C (July 2024, $1B post-money valuation); $322M total raised. Led by USIT (Thomas Tull); co-investors include Generation Investment Management (Al Gore), March Capital, Salesforce Ventures, GV, Activate Capital, Floating Point, OMERS Ventures."
