              Altana's capital structure is equity-only based on disclosed funding: $322M cumulative from
              VC rounds with no disclosed debt obligations or project finance. The equity-only structure
              is appropriate for an enterprise SaaS business with no physical infrastructure requirements
              beyond cloud hosting.

              Capital adequacy assessment: if net burn is $0-5M/month, the $200M Series C (approximately
