        title: Adverse Evidence and Concentration Risks
        blocks:
          - type: paragraph
            body: |
              Adverse signals warrant diligence attention across three dimensions:

              **Customer experience friction**: Gartner Peer Insights reviews averaging 4.1/5 with noted
              onboarding complexity and professional services dependency suggest scaling challenges.
              If Altana's implementation requires significant customer IT resources and 6–12 month
              deployment timelines, it limits the ability to move down-market or expand rapidly without
              expanding the professional services organization. This creates a cost and scalability risk
              for ARR growth.

              **Incumbent expansion**: The threat from SAP, Oracle, and IBM expanding into AI-native
              supply chain risk is structural and ongoing. Bloomberg and Reuters both noted that
              enterprise software incumbents are investing in supply chain AI capabilities. Altana's
              moat must deepen faster than incumbents can narrow the gap.

              **Data commoditization**: Publicly available customs manifest data (US import/export records)
              is accessible to any competitor willing to process it. Altana's proprietary advantage is
              the 50% member-contributed data and its AI entity resolution layer. If a well-funded entrant
              (Google Cloud, Microsoft) commoditizes the entity resolution layer, the proprietary data
              share becomes the primary differentiator. Monitoring for foundation model companies entering
              supply chain intelligence is a key forward-looking risk signal.
