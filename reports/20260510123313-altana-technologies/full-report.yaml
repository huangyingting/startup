    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation
        blocks:
          - type: paragraph
            body: >-
              Altana serves three primary customer segments: enterprise commercial (Fortune 500 manufacturers,
              retailers, and financial institutions), logistics and freight (carriers, freight forwarders, and 3PLs),
              and government/defense (US CBP, US Navy, and allied customs agencies). The enterprise segment represents
              the largest ACV contribution. Government contracts offer durability but longer procurement cycles. Altana
              primarily serves regulated industries where supply chain opacity creates acute compliance risk. Enterprise
              commercial customers include Fortune 500 manufacturers in automotive, pharmaceutical, and consumer
              electronics, who use Altana to map tier-2 and tier-3 suppliers and comply with UFLPA, CSRD, and SEC
              climate disclosure rules. The logistics segment includes major ocean carriers and freight forwarders who
              integrate Altana data into carrier-selection and risk-management workflows. Government and defense
              customers rely on Altana for trade enforcement, import screening, and defense industrial base
              transparency. Financial services customers including insurers use supply chain risk mapping for
              underwriting decisions. Each segment has distinct procurement motions and contract structures.
