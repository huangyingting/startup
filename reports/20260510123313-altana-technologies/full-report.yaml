  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >
              Altana Technologies operates at the intersection of three overlapping technology markets: supply chain
              management (SCM) software broadly, supply chain visibility and compliance software specifically, and
              AI-driven trade intelligence for governments and enterprises. The included spend covers platforms that
              map, monitor, and manage multi-tier supplier networks; provide trade compliance automation (tariffs,
              sanctions, forced-labor screening, country-of-origin determination); track Scope 3 carbon emissions across
              value chains; and enable government agencies to enforce border security, customs, and trade regulations
              using AI-powered analytics. Excluded spend includes pure real-time logistics tracking (telematics, GPS,
              last-mile delivery), ERP systems, procurement software without supply chain mapping capabilities, and
              traditional freight management.


              Altana's primary SAM sits within supply chain visibility, compliance, and risk intelligence — a
              sub-segment of broader SCM software. Status-quo substitutes include manual customs agents and trade
              attorneys for compliance, spreadsheet-based supplier management, and legacy GRC (governance, risk,
              compliance) software. Key adjacencies include: enterprise risk management, ESG reporting platforms,
              sustainability data services, and customs brokerage software. The most important boundary is between
              real-time operational tracking (Project44, FourKites) and network-level supply chain intelligence (Altana)
              — these are fundamentally different products addressing different budgets, with Altana targeting
              procurement, compliance, and trade policy executives rather than logistics operations teams. This boundary
              is blurring as operational tracking vendors add intelligence layers, creating competitive pressure from
              below.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
