        - label: YoY ARR Growth Rate
          low: 50
          high: 120
          unit: '%'
          source: CEO stated triple-digits Jul 2024; benchmark deceleration to 50-80% at scale
        - label: Blended Gross Margin
          low: 55
          high: 75
          unit: '%'
          source: Descartes comparable 73% SaaS; discounted for PS mix
        - label: Monthly Gross Burn
          low: 5
          high: 9
          unit: $M/month
          source: Headcount proxy (278 employees × $200K total comp) + infrastructure + GTM
        - label: Estimated Cash Remaining (May 2026)
          low: 100
          high: 185
          unit: $M
          source: Series C $200M minus 22 months of estimated net burn
        - label: Remaining Runway (from May 2026)
          low: 18
          high: 36
          unit: months
          source: Toarn Q2 2026 estimate
        - label: Post-Money Valuation
          low: 800
          high: 1200
          unit: $M
          source: July 2024 Series C price $1B; range reflects no observed mark-up or down since
