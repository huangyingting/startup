      - number: '2.3'
        title: Buyer and Segment Landscape
        blocks:
          - type: paragraph
            body: >
              Altana serves two structurally different buyer types with different procurement processes and budget
              owners. Enterprise buyers — typically Fortune 500 manufacturers, retailers, insurers, and logistics
              providers — purchase through procurement, compliance, or chief supply chain officer (CSCO) budgets. The
              triggering event is usually a regulatory mandate (UFLPA violation risk, CBAM obligations, ESG reporting
              requirement), a supply chain disruption (COVID, Suez blockage), or a strategic board-level directive to
              improve resilience. The typical enterprise budget is $500K–$5M annually for supply chain intelligence,
              with a 6–18 month procurement cycle. Government buyers — customs agencies, border security, defense
              procurement — operate under multi-year contracts with structured RFP processes, FedRAMP requirements for
              US federal, and 12–24 month procurement timelines.


              Key buyer segments for Altana include: (1) Manufacturing and retail enterprises facing UFLPA forced labor
              scrutiny and ESG reporting obligations; (2) Logistics providers (Maersk, freight forwarders) seeking to
              build digital trade networks with customs pre-clearance; (3) Financial institutions and insurers (Lloyd's)
              needing supply chain risk underwriting data; (4) Government customs and border agencies (CBP, UK Border
              Force) requiring AI-powered screening tools; and (5) Defense and aerospace primes (General Atomics)
              managing strategic supply chain security. The payer in most cases is the compliance, procurement, or risk
              function, while the user is operations and trade teams, creating a classic multi-stakeholder enterprise
              selling dynamic.


              Mid-market buyers (companies with fewer than $1B revenue) are largely underserved by Altana's current
              model. The platform's complexity, contract size, and sales motion favor large enterprises and government
              accounts, leaving a gap that smaller, vertical-focused competitors (Sourcemap, Trademo) are beginning to
              fill. Altana's Tariff Scenario Planner represents an attempt to reach CFO-adjacent budget owners directly,
              but conversion from awareness to full VCMS contracts has not been publicly disclosed.
            claimRefs:
              - CM010
              - CM011
              - CM012
              - CM013
              - CM014
