            body: |
              Altana's blended gross margin is estimated at 55-75% based on public comparable Descartes Systems
              (73% pure SaaS gross margin) discounted for Altana's professional services mix. The pure SaaS
              component likely carries 70-75% gross margin; professional services (at typical 20-40% gross
              margin) drag the blended rate down based on attach rate.

              FT survey benchmarks for enterprise AI SaaS suggest CAC payback of 18-30 months and LTV:CAC of
              3:1-6:1 at median. Given Altana's $250K-$2M ACV range and estimated 60-70% gross margin, implied
              LTV per customer at 3-year contract is $450K-$4.2M gross profit, with CAC likely $75K-$600K per
              enterprise logo. Government contracts likely carry 80%+ gross margin given the high certification
              barrier that eliminates competition and professional services requirements.

              WSJ and Gartner reviewers highlight professional services dependency as a margin risk: implementation
              complexity (6-12 months) creates elevated cost-of-revenue that may improve over time as Altana
              develops self-service onboarding tools or partner-delivered implementation. Improving the PS:SaaS
              ratio is a key scaling lever for gross margin improvement.

              The Rule of 40 benchmark: estimated growth of 50-80% YoY combined with likely negative FCF of
              5-15% FCF margin places Altana at Rule of 40 score of 35-75 depending on actual growth rate —
              likely at the strong end for a Series C company.
