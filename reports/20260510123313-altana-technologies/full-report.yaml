      - number: '2.2'
        title: Market Sizing — TAM, SAM, and SOM
        blocks:
          - type: paragraph
            body: >
              The total addressable market for supply chain management software is estimated at $28B+ in 2024, with
              multiple analyst houses projecting growth to approximately $46B by 2030 — implying a CAGR of roughly 8–9%.
              This broad TAM includes SCM platforms, WMS, TMS, procurement, sourcing, and related software. However, the
              relevant market for Altana's VCMS is the supply chain visibility, compliance, and intelligence
              sub-segment. Estimates for this narrower segment range from $5B to $9B in 2024, growing at 20–25% CAGR as
              AI capabilities and regulatory mandates accelerate adoption. AI-powered supply chain analytics
              specifically is cited as the fastest-growing segment, with some vendors claiming 25%+ annual growth.


              Altana's serviceable addressable market (SAM) can be estimated at approximately $5–9B globally, covering
              enterprises with complex multi-tier global supply chains (Fortune 2000, large government agencies,
              logistics providers, and insurance companies requiring supply chain risk data). The serviceable obtainable
              market (SOM) — Altana's realistic near-term capture — is considerably smaller given its current enterprise
              and government sales motion, limited market awareness among mid-market buyers, and government procurement
              timelines. Based on stage comparables and current customer profile, SOM is estimated at $500M–$2B over a
              5-year horizon, contingent on Maersk network expansion and CBP mandate rollout. Sizing estimates across
              sources vary by as much as 4x, creating genuine uncertainty that is preserved as an evidence gap.


              Critical sizing methodological note: most market research firms include SAP, Oracle, and IBM SCM revenue
              in their broadest estimates, which inflates TAM. Altana competes in the intelligence and compliance layer,
              not the transaction or ERP layer. Narrowing to AI-powered supply chain compliance and visibility software,
              the 2024 market is more likely in the $3–8B range, with 20%+ growth driven by regulatory mandates (UFLPA,
              CBAM) and post-pandemic resilience investment.
            claimRefs:
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
