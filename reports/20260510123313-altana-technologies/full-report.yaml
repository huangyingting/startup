chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Mission, and Founding
        blocks:
          - type: paragraph
            body: >
              Altana Technologies, Inc. was founded in 2019 in New York City by Evan Smith (CEO), Peter Swartz (Chief
              Science Officer), and Raphael Tehranian (Chief Operating Officer). The company's stated mission is to
              create the world's trusted trade infrastructure — an AI-powered network that maps global value chains so
              governments and enterprises can understand, comply with, and manage cross-border commerce at scale. Altana
              describes its market as the intersection of trade compliance, national security, and sustainability, all
              converging around supply chain data.


              The company operates as a SaaS platform with a federated learning architecture: customers share data
              insights without surrendering proprietary supply chain information. Altana applies machine learning to
              billions of customs filings, logistics records, and corporate registration data to build a dynamic
              knowledge graph that it claims covers more than 50% of global trade flows. The graph is described as "more
              than twice as rich" as any publicly available dataset, because approximately 50% of its
              facility-to-facility linkages come from private network participants.


              As of Q1 2026, Altana employs approximately 278 people and is headquartered at 285 Fulton Street, New
              York, NY. The company is at the Series C stage — a post-revenue, pre-profitability growth company with
              significant government and enterprise traction, but private financials. Altana introduced the label "Value
              Chain Management System" (VCMS) in June 2024 to differentiate itself from narrow supply chain risk or
              visibility tools, encompassing compliance, Scope 3 carbon tracking, tariff planning, disruption
              simulation, and collaborative workflows. The platform has achieved FedRAMP High authorization on AWS
              GovCloud, enabling deployment in the most sensitive US government environments.
