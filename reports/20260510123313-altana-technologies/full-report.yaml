      - number: '5.4'
        title: Technology Stack and Critical Dependencies
        blocks:
          - type: paragraph
            body: >
              Altana's technology infrastructure is anchored on Amazon Web Services GovCloud, providing FedRAMP-
              authorised compute, storage, and networking in US government-designated cloud regions. This single-cloud
              architecture creates a concentration dependency: an AWS GovCloud service disruption, pricing change, or
              policy modification could materially impact platform availability. The graph database technology powering
              the 2.8 billion-plus shipment and 500 million-plus company relationship store is not publicly disclosed;
              based on architectural patterns described in public documentation, it is consistent with a commercial
              graph database or proprietary graph engine optimised for high-degree, geographically distributed nodes.


              The machine learning and entity resolution pipeline — the engineering core that transforms raw customs
              filings into the disambiguated knowledge graph — is Altana's most closely guarded intellectual property.
              Developed under CSO Peter Swartz's research leadership, this pipeline handles cross-language entity
              matching, transliteration normalisation, and temporal relationship tracking across 850 million-plus
              facilities. The API layer exposes graph query results to enterprise customers via REST APIs and webhooks,
              enabling integration with ERP, procurement, and trade compliance systems.


              Critical external dependencies include the member network data contribution model (network effects
              diminish if member churn accelerates), CBP customs filing data access (regulatory changes could restrict
              data availability), the Maersk Gemini Cooperation data integration (partnership dissolution would reduce
              real-time freight coverage), and the CBP GBI contract (which provides both revenue and market
              positioning). Developer signal is limited: Altana maintains minimal public GitHub presence, consistent
              with its enterprise-SaaS rather than developer-ecosystem positioning.
