      - number: '1.3'
        title: Funding History and Investor Landscape
        blocks:
          - type: paragraph
            body: >
              Altana has raised approximately $322M–$343M across four primary funding rounds since its 2019 founding.
              The seed round (~$7M, 2020) involved AlleyCorp, Working Capital, Amadeus Capital Partners, and Schematic
              Ventures — a typical early-stage AI infrastructure syndicate. The Series A ($15M, September 2021) was led
              by Floating Point, with participation from Schematic Ventures, Amadeus Capital Partners, GV (Google
              Ventures), and Ridgeline Partners. GV became the largest shareholder at the Series A. The Series B ($100M,
              October 2022) significantly scaled the capital base, with participation from ReefKNoT Investments,
              Activate Group, OMERS Ventures, and Prolog Ventures.


              The landmark Series C ($200M, announced July 29, 2024) was led by Thomas Tull's US Innovative Technology
              Fund (USIT) — a defense-focused venture firm — and brought in new strategic investors Generation
              Investment Management (Al Gore's climate-focused growth fund), March Capital, and Salesforce Ventures. All
              major existing investors participated, confirming continued conviction. The Series C set Altana's
              post-money valuation at $1 billion, granting it unicorn status. The investor mix is notable: USIT's
              defense focus, Generation's climate mandate, and Salesforce's enterprise SaaS distribution create a
              strategically diverse syndicate aligned with Altana's government, ESG, and enterprise go-to-market
              motions.


              The Series C proceeds are earmarked for AI-driven product development to power collaborative workflows on
              top of the data platform, and for accelerated go-to-market with both government and enterprise buyers
              globally. No secondary transactions or debt facilities are publicly disclosed.
