              phase for the trade identity infrastructure through H2 2026 and beyond, as CBP begins mandating GBI
              adoption across the importer community. International compliance modules targeting EU Carbon Border
              Adjustment Mechanism (CBAM) obligations and Corporate Sustainability Due Diligence Directive (CSDDD)
              supply chain transparency requirements are a strongly inferred roadmap priority, given Altana's existing
              relationships with multinational compliance buyers.


              Maturity assessment: Supply Chain Intelligence and Risk and Compliance are generally available,
              enterprise-grade modules with documented government deployments. The Tariff Scenario Planner is in a
              scaling phase. The Product Passport/GBI module is in early availability. AI-driven disruption simulation —
