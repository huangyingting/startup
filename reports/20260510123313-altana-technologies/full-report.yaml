            body: |
              Financial verdict: Altana presents as a well-capitalized enterprise SaaS with estimated $40-80M
              ARR growing rapidly, a premium-multiple business model (government + AI-native), and adequate
              runway for the next 18-36 months. Revenue quality is generally high from the SaaS subscription
