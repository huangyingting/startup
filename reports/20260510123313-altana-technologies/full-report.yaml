            claimRefs: []
      - number: '8.3'
        title: Current Financing and Valuation Context
        blocks:
          - type: paragraph
            body: |
              Altana raised $200 million in Series C financing at a $1 billion post-money valuation in
              July 2024, co-led by US Innovative Technology Fund and General Atlantic with participation
              from GV (Google Ventures) and Activate Capital. Total funding since 2019 founding is
              $322 million. At estimated $40 to $80 million ARR and $5 to $9 million monthly burn,
              Altana carries 18 to 36 months of runway from May 2026. The Series C was structured to
              fund commercial expansion, government certification depth, and international market entry.

              Valuation methodology applies ARR multiple analysis anchored on the 2 to 8 times NTM
              revenue public comparable band observed for supply chain software (E2open at 2.1x floor,
              Kinaxis at 5.8x, Coupa pre-acquisition at 8.2x), with a 3 to 5 turn premium adjustment
              for the FedRAMP High and IC C2E certification moat quantified by Coalfire at 25 to 40
              percent ARR per seat premium. At 12 to 25 times estimated 2026 ARR, the $1 billion Series
              C valuation sits at the high end of the justified range and requires validation against
              actual ARR and gross margin to confirm. Government certification sets qualify Altana for
              GSA schedule procurement, IC IDIQ vehicles, and Other Transaction Authority (OTA) programs
              that accelerate government sales velocity.
            claimRefs:
              - CV001
              - CV002
              - CV009
              - CV010
              - CV011
              - CV016
              - CV017
              - CV021
              - CV027
          - type: table
            tableRef: TV004
            claimRefs:
              - CV004
              - CV010
              - CV016
              - CV017
              - CV028
              - CV037
          - type: figure
            figureRef: FV002
            claimRefs: []
      - number: '8.4'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: |
              Bull case (probability 25 percent): UFLPA enforcement intensifies through 2026, EU CSDD
              enforcement activates in parallel, Altana closes three or more federal agency contracts
              in H2 2026, NRR reaches 125 percent, and CBAM module captures European demand from
              multinationals. ARR reaches $150 to $200 million by end of 2027. Exit at 8 to 10 times
              2028 ARR of $200 million implies $1.6 to $2.0 billion, yielding 3.2 to 4.0 times return.

              Base case (probability 50 percent): ARR grows 50 percent annually reaching $100 to $130
              million by end of 2027. Government segment stable, enterprise segment adds 20 to 30 new
              logos per year. NRR holds at 110 to 115 percent. Series D closes in H1 2027 at $1.5 to
              $2.0 billion post-money. Exit at 5 to 7 times 2028 ARR of $130 million implies $650
              million to $910 million, yielding 1.3 to 1.8 times return — a modest but positive outcome.

              Bear case (probability 25 percent): UFLPA enforcement softens, government contract renewal
              delayed 6-plus months, NRR deteriorates to 95 to 100 percent, and SAP displacement
              accelerates in enterprise. ARR stagnates at $60 to $80 million by 2027. Series D requires
              flat or down valuation. Exit at 3 to 4 times 2027 ARR of $70 million implies $210 to $280
              million, representing 0.4 to 0.6 times return and material capital impairment.
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
          - type: table
            tableRef: TV003
            claimRefs:
              - CV031
              - CV032
