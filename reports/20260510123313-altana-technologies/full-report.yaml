      - number: '3.4'
        title: Pricing and Go-to-Market Comparison
        blocks:
          - type: paragraph
            body: |
              Pricing in the supply chain intelligence category is uniformly non-transparent across vendors.
              Altana's enterprise contracts are estimated at $250K–$2M ARR per large customer based on
              disclosed investor commentary and peer review qualitative signals. This positions Altana above
              mid-market specialized tools (Sourcemap, Trademo) and below full ERP suite deployments (SAP,
              Oracle) in contract size. Multi-year SaaS contracts with professional services engagements
              create 2–4 year switching cycles that provide revenue durability.

              Go-to-market dynamics: Altana is enterprise-direct, leveraging its government credentials
              as a trust signal for commercial customers. SAP and Oracle go through existing ERP relationships
              and procurement contracts. Project44 and FourKites go through logistics and operations buyers.
              Interos targets supply chain risk officers. Gartner Peer Insights reviews flag Altana's
              implementation complexity and professional services dependency as adverse factors relative to
              ERP-native risk modules from SAP and Oracle, which offer plug-and-play integration at lower
              marginal cost for existing ERP customers.

              Multi-homing is common in the enterprise segment: large buyers often deploy multiple supply
              chain intelligence vendors for different use cases (logistics visibility + compliance +
              supplier risk), moderating the winner-take-all dynamics.
