              (pharmaceutical supply chain compliance), ZF Group (automotive tier-1 supplier mapping), US Customs and
              Border Protection (trade enforcement), and the US Navy (defense supply chain transparency) as production
              customers. Maersk and CBP provide the strongest public evidence as enterprise and government anchors
              respectively. The quality and recency of named customer evidence varies significantly across segments.
              Maersk provides the strongest public signal: a branded press release describing operational integration
              within the Gemini Cooperation, a carrier slot-sharing alliance. US CBP is evidenced through SAM.gov
              federal contracting records and agency press coverage of trade enforcement initiatives. Boston Scientific
              and ZF Group are cited by Altana on its customer page and in press coverage as reference customers, but
              independent corroboration of production deployment scope is limited. The US Navy relationship is mentioned
              in defense-sector media but lacks specific contract disclosures. Lloyd's Insurance Market is mentioned as
              a financial sector customer using supply chain risk intelligence for underwriting, though depth of
              deployment is unclear.
