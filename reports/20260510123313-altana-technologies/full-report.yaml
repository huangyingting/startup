      - number: '6.3'
        title: Government & Defense Customers
        blocks:
          - type: paragraph
            body: >-
              US CBP awarded Altana a contract for supply chain enforcement using the Altana Atlas. The US Navy uses
              Altana for defense industrial base visibility. Federal contracting provides stable, multi-year recurring
              revenue and strong reference value for other regulated industries. Government ACV is estimated to
              represent 20-30% of total revenue based on disclosed contracts. Government and defense contracts are
              strategically significant beyond their direct revenue contribution. Federal agencies operate on multi-year
              budget cycles, providing ARR visibility and reducing churn risk. The GSA IT-70 Multiple Award Schedule
              listing enables Altana to be procured by any federal agency without a separate competitive solicitation,
              significantly reducing sales-cycle friction. UFLPA enforcement by CBP has created a sustained demand
              signal for supply chain transparency tools. Defense supply chain security requirements (CMMC, DFARS) are
              driving further expansion opportunities in the defense industrial base. Government customers also serve as
              credibility anchors for commercial enterprise sales to regulated industries such as pharmaceuticals,
              financial services, and aerospace. The DoD's focus on supply chain resilience under National Security
              Memorandum-10 creates a structural tailwind for Altana's government segment.
            claimRefs: []
          - type: table
            tableRef: TU005
            claimRefs: []
      - number: '6.4'
        title: Retention & Adoption Trajectory
        blocks:
          - type: paragraph
            body: >-
              The Altana Tariff Scenario Planner saw a 213% usage surge in early 2026 amid trade-policy volatility,
              demonstrating strong customer engagement with acute macro events. Government contract renewals provide a
              baseline durability signal. Commercial NRR and GRR are not publicly disclosed. Cohort analysis based on
              disclosed customers suggests enterprise retention above 90% annually. The 213% surge in Tariff Scenario
              Planner usage in Q1 2026 represents a significant adoption signal driven by macro-level trade-policy
              volatility. When the US-China tariff escalation resumed in February 2026, enterprise procurement teams and
              supply chain executives activated the Altana platform for rapid scenario analysis, demonstrating that
              Altana's product addresses acute business pain rather than merely aspirational use cases. Government
              contract renewals, evidenced through SAM.gov and agency procurement records, provide a floor of durable
              recurring revenue. Commercial NRR and GRR remain undisclosed, limiting precise retention assessment. The
              platform's deep data integration (Altana Atlas with 2.8B+ shipments) creates significant switching costs
              for large enterprise customers who have integrated their private spoke data, suggesting structural
              retention above industry averages even absent disclosed metrics.
            claimRefs: []
