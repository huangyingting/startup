    title: Unit Economics Bridge
    artifact: financials
    type: flow
    sourceRefs:
      - SI015
      - SI006
      - SI025
    approximationNotes: >-
      All values are benchmark-derived estimates (BVP, FT survey, Descartes comparable). Actual Altana unit economics
