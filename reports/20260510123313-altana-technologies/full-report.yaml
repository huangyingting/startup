      - number: '4.2'
        title: Revenue Estimates and Financial Position
        blocks:
          - type: paragraph
            body: |
              Altana's financials are entirely private with no public disclosure obligation. Revenue estimates
              from three independent sources (ZoomInfo, Toarn Research, PitchBook) cluster in the $25-80M
              ARR range, with the most methodologically grounded estimate (BVP employee benchmark at $150K-$200K
              ARR/employee applied to 278 employees) yielding $42-56M ARR. CEO Smith's statement at Series C
              that ARR was growing "triple-digits" YoY (from an estimated $15-25M base in early 2024) is
              consistent with a May 2026 ARR in the $40-80M range assuming deceleration to 50-80% growth
              as the company scales.

              Capital position: Altana closed $200M Series C in July 2024, bringing total raised capital to
              $322M. No debt or venture debt obligations are publicly disclosed. Using estimated gross burn
              of $5-9M/month (based on headcount costs of $4.6M/month + infrastructure/GTM) offset by
              growing ARR/12 ($3.5-6.5M/month), estimated net burn is $0-5M/month, suggesting 40-200 months
              of theoretical runway — in practice, Toarn estimates 24-36 months to next financing event,
              targeting a Series D or IPO milestone of $100M+ ARR.

              All figures carry material uncertainty. A comprehensive data room review with actual revenue,
              NRR, customer count, burn, and cash balance data is required before any investment decision.
