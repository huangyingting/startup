      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The market opportunity for Altana is driven by four structural regulatory forces and one macro economic
              driver. First, UFLPA enforcement: the Uyghur Forced Labor Prevention Act (signed December 2021, effective
              June 2022) creates a rebuttable presumption that goods from Xinjiang are made with forced labor, requiring
              importers to affirmatively prove otherwise. CBP detained $1.8B+ in goods under UFLPA by 2024, and
              enforcement is escalating. This directly drives demand for Altana's forced labor screening, supplier
              mapping, and Product Passport capabilities. Second, the EU Carbon Border Adjustment Mechanism (CBAM):
              entered its definitive period on January 1, 2026, requiring EU importers to pay for embedded carbon in
              imports. Altana's Scope 3 carbon tracking and supplier data capabilities directly address CBAM compliance
              obligations. Third, US tariff volatility: the 2025-2026 US tariff escalation has significantly increased
              demand for real-time tariff simulation and country-of-origin determination — confirmed by Altana's
              reported 213% usage spike in its Tariff Scenario Planner during the February 2026 Supreme Court tariff
              ruling news cycle. Fourth, ESG and supply chain disclosure requirements: EU Corporate Sustainability
              Reporting Directive (CSRD) and SEC climate disclosure rules are expanding Scope 3 reporting obligations
              for enterprises, creating demand for verified supply chain data.


              Adoption constraints are significant: (1) Enterprise sales cycles of 6–18 months limit near-term ARR
              growth; (2) Government procurement can take 12–24 months and requires specialized contracting; (3) Data
              privacy concerns around sharing supply chain data in a federated model may slow adoption among highly
              risk-averse enterprises; (4) Platform complexity — the VCMS encompasses many use cases and requires
              significant customer implementation effort; (5) ROI articulation is challenging for compliance spend
              categories where the benefit is risk avoidance rather than measurable cost savings; (6) Competition from
              incumbent ERP vendors (SAP, Oracle) adding AI compliance overlays to existing customer relationships.
              Network effects take time to accumulate: Altana's data moat compounds with more participants, but
              early-stage network density may lag expectations in some trade lanes.
            claimRefs:
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
              - CM020
