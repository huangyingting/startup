      - number: '1.2'
        title: Leadership, Board, and Governance
        blocks:
          - type: paragraph
            body: >
              Evan Smith, CEO and Co-Founder, is the public face of Altana and its primary spokesperson. Prior to Altana
              he was an early-stage technology entrepreneur; Forbes reported that he grew up in a fishing town in Alaska
              and studied economics at Yale University, writing his high school senior thesis in 2003 on "the pending
              collapse of globalization." Smith describes the supply chain as one of the "dirtiest industries on Earth"
              and frames Altana's mission as cleaning it up through AI transparency. His long-held conviction on
              globalization fragility gives him credibility as a domain advocate.


              Peter Swartz (Chief Science Officer and Co-Founder) leads AI/ML research and the knowledge graph
              architecture. Raphael Tehranian (Chief Operating Officer and Co-Founder) manages business operations. Gary
              Sims serves as Chief Technology Officer, overseeing engineering execution. In March 2025, Altana appointed
              Michael Capellas — former CEO of Compaq and veteran supply chain board member at Flextronics and Blue
              Yonder — as Chairman of the Board, signaling a push toward enterprise governance credibility ahead of
              potential public market preparation.


              The company's governance structure reflects its dual government-and-enterprise go-to-market: Capellas'
              experience with large-account enterprise sales and supply chain infrastructure is directly relevant. The
              founding team of three co-founders with complementary CEO/CSO/COO roles is typical of AI-infrastructure
              startups. Key-person dependency on Evan Smith is significant given his public profile, investor
              relationships, and government advocacy role. The board includes representatives from GV (the largest
              shareholder), Activate Capital, USIT, and others, but detailed board composition is not publicly
              disclosed.
