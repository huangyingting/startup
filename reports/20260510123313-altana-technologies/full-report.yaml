            claimRefs: []
      - number: '8.5'
        title: Comparable Set, Exit Readiness, and Final Diligence Asks
        blocks:
          - type: paragraph
            body: |
              The comparable set for Altana valuation benchmarking includes: Kinaxis (TSX: KXS) at
              5.8x NTM revenue, E2open (ETWO) at 2.1x, Coupa Software at 8.2x pre-acquisition,
              Veeva Systems as a GovTech SaaS premium reference at peak 18x, and private transaction
              precedents including Resilinc and Elementum at 6 to 10 times revenue. The blended mid-
              point for certified GovTech supply chain SaaS justified range is 5 to 8 times NTM
              revenue. At $1 billion valuation on $40 to $80 million ARR, Altana is priced at the
              high end of this range requiring strong NRR and ARR growth confirmation.

              Exit readiness across pathways: strategic M and A is the most likely exit for 2026 to
              2028 window with Palantir, Microsoft, SAP, and defense primes as primary strategic
              buyers at estimated 8 to 12 times revenue. IPO readiness requires ARR above $150 million
              and demonstrably consistent growth with government and commercial diversification; current
              trajectory implies IPO readiness no earlier than 2028 to 2029. Secondary sale is viable
              at any stage given institutional quality investor base. Final diligence asks: audited ARR
              by segment, NRR cohort data, government contract renewal schedule, gross margin bridge,
              professional services percentage, and reference calls with CBP, three enterprise accounts,
              and board-level succession plan confirmation.
