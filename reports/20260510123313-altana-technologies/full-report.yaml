  - id: FE001
    title: Product architecture map
    artifact: product-tech
    type: stack
    sourceRefs:
      - SE013
      - SE014
      - SE003
      - SE001
    notes: >-
      Architecture derived from Altana public platform documentation, AWS GovCloud specifications, and FedRAMP
      Marketplace listing. Internal layer boundaries and specific database technologies are inferred from public
      disclosures; proprietary implementation details are not publicly available.
    data:
      layers:
        - label: Data Ingestion Layer
          modules:
            - Global Customs Filings (CBP, HMRC, EU Customs)
            - Logistics EDI and Ocean Freight Feeds (incl. Maersk Gemini Cooperation)
            - Proprietary Member Network Contributions (50% of facility links)
            - Corporate Registration and Ownership Databases
          note: Multi-source ingestion covering 50%+ of global trade flows; member network data is differentiating
        - label: Graph Processing and Entity Resolution Layer
          modules:
            - ML Entity Disambiguation (850M+ Facilities, Cross-Language / Transliteration)
            - Deduplication and Temporal Relationship Tracking
            - Attribute Enrichment and Risk Signal Generation
          note: Proprietary ML pipeline led by CSO Peter Swartz; specific graph engine undisclosed
        - label: Knowledge Graph Layer
          modules:
            - Altana Graph Core (2.8B+ Shipments, 500M+ Companies, 850M+ Facilities)
            - Relationship Index (125M+ Facility-Facility Links, 140M Buyer-Supplier Connections)
          note: Core differentiating asset hosted on AWS GovCloud; graph engine architecture is not publicly disclosed
        - label: Analytics and Intelligence Engine
          modules:
            - Risk Scoring and Compliance Screening Engine (UFLPA / OFAC / Sanctions)
            - Tariff Scenario Modelling and HS Code Engine (213% usage spike Feb 2026)
            - Disruption Simulation and Alternative Supplier Discovery
          note: Powers all VCMS product modules; tariff module showing strongest demand signals in 2026
        - label: API and Integration Layer
          modules:
            - REST API and Webhook Gateway
            - ERP and Procurement System Connectors
          note: Enterprise integration surface; API SLA and rate-limit terms not publicly disclosed
        - label: Application and Product Module Layer
          modules:
            - Supply Chain Intelligence
            - Risk and Compliance
            - Tariff Scenario Planner
            - Government / IC Platform (FedRAMP High + IC C2E)
            - Product Passport / Global Business Identifier (GBI)
          note: VCMS bundles all modules; FedRAMP High + IC C2E unlock classified government deployment
