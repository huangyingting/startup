chapter:
  number: 6
  title: Customers
  summary: Altana Technologies serves enterprise, logistics, and government customers with its AI-powered supply chain intelligence
    platform. Named customers include Maersk, Boston Scientific, ZF Group, US CBP, and the US Navy. Customer adoption spiked
    in early 2026 driven by trade-tariff volatility. Retention signals are strong from government contract renewals, but NRR
    and GRR metrics are not publicly disclosed for commercial accounts.
sections:
- id: customer-segmentation
  title: Customer Segmentation
  body: 'Altana serves three primary customer segments: enterprise commercial (Fortune 500 manufacturers, retailers, and financial
    institutions), logistics and freight (carriers, freight forwarders, and 3PLs), and government/defense (US CBP, US Navy,
    and allied customs agencies). The enterprise segment represents the largest ACV contribution. Government contracts offer
    durability but longer procurement cycles. Altana primarily serves regulated industries where supply chain opacity creates
    acute compliance risk. Enterprise commercial customers include Fortune 500 manufacturers in automotive, pharmaceutical,
    and consumer electronics, who use Altana to map tier-2 and tier-3 suppliers and comply with UFLPA, CSRD, and SEC climate
    disclosure rules. The logistics segment includes major ocean carriers and freight forwarders who integrate Altana data
    into carrier-selection and risk-management workflows. Government and defense customers rely on Altana for trade enforcement,
    import screening, and defense industrial base transparency. Financial services customers including insurers use supply
    chain risk mapping for underwriting decisions. Each segment has distinct procurement motions and contract structures.'
  tableRefs:
  - TU001
  figureRefs:
  - FU001
  - FU002
- id: named-customer-evidence
  title: Named Customer Evidence
  body: 'Altana has publicly named Maersk (Gemini cooperation supply chain intelligence), Boston Scientific (pharmaceutical
    supply chain compliance), ZF Group (automotive tier-1 supplier mapping), US Customs and Border Protection (trade enforcement),
    and the US Navy (defense supply chain transparency) as production customers. Maersk and CBP provide the strongest public
    evidence as enterprise and government anchors respectively. The quality and recency of named customer evidence varies
    significantly across segments. Maersk provides the strongest public signal: a branded press release describing operational
    integration within the Gemini Cooperation, a carrier slot-sharing alliance. US CBP is evidenced through SAM.gov federal
    contracting records and agency press coverage of trade enforcement initiatives. Boston Scientific and ZF Group are cited
    by Altana on its customer page and in press coverage as reference customers, but independent corroboration of production
    deployment scope is limited. The US Navy relationship is mentioned in defense-sector media but lacks specific contract
    disclosures. Lloyd''s Insurance Market is mentioned as a financial sector customer using supply chain risk intelligence
    for underwriting, though depth of deployment is unclear.'
  tableRefs:
  - TU003
  figureRefs:
  - FU003
- id: government-customers
  title: Government & Defense Customers
  body: US CBP awarded Altana a contract for supply chain enforcement using the Altana Atlas. The US Navy uses Altana for
    defense industrial base visibility. Federal contracting provides stable, multi-year recurring revenue and strong reference
    value for other regulated industries. Government ACV is estimated to represent 20-30% of total revenue based on disclosed
    contracts. Government and defense contracts are strategically significant beyond their direct revenue contribution. Federal
    agencies operate on multi-year budget cycles, providing ARR visibility and reducing churn risk. The GSA IT-70 Multiple
    Award Schedule listing enables Altana to be procured by any federal agency without a separate competitive solicitation,
    significantly reducing sales-cycle friction. UFLPA enforcement by CBP has created a sustained demand signal for supply
    chain transparency tools. Defense supply chain security requirements (CMMC, DFARS) are driving further expansion opportunities
    in the defense industrial base. Government customers also serve as credibility anchors for commercial enterprise sales
    to regulated industries such as pharmaceuticals, financial services, and aerospace. The DoD's focus on supply chain resilience
    under National Security Memorandum-10 creates a structural tailwind for Altana's government segment.
  tableRefs:
  - TU005
  figureRefs: []
- id: retention-adoption
  title: Retention & Adoption Trajectory
  body: The Altana Tariff Scenario Planner saw a 213% usage surge in early 2026 amid trade-policy volatility, demonstrating
    strong customer engagement with acute macro events. Government contract renewals provide a baseline durability signal.
    Commercial NRR and GRR are not publicly disclosed. Cohort analysis based on disclosed customers suggests enterprise retention
    above 90% annually. The 213% surge in Tariff Scenario Planner usage in Q1 2026 represents a significant adoption signal
    driven by macro-level trade-policy volatility. When the US-China tariff escalation resumed in February 2026, enterprise
    procurement teams and supply chain executives activated the Altana platform for rapid scenario analysis, demonstrating
    that Altana's product addresses acute business pain rather than merely aspirational use cases. Government contract renewals,
    evidenced through SAM.gov and agency procurement records, provide a floor of durable recurring revenue. Commercial NRR
    and GRR remain undisclosed, limiting precise retention assessment. The platform's deep data integration (Altana Atlas
    with 2.8B+ shipments) creates significant switching costs for large enterprise customers who have integrated their private
    spoke data, suggesting structural retention above industry averages even absent disclosed metrics.
  tableRefs:
  - TU002
  - TU004
  figureRefs:
  - FU004
- id: concentration-risk
  title: Concentration & Expansion Risk
  body: 'Altana''s top-5 customers (Maersk, CBP, Navy, Boston Scientific, ZF Group) likely represent a disproportionate share
    of revenue. Government concentration is offset by contract durability. Land-and-expand is the core commercial motion:
    customers start with supply chain mapping and expand to compliance, tariff analysis, and ESG reporting modules. Procurement
    friction is high for regulated industries. Customer concentration is Altana''s most significant near-term diligence concern
    given the limited public evidence of customer-base breadth. With a relatively small confirmed customer count and government
    contracts likely representing 20-35% of ARR, adverse government policy shifts or contract non-renewals could materially
    impact revenue. Maersk, as both a customer and distribution channel, creates interdependence that could be difficult to
    replace if the Gemini Cooperation changes structure. Post-Series C, Altana has invested in GTM expansion to reduce concentration,
    but the time to diversification is uncertain. Land-and-expand economics are favorable if retention is high: multi-module
    adoption increases ACV per customer and reduces the risk of any single-module price competition. The insurance sector
    represents an emerging concentration diversifier with potentially high ACV and longer-term contract structures due to
    underwriting cycle alignment.'
  tableRefs: []
  figureRefs: []
