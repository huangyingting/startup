  name: Altana Technologies
chapter:
  number: 4
  title: Financials
  summary: Analysis of financials for Altana Technologies.
sections:
- title: Revenue Streams and Business Model
  body: 'Altana operates a modular SaaS model with multiple revenue streams that serve both commercial

    enterprise and US government clients. The primary revenue stream is annual subscription access

    to the VCMS (Value Chain Management System) platform, which includes supply chain intelligence,

    risk monitoring, and trade compliance modules. A secondary revenue stream consists of government

    contracts (FedRAMP High and IC C2E deployments) which are higher-margin and often multi-year

    with recurring delivery obligations.


    Professional services — implementation, integration with ERP systems, and custom data

    configuration — represent a third revenue stream that Gartner reviewers describe as ''substantial''

    in the initial contract period. A fourth emerging revenue stream is usage-based expansion:

    the Tariff Scenario Planner''s 213% usage spike in February 2026 signals potential for

    usage-tier upsell revenue as macro conditions drive recurring high-volume query activity.


    The business model follows a land-and-expand pattern: initial platform access at a base annual

    subscription (estimated $250K-$2M ACV for large enterprise), followed by module upsells

    (Tariff Planner, Enforcement, Government) and data-tier expansions. CEO Smith''s stated focus

    on international expansion implies potential geographic revenue diversification, which carries

    additional cost alongside the revenue opportunity.


    Revenue quality is generally high for the SaaS subscription component (predictable, recurring,

    multi-year contracts) but is partially offset by professional services, which are typically

    lower margin, variable, and subject to implementation risk. The recommended diligence path

    is to review deferred revenue balance, revenue recognition policies, and NRR metrics.

    '
  claimRefs:
  - CI001
  - CI012
  - CI018
  - CI011
  - CI016
  tableRefs:
  - TI001
  figureRefs:
  - FI001
- title: Revenue Estimates and Financial Position
  body: 'Altana''s financials are entirely private with no public disclosure obligation. Revenue estimates

    from three independent sources (ZoomInfo, Toarn Research, PitchBook) cluster in the $25-80M

    ARR range, with the most methodologically grounded estimate (BVP employee benchmark at $150K-$200K

    ARR/employee applied to 278 employees) yielding $42-56M ARR. CEO Smith''s statement at Series C

    that ARR was growing "triple-digits" YoY (from an estimated $15-25M base in early 2024) is

    consistent with a May 2026 ARR in the $40-80M range assuming deceleration to 50-80% growth

    as the company scales.


    Capital position: Altana closed $200M Series C in July 2024, bringing total raised capital to

    $322M. No debt or venture debt obligations are publicly disclosed. Using estimated gross burn

    of $5-9M/month (based on headcount costs of $4.6M/month + infrastructure/GTM) offset by

    growing ARR/12 ($3.5-6.5M/month), estimated net burn is $0-5M/month, suggesting 40-200 months

    of theoretical runway — in practice, Toarn estimates 24-36 months to next financing event,

    targeting a Series D or IPO milestone of $100M+ ARR.


    All figures carry material uncertainty. A comprehensive data room review with actual revenue,

    NRR, customer count, burn, and cash balance data is required before any investment decision.

    '
  claimRefs:
  - CI003
  - CI004
  - CI005
  - CI008
  - CI009
  - CI028
  tableRefs:
  - TI002
  figureRefs:
  - FI003
- title: Unit Economics and Margin Profile
  body: 'Altana''s blended gross margin is estimated at 55-75% based on public comparable Descartes Systems

    (73% pure SaaS gross margin) discounted for Altana''s professional services mix. The pure SaaS

    component likely carries 70-75% gross margin; professional services (at typical 20-40% gross

    margin) drag the blended rate down based on attach rate.


    FT survey benchmarks for enterprise AI SaaS suggest CAC payback of 18-30 months and LTV:CAC of

    3:1-6:1 at median. Given Altana''s $250K-$2M ACV range and estimated 60-70% gross margin, implied

    LTV per customer at 3-year contract is $450K-$4.2M gross profit, with CAC likely $75K-$600K per

    enterprise logo. Government contracts likely carry 80%+ gross margin given the high certification

    barrier that eliminates competition and professional services requirements.


    WSJ and Gartner reviewers highlight professional services dependency as a margin risk: implementation

    complexity (6-12 months) creates elevated cost-of-revenue that may improve over time as Altana

    develops self-service onboarding tools or partner-delivered implementation. Improving the PS:SaaS

    ratio is a key scaling lever for gross margin improvement.


    The Rule of 40 benchmark: estimated growth of 50-80% YoY combined with likely negative FCF of

    5-15% FCF margin places Altana at Rule of 40 score of 35-75 depending on actual growth rate —

    likely at the strong end for a Series C company.

    '
  claimRefs:
  - CI006
  - CI007
  - CI017
  - CI019
  - CI015
  - CI038
  tableRefs:
  - TI003
  figureRefs:
  - FI002
- title: Capital Structure and Adequacy Assessment
  body: 'Altana''s capital structure is equity-only based on disclosed funding: $322M cumulative from

    VC rounds with no disclosed debt obligations or project finance. The equity-only structure

    is appropriate for an enterprise SaaS business with no physical infrastructure requirements

    beyond cloud hosting.


    Capital adequacy assessment: if net burn is $0-5M/month, the $200M Series C (approximately

    $150-180M remaining after 22 months of burn through May 2026) provides runway into 2027 or

    beyond. The planned use of funds — product development, international expansion, government

    contract delivery — is typical capital deployment for an enterprise SaaS at this stage.


    The key adequacy risk is execution against the international expansion plan: entering new

    geographies (EU CBAM compliance market, APAC trade lanes) requires regulatory certification

    costs, local sales teams, and potential data localization requirements. If international

    burn is additive to domestic burn without proportional revenue, the runway shortens materially.


    No Series D has been announced as of May 2026; if Altana targets a $100M+ ARR milestone

    before the next raise, it likely has adequate capital to reach that threshold based on

    current growth trajectory.

    '
  claimRefs:
  - CI020
  - CI031
  - CI035
  - CI016
  - CI023
  - CI032
  tableRefs:
  - TI004
  figureRefs:
  - FI004
- title: Financial Verdict and Diligence Gaps
  body: 'Financial verdict: Altana presents as a well-capitalized enterprise SaaS with estimated $40-80M

    ARR growing rapidly, a premium-multiple business model (government + AI-native), and adequate

    runway for the next 18-36 months. Revenue quality is generally high from the SaaS subscription

    component; professional services creates a quality dilution that is manageable if NRR is high.


    The valuation at $1B (12.5-25x estimated ARR) is defensible for an AI-native, FedRAMP-certified

    government software company with demonstrable demand acceleration and no direct certified competitor.

    At exit, 15-25x NTM ARR is plausible for a strategic acquirer in defense tech, customs/trade, or

    enterprise software.


    Primary adverse financial signal: professional services dependency and implementation complexity

    are structural drags on margin expansion. If Altana cannot reduce time-to-value and PS attach

    rate, gross margin improvement stalls and the path to profitability extends.


    Critical diligence gaps requiring data room access:

    - Actual ARR, NRR, and customer count (not estimatable from public sources)

    - Burn rate and cash balance as of Q1 2026

    - Deferred revenue balance and revenue recognition policy for PS

    - Government contract terms, renewal rates, and revenue concentration

    - CAC and LTV by segment (government vs. commercial)

    '
  claimRefs:
  - CI021
  - CI022
  - CI028
  - CI027
  - CI036
  - CI024
  tableRefs:
  - TI005
