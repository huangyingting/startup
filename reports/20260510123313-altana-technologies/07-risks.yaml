tables:
- id: TR001
  title: Regulatory / legal risk register
  artifact: risks
  notes: Severity and likelihood ratings are qualitative assessments based on regulatory activity, Altana disclosed compliance
    posture, and third-party legal analysis as of May 2026. Not all risks will materialize; mitigation maturity varies significantly
    by risk category.
  enumerationScope:
    coverage: partial
    basis: Material legal and regulatory risks identified through official U.S. and EU regulatory sources, legal databases,
      and industry analysis covering Altana primary operating jurisdictions as of May 2026.
  claimRefs:
  - CR004
  - CR005
  - CR014
  - CR017
  - CR027
  - CR028
  - CR036
  columns:
  - Risk
  - Regulation or Law
  - Current Status
  - Severity
  - Altana Exposure
  - Mitigation
  rows:
  - - UFLPA Enforcement Rollback
    - Uyghur Forced Labor Prevention Act
    - Active enforcement; political rollback risk 2026-2027
    - High
    - Revenue demand directly tied to enforcement volume
    - Diversify into CBAM, tariff planner, and non-UFLPA compliance modules
  - - EU AI Act High-Risk Classification
    - EU Regulation 2024/1689 (EU AI Act)
    - Full enforcement from August 2026
    - High
    - European expansion requires conformity assessment and third-party audits
    - Build algorithmic transparency documentation; engage DG Connect proactively
  - - FTC AI Data Privacy Enforcement
    - FTC Act Section 5 and AI surveillance rules
    - Expanded enforcement program active 2026
    - Medium
    - Knowledge graph aggregation practices under FTC scrutiny
    - Implement consent-based data ingestion framework; engage FTC with voluntary commitments
  - - ITAR and EAR Export Control Reclassification
    - Export Administration Regulations and ITAR
    - Regulatory clarification pending for AI trade data
    - High
    - IC C2E deployment could trigger export licensing requirements
    - Engage DDTC counsel; maintain formal ITAR compliance program for government modules
  - - IP Litigation from Incumbent Data Providers
    - Copyright and trade secret law
    - Latent risk; no active litigation identified as of May 2026
    - Medium
    - Customs data ingestion may overlap with proprietary incumbent datasets
    - Document data provenance; conduct prior art review; retain IP counsel proactively
  - - GDPR Data Subject Rights Obligations
    - EU General Data Protection Regulation
    - Ongoing compliance requirement for EU-accessible data
    - Medium
    - Facility and company data in knowledge graph requires GDPR legal basis
    - Conduct DPIA; appoint EU Data Protection Representative; implement DSR workflow
- id: TR002
  title: Operational / quality / security risk register
  artifact: risks
  notes: Controls reflect Altana publicly disclosed certifications. Residual risk reflects remaining exposure after existing
    controls; actual residual risk requires data room review of ConMon findings and security audit results.
  claimRefs:
  - CR001
  - CR002
  - CR013
  - CR020
  - CR021
  - CR030
  - CR037
  - CR040
  columns:
  - Risk
  - Category
  - Severity
  - Likelihood
  - Controls in Place
  - Residual Risk
  rows:
  - - AWS GovCloud Single-IaaS Concentration
    - Infrastructure
    - Critical
    - Low-Medium
    - AWS SLA 99.9 percent; Altana ConMon; redundancy within GovCloud regions
    - High — no FedRAMP High fallback IaaS; multi-cloud ATO takes 12 to 18 months
  - - Cybersecurity Breach of Trade Data
    - Security
    - Critical
    - Medium
    - FedRAMP High; ISO 27001; SOC 2 Type II; penetration testing; SIEM monitoring
    - Medium — large attack surface from 500M+ entity dataset; nation-state actors designated by CISA
  - - FedRAMP ATO Lapse or ConMon Failure
    - Regulatory Compliance
    - Critical
    - Low
    - Monthly vulnerability scans; annual pen tests; ISSO staffing; FedRAMP PMO reporting
    - Medium — ConMon failure triggers mandatory PMO report; ATO suspension possible within 30 days of critical finding
  - - AI Model Hallucination and Entity Matching Error
    - AI Accuracy
    - High
    - Medium
    - Human-in-the-loop for compliance determinations; accuracy validation framework
    - High — automated pipelines at enterprise scale cannot guarantee human review on every determination
  - - Data Quality from Low-Quality Source Records
    - Data Integrity
    - Medium
    - High
    - Data quality scoring; source weighting; member network corroboration protocols
    - Medium — emerging market customs data quality is systematically lower; errors propagate into compliance outputs
- id: TR003
  title: Partner / dependency risk register
  artifact: risks
  notes: Partner criticality reflects Altana disclosed product architecture. Mitigation effectiveness is estimated based on
    industry norms; formal partner agreement terms and data sharing contract details are not publicly available.
  claimRefs:
  - CR012
  - CR015
  - CR016
  - CR018
  - CR019
  - CR022
  - CR026
  - CR031
  columns:
  - Partner or Vendor
  - Dependency Type
  - Criticality
  - Risk if Lost
  - Mitigation
  rows:
  - - AWS GovCloud
    - Sole FedRAMP High IaaS provider
    - Critical
    - FedRAMP ATO revocation; government contract delivery failure; 12-18 month recovery timeline
    - Contractual SLA; disaster recovery within GovCloud regions; begin multi-cloud ATO roadmap
  - - U.S. Customs and Border Protection (CBP)
    - Government contract revenue anchor; GBI product validation
    - Critical
    - Loss of government market validation; ARR reduction; enterprise sales credibility damage
    - Demonstrate GBI ROI; build multi-agency government pipeline; maintain CBP relationships
  - - Maersk Gemini Cooperation
    - Largest private data feed; 12 ports and approx. 70 percent global trade coverage
    - High
    - Significant knowledge graph coverage and accuracy degradation; loss of network differentiation
    - Diversify data contributors; acquire alternative shipping line feeds; protect data rights contractually
  - - FedRAMP PMO
    - Authorization body for all government deployments
    - High
    - ATO revocation blocks all government and regulated enterprise sales pipeline
    - Maintain rigorous ConMon; proactive PMO engagement; escalation protocols for security findings
  - - Foundation AI Model Providers (OpenAI and Anthropic)
    - LLM inference for reasoning and natural language tasks
    - Medium
    - Service disruption; cost escalation; capability gaps in compliance-specific reasoning
    - Multi-model architecture; fine-tune proprietary models for core tasks; negotiate enterprise SLAs
  - - Member Data Network
    - 50 percent of facility-facility links from proprietary member contributors
    - High
    - Data flywheel degradation; loss of differentiation versus public customs data sources
    - Incentivize member retention; formalize data sharing agreements; expand member base beyond shipping
- id: TR004
  title: People / execution risk register
  artifact: risks
  notes: Succession depth estimated from publicly available leadership information. Compensation and retention data based
    on Glassdoor reviews and AI labor market benchmarks; actual Altana compensation structures are not publicly disclosed.
  claimRefs:
  - CR008
  - CR024
  - CR029
  - CR033
  - CR038
  columns:
  - Role or Person
  - Risk Type
  - Severity
  - Succession or Mitigation
  - Diligence Path
  rows:
  - - Evan Smith — CEO and Co-Founder
    - 'Key-person: government advocacy, strategy, fundraising'
    - Critical
    - Michael Capellas as Chairman provides partial scaffolding; co-founders can bridge short-term
    - Confirm board succession plan; assess government relationships held by company vs. individual
  - - Gary Sims — CTO
    - 'Key-person: technical architecture and engineering execution'
    - High
    - No publicly disclosed CTO succession plan; Peter Swartz could bridge science gap temporarily
    - Interview engineering leadership depth; assess system architecture documentation maturity
  - - Peter Swartz — CSO and Co-Founder
    - 'Key-person: knowledge graph AI and ML research'
    - High
    - Co-founder retention likely contractual; academic network provides succession pool
    - Confirm equity vesting schedule; verify non-compete and IP assignment agreements
  - - AI and ML Engineering Team
    - Talent retention in competitive labor market
    - High
    - Competitive compensation noted on Glassdoor; high pressure culture is a retention risk
    - Review headcount churn last 12 months; verify equity refresh program for senior engineers
  - - Raphael Tehranian — COO and Co-Founder
    - 'Key-person: business operations and government delivery'
    - Medium
    - COO function has more institutional depth; replaceable via executive search with transition planning
    - Confirm operational playbooks documented; assess COO-specific customer relationships
- id: TR005
  title: Mitigation and investment-threshold criteria table
  artifact: risks
  notes: Investment threshold criteria represent levels at which the thesis requires immediate reassessment or exit decision.
    Mitigation actions are recommendations derived from risk profiles; responsibility for implementation rests with Altana
    management and the board.
  claimRefs:
  - CR006
  - CR012
  - CR015
  - CR017
  - CR022
  - CR037
  columns:
  - Risk
  - Mitigation Action
  - Owner
  - Timeline
  - Thesis-Break Threshold
  rows:
  - - Government ARR Concentration
    - Diversify enterprise-direct with no single customer above 15 percent ARR; build multi-agency pipeline
    - CEO and CFO
    - 12 to 18 months
    - Any single customer exceeds 25 percent ARR; government segment above 50 percent without diversification plan
  - - AWS GovCloud Single-IaaS
    - Initiate Azure Government or GCP FedRAMP High ATO; build active-active DR across GovCloud regions
    - CTO and CISO
    - 18 to 24 months
    - AWS GovCloud outage exceeding 8 hours causing government SLA breach; ATO suspension by FedRAMP PMO
  - - UFLPA Enforcement Rollback
    - Accelerate CBAM, tariff planner, and Scope 3 modules to diversify regulatory demand beyond UFLPA
    - CPO and CEO
    - Ongoing quarterly
    - UFLPA enforcement volume drops more than 50 percent year-over-year with no offsetting compliance demand; NRR below 100
      percent
  - - EU AI Act Compliance Failure
    - Appoint EU responsible AI officer; build conformity documentation; engage EU DPA by Q3 2026
    - CPO and Legal
    - 6 to 12 months
    - EU regulator enforcement action against Altana; EU product suspension; customer conformity audit requests refused
  - - CEO Key-Person Departure
    - Document government relationships at institutional level; confirm succession protocols; strengthen COO and CTO bandwidth
    - Board and Chairman
    - Ongoing
    - Evan Smith departure without 6-month transition plan; loss of two or more government contracts within 12 months of departure
  - - ARR Growth Deceleration
    - Monitor NRR by cohort quarterly; escalate if NRR falls below 105 percent for two consecutive quarters
    - CFO and Board
    - Quarterly review
    - ARR YoY growth below 40 percent; NRR below 100 percent for two consecutive quarters; blended gross margin below 55 percent
