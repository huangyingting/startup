sections:
- id: risk-overview
  title: Risk Overview and Assessment Methodology
  body: 'Altana Technologies operates at the intersection of national security, enterprise compliance,

    and AI infrastructure — three domains each carrying elevated risk intensity. This chapter

    applies a severity-and-likelihood framework to eight risk categories: regulatory and legal,

    operational and technical, AI accuracy, partner and dependency, competitive, people and

    execution, financial and model risk, and IP and legal liability. Each risk is rated on a

    severity scale of Critical, High, Medium, and Low and a likelihood scale of Low, Medium,

    and High to produce the risk heatmap exhibit in this section.


    The most material risks center on FedRAMP authorization continuity, government contract

    concentration, AWS GovCloud single-IaaS dependency, UFLPA enforcement variability, EU AI

    Act compliance obligations for the European expansion, and key-person dependency on CEO

    Evan Smith. Residual risk reflects Altana existing controls including FedRAMP High ATO,

    ISO 27001, SOC 2 Type II, and IC C2E certification. Thesis-break thresholds are defined

    for each risk category in the mitigation table. The dependency map and risk transmission

    map figures visualize how risks cascade from primary events to downstream ARR, runway,

    and valuation impacts across the investment horizon.

    '
  claimRefs:
  - CR001
  - CR002
  - CR011
  - CR023
  - CR025
  - CR032
  figureRefs:
  - FR001
- id: regulatory-legal-risks
  title: Regulatory and Legal Risk Analysis
  body: 'Altana faces a layered regulatory risk stack spanning U.S. domestic enforcement and

    international compliance obligations. The Uyghur Forced Labor Prevention Act is both

    Altana primary demand driver and its primary regulatory tail risk: any legislative rollback

    or enforcement pause directly reduces compliance urgency for enterprise buyers. DHS reports

    over 6,000 shipments detained under UFLPA since implementation confirming sustained

    enforcement volume through Q1 2026, but political pressure from import-dependent industries

    creates uncertainty over the enforcement trajectory through 2027 and beyond.


    The EU AI Act entering full enforcement in 2026 classifies AI systems in supply chain

    management as high-risk imposing mandatory conformity assessments, algorithmic transparency

    documentation, and third-party audits on Altana European product offering. The FTC expanded

    AI data privacy enforcement program raises exposure risk for Altana knowledge graph

    aggregation practices. ITAR and EAR export control applicability to AI-generated government

    trade data adds regulatory classification risk for the IC C2E and FedRAMP High deployments.

    IP litigation from incumbent data providers over customs data ingestion methodology is a

    latent non-trivial legal risk requiring ongoing IP counsel monitoring. GDPR data subject

    rights obligations apply to facility and company data in the knowledge graph requiring a

    documented legal basis for each processing activity across the 500 million entity dataset.

    '
  claimRefs:
  - CR003
  - CR004
  - CR005
  - CR007
  - CR009
  - CR014
  - CR017
  - CR021
  - CR027
  - CR028
  - CR034
  - CR035
  - CR036
  tableRefs:
  - TR001
- id: operational-technical-risks
  title: Operational, Technical, and Security Risk Analysis
  body: 'Altana primary operational risk is its exclusive dependency on AWS GovCloud as the sole

    FedRAMP High-authorized IaaS provider. Any significant AWS GovCloud outage triggers Altana

    ConMon obligations and potentially initiates an ATO review process. Multi-cloud migration

    to an alternate FedRAMP High provider requires a new Authorization to Operate that typically

    takes 12 to 18 months making this a long-term structural constraint rather than a

    short-term switchable dependency.


    CISA designates trade data platforms serving government clients as high-priority targets

    for nation-state threat actors elevating Altana cybersecurity posture requirements above

    commercial baselines. The certifications provide strong baseline controls but the attack

    surface covering 500 million companies and 2.8 billion shipments is large and third-party

    member network data ingestion creates external entry vectors. AI accuracy risk is material

    and legally consequential. Gartner identifies knowledge graph hallucination and entity

    matching errors as emerging concerns. Supply Chain Brain reports automated compliance

    determinations without mandatory human review expose vendors to liability under CBP

    enforcement. The 213 percent usage spike in the Tariff Scenario Planner validates product

    demand but also tests infrastructure scalability limits during acute regulatory events.

    Data quality from emerging market customs declarations introduces systematic error

    propagating into UFLPA rebuttable presumption compliance outputs where accuracy is legally

    significant and customer liability is direct.

    '
  claimRefs:
  - CR001
  - CR002
  - CR007
  - CR013
  - CR020
  - CR021
  - CR030
  - CR032
  - CR037
  - CR040
  tableRefs:
  - TR002
  figureRefs:
  - FR002
- id: partner-dependency-competitive-risks
  title: Partner, Dependency, and Competitive Risk Analysis
  body: 'Altana data flywheel depends critically on three external relationships: the Maersk Gemini

    Cooperation data feed covering 12 ports and approximately 70 percent of global trade, the

    CBP Global Business Identifier contract providing government validation and revenue, and

    the AWS GovCloud infrastructure underpinning FedRAMP High authorization. Loss of any one

    relationship represents a material strategic setback. Maersk data termination would degrade

    knowledge graph coverage and the network effect differentiating Altana from public customs

    data sources. CBP contract non-renewal removes a government validation anchor critical to

    enterprise and government sales credibility.


    On the competitive front, SAP and Oracle represent the most credible incumbents threatening

    Altana enterprise segment. FT confirms SAP S/4HANA compliance module is eliminating

    standalone AI budget at manufacturers already paying SAP maintenance. IDC confirms Oracle

    and IBM are similarly expanding native supply chain risk modules with tighter ERP

    integration. Foundation model providers including OpenAI and Anthropic represent a

    longer-horizon threat if they can abstract away Altana data advantage through

    general-purpose enterprise AI for trade compliance. Altana government certification

    moat including IC C2E and FedRAMP High remains the most defensible barrier against both

    incumbents and new entrants in the near term, as no competitor currently holds equivalent

    multi-certification coverage across the national security and enterprise stacks simultaneously.

    '
  claimRefs:
  - CR012
  - CR015
  - CR016
  - CR018
  - CR019
  - CR022
  - CR023
  - CR026
  - CR031
  - CR033
  tableRefs:
  - TR003
  figureRefs:
  - FR003
- id: people-financial-mitigation-risks
  title: People, Execution, Financial, and Investment Threshold Risk
  body: 'CEO Evan Smith is Altana most critical key-person risk as primary government advocate,

    public spokesperson, and the face of the Series C fundraise. His departure would create

    material disruption to investor confidence, government relationships, and strategic

    direction. Chairman Michael Capellas provides partial succession scaffolding as former

    Compaq CEO and experienced supply chain board member, but the transition risk remains

    significant. Gary Sims as CTO and Peter Swartz as CSO represent secondary key-person

    dependencies for technical execution. AI and ML engineering talent retention is under

    pressure from OpenAI, Anthropic, and major technology firms competing aggressively for

    the same labor pool. Glassdoor reviews indicate competitive compensation but high

    execution pressure signaling moderate retention risk at senior engineering levels.


    Financial model risk centers on the undisclosed professional services revenue mix,

    government contract concentration, and dependence on favorable financing conditions to

    reach $100 million ARR before a Series D is required. At estimated $40 to $80 million

    ARR with $5 to $9 million monthly burn, Altana has approximately 18 to 36 months of

    runway from May 2026 which is sufficient but not comfortable. Thesis-break thresholds

    are defined around ARR growth deceleration below 40 percent year-over-year, government

    contract non-renewal creating more than 25 percent ARR concentration with a single

    customer, NRR deterioration below 100 percent, or FedRAMP ATO lapse, any of which

    would require immediate investment thesis reassessment by the diligence team.

    '
