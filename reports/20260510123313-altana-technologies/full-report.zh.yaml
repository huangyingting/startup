      - number: '7.5'
        title: 人员、执行、财务与投资阈值风险
        blocks:
          - type: paragraph
            body: |
              CEO Evan Smith 是 Altana 最关键的人物风险：他是主要政府倡导者、公开发言人，
              也是 Series C 融资的门面。他离职会显著扰动投资者信心、政府关系和战略方向。
              董事长 Michael Capellas 曾任 Compaq CEO，也是有经验的供应链董事，能提供部分
              继任支架，但交接风险仍然显著。CTO Gary Sims 和 CSO Peter Swartz 是技术执行
              上的次级关键人物依赖。AI 和 ML 工程人才留存承压，因为 OpenAI、Anthropic 和大型
              科技公司都在激烈争夺同一劳动力池。Glassdoor 评价显示薪酬有竞争力，但执行压力高，
              指向高级工程层面的中等留存风险。

              财务模型风险集中在未披露的专业服务收入占比、政府合同集中度，以及在需要 Series D
              前达到 $100 million ARR 对有利融资条件的依赖。Altana 估计 ARR 为 $40 to $80
              million，月烧钱 $5 to $9 million；从 2026 年 5 月起现金跑道约 18 至 36 个月，
              足够但不宽裕。投资论点破裂阈值包括：ARR 年同比增速降至 40% 以下；政府合同不续约
              导致单一客户 ARR 集中度超过 25%；NRR 恶化到 100% 以下；或 FedRAMP ATO 失效。
              任何一项都会要求尽调团队立即重新评估投资论点。
