  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户分层
        blocks:
          - type: paragraph
            body: >-
              Altana 服务三类主要客户：企业商业客户（Fortune 500 制造商、零售商和金融机构）、物流与货运客户（承运人、货运代理和 3PL），以及政府 / 国防客户（美国
              CBP、美国海军和盟友海关机构）。企业客户贡献最大的 ACV。政府合同更耐久，但采购周期更长。Altana 主要服务受监管行业，这些行业的供应链不透明会放大合规风险。企业商业客户包括汽车、制药和消费电子领域的
              Fortune 500 制造商，它们使用 Altana 映射二级、三级供应商，并遵守 UFLPA、CSRD 和 SEC 气候披露规则。物流客户包括大型海运承运人和货运代理，它们把 Altana
              数据接入承运人选择和风险管理工作流。政府和国防客户依赖 Altana
              做贸易执法、进口筛查和国防工业基础透明度。包括保险公司在内的金融服务客户用供应链风险映射支持承保决策。每个细分客群都有不同的采购路径和合同结构。
