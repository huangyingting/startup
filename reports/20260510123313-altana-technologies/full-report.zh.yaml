  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与知识图谱
        blocks:
          - type: paragraph
            body: >
              Altana 的核心技术资产是一张联邦 AI 知识图谱，以任何公开数据集都无法匹敌的规模映射全球供应链关系。截至 2026 年 Q1，该图谱包含超过 28 亿票货运、 5 亿多家公司、8.5 亿多个设施、1.25
              亿多条设施到设施链接，以及 1.4 亿条买方—供应商连接，覆盖全球贸易流量 50% 以上。约 50% 的设施级连接来自 Altana 自有成员网络，参与者在联邦模型下贡献数据洞察，避免集中汇集原始数据。


              联邦学习架构是 Altana 最主要的技术差异点：客户贡献信号增强，却不交出自有供应链情报，形成数据飞轮，网络成员越多，图谱越准确。图谱摄入 CBP、 HMRC、EU Customs
              及其他全球贸易主管机构的海关申报，结合物流 EDI 馈送、公司注册数据库和私有成员网络数据。实体解析——在不同语言、音译和司法辖区中消解 8.5 亿多条设施记录的歧义——由 CSO Peter Swartz
              领导开发的自有机器学习模型处理。


              图谱托管在 AWS GovCloud 上，以满足 FedRAMP High 要求，使 Altana 成为极少数获准在美国政府最敏感计算环境中运行的商业供应链情报厂商之一。 图数据库技术未公开披露，但其架构与
              Neo4j 级商用图数据库模式一致，并叠加 Altana 自有 embedding 和推理层。Chief Technology Officer Gary Sims 负责平台工程执行。
