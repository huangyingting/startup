              - CV036
          - type: figure
            figureRef: FV003
            claimRefs: []
      - number: '8.5'
        title: 可比公司、退出准备度与最终尽调问题
        blocks:
          - type: paragraph
            body: |
              Altana 估值基准的可比集合包括：Kinaxis（TSX: KXS）NTM 收入 5.8x、E2open（ETWO）
              2.1x、Coupa Software 被收购前 8.2x、Veeva Systems 作为 GovTech SaaS 溢价参考
              峰值 18x，以及 Resilinc、Elementum 等私有交易先例，收入倍数为 6 至 10 倍。经认证
              GovTech 供应链 SaaS 合理区间的混合中点为 NTM 收入 5 至 8 倍。按 $40 to $80
              million ARR 对应 $1 billion 估值，Altana 定价位于该区间高端，需要确认强 NRR 和
              ARR 增长。

              各路径退出准备度：战略 M&A 是 2026 至 2028 年窗口最可能的退出方式，Palantir、
              Microsoft、SAP 和国防主承包商是主要战略买家，估计倍数为收入的 8 至 12 倍。IPO
              准备度要求 ARR 超过 $150 million，且增长明显稳定，同时政府和商业收入多元化；
              当前轨迹意味着最早 2028 至 2029 年才具备 IPO 准备度。由于机构级投资者基础质量高，
              任何阶段都可以做二级出售。最终尽调问题包括：按板块审计后的 ARR、NRR 客户分组数据、
              政府合同续约排期、毛利率桥、专业服务占比，以及与 CBP、三家企业客户的客户访谈
              和董事会层面的继任计划确认。
