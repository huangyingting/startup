      - number: '4.4'
        title: 资本结构与充足性评估
        blocks:
          - type: paragraph
            body: >
              基于披露融资，Altana 资本结构只有股权：VC 轮累计 $322M，没有披露债务义务或项目融资。对于除云托管外没有实物基础设施需求的企业 SaaS 公司，纯股权结构是合适的。


              资本充足性评估：若净 burn 为 $0–$5M/月，$200M Series C（截至 2026 年 5 月、经过 22 个月 burn 后约剩 $150M–$180M）可提供进入 2027 年或更久的
              runway。资金计划用途——产品开发、国际扩张、政府合同交付——符合这个阶段企业 SaaS 的典型资本部署。


              关键充足性风险在于国际扩张计划的执行：进入新地理市场（欧盟 CBAM 合规市场、APAC 贸易航道）需要监管认证成本、本地销售团队，以及潜在数据本地化要求。如果国际 burn 是国内 burn
              之上的增量，却没有对应收入，runway 会明显缩短。


              截至 2026 年 5 月，Altana 尚未宣布 Series D；如果公司希望在下一轮融资前达到 $100M+ ARR 里程碑，按当前增长轨迹，资本大概率足够支撑其到达该门槛。
