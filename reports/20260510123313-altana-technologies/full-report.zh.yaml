      - number: '1.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 无可匹敌的知识图谱叠加复利型网络效应
            body: >
              Altana 自有知识图谱覆盖全球贸易流量 50% 以上，包含 28 亿多票货运和 1.25 亿多条设施到设施连接，数据同时来自公开来源和私有网络参与者。
              联邦学习架构保证，随着更多物流服务商和企业加入网络，图谱会变得更丰富，形成复利式护城河，竞争对手在结构上很难复制。CBP Product Passport 授权和 Maersk 合作进一步把 Altana
              嵌入贸易基础设施。
