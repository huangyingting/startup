      - number: '8.2'
        title: 建议与投资参数
        blocks:
          - type: paragraph
            body: |
              建议：有条件正面 —— 在附带条件下推进投资。置信度：中高。
              风险评级：中高。估值立场：激进但可辩护，理由是认证护城河和 FedRAMP
              溢价。该建议取决于：(1) 数据室验证 ARR 超过 $60 million，且政府板块集中度低于
              40%；(2) 最近连续四个季度的 NRR 可证明高于 105%；(3) 混合毛利率高于 60%；以及
              (4) 政府合同续约排期显示，没有单一合同在交割后 12 个月内到期且占 ARR 超过 20%。

              投后监控的关键投资 KPI 包括：ARR 按季度同比增长、按客户分组的 NRR、政府
              合同续约率、每季度新增企业客户数、毛利率趋势，以及 FedRAMP 和 IC C2E 授权维护
              状态。会触发考虑退出的投资论点破裂事件包括：FedRAMP ATO 失效；连续两个或以上
              季度 NRR 低于 100%；政府板块超过 ARR 的 50% 且没有多元化计划；或 ARR 年同比增速
              降至 40% 以下。
