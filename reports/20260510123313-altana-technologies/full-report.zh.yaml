chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份、使命与创立
        blocks:
          - type: paragraph
            body: >
              Altana Technologies, Inc. 于 2019 年在纽约市成立，创始人为 Evan Smith（CEO）、Peter Swartz（Chief Science Officer）和 Raphael
              Tehranian（Chief Operating Officer）。公司宣称的使命是打造全球可信贸易基础设施—— 一个由 AI
              驱动的网络，映射全球价值链，让政府和企业能够大规模理解、合规处理并管理跨境商业。Altana 将自己的市场定义在贸易合规、 国家安全与可持续性的交汇处，三者都围绕供应链数据收拢。


              公司以 SaaS 平台形态运营，采用联邦学习架构：客户共享数据洞察，但不交出自有供应链信息。Altana 用机器学习处理数十亿份海关申报、 物流记录和公司注册数据，构建动态知识图谱；公司称该图谱覆盖全球贸易流量的
              50% 以上。图谱被描述为比任何公开数据集「丰富两倍以上」， 因为约 50% 的设施到设施连接来自私有网络参与者。


              截至 2026 年 Q1，Altana 约有 278 名员工，总部位于纽约州纽约市 285 Fulton Street。公司处于 Series C 阶段——已有收入、
              尚未盈利，政府和企业牵引力显著，但财务数据仍为私有。Altana 于 2024 年 6 月提出「Value Chain Management System」（VCMS）标签，
              用来区别于狭义供应链风险或可视化工具；该平台覆盖合规、Scope 3 碳追踪、关税规划、扰动模拟和协同工作流。平台已在 AWS GovCloud 获得 FedRAMP High
              授权，可部署在美国政府最敏感环境中。
