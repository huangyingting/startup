      - - ARR 增速放缓
        - 按季度监控各 cohort NRR；若 NRR 连续两个季度低于 105%，则升级处理
        - CFO 和董事会
        - 季度审查
        - ARR 同比增速低于 40%；NRR 连续两个季度低于 100%；综合毛利率低于 55%
  - id: TV001
    title: 建议摘要表
    artifact: valuation
    notes: 建议参数来自估值分析、风险章节输入和可比公司基准。投资交割前，必须通过资料室核验这些条件。
    claimRefs:
      - CV002
      - CV015
      - CV023
      - CV038
    columns:
      - 参数
      - 评估
    rows:
      - - 建议
        - 有条件正向 — 附条件投资
      - - 置信度
        - 中高 — 论点支撑充分；重大未知项需要在资料室解决
      - - 风险评级
        - 中高 — 政府集中度、估值溢价和 FedRAMP 依赖是主要风险
      - - 估值立场
        - 进取但可辩护 — 只有确认 ARR、NRR 高于 105% 且利润率通过验证，$1B 才站得住
      - - 进入倍数
        - 2026 年估计 ARR 的 12 至 25x（$40-80M 区间）— 位于认证 GovTech SaaS 可比区间高端
      - - 持有期
        - 3 至 5 年 — 到 2028-2029 年完成 Series D 过桥或战略退出
      - - 基准情形回报
        - 投入 $500M 的 1.3 至 1.8x — 温和正向结果；需要确认 NRR 和 ARR
      - - 投资条件
        - 确认 ARR 高于 $60M；政府板块低于 40%；NRR 高于 105%；12 个月内无超过 ARR 20% 的合同到期
  - id: TV002
    title: 论点 / 反论点表
    artifact: valuation
    notes: 论点支柱和反论点来自一手和第三方证据。相对权重为定性判断，反映截至 2026 年 5 月当前公开证据的平衡。
    claimRefs:
      - CV006
      - CV007
      - CV019
      - CV020
      - CV022
      - CV024
      - CV025
    columns:
      - 类别
      - 论点信号
      - 反论点信号
      - 净权重
    rows:
      - - 竞争护城河
        - FedRAMP High 加 IC C2E 在同业中独一份；Coalfire 确认 25-40% ARR 溢价
        - 多云 ATO 迁移需要 12-18 个月；若 AWS GovCloud 中断，护城河会被削弱
        - 正向
      - - 市场需求
        - UFLPA 执法、EU CSDD、CBAM 和关税波动都是多年结构性驱动
        - UFLPA 执法回撤风险；SAP 原生合规扩张挤占独立 SaaS 预算
        - 有保留的正向
      - - 数据网络效应
        - IDC 确认多源网络可降低 35-50% 流失，并带来 20-30% NRR 溢价
        - 成员网络中主要贡献者退出会削弱图谱质量；公共数据替代品在改善
        - 正向
      - - 估值倍数
        - Kinaxis 5.8x、Coupa 收购前 8.2x；3-5 个 turn 的认证溢价可辩护
        - E2open 2.1x 构成底部；PitchBook 显示私募倍数在压缩；周期高点进入偏激进
        - 有保留的反向
      - - 收入集中度
        - 政府合同验证产品和使命；多个机构部署已确认
        - 政府板块集中度可能为 30-50%；没有资料室，无法量化单一客户续约风险
        - 反向
      - - 财务画像
        - Maersk 合作和 Tariff Planner 213% 激增确认企业与政府 PMF
        - ARR 和毛利率未披露；专业服务占比可能把利润率稀释到软件质量门槛以下
        - 中性
  - id: TV003
    title: 乐观 / 基准 / 悲观情景表
    artifact: valuation
    notes: 情景概率是基于第 7 章监管、竞争和运营风险评估的定性估计。ARR 和回报数字采用中点假设。不要将其用于财务预测。
    claimRefs:
      - CV031
      - CV032
      - CV033
      - CV034
      - CV035
      - CV036
    columns:
      - 情景
      - 概率
      - 2027 ARR
      - 核心假设
      - 退出倍数
      - $500M 回报
    rows:
      - - 乐观
        - 25%
        - $150-200M
        - UFLPA 扩张；EU CSDD 启动；3+ 个新增联邦机构；NRR 125%+；CBAM 模块上线
        - 2028 ARR 的 8-10x
        - 3.2-4.0x
      - - 基准
        - 50%
        - $100-130M
        - ARR 增长 50%；NRR 110-115%；政府业务稳定；每年新增 20-30 个企业 logo；2027 年 H1 完成 Series D
        - 2028 ARR 的 5-7x
        - 1.3-1.8x
      - - 悲观
        - 25%
        - $60-80M
        - UFLPA 软化；政府合同延迟；NRR 低于 100%；SAP 替代加速
        - 2027 ARR 的 3-4x
        - 0.4-0.6x
  - id: TV004
    title: 可比估值表
    artifact: valuation
    notes: 公开可比公司倍数来自截至 2026 年 Q1 的 Morningstar 和 SEC 文件。Altana 倍数根据融资轮估算；实际 ARR 未公开。认证溢价基于 Coalfire 研究。
    enumerationScope:
      coverage: partial
      basis: >-
        Comparable set represents publicly available supply chain software peer multiples from SEC filings and
        Morningstar research as of Q1 2026; private transaction multiples from CB Insights and PitchBook; certification
        premium from Coalfire independent study.
    claimRefs:
      - CV004
      - CV010
      - CV016
      - CV017
      - CV028
      - CV037
    columns:
      - 公司
      - 类型
      - NTM 收入倍数
      - NRR
      - 认证溢价
      - Altana 可比信号
    rows:
      - - E2open (ETWO)
        - 上市公司 — 供应链 SaaS
        - 2.1x
        - 未披露
        - None
        - 规模化底部倍数；考虑增长和认证，Altana 应给更高定价
      - - Kinaxis (KXS)
        - 上市公司 — 供应链规划
        - 5.8x
        - ~105%
        - None
        - 中位可比；Altana 认证护城河支撑 2-3 个 turn 溢价
      - - Coupa Software（收购前）
        - 私有 M&A 收购
        - 8.2x
        - ~120%+
        - 部分 SOC2
        - 认证 SaaS 上限参照；Altana FedRAMP High 强于 Coupa
      - - Veeva Systems (VEEV)
        - 上市公司 — 受监管垂直 SaaS
        - 18x（峰值）
        - ~120%
        - FDA 21 CFR Part 11 合规
        - 受监管市场认证 SaaS 的溢价参照；Altana IC C2E 与其类似
      - - Resilinc（私有）
        - 私有公司 — 供应链风险
        - 6-8x（估计）
        - ~110%
        - None
        - 直接竞争对手；政府认证和数据规模支撑 Altana 溢价
      - - Altana Technologies
        - 私有 — $1B Series C 轮
        - 12-25x（估计）
        - 未核实
        - FedRAMP High 加 IC C2E（业内最高）
        - 定价在上沿；需要确认 NRR 和 ARR，才能支撑该倍数
  - id: TV005
    title: 投资逻辑破裂与投资门槛条件表
    artifact: valuation
    notes: 达到投资破裂门槛时，应重新评估投资逻辑或退出持仓。触发项来自估值敏感性分析和风险章节评估。
    claimRefs:
      - CV024
      - CV025
      - CV033
      - CV039
    columns:
      - 触发事件
      - 门槛
      - 对投资逻辑的影响
      - 投资人应对
    rows:
      - - ARR 增长放缓
        - 连续 2 个季度 YoY ARR 增长低于 40%
        - 高 — 基准情景需要 50% 增长；降至 40% 会把退出倍数压低 2-3 圈
        - 复核投资；低于门槛则停止参与 Series D
      - - NRR 恶化
        - 连续 2 个季度 NRR 低于 100%
        - 严重 — 意味着客户或席位净减少；ARR 复利断裂；倍数塌缩
        - 立即提交投委会复核；考虑在下一次流动性事件退出
      - - FedRAMP ATO 失效
        - FedRAMP High ATO 出现任何暂停或撤销
        - 严重 — 阻断全部政府销售；触发客户 SLA 违约；认证护城河消失
        - 60 天内启动全面退出流程
      - - 政府收入集中度
        - 单一客户超过 ARR 的 25%；政府客户超过总收入 50%
        - 高 — 续约依赖使合同节点变成二元结果
        - 推动董事会要求客户多元化计划，并设定 12 个月里程碑
      - - Series D 下轮融资
        - Series D 以 $1B 或更低估值完成
        - 高 — 投资逻辑受损；投资人信誉受损；管理层留任风险上升
        - 全面复核持仓；评估老股退出或过桥参与
      - - CEO 离任且无接班安排
        - Evan Smith 离任且没有 6 个月交接计划
        - 高 — 扰动政府关系、投资人信心和战略执行
        - 召开紧急董事会复核；评估临时管理安排
  - id: TV006
    title: 最终尽调要求表
    artifact: valuation
    notes: 尽调请求必须在投资交割前完成。优先级反映其对估值模型的重要性。资料室项目是最低要求；客户访谈作为补充。
    claimRefs:
      - CV038
      - CV039
      - CV040
    columns:
      - 尽调项目
      - 优先级
      - 来源
      - 核验内容
    rows:
      - - 按产品线和客户分部拆分 ARR
        - 严重
        - 资料室 — 管理账目
        - 确认总 ARR；拆分政府与企业；拆分 SaaS 与服务
      - - 按队列拆分 NRR — 过去 6 个季度
        - 严重
        - 资料室 — CRM 和计费系统导出
        - NRR 高于 105%；识别流失集中点；确认扩张收入
      - - 毛利率桥
        - 严重
        - 资料室 — 经审计财务报表
        - 综合毛利率高于 60%；专业服务低于收入 30%
      - - 政府合同续约时间表
        - 严重
        - 资料室 — 合同登记册
        - 交割后 12 个月内到期的单一合同不得超过 ARR 的 20%
      - - 企业客户访谈 — 3 个账户
        - 高
        - 客户访谈
        - 产品-市场匹配度、扩张意愿、NRR 体验、切换成本评估
      - - 政府客户访谈 — CBP 和 1 家机构
        - 高
        - 客户访谈
        - CBP GBI 满意度、续约意愿和竞争替代方案评估
      - - 董事会接班计划确认
        - 高
        - 董事会治理文件
        - CEO 和 CTO 的正式接班计划；股权 cliff 归属时间表
      - - FedRAMP ConMon 发现项 — 最近 12 个月
        - 中
        - 资料室 — 安全审计
        - 无未关闭的严重发现项；重大漏洞 POA&M 状态
