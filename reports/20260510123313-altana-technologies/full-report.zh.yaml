      - number: '5.5'
        title: 产品路线图、成熟度与技术风险
        blocks:
          - type: paragraph
            body: >
              Altana 没有公开产品路线图，但监管进展、公开合作公告和使用模式透露出优先方向。Tariff Scenario Planner 在 2026 年 2 月使用量激增
              213%，说明短期投入会落在更深的关税模拟、更广的 HS 编码覆盖，以及多情景工作流工具上。CBP GBI Product Passport 合同意味着贸易身份基础设施将在 2026
              年下半年及之后进入扩展阶段，因为 CBP 开始要求进口商群体采用 GBI。面向 EU Carbon Border Adjustment Mechanism（CBAM）义务和 Corporate
              Sustainability Due Diligence Directive（CSDDD）供应链透明度要求的国际合规模块，大概率也是路线图重点；Altana 已经与跨国合规买家建立关系。


              成熟度评估：Supply Chain Intelligence 和 Risk and Compliance 已经是普遍可用的企业级模块，并有政府部署记录。Tariff Scenario Planner
              处于放量阶段。Product Passport/GBI 模块处于早期可用阶段。VCMS 营销材料提到的 AI 驱动供应中断模拟看起来正在积极开发，但尚无独立确认的 GA 发布日期。


              主要技术风险包括：知识图谱缺少独立第三方准确率基准；AWS 单云集中风险；ML 模型架构未披露，限制技术尽调；非美国市场的海关数据访问可能受到监管限制；持续依赖成员网络增长来维持网络效应。CBInsights
              指出，Altana 覆盖范围主张缺少独立验证，是企业买家评估平台时的尽调缺口。The Register 也对商业供应链图谱准确性主张的可扩展性发表过更广泛的怀疑评论。
