      - number: '3.4'
        title: 定价与 Go-to-Market 对比
        blocks:
          - type: paragraph
            body: >
              供应链情报类别的定价在各厂商之间都高度不透明。基于已披露投资人评论和同行评论的定性信号，Altana 企业合同估计为每个大客户 $250K–$2M ARR。按合同规模看，Altana
              高于中端市场专业工具（Sourcemap、Trademo），低于完整 ERP 套件部署（SAP、Oracle）。多年期 SaaS 合同叠加专业服务项目，形成 2–4 年切换周期，提供收入耐久性。


              Go-to-market 动态：Altana 采用企业直销，并把政府资质作为商业客户的信任信号。SAP 和 Oracle 通过既有 ERP 关系和采购合同进入。Project44 和 FourKites
              面向物流和运营买家。Interos 瞄准供应链风险负责人。Gartner Peer Insights 评论将 Altana 的实施复杂度和专业服务依赖列为相对 SAP、Oracle ERP
              原生风险模块的不利因素；后者对既有 ERP 客户来说，可以用更低边际成本实现即插即用集成。


              企业细分中，多供应商并用很常见：大型买家经常为不同用例部署多个供应链情报厂商（物流可视化 + 合规 + 供应商风险），从而削弱赢者通吃动态。
            claimRefs:
              - CP024
              - CP025
              - CP029
              - CP036
              - CP007
              - CP008
              - CP009
          - type: table
            tableRef: TP003
            claimRefs: []
      - number: '3.5'
        title: 护城河耐久性与竞争风险评估
        blocks:
          - type: paragraph
            body: >
              Altana 的竞争护城河建立在三根相互强化的支柱上：（1）自有知识图谱带来的数据网络效应；（2）政府认证和 CBP 合作带来的监管准入护城河；（3）深度 API 集成进客户合规工作流和 ERP
              系统后形成的高切换成本。


              数据网络效应最强：每新增一对买方—供应商，都会改善所有现有成员的图谱质量，形成复合价值，增长速度超过任何单一竞争对手通过一次性数据采购能够复制的速度。Altana 50%
              自有（成员贡献）数据占比是一项结构性优势；仅靠公开海关舱单数据无法复制。


              **主要护城河风险**：SAP、Oracle 和 IBM 拥有不受限的 R&D 预算和既有客户关系，可能自建或收购同等合规功能。WSJ 分析确认了这种结构性威胁：既有厂商正在添加 AI
              能力，可能缩小纯软件厂商的技术差异化缺口。Altana 的应对必须是加深政府和监管定位（既有厂商很难轻易跟进的地方），并加速自有数据网络增长。


              **次要风险**：AI 模型更好或商品化数据来源更广的新进入者（例如某家大型基础模型公司原生构建供应链情报）可能威胁 AI
              差异化叙事，但不一定冲击监管或自有数据护城河。持续观察基础模型公司是否进入供应链情报，是一个关键前瞻风险信号。
            claimRefs:
              - CP023
              - CP030
              - CP037
              - CP038
