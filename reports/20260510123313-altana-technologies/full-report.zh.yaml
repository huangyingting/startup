      - number: '5.4'
        title: 技术栈与关键依赖
        blocks:
          - type: paragraph
            body: >
              Altana 的技术基础设施锚定 Amazon Web Services GovCloud，在美国政府指定云区域提供经过 FedRAMP 授权的计算、存储和网络。这种单云架构带来集中依赖：AWS GovCloud
              服务中断、定价变化或政策调整，都可能显著影响平台可用性。支撑 28 亿多票货运和 5
              亿多家公司关系存储的图数据库技术并未公开披露；从公开文档描述的架构模式看，更像商业图数据库或专有图引擎，针对高连接度、地理分散节点做过优化。


              机器学习和实体解析管线是 Altana 最严密保护的知识产权，也是把原始海关申报转化为消歧知识图谱的工程核心。该管线在 CSO Peter Swartz 的研究领导下开发，处理 8.5
              亿多个设施中的跨语言实体匹配、音译规范化和时间关系追踪。API 层通过 REST API 和 webhook 向企业客户暴露图查询结果，支持接入 ERP、采购和贸易合规系统。


              关键外部依赖包括成员网络数据贡献模式（如果成员流失加快，网络效应会减弱）、CBP 海关申报数据访问（监管变化可能限制数据可得性）、Maersk Gemini Cooperation
              数据集成（合作解散会削弱实时货运覆盖）以及 CBP GBI 合同（同时提供收入和市场定位）。开发者信号有限：Altana 的公开 GitHub 足迹很小，符合其企业 SaaS 定位，而不是开发者生态定位。
