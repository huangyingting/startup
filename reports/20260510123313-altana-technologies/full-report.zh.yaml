      - number: '4.3'
        title: 单位经济与利润率画像
        blocks:
          - type: paragraph
            body: >
              基于上市可比公司 Descartes Systems（纯 SaaS 毛利率 73%），并因 Altana 的专业服务组合打折，Altana 综合毛利率估计为 55–75%。纯 SaaS 部分可能有 70–75%
              毛利率；专业服务（典型毛利率 20–40%）会随绑定比例拉低综合水平。


              FT 对企业 AI SaaS 的调查基准显示，CAC 回收期中位为 18–30 个月，LTV:CAC 为 3:1–6:1。考虑 Altana $250K–$2M ACV 区间和估算 60–70% 毛利率，3
              年合同下单客户隐含 LTV 为 $450K–$4.2M 毛利润，CAC 可能为每个企业 logo $75K–$600K。由于高认证壁垒消除了竞争并带来专业服务要求，政府合同毛利率可能超过 80%。


              WSJ 和 Gartner 评论者强调，专业服务依赖是利润率风险：实施复杂（6–12 个月）会推高收入成本；随着 Altana 开发自助上手工具或由伙伴交付实施，这一风险可能改善。改善 PS:SaaS
              比例，是提升毛利率的关键规模化杠杆。


              Rule of 40 基准：估算 50–80% 同比增长叠加可能为负的 FCF（FCF margin 为 5–15%），使 Altana Rule of 40 得分落在 35–75，取决于真实增速；对
              Series C 公司来说，可能处于强势一端。
