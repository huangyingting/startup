      - number: '8.4'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: |
              牛市情景（概率 25%）：UFLPA 执法在 2026 年继续加强，EU CSDD 执法同步启动，
              Altana 在 2026 年下半年拿下三份或更多联邦机构合同，NRR 达到 125%，CBAM 模块
              捕获跨国企业的欧洲需求。到 2027 年底 ARR 达到 $150 to $200 million。按 2028 年
              ARR $200 million 的 8 至 10 倍退出，对应 $1.6 to $2.0 billion，带来 3.2 至
              4.0 倍回报。

              基准情景（概率 50%）：ARR 每年增长 50%，到 2027 年底达到 $100 to $130 million。
              政府板块稳定，企业板块每年新增 20 至 30 个 logo。NRR 保持在 110% 至 115%。
              Series D 于 2027 年上半年以 $1.5 to $2.0 billion 投后估值完成。按 2028 年 ARR
              $130 million 的 5 至 7 倍退出，对应 $650 million 至 $910 million，带来 1.3 至
              1.8 倍回报——结果温和但为正。

              熊市情景（概率 25%）：UFLPA 执法放缓，政府合同续约延迟 6 个月以上，NRR 恶化到
              95% 至 100%，SAP 在企业市场替换加速。到 2027 年 ARR 停滞在 $60 to $80 million。
              Series D 需要平轮或降估值。按 2027 年 ARR $70 million 的 3 至 4 倍退出，对应
              $210 million 至 $280 million，意味着 0.4 至 0.6 倍回报和重大资本减值。
            claimRefs:
              - CV031
              - CV032
              - CV033
              - CV034
              - CV035
              - CV036
          - type: table
            tableRef: TV003
            claimRefs:
              - CV031
              - CV032
