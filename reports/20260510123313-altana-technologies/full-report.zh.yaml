      - number: '4.5'
        title: 财务结论与尽调缺口
        blocks:
          - type: paragraph
            body: >
              财务结论：Altana 呈现为一家资本充足的企业 SaaS，估算 ARR 为 $40M–$80M 且快速增长，业务模式具备高倍数特征（政府 + AI 原生），未来 18–36 个月 runway 充足。SaaS
              订阅部分收入质量总体较高；专业服务造成质量稀释，但若 NRR 高，这一点可管理。


              $1B 估值（估算 ARR 的 12.5–25 倍）对于一家 AI 原生、FedRAMP
              认证的政府软件公司而言可辩护，前提是它有可展示的需求加速且没有直接认证竞争对手。退出时，面向国防科技、海关/贸易或企业软件战略收购方，15–25 倍 NTM ARR 具有可行性。


              主要反向财务信号：专业服务依赖和实施复杂度是利润率扩张的结构性拖累。如果 Altana 无法降低 time-to-value 和 PS 绑定率，毛利率改善会停滞，通往盈利的路径也会拉长。


              需要 data room 访问的关键尽调缺口：

              - 实际 ARR、NRR 和客户数（无法从公开来源估算）

              - 截至 2026 年 Q1 的 burn rate 和现金余额

              - 专业服务的递延收入余额和收入确认政策

              - 政府合同条款、续约率和收入集中度

              - 按细分（政府 vs. 商业）拆分的 CAC 和 LTV
