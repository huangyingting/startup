      - number: '1.4'
        title: 产品、规模与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Altana 的核心产品是 Value Chain Management System（VCMS），于 2024 年 6 月作为伞形平台推出，统一供应链映射、合规工作流、Scope 3 碳报告、 关税模拟和
              Product Passports。VCMS 建在自有知识图谱上，包含超过 28 亿票货运，追踪 5 亿多家公司和 8.5 亿个设施，下探到零部件—场址层级， 并拥有 1.25
              亿多条不同设施之间的关系。Altana 称，随着更多参与者加入网络，该图谱每年增长超过 30%。


              Product Passports 是 Altana 最新功能——一种数字身份文件，追踪产品从原材料到终端消费者的完整来源故事。它是 2025–2026 年 Maersk 合作的核心；双方正在 Gemini
              Cooperation（Maersk + Hapag-Lloyd，2025 年 2 月启动）之上建设数字贸易网络，覆盖 12 个主要国际港口， 触达全球贸易的 70%。US Customs and Border
              Protection 已选择 Altana 的 Product Passports 作为其 Global Business Identifier Program 的产品级标识符；这是一枚结构性楔子，可能把
              Altana 网络从可选工具变成 CTPAT 认证进口商寻求快速清关时的必需基础设施。


              Altana 的 Tariff Scenario Planner 于 2025 年末推出，据报道在 2026 年 2 月美国最高法院关税裁决新闻周期中使用量激增 213%，并被 Wall Street
              Journal、CNBC 和 Fortune 报道。公司平台上约有 1.4 亿条买方—供应商连接，全球十大物流服务商中已有五家加入其 Product Passport 共享网络。安全认证包括 FedRAMP
              High（AWS GovCloud）、IC C2E、ISO/IEC 27001、SOC 2 Type 2、IRAP 等。美国前商务部长 Gina Raimondo 曾公开认可 Altana
              平台，称其对国家经济安全和竞争力至关重要。
