      - number: '1.2'
        title: 领导层、董事会与治理
        blocks:
          - type: paragraph
            body: >
              Evan Smith 是 CEO 兼联合创始人，也是 Altana 的公众面孔和主要发言人。创办 Altana 之前，他是早期科技创业者；Forbes 报道称， 他在阿拉斯加一个渔镇长大，在 Yale
              University 学经济，2003 年高中毕业论文写的是「全球化即将崩塌」。Smith 将供应链形容为「地球上最脏的行业」之一， 并把 Altana 的使命表述为用 AI
              透明度清理这个行业。他长期相信全球化脆弱，这让他作为行业倡导者更有可信度。


              Peter Swartz（Chief Science Officer 兼联合创始人）负责 AI/ML 研究和知识图谱架构。Raphael Tehranian（Chief Operating Officer
              兼联合创始人） 管理业务运营。Gary Sims 担任 Chief Technology Officer，负责工程执行。2025 年 3 月，Altana 任命 Michael Capellas——Compaq
              前 CEO， 也是 Flextronics 和 Blue Yonder 的供应链董事会资深成员——为董事会主席，释放出在潜在公开市场准备前强化企业级治理可信度的信号。


              公司的治理结构反映其政府与企业双 go-to-market：Capellas 的大客户企业销售和供应链基础设施经验直接相关。三位创始人分别担任 CEO/CSO/COO，能力互补，这是 AI
              基础设施创业公司的常见配置。Evan Smith 拥有高公众曝光、投资人关系和政府倡导角色，关键人依赖显著。 董事会包括 GV（最大股东）、Activate Capital、USIT
              等机构代表，但详细董事会构成未公开披露。
