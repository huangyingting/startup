      - number: '3.6'
        title: 反向证据与集中度风险
        blocks:
          - type: paragraph
            body: >
              三个维度的反向信号值得尽调关注：


              **客户体验摩擦**：Gartner Peer Insights 评论均分 4.1/5，并提到上手复杂和依赖专业服务，暗示规模化挑战。如果 Altana 实施需要大量客户 IT 资源和 6–12
              个月部署周期，就会限制其下沉市场或在不扩张专业服务组织的情况下快速扩张的能力。这给 ARR 增长带来成本和可扩展性风险。


              **既有厂商扩张**：SAP、Oracle 和 IBM 进入 AI 原生供应链风险的威胁是结构性的，而且仍在持续。Bloomberg 和 Reuters 都提到，企业软件既有厂商正在投资供应链 AI
              能力。Altana 的护城河必须比既有厂商缩小差距更快地加深。


              **数据商品化**：公开可获得的海关舱单数据（美国进出口记录）任何愿意处理的竞争对手都能拿到。Altana 的自有优势来自 50% 成员贡献数据，以及其 AI 实体解析层。如果资金充足的新进入者（Google
              Cloud、Microsoft）把实体解析层商品化，自有数据占比就会成为主要差异点。监测基础模型公司是否进入供应链情报，是关键前瞻风险信号。
