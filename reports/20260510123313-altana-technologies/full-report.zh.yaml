      - number: '5.3'
        title: 安全、合规与信任
        blocks:
          - type: paragraph
            body: >
              在商业供应链软件供应商中，Altana 已经搭起一套最完整的安全与合规资质栈。大约 2024 年，Altana 在 AWS GovCloud 上获得 FedRAMP High 授权，证明平台满足 National
              Institute of Standards and Technology SP 800-53 Rev 5 High 基线，覆盖 325 项以上安全控制。任何商业平台若要服务处理 Controlled
              Unclassified Information 或更高敏感度供应链数据的美国政府机构，该授权都是必要前提。


              Intelligence Community Commercially Available Cloud Services（C2E）认证把 Altana 的授权部署范围扩展到情报界工作负载，使它成为少数可进入涉密
              IC 环境的商业供应链平台之一。ISO/IEC 27001 认证覆盖支撑 Altana 全部运营的信息安全管理体系。SOC 2 Type II 鉴证由 AICPA
              认可机构每年审计，确认平台在可用性、安全性、处理完整性和保密性上的控制。IRAP 评估让澳大利亚政府客户可以在 Australian Signals Directorate 安全框架下部署平台。更早取得、先于
              High 授权的 FedRAMP Moderate 授权仍在 FedRAMP Marketplace 上保持有效。


              这套认证栈形成了显著竞争护城河：同时复制 FedRAMP High 和 IC C2E，需要多年工程投入和政府关系建设，初创竞争者无法抄近路。截至 2026 年 5 月，未发现 Altana
              有公开记录的安全事件、数据泄露或合规失败。
