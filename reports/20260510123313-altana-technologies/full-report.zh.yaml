  - id: FE001
    title: 产品架构图
    artifact: product-tech
    type: stack
    sourceRefs:
      - SE013
      - SE014
      - SE003
      - SE001
    notes: 架构基于 Altana 公开平台文档、AWS GovCloud 规格和 FedRAMP Marketplace 清单整理。内部层级边界和具体数据库技术根据公开披露推断；专有实现细节未公开。
    data:
      layers:
        - label: 数据接入层
          modules:
            - 全球海关申报（CBP、HMRC、欧盟海关）
            - 物流 EDI 与海运数据源（含 Maersk Gemini Cooperation）
            - 自有会员网络贡献（50% 设施链接）
            - 企业注册与所有权数据库
          note: Multi-source ingestion covering 50%+ of global trade flows; member network data is differentiating
        - label: 图处理与实体解析层
          modules:
            - ML 实体消歧（850M+ 设施，跨语言 / 音译）
            - 去重与时序关系跟踪
            - 属性补全与风险信号生成
          note: Proprietary ML pipeline led by CSO Peter Swartz; specific graph engine undisclosed
        - label: 知识图谱层
          modules:
            - Altana 图谱核心（2.8B+ 货运记录、500M+ 公司、850M+ 设施）
            - 关系索引（125M+ 设施间链接、140M 买方-供应商连接）
          note: Core differentiating asset hosted on AWS GovCloud; graph engine architecture is not publicly disclosed
        - label: 分析与情报引擎
          modules:
            - 风险评分与合规筛查引擎（UFLPA / OFAC / 制裁）
            - 关税情景建模与 HS 编码引擎（2026 年 2 月使用量激增 213%）
            - 中断模拟与替代供应商发现
          note: Powers all VCMS product modules; tariff module showing strongest demand signals in 2026
        - label: API 与集成层
          modules:
            - REST API 与 Webhook 网关
            - ERP 与采购系统连接器
          note: Enterprise integration surface; API SLA and rate-limit terms not publicly disclosed
        - label: 应用与产品模块层
          modules:
            - 供应链情报
            - 风险与合规
            - 关税情景规划器
            - 政府 / 情报界平台（FedRAMP High + IC C2E）
            - 产品护照 / 全球商业标识符（GBI）
          note: VCMS bundles all modules; FedRAMP High + IC C2E unlock classified government deployment
