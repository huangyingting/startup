      - number: '2.3'
        title: 买家与细分格局
        blocks:
          - type: paragraph
            body: >
              Altana 服务两类结构上不同的买家，它们采购流程和预算所有者都不同。企业买家通常是 Fortune 500 制造商、零售商、保险公司和物流服务商，
              通过采购、合规或首席供应链官（CSCO）预算购买。触发事件通常是监管强制（UFLPA 违规风险、CBAM 义务、ESG 报告要求）、供应链中断（COVID、 Suez
              堵塞），或董事会层面的韧性提升战略指令。典型企业供应链情报年度预算为 $500K–$5M，采购周期 6–18 个月。政府买家——海关机构、 边境安全、国防采购——采用多年期合同、结构化 RFP
              流程；美国联邦采购要求 FedRAMP，采购周期为 12–24 个月。


              Altana 的关键买家细分包括：（1）面临 UFLPA 强迫劳动审查和 ESG 报告义务的制造与零售企业；（2）寻求建立带海关预清关能力数字贸易网络的物流服务商
              （Maersk、货运代理）；（3）需要供应链风险承保数据的金融机构和保险公司（Lloyd's）；（4）需要 AI 驱动筛查工具的政府海关和边境机构（CBP、 UK Border
              Force）；（5）管理战略供应链安全的国防与航空航天主承包商（General Atomics）。多数情况下，付款方是合规、采购或风险职能， 使用者则是运营和贸易团队，由此形成典型的多利益相关方企业销售动态。


              中端市场买家（收入低于 $1B 的公司）基本没有被 Altana 当前模式充分服务。平台复杂度、合同规模和销售动作都偏向大型企业与政府账户， 留出一个缺口，Sourcemap、Trademo
              等规模更小、垂直聚焦的竞争对手正在切入。Altana 的 Tariff Scenario Planner 是一次直接触达 CFO 周边预算所有者的尝试，但从认知转化为完整 VCMS 合同的情况未公开披露。
            claimRefs:
