      - number: '5.2'
        title: 产品模块与 VCMS
        blocks:
          - type: paragraph
            body: >
              Altana 于 2024 年 6 月推出 Value Chain Management System（VCMS）品牌，把五个彼此独立但相互连接的产品模块收拢到一个商业产品中。Supply Chain
              Intelligence 是核心图查询和可视化界面，企业采购、运营和合规团队可以用它追踪多层级供应链、识别下级供应商，并基于 28 亿多票货运图谱建模供应中断情景。Risk and Compliance 将
              UFLPA 强迫劳动筛查、OFAC 和 UN 制裁名单匹配、冲突矿产披露流程自动化，并对照 8.5 亿多个设施层运行，把供应商审核周期从数周压缩到数小时。


              Tariff Scenario Planner 在 2025-2026 年贸易扰动中推出并放量；企业围绕美国新关税包建模风险敞口，推动该模块 2026 年 2 月使用量激增 213%。该模块把 HS
              编码级关税表映射到客户的采购足迹上，模拟替代原产地情景，并生成董事会级风险敞口摘要。Government and IC Platform 是单独配置的 FedRAMP High 实例，服务美国情报界机构和
              CBP；IC C2E 认证让它能够部署到涉密环境。Altana 凭 Product Passport and Global Business Identifier（GBI）模块赢得 CBP
              合同，该模块为每笔进口交易建立标准化贸易身份——这是一种基础设施角色，也在美国海关侧形成监管锁定。


              Maersk 的 Gemini Cooperation 合作覆盖 12 个港口，按体量计约占全球贸易的 70%，为图谱加入实时海运数据。Altana 估计 ARR 为 $40–80
              million，相比图谱广度，商业化仍处早期。
