companyProfile:
  summary: >
    Altana Technologies 是一家总部位于纽约的 AI 公司，成立于 2019 年，运营全球最大的商业供应链知识图谱，映射 5 亿家公司、28 亿票货运、8.5 亿个设施，以及 1.4 亿条买方—供应商连接。其
    Value Chain Management System（VCMS）帮助企业和美国政府机构打通端到端供应链透明度、强迫劳动合规（UFLPA）、贸易合规和关税情景规划。Altana 是唯一同时拥有 FedRAMP High（基于
    AWS GovCloud）和 Intelligence Community C2E 双认证的供应链软件厂商，因此可以进入美国政府涉密用例。公司在 2024 年 7 月以 $1B 估值完成 $200M Series C，投资方包括
    USIT（Thomas Tull）、Generation Investment Management、March Capital、Salesforce Ventures 和 GV。
