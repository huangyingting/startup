      - number: '8.3'
        title: 当前融资与估值背景
        blocks:
          - type: paragraph
            body: |
              Altana 于 2024 年 7 月完成 $200 million Series C 融资，投后估值 $1 billion，
              由 US Innovative Technology Fund 和 General Atlantic 共同领投，GV（Google
              Ventures）和 Activate Capital 参投。自 2019 年成立以来，累计融资 $322 million。
              在估计 ARR $40 to $80 million、月烧钱 $5 to $9 million 下，Altana 从 2026 年 5 月
              起拥有 18 至 36 个月现金跑道。Series C 的设计用途是支持商业扩张、加深政府认证、
              进入国际市场。

              估值方法采用 ARR 倍数分析，以供应链软件公开可比公司的 2 至 8 倍 NTM 收入区间为锚
              （E2open 底部 2.1x、Kinaxis 5.8x、Coupa 被收购前 8.2x），并对 FedRAMP High 和
              IC C2E 认证护城河加上 3 至 5 个倍数点的溢价调整；Coalfire 量化该护城河可带来每席
              25% 至 40% ARR 溢价。按 2026 年估计 ARR 的 12 至 25 倍计算，$1 billion Series C
              估值位于合理区间高端，需要用实际 ARR 和毛利率验证确认。政府认证组合让 Altana
              符合 GSA schedule 采购、IC IDIQ 合同工具和 Other Transaction Authority（OTA）项目资格，
              从而加快政府销售速度。
            claimRefs:
              - CV001
              - CV002
