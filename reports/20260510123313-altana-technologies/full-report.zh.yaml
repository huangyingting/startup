  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入来源与商业模式
        blocks:
          - type: paragraph
            body: >
              Altana 采用模块化 SaaS 模式，拥有多条收入来源，同时服务商业企业和美国政府客户。主要收入来源是 VCMS（Value Chain Management
              System）平台的年度订阅访问，覆盖供应链情报、风险监控和贸易合规模块。第二条收入来源是政府合同（FedRAMP High 与 IC C2E 部署），这类收入毛利更高，通常为多年期，并带有持续交付义务。


              专业服务——实施、与 ERP 系统集成、自定义数据配置——构成第三条收入来源，Gartner 评论者称其在初始合同期「substantial」。第四条新兴收入来源是基于使用量的扩张：Tariff Scenario
              Planner 在 2026 年 2 月使用量激增 213%，说明宏观条件推动高频查询反复出现时，可能带来按使用层级追加销售收入。


              商业模式遵循 land-and-expand：先以基础年度订阅切入平台（大型企业估算 ACV 为 $250K–$2M），再通过模块追加销售（Tariff
              Planner、Enforcement、Government）和数据层级扩张放大收入。CEO Smith 明确关注国际扩张，意味着潜在地理收入多元化，但收入机会也伴随额外成本。


              SaaS 订阅部分收入质量总体较高（可预测、经常性、多年期合同），但专业服务会部分抵消这一点；专业服务通常毛利更低、波动更大，并受实施风险影响。建议的尽调路径是审查递延收入余额、收入确认政策和 NRR 指标。
