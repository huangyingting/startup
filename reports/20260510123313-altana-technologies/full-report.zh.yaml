        - 政府就绪
        - 竞争护城河
      rows:
        - label: 供应链情报
          values:
            - 核心平台
            - 已全面可用
            - 云 SaaS / 联邦式
            - 是（FedRAMP High）
            - 高 — 2.8B+ 货运图谱，全球覆盖率 50%+
        - label: 风险与合规
          values:
            - 合规
            - 已全面可用
            - 云 SaaS
            - 是（FedRAMP High）
            - 高 — UFLPA / OFAC 自动化覆盖 850M+ 设施规模
        - label: 关税情景规划器
          values:
            - 贸易分析
            - 已全面可用 / 扩张中
            - 云 SaaS
            - 部分（FedRAMP Moderate）
            - 中 — 实时 HS 编码关税建模；竞争者已开始出现
        - label: 政府 / 情报界平台
          values:
            - 政府
            - 已全面可用
            - FedRAMP High GovCloud
            - 是（FedRAMP High + IC C2E）
            - 很高 — 唯一同时具备 IC C2E + FedRAMP High 的商业供应链图谱
        - label: 产品护照 / GBI
          values:
            - 贸易身份
            - 早期可用
            - API 优先 / 集成 CBP
            - 是（CBP 强制要求）
            - 很高 — CBP 强制标准；监管锁定效应
        - label: VCMS（完整平台套件）
          values:
            - 平台套件
            - 已全面可用
            - 联邦式 SaaS
            - 是（FedRAMP High）
            - 高 — 网络效应、数据护城河、多模块打包
