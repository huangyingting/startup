  - id: FI001
    title: 收入模型桥
    artifact: financials
    type: flow
    sourceRefs:
      - SI010
      - SI018
      - SI012
    notes: 示意流展示客户平台活动如何转化为 Altana 的收入和毛利润。节点基于产品架构做定性处理；利润率是基准估计。
    data:
      nodes:
        - id: platform-access
          label: 平台访问（SaaS 订阅）
          value: ~70-80% of ARR
          type: revenue
        - id: gov-contracts
          label: 政府合同（FedRAMP / IC）
          value: ~20-30% of ARR
          type: revenue
        - id: professional-services
          label: 专业服务（实施）
          value: PS attach ~20-40% of SaaS ACV
          type: revenue
        - id: usage-expansion
          label: 按用量扩张（Tariff Planner）
          value: Emerging; 213% spike Feb 2026
          type: revenue
        - id: saas-cogs
          label: SaaS 收入成本（基础设施 + CS）
          value: ~25-30% of SaaS revenue
          type: cost
        - id: ps-cogs
          label: 专业服务收入成本（交付团队）
          value: ~60-80% of PS revenue
          type: cost
        - id: gross-profit
          label: 估计综合毛利润
          value: 55-75% blended GM
          type: output
      edges:
        - from: platform-access
          to: saas-cogs
          label: 基础设施 + CS 开销
        - from: gov-contracts
          to: saas-cogs
          label: FedRAMP 基础设施（AWS GovCloud）
        - from: professional-services
          to: ps-cogs
          label: 交付团队成本
        - from: usage-expansion
          to: saas-cogs
          label: 查询基础设施开销
        - from: saas-cogs
          to: gross-profit
          label: SaaS 净利润率 70-75%
        - from: ps-cogs
          to: gross-profit
          label: 专业服务净利润率 20-40%
