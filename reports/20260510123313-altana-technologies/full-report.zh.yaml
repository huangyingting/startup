      - number: '6.5'
        title: 集中度与扩张风险
        blocks:
          - type: paragraph
            body: >-
              Altana 前五大客户（Maersk、CBP、Navy、Boston Scientific、ZF
              Group）很可能贡献了不成比例的收入。政府集中度由合同耐久性部分抵消。先落地再扩张是核心商业打法：客户先从供应链映射切入，再扩展到合规、关税分析和 ESG
              报告模块。受监管行业采购摩擦很高。考虑到客户基础广度的公开证据有限，客户集中度是 Altana 最重要的近期尽调担忧。已确认客户数量相对较少，政府合同又可能占 ARR 的
              20-35%，不利的政府政策变化或合同不续约都可能显著冲击收入。Maersk 同时是客户和分销渠道；如果 Gemini Cooperation 结构变化，这种相互依赖很难替代。Series C 之后，Altana
              已投入 GTM 扩张来降低集中度，但多元化所需时间仍不确定。若留存率高，先落地再扩张的经济性有利：多模块采用会提高单客户
              ACV，并降低单一模块价格竞争的风险。保险行业是新出现的集中度分散来源；由于与承保周期对齐，潜在 ACV 较高，合同结构也更长期。
            claimRefs: []
  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险概览与评估方法
        blocks:
          - type: paragraph
            body: |
              Altana Technologies 位于国家安全、企业合规和 AI 基础设施的交汇处，
              三个领域本身风险强度都高。本章用严重性与可能性框架评估八类风险：
              监管与法律、运营与技术、AI 准确性、伙伴与依赖、竞争、人员与执行、
              财务与模型风险、IP 与法律责任。每类风险按 Critical（关键）、High（高）、Medium（中）、
              Low（低）四级严重性和 Low（低）、Medium（中）、High（高）三级可能性打分，并生成本节风险热力图展品。

              最关键的风险集中在 FedRAMP 授权连续性、政府合同集中度、AWS GovCloud 单一
              IaaS 依赖、UFLPA 执法波动、欧洲扩张中的 EU AI Act 合规义务，以及对 CEO
              Evan Smith 的关键人物依赖。剩余风险反映 Altana 现有控制，包括 FedRAMP High
              ATO、ISO 27001、SOC 2 Type II 和 IC C2E 认证。每类风险的投资论点破裂阈值
              在缓释表中定义。依赖图和风险传导图展示风险如何从初始事件级联到投资期内
              的 ARR、现金跑道和估值影响。
            claimRefs:
              - CR001
              - CR002
              - CR011
              - CR023
              - CR025
              - CR032
          - type: figure
            figureRef: FR001
            claimRefs: []
      - number: '7.2'
        title: 监管与法律风险分析
        blocks:
          - type: paragraph
            body: |
              Altana 面临一套分层监管风险，横跨美国国内执法和国际合规义务。Uyghur
              Forced Labor Prevention Act 既是 Altana 的主要需求驱动，也是其主要监管尾部
              风险：任何立法回滚或执法暂停，都会直接降低企业买家的合规紧迫感。DHS 报告称，
              UFLPA 实施以来已扣留超过 6,000 批货物，确认截至 2026 年一季度执法量仍然持续；
              但依赖进口的行业带来政治压力，使 2027 年及之后的执法轨迹仍有不确定性。

              EU AI Act 将在 2026 年全面执行，把供应链管理中的 AI 系统列为高风险系统，
              要求 Altana 的欧洲产品接受强制合格评定、算法透明度文件和第三方审计。FTC
              扩大的 AI 数据隐私执法计划，提高了 Altana 知识图谱聚合实践的暴露风险。ITAR
              和 EAR 出口管制是否适用于 AI 生成的政府贸易数据，也给 IC C2E 和 FedRAMP High
              部署带来监管分类风险。现有数据提供商可能围绕海关数据摄取方法发起 IP 诉讼，
              这是潜在且不可忽视的法律风险，需要 IP 法律顾问持续监控。GDPR 数据主体权利
              义务适用于知识图谱中的设施和公司数据，要求 Altana 为 5 亿实体数据集中的每项
              处理活动记录法律依据。
