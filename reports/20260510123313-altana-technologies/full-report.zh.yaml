      - number: '6.2'
        title: 具名客户证据
        blocks:
          - type: paragraph
            body: >-
              Altana 公开点名的生产客户包括 Maersk（Gemini Cooperation 供应链情报）、Boston Scientific（制药供应链合规）、ZF Group（汽车一级供应商映射）、US
              Customs and Border Protection（贸易执法）和 US Navy（国防供应链透明度）。Maersk 和 CBP
              分别提供了最强的企业锚点和政府锚点公开证据。不同细分市场中，具名客户证据的质量和时效差异很大。Maersk 的公开信号最强：一份品牌新闻稿描述了在 Gemini Cooperation
              这一承运人舱位共享联盟中的运营集成。US CBP 的证据来自 SAM.gov 联邦合同记录，以及机构围绕贸易执法举措的新闻报道。Boston Scientific 和 ZF Group 被 Altana
              客户页面和新闻报道列为参考客户，但生产部署范围的独立佐证有限。US Navy 关系出现在国防行业媒体中，但缺少具体合同披露。Lloyd's Insurance Market
              被提及为使用供应链风险情报进行承保的金融行业客户，但部署深度不清楚。
