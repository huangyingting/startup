  - id: TM004
    title: 增长驱动因素与采用约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时点
      - 对 Altana 的影响
      - 尽调问题
    rows:
      - - UFLPA 执法升级（CBP 扣留、实体清单扩容）
        - 驱动
        - 当前已生效，2025–2027 年加剧
        - 直接拉动强迫劳动筛查需求；Altana 的 CBP 合同带来决定性竞争优势
        - 确认 CBP 合同续约条款与范围；复核 UFLPA 执法统计
      - - EU CBAM 正式期（2026 年 1 月上线）
        - 驱动
        - 2026 年 1 月 1 日起生效
        - 欧洲企业必须记录进口商品内含碳；Altana 的范围 3 跟踪正好覆盖
        - 梳理欧盟客户管线；确认产品路线图中的 CBAM 报告能力
      - - 美国关税波动（2025 年关税升级、2026 年 2 月最高法院裁决）
        - 驱动
        - 2025–2027 年及以后持续
        - Tariff Scenario Planner 需求激增；CFO 群体开始使用供应链工具
        - 跟踪关税规划器向 VCMS 合同的转化；衡量管线增长
      - - ESG / CSRD 供应链报告要求
        - 驱动
        - CSRD 2025–2026 年执行
        - 欧盟企业可持续报告需要范围 3 数据；供应链数据需求上升
        - 复核 Altana 客户群的 CSRD 覆盖；识别报告缺口
      - - 疫后供应链韧性投入
        - 驱动
        - 2021 年以来持续，增速放缓
        - 企业董事会批准供应链投资；部分支出已固化
        - 评估 2026 年韧性预算是趋稳还是增长
      - - Maersk 合作网络扩张（Gemini Cooperation）
        - 驱动
        - 2025–2027
        - 可能让 70% 全球贸易必须使用 Altana；强制采用杠杆很大
        - 确认 Gemini Cooperation 的货主采用率和 Product Passport 强制时间表
      - - 政府采购复杂度（FedRAMP、多年周期）
        - 约束
        - 持续
        - 政府交易需要 12–24 个月；即便有强制要求管线，也限制近期 ARR 增长
        - 验证 CBP 和 DoD 合同管线阶段及预计签约日期
      - - 企业销售周期长（6–18 个月）
        - 约束
        - 持续
        - 限制季度收入可预测性；大单结果二元化
        - 复核 ARR 队列结构和合同期限；评估流失风险
      - - ERP 厂商竞争（SAP、Oracle AI 覆盖层）
        - 约束
        - 2024–2026 年兴起
        - 既有 ERP 厂商加入 AI 合规覆盖层；现有客户关系面临风险
        - 监测 SAP Supply Chain Intelligence 与 Oracle Fusion SCM 的竞争定位
      - - 平台复杂度与实施负担
        - 约束
        - 当前
        - 实施投入高，拖慢中端市场采用；限制 Fortune 500 以下的 TAM 渗透
        - 向 Altana 索取客户上线周期和价值实现时间指标
    notes: |
      时点判断基于监管生效日期和市场证据，属定性判断；采用速度取决于企业预算周期和监管执行强度。
