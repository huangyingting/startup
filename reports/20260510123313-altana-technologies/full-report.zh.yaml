      - number: '2.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 监管强制永久扩大 Altana 合规中心平台的 TAM
            body: >
              UFLPA、CBAM（2026 年 1 月生效）、CSRD 和美国关税波动，共同形成多年监管顺风，永久扩大供应链情报的合规预算配置。不同于经济下行时会被压缩的可选韧性投资， 监管合规预算不可自由裁撤。Altana
              将自己定位为合规基础设施层，并有 CBP Product Passport 授权和 CBAM 兼容的 Scope 3 能力作为证据， 意味着它在结构上对齐一个不随衰退收缩的预算类别。这是关键估值支撑论点。
            calloutType: strength
            claimRefs:
              - CM015
              - CM016
              - CM017
              - CM018
          - type: callout
            title: TAM 估算被抬高，市场边界仍有争议
            body: >
              公开 SCM 软件 TAM 估算 $28B–$46B，明显高估 Altana 的可服务市场，因为它们汇总了 Altana 并不参与竞争的 ERP、TMS、WMS 和采购软件。 真正的 AI
              驱动供应链合规与情报赛道最好也只有 $5B–$9B，在有利监管情景下到 2030 年增长至 $20B–$35B。SAP 和 Oracle 拥有相同企业买家关系， 其竞争进入构成结构性威胁；若 Altana
              没有差异化数据护城河防守，渗透率可能被压在 $1B ARR 以下。中端市场仍基本未覆盖， 将 5 年期现实 SOM 限制在 $500M–$2B 区间。
            calloutType: risk
            claimRefs:
              - CM005
              - CM006
              - CM021
          - type: callout
            title: CBAM 自 2026 年 1 月开始正式执法，制造即时需求催化
            body: >
              EU Carbon Border Adjustment Mechanism 于 2026 年 1 月 1 日进入正式执法期。欧盟水泥、钢铁、铝、化肥、电力和氢进口商现在必须购买 CBAM 证书，
              并申报进口品内含碳。Altana 的 Scope 3 碳追踪能力和供应商数据深度直接对应 CBAM 合规。此前延后供应链碳测量的欧洲企业，如今面对真实财务罚则， 形成 2025 年并不存在的需求催化。Altana
              的欧洲销售动作应能直接借势这项强制要求。
            calloutType: insight
            claimRefs:
              - CM016
              - CM017
  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Altana Technologies
              所在的供应链情报市场较为碎片化，横跨两个不同竞争集群：物流可视化平台（Project44、FourKites）和供应商风险与合规情报平台（Interos、Resilinc、Descartes）。Altana 站在
              AI 原生知识图谱、贸易合规和美国政府级安全的交汇点，形成独特的跨品类位置，直接竞争对手很少能复制。


              不同细分市场的竞争强度差异很大。在商业企业市场，Altana 面临既有 ERP
              厂商（SAP、Oracle、IBM）的预算竞争；这些厂商把供应链风险模块打包进现有合同，边际成本更低。在政府和受监管行业细分中，Altana 凭 FedRAMP High 与 IC C2E
              双认证，在纯软件厂商中接近垄断。CB Insights 的竞争图谱确认了 Altana 横跨供应商风险和监管合规垂直领域的独特跨品类定位。


              物流追踪正在承受越来越强的商品化压力（基于 GPS 的货运可视化正变成标配），而由 UFLPA、CBAM 和关税波动驱动的监管合规情报，正在分化成定价权很强的高端类别。Reuters
              确认，相比物流可视化同行，UFLPA 执法和关税波动对 Altana 这类合规聚焦厂商构成不成比例的需求驱动。
            claimRefs:
              - CP016
              - CP027
              - CP031
              - CP022
          - type: figure
            figureRef: FP001
            claimRefs: []
      - number: '3.2'
        title: 直接竞争对手画像
        blocks:
          - type: paragraph
            body: >
              **Project44**（Chicago, IL；累计融资 $420M+）按融资额和规模看是领先的物流可视化平台，每年处理 3.7 万亿个数据点，覆盖 15
              亿票货运。它不提供强迫劳动合规、关税情景规划或政府级安全认证；其 TAM 是物流执行，不是贸易合规。两家公司都争夺大型企业的「供应链情报」预算，但产品重叠极小。


              **FourKites**（Chicago, IL；累计融资 $200M+）通过 1,200 多个承运商集成提供实时货运追踪。和 Project44
              一样，它聚焦物流可视化，而不是供应商风险或贸易合规。没有政府认证；没有知识图谱；没有监管功能。


              **Interos**（Arlington, VA；累计融资 $115M）是使命最接近的竞争对手，用 AI 监控金融、地缘政治和 ESG 维度的多级供应商风险。Interos 在供应商图谱和风险评分上与
              Altana 重叠，但缺少 Altana 的海关舱单数据、贸易流情报和政府认证。Interos 没有关税情景工具。


              **Resilinc**（累计融资约 $60M）监控供应链事件，并为中断风险映射供应商网络。规模小于 Altana；主要差异点是中断事件预警，而不是监管合规。没有政府认证。


              **Descartes Systems Group**（NASDAQ: DSGX；季度收入约 $165M）是贸易合规领域唯一上市的直接竞争对手。Descartes 提供海关申报、受拒方筛查和出口管制，与
              Altana 的合规功能直接重叠。不过，Descartes 使用传统数据库方法，而非 AI 原生知识图谱，也不具备 Altana 的供应商网络映射深度或政府级安全姿态。
            claimRefs:
