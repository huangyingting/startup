      - number: '6.3'
        title: 政府与国防客户
        blocks:
          - type: paragraph
            body: >-
              US CBP 授予 Altana 一份使用 Altana Atlas 做供应链执法的合同。US Navy 使用 Altana
              获取国防工业基础可见性。联邦合同提供稳定的多年经常性收入，也为其他受监管行业提供强背书。根据已披露合同估计，政府 ACV 占总收入的
              20-30%。政府与国防合同的战略意义超过直接收入贡献。联邦机构按多年预算周期运转，提供 ARR 可见性，并降低流失风险。GSA IT-70 Multiple Award Schedule
              列名让任何联邦机构无需单独竞争性招标即可采购 Altana，显著降低销售周期摩擦。CBP 的 UFLPA
              执法已经为供应链透明度工具创造持续需求信号。国防供应链安全要求（CMMC、DFARS）正在推动国防工业基础中的进一步扩张机会。政府客户也为面向制药、金融服务、航空航天等受监管行业的商业企业销售提供信誉锚点。DoD
              在 National Security Memorandum-10 下聚焦供应链韧性，为 Altana 政府板块带来结构性顺风。
            claimRefs: []
          - type: table
            tableRef: TU005
            claimRefs: []
      - number: '6.4'
        title: 留存与采用轨迹
        blocks:
          - type: paragraph
            body: >-
              2026 年初贸易政策波动期间，Altana Tariff Scenario Planner 使用量激增 213%，显示客户在急性宏观事件中高度参与。政府合同续约提供基础耐久信号。商业 NRR 和 GRR
              未公开披露。基于已披露客户的客户分组分析显示，企业客户年留存可能高于 90%。2026 年一季度 Tariff Scenario Planner 使用量激增
              213%，是由宏观层面贸易政策波动驱动的重要采用信号。2026 年 2 月美中关税升级重启后，企业采购团队和供应链高管启用 Altana 平台快速做情景分析，说明 Altana
              产品解决的是尖锐业务痛点，而不只是愿景型用例。SAM.gov 和机构采购记录中的政府合同续约，为经常性收入提供了耐久底线。商业 NRR 和 GRR 仍未披露，限制了精确留存评估。平台深度数据集成（Altana
              Atlas 覆盖 28 亿+ 货运）让已经接入私有数据的大型企业客户承担显著切换成本；即使缺少披露指标，也暗示结构性留存高于行业平均。
            claimRefs: []
