      - number: '4.2'
        title: 收入估算与财务状况
        blocks:
          - type: paragraph
            body: >
              Altana 财务完全私有，没有公开披露义务。来自三个独立来源（ZoomInfo、Toarn Research、PitchBook）的收入估算集中在 $25M–$80M ARR 区间；其中方法上最扎实的估算，是将
              BVP 员工基准（每员工 $150K–$200K ARR）套用到 278 名员工，得到 $42M–$56M ARR。CEO Smith 在 Series C 时称 ARR
              同比增长「triple-digits」，若从 2024 年初估算 $15M–$25M 的基数出发，并假设公司规模扩大后增速放缓至 50–80%，则与 2026 年 5 月 $40M–$80M ARR 区间一致。


              资本状况：Altana 于 2024 年 7 月完成 $200M Series C，累计融资达到 $322M。公开资料未披露债务或 venture debt 义务。用估算总 burn $5M–$9M/月（基于
              $4.6M/月的人力成本 + 基础设施/GTM）扣除增长中的 ARR/12（$3.5M–$6.5M/月），估算净 burn 为 $0–$5M/月，理论 runway 为 40–200 个月；实际口径下，Toarn
              估计距下一次融资事件还有 24–36 个月，目标是在 $100M+ ARR 时进入 Series D 或 IPO 里程碑。


              所有数字都存在重大不确定性。做出任何投资决策前，都需要全面审查 data room 中的实际收入、NRR、客户数、burn 和现金余额数据。
