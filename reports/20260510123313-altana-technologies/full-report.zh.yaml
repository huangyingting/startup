  - id: FR001
    title: 风险热力图
    artifact: risks
    type: matrix
    sourceRefs:
      - SR001
      - SR002
      - SR007
      - SR012
      - SR022
    notes: 风险严重程度（行）按发生可能性（列）展示。每个单元格标出该象限的主要风险。剩余风险为缓释后的风险。高可能性列中的严重风险，是尽调和监控的最高优先级。
    data:
      columns:
        - 低可能性
        - 中可能性
        - 高可能性
      rows:
        - label: 严重
          values:
            - FedRAMP ATO 撤销
            - AWS GovCloud 长时间宕机
            - 贸易数据遭网络安全入侵
        - label: 高
          values:
            - 现有厂商发起 IP 诉讼
            - UFLPA 执法回退
            - SAP 和 Oracle ERP 原生功能替代
        - label: 中
          values:
            - 基础模型厂商进入竞争
            - CEO 关键人物离职
            - 政府预算封存
        - label: 低
          values:
            - CBAM 监管修订
            - Maersk 数据源终止
            - AI 准确性集体诉讼
  - id: FR002
    title: 风险传导图
    artifact: risks
    type: dag
    sourceRefs:
      - SR006
      - SR012
      - SR013
      - SR015
      - SR022
    notes: 从主要风险事件到下游业务影响的因果链。边标签显示传导机制。多项上游风险最终汇入现金跑道压缩和估值受损。
    data:
      nodes:
        - id: gov-budget-cut
          label: 政府预算封存
        - id: uflpa-rollback
          label: UFLPA 执法回退
        - id: aws-outage
          label: AWS GovCloud 长时间宕机
        - id: sap-displacement
          label: SAP 和 Oracle ERP 替代
        - id: fedramp-lapse
          label: FedRAMP ATO 失效
        - id: reduced-gov-arr
          label: 政府 ARR 下降
        - id: compliance-demand-drop
          label: 合规需求下降
        - id: customer-churn
          label: 企业客户流失
        - id: runway-compression
          label: 现金跑道压缩
        - id: valuation-impairment
          label: 降价轮或估值受损
      edges:
        - from: gov-budget-cut
          to: reduced-gov-arr
          label: 压低合同支出
        - from: uflpa-rollback
          to: compliance-demand-drop
          label: 削弱合规紧迫性
        - from: aws-outage
          to: fedramp-lapse
          label: 触发 ConMon 失败
        - from: fedramp-lapse
          to: customer-churn
          label: 使政府 SLA 失效
        - from: sap-displacement
          to: customer-churn
          label: 将预算转向现有厂商
        - from: reduced-gov-arr
          to: runway-compression
          label: 收紧现金流
        - from: compliance-demand-drop
          to: runway-compression
          label: 减少新 ARR 流入
        - from: customer-churn
          to: runway-compression
          label: 流失经常性收入
        - from: runway-compression
          to: valuation-impairment
          label: 迫使紧急融资
  - id: FR003
    title: 依赖图
    artifact: risks
    type: dag
    sourceRefs:
      - SR002
      - SR013
      - SR015
      - SR016
      - SR023
    notes: Altana 的关键外部依赖及关系类型。边标签描述依赖性质。AWS GovCloud 和 CBP 的关键性最高。会员网络提供数据飞轮优势。
    data:
      nodes:
        - id: altana
          label: Altana Technologies — 核心平台
        - id: aws-govcloud
          label: AWS GovCloud — 唯一 FedRAMP High IaaS
        - id: cbp
          label: CBP — GBI 政府合同锚点
        - id: maersk
          label: Maersk Gemini — 主要数据源
        - id: fedramp-pmo
          label: FedRAMP PMO — 授权机构
        - id: foundation-models
          label: 基础 AI 模型 — OpenAI 和 Anthropic
        - id: member-network
          label: 会员数据网络 — 500M+ 实体
        - id: investors
          label: USIT、GV、Generation IM — 资本
        - id: enterprise-clients
          label: Fortune 500 企业客户
      edges:
        - from: altana
          to: aws-govcloud
          label: 唯一 FedRAMP High IaaS — 关键路径
        - from: altana
          to: cbp
          label: GBI 合同交付
        - from: altana
          to: maersk
          label: Gemini Cooperation 数据源
        - from: altana
          to: fedramp-pmo
          label: ATO 维护与续期
        - from: altana
          to: foundation-models
          label: LLM 推理 — 可替代
        - from: member-network
          to: altana
          label: 50% 自有链接数据
        - from: investors
          to: altana
          label: Series C 现金跑道资本
        - from: altana
          to: enterprise-clients
          label: SaaS 平台交付
  - id: FV001
    title: 投资建议逻辑
    artifact: valuation
    type: flow
    sourceRefs:
      - SV001
      - SV010
      - SV020
      - SV022
    notes: 从 Altana 竞争地位到有条件正面投资建议的逻辑链。每个节点代表一个投资逻辑决策点。边标签显示推动转向的证据或条件。
    data:
      nodes:
        - id: competitive-moat
          label: FedRAMP High + IC C2E — 独特认证护城河
        - id: data-flywheel
          label: 2.8B 货运知识图谱 — 网络效应
        - id: regulatory-demand
          label: UFLPA + EU CSDD + CBAM — 结构性合规需求
        - id: government-validation
          label: CBP GBI + 政府锚点 — 销售信誉
        - id: valuation-check
          label: 1B 估值 — 隐含 ARR 倍数 12-25x
        - id: data-room-conditions
          label: 条件：ARR、NRR、利润率、政府客户集中度
        - id: conditional-positive
          label: 有条件正面 — 满足条件则投资
        - id: decline
          label: 放弃 — 条件不达标则放弃
  - id: FV002
    title: 估值敏感性
    artifact: valuation
    type: range
    sourceRefs:
      - SV003
      - SV004
      - SV028
    notes: 隐含公允价值对关键模型输入的敏感性。每个项目展示该输入上下波动一个标准差时的结果范围。基准情景取各范围中点。
    data:
      items:
        - label: ARR 增长率 +/-20pp
          low: 0.8
          high: 3.2
        - label: NRR +/-15pp（95-125%）
          low: 0.6
          high: 2.4
        - label: 退出倍数 +/-3 倍（2-10x）
          low: 0.4
          high: 4
        - label: 毛利率 +/-15pp（55-85%）
          low: 0.9
          high: 2.1
        - label: 政府客户集中度 +/-20pp
          low: 0.7
          high: 1.8
  - id: FV003
    title: 估值 / 回报区间
    artifact: valuation
    type: range
    sourceRefs:
      - SV028
      - SV024
      - SV025
    notes: 以 $1B 入场估值部署 $500M 时，乐观、基准、悲观情景下的回报倍数。中点代表各概率加权情景下的预期结果。
    data:
      items:
        - label: 乐观情景（25% 概率）
          low: 3.2
          high: 4
        - label: 基准情景（50% 概率）
          low: 1.3
          high: 1.8
        - label: 悲观情景（25% 概率）
          low: 0.4
          high: 0.6
        - label: 概率加权预期值
          low: 1.4
          high: 2
  - id: FV004
    title: 投资 KPI
    artifact: valuation
    type: kpi
    sourceRefs:
      - SV003
      - SV015
      - SV010
    notes: 投后监控的关键绩效指标。绿色阈值代表进展正常；琥珀和红色阈值触发复核。投资交割后应按季度跟踪 KPI。
    data:
      items:
        - label: ARR 同比增长
        - label: 净收入留存率
        - label: 综合毛利率
        - label: 政府 ARR 集中度
        - label: 每季度新增企业客户
        - label: 烧钱倍数
        - label: FedRAMP ATO 状态
        - label: Series D 融资进展
