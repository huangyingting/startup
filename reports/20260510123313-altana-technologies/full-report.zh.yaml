  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Altana Technologies 处在三个相互重叠的技术市场交汇处：广义供应链管理（SCM）软件、狭义供应链可视化与合规软件，以及面向政府和企业的 AI
              驱动贸易情报。纳入的支出包括以下平台：映射、监控并管理多级供应商网络；提供贸易合规自动化（关税、制裁、强迫劳动筛查、原产国判定）； 追踪价值链中的 Scope 3 碳排放；并让政府机构借助 AI
              分析执行边境安全、海关和贸易监管。排除的支出包括纯实时物流追踪（车联网、GPS、 最后一公里配送）、ERP 系统、不具备供应链映射能力的采购软件，以及传统货运管理。


              Altana 的主要 SAM 位于供应链可视化、合规与风险情报，是更广义 SCM 软件的一个子赛道。现状替代方案包括人工海关代理和贸易律师处理合规、 基于电子表格的供应商管理，以及传统
              GRC（治理、风险、合规）软件。关键邻近市场包括：企业风险管理、ESG 报告平台、可持续性数据服务和报关软件。
              最重要的边界在于实时运营追踪（Project44、FourKites）与网络级供应链情报（Altana）之间——二者本质上是不同产品，服务不同预算； Altana
              瞄准采购、合规和贸易政策高管，而不是物流运营团队。运营追踪厂商加上情报层后，这条边界正在变模糊，也从下方制造竞争压力。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
          - type: table
            tableRef: TM001
            claimRefs:
              - CM001
              - CM002
              - CM003
      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              供应链管理软件的总可寻址市场估计在 2024 年超过 $28B，多家分析机构预计到 2030 年增至约 $46B，对应 CAGR 约 8–9%。这个广义 TAM 包括 SCM
              平台、WMS、TMS、采购、寻源及相关软件。不过，Altana VCMS 真正相关的市场，是供应链可视化、合规和情报子赛道。该狭义赛道 2024 年估算在 $5B–$9B 之间，随着 AI
              能力和监管强制推动采用，CAGR 为 20–25%。AI 驱动的供应链分析被特别列为增长最快的细分领域，一些厂商声称年增长超过 25%。


              Altana 的可服务可寻址市场（SAM）可估算为全球约 $5B–$9B，覆盖拥有复杂多级全球供应链的企业（Fortune 2000、大型政府机构、物流服务商，
              以及需要供应链风险数据的保险公司）。可服务可获得市场（SOM）——Altana 近期现实可捕获规模——要小得多，因为公司当前销售动作偏企业与政府，
              中端市场买家认知有限，且政府采购周期较长。基于阶段可比公司和当前客户画像，若 Maersk 网络扩张与 CBP 授权落地顺利，5 年期 SOM 估计为 $500M–$2B。不同来源的规模估算最高相差 4
              倍，真实不确定性仍作为证据缺口保留。


              关键规模测算方法说明：多数市场研究机构在最宽口径中计入 SAP、Oracle 和 IBM 的 SCM 收入，从而抬高 TAM。Altana 竞争的是情报与合规层， 不是交易或 ERP 层。收窄到 AI
              驱动的供应链合规与可视化软件，2024 年市场更可能落在 $3B–$8B，并由监管强制（UFLPA、CBAM）和疫情后韧性投资推动， 增速超过 20%。
