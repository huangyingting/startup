      - number: '1.3'
        title: 融资历史与投资人格局
        blocks:
          - type: paragraph
            body: >
              自 2019 年创立以来，Altana 通过四轮主要融资累计募资约 $322M–$343M。种子轮（约 $7M，2020 年）有 AlleyCorp、Working Capital、 Amadeus
              Capital Partners 和 Schematic Ventures 参与，是典型早期 AI 基础设施投资组合。Series A（$15M，2021 年 9 月）由 Floating Point
              领投，Schematic Ventures、Amadeus Capital Partners、GV（Google Ventures）和 Ridgeline Partners 参与。 GV 在 Series A
              后成为最大股东。Series B（$100M，2022 年 10 月）显著扩大资本底座，参与方包括 ReefKNoT Investments、 Activate Group、OMERS Ventures 和
              Prolog Ventures。


              标志性的 Series C（$200M，2024 年 7 月 29 日宣布）由 Thomas Tull 的 US Innovative Technology
              Fund（USIT）领投——这是一家聚焦国防的风投机构—— 并引入新的战略投资方 Generation Investment Management（Al Gore 旗下气候增长基金）、March Capital
              和 Salesforce Ventures。所有主要老股东都参与， 确认了持续信心。Series C 将 Altana 投后估值推至 $1B，使其进入独角兽行列。投资人组合值得注意：USIT
              的国防焦点、Generation 的气候使命、 Salesforce 的企业 SaaS 分发，拼出一个战略上多元的财团，对齐 Altana 的政府、ESG 和企业 go-to-market 动作。


              Series C 资金将用于 AI 驱动的产品开发，在数据平台之上支撑协同工作流，并加速面向全球政府和企业买家的 go-to-market。公开资料未披露任何老股转让或债务融资。
