      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              Altana 的市场机会由四个结构性监管力量和一个宏观经济驱动因素推动。第一，UFLPA 执法：《Uyghur Forced Labor Prevention Act》 （2021 年 12 月签署，2022 年
              6 月生效）设定可反驳推定，来自新疆的商品被视为使用强迫劳动生产，进口商必须主动证明并非如此。到 2024 年， CBP 已依据 UFLPA 扣留超过 $1.8B 的货物，执法还在升级。这直接拉动 Altana
              的强迫劳动筛查、供应商映射和 Product Passport 能力需求。 第二，EU Carbon Border Adjustment Mechanism（CBAM）：2026 年 1 月 1
              日进入正式期，要求欧盟进口商为进口品中的内含碳付费。 Altana 的 Scope 3 碳追踪和供应商数据能力直接对应 CBAM 合规义务。第三，美国关税波动：2025–2026
              年美国关税升级显著增加了实时关税模拟和原产国判定需求—— Altana 的 Tariff Scenario Planner 在 2026 年 2 月最高法院关税裁决新闻周期中使用量据报激增
              213%，印证了这一点。第四，ESG 和供应链披露要求： EU Corporate Sustainability Reporting Directive（CSRD）与 SEC 气候披露规则正在扩大企业 Scope
              3 报告义务，制造对可验证供应链数据的需求。


              采用约束同样显著：（1）企业销售周期 6–18 个月，限制近期 ARR 增长；（2）政府采购可耗时 12–24 个月，并要求专门签约能力；（3）
              围绕联邦模型共享供应链数据的数据隐私担忧，可能减慢高度风险厌恶型企业采用；（4）平台复杂——VCMS 覆盖许多用例，需要客户投入大量实施精力； （5）合规支出的 ROI
              难以讲清，因为收益是规避风险，而非可量化成本节省；（6）SAP、Oracle 等既有 ERP 厂商在现有客户关系上叠加 AI 合规层， 带来竞争。网络效应需要时间积累：Altana
              的数据护城河会随着参与者增加而复合增强，但在某些贸易航道，早期网络密度可能低于预期。
            claimRefs:
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
