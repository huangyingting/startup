      - number: '7.4'
        title: 伙伴、依赖与竞争风险分析
        blocks:
          - type: paragraph
            body: |
              Altana 数据飞轮高度依赖三项外部关系：覆盖 12 个港口、约 70% 全球贸易的
              Maersk Gemini Cooperation 数据源；提供政府验证和收入的 CBP Global Business
              Identifier 合同；以及支撑 FedRAMP High 授权的 AWS GovCloud 基础设施。失去
              其中任何一项关系，都是重大战略挫折。Maersk 数据终止会削弱知识图谱覆盖，以及
              Altana 区别于公开海关数据源的网络效应。CBP 合同不续约，则会移除一个对企业和
              政府销售信誉至关重要的政府验证锚点。

              竞争侧，SAP 和 Oracle 是威胁 Altana 企业板块的最可信既有厂商。FT 证实，
              SAP S/4HANA 合规模块正在消除已经支付 SAP 维护费的制造商对独立 AI 预算的需求。
              IDC 证实，Oracle 和 IBM 也在扩展原生供应链风险模块，并用更紧密的 ERP 集成强化
              竞争。OpenAI、Anthropic 等基础模型提供商构成更长期威胁；如果它们能用面向贸易
              合规的通用企业 AI 抽象掉 Altana 的数据优势，竞争格局会变化。Altana 的政府认证
              护城河，包括 IC C2E 和 FedRAMP High，仍是近期抵御既有厂商和新进入者最可防守的
              壁垒，因为当前没有竞争者能同时覆盖国家安全和企业栈上的同等多认证组合。
