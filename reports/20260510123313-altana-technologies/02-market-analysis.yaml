callouts:
  - calloutType: strength
    title: Regulatory Mandates Are Permanent TAM Expanders for Altana's Compliance-Centric Platform
    body: >
      UFLPA, CBAM (live January 2026), CSRD, and US tariff volatility collectively create a multi-year
      regulatory tailwind that permanently expands the compliance budget allocation for supply chain
      intelligence. Unlike discretionary resilience investment that compresses in downturns, regulatory
      compliance budgets are non-discretionary. Altana's positioning as the infrastructure layer for
      compliance — evidenced by its CBP Product Passport mandate and CBAM-compatible Scope 3 capabilities
      — means it is structurally aligned with a non-recessionary budget category. This is a key valuation
      support argument.
    claimRefs:
      - CM015
      - CM016
      - CM017
      - CM018

  - calloutType: risk
    title: TAM Estimates Are Inflated and Market Boundary Is Contested
    body: >
      Published SCM software TAM estimates of $28–46B dramatically overstate Altana's serviceable
      market because they aggregate ERP, TMS, WMS, and procurement software that Altana does not
      compete in. The actual AI-powered supply chain compliance and intelligence segment is
      $5–9B at best, growing to $20–35B by 2030 under favorable regulatory scenarios. Competitive
      entry from SAP and Oracle — who have existing relationships with the same enterprise buyers —
      represents a structural threat that could limit Altana's penetration below $1B ARR without
      a differentiated data moat defense. The mid-market remains largely unaddressed, capping
      realistic SOM in the $500M–$2B range over 5 years.
    claimRefs:
      - CM005
      - CM006
      - CM021

  - calloutType: insight
    title: CBAM Live Enforcement From January 2026 Creates an Immediate Demand Catalyst
    body: >
      The EU Carbon Border Adjustment Mechanism entered its definitive enforcement period on January 1,
      2026. EU importers of cement, iron and steel, aluminium, fertilisers, electricity, and hydrogen
      must now buy CBAM certificates and declare embedded carbon in imports. Altana's Scope 3 carbon
      tracking capability and supplier data depth are directly relevant to CBAM compliance. European
      enterprises that previously delayed supply chain carbon measurement now face real financial
      penalties, creating a demand catalyst that did not exist in 2025. Altana's European sales motion
      should be able to leverage this mandate directly.
    claimRefs:
      - CM016
      - CM017

