- id: TV005
  title: Thesis break and investment-threshold criteria table
  artifact: valuation
  notes: Investment-break thresholds represent conditions under which the thesis should be reassessed or position exited.
    Triggers are based on valuation sensitivity analysis and risk chapter assessments.
  claimRefs:
  - CV024
  - CV025
  - CV033
  - CV039
  columns:
  - Trigger Event
  - Threshold
  - Impact on Thesis
  - Investor Response
  rows:
  - - ARR Growth Deceleration
    - YoY ARR growth below 40% for 2 consecutive quarters
    - High — base case requires 50% growth; decelerating to 40% compresses exit multiple by 2-3 turns
    - Review investment; halt Series D participation below threshold
  - - NRR Deterioration
    - NRR below 100% for 2 consecutive quarters
    - Critical — implies net customer or seat reduction; ARR compounding breaks; multiple collapses
    - Immediate investment committee review; consider exit at next liquidity event
  - - FedRAMP ATO Lapse
    - Any suspension or revocation of FedRAMP High ATO
    - Critical — blocks all government sales; triggers customer SLA breach; certification moat eliminated
    - Full divestment process initiated within 60 days
  - - Government Revenue Concentration
    - Single customer exceeds 25% ARR; government above 50% total
    - High — renewal dependency creates binary outcomes at contract events
    - Engage board to require customer diversification plan with 12-month milestones
  - - Down-round Series D
    - Series D closes at or below $1B valuation
    - High — thesis impairment; investor credibility damage; management retention risk
    - Full position reassessment; evaluate secondary exit or bridge participation
  - - CEO Departure Without Succession
    - Evan Smith exits without 6-month transition plan
    - High — disrupts government relationships, investor confidence, and strategy
    - Convene emergency board review; assess bridge management arrangement
