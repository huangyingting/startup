    - CONDITIONAL POSITIVE — invest with conditions attached
  - - Confidence Level
    - Medium-High — thesis is well-supported; material unknowns require data room resolution
  - - Risk Rating
    - Medium-High — government concentration, valuation premium, and FedRAMP dependency are primary risks
  - - Valuation Stance
    - Aggressive but defensible — $1B justified only with confirmed ARR, NRR above 105 percent, and margin validation
  - - Entry Multiple
    - 12 to 25x estimated 2026 ARR ($40-80M range) — high end of certified GovTech SaaS comparable band
  - - Hold Period
