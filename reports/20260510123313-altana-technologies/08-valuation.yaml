- id: recommendation
  title: Recommendation and Investment Parameters
  body: 'Recommendation: CONDITIONAL POSITIVE — pursue investment with conditions attached.

    Confidence: Medium-High. Risk Rating: Medium-High. Valuation Stance: Aggressive but

    defensible given certification moat and FedRAMP premium. The recommendation is conditional

    on: (1) data room validation confirming ARR above $60 million with government segment below

    40 percent concentration; (2) NRR demonstrably above 105 percent for the most recent

    trailing four quarters; (3) gross margin above 60 percent blended; and (4) government

    contract renewal schedule showing no single contract representing more than 20 percent

    of ARR expiring within 12 months of close.


    Key investment KPIs for post-investment monitoring include ARR growth year-over-year by

    quarter, NRR by cohort, government contract renewal rate, new enterprise logo additions

    per quarter, gross margin trend, and FedRAMP and IC C2E authorization maintenance status.

    Thesis-break events that would trigger divestment consideration include: FedRAMP ATO

    lapse, two or more consecutive quarters of NRR below 100 percent, government segment

    above 50 percent of ARR without diversification plan, or ARR growth deceleration below

    40 percent year-over-year.

    '
