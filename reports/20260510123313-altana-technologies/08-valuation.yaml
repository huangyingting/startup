- id: valuation-context
  title: Current Financing and Valuation Context
  body: 'Altana raised $200 million in Series C financing at a $1 billion post-money valuation in

    July 2024, co-led by US Innovative Technology Fund and General Atlantic with participation

    from GV (Google Ventures) and Activate Capital. Total funding since 2019 founding is

    $322 million. At estimated $40 to $80 million ARR and $5 to $9 million monthly burn,

    Altana carries 18 to 36 months of runway from May 2026. The Series C was structured to

    fund commercial expansion, government certification depth, and international market entry.


    Valuation methodology applies ARR multiple analysis anchored on the 2 to 8 times NTM

    revenue public comparable band observed for supply chain software (E2open at 2.1x floor,

    Kinaxis at 5.8x, Coupa pre-acquisition at 8.2x), with a 3 to 5 turn premium adjustment

    for the FedRAMP High and IC C2E certification moat quantified by Coalfire at 25 to 40

    percent ARR per seat premium. At 12 to 25 times estimated 2026 ARR, the $1 billion Series

    C valuation sits at the high end of the justified range and requires validation against

    actual ARR and gross margin to confirm. Government certification sets qualify Altana for

    GSA schedule procurement, IC IDIQ vehicles, and Other Transaction Authority (OTA) programs

    that accelerate government sales velocity.

    '
  claimRefs:
  - CV001
  - CV002
  - CV009
  - CV010
