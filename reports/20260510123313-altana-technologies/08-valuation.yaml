  - - Base Case Return
    - 1.3 to 1.8x on $500M deployed — modest positive outcome; requires NRR and ARR confirmation
  - - Conditions to Invest
    - ARR above $60M confirmed; government segment below 40%; NRR above 105%; no contract above 20% ARR expiring within 12
      months
