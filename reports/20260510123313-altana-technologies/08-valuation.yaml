- id: scenarios
  title: Bull, Base, and Bear Scenarios
  body: 'Bull case (probability 25 percent): UFLPA enforcement intensifies through 2026, EU CSDD

    enforcement activates in parallel, Altana closes three or more federal agency contracts

    in H2 2026, NRR reaches 125 percent, and CBAM module captures European demand from

    multinationals. ARR reaches $150 to $200 million by end of 2027. Exit at 8 to 10 times

    2028 ARR of $200 million implies $1.6 to $2.0 billion, yielding 3.2 to 4.0 times return.


    Base case (probability 50 percent): ARR grows 50 percent annually reaching $100 to $130

    million by end of 2027. Government segment stable, enterprise segment adds 20 to 30 new

    logos per year. NRR holds at 110 to 115 percent. Series D closes in H1 2027 at $1.5 to

    $2.0 billion post-money. Exit at 5 to 7 times 2028 ARR of $130 million implies $650

    million to $910 million, yielding 1.3 to 1.8 times return — a modest but positive outcome.


    Bear case (probability 25 percent): UFLPA enforcement softens, government contract renewal

    delayed 6-plus months, NRR deteriorates to 95 to 100 percent, and SAP displacement

    accelerates in enterprise. ARR stagnates at $60 to $80 million by 2027. Series D requires

    flat or down valuation. Exit at 3 to 4 times 2027 ARR of $70 million implies $210 to $280

    million, representing 0.4 to 0.6 times return and material capital impairment.

    '
  claimRefs:
  - CV031
  - CV032
  - CV033
  - CV034
  - CV035
  - CV036
  tableRefs:
  - TV003
  figureRefs:
  - FV003
- id: exit-diligence
  title: Comparable Set, Exit Readiness, and Final Diligence Asks
  body: 'The comparable set for Altana valuation benchmarking includes: Kinaxis (TSX: KXS) at

    5.8x NTM revenue, E2open (ETWO) at 2.1x, Coupa Software at 8.2x pre-acquisition,

    Veeva Systems as a GovTech SaaS premium reference at peak 18x, and private transaction

    precedents including Resilinc and Elementum at 6 to 10 times revenue. The blended mid-

    point for certified GovTech supply chain SaaS justified range is 5 to 8 times NTM

    revenue. At $1 billion valuation on $40 to $80 million ARR, Altana is priced at the

    high end of this range requiring strong NRR and ARR growth confirmation.


    Exit readiness across pathways: strategic M and A is the most likely exit for 2026 to

    2028 window with Palantir, Microsoft, SAP, and defense primes as primary strategic

    buyers at estimated 8 to 12 times revenue. IPO readiness requires ARR above $150 million

    and demonstrably consistent growth with government and commercial diversification; current

    trajectory implies IPO readiness no earlier than 2028 to 2029. Secondary sale is viable

    at any stage given institutional quality investor base. Final diligence asks: audited ARR

    by segment, NRR cohort data, government contract renewal schedule, gross margin bridge,

    professional services percentage, and reference calls with CBP, three enterprise accounts,

    and board-level succession plan confirmation.

    '
