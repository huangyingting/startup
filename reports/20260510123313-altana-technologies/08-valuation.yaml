company:
  name: Altana Technologies
chapter:
  number: 8
  title: Valuation
  letter: V
  summary: 'Altana Technologies warrants a CONDITIONAL POSITIVE investment recommendation at the $1 billion Series C valuation
    established in July 2024. The thesis rests on FedRAMP High moat, a network-effect knowledge graph with 2.8 billion shipments,
    government and enterprise expansion momentum, and credible $40-80 million ARR reaching $200 million by 2028 in the base
    case. Material conditions attach to government contract concentration, undisclosed ARR mix, professional services margin
    dilution, and the need to demonstrate NRR above 110 percent before a Series D to protect against down-round risk. Bull
    case yields 3x+ return; base case yields 1.5-2x; bear case is capital at risk.

    '
