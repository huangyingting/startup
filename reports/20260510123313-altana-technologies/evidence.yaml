evidenceGaps:
  - type: private-evidence-only
    severity: blocking
    topic: financials
    missingEvidence: Confirmed ARR, revenue run-rate, gross margin, NRR, and burn rate for Altana Technologies
    whyItMatters: >-
      Without disclosed financials, the $1B valuation cannot be assessed against revenue multiples; the investment case
      relies entirely on strategic positioning rather than earnings quality
    diligencePath: >-
      Request audited financials or management accounts from Altana directly; review Series C term sheet or subscription
      revenue schedules if accessible via investor relations
    relatedQuestionRefs:
      - QO013
  - type: missing-source
    severity: material
    topic: adverse
    missingEvidence: >-
      Independent records of lawsuits, regulatory complaints, employee disputes, or compliance incidents involving
      Altana Technologies
    whyItMatters: >-
      Absence of adverse records in open sources does not confirm absence of issues; private company governance risks
      require active investigation
    diligencePath: >-
      Search PACER for federal court filings, NLRB records, state AG databases, and OFAC records; request legal reps and
      warranties from Altana in due diligence
    relatedQuestionRefs:
      - QO022
  - type: private-evidence-only
    severity: material
    topic: customer-concentration
    missingEvidence: Breakdown of revenue by customer and contract type (Maersk, CBP, and others) to assess concentration risk
    whyItMatters: >-
      If Maersk and US government contracts represent more than 50% of ARR, customer concentration risk is elevated and
      churn from either would materially impair the business
    diligencePath: >-
      Request customer revenue schedule and contract renewal cadence; review contract terms for Maersk and CBP through
      data room access
    relatedQuestionRefs:
      - QO024
  - type: missing-source
    severity: material
    topic: data-privacy-risks
    missingEvidence: >-
      Independent audits, reported incidents, or regulatory findings related to Altana's federated supply chain data
      model and privacy controls
    whyItMatters: >-
      Federated learning architecture processes sensitive cross-border trade data; any privacy breach or
      government-mandated data access could undermine customer trust and FedRAMP authorization
    diligencePath: >-
      Review FedRAMP authorization documents, ISO 27001 audit reports, and any DHS/CBP contractual obligations regarding
      data sovereignty; search for GDPR or CCPA incident reports
    relatedQuestionRefs:
      - QO023
    relatedTableRefs:
      - TO002
  - type: missing-source
    severity: moderate
    topic: investor-governance-rights
    missingEvidence: >-
      Full board composition, governance rights, and economic ownership stakes for all Altana investors across all
      rounds
    whyItMatters: >-
      Investor governance terms, board seats, and pro-rata rights affect future fundraising flexibility and exit
      optionality
    diligencePath: Request capitalization table, voting agreements, and investor rights agreement from Series C data room
    relatedTableRefs:
      - TO003
  - type: missing-source
    severity: moderate
    topic: milestone-completeness
    missingEvidence: >-
      Exact dates and contract values for CBP Product Passport mandate, FedRAMP authorization milestone, and any
      government contract renewal or expansion events
    whyItMatters: >-
      Approximate milestone dates reduce confidence in regulatory-lock-in narrative; confirmed dates and contract values
