  - id: unit-economics-customer-roi
    title: Unit Economics and Customer Return Profile
    body: >
      Augury's customer unit economics are partially illuminated by the September 2025 Forrester Total Economic
      Impact (TEI) study commissioned on behalf of Augury. Forrester interviewed multiple enterprise customers
      across industries and constructed a composite organization profiled as a large US-based manufacturer with
      $20B in annual revenue. The composite achieved a 310% three-year ROI, an NPV of $20.1M, and a payback
      period of less than six months from initial deployment.

      The key value drivers in the Forrester analysis were: $16.8M in unplanned downtime savings over three
      years from proactive machine failure detection; a 15% reduction in maintenance spend ($1.5M over three
      years) by shifting from reactive to proactive maintenance; and a 5% throughput increase generating $7.5M
      in additional profit. Additional unquantified benefits included employee productivity gains, sustainability
      improvements, and workforce safety enhancements. A food and beverage manufacturer customer cited 10,000
      hours of avoided unplanned downtime over three years, recovering more than 25 million pounds of product.

      These figures validate a compelling enterprise ROI but should be interpreted carefully: the Forrester
      composite is based on selected customer interviews and constructed for a large enterprise context
      ($20B revenue), which may not represent smaller or mid-market deployments. Augury separately claims
      5-20x ROI for customers in general marketing materials, and Lightrock's investment thesis cites 5-20x
      ROI when deployed at scale. Fortune Brands Innovations independently corroborated 2.5x ROI within eight
      months at one site before scaling enterprise-wide. This customer-level evidence is strong for enterprise
      value proposition validation, but direct unit-economics inputs—CAC, LTV, NRR, average contract value,
      and gross margin by product line—remain undisclosed and must be sourced from the data room.
