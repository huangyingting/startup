  title: Financials
  summary: >
    Augury is a private, growth-stage industrial AI company that has raised approximately $369M across multiple rounds,
    most recently a $75M Series F in February 2025 led by Lightrock at a maintained $1B+ valuation. Revenue grew five-fold
    between 2021 and 2025 though absolute ARR, gross margins, and burn rate are not publicly disclosed. The business model
    blends IoT hardware sensors, SaaS subscriptions for Machine Health and Process Health platforms, and managed services
    delivered via enterprise multi-year contracts. A Forrester Total Economic Impact study (July 2025) validates 310% ROI
    and <6-month payback for a composite enterprise customer. Customer traction signals—tripled Fortune 500 customers, tripled
    $1M+ accounts, and 500M+ hours of machine data analyzed—indicate healthy growth momentum. Core financial underwriting
    remains blocked by the absence of public ARR, NRR, gross margin, and burn rate disclosures; diligence must access the
    data room to resolve these gaps.

