sections:
  - id: revenue-model-architecture
    title: Revenue Model and Business Architecture
    body: >
      Augury generates revenue through three integrated streams that compound over the customer lifecycle: IoT sensor
      hardware, SaaS software subscriptions, and managed services. The hardware layer consists of purpose-built vibration,
      temperature, and magnetic sensors—most recently the Halo R4000 edge-AI series launched November 2024—that are
      deployed on monitored machines. Hardware is sold or leased to enterprise customers as part of the broader Machine
      Health deployment; exact hardware pricing and margins are not publicly disclosed.

      The software layer forms the recurring revenue core of the business. Machine Health is sold as an annual or multi-year
      enterprise SaaS subscription covering AI diagnostics, failure detection, prescriptive recommendations, and platform
      access. Process Health, launched following the 2022 Seebo acquisition, is sold as a platform add-on enabling AI-driven
      production optimization. Both products are bundled with human reliability expertise—Vibration Analysts, Reliability
      Success Managers, and Solution Architects—creating a managed-service element that differentiates Augury from
      pure-software competitors but also introduces labor cost into the gross margin structure.

      Pricing is enterprise-grade and contract-specific; Augury has not published list pricing, per-machine fees, or
      tier structures for any product. The tripling of $1M+ accounts since 2021 confirms enterprise-level contract values
      at scale, but a reliable average contract value or ASP cannot be derived from public information alone. Professional
      services revenue from implementation, onboarding, and the proprietary Fast Track deployment methodology may be
      recognized separately from subscription revenue, but the revenue mix between hardware, software, and services
      is not disclosed. The blended hardware-plus-SaaS model is expected to generate lower gross margins than a
      pure-software peer, likely in the 55–70% range based on comparable industrial IoT-SaaS benchmarks, but this
      estimate carries low confidence without audited financials.
