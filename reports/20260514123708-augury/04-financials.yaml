  - id: financial-performance-signals
    title: Financial Performance Signals
    body: >
      Augury has not disclosed absolute ARR, quarterly revenue, or annual revenue in any public filing or press
      release. The primary financial performance signal available is a company-reported five-fold revenue increase
      between 2021 and February 2025. If Augury's revenue in late 2021 was in the range commonly attributed to
      companies that raise $180M Series E rounds at $1.5B valuations—broadly $20–60M ARR—a five-fold increase
      would imply a 2025 ARR in the range of $100M–$300M. This is an analyst estimate with low confidence;
      Augury has not confirmed any baseline or endpoint figure, and this range should not be used for underwriting
      without data-room confirmation.

      Customer traction metrics provide corroborating directional evidence. Fortune 500 customers tripled since
      2021, with Augury now serving 20+ Fortune 500 companies out of 170+ total enterprise customers. The tripling
      of $1M+ annual contract value accounts confirms a meaningful cohort of large enterprise deals growing in
      number, consistent with the company's stated land-and-expand motion. The platform analyzed over 500 million
      hours of machine data as of February 2025, up from approximately 1.1 billion total machine-hours monitored
      across the installed base—metrics that corroborate fleet scale. Augury estimates cumulative customer value
      generated at approximately $1 billion, a company-supplied figure that cannot be independently verified but
      is consistent with the Forrester study's $20.1M NPV for a single large manufacturer.

      Operational expansion signals are also present. Augury operates in 40+ countries, serves manufacturers
      across 10+ industrial verticals, and has deployed across 300,000+ machines. The Fortune Brands Innovations
      enterprise rollout—1,000+ machines across 16 sites in the US, UK, and Mexico—demonstrates the company's
      capacity to execute large multi-site deployments within a 12-month window. These scale and operational
      execution indicators are consistent with a company achieving revenue run rate above $100M, though the
      exact figure remains a material evidence gap for underwriting purposes.
