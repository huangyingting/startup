    - Fault Detection Breadth
    - Data / AI Maturity
    - Integration Ecosystem
    - Customer Validation
    rows:
    - label: Machine Health CR
      values:
      - High — 25+ pump fault types, 28+ motor fault types; multi-sensor fusion
      - High — 1.1B+ hours training data; 13+ years of labeled fault archive
      - High — SAP, IFS Ultimo, PTC ThingWorx, MaintainX; Bently Nevada OEM
      - High — Forrester TEI 310% ROI; Fortune Brands 2.5x ROI; Frost & Sullivan 2023 award
    - label: Machine Health SE
      values:
      - Medium — covers secondary rotating equipment; fewer published fault-type counts
      - High — same AI backbone as MH CR; shared training corpus
      - Medium — same integration stack; deployment workflow optimized for high-volume sensors
      - Medium — launched 2021; specific case study ROI for SE tier not separately published
    - label: Production Health
      values:
      - Medium — prescriptive process analytics; fault types mapped to production KPIs
      - Medium — Seebo-derived connectors; strong for discrete/batch; limited for continuous process
      - Medium — process data connectors + Augury machine data; not all ERP systems supported
      - Medium — Fortune Brands 2.5x ROI cites combined MH + PH; standalone PH ROI not isolated
    - label: Interoperability-as-a-Service
      values:
      - N/A — integration middleware, not a fault detection product
      - Low — rule-based mapping layer; AI not applied to integration workflows
      - High — ThingWorx Ready; IFS Ultimo, SAP, MaintainX, Infor; Parts-as-a-Service (DSV)
      - Medium — referenced in Forrester TEI; specific throughput metrics not published
    - label: Guaranteed Diagnostics
      values:
      - High — coverage tied to Augury AI diagnostic scope across all monitored assets
      - High — insurance underwriting model validates AI confidence threshold
      - Low — standalone offering; no CMMS integration of claim workflows documented
      - Low — limited public case studies; coverage terms and claims history not public
