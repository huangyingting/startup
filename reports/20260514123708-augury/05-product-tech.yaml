  - id: QE020
    question: 'How does Augury''s data flywheel work structurally, and what makes the 1.1 billion-hour corpus a defensible
      competitive moat?

      '
    type: mechanism
    targets:
    - contentRequirements/4
    status: answered
    answer: 'The flywheel works as follows: each new sensor deployment on a new asset generates labeled fault event data (from
      human analyst confirmation and maintenance outcomes) that is added to the training corpus. Larger corpus → more accurate
      fault models → more confident diagnostics → more customer deployments → more data. The moat is defended by: (1) 13+
      year head start; (2) human analyst annotation (labor-intensive to replicate); (3) diversity of machine types and operating
      conditions (harder to fake with synthetic data); (4) reinforcement learning roadmap would automate more labeling, accelerating
      the flywheel.

      '
