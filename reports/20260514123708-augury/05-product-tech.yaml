  - id: QE006
    question: 'How does Augury''s edge-AI architecture in the Halo R4000 differ from a conventional cloud-only IoT monitoring
      architecture, and what are the operational implications?

      '
    type: mechanism
    targets:
    - contentRequirements/2
    - plannedFigures/product-architecture-map
    status: answered
    answer: 'Conventional cloud-only: raw waveform data transmitted to cloud for all inference, requiring continuous high-bandwidth
      connectivity and creating latency. Halo R4000 edge-AI: fault classification runs on-device, transmitting only anomaly
      scores and metadata rather than raw waveforms. Implications: lower bandwidth cost, faster alert generation, offline
      operation capability, and reduced cloud processing load. Tradeoff: edge model updates require OTA firmware management.

      '
