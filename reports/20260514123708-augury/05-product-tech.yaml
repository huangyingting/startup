- id: integration-ecosystem-partner-network
  title: Integration Ecosystem and Partner Network
  body: 'Augury''s commercial and technical ecosystem spans CMMS and EAM software vendors, cloud infrastructure providers,
    OEM hardware partners, specialty consulting firms, and industrial delivery partners, forming a go-to-market network that
    amplifies direct sales and reduces customer integration friction. On the CMMS and EAM side, Augury integrates with IFS
    Ultimo via a certified bi-directional connector that automatically creates and closes work orders based on diagnostic
    alerts, and with SAP and MaintainX to cover the broadest range of enterprise maintenance management workflows. The PTC
    ThingWorx Ready certification enables plug-and-play integration with PTC''s industrial IoT platform, enabling customers
    who already run ThingWorx to add Augury diagnostics without custom development. Microsoft Azure provides the cloud infrastructure
    backbone for global data processing and AI model training.

    Baker Hughes holds a minority equity stake and a board seat in Augury, co-marketing the Ranger Pro as the Bently Nevada/Cordant
    hardware and providing enterprise sales reach across its installed base of heavy industrial customers. Schneider Electric''s
    SE Ventures co-led the $180M Series E and is listed as a technology partner, providing alignment with Schneider''s EcoStruxure
    IIoT platform. Grundfos entered an OEM partnership in 2018, expanded to a long-term strategic partnership in 2020, embedding
    Augury diagnostics into its pump services and enabling condition-based maintenance as a service for Grundfos pump customers
    globally. DSV Air & Sea integrated a Parts-as-a-Service capability with Augury, automating spare parts procurement triggered
    by diagnostic alerts. The partner network spans 16+ named partners including IBM, Accenture, Deloitte, McKinsey, Bain,
    Carrier, Trane, and Infor, as catalogued on Augury''s official partner sitemap.

    '
