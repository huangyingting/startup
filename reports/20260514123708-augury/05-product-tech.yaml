  title: Product Module / Asset Matrix
  notes: 'Augury''s six commercially active product modules as of May 2026, spanning predictive maintenance, process optimization,
    integration services, financial risk transfer, and community. Maturity status and GA dates are derived from official press
    releases and product pages.

    '
