  - id: QE015
    question: 'What are the primary cybersecurity risks in deploying Augury''s IoT sensors at scale in OT/IT factory environments?

      '
    type: adverse
    targets:
    - contentRequirements/5
    status: answered
    answer: 'Key risks: (1) OT/IT network boundary exposure — wireless sensors on the plant floor create a potential lateral
      movement path if not properly segmented from production control networks. (2) Gateway compromise — a single gateway
      aggregates 40 sensors; compromise would disable a large monitoring cluster. (3) Edge model tampering — OTA firmware
      update mechanisms for Halo R4000 edge AI models are not publicly documented; unauthorized model updates could affect
      diagnostic accuracy. (4) Cloud data exposure — 1.1B+ hours of machine data in Azure creates a high-value target for
      industrial espionage. ISA100.11a + AES mitigates device-level risk but does not address all attack vectors.

      '
