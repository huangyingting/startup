sections:
- id: product-portfolio-customer-value
  title: Product Portfolio and Customer Value Proposition
  body: 'Augury''s commercial platform consists of two integrated pillars — Machine Health and Production Health — which together
    address the full spectrum of manufacturing optimization from individual asset uptime to process yield efficiency. Machine
    Health is delivered in two tiers: Critical Resources (MH CR), targeting the most critical rotating assets such as pumps,
    motors, fans, and compressors that form the core of any plant''s reliability program, and Supporting Equipment (MH SE),
    launched in November 2021 to extend continuous monitoring to the 60% or more of a facility''s fleet that was previously
    unmonitored due to cost or sensor deployment complexity. Both tiers apply Augury''s multi-sensor IoT hardware combined
    with AI-driven diagnostics to deliver early-warning fault alerts, root-cause diagnoses, and severity prioritization aligned
    to criticality rankings.

    Production Health, launched following Augury''s 2022 acquisition of Seebo, takes a prescriptive approach to process optimization.
    Unlike the asset-centric Machine Health product, Production Health integrates machine sensor data with production process
    data — line speeds, recipe parameters, material inputs — to identify root causes of waste, yield loss, and throughput
    reduction, then prescribes corrective actions. Customers using Production Health have reported an average 37% reduction
    in production waste and 9% yield improvement per Augury''s benchmarks. Augury also offers Guaranteed Diagnostics — an
    industry-first offering backed by insurance underwriter Hartford Steam Boiler (HSB), a Munich Re subsidiary — in which
    Augury''s financial liability for missed faults is explicitly quantified and contractually backed by insurance coverage.
    An Interoperability-as-a-Service module enables bi-directional integration with existing CMMS, EAM, and ERP systems. A
    Forrester Total Economic Impact study validated 310% three-year ROI and less than six-month payback, with $16.8M in reduced
    downtime savings for a composite enterprise customer representing mid-market manufacturers.

    '
