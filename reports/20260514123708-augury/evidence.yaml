  - type: conflicting-data
    severity: material
    topic: PdM market boundary and CAGR consensus
    missingEvidence: >-
      No analyst has published a reconciliation of the four major PdM market reports (MarketsandMarkets, Mordor, Grand
      View Research, Allied Market Research) into a single normalized TAM with consistent boundary definitions. The CAGR
      range of 11%-34% reflects genuine scope differences but makes it impossible to state a defensible single TAM
      without choosing a boundary. Post-2024 updates to Grand View Research (base year 2022) are not yet available in
      the public record.
    whyItMatters: >-
      Market sizing is used in valuation models and TAM expansion narratives. A 10x spread in analyst estimates creates
      material uncertainty for investment underwriting and makes Augury's market narrative dependent on which analyst
      source is cited. Freshness of estimates also matters as AI adoption has accelerated since 2022.
    diligencePath: >-
      Commission or license a single-vendor analyst briefing that normalizes scope definitions. Compare Augury's stated
      market to both narrow and broad definitions and document the resulting SAM in both scenarios.
    relatedQuestionRefs:
      - QM014
      - QM015
  - type: missing-source
    severity: minor
    topic: PdM market penetration rate among Fortune 500
    missingEvidence: >-
      No independent analyst source quantifies the current PdM market penetration rate among Fortune 500 manufacturers
      as a percentage of the addressable opportunity. Augury discloses 20+ Fortune 500 customers (~10% penetration) but
      the total PdM-eligible Fortune 500 count and the competitive install base are not publicly documented.
    whyItMatters: >-
      Penetration rate informs ceiling analysis: if 10% of the Fortune 500 already uses Augury and the market is near
      saturation in this segment, TAM expansion logic must rely on new verticals, geography, or the Production Health
      upsell rather than new logo acquisition.
    diligencePath: >-
      Survey or license analyst data on PdM adoption rates among Fortune 500 industrial manufacturers. Ask Augury to
      disclose total Fortune 500 penetration within its target vertical mix vs. the competitive installed base.
    relatedQuestionRefs:
      - QM026
  - type: missing-source
    severity: material
    topic: Production Health as an independent analyst-defined market category
    missingEvidence: >-
      No independent analyst firm (Gartner, Forrester, Verdantix, IDC, McKinsey) has published a report defining and
      sizing Production Health as a distinct market category separate from predictive maintenance or industrial AI.
      Augury's Production Health framing is entirely company-originated. Some third-party evidence of the concept exists
      (Bloomberg AI factories coverage, MIT manufacturing research) but not in structured market-sizing form. Regulatory
      mandates specifically referencing AI-driven process health for 2026-2027 have also not been publicly catalogued.
    whyItMatters: >-
      If Production Health is purely a company-defined category with no independent analyst validation, Augury's TAM
      expansion narrative rests on a proprietary framing that buyers and investors must accept on faith. Independent
      category definition is critical to avoid reversion to the narrower, lower-CAGR PdM TAM in competitive comparisons
      and fundraising materials.
    diligencePath: >-
      Identify whether Gartner, Forrester, or IDC covers the Production Health / AI manufacturing operations category in
      2025-2026 research. Request Augury's evidence base for the Production Health category definition, including any
      third-party validation. Monitor Verdantix and McKinsey for publications on the Production Health or Industrial AI
      Operations category.
    relatedQuestionRefs:
      - QM027
      - QM029
  - type: missing-source
    severity: minor
    topic: Competitive comparison within Verdantix Green Quadrant
    missingEvidence: >-
      The Verdantix Green Quadrant Industrial AI Analytics 2025 report is behind a paywall; the public blog post
      confirms Augury as a Leader but does not disclose the comparative scoring, methodology, or how Augury ranks
      against other Leaders (Aspentech, Emerson, ABB, Rockwell Automation, etc.). A full competitive positioning
