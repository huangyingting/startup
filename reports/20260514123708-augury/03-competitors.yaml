  evidenceGaps:
  - type: missing-source
    severity: material
    topic: Competitor head-to-head benchmark data against Augury
    missingEvidence: >-
      No independent third-party benchmark study compares Augury's failure detection accuracy (99.9% claimed)
      against C3.ai, Fluke Reliability (Azima DLI), or AspenTech MTell on the same equipment and failure
      mode dataset. Augury's accuracy claim is corroborated only by investor Lightrock (a company insider)
      and the Forrester TEI study (a composite customer model, not a controlled benchmark). No competitor
      has published equivalent accuracy claims using a comparable methodology.
    whyItMatters: >-
      Without a head-to-head benchmark, the 99.9% accuracy claim cannot be independently validated relative
      to competitors. Investors and enterprise buyers cannot determine whether Augury's accuracy advantage
      is real, material, and durable or whether it reflects cherry-picked operating conditions.
    diligencePath: >-
      Commission an independent technical evaluation comparing Augury, C3.ai Reliability, and Fluke Reliability
      Azima DLI on a common set of rotating equipment failure modes. Alternatively, request Augury's full
      methodology disclosure for the 99.9% accuracy claim, including test set, equipment types, failure modes,
      and comparison baseline.
    relatedQuestionRefs:
    - QP012

  - type: missing-source
    severity: material
    topic: Customer churn and competitive displacement evidence
    missingEvidence: >-
      No public evidence of documented cases where a manufacturer switched from Augury to a competitor
      (or chose a competitor over Augury in a head-to-head evaluation). Augury does not disclose customer
      retention rates, net revenue retention (NRR), or win/loss statistics. The absence of adverse
      competitive evidence may reflect information unavailability rather than absence of churn.
    whyItMatters: >-
      Customer retention and win/loss data are critical for assessing whether Augury's competitive
      differentiation translates to durable customer relationships. High churn or frequent losses to
      incumbents would undermine the moat narrative. The managed-service model theoretically creates
      high switching costs, but this cannot be verified without retention data.
    diligencePath: >-
      Request Augury's historical NRR, gross retention rate, and customer churn data segmented by
      customer size and deployment stage. Ask for win/loss analysis from the last 12 months identifying
      which competitors appear in competitive deals and win rates by competitor.
    relatedQuestionRefs:
    - QP011
    - QP020

  - type: missing-source
    severity: minor
    topic: Pricing transparency for Augury and key competitors
    missingEvidence: >-
      No vendor in the enterprise predictive maintenance segment (Augury, C3.ai, Cognite, AspenTech, IBM Maximo)
      publishes list pricing for its platform. The Forrester TEI composite assumptions provide partial
      cost information for a large enterprise customer, but per-machine or per-site pricing benchmarks
      are unavailable from public sources. This makes it impossible to assess Augury's pricing competitiveness
      relative to incumbents from publicly available information alone.
    whyItMatters: >-
      Without pricing data, investors cannot assess whether Augury's 5-20x ROI claim justifies a pricing
      premium over lower-cost alternatives, or whether customers can achieve similar ROI by assembling
      point-solution competitors at a lower total cost of ownership. Pricing transparency also affects
      the assessment of Augury's gross margin and SaaS model quality.
    diligencePath: >-
      Request Augury's average contract value (ACV), expansion ARR by cohort year, and illustrative
      pricing tier structure in a diligence conversation. Compare to Fluke Reliability's publicly quoted
      eMaint CMMS pricing as a floor reference for comparable workflow management products.
    relatedQuestionRefs:
    - QP013

  - type: private-evidence-only
    severity: minor
    topic: Verdantix Green Quadrant full competitive scoring detail
    missingEvidence: >-
      The Verdantix Green Quadrant Industrial AI Analytics Software 2025 full report is paywalled.
      The public blog post confirms Augury's Leader position and the 9-of-19 Leader count, but does not
      disclose the detailed scoring methodology, Augury's position relative to other Leaders on innovation
      and market impact axes, or specific capability assessments for each of the 19 vendors evaluated.
    whyItMatters: >-
      Augury's Leader status is meaningful, but its relative position within the Leader quadrant—and
      whether it leads or trails other Leaders on the specific axes Verdantix uses—is not publicly
      accessible. A company may be a Leader but trailing on innovation or market impact relative to
      AspenTech or Emerson, which would color the competitive moat assessment.
    diligencePath: >-
      License the Verdantix Green Quadrant Industrial AI Analytics Software 2025 full report and map
      Augury's specific position on the innovation and market impact axes relative to all 9 Leaders
      and to the next-tier vendors. Compare the axes on which Augury leads against its stated
      differentiation claims.
    relatedQuestionRefs:
    - QP002
    - QP027