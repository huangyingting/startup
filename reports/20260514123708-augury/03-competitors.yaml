- id: TP003
  title: Pricing / packaging comparison
  columns:
  - Vendor
  - Pricing Model
  - Unit / Contract Structure
  - Publicly Available Pricing
  - Known Capabilities Included
  - Implication for Buyers
  rows:
  - - Augury
    - Subscription SaaS + sensor hardware
    - Per-machine or per-site; multi-year enterprise contract; hardware amortized or bundled
    - "Not public; enterprise negotiated; Forrester composite: large mfg ~$3-7M/yr est."
    - Sensors + cloud AI + managed reliability service + Process Health add-on
    - High upfront commitment justified by 310% ROI in TEI study; payback <6 months
  - - C3.ai
    - SaaS subscription per application
    - Per-application per-user or enterprise license; typically 1-3 year contracts
    - Not public; enterprise negotiated; reported contracts $5-50M range for Fortune 500
    - AI application suite; reliability is one module of 12+ applications
    - Enterprise deals may bundle multiple AI applications; reliability is not standalone focus
  - - Cognite
    - Platform subscription + implementation
    - Per-asset or per-site; data volume and user licensing; annual contract
    - Not public; estimated $500K-$5M/yr for large enterprise deployments
    - Industrial data ops platform; integrations; AI model deployment
    - Significant implementation investment required; time-to-value 7 weeks per company claim
  - - Fluke Reliability
    - Hardware + SaaS subscription
    - Sensor hardware purchase/lease + eMaint SaaS annual subscription
    - eMaint starts ~$33-55/user/month (publicly quoted for SMB tier)
    - CMMS (eMaint) + vibration hardware (Prüftechnik) + AI analysis (Azima DLI)
    - Most accessible entry price for SMB; enterprise pricing not public; hardware separate cost
  - - IBM Maximo
    - Enterprise software license or SaaS subscription
    - Per-user or asset-based; typically 3-5 year enterprise agreements with IBM
    - IBM does not publish Maximo pricing; enterprise deals $500K-$10M+
    - EAM platform + APM module + AI inspection; no sensor hardware included
    - Maximo is EAM system of record; AI monitoring requires additional sensor investments
  - - AspenTech
    - Enterprise software license
    - Per-site or enterprise license; typically 3-5 year contracts with Emerson alignment
    - Not public; enterprise pricing; AspenTech historically $500K-$5M+ for large deployments
    - Process engineering + APC + APM software stack; no hardware
    - Strong ROI in process optimization; less clear in rotating equipment PdM specifically
  - - Samsara
    - SaaS subscription per asset
    - Per-device or per-vehicle subscription; annual contract; SMB to enterprise
    - Published pricing from ~$27-45/vehicle/month for fleet; equipment tier varies
    - Fleet telematics + equipment tracking + preventive maintenance alerts
    - Accessible fleet-monitoring pricing; factory PdM requires additional integrations
  - - Status Quo / Manual PdM
    - Internal labor + handheld analyzer cost
    - "Vibration analyzer: $3-15K hardware; route-based technician labor $80-150K/yr/person"
    - Publicly available (hardware catalogs); labor costs vary by region
    - Route-based quarterly/monthly vibration routes; no continuous monitoring
    - Low apparent cost but high missed-failure cost; scales poorly across large fleets
  notes: >-
    Pricing data for Augury, C3.ai, Cognite, IBM Maximo, and AspenTech is not publicly available; estimates are
    derived from publicly reported contract announcements, industry benchmarks, and Forrester TEI composite
    assumptions. Fluke Reliability eMaint pricing is from SMB-tier public quotes; enterprise pricing is
    negotiated. Samsara fleet pricing is from published website tiers. All enterprise pricing should be
    independently verified through vendor RFP processes. Status Quo row represents total cost of ownership
    for manual vibration analysis programs without continuous monitoring.
  claimRefs:
  - CP001
  - CP002
  - CP006
  - CP015
  - CP021
  - CP023
  - CP028

- id: TP004
  title: Moat durability / competitive risk register
  columns:
  - Moat Claim
  - Primary Threat
  - Severity
  - Timeline
  - Mitigation / Diligence Ask
  rows:
  - - Proprietary dataset (1.1B+ hr, 300K+ machines)
    - Competitors accumulate data over time; synthetic data generation reduces disadvantage
    - Medium
    - 3-5 years
    - Track competitor dataset growth; assess whether foundation models for time-series can replicate dataset advantages
  - - 99.9% failure detection accuracy
    - Competitor accuracy claims converging; C3.ai claims 50% downtime reduction at scale
    - Medium
    - 2-4 years
    - Obtain independent third-party benchmark study comparing Augury vs. C3.ai vs. Fluke detection accuracy
  - - Edge-AI sensing hardware (Halo R4000)
    - Other OT vendors (ABB, Siemens, Fluke) have sensor hardware; edge AI is replicable
    - Low-Medium
    - 2-3 years
    - Monitor Fluke Prüftechnik and ABB hardware roadmap for edge-AI sensor capability
  - - Managed service / embedded reliability experts
    - Talent scarcity limits this moat; competitors can acquire or hire reliability experts
    - Low
    - 3-5 years
    - Assess Augury's reliability engineer headcount growth and retention; ask for NPS data
  - - Production Health (machine + process combined)
    - No competitor currently matches; but AspenTech + Emerson APC + APM bundle approaches this
    - Medium
    - 2-4 years
    - Monitor AspenTech-Emerson combined roadmap for process optimization + machine health convergence
  - - Fortune 500 customer switching cost
    - Switching cost real but not permanent; new sites don't have switching cost
    - Medium
    - Ongoing
    - Analyze customer retention rates, net expansion revenue, multi-site rollout velocity
  notes: >-
    Severity classifications are based on public competitive intelligence and publicly available vendor roadmaps.
    "Blocking" severity threats would require immediate strategic response; "Medium" threats require monitoring
    and strategic hedging; "Low" threats are manageable within current competitive positioning. Timeline
    estimates reflect the period over which the threat could materially erode the identified moat.
  claimRefs:
  - CP001
  - CP004
  - CP010
  - CP013
  - CP015
  - CP025

