  - id: valuation-multiples-methodology
    title: Valuation Multiples and Methodology
    body: >
      Three complementary methodologies are applied to triangulate Augury's valuation: (1) ARR multiple benchmarking
      against public industrial software and AI SaaS peers; (2) bottom-up customer value analysis anchored on the
      Forrester TEI; and (3) market penetration analysis benchmarked against the AI-driven predictive maintenance
      market growth curve.

      The primary methodology—ARR multiple—requires an ARR estimate, which Augury does not publicly disclose. The
      analysis uses three ARR scenarios derived from the company's stated five-fold revenue growth since 2021 and
      the pattern of tripling $1M+ ACV accounts. If Augury's 2021 ARR was approximately $15–20M (consistent with
      a pre-unicorn industrial SaaS company at Series E), the five-fold growth implies a 2025 ARR of $75–100M.
      If the 2021 baseline was lower (~$10M), the current ARR would be $50M. These scenarios produce implied
      EV/ARR multiples of 10x ($100M ARR), 13.3x ($75M ARR), and 20x ($50M ARR) at the $1B+ mark. Comparable
      industrial software companies at high-growth stages justify 12–18x ARR, suggesting $75–83M is the break-
      even ARR to render the valuation neutral versus peers.

      The bottom-up customer value methodology yields a theoretical upper bound: 170 customers × $20.1M Forrester
      NPV per composite customer = $3.42B fleet NPV. At a 5x revenue capture rate applied to the annualised
      customer value, this implies $684M in sustainable revenue potential—suggesting the current valuation
      is a significant discount to long-run customer fleet value if the Forrester composite is representative.
      However, the composite customer in the Forrester study is a $20B-revenue manufacturer—larger than most
      of Augury's 170+ customers—so downward adjustment is warranted.

      The market penetration approach uses MarketsandMarkets' AI-driven PdM market forecast of $2.61B in 2026
      growing at 39.5% CAGR to $19.27B by 2032. Augury's competitive leadership position (Verdantix Green
      Quadrant Leader 2025) and 170+ customer base imply it captures 2–5% of the current AI-PdM market or
      a $52–130M revenue run rate in 2026 if market share estimates are accurate, broadly consistent with
      the $50–100M ARR range derived from the revenue-growth approach. At a 10–15x EV/Revenue multiple on
      a $70–100M 2026 ARR, the valuation range is $700M–$1.5B, with the current $1B+ mark sitting at the
      upper midpoint of this distribution.

      SaaS quality benchmarks are not evaluable without NRR, gross margin, or burn rate disclosures. The
      Rule of 40 (growth rate + EBITDA margin ≥40%) and Bessemer efficiency score cannot be computed from
      public data. The absence of these benchmarks is itself a downside risk factor: investors cannot
      confirm whether Augury meets the quality thresholds that justify a premium multiple.
