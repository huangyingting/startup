  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: Augury ARR and revenue are not publicly disclosed
      missingEvidence: >
        Augury has not published absolute ARR, quarterly revenue, annual revenue, or revenue by product
        line in any public filing or announcement. The five-fold growth claim lacks a confirmed baseline,
        making absolute ARR estimation unreliable and rendering valuation multiples speculative.
      whyItMatters: >
        ARR is the foundational input for all EV/ARR multiple analysis. Without confirmed ARR, the $1B+
        valuation cannot be independently stress-tested against peer multiples. Every scenario in TV003
        is contingent on unverified ARR assumptions.
      diligencePath: >
        Request audited financial statements or management accounts with trailing four quarters of revenue,
        ARR by product line, and deferred revenue schedule. Confirm with CFO at data-room management meeting.
      relatedQuestionRefs:
        - QV002
        - QV009
        - QV013
        - QV022
      relatedTableRefs:
        - TV002
        - TV003
        - TV004

    - type: private-evidence-only
      severity: critical
      topic: Net revenue retention (NRR) is undisclosed
      missingEvidence: >
        Augury has not disclosed NRR, gross revenue retention, cohort expansion rates, or logo churn.
        The tripling of $1M+ ACV accounts is a growth proxy but not a verified retention metric.
      whyItMatters: >
        NRR is the single most important SaaS quality metric for underwriting valuation multiples. A
        premium multiple requires NRR ≥110%; an NRR below 100% would materially compress the supportable
        EV/ARR multiple and shift the valuation toward the bear case.
      diligencePath: >
        Request annual cohort NRR table, gross revenue retention by year, and logo churn rate for
        FY2022 through FY2025 from the data room.
      relatedQuestionRefs:
        - QV024
        - QV029
      relatedTableRefs:
        - TV004

    - type: private-evidence-only
      severity: high
      topic: Gross margin by product segment is undisclosed
      missingEvidence: >
        Augury's blended gross margin—and the breakdown between software, hardware, and managed services—
        has not been disclosed. The hardware and managed-service components are expected to compress
        margin below pure-SaaS peers.
      whyItMatters: >
        Gross margin profile determines whether the SaaS valuation multiple is justified. A blended
        margin below 60% would apply downward pressure on acceptable EV/ARR multiples.
      diligencePath: >
        Request segment-level P&L showing software, hardware, and services gross margin separately.
        Compare to industrial IoT-SaaS benchmarks (55–70% blended, ≥75% software-only).
      relatedQuestionRefs:
        - QV026
      relatedTableRefs:
        - TV004

    - type: private-evidence-only
      severity: high
      topic: Burn rate and runway are undisclosed
      missingEvidence: >
        Monthly cash burn, total cash balance after Series F close, and projected runway are not disclosed.
        Without these, the adequacy of the $75M raise and near-term capital needs cannot be assessed.
      whyItMatters: >
        High burn relative to the Series F raise creates dilution risk and reduces investor leverage in
        future rounds. A sub-24-month runway at current burn would be a material concern for the $1B+ mark.
      diligencePath: >
        Request monthly burn rate, 12-month cash flow statement, current cash balance, and operating plan.
        Confirm Series F close date and disbursement schedule.
      relatedQuestionRefs:
        - QV028
      relatedTableRefs:
        - TV006

    - type: missing-source
      severity: medium
      topic: Secondary market transactions or alternative valuation marks are not available
      missingEvidence: >
        No secondary transaction data, tender offer prices, or third-party valuation marks for Augury
        equity have been identified in public sources. Without secondary data, the $1B+ mark represents
        solely the primary round negotiated price.
      whyItMatters: >
        Secondary market prices often discount primary round marks by 10–40%; absence of secondary data
        means there is no independent market-clearing price to validate the Series F mark.
