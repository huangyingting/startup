chapter:
  number: 8
  title: Valuation
  summary: >
    Augury's $1B+ valuation established in its February 2025 Series F is analytically supportable but contingent on
    an unverified ARR range of $60–100M and continued 25–35% annual growth. The headline valuation is stretched
    relative to the company's disclosed traction proxies and represents a 33% compression from the $1.5B Series E
    peak set in October 2021—a contraction driven by the 2022–2023 private-market reset rather than company-specific
    underperformance. Public comparable analysis places Augury's implied EV/ARR multiple at 10–20x depending on
    assumed revenue base, within the 8–20x range for profitable or high-growth industrial software peers. Key upside
    drivers are the 39.5% CAGR AI-driven predictive maintenance market, the independently validated Forrester TEI
    (310% ROI, $20.1M NPV per composite customer), and the tripling of $1M+ ACV accounts. Downside risks are
    concentrated around financial opacity (ARR, gross margin, and NRR undisclosed), competitive pressure from
    well-capitalised incumbents, and the absence of a near-term IPO catalyst. Verdict: TRACK with a conditional
    INVEST if ARR ≥$60M, NRR ≥110%, and gross margin ≥60% are confirmed in due diligence.

