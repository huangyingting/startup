  - id: investment-recommendation-verdict
    title: Investment Recommendation and Verdict
    body: >
      Investment stance: TRACK / CONDITIONAL INVEST. The current $1B+ valuation is analytically defensible in
      the base case but carries meaningful bear-case downside that cannot be resolved from public data alone.
      The fundamental constraint is financial opacity: Augury has disclosed no ARR, NRR, gross margin, burn
      rate, or cap-table detail. Every positive indicator—five-fold revenue growth, tripled $1M+ accounts,
      Forrester TEI 310% ROI—is company-supplied and unaudited. Without these, a conviction investment at
      $1B+ is speculative rather than evidence-based.

      The five positives that support a conditional investment thesis are: (1) Independently validated customer
      ROI (Forrester TEI) that is measurably superior to pilot-stage AI deployments; (2) verifiable Fortune 500
      anchor customers (PepsiCo, DuPont, Colgate-Palmolive confirmed by name) providing referenceable revenue;
      (3) category leadership independently validated by Verdantix Green Quadrant 2025; (4) a high-quality
      investor syndicate (Insight Partners, Lightrock, SE Ventures, Qualcomm Ventures) whose continued
      participation in Series F at $1B+ signals internal confidence in the growth trajectory; and (5) a
      structural tailwind from the 39.5% CAGR AI-driven PdM market that is expanding the total addressable
      market faster than most industrial software categories.

      The five risks that constrain the verdict to CONDITIONAL are: (1) The valuation compressed 33% from
      the 2021 Series E peak, raising questions about whether the 5x revenue growth outpaced or lagged original
      projections; (2) zero financial transparency—no ARR, NRR, gross margin, or profitability timeline—makes
      independent underwriting impossible; (3) well-capitalised OT incumbents (Siemens, ABB, Honeywell, Emerson)
      are building native AI into existing hardware stacks, threatening to commoditise Augury's core machine-
      diagnostics functionality; (4) C3.ai's 2.26x EV/Revenue trading multiple provides a cautionary precedent
      for industrial AI platforms that fail to demonstrate durable growth and a path to profitability; and (5)
      no IPO or M&A exit catalyst is visible, limiting near-term liquidity for Series-stage investors.

      The conditions for upgrading to INVEST are: (1) ARR ≥$60M confirmed from audited financials; (2) NRR
      ≥110% evidenced in customer cohort data; (3) gross margin ≥60% confirming scalable SaaS economics;
      (4) burn rate consistent with ≥24 months runway from Series F proceeds; and (5) a credible 24-month
      path to either profitability or IPO readiness. These conditions can only be verified through data-room
      access and management diligence.
