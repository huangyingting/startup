  researchQuestions:
  - id: QU001
    question: How many total customers does Augury have and in how many countries does it operate as of 2026?
    type: quantification
    targets:
      - contentRequirements/0
      - contentRequirements/1
    status: answered
    answer: >
      Augury serves 170+ global manufacturing customers in 40+ countries as of February 2025 (Series F
      announcement). The company's homepage and customer page both confirm these figures, and the
      Lightrock portfolio page corroborates the blue-chip global customer base.

  - id: QU002
    question: How many Fortune 500 companies use Augury and what percentage of the Fortune 500 does that represent?
    type: quantification
    targets:
      - contentRequirements/0
    status: answered
    answer: >
      More than 20 Fortune 500 companies use Augury, representing approximately 10% of the entire Fortune 500,
      per Augury's customer page and Series F press release. This figure has tripled since the 2021 Series E round.

  - id: QU003
    question: How has Augury's Fortune 500 customer count changed since 2021 and what does this indicate about enterprise momentum?
    type: quantification
    targets:
      - contentRequirements/1
    status: answered
    answer: >
      Fortune 500 customer count has tripled since 2021 per the February 2025 Series F press release.
      Separately, accounts with $1M+ ACV have also tripled. These twin tripling metrics indicate strong
      enterprise account growth, both in logo count and deal size, over the four-year period.

  - id: QU004
    question: How many machines has Augury monitored and how many machine-hours of data has it accumulated?
    type: quantification
    targets:
      - contentRequirements/1
    status: answered
    answer: >
      Augury has diagnosed 300,000+ machines and accumulated 1.1 billion+ hours of machine data as of
      early 2025. These figures appear on the company's homepage and are cited in funding communications.

  - id: QU005
    question: What does Augury's "saves a machine every 43 minutes" claim mean and how is it calculated?
    type: verification
    targets:
      - contentRequirements/1
    status: partial
    answer: >
      The 43-minute figure represents the aggregate rate at which Augury detects or prevents machine
      failures across its entire installed base of 300,000+ machines. The specific calculation methodology
      is not publicly documented.

  - id: QU006
    question: How has Augury's count of $1M+ annual contract value accounts changed since 2021?
    type: quantification
    targets:
      - contentRequirements/1
    status: answered
    answer: >
      The number of Augury customer accounts with $1M+ ACV has tripled since the 2021 Series E round,
      per the February 2025 Series F press release. This indicates successful enterprise deal expansion
      alongside the tripling in Fortune 500 logo count.

  - id: QU007
    question: What manufacturing verticals does Augury serve and which are most prominent?
    type: enumeration
    targets:
      - contentRequirements/0
    status: answered
    answer: >
      Augury serves 10+ verticals. The most prominent are food & beverage (largest, per Forrester TEI
      case and named customers PepsiCo/General Mills/Heineken), CPG (Colgate-Palmolive, Nefco Biosolids),
      chemicals (DuPont), and building materials (Fortune Brands). Also served: paper, forest products,
      plastics, pharmaceuticals, and energy.

  - id: QU008
    question: >
      Which named Fortune 500 or global manufacturers are publicly confirmed Augury customers as of 2026?
    type: enumeration
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      Named customers confirmed in official Augury communications: PepsiCo, DuPont, Colgate-Palmolive,
      General Mills, Heineken (Series F press release), Fortune Brands Innovations/Fiberon (May 2025 press
      release). Named in testimonials: Circulus (CEO Mike Dulin), Nefco Biosolids (Bill Hollman), and
      Sanjay Rajput's employer. The full 170+ customer roster is not public.

  - id: QU009
    question: >
      What were the specific ROI outcomes achieved by Fortune Brands Innovations at Fiberon?
    type: verification
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      Fortune Brands Innovations' Fiberon facility achieved 2.5x ROI within eight months of connecting
      40 machines to Augury's Machine Health solution. A specific early win was preventing a catastrophic
      melt-pump failure. This pilot result triggered a 12-month enterprise-wide rollout to 1,000+ machines
      at 16 sites.

  - id: QU010
    question: >
      How quickly has Fortune Brands Innovations rolled out Augury across its enterprise operations?
    type: verification
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      Using Augury's Fast Track methodology, Fortune Brands deployed across two-thirds of 1,000 targeted
      machines (approximately 667 machines) across 16 sites in U.S., UK, and Mexico within the first six
      months of a 12-month enterprise rollout program.

  - id: QU011
    question: >
      What specific operational outcomes have Augury customers documented, such as uptime improvements,
      product savings, or downtime avoided?
    type: verification
    targets:
      - contentRequirements/2
      - contentRequirements/3
    status: answered
    answer: >
      Key documented outcomes: (1) Anonymous F&B manufacturer via Forrester avoided 10,000 hours of
      unplanned downtime, recovering 25M+ lbs of product over 3 years. (2) Circulus (Mike Dulin, CEO)
      improved uptime from 65-70% to 85-90%. (3) Fortune Brands Innovations achieved 2.5x ROI in 8
      months from a melt-pump failure prevention. (4) Forrester composite: $16.8M downtime savings,
      15% maintenance cost reduction, 5% throughput increase over 3 years.

  - id: QU012
    question: How accurate are Augury's machine failure predictions in practice according to customer reports?
    type: verification
    targets:
      - contentRequirements/2
    status: partial
    answer: >
      One tissue manufacturer customer claims 100% accuracy in predictions with zero misses. Augury's
      company-stated figure is 99.9% detection accuracy. Neither claim has been independently audited
      at a population level beyond Forrester's qualitative TEI validation.

  - id: QU013
    question: What does the Forrester TEI study say about Augury customer ROI, NPV, and payback?
    type: quantification
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      Forrester TEI (July 2025, published September 2025): 310% 3-year ROI; $20.1M NPV; payback in <6
      months; for a composite large manufacturer ($20B revenue). Key drivers: $16.8M downtime savings,
      $7.5M throughput profit, $1.5M maintenance savings over 3 years.

  - id: QU014
    question: How much do Augury customers save in unplanned downtime costs according to the Forrester study?
    type: quantification
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      The Forrester TEI composite customer saved $16.8 million over three years from reduced unplanned
      downtime by implementing Augury's Machine Health monitoring to proactively address equipment issues.

  - id: QU015
    question: What are the maintenance cost reduction and throughput improvement outcomes in the Forrester study?
    type: quantification
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      Maintenance spend reduction: 15% ($1.5M over 3 years) from shift to proactive maintenance and
      resource optimization. Throughput increase: 5% incremental, generating $7.5M in additional profit
      over 3 years by reducing production bottlenecks and inefficiencies.

  - id: QU016
    question: What process health outcomes (waste reduction, energy efficiency) do Augury customers achieve?
    type: quantification
    targets:
      - contentRequirements/2
    status: partial
    answer: >
      Company-claimed Process Health outcomes: up to 37% process waste reduction and 2% energy efficiency
      gain per plant (Series F press release). The Forrester TEI study focuses on Machine Health; Process
      Health quantification is less independently validated in public sources.

  - id: QU017
    question: How much cumulative value has Augury generated for its customers in total?
    type: quantification
    targets:
      - contentRequirements/2
    status: partial
    answer: >
      Augury estimates $1 billion in cumulative customer value generated as of early 2025 (Series F press
      release). The methodology for this estimate is not disclosed.

  - id: QU018
    question: >
      What strategic partnerships has Augury established to extend its customer reach?
    type: enumeration
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      Key partnerships: (1) MaintainX (March 2026) - CMMS integration connecting Augury AI alerts to work
      orders. (2) Fortune Brands Innovations (May 2025) - flagship reference customer with 16-site rollout
      featured in Bloomberg Originals. (3) Investor partners Lightrock, Insight Partners, SE Ventures,
      Qualcomm Ventures provide network access. (4) Verdantix Leader recognition (2025) drives procurement
      shortlists.

  - id: QU019
    question: How does Verdantix's Green Quadrant Leader recognition affect Augury's customer acquisition?
    type: mechanism
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      Verdantix's Leader designation positions Augury favorably in enterprise vendor evaluations where
      procurement teams use analyst reports to shortlist vendors. Being one of 9 of 19 vendors with Leader
      status is a meaningful differentiator. While the specific win-rate impact is not publicly quantified,
      the recognition directly reduces procurement risk and friction in enterprise sales cycles.

  - id: QU020
    question: Does Augury publicly disclose net revenue retention (NRR) or customer churn rates?
    type: adverse
    targets:
      - contentRequirements/3
    status: answered
    answer: >
      No. Augury does not disclose NRR, GRR, or customer churn rates in any accessible public source.
      This is a significant gap relative to enterprise SaaS disclosure norms and must be addressed through
      direct management inquiry and data room access during due diligence.

  - id: QU021
    question: >
      Are there unhappy customers or public complaints about Augury's product reliability, implementation
      difficulty, or support quality?
    type: adverse
    targets:
      - contentRequirements/3
    status: partial
    answer: >
      No negative reviews were accessible during research (G2 blocked, Capterra snapshot unavailable,
      TrustRadius and company testimonials uniformly positive). The absence of accessible negative reviews
      creates survivorship bias risk; this does not mean no unhappy customers exist. Due diligence must
      include direct customer reference calls outside Augury's provided reference list.

  - id: QU022
    question: >
      Does Augury have meaningful customer concentration risk given 170+ customers at a $1B+ valuation?
    type: adverse
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      Yes. With 170+ customers at a $1B+ valuation, implied revenue-per-customer is high (likely $500K-
      $2M+ ACV median for $1M+ ACV accounts). This creates meaningful concentration risk where the
      top 10-20 accounts may represent 40-60% of ARR. This risk is not quantifiable without revenue
      disclosure but is structurally inherent in the enterprise-focused model.

  - id: QU023
    question: >
      What sector concentration risks does Augury face from reliance on food, beverage, and CPG customers?
    type: adverse
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      Food & beverage and CPG likely represent 50-60% of Augury's customer base. Both sectors have
      cyclical capex patterns - downturns lead to deferred maintenance technology investments. A severe
      F&B capex cycle (as occurred in 2015-2016 and 2020) could materially impact Augury's new customer
      acquisition rate and renewal decisions.

  - id: QU024
    question: >
      How long are typical enterprise sales cycles for Augury and what revenue risk does this create?
    type: mechanism
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      Enterprise predictive maintenance sales cycles are 6-18 months due to multi-stakeholder sign-off
      across reliability, IT, finance, and operations. This creates: (1) revenue lumpiness in any given
      quarter, (2) sensitivity to budget freezes or personnel changes during the sales cycle, and (3)
      growth dependent on a relatively small pipeline of large deals.

  - id: QU025
    question: >
      How does Augury drive cultural adoption of predictive maintenance within customer organizations?
    type: mechanism
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      Customer testimonials (Nefco Biosolids, Circulus) indicate deep cultural adoption with Augury
      described as a culture rather than a program. The Forrester TEI study cites workforce upskilling
      and employee productivity as non-quantified benefits. Augury's Fast Track methodology compresses
      enterprise rollout timelines, reducing the window for adoption resistance. Cultural stickiness
      increases switching costs and contributes to retention.

  - id: QU026
    question: >
      What is the evidence that Augury's customer ROI claims are representative across the full 170+ customer
      base rather than best-case outcomes?
    type: verification
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      The Forrester TEI is based on a composite of interviewed customers and uses conservative assumptions
      per standard Forrester methodology. The 5-20x ROI range is wide, suggesting significant variance.
      Fortune Brands (2.5x in 8 months) and the anonymous F&B examples are consistent with the Forrester
      finding. Deployment size, vertical, and change management capability likely drive significant outcome
      variation - best-case selection bias in public testimonials cannot be ruled out.

  - id: QU027
    question: >
      What is the typical Augury deployment size and minimum viable contract for enterprise customers?
    type: quantification
    targets:
      - contentRequirements/0
      - contentRequirements/4
    status: answered
    answer: >
      Fortune Brands pilot started with 40 machines; enterprise rollout is 1,000 machines at 16 sites.
      The company's 300K+ machines across 170+ customers implies approximately 1,765 machines per customer
      on average. Minimum contract size and pricing are not publicly disclosed; data room access required.

  - id: QU028
    question: >
      How does Augury's Forrester-validated ROI compare to competitor claims in predictive maintenance?
    type: comparison
    targets:
      - contentRequirements/2
    status: answered
    answer: >
      No equivalent independent TEI or validated ROI study was found for direct Augury competitors
      (Aspentech, C3.ai, SparkCognition, Aveva) in the public record. The Forrester TEI is a comparative
      strength for Augury in competitive procurement situations. Augury's 310% ROI and <6-month payback
      claim is more independently validated than competitor claims found in public sources.

  - id: QU029
    question: >
      What is the evidence that the MaintainX partnership in 2026 meaningfully expands Augury's customer
      acquisition capacity?
    type: verification
    targets:
      - contentRequirements/4
    status: answered
    answer: >
      The MaintainX partnership (March 2026) integration value is logical - connecting AI failure alerts
      directly to CMMS work orders removes friction in the maintenance workflow. MaintainX serves
      thousands of manufacturing sites. The press release URL returned 404 during research; specific joint
      pipeline metrics are not publicly quantified. Partnership is confirmed via MaintainX homepage.

  - id: QU030
    question: >
      Has Augury disclosed plans for expanding into new verticals or customer segments in 2026?
    type: verification
    targets:
      - contentRequirements/0
      - contentRequirements/4
    status: answered
    answer: >
      The Series F press release and CEO commentary reference agentic AI capabilities and broader industrial
      applicability, but specific vertical expansion targets for 2026 beyond current focus areas are not
      detailed in public communications. Current customer base spans 10+ verticals; geographic expansion
      (40+ countries) is more visible than new vertical announcements.


