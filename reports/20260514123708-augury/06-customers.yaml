sections:
  - id: section-U1
    title: Customer Base Overview
    body: >
      As of February 2025, Augury reported 170+ global enterprise manufacturing customers spanning 40+ countries.
      The company's customers are concentrated in asset-intensive sectors: food and beverage (the largest vertical),
      consumer packaged goods (CPG), chemicals, paper and forest products, building materials, plastics, and
      pharmaceuticals. Augury's customer page highlights that over 20 Fortune 500 companies—approximately 10% of
      the entire Fortune 500 index—use Augury solutions, a count that has tripled since the 2021 Series E funding.


      The scale of the customer base extends to more than 300,000 machines diagnosed and over 1.1 billion hours of
      machine data monitored across the installed base. Augury estimates that it saves a machine from failing
      approximately every 43 minutes globally, a metric derived from the aggregate failure-detection rate across
      monitored assets. Since 2021, the number of accounts with $1 million or more in annual contract value has
      also tripled, indicating significant expansion of deal sizes and deeper multi-site enterprise commitments.


      While the absolute customer count of 170+ may appear modest relative to Augury's $1B+ valuation, each
      customer typically represents large multi-site enterprise contracts. The company reports 5–20x ROI for
      customers deploying at scale, with global deployments in North America, Europe, Latin America, and
      Asia-Pacific. The company operates in 10+ manufacturing verticals and targets primarily enterprise
      manufacturers with complex, multi-site operations where predictive maintenance delivers the highest value.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
