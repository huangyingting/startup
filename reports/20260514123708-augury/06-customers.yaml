  - id: section-U2
    title: Key Customer Case Studies
    body: >
      Augury's public customer record includes several named Fortune 500 and global manufacturers across food &
      beverage, consumer goods, and industrial sectors. PepsiCo has been a publicly cited Augury customer using
      machine health monitoring across multiple plants to reduce unplanned downtime and improve equipment
      reliability. DuPont has deployed Augury's AI solutions for equipment reliability in specialty chemicals and
      materials manufacturing operations. Colgate-Palmolive utilizes Augury across consumer goods manufacturing
      facilities, benefiting from predictive maintenance to sustain high-speed packaging and production lines.
      General Mills has leveraged Augury for food manufacturing operations, where unplanned downtime can cause
      significant product loss. Heineken has deployed Augury across multiple beverage manufacturing sites.


      The most detailed publicly available case study is Fortune Brands Innovations (NYSE: FBIN), which published
      results in May 2025. Fortune Brands' Fiberon facility in North Carolina achieved a 2.5x ROI within eight
      months after connecting 40 machines to Augury's AI. The success triggered an enterprise-wide rollout across
      1,000+ machines at 16 sites in the U.S., UK, and Mexico. At the halfway point of a 12-month rollout,
      two-thirds of the 1,000 targeted machines were already connected. Todd Piatt, VP of Global Manufacturing
      Operations, stated that trust in Augury's AI accuracy was "built quickly" and the collaboration provided
      "unparalleled visibility into equipment health." Pat Knox, Machine Health Program Owner, noted that an early
      prevention of a catastrophic melt-pump failure "set the stage for a 2.5 times payback."


      Forrester's qualitative interviews for the TEI study included a global food and beverage manufacturer where
      Augury's Machine Health solution helped avoid approximately 10,000 hours of unplanned downtime over a
      three-year multi-site deployment, recovering over 25 million pounds of product that would otherwise have
      been lost. Additional customer testimonials on Augury's website include references to 100% prediction
      accuracy (a tissue manufacturer), uptime improvements from 65–70% to 85–90% (Circulus CEO Mike Dulin),
      and cultural transformation in how maintenance teams operate (Nefco Biosolids' Bill Hollman).
