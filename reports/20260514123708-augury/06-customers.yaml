  - id: section-U3
    title: Customer Success Metrics and ROI Evidence
    body: >
      The strongest third-party validation of Augury's customer ROI is the Total Economic Impact (TEI) study
      commissioned from Forrester Consulting and published in September 2025 (study conducted July 2025). Forrester
      conducted interviews with Augury customers across varied industries and constructed a composite organization
      profiled as a large U.S.-based manufacturer with $20 billion in annual revenue. Key quantified outcomes from
      the composite include: a 310% three-year return on investment, a net present value (NPV) of $20.1 million,
      payback period of less than six months, $16.8 million in savings from reduced unplanned downtime over three
      years, 15% reduction in maintenance spend ($1.5 million over three years), and a 5% incremental throughput
      increase generating $7.5 million in additional profit.


      Beyond the Forrester study, Augury reports that customers achieve 5–20x ROI when deploying at scale, 37%
      process waste reduction, and 2% energy efficiency gain per manufacturing plant through Process Health
      solutions. The Fortune Brands Innovations case study documents 2.5x ROI in eight months on a pilot of 40
      machines, with an enterprise-wide rollout to 1,000+ machines across 16 sites. The company's homepage cites
      approximately 30 days average time to first machine improvement and a failure prevention every 43 minutes
      across the entire installed base.


      An anonymous CEO from a mining and metals manufacturer stated in the Forrester study: "We had already made
      big improvements, but we were hitting a ceiling; we couldn't control the system tightly enough to reach
      theoretical throughput. With Augury's Process Health, we can now run at higher throughput when sold out,
      lower cost when not, and switch between modes on the fly." A food and beverage technology executive noted
      that employees "truly have someone in their back pocket to go to for answers," citing a significant comfort
      level for frontline workers. These qualitative outcomes supplement the quantitative ROI figures and suggest
      high customer satisfaction among deployed accounts.
    claimRefs:
