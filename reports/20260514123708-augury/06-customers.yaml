  evidenceGaps:
  - type: missing-source
    severity: major
    topic: Net revenue retention (NRR) and customer churn rate
    missingEvidence: >
      Augury does not publicly disclose NRR, GRR, or customer churn rates. These are standard SaaS
      health metrics and their absence makes it impossible to independently assess revenue retention
      quality or quantify the risk of customer loss.
    whyItMatters: >
      Without NRR data, the tripling of Fortune 500 customers and $1M+ accounts could coexist with
      material SME customer churn. NRR is the single most important predictor of revenue predictability
      and growth sustainability for enterprise SaaS companies.
    diligencePath: >
      Request NRR, GRR, cohort retention data, and customer churn analysis by segment and vertical from
      Augury management in the data room. Cross-reference with logo counts in Series E and Series F
      communications to back-calculate implied churn.
    relatedQuestionRefs:
      - QU020
      - QU021
      - QU016
      - QU017

  - type: access-blocked
    severity: minor
    topic: G2 and Capterra third-party user reviews
    missingEvidence: >
      G2 (JavaScript-blocked) and Capterra (wayback snapshot unavailable) profiles for Augury could not
      be accessed during research. Review ratings, review counts, and themes from these platforms are
      not available in this chapter.
    whyItMatters: >
      G2 and Capterra reviews would provide independent user sentiment beyond company-curated testimonials.
      Negative reviews or low ratings on these platforms could indicate product gaps or implementation
      challenges not visible in official communications.
    diligencePath: >
      Access G2 and Capterra reviews directly via browser during due diligence. Request permission to
      share review aggregate data from Augury if NDA-protected. Check Gartner Peer Insights for
      practitioner-level ratings.
    relatedQuestionRefs:
      - QU021
      - QU012

  - type: missing-source
    severity: moderate
    topic: MaintainX partnership specific terms and customer pipeline
    missingEvidence: >
      The Augury–MaintainX partnership (March 2026) press release URL returned 404 during research.
      The specific joint customer pipeline, integration technical details, revenue sharing model, and
      expected incremental customer acquisition from this partnership are not publicly documented.
    whyItMatters: >
      Channel partnerships can significantly accelerate customer acquisition if structured as true joint
      go-to-market relationships. Without details, the partnership's commercial impact cannot be assessed.
    diligencePath: >
      Request the MaintainX partnership agreement, joint pipeline metrics, and integration technical
      documentation from Augury. Review MaintainX's customer base overlap with Augury's target segments.
    relatedQuestionRefs:
      - QU029

  - type: missing-source
    severity: minor
    topic: Individual customer-level case studies for PepsiCo, DuPont, Colgate-Palmolive
    missingEvidence: >
      While PepsiCo, DuPont, and Colgate-Palmolive are named in Augury's Series F press release, no
      public case studies with specific outcome metrics (downtime saved, ROI, machines deployed, sites
      covered) exist for these customers in accessible public sources.
    whyItMatters: >
      The absence of quantified outcomes for Augury's three most recognizable named customers limits
      the ability to validate the breadth of ROI realization across the Fortune 500 customer base.
    diligencePath: >
      Request NDA-protected case study materials for major named customers from Augury. Ask management
      to provide three representative customer references willing to discuss outcomes in due diligence calls.
    relatedQuestionRefs:
      - QU008
      - QU005
    relatedTableRefs:
      - TU001

