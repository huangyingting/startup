  - id: section-U4
    title: Partner and Channel Customer Relationships
    body: >
      Augury has established strategic partnerships that extend customer reach and deepen integration across the
      manufacturing technology stack. The most significant channel partnership is the March 2026 integration with
      MaintainX, a leading CMMS (Computerized Maintenance Management System) and EAM platform that serves
      thousands of manufacturing sites globally. The Augury–MaintainX integration connects Augury's AI-driven
      machine health predictions directly into MaintainX's work order management workflow, enabling maintenance
      teams to automatically generate and assign work orders when Augury detects an impending machine failure. This
      integration creates a bi-directional data flow that eliminates the manual handoff between failure detection
      and maintenance execution, reducing time-to-repair and improving asset utilization.


      Fortune Brands Innovations became a flagship partner-customer in May 2025, having progressed from a
      successful pilot at Fiberon to an enterprise-wide commitment across 16 manufacturing sites. The relationship
      was featured in a Bloomberg Originals episode within the Genbiz Video Series published on May 2, 2025, and
      positions Fortune Brands as a reference customer for Augury's full-stack enterprise deployment methodology.
      The company uses Augury's Fast Track methodology, a structured 12-month enterprise rollout process, enabling
      rapid scaling from pilot to multi-site deployment.


      Verdantix named Augury a Leader in the 2025 Green Quadrant for Industrial AI Analytics Software, one of
      nine vendors out of nineteen evaluated to achieve that distinction. This analyst recognition enhances
      Augury's credibility with prospective customers conducting technology vendor evaluations. Investor partners
      Lightrock and Insight Partners provide portfolio network access, while SE Ventures (Shell) and Qualcomm
      Ventures add energy and semiconductor sector customer relationships. The company maintains integrations
      with leading ERP, DCS, and CMMS platforms, broadening its addressable deployment base.
    claimRefs:
