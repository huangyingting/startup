chapter:
  number: 6
  title: Customers
  summary: >
    Augury serves 170+ global manufacturing customers in 40+ countries, including 20+ Fortune 500 companies
    (approximately 10% of the Fortune 500). Named public customers include PepsiCo, DuPont, Colgate-Palmolive,
    General Mills, Heineken, and Fortune Brands Innovations. An independent Forrester Total Economic Impact
    study (July 2025, published September 2025) validated a 310% three-year ROI, $20.1M NPV, and sub-six-month
    payback for a composite customer. Fortune 500 customer count and $1M+ accounts have each tripled since 2021,
    reflecting strong enterprise momentum. Customer churn, NRR, and the full customer roster remain undisclosed.
    The customer base is heavily concentrated in food & beverage, consumer packaged goods, chemicals, and
    building materials. Partner integrations with MaintainX (March 2026) and Fortune Brands Innovations
    (May 2025) extend Augury's customer reach through ecosystem channels.

