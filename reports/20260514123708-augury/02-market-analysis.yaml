chapter:
  number: 2
  title: Market Analysis
  summary: The industrial predictive maintenance (PdM) market is large, high-growth, and definitionally contested—analyst
    size estimates for 2025-2026 range from ~$14B to ~$18.9B with CAGRs from 11% to 34% depending on how broadly the boundary
    is drawn. Augury competes in the highest-growth tier (AI-driven PdM, CAGR ~39.5%) and has extended its addressable market
    by redefining the category as Production Health, encompassing machine health, process optimization, and agentic manufacturing
    insights. With 170+ enterprise customers including 20+ Fortune 500 manufacturers, third-party-validated 310% ROI, and a
    Verdantix Green Quadrant Leadership position, Augury occupies a premium niche in the upper end of a market where headwinds—OT
    security friction, talent scarcity, and legacy protocol complexity—favor established, trusted vendors over point solutions.
sections:
- id: market-boundary
  title: Market Boundary and Definition
  body: >-
    Predictive maintenance (PdM) is the application of machine learning, IoT condition-monitoring sensors, and cloud analytics
    to detect equipment anomalies and predict failures before they cause unplanned downtime. The market boundary for this
    chapter spans three layers: hardware components (vibration sensors, acoustic detectors, thermal cameras, and edge AI
    devices), software platforms (cloud analytics, digital-twin integrations, CMMS connectors, and AI model orchestration),
    and professional services (implementation, consulting, managed monitoring, and training). Analyst sources apply this
    boundary differently: MarketsandMarkets and Grand View Research size only dedicated PdM solutions; Mordor Intelligence
    and Allied Market Research include adjacent AI-for-operations offerings, producing estimates two to six times larger for
    identical calendar years.


    Excluded from the TAM as defined by primary analyst sources are general ERP maintenance modules without ML/AI capability,
    pure time-based preventive maintenance software, industrial automation control systems (SCADA, DCS), and downstream
    process simulation tools. Status-quo substitutes for PdM include reactive run-to-failure maintenance and scheduled
    preventive maintenance (PM). Both sacrifice either unplanned downtime reduction (reactive) or operational efficiency
    (over-scheduled PM). Augury further expands the served market by branding its platform as Production Health—a category
    it defines to encompass machine health, process health, and AI-agent-driven manufacturing insights—creating a proprietary
    market frame that exceeds traditional PdM in scope and, potentially, in TAM. No independent analyst report has yet
    formally sized the Production Health category as distinct from PdM, making Augury's TAM claim partially reliant on
    company-defined framing.
  claimRefs:
