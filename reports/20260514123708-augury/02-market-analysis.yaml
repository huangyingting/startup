- id: headwinds
  title: Headwinds and Adoption Constraints
  body: >-
    Four primary headwinds constrain PdM adoption velocity. OT cybersecurity concerns represent the most significant
    friction—Mordor Intelligence quantifies this as a 2.8% market headwind. Manufacturers are reluctant to connect
    operational technology (OT) networks to cloud platforms, especially in regulated industries, due to ransomware
    risk, data sovereignty requirements, and the IT/OT convergence complexity. Vendors who demonstrate OT-security
    architecture and air-gap-compatible deployment options have a meaningful competitive advantage.


    Talent scarcity in data science and ML engineering contributes a 1.9% headwind. Many mid-size manufacturers
    lack internal capability to build, tune, and maintain AI models, creating dependency on vendor-managed AI
    services. This paradoxically benefits established vendors like Augury who provide turnkey AI rather than
    platform-only offerings. Legacy industrial protocols—Modbus, OPC-UA, CAN bus—complicate sensor data
    integration and represent a 1.5% headwind; the most capable platforms provide extensive protocol libraries
    and hardware compatibility matrices. Finally, AI model drift requiring continuous retraining adds a 1.2%
    headwind: deployed models degrade over time as process conditions change, and buyers increasingly evaluate
    vendors on continuous learning capability and model update cadence. High upfront hardware and
    implementation costs also present barriers for SME buyers outside Augury's core enterprise segment.
