      - number: '6.3'
        title: 客户成功指标与 ROI 证据
        blocks:
          - type: paragraph
            body: >
              对 Augury 客户 ROI 最强的第三方验证，是 Forrester Consulting 委托完成并于 2025 年 9 月发布的 Total Economic Impact（TEI）研究（研究于 2025
              年 7 月进行）。Forrester 访谈了不同行业的 Augury 客户，并构建了一个综合组织，画像为年收入 $20 billion 的美国大型制造商。该综合组织的关键量化结果包括：310%
              三年投资回报率、$20.1 million 净现值（NPV）、少于 6 个月回本周期、三年内因减少非计划停机节省 $16.8 million、维护支出下降 15%（三年 $1.5
              million），以及产能增量提升 5%、带来 $7.5 million 额外利润。


              除 Forrester 研究外，Augury 称客户规模化部署时可实现 5–20x ROI，通过 Process Health 解决方案把流程浪费降低 37%，并让每座制造工厂能效提升 2%。Fortune
              Brands Innovations 案例研究记录了 40 台机器试点在 8 个月内实现 2.5x ROI，随后全企业部署至 16 个站点的 1,000+ 台机器。公司主页称，平均约 30
              天即可实现首次机器改进，整个已部署基座每 43 分钟避免一次故障。


              Forrester 研究中，一位匿名矿业和金属制造商 CEO 表示：「我们已经做了大量改进，但撞上了天花板；我们无法把系统控制得足够紧，达到理论产能。借助 Augury 的 Process
              Health，售罄时我们现在可以以更高产能运行，未售罄时则以更低成本运行，并能即时切换模式。」一位食品饮料技术高管指出，员工「确实像口袋里多了一个随时可求助的人」，前线员工因此获得显著安心感。这些定性结果补充了量化
              ROI 数字，也显示已部署账户中的客户满意度较高。
