              旗下风险投资部门）和 Qualcomm Ventures 参投。Series F 将 Augury 的估值维持在 $1B+，并非上调估值，反映 2024–2025 年私募市场更广泛的估值纪律。


              标志性的 Series E 于 2021 年 10 月完成，融资 $180M，估值 $1.5B，使 Augury 成为最早一批 Industry 4.0 独角兽之一。该轮由 Insight Partners
