      - number: '8.4'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: >
              三个估值情景基于 ARR、增长率和适用 EV/ARR 倍数的明确假设搭建。情景概率信号来自现有证据的权衡。

              牛市情景假设 Augury 已达到 $100M+ ARR，年同比增长 35–40%；这符合 2021 年 $20M 基线五倍收入扩张的上沿，也由 $1M+ ACV 账户数增长三倍和 Fortune 500
              持续扩张支撑。在 20x EV/ARR 倍数下——该倍数反映投资人给予可验证市场领导地位的高增长 AI-native 工业平台溢价——隐含企业价值为 $2.0–2.5B。这个情景可以实现，但需要确认 ARR
              ≥$100M 且增长率 ≥35%。催化因素：公开 IPO 备案，或 Emerson、Honeywell、ABB 等工业集团发起 M&A 接触，会把估值重定价到这一区间。估计情景概率：25%。

              基准情景假设 ARR 为 $65–80M，增长率 25–30%；这反映收入增长情景的中点，也符合一家 2021 至 2023 年 ARR 翻倍、但企业市场成熟后增长放缓的公司。在 13–15x EV/ARR
              倍数下——与 AspenTech 收购前倍数和工业 SaaS 同业组一致——隐含企业价值为 $845M–$1.2B，覆盖当前 $1B+
              标记。基于现有证据，这是最可能情景，也意味着当前估值大体公允。估计情景概率：50%。

              熊市情景假设 ARR 为 $40–50M，增长率 10–15%；可能路径是 2021 年基线更小（约 $8–10M），叠加企业采用更慢，导致绝对 ARR 更低，同时 incumbents
              的竞争压力压缩扩张收入。在 8–10x EV/ARR 倍数下——与 C3.ai 的受压交易区间一致——隐含企业价值为 $320–$500M，较当前 $1B+ 标记将出现显著下调。触发因素包括重大客户流失、NRR
              低于 100% 的证据，或 Series F 后仍看不到盈利路径。估计情景概率：25%。

              三个情景的概率加权中心值约 $1.04B，出人意料地接近当前 $1B+ 标记。这表明，在现有证据下，市场已较公允地定价结果分布：基准和牛市假设下估值可辩护，熊市条件下则偏贵。
            claimRefs:
              - CV038
              - CV039
              - CV040
              - CV044
              - CV045
