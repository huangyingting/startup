    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >-
              Augury 由 Saar Yoskovitz 和 Gal Shaul 于 2011 年在以色列海法共同创立，公开使命是让机器和工厂良好运转，从而让世界更顺畅运转。公司注册在美国，总部位于 1178
              Broadway, Third Floor, New York, NY 10001，并保留海法的原始研发团队。Augury 自称是一家 Industrial AI 公司，为制造业企业提供基于状态的监测和流程优化。


              运营模式把专用 IoT 边缘传感器、自研 AI
              模型和人工可靠性专业能力组合起来，通过云连接订阅服务交付。收入来自多年期企业软件协议，并捆绑传感器硬件和专业服务。公司瞄准食品饮料、消费包装品、纸浆和造纸、化工、建材、制药等资产密集型垂直行业；这些行业里，计划外机器停机和制造浪费都能形成高价值
              ROI 场景。


              Augury 所处阶段符合 post-Series F 成长型公司特征：它已在 Fortune 500 制造业客户中验证产品市场匹配，在 Series E 跻身独角兽，如今正扩大企业账户，并把平台延展到智能体
              AI 能力。公司不发布财务报表；绝对 ARR、利润率和烧钱速度在公开记录中仍未披露。
