      - number: '5.2'
        title: 技术架构与 AI 能力
        blocks:
          - type: paragraph
            body: >
              Augury 的技术栈按三层架构组织：边缘感知与推理、云端 AI 与分析、人工专家复核。在边缘层，Augury 部署 IoT 传感器——Ranger Pro（与 Baker Hughes 合作开发，并以
              Bently Nevada/Cordant 品牌分销）和 Halo R4000（2024 年 11 月发布，是 Augury 首款工业级边缘 AI
              原生设备）——采集多模态机器数据，包括高频振动、超声、表面温度和磁场测量。Halo R4000 内置边缘 AI 推理，在设备上直接运行故障分类模型，降低云端带宽需求，并在不依赖网络连接的情况下更快发现异常。安装后
              48 小时内，系统无需人工配置即可完成自动基线建立。

              云端 AI 模型基于 Augury 自有数据集训练，数据来自 300,000+ 台机器、超过 1.1 billion 小时运行数据，负责为 Machine Health 和 Production Health
              工作负载做深度诊断分析和处方式根因识别。Production Health 通过源自 Seebo
              的连接器接入运营流程指标，把机器状态与生产结果近实时关联起来。人工振动分析师通过复核边缘案例、标注新的故障模式、向客户提供诊断报告来补充 AI 输出，形成闭环反馈，让已部署机队上的模型准确率持续提升。在 2024
              年 Beyond the Line 用户大会上，Augury 披露计划整合生成式
              AI，用于自然语言诊断摘要和自动报告生成，并用强化学习基于维护团队确认的故障结果反馈持续重训模型——这一自我改进架构将随时间降低对人工分析师标注的依赖。
            claimRefs:
              - CE009
              - CE010
              - CE011
              - CE012
              - CE013
              - CE014
              - CE015
              - CE016
