        - 打包进企业合同；公开资料未单独列项
        - 所有企业部署均包含；与纯软件竞争对手拉开差异
        - 较低（人力密集）；压缩混合利润率
        - 厘清服务与软件收入拆分；确认每个账户配置的人数
      - - 专业服务（实施）
        - Fast Track 部署方法、上线导入和集成服务
        - 按项目收费或纳入首年合同；未单独披露
