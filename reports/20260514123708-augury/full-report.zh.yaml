      - number: '5.3'
        title: 硬件平台与传感技术
        blocks:
          - type: paragraph
            body: >
              Augury 的传感硬件是其机器健康工作流中的主要数据采集点，也是技术差异化的关键来源。Ranger Pro 传感器由 Augury 与 Baker Hughes 联合开发，并作为 Cordant 平台下
              Bently Nevada 产品线的一部分分销，采用压电式三轴加速度计测量高频振动。其无线协议 ISA100.11a 是面向工厂自动化环境的 IEC
              工业标准，可在电磁密集的制造车间里提供确定性、低延迟、抗干扰的数据包传输。安全层通过 128-bit AES 加密和基于 X.509 证书的双向认证，保护设备到网关通信。Ranger Pro 达到 IP67
              防尘防水等级，工作温度范围为 −40°C 至 +85°C，单个网关最多支持 40 个传感器。

              Halo R4000 于 2024 年 11 月推出，代表面向最严苛工业环境设计的下一代硬件形态。它达到 IP66、IP68 和 IP69 防护等级——可获得的最高组合等级——并在紧凑的 2×2-inch
              机身中达到 40G 抗冲击等级，设计用于齐平安装在资产表面。不同于 Ranger Pro，Halo R4000 内置本地边缘 AI
              推理，在设备层完成故障分类。振动、温度和相位分析的传感器融合，让多参数诊断比单一模态系统更准确。Augury 的用例文档显示，其覆盖工业泵中超过 25
              种不同故障特征（包括汽蚀、轴承缺陷、未对中、不平衡、松动和共振）以及电机中超过 28 类故障；基于多传感器融合方法，公司称故障预测准确率超过 99.9%。
            claimRefs:
              - CE017
              - CE018
              - CE019
              - CE020
              - CE021
              - CE022
              - CE023
              - CE024
      - number: '5.4'
        title: 集成生态与合作伙伴网络
        blocks:
          - type: paragraph
            body: >
              Augury 的商业和技术生态横跨 CMMS 与 EAM 软件厂商、云基础设施提供商、OEM 硬件合作伙伴、专业咨询公司和工业交付伙伴，形成一个上市网络，既放大直销触达，也降低客户集成摩擦。在 CMMS 和
              EAM 侧，Augury 通过认证双向连接器与 IFS Ultimo 集成，可根据诊断告警自动创建和关闭工单；同时与 SAP 和 MaintainX 集成，覆盖最广泛的企业维护管理工作流。PTC
              ThingWorx Ready 认证支持与 PTC 工业 IoT 平台即插即用式集成，让已经运行 ThingWorx 的客户无需定制开发即可加入 Augury 诊断。Microsoft Azure
              为全球数据处理和 AI 模型训练提供云基础设施骨干。

              Baker Hughes 持有 Augury 少数股权和一个董事会席位，以 Bently Nevada/Cordant 硬件身份共同营销 Ranger
              Pro，并借助其重工业客户安装基座提供企业销售触达。Schneider Electric 的 SE Ventures 共同领投 $180M Series E，并被列为技术合作伙伴，使 Augury 与
              Schneider 的 EcoStruxure IIoT 平台保持一致。Grundfos 于 2018 年建立 OEM 合作，2020 年扩展为长期战略合作，把 Augury 诊断嵌入其泵服务，让
              Grundfos 全球泵客户获得基于状态的维护即服务。DSV Air & Sea 与 Augury 集成了 Parts-as-a-Service 能力，由诊断告警自动触发备件采购。按 Augury
              官方合作伙伴站点地图统计，合作伙伴网络覆盖 16+ 个具名伙伴，包括 IBM、Accenture、Deloitte、McKinsey、Bain、Carrier、Trane 和 Infor。
