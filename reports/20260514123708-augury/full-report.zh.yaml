      - number: '7.2'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Augury 的私营公司身份造成根本性财务不透明，外部无法评估资本充足性、烧钱速度和现金跑道。2025 年 2 月完成的 $75M Series F 维持 $1B+ 估值，但相对 2021 年 10 月
              $1.5B Series E 峰值，这意味着隐含估值压缩；在公司按当前估值水平退出的最好情形下，早期投资人相对入场价格也面临约 33% 折价。公司未提交 S-1 注册声明、经审计财务报表或季度收入披露。自
              2021 年以来收入增长 5 倍的信号（见 Series F 新闻稿）没有披露基线，使绝对 ARR 估算不可靠。如果 Series E 基线 ARR 在 $15–25M 区间（客户数相近的工业 SaaS 公司常见
              Series E 入场点），5 倍增长意味着 2025 年 ARR 约 $75–125M——合理但未经确认。

              硬件加 SaaS 加托管服务的混合商业模式，带来结构性毛利率风险。IoT 传感器硬件（Halo R4000）引入了纯软件 SaaS 同行没有的销货成本、库存敞口、供应链依赖（尤其是边缘 AI 处理所需的
              Qualcomm 芯片组）和现场服务物流。合同中捆绑人工可靠性专家，会进一步压缩混合毛利率。综合来看，Augury 的混合毛利率很可能落在 55–70% 区间，而软件型工业 AI 同行可达
              80%+；退出时，这会造成有意义的估值倍数折让。Seebo 收购（2022）在资产负债表上创造了未量化的商誉和无形资产，未公开披露，经济下行情景中可能存在减值风险。截至 2026 年 5
              月，未发现财务困境、裁员或重组的公开信号。
