      - number: '7.4'
        title: 监管、法律与合规风险
        blocks:
          - type: paragraph
            body: >
              Augury 运营覆盖 40 多个国家，带来复杂的多司法辖区监管合规义务。欧盟《通用数据保护条例》（GDPR）适用于任何处理 EU 居民或 EU 境内运营个人数据的活动。虽然 Augury
              的主要数据是机器运营遥测（振动、温度、磁读数），不是消费者个人数据，但 EU 工厂的员工身份、平台用户账户和流程参数，可能在 GDPR 宽泛定义下构成个人数据。Augury 隐私政策（最近更新于 2023 年 2
              月）承认基于 GDPR 的处理法律依据，并提到国际数据传输机制（EU-U.S. Data Privacy Framework）。如果不合规、发生数据泄露，或未能履行数据主体权利，可能面临最高 €20M
              或全球年营业额 4% 的 GDPR 罚款；以 Augury 的收入规模看，这是重大敞口。

              CISA 的工业控制系统（ICS）网络安全指南会直接影响 Augury 在关键基础设施行业（能源、水务、化工、食品饮料）的客户基础。CISA 面向 OT 的 Secure by Demand
              指南要求资产所有者采购具备安全设计原则的产品——强认证、加密协议和安全配置。如果 Augury 的传感器平台不能完全达到 CISA 对 OT 厂商推荐的安全姿态，公司可能失去受 CISA
              合规压力或行业监管约束的关键基础设施客户（能源行业 NERC CIP、水务行业 AWIA 2018）。OSHA 的机器安全标准适用于 Augury
              的安装活动，以及客户使用机器健康数据做安全相关维护决策的场景；如果客户在安全关键决策中依赖 Augury 数据，错误故障告警可能造成 OSHA 责任敞口。

              欧盟《人工智能法案》（EU AI Act）于 2024 年通过，并在 2025–2026 年进入执行阶段，将用于关键基础设施和工业安全的 AI
              系统归为「高风险」应用，需接受合格评定、满足人工监督要求和透明度义务。Augury 用于防止工业设施设备故障的生产关键故障检测 AI，可能落入 EU AI Act 附录 III 的高风险 AI 类别，进而需要
              CE 标志、技术文档、上市后监测和人工监督证明。出口管制风险低但非零：如果 Augury 的传感器加 AI 技术被归类为美国《出口管理条例》（EAR）下的两用技术，出口到某些司法辖区可能需要 BIS
              许可证。FTC 新兴的 AI 和数据治理执法姿态，也会给任何提出性能主张的 AI 厂商带来额外合规义务；Augury 的 99.9% 准确率主张可能需要支撑材料。截至 2026 年 5
              月，未在任何公开记录中发现针对 Augury 的诉讼、执法行动或监管调查。
