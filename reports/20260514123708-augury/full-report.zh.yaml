  - id: TP003
    title: 定价 / 包装对比
    columns:
      - 供应商
      - 定价模式
      - 单位 / 合同结构
      - 公开可得定价
      - 已知包含能力
      - 对买方的影响
    rows:
      - - Augury
        - 订阅 SaaS + 传感器硬件
        - 按机器或按站点；多年企业合同；硬件摊销或打包
        - 未公开；企业协商；Forrester 综合样本：大型制造约 $3-7M/yr 估计
        - 传感器 + 云端 AI + 托管可靠性服务 + Process Health 附加模块
        - TEI 研究中 310% ROI 支撑高额前期投入；回本 <6 个月
      - - C3.ai
        - SaaS 订阅，按应用计费
        - 按应用按用户或企业许可；通常 1-3 年合同
        - 未公开；企业协商；据报道 Fortune 500 合同在 $5-50M 区间
        - AI 应用套件；可靠性只是 12+ 个应用中的一个模块
        - 企业交易可能打包多个 AI 应用；可靠性不是独立重点
      - - Cognite
        - 平台订阅 + 实施
        - 按资产或按站点；数据量和用户授权；年度合同
        - 未公开；大型企业部署估计 $500K-$5M/yr
        - 工业数据运营平台；集成；AI 模型部署
        - 需要大量实施投入；按公司说法，价值兑现周期为 7 周
      - - Fluke Reliability
        - 硬件 + SaaS 订阅
        - 传感器硬件购买 / 租赁 + eMaint SaaS 年度订阅
        - eMaint 起价约 $33-55/user/month（SMB 层公开报价）
        - CMMS（eMaint）+ 振动硬件（Prüftechnik）+ AI 分析（Azima DLI）
        - SMB 入门价格最易接受；企业定价不公开；硬件另计成本
      - - IBM Maximo
        - 企业软件许可或 SaaS 订阅
        - 按用户或基于资产；通常与 IBM 签 3-5 年企业协议
        - IBM 不发布 Maximo 定价；企业交易 $500K-$10M+
        - EAM 平台 + APM 模块 + AI 巡检；不含传感器硬件
        - Maximo 是 EAM 记录系统；AI 监测需要额外传感器投入
      - - AspenTech
        - 企业软件许可
        - 按站点或企业许可；通常 3-5 年合同，并与 Emerson 协同
        - 未公开；企业定价；AspenTech 大型部署历史上为 $500K-$5M+
        - 流程工程 + APC + APM 软件堆栈；无硬件
        - 流程优化 ROI 强；具体到旋转设备 PdM 不够清晰
      - - Samsara
        - 按资产 SaaS 订阅
        - 按设备或按车辆订阅；年度合同；覆盖 SMB 到企业
        - 车队公开价格约 $27-45/vehicle/month；设备层级不同
        - 车队遥测 + 设备追踪 + 预防性维护告警
        - 车队监测定价易进入；工厂 PdM 需要额外集成
      - - 现状 / 人工 PdM
        - 内部人工 + 手持分析仪成本
        - 振动分析仪：$3-15K 硬件；基于路线的技术员人工 $80-150K/yr/person
        - 公开可得（硬件目录）；人工成本因地区而异
        - 基于路线的季度 / 月度振动巡检；无连续监测
        - 表面成本低，但漏报故障成本高；大规模设备群扩展性差
    notes: >-
      Augury、C3.ai、Cognite、IBM Maximo 和 AspenTech 的定价数据不公开；估计来自公开报道的合同公告、行业基准和 Forrester TEI 综合样本假设。Fluke Reliability
      eMaint 定价来自 SMB 层公开报价；企业定价需协商。Samsara 车队定价来自官网公开套餐。所有企业定价都应通过供应商 RFP 流程独立验证。现状行代表没有连续监测的人工振动分析项目的总拥有成本。
