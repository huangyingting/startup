      - number: '4.2'
        title: 融资历史与投资人组合
        blocks:
          - type: paragraph
            body: >
              自 2011 年创立以来，Augury 已在多轮融资中累计募集约 $369M 风险资本，并在 2021 年 10 月 Series E 后成为独角兽。最近一次融资是 2025 年 2 月 19 日完成的 $75M
              Series F，由 Lightrock 领投；Lightrock 是一家总部在伦敦、聚焦影响力的成长股权平台，管理资产超过 $5.5B。继续参投方包括 Insight Partners、Eclipse
              Ventures、Qumra Capital、La Maison Partners、SE Ventures（Samsung Electronics 的风险投资部门）和 Qualcomm Ventures。

              Series F 维持公司 $1B+ 估值。值得注意的是，这不是升值轮：2021 年 10 月的 Series E 定价估值为 $1.5B，意味着两轮之间估值持平但较峰值压缩约三分之一。这更反映
              2024–2025 年私募市场整体纪律收紧，而非公司自身表现不佳；但它限制了老股流动性选项，也说明如果没有额外收入倍数扩张，近期按 2021 年峰值估值 IPO 的可能性不高。

              Insight Partners 是最重要的多轮机构投资人，参与了 Series D、E 和 F。SE Ventures 与 Qualcomm Ventures 属于战略资本，可能为 Augury 的 Halo
              R4000 传感器平台和 Qualcomm 边缘芯片组带来硬件与生态协同。Eclipse Ventures 是长期早期及持续支持者，具备工业硬件-软件经验。SEC EDGAR 记录确认 Augury
              Inc.（CIK 0001651145）有三份 Form D 备案：两份提交于 2015 年 8 月 18 日，一份提交于 2020 年 10 月 30 日。2020 年 Form D 可能对应 Series D
              前融资，列明 Saar Yoskovitz 为执行官、Gal Shaul 为董事，并确认公司在 Delaware 注册、总部在 New York。公司没有提交 S-1 或其他 SEC 注册声明，确认 Augury
              仍是私营公司，不受上市公司财务报告要求约束。
