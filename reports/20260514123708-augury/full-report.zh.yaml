  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与客户价值主张
        blocks:
          - type: paragraph
            body: >
              Augury 的商业平台由两个一体化支柱组成——Machine Health 和 Production Health——共同覆盖制造优化的全谱系，从单个资产正常运行时间到流程良率效率。Machine Health
              分两档交付：Critical Resources（MH CR）面向泵、马达、风机、压缩机等最关键旋转资产，这些资产构成任何工厂可靠性项目的核心；Supporting Equipment（MH SE）于 2021
              年 11 月推出，把连续监测扩展到工厂机队中 60% 以上此前因成本或传感器部署复杂度而未被监测的设备。两档都把 Augury 的多传感器 IoT 硬件与 AI
              驱动诊断结合起来，提供早期故障预警、根因诊断，并按关键性排序做严重程度优先级划分。

              Production Health 在 Augury 2022 年收购 Seebo 后推出，采用处方式方法做流程优化。不同于以资产为中心的 Machine Health，Production Health
              将机器传感器数据与生产流程数据——线速、配方参数、物料输入——整合起来，找出浪费、良率损失和产能下降的根因，再给出处方式纠正动作。按 Augury 基准，使用 Production Health
              的客户平均生产浪费下降 37%、良率提升 9%。Augury 还提供 Guaranteed Diagnostics，这是业内首个由保险承保方 Hartford Steam Boiler（HSB，Munich Re
              子公司）支持的产品；在该安排下，Augury 对漏报故障的财务责任被明确量化，并由保险保障提供合同背书。Interoperability-as-a-Service 模块可与现有 CMMS、EAM 和 ERP
              系统双向集成。Forrester Total Economic Impact 研究验证了 310% 三年 ROI 和少于 6 个月回本周期，代表中端市场制造商的综合企业客户因停机减少节省 $16.8M。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
              - CE006
              - CE007
              - CE008
          - type: table
            tableRef: TE001
