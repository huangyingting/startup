  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >-
              预测性维护（PdM）用机器学习、IoT 状态监测传感器和云端分析，在设备异常演变为计划外停机之前识别并预测故障。本章的市场边界覆盖三层：硬件组件（振动传感器、声学探测器、热成像相机和边缘 AI
              设备）、软件平台（云端分析、数字孪生集成、CMMS 连接器和 AI 模型编排）以及专业服务（实施、咨询、托管监测和培训）。分析机构对这条边界的处理并不一致：MarketsandMarkets 和 Grand
              View Research 只统计专用 PdM 解决方案；Mordor Intelligence 和 Allied Market Research 纳入相邻的运营 AI 产品，使同一日历年份的估算高出 2 到 6
              倍。


              按一手分析机构的定义，TAM 不包括没有 ML/AI 能力的通用 ERP 维护模块、纯按时间排程的预防性维护软件、工业自动化控制系统（SCADA、DCS）和下游流程仿真工具。PdM
              的现状替代方案包括故障后抢修式维护，以及定期预防性维护（PM）。两者都要牺牲一端：前者牺牲计划外停机减少，后者牺牲运营效率（过度排程的 PM）。Augury 进一步把平台品牌化为 Production
              Health，拓展可服务市场；该类别按公司定义涵盖机器健康、流程健康和 AI 智能体驱动的制造洞察，形成一个超过传统 PdM 范围、且可能扩大 TAM 的自有市场框架。尚无独立分析报告将 Production
              Health 作为区别于 PdM 的类别正式测算，因此 Augury 的 TAM 主张部分依赖公司自定义框架。
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
