      - number: '2.5'
        title: 逆风与采用约束
        blocks:
          - type: paragraph
            body: >-
              四个主要逆风限制 PdM 采用速度。OT 网络安全担忧是最大摩擦——Mordor Intelligence 将其量化为 2.8%
              的市场逆风。制造商不愿把运营技术（OT）网络连接到云平台，尤其在受监管行业，因为勒索软件风险、数据主权要求和 IT/OT 融合复杂度都会放大顾虑。能证明 OT
              安全架构并提供兼容气隙部署选项的厂商，具备有意义的竞争优势。


              数据科学和 ML 工程人才短缺带来 1.9% 的逆风。许多中型制造商缺少内部能力来构建、调优和维护 AI 模型，因此依赖厂商托管的 AI 服务。反过来，这有利于 Augury 这类提供交钥匙
              AI、而非仅提供平台的成熟厂商。Modbus、OPC-UA、CAN bus 等传统工业协议让传感器数据集成更复杂，构成 1.5% 逆风；能力最强的平台会提供广泛协议库和硬件兼容矩阵。最后，AI
              模型漂移需要持续再训练，带来 1.2% 逆风：部署后的模型会随流程条件变化而退化，买方越来越用持续学习能力和模型更新节奏评估厂商。高昂的前期硬件和实施成本，也会阻挡 Augury 核心企业板块之外的 SME
              买方。
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
      - number: '2.6'
        title: Augury 的可服务市场位置
        blocks:
          - type: paragraph
            body: >-
              Augury 位于北美企业制造业 PdM 市场的高端层级。其 170+ 家制造业客户、20+ 个 Fortune 500 账户，以及在 40+ 个国家的 10+
              个垂直行业存在，确认公司已经在最大可服务板块（制造业）和最高价值地域（北美）实现商业规模。Verdantix 2025 年 Industrial AI Analytics Green Quadrant
              的领导者位置，为 Augury 相对同业的战略定位提供了独立分析师确认。Forrester TEI 研究（2025 年 10 月）证明 310% ROI、$20.1M NPV 和不到 6
              个月回本，是该领域最强的独立 ROI 佐证。


              一个粗略 SAM 估算：如果北美制造业 PdM 市场占全球 $14B 基准的 28.85%（约 $4B），而 Augury 瞄准大型企业制造商（支出排名前 20–30%），则可服务 SAM 约为
              $800M–$1.2B。没有 ARR 披露，Augury 的 SOM 更难估算；其 170+ 客户若按每客户每年 $3M–$15M 推算，当前 ARR 暗示为 $500M–$2.5B，但区间很宽。公司强调
              Fortune 500 账户——Fortune 500 中约 10% 已经是客户——说明其核心板块存在渗透上限；这让通过 Process Health（良率、浪费、能源、吞吐优化）扩展
              TAM，成为支撑高增长倍数的战略必需。AI 驱动 PdM 39.5% CAGR 提供市场顺风；Production Health 类别扩张提供 land-and-expand 跑道。
