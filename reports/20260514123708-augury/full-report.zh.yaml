    data:
      items:
        - date: 2021-10
          label: Series E 轮，估值 $1.5B
          detail: $180M Series E；设定估值高点；成为早期投资者做退出分析时的进入价参考点
        - date: 2022-Q2
          label: Seebo 收购完成
          detail: 收购 Process Health 平台；整合风险启动，资产负债表上的未量化商誉开始累积
        - date: 2024-Q2
          label: EU AI Act 在欧盟官方公报发布
          detail: 高风险 AI 分类框架生效；高风险系统的 24 个月合规跑道启动
        - date: 2025-02
          label: Series F 轮，估值维持在 $1B+
          detail: $75M Series F；Lightrock 领投；估值较 $1.5B Series E 峰值仍维持在 $1B+；COO 到任
        - date: 2025-05
          label: Fortune Brands 合作公布
          detail: 围绕制造业可信 AI 的战略联盟；若合作表现不及预期，渠道风险开始显现
        - date: 2026-02
          label: EU AI Act 高风险条款执法
          detail: 高风险 AI 应用必须在这一窗口前满足合格评定要求
        - date: 2026-03
          label: MaintainX CMMS 集成上线
          detail: 渠道合作上线；集成表现现在可监测；合作伙伴依赖风险进入活跃状态
        - date: 2026-12
          label: 估计 Series F 现金跑道检查点
          detail: 若烧钱速度为 $6–8M/月，$75M 融资可提供自 2025 年 2 月交割起约 10–12 个月现金跑道；再融资窗口打开
        - date: 2027-Q1
          label: GDPR 充分性决定复审窗口
          detail: EU-U.S. Data Privacy Framework 将接受定期复审；若充分性失效，Augury 的跨境数据传输面临风险
        - date: 2028-Q4
          label: 预计下一轮融资或退出窗口
          detail: 基于典型 Series F 到退出的 3 年路径；IPO 准备度需要披露 ARR 和利润率里程碑
  - id: FR003
    title: 风险传导图——风险如何级联为结果
    type: flow
    sourceRefs:
      - SR001
      - SR008
      - SR014
      - SR015
    approximationNotes: |
      风险传导路径为分析师构造，依据公开证据和行业类比风险级联。节点关系代表可能的因果链条，并非公司确认披露的依赖关系。边标签标示传导机制。
    data:
      nodes:
        - id: ot-breach
          label: OT/ICS 网络安全事件
          detail: 传感器固件被攻破，或云平台被入侵，导致客户机器数据暴露
        - id: gdpr-violation
          label: GDPR / EU AI Act 违规
          detail: 数据隐私泄露，或未满足 EU AI Act 高风险要求
        - id: incumbent-bundle
          label: 现有厂商捆绑竞争
          detail: Siemens/ABB/Honeywell 将 AI 诊断作为零成本捆绑，随 OT 硬件合同提供
        - id: valuation-pressure
          label: 估值 / 退出约束
          detail: Series F 估值较 Series E 峰值持平偏低；早期投资者退出流动性受限
        - id: talent-loss
          label: AI/ML 人才流失
          detail: 工程和可靠性专家流向超大规模云厂商与 AI 创业公司
        - id: customer-churn
          label: 客户流失 / 账户丢失
          detail: 企业客户转向现有厂商方案，或缩减 Augury 合同范围
        - id: revenue-impact
          label: 收入增长放缓
          detail: 新客户获取减速；竞争或产品质量问题压低 NRR
        - id: burn-accelerate
          label: 现金消耗加速
          detail: 收入低于计划，拉长净烧钱周期；需要更早桥接融资
        - id: down-round
          label: 降价融资 / 融资风险
          detail: 下一轮融资估值低于 $1B；投资者被稀释，团队士气受挫
        - id: product-quality
          label: AI 模型 / 产品质量失效
          detail: 漏报导致设备故障未被发现；客户信任被侵蚀
      edges:
        - from: ot-breach
          to: customer-churn
          label: 事件后客户信任被摧毁
        - from: ot-breach
          to: gdpr-violation
          label: 客户个人数据暴露触发 GDPR 义务
        - from: gdpr-violation
          to: revenue-impact
          label: 合规完成前，欧盟市场准入暂停
        - from: incumbent-bundle
          to: customer-churn
          label: 客户续约时接受现有厂商捆绑包
        - from: customer-churn
          to: revenue-impact
          label: 账户流失直接削减 ARR
        - from: talent-loss
          to: product-quality
          label: ML 模型开发速度放慢；可靠性专家产能收缩
        - from: product-quality
          to: customer-churn
          label: 反复漏报侵蚀客户信心
        - from: revenue-impact
          to: burn-accelerate
          label: 收入低于计划，净烧钱压力延续更久
        - from: valuation-pressure
          to: down-round
          label: 退出路径受限，迫使融资条款低于 $1B 估值
        - from: burn-accelerate
          to: down-round
          label: 现金跑道压力迫使公司接受不利条款融资
        - from: incumbent-bundle
          to: valuation-pressure
          label: 市场份额流失下调增长预期定价
  - id: FV001
    title: Augury 估值与融资时间线
    type: timeline
    sourceRefs:
      - SV001
      - SV002
      - SV006
      - SV014
      - SV015
    summary: |
      梳理 Augury 从创立到 Series F 的完整融资历史，并标注关键估值节点、战略里程碑和 2022–2025 年私募市场收缩背景。
    data:
      items:
        - date: '2011'
          label: Augury 创立
          detail: Saar Yoskovitz 与 Gal Shaul 在以色列共同创立 Augury；最初聚焦连接智能手机的机器诊断。
          tone: neutral
        - date: 2015-08
          label: 种子资金（SEC Form D）
          detail: 两份 Form D 豁免发行申报（CIK 0001651145）；种子 / 天使阶段资本；确切金额未披露。
          tone: neutral
        - date: 2017-2019
          label: Series A–C（估计 $20–30M）
          detail: 早期增长轮支持 Machine Health 品类推出；Eclipse Ventures 是已确认的早期支持方之一。
          tone: positive
        - date: 2021-02
          label: Series D（约 $55M，估计）
          detail: 增长轮支持北美企业级扩张；SEC Form D 于 2020-10-30 提交；估计由 Insight Partners 领投。
          tone: positive
        - date: 2021-10
          label: Series E — $180M，估值 $1.5B
          detail: $180M，由 Insight Partners 和 Goldman Sachs 领投；Augury 宣布成为首个工业 4.0 独角兽；投后估值 $1.5B。
          tone: positive
        - date: 2022-2023
          label: 私募市场回调
          detail: 广义 SaaS / 科技估值压缩，晚期私营公司普遍下调 30–60%；影响独角兽估值标记。
          tone: risk
        - date: 2025-02
          label: Series F — $75M，估值 $1B+
          detail: $75M，由 Lightrock 领投；维持 $1B+ 估值（较 Series E 峰值低 33%）；Elan Greenberg 加入任 COO。
          tone: neutral
  - id: FV002
    title: 可比公司 EV/Revenue 倍数与 Augury 隐含倍数对比
    type: bar
    sourceRefs:
      - SV007
      - SV008
      - SV009
      - SV010
      - SV011
      - SV012
    summary: >
      公开工业软件和 AI SaaS 同行的 EV/Revenue（或 EV/ARR）倍数，对比 Augury 在 $1B+ Series F 估值和估计 $75M ARR 下的隐含倍数。AspenTech (AZPN)
      是质量最高的结构性可比；C3.ai (AI) 是悲观情景的警示先例。
    approximationNotes: >
      Augury 隐含 EV/ARR 倍数基于 $75M ARR 基准情景估计；在 ARR 披露前，实际倍数未知。上市公司倍数截至 2026 年 5 月 14 日（PTC、C3.ai）或最后交易日（AspenTech）。工业
      SaaS 中位数为分析师估计，基于 Bessemer Cloud Index 历史基准和同业组分析。
    data:
      items:
        - label: AspenTech (AZPN) — EV/Revenue
          value: 14.62
          tone: neutral
        - label: PTC Inc. (PTC) — EV/Revenue 倍数
          value: 5.74
          tone: neutral
        - label: C3.ai (AI) — EV/Revenue 倍数
          value: 2.26
          tone: risk
        - label: 工业 SaaS 中位数（估计）
          value: 9.5
          tone: neutral
        - label: Augury（隐含 EV/ARR，$75M 基准）
          value: 13.3
          tone: positive
  - id: FV003
    title: Augury 估值区间——乐观 / 基准 / 悲观情景
    type: range
    sourceRefs:
      - SV001
      - SV008
      - SV009
      - SV010
      - SV011
    summary: |
      每个情景的企业价值低—高区间，由 ARR 估计和适用 EV/ARR 倍数推导。当前 $1B+ Series F 估值标记叠加供参考。数值单位为 $M。
    approximationNotes: |
      所有区间均为分析师估计；Augury 未公开披露 ARR。各情景代表可能的结果分布，而非点估计。
    data:
      items:
        - label: 悲观情景（ARR $40–50M，8–10x）
          low: 320
          high: 500
        - label: 基准情景（ARR $65–80M，13–15x）
          low: 845
          high: 1200
        - label: 乐观情景（ARR $100M+，18–22x）
          low: 1800
          high: 2200
        - label: 当前 Series F 估值标记（$1B+）
          low: 1000
          high: 1000
  - id: FV004
    title: Augury 投资 KPI 评分卡
    type: kpi
    sourceRefs:
      - SV001
      - SV002
      - SV003
      - SV017
      - SV018
      - SV026
      - SV027
    summary: >
      面向投委会的 Augury 七项投资维度评分，采用 0–10 分制（10 = 同类最佳），反映本尽调报告八章证据的整体权衡。评分仅依据公开可得证据；若数据室确认 ARR ≥$60M、NRR ≥110%、毛利率
      ≥60%，财务透明度得分会显著上升。
    data:
      items:
        - label: 市场机会
          value: 8/10
          detail: AI-PdM 市场 CAGR 39.5%；GVR 预计 2030 年达 $60B；TAM 大且有结构性顺风
        - label: 产品差异化
          value: 7/10
          detail: 15 年自研数据集；99.9% 准确率宣称；Machine Health + Process Health 组合；Verdantix Green Quadrant 领导者
        - label: 客户验证
          value: 8/10
          detail: Forrester 独立验证 310% ROI；已点名 Fortune 500 锚定客户；$1M+ 账户数量达到原来的三倍
        - label: 财务透明度
          value: 3/10
          detail: 未披露 ARR、NRR、毛利率、烧钱速度或股权结构表；没有独立财务验证
        - label: 竞争护城河
          value: 6/10
          detail: 先发数据优势；托管服务粘性；受 Emerson/AspenTech 组合和 OT 现有厂商挑战
        - label: 估值相对同行
          value: 6/10
          detail: 隐含 13x EV/ARR 处于工业 SaaS 高端；基准情景下可辩护，悲观情景下偏紧
        - label: 退出准备度
          value: 5/10
          detail: 没有 IPO 信号；存在 M&A 可选性（工业集团）；Series E 后降价融资限制近期老股价值
