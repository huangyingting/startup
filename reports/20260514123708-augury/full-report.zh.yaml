      - number: '3.4'
        title: 相邻平台与硬件竞争对手
        blocks:
          - type: paragraph
            body: >-
              Fluke Reliability 是一个互联可靠性平台，整合了三个成熟品牌：eMaint（获奖 CMMS/EAM 软件）、Prüftechnik（世界级状态监测硬件和对中设备）和 Azima DLI（AI
              驱动机器健康分析）。这套组合形成了一个垂直一体化的 Augury 竞争者，提供硬件传感器、CMMS 工作流管理和 AI 诊断——架构上类似 Augury 的传感器 + AI + 平台堆栈。Fluke
              Reliability 的定位强调连接硬件、软件和人的「互联可靠性生态」。不过，Fluke 的 AI 能力来自 Azima DLI 收购，被认为不如 Augury 基于 1.1B+
              小时机器数据训练的自研神经网络成熟。Fluke 的 CMMS 强项（eMaint）提供 Augury 原生不包含的工作流和工单集成，但 Augury 可与主流 CMMS 平台集成。


              PTC ThingWorx 是工业 IoT 平台，已被改名并纳入 Velotic 平台生态。ThingWorx 提供 IIoT 连接、边缘计算和分析能力，面向智能制造、远程服务和资产优化用例。ThingWorx
              的强项是 IIoT 平台灵活性——它让制造商构建自定义状态监测和预测性维护应用，而不是提供交钥匙机器健康解决方案。这让 PTC 在托管服务和专家 AI 层面更像平台赋能方，而非 Augury
              的直接竞争者；但它确实竞争本可用于 Augury 部署的 IIoT 平台预算。


              Microsoft Azure 和 Google Cloud（含 Vertex AI）提供通用 AI 基础设施，制造商可用来内部构建机器健康解决方案。AWS、Azure 和 GCP 都提供时间序列数据库、边缘
              AI 服务（Azure IoT Edge、AWS Greengrass、Google Cloud IoT）和 ML 模型部署工具，技术上使工业公司能够搭建类似 Augury
              的能力。不过，自建路径需要大量数据科学和可靠性工程人才，而多数工业制造商并不具备——这也是 Augury 带内嵌可靠性专家的托管服务模式，能够对抗超大规模云厂商威胁的持久差异化。Palantir 的
              Foundry 和 AIP 平台在更广泛的工业运营 AI 层竞争，面向大型企业提供数据集成和 AI 运营平台，不过 Palantir 历史上更偏向政府和国防，而不是制造业。


              现状竞争威胁同样重要：许多制造商仍依赖路线式振动分析，用手持分析仪（月度或季度由技师巡检），或者采用没有 AI 的定期 PM 计划，或沿用既有 SCADA 和 DCS
              系统中的传统阈值告警。这套传统做法按装机基座看是最大的「竞争者」，也是 Augury 销售动作最主要的替换目标。
            claimRefs:
              - CP023
              - CP024
              - CP039
      - number: '3.5'
        title: Augury 的竞争定位与差异化
        blocks:
          - type: paragraph
            body: >-
              Augury 的五个核心差异化因素叠出一条竞争护城河，短期内无论 AI 原生初创公司还是传统既有厂商都不容易复制。

              第一，从创立起就是 AI 原生架构。Augury 2011 年创立时，目标就是把机器学习用于振动和声学传感数据，服务机器健康。IBM
              Maximo、AspenTech、ABB、Siemens、Emerson、Honeywell 等竞争对手都有数十年的传统产品架构，如今再加装 AI 能力，带来技术债和集成复杂度。AI
              原生架构支持更快模型迭代、云原生扩展和持续学习，这些都更难事后改造。

              第二，自有机器健康数据集是 Augury 最可防守的数据护城河。Augury 拥有来自 300K+ 台已诊断机器、覆盖数十种设备类型的 1.1B+ 小时机器运行数据，其 AI
              模型在这一数据集上训练；没有同等部署时间，竞争对手无法复制。该数据集支撑了 Augury 的 99.9% 故障检测准确率主张（投资方 Lightrock 也予以佐证），并让 Augury
              能够识别小数据集竞争者无法可靠发现的故障模式。

              第三，Halo R4000 边缘 AI 传感平台——公司称其为全球唯一真正具备边缘 AI 能力的工业级机器健康传感器——把 AI 集成到传感器层，实现混合云 / 边缘诊断。传感器具备 IP66/68/69
              等级，可在极端冲洗环境中运行；2×2 英寸尺寸适合狭窄工业空间；并支持每个网关最多 40 个传感器，配备自愈网络架构。截至 2024–2025 年，没有竞争对手以工业级形态提供同等边缘 AI 传感能力。

              第四，带内嵌可靠性专家的托管服务模式，让 Augury 区别于 PTC ThingWorx、Cognite 和云超大规模厂商提供的 DIY 平台。Augury 的 Reliability Engineers
              提供诊断解读、告警分诊和变更管理支持——降低客户人才要求，并加快价值兑现。Forrester 独立 TEI 研究（2025 年 9 月）确认，Augury 三年 ROI 为 310%，NPV 为
              $20.1M，回本周期少于 6 个月。Fortune Brands Innovations 在 16 个工厂、1,000+ 台机器上部署后，8 个月实现 2.5x ROI。

              第五，Production Health——Augury 自定义的类别——把竞争框架从传统机器健康延伸到流程良率、吞吐、浪费和能源优化。指标包括一个班次内良率提升 9%、浪费减少 37%、吞吐量提升约
              7%、燃气使用减少约 5%；Augury 的 Process Health 方案瞄准 C-suite ROI 叙事，足以支持企业级投入。目前没有竞争对手能在单一 AI 原生托管服务模式中，提供可比的
              Machine Health + Process Health 组合平台。
