      - number: '8.2'
        title: 上市可比公司分析
        blocks:
          - type: paragraph
            body: >
              为一家私营工业 AI 独角兽挑选有效可比公司，受限于上市 pure-play 对标稀少。最相关的三家上市可比公司是 Aspen Technology（AZPN）、C3.ai（AI）和 PTC
              Inc.（PTC），分别对应 Augury 业务的不同维度：工业流程软件、企业 AI 和工业 IoT。

              Aspen Technology 是结构上质量最高的可比对象：这是一家工业优化软件公司，服务炼油、化工、电力、采矿等资产密集型流程行业，具备深厚领域 know-how、专有数据集和订阅 ARR。AspenTech
              2025 财年 Q2 Annual Contract Value 为 $964.9M（同比 +9.2%）；2025 年 1 月 Emerson Electric 发起每股 $265 的全面私有化之前，公司市值约
              $16.73B，隐含收购倍数约 17x ACV。其上市 EV/Revenue 为 14.62x，基于过去十二个月收入 $1.14B。这个可比对象支持高质量工业软件业务 14–17x 的 ARR
              倍数，前提是客户关系足够稳固——但 AspenTech 的规模（$1B+ ACV）和利润率画像明显优于 Augury 当前位置。

              C3.ai 提供了反向警示。公司当前市值约 $1.30B，过去十二个月收入 $307M（环比下降 16%），因长期经营亏损、增长不稳定、投资人质疑其企业 AI GTM，交易倍数只有 2.26x
              EV/Revenue。按 $1B+ 估值计算，Augury 在过去收入口径上的隐含倍数高于 C3.ai 当前倍数；如果 Augury 增长轨迹放缓，又不能拿出清晰盈利路径，这就是风险。

              PTC Inc. 代表 IoT 加工业软件板块，当前市值 $16.28B，基于 $3.0B 过去收入的 EV/Revenue 为 5.74x，EV/EBITDA 为 13.04x。PTC 完成盈利型 SaaS
              转型，并拥有强 IoT 平台 ThingWorx，因此可作为成熟 Augury 未来可能达到的倍数锚点；但 PTC 3x 的收入基数和已验证盈利能力，也支持对 Augury 这类未盈利公司在 PTC
              当前倍数上打折。

              综合可比公司，Augury 当前阶段相关 ARR 倍数区间为 10–20x：低端反映 C3.ai 警示案例（AI 热度退潮、亏损延续），中点（约 14x）反映 AspenTech
              规模化后的战略价值，高端则反映未验证但可能较强 ARR 轨迹带来的增长溢价。套用到 Augury 估计 ARR 情景 $50M–$100M，估值区间为 $500M 到 $2B；当前 $1B+ 标记位于 $75M
              ARR、14x 倍数情景的中点。
