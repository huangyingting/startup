  - id: TP004
    title: 护城河耐久性 / 竞争风险登记
    columns:
      - 护城河主张
      - 主要威胁
      - 严重性
      - 时间线
      - 缓释 / 尽调问题
    rows:
      - - 自研数据集（1.1B+ 小时、300K+ 台机器）
        - 竞争对手会随时间积累数据；合成数据生成降低劣势
        - 中
        - 3-5 年
        - 跟踪竞争对手数据集增长；评估时间序列基础模型能否复刻数据集优势
      - - 99.9% 故障检测准确率
        - 竞争对手的准确率口径在收敛；C3.ai 声称规模化部署可减少 50% 停机时间
        - 中
        - 2-4 年
        - 获取独立第三方基准研究，对比 Augury、C3.ai 与 Fluke 的检测准确率
      - - 边缘 AI 传感硬件（Halo R4000）
        - 其他 OT 厂商（ABB、Siemens、Fluke）也有传感器硬件；边缘 AI 可复制
        - 低-中
        - 2-3 年
        - 跟踪 Fluke Prüftechnik 与 ABB 的硬件路线图，关注边缘 AI 传感器能力
      - - 托管服务 / 驻场可靠性专家
        - 人才稀缺限制这条护城河；竞争对手可以收购或招聘可靠性专家
        - 低
        - 3-5 年
        - 评估 Augury 可靠性工程师人数增长与留存；索取 NPS 数据
      - - Production Health（机器 + 工艺结合）
        - 目前没有竞争对手完全匹配；但 AspenTech + Emerson APC + APM 组合正在接近
        - 中
        - 2-4 年
        - 跟踪 AspenTech-Emerson 合并后的路线图，关注工艺优化与机器健康融合
      - - Fortune 500 客户切换成本
        - 切换成本真实存在，但不是永久护城河；新站点没有切换成本
        - 中
        - 持续
        - 分析客户留存率、净扩张收入、多站点铺开速度
    notes: 严重程度分类基于公开竞争情报和公开可得的供应商路线图。“阻断级”威胁需要立即做出战略响应；“中等”威胁需要监控并做战略对冲；“低”威胁在当前竞争定位下可控。时间线估计反映威胁可能实质侵蚀所识别护城河的周期。
