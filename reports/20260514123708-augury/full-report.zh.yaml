  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础概览
        blocks:
          - type: paragraph
            body: >
              截至 2025 年 2 月，Augury 报告拥有 170+ 家全球企业制造客户，覆盖 40+
              个国家。公司客户集中在资产密集型行业：食品饮料（最大垂直领域）、消费包装品（CPG）、化工、纸浆与林产品、建材、塑料和制药。Augury 客户页面强调，超过 20 家 Fortune 500 公司使用
              Augury 解决方案，约占整个 Fortune 500 指数的 10%；这一数量自 2021 年 Series E 融资以来已增长到 3 倍。


              客户基础的规模还体现在 300,000+ 台已诊断机器，以及已部署基座中超过 1.1 billion 小时受监测机器数据。Augury 估计其在全球范围内大约每 43
              分钟就避免一台机器发生故障；该指标来自受监测资产的汇总故障检测率。自 2021 年以来，年合同价值达到 $1 million 或以上的账户数量也增长到 3 倍，说明交易规模明显扩大，多站点企业承诺也更深。


              170+ 的绝对客户数相对于 Augury 的 $1B+ 估值可能显得不高，但每个客户通常代表大型多站点企业合同。公司称，客户规模化部署时可获得 5–20x ROI，部署覆盖北美、欧洲、拉丁美洲和亚太。公司运营于
              10+ 个制造垂直领域，主要瞄准运营复杂、多站点的企业制造商；在这些场景下，预测性维护能创造最高价值。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
              - CU005
              - CU006
              - CU007
          - type: table
            tableRef: TU003
            claimRefs: []
