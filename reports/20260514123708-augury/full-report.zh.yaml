  - id: TV005
    title: 投资逻辑与反向逻辑
    notes: |
      每个支柱呈现关键战略论点及其最有力反驳，证据来自本尽调报告全部八章。“哪些因素会改变判断”列出可观察触发条件，会把立场从观察推向投资，或从观察推向放弃。
    sourceRefs:
      - SV001
      - SV002
      - SV003
      - SV017
      - SV018
      - SV026
      - SV027
    columns:
      - 逻辑支柱
      - 乐观论点
      - 悲观反论点
      - 哪些因素会改变判断
    rows:
      - - 市场
        - 到 2032 年，AI 驱动 PdM 市场 CAGR 39.5%；Augury 是品类龙头，沉淀 15 年自有数据
        - 市场空间被 ABB、Siemens 等既有厂商激烈争夺，后者自带分销优势
        - 若有证据显示 Augury 市占率 ≥3%，且相对既有厂商胜率扩大，将强化乐观情景
      - - 产品
        - 故障检测准确率 99.9%；Forrester 验证 ROI 为 310%；唯一同时整合 Machine Health + Process Health 的 PdM 平台
        - AI 商品化风险；开源与云端超大规模厂商工具侵蚀护城河；硬件传感器市场压薄利润率
        - 智能体 AI 产品发布后，客户采用率超过已安装基数的 50%，将验证差异化
      - - 客户
        - Fortune 500 锚定客户（PepsiCo、DuPont、Colgate-Palmolive）；$1M+ 客户数增至 3 倍；业务覆盖 40+ 国家
        - 170+ 客户支撑 $1B+ 估值，意味着单客户溢价很高；流失 2–3 个锚定客户就会造成不成比例的冲击
        - 资料室确认 NRR ≥115%，将验证客户质量并支撑增长假设
      - - 财务
        - 2021 年以来收入增长 5x；Forrester NPV 强；回本期 <6 个月，说明获客资本效率高
        - 财务透明度为零；ARR、毛利率和烧钱速度均未披露；任何财务说法都无法独立验证
        - 经审计 ARR ≥$60M、毛利率 ≥60%、月烧钱 <$6M，将把立场转为投资
      - - 竞争
        - 在 Verdantix Green Quadrant 2025 中位居品类领导者；Production Health 唯一独角兽；先发数据优势
        - Emerson 收购 AspenTech 后形成资本更雄厚的工业软件竞争者；C3.ai 也可能并购或重新聚焦
        - 到 2027 年，Verdantix / Gartner 排名中的市场份额持续稳定，将确认护城河耐久性
      - - 估值
        - $1B+ 意味着基于 $75M（估计）ARR 的 13x 倍数；处于工业软件同业区间内；基准情景公允价值
        - 较 $1.5B E 轮压缩 33%；没有 IPO 催化；C3.ai 先例说明 AI SaaS 可能跌到 2x EV/收入
        - G 轮定价 ≥$1.2B，或 M&A 意向 ≥$1.5B，将确认乐观情景并支撑当前进入价格
  - id: TV006
    title: 最终尽调要求
    notes: |
      这些是把立场从观察上调到投资前，最低限度必须确认的数据点。优先级 1 项目事关投资逻辑；缺少这些，$1B+ 估值无法独立承销。
    sourceRefs:
      - SV001
      - SV014
      - SV015
      - SV016
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 尽调路径
    rows:
      - - ARR 与收入拆分
        - 过去 4 个季度 ARR、按产品线拆分的收入（Machine Health、Process Health 与硬件），以及 ARR 增长率
        - 必须用来验证 5x 增长说法并计算 EV/ARR 倍数；若无已确认 ARR，当前 $1B+ 估值无法投资
        - 要求资料室提供审计财务或管理账；在管理层会议与 CFO 确认
      - - 净收入留存率
        - NRR%、按年度客户队列划分的总收入留存率，以及过去 3 年客户账户流失率
        - NRR 是最重要的 SaaS 质量指标；$1M+ 客户数增至 3 倍只是代理指标，不能替代
        - 要求资料室提供队列分析表；与账户级收入数据交叉核对
      - - 分板块毛利率
        - 分别列出软件（SaaS）、硬件（传感器）和托管服务的毛利率
        - 硬件 + 托管服务混合模式压低毛利；需要确认纯软件 GP% 足以支撑 SaaS 估值
        - 要求资料室提供分板块 P&L；与工业 IoT-SaaS 同业基准比较
      - - 烧钱速度与现金跑道
        - 月度现金烧钱、F 轮完成后的当前现金余额，以及 12 个月现金流预测
        - 已融资 $75M 时，月烧钱 >$6M 意味着现金跑道 <12 个月；高烧钱会带来近期稀释风险
        - 要求资料室提供月度 P&L、现金流量表和 12 个月经营计划
      - - 股权结构表与清算优先权
        - 完整股权结构表、清算优先权堆叠、反稀释条款，以及任何老股交易历史
        - 估值从 $1.5B 压缩到 $1B+，可能造成复杂的优先权积压；需要厘清分配瀑布
        - 要求资料室提供股权结构表；审阅所有投资者附函和优先股条款
      - - IPO 或退出时间表
        - 管理层所称 3 年流动性计划（IPO、M&A、二级要约，或继续私有增长）
        - 缺少可见退出催化会限制回报建模；轮次投资者需要可信的流动性路径
        - 访谈管理层；要求提供任何董事会批准的退出可选性战略规划文件
