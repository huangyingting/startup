      - number: '1.3'
        title: 规模、客户与经验证的 ROI
        blocks:
          - type: paragraph
            body: >-
              截至 2025 年 2 月，Augury 披露服务 170+ 家全球企业客户，其中包括 20+ 家 Fortune 500 公司——大约相当于 Fortune 500 的十分之一。公开记录中的具名客户包括
              PepsiCo、DuPont、Colgate-Palmolive、General Mills、Heineken、Barilla 和 Fortune Brands Innovations。公司业务覆盖 40+
              个国家，监测超过 300,000 台机器，代表超过 1.1 billion 机器小时数据。自 2021 年以来，Augury 收入增长 5 倍，Fortune 500 客户数量增长 3 倍，年合同价值 $1M+
              的账户数量也增长 3 倍。


              2025 年 9 月委托开展的独立 Forrester Total Economic Impact 研究显示，一个合成 Augury 客户三年 ROI 为 310%，NPV 为 $20.1M，回本周期不到 6
              个月，计划外停机节省 $16.8M，维护成本下降 15%，吞吐量提升 5%。Fortune Brands Innovations 公开报告称，在 16 个制造基地的 1,000+ 台机器上部署 Augury
              后，8 个月内实现 2.5x ROI。Augury 估计已为客户累计创造 $1 billion 价值。


              $1B 累计价值和 5–20x ROI 区间均为公司披露数据，除 Forrester
              研究外没有独立第三方审计。客户级流失率和净收入留存未披露，完整客户名单也未公开。尽调时，这些指标应视为方向上积极，但仍需在管理层访谈中验证。
