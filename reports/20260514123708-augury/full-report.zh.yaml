      - number: '4.5'
        title: 资本充足性、财务缺口与风险因素
        blocks:
          - type: paragraph
            body: >
              Augury 于 2025 年 2 月完成的 $75M Series F 提供了有意义的资金注入，但烧钱速度、现金余额和收入均未披露，精确评估现金跑道并不可能。按服务企业市场的成长阶段工业 SaaS
              公司典型烧钱速度——在 Augury 规模下常见为每月 $3–7M——如果完全没有收入，$75M 融资意味着大约 10–25 个月现金跑道；但 Augury 正在增长的收入基数会实质性拉长这一数字。Series
              F 募资用途被表述为加速智能体 AI 能力和全球企业扩张，具体预算分配没有公开。

              相比 $1.5B Series E 峰值估值，Series F 估值持平，是公开记录里最显眼的财务风险信号。虽然这符合 2024–2025 年私募市场估值普遍重置，但它会给寻求按入场价格退出的早期 Series
              E 投资人释放负面信号，也抬高了未来以溢价 IPO 或战略收购的门槛。Augury 的硬件成分让资本强度高于纯软件同行：IoT
              传感器制造、库存管理、保修义务和现场服务物流，都会带来纯软件业务没有的营运资本需求和潜在利润率逆风。

              2022 年收购 Seebo 增加了过程优化能力，但也可能把无形资产和商誉带进 Augury 资产负债表；收购价格及其资产负债表影响没有披露。截至 2026 年 5
              月，公开记录中没有员工裁员、重组公告或收入重述，这是一个温和正面信号。不过，公开领域完全缺少经审计财务数据，意味着完整财务图景——包括收入确认政策、递延收入、应收账款和现金状况——必须在任何估值承销启动前，通过数据室访问来解决。
            claimRefs:
              - CI036
              - CI037
              - CI038
              - CI039
              - CI040
