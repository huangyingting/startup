  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与业务架构
        blocks:
          - type: paragraph
            body: >
              Augury 的收入来自三条彼此联动、并会随客户生命周期叠加的线：IoT 传感器硬件、SaaS 软件订阅和托管服务。硬件层由专用振动、温度和磁传感器构成，最新产品是 2024 年 11 月发布的 Halo
              R4000 边缘 AI 系列，部署在被监测机器上。硬件作为更大的 Machine Health 部署的一部分，出售或租赁给企业客户；具体硬件定价和利润率没有公开披露。

              软件层是业务经常性收入的核心。Machine Health 以年度或多年期企业 SaaS 订阅销售，覆盖 AI 诊断、故障检测、处方式建议和平台访问。Process Health 在 2022 年收购 Seebo
              后推出，作为平台附加模块销售，用 AI 做生产优化。两款产品都捆绑人工可靠性专家服务——振动分析师、可靠性成功经理和解决方案架构师——这让 Augury 有别于纯软件竞争对手，但也把人工成本带进毛利率结构。

              定价是企业级、按合同定制；Augury 没有公开任何产品的标价、单机费用或分层结构。自 2021 年以来 $1M+ 账户增长到 3 倍，证明规模化后合同价值达到企业级，但仅靠公开信息无法得出可靠的平均合同价值或
              ASP。实施、上线和自研 Fast Track 部署方法论带来的专业服务收入，可能与订阅收入分开确认，但硬件、软件和服务之间的收入结构没有披露。参照可比工业 IoT-SaaS 基准，硬件加 SaaS
              的混合模式预计毛利率低于纯软件同行，可能在 55–70% 区间；但没有经审计财务数据，这一估计置信度低。
