          tone: positive
        - date: '2014'
          label: 首个美国 beta 项目
          detail: Augury 在美国推出 Auguscope，第一款连接智能手机的机器健康产品。
          tone: positive
        - date: '2019'
          label: 首次规模化预防机器故障
          detail: 处方式 AI 避免首次机器故障，节省数百万美元；企业价值主张得到验证。
          tone: positive
        - date: 2021-10
          label: Series E；企业级势头加速
