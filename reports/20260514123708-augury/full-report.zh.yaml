      - 当前合规状态
      - 潜在风险敞口
      - 严重性
      - 尽调路径
    rows:
      - - 欧盟《通用数据保护条例》（GDPR）
        - 欧盟
        - 适用于欧盟业务、欧盟客户数据以及平台中的任何个人数据（用户账户、员工数据）
        - 隐私政策于 Feb 2023 更新；提及 EU-U.S. DPF 传输机制；未确认独立审计
        - 单次违规罚款最高 €20M 或全球年营业额 4%
        - 高
        - 从数据室索取 GDPR DPA 协议、数据传输影响评估和事件登记册
      - - 欧盟人工智能法案（EU AI Act）
        - 欧盟
        - 工业场景中的生产关键 AI 故障检测可能被归为高风险 AI（Annex III）；Augury 有欧盟客户
        - 无公开合规姿态声明；法案 2024 年生效，2025–2026 分阶段执行
        - 强制性符合性评估、CE 标志、人工监督要求；不合规将阻断欧盟市场
        - 高
        - 获取法律分类意见；向管理层索取 EU AI Act 合规路线图和时间表
      - - CISA ICS/OT 网络安全指南（CPGs、SbD）
        - 美国（全球关键基础设施行业）
        - Augury 在能源、化工、食品饮料领域的客户受 CISA 指南约束；供应商安全姿态影响交易资格
        - 未确认公开 SOC 2 Type II、ISO 27001 或 IEC 62443 认证；Augury 未发布安全证明
        - 失去关键基础设施交易；可能被排除在政府周边采购之外
        - 高
        - 索取安全认证（SOC 2 Type II、ISO 27001、IEC 62443 等级）；渗透测试报告
      - - OSHA 机器安全标准（29 CFR 1910）
        - 美国
        - 适用于 Augury 传感器安装活动，以及客户基于 Augury 警报作出的安全相关维护决策
        - Augury ToU 中的保证和责任限制条款限制直接责任；客户安全义务仍然存在
        - 若工人安全事故可归因于错误的 Augury 警报，可能产生间接责任和声誉损害
        - 中
        - 审查客户合同中的赔偿和责任上限条款；确认安全关键用例免责声明
      - - FTC 广告与 AI 声明佐证
        - 美国
        - FTC 数据安全和真实性 AI 性能声明指南适用于 Augury 的 99.9% 准确率和 ROI 声明
        - 未发现 FTC 执法行动；准确率和 ROI 声明在营销材料中保持一致
        - 若无法佐证性能声明，可能遭遇执法行动或被要求修改声明
        - 中
        - 确认 99.9% 准确率声明依据；索取独立验证方法文档
      - - 美国出口管理条例（EAR）/ ITAR
        - 美国（出口至受限国家）
        - 若传感器 AI 平台被归为受控技术（EAR99 或 ECCN 4A994 类别），存在两用分类风险
        - 无公开出口管制分类文件；Augury 在 40+ 国家有客户
        - 向禁运或受限目的地出口可能需要许可证
        - 低至中
        - 索取出口分类判定；确认 BIS/OFAC 合规项目存在
      - - NERC CIP / AWIA 2018（行业特定）
        - 美国（能源、水务行业）
        - 若 Augury 传感器部署在 NERC CIP 或 AWIA 覆盖设施中，则间接适用
        - Augury 平台未公开说明 NERC CIP 或 AWIA 合规姿态
        - 若平台不能满足行业特定 OT 安全要求，可能被排除在能源和水务行业交易之外
        - 低至中
        - 确认 Augury 是否通过 NERC CIP 或 AWIA 供应商评估项目
      - - SEC Form D / 私募发行合规
        - 美国
        - 已确认三份 Form D 申报（2015 × 2、2020）；Series F（2025）Form D 尚未在 EDGAR 申报（或未找到）
