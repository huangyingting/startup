  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              Augury 处在三股竞争力量的交汇处：（1）AI 原生工业分析初创公司，横向覆盖制造业用例；（2）既有运营技术（OT）和自动化厂商，掌握工厂现场关系，并在既有装机基座上叠加 AI 能力；（3）相邻平台公司，包括
              IIoT 平台、CMMS 提供商和可靠性硬件厂商，正在扩展到 AI 分析。每类竞争者都面向同一类买方（工业维护和运营负责人），但价值主张、定价模型和进入市场动作不同。


              Verdantix Green Quadrant Industrial AI Analytics 2025 报告是该领域最权威的独立竞争基准。在 19 家被评估厂商中，9 家被列为领导者——包括
              Augury——验证了市场的竞争密度。领导者既包括初创公司（Augury），也包括既有巨头（AspenTech、Emerson、ABB、Rockwell Automation、Honeywell 等），说明
              Augury 所处赛道里，拥有数十亿美元收入基座和数十年客户关系的全球工业集团也在积极竞争。


              2025–2026 年的核心竞争动态是整合。总部位于芝加哥的工业 AI 初创公司 Uptake 于 2026 年 3 月宣布将被 Bosch 收购，说明大型工业集团更倾向收购预测性维护能力，而不是从零自建。GE
              Digital 的 Predix 平台在 GE Vernova 分拆中脱离 GE，且 GE 已重组为三个独立公司（Aerospace、Vernova、HealthCare）——这意味着 Predix 的工业 AI
              路线图处在过渡期。PTC ThingWorx 已改名并纳入 Velotic 平台，显示 M&A 驱动的平台整合仍在继续。Augury 作为 Production Health
              类别中唯一仍独立存在的独角兽，既获得市场重要性验证，也面临市场成熟后被资源更强的既有厂商夹击的风险。


              Augury 价值主张的现状替代方案包括：（1）通过传统 CMMS
              软件管理的定期预防性维护（PM）计划；（2）成本受限工厂里的反应式（故障后抢修）维护；（3）内部可靠性项目，由路线式技师携带手持分析仪做人工振动分析；（4）没有 AI 原生状态监测的大型 ERP
              资产管理模块（SAP PM、IBM Maximo）。这些替代方案都争夺同一笔维护预算，要求 Augury 的 ROI 叙事替换既有工作流，而不是简单叠加一个新工具。
