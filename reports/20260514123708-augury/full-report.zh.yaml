      - number: '1.2'
        title: 平台组合与技术
        blocks:
          - type: paragraph
            body: >-
              Augury 的产品组合围绕三项一体化能力展开：Machine Health、Process Health 和 Halo R4000 边缘 AI 传感平台。Machine Health
              使用振动、温度和超声传感器，结合 AI 模型和超过 300,000 台受监测机器的网络，在旋转设备故障造成计划外停机之前进行预测。公司称故障检测准确率为 99.9%，部署后平均 30
              天出现首次机器改进。在已安装基座中，系统大约每 43 分钟检测或预防一次故障。


              Process Health 是 Augury 在 2022 年收购以色列初创公司 Seebo 后推出的产品，它把 AI 用于制造流程数据，识别导致良率损失和浪费的低效环节。Augury
              披露的客户结果包括：Process Health 部署后，良率提升 9%、浪费减少 37%、天然气消耗减少 5%、产能提升 7%。Machine Health 与 Process Health 合在一起构成
              Production Health 平台；Augury 将其定位为面向制造商的完整 Industrial AI 操作系统。


              Halo R4000 系列于 2024 年 11 月推出，公司称其为首个工业级、边缘 AI 原生的机器健康传感平台。它把传感采集、设备端推理和连接能力整合进一个加固形态，适用于严苛制造环境。Halo R4000
              是 Augury 智能体工业 AI 路线图的核心：系统会自主建议维护决策，并最终在无人介入下执行。
