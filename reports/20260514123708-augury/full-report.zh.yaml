      - number: '7.5'
        title: 执行与领导力风险
        blocks:
          - type: paragraph
            body: >
              创立 15 年后，Augury 两位联合创始人仍是公司战略方向和客户关系的核心：Saar Yoskovitz 担任 CEO，Gal Shaul 担任联合创始人和董事会董事。SEC Form D（2020）将
              Yoskovitz 列为执行官、Shaul 列为董事，确认创始人持续参与公司最高层。关键人物依赖是企业 B2B 公司中有充分记录的风险：创始人离任或失能，会扰动客户信任、投资人信心和战略合作。2025 年 2
              月任命 Elan Greenberg 为 COO（曾参与扩张 DoorDash 和 Flock Safety）通过增加运营深度，部分缓释了这一风险；但公司没有公开披露永久 CEO 继任计划。

              国际执行风险显著：Augury 运营于 40+ 个国家，并采用以色列技术、New York 商业的混合结构。跨不同监管环境、语言、工业标准和客户采购流程扩张，会带来执行复杂度。2022 年收购
              Seebo（以色列公司）增加了 Process Health 能力，但也带来集成复杂度、人员对齐风险和资产负债表义务，其解决情况尚未公开确认。MaintainX CMMS 合作（根据媒体中心新闻稿归档，于
              2026 年 3 月宣布）和 Fortune Brands Innovations 联盟（2025 年 5 月）都存在合作伙伴集成风险：如果伙伴集成表现不佳，或伙伴把维护工作流导向竞争方案，Augury
              的间接渠道收入可能停滞。

              工业 AI 的人才风险很高。AI/ML 工程师、IoT 硬件专家和工业可靠性领域专家（振动分析师、可靠性成功经理）的竞争激烈。Augury 招聘页面显示仍在积极招聘，但来自超大规模云厂商和资金充足 AI
              初创公司的薪酬压力，可能在中层个人贡献者层面制造留才挑战。跨 40+ 国家管理传感器硬件、软件和托管服务混合交付模式，组织复杂度会随客户基础以非线性方式增加，带来流程和执行风险。Glassdoor
              评论信号（直接访问受阻）是重要反向数据源，值得在数据室中做定向尽调。
