  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 当前估值与融资背景
        blocks:
          - type: paragraph
            body: >
              Augury 最近一次 $1B+ 估值标记出现在 2025 年 2 月 19 日：公司完成由伦敦影响力投资机构 Lightrock 领投的 $75M Series F，现有投资人 Insight
              Partners、Eclipse Ventures、Qumra Capital、La Maison Partners、SE Ventures（Samsung Electronics 的风险投资部门）和
              Qualcomm Ventures 共同参投。$1B+ 不是上轮抬价：Augury 2021 年 10 月 Series E 的投后估值为 $1.5B，意味着随后 40 个月估值压缩约 33%。Augury
              官方新闻稿把 Series F 描述为相对近期私募市场可比公司「估值上升」——考虑到 2022–2023 年市场修正让多数 SaaS 和工业科技独角兽估值压缩
              30–60%，这种说法在技术上站得住；但绝对估值低于前高，投资人仍应审视这一表述。

              累计融资估计约 $369M，CB Insights 报告了这一数字，也与已披露各轮金额加总基本一致。SEC EDGAR 记录确认 Augury Inc.（CIK 0001651145）是一家 Delaware
              corporation，至少提交过三份 Form D 豁免发行备案（2015 年 8 月 ×2、2020 年 10 月）；系统中没有 S-1 或其他公开证券注册文件，确认 Augury 仍是私营公司。截至
              2026 年 5 月，公开声明或备案中未发现近期 IPO 信号。

              Series F 资金用于加速智能体 AI 能力创新，并扩大企业部署规模。Augury 称公司自创立以来已为客户累计创造约 $1B 价值，并披露在 40+ 个国家运营，服务 170+ 家全球制造客户，分析
              1.1B+ 小时机器数据，诊断 300,000+ 台设备。这些牵引指标由公司提供，未经独立审计，但与 Lightrock 和 Insight Partners 在投资组合评论中描述的运营规模一致。2025 年 7
              月由 Augury 委托 Forrester Consulting 完成的 Total Economic Impact 研究，是最严格的第三方财务验证：收入 $20B 的综合企业客户三年 ROI 为
              310%，NPV 为 $20.1M，回本期不到 6 个月。若套用到 170+ 家客户，理论机群层面 NPV 约
              $3.4B——超过当前估值的三倍——但这个自下而上的计算取决于综合客户画像是否具有代表性，更适合作为上限而非中心估计。
