  - id: FE001
    title: 产品架构图
    type: stack
    layout: standard
    sourceRefs:
      - SE002
      - SE003
      - SE005
      - SE006
    data:
      layers:
        - label: 用户界面与集成层
          modules:
            - 网页仪表盘（故障告警、严重度评分、KPI 趋势）
            - CMMS/EAM 工单集成（SAP、IFS Ultimo、MaintainX）
            - ERP 工艺数据连接器（Production Health）
            - Endpoint 社区门户
          note: Interoperability-as-a-Service delivers pre-built connectors; ThingWorx Ready certified
        - label: 托管服务层
          modules:
            - 人工振动分析师网络（认证、全球）
            - 诊断报告生成
            - 客户成功工程
            - 生成式 AI 自然语言摘要（开发中）
          note: Human review closes feedback loop; analyst capacity is a known scaling constraint
        - label: 云端 AI 与分析层
          modules:
            - Machine Health AI 引擎（1.1B+ 小时训练数据，300K+ 台机器）
            - Production Health 处方式 AI（源自 Seebo 的工艺连接器）
            - 模型训练管线（Azure 云）
            - 强化学习循环（路线图）
          note: Microsoft Azure backbone; 25+ pump and 28+ motor fault type models
        - label: 数据管理层
          modules:
            - 时序机器数据存储
            - 生产工艺数据摄取器
            - 带标注故障事件档案（13+ 年语料）
            - 传感器配置与基线注册表
          note: Core proprietary asset — 1.1B+ hours of labeled machine data
        - label: 边缘计算层
          modules:
            - Halo R4000 边缘 AI 推理（IP66/68/69、40G、2×2 英寸）
            - 自动基线建立（48 小时自校准）
            - 传感器融合（振动 + 温度 + 相位分析）
          note: Launched November 2024; on-device inference reduces cloud bandwidth and latency
        - label: 物理感知层
          modules:
            - Ranger Pro 传感器（压电三轴、ISA100.11a、IP67、AES-128、X.509）
            - Halo R4000 传感器（原生边缘 AI、IP66/68/69、40G 冲击）
            - 振动（高频）、超声、温度、磁场
            - ISA100.11a 网关（40 个传感器 / 网关，蜂窝 / 以太网回传）
          note: Baker Hughes OEM partnership covers Ranger Pro supply chain; Halo R4000 supply not disclosed
