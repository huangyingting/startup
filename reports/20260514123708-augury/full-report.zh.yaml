      - number: '6.2'
        title: 关键客户案例研究
        blocks:
          - type: paragraph
            body: >
              Augury 的公开客户记录包括多家食品饮料、消费品和工业领域的具名 Fortune 500 及全球制造商。PepsiCo 是公开被引用的 Augury
              客户，使用机器健康监测覆盖多座工厂，以减少非计划停机并提升设备可靠性。DuPont 已在特种化学品和材料制造业务中部署 Augury 的 AI 解决方案，提高设备可靠性。Colgate-Palmolive
              在消费品制造设施中使用 Augury，借助预测性维护维持高速包装和生产线。General Mills 将 Augury 用于食品制造业务，在该场景下非计划停机会造成显著产品损失。Heineken
              已在多个饮料制造站点部署 Augury。


              公开资料中最详细的案例研究来自 Fortune Brands Innovations（NYSE: FBIN），该公司于 2025 年 5 月发布结果。Fortune Brands 位于 North
              Carolina 的 Fiberon 工厂将 40 台机器接入 Augury AI 后，8 个月内实现 2.5x ROI。试点成功推动了全企业部署，覆盖美国、英国和墨西哥 16 个站点的 1,000+ 台机器。在
              12 个月部署过半时，1,000 台目标机器中已有三分之二接入。全球制造运营副总裁 Todd Piatt 表示，对 Augury AI
              准确性的信任「很快建立起来」，双方协作提供了「对设备健康状况无可比拟的可见性」。Machine Health 项目负责人 Pat Knox 指出，早期避免一次灾难性熔体泵故障「为 2.5 倍回本奠定了基础」。


              Forrester TEI 研究的定性访谈包括一家全球食品饮料制造商；Augury 的 Machine Health 解决方案帮助该客户在三年、多站点部署中避免约 10,000 小时非计划停机，挽回超过 25
              million 磅本会损失的产品。Augury 网站上的其他客户证言还包括 100% 预测准确率（一家纸巾制造商）、正常运行时间从 65–70% 提升到 85–90%（Circulus CEO Mike
              Dulin），以及维护团队工作方式的文化转变（Nefco Biosolids 的 Bill Hollman）。
