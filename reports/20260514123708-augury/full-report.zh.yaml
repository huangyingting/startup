      - number: '6.5'
        title: 客户集中度、留存与风险分析
        blocks:
          - type: paragraph
            body: >
              Augury 的客户基础存在集中度和留存风险，投资人应在尽调中重点审查。以 170+ 客户支撑 $1B+ 估值，Augury 隐含的单客户收入指标偏高，说明单个大型企业账户可能占总 ARR
              的重要比例。公司没有公开披露净留存率（NRR）、总留存率（GRR）或客户流失率；这些指标是企业 SaaS 公司证明经常性收入健康度和可预测性时的标准披露。


              Fortune 500 客户和 $1M+ 账户自 2021 年以来增长到 3 倍，说明既有账户内净扩张强劲；但没有 NRR
              数据，无法评估绝对留存率，也无法量化较小账户流失带来的下行压力。客户基础被单一垂直集群（食品、饮料和
              CPG）主导，使公司暴露于这些行业周期性资本开支模式。经济下行时，工业资本开支决策常被推迟，可能给新客户获取和合同续约带来逆风。


              预测性维护解决方案的企业销售周期通常为 6–18 个月，因为需要可靠性、IT、财务和运营团队等多方利益相关者对齐。这会造成收入波动和预测风险，尤其是在获取新客户时。TrustRadius 等评论平台将
              Augury 列为正面客户情绪，重点在 AI 准确性和可靠性专家支持上；但相对于完整客户基础，样本规模较小。研究期间无法访问 G2 和 Capterra
              资料。公开客户级财务表现数据缺失——包括扩张率、续约率和实施成功指标——是公开证据基础中的重要缺口，必须在管理层尽调会议中解决。
