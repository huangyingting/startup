  - id: TR002
    title: 监管 / 法律风险登记表
    enumerationScope:
      coverage: partial
      basis: >
        Rows cover all identified regulatory and legal risk obligations for Augury as of May 2026, derived from EU AI
        Act policy documentation, GDPR and EU data protection regulatory sources, CISA ICS guidance, OSHA machine safety
        standards, FTC privacy enforcement guidance, and SEC EDGAR filing records. No litigation or regulatory
        enforcement actions against Augury have been identified in public records. Export control and sector-specific
        regulations (NERC CIP, AWIA 2018) are noted as potential but unconfirmed risks.
    notes: |
      状态仅基于公开证据；Augury 未就多数所列法规发布合规姿态声明。严重性反映不合规时可能产生的财务、运营或声誉风险敞口。尽调路径说明需要从数据室或管理层获取的信息。
