            body: >-
              Augury 由联合创始人兼 CEO Saar Yoskovitz 领导，他把公司从海法一家两人机器诊断初创公司，带到估值 $1B+ 的成长阶段 Industrial AI 平台。联合创始人 Gal Shaul
              继续承担技术领导角色。2025 年 2 月，Augury 聘请 Elan Greenberg 担任首席运营官；Greenberg 曾任公共安全科技公司 Flock Safety 的 COO，并在 DoorDash
              和 OpenTable 担任高管，带来与 Augury 全球企业扩张相关的运营规模化经验。除这三人之外的 C-suite 构成和完整董事会成员未在公开材料中披露。


              关键里程碑包括：2011 年创立；2021 年 10 月 Series E 获得独角兽身份；2022 年收购 Seebo 并推出 Process Health；2024 年 11 月发布 Halo
              R4000；2025 年 2 月完成 Series F 并聘任 COO；2025 年发布 Forrester TEI 研究并获得 Verdantix Green Quadrant 领导者奖项；2026 年 3
              月与 MaintainX 建立集成合作。


