  - id: TE001
    title: 产品模块 / 资产矩阵
    notes: |
      截至 2026 年 5 月，Augury 有六个商业化活跃产品模块，覆盖预测性维护、工艺优化、集成服务、金融风险转移和社区。成熟度状态和 GA 日期来自官方新闻稿和产品页面。
    sourceRefs:
      - SE001
      - SE002
      - SE003
      - SE004
      - SE006
      - SE009
      - SE013
      - SE030
    columns:
      - 模块
      - 目标用户
      - 资产 / 工艺范围
      - 成熟度
      - 主要差异化
      - 关键尽调缺口
    rows:
      - - Machine Health CR
        - 可靠性工程师、维护经理
        - 关键旋转资产（泵、电机、风机、压缩机、齿轮箱）
        - 2016 年以来 GA；持续更新
        - 1.1B+ 小时训练数据；25+ 种泵故障、28+ 种电机故障类型；声称准确率 99.9%+
        - 准确率基准未获独立验证；传感器在线率无公开 SLA
      - - Machine Health SE
        - 工厂经理、维护团队
        - 支持类设备，覆盖工厂旋转设备群的 60%+
        - 自 2021 年 11 月起 GA
        - 首个用轻量传感器部署，在规模上经济覆盖支持类设备的平台
        - SE 类别的故障覆盖和准确率基准未与 MH CR 分开发布
      - - Production Health
        - 工艺工程师、持续改进经理
        - 产线工艺（混合、灌装、包装、CNC、批处理）
        - 2022 年以来 GA（Seebo 收购）；处方型 AI 叠加层
        - 整合机器传感器数据与工艺数据，给出纠偏动作；废品减少 37% 的基准
        - 已在离散制造和批量制造中验证；连续流程行业覆盖未形成文档
      - - Interoperability-as-a-Service
        - IT/OT 集成商、维护经理
        - CMMS/EAM/ERP 系统（SAP、IFS Ultimo、MaintainX、Infor）
        - 约 2020 年以来 GA；2021 年获 ThingWorx Ready 认证
        - 从故障告警双向创建工单；获得 PTC ThingWorx Ready 认证
        - ERP/CMMS 映射深度因系统而异；自定义连接器可能增加实施成本
      - - Guaranteed Diagnostics
        - 风险经理、CFO、采购
        - Augury 平台 AI 诊断输出（所有覆盖资产类型）
        - GA；由 HSB（Munich Re 子公司）提供保险支持
        - 业内首个由保险背书的漏诊财务责任；降低客户风险敞口
        - 承保限额、除外责任和理赔流程未公开披露
      - - Endpoint Community
        - 所有 Augury 平台用户、维护工程师
        - 跨资产类型、跨行业共享知识
        - 2022 年起 GA
        - 面向一线实践者的社区，支持基准对标、故障模式共享和同行评审诊断
        - 活跃用户数、贡献率和社区 ROI 指标未公开
  - id: TE002
    title: 工作流 / 用例表
    notes: |
      五个主要用例，展示 Augury 平台如何嵌入客户运营工作流；公开来源记录了可量化收益和已知限制。
    sourceRefs:
      - SE001
      - SE006
      - SE007
      - SE008
      - SE015
      - SE016
    columns:
      - 用户任务
      - 未使用 Augury 的现有工作流
      - Augury 方案
      - 可量化收益
      - 限制
    rows:
      - - 在停机前预测机械故障
        - 按时间表做定期维护（PM），或故障后再抢修
        - Machine Health 传感器持续监测振动、超声、温度；AI 可提前数周到数月发现异常
        - Forrester TEI 2024 复合客户三年 ROI 310%；停机损失减少 $16.8M
        - 每台纳入监测的资产都要装硬件；IT/OT 网络分段增加复杂度
      - - 按风险给维护工单排序
        - 技术员人工巡检，定期记录检查日志
        - AI 生成严重度评分，并借助 IaaS 以预填工单形式接入 CMMS
        - 整体维护支出减少 15%；吞吐量提升 5%（Forrester TEI）
        - 严重度评分准确性取决于基线质量；新安装点需要 48 小时学习期
      - - 提升生产良率、减少浪费
        - 工艺工程师靠试错调参；人工做 SPC 分析
        - Production Health 给出具体参数调整建议，消除浪费和良率损失的根因
        - 据 Augury 客户基准，浪费减少 37%，良率提升 9%
        - 工艺连接器已验证离散 / 批处理场景；连续流程行业尚无记录
      - - 把诊断接入维护管理系统
        - 人工把故障警报复制粘贴进 CMMS；每套系统单独开发自定义 API
        - Interoperability-as-a-Service 提供面向 SAP、IFS Ultimo、MaintainX、Infor 的预置连接器
        - 集成时间从数周缩短到数天；支持工单生命周期自动管理
        - ERP/CMMS 数据交换深度取决于连接器成熟度；部分系统可能需要专业服务
      - - 远程监测 OEM 安装的设备
        - 客户投诉后再派现场服务；没有连续远程可见性
        - OEM 合作模式（Grundfos、Carrier、Trane）在制造环节嵌入 Augury 传感器，并经由 Augury 云监测
        - 支持预测式服务排程；降低 Grundfos 现场服务派单成本
        - OEM 集成取决于具体合作关系；并非所有 OEM 品牌可用
  - id: TE003
    title: 技术 / 运营架构表
    notes: |
      六层架构从物理传感延伸到面向用户的集成，依据 Augury 产品页、技术数据表和新闻稿整理。依赖与风险列来自对公开技术信息的分析。
    sourceRefs:
      - SE002
      - SE003
      - SE005
      - SE006
      - SE021
      - SE022
    columns:
      - 层 / 组件
      - 作用
      - 技术 / 依赖
      - 风险
    rows:
      - - 边缘传感层
        - 在资产端采集原始机器信号数据
        - Ranger Pro（压电三轴、ISA100.11a）和 Halo R4000（边缘 AI、IP66/68/69）；多模态传感器
        - Ranger Pro 供应依赖 Baker Hughes 合作关系；Halo R4000 供应链未披露
      - - 边缘 AI 推理（Halo R4000）
        - 在传感器本地运行故障分类模型，降低云端带宽占用和延迟
        - Halo R4000 内嵌自研边缘 AI SoC；模型更新机制未公开
        - OTA 固件 / 模型更新安全性未公开说明；更新不频繁会导致边缘模型漂移
      - - 无线网关 / 连接
        - 每个网关汇聚最多 40 个 Ranger Pro 传感器的数据，再传到云端
        - ISA100.11a 网关；128-bit AES 和 X.509 保障安全回传；支持蜂窝或以太网回传
        - 网关可用性是传感器集群的单点故障；冗余方案未说明
      - - 云端 AI 平台
        - 承载高级故障诊断、Production Health 分析和模型训练所需的深度学习模型
        - Microsoft Azure 云基础设施；自研 ML 管线基于 1.1B+ 小时机器数据训练
        - 依赖 Azure 带来 SLA 和数据驻留考量；模型再训练管线未公开
      - - 人工专家复核层
        - 认证振动分析师复核 AI 输出、标注边缘案例，并向客户交付诊断报告
        - 自有分析师网络；人在回路验证闭合 AI 反馈循环
        - 分析师产能限制扩张；高传感器密度部署会消耗大量人力
      - - CMMS / ERP 集成层
        - 把 Augury 诊断输出转成工单、备件触发和 KPI 看板
        - 面向 SAP、IFS Ultimo、MaintainX、Infor 的 Interoperability-as-a-Service 连接器；通过 ThingWorx Ready 认证
        - 集成深度取决于连接器成熟度；自定义 ERP 集成可能需要专业服务
