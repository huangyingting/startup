      - number: '2.2'
        title: 市场规模与增长轨迹
        blocks:
          - type: paragraph
            body: >-
              全球 PdM 市场已有活跃分析覆盖，主要有四组公开估算。MarketsandMarkets（2025）估计核心 PdM 市场 2026 年为 $13.89B，到 2031 年增至 $23.79B（CAGR
              11.4%）；另将 AI 驱动 PdM 子板块估为 2026 年 $2.61B，到 2032 年增至 $19.27B（CAGR 39.5%）——这一子板块最贴近 Augury 的竞争空间。Grand View
              Research 预测市场从 2022 年 $7.85B 增至 2030 年 $60.13B（CAGR 29.5%）。Mordor Intelligence 估计 2025 年 $14.09B，到 2031
              年增至 $82.17B（CAGR 34.14%）。Allied Market Research 给出最激进估算：2023 年 $10.1B，到 2033 年 $162.1B（CAGR 32.2%）。


              CAGR 估算从 11% 到 34% 差异很大，反映的是真实市场边界差异，而不是分析错误。窄口径（专用旋转设备 PdM）给出较低 CAGR；宽口径（包括质量和流程分析在内的全部运营 AI）给出较高
              CAGR。MarketsandMarkets 的 AI 驱动子板块 CAGR 39.5%，是 Augury 最直接相关的基准，因为它把 ML/AI 原生厂商从传统振动监测中分离出来。IoT Analytics 在
              2024 年市场规模研究中独立佐证了 PdM 的强劲双位数增长。尽调中，最保守且可辩护的 TAM 表述，是 2025–2026 年约 $14B，到 2031 年按边界假设增至 $24–80B。


              Augury 只做企业客户，使 TAM、SAM 和 SOM 的拆分更复杂。公司瞄准 Fortune 500 和大型制造商；其 SAM 很可能只是整个 PdM 市场的一部分。Augury 拥有 170+
              个活跃企业客户和 1M+ 台受监测机器，已经在制造业 PdM 买方金字塔的高端验证了商业速度，但精确 ARR 和市场份额仍未披露。
