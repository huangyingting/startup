      - number: '4.4'
        title: 单位经济模型与客户回报
        blocks:
          - type: paragraph
            body: >
              Augury 的客户单位经济模型，部分可由 2025 年 9 月 Forrester Total Economic Impact（TEI）研究看见；该研究由 Augury 委托完成。Forrester
              访谈了多个行业的企业客户，并构建了一个综合组织，画像为年收入 $20B 的美国大型制造商。该综合组织实现了 310% 的三年 ROI、$20.1M 的 NPV，初始部署后的回本周期少于 6 个月。

              Forrester 分析中的关键价值驱动因素包括：靠主动检测机器故障，三年节省 $16.8M 非计划停机成本；从被动维护转向主动维护，维护支出下降 15%（三年 $1.5M）；产能提升 5%，带来 $7.5M
              额外利润。其他未量化收益包括员工生产率提升、可持续性改善和劳动力安全增强。一家食品饮料制造客户称，三年内避免了 10,000 小时非计划停机，挽回超过 25 million 磅产品。

              这些数字验证了有吸引力的企业 ROI，但解读要谨慎：Forrester 综合样本来自被筛选客户访谈，并按大型企业场景（$20B 收入）构建，可能不能代表小型或中端市场部署。Augury 在一般营销材料中另称客户
              ROI 为 5-20x，Lightrock 的投资逻辑也引用了规模化部署时 5-20x ROI。Fortune Brands Innovations 独立佐证了单一站点在全企业扩展前 8 个月内实现 2.5x
              ROI。客户层面的证据足以有力验证企业价值主张，但直接单位经济模型输入——CAC、LTV、NRR、平均合同价值和分产品线毛利率——仍未披露，必须从数据室获取。
