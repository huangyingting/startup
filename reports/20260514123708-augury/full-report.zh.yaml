      - number: '7.3'
        title: 技术与运营风险
        blocks:
          - type: paragraph
            body: >
              Augury 的核心技术风险，是在客户制造环境内部署联网 IoT 传感器所形成的 OT/ICS 网络安全攻击面。CISA 明确将 ICS/OT 环境列为民族国家和犯罪威胁行为体的高优先级目标，并指出传统 OT
              系统缺少加密、认证和现代安全控制。Augury 传感器会通过客户网络持续传输生产关键设备的机器数据，在运营技术环境内部形成持续网络存在。无论攻击目标是 Augury
              云基础设施、传感器固件，还是客户侧网络网关，安全失陷都可能暴露客户的自有流程参数、机器规格和生产排程等敏感
              IP。更糟的是，恶意行为者可能操纵健康告警（压制真实警告或制造误报），导致客户现场设备故障或生产中断。截至 2026 年的 NVD 记录没有显示专门归因于 Augury 平台的 CVE，但这一风险类别在工业
              IoT 厂商中已有充分记录。

              AI 模型准确率风险是第二个重大运营问题。Augury 称故障检测准确率为 99.9%，但假阴性——AI 模型漏掉的故障——在工业场景中后果极重：非计划停机、设备损坏、安全事故，以及来自依赖 Augury
              健康告警客户的潜在责任敞口。AI 模型基于特定机器数据语料训练；部署到新型机器、异常运行环境，或带有非标准传统设备的棕地工厂时，模型表现可能在已测试参数之外下降。异构棕地制造环境中的集成复杂度（多样化 SCADA
              系统、PLCs、历史数据库和 CMMS 平台）会制造部署摩擦，拉长价值实现时间，并带来项目失败风险。

              硬件供应链风险正在上升：Halo R4000 依赖 Qualcomm 边缘 AI 芯片组（Qualcomm Ventures 是 Series F
              投资人），形成供应商依赖。传感器制造中断、零部件短缺或地缘政治供应链冲击，可能削弱 Augury
              履行企业客户硬件部署承诺的能力。公司的人类专家层（振动分析师、RSMs）既是竞争护城河，也是可扩展性约束：托管服务人员规模随客户基础一起增长，会带来运营杠杆风险。
            claimRefs:
