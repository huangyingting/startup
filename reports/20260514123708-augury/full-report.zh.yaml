      - number: '8.5'
        title: 投资建议与结论
        blocks:
          - type: paragraph
            body: >
              投资立场：TRACK / CONDITIONAL INVEST。当前 $1B+ 估值在基准情景下有分析支撑，但熊市下行空间不小，且仅靠公开数据无法排除。根本约束是财务不透明：Augury 未披露
              ARR、NRR、毛利率、burn rate 或 cap table 细节。所有正面指标——收入增长五倍、$1M+ 账户数增长三倍、Forrester TEI 310%
              ROI——都由公司提供且未经审计。没有这些数据，在 $1B+ 估值上做高确信投资，更像投机，而不是证据驱动的承销。

              支撑有条件投资假设的五个正面因素是：（1）经 Forrester TEI 独立验证的客户 ROI，明显优于试点阶段 AI 部署；（2）可验证的 Fortune 500
              锚定客户，PepsiCo、DuPont、Colgate-Palmolive 均被点名确认，可提供可引用收入；（3）由 Verdantix Green Quadrant 2025
              独立验证的品类领导地位；（4）高质量投资人集团 Insight Partners、Lightrock、SE Ventures、Qualcomm Ventures 在 $1B+ Series F
              中继续参投，向内部增长信心释放信号；（5）AI 驱动 PdM 市场 39.5% CAGR 带来的结构性顺风，其 TAM 扩张速度快于多数工业软件品类。

              将结论限制为 CONDITIONAL 的五个风险是：（1）估值较 2021 年 Series E 峰值压缩 33%，引出一个问题：5x 收入增长究竟跑赢还是落后于原始预测；（2）财务透明度为零——没有
              ARR、NRR、毛利率或盈利时间表——独立承销无从开展；（3）资本充足的 OT incumbents（Siemens、ABB、Honeywell、Emerson）正在把原生 AI 嵌入既有硬件栈，可能商品化
              Augury 核心机器诊断功能；（4）C3.ai 2.26x EV/Revenue 交易倍数，为无法证明持久增长和盈利路径的工业 AI 平台提供了警示先例；（5）看不到 IPO 或 M&A 退出催化因素，限制
              Series 阶段投资人的近端流动性。

              升级为 INVEST 的条件是：（1）经审计财务确认 ARR ≥$60M；（2）客户 cohort 数据证明 NRR ≥110%；（3）毛利率 ≥60%，确认可扩展 SaaS 经济性；（4）burn rate 与
              Series F 资金支持 ≥24 个月 runway 一致；（5）有可信的 24 个月盈利或 IPO ready 路径。这些条件只能通过 data room 访问和管理层尽调验证。
