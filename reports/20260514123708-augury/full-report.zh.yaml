      - number: '6.4'
        title: 合作伙伴与渠道客户关系
        blocks:
          - type: paragraph
            body: >
              Augury 已建立多项战略合作，把客户触达做远，也加深其在制造技术栈中的集成。最重要的渠道合作，是 2026 年 3 月与 MaintainX 的集成；MaintainX 是领先
              CMMS（计算机化维护管理系统）和 EAM 平台，服务全球数千个制造站点。Augury–MaintainX 集成把 Augury 的 AI 驱动机器健康预测直接接入 MaintainX
              的工单管理工作流，让维护团队在 Augury 检测到即将发生的机器故障时，自动生成并分配工单。该集成形成双向数据流，消除了故障检测与维护执行之间的人工交接，缩短修复时间并提升资产利用率。


              Fortune Brands Innovations 于 2025 年 5 月成为旗舰合作伙伴-客户，此前它从 Fiberon 的成功试点推进到覆盖 16 个制造站点的全企业承诺。该关系出现在 2025 年 5
              月 2 日发布的 Genbiz Video Series 中一集 Bloomberg Originals 里，也把 Fortune Brands 定位为 Augury 全栈企业部署方法论的参考客户。公司使用
              Augury 的 Fast Track 方法论，即一个结构化的 12 个月企业部署流程，支持从试点快速扩展到多站点部署。


              Verdantix 在 2025 年工业 AI 分析软件 Green Quadrant 中将 Augury 评为领导者；19 家被评估厂商中，只有 9 家获得这一称号。该分析师认可提升了 Augury
              在潜在客户进行技术供应商评估时的可信度。投资人伙伴 Lightrock 和 Insight Partners 提供被投公司网络触达，SE Ventures（Shell）和 Qualcomm Ventures
              则增加能源和半导体行业客户关系。公司维持与领先 ERP、DCS 和 CMMS 平台的集成，扩大了可服务部署基座。
