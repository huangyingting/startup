        - 工业自动化 + 状态监测
        - 收入约 $16B；持有 AspenTech 主要股份；流程仪表领导者
        - 石油与天然气、化学品、电力、生命科学流程工业
        - 流程工业关系深；传感器 + 控制 + 分析集成
        - 聚焦流程工业；托管 AI 服务弱于 Augury 专家分析师
      - - Honeywell (Forge)
        - 通过 Honeywell Forge 平台做工业 AI
        - 收入约 $35B；大型工业 / 航空航天集团
        - 制造、石油与天然气、楼宇管理、航空航天
        - 品牌信任；工业覆盖面广；Forge 互联工业 AI 平台
        - AI 是传统控制系统附加层；独立机器健康深度有限
      - - IBM Maximo
        - 企业资产管理（EAM）/ CMMS
        - IBM 的一部分（收入 $60B+）；Maximo 是市场领先 EAM 平台
        - 公用事业、铁路、石油与天然气、政府；资产密集型行业
        - 资产、工单、维护历史的记录系统；面向 APM 的 AI
        - 聚焦 IT/EAM 层；没有自研传感器；Augury 与其集成而非替代
      - - Rockwell Automation
        - 带 AI 覆盖层的工业自动化
        - '收入约 $9B；NYSE: ROK；美国工业自动化领导者'
        - 离散制造：汽车、食品饮料、生命科学
        - Allen-Bradley PLC 和 Plex MES 装机基础深；自动化到自主化的 AI 战略
        - AI 层建立在自动化硬件上；不专注基于振动的机器健康
      - - AVEVA
        - 流程与工业软件（Schneider Electric 子公司）
        - Schneider Electric 的一部分（收入约 €36B）；全球工业软件平台
        - 石油与天然气、电力、海事、食品饮料、流程工业
        - 统一工程、运营和绩效管理软件套件
        - 以软件为中心；传感器硬件有限；AI 只是大型平台的一个组件
      - - Fluke Reliability
        - 一体化可靠性硬件 + CMMS + AI 分析
        - Fortive 的一部分（收入约 $6B）；整合 eMaint + Prüftechnik + Azima DLI
        - 制造、汽车、食品饮料领域的维护和可靠性团队
        - 把 CMMS、振动硬件和 AI 分析整合到一个品牌
        - AI 成熟度（Azima DLI）验证不如 Augury 充分；CMMS 强项是 eMaint，不是 AI 优先
      - - PTC ThingWorx (Velotic)
        - 智能制造 IIoT 平台
        - PTC 的一部分（收入约 $2B）；ThingWorx 现以 Velotic 平台品牌运营
        - 智能制造、远程服务、产品生命周期管理
        - 灵活 IIoT 平台；强在离散制造 PLM 集成
        - 只有平台——没有托管服务、没有自研传感器、没有预置机器健康 AI
      - - 现状（人工振动 / PM）
        - 内部 / 替代品
        - 没有供应商；嵌在现有维护组织和 CMMS 中
        - 所有制造业细分；在 SMB 和未数字化工厂中占主导
        - 前期成本低；现有流程；没有技术采用风险
        - 被动；无法预测故障；需要熟练振动分析师；没有规模收益
