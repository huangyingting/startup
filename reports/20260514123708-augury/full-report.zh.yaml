      - number: '3.3'
        title: 传统 OT 与自动化既有厂商竞争对手
        blocks:
          - type: paragraph
            body: >-
              AspenTech 是一家 $15B+ 工业软件公司，向流程行业提供资产绩效管理（APM）、高级过程控制和工程生命周期软件。AspenTech 的 MTell
              是其主要预测性维护产品，使用机器学习分析传感器数据，为油气、化工和炼化行业提供早期故障预警。AspenTech 在 APM 层与 Augury 竞争，但它从工程软件传统切入问题——强项是流程仿真、优化和
              APC；与 Augury 的传感器 + AI 堆栈相比，它在离散制造和旋转设备上的机器健康诊断较弱。Emerson 与 AspenTech 的战略联盟（Emerson 持有 AspenTech
              重要股份）在流程行业形成了工业软件 + 自动化仪表的组合竞争包。


              ABB 是全球领先的电气化和自动化技术供应商之一，业务覆盖电机、驱动器、机器人和过程自动化。ABB Ability 平台提供工业 AI 能力，包括状态监测、能源分析和资产绩效管理。ABB
              的竞争优势在于跨行业庞大的全球电机和驱动器装机基座——它可以向自有硬件客户增售 AI 诊断，形成 Augury 难以轻易进入的封闭生态。竞争视角下，ABB 的局限在于其 AI 诊断往往为 ABB
              设备做窄向优化，而不是像 Augury 那样用设备无关传感器监测异构设备群。


              Siemens 是全球工业技术巨头，运营 Industrial Edge 平台，把边缘计算硬件、软件和 IIoT 连接组合起来做工厂优化。Siemens 通过数字工厂软件组合与 Augury 竞争，包括
              MindSphere（工业 IoT）、Opcenter（MES）和 Teamcenter（PLM）。Siemens
              的竞争优势来自其在汽车、航空航天和离散制造中的装机基座——这些行业深度嵌入了它的自动化硬件。Siemens 在预测性维护板块的弱点与 ABB 类似：其 AI 能力通常绑定硬件，并针对 Siemens
              设备优化，而不是跨厂商旋转设备监测。


              Emerson 是一家拥有 135+ 年历史的全球工业自动化公司，提供测量与传感、控制系统和工业软件。其 AMS Machine Works 产品为旋转设备提供状态监测，直接竞争 Augury
              的核心用例。Emerson 的强项是深厚的流程行业关系——尤其在油气、化工和电力领域，它把传感器、变送器、控制系统与分析一起销售。Emerson 持有 AspenTech 重要股份，在流程行业形成软件 +
              自动化堆栈。Honeywell 也通过 Honeywell Forge 互联工业平台提供制造和工业 AI，面向制造、油气和楼宇自动化市场，提供 AI 驱动的运营洞察。


              IBM Maximo Application Suite 是市场领先的企业资产管理（EAM）平台，将维护、检查和可靠性管理统一在一个平台中，并提供用于资产绩效管理、基于状态维护和故障预测的 AI 能力。IBM
              Maximo 的强项是它在资产密集型行业（公用事业、铁路、油气和政府）的装机基座，在这些行业中，它是工单、资产历史和维护流程的记录系统。Maximo 在资产管理层与 Augury 竞争，但 Augury
              的传感器硬件和实时振动 AI 提供了 Maximo 这种 IT 层资产管理无法复制的监测深度。对 Augury 来说，CMMS/EAM 集成越来越像必要条件，而不是竞争——大多数部署中，Augury 会与
              Maximo 集成，而不是替换 Maximo。Rockwell Automation 推动「automation to autonomy」战略，用 Industrial AI 优化运营；AVEVA
              则为过程自动化和能源行业提供工业软件产品。
