            $75M Series F 轮；40+ 国家 170+ 客户；Fortune 500 客户数增至 3 倍；$1M+ 账户数增至 3 倍；收入较 2021 年增长 5 倍。
          tone: positive
        - date: 2025-05
          label: Fortune Brands 旗舰案例研究发布
          detail: Fortune Brands Innovations 公布 Fiberon 获得 2.5x ROI；企业级铺开覆盖 16 个站点、1,000+ 台机器。
