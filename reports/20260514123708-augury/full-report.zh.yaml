      - number: '2.3'
        title: 市场分层
        blocks:
          - type: paragraph
            body: >-
              PdM 市场可沿三条维度切分：技术部署模式、行业垂直和地域。按部署模式，云端 PdM 占 66.55% 市场份额，并以 36.95% CAGR 增长，反映 AI 分析集中化和订阅 SaaS 的迁移趋势。本地部署对
              OT 安全敏感行业仍有意义，但增长更慢。按组件看，硬件贡献 45.18% 收入；随着分析平台扩张，软件增长更快，CAGR 为 35.82%。大型企业占当前支出的 63.65%；SME 是增长最快的板块，CAGR
              36.2%，说明长尾扩张空间仍然显著。


              按行业垂直看，制造业是最大的终端用户板块，占 PdM 市场份额 22.95%（Mordor）或 27.9%（Grand View
              Research），驱动力来自停机成本高和流程连续性要求。油气是第二大垂直行业，由关键资产故障风险和安全义务推动。能源和公用事业采用 PdM 来保障涡轮机和电网可靠性。汽车、航空航天、电子等离散制造子行业，随着
              OEE 改善和质量成本压力加剧，正在加速采用。按地域看，北美以 28.85% 份额领先（Mordor），背后是成熟的 Industry 4.0 基础设施和既有厂商生态；亚太是增长最快地区，CAGR
              35.25%，因为印度、中国和东南亚的制造强度上升。


              Augury 的客户画像贴合最大、价值最高的板块：北美的 Fortune 500 流程制造和离散制造企业，并在 40+
              个国家扩大国际存在。其垂直组合覆盖食品饮料、消费包装品、化工、制药、纸浆和造纸、建材——这些都是主导制造业板块中的高资产强度行业。
