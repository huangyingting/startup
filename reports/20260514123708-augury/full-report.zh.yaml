companyProfile:
  summary: >-
    Augury 是一家工业机器健康和生产健康 AI 公司，2011 年由 Gal Shaul 和 Saar Yoskovitz 在以色列创立。公司把自研 IoT 传感器与机器学习模型结合，模型基于超过 1.1 billion
    小时机器数据训练，可在设备故障发生前识别风险，帮助制造商避免计划外停机并优化生产效率。Augury 服务 40+ 个国家的 170+ 家制造业客户，包括
    PepsiCo、DuPont、Colgate-Palmolive、General Mills、Heineken 等 Fortune 500 公司。2025 年 2 月，公司完成由 Lightrock 领投的 $75M Series
    F，维持 $1B+ 独角兽估值。
