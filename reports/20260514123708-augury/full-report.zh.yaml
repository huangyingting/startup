          tone: positive
        - date: '2022'
          label: 推出 Process Health（收购 Seebo）
          detail: Augury 收购 Seebo；从 Machine Health 扩展到 Process Health；客户价值面变宽。
          tone: positive
        - date: 2025-02
          label: Series F：Fortune 500 客户数和 $1M+ 账户数均增至 3 倍
