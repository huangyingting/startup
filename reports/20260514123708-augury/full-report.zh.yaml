      - number: '4.3'
        title: 财务表现信号
        blocks:
          - type: paragraph
            body: >
              Augury 没有在任何公开备案或新闻稿中披露绝对 ARR、季度收入或年度收入。可获得的主要财务表现信号，是公司自称 2021 年至 2025 年 2 月收入增长 5 倍。如果 Augury 在 2021
              年末的收入落在通常与 $180M Series E、$1.5B 估值公司相匹配的区间——大体为 $20–60M ARR——那么 5 倍增长意味着 2025 年 ARR 约在 $100M–$300M
              区间。这是低置信度的分析师估计；Augury 没有确认任何起点或终点数值，未获数据室确认前，不应把该区间用于承销判断。

              客户牵引力指标提供了方向一致的佐证。自 2021 年以来，Fortune 500 客户数量增长到 3 倍；Augury 目前服务 20+ 家 Fortune 500 企业，企业客户总数超过 170 家。年合同价值
              $1M+ 的账户增长到 3 倍，确认大企业交易队列数量在增加，也符合公司自称的先落地、再扩张打法。截至 2025 年 2 月，平台已分析超过 500 million 小时机器数据，而已部署基座累计监测约 1.1
              billion 机器小时；这些指标佐证了机队规模。Augury 估计客户累计创造价值约 $1 billion，这一公司提供的数字无法独立验证，但与 Forrester 研究中单一大型制造商 $20.1M NPV
              的结果一致。

              运营扩张也有信号。Augury 覆盖 40+ 个国家，服务 10+ 个工业垂直领域的制造商，已部署到 300,000+ 台机器。Fortune Brands Innovations
              的企业级部署覆盖美国、英国和墨西哥 16 个站点的 1,000+ 台机器，证明公司有能力在 12 个月窗口内执行大型多站点部署。这些规模与运营执行指标，与一家收入运行率超过 $100M
              的公司相符；但准确数字仍是承销中的重大证据缺口。
