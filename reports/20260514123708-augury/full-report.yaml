      - number: '8.2'
        title: Public Comparable Company Analysis
        blocks:
          - type: paragraph
            body: >
              Selecting a valid comparable set for a private industrial AI unicorn is constrained by the thin universe
              of publicly traded pure-play counterparts. The three most relevant public comps are Aspen Technology
              (AZPN), C3.ai (AI), and PTC Inc. (PTC), each capturing a different dimension of Augury's
              business—industrial process software, enterprise AI, and industrial IoT respectively.

              Aspen Technology is the highest-quality structural comparable: an industrial optimisation software company
              serving asset-intensive process industries (refining, chemicals, power, mining) with deep domain
              expertise, proprietary datasets, and subscription ARR. AspenTech's Q2 FY2025 Annual Contract Value was
              $964.9M (+9.2% YoY); the company was valued at approximately $16.73B market cap before Emerson Electric
              launched a full take-private at $265 per share in January 2025, implying an acquisition multiple of
              approximately 17x ACV. Its public EV/Revenue was 14.62x on trailing twelve-month revenue of $1.14B. This
              comp supports an ARR multiple of 14–17x for a high-quality industrial software business with entrenched
              customer relationships— though AspenTech's scale ($1B+ ACV) and margin profile are materially superior to
              Augury's current position.

              C3.ai provides a cautionary counterpoint. With a current market cap of approximately $1.30B and trailing
              twelve-month revenue of $307M (declining 16% quarter-on-quarter), C3.ai trades at only 2.26x EV/Revenue
              due to chronic operating losses, inconsistent growth, and investor skepticism about its enterprise AI
              go-to-market. At $1B+ valuation, Augury's implied multiple exceeds C3.ai's current multiple on a trailing-
              revenue basis—a risk if Augury's growth trajectory decelerates without delivering a clear profitability
              path.

              PTC Inc. represents the IoT-plus-industrial-software segment and currently trades at $16.28B market cap,
              5.74x EV/Revenue on $3.0B in trailing revenue, and 13.04x EV/EBITDA. PTC's profitable SaaS transition and
              strong IoT platform (ThingWorx) make it a valuable multiple anchor for what a mature Augury could
              eventually achieve, though PTC's 3x revenue base and proven profitability justify a discount to PTC's
              current multiples for a pre-profit company like Augury.

              Synthesising across comps, the relevant ARR multiple band for Augury at the current stage is 10–20x: the
              low end reflecting the C3.ai cautionary case (AI hype fading, losses persisting), the midpoint (~14x)
              reflecting AspenTech's strategic value at scale, and the high end reflecting a growth premium for a
              company with unverified but potentially strong ARR trajectory. Applied to estimated Augury ARR scenarios
              of $50M–$100M, this implies a valuation range of $500M to $2B, with the current $1B+ mark sitting at the
              midpoint of the 14x multiple scenario on $75M ARR.
