companyProfile:
  summary: >-
    Augury is an AI-powered industrial machine health and production health company founded in 2011 in Israel by Gal
    Shaul and Saar Yoskovitz. The company uses proprietary IoT sensors combined with machine learning models trained on
    over 1.1 billion hours of machine data to detect equipment failures before they occur, enabling manufacturers to
    avoid unplanned downtime and optimize production efficiency. Augury serves 170+ manufacturing customers across 40+
    countries, including Fortune 500 companies such as PepsiCo, DuPont, Colgate-Palmolive, General Mills, and Heineken.
    In February 2025, the company raised a $75M Series F round led by Lightrock, maintaining its $1B+ unicorn valuation.
