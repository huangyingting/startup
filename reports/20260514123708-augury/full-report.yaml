      - number: '6.2'
        title: Key Customer Case Studies
        blocks:
          - type: paragraph
            body: >
              Augury's public customer record includes several named Fortune 500 and global manufacturers across food &
              beverage, consumer goods, and industrial sectors. PepsiCo has been a publicly cited Augury customer using
              machine health monitoring across multiple plants to reduce unplanned downtime and improve equipment
              reliability. DuPont has deployed Augury's AI solutions for equipment reliability in specialty chemicals
              and materials manufacturing operations. Colgate-Palmolive utilizes Augury across consumer goods
              manufacturing facilities, benefiting from predictive maintenance to sustain high-speed packaging and
              production lines. General Mills has leveraged Augury for food manufacturing operations, where unplanned
              downtime can cause significant product loss. Heineken has deployed Augury across multiple beverage
              manufacturing sites.


              The most detailed publicly available case study is Fortune Brands Innovations (NYSE: FBIN), which
              published results in May 2025. Fortune Brands' Fiberon facility in North Carolina achieved a 2.5x ROI
