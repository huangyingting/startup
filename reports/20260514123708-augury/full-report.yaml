  - id: TE002
    title: Workflow / Use-Case Table
    notes: >
      Five primary use cases demonstrating how Augury's platform integrates into customer operational workflows, with
      documented measurable benefits and known limitations per public sources.
    sourceRefs:
      - SE001
      - SE006
      - SE007
      - SE008
      - SE015
      - SE016
    columns:
      - User Job
      - Current Workflow Without Augury
      - Augury Solution
      - Measurable Benefit
      - Limitation
    rows:
      - - Predict mechanical failure before breakdown
        - Scheduled time-based maintenance (PM) or reactive repair after failure
        - >-
          Machine Health sensors continuously monitor vibration, ultrasound, temperature; AI detects anomalies weeks to
          months in advance
        - 310% three-year ROI; $16.8M downtime reduction for composite customer (Forrester TEI 2024)
        - Requires hardware installation on each monitored asset; IT/OT network segmentation complexity
      - - Prioritize maintenance work orders by risk
        - Manual technician rounds and periodic inspection logs
        - AI-generated severity scoring integrated into CMMS as pre-populated work orders via IaaS
        - 15% reduction in overall maintenance spend; 5% throughput improvement (Forrester TEI)
        - Accuracy of severity scoring depends on baseline quality; new installations require 48-hour learning period
      - - Improve production yield and reduce waste
        - Trial-and-error process adjustments by process engineers; manual SPC analysis
        - Production Health prescribes specific parameter changes to eliminate root causes of waste and yield loss
        - 37% waste reduction, 9% yield improvement per Augury customer benchmarks
        - Process connectors validated for discrete/batch; continuous process industries not documented
      - - Integrate diagnostics into maintenance management system
        - Manual copy-paste of fault alerts into CMMS; custom API development per system
        - Interoperability-as-a-Service delivers pre-built connectors to SAP, IFS Ultimo, MaintainX, Infor
        - Reduces integration time from weeks to days; enables automated work-order lifecycle management
        - Depth of ERP/CMMS data exchange varies by connector maturity; some systems may require professional services
      - - Monitor OEM-installed equipment remotely
        - Field service dispatch on customer complaint; no continuous remote visibility
        - >-
          OEM partnership model (Grundfos, Carrier, Trane) embeds Augury sensors at manufacture and monitors via Augury
          cloud
        - Enables predictive service scheduling; reduces Grundfos field service dispatch costs
        - OEM integration is partnership-specific; not available for all OEM brands
  - id: TE003
    title: Technology / Operating Architecture Table
    notes: >
      Six-layer architecture spanning from physical sensing to user-facing integration, based on Augury's product pages,
      technical datasheets, and press releases. Dependency and risk columns reflect analysis of public technical
      information.
    sourceRefs:
      - SE002
      - SE003
      - SE005
      - SE006
      - SE021
      - SE022
    columns:
      - Layer / Component
      - Role
      - Technology / Dependency
      - Risk
    rows:
      - - Edge Sensing Layer
        - Captures raw machine signal data at the asset
        - Ranger Pro (piezoelectric triaxial, ISA100.11a) and Halo R4000 (edge AI, IP66/68/69); multi-modal sensors
        - Hardware dependency on Baker Hughes partnership for Ranger Pro supply; Halo R4000 supply chain not disclosed
      - - Edge AI Inference (Halo R4000)
        - Runs fault classification models locally on sensor; reduces cloud bandwidth and latency
        - Proprietary edge AI SoC embedded in Halo R4000; model update mechanism not public
        - OTA firmware/model update security is not publicly documented; edge model drift if updates are infrequent
      - - Wireless Gateway / Connectivity
        - Aggregates sensor data from up to 40 Ranger Pro sensors per gateway for cloud transmission
        - ISA100.11a gateways; 128-bit AES and X.509 for secure backhaul; cellular or Ethernet backhaul options
        - Gateway availability is a single point of failure for sensor clusters; redundancy approach not documented
      - - Cloud AI Platform
        - Hosts deep learning models for advanced fault diagnosis, Production Health analytics, and model training
        - Microsoft Azure cloud infrastructure; proprietary ML pipeline trained on 1.1B+ hours of machine data
        - Azure dependency introduces SLA and data residency considerations; model retraining pipeline not public
      - - Human Expert Review Layer
        - Certified vibration analysts review AI outputs, annotate edge cases, and deliver customer diagnostic reports
        - Proprietary analyst network; human-in-the-loop validation closes the AI feedback loop
        - Analyst capacity is a scaling constraint; labor-intensive for high sensor-density deployments
      - - CMMS / ERP Integration Layer
        - Translates Augury diagnostic outputs into work orders, spare parts triggers, and KPI dashboards
        - Interoperability-as-a-Service connectors to SAP, IFS Ultimo, MaintainX, Infor; ThingWorx Ready certified
        - Integration depth varies by connector maturity; custom ERP integrations may require professional services
