              The landmark Series E in October 2021 raised $180M at a $1.5B valuation, making Augury one of the first
              Industry 4.0 unicorns. That round was co-led by Insight Partners and included Goldman Sachs and Eclipse
              Ventures. Prior rounds included a Series C with Eclipse Ventures participation and earlier seed and Series
