      - Bull Argument
      - Bear Counter-Argument
      - What Would Change the View
    rows:
      - - Market
        - 39.5% CAGR AI-driven PdM market through 2032; Augury is category leader with 15 years of proprietary data
        - Market headroom is widely contested by incumbents (ABB, Siemens) who have built-in distribution advantages
        - Evidence of Augury capturing ≥3% market share with expanding win rate vs incumbents would strengthen bull
      - - Product
        - >-
          99.9% failure-detection accuracy; 310% ROI validated by Forrester; only PdM platform combining Machine +
          Process Health
        - >-
          AI commoditisation risk; open-source and cloud-hyperscaler tools eroding moat; hardware sensor market thinning
          margins
        - >-
          Agentic-AI product launches achieving customer adoption above 50% of installed base would validate
          differentiation
      - - Customer
        - >-
          Fortune 500 anchor accounts (PepsiCo, DuPont, Colgate-Palmolive); $1M+ accounts tripled; 40+ country
          operations
        - >-
          170+ customers at $1B+ valuation implies high per-customer premium; loss of 2–3 anchors would be
          disproportionately damaging
        - NRR ≥115% confirmed in data room would validate customer quality and underwrite growth assumptions
      - - Financials
        - >-
          5x revenue growth since 2021; strong Forrester NPV; <6-month payback implies capital-efficient customer
          acquisition
        - >-
          Zero financial transparency; ARR, margin, and burn all undisclosed; cannot independently validate any
          financial claim
        - Audited ARR ≥$60M, gross margin ≥60%, and burn <$6M/month would shift stance to INVEST
      - - Competition
        - >-
          Category leadership in Verdantix Green Quadrant 2025; only unicorn in Production Health; first-mover data
          advantage
        - >-
          Emerson acquiring AspenTech creates a better-capitalised industrial software competitor; C3.ai M&A or refocus
          possible
        - Sustained market-share stability in Verdantix / Gartner rankings through 2027 would confirm moat durability
      - - Valuation
        - $1B+ implies 13x ARR on $75M est.; within range of industrial software peers; base case fair value
        - >-
          33% compression from $1.5B Series E; no IPO catalyst; C3.ai precedent shows 2x EV/Revenue is possible for AI
          SaaS
        - Series G pricing at ≥$1.2B, or M&A approach ≥$1.5B, would confirm bull case and justify current entry price
  - id: TV006
    title: Final Diligence Asks
    notes: >
      These are the minimum confirmatory data points required before upgrading the stance from TRACK to INVEST. Priority
      1 items are thesis-critical; without them, the $1B+ valuation cannot be independently underwritten.
    sourceRefs:
      - SV001
      - SV014
      - SV015
      - SV016
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Diligence Path
    rows:
      - - ARR and revenue breakdown
        - >-
          Trailing 4-quarter ARR, revenue by product line (Machine Health vs Process Health vs hardware), and ARR growth
          rate
        - >-
          Required to verify 5x growth claim and compute EV/ARR multiple; current $1B+ is uninvestable without confirmed
          ARR
        - Request audited financials or management accounts from data room; confirm with CFO at management meeting
      - - Net Revenue Retention
        - NRR% and gross revenue retention by annual customer cohort, and logo churn rate for past 3 years
        - NRR is the single most important SaaS quality metric; tripling $1M+ accounts is a proxy, not a substitute
        - Request cohort analysis table from data room; cross-check against account-level revenue data
      - - Gross margin by segment
        - Gross margin percentage for software (SaaS), hardware (sensors), and managed services separately
        - >-
          Blended hardware + managed-services model depresses margins; need to confirm software-only GP% justifies SaaS
          valuation
        - Request segment P&L from data room; compare to industrial IoT-SaaS peer benchmarks
      - - Burn rate and runway
        - Monthly cash burn, current cash balance post-Series F close, and 12-month cash flow forecast
        - At $75M raised, burn >$6M/month implies <12 months runway; high burn would create near-term dilution risk
        - Request monthly P&L, cash flow statement, and 12-month operating plan from data room
      - - Cap table and liquidation preferences
        - Full cap table, liquidation preference stack, anti-dilution provisions, and any secondary transaction history
        - >-
          Valuation compression from $1.5B to $1B+ may have created complex preference overhang; need to understand
          waterfall
        - Request cap table from data room; review all investor side letters and preferred terms
      - - IPO or exit timeline
        - Management's stated 3-year liquidity plan (IPO, M&A, secondary tender, or continued private growth)
        - No visible exit catalyst constrains return modelling; Series-stage investors need a credible path to liquidity
        - Conduct management interview; request any board-approved strategic planning documents on exit optionality
