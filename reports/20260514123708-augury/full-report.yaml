  - id: TV005
    title: Investment Thesis vs Anti-Thesis
    notes: >
      Each pillar reflects the key strategic argument and its most forceful counter-argument, drawing on evidence across
      all eight chapters of this diligence report. "What would change the view" identifies the observable trigger that
      would shift the stance from TRACK to INVEST or from TRACK to PASS.
