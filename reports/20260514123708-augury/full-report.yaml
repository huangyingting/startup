      - number: '6.5'
        title: Customer Concentration, Retention, and Risk Analysis
        blocks:
          - type: paragraph
            body: >
              Augury's customer base presents concentration and retention risks that investors should scrutinize during
              due diligence. With 170+ customers at a $1B+ valuation, Augury's implied revenue-per-customer metric is
              high, suggesting that individual large enterprise accounts may represent material fractions of total ARR.
              The company does not publicly disclose net revenue retention (NRR), gross revenue retention (GRR), or
              customer churn rates—metrics that are standard disclosures for enterprise SaaS companies seeking to
              demonstrate recurring revenue health and predictability.


              The stated tripling of Fortune 500 customers and $1M+ accounts since 2021 signals strong net expansion
              within existing accounts, but without NRR data it is not possible to assess absolute retention rates or
              quantify downward pressure from churned smaller accounts. The customer base is dominated by a single
              vertical cluster (food, beverage, and CPG), which creates exposure to cyclical capital expenditure
              patterns in those sectors. Industrial capex decisions are often deferred during economic downturns,
              creating potential headwinds for new customer acquisition and contract renewals.


              Enterprise sales cycles for predictive maintenance solutions are typically 6–18 months, reflecting the
              need for multi-stakeholder alignment across reliability, IT, finance, and operations teams. This creates
              revenue lumpiness and forecasting risk, particularly for new logo acquisition. Review platforms such as
              TrustRadius list Augury with positive customer sentiments focused on AI accuracy and reliability expert
              support, but sample sizes are small relative to the full customer base. G2 and Capterra profiles could not
              be accessed during research. The absence of publicly available customer-level financial performance
              data—including expansion rates, renewal rates, and implementation success metrics—represents a meaningful
              gap in the public evidence base that must be addressed in management due diligence sessions.
