      - number: '7.3'
        title: Technology and Operational Risks
        blocks:
          - type: paragraph
            body: >
              Augury's core technology risk is the OT/ICS cybersecurity attack surface created by deploying networked
              IoT sensors inside customer manufacturing environments. CISA explicitly identifies ICS/OT environments as
              high-priority targets for nation-state and criminal threat actors, noting that legacy OT systems lack
              encryption, authentication, and modern security controls. Augury's sensors continuously transmit machine
              data from production-critical equipment over customer networks, creating a persistent network presence
              inside operational technology environments. A security compromise—whether of Augury's cloud
              infrastructure, sensor firmware, or the customer-side network gateway—could expose customers' proprietary
              process parameters, machine specifications, and production schedules as sensitive IP. Worse, a malicious
              actor could potentially manipulate health alerts (suppressing legitimate warnings or generating false
              positives) to cause equipment failures or production disruptions at customer sites. NVD records as of 2026
              show no CVEs specifically attributed to Augury's platform, but the risk category is well-documented across
              industrial IoT vendors generally.

              AI model accuracy risk is a second material operational concern. Augury claims 99.9% failure detection
              accuracy, but false negatives—failures that the AI model misses—carry outsized consequences in industrial
              settings: unplanned downtime, equipment damage, safety incidents, and potential liability exposure from
              customers who relied on Augury's health alerts. The AI model is trained on a specific machine data corpus;
              deployment in novel machine types, unusual operating environments, or brownfield facilities with
              non-standard legacy equipment may degrade model performance outside tested parameters. Integration
              complexity in heterogeneous brownfield manufacturing environments (diverse SCADA systems, PLCs,
              historians, and CMMS platforms) creates deployment friction, extending time-to-value and risking project
              failures.

              Hardware supply chain risk is growing: the Halo R4000 relies on Qualcomm edge-AI chipsets (Qualcomm
              Ventures is a Series F investor), creating vendor dependency. Sensor manufacturing disruptions, component
              shortages, or geopolitical supply chain shocks could impair Augury's ability to fulfill hardware
              deployment commitments to enterprise customers. The company's human expert layer (Vibration Analysts,
              RSMs) is both a competitive moat and a scalability constraint: growing the managed-service headcount
              alongside the customer base creates operational leverage risks.
            claimRefs:
              - CR017
              - CR018
              - CR019
              - CR020
              - CR021
              - CR022
              - CR023
              - CR024
      - number: '7.4'
        title: Regulatory, Legal, and Compliance Risks
        blocks:
          - type: paragraph
            body: >
              Augury operates across more than 40 countries, creating a complex multi-jurisdictional regulatory
              compliance obligation. The EU General Data Protection Regulation (GDPR) applies to any processing of
              personal data related to EU residents or EU-based operations. While Augury's primary data is machine
              operational telemetry (vibration, temperature, magnetic readings) rather than consumer personal data,
              employee identities, user accounts on the platform, and process parameters from EU facilities may
              constitute personal data under GDPR's broad definitions. Augury's privacy policy (last updated February
              2023) acknowledges GDPR-based legal bases for processing and references international data transfer
              mechanisms (EU-U.S. Data Privacy Framework). Non-compliance, data breaches, or failure to honor data
              subject rights could result in GDPR fines up to €20M or 4% of global annual turnover—a material exposure
              for a company at Augury's revenue scale.

              CISA's Industrial Control Systems (ICS) cybersecurity guidance directly affects Augury's customer base in
              critical infrastructure sectors (energy, water, chemicals, food and beverage). CISA's Secure by Demand
              guidance for OT calls on asset owners to procure products with security-by-design principles—strong
              authentication, encrypted protocols, and secure configurations. If Augury's sensor platform does not fully
              meet CISA's recommended security posture for OT vendors, it may lose deals with critical-infrastructure
              customers that are subject to CISA compliance pressure or sectoral regulations (NERC CIP for energy, AWIA
              2018 for water). OSHA's machine safety standards apply to Augury's installation activities and its
              customers' use of machine health data to make safety-related maintenance decisions; erroneous failure
              alerts could create OSHA liability exposure if customers rely on Augury data in safety-critical decisions.

              The EU Artificial Intelligence Act (EU AI Act), adopted in 2024 and entering enforcement in 2025–2026,
              classifies AI systems used in critical infrastructure and industrial safety as "high-risk" applications
              subject to conformity assessment, human oversight requirements, and transparency obligations. Augury's
              production-critical failure detection AI—used to prevent equipment failures at industrial facilities—may
              qualify as high-risk AI under the EU AI Act's Annex III categories, potentially requiring CE marking,
              technical documentation, post-market monitoring, and human oversight attestations. Export control risk is
              low but non-zero: if Augury's sensor-plus-AI technology is classified as dual-use technology under U.S.
              Export Administration Regulations (EAR), export to certain jurisdictions could require BIS licenses. The
              FTC's emerging AI and data governance enforcement posture creates additional compliance obligations for
              any AI vendor making performance claims (such as Augury's 99.9% accuracy claim) that may require
              substantiation. No litigation, enforcement actions, or regulatory investigations against Augury have been
              identified in any public record as of May 2026.
