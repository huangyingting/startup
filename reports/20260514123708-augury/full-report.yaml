  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Current Valuation and Funding Context
        blocks:
          - type: paragraph
            body: >
              Augury's most recent valuation mark of $1B+ was established on February 19, 2025, when the company closed
              a $75M Series F round led by London-based impact investor Lightrock, with co-participation from existing
              investors Insight Partners, Eclipse Ventures, Qumra Capital, La Maison Partners, SE Ventures (Samsung
              Electronics' venture arm), and Qualcomm Ventures. The $1B+ mark is not an upround: Augury's Series E in
              October 2021 was priced at $1.5B post-money valuation, implying a 33% valuation compression over the
              intervening 40 months. Augury's official press release characterises the Series F as representing "an
              increase in valuation" relative to recent private-market comparisons—a technically defensible framing
              given the 2022–2023 market correction that compressed valuations for most SaaS and industrial-tech
              unicorns by 30–60%—but the absolute mark is below the prior peak and the framing warrants investor
              scrutiny.

              Total capital raised is estimated at approximately $369M across all rounds, a figure reported by CB
              Insights and consistent with the sum of disclosed round amounts. SEC EDGAR records confirm Augury Inc.
              (CIK 0001651145) as a Delaware corporation with at least three Form D exempt offering filings (August 2015
              ×2 and October 2020), with no S-1 or other public securities registration on file, confirming Augury's
              ongoing private-company status. No near-term IPO signal has been identified in any public statement or
              filing as of May 2026.

              The Series F proceeds are directed at accelerating innovation in agentic-AI capabilities and scaling
              enterprise deployments. Augury claims to have generated approximately $1B in cumulative customer value
              since inception and reports operating in 40+ countries with 170+ global manufacturing customers, 1.1B+
              hours of machine data analysed, and 300,000+ machines diagnosed. These traction metrics are
              company-supplied and have not been independently audited, but they are consistent with the scale of
              operations described by Lightrock and Insight Partners in their portfolio commentary. The Forrester
              Consulting Total Economic Impact study commissioned in July 2025 provides the most rigorous third-party
              financial validation: 310% three-year ROI, $20.1M NPV, and sub-six-month payback for a composite
              $20B-revenue enterprise customer. Applied across 170+ customers, this implies a theoretical fleet-level
              NPV of approximately $3.4B—more than three times the current valuation—though this bottom-up calculation
              rests on the representativeness of the composite profile and is best treated as a ceiling rather than a
              central estimate.
