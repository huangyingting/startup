  - id: FE001
    title: Product Architecture Map
    type: stack
    layout: standard
    sourceRefs:
      - SE002
      - SE003
      - SE005
      - SE006
    data:
      layers:
        - label: User Interface & Integration Layer
          modules:
            - Web Dashboard (fault alerts, severity scores, KPI trends)
            - CMMS/EAM Work Order Integration (SAP, IFS Ultimo, MaintainX)
            - ERP Process Data Connectors (Production Health)
            - Endpoint Community Portal
          note: Interoperability-as-a-Service delivers pre-built connectors; ThingWorx Ready certified
        - label: Managed Services Layer
          modules:
            - Human Vibration Analyst Network (certified, global)
            - Diagnostic Report Generation
            - Customer Success Engineering
            - Gen AI Natural-Language Summaries (in development)
          note: Human review closes feedback loop; analyst capacity is a known scaling constraint
        - label: Cloud AI & Analytics Layer
          modules:
            - Machine Health AI Engine (1.1B+ hours training data, 300K+ machines)
            - Production Health Prescriptive AI (Seebo-derived process connectors)
            - Model Training Pipeline (Azure cloud)
            - Reinforcement Learning Loop (roadmap)
          note: Microsoft Azure backbone; 25+ pump and 28+ motor fault type models
        - label: Data Management Layer
          modules:
            - Time-Series Machine Data Store
            - Production Process Data Ingestor
            - Labeled Fault Event Archive (13+ year corpus)
            - Sensor Configuration & Baseline Registry
          note: Core proprietary asset — 1.1B+ hours of labeled machine data
        - label: Edge Compute Layer
          modules:
            - Halo R4000 Edge AI Inference (IP66/68/69, 40G, 2×2 inch)
            - Automatic Baseline Establishment (48-hour self-calibration)
            - Sensor Fusion (vibration + temperature + phase analysis)
          note: Launched November 2024; on-device inference reduces cloud bandwidth and latency
        - label: Physical Sensing Layer
          modules:
            - Ranger Pro Sensor (piezoelectric triaxial, ISA100.11a, IP67, AES-128, X.509)
            - Halo R4000 Sensor (edge AI native, IP66/68/69, 40G shock)
            - Vibration (high-frequency), Ultrasound, Temperature, Magnetic field
            - ISA100.11a Gateways (40 sensors/gateway, cellular/Ethernet backhaul)
          note: Baker Hughes OEM partnership covers Ranger Pro supply chain; Halo R4000 supply not disclosed
