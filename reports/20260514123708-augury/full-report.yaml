      - number: '7.2'
        title: Financial and Business Model Risks
        blocks:
          - type: paragraph
            body: >
              Augury's private status creates fundamental financial opacity that prevents external assessment of capital
              adequacy, burn rate, and runway. The $75M Series F closed February 2025 at a maintained $1B+ valuation—
              but this represents an implied valuation compression from the $1.5B Series E peak in October 2021,
              indicating that early investors face an approximately 33% haircut from their entry price in the best-case
              scenario where the company exits at current valuation levels. No S-1 registration statement, audited
              financials, or quarterly revenue disclosures have been filed. The five-fold revenue growth signal since
              2021 (stated in the Series F press release) lacks a disclosed baseline, making absolute ARR estimation
              unreliable. If Series E baseline ARR was in the $15–25M range (a common Series E entry point for
              industrial SaaS companies with similar customer counts), five-fold growth implies approximately $75–125M
              ARR in 2025—plausible but unconfirmed.

              The hybrid hardware-plus-SaaS-plus-managed-services business model creates structural gross margin risk.
              IoT sensor hardware (Halo R4000) introduces cost of goods sold, inventory exposure, supply chain
              dependency (especially on Qualcomm chipsets for edge-AI processing), and field service logistics absent
              from pure-software SaaS peers. Human reliability experts bundled into contracts compress blended margins
              further. The combined effect likely places Augury's blended gross margin in the 55–70% range versus 80%+
              for software-only industrial AI peers—a meaningful valuation multiple discount at exit. The Seebo
              acquisition (2022) created unquantified goodwill and intangible assets on the balance sheet that have not
              been publicly disclosed and may carry impairment risk in a downturn scenario. No public signals of
              financial distress, layoffs, or restructuring were identified as of May 2026.
