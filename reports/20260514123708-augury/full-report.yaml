      - number: '2.2'
        title: Market Sizing and Growth Trajectory
        blocks:
          - type: paragraph
            body: >-
              The global PdM market is the subject of active analyst coverage with four major published estimates.
              MarketsandMarkets (2025) sizes the core PdM market at $13.89B in 2026 growing to $23.79B by 2031 (CAGR
              11.4%), and separately identifies the AI-driven PdM sub-segment at $2.61B in 2026 reaching $19.27B by 2032
              (CAGR 39.5%)—the sub-segment that most closely describes Augury's competitive space. Grand View Research
              projects $7.85B in 2022 to $60.13B by 2030 (CAGR 29.5%). Mordor Intelligence estimates $14.09B in 2025
              growing to $82.17B by 2031 (CAGR 34.14%). Allied Market Research produces the most aggressive estimate:
              $10.1B in 2023 to $162.1B by 2033 (CAGR 32.2%).


              The wide divergence in CAGR estimates—11% to 34%—reflects genuinely different market boundaries rather
              than analytical error. Narrow definitions (dedicated rotating-equipment PdM) yield lower CAGRs; broad
              definitions (all AI-for-operations including quality and process analytics) yield higher CAGRs. The
              MarketsandMarkets AI-driven sub-segment CAGR of 39.5% is the most directly relevant benchmark for Augury,
              as it isolates the ML/AI-native vendors from legacy vibration monitoring. IoT Analytics independently
              corroborates strong double-digit PdM growth in its 2024 market sizing work. For diligence purposes, the
              most conservative defensible base for a TAM statement is approximately $14B in 2025-2026 growing to
              $24-80B by 2031 depending on boundary assumptions.


              TAM, SAM, and SOM separation is complicated by Augury's enterprise-only positioning. The company targets
              Fortune 500 and large manufacturers; its SAM is likely a fraction of the total PdM market. With 170+
              active enterprise customers and 1M+ monitored machines, Augury has demonstrated commercial velocity in the
              upper tier of the manufacturing PdM buyer pyramid, but exact ARR and market share figures remain
              undisclosed.
