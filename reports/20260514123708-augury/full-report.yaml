      - number: '4.2'
        title: Funding History and Investor Syndicate
        blocks:
          - type: paragraph
            body: >
              Augury has raised approximately $369M in total venture capital across multiple rounds since its 2011
              founding, reaching unicorn status with its October 2021 Series E. The most recent event was a $75M Series
              F closed February 19, 2025, led by Lightrock—a London-based impact-focused growth equity platform managing
              over $5.5B in assets—with participation from continuing investors Insight Partners, Eclipse Ventures,
              Qumra Capital, La Maison Partners, SE Ventures (Samsung Electronics' venture arm), and Qualcomm Ventures.

              The Series F maintained the company's valuation at $1B+. Notably, this was not an upround: the Series E in
              October 2021 had been priced at a $1.5B valuation, implying a valuation compression of approximately
              one-third at flat between rounds. This reflects broader private-market discipline in 2024–2025 rather than
              company-specific underperformance, but it limits secondary liquidity optionality and suggests that a
              near-term IPO at the 2021 peak valuation is unlikely without additional revenue-multiple expansion.

              Insight Partners is the most significant multi-round institutional backer, having participated in Series
              D, E, and F. SE Ventures and Qualcomm Ventures represent strategic capital with potential hardware and
              ecosystem synergies for Augury's Halo R4000 sensor platform and Qualcomm edge chipsets. Eclipse Ventures
              is a long-term early and continuing backer with industrial hardware-software expertise. SEC EDGAR records
              confirm three Form D filings for Augury Inc. (CIK 0001651145): two filed August 18, 2015, and one filed
              October 30, 2020. The 2020 Form D, which likely corresponds to the pre-Series D capital raise, lists Saar
              Yoskovitz as Executive Officer and Gal Shaul as Director, and confirms Delaware incorporation with New
              York headquarters. No S-1 or other SEC registration statement has been filed, confirming Augury's status
              as a private company not subject to public financial reporting requirements.
