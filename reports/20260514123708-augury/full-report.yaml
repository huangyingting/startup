      - number: '8.4'
        title: Bull, Base, and Bear Case Scenarios
        blocks:
          - type: paragraph
            body: >
              Three valuation scenarios are constructed using explicit assumptions about ARR, growth rate, and
              applicable EV/ARR multiple. Probability signals are inferred from the balance of available evidence.

              The Bull Case assumes Augury has achieved $100M+ ARR with 35–40% year-on-year growth, consistent with the
              upper end of the five-fold revenue expansion from a $20M 2021 baseline, and sustained by the tripling of
              $1M+ ACV accounts and continued Fortune 500 expansion. At a 20x EV/ARR multiple—reflecting the premium
              ascribed to high-growth AI-native industrial platforms with verifiable market leadership—the implied
              enterprise value is $2.0–2.5B. This scenario is achievable but requires confirmation of ARR ≥$100M and
              growth rate ≥35%. Catalyst: a public IPO filing or M&A approach from an industrial conglomerate (e.g.,
              Emerson, Honeywell, ABB) would re-rate the valuation toward this range. Estimated scenario probability:
              25%.

              The Base Case assumes ARR of $65–80M with 25–30% growth, reflecting the midpoint of the revenue-growth
              scenarios and consistent with a company that doubled ARR between 2021 and 2023 but saw growth moderate as
              the enterprise market matured. At a 13–15x EV/ARR multiple—consistent with AspenTech's pre-acquisition
              multiple and the industrial SaaS peer set—the implied enterprise value is $845M–$1.2B, encompassing the
              current $1B+ mark. This is the most likely scenario given available evidence and implies the current
              valuation is broadly fair. Estimated scenario probability: 50%.

              The Bear Case assumes ARR of $40–50M with 10–15% growth, reflecting the possibility that a smaller 2021
              baseline (~$8–10M) combined with slower enterprise adoption yields lower absolute ARR, and that
              competitive pressure from incumbents has compressed expansion revenue. At an 8–10x EV/ARR
              multiple—consistent with C3.ai's distressed trading range—the implied enterprise value is $320–$500M,
              which would represent a significant markdown from the current $1B+ mark. Triggers for this scenario
              include major customer losses, evidence of NRR below 100%, or continued absence of profitability path
              post-Series F. Estimated scenario probability: 25%.

              Probability-weighted central value across the three scenarios is approximately $1.04B—remarkably close to
              the current $1B+ mark—suggesting the market has fairly priced the distribution of outcomes given available
              evidence, with the valuation defensible under base and bull assumptions but overvalued under bear
              conditions.
            claimRefs:
              - CV038
              - CV039
              - CV040
              - CV044
              - CV045
          - type: table
