        - label: Low Likelihood (1–2)
          note: Rare or unlikely to occur in 12-month horizon
        - label: Medium Likelihood (3)
          note: Possible; would not surprise a well-informed observer
        - label: High Likelihood (4)
          note: Probable; expected to occur without active mitigation
        - label: Very High Likelihood (5)
          note: Near-certain; already partially manifesting
      rows:
        - label: Critical Severity (5)
          values:
            - label: CEO/Co-Founder Departure
              tone: neutral
            - label: OT Cybersecurity Breach
              tone: negative
            - label: ''
              tone: neutral
            - label: ''
              tone: neutral
        - label: High Severity (4)
          values:
            - label: AI Model False Negatives; EU AI Act Penalty
              tone: neutral
            - label: GDPR Violation; Incumbent Displacement; Capital Exhaustion
              tone: negative
            - label: Valuation Compression / Exit Constraint
              tone: negative
            - label: ''
              tone: neutral
        - label: Medium Severity (3)
          values:
            - label: Hardware Supply Chain Disruption; Partner Failure
              tone: neutral
            - label: Customer Concentration Loss; International Exec Risk
              tone: neutral
            - label: Talent Attrition; Seebo Integration Drag
              tone: negative
            - label: ''
              tone: neutral
        - label: Low Severity (2)
          values:
            - label: Export Control Reclassification
              tone: neutral
            - label: NERC CIP / AWIA Disqualification
              tone: neutral
            - label: FTC Claim Substantiation
              tone: neutral
            - label: ''
              tone: neutral
  - id: FR002
    title: Risk Timeline — Key Risk Milestones and Triggering Events
    type: timeline
    sourceRefs:
      - SR001
      - SR002
      - SR008
      - SR015
      - SR017
    approximationNotes: >
      Timeline represents known and projected risk-relevant events based on public filings, regulatory enforcement
      schedules, and company press releases. Forward-looking dates (2026–2028) reflect regulatory implementation
      schedules and expected financing windows, not confirmed company events.
    data:
      items:
        - date: 2021-10
          label: Series E at $1.5B Valuation
          detail: >-
            $180M Series E; sets valuation high-water mark; early investors' entry price reference point for exit
            analysis
        - date: 2022-Q2
          label: Seebo Acquisition Closes
          detail: Process Health platform acquisition; integration risk and unquantified goodwill on balance sheet begins
        - date: 2024-Q2
          label: EU AI Act Published in Official Journal
          detail: High-risk AI classification framework enters force; 24-month compliance runway for high-risk systems begins
        - date: 2025-02
          label: Series F at $1B+ (Maintained)
          detail: $75M Series F; Lightrock leads; valuation maintained at $1B+ versus $1.5B Series E peak; COO hired
        - date: 2025-05
          label: Fortune Brands Partnership Announced
          detail: Strategic alliance for trusted AI in manufacturing; channel risk begins if partnership underperforms
        - date: 2026-02
          label: EU AI Act High-Risk Provisions Enforcement
          detail: High-risk AI applications must comply with conformity assessment requirements by this window
        - date: 2026-03
          label: MaintainX CMMS Integration Launches
          detail: Channel partnership live; integration performance now monitorable; partner dependency risk active
        - date: 2026-12
          label: Estimated Series F Runway Checkpoint
          detail: >-
            If burn rate is $6–8M/month, $75M raise provides ~10–12 months runway from Feb 2025 close; refinancing
            window opens
        - date: 2027-Q1
          label: GDPR Adequacy Decision Review Window
          detail: >-
            EU-U.S. Data Privacy Framework subject to periodic review; Augury's cross-border data transfers at risk if
            adequacy lapses
        - date: 2028-Q4
          label: Expected Next Financing or Exit Window
          detail: >-
            Based on typical 3-year Series F-to-exit trajectory; IPO readiness requires disclosed ARR and margin
            milestones
  - id: FR003
    title: Risk Transmission Map — How Risks Cascade to Outcomes
    type: flow
    sourceRefs:
      - SR001
      - SR008
      - SR014
      - SR015
    approximationNotes: >
      Risk transmission paths are analyst constructs based on public evidence and industry analog risk cascades. Node
      relationships represent plausible causal links, not confirmed company-disclosed dependencies. Edge labels indicate
      the transmission mechanism.
    data:
      nodes:
        - id: ot-breach
          label: OT/ICS Cybersecurity Incident
          detail: Sensor firmware compromise or cloud platform breach exposing customer machine data
        - id: gdpr-violation
          label: GDPR / EU AI Act Violation
          detail: Data privacy breach or non-compliance with EU AI Act high-risk requirements
        - id: incumbent-bundle
          label: Incumbent Competitive Bundling
          detail: Siemens/ABB/Honeywell offers AI diagnostics as zero-cost bundle with OT hardware contracts
        - id: valuation-pressure
          label: Valuation / Exit Constraint
          detail: Flat Series F versus Series E peak; exit liquidity constrained for early investors
        - id: talent-loss
          label: AI/ML Talent Attrition
          detail: Engineering and reliability expert talent lost to hyperscalers and AI startups
        - id: customer-churn
          label: Customer Churn / Account Loss
          detail: Enterprise customers switch to incumbent solutions or reduce Augury contract scope
        - id: revenue-impact
          label: Revenue Growth Slowdown
          detail: New logo acquisition slows; NRR pressure from competitive or product quality issues
        - id: burn-accelerate
          label: Accelerated Cash Burn
          detail: Revenue shortfall versus plan extends burn runway; bridge financing required sooner
        - id: down-round
          label: Down-Round / Financing Risk
          detail: Next capital raise at sub-$1B valuation; investor dilution and morale impact
        - id: product-quality
          label: AI Model / Product Quality Failure
          detail: False negatives cause undetected equipment failures; customer trust erosion
      edges:
        - from: ot-breach
          to: customer-churn
          label: Customer trust destruction post-breach
        - from: ot-breach
          to: gdpr-violation
          label: Customer personal data exposure triggers GDPR obligation
        - from: gdpr-violation
          to: revenue-impact
          label: EU market access suspended pending compliance
        - from: incumbent-bundle
          to: customer-churn
          label: Customers accept incumbent bundle during contract renewal
        - from: customer-churn
          to: revenue-impact
          label: Direct ARR reduction from lost accounts
        - from: talent-loss
          to: product-quality
          label: ML model development velocity slows; reliability expert capacity shrinks
        - from: product-quality
          to: customer-churn
          label: Repeated false negatives erode customer confidence
        - from: revenue-impact
          to: burn-accelerate
          label: Revenue shortfall versus plan extends net burn runway
        - from: valuation-pressure
          to: down-round
          label: Constrained exit path forces below-$1B financing terms
        - from: burn-accelerate
          to: down-round
          label: Runway pressure forces capital raise at unfavorable terms
        - from: incumbent-bundle
          to: valuation-pressure
          label: Market share loss re-rates growth expectations downward
  - id: FV001
    title: Augury Valuation and Funding Timeline
    type: timeline
    sourceRefs:
      - SV001
      - SV002
      - SV006
      - SV014
      - SV015
    summary: >
      Augury's full financing history from founding through the Series F, annotated with key valuation marks, strategic
      milestones, and the 2022–2025 private-market contraction context.
    data:
      items:
        - date: '2011'
          label: Augury Founded
          detail: >-
            Saar Yoskovitz and Gal Shaul co-found Augury in Israel; initial focus on smartphone-connected machine
            diagnostics.
          tone: neutral
        - date: 2015-08
          label: Seed Capital (SEC Form D)
          detail: Two Form D exempt offering filings (CIK 0001651145); seed/angel stage capital; exact amounts undisclosed.
          tone: neutral
        - date: 2017-2019
          label: Series A–C (Est. $20–30M)
          detail: Early growth rounds backing Machine Health category launch; Eclipse Ventures among confirmed early backers.
          tone: positive
        - date: 2021-02
          label: Series D (~$55M est.)
          detail: >-
            Growth round supporting North American enterprise scaling; SEC Form D filed 2020-10-30; Insight Partners
            estimated lead.
          tone: positive
        - date: 2021-10
          label: Series E — $180M at $1.5B
          detail: >-
            $180M led by Insight Partners and Goldman Sachs; Augury declared first Industry 4.0 unicorn; $1.5B
            post-money.
          tone: positive
        - date: 2022-2023
          label: Private Market Correction
          detail: Broad SaaS/tech valuation compression of 30–60% across late-stage private companies; impacts unicorn marks.
          tone: risk
        - date: 2025-02
          label: Series F — $75M at $1B+
          detail: $75M led by Lightrock; $1B+ valuation maintained (33% below Series E peak); Elan Greenberg joins as COO.
          tone: neutral
  - id: FV002
    title: Comparable EV/Revenue Multiples vs Augury Implied Multiple
    type: bar
    sourceRefs:
      - SV007
      - SV008
      - SV009
      - SV010
      - SV011
      - SV012
    summary: >
      EV/Revenue (or EV/ARR) multiples for public industrial software and AI SaaS peers vs. Augury's implied multiple at
      the $1B+ Series F valuation and estimated $75M ARR. AspenTech (AZPN) represents the highest-quality structural
      comp; C3.ai (AI) represents the bear-case cautionary precedent.
    approximationNotes: >
      Augury's implied EV/ARR multiple is based on the $75M ARR base case estimate; actual multiple is unknown until ARR
      is disclosed. Public company multiples are as of May 14, 2026 (PTC, C3.ai) or at last trade date (AspenTech).
      Industrial SaaS median is an analyst estimate from Bessemer Cloud Index historical benchmarks and peer set
      analysis.
    data:
      items:
        - label: AspenTech (AZPN) — EV/Revenue
          value: 14.62
          tone: neutral
        - label: PTC Inc. (PTC) — EV/Revenue
          value: 5.74
          tone: neutral
        - label: C3.ai (AI) — EV/Revenue
          value: 2.26
          tone: risk
        - label: Industrial SaaS Median (est.)
          value: 9.5
          tone: neutral
        - label: Augury (implied EV/ARR, $75M base)
          value: 13.3
          tone: positive
  - id: FV003
    title: Augury Valuation Range — Bull / Base / Bear Scenarios
    type: range
    sourceRefs:
      - SV001
      - SV008
      - SV009
      - SV010
      - SV011
    summary: >
      Low-to-high enterprise value range for each scenario, derived from ARR estimates and applicable EV/ARR multiples.
      The current $1B+ Series F mark is overlaid for reference. Values in $M.
    approximationNotes: >
      All ranges are analyst estimates; ARR is not publicly disclosed by Augury. Scenarios represent plausible outcome
      distributions, not point estimates.
    data:
      items:
        - label: Bear Case (ARR $40–50M, 8–10x)
          low: 320
          high: 500
        - label: Base Case (ARR $65–80M, 13–15x)
          low: 845
          high: 1200
        - label: Bull Case (ARR $100M+, 18–22x)
          low: 1800
          high: 2200
        - label: Current Series F Mark ($1B+)
          low: 1000
          high: 1000
  - id: FV004
    title: Augury Investment KPI Scorecard
    type: kpi
    sourceRefs:
      - SV001
      - SV002
      - SV003
      - SV017
      - SV018
      - SV026
      - SV027
    summary: >
      IC-ready scoring of Augury across seven investment dimensions on a 0–10 scale (10 = best-in-class), reflecting the
      balance of evidence across all eight chapters of this diligence report. Scores reflect publicly available evidence
      only; financial transparency scores would rise materially upon data-room confirmation of ARR ≥$60M, NRR ≥110%, and
      gross margin ≥60%.
    data:
      items:
        - label: Market Opportunity
          value: 8/10
          detail: 39.5% CAGR AI-PdM market; GVR $60B by 2030; large TAM with structural tailwind
        - label: Product Differentiation
          value: 7/10
          detail: >-
            15-year proprietary dataset; 99.9% accuracy claim; Machine+Process Health combination; Verdantix Green
            Quadrant Leader
        - label: Customer Proof
          value: 8/10
          detail: Forrester 310% ROI independently validated; Fortune 500 anchors named; $1M+ accounts tripled
        - label: Financial Transparency
          value: 3/10
          detail: No ARR, NRR, gross margin, burn, or cap-table disclosure; zero independent financial verification
        - label: Competitive Moat
          value: 6/10
          detail: >-
            First-mover data advantage; managed-service stickiness; challenged by Emerson/AspenTech combination and OT
            incumbents
        - label: Valuation vs Peers
          value: 6/10
          detail: Implied 13x EV/ARR is at high end of industrial SaaS; defensible in base case; stretched in bear case
        - label: Exit Readiness
          value: 5/10
          detail: >-
            No IPO signal; M&A optionality exists (industrial conglomerates); Series E down-round limits near-term
            secondary value
