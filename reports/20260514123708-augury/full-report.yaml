      - number: '5.3'
        title: Hardware Platform and Sensing Technology
        blocks:
          - type: paragraph
            body: >
              Augury's sensing hardware is the primary data collection point in its machine health workflow and a key
              source of technical differentiation. The Ranger Pro sensor, co-developed with Baker Hughes and distributed
              as part of the Bently Nevada product line under the Cordant platform, employs a piezoelectric triaxial
              accelerometer for high-frequency vibration measurement. Its wireless protocol — ISA100.11a — is an IEC
              industrial standard designed for factory automation environments, providing deterministic, low-latency,
              and interference-resistant packet delivery in electromagnetic-dense manufacturing floors. Security is
              implemented via 128-bit AES encryption and X.509 certificate-based mutual authentication for
              device-to-gateway communication. The Ranger Pro is rated IP67 for dust and water ingress resistance,
              operates in temperatures from −40°C to +85°C, and a single gateway supports up to 40 sensors.

              The Halo R4000, launched in November 2024, represents a next-generation hardware form factor designed for
              the most demanding industrial environments. It achieves IP66, IP68, and IP69 ingress protection ratings —
              the highest combined rating available — and is rated for 40G shock resistance in a compact 2×2-inch body
              designed for flush mounting on asset surfaces. Unlike the Ranger Pro, the Halo R4000 incorporates local
              edge AI inference, performing fault classification at the device level. Sensor fusion combining vibration,
              temperature, and phase analysis enables more accurate multi-parameter diagnostics than single-modality
              systems. Augury's use-case documentation indicates coverage of over 25 distinct fault signatures in
              industrial pumps (including cavitation, bearing defects, misalignment, unbalance, looseness, and
              resonance) and over 28 fault types in motors, with a stated accuracy rate exceeding 99.9% for failure
              prediction based on the multi-sensor fusion approach.
