      - number: '5.4'
        title: Integration Ecosystem and Partner Network
        blocks:
          - type: paragraph
            body: >
              Augury's commercial and technical ecosystem spans CMMS and EAM software vendors, cloud infrastructure
              providers, OEM hardware partners, specialty consulting firms, and industrial delivery partners, forming a
              go-to-market network that amplifies direct sales and reduces customer integration friction. On the CMMS
              and EAM side, Augury integrates with IFS Ultimo via a certified bi-directional connector that
              automatically creates and closes work orders based on diagnostic alerts, and with SAP and MaintainX to
              cover the broadest range of enterprise maintenance management workflows. The PTC ThingWorx Ready
              certification enables plug-and-play integration with PTC's industrial IoT platform, enabling customers who
              already run ThingWorx to add Augury diagnostics without custom development. Microsoft Azure provides the
              cloud infrastructure backbone for global data processing and AI model training.

              Baker Hughes holds a minority equity stake and a board seat in Augury, co-marketing the Ranger Pro as the
              Bently Nevada/Cordant hardware and providing enterprise sales reach across its installed base of heavy
              industrial customers. Schneider Electric's SE Ventures co-led the $180M Series E and is listed as a
