      - number: '2.5'
        title: Headwinds and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              Four primary headwinds constrain PdM adoption velocity. OT cybersecurity concerns represent the most
              significant friction—Mordor Intelligence quantifies this as a 2.8% market headwind. Manufacturers are
              reluctant to connect operational technology (OT) networks to cloud platforms, especially in regulated
              industries, due to ransomware risk, data sovereignty requirements, and the IT/OT convergence complexity.
              Vendors who demonstrate OT-security architecture and air-gap-compatible deployment options have a
              meaningful competitive advantage.


              Talent scarcity in data science and ML engineering contributes a 1.9% headwind. Many mid-size
              manufacturers lack internal capability to build, tune, and maintain AI models, creating dependency on
              vendor-managed AI services. This paradoxically benefits established vendors like Augury who provide
              turnkey AI rather than platform-only offerings. Legacy industrial protocols—Modbus, OPC-UA, CAN
              bus—complicate sensor data integration and represent a 1.5% headwind; the most capable platforms provide
              extensive protocol libraries and hardware compatibility matrices. Finally, AI model drift requiring
              continuous retraining adds a 1.2% headwind: deployed models degrade over time as process conditions
              change, and buyers increasingly evaluate vendors on continuous learning capability and model update
              cadence. High upfront hardware and implementation costs also present barriers for SME buyers outside
              Augury's core enterprise segment.
            claimRefs:
              - CM031
              - CM032
              - CM033
              - CM034
              - CM035
      - number: '2.6'
        title: Augury's Addressable Market Position
        blocks:
          - type: paragraph
            body: >-
              Augury occupies the premium tier of the North American enterprise manufacturing PdM market. Its 170+
              manufacturer customers, 20+ Fortune 500 accounts, and presence across 10+ verticals in 40+ countries
              confirm commercial scale in the largest addressable segment (manufacturing) in the highest-value geography
              (North America). The Verdantix Green Quadrant Leadership position in Industrial AI Analytics 2025 provides
              independent analyst confirmation of Augury's strategic positioning relative to peers. The Forrester TEI
              study (October 2025) establishing 310% ROI, $20.1M NPV, and sub-six-month payback provides the strongest
              independent ROI substantiation in the sector.


              A rough SAM estimate: if the North American manufacturing PdM market is 28.85% of the global $14B base
              ($4B) and Augury targets large enterprise manufacturers (top 20-30% of spend), the addressable SAM is
              approximately $800M-$1.2B. Augury's SOM is harder to estimate without ARR disclosure; its 170+ customers
              at $3M-$15M per customer per year implies a current ARR of $500M-$2.5B, but this range is wide. The
              company's emphasis on Fortune 500 accounts—approximately 10% of the Fortune 500 are already
              customers—suggests a penetration ceiling in its core segment that makes TAM expansion through Process
              Health (yield, waste, energy, throughput optimization) strategically essential to sustaining a premium
              growth multiple. AI-driven PdM at 39.5% CAGR provides the market tailwind; Production Health category
              expansion provides the land-and-expand runway.
