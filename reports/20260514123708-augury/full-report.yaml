    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >-
              Augury was co-founded in 2011 by Saar Yoskovitz and Gal Shaul in Haifa, Israel, with the stated mission to
              ensure machines and factories run well so the world can run better. The company is incorporated in the
              United States with headquarters at 1178 Broadway, Third Floor, New York, NY 10001, and maintains its
              original R&D presence in Haifa. Augury identifies itself as an Industrial AI company offering
              condition-based monitoring and process optimization for manufacturing enterprises.


              The operating model combines purpose-built IoT edge sensors, proprietary AI models, and human reliability
              expertise delivered as a cloud-connected subscription service. Revenue is generated through multi-year
              enterprise software agreements bundled with sensor hardware and professional services. The company targets
              asset-intensive verticals including food and beverage, consumer packaged goods, pulp and paper, chemicals,
              building materials, and pharmaceuticals, where unplanned machine downtime and manufacturing waste create
              high-value ROI use cases.


              Augury occupies a growth stage consistent with a post-Series F company: it has demonstrated product-market
              fit in Fortune 500 manufacturing, achieved unicorn status at its Series E, and is now scaling enterprise
              accounts and extending the platform into agentic AI capabilities. The company does not publish financial
              statements; absolute ARR, margins, and burn rate remain undisclosed in the public record.
