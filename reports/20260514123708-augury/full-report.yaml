      - number: '7.5'
        title: Execution and Leadership Risks
        blocks:
          - type: paragraph
            body: >
              Augury's two co-founders remain central to the company's strategic direction and customer relationships
              after 15 years: Saar Yoskovitz serves as CEO and Gal Shaul as co-founder and board Director. The SEC Form
              D (2020) lists Yoskovitz as Executive Officer and Shaul as Director, confirming continued founder
              involvement at the company's top levels. Key-person dependency in enterprise B2B companies is a
              well-documented risk: founder departure or incapacitation can disrupt customer trust, investor confidence,
              and strategic partnerships. The February 2025 appointment of Elan Greenberg as COO (with experience
              scaling DoorDash and Flock Safety) partially mitigates this risk by adding operational depth, but no
              permanent CEO succession plan has been publicly disclosed.

              International execution risk is significant: Augury operates in 40+ countries, with a hybrid
              Israeli-tech/New York-commercial structure. Scaling operations across diverse regulatory environments,
              languages, industrial standards, and customer procurement processes creates execution complexity. The 2022
              Seebo acquisition (Israeli company) added Process Health capabilities but also integration complexity,
              personnel alignment risk, and balance sheet obligations whose resolution has not been publicly confirmed.
              Partnership integration risk is present in the MaintainX CMMS partnership (announced March 2026 per the
              media center press archive) and the Fortune Brands Innovations alliance (May 2025): if partner
              integrations underperform or partners divert maintenance workflows to competing solutions, Augury's
              indirect channel revenue could stagnate.

              Talent risk is high in industrial AI. Competition for AI/ML engineers, IoT hardware specialists, and
              industrial reliability domain experts (Vibration Analysts, Reliability Success Managers) is intense.
              Augury's careers page signals active hiring, but compensation pressure from hyperscalers and well-funded
              AI startups may create retention challenges at mid-level individual contributor levels. The organizational
              complexity of managing a hybrid sensor-hardware, software, and managed-service delivery model across 40+
              countries creates process and execution risk that grows non-linearly with the customer base. Glassdoor
              review signals (blocked for direct access) are an important adverse data source that warrants targeted due
              diligence in the data room.
