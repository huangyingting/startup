  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              Augury operates at the intersection of three competitive forces: (1) AI-native industrial analytics
              startups building horizontally across manufacturing use cases; (2) established operational technology (OT)
              and automation vendors that dominate plant-floor relationships and are adding AI capabilities on top of
              their installed bases; and (3) adjacent platform companies including IIoT platforms, CMMS providers, and
              reliability hardware vendors expanding into AI analytics. Each class of competitor approaches the same
              buyer (industrial maintenance and operations leaders) with a different value proposition, pricing model,
              and go-to-market motion.

              The Verdantix Green Quadrant Industrial AI Analytics 2025 report is the most authoritative independent
              competitive benchmark in this space. Of 19 evaluated vendors, 9 were named Leaders—including
              Augury—validating the market's competitive density. The Leaders include both startups (Augury) and
              incumbents (AspenTech, Emerson, ABB, Rockwell Automation, Honeywell, and others), confirming that Augury
              competes in a segment where global industrial conglomerates with multi-billion-dollar revenue bases and
              decades-long customer relationships are also active.

              The defining competitive dynamic in 2025-2026 is consolidation. Uptake, a Chicago-based industrial AI
              startup, announced its acquisition by Bosch in March 2026, signaling that large industrial conglomerates
              are acquiring rather than organically building predictive maintenance capabilities. GE Digital's Predix
              platform was divested from GE as part of the GE Vernova spinout, and GE has restructured into three
              standalone companies (Aerospace, Vernova, HealthCare)—meaning Predix's industrial AI roadmap is in
              transition. PTC ThingWorx has been rebranded as part of the Velotic platform, indicating continued
              M&A-driven platform consolidation. Augury, as the sole remaining standalone unicorn in the Production
              Health category, faces both validation of market importance and the risk of being squeezed between
              better-resourced incumbents as the market matures.

              Status-quo substitutes for Augury's value proposition include: (1) scheduled preventive maintenance (PM)
              programs managed via legacy CMMS software; (2) reactive (run-to-failure) maintenance in cost-constrained
              plants; (3) in-house reliability programs using manual vibration analysis by route-based technicians with
              handheld analyzers; and (4) large ERP asset management modules (SAP PM, IBM Maximo) without AI-native
              condition monitoring. Each of these substitutes competes for the same maintenance budget and requires
              Augury's ROI story to displace an established workflow rather than simply adding a new tool.
