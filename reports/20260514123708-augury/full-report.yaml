      - number: '2.3'
        title: Market Segmentation
        blocks:
          - type: paragraph
            body: >-
              The PdM market segments across three dimensions: technology deployment model, industry vertical, and
              geography. By deployment model, cloud-based PdM holds 66.55% market share and is growing at 36.95% CAGR,
              reflecting the shift toward centralized AI analytics and subscription SaaS. On-premise deployments remain
              relevant for OT-security-sensitive industries but are growing more slowly. By component, hardware
              represents 45.18% of revenue; software is growing faster at 35.82% CAGR as analytics platforms expand.
              Large enterprises represent 63.65% of current spend; SMEs are the fastest-growing segment at 36.2% CAGR,
              suggesting significant long-tail expansion ahead.


              By industry vertical, manufacturing is the largest end-user segment at 22.95% (Mordor) or 27.9% (Grand
              View Research) of PdM market share, driven by the high cost of downtime and process continuity
              requirements. Oil and gas is the second-largest vertical, driven by critical asset failure risk and safety
              obligations. Energy and utilities adopt PdM for turbine and grid reliability. Discrete manufacturing
              sub-sectors—automotive, aerospace, and electronics—are accelerating adoption as OEE improvement and
              quality-cost pressures intensify. By geography, North America leads at 28.85% share (Mordor), supported by
              mature Industry 4.0 infrastructure and established vendor ecosystems; Asia-Pacific is the fastest-growing
              region at 35.25% CAGR as manufacturing intensity rises in India, China, and Southeast Asia.


              Augury's customer profile aligns with the largest and highest-value segments: Fortune 500 process and
              discrete manufacturers in North America, with growing international presence across 40+ countries. Its
              vertical mix spans food and beverage, consumer packaged goods, chemicals, pharmaceuticals, pulp and paper,
              and building materials—all high-asset-intensity sectors within the dominant manufacturing segment.
