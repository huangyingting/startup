  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >-
              Predictive maintenance (PdM) is the application of machine learning, IoT condition-monitoring sensors, and
              cloud analytics to detect equipment anomalies and predict failures before they cause unplanned downtime.
              The market boundary for this chapter spans three layers: hardware components (vibration sensors, acoustic
              detectors, thermal cameras, and edge AI devices), software platforms (cloud analytics, digital-twin
              integrations, CMMS connectors, and AI model orchestration), and professional services (implementation,
              consulting, managed monitoring, and training). Analyst sources apply this boundary differently:
              MarketsandMarkets and Grand View Research size only dedicated PdM solutions; Mordor Intelligence and
              Allied Market Research include adjacent AI-for-operations offerings, producing estimates two to six times
              larger for identical calendar years.


              Excluded from the TAM as defined by primary analyst sources are general ERP maintenance modules without
              ML/AI capability, pure time-based preventive maintenance software, industrial automation control systems
              (SCADA, DCS), and downstream process simulation tools. Status-quo substitutes for PdM include reactive
              run-to-failure maintenance and scheduled preventive maintenance (PM). Both sacrifice either unplanned
              downtime reduction (reactive) or operational efficiency (over-scheduled PM). Augury further expands the
              served market by branding its platform as Production Health—a category it defines to encompass machine
              health, process health, and AI-agent-driven manufacturing insights—creating a proprietary market frame
              that exceeds traditional PdM in scope and, potentially, in TAM. No independent analyst report has yet
              formally sized the Production Health category as distinct from PdM, making Augury's TAM claim partially
              reliant on company-defined framing.
            claimRefs:
              - CM021
              - CM022
              - CM023
              - CM024
              - CM025
          - type: table
            tableRef: TM001
            claimRefs:
              - CM021
              - CM022
