      - number: '5.2'
        title: Technology Architecture and AI Capabilities
        blocks:
          - type: paragraph
            body: >
              Augury's technology stack is organized in a three-tier architecture: edge sensing and inference, cloud AI
              and analytics, and human expert review. At the edge layer, Augury deploys IoT sensors — the Ranger Pro
              (developed in partnership with Baker Hughes and distributed under the Bently Nevada/Cordant brand) and the
              Halo R4000, launched in November 2024 as Augury's first industrial-grade edge-AI native device — which
              capture multi-modal machine data including high-frequency vibration, ultrasound, surface temperature, and
              magnetic field measurements. The Halo R4000 incorporates edge AI inference, running fault classification
              models directly on the device, reducing cloud bandwidth requirements and enabling faster anomaly detection
              independent of network connectivity. Automatic baseline establishment completes within 48 hours of
              installation without manual configuration.

              Cloud AI models, trained on Augury's proprietary dataset of over 1.1 billion hours of operational data
              from more than 300,000 machines, perform deep diagnostic analysis and prescriptive root-cause
              identification for both Machine Health and Production Health workloads. For Production Health, the
              platform integrates operational process metrics via Seebo-derived connectors to correlate machine state
              with production outcomes in near-real time. Human vibration analysts supplement AI outputs by reviewing
              edge cases, annotating new fault patterns, and providing customer-facing diagnostic reports, creating a
              closed feedback loop that continuously improves model accuracy across the deployed fleet. At the 2024
              Beyond the Line user conference, Augury disclosed plans to integrate Generative AI for natural-language
              diagnostic summaries and to apply reinforcement learning to retrain models continuously using confirmed
              fault outcome feedback from maintenance teams — a self-improving architecture that would reduce dependence
              on manual analyst annotation over time.
