  evidenceGaps:
    - type: private-evidence-only
      severity: critical
      topic: Security certifications (SOC 2 Type II, ISO 27001, IEC 62443) not publicly confirmed
      missingEvidence: >
        Augury has not published any security certification attestations, SOC 2 Type II reports, or IEC 62443
        compliance declarations in public-facing documentation. The company's trust/security page returns 404.
        This is a material gap given Augury's deployment inside customer OT networks.
      whyItMatters: >
        Enterprise manufacturing customers and critical infrastructure operators increasingly require OT vendors
        to hold verifiable security certifications as a deal-qualifier. Absence of certification confirmation
        creates a potential barrier to regulated-industry deals and complicates OT security due diligence.
      diligencePath: >
        Request SOC 2 Type II report (most recent period), ISO 27001 certificate, IEC 62443 assessment, and
        penetration test reports from management during data room. Confirm certification scope covers cloud
        infrastructure, sensor firmware, and customer-facing platform.
      relatedQuestionRefs:
        - QR034
        - QR012
        - QR033
      relatedTableRefs:
        - TR002

