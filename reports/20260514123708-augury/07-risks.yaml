  - id: FR003
    title: Risk Transmission Map — How Risks Cascade to Outcomes
    type: flow
    sourceRefs:
      - SR001
      - SR008
      - SR014
      - SR015
    approximationNotes: >
      Risk transmission paths are analyst constructs based on public evidence and industry analog risk
      cascades. Node relationships represent plausible causal links, not confirmed company-disclosed
      dependencies. Edge labels indicate the transmission mechanism.
    data:
      nodes:
        - id: ot-breach
          label: OT/ICS Cybersecurity Incident
          detail: Sensor firmware compromise or cloud platform breach exposing customer machine data
        - id: gdpr-violation
          label: GDPR / EU AI Act Violation
          detail: Data privacy breach or non-compliance with EU AI Act high-risk requirements
        - id: incumbent-bundle
          label: Incumbent Competitive Bundling
          detail: Siemens/ABB/Honeywell offers AI diagnostics as zero-cost bundle with OT hardware contracts
        - id: valuation-pressure
          label: Valuation / Exit Constraint
          detail: Flat Series F versus Series E peak; exit liquidity constrained for early investors
        - id: talent-loss
          label: AI/ML Talent Attrition
          detail: Engineering and reliability expert talent lost to hyperscalers and AI startups
        - id: customer-churn
          label: Customer Churn / Account Loss
          detail: Enterprise customers switch to incumbent solutions or reduce Augury contract scope
        - id: revenue-impact
          label: Revenue Growth Slowdown
          detail: New logo acquisition slows; NRR pressure from competitive or product quality issues
        - id: burn-accelerate
          label: Accelerated Cash Burn
          detail: Revenue shortfall versus plan extends burn runway; bridge financing required sooner
        - id: down-round
          label: Down-Round / Financing Risk
          detail: Next capital raise at sub-$1B valuation; investor dilution and morale impact
        - id: product-quality
          label: AI Model / Product Quality Failure
          detail: False negatives cause undetected equipment failures; customer trust erosion
      edges:
        - from: ot-breach
          to: customer-churn
          label: Customer trust destruction post-breach
        - from: ot-breach
          to: gdpr-violation
          label: Customer personal data exposure triggers GDPR obligation
        - from: gdpr-violation
          to: revenue-impact
          label: EU market access suspended pending compliance
        - from: incumbent-bundle
          to: customer-churn
          label: Customers accept incumbent bundle during contract renewal
        - from: customer-churn
          to: revenue-impact
          label: Direct ARR reduction from lost accounts
        - from: talent-loss
          to: product-quality
          label: ML model development velocity slows; reliability expert capacity shrinks
        - from: product-quality
          to: customer-churn
          label: Repeated false negatives erode customer confidence
        - from: revenue-impact
          to: burn-accelerate
          label: Revenue shortfall versus plan extends net burn runway
        - from: valuation-pressure
          to: down-round
          label: Constrained exit path forces below-$1B financing terms
        - from: burn-accelerate
          to: down-round
          label: Runway pressure forces capital raise at unfavorable terms
        - from: incumbent-bundle
          to: valuation-pressure
          label: Market share loss re-rates growth expectations downward

