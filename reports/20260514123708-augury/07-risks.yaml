  - id: technology-operational-risks
    title: Technology and Operational Risks
    body: >
      Augury's core technology risk is the OT/ICS cybersecurity attack surface created by deploying networked
      IoT sensors inside customer manufacturing environments. CISA explicitly identifies ICS/OT environments
      as high-priority targets for nation-state and criminal threat actors, noting that legacy OT systems lack
      encryption, authentication, and modern security controls. Augury's sensors continuously transmit machine
      data from production-critical equipment over customer networks, creating a persistent network presence
      inside operational technology environments. A security compromise—whether of Augury's cloud infrastructure,
      sensor firmware, or the customer-side network gateway—could expose customers' proprietary process
      parameters, machine specifications, and production schedules as sensitive IP. Worse, a malicious actor
      could potentially manipulate health alerts (suppressing legitimate warnings or generating false positives)
      to cause equipment failures or production disruptions at customer sites. NVD records as of 2026 show
      no CVEs specifically attributed to Augury's platform, but the risk category is well-documented across
      industrial IoT vendors generally.

      AI model accuracy risk is a second material operational concern. Augury claims 99.9% failure detection
      accuracy, but false negatives—failures that the AI model misses—carry outsized consequences in industrial
      settings: unplanned downtime, equipment damage, safety incidents, and potential liability exposure from
      customers who relied on Augury's health alerts. The AI model is trained on a specific machine data
      corpus; deployment in novel machine types, unusual operating environments, or brownfield facilities
      with non-standard legacy equipment may degrade model performance outside tested parameters. Integration
      complexity in heterogeneous brownfield manufacturing environments (diverse SCADA systems, PLCs, historians,
      and CMMS platforms) creates deployment friction, extending time-to-value and risking project failures.

      Hardware supply chain risk is growing: the Halo R4000 relies on Qualcomm edge-AI chipsets (Qualcomm
      Ventures is a Series F investor), creating vendor dependency. Sensor manufacturing disruptions,
      component shortages, or geopolitical supply chain shocks could impair Augury's ability to fulfill
      hardware deployment commitments to enterprise customers. The company's human expert layer (Vibration
      Analysts, RSMs) is both a competitive moat and a scalability constraint: growing the managed-service
      headcount alongside the customer base creates operational leverage risks.
