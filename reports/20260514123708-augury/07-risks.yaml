        - 40+ country presence requires local execution leadership; gaps create customer experience and compliance risk
        - "3"
        - "3"
        - Hybrid Israel / New York / global field structure; limited public detail on regional leadership bench
        - Request regional org chart and leadership tenure data; review APAC / EMEA expansion plans
      - - Seebo Integration Leadership
        - 2022 acquisition; post-integration organizational alignment and Process Health product delivery risk
        - "2"
        - "3"
        - Process Health now in market; Seebo acquisition functionally complete per press releases
        - Confirm Seebo team retention rate and Process Health roadmap ownership in data room
    claimRefs:
      - CR035
      - CR036
      - CR037
      - CR038
      - CR039

  - id: TR005
    title: Mitigation and Kill Criteria
    notes: >
      Monitorable triggers and threshold events that would indicate thesis-breaking risk materialization.
      These are not company-confirmed; they represent investment-framework constructs based on public
      evidence analysis. Each trigger, if observed, would warrant immediate deal-team escalation or
      investment thesis re-evaluation.
    sourceRefs:
      - SR001
      - SR008
      - SR014
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Action Implication
    rows:
      - - Valuation compression / down-round
        - Series G pricing and terms; secondary transaction reports; Crunchbase or PitchBook updates
        - Series G valued below $1B; or secondary shares clearing below $1B implied valuation
        - Re-model exit waterfall; assess Series F liquidation preference impact on common equity
      - - OT cybersecurity incident
        - CVE database (NVD), CISA advisory database, customer press releases, breach notification databases
        - Any CVE attributed to Augury platform or customer breach linked to Augury sensor data
        - Immediate security due diligence escalation; assess customer contract liability exposure
      - - EU AI Act high-risk classification
        - EU AI Act official gazette publications; Augury management statements; EU AI Office database
        - Augury platform classified as high-risk AI; CE marking deadline without confirmed compliance path
        - Quantify compliance cost; model revenue impact of EU customer churn if certification delayed
      - - CEO or co-founder departure
        - LinkedIn, company announcements, press releases, SEC-equivalent foreign issuer filings
        - Yoskovitz departure announcement without confirmed permanent replacement
        - Re-assess management risk; request succession plan from board; consider governance protective provisions
      - - Incumbent acquisition of key customer
        - Customer press releases; incumbent investor announcements; procurement tender databases
        - Any top-5 Augury customer announces exclusive OT AI partnership with Siemens, ABB, or Honeywell
        - Analyze customer contract remaining term; model revenue impact; assess competitive moat durability
      - - GDPR enforcement action
        - EU data protection authority press releases (CNIL, ICO, DPA); Augury's own press releases
        - DPA fine, investigation announcement, or mandatory audit targeting Augury or its data practices
        - Quantify maximum fine exposure; assess operational impact; require remediation plan from management
      - - Burn rate exceeding $75M runway within 12 months
        - "Data room: monthly management accounts; investor update letters; secondary market signals"
        - Cash balance below 12 months of runway at current burn without confirmed next financing
        - Require bridge financing commitment or accelerated profitability milestone; reassess capital structure
      - - Major partner failure (MaintainX or Fortune Brands)
        - "Partner press releases; partner financial filings (Fortune Brands is NYSE: FBIN); LinkedIn signals"
        - Partner dissolution of integration agreement or partner financial distress announcement
        - Assess revenue and customer impact; model without partner channel contribution
    claimRefs:
      - CR001
      - CR009
      - CR025
      - CR035

figures:
  - id: FR001
    title: Risk Heatmap — Severity vs. Likelihood Matrix
    type: matrix
    sourceRefs:
      - SR001
      - SR008
      - SR014
    approximationNotes: >
      Severity (1=low, 5=critical) and likelihood (1=rare, 5=very likely) are analyst assessments based on public
      evidence, CISA/NIST guidance, competitive intelligence, and company disclosures as of May 2026. These are
      not company-confirmed ratings. Residual risk positioning reflects known mitigations; gross risk would be
      materially higher for most items.
    data:
      columns:
        - label: "Low Likelihood (1–2)"
          note: Rare or unlikely to occur in 12-month horizon
        - label: "Medium Likelihood (3)"
          note: Possible; would not surprise a well-informed observer
        - label: "High Likelihood (4)"
          note: Probable; expected to occur without active mitigation
        - label: "Very High Likelihood (5)"
          note: Near-certain; already partially manifesting
      rows:
        - label: "Critical Severity (5)"
          values:
            - label: "CEO/Co-Founder Departure"
