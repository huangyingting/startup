  - id: regulatory-legal-compliance-risks
    title: Regulatory, Legal, and Compliance Risks
    body: >
      Augury operates across more than 40 countries, creating a complex multi-jurisdictional regulatory
      compliance obligation. The EU General Data Protection Regulation (GDPR) applies to any processing
      of personal data related to EU residents or EU-based operations. While Augury's primary data is
      machine operational telemetry (vibration, temperature, magnetic readings) rather than consumer
      personal data, employee identities, user accounts on the platform, and process parameters from
      EU facilities may constitute personal data under GDPR's broad definitions. Augury's privacy policy
      (last updated February 2023) acknowledges GDPR-based legal bases for processing and references
      international data transfer mechanisms (EU-U.S. Data Privacy Framework). Non-compliance, data
      breaches, or failure to honor data subject rights could result in GDPR fines up to €20M or 4% of
      global annual turnover—a material exposure for a company at Augury's revenue scale.

      CISA's Industrial Control Systems (ICS) cybersecurity guidance directly affects Augury's customer
      base in critical infrastructure sectors (energy, water, chemicals, food and beverage). CISA's
      Secure by Demand guidance for OT calls on asset owners to procure products with security-by-design
      principles—strong authentication, encrypted protocols, and secure configurations. If Augury's
      sensor platform does not fully meet CISA's recommended security posture for OT vendors, it may
      lose deals with critical-infrastructure customers that are subject to CISA compliance pressure or
      sectoral regulations (NERC CIP for energy, AWIA 2018 for water). OSHA's machine safety standards
      apply to Augury's installation activities and its customers' use of machine health data to make
      safety-related maintenance decisions; erroneous failure alerts could create OSHA liability exposure
      if customers rely on Augury data in safety-critical decisions.

      The EU Artificial Intelligence Act (EU AI Act), adopted in 2024 and entering enforcement in 2025–2026,
      classifies AI systems used in critical infrastructure and industrial safety as "high-risk" applications
      subject to conformity assessment, human oversight requirements, and transparency obligations. Augury's
      production-critical failure detection AI—used to prevent equipment failures at industrial facilities—may
      qualify as high-risk AI under the EU AI Act's Annex III categories, potentially requiring CE marking,
      technical documentation, post-market monitoring, and human oversight attestations. Export control
      risk is low but non-zero: if Augury's sensor-plus-AI technology is classified as dual-use technology
      under U.S. Export Administration Regulations (EAR), export to certain jurisdictions could require
      BIS licenses. The FTC's emerging AI and data governance enforcement posture creates additional
      compliance obligations for any AI vendor making performance claims (such as Augury's 99.9% accuracy
      claim) that may require substantiation. No litigation, enforcement actions, or regulatory investigations
      against Augury have been identified in any public record as of May 2026.
