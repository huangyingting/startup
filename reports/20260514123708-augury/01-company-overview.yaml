- id: section-3
  title: Scale, customers, and validated ROI
  body: 'Augury reports serving 170+ global enterprise customers as of February 2025, including more than 20 Fortune 500 companies—approximately
    one in ten of the Fortune 500. Named customers in the public record include PepsiCo, DuPont, Colgate-Palmolive, General
    Mills, Heineken, Barilla, and Fortune Brands Innovations. The company operates across 40+ countries and monitors more
    than 300,000 machines representing over 1.1 billion machine-hours of data. Since 2021, Augury has grown revenue five-fold,
    tripled its count of Fortune 500 customers, and tripled its count of accounts with $1M+ annual contract value.


    An independent Forrester Total Economic Impact study commissioned in September 2025 found a 310% three-year ROI across
    a composite Augury customer, with an NPV of $20.1M, payback period under six months, $16.8M in unplanned downtime savings,
    15% maintenance cost reduction, and 5% throughput increase. Fortune Brands Innovations publicly reported 2.5x ROI within
    eight months of deploying Augury across 1,000+ machines at sixteen manufacturing sites. Augury estimates cumulative customer
    value generated at $1 billion.


    The $1B cumulative value and 5–20x ROI range are company-reported figures without independent third-party audits beyond
    the Forrester study. Customer-level churn rates and net revenue retention are not disclosed, and the full customer roster
    is not public. These metrics should be treated as directionally positive but requiring management-room validation during
    due diligence.'
