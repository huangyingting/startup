- id: section-4
  title: Funding history and investor base
  body: 'Augury has raised approximately $369M across multiple rounds since its 2011 founding. The most recent event was a
    $75M Series F closed in February 2025, led by Lightrock, a London-based impact-focused growth equity fund, with participation
    from existing investors Insight Partners, Eclipse, Qumra Capital, La Maison Partners, SE Ventures (Samsung Electronics’
    venture arm), and Qualcomm Ventures. The Series F maintained Augury’s valuation at $1B+ rather than an upround, reflecting
    the broader private-market valuation discipline of 2024–2025.


    The landmark Series E in October 2021 raised $180M at a $1.5B valuation, making Augury one of the first Industry 4.0 unicorns.
    That round was co-led by Insight Partners and included Goldman Sachs and Eclipse Ventures. Prior rounds included a Series
    C with Eclipse Ventures participation and earlier seed and Series A/B rounds not fully itemized in public sources.


    The presence of strategic investors SE Ventures and Qualcomm Ventures is particularly notable: Samsung’s manufacturing
    ecosystem and Qualcomm’s edge-chipset roadmap suggest potential hardware-software integration pathways for the Halo R4000
    platform. Full cap table details, board composition, liquidation preferences, information rights, and secondary transaction
    history are not publicly disclosed and constitute a material evidence gap requiring data-room access.'
  claimRefs:
