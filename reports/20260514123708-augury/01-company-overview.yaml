company:
  name: Augury
chapter:
  number: 1
  title: Company Overview
  summary: Augury is a New York-headquartered Industrial AI company founded in 2011 in Haifa, Israel that delivers Machine
    Health and Process Health solutions under a unified Production Health platform. As of February 2025 the company has raised
    approximately $369M in total including a $75M Series F led by Lightrock that maintained a $1B+ valuation, serves 170+
    enterprise customers including 20+ Fortune 500 companies, and monitors 300,000+ machines across 40+ countries. Independent
    Forrester TEI research reports a 310% three-year ROI. Revenue has grown five-fold since 2021 though absolute ARR is not
    publicly disclosed. Leadership includes co-founder and CEO Saar Yoskovitz and a new COO, Elan Greenberg, hired in February
    2025. Verdantix named Augury a Green Quadrant Leader in Industrial AI Analytics for 2025.
sections:
- id: section-1
  title: Identity, mission, and operating model
  body: 'Augury was co-founded in 2011 by Saar Yoskovitz and Gal Shaul in Haifa, Israel, with the stated mission to ensure
    machines and factories run well so the world can run better. The company is incorporated in the United States with headquarters
    at 1178 Broadway, Third Floor, New York, NY 10001, and maintains its original R&D presence in Haifa. Augury identifies
    itself as an Industrial AI company offering condition-based monitoring and process optimization for manufacturing enterprises.


    The operating model combines purpose-built IoT edge sensors, proprietary AI models, and human reliability expertise delivered
    as a cloud-connected subscription service. Revenue is generated through multi-year enterprise software agreements bundled
    with sensor hardware and professional services. The company targets asset-intensive verticals including food and beverage,
    consumer packaged goods, pulp and paper, chemicals, building materials, and pharmaceuticals, where unplanned machine downtime
    and manufacturing waste create high-value ROI use cases.


    Augury occupies a growth stage consistent with a post-Series F company: it has demonstrated product-market fit in Fortune
    500 manufacturing, achieved unicorn status at its Series E, and is now scaling enterprise accounts and extending the platform
    into agentic AI capabilities. The company does not publish financial statements; absolute ARR, margins, and burn rate
    remain undisclosed in the public record.'
  claimRefs:
