- id: section-5
  title: Leadership, milestones, and market position
  body: 'Augury is led by co-founder and CEO Saar Yoskovitz, who has guided the company from a two-person machine-diagnostics
    startup in Haifa to a $1B+ growth-stage Industrial AI platform. Co-founder Gal Shaul continues in a technical leadership
    role. In February 2025, Augury hired Elan Greenberg as Chief Operating Officer; Greenberg previously served as COO at
    public-safety tech company Flock Safety and held executive roles at DoorDash and OpenTable, bringing operational scale-up
    experience relevant to Augury’s global enterprise expansion. C-suite composition beyond these three and full board membership
    are not disclosed in public materials.


    Key milestones include: founding in 2011; Series E unicorn designation in October 2021; acquisition of Seebo and launch
    of Process Health in 2022; Halo R4000 launch in November 2024; Series F close and COO hire in February 2025; Forrester
    TEI publication and Verdantix Green Quadrant leadership award in 2025; and MaintainX integration partnership in March
    2026.


    Verdantix’s 2025 Green Quadrant for Industrial AI Analytics placed Augury among nine leaders out of nineteen vendors evaluated,
    citing Augury’s strong platform depth in machine condition monitoring and process optimization. CB Insights classifies
    Augury as a “Challenger” in predictive maintenance platforms alongside Rockwell Automation, Microsoft, and IBM, signaling
    that Augury competes at the enterprise tier against industrial software incumbents and hyperscalers. The MaintainX partnership
    announced in March 2026, connecting Augury condition-based alerts to MaintainX work-order management, broadens Augury’s
    CMMS ecosystem presence and signals a platform-extension strategy.'
