- id: section-2
  title: Platform portfolio and technology
  body: 'Augury’s product portfolio is organized around three integrated offerings: Machine Health, Process Health, and the
    Halo R4000 edge-AI sensing platform. Machine Health uses vibration, temperature, and ultrasound sensors combined with
    AI models and a network of over 300,000 monitored machines to predict rotating equipment failures before they cause unplanned
    downtime. The company claims 99.9% failure detection accuracy and an average of thirty days to first machine improvement
    after deployment. A failure is detected or prevented approximately every 43 minutes across the installed base.


    Process Health, introduced following the 2022 acquisition of Israeli startup Seebo, applies AI to manufacturing process
    data to identify inefficiencies causing yield loss and waste. Augury reports customer outcomes of 9% yield increase, 37%
    waste reduction, 5% natural gas reduction, and 7% throughput improvement from Process Health deployments. Together, Machine
    Health and Process Health form the Production Health platform, which Augury positions as the complete Industrial AI operating
    system for manufacturers.


    The Halo R4000 series, launched in November 2024, is described as the first industrial-grade edge-AI-native machine health
    sensing platform. It consolidates sensor capture, on-device inference, and connectivity into a ruggedized form factor
    suited for harsh manufacturing environments. The Halo R4000 is central to Augury’s roadmap for agentic industrial AI,
    where the system autonomously recommends and, eventually, acts on maintenance decisions without human intervention.'
