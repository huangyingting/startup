  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: 'Augury Company Overview TO002: Leadership beyond founders and COO is not disclosed in any single public document.'
    missingEvidence: Augury does not publish a complete C-suite list, board composition, or full executive team roster. Roles
      for CFO, VP Engineering, VP Sales, and any outside board directors are absent from public materials reviewed for this
      chapter.
    whyItMatters: Governance and key-person risk assessment requires visibility into the full board and leadership team, which
      is unavailable from public sources.
    diligencePath: Request a current org chart, board composition, and leadership bios from management during data-room review.
    relatedQuestionRefs:
    - QO002
    - QO021
    relatedTableRefs:
    - TO002
  - type: private-evidence-only
    severity: material
    topic: 'Augury Company Overview TO003: Full cap table, investor ownership stakes, and board seat holders are undisclosed.'
    missingEvidence: No public document discloses exact equity percentages, liquidation preference stack, board seat holders,
      information rights, pro-rata agreements, or secondary transaction history for Augury investors.
    whyItMatters: Control, economic importance, and investor alignment assessments depend on knowing who holds board seats
      and material ownership stakes.
    diligencePath: Request the current cap table, board composition, and investor side-letters through the data room.
    relatedQuestionRefs:
    - QO023
    relatedTableRefs:
    - TO003
  - type: private-evidence-only
    severity: material
    topic: Augury revenue, ARR, net revenue retention, and burn rate are undisclosed in public materials.
    missingEvidence: Augury reports five-fold revenue growth since 2021 but does not disclose absolute ARR, net revenue retention,
      gross margin, or burn rate in any public document reviewed.
    whyItMatters: Revenue and unit economics are fundamental to valuation underwriting and are currently a complete gap in
      the public record.
    diligencePath: Obtain audited financial statements or management accounts from the data room; request ARR, NRR, gross
      margin, and burn rate with trailing four quarters.
    relatedQuestionRefs:
    - QO012
    relatedTableRefs: []
  - type: missing-source
    severity: minor
    topic: MaintainX partnership commercial terms and mutual ROI metrics are not available in public press materials.
    missingEvidence: The March 2026 MaintainX partnership announcement confirmed the integration but did not disclose commercial
      terms, revenue sharing, joint customer count, or mutual ROI impact.
    whyItMatters: Partnership depth and commercial contribution are relevant to Augury’s go-to-market ecosystem strategy and
      potential revenue diversification.
    diligencePath: Request the full partnership agreement and any joint customer data from management.
    relatedQuestionRefs:
    - QO025
    relatedTableRefs: []
  - type: private-evidence-only
    severity: minor
    topic: Augury customer scale claims (170+ customers, 20+ Fortune 500) cannot be independently verified from third-party
      sources.
    missingEvidence: No independent third-party count of Augury customers is available. The 170+ and 20+ Fortune 500 numbers
      are management-reported claims without a customer registry, analyst verification, or audited count.
    whyItMatters: Customer concentration, churn, and net retention cannot be assessed without a verified customer list.
    diligencePath: Request customer list with ARR per account and churn history from management during data-room review.
    relatedQuestionRefs:
    - QO004
    relatedTableRefs: []
  - type: private-evidence-only
    severity: minor
    topic: Augury platform capability claims (99.9% detection accuracy, 30-day deployment, 300K machine scale) lack independent
      technical audits.
    missingEvidence: Detection accuracy, time-to-value, and monitored machine count are company-reported metrics. The Forrester
      TEI study validates financial ROI but not platform detection accuracy. No independent technical benchmark or audit of
