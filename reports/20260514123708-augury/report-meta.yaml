companyProfile:
  summary: >-
    Augury is an AI-powered industrial machine health and production health company founded
    in 2011 in Israel by Gal Shaul and Saar Yoskovitz. The company uses proprietary IoT
    sensors combined with machine learning models trained on over 1.1 billion hours of machine
    data to detect equipment failures before they occur, enabling manufacturers to avoid
    unplanned downtime and optimize production efficiency. Augury serves 170+ manufacturing
    customers across 40+ countries, including Fortune 500 companies such as PepsiCo, DuPont,
    Colgate-Palmolive, General Mills, and Heineken. In February 2025, the company raised a
    $75M Series F round led by Lightrock, maintaining its $1B+ unicorn valuation.
  foundedDate: "2011-01-01"
  founders:
    - name: Gal Shaul
      role: CEO
      background: Israeli entrepreneur and technologist; co-founded Augury in 2011 and has served as CEO since inception.
      claimRefs: [CO001]
    - name: Saar Yoskovitz
      role: CPO (Chief Product Officer)
      background: Israeli engineer and entrepreneur; co-founded Augury in 2011 and leads product strategy.
      claimRefs: [CO001]
  foundingLocation: Haifa, Israel
  headquarters: New York, NY (with R&D in Haifa, Israel)
  productSummary: >-
    Augury's platform consists of two core products: Machine Health (vibration and ultrasound
    IoT sensors that detect mechanical failures) and Production Health (AI analytics that
    identify root causes of production losses and optimize manufacturing output). The platform
    uses edge AI hardware, cloud ML models, and human expert analysts to deliver a managed
    service that achieves 99.9% failure detection accuracy according to company claims.
  customerFocus: >-
    Large-scale manufacturers in food & beverage, chemical, consumer goods, and industrial
    manufacturing sectors; primarily Fortune 500 and large enterprise customers with complex
    multi-site operations.
  businessModel: >-
    Hardware + software + services: IoT sensor hardware sold or leased per machine, combined
    with SaaS subscription for the analytics platform (Machine Health and Production Health),
    plus managed service with Augury's expert analysts. Enterprise contracts typically include
    multi-year commitments.
  stage: Series F (private unicorn)
  fundingStatus: >-
    $75M Series F closed February 2025, led by Lightrock with participation from Insight
    Partners, Eclipse, Qumra Capital, La Maison Partners, SE Ventures, and Qualcomm Ventures.
    Post-money valuation maintained at $1B+. Total raised approximately $369M across all rounds.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO015, CO021]

