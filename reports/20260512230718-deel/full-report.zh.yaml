              截至 2025 年 10 月，Deel 披露的采用指标勾出一条很强的量化牵引曲线。37,000+ 企业客户（2022 年约 11,000 家、2024 年 20,000+ 家）说明获客速度很快。Deel 平台管理
              150 万名用工人员，平均每个客户约 41 人——这与 SMB 为主、用 EOR 管理小型国际团队的客户结构一致。年化薪资发放额 $22B 验证了交易规模。收入同比增长 75%（2024 年 4 月至 2025
              年 4 月）是最核心的采用信号——按这个增速，Deel 每年新增约 $430M+ ARR，说明新客获取和存量账户扩张都在显著贡献。公司称，用工人员数量（150
              万）与客户数量同步增长，意味着既有账户内扩张（每个客户管理的员工随时间增加）和新增客户都在发生。企业采用的一个方向性证据是 Klarna 案例：Klarna 拥有 5,000+ 员工，把全球 HR 从
              Workday 迁到 Deel——复杂的多年实施项目，说明 Deel 正在赢下过去由传统厂商服务的企业合同。
