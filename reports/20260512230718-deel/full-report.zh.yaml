      - number: '1.3'
        title: 资本形成与投资人生态
        blocks:
          - type: paragraph
            body: >-
              2019 年以来，Deel 通过六轮股权融资合计募资约 $961M，并在 2025 年 10 月 Series E 达到 $17.3B 投后估值。 种子轮在 Y Combinator 路演日后于 2019
              年完成，为产品开发提供初始资本。Andreessen Horowitz 于 2020 年领投 $30M Series A。Ben Horowitz 后来在 Series E 公告中表示，Deel
              的基础设施已经成为各地客户的必需品。 之后公司在 2021 年 6 月完成 $156M Series B，2021 年 10 月以 $5.5B 估值完成 $425M Series C， 2022 年 5 月以
              $12B 估值完成 $50M Series D。Series D 金额相对较小（$50M）、估值较高（$12B）， 暗示既有投资人在一家资本充足的公司中行使跟投权，而不是公司需要新的稀释性资本。2022 年
              Series D 到 2025 年 Series E 之间隔了三年，与 Deel 期间声称实现盈利相一致——公司在不依赖外部资本的情况下，将 ARR 从低于 $300M 做到超过 $1B。2025 年 10 月的
              Series E 由新投资人 Ribbit Capital 领投，其创始人 Micky Malka 提到， Deel 自身全远程运营模式，使其特别适合为全球团队扩张构建产品。回归投资人 a16z 和 Coatue
              与 General Catalyst、 Green Bay Ventures 共同参投。资金将用于战略收购、继续建设自有基础设施以及 AI 创新。知名董事会顾问包括 Emilie Choi（Coinbase
              President and COO）、Tobias Lütke（Shopify CEO）、Dara Khosrowshahi（Uber CEO）、 Jeffrey Katzenberg 和 Jeff
              Wilke（前 Amazon Worldwide Consumer CEO）。
