      - number: '4.5'
        title: 财务风险与尽调缺口
        blocks:
          - type: paragraph
            body: >-
              Deel 作为私营公司，造成实质财务尽调缺口。公开市场没有经审计的 GAAP 财务报表；若无数据室访问权，无法独立验证 $1B ARR 声明和盈利说法。 按产品分部拆分的毛利率未披露；EOR（25-35%）与
              SaaS 模块毛利率（70-80%）差异很大，收入结构变化足以显著改变投资论点。 净收入留存（NRR）——落地后扩张 SaaS 业务最重要的健康指标——从未公开披露，客户层 CAC 也没有。2025 年 3 月
              Rippling RICO 诉讼指控商业间谍，代表一项未量化或有负债；如果 Rippling 胜诉，RICO 三倍损害赔偿可能很高，而且没有准备金或保险披露。 FX 风险实质存在：每年在 150+ 种货币中处理
              $22B 薪酬，会让雇主补差计算和 Deel 自身资金库浮存都暴露在汇率波动下。 EOR 浮存收入——按当前利率估计规模可观——对降息敏感，且未单独披露。收入集中风险未知，因为没有披露客户 HHI
              或最大客户收入占比。 这些缺口可以在数据室中解决，但在以 $17.3B 估值承销仓位前，它们是阻断性尽调事项。
