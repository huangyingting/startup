      - number: '7.2'
        title: 法律与监管风险
        blocks:
          - type: paragraph
            body: >-
              法律风险：Rippling v. Deel RICO 诉状（案号 3:25-cv-02166-VC，N.D. Cal.，2025 年 3 月 14 日提交）是最重大的法律风险。Rippling 指控 Deel
              从事商业间谍活动——具体而言，一名 Deel 员工从 Rippling 窃取了机密商业秘密和客户数据。RICO 允许原告主张实际损害的三倍赔偿（3×）和律师费。如果 Rippling 主张的损失为
              $100M+，三倍赔偿敞口可能超过 $300M–$1B。Deel 公开回应否认所有指控，并称该诉讼是一种竞争手段。截至 2025
              年中，该案处于证据开示阶段；开庭时间不确定。解决路径：（a）驳回——消除责任；（b）和解——参考可比 IP/RICO 案件，可能在 $50M–$200M 区间；（c）Rippling
              胜诉判决——最坏情况。监管风险：EOR 服务商在 150+ 个国家作为法定雇主运营，敞口包括劳动法违规（未提供法定福利、解雇程序错误）、税务合规失败（预扣或汇缴错误），以及误分类责任（如果 Deel 的 AI
              风险评分把员工错误归类为承包商）。Deel 存储欧盟用工人员的敏感个人雇佣数据（国民身份证号、薪资记录），因此 GDPR 执法是持续风险。GDPR 第 83 条下的潜在罚款最高可达全球年营业额的
              4%——若发现重大违规，按当前 ARR 约为 $40M。
            claimRefs:
              - CR004
              - CR005
              - CR006
              - CR007
              - CR008
