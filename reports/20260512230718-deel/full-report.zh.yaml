      - number: '7.4'
        title: 竞争与关键人物风险
        blocks:
          - type: paragraph
            body: >-
              竞争风险：Rippling 是主要竞争威胁——它拥有更深的 HRIS/IT 集成栈、可比的 EOR 产品，并已表现出激进竞争意愿（RICO 诉讼就是证据）。如果 Rippling 解决自身诉讼敞口，并把重心放到
              EOR 市场扩张，它可能在续约窗口替换 Deel 的企业账户。ADP GlobalView 和 Workday 代表企业薪资领域的传统厂商风险——它们已有企业关系，使 Deel 的替换策略更耗资源。Remote
              和 Multiplier 代表 SMB 层的价格型竞争风险，低成本替代方案会吸引成本敏感买家。AI 原生威胁：新进入者从第一天就基于大语言模型构建合规自动化，而不是采用 Deel 的规则数据库方法；如果 LLM
              被证明在多司法辖区法律解释上更可扩展，Deel 的合规数据护城河可能随时间被侵蚀。关键人物风险：CEO Alex Bouaziz 和 CRO Shuo Wang
              是联合创始人，并被公开识别为公司的主要决策者。两人离职会带来领导层连续性风险。继任计划或关键人物条款未公开披露。Rippling 诉讼尤其给 Bouaziz 增加了声誉阴影，不过考虑到 Series E
              成功，该影响似乎对商业进展有限。
