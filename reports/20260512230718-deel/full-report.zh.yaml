      - number: '7.3'
        title: 运营风险
        blocks:
          - type: paragraph
            body: >-
              薪资处理风险：Deel 每年在 150+ 个国家发放 $22B
              薪资。系统性薪资错误（计算错误、发放失败或币种错误付款）如果同时影响数千名用工人员，会造成严重声誉和法律敞口。受监管市场（欧盟、英国、美国）的薪资错误可能触发监管调查和员工诉讼。Deel
              的自有实体模式（直接控制薪资执行）、自动化预发薪验证工具和 SOC 2 Type II 认证控制能缓释该风险，但在 $22B 规模上风险永远不为零。实体维护风险：在 150+
              个国家维护法律实体，要求每个司法辖区持续满足法定合规（年度申报、本地审计、董事维护）。关键市场（如英国、德国、法国）实体合规一旦中断，Deel 可能暂时无法在该市场处理薪资，影响依赖它的客户。技术 /
              平台风险：SaaS 平台如果在薪资处理窗口宕机，可能延迟发放并触发合同罚金或客户流失。Deel 状态页显示历史正常运行时间约 99.9%，但企业 SLA 条款未披露。数据安全风险：Deel
              雇佣数据数据库若发生泄露，将暴露 150 万名用工人员的国民身份证号、薪资记录和税号，带来 GDPR、州隐私法和声誉敞口。截至 2026 年 5 月，未披露重大数据泄露。
            claimRefs:
              - CR009
              - CR010
              - CR011
              - CR012
