  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              全球 EOR 和薪酬平台市场横跨五类竞争者。第一类是专为 EOR 打造、EOR 优先的挑战者——Remote、Oyster HR、Velocity Global、 Papaya
              Global、Multiplier、Omnipresent——这些公司在 2019 到 2022 年间出现，踩中了与 Deel 相同的远程办公浪潮。 Remote 是 Deel
              最直接的可比公司，地理覆盖和定价相似，最近一次估值约为 2022 年的 ~$3B。Oyster HR 面向重视影响力的买方； Velocity Global 更偏企业客户。第二类是
              Rippling，它的位置不同：Workforce Cloud 把 HR、IT 设备管理和财务自动化打包在一起。 Rippling 2025 年 4 月 $16.8B 估值和累计 $693M
              融资，说明投资人相信长期赢家会是平台整合，而不是 EOR 点状方案。 第三类是传统 EOR 网络提供商——Globalization Partners（G-P）、Atlas HXM——它们早于 SaaS
              时代出现， 依靠第三方名义雇主网络而非自有实体运营。180 个国家覆盖很广，但 UX 和定价竞争力较弱。第四类是既有 HCM 厂商 （Workday、ADP、SAP SuccessFactors、Oracle
              HCM），服务大型企业账户，但过去对需要敏捷跨境雇佣的初创公司和中端公司服务不足。 ADP 的 GlobalView
              提供多国薪酬，但实施周期很长。第五类是国内薪酬专家（Gusto、Paychex、Ceridian），基本以美国为中心， 不直接竞争 EOR；不过 Gusto 通过 EOR
              伙伴关系出海，释放出融合风险。每一类都有不同威胁向量：EOR 同行在价格和地理广度上施压， Rippling 在平台深度上施压，既有厂商则在企业信任和实施规模上施压。
            claimRefs:
