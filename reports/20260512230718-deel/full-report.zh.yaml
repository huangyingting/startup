      - number: '2.2'
        title: TAM、SAM 与 SOM 估算
        blocks:
          - type: paragraph
            body: >-
              多个分析视角以不同颗粒度框定 Deel 的总可寻址市场（TAM）。Research and Markets 估算，2025 年全球 HR 科技市场规模为 $73.01B，到 2030 年将以 5.8% CAGR
              增至 $96.98B，这是 Deel 竞争所在最宽的技术外壳。在 HR 科技内部， WinterGreen Research 估算 EOR 子板块 2023 年为 $3.07B，到 2032 年以 15.02%
              CAGR 达到 $10.8B； Coherent Market Insights 估算到 2033 年为 $13.4B，CAGR 更保守，为 9.0%；Allied Market Research 估算 2022
              年为 $4.8B，到 2032 年约以 11% CAGR 增至 $13.8B。这些估算的 CAGR 横跨 9–15%，给终局 SAM 预测带来不确定性，
              估值尽调时应保留这一点。全球薪酬外包是互补的可服务池：一项估算认为它从 2021 年 $9.25B 增至 2030 年 $20.58B， 另一份 2025 年报告在更宽服务边界下预计 2030 年市场为
              $52.5B。把 EOR 板块、国际薪酬外包和承包商管理合并， 像 Deel 这样的跨境合规平台在 2026–2028 年的可服务可寻址市场（SAM）约为 $20–30B。 在估算 SAM 中点 $25B
              上，Deel 目前 $1B+ ARR 对应约 4% 渗透率，说明仍有大量增长空间。没有单一分析机构用一致边界定义覆盖这个合并 SAM， 这给渗透率分析留下重要证据缺口。
