      - number: '4.4'
        title: 资本充足性与融资
        blocks:
          - type: paragraph
            body: >-
              从 Seed 到 2025 年 10 月 Series E，Deel 通过六轮股权融资累计募资约 $961M。$300M Series E 由 Ribbit Capital 领投， 投后估值
              $17.3B，意味着相对 $1B ARR 里程碑约 17x——高于公开 HR-SaaS 可比公司（ADP 为 5.5x 收入，Workday 约 10x ARR）， 但低于 2021 年峰值时期 30-40x
              倍数，当时 Deel 以 $5.5B 完成 Series C。鉴于连续三年盈利——这对成长阶段 EOR 平台很少见—— 以及 150+ 自有法律实体构建的跨境护城河，17x 倍数具备防御性。Series E
              资金用途披露为战略收购（与 $15M Omnipresent 交易一致）、 到 2029 年在 100+ 个国家建设原生薪酬基础设施，以及 AI 产品开发。由于公司已经盈利，Series E
              资本是战略性和强化资产负债表， 不是延长资金跑道。月度现金消耗估计接近零。Series E 后估计现金头寸超过 $300M，可在不进一步融资的情况下支撑多年资金跑道。
              未见公开披露债务、信贷额度或项目融资义务。主要资本风险是实体扩张资本开支：设立新的当地法律实体，需要在每个司法辖区预先投入法律、 公司维护和法定合规成本。
