      - number: '6.4'
        title: 留存、NPS 与韧性
        blocks:
          - type: paragraph
            body: >-
              Deel 称其 NPS（净推荐值）超过 90；如果属实，这会让 Deel 跻身企业 SaaS 品类最高水平。作为参照，Salesforce 的 NPS 通常为 50–60，Workday 为 40–50。在
              37,000+ 客户规模下，NPS >90 并不常见，而且该指标由公司披露、未经审计；它更可能反映 Deel 在合规自动化上的价值交付和客户支持质量，而不是系统性的第三方调查结果。G2
              评价支撑了高满意度叙事：Deel 在 5,000+ 条评价中获得 4.8/5，用户频繁提到跨境招聘简单、付款可靠是主要价值来源。客户留存（GRR、NRR）未公开披露。不过，Deel 平台的结构性黏性很强：一旦
              Deel 成为 20+
              个国家员工合同、薪资和税务申报的记录系统，迁移就需要在每个国家重新建立薪资、转移员工记录、重新提交雇佣合同——这是持续数月且运营风险很高的项目。该结构性锁定意味着活跃企业账户的毛收入留存可能高于
              90%，但这是推断，不是披露值。主要留存风险是 Rippling 的竞争替换，或某个专业传统厂商重新夺回市场份额。
