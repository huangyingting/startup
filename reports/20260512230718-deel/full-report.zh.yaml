      - number: '8.4'
        title: 牛市、基准与熊市情景分析
        blocks:
          - type: paragraph
            body: >-
              牛市情景（25% 概率）：Deel 执行企业 HRIS 扩张（替换 Workday）、非洲/东南亚地域扩张和 AI 产品差异化；RICO 诉讼以 <$100M 和解；到 2027 年底 ARR 达到 $3B，增速
              50–60%，毛利率扩至 65–70%；2027–2028 年 IPO 或 M&A 时倍数压缩至 12x ARR = $36B 估值，意味着较当前 Series E 价格获得 2x 回报。基准情景（50%
              概率）：Deel 维持 40–50% ARR 增长；RICO 诉讼以 $100–$250M 和解；毛利率稳定在 55–65%；2027 年底 ARR 达到 $2B；2028–2029 年 IPO/M&A 时倍数为
              10–12x = $20B–$24B 估值，意味着较 Series E 价格获得 1.2–1.4x 回报。熊市情景（25% 概率）：RICO 判决 >$500M，或长期诉讼压制企业销售；经济下行导致 SMB
              流失，ARR 增速降至 20–30%；审计财务显示毛利率低于 50%；到 2027 年 ARR 停滞在 $1.2–1.5B；倍数压缩至 6–8x = $7–12B 估值，意味着 0.4–0.7x 回报（较
              Series E 价格亏损本金）。概率加权期望值：25% × $36B + 50% × $22B + 25% × $9.5B = $9B + $11B + $2.4B = $22.4B，意味着较 $17.3B
              Series E 价格有 29% 上行——期望值温和为正，但熊市情景带来显著偏斜风险。
