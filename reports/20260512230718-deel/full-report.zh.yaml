      - number: '8.3'
        title: 估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >-
              2025 年 10 月的 $300M Series E、投后估值 $17.3B 意味着：（a）17.3x ARR 倍数（按 $1B ARR）；（b）约为 2021 年 10 月私有科技估值峰值的 1.7
              倍（高增长 SaaS 通常为 20–30x ARR）；（c）较 Rippling 最近披露的 $13.8B 估值溢价 25%。该估值与高端 HR SaaS 可比公司一致：Workday 在公开市场约以 8–10x
              前瞻 ARR 交易，而高增长私有可比公司（Rippling $13.8B，估计 ARR $500–700M = 20–28x；Remote $3B，估计 ARR $200M = 15x）说明 Deel 的 17x
              倍数落在该品类区间内。稀释结构符合 Series E 常规：带标准清算优先权的优先股；具体优先权条款未披露。员工期权池和前轮稀释会降低创始人及早期投资者持股，但未公开披露。对二级市场投资者而言，非流动性 IPO
              前股份在二级交易中相对主轮价格通常折价 10–25%——意味着截至 2026 年中，二级市场入场价格约等于 $13–15.6B 市值。
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV010
