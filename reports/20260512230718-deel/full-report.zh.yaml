      - number: '3.2'
        title: 关键竞争对手画像
        blocks:
          - type: paragraph
            body: >-
              Rippling（2016 年创立，2,500+ 员工，2025 年 4 月估值 $16.8B，融资 $693M）是 Deel 战略上最危险的竞争对手。 Rippling 以设备管理（MDM）、SSO、LDAP
              和财务自动化切入，这些能力是纯 EOR 厂商缺少的，也创造了很强的 IT 部门黏性。 其薪酬产品覆盖 50+ 个国家，EOR 能力也在扩张。Rippling 于 2025 年 3 月对 Deel 提起 RICO
              诉讼，指控商业间谍和商业秘密盗窃， 给 Deel 带来法律不确定性和销售周期摩擦。Remote.com（2019 年创立，1,100+ 员工，融资 $495M，最近估值约 ~$3B） 是纯 EOR
              公司，地理覆盖相近。Remote 的关键差异化在于开源法律文件库和使命驱动品牌。Remote 在发布 HRIS 和 IT 产品上较慢。 Velocity Global（2015 年创立，800+ 员工，2022
              年 $400M Series B）以白手套服务面向企业客户； 其实体覆盖与 Deel 接近，但每名员工每月 $700–$1,200 的定价限制了 SMB 渗透。Papaya Global（2016
              年创立，400+ 员工， 融资 $130M）面向中端薪酬即服务；它曾遇到运营挑战，包括在部分市场暂停全球薪酬。Multiplier（2020 年创立， 300+ 员工，融资 $60M）从 Asia-Pacific
              起步，APAC 定价有竞争力。Omnipresent（总部 UK，融资 $60M）聚焦欧洲实体覆盖， 服务只需要 EMEA 的买方。G-P（Globalization Partners，2012 年创立）是
              EOR 类别先行者，采用覆盖 180+ 个国家的网络型模式， 每名员工每月收费 $800–$1,500。ADP 和 Workday 主导大型企业 HCM：ADP 年收入 $15B+，GlobalView
              多国薪酬赋予其企业信任； Workday 约 $8B ARR 和主导 HRIS 地位，则形成 Deel 赢取企业 HRIS 预算时必须绕过的集成型护城河。
