    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份、使命与产品范围
        blocks:
          - type: paragraph
            body: >-
              Deel 是一站式 HR 和薪酬平台，帮助企业在任何国家雇佣、支付和管理员工，不必设立当地法律实体。 公司注册于 Delaware，主要总部在 California 州 San Francisco，团队成员分布于
              100+ 个国家。 其核心价值是消除过去让跨境招聘又贵又慢的合规复杂度：Deel 在 150+ 个国家拥有当地法律实体， 由这些实体担任名义雇主，内置合规劳动合同模板，处理薪酬税申报和法定福利管理， 并用一个
              HRIS 层把这些服务连接起来。平台通过统一界面服务所有类型的劳动者——全职 EOR 员工、 本地发薪实体员工、独立承包商和加入 PEO 的美国员工。雇佣之外，Deel 已延伸到相邻 HR 功能，
              包括移民和签证担保、股权管理、IT 设备采购与管理、绩效管理；公司正从单一薪酬辖区的点状方案， 变成分布式劳动力运营的记录平台。公司声明的长期使命，是让任何地点的人才都能为最好的公司工作，
              不受地理边界限制。Deel 自身就是一家全远程公司，员工遍布 100+ 个国家，因此既是自己的第一个客户， 也是其所引领产品类别的活体概念验证。截至 2026 年 5 月，平台服务 150+ 个国家的
              40,000+ 企业，企业 NPS 超过 90——对薪酬基础设施而言，这是异常高的分数。
