      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              COVID-19 后远程办公常态化，结构性扩张了招聘地理范围。Statista 显示，截至 2023 年，远程或混合工作约占全球工作安排的 28%， 高于 2020 年约 20%；McKinsey
              认为，发达经济体 20–25% 的劳动者可以每周远程办公三到五天。这一变化直接增加了需要 EOR 或承包商合规工具的跨境招聘数量。
              高需求招聘市场的监管复杂度——India、Brazil、Germany、Argentina、the Philippines——抬高了直接设立实体的成本， 也提高了 EOR 的相对价值。EU 的 GDPR
              对员工数据驻留提出要求，又增加一层合规负担；拥有当地实体的 EOR 平台比单个 SMB 实体更能高效吸收这层负担。 US Department of Labor 和 EU Platform Work
              Directive 对误分类执法加强，正在推动企业把承包商转为 EOR 员工， 扩大 Deel 这类平台的转化管线。IMF 2025 年 4 月 World Economic Outlook
              支持全球继续温和增长， 数字服务则使跨境劳动力流动成为可能。主要采用约束包括：（1）切换成本——一旦员工队伍进入 EOR 平台，迁移到竞争对手会触发重新入职、
              合同重签和薪酬集成重建；（2）利润率压缩——随着市场商品化，按员工收取的 EOR 费用正在下降；（3）返岗要求——要求到办公室办公的大型企业客户，
              可能把跨境员工重新本地化；（4）常设机构风险——在某些司法辖区长期使用 EOR，可能触发企业税务存在，从而限制最长合同期限。 这些动态使中端、全球分布的科技公司成为 Deel 价值最高、流失最低的客群。
