      - number: '5.5'
        title: 产品路线图与开放技术问题
        blocks:
          - type: paragraph
            body: >-
              基于 Series E 新闻稿和投资人评论，Deel 2025–2027 年的主要产品路线图优先级是：（1）AI 合规自动化扩张——更深入的 AI 驱动合同生成、 劳动力分析和监管监控；（2）企业 HRIS
              对齐——将 Deel HR 打造成在人才管理、学习和薪酬规划上可与 Workday、SAP SuccessFactors 匹配的大企业级产品； （3）向 Africa 和 Southeast Asia
              地理扩张——在新市场设立自有实体，尤其是 Nigeria、Kenya、Ghana、Indonesia、Vietnam 和 the Philippines； （4）金融服务扩张——已赚工资访问、Deel
              Card，以及可能利用薪酬数据足迹进行信用评分的薪酬融资产品。公开记录没有回答的开放问题包括： 技术栈（云供应商配置、数据库层、API 网关基础设施）；具体 AI
              模型供应商或自研模型投入；详细安全渗透测试结果和漏洞赏金计划； API 速率限制和企业 SLA 条款；IT 资产管理模块的技术架构（收购后集成状态与原生构建）。这些都是技术尽调评审的标准事项。
