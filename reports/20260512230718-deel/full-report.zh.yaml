  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Deel 的可服务市场最准确地定义为全球跨境雇佣与薪酬合规服务市场，包含三个相邻子板块：（1）名义雇主（EOR）服务，
              即持牌当地实体在客户公司没有当地存在的司法辖区内担任劳动者的法定雇主；（2）全球薪酬外包，即已拥有当地实体的公司，
              将薪酬管理、税务申报和法定福利处理外包给第三方处理方；（3）国际承包商管理与合规，覆盖跨司法辖区非雇员劳动者的签约、 全球付款、IP 转让和误分类风险监控。不在核心可服务边界内的，是国内单一国家薪酬处理（由
              ADP、Paychex 等既有厂商主导）、 要求客户已有当地实体的纯专业雇主组织（PEO）服务，以及没有相关司法辖区合规基础设施的一般 HRIS 或人才管理软件。 EOR
              的现状替代方案是直接设立实体——每个司法辖区需要 $50,000 到 $300,000 的法律和注册费用，前置周期三到十八个月。
              对国际承包商而言，替代方案是不借助正式合规工具直接合作，这会让买方面临误分类罚款和常设机构风险。EOR 定位为快速进入市场、 成本效率更高的替代方案，服务那些在承诺设立永久子公司前先跨境招聘的公司。
