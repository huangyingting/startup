  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式概览
        blocks:
          - type: paragraph
            body: >-
              截至 2025 年初，Deel 运营七条不同收入流，合计产生 $1B+ ARR。名义雇主（EOR）服务——Deel 在 150+ 个国家担任法定雇主——是收入最高的流，根据竞争定价情报估计每名员工每月收费
              $599-800。Deel 拥有当地法律实体， 而不是依赖第三方 EOR 网络，因此实体层成本部分固定，随着计费员工数扩大，会产生经营杠杆。全球薪酬——为拥有当地实体的公司处理薪酬—— 定价约为每名员工每月
              $20-50，交易量大但利润率较低，因为有支付处理和跨境清算成本。承包商管理是公司最早的产品， 估计每名承包商每月约 $49；相较 EOR，它具备更高软件利润率，但随着公司上移市场，增长更慢。HRIS 和
              Deel HR 以免费核心层提供， 通过高级附加组件把客户转化为黏性更高的多产品用户，并推动三项以上产品客户 480% 的交叉销售增长。移民和全球流动服务、 IT
              设备管理以及附属薪酬浮存收入，共同补齐多元化模式。Deel 不公开按收入流拆分的收入，因此分部结构和利润率拆解需要进入数据室。
