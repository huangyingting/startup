      - number: '1.2'
        title: 创始人、领导团队与治理
        blocks:
          - type: paragraph
            body: >-
              Alex Bouaziz（CEO、联合创始人）和 Shuo Wang（CRO、联合创始人）在 MIT 求学时相识， 两人都获得研究生学位。Bouaziz 在 Paris 长大，持有 Technion 和 MIT
              工程学位，此前共同创办 Sarona Ventures，并于 2020 年入选 Forbes 30 Under 30 Finance 榜单。Wang 担任
              首席营收官，将联合创始人席位与全球收入负责人角色合在一起，使她成为全球 HR 领域级别最高的女性科技高管之一。 创业洞察来自个人观察：合格专业人才常常仅因签证门槛和当地劳动法复杂度，就被挡在全球职业机会之外。
              创始人决定在基础设施层解决这一结构性低效。Deel 参加了 Y Combinator 2019 冬季批次， 这带来早期投资人关系、运营纪律，也提升了路演日后立即募集种子轮的可信度。Dan Westgarth
              担任总裁， 负责全球运营。Gal Abehsera 担任首席产品官，负责平台路线图，包括 HRIS、薪酬和 AI 层战略。 高管层还包括财务、工程、法律、合规和人力运营等职能负责人；但 Deel
              作为私营公司，并未公开完整董事会构成。 投资人董事代表包括 Ribbit Capital、Andreessen Horowitz 和 Coatue 的提名人，这些机构分别领投或共同领投过一轮或多轮融资。
              治理架构包含保险与监管委员会，覆盖受监管司法辖区内的持牌薪酬、支付和 PEO 活动。 关键人风险集中在 Bouaziz 身上，因为他兼具联合创始人和 CEO 身份，并与公众品牌高度绑定；
              不过职能领导层厚度以及公司自身远程优先的结构，部分降低了单人运营依赖。
