      - number: '3.5'
        title: 不利竞争证据与风险
        blocks:
          - type: paragraph
            body: >-
              若干竞争动态给 Deel 的市场地位带来实质风险。Rippling RICO 诉讼是最紧迫的近期风险：该诉讼于 2025 年 3 月 14 日提起， 指控 Deel 雇佣一名 Rippling
              员工访问内部销售数据和移民信息。如果指控成立，将说明公司伦理出现失守， 损害 Deel 在企业采购和 HR 合规负责人——也就是主要买方——中的品牌。即便和解，诉讼也会留下声誉阴影并分散竞争销售精力。
              第二，定价压缩：2024–2025 年，Remote 将较小员工数客户的 EOR 基础价降至每名员工每月 $299，低于 Deel 的 $599 基础价； Multiplier 在 Asia 提供低于 $400
              的定价。如果 EOR 市场在 $400 以下商品化，Deel 的 EOR 合同毛利率会被压缩。 第三，既有 HCM 厂商反击：Workday 在 2024–2025 年推出正式 EOR
              伙伴计划，以留住大型企业客户， 削弱 Deel 取代大型账户中 Workday 的能力。ADP 的 GlobalView 也增加了 EOR 工作流集成。第四，G2 和 Gartner 评论显示， Deel 在
              IT 集成深度上低于 Rippling，在企业实施质量上低于 Workday——随着 Deel 追逐更大账户，这两个维度愈发重要。 第五，Papaya Global 的运营困难暴露全市场执行风险：同时管理
              150+ 个司法辖区的多国薪酬合规非常复杂，任何服务故障都可能触发客户快速流失。
            claimRefs:
              - CP023
