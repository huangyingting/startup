      - number: '5.3'
        title: AI 能力与技术差异化
        blocks:
          - type: paragraph
            body: >-
              Deel 公开承诺将 AI 投资作为 $300M Series E 的主要用途之一，聚焦合规自动化、HR 分析和面向客户的工作流。 截至 2026 年 5 月，已知 AI 能力包括：AI
              驱动的雇佣合同生成工具，可提示特定司法辖区风险标记；面向 Deel HR 的 AI HR 助手， 可通过自然语言处理员工政策问题、休假请求和文件检索；以及误分类风险评分，用于评估承包商合作是否会在
              FLSA、IR35 和各国特定规则下被重新分类。 Deel 未发布详细 AI 架构论文，也未披露这些模型是自研，还是构建在第三方 LLM API（如 OpenAI、Anthropic）之上。 除 AI
              之外，主要技术差异化是 Deel 的合规数据护城河：八年真实雇佣合同、薪酬批次和 150+ 个国家监管解释， 给 Deel 提供了新进入者难以低成本复制的训练数据集和验证语料。Deel
              拥有不断增长的专利组合；具体专利数量未披露。 围绕国家劳动法合规映射和实体管理操作手册的商业秘密，构成第二层护城河。集成深度也是护城河：一旦 Deel 成为全球 HR 数据（HRIS）
              和财务交易（薪酬）的记录系统，更换它就需要迁移多年雇佣记录、税务申报和承包商合同——切换成本会显著高于简单价格比较。
