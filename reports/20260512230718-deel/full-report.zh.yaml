        - 数据室要求 NRR 瀑布图；若 <100% 则触发退出条件
      - - ARR 增长连续两个季度低于 30%
        - 季度 ARR 运行率显示同比 <30%
        - 15–25%
        - 监控季度 ARR 更新；触发降级复核
      - - 投资后前 24 个月 CEO 或 CRO 离任
        - 公开宣布创始人离任
        - 5–10%
