companyProfile:
  summary: >-
    Deel 是一个垂直一体化的全球雇佣操作系统，2019 年由 CEO Alex Bouaziz 和 CRO Shuo Wang（YC W19）创立。公司通过自有实体网络，帮助企业在 150+ 个国家雇佣、支付并管理员工和承包商，
    不必设立当地法律实体。到 2025 年 10 月，Deel 已达到 $1B ARR，同比增长 75%，拥有 37,000+ 客户和 1.5M 名管理中的员工，并于 2023 年 Q3 实现盈利。2025 年 10 月，由
    Ribbit Capital 领投的 $300M Series E 将公司估值推至 $17.3B。
  foundedDate: '2019-01-01'
  founders:
    - name: Alex Bouaziz
      role: 首席执行官
      background: 连续创业者；曾共同创办 Lifeslice，并从事全球劳动力运营。
    - name: Shuo Wang
      role: 首席营收官
      background: 前 Harvard MBA；因跨境承包商合规痛点，共同创办 Deel。
  foundingLocation: San Francisco, CA, USA
  headquarters: San Francisco, CA, USA
  productSummary: >-
    Deel 提供：覆盖 100+ 个国家全职雇佣的名义雇主（EOR）；覆盖 150+ 个国家的全球薪酬处理； 承包商管理和合规；面向人力运营的 HRIS（Deel HR）；IT 资产管理；股权管理和期权授予；移民支持和签证服务。
    平台收入模式由 EOR 按员工 PEPM 收费、薪酬 SaaS 订阅和承包商管理交易费构成。
  customerFocus: 面向全球分布或出海扩张的 SMB 到企业客户（500–5,000 名员工区间）；尤其是科技公司、专业服务公司和 Series B+ 初创公司。
