  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品套件与客户工作流
        blocks:
          - type: paragraph
            body: >-
              Deel 的产品套件覆盖国际劳动力管理的完整生命周期。核心产品是名义雇主（EOR）：Deel 在 150+ 个国家担任法定雇主， 让公司无需设立自己的当地法律实体，就能在国际市场雇佣全职员工。EOR
              包含符合当地劳动法的雇佣合同、法定福利（养老金、医疗覆盖、育儿假）、 本地货币薪酬发放和预扣税申报。Global Payroll 将 Deel 延伸到已在多个国家拥有法律实体的公司：Deel
              计算薪酬、管理税务申报， 并通过 90+ 个国家的自有银行集成发放款项——直接与 ADP GlobalView 和 Workday Payroll 竞争。Contractor Management 处理 150+
              个国家独立承包商的入职、开票、付款处理和误分类风险评估。HRIS（Dee HR）作为免费核心模块提供给现有 Deel 客户， 包含组织架构管理、绩效评审、休假跟踪和员工文件存储模块。IT Asset
              Management 通过 2023 年收购加入； 它让公司能够在 130+ 个国家为远程员工采购、配置、寄送和回收笔记本电脑及设备。Equity Management（Deel Equity）
              让全球员工在符合当地税务和证券法规的情况下接收并归属股票期权。Deel Card 为希望以虚拟卡而非银行电汇接收收入的承包商提供支付工具。 Parte 和 Advance
              工具则为劳动者提供已赚工资访问和付款灵活性。
