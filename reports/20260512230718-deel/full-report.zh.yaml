      - number: '2.3'
        title: 买方、用户与付款方分层
        blocks:
          - type: paragraph
            body: >-
              EOR 和全球薪酬服务需求集中在国际扩张中的公司，且这些公司尚未设立当地法律实体。主要买方画像是高级 HR 或 People 负责人 （VP People、CHRO），CFO 对成本、General
              Counsel 对风险都有实质影响。三个商业分层贡献行业收入主体： SMB 公司（1–50 名全球分布员工），通常由创始 CEO 或 Head of Operations 在首次跨境招聘后发起 EOR 采购；
              中端公司（50–2,000 名员工），Series B 后扩张，HR Directors 控制供应商选择，CFO 签批按员工成本； 企业账户（2,000+
              名员工），采购更复杂，法律审查是必需项，采用触发点通常是实体整合，或 EOR 与设立实体的成本建模。 EOR
              采用率明显更高的垂直行业包括科技、金融科技、电商、数字代理和专业服务——这些行业拥有全球分布的工程人才池， 也更能接受 SaaS 模式供应商关系。EOR 预算通常位于 CHRO 负责的 HR
              运营预算内，但年支出超过约 $50,000 时需要 CFO 批准； 随着员工数或司法辖区复杂度上升，合规风险论证会加速 VP-Legal 和 GC 介入。典型 EOR 费用为每名员工每月 $500 到
              $1,000， 或总薪资的 10–15%；Oyster HR 公开列示的每名员工每月 $699 价格验证了这一范围。因此，通过 EOR 管理 20 名海外员工的年成本为 $120,000 到
              $240,000——这个数字可与设立实体成本对比，从而建立清晰的买方 ROI。
