      - number: '4.2'
        title: 定价与变现
        blocks:
          - type: paragraph
            body: >-
              Deel 的变现策略因产品而异。EOR——价值最高的产品——没有公开标价；定价来自竞争基准，Oyster HR 将每名员工每月 $699 列为公开参考价， Remote.com 则在 2023
              年转向定制报价。Rippling 将 EOR 与更宽的 HR 和 IT 平台打包，单独比较 EOR 价格很难。 Velocity Global 面向企业账户，采用高端定制定价。Workday 面向大型企业的
              HCM 套件，价格显著高于纯 EOR 替代方案。 Deel 不公开全球薪酬定价；TriNet 针对美国本土 PEO 服务每名员工每月收费约 $30，提供一个国内下界参照。承包商管理据社区来源估计约为每名承包商每月
              $49， 与 Remote 公开 $29-49 区间大体一致。HRIS 核心免费，高级模块（绩效管理、IT 资产管理、劳动力分析）以付费附加组件提供， 估计每名员工每月 $20-30。Deel
              的定价策略体现了有意的不透明：不公布标价，公司就能围绕整体平台价值竞争， 并谈判有助于提升净收入留存的多年期捆绑企业合同。免费 HRIS 层是亏损引流品，降低流失，也降低 EOR 和薪酬追加销售的有效 CAC。
