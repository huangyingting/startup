      - number: '5.4'
        title: 安全、合规与信任基础设施
        blocks:
          - type: paragraph
            body: >-
              Deel 持有 SOC 2 Type II 认证、GDPR 合规证明和 ISO 27001（公开数据安全页面如此表述）。这些认证适用于 Deel 的云基础设施和数据处理实践。 在雇佣合规方面，Deel 维护由
              150+ 个国家当地法律顾问验证的特定司法辖区监管覆盖——这是监管合规职能，不是 IT 认证。 鉴于 Deel 存储 EU 及其他地区 1.5M 名劳动者的个人雇佣数据（国家 ID
              号码、薪酬记录、税号），GDPR 合规尤其重要。 Deel 与客户签署数据处理协议（DPA），界定 GDPR 和同等法律下的数据控制者与处理者责任。Privacy Shield 后续框架 （EU-US Data
              Privacy Framework）已被纳入。安全架构包括面向企业客户的 SSO 和 SAML、基于角色的访问控制、审计日志、 传输中和静态加密。截至 2026 年 5 月，Deel
              未披露重大安全泄露或监管执法行动。客户支持通过聊天和邮件 24/7 提供， 企业客户有专属客户管理 SLA。正常运行时间 SLA 未公开披露；Deel 状态页报告历史可用率在 99.9% 区间。
