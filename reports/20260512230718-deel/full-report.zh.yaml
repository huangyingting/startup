          detail: G2 4.0/5（复杂企业场景）；NPS ~40–50（行业估算）
        - label: ADP Workforce Now
          x: 6
          'y': 4
          detail: G2 4.1/5；SMB 满意度较低；NPS ~25–35（行业估算）
        - label: Multiplier
          x: 8
          'y': 6
          detail: G2 4.7/5；评论基数在增长；未披露 NPS
    approximationNotes: Workday 和 ADP 的 NPS 为行业估算，非官方披露。象限采用标准化 1–10 分刻度。Deel NPS 为公司声称，未经审计。
    claimRefs:
      - CU013
      - CU014
  - id: FU004
    title: 落地扩张路径
    type: flow
    layout: standard
    summary: 典型 Deel 客户如何在 24–36 个月内，从初始产品接触扩张到全平台部署。
    data:
      nodes:
        - id: n1
          label: 第 0 个月：首批 1–2 份 EOR 合同（$10K–$20K ARR）
        - id: n2
          label: 第 6 个月：EOR 扩至 3–5 个国家（$30K–$60K ARR）
        - id: n3
          label: 第 12 个月：为自有实体增加全球薪资（$60K–$120K ARR）
        - id: n4
          label: 第 18 个月：启用 HRIS 高级版 + IT 资产管理（$90K–$200K ARR）
        - id: n5
          label: 第 24 个月：股权管理 + Deel Card（$120K–$350K ARR）
        - id: n6
          label: 全平台：定制企业合同（$300K–$15M+ ARR）
      edges:
        - from: n1
          to: n2
          label: 团队增长推动 EOR 扩张
        - from: n2
          to: n3
          label: 实体设立触发薪资需求
        - from: n3
          to: n4
          label: HR 运营复杂度推动 HRIS 升级
        - from: n4
          to: n5
          label: 远程 IT 和股权增加复杂度
        - from: n5
          to: n6
          label: 企业规模 → 定制合同
    approximationNotes: 路径时间线和 ARR 数值由作者依据产品架构和公开交易讨论估算。实际扩张速度因客户而异。
    claimRefs:
      - CU017
      - CU018
      - CU019
      - CU020
  - id: FR001
    title: 风险矩阵
    type: quadrant
    layout: standard
    summary: Deel 的重大风险按发生概率和财务影响两个维度绘制。
    data:
      xAxis: 发生概率（1=低，10=高）
      yAxis: 财务影响（1=可忽略，10=生死攸关）
      points:
        - label: Rippling RICO 判决
          x: 4
          'y': 9
          detail: 发生概率低到中等；若 Rippling 胜诉，潜在风险敞口为 $300M–$1B+
        - label: GDPR 执法
          x: 3
          'y': 5
          detail: 发生概率低；最高罚款 $40M（ARR 4% 上限）
        - label: 薪资处理错误（系统性）
          x: 2
          'y': 8
          detail: 概率低；若影响受监管市场的数千名劳动者，后果严重
        - label: 数据安全泄露
          x: 3
          'y': 7
          detail: 概率低；1.5M 劳动者 PII 暴露会造成严重后果
        - label: SMB 流失（经济下行）
          x: 5
          'y': 6
          detail: 发生概率中等；严重下行中会形成 20–30% ARR 逆风
        - label: Rippling 竞争替代
          x: 5
          'y': 5
          detail: 发生概率中等；主要影响企业续约率
        - label: 关键人物离职（CEO/CRO）
          x: 3
          'y': 7
          detail: 概率低；联合创始人集中度高，因此影响大
        - label: AI 合规错误
          x: 5
          'y': 4
          detail: 概率中等（AI 内生）；鉴于其咨询角色，影响有边界
        - label: 实体合规失误
          x: 4
          'y': 3
          detail: 年度概率低到中等；影响局限于单一国家
    approximationNotes: 风险坐标是作者估算的定性判断。实际概率和财务影响仍不确定。
    claimRefs:
      - CR001
      - CR004
      - CR009
      - CR013
      - CR017
  - id: FR002
    title: 竞争风险图谱
    type: quadrant
    layout: standard
    summary: 针对 Deel 的竞争威胁按威胁可信度和替代速度两个维度绘制。
    data:
      xAxis: 威胁可信度（1=低，10=高）
      yAxis: 替代速度（1=慢 / 多年，10=快 / 数个季度）
      points:
        - label: Rippling（EOR + HRIS）
          x: 9
          'y': 5
          detail: 可信度最高的竞争对手；集成栈很深；EOR 仍在扩张
        - label: Remote（聚焦 EOR）
          x: 7
          'y': 4
          detail: EOR 直接竞争对手；产品强；部分市场定价更低
        - label: Workday（企业薪资）
          x: 7
          'y': 2
          detail: 企业市场现有玩家；流失慢，但大客户留存强
        - label: ADP GlobalView（企业薪资）
          x: 6
          'y': 2
          detail: 传统企业薪资；正输给 Deel 和 Rippling，但根基仍深
        - label: Multiplier（SMB EOR）
          x: 5
          'y': 6
          detail: SMB 层级直接竞争对手；价格有竞争力；产品覆盖在扩大
        - label: AI 原生 EOR 初创公司
          x: 3
          'y': 7
          detail: 偏推测；若执行成功，LLM 原生合规可能侵蚀护城河
        - label: Papaya Global（网络 EOR）
          x: 5
          'y': 4
          detail: 体量较小；网络模式相较 Deel 自有实体存在脆弱性
    approximationNotes: 竞争威胁维度由作者估算。实际竞争格局取决于产品路线图执行和市场环境。
    claimRefs:
      - CR013
      - CR014
  - id: FR003
    title: 财务风险敏感性
    type: range
    layout: standard
    summary: 在基准、中度和严重条件下，关键风险情景的估算财务影响区间。
    data:
      items:
        - label: Rippling 诉讼和解 / 判决（USD M）
          low: 0
          high: 1000
          unit: USD M
          note: 区间从驳回（$0）到完整三倍损害赔偿判决（$1B+）；和解可能落在 $50–$200M 区间
        - label: SMB 流失对 ARR 的影响（严重下行）
          low: 0
          high: 300
          unit: USD M ARR loss
          note: 若全球初创公司招聘冻结 12+ 个月，估计 20–30% ARR（$200–$300M）面临风险
        - label: GDPR 罚款（重大数据泄露情景）
          low: 0
          high: 40
          unit: USD M
          note: 上限为全球 ARR 的 4%；在 $1B ARR 下，上限为 $40M
        - label: 实体资本开支（非洲 + 东南亚扩张）
          low: 20
          high: 100
          unit: USD M
          note: 估计需在 10–15 个新司法辖区设立实体；会带来阶段性现金流出
        - label: 浮存收益下降（降息情景）
          low: 20
          high: 100
          unit: USD M annual impact
          note: 若利率下行 200bps，取决于财资政策，浮存收益估计减少 $20–$100M
    approximationNotes: 所有区间均由作者依据公开证据估算。实际结果取决于无法用公开信息预测的事件。
    claimRefs:
      - CR004
      - CR017
      - CR018
      - CR019
      - CR020
  - id: FV001
    title: 投资论点评分卡
    type: kpi
    layout: standard
    summary: 围绕六个关键维度的定性投资论点评分卡，评分范围 1–10。
    data:
      items:
        - label: 市场机会
          value: 9/10
          unit: score
          note: EOR / 薪资 TAM $500B+；远程办公有结构性顺风；全球渗透率仍低
        - label: 产品护城河
          value: 8/10
          unit: score
          note: 自有实体；合规数据语料；40+ 集成；免费 HRIS 带来粘性
        - label: 收入质量
          value: 7/10
          unit: score
          note: 增长 75%，ARR $1B，已盈利；因不透明扣 3 分（未审计 NRR、利润率）
        - label: 团队与执行
          value: 8/10
          unit: score
          note: 联合创始人有深厚领域经验；Series E 获顶级 VC 背书
        - label: 财务画像
          value: 7/10
          unit: score
          note: 已盈利且增长强；因 RICO 或有负债和利润率不透明扣 3 分
        - label: 估值纪律
          value: 6/10
          unit: score
          note: 17x ARR 价格已打满；入场上行安全边际有限；$12–15B 更合适
    approximationNotes: 分数是作者估算的定性判断；并非基于系统性评分框架。
    claimRefs:
      - CV001
      - CV003
      - CV004
      - CV005
  - id: FV002
    title: 回报分布
    type: flow
    layout: standard
    summary: 决策树展示三种情景下按概率加权后的结果。
    data:
      nodes:
        - id: n1
          label: 以 $17.3B 估值投资（Series E）
        - id: n2
          label: RICO 有利解决 + 指标强
        - id: n3
          label: RICO 中度和解 + 基准执行
        - id: n4
          label: RICO 不利 + 执行不及预期
        - id: n5
          label: 乐观情景：$36B（2.1x）— 25% 概率
        - id: n6
          label: 基准情景：$22B（1.3x）— 50% 概率
        - id: n7
          label: 悲观情景：$9.5B（0.55x）— 25% 概率
        - id: n8
          label: 期望值：~$22.4B（1.3x）— 29% 上行空间
      edges:
        - from: n1
          to: n2
          label: 25% 概率
        - from: n1
          to: n3
          label: 50% 概率
        - from: n1
          to: n4
          label: 25% 概率
        - from: n2
          to: n5
          label: 乐观结果
        - from: n3
          to: n6
          label: 基准结果
        - from: n4
          to: n7
          label: 悲观结果
        - from: n5
          to: n8
          label: 9B 贡献
        - from: n6
          to: n8
          label: 11B 贡献
        - from: n7
          to: n8
          label: 2.4B 贡献
    approximationNotes: 概率和估值由作者估算；实际结果受市场环境、诉讼解决和公司执行影响。
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
  - id: FV003
    title: 可比倍数图
    type: quadrant
    layout: standard
    summary: Deel 与主要可比公司在 ARR 增速和 ARR 倍数两个维度上的定位。
    data:
      xAxis: ARR 同比增速（%）
      yAxis: ARR 倍数（x）
      points:
        - label: Deel
          x: 9
          'y': 9
          detail: $1B ARR；75% 增长；17.3x 倍数（Series E）
        - label: Rippling
          x: 7
          'y': 10
          detail: ARR 估计 ~$500–700M；增速估计 ~60%；~20–28x ARR
        - label: Remote
          x: 6
          'y': 7
          detail: ARR 估计 ~$200M；增速估计 ~40%；~15x ARR
        - label: Workday（上市公司）
          x: 3
          'y': 4
          detail: 收入 $8B+；增速 ~15%；8–10x NTM 收入
        - label: ADP（上市公司）
          x: 2
          'y': 3
          detail: 收入 $18B；增速 ~7%；5–6x NTM 收入
        - label: Papaya Global
          x: 5
          'y': 6
          detail: ARR 估计 ~$100M；增速估计 ~30%；~15x ARR
    approximationNotes: 私营公司的增速和 ARR 估算由作者依据公开媒体报道估计；所有点位均为近似值。
    claimRefs:
      - CV015
      - CV016
      - CV017
  - id: FV004
    title: 退出准备时间线
    type: timeline
    layout: standard
    summary: 通往 IPO 或 M&A 退出路径上的预计里程碑，以及概率和关键条件。
    data:
      items:
        - label: RICO 诉讼解决（和解 / 判决）
          date: 2026-2027
          detail: IPO 前关键里程碑；和解可能为 $100–250M；不利判决会让 IPO 推迟 2+ 年
          tone: neutral
        - label: 经审计财务（3 年记录）
          date: 2026-2027
          detail: S-1 申报需要四大审计的 P&L 和 GAAP 财务；披露毛利率和 NRR
          tone: positive
        - label: ARR $2B 里程碑（基准情景目标）
          date: '2027'
          detail: 基准情景要求到 2027 年底以 40–50% 增速达到 $2B ARR；企业客户占比上升应改善 ACV
          tone: positive
        - label: IPO 申报（S-1）
          date: 2027-2028
          detail: 登陆公开市场；基准情景下目标市值 $20–25B；需要 RICO 解决并完成财务审计
          tone: positive
        - label: 战略 M&A 替代方案
          date: Any time 2026–2029
          detail: Workday、SAP、Salesforce 是 $20–30B 区间的合理收购方；创始人偏好独立，最终由董事会驱动
          tone: neutral
    approximationNotes: 时间线由作者基于当前事实和基准情景假设预测。实际退出时间取决于市场环境、诉讼解决和创始人 / 董事会决策。
    claimRefs:
      - CV017
      - CV018
