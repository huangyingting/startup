  - number: 6
    title: 客户
    sections:
      - number: '6.1'
        title: 客户基础分层
        blocks:
          - type: paragraph
            body: >-
              Deel 的客户分三大类。SMB 和创业公司（员工少于 200 人）：Deel 37,000+ 客户大多落在这里，主要靠免费 HRIS 层和承包商管理自助服务带动的产品驱动增长（PLG）获客。该层典型年合同价值为
              $5,000–$30,000/年。客户数量大，但单账户 ARR 较低，相比企业客户，流失风险可能更高。中端市场（200–2,000 人）：客户基盘中占比正在提高，销售方式是 PLG
              扩张与直销团队并行。这类公司通常用 EOR 管理 10–50 名国际员工，并在自有实体市场使用全球薪资。该层 ACV 估计为 $30,000–$300,000/年。企业客户（2,000+ 人）：Deel 最高
              ACV、最高留存的细分，BCG、Klarna、Reddit、Change.org 等客户出现在公开案例中。企业账户由直销团队推进，周期 6–12 个月。Klarna 披露用 Deel 替换 Workday
              后每年节省 $10M+，意味着该账户为 Deel 贡献的 ACV 很可能达到每年 $5M–$15M+。地域上，Deel 客户更多集中在北美和欧洲（科技公司跨境招聘需求最强），拉美、中东和亚太的存在感也在提高。
            claimRefs:
              - CU001
              - CU002
              - CU003
