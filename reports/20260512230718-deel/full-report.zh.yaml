  - id: TV006
    title: 最终尽调要求表
    type: standard
    layout: standard
    summary: Priority data room requests needed to upgrade conditional recommendation to high-conviction buy.
    notes: 标记为“终止条件”的事项若结果不利，将导致撤回推荐。
    columns:
      - 尽调事项
      - 优先级
      - 所需资料
      - 重要性
      - 否决条件？
    rows:
      - - 经审计 GAAP 财务报表（2023–2025）
        - 关键
        - 四大或二线会计师事务所审计的损益表、资产负债表、现金流量表
        - 确认 ARR、毛利率、盈利口径和现金状况
        - 是 —— 若毛利率 <50% 或盈利情况无法确认
      - - NRR / GRR 队列瀑布图
        - 关键
        - 按客户队列和年份拆分 ARR 扩张、收缩和流失
        - 用数据验证先落地再扩张逻辑；确认留存叙事
        - 是 —— 若多数队列 NRR <100%
      - - Rippling 诉讼准备金与保险
        - 关键
        - 诉讼律师评估；保险保单覆盖范围；托管安排
        - 或有负债若无法量化且未披露，无法承诺投资
        - 是 —— 若风险敞口 >$500M 且无保险或准备金
      - - 按产品分部的毛利率
        - 高
        - EOR、全球薪资、HRIS、承包商管理分部毛利率
        - 建模单位经济和长期利润率扩张路径必须用到
        - 否 —— 但会影响确信度
      - - 客户集中度（按 ARR 前 25 大）
        - 高
        - 前 25 大客户名称和 ARR 贡献；企业与 SMB 拆分
        - 验证集中度风险评估；识别关键企业客户
        - 否 —— 但会影响风险评估
      - - 关键人留任协议
        - 中
        - CEO 和 CRO 归属安排；留任协议；控制权变更条款
        - 防范投资后创始人离职
        - 否 —— 可作为交易条款谈判
    claimRefs:
      - CV006
      - CV007
      - CV016
      - CV017
      - CV018
