      - number: '1.5'
        title: 关键里程碑与不利事件
        blocks:
          - type: paragraph
            body: >-
              从 2019 年到 2026 年 5 月分析日，Deel 的历史是一条快速商业扩张曲线，中间穿插重大不利事件。 创立当年，公司从 Y Combinator 2019
              冬季批次毕业，并上线首个承包商雇佣产品，成为第一个通过全数字化流程提供合规跨境承包商合同的平台。 产品市场匹配很快得到验证：两年内，公司从承包商管理扩展到数十个国家的完整 EOR 雇佣。2021 年 10 月以
              $5.5B 估值完成 Series C， 让 Deel 成为最快达到 decacorn 地位的 HR 科技公司之一。2022 年 5 月以 $12B 估值完成的 Series D 是一轮小额跟投，
              与资本充足的公司状态一致。2022 年中至 2024 年，Deel 在收入大幅增长的同时实现并保持盈利，且没有外部资本注入。 2025 年，Deel 以约 $15M 收购总部位于 London 的 EOR 公司
              Omnipresent，补强欧洲实体覆盖和技术人才。 Deel 于 2025 年初跨过 $1B ARR。2025 年 3 月，公司史上最重大的不利事件出现：竞争对手 Rippling 提起诉讼， 指控 Deel
              从事包括安插间谍在内的商业间谍活动。Deel 公开否认所有指控，但诉讼带来潜在财务责任和声誉风险。 尽管诉讼仍在进行，2025 年 10 月 Series E 和首个 $100M
              收入月仍显示业务动能延续。未来目标包括到 2029 年在 100+ 个国家提供原生薪酬，说明公司会继续投入自有基础设施。
