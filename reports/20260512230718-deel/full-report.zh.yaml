      - number: '6.5'
        title: 扩张机制与客户集中度
        blocks:
          - type: paragraph
            body: >-
              “先落地、再扩张”是 Deel 在存量客户中拉动收入增长的核心引擎。机制是：一家公司先在一个国家使用 2–3 份 EOR 合同；团队扩大后扩到 5–10 个国家；在自有实体市场加入 Global
              Payroll；激活 HRIS 高级模块；员工规模继续扩大后，再部署 IT Asset Management 和 Equity Management。每一步都能在不重新启动销售动作的情况下提高该客户贡献的
              ARR。收入/客户轨迹得到了方向性验证：37,000 个客户下的混合 ACV 为 $27K，Klarna 案例显示每年节省 $10M+（意味着类似量级的 ACV）。客户集中度风险未知：Deel 未披露前 10
              或前 25 大账户贡献多少 ARR。考虑到客户结构偏 SMB（37K 客户、$1B ARR），混合 ACV 约 $27K，意味着即便最大的企业账户，单个也不太可能超过总 ARR 的 1–3%。不过，SMB
              长尾客户的流失风险高于企业客户——如果 SMB 增长减速，企业端“先落地、再扩张”论点就必须承担更多增长压力。Deel 未披露按客户群组或获客年份划分的 ARR 数据和扩张率，而这些才是量化验证该论点的关键指标。
