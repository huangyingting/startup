      - number: '8.2'
        title: 建议与信心
        blocks:
          - type: paragraph
            body: >-
              建议：投资（以数据室尽调为前提）。信心：中等。风险评级：中高（诉讼阴影、毛利率不透明、SMB 集中）。估值立场：当前 $17.3B 属于合理；若毛利率处于估计区间低端或 Rippling
              诉讼不利解决，则偏贵；若估值为 $12–15B（风险折价）则具吸引力。该有条件投资建议基于四点：（1）Deel 强劲的基本面指标（$1B ARR、75%
              增长、盈利、一级投资方）支撑高信心的建设性判断；（2）RICO
              诉讼是重大且未量化的责任，承诺前必须尽调——需要陈述与保证，确认诉讼准备金资金充足，或设置托管条款；（3）需要审计后的毛利率确认，验证单位经济叙事；（4）需要 NRR
              客户群组数据，量化确认“先落地、再扩张”论点。如果尽调确认毛利率 >60%、NRR >115%，且 RICO 风险已适当计提，投资论点可增强为高信心买入。如果毛利率 <55%，或 RICO 敞口超过 $500M
              且没有保险覆盖，建议降级为放弃或仅按价格条件推进。
            claimRefs:
