  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 按严重程度排序的风险概览
        blocks:
          - type: paragraph
            body: >-
              Deel 面对的风险组合可管理，但并不轻。近期严重程度最高的风险是 Rippling RICO 诉讼（2025 年 3 月），该案指控公司从事商业间谍活动；如果 Rippling 胜诉，Deel 可能根据 18
              U.S.C. § 1962(c) 承担三倍赔偿——最坏情况下财务敞口可能超过 $1B。第二层风险包括：（1）多司法辖区监管合规失败（EOR 模式的结构性风险；某一国家一次合规错误，就可能让 Deel
              面临罚款、补税或员工误分类责任）；（2）影响 150 万名用工人员的薪资处理错误带来的运营风险；（3）数据隐私 / GDPR 执法敞口。第三层包括竞争替换风险、关键人物风险（CEO Alex Bouaziz 和
              CRO Shuo Wang 作为联合创始人）、经济下行导致的 SMB 流失敞口，以及 AI 原生竞争者带来的技术过时风险。抵消因素是：Deel 的自有实体模式降低了第三方依赖风险；$300M Series E
              和盈利运营降低了近期资本风险；深度集成也让现有客户的切换成本很高。击穿投资论点的情形，是 Rippling 判决不利与一级市场（欧盟、英国或美国）重大合规失败同时发生。
            claimRefs:
              - CR001
              - CR002
              - CR003
