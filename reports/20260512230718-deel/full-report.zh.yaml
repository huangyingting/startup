      - number: '3.3'
        title: 差异化与能力对比
        blocks:
          - type: paragraph
            body: >-
              Deel 的核心差异化建立在四根支柱上。第一，实体所有权：Deel 声称在 150+ 个国家拥有法律实体，
              消除会造成服务波动的第三方网络依赖。这需要大量资本——设立实体需要数月法律申报和持续公司维护——但也带来更快入职、 更可预测定价和直接合规责任。第二，平台广度：Deel 打包
              EOR、全球薪酬、承包商管理、HRIS（员工数据库、PTO、绩效）、 IT 资产管理和合规自动化。少有竞争对手能匹配这个范围；Remote 和 Oyster HR 正在用 HRIS 附加组件追赶， 但
              Rippling 在 IT 深度和财务自动化上超过 Deel。第三，定价透明度：Deel 公布 EOR 基础价为每名员工每月 $599 的固定费用， 而 Rippling、Velocity Global
              等竞争对手需要定制报价，这降低了 SMB 自助销售摩擦。第四，开发者生态：Deel 的 REST API 以及与 Workday、NetSuite、QuickBooks 和 40+ HR
              系统的集成，降低了技术优先买方的实施门槛。相对竞争对手的能力缺口包括： 美国国内薪酬深度（Rippling 和 Gusto 领先）、IT 设备管理（Rippling 的 MDM
              更强）、财务自动化（Rippling Spend）、 企业变更管理（ADP 和 Workday 拥有更大的专业服务网络）。G2 同行评论显示，Deel 在承包商管理、全球薪酬广度和易设置性上得分有利， 但在 IT
              集成深度和 HR 分析上低于 Rippling。
            claimRefs:
              - CP013
              - CP014
              - CP015
              - CP016
              - CP017
      - number: '3.4'
        title: 切换成本、锁定与护城河耐久性
        blocks:
          - type: paragraph
            body: >-
              Deel 的竞争护城河处于中等水平，并且仍在演化。数据锁定是真实存在的：一旦薪酬、员工记录、休假、绩效评审和合规文件都沉淀在 Deel， 迁移就需要在新系统中复制多年数据——大多数 HR
              团队没有强烈理由不会承担这个过程。12–24 个月 SaaS 合同和自动续约条款， 进一步增强了中端客户常见的合同层黏性。实体所有权形成可防御的基础设施护城河：建设 150+ 个自有实体需要 3–5 年，
              估计要投入 $50–100M 实体设立资本，资金不足的竞争对手很难快速复制。数据优势方面，Deel 每年处理 $22B+ 薪酬， 积累专有薪酬基准数据和合规政策数据集，为其 AI
              合规引擎提供输入。网络效应有限但正在出现：随着更多全球劳动者使用 Deel 的承包商门户和人才市场， 雇主更可能发现 Deel 候选人。多归属风险处于中等水平——大型企业账户可能用 Workday 作为 HRIS
              记录系统， 同时把 Deel 当作 EOR 工作流层；如果 Deel 功能退化，切换障碍会降低。最大的护城河风险来自 Rippling 的平台战略： 如果企业买方把 HR、IT 和财务整合进
              Rippling，Deel 的 EOR 优先产品可能从其最佳客户中被挤出。
