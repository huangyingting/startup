            figureRef: FV003
            claimRefs:
              - CV015
              - CV016
              - CV017
      - number: '8.5'
        title: 可比估值与退出准备度
        blocks:
          - type: paragraph
            body: >-
              公开可比公司：Workday（WDAY，市值 $23B）约以 8x 前瞻收入交易；ADP（市值 $100B）为 6x 前瞻收入——两者更成熟、增长更低，为 Deel
              估值设定了底线。Paycom（PAYC，$18B）以 9x 收入交易，规模更接近。这些可比公司意味着，Deel 若以 $1B ARR、50%+ 增长 IPO，10–15x 收入倍数是可辩护的，即 IPO 初始市值
              $10–15B，并会随着增长持续而扩张。私有可比公司：Rippling 估值 $13.8B（估计 $500M ARR = 28x ARR）——因 Rippling 产品栈更深，这是溢价可比。Remote 估值
              $3B（估计 $200M ARR = 15x ARR）——增长较低、倍数也较低。退出准备度：Deel 已具备 IPO 指标画像：$1B ARR、75% 增长、盈利、一级投资者。IPO 前主要要求是：（1）2–3
              年经审计 GAAP 财务；（2）RICO 诉讼解决或披露准备金；（3）披露毛利率和 NRR。M&A 替代路径：Workday、SAP 或 Salesforce 可能以 $20–30B 收购 Deel，获得 EOR
              能力；不过监管审查和创始人偏好独立，使该路径只是次要退出情景。时间线：按当前增长轨迹和市场条件，IPO 可能在 2027–2029 年；只要价格合适，M&A 随时可能发生。
            claimRefs:
              - CV015
