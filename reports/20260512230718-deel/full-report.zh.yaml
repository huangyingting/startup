      - number: '4.3'
        title: 单位经济与毛利率驱动因素
        blocks:
          - type: paragraph
            body: >-
              Deel 综合毛利率估计为 40-55%，反映劳动密集型 EOR（25-35% 毛利率）和高毛利 SaaS 模块（70-80%）的组合。 EOR 毛利率被 150+
              个国家的实体维护成本、强制法定福利缴款、当地薪酬税申报和合规运营人力压低。全球薪酬因支付处理和跨境结算成本， 毛利率为 15-25%。HRIS、承包商管理和附加 SaaS 模块具备 70-80%
              软件式毛利率，每个客户的增量交付成本很低。 随着收入结构转向 SaaS 模块、远离纯 EOR，综合利润率应随时间改善。营运资本动态对 EOR 业务结构性有利： 雇主会在 Deel
              向员工付款前预先注资薪酬批次，基于约 $1.83B 月度薪酬流形成浮存。按当前市场利率，即便一天商业日浮存也能产生估计 $60M 或更多年度附属收入。净收入留存（NRR）未披露，但使用三个及以上产品客户增长
              480%、四个及以上产品客户增长 1,200%， 强烈暗示 NRR 远高于 110%，符合企业 SaaS 最佳水平基准。任何分部的 CAC 都未披露。软件原生平台资本开支较轻（云基础设施、合规工具）， 但
              Deel 进入新司法辖区时会周期性产生实体设立成本。
