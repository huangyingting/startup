      - number: '1.4'
        title: 规模、牵引力与客户基础
        blocks:
          - type: paragraph
            body: >-
              截至 2025 年 10 月 Series E 公告，Deel 的运营规模让它几乎在每个可衡量维度上，都成为已披露规模最大的纯全球雇佣平台。 公司服务 37,000+ 企业，覆盖初创公司到 Fortune 500
              大企业；到 2026 年 5 月，官网已将这一数字更新为 40,000+。 其在 150+ 个国家管理 1.5M 名劳动者，是 EOR 和全球薪酬类别中公开覆盖最广的足迹。年度处理薪酬 $22B，
              直接体现平台承载的经济流量和受托责任。公司于 2025 年初达到 $1B ARR，成为全球少数实现这一里程碑的 HR 科技公司之一。 2025 年 9 月是首个收入 $100M 的月份，Series E
              公告确认公司已连续第三年盈利——这对仍在融资的成长阶段公司来说并不常见。 最近一个时期的增长指标尤其突出：美国产品（PEO 和美国薪酬）增长 1,500%，HR 产品增长 600%，全球薪酬增长 450%，
              使用三个及以上产品的客户增长 480%，使用四个及以上产品的客户增长 1,200%。跨产品扩张指标重要， 因为它们说明平台整合正在推动净收入留存显著高于典型 SaaS 基准。企业客户标识包括
              LEGO、Puma、Virgin Media、Klarna、 Capgemini、FedEx、Nubank、Palantir、Novo Nordisk、Fidelity 和 Pepsi，证明产品已跨过
              Fortune 500 采用的质量门槛。 企业 NPS 超过 90；薪酬基础设施通常摩擦很高，这个分数异常高。
