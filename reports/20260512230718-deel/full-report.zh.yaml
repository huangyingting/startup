      - number: '7.5'
        title: 财务与模型风险
        blocks:
          - type: paragraph
            body: >-
              毛利率不透明：Deel 的混合毛利率估计为 55–65%，但未披露。如果 EOR 合规运营成本或实体维护成本高于假设，自 2023 年 Q3 起的盈利说法可能基于更窄的 EBITDA
              口径，掩盖底层毛利压力。在审计后的 P&L 可获得之前，该风险无法量化。SMB 流失敞口：Deel 客户数量中约 75%+ 是 SMB/创业公司，经济敏感度更高。经济下行导致创业公司冻结招聘（类似
              2022–2023 年科技裁员）会减少 EOR 用工人数，从而压低 ARR。2022–2023 年科技招聘冻结广泛影响 EOR 市场；Deel 在该时期仍增长，说明多元化足够，但严重下行仍可能对 ARR
              形成有意义的逆风。在途资金收益的利率敏感性：年薪资规模 $22B 下，Deel 的在途资金收益对央行利率周期敏感。降息（如 2024 年）会减少在途资金收益，而这部分收益部分补贴了 EOR
              定价模型。实体扩张资本开支风险：Series E 宣布的重点是积极扩张非洲和东南亚，需要前期实体设立资本。如果新市场经济回报慢于预期，实体资本开支可能暂时压制自由现金流。诉讼财务责任：Rippling RICO
              案形成未披露的或有负债。如果案件进入审判且 Rippling 胜诉，相对于 Deel 的 $1B ARR 基础，财务影响可能很重大。
