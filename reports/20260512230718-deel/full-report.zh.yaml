      - number: '5.2'
        title: 平台架构与运营模式
        blocks:
          - type: paragraph
            body: >-
              Deel 平台是云原生的，建立在多租户 SaaS 架构上。公开确认的要素包括 AWS 云托管、可与 40+ HR 和财务软件系统集成的 REST API， 以及一个合规自动化引擎，能够用规则驱动（并日益由 AI
              增强）的逻辑层生成特定司法辖区的雇佣合同。核心技术护城河是 Deel 的自有实体基础设施： 不同于使用第三方 EOR 网络的竞争对手（如 Safeguard Global、Papaya Global
              的伙伴模式），Deel 在多数主要市场运营自己的法律实体。 这意味着 Deel 直接控制薪酬时间、福利设计和合规决策，不会让网络提供商引入利润稀释和数据共享风险。Deel 的银行基础设施（大规模支付通道） 支持
              90+ 种货币的多币种薪酬发放，并支持按卡支付和已赚工资访问。合规引擎把 150+ 个国家的雇佣监管（劳动法、社会保障、税率、解雇规则） 映射为机器可读规则集，由 Deel 法律和合规团队持续更新。平台通过
              REST API 和原生连接器，与 Workday、BambooHR、NetSuite、QuickBooks、 Xero、Slack 以及 40+
              其他工具集成。实时薪酬预览、自动雇佣合同生成和内置电子签名工作流，减少了手工 HR 操作。部署只有 SaaS 模式 （没有本地部署选项）。除这些公开事实外，Deel 未披露具体基础设施供应商、云支出或架构图。
