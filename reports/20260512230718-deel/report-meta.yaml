companyProfile:
  summary: Deel is a vertically integrated global employment operating system founded in 2019 by CEO Alex Bouaziz and CRO Shuo Wang (YC W19). The company enables
    businesses to hire, pay, and manage employees and contractors in 150+ countries through a proprietary owned-entity network, eliminating the need for local legal
    entities. By October 2025 Deel had reached $1B ARR at 75% YoY growth with 37,000+ customers and 1.5M managed workers, and became profitable in Q3 2023. A $300M
    Series E led by Ribbit Capital in October 2025 valued the company at $17.3B.
  foundedDate: '2019-01-01'
  founders:
  - name: Alex Bouaziz
    role: CEO
    background: Serial entrepreneur; previously co-founded Lifeslice and worked in global workforce operations.
  - name: Shuo Wang
    role: CRO
    background: Former Harvard MBA; co-founded Deel from a frustration with cross-border contractor compliance.
  foundingLocation: San Francisco, CA, USA
  headquarters: San Francisco, CA, USA
  productSummary: 'Deel offers: Employer of Record (EOR) in 100+ countries for full-time hires; global payroll processing for 150+ countries; contractor management
    and compliance; HRIS (Deel HR) for people operations; IT asset management; equity management and option grants; immigration support and visa services. Platform
    revenue model combines EOR per-employee PEPM fees, payroll SaaS subscriptions, and contractor management transaction fees.'
  customerFocus: SMBs to enterprises (500–5,000 employee range) globally distributed or expanding internationally; particularly tech companies, professional services
    firms, and Series B+ startups.
  businessModel: 'Subscription + transaction hybrid: EOR fees ($500–650/employee/month), payroll SaaS ($29–59/employee/month), contractor management ($49/contractor/month),
    plus upsells to equity/IT/immigration modules.'
  stage: Series E, pre-IPO
  fundingStatus: Series E $300M at $17.3B post-money (October 2025); total raised ~$679M; investors include Ribbit Capital, a16z, Coatue, Sequoia Capital.
  disclosureProfile: private-undisclosed
  claimRefs:
  - CO001
  - CO002
  - CO003
summary:
  headline: Deel's owned-entity moat and $1B ARR at 75% growth justify a conditional buy at $17.3B — but audited margins and RICO litigation reserves are pre-commitment
    break conditions.
