  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Audited gross margin and GAAP financials for valuation calibration
    missingEvidence: All valuation comparisons and scenario models depend on estimated gross margins (55–65%); audited financials remain private.
    whyItMatters: Gross margin determines the appropriate ARR multiple; a 10-percentage-point swing (50% vs 60%) moves the fair value range by $3–5B.
    diligencePath: Require Big 4 audited financials for FY2023–FY2025 as a data room deliverable before investment commitment.
    relatedQuestionRefs:
    - QV019
  - type: private-evidence-only
    severity: minor
    topic: Dilution stack and liquidation preference analysis
    missingEvidence: Specific preference terms, ratchets, and liquidation preferences for Series E and prior rounds are not publicly disclosed.
    whyItMatters: Complex preference stacks can reduce common stock returns significantly in scenarios below $17.3B exit valuation.
    diligencePath: Request capitalization table and preferred stock terms in data room; model downside scenarios with actual preference stack.
    relatedQuestionRefs:
    - QV015
  - type: missing-source
    severity: minor
    topic: Private company ARR estimates used in comparable valuation table TV004
    missingEvidence: The ARR estimates for Rippling (~$500–700M), Remote (~$200M), and Papaya Global (~$100M) in TV004 are author-estimated from press coverage
      and are unaudited.
    whyItMatters: If private comp ARR estimates are significantly different from actual figures, the multiple analysis in TV004 could be misleading.
    diligencePath: Request disclosed ARR figures from competitor investor decks; cross-reference with analyst estimates from PitchBook and Meritech.
    relatedTableRefs:
    - TV004
    relatedQuestionRefs:
    - QV005
