  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: NRR and GRR cohort data
    missingEvidence: Deel has not disclosed net or gross revenue retention by cohort, contract type, or customer segment.
    whyItMatters: NRR cohort data is the primary quantitative validation of the land-and-expand thesis; without it, the retention story rests entirely on
      structural inference.
    diligencePath: Request customer cohort waterfall in data room showing ARR expansion vs. contraction vs. churn by vintage year.
    relatedQuestionRefs:
    - QU018
  - type: private-evidence-only
    severity: minor
    topic: Customer concentration breakdown
    missingEvidence: Deel has not disclosed what percentage of ARR comes from its top-10 or top-25 customers.
    whyItMatters: High concentration in a few enterprise accounts would create single-customer risk not visible from blended ACV.
    diligencePath: Request top-25 customer ARR concentration and contract terms in data room.
    relatedQuestionRefs:
    - QU014
  - type: missing-source
    severity: minor
    topic: Full enterprise customer list beyond named case studies
    missingEvidence: Deel's publicly disclosed named customer list (TU003) represents a marketing-curated selection; the full 37,000+ customer list is private.
    whyItMatters: The named accounts may not be representative of the full distribution of customer outcomes, sizes, and industries.
    diligencePath: Request full customer list with ARR by account tier, industry, and region in data room.
    relatedTableRefs:
    - TU003
    relatedQuestionRefs:
    - QU016
