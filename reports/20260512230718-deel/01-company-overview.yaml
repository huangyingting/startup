  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "Full board composition and investor governance rights are not publicly disclosed"
      missingEvidence: >-
        No public board roster, committee charter, cap-table rights schedule, or voting-agreement disclosure was
        found on any Deel corporate page or retained source.
      whyItMatters: >-
        Board composition and governance rights determine who controls strategic decisions, financing approvals,
        litigation posture, and any founder or investor veto rights — all essential for underwriting.
      diligencePath: >-
        Request current board list, observer rights, voting agreements, and committee memberships directly from
        company materials or financing documents.
      relatedQuestionRefs: [QO010]
      relatedTableRefs: [TO002, TO003]

    - type: missing-source
      severity: material
      topic: "Exact seed round size and structure not publicly confirmed"
      missingEvidence: >-
        The 2019 seed round size and SAFE vs. priced-round structure are not disclosed in any fetched source.
        YC SAFE terms, initial seed investors beyond YC, and pre-money valuation are unknown.
      whyItMatters: >-
        Seed structure affects total dilution, YC pro-rata rights, and the founding cap-table baseline used
        to calculate current ownership fractions.
      diligencePath: >-
        Request capitalization table from company; confirm seed round size, pre-money valuation, and SAFE
        vs. priced-round structure.
      relatedQuestionRefs: [QO011]
      relatedTableRefs: [TO003]

    - type: missing-source
      severity: material
      topic: "Omnipresent acquisition price and integration status not confirmed in public filings"
      missingEvidence: >-
        No dedicated public press release, UK Companies House filing, or official announcement confirming
        the Omnipresent acquisition price (~$15M), structure (cash/equity), or post-acquisition integration
        status was accessible.
      whyItMatters: >-
        Acquisition price, earn-out provisions, and integration completion affect Deel's balance sheet,
        EOR entity count, and European coverage depth.
      diligencePath: >-
        Verify via UK Companies House filing for Omnipresent; request Deel disclosure of transaction terms
        and integration roadmap.
      relatedQuestionRefs: [QO014]
      relatedTableRefs: [TO004]

    - type: missing-source
      severity: material
      topic: "Rippling v. Deel lawsuit current status and financial exposure not determinable from public sources"
      missingEvidence: >-
        Specific court filings, hearing dates, settlement discussions, and Deel's litigation reserve are not
        available from accessible public sources as of the analysis date.
      whyItMatters: >-
        An adverse judgment could result in material financial penalties, injunctions, or reputational damage
        that would affect investment risk profiles for later-stage capital providers.
      diligencePath: >-
        Obtain filings from PACER or applicable court system; request Deel's legal assessment, litigation
        reserve, and any pre-trial developments or settlement terms.
      relatedQuestionRefs: [QO017]
      relatedTableRefs: [TO004]

    - type: missing-source
      severity: material
      topic: "ARR definition, revenue recognition policy, and profitability measure not publicly specified"
      missingEvidence: >-
        Deel states $1B ARR and three years of profitability but does not publicly define ARR (contracted vs.
        annualized run-rate vs. recognized), nor specify whether profitability is GAAP net income, adjusted
        EBITDA, or another measure.
      whyItMatters: >-
        ARR definition and margin definitions are core to valuation analysis. EOR pass-through employer costs
        can materially inflate headline revenue without proportional gross profit contribution.
      diligencePath: >-
        Request revenue recognition policy, ARR bridge reconciliation, gross margin by product line, and
        EBITDA/GAAP profitability confirmation from Deel management.
      relatedQuestionRefs: [QO006, QO007]
      relatedTableRefs: [TO001]

    - type: enumeration-incomplete
      severity: material
      topic: "Leadership table is a partial public roster; functional C-suite and engineering heads not named"
      missingEvidence: >-
        Public sources identify founders, President, CPO, and named advisors, but not the CFO, CTO, CLO,
        CPeople, or any VP-level engineering and operational leaders.
      whyItMatters: >-
        Completeness of leadership assessment requires knowing who owns engineering velocity, finance
        discipline, legal risk management, and customer success.
      diligencePath: >-
        Request current organizational chart, executive biographies, and reporting-structure documentation
        from Deel.
      relatedQuestionRefs: [QO002]
      relatedTableRefs: [TO002]


    - type: missing-source
      severity: minor
      topic: Deel headcount by geography and function
      missingEvidence: >-
        Exact headcount breakdown by geography (HQ vs. remote vs. regional offices), function
        (engineering, sales, compliance, operations), and jurisdiction is not publicly disclosed.
      whyItMatters: >-
        Headcount concentration analysis is material to assessing key-person risk, compensation
        scalability, and geographic compliance exposure.
      diligencePath: >-
        Request employee census data (or banded breakdown) under NDA during due diligence;
        compare to job-board postings for directional validation.
      relatedQuestionRefs: [QO015]
      relatedTableRefs: []
    - type: missing-source
      severity: material
      topic: Material legal proceedings beyond Rippling lawsuit
      missingEvidence: >-
        No public disclosure confirms or denies other ongoing regulatory investigations,
        sanctions, data-privacy enforcement actions, or material legal proceedings beyond
        the Rippling v. Deel corporate-espionage lawsuit (March 2025).
      whyItMatters: >-
        Undisclosed material legal liability could affect valuation, customer trust,
        and regulatory standing across 150+ jurisdictions.
      diligencePath: >-
        Request legal proceedings schedule from counsel; run lien/judgment searches;
        check CFTC/OFAC/state AG databases; review employment regulatory complaints.
      relatedQuestionRefs: [QO018]
      relatedTableRefs: []
