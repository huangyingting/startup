      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >-
              Demand for EOR and global payroll services concentrates in companies undergoing international expansion
              before they have established local legal entities. The primary buyer persona is a senior HR or People
              leader (VP People, CHRO) with material influence from the CFO on cost and from the General Counsel on
              risk. Three commercial segments drive the bulk of industry revenue: SMB companies (1–50 globally
              distributed employees), where the founding CEO or Head of Operations initiates the EOR purchase after a
              first cross-border hire; mid-market companies (50–2,000 employees) expanding post-Series B, where HR
              Directors control vendor selection with CFO sign-off on per-employee costs; and enterprise accounts
              (2,000-plus employees), where procurement is more complex, legal review is mandatory, and the adoption
              trigger is often entity consolidation or EOR-versus-entity cost modelling. Verticals with disproportionate
              EOR adoption include technology, fintech, e-commerce, digital agencies, and professional services—sectors
              characterised by globally distributed engineering talent pools and high tolerance for SaaS-model vendor
              relationships. Budget for EOR typically sits in the HR operating budget under CHRO ownership but requires
              CFO approval above approximately $50,000 per year; compliance risk arguments accelerate VP-Legal and GC
              involvement as headcount or jurisdictional complexity grows. Typical EOR fees range from $500 to $1,000
              per employee per month, or 10–15% of gross salary, confirmed by Oyster HR's publicly listed pricing of
              $699 per employee per month. The annual cost of managing 20 foreign employees via EOR therefore ranges
              from $120,000 to $240,000—a figure that can be compared against entity setup costs to establish clear
              buyer ROI.
