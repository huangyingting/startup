      - number: '2.2'
        title: TAM, SAM, and SOM Estimation
        blocks:
          - type: paragraph
            body: >-
              Multiple analyst lenses frame Deel's total addressable market (TAM) at different granularities. Research
              and Markets sized the global HR technology market at $73.01 billion in 2025, projected to grow to $96.98
              billion by 2030 at a 5.8% CAGR—the broadest technology envelope within which Deel competes. Within HR
              tech, the EOR sub-segment is sized by WinterGreen Research at $3.07 billion in 2023, reaching $10.8
              billion by 2032 at a 15.02% CAGR; Coherent Market Insights estimates $13.4 billion by 2033 at a more
              conservative 9.0% CAGR; Allied Market Research estimated $4.8 billion in 2022 growing to $13.8 billion by
              2032 at approximately 11% CAGR. The spread of 9–15% CAGR across these estimates introduces uncertainty in
              terminal SAM projections and should be preserved in valuation diligence. Global payroll outsourcing
              represents a complementary addressable pool: one estimate values it at $9.25 billion in 2021 growing to
              $20.58 billion by 2030, while a 2025 report projects the market at $52.5 billion by 2030 using a broader
              service boundary. Combining the EOR segment, international payroll outsourcing, and contractor management
              yields an estimated serviceable addressable market (SAM) of $20–30 billion by 2026–2028 for a cross-border
              compliance platform like Deel. With $1 billion-plus ARR on an estimated $25 billion SAM midpoint, Deel's
              current penetration is approximately 4%, suggesting substantial runway. No single analyst covers this
              combined SAM with consistent boundary definitions, creating a material evidence gap for penetration-rate
              analysis.
