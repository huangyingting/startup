      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Deel's history from 2019 to the May 2026 analysis date spans rapid commercial scaling punctuated by
              significant adverse events. The founding year saw the company graduate from Y Combinator's Winter 2019
              batch and ship its first contractor hiring product, making it the first platform to offer compliant
              cross-border contractor contracts through a fully digital workflow. Product-market fit validation came
              quickly: within two years the company expanded from contractor management to full EOR employment across
              dozens of countries. The Series C in October 2021 at $5.5B was one of the fastest HR technology companies
              ever to reach decacorn status. The Series D in May 2022 at $12B was a small follow-on round consistent
              with a capital-sufficient business. From mid-2022 through 2024, Deel reached and sustained profitability
              while growing revenue significantly without external capital. In 2025, Deel acquired Omnipresent, a
              London-based EOR company, for approximately $15M, adding European entity coverage and technical talent.
              Deel crossed $1B ARR in early 2025. March 2025 brought the most significant adverse event in the company's
              history: competitor Rippling filed a lawsuit alleging that Deel engaged in corporate espionage including
              planting a spy. Deel publicly denied all allegations, but the litigation creates potential financial
              liability and reputational risk. The October 2025 Series E and confirmed first $100M revenue month
              demonstrated continued business momentum despite the active litigation. Forward targets include native
              payroll in 100-plus countries by 2029, indicating continued investment in owned infrastructure.
