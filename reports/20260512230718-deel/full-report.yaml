companyProfile:
  summary: >-
    Deel is a vertically integrated global employment operating system founded in 2019 by CEO Alex Bouaziz and CRO Shuo
    Wang (YC W19). The company enables businesses to hire, pay, and manage employees and contractors in 150+ countries
    through a proprietary owned-entity network, eliminating the need for local legal entities. By October 2025 Deel had
    reached $1B ARR at 75% YoY growth with 37,000+ customers and 1.5M managed workers, and became profitable in Q3 2023.
    A $300M Series E led by Ribbit Capital in October 2025 valued the company at $17.3B.
