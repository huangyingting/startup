      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >-
              Remote-work normalisation following COVID-19 has structurally expanded the geography of hiring. Remote or
              hybrid work now accounts for approximately 28% of global work arrangements as of 2023 per Statista, up
              from roughly 20% in 2020; McKinsey identifies 20–25% of advanced-economy workers as able to work remotely
              three to five days a week. This shift directly increases the number of cross-border hires requiring EOR or
              contractor compliance tooling. Regulatory complexity in high-demand hiring markets—India, Brazil, Germany,
              Argentina, the Philippines—raises the cost of direct entity setup and increases the relative value
              proposition of EOR. The EU's GDPR requirements for employee data residency add a compliance layer that EOR
              platforms owning local entities absorb more efficiently than individual SMB entities. Rising
              misclassification enforcement from the US Department of Labor and the EU Platform Work Directive is
              creating urgency for companies to convert contractors to EOR employees, enlarging the conversion pipeline
              for platforms like Deel. The IMF April 2025 World Economic Outlook supports continued moderate global
              growth with cross-border labour mobility enabled by digital services. The primary adoption constraints
              are: (1) switching costs—once a workforce is enrolled in an EOR platform, migration to a competitor
              triggers re-onboarding, contract reissuance, and payroll integration rebuilds; (2) margin
              compression—per-employee EOR fees are declining as the market commoditises; (3) return-to-office
              mandates—large-cap enterprise clients requiring in-office presence may repatriate cross-border headcount;
              and (4) permanent establishment risk—prolonged EOR engagement in some jurisdictions can trigger corporate
              tax presence, limiting maximum contract duration. These dynamics make mid-market, globally distributed
              technology companies the highest-value, lowest-churn segment for Deel.
