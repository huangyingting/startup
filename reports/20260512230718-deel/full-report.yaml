      - number: '1.2'
        title: Founders, Leadership Team, and Governance
        blocks:
          - type: paragraph
            body: >-
              Alex Bouaziz (CEO and Co-Founder) and Shuo Wang (CRO and Co-Founder) met while studying at MIT, where both
              earned graduate degrees. Bouaziz grew up in Paris, holds engineering degrees from the Technion and MIT,
              previously co-founded Sarona Ventures, and appeared on the Forbes 30 Under 30 Finance list in 2020. Wang
              serves as Chief Revenue Officer, combining the co-founder seat with global revenue leadership, making her
              one of the most senior female technology executives in the global HR sector. The founding insight emerged
              from personal observation: qualified professionals were consistently locked out of global career
              opportunities purely due to visa barriers and local labor-law complexity — a structural inefficiency the
              founders decided to resolve at the infrastructure layer. Deel went through Y Combinator's Winter 2019
              batch, which provided early investor relationships, operational discipline, and credibility to raise a
              seed round immediately after demo day. Dan Westgarth serves as President, overseeing global operations.
              Gal Abehsera holds the role of Chief Product Officer, responsible for the platform roadmap including HRIS,
              payroll, and AI-layer strategy. The executive bench includes functional heads across finance, engineering,
              legal, compliance, and people operations, though Deel, as a private company, does not publish a full
              public board composition. Investor board representation includes nominees from Ribbit Capital, Andreessen
              Horowitz, and Coatue, each of which led or co-led one or more funding rounds. The governance structure
              includes an Insurance and Regulatory Committee covering licensed payroll, payments, and PEO activities in
              regulated jurisdictions. Key-person risk is concentrated in Bouaziz given his dual founder-CEO role and
              strong public brand association, though the depth of functional leadership and the company's own
              remote-first structure partially mitigates single-person operational dependency.
