chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity, Mission, and Product Scope
        blocks:
          - type: paragraph
            body: >-
              Deel is an all-in-one HR and payroll platform designed to enable companies to hire, pay, and manage
              workers in any country without establishing local legal entities. The company was incorporated in Delaware
              with its principal headquarters in San Francisco, California, and maintains team members distributed
              across more than 100 countries. Its core value proposition is eliminating the compliance complexity that
              historically made cross-border hiring prohibitively expensive or slow: Deel owns the local legal entities
              that act as Employer of Record in 150-plus countries, maintains built-in compliant employment contract
              templates, handles payroll tax filings and statutory benefit administration, and provides a single HRIS
              layer connecting all of these services. The platform serves every category of worker — full-time EOR
              employees, locally payrolled entity employees, independent contractors, and PEO-enrolled US workers —
              through a unified interface. Beyond employment, Deel has expanded into adjacent HR functions including
              immigration and visa sponsorship, equity management, IT device provisioning and management, and
              performance management, making it increasingly a platform of record for distributed workforce operations
              rather than a point solution for one payroll jurisdiction. The company's stated long-term mission is to
              ensure that talent anywhere can work for the best companies regardless of geographic borders. Deel is
              itself a fully remote company with employees in over 100 countries, making it simultaneously its own first
              customer and a living proof-of-concept for the product category it leads. As of May 2026, the platform
              serves 40,000-plus businesses across 150-plus countries, with enterprise NPS exceeding 90 — an unusually
              high score for payroll infrastructure.
