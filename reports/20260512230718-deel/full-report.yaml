              40–50. An NPS >90 is unusual at 37,000+ customers and is a company-disclosed, unaudited metric; it likely
              reflects Deel's compliance-automation value delivery and customer support quality rather than a systematic
              third-party survey. G2 reviews support a high-satisfaction narrative: Deel holds a 4.8/5 rating from
              5,000+ reviews, with reviewers frequently citing ease of cross-border hiring and payment reliability as
              primary value drivers. Customer retention (GRR, NRR) is not publicly disclosed. However, the structural
              stickiness of Deel's platform is high: once Deel is the system of record for employee contracts, payroll,
              and tax filings across 20+ countries, migration requires re-establishing payroll in each country,
              transferring employee records, and re-filing employment contracts — a months-long project with significant
              operational risk. This structural lock-in suggests gross revenue retention above 90% for active enterprise
              accounts, though this is inferred rather than disclosed. The primary retention risk is competitive
              displacement by Rippling or a specialized incumbent recovering market share.
            claimRefs:
              - CU013
              - CU014
              - CU015
              - CU016
          - type: table
            tableRef: TU004
            claimRefs:
              - CU013
              - CU014
              - CU015
          - type: figure
            figureRef: FU003
            claimRefs:
              - CU013
              - CU014
      - number: '6.5'
        title: Expansion Dynamics and Customer Concentration
        blocks:
          - type: paragraph
            body: >-
              Land-and-expand is Deel's core revenue growth engine within the existing customer base. The mechanism: a
              company starts with 2–3 EOR contracts in one country, expands to 5–10 countries as the team grows, adds
              Global Payroll for owned-entity markets, activates HRIS premium modules, and eventually deploys IT Asset
              Management and Equity Management as the workforce scales. Each step increases Deel's ARR from that
              customer without a new sales motion. The revenue per customer trajectory is directionally confirmed by the
              blended ACV of $27K at 37,000 customers — and the Klarna case study showing $10M+ annual savings (implying
              similar-magnitude ACV). Customer concentration risk is unknown: Deel has not disclosed what percentage of
              ARR comes from its top-10 or top-25 accounts. Given the SMB-heavy mix (37K customers, $1B ARR), blended
              ACV is ~$27K, implying even the top enterprise accounts are unlikely to represent more than 1–3% of total
              ARR individually. However, the tail of SMB customers is at higher churn risk than enterprise — if SMB
              growth decelerates, the enterprise land-and-expand thesis must carry more of the growth burden. Deel has
              not disclosed cohort-level ARR data or expansion rates by vintage, which are the key metrics needed to
              validate the land-and-expand thesis quantitatively.
            claimRefs:
              - CU017
              - CU018
              - CU019
              - CU020
          - type: table
            tableRef: TU005
            claimRefs:
