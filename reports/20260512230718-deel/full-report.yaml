      - number: '5.2'
        title: Platform Architecture and Operating Model
        blocks:
          - type: paragraph
            body: >-
              Deel's platform is cloud-native and built on a multi-tenant SaaS architecture. Publicly confirmed elements
              include AWS cloud hosting, a REST API that enables integrations with 40+ HR and financial software
              systems, and a compliance automation engine that generates jurisdiction-specific employment contracts
              using a rules-based (and increasingly AI-augmented) logic layer. The core technical moat is Deel's
              owned-entity infrastructure: unlike competitors that use third-party EOR networks (e.g., Safeguard Global,
              Papaya Global's partner model), Deel operates its own legal entities in most major markets. This means
              Deel controls payroll timing, benefits design, and compliance decisions directly, without a network
              provider introducing margin dilution and data sharing risk. Deel's banking infrastructure (mass payment
              rails) enables multi-currency payroll disbursement in 90+ currencies and supports pay-by-card and earned
              wage access. The compliance engine maps employment regulations (labor law, social security, tax rates,
              termination rules) for 150+ countries into a machine-readable ruleset that is continuously updated by
              Deel's legal and compliance teams. The platform integrates with Workday, BambooHR, NetSuite, QuickBooks,
              Xero, Slack, and 40+ other tools via REST API and native connectors. Real-time payroll previews, automated
              employment contract generation, and built-in e-signature workflows reduce manual HR operations. Deployment
              is SaaS-only (no on-premise option). Deel has not disclosed specific infrastructure vendors, cloud spend,
              or architecture diagrams beyond these public facts.
