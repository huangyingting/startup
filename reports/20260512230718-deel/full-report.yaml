      - number: '3.2'
        title: Key Competitor Profiles
        blocks:
          - type: paragraph
            body: >-
              Rippling (founded 2016, 2,500+ employees, $16.8B valuation April 2025, $693M raised) is Deel's most
              strategically dangerous competitor. Rippling leads with device management (MDM), SSO, LDAP, and finance
              automation that pure EOR vendors lack, creating deep IT-department stickiness. Its payroll product covers
              50+ countries with EOR capabilities expanding. The RICO lawsuit filed by Rippling against Deel in March
              2025, alleging corporate espionage and trade secret theft, has created legal uncertainty and sales-cycle
              friction for Deel. Remote.com (founded 2019, 1,100+ employees, $495M raised, last valuation ~$3B) is
              pure-play EOR with similar geographic coverage. Remote's key differentiator is an open-source legal
              document library and mission-driven brand. Remote has been slower to release HRIS and IT products.
              Velocity Global (founded 2015, 800+ employees, $400M Series B 2022) targets enterprise with white-glove
              service; its entity coverage rivals Deel's but its pricing ($700–$1,200 per employee per month) limits SMB
              penetration. Papaya Global (founded 2016, 400+ employees, $130M raised) targets mid-market
              payroll-as-a-service; it has faced operational challenges including pausing global payroll in certain
              markets. Multiplier (founded 2020, 300+ employees, $60M raised) is Asia-Pacific-first with competitive
              APAC pricing. Omnipresent (UK-based, $60M raised) focuses on European entity coverage for EMEA-only
              buyers. G-P (Globalization Partners, founded 2012) was the EOR category pioneer using a network-based
              model covering 180+ countries, commanding $800–$1,500 per employee per month. ADP and Workday dominate
              large enterprise HCM: ADP's $15B+ annual revenue and GlobalView multi-country payroll give it enterprise
              trust, while Workday's ~$8B ARR and dominant HRIS position create integration-based moats that Deel must
              navigate to win enterprise HRIS budgets.
