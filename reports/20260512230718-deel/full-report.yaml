            body: >-
              Deel's customer base spans three broad segments. SMB and startup (companies with <200 employees): the
              majority of Deel's 37,000+ customers fall here, acquired primarily through product-led growth (PLG) via
              the free HRIS tier and contractor management self-serve. Typical annual contract value in this tier is
              $5,000–$30,000/year. These customers are high in count but lower in ARR per account and likely higher in
              churn risk compared to enterprise. Mid-market (200–2,000 employees): a growing portion of Deel's customer
              base, sold through a combination of PLG expansion and field sales. These companies typically use EOR for
              10–50 international employees and global payroll for owned-entity markets. ACV in this tier is estimated
              at $30,000–$300,000/year. Enterprise (2,000+ employees): Deel's highest-ACV and highest-retention segment,
              where customer names like BCG, Klarna, Reddit, and Change.org appear in public case studies. Enterprise
              accounts are sold via field sales with 6–12 month cycles. Klarna's disclosed savings of $10M+/year from
              replacing Workday implies Deel's ACV for that account is likely $5M–$15M+ annually. Geographically, Deel's
              customer base is weighted toward North America and Europe (where international hiring needs are strongest
              for tech companies), with growing presence in Latin America, the Middle East, and Asia-Pacific.
