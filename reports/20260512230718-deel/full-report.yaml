      - number: '3.5'
        title: Adverse Competitor Evidence and Risks
        blocks:
          - type: paragraph
            body: >-
              Several competitive dynamics present material risk to Deel's market position. The Rippling RICO lawsuit is
              the most acute near-term risk: filed March 14, 2025, it alleges Deel employed a Rippling employee to
              access internal sales data and immigration information. If proved, the allegations would suggest a
              breakdown in corporate ethics that damages Deel's brand with enterprise procurement and HR compliance
              officers — the primary buyers. Even if settled, the litigation creates reputational overhang and
              competitive sales distraction. Second, pricing compression: Remote reduced its EOR base price to $299 per
              employee per month for smaller headcount in 2024–2025, below Deel's $599 base, and Multiplier offers
              sub-$400 pricing in Asia. If the market commoditizes below $400 EOR, Deel's gross margin on EOR contracts
              compresses. Third, the incumbent HCM counter-move: Workday launched a formal EOR partner program in
              2024–2025 to retain large enterprise clients, reducing Deel's ability to displace Workday in large
              accounts. ADP's GlobalView has similarly added EOR workflow integrations. Fourth, G2 and Gartner reviews
              indicate Deel scores below Rippling on IT integration depth and below Workday on enterprise implementation
              quality — two dimensions that matter increasingly as Deel pursues larger accounts. Fifth, Papaya Global's
              operational difficulties signal market-wide execution risk: managing multi-country payroll compliance
              simultaneously across 150+ jurisdictions is operationally complex and any service failure can trigger
              rapid customer churn.
            claimRefs:
              - CP023
              - CP024
