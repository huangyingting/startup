  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >-
              The global EOR and payroll platform market spans five competitive categories. First, purpose-built
              EOR-first challengers — Remote, Oyster HR, Velocity Global, Papaya Global, Multiplier, Omnipresent —
              emerged between 2019 and 2022 riding the same remote-work wave as Deel. Remote is Deel's most direct peer,
              with similar geographic reach and pricing, last valued at ~$3B in 2022. Oyster HR targets impact-oriented
              buyers; Velocity Global leans enterprise. Second, Rippling occupies a distinct position as a Workforce
              Cloud bundling HR, IT device management, and finance automation. Rippling's $16.8B April 2025 valuation
              and $693M total raised signal investor conviction in platform consolidation as a long-run winner over EOR
              point-solutions. Third, legacy EOR network providers — Globalization Partners (G-P), Atlas HXM — predate
              the SaaS era and operate through third-party employer-of-record networks rather than owned entities. Their
              180-country coverage is broad but UX and pricing are less competitive. Fourth, incumbent HCM vendors
              (Workday, ADP, SAP SuccessFactors, Oracle HCM) serve large enterprise accounts but have historically
              under-served startups and mid-market companies needing agile cross-border employment. ADP's GlobalView
              offers multi-country payroll but requires lengthy implementations. Fifth, domestic payroll specialists
              (Gusto, Paychex, Ceridian) are largely US-centric and do not compete directly in EOR, though Gusto's
              international expansion via EOR partnerships signals convergence risk. Each category presents different
              threat vectors: EOR peers on price and geographic breadth, Rippling on platform depth, incumbents on
              enterprise trust and implementation scale.
            claimRefs:
