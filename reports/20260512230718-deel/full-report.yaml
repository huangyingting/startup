      - number: '1.3'
        title: Capital Formation and Investor Ecosystem
        blocks:
          - type: paragraph
            body: >-
              Deel has raised approximately $961M in equity financing across six rounds since 2019, reaching a $17.3B
              post-money valuation at the October 2025 Series E. The seed round closed in 2019 after the Y Combinator
              demo day, providing initial capital for product development. Andreessen Horowitz led a $30M Series A in
              2020. Ben Horowitz later stated at the Series E announcement that Deel's infrastructure has become
              essential to customers everywhere. A $156M Series B followed in June 2021, a $425M Series C in October
              2021 at a $5.5B valuation, and a $50M Series D in May 2022 at a $12B valuation. The relatively small
              Series D size ($50M) at a large valuation ($12B) suggests existing investors exercised follow-on rights in
              a capital-sufficient business rather than the company requiring new dilutive capital. The three-year gap
              between the 2022 Series D and the 2025 Series E is consistent with Deel's stated profitability during that
              period — the company grew ARR from below $300M to above $1B without requiring external capital. The
              October 2025 Series E was led by new investor Ribbit Capital, whose founder Micky Malka cited Deel's own
              fully remote operating model as uniquely positioning it to build products for global team expansion.
              Returning investors a16z and Coatue co-led alongside General Catalyst and Green Bay Ventures. The capital
              will fund strategic acquisitions, continued owned-infrastructure buildout, and AI innovation. Notable
              board advisors include Emilie Choi (Coinbase President and COO), Tobias Lütke (Shopify CEO), Dara
              Khosrowshahi (Uber CEO), Jeffrey Katzenberg, and Jeff Wilke (former Amazon Worldwide Consumer CEO).
