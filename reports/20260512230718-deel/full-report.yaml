      - number: '3.4'
        title: Switching Costs, Lock-In, and Moat Durability
        blocks:
          - type: paragraph
            body: >-
              Deel's competitive moats are moderate and evolving. Data lock-in is real: once payroll, employee records,
              time-off, performance reviews, and compliance documentation are consolidated in Deel, migration requires
              replicating years of data in a new system — a process most HR teams are unwilling to undertake without
              strong cause. Contract-level stickiness is aided by 12–24 month SaaS contracts with auto-renew clauses
              typical for mid-market. Entity ownership creates a defensible infrastructure moat: building 150+ owned
              entities takes 3–5 years and an estimated $50–100M in entity-establishment capital, creating a barrier
              that underfunded competitors cannot replicate quickly. Data advantages: Deel processes $22B+ in annual
              payroll, building proprietary compensation benchmarking data and compliance policy datasets that inform
              its AI compliance engine. Network effects are limited but emerging: as more global workers use Deel's
              contractor portal and talent marketplace, employers are more likely to discover Deel candidates.
              Multi-homing risk is moderate — large enterprise accounts may run Workday as HRIS system of record and use
              Deel as an EOR workflow layer, reducing switching barriers if Deel's functionality deteriorates. The
              greatest moat risk is Rippling's platform strategy: if enterprise buyers consolidate HR, IT, and finance
              into Rippling, Deel's EOR-first offering could be displaced from its best customers.
