      - number: '1.4'
        title: Scale, Traction, and Customer Base
        blocks:
          - type: paragraph
            body: >-
              Deel's operational scale as of the October 2025 Series E announcement makes it the largest disclosed
              pure-play global-employment platform by nearly every measured dimension. The company serves 37,000-plus
              businesses spanning startups to Fortune 500 enterprises, with the homepage updating this to 40,000-plus by
              May 2026. Its 1.5 million worker footprint across 150-plus countries is the broadest published coverage in
              the EOR and global payroll category. Annual payroll processed of $22B is a direct indicator of the
              economic flow and fiduciary responsibility embedded in the platform. The business reached $1B in ARR in
              early 2025, making it one of a handful of HR technology companies globally to achieve that milestone.
              September 2025 was the first $100M revenue month, and the Series E announcement confirmed the company's
              third consecutive year of profitability — an unusual combination for a growth-stage company still raising
              capital. The growth metrics within the most recent period are particularly notable: 1,500% growth across
              US products (PEO and US payroll), 600% growth in HR products, 450% growth in global payroll, 480% growth
              in customers using three or more products, and 1,200% growth in customers using four or more.
              Cross-product expansion metrics are relevant because they indicate platform consolidation driving net
              revenue retention well above the typical SaaS benchmark. Enterprise customer logos include LEGO, Puma,
              Virgin Media, Klarna, Capgemini, FedEx, Nubank, Palantir, Novo Nordisk, Fidelity, and Pepsi, confirming
              that the product has crossed the quality bar for Fortune 500 adoption. Enterprise NPS exceeds 90, an
              unusually high score for payroll infrastructure, which is typically a high-friction category.
