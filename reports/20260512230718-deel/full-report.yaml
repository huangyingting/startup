  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundary
        blocks:
          - type: paragraph
            body: >-
              Deel's addressable market is most precisely defined as the global cross-border employment and payroll
              compliance services market, encompassing three adjacent sub-segments: (1) Employer of Record (EOR)
              services, where a licensed local entity acts as the statutory employer for workers in a jurisdiction where
              the client company has no local presence; (2) global payroll outsourcing, where a company with an existing
              local entity outsources payroll administration, tax filings, and statutory benefit processing to a
              third-party processor; and (3) international contractor management and compliance, which covers
              engagement, global payments, IP assignment, and misclassification risk monitoring for non-employee workers
              across jurisdictions. Excluded from the core serviceable boundary are domestic single-country payroll
              processing (dominated by incumbents such as ADP and Paychex), pure Professional Employer Organisation
              (PEO) services that require the client to have a pre-existing local entity, and generalised HRIS or talent
              management software with no compliance infrastructure in the relevant jurisdictions. The status-quo
              substitute for EOR is direct entity setup—a process requiring $50,000 to $300,000 in legal and
              registration fees and three to eighteen months of lead time per jurisdiction. For international
              contractors, the substitute is direct engagement without formal compliance tools, which exposes buyers to
              misclassification penalties and permanent establishment risk. EOR is positioned as the fast-to-market,
              cost-efficient alternative for companies hiring cross-border before committing to a permanent subsidiary.
            claimRefs:
