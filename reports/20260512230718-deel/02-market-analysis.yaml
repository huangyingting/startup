figures:
  - id: FM001
    title: "Market sizing lens"
    type: pyramid
    layout: wide
    summary: "Three-layer TAM/SAM/SOM pyramid illustrating Deel's addressable opportunity within the global HR technology and EOR market as of 2025–2026."
    approximationNotes: "TAM from Research and Markets 2025 ($73B global HR tech). SAM is analyst-derived: EOR ($3–5B base, $11–14B terminal) plus global payroll outsourcing ($9–11B) plus contractor management (estimated ~$5B), yielding a $20–30B midpoint of $25B. SOM is Deel's $1B+ ARR representing approximately 4% of the $25B SAM midpoint."
    claimRefs: [CM012, CM013, CM014, CM015, CM016]
    data:
      items:
        - label: "TAM — Global HR Technology"
          value: 73
          unit: "$B"
          detail: "Broad HR tech software and services globally (Research and Markets, 2025 estimate); includes HRIS, payroll, EOR, talent management, learning, and adjacent tools"
        - label: "SAM — Cross-border Employment and Payroll Compliance"
          value: 25
          unit: "$B"
          detail: "EOR plus global payroll outsourcing plus contractor compliance (analyst estimate, 2026); excludes domestic-only payroll and pure-HRIS with no cross-border component"
        - label: "SOM — Deel Current ARR on SAM"
          value: 1
          unit: "$B"
          detail: "Deel's reported $1B+ ARR (2025) on an estimated $25B SAM midpoint implies approximately 4% current penetration; 10–15% penetration would equate to $2.5–3.75B ARR"

