      topic: SOM
      missingEvidence: "Competitor revenue figures (Remote.com, Oyster HR, Papaya Global, Multiplier) are not publicly disclosed, preventing independent verification of Deel's claimed market leadership position."
      whyItMatters: "Without competitor revenue data, Deel's 4% SAM penetration is a single-sided calculation; actual competitive concentration could change the credibility of the SOM narrative."
      diligencePath: "Request Deel's internal competitive intelligence; attempt to triangulate via LinkedIn employee counts, job board signals, and disclosed customer or payment volumes from competitors."
      relatedQuestionRefs: [QM007, QM024]
      relatedTableRefs: [TM002]

    - type: conflicting-data
      severity: minor
      topic: EOR market CAGR
      missingEvidence: "EOR market CAGR estimates range from 9% (Coherent Market Insights) to 15% (WinterGreen Research) using different base years; the Coherent estimate is paywalled and unverifiable."
      whyItMatters: "The 9–15% CAGR spread implies a 2032 market size range of $10.8B–$17B+; this 50%+ variance makes market-size-based valuation arguments fragile."
      diligencePath: "Obtain the full Coherent Market Insights methodology; reconcile base-year differences; request Deel's own bottom-up market sizing model used for Series E investor materials."
      relatedQuestionRefs: [QM015]
      relatedTableRefs: [TM002]

    - type: missing-source
      severity: minor
      topic: switching costs
      missingEvidence: "No public source quantifies EOR customer switching costs in dollar terms or average customer tenure; the stickiness claim rests on logical inference rather than observed churn data."
      whyItMatters: "Switching cost depth determines NRR floor and competitive moat; if switching costs are lower than assumed, fee compression could threaten long-term margin."
      diligencePath: "Request Deel's cohort NRR data by product line (EOR vs. payroll vs. contractor); ask for average contract duration and voluntary vs. involuntary churn breakdown."
      relatedQuestionRefs: [QM026]

    - type: stale
      severity: minor
      topic: payroll outsourcing market size
      missingEvidence: "The Allied Market Research payroll outsourcing estimate uses a 2021 base year, now 5 years stale; post-COVID market acceleration may not be captured."
      whyItMatters: "A stale base year inflates the apparent CAGR and may understate the current market level, overstating remaining growth runway."
      diligencePath: "Identify a 2024 or 2025 payroll outsourcing baseline from Grand View Research, Mordor Intelligence, or IBISWorld; replace or cross-check against SM011."
      relatedQuestionRefs: [QM030]

