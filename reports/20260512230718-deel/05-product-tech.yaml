    severity: minor
    topic: IT Asset Management integration depth post-acquisition
    missingEvidence: Public record does not confirm whether IT Asset Management is fully integrated into the Deel platform or runs as a partially separate
      system.
    whyItMatters: Integration quality affects product reliability and enterprise NPS for multi-module customers.
    diligencePath: G2 review analysis for IT asset management module; engineering architecture interview.
    relatedQuestionRefs:
    - QE021
  - type: missing-source
    severity: minor
    topic: Deel uptime SLA specification
    missingEvidence: Deel does not publicly publish enterprise uptime SLAs; status page data suggests 99.9% but contractual SLA terms are undisclosed.
    whyItMatters: Enterprise customers need contractual uptime guarantees for mission-critical payroll operations; an undisclosed SLA creates procurement
      uncertainty.
    diligencePath: Request enterprise MSA template from Deel sales team; review availability SLA terms in data room.
    relatedQuestionRefs:
    - QE018
