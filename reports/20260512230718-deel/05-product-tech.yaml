    diligencePath: Request AI architecture memo in data room; engineering interview with CTO.
    relatedQuestionRefs:
    - QE009
  - type: private-evidence-only
    severity: minor
    topic: Patent portfolio details
    missingEvidence: Specific patent filings and counts for Deel's compliance IP are not publicly disclosed.
    whyItMatters: Patent count and scope indicate IP protection strength for compliance automation technology.
    diligencePath: Conduct USPTO/EPO patent search for Deel Inc. filings; request IP schedule in data room.
    relatedQuestionRefs:
    - QE022
