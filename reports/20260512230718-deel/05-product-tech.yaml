- id: platform-architecture
  title: Platform Architecture and Operating Model
  body: 'Deel''s platform is cloud-native and built on a multi-tenant SaaS architecture. Publicly confirmed elements include AWS cloud hosting, a REST API
    that enables integrations with 40+ HR and financial software systems, and a compliance automation engine that generates jurisdiction-specific employment
    contracts using a rules-based (and increasingly AI-augmented) logic layer. The core technical moat is Deel''s owned-entity infrastructure: unlike competitors
    that use third-party EOR networks (e.g., Safeguard Global, Papaya Global''s partner model), Deel operates its own legal entities in most major markets.
    This means Deel controls payroll timing, benefits design, and compliance decisions directly, without a network provider introducing margin dilution
    and data sharing risk. Deel''s banking infrastructure (mass payment rails) enables multi-currency payroll disbursement in 90+ currencies and supports
    pay-by-card and earned wage access. The compliance engine maps employment regulations (labor law, social security, tax rates, termination rules) for
    150+ countries into a machine-readable ruleset that is continuously updated by Deel''s legal and compliance teams. The platform integrates with Workday,
    BambooHR, NetSuite, QuickBooks, Xero, Slack, and 40+ other tools via REST API and native connectors. Real-time payroll previews, automated employment
    contract generation, and built-in e-signature workflows reduce manual HR operations. Deployment is SaaS-only (no on-premise option). Deel has not disclosed
    specific infrastructure vendors, cloud spend, or architecture diagrams beyond these public facts.'
  claimRefs:
  - CE006
  - CE007
  - CE008
  - CE009
  tableRefs:
  - TE002
  figureRefs:
  - FE002
- id: ai-and-differentiation
  title: AI Capabilities and Technical Differentiation
  body: 'Deel has publicly committed to AI investment as a primary use of its $300M Series E, focusing on compliance automation, HR analytics, and client-facing
    workflows. Known AI capabilities (as of May 2026) include: an AI-powered employment contract generation tool that surfaces jurisdiction-specific risk
    flags; an AI HR assistant for Deel HR that handles employee policy questions, time-off requests, and document retrieval via natural language; and misclassification
    risk scoring that assesses whether a contractor engagement qualifies for reclassification under FLSA, IR35, and country-specific rules. Deel has not
    released a detailed AI architecture paper or disclosed whether these models are proprietary or built on third-party LLM APIs (e.g., OpenAI, Anthropic).
    The primary technical differentiator beyond AI is Deel''s compliance data moat: eight years of real-world employment contracts, payroll runs, and regulatory
    interpretations across 150+ countries gives Deel a training dataset and validation corpus that new entrants cannot replicate cheaply. Deel holds a growing
    patent portfolio; specific patent counts are not disclosed. Trade secrets around its country-law compliance mapping and entity management playbook represent
    a second-order moat. Integration depth is also a moat: once Deel is the system of record for global HR data (HRIS) and financial transactions (payroll),
    replacing it requires migrating years of employment records, tax filings, and contractor contracts — increasing switching costs substantially beyond
    simple pricing comparisons.'
  claimRefs:
  - CE010
  - CE011
  - CE012
  - CE013
  tableRefs:
  - TE003
  figureRefs:
  - FE003
- id: security-compliance
  title: Security, Compliance, and Trust Infrastructure
  body: Deel holds SOC 2 Type II certification, GDPR compliance attestation, and ISO 27001 (as stated in public data security pages). These certifications
    apply to Deel's cloud infrastructure and data handling practices. For employment compliance, Deel maintains jurisdiction-specific regulatory coverage
    validated by local legal counsel in 150+ countries — this is a regulatory compliance function, not an IT certification. GDPR compliance is particularly
    significant given that Deel stores personal employment data (national ID numbers, payroll records, tax IDs) for 1.5 million workers across the EU and
    beyond. Deel has a Data Processing Agreement (DPA) with customers that defines data controller vs. processor responsibilities under GDPR and equivalent
    laws. Privacy Shield successor frameworks (EU-US Data Privacy Framework) are incorporated. Security architecture includes SSO and SAML for enterprise
    customers, role-based access controls, audit logs, and in-transit and at-rest encryption. Deel has not disclosed a major security breach or regulatory
    enforcement action as of May 2026. Customer support is available 24/7 via chat and email, with enterprise SLAs for dedicated account management. Uptime
    SLAs are not publicly disclosed; the Deel status page reports historical uptime in the 99.9% range.
  claimRefs:
  - CE014
  - CE015
  - CE016
  tableRefs:
  - TE004
  figureRefs: []
- id: product-roadmap-gaps
  title: Product Roadmap and Open Technical Questions
  body: 'Based on the Series E press release and investor commentary, Deel''s primary product roadmap priorities for 2025–2027 are: (1) AI compliance automation
    expansion — deeper AI-driven contract generation, workforce analytics, and regulatory monitoring; (2) enterprise HRIS parity — building Deel HR to match
    Workday and SAP SuccessFactors for talent management, learning, and compensation planning at large enterprise scale; (3) geographic expansion to Africa
    and Southeast Asia — establishing owned entities in new markets, particularly Nigeria, Kenya, Ghana, Indonesia, Vietnam, and the Philippines; and (4)
    financial services expansion — earned wage access, Deel Card, and potentially payroll financing products that leverage the payroll data footprint for
    credit scoring. Open questions that the public record does not answer include: the technology stack (cloud vendor configuration, database layer, API
    gateway infrastructure); specific AI model vendors or proprietary model development investment; detailed security penetration test results and bug bounty
    program; API rate limits and enterprise SLA terms; and the technical architecture of the IT asset management module (post-acquisition integration status
    vs. native build). These represent standard diligence items for a technology due diligence review.'
  claimRefs:
  - CE017
  - CE018
  - CE019
