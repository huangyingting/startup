company:
  name: Deel
chapter:
  number: 5
  title: Product and Technology
  summary: 'Deel has evolved from a single-product contractor management tool into a comprehensive global employment operating system. Its product suite
    spans EOR, global payroll, HRIS, IT asset management, contractor compliance, equity management, and an AI-powered compliance engine. The platform is
    cloud-native, API-first, and built to handle the legal entity complexity of 150+ countries without relying on third-party EOR networks in most markets.
    Key technical differentiators are the breadth of owned legal entities, the depth of compliance automation, and the platform''s 40+ third-party integrations
    into financial and HR systems. Primary gaps in the public record: the architecture stack, AI engine specifics, and detailed reliability SLAs are not
    publicly disclosed.'
sections:
- id: product-suite
  title: Product Suite and Customer Workflow
  body: 'Deel''s product suite covers the full lifecycle of international workforce management. The core product is Employer of Record (EOR): Deel acts
    as the legal employer in each of 150+ countries, enabling companies to hire full-time employees internationally without establishing their own local
    legal entities. EOR includes employment contracts compliant with local labor law, statutory benefits (pensions, health coverage, parental leave), payroll
    disbursement in local currency, and tax withholding filing. Global Payroll extends Deel to companies that already have legal entities in multiple countries:
    Deel calculates payroll, manages tax filings, and disburses payments through its proprietary banking integrations in 90+ countries — competing directly
    with ADP GlobalView and Workday Payroll. Contractor Management handles onboarding, invoicing, payment processing, and misclassification risk assessment
    for independent contractors in 150+ countries. HRIS (Dee HR) is offered as a free core module for existing Deel customers, with modules for org chart
    management, performance reviews, time-off tracking, and employee document storage. IT Asset Management was added in 2023 via acquisition; it allows
    companies to procure, configure, ship, and retrieve laptops and devices for remote employees in 130+ countries. Equity Management (Deel Equity) allows
    global employees to receive and vest stock options in compliance with local tax and securities regulations. The Deel Card provides a payment instrument
    for contractors who want to receive earnings as a virtual card rather than bank wire. Parte and Advance tools offer earned wage access and payment flexibility
    for workers.'
  claimRefs:
  - CE001
  - CE002
  - CE003
  - CE004
  - CE005
