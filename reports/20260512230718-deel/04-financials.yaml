- id: financial-risks-gaps
  title: Financial Risks and Diligence Gaps
  body: 'Deel''s status as a private company creates material financial diligence gaps. No audited GAAP financial statements
    are publicly available, making independent verification of the $1B ARR claim and profitability assertions impossible without
    data room access. Gross margin by product segment is undisclosed; the difference between EOR (25-35%) and SaaS module
    margins (70-80%) is large enough that a shift in revenue mix could materially alter the investment thesis. Net Revenue
    Retention — the most important health metric for a land-and-expand SaaS business — has never been publicly disclosed,
    nor has customer-level CAC. The March 2025 Rippling RICO lawsuit alleging corporate espionage represents an unquantified
    contingency liability; RICO treble damages could be substantial if Rippling prevails, and no reserve or insurance disclosure
    is available. FX risk is material: $22B in annual payroll processed across 150+ currencies creates significant exposure
    to currency moves that affects both the employer gross-up calculation and Deel''s own treasury float. EOR float income
    — estimated to be material at current interest rates — is sensitive to rate cuts and is not separately disclosed. Revenue
    concentration risk is unknown since no customer HHI or largest-customer revenue percentage has been disclosed. These gaps
    are addressable in a data room but represent blocking diligence items before underwriting a position at the $17.3B valuation.'
