- id: capital-position
  title: Capital Adequacy and Financing
  body: 'Deel has raised approximately $961M in total equity across six rounds from Seed through the October 2025 Series E.
    The $300M Series E was led by Ribbit Capital at a $17.3B post-money valuation, implying approximately 17x on the $1B ARR
    milestone — a premium relative to public HR-SaaS comparables (ADP at 5.5x revenue, Workday at approximately 10x ARR) but
    below the 2021 peak multiples of 30-40x that applied when Deel raised the Series C at $5.5B. The 17x multiple is defensible
    given three consecutive profitable years, which is rare for a growth-stage EOR platform, and the cross-border moat built
    by 150+ owned legal entities. The Series E use of proceeds was disclosed as strategic acquisitions (consistent with the
    $15M Omnipresent deal), native payroll infrastructure build-out in 100+ countries by 2029, and AI product development.
    Because the company is profitable, the Series E capital is strategic and balance-sheet strengthening rather than runway-extending.
    Monthly cash burn is estimated near zero. Post-Series E estimated cash position exceeds $300M, providing multi-year runway
    independent of further fundraising. No publicly disclosed debt, credit facility, or project finance obligations have been
    reported. The primary capital risk is entity expansion capex: establishing new local legal entities requires upfront investment
    in legal, corporate maintenance, and statutory compliance per jurisdiction.'
  claimRefs:
