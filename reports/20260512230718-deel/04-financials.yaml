  evidenceGaps:
  - id: EGI001
    type: private-evidence-only
    severity: blocking
    topic: Audited GAAP Financial Statements
    missingEvidence: No audited GAAP P&L, balance sheet, or cash flow statement has been publicly disclosed by Deel. All financial
      metrics are company-claimed and unaudited.
    impact: Without audited financials, revenue recognition methodology, true profitability, and working capital cannot be
      independently verified. This is a blocking diligence item for any investment at $17.3B.
    diligencePath: Request Big 4 audited statements in data room; confirm revenue recognition policy under GAAP; reconcile
      ARR to GAAP revenue.
    relatedTableRefs:
    - TI004
    - TI005
    relatedQuestionRefs:
    - QI012
    - QI027
  - id: EGI002
    type: private-evidence-only
    severity: material
    topic: Gross Margin by Product Segment
    missingEvidence: Gross margin by product line (EOR vs global payroll vs SaaS modules vs contractor) has never been publicly
      disclosed. All segment margin estimates are author-inferred from comparable companies.
    impact: The difference between EOR margins (est. 25-35%) and SaaS margins (est. 70-80%) is large enough that an unexpected
      revenue mix shift toward lower-margin products could materially affect the investment thesis and $17.3B valuation.
    diligencePath: Request segment P&L in data room with cost allocation methodology; compare to Rippling, Remote, and TriNet
      gross margin benchmarks.
    relatedTableRefs:
    - TI003
    - TI005
    relatedQuestionRefs:
    - QI009
    - QI028
    - QI001
  - id: EGI003
    type: private-evidence-only
    severity: material
    topic: Net Revenue Retention (NRR)
    missingEvidence: Deel has never publicly disclosed its NRR rate by cohort or segment. Cross-product expansion metrics
      (480% growth in 3+ product customers) are a strong proxy but are not a substitute for direct NRR data.
    impact: NRR is the most important health metric for a land-and-expand SaaS business; below 100% signals a leaking bucket
      regardless of new customer growth. Without NRR, LTV modeling is speculative.
    diligencePath: Request monthly ARR waterfall by vintage cohort; separate expansion, contraction, and churn; segment by
      SMB and enterprise.
    relatedTableRefs:
    - TI003
    relatedQuestionRefs:
    - QI013
    - QI016
  - id: EGI004
    type: private-evidence-only
    severity: material
    topic: Customer Acquisition Cost by Segment
    missingEvidence: CAC by segment (SMB PLG, mid-market, enterprise) and by sales channel has not been disclosed. Enterprise
      CAC of $10K-$50K is an author estimate based on AE headcount proxy only.
    impact: Without CAC, it is impossible to independently verify the economics of the Series E enterprise GTM investment
      or model LTV/CAC ratios for any customer segment.
    diligencePath: Request sales and marketing cohort analysis with CAC by channel and segment; payback period by cohort;
      blended vs segmented CAC trend.
    relatedTableRefs:
    - TI003
    relatedQuestionRefs:
    - QI014
    - QI023
  - id: EGI005
    type: private-evidence-only
    severity: material
    topic: Rippling RICO Lawsuit Financial Exposure
    missingEvidence: No reserve estimate, insurance coverage disclosure, or independent legal assessment of the Rippling RICO
      lawsuit is publicly available. RICO treble damages could be material if Rippling prevails.
    impact: The lawsuit creates an unquantified contingency liability that could materially reduce Deel's net asset value
      and distract management.
    diligencePath: Engage independent litigation counsel; request reserve estimate and indemnification policy; review any
      disclosed insurance coverage.
    relatedTableRefs:
    - TI005
    relatedQuestionRefs:
    - QI026
    - QI029
  - id: EGI006
    type: private-evidence-only
    severity: minor
    topic: FX Hedging Policy and Currency Exposure
    missingEvidence: Deel's treasury policy, FX hedging instruments, and net currency exposure on $22B in payroll across 150+
      currencies have not been disclosed in any public filing or press release.
    impact: Unhedged FX exposure at this payroll scale creates P&L volatility risk, particularly in EM currencies where Deel
      has growing EOR presence (Brazil, India, Mexico).
    diligencePath: Request treasury policy disclosure; FX gain/loss in income statement; hedging instrument detail and effectiveness
      testing.
    relatedTableRefs:
    - TI005
    relatedQuestionRefs:
    - QI030
  - id: EGI007
    type: private-evidence-only
    severity: material
    topic: Revenue Concentration and Customer HHI
    missingEvidence: No information is publicly available on the percentage of ARR contributed by the top-5 or top-10 customers,
      or on the Herfindahl-Hirschman Index (HHI) of Deel's customer revenue base.
    impact: If 10-20% of ARR is concentrated in a handful of enterprise customers (e.g., BCG, Klarna, Palantir), loss of any
      one creates material ARR risk that cannot be assessed without concentration data.
    diligencePath: Request top-10 customer ARR concentration; customer-level churn history; multi-year contract coverage percentage.
    relatedTableRefs:
    - TI005
    relatedQuestionRefs:
    - QI027
    - QI029
