- id: TI005
  title: Public financial gaps table
  type: standard
  layout: wide
  summary: Material financial data gaps that are unavailable from public sources and represent blocking or material diligence
    items for underwriting at the $17.3B Series E valuation.
  notes: All items are absent from public evidence. Closing these gaps requires data room access, management interviews, or
    third-party litigation counsel.
  columns:
  - Missing Data
  - Why It Matters
  - Diligence Path
  - Severity
  rows:
  - - Audited GAAP financial statements
    - Cannot independently verify ARR, revenue recognition policy, true profitability, or cash position
    - Request in data room from Big 4 auditor; confirm revenue recognition methodology
    - Blocking
  - - Gross margin by product segment
    - EOR (25-35%) and SaaS (70-80%) margins differ sharply; blended figure masks mix-shift risk
    - Data room segment P&L with cost allocation by product line
    - Material
  - - Net Revenue Retention (NRR) by cohort
    - Primary health metric for land-and-expand; required for LTV modeling and churn assessment
    - Customer cohort waterfall by monthly ARR vintage; churn and expansion separately
    - Material
  - - Customer Acquisition Cost by segment
    - Cannot model CAC payback, sales efficiency, or Series E deployment ROI without it
    - Sales and marketing cohort analysis by channel, segment, and product
    - Material
  - - Rippling RICO lawsuit financial exposure
    - Potential treble damages unquantified; undisclosed contingency liability could be material
    - Independent litigation counsel review; reserve estimate; indemnification policy
    - Material
  - - FX hedging policy and currency exposure
    - $22B payroll across 150-plus currencies; unhedged FX creates P&L volatility risk
    - Treasury policy disclosure; FX gain/loss in income statement; hedging instrument detail
    - Minor
