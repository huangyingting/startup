  title: Financials
  mission: Assess revenue model, unit economics, capital adequacy, and financial diligence gaps to support investment thesis
    or risk flagging.
  summary: 'Deel crossed $1B ARR in early 2025 and generated its first $100M revenue month in September 2025. The company
    operates a multi-stream model anchored by EOR, global payroll, contractor management, and high-margin SaaS modules. Three
    consecutive profitable years (2022-2024) combined with $961M in total equity raised and a $17.3B Series E valuation make
    Deel a capital-efficient outlier in the HR-tech category. Key financial risks are private-company opacity: no audited
    P&L, no NRR disclosure, and an unquantified RICO litigation exposure from the Rippling lawsuit.'
sections:
- id: revenue-streams-overview
  title: Revenue Model Overview
  body: Deel operates seven distinct revenue streams that together produce $1B+ in ARR as of early 2025. The Employer of Record
    (EOR) service — in which Deel acts as the legal employer in 150+ countries — is the highest-revenue stream and commands
    an estimated $599-800 per employee per month based on competitive pricing intelligence. Because Deel owns its local legal
    entities rather than relying on third-party EOR networks, its entity-level cost base is partially fixed, creating operating
    leverage as headcount billed scales. Global payroll — processing payroll for companies that own local entities — is priced
    at approximately $20-50 per employee per month, generating high volume but lower margin due to payment processing and
    cross-border clearing costs. Contractor management, the company's earliest product, is estimated at approximately $49
    per contractor per month; it carries higher software margins than EOR but slower growth as the company moves upmarket.
    HRIS and Deel HR, offered as a free core tier with premium add-ons, convert customers into stickier multi-product users
    and drive the 480% cross-sell growth in three-plus-product customers. Immigration and global mobility services, IT device
    management, and ancillary payroll float income round out a diversified model. Deel does not publicly disclose revenue
    by stream, so segment mix and margin decomposition require data room access.
