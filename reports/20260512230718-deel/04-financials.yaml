- id: unit-economics-margins
  title: Unit Economics and Gross Margin Drivers
  body: 'Deel''s blended gross margin is estimated at 40-55%, reflecting the mix of labor-intensive EOR (25-35% gross margin)
    and high-margin SaaS modules (70-80%). EOR margins are suppressed by entity maintenance costs across 150+ countries, mandatory
    statutory benefit contributions, local payroll tax filings, and compliance operations headcount. Global payroll carries
    15-25% gross margin due to payment processing and cross-border settlement costs. HRIS, contractor management, and add-on
    SaaS modules carry 70-80% software-style margins with minimal incremental delivery cost per customer. As the revenue mix
    shifts toward SaaS modules and away from pure EOR, the blended margin should improve over time. Working capital dynamics
    are structurally favorable for the EOR business: employers pre-fund payroll runs before Deel disburses to employees, creating
    a float on approximately $1.83 billion in monthly payroll flows. Even one business day of float at current market interest
    rates generates an estimated $60M or more in annual ancillary income. Net Revenue Retention is not disclosed but the 480%
    growth in customers using three or more products, and 1,200% growth for four-plus products, strongly implies NRR well
    above 110%, consistent with enterprise SaaS best-in-class benchmarks. CAC is not disclosed for any segment. Capital expenditure
    is modest for the software-native platform (cloud infrastructure, compliance tooling), with periodic entity-establishment
    costs as Deel enters new jurisdictions.'
