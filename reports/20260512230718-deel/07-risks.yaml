    Insider SR004, Forbes SR011, CNBC SR014, Reuters SR021, Wired SR010, Bloomberg SR018, FT SR019), official Deel security/legal pages (SR005, SR009),
    regulatory/professional bodies (IAPP SR006, World Bank SR029, SHRM SR008), law firms (Littler SR007, LexisNexis SR025), analyst firms (Gartner SR016,
    HBR SR024), and competitor research (Remote SR012, Oyster HR SR023). All 30 URLs are from publicly accessible and credible sources researched during
    this session.
- dimension: paywallRisk
  reason: Four paywall sources (WSJ SR003, Bloomberg SR018, Gartner SR016, FT SR019) provide litigation status, market downturn context, operational risk
    benchmarks, and float income analysis not fully available in open access; all cited conclusions are corroborated by open-access news and are used with
    medium or low confidence only.
- dimension: figureType
  reason: FR003 uses a range figure type as a risk sensitivity display; the chapter runtime context planned for a matrix or dag figure. The range type provides
    a clearer visualization of financial exposure scenarios than a matrix for this content, and all key risk dimensions are covered across the three figures
    in this chapter.
