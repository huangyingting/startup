  evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Competitor ARR and revenue
    missingEvidence: Audited or independently verified ARR figures for Remote, Velocity Global, Rippling, Papaya Global, and Multiplier.
    whyItMatters: Without competitor revenue data, competitive market-share claims rest on proxy signals (funding rounds, customer counts, LinkedIn headcount)
      rather than direct financial comparison.
    diligencePath: Request CB Insights private revenue estimates; triangulate with LinkedIn headcount growth as revenue proxy.
    relatedQuestionRefs:
    - QP001
  - type: private-evidence-only
    severity: material
    topic: Rippling litigation current status
    missingEvidence: Court filings, depositions, or settlement negotiations in Rippling v. Deel after the March 2025 complaint; whether any preliminary
      injunctions were granted.
    whyItMatters: An injunction could disrupt Deel's product or data practices; a settlement could include non-compete provisions affecting roadmap.
    diligencePath: Review PACER for case filings; engage trade-secret litigation counsel to assess exposure.
    relatedQuestionRefs:
    - QP004
  - type: missing-source
    severity: minor
    topic: Rippling EOR detailed pricing
    missingEvidence: Confirmed EOR pricing per employee per month for Rippling, which does not publish list pricing.
    whyItMatters: Without Rippling's actual EOR pricing, comparison tables rely on estimates that could understate or overstate Deel's pricing advantage
      in head-to-head deals.
    diligencePath: Obtain Rippling pricing from competitive intelligence, buyer interviews, or broker comparisons.
    relatedQuestionRefs:
    - QP012
  - type: missing-source
    severity: minor
    topic: Enterprise customer defections
    missingEvidence: Named or anonymized examples of Deel enterprise customers switching to Rippling, Workday, or ADP, with stated reasons.
    whyItMatters: Customer-level churn analysis is the strongest signal of competitive displacement risk.
    diligencePath: Request customer retention cohort data in data room; reference calls with churned accounts.
    relatedQuestionRefs:
    - QP014
    - QP018
  - type: missing-source
    severity: minor
    topic: Churn rate data
    missingEvidence: Empirical gross and net retention rate data for Deel and comparable EOR competitors to verify data lock-in moat.
    whyItMatters: If Deel's NRR is below 110%, the moat narrative of data lock-in and switching cost is weakened.
    diligencePath: Request customer cohort data in data room; triangulate with G2 satisfaction trend data.
    relatedQuestionRefs:
    - QP016
  - type: missing-source
    severity: minor
    topic: Deel counterclaims in Rippling lawsuit
    missingEvidence: Deel's publicly disclosed legal defense strategy or counterclaims in Rippling v. Deel.
    whyItMatters: A strong Deel counter-argument could substantially reduce litigation risk; an admission or weak defense would increase it.
    diligencePath: Review court filings and Deel public statements on litigation strategy.
    relatedQuestionRefs:
    - QP025
  - type: stale
    severity: minor
    topic: Papaya Global operational recovery
    missingEvidence: Current operational status of Papaya Global's paused markets — whether services were fully restored by May 2026.
    whyItMatters: If Papaya has recovered, it remains a competitive threat; if still paused, it signals broader market risks for multi-country payroll operations.
    diligencePath: Check Papaya Global's current product page and TechCrunch/Crunchbase news for operational updates.
    relatedQuestionRefs:
    - QP019
acknowledgedWarnings:
- dimension: unverifiedSource
  reason: Chapter 3 sources SP001–SP025 span major business news publishers (Bloomberg, Reuters, FT, CNBC, Wired, TechCrunch, Business Insider, WSJ), G2
    review platform, Gartner, Mordor Intelligence, IBISWorld, Grand View Research, and competitor official pages. All URLs are publicly accessible or well-known
    paywalled publications fetched during the research phase; sources with paywall status contribute abstract-level data only to claims.
- dimension: paywallRisk
  reason: 5 paywall sources out of 25 are established analyst firms (Gartner, Mordor Intelligence, IBISWorld, Grand View Research) and major news publications
    (Bloomberg, FT, WSJ, Business Insider) whose summary data is publicly accessible in abstracts and press coverage. Their conclusions are used only for
    market-sizing and litigation context where multiple confirming open-access sources corroborate the claims.
