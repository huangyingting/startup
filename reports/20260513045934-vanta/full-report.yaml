          HHS-compliant safeguards; BAA breach could trigger civil monetary penalties
        - Low-Medium
        - High
        - SOC 2 Type II certification, standard BAA template, security incident response plan
        - Medium — BAA terms and HHS alignment not publicly verified
        - >-
          Obtain and review Vanta's standard BAA template; confirm breach notification SLA meets 60-day HIPAA
          requirement
