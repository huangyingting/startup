  - id: FE001
    title: Product architecture map
    type: stack
    layout: standard
    summary: >
      Vanta's platform architecture is organized as a six-layer stack from presentation through infrastructure. The
      presentation layer surfaces compliance status to customers, auditors, and prospects through the Trust Center,
      compliance dashboard, and report exports. The application layer hosts the core compliance automation engine and
      all add-on modules (GRC, TPRM, questionnaire automation, privacy, access reviews). The AI and intelligence layer
      powers the Riskey agent, questionnaire autofill, and compliance AI agents. The integration layer (400+ connectors
      plus REST API) is the primary moat, providing continuous evidence collection from the enterprise SaaS stack. The
      data and evidence store maintains the immutable compliance record. AWS infrastructure provides compute, storage,
      and network — with 99.9%+ historical uptime and Vanta's own SOC 2 Type II and ISO 27001 certifications applying to
      the full stack.
    data:
      layers:
        - label: Presentation layer
          detail: >-
            Trust Center (public and NDA-gated security portal), compliance dashboard, PDF audit reports, risk posture
            view, board reporting templates, auditor workspace
        - label: Application layer
          detail: >-
            Compliance automation engine (35+ frameworks), evidence management, GRC/risk module, TPRM, questionnaire
            automation, privacy automation, access reviews, AI governance templates
        - label: AI & intelligence layer
          detail: >-
            Riskey AI agent (risk assessment, September 2025), questionnaire autofill AI (2024), AI Agents for
            compliance workflows (GA March 2026), AI governance framework templates
        - label: Integration layer
          detail: >-
            400+ native connectors: AWS, GCP, Azure, GitHub, GitLab, Okta, Azure AD, Salesforce, Jira, Slack,
            CrowdStrike, Carbon Black, Jamf, Google Workspace; REST API and webhooks at developer.vanta.com
        - label: Data & evidence store
          detail: >-
            Immutable evidence repository (AES-256 at rest), audit trail, policy bank, vendor questionnaire database,
            compliance framework control mappings
        - label: Infrastructure
          detail: >-
            Hosted on AWS; SOC 2 Type II and ISO 27001 certified; TLS 1.2+ in transit; 99.9%+ historical uptime
            (status.vanta.com); cloud-only — no on-premises option
