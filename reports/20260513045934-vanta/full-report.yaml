  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk Landscape
        blocks:
          - type: paragraph
            body: >
              Vanta's legal and regulatory exposure spans five distinct frameworks, each capable of independently
              generating material liability or product-revision obligations. Under the GDPR, Vanta acts as a data
              processor for EU-based customers, meaning it must maintain compliant Data Processing Agreements and
              adequate technical and organizational measures for personal data flowing through its compliance evidence
              collection pipelines. While Vanta offers data residency controls, a confirmed EU-hosted data processing
              option is not clearly documented in public roadmap materials, creating residual GDPR exposure for
              customers with strict data locality requirements.

              HIPAA imposes Business Associate Agreement obligations on Vanta for healthcare customers. Under HHS
              enforcement guidance, a BAA breach or failure to maintain adequate safeguards could result in civil
              monetary penalties. Vanta's SOC 2 Type II certification provides some assurance, but the specific terms of
              Vanta's BAA and incident response procedures are not publicly disclosed, making it difficult for
              healthcare customers to independently assess residual exposure. The SEC's 2023 cybersecurity disclosure
              rule (Release No. 33-11216) requires public companies to disclose material cybersecurity incidents within
              four business days of determining materiality; this creates both demand for Vanta's incident-tracking
              capabilities and a platform obligation—if Vanta itself suffers a breach, its public-company customers may
              be required to disclose it as a third-party cybersecurity incident.

              The EU AI Act, effective 2026, creates new requirements for vendors deploying AI risk assessment or
              automated compliance assertion tools. Vanta's Riskey agent and AI governance module must continuously
              update to reflect evolving requirements. CCPA and the growing US state privacy law patchwork require Vanta
              to update its compliance library as new laws take effect. IP and patent risk is lower given no disclosed
              litigation, but incumbents such as ServiceNow and IBM hold extensive patent portfolios in GRC and security
              automation that could be asserted against Vanta's automated evidence collection workflows. No material
              lawsuits against Vanta have been publicly documented as of May 2026.
            claimRefs:
