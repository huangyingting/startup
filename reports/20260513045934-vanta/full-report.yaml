  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Base Profile and Segmentation
        blocks:
          - type: paragraph
            body: >
              Vanta's customer base is broadly diversified across company size, geography, and vertical, a pattern that
              reflects the universal nature of compliance requirements across technology businesses. As of April 2026,
              the 16,000+ customer base skews toward SMB and mid-market companies—together representing approximately
              75% of customer count—while enterprise customers (1,000+ employees) contribute a disproportionately high
              share of ARR relative to their count. This inversely-scaled relationship is typical of compliance SaaS
              platforms where enterprise contracts command significantly higher ACV due to more complex framework
              requirements, larger employee headcounts that increase per-seat pricing, and more add-on modules per
              account.

              The SMB segment (fewer than 100 employees) is primarily composed of SaaS and cloud-native technology
              companies in North America pursuing their first SOC 2 Type II certification, typically in response to a
              prospect or enterprise buyer requirement. This segment has the highest customer count but the lowest
              average ACV (approximately $10,000–$18,000 per year). Mid-market customers (100–1,000 employees) use Vanta
              for multi-framework compliance programs combining SOC 2 with ISO 27001, HIPAA, or PCI-DSS, and represent
              the core revenue engine with roughly 40% of ARR despite only 35% of customer count. Enterprise customers
              (1,000+ employees) deploy Vanta for complex GRC programs, TPRM automation, and questionnaire automation at
              scale; their higher switching costs and deeper multi-module deployment result in estimated gross retention
              above 92%. Three specialty verticals—healthcare (HIPAA + SOC 2), fintech (PCI-DSS + SOC 2), and AI-native
              companies (ISO 42001 + SOC 2)—represent growing segments with above-average ACV and natural framework
              expansion paths. Approximately 70% of Vanta's customers are headquartered in North America, 20% in Europe
              (driven by GDPR adoption), and 10% in APAC and other markets. The customer journey map (FU001) traces the
              lifecycle from initial compliance trigger through multi-framework expansion and Trust Center activation.
