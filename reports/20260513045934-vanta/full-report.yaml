  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              Vanta's investment thesis rests on the observation that regulatory and security compliance has shifted
              from an annual audit exercise to a continuous, automated function deeply embedded in SaaS sales cycles.
              SOC 2, ISO 27001, HIPAA, and GDPR compliance reports have become standard procurement requirements for
              enterprise buyers, making Vanta's platform a quasi-mandatory workflow tool rather than a discretionary
              purchase. This dynamic sustains both high gross retention (customers cannot easily leave mid-audit cycle)
              and strong expansion revenue as customers add frameworks, users, and integrations.

              The market underpins the thesis. GRC software spending is projected to grow at roughly 14–16% CAGR through
              2028, reaching a $14 billion serviceable market. Vanta's $300M ARR represents only 2–3% penetration of its
              core addressable segment, implying substantial runway even without expanding into adjacent risk and vendor
              management categories. Analyst coverage from Forrester, Gartner, and IDC all identify automated continuous
              monitoring as the fastest-growing sub-segment of GRC, directly aligned with Vanta's product roadmap.

              The anti-thesis is more nuanced. Drata's $2 billion valuation at last check and rapid international
              expansion, Secureframe's aggressive SMB pricing, and Sprinto's India-led growth all suggest a market
              fragmenting toward a multi-vendor equilibrium rather than a winner-take-most outcome. Vanta's current
              premium valuation assumes it consolidates that fragmentation through platform breadth, but category
              expansion into risk and vendor management also exposes it to Archer, OneTrust, and ServiceNow — far
              better-capitalised incumbents with existing enterprise relationships.

              On balance, the thesis wins if Vanta sustains NRR above 110% and expands beyond compliance automation into
              the adjacent TPRM and risk orchestration categories by 2027. The anti-thesis wins if growth stalls and the
              platform fails to differentiate on depth against increasingly capable alternatives from cloud providers.
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
              - CV041
          - type: table
            tableRef: TV002
            claimRefs:
              - CV006
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
      - number: '8.2'
        title: Valuation Framework and Entry Price Analysis
        blocks:
          - type: paragraph
            body: >
              Vanta's last known funding round — the Series D in October 2023 — established a post-money valuation of
              $2.45 billion on approximately $150–200 million in ARR at the time of close, implying an ARR multiple of
              12–16×. By mid-2026 the company has reportedly reached $300 million ARR, which — holding the $2.45 billion
              carry value constant — implies a current multiple of 8.2×. This natural multiple compression as ARR grows
              is a key feature of Vanta's entry calculus: an investor entering at Series D price in a secondary
              transaction today receives the benefit of a lower implied multiple versus the round itself.

              Comparable public market multiples for high-growth SaaS companies (greater than 30% revenue growth) range
              from 8–15× NTM revenue in the current environment, while late-stage private companies with comparable
              profiles have been transacting at 7–12× ARR. Vanta sits at the higher end of private comparables but below
              the premium public multiples commanded by Datadog and CrowdStrike, which trade at 15–25× on stronger
              Rule-of-40 scores.

              Entry discipline matters here. At $2.45 billion, the investment returns to 3–5× only on exit scenarios
              that assume either an IPO at 12–15× on $400M+ ARR or a strategic acquisition at $4–6 billion. Both are
              achievable but require Vanta to continue growing at 30–40%+ for the next three years with no significant
              multiple compression. The preference overhang from prior rounds (roughly $424 million raised pre-Series D)
              means that a sub-$2 billion exit would return less than face value to common stockholders, and Series D
              liquidation preferences would absorb the first tranche of any exit proceeds.

              The SEC Form D filing confirms the $150 million equity offering closed in October 2023, with Goldman Sachs
              and Wellington Management as co-leads. Secondary market transactions in Vanta equity have occurred in a
              $2.2–2.6 billion implied valuation range, confirming that the Series D carrying value remains supported by
              real transaction evidence. Our valuation stance is FAIR VALUE at the Series D post-money. Entry below $2.0
              billion (via secondary or a new down-round) would offer asymmetric upside. Entry above $2.5 billion
              demands explicit underwriting of a $5+ billion exit.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
              - CV016
              - CV035
              - CV038
              - CV040
      - number: '8.3'
        title: Comparable Company and Transaction Analysis
        blocks:
          - type: paragraph
            body: >
              Selecting a coherent comparable set for Vanta requires choosing between two analogical frames: high-growth
              vertical SaaS companies with compliance/security exposure, and GRC platform companies with broader risk
              management scope. We use both, weighting the former more heavily given Vanta's current revenue
              concentration in automated compliance.

              Public comps include Qualys (security compliance, approximately 5.5× revenue, 12% growth), Tenable
              (vulnerability management, approximately 7× revenue, 18% growth), Rapid7 (cloud security, approximately 4×
              revenue with declining margins), and SailPoint (identity governance, re-IPO'd at approximately 11×
              revenue). Among broader SaaS comparables, Zendesk's acquisition at 10× revenue by Hellman and Friedman and
              Salesforce's Own Company acquisition at approximately 7× ARR represent strategic transaction comps. In
              adjacent GRC, the IBM acquisition of Apptio at approximately 9× forward revenue provides an instructive
              upper-bound reference for strategic acquirer willingness to pay for recurring compliance-adjacent revenue.

              Private transaction data is sparser. Drata's last round valued it at roughly $2.0 billion on approximately
              $180 million ARR (about 11× ARR), directly comparable to Vanta's implied multiple but on a faster growth
              trajectory. Sprinto raised its Series B at a $1 billion valuation on approximately $60 million ARR (about
              16× ARR), reflecting an early-stage growth premium. PitchBook data indicates late-stage security SaaS
              companies with greater than 30% ARR growth are transacting at 7–12× ARR in early 2026, a range that
              brackets Vanta's current implied multiple.

              RSA Security's sale to Symphony Technology Group for $2.1 billion represents the distressed-exit floor: a
              legacy GRC platform sold at approximately 5× revenue with no growth. Vanta's multiple premium above this
              floor is justified by its growth rate but must be sustained to defend the current carrying value. M&A
              precedents confirm that strategic acquirers (IBM, Salesforce, SAP) are willing to pay 7–11× revenue for
              compliance-adjacent recurring revenue platforms with defensible customer relationships.
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV032
              - CV033
              - CV034
              - CV039
