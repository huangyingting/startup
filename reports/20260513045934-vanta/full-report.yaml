      - number: '6.2'
        title: Customer Growth and Adoption Trajectory
        blocks:
          - type: paragraph
            body: >
              Vanta's customer growth from an estimated 3,500 customers and $69M ARR in April 2023 to 16,000+ customers
              and $300M ARR in April 2026 represents one of the fastest scaling trajectories in the compliance
              automation sector, placing Vanta well ahead of any publicly known competitor in customer count and ARR.
              The 63% year-over-year ARR growth rate announced in April 2026 implies Vanta added approximately $116M in
              net new ARR during fiscal year 2025/2026, a figure that substantially exceeds the total ARR of most
              compliance-automation startups and puts Vanta on a trajectory toward $500M ARR within two years at current
              growth rates.

              The implied average contract value trajectory reveals an important dynamic: ACV declined slightly from
              approximately $19,700 in April 2023 to approximately $15,100 in April 2024, consistent with aggressive SMB
              market penetration at lower entry prices. ACV then recovered to approximately $17,000 in April 2025 and
              $18,750 in April 2026 as multi-framework adoption and module upsell began to offset volume-driven price
              dilution. This ACV recovery trend is a strong leading indicator of the land-and-expand model achieving
              critical mass: expansion ARR from the installed base is outpacing the ACV dilution effect from onboarding
              lower-priced new customers.

              The funnel perspective (FU002) illustrates the conversion path from approximately 350,000 companies in the
              total addressable market to 16,000+ paying customers, with meaningful drop-off between awareness
              (estimated 50,000 companies) and evaluation (estimated 20,000), reflecting the still-early market
              penetration opportunity remaining in Vanta's addressable SMB segment. The July 2025 Series D at a reported
              $4.15B valuation (approximately 16.6x ARR on $250M ARR at the time) was subsequently validated by the
              April 2026 $300M ARR milestone, confirming that Vanta is executing at a growth rate consistent with its
              premium valuation.
