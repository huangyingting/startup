companyProfile:
  summary: >-
    Vanta is a San Francisco-based SaaS company founded in 2018 by Christina Cacioppo and Fred Blauer. It automates
    security compliance and GRC workflows for cloud-native businesses, enabling customers to achieve and maintain SOC 2,
    ISO 27001, HIPAA, GDPR, PCI-DSS, and 30+ other certifications through continuous monitoring, automated evidence
    collection, and an AI-powered compliance platform. As of April 2026, Vanta serves 16,000+ customers globally and has
    crossed $300M in ARR with 63% year-over-year growth, supported by $504M in total funding including a $150M Series D
    at a $4.15B valuation led by Wellington Management in July 2025.
