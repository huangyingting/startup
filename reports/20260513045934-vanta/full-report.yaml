      - number: '8.5'
        title: Exit Readiness and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: >
              Vanta's IPO readiness, while improving, is not yet at the threshold of imminent public offering. The
              company has hired a CFO and reportedly engaged Goldman Sachs and JP Morgan on long-lead IPO preparation,
              but the current equity market environment — with SaaS multiples 40–50% below 2021 peaks — makes a 2026 IPO
              financially unattractive unless Vanta can demonstrate Rule-of-40 performance above 50. A 2027–2028
              timeline is more likely, conditional on rate normalisation and recovery in enterprise SaaS multiples.

              Strategic acquisition is a live alternative. Likely acquirers include Palo Alto Networks (building a
              platform security ecosystem), ServiceNow (expanding risk and compliance workflows), Microsoft (integrating
              compliance automation into Purview/Defender), and Workday (HR and compliance overlap). Each would pay a
              strategic premium above pure financial buyer multiples, and all have demonstrated willingness to acquire
              compliance- adjacent companies. The Reuters report of Goldman Sachs engagement for IPO preparation and
              Vanta's trajectory suggest a 2027–2028 liquidity event is the working assumption.

              Thesis-break triggers are: (1) ARR growth falls below 25% for two consecutive quarters; (2) disclosed or
              inferred NRR drops below 100%, indicating net customer contraction; (3) a major hyperscaler
              (AWS/Azure/GCP) launches a bundled compliance offering that displaces Vanta's integration layer at zero
              marginal cost; (4) a material security incident at Vanta itself, which would cause irreparable
              reputational damage; or (5) a funding round at a post-money below $2.0 billion, signalling deteriorating
              growth.

              Final diligence asks prior to any commitment at Series D price or above: audited P&L and cash flow
              statements FY2023–2025; full cap table with preference stack and liquidation waterfall; verified ARR
              definition and cohort-level GRR/NRR data; pipeline and win/loss data for enterprise and mid-market
              segments; competitive displacement rate and churn by cohort vintage; and CAC payback period by cohort to
              confirm improving sales efficiency.
            claimRefs:
              - CV022
              - CV023
              - CV024
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV005
            claimRefs:
              - CV022
              - CV023
              - CV024
          - type: table
            tableRef: TV006
            claimRefs:
              - CV025
              - CV026
              - CV027
      - number: '8.6'
        title: Recommendation and Risk Rating
        blocks:
          - type: paragraph
            body: >
              Recommendation: Qualified Buy at Series D entry price ($2.45 billion post-money), with strong preference
              for any secondary opportunity priced below $2.0 billion post-money.

              Confidence: MEDIUM. The investment case is fundamentally sound — market growth, product defensibility, and
              management quality are all positive — but the valuation leaves limited margin of safety. The absence of
              audited financial disclosures prevents a high-confidence assessment of gross margin, Rule-of-40, and burn
              efficiency, all of which are critical to underwriting the 8–12× ARR multiple.

              Risk Rating: MODERATE-HIGH. The key risks are valuation multiple compression (60% probability of 10–20%
              multiple decline over four years), competitive disruption from Drata and hyperscalers (25% probability),
              and execution risk in platform expansion beyond compliance automation (30% probability).

              Target return/hold/exit: 2.5–4.0× invested capital over a 4–5 year horizon, assuming base-case IPO or
              strategic exit at $3.5–5.0 billion. Exit preference: IPO if Vanta achieves Rule-of-40 greater than 50 and
              ARR greater than $500 million by 2028; strategic sale if growth decelerates or market multiples remain
              suppressed.

              Valuation stance: FAIR VALUE at $2.45 billion. This is a quality asset at a full price. The investment
              thesis is not broken, but the margin of safety is narrow. Entry below $2.0 billion transforms the
              risk/return profile significantly and is the strongly preferred scenario. At current implied ARR multiple
              of approximately 8.2×, the price reflects market-consensus quality premium but not yet a bargain. The
              investor entering at Series D carries the full risk of deceleration without a valuation buffer.
            claimRefs:
              - CV001
              - CV002
              - CV004
              - CV028
