      - number: '3.2'
        title: Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Drata is Vanta's most proximate competitor. Founded in 2020 by former HUMAN Security executives, Drata
              reported approximately $100–130M ARR in late 2025 and has raised roughly $328M (Series C at $2B valuation,
              2022). Its platform emphasizes CCM—monitoring 200+ integrations with more than 1,200 automated hourly
              tests—and has built an integrated Trust Center (partially through its 2023 Safebase acquisition). Drata
              targets the same SMB-to-mid-market buyer as Vanta, though its narrower integration count (170+ vs. Vanta's
              400+) and historically smaller customer base (~4,000–5,000 customers vs. Vanta's 16,000+) reflect a slower
              early ramp offset by tighter enterprise depth. Drata's pricing follows a per-framework subscription model,
              which users report can be cheaper than Vanta's modular approach for single-framework needs but more
              expensive for multi-framework programs.


              Secureframe, founded 2020, has raised approximately $79M through a Series B led by Kleiner Perkins (2022).
              The platform covers 30+ frameworks and roughly 150+ integrations, targeting early-stage startups and
              mid-size companies. Its key differentiator is dedicated compliance specialists embedded in the platform
              experience, reducing customer time-to-audit. Scale is meaningfully smaller than Vanta or Drata; analyst
              estimates place ARR below $30M.


              Sprinto, founded 2019 in Bengaluru, has grown to 3,000+ customers across 50+ countries on the back of
              transparent pricing and deep automation for cloud-native companies. With 300+ integrations and 200+
              framework coverage, Sprinto has matched or exceeded Drata on framework count while marketing lower and
              more predictable pricing. A Series B closed in 2023. The platform's "Autonomous Trust Platform" messaging
              closely mirrors Vanta's AI-agent narrative, signaling convergence of positioning.


              AuditBoard, founded 2014 and later rebranded to Optro following its AI-powered GRC pivot, serves 50%+ of
              the Fortune 500 in audit, risk, and compliance. Unlike Vanta, Optro targets internal audit teams and large
              enterprises needing SOX IT compliance, ESG tracking, and integrated risk management. It was acquired by Hg
              Capital in 2023 for approximately $3B. Its scope, price point, and enterprise implementation complexity
              position it as a complement-and-upgrade path for Vanta's largest customers, not a head-on competitor for
              startup buyers.


              OneTrust, valued at $4.5B as of 2023 following $1B in fundraising, leads the privacy and data governance
              sector with 14,000+ customers globally. Its GRC module is the most comprehensive platform for
              organizations where data-privacy regulation (GDPR, CCPA, DORA) is the primary driver. Pricing and
              implementation complexity are higher than Vanta, making it a poor fit for the Vanta core buyer (Series B–D
              tech startups) but a natural expansion target for Vanta's enterprise segment.


              Hyperproof, funded by Madrona Venture Group and others, targets mid-market compliance teams with a FedRAMP
              Moderate authorized environment, making it the strongest competitor for Vanta's FedRAMP-pilot initiative.
              Its AI-powered evidence mapping and control automation overlap directly with Vanta's product roadmap.
