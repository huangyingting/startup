      - number: '5.4'
        title: Trust, Security, and Compliance Posture
        blocks:
          - type: paragraph
            body: >
              Vanta's own security and compliance posture is a critical credibility signal for a company that sells
              compliance automation: customers reasonably expect the platform they trust with their evidence data to
              operate at a high security bar. Vanta holds SOC 2 Type II, ISO 27001, HIPAA, GDPR, and PCI-DSS Level 1
              certifications — a comprehensive set that covers the primary frameworks its customers are trying to
              achieve. These certifications are independently audited by accredited third-party firms and are visible
              via Vanta's own Trust Center, creating a self-referential proof point. Data at rest is encrypted with
              AES-256; data in transit uses TLS 1.2 or higher. Role-based access control (RBAC) is enforced throughout
              the application, and SSO/SAML integration is supported for enterprise customers requiring identity
              federation with their existing identity providers (Okta, Azure AD, Google Workspace, etc.).

              Vanta undergoes annual penetration testing conducted by a third-party security firm, and penetration test
              results summaries are shared with customers through the Trust Center under NDA. The platform's
              vulnerability management program follows a formal remediation SLA, with critical vulnerabilities addressed
              within 24 hours and high-severity issues addressed within 72 hours per Vanta's published security
              policies. G2 reviewers broadly confirm confidence in Vanta's security practices, with only isolated
              mentions of data handling concerns in a small minority of reviews. The most common product-quality
              complaint on G2 relates to pricing opacity and unexpected cost increases, rather than security failures —
              a positioning strength.

              The primary trust-layer diligence ask is a review of the current SOC 2 Type II report (Bridge Letter for
              the period between most recent audit and diligence date), confirmation that the auditor network is
              AICPA-accredited, and a review of Vanta's vendor subprocessor list to understand data handling across the
              AI providers used in Riskey and questionnaire automation. The use of LLM providers for AI features raises
              a secondary privacy question: does customer compliance evidence data flow through external LLM inference
              endpoints, and if so, under what data processing agreements? This question is not fully answered in public
              documentation and represents a material diligence ask for regulated-industry customers handling PHI or PCI
              data.
