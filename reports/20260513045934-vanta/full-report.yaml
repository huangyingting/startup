        title: Adverse Events and Key-Person Risk
        blocks:
          - type: paragraph
            body: >
              The primary adverse event on record is a product bug in May 2024 that briefly exposed data belonging to
              several hundred Vanta customers to other customers. CEO Cacioppo publicly disclosed the incident on
              LinkedIn, described remediation steps, and stated the issue was fully resolved. The incident was not
              reported as triggering regulatory action or material customer churn. Co-founder Erik Goldman's departure
              from the company was not publicly explained, creating mild key-person and co-founder alignment uncertainty
              in historical record. Vanta is heavily key-person-dependent on Christina Cacioppo, who is the primary
              fundraiser, external representative, and vision holder. An estimated NPS of 10 (40% promoters, 30%
              passives, 30% detractors per Comparably) and G2 rating of 4.6/5 (2,400+ reviews) reflect a mix of strong
              satisfaction and some dissatisfaction, primarily around enterprise risk management feature maturity,
              pricing flexibility for small firms, and UI complexity. A competitor analysis by Drata highlights Vanta's
              relatively higher cost-per-framework versus alternatives and questionnaire automation caps. No regulatory
              actions, lawsuits, or material compliance failures against Vanta itself have been identified in available
