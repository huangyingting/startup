      - number: '4.5'
        title: Capital Adequacy and Runway
        blocks:
          - type: paragraph
            body: >
              Vanta's capital position is strong by any private-market benchmark. The company has raised approximately
              $504M in total equity across five rounds (Seed $3M in 2018, Series A $50M in 2021, Series B $150M in 2022,
              Series C $150M in July 2024, and Series D $150M in July 2025). The funding chronology is covered in detail
              in Chapter 1 (Company Overview); this section focuses on forward capital adequacy for the Financials
              underwriting.

              The Series D closed at a $4.15B post-money valuation with Wellington Management leading, joined by
              Sequoia, Craft Ventures, Goldman Sachs, J.P. Morgan, and Y Combinator. Wellington explicitly stated its
              strategy to partner with next-generation public companies, positioning Vanta as an IPO candidate. CEO
              Christina Cacioppo noted publicly that the company had not used the majority of its Series C before the
              Series D closed — a strong capital-efficiency signal that suggests organic ARR growth has been funding
              much of the operating cost base. Based on this comment and standard Series D deployment patterns,
              estimated cash on hand post-Series D exceeds $200M.

              At an estimated monthly burn of $8M–$15M (inferred from headcount growth trajectory, cloud infrastructure
              costs, and SaaS benchmarks for companies at this stage), estimated runway from the Series D close (July
              2025) is 18–36 months — implying a next-round trigger window of approximately late 2026 to mid-2027 if
              Vanta approaches a $200M minimum-cash threshold. However, at 63% revenue growth and $300M ARR, the company
              is approaching a potential self-funding threshold at scale if margins improve on schedule. No debt
              facility, project finance, or credit line has been publicly announced. Series E timing is not disclosed.
              Vanta is not reported to be under capital stress by any source.
