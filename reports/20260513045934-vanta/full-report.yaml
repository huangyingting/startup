      - number: '6.5'
        title: Expansion Dynamics, Concentration Risk, and Land-and-Expand Model
        blocks:
          - type: paragraph
            body: >
              Vanta's land-and-expand model operates through two primary expansion vectors: framework expansion (adding
              ISO 27001, HIPAA, PCI-DSS, or GDPR to an initial SOC 2 program) and module expansion (adding TPRM,
              Questionnaire Automation, Privacy, Access Reviews, or AI Governance to the compliance base). The ACV
              growth from approximately $17,000 in April 2025 to $18,750 in April 2026 confirms that expansion revenue
              from the installed base is positive and material—a 10.3% blended ACV increase implies expansion from
              existing customers more than offsets any ACV dilution from onboarding lower-ACV new customers in the same
              period.

              Customer concentration risk is low. With 16,000+ customers and an estimated top-customer ACV below
              $500,000, no single customer likely represents more than 0.5–1.0% of total ARR. This broadly diversified
              base insulates Vanta from single-customer dependency risk that afflicts many enterprise SaaS companies.
              Geographic concentration (70% North America) is a moderate risk for long-term international growth but is
              being mitigated by GDPR-driven European customer adoption and the company's Dublin office expansion.

              SMB churn represents the most material retention risk: Reddit and G2 evidence consistently cite 20–30%
              renewal price increases as a driver of competitive evaluation against Drata, particularly for
              cost-sensitive startups that have completed their first audit and are evaluating renewal versus migration.
              The compliance stickiness effect—evidence history, integrated tools, and auditor relationships built
              during certification—provides a meaningful switching-cost barrier but does not fully eliminate price
              sensitivity. Emerging partner channel relationships with Deloitte, KPMG, and PwC are expected to improve
              enterprise customer quality and reduce SMB-driven churn concentration over time. The expansion risk table
              (TU005) enumerates risk dimensions, mitigants, and priority diligence asks for each.
