      - number: '1.2'
        title: Leadership, Board, and Governance
        blocks:
          - type: paragraph
            body: >
              Vanta's executive team is led by CEO Christina Cacioppo, who co-founded the company at age 28 after prior
              roles at Dropbox (product management on Dropbox Paper) and Union Square Ventures (venture capital).
              Cacioppo, an Ohio native and Stanford economics/engineering graduate, holds an estimated equity stake
              worth approximately $830 million as of July 2025 following the Series D closing. The leadership team has
              depth across major SaaS functions: Stevie Case (CRO, formerly VP Mid-Market at Twilio), Scott Holden (CMO,
              formerly Brex and ThoughtSpot), David Eckstein (CFO, formerly Menlo Security), Jadee Hanson (CISO,
              formerly Code42), and Jeremy Epling (CPO, the key product executive driving Vanta's agentic trust
              strategy). Ari Shahdadi serves as Head of Operations and Business Development. Key-person concentration
              risk exists at the CEO level; Cacioppo is the primary external face, major fundraising architect, and
              product vision holder. The board includes Andrew Reed of Sequoia Capital as a confirmed member. Series D
              lead Wellington Management's Matt Witheiler is a key strategic investor described by Cacioppo as a
              long-term partner, though his formal board role has not been publicly confirmed. The company is
              remote-first with employees across the US, UK, and Australia. Co-founder Erik Goldman is no longer
              involved; his departure was not accompanied by public controversy.
