      - number: '5.3'
        title: Technology Infrastructure and Integration Ecosystem
        blocks:
          - type: paragraph
            body: >
              Vanta's technology stack is designed around a continuous-evidence paradigm: rather than collecting
              compliance artifacts at audit time, the platform polls integrated systems on a regular cadence (typically
              every 24 hours or near-real-time via webhooks) and stores immutable evidence records in a purpose-built
              evidence repository. The integration layer is the largest moat in Vanta's technology stack — with 400+
              pre-built connectors as of 2025–2026, including AWS, GCP, Azure, GitHub, GitLab, Okta, Azure AD,
              Salesforce, Jira, Slack, CrowdStrike, Carbon Black, Jamf, and Google Workspace. Each connector is
              maintained by Vanta's engineering team and updated when third-party APIs change, shifting the API
              maintenance burden from the customer to the platform.

              The REST API documented at developer.vanta.com and a webhook system allow customers and partners to
              programmatically interact with Vanta — querying compliance status, triggering evidence collection, and
              integrating Vanta data into internal dashboards or GRC tooling. The developer portal also includes SDKs
              and integration guides for building custom connectors. G2 reviewers note that API completeness is a known
              gap relative to the UI feature set, suggesting the API lags behind the product surface area in some areas.
              Vanta's GitHub organization (github.com/ VantaInc) includes open-source integration libraries and sample
              integrations, providing a developer-signal that the ecosystem is actively maintained. The platform's
              primary infrastructure dependency is AWS; a regional AWS outage could affect service availability.
              Third-party SaaS API availability from integrated tools (Okta, GitHub, Salesforce, etc.) is a secondary
              dependency: if a connected tool's API is degraded, evidence collection for that tool pauses until
              restored. LLM/AI provider availability is a third dependency for questionnaire automation and Riskey AI
              agent functionality. Vanta's status page at status.vanta.com shows historical uptime above 99.9% since
              2023, and the company publishes real-time incident status for its infrastructure components. Dependency
              concentration on AWS is partially mitigated by Vanta's own SOC 2 Type II and ISO 27001 certifications,
              which mandate formal business continuity and disaster recovery controls.
