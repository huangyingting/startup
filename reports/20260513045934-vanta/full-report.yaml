      - number: '1.3'
        title: Funding History and Investor Base
        blocks:
          - type: paragraph
            body: >
              Vanta's funding history reflects a rapid valuation trajectory from seed to near-unicorn and beyond. The
              company started with a $3M seed round from Y Combinator and Pear VC in April 2018 following YC
              participation. A $50M Series A in May 2021 led by Sequoia Capital valued the company at approximately
              $500M. The $110M Series B in June 2022 led by Craft Ventures, with CrowdStrike leading a $40M extension in
              October 2022, reached a $1.6B valuation — establishing Vanta as a unicorn. The $150M Series C in July 2024
              led by Sequoia Capital valued the company at $2.45B, with Goldman Sachs, J.P. Morgan, Atlassian Ventures,
              CrowdStrike Ventures, HubSpot Ventures, Workday Ventures, and Y Combinator also participating. The $150M
              Series D in July 2025 led by Wellington Management brought the valuation to $4.15B — nearly doubling in
              one year. Total capital raised is approximately $504M. Notably, Vanta had not used the majority of its
              prior Series C capital when it raised the Series D, indicating strong cash efficiency; Wellington's
              Witheiler confirmed Vanta had not yet touched the $150M raised in the Series C before raising again. The
              investor base spans seed-stage (YC, Pear VC), traditional venture (Sequoia, Craft Ventures), strategic
              corporates (CrowdStrike, Atlassian, HubSpot, Workday), bulge-bracket asset managers (Goldman Sachs
              Alternatives, J.P. Morgan, Wellington Management), and consumer-facing strategics (Y Combinator alumni
              network). Wellington's stated thesis is to partner with the next generation of public companies in the
              private market.
