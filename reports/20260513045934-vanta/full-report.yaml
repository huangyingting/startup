  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Platform Architecture and Product Suite
        blocks:
          - type: paragraph
            body: >
              Vanta's platform is structured as a multi-module SaaS application hosted entirely on Amazon Web Services,
              with no on-premises or hybrid-cloud deployment option. The architectural decision to remain cloud-only has
              enabled Vanta to iterate rapidly and maintain a lean operational footprint, but it also constrains
              adoption in air-gapped government environments and jurisdictions with strict data-residency mandates. The
              platform is divided into six functional layers: a presentation layer (Trust Center portal, compliance
              dashboard, PDF audit reports), an application layer (compliance automation, evidence management, GRC,
              TPRM, questionnaire and privacy automation, access reviews), an AI and intelligence layer (Riskey AI agent
              for risk, questionnaire autofill AI, AI governance templates), an integration layer (400+ native
              connectors plus REST API), a data and evidence store (immutable evidence repository, policy bank, vendor
              questionnaire database), and underlying AWS infrastructure with 99.9%+ historical uptime.

              The product module catalog has expanded substantially since Vanta's 2018 founding. The ten current modules
              cover the full compliance lifecycle: (1) Core Compliance Automation — the original product, automating
              evidence collection across 35+ frameworks with continuous monitoring; (2) Trust Center — a customer-facing
              public and NDA-gated portal for sharing certifications and security posture with prospects; (3) GRC/Risk
              Management — risk register, treatment plans, risk scoring, and the Riskey AI agent; (4) TPRM/Vendor Risk —
              vendor questionnaire automation, risk scoring, and continuous vendor monitoring; (5) Questionnaire
              Automation — AI-powered completion of inbound security questionnaires from prospects; (6) Privacy
              Automation — GDPR/CCPA data flow mapping, DSAR management, and DPIA workflows; (7) Access Reviews —
              automated periodic access certification integrated with identity tools; (8) AI Governance — ISO 42001 and
              NIST AI RMF framework templates; (9) Pen Testing — coordination via a curated partner network; (10)
              Continuous Monitoring — real-time evidence collection and control-drift alerting. Modules beyond core
              compliance and Trust Center are sold as add-ons, with per-module annual pricing not publicly disclosed.
              The breadth of this module set positions Vanta as a platform rather than a point-solution, increasing
              switching costs and wallet-share opportunity per customer.
