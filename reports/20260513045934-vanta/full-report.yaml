  - id: FE003
    title: Critical dependency map
    type: dag
    layout: standard
    summary: >
      Vanta's platform depends on a set of external nodes that each introduce failure or disruption risk. AWS cloud
      infrastructure is the foundational dependency — a regional outage would affect all Vanta services. Third-party
      SaaS APIs (Okta, GitHub, Salesforce, etc.) are the second critical dependency: if a connected tool's API degrades,
      evidence collection for affected controls pauses. LLM/AI providers power Riskey and questionnaire automation —
      provider outages or policy changes could disable AI features. Compliance framework bodies (AICPA, ISO, NIST)
      define the control requirements Vanta maps to — framework updates require Vanta engineering effort. The accredited
      auditor network is a soft dependency: without auditors willing to use Vanta's workspace, the audit facilitation
      value proposition is reduced. All these external dependencies flow through Vanta's compliance engine, which in
      turn powers the Trust Center and each customer's security posture outputs. The DAG illustrates that AWS and
      third-party API risks are the most direct threats to platform availability, while LLM provider and framework body
      dependencies affect specific feature sets rather than core availability.
    data:
      nodes:
        - id: d1
