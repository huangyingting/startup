      - number: '1.4'
        title: Scale Metrics and Financial Highlights
        blocks:
          - type: paragraph
            body: >
              Vanta's revenue trajectory is exceptional for a private SaaS company. The company grew from $10M ARR to
              $100M in two years, then to $200M in 15 months, and crossed $300M just nine months later (April 2026).
              This compounding growth rate — each phase faster than the last — is among the fastest revenue ramp in the
              GRC software category. The company grew ARR 63% year-over-year as of April 2026, tripling from $100M in
              2024. The Vanta Agent daily users grew 253% in the three quarters following its launch. Customer count
              grew from approximately 7,000 in FY2024 to 12,000+ by July 2025, 14,000+ at end of 2025, and 16,000+ by
              April 2026 — more than doubling in approximately two years. Implied ARR per customer increased from
              roughly $17K in mid-2025 to approximately $19K by April 2026, reflecting both new customer adds and higher
              ACVs from multi-module adoption. Revenue efficiency is strong: Vanta had not yet spent the majority of its
              Series C by the time it raised its Series D. Revenue per employee is estimated at approximately
              $208K–$300K, well above category benchmarks. Headcount is estimated at 1,000+ employees across the US, UK,
              and Australia; Vanta is remote-first. The company has not disclosed gross margin or EBITDA figures; these
              are standard blind spots for private-stage SaaS companies. Vanta's closest public comparables include
              Workiva ($739M revenue, $4.16B market cap) and OneTrust ($400M ARR est., $4.5B valuation).
            claimRefs:
