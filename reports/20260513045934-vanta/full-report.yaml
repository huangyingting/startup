      - number: '4.6'
        title: Financial Verdict
        blocks:
          - type: paragraph
            body: >
              Revenue quality is high by the metrics available. A $300M ARR base growing at 63% YoY with annual
              contracts, a 16,000+ customer count, and demonstrable ACV expansion from $17K to $19K over nine months
              produces a compelling public-facing narrative. The nine-month $200M-to-$300M sprint is the clearest
              evidence that Vanta has moved beyond mid-market to enterprise-scale velocity, and the ACV expansion signal
              suggests the land-and-expand model is executing well.

              The margin path is the primary underwriting uncertainty. Without gross margin disclosure, the $4.15B
              Series D valuation — implying roughly 16.6× trailing ARR — cannot be fully justified on a unit-economics
              basis. At 70% gross margin (conservative end of the estimated range), Vanta's gross profit pool is
              approximately $210M annually — an adequate foundation for a path to profitability. At 80% gross margin
              (optimistic), the implied $240M gross profit pool supports a faster breakeven trajectory. However, S&M and
              R&D spend at typical growth-SaaS rates imply a significant operating loss — likely $60M–$120M per year at
              current scale — before leverage improves.

              Capital intensity is low relative to the revenue base: no hardware, no manufacturing, no significant
              working capital cycle. The primary capital deployment risk is headcount-driven burn if growth slows before
              efficiency improves. The Series D provides an estimated 18–36 months of operating runway, sufficient to
              reach the next revenue milestone ($400M+) at current growth rates, but not to reach profitability without
              significant margin improvement.

              The key financial diligence blockers before underwriting at the Series D implied valuation are: (1)
              audited gross margin schedule confirming 70%+ gross margins; (2) net revenue retention confirming NRR
              above 120% with gross dollar retention above 90%; (3) CAC by channel and segment confirming payback under
              24 months; and (4) operating loss trajectory confirming a credible path to cash-flow break-even within 3–4
              years of the Series D.
