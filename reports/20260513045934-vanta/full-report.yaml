      - number: '8.4'
        title: Bull, Base, and Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              Three scenarios are modelled over a four-year horizon (2026–2030), each with explicit ARR, growth rate,
              exit multiple, and probability-weighted valuation assumptions.

              The bull case ($5.5–6.0 billion exit) assumes Vanta sustains 40–50% ARR CAGR, reaching $800–900 million in
              ARR by 2029, driven by platform expansion into TPRM and risk orchestration. An IPO at 12–15× ARR at this
              scale implies enterprise value of $9.6–13.5 billion. After full dilution and preference liquidation,
              returns to Series D investors at $2.45 billion entry are 4–5× on a base recovery. Probability: 20%.

              The base case ($3.5–4.5 billion exit) assumes 30–35% ARR CAGR, reaching $500–600 million ARR by 2028–2029.
              A strategic acquisition or IPO at 7–9× ARR implies $3.5–5.4 billion exit value. After preference stack,
              common-equity holders receive 2–3× on Series D price. Probability: 55%.

              The bear case ($1.5–2.0 billion exit) assumes ARR growth decelerates to 15–20% amid competitive pressure,
              reaching $350–400 million ARR by 2029 with compressed margins. A distressed strategic sale or late-stage
              down-round at 4–5× ARR implies $1.4–2.0 billion enterprise value. Preferred holders may not be made whole;
              common equity is impaired. Probability: 25%.

              The probability-weighted expected exit value is approximately $3.9 billion, yielding an expected return of
              approximately 1.4–1.6× at Series D entry — barely above the preferred liquidity floor. This reinforces the
              entry discipline message: the asymmetric scenario requires pricing well below $2.45 billion. The valuation
              sensitivity chart shows how modestly improving the exit multiple or CAGR assumptions materially improves
              the expected outcome, illustrating the leverage available from entry discipline.
            claimRefs:
              - CV012
              - CV013
              - CV014
              - CV015
              - CV016
              - CV038
          - type: table
            tableRef: TV003
            claimRefs:
              - CV012
              - CV013
              - CV014
              - CV015
          - type: figure
            figureRef: FV002
