  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams and Pricing Model
        blocks:
          - type: paragraph
            body: >
              Vanta's revenue is generated entirely through annual subscription contracts, making it a pure
              recurring-revenue SaaS business. Customers pay in advance for annual access to the compliance automation
              platform, and revenue is recognized ratably over the contract term. The foundational revenue driver is
              per-framework licensing: customers subscribe to one or more compliance frameworks (SOC 2, ISO 27001,
              HIPAA, PCI DSS, GDPR, and 30+ others) and the per-framework fee scales with employee count. This creates a
              natural land-and-expand dynamic: early-stage companies typically enter at a single framework (often SOC 2
              in response to an enterprise customer requirement), and then add frameworks as their compliance programs
              mature.

              Beyond the core framework subscription, Vanta generates incremental revenue through a growing set of
              add-on modules. Currently monetized add-ons include Trust Center (a customer-facing compliance portal),
              TPRM/VRM (third-party and vendor risk management), Questionnaire Automation (AI-assisted security
              questionnaire response), Privacy Automation (GDPR/CCPA workflow automation), and AI Governance (ISO 42001
              and EU AI Act readiness). Each add-on is priced separately, with list pricing undisclosed, and creates
              incremental ACV uplift per renewal cycle.

              Customer count grew from approximately 12,000 (mid-2025) to 16,000+ (April 2026), a roughly 33% increase
              in accounts. Over the same period, ARR grew 63% (from approximately $200M to $300M+), which implies that
              average ACV expanded by approximately 22–25% — a strong signal of land-and-expand execution. Implied
              average ACV of approximately $19K per customer (April 2026) is consistent with Vendr's reported median
              subscriber spend of $19,800 per year. Revenue recognition issues are minimal in a pure SaaS model with
              annual prepayment; there is no variable usage, milestone, or professional-services revenue of material
              scale publicly reported.
