  - id: FE002
    title: Customer workflow / operating flow
    type: flow
    layout: standard
    summary: >
      This flow traces the end-to-end customer journey on Vanta's platform from initial integration setup through
      continuous compliance operations. The workflow is designed to be self-service for SMB and mid-market customers:
      connecting integrations and selecting frameworks requires no professional services. Evidence collection, gap
      identification, and audit facilitation are automated by the platform. The Trust Center publishing step at the end
      of the first certification cycle creates a self-reinforcing loop — published certifications attract more
      enterprise prospects, generating demand for additional frameworks and modules. Continuous monitoring ensures the
      compliance program stays active between audit cycles, catching control drift before it causes audit failures. The
      seven-node flow covers the complete compliance lifecycle from onboarding to ongoing trust management.
    data:
      nodes:
        - id: n1
          label: Connect integrations
          detail: >-
            Customer connects cloud infrastructure (AWS, GCP, Azure), identity (Okta, Azure AD), code (GitHub, GitLab),
            endpoint, and SaaS tools via 400+ pre-built connectors; typical setup time 1–4 hours
        - id: n2
          label: Select compliance frameworks
          detail: >-
            Choose from 35+ frameworks: SOC 2, ISO 27001, HIPAA, PCI-DSS, GDPR, NIST CSF, custom; Vanta maps connected
            tool evidence to framework-specific controls
        - id: n3
          label: Automated evidence collection
