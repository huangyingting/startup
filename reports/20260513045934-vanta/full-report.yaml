              a distribution amplifier: compliance triggers surface within tools customers already use. The Vanta
              marketplace and partner-qualified auditor network (200+ auditors) create bilateral lock-in that is
              difficult for newer entrants to replicate quickly. Drata has made progress replicating the auditor network
