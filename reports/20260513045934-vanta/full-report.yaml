  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, Mission, and Business Model
        blocks:
          - type: paragraph
            body: >
              Vanta was founded in 2018 by Christina Cacioppo (CEO) and Erik Goldman in San Francisco with the mission
              to help businesses earn and prove trust. Goldman departed the company early; Cacioppo has led Vanta to
              scale. The company describes itself as "the leading Agentic Trust Platform," setting the standard for how
              businesses earn and prove trust as AI reshapes security and compliance. Vanta is incorporated as a private
              Delaware corporation headquartered in San Francisco, with additional offices in Dublin (Ireland), New
              York, and Sydney (Australia), making it a multi-region operation serving customers globally. The business
              model is subscription SaaS: customers pay annual fees ranging from approximately $10,000 per year for
              early-stage startups to $80,000–$120,000+ per year for enterprise accounts. Revenue is generated from
              platform access across compliance frameworks (SOC 2, ISO 27001, HIPAA, GDPR, PCI DSS, FedRAMP, and 30+
              others), add-on modules (Trust Center, questionnaire automation, vendor risk management), and customer
              headcount tiers. Three pricing tiers (Core/Essentials, Growth/Plus, Scale/Enterprise) allow Vanta to
              address the full market from early-stage startups to large enterprises. As of April 2026, Vanta has
              surpassed $300M in ARR, growing 63% year-over-year and tripling from approximately $100M in 2024. The
              company supports 16,000+ organizations globally, ranging from AI startups like Harvey, Cursor, and Lovable
              to large enterprises including Atlassian, Snowflake, GitHub, Samsara, Ramp, and the Golden State Warriors.
              60% of the Forbes AI 50 companies are Vanta customers, with a combined market cap of $560 billion.
