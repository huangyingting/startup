  - id: product-roadmap-development-velocity
    title: Product Roadmap and Development Velocity
    body: >
      Vanta's release cadence since 2022 reflects a two-track development strategy: a foundation
      track that rapidly expanded the integration library from approximately 200 to 400+ connectors
      between 2022 and 2024, and a module-expansion track that added new revenue-generating add-on
      modules in each half-year period from 2023 onwards. The foundation track has slowed as the
      connector library has reached broad coverage of the enterprise SaaS stack; incremental connector
      additions now focus on niche tools, legacy systems, and vertical-specific platforms rather than
      high-volume mainstream integrations. The module-expansion track shows no signs of slowing, with
      new modules for AI Governance, access reviews, and privacy automation all generally available
      in the past two years and AI Agents reaching GA in March 2026.

      The March 2026 GA launch of AI Agents for compliance workflows, combined with the enterprise
      controls expansion announced in the same BusinessWire release, signals a deliberate pivot toward
      upmarket enterprise buyers. This is consistent with the ACV expansion from ~$17K to ~$19K
      observed between July 2025 and April 2026 — driven by both add-on attach rates and higher-ACV
      enterprise deals. The Riskey AI agent launch in September 2025 marked Vanta's first autonomous
      AI agent in the platform, representing a qualitative jump from workflow automation to
      judgment-replacement AI. Looking forward, Vanta has not publicly disclosed a specific product
      roadmap beyond general AI expansion and enterprise controls, but job postings and product page
      updates suggest continued investment in GRC module depth, expanded enterprise access controls,
      and deeper privacy automation for DORA and EU AI Act compliance. The primary roadmap risk is
      AI model quality and enterprise trust: if AI-generated compliance artifacts are found to contain
      material errors in live audit environments, reputational damage could slow AI feature adoption
      and require Vanta to add expensive human-review layers that would increase COGS and reduce
      automation value. This AI quality risk is the most significant technical risk on the roadmap
      through 2027.
