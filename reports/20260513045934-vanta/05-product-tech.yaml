  - id: customer-workflows-use-cases
    title: Customer Workflows and Use Cases
    body: >
      Vanta's customer workflow begins at integration: a new customer connects their cloud, identity,
      code, and endpoint tools via Vanta's 400+ native connectors. Once integrations are live, Vanta
      continuously pulls evidence from those tools in real time, eliminating the spreadsheet-and-
      screenshot evidence collection process that previously dominated audit preparation cycles. The
      customer then selects the compliance frameworks they need — SOC 2, ISO 27001, HIPAA, PCI-DSS,
      GDPR, NIST CSF, or custom — and Vanta maps the collected evidence to the relevant controls for
      each framework. A dashboard highlights failing or incomplete controls with remediation guidance,
      prioritizing the actions most likely to unblock certification. When ready for audit, customers
      use Vanta's auditor workspace, which provides auditors time-boxed access to evidence packages,
      reducing the back-and-forth of a traditional audit by weeks. Post-certification, the Trust Center
      publishes the company's certifications and security posture to prospects, often eliminating the
      need for manual security questionnaire exchanges entirely.

      Customer use cases segment strongly by company size and vertical. SMBs with fewer than 100
      employees typically enter Vanta to achieve their first SOC 2 Type II certification in response to
      an enterprise customer requirement, completing the process in as little as three to six months
      with minimal dedicated IT staff. Mid-market companies (100–1,000 employees) use Vanta for
      multi-framework compliance programs, board-level risk reporting, and vendor risk management.
      Enterprise customers (1,000+ employees) deploy Vanta for complex multi-framework environments
      with custom controls, global privacy programs, and access review automation across large
      workforces. Developer-tools and SaaS companies leverage the Trust Center as a direct sales
      enablement tool — publishing certifications to shorten enterprise sales cycles by removing
      security review bottlenecks. Healthcare SaaS companies combine HIPAA and SOC 2 workflows within
      a single platform. Fintech companies manage PCI-DSS and SOC 2 simultaneously. AI/ML companies
      are an emerging high-growth segment using Vanta's AI Governance templates for ISO 42001 and
      NIST AI RMF compliance in response to regulatory pressure from the EU AI Act. The breadth of
      supported use cases across all these segments is a material competitive strength.
