figures:
  - id: FE001
    title: "Product architecture map"
    type: stack
    layout: standard
    summary: >
      Vanta's platform architecture is organized as a six-layer stack from presentation through
      infrastructure. The presentation layer surfaces compliance status to customers, auditors, and
      prospects through the Trust Center, compliance dashboard, and report exports. The application
      layer hosts the core compliance automation engine and all add-on modules (GRC, TPRM,
      questionnaire automation, privacy, access reviews). The AI and intelligence layer powers the
      Riskey agent, questionnaire autofill, and compliance AI agents. The integration layer (400+
      connectors plus REST API) is the primary moat, providing continuous evidence collection from
      the enterprise SaaS stack. The data and evidence store maintains the immutable compliance record.
      AWS infrastructure provides compute, storage, and network — with 99.9%+ historical uptime and
      Vanta's own SOC 2 Type II and ISO 27001 certifications applying to the full stack.
    data:
      layers:
        - label: "Presentation layer"
          detail: "Trust Center (public and NDA-gated security portal), compliance dashboard, PDF audit reports, risk posture view, board reporting templates, auditor workspace"
        - label: "Application layer"
          detail: "Compliance automation engine (35+ frameworks), evidence management, GRC/risk module, TPRM, questionnaire automation, privacy automation, access reviews, AI governance templates"
        - label: "AI & intelligence layer"
          detail: "Riskey AI agent (risk assessment, September 2025), questionnaire autofill AI (2024), AI Agents for compliance workflows (GA March 2026), AI governance framework templates"
        - label: "Integration layer"
          detail: "400+ native connectors: AWS, GCP, Azure, GitHub, GitLab, Okta, Azure AD, Salesforce, Jira, Slack, CrowdStrike, Carbon Black, Jamf, Google Workspace; REST API and webhooks at developer.vanta.com"
        - label: "Data & evidence store"
          detail: "Immutable evidence repository (AES-256 at rest), audit trail, policy bank, vendor questionnaire database, compliance framework control mappings"
        - label: "Infrastructure"
          detail: "Hosted on AWS; SOC 2 Type II and ISO 27001 certified; TLS 1.2+ in transit; 99.9%+ historical uptime (status.vanta.com); cloud-only — no on-premises option"
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005

  - id: FE002
    title: "Customer workflow / operating flow"
    type: flow
    layout: standard
    summary: >
      This flow traces the end-to-end customer journey on Vanta's platform from initial integration
      setup through continuous compliance operations. The workflow is designed to be self-service for
      SMB and mid-market customers: connecting integrations and selecting frameworks requires no
      professional services. Evidence collection, gap identification, and audit facilitation are
      automated by the platform. The Trust Center publishing step at the end of the first certification
      cycle creates a self-reinforcing loop — published certifications attract more enterprise prospects,
      generating demand for additional frameworks and modules. Continuous monitoring ensures the
      compliance program stays active between audit cycles, catching control drift before it causes
      audit failures. The seven-node flow covers the complete compliance lifecycle from onboarding to
      ongoing trust management.
    data:
      nodes:
        - id: n1
          label: "Connect integrations"
          detail: "Customer connects cloud infrastructure (AWS, GCP, Azure), identity (Okta, Azure AD), code (GitHub, GitLab), endpoint, and SaaS tools via 400+ pre-built connectors; typical setup time 1–4 hours"
        - id: n2
          label: "Select compliance frameworks"
          detail: "Choose from 35+ frameworks: SOC 2, ISO 27001, HIPAA, PCI-DSS, GDPR, NIST CSF, custom; Vanta maps connected tool evidence to framework-specific controls"
        - id: n3
          label: "Automated evidence collection"
          detail: "Vanta continuously pulls evidence from connected tools in real time or on scheduled cadence; evidence stored immutably with timestamps; no manual screenshots or spreadsheets required"
        - id: n4
          label: "Gap identification & remediation"
          detail: "Dashboard highlights failing or incomplete controls with prioritized remediation guidance; Riskey AI agent identifies risks and suggests treatments; access reviews and vendor questionnaires surface additional gaps"
        - id: n5
          label: "Audit facilitation"
          detail: "Auditor workspace provides time-boxed, role-specific access to evidence packages; AI agents assist with audit prep tasks; auditor-Vanta collaboration replaces manual document exchange"
        - id: n6
          label: "Trust Center publishing"
          detail: "Company publishes certifications, real-time security posture, and pre-filled questionnaire responses to prospects via public or NDA-gated Trust Center; eliminates manual questionnaire exchange"
        - id: n7
          label: "Continuous monitoring"
          detail: "Real-time and scheduled evidence re-collection; control-drift alerts notify when previously passing controls begin failing; policy-change detection; ongoing vendor risk monitoring via TPRM module"
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010

  - id: FE003
    title: "Critical dependency map"
    type: dag
    layout: standard
    summary: >
      Vanta's platform depends on a set of external nodes that each introduce failure or disruption
      risk. AWS cloud infrastructure is the foundational dependency — a regional outage would affect
      all Vanta services. Third-party SaaS APIs (Okta, GitHub, Salesforce, etc.) are the second
      critical dependency: if a connected tool's API degrades, evidence collection for affected
      controls pauses. LLM/AI providers power Riskey and questionnaire automation — provider
      outages or policy changes could disable AI features. Compliance framework bodies (AICPA, ISO,
      NIST) define the control requirements Vanta maps to — framework updates require Vanta engineering
      effort. The accredited auditor network is a soft dependency: without auditors willing to use
      Vanta's workspace, the audit facilitation value proposition is reduced. All these external
      dependencies flow through Vanta's compliance engine, which in turn powers the Trust Center
      and each customer's security posture outputs. The DAG illustrates that AWS and third-party API
      risks are the most direct threats to platform availability, while LLM provider and framework body
      dependencies affect specific feature sets rather than core availability.
    data:
      nodes:
        - id: d1
          label: "AWS cloud infrastructure"
        - id: d2
          label: "Third-party SaaS APIs (Okta, GitHub, Salesforce, etc.)"
        - id: d3
          label: "LLM / AI providers"
        - id: d4
          label: "Compliance framework bodies (AICPA, ISO, NIST, HIPAA)"
        - id: d5
          label: "Accredited auditor network"
        - id: d6
          label: "Vanta compliance engine"
        - id: d7
          label: "Questionnaire automation AI"
        - id: d8
          label: "Vanta Trust Center"
        - id: d9
          label: "Customer security posture"
      edges:
        - from: d1
          to: d6
        - from: d2
          to: d6
        - from: d3
          to: d7
        - from: d4
          to: d6
        - from: d5
          to: d6
        - from: d6
          to: d8
        - from: d6
          to: d9
        - from: d7
          to: d9
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015

  - id: FE004
    title: "Product maturity / capability map"
    type: matrix
    layout: standard
    summary: >
      This matrix maps each of Vanta's eight primary product modules across four capability dimensions:
      availability (whether the feature is generally available), integration depth (breadth and depth
      of native connector coverage supporting the module), automation level (degree to which manual
      steps are eliminated), and AI enhancement (whether AI augments the module's core workflow).
      The pattern shows that Vanta's foundational compliance automation and access reviews modules
      are the most mature across all dimensions, while AI governance and pen testing coordination
      remain early-stage on integration depth and automation. Questionnaire automation and GRC/risk
      are the two AI-enhanced modules with the highest strategic investment. The matrix reveals
      that most add-on modules are GA but at medium automation levels — suggesting meaningful
      product-depth expansion opportunities remain in the existing module set.
    data:
      columns:
        - "Availability"
        - "Integration depth"
        - "Automation level"
        - "AI-enhanced"
      rows:
        - label: "Compliance automation (SOC 2 / ISO / HIPAA)"
