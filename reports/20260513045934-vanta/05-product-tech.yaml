  - id: ai-capabilities-product-intelligence
    title: AI Capabilities and Product Intelligence
    body: >
      Artificial intelligence has become Vanta's primary product differentiation vector in the
      2024–2026 period, transitioning the platform from workflow automation (replacing manual steps
      with software-driven processes) to intelligence-augmented automation (replacing human judgment
      with AI inference in risk assessment, evidence interpretation, and questionnaire response).
      Three distinct AI capabilities are now generally available or in late beta: (1) Questionnaire
      Automation AI (launched 2024) — uses large language models to automatically draft responses to
      inbound security questionnaires from prospects based on the customer's existing compliance
      evidence and historical questionnaire responses; (2) Riskey AI Agent (launched September 2025)
      — applies AI to the risk management lifecycle, automatically assessing risk severity, suggesting
      treatment plans, and mapping risks to affected controls across the connected evidence base; and
      (3) AI Agents for Compliance Workflows (launched GA in March 2026) — multi-step AI agents that
      can autonomously complete audit-preparation tasks, escalate ambiguous items to human reviewers,
      and maintain a running compliance posture assessment between audit cycles.

      The AI Governance module extends Vanta's AI story to its customers' own AI programs: the module
      provides framework templates for ISO 42001 (AI Management System), NIST AI Risk Management
      Framework, and emerging EU AI Act compliance workflows. This positions Vanta to capture spend
      from AI/ML companies that need to demonstrate responsible AI governance to their own enterprise
      customers. The maturity map in this chapter (FE004) shows that AI capabilities are deployed at
      varying levels of depth across modules: Questionnaire Automation and Riskey GRC have the
      deepest AI integration, while Access Reviews, Pen Testing coordination, and Privacy Automation
      have limited or no AI enhancement as of mid-2026. This uneven distribution reflects both
      product-investment sequencing and the relative complexity of automating those workflows. The
      primary AI risk is model quality variability in questionnaire responses and risk assessments —
      low-confidence AI outputs that are not reviewed by a human before submission could create
      compliance liability for customers. Vanta's current design appears to keep humans in the loop
      for final approvals, but detailed AI governance practices for the product itself (model
      versioning, confidence thresholds, fallback handling) are not publicly documented.
