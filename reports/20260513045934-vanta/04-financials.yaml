figures:
  - id: FI001
    title: Revenue model bridge
    type: flow
    layout: standard
    summary: >
      This flow traces how Vanta converts an initial customer contact into recurring revenue and gross
      profit through its land-and-expand model. Starting with a single-framework entry point, each
      customer moves through continuous monitoring, optional framework expansion, add-on module
      adoption, and annual renewal cycles. The aggregate of these flows — 16,000+ customers at a
      ~$19K average ACV in April 2026 — yields $300M+ ARR with an estimated $210–240M gross profit
      pool at 70–80% gross margins.
    data:
      nodes:
        - id: n1
          label: "Customer signs up (single framework)"
          detail: "Entry point: SOC 2, ISO 27001, HIPAA; ACV $12K–$60K by company size"
        - id: n2
          label: "Continuous monitoring subscription"
          detail: "Annual contract; 400+ integrations; automated evidence collection"
        - id: n3
          label: "Expansion: additional frameworks"
          detail: "Each added framework increases ACV; 3+ frameworks creates lock-in"
        - id: n4
          label: "Expansion: add-on modules"
          detail: "TPRM/VRM, Questionnaire Automation, Privacy, AI Governance; each priced separately"
        - id: n5
          label: "Renewal + upsell cycle"
          detail: "Annual renewal; ACV grew from ~$17K (Jul 2025) to ~$19K (Apr 2026)"
        - id: n6
          label: "Revenue: $300M+ ARR"
          detail: "16,000+ customers × ~$19K avg ACV; 63% YoY growth"
        - id: n7
          label: "Estimated gross profit: ~$210–240M"
          detail: "Inferred 70–80% gross margin; not publicly disclosed"
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005

  - id: FI002
    title: Unit economics bridge
    type: flow
    layout: standard
    summary: >
      This flow maps the unit-economics pathway from lead acquisition through initial ACV, gross margin
      per customer, expansion, and implied NRR. Key values are a mix of public facts (ACV from
      $17K to $19K), inferred estimates (NRR >120%), and SaaS benchmarks (gross margin 70–80%, CAC
      payback 18–24 months). Exact CAC, LTV, and NRR are undisclosed and represent critical
      diligence asks before final underwriting.
    data:
      nodes:
        - id: n1
          label: "Lead acquisition"
          detail: "Inbound via YC network, integration partners (AWS, GitHub, Okta); outbound field sales for enterprise"
        - id: n2
          label: "Sales cycle"
          detail: "SMB: 30–60 days; mid-market: 60–120 days; enterprise: 3–6 months"
        - id: n3
          label: "Initial ACV: $12K–$60K"
          detail: "Varies by employee count, framework count; Vendr median $19,800/yr"
        - id: n4
          label: "Gross margin per customer: ~70–80%"
          detail: "Estimated; not disclosed; cloud infra + CS headcount as primary COGS"
        - id: n5
          label: "Expansion ACV (multi-framework)"
          detail: "Land at single framework; expand to 2–5 frameworks + modules"
        - id: n6
          label: "Implied NRR >120% (est.)"
          detail: "ACV per customer grew $17K→$19K in 9 months = >20% expansion rate"
        - id: n7
          label: "Estimated LTV: $50K–$100K+ per customer"
          detail: "Double estimate: ACV × 3–5yr retention × ~75% gross margin; unconfirmed"
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010

  - id: FI003
    title: Financial estimate range
    type: range
    layout: standard
    summary: >
      This range chart presents the key financial metrics for which only estimated or inferred values
      are available. Each range reflects the uncertainty band around unverified private metrics (gross
      margin, NRR, estimated burn) and calculated public metrics (ARR growth, ACV, ARR multiple). The
      wide bands on gross margin, NRR, and burn rate reflect the absence of audited financial disclosure
      and represent the primary inputs to any valuation model for Vanta at the Series D price.
    data:
      items:
        - label: "Gross margin (est.)"
          low: 65.0
          high: 80.0
          unit: "%"
        - label: "ARR growth FY2026 (YoY)"
          low: 55.0
          high: 70.0
          unit: "%"
        - label: "ARR per customer (ACV, implied)"
          low: 17000.0
          high: 22000.0
          unit: "USD/yr"
        - label: "Series D ARR multiple"
          low: 12.0
          high: 17.0
          unit: "× ARR"
        - label: "Net revenue retention (est.)"
          low: 115.0
          high: 130.0
          unit: "%"
        - label: "Estimated monthly burn (est.)"
          low: 8.0
          high: 15.0
          unit: "$M/mo"
    claimRefs:
