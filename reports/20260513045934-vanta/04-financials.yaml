  - id: public-traction-vs-gaps
    title: Public Traction vs. Private Metric Gaps
    body: >
      Vanta's publicly disclosed financial metrics are limited to top-line ARR and customer count,
      which is standard for a private company at its stage. The company has been unusually transparent
      about its ARR trajectory — disclosing $300M ARR in April 2026 (official announcement), 63% YoY
      growth, and the milestone progression that enabled triangulation of $200M to $300M growth in
      nine months. These metrics allow partial modeling of the business but leave critical
      underwriting inputs undisclosed.

      The most material private-metric gaps are: (1) gross margin — required to assess operating
      leverage and profitability timeline; (2) net revenue retention — required to validate that the
      63% revenue growth is not masking churn-driven erosion at the bottom of the cohort funnel;
      (3) customer acquisition cost and LTV — required to assess unit economics sustainability at
      scale; (4) ARR breakdown by product line — required to determine whether growth is driven by
      core compliance (high-margin, highly recurring) versus professional services or add-on modules
      (lower-margin or one-time). The implied NRR above 120% is inferred from ACV-per-customer growth
      ($17K to $19K over nine months) but is not company-confirmed.

      A secondary gap is ARR by customer segment and cohort age. Without cohort-level data, it is
      impossible to determine whether the 16,000+ customer base carries high gross retention (logo
      and dollar) or whether strong expansion in the enterprise segment masks higher churn at the
      SMB tail. Customer reviews on Comparably and Wolfia note pricing opacity and unexpected cost
      escalation as recurring concerns, suggesting that gross retention in more price-sensitive
      segments may be below the headline NRR figure. This risk is material but unquantifiable from
      public data.
    claimRefs:
      - CI003
      - CI010
      - CI038
      - CI039
    tableRefs:
      - TI005
    figureRefs: []

  - id: capital-adequacy-runway
    title: Capital Adequacy and Runway
    body: >
      Vanta's capital position is strong by any private-market benchmark. The company has raised
      approximately $504M in total equity across five rounds (Seed $3M in 2018, Series A $50M in
      2021, Series B $150M in 2022, Series C $150M in July 2024, and Series D $150M in July 2025).
      The funding chronology is covered in detail in Chapter 1 (Company Overview); this section
      focuses on forward capital adequacy for the Financials underwriting.

      The Series D closed at a $4.15B post-money valuation with Wellington Management leading, joined
      by Sequoia, Craft Ventures, Goldman Sachs, J.P. Morgan, and Y Combinator. Wellington explicitly
      stated its strategy to partner with next-generation public companies, positioning Vanta as an
      IPO candidate. CEO Christina Cacioppo noted publicly that the company had not used the majority
      of its Series C before the Series D closed — a strong capital-efficiency signal that suggests
      organic ARR growth has been funding much of the operating cost base. Based on this comment and
      standard Series D deployment patterns, estimated cash on hand post-Series D exceeds $200M.

      At an estimated monthly burn of $8M–$15M (inferred from headcount growth trajectory, cloud
      infrastructure costs, and SaaS benchmarks for companies at this stage), estimated runway from
      the Series D close (July 2025) is 18–36 months — implying a next-round trigger window of
      approximately late 2026 to mid-2027 if Vanta approaches a $200M minimum-cash threshold.
      However, at 63% revenue growth and $300M ARR, the company is approaching a potential
      self-funding threshold at scale if margins improve on schedule. No debt facility, project
      finance, or credit line has been publicly announced. Series E timing is not disclosed. Vanta
      is not reported to be under capital stress by any source.
