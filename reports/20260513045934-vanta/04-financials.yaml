      - CI012
      - CI013
      - CI014
      - CI015

  - id: FI004
    title: Capital intensity / cash-flow map
    type: flow
    layout: standard
    summary: >
      This flow maps how Vanta's approximately $504M in total equity has been deployed across R&D,
      S&M, G&A, and M&A, with the resulting estimated cash position post-Series D. Vanta's low
      capital intensity (no hardware, no inventory, no manufacturing) means cash burn is entirely
      people-and-go-to-market driven, making headcount discipline the primary lever for extending
      runway. The Riskey acquisition in mid-2025 represents the first disclosed M&A deployment.
    data:
      nodes:
        - id: n1
          label: "Total equity raised: ~$504M"
          detail: "Seed $3M (2018) + Series A $50M (2021) + Series B $150M (2022) + Series C $150M (2024) + Series D $150M (2025)"
        - id: n2
          label: "Working capital use: R&D"
          detail: "Engineering headcount expansion, platform development, Riskey integration; est. ~25–30% ARR"
        - id: n3
          label: "Working capital use: S&M"
          detail: "Sales force growth, partner channel investment, brand; est. ~30–35% ARR"
        - id: n4
          label: "Working capital use: G&A"
          detail: "Legal, compliance, leadership, international expansion; est. ~10–15% ARR"
        - id: n5
          label: "Capital deployment: M&A"
          detail: "Riskey acquisition (2025); amount undisclosed"
        - id: n6
          label: "Cash adequacy"
          detail: "Estimated >$200M cash post-Series D; ~2–3 year runway at current burn rate"
    claimRefs:
