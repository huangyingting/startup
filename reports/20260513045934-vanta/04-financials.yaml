  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: unit-economics-undisclosed
      missingEvidence: "Audited gross margin, net revenue retention (NRR), customer acquisition cost (CAC), and lifetime value (LTV) — the four core unit-economics inputs required for underwriting at the Series D implied valuation of $4.15B. None of these metrics are publicly disclosed by Vanta."
      whyItMatters: "Without gross margin, the gross profit pool is unknown and operating leverage cannot be modeled. Without NRR, the 63% ARR growth cannot be attributed to new customer acquisition versus expansion versus churn masking. Without CAC and LTV, the sustainability of growth investment cannot be assessed. These gaps collectively prevent full underwriting at Series D price."
      diligencePath: "Request the investor quarterly reporting package from Vanta; obtain audited P&L; request NRR by cohort vintage; request CAC and LTV by channel and segment; benchmark against Drata or AuditBoard if those companies file prospectuses prior to a Vanta funding event."
      relatedQuestionRefs: [QI006, QI007, QI008]

    - type: private-evidence-only
      severity: material
      topic: cash-burn-undisclosed
      missingEvidence: "Exact cash on hand, monthly operating burn, and operating loss trajectory are all undisclosed. The estimated >$200M cash position and $8–15M/month burn range are inferred proxies with wide uncertainty bands, not verified balance-sheet figures."
      whyItMatters: "Runway estimation drives Series E timing and capital adequacy risk assessment. If actual burn is at the high end ($15M/mo) with actual cash below $200M, runway could be as short as 13 months from Series D close — materially different from the 2–3 year estimate. Without verified burn, capital risk is underweighted."
      diligencePath: "Request quarterly operating loss schedule from Vanta management; review 409A valuation report for implied burn assumptions; use LinkedIn headcount time series as a proxy for gross burn growth; request banking records or investor reporting at term sheet stage."
      relatedQuestionRefs: [QI012, QI013]

    - type: missing-source
      severity: material
      topic: product-line-arr-breakdown
      missingEvidence: "No public source decomposes Vanta's $300M+ ARR by product line (core compliance frameworks vs. TPRM vs. Questionnaire Automation vs. Privacy Automation vs. AI Governance vs. other). The revenue mix between high-margin recurring core compliance and newer lower-margin add-on modules is unknown."
      whyItMatters: "Revenue mix determines long-run gross margin trajectory. If add-on modules carry meaningfully lower gross margins (due to higher human-in-the-loop costs for TPRM reviews, pen test coordination, or privacy assessments), the blended margin could be below the 70% floor of the estimated range, materially changing the profitability path and IPO readiness timeline."
      diligencePath: "Request ARR waterfall by product line from Vanta investor relations; track product-specific announcements for implied pricing and attach-rate signals; analyze job posting mix (CS vs. compliance specialists vs. engineers) as a proxy for service delivery cost by product line."
      relatedQuestionRefs: [QI023]

    - type: missing-source
      severity: minor
      topic: comparable-company-financials
      missingEvidence: "No comparable-company S-1 or audited financials are publicly available for direct compliance-SaaS gross margin and NRR benchmarking. Drata is private; Secureframe is private; AuditBoard/Optro was taken private by Hg Capital in 2023. The closest public comparables (ServiceNow, Workiva) are enterprise GRC incumbents with different cost structures."
      whyItMatters: "Without a public-market peer set that filed an S-1 with audited unit economics, all gross margin and NRR estimates for Vanta are derived from broad SaaS benchmarks rather than compliance-SaaS-specific data. This creates model error in both directions."
      diligencePath: "Monitor Drata IPO filings or acquisition disclosures for unit-economics benchmarks; request Vanta Series D investor deck which likely contains comparable-company analysis; review any AuditBoard/Optro debt financing disclosures that may include EBITDA or gross margin data."
      relatedQuestionRefs: [QI017]
