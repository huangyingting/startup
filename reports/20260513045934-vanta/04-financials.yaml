  - id: gtm-sales-efficiency
    title: GTM Motion and Sales Efficiency
    body: >
      Vanta's go-to-market motion combines a self-serve entry point for early-stage startups with a
      full-cycle field sales organization targeting mid-market and enterprise accounts. The SMB segment
      (pre-revenue to $10M ARR companies) is primarily driven by inbound demand from the Y Combinator
      network and integration partner referrals; this cohort can deploy within days and purchase with
      minimal sales-cycle friction. Estimated sales cycle for this segment is 30–60 days. The
      mid-market segment (companies with $10M–$100M ARR) requires a consultative sales process, with
      typical cycles of 60–120 days and multi-stakeholder approval involving the CISO, CTO, and CFO.
      Enterprise accounts (Fortune 1000, $100M+ ARR) involve procurement, legal, and security review
      with 3–6 month sales cycles and ACVs that can exceed $100K with full add-on suites.

      Vanta's primary channel amplifiers are its 400+ integration partners (AWS, GitHub, Okta, Datadog,
      Google Cloud, Microsoft Azure, and others), its network of 200+ qualified auditors, and strategic
      corporate investors (Atlassian, CrowdStrike, HubSpot, Workday) who serve as both reference
      customers and channel partners. The integration ecosystem functions as a distribution flywheel:
      compliance triggers surface inside tools customers already use, generating inbound demand with
      reduced paid acquisition cost. 60% of Forbes AI 50 companies are reported Vanta customers,
      providing enterprise credibility that accelerates mid-market conversion.

      Sales efficiency proxies are not publicly disclosed. At an estimated CAC payback of 18–24 months
      (inferred from SaaS benchmarks at this ARR scale and growth rate), and assuming gross margins
      of 70–80%, the implied LTV/CAC ratio is approximately 3–5×. Customer expansion from single-
      framework to multi-framework and add-on modules is the primary retention mechanism, with implied
      NRR above 120% based on ACV growth from $17K to $19K over nine months. Exact CAC, LTV, and NRR
      are undisclosed and represent key diligence asks before final underwriting.
