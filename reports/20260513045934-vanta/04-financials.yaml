  - id: cost-structure-gross-margin
    title: Cost Structure and Gross Margin Drivers
    body: >
      Vanta operates a software-delivery model with no physical hardware, manufacturing, or
      significant inventory, which means its cost structure is dominated by personnel (engineering,
      customer success, sales), cloud infrastructure, and go-to-market spend. The company does not
      disclose gross margin, operating income, or any income-statement metrics, making cost-structure
      analysis dependent on SaaS industry benchmarks for comparable businesses at the $300M ARR scale.

      Gross margin for compliance SaaS platforms is typically in the 70–80% range. Vanta's cost of
      revenue is primarily composed of: (1) cloud hosting and infrastructure costs for the platform's
      400+ integrations and continuous monitoring engine; (2) customer success headcount supporting
      implementation, ongoing monitoring reviews, and renewal; and (3) third-party data costs for
      integration connectors and evidence collection APIs. Unlike pure documentation SaaS, Vanta's
      continuous-monitoring architecture requires persistent agent connections, which creates modest
      but ongoing cloud cost per customer — likely 5–15% of ACV at scale, consistent with gross margins
      at the lower end of the 70–80% range versus a typical pure-SaaS documentation product.

      Operating expense structure follows standard high-growth SaaS patterns. S&M at approximately
      30–35% of ARR is consistent with Vanta's aggressive field-sales build and partner channel
      investment; R&D at approximately 25–30% of ARR reflects the engineering depth required to
      maintain 400+ integrations and build the AI agent layer. G&A at 10–15% of ARR encompasses
      finance, legal, international expansion, and the Riskey acquisition integration costs. At
      approximately 1,000 employees and $300M ARR, Vanta's implied ARR-per-employee ratio of roughly
      $300K is at the higher end of the SaaS efficiency spectrum for a growth-stage company. This
      metric suggests the company has maintained headcount discipline relative to revenue growth,
      though the rapid pace of hiring since the 2022 Series B introduces some uncertainty in projecting
      forward cost trajectory. Capex and working capital requirements are negligible in a pure SaaS
      delivery model.
