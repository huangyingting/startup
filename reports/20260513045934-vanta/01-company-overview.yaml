  - id: product-milestones
    title: Product Suite and Key Milestones
    body: >
      Vanta's product has expanded from a single-framework SOC 2 compliance tool in 2018 to a comprehensive agentic trust
      platform with six core product areas as of early 2026: (1) Compliance Automation covering 35+ frameworks; (2) the Trust
      Graph — an always-on map of a company's controls, vendor relationships, evidence, and compliance obligations built on
      400+ integrations; (3) the Vanta Agent — an autonomous 24/7 GRC engineer that orchestrates compliance, audit, vendor
      risk, questionnaires, and customer commitments; (4) Third-Party Risk Management (TPRM), enabling up to 50% faster vendor
      assessments through AI-powered analysis and continuous monitoring; (5) the Trust Center, a customer-facing portal
      for sharing security and compliance documentation; and (6) Questionnaire Automation, enabling automation of up to 288
      security questionnaires per year on the Scale tier. Vanta acquired Israel-based Riskey in mid-2025 to add continuous
      AI-driven risk monitoring. Vanta launched its MCP Server and REST API for GRC engineering integration in 2026. Vanta
      is one of the first companies certified under ISO 42001 (AI management systems standard). A product data breach incident
      in May 2024 briefly exposed a few hundred customers' data — CEO Cacioppo disclosed publicly, described it as resolved,
      and documented preventive measures. Key milestones include YC graduation (2018), Series A at $500M (2021), unicorn status
      at Series B ($1.6B, 2022), $100M ARR milestone (January 2024), Series C at $2.45B (July 2024), Series D at $4.15B
      (July 2025), launch of Vanta Agent (mid-2025), and $300M ARR milestone (April 2026).
