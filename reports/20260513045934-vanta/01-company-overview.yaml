callouts:
  - calloutType: strength
    title: Fastest Revenue Ramp in Compliance Automation
    body: >
      Vanta grew from $10M to $300M ARR faster than any known public comparable in the GRC/compliance automation space:
      $10M to $100M in two years, $100M to $200M in 15 months, and $200M to $300M in just nine months. With 63% YoY
      growth and the Vanta Agent showing 253% daily user growth in three quarters, growth appears to be accelerating.
    claimRefs:
      - CO030
      - CO031
      - CO033

  - calloutType: risk
    title: Key-Person Concentration in CEO
    body: >
      Vanta's co-founder and CEO Christina Cacioppo is the primary fundraiser, external face, and vision holder. Co-founder
      Erik Goldman departed early with no public explanation. The board composition is not fully disclosed. This creates
      significant key-person risk that is not uncommon for founder-led companies at this stage but warrants monitoring.
    claimRefs:
      - CO013
      - CO015
      - CO047

  - calloutType: insight
    title: Capital-Efficient Growth Anomaly
    body: >
      Wellington Management confirmed Vanta had not spent the $150M Series C before raising the $150M Series D. This
      unusual dynamic suggests Vanta has very strong unit economics, growing primarily through organic demand rather than
      capital-intensive sales motions. It also positions the company for opportunistic M&A (Riskey acquisition) and
      international expansion without revenue dilution pressure.
    claimRefs:
      - CO025
      - CO027
      - CO043

