        - 把合规从年度审计变成持续项目；控制漂移告警往往是客户发现配置变更可能影响认证状态的第一信号
    notes: 所有非核心模块的附加定价均未公开。所有成熟度判断基于截至 2026 年 5 月的公开产品页、G2 评论和分析师报告。渗透测试是由合作伙伴撮合的服务，不是 Vanta 直接提供的能力。
