  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险图谱
        blocks:
          - type: paragraph
            body: >
              Vanta 的法律与监管敞口横跨五个不同框架，每个框架都可能单独引发实质责任或产品修订义务。在 GDPR 下，Vanta
              是欧盟客户的数据处理方，必须维护合规的数据处理协议，并对流经其合规证据收集管道的个人数据保持足够技术和组织措施。虽然 Vanta
              提供数据驻留控制，但公开路线图材料没有清楚记录已确认的欧盟托管数据处理选项，因此对有严格数据本地化要求的客户，仍存在剩余 GDPR 敞口。

              HIPAA 要求 Vanta 面向医疗客户承担商业伙伴协议（BAA）义务。根据 HHS 执法指引，BAA 违约或未能维持足够保障措施，可能导致民事罚款。Vanta 的 SOC 2 Type II
              认证提供了一定保证，但 Vanta 的 BAA 具体条款和事件响应程序未公开披露，医疗客户难以独立评估剩余敞口。SEC 2023 年网络安全披露规则（Release No.
              33-11216）要求上市公司在判定网络安全事件具有重大性后的四个工作日内披露；这既创造了对 Vanta 事件跟踪能力的需求，也给平台带来义务——如果 Vanta
              自身遭遇安全事件，其上市公司客户可能需要将其作为第三方网络安全事件披露。

              2026 年生效的 EU AI Act，对部署 AI 风险评估或自动化合规声明工具的供应商提出新要求。Vanta 的 Riskey 智能体和 AI Governance
              模块必须持续更新，以反映不断演变的要求。CCPA 以及美国州级隐私法拼图的扩张，要求 Vanta 在新法律生效时更新合规库。鉴于没有披露诉讼，IP 和专利风险较低；但 ServiceNow、IBM 等既有厂商在
              GRC 和安全自动化领域持有广泛专利组合，可能针对 Vanta 的自动化证据收集工作流主张权利。截至 2026 年 5 月，公开资料未记录针对 Vanta 的重大诉讼。
