      - number: '5.3'
        title: 技术基础设施与集成生态
        blocks:
          - type: paragraph
            body: >
              Vanta 的技术栈围绕“持续证据”范式设计：平台不是到审计时才收集合规材料，而是按固定节奏（通常每 24 小时一次，或通过 webhook 接近实时）轮询已集成系统，并把不可变证据记录存入专用证据库。集成层是
              Vanta 技术栈里最大的护城河——截至 2025–2026 年，平台已有 400+ 预构建连接器，包括 AWS、GCP、Azure、GitHub、GitLab、Okta、Azure
              AD、Salesforce、Jira、Slack、CrowdStrike、Carbon Black、Jamf 和 Google Workspace。每个连接器都由 Vanta 工程团队维护，并在第三方 API
              变更时更新，把 API 维护负担从客户转移到平台。

              developer.vanta.com 上记录的 REST API 和 webhook 系统，让客户与合作伙伴能以编程方式与 Vanta 交互——查询合规状态、触发证据收集，并把 Vanta 数据接入内部仪表盘或
              GRC 工具。开发者门户还提供 SDK 和集成指南，用于构建自定义连接器。G2 评论者指出，相比 UI 功能集，API 完整性是一个已知缺口，说明 API 在部分领域落后于产品表面。Vanta 的 GitHub
              组织（github.com/ VantaInc）包含开源集成库和示例集成，释放出一个开发者信号：生态仍在被积极维护。平台的主要基础设施依赖是 AWS；AWS
              区域性故障可能影响服务可用性。来自已集成工具（Okta、GitHub、Salesforce 等）的第三方 SaaS API 可用性是第二层依赖：如果某个已连接工具的 API
              降级，该工具的证据收集会暂停，直到服务恢复。LLM/AI 供应商可用性是第三层依赖，影响问卷自动化和 Riskey AI 智能体功能。Vanta 在 status.vanta.com 的状态页显示，2023
              年以来历史可用性高于 99.9%，公司也实时发布基础设施组件的事件状态。Vanta 自身的 SOC 2 Type II 和 ISO 27001 认证，在一定程度上缓释了对 AWS
              的集中依赖，因为这些认证要求正式的业务连续性和灾难恢复控制。
