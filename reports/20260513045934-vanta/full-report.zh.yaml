  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户基础画像与分层
        blocks:
          - type: paragraph
            body: >
              Vanta 的客户基础在公司规模、地域和垂直行业上都相当分散，反映出合规要求对科技企业的普遍性。截至 2026 年 4 月，16,000+ 客户中 SMB 和中端市场公司占比较高，二者合计约占客户数的
              75%；企业客户（1,000+ 名员工）虽然数量较少，却贡献了相对更高比例的 ARR。这种“数量越小、收入占比越高”的反向规模关系，是合规 SaaS
              平台的典型特征：企业合同因为框架要求更复杂、员工规模更大推高按席位定价、每个账户附加模块更多，ACV 显著更高。

              SMB 细分市场（少于 100 名员工）主要由北美的 SaaS 和云原生科技公司构成，它们通常因为潜在客户或企业买家要求，追求第一次 SOC 2 Type II 认证。该细分市场客户数量最多，但平均 ACV
              最低（约每年 $10,000–$18,000）。中端市场客户（100–1,000 名员工）用 Vanta 运行多框架合规项目，把 SOC 2 与 ISO 27001、HIPAA 或 PCI-DSS
              组合起来；它们是核心收入引擎，客户数仅约 35%，却贡献约 40% 的 ARR。企业客户（1,000+ 名员工）则把 Vanta 用于复杂 GRC 项目、TPRM
              自动化和大规模问卷自动化；更高的切换成本和更深的多模块部署，让其估计总留存率（GRR）高于 92%。三个专业垂直——医疗（HIPAA + SOC 2）、金融科技（PCI-DSS + SOC 2）和 AI
              原生公司（ISO 42001 + SOC 2）——正在增长，ACV 高于平均水平，也天然具备框架扩张路径。Vanta 约 70% 客户总部位于北美，20% 在欧洲（受 GDPR 采用推动），10% 在 APAC
              和其他市场。客户旅程图（FU001）追踪了从最初合规触发，到多框架扩张和 Trust Center 激活的完整生命周期。
