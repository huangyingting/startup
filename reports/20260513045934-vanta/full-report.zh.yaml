      - number: '5.2'
        title: 客户工作流与使用场景
        blocks:
          - type: paragraph
            body: >
              Vanta 的客户工作流从集成开始：新客户通过 Vanta 的 400+ 原生连接器，接入云、身份、代码和终端工具。集成上线后，Vanta
              会实时从这些工具持续拉取证据，取代过去主导审计准备周期的电子表格和截图式证据收集。随后，客户选择所需合规框架——SOC 2、ISO 27001、HIPAA、PCI-DSS、GDPR、NIST CSF
              或自定义框架——Vanta 将已收集证据映射到每个框架的相应控制项。仪表盘突出显示失败或未完成的控制项，并给出整改建议，优先处理最可能卡住认证的动作。审计准备就绪后，客户使用 Vanta
              的审计员工作区，向审计员提供限时证据包访问权限，把传统审计中的来回沟通减少数周。认证完成后，Trust Center 会向潜在客户发布公司的认证和安全状态，很多时候直接免掉人工安全问卷往返。

              客户使用场景按公司规模和垂直行业明显分化。员工少于 100 人的 SMB 通常因为企业客户要求，进入 Vanta 完成第一次 SOC 2 Type II 认证；在专职 IT 人员很少的情况下，流程最快 3 到 6
              个月可完成。中端市场公司（100–1,000 名员工）用 Vanta 运行多框架合规项目、董事会级风险报告和供应商风险管理。企业客户（1,000+ 名员工）则在复杂多框架环境中部署
              Vanta，覆盖自定义控制、全球隐私项目，以及面向大规模员工队伍的访问审查自动化。开发者工具和 SaaS 公司把 Trust Center
              当作直接的销售赋能工具，通过发布认证来移除安全审查瓶颈，缩短企业销售周期。医疗 SaaS 公司在单一平台内组合 HIPAA 和 SOC 2 工作流。金融科技公司同时管理 PCI-DSS 和 SOC 2。AI/ML
              公司是正在快速增长的新兴客群，在 EU AI Act 带来的监管压力下，用 Vanta 的 AI Governance 模板满足 ISO 42001 和 NIST AI RMF
              合规。这些细分市场上的场景覆盖宽度，是 Vanta 一项实质竞争优势。
