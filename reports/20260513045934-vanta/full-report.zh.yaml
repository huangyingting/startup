      - number: '8.4'
        title: 乐观、基准与悲观情景分析
        blocks:
          - type: paragraph
            body: >
              我们按 2026–2030 四年期建模三个情景，每个情景都明确 ARR、增长率、退出倍数和概率加权估值假设。

              牛市情景（退出估值 $5.5–6.0 billion）假设 Vanta 维持 40–50% 的 ARR CAGR，到 2029 年 ARR 达到 $800–900 million，动力来自向 TPRM
              和风险编排的平台扩张。在这一规模上按 12–15× ARR IPO，对应企业价值 $9.6–13.5 billion。完全稀释并清算优先权后，Series D 投资者按 $2.45 billion 入场价可拿到
              4–5× 的基础回收。概率：20%。

              基准情景（退出估值 $3.5–4.5 billion）假设 ARR CAGR 为 30–35%，到 2028–2029 年 ARR 达到 $500–600 million。战略收购或按 7–9× ARR
              IPO，对应 $3.5–5.4 billion 的退出价值。扣除优先股权利后，普通股持有人按 Series D 价格可拿到 2–3×。概率：55%。

              熊市情景（退出估值 $1.5–2.0 billion）假设竞争压力下 ARR 增速降至 15–20%，到 2029 年 ARR 达到 $350–400 million，利润率被压缩。困境战略出售或后期降价轮按
              4–5× ARR 计，对应 $1.4–2.0 billion 企业价值。优先股持有人可能无法完全回收； 普通股受损。概率：25%。

              概率加权预期退出价值约 $3.9 billion，按 Series D 入场价的预期回报约 1.4–1.6×，只略高于优先股流动性底线。这进一步说明入场纪律的重要性： 要拿到不对称回报，定价必须显著低于
              $2.45 billion。估值敏感性图显示，只要退出倍数或 CAGR 假设小幅改善，预期结果就会明显改善，也说明入场纪律能撬动的空间。
