        - 400+ 个连接器让证据收集全自动化，相比手工表格 + 截图流程效率更高；单一平台支持 35+ 个框架
      - - Trust Center
        - 面向客户的门户
        - 面向公众且可通过 NDA 门控的门户，用于向潜在客户和客户共享合规认证、安全态势和预填问卷回复；认证状态实时更新
        - GA——客户群中广泛采用；关键销售赋能工具
        - 可作为基础包一部分或按档位加购；公开门户免费，高级 NDA 门控功能为加购项
        - 消除重复问卷往返；给潜在客户一个自助安全审查渠道，直接缩短企业销售周期
      - - GRC / 风险管理
        - 治理、风险与合规
        - 风险台账，包含自动风险识别、处置计划、风险评分、剩余风险跟踪和董事会层面报告；包括 2025 年 9 月推出、用于自主风险评估的 Riskey AI 智能体
        - GA — 附加模块；成熟度中等；AI 功能持续迭代
        - 附加模块；定价未披露
        - Riskey AI agent 是 Vanta 平台首个自主 AI 代理；可将已识别风险自动映射到受影响控制项，大幅压缩风险评估时间
      - - 供应商 / 第三方风险管理（TPRM）
        - 供应链风险
        - 供应商问卷自动化、供应商风险评分、供应商安全持续监控、合同 / SLA 跟踪；摄取供应商问卷答复并暴露风险信号
        - GA — 附加模块；成熟度中等；供应商评分模型仍在成熟
        - 附加模块；定价未披露
        - 与合规证据库打通：供应商风险发现可自动映射到受影响控制项；对多数 SMB / 中端市场用例，可替代单独的供应商风险平台
      - - 问卷自动化
        - AI 驱动自动化
        - 借助 AI 自动起草潜在客户发来的安全问卷答复；用现有合规证据和历史答复作为 LLM 生成答案的上下文；支持主要问卷格式（SIG、CAIQ、VSA、自定义）
        - GA — 附加模块；针对标准问卷格式的 AI 成熟度较高
        - 附加模块；定价未披露
        - 将问卷答复时间从数天压到数小时；直接关系到企业客户订单解锁；在 Vanta 各模块中 AI 成熟度最高
      - - 隐私自动化
        - 隐私 / 数据保护
        - GDPR/CCPA 数据流映射、DSAR 请求管理、DPIA 工作流、同意管理、隐私政策维护；开始支持 DORA 和 EU AI Act 合规
        - GA — 附加模块；成熟度中等；监管需求在增长
        - 附加模块；定价未披露
        - 把隐私合规和安全合规放在同一平台；对直接的隐私项目，减少对独立 DSAR 管理工具或 DPO 顾问的依赖
      - - 访问审查
        - 身份与访问管理
        - 跨已连接身份与 SaaS 工具自动定期认证访问权限；管理审查人工作流；集成 Okta、Azure AD、Google Workspace、GitHub；自动生成 SOC 2 用户访问审查证据
        - GA — 附加模块；对已支持身份提供商自动化程度高
        - 附加模块；定价未披露
        - 用全自动化补上最耗人力的 SOC 2 控制项（用户访问审查）；证据会自动捕获，并链接到合规框架控制项
      - - AI 治理
        - 新兴合规
        - 面向 ISO 42001（AI 管理体系）、NIST AI RMF 和 EU AI Act 的框架模板与控制项映射；AI 系统清单、AI 模型风险评估、治理政策模板
        - GA — 附加模块；成熟度早期；品类快速发展
        - 附加模块；定价未披露
