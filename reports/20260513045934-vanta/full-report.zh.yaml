      - - 每客户估计 LTV
        - ~$50K–$100K+（双重估计：ACV × 假设 3–5 年留存 × ~75% GM）
        - 低（双重推断）
        - 框定单位经济模型吸引力；SaaS 的健康 LTV/CAC 目标为 >3×
        - 索取实际 LTV 计算；12/24/36 个月队列存活曲线
