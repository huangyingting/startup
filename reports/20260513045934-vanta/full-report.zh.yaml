      - number: '8.2'
        title: 估值框架与入场价格分析
        blocks:
          - type: paragraph
            body: >
              Vanta 最近一次已知融资轮是 2023 年 10 月 Series D，当时以约 $150–200 million ARR 确立了 $2.45 billion 的投后估值，隐含 ARR 倍数为
              12–16×。到 2026 年中，公司据称已达到 $300 million ARR；如果 $2.45 billion 账面价值不变，当前倍数隐含为 8.2×。随着 ARR 增长自然发生的倍数压缩，是 Vanta
              入场测算的关键特征：如果投资者今天在老股交易中按 Series D 价格入场，相比该轮本身，实际获得的是更低的隐含倍数。

              当前环境下，高增长 SaaS 公司（收入增长超过 30%）的可比公开市场倍数为 8–15× NTM 收入；画像相近的后期私营公司交易倍数为 7–12× ARR。Vanta 位于私营可比公司的高端，但低于
              Datadog 和 CrowdStrike 所享受的公开市场溢价倍数；后者在更强 40 法则分数支撑下，交易倍数为 15–25×。

              这里必须严守入场纪律。按 $2.45 billion 投资，只有两类退出情景能带来 3–5× 回报：要么以 $400M+ ARR 按 12–15× 上市，要么被战略方以 $4–6 billion
              收购。二者都可实现，但要求 Vanta 未来三年继续以 30–40%+ 增长，且不出现显著倍数压缩。此前各轮带来的优先权悬挂（Series D 前已融资约 $424 million）意味着，若以低于 $2
              billion 退出，普通股股东拿回的价值将低于票面，Series D 清算优先权会吃掉退出收益的第一层。

              SEC Form D 文件确认，$150 million 股权发行已于 2023 年 10 月完成，Goldman Sachs 和 Wellington Management 共同领投。Vanta
              股权的老股交易曾出现在 $2.2–2.6 billion 隐含估值区间，确认 Series D 账面价值仍有真实交易证据支持。我们的估值立场是在 Series D 投后估值上属合理估值。若能低于 $2.0
              billion 入场（通过老股或新的降估值融资），将提供不对称上行。高于 $2.5 billion 入场，则需要明确承销 $5+ billion 退出。
