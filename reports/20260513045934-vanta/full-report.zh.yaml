  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: standard
    summary: Vanta 客户旅程从初始合规触发，延伸到多框架扩张和 Trust Center 背书。七个阶段追踪从认知到续约的生命周期，展示落地扩张飞轮，以及认证和模块扩张这两个关键留存时刻。
    data:
      nodes:
        - id: s1
          label: 认知
          detail: 潜在客户收到企业买家或 VC 的合规要求；通过同行推荐、G2 搜索或内容营销听说 Vanta；合规要求通常没有谈判空间，因此购买紧迫感很强
        - id: s2
          label: 试用 / 评估
          detail: 免费试用或演示；用现有工具（GitHub、AWS、Okta）测试集成；与人工咨询或 Drata 对比；Vanta 自助部署和 400+ 集成是此阶段的关键差异点
        - id: s3
          label: 首次购买：单一框架
          detail: 年度合同；ACV 视公司规模为 $10K–$60K；SOC 2 Type II 是最常见的切入框架，占首次购买的 60% 以上；入门 ACV 锚定后续扩张基线
        - id: s4
          label: 首次认证
          detail: 达到 SOC 2 准备状态的中位时间约 3 个月；通过 Vanta 市场接入审计师；启用 Trust Center；合规证据库开始填充——此阶段切换成本开始显著累积
        - id: s5
          label: 扩张：增加框架
          detail: 增加 ISO 27001、HIPAA、PCI-DSS 或 GDPR；每新增一个框架都会抬高 ACV；跨框架共用证据收集，相比初始部署扩张成本更低；锁定效应已经形成
        - id: s6
          label: 扩张：加购模块
          detail: TPRM、Questionnaire Automation、Privacy、Access Reviews、AI Governance；每个模块都会带来增量 ARR；模块采用率与更高 NRR、续约时更低流失概率强相关
        - id: s7
          label: 续约与背书
          detail: 集成证据库和多年合规历史推高续约意愿；客户成为 G2、TrustRadius 评论者和同行推荐来源；飞轮继续带来新客
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
