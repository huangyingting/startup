      - number: '6.4'
        title: 客户留存、满意度与净留存率
        blocks:
          - type: paragraph
            body: >
              G2（900+ 评论中 4.6/5）和 TrustRadius（100+ 评论中 4.6/5）的客户满意度数据，把 Vanta 定位为合规自动化类别中两大主要评论平台上的高评分产品。两个平台评分同为
              4.6/5，提高了我们对该分数代表真实用户体验、而非精选评分的信心。两大平台上的常见好评主题包括：自动化证据收集消除了手工表格工作；SOC 2 认证时间更快（通常 3–6 个月，而手工流程需要 12+
              个月）；审计员市场降低采购摩擦；Trust Center 加速企业销售周期。PeerSpot 评论量较少，但方向上与整体正面信号一致。

              来自 G2、TrustRadius、Reddit 和 PeerSpot 的主要反向信号集中在三类：(1) 续约时涨价 20–30%，尤其是面临预算压力的 SMB 客户；(2)
              面向拥有定制控制框架或遗留本地系统的企业，定制深度有限；(3) 公司扩张到 16,000+ 客户后，客户支持响应时间下降。SMB
              客户第一年的流失风险最高；认证完成后，一旦合规历史和集成证据库建立在平台上，切换成本上升，留存会明显改善。

              净留存率（NRR）未公开披露。分析师估计 NRR 高于 120%，该判断来自 ACV 扩张模式（12 个月内从 $17K 到 $18.75K，混合扩张率 10.3%）以及可比合规 SaaS
              平台基准。队列留存图（FU004）展示了按细分市场估计的年度留存率，其中企业客户估计总留存率（GRR）为 92–95%，多框架客户因审计周期完成后切换成本更高，估计为
              91–95%。这些都是分析师估计，不是披露数据，应通过正式尽调数据室访问验证。
