      - number: '2.2'
        title: 市场规模与口径分析
        blocks:
          - type: paragraph
            body: >
              需要多个规模测算口径，因为研究机构采用不同范围定义，对同一底层市场给出的估算可相差 20–30 倍。本节保留这些矛盾，便于投资人三角校验。


              自下而上的 SOC 2 口径：AICPA 在 FY2023 发布约 50,000 份 SOC 2 报告，高于 2020 年约 28,000 份。按 Vanta 档位年合同均值约 $19,800 计算，50,000
              家公司各自购买合规平台，意味着市场规模约 $990 million；这已经能支撑 Vanta 的 $300M ARR（若当前自动化渗透率下总市场约 $1B，则份额超过 30%）。随着自动化渗透率从今天估计
              20–25% 的 SOC 2 候选公司，上升到潜在 70–80% 上限，总可服务池会显著扩大。


              自上而下的合规自动化口径：2025 年合规自动化子领域为 $2.8 billion（BusinessOfGRC），以 25%+ CAGR 增长，预计到 2030 年约 $7 billion。Vanta 的
              $300M ARR 意味着今天约 10.7% 的市场份额——在分散子领域中已是强势位置。


              自上而下的 GRC 软件口径：Mordor Intelligence 估算 2026 年 GRC 软件市场为 $23.32 billion，并以 10.84% CAGR 增至 2031 年 $39.01
              billion。Vanta 在其中的 SAM 是科技公司偏好的云原生、API 驱动部分，估计占整体 30–40%（$7–9 billion），显示仍有可观上行空间。


              地理分布：North America 占 GRC 收入的 39.55%（2025，Mordor），Asia-Pacific 到 2031 年 CAGR 最高，为 15.1%。Vanta
              在英国和澳大利亚的国际运营，使其具备有意义扩张 APAC / EMEA 的位置。


              企业与 SMB 拆分：大型企业在 2025 年控制 69.6% 的 GRC 收入，但 SMB 预计到 2031 年以 13.02% CAGR 增长——这是 Vanta 起步、且当前密度仍最高的细分市场。Vanta
              向企业推进，瞄准的是价值更高的细分。
