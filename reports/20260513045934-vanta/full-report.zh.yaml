  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与产品套件
        blocks:
          - type: paragraph
            body: >
              Vanta 的平台是一个多模块 SaaS 应用，全部托管在 Amazon Web Services 上，没有本地部署或混合云部署选项。坚持纯云架构让 Vanta
              能快速迭代、保持精简运营，但也限制了它进入隔离政府环境，以及数据驻留要求严格的司法辖区。平台分为六个功能层：展示层（Trust Center 门户、合规仪表盘、PDF
              审计报告）、应用层（合规自动化、证据管理、GRC、TPRM、问卷与隐私自动化、访问审查）、AI 与智能层（用于风险的 Riskey AI 智能体、问卷自动填充 AI、AI 治理模板）、集成层（400+
              原生连接器加 REST API）、数据与证据存储层（不可变证据库、政策库、供应商问卷数据库），以及底层 AWS 基础设施，历史可用性超过 99.9%。

              Vanta 自 2018 年创立以来，产品模块目录已经大幅扩张。当前 10 个模块覆盖完整合规生命周期：(1) Core Compliance Automation——最初的产品，在 35+
              框架上自动收集证据，并持续监控；(2) Trust Center——面向客户的公开及 NDA 门控门户，用于向潜在客户共享认证和安全状态；(3) GRC/Risk
              Management——风险登记、处置计划、风险评分和 Riskey AI 智能体；(4) TPRM/Vendor Risk——供应商问卷自动化、风险评分和持续供应商监控；(5) Questionnaire
              Automation——用 AI 完成潜在客户发来的安全问卷；(6) Privacy Automation——GDPR/CCPA 数据流映射、DSAR 管理和 DPIA 工作流；(7) Access
              Reviews——与身份工具集成，自动完成周期性访问认证；(8) AI Governance——ISO 42001 和 NIST AI RMF 框架模板；(9) Pen
              Testing——通过精选合作伙伴网络协调；(10) Continuous Monitoring——实时收集证据并提示控制漂移。核心合规和 Trust Center
              之外的模块作为附加项销售，单个模块的年度定价未公开披露。这组模块的宽度让 Vanta 更像平台，而不是单点工具，既抬高切换成本，也扩大每个客户的钱包份额机会。
