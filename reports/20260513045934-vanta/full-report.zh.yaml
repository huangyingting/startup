        - GA — 合作伙伴模式；自动化低；偏协调层产品
        - 收入分成或转介模式；不是直接订阅附加模块
        - 这是补齐服务，帮助客户满足 SOC 2 和 ISO 27001 项目中的渗透测试证据要求，不必自行寻找和管理渗透测试供应商
      - - 持续监控
