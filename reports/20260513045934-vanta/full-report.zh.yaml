      - number: '6.3'
        title: 具名客户证据与案例研究
        blocks:
          - type: paragraph
            body: >
              Vanta 公开客户证明库包括正式案例研究，也包括可观察的在线 Trust Center 部署。最高质量证据来自 Lattice（HR SaaS，中端市场）和 Assembly（生产力
              SaaS，SMB）的官方案例研究，二者都给出具体工作流结果，例如更快完成 SOC 2、减少工程工时。这些案例研究又由在线 Trust Center 证据补强：Vercel 和 Linear 都运营公开可访问的
              Vanta Trust Center，展示有效的 SOC 2 Type II 和 ISO 27001 认证——这种当前可观察证据无需解释，也无法伪造。HackerOne 的多框架部署（SOC 2 和 ISO
              27001）配合活跃 Trust Center，是安全公司细分市场中价值最高的证明点；在该类别里，合规资质对同行可信度尤其重要。

              GitLab 以标志性客户形式出现在 vanta.com 上，但没有已发布案例研究，属于中等置信度引用。Vanta 称 Forbes AI 50 中 60% 使用其平台，提供了企业级社会证明；不过除
              Cursor、Harvey、Lovable 以及新闻报道中点名的少数公司外，具体公司并未逐一披露。Retool 在媒体报道中被提及为 Vanta
              早期客户，Segment（Twilio）也曾在分析师文章中被引用为早期采用者。

              客户证明矩阵（FU003）从四个证据维度评估每个具名客户：部署确认、结果量化、留存可见性和证据新鲜度。证明库里最清楚的缺口，是多数案例研究缺少量化财务结果——没有已发布案例研究明确说明 Trust Center
              打开了多少企业交易，或 Vanta 带来了多少美元合规相关收入。G2 的 900+ 评论池部分弥补了这一点，它用覆盖医疗、金融科技、开发者工具等多个垂直的广泛匿名样本，统计性确认了满意度模式。
