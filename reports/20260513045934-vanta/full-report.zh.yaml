  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争概览
        blocks:
          - type: paragraph
            body: >
              截至 2026 年中，合规自动化市场分为三层竞争者。第一层是专用合规 SaaS 平台——Vanta、Drata、Secureframe 和 Sprinto——它们在 2018 年后出现，瞄准寻求程序化 SOC
              2、ISO 27001 及相关认证的云原生 SMB 和中端市场公司。第二层包括企业 GRC 既有厂商——AuditBoard（后改名 Optro）、OneTrust 和
              Hyperproof——它们起家于审计、隐私和综合风险管理，自然能撬动 Fortune 500 安全团队和首席合规官。第三层包含替代方案和潜在进入者：
              提供托管合规服务的传统审计公司，提供原生监控的三大云厂商（AWS Security Hub、Azure Compliance Manager、Google Security Command Center），以及
              Anecdotes.ai 等 AI 原生新玩家。


              Vanta 拥有所有专用玩家中最广的集成覆盖（400+），截至 2026 年 4 月 ARR 估计 $300M，约为 Drata 估计收入的 1.5–2 倍。2025 年 9 月推出 Vanta
              Agent（自主证据收集与问卷响应），以及 2026 年 1 月收购 Riskey（AI 风险情报），显示其意图不只是自动化合规勾选框， 而是占据更高价值的风险情报位置。不过，Drata
              的连续控制监控（CCM）拥有 1,200+ 个自动化小时测试，Sprinto 以 200+ 框架包装 「自主信任平台」，OneTrust 拥有全球数据隐私足迹；三者都能针对特定买方画像提供可信替代。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
      - number: '3.2'
        title: 竞品画像
        blocks:
          - type: paragraph
            body: >
              Drata 是 Vanta 最接近的竞争对手。Drata 由前 HUMAN Security 高管于 2020 年创立，2025 年末报告 ARR 约 $100–130M，累计融资约 $328M（2022 年 C
              轮，估值 $2B）。其平台强调 CCM——监控 200+ 集成，并运行超过 1,200 个自动化小时测试——还搭建了集成式 Trust Center（部分来自 2023 年收购 Safebase）。Drata
              瞄准与 Vanta 相同的 SMB 至中端市场买方，不过集成数量更窄（170+，低于 Vanta 的 400+）、 历史客户基数更小（约 4,000–5,000 家，低于 Vanta 的
              16,000+），反映其早期爬坡较慢，但企业深度更扎实。Drata 采用按框架订阅定价； 用户反馈显示，单框架需求下可能低于 Vanta 的模块化方案，但多框架项目会更贵。


              Secureframe 成立于 2020 年，已融资约 $79M，最近一轮是 Kleiner Perkins 领投的 2022 年 B 轮。平台覆盖 30+ 框架和约 150+
              集成，瞄准早期初创和中型公司。它的关键差异化是把专门合规专家嵌入平台体验，缩短客户到审计的时间。其规模明显小于 Vanta 或 Drata；分析师估计 ARR 低于 $30M。


              Sprinto 于 2019 年在 Bengaluru 创立，凭借透明定价和面向云原生公司的深度自动化，在 50+ 个国家发展到 3,000+ 客户。Sprinto 有 300+ 集成和 200+
              框架覆盖，在框架数量上已经追平或超过 Drata，同时强调更低、更可预测的定价。公司于 2023 年完成 B 轮。平台的「自主信任平台」 叙事与 Vanta 的 AI 智能体叙事高度相似，说明定位正在收敛。


              AuditBoard 成立于 2014 年，后来因 AI 驱动的 GRC 转型改名 Optro，服务 Fortune 500 中超过 50% 的企业，覆盖审计、风险和合规。不同于 Vanta，Optro
              瞄准内部审计团队和需要 SOX IT 合规、ESG 追踪、综合风险管理的大型企业。2023 年，Hg Capital 以约 $3B 收购 Optro。 其范围、价格点和企业实施复杂度，使其更像 Vanta
              最大客户的补充与升级路径，而不是直接争夺初创买方的正面竞争者。


              OneTrust 在 2023 年完成 $1B 融资后估值 $4.5B，凭借全球 14,000+ 客户，领先隐私和数据治理领域。对于数据隐私监管（GDPR、CCPA、DORA） 是主要驱动的组织，它的 GRC
              模块是最全面的平台。定价和实施复杂度高于 Vanta，因此不适合 Vanta 核心买方（B–D 轮科技初创），但自然会成为 Vanta 企业细分的扩张目标。


              Hyperproof 由 Madrona Venture Group 等投资，瞄准中端市场合规团队，并拥有 FedRAMP Moderate 授权环境，因此是 Vanta 的 FedRAMP
              试点计划中最强竞争者。其 AI 驱动的证据映射和控制自动化，与 Vanta 的产品路线图直接重叠。
