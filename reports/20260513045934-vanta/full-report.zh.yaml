chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、使命与商业模式
        blocks:
          - type: paragraph
            body: >
              Vanta 于 2018 年由 Christina Cacioppo（CEO）和 Erik Goldman 在 San Francisco 创立，使命是帮助企业赢得并证明信任。 Goldman
              早期离开公司；Cacioppo 带领 Vanta 走向规模化。公司称自己是「领先的智能体信任平台」， 在 AI 重塑安全与合规的背景下，为企业赢得并证明信任设定标准。Vanta 是一家在 Delaware
              注册的私营公司，总部位于 San Francisco，并在 Dublin（Ireland）、New York 和 Sydney（Australia）设有办公室，形成面向全球客户的多区域运营。 商业模式是订阅制
              SaaS：客户按年付费，早期初创公司约 $10,000 / 年，企业级账户为 $80,000–$120,000+ / 年。 收入来自覆盖多个合规框架的平台访问（SOC 2、ISO
              27001、HIPAA、GDPR、PCI DSS、FedRAMP 及其他 30 多项）、 附加模块（Trust
              Center、问卷自动化、供应商风险管理）和客户员工数分层。三个定价档位（Core/Essentials、Growth/Plus、 Scale/Enterprise）让 Vanta
              能覆盖从早期初创到大型企业的完整市场。截至 2026 年 4 月，Vanta ARR 已超过 $300M， 同比增长 63%，较 2024 年约 $100M 翻了三倍。公司在全球支持 16,000
              多家组织，客户从 Harvey、Cursor、Lovable 等 AI 初创公司，到 Atlassian、Snowflake、GitHub、Samsara、Ramp 和 Golden State Warriors
              等大型企业。 Forbes AI 50 公司中有 60% 是 Vanta 客户，合计市值 $560 billion。
