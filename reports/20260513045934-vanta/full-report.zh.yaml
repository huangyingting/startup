      - number: '2.4'
        title: 增长驱动与采用约束
        blocks:
          - type: paragraph
            body: >
              2026 年的主要增长驱动：监管扩散是最核心的结构性顺风。2022
              年之后，网络安全披露规则、数据隐私法律（GDPR、CCPA、CPRA、NIS2、DORA）和行业专项要求一波接一波，扩大了「必须合规」的定义。每一条新监管都会直接创造对框架支持的需求。DORA（Digital
              Operational Resilience Act）于 2025 年 1 月对欧盟金融服务公司生效，创造了 Vanta 目前已支持的新合规品类。SEC 网络安全披露规则（2023 年 12
              月生效）要求上市公司在四个工作日内披露重大网络安全事件，并每年描述风险管理流程，推高对持续合规文档的需求。


              AI 治理是新兴合规品类：Vanta 数据显示，70% 的公司存在影子 AI，LLM 被认定为高风险的可能性比传统 SaaS 高 52%。Vanta 的 ISO 42001 认证和新 AI
              治理模块，使其站在这一监管浪潮前排。


              主要采用约束：合规自动化的 ACV 中位数为 $19,800+，对尚未产生收入的初创公司仍是一笔吃力采购。免费试用和自助入门降低摩擦，但年度成本仍会与工程师人头预算竞争。AWS Security
              Hub、Microsoft Compliance Center 和 Google Cloud 原生工具为单一云负载提供免费但有限的替代方案，限制 Vanta 在深度绑定超大规模云厂商环境中的落地。企业 GRC
              既有厂商（ServiceNow、Workiva）在成熟账户中保持强锁定效应。
