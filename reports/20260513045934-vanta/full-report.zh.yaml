      - number: '5.4'
        title: 信任、安全与合规状态
        blocks:
          - type: paragraph
            body: >
              Vanta 自身的安全与合规状态，是一家销售合规自动化公司的关键可信度信号：客户把证据数据托付给平台，理应期待平台维持很高的安全门槛。Vanta 持有 SOC 2 Type II、ISO
              27001、HIPAA、GDPR 和 PCI-DSS Level 1 认证——这是一组覆盖其客户主要目标框架的完整认证。这些认证由获认可的第三方机构独立审计，并通过 Vanta 自己的 Trust Center
              展示，形成自我指涉的证明点。静态数据用 AES-256 加密；传输中数据使用 TLS 1.2 或更高版本。应用内全面强制执行基于角色的访问控制（RBAC），也为需要与现有身份提供商（Okta、Azure
              AD、Google Workspace 等）做身份联合的企业客户支持 SSO/SAML 集成。

              Vanta 每年接受第三方安全公司进行的渗透测试，并通过 Trust Center 在 NDA 下向客户共享渗透测试结果摘要。平台的漏洞管理计划遵循正式整改 SLA：根据 Vanta 已发布安全政策，严重漏洞在
              24 小时内处理，高危问题在 72 小时内处理。G2 评论者整体确认对 Vanta 安全实践有信心，只有少数评论零星提到数据处理顾虑。G2
              上最常见的产品质量抱怨指向定价不透明和意外涨价，而不是安全失效——这反而构成一项定位优势。

              信任层尽调的首要问题，是审阅当前 SOC 2 Type II 报告（覆盖最近一次审计到尽调日期之间期间的 Bridge Letter），确认审计员网络获得 AICPA 认可，并审阅 Vanta
              的供应商子处理方清单，理解 Riskey 和问卷自动化所用 AI 供应商的数据处理方式。AI 功能使用 LLM 供应商带来第二层隐私问题：客户合规证据数据是否流经外部 LLM
              推理端点？如果是，适用哪些数据处理协议？公开文档没有完整回答这个问题。对处理 PHI 或 PCI 数据的受监管行业客户来说，这是一项实质尽调问题。
