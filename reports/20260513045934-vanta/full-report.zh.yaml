  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: standard
    summary: >
      这张流程图追踪 Vanta 平台上的端到端客户旅程：从初始集成配置到持续合规运营。该工作流面向 SMB
      和中端市场客户设计为自助式：连接集成、选择框架不需要专业服务。证据收集、缺口识别和审计协同由平台自动化完成。首个认证周期末尾的 Trust Center
      发布形成自我强化闭环——已发布认证会吸引更多企业潜在客户，进而带来额外框架和模块需求。持续监控确保合规项目在审计周期之间保持活跃，在控制漂移导致审计失败前就捕捉问题。七个节点覆盖从 上线引导到持续信任管理的完整合规生命周期。
    data:
      nodes:
        - id: n1
          label: 连接集成
          detail: 客户通过 400+ 预置连接器连接云基础设施（AWS、GCP、Azure）、身份（Okta、Azure AD）、代码（GitHub、GitLab）、终端和 SaaS 工具；典型设置时间 1–4 小时
        - id: n2
          label: 选择合规框架
          detail: 从 35+ 框架中选择：SOC 2、ISO 27001、HIPAA、PCI-DSS、GDPR、NIST CSF、自定义；Vanta 将已连接工具证据映射到各框架控制项
        - id: n3
          label: 自动化证据收集
          detail: Vanta 按实时或计划节奏持续从已连接工具拉取证据；证据带时间戳并不可篡改地存储；不再需要手工截图或电子表格
        - id: n4
          label: 缺口识别与整改
          detail: 仪表盘高亮未通过或未完成的控制项，并给出优先整改建议；Riskey AI 智能体识别风险并建议处置方案；访问审查和供应商问卷暴露更多缺口
        - id: n5
          label: 审计协同
          detail: 审计师工作区按时间盒和角色提供证据包访问；AI 智能体协助审计准备任务；审计师与 Vanta 协作取代手工文档交换
        - id: n6
          label: Trust Center 发布
          detail: 公司通过公开或 NDA 门禁的 Trust Center，向潜在客户发布认证、实时安全态势和预填问卷回复；消除手工问卷交换
        - id: n7
          label: 持续监控
          detail: 实时和定时重新收集证据；此前通过的控制项开始失败时，控制漂移告警会通知；政策变更检测；通过 TPRM 模块持续监控供应商风险
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
      - CE010
  - id: FE003
    title: 关键依赖图
    type: dag
    layout: standard
    summary: >
      Vanta 平台依赖一组外部节点，每个节点都会带来故障或中断风险。AWS 云基础设施是基础依赖——区域性宕机会影响所有 Vanta 服务。第三方 SaaS API（Okta、GitHub、Salesforce
      等）是第二个关键依赖：如果已连接工具的 API 退化，受影响控制项的证据收集会暂停。LLM/AI 供应商支撑 Riskey 和问卷自动化——供应商宕机或政策变化可能让 AI
      功能不可用。合规框架机构（AICPA、ISO、NIST）定义 Vanta 映射的控制要求——框架更新需要 Vanta 工程投入。认证审计师网络是软依赖：如果审计师不愿使用 Vanta
      工作区，审计协同的价值主张会减弱。所有外部依赖都流入 Vanta 合规引擎，再由它驱动 Trust Center 和每个客户的安全态势输出。DAG 说明，AWS 和第三方 API 风险是对平台可用性的最直接威胁；LLM
      供应商和框架机构依赖更多影响特定功能集，而非核心可用性。
