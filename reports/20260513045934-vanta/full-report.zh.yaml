      - number: '7.4'
        title: 人才、执行与战略风险
        blocks:
          - type: paragraph
            body: >
              Vanta 的人才风险集中在创始人层面。CEO 兼联合创始人 Christina Cacioppo 是 Vanta 产品愿景、compliance-as-code 理念和工程文化的主要设计者。作为搭建 Vanta
              核心自动化框架的技术创始人，她若离开，会立即造成产品方向真空，并很可能引发工程组织人才不稳定。公开资料未识别出已披露继任计划，或具备同等技术与战略深度的指定二号人物。

              组织层面，Series D 后员工快速增长带来文化稀释风险。在安全人才市场紧张的情况下，每年招聘 50-100+
              名工程师，可能引入不匹配的文化价值观和参差不齐的工程质量。合规自动化需要少见的复合能力：云安全知识、SaaS 架构经验和监管解读能力。这种组合稀缺且薪酬高，也让 Vanta
              面临来自超大规模云厂商（AWS、Google、Microsoft）和资金充足安全公司的抢人压力。2025 年收购 Riskey 带来近期整合执行风险：Riskey 智能体必须顺滑并入 Vanta
              核心平台，不能扰乱现有风险管理工作流或客户体验。

              战略风险也存在于投资人层面。Wellington Management 和 Sequoia Capital 在 Series D 以 $4.15B 估值投资，隐含了对 ARR 快速扩张的期待。如果增速显著低于
              63% YoY，Vanta 可能面临压力，把 ARR 优化置于产品质量或单位经济性之上。向 APAC 和 EMEA 市场进行国际扩张，需要招聘本地合规专业人才，为非 SOC 2 认证（例如 Singapore
              PDPA、Japan ISMS）构建框架库，并处理各国特定数据驻留要求——每一项都会增加执行复杂度，且不能保证近期收入。人才 / 执行风险登记表（TR004）记录了这些维度上的关键依赖、指标和缓释措施。
