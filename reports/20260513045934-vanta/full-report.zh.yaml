      - number: '8.5'
        title: 退出就绪度和投资论点失效触发点
        blocks:
          - type: paragraph
            body: >
              Vanta 的 IPO 准备度在提升，但还没到临近上市的门槛。公司已聘任 CFO，并据称已让 Goldman Sachs 和 JP Morgan 参与提前期很长的 IPO 准备； 但当前股票市场里，SaaS
              倍数较 2021 年峰值低 40–50%。除非 Vanta 能证明 Rule-of-40 表现高于 50，否则 2026 年 IPO 在财务上吸引力不强。 更可能的时间线是 2027–2028
              年，前提是利率正常化、企业 SaaS 倍数修复。

              战略收购仍是现实选项。潜在买方包括 Palo Alto Networks（搭建平台型安全生态）、ServiceNow（扩展风险与合规工作流）、Microsoft（把合规自动化整合进
              Purview/Defender）和 Workday（HR 与合规重叠）。这些买方都可能支付高于纯财务买方倍数的战略溢价，也都表现出收购合规相邻公司的意愿。Reuters 关于 Goldman Sachs 参与
              IPO 准备的报道，加上 Vanta 的增长轨迹，都指向 2027–2028 年流动性事件作为工作假设。

              投资论点失效触发点包括：（1）ARR 增长连续两个季度低于 25%；（2）披露或推断的 NRR 低于 100%，说明客户净收缩；（3）大型云厂商 （AWS/Azure/GCP）推出打包合规产品，以零边际成本替代
              Vanta 的集成层；（4）Vanta 自身发生重大安全事件，造成无法修复的声誉损害；或（5）新一轮融资投后估值低于 $2.0 billion，释放增长恶化信号。

              按 Series D 价格或更高价格承诺前，最终尽调应要求：FY2023–2025 经审计损益表和现金流量表；完整股权结构表、优先权结构和清算瀑布；经验证的 ARR 定义和客户队列级 GRR/NRR
              数据；企业与中端市场分部的销售管线和赢 / 输单数据；按客户队列年份拆分的竞争替代率和流失率；以及按客户队列 拆分的 CAC 回收期，以确认销售效率在改善。
