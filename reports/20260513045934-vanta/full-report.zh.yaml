  - id: TR004
    title: 人员 / 执行风险登记表
    columns:
      - 风险 ID
      - 风险领域
      - 描述
      - 指标
      - 严重程度
      - 缓释措施
    notes: 人员风险的严重程度评级为分析师评估；具体流失率和接班计划未公开披露。这些指标只是前置信号替代项，不是 Vanta 确认的指标。
    rows:
      - - R-PPL-001
        - 创始人 / CEO 集中度
        - Christina Cacioppo（CEO、联合创始人）是 Vanta 产品愿景和合规即代码文化的主要设计者；公司未披露已确认的接班计划，也未披露同等权威的二号人物
        - 未披露拥有完整战略权限的 CFO/COO；CEO 缺席重大产品发布
        - 高
        - 董事会接班规划；在工程副总裁和 CPO 角色之间分散产品所有权；形成产品战略文档
      - - R-PPL-002
        - 工程人才
        - 合规自动化工程需要罕见的安全 + SaaS + 监管复合经验；Vanta 与 AWS、Google、Microsoft、CrowdStrike 等资金充足的安全公司争夺人才
        - 自愿工程流失率每年 > 15%；开放工程岗位占团队 > 20%，持续 > 6 个月
        - 高
        - 有竞争力的薪酬、股权刷新计划、远程优先文化，把技术挑战作为招聘差异点
      - - R-PPL-003
        - 销售 / 商业化执行
        - Series D 后快速扩员会稀释文化、拉低销售质量一致性；新入职企业级 AE 可能表现不佳，或向大客户不准确地介绍 Vanta
        - 胜率同比下降 > 5 个百分点；企业客户 NPS 下降；合同误述争议增加
        - 中
        - 结构化销售入职、配额爬坡期、企业级 SE 支持模型、销售质量监测
      - - R-PPL-004
        - 收购整合
        - Riskey AI 收购（2025）需要整合进来，同时不干扰核心 GRC 产品工作流；整合失败可能推迟承诺的 AI 风险管理功能，并让现有客户受挫
        - 收购后 12 个月，主 Vanta 产品仍没有 Riskey 功能；客户投诉 GRC 工作流被打乱
        - 中
        - 专门整合团队、分阶段功能迁移、就 Riskey 路线图与客户沟通
      - - R-PPL-005
        - 国际扩张
        - 扩张到 APAC 和 EMEA 需要本地合规经验、特定国家框架库（Singapore PDPA、Japan ISMS、UAE ADHICS），以及尚未确认的数据驻留架构
        - APAC/EMEA ARR 占比停滞在 15% 以下；客户因本地框架缺口升级投诉
        - 中
        - 本地合规招聘、区域合作伙伴生态、基于 ARR 潜力确定特定国家框架优先级
      - - R-PPL-006
        - 投资人 / 董事会压力
        - Wellington Management 和 Sequoia Capital 以 $4.15B 估值参与 Series D，形成隐性增长预期；为了守住 60%+ ARR 增速，公司可能被激励过度进入不盈利细分市场
        - 在 ARR 增长仍高企时单位经济恶化；为维持增长而激进打折
        - 中
        - 董事会就增长与盈利能力取舍达成一致；投资人报告中设定清晰的 ARR 质量指标（NRR、GRR）
