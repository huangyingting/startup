      - number: '5.5'
        title: AI 能力与产品智能
        blocks:
          - type: paragraph
            body: >
              2024–2026 年，人工智能已经成为 Vanta 最重要的产品差异化方向，平台从工作流自动化（用软件驱动流程替代人工步骤）转向智能增强自动化（在风险评估、证据解读和问卷回复中，用 AI
              推理替代部分人工判断）。目前已有三类不同 AI 能力进入正式可用或后期 beta：(1) Questionnaire Automation AI（2024
              年推出）——基于客户现有合规证据和历史问卷回复，用大语言模型自动起草潜在客户发来的安全问卷答案；(2) Riskey AI 智能体（2025 年 9 月推出）——把 AI
              用于风险管理生命周期，自动评估风险严重性、建议处置计划，并把风险映射到已连接证据库中的受影响控制项；(3) AI Agents for Compliance Workflows（2026 年 3 月
              GA）——多步骤 AI 智能体，可自主完成审计准备任务，把模糊事项升级给人工审核者，并在审计周期之间持续维护合规状态评估。

              AI Governance 模块把 Vanta 的 AI 叙事延伸到客户自己的 AI 项目：该模块提供 ISO 42001（AI 管理体系）、NIST AI Risk Management
              Framework，以及新兴 EU AI Act 合规工作流的框架模板。这让 Vanta 有机会承接 AI/ML 公司支出，因为这些公司需要向自己的企业客户证明负责任的 AI
              治理。本章的成熟度图（FE004）显示，AI 能力在各模块中的部署深度并不均衡：Questionnaire Automation 和 Riskey GRC 的 AI 集成最深；截至 2026 年中，Access
              Reviews、Pen Testing 协调和 Privacy Automation 的 AI 增强有限或尚未出现。这种不均衡既反映产品投资节奏，也反映不同工作流自动化难度不同。主要 AI
              风险是问卷回复和风险评估中的模型质量波动——低置信度 AI 输出如果未经人工审核就提交，可能给客户制造合规责任。Vanta 目前的设计看起来仍让人工保留最终审批权，但产品自身的详细 AI
              治理实践（模型版本管理、置信度阈值、回退处理）并未公开记录。
