      - number: '8.6'
        title: 投资建议和风险评级
        blocks:
          - type: paragraph
            body: >
              建议：按 Series D 入场价（投后 $2.45 billion）有条件买入；若有投后低于 $2.0 billion 的老股机会，应明显优先。

              置信度：中等。投资逻辑基本扎实——市场增长、产品防御力和管理层质量都偏正面——但估值留出的安全边际有限。公司未披露经审计财务，毛利率、Rule-of-40 和烧钱 效率都难以下高置信度判断，而这些指标是支撑
              8–12× ARR 倍数的关键。

              风险评级：中高。核心风险是估值倍数压缩（未来四年倍数下降 10–20% 的概率为 60%）、Drata 和超大规模云厂商带来的竞争冲击（概率 25%），以及合规自动化之外的平台扩张执行风险（概率 30%）。

              目标回报 / 持有期 / 退出：4–5 年期内实现 2.5–4.0× 投入资本回报，假设基准情景下 IPO 或以 $3.5–5.0 billion 战略退出。退出偏好：若 Vanta 到 2028 年
              Rule-of-40 高于 50、ARR 高于 $500 million，则优先 IPO；若增长放缓或市场倍数仍受压，则战略出售。

              估值立场：$2.45 billion 属于公允价值。这是一项优质资产，但价格也已充分。投资论点没有破裂，但安全边际很窄。低于 $2.0 billion 入场会显著改变风险 / 回报结构，是强烈优先的情景。
              当前隐含 ARR 倍数约 8.2×，价格反映了市场共识中的质量溢价，但还称不上便宜。按 Series D 入场的投资者承担了增长放缓的全部风险，却没有估值缓冲。
