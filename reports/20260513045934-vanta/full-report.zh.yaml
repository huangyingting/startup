      - number: '4.5'
        title: 资本充足性与现金跑道
        blocks:
          - type: paragraph
            body: >
              以任何私有市场基准看，Vanta 的资本位置都很强。公司五轮股权融资累计约 $504M（2018 年种子轮 $3M、2021 年 A 轮 $50M、2022 年 B 轮 $150M、 2024 年 7 月 C 轮
              $150M、2025 年 7 月 D 轮 $150M）。融资时间线已在第 1 章（公司概况）详细覆盖；本节聚焦财务承销中的前瞻资本充足性。

              D 轮以 $4.15B 投后估值完成，由 Wellington Management 领投，Sequoia、Craft Ventures、Goldman Sachs、J.P. Morgan 和 Y
              Combinator 参投。Wellington 明确表示，其策略是与下一代上市公司合作，将 Vanta 定位为 IPO 候选。CEO Christina Cacioppo 公开表示， 公司在 D
              轮完成前尚未使用 C 轮的大部分资金——这是强资本效率信号，说明自然 ARR 增长已为大部分运营成本基础提供资金。基于这一评论和标准 D 轮资金部署模式， 估计 D 轮后在手现金超过 $200M。

              按月烧钱 $8M–$15M 估计（基于员工数增长轨迹、云基础设施成本和该阶段 SaaS 公司基准推断），从 D 轮完成（2025 年 7 月）算起的估计现金跑道为 18–36 个月—— 如果 Vanta 接近
              $200M 最低现金阈值，下一轮触发窗口约在 2026 年底至 2027 年中。不过，在 63% 收入增长和 $300M ARR 基础上，如果利润率按计划改善，
              公司正在接近规模化后潜在自我供血阈值。公开信息未披露任何债务工具、项目融资或信贷额度。没有任何来源称 Vanta 承受资本压力。
