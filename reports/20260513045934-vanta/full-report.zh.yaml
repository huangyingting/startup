      - number: '7.2'
        title: 运营、质量与安全风险
        blocks:
          - type: paragraph
            body: >
              Vanta 最灾难性的运营风险，是自身平台发生重大数据泄露。与多数 SaaS 供应商不同，Vanta
              是客户最敏感合规材料的中央仓库：渗透测试结果、员工访问审查、安全政策、供应商风险评估和审计证据包。一旦这些数据泄露，不仅会立刻造成声誉损害，也会触发 GDPR 和 HIPAA
              下针对任何受影响客户的监管调查。IBM 的 2025 Cost of a Data Breach Report 估计全球平均泄露成本为 $4.88M，但对持有受监管合规数据的平台来说，敞口很可能是该数字的数倍。

              服务可用性风险在审计高峰窗口尤其重要。如果审计员需要访问证据包时 Vanta 平台不可用，客户会面临直接运营中断，包括可能错过截止日期或认证失败。AWS
              单云架构扩大了任何基础设施事件的影响半径。来自“错误合规信心”的质量风险是结构性问题：客户可能把自动化证据收集等同于人工审查，从而留下能通过自动检查、却在审计或真实安全事件中失败的控制缺口。

              Vanta 的 400+ 第三方集成制造了一条长尾、脆弱的证据收集依赖链。当 Okta、GitHub 或 AWS 这类 SaaS 供应商发布破坏性 API 变更时，对应 Vanta
              集成可能静默失败，在客户合规项目中造成证据缺口，且不会立即通知。G2 和 Reddit 评论者明确提到边缘集成场景中的数据同步失败和证据收集错误。AI 生成问卷回复功能（Questionnaire
              AI）进一步制造质量风险：基于训练数据或不完整供应商上下文生成的回复可能包含错误；如果这些回复在发送给潜在客户前未经审核，可能构成不实陈述。Vanta 持有 SOC 2 Type II
              认证，并每年进行渗透测试，这是主要缓释措施；但具体 RTO/RPO 和 SLA 承诺并未公开披露。
            claimRefs:
