  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Vanta 位于三个相互重叠的市场交汇处：合规自动化、信任管理，以及更广义的治理、风险与合规（GRC）软件。市场边界必须划清，因为研究机构定义差异很大，三个市场的增长轨迹也不同。


              对 Vanta 核心业务最窄、也最相关的定义是合规自动化——软件持续监控云基础设施，自动收集证据，并引导团队完成安全认证（SOC 2、ISO 27001、HIPAA、PCI DSS、GDPR 等）。该子领域在
              2025 年估计约 $2.8 billion，并以 25%+ CAGR 增长，是广义 GRC 版图中增长最快的部分。这是 Vanta 的主场市场。


              中间口径是 GRC 软件市场，它在合规自动化之外，还包括企业政策管理、内部审计、风险管理工作流和监管报告。Mordor Intelligence 估算该市场 2025 年为 $21.04 billion，并预计
              2031 年达到 $39.01 billion，CAGR 为 10.84%。Technavio 更宽口径的估算为 2026 年 $65.2 billion，纳入了安全意识培训、身份治理和部分端点安全等相邻支出。


              最宽的圆圈包括信任管理——也是 Vanta 自己偏好的品类——并叠加第三方风险管理（TPRM，约 $8 billion 子市场）、隐私管理（约 $5 billion）和 AI 治理（新兴市场，30%+
              CAGR）。Vanta 正通过 TPRM、Privacy Automation 和新的 AI 治理工具，主动进入这些相邻领域，显示出有意扩张 TAM 的策略。


              现状替代方案仍是市场的重要组成部分。在自动化之前，公司通过以下方式管理合规：（1）用电子表格和共享云盘收集证据；（2）依赖四大 /
              精品咨询公司做审计准备；（3）使用针对特定框架的点状工具。从咨询转向自动化平台仍处早期——估计多数申请首张 SOC 2 证书的公司完全没有自动化工具，意味着仍有大量绿地机会。
            claimRefs:
