      - number: '1.2'
        title: 领导层、董事会与治理
        blocks:
          - type: paragraph
            body: >
              Vanta 高管团队由 CEO Christina Cacioppo 领导。她在 28 岁时联合创立公司，此前曾在 Dropbox（负责 Dropbox Paper 产品管理）和 Union Square
              Ventures（风险投资）任职。Cacioppo 来自 Ohio，毕业于 Stanford 经济学 / 工程专业； 2025 年 7 月 D 轮完成后，她持有的股权估值约 $830
              million。领导层覆盖主要 SaaS 职能：Stevie Case（CRO，曾任 Twilio 中端市场 VP）、Scott Holden（CMO，曾在 Brex 和 ThoughtSpot
              任职）、David Eckstein（CFO，曾任 Menlo Security）、Jadee Hanson（CISO，曾任 Code42）以及 Jeremy Epling（CPO，推动 Vanta
              智能体信任战略的关键产品高管）。 Ari Shahdadi 担任运营与业务发展负责人。CEO 层面存在关键人物集中风险；Cacioppo 是主要外部代表、核心融资设计者和产品愿景持有人。 董事会已确认成员包括
              Sequoia Capital 的 Andrew Reed。D 轮领投方 Wellington Management 的 Matt Witheiler 是关键战略投资人，Cacioppo
              称其为长期伙伴，但其正式董事会角色尚未公开确认。公司以远程优先运营，员工分布在美国、英国和澳大利亚。 联合创始人 Erik Goldman 已不再参与公司；其离开未伴随公开争议。
