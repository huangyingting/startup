      - number: '6.5'
        title: 扩张动力、集中度风险与先落地后扩张模型
        blocks:
          - type: paragraph
            body: >
              Vanta 的先落地后扩张模型通过两条主要扩张路径运转：框架扩张（在初始 SOC 2 项目上增加 ISO 27001、HIPAA、PCI-DSS 或 GDPR）和模块扩张（在合规基础上增加
              TPRM、Questionnaire Automation、Privacy、Access Reviews 或 AI Governance）。ACV 从 2025 年 4 月约 $17,000 增至 2026 年
              4 月 $18,750，确认存量客户扩张收入为正且具有实质规模——10.3% 的混合 ACV 提升，意味着现有客户扩张已经超过同期导入低 ACV 新客户造成的 ACV 稀释。

              客户集中度风险低。Vanta 拥有 16,000+ 客户，估计最大客户 ACV 低于 $500,000，因此单一客户可能不超过总 ARR 的 0.5–1.0%。这种高度分散的客户基础，让 Vanta 免于许多企业
              SaaS 公司面临的单一客户依赖风险。地域集中（70% 北美）对长期国际增长构成中等风险，但 GDPR 驱动的欧洲客户采用和公司 Dublin 办公室扩张，正在缓释这一点。

              SMB 流失是最实质的留存风险：Reddit 和 G2 证据持续提到，20–30% 的续约涨价会推动客户评估 Drata
              等替代方案，尤其是已经完成首次审计、正在权衡续约还是迁移的成本敏感型初创公司。合规粘性效应——认证期间积累的证据历史、集成工具和审计员关系——提供了有意义的切换成本屏障，但无法完全消除价格敏感度。与
              Deloitte、KPMG 和 PwC 正在形成的伙伴渠道关系，预计会逐步提高企业客户质量，并降低由 SMB 驱动的流失集中度。扩张风险表（TU005）列出了每个风险维度的缓释措施和优先尽调问题。
