  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入来源与定价模型
        blocks:
          - type: paragraph
            body: >
              Vanta 的收入全部来自年度订阅合同，因此是纯经常性收入 SaaS 业务。客户预付年度费用，以获得合规自动化平台访问权；收入在合同期内按比例确认。基础收入驱动是按框架授权： 客户订阅一个或多个合规框架（SOC
              2、ISO 27001、HIPAA、PCI DSS、GDPR 及其他 30 多项），单框架费用随员工数扩大而上升。这自然形成 先落地再扩张：早期公司通常先从单一框架切入（往往是为回应企业客户的 SOC 2
              要求），随后在合规项目成熟后添加更多框架。

              在核心框架订阅之外，Vanta 通过不断增加的附加模块获得增量收入。目前可变现附加模块包括 Trust Center（面向客户的合规门户）、TPRM/VRM（第三方和供应商风险管理）、 Questionnaire
              Automation（AI 辅助安全问卷回复）、Privacy Automation（GDPR/CCPA 工作流自动化）和 AI Governance（ISO 42001 与 EU AI Act
              准备度）。每个附加模块单独定价，标价未披露，并在每个续约周期带来增量 ACV 抬升。

              客户数从约 12,000（2025 年中）增至 16,000+（2026 年 4 月），账户数增长约 33%。同期 ARR 增长 63%（从约 $200M 增至 $300M+）， 意味着平均 ACV 扩大约
              22–25%——这是先落地再扩张执行有力的信号。2026 年 4 月隐含平均 ACV 约 $19K / 客户，与 Vendr 报告的订阅者年支出中位数 $19,800 一致。纯 SaaS
              模式加年度预付，使收入确认问题较少；公开信息中没有大规模的可变用量、里程碑或专业服务收入。
