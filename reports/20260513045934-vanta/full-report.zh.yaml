      - number: '1.5'
        title: 产品套件与关键里程碑
        blocks:
          - type: paragraph
            body: >
              Vanta 产品从 2018 年单一框架的 SOC 2 合规工具，扩展为截至 2026 年初拥有六个核心产品区的综合智能体信任平台： （1）覆盖 35+ 框架的 Compliance
              Automation；（2）Trust Graph——基于 400+ 集成，实时映射一家公司控制项、供应商关系、证据和合规义务； （3）Vanta Agent——24/7 自主 GRC
              工程师，编排合规、审计、供应商风险、问卷和客户承诺；（4）Third-Party Risk Management（TPRM），借助 AI 分析和持续监控，供应商评估速度最高提升 50%；（5）Trust
              Center，一个面向客户的安全与合规文档共享门户； （6）Questionnaire Automation，在 Scale 档位每年最多可自动化 288 份安全问卷。Vanta 于 2025 年中收购以色列公司
              Riskey，以加入 AI 驱动的持续风险监控。2026 年，Vanta 推出用于 GRC 工程集成的 MCP Server 和 REST API。Vanta 是首批获得 ISO 42001（AI
              管理体系标准）认证的公司之一。2024 年 5 月，一起产品数据泄露事件曾短暂暴露数百名客户的数据——CEO Cacioppo 公开披露，称问题已解决，并记录了预防措施。关键里程碑包括 YC 毕业（2018）、A
              轮估值 $500M（2021）、B 轮成为独角兽（$1.6B，2022）、$100M ARR 里程碑（2024 年 1 月）、C 轮估值 $2.45B（2024 年 7 月）、D 轮估值 $4.15B （2025
              年 7 月）、Vanta Agent 发布（2025 年中）以及 $300M ARR 里程碑（2026 年 4 月）。
