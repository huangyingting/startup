  - id: TE003
    title: 技术 / 运营架构表
    layout: wide
    columns:
      - 层级
      - 组件 / 工具
      - 关键功能
      - 依赖
      - 可靠性 / 风险说明
    rows:
      - - 基础设施
        - Amazon Web Services（主云）；AWS EC2、S3、RDS、Lambda（推断）；无本地部署选项
        - 为所有 Vanta 平台服务提供计算、存储、数据库和网络；DR 与备份；多 AZ 部署（推断）
        - AWS 区域可用性；EC2、S3、RDS 的 AWS 服务健康状态
        - 单一云服务商依赖（AWS）；区域故障会影响服务可用性；多 AZ 架构和 SOC 2 BCP 控制项可缓释风险；尚未确认公有云多区域故障切换
      - - 数据与证据库
        - 不可变证据库；政策库；审计轨迹；供应商问卷数据库；静态 AES-256 加密
        - 存储从集成中收集的合规证据；维护所有证据提交的审计轨迹；向审计师工作区和报告层提供证据
        - AWS S3 或同类对象存储（推断）；数据库加密密钥管理
        - 证据不可变性是审计抗辩力的核心；密钥管理做法没有公开细节；密钥管理失败可能影响证据完整性
      - - 集成层
        - >-
          400+ 预置连接器：AWS、GCP、Azure、GitHub、GitLab、Okta、Azure AD、Salesforce、Jira、Slack、CrowdStrike、Carbon
          Black、Jamf、Google Workspace 以及 380+ 其他连接器；REST API；webhooks；面向 SaaS 集成的 OAuth 2.0
        - 从已连接工具持续收集证据；实时和定时轮询；基于 API 提取数据；通过 REST API 和 webhooks 支持自定义集成
        - 每个已连接工具的第三方 SaaS API 可用性；API 版本稳定性（供应商更改 API schema 时连接器会失效）
        - 400+ 连接器需要随着第三方 API 演进持续维护；已连接工具（如 GitHub、Okta）弃用 API 时，受影响控制项的证据收集可能暂时中断；Vanta 工程团队维护连接器更新
      - - AI 与智能层
        - LLM/AI 提供商（未披露）；Riskey AI agent（自有）；Questionnaire Automation AI；AI 治理模板；合规 AI Agents（2026 年 3 月 GA）
        - 自动化风险评估（Riskey）；问卷答复生成；合规任务自动化；风险到控制项映射
        - LLM/AI 提供商 API 可用性和模型质量；与 AI 提供商签订处理客户证据数据的数据处理协议
        - LLM 提供商依赖给 AI 相关功能带来延迟和可用性风险；外部 AI 提供商如何处理数据，是受监管行业客户（PHI、PCI 数据）的隐私顾虑；公开文档未审计 AI 模型输出质量
      - - 应用层
        - 合规自动化引擎；证据管理；GRC / 风险模块；TPRM；问卷和隐私自动化；访问审查；Trust Center；审计师工作区
        - 核心合规工作流管理；控制项评估；差距识别；修复跟踪；多框架证据映射；客户和审计师用户界面
        - 用于 SSO/SAML 的身份提供商（Okta、Azure AD、Google）；RBAC 执行；会话管理
        - 每新增一个模块，应用层复杂度都会上升；RBAC 配置错误可能带来权限提升风险；多租户数据隔离是关键安全要求，但公开资料没有细节
      - - 展示与报告层
        - Trust Center（公开门户）；合规仪表盘；PDF 审计报告生成；风险态势视图；董事会报告模板；移动端自适应 Web UI
        - 面向客户的合规状态；审计师证据共享；面向潜在客户的 Trust Center；高管报告；实时控制项状态
        - Web 浏览器兼容性；PDF 生成库；保障公开可用性的 Trust Center CDN
        - 客户把 Trust Center 用于销售赋能时，公开可用性就是业务关键；任何停机都会直接打断潜在客户安全审查；Trust Center 性能和可用性依赖 CDN
    notes: 架构细节基于公开文档、developer.vanta.com 的 API 文档、status.vanta.com 正常运行时间数据和产品页描述推断。除 AWS 托管外，具体基础设施供应商选择未公开披露。
