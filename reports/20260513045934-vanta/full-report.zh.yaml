      - number: '4.4'
        title: 公开牵引力与私有指标缺口
        blocks:
          - type: paragraph
            body: >
              Vanta 公开披露的财务指标仅限于顶线 ARR 和客户数，这符合私营公司在该阶段的惯例。公司对 ARR 轨迹的透明度异常高——披露 2026 年 4 月 $300M ARR（官方公告）、63%
              同比增长，以及可三角推断出九个月内从 $200M 增至 $300M 的里程碑进展。这些指标足以部分建模业务，但关键承销输入仍未披露。

              最重要的私有指标缺口包括：（1）毛利率——用于评估经营杠杆和盈利时间线；（2）净留存率——用于验证 63% 收入增长是否掩盖了队列底部的流失侵蚀；（3）获客成本和 LTV——用于评估规模化后的单位经济可持续性；
              （4）按产品线拆分的 ARR——用于判断增长由核心合规（高毛利、高经常性）驱动，还是由专业服务或附加模块（毛利较低或一次性）驱动。隐含 NRR 高于 120%，来自每客户 ACV 九个月内从 $17K 升至
              $19K 的推断，但公司未确认。

              次要缺口是按客户细分和队列年龄拆分的 ARR。缺少队列级数据，就无法判断 16,000+ 客户基数是否具备高总留存（客户数和金额口径），还是企业细分强扩张掩盖了 SMB 长尾更高流失。Comparably 和
              Wolfia 上的客户评论反复提到定价不透明和成本意外上涨，说明价格敏感细分的总留存可能低于标题式 NRR。该风险重要，但无法从公开数据量化。
