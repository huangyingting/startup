  - id: FV001
    title: 投资建议逻辑
    type: flow
    layout: standard
    summary: >-
      该决策流展示投资建议逻辑：从入场价格评估，到投资论点健康检查，再到最终建议；每个阶段都设置论点破裂的退出匝道。流程强化核心入场纪律：若入场估值低于 $2.0B，投资理由成立；若按 $2.45B Series D
      价格进入，空间就很紧。
    data:
      nodes:
        - id: n1
          label: 评估入场价格
          detail: 入场价格是否不高于 $2.45B 的 Series D 投后估值？
        - id: n2
          label: 低于 $2.0B（二级市场）
          detail: 优先入场点——上行不对称；优先清算权压力已被吸收
        - id: n3
          label: $2.0–2.45B
          detail: 可接受入场点——安全边际有限；已接近完整公允价值
        - id: n4
          label: 高于 $2.45B
          detail: 回避——相对公允价值有溢价；需要 $5B+ 退出才能达到目标回报
        - id: n5
          label: 投资论点健康检查
          detail: NRR 高于 110%，ARR 增长高于 30%，超大规模云厂商未入场，未发生重大泄露
        - id: n6
          label: 有条件买入
          detail: 持有至 IPO 或 2027–2030 年战略退出；每季度监控论点破裂触发项
        - id: n7
          label: 论点破裂已触发
          detail: 在下一次流动性事件退出；没有重大新信息时不要摊低成本
      edges:
