        - 事件响应流程、合同中的客户通知义务、SOC 2 Type II
        - 中 — 上市公司客户集中度未知；级联披露风险尚无先例
        - 量化上市公司客户贡献的 ARR 占比；确认合同中的事件通知 SLA
      - - R-REG-004
        - 数据隐私
        - CCPA 和美国州隐私法拼图；Virginia、Colorado、Texas 等新州法生效后，Vanta 必须更新合规库；若未跟上，会造成客户合规缺口
        - 高
        - 中
        - 持续更新合规库、法律监测计划、遵循 FTC 数据安全指引
        - 中低 — 州法持续扩张，但 Vanta 已展示更新节奏
        - 审阅 Vanta 合规库对 2025-2026 年州法新增项的更新时间表
      - - R-REG-005
        - AI 监管
        - EU AI Act（2026 年 8 月生效）对高风险 AI 系统提供者提出要求；Vanta 的 Riskey AI 智能体和 AI 治理模块必须满足透明度、人工监督和准确性要求，否则面临执法
        - 中
        - 高
        - 人在回路设计理念、AI 治理模块、持续监管监测
        - 中 — 具体 EU AI Act 合规路线图未公开披露
        - 确认 Vanta 的 EU AI Act 准备度评估，以及 AI 治理模块整改时间表
      - - R-REG-006
        - 知识产权 / 专利
        - Vanta 未披露专利；ServiceNow 和 IBM 等既有厂商持有大量 GRC 与合规自动化专利组合，可能针对 Vanta 的自动化证据收集和工作流自动化方法主张权利
        - 低
        - 高
        - 截至目前，未披露既有厂商针对 Vanta 的专利变现行动；自由实施分析未披露
        - 中低 — 无现行诉讼，但 Vanta 规模扩大后风险上升
        - 向 Vanta 法律顾问索取覆盖核心自动化工作流专利的自由实施分析
      - - R-REG-007
        - 合同 / SLA
        - Vanta 平台可用性 SLA 承诺未公开披露；如果 Vanta 在关键审计窗口不可用，客户可能获得违约救济，包括终止权和罚款支付
        - 低
        - 中
        - SOC 2 Type II 可用性标准、多区域 AWS 部署、24/7 监控
        - 中低 — SLA 条款未确认；审计窗口对许多客户高度关键
        - 获取 Vanta 标准企业 SLA 条款；确认正常运行时间 SLA 百分比和补偿结构
  - id: TR002
    title: 运营 / 质量 / 安全风险登记表
    columns:
      - 风险 ID
      - 风险类别
      - 描述
      - 可能性
      - 影响
      - 当前缓释措施
      - 剩余敞口
      - 尽调问题
    notes: 可能性和影响评级为定性评估；截至 2026 年 5 月，Vanta 未披露数据泄露或 SLA 违约历史。RTO/RPO 和具体 SLA 条款未公开，需要资料室验证。
    rows:
      - - R-OPS-001
        - 数据安全
        - Vanta 发生重大数据泄露；平台集中保存 16,000+ 客户的合规证据、安全测试结果、HR 记录和渗透测试发现；一旦泄露，会造成灾难性声誉损害和监管责任
        - 中低
        - 严重
        - SOC 2 Type II 认证、年度渗透测试、漏洞赏金计划、静态和传输加密
        - 高 — 高敏感数据集中汇聚扩大爆炸半径；截至目前未披露数据泄露历史
        - 审阅最近一次渗透测试执行摘要；确认漏洞赏金计划范围和整改 SLA
      - - R-OPS-002
        - 服务可用性
        - 审计高峰窗口发生平台中断；当审计师需要访问门户，或客户正在提交证据包时，如果 Vanta 不可用，客户会直接受到审计截止期限干扰
        - 中低
        - 高
        - 多区域 AWS 部署、24/7 监控、灾难恢复流程
        - 中 — 具体 RTO/RPO 未披露；AWS 单云依赖放大宕机风险
        - 获取 Vanta 公开或合同约定的 RTO/RPO；确认 DR 测试频率和最近一次 DR 演练结果
      - - R-OPS-003
        - 集成可靠性
        - 第三方 API 集成（400+ 项集成）静默失败；Okta、GitHub 或 AWS 等供应商的破坏性 API 变更，可能在客户未被立即通知的情况下中断证据收集
        - 中
        - 高
        - API 监控、集成健康仪表盘、客户通知、工程分诊 SLA
        - 中 — 400+ 项集成带来庞大维护面；API 故障检测延迟可能达到数小时
        - 审阅集成故障率数据；确认集成中断的告警流程和客户通知 SLA
      - - R-OPS-004
        - 质量 / 合规保障
        - 自动化测试带来错误的合规信心；客户可能把自动化通过的控制项等同于人工复核，因未发现的控制缺口导致审计失败或真实安全事件
        - 中
        - 高
        - 人在回路工作流设计、审计师复核层、明确提示自动化测试覆盖范围
        - 中 — 自动化合规天然存在结构性风险；Vanta 需要教育客户、管理预期
        - 审阅 Vanta 关于自动化范围边界的客户文档；评估需要人工证据的控制项如何标记
      - - R-OPS-005
        - AI 质量
        - AI 生成问卷回复出错；如果训练数据或供应商上下文不完整，Questionnaire AI 可能生成不准确或幻觉式安全问卷回复；向潜在客户发送错误回复可能构成虚假陈述
        - 中
        - 中
        - 建议发送前人工复核；答案置信度评分；可编辑 AI 生成回复
        - 中 — LLM 幻觉风险无法完全消除；客户复核行为不一
        - 审阅 AI 回复准确性测试方法；确认客户是否在合同中承担使用前复核 AI 输出的责任
      - - R-OPS-006
        - 供应链安全
        - Vanta 自身软件供应链安全；第三方库、CI/CD 流水线完整性和开源依赖可能把漏洞带入 Vanta 平台
        - 低
        - 高
        - SOC 2 Type II 变更管理控制、软件成分分析、安全代码审查
        - 中低 — 标准企业 SaaS 风险；SOC 2 控制可缓释但不能清零
        - 索取 Vanta 软件成分分析结果和 SBOM 政策；审阅 SOC 2 报告中的 CI/CD 安全控制
  - id: TR003
    title: 合作伙伴 / 依赖风险登记表
