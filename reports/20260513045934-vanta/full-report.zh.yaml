      - number: '2.3'
        title: 买方与细分市场地图
        blocks:
          - type: paragraph
            body: >
              合规自动化买方可分成三个主要细分，预算归属、购买驱动和产品要求各不相同：


              初创 / 早期阶段（ARR $0–$5M）：触发点是客户要求——通常是企业级潜在客户拒绝在没有 SOC 2 报告时签约。经济买方是 CEO 或 CTO。预算来自
              G&A，有时也来自销售预算（被包装成收入赋能工具）。平均 ACV 为 $10,000–$20,000。Vanta 凭借自助入门和 Y Combinator 网络效应主导这一细分。


              中端市场 SaaS（ARR $5M–$100M）：驱动因素从单一客户要求，转向系统化赋能企业销售。买方是 CISO、工程 VP 或合规负责人，拥有专门安全预算。多框架合规（SOC 2 + ISO 27001 +
              HIPAA）很常见。ACV 区间为 $20,000–$75,000。这是 Vanta 当前最大的客户群。


              企业（ARR $100M+，或非 SaaS 行业）：驱动因素包括监管强制、董事会层面的风险治理和网络保险要求。采购涉及 InfoSec、法务和财务。采购周期为 3–9 个月。叠加 VRM、Privacy 和
              Trust Center 后，ACV 可超过 $100,000。Atlassian、Snowflake 和 GitHub 客户胜利证明了 Vanta 的企业牵引力。


              按垂直行业：BFSI 占企业 GRC 支出的最大份额（Mordor 显示约 24.6%）。医疗健康到 2031 年增长最快，CAGR 为 14.15%。科技 / SaaS 公司是 Vanta 今天的主要垂直；向
              BFSI、医疗健康和政府（FedRAMP 试点）扩张，意味着切入渗透率较低的垂直领域。
