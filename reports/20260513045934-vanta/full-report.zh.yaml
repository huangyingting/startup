      - number: '5.6'
        title: 产品路线图与开发速度
        blocks:
          - type: paragraph
            body: >
              Vanta 自 2022 年以来的发布节奏，体现出双轨开发策略：一条是基础轨道，在 2022 到 2024 年间把集成库从约 200 个连接器快速扩展到 400+；另一条是模块扩张轨道，自 2023
              年起每半年新增能够创收的附加模块。随着连接器库已广泛覆盖企业 SaaS 技术栈，基础轨道已经放慢；新增连接器现在更多聚焦小众工具、遗留系统和垂直行业平台，而不是高使用量的主流集成。模块扩张轨道没有放缓迹象，AI
              Governance、访问审查和隐私自动化等新模块在过去两年均已 GA，AI Agents 也在 2026 年 3 月 GA。

              2026 年 3 月面向合规工作流的 AI Agents GA 发布，加上同一份 BusinessWire 新闻稿中宣布的企业控制扩展，表明 Vanta 有意转向更高端的企业买家。这与 2025 年 7 月到
              2026 年 4 月观察到的 ACV 从约 $17K 扩大到约 $19K 一致——增长由附加模块采用率和更高 ACV 的企业交易共同驱动。2025 年 9 月 Riskey AI 智能体发布，标志着 Vanta
              平台内第一个自主 AI 智能体出现，也代表平台从工作流自动化迈向“替代判断”的 AI。向前看，Vanta 尚未公开披露具体产品路线图，除了泛化的 AI
              扩张和企业控制增强；但招聘信息和产品页更新显示，公司会继续加深 GRC 模块、扩展企业访问控制，并围绕 DORA 和 EU AI Act 合规深化隐私自动化。主要路线图风险在于 AI 模型质量和企业信任：如果
              AI 生成的合规材料在真实审计环境中出现实质错误，声誉损害可能拖慢 AI 功能采用，并迫使 Vanta 增加昂贵的人工审核层，从而推高 COGS、削弱自动化价值。到 2027 年前，AI
              质量风险是路线图上最重要的技术风险。
