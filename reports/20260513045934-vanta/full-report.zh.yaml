      - number: '6.2'
        title: 客户增长与采用轨迹
        blocks:
          - type: paragraph
            body: >
              Vanta 从 2023 年 4 月估计 3,500 名客户、$69M ARR，增长到 2026 年 4 月的 16,000+ 客户、$300M ARR，是合规自动化领域最快的扩张轨迹之一；在客户数和 ARR
              上，Vanta 已明显领先任何公开已知竞争对手。2026 年 4 月宣布的 63% 年同比 ARR 增速，意味着 Vanta 在 2025/2026 财年大约新增 $116M 净新增
              ARR。这个数字显著超过多数合规自动化初创公司的总 ARR，也让 Vanta 按当前增速有望在两年内迈向 $500M ARR。

              隐含平均合同价值轨迹揭示出一个重要动态：ACV 从 2023 年 4 月约 $19,700 小幅降至 2024 年 4 月约 $15,100，与公司以更低进入价激进渗透 SMB
              市场一致。随后，随着多框架采用和模块增购开始抵消销量驱动的价格稀释，ACV 在 2025 年 4 月回升至约 $17,000，并在 2026 年 4 月升至 $18,750。ACV
              回升趋势是先落地后扩张模型达到临界规模的强领先指标：来自存量客户的扩张 ARR，正在跑赢低价新客户导入造成的 ACV 稀释。

              漏斗视角（FU002）展示了从总可用市场中约 350,000 家公司，到 16,000+ 付费客户的转化路径；认知阶段（估计 50,000 家公司）到评估阶段（估计 20,000 家）之间仍有明显流失，说明
              Vanta 可服务 SMB 细分市场仍处于较早渗透阶段，机会尚未充分释放。2025 年 7 月 Series D 据报道以 $4.15B 估值完成（以当时 $250M ARR 计，约 16.6x
              ARR），随后又被 2026 年 4 月 $300M ARR 里程碑验证，确认 Vanta 的执行增速配得上其溢价估值。
