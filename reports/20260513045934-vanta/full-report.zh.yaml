  - id: TE002
    title: 工作流 / 用例表
    layout: wide
    columns:
      - 用例
      - 客户分层
      - 工作流
      - Vanta 角色
      - 结果 / ROI 信号
    rows:
      - - 首次 SOC 2 Type II 认证
        - SMB（<100 名员工）
        - 连接云 / 身份工具 → 自动收集证据 → 差距修复仪表盘 → 审计师工作区 → 认证 → 发布 Trust Center
        - 证据自动化、审计师工作区、框架控制项映射；省掉手工审计准备
        - SOC 2 可在 3–6 个月内完成，只需 1 名兼职专人投入；手工推进通常要 12 个月以上；解锁首批企业客户合同
      - - 多框架合规项目
        - 中端市场（100–1,000 名员工）
        - 在现有 SOC 2 项目上加入 ISO 27001、HIPAA 或 PCI-DSS → 跨框架复用共享证据 → 统一合规仪表盘 → 董事会级报告
        - 跨框架证据复用、共享控制项映射、统一审计轨迹、董事会报告模板
        - 省掉跨框架重复收集证据；一组集成覆盖多项认证；相较手工方式，合规项目开销估计下降 60–70%
      - - 企业安全尽调自动化
        - 企业级（1,000+ 名员工）
        - 潜在客户发起安全审查 → 授予 Trust Center 访问权限 → 通过 NDA 门控访问认证和问卷答复 → 自定义控制文档
        - Trust Center 作为自助安全门户；NDA 门控访问预先完成的问卷答复；自定义控制文档
        - 移除企业销售流程中的安全问卷瓶颈；安全审查阶段从数周缩到数天；直接影响交易速度
      - - 医疗 SaaS 的 HIPAA + SOC 2 组合
        - 医疗 SaaS 公司
        - 连接 EMR/EHR 集成 → HIPAA 专属控制项映射 → BAA 文档 → SOC 2 + HIPAA 组合证据项目 → 年度审计准备
        - HIPAA 专属控制库、Business Associate Agreement 文档支持，同时为 HIPAA 和 SOC 2 收集组合证据
        - 单一平台同时覆盖 HIPAA 和 SOC 2，不需要单独工具；通过消除点状方案重叠，降低年度合规总成本
      - - 金融科技 PCI-DSS + SOC 2 合规
        - 金融科技和支付公司
        - 连接支付处理商 API、云环境 → PCI-DSS 控制项映射 → 识别与 SOC 2 的重叠 → 统一收集证据 → Level 1 或 Level 2 QSA 审计准备
        - PCI-DSS Level 1 证据收集、QSA 审计协调、与 SOC 2 项目共享证据
        - PCI-DSS + SOC 2 组合可解锁企业金融科技客户和合作伙伴合同；单一平台可替代单独聘请 PCI 合规顾问
      - - AI/ML 公司 ISO 42001 与 NIST AI RMF 治理
        - AI/ML SaaS 公司
        - 盘点 AI 系统 → 映射到 ISO 42001 控制项 → NIST AI RMF 风险评估 → 生成 AI 治理政策库 → 在 Trust Center 发布 AI 治理状态
        - AI Governance 框架模板、AI 系统清单、风险评估工作流、政策生成
        - EU AI Act 和企业买方问卷正在拉动新兴监管要求；Vanta 的先发能力让 AI 公司无需自建内部 GRC 团队也能满足治理要求
      - - 面向供应链安全的供应商风险管理
        - 中端市场和企业级（所有垂直行业）
        - 盘点第三方供应商 → 发送自动化问卷 → 给供应商答复评分 → 持续监控 → 标记高风险供应商 → 将发现映射到合规控制项
        - TPRM 模块：自动化供应商问卷、风险评分、持续监控、控制项关联
        - 替代手工供应商电子表格流程；把供应商风险数据与合规证据库整合在一起；SOC 2 和 ISO 27001 要求记录供应商风险项目
    notes: 工作流描述基于 Vanta 官方产品页、G2 客户评论和分析师报告。ROI 信号为定性判断，基于客户证言和分析师估算，未经财务数据验证。
