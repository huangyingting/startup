      - number: '7.3'
        title: 合作伙伴与基础设施依赖风险
        blocks:
          - type: paragraph
            body: >
              Vanta 的产品架构形成分层依赖结构；任何一层中断，都可能向下游削弱客户合规项目。在基础设施层，Vanta 完全运行在 AWS 上。重大 AWS 区域故障——尤其发生在第四季度审计高峰、许多公司瞄准 12 月
              31 日合规截止日期时——可能同时中断证据收集、审计员门户访问和 Trust Center 可用性。Vanta 可能运行多区域 AWS 部署，但公开资料没有确认多云故障切换或云供应商冗余架构。

              在 AI 层，Vanta 的 Questionnaire AI 和 Riskey 智能体依赖第三方 LLM 供应商，可能是 OpenAI 和 Anthropic；这些 API
              可能遭遇速率限制、政策变化、涨价或可用性事件。如果主要 LLM 供应商突然退出市场（如 2024–2025 年若干 AI 公司曾假设发生的情形），Vanta 的 AI
              功能会停摆，直到替代供应商完成集成并验证。Vanta 尚未公开披露使用哪些 LLM 供应商，也没有披露 LLM 不可用时的回退程序。

              400+ 第三方 SaaS API 集成也许是最隐蔽的依赖风险。每个集成都有自己的版本生命周期；AWS、Okta、GitHub 或 Google Workspace 等高优先级供应商的破坏性变更，可能同时打断
              Vanta 相当一部分客户基础的证据收集。Vanta 的合规库依赖框架制定机构——AICPA（SOC 2）、ISO（27001、42001）和 NIST——发布并维护底层框架。这些机构发布重大更新时，Vanta
              必须更新控制库，并重新验证客户证据映射，造成周期性的合规库维护高峰。审计员网络依赖同样相关：如果大型审计公司发展出偏好的竞争平台，Vanta
              审计员市场可能失去网络效应优势。依赖图（FR003）和风险传导图（FR002）展示了上游依赖失效如何传导为下游客户影响。
