      - number: '1.3'
        title: 融资历史与投资人基础
        blocks:
          - type: paragraph
            body: >
              Vanta 的融资历史显示，公司估值从种子轮快速冲到准独角兽并继续上行。2018 年 4 月，在参加 YC 之后，公司从 Y Combinator 和 Pear VC 获得 $3M 种子轮融资。2021 年 5
              月，Sequoia Capital 领投 $50M A 轮，公司估值约 $500M。 2022 年 6 月，Craft Ventures 领投 $110M B 轮；2022 年 10 月，CrowdStrike
              领投 $40M 延伸轮，公司估值达到 $1.6B， Vanta 成为独角兽。2024 年 7 月，Sequoia Capital 领投 $150M C 轮，估值 $2.45B，Goldman Sachs、J.P.
              Morgan、Atlassian Ventures、CrowdStrike Ventures、HubSpot Ventures、Workday Ventures 和 Y Combinator 也参投。 2025
              年 7 月，Wellington Management 领投 $150M D 轮，将估值推至 $4.15B，一年内接近翻倍。累计融资约 $504M。 值得注意的是，Vanta 在启动 D 轮时尚未使用此前 C
              轮资金的大部分，显示出强现金效率；Wellington 的 Witheiler 确认，公司再次融资前还没有动用 C 轮募集的 $150M。投资人基础横跨种子阶段（YC、Pear
              VC）、传统风投（Sequoia、Craft Ventures）、战略企业（CrowdStrike、Atlassian、HubSpot、Workday）、大型资产管理机构（Goldman Sachs
              Alternatives、 J.P. Morgan、Wellington Management）以及面向创业者生态的战略方（Y Combinator 校友网络）。Wellington
              明确的投资逻辑，是在私有市场与下一代上市公司合作。
