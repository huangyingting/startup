      - number: '1.4'
        title: 规模指标与财务亮点
        blocks:
          - type: paragraph
            body: >
              以私营 SaaS 公司标准看，Vanta 的收入轨迹非常突出。公司用两年从 $10M ARR 增至 $100M，又用 15 个月增至 $200M， 再在 9 个月后（2026 年 4 月）跨过
              $300M。复合增速一段快过一段，是 GRC 软件品类中最快的收入爬坡之一。截至 2026 年 4 月，公司 ARR 同比增长 63%，较 2024 年 $100M 翻了三倍。Vanta Agent
              发布后三个季度，日活用户增长 253%。客户数从 FY2024 约 7,000 家增至 2025 年 7 月 12,000+、2025 年底 14,000+，并在 2026 年 4 月达到
              16,000+，约两年内增长一倍以上。隐含 ARR / 客户从 2025 年中约 $17K 升至 2026 年 4 月约 $19K，反映新增客户和多模块采用带来的更高 ACV。 收入效率很强：Vanta 在完成
              D 轮时尚未花掉 C 轮资金的大部分。每名员工收入估计约 $208K–$300K，显著高于品类基准。 员工数估计 1,000+，分布在美国、英国和澳大利亚；Vanta 远程优先。公司未披露毛利率或
              EBITDA，这也是私营 SaaS 公司在这一阶段的常见盲区。Vanta 最接近的上市可比公司包括 Workiva（$739M 收入，$4.16B 市值）和 OneTrust（ARR 估计 $400M，估值
              $4.5B）。
