      - number: '1.6'
        title: 反向事件与关键人物风险
        blocks:
          - type: paragraph
            body: >
              公开记录中最主要的反向事件，是 2024 年 5 月的一次产品 bug，数百名 Vanta 客户的数据被短暂暴露给其他客户。CEO Cacioppo 在 LinkedIn
              上公开披露该事件，说明补救步骤，并表示问题已完全解决。该事件未被报道触发监管行动或重大客户流失。 联合创始人 Erik Goldman
              离开公司未获公开解释，在历史记录中留下轻度关键人物和联合创始人一致性不确定性。Vanta 对 Christina Cacioppo 的关键人物依赖很重，她是主要融资人、外部代表和愿景持有人。估计 NPS 为
              10（Comparably 显示 40% 推荐者、 30% 被动者、30% 贬损者），G2 评分为 4.6/5（2,400+ 条评论），反映出强满意度与部分不满并存；不满主要集中在企业风险管理功能成熟度、
              小公司定价灵活性和 UI 复杂度。Drata 的竞品分析指出，Vanta 相比替代方案按框架成本更高，且问卷自动化存在上限。截至 2026 年 5 月，公开记录中未发现针对 Vanta
              本身的监管行动、诉讼或重大合规失败。
