    notes: 终止标准阈值是分析师定义的投资逻辑触发点；它们不是 Vanta 官方政策。投资人应按季度跟踪监测指标，并在数据室中对照公司实际报告确认。
    rows:
      - - 数据泄露 / 安全
        - SOC 2 Type II 认证；年度渗透测试；漏洞赏金计划；静态和传输中加密
        - HackerOne 或漏洞赏金提交量；关键 CVE 修补时间；未披露数据泄露
        - 影响 > 100 家公司的客户合规数据重大泄露，并触发监管调查
        - 审阅渗透测试执行摘要；确认漏洞赏金范围和补救 SLA；验证加密密钥管理
      - - 竞争扰动
        - 400+ 集成护城河；Trust Center 网络效应；合规库广度；审计师市场
        - Vanta 对 Drata 胜负比；集成数量差距；G2 评分走势
        - Drata、Sprinto 或 ServiceNow 实现功能同等，并持续 2+ 个季度降价 50%+
        - 做竞争胜负分析；验证集成数量领先仍在；评估 ServiceNow GRC 定价策略
      - - 监管禁止
        - 人在回路设计理念；审计师复核层；合规断言需要审计师签字
        - 欧盟关于自动化合规工具的监管咨询；引用自动化的 GDPR 执法决定
        - GDPR 或欧盟执法行动禁止在没有逐案人工复核的情况下使用自动化合规断言工具
        - 监测 EDPB 关于合规场景中自动化处理的指引；审阅 Vanta 的人工监督文档
      - - 基础设施 / AWS 中断
        - 多区域 AWS 部署；灾难恢复流程；自动故障切换（假设）
        - AWS 服务健康仪表盘；Vanta 正常运行时间监控；客户报告的中断频率
        - AWS 在审计旺季（10–12 月）中断超过 24 小时，影响客户审计时间线
        - 验证 RTO/RPO 目标；确认多区域部署架构；审阅最近一次 DR 演练结果
      - - ARR 增速放缓
        - 多框架采用带来的扩张收入；新模块增购（TPRM、Questionnaire AI、Riskey）；地域扩张
        - NRR 走势；新模块附着率；APAC/EMEA ARR 增长；环比新增客户数
        - ARR 同比增长连续两个季度跌破 30%，显示市场饱和或竞争侵蚀
        - 获取队列级 NRR/GRR 数据；验证模块附着率和扩张 ARR 贡献；评估 SMB 流失走势
