      - number: '8.3'
        title: 可比公司与交易分析
        blocks:
          - type: paragraph
            body: >
              为 Vanta 选择连贯可比对象，需要在两个类比框架之间取舍：一类是带有合规 / 安全敞口的高增长垂直 SaaS 公司，另一类是覆盖更广风险管理范围的 GRC 平台公司。我们同时使用两者，但鉴于 Vanta
              当前收入集中在自动化合规，前者权重更高。

              公开可比公司包括 Qualys（安全合规，约 5.5× 收入，12% 增长）、Tenable（漏洞管理，约 7× 收入，18% 增长）、Rapid7（云安全，约 4× 收入且利润率下降）和
              SailPoint（身份治理，以约 11× 收入重新 IPO）。在更广 SaaS 可比对象中，Zendesk 被 Hellman and Friedman 以 10× 收入收购，以及 Salesforce 以约
              7× ARR 收购 Own Company，构成战略交易可比。在相邻 GRC 领域，IBM 以约 9× 前瞻收入收购 Apptio，为战略收购方愿意为合规相邻经常性收入支付的上限提供了有用参照。

              私人交易数据更稀疏。Drata 上一轮估值约为 $2.0 billion，对应约 $180 million ARR（约 11× ARR），与 Vanta 隐含倍数直接可比，但增长轨迹更快。Sprinto 以 $1
              billion 估值完成 Series B，对应约 $60 million ARR（约 16× ARR），反映早期增长溢价。PitchBook 数据显示，ARR 增长超过 30% 的后期安全 SaaS 公司，在
              2026 年初以 7–12× ARR 交易；这一范围框住了 Vanta 当前隐含倍数。

              RSA Security 以 $2.1 billion 出售给 Symphony Technology Group，代表困境退出底线：一家遗留 GRC 平台在无增长情况下以约 5× 收入出售。Vanta
              相对这条底线的倍数溢价由其增长率支撑，但必须持续增长才能守住当前账面价值。并购先例确认，战略收购方（IBM、Salesforce、SAP）愿意为拥有可防御客户关系的合规相邻经常性收入平台支付 7–11× 收入。
