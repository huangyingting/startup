    - 各产品线毛利率——验证单位经济所需
    - 企业客户（>1,000 名员工）数量及其 ARR 占总 ARR 的比例
    - CAC 回本周期和 S&M 效率比——未披露
    - 完整股权结构表和优先股堆叠深度
