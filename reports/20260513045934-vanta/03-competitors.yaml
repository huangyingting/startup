  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - Moat Claim
      - Threat
      - Severity
      - Mitigation / Diligence Ask
    rows:
      - - 400+ integration library (years of partner engineering)
        - Sprinto (300+) and Drata (170+) both expanding; AWS/GCP native monitoring erodes value for cloud-only use cases
        - Medium
        - Track ongoing integration gap vs. Drata/Sprinto quarterly; assess native cloud monitoring share of wallet at enterprise accounts
      - - Multi-framework workflow lock-in (evidence history, control mappings)
        - Customers with 1–2 frameworks have lower switching cost; AI-driven migration tools could erode this advantage
        - Medium
        - Measure net retention by number of active frameworks per customer; monitor for competitor migration tooling launches
      - - Auditor partner network (200+ qualified partners)
        - Drata building in-house auditor function; Sprinto's expert-guided model reduces need for Vanta-certified auditors
        - Low-medium
        - Track share of Vanta audits routed through partner network vs. direct; assess Drata Auditors growth rate
      - - Brand trust and developer/CISO community recognition
        - Product bug incident (2024 data exposure) and competitor FUD campaigns erode brand; negative G2 review pattern
        - Medium
        - Monitor NPS trajectory, G2 rating trend, and enterprise win/loss ratio quarterly
      - - AI Agent and Riskey acquisition (AI risk intelligence)
        - Competitors launching agentic features simultaneously; Riskey integration unproven at scale
        - High (near-term execution risk)
        - Demand Riskey integration roadmap and customer adoption metrics at diligence; compare agent accuracy KPIs vs. Drata/Sprinto
      - - Trust Center data network effects (shared security posture data)
        - Competing trust centers (Drata/Safebase, Sprinto) accumulating similar network; not yet a winner-take-all dynamic
        - Low-medium
        - Assess trust center unique monthly visitors and questionnaire auto-fill rate vs. competitors
    notes: "Severity ratings are qualitative assessments based on competitive intelligence from G2 reviews, analyst reports, and public company announcements as of May 2026."
    claimRefs: [CP025, CP026, CP027, CP028, CP029, CP030, CP031, CP032, CP033, CP034, CP035]

