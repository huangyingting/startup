      - - Optro (AuditBoard)
        - Enterprise contract; annual license
        - $50,000–$200,000+/yr (enterprise deals)
        - Full audit/risk/compliance platform; AI analytics
        - Implementation fees; training; customization costs
        - Not competitive for startup buyer; aimed at enterprise GRC budgets
      - - OneTrust
        - Enterprise contract; modular by product
        - $20,000–$100,000+/yr depending on modules
        - Privacy, GRC, trust center modules
        - Each module separately priced; significant total cost for full platform
        - Only competitive for organizations with privacy as primary driver
    notes: "Pricing data from Vendr buyer benchmarks, G2 pricing data, analyst estimates, and vendor pages as of May 2026. All figures are estimates; actual prices depend on company size, framework count, and negotiation."
