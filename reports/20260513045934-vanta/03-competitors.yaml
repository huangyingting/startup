        - VRM module, advanced analytics priced separately
        - Similar entry cost to Vanta; potentially better value for multi-framework mid-market
      - - Secureframe
        - Custom quote; per-framework model
        - ~$8,000–$12,000/yr (single framework SMB)
        - Automated evidence, compliance specialists, policies
        - Enterprise features require upgrade
        - Best for startups valuing compliance specialist access
      - - Sprinto
        - Transparent per-framework; integrations included
        - ~$8,000–$15,000/yr (published tiers); lower than Vanta for comparable scope
        - All integrations included in base; 200+ frameworks; expert onboarding
        - Add-ons for TPRM, AI governance
