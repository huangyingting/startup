  - id: TP003
    title: Pricing / packaging comparison
    columns:
      - Vendor
      - Price / Unit Model
      - Entry-Level Cost (Estimated)
      - Included Capabilities
      - Notable Add-Ons / Unknowns
      - Buyer Implication
    rows:
      - - Vanta
        - Modular / per-framework + add-ons; Essentials / Plus / Growth / Enterprise tiers; custom quotes
        - ~$7,250–$15,000/yr (single framework, small team); Vendr benchmarks imply median ~$7.5K/yr for SMBs
        - Core monitoring, integrations, Trust Center (basic)
        - Each additional framework, TPRM, Privacy Automation, Enterprise SSO billed separately; significant upsell exposure
        - Competitive for single-framework startups; costs escalate sharply at 3+ frameworks or enterprise features
      - - Drata
        - Per-framework subscription; base + add-ons
        - ~$10,000–$20,000/yr (single framework)
