  evidenceGaps:
    - id: EGV001
      type: private-evidence-only
      severity: blocking
      topic: financial-disclosures
      missingEvidence: "Audited gross margin, operating expense structure, Rule of 40 score, and NRR are unavailable; only investor characterisations and peer benchmarks can proxy these metrics."
      whyItMatters: "Gross margin below 70% or NRR below 110% would make the 8–12× ARR multiple indefensible relative to public comps; without audited data the growth multiple cannot be responsibly underwritten."
      diligencePath: "Request quality-of-earnings report or Big-4 audited P&L as a blocking pre-investment condition; triangulate gross margin via Glassdoor headcount and typical SaaS cost structure; require CFO-certified NRR schedule."
      relatedQuestionRefs: [QV011, QV017, QV021]

    - id: EGV002
      type: private-evidence-only
      severity: material
      topic: unit-economics
      missingEvidence: "Precise customer count, CAC payback period, and cohort-level churn data are not publicly disclosed; estimates rely on single media reports and investor characterisations."
      whyItMatters: "CAC payback and cohort retention are the core unit economics metrics; improving trends confirm the investment thesis while deteriorating trends are an early thesis-break signal."
      diligencePath: "Obtain sales ops pipeline report and CRM-verified cohort analysis; cross-validate implied customer count with Vanta's own Trust Center public data and LinkedIn employee headcount."
      relatedQuestionRefs: [QV022, QV029]

    - id: EGV003
      type: enumeration-incomplete
      severity: minor
      topic: comparable-valuation
      missingEvidence: "The comparable set covers 8 companies but excludes European GRC vendors (Orca Security, Tugboat Logic), emerging AI-native competitors (Scrut Automation, Anecdotes), and non-US private transaction precedents."
