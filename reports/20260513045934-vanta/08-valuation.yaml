figures:
  - id: FV001
    title: Recommendation Logic
    type: flow
    layout: standard
    summary: >-
      Decision flow showing the investment recommendation logic from entry price assessment
      through thesis health check to final recommendation, with thesis-break off-ramps
      at each stage. The flow reinforces the central entry discipline message: the investment
      case is sound at below $2.0B entry but tight at the $2.45B Series D price.
    data:
      nodes:
        - id: n1
          label: "Assess entry price"
          detail: "Is entry at or below the Series D post-money of $2.45B?"
        - id: n2
          label: "Below $2.0B (secondary)"
          detail: "Preferred entry — asymmetric upside; preference overhang absorbed"
        - id: n3
          label: "At $2.0–2.45B"
          detail: "Acceptable entry — limited margin of safety; full fair value"
        - id: n4
          label: "Above $2.45B"
          detail: "Avoid — premium over fair value; requires $5B+ exit to generate target returns"
        - id: n5
          label: "Thesis health check"
          detail: "NRR above 110%, ARR growth above 30%, no hyperscaler entry, no material breach"
        - id: n6
          label: "Qualified Buy"
          detail: "Hold to IPO or strategic exit 2027–2030; monitor thesis-break triggers quarterly"
        - id: n7
          label: "Thesis-break triggered"
          detail: "Exit at next liquidity event; do not average down without material new information"
      edges:
        - from: n1
          to: n2
        - from: n1
          to: n3
        - from: n1
          to: n4
        - from: n2
          to: n5
        - from: n3
          to: n5
        - from: n5
          to: n6
        - from: n5
          to: n7
    claimRefs: [CV001, CV002, CV004, CV028]

