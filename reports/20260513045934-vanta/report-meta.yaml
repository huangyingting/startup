companyProfile:
  summary: >-
    Vanta is a San Francisco-based SaaS company founded in 2018 by Christina
    Cacioppo and Fred Blauer. It automates security compliance and GRC
    workflows for cloud-native businesses, enabling customers to achieve and
    maintain SOC 2, ISO 27001, HIPAA, GDPR, PCI-DSS, and 30+ other
    certifications through continuous monitoring, automated evidence
    collection, and an AI-powered compliance platform. As of April 2026,
    Vanta serves 16,000+ customers globally and has crossed $300M in ARR
    with 63% year-over-year growth, supported by $504M in total funding
    including a $150M Series D at a $4.15B valuation led by Wellington
    Management in July 2025.
  foundedDate: 2018-04-01
  founders:
    - name: Christina Cacioppo
      role: CEO & Co-Founder
      background: >-
        Former product manager at Dropbox and a16z crypto; Stanford CS
        graduate; solo-founded Vanta in 2018 before Fred Blauer joined.
      claimRefs: [CO002]
    - name: Fred Blauer
      role: CTO & Co-Founder
      background: >-
        Software engineer; joined Cacioppo as technical co-founder during
        early product development; leads engineering.
      claimRefs: [CO003]
  foundingLocation: San Francisco, CA
  headquarters: San Francisco, CA
  productSummary: >-
    Vanta sells a cloud-hosted SaaS platform that automates security
    compliance and GRC workflows. Core products include compliance automation
    (SOC 2, ISO 27001, HIPAA, GDPR, PCI-DSS, NIST), a public Trust Center,
    vendor/third-party risk management (TPRM), AI-powered questionnaire
    automation, privacy automation, access reviews, and a GRC/risk management
    module with the Riskey AI agent. The platform connects to 400+ third-party
    integrations for automated evidence collection and continuous monitoring.
  customerFocus: >-
    Cloud-native companies from startup through enterprise (~10 to 5,000+
    employees), primarily in technology, SaaS, healthcare, and fintech
    verticals; highest density in SMB and mid-market segments.
  businessModel: >-
    Annual SaaS subscription; per-framework licensing with employee-count
    scaling; add-on module pricing (TPRM, Questionnaire Automation, Privacy,
    Access Reviews, AI Governance); land-and-expand growth model.
  stage: Series D
  fundingStatus: >-
    $150M Series D raised July 2025 at $4.15B post-money valuation, led by
    Wellington Management with participation from Sequoia Capital. Total
    lifetime funding ~$504M. No Series E announced as of May 2026.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO002, CO003]

