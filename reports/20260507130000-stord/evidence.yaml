evidenceGaps:
  - type: private-evidence-only
    severity: material
    topic: Revenue and financial performance
    missingEvidence: >-
      Stord has not disclosed revenue, EBITDA, gross margin, or any income statement metrics in public press releases or
      filings.
    whyItMatters: >-
      Without revenue disclosure it is impossible to independently verify the $1.5 B valuation multiple or assess
      capital efficiency.
    diligencePath: Request audited or management-account P&L and gross margin by revenue stream under NDA during due diligence.
    relatedQuestionRefs:
      - QO008
  - type: private-evidence-only
    severity: material
    topic: Debt covenant and maturity terms for $120 M growth facility
    missingEvidence: >-
      The specific covenants, maturity schedule, interest rate, and collateral terms of the SVB/ORIX debt facility are
      not disclosed.
    whyItMatters: >-
      Restrictive covenants could limit acquisition flexibility, require minimum revenue growth, or trigger acceleration
      on missed targets.
    diligencePath: Obtain full credit agreement and covenant package from counsel. Assess headroom under current revenue trajectory.
    relatedQuestionRefs:
      - QO020
  - type: private-evidence-only
    severity: material
    topic: Cap table and preferred share structure
    missingEvidence: >-
