    claimRefs: [CI003, CI017, CI018, CI019]

  - id: FI004
    title: Capital intensity / cash-flow map
    type: flow
    layout: standard
    summary: |
      How Stord generates, allocates, and recycles cash — from customer payments through 
      operations to node investment and return to investors.
    data:
      nodes:
        - id: revenue
          label: "Customer Revenue (~$147M est.)"
          detail: "Fulfillment fees, storage, transportation margin, software subscriptions"
          type: input
        - id: opex
          label: "Operating Costs (~70-80% of revenue)"
          detail: "Warehouse labor, carrier costs, facility leases, technology, SGA"
          type: process
        - id: ebitda
          label: "EBITDA (Positive as of 2024)"
          detail: "EBITDA profitability achieved in 2024; exact margin undisclosed"
          type: process
        - id: capex
          label: "CapEx (Node Expansion)"
          detail: "$40M Kentucky facility (2025); ongoing node investment across 11 nodes"
          type: process
        - id: debt
          label: "Debt Service ($120M facility)"
          detail: "Interest + principal repayment on First Citizens Bank / ORIX facility; rate/maturity undisclosed"
          type: process
        - id: fcf
          label: "Free Cash Flow"
          detail: "EBITDA minus CapEx minus debt service; likely negative or near-zero at current investment phase"
          type: output
        - id: equity
          label: "Equity Reserve ($80M+ from Series E)"
          detail: "Cash buffer for operations, M&A, and growth investment post Series E"
          type: process
      edges:
        - from: revenue
          to: opex
          label: "70-80% allocated to COGS + OpEx"
        - from: revenue
          to: ebitda
          label: "20-30% margin retained (est.)"
        - from: ebitda
          to: capex
          label: "CapEx from EBITDA + debt"
        - from: ebitda
          to: debt
          label: "Interest/principal payments"
        - from: ebitda
          to: fcf
          label: "Residual FCF"
        - from: equity
          to: capex
          label: "Equity funds growth investment"
    approximationNotes: |
      Cash flow structure is inferred from industry norms and Stord's disclosed metrics. 
      No actual P&L or cash flow statement exists in the public domain. FCF is likely 
      negative or near-zero given ongoing CapEx investment.
    claimRefs: [CI012, CI013, CI014, CI015]

callouts:
  - calloutType: risk
    title: "No Audited Financials — All Revenue Figures Are Estimates"
    body: |
      The most material limitation in this chapter is the absence of audited financial 
      statements. Revenue (~$147M Latka), gross margin (20-30% estimated), and profitability 
      (EBITDA positive per management claim) are all unverified. Investors must treat all 
      financial metrics as estimates subject to material revision upon diligence.
    claimRefs: [CI018, CI020]

  - calloutType: risk
    title: "Debt Service Obligation Creates Fixed Cash Requirement"
    body: |
      The $120M debt facility from First Citizens Bank and ORIX creates a fixed repayment 
      obligation independent of Stord's operating performance. If revenue growth slows or 
      EBITDA contracts, Stord may need to raise additional equity at potentially reduced 
      valuations to service the debt. The interest rate, maturity, and covenants are not 
      publicly disclosed.
    claimRefs: [CI009, CI010, CI019]

  - calloutType: insight
    title: "Valuation Discipline: $1.3B to $1.5B Step Despite Strong Operating Metrics"
    body: |
      The modest 15% valuation step from 2022 to 2025 — while the company achieved profitability 
      and 10x contracted revenue growth — suggests either investor discipline in avoiding the 
      2021 peak valuation trap or genuine concern about logistics multiple compression. This 
      could be a positive signal for future investors: the $1.5B mark may already reflect 
      conservative expectations rather than speculative premium.
    claimRefs: [CI007, CI009, CI022]

