  - id: FI002
    title: Unit economics bridge
    type: kpi
    layout: standard
    summary: |
      Key unit economic metrics for Stord as of 2024-2025, based on disclosed GMV, package 
      volume, Latka revenue estimate, and industry benchmarks for comparable 3PLs.
