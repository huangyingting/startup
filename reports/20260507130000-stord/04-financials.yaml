          context: "Company-confirmed for 2024."
        - label: "Estimated annual revenue"
          value: 147
          unit: "USD M (Latka est.)"
          context: "Third-party estimate; not company-confirmed. Low confidence."
        - label: "Revenue per package (est.)"
          value: 2.94
