    enumerationScope:
      coverage: partial
      basis: "Unit economics are inferred from disclosed GMV, package volume, and Latka revenue estimate. No unit economics have been officially published by Stord. Confidence is low for all metrics."
    notes: |
      Unit economics are highly sensitive to assumptions about customer count, revenue recognition, 
      and customer mix. The wide ranges reflect the absence of primary data. These figures should 
      be used for directional understanding only.
    claimRefs: [CI003, CI004, CI013]

