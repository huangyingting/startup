  headline: Stord 是已盈利的云供应链平台，拥有 G2 OMS 领先地位和 $10B+ GMV；$1.5B 是合理入场价，潜在 MOIC 为 1.3–3x，但流失率、债务契约和 SOC 2 仍是重要尽调前提。
