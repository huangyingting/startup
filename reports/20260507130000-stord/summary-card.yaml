      Deep OMS/ERP integration (6-12 months to implement) creates durable switching costs that anchor enterprise
      customer retention
  topRisks:
    - >-
      ShipBob's planned IPO at ~$4B would provide capital to accelerate node expansion and OMS development — directly
      targeting Stord's two primary moats simultaneously
    - >-
      $120M debt tranche from Series E creates ~$9.6-14.4M annual interest expense; covenant terms undisclosed; EBITDA
      margins narrow at early profitability
    - >-
      Customer churn rate, NRR, and total customer count are not disclosed — impossible to validate whether GMV growth
      is organic or inorganic without these metrics
    - >-
      DTC sector headwinds (US tariffs, Apple iOS privacy, CAC inflation) could reduce GMV of Stord's health/wellness
      concentrated customer base
    - >-
      SOC 2 Type II compliance status unconfirmed in public sources — material gap for enterprise procurement and
      potential blocker for Fortune 500 brand expansion
  unresolvedGaps:
    - >-
      Customer gross churn, NRR, and total customer count — critical for assessing revenue quality and whether growth is
      organic vs. acquisition-driven
    - $120M ORIX debt covenant terms — without the covenant schedule, financial risk cannot be fully assessed
    - >-
      SOC 2 Type II audit report — enterprise customers require this; absence is disqualifying for Fortune 500
      procurement
    - >-
      Revenue and gross margin by segment (software vs. fulfillment services) — required to validate the SaaS premium in
      the 10.2x revenue multiple
    - Top-5 customer revenue concentration — customer concentration above 20% per account creates material churn risk
