  topStrengths:
    - >-
      G2 Market Leader OMS 2024 (4.3/5, 47 reviews) with AI carrier optimization generating $130M/yr in brand savings —
      quantifiable software ROI that anchors retention
    - >-
      Profitability achieved in 2024 at ~$147M revenue — rare for a Series E logistics-tech company; 4 consecutive
      quarters of bookings beats validate sustainable growth
    - >-
      $10B+ GMV across 50M+ packages at 11 nodes — BFCM 2024 powered ~1% of US online retail, proving peak operational
      scalability
    - >-
      Native (P&G subsidiary) reference validates Fortune 50 enterprise compliance capability — the most credible
      enterprise proof point in the disclosed customer set
