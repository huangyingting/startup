  - id: S3
    title: Funding History and Capital Structure
    body: |
      Stord has raised more than $525 M in total financing across seven rounds from 2018
      through May 2025, including a growth debt facility component in the Series E.

      The Seed round (April 2018, $2.6 M) was led by Dynamo Ventures and Susa Ventures.
      Series A (April 2019, $12.4 M) was led by Kleiner Perkins with Susa, Revolution,
      Engage, and Dynamo participating. Series B (November 2020, $35 M) was led by
      Founders Fund with Kleiner Perkins, Susa, Dynamo, Good Friends, and B Capital.
      Series C (March 2021, $65 M) was led by Bond Capital with Founders Fund, Susa,
      Dynamo, Salesforce Ventures, and Lineage as co-investors, followed rapidly by
      Series D (September 2021, $90 M at $1.1 B valuation) led by Kleiner Perkins with
      Lux Capital, Palm Tree Crew, Founders Fund, Susa, BoxGroup, and others. A Series D
      extension (May 2022, $120 M at $1.3 B valuation) was led by Franklin Templeton with
      137 Ventures, Founders Fund, Kleiner Perkins, Susa, Bond, Lux, Strike Capital, and
      Sozo Ventures participating.

      The Series E (May 16, 2025) raised $200 M+ consisting of $80 M in equity led by
      Strike Capital and a $120 M growth debt facility from Silicon Valley Bank (SVB,
      First Citizens Bank division) and ORIX USA. New investors Baillie Gifford, NewView
      Capital, G Squared, and Georgia Tech Foundation joined; existing investors Kleiner
      Perkins, Franklin Templeton, Founders Fund, Bond, Sozo, 137, and Lux participated.
      The Series E set the post-money valuation at $1.5 B, reflecting 10x contracted
      revenue growth since 2021 and sustained profitability achieved in 2024. No secondary
      market transaction data was identified in public sources to establish an independent
      post-Series E implied valuation.
