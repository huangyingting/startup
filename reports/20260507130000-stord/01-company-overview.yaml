  - id: S4
    title: Scale, Milestones, and Adverse Events
    body: |
      Since its founding Stord has reached the following operational scale indicators as
      of Q1 2025: GMV of ~$10 B annually, 50 M+ consumer packages per year, 99.5 % US
      1-2 day ground coverage, 30 M packages delivered reaching ~11.5 % of US households
      in 2024, and savings of approximately $130 M in parcel fees for customers in 2024.
      The company powered nearly 1 % of Black Friday/Cyber Monday US online sales in 2024
      and completed record-breaking Q1 2025 with highest sales bookings to date.

      On the network side, Stord expanded from a handful of nodes to 11 fulfillment nodes
      across 13 buildings in the US, Canada, UK, and the EU after acquiring ProPack
      Logistics and the Pitney Bowes e-commerce fulfillment business in 2024. A $40 M
      investment in a Kentucky facility (formerly Pitney Bowes) announced in late 2025
      is expected to create 500+ new jobs. Revenue is estimated at approximately $147 M
      as of 2025 (Latka/Growjo) with 681 direct employees and over 1,300 when facility
      workers are included; Stord does not publicly disclose headcount.

      From an adverse-evidence standpoint, no material litigation, regulatory enforcement
      actions, product recalls, or major outage events tied specifically to Stord were
      found in public sources reviewed. Customer reviews on G2 (4.3/5, 47 reviews) and
      Capterra (4.0/5) show high overall satisfaction, with isolated complaints around
      integration complexity and communication during peak-period disruptions. The company
      faces ongoing competitive pressure from Amazon FBA, ShipBob, and the Shopify
      Fulfillment Network, each of which benefits from scale advantages or platform
      lock-in that Stord must continuously work to offset.
