  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Revenue and financial performance
      missingEvidence: >-
        Stord has not disclosed revenue, EBITDA, gross margin, or any income statement metrics in public press releases
        or filings.
      whyItMatters: >-
        Without revenue disclosure it is impossible to independently verify the $1.5 B valuation multiple or assess
        capital efficiency.
      diligencePath: Request audited or management-account P&L and gross margin by revenue stream under NDA during due diligence.
      relatedQuestionRefs:
        - QO008
    - type: private-evidence-only
      severity: material
      topic: Debt covenant and maturity terms for $120 M growth facility
      missingEvidence: >-
        The specific covenants, maturity schedule, interest rate, and collateral terms of the SVB/ORIX debt facility are
        not disclosed.
      whyItMatters: >-
        Restrictive covenants could limit acquisition flexibility, require minimum revenue growth, or trigger
        acceleration on missed targets.
      diligencePath: >-
        Obtain full credit agreement and covenant package from counsel. Assess headroom under current revenue
        trajectory.
      relatedQuestionRefs:
        - QO020
    - type: private-evidence-only
      severity: material
      topic: Cap table and preferred share structure
      missingEvidence: >-
        Ownership percentages, liquidation preferences, anti-dilution terms, and board seat composition are not publicly
        available.
      whyItMatters: Preference stack and board control could significantly affect common shareholder economics at exit.
      diligencePath: Request cap table, certificate of incorporation, investor rights agreement, and voting agreement in diligence.
      relatedQuestionRefs:
        - QO006
    - type: missing-source
      severity: minor
      topic: Burn rate and runway analysis
      missingEvidence: >-
        No public data exists on Stord's monthly burn rate or cash on hand; the company claims profitability but
        provides no financial statements.
      whyItMatters: Without burn/runway data, the $120 M debt facility cannot be assessed against operational cash needs.
      diligencePath: Request monthly P&L and cash-flow statement for the trailing 12 months in diligence.
      relatedQuestionRefs:
        - QO022
    - type: missing-source
      severity: minor
      topic: ESG, sustainability, and labor practices
      missingEvidence: >-
        Stord has not published ESG reports, sustainability commitments, or labor practice policies in any reviewed
        public source.
      whyItMatters: >-
        Institutional investors (Baillie Gifford, Franklin Templeton) typically require ESG disclosures for portfolio
        companies; absence may become a concern pre-IPO.
      diligencePath: Request ESG/sustainability policy, worker safety record, and labor compliance documentation in diligence.
      relatedQuestionRefs:
        - QO023
    - type: private-evidence-only
      severity: minor
      topic: C-suite composition beyond co-founders
      missingEvidence: Stord has not publicly disclosed a CFO, COO, VP Sales, or other senior executives.
      whyItMatters: Thin management team disclosure increases key-person risk assessment uncertainty.
      diligencePath: Request org chart and employment agreements for senior leadership under NDA.
      relatedQuestionRefs:
        - QO006
    - type: missing-source
      severity: minor
      topic: Secondary-market valuation corroboration
      missingEvidence: >-
        No secondary market transaction data (Forge, Nasdaq Private Market, Hiive) was identified to corroborate the
        $1.5 B company-stated valuation.
      whyItMatters: Without an independent market signal, the $1.5 B figure reflects only the last financing round's implied price.
      diligencePath: Check Forge Global, Nasdaq Private Market, and Hiive for any historical Stord secondary transactions.
      relatedQuestionRefs:
        - QO019
    - type: enumeration-incomplete
      severity: minor
      topic: Leadership team completeness — TO002
      missingEvidence: >-
        Only co-founders Sean Henry and Jacob Boudreau are named; no CFO, CMO, VP Sales, or other C-suite leaders are
        disclosed in public sources.
      whyItMatters: Incomplete leadership picture increases key-person risk and prevents assessment of functional coverage depth.
      diligencePath: Request full org chart and senior leadership bios under NDA in diligence.
      relatedTableRefs:
        - TO002
    - type: enumeration-incomplete
      severity: minor
      topic: Stakeholder or investor map completeness — TO003
      missingEvidence: >-
        Ownership percentages, board seat assignments, and governance terms for all investors are not publicly
        disclosed.
      whyItMatters: Without full cap table and board composition, governance risk cannot be fully assessed.
      diligencePath: Request cap table, board minutes, and investor rights agreement in diligence.
      relatedTableRefs:
        - TO003
    - type: enumeration-incomplete
      severity: minor
      topic: Milestone table completeness — TO004
      missingEvidence: >-
        Exact dates and financial terms for ProPack and Pitney Bowes acquisitions, as well as internal operational
        milestones, are not disclosed.
      whyItMatters: >-
        Incomplete milestone record may obscure adverse operational events or governance changes not reported
        externally.
      diligencePath: Request board minutes and acquisition agreements for ProPack and Pitney Bowes transactions.
      relatedTableRefs:
        - TO004
