company:
  name: Stord
chapter:
  number: 1
  title: Company Overview
  summary: |
    Stord is an Atlanta-based commerce-enablement company founded in 2015 by Sean Henry
    (CEO) and Jacob Boudreau (CTO), offering an integrated fulfillment network and
    cloud-native software stack (OMS, WMS, demand forecasting, pre/post-purchase) for
    omnichannel DTC and B2B brands. The company reached unicorn status in September 2021
    ($1.1 B Series D) and raised a Series E of $200 M+ at a $1.5 B valuation in May 2025.
    Total capital raised exceeds $525 M. Stord achieved sustained profitability in 2024,
    grew contracted revenue 10x since 2021, delivered 30 M+ packages reaching ~11.5 % of
    US households, and powers ~$10 B in annual GMV through 11 fulfillment nodes across
    13 buildings in North America, the UK, and the EU.
sections:
  - id: S1
    title: Company Identity and Mission
    body: |
      Stord, Inc. is headquartered in Atlanta, Georgia and was incorporated in 2015. The
      company describes itself as "The Consumer Experience Company," positioning its
      vertically integrated fulfillment network plus cloud software as the operational
      backbone for omnichannel brands seeking to compete with Amazon on delivery speed and
      reliability without ceding the direct customer relationship. Its tagline is "powering
      seamless checkout through post-delivery" and its stated mission is "leveling the
      commerce playing field so that brands of all sizes can tap into industry-leading tools
      to deliver a seamless consumer experience on every order, every time, anywhere, and
      at scale."

      The company began as an asset-light, on-demand warehousing marketplace inspired by
      the "Airbnb for warehousing" model, connecting brands with excess warehouse capacity.
      Over time it transitioned to operating its own strategically placed fulfillment nodes
      while layering proprietary software over both its owned facilities and third-party
      partners. As of May 2026 Stord manages over $10 B of commerce annually via its
      fulfillment network and powers more than 50 M consumer packages per year across the
      US, Canada, UK, and EU. Its 11 fulfillment nodes span 13 buildings, covering 99.5 %
      of the US population with 1-2 day ground shipping.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
    figureRefs:
      - FO002
  - id: S2
    title: Founders and Leadership
    body: |
      Sean Henry (CEO, Co-founder) grew up in Atlanta and enrolled at Georgia Tech, where
      he developed the Stord concept while running an e-commerce side business and
      interning with a German automotive manufacturer. He experienced first-hand how
      fragmented warehousing and logistics created operational pain for online sellers.
      He and Jacob Boudreau (CTO, Co-founder) met at an Atlanta startup conference; both
      dropped out to pursue Stord full-time and joined Georgia Tech's CREATE-X
      accelerator, receiving an initial $10,000 seed investment from the program.

      Henry is the primary external spokesperson and strategist, frequently cited in press
      coverage articulating the company's differentiation around integrated software plus
      physical operations. Boudreau leads engineering and product and maintains a lower
      public profile. Neither founder has announced any change in role or departure as of
      the report date. The company has not publicly disclosed a complete C-suite roster
      beyond the two co-founders; FT Partners served as financial advisor for the Series E.

      On the board, investors Kleiner Perkins (led Series A, D, and participated in
      Series E), Founders Fund, Strike Capital (Series E lead), Baillie Gifford, and
      Franklin Templeton are all represented as major investors, though individual board
      seat assignments beyond co-founders are not disclosed in public sources reviewed.
      The Georgia Tech Foundation joined the Series E, reflecting the founders' alumni
      ties. Salesforce Ventures participated in the Series C and D, signaling enterprise
      software ecosystem alignment.
