      CREATE-X accelerator origins. This alumni network — combined with the Atlanta
      tech ecosystem — provides access to engineering talent, academic partnerships, and
      a regional investor base that differentiates Stord from coastal-centric peers. The
      foundation's institutional participation also signals long-term alignment with the
      company's mission.
