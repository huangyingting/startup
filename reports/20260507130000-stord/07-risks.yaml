callouts:
  - calloutType: risk
    title: ShipBob IPO Is the Primary Competitive Risk to Watch
    body: |
      ShipBob's planned IPO at a ~$4B valuation would inject significant capital that 
      could fund rapid node network expansion and OMS software development. If ShipBob 
      achieves 50+ nodes AND launches a credible OMS product with G2 visibility 
      comparable to Stord's, it would compress Stord's primary competitive moat — 
      node coverage and OMS leadership — simultaneously.
    claimRefs:
      - CR005
  - calloutType: risk
    title: Debt Service Creates Financial Vulnerability in a Revenue Slowdown
    body: |
      The $120M debt tranche from Stord's May 2025 Series E creates approximately 
      $6-8M in annual interest expense. With estimated revenue of ~$147M and narrow 
      EBITDA margins at early profitability, a 10-15% revenue decline (e.g., from 
      DTC sector headwinds) could strain debt coverage ratios and covenant compliance. 
      This is a diligence-priority item for any investor.
    claimRefs:
      - CR009
      - CR010
  - calloutType: risk
    title: California AB5 and Joint Employer Rules Create Elevated Labor Compliance Risk
    body: |
      Stord's use of staffing agency workers at warehouse nodes may create exposure 
      to California AB5 worker reclassification liability and NLRB joint employer 
      rules. California is one of the most active enforcement environments for 
      worker misclassification, and a class-action finding could impose significant 
      retroactive costs. This should be assessed in legal diligence.
    claimRefs:
      - CR015
      - CR016
