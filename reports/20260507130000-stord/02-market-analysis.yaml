callouts:
  - calloutType: insight
    title: Consumer 2-Day Delivery Expectation as Structural Tailwind
    body: |
      56% of US shoppers expect same-day or two-day delivery in 2025, creating sustained
      demand for logistics solutions that can match Amazon's delivery speed. Stord's
      99.5% two-day US ground coverage is directly responsive to this consumer expectation,
      and the gap between what brands can deliver alone vs. what they can deliver through
      Stord's network is the primary selling proposition.
    claimRefs:
      - CM014
      - CM015
  - calloutType: risk
    title: US Tariff Escalation Creates Near-Term GMV Risk
    body: |
      2025 US tariff escalation (up to 145% on certain China imports) is disrupting DTC
      brands that source internationally. If Stord's customer base is concentrated in
      brands sourcing from China, tariff-driven inventory disruption could slow GMV growth
      and reduce fulfillment volumes, directly impacting Stord's revenue. The company has
      not disclosed customer supply-chain origin data.
    claimRefs:
      - CM016
      - CM017
  - calloutType: assumption
    title: SAM and SOM Are Inferred, Not Independently Sourced
    body: |
      No public analyst report independently sizes the US high-velocity DTC brand fulfillment
      segment ($40–70 B SAM estimate) or Stord's specific addressable opportunity. These
      figures are inferences from census data, Stord's disclosed GMV, and industry benchmarks.
      Investors should commission independent market sizing research before relying on these
      estimates for underwriting.
    claimRefs:
      - CM019
      - CM020
      - CM021
