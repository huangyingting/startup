  evidenceGaps:
    - type: missing-source
      severity: material
      topic: US DTC brand fulfillment SAM sizing
      missingEvidence: >-
        No public analyst report independently sizes the US high-velocity DTC brand fulfillment segment ($10M–$1B GMV
        brands). The $40–70 B SAM is this report's inference.
      whyItMatters: >-
        Without a credible independent SAM estimate, investors cannot verify the size of Stord's addressable opportunity
        or validate the $1.5 B valuation multiple.
      diligencePath: >-
        Commission independent market sizing from Gartner, IDC, or Forrester specifically for the US technology-enabled
        3PL fulfillment segment, segmented by brand GMV band.
      relatedQuestionRefs:
        - QM006
        - QM022
    - type: missing-source
      severity: minor
      topic: Stord's B2B retail distribution market traction
      missingEvidence: >-
        Stord mentions B2B retail compliance routing as an adjacent market, but no public data exists on revenue
        contribution from this segment.
      whyItMatters: >-
        B2B distribution has different margin and contract dynamics from DTC fulfillment; its contribution affects
        revenue mix quality.
      diligencePath: Request B2B vs. DTC revenue split and customer names in diligence.
      relatedQuestionRefs:
        - QM017
    - type: private-evidence-only
      severity: minor
      topic: Customer supply chain origin data (China tariff exposure)
      missingEvidence: >-
        Stord has not disclosed the geographic origin of customer supply chains. Tariff-driven disruption risk cannot be
        quantified without knowing customer China sourcing exposure.
      whyItMatters: >-
        If a material share of Stord's customer GMV is sourced from China, 145% tariffs could reduce volumes and revenue
        significantly.
      diligencePath: Request customer-level supply chain origin data and model tariff impact on GMV scenarios.
      relatedQuestionRefs:
        - QM012
    - type: missing-source
      severity: minor
      topic: AI and automation impact on fulfillment cost structure — QM024
      missingEvidence: >-
        No public study has quantified the projected impact of AI and warehouse automation on 3PL cost structures
        through 2027 in a way that isolates the DTC fulfillment segment.
      whyItMatters: >-
        AI automation could compress margins industry-wide while benefiting companies with proprietary software like
        Stord, but the magnitude is uncertain.
      diligencePath: Commission technology cost benchmarking research covering AI adoption rates at mid-market 3PLs.
      relatedQuestionRefs:
        - QM024
    - type: missing-source
      severity: minor
      topic: International market sizing for Stord — QM025
      missingEvidence: >-
        No public data quantifies the addressable opportunity for Stord's UK, EU, or Canada fulfillment operations.
        Revenue contribution from these geographies is not disclosed.
      whyItMatters: >-
        International expansion is a key growth lever; without sizing data, it is impossible to project its revenue
        contribution.
      diligencePath: Request international GMV and revenue by region in diligence.
      relatedQuestionRefs:
        - QM025
    - type: missing-source
      severity: minor
      topic: Stord customer acquisition cost and sales cycle data
      missingEvidence: >-
        No public data exists on Stord's average sales cycle length, customer acquisition cost, or conversion rates from
        leads to contracted brands.
      whyItMatters: >-
        Without CAC/cycle data, it is impossible to assess sales efficiency or model payback periods for new customer
        investments.
      diligencePath: Request sales pipeline data, average cycle length, and CAC in diligence.
      relatedQuestionRefs:
        - QM019
