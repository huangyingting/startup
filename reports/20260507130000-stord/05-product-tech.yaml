  - id: S3
    title: Technology Architecture and Differentiation
    body: |
      Stord's technology architecture is a cloud-native, microservices-based platform 
      hosted on AWS. The core architectural components are:

      Data layer: A unified data model connecting inventory, orders, shipments, and 
      returns across all nodes and channels. This single data layer eliminates the 
      integration fragmentation common in multi-vendor logistics stacks (e.g., separate 
      3PL WMS + standalone OMS + carrier TMS that don't share data in real time).

      AI/ML engine: Stord's carrier optimization model selects the optimal carrier and 
      service for each order using machine learning trained on millions of shipment 
      outcomes. The model inputs order origin, destination, SLA requirement, carrier 
      capacity, and historical delivery performance to generate a routing decision. This 
      algorithm is the basis for the $130M in parcel savings delivered to brands in 2024.

      Integration platform: REST APIs expose OMS and WMS data to e-commerce platforms, 
      ERPs, and analytics tools. The integration catalog includes 100+ pre-built 
      connectors. EDI support for B2B retail compliance routing (Walmart, Target, Costco).

      Physical operations layer: WMS directs human warehouse operations using mobile 
      scanning devices; no proprietary robotics are deployed at Stord's nodes as of 
      2025 (unlike Amazon's Kiva/Proteus robots). The physical layer is operationally 
      intensive and creates labor cost exposure, but the absence of specialized robotics 
      reduces CapEx and simplifies node expansion.

      Key IP claims: Stord has not disclosed patent counts or specific IP holdings in 
      public sources. The carrier optimization algorithm and unified data model are 
      likely trade secret rather than patent-protected, making IP defensibility dependent 
      on engineering team retention and code secrecy rather than patent moat.
    claimRefs:
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016
      - CE017
