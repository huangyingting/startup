chapter:
  number: 5
  title: Product and Technology
  summary: |
    Stord's product is a "cloud supply chain" platform integrating physical fulfillment 
    (11 owned/leased nodes) with proprietary software: an OMS, WMS, demand planning, 
    multi-carrier optimization, and pre/post-purchase experience tools. The OMS was named 
    G2 Market Leader in 2024 (4.3/5, 47 reviews). The software platform integrates with 
    Shopify, Amazon, WooCommerce, NetSuite, SAP, and 100+ e-commerce and ERP systems. 
    AI-driven parcel routing saved brands $130M in carrier fees in 2024. Key technical 
    differentiators: (1) unified data layer across inventory, orders, and fulfillment; 
    (2) multi-carrier AI optimization; (3) 99.5% US 1-2 day ground coverage. Key risks: 
    software differentiators could be commoditized by enterprise WMS vendors; integration 
    depth with customer ERPs creates lock-in but also complexity.
sections:
  - id: S1
    title: Product Definition and Customer Workflow
    body: |
      Stord's product is best understood as a commerce-enablement operating system — a 
      vertically integrated platform that manages a brand's supply chain from procurement 
      and inventory to delivery and returns. In customer workflow terms, a brand using Stord 
      experiences: (1) pre-purchase: inventory is stored at Stord's nodes and monitored 
      via Stord's demand planning dashboard; SKUs are allocated across nodes based on AI 
      demand forecasting; (2) in-purchase: when a customer places an order on the brand's 
      Shopify/WooCommerce/Amazon storefront, Stord's OMS receives the order in real time, 
      routes it to the nearest node with available inventory, selects the optimal carrier 
      from UPS/FedEx/USPS/regional carriers, and generates a pick-pack-ship work order for 
      the warehouse team; (3) post-purchase: order status is tracked in real time and 
      communicated to the consumer; returns are processed at the node and restocked.

      The software layer (OMS, WMS, demand planning) is the primary differentiation from 
      legacy 3PLs that offer fulfillment operations but use outdated or vendor-supplied 
      WMS platforms. Stord's integrated data model means inventory, order, and fulfillment 
      data are in a single system rather than fragmented across disconnected tools. This 
      unified data layer is the foundation for the AI carrier optimization and demand 
      forecasting capabilities.

      The physical layer (owned nodes) provides the consistent service level and operational 
      control that differentiates Stord from asset-light providers. By owning or leasing 
      its nodes, Stord can guarantee specific SLAs (99.5% 2-day coverage), implement 
      uniform technology standards, and maintain quality control in a way that partner-
      warehouse models cannot.
