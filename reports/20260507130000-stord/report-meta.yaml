  foundingLocation: "Atlanta, Georgia, USA"
  headquarters: "Atlanta, Georgia, USA"
  productSummary: "Stord's 'cloud supply chain' platform combines owned fulfillment nodes (physical layer) with proprietary software (OMS, WMS, demand planning, AI carrier optimization, pre/post-purchase experience). Integrates with 100+ e-commerce platforms and ERPs including Shopify, Amazon, NetSuite, and SAP. Named G2 Market Leader in OMS (2024). B2B retail distribution and EDI compliance capabilities for Walmart, Target, and Costco routing."
  customerFocus: "Growth-stage premium DTC brands with $10M–$500M GMV in health/wellness, personal care, and lifestyle categories requiring 2-day delivery, subscription replenishment, and branded consumer experience. Enterprise brand subsidiaries (Native/P&G) and omnichannel brands requiring both DTC and B2B retail routing."
  businessModel: "Hybrid model: per-order fulfillment fees + storage fees (logistics revenue) + OMS/WMS software subscription fees. Revenue is recognized on GMV volume processed; carrier margin share is embedded in fulfillment pricing. Software layer adds SaaS-like stickiness to the physical operations model."
