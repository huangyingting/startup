figures:
  - id: FU001
    title: Customer journey map
    type: timeline
    layout: standard
    summary: |
      Timeline illustrating a DTC brand customer's full lifecycle with Stord — from 
      initial awareness through contract, integration, steady state, and potential churn or expansion.
    data:
      items:
        - date: "Pre-Sales"
          label: "Brand Awareness and Evaluation"
          detail: "Brand evaluates Stord vs. ShipBob, regional 3PLs; influenced by G2 reviews, BFCM references, carrier savings claims; 60-90 day evaluation cycle."
        - date: "Month 0"
          label: "Contract and Node Assignment"
          detail: "Multi-year fulfillment agreement signed; pricing agreed (per-order + storage); node(s) assigned based on brand's geographic demand profile."
        - date: "Month 1-3"
          label: "Integration and Inventory Migration"
          detail: "OMS API integrated with Shopify/ERP; inventory physically migrated to Stord node(s); parallel operations with existing 3PL; go-live risk period."
        - date: "Month 3-12"
          label: "Steady-State Operations and Optimization"
          detail: "Live orders processed; AI carrier optimization calibrated; demand planning refined; first BFCM peak managed; CSM relationship established."
        - date: "Year 1-2"
          label: "Expansion Decision Point"
          detail: "Brand adds B2B retail routing, additional nodes, or international distribution — expanding ACV. OR: Brand evaluates churn if SLA misses or pricing issues emerge."
        - date: "Year 3+"
          label: "Deep Integration / Renewal"
          detail: "Multi-year renewal; ERP upgrade or platform migration deepens integration; switching cost at maximum. Brand is effectively retained unless major service failure."
    approximationNotes: |
      Journey stages and timelines are inferred from industry benchmarks for 3PL implementation 
      and Stord's disclosed onboarding capabilities. Actual customer journey data is proprietary.
    claimRefs: [CU014, CU015, CU016]

  - id: FU002
    title: Adoption / deployment funnel
    type: funnel
    layout: standard
    summary: |
      Illustrates the estimated conversion funnel from brand awareness to Stord's 
      active customer base, highlighting where prospects drop off and where switching costs lock in customers.
    data:
      items:
        - label: "DTC Brands in Target Revenue Range ($10M-$500M GMV)"
          value: 5000
          description: "Estimated US addressable brands in Stord's sweet spot; high-growth DTC with fulfillment pain points"
        - label: "Brands in Active Evaluation (Aware of Stord)"
          value: 500
          description: "Brands in active 3PL evaluation who have engaged with Stord's sales team; ~10% of addressable"
        - label: "Brands in Contract / Integration"
          value: 50
          description: "Brands that signed and are in active integration phase; ~10% of evaluated"
        - label: "Active Production Customers"
          value: 300
          description: "Estimated active Stord customers based on GMV and package volume analysis"
        - label: "Long-Term / Entrenched Customers (Year 2+)"
          value: 150
          description: "Customers past the first major expansion decision with deep ERP/OMS integration"
    approximationNotes: |
      All funnel figures are this report's estimates based on Stord's GMV ($10B+), 
      package volume (50M+), and disclosed funding trajectory. Stord has not disclosed 
      customer counts. These estimates are speculative and subject to material revision.
    claimRefs: [CU010, CU011]

