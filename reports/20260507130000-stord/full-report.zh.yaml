companyProfile:
  summary: >-
    Stord 是一家总部位于 Atlanta 的云供应链公司，2015 年由 Sean Henry（CEO）和 Jacob Boudreau（CTO）在 Georgia Tech 的 CREATE-X 项目中创立。公司在美国运营 11
    个自有和租赁履约节点（13 栋建筑），可覆盖 99.5% 的美国人口并提供 1-2 天陆运配送。Stord 的平台把自研订单管理（OMS）、仓库管理（WMS）、需求规划、AI 驱动的多承运商优化，以及购买前 /
    购买后消费者体验工具整合进一个统一数据模型。May 2025，Stord 完成 $200M Series E 融资（$80M 股权 + ORIX Corporation 提供的 $120M 债务），估值 $1.5B，由 Strike
    Capital 领投。Stord 于 2024 年实现盈利，并连续 4 个季度预订额高于上年同期。公司每年处理 $10B+ 商品交易总额（GMV），包裹量超过 50M。已披露客户包括
    AG1、goodr、Native（P&G）、quip、Seed Health、Jolie 和 Elysium Health——主要是健康 / 保健和个人护理领域的高端 DTC 品牌。Stord 在 2024 年收购 ProPack
    Logistics 和 Pitney Bowes 电商履约业务，扩展了节点网络。OMS 是 G2 Market Leader（2024，47 条评价给出 4.3/5）。Stord 的 AI 承运商优化在 2024 年为品牌节省了
    $130M 包裹费用。
