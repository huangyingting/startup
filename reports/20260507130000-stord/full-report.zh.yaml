      - number: '3.3'
        title: 竞争定位与护城河分析
        blocks:
          - type: paragraph
            body: >
              Stord 的主要竞争优势包括：（1）打包的「云供应链」平台——自研 OMS、WMS 和需求规划套件，在物理锁定之上制造软件锁定效应；（2）覆盖 11 个自有 / 租赁节点的美国 1-2 天陆运 99.5%
              覆盖——这一覆盖主张是较少独立 3PL 能匹配的；（3）2024 年 OMS 类别 G2 Market Leader——对企业软件采购流程相关，因为 G2 评分会影响供应商选择；（4）与
              AG1（每月数百万订阅订单）、quip 和 Native（P&G 子公司）的企业客户关系，这些客户要求高运营可靠性。


              Stord 相对 ShipBob 的差异，在企业 / 全渠道细分市场最明显：据行业分析比较，GMV $100 M+、有 B2B 零售分销需求或复杂订阅模式的品牌，往往选择 Stord 而非 ShipBob。Red
              Stag Fulfillment 分析（2025）指出，「Stord is best for medium to large businesses with complex logistics while
              ShipBob is best for growing DTC brands.」这造就了两个相邻但不同的细分市场，它们的 NRR 和流失特征也不同。


              护城河耐久度中等：物理节点网络制造了复制所需的资本门槛，但软件平台持续面对资金充足的 WMS/OMS 厂商（Deposco、Manhattan Associates、Blue Yonder）竞争，并且随着 AI
              驱动的订单管理成为标准，可能被商品化。耐久度最高的护城河组件，是与企业客户系统（ERP、D2C 平台、零售买方门户）的集成深度；实施需要 6-12 个月，并形成真实切换成本。
