      - number: '1.4'
        title: 规模、里程碑与反向事件
        blocks:
          - type: paragraph
            body: >
              截至 Q1 2025，Stord 自创立以来已达到以下运营规模指标：年 GMV 约 ~$10 B，每年 50 M+ 个消费者包裹，美国 1-2 天陆运覆盖率 99.5 %，2024 年交付 30 M
              个包裹、触达约 ~11.5 % 的美国家庭，并在 2024 年为客户节省约 $130 M 包裹费用。2024 年 Black Friday/Cyber Monday 美国线上销售中，Stord 支撑了近 1
              %，并在 Q1 2025 创下迄今最高销售预订额。


              网络侧，Stord 从少数节点扩展到美国、Canada、UK 和 EU 的 11 个履约节点、13 栋建筑，这一扩张发生在 2024 年收购 ProPack Logistics 和 Pitney Bowes
              电商履约业务之后。2025 年末宣布的 Kentucky 设施（原 Pitney Bowes）$40 M 投资预计将创造 500+ 个新岗位。2025 年收入估计约为 $147
              M（Latka/Growjo），直接雇员 681 人；若计入设施工人，则超过 1,300 人。Stord 没有公开披露员工数。


              反向证据方面，公开来源未发现与 Stord 直接相关的重大诉讼、监管执法、产品召回或大型宕机事件。G2（4.3/5，47 条评价）和
              Capterra（4.0/5）上的客户评价显示总体满意度较高，但也有零星投诉集中在集成复杂度，以及高峰期扰动中的沟通。公司持续面临 Amazon FBA、ShipBob 和 Shopify Fulfillment
              Network 的竞争压力；这些对手各自受益于规模优势或平台锁定，Stord 必须持续抵消这些压力。
