      - number: '6.3'
        title: GMV、包裹量与增长轨迹
        blocks:
          - type: paragraph
            body: >
              Stord 的规模指标（截至 2025）：

              - GMV：$10B+（处理的年度商品交易总额）

              - 包裹量：每年 50M+ 包裹

              - BFCM 份额：2024 年美国电商约 1%（仅 BFCM GMV 隐含 $1-2B）

              - 收入：估计 ~$147M（Latka Data，2024/2025）；官方收入未披露

              - 盈利能力：2024 年实现盈利（连续 4 个季度签约额超预期）

              - 11 个履约节点；13 栋楼；约 681+ 名直属员工 + 包含设施人员约 1,300+ 名


              增长轨迹：2025 年 5 月 $200M Series E 融资伴随一项表述——连续 4 个季度签约额超过上年同期——这说明企业客户新增在加速，而不是单年脉冲式增长。


              2024 年收购 ProPack Logistics 和 Pitney Bowes 电商业务，显著扩大了 Stord 的节点网络和客户基础——Pitney Bowes
              收购带来了既有企业履约关系。收购前后的准确客户数未披露。


              净收入留存率（NRR）和总流失率没有公开数据。OMS/ERP 集成深度意味着既有企业客户切换成本较高，可能转化为较低总流失率，但无法独立验证。竞争对手 ShipBob 据称客户数更高（10,000+ 个品牌），而
              Stord 未披露但显然更小的客户基础，说明 Stord 相比 ShipBob 更偏高 ACV、少品牌，而 ShipBob 覆盖更广 SMB 基础。
