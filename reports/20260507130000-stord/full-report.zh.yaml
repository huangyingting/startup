      - number: '8.5'
        title: 图表
        blocks:
          - type: callout
            title: 10.2x 收入倍数合理但不便宜——盈利能力支撑该倍数
            body: >
              按估计收入 ~10.2x 定价，Stord 相比多数物流可比公司有溢价，但与履约科技同行一致。关键溢价驱动因素是在 $147M 收入规模实现盈利——这对 Series E
              物流科技公司很罕见。它支撑了相对未盈利同行的小幅倍数溢价。若收入增长同时提升软件占比（OMS SaaS vs. 物流服务），倍数有理由向 project44 的 20-30x 区间扩张。
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
          - type: callout
            title: ShipBob IPO 是主要倍数压缩风险
            body: >
              如果 ShipBob 成功以 $4B 上市，它将获得公开市场资本，加速节点扩张和 OMS 软件投资。IPO 后的 ShipBob 如果达到 G2 OMS Market Leader 状态，并且节点数量超过
              Stord，就会把 Stord 的收入倍数从 10x 压向 ShipBob 的可比倍数。这个情景是 Stord 估值的单一最大风险。
            calloutType: risk
            claimRefs:
              - CV007
              - CV012
          - type: callout
            title: 战略收购是一条被低估的退出路径
            body: >
              Stord 的垂直一体化模式（自有节点 + OMS/WMS 软件）难以复制，但对战略收购方价值很高。Shopify 2022 年为 Deliverr 较弱的网络支付了 $2.1B。以 Stord
              当前规模（$10B+ GMV、11 个节点、G2 Market Leader OMS），战略收购方（Amazon、FedEx、Shopify、UPS）可以用战略溢价支撑 $2.5-3.5B
              估值——即便在基准或悲观情景中，这也是一条合理退出路径。
            calloutType: insight
            claimRefs:
              - CV009
              - CV006
