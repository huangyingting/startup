      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >
              Sean Henry（CEO、联合创始人）在 Atlanta 长大，就读于 Georgia Tech。他一边经营电商副业，一边在一家德国汽车制造商实习，期间形成了 Stord
              的构想。仓储和物流的碎片化如何给线上卖家制造运营痛点，他有一手体会。他与 Jacob Boudreau（CTO、联合创始人）在 Atlanta 的一场创业会议上相识；两人后来辍学，全职投入 Stord，并加入
              Georgia Tech 的 CREATE-X 加速器，从该项目获得最初的 $10,000 种子投资。


              Henry 是主要的外部发言人与战略负责人，媒体报道常引用他来阐述公司在软件整合叠加物理运营上的差异化。Boudreau
              负责工程和产品，公开曝光较少。截至报告日期，两位创始人都未宣布角色变化或离职。除两位联合创始人外，公司没有公开披露完整的 C-suite 名单；FT Partners 担任 Series E 的财务顾问。


              董事会层面，Kleiner Perkins（领投 Series A、D，并参与 Series E）、Founders Fund、Strike Capital（Series E 领投方）、Baillie
              Gifford 和 Franklin Templeton 都是主要投资人，但公开来源没有披露除联合创始人之外的具体董事席位分配。Georgia Tech Foundation 加入 Series
              E，体现创始人与母校的校友联系。Salesforce Ventures 参与 Series C 和 D，释放出与企业软件生态对齐的信号。
