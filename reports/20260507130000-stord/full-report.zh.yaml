  - id: FR002
    title: 风险传导图
    type: flow
    layout: standard
    summary: |
      展示根因风险如何沿 Stord 商业模式传导——
      从外部触发因素，到运营影响，再到投资人和战略层面的后果。
    data:
      nodes:
