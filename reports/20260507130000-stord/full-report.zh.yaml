      - number: '6.4'
        title: 留存动态与客户集中风险
        blocks:
          - type: paragraph
            body: >
              留存驱动因素：Stord 的留存优势集中在三套机制：

              1. 集成锁定：OMS/WMS 与品牌的 Shopify、ERP（NetSuite、SAP）和 Amazon Seller Central 的集成通常需要 1-3 个月搭建。迁移到竞品 3PL
              要重建所有集成——尤其对多渠道配置复杂的品牌，这会形成实质切换成本。

              2. 可量化节省：2024 年客户群合计节省 $130M 承运商费用，每个品牌都能量化自身节省；这项 ROI 锚定了品牌留在 Stord 而不是切换的经济理由。

              3. 节点地理覆盖：使用 11 个节点覆盖美国 99.5% 的 2-day 配送，意味着若切换到节点更少的竞争对手（如区域 3PL），配送表现和消费者满意度都会下降。


              客户集中风险：Stord 披露的客户名单较小，且类别狭窄（健康 / 保健补剂、个护）。如果 AG1 或 Native/P&G 占 GMV
              比例过高，任一客户流失都会造成实质不利影响。没有按客户划分的私有收入数据，这项集中风险无法量化。


              反向信号：部分 G2 评论将高峰期 SLA 未达标和定价复杂列为负面因素。这些因素可能造成中端市场客户流失，因为品牌缺少升级服务问题的议价力。Pitney Bowes
              电商业务收购带来了一批来自困境前任业主的客户，这些关系质量可能较低，2025-2026 年流失风险更高。


              NPS、流失率和客户数均未公开披露。这些是客户尽调中的主要证据缺口。
