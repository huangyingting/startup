  - id: FI004
    title: 资本强度 / 现金流图
    type: flow
    layout: standard
    summary: |
      Stord 如何产生、分配和循环现金——从客户付款，到运营，再到节点投资和
      向投资人回报。
    data:
      nodes:
        - id: revenue
