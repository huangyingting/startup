      - number: '2.4'
        title: 市场规模尽调缺口与矛盾估计
        blocks:
          - type: paragraph
            body: >
              最大的规模测算缺口，是缺少可信、公开可得、专门针对美国高速 DTC 品牌履约细分市场的估计。分析报告覆盖更广义的 3PL 市场和全球电商履约服务，但不会按品牌收入区间或技术集成需求切分。本报告中的 $40–70
              B SAM 估计，是从人口普查数据、Stord 披露的 GMV 和行业访谈推导而来，不是有来源的估计。


              相互矛盾的估计很常见：针对同一个 2024 年全球市场，市场规模来源给出的区间从 $123 B 到 $141 B（Verified Market Reports vs. Emergen
              Research）。差异来自范围定义（「fulfillment services」是否包含运输？）和方法论（自下而上 vs.
              自上而下）不同。本报告保留这些矛盾，而不强行调和，因为它们反映了市场边界定义中的真实不确定性。


              另一项约束来自公司自身的 SAM：Stord 暗示它服务的是每年发货 10 M+ 件的品牌，但客户名单覆盖不同阶段的品牌。SOM 能否实质性扩张，取决于更小的 DTC 品牌能否成长到 Stord 的量级要求，或
              Stord 是否推出入门级产品层。
            claimRefs:
              - CM019
              - CM020
              - CM021
      - number: '2.5'
        title: 展示要点
        blocks:
          - type: callout
            title: 消费者两日达预期是结构性顺风
            body: >
              2025 年，56% 的美国购物者期待当日或两日达，持续拉动能匹配 Amazon 配送速度的物流解决方案需求。Stord 在美国 99.5% 的两日陆运覆盖，正面回应了这一消费者预期；品牌单独能做到的配送，与借助
              Stord 网络能做到的配送之间的差距，就是它的核心销售主张。
            calloutType: insight
            claimRefs:
              - CM014
              - CM015
          - type: callout
            title: 美国关税升级带来近端 GMV 风险
            body: >
              2025 年美国关税升级（对部分中国进口最高至 145%）正在扰动跨境采购的 DTC 品牌。如果 Stord 客户群集中在从中国采购的品牌，关税驱动的库存扰动可能拖慢 GMV 增长并降低履约量，直接影响
              Stord 收入。公司没有披露客户供应链来源数据。
            calloutType: risk
            claimRefs:
              - CM016
              - CM017
          - type: callout
            title: SAM 与 SOM 是推导值，不是独立来源数据
            body: >
              没有公开分析报告独立测算美国高速 DTC 品牌履约细分市场（$40–70 B SAM 估计）或 Stord 的具体可服务机会。这些数字来自人口普查数据、Stord 披露的 GMV
              和行业基准的推导。投资人在承销时依赖这些估计之前，应委托独立市场规模研究。
            calloutType: assumption
