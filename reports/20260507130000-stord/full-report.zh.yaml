  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 运营风险
        blocks:
          - type: paragraph
            body: >
              Stord 的垂直一体化模式——自有 / 租赁履约节点，并雇佣仓库员工——形成固定成本结构。它既是竞争优势（运营控制、SLA 一致性），也是利润率和运营风险来源。


              劳动力风险：Stord 拥有 681+ 名直属员工，若计入设施员工，11 个节点合计 1,300+ 人。仓库劳动力是电商物流中波动最大的成本项之一。美国劳动力市场偏紧（2025 年失业率
              4.0-4.5%）带来工资通胀压力，而 Stord 的节点所在地（Kentucky、Atlanta 及其他都市区）要与 Amazon、UPS、FedEx 争夺同一批小时工。Amazon 的仓库工资底线（截至
              2024 年多数市场 $22/hr）设定了竞争锚点，Stord 必须匹配才能留住工人。


              SLA 风险：G2 评论指出高峰量期间（BFCM、假日季）存在 SLA 未达标。Stord 宣称美国 99.5% 2-day 配送覆盖是汇总指标；单个品牌在峰值期间可能经历更差结果。若涉及旗舰客户的 SLA
              失误被广泛报道（如 AG1 假日订阅失败），会损害声誉，并可能触发合同罚金。


              实体节点集中：美国 11 个节点意味着任何单一节点停摆（火灾、洪水、停电）都会影响分配到该节点的所有品牌，而且没有即时备用。Amazon 的 1,000+ 个设施提供地理冗余，Stord 以当前规模无法匹配。


              收购整合风险：2024 年收购 ProPack Logistics 和 Pitney Bowes 电商部门，带来整合复杂度。跨多个被收购设施合并仓库管理系统、IT 基础设施和劳动力文化，会在短期内抬高运营风险。
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
