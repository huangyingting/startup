      - number: '4.3'
        title: 成本结构与资本强度
        blocks:
          - type: paragraph
            body: >
              Stord 的成本结构分为物理运营（仓储、劳动力、承运商成本）和技术 / 管理费用。自有节点模式（11 个节点 / 13 栋建筑）的资本强度，是最主要的成本驱动。典型 3PL
              仓储成本包括：（a）设施租赁或所有权成本（大型配送中心每年 $3-10/sq ft）；（b）劳动力（仓库员工，美国主要市场通常为
              $18-25/hr）；（c）技术（WMS、WCS、传送带自动化、RFID）；以及（d）承运商运输成本（转嫁给品牌，但在运输期间由 Stord 垫资）。


              2025 年宣布的 Kentucky 设施扩建投资 $40M、创造 500+ 个新岗位，确认公司虽已称实现盈利，仍在持续投入 CapEx。这符合一种资本配置纪律：一边优先投入成长 CapEx，一边优化
              EBITDA。$120M 债务工具很可能专门用于节点扩张和营运资本，而不是日常运营，这也符合重资产物流公司使用成长债务的方式。


              毛利率：技术赋能 3PL 若有实质软件收入，行业基准显示综合毛利率为 20-35%。如果 Stord 软件收入毛利率为 70-80%、物理履约毛利率为 10-20%，则 $147M 收入上的综合毛利率
              20-30% 对应每年 $30-45M 毛利——与一家已实现 EBITDA 层面盈利、但 GAAP 净利润未必为正的公司相符。
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
