      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              2018 年至 May 2025，Stord 通过七轮融资累计募集超过 $525 M，其中 Series E 包含一项成长债务工具。


              种子轮（April 2018，$2.6 M）由 Dynamo Ventures 和 Susa Ventures 领投。Series A（April 2019，$12.4 M）由 Kleiner Perkins
              领投，Susa、Revolution、Engage 和 Dynamo 参投。Series B（November 2020，$35 M）由 Founders Fund 领投，Kleiner
              Perkins、Susa、Dynamo、Good Friends 和 B Capital 参投。Series C（March 2021，$65 M）由 Bond Capital 领投，Founders
              Fund、Susa、Dynamo、Salesforce Ventures 和 Lineage 共同投资；随后很快完成 Series D（September 2021，$90 M，估值 $1.1 B），由
              Kleiner Perkins 领投，Lux Capital、Palm Tree Crew、Founders Fund、Susa、BoxGroup 等参与。Series D 延展轮（May 2022，$120
              M，估值 $1.3 B）由 Franklin Templeton 领投，137 Ventures、Founders Fund、Kleiner Perkins、Susa、Bond、Lux、Strike
              Capital 和 Sozo Ventures 参与。


              Series E（May 16, 2025）募集 $200 M+，包括 Strike Capital 领投的 $80 M 股权，以及 Silicon Valley Bank（SVB，First Citizens
              Bank 旗下部门）和 ORIX USA 提供的 $120 M 成长债务工具。新投资人 Baillie Gifford、NewView Capital、G Squared 和 Georgia Tech
              Foundation 加入；现有投资人 Kleiner Perkins、Franklin Templeton、Founders Fund、Bond、Sozo、137 和 Lux 参与。Series E
              将投后估值定在 $1.5 B，反映出公司自 2021 年以来合同收入增长 10x，并在 2024 年实现持续盈利。公开来源没有识别到老股交易数据，无法建立独立的 Series E 后隐含估值。
