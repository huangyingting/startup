            title: ShipBob IPO 会在 Stord 市场里制造资金最充足的对手
            body: >
              如果 ShipBob 以 $3–4 B 估值 IPO，它将拿到公开市场资本，通过产品投入和潜在 M&A 切入 Stord 的中端企业细分市场。Stord 的 $1.5 B 私有估值和最近 $200 M+
              融资，给它 18–24 个月现金跑道，在 ShipBob 资本制造显著竞争压力之前，继续加深企业优势；受影响的核心区间是 $50M–$500M GMV 品牌。
            calloutType: risk
            claimRefs:
              - CP019
              - CP023
          - type: callout
            title: Amazon MCF 对品牌中心型 DTC 仍有结构性劣势
            body: >
              Stord 的假设是，因 Amazon 对品牌包装的限制以及品牌对 Amazon 配送网络的依赖，Amazon MCF 对重视品牌的 DTC 公司吸引力仍较低。如果 Amazon 推出品牌化 MCF
              层（允许定制包装盒）或收购一家技术赋能 3PL，这一假设就会失效。2024 年 FBA 费用上涨是短期顺风；长期看，Amazon 仍是美国电商中占主导的物流基础设施。
            calloutType: assumption
            claimRefs:
