      - number: '8.2'
        title: 可比公司分析
        blocks:
          - type: paragraph
            body: |
              Stord 最可比的对象包括：

              公开市场 / 已披露 SaaS-物流混合公司：
              - Shipwire（2022 年，被 Ingram Micro 收购）：收入约 ~$200M，隐含价值约 ~$800M = ~4x。不过，Shipwire 缺少 Stord 的自有节点和软件深度。
              - Deliverr（2022 年被 Shopify 收购）：收购价 $2.1B；Deliverr 收入约 ~$200-300M = ~7-10x；Shopify 为节点网络支付了战略溢价。
              - nShift/Consignor：欧洲物流 SaaS，ARR 约 ~$150M、估值约 ~$1B = ~7x。
              - XPO Logistics / RXO / GXO（2022 年拆分）：公开货运和 3PL 倍数为收入 0.7-1.2x；Stord 的软件层支撑显著溢价。

              风投支持的物流同行：
              - ShipBob：收入 $500M+，目标 IPO 约 ~$4B = ~8x（提供关键基准）
              - Flexport：收入约 ~$2.1B，估值约 ~$3.8B = ~1.8x（因收入中软件含量较低，倍数低得多）
              - project44：ARR 约 ~$100M，估值 $3.1B = ~31x ARR；纯 SaaS（仅可视化）

              分析：Stord 10.2x 收入倍数适合其混合模式：
              - 相对纯 3PL（0.5-1.5x）有溢价，因为拥有 OMS/WMS 软件和 AI 承运商优化
              - 相对纯 SaaS 物流（project44 31x）有折价，因为实体资产强度更高
              - 与履约科技同行一致（Deliverr 7-10x，ShipBob 目标约 ~8x）
              - 相比 ShipBob 小幅溢价，因为 Stord 已证明盈利能力和 OMS 市场领导地位

              关键倍数扩张驱动：收入结构转向更高利润率软件；国际 GMV 增长；B2B 零售分销 ACV 扩张；机器人 / 自动化降低劳动力成本占收入比例。
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
          - type: table
            tableRef: TV004
            claimRefs:
