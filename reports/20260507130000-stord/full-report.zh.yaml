chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >
              Stord, Inc. 总部位于 Georgia 州 Atlanta，2015 年注册成立。公司自称「The Consumer Experience
              Company」，把垂直整合的履约网络与云软件定位为全渠道品牌的运营骨干：品牌想在配送速度和可靠性上与 Amazon 竞争，又不想让出直接客户关系。它的标语是「powering seamless checkout
              through post-delivery」，公开使命是「leveling the commerce playing field so that brands of all sizes can tap into
              industry-leading tools to deliver a seamless consumer experience on every order, every time, anywhere, and
              at scale」。


              公司起步时是轻资产、按需仓储市场，灵感来自「仓储版 Airbnb」模式，把品牌方与闲置仓储能力连接起来。后来，Stord 转向运营自有、战略布局的履约节点，并把自研软件叠加到自有设施和第三方合作伙伴之上。截至
              May 2026，Stord 通过履约网络每年管理超过 $10 B 商业交易，并在美国、Canada、UK 和 EU 每年支撑超过 50 M 个消费者包裹。它的 11 个履约节点横跨 13 栋建筑，覆盖 99.5
              % 的美国人口，可提供 1-2 天陆运配送。
