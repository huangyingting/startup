      - number: '4.2'
        title: 资本结构与融资历史
        blocks:
          - type: paragraph
            body: >
              Stord 自 2018 年以来融资超过 $525M：种子轮 $2.6M（2018）；Series A $12.4M，KP 领投（2019）；Series B $35M，Founders
              Fund（2020）；Series C $65M，Bond（2021）；Series D $90M，KP 领投，估值 $1.1B（2021）；Series D 延展轮 $120M，Franklin
              Templeton 领投，估值 $1.3B（2022）；Series E $200M+（$80M 股权，Strike Capital + $120M 债务），估值 $1.5B（May 2025）。


              Series E 债务工具（$120M）来自 First Citizens Bank（SVB 继承者）和 ORIX USA，是最值得注意的部分。ORIX Corporation
              是一家公开上市的日本金融服务集团（TSE: 8591），在美国有大量业务；它的参与提供了资本市场认可信号。Franklin Templeton 此前领投 Series D 延展轮并继续参与 Series
              E，说明机构资产管理人仍在支持。Kleiner Perkins 作为现有投资人持续参与至 Series E，反映出这家顶尖 Silicon Valley VC 公司的信心。


              从 2022 年的 $1.3B 到 2025 年的 $1.5B，三年仅上调 15%，是最值得注意的估值动态。这可能说明投资人计入了物流倍数较 2021 年高点的压缩（彼时 SoftBank 和 Tiger
              Global 推高了物流科技估值）、有纪律地避免下调估值，或真实认为 Stord 的进展只足以支撑在低迷私募市场中的温和上调。
