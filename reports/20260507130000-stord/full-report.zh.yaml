      - number: '3.2'
        title: 竞争对手画像——直接竞争对手
        blocks:
          - type: paragraph
            body: >
              ShipBob（私有公司，IPO 目标 $4B）：2014 年成立于 Chicago。2023 年收入约 ~$500 M，同比增长 43%，包含 TikTok Shop 合作带来的拉动。全球 50
              个仓库站点；每年发出 100 M 个订单；累计融资 $330 M+。WMS 能力强，并深度集成 Shopify、Amazon、TikTok Shop 和 Walmart。目标客户为中小型 DTC 品牌。2024
              年已在探索 IPO，说明其准备接受公开市场审视。相对 Stord 的优势：收入规模（$500 M vs. 约 ~$147 M）、网络密度（50 vs. 11 个节点）和平台集成。劣势：企业软件深度较弱；B2B /
              全渠道能力不及 Stord。


              Shopify Fulfillment Network（SFN，Shopify 子公司）：使用合作伙伴仓库的轻资产模式。定位为「fulfillment native to Shopify」。对于完全在
              Shopify 上经营的小型 / 中型 DTC 品牌较强。不支持复杂 B2B 合规、全渠道路由，或多平台销售的大型企业品牌。Deliverr 收购（2022）补充了仓库网络，但 SFN 仍是平台打包方，不是独立
              3PL。


              Amazon FBA/MCF（Amazon 子公司）：在以 Amazon 为中心的卖家中占主导。MCF（Multi-Channel Fulfillment）让品牌可将 FBA 库存用于非 Amazon 订单。相对
              Stord 的竞争劣势：品牌化开箱体验受限；FBA 附加费（2024：入仓配置费、库存持有费）；拥有多渠道或 DTC 身份的品牌，常更偏好非 Amazon 物流伙伴，以保护品牌体验。


              Flexe：按需仓储市场，把品牌连接到 1,000+ 仓储合作伙伴网络。轻资产、灵活。目标客户是需要峰值产能或溢出仓储的企业品牌。缺少 Stord 自有节点带来的稳定性或 OMS
              软件层。它主要靠仓储灵活性和地理覆盖广度竞争，而不是拣货 / 打包吞吐或 DTC 品牌体验。
