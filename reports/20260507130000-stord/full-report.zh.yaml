      - number: '3.5'
        title: 展示要点
        blocks:
          - type: callout
            title: Stord 的软件深度是相对 ShipBob 的主要护城河
            body: >
              ShipBob 的收入（$500M vs. $147M 估计）和网络（50 vs. 11 个节点）都更大，但 Stord 的竞争优势在于企业软件深度——G2 Market Leader OMS、B2B
              零售合规路由和多渠道需求规划——这些能力服务的是更复杂的买方群体。风险在于，随着 ShipBob 在 IPO 后发展企业能力，这一差异化能否保持。
            calloutType: insight
            claimRefs:
              - CP013
