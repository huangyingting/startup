          type: input
        - id: opex
          label: 运营成本（~70-80% 的收入）
          detail: 仓库人工、承运商成本、设施租赁、技术、SGA
          type: process
        - id: ebitda
          label: EBITDA（截至 2024 年为正）
          detail: 2024 年实现 EBITDA 盈利；具体利润率未披露
          type: process
        - id: capex
          label: CapEx（节点扩张）
          detail: $40M Kentucky 设施（2025）；围绕 11 个节点持续投资
          type: process
        - id: debt
          label: 债务服务（$120M 授信）
          detail: First Citizens Bank / ORIX 授信的利息 + 本金偿还；利率 / 到期日未披露
          type: process
        - id: fcf
          label: 自由现金流
          detail: EBITDA 减 CapEx、再减债务服务；在当前投资阶段很可能为负或接近零
          type: output
        - id: equity
          label: 股权资金储备（E 轮获得 $80M+）
          detail: E 轮后用于运营、M&A 和增长投资的现金缓冲
          type: process
      edges:
        - from: revenue
          to: opex
          label: 70-80% 分配给 COGS + OpEx
        - from: revenue
          to: ebitda
          label: 20-30% 利润留存（估算）
        - from: ebitda
          to: capex
          label: CapEx 来自 EBITDA + 债务
        - from: ebitda
          to: debt
          label: 利息 / 本金支付
        - from: ebitda
          to: fcf
          label: 剩余 FCF
        - from: equity
          to: capex
          label: 股权资金支持增长投资
    approximationNotes: |
      现金流结构依据行业常态和 Stord 披露指标推断。公开领域没有实际 P&L 或现金流量表。
      考虑到持续 CapEx 投资，FCF 很可能为负或接近零。
