      - number: '5.4'
        title: 信任、合规、可靠性与路线图
        blocks:
          - type: paragraph
            body: >
              Stord 的质量与合规状态会直接影响企业买方的采购要求：


              数据安全：Stord 是处理品牌订单和客户数据的 SaaS 平台，必须维持 SOC 2 Type II 合规（企业买方通常要求）。现有公开来源没有找到 SOC 2
              状态确认；企业合同通常会要求这项认证，若缺失，Native（P&G）这类 Fortune 500 品牌客户可能直接淘汰。SOC 2 合规只能假设存在，尚未确认。


              SLA 可靠性：按其标准企业协议，Stord 的 OMS 保证 99.9% 正常运行时间（来自 G2 评论语境）；实际运行时间历史未公开披露。


              承运商合规：Stord 在运输经纪活动中以非资产承运商（NVOCC/货运经纪）身份运营。它持有货运经纪牌照（FMCSA 持牌），这是撮合整车和 LTL 运输所必需的牌照。


              环境：Stord 未发布 ESG 或可持续发展报告。最后一公里配送是否使用电动车未披露。相较有供应商可持续要求的企业品牌客户（尤其是 P&G/Native），这是一个缺口。


              产品路线图：没有官方公开路线图。基于公司表述，关键开发主题包括：（1）改进 AI 需求预测；（2）OMS/WMS 国际扩张（英国 / 欧盟 / 加拿大）；（3）B2B 零售分销自动化；（4）自有节点可能引入机器人
              / 自动化。


              客户满意度：G2 评分 4.3/5（47 条评论，2024）。常见正面主题：软件可视化、支持响应快、承运商节省。常见负面主题：定价复杂，以及高峰量下部分 SLA 未达标。
            claimRefs:
