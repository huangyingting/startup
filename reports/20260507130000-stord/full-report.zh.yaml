      集成、稳态，以及潜在流失或扩张。
    data:
      items:
        - date: Pre-Sales
          label: 品牌认知与评估
          detail: 品牌评估 Stord 与 ShipBob、区域 3PL；受 G2 评论、BFCM 参考案例、承运商节省说法影响； 60-90 天评估周期。
        - date: Month 0
          label: 签约与节点分配
          detail: 签署多年履约协议；约定价格（按订单 + 仓储）；根据品牌地理需求画像分配节点。
        - date: Month 1-3
          label: 集成与库存迁移
          detail: OMS API 与 Shopify/ERP 集成；库存实物迁移到 Stord 节点；与现有 3PL 并行运营；上线风险期。
        - date: Month 3-12
          label: 稳态运营与优化
          detail: 实时订单处理；AI 承运商优化校准；需求规划细化；完成首个 BFCM 高峰管理；建立 CSM 关系。
        - date: Year 1-2
          label: 扩张决策点
          detail: 品牌增加 B2B 零售路由、更多节点或国际分销，推动 ACV 扩张。或者：如果 SLA 失约或定价问题出现， 品牌评估流失。
        - date: Year 3+
          label: 深度集成 / 续约
          detail: 多年续约；ERP 升级或平台迁移加深集成；切换成本达到最高。除非重大服务失败，品牌基本被留住。
