  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              Stord 的核心市场是美国全渠道电商履约和商业赋能领域——一组让品牌能够跨数字和线下渠道，为 DTC 与 B2B 订单完成存储、拣货、打包、发货和退货管理的服务。该市场包括：（1）技术赋能的 3PL
              履约（仓储、拣货打包、最后一公里包裹优化）；（2）云供应链软件（OMS、WMS、需求预测、购买前 / 购买后平台）；（3）叠加在多承运商包裹网络之上的运输经纪和货运服务。


              不属于 Stord 核心可服务市场的包括：第一方物流（品牌自营仓库）、重货和大宗工业物流、需要监管批准的冷链 / 医药分销，以及只向运营商而非品牌销售的纯 SaaS WMS 提供商。Stord
              的竞争护城河具体在于，把物理履约和面向 GMV 为 $10 M–$1 B 品牌的自研软件整合起来——这些品牌规模已超过基础电商工具的承载能力，但又不足以按 Amazon 规模自建第一方履约基础设施。


              Stord 正在拓展的相邻市场包括 B2B 零售分销（面向批发商的零售商合规路由）和国际履约（UK、EU、Canada），提供中期 SAM 扩张路径。现状替代方案包括使用传统 WMS 的传统 3PL、主要在
              Amazon 销售的品牌使用 Amazon FBA，以及规模足以支撑资本开支的大品牌自建仓储运营。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
