      - number: '2.2'
        title: 市场规模——TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多家分析机构估计，全球电商履约服务市场 2024 年规模为 $123.45–$141.24 B，到 2030 年 CAGR 为 8.5–14.2 %。更广义的全球 3PL
              市场——包含所有物流外包，而不只电商——2024 年估计为 $1.19 T，CAGR 为 7.8–8.4 %。美国电商在 2025 年约占美国零售总额 16 %（预测零售份额为 23.5
              %），增速仍高于实体零售，但随着全渠道成为标准，份额提升在放缓。


              Stord 的可服务市场（SAM）是美国品牌中的一个子集：这些品牌通过 DTC 和全渠道每年发出 $10 M–$1 B
              GMV，但缺少第一方物流基础设施。公开分析报告没有独立测算这一细分市场；本报告基于人口普查电商数据和行业研究，保守估计美国高速 DTC 品牌履约细分市场的年度物流支出为 $40–70 B。Stord
              的可获取市场（SOM）进一步受限于愿意接入外部软件栈并从现有供应商迁移的品牌；考虑到典型 3PL 合同锁定期为 1–3 年，5 年维度估计为 $5–15 B。


              公司当前足迹（管理约 ~$10 B GMV）意味着它大约占自身 SOM 的 10–25 %，仍有明确空间。以估计收入 $147 M（Latka 2025）对应 $10 B GMV，隐含抽佣率约 1.5
              %，与在转嫁运输成本之上混合履约费和软件收入的模式一致。
