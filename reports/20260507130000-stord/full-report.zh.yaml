      - number: '5.3'
        title: 技术架构与差异化
        blocks:
          - type: paragraph
            body: >
              Stord 的技术架构是托管在 AWS 上的云原生、微服务平台。核心架构组件包括：


              数据层：统一数据模型，把所有节点和渠道中的库存、订单、发货和退货连接起来。这个单一数据层消除了多供应商物流栈中常见的集成碎片化（例如彼此不实时共享数据的独立 3PL WMS + 独立 OMS + 承运商
              TMS）。


              AI/ML 引擎：Stord 的承运商优化模型用数百万次发货结果训练机器学习，为每个订单选择最优承运商和服务。模型输入包括订单起点、目的地、SLA 要求、承运商产能和历史配送表现，并生成路由决策。2024
              年为品牌节省 $130M 包裹费用，基础就在这个算法。


              集成平台：REST API 向电商平台、ERP 和分析工具暴露 OMS 与 WMS 数据。集成目录包括 100+ 预置连接器。支持 B2B 零售合规路由（Walmart、Target、Costco）的 EDI。


              物理运营层：WMS 用移动扫码设备指导人工仓库操作；截至 2025 年，Stord 节点没有部署自研机器人（不同于 Amazon 的 Kiva/Proteus
              机器人）。物理层运营强度高，并带来劳动力成本敞口；但没有专用机器人，也降低了 CapEx 并简化节点扩张。


              关键 IP 主张：Stord 没有在公开来源披露专利数量或具体 IP 持有情况。承运商优化算法和统一数据模型更可能是商业秘密，而不是专利保护；因此 IP 防御性取决于工程团队留任和代码保密，而非专利护城河。
