      - number: '7.4'
        title: 监管、法律与人员风险
        blocks:
          - type: paragraph
            body: >
              监管敞口：

              FMCSA：Stord 作为 FMCSA 持牌货运经纪运营。FMCSA 对货运经纪运营的监管若发生变化，或经纪牌照出现违规，都可能扰乱 Stord 的承运商经纪活动。FMCSA 在多起高关注度经纪责任案件（如
              Speedy Oilfield Services 诉讼）之后，一直在考虑对数字货运经纪实施额外监管。


              OSHA：仓库运营适用 OSHA 的 General Industry 标准。Stord 的 11 个节点雇佣数百名仓库工人。严重伤害或死亡会触发 OSHA 调查和潜在处罚。Amazon 因仓库安全违规多次收到
              OSHA 处罚，说明整个行业都有这类敞口。


              California AB5 与共同雇主：如果 Stord 在 California 节点使用派遣机构，California AB5 可能将零工 / 临时工归类为雇员，抬高劳动力成本。此外，NLRB
              不定期修订的「共同雇主」规则，可能让 Stord 对通过派遣机构雇佣的工人承担工会谈判义务。


              州层面雇佣诉讼：Stord 在多个州运营，各州最低工资法、加班规则和工人分类要求不同。对拥有大量小时工的仓库运营商来说，集体诉讼式工资盗窃或错误分类主张是持续风险。


              人员风险：Sean Henry（CEO）和 Jacob Boudreau（CTO）都是联合创始人，职业生涯仍处早期。若任一人离职，关键人物风险存在。没有公开披露继任计划。
