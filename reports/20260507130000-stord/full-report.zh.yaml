  - id: FE001
    title: 产品架构图
    type: flow
    layout: standard
    summary: |
      展示 Stord 软件平台如何把品牌的电商系统（顶部），通过云供应链技术栈（中部），
      连接到实体履约运营（底部），说明从客户订单到包裹送达的数据流。
    data:
      nodes:
        - id: channels
          label: 电商渠道
          detail: Shopify、Amazon、WooCommerce、社交电商、批发 EDI、直接 API
          type: input
        - id: oms
          label: 订单管理系统（OMS）
          detail: 实时订单接入、路由决策、承运商选择——G2 2024 市场领导者
          type: process
        - id: wms
          label: 仓库管理系统（WMS）
          detail: 拣货-打包-发货指令、移动扫描、所有 11 个节点的实时库存追踪
          type: process
        - id: carrier
          label: AI 承运商优化引擎
          detail: ML 模型按每笔订单的 SLA / 成本选择最优承运商（UPS、FedEx、USPS、DHL、区域承运商）
          type: process
        - id: nodes
          label: 履约节点（11 / 13 栋建筑）
          detail: 实体履约：仓储、拣货、打包、发货、退货；美国 2 日达覆盖率 99.5%
          type: process
        - id: consumer
          label: 消费者 / 终端客户
          detail: 订单送达；品牌化追踪；退货门户；客户通知
          type: output
        - id: erp
          label: 品牌 ERP / 后端
          detail: NetSuite、SAP、QuickBooks、Magento；库存同步、会计集成
          type: input
      edges:
        - from: channels
          to: oms
          label: 实时订单流
        - from: erp
          to: oms
          label: 库存和订单数据
        - from: oms
          to: wms
          label: 拣货-打包工单
        - from: oms
          to: carrier
          label: 承运商选择请求
        - from: carrier
          to: nodes
          label: 承运商面单和路由
        - from: wms
          to: nodes
          label: 实体运营指令
        - from: nodes
          to: consumer
          label: 包裹发出
        - from: nodes
          to: erp
          label: 履约确认
    approximationNotes: |
      架构依据 Stord 公开产品文档、G2 评论，以及可比 3PL 平台架构的行业知识推断。
      云服务商（AWS）为推断，并非官方确认。未审阅内部技术文档。
    claimRefs:
      - CE001
      - CE006
      - CE007
      - CE012
      - CE013
