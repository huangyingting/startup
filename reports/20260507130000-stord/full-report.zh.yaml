  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              Stord 的产品最好理解为一个商业赋能操作系统——一个垂直整合平台，从采购、库存到配送和退货，管理品牌供应链。放在客户工作流中，品牌使用 Stord 会经历：（1）购买前：库存存放在 Stord 节点，并通过
              Stord 的需求规划仪表盘监控；SKU 按 AI 需求预测在节点间分配；（2）购买中：消费者在品牌的 Shopify/WooCommerce/Amazon 店铺下单后，Stord 的 OMS
              实时接收订单，把订单路由到有可用库存的最近节点，从
              UPS/FedEx/USPS/区域承运商中选择最优承运商，并为仓库团队生成拣货-打包-发货工单；（3）购买后：订单状态实时追踪并传达给消费者；退货在节点处理并重新入库。


              软件层（OMS、WMS、需求规划）是 Stord 区别于传统 3PL 的主要差异；传统 3PL 提供履约运营，却使用过时或供应商提供的 WMS 平台。Stord
              的整合数据模型意味着库存、订单和履约数据在一个系统里，而不是散落在彼此断开的工具中。统一数据层是 AI 承运商优化和需求预测能力的基础。


              物理层（自有节点）提供稳定服务水平和运营控制，让 Stord 区别于轻资产提供商。通过自有或租赁节点，Stord 可以保证具体 SLA（99.5%
              两日达覆盖）、推行统一技术标准，并维持质量控制；合作伙伴仓库模式做不到这一点。
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE005
