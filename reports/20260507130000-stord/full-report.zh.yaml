  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              技术赋能的美国电商履约市场层级清晰。Amazon FBA/MCF 位于顶端；对于 Amazon 原生卖家，它拥有最大货量和最低可变成本。ShipBob 是收入最高的独立 3PL（2023 年 $500 M），拥有
              50 个仓库、每年 100 M 个订单，并以 $4 B IPO 估值为目标。Stord 切入的是不同的企业和中端全渠道细分市场；在这里，软件集成、多渠道可视性，以及更小但更精选的节点网络上的 1-2
              天覆盖，才是竞争优势。


              传统 3PL——XPO Logistics、GXO Logistics、Ryder Last Mile、FedEx Supply
              Chain——按货量看拥有重要市场份额，但它们更多靠资产密度和费率竞争，而不是软件深度。需要电商原生平台（Shopify/WooCommerce 集成、实时追踪、自动退货）的 DTC
              细分市场，正在把业务转向技术赋能提供商。


              Shopify Fulfillment Network（SFN）在 2022 年吸收 Deliverr 后，争夺的是大部分收入来自 Shopify 店铺、且希望物流与商业平台打包的品牌。SFN
              采用轻资产模式，使用合作伙伴仓库，而不是自有设施。这带来平台锁定优势，但也限制了它服务复杂多渠道需求品牌的灵活性。


              Stord 的定位有意不同：它瞄准那些履约是任务关键、订单复杂度高（订阅、组合、套装、B2B 合规），且软件层与物理吞吐同等重要的品牌。G2 将 Stord 定位为 OMS Market Leader，评分
              4.3/5，体现出多数传统 3PL 缺失的软件优先品牌定位。
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
