            title: 客户数和流失数据是重大尽调缺口
            body: |
              Stord 未披露客户数、总流失率或 NRR。没有这些指标，就无法独立验证 GMV 和包裹量增长来自新客户获取、既有客户扩张，还是收购带来的非有机增加。这些应是尽调流程中最先索取的客户数据。
            calloutType: risk
