  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户画像与分层
        blocks:
          - type: paragraph
            body: >
              Stord 的核心客户是成长期 DTC 品牌：年 GMV $10M–$500M，已经超出最初 3PL 关系的承载能力，但还没准备好（或不愿）自建仓储网络。这些品牌需要企业级履约能力（多渠道
              OMS、承运商优化、B2B 零售分销），但不想承担自营仓库的资本强度。


              已披露客户群包括：

              - AG1（Athletic Greens）：高销量健康补剂订阅品牌；属于 SKU 复杂度和履约速度最高的订阅场景之一。

              - goodr：户外 / 运动眼镜品牌；证明 Stord 具备 DTC 服饰 / 配饰能力。

              - Native（P&G 子公司）：个护品牌；表明 Stord 能满足企业母公司的要求（P&G 采购、SOC 2、ESG 供应商标准）。

              - quip：消费口腔护理品牌；基于订阅；证明复购订单场景。

              - Seed Health：高端益生菌补剂订阅；画像类似 AG1。

              - Jolie：高端个护品牌；DTC 美妆。

              - Elysium Health：长寿补剂品牌；高 AOV 的 DTC 补剂。


              模式很一致：Stord 的理想客户是健康 / 保健、个护或生活方式领域的高端 DTC 品牌，通过订阅或复购销售，订单频次高，对客户体验和品牌调性敏感。这些品牌需要 >99% 订单准确率、2-day
              配送和品牌化消费者沟通——这些都是 Stord 主打的能力。


              次要客群包括企业品牌子公司（Native/P&G）以及从 DTC 扩展到 B2B 批发分销的品牌。
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
