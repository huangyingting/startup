  - id: FP002
    title: 竞争时间线——塑造履约市场的关键事件（2022–2026）
    type: timeline
    layout: standard
    summary: |
      2022 至 2026 年间影响技术驱动型 3PL 市场格局的关键竞争事件，
      与 Stord 的竞争位置相关。
    data:
