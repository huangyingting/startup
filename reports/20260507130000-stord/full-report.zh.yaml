            body: >
              AG1（Athletic Greens）：AG1 是 Stord 的旗舰参考客户之一。AG1 每月处理数十万订阅订单，对履约精度要求极高。AG1 关系证明 Stord
              能规模化处理高速订阅补货——这个场景要求节点表现稳定、需求规划准确以避免缺货，并且严格遵守 SLA。


              Native（P&G）：Native 是关键企业参考客户——其母公司 Procter & Gamble（P&G，NYSE: PG）是 Fortune 50 公司，供应商合规要求严格。Native 使用
              Stord，暗示 Stord 满足 P&G 的采购标准（数据安全、SLA、保险覆盖）。这是 Stord 已披露客户名单中最强的企业级验证。


              goodr：Goodr 在公司沟通中披露了对 Stord 的具体满意度；其将 Stord 的承运商优化和库存可视化列为关键价值驱动因素。


              Black Friday/Cyber Monday 2024：Stord 披露其支撑了 2024 年美国线上 BFCM 零售约 1%——假日周末隐含 GMV 约
              ~$1-2B，是其最高吞吐量测试，也是一项强运营背书。


              客户集合主要来自履约要求高、AOV 高、对物流品牌体验敏感的电商行业。Stord 目前没有披露汽车、电子或重 / 大件商品客户，说明其当前细分重点是高端轻量商品。
