      - number: '7.2'
        title: 竞争与市场风险
        blocks:
          - type: paragraph
            body: >
              Stord 的竞争地位承受多方向压力：


              ShipBob（$4B IPO 目标）：ShipBob 运营 50+ 个履约节点（对比 Stord 的 11 个），服务 10,000+ 个品牌（对比 Stord 估计 100-500 个），并据称目标以 $4B
              估值 IPO。IPO 后资本将让 ShipBob 加速节点扩张、收购 3PL，并投资 OMS 软件能力，直接挑战 Stord 的软件差异化。


              Shopify Fulfillment Network（SFN）：Shopify 控制美国 DTC 电商流量约 25-30%。SFN 直接集成在 Shopify 商家仪表盘中，带来结构性分发优势。Shopify
              品牌无需切换电商平台即可加入 SFN。如果 Shopify 扩展 SFN 的 OMS 能力或提高定价进攻性，可能截走 Stord 的主要获客渠道（Shopify Plus 品牌）。


              Amazon MCF：Amazon 的 Multi-Channel Fulfillment 服务利用其 1,000+ 个设施，为任何电商品牌提供 2-day 配送。Amazon
              的物流规模优势（承运商费率、量级折扣、机器人）形成 Stord 必须竞争的成本底线。不过，许多 DTC 品牌因担心与 Amazon Marketplace 共享数据（竞争渠道暴露）而回避 Amazon MCF。


              DTC 行业风险：Stord 的客户基础集中在高端 DTC 品牌。全行业逆风——数字获客成本上升（Meta/Google CPM 通胀）、Apple iOS 14.5+ 隐私变化降低 ROAS
              准确性、美国对中国制造商品加征关税、DTC 品牌疲劳——都可能压缩 Stord 客户群 GMV。客户品牌 GMV 下降 20%，会直接转化为 Stord 处理量和收入下降。
