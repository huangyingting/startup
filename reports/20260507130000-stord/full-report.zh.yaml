        - date: 2022-Q1
          label: Shopify 收购 Deliverr
          detail: Shopify 以 ~$2.1 B 收购 Deliverr，组建 Shopify Fulfillment Network，进入与 Stord 直接竞争的 3PL 赛道。
        - date: 2022-Q3
          label: Amazon 推出扩展版 MCF
          detail: Amazon Multi-Channel Fulfillment 扩展到支持非 Amazon 订单，并提供 Prime 速度 SLA，提升 FBA 作为多渠道替代方案的吸引力。
        - date: 2023-Q2
          label: ShipBob 收入达到 $500M
          detail: ShipBob 宣布年收入 $500M（2023），成为收入领先的独立技术驱动型 3PL，收入约为 Stord 的 3x。
        - date: 2024-Q1
          label: Amazon 为 FBA 引入入仓配置费
          detail: FBA 费用重构推高品牌卖家的成本，短期内推动其考察包括 Stord 在内的第三方替代方案。
        - date: 2024-Q3
          label: Stord 收购 ProPack 和 Pitney Bowes e-commerce
          detail: Stord 在 2024 年收购两家公司，扩展履约网络和能力，加快节点扩张。
        - date: 2024-Q4
          label: ShipBob 探索以 $4B 估值 IPO
          detail: ShipBob 公开推进以 $3–4 B 估值 IPO，释放其已准备进入公开市场的信号。IPO 将给 ShipBob 提供资金，支持更激进的网络 / 市场扩张。
        - date: 2025-Q2
          label: Stord 以 $1.5B 估值融资 $200M+
          detail: Stord 的 E 轮以 $1.5B 估值完成，显示投资人信心，但也凸显其与 ShipBob（$4B 目标） 和 Amazon 的估值差距，尽管 Stord 的软件定位更强。
        - date: 2026-Q2
          label: 市场：ShipBob IPO 后的竞争动态
          detail: 如果 ShipBob 在 2025-2026 年完成 IPO，资金充足的 ShipBob 可能加快企业级产品开发， 直接威胁 Stord 的细分市场。
    approximationNotes: |
      ShipBob 的 IPO 时间和估值是基于截至 late 2024 的公开报道（Forge、Sacra）估算；
      IPO 可能已推迟。Q2 2026 事件是预测情景，并非已确认发生。
    claimRefs:
      - CP006
      - CP007
      - CP010
      - CP019
      - CP023
