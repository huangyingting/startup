            title: 规模化盈利增长——罕见组合
            body: >
              Stord 在 2024 年实现持续盈利，同时自 2021 年以来合同收入增长 10x，并管理 $10 B 年 GMV。投资人明确将「盈利 + 高增长」这一组合称为「rare in this
              category」（NewView Capital），这也是 Stord 区别于仍在烧钱的重资产 3PL 同行的关键差异。持续盈利降低了继续进行摊薄性融资的紧迫性，也释放出运营成熟度信号。
