      - number: '4.4'
        title: 财务风险因素与估值缺口
        blocks:
          - type: paragraph
            body: >
              关键财务风险：


              1. 收入未经审计：不存在经审计财务数据。Latka 的 $147M 估计可能存在重大偏差。按 $1.5B / 真实收入计算的估值倍数未知。


              2. 债务契约未知：$120M First Citizens Bank / ORIX 工具的利率、到期日和契约没有披露。触发契约违约或被迫以更高利率再融资，都将构成不利因素。


              3. 盈利口径不清：「连续 4 个季度预订额超预期」作为盈利代理，并不能确认 EBITDA、营业利润或净利润盈利。自有节点折旧和 $120M 债务服务可能导致 GAAP 口径仍持续亏损。


              4. 客户集中度：头部客户（AG1、quip、Native、Seed Health）的收入占比未披露。如果 ≤5 个客户贡献 >30-40% 收入，集中度风险就很重大。


              5. 估值倍数风险：以 $1.5B / $147M = 约 ~10x 收入计算，Stord 的溢价取决于软件收入占比。如果软件收入 <10%，相对纯 3PL（传统供应商为 0.3-0.5x 收入），10x
              倍数偏高。如果软件占 20%+，SaaS 邻近可比公司可以支撑该倍数。


              6. 收购整合风险：2024 年 ProPack 和 Pitney Bowes 收购带来整合复杂度、商誉和潜在 earnout 负债，这些都没有体现在公开指标中。
