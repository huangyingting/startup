      items:
        - label: 入场估值
          value: $1.5B
          note: Series E，May 2025；Strike Capital 领投；已确认
        - label: 收入倍数（入场）
          value: ~10.2x LTM
          note: 基于约 $147M 估计收入；与履约科技可比公司基本一致
        - label: 入场 GMV
          value: $10B+
          note: 公司已披露；隐含抽佣率 1.47%
        - label: 盈利状态
          value: Achieved 2024
          note: 连续 4 个季度预订额超预期；EBITDA 利润率未披露
        - label: 总流失率
          value: Not disclosed
          note: 关键尽调问题；若投资逻辑成立，需假设 <10%
        - label: 净留存率（NRR）
          value: Not disclosed
          note: 考虑 B2B 扩张动力，预期 >100%；未确认
        - label: 目标退出估值（基准）
          value: $2.0-2.75B
          note: 2027E；$220-250M 收入对应 9-11x；1.3-1.8x 回报
        - label: 目标退出估值（乐观）
          value: $3.5-4.5B
          note: 2027E；$280-300M 收入对应 12-15x；2.3-3x 回报
        - label: 债务拖累
          value: $120M
          note: ORIX 风险债来自 Series E；约 $6-8M 年利息支出
    approximationNotes: |
      KPI 结合了已确认指标（Series E 条款、GMV、盈利能力）和分析师估计
