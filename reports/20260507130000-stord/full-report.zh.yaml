  - id: FE003
    title: 关键依赖图
    type: flow
    layout: standard
    summary: |
      列出 Stord 平台依赖的关键外部环节，以及各自的依赖严重性和失败模式，
      呈现平台可靠性的关键路径。
    data:
      nodes:
        - id: aws
          label: AWS 云基础设施
          detail: 整个平台托管在 AWS；任何 AWS 故障都会直接影响 OMS 和 WMS 可用性
          type: input
        - id: shopify_api
          label: Shopify API
          detail: 面向 Shopify 原生品牌的订单接入；Shopify API 变更可能打断订单流
          type: input
        - id: carrier_api
          label: 承运商 API（UPS/FedEx/USPS/区域）
          detail: 实时承运商报价；AI 优化依赖承运商 API 正常运行和数据准确
          type: input
        - id: labor
          label: 仓库劳动力市场
          detail: 实体运营依赖每个节点有劳动力可用；工资通胀或用工短缺都是运营风险
          type: input
        - id: stord_platform
          label: Stord 平台（OMS + WMS）
          detail: 连接所有输入；将订单路由到实体履约；打通软件层和实体层
          type: process
        - id: brand_erp
          label: 品牌 ERP / 电商技术栈
          detail: 品牌的 Shopify、NetSuite 或 SAP 集成必须保持；品牌侧 ERP 迁移会带来中断风险
          type: input
        - id: output
          label: 品牌履约输出
          detail: 包裹发出；SLA 达成；消费者满意
          type: output
      edges:
        - from: aws
          to: stord_platform
          label: 基础设施；失败 = 平台停机
        - from: shopify_api
          to: stord_platform
          label: 订单流；失败 = 订单接入缺口
        - from: carrier_api
          to: stord_platform
          label: 费率数据；失败 = 承运商选择错误
        - from: labor
          to: stord_platform
          label: 实体运营；短缺 = SLA 失约
        - from: brand_erp
          to: stord_platform
          label: 库存数据；ERP 变更 = 集成中断
        - from: stord_platform
          to: output
          label: 履约执行
    approximationNotes: |
      依赖严重性评估是本报告基于 Stord 产品架构和行业知识的推断。
      AWS 云服务商身份为推断，并非官方确认。未做内部架构审查。
