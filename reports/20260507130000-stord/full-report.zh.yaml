              - CV006
              - CV007
      - number: '8.3'
        title: 乐观、基准与悲观情景
        blocks:
          - type: paragraph
            body: >
              乐观情景（25% 概率）：Stord 执行 Series E 优先事项——Kentucky 扩张推动 GMV 增长，B2B 零售分销增加新收入流，国际 OMS 采用扩大总可用市场（TAM）。到 2027
              年收入达到 $280M；软件收入占比提升至总收入 20-25%；盈利能力增强。Stord 以 $4-5B 上市（收入 $280-300M 的 12-15x）。投资人回报：基于当前 $1.5B 估值为
              2.7-3.3x。


              基准情景（50% 概率）：Stord 到 2027 年收入增长至 $220-250M，靠持续签约额超预期推进，但面临 ShipBob 竞争压力和 DTC 行业逆风。盈利能力维持。以 $2.5-3B IPO
              或战略收购退出（收入 10-12x）。投资人回报：基于当前估值为 1.7-2x。


              悲观情景（25% 概率）：DTC 行业逆风让客户 GMV 下降 15-20%；ShipBob IPO 后达到 G2 OMS 同等能力；Stord 倍数压缩；债务契约受到考验。收入增长停滞在
              $175-190M；盈利能力收窄。以 $1.0-1.5B 被战略收购（收入 6-8x）。投资人回报：0.7-1.0x——基于 $1.5B 估值接近持平到小幅亏损。


              退出路径分析：IPO 是机构投资人主要退出路径（考虑到上市前收入增长要求，可能在 2027-2029 年）。Amazon（物流集成）、FedEx（电商履约）、Shopify（用 Stord 更强节点网络替代
              SFN）或私募股权整合平台收购，都是另一条 6-10x 战略溢价路径。
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
