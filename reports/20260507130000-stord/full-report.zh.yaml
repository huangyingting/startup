      - number: '8.4'
        title: 投资建议与尽调优先级
        blocks:
          - type: paragraph
            body: >
              总体评估：有利，但需要完成重大尽调。Stord 代表一项可信的 Series E 投资机会：市场大且防御性强（电商履约），差异化已被证明（G2 Market Leader OMS、$130M AI
              节省、$147M 收入时实现盈利）。$1.5B 估值落在这一规模和增长轨迹下 SaaS-物流混合公司的合理价值区间内。


              主要投资逻辑支撑：

              - 2024 年在 $147M 收入规模实现盈利，对 Series E 物流科技公司来说罕见，说明单位经济有纪律

              - $10B+ GMV 和 50M+ 包裹、11 个节点，证明运营规模

              - G2 Market Leader OMS 和 $130M 承运商节省，是可量化的软件护城河

              - Native/P&G 企业级验证表明其有能力赢下 Fortune 50 供应链

              - 连续 4 个季度签约额超预期，说明增长轨迹具备持续性


              需要尽调的主要担忧：

              1. 客户数、总流失率和 NRR 未披露——缺少这些数据，无法评估增长质量（有机 vs. 非有机）

              2. $120M 债务部分：契约条款、利息覆盖和流动性缓冲需要正式审查

              3. ShipBob IPO 时间线及 IPO 后竞争策略

              4. SOC 2 Type II 审计报告和网络安全状态

              5. 收入集中度：前 5 大客户 GMV 占总量 %


              否决条件：（1）尽调发现总流失率 >15%；（2）连续 2 个季度收入同比停滞 <5%；（3）未取得 SOC 2；（4）债务契约发生重大违约且没有补救路径；（5）CEO Sean Henry 离职。
            claimRefs:
              - CV013
              - CV014
              - CV015
