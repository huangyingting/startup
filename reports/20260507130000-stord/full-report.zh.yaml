      - number: '2.3'
        title: 买方分层、增长驱动与约束
        blocks:
          - type: paragraph
            body: >
              Stord 的目标买方，是健康 / 保健、个人护理、食品饮料或服装领域高速 DTC 品牌的运营负责人、供应链 VP 或 COO。这类品牌主要通过自有网站和 Amazon 销售，年 GMV 在 $20 M 到
              $500 M 之间。付款方是品牌；使用者是运营或仓库团队；最终受益者是收到订单的消费者。履约预算由运营部门掌握，但 $500 K–$5 M 区间的年度合同需要 CFO 批准，这也刻画了 Stord
              的中端企业交易规模。


              关键增长驱动：（1）消费者需求——2025 年，56 % 的美国购物者期待当日或两日达，迫使品牌匹配 Amazon 的配送速度；（2）DTC 复杂度——品牌跨
              Shopify、Amazon、零售和社交渠道销售，需要统一的 OMS/WMS 可视性；（3）成本压力——品牌越来越希望通过规模和 AI
              驱动的承运商优化节省包裹费用，而不是依赖单一承运商价目表；（4）退货——美国电商退货率为 16.5–20 %，形成对高效逆向物流的结构性需求，而传统 3PL 服务不足。


              关键采用约束：（1）切换成本——从现有 3PL 迁移涉及实体库存搬迁、WMS 数据迁移，以及 3–6 个月并行运营；（2）资本强度——Stord 的自有节点模式需要持续为设施、技术和劳动力投入
              CapEx；（3）关税和贸易风险——2025 年美国关税升级（对中国进口最高至 145 %）正在扰动全球采购的 DTC 品牌供应链，可能拖慢 GMV 增长或改变品牌库存模式；（4）Amazon 依赖——收入
              >60 % 来自 Amazon 的品牌有强动机使用 FBA，限制了 Stord 在该细分市场的触达。
