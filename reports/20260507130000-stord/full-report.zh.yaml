      - number: '7.3'
        title: 财务与资本风险
        blocks:
          - type: paragraph
            body: >
              Stord 2025 年 5 月 Series E 在 $80M 股权之外包含 $120M 债务融资。这笔债务带来：


              利息覆盖风险：按 2025 年估计的 LIBOR/SOFR 基准利率（5-7%），$120M 债务每年产生约 $6-8.4M 利息支出。在估计收入 ~$147M、且这类刚实现盈利的 3PL-科技混合公司
              EBITDA 利润率可能在 5-15% 区间的情况下，利息覆盖倍数估计为 2-4x——足够但有限；若收入增长放缓或运营费用增加，容错空间很小。


              债务契约风险：债务融资通常包含财务契约（收入增长、最低流动性、杠杆倍数）。收入不及预期或利润率压缩可能触发契约违约，限制 Stord 的运营灵活性，或迫使其重新谈判。


              烧钱与流动性：Stord 2024 年实现盈利，但利润率不高。Series E 的 $120M 债务很可能用于节点扩张（Kentucky $40M
              投资已确认）和收购整合。若扩张资本开支和债务服务压缩现金流，收入增长放缓时 Stord 可能面临流动性挑战。


              收入集中：如果 Stord 前 5 大客户贡献 >40% 收入（这一阶段 B2B SaaS + 服务公司的常见模式），一个锚定客户流失（如 AG1 流失或自建物流）会对 EBITDA 和债务覆盖造成实质不利影响。
