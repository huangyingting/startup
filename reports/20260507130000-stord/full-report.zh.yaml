      - number: '5.2'
        title: 产品模块与软件栈
        blocks:
          - type: paragraph
            body: >
              Stord 的软件平台由五个主要模块组成：


              1. 订单管理系统（OMS）：从所有渠道实时接入订单（Shopify、Amazon、WooCommerce、批发 EDI、社交电商）；智能路由至最优履约节点；用 AI 优化选择多承运商。2024 年 OMS 类别
              G2 Market Leader。对接 100+ 系统。


              2. 仓库管理系统（WMS）：指导每个节点的拣货、打包和发货操作；移动扫码提升准确率；实时库存可视性；FIFO/FEFO 管理；循环盘点；按区域拣货。


              3. 需求规划与库存优化：AI 驱动的需求预测；补货点计算；按需求地理分布在节点间分配；安全库存优化；90 天需求视野。


              4. 运输管理 / 承运商优化：多承运商报价引擎（UPS、FedEx、USPS、DHL、区域承运商）；按 SLA、成本和分区进行 AI 选择；包裹 manifest；追踪集成。


              5. 购买前 / 购买后体验：消费者订单追踪门户；品牌化发货通知；退货发起与处理门户；从消费者到节点再到重新入库的逆向物流工作流。


              平台通过 REST API 原生对接 Shopify（Shopify 的 Plus 合作伙伴）、Amazon（MCF 集成）、WooCommerce、NetSuite、QuickBooks、SAP 和 100+
              其他系统。集成层是关键切换壁垒：品牌的 ERP 和电商平台一旦接入 Stord 的 OMS，迁移就需要重接所有订单流。
