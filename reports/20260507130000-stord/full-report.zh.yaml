  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与收入流
        blocks:
          - type: paragraph
            body: >
              Stord 通过四类收入流变现：（1）履约费——按件收取拣货、打包和发货费用，外加收货和增值服务费；（2）仓储费——按自有节点中的托盘位、立方英尺或 SKU 货位收取月费；（3）运输收入——承运商成本转嫁，加上
              AI 谈判的批量折扣带来的利润；（4）软件订阅收入——OMS、WMS、需求规划和购买前 / 购买后体验平台费用，可与履约打包，也可单独销售。


              Stord 年 GMV 为 $10B，估计收入 $147M，隐含综合抽佣率约 1.5%——这符合技术赋能 3PL 的特征：订单价值的大部分流向承运商和产品成本。作为参照，一个经 Stord 处理的 $100
              订单，在综合抽佣率下为 Stord 贡献约 $1.50 收入；物流组件估计为商品价值的 8-15%，Stord 从中捕获一部分作为毛利。履约费是主导收入流，估计占收入 60-70%；高毛利的软件订阅组件估计占
              5-15%，也是主要估值溢价驱动。


              收入确认：「contracted revenue」自 2021 年以来增长 10x，很可能指多年协议下的总合同价值（TCV），而不是按期间确认的 GAAP 收入。这一区别对估值很关键：$500M TCV 积压，与
              $147M 年确认收入，会显著改变隐含倍数。
