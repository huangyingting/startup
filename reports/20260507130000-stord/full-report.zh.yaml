  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与方法
        blocks:
          - type: paragraph
            body: >
              更准确地看，Stord 不是纯 3PL，也不是纯 SaaS 公司，而是 SaaS 赋能的物流混合体。纯 3PL 公司（XPO、GXO、RXO）因资本强度高、软件利润率低，收入倍数约 0.5-1.5x。纯 SaaS
              物流公司收入倍数约 8-15x。Stord 的混合模式——实体节点产生经常性收入，同时叠加自研 OMS/WMS 软件——应处在两者之间。


              主要估值锚点：

              1. 最近一轮私募：2025 年 5 月 Series E 估值 $1.5B，融资 $200M（$80M 股权 + $120M 债务）。这是最近的一级市场数据点。

              2. 收入倍数：按估计收入 ~$147M（Latka Data，2024/2025），$1.5B 估值隐含约 10.2x LTM 收入——与 SaaS 赋能物流同行一致。

              3. GMV 估值：$10B+ GMV，抽成率 1.47%（收入 / GMV），说明 Stord 对其网络的变现率与成功的市场平台型物流平台一致。

              4. 可比交易：履约科技可比交易（Deliverr/Shopify 2022 年以约 8x 收入、$2.1B 收购）和 ShipBob 目标 IPO 估值（约 $4B，收入约 $500M = 8x）提供参考点。


              乐观情景：Stord 到 2027 年收入达到 $250-300M，并在证明软件利润率类似 SaaS 扩张后维持 10-12x 倍数 → $2.5-3.5B 估值。

              悲观情景：DTC 逆风压低 GMV；ShipBob IPO 后实现 OMS 同等能力；Stord 倍数压缩至 $180M 收入上的 6-7x → $1.0-1.25B，接近当前。

              基准情景：到 2027 年收入 $200-250M，8-10x 倍数 → $1.6-2.5B 估值。
