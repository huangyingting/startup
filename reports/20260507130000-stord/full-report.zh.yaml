            body: >
              Stord 尚未披露其承运商优化算法、OMS 或 WMS 的任何专利。IP 保护似乎依赖商业秘密和工程团队留存，而不是专利护城河。这意味着资本充足的竞争对手（有 IPO 资本的
              ShipBob、Deposco、Manhattan Associates）只要有足够时间和数据，就可能开发出可比算法。
            calloutType: risk
