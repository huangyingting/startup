      - 为何击穿投资逻辑
      - 概率
    rows:
      - - 总流失率披露为 >15%/yr
        - 正式尽调中披露
        - 击穿增长质量叙事；GMV 增长可能掩盖高流失；队列经济模型不可行
        - 低-中（20%）
      - - 收入增长连续 2 个季度停在 <5% YoY
        - Q3/Q4 2025 或 Q1/Q2 2026
        - 增长倍数溢价消失；债务覆盖恶化；IPO 时间表后移
        - 低（15%）
      - - 6 个月内未取得 SOC 2 Type II
        - 尽调后条件
        - 企业销售速度下降；P&G/Native 承压；新增企业客户受阻
        - 低（10%）
      - - 债务契约违约且未补救
        - 任一季度；由 ORIX 触发
        - 贷款方介入控制；运营受限；被迫以更低估值融资
        - 低（10%）
      - - CEO Sean Henry 离任
        - 任何公告
        - 投资人信心受损；企业销售中断；技术人才跟随创始人流失
        - 低（5%）
      - - ShipBob 获得 G2 OMS 市场领导者且节点超过 30 个
        - IPO 后 12-18 个月
        - 主要竞争护城河（OMS + 覆盖）同时受损
        - 中（30%）
      - - DTC 客户 GMV 全行业 YoY 下滑 >20%
        - 2025-2026 关税 / CAC 情景
        - 收入影响：$147M → $118M 或更低；投资逻辑需要收入增长，而非稳定
        - 低-中（20%）
    notes: null
    claimRefs:
      - CV013
      - CV014
      - CV015
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 尽调事项
      - 优先级
      - 需索取材料
      - 重要性
    rows:
      - - 客户队列数据
        - 关键
        - 每季新增客户、按队列的总流失率、按分部的 NRR、前 10 大客户收入集中度
        - 没有这些数据，无法评估收入质量和增长可持续性
      - - SOC 2 Type II 审计报告
        - 关键
        - 最近一次 SOC 2 Type II 审计报告（过去 12 个月）；渗透测试结果
        - 企业销售速度和监管合规都取决于此
      - - $120M 债务契约明细
        - 关键
        - ORIX 债务协议；契约包；流动性下限；提前还款条款
        - 看不到契约，就无法评估财务风险和运营灵活性
      - - Stord 按季度收入和 EBITDA（2022-2025）
        - 关键
        - 管理账；季度 P&L；按分部毛利率（软件 vs. 物流）
        - 验证盈利说法；评估软件收入占比和利润率结构
      - - 按客户收入集中度
        - 高
        - 按收入排名的前 10 大客户；占总收入比例；合同续约日期
        - 量化集中风险；锚定大客户流失情景
      - - OMS 和 WMS 架构审查
        - 高
        - 技术架构文件；工程团队组织架构图；专利 / IP 登记册
        - 验证软件防守性；评估复制风险
      - - 全部 11 个节点的 OSHA 合规记录
        - 高
        - OSHA 检查历史；安全事故日志；工伤赔偿申报
        - 监管暴露和运营安全文化
      - - Pitney Bowes 收购后的客户留存数据
        - 中
        - 收购后 12 个月内 Pitney Bowes 队列流失率
        - 收购质量；近期流失风险
      - - 员工流动数据
        - 中
        - 仓库和软件工程人员流动率；工资数据与本地基准对比
        - 劳动力成本可持续性；工程人才留存
      - - Series E 投资人共同投资条款
        - 中
        - Strike Capital 和共同投资人的 pro-rata 权利；董事会构成；反稀释条款
        - 后续轮次的治理与利益一致性
    notes: null
    claimRefs:
      - CV013
      - CV014
