          detail: 关税、CAC 上升、iOS 隐私变化冲击 DTC 品牌 GMV
          type: input
        - id: labor_inflation
          label: 劳动力成本上升
          detail: Amazon 工资底线、劳动力市场紧张、工资立法
          type: input
        - id: competitive_pressure
          label: 竞争压力
          detail: ShipBob IPO 资本；Shopify FN 扩张；Amazon MCF
          type: input
        - id: gmv_decline
          label: Stord GMV 下滑
          detail: 客户品牌 GMV 下滑；处理订单减少；仓储利用率降低
          type: process
        - id: margin_compression
          label: 利润率承压
          detail: 工资上升 + GMV 下降 = 经营杠杆转负；EBITDA 承压
          type: process
        - id: customer_churn
          label: 客户流失风险
          detail: SLA 未达标；竞争对手定价；客户转向 ShipBob 或 SFN
          type: process
        - id: covenant_risk
          label: 债务契约风险
          detail: $120M 债务批次；收入 / 杠杆率契约；贷款方限制
          type: process
        - id: strategic_response
          label: 战略应对
          detail: 节点扩张；B2B 多元化；机器人投入；国际化
          type: output
      edges:
        - from: dtc_headwinds
          to: gmv_decline
          label: 削减已处理品牌 GMV
        - from: competitive_pressure
          to: customer_churn
          label: 因定价 / SLA 转向 ShipBob 或 SFN
        - from: labor_inflation
          to: margin_compression
          label: 运营成本上升
        - from: gmv_decline
          to: margin_compression
          label: 经营杠杆转负
        - from: customer_churn
          to: gmv_decline
          label: 品牌订单量流失
        - from: margin_compression
          to: covenant_risk
          label: EBITDA 低于契约门槛
        - from: covenant_risk
          to: strategic_response
          label: 迫使资本重新配置
