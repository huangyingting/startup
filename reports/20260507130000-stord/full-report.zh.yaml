          - type: callout
            title: SOC 2 Type II 状态未获公开确认
            body: >
              企业品牌客户（如 Native，P&G 子公司）通常要求处理其客户数据的物流技术供应商具备 SOC 2 Type II 认证。任何公开来源都未确认 Stord 的 SOC 2 状态。若没有 SOC
              2，企业采购会面临重大缺口。这应是尽调中的第一个合规问题。
            calloutType: risk
