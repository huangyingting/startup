  - id: S2
    title: Competitor Profiles — Direct Competitors
    body: |
      ShipBob (private, $4B IPO target): Founded 2014, Chicago. ~$500 M revenue in 2023, 
      growing 43% YoY, including TikTok Shop partnership boost. 50 warehouse sites globally; 
      100 M orders shipped per year; $330 M+ raised. Strong WMS with deep Shopify, Amazon, 
      TikTok Shop, and Walmart integrations. Targets small-to-mid DTC brands. IPO exploration 
      as of 2024 suggests readiness for public market scrutiny. Advantage over Stord: revenue 
      scale ($500 M vs. ~$147 M), network density (50 vs. 11 nodes), and platform integrations. 
      Disadvantage: less enterprise software sophistication; limited B2B/omnichannel capabilities 
      vs. Stord.

      Shopify Fulfillment Network (SFN, subsidiary of Shopify): Asset-light model using 
      partner warehouses. Positioned as "fulfillment native to Shopify." Strong for small/mid 
      DTC brands entirely on Shopify. Does not support complex B2B compliance, omnichannel 
      routing, or large enterprise brands with multi-platform sales. Deliverr acquisition 
      (2022) added warehouse network but SFN remains a platform bundler, not a standalone 3PL.

      Amazon FBA/MCF (Amazon subsidiary): Dominant for Amazon-centric sellers. MCF (Multi-
      Channel Fulfillment) enables brands to use FBA inventory for non-Amazon orders. 
      Competitive disadvantage vs. Stord: branded unboxing experience restricted; FBA surcharges 
      (2024: inbound placement fee, inventory carry fees); brands with multi-channel or DTC 
      identity often prefer a non-Amazon logistics partner to protect brand experience.

      Flexe: On-demand warehouse marketplace connecting brands to 1,000+ warehouse partner 
      network. Asset-light, flexible. Targets enterprise brands needing surge capacity or 
      overflow storage. Does not have Stord's owned-node consistency or OMS software layer. 
      Competes primarily on storage flexibility and geographic coverage breadth rather than 
      pick/pack throughput or DTC brand experience.
