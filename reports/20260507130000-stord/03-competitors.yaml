  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: Stord customer retention and NRR data
      missingEvidence: >-
        Stord has not disclosed net revenue retention (NRR) rates or customer churn rates in any public filing or press
        release.
      whyItMatters: >-
        For a SaaS-enabled 3PL, NRR is the primary measure of customer stickiness and moat quality. Without it,
        competitive retention advantage vs. ShipBob cannot be assessed.
      diligencePath: Request NRR by customer cohort, gross churn, and contract renewal rates in diligence.
      relatedQuestionRefs:
        - QP021
    - type: missing-source
      severity: minor
      topic: Stord proprietary vs. third-party platform integrations
      missingEvidence: >-
        Stord has not specified whether all its platform integrations (Shopify, Amazon, NetSuite, ERP) are natively
        built or rely on third-party middleware like CartRover or ChannelAdvisor.
      whyItMatters: >-
        If integrations rely on third-party middleware, they are replicable by competitors; proprietary integrations
        create stronger lock-in.
      diligencePath: Review Stord's technical architecture documentation in diligence; request API capability roadmap.
      relatedQuestionRefs:
        - QP023
    - type: missing-source
      severity: minor
      topic: Stord pricing vs. competitor pricing comparison
      missingEvidence: >-
        No public pricing has been independently verified for Stord vs. ShipBob or ShipMonk on a per-unit or per-order
        basis.
      whyItMatters: >-
        Price competitiveness is a key factor in enterprise contract negotiations; without pricing benchmarks, ACV and
        margin compression risk cannot be assessed.
      diligencePath: Request sample pricing proposals for comparable brand customers in diligence.
      relatedQuestionRefs:
        - QP024
    - type: missing-source
      severity: minor
      topic: Stord adverse customer feedback and competitive losses
      missingEvidence: >-
        Only 47 G2 reviews are publicly available for Stord. No systematic adverse customer feedback or documented
        competitive losses have been publicly reported.
      whyItMatters: Adverse reviews and competitive loss patterns reveal operational weaknesses not visible in press coverage.
      diligencePath: Request 5-10 customer references (including churned customers) and review G2/Trustpilot reviews in detail.
      relatedQuestionRefs:
        - QP016
