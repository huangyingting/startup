  - id: FP002
    title: Competitive Timeline — Key Events Shaping the Fulfillment Market (2022–2026)
    type: timeline
    layout: standard
    summary: |
      Key competitive events from 2022 through 2026 that shaped the tech-enabled 3PL market 
      landscape relevant to Stord's competitive position.
    data:
      items:
        - date: 2022-Q1
          label: Shopify acquires Deliverr
          detail: >-
            Shopify pays ~$2.1 B for Deliverr, creating the Shopify Fulfillment Network and entering direct 3PL
            competition with Stord.
        - date: 2022-Q3
          label: Amazon launches expanded MCF
          detail: >-
            Amazon Multi-Channel Fulfillment expanded to support non-Amazon orders with Prime-speed SLAs, increasing FBA
            as multi-channel alternative.
        - date: 2023-Q2
          label: ShipBob reaches $500M revenue
          detail: >-
            ShipBob announces $500M annual revenue (2023), emerging as the revenue-leading independent tech-enabled 3PL,
            ahead of Stord by 3x.
        - date: 2024-Q1
          label: Amazon introduces inbound placement fees for FBA
          detail: >-
            FBA fee restructuring increases costs for brand sellers, creating near-term incentive to explore third-party
            alternatives including Stord.
        - date: 2024-Q3
          label: Stord acquires ProPack and Pitney Bowes e-commerce
          detail: >-
            Stord acquires two companies in 2024 to expand fulfillment network and capabilities, accelerating node
            expansion.
        - date: 2024-Q4
          label: ShipBob explores IPO at $4B valuation
          detail: >-
            ShipBob publicly pursues IPO at $3–4 B valuation, signaling readiness for public market. IPO would give
            ShipBob capital for aggressive network/market expansion.
        - date: 2025-Q2
          label: Stord raises $200M+ at $1.5B valuation
          detail: >-
            Stord's Series E at $1.5B signals investor confidence but highlights valuation gap vs. ShipBob ($4B target)
            and Amazon despite Stord's stronger software positioning.
        - date: 2026-Q2
          label: 'Market: Post-ShipBob IPO competitive dynamics'
          detail: >-
            If ShipBob completes IPO in 2025-2026, a well-capitalized ShipBob could accelerate enterprise product
            development directly threatening Stord's market segment.
    approximationNotes: |
      ShipBob's IPO timeline and valuation are estimates based on public reporting (Forge, Sacra) 
      as of late 2024; IPO may have been delayed. The Q2 2026 event is a projected scenario, not 
      a confirmed occurrence.
