callouts:
  - calloutType: insight
    title: Stord's Software Depth Is Its Primary Moat vs. ShipBob
    body: |
      ShipBob is larger by revenue ($500M vs. $147M est.) and network (50 vs. 11 nodes), 
      but Stord's competitive advantage is its enterprise software depth — G2 Market Leader 
      OMS, B2B retail compliance routing, and multi-channel demand planning — that addresses 
      a more complex buyer segment. The risk is whether this differentiation holds as ShipBob 
      develops enterprise capabilities post-IPO.
    claimRefs:
      - CP013
      - CP014
      - CP015
  - calloutType: risk
    title: ShipBob IPO Creates Best-Funded Competitor in Stord's Market
    body: |
      A ShipBob IPO at $3–4 B valuation would provide ShipBob with public-market capital 
      to expand into Stord's mid-market enterprise segment through product investment and 
      potential M&A. Stord's $1.5 B private valuation and $200 M+ recent round gives it 
      18–24 months of runway to deepen enterprise advantages before ShipBob's capital creates 
      meaningful competitive pressure in the $50M–$500M GMV brand segment.
    claimRefs:
      - CP019
      - CP023
  - calloutType: assumption
    title: Amazon MCF Remains Structurally Disadvantaged for Brand-Centric DTC
    body: |
      Stord assumes Amazon MCF remains less attractive for brand-focused DTC companies due 
      to Amazon's branded packaging restrictions and dependency on Amazon's delivery network. 
      If Amazon launches a branded MCF tier (allowing custom boxes) or acquires a tech-enabled 
      3PL, this assumption breaks. The 2024 FBA fee increases are a temporary tailwind; 
      long-term Amazon remains the dominant logistics infrastructure in US e-commerce.
    claimRefs:
      - CP010
      - CP011
      - CP020
