figures:
  - id: FP001
    title: Competitive Positioning Matrix — Software Sophistication vs. Network Scale
    type: quadrant
    layout: standard
    summary: |
      Positions the major fulfillment competitors on two axes: software sophistication 
      (x-axis, low to high) and physical network scale (y-axis, small to large). 
      Stord occupies the "high software / mid-scale" quadrant; ShipBob is "moderate 
      software / large scale"; Amazon FBA is "moderate software / very large scale"; 
      SFN is "limited software / asset-light"; legacy 3PLs are "legacy software / large scale".
    data:
      points:
        - label: Stord
          x: 8
          'y': 4
          description: High software sophistication (OMS G2 Leader); mid-scale network (11 nodes)
        - label: ShipBob
          x: 6
          'y': 7
          description: Strong WMS; large network (50 sites, 100M orders/yr)
        - label: Amazon FBA/MCF
          x: 5
          'y': 10
          description: Amazon-specific software; massive network (150+ fulfillment centers)
        - label: Shopify FN
          x: 4
          'y': 3
          description: Platform-native but limited; asset-light partner network
        - label: Flexe
          x: 2
          'y': 5
          description: Limited software; broad but inconsistent partner network (1000+ sites)
        - label: ShipMonk
          x: 5
          'y': 2
          description: Good WMS for DTC/subscription; smaller scale (13 nodes)
        - label: Legacy 3PLs (XPO/GXO/Ryder)
          x: 3
          'y': 8
          description: Legacy technology; large owned asset base
    approximationNotes: |
      Axis scores are qualitative assessments based on public product documentation, G2 reviews,
      and analyst comparisons. They are not independently audited. Network scale is relative 
      within this competitive set, not an absolute measure.
