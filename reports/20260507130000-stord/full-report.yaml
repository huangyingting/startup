  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Valuation Framework and Methodology
        blocks:
          - type: paragraph
            body: |
              Stord's valuation is most accurately assessed as a SaaS-enabled logistics hybrid 
              rather than a pure 3PL or pure SaaS company. Pure 3PL companies (XPO, GXO, RXO) 
              trade at 0.5-1.5x revenue due to capital intensity and low software margins. Pure 
              SaaS logistics companies trade at 8-15x revenue. Stord's blended model — physical 
              nodes generating recurring revenue combined with proprietary OMS/WMS software — 
              warrants a multiple between these extremes.

              Primary valuation anchors:
              1. Last private round: $1.5B at Series E (May 2025), with $200M financing ($80M 
                 equity + $120M debt). This is the most recent primary data point.
              2. Revenue multiple: At estimated ~$147M revenue (Latka Data, 2024/2025), the 
                 $1.5B valuation implies approximately 10.2x LTM revenue — in line with 
                 SaaS-enabled logistics peers.
              3. GMV-based valuation: $10B+ GMV at 1.47% take rate (revenue/GMV) implies 
                 Stord is monetizing its network at a rate consistent with successful marketplace 
                 logistics platforms.
              4. Comparable transactions: Fulfillment-tech comparables (Deliverr/Shopify $2.1B 
                 acquisition at ~8x revenue in 2022) and ShipBob's target IPO valuation (~$4B 
                 at ~$500M revenue = 8x) provide reference points.

              Bull case: Stord reaches $250-300M revenue by 2027, maintaining 10-12x multiple 
              as it demonstrates SaaS-like software margin expansion → $2.5-3.5B valuation.
              Bear case: DTC headwinds reduce GMV; ShipBob achieves OMS parity post-IPO; 
              Stord's multiple compresses to 6-7x on $180M revenue → $1.0-1.25B, near current.
              Base case: $200-250M revenue by 2027, 8-10x multiple → $1.6-2.5B valuation.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
      - number: '8.2'
        title: Comparable Company Analysis
        blocks:
          - type: paragraph
            body: |
              Stord's most relevant comparables are:

              Public SaaS-logistics hybrids:
              - Shipwire (2022, acquired by Ingram Micro): ~$200M revenue at ~$800M implied 
                value = ~4x. However, Shipwire lacked Stord's owned nodes and software depth.
              - Deliverr (acquired by Shopify, 2022): $2.1B acquisition; Deliverr had ~$200-300M 
                revenue = ~7-10x; Shopify paid a strategic premium for the node network.
              - nShift/Consignor: European logistics SaaS at ~$150M ARR and ~$1B valuation = ~7x.
              - XPO Logistics / RXO / GXO (spun out 2022): public freight and 3PL multiples 
                at 0.7-1.2x revenue; Stord's software layer justifies significant premium.

              Venture-backed logistics peers:
              - ShipBob: $500M+ revenue, target IPO at ~$4B = ~8x (provides key baseline)
              - Flexport: ~$2.1B revenue, ~$3.8B valuation = ~1.8x (much lower multiple due 
                to lower software content in revenue)
              - project44: ~$100M ARR, $3.1B valuation = ~31x ARR; pure SaaS (visibility only)

              Analysis: Stord's 10.2x revenue multiple is appropriate for its hybrid model:
              - Premium to pure 3PLs (0.5-1.5x) due to OMS/WMS software and AI carrier optimization
              - Discount to pure SaaS logistics (project44 at 31x) due to physical asset intensity
              - In line with fulfillment-tech peers (Deliverr 7-10x, ShipBob target ~8x)
              - Slight premium to ShipBob because Stord has demonstrated profitability and 
                OMS market leadership

              Key multiple-expansion drivers: revenue mix shift toward higher-margin software; 
              international GMV growth; B2B retail distribution ACV expansion; robotics/automation 
              reducing labor cost as % of revenue.
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV008
      - number: '8.3'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: |
              Bull scenario (25% probability): Stord executes on Series E priorities — Kentucky 
              expansion drives GMV growth, B2B retail distribution adds new revenue streams, 
              international OMS adoption expands TAM. Revenue reaches $280M by 2027; software 
              revenue mix increases to 20-25% of total; profitability strengthens. Stord IPOs 
              at $4-5B (12-15x $280-300M revenue). Investor return: 2.7-3.3x on $1.5B current 
              valuation.

              Base scenario (50% probability): Stord grows revenue to $220-250M by 2027 through 
              consistent bookings beats but faces ShipBob competitive pressure and DTC sector 
              headwinds. Profitability maintained. IPO or strategic acquisition at $2.5-3B 
              (10-12x revenue). Investor return: 1.7-2x on current valuation.

              Bear scenario (25% probability): DTC sector headwinds cut customer GMV 15-20%; 
              ShipBob achieves G2 OMS parity post-IPO; Stord's multiple compresses; debt 
              covenants tested. Revenue growth plateaus at $175-190M; profitability narrows. 
              Strategic acquisition at $1.0-1.5B (6-8x revenue). Investor return: 0.7-1.0x — 
              near flat to slight loss on $1.5B valuation.

              Exit path analysis: IPO is the primary institutional investor exit path (likely 
              2027-2029 given pre-revenue growth requirements). Strategic acquisition by 
              Amazon (logistics integration), FedEx (e-commerce fulfillment), Shopify (Replace 
              SFN with Stord's superior node network), or a private equity roll-up represents 
              an alternative at 6-10x strategic premium.
            claimRefs:
              - CV009
              - CV010
              - CV011
              - CV012
      - number: '8.4'
        title: Investment Recommendation and Due Diligence Priorities
        blocks:
          - type: paragraph
            body: |
              Overall assessment: Favorable with material diligence requirements. Stord represents 
              a credible Series E investment in a large and defensible market (e-commerce 
              fulfillment) with demonstrated differentiation (G2 Market Leader OMS, $130M AI 
              savings, profitability at $147M revenue). The $1.5B valuation is within the range 
              of fair value for a SaaS-logistics hybrid at this scale and growth trajectory.

              Primary investment thesis support:
              - Profitability in 2024 at $147M revenue is a rare achievement for a Series E 
                logistics-tech company and suggests disciplined unit economics
              - $10B+ GMV and 50M+ packages at 11 nodes demonstrates operational scale
              - G2 Market Leader OMS and $130M in carrier savings are quantifiable software moat
              - Native/P&G enterprise validation indicates capability to win Fortune 50 supply chains
              - 4 consecutive quarters of bookings beats suggests sustainable growth trajectory

              Primary concerns requiring diligence:
              1. Customer count, gross churn, and NRR are not disclosed — without these, growth 
                 quality (organic vs. inorganic) cannot be assessed
              2. $120M debt tranche: covenant terms, interest coverage, and liquidity buffer need 
                 formal review
              3. ShipBob IPO timeline and post-IPO competitive strategy
              4. SOC 2 Type II audit report and cybersecurity posture
              5. Revenue concentration: top-5 customer GMV as % of total

              Kill criteria: (1) Gross churn >15% revealed in diligence; (2) Revenue stagnation 
              <5% YoY for 2 consecutive quarters; (3) SOC 2 not achieved; (4) Debt covenants 
              materially breach with no cure path; (5) CEO Sean Henry departure.
            claimRefs:
              - CV013
              - CV014
              - CV015
      - number: '8.5'
        title: Exhibits
        blocks:
          - type: callout
            title: 10.2x Revenue Multiple Is Fair, Not Cheap — But Justified by Profitability
            body: |
              At ~10.2x estimated revenue, Stord is priced at a premium to most logistics 
              comparables but in-line with fulfillment-tech peers. The key premium driver is 
              profitability at $147M revenue — a rare achievement for a Series E logistics-tech 
              company. This justifies a slight multiple premium vs. unprofitable peers. Any 
              revenue growth that also improves software mix (OMS SaaS vs. logistics services) 
              would warrant multiple expansion toward project44's 20-30x range.
            calloutType: insight
            claimRefs:
              - CV001
              - CV002
          - type: callout
            title: ShipBob IPO Is the Primary Multiple-Compression Risk
            body: |
              If ShipBob successfully IPOs at $4B, it will gain public market capital to 
              accelerate both node expansion and OMS software investment. A post-IPO ShipBob 
              that achieves G2 OMS Market Leader status AND surpasses Stord's node count 
              would compress Stord's revenue multiple from 10x toward ShipBob's comparable 
              multiple. This scenario is the single largest risk to Stord's valuation.
            calloutType: risk
            claimRefs:
              - CV007
              - CV012
          - type: callout
            title: Strategic Acquisition Is an Underappreciated Exit Path
            body: |
              Stord's vertically integrated model (owned nodes + OMS/WMS software) is difficult 
              to replicate but highly valuable to strategic acquirers. Shopify paid $2.1B for 
              Deliverr's inferior network in 2022. At Stord's current scale ($10B+ GMV, 11 nodes, 
              G2 Market Leader OMS), a strategic acquirer (Amazon, FedEx, Shopify, UPS) could 
              justify $2.5-3.5B as a strategic premium — representing a plausible exit even in 
              the base or bear case.
            calloutType: insight
