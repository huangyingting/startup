chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: |
              Stord, Inc. is headquartered in Atlanta, Georgia and was incorporated in 2015. The
              company describes itself as "The Consumer Experience Company," positioning its
              vertically integrated fulfillment network plus cloud software as the operational
              backbone for omnichannel brands seeking to compete with Amazon on delivery speed and
              reliability without ceding the direct customer relationship. Its tagline is "powering
              seamless checkout through post-delivery" and its stated mission is "leveling the
              commerce playing field so that brands of all sizes can tap into industry-leading tools
              to deliver a seamless consumer experience on every order, every time, anywhere, and
              at scale."

              The company began as an asset-light, on-demand warehousing marketplace inspired by
              the "Airbnb for warehousing" model, connecting brands with excess warehouse capacity.
              Over time it transitioned to operating its own strategically placed fulfillment nodes
              while layering proprietary software over both its owned facilities and third-party
              partners. As of May 2026 Stord manages over $10 B of commerce annually via its
              fulfillment network and powers more than 50 M consumer packages per year across the
              US, Canada, UK, and EU. Its 11 fulfillment nodes span 13 buildings, covering 99.5 %
              of the US population with 1-2 day ground shipping.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: |
              Sean Henry (CEO, Co-founder) grew up in Atlanta and enrolled at Georgia Tech, where
              he developed the Stord concept while running an e-commerce side business and
              interning with a German automotive manufacturer. He experienced first-hand how
              fragmented warehousing and logistics created operational pain for online sellers.
              He and Jacob Boudreau (CTO, Co-founder) met at an Atlanta startup conference; both
              dropped out to pursue Stord full-time and joined Georgia Tech's CREATE-X
              accelerator, receiving an initial $10,000 seed investment from the program.

              Henry is the primary external spokesperson and strategist, frequently cited in press
              coverage articulating the company's differentiation around integrated software plus
              physical operations. Boudreau leads engineering and product and maintains a lower
              public profile. Neither founder has announced any change in role or departure as of
              the report date. The company has not publicly disclosed a complete C-suite roster
              beyond the two co-founders; FT Partners served as financial advisor for the Series E.

              On the board, investors Kleiner Perkins (led Series A, D, and participated in
              Series E), Founders Fund, Strike Capital (Series E lead), Baillie Gifford, and
              Franklin Templeton are all represented as major investors, though individual board
              seat assignments beyond co-founders are not disclosed in public sources reviewed.
              The Georgia Tech Foundation joined the Series E, reflecting the founders' alumni
              ties. Salesforce Ventures participated in the Series C and D, signaling enterprise
              software ecosystem alignment.
            claimRefs:
              - CO006
              - CO007
              - CO008
              - CO009
              - CO010
              - CO011
              - CO012
      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: |
              Stord has raised more than $525 M in total financing across seven rounds from 2018
              through May 2025, including a growth debt facility component in the Series E.

              The Seed round (April 2018, $2.6 M) was led by Dynamo Ventures and Susa Ventures.
              Series A (April 2019, $12.4 M) was led by Kleiner Perkins with Susa, Revolution,
              Engage, and Dynamo participating. Series B (November 2020, $35 M) was led by
              Founders Fund with Kleiner Perkins, Susa, Dynamo, Good Friends, and B Capital.
              Series C (March 2021, $65 M) was led by Bond Capital with Founders Fund, Susa,
              Dynamo, Salesforce Ventures, and Lineage as co-investors, followed rapidly by
              Series D (September 2021, $90 M at $1.1 B valuation) led by Kleiner Perkins with
              Lux Capital, Palm Tree Crew, Founders Fund, Susa, BoxGroup, and others. A Series D
              extension (May 2022, $120 M at $1.3 B valuation) was led by Franklin Templeton with
              137 Ventures, Founders Fund, Kleiner Perkins, Susa, Bond, Lux, Strike Capital, and
              Sozo Ventures participating.

              The Series E (May 16, 2025) raised $200 M+ consisting of $80 M in equity led by
              Strike Capital and a $120 M growth debt facility from Silicon Valley Bank (SVB,
              First Citizens Bank division) and ORIX USA. New investors Baillie Gifford, NewView
              Capital, G Squared, and Georgia Tech Foundation joined; existing investors Kleiner
              Perkins, Franklin Templeton, Founders Fund, Bond, Sozo, 137, and Lux participated.
              The Series E set the post-money valuation at $1.5 B, reflecting 10x contracted
              revenue growth since 2021 and sustained profitability achieved in 2024. No secondary
              market transaction data was identified in public sources to establish an independent
              post-Series E implied valuation.
            claimRefs:
              - CO013
              - CO014
              - CO015
              - CO016
              - CO017
              - CO018
              - CO019
              - CO020
              - CO021
      - number: '1.4'
        title: Scale, Milestones, and Adverse Events
        blocks:
          - type: paragraph
            body: |
              Since its founding Stord has reached the following operational scale indicators as
              of Q1 2025: GMV of ~$10 B annually, 50 M+ consumer packages per year, 99.5 % US
              1-2 day ground coverage, 30 M packages delivered reaching ~11.5 % of US households
              in 2024, and savings of approximately $130 M in parcel fees for customers in 2024.
              The company powered nearly 1 % of Black Friday/Cyber Monday US online sales in 2024
              and completed record-breaking Q1 2025 with highest sales bookings to date.

              On the network side, Stord expanded from a handful of nodes to 11 fulfillment nodes
              across 13 buildings in the US, Canada, UK, and the EU after acquiring ProPack
              Logistics and the Pitney Bowes e-commerce fulfillment business in 2024. A $40 M
              investment in a Kentucky facility (formerly Pitney Bowes) announced in late 2025
              is expected to create 500+ new jobs. Revenue is estimated at approximately $147 M
              as of 2025 (Latka/Growjo) with 681 direct employees and over 1,300 when facility
              workers are included; Stord does not publicly disclose headcount.

              From an adverse-evidence standpoint, no material litigation, regulatory enforcement
              actions, product recalls, or major outage events tied specifically to Stord were
              found in public sources reviewed. Customer reviews on G2 (4.3/5, 47 reviews) and
              Capterra (4.0/5) show high overall satisfaction, with isolated complaints around
              integration complexity and communication during peak-period disruptions. The company
              faces ongoing competitive pressure from Amazon FBA, ShipBob, and the Shopify
              Fulfillment Network, each of which benefits from scale advantages or platform
              lock-in that Stord must continuously work to offset.
            claimRefs:
              - CO022
              - CO023
              - CO024
              - CO025
              - CO026
              - CO027
              - CO028
              - CO029
              - CO030
