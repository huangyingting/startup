        title: Exhibits
        blocks:
          - type: callout
            title: Profitable Growth at Scale — Rare Combination
            body: |
              Stord achieved sustained profitability in 2024 while growing contracted revenue 10x
              since 2021 and managing $10 B in annual GMV. This combination of profitability and
              high growth is explicitly highlighted by investors as "rare in this category"
              (NewView Capital) and is a key differentiator from capital-intensive 3PL peers that
              continue to burn cash. Sustained profitability reduces the urgency of further dilutive
              financing and signals operational maturity.
