        - Adjacent; natural expansion for Stord's DTC customer base
      - - International fulfillment (UK, EU, Canada)
        - Cross-border e-commerce fulfillment
        - Customs brokerage, regulatory compliance advisory
        - Same DTC brand buying center as US
        - Early expansion; currently limited to 3 geographies
