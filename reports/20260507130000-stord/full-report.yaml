      - Diligence Item
      - Priority
      - What to Request
      - Why It Matters
    rows:
      - - Customer cohort data
        - Critical
        - Quarterly customer additions, gross churn by cohort, NRR by segment, top-10 revenue concentration
        - Revenue quality and growth sustainability cannot be assessed without this
      - - SOC 2 Type II audit report
        - Critical
        - Most recent SOC 2 Type II audit report (last 12 months); penetration test results
        - Enterprise sales velocity and regulatory compliance depend on this
      - - $120M debt covenant schedule
        - Critical
        - ORIX debt agreement; covenant package; liquidity floors; prepayment terms
        - Financial risk and operational flexibility cannot be assessed without covenant visibility
      - - Stord revenue and EBITDA by quarter (2022-2025)
        - Critical
        - Management accounts; quarterly P&L; gross margin by segment (software vs. logistics)
        - Validate profitability claim; assess software revenue mix and margin profile
      - - Revenue concentration by customer
        - High
        - Top-10 customers by revenue; % of total; contract renewal dates
        - Concentration risk quantification; anchor customer churn scenario
      - - OMS and WMS architecture review
        - High
        - Technical architecture document; engineering team org chart; patent/IP register
        - Validate software defensibility; assess replication risk
      - - OSHA compliance records for all 11 nodes
        - High
        - OSHA inspection history; safety incident log; workers' comp claims
        - Regulatory exposure and operational safety culture
      - - Pitney Bowes acquisition customer retention data
        - Medium
        - Churn rate among Pitney Bowes cohort in 12 months post-acquisition
        - Acquisition quality; near-term churn risk
      - - Employee turnover data
        - Medium
        - Warehouse and software engineering turnover rates; wage data vs. local benchmarks
        - Labor cost sustainability; engineering talent retention
      - - Series E investor co-investment terms
        - Medium
        - Strike Capital and co-investor pro-rata rights; board composition; anti-dilution provisions
        - Governance and alignment for future rounds
    notes: null
    claimRefs:
      - CV013
      - CV014
