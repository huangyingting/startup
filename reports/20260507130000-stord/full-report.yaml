  - id: FM003
    title: Buyer / Segment Map — Adoption Path for DTC Brands
    type: flow
    layout: standard
    summary: |
      How different DTC brand segments discover, evaluate, and adopt Stord's commerce-
      enablement platform, from initial pain trigger through onboarding to expansion.
    data:
      nodes:
        - id: pain
          label: 'Trigger: Logistics Pain'
          detail: Failed peak period, 3PL SLA breach, 2-day delivery gap, or fragmented software
          type: input
        - id: eval
          label: 'Evaluation: RFP or Consultant-Led'
          detail: Brand ops team evaluates 2-4 providers; demo, reference calls, site visit to Stord node
          type: process
        - id: pilot
          label: 'Pilot: SKU Migration'
          detail: 30-90 day SKU-specific pilot in one Stord node; parallel ops with existing 3PL
          type: process
        - id: onboard
          label: 'Full Onboarding: Inventory Migration'
          detail: Full inventory transfer; OMS/WMS integration to Shopify, NetSuite, or ERP
          type: process
        - id: expand
          label: 'Expansion: B2B / International / Software Upsell'
          detail: Brand adds B2B retail routing, UK/EU nodes, or premium AI analytics subscription
          type: output
        - id: retention
          label: 'Retention: Switching Costs Lock-in'
          detail: WMS integration depth + inventory inertia create 2-3 year minimum retention
          type: process
      edges:
        - from: pain
          to: eval
          label: RFP or inbound lead
        - from: eval
          to: pilot
          label: Contract signed; pilot begins
        - from: pilot
          to: onboard
          label: Pilot success triggers full migration
        - from: onboard
          to: expand
          label: NRR uplift from expanded services
        - from: expand
          to: retention
          label: Data and physical lock-in created
    approximationNotes: |
      Pilot-to-full-migration cycle length (30–90 days) is an industry estimate; Stord has not
      disclosed specific onboarding timelines in public sources.
    claimRefs:
      - CM011
      - CM012
      - CM013
      - CM014
