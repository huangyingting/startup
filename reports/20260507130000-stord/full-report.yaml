  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Profile and Segmentation
        blocks:
          - type: paragraph
            body: |
              Stord's core customer segment is the growth-stage DTC brand — companies with 
              $10M–$500M in annual GMV that have outgrown their initial 3PL relationship but 
              are not yet ready (or willing) to build a private warehouse network. These brands 
              need enterprise-grade fulfillment capabilities (multi-channel OMS, carrier 
              optimization, B2B retail distribution) without the capital intensity of self-
              operated warehouses.

              The disclosed customer base includes:
              - AG1 (Athletic Greens): High-volume health supplement subscription brand; one of 
                the highest-SKU and highest-velocity subscription fulfillment use cases.
              - goodr: Outdoor/sports eyewear brand; demonstrates Stord's DTC apparel/accessories 
                capability.
              - Native (P&G subsidiary): Personal care brand; indicates Stord can meet enterprise 
                parent company requirements (P&G procurement, SOC 2, ESG supplier standards).
              - quip: Consumer oral care brand; subscription-based; demonstrates repeat-order 
                use case.
              - Seed Health: Premium probiotic supplement subscription; similar profile to AG1.
              - Jolie: Premium personal care brand; direct-to-consumer beauty.
              - Elysium Health: Longevity supplement brand; high-AOV DTC supplement.

              The pattern is consistent: Stord's ideal customer is a premium DTC brand in 
              health/wellness, personal care, or lifestyle goods, selling via subscription or 
              repeat purchase with high order frequency and brand-sensitive customer experience 
              requirements. These brands need >99% order accuracy, 2-day delivery, and branded 
              consumer communications — all capabilities Stord markets.

              Secondary segments include enterprise brand subsidiaries (Native/P&G) and brands 
              expanding from DTC into wholesale B2B distribution.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU004
      - number: '6.2'
        title: Named Customer Evidence and Case Studies
        blocks:
          - type: paragraph
            body: |
              AG1 (Athletic Greens): AG1 is one of Stord's marquee reference customers. AG1 
              processes hundreds of thousands of subscription orders monthly with extremely 
              high fulfillment precision requirements. The AG1 relationship illustrates Stord's 
              ability to handle high-velocity subscription replenishment at scale — a demanding 
              use case that requires consistent node performance, accurate demand planning to 
              prevent stockouts, and precise SLA compliance.

              Native (P&G): Native is a key enterprise reference — its parent company, Procter & 
              Gamble (P&G, NYSE: PG), is a Fortune 50 company with strict supplier compliance 
              requirements. Native's use of Stord implies that Stord meets P&G's procurement 
              standards (data security, SLA, insurance coverage). This is the strongest 
              enterprise validation in Stord's disclosed customer list.

              goodr: Goodr disclosed specific Stord satisfaction in company communications; 
              cited Stord's carrier optimization and inventory visibility as key value drivers.

              Black Friday/Cyber Monday 2024: Stord disclosed that it powered approximately 1% 
              of US online BFCM retail in 2024 — an implied GMV of ~$1-2B across the holiday 
              weekend, representing its highest throughput test and a strong operational reference.

              The customer set is predominantly in e-commerce sectors with high fulfillment 
              demands, high AOV, and brand-sensitive logistics. Stord does not currently have 
              disclosed automotive, electronics, or heavy/bulky goods customers, suggesting 
              a current segment focus on premium lightweight goods.
            claimRefs:
              - CU005
              - CU006
              - CU007
              - CU008
              - CU009
      - number: '6.3'
        title: GMV, Volume, and Growth Trajectory
        blocks:
          - type: paragraph
            body: |
              Stord's scale metrics (as of 2025):
              - GMV: $10B+ (total annual merchandise value processed)
              - Package volume: 50M+ packages per year
              - BFCM share: ~1% of US e-commerce in 2024 (implied $1-2B in BFCM GMV alone)
              - Revenue: ~$147M estimated (Latka Data, 2024/2025); official revenue not disclosed
              - Profitability: Achieved in 2024 (4 consecutive quarters of bookings beats)
              - 11 fulfillment nodes; 13 buildings; ~681+ direct employees + 1,300+ with facility

              Growth trajectory: The $200M Series E in May 2025 was accompanied by claims of 
              4 consecutive quarters of bookings beats over prior-year periods — indicating 
              accelerating enterprise customer additions rather than single-year surges.

              The 2024 acquisitions of ProPack Logistics and Pitney Bowes e-commerce business 
              significantly expanded Stord's node network and customer base — the Pitney Bowes 
              acquisition brought established enterprise fulfillment relationships. Exact customer 
              counts before and after acquisitions are not disclosed.

              Net revenue retention (NRR) and gross churn rates are not publicly available. 
              The depth of OMS/ERP integration suggests elevated switching costs that would 
              translate to low gross churn among established enterprise customers, but this 
              cannot be independently verified. Competitor ShipBob's reportedly higher customer 
              count (10,000+ brands) vs. Stord's undisclosed (but clearly smaller) customer 
              base suggests Stord is higher-ACV, fewer-brand vs. ShipBob's broader SMB base.
            claimRefs:
              - CU010
              - CU011
              - CU012
              - CU013
      - number: '6.4'
        title: Retention Dynamics and Customer Concentration Risk
        blocks:
          - type: paragraph
            body: |
              Retention drivers: Stord's retention advantages center on three mechanisms:
              1. Integration lock-in: OMS/WMS integration with brand's Shopify, ERP (NetSuite, SAP), 
                 and Amazon Seller Central typically takes 1-3 months to build. Migration to a 
                 competing 3PL requires re-building all integrations — creating meaningful switching 
                 cost especially for brands with complex multi-channel configurations.
              2. Quantified savings: The $130M in carrier savings across the customer base in 
                 2024 creates per-brand savings that brands can quantify; this ROI anchors 
                 the brand's economic case for staying on Stord vs. switching.
              3. Node geography: The 99.5% US 2-day delivery coverage using 11 nodes means 
                 switching to a competitor with fewer nodes (e.g., a regional 3PL) would 
                 degrade delivery performance and consumer satisfaction.

              Customer concentration risk: Stord's disclosed customer list is small and in 
              narrow categories (health/wellness supplements, personal care). If AG1 or 
              Native/P&G represented a disproportionate share of GMV, churn of either would 
              be materially adverse. This concentration risk is unquantifiable without private 
              revenue data by customer.

              Adverse signals: Some G2 reviews note SLA misses at peak periods and pricing 
              complexity as negative factors. These could contribute to mid-market churn where 
              brands lack leverage to escalate service issues. The Pitney Bowes e-commerce 
              business acquisition brought customers from a distressed predecessor, which may 
              include lower-quality customer relationships with elevated churn risk in 2025-2026.

              NPS, churn rate, and customer count are not publicly disclosed. These are the 
              primary evidence gaps in customer diligence.
            claimRefs:
              - CU014
              - CU015
              - CU016
              - CU017
      - number: '6.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Native/P&G Is the Strongest Enterprise Validation in Stord's Customer Base
            body: |
              Native, a P&G subsidiary, is Stord's most strategically valuable reference customer. 
              P&G's procurement standards for logistics partners are among the most stringent in 
              the world (data security, SLA, insurance, compliance). Native's continued use of Stord 
              is an implicit endorsement that Stord meets large-enterprise supplier requirements — 
              a reference that ShipBob and most pure-DTC 3PLs cannot match.
            calloutType: insight
            claimRefs:
              - CU007
          - type: callout
            title: Customer Count and Churn Data Are Material Diligence Gaps
            body: |
              Stord has not disclosed its customer count, gross churn rate, or NRR. Without 
              these metrics, it is impossible to independently validate whether the GMV and 
              package volume growth is driven by new logo acquisition, expansion of existing 
              customers, or inorganic additions from acquisitions. These should be the first 
              customer data requests in a due diligence process.
            calloutType: risk
            claimRefs:
              - CU013
              - CU016
          - type: callout
            title: Pitney Bowes Acquisition Brings Uncertain Customer Quality
            body: |
              The 2024 acquisition of the Pitney Bowes e-commerce fulfillment business was an 
              asset purchase from a financially distressed predecessor. Customer relationships 
              acquired from distressed sellers typically have elevated churn risk in the first 
              12-24 months post-acquisition, as customers re-evaluate their 3PL relationships 
              under the new owner.
            calloutType: risk
