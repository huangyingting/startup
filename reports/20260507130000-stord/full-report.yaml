  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Stord
      - Diligence Ask
    rows:
      - - Consumer demand for 1-2 day delivery
        - tailwind
        - Current and accelerating
        - Brands under margin pressure to match Amazon; Stord's 99.5% 2-day coverage is a primary selling point
        - Verify coverage claim through independent carrier data or customer surveys
      - - DTC brand e-commerce growth
        - tailwind
        - 2024–2027
        - More brands need managed logistics as DTC channel grows; $1.1T US e-commerce market
        - Confirm target brand cohort size and customer acquisition rate from sales data
      - - AI-driven inventory and routing optimization
        - tailwind
        - 2024–2027
        - Stord's software layer creates technology differentiation vs. legacy 3PLs; demand from brands for AI analytics
        - Confirm AI capabilities are proprietary vs. third-party licensed
      - - Returns management as a differentiator
        - tailwind
        - Current
        - 16-20% e-commerce return rates create need for reverse logistics; Stord's integrated OMS addresses this
        - Quantify returns volume handled and customer satisfaction
      - - US tariff escalation (2025 China tariffs up to 145%)
        - headwind
        - Current and acute
        - >-
          Brands sourcing from China face cost increases, potential GMV decline, and supply disruption; could slow
          Stord's GMV growth
        - Assess % of Stord's customer GMV affected by China sourcing
      - - Amazon FBA and Shopify FN incumbent dominance
        - headwind
        - Ongoing
        - Amazon FBA serves >40% of US parcel volume; brands with >60% Amazon revenue unlikely to migrate to Stord
        - Measure customer Amazon revenue share to assess churn risk from FBA pull
      - - 3PL switching costs and contract lock-in
        - constraint
        - Ongoing (1-3 year contracts)
        - Brands take 6-12 months to migrate fulfillment; slows new customer acquisition
        - Assess average sales cycle and time-to-onboarding for new customers
      - - Capital intensity of facility network
        - constraint
        - Ongoing
        - >-
          Physical nodes require CapEx, labor, and ongoing maintenance; scaling internationally requires significant
          investment
        - Review lease terms, CapEx plan, and asset-light vs. owned mix for new nodes
    notes: null
