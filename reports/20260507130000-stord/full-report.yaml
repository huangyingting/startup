  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: |
              Stord generates revenue through four streams: (1) fulfillment fees — per-unit pick, pack,
              and ship charges plus receiving and value-added service fees; (2) storage fees — monthly
              charges based on pallet positions, cubic footage, or SKU slots at owned nodes; (3)
              transportation revenue — carrier cost pass-through plus margin from AI-negotiated volume
              discounts; and (4) software subscription revenue — OMS, WMS, demand planning, and
              pre/post-purchase experience platform fees, which may be bundled with fulfillment or
              sold standalone.

              Stord's $10B annual GMV with an estimated $147M in revenue implies a blended take rate
              of approximately 1.5% — consistent with tech-enabled 3PLs where the majority of order
              value passes through to carriers and product cost. For context, a $100 order processed
              through Stord generates approximately $1.50 in Stord revenue at the blended rate, with
              the logistics component estimated at 8-15% of product value and Stord capturing a portion
              as gross margin. Fulfillment fees are the dominant stream at an estimated 60-70% of
              revenue; the high-margin software subscription component is estimated at 5-15% and is
              the primary valuation premium driver.

              Revenue recognition: "contracted revenue" growing 10x since 2021 likely represents total
              contract value (TCV) across multi-year agreements rather than period-recognized GAAP
              revenue. This distinction is critical for valuation: a $500M TCV backlog versus $147M
              annual recognized revenue changes the implied multiple materially.
            claimRefs:
              - CI001
              - CI002
              - CI003
              - CI004
              - CI005
      - number: '4.2'
        title: Capital Structure and Funding History
        blocks:
          - type: paragraph
            body: |
              Stord has raised over $525M since 2018: Seed $2.6M (2018); Series A $12.4M KP lead
              (2019); Series B $35M Founders Fund (2020); Series C $65M Bond (2021); Series D $90M
              KP at $1.1B (2021); Series D extension $120M Franklin Templeton at $1.3B (2022);
              Series E $200M+ ($80M equity Strike Capital + $120M debt) at $1.5B (May 2025).

              The Series E debt facility ($120M) from First Citizens Bank (successor to SVB) and
              ORIX USA is the most notable element. ORIX Corporation is a publicly listed Japanese
              financial services conglomerate (TSE: 8591) with substantial US operations; its
              participation provides a capital markets validation signal. Franklin Templeton's prior
              lead of the Series D extension and continued participation in Series E signals ongoing
              institutional asset manager support. Kleiner Perkins' continued involvement through
              Series E as an existing investor reflects conviction from one of the most prominent
              Silicon Valley VC firms.

              The $1.3B to $1.5B step from 2022 to 2025 (15% over three years) is the most notable
              valuation dynamic. It suggests investors priced in logistics multiple compression from
              the 2021 peak (when SoftBank and Tiger Global drove peak valuations across logistics
              tech), disciplined markdown avoidance, or a genuine assessment that Stord's progress
              justifies only a modest mark-up on a flat private market.
            claimRefs:
              - CI006
              - CI007
              - CI008
              - CI009
              - CI010
              - CI011
      - number: '4.3'
        title: Cost Structure and Capital Intensity
        blocks:
          - type: paragraph
            body: |
              Stord's cost structure is split between physical operations (warehousing, labor, carrier
              costs) and technology/overhead. The capital intensity of its owned-node model (11 nodes /
              13 buildings) is the dominant cost driver. Typical 3PL warehousing costs include: (a)
              facility lease or ownership costs ($3-10/sq ft annually for large distribution centers);
              (b) labor (warehouse associates, typically $18-25/hr in major US markets); (c) technology
              (WMS, WCS, conveyor automation, RFID) and (d) carrier cost of transportation (passed
              through to brands but financed by Stord during transit).

              The $40M Kentucky facility expansion announced for 2025 with 500+ new jobs confirms
              ongoing CapEx investment despite stated profitability. This is consistent with a
              capital-allocation discipline that prioritizes growth CapEx alongside EBITDA optimization.
              The $120M debt facility is likely specifically sized to fund node expansion and working
              capital rather than operations, consistent with how asset-heavy logistics companies use
              growth debt.

              Gross margin: industry benchmarks for tech-enabled 3PLs with meaningful software revenue
              suggest blended gross margins of 20-35%. If Stord's software revenue earns 70-80% gross
              margins and physical fulfillment earns 10-20%, a blended gross margin of 20-30% on $147M
              revenue implies gross profit of $30-45M annually — consistent with a company that has
              achieved EBITDA-level profitability but may not be GAAP net income positive.
            claimRefs:
              - CI012
              - CI013
              - CI014
              - CI015
              - CI016
              - CI017
      - number: '4.4'
        title: Financial Risk Factors and Valuation Gaps
        blocks:
          - type: paragraph
            body: |
              Critical financial risks:

              1. Revenue unaudited: No audited financials exist. The $147M Latka estimate could be
              materially off. Valuation multiples at $1.5B / true-revenue are unknown.

              2. Debt covenants unknown: The $120M First Citizens Bank / ORIX facility's interest
              rate, maturity, and covenants are not disclosed. Covenant breach or forced refinancing
              at higher rates would be adverse.

              3. Profitability ambiguity: "4 consecutive quarters of bookings beats" as a profitability
              proxy does not confirm EBITDA, operating income, or net income profitability. Depreciation
              on owned nodes and $120M debt service could result in ongoing GAAP losses.

              4. Customer concentration: Top customers (AG1, quip, Native, Seed Health) revenue share
              is undisclosed. Concentration risk is material if >30-40% of revenue is from ≤5 customers.

              5. Valuation multiple risk: At $1.5B / $147M = ~10x revenue, Stord's premium depends
              on software revenue share. If software is <10% of revenue, the 10x multiple is high
              vs. pure-play 3PLs (0.3-0.5x revenue at legacy providers). If software is 20%+, the
              multiple is justified by SaaS-adjacent comparables.

              6. Acquisition integration risk: The ProPack and Pitney Bowes acquisitions in 2024
              introduce integration complexity, goodwill, and potential earnout liabilities that are
              not reflected in public metrics.
            claimRefs:
              - CI018
              - CI019
              - CI020
              - CI021
              - CI022
              - CI023
              - CI024
      - number: '4.5'
        title: Exhibits
        blocks:
          - type: callout
            title: No Audited Financials — All Revenue Figures Are Estimates
            body: |
              The most material limitation in this chapter is the absence of audited financial 
              statements. Revenue (~$147M Latka), gross margin (20-30% estimated), and profitability 
              (EBITDA positive per management claim) are all unverified. Investors must treat all 
              financial metrics as estimates subject to material revision upon diligence.
            calloutType: risk
            claimRefs:
              - CI018
              - CI020
          - type: callout
            title: Debt Service Obligation Creates Fixed Cash Requirement
            body: |
              The $120M debt facility from First Citizens Bank and ORIX creates a fixed repayment 
              obligation independent of Stord's operating performance. If revenue growth slows or 
              EBITDA contracts, Stord may need to raise additional equity at potentially reduced 
              valuations to service the debt. The interest rate, maturity, and covenants are not 
              publicly disclosed.
            calloutType: risk
            claimRefs:
              - CI009
              - CI010
              - CI019
          - type: callout
            title: 'Valuation Discipline: $1.3B to $1.5B Step Despite Strong Operating Metrics'
            body: |
              The modest 15% valuation step from 2022 to 2025 — while the company achieved profitability 
              and 10x contracted revenue growth — suggests either investor discipline in avoiding the 
              2021 peak valuation trap or genuine concern about logistics multiple compression. This 
              could be a positive signal for future investors: the $1.5B mark may already reflect 
              conservative expectations rather than speculative premium.
