companyProfile:
  summary: >-
    Stord is an Atlanta-based cloud supply chain company founded in 2015 by Sean Henry (CEO) and Jacob Boudreau (CTO) at
    Georgia Tech's CREATE-X program. The company operates 11 owned and leased fulfillment nodes (13 buildings) across
    the US, enabling 99.5% 1-2 day ground delivery coverage. Stord's platform integrates proprietary Order Management
    (OMS), Warehouse Management (WMS), demand planning, AI-driven multi-carrier optimization, and pre/post-purchase
    consumer experience tools in a single unified data model. In May 2025, Stord raised $200M in Series E financing
    ($80M equity + $120M debt from ORIX Corporation) at a $1.5B valuation, led by Strike Capital. Stord achieved
    profitability in 2024, with 4 consecutive quarters of bookings beats over prior-year periods. It processes $10B+ in
    annual GMV across 50M+ packages per year. Disclosed customers include AG1, goodr, Native (P&G), quip, Seed Health,
    Jolie, and Elysium Health — predominantly premium DTC brands in health/wellness and personal care. Stord acquired
    ProPack Logistics and the Pitney Bowes e-commerce fulfillment business in 2024, expanding its node network. The OMS
    is a G2 Market Leader (2024, 4.3/5 from 47 reviews). Stord's AI carrier optimization saved brands $130M in parcel
    fees in 2024.
  foundedDate: '2015-01-01'
  founders:
    - name: Sean Henry
      role: Co-founder and CEO
      background: Georgia Tech CREATE-X program; serial entrepreneur; primary investor relationship holder
      claimRefs: []
    - name: Jacob Boudreau
      role: Co-founder and CTO
      background: Georgia Tech; platform architect; built the proprietary OMS and WMS
      claimRefs: []
