schemaVersion: 'startup-diligence-report-v2'
artifact: 'report-brief'
slug: 'celestial-ai'
runDate: '2026-05-02'
company:
  name: 'Celestial AI'
reportScope:
  companyUrl: 'https://www.celestial.ai'
  depth: 'deep'
  objective: 'Build the evidence backbone and Chapter 1 snapshot for Celestial AI, with emphasis on identity verification, Photonic Fabric product positioning, funding chronology, partner and hyperscaler traction, acquisition by Marvell, and the largest remaining evidence gaps around revenue, customers, and valuation precision.'
researchQuestions:
  - 'How should Celestial AI be framed at the opening of a diligence report as of 2026: standalone startup history, current Marvell-owned status, founders, headquarters, and business model evolution?'
  - 'Which core company facts are strongly verified versus company-claimed, especially around Photonic Fabric performance, product form factors, standards alignment, and customer adoption?'
  - 'What does the fetched record show about Celestial AI’s financing path from Series A through the final Series C1 close, and how much of the valuation narrative is primary versus third-party?'
  - 'How credible is the commercialization narrative across hyperscalers, semiconductor ecosystem partners, foundries, packaging partners, and productization into chiplets, NICs, modules, and appliances?'
  - 'What exactly happened in the Marvell acquisition, including upfront value, contingent earnout, Amazon warrant structure, and expected post-close revenue ramp?'
  - 'Which evidence gaps remain material enough that an investment committee should demand management diligence before underwriting historical or strategic claims?'
desiredChapters:
  - chapterNumber: 1
    title: 'Startup Introduction & Company Snapshot'
    purpose: 'Verify identity, explain the Marvell-acquired status, and anchor the opening investment narrative.'
  - chapterNumber: 2
    title: 'Market Sizing & Macro Analysis'
    purpose: 'Assess AI interconnect, optical networking, memory disaggregation, and scale-up infrastructure demand.'
  - chapterNumber: 3
    title: 'Competitive Benchmarking'
    purpose: 'Compare Celestial AI with Ayar Labs, Lightmatter, NVIDIA/Broadcom optics, and adjacent scale-up interconnect vendors.'
  - chapterNumber: 4
    title: 'Financial & Unit Economics'
    purpose: 'Translate public financing, manufacturing posture, and post-acquisition revenue signals into underwriting questions.'
  - chapterNumber: 5
    title: 'Product & Technology'
    purpose: 'Analyze Photonic Fabric architecture, packaging strategy, standards alignment, and product roadmap.'
  - chapterNumber: 6
    title: 'Customer & Retention'
    purpose: 'Evaluate hyperscaler demand signals, partner dependence, and evidence for design-win durability.'
  - chapterNumber: 7
    title: 'Risk & Regulatory'
    purpose: 'Assess customer concentration, manufacturing dependency, product timing, and transaction-contingent risks.'
  - chapterNumber: 8
    title: 'Investment & Valuation'
    purpose: 'Frame whether the Marvell exit and earlier private valuations support strategic-outcome quality or leave unresolved questions.'
expectedTables:
  - id: 'T001'
    title: 'Cover metrics and status anchors'
    artifact: '02-company-snapshot.yaml'
  - id: 'T002'
    title: 'Leadership and identity verification snapshot'
    artifact: '02-company-snapshot.yaml'
  - id: 'T003'
    title: 'Funding, product, and transaction timeline'
    artifact: '02-company-snapshot.yaml'
  - id: 'T004'
    title: 'Open diligence questions for identity, traction, and valuation'
    artifact: '02-company-snapshot.yaml'
expectedFigures:
  - id: 'F001'
    title: 'Celestial AI milestone timeline'
    type: 'timeline'
    artifact: '02-company-snapshot.yaml'
  - id: 'F002'
    title: 'Photonic Fabric platform architecture stack'
    type: 'architecture-stack'
    artifact: '02-company-snapshot.yaml'
sourceStrategy:
  minimumRetainedSources: 100
  discoveryTracks:
    - 'official identity, team, contact, careers, product, technology, sitemap, and blog history'
    - 'primary financing and transaction evidence across Business Wire, Marvell investor relations, and SEC filings'
    - 'independent funding, product, and commercialization coverage from Reuters, TechCrunch, EE Times, Optica/OPN, Semiconductor Today, and related trade press'
    - 'partner and investor portfolio pages to corroborate cap-table breadth and ecosystem positioning'
    - 'technical docs and conference materials covering Photonic Fabric modules, appliances, and standards alignment'
    - 'disconfirming evidence and conflicts around valuation, headquarters history, and contingent exit economics'
  evidenceRules:
    - 'Use only fetched URLs in the evidence ledger.'
    - 'Distinguish observed facts, company-claimed performance, and third-party-reported valuation or traction claims.'
    - 'Preserve valuation, location, and exit-value conflicts instead of smoothing them over.'
    - 'Treat missing revenue, named-customer, and cap-table detail as evidence gaps rather than inferred facts.'
