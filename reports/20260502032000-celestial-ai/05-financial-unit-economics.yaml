sections:
  - number: '4.1'
    title: 'Revenue model overview'
    body: 'Celestial AI should be modeled as a multi-surface deep-tech platform business rather than as a single-SKU component vendor. The retained claims support monetization surfaces across optical chiplets and PFLink connectivity, switching, OMIB packaging elements, appliance-style memory systems, and supporting software or control functions. What the record does not show is which layer reached first revenue, how revenue would have split between product and NRE-like services, or whether software was intended as a separate line item. The clearest conclusion is that monetization breadth existed before monetization transparency. [C006][C007][C010][C028][C031][C038][C039]'
    claimRefs:
      - 'C006'
      - 'C007'
      - 'C010'
      - 'C028'
      - 'C031'
      - 'C038'
      - 'C039'
  - number: '4.2'
    title: 'Capital base, burn, and runway'
    body: 'The reported capital history is straightforward: $56 million Series A in 2022, $100 million Series B in 2023, $175 million Series C in 2024, and a final $255 million Series C1 close in 2025, for $520 million of disclosed funding. Public reporting also anchored headcount at about 100 in mid-2023 with expected growth to roughly 130 by year-end, consistent with a heavy engineering build. Because Celestial AI was taping out advanced-node optical-I/O silicon and depended on foundry, packaging, and ecosystem partners, the company likely carried a burn profile above a software startup. A low-confidence analytical range of roughly $60 million to $85 million annual burn is directionally reasonable, but this is explicitly an estimate rather than a reported figure. [C013][C015][C016][C017][C018][C019][C024][C030]'
    claimRefs:
      - 'C013'
      - 'C015'
      - 'C016'
      - 'C017'
      - 'C018'
      - 'C019'
      - 'C024'
      - 'C030'
  - number: '4.3'
    title: 'Unit economics and margin trajectory'
    body: 'Public-data unit economics are incomplete. The retained record discloses product capability anchors such as 14.4 Tbps PFLink Gen1 and a 16 Tbps first-generation chiplet, plus evidence of customer design-ins and a 2026 shipment target. It does not disclose ASPs, bill of materials, packaging yield, gross margin, CAC, or customer lifetime value. The likely economic shape is a high-touch design-win motion with potentially high lifetime value if Celestial AI lands deeply inside customer package and memory architectures, but that remains an analytical hypothesis rather than a disclosed metric set. Investors should resist forcing SaaS-style precision onto a hardware program that has not yet published basic pricing or margin data. [C007][C010][C012][C013][C030][C031][C038][C039][C040]'
    claimRefs:
      - 'C007'
      - 'C010'
      - 'C012'
      - 'C013'
      - 'C030'
      - 'C031'
      - 'C038'
      - 'C039'
      - 'C040'
  - number: '4.4'
    title: 'Projection scenarios and diligence gaps'
    body: 'Numeric forward revenue scenarios are not defensible from the retained ledger alone. The evidence supports a commercialization ladder of validation in 2023, design-ins by 2024, strategic recapitalization in 2025, and targeted hyperscaler shipments in 2026, but it does not support conversion rates, pricing, backlog, or recognized revenue after Marvell integration. The financial diligence package should therefore request: design-win pipeline by customer and stage; booked versus forecasted wafer starts; expected ASP by product family; prototype and production gross margin bridge; customer concentration; and post-acquisition revenue segmentation inside Marvell. [C012][C019][C030][C032][C035][C038]'
    claimRefs:
      - 'C012'
      - 'C019'
      - 'C030'
      - 'C032'
      - 'C035'
      - 'C038'
