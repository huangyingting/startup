sections:
  - number: '7.1'
    title: 'Risk overview'
    body: |
      Celestial AI was not a low-risk startup; it was a high-potential, strategically relevant deep-tech program whose key uncertainties sat in execution. The retained evidence supports a credible market problem and a broad product surface, but public visibility still stops before verified production volumes, named hyperscaler customers, gross margin, or standalone revenue. That combination would have made the standalone risk profile significant even as strategic value was rising. After Marvell acquired the company, financing and distribution risk fell meaningfully, but the residual risk did not disappear; it migrated toward integration quality, talent retention, shipment conversion, and realization of contingent transaction value. [C012][C019][C030][C032][C035][C037][C038]
    claimRefs:
      - 'C012'
      - 'C019'
      - 'C030'
      - 'C032'
      - 'C035'
      - 'C037'
      - 'C038'
  - number: '7.2'
    title: 'Regulatory and legal risk'
    body: |
      The retained ledger does not verify a specific export-control action, CFIUS review, EAR classification, ITAR determination, or litigation matter. Investors should not mistake that absence of evidence for evidence of no risk. Celestial AI operated in advanced AI interconnect infrastructure, maintained an international talent footprint, and attracted a broad investor and ecosystem base, which is enough to make export-control, foreign-investment, and supply-chain legal review mandatory in a full diligence process. In addition, the Marvell transaction introduced legally material contingent economics and Amazon-linked warrant arrangements that can affect realized value even after close. The correct legal conclusion is therefore "diligence required, not risk disproven." [C020][C025][C032][C033][C037][C038]
    claimRefs:
      - 'C020'
      - 'C025'
      - 'C032'
      - 'C033'
      - 'C037'
      - 'C038'
  - number: '7.3'
    title: 'Credit, operational, and security risk'
    body: |
      Credit risk here is less about bad debt and more about capital intensity, long design-win cycles, and counterparty concentration. Before acquisition, Celestial AI had raised exceptional capital for its stage, yet public evidence still did not show the sort of recurring revenue transparency that would normally offset a hardware-company burn profile. Operationally, the main exposure was manufacturing and qualification: advanced photonics integration, partner-led manufacturing, and advanced-node optical-I/O tape-outs all imply a meaningful risk that yield, packaging, or reliability learning curves could delay commercialization. Security risk is also under-disclosed. Because Celestial AI sells into mission-critical AI infrastructure, investors should request hardware assurance, secure-development, and customer qualification evidence rather than assume those controls exist. [C013][C019][C024][C030][C031][C035][C038]
    claimRefs:
      - 'C013'
      - 'C019'
      - 'C024'
      - 'C030'
      - 'C031'
      - 'C035'
      - 'C038'
  - number: '7.4'
    title: 'Competitive and market risk'
    body: |
      Competitive risk is material because Celestial AI had to prove both that optical scale-up is strategically necessary and that its specific implementation could win a production slot before substitutes improved. The retained claim set strongly supports the architectural case against electrical bottlenecks, but it does not independently prove that Celestial AI had already locked in a defensible production lead versus substitute fabrics or other optical approaches. Product breadth, standards alignment, and patent depth improve the moat case, yet those strengths were still crossing from technical differentiation into commercial proof. In practical terms, the core risk was not that the problem was imaginary; it was that the adoption window could narrow faster than independent scale materialized. [C009][C026][C027][C031][C038][C039][C040]
    claimRefs:
      - 'C009'
      - 'C026'
      - 'C027'
      - 'C031'
      - 'C038'
      - 'C039'
      - 'C040'
  - number: '7.5'
    title: 'Mitigation summary and stop-loss criteria'
    body: |
      The best evidence-backed mitigants were capital depth before close, heavyweight governance additions, a broadened IP estate, strategic customer-side validation, and eventual acquisition by a scaled data-center incumbent. Those factors reduced existential financing risk and improved route-to-market leverage. The remaining investor discipline is milestone-based. For a pre-close investment committee, kill criteria would have been: first, failure to convert 2023 validation and 2024 design-ins into externally verifiable production progress by the 2026 shipment window; second, inability to show yield, reliability, and partner-readiness data sufficient to bridge the manufacturing gap; third, continued absence of customer and revenue disclosure despite rising capital consumption; and fourth, a transaction outcome whose economics depended mainly on contingent earnout rather than secure upfront value. Post-close, the analogous stop-loss triggers are missed product-integration milestones, key technical-talent loss, or evidence that Amazon-linked purchase mechanics and earnout conditions are not translating into durable revenue contribution inside Marvell. [C012][C019][C021][C022][C026][C030][C032][C033][C037][C038]
    claimRefs:
      - 'C012'
      - 'C019'
      - 'C021'
      - 'C022'
