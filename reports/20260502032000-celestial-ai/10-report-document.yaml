  - number: '8.3'
    title: Operational and Security Risk Transmission
    blocks:
    - type: callout
      title: Risk Alert
      body: Public evidence reaches validation, design-ins, and targeted 2026 shipments, but stops before verified production volumes, revenue transparency, or disclosed yield and reliability data. [C012][C013][C030][C038]
      calloutType: risk-alert
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
