      - C013
      - C030
      - C038
    - type: paragraph
      title: Operational and security risk
      body: 'Credit risk here is less about bad debt and more about capital intensity, long design-win cycles, and counterparty concentration. Before acquisition, Celestial AI had raised exceptional capital for its stage, yet public evidence still did not show the sort of recurring revenue transparency that would normally offset a hardware-company burn profile. Operationally, the main exposure was manufacturing and qualification: advanced photonics integration, partner-led manufacturing, and advanced-node optical-I/O tape-outs all imply a meaningful risk that yield, packaging, or reliability learning curves could delay commercialization. Security risk is also under-disclosed. Because Celestial AI sells into mission-critical AI infrastructure, investors should request hardware assurance, secure-development, and customer qualification evidence rather than assume those controls exist. [C013][C019][C024][C030][C031][C035][C038]

        '
      calloutType: null
      tableRef: null
