- number: 9
  title: Investment Thesis, Valuation & Return Scenarios
  sections:
  - number: '9.1'
    title: Investment Thesis Summary
    blocks:
    - type: callout
      title: Key Insight
      body: An official $3.25 billion upfront acquisition agreement is strong evidence that Celestial AI built an asset strategic enough for a scaled semiconductor buyer to own rather than merely partner with. [C032][C037]
      calloutType: key-insight
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C032
      - C037
    - type: paragraph
      title: Thesis summary
      body: 'Celestial AI was an attractive strategic technology asset but an incomplete standalone public-underwriting case. On the positive side, the company assembled unusual capital depth, a broadened product surface, meaningful governance upgrades, and eventually a signed-and-closed strategic exit to Marvell. On the cautionary side, public evidence still never reached the level of standalone revenue, customer concentration, gross-margin, or production-scale transparency that would support a conventional growth-equity or IPO-style valuation. The practical conclusion is that the technology thesis was validated, but the private-market return case can only be bounded with scenario analysis rather than modeled with precision. [C019][C021][C022][C032][C035][C038][C039]

        '
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
