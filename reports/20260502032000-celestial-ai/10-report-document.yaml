- id: T021
  title: Investment monitoring triggers and kill criteria
  columns:
  - Trigger
  - Why it matters
  - Evidence anchor
  - Required response
  rows:
  - - Shipment and qualification slippage beyond the public 2026 target window
    - Would weaken the strongest public commercialization milestone.
    - Targeted hyperscaler shipments were reported for 2026. [C030]
    - Downgrade strategic-upside assumptions and revisit earnout probability.
  - - No improvement in customer transparency despite platform integration
    - Persistent opacity would limit confidence that design-ins converted into durable revenue.
    - Public customer evidence remains anonymous. [C012][C038]
    - Keep stance at track / research-more rather than underwriting upside.
  - - Loss of key technical or commercial leadership
    - Could impair roadmap continuity after acquisition.
    - The retained leadership bench is a meaningful asset. [C021][C022]
    - Treat as a negative signal for integration success.
  - - Outcome depends mainly on contingent rather than upfront value
    - Full headline exit value is not guaranteed.
    - Official materials separate $3.25B upfront from earnout value. [C032][C037]
    - Base underwriting should continue to use upfront value until milestones are proven.
  notes: These triggers convert the report from a retrospective exit memo into an ongoing monitoring framework.
  claimRefs:
  - C012
  - C021
  - C022
  - C030
  - C032
  - C037
  - C038
