      title: Remaining diligence asks
      body: 'Public disclosures support standards-based interoperability, but not named production integrations with NVIDIA, AMD, or custom ASIC vendors. The evidence shows alignment with CXL, PCIe, UCIe, and JEDEC HBM plus anonymous semiconductor design-ins, which is enough to underwrite integration intent but not enough to validate exact platform compatibility. Likewise, the software story is real but narrow in the public record: Celestial AI references software-managed optical fabrics and supporting control functions, not a separate AI software business. Management diligence should request interoperability matrices, protocol bring-up status, thermal and package constraints, reliability data, and any proprietary telemetry or workload-automation layer. [C007][C012][C038][C039][C040]'
