- number: 3
  title: Market Sizing & Macro Analysis
  sections:
  - number: '3.1'
    title: Market Definition
    blocks:
    - type: callout
      title: Key Insight
      body: 'Across Celestial AI’s own materials and later technical coverage, the demand signal is consistent: AI systems are hitting bandwidth, latency, power, and memory-wall constraints that copper-heavy architectures struggle to solve at scale. [C006][C008][C009][C011][C027][C031]'
      calloutType: key-insight
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C006
      - C008
      - C009
      - C011
      - C027
      - C031
    - type: paragraph
      title: Market boundary
      body: Celestial AI should be analyzed inside the AI data-center interconnect and memory-expansion stack, not as a generic semiconductor company. The retained claims place Photonic Fabric at the junction of AI compute, memory, and networking infrastructure, with a product surface that reaches from optical links and package bridges to switches, chiplets, and appliance-style shared-memory systems. That framing matters because the relevant market is the scale-up bottleneck inside AI clusters, where electrical links increasingly constrain bandwidth density, latency, power, and memory reach. [C006][C007][C008][C027][C028][C031][C039][C040]
