    - Celestial AI sells into critical AI infrastructure categories. [C006][C031]
    - No retained claim verifies cyber certifications, secure-development practices, or hardware-assurance controls. [C038]
    - Request security audits, reliability reports, and customer qualification packages.
  - - Foundry, packaging, and partner concentration
    - Commercialization was partner-led and EE Times reported advanced-node TSMC tape-outs. [C013][C030]
    - No retained claim discloses second-source coverage, supply commitments, or yield learning curves. [C038]
    - Request partner map, capacity commitments, qualification owners, and dual-source strategy.
  notes: The key point is not that these risks are proven realized; it is that the retained ledger is too thin to underwrite them away.
