  - number: '9.3'
    title: Bull, Base, and Bear Cases
    blocks:
    - type: paragraph
      title: Scenario framing
      body: 'The cleanest scenario framing is valuation-anchored rather than revenue-model-anchored. In the bear case, Celestial AI is worth roughly its 2025 third-party private mark, implying that commercialization or contingent-value realization never meaningfully exceeds the late private round context. In the base case, investors underwrite only the official $3.25 billion upfront Marvell consideration. In the bull case, they assume the transaction reaches its full approximately $5.5 billion value through earnout realization tied to successful post-close product adoption. This framework is evidence-backed and avoids pretending that public sources provide enough data to calculate exact investor MOICs by round. [C032][C036][C037]

