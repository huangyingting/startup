      body: 'Celestial AI was not a low-risk startup; it was a high-potential, strategically relevant deep-tech program whose key uncertainties sat in execution. The retained evidence supports a credible market problem and a broad product surface, but public visibility still stops before verified production volumes, named hyperscaler customers, gross margin, or standalone revenue. That combination would have made the standalone risk profile significant even as strategic value was rising. After Marvell acquired the company, financing and distribution risk fell meaningfully, but the residual risk did not disappear; it migrated toward integration quality, talent retention, shipment conversion, and realization of contingent transaction value. [C012][C019][C030][C032][C035][C037][C038]

