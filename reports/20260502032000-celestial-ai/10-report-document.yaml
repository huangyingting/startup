    - Primary optical-startup peer set requested for diligence
    - These are the most relevant named startup comparables when testing whether Celestial AI is differentiated inside optical AI interconnect.
    - Retained claims validate the category problem and Celestial AI’s product breadth, but do not independently verify peer feature-by-feature positions. [C009][C027][C038][C039]
  - - Lumentum; Coherent; Intel Silicon Photonics
    - Incumbent optical and silicon-photonics comparison set requested for diligence
    - These incumbents matter because Celestial AI still depends on an optical and semiconductor ecosystem rather than a closed standalone stack.
