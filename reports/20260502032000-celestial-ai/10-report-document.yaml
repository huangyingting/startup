      body: 'The reported capital history is straightforward: $56 million Series A in 2022, $100 million Series B in 2023, $175 million Series C in 2024, and a final $255 million Series C1 close in 2025, for $520 million of disclosed funding. Public reporting also anchored headcount at about 100 in mid-2023 with expected growth to roughly 130 by year-end, consistent with a heavy engineering build. Because Celestial AI was taping out advanced-node optical-I/O silicon and depended on foundry, packaging, and ecosystem partners, the company likely carried a burn profile above a software startup. A low-confidence analytical range of roughly $60 million to $85 million annual burn is directionally reasonable, but this is explicitly an estimate rather than a reported figure. [C013][C015][C016][C017][C018][C019][C024][C030]'
