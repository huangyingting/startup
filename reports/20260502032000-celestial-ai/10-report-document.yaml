      body: The evidence supports market-layer logic but not hard dollar sizing. A defensible TAM includes the broader AI infrastructure spend touched by scale-up interconnect and memory disaggregation; the SAM narrows to optical links, chiplets, bridges, switches, and modules that hyperscalers and AI silicon vendors can actually deploy; the SOM narrows further to early design-in programs and shipment ramps that Celestial AI had signaled before the Marvell acquisition. Because the retained ledger does not verify third-party market-size statistics, named production customers, or standalone revenue, this chapter deliberately keeps numeric value fields null rather than inventing a precision the sources do not support. [C006][C007][C010][C012][C013][C028][C030][C038][C039][C040]
