  - - NVIDIA / InfiniBand; Ethernet fabrics; Broadcom; Marvell
    - Electrical or hybrid substitute set
    - Celestial AI’s core value proposition is to replace or bypass incumbent electrical scale-up bottlenecks deeper inside AI systems.
    - This substitute pressure is directly evidenced by Celestial AI’s own performance framing against electrical and co-packaged approaches. [C009][C031]
