  - number: '9.2'
    title: Valuation Framework
    blocks:
    - type: callout
      title: Risk Alert
      body: Public evidence does not verify standalone revenue, margin, or customer concentration, so DCF and revenue-multiple methods would create false precision. [C035][C038]
      calloutType: risk-alert
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C035
      - C038
    - type: callout
      title: Risk Alert
      body: The best retained private valuation anchors are third-party and conflicting rather than officially disclosed in financing releases, so they help frame upside but cannot be treated as audited fact. [C036]
      calloutType: risk-alert
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C036
    - type: paragraph
      title: Method and comparables posture
      body: 'The appropriate valuation method is a strategic-value framework, not DCF. DCF fails because the retained ledger does not verify the revenue, margin, or reinvestment inputs required to build one. Relative-multiple work is also constrained because the evidence ledger does not retain a usable peer comparable set. What does exist is enough for a disciplined anchor set: third-party private marks around $1.2 billion in 2024 and $2.5 billion in 2025, plus official Marvell consideration of about $3.25 billion upfront and up to about $5.5 billion including earnout. That anchor set supports a fair-to-positive read on the final strategic outcome, while also requiring caution because the private marks are not official financing disclosures and the full exit headline is partly contingent. [C032][C035][C036][C037][C038]

        '
