    - type: paragraph
      title: Devices and manufacturing
      body: 'The architecture combines system-facing standards alignment with deep photonic-device ambition. Public materials reference HBM3E and future HBM4 alignment at low single-digit pJ/bit power, while later technical materials emphasize thermally stable EAM-based silicon photonics and in-die optical I/O that frees die-edge area for memory and other interfaces. At the manufacturing layer, Celestial AI appears partner-led rather than vertically integrated, relying on foundry, packaging, optical, and semiconductor ecosystem partners; EE Times also reported advanced-node TSMC tape-outs for optical-I/O silicon. The main missing link is not concept clarity but production evidence: public disclosures do not provide yield, reliability, or cost curves. [C011][C013][C027][C030][C038][C040]'
