      title: Key Insight
      body: The strongest retained evidence supports real AI interconnect pain points and strategic buyer interest, but Celestial AI still depended on proving yield, qualification, and production conversion rather than merely articulating the problem. [C008][C012][C013][C027][C030][C038]
