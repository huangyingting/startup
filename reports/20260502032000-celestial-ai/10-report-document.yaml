  - number: '8.4'
    title: Competitive Risk and Mitigation
    blocks:
    - type: paragraph
      title: Competitive downside
      body: 'Competitive risk is material because Celestial AI had to prove both that optical scale-up is strategically necessary and that its specific implementation could win a production slot before substitutes improved. The retained claim set strongly supports the architectural case against electrical bottlenecks, but it does not independently prove that Celestial AI had already locked in a defensible production lead versus substitute fabrics or other optical approaches. Product breadth, standards alignment, and patent depth improve the moat case, yet those strengths were still crossing from technical differentiation into commercial proof. In practical terms, the core risk was not that the problem was imaginary; it was that the adoption window could narrow faster than independent scale materialized. [C009][C026][C027][C031][C038][C039][C040]

        '
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C009
      - C026
      - C027
      - C031
      - C038
      - C039
      - C040
    - type: callout
      title: Opportunity
      body: After close, balance-sheet and go-to-market risk are lower because Celestial AI no longer has to finance commercialization as a standalone startup; remaining risk shifts toward integration, roadmap execution, and contingent-value realization. [C002][C019][C032][C035][C037]
      calloutType: opportunity
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C002
      - C019
      - C032
      - C035
      - C037
    - type: paragraph
      title: Mitigation and stop-loss criteria
      body: 'The best evidence-backed mitigants were capital depth before close, heavyweight governance additions, a broadened IP estate, strategic customer-side validation, and eventual acquisition by a scaled data-center incumbent. Those factors reduced existential financing risk and improved route-to-market leverage. The remaining investor discipline is milestone-based. For a pre-close investment committee, kill criteria would have been: first, failure to convert 2023 validation and 2024 design-ins into externally verifiable production progress by the 2026 shipment window; second, inability to show yield, reliability, and partner-readiness data sufficient to bridge the manufacturing gap; third, continued absence of customer and revenue disclosure despite rising capital consumption; and fourth, a transaction outcome whose economics depended mainly on contingent earnout rather than secure upfront value. Post-close, the analogous stop-loss triggers are missed product-integration milestones,
        key technical-talent loss, or evidence that Amazon-linked purchase mechanics and earnout conditions are not translating into durable revenue contribution inside Marvell. [C012][C019][C021][C022][C026][C030][C032][C033][C037][C038]

        '
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
