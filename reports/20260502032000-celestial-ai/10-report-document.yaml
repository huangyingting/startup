  - number: '9.4'
    title: Recommendation and Monitoring
    blocks:
    - type: paragraph
      title: Final view
      body: 'Pre-close, Celestial AI had some ingredients of a future public-company candidate: substantial capital raised, a strategic market position, and stronger governance. It did not have public readiness on the metrics that matter most for IPO underwriting, namely revenue disclosure, customer transparency, and margin visibility. By the report date, however, the IPO question is mostly academic because Marvell has already acquired the company. The right recommendation is therefore track. Investors should monitor shipment timing, customer conversion visibility, leadership retention, and whether the company''''s strategic value proves durable enough to convert contingent deal economics into realized value. Kill criteria are straightforward: if product-integration milestones slip, customer visibility remains absent, or value capture relies mainly on unearned earnout, do not upgrade the thesis. [C002][C012][C021][C022][C030][C032][C035][C037][C038]

