evidenceGaps:
  - gap: 'Standalone revenue, margin, bookings, and customer-concentration data are not public in the fetched record.'
    impact: 'high'
    diligencePath: 'Request management financials, cohort/customer mix, backlog, and board materials; cross-check against Marvell integration plans and revenue-forecast assumptions.'
  - gap: 'Hyperscaler traction is real in narrative terms, but customer names, production ramps, and purchase commitments were not publicly verified.'
    impact: 'high'
    diligencePath: 'Request signed design-win list, customer references, pilot-to-production conversion metrics, and shipment schedules by customer.'
  - gap: 'Pre-acquisition valuation is only partially observable because primary financing announcements omitted valuation and secondary sources disagree on headline numbers.'
    impact: 'medium'
    diligencePath: 'Request cap table, financing documents, board consents, and any fairness materials used around the Marvell transaction.'
  - gap: 'The company’s historical address and corporate-history trail moved from Sunnyvale to Santa Clara and then into Marvell, but the exact legal-entity timeline remains incomplete.'
    impact: 'medium'
    diligencePath: 'Review certificate of incorporation, amendments, Delaware/California filings, lease history, and the merger agreement schedules.'
  - gap: 'Transaction upside depends on earnout realization and future product purchases, which remain contingent and forward-looking rather than proven.'
    impact: 'medium'
    diligencePath: 'Obtain earnout milestone definitions, Amazon commercial agreements, and post-close operating plans from Marvell.'
