chapter:
  number: 5
  title: 'Product & Technology'
  summary: 'Celestial AI’s product case is strongest when viewed as an optical AI-infrastructure platform spanning connectivity, switching, packaging, memory expansion, and control software. The retained ledger supports meaningful differentiation through Photonic Fabric, PFLink, PFSwitch, OMIB, appliance-style memory systems, EAM-based silicon photonics, in-die optical I/O ambitions, standards alignment, and a patent estate above 200 patents after the Rockley transaction. The main remaining questions are readiness for volume production, packaging yield, and exact interoperability with named accelerator ecosystems. [C006][C007][C010][C011][C013][C026][C027][C028][C030][C031][C039][C040]'
