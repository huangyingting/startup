    title: 'Photonic Fabric is broader than a co-packaged optics point product'
    body: 'The retained claims support a platform spanning PFLink connectivity, PFSwitch, OMIB packaging elements, optical chiplets, appliance architectures, and software-managed fabrics. [C007][C028][C031][C039]'
    claimRefs:
      - 'C007'
      - 'C028'
      - 'C031'
      - 'C039'
  - type: 'opportunity'
    title: 'The architecture targets the hardest AI infrastructure bottlenecks'
    body: 'Celestial AI repeatedly frames Photonic Fabric around bandwidth density, low power, low latency, memory disaggregation, and die-edge constraints, which are central pressures in modern AI systems. [C008][C009][C011][C027][C040]'
    claimRefs:
      - 'C008'
      - 'C009'
      - 'C011'
      - 'C027'
      - 'C040'
  - type: 'risk-alert'
    title: 'Manufacturing and interoperability remain the key execution risks'
    body: 'Public materials show advanced-node tape-outs, partner-led manufacturing, and standards alignment, but they do not disclose package yield, qualification status, or named production integrations with specific accelerator vendors. [C012][C013][C030][C038][C040]'
