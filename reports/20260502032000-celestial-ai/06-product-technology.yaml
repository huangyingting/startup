sections:
  - number: '5.1'
    title: 'Platform overview and differentiation'
    body: 'Celestial AI’s product narrative is best understood as a photonic platform rather than a discrete optics component. The retained claims show a stack that includes PFLink, PFSwitch, OMIB, optical chiplets, appliance-like shared-memory systems, and supporting software-managed control functions. Differentiation is framed around solving the AI memory wall, delivering materially higher bandwidth density, and moving optical I/O deeper into package and die architectures. This breadth matters because it expands Celestial AI from a link vendor into a candidate owner of the scale-up fabric layer. [C006][C007][C008][C009][C027][C028][C039]'
    claimRefs:
      - 'C006'
      - 'C007'
      - 'C008'
      - 'C009'
      - 'C027'
      - 'C028'
      - 'C039'
  - number: '5.2'
    title: 'Architecture, devices, and manufacturing model'
    body: 'The architecture combines system-facing standards alignment with deep photonic-device ambition. Public materials reference HBM3E and future HBM4 alignment at low single-digit pJ/bit power, while later technical materials emphasize thermally stable EAM-based silicon photonics and in-die optical I/O that frees die-edge area for memory and other interfaces. At the manufacturing layer, Celestial AI appears partner-led rather than vertically integrated, relying on foundry, packaging, optical, and semiconductor ecosystem partners; EE Times also reported advanced-node TSMC tape-outs for optical-I/O silicon. The main missing link is not concept clarity but production evidence: public disclosures do not provide yield, reliability, or cost curves. [C011][C013][C027][C030][C038][C040]'
    claimRefs:
      - 'C011'
      - 'C013'
      - 'C027'
      - 'C030'
      - 'C038'
      - 'C040'
  - number: '5.3'
    title: 'Roadmap, readiness, and IP'
    body: 'The readiness story is directionally encouraging but not fully de-risked. Celestial AI disclosed successful validation in 2023 and customer design-ins by early 2024, then expanded its patent estate past 200 patents in late 2024 and continued advancing toward advanced-node optical-I/O products and targeted 2026 hyperscaler shipments. That sequence supports an estimated pre-production TRL in the 6-7 range rather than either a pure research project or a fully mature production platform. The investment implication is that the company had crossed the threshold into strategic product relevance, while still carrying non-trivial qualification and ramp risk. [C012][C026][C027][C030][C031]'
    claimRefs:
      - 'C012'
      - 'C026'
      - 'C027'
      - 'C030'
      - 'C031'
  - number: '5.4'
    title: 'Integrations, AI automation, and diligence gaps'
    body: 'Public disclosures support standards-based interoperability, but not named production integrations with NVIDIA, AMD, or custom ASIC vendors. The evidence shows alignment with CXL, PCIe, UCIe, and JEDEC HBM plus anonymous semiconductor design-ins, which is enough to underwrite integration intent but not enough to validate exact platform compatibility. Likewise, the software story is real but narrow in the public record: Celestial AI references software-managed optical fabrics and supporting control functions, not a separate AI software business. Management diligence should request interoperability matrices, protocol bring-up status, thermal and package constraints, reliability data, and any proprietary telemetry or workload-automation layer. [C007][C012][C038][C039][C040]'
    claimRefs:
      - 'C007'
      - 'C012'
      - 'C038'
      - 'C039'
      - 'C040'
