  title: 'Market Sizing & Macro Analysis'
  summary: 'Celestial AI sits in an attractive but evidence-constrained market wedge: optical interconnect for AI compute, memory, and networking infrastructure. The retained claim set strongly supports the existence of acute bandwidth, latency, power, and memory-disaggregation bottlenecks that favor optical scale-up, but it does not retain reliable third-party dollar sizing or CAGR anchors for the full market. The right investor framing is therefore qualitative market conviction with disciplined avoidance of unsupported TAM arithmetic. [C006][C008][C009][C011][C013][C027][C028][C030][C038][C039][C040]'
callouts:
  - type: 'key-insight'
    title: 'The market problem is real even where public market dollars are not'
    body: 'Across Celestial AI’s own materials and later technical coverage, the demand signal is consistent: AI systems are hitting bandwidth, latency, power, and memory-wall constraints that copper-heavy architectures struggle to solve at scale. [C006][C008][C009][C011][C027][C031]'
    claimRefs:
      - 'C006'
      - 'C008'
      - 'C009'
      - 'C011'
      - 'C027'
      - 'C031'
  - type: 'opportunity'
    title: 'The served surface is broader than a single transceiver market'
    body: 'Celestial AI’s disclosed product story spans optical links, switches, package technologies, modules, chiplets, and memory-oriented appliances, which means the economic opportunity is closer to AI scale-up fabric plus memory disaggregation than to a narrow component-only wedge. [C007][C028][C029][C039][C040]'
    claimRefs:
      - 'C007'
      - 'C028'
      - 'C029'
      - 'C039'
      - 'C040'
  - type: 'risk-alert'
    title: 'Quantified TAM remains under-evidenced in the retained ledger'
    body: 'The current evidence backbone does not retain third-party market-size, penetration, or CAGR estimates robust enough to support a bottom-up dollar TAM/SAM/SOM model. That gap should be handled explicitly rather than filled with unaudited industry numbers. [C030][C038]'
    claimRefs:
      - 'C030'
      - 'C038'
  - type: 'risk-alert'
    title: 'Geopolitical and supply-chain underwriting still requires follow-up'
    body: 'The retained claims support a partner-led commercialization model and a distributed operating footprint, but they do not directly evidence company-specific exposure to export controls or cross-border supply constraints. That makes geopolitical risk a diligence item, not a quantified conclusion. [C013][C025][C038]'
    claimRefs:
      - 'C013'
      - 'C025'
      - 'C038'
