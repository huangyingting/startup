sections:
  - number: '2.1'
    title: 'Market definition'
    body: 'Celestial AI should be analyzed inside the AI data-center interconnect and memory-expansion stack, not as a generic semiconductor company. The retained claims place Photonic Fabric at the junction of AI compute, memory, and networking infrastructure, with a product surface that reaches from optical links and package bridges to switches, chiplets, and appliance-style shared-memory systems. That framing matters because the relevant market is the scale-up bottleneck inside AI clusters, where electrical links increasingly constrain bandwidth density, latency, power, and memory reach. [C006][C007][C008][C027][C028][C031][C039][C040]'
    claimRefs:
      - 'C006'
      - 'C007'
      - 'C008'
      - 'C027'
      - 'C028'
      - 'C031'
      - 'C039'
      - 'C040'
  - number: '2.2'
    title: 'TAM / SAM / SOM analysis'
    body: 'The evidence supports market-layer logic but not hard dollar sizing. A defensible TAM includes the broader AI infrastructure spend touched by scale-up interconnect and memory disaggregation; the SAM narrows to optical links, chiplets, bridges, switches, and modules that hyperscalers and AI silicon vendors can actually deploy; the SOM narrows further to early design-in programs and shipment ramps that Celestial AI had signaled before the Marvell acquisition. Because the retained ledger does not verify third-party market-size statistics, named production customers, or standalone revenue, this chapter deliberately keeps numeric value fields null rather than inventing a precision the sources do not support. [C006][C007][C010][C012][C013][C028][C030][C038][C039][C040]'
    claimRefs:
      - 'C006'
      - 'C007'
      - 'C010'
      - 'C012'
      - 'C013'
      - 'C028'
      - 'C030'
      - 'C038'
      - 'C039'
      - 'C040'
  - number: '2.3'
    title: 'Growth drivers and segment analysis'
    body: 'Four demand drivers stand out. First, Celestial AI’s whole thesis is built around the AI memory wall and the need to disaggregate compute and memory more efficiently. Second, the company repeatedly claims material bandwidth-density and latency or power advantages versus incumbent electrical approaches, which speaks to the power wall inside large clusters. Third, the product roadmap extends beyond chip-to-chip optics into rack-scale modules, switches, and memory appliances, enlarging the number of spending buckets it can touch. Fourth, partner-led adoption signals from hyperscaler and semiconductor engagements suggest the market pull is not purely theoretical, even if those deployments remain mostly anonymous in public. Segment-wise, the clearest wedges are optical scale-up links, package-level interconnect, switching surfaces, and CXL-aligned memory pooling. [C008][C009][C010][C011][C012][C013][C027][C028][C029][C030][C039][C040]'
    claimRefs:
      - 'C008'
      - 'C009'
      - 'C010'
      - 'C011'
      - 'C012'
      - 'C013'
      - 'C027'
      - 'C028'
      - 'C029'
      - 'C030'
      - 'C039'
      - 'C040'
  - number: '2.4'
    title: 'Macro constraints and geopolitical considerations'
    body: 'The most important macro caution is not lack of need; it is lack of visibility. The retained evidence shows credible technical pressure and ecosystem activity, but it does not verify production-scale customer conversion, standalone revenue, or company-specific exposure to export-control regimes. Because Celestial AI depended on a partner ecosystem and maintained an international operating footprint before Marvell integration, supply-chain and geopolitical diligence should focus on foundry, packaging, optical-engine, and customer-geography dependencies rather than on unsupported headline assumptions. For an IC memo, this is a market with strong tailwinds and incomplete external transparency. [C013][C025][C030][C038]'
    claimRefs:
      - 'C013'
      - 'C025'
      - 'C030'
      - 'C038'
