sections:
  - number: '6.1'
    title: 'Customer base and segmentation'
    body: 'Celestial AI’s public customer base is visible only in outline. The strongest disclosed evidence is that by March 2024 the company said leading hyperscaler and semiconductor customers were designing in Photonic Fabric optical chiplets after successful link validation in 2023. That supports real customer engagement across two highly strategic segments: cloud-scale infrastructure operators and AI silicon vendors. A third surface appears in the appliance and memory-expansion narrative, which suggests a route into broader system-architecture buyers. Yet the company never publicly named standalone customers or disclosed production revenue, so segmentation confidence is qualitative rather than quantitative. [C012][C028][C029][C030][C038][C039]'
    claimRefs:
      - 'C012'
      - 'C028'
      - 'C029'
      - 'C030'
      - 'C038'
      - 'C039'
  - number: '6.2'
    title: 'Customer engagement model and case studies'
    body: 'The most defensible engagement model is a deep-tech design-win journey: technical evaluation, link validation, design-in, qualification, production ramp, and then architectural expansion. Public evidence supports the first three stages directly and a 2026 shipment target indirectly. There are two case-study-quality signals. First, the anonymous hyperscaler and semiconductor design-in cohort shows pre-acquisition customer pull. Second, the Marvell transaction created unusually explicit customer-side validation through AWS public endorsement and Amazon warrant economics tied to photonic fabric purchases through 2030. Those are not equivalent to disclosed production revenue, but they are materially stronger than a generic startup proof-of-concept press release. [C012][C030][C033][C034]'
    claimRefs:
      - 'C012'
      - 'C030'
      - 'C033'
      - 'C034'
  - number: '6.3'
    title: 'Retention, switching costs, and lock-in'
    body: 'Reported retention metrics are absent, so retention must be analyzed structurally. If Celestial AI’s products are qualified into package architectures, switching fabrics, and memory-expansion topologies, switching costs are likely to be meaningful because customers would need to rework hardware integration, validation, and standards-linked system architecture. The breadth of PFLink, PFSwitch, OMIB, appliance concepts, and standards alignment strengthens that stickiness hypothesis. The caveat is that the hypothesis has not yet been validated by public renewal, expansion, or churn data. [C007][C028][C039][C040][C038]'
    claimRefs:
      - 'C007'
      - 'C028'
      - 'C038'
      - 'C039'
      - 'C040'
  - number: '6.4'
    title: 'Satisfaction, churn, and diligence gaps'
    body: 'NPS, CSAT, GRR, NRR, logo churn, and customer concentration are all null in the public record. That is not unusual for a pre-ramp semiconductor company, but it means the diligence burden shifts toward funnel diagnostics: how many evaluations became design-ins, how many design-ins cleared qualification, how many programs slipped or were cancelled, and how much follow-on content each customer could add across links, switches, package elements, and appliance layers. The critical asks are a stage-gated customer pipeline, design-win attrition history, qualification status by account, and any customer references willing to discuss product maturity and support quality. [C012][C030][C035][C038][C039]'
    claimRefs:
      - 'C012'
      - 'C030'
      - 'C035'
      - 'C038'
      - 'C039'
