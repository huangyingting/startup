  summary: 'Celestial AI’s public customer story is best described as design-win-stage rather than scaled recurring revenue. The retained ledger supports anonymous hyperscaler and semiconductor design-ins, a partner-led commercialization motion, targeted 2026 hyperscaler shipments, and unusually strong strategic validation from AWS and Amazon through the Marvell transaction structure. It does not support named standalone customers, revenue retention metrics, churn, customer concentration, or satisfaction scores. Retention must therefore be underwritten through design-win durability and architectural switching costs, not reported NRR. [C012][C013][C030][C033][C034][C035][C038][C039][C040]'
