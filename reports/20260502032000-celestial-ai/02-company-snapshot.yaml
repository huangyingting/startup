  productSummary: 'Photonic Fabric is an optical interconnect platform spanning chiplets, package bridges, switches, modules, and memory-oriented appliances for AI infrastructure. [C006][C007][C039]'
  customerFocus: 'Hyperscalers, AI accelerator vendors, custom silicon teams, memory and packaging ecosystems, and large-scale AI infrastructure operators. [C012][C013][C034]'
  businessModel: 'Pre-acquisition, the public record suggests a mix of platform/IP commercialization, product modules and chiplets, and partner-led deployment into AI systems rather than a simple standalone component sale. [C013][C039][C040]'
  stage: 'Former private growth-stage startup; acquired by Marvell'
