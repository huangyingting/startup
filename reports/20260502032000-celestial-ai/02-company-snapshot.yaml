callouts:
  - type: 'key-insight'
    title: 'This is now a Marvell-owned asset, not a standalone startup'
    body: 'The right report framing is historical-startup-plus-exit: Celestial AI built Photonic Fabric as an independent company, but Marvell completed the acquisition in February 2026 and now houses the team inside its Data Center Group. [C001][C002][C035]'
    claimRefs:
      - 'C001'
      - 'C002'
      - 'C035'
  - type: 'key-insight'
    title: 'Photonic Fabric is the core strategic asset'
    body: 'Across official, trade, and technical sources, the company’s central thesis is that optical interconnect can replace copper deeper inside AI systems, including inside or near the die itself. [C006][C008][C027][C031]'
    claimRefs:
      - 'C006'
      - 'C008'
      - 'C027'
      - 'C031'
  - type: 'opportunity'
    title: 'Strong financing and ecosystem backing accelerated credibility'
    body: 'Celestial AI assembled a large investor and partner network and disclosed $520 million in total funding before exit, giving the company unusual capital depth for an optical-infrastructure startup. [C018][C019][C020]'
    claimRefs:
      - 'C018'
      - 'C019'
      - 'C020'
  - type: 'opportunity'
    title: 'The product story expanded from interconnect IP to system-level memory appliances'
    body: 'Later technical materials show a broader roadmap that includes chiplets, modules, NIC-like products, and multi-tier shared-memory appliances, which materially enlarges the strategic surface area beyond a single optical link. [C028][C029][C039][C040]'
    claimRefs:
      - 'C028'
      - 'C029'
      - 'C039'
      - 'C040'
  - type: 'risk-alert'
    title: 'Customer traction is still mostly anonymous'
    body: 'Hyperscaler adoption appears directionally credible, but the public record does not verify named customers, conversion from evaluation to production, or standalone revenue concentration. [C012][C030][C038]'
    claimRefs:
      - 'C012'
      - 'C030'
      - 'C038'
  - type: 'risk-alert'
    title: 'Valuation headlines need careful handling'
    body: 'Public sources cite pre-exit valuations around $1.2 billion and $2.5 billion, while Marvell’s official deal terms distinguish between $3.25 billion upfront and contingent upside to about $5.5 billion. [C032][C036][C037]'
    claimRefs:
      - 'C032'
      - 'C036'
      - 'C037'
