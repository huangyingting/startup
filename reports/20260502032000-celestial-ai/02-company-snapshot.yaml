  title: 'Startup Introduction & Company Snapshot'
  summary: 'Celestial AI was a private optical-interconnect startup founded in 2020 that scaled through $520 million of disclosed funding before Marvell acquired it in February 2026; the fetched record is strong on technology, financing, and transaction chronology but weak on revenue, named customers, and precise standalone valuation. [C002][C003][C006][C019][C032][C036][C038]'
startupIntroduction:
  summary: 'Celestial AI was a Silicon Valley startup developing Photonic Fabric, an optical interconnect platform designed to move data by light across chip-to-chip, package-to-package, and rack-scale AI systems. The strongest fetched identity anchors show the company was founded in 2020 by David Lazovsky and Preet Virk, later headquartered in Santa Clara, and positioned around disaggregated compute-memory architectures for hyperscalers and AI silicon teams. Public financing evidence shows a path from a $56 million Series A in 2022 to a final $255 million Series C1 close in August 2025, bringing disclosed funding to $520 million. As of the report date, however, Celestial AI is no longer a standalone startup: Marvell completed its acquisition in February 2026 and folded the business into Marvell’s Data Center Group. Public evidence is still limited on standalone revenue, named customers, and internally verified private valuation. [C002][C003][C004][C006][C015][C016][C017][C018][C019][C032][C035][C038]'
