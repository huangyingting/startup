sections:
  - number: '1.1'
    title: 'Identity and current status'
    body: 'Celestial AI should be introduced as a 2020-founded optical interconnect startup that no longer operates independently. The strongest current identity anchors are the company’s own site, which now points users to Marvell, and Marvell’s February 2026 closing materials, which say Celestial AI’s technologies and teams moved into Marvell’s Data Center Group. Santa Clara is the best current headquarters anchor, but historical funding coverage placed the company in Sunnyvale, so the location trail changed over time. [C001][C002][C003][C004][C005][C035]'
    claimRefs:
      - 'C001'
      - 'C002'
      - 'C003'
      - 'C004'
      - 'C005'
      - 'C035'
  - number: '1.2'
    title: 'Technology and product posture'
    body: 'Photonic Fabric is the company-defining asset. Official and independent technical sources describe an optical interconnect platform built to move data deeper into AI systems than conventional copper links, including chiplet, package, and rack-scale use cases. The public story evolved from a narrower accelerator framing toward a broader product family that now includes switches, modules, chiplets, and appliance-style memory systems, with standards references to CXL, UCIe, PCIe, and advanced HBM generations. Many of the strongest performance claims remain company-stated, so they should be presented as such. [C006][C007][C008][C009][C010][C011][C014][C027][C028][C029][C039][C040]'
    claimRefs:
      - 'C006'
      - 'C007'
      - 'C008'
      - 'C009'
      - 'C010'
      - 'C011'
      - 'C014'
      - 'C027'
      - 'C028'
      - 'C029'
      - 'C039'
      - 'C040'
  - number: '1.3'
    title: 'Funding, investor base, and exit outcome'
    body: 'Celestial AI’s financing record is unusually well documented for a private infrastructure startup: $56 million in 2022, $100 million in 2023, $175 million in 2024, and a Series C1 that ultimately brought total disclosed funding to $520 million in 2025. The investor base spans financial institutions, deep-tech funds, and strategic backers. Marvell then agreed to buy the company for $3.25 billion upfront plus contingent earnout upside, making the exit strategically significant even though the exact pre-acquisition private valuation is still partly reconstructed from third-party sources. [C015][C016][C017][C018][C019][C020][C032][C036][C037]'
    claimRefs:
      - 'C015'
      - 'C016'
      - 'C017'
      - 'C018'
      - 'C019'
      - 'C020'
      - 'C032'
      - 'C036'
      - 'C037'
  - number: '1.4'
    title: 'What remains unverified'
    body: 'The largest diligence gap is commercial transparency. Public sources do not verify Celestial AI’s standalone revenue, gross margin, customer concentration, or named hyperscaler deployments, and that matters more than one more repeat of funding news. In addition, valuation headlines should be handled cautiously because round-announcement press releases omit valuation, while investor and media sources flatten contingent and non-contingent values into simpler numbers. These are the questions an IC pre-read should highlight rather than bury. [C012][C030][C032][C036][C037][C038]'
    claimRefs:
      - 'C012'
      - 'C030'
      - 'C032'
      - 'C036'
      - 'C037'
      - 'C038'
