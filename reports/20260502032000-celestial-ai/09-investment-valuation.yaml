sections:
  - number: '8.1'
    title: 'Investment thesis summary'
    body: |
      Celestial AI was an attractive strategic technology asset but an incomplete standalone public-underwriting case. On the positive side, the company assembled unusual capital depth, a broadened product surface, meaningful governance upgrades, and eventually a signed-and-closed strategic exit to Marvell. On the cautionary side, public evidence still never reached the level of standalone revenue, customer concentration, gross-margin, or production-scale transparency that would support a conventional growth-equity or IPO-style valuation. The practical conclusion is that the technology thesis was validated, but the private-market return case can only be bounded with scenario analysis rather than modeled with precision. [C019][C021][C022][C032][C035][C038][C039]
    claimRefs:
      - 'C019'
      - 'C021'
      - 'C022'
      - 'C032'
      - 'C035'
      - 'C038'
      - 'C039'
  - number: '8.2'
    title: 'Valuation framework, comparables posture, and method'
    body: |
      The appropriate valuation method is a strategic-value framework, not DCF. DCF fails because the retained ledger does not verify the revenue, margin, or reinvestment inputs required to build one. Relative-multiple work is also constrained because the evidence ledger does not retain a usable peer comparable set. What does exist is enough for a disciplined anchor set: third-party private marks around $1.2 billion in 2024 and $2.5 billion in 2025, plus official Marvell consideration of about $3.25 billion upfront and up to about $5.5 billion including earnout. That anchor set supports a fair-to-positive read on the final strategic outcome, while also requiring caution because the private marks are not official financing disclosures and the full exit headline is partly contingent. [C032][C035][C036][C037][C038]
    claimRefs:
      - 'C032'
      - 'C035'
      - 'C036'
      - 'C037'
      - 'C038'
  - number: '8.3'
    title: 'Bull, base, and bear cases'
    body: |
      The cleanest scenario framing is valuation-anchored rather than revenue-model-anchored. In the bear case, Celestial AI is worth roughly its 2025 third-party private mark, implying that commercialization or contingent-value realization never meaningfully exceeds the late private round context. In the base case, investors underwrite only the official $3.25 billion upfront Marvell consideration. In the bull case, they assume the transaction reaches its full approximately $5.5 billion value through earnout realization tied to successful post-close product adoption. This framework is evidence-backed and avoids pretending that public sources provide enough data to calculate exact investor MOICs by round. [C032][C036][C037]
    claimRefs:
      - 'C032'
      - 'C036'
      - 'C037'
  - number: '8.4'
    title: 'IPO readiness, final recommendation, and stop-loss discipline'
    body: |
      Pre-close, Celestial AI had some ingredients of a future public-company candidate: substantial capital raised, a strategic market position, and stronger governance. It did not have public readiness on the metrics that matter most for IPO underwriting, namely revenue disclosure, customer transparency, and margin visibility. By the report date, however, the IPO question is mostly academic because Marvell has already acquired the company. The right recommendation is therefore track. Investors should monitor shipment timing, customer conversion visibility, leadership retention, and whether the company''s strategic value proves durable enough to convert contingent deal economics into realized value. Kill criteria are straightforward: if product-integration milestones slip, customer visibility remains absent, or value capture relies mainly on unearned earnout, do not upgrade the thesis. [C002][C012][C021][C022][C030][C032][C035][C037][C038]
    claimRefs:
      - 'C002'
      - 'C012'
      - 'C021'
      - 'C022'
      - 'C030'
      - 'C032'
      - 'C035'
      - 'C037'
      - 'C038'
