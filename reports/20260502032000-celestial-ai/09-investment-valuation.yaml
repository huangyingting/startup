company:
  name: 'Celestial AI'
chapter:
  number: 8
  title: 'Investment & Valuation'
  summary: 'Celestial AI delivered strategic validation rather than a clean standalone financial-underwriting case. The retained ledger supports $520 million of disclosed funding, conflicting third-party private marks of roughly $1.2 billion in 2024 and $2.5 billion in 2025, and an official Marvell transaction at approximately $3.25 billion upfront with contingent value to about $5.5 billion. Because standalone revenue, gross margin, and customer concentration are not public, DCF is not applicable; valuation has to rest on strategic transaction anchors, private-mark context, and milestone-based scenario analysis. Recommendation: track rather than buy, because the direct private investment opportunity is gone and remaining upside now sits inside Marvell integration. [C019][C032][C035][C036][C037][C038]'
callouts:
  - type: 'key-insight'
    title: 'The exit validates the technology thesis'
    body: 'An official $3.25 billion upfront acquisition agreement is strong evidence that Celestial AI built an asset strategic enough for a scaled semiconductor buyer to own rather than merely partner with. [C032][C037]'
    claimRefs:
      - 'C032'
      - 'C037'
  - type: 'risk-alert'
    title: 'Classical venture valuation methods are constrained by missing operating data'
    body: 'Public evidence does not verify standalone revenue, margin, or customer concentration, so DCF and revenue-multiple methods would create false precision. [C035][C038]'
    claimRefs:
      - 'C035'
      - 'C038'
  - type: 'risk-alert'
    title: 'Private-mark comparables are useful but imperfect'
    body: 'The best retained private valuation anchors are third-party and conflicting rather than officially disclosed in financing releases, so they help frame upside but cannot be treated as audited fact. [C036]'
    claimRefs:
      - 'C036'
  - type: 'final-recommendation'
    title: 'Recommendation: track'
    body: 'Celestial AI is no longer an investable standalone private company. The right stance is to track post-close execution inside Marvell, not to force a fresh standalone entry case from incomplete public financial data. [C002][C032][C035][C038]'
    claimRefs:
      - 'C002'
      - 'C032'
      - 'C035'
      - 'C038'
