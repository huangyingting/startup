  title: 按类别划分的风险登记表
  columns:
  - Risk category
  - Likelihood
  - Severity
  - Evidence-backed basis
  - Investor implication
  rows:
  - - Manufacturing yield, packaging maturity, and reliability
    - High
    - High
    - Advanced optical-I/O, partner-led manufacturing, and pre-volume shipment status imply non-trivial yield and qualification risk. [C013][C027][C030][C038]
    - Could delay production ramps, raise cost, and compress margin before scale.
  - - Customer conversion and revenue opacity
    - High
    - High
    - Design-ins and validation are public, but named customers, production conversion, and standalone revenue remain undisclosed. [C012][C030][C038]
    - Raises risk of overestimating demand durability or near-term commercialization.
  - - Competitive and substitute pressure
    - Medium
    - High
    - Celestial AI competes against incumbent electrical architectures and broader platform vendors while still proving its own product breadth and readiness. [C009][C013][C031][C039][C040]
    - Can reduce pricing power or narrow the window for independent platform leadership.
  - - Standalone financing and burn risk
    - Medium
    - High
    - The company raised $520 million before exit, yet public disclosure still stops before meaningful revenue transparency. [C019][C024][C035][C038]
    - Without acquisition support, further capital may have been needed before broad production scale.
  - - Regulatory / legal diligence gap
    - Medium
    - Medium
    - Global footprint, cross-border investors, and advanced AI infrastructure positioning make regulatory review relevant, but no specific company-level ruling is verified. [C020][C025][C038]
    - Requires dedicated legal diligence rather than assumption-based underwriting.
  - - Post-close integration and talent retention
    - Medium
    - Medium
    - The business is now inside Marvell, with value capture depending on integration into a larger data-center roadmap. [C002][C021][C022][C035]
    - Execution risk shifts from survival to retention, roadmap continuity, and earnout realization.
  notes: 该风险登记表将发生概率与严重程度分开，以避免夸大那些虽属实质性但尚未有公开证据表明已实现的风险。
