    - type: paragraph
      title: 融资与交易背景
      body: 对于一家私营基础设施创业公司而言，Celestial AI 的融资记录异常完整：2022 年 5600 万美元、2023 年 1 亿美元、2024 年 1.75 亿美元，以及最终在 2025 年将已披露总融资推至 5.2 亿美元的 Series C1。投资者基础横跨金融机构、深科技基金与战略支持方。随后，Marvell 同意以 32.5 亿美元预付对价外加或有 earnout 上行空间收购该公司，使这笔退出具有显著战略意义，尽管收购前的确切私募估值仍部分依赖第三方来源重建。 [C015][C016][C017][C018][C019][C020][C032][C036][C037]
