      body: 该架构把面向系统的标准对齐，与对深层 photonic 器件的雄心结合在一起。公开资料提到其在低个位数 pJ/bit 功耗下对 HBM3E 及未来 HBM4 的对齐；后续技术资料则强调热稳定的 EAM-based silicon photonics，以及可释放 die-edge 面积、为内存和其他接口腾出空间的 in-die optical I/O。在制造层面，Celestial AI 看起来更依赖合作伙伴，而非垂直整合，依托晶圆厂、封装、光学和半导体生态合作方；EE Times 还报道了其 optical-I/O silicon 的先进制程 TSMC tape-out。最主要缺口不是概念不清晰，而是量产证据：公开披露并未提供良率、可靠性或成本曲线。 [C011][C013][C027][C030][C038][C040]
