- id: T018
  title: 估值框架与有证据支持的锚点
  columns:
  - Method
  - Usability
  - Inputs available from retained ledger
  - Read-through
  - Evidence limit
  rows:
  - - DCF
    - Not usable
    - No verified standalone revenue, margin, capex, or working-capital history. [C035][C038]
    - Would create false precision; not appropriate for this report.
    - Critical inputs missing.
  - - Forward revenue multiple
    - Not usable
    - No public revenue run-rate or reliable forecast bridge. [C030][C035][C038]
    - Cannot support a defensible peer-multiple valuation.
    - Revenue denominator missing.
  - - Private-mark anchor analysis
    - Partially usable
    - Conflicting third-party marks of about $1.2B in 2024 and about $2.5B in 2025. [C036]
    - Helpful for framing value progression before exit.
    - Not official company disclosure.
  - - Strategic transaction anchor
    - Usable
    - Official Marvell terms of about $3.25B upfront with contingent value to about $5.5B. [C032][C037]
    - Best hard valuation anchor in the retained evidence.
    - Contingent portion should not be treated as fully realized.
  - - Peer public / private comparables
    - Research more
    - No peer comparable set is retained in the evidence ledger.
    - Do not force relative-multiple work from unsupported external facts.
    - Requires separate evidence collection.
  notes: 本章刻意把估值锚定在真实存在的证据上，而不是锚定在被要求但未保留的市场可比数据上。
