startupIntroduction:
  summary: Celestial AI 曾是硅谷一家开发 Photonic Fabric 的创业公司；该平台是一种光学互连平台，旨在通过光在芯片到芯片、封装到封装以及机架级 AI 系统之间传输数据。现有最强身份锚点显示，公司由 David Lazovsky 和 Preet Virk 于 2020 年创立，后将总部设于 Santa Clara，并围绕面向 hyperscaler 与 AI 芯片团队的计算-内存解耦架构进行定位。公开融资证据显示，公司从 2022 年 5600 万美元的 Series A 发展到 2025 年 8 月最终 2.55 亿美元的 Series C1 收官，已披露融资总额达到 5.2 亿美元。不过，截至报告日，Celestial AI 已不再是独立创业公司：Marvell 于 2026 年 2 月完成收购，并将该业务并入 Marvell 的 Data Center Group。关于其独立营收、具名客户以及经内部验证的私募估值，公开证据仍然有限。 [C002][C003][C004][C006][C015][C016][C017][C018][C019][C032][C035][C038]
