- number: 9
  title: 投资逻辑、估值与回报情景
  sections:
  - number: '9.1'
    title: 投资逻辑摘要
    blocks:
    - type: callout
      title: 关键洞察
      body: 一份官方的 32.5 亿美元预付收购协议，强有力地证明 Celestial AI 构建了一个足够具战略价值的资产，以至于大型半导体买家选择“拥有”而不是仅仅“合作”。 [C032][C037]
      calloutType: key-insight
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C032
      - C037
    - type: paragraph
      title: 论点摘要
      body: Celestial AI 是一项有吸引力的战略技术资产，但并不是一个完整的独立公开市场承销案例。积极的一面是，公司建立了不同寻常的资本厚度、更广的产品面、更成熟的治理结构，并最终与 Marvell 签署并完成了战略退出。谨慎的一面是，公开证据始终未达到支持传统成长型股权或 IPO 式估值所需的独立营收、客户集中度、毛利率或量产透明度水平。实际结论是，技术论点已经得到验证，但私募市场的回报案例只能用情景分析来界定边界，而无法精确建模。 [C019][C021][C022][C032][C035][C038][C039]
      calloutType: null
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C019
      - C021
      - C022
