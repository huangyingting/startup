  - number: '9.3'
    title: 乐观、基准与悲观情景
    blocks:
    - type: paragraph
      title: 情景框架
      body: 最清晰的情景框架应当以估值为锚，而不是以收入模型为锚。在悲观情景下，Celestial AI 的价值大致等于其 2025 年第三方私募估值，这意味着商业化或或有价值兑现并未显著超出晚期私募轮的语境。在基准情景下，投资者仅承认 Marvell 官方 32.5 亿美元预付对价。在乐观情景下，则假设交易通过收购后产品采用带来的 earnout 兑现而达到约 55 亿美元的完整价值。这个框架有证据支撑，也避免假装公开来源足以按轮次精确计算投资者 MOIC。 [C032][C036][C037]
