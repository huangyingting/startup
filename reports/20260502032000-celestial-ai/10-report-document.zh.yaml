      - C039
  - number: '9.2'
    title: 估值框架
    blocks:
    - type: callout
      title: 风险提示
      body: 公开证据并未验证独立营收、利润率或客户集中度，因此 DCF 和收入倍数法都会制造虚假的精确度。 [C035][C038]
      calloutType: risk-alert
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C035
      - C038
    - type: callout
      title: 风险提示
      body: 现有最好的私募估值锚点来自第三方，且彼此冲突，而非融资公告中的官方披露；因此它们可以用于界定上行，但不能被视为经审计事实。 [C036]
      calloutType: risk-alert
      tableRef: null
      figureRef: null
      items: []
      equation: null
      claimRefs:
      - C036
    - type: paragraph
      title: 方法与可比对象立场
      body: 合适的估值方法是战略价值框架，而不是 DCF。之所以不能用 DCF，是因为保留台账并未验证构建 DCF 所需的营收、利润率或再投资输入。相对倍数分析也受到限制，因为证据台账没有保留可用的同业可比组。现有信息仍足以形成一套有纪律的锚点：2024 年约 12 亿美元、2025 年约 25 亿美元的第三方私募估值，加上 Marvell 官方约 32.5 亿美元的预付对价，以及包含 earnout 在内最高约 55 亿美元的总价值。这组锚点支持对最终战略结果作出“公允偏积极”的判断，同时也要求保持谨慎，因为私募估值并非官方融资披露，而完整退出 headline 又部分是或有的。 [C032][C035][C036][C037][C038]
