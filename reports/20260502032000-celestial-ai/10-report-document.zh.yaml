  - Evidence-backed assumptions
  - Read-through for prior investors
  - Confidence
  rows:
  - - Bear
    - ~$2.5B reference point
    - Treat the 2025 third-party private mark as the best available late-stage anchor and assume limited realization beyond that level. [C036]
    - Suggests modest uplift for late private investors and limited extra value capture absent earnout realization.
    - Low-medium
  - - Base
    - $3.25B upfront
    - Use only the official, signed, upfront Marvell consideration. [C032]
    - Confirms strong strategic value creation, though return precision still depends on exact entry price and dilution.
    - High
  - - Bull
    - ~$5.5B maximum value
    - Assume full earnout realization on top of upfront consideration, while recognizing official materials and commentary distinguish this from guaranteed value. [C032][C037]
    - Represents full strategic upside if post-close product adoption and purchase-linked milestones are achieved.
    - Medium
  notes: 这些情景仅锚定于保留证据。它们不是精确的基金回报模型，因为各投资者群体在各轮的进入价格并未得到公开验证。
