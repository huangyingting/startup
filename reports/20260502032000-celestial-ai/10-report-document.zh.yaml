    - type: paragraph
      title: 缓释与止损标准
      body: 证据支持度最高的缓释因素包括：交割前的资本厚度、重量级治理层补强、扩展后的 IP 资产、战略客户侧验证，以及最终被大型数据中心 incumbents 收购。这些因素降低了生存性融资风险，并提升了市场进入杠杆。剩余的投资纪律应以里程碑为基础。对于交割前的投资委员会，否决标准应包括：第一，未能在 2026 年出货窗口前，把 2023 年验证与 2024 年 design-in 转化为外部可验证的量产进展；第二，无法展示足以弥合制造缺口的良率、可靠性与伙伴就绪度数据；第三，在资本消耗持续上升的同时，客户与收入披露仍持续缺失；第四，交易结果的经济性主要依赖或有 earnout，而不是确定性的预付价值。交割后，对应的止损触发则是产品集成里程碑失手、关键技术人才流失，或 Amazon 相关采购机制与 earnout 条件未能转化为 Marvell 内部持久收入贡献的证据。 [C012][C019][C021][C022][C026][C030][C032][C033][C037][C038]
