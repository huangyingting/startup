    - type: paragraph
      title: 创立背景与产品定位
      body: Photonic Fabric 是定义这家公司的核心资产。官方与独立技术来源将其描述为一个光学互连平台，其目标是在 AI 系统内部比传统铜链路更深入地传输数据，覆盖 chiplet、封装以及机架级场景。其公开叙事也从较窄的加速器定位，逐步演化为更广的产品家族，如今包括交换器、模块、chiplets 以及 appliance 式内存系统，并以 CXL、UCIe、PCIe 和新一代 HBM 等标准为支撑。许多最强的性能声明仍来自公司自身，因此应明确按公司口径呈现。 [C006][C007][C008][C009][C010][C011][C014][C027][C028][C029][C039][C040]
