- id: T017
  title: 监管、法律与缓释检查清单
  columns:
  - Topic
  - What the retained ledger supports
  - What remains unverified
  - Mitigation / diligence ask
  rows:
  - - Export controls and restricted-jurisdiction exposure
    - Celestial AI operated in advanced AI interconnect infrastructure and relied on a global ecosystem. [C013][C025]
    - No retained claim verifies EAR classification, license needs, or country-specific exposure. [C038]
    - Obtain export-classification memo, customer geography map, and restricted-party screening history.
  - - Foreign-investment / governance review
    - Investor evidence includes a broad multinational syndicate, and the company had international hiring footprints. [C020][C025]
    - No retained claim verifies CFIUS review, mitigation agreement, or governance restrictions. [C038]
    - Review cap table, information-rights structure, and any national-security review history.
  - - Contractual transaction complexity
    - Official Marvell materials show upfront value plus contingent earnout, and SEC materials describe Amazon warrant economics tied to photonic fabric purchases. [C032][C033][C037]
    - No retained claim quantifies the probability of full earnout realization or any post-close dispute risk.
    - Review merger agreement, earnout mechanics, customer-purchase definitions, and integration governance.
  - - Information security and product assurance
    - Celestial AI sells into critical AI infrastructure categories. [C006][C031]
    - No retained claim verifies cyber certifications, secure-development practices, or hardware-assurance controls. [C038]
    - Request security audits, reliability reports, and customer qualification packages.
  - - Foundry, packaging, and partner concentration
    - Commercialization was partner-led and EE Times reported advanced-node TSMC tape-outs. [C013][C030]
    - No retained claim discloses second-source coverage, supply commitments, or yield learning curves. [C038]
    - Request partner map, capacity commitments, qualification owners, and dual-source strategy.
  notes: 关键不在于这些风险已经被证明发生，而在于保留台账过于单薄，无法把它们直接承销掉。
