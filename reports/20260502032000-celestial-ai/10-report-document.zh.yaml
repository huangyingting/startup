      body: 公开披露支持基于标准的互操作性，但并不支持与 NVIDIA、AMD 或定制 ASIC 厂商之间的具名量产集成。证据显示其与 CXL、PCIe、UCIe、JEDEC HBM 对齐，并拥有匿名半导体 design-in；这足以支持“有集成意图”的判断，但不足以验证精确的平台兼容性。同样，软件故事在公开记录中真实存在但范围有限：Celestial AI 提到的是软件管理的光 fabric 与配套控制功能，而不是独立的 AI 软件业务。管理层尽调应索取互操作性矩阵、协议 bring-up 状态、热与封装约束、可靠性数据，以及任何专有遥测或工作负载自动化层。 [C007][C012][C038][C039][C040]
