  - number: '9.4'
    title: 建议与监控
    blocks:
    - type: paragraph
      title: 最终观点
      body: 在交割前，Celestial AI 具备一些未来上市公司候选者的要素：可观的融资规模、战略性市场位置以及更强的治理结构。但在对 IPO 承销最关键的指标上——营收披露、客户透明度和利润率可见性——它并未达到公开市场所需水平。不过，截至报告日，这个 IPO 问题更多只是学术讨论，因为 Marvell 已经完成收购。因此，正确建议是继续跟踪。投资者应监控出货时点、客户转化可见性、管理层留任情况，以及公司的战略价值是否足够持久，能够把或有交易经济性转化为已实现价值。否决标准也很明确：如果产品集成里程碑失手、客户可见性仍然缺失，或价值兑现主要依赖尚未实现的 earnout，就不应上调投资逻辑。 [C002][C012][C021][C022][C030][C032][C035][C037][C038]
