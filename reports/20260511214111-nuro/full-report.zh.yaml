      - number: '7.5'
        title: 人员与执行风险
        blocks:
          - type: paragraph
            body: >
              Nuro 两轮重组——2022 年 11 月约 300 个岗位（20%），2023 年 5 月约 340 个岗位（30%）——把员工数从约 1,200 的峰值降至约 250。离开的工程师带走了 Nuro
              R1/R2 硬件代际、传感器校准流程、地图管线和运营数据资产的专门知识。这类组织知识无法在短时间内恢复；即使资本充足，重建足以支撑商业规模车队的 AV 工程队伍，也需要 18–24 个月招聘。


              联合创始人 Dave Ferguson 于 2025 年 10 月升任 co-CEO，与联合创始人 Jiajun Zhu 并列，正式化两人在公司 14 年历史中一直维持的共同领导结构。co-CEO
              模式在商业上线阶段并不常见，会给时间敏感的监管和商业决策带来决策延迟风险。两位 co-CEO 都没有公开披露接班计划或指定副手。两位联合创始人若同时离开，将是公司的生存级事件。


              2026 年 AV 人才市场仍高度竞争。Waymo、Cruise（GM）、Motional、Aurora，以及 Apple、Google、Meta 等科技公司，都在同一 AV 工程师人才池中积极招聘。Nuro
              员工数低于峰值，又没有披露股权刷新计划，使剩余约 250 名工程师面临留任风险；尤其是公司缺少商业收入，难以锚定员工近期财务激励。
