      - number: '3.4'
        title: 护城河耐久性与风险评估
        blocks:
          - type: paragraph
            body: >
              截至 mid-2026，Nuro 声称有四个主要竞争护城河：（1）通过可授权的端到端 L4 AI 软件栈实现技术领先；（2）与 Lucid Motors 和 Uber Technologies
              的优先、且可能排他的关系；（3）1.7M+ 无人驾驶英里零责任事故的安全记录；（4）作为唯一公开披露、面向 OEM 加需求运营商商业生态的 B2B AV
              软件授权方，享有先发优势。每条护城河都有可信威胁，值得尽调。


              技术护城河在数据规模上受到挑战：Waymo 的 127M+ 无人驾驶英里与 Nuro 的 1.7M 对比，形成约 75x 训练数据差距；Tesla 的 4M+ 辆支持 FSD
              的车辆产生的监督驾驶数据规模大几个数量级（尽管监督里程对 L4 训练的质量低于完全无人驾驶里程）。Nuro 声称自身拥有更优的无人驾驶专项数据，这一说法有合理性但未经验证；公开资料中尚无与 Waymo
              并排比较的安全指标。合作伙伴护城河受到 Uber 已记录多宿主策略的挑战：Uber 同时投资 Nuro（August 2025 E 轮）、推出 Zoox-Uber Las Vegas 集成（目标 summer
              2026）、与 May Mobility 合作 Arlington TX（May 2025），并长期接入 Motional（Uber+Lyft
              双平台）。安全护城河作为营销资产有效，但在机构层面并不差异化——Waymo 在 127M 英里上相较人类驾驶减少 90%
              严重伤害事故，记录更大且更多经过同行审视。授权模式护城河最独特：Waymo、Tesla、Zoox 和 Motional 尚未宣布可比的 B2B 授权产品，Mobileye 的模式则竞争在不同软件栈层级。如果
              Waymo 宣布授权产品，Nuro 的主要护城河将受到实质威胁。护城河耐久性风险登记表（TP004）按严重性列出各项威胁，并给出建议尽调问题。
