      - number: '7.4'
        title: 伙伴依赖与集中度风险
        blocks:
          - type: paragraph
            body: >
              Nuro 的全部商业项目都压在三方依赖（Uber + Lucid + Hertz/Oro）上，任何一环都没有披露备份方案。Uber 提供需求聚合和叫车平台；Lucid 提供 Gravity SUV
              平台和工厂级传感器集成；Hertz/Oro 提供车队运营。任何单一伙伴退出，项目都会停摆。


              Lucid Motors 是最急迫的依赖风险。Lucid FY2025 自由现金流为 –$3.8 billion，主要财务兜底是一笔来自 Saudi Arabia Public Investment Fund、约
              $2 billion 的定期贷款。2026 年初，预测市场显示 Lucid 在 2027 年前申请破产的概率约为 50%。Lucid 若破产，Nuro 的车辆供应会消失，公司必须重新集成到新的 OEM
              平台，商业上线时间表至少重置 2–3 年。Nuro 未披露任何替代 OEM 平台。


              Uber 的多供应商 AV 策略是第二项重大风险。自 2026 年 1 月 CES 上 Nuro-Lucid 公布以来，Uber 已扩展 AV 名单：对 Avride 进行 $375M 战略投资以支持
              Dallas 服务（2025 年 12 月）；与 Rivian 达成 $1.25 billion 交易，计划到 2028 年最多部署 50,000 辆自动驾驶 R2，目标 San Francisco 和
              Miami；并把 Waymo 合作扩展到 2026 年覆盖 10 个美国城市。Waymo 的运营牵引力——每周 500,000+ 次乘车和 4.8 星评分——使其成为 Uber 不会退出的主导 AV
              供应商。Nuro 35,000 辆车目标在规模上要与 Rivian 对 Uber 的 50,000 辆承诺竞争。Uber 没有公开说明任何 Nuro 最低采购量或排他性。


              地理集中在 SF Bay Area，意味着单一监管行动、安全禁令或天气事件都可能同时叫停 Nuro 全部商业活动。Uber 之外没有公开披露第二个授权客户，收入也没有任何多元化缓冲。
