    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与商业模式
        blocks:
          - type: paragraph
            body: >-
              Nuro, Inc. 是一家物理 AI 公司，总部位于 Mountain View, California，由 Jiajun Zhu 和 Dave Ferguson 于 2016 创立。两人都来自 Google
              早期自动驾驶汽车项目（现 Waymo）。公司的核心商业产品是 Nuro Driver™——一个 AI 优先的 L4 自动驾驶系统，不绑定车型，设计目标是授权给汽车 OEM、出行服务商和车队运营商。Nuro
              自称在打造“the world's most scalable driver”，把前沿端到端 AI 与车规级硬件结合起来，给合作伙伴一条清晰且成本可控的商业自动驾驶路径。Nuro Driver
              融合高分辨率摄像头、固态激光雷达和雷达的传感器数据，并运行在 NVIDIA DRIVE AGX Thor 计算平台上。与 Nuro Driver 配套的是 Nuro Toolkit，一个可定制
              SDK，用于更深度的集成。公司的使命“Autonomy for all. All roads, all rides.”反映了战略转向：从纵向一体化的配送机器人运营商，变成服务
              OEM、网约车平台和物流公司的横向技术授权方。Nuro 用五年以上无人驾驶部署、超过 1.7 million 自动驾驶英里、零责任事故，作为授权方案背后的商业证明点。
