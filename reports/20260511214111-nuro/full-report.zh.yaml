      - number: '6.2'
        title: Tier 1 战略伙伴
        blocks:
          - type: paragraph
            body: >-
              Nuro 当前全部商业组合都集中在 2026 年 1 月 CES 上宣布的一笔平台交易：与 Uber 和 Lucid Motors 的三方 robotaxi 合作，Hertz 及其 Oro Mobility
              子公司担任车队运营伙伴。Uber 和 Lucid 在 CES 上共同发布了以量产为目标的 Lucid Gravity SUV，作为 Nuro AV 栈的基础车辆，既确认了商业规模目标，也明确了责任分工。Lucid
              Motors 制造 Gravity 平台，并在 Arizona 州 Casa Grande 工厂集成 Nuro 的传感器套件和计算硬件。Uber 提供叫车平台、品牌、保险和需求聚合，并通过 Uber app
              独家部署车辆。2026 年 4 月，Hertz 宣布旗下 Oro Mobility 将承担 Bay Area 搭载 Nuro 的 Lucid
              车辆的所有车队管理职责——充电、清洁、维护、维修和车库人员配置——正式补上商业栈的第四根支柱。这一安排让 Nuro 获得清晰的 AV 栈经济性，而不必直接承担资本密集的车队运营。不过，Uber 在 2026 年
              3 月与 Rivian 达成的平行交易——最多 50,000 辆自动驾驶 R2 车辆，基于里程碑融资总额 $1.25 billion——使用 Rivian 自有 AV 栈，并目标在 2028 年于 SF 和
              Miami 上线，明确显示 Uber 是多供应商买方。这种双源采购，是 Nuro 近期最大的商业风险：如果 Rivian 表现更好，或 Uber 内部 AV 项目提速，Uber 仍可降低 Nuro
              栈优先级或用其他方案替代。Nuro-Lucid 车队目标已披露为全球最多 35,000 辆，相比 Rivian 的 50,000 辆承诺，按 Uber 披露的偏好指标看，Nuro 在规模上处于劣势。Nuro 于
              2026 年 5 月取得的 California CPUC 无人驾驶测试许可，是商业 Uber 合作的前置里程碑，也显示监管进展；但完整的付费无人驾驶服务仍需要更多州级授权。
