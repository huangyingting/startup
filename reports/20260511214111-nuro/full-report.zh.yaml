      - number: '4.4'
        title: 资本结构与资金充足性
        blocks:
          - type: paragraph
            body: >
              Nuro 自 2016 创立以来，约通过六轮融资筹集 $2.34 billion，最近一轮是分两批完成的 $203 million E 轮（April 2025：$106M；August
              2025：$97M），投后估值 $6 billion。E 轮投资方包括战略合作伙伴 Uber 和 NVIDIA（两者均首次持股），以及 Baillie Gifford、T. Rowe Price、Fidelity
              和 Tiger Global 等回归机构投资者。Uber 这一批资金附带里程碑条件，意味着 August 关闭的 $97M 中有一部分取决于 Nuro
              达成商业部署目标；具体里程碑和附条件总额未公开披露。SoftBank Vision Fund 曾领投 Nuro A 轮（$92M，2018）和 B 轮（$940M，2019），未公开参与 E
              轮；其当前持股未披露，可能已被中间轮次显著稀释。D 轮（November 2021，$600M，Tiger Global）确立了 Nuro 的估值峰值 $8.6 billion——较当前 $6B E 轮估值高
              30%，反映 2022–2024 AV 板块整体估值重置。2022–2023 重组后，Nuro 年烧钱速度估计从 1,200 名员工时期的 $200–360M/year，降至约 250 名员工时期的
              $50–100M/year。按 $50–100M/year 烧钱和 August 2025 融资 $203M 计算，Nuro 估计拥有 18–24 个月现金跑道，可覆盖至 late 2026 到
              mid-2027——大致与其宣布的 Bay Area 商业发布时间表重合。如果 late 2026 来自授权和收入分成的商业收入兑现，现金跑道可能显著延长；平行的 Uber-Rivian 交易（初始
              $300M，最高 $1.25B，附带里程碑条件）说明 Uber 也在向并行 AV 项目分配大量资本，可能争夺 Robotaxi 心智份额。NVIDIA 股权投资加深了计算合作，也可能提供更有利的 DRIVE
              AGX Thor 硬件定价，从而降低 Nuro 单车计算资本支出。
