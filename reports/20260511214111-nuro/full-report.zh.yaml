      - number: '6.5'
        title: 客户集中度与商业风险
        blocks:
          - type: paragraph
            body: >-
              Nuro 的客户集中度实际上是完全集中：一个平台交易（Uber）、一个硬件伙伴（Lucid）、一个车队运营商（Hertz/Oro），以及一个初始地理区域（SF Bay Area）。这在结构上类似一个尚未产生收入的
              SaaS 初创公司，其全部 ARR 基础只有一个企业客户——商业上有验证意义，但极其脆弱。Uber 关系若因性能不达标、合同重谈，或 Uber 自身战略转向 Rivian 而恶化，Nuro
              的全部近期收入基础都会消失。Uber 的 Rivian 合作在 Nuro-Lucid 交易 11 周后宣布，是目前最清晰的信号：Uber 正在搭建多供应商 AV 平台。两个项目瞄准不同车型（Lucid
              Gravity 豪华 SUV vs. Rivian R2 中端 crossover）和不同时间线（2026 vs. 2028 商业上线），让 Uber 同时拥有内置备选方案和对 Nuro
              商业条款的谈判杠杆。Nuro 与 Uber 授权安排的排他性或非排他性尚未公开披露。Nuro 没有披露其他 B2B 授权客户——没有市政车队项目、没有国际平台交易、没有第二家网约车客户——Uber
              项目之外的商业管线完全不透明。消费者需求风险又叠加在伙伴风险之上：AAA 数据显示 53% 的美国人反对乘坐 AV，Deloitte 则把美国列为全球 AV 热情最低的市场之一。如果付费服务需求达不到 Uber
              证明车队扩张合理性所需的水平，Nuro 的授权规模和基于里程碑的收入都会停滞。缓解路径存在——Waymo 案例证明消费者阻力并非不可突破，成功的 Bay Area 上线也会给 Nuro
              一个可向二级运营商展示的商业部署样板——但这些在首次付费服务之前仍属推测。
