      - number: '1.4'
        title: 关键里程碑与战略转向
        blocks:
          - type: paragraph
            body: >-
              Nuro 的历史是一条被关键节点打断的轨迹：早期借 SoftBank 资本快速扩张；拿到联邦监管首例（NHTSA 在 February 2020 首次为 R2
              颁发无人驾驶车辆豁免）；随后过度扩张，2022-2023 两轮裁员；再转向技术授权；最后以 2025 Lucid-Uber 合作作为商业重启锚点。November 2022 裁员（约 300 人，约占员工数
              20%）被归因于经济下行和延长现金跑道的需要。May 2023 重组更深——再裁约 340 人（约占剩余员工
              30%），并暂停商业配送扩张——联合创始人也承认，在新利率环境下，扩大纵向一体化配送车队所需资本已无法融资。2023 转向正式把 Nuro 从车队运营商改造成技术授权方；July 2025 宣布的
              Lucid-Uber 合作和 August 2025 的 $203M E 轮融资验证了这一策略。到 January 2026，Nuro 与 Lucid、Uber 在 CES 一同发布具备量产意图的
              Robotaxi；道路自动驾驶测试已从 December 2025 开始。截至 May 2026，Nuro 已为 Lucid Gravity 车辆取得 California DMV 无人驾驶测试许可和 CPUC
              载安全员试点许可，是 California 仅有五家同时持有两项许可的公司之一。
