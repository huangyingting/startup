  - id: TM004
    title: 增长驱动因素与约束
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时点
      - 对无人出租车市场的影响
      - 尽调问题
    rows:
      - - 自动驾驶技术成本曲线（传感器、算力）
        - 驱动因素
        - 2025–2030
        - 单位成本下降后，运营成本可低于 $1/mile；规模化盈利的关键；Goldman Sachs 预计到 2035 年达到低于 $1 的里程碑
        - 跟踪 NVIDIA DRIVE AGX 和 lidar 成本曲线；验证 Nuro 单车 BOM 及学习曲线假设
      - - 加州三级自动驾驶许可（DMV + CPUC）
        - 双向
        - 2026–2028+
        - 监管路径清晰，商业规划能落地，但每一阶段增加 18-24+ 个月；轻型自动驾驶车辆每阶段要求 50,000 miles；首个重型自动驾驶授权门槛为 250K miles
        - 跟踪 Nuro Stage 1 里程累积时间表；确认 CPUC 无人驾驶网约车许可申请日期
      - - 消费者信任缺口（60% 害怕；53% 不会乘坐）
        - 约束
        - 2025–2032
        - 多数人恐惧，把近期市场限制在技术接受度高的人群；Gen Z 51% 感到舒适，说明代际在变化；多数人全面接受可能要到 2030 年代末
        - 跟踪 AAA/S&P 年度消费者信任调查；跟踪先发运营商事故率和公众反应；关注 Waymo 的 Gen Z 乘坐数据
      - - Uber 平台规模与需求聚合
        - 驱动因素
        - 当前
        - Uber 每年 13.5B 次行程 + 美国网约车 72% 份额，为 Nuro 提供启动跑道；平台网络效应是核心商业化落地杠杆； Uber-Rivian 交易显示 Uber 通过并行自动驾驶供应商对冲
        - 确认 Uber 排他窗口；验证旧金山湾区上线时的需求密度和动态加价；审阅 Uber 与 Nuro 的里程碑条款
      - - 自动驾驶安全事件量（6,450 起；同比增长 51%）
        - 约束
        - 当前–2027
        - NHTSA 事件量上升，带来舆论和监管风险；一次反向安全事件可能触发许可暂停或公众反弹；ADS 碰撞率（9.1 vs 人类 4.1）仍有争议
        - 审计 NHTSA 事故数据库中的 Nuro 记录；跟踪加州 DMV 对 Nuro 车队的接管和事故披露；监控 CPUC 执法行动
      - - 竞争对手资本投放（Waymo $16B；Uber-Rivian $1.25B）
