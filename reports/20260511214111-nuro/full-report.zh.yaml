      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Nuro 在 2026 年 5 月获得 CPUC Drivered Pilot 许可，使其可在公共道路上、由远程安全操作员参与的情况下进行无人驾驶乘客测试。不过，在付费乘车启动前，这只是至少 4
              个许可里程碑中的第 2 个：California DMV Driverless Deployment Permit，以及面向商业网约车运营的 CPUC Driverless Deployment Permit
              仍未取得。历史上，即便资源充足的运营商，California DMV 部署审批从申请到获批也通常需要 12–18 个月，因此商业上线风险现实地延伸到 2027–2028 年。


              California AB 1777 于 2026 年 7 月生效，引入了一项重要新责任机制：当事故涉及无人驾驶车辆时，可直接向 AV 制造商开具企业罚单。此前，执法行动需要通过车辆运营商（例如 Uber 或
              Hertz）传导；AB 1777 取消了这层缓冲，使 Nuro 对其技术栈导致的事故承担共同责任。California 同时要求无人驾驶商业运营具备 $5 million 或更高责任保险，在上线前增加一层成本。


              产品责任的天价赔偿判决环境已经明显恶化。Risk & Insurance 数据显示，2024 年企业诉讼赔偿激增 116% 至 $31.3 billion，AV
              和自动化系统案件属于增长最快的类别之一。在新的直接罚单制度下，San Francisco 一辆搭载 Nuro 的 Lucid 车辆发生单起灾难性 AV 事故，可能引发 $100M–$500M 的陪审团判决。


              知识产权方面，Waymo v. Uber 商业秘密诉讼（2018 年以约 $245M Waymo 股权和解）证明，AV 商业秘密侵占可以在大规模上被追责；Nuro 雇用了前 Google/Waymo
              工程师，因此双向都存在潜在 IP 风险。NHTSA 在 2025 年 7 月结束对 Waymo 的调查，未认定系统性违规，这提供了一个温和先例：主动安全报告和透明提交事故数据，可以限制监管执法风险。2025
              年最终确定的 CCPA/CPPA ADMT 规则，要求自动化决策系统——包括 Nuro 的 AV 栈路径规划和行为预测——向 California 居民提供退出权，并要求年度网络安全审计，增加合规负担。
