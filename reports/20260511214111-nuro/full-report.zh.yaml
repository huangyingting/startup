      - number: '2.5'
        title: 规模估计缺口与分析限制
        blocks:
          - type: paragraph
            body: >
              多项重大限制约束了本市场分析的质量。第一，分析师 TAM 估计范围很宽——2025 年 $0.27B 至 $2.68B，2035 年 $86B 至 $400B——反映的是真实不同的市场定义（仅 RaaS
              收入对比完整 AV 板块）、地理范围和方法假设，而报告本身并未完全披露这些口径。投资者应把这些估计视为方向性的数量级边界，而非精确估值。第二，NHTSA 事件数据给出 ADS 车辆每百万英里 9.1
              起事故、人类驾驶员 4.1 起，制造了安全悖论：AV 报告要求比人类驾驶更严格，更多事件被报告，直接比较会误导。2 起确认 ADS 死亡与 6,450 起事件对照，说明大多数 ADS
              事件较轻，但这一指标仍有争议。


              第三，若不知道 Nuro 的单车授权费、授权使用费结构和排他条款，不能把与 Nuro 有关的 AV 软件授权 SAM 从 RaaS 市场中清晰拆出来——这些信息均未公开披露。Precedence Research
              的 AV 软件市场（$2.30B-$8.04B）是最贴近的规模视角，但它包括所有软件类别；Nuro 在其中可触达的份额取决于软件栈渗透率和定价。第四，消费者采用时间不确定：Goldman Sachs 认为到
              2035 年成本可低于 $1/mile，而 Gridwise 和 S&P 研究显示，与人类网约车持平要到 2040-2041——五年差距会实质影响近期 SAM。这些缺口已纳入证据缺口章节，并作为 TM004
              中的尽调问题。
