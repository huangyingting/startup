  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与客户工作流
        blocks:
          - type: paragraph
            body: >
              截至 May 2026，Nuro 的主要商业产品是 Nuro Driver™，一个软件定义的 L4 自动驾驶系统。公司将其授权给 OEM
              和车队运营客户，而不是自己作为车队运营商部署。产品架构把自动驾驶软件与车辆平台拆开：Nuro 编写从感知到控制的完整软件栈，再由 OEM（Lucid Motors）在工厂层面集成进车身（Lucid Gravity
              SUV），并通过出行平台合作伙伴（Uber）商业运营。这种三方结构——软件授权方、OEM 硬件伙伴和网络分发伙伴——使 Nuro 区别于 Waymo（自研传感器硬件并运营自有车队）或
              Tesla（制造车辆）等纵向一体化 Robotaxi 运营商。


              核心客户工作流从 Uber app 开始，乘客发起一次标准 UberX 式行程请求。Uber 调度系统通过 Uber AV API 把请求路由给一辆 Nuro 驱动的 Lucid
              Gravity。车辆自动导航到上车点，通过 Uber app 界面识别乘客，完成行程，并通过 Uber 标准计费系统结算。车内没有人类驾驶员；远程运营人员监控车队，并可通过 Nuro
              远程运营层在边缘情况中介入。车队物流——充电、清洁、维护、车场管理——由 Hertz/Oro Mobility 按其与 Uber 的单独车队服务协议负责。


              Nuro Driver 已通过超过 1 million 自动驾驶英里验证，且没有公开报告的责任事故。上一代配送机器人项目（R2，2022 退役）建立了重要监管先例，包括 2020 年首个 NHTSA 联邦 AV
              安全豁免。当前 Robotaxi 项目目标是在 late 2026 于 SF Bay Area 推出商业无人驾驶行程，前提是取得 California DMV 自动驾驶车辆部署许可和 CPUC
              无人驾驶部署许可；截至 May 2026，两项许可均未签发。
