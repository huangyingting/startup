      - number: '4.2'
        title: 定价与授权结构
        blocks:
          - type: paragraph
            body: >
              AV
              软件授权行业尚未收敛到标准定价模式，但早期商业交易中已出现两种主导结构：按车辆的年度订阅（$2,000–$10,000/vehicle/year）和按英里的授权使用费（$0.01–$0.10/mile）。Nuro
              公开描述其商业模式为授权安排，但没有给出费率。按行业可比推断，Aurora 的商业卡车交易和 Mobileye 的 ADAS 授权安排显示，前置集成费可能为每个平台协议
              $1M–$5M，外加随规模递减的分层按英里授权使用费。在 Nuro-Lucid-Uber 协议公布的 35,000+ 辆 Lucid Gravity 规模下，若每车每年行驶 30,000–100,000
              自动驾驶英里，$0.03/mile 的授权使用费将带来约 $30M–$90M/year
              的按英里费用——不过这些仍是早期、低利用率估计。标价不同于实际收入：合同最低量、爬坡期和规模折扣都会压缩实际费率，使其低于标价；Mobileye 的 ADAS 授权条款中也能看到这一动态。Nuro
              的市场进入动作是 B2B 直销，瞄准大型 OEM 和出行平台合作伙伴（Lucid、Uber），而不是分散的车队运营商；这种打法缩短销售周期，但带来客户集中风险。Hertz/Oro
              的车队管理角色增加了中间层：Hertz 获得车队运营收入，而 Nuro 的授权收入主要来自 Lucid（硬件集成费）和 Uber（使用收入分成）；没有公开证据显示 Hertz 会向 Nuro 支付单独车队管理费。
