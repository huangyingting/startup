  - id: FE001
    type: stack
    title: 产品架构图
    description: Nuro Driver 系统在 Lucid Gravity robotaxi 上部署的分层软硬件栈。层级从底部的车辆 / 计算硬件，到顶部的需求和车队管理平台。
    layout: standard
    summary: Nuro Driver 是覆盖在 NVIDIA DRIVE AGX Thor 计算平台和 Lucid Gravity 硬件之上的纯软件栈；Uber 在自动驾驶层之上提供需求和车队分发。
    data:
      layers:
        - label: 需求与车队平台
          modules:
            - Uber App — 预约、AV 派单 API、乘客匹配
            - Hertz/Oro Mobility — 场站充电、清洁、维护
          note: Single distribution channel (Uber); fleet ops outsourced to reduce Nuro capex
        - label: 远程运营
          modules:
            - Nuro Remote Ops Center — 24/7 人在回路监控
            - 接入车队的 5G 上行链路；边缘场景升级和安全停车命令
          note: Relies on continuous 5G connectivity; operator coverage required around the clock
        - label: 自动驾驶软件（Nuro Driver™）
          modules:
            - 地图与定位 — 高精地图 + 厘米级实时定位
            - 感知 — AI 融合：固态 LiDAR、4 类摄像头、成像雷达、IMU、麦克风
            - 预测 — ML 轨迹 / 意图预测（CIMRL 2024 研究）
            - 规划与控制 — 实时轨迹生成 + 三重冗余车辆接口
            - 安全与后备层 — 基于规则的验证器 + 并行后备栈
          note: Core proprietary IP; AI-first throughout; rules-based validators run alongside ML models
        - label: 仿真与验证
          modules:
            - Google Kubernetes Engine (GKE) — 大规模 AV 场景仿真
            - Foretellix — 覆盖率驱动的边缘场景生成和回放
          note: Simulation-first training; sim-to-real gap remains a fundamental challenge
        - label: 计算硬件
          modules:
            - NVIDIA DRIVE AGX Thor — 2000 TOPS（FP4）、1000 INT8 TOPS、ASIL-D 认证
            - Arm Neoverse V3AE CPU — 车规级；Nuro–Arm 多年合作
            - 64 GB LPDDR5X，273 GB/s；DRIVE OS 7 搭配 TensorRT 10
          note: Single-vendor NVIDIA dependency; 350W peak power draw; Blackwell architecture
        - label: 车辆平台
          modules:
            - Lucid Gravity SUV — OEM 改装；续航 >400 mi；唯一车辆合作伙伴
            - 低矮 'halo' 车顶传感器舱 — 集成 LiDAR、摄像头、雷达
          note: Nuro does not manufacture the vehicle; sole OEM dependency creates concentration risk
    sourceRefs:
