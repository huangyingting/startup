      - number: '2.3'
        title: 买方与细分市场格局
        blocks:
          - type: paragraph
            body: >
              Nuro 的买方结构是多层级的，不同于面向消费者的业务。Nuro Driver 技术平台的一级买方是 OEM 合作伙伴——当前项目中是 Lucid Motors——由其在制造工厂集成 AV
              硬件和软件，并销售完整的 AV 就绪车辆。二级买方是需求平台运营方（Uber Technologies），它持有、运营并调度车队，获取车费收入，并通过授权或授权使用费安排直接向 Nuro 付款。Oro
              Mobility（Hertz 子公司）等车队基础设施运营商负责充电、维护和车场管理，形成第三层买方；它支撑商业规模，但位于一级授权关系下游。


              更广义的市场层面，North America 以 37% 的全球 Robotaxi 市场份额领先，Asia-Pacific 占 34%——两者合计代表超过 70%
              的部署集中度。面向消费者的需求由平台聚合（Uber 在美国拼车市场份额 72%；2025 年行程 13.5B），而不是直接流向技术授权方。竞争性买方格局包括 Waymo（Jaguar Land
              Rover）、Motional（Hyundai）和 Avride（与 Uber 合作做外卖配送和拼车）的活跃 OEM-AV 集成。Goldman Sachs 对车队增长的预测——AV 数量从 2024 年
              7,000 辆增至 2030 年 1 million 辆——意味着需要 AV 技术供应商的买方宇宙会迅速扩张。乘客和消费者是终端用户，但在 Nuro 模式中不是付费客户；他们的采用曲线（见第 4
              节）会通过平台利用率间接影响需求。TM003 展示买方细分，FM003 展示价值链流向。
