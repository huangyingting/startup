        - 未公开车队授权条款；未公开每英里成本基础；价格因城市和路线长度而异
        - 在高端城市市场确立 $15–20 的消费者票价上限；Nuro 的 Uber 被授权方必须在这个区间竞争；Waymo 无动态加价模式形成消费者信任溢价，可作为 Nuro 项目的基准
      - - Tesla (Cybercab)
        - 按次试点票价 + 售车模式
        - $4.20/ride 固定票价（Austin 试点，2026）；目标车价低于 $30K；FSD 订阅 $99/month 或一次性 $8K
        - 无人驾驶乘车入口；通过 Tesla app 的车主网络分润模式；车辆硬件含 FSD 芯片
        - 扩张价格未知；试点票价可能由放量和制造规模目标补贴；需要逐城获得监管批准
        - 已公开最低按次票价形成消费者价格锚风险；如果 Tesla 在全国范围跑通 $4–5/ride，Uber 可能被迫压低运营成本并要求更低的 Nuro 授权费；这是 Nuro 被授权方经济性最尖锐的定价威胁
      - - Nuro（通过 Lucid-Uber 部署）
        - B2B 软件授权 + 收入分成（技术供应商）
        - 单车授权费（未披露）+ 来自 Uber 的收入分成或版税（未披露）；不是按次乘车的消费者定价模式
