  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模式与变现
        blocks:
          - type: paragraph
            body: >
              Nuro 的收入模式是技术授权软件栈，由三条相互连接的收入流构成；截至 May 2026，没有任何一条产生了公开披露的商业收入。第一条、也是主要收入流，是 Nuro Driver™ 授权：OEM
              或车队运营商支付前置集成费（类似汽车软件授权交易，估计为每个平台集成 $1M–$10M+），随后随着车辆在商业服务中积累自动驾驶英里，持续按车辆或按英里支付授权使用费。在 Nuro-Lucid-Uber
              结构中，Lucid 是在工厂层面集成 Nuro Driver 的 OEM，Uber 则商业运营车队；外部尚不清楚由哪一方支付授权费、各自比例如何。第二条收入流是 Nuro 驱动车辆完成 Uber
              行程后的收入分成——即 Uber 每完成一笔自动驾驶行程收取车费，Nuro 获得其中一定比例。具体收入分成比例具有商业敏感性，未披露；行业出行平台可比公司显示，为关键调度或 AV 软件栈服务提供方的抽成率约为
              20–30%。第三条收入流仍处早期且取决于条件，即通过 Hertz/Oro Mobility 获得车队基础设施费用；Hertz/Oro 为 Nuro 驱动的 Robotaxi
              车队提供车场管理、充电、维护和清洁，由此带来潜在服务层收入渠道，不过 Hertz/Oro 承担车队资本支出，且与 Nuro 的财务结构未公开。2023 转向之前，Nuro 还曾为
              Kroger、Walmart、FedEx 和 Domino's 运营配送试点，采用按配送或试点合同收费安排；所有商业配送项目到 late 2022 已结束，公开报告收入很少。Nuro 明确表示，其
              Robotaxi 服务尚未产生商业收入，也未披露来自已宣布合作伙伴的 ARR 或经常性授权付款。
