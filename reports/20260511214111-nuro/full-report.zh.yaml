  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户模型与层级结构
        blocks:
          - type: paragraph
            body: >-
              Nuro 采用纯 B2B 技术授权模式，向商业运营商提供 Nuro Driver 自动驾驶软件栈及相关硬件集成，而不是部署自有车队或直接面向乘客营销。因此，Nuro
              更像一个横向技术层，终端用户只能通过运营商伙伴间接触达。客户层级分为 3 个功能层。Tier 1 战略平台伙伴——目前为 Uber、Lucid Motors 和 Hertz/Oro Mobility——与
              Nuro 保持合同化、长期关系，并承担商业风险。Tier 2 车队运营商（目前尚无公开披露的第二客户填充这一类别）将把 Nuro 技术扩展到不同车辆项目或地理区域。Tier 3 终端用户只通过 Uber
              叫车平台接触 Nuro 技术，与 Nuro 没有直接商业关系。第四个历史类别——配送时期客户（Kroger、Walmart、FedEx、7-Eleven）——代表 Nuro 之前的商业化路径，但已在 2023
              年全面暂停。从贴近消费者的配送运营转向纯 B2B 授权，在战略上自洽，却让 Nuro 没有消费者品牌，也没有独立需求渠道。消费者获客现在完全归 Uber，这意味着 Nuro 的命运在结构上绑定 Uber 的
              robotaxi 执行能力和市场需求。Nuro 的 Uber robotaxi 项目把 San Francisco Bay Area 作为首个上线市场，2026 年 5 月取得 CPUC
              许可后已开始道路无人驾驶测试。如果授权模式能在商业规模上得到验证，未来可扩展到其他网约车平台、市政车队或国际运营商——但截至报告日，Nuro 没有公开披露此类管线。
