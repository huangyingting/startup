      - number: '5.5'
        title: 产品路线图与技术风险
        blocks:
          - type: paragraph
            body: >
              Nuro 公开披露的产品路线图有 3 个连续里程碑：（1）公共道路无乘客无人驾驶测试（已实现，2026 年 4 月 DMV 许可）；（2）面向 Uber 员工试点、带安全驾驶员的载客出行（进行中，2026 年 5
              月 CPUC 有驾驶员试点许可）；（3）面向普通公众、在 SF Bay Area 推出完全无人驾驶的商业收费服务，目标时间为 2026 年末。更长期路线图——地域扩张、更多 OEM 合作和国际部署——除
              Lucid-Uber 合作外尚未公开细化。


              技术风险显著。恶劣天气（雨、雪、浓雾）下的传感器退化，仍是所有固态 LiDAR 和摄像头系统的长期难题；Nuro
              使用高分辨率成像雷达能部分缓解，但无法完全解决低能见度下的感知失效，因为雷达提供速度和距离数据，却不能给出摄像头和 LiDAR 能提供的细粒度语义场景理解。边缘端计算延迟是第二层风险：DRIVE AGX Thor
              的 350 W 峰值功耗和散热要求会增加车辆重量与复杂度；感知—规划闭环中任何超过约 100ms
              的延迟上升，都会压缩安全裕度。长尾场景——非常规道路构型、施工区域、与紧急车辆互动——仍需要人工远程操作员升级处理，也正是这些长尾技术挑战，把有限 ODD 部署和通用 Level 5 自动驾驶区分开来。


              关键依赖带来供应链和合作风险。NVIDIA DRIVE AGX Thor 计算平台来自单一供应商 NVIDIA；NVIDIA 供应链一旦中断、初始合作价格结束后价格调整，或 Nuro
              转向竞争平台，都需要在新硬件上重新验证整套 Nuro Driver 栈，这是多年工程工作。Lucid Motors 作为唯一车辆 OEM 合作伙伴，也带来类似集中度风险：Lucid
              任何生产延迟、财务困境，或集成协议重谈，都会推迟车辆供给。Uber 平台是唯一商业分发渠道，因此 Nuro 的收入爬坡完全取决于 Uber 的车队部署速度和乘客需求。


              开发者生态仍处于萌芽期：截至 2026 年 5 月，Nuro 尚未披露 Nuro Driver 的公开 API 或开发者 SDK，限制第三方工具集成前景，并相较更开放的 AV 平台形成战略不对称。没有已发布
              SDK，也会让 Lucid 之外的潜在 OEM 合作伙伴更难评估该栈的集成可行性，进而可能拖慢授权模式实现长期规模所需的 OEM 客户多元化。
            claimRefs:
