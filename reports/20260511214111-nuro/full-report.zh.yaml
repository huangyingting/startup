  - id: TV002
    title: 投资逻辑与反向逻辑表
    columns:
      - 投资逻辑主张
      - 支持证据
      - 反向逻辑
      - 反对证据
      - 净评估
    rows:
      - - 市场机会巨大，赢家通吃动态利好先发者
        - 自动驾驶出租车市场到 2034 年达 $96B，CAGR 72%；领先平台的 AV 软件授权到 2035 年可能达到 $10B ARR
        - 市场更像赢家拿大头，Waymo 已凭每周 500K 次载客和 $126B 估值占据主导；Nuro 载客为零
        - Waymo 的运营规模、品牌和资本（累计融资 $16B+）在 SF Bay Area——Nuro 的目标市场——形成近乎难以逾越的早期护城河
        - 中性：TAM 存在，但结局取决于执行而非 TAM；Waymo 已占据高地
      - - 软件授权带来高毛利、轻资本经济性
        - Mobileye 软件授权规模化后毛利率 80%+；Aurora、Mobileye 都证明了 AV 软件 SaaS 经济性
        - Nuro 没有披露收入；单车经济性尚未在规模上证明；尚未商业化意味着所有毛利率估计都只是理论
        - Aurora 在 2024 10-K 中确认收入为 $0；AV 商业化时间表在全行业持续推迟 18–24 个月
        - 谨慎正面：模式结构上成立；风险在执行和时点
      - - Uber 需求平台锚点提供有保障的商业化启动量
        - Uber 是 Series E 战略股权投资方；已宣布承诺在 SF Bay Area 部署自动驾驶出租车
        - Uber 同时向 Rivian AV 项目承诺 $300M–$1.25B，并在多个市场运营 Waymo；未确认排他性
        - Uber CEO 公开确认多供应商 AV 策略；Waymo 已借 Uber 集成在 Austin、Phoenix、SF 部署
        - 有条件正面：Uber 合作真实存在但非排他；尽调必须核实最低量承诺
      - - Google Brain 出身创始人和 400+ 专利构成深 IP 护城河
        - Nuro 自 2016 年以来提交 400+ 项自动驾驶车辆专利；共同创始人 Dave Ferguson 和 Jiajun Zhu 曾领导 Waymo 核心自动驾驶技术栈
        - AV 专利护城河难以维持，因为行业正收敛到相似的传感器融合和 ML 路线；Waymo IP 诉讼先例留下潜在风险
        - Waymo v. Uber 商业秘密和解（$245M Waymo 股权）显示 IP 争议可以被追诉；没有独立审计确认 Nuro IP 质量
        - 中性：IP 护城河有可能存在，但尚未验证；创始人履历是正面信号，不是防御性保证
      - - NVIDIA 背书带来差异化计算优势
        - NVIDIA 是 Nuro Series E 股权投资方；Nuro 部署 NVIDIA DRIVE AGX Thor——行业领先 AV 计算平台
        - NVIDIA 也向 Aurora、Zoox、Mobileye 和多家 AV 公司供应计算；投资非排他；Qualcomm 和自研芯片都是替代方案
        - NVIDIA 也持有 Aurora Innovation 股权；DRIVE AGX Thor 是行业标准平台，不是 Nuro 专属
        - 中性：NVIDIA 投资对计算可得性和共同开发是正面信号，但无法形成可持续竞争优势
    notes: 净评估基于公开证据综合；有条件的投资逻辑要素需在投资前通过尽调确认。
