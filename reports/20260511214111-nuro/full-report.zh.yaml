      - number: '8.5'
        title: 投资逻辑失效与止损触发点
        blocks:
          - type: paragraph
            body: >
              以下四类事件一旦确认，任何一个都足以使 $6B 投资逻辑失效，并要求退出或立即重谈估值。它们不是臆测的尾部风险——未来 12–24 个月内，每一项都具备实质发生可能。


              第一个、也是优先级最高的触发点，是 Lucid Motors 破产或交付失败。鉴于 2027 年前市场隐含破产概率为 ~50%，任何 Nuro 车辆交付承诺落空、Chapter 11 破产申请，或 Gravity
              项目终止，都会让 Nuro 的车辆平台彻底消失。公开资料中没有记录任何 OEM 备选方案。Lucid 失败会把商业发布时点重置 18–36 个月——若没有紧急融资，Series E
              资金很可能撑不到那时。投资人应要求 Nuro 管理层提供有约束力的书面应急计划，并把它作为投资交割前提。


              第二个触发点，是 CPUC Driverless Deployment Permit 推迟到 2028 年 5 月之后。CPUC 许可顺序是关键监管闸门；没有 Driverless Deployment
              Permit，Nuro 就无法收费载客。可比运营方（包括 Waymo 和 Cruise）的历史许可时间线显示，提交申请后通常需要 12–24 个月，因此最早现实许可时间可能是 2027 年中后期。若滑到 2028
              年或更晚，Nuro 会在产生实质收入前耗尽现金跑道。


              第三个触发点，是 Uber 在旧金山指定一个非 Nuro 的独家自动驾驶合作伙伴。Uber 同时推进 $300M–$1.25B 的 Rivian 自动驾驶项目，并积极部署 Waymo，显示其采用多来源策略。若
              Uber 在 Nuro 商业发布前公开承诺由 Waymo 或 Rivian 担任旧金山独家自动驾驶合作伙伴，需求平台锚点就会消失。Nuro-Uber 协议未披露排他性条款，是一个实质尽调缺口。


              第四个触发点，是低于 $4B 的新一轮融资，意味着市场重估投资逻辑。若下轮估值降至 $3–4B 或更低，Series E 投资人将面对清算优先权重排，并确认商业化时间线已明显后移。按 2025 年 8 月起估计
              18–24 个月现金跑道，Series F 窗口会在 2026 年底至 2027 年中打开——正好是商业发布要么被证实、要么失败的时候。
