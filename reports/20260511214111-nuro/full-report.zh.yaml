  - id: TV004
    title: 可比估值表
    columns:
      - 公司
      - 阶段
      - 商业模式
      - 估值
      - 收入 / GMV 倍数
      - 累计融资
      - 与 Nuro 的相关性
    rows:
      - - Waymo（Alphabet 子公司）
        - 商业化：~500K 次出行 / 周，5 个美国城市（SF、LA、Austin、Phoenix、Miami）
        - Robotaxi 平台；垂直整合（自有车辆 + 技术栈 + 运营）
        - $126B（Feb 2026 Alphabet 轮融资）
        - ~360x 年化收入（~$350M ARR）
        - $16B+
        - 最直接可比；Nuro 估值为 Waymo 的 1/21——折价反映商业化前阶段；授权模式与 Waymo 的平台模式是关键结构差异
      - - 'Aurora Innovation（NASDAQ: AUR）'
        - 早期商业化：自动驾驶卡车 Apr 2025 上线；robotaxi 预计 late 2026
        - 面向车队运营商和 OEM 的 AV 软件授权
        - $14.2B 市值（May 2026）
        - 极高（2024 年尚未产生收入）；2025 年确认收入估计 ~$3M
        - 累计融资 ~$2B
        - Nuro 授权模式最好的结构可比；Aurora 市值高于 Nuro 的 $6B 估值，尽管同样处于商业化前阶段，说明如果从卡车到 robotaxi 的路径跑通，Nuro 可能被低估
      - - 'Mobileye（NASDAQ: MBLY）'
        - 已规模化产生收入：2025 收入 $1.89B；ADAS 和 AV 软件 / 芯片
        - 面向 OEM 的 AV 芯片 + 软件授权（ADAS → AV）
        - $7.8B 市值（May 2026）
        - ~4.1x 2025 收入
        - Intel IPO 分拆（总额约 ~$8B）
        - 已产生收入的可比公司；较低倍数（4.1x，而商业化前可比为 90–360x）反映收入成熟度；Mobileye 80%+ 软件毛利率验证 Nuro 目标经济性
      - - 'Pony.ai（NASDAQ: PONY，对手）'
        - 中国已商业化（robotaxi + robotruck）；美国测试中
        - Robotaxi 服务 + AV 软件授权
        - $4.6B IPO 后峰值（Nov 2024）；当前市值 ~$1.8B（May 2026）
        - ~80–90x EV/TTM 收入（$39.5M，9mo 2024）
        - 累计融资 ~$1.7B
        - 上市 L4 robotaxi 可比；Pony.ai 在中国已产生收入，说明 Nuro 的商业化前溢价在商业发布确认后应收窄；当前 $1.8B 市值提示 IPO 后失望风险
      - - 'WeRide（NASDAQ: WRD）'
        - 中国和中东已商业化；美国测试中；1,500+ 辆 L4 车辆
        - Robotaxi 与车队自动驾驶授权；7 国运营
        - IPO 估值 ~$4.7B（Oct 2024）；当前市值 ~$3B（May 2026）
        - ~90–130x EV/TTM 收入
        - 累计融资 ~$1.4B
        - 具备国际分散的上市 L4 可比；WeRide 在商业化规模下市值 $3B，低于 Nuro 商业化前 $6B，说明市场给 Nuro 的 Uber/NVIDIA 背书定了溢价
      - - Zoox（Amazon 子公司）
        - 商业化前：专用 robotaxi 原型车在 Las Vegas 和 SF 测试
        - 垂直整合 robotaxi 车队（自研专用车辆 + 技术栈）
        - ~$5–8B 估计（私有；Amazon 2020 年以 $3.2B 收购）
        - N/A（私有）
        - $3.2B 收购 + 大量 Amazon 内部投入
        - 私有可比；Zoox 2020 年 $3.2B 收购价低于 Nuro 当前 $6B——但 Zoox 的专用车辆限制了授权可选性，弱于 Nuro 与 OEM 无关的技术栈
    notes: 所有估值截至 May 2026 或最新可得时间。商业化前公司的收入倍数仅说明市场情绪，不是基本面估值锚。
    enumerationScope:
      coverage: partial
      basis: >
        Six most relevant public and private AV comparables selected from the universe of companies with disclosed
        valuations and structural overlap with Nuro's L4 robotaxi or software licensing model: Waymo (direct platform
        comp), Aurora (structural licensing comp), Mobileye (revenue-generating AV software comp), Pony.ai and WeRide
        (public L4 robotaxi IPO comps), and Zoox (private M&A floor comp). Excludes Cruise (GM write-down,
        discontinued), Motional (JV, uncertain status), and Embark/TuSimple (delisted or bankrupt). Partial coverage
        rationale: private comps beyond Zoox are not verifiable with public valuation data.
