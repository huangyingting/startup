        - B2B 模式在结构上让 Nuro 与按次票价竞争脱钩；近期定价风险在上游（若 Tesla 压低平台经济性，Uber 会挤压 Nuro 条款），而不是直接面向消费者的价格暴露
      - - Motional
        - 商业化前（未披露票价结构）
        - TBD——目标 2026 年 Las Vegas 无人驾驶商业上线；未公布票价
        - IONIQ 5 车队接入；Uber + Lyft 双平台派单集成；初期仅 Las Vegas
        - 所有商业票价和平台条款未披露；Uber/Lyft 收入分成安排未公开
        - 近期不是定价竞争对手；若 Motional 商业上线后票价低于 Waymo，会对平台经济性带来温和压力，但不会直接影响 Nuro B2B 授权定价
      - - May Mobility
