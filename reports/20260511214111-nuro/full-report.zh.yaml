      - number: '8.3'
        title: 情景分析：乐观、基准与悲观
        blocks:
          - type: paragraph
            body: >
              3 个情景框定 Nuro 2028 年估值范围，覆盖商业上线、车队规模和伙伴稳定性最可能的路径。每个情景都分配概率权重，识别所需关键假设，预测 2028 年隐含估值，并计算相对于 $6B Series E
              入场价的倍数。


              乐观情景（25% 概率）假设 Lucid Motors 保持偿付能力，并在 2028 年底前交付 50,000+ 辆车；CPUC Driverless Deployment Permit 在 2027 年 Q2
              前取得；Uber 到 2028 年末实现每月 500,000+ 次 Nuro 驱动乘车；Nuro 到 2027 年在 Lucid 之外向至少 1 家新增 OEM 伙伴授权其技术栈。在这些假设下，Nuro 2028
              年达到约 $500M+ ARR（授权费加 Uber 乘车收入分成），并可在 50x 远期 ARR 倍数下获得 $28B 估值，意味着 $6B 入场价对应 4.7x MOIC（投资资本倍数）。这一路径类似
              Aurora 在 2025–2026 年因商业上线进展而获得的市值重估。


              基准情景（50% 概率）假设 Lucid 重组但不申请破产；CPUC Driverless Deployment Permit 在 2027 年 Q3 前取得；到 2028 年底有 15,000
              辆车运营；Uber 推动每月 150,000+ 次 Nuro 乘车。2028 年收入达到约 $120M ARR，Nuro 以约 100x 远期 ARR 获得 $12B 估值——与公开 AV
              可比公司享有的溢价一致。这意味着 $6B 入场价对应 2.0x MOIC，低于典型风险投资回报门槛（3x+），但高于零，也符合 robotaxi 赛道仍处在早期商业爬坡阶段的状态。


              悲观情景（25% 概率）假设 Lucid Motors 破产，触发 12–24 个月平台迁移延迟；CPUC Driverless Deployment Permit 在 2028 年 Q1 前仍未到位；2028
              年底运营车辆少于 5,000 辆；Uber 转向 Waymo 和 Rivian，降低对 Nuro 的承诺。该情景下 2028 年收入接近零，Nuro 被迫进行桥轮或下调估值融资，估值为 $2.5B
              或更低——0.4x MOIC，代表资本毁损。这个情景并非纯粹猜测：第三方分析师估计，Lucid 在 2027 年前破产的市场隐含概率约为 50%，且没有公开文件显示 Nuro 有平台迁移应急计划。


              概率加权后的 2028 年预期估值为 (0.25 × $28B) + (0.50 × $12B) + (0.25 × $2.5B) = $7 + $6 + $0.625 = ~$13.6B，隐含概率加权 2.3x
              MOIC。该结果高于入场价，但低于机构成长股权基金通常要求的 3x+ 门槛。悲观情景中不对称下行（损失 60% 资本）几乎完全来自 Lucid 偿付能力风险，这是投资前最需要核实的单一尽调事项。
