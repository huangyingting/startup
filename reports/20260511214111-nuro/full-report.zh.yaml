  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱概览
        blocks:
          - type: paragraph
            body: >
              Nuro 的商业上线窗口很窄，并且受多重条件约束。6 类不同风险中的任何一类，都可能单独推迟或阻止付费 robotaxi 服务：（1）监管——2026 年 5 月取得 CPUC Drivered Pilot
              permit 后，California 仍有多项许可审批未完成；（2）法律——California AB 1777 于 2026 年 7 月生效后，监管可直接对 AV
              制造商开具企业罚单，单起严重事故带来的天价赔偿判决也可能威胁公司生存；（3）运营与网络安全——车队规模的网络攻击和传感器退化会带来服务中断和安全风险；（4）伙伴依赖——Lucid Motors 在 2027
              年前破产的市场隐含概率约为 50%，Uber 也已公开把 AV 供应商名单扩展到 Waymo、Avride 和 Rivian；（5）人员与执行——2022–2023 年重组裁掉约 950+ 个工程岗位，员工数从约
              1,200 降至约 250，持续存在人才流失风险；（6）财务模型——Nuro 未披露收入，并且还需 3 项额外监管批准才能收费。Risk Heatmap（FR001）按严重性和发生可能性映射了这 6
              个维度。整体风险姿态：监管和伙伴依赖两类的严重性—可能性组合得分最高；法律和网络安全的尾部风险最高，因为单一事件可能造成灾难性后果。
