  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界定义
        blocks:
          - type: paragraph
            body: >
              Nuro 的可服务市场位于三个相邻支出池的交叉处：Robotaxi 即服务（RaaS）、自动驾驶车辆（AV）软件授权，以及更广义的网约车 / 拼车市场——后者是 Nuro 试图替代的现状。纳入范围包括商业 AV
              载客服务的单次行程收入、汽车 OEM 和出行平台为 AV 软件及硬件集成支付的授权费和授权使用费，以及车队运营基础设施合同。不纳入范围包括个人车辆 AV 系统（ADAS、面向零售消费者销售的 L2-3
              功能）、非商业 AV 运营（研究、政府测试），以及 Nuro 不直接销售的车辆硬件制造成本（传感器、计算平台）。


              现状替代品是人类驾驶的网约车：2023 年全球拼车市场总预订额达到 $128B，其中美国贡献 $28.5B。这个基准就是 Nuro
              必须捕获或用来验证自己的需求池。相邻市场包括自动驾驶货运与物流（本章不纳入），以及车队车联网 / 管理服务（仅在直接支撑 Nuro-Lucid-Uber 部署时纳入）。Nuro 的授权模式意味着，直接收入来自
              OEM / 车队运营商层，而不是终端消费者车费——这是任何 SAM 估计都必须区分的市场边界。分段视图见 TM001。
