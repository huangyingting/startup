      - number: '1.2'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: >-
              Nuro 由两位联合创始人以双 CEO 架构领导，该架构在 October 2025 正式确立。联合创始人兼联合 CEO Jiajun Zhu 聚焦产品和技术；联合创始人兼联合 CEO Dave
              Ferguson（October 22, 2025 从总裁升任）负责资本与商业合作。两位联合创始人称，自在 Google 自动驾驶汽车项目相识以来，已密切共事超过 14 年。Zhu 的深厚工程背景与
              Ferguson 的商业和投资人关系能力互补，构成公司的领导力逻辑。其余高管包括首席运营官 Andrew Chapin，以及首席法务与政策官 James Owens；后者宣布了 May 2026 CPUC
              许可。关键人集中度偏高：两位联合创始人都是 Nuro 技术可信度、合作伙伴关系和投资人信心的核心。治理层面仍是私营公司状态；公司未公开披露独立董事，不过按标准 VC 惯例，SoftBank Vision
              Fund、Tiger Global、Greylock 和 T. Rowe Price 等投资方应持有董事或观察员席位。
