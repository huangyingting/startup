        - 委托独立比较 Nuro Driver 与 Waymo 技术栈的接管率和安全指标；获取 Nuro 的 DMV 接管报告和 CPUC 许可条件；验证 1.7M 无人驾驶英里是否足以支持 Lucid 车速下的开放域湾区部署
      - - Lucid-Uber 合作提供难以复制的 OEM-需求方排他入口
        - >-
          Uber 已确认多归属：同时与 Nuro、Zoox（2026 年夏 Las Vegas）、May Mobility（Arlington TX）和 Motional（Uber+Lyft）合作；若 Waymo
          提供授权，Uber 可能扩展到 Waymo 授权
        - 中
        - 12–36 个月——Uber 多归属行为已有记录且正在发生
        - 获取并审阅 Nuro-Uber 排他范围：确认 20K 辆 Lucid 车辆承诺是保证最低量还是愿景目标；确认任何排他条款的地理和时间范围； 评估 Uber 持有 Nuro 股权是否带来利益一致或合同锁定
      - - 0 起有责事故安全记录是持久的信任和监管护城河
        - 商业化后单次高关注安全事件就可能抹去信任溢价并触发监管审查；Nuro 从 25mph 配送机器人道路转向载人公共无人出租车
        - 高
        - 持续——风险随每一英里商业载客里程落地；商业上线后因乘客责任显著升高
        - 审查 Nuro 实时事故监控和远程操作协议；确认商业载客无人出租车保险覆盖；审查 CPUC 许可条件，包括事故报告和暂停触发条件； 评估当前安全记录反映的是配送机器人环境，还是乘用无人出租车场景
      - - 自动驾驶数据飞轮（1.7M 自有无人驾驶英里）提供持久长尾场景覆盖优势
        - Tesla 的 4M+ FSD 车辆以数量级更大规模生成有监督驾驶数据；即便每英里质量更低，纯体量也可能让 Tesla 跳过窄域护城河
        - 高
        - 当前——Tesla 的数据优势是结构性的且在扩大；Waymo 也以每周 500K 次乘车扩张
        - 量化 Nuro 无人驾驶专属长尾场景数据相对有监督 FSD 英里的优势，用于 L4 训练；评估 Nuro 的 AI 训练方法是否通过合成数据或仿真增强抵消数据集规模差距；确认 Nuro 拿到许可后的无人驾驶里程累积速度
      - - B2B 授权模式在结构上独特——没有竞争对手提供等价的 OEM 中立无人出租车技术栈授权产品
        - Waymo 发布授权产品（生存级威胁）；Mobileye 将 Sup-Scalaer 从芯片层扩展到全栈无人出租车授权；大型 OEM 自研自动驾驶技术栈，把 Nuro 移出供应链
        - 中
