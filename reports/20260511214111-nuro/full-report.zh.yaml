      - number: '5.4'
        title: 监管地位与安全合规
        blocks:
          - type: paragraph
            body: >
              以 Nuro 的体量看，公司已积累了相当有分量的监管记录。2020 年，Nuro 专用配送机器人 R2 获得 NHTSA 首个授予 AV
              制造商的联邦安全豁免——豁免对象是联邦机动车安全标准（FMVSS）中通常要求面向人类乘员配置踏板、后视镜等功能的条款。这是一个标志性监管信号：在其他 AV 公司拿到同类认定之前，Nuro
              已先与联邦安全监管机构建立可信度。R2 项目在 2022 年退役，Nuro 随后转向软件授权。


              在当前 robotaxi 项目中，Nuro 已获得：（1）2026 年 4 月的 California DMV Driverless Testing Permit，允许 Lucid Gravity 车辆在
              Santa Clara 和 San Mateo 两县公共道路上、最高 45 mph、无安全驾驶员测试；（2）2026 年 5 月的 CPUC Drivered Pilot
              Permit，允许在有安全驾驶员的情况下搭载乘客，用于验证。截至 2026 年 5 月，Nuro 尚未申请或获得商业无人驾驶收费服务所需的 California DMV Autonomous Vehicle
              Deployment Permit 或 CPUC Driverless Deployment Permit。California 目前只有 5 家公司同时持有 DMV 无人驾驶测试许可和 CPUC
              乘客许可，Nuro 因此进入了一个监管上的少数梯队。


              California DMV 的 2021 年接管数据（R2 退役前 Nuro 活跃无人驾驶测试的最近年份）显示，Nuro 配送车运营的接管率相对较低，符合其低速、地理围栏运营设计域。更广泛行业的 2022
              年数据则显示，所有 AV 公司接管中，26% 来自软件 / 硬件故障，35% 来自规划 / 定位错误，21% 来自感知问题；这些数据构成了评估 Nuro 技术表现的行业基准。


              计算安全方面，NVIDIA DRIVE AGX Thor 平台具备 ISO 26262 ASIL-D 认证和 ISO 21434 网络安全合规能力——这是最高汽车安全完整性等级，为 Nuro
              的监管申报提供硬件基础。Nuro 自动驾驶栈的安全架构包括并行回退栈、与 AI 模型并行运行的基于规则的校验器，以及在复杂场景中引入人工介入的远程运营层。


              重大监管风险仍在：商业运营所需的 California DMV 和 CPUC Driverless Deployment Permits 尚未提交或签发，也就是说，2026 年 Q4
              商业化上线时间取决于仍由监管机构酌定的审批；如果测试中发生安全事件，时间表可能被推迟。
