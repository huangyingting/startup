      - number: '8.2'
        title: 可比公司估值分析
        blocks:
          - type: paragraph
            body: >
              Nuro 的 $6B 估值，需要放在稀疏但正在增加的公开和私有 AV 可比公司集合中评估。Waymo 仍是最清晰的直接可比对象：2026 年 2 月 Alphabet 融资轮把 Waymo 估值定在
              $126B，支撑来自 5 个美国城市约 500K 次 / 周的乘车量，以及估计约 $350M 的年化收入运行率，隐含约 360x EV/revenue 倍数。这个倍数反映的是 Waymo
              作为主导自动驾驶出行平台的地位，拥有网络效应、监管护城河和 $16B+ 资本基础——这些 Nuro 目前都没有复制。在 $6B 估值下，Nuro 约为 Waymo 估值的
              1/21，体现出对商业化前状态和较小规模的大幅折价。投资者要判断的是，这个折价是否足够。


              Aurora Innovation（NASDAQ: AUR）提供了结构上最相近的授权模式。Aurora 在其 2024 年 10-K SEC 文件中报告确认收入为 $0，但已在 2025
              年推进到商业自动驾驶卡车运营；S&P Global 预计其收入到 2030 年可扩大至 $3.1B。Aurora 市值在 2026 年 5 月达到约 $14.2B，意味着一家早期商业化 AV
              软件公司享有显著远期收入溢价——绝对值上甚至高于 Nuro 的 $6B，尽管 Aurora 的卡车市场 TAM 更大，近期收入能见度也更强。Mobileye（NASDAQ:
              MBLY）是已有收入的可比对象：2025 年收入 $1.89B（同比 +15%）、2026 年 5 月市值 $7.8B、P/S 倍数约 4.1x。Mobileye 的经济性说明，高量级 AV 硬件 /
              软件授权在规模化后可以跑通，不过 Nuro 的纯软件模式在可比规模下应当获得更高利润率。


              中国 L4 运营商中，Pony.ai（NASDAQ: PONY）在 2024 年 11 月 IPO 后以约 $52M TTM 收入交易在 $4.6B 估值（隐含约 90x
              EV/revenue），WeRide（NASDAQ: WRD）则以估计 $15–25M 2024 年收入在约 $4.7B IPO 估值交易（隐含约
              90–130x）。这些可比公司确认，公开市场会给已有真实世界商业部署、但尚未规模化的 L4 运营商赋予很高远期倍数；不过 Pony.ai 和 WeRide 在商业收入确认上都比 Nuro
              更靠前。Zoox（Amazon 子公司，2020 年以 $3.2B 被收购）提供私有市场底线：考虑收购后 AV 市场增长，今天估值可能在 $5–8B，Nuro 更强的 OEM 和平台合作关系或可支撑溢价。


              综合可比分析支持 Nuro 的公允价值区间为 $4–8B，$6B 落在区间内。关键估值风险在于，可比公司几乎都在为未来执行定价——没有一个对 Nuro 面临的具体 Lucid、Uber
              和监管风险给出风险调整折扣。
