      - number: '4.5'
        title: 财务透明度与证据缺口
        blocks:
          - type: paragraph
            body: >
              Nuro 是私营公司，不向 SEC 提交年度报告（Form 10-K）或重大事件报告（Form 8-K）。其财务报表、管理账目、烧钱速度、现金余额、收入、毛利率和股权结构表完全不公开。California
              Public Utilities Commission 许可和 California DMV 无人驾驶测试许可为 Nuro 的运营进展提供监管证据，但不提供财务披露。评估 Nuro
              财务健康状况的可信代理只有：（a）由裁员公告推导的基于员工数的烧钱估计；（b）新闻稿和投资方公告中的融资轮数据；（c）D 轮和 E 轮定价隐含的估值标记；（d）公开报道的商业交易结构（Uber
              车队承诺、Lucid
              集成）。这些代理带有重大不确定性：基于员工数的烧钱估计会漏掉基础设施资本支出和非人员成本；私募轮估值标记不代表流动性公允价值；商业交易结构含有未披露条款。缺少公开财务报表，使得没有保密数据室访问时，无法对
              Nuro 做完整投资测算。关键财务尽调阻碍包括：（1）Nuro 截至 Q1–Q2 2026 的实际现金位置和月度烧钱；（2）Uber 附条件投资批次的确切条款和规模；（3）Nuro-Lucid-Uber
              协议下按车辆或按英里的授权费表；（4）多年期授权合同的收入确认政策；（5）Nuro 股权结构表，包括 SoftBank 当前残余持股，以及可能使普通股劣后的任何清算优先权。联合创始人在 2023
              承认规模化单位经济性不利，是公开记录中最重要的反向财务信号；不过授权模式转向在结构上就是为了解决这些资本强度驱动因素。
