      - number: '3.3'
        title: 定价与商业模式
        blocks:
          - type: paragraph
            body: >
              截至 mid-2026，Robotaxi 定价格局跨度很大，模式结构也不同。Waymo 在 San Francisco 每程约收 $15–20（平均约 $19.69），与 Uber 平均约 $17.47、Lyft
              约 $15.47 的差距正在收窄；短途城市行程差距最小。Tesla Austin Cybercab 试点的 $4.20 固定车费，是公开引用中最低的 Robotaxi 价格——可能由 Tesla
              的车辆制造规模野心和 $30,000 目标车价补贴——由此形成消费者价格锚点，即便该试点价格本身未必经济可持续，竞争平台也必须回应。


              Nuro 的定价模式与面向消费者的单程价格在结构上脱钩。Nuro 是 B2B 技术授权方：它向 Lucid Motors 收取单车集成费（具体条款未披露），用于在产线嵌入 Nuro Driver
              软件栈；同时从作为车队运营商和需求平台的 Uber 获得收入分成或授权使用费付款——同样未披露。Nuro 不设定消费者车费；被授权方 Uber 负责定价，并与 Waymo 和 Tesla 竞争。Nuro
              的关键定价风险是间接的：如果 Tesla 的 $4.20/ride 定价把消费者车费预期锚定在显著低于 Waymo $19.69 的位置，Uber 将面临压低单程经济性的压力，进而可能向 Nuro
              要求更低授权条款，或提高自研 AV 替代方案的动力。Nuro 未公开披露单车授权费和收入分成结构，外部无法独立验证 Nuro 的授权经济性在所需车队规模下是否可行。
