            title: 纯软件架构支持不绑定 OEM 的规模化授权
            body: >-
              Nuro 刻意把 Nuro Driver 软件栈与任何自有车辆底盘拆开，使自己定位为平台授权方，而不是一体化车队运营商。这种架构允许同一套软件部署到多个车辆平台（当前是 Lucid
              Gravity，未来可扩展到更多 OEM），相较 Waymo 垂直整合路线，在毛利率可扩展性上结构更优。
