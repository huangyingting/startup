      - number: '7.3'
        title: 运营与网络安全风险
        blocks:
          - type: paragraph
            body: >
              Nuro 的 AV 栈通过学习型端到端神经架构（Nuro Autonomy Model，NAM）融合摄像头、LiDAR 和成像雷达。任何单一传感器退化或对抗扰动，都可能触发 L4
              接管并回退到远程操作员控制，直接影响服务质量和行程完成率。NAM 依赖学习得来的场景表征，会引入一类对抗贴片攻击，而 ISO 21434 或传统汽车网络安全框架并未覆盖这类风险。NHTSA
              事故数据显示，2022–2024 报告期内有 392 起 Level 2+ 事故，其中 17% 涉及伤害；扩展到完全无人驾驶 L4 部署后，即便每英里事故率低于人类驾驶基准，绝对事故数量也会上升。


              Upstream.auto 的 2026 Global Automotive Cybersecurity Report 把车队规模漏洞列为决定性威胁：61%
              的联网车辆安全事件有可能同时影响数千到数百万辆车，勒索事件同比翻倍，占全部事件的 44%。对 Nuro 来说，只要其云端车队管理后端被成功攻破一次，Bay Area
              车队中的所有车辆都可能同时被禁用或操纵。Nuro 尚未公开发布网络安全框架、SOC-2 认证或渗透测试状态。


              NVIDIA DRIVE AGX Thor 是 Nuro 唯一确认的计算平台。NVIDIA 供应受限或出口限制（对先进芯片有历史相关性）会直接推迟车队扩张，因为没有公开验证过替代计算平台。Hertz/Oro
              Mobility 的车队管理角色形成间接在线率依赖：如果出现类似 Hertz 2024 年 Uber EV 维护召回的质量问题，Nuro 的服务记录和安全指标会恶化，而 Nuro 对车队没有直接整改权。
            claimRefs:
