      - number: '1.5'
        title: 当前合作与监管进展（2026）
        blocks:
          - type: paragraph
            body: >-
              Nuro 的旗舰商业关系是与 Lucid Motors 和 Uber Technologies 的三方合作，最早于 July 2025 宣布，并在 April 2026 前后大幅扩展。Uber 已承诺向
              Lucid 投入 $500 million（持有这家 EV 制造商约 11.5%），并把车队承诺从 20,000 辆扩大到至少 35,000 辆接入 Nuro Driver 的 Lucid Gravity
              SUV，计划六年内投放到数十个美国和国际市场。Nuro 负责自动驾驶开发和验证；Lucid 在 Arizona Casa Grande 工厂集成 AV 硬件；Uber
              通过自己的平台独家持有、运营和调度车队。带安全员的自动驾驶道路测试已于 December 2025 在多个美国城市启动；到 April 2026，部分 Uber 员工已可在 Bay Area 通过 Uber
              app 测试服务。California 的监管进展按顺序推进：California DMV 无人驾驶测试许可（April 2026）、CPUC 载安全员试点许可（May 8,
              2026）。在付费商业无人驾驶行程落地前，仍需跨过 California DMV 部署许可和 CPUC 无人驾驶网约车许可两道门槛——截至运行日期，两者均未提交申请。商业发布目标仍是 late 2026，在
              San Francisco Bay Area。
