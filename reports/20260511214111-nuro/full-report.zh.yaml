      - number: '6.3'
        title: 2018–2022 年历史配送客户
        blocks:
          - type: paragraph
            body: >-
              在 2023 年战略转向之前，Nuro 运营的是垂直整合的自动驾驶配送服务，并拥有一组有名有姓的零售和物流客户。Nuro 首个商业部署是与 Kroger 的生鲜配送合作，2018 年在 Arizona 州
              Scottsdale 使用 R1 小车启动。2019 年，合作扩展到 Texas 州 Houston；Nuro 后来在 2022 年 1 月升级到商业级
              R2（第三代车辆），并完成公司所称的“数万次”配送。Walmart 也在 Greater Houston 区域与 Nuro 运营平行的自动驾驶配送项目，Houston Clean Cities
              将其作为创新最后一公里物流的代表案例。Nuro 的配送组合还包括在 Dallas–Fort Worth 区域试点包裹配送的 FedEx，以及便利店配送客户 7-Eleven。Harvard Business
              School Digital Initiative 案例研究记录了这个多伙伴网络，但也指出运营仍停留在试点规模，每个伙伴只覆盖少数 ZIP codes，且没有披露收入。2023 年 5 月，Nuro
              宣布全面暂停所有商业配送运营，作为重组的一部分；该重组还包括约 340 名额外裁员，原因是高利率环境下扩张自有车队的资本强度过高。配送时期客户没有出现在 Nuro 当前 robotaxi
              商业化叙事中，说明客户基础已经彻底重置。配送时期证明了商业 AV 运营的概念可行性，也积累了监管善意——尤其是 Nuro 2020 年获得 R2 的 NHTSA
              豁免——但没有建立持久商业关系、经常性收入，或配送即服务模式下的盈利路径。
