      - number: '1.3'
        title: 融资历史与投资方图谱
        blocks:
          - type: paragraph
            body: >-
              自 2016 以来，Nuro 五轮融资合计超过 $2.3 billion，是 Waymo 之外资本化程度最高的自动驾驶车辆创业公司之一。早期资本来自 SoftBank Vision Fund（2017 A 轮
              $92M，2018 B 轮 $500M），也奠定了公司的大规模野心。2019 C 轮融资 $940M，公司估值 $2.7B，并引入更多成长型投资者。2021 由 Tiger Global 领投的 $600M D
              轮，把估值推至 $8.6B 峰值，正值 AV 技术估值周期高点。最近一轮 E 轮于 August 2025 完成，融资 $203M，投后估值 $6B——较 2021 峰值下降 30%，反映行业整体重估和 Nuro
              自身运营挑战。E 轮引入了两个战略意义很强的投资方：Uber Technologies 和 Nvidia（两者在长期运营合作之后首次成为股权投资人），同时 Baillie Gifford、T. Rowe
              Price、Fidelity、Tiger Global、Greylock Partners 等机构继续跟投，Icehouse Ventures、Kindred Ventures 和 Pledge Ventures
              新进入。Uber 的投资部分附带里程碑条件——与商业部署目标挂钩——由此形成一致激励。Nvidia 的股权进一步加深了既有计算合作：Nuro 运行在 NVIDIA DRIVE AGX Thor 硬件上，并使用
              Nvidia GPU 做大规模模型训练。
