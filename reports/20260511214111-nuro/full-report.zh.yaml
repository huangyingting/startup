      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              Robotaxi 市场受正反两股力量塑形。驱动侧：AV 技术成本曲线正在下行——Goldman Sachs 预计到 2035 年成本低于 $1/mile，成熟 AV 车队预计可做到
              $0.30-$0.50/mile，而当下人类网约车为 $2.50-$4.00/mile。California 的多阶段 AV 许可框架（April 28, 2026 采纳）首次给出监管清晰度，为轻型 AV 建立
              3 阶段流程，每阶段要求 50,000 自动驾驶英里。Uber 既有平台规模（13.5B trips/year，美国拼车份额 72%）提供了需求聚合，对 Nuro 车队的经济化启动至关重要。Waymo
              的轨迹——May 2024 至 March 2026 期间，每周付费行程从 50,000 增至 500,000，增长 10x，并以 $126B 估值融资 $16B——验证了商业 Robotaxi
              经济性，也提供了市场接受度参照点。


              约束侧：消费者信任仍然很棘手。AAA 的 February 2025 调查显示，60% 美国人害怕 AV，53% 不愿乘坐 Robotaxi；只有 13% 信任它们。FinanceBuzz 2026
              数据虽显示改善（37% 愿意乘坐，高于 2018 年 21%，Gen Z 舒适度 51%），但多数人恐惧的格局把近期可服务市场限制在技术友好的早期采用者。AV 安全事件量在上升——NHTSA 记录截至 2025
              年共有 6,450 起 AV 事件，同比增加 51%——尽管 ADS 导致的死亡仍罕见（2 起确认）。Gridwise 2026 数据显示，AV 部署已造成竞争性替代：有 AV 运营城市的每小时行程下降
              5.3%，全国为 2.6%。监管路径在商业无人驾驶许可可达成前，每阶段还要增加 18-24+ 个月；与人类网约车的每英里成本持平预计要到 2040-2041。Uber-Rivian
              交易（$1.25B，基于里程碑，2031 年 50,000 辆）说明竞争资本投入强烈，会压缩定价，并抬高 Nuro 部署时间表的门槛。完整驱动 / 约束清单见 TM004；FM004 展示部署价值链。
