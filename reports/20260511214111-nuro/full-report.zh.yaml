      - number: '5.2'
        title: 技术架构与计算栈
        blocks:
          - type: paragraph
            body: >
              Nuro Driver 软件栈按 6 个功能层组织：地图与定位、感知、预测、规划与控制、安全与冗余，以及远程运营。整套栈以 AI
              为先，关键的感知和预测层由深度学习模型主导，而不是只靠规则系统；基于规则的校验器并行运行，作为安全兜底，用来捕捉模型失效。


              地图与定位结合两类能力：由测绘车辆预先生成的高精地图（HD maps），以及实时传感器融合，车辆定位精度可达厘米级。感知层融合 4 类摄像头数据（超远距 30° FOV、长距、短距，以及带 24-bit HDR
              的交通灯检测摄像头）、固态 LiDAR（长距与短距；相比上一代旋转式方案没有运动部件）、高分辨率长距成像雷达、达到 ASIL-D 的校准 IMU，以及用于识别紧急车辆警笛的麦克风。所有传感器都覆盖 360
              度，分布在车身各处，并集成进 Lucid Gravity 上一个紧凑、低矮的 “halo” 车顶模块。


              预测层使用由数亿个驾驶样本训练出的 ML
              模型，预判周边车辆、行人、骑行者和其他道路参与者的轨迹与意图。规划层接收感知和预测输出，生成安全、舒适且符合法规的行驶轨迹；环境变化时，系统会实时重新评估并重新规划。控制层把规划轨迹转成转向、油门和制动指令，并通过三重冗余车辆接口硬件提升容错能力。


              整套栈运行在 NVIDIA DRIVE AGX Thor 集中式计算平台上。该平台使用 Blackwell 架构 GPU、Arm Neoverse V3AE CPUs、64 GB LPDDR5X RAM（273
              GB/s 带宽），最高可提供 2,000 TOPS（FP4）或 1,000 INT8 TOPS，并具备 ISO 26262 ASIL-D 安全认证。DRIVE AGX Thor 随附 NVIDIA DRIVE
              OS 7（基于 QNX 的安全内核）、DriveWorks 中间件和 TensorRT 10 推理运行时。它取代上一代 DRIVE Orin（254 INT8 TOPS），AI 推理性能约提升 4×。Nuro
              还与 Arm 保持多年合作，在 Arm 的 Automotive Enhanced（AE）架构上优化 Nuro Driver，提高能效并支持量产级部署。Lenovo 也宣布与 Nuro 合作，在 NVIDIA
              DRIVE 平台上加速 Nuro Driver 开发，面向车队规模部署。
