  - id: FR001
    title: 风险热力图——严重程度与发生可能性
    type: matrix
    layout: wide
    description: |
      Nuro 主要风险类别的热力图，按严重程度（行）和发生可能性（列）映射。每个单元格列出该严重程度—发生可能性象限中的具体风险驱动因素。关键且高概率风险位于右上角；轻微且低概率风险位于左下角。
    summary: |
      监管许可缺口与地域集中落在高可能性 / 高严重程度象限；Lucid 资不抵债与 Uber 下调 Nuro 优先级处于中高可能性 / 关键严重程度区间；核弹级判决风险发生可能性低，但严重程度为关键。
    data:
      columns:
        - 低可能性
        - 中等可能性
        - 高可能性
      rows:
        - label: 关键严重程度
          values:
            - 产品责任核弹级判决（单起 AV 事故）
            - Lucid 资不抵债导致车辆平台消失；未披露备用 OEM
            - Uber 在 SF Bay Area 转向优先 Waymo / Rivian，降低 Nuro 优先级
        - label: 高严重程度
          values:
            - NVIDIA 供给受限卡住车队规模化；存在 FMVSS 不合规风险
            - 车队级网络攻击利用；传感器退化；Hertz 维护失效
            - CPUC / DMV 许可缺口推迟商业上线；AB 1777 直接罚单；AV 人才流失
        - label: 中等严重程度
          values:
            - 未上报事故触发 NHTSA 召回义务
            - 联席 CEO 治理摩擦；CCPA ADMT 审计不合规
            - SF Bay Area 地域集中；单一市场监管停摆
        - label: 低严重程度
          values:
            - Waymo v. Uber 式 IP 纠纷（Nuro 为被告）
            - 从配送转向 Robotaxi 的文化摩擦
            - ODD 规格内的轻微传感器质量问题
        - label: 信息项
          values:
            - NHTSA Waymo 调查先例（2025 年结案——无违规）
            - Forensisgroup / 商业秘密风险框架（2018 年先例）
            - NHTSA STEP 自愿报告计划（事实上的合规预期）
    approximationNotes: 严重程度和发生可能性是基于截至 2026 年 5 月公开可得的监管文件、财务数据和行业报告做出的定性专家评估。未采用定量概率模型；单元格反映章节作者的风险判断。
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR024
      - CR026
      - CR027
  - id: FR002
    title: 风险传导图——级联风险路径
    type: dag
    layout: wide
    description: |
      有向图展示高严重程度风险事件如何沿 Nuro 商业系统传导。箭头表示因果或条件依赖（A → B 表示「A 提高 B 的发生概率」）。多条路径汇聚到收入缺口，说明结构韧性不足。
    summary: |
      Lucid 资不抵债、监管安全暂停令和成功网络攻击，都会通过不同路径独立传导到同一结果——Nuro 的收入缺口，凸显缺少多元商业后手。
    data:
      nodes:
        - id: RN01
          label: Lucid 资不抵债
          description: Lucid Motors 申请 Chapter 11 破产保护，或错过车辆交付里程碑
        - id: RN02
          label: 车辆供应停摆
          description: 没有 Lucid Gravity SUV 可用于集成 Nuro 技术栈
        - id: RN03
          label: 车队规模化失败
          description: Nuro 无法为 Bay Area 商业服务部署车辆
        - id: RN04
          label: Uber 降低优先级
          description: Uber 将 SF 上线转向 Rivian 或 Waymo 技术栈
        - id: RN05
          label: 收入缺口
          description: 2028 年前没有按英里计费许可收入或网约车收入
        - id: RN06
          label: 监管延误 / 暂停令
          description: CPUC 或 DMV 拒发许可，或下达运营停止令
        - id: RN07
          label: 安全事故
          description: 严重事故触发 NHTSA / CPUC 调查和公众审视
        - id: RN08
          label: 针对车队的网络攻击
          description: 车队级勒索软件或 API 漏洞利用导致 Bay Area 车辆瘫痪
      edges:
        - from: RN01
          to: RN02
          label: 移除平台供给
        - from: RN02
          to: RN03
          label: 阻止车队部署
        - from: RN03
          to: RN05
          label: 没有乘车量，也没有许可收入
        - from: RN04
          to: RN05
          label: Nuro 失去 Uber 平台
        - from: RN06
          to: RN03
          label: 叫停商业运营
        - from: RN07
          to: RN06
          label: 触发 CPUC 安全审查 / 暂停令
        - from: RN07
          to: RN04
          label: 事故后 Uber 退出 Nuro 合作
        - from: RN08
          to: RN07
          label: 网络攻击导致或诱发安全事件
    claimRefs:
      - CR023
      - CR024
      - CR040
  - id: FR003
    title: 合作伙伴依赖图——商业栈相互依赖
    type: dag
    layout: wide
    description: |
      Nuro Robotaxi 商业栈的有向依赖图。每条箭头代表供应、服务或合同依赖关系。该图显示 Nuro 位于中心位置，且每条依赖链路都缺少冗余。
    summary: |
      Nuro 位于五节点商业链中心，在车辆供应（Lucid）、需求聚合（Uber）、车队运营（Hertz / Oro）和计算硬件（NVIDIA）上都没有冗余路径。任何商业收入流入之前，监管批准（CPUC / DMV）都是外部闸门。
    data:
      nodes:
        - id: DN01
          label: Nuro AV 技术栈
          description: Nuro Driver 软件 + 传感器集成——核心商业资产
        - id: DN02
          label: Lucid Motors
          description: Gravity SUV 平台；工厂级传感器集成；唯一 OEM
        - id: DN03
          label: NVIDIA DRIVE AGX
          description: 车载计算；Nuro 技术栈唯一已确认平台
        - id: DN04
          label: Uber Technologies
          description: 预订平台；需求聚合；商业分发
        - id: DN05
          label: Hertz / Oro Mobility
          description: 车队场站：充电、维护、清洁
        - id: DN06
          label: CPUC / CA DMV
          description: 监管闸门：需要 Driverless Deployment Permit
        - id: DN07
          label: Bay Area ODD
          description: 唯一运营地理范围；全部商业收入面临风险
        - id: DN08
          label: 终端乘客
          description: 通过 Uber app 预约 Nuro 技术驱动行程的消费者
      edges:
        - from: DN02
          to: DN01
          label: 提供车辆平台
        - from: DN03
          to: DN01
          label: 提供计算硬件
        - from: DN01
          to: DN04
          label: 向其授权 AV 技术栈
        - from: DN05
          to: DN04
          label: 为其提供车队运营
        - from: DN06
          to: DN07
          label: 批准其在此商业运营
        - from: DN04
          to: DN07
          label: 在此部署服务
        - from: DN07
          to: DN08
          label: 向其提供行程
        - from: DN02
          to: DN05
          label: 将车辆送往维护方
    claimRefs:
      - CR023
      - CR026
      - CR029
  - id: FV001
    type: flow
    title: 推荐逻辑
    description: |
      从五大核心证据支柱出发，穿过投资逻辑风险，最后抵达 Nuro 在 $6B 估值下的有条件投资建议。支撑节点强化买入逻辑；风险节点列出必须解决的条件。
    data:
      nodes:
        - id: N1
          label: 巨大且增长中的 TAM
          description: >-
            Fortune BI 数据显示，Robotaxi 市场从 2026 年 $1.27B 增至 2034 年 $96.31B，CAGR 71.9%；到 2030–2035 年，AV 软件许可年经常性收入（ARR）潜力为
            $4–10B
        - id: N2
          label: 差异化软件栈
          description: >-
            Nuro Driver L4 AV 技术栈运行在 NVIDIA DRIVE AGX Thor 上；400+ 项专利；Google Brain 创始人 Dave Ferguson 和 Jiajun Zhu；1.4M+
            自动驾驶测试英里
        - id: N3
          label: Uber 需求平台锚点
          description: Uber 是 Series E 战略股权持有人；承诺在 SF Bay Area 部署 Robotaxi；有保障需求降低上线量风险
        - id: N4
          label: Waymo 可比先例
          description: Waymo 在 $350M ARR 下估值 $126B，意味着市场领先 AV 平台可拿到 360x 倍数；Nuro $6B 估值仅为 Waymo 的 1/21——前商业化阶段享受深度折价，上线后折价可能迅速收敛
        - id: N5
          label: 执行与偿付能力风险
          description: Lucid Motors 2027 年破产概率约 50%；还需要 2 个 CPUC 许可；Uber 已确认多源策略；未披露 ARR；已融资 $2.7B 但仍处于商业化前
        - id: N6
          label: $6B 估值下有条件买入
          description: >-
            建议：在以下条件成立时有条件买入：（a）Lucid 偿付能力得到确认，（b）CPUC Driverless 许可按计划在 2027 年 H1 推进，（c）Uber 最低量条款得到验证；按概率加权的 2028 年估值约
            $13.6B（约 2.3x MOIC）
      edges:
        - from: N1
          to: N6
          label: 支撑
        - from: N2
          to: N6
          label: 支撑
        - from: N3
          to: N6
          label: 支撑
        - from: N4
          to: N6
          label: 支撑
        - from: N5
          to: N6
          label: 风险——必须解决
    claimRefs:
      - CV001
      - CV009
      - CV010
      - CV018
      - CV030
  - id: FV002
    type: bar
    title: 估值敏感性
    description: |
      Nuro 隐含估值对三种情景下关键驱动因素的敏感性：车队规模（已部署车辆）、达到的收入运行率和适用的远期收入倍数。所有数值均为 2028E 隐含估值，单位 $B。悲观 / 基准 / 乐观情景假设见 TV003。
    approximationNotes: |
      所有估计均为分析师基于公开可比倍数和 Nuro 已宣布商业里程碑作出的推断。没有可用的 Nuro 审计财务数据。收入倍数基于 Aurora、Pony.ai 和 Mobileye 上市可比公司。
    data:
      items:
        - label: 悲观情景（2028）：<5K 辆车，ARR 近零，Lucid 失败
          value: 2.5
          unit: $B
          notes: $6B 进入价对应 0.4x MOIC；由 Lucid 资不抵债和 CPUC 延误驱动；仅剩残余 IP 价值
        - label: 基准情景（2028）：15K 辆车，~$120M ARR，100x 远期倍数
          value: 12
          unit: $B
          notes: $6B 进入价对应 2.0x MOIC；Lucid 重组但存活；CPUC 许可在 2027 年 Q3 落地
        - label: 乐观情景（2028）：50K+ 辆车，~$500M ARR，56x 远期倍数
          value: 28
          unit: $B
          notes: $6B 进入价对应 4.7x MOIC；Uber 完整爬坡，新增 OEM 获得许可，Lucid 保持偿付能力
        - label: 概率加权预期价值（2028）
          value: 13.6
          unit: $B
          notes: 0.25×$28B + 0.50×$12B + 0.25×$2.5B = $13.6B；~2.3x MOIC；低于典型 3x+ 风险投资目标
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV031
  - id: FV003
    type: range
    title: 估值回报区间
    description: |
      Nuro 在关键时间点的乐观 / 基准 / 悲观估值区间，以及 $6B Series E 进入价隐含的回报。远期估计基于上市 AV 可比公司的倍数和 Nuro 已宣布商业里程碑。
    approximationNotes: >
      仅为远期估计；没有 Nuro 审计财务数据。基于市场可比公司（Aurora、Mobileye、Pony.ai、WeRide、Waymo）以及 Nuro 已宣布的 35K–50K+ 辆车 Uber / Lucid
      商业计划。概率为分析师推断，不是精算估计。
    data:
      items:
        - label: 2027E 隐含估值
          low: 4
          base: 8
          high: 15
          unit: $B
          notes: 2027 年估值高度取决于 CPUC Driverless 许可时点和首笔商业收入确认
        - label: 2028E 隐含估值
          low: 2.5
          base: 12
          high: 28
          unit: $B
          notes: 悲观：Lucid 失败；基准：15K 辆车，$120M ARR；乐观：50K+ 辆车，$500M ARR
        - label: 2030E 隐含估值
          low: 1.5
          base: 20
          high: 50
          unit: $B
          notes: 2030 年包含潜在 IPO 窗口；Aurora 2030 年收入预测 $3.1B 用作规模参照
        - label: $6B 进入价回报（2028E）
          low: -0.6
          base: 1.5
          high: 4
          unit: x MOIC
          notes: 悲观情景中，down-round 优先权重排导致 MOIC 为负；基准约 2.0x；乐观约 4.7x
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV031
  - id: FV004
    type: kpi
    title: 投资 KPI
    description: |
      面向投委会的 Nuro $6B Series E 核心投资指标摘要。整合估值背景、市场定位、竞争基准和证据质量。
    data:
      items:
        - label: 当前估值（Series E，2025 年 8 月）
          value: 6
          unit: $B
          notes: 投后估值；较 $8.6B Series D 峰值低 30%；Series E 融资 $203M
          claimRefs:
            - CV001
        - label: 累计融资（全部轮次）
          value: 2.7
          unit: $B
          notes: 融资历程：Seed $7M（2016）、Series A $92M（2018）、Series B $940M（2019）、Series D $600M（2021）、Series E $203M（2025）
          claimRefs:
            - CV002
        - label: Waymo 可比估值（2026 年 2 月）
          value: 126
          unit: $B
          notes: 最直接可比；Nuro 仅为 Waymo 的 1/21；Waymo 融资 $16B+，Nuro 为 $2.7B
          claimRefs:
            - CV010
        - label: 2034E Robotaxi 市场（Fortune BI）
          value: 96.31
          unit: $B
          notes: 全球可寻址市场；自 2026 年 $1.27B 起 CAGR 71.9%；主要 TAM 锚点
          claimRefs:
            - CV018
        - label: 概率加权 2028 年估值
          value: 13.6
          unit: $B
          notes: 0.25×$28B + 0.50×$12B + 0.25×$2.5B = ~$13.6B；$6B 进入价约 2.3x MOIC
          claimRefs:
            - CV031
        - label: Aurora Innovation 市值（2026 年 5 月）
          value: 14.2
          unit: $B
          notes: Nuro 许可模式的最佳结构性可比；尽管同样起步于商业化前阶段，Aurora 市值高于 Nuro
          claimRefs:
            - CV012
    claimRefs:
      - CV001
      - CV002
      - CV010
      - CV012
      - CV018
      - CV031
