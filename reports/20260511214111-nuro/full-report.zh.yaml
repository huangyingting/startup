      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              Robotaxi TAM 没有共识估计。四个可信分析师视角给出的 2035 终值跨度达 1,500x：Fortune Business Insights 预测 $96.31B（CAGR 71.9%）、Expert
              Market Research 为 $86.21B（CAGR 78%）、Cervicorn Consulting 为 $283.47B（CAGR 59.4%），Goldman Sachs 约
              $400B——这些都投射到 2034-2035。分歧来自不同的起始年份市场规模（2025 年 $0.27B 至 $2.68B）、地理范围，以及估计口径是完整行程价值（RaaS）还是仅技术授权层。Goldman
              Sachs 还预测整个 AV 板块规模为 $2T，其中 $300B 来自 AI 驱动收入，给出了最宽的宏观语境。


              AV 软件授权市场（Nuro 的直接收入模式）是一个独立且更小的细分。Precedence Research 估计该市场从 2025 年 $2.30B 增至 2035 年 $8.04B，CAGR
              13.33%——爆发性较弱，但更直接对应 Nuro 的授权经济性。North America 约占 Robotaxi 市场份额 37%，意味着到 2035 年 North America 的 SAM 区间为
              $31-148B，取决于采用哪一种 TAM 估计。L4 自动驾驶占全球商业部署 91%，EV 占车队 68%，两者都与 Nuro 的 Lucid Gravity 平台定位一致。分析师来源给出的美国专项估计为：仅
              Robotaxi 服务从 2026 年 $18.27B 增至 2030 年 $40B+。由于 Nuro 未披露授权费，Nuro 自身 SOM 无法量化；规模图谱的视觉语境见 FM001 和
              FM002，多来源对比见 TM002。
