      - number: '6.4'
        title: 消费者采用与乘客满意度基准
        blocks:
          - type: paragraph
            body: >-
              Nuro 尚未推出付费 robotaxi 服务，因此没有自己的公开消费者满意度或留存数据。本节用 3 类代理证据交叉判断：Waymo 运营基准（最接近且已公开运营的 AV 可比对象）、美国消费者对 AV
              乘坐意愿的一般调查，以及能说明可触达采用曲线的人口结构拆分。Waymo 报告称，到 2025 年底每周约有 500,000 次付费乘车，2025 年全年完成 14 million 次付费乘车，生命周期累计超过
              20 million 次——这是 robotaxi 赛道“商业规模”长什么样的第一个可信数据点。Waymo 的乘客满意度指标非常强：服务平均乘客评分保持在 4.8–4.9 星，ZipDo 汇总的行业数据暗示，在
              San Francisco 和 Phoenix 核心市场，30 天复乘率超过 60%。相比之下，宏观消费者调查显示结构性阻力仍在：AAA 2025 年 2 月调查发现，53%
              的美国成年人不愿乘坐自动驾驶车辆，60% 表示在自动驾驶车辆内或附近会感到害怕——尽管信任水平同比从 9% 升至 13%。FinanceBuzz 2026 年数据把美国总体乘坐意愿放在 37%（2018 年为
              21%），且代际差异明显：Gen Z 为 51%，Baby Boomers 为 18%。S&P Global Mobility 2025 年数据记录到，美国消费者信任度同比提高 12 个百分点，与 Waymo
              公共能见度提升相关。Deloitte 2026 Global Automotive Consumer Study 显示，美国 AV 兴趣在全球处于最低梯队，明显落后 India、China 和 Southeast
              Asia。SingularityHub 2026 年 2 月报道称，Waymo 定价正在接近 Uber/Lyft 平价，越来越多乘客表达出相较人工驾驶网约车更偏好 Waymo——这是早期留存动态的信号。Nuro
              的 Uber robotaxi 将在 Bay Area 直接与 Waymo 既有存在竞争，这既提供验证环境，也带来采用基准无法消解的竞争强度风险。
