  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              截至 mid-2026，与 Nuro 技术授权方定位有关的 AV 自动驾驶格局可分为四个竞争层级。第一层（规模化 Robotaxi 运营商）：Waymo 独自处于商业品类领导者位置，在 February 2026
              以 $126B 估值融资 $16B 后，已在六个美国城市每周运营 500K+ 付费行程，累计 127M+ 自动驾驶英里，严重伤害事故较人类驾驶下降 90%。Tesla 于 2026 在 Austin 以
              Cybercab 进入商业 Robotaxi 市场，单次行程固定 $4.20，背后是 April 2026 开始在 Gigafactory Texas 的量产；但 Tesla
              的纯摄像头架构和有限监管覆盖约束了近期规模。第二层（扩张中的挑战者）：Amazon 支持的 Zoox 在 Las Vegas 和 San Francisco 推出免费、等同商业服务的试点行程，累计近 2M
              自动驾驶英里，服务 350K+ 乘客，仍在等待 NHTSA Part 555 豁免以收取商业车费；Zoox-Uber Las Vegas 集成目标为 summer
              2026。Motional（Hyundai-Aptiv JV，已投入约 $4B）于 October 2024 暂停 San Francisco 运营，正以 AI 优先基础模型路线重整，目标是在 2026 于
              Las Vegas 推出无人驾驶商业服务。第三层（特定场景运营商）：Aurora Innovation 于 April 2025 在 Dallas-Houston I-45 走廊商业推出无人驾驶 Class 8
              卡车——美国首个商业无人驾驶长途货运运营——并计划到 late 2025 扩展至 El Paso 和 Phoenix，下一代硬件配备 1,000-meter 激光雷达；Aurora 是卡车专家，不是近期
              Robotaxi 竞争者。第四层（相邻平台与软件供应商）：Mobileye（NYSE: MBLY，2025 收入 $1.894B）领先 ADAS 芯片和软件市场，并借 Zeekr Robotaxi 在 China
              部署及 Volkswagen 合作向完整 L4 迈进。May Mobility 融资 $387M+，并与 Uber 合作在 Arlington TX 部署地理围栏公交 AV。Pony.ai（NASDAQ:
              PONY）和 WeRide（NASDAQ: WRD）在 2025 完成美国 - 香港双重上市，但美国商业 AV 运营面临监管障碍。


              对 Nuro 的竞争含义因层级而异：Waymo 既是验证品类的做市基准，也是潜在的未来授权竞争者——如果 Waymo 转向对外提供软件栈；Tesla 激进的低单程价格会给 Uber
              车队经济性带来下游压力，可能压缩 Nuro 授权条款；Zoox 和 Motional 是 Uber 多宿主风险，但不是软件栈层面的竞争者；第三、四层近期威胁有限，但若 Aurora 扩展到乘用 AV，或
              Mobileye 从芯片扩展到全栈授权，长期存在替代风险。
