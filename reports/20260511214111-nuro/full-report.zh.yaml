companyProfile:
  summary: >
    Nuro 是一家自动驾驶车辆软件公司，总部位于 Mountain View, California，由前 Google Brain 工程师 Jiajun Zhu 和 Dave Ferguson 于 2016
    创立。公司最早做专用配送机器人（Nuro R2，2022 退役），随后转向把“Nuro Driver”自动驾驶软件栈授权给车队运营商和 OEM。首个商业部署是与 Lucid Motors（车辆）和
    Uber（网约车平台）的三方合作，目标是在 2026 于 San Francisco Bay Area 推出 Robotaxi 服务。Nuro 于 August 2025 完成 $203M E 轮融资，估值 $6B，投资方包括
    NVIDIA、Khosla Ventures、SoftBank、Google 和 Honda。公司持有 California DMV 无人驾驶测试许可（May 2026 获批），并在推进 CPUC 商业服务批准。
