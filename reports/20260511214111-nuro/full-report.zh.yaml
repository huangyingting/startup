      - number: '7.6'
        title: 风险缓释与终止标准
        blocks:
          - type: paragraph
            body: >
              5 个严重性最高的风险——监管许可缺口、Lucid 平台依赖、Uber 承诺稀释、产品责任敞口，以及收入模型可行性——都设有明确终止标准和缓释路径。监管终止标准是到 2027 年底仍未取得 California
              DMV Driverless Deployment Permit；缓释路径是保持与 CPUC 和 DMV 的主动沟通，并完成 NHTSA Standing General Order 和 AB 1777
              责任框架下所需的安全披露文件。Lucid 终止标准是 Chapter 11 申请或重大车辆交付违约；缓释要求 Nuro 在 Lucid 破产不可逆之前，识别并评估备用 OEM 平台（例如已有 L4
              能力车辆项目的制造商，或愿意进行工厂级集成的制造商）。Uber 承诺终止标准是 Uber 明确书面通知降低 AV 栈优先级或替换 Nuro；部分缓释是执行合同
              SLA，并证明安全和效率指标优于竞争栈。产品责任终止标准是在 CA 商业上线前无法取得 $5M+ 无人驾驶运营责任保险；缓释是 Drivered Pilot 测试期间保持干净安全记录，并与 2026
              年发展中的专业 AV 保险项目接触。收入模型终止标准是到 2027 年底仍没有付费无人驾驶乘车；如果触发，考虑到 Nuro 的烧钱速度相对已披露资本，公司将面对生存级融资缺口。
