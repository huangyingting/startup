      - number: '8.6'
        title: 最终建议与尽调要求
        blocks:
          - type: paragraph
            body: >
              建议：以 $6B 入场估值有条件买入。对一家尚未商业化的公司而言，$6B 估值偏贵，但相对公开自动驾驶可比公司和 Waymo 先例仍可辩护，前提是在正式尽调中满足三项条件：(a) 确认 Lucid Motors
              偿付能力，并具备 18 个月交付可见性，(b) CPUC Driverless Deployment Permit 申请已提交，并有望在 2027 H1 获批，(c) 从 Series E 协议中核实 Uber
              排他性或最低量承诺条款。若三项都确认，2028 年概率加权估值为 ~$13.6B，意味着 ~2.3x MOIC——低于机构风险投资 3x+ 的回报门槛，但对一个定义品类的平台的后期成长股权共同投资而言仍属合理。


              本建议的置信度为中。市场机会很大（高置信度），技术差异化具备可信度（中置信度），但执行风险重大（高置信度），且关键财务细节仍属私有信息（阻断项）。本投资的整体风险评级为高，主要来自 Lucid
              偿付能力、监管顺序和商业化前执行风险。


              退出路径包括：(1) Nuro 达到 $100M+ ARR 且市场环境有利后 IPO，以 $6B 入场估值计算，目标估值 $15–25B、MOIC 3–4x；(2) Uber、NVIDIA
              或寻求自动驾驶技术栈的全球 OEM 发起战略收购，Waymo 先例估值（$126B）显示，一旦 Nuro 建立市场位置，潜在收购溢价可能很大；或 (3) 商业发布确认后，以温和加价进行老股交易。


              投资交割前必须解决六项具体尽调要求：完整股权结构表（清算优先权、SoftBank 剩余持股）、Nuro Driver 授权费价目表和最低量承诺、书面 Lucid OEM 应急计划、Uber
              协议条款（排他性、最低行程量、里程碑条件）、2026 Q2 现金余额和月度烧钱速度，以及非 Lucid OEM 合作伙伴未来车辆集成的任何现有承诺。这些不是锦上添花——没有这些项目，就无法从基本面支撑该估值。
