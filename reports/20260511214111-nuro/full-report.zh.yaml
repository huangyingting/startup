      - number: '4.3'
        title: 单位经济性与成本结构
        blocks:
          - type: paragraph
            body: >
              Nuro 的单位经济性本质上很难评估，因为公司仍处商业化前阶段，不公布每英里成本、单车成本或毛利率数据。最佳可得参照来自 Waymo，这也是唯一披露成本基准的 Robotaxi 运营商：Waymo
              每自动驾驶英里运营成本估计从 2024 年约 $0.84 降至 2025 年目标 $0.51，动力来自 Jaguar I-PACE 和 Zeekr 平台硬件成本下降，以及车辆利用率提升。Nuro
              当前每英里成本很可能高于 Waymo，因为 Nuro 车队规模更小、成熟度更低，且 Lucid Gravity 平台的单车集成成本更高。Lucid Gravity 基础车辆在集成自动驾驶硬件前约为
              $70,000–$80,000；假设额外传感器、计算和集成成本为 $50,000–$100,000，每辆 Nuro 驱动车辆代表 $120,000–$180,000 的硬件资本。按五年和累计 500,000
              英里摊销，仅硬件折旧就意味着 $0.24–$0.36/mile。运营成本——保险、远程运营人员、充电、维护——早期规模下估计再增加 $0.50–$1.00/mile，总运营成本估计为
              $0.80–$1.50/mile。收入侧，如果 Nuro 从平均 $20、平均 4 英里的 Uber 行程中获得 10–20% 分成，则每程收入为 $2–$4，折合
              $0.50–$1.00/mile——在当前规模下不足以覆盖运营成本。纯软件的规模化毛利率（仅授权使用费、完全摊销后）估计为 60–85%，与 Mobileye 80%+
              授权毛利率一致；但要达到这一水平，必须消除直接车队运营敞口，而 Nuro 通过 Uber-Hertz 模式在结构上实现了这一点。资本强度仍然偏高，因为 Nuro
              必须先为多城市测试、验证基础设施和安全认证投入资金，按英里授权使用费才可能接近运营成本。
