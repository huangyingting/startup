      - number: '3.2'
        title: 功能能力与差异化
        blocks:
          - type: paragraph
            body: >
              相比竞争者，Nuro 的技术差异化落在三根支柱上：（1）可授权、硬件无关的 L4 AV 软件栈（Nuro Driver），可部署到多种车辆平台；（2）面向开放城市 Robotaxi 部署、运行在 NVIDIA
              DRIVE AGX Thor 计算上的端到端 AI 架构；（3）1.7M 自动驾驶英里且零责任事故的安全记录——这一说法尚未被任何直接竞争者明确反驳。相对 Waymo，关键结构差异是商业模式：Waymo
              自建、持有、部署并运营自己的车队，尚未公开向第三方提供授权模式。Nuro 的 B2B 授权模式让它能作为 AV 软件栈供应商，服务 Waymo 不覆盖的 OEM-平台生态。不过，Waymo 的 127M+
              无人驾驶英里相比 Nuro 的 1.7M，代表约 75x 的数据规模差距，直接影响 AI 模型质量、边缘场景覆盖，以及 Nuro 安全主张随时间维持防御性的能力。


              Tesla 的纯摄像头自动驾驶架构没有激光雷达，多数安全研究者和行业同行认为，这会在全天候、遮挡密集的开放场景运行中留下残余风险；Nuro 的多传感器融合（摄像头 + 激光雷达 +
              雷达）正面补上这一缺口。Aurora 的软件栈已在公路货运商业验证，但尚未适配城市乘用 Robotaxi，因此不是同细分场景的竞争者。Zoox 技术上很强（专用双向车辆，360-degree
              传感器覆盖），但软件栈自研且不可授权，使 Zoox 更像 Amazon 专属部署，而不是技术授权竞争者。Motional 的 AI 优先基础模型路线在架构上最接近 Nuro，但 Motional 只集成
              Hyundai 车辆，且未宣布授权项目，因此不威胁 Nuro 的 OEM 无关授权定位。Mobileye 的 Sup-Scalaer 2.0 平台在 ADAS 领域提供可比的授权模式，并正在向 Robotaxi
              迈进——这是最接近 Nuro B2B 模式的参照——但 Mobileye 目前竞争在芯片和传感器层，而不是 Nuro 授权的完整软件栈。
