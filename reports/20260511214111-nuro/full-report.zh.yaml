  - id: TV005
    title: 投资逻辑失效与止损触发因素表
    columns:
      - 触发因素
      - 信号
      - 阈值
      - 行动
      - 时间范围
    rows:
      - - Lucid Motors 资不抵债
        - Lucid 信用评级被下调至 CCC 以下、申请破产，或确认未履行 Nuro 车辆交付承诺
        - 任一确认事件：Chapter 11 申请、交付违约，或 Gravity 项目终止
        - 立即退出持仓或暂停新增资本部署；争取紧急过桥或替代 OEM 集成；时间线重置 18–36 个月
        - 0–12 个月；鉴于市场隐含 2027 违约概率约 ~50%，这是最高紧急度触发因素
      - - CPUC 无人驾驶部署许可延迟
        - 未提交 CPUC Driverless Deployment Permit 申请，或许可被拒 / 大幅延迟至 May 2027 之后
        - 截至 May 2028 仍无许可（距当前 CPUC Drivered Pilot 批准 24 个月）
        - 重新评估投资逻辑；因商业化前周期拉长，将估值折价 30–50%；建模 Series F 稀释；考虑降价轮融资情景
        - 12–24 个月；许可进展应按季度监控
      - - Uber 与竞争 AV 供应商达成排他合作
        - Nuro 商业发布前，Uber 公开宣布 Waymo、Rivian 或其他 AV 供应商为 SF Bay Area 排他合作伙伴
        - 任何 Uber 新闻稿、SEC 文件或投资者声明确认 SF 的非 Nuro 排他 AV 安排
        - 立即退出；需求平台锚点丢失；投资逻辑崩塌；剩余价值 $1–2B（仅 IP 和专利）
        - 0–18 个月；Uber 多源采购风险已经存在且在上升
      - - 资本耗尽 / 被迫降价轮融资
        - Nuro 新融资轮估值低于 $4B；过桥贷款条款惩罚性；或管理层宣布重组
        - Series F 条款清单投后估值 <$4B；过桥贷款利率 >15%；或公司宣布削减剩余员工数 >30%
        - 大幅减记；现有 Series E 投资人面临显著稀释，也可能重置优先权；一旦有任何老股流动性即退出
        - 18–24 个月；Series E（Aug 2025）提供的现金跑道到 Q2–Q4 2027 耗尽
    notes: 投资逻辑失效触发因素要求投资人立即行动，而不是继续观察。这些是投 / 不投决策点，不是黄色预警。
    claimRefs:
      - CV034
      - CV035
      - CV036
      - CV037
  - id: TV006
    title: 最终尽调要求表
    columns:
      - 领域
      - 尽调要求
      - 优先级
      - 重要性
      - 负责人
    rows:
      - - 股权结构
        - 截至 Series E 交割的完整股权结构表，包括 SoftBank Vision Fund 残余持股、所有清算优先权、参与权以及任何反稀释条款
        - 关键
        - >-
          Series B（$940M SoftBank）和 Series D（$600M Tiger Global）留下的优先权包袱，可能在低于 $3B 的悲观退出中吃掉 Series E
          普通股回报；普通股价值必须先看清优先股堆叠
        - Nuro CFO / Nuro 法律顾问
      - - 授权经济性
        - Lucid-Uber 商业协议中 Nuro Driver 单车授权费、每英里分成 费率表、最低量承诺、爬坡期折扣，以及与 Uber 的收入分成比例
        - 关键
        - $6B 估值要求 $300–600M ARR 可达；不知道收费表和最低量承诺，就无法承销收入模型；这是最影响价值、但尚未披露的单一变量
        - Nuro Chief Revenue Officer / 交易法律顾问
      - - Lucid 应急预案
        - 董事会书面批准的 OEM 应急计划：哪些替代车型平台已评估可集成 Nuro Driver，各自集成时间线和成本估计，以及触发应急预案的条件
        - 高
        - 公开材料没有记录任何后备方案；如果 Lucid 资不抵债且没有替代平台，公司会面临终局风险，若 Nuro 未准备好，恢复需 18–36 个月；可信应急预案能把风险从生死问题降为可管理问题
        - Nuro CEO / 董事会
      - - Uber 协议条款
        - 完整 Nuro-Uber 商业协议：排他条款或明确无排他、最低出行量承诺、Uber 的 Series E 股权批次所附里程碑条件，以及 Uber 替换其他 AV 供应商的权利
        - 高
        - Uber 多源采购已经确认（Rivian 交易、Waymo 集成）；投资逻辑依赖 Uber 提供有意义的最低量，而不是没有约束力的合作；排他性或最低量底线会实质改变风险画像
        - Nuro Chief Legal Officer
      - - 现金跑道与烧钱速度
        - Q2 2026 现金余额（扣除 Series E 于 Aug 2025 交割以来的经营支出）、按 R&D、G&A 和车队运营拆分的月度烧钱速度，以及基准情景和悲观情景商业化时间线下的预计现金跑道
        - 高
        - Nuro 整个投资逻辑取决于公司能否撑到商业发布；若截至 2026 年中现金跑道不足 12 个月，生存风险就是近端而非理论问题；烧钱速度也能验证本分析采用的 $50–100M/年估计是否准确
        - Nuro CFO
    notes: 五项尽调要求都是阻断项——关键优先级问题未解决、高优先级问题未得到满意答复前，不应完成投资。
    claimRefs:
      - CV007
      - CV008
      - CV038
