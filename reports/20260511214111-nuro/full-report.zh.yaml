    计算硬件上，并接入多模态传感器套件（LiDAR、摄像头、雷达）。目前部署在面向 Uber Robotaxi 平台的 Lucid Gravity SUV 中，区域为 SF Bay Area。
  customerFocus: >
    B2B：OEM（汽车制造商）、车队平台运营商（网约车公司）和车队运营合作伙伴（充电 / 维护服务商）。当前锚定客户：Lucid Motors（OEM）、Uber Technologies（车队平台）、Hertz/Oro
