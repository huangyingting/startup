callouts:
  - calloutType: strength
    title: "Software-only architecture enables OEM-agnostic licensing at scale"
    body: "Nuro's deliberate separation of the Nuro Driver software stack from any proprietary vehicle chassis positions it as a platform licensor rather than an integrated fleet operator. This architecture allows the same software to be deployed across multiple vehicle platforms (Lucid Gravity today; additional OEMs in future), which is structurally superior for margin scalability versus Waymo's vertically integrated approach."
    claimRefs: [CE001, CE002, CE009]

  - calloutType: risk
    title: "Two un-issued California permits are the single biggest commercialization gate"
    body: "As of May 2026, Nuro lacks both the California DMV Autonomous Vehicle Deployment Permit and the CPUC Driverless Deployment Permit required for commercial fare-based driverless service. These permits are at regulator discretion and not guaranteed; any safety incident during the current drivered pilot phase could delay issuance, pushing the Q4 2026 launch target into 2027."
    claimRefs: [CE029, CE030, CE039]

  - calloutType: risk
    title: "Single-supplier compute dependency on NVIDIA introduces supply-chain and pricing risk"
    body: "The Nuro Driver stack is exclusively validated on NVIDIA DRIVE AGX Thor. Any disruption to NVIDIA's automotive supply chain, post-partnership pricing normalization, or an architecture shift at NVIDIA would require re-validation of the entire autonomy stack on a new compute platform—a multi-year engineering effort that would stall commercialization."
    claimRefs: [CE014, CE036, CE040]

  - calloutType: insight
    title: "CIMRL research publication signals active AV academic engagement and RL-based planning capability"
    body: "Nuro's 2024 arXiv paper on CIMRL (combining imitation and reinforcement learning for safe closed-loop driving) is notable evidence that Nuro's planning and prediction teams are publishing at the research frontier and working on methods to address the core training-distribution challenge in autonomous driving. This is a positive signal for the long-term quality of the autonomy stack."
    claimRefs: [CE022, CE023]

