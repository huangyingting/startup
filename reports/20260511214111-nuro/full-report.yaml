      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear Cases'
        blocks:
          - type: paragraph
            body: |
              Three scenarios bound Nuro's 2028 valuation range, spanning the most plausible paths for
              commercial launch, fleet scale, and partner durability. Each scenario assigns a probability
              weight, identifies the critical assumptions required, projects a 2028 implied valuation, and
              calculates the entry-price multiple on the $6B Series E.

              The bull case (25% probability) assumes Lucid Motors remains solvent and delivers 50,000+
              vehicles by end-2028; the CPUC Driverless Deployment Permit is obtained by Q2 2027; Uber
              achieves 500,000+ monthly Nuro-powered rides by late 2028; and Nuro licenses its stack to
              one additional OEM partner beyond Lucid by 2027. Under these assumptions, Nuro reaches
              approximately $500M+ ARR in 2028 (licensing fees plus Uber ride revenue share) and could
              attract a $28B valuation at a 50x forward ARR multiple, implying a 4.7x MOIC on the $6B entry.
              This trajectory would be analogous to Aurora's 2025–2026 market-cap rerating on commercial
              launch progress.

              The base case (50% probability) assumes Lucid restructures but does not file for bankruptcy;
              the CPUC Driverless Deployment Permit is obtained by Q3 2027; 15,000 vehicles are operational
              by end-2028; and Uber drives 150,000+ monthly Nuro rides. Revenue reaches approximately
              $120M ARR in 2028 and Nuro achieves a $12B valuation at roughly 100x forward ARR — consistent
              with the premium that public AV comps command. This implies a 2.0x MOIC on the $6B entry,
              which is below typical venture return thresholds (3x+) but above zero and consistent with
              a robotaxi sector that is still in early-commercial ramp.

              The bear case (25% probability) assumes Lucid Motors becomes insolvent, triggering a 12–24 month
              platform-migration delay; the CPUC Driverless Deployment Permit does not arrive before Q1 2028;
              fewer than 5,000 vehicles are operational at end-2028; and Uber reduces its commitment to Nuro
              in favor of Waymo and Rivian. Revenue in this scenario is near zero in 2028 and Nuro faces
              a forced bridge or down-round financing at a $2.5B or lower valuation — a 0.4x MOIC representing
              capital destruction. This scenario is not purely speculative: Lucid's market-implied bankruptcy
              probability before 2027 is approximately 50% per third-party analyst estimates, and there is
              no publicly documented Nuro contingency plan for platform migration.

              The probability-weighted expected 2028 valuation is (0.25 × $28B) + (0.50 × $12B) + (0.25 × $2.5B)
              = $7 + $6 + $0.625 = ~$13.6B, implying a probability-weighted 2.3x MOIC. This is above entry
              but below the 3x+ threshold typically required by institutional growth-equity funds. The
              asymmetric downside in the bear case (losing 60% of capital) is driven almost entirely by
              the Lucid solvency risk, which is the single most addressable diligence item before investment.
            claimRefs:
