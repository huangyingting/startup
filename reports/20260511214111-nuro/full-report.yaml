  - id: FU004
    title: Retention / Repeat Cohort
    type: cohort
    description: >-
      Tracks key AV consumer adoption indicators and Waymo rider satisfaction metrics across quarterly periods in 2025,
      showing the percentage-based trajectory that defines the market context for Nuro's 2026 commercial robotaxi
      launch. All values are percentages on a 0–100 scale.
