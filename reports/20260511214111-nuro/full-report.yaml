      - number: '1.2'
        title: Leadership and Governance
        blocks:
          - type: paragraph
            body: >-
              Nuro is led by its two co-founders in a dual-CEO structure formalized in October 2025. Jiajun Zhu,
              Co-Founder and Co-CEO, focuses on product and technology, while Dave Ferguson, Co-Founder and Co-CEO
              (elevated from President on October 22, 2025), leads capital and commercial partnerships. The co-founders
              describe having worked closely together for over 14 years since meeting at Google's self-driving car
              project. Their complementary strengths—Zhu's deep engineering roots and Ferguson's commercial and
              investor-relations orientation—underpin the company's leadership thesis. The remainder of the executive
              team includes Andrew Chapin as Chief Operating Officer and James Owens as Chief Legal and Policy Officer,
              who announced the May 2026 CPUC permit. Key-person concentration is elevated: both co-founders are central
              to Nuro's technology credibility, partnership relationships, and investor confidence. Governance is
              private; no independent board members have been publicly disclosed, though investors SoftBank Vision Fund,
              Tiger Global, Greylock, and T. Rowe Price hold board or observer representation per standard VC practice.
