  - id: TV006
    title: Final Diligence Asks Table
    columns:
      - area
      - diligence_ask
      - priority
      - why_it_matters
      - owner
    rows:
      - - Capital Structure
        - >-
          Full capitalization table as of Series E close, including SoftBank Vision Fund residual stake, all liquidation
          preferences, participation rights, and any anti-dilution provisions
        - Critical
        - >-
          Preference overhang from Series B ($940M SoftBank) and Series D ($600M Tiger Global) could eliminate Series E
          common returns in a bear-case exit below $3B; common equity value requires knowing preference stack
        - Nuro CFO / Nuro legal counsel
      - - Licensing Economics
        - >-
          Nuro Driver per-vehicle license fee, per-mile royalty schedule, minimum volume commitments, ramp discounts,
          and revenue share percentage with Uber per the Lucid-Uber commercial agreement
        - Critical
        - >-
          The $6B valuation requires $300–600M ARR to be achievable; without knowing the fee schedule and minimum volume
          commitments, the revenue model cannot be underwritten; this is the single most value-relevant undisclosed
          variable
        - Nuro Chief Revenue Officer / Deal counsel
      - - Lucid Contingency
        - >-
          Written board-approved OEM contingency plan: which alternative vehicle platforms have been evaluated for Nuro
          Driver integration, what is the integration timeline and cost estimate for each, and what triggers activation
          of the contingency
        - High
        - >-
          No publicly documented fallback plan exists; a Lucid insolvency event with no alternative platform would be a
          company-ending scenario with an 18–36 month recovery if Nuro is unprepared; a credible contingency converts
          this from existential to manageable
        - Nuro CEO / Board of Directors
      - - Uber Agreement Terms
        - >-
          Full Nuro-Uber commercial agreement: exclusivity provisions or lack thereof, minimum ride volume commitments,
          milestone conditions attached to Uber's Series E equity tranche, and Uber's rights to substitute alternative
          AV providers
        - High
        - >-
          Uber multi-sourcing is confirmed (Rivian deal, Waymo integration); the thesis depends on Uber providing
          meaningful minimum volume, not just a non-binding partnership; exclusivity or minimum-volume floors materially
          change the risk profile
        - Nuro Chief Legal Officer
      - - Runway and Burn
        - >-
          Q2 2026 cash balance (net of operating expenditures since Series E close Aug 2025), monthly burn rate broken
          down by R&D, G&A, and fleet operations, and projected runway under base-case and bear-case commercial
          timelines
        - High
        - >-
          The entire Nuro investment thesis depends on the company surviving through commercial launch; if runway is
          below 12 months as of mid-2026, the existential risk is near-term rather than theoretical; burn rate also
          reveals whether the $50–100M/year estimate used in this analysis is accurate
        - Nuro CFO
    notes: >-
      All five diligence asks are blocking items — investment should not close without resolution of Critical-priority
      asks and satisfactory answers on High-priority asks.
    claimRefs:
      - CV007
      - CV008
      - CV038
