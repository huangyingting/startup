  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Monetization
        blocks:
          - type: paragraph
            body: >
              Nuro's revenue model is a technology-licensing stack with three interconnected streams, none of which had
              generated publicly disclosed commercial revenue as of May 2026. The primary stream is the Nuro Driver™
              license: an upfront integration fee paid by the OEM or fleet operator (analogous to an automotive software
              licensing deal, estimated at $1M–$10M+ per platform integration) plus an ongoing per-vehicle or per-mile
              royalty as vehicles accumulate autonomous miles in commercial service. In the Nuro-Lucid-Uber structure,
              Lucid is the OEM integrating the Nuro Driver at the factory level, while Uber operates the fleet
              commercially; it is not yet publicly clarified which entity pays the license fees and in what split. The
              second stream is a revenue share on Uber rides taken by Nuro-powered vehicles—a percentage of the fare
              that Uber collects per completed autonomous trip. The exact revenue-share percentage is commercially
              sensitive and not disclosed; industry mobility platform comps suggest 20–30% take rates for software
              platforms providing critical dispatch or AV stack services. The third stream, nascent and contingent, is
              fleet infrastructure fees via Hertz/Oro Mobility, which provides depot management, charging, maintenance,
              and cleaning for the Nuro-powered robotaxi fleet; this introduces a potential service-layer revenue
              channel, though Hertz/Oro bears the fleet capex and the financial structure with Nuro is not public. Prior
              to the 2023 pivot, Nuro also operated delivery pilots for Kroger, Walmart, FedEx, and Domino's under
              per-delivery or pilot-contract revenue arrangements; all commercial delivery programs ended by late 2022
              and generated minimal publicly reported revenue. Nuro explicitly states it is not yet generating
              commercial revenue from its robotaxi service and does not disclose any ARR or recurring license payments
              from announced partners.
