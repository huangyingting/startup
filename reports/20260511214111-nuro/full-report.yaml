  - id: TP003
    title: Pricing Packaging Comparison
    columns:
      - Competitor
      - Pricing Model
      - Price Basis
      - Included Capabilities
      - Unknowns / Discounts
      - Implication for Nuro
    rows:
      - - Waymo
        - Per-ride service fee (consumer-facing)
        - ~$15–20/ride in SF; avg ~$19.69 (late 2025); ~$12.30 for 5-mile Phoenix ride; $0.52–$3.50/mile range
        - Full driverless service including routing, insurance-equivalent, maintenance, and no surge pricing
        - >-
          No public fleet licensing terms; no public per-mile cost basis disclosed; pricing varies by city and route
          length
        - >-
          Establishes $15–20 consumer fare ceiling in premium urban markets; Nuro's Uber licensee must compete within
          this range; Waymo's no-surge model creates consumer trust premium Nuro's program can benchmark against
      - - Tesla (Cybercab)
        - Per-ride pilot fare + vehicle sale model
        - >-
          $4.20/ride flat fare (Austin pilot, 2026); target vehicle sale price below $30K; FSD subscription $99/month or
          $8K one-time
        - >-
          Driverless ride access; owner network profit-share model via Tesla app; included vehicle hardware with FSD
          chip
        - >-
          Expansion pricing unknown; pilot fare likely subsidized by volume and manufacturing scale aspirations;
          city-by-city regulatory approval required
        - >-
          Lowest public per-ride fare creates consumer price anchor risk; if Tesla scales $4–5/ride nationally, Uber may
          face pressure to reduce operating costs and demand lower Nuro licensing fees; represents the most acute
          pricing threat to Nuro's licensee economics
      - - Nuro (via Lucid-Uber deployment)
        - B2B software licensing + revenue share (technology supplier)
        - >-
          Per-vehicle license fee (undisclosed) + revenue share or royalty from Uber (undisclosed); not a per-ride
          consumer pricing model
        - >-
          Nuro Driver L4 stack factory-integrated into Lucid Gravity; access to Uber demand platform and
          13.5B-trip-per-year network; Hertz/Oro fleet operations bundled in program
        - >-
          Licensing fee structure, per-vehicle rate, and Uber revenue share terms not publicly disclosed; all Nuro
          commercial terms are private
        - >-
          B2B model structurally decouples Nuro from per-ride pricing competition; near-term pricing risk is upstream
          (Uber squeezes Nuro terms if Tesla depresses platform economics) rather than direct consumer pricing exposure
