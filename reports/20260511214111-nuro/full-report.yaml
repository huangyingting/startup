        title: Customer Concentration and Commercial Risk
        blocks:
          - type: paragraph
            body: >-
              Nuro's customer concentration is effectively total: one platform deal (Uber), one hardware partner
              (Lucid), one fleet operator (Hertz/Oro), and one initial geography (SF Bay Area). This is structurally
              analogous to a pre-revenue SaaS startup whose entire ARR base is a single enterprise account—commercially
              validating but acutely fragile. Any deterioration in the Uber relationship, driven by performance
              shortfalls, contract renegotiation, or Uber's own strategic realignment toward Rivian, would eliminate
              Nuro's entire near-term revenue base. Uber's Rivian partnership, announced just 11 weeks after the
              Nuro-Lucid deal, is the clearest available signal that Uber is building a multi-supplier AV platform: the
              two programs target different vehicle types (Lucid Gravity luxury SUV vs. Rivian R2 mid-market crossover)
              and different timelines (2026 vs. 2028 commercial launch), providing Uber with a built-in fallback and
              leverage over Nuro's commercial terms. The exclusivity or non-exclusivity of Nuro's licensing arrangement
              with Uber has not been publicly disclosed. Nuro has disclosed no other B2B licensing customers—no
              municipal fleet programs, no international platform deals, no second ride-hailing customer—leaving the
              commercial pipeline entirely opaque beyond the Uber program. Consumer demand risk compounds the
              partnership risk: AAA data show 53% of Americans oppose riding in AVs, and Deloitte places the US among
              the lowest-enthusiasm AV markets globally. If paid service demand fails to materialize at levels Uber
              requires to justify fleet expansion, Nuro's licensing volume and milestone-based revenue would stall.
              Mitigation pathways exist—the Waymo proof case demonstrates consumer resistance is not insurmountable, and
              a successful Bay Area launch would give Nuro a referenceable commercial deployment for outreach to
