          assess whether Nuro's AI training approach compensates for dataset scale through synthetic data or simulation
          augmentation; confirm Nuro's ongoing driverless mile accumulation rate post-permit
      - - >-
          B2B licensing model is structurally unique — no competitor offers an equivalent OEM-agnostic robotaxi stack
          licensing product
        - >-
          Waymo announces a licensing product (existential threat); Mobileye expands Sup-Scalaer from chip-layer to
