      - number: '1.5'
        title: Current Partnerships and Regulatory Progress (2026)
        blocks:
          - type: paragraph
            body: >-
              Nuro's flagship commercial relationship is the three-way partnership with Lucid Motors and Uber
              Technologies, announced July 2025 and substantially expanded by April 2026. Uber has committed $500
              million to Lucid (owning ~11.5% of the EV maker) and expanded the fleet commitment from 20,000 to at least
              35,000 Lucid Gravity SUVs integrated with Nuro Driver, to be deployed in dozens of U.S. and international
              markets over six years. Nuro leads the autonomy development and validation; Lucid integrates the AV
              hardware at its Casa Grande, Arizona factory; Uber owns, operates, and dispatches the fleet exclusively
              via its platform. Autonomous on-road testing with safety drivers began in December 2025 across multiple
              U.S. cities, and by April 2026 select Uber employees were testing the service in the Bay Area via the Uber
              app. Regulatory progress in California has been sequential: California DMV Driverless Testing Permit
              (April 2026), CPUC Drivered Pilot Permit (May 8, 2026). Remaining hurdles before paid commercial
              driverless rides include a California DMV Deployment Permit and a CPUC driverless ride-hailing
              permit—neither of which has been filed as of the run date. The commercial launch target remains late 2026
              in the San Francisco Bay Area.
