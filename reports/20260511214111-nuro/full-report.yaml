      - number: '2.5'
        title: Sizing Gaps and Analytical Caveats
        blocks:
          - type: paragraph
            body: >
              Several material limitations constrain the quality of this market analysis. First, the range of analyst
              TAM estimates—from $0.27B to $2.68B in 2025 and $86B to $400B in 2035—reflects genuinely different market
              definitions (RaaS revenue only vs. full AV sector), geographies, and methodology assumptions that the
              reports themselves do not fully disclose. Investors should treat these estimates as directional
              order-of-magnitude bounds rather than precise valuations. Second, NHTSA incident data showing 9.1 crashes
              per million miles for ADS vehicles versus 4.1 for human drivers creates a safety paradox: more incidents
              are reported partly because reporting requirements are stricter for AVs than for human drivers, making
              direct comparison misleading. The 2 confirmed ADS fatalities versus 6,450 incidents suggests most ADS
              incidents are minor, but the metric is contested.


              Third, the AV software licensing SAM relevant to Nuro cannot be cleanly separated from the RaaS market
              without knowing Nuro's per-vehicle licensing fees, royalty structure, and exclusivity terms—none of which
              have been publicly disclosed. The Precedence Research AV software market ($2.30B-$8.04B) is the most
              relevant sizing lens, but it includes all software categories; Nuro's addressable slice within this
              depends on stack penetration and pricing. Fourth, consumer adoption timing is uncertain: Goldman Sachs
              places cost parity below $1/mile by 2035, while Gridwise and S&P research suggest parity with human
              rideshare is not achievable until 2040-2041—a five-year gap with material implications for near-term SAM.
              These gaps are captured in the evidence gaps section and as diligence asks in TM004.
            claimRefs:
              - CM001
              - CM002
              - CM003
