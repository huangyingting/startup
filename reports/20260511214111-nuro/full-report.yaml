      - number: '3.3'
        title: Pricing and Commercial Models
        blocks:
          - type: paragraph
            body: >
              The robotaxi pricing landscape as of mid-2026 spans a wide range with structurally different models. Waymo
              charges approximately $15–20 per ride in San Francisco (average ~$19.69), with a narrowing gap versus
              Uber's average of ~$17.47 and Lyft's ~$15.47; the gap is tightest for short urban trips. Tesla's Austin
              Cybercab pilot at $4.20 flat fare represents the lowest publicly cited robotaxi price—likely subsidized by
              Tesla's vehicle manufacturing scale ambitions and the $30,000 target vehicle price—creating a consumer
              price-anchor that competing platforms must respond to even if the pilot pricing is not economically
              sustainable.


              Nuro's pricing model is structurally decoupled from per-ride consumer pricing. Nuro operates as a B2B
              technology licensor: it charges Lucid Motors a per-vehicle integration fee (exact terms undisclosed) for
              embedding the Nuro Driver stack at the manufacturing line, and earns revenue share or royalty payments
              from Uber as the fleet operator and demand platform—also undisclosed. Nuro does not set consumer fares;
              its licensee Uber does, competing against Waymo and Tesla. The key pricing risk for Nuro is indirect: if
              Tesla's $4.20/ride pricing anchors consumer fare expectations well below Waymo's $19.69, Uber will face
              pressure to reduce per-ride economics, which could translate into downstream demands for lower licensing
              terms from Nuro or incentives to develop in-house AV alternatives. The absence of public disclosure on
              Nuro's per-vehicle licensing fee and revenue share structure prevents independent verification of whether
              Nuro's licensing economics are viable at the required fleet scale.
