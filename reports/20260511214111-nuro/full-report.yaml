      - number: '4.5'
        title: Financial Transparency and Evidence Gaps
        blocks:
          - type: paragraph
            body: >
              Nuro is a private company that does not file annual reports (Form 10-K) or material event reports (Form
              8-K) with the SEC. Its financial statements, management accounts, burn rate, cash balance, revenue, gross
              margin, and capitalization table are entirely non-public. The California Public Utilities Commission
              permit and California DMV driverless testing permit provide regulatory evidence of Nuro's operational
              progress but no financial disclosure. The only credible proxies for Nuro's financial health are: (a)
              headcount-based burn estimates derived from layoff announcements, (b) funding round data from press
              releases and investor announcements, (c) implied valuation marks from Series D and E pricing, and (d)
              publicly reported commercial deal structures (Uber fleet commitment, Lucid integration). These proxies
              carry material uncertainty: headcount-based burn estimates miss infrastructure capex and non-personnel
              costs; valuation marks from private rounds do not represent liquid fair value; and commercial deal
              structures include undisclosed terms. The absence of public financial statements makes comprehensive
              investment underwriting of Nuro impossible without confidential data room access. Key financial diligence
              blockers include: (1) Nuro's actual cash position and monthly burn as of Q1–Q2 2026; (2) the exact terms
              and size of Uber's conditioned investment tranche; (3) the per-vehicle or per-mile licensing fee scheduled
              under the Nuro-Lucid-Uber agreement; (4) any revenue recognition policies for multi-year licensing
              contracts; and (5) Nuro's capitalization table, including SoftBank's current residual stake and any
              liquidation preferences that could subordinate common equity. The co-founders' 2023 acknowledgment that
              unit economics were unfavorable at scale remains the most significant publicly documented adverse
              financial signal, though the licensing-model pivot is designed structurally to address those
              capital-intensity drivers.
