      - number: '1.3'
        title: Funding History and Investor Map
        blocks:
          - type: paragraph
            body: >-
              Nuro has raised over $2.3 billion across five funding rounds since 2016, making it one of the most heavily
              capitalized autonomous vehicle startups outside of Waymo. The company's early capital came from SoftBank
              Vision Fund (Series A $92M in 2017, Series B $500M in 2018), which established its large-scale ambitions.
              A $940M Series C in 2019 valued the company at $2.7B and brought in additional growth investors. A $600M
              Series D in 2021 led by Tiger Global pushed the valuation to a peak of $8.6B at the height of the AV-tech
              valuation cycle. The most recent Series E, closed in August 2025, raised $203M at a $6B post-money
              valuation—a 30% decline from the 2021 peak reflecting industry-wide reset and Nuro's own operational
              challenges. The Series E introduced two strategically significant investors: Uber Technologies and Nvidia
              (both first-time equity holders after longstanding operational relationships), alongside continuing
              institutional investors Baillie Gifford, T. Rowe Price, Fidelity, Tiger Global, Greylock Partners, and new
              entrants Icehouse Ventures, Kindred Ventures, and Pledge Ventures. Uber's investment is partially
              milestone-conditioned—linked to commercial deployment targets—creating an alignment incentive. Nvidia's
              equity stake deepens a pre-existing compute partnership in which Nuro runs on NVIDIA DRIVE AGX Thor
              hardware and uses Nvidia GPUs for large-scale model training.
