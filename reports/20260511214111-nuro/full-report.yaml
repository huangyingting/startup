  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The AV autonomy landscape as of mid-2026 divides into four competitive tiers relevant to Nuro's
              positioning as a technology licensor. Tier 1 (scaled robotaxi operators): Waymo stands alone as the
              commercial category leader, operating 500K+ weekly paid rides across six US cities after raising $16B at a
              $126B valuation in February 2026, accumulating 127M+ autonomous miles and a 90% reduction in
              serious-injury crashes versus human drivers. Tesla entered the commercial robotaxi market in Austin in
              2026 with the Cybercab at a $4.20 flat fare per ride, backed by mass production at Gigafactory Texas that
              began April 2026; Tesla's camera-only architecture and limited regulatory coverage constrain near-term
              scale. Tier 2 (scaling challengers): Zoox (Amazon-backed) launched free commercial-equivalent pilot rides
              in Las Vegas and San Francisco, logging nearly 2M autonomous miles and serving 350K+ riders while awaiting
              a NHTSA Part 555 exemption to charge commercial fares; a Zoox-Uber Las Vegas integration is targeted for
              summer 2026. Motional (Hyundai-Aptiv JV, ~$4B invested) suspended San Francisco operations in October 2024
              and is retooling with an AI-first foundation model approach, targeting a Las Vegas driverless commercial
              launch in 2026. Tier 3 (domain-specific operators): Aurora Innovation commercially launched driverless
              Class 8 trucking in April 2025 on the Dallas-Houston I-45 corridor—the first US commercial driverless
              long-haul freight operation—expanding toward El Paso and Phoenix by late 2025 with next-generation
              hardware featuring 1,000-meter lidar; Aurora is a trucking specialist and not a near-term robotaxi
              competitor. Tier 4 (adjacent platforms and software vendors): Mobileye (NYSE: MBLY, $1.894B 2025 revenue)
              leads the ADAS chip-and-software market and is threading toward full L4 via Zeekr robotaxi deployment in
              China and Volkswagen partnerships. May Mobility raised $387M+ and partnered with Uber for geofenced
              transit AV deployment in Arlington TX. Pony.ai (NASDAQ: PONY) and WeRide (NASDAQ: WRD) completed dual
              US-Hong Kong listings in 2025 but face regulatory barriers to US commercial AV operations.


              The competitive implications for Nuro are tier-specific: Waymo represents both the market-making benchmark
              that validates the category and a potential future licensing competitor if Waymo pivots toward offering
              its stack externally; Tesla's aggressively low per-ride pricing creates a downstream pressure on Uber
              fleet economics that could compress Nuro's licensing terms; Zoox and Motional are Uber multi-homing risks
              but not stack-level competitors; and Tiers 3-4 present limited near-term threat but longer-horizon
              substitution risk if Aurora expands into passenger AV or Mobileye expands from chips to full-stack
