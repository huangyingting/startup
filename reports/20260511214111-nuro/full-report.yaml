      - number: '8.5'
        title: Thesis-Break and Kill-Switch Triggers
        blocks:
          - type: paragraph
            body: |
              Four events, if confirmed, would individually invalidate the investment thesis at $6B and
              require either exit or immediate valuation renegotiation. These are not speculative tail
              risks — each is materially plausible within the next 12–24 months.

              The first and highest-priority trigger is Lucid Motors insolvency or delivery failure. Given
              the ~50% market-implied bankruptcy probability before 2027, any missed Nuro vehicle delivery
              commitment, Chapter 11 filing, or Gravity program discontinuation would eliminate Nuro's
              vehicle platform entirely. There is no publicly documented OEM fallback. A Lucid failure would
              reset the commercial launch timeline by 18–36 months — likely beyond the runway of the Series E
              capital without emergency financing. Investors should seek a binding written contingency plan
              from Nuro management as a precondition to investment close.

              The second trigger is CPUC Driverless Deployment Permit delay beyond May 2028. The CPUC
              permit sequence is the critical regulatory gating item; without the Driverless Deployment
              Permit, Nuro cannot charge a fare. Historical permit timelines for comparable operators
              (including Waymo and Cruise) ranged from 12–24 months after application submission, suggesting
              the earliest realistic permit could arrive in mid-to-late 2027. If it slips to 2028 or beyond,
              Nuro's runway will be exhausted before generating material revenue.

              The third trigger is Uber's appointment of an exclusive non-Nuro AV partner for San Francisco.
              Uber's simultaneous $300M–$1.25B Rivian autonomous program and active Waymo deployment reveal
              a multi-sourcing strategy. If Uber publicly commits to Waymo or Rivian as exclusive SF AV
              partners before Nuro's commercial launch, the demand-platform anchor disappears. The absence
              of disclosed exclusivity provisions in the Nuro-Uber agreement is a material due diligence gap.

              The fourth trigger is a new financing round at below $4B, signaling market re-pricing of
              the thesis. A down-round to $3–4B or below would impose liquidation preference reordering
              on Series E investors and confirm that the commercial timeline has slipped materially. Given
              the 18–24 month estimated runway from August 2025, the Series F window would open in late
              2026 to mid-2027 — right when commercial launch either confirms or fails.
            claimRefs:
              - CV034
              - CV035
              - CV036
              - CV037
              - CV038
              - CV041
          - type: table
            tableRef: TV005
            claimRefs:
              - CV034
              - CV035
              - CV036
              - CV037
      - number: '8.6'
        title: Final Recommendation and Diligence Asks
        blocks:
          - type: paragraph
            body: |
              Recommendation: Conditional Buy at $6B entry. The $6B valuation is premium for a pre-commercial
              company but is defensible relative to public AV comps and the Waymo precedent, provided three
              conditions are satisfied in formal diligence: (a) Lucid Motors solvency confirmed with 18-month
              delivery runway, (b) CPUC Driverless Deployment Permit application filed and on track for
              H1 2027, and (c) Uber exclusivity or minimum volume commitment terms verified from the Series E
              agreement. If all three conditions are confirmed, the probability-weighted 2028 valuation of
              ~$13.6B implies a ~2.3x MOIC — below institutional venture return thresholds of 3x+ but
              reasonable for a late-stage growth equity co-investment in a category-defining platform.

              The confidence level on this recommendation is Medium. The market opportunity is large (high
              confidence) and the technical differentiation is plausible (medium confidence), but the
              execution risk is material (high confidence) and the key financial details are private
              (blocking). The overall risk rating for this investment is High, dominated by Lucid solvency,
              regulatory sequencing, and pre-commercial execution risk.

              Exit pathways include: (1) IPO once Nuro achieves $100M+ ARR and market conditions are
              favorable, targeting a $15–25B valuation at 3–4x MOIC from $6B; (2) strategic acquisition
              by Uber, NVIDIA, or a global OEM seeking an AV stack, with Waymo's precedent valuation
              ($126B) suggesting a large potential acquisition premium if Nuro establishes market position;
              or (3) secondary transaction at a modest mark-up once commercial launch is confirmed.

              Six specific diligence asks must be resolved before investment close: full capitalization
              table (liquidation preferences, SoftBank residual stake), Nuro Driver license fee schedule
              and minimum volume commitments, written Lucid OEM contingency plan, Uber agreement terms
              (exclusivity, minimum rides, milestone conditions), Q2 2026 cash balance and monthly burn,
              and any existing commitments from non-Lucid OEM partners for future vehicle integration.
              These are not incremental niceties — without these items, the valuation cannot be underwritten
              on a fundamental basis.
            claimRefs:
              - CV030
              - CV031
              - CV038
              - CV042
              - CV043
              - CV044
