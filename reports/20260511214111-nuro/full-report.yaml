      - number: '7.4'
        title: Partner Dependency and Concentration Risks
        blocks:
          - type: paragraph
            body: |
              Nuro's entire commercial program rests on a tri-party dependency (Uber + Lucid + Hertz/Oro) with
              no disclosed backup for any leg. Uber provides demand aggregation and the booking platform; Lucid
              provides the Gravity SUV platform and factory-level sensor integration; Hertz/Oro provides fleet
              operations. Removal of any single partner would halt the program.

              Lucid Motors is the most acute dependency risk. Lucid reported free cash flow of –$3.8 billion in
              FY2025, and its primary financial backstop is a ~$2 billion term loan from Saudi Arabia's Public
              Investment Fund. Prediction market probability of Lucid filing for bankruptcy before 2027 stood at
              approximately 50% in early 2026. A Lucid insolvency would eliminate Nuro's vehicle supply, require
              re-integration onto a new OEM platform, and reset the commercial launch timeline by at least two to
              three years. Nuro has not disclosed any alternative OEM platform.

              Uber's multi-supplier AV strategy is the second material risk. Since the Nuro-Lucid announcement at
              CES January 2026, Uber has expanded its AV roster: a $375M strategic investment in Avride for
              Dallas service (December 2025), a $1.25 billion Rivian deal for up to 50,000 autonomous R2 vehicles
              by 2028 targeting San Francisco and Miami, and an expanded Waymo partnership across ten US cities
              by 2026. Waymo's operational traction—500,000+ weekly rides and 4.8-star ratings—gives Uber a
              dominant AV supplier it will not exit. Nuro's 35,000-vehicle target competes with Rivian's 50,000-
              vehicle Uber commitment at scale. Uber has not publicly stated any minimum Nuro volume or exclusivity.

              Geographic concentration in the SF Bay Area means a single regulatory action, safety moratorium,
              or weather event could halt all Nuro commercial activity simultaneously. No second licensing
              customer beyond Uber has been publicly disclosed, removing any revenue diversification buffer.
