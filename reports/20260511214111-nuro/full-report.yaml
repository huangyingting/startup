  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape Overview
        blocks:
          - type: paragraph
            body: |
              Nuro's commercial launch window is narrow and multi-conditional. Six distinct risk categories can each
              individually delay or prevent paid robotaxi service: (1) regulatory — multiple California permit approvals
              remain outstanding after the May 2026 CPUC Drivered Pilot permit; (2) legal — California AB 1777
              effective July 2026 creates direct corporate citation authority against AV manufacturers, and nuclear
              verdict exposure from a single serious incident could threaten the company's existence; (3) operational
              and cybersecurity — fleet-scale cyber exploits and sensor degradation create service disruption and
              safety risks; (4) partner-dependency — Lucid Motors carries a market-implied ~50% bankruptcy probability
              before 2027, and Uber has publicly expanded its AV supplier roster to include Waymo, Avride, and Rivian;
              (5) people and execution — the 2022–2023 restructuring eliminated approximately 950+ engineering roles
              and reduced headcount from ~1,200 to ~250, creating persistent brain-drain risk; and (6) financial
              model — Nuro has no disclosed revenue and requires three additional regulatory approvals before it can
              charge a fare. The Risk Heatmap (FR001) maps severity versus likelihood across these six dimensions.
              Overall risk posture: the regulatory and partner-dependency categories carry the highest combined
              severity-likelihood scores; the legal and cybersecurity categories carry the highest tail risk given
              the potential for single-event catastrophic outcomes.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR039
