  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary Definition
        blocks:
          - type: paragraph
            body: >
              Nuro's addressable market sits at the intersection of three adjacent spend pools: robotaxi-as-a-service
              (RaaS), autonomous vehicle (AV) software licensing, and the broader ride-hailing and rideshare market that
              constitutes the status quo Nuro aims to displace. Included spend encompasses per-ride fare revenue from
              commercial AV passenger services, licensing and royalty fees paid by automotive OEMs and mobility
              platforms for AV software and hardware integration, and fleet operations infrastructure contracts.
              Excluded spend includes personal vehicle AV systems (ADAS, Level 2-3 features sold to retail consumers),
              non-commercial AV operations (research, government testing), and vehicle hardware manufacturing costs
              (sensors, compute platforms) which Nuro does not sell directly.


              The status-quo substitute is human-driven rideshare: in 2023 the global rideshare market reached $128B in
              gross bookings, with the US contributing $28.5B. This baseline is the demand pool Nuro must capture or be
              validated against. Adjacent markets include autonomous freight and logistics (excluded from this chapter)
              and fleet telematics/management services (included only where directly enabling the Nuro-Lucid-Uber
              deployment). Nuro's licensing model means its direct revenue comes from the OEM/fleet operator layer, not
              from end-consumer fares—a market boundary distinction material to any SAM estimation. See TM001 for the
              segmented view.
            claimRefs:
              - CM009
              - CM010
              - CM037
          - type: table
            tableRef: TM001
            claimRefs:
              - CM009
              - CM010
              - CM037
      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              No consensus estimate for the robotaxi TAM exists. Four credible analyst lenses span a 1,500x range in
              their 2035 terminal values: Fortune Business Insights forecasts $96.31B (CAGR 71.9%), Expert Market
              Research $86.21B (CAGR 78%), Cervicorn Consulting $283.47B (CAGR 59.4%), and Goldman Sachs approximately
              $400B—all projected to 2034-2035. The divergence stems from differing starting-year base market sizes
              ($0.27B to $2.68B in 2025), geography scope, and whether the estimate captures the value of the full ride
              (RaaS) or only the technology licensing layer. Goldman Sachs also projects a total AV sector of $2T, with
              $300B attributable to AI-enabled revenue, providing the broadest macro context.


              The AV software licensing market (Nuro's direct revenue model) is a distinct, smaller segment. Precedence
              Research sizes it at $2.30B in 2025 growing to $8.04B by 2035 at 13.33% CAGR—less explosive but more
              directly relevant to Nuro's licensing economics. North America leads with approximately 37% of the
              robotaxi market share, implying a $31-148B North American SAM range by 2035 depending on which TAM
              estimate is used. Level 4 autonomy accounts for 91% of commercial deployments globally, and EVs represent
              68% of fleets, both consistent with Nuro's Lucid Gravity platform positioning. A US-specific estimate from
              analyst sources projects $18.27B in 2026 growing to $40B+ by 2030 for robotaxi services alone. The SOM for
              Nuro specifically is not quantifiable without licensing fee disclosures; see FM001 and FM002 for visual
              context on the sizing landscape, and TM002 for the multi-source comparison.
