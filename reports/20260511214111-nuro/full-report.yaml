      - number: '4.3'
        title: Unit Economics and Cost Structure
        blocks:
          - type: paragraph
            body: >
              Nuro's unit economics are fundamentally difficult to assess because the company is pre-commercial and does
              not publish cost-per-mile, cost-per-vehicle, or gross-margin data. The best available comparables come
              from Waymo, the only robotaxi operator with disclosed cost benchmarks: Waymo's estimated operating cost
              per autonomous mile fell from approximately $0.84 in 2024 to a target of $0.51 in 2025, driven by hardware
              cost reduction on the Jaguar I-PACE and Zeekr platform and increasing vehicle utilization. Nuro's per-mile
              costs are likely higher than Waymo's at present because Nuro operates a smaller, less mature fleet with
              higher per-vehicle integration costs on the Lucid Gravity platform. The Lucid Gravity base vehicle costs
              approximately $70,000–$80,000 before autonomous hardware integration; assuming $50,000–$100,000 in
              additional sensor, compute, and integration costs, each Nuro-powered vehicle represents $120,000–$180,000
              in hardware capital. Amortized over five years and 500,000 cumulative miles, this implies $0.24–$0.36/mile
              in hardware depreciation alone. Operating costs—insurance, remote-ops staffing, charging, maintenance—add
              an estimated $0.50–$1.00/mile at early scale, for a total estimated operating cost of $0.80–$1.50/mile. On
              the revenue side, if Nuro captures a 10–20% share of an average $20 Uber fare across a 4-mile average
              ride, Nuro's per-ride revenue would be $2–$4, equating to $0.50–$1.00/mile—insufficient to cover operating
              costs at current scale. Software-only gross margin at scale (royalties only, fully amortized) is estimated
              at 60–85%, consistent with Mobileye's 80%+ licensing margins, but this level requires eliminating direct
              fleet-ops exposure, which Nuro achieves structurally through the Uber-Hertz model. Capital intensity
              remains elevated because Nuro must fund multi-city testing, validation infrastructure, and safety
              certification before per-mile royalties approach operating costs.
