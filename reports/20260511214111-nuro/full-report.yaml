  - id: FE001
    type: stack
    title: Product Architecture Map
    description: >-
      Layered software and hardware stack of the Nuro Driver system as deployed in the Lucid Gravity robotaxi. Layers
      run from the vehicle/compute hardware at the bottom to the demand and fleet management platform at the top.
    layout: standard
    summary: >-
      Nuro Driver is a software-only stack layered over NVIDIA DRIVE AGX Thor compute and Lucid Gravity hardware, with
      Uber providing demand/fleet distribution above the autonomy layer.
    data:
      layers:
        - label: Demand & Fleet Platform
          modules:
            - Uber App — booking, AV dispatch API, rider matching
            - Hertz/Oro Mobility — depot charging, cleaning, maintenance
          note: Single distribution channel (Uber); fleet ops outsourced to reduce Nuro capex
        - label: Remote Operations
          modules:
            - Nuro Remote Ops Center — 24/7 human-in-the-loop monitoring
            - 5G uplink to fleet; edge-case escalation and safe-stop commands
          note: Relies on continuous 5G connectivity; operator coverage required around the clock
        - label: Autonomy Software (Nuro Driver™)
          modules:
            - Mapping & Localization — HD maps + centimeter-precision real-time localization
            - 'Perception — AI fusion: solid-state LiDAR, 4 camera types, imaging radar, IMU, microphones'
            - Prediction — ML trajectory/intent forecasting (CIMRL 2024 research)
            - Planning & Control — real-time trajectory generation + triple-redundant vehicle interface
            - Safety & Fallback Layer — rules-based validator + parallel fallback stack
          note: Core proprietary IP; AI-first throughout; rules-based validators run alongside ML models
        - label: Simulation & Validation
          modules:
            - Google Kubernetes Engine (GKE) — large-scale AV scenario simulation
            - Foretellix — coverage-driven edge-case scenario generation and replay
          note: Simulation-first training; sim-to-real gap remains a fundamental challenge
        - label: Compute Hardware
          modules:
            - NVIDIA DRIVE AGX Thor — 2000 TOPS (FP4), 1000 INT8 TOPS, ASIL-D certified
            - Arm Neoverse V3AE CPU — automotive-grade; Nuro–Arm multi-year partnership
            - 64 GB LPDDR5X at 273 GB/s; DRIVE OS 7 with TensorRT 10
          note: Single-vendor NVIDIA dependency; 350W peak power draw; Blackwell architecture
        - label: Vehicle Platform
          modules:
            - Lucid Gravity SUV — OEM-modified; >400 mi range; sole vehicle partner
            - Low-profile 'halo' roof sensor pod — integrates LiDAR, cameras, radar
          note: Nuro does not manufacture the vehicle; sole OEM dependency creates concentration risk
    sourceRefs:
      - SE001
      - SE002
      - SE003
      - SE006
    claimRefs:
      - CE009
      - CE010
      - CE011
      - CE012
