      - number: '5.2'
        title: Technology Architecture and Compute Stack
        blocks:
          - type: paragraph
            body: >
              The Nuro Driver software stack is organized into six functional layers: mapping and localization,
              perception, prediction, planning and control, safety and redundancy, and remote operations. The stack is
              AI-first throughout, meaning deep learning models rather than purely rule-based systems govern the
              critical perception and prediction layers; rules-based validators run in parallel as a safety backstop to
              catch model failures.


              Mapping and localization use a combination of pre-built high-definition maps (HD maps) generated by
              mapping vehicles and real-time sensor fusion to localize the vehicle to within centimeters. Perception
              fuses data from four camera types (ultra-long-range 30° FOV, long-range, short-range, and traffic-light
              detection cameras with 24-bit HDR), solid-state LiDAR (long-range and short-range, no moving parts vs.
              rotary predecessors), high-resolution long-range imaging radar, a calibrated IMU rated to ASIL-D, and
              microphones for emergency vehicle siren detection. All sensors have 360-degree coverage and are
              distributed across the vehicle body and a compact low-profile 'halo' roof module integrated into the Lucid
              Gravity.


              Prediction uses ML models trained on hundreds of millions of driving examples to forecast the trajectory
              and intent of surrounding vehicles, pedestrians, cyclists, and other road agents. Planning consumes
              perception and prediction outputs to generate a trajectory that is safe, comfortable, and
              regulation-compliant; it re-evaluates and re-plans in real time as the environment changes. Control
              translates the planned trajectory into steering, throttle, and braking commands, with triple-redundant
              vehicle interface hardware for fault tolerance.


              The entire stack runs on the NVIDIA DRIVE AGX Thor centralized compute platform, which delivers up to
              2,000 TOPS (FP4) or 1,000 INT8 TOPS using a Blackwell-architecture GPU with Arm Neoverse V3AE CPUs, 64 GB
              LPDDR5X RAM at 273 GB/s bandwidth, and ISO 26262 ASIL-D safety certification. DRIVE AGX Thor ships with
              NVIDIA DRIVE OS 7 (QNX-based safety kernel), DriveWorks middleware, and TensorRT 10 inference runtime. The
              platform replaces the previous-generation DRIVE Orin (254 INT8 TOPS), representing a roughly 4×
              improvement in AI inference performance. Nuro also maintains a multi-year partnership with Arm to optimize
              the Nuro Driver on Arm's Automotive Enhanced (AE) architecture, improving power efficiency and enabling
              manufacturing-grade deployability. Lenovo has announced a collaboration to accelerate Nuro Driver
              development on the NVIDIA DRIVE platform for fleet-scale deployments.
