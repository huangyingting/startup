  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Model and Tier Structure
        blocks:
          - type: paragraph
            body: >-
              Nuro operates a pure B2B technology licensing model, supplying its Nuro Driver autonomous vehicle software
              stack and associated hardware integration to commercial operators rather than deploying its own fleet or
              marketing directly to riders. This positions Nuro as a horizontal technology layer whose end-users are
              reached only indirectly through operator partners. The customer hierarchy has three functional tiers. Tier
              1 strategic platform partners—currently Uber, Lucid Motors, and Hertz/Oro Mobility—hold contractual,
              long-horizon relationships with Nuro and bear commercial risk. Tier 2 fleet operators (a category not yet
              populated by any publicly disclosed second customer) would scale Nuro's technology across different
              vehicle programs or geographies. Tier 3 end users interact with Nuro's technology only via the Uber
              booking platform and have no direct commercial relationship with Nuro. A fourth historical category—the
              delivery-era customers (Kroger, Walmart, FedEx, 7-Eleven)—represents Nuro's prior go-to-market, which was
              paused entirely in 2023. The pivot from consumer-adjacent delivery operations to pure B2B licensing is
              strategically coherent but leaves Nuro without a consumer brand or any independent demand channel.
              Consumer acquisition now belongs entirely to Uber, meaning Nuro's fortunes are structurally tied to Uber's
              robotaxi execution and market appetite. Nuro's Uber robotaxi program is targeting the San Francisco Bay
              Area as the initial launch market, with on-road driverless testing underway in 2026 following the CPUC
              permit secured in May of that year. The licensing model, if validated at commercial scale, could support
              expansion to other ride-hailing platforms, municipal fleets, or international operators—but no such
              pipeline is publicly disclosed as of the report date.
