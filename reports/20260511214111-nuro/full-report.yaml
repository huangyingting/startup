      - number: '7.5'
        title: People and Execution Risks
        blocks:
          - type: paragraph
            body: |
              Nuro's two restructuring rounds—approximately 300 roles (20%) in November 2022 and approximately
              340 roles (30%) in May 2023—reduced headcount from a peak of approximately 1,200 to approximately
              250 employees. The departed engineers carried specialized knowledge of Nuro's R1/R2 hardware
              generations, sensor calibration procedures, mapping pipelines, and operational data assets. The
              loss of this institutional knowledge is not reversible on a short timeline; rebuilding the AV
              engineering bench sufficient to support a commercial fleet at scale would require 18–24 months
              of hiring even with adequate capital.

              Co-founder Dave Ferguson was elevated to co-CEO alongside co-founder Jiajun Zhu in October 2025,
              formalizing a co-leadership structure the two have maintained throughout the company's 14-year
              history. The co-CEO model is uncommon at commercial launch stage and introduces decision-latency
              risk on time-sensitive regulatory and commercial decisions. Neither succession plan nor named
              deputy has been publicly disclosed for either co-CEO. A simultaneous departure of both co-founders
              would represent an existential event for the company.

              The AV talent market in 2026 remains highly competitive. Waymo, Cruise (GM), Motional, Aurora,
              and technology companies including Apple, Google, and Meta all actively recruit from the same
              talent pool of AV engineers. Nuro's below-peak headcount and absence of disclosed equity refresh
              programs create retention risk for the ~250 remaining engineers, particularly given the company's
              lack of commercial revenue to anchor near-term employee financial incentives.
            claimRefs:
              - CR031
              - CR032
              - CR033
              - CR034
              - CR035
