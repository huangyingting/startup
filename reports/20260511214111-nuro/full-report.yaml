      - number: '3.4'
        title: Moat Durability and Risk Assessment
        blocks:
          - type: paragraph
            body: >
              Nuro claims four primary competitive moats as of mid-2026: (1) technology leadership via a licensable
              end-to-end L4 AI stack, (2) preferred and potentially exclusive relationships with Lucid Motors and Uber
              Technologies, (3) a safety track record of zero at-fault incidents across 1.7M+ driverless miles, and (4)
              first-mover advantage as the only publicly disclosed B2B AV software licensor targeting an
              OEM-plus-demand-operator commercial ecosystem. Each moat faces a credible threat that warrants diligence.


              The technology moat is contested on data scale: Waymo's 127M+ driverless miles versus Nuro's 1.7M creates
              a roughly 75x training data gap, and Tesla's fleet of 4M+ FSD-capable vehicles generates supervised
              driving data orders of magnitude larger (though supervised miles are lower-quality for L4 training than
              fully driverless miles). Nuro's claim of superior driverless-specific data is plausible but unverified; no
              side-by-side safety metric comparison with Waymo has been publicly published. The partnership moat is
              contested by Uber's documented multi-homing: Uber simultaneously invested in Nuro (August 2025 Series E),
              launched the Zoox-Uber Las Vegas integration (summer 2026 target), partnered with May Mobility for
              Arlington TX (May 2025), and has a long-standing integration with Motional (Uber+Lyft dual platform). The
              safety moat is valid as a marketing asset but not differentiated at the institutional level—Waymo's 90%
              serious-injury reduction versus human drivers across 127M miles is a larger, more peer-reviewed track
              record. The licensing model moat is the most distinctive: Waymo, Tesla, Zoox, and Motional have not
              announced comparable B2B licensing offerings, and Mobileye's model competes at a different stack layer. If
              Waymo were to announce a licensing product, Nuro's primary moat would be materially threatened. The Moat
              Durability Risk Register (TP004) catalogs each threat with severity and recommended diligence asks.
