      - number: '5.5'
        title: Product Roadmap and Technology Risks
        blocks:
          - type: paragraph
            body: >
              Nuro's publicly stated product roadmap has three sequential milestones: (1) driverless testing on public
              roads with no passengers (achieved, April 2026 DMV permit); (2) passenger-carrying rides with a safety
              driver for Uber employee pilots (active, May 2026 CPUC drivered permit); and (3) fully driverless
              commercial fare-based service for the general public in the SF Bay Area, targeted for late 2026. The
              longer-term road map—geographic expansion, additional OEM partnerships, and international deployment—has
              not been publicly detailed beyond the Lucid-Uber partnership.


              The technology risk landscape is significant. Sensor degradation in adverse weather (rain, snow, heavy
              fog) remains a persistent challenge for all solid-state LiDAR and camera systems; Nuro's use of
              high-resolution imaging radar provides partial mitigation but does not fully resolve perception failures
              in low-visibility conditions, as radar delivers velocity and range data but not the fine-grained semantic
              scene understanding provided by cameras and LiDAR. Compute latency at edge is a secondary risk: the DRIVE
              AGX Thor's 350 W peak power draw and thermal management requirements add vehicle weight and complexity,
              and any latency increase above ~100ms in the perception-planning loop degrades safety margins. Edge
              cases—unusual road configurations, construction zones, emergency vehicle interactions—continue to require
              human remote-operator escalation and represent the long tail of technical challenges that distinguish
              limited-ODD deployments from general-purpose Level 5 autonomy.


              Key dependencies introduce supply-chain and partnership risk. The NVIDIA DRIVE AGX Thor compute is sourced
              from a single supplier (NVIDIA); any disruption to NVIDIA's supply chain, pricing changes following the
              initial partnership pricing, or a shift to a competing platform would require re-validation of the entire
              Nuro Driver stack on new hardware, a multi-year engineering effort. Lucid Motors, as the sole vehicle OEM
              partner, introduces similar concentration risk: any production delays, financial distress at Lucid, or
              renegotiation of the integration agreement would delay vehicle availability. The Uber platform is the sole
              commercial distribution channel, meaning Nuro's revenue ramp is entirely a function of Uber's fleet
              deployment speed and rider demand.


              Developer ecosystem development is nascent: no public API or developer SDK for the Nuro Driver has been
              disclosed as of May 2026, limiting the prospect of third-party tool integration and creating a strategic
              asymmetry relative to more open AV platforms. The absence of a published SDK also makes it difficult for
              prospective OEM partners beyond Lucid to evaluate the stack for integration, which may slow the
              diversification of the OEM customer base that the licensing model requires for long-term scale.
