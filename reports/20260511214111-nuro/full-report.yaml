      - number: '3.2'
        title: Feature Capabilities and Differentiation
        blocks:
          - type: paragraph
            body: >
              Nuro's technology differentiation rests on three pillars relative to the competitive set: (1) a
              hardware-agnostic, licensable L4 AV stack (Nuro Driver) deployable across multiple vehicle platforms, (2)
              an end-to-end AI architecture purpose-built for open-domain urban robotaxi deployment on NVIDIA DRIVE AGX
              Thor compute, and (3) a 1.7M-autonomous-mile safety record with zero at-fault incidents—a claim no direct
              competitor has specifically refuted. Against Waymo, the critical structural difference is the business
              model: Waymo builds, owns, deploys, and operates its own fleet and has not publicly offered a licensing
              model to third parties. Nuro's B2B licensing model creates a complementary role as an AV stack supplier to
              OEM-platform ecosystems that Waymo does not serve. However, Waymo's 127M+ driverless miles compared to
              Nuro's 1.7M represents a roughly 75x data scale gap that bears directly on AI model quality, edge-case
              coverage, and the defensibility of Nuro's safety claims over time.


              Tesla's camera-only autonomous architecture lacks lidar, which the majority of safety researchers and most
              industry peers consider a residual risk for all-weather, occlusion-heavy open-domain operation; Nuro's
              multi-sensor fusion (camera + lidar + radar) addresses this gap directly. Aurora's stack is commercially
              proven in highway trucking but has not been adapted for urban passenger robotaxi, making it a
              non-competing in-segment peer. Zoox's technology is technically impressive (purpose-built bi-directional
              vehicle with 360-degree sensor coverage), but its stack is proprietary and non-licensable, making Zoox an
              Amazon-only deployment play rather than a technology licensing competitor. Motional's AI-first foundation
              model approach is the most architecturally comparable to Nuro, but Motional's Hyundai-only vehicle
              integration and no announced licensing program means it does not threaten Nuro's OEM-agnostic licensing
              positioning. Mobileye's Sup-Scalaer 2.0 platform offers a comparable licensing model for ADAS and is
              threading toward robotaxi—this is the closest analog to Nuro's B2B model—but Mobileye currently competes
              at the chip and sensor layer, not the full software stack that Nuro licenses.
