  - id: TM004
    title: Growth Drivers and Constraints
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Robotaxi Market
      - Diligence Ask
    rows:
      - - AV technology cost curve (sensors, compute)
        - Driver
        - 2025–2030
        - >-
          Unit cost reduction enables sub-$1/mile operation; critical for profitability at scale; Goldman Sachs places
          below-$1 milestone by 2035
        - >-
          Track NVIDIA DRIVE AGX and lidar cost curves; validate Nuro's bill-of-materials per vehicle and learning curve
          assumptions
      - - California 3-stage AV permitting (DMV + CPUC)
        - Mixed
        - 2026–2028+
        - >-
          Regulatory clarity enables commercial planning but adds 18-24+ months per stage; 50,000 miles per stage
          requirement for light-duty AVs; first-ever heavy-duty AV auth at 250K miles
        - Track Nuro's Stage 1 miles accumulation timeline; confirm CPUC driverless ride-hailing permit application date
      - - Consumer trust deficit (60% afraid; 53% would not ride)
        - Constraint
        - 2025–2032
        - >-
          Majority-fear dynamic limits near-term market to tech-forward segments; 51% Gen Z comfort signals generational
          shift; full majority acceptance may not come until late 2030s
        - >-
          Monitor AAA/S&P annual consumer trust surveys; track first-mover incident rates and public response; watch Gen
          Z ridership data from Waymo
      - - Uber platform scale and demand aggregation
        - Driver
        - Current
        - >-
          Uber's 13.5B trips/year + 72% US rideshare share provides launch runway for Nuro; platform network effect is
          the critical go-to-market lever; Uber-Rivian deal shows Uber hedging with parallel AV suppliers
        - >-
          Confirm Uber exclusivity windows; validate demand density and surge pricing at SF Bay Area launch; review
          Uber's milestone terms with Nuro
      - - AV safety incident volume (6,450 incidents; 51% YoY increase)
        - Constraint
        - Current–2027
        - >-
          Rising NHTSA incident volume creates headline and regulatory risk; an adverse safety event could trigger
          permit suspension or public backlash; ADS crash rate (9.1 vs 4.1 human) is a contested metric
        - >-
          Audit NHTSA incident database for Nuro-specific records; track California DMV disengagement and incident
          disclosures for Nuro fleet; monitor for CPUC enforcement actions
      - - Competitive capital deployment (Waymo $16B; Uber-Rivian $1.25B)
        - Constraint
        - Current
        - >-
          Heavy competitor capital accelerates market development but compresses pricing and talent availability;
          Waymo's 500K rides/week sets the bar; Uber-Rivian creates a parallel fleet that competes for Nuro's
          utilization
        - >-
          Assess Nuro's $203M Series E runway vs competitors; model capital requirements to reach 35,000 vehicle
          deployment; validate whether Uber exclusivity or minimum-volume commitments protect Nuro
    notes: >-
      Drivers and constraints are assessed relative to the Nuro-Lucid-Uber 2026 commercial launch timeline. Timing
      buckets: Current = affecting now; 2025-2030 = medium-term; 2030+ = long-horizon. Regulatory constraints are
      California-specific; other geographies have different frameworks.
