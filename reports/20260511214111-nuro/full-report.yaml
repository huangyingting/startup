      - number: '8.2'
        title: Comparable Company Valuation Analysis
        blocks:
          - type: paragraph
            body: |
              Nuro's $6B valuation must be evaluated against a sparse but growing set of public and private
              AV comparables. Waymo remains the clearest direct comparable: a Feb 2026 Alphabet funding
              round set Waymo's valuation at $126B on the strength of ~500K rides/week across five US cities
              and an estimated ~$350M annualized revenue run rate, implying a ~360x EV/revenue multiple.
              That multiple reflects Waymo's position as a dominant autonomous mobility platform with network
              effects, regulatory moats, and a $16B+ capital base — none of which Nuro replicates at present.
              At $6B, Nuro trades at roughly 1/21 of Waymo's valuation, representing a large haircut for
              pre-commercial status and smaller scale. The question for investors is whether that discount
              is sufficient.

              Aurora Innovation (NASDAQ: AUR) provides the most structurally comparable licensing model.
              Aurora reported $0 in recognized revenue in its 2024 10-K SEC filing but has progressed to
              commercial autonomous trucking operations in 2025, with S&P Global projecting revenue scaling
              to $3.1B by 2030. Aurora's market cap reached ~$14.2B in May 2026, implying a significant
              forward revenue premium for an early-commercial AV software company — actually higher than Nuro's
              $6B on an absolute basis, though Aurora's trucking market TAM is larger and near-term revenue
              visibility is stronger. Mobileye (NASDAQ: MBLY) is the revenue-generating comparable: $1.89B
              in 2025 revenue (+15% YoY), $7.8B market cap in May 2026, and a ~4.1x P/S ratio. Mobileye's
              economics demonstrate that high-volume AV hardware/software licensing at scale is achievable,
              though Nuro's pure-software model should command higher margins at comparable scale.

              Among Chinese L4 operators, Pony.ai (NASDAQ: PONY) traded at $4.6B post-IPO in Nov 2024 on
              ~$52M TTM revenue (implying ~90x EV/revenue) and WeRide (NASDAQ: WRD) traded at ~$4.7B IPO
              valuation on ~$15–25M estimated 2024 revenue (implying ~90–130x). These comps confirm that
              public markets assign very high forward multiples to pre-scale L4 operators with real-world
              commercial deployments, though both Pony.ai and WeRide are further along on commercial
              revenue recognition than Nuro. Zoox (Amazon subsidiary, acquired 2020 for $3.2B) provides
              a private-market floor: likely valued at $5–8B today given AV market growth since acquisition,
              with Nuro's superior OEM and platform partnerships potentially justifying a premium.

              The composite comparable analysis supports a fair-value range of $4–8B for Nuro, with $6B
              falling within that range. The key valuation risk is that the comps are uniformly pricing in
              future execution — none provide a risk-adjusted discount for the specific Lucid, Uber, and
              regulatory risks Nuro faces.
