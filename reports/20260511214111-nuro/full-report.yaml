      - number: '7.3'
        title: Operational and Cybersecurity Risks
        blocks:
          - type: paragraph
            body: |
              Nuro's AV stack fuses camera, LiDAR, and imaging radar via a learned end-to-end neural architecture
              (the Nuro Autonomy Model, NAM). Any single-sensor degradation or adversarial perturbation can trigger
              L4 disengagement and fallback to remote-operator control, directly affecting service quality and
              ride completion rates. The NAM's reliance on learned scene representations introduces a class of
              adversarial patch attacks that are not addressed by ISO 21434 or traditional automotive cybersecurity
              frameworks. NHTSA crash data shows 392 Level 2+ crashes in the 2022–2024 reporting period, with 17%
              involving injuries; scaling to a fully driverless L4 deployment raises the absolute incident count
              even if the per-mile rate is lower than human-driven baselines.

              Upstream.auto's 2026 Global Automotive Cybersecurity Report identifies fleet-scale vulnerability as
              the defining threat: 61% of connected-vehicle security incidents had the potential to impact thousands
              to millions of vehicles simultaneously, and ransom incidents doubled year-over-year, accounting for
              44% of all incidents. For Nuro, a single successful exploit of its cloud-based fleet management
              backend could simultaneously disable or manipulate all vehicles in the Bay Area fleet. Nuro has not
              published a cybersecurity framework, SOC-2 certification, or penetration testing status publicly.

              NVIDIA DRIVE AGX Thor is Nuro's sole confirmed compute platform. An NVIDIA supply constraint or
              export restriction (historically relevant for advanced chips) would directly delay fleet scaling
              because no alternative compute platform has been publicly validated. Hertz/Oro Mobility's fleet
              management role creates an indirect uptime dependency: quality failures analogous to Hertz's 2024
              Uber EV maintenance recall would degrade Nuro's service record and safety metrics without Nuro
              having direct remediation authority over the fleet.
