    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Model
        blocks:
          - type: paragraph
            body: >-
              Nuro, Inc. is a Physical AI company headquartered in Mountain View, California, incorporated in 2016 by
              Jiajun Zhu and Dave Ferguson, both alumni of Google's pioneering self-driving car program (now Waymo). The
              company's core commercial product is the Nuro Driver™—an AI-first, Level 4 autonomous driving system that
              is vehicle-agnostic and designed to be licensed to automotive OEMs, mobility providers, and fleet
              operators. Nuro describes itself as building 'the world's most scalable driver,' combining cutting-edge
              end-to-end AI with automotive-grade hardware to give partners a clear and cost-effective path to
              commercial autonomy. The Nuro Driver integrates sensor fusion across high-resolution cameras, solid-state
              lidar, and radar, and runs on NVIDIA's DRIVE AGX Thor computing platform. Complementing the Nuro Driver is
              the Nuro Toolkit, a customizable SDK enabling deeper integration. The company's mission—'Autonomy for all.
              All roads, all rides.'—reflects a shift from a vertically integrated delivery-bot operator to a horizontal
              technology licensor serving OEMs, ride-hailing platforms, and logistics companies. Nuro validates
              five-plus years of driverless deployments, over 1.7 million autonomous miles, and zero at-fault incidents
              as the commercial proof-point behind its licensing offer.
