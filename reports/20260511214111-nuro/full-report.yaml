companyProfile:
  summary: >
    Nuro is a Mountain View, California-based autonomous vehicle software company founded in 2016 by Jiajun Zhu and Dave
    Ferguson, former Google Brain engineers. After pioneering a purpose-built delivery robot (Nuro R2, retired 2022),
    Nuro pivoted to licensing its "Nuro Driver" autonomy software stack to fleet operators and OEMs. Its first
    commercial deployment is a three-way partnership with Lucid Motors (vehicle) and Uber (ride-hailing platform),
    targeting robotaxi service in the San Francisco Bay Area in 2026. Nuro raised $203M in Series E funding at a $6B
    valuation in August 2025, backed by NVIDIA, Khosla Ventures, SoftBank, Google, and Honda. The company holds a
    California DMV driverless testing permit (granted May 2026) and is pursuing CPUC commercial service approval.
