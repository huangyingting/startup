      - number: '5.4'
        title: Regulatory Standing and Safety Compliance
        blocks:
          - type: paragraph
            body: >
              Nuro has accumulated a meaningful regulatory track record relative to its size. In 2020, Nuro's R2
              purpose-built delivery robot received the first NHTSA federal safety exemption ever granted to an AV
              manufacturer—an exemption from Federal Motor Vehicle Safety Standards (FMVSS) that normally require
              features such as pedals and mirrors designed for human occupants. This exemption was a landmark regulatory
              signal and established Nuro's credibility with federal safety regulators before any other AV company
              achieved the same designation. The R2 program was retired in 2022 as Nuro pivoted to software licensing.


              In the current robotaxi program, Nuro obtained: (1) a California DMV Driverless Testing Permit in April
              2026, authorizing public road testing of Lucid Gravity vehicles at speeds up to 45 mph without a safety
              driver in Santa Clara and San Mateo counties; and (2) a CPUC Drivered Pilot Permit in May 2026,
              authorizing passenger-carrying rides with a safety driver for validation purposes. As of May 2026, Nuro
              has not yet filed for or received the California DMV Autonomous Vehicle Deployment Permit or the CPUC
              Driverless Deployment Permit required for commercial driverless fare-based service. Only five companies in
              California currently hold both the DMV driverless testing permit and a CPUC passenger permit, placing Nuro
              in an elite regulatory cohort.


              California DMV disengagement data from 2021 (the most recent year of Nuro's active driverless testing
              before the R2 retirement) showed a relatively low disengagement rate for Nuro's delivery vehicle
              operations, consistent with the company's low-speed, geofenced operational design domain. The 2022 data
              from the broader industry showed that 26% of disengagements across all AV companies were attributable to
              software/hardware failures, 35% to planning/localization errors, and 21% to perception problems,
              establishing the industry benchmark against which Nuro's technical performance can be contextualized.


              On compute safety, the NVIDIA DRIVE AGX Thor platform carries ISO 26262 ASIL-D certification and ISO 21434
              cybersecurity compliance—the highest automotive safety integrity level—providing a hardware foundation for
              Nuro's regulatory submissions. Nuro's autonomy stack safety architecture includes parallel fallback
              stacks, rules-based validators running alongside the AI models, and a remote operations layer for
              human-in-the-loop intervention in complex scenarios.


              A material regulatory risk remains: the California DMV and CPUC Driverless Deployment Permits required for
              commercial operation have not been filed or issued, meaning the Q4 2026 commercial launch timeline is
              contingent on regulatory approvals that remain at regulator discretion and could be delayed if testing
              incidents occur.
