          Ongoing — risk materializes with every commercial passenger mile; substantially elevated post-commercial
          launch given passenger liability
        - >-
          Review Nuro's real-time incident monitoring and teleoperation protocols; confirm insurance coverage for
          commercial passenger robotaxi; review CPUC permit conditions including incident reporting and suspension
          triggers; assess whether current safety record reflects delivery-bot environment vs passenger robotaxi context
      - - AV data flywheel (1.7M proprietary driverless miles) provides durable edge-case coverage advantage
        - >-
          Tesla's 4M+ FSD vehicles generate supervised driving data at orders-of-magnitude larger scale; even at lower
          quality-per-mile, sheer volume may enable Tesla to leapfrog narrow-domain moats
        - High
