      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              The robotaxi market is shaped by countervailing forces. On the driver side: AV technology cost curves are
              falling—Goldman Sachs projects costs below $1/mile by 2035, and mature AV fleets are expected to operate
              at $0.30-$0.50/mile versus $2.50-$4.00/mile for human rideshare today. California's multi-stage AV
              permitting framework (adopted April 28, 2026) provides regulatory clarity for the first time, establishing
              a 3-stage process with 50,000 autonomous miles per stage for light-duty AVs. Uber's existing platform
              scale (13.5B trips/year, 72% US rideshare share) provides demand aggregation critical for launching Nuro's
              fleet economically. Waymo's trajectory—growing 10x from 50,000 to 500,000 paid rides/week between May 2024
              and March 2026, with $16B raised at a $126B valuation—validates commercial robotaxi economics and creates
              market acceptance reference points.


              On the constraint side: consumer trust remains deeply problematic. AAA's February 2025 survey found 60% of
              Americans are afraid of AVs and 53% would not ride in a robotaxi; only 13% trust them. While FinanceBuzz
              2026 data shows improvement (37% willing, up from 21% in 2018, with 51% Gen Z comfort), the majority-fear
              dynamic limits near-term addressable market to tech-forward early adopters. AV safety incident volumes are
              rising—NHTSA records 6,450 total AV incidents through 2025, a 51% YoY increase—though ADS-caused
              fatalities remain rare (2 confirmed). Gridwise 2026 data shows AV deployments are already causing
              competitive displacement: trips/hour fell 5.3% in AV-active cities versus 2.6% nationally. The regulatory
              path adds 18-24+ months per stage before a commercial driverless permit is achievable, and cost-per-mile
              parity with human rideshare is not expected until 2040-2041. The Uber-Rivian deal ($1.25B milestone-based,
              50,000 vehicles by 2031) signals intense competitive capital deployment that compresses pricing and raises
              the bar for Nuro's deployment timeline. TM004 catalogs the full driver/constraint register; FM004
              illustrates the deployment value chain.
            claimRefs:
