      - number: '4.4'
        title: Capital Structure and Financial Adequacy
        blocks:
          - type: paragraph
            body: >
              Nuro has raised approximately $2.34 billion across six funding rounds since its 2016 founding, most
              recently the $203 million Series E closed in two tranches (April 2025: $106M; August 2025: $97M) at a $6
              billion post-money valuation. The Series E investors include strategic partners Uber and NVIDIA (both
              first-time equity holders) alongside returning institutional investors Baillie Gifford, T. Rowe Price,
              Fidelity, and Tiger Global. Uber's tranche is milestone-conditioned, meaning a portion of the $97M August
              close is contingent on Nuro achieving commercial deployment objectives; the specific milestones and the
              total conditioned amount are not publicly disclosed. SoftBank Vision Fund, which led Nuro's Series A
              ($92M, 2018) and Series B ($940M, 2019), did not publicly participate in the Series E; its current stake
              is undisclosed and may have been diluted significantly by the intervening rounds. The Series D (November
              2021, $600M, Tiger Global) established Nuro's peak valuation of $8.6 billion—a 30% premium to the current
              $6B Series E valuation, reflecting the AV sector-wide valuation reset of 2022–2024. Following the
              2022–2023 restructuring, Nuro's estimated annual burn fell from an estimated $200–360M/year at 1,200
              headcount to approximately $50–100M/year at ~250 headcount. At $50–100M/year burn and $203M raised in
              August 2025, Nuro has an estimated 18–24 months of runway through late 2026 to mid-2027—roughly coinciding
              with its announced Bay Area commercial launch timeline. Commercial revenue from licensing and revenue
              share, if it materializes in late 2026, could meaningfully extend runway; the Uber-Rivian parallel deal
              ($300M initial, up to $1.25B milestone-conditioned) signals that Uber is also allocating substantial
              capital to parallel AV programs, creating potential competition for robotaxi mindshare. The NVIDIA equity
              investment deepens a compute partnership and may provide favorable DRIVE AGX Thor hardware pricing,
