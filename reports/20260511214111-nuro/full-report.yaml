      - number: '2.3'
        title: Buyer and Segment Landscape
        blocks:
          - type: paragraph
            body: >
              Nuro's buyer structure is multi-tiered and distinct from a consumer-facing business. The primary buyer of
              the Nuro Driver technology platform is the OEM partner—in the present program, Lucid Motors—which
              integrates the AV hardware and software at its manufacturing facility and sells the complete AV-ready
              vehicle. The secondary buyer is the demand platform operator (Uber Technologies) which owns, operates, and
              dispatches the fleet, capturing fare revenue and paying Nuro directly through licensing or royalty
              arrangements. Fleet infrastructure operators such as Oro Mobility (a Hertz subsidiary) handle charging,
              maintenance, and depot management, creating a third buyer tier that enables commercial scale but sits
              downstream of the primary licensing relationship.


              At the broader market level, North America leads with 37% of global robotaxi market share and Asia-Pacific
              holds 34%—together representing over 70% of deployment concentration. Consumer-facing demand is aggregated
              by platforms (Uber has 72% US rideshare market share; 13.5B trips in 2025) rather than flowing directly to
              technology licensors. The competitive buyer landscape includes active OEM-AV integrations at Waymo (Jaguar
              Land Rover), Motional (Hyundai), and Avride (Uber partnership for food delivery and rideshare). Goldman
              Sachs's fleet growth projection—7,000 AVs in 2024 to 1 million by 2030—implies a sharply expanding buyer
              universe requiring AV technology suppliers. Riders and consumers are the end-users but not the paying
              customers in Nuro's model; their adoption curves (see Section 4) affect demand indirectly through platform
              utilization rates. TM003 maps the buyer segments, and FM003 shows the value-chain flow.
            claimRefs:
