      - number: '4.2'
        title: Pricing and Licensing Structure
        blocks:
          - type: paragraph
            body: >
              The AV software licensing industry has not yet converged on a standard pricing model, but two dominant
              structures have emerged from early commercial deals: per-vehicle annual subscription (ranging from
              $2,000–$10,000/vehicle/year) and per-mile royalty (ranging from $0.01–$0.10/mile). Nuro has publicly
              described its commercial model as a licensing arrangement without specifying rates. Inferring from
              industry comparables, Aurora's commercial trucking deals and Mobileye's ADAS licensing arrangements
              suggest upfront integration fees of $1M–$5M per platform agreement plus tiered per-mile royalties that
              decline with volume. At the announced scale of 35,000+ Lucid Gravity vehicles under the Nuro-Lucid-Uber
              agreement, a $0.03/mile royalty would generate approximately $30M–$90M/year in per-mile fees if each
              vehicle drives 30,000–100,000 autonomous miles annually—though these are early-stage low-utilization
              estimates. List pricing is distinct from realized revenue: contractual minimum volumes, ramp periods, and
              scale discounts all compress realized rates versus list rates, a dynamic visible in Mobileye's ADAS
              licensing terms. Nuro's go-to-market motion is B2B direct, targeting large OEM and mobility platform
              partners (Lucid, Uber) rather than fragmented fleet operators; this approach compresses the sales cycle
              but creates customer-concentration risk. The Hertz/Oro fleet management role adds an intermediate layer:
              Hertz earns fleet-ops revenue while Nuro's licensing income flows primarily from Lucid (hardware
              integration fee) and Uber (usage revenue share), with no public evidence of separate fleet-management fees
              flowing to Nuro from Hertz.
