  - id: FR001
    title: Risk Heatmap — Severity vs. Likelihood
    type: matrix
    layout: wide
    description: >
      Heatmap of Nuro's principal risk categories mapped against severity (rows) and likelihood (columns). Each cell
      contains the specific risk drivers in that severity–likelihood quadrant. Critical-high risks appear in the
      upper-right; minor-low risks in the lower-left.
    summary: >
      Regulatory permit gaps and geographic concentration cluster in the high-likelihood / high-severity quadrant; Lucid
      insolvency and Uber deprioritization fall in the medium-to-high likelihood / critical severity band; nuclear
      verdict exposure is low-likelihood but critical-severity.
    data:
      columns:
        - Low Likelihood
        - Medium Likelihood
        - High Likelihood
      rows:
        - label: Critical Severity
          values:
            - Product liability nuclear verdict (single-incident AV crash)
            - Lucid insolvency removes vehicle platform; no disclosed backup OEM
            - Uber deprioritizes Nuro for Waymo / Rivian in SF Bay Area
        - label: High Severity
          values:
            - NVIDIA supply constraint halts fleet scale; FMVSS non-compliance risk
            - Fleet-scale cyber exploit; sensor degradation; Hertz maintenance failure
            - CPUC/DMV permit gap delays commercial launch; AB 1777 direct citations; AV talent drain
        - label: Medium Severity
          values:
            - NHTSA recall obligation triggered by unreported crash
            - Co-CEO governance friction; CCPA ADMT audit non-compliance
            - SF Bay Area geographic concentration; single-market regulatory shutdown
        - label: Low Severity
          values:
            - Waymo v. Uber-type IP dispute (Nuro as defendant)
            - Cultural pivot friction from delivery to robotaxi
            - Minor sensor quality issues within ODD specification
        - label: Informational
          values:
            - NHTSA Waymo investigation precedent (closed 2025 — no violation)
            - Forensisgroup / trade-secret risk framework (2018 precedent)
            - NHTSA STEP voluntary reporting program (de-facto compliance expectation)
    approximationNotes: >-
      Severity and likelihood are qualitative expert assessments based on publicly available regulatory filings,
      financial data, and industry reports as of May 2026. No quantitative probability model was applied; cells
      represent the chapter authors' risk judgment.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR024
      - CR026
      - CR027
  - id: FR002
    title: Risk Transmission Map — Cascading Risk Paths
    type: dag
    layout: wide
    description: >
      Directed graph showing how high-severity risk events propagate through Nuro's commercial system. Arrows indicate
      causal or conditional dependencies (A → B means "A increases probability of B"). Multi-path convergence at Revenue
      Gap indicates structural fragility.
    summary: >
      Lucid insolvency, a regulatory safety moratorium, and a successful cyberattack each independently cascade to the
      same outcome—Nuro's revenue gap—via distinct paths, underscoring the absence of a diversified commercial backstop.
    data:
      nodes:
        - id: RN01
          label: Lucid insolvency
          description: Lucid Motors files Chapter 11 or misses vehicle delivery milestone
        - id: RN02
          label: Vehicle supply halt
          description: No Lucid Gravity SUVs available for Nuro stack integration
        - id: RN03
          label: Fleet scale failure
          description: Nuro cannot deploy vehicles for commercial Bay Area service
        - id: RN04
          label: Uber deprioritization
          description: Uber shifts SF launch to Rivian or Waymo stack
        - id: RN05
          label: Revenue gap
          description: No per-mile licensing or ride-share revenue before 2028
        - id: RN06
          label: Regulatory delay / moratorium
          description: CPUC or DMV denies permit or issues operational stop
        - id: RN07
          label: Safety incident
          description: Serious crash triggers NHTSA / CPUC investigation and public scrutiny
        - id: RN08
          label: Cyberattack on fleet
          description: Fleet-scale ransomware or API exploit disables Bay Area vehicles
      edges:
        - from: RN01
          to: RN02
          label: removes platform supply
        - from: RN02
          to: RN03
          label: prevents fleet deployment
        - from: RN03
          to: RN05
          label: no rides, no licensing revenue
        - from: RN04
          to: RN05
          label: Uber platform removed from Nuro
        - from: RN06
          to: RN03
          label: halts commercial operations
        - from: RN07
          to: RN06
          label: triggers CPUC safety review / moratorium
        - from: RN07
          to: RN04
          label: Uber exits Nuro partnership after incident
        - from: RN08
          to: RN07
          label: cyberattack causes or precipitates safety event
    claimRefs:
      - CR023
      - CR024
      - CR040
  - id: FR003
    title: Partner Dependency Map — Commercial Stack Interdependencies
    type: dag
    layout: wide
    description: >
      Directed dependency graph of the Nuro robotaxi commercial stack. Each arrow represents a supply, service, or
      contractual dependency relationship. The graph reveals Nuro's central position and the absence of redundancy for
      any dependency leg.
    summary: >
      Nuro sits at the center of a five-node commercial chain with no redundant path for vehicle supply (Lucid), demand
      aggregation (Uber), fleet operations (Hertz/Oro), or compute hardware (NVIDIA). Regulatory approval (CPUC/DMV) is
      an external gatekeeping dependency before any commercial revenue flows.
    data:
      nodes:
        - id: DN01
          label: Nuro AV Stack
          description: Nuro Driver software + sensor integration — core commercial asset
        - id: DN02
          label: Lucid Motors
          description: Gravity SUV platform; factory-level sensor integration; sole OEM
        - id: DN03
          label: NVIDIA DRIVE AGX
          description: Onboard compute; sole confirmed platform for Nuro stack
        - id: DN04
          label: Uber Technologies
          description: Booking platform; demand aggregation; commercial distribution
        - id: DN05
          label: Hertz / Oro Mobility
          description: 'Fleet depot: charging, maintenance, cleaning'
        - id: DN06
          label: CPUC / CA DMV
          description: 'Regulatory gate: Driverless Deployment Permit required'
        - id: DN07
          label: Bay Area ODD
          description: Sole operational geography; all commercial revenue at risk
        - id: DN08
          label: End Rider
          description: Consumer booking Nuro-powered ride via Uber app
      edges:
        - from: DN02
          to: DN01
          label: provides vehicle platform
        - from: DN03
          to: DN01
          label: provides compute
        - from: DN01
          to: DN04
          label: licenses AV stack to
        - from: DN05
          to: DN04
          label: provides fleet ops for
        - from: DN06
          to: DN07
          label: permits commercial operations in
        - from: DN04
          to: DN07
          label: deploys service in
        - from: DN07
          to: DN08
          label: delivers rides to
        - from: DN02
          to: DN05
          label: delivers vehicles for maintenance to
    claimRefs:
      - CR023
      - CR026
      - CR029
  - id: FV001
    type: flow
    title: Recommendation Logic
    description: >
      Decision chain from the five principal evidence pillars through thesis risks to the conditional investment
      recommendation for Nuro at $6B. Supporting nodes reinforce the buy case; the risk node captures conditions that
      must be resolved.
    data:
      nodes:
        - id: N1
          label: Large and Growing TAM
          description: >-
            Robotaxi market $1.27B (2026) → $96.31B (2034) at 71.9% CAGR per Fortune BI; AV software licensing $4–10B
            ARR potential by 2030–2035
        - id: N2
          label: Differentiated Software Stack
          description: >-
            Nuro Driver L4 AV stack on NVIDIA DRIVE AGX Thor; 400+ patents; Google Brain founders Dave Ferguson and
            Jiajun Zhu; 1.4M+ autonomous test miles
        - id: N3
          label: Uber Demand-Platform Anchor
          description: >-
            Uber strategic equity holder in Series E; committed to SF Bay Area robotaxi deployment; guaranteed demand
            reduces launch-volume risk
        - id: N4
          label: Waymo Comparable Precedent
          description: >-
            Waymo's $126B valuation at $350M ARR implies 360x multiple for market-leading AV platform; Nuro at $6B is
            1/21 of Waymo — deep discount for pre-commercial stage that could close rapidly on launch
        - id: N5
          label: Execution and Solvency Risks
          description: >-
            Lucid Motors ~50% 2027 bankruptcy probability; CPUC 2 more permits needed; Uber multi-sourcing confirmed; no
            disclosed ARR; $2.7B raised but still pre-commercial
        - id: N6
          label: Conditional Buy at $6B
          description: >-
            Recommendation: Conditional Buy if (a) Lucid solvency confirmed, (b) CPUC Driverless permit on track for H1
            2027, (c) Uber minimum volume terms verified; probability-weighted 2028 valuation ~$13.6B (~2.3x MOIC)
      edges:
        - from: N1
          to: N6
          label: supports
        - from: N2
          to: N6
          label: supports
        - from: N3
          to: N6
          label: supports
        - from: N4
          to: N6
          label: supports
        - from: N5
          to: N6
          label: risks — must resolve
    claimRefs:
      - CV001
      - CV009
      - CV010
      - CV018
      - CV030
  - id: FV002
    type: bar
    title: Valuation Sensitivity
    description: >
      Sensitivity of Nuro's implied valuation to three scenarios across key drivers: fleet scale (vehicles deployed),
      revenue run rate achieved, and forward revenue multiple applied. All values are 2028E implied valuations in $B.
      Bear/Base/Bull case assumptions per TV003.
    approximationNotes: >
      All estimates are analyst inference based on public comparable multiples and Nuro's announced commercial
      milestones. No audited Nuro financials available. Revenue multiples based on Aurora, Pony.ai, and Mobileye public
      comps.
    data:
      items:
        - label: 'Bear Case (2028): <5K vehicles, near-zero ARR, Lucid failure'
          value: 2.5
          unit: $B
          notes: 0.4x MOIC on $6B entry; driven by Lucid insolvency and CPUC delay; residual IP value only
        - label: 'Base Case (2028): 15K vehicles, ~$120M ARR, 100x forward multiple'
          value: 12
          unit: $B
          notes: 2.0x MOIC on $6B entry; Lucid restructures but survives; CPUC permit Q3 2027
        - label: 'Bull Case (2028): 50K+ vehicles, ~$500M ARR, 56x forward multiple'
          value: 28
          unit: $B
          notes: 4.7x MOIC on $6B entry; full Uber ramp, additional OEM licensed, Lucid solvent
        - label: Probability-Weighted Expected Value (2028)
          value: 13.6
          unit: $B
          notes: 0.25×$28B + 0.50×$12B + 0.25×$2.5B = $13.6B; ~2.3x MOIC; below typical 3x+ venture target
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV031
  - id: FV003
    type: range
    title: Valuation Return Range
    description: >
      Bull/base/bear valuation ranges for Nuro at key time horizons, and the implied return on a $6B Series E entry.
      Forward estimates based on comparable public AV company multiples and Nuro's announced commercial milestones.
    approximationNotes: >
      Forward estimates only; no audited Nuro financials. Based on market comps (Aurora, Mobileye, Pony.ai, WeRide,
      Waymo) and Nuro's announced 35K–50K+ vehicle commercial program with Uber/Lucid. Probabilities are analyst
      inference, not actuarial estimates.
    data:
      items:
        - label: 2027E Implied Valuation
          low: 4
          base: 8
          high: 15
          unit: $B
          notes: 2027 valuation depends critically on CPUC Driverless permit timing and first commercial revenue recognition
        - label: 2028E Implied Valuation
          low: 2.5
          base: 12
          high: 28
          unit: $B
          notes: 'Bear: Lucid failure; Base: 15K vehicles, $120M ARR; Bull: 50K+ vehicles, $500M ARR'
        - label: 2030E Implied Valuation
          low: 1.5
          base: 20
          high: 50
          unit: $B
          notes: 2030 includes potential IPO window; Aurora 2030 revenue projection $3.1B used as scale reference
        - label: Return on $6B Entry (2028E)
          low: -0.6
          base: 1.5
          high: 4
          unit: x MOIC
          notes: Negative MOIC in bear case due to down-round preference reordering; base ~2.0x; bull ~4.7x
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV031
  - id: FV004
    type: kpi
    title: Investment KPIs
    description: >
      IC-ready summary of key investment metrics for Nuro's Series E at $6B. Combines valuation context, market
      positioning, competitive benchmarks, and evidence quality.
    data:
      items:
        - label: Current Valuation (Series E, Aug 2025)
