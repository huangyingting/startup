  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Definition and Customer Workflow
        blocks:
          - type: paragraph
            body: >
              Nuro's primary commercial product as of May 2026 is the Nuro Driver™, a software-defined Level 4
              autonomous driving system that the company licenses to OEM and fleet-operator customers rather than
              deploying itself as a fleet operator. The product architecture separates the autonomy software from the
              vehicle platform: Nuro authors the full perception-to-control software stack, which is then integrated by
              the OEM (Lucid Motors) at the factory level into a vehicle body (Lucid Gravity SUV), and operated
              commercially through a mobility platform partner (Uber). This tripartite structure—software licensor, OEM
              hardware partner, and network distribution partner—distinguishes Nuro from vertically integrated robotaxi
              operators such as Waymo (which designs its own sensor hardware and operates its own fleet) or Tesla (which
              manufactures the vehicle).


              The core customer workflow begins on the Uber app, where a rider requests a standard UberX-style trip. The
              Uber dispatch system routes the request to a Nuro-powered Lucid Gravity vehicle via the Uber AV API. The
              vehicle autonomously navigates to the pickup point, identifies the rider via the Uber app interface,
              completes the trip, and settles payment through Uber's standard fare system. There is no human driver;
              remote operations personnel monitor the fleet and can intervene in edge cases via the Nuro remote-ops
              layer. Fleet logistics—charging, cleaning, maintenance, depot management—are handled by Hertz/Oro Mobility
              under a separate fleet services agreement with Uber.


              The Nuro Driver has been validated through more than 1 million autonomous miles with zero publicly
              reported at-fault incidents. The prior-generation delivery robot program (R2, retired 2022) established
              important regulatory precedents, including the first NHTSA federal safety exemption for an AV in 2020. The
              current robotaxi program targets commercial driverless rides in the SF Bay Area in late 2026, contingent
              on obtaining the California DMV Autonomous Vehicle Deployment Permit and CPUC Driverless Deployment
              Permit, neither of which had been issued as of May 2026.
