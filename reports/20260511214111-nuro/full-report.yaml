      - number: '1.4'
        title: Key Milestones and Strategic Pivots
        blocks:
          - type: paragraph
            body: >-
              Nuro's history follows a punctuated trajectory: rapid early scaling on the back of SoftBank's capital, a
              federal regulatory first (NHTSA's first-ever driverless vehicle exemption for the R2 in February 2020), an
              overextension that necessitated two rounds of layoffs in 2022-2023, a pivot to technology licensing, and a
              commercial relaunch anchored by the 2025 Lucid-Uber partnership. The November 2022 layoff (approximately
              300 employees, ~20% of workforce) was attributed to economic downturn and the need to extend runway. The
              May 2023 restructuring was deeper—roughly 340 additional employees (~30% of remaining workforce) and a
              pause on commercial delivery expansion—while the co-founders acknowledged that the capital required to
              scale a vertically integrated delivery fleet was no longer financeable in the new rate environment. The
              2023 pivot formalized Nuro's shift from fleet operator to technology licensor, a strategy validated by the
              Lucid-Uber partnership announced in July 2025 and the $203M Series E financing in August 2025. By January
              2026, Nuro unveiled a production-intent robotaxi at CES alongside Lucid and Uber, with autonomous on-road
              testing already underway since December 2025. As of May 2026, Nuro has obtained both a California DMV
              Driverless Testing Permit and a CPUC Drivered Pilot Permit for the Lucid Gravity vehicles—one of only five
              companies with both permits in California.
