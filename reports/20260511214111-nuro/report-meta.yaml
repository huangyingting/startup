companyProfile:
  summary: >
    Nuro is a Mountain View, California-based autonomous vehicle software company founded in 2016 by
    Jiajun Zhu and Dave Ferguson, former Google Brain engineers. After pioneering a purpose-built
    delivery robot (Nuro R2, retired 2022), Nuro pivoted to licensing its "Nuro Driver" autonomy
    software stack to fleet operators and OEMs. Its first commercial deployment is a three-way
    partnership with Lucid Motors (vehicle) and Uber (ride-hailing platform), targeting robotaxi
    service in the San Francisco Bay Area in 2026. Nuro raised $203M in Series E funding at a
    $6B valuation in August 2025, backed by NVIDIA, Khosla Ventures, SoftBank, Google, and Honda.
    The company holds a California DMV driverless testing permit (granted May 2026) and is pursuing
    CPUC commercial service approval.
  foundedDate: "2016-01-01"
  founders:
    - name: "Jiajun Zhu"
      role: "Co-CEO, Co-Founder"
      background: "Former Google Brain engineer specializing in motion planning and autonomous systems."
      claimRefs: [CO006]
    - name: "Dave Ferguson"
      role: "Co-CEO, Co-Founder"
      background: "Former Google Brain engineer specializing in machine learning and prediction systems."
      claimRefs: [CO006]
  foundingLocation: "Mountain View, CA"
  headquarters: "Mountain View, CA"
  productSummary: >
    Nuro Driver: an end-to-end autonomy software stack (perception, prediction, planning, control)
    designed for robotaxi deployment on third-party vehicle platforms. The stack runs on NVIDIA DRIVE AGX
    Thor compute hardware and integrates with multi-modal sensor suites (LiDAR, cameras, radar).
    Currently deployed in Lucid Gravity SUVs for the Uber robotaxi platform in the SF Bay Area.
  customerFocus: >
    B2B: OEMs (vehicle manufacturers), fleet platform operators (ride-hailing companies), and fleet
    operations partners (charging/maintenance providers). Current anchor customers: Lucid Motors (OEM),
    Uber Technologies (fleet platform), Hertz/Oro Mobility (fleet operations).
  businessModel: >
    AV software licensing: upfront license fee plus per-vehicle or per-mile royalty charged to OEM/fleet
    partners, combined with a revenue-share arrangement on rides conducted using Nuro-powered vehicles
    on partner platforms (Uber). Pre-commercial as of May 2026; first rides targeting 2026.
  stage: "Series E"
  fundingStatus: >
    Series E: $203M at $6B valuation (August 2025). Investors: NVIDIA, Khosla Ventures, SoftBank,
    Google, Honda Motor, Tiger Global. Total lifetime raised: approximately $2.7B across seed through
    Series E rounds (2016–2025).
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO006, CO030, CO033]

summary:
  headline: >
    Nuro offers a credible and differentiated AV software licensing play in a hyper-growth robotaxi
    market, anchored by the Lucid-Uber partnership, but remains pre-commercial with material Lucid
    solvency and Uber multi-sourcing risks that warrant conditional entry at the $6B valuation.
