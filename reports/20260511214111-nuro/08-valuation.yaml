  - id: thesis-break-triggers
    title: "Thesis-Break and Kill-Switch Triggers"
    body: |
      Four events, if confirmed, would individually invalidate the investment thesis at $6B and
      require either exit or immediate valuation renegotiation. These are not speculative tail
      risks — each is materially plausible within the next 12–24 months.

      The first and highest-priority trigger is Lucid Motors insolvency or delivery failure. Given
      the ~50% market-implied bankruptcy probability before 2027, any missed Nuro vehicle delivery
      commitment, Chapter 11 filing, or Gravity program discontinuation would eliminate Nuro's
      vehicle platform entirely. There is no publicly documented OEM fallback. A Lucid failure would
      reset the commercial launch timeline by 18–36 months — likely beyond the runway of the Series E
      capital without emergency financing. Investors should seek a binding written contingency plan
      from Nuro management as a precondition to investment close.

      The second trigger is CPUC Driverless Deployment Permit delay beyond May 2028. The CPUC
      permit sequence is the critical regulatory gating item; without the Driverless Deployment
      Permit, Nuro cannot charge a fare. Historical permit timelines for comparable operators
      (including Waymo and Cruise) ranged from 12–24 months after application submission, suggesting
      the earliest realistic permit could arrive in mid-to-late 2027. If it slips to 2028 or beyond,
      Nuro's runway will be exhausted before generating material revenue.

      The third trigger is Uber's appointment of an exclusive non-Nuro AV partner for San Francisco.
      Uber's simultaneous $300M–$1.25B Rivian autonomous program and active Waymo deployment reveal
      a multi-sourcing strategy. If Uber publicly commits to Waymo or Rivian as exclusive SF AV
      partners before Nuro's commercial launch, the demand-platform anchor disappears. The absence
      of disclosed exclusivity provisions in the Nuro-Uber agreement is a material due diligence gap.

      The fourth trigger is a new financing round at below $4B, signaling market re-pricing of
      the thesis. A down-round to $3–4B or below would impose liquidation preference reordering
      on Series E investors and confirm that the commercial timeline has slipped materially. Given
      the 18–24 month estimated runway from August 2025, the Series F window would open in late
      2026 to mid-2027 — right when commercial launch either confirms or fails.
