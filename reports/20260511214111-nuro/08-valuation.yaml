  - id: FV002
    type: bar
    title: "Valuation Sensitivity"
    description: >
      Sensitivity of Nuro's implied valuation to three scenarios across key drivers:
      fleet scale (vehicles deployed), revenue run rate achieved, and forward revenue multiple applied.
      All values are 2028E implied valuations in $B. Bear/Base/Bull case assumptions per TV003.
    approximationNotes: >
      All estimates are analyst inference based on public comparable multiples and Nuro's announced
      commercial milestones. No audited Nuro financials available. Revenue multiples based on Aurora,
      Pony.ai, and Mobileye public comps.
    data:
      items:
        - label: "Bear Case (2028): <5K vehicles, near-zero ARR, Lucid failure"
          value: 2.5
          unit: "$B"
          notes: "0.4x MOIC on $6B entry; driven by Lucid insolvency and CPUC delay; residual IP value only"
        - label: "Base Case (2028): 15K vehicles, ~$120M ARR, 100x forward multiple"
          value: 12.0
          unit: "$B"
          notes: "2.0x MOIC on $6B entry; Lucid restructures but survives; CPUC permit Q3 2027"
        - label: "Bull Case (2028): 50K+ vehicles, ~$500M ARR, 56x forward multiple"
          value: 28.0
          unit: "$B"
          notes: "4.7x MOIC on $6B entry; full Uber ramp, additional OEM licensed, Lucid solvent"
        - label: "Probability-Weighted Expected Value (2028)"
          value: 13.6
          unit: "$B"
          notes: "0.25×$28B + 0.50×$12B + 0.25×$2.5B = $13.6B; ~2.3x MOIC; below typical 3x+ venture target"
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV031

