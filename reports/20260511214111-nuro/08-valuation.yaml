          label: "Waymo Comparable Precedent"
          description: "Waymo's $126B valuation at $350M ARR implies 360x multiple for market-leading AV platform; Nuro at $6B is 1/21 of Waymo — deep discount for pre-commercial stage that could close rapidly on launch"
