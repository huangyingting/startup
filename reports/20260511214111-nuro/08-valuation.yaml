  - id: TV005
    title: "Thesis Break And Kill Triggers Table"
    columns:
      - trigger
      - signal
      - threshold
      - action
      - time_horizon
    rows:
      - - "Lucid Motors Insolvency"
        - "Lucid credit rating downgrade below CCC, bankruptcy filing, or confirmed missed Nuro vehicle delivery commitment"
        - "Any single confirmed event: Chapter 11 filing, missed delivery, or Gravity program discontinuation"
        - "Exit position or suspend new capital deployment immediately; seek emergency bridge or alternative OEM integration; timeline resets 18–36 months"
        - "0–12 months; highest-urgency trigger given ~50% market-implied 2027 default probability"
      - - "CPUC Driverless Deployment Permit Delay"
        - "No CPUC Driverless Deployment Permit application submitted or permit denied/significantly delayed past May 2027"
        - "No permit by May 2028 (24 months from current CPUC Drivered Pilot grant)"
        - "Re-evaluate thesis; discount valuation by 30–50% for extended pre-commercial period; model Series F dilution; consider down-round scenario"
        - "12–24 months; permit progress should be monitored quarterly"
      - - "Uber Exclusive Partnership with Rival AV Provider"
        - "Uber public announcement naming Waymo, Rivian, or another AV provider as exclusive SF Bay Area partner before Nuro commercial launch"
        - "Any Uber press release, SEC filing, or investor statement confirming exclusive non-Nuro AV arrangement for SF"
        - "Exit immediately; demand-platform anchor lost; thesis collapses; residual value $1–2B (IP and patents only)"
        - "0–18 months; Uber multi-sourcing risk is active and growing"
      - - "Capital Exhaustion / Forced Down-Round"
        - "Nuro new financing round at valuation below $4B; bridge loan at punitive terms; or management announcement of restructuring"
        - "Series F term sheet at <$4B post-money; bridge loan with >15% interest; or company announcement of cost reduction >30% of remaining headcount"
        - "Aggressive write-down; existing Series E investors face significant dilution and possible preference reset; exit on any secondary liquidity available"
        - "18–24 months; runway from Series E (Aug 2025) exhausted by Q2–Q4 2027"
    notes: "Thesis-break triggers require immediate investor action — not monitoring. These are go/no-go decision points, not amber flags."
    claimRefs:
      - CV034
      - CV035
      - CV036
      - CV037

  - id: TV006
    title: "Final Diligence Asks Table"
    columns:
      - area
      - diligence_ask
      - priority
      - why_it_matters
      - owner
    rows:
      - - "Capital Structure"
        - "Full capitalization table as of Series E close, including SoftBank Vision Fund residual stake, all liquidation preferences, participation rights, and any anti-dilution provisions"
        - "Critical"
        - "Preference overhang from Series B ($940M SoftBank) and Series D ($600M Tiger Global) could eliminate Series E common returns in a bear-case exit below $3B; common equity value requires knowing preference stack"
        - "Nuro CFO / Nuro legal counsel"
      - - "Licensing Economics"
        - "Nuro Driver per-vehicle license fee, per-mile royalty schedule, minimum volume commitments, ramp discounts, and revenue share percentage with Uber per the Lucid-Uber commercial agreement"
        - "Critical"
        - "The $6B valuation requires $300–600M ARR to be achievable; without knowing the fee schedule and minimum volume commitments, the revenue model cannot be underwritten; this is the single most value-relevant undisclosed variable"
        - "Nuro Chief Revenue Officer / Deal counsel"
      - - "Lucid Contingency"
        - "Written board-approved OEM contingency plan: which alternative vehicle platforms have been evaluated for Nuro Driver integration, what is the integration timeline and cost estimate for each, and what triggers activation of the contingency"
        - "High"
        - "No publicly documented fallback plan exists; a Lucid insolvency event with no alternative platform would be a company-ending scenario with an 18–36 month recovery if Nuro is unprepared; a credible contingency converts this from existential to manageable"
        - "Nuro CEO / Board of Directors"
      - - "Uber Agreement Terms"
        - "Full Nuro-Uber commercial agreement: exclusivity provisions or lack thereof, minimum ride volume commitments, milestone conditions attached to Uber's Series E equity tranche, and Uber's rights to substitute alternative AV providers"
        - "High"
        - "Uber multi-sourcing is confirmed (Rivian deal, Waymo integration); the thesis depends on Uber providing meaningful minimum volume, not just a non-binding partnership; exclusivity or minimum-volume floors materially change the risk profile"
        - "Nuro Chief Legal Officer"
      - - "Runway and Burn"
        - "Q2 2026 cash balance (net of operating expenditures since Series E close Aug 2025), monthly burn rate broken down by R&D, G&A, and fleet operations, and projected runway under base-case and bear-case commercial timelines"
        - "High"
        - "The entire Nuro investment thesis depends on the company surviving through commercial launch; if runway is below 12 months as of mid-2026, the existential risk is near-term rather than theoretical; burn rate also reveals whether the $50–100M/year estimate used in this analysis is accurate"
        - "Nuro CFO"
    notes: "All five diligence asks are blocking items — investment should not close without resolution of Critical-priority asks and satisfactory answers on High-priority asks."
    claimRefs:
      - CV007
      - CV008
      - CV038

