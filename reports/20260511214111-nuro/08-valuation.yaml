          label: "Differentiated Software Stack"
          description: "Nuro Driver L4 AV stack on NVIDIA DRIVE AGX Thor; 400+ patents; Google Brain founders Dave Ferguson and Jiajun Zhu; 1.4M+ autonomous test miles"
