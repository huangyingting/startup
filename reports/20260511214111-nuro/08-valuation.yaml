  - id: final-recommendation
    title: "Final Recommendation and Diligence Asks"
    body: |
      Recommendation: Conditional Buy at $6B entry. The $6B valuation is premium for a pre-commercial
      company but is defensible relative to public AV comps and the Waymo precedent, provided three
      conditions are satisfied in formal diligence: (a) Lucid Motors solvency confirmed with 18-month
      delivery runway, (b) CPUC Driverless Deployment Permit application filed and on track for
      H1 2027, and (c) Uber exclusivity or minimum volume commitment terms verified from the Series E
      agreement. If all three conditions are confirmed, the probability-weighted 2028 valuation of
      ~$13.6B implies a ~2.3x MOIC — below institutional venture return thresholds of 3x+ but
      reasonable for a late-stage growth equity co-investment in a category-defining platform.

      The confidence level on this recommendation is Medium. The market opportunity is large (high
      confidence) and the technical differentiation is plausible (medium confidence), but the
      execution risk is material (high confidence) and the key financial details are private
      (blocking). The overall risk rating for this investment is High, dominated by Lucid solvency,
      regulatory sequencing, and pre-commercial execution risk.

      Exit pathways include: (1) IPO once Nuro achieves $100M+ ARR and market conditions are
      favorable, targeting a $15–25B valuation at 3–4x MOIC from $6B; (2) strategic acquisition
      by Uber, NVIDIA, or a global OEM seeking an AV stack, with Waymo's precedent valuation
      ($126B) suggesting a large potential acquisition premium if Nuro establishes market position;
      or (3) secondary transaction at a modest mark-up once commercial launch is confirmed.

      Six specific diligence asks must be resolved before investment close: full capitalization
      table (liquidation preferences, SoftBank residual stake), Nuro Driver license fee schedule
      and minimum volume commitments, written Lucid OEM contingency plan, Uber agreement terms
      (exclusivity, minimum rides, milestone conditions), Q2 2026 cash balance and monthly burn,
      and any existing commitments from non-Lucid OEM partners for future vehicle integration.
      These are not incremental niceties — without these items, the valuation cannot be underwritten
      on a fundamental basis.
