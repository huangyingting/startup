  - id: FV001
    type: flow
    title: "Recommendation Logic"
    description: >
      Decision chain from the five principal evidence pillars through thesis risks to the conditional
      investment recommendation for Nuro at $6B. Supporting nodes reinforce the buy case;
      the risk node captures conditions that must be resolved.
    data:
      nodes:
        - id: N1
          label: "Large and Growing TAM"
          description: "Robotaxi market $1.27B (2026) → $96.31B (2034) at 71.9% CAGR per Fortune BI; AV software licensing $4–10B ARR potential by 2030–2035"
