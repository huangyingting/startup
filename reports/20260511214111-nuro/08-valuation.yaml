  - id: financial-model
    title: "Financial Modelling Framework"
    body: |
      Nuro's financial model is anchored in AV software licensing economics rather than vehicle
      operations. The critical financial model question is: what revenue run rate is required to
      justify a $6B entry, and is it reachable given Nuro's current trajectory?

      At a 10x forward revenue multiple — a modest multiple for a high-growth AV software company
      given that Aurora, Pony.ai, and WeRide all trade at 50–130x — Nuro requires $600M ARR to
      justify $6B. At a 20x multiple (closer to current comps), the required ARR is only $300M.
      The path to $300–600M ARR can be modelled in two ways. Under the per-vehicle licensing model,
      35,000 Lucid Gravity vehicles × a $10,000/vehicle/year license fee yields $350M ARR, achievable
      at the lower end of the 35K–50K vehicle ramp Nuro has announced under the Lucid-Uber agreement.
      Under the per-mile royalty model, 35,000 vehicles × 50,000 miles/year × $0.03/mile royalty
      = $52.5M ARR — insufficient at 35K vehicles, but scaling to $525M ARR at 350K vehicles. A
      blended model combining integration fees plus per-mile royalties plus Uber revenue share is
      the most plausible near-term structure.

      Gross margin at scale is estimated at 65–80% (software licensing) to 80–85% (pure royalty
      at volume), consistent with Mobileye's disclosed 54% hardware-inclusive gross margin and the
      higher pure-software margins typical of SaaS-comparable licensing businesses. At scale,
      Nuro's unit economics become highly favorable: marginal cost per additional licensed vehicle
      is minimal once R&D is amortized, creating operating leverage that justifies the forward
      multiple premium.

      The critical non-financial input to the model is Nuro's remaining runway. The $203M Series E
      (August 2025) at an estimated $50–100M annual burn provides 18–24 months of runway through
      approximately late 2026 to mid-2027. If commercial launch succeeds in H2 2026 and licensing
      revenue ramps in 2027, Nuro can extend its runway organically. If commercial launch is delayed
      to 2027–2028, Nuro will likely require a Series F before achieving profitability, creating
      dilution risk for Series E investors. The NVIDIA equity alignment reduces per-vehicle compute
      costs and provides implicit protection against going-dark risk for NVIDIA, but it does not
      eliminate the operational cash burn.

      Nuro's financial model is most comparable to Aurora's trajectory in 2022–2024: a heavily
      capitalized AV software company burning through its capital base to reach commercial inflection,
      after which revenue scaling is expected to be rapid. Aurora's stock rerating from ~$7.8B
      (end-2025) to ~$14.2B (May 2026) on commercial trucking launch is the most recent evidence
      that this trajectory can produce substantial investor returns — but only if commercial launch
      actually occurs on the stated timeline.
