  - id: operational-security-risks
    title: Operational and Cybersecurity Risks
    body: |
      Nuro's AV stack fuses camera, LiDAR, and imaging radar via a learned end-to-end neural architecture
      (the Nuro Autonomy Model, NAM). Any single-sensor degradation or adversarial perturbation can trigger
      L4 disengagement and fallback to remote-operator control, directly affecting service quality and
      ride completion rates. The NAM's reliance on learned scene representations introduces a class of
      adversarial patch attacks that are not addressed by ISO 21434 or traditional automotive cybersecurity
      frameworks. NHTSA crash data shows 392 Level 2+ crashes in the 2022–2024 reporting period, with 17%
      involving injuries; scaling to a fully driverless L4 deployment raises the absolute incident count
      even if the per-mile rate is lower than human-driven baselines.

      Upstream.auto's 2026 Global Automotive Cybersecurity Report identifies fleet-scale vulnerability as
      the defining threat: 61% of connected-vehicle security incidents had the potential to impact thousands
      to millions of vehicles simultaneously, and ransom incidents doubled year-over-year, accounting for
      44% of all incidents. For Nuro, a single successful exploit of its cloud-based fleet management
      backend could simultaneously disable or manipulate all vehicles in the Bay Area fleet. Nuro has not
      published a cybersecurity framework, SOC-2 certification, or penetration testing status publicly.

      NVIDIA DRIVE AGX Thor is Nuro's sole confirmed compute platform. An NVIDIA supply constraint or
      export restriction (historically relevant for advanced chips) would directly delay fleet scaling
      because no alternative compute platform has been publicly validated. Hertz/Oro Mobility's fleet
      management role creates an indirect uptime dependency: quality failures analogous to Hertz's 2024
      Uber EV maintenance recall would degrade Nuro's service record and safety metrics without Nuro
      having direct remediation authority over the fleet.
    claimRefs:
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
      - CR022
    tableRefs:
      - TR002

  - id: partner-dependency-risks
    title: Partner Dependency and Concentration Risks
    body: |
      Nuro's entire commercial program rests on a tri-party dependency (Uber + Lucid + Hertz/Oro) with
      no disclosed backup for any leg. Uber provides demand aggregation and the booking platform; Lucid
      provides the Gravity SUV platform and factory-level sensor integration; Hertz/Oro provides fleet
      operations. Removal of any single partner would halt the program.

      Lucid Motors is the most acute dependency risk. Lucid reported free cash flow of –$3.8 billion in
      FY2025, and its primary financial backstop is a ~$2 billion term loan from Saudi Arabia's Public
      Investment Fund. Prediction market probability of Lucid filing for bankruptcy before 2027 stood at
      approximately 50% in early 2026. A Lucid insolvency would eliminate Nuro's vehicle supply, require
      re-integration onto a new OEM platform, and reset the commercial launch timeline by at least two to
      three years. Nuro has not disclosed any alternative OEM platform.

      Uber's multi-supplier AV strategy is the second material risk. Since the Nuro-Lucid announcement at
      CES January 2026, Uber has expanded its AV roster: a $375M strategic investment in Avride for
      Dallas service (December 2025), a $1.25 billion Rivian deal for up to 50,000 autonomous R2 vehicles
      by 2028 targeting San Francisco and Miami, and an expanded Waymo partnership across ten US cities
      by 2026. Waymo's operational traction—500,000+ weekly rides and 4.8-star ratings—gives Uber a
      dominant AV supplier it will not exit. Nuro's 35,000-vehicle target competes with Rivian's 50,000-
      vehicle Uber commitment at scale. Uber has not publicly stated any minimum Nuro volume or exclusivity.

      Geographic concentration in the SF Bay Area means a single regulatory action, safety moratorium,
      or weather event could halt all Nuro commercial activity simultaneously. No second licensing
      customer beyond Uber has been publicly disclosed, removing any revenue diversification buffer.
