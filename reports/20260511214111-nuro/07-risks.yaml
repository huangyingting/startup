slug: nuro
runDate: '2026-05-11'
company:
  name: Nuro
chapter:
  number: 7
  title: Risks
  summary: >
    Nuro's 2026–2028 robotaxi program faces six interlocking risk categories: regulatory (sequential CA permit
    gaps before paid service), legal (AB 1777 corporate citations and nuclear-verdict exposure), operational
    (cybersecurity, sensor reliability, NVIDIA supply), partner-dependency (Lucid insolvency probability ~50%,
    Uber multi-supplier posture), people-execution (post-layoff brain drain, co-CEO governance), and financial
    model (no disclosed revenue with three regulatory milestones still outstanding). The highest-severity
    combination is a Lucid insolvency event cascading into fleet supply failure while CPUC commercial drivered
    permit remains outstanding, a scenario with no disclosed contingency. Active mitigants exist for most
    second-tier risks but the core Lucid-platform single-point-of-failure has no publicly documented backup.

sections:
  - id: risk-landscape
    title: Risk Landscape Overview
    body: |
      Nuro's commercial launch window is narrow and multi-conditional. Six distinct risk categories can each
      individually delay or prevent paid robotaxi service: (1) regulatory — multiple California permit approvals
      remain outstanding after the May 2026 CPUC Drivered Pilot permit; (2) legal — California AB 1777
      effective July 2026 creates direct corporate citation authority against AV manufacturers, and nuclear
      verdict exposure from a single serious incident could threaten the company's existence; (3) operational
      and cybersecurity — fleet-scale cyber exploits and sensor degradation create service disruption and
      safety risks; (4) partner-dependency — Lucid Motors carries a market-implied ~50% bankruptcy probability
      before 2027, and Uber has publicly expanded its AV supplier roster to include Waymo, Avride, and Rivian;
      (5) people and execution — the 2022–2023 restructuring eliminated approximately 950+ engineering roles
      and reduced headcount from ~1,200 to ~250, creating persistent brain-drain risk; and (6) financial
      model — Nuro has no disclosed revenue and requires three additional regulatory approvals before it can
      charge a fare. The Risk Heatmap (FR001) maps severity versus likelihood across these six dimensions.
      Overall risk posture: the regulatory and partner-dependency categories carry the highest combined
      severity-likelihood scores; the legal and cybersecurity categories carry the highest tail risk given
      the potential for single-event catastrophic outcomes.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR039
    figureRefs:
      - FR001

  - id: regulatory-legal-risks
    title: Regulatory and Legal Risks
    body: |
      Nuro secured a CPUC Drivered Pilot permit in May 2026, enabling driverless passenger testing on public
      roads with a remote safety operator. However, this is the second of at least four permit milestones
      required before paid rides can commence: a California DMV Driverless Deployment Permit, and a CPUC
      Driverless Deployment Permit for commercial ride-hailing operations, remain outstanding. The California
      DMV deployment process has historically taken twelve to eighteen months from application to approval
      for well-resourced operators, creating a realistic commercial launch risk that extends into 2027–2028.

      California AB 1777, effective July 2026, introduced a material new liability mechanism: direct
      corporate citations can now be issued to AV manufacturers when a crash involves a driverless vehicle.
      Previously, enforcement actions required routing through the vehicle operator (e.g., Uber or Hertz);
      AB 1777 removes this buffer, making Nuro jointly liable for crashes caused by its stack. California
      simultaneously requires $5 million or more in liability coverage for driverless commercial operations,
      adding a cost layer before launch.

      The product-liability nuclear verdict environment has deteriorated sharply. Risk & Insurance data show
      corporate lawsuit awards surged 116% to $31.3 billion in 2024, with AV and autonomous-system cases
      among the fastest-growing categories. A single catastrophic AV crash involving a Nuro-powered Lucid
      vehicle in San Francisco could generate a $100M–$500M jury verdict under the new direct-citation regime.

      On the intellectual-property front, the Waymo v. Uber trade-secret litigation (settled 2018 for
      approximately $245M in Waymo equity) established that AV trade-secret misappropriation is actionable
      at scale; Nuro employs former Google/Waymo engineers, creating latent IP risk in both directions.
      NHTSA closed its Waymo investigation in July 2025 with no systemic violations finding, providing
      modest precedent that proactive safety reporting and transparent crash data submission can limit
      regulatory enforcement risk. CCPA/CPPA ADMT regulations finalized in 2025 require automated
      decision-making systems—including Nuro's AV stack routing and behavior prediction—to offer California
      residents opt-out rights and mandate annual cybersecurity audits, adding compliance overhead.
