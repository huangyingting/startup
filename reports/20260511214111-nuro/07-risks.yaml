  - id: mitigation-kill-criteria
    title: Risk Mitigation and Kill Criteria
    body: |
      The five highest-severity risks—regulatory permit gap, Lucid platform dependency, Uber commitment
      dilution, product liability exposure, and revenue model viability—each have defined kill criteria
      and mitigation paths. The regulatory kill criterion is failure to secure a California DMV Driverless
      Deployment Permit by end of 2027; the mitigation is maintaining active CPUC and DMV engagement and
      completing the required safety disclosure filings under NHTSA's Standing General Order and AB 1777
      liability framework. The Lucid kill criterion is a Chapter 11 filing or material vehicle delivery
      default; the mitigation requires Nuro to identify and evaluate a backup OEM platform (e.g., a
      manufacturer with an existing L4-capable vehicle program or a willingness to integrate at factory
      level) before Lucid insolvency becomes irreversible. The Uber commitment kill criterion is an
      explicit written notice from Uber of AV-stack de-prioritization or substitution; a partial mitigation
      is contractual SLA enforcement and demonstrating safety and efficiency metrics superior to competing
      stacks. The product-liability kill criterion is inability to secure $5M+ driverless operations
      liability insurance before CA commercial launch; the mitigation is a clean safety record during
      Drivered Pilot testing and engagement with specialty AV insurance programs developing in 2026.
      The revenue model kill criterion is no paid driverless rides by end of 2027; if this criterion
      is reached, Nuro would face an existential funding gap given its burn rate relative to disclosed
      capital.
    claimRefs:
      - CR036
      - CR037
      - CR038
      - CR041
      - CR042
      - CR043
