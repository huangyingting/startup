    gap: Nuro's specific licensing fee structures, per-mile revenue terms, milestone payments, and overall economic arrangement
      with Uber have not been publicly disclosed in any press release, investor communication, or media report. This makes
      it impossible to assess Nuro's unit economics, revenue potential, or financial sustainability from the Uber program
      alone.
