chapter:
  number: 6
  title: Customers
  summary: Nuro has completed a full customer-base reset, exiting its consumer-facing delivery partnerships with Kroger, Walmart,
    FedEx, and 7-Eleven in 2023 and re-platforming as a B2B autonomy-stack licensor. Its sole current commercial engagement
    is the Uber/Lucid/Hertz tri-party robotaxi program in the San Francisco Bay Area, for which Nuro secured a California
    CPUC driverless testing permit in May 2026. The program divides responsibilities across Uber (demand aggregation), Lucid
    Motors (vehicle OEM), Hertz/Oro Mobility (fleet operations), and Nuro (AV stack licensing). Uber's parallel Rivian deal
    introduces supplier-side competition and limits Nuro's pricing leverage. Consumer adoption data show 37% of US adults
    willing to ride AVs in 2026, with Waymo's operational benchmarks (500K weekly rides, 4.8-star ratings, ~60% 30-day repeat
    rate) providing the best available proxy for the addressable rider base. No non-Uber B2B licensing pipeline has been disclosed
    publicly, making near-term revenue entirely contingent on a single platform deal.
sections:
- id: customer-model
  title: Customer Model and Tier Structure
  body: Nuro operates a pure B2B technology licensing model, supplying its Nuro Driver autonomous vehicle software stack and
    associated hardware integration to commercial operators rather than deploying its own fleet or marketing directly to riders.
    This positions Nuro as a horizontal technology layer whose end-users are reached only indirectly through operator partners.
    The customer hierarchy has three functional tiers. Tier 1 strategic platform partners—currently Uber, Lucid Motors, and
    Hertz/Oro Mobility—hold contractual, long-horizon relationships with Nuro and bear commercial risk. Tier 2 fleet operators
    (a category not yet populated by any publicly disclosed second customer) would scale Nuro's technology across different
    vehicle programs or geographies. Tier 3 end users interact with Nuro's technology only via the Uber booking platform and
    have no direct commercial relationship with Nuro. A fourth historical category—the delivery-era customers (Kroger, Walmart,
    FedEx, 7-Eleven)—represents Nuro's prior go-to-market, which was paused entirely in 2023. The pivot from consumer-adjacent
    delivery operations to pure B2B licensing is strategically coherent but leaves Nuro without a consumer brand or any independent
    demand channel. Consumer acquisition now belongs entirely to Uber, meaning Nuro's fortunes are structurally tied to Uber's
    robotaxi execution and market appetite. Nuro's Uber robotaxi program is targeting the San Francisco Bay Area as the initial
    launch market, with on-road driverless testing underway in 2026 following the CPUC permit secured in May of that year.
    The licensing model, if validated at commercial scale, could support expansion to other ride-hailing platforms, municipal
    fleets, or international operators—but no such pipeline is publicly disclosed as of the report date.
