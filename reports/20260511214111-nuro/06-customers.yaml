- id: adoption-satisfaction
  title: Consumer Adoption and Rider Satisfaction Benchmarks
  body: 'Because Nuro has not yet launched paid robotaxi service and therefore has no published consumer satisfaction or retention
    data of its own, this section triangulates three streams of proxy evidence: Waymo operational benchmarks (the nearest
    publicly operating AV comparator), general US consumer survey data on AV willingness, and demographic breakdowns that
    illuminate the addressable adoption curve. Waymo reported approximately 500,000 paid rides per week by end-2025, with
    14 million total paid rides delivered in 2025 and over 20 million lifetime rides—providing the first credible data point
    on what "commercial scale" looks like in the robotaxi segment. Waymo''s rider satisfaction metrics are exceptional: the
    service maintains an average 4.8–4.9-star rider rating, and ZipDo-aggregated industry data suggests a 30-day repeat ride
    rate above 60% in core San Francisco and Phoenix markets. In contrast, macro consumer surveys reveal persistent structural
    resistance: AAA''s February 2025 survey found 53% of American adults would not ride in a self-driving vehicle, and 60%
    report feeling afraid when riding in or near an autonomous vehicle—despite trust levels rising from 9% to 13% year-over-year.
    FinanceBuzz 2026 data put the overall US willingness-to-ride figure at 37% (up from 21% in 2018), with a stark generational
    split: 51% of Gen Z versus 18% of Baby Boomers. S&P Global Mobility data from 2025 documented a 12-percentage-point year-over-year
    increase in US consumer trust, correlated with Waymo''s growing public presence. Deloitte''s 2026 Global Automotive Consumer
    Study finds US AV interest among the lowest globally, trailing India, China, and Southeast Asia significantly. SingularityHub
    reported in February 2026 that Waymo pricing is approaching Uber/Lyft parity, with a growing number of riders expressing
    a preference for Waymo over human-driven rideshare—a signal of nascent retention dynamics. Nuro''s Uber robotaxi will
    directly compete for Bay Area riders against Waymo''s established presence, creating both a validation environment and
    a competitive intensity risk that the adoption benchmarks cannot resolve.'
