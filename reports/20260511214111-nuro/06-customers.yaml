figures:
- id: FU001
  title: Customer Journey Map
  type: journey-map
  description: Illustrates the end-to-end journey of a rider using the Nuro-powered Uber robotaxi, from pre-booking through
    post-ride feedback, showing where each Tier 1 partner (Uber, Nuro, Lucid, Hertz/Oro) controls the experience.
  data:
    items:
    - label: Pre-booking
      value: 1
      note: Rider opens Uber app and selects the robotaxi option; Uber owns this touchpoint entirely — Nuro has no consumer-facing
        presence here
    - label: Booking and dispatch
      value: 2
      note: Uber matches rider to an available Lucid Gravity vehicle; Nuro AV stack receives trip assignment via Uber's dispatch
        API; controlled by Uber + Nuro
    - label: Vehicle arrival
      value: 3
      note: Nuro-driven Lucid Gravity navigates autonomously to pickup; rider unlocks door via Uber app; safety interlock
        controlled by Nuro AV stack
    - label: Autonomous ride
      value: 4
      note: Nuro Driver handles all driving decisions; Lucid Gravity platform provides ride comfort; no human driver present;
        Hertz/Oro maintains vehicle between trips
    - label: Dropoff and completion
      value: 5
      note: Vehicle navigates to destination autonomously; rider exits; trip closed in Uber app; payment processed by Uber;
        controlled by Uber + Nuro
    - label: Post-ride feedback and fleet return
      value: 6
      note: Rider rates trip via Uber app (data fed to Nuro for stack improvement); Hertz/Oro retrieves vehicle for charging,
        cleaning, and scheduled maintenance
