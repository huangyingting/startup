- id: delivery-history
  title: Historical Delivery Customers 2018–2022
  body: Before its 2023 strategic pivot, Nuro operated a vertically integrated autonomous delivery service with a portfolio
    of named retail and logistics customers. Nuro's first commercial deployment was a grocery delivery partnership with Kroger,
    launching in Scottsdale, Arizona in 2018 using the R1 pod vehicle. The partnership expanded to Houston, Texas in 2019,
    where Nuro later upgraded to the commercial-grade R2 (its third-generation vehicle) in January 2022 and completed what
    the company described as "tens of thousands" of deliveries. Walmart operated a parallel autonomous delivery program with
    Nuro in the Greater Houston area, cited by Houston Clean Cities as a representative example of innovative last-mile logistics.
    Nuro's delivery portfolio also included FedEx for package delivery piloting in the Dallas–Fort Worth area and 7-Eleven
    for convenience store delivery. The Harvard Business School Digital Initiative case study documents this multi-partner
    network but notes the operations remained pilot-scale, limited to a handful of ZIP codes per partner, and generated no
    disclosed revenue. In May 2023, Nuro announced a full pause of all commercial delivery operations as part of a restructuring
    that included approximately 340 additional layoffs—a decision driven by the capital intensity of scaling a proprietary
    fleet in an elevated interest rate environment. None of the delivery-era customers appears in Nuro's current robotaxi
    commercialization narrative, indicating a complete customer base reset. The delivery era demonstrated proof-of-concept
    for commercial AV operations and generated regulatory goodwill—notably Nuro's 2020 NHTSA exemption for the R2—but did
    not establish durable commercial relationships, recurring revenue, or a path to profitability in the delivery-as-a-service
    model.
