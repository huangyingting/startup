  - id: EG002
    gap: No non-Uber B2B licensing customers, LOIs, or commercial pipeline beyond the Uber/Lucid program have been publicly
      disclosed by Nuro. While the absence of disclosure does not confirm the absence of a pipeline, it prevents any independent
      assessment of revenue diversification or customer expansion progress.
