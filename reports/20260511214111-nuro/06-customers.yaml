- id: tier1-partners
  title: Tier 1 Strategic Partners
  body: 'Nuro''s entire current commercial portfolio is concentrated in one platform deal announced at CES January 2026: a
    tri-party robotaxi partnership with Uber and Lucid Motors, with Hertz and its Oro Mobility subsidiary serving as fleet
    operations partner. Uber and Lucid jointly unveiled the production-intent Lucid Gravity SUV as the base vehicle for Nuro''s
    AV stack at CES, confirming both a commercial scale ambition and a clear division of responsibilities. Lucid Motors manufactures
    the Gravity platform, integrating Nuro''s sensor suite and compute hardware at Lucid''s Casa Grande, Arizona factory.
    Uber provides the booking platform, brand, insurance, and demand aggregation, deploying the vehicles exclusively through
    the Uber app. In April 2026 Hertz announced its Oro Mobility subsidiary would handle all fleet management duties—charging,
    cleaning, maintenance, repairs, and depot staffing—for the Nuro-powered Lucid vehicles in the Bay Area, formalizing the
    fourth pillar of the commercial stack. The arrangement gives Nuro clean AV-stack economics without taking on capital-intensive
    fleet operations directly. However, Uber''s parallel March 2026 deal with Rivian—up to 50,000 autonomous R2 vehicles on
    milestone-based financing totaling $1.25 billion—uses Rivian''s own AV stack and targets a 2028 launch in SF and Miami,
    explicitly establishing Uber as a multi-supplier buyer. This dual-sourcing dynamic is the single largest near-term commercial
    risk for Nuro: Uber retains the freedom to deprioritize or substitute Nuro''s stack if Rivian''s performance proves superior
    or if Uber''s internal AV program accelerates. The Nuro-Lucid fleet target has been disclosed at up to 35,000 vehicles
    globally, compared with Rivian''s 50,000 commitment, putting Nuro at a scale disadvantage in terms of Uber''s stated preference
    metrics. Nuro''s California CPUC driverless testing permit, secured in May 2026, is a prerequisite milestone for the commercial
    Uber partnership and demonstrates regulatory progress, though full paid driverless service still requires additional state
    authorizations.'
