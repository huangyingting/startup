  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: "nuro-licensing-fees"
      missingEvidence: "Nuro's per-vehicle licensing fee charged to Lucid Motors and revenue share or royalty structure paid by Uber; neither term has been publicly disclosed in any filing, press release, or regulatory submission."
      whyItMatters: "Without knowing the per-vehicle licensing fee and Uber revenue share, it is impossible to independently verify whether Nuro's licensing economics are viable at the 20,000-vehicle target scale, or whether the model generates sufficient gross margin to support Nuro's R&D and commercialization costs."
      diligencePath: "Request term sheet or executed licensing agreement as part of formal due diligence; obtain unit economics model from Nuro management showing per-vehicle contribution margin at target fleet scale; benchmark against Mobileye's disclosed per-chip/per-vehicle ADAS revenue as a proxy for software licensing economics."
      relatedQuestionRefs: [QP014]

    - type: private-evidence-only
      severity: material
      topic: "nuro-uber-exclusivity"
      missingEvidence: "Scope, duration, and enforceability of any exclusivity provisions in the Nuro-Uber commercial agreement; whether Uber's simultaneous integration with Zoox, Motional, and May Mobility is contractually compatible with any Nuro exclusivity terms."
      whyItMatters: "Nuro's moat claim of a preferred Uber relationship is materially weakened if Uber can simultaneously deploy competing AV stacks at the same scale; Uber's actual multi-homing behavior (Zoox Las Vegas 2026, May Mobility Arlington TX 2025, Motional ongoing) suggests broad platform access rather than stack exclusivity."
      diligencePath: "Review the executed Nuro-Uber licensing and platform agreement to confirm whether a minimum vehicle commitment of 20K is guaranteed or aspirational; confirm whether geographic or temporal exclusivity exists and its exact scope; assess Uber's internal AV platform strategy for multi-vendor deployment."
      relatedQuestionRefs: [QP017]

    - type: missing-source
      severity: material
      topic: "tesla-camera-l4-validation"
      missingEvidence: "Independent third-party validation that Tesla's camera-only Cybercab architecture can achieve L4 safety performance equivalent to multi-sensor fusion (lidar + camera + radar) approaches in open-domain urban environments under adverse weather, lighting, and occlusion conditions."
      whyItMatters: "If Tesla's camera-only L4 is validated as equivalent to multi-sensor fusion in commercial conditions, Nuro's sensor-fusion differentiation claim weakens; conversely, if camera-only is confirmed insufficient, Tesla's Cybercab commercial deployment faces a structural safety ceiling and Nuro's sensor approach is corroborated as superior."
      diligencePath: "Review independent academic or government safety research on camera-only vs multi-sensor AV architectures for open-domain L4; obtain Nuro's internal comparative safety data if available; review CPUC permit conditions for both Nuro and Tesla for any sensor requirements."
      relatedQuestionRefs: [QP024]

    - type: missing-source
      severity: minor
      topic: "nuro-competitive-evidence-gaps"
      missingEvidence: "Comprehensive independent audit of Nuro's competitive moats across: (1) disengagement rate comparison with Waymo and Tesla using DMV-submitted data, (2) AV stack switching cost for Lucid Motors if it were to replace Nuro with an alternative, and (3) Waymo's internal licensing strategy roadmap."
      whyItMatters: "The three most critical competitive unknowns (Nuro vs Waymo tech gap, OEM switching cost, Waymo licensing intent) collectively determine whether Nuro's moats are durable or transient; without these, the competitive positioning analysis rests primarily on Nuro's company-claimed differentiation rather than independent benchmarks."
      diligencePath: "Obtain California DMV annual disengagement reports for Nuro and Waymo and compare directly; interview Lucid Motors engineering leadership to assess factory-embedded switching cost; track Waymo investor relations statements for any licensing-related language in future fundraising materials."
      relatedQuestionRefs: [QP028]
