summary:
  headline: >
    Nuro offers a credible and differentiated AV software licensing play in a hyper-growth robotaxi market, anchored by
    the Lucid-Uber partnership, but remains pre-commercial with material Lucid solvency and Uber multi-sourcing risks
    that warrant conditional entry at the $6B valuation.
