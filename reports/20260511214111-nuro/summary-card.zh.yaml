summary:
  headline: >
    Nuro 在高速增长的 robotaxi 市场里提供了一条可信、差异化的 AV 软件授权路径，Lucid-Uber 合作是锚点；但公司仍未商业化，且 Lucid 偿付能力和 Uber 多供应商策略风险很重，因此只有在 $6B
    估值下才适合有条件进入。
