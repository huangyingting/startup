callouts:
  - calloutType: strength
    title: "Landmark Regulatory Firsts and Proven Driverless Miles"
    body: "Nuro was the first company to receive a federal NHTSA safety exemption for a vehicle designed to operate without any human operator or traditional controls (2020). Its claimed 1.7 million driverless miles with zero at-fault incidents provide a credible safety narrative for OEM and mobility customer conversations."
    claimRefs: [CO027, CO005]

  - calloutType: risk
    title: "Elevated Key-Person Concentration and Dual-CEO Governance Risk"
    body: "Both co-founders serve as co-CEOs with product and commercial responsibilities concentrated in two individuals who have known each other for 14+ years. While their partnership is presented as a strength, the dual-CEO structure with no announced succession plan creates key-person risk for investors and commercial partners."
    claimRefs: [CO007, CO008, CO010]

  - calloutType: risk
    title: "Valuation Declined 30% from 2021 Peak; Adverse Restructuring History"
    body: "Nuro's $6B Series E valuation is 30% below the $8.6B Series D peak (2021). Two rounds of layoffs in 2022 and 2023 cut headcount by more than half and required a fundamental business model pivot. The company has not yet demonstrated revenue or a path to profitability under the new licensing model."
    claimRefs: [CO018, CO030, CO031, CO038]

  - calloutType: insight
    title: "Lucid-Uber Partnership Represents Nuro's First Large-Scale Commercial Validation"
    body: "The 35,000-vehicle commitment from Uber (expanding from 20,000 in July 2025 to 35,000+ by April 2026) is the most concrete commercial evidence that the Nuro Driver licensing model can achieve scale. Uber's milestone-conditioned investment creates financial incentives aligned with deployment velocity."
    claimRefs: [CO021, CO022, CO039]

