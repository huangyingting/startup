chapter:
  number: 1
  title: "Company Overview"
  summary: "Nuro, Inc. is a Mountain View, CA-based Physical AI company founded in 2016 by former Google self-driving car engineers Jiajun Zhu and Dave Ferguson. After raising $2.3B+ across five rounds—most recently a $203M Series E at a $6B valuation (August 2025)—Nuro pivoted from operating its own autonomous delivery fleet to licensing the Nuro Driver™ Level 4 autonomous driving system. Its marquee commercial bet is a three-way partnership with Lucid Motors and Uber targeting deployment of 35,000+ robotaxis globally, with testing underway and Bay Area commercial launch expected in late 2026."

sections:
  - id: identity-business-model
    title: "Company Identity and Business Model"
    body: "Nuro, Inc. is a Physical AI company headquartered in Mountain View, California, incorporated in 2016 by Jiajun Zhu and Dave Ferguson, both alumni of Google's pioneering self-driving car program (now Waymo). The company's core commercial product is the Nuro Driver™—an AI-first, Level 4 autonomous driving system that is vehicle-agnostic and designed to be licensed to automotive OEMs, mobility providers, and fleet operators. Nuro describes itself as building 'the world's most scalable driver,' combining cutting-edge end-to-end AI with automotive-grade hardware to give partners a clear and cost-effective path to commercial autonomy. The Nuro Driver integrates sensor fusion across high-resolution cameras, solid-state lidar, and radar, and runs on NVIDIA's DRIVE AGX Thor computing platform. Complementing the Nuro Driver is the Nuro Toolkit, a customizable SDK enabling deeper integration. The company's mission—'Autonomy for all. All roads, all rides.'—reflects a shift from a vertically integrated delivery-bot operator to a horizontal technology licensor serving OEMs, ride-hailing platforms, and logistics companies. Nuro validates five-plus years of driverless deployments, over 1.7 million autonomous miles, and zero at-fault incidents as the commercial proof-point behind its licensing offer."
    claimRefs: [CO001, CO002, CO003, CO004, CO005, CO034, CO035]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: leadership-governance
    title: "Leadership and Governance"
    body: "Nuro is led by its two co-founders in a dual-CEO structure formalized in October 2025. Jiajun Zhu, Co-Founder and Co-CEO, focuses on product and technology, while Dave Ferguson, Co-Founder and Co-CEO (elevated from President on October 22, 2025), leads capital and commercial partnerships. The co-founders describe having worked closely together for over 14 years since meeting at Google's self-driving car project. Their complementary strengths—Zhu's deep engineering roots and Ferguson's commercial and investor-relations orientation—underpin the company's leadership thesis. The remainder of the executive team includes Andrew Chapin as Chief Operating Officer and James Owens as Chief Legal and Policy Officer, who announced the May 2026 CPUC permit. Key-person concentration is elevated: both co-founders are central to Nuro's technology credibility, partnership relationships, and investor confidence. Governance is private; no independent board members have been publicly disclosed, though investors SoftBank Vision Fund, Tiger Global, Greylock, and T. Rowe Price hold board or observer representation per standard VC practice."
    claimRefs: [CO007, CO008, CO009, CO010, CO011, CO012]
    tableRefs: [TO002]

  - id: funding-investors
    title: "Funding History and Investor Map"
    body: "Nuro has raised over $2.3 billion across five funding rounds since 2016, making it one of the most heavily capitalized autonomous vehicle startups outside of Waymo. The company's early capital came from SoftBank Vision Fund (Series A $92M in 2017, Series B $500M in 2018), which established its large-scale ambitions. A $940M Series C in 2019 valued the company at $2.7B and brought in additional growth investors. A $600M Series D in 2021 led by Tiger Global pushed the valuation to a peak of $8.6B at the height of the AV-tech valuation cycle. The most recent Series E, closed in August 2025, raised $203M at a $6B post-money valuation—a 30% decline from the 2021 peak reflecting industry-wide reset and Nuro's own operational challenges. The Series E introduced two strategically significant investors: Uber Technologies and Nvidia (both first-time equity holders after longstanding operational relationships), alongside continuing institutional investors Baillie Gifford, T. Rowe Price, Fidelity, Tiger Global, Greylock Partners, and new entrants Icehouse Ventures, Kindred Ventures, and Pledge Ventures. Uber's investment is partially milestone-conditioned—linked to commercial deployment targets—creating an alignment incentive. Nvidia's equity stake deepens a pre-existing compute partnership in which Nuro runs on NVIDIA DRIVE AGX Thor hardware and uses Nvidia GPUs for large-scale model training."
    claimRefs: [CO013, CO014, CO015, CO016, CO017, CO018, CO019, CO020]
    tableRefs: [TO003]
    figureRefs: [FO003]

  - id: milestones-pivots
    title: "Key Milestones and Strategic Pivots"
    body: "Nuro's history follows a punctuated trajectory: rapid early scaling on the back of SoftBank's capital, a federal regulatory first (NHTSA's first-ever driverless vehicle exemption for the R2 in February 2020), an overextension that necessitated two rounds of layoffs in 2022-2023, a pivot to technology licensing, and a commercial relaunch anchored by the 2025 Lucid-Uber partnership. The November 2022 layoff (approximately 300 employees, ~20% of workforce) was attributed to economic downturn and the need to extend runway. The May 2023 restructuring was deeper—roughly 340 additional employees (~30% of remaining workforce) and a pause on commercial delivery expansion—while the co-founders acknowledged that the capital required to scale a vertically integrated delivery fleet was no longer financeable in the new rate environment. The 2023 pivot formalized Nuro's shift from fleet operator to technology licensor, a strategy validated by the Lucid-Uber partnership announced in July 2025 and the $203M Series E financing in August 2025. By January 2026, Nuro unveiled a production-intent robotaxi at CES alongside Lucid and Uber, with autonomous on-road testing already underway since December 2025. As of May 2026, Nuro has obtained both a California DMV Driverless Testing Permit and a CPUC Drivered Pilot Permit for the Lucid Gravity vehicles—one of only five companies with both permits in California."
    claimRefs: [CO027, CO028, CO029, CO030, CO031, CO032, CO033, CO036, CO037]
    tableRefs: [TO004]
    figureRefs: [FO001]

  - id: partnerships-regulatory
    title: "Current Partnerships and Regulatory Progress (2026)"
    body: "Nuro's flagship commercial relationship is the three-way partnership with Lucid Motors and Uber Technologies, announced July 2025 and substantially expanded by April 2026. Uber has committed $500 million to Lucid (owning ~11.5% of the EV maker) and expanded the fleet commitment from 20,000 to at least 35,000 Lucid Gravity SUVs integrated with Nuro Driver, to be deployed in dozens of U.S. and international markets over six years. Nuro leads the autonomy development and validation; Lucid integrates the AV hardware at its Casa Grande, Arizona factory; Uber owns, operates, and dispatches the fleet exclusively via its platform. Autonomous on-road testing with safety drivers began in December 2025 across multiple U.S. cities, and by April 2026 select Uber employees were testing the service in the Bay Area via the Uber app. Regulatory progress in California has been sequential: California DMV Driverless Testing Permit (April 2026), CPUC Drivered Pilot Permit (May 8, 2026). Remaining hurdles before paid commercial driverless rides include a California DMV Deployment Permit and a CPUC driverless ride-hailing permit—neither of which has been filed as of the run date. The commercial launch target remains late 2026 in the San Francisco Bay Area."
    claimRefs: [CO021, CO022, CO023, CO024, CO025, CO026, CO038, CO039, CO040]

