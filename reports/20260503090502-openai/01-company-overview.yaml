callouts:
  - type: strength
    title: Enterprise traction is now company-defining
    body: OpenAI's own disclosures are strong enough to treat enterprise and developer adoption as a core identity fact, not just a growth option.
    claimRefs: [C010, C011, C012]
  - type: watchout
    title: Governance is atypical even by frontier-AI standards
    body: The nonprofit-controlled PBC structure may support mission continuity, but it also complicates ordinary investor assumptions about control and downside protections.
    claimRefs: [C004, C005, C007, C008]
  - type: gap
    title: Public economics remain incomplete
    body: Public materials provide strong adoption evidence but not enough audited detail on margins, net revenue retention, top-account concentration, or compute-adjusted cash generation.
    claimRefs: [C015, C017]
  - type: verdict
    title: Identity confidence high; underwritten scale confidence medium-high
    body: The company is clearly real, large, and strategically important; the harder question is not whether it has scale, but what that scale is worth after governance and compute constraints.
    claimRefs: [C006, C010, C011, C017]
