  evidenceGaps:
    - topic: financials
      missingEvidence: Public audited income statement, cash flow, and compute-adjusted margin data remain unavailable.
      whyItMatters: Snapshot investability cannot be separated cleanly from infrastructure economics.
      diligencePath: Request management financials, hyperscaler contract economics, and board-approved budget/range forecasts.
    - topic: governance
      missingEvidence: Minority-investor protections, reserved matters, and mission-governance override mechanics are not fully public.
      whyItMatters: Ownership percentages alone do not explain real control risk.
      diligencePath: Review charter documents, shareholder agreements, committee mandates, and side letters.
    - topic: customers
      missingEvidence: Public customer-count and seat disclosures do not reveal revenue concentration, renewal rates, or cohort durability.
      whyItMatters: Scale without retention quality can overstate business durability.
      diligencePath: Request top-customer concentration, GRR/NRR, seat expansion by plan, and enterprise cohort data.
