callouts:
  - type: strength
    title: Market velocity is proven
    body: Public disclosures are sufficient to conclude OpenAI has already crossed from experimental demand into scaled enterprise and developer adoption.
    claimRefs: [C004, C005, C006]
  - type: gap
    title: Precise SAM and SOM remain hard to isolate
    body: Usage, seats, tokens, and customer counts are public; realized revenue by segment, geography, and vertical is not.
    claimRefs: [C004, C007]
  - type: verdict
    title: Attractive market, medium-confidence monetization boundary
    body: OpenAI is clearly participating in a very large and fast-growing market, but public evidence constrains precision on how much of that demand converts into durable economics.
    claimRefs: [C004, C005, C006, C013]
