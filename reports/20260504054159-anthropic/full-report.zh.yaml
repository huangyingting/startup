      - number: '4.3'
        title: 成本结构与资本充足性：云和算力承诺主导财务叙事
        blocks:
          - type: paragraph
            body: >-
              Anthropic 的财务画像受前沿模型算力、基础设施访问和安全开销影响更大，而不是由经典 SaaS 成本项塑造。Anthropic 官方及合作伙伴发布已经确立了深度云依赖：Amazon 表示 AWS 是
              Anthropic 关键任务工作负载和未来模型开发的主要云服务商；Anthropic 2025 年 11 月的 Microsoft-NVIDIA 公告称，公司承诺购买 $30B 的 Azure
              算力容量，并签约额外最高一吉瓦容量。同一公告还增加了 NVIDIA 最高 $10B 投资和 Microsoft 最高 $5B 投资，同时仍称 Amazon 是 Anthropic
              的主要云服务商和训练合作伙伴。最重要的硬证据来自 Amazon 2025 年 Q1 10-Q。Amazon 披露，2023 年有一张 $1.25B Anthropic 可转债，2024 年有第二张 $2.75B
              票据，2024 年末有第三张 $1.3B 票据，并有一项到 2025 年 Q4 到期的进一步 $2.7B 承诺。它还披露，这些票据已部分转换为无投票权优先股，重分类产生约 $3.3B 收益，截至 2025 年 3
              月 31 日票据和优先股公允价值估计合计 $13.8B。结合 Anthropic 围绕 Project Glasswing 和 ASL-3
              部署开销的自身披露，公开记录强烈暗示这是一项资本密集型业务，且有大量外部融资支持，但尚不能从公开证据承销其内部现金生成、烧钱或 runway。
