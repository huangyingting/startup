chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份、使命与运营模式
        blocks:
          - type: paragraph
            body: >-
              Anthropic 官方公司页面将其描述为一家 AI 安全与研究公司，致力于构建可靠、可解释、可控的 AI 系统。这个定位不只是品牌叙事：同一批官方材料把 Anthropic
              的使命与公益公司形式、安全优先的研究议程，以及通过直营产品和合作伙伴渠道分销 Claude 的商业模式绑定在一起。公开的产品和商业计划发布显示，公司不只是单一消费者应用，而是通过 Claude
              订阅、企业席位、API 访问，以及嵌入主要云与工作流平台的分销来变现。官方公司页面没有公布街道地址，但 Anthropic 自身招聘页面和研究文章反复将运营锚定在 San
              Francisco，这是本章最可支持的主要办公室参考点。公开地域证据也显示，随着国际化扩张，公司正从这一基地延伸到 Tokyo 和 Bengaluru。
