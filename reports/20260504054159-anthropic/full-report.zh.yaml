      - number: '8.3'
        title: 情景逻辑：上行存在，但从公开证据看，下行路径更容易论证
        blocks:
          - type: paragraph
            body: >-
              上行情景很直接。如果 Anthropic 能把当前 >$30 billion run-rate 转化为持久的确认收入，保持编码和企业动能，并在不放弃过多经济性的情况下维持广泛云分发，那么已验证的 $380
              billion 估值可能只是要求很高，而非过度。公司对此有实质支撑：Snowflake 称该合作向 12,600+ 客户开放 Claude；AWS 称 Anthropic
              选择其作为主要云供应商；Microsoft 称 Claude 正在 Azure 和 Foundry 上扩展；Reuters 称 Alphabet 既是主要投资者，也是通过 Gemini Enterprise
              的分发伙伴。不过，从公开证据看，下行情景更容易承销，因为它不需要需求崩塌。它只需要三件事之一发生：第一，总额口径年化收入转换成显著更低的净收入等价物；第二，对 AWS、Azure 和 Broadcom 相关
              TPU 的巨额算力承诺跑在变现之前；第三，在上市公司级披露到来前，法律、采购或可靠性问题压缩倍数。公开数据已经支持全部三条下行路径。
