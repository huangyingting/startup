              GTM 叙事在扩张表面积上最强，而不是在已披露续约经济性上最强。Anthropic 可以通过直营应用计划、直接 API 合同、超大规模云厂商渠道和 marketplace
              采购路径落地客户，然后通过更多席位、更深治理控制、开发者工作流，或消耗既有 Anthropic 承诺的合作伙伴工具扩张。AWS Marketplace 可用性、AWS 和 Vertex 路由，以及 Cox
              Automotive 的 Bedrock 部署都支持这种扩张叙事。与此同时，公开证据提醒不要假设强锁定。Harvey 的公开材料强调按任务进行严格模型评估，而不是每个工作流都有一个永久默认模型。Delivery
              Hero 使用 Vertex AI 和 LiteLLM，部分原因是为了保留模型选择权并避免采购瓶颈。Bedrock 客户也无法获得完整的一方 Anthropic
              工具栈，因此合作伙伴渠道增长可以扩大覆盖面，同时降低与直营平台的功能一致性。最大未解问题是耐久性。公开来源没有披露
