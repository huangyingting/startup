        - 直接前沿模型实验室
        - CNBC 报道 2025 年 3 月估值为 $61.5B
        - 企业、开发者、编码密集型团队、受监管买方
        - 强编码声誉、多云分发、公开页面上异常深入的企业控制
        - 确切企业合同定价和实际折扣并未公开
      - - OpenAI
        - 直接前沿模型实验室 + 企业平台
        - 消费者心智中的私有市场领导者；公开 API 费率卡和 business/enterprise 表面
        - 开发者、业务团队、广泛企业部署
        - API 广度强、业务数据控制、大型安装基础
        - 已审阅公开抓取未显示完整企业席位价目表
      - - Google Gemini / Workspace + Vertex AI 组合
        - 既有套件厂商 + 云平台
        - 拥有 Workspace 和 Google Cloud 分发的公开既有厂商
        - 标准化使用 Workspace 的企业和云构建者
        - 捆绑生产力分发、企业数据区域、DLP 和 Vertex 控制
        - 企业定价大多需要联系销售，确切可比 API 包跨多个表面混合
      - - Microsoft 365 Copilot / Azure OpenAI
        - 既有套件厂商 + 云平台
        - 拥有 Microsoft 365 和 Azure 分发的公开既有厂商
        - 标准化使用 Microsoft 的企业和 Azure 开发者
        - 嵌入式应用工作流访问、Microsoft Graph grounding、Microsoft 365 内部隐私边界
        - 已审阅公开页面更强调打包和控制，而不是简单可直接对比的席位经济性
      - - Amazon Bedrock / Amazon Q
        - 多模型基础设施 + 助手
        - AWS 分发、多个模型供应商、Amazon Q Lite/Pro 标价
        - 以 AWS 为中心的构建者、平台团队、内部知识工作部署
        - 模型可选性、批量折扣、安全/合规姿态、Q 的低门槛席位定价
        - 终端用户助手品牌弱于 Claude、ChatGPT 或 Copilot
      - - OpenRouter
        - 相邻路由层
        - 通过一个 API 接入来自 60+ 家提供商的 300+ 个模型；按量付费额度收取 5.5% 平台费
        - 优先考虑提供商可选性的开发者和团队
        - 快速切换、故障回退、提供商选择，以及多模型采购简化
        - 它是路由层，不是纵向整合的企业助手
      - - Mistral
        - 偏主权和隐私的替代方案
        - CNBC 报道其 2025 年 9 月估值约为 $14B
        - 对欧洲敏感的企业、AI 构建者、私有部署买家
        - 可任意部署的姿态、数据所有权表述、隐私和企业级包装
        - 公开采用份额证据远少于 Anthropic 或 OpenAI
