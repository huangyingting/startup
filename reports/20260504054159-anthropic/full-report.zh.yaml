  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 建议：已验证估值不再离谱，但仅凭公开信息的投资论证仍不足以支持买入
        blocks:
          - type: paragraph
            body: >-
              Anthropic 应被视为真实的后期平台来分析，而不是投机性原型。公司自身称其在 2026 年 2 月以 $380 billion 投后估值融资 $30 billion；到 4 月，公司称年化收入
              run-rate 在 2025 年初约 $9 billion 的基础上已超过 $30 billion。这些是顶级增长信号，配套客户证据也不轻：Anthropic 还称截至 4 月初，已有超过 1,000
              家企业客户年化支出各自超过 $1 million。仅从这一头条视角看，该估值可表述为约 12.7x 年化收入，虽高但并未脱离优质公开 AI
              软件公司的估值筛选。问题在于，公开记录仍没有提供投资者真正需要的正常化桥。Reuters 称 Anthropic 相对超大规模云厂商渠道按总额口径确认收入；公司未披露 Series G
              的优先权和稀释条款；算力承诺现在看起来足以重塑利润率结果。这一组合足以支持“继续研究”的姿态，但在当前已验证估值下，仍不足以支持买入建议。
