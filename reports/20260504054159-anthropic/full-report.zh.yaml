      - number: '8.4'
        title: 退出准备与最终尽调：IPO 方向可见，但披露质量仍未达投资级
        blocks:
          - type: paragraph
            body: >-
              Reuters 已把 Anthropic 放入可能的 AI IPO
              候选公司群体，这意味着流动性不再是假设性问题。问题不是公司是否具备规模、品牌或投资者通道；问题是没有私有尽调室的情况下，公开记录是否足以证明当前价格合理。按这个标准，它仍然不够。Series G
              公告给出了头条估值和投资者名单，但没有给出优先权结构、清算权、棘轮或稀释瀑布。Reuters
              给出了关于总额收入的关键会计提示，但没有给出调节后的收入确认桥。官方合作公告显示了非同寻常的云访问能力，但没有给出建模下行所需的 take-or-pay、预付款或利用率时间表。LTBT 结构和 Public
              Benefit Corporation 形式让治理叙事更清晰，但也让最终控制权和董事会权利图景比标准风投支持的 SaaS IPO 更复杂。因此最终判断仍是“继续研究”：Anthropic
              看起来像一个可能的未来公开市场领导者，但还不像一家投资者仅凭公开数据就能有信心承销的公司。
