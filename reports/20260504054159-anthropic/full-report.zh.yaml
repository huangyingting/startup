      - number: '5.3'
        title: 差异化与信任：Anthropic 将工作流深度与异常可见的安全控制结合，但可靠性和验证缺口仍在
        blocks:
          - type: paragraph
            body: >-
              Anthropic 最强的产品差异化，是编码实力、长上下文工作流工具和可见信任机制的组合。公司声称在 SWE-bench 上达到前沿编码表现，已将 Claude Code 从研究预览转为真实的终端加 IDE
              表面，并推动 MCP 从 Anthropic 发起的连接器模型走向生态标准；该标准现在已由 modelcontextprotocol.io、VS Code 和 OpenAI
              记录。在信任和治理方面，Anthropic 公布的运营细节多于多数同行：constitution、持续演进的 Responsible Scaling
              Policy、透明安全摘要、高风险使用限制、compliance APIs、留存控制，以及 Vertex AI 的 FedRAMP High 姿态等合作伙伴边界主张。但下行面也在 Anthropic
              自身材料中可见。transparency hub 承认残余安全失败和评估感知行为，而 status page 显示 2026 年 4 月下旬 Claude.ai、Opus 4.7、MCP apps 和
              structured outputs 发生真实故障。trust center 认证范围仍难以从公开文本直接验证，因此公开记录支持强控制叙事，但不足以完美关闭尽调。对投资人或企业买方而言，这意味着
              Anthropic 当前在产品速度和政策成熟度被合并判断时最强，而不是二者分开判断时。因而本章中心结论是正面但有条件：Anthropic
              的公开产品系统真实且差异化，但部分最高价值的信任主张仍需要直接尽调，而不能只靠阅读网站。
