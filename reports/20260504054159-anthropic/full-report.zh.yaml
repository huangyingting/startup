      - number: '4.2'
        title: GTM 动作与牵引代理指标：企业主导需求可见，但销售效率不可见
        blocks:
          - type: paragraph
            body: >-
              最好的公开牵引证据指向一种由企业需求主导、同时有产品驱动入口和合作伙伴分销支持的 GTM 动作。Anthropic 的企业页面和客户案例研究展示的是具名采用代理指标，而不是可核对的客户数：Zapier 报告
              89% 员工采用、部署 800 多个 AI 智能体，以及应用使用量增长 10x；GitLab 报告 98% 受访用户满意度；Quantium 报告提案工作时间减少 90%；NBIM 报告每周节省约 20%
              时间；Lyft 报告支持解决时间缩短超过 87%；Canva 表示超过 5,000 名员工获得访问权限，其中 65% 每天或经常使用 AI。渠道伙伴显著延伸了这一动作。Snowflake 扩大后的合作关系把
              Claude 放到 12,600 多家企业客户面前，并称已有数千名客户每月处理数万亿 Claude token。Zoom
              的合作与投资表明，在联络中心和协作工作流中存在嵌入式分销价值。这些是强收入质量信号，因为它们显示复杂企业环境中的真实生产使用，但它们仍是代理指标。公开记录没有披露
              CAC、销售周期长度、实施成本、回本期、队列留存或净留存率（NRR），因此财务投资承销仍无法从采用证据推进到真正的企业效率模型。
