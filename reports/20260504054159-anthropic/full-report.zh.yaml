      - number: '1.4'
        title: 里程碑、监管审查与证据缺口
        blocks:
          - type: paragraph
            body: >-
              Anthropic 的公开时间线已经足够密集，会影响后续章节。记录从 2021 年 Series A 和公司公开亮相开始，经 2023 年 Long-Term Benefit Trust 设立和 Amazon
              合作，到 2024 年 Claude 3 发布和 Mike Krieger 加入，再进入 2025–2026 年事件，包括 FTC 对云服务商合作关系的公开审查、Series E 融资、Snowflake
              分销扩展、India 办公室建设，以及 Vas Narasimhan 董事任命。这里也是公开证据开始不完整的地方。FTC 的问询和员工报告明确指出，涉及 Anthropic
              的安排存在锁定、切换成本和敏感技术信息访问方面的风险。CourtListener 也显示 Bartz v. Anthropic PBC
              的版权诉讼仍在进行。与此同时，若干公司概览的标准指标在公开材料中仍未解决：确切员工人数、经核实的当前客户数，以及纳入 Google 和其他投资者持股比例的完整资本表。这些遗漏并不削弱 Anthropic
              作为领先前沿 AI 公司的地位，但确实阻碍了更干净的投资承销判断。
