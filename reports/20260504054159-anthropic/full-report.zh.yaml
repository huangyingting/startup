      - number: '3.2'
        title: 画像与定价：Anthropic 在编码和企业份额上领先，但竞争对手通过套件捆绑或可选性进攻
        blocks:
          - type: paragraph
            body: >-
              最强的直接竞争对手仍是 OpenAI，因为它同时在 API 用量和企业聊天上竞争，且其公开 API 价目表仍可与 Anthropic 旗舰 token
              定价比较。但官方产品表面显示，行业内战略姿态各不相同。Anthropic 自身定价页面明确列出 Claude Team 和 Enterprise，把 Claude Code
              纳入付费订阅，并暴露了相对深入的企业控制层。Google Workspace Enterprise 计划和 Microsoft 365 Copilot 的竞争方式不同：它们把 AI
              嵌入企业已经付费和治理的工具中，即便直接模型偏好混杂，也能带来采购杠杆。Amazon Bedrock 和 OpenRouter
              竞争的是可选性，而不是一个品牌化助手，让买方把多个模型供应商放在一个控制平面之后。Mistral 围绕隐私、部署自由和主权定位，其 Studio 材料中有 Team 和 Enterprise 包装以及
              deploy-anywhere 表述。独立的 2025 份额数据是 Anthropic 已不再只是小众挑战者的最清晰证据：TechCrunch 对 Menlo 年中企业数据的报道显示，Anthropic 企业
              LLM 使用份额为 32%，OpenAI 为 25%；编码份额为 42%，OpenAI 为 21%。这是实实在在的当前优势，但它也与大多数大型企业合同在按用量 API
              之外的公开定价不透明共存，并且需要抵御分销能力更强的竞争对手。公开的输赢和续约证据将决定这种领先是否持久。
