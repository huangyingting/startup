    rows:
      - - Anthropic 目前领先企业使用和编程场景
        - OpenAI、Google 和新的前沿模型可能快速缩小性能差距
        - 高
        - 跟踪编程份额领先是否能延续到 2025 年 Menlo 快照之后，以及客户续约是否匹配份额提升
