  - id: TV005
    title: 论点失效与终止触发表
    columns:
      - 触发项
      - 阈值
      - 对论点的传导
      - 行动含义
    rows:
      - - 净收入现实令人失望
        - 私下尽调显示，gross run-rate 转化为确认收入或留存收入时，显著低于公开读者的推断。
        - 当前估值会建立在比可比公司集合所暗示更弱的分母上。
        - 除非入场价格重置，否则从继续研究转向按当前价格回避。
      - - 算力义务跑在变现之前
        - 利用率、take-or-pay 或预付款时间表显示，固定义务相对收入转化过大。
        - Anthropic 会从软件稀缺性故事变成资本承诺故事。
        - 用更低利润率和更低倍数重切牛市和基准情景。
      - - 法律或采购悬而未决问题恶化
        - 版权、Pentagon 或其他政府行动扩大商业限制或必要合规成本。
        - 倍数可能在收入有时间追上前先压缩。
        - 暂停新的投资判断，直到事件路径清楚。
      - - 可靠性压力变成反复问题
        - 反复出现 Claude/API/Claude Code 中断或发布退化，使需求增长转化为信任侵蚀。
        - 收入质量和续约信心下降，尤其是在企业和编码工作流中。
        - 降低牛市情景概率并上调风险评级。
      - - 治理或股权结构条款被证明对投资者不友好
        - Series G 优先权结构、否决权或 LTBT 相关控制机制，降低新资金的实际经济性。
        - 标题估值不再代表可投资经济性。
        - 没有修订条款或显著更好价格则不要推进。
    notes: 这些是决策触发项，而非泛泛风险；每一项都会直接削弱支撑当前已验证估值所需的假设。
