      - number: '2.2'
        title: 买方分层、预算与采用路径
        blocks:
          - type: paragraph
            body: >-
              公开证据显示 Anthropic 同时进入多个买方图谱。最上层是横向企业知识工作，Team 和 Enterprise 包装、SSO、审计日志和域控制支持广泛员工部署。第二层是开发者和技术买方，Claude
              Code、按 token 定价的 API、托管智能体功能，以及 AWS 和 Google Cloud 上的合作伙伴可用性，契合平台、工程和产品预算。第三层是机构高等教育，Anthropic
              已推出专门产品、全校协议，以及 Learning Mode 和教育集成等教学特定功能。客户证据和合作伙伴证据进一步拓宽了图谱：ServiceNow 在开发者和运营场景中使用 Claude，Anthropic
              的企业材料强调支持和分析工作流，云市场则把采购导向企业已经控制的预算。采用路径似乎也可复制。Menlo 的 PLG 证据和 Stack Overflow 的开发者使用率显示，个人和团队试用可以很快发生，但企业
              rollout 通常需要安全、支出控制、治理审查，然后再通过直销或合作伙伴采购形成更大的预算承诺。这意味着买方覆盖面广，但推进并不均衡。
