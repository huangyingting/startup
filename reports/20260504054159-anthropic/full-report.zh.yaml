      - - 开放权重使用目前仍是少数
        - 私有部署和主权需求仍可能把敏感工作负载从 Claude 拉走
        - 中
        - 按数据敏感性和驻留要求切分交易，而不是假设存在一个普适护城河
      - - 当前买而不建的行为有利于 Anthropic 等供应商
        - 对资源充足的团队，内部自建仍然可行；即便它不是主流路径，也可能限制定价权
        - 中
        - 在承保留存前，尽调迁移时间、内部评估栈和基准可移植性
