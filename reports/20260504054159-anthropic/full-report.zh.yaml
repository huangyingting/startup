            body: >-
              对一家私营 AI 公司而言，Anthropic 的客户案例研究异常详细，最好的案例远超 logo 幻灯片。Lyft 表示，其由 Claude 驱动、通过 Amazon Bedrock
              部署的客服助手，将平均解决时间缩短 87%，现在每天解决数千个请求。GitLab 将 Claude 定位为 GitLab Duo Agent Platform 内的默认模型，并继承现有 DevSecOps
              技术栈中的合规和审计控制。Slack 表示，由 Claude 驱动的搜索、摘要和回顾在数十亿条消息和文件上运行，每周为平均用户节省 97 分钟。HubSpot 报告最高 40%
              的生产率提升，并将复杂技术故障排查从三到五天缩短到一小时以内。Syracuse University 从实验转向全机构 rollout，向每名学生、教职员工提供 Claude，并报告授权用户中 80–90%
              每周活跃使用，以及学生和员工活动强劲增长。Delivery Hero 展示了另一类证据：Claude 嵌入工程工作流，每天合并 100+ 个 pull request，中央工程 LiteLLM 请求约 95%
              流向 Claude。Intercom 和 Cox Automotive 将这种模式延伸到 B2B2B 场景，在这些场景中 Anthropic
              的有效触达还包括它们的客户。结果是，在支持、软件交付、协作、分析、教育和受监管金融领域形成可信的生产使用记录。
