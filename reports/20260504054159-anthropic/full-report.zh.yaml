      - number: '3.3'
        title: 切换成本、锁定、多栖采用与护城河耐久性
        blocks:
          - type: paragraph
            body: >-
              Anthropic 的护城河真实存在，但有条件。Claude Team 和 Enterprise 上公开的企业控制能力，包括 SSO、管理员控制、审计日志、SCIM、支出控制和留存选项，帮助 Anthropic
              更像严肃工作系统，而不是轻量模型端点。一旦企业将 Claude 标准化用于编码或知识工作流程，这会支持更粘性的部署。反向证据同样重要。Microsoft 和 Google 可以把 AI
              采购藏进既有套件和身份关系中。Amazon Bedrock 和 OpenRouter 让多模型路由、供应商选择和 fallback 在运营上更容易，降低多栖采用摩擦。即使开源工作负载在 Menlo 2025
              数据中仍占少数，来自内部自建或 Mistral 等供应商的开放权重和 deploy-anywhere 选项，仍对主权和私有部署用例有意义。结果是一个结构性锁定弱于经典 SaaS 的市场：Anthropic
              可以凭模型质量、编码表现和企业易用性获胜，但不能假设这些胜利会自动转化为持久经济权力。因此，尽调重点应放在实际合同条款、迁移摩擦、留存，以及 Claude
              在编码和企业控制上的领先是否足够大，能否抵消套件权力和路由可选性。
