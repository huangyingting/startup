  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 为什么重要
      - 负责人或尽调路径
    rows:
      - - Series G 经济性
        - 优先顺序、清算权、ratchets、MFN 条款、转换条款，以及任何二级交易组成。
        - 这些条款决定 $380B 标题估值对新资金而言是否具有真实经济性。
        - 管理层、律师和融资室文件。
      - - 收入质量
        - 从年化标题收入到按直销 vs 合作渠道划分的确认收入和留存收入的桥接。
        - gross-versus-net 处理是公开可比性中最大的单一 caveat。
        - CFO 尽调包和收入确认备忘录。
      - - 客户持久性
        - 企业和编码 cohort 的头部客户集中度、NRR、GRR、流失率和合同期限。
        - 当前估值假设 run-rate 是持久的，而不是促销性或集中化的。
        - 销售财务导出和 cohort 表。
      - - 算力承诺
        - AWS、Azure、NVIDIA 和 TPU 容量下的 take-or-pay、预付款、利用率和取消条款。
        - 下行可能来自义务跑在变现之前，而不只是需求疲弱。
        - 基础设施采购、财务团队和董事会批准的 capex 时间表。
      - - IPO 控制与治理
        - 董事权利图、LTBT 席位图、披露控制、审计准备度，以及任何上市公司转换计划。
        - Anthropic 可能先达到 IPO 规模，再达到 IPO 级治理清晰度。
        - 总法律顾问、CFO、审计委员会和外部律师材料。
      - - 法律与政策敞口
        - 准备金政策、诉讼状态、政府渠道管线，以及任何与采购争议相关的商业限制。
        - 即使需求保持强劲，也可能发生倍数压缩。
        - 法律资料室、政策团队和政府事务尽调。
    notes: 这些问题范围窄且对投资关键；每一项都可能改变推荐或可接受入场价。
