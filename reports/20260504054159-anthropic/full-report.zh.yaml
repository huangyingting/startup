      - number: '7.4'
        title: 监控与终止条件：投资论证的核心不是风险是否存在，而是隐性集中度和质量指标是否恶化
        blocks:
          - type: paragraph
            body: >-
              只有在尽调持续区分已披露缓释措施与仍阻碍精确判断的缺失数据时，Anthropic
              的风险图谱才可被承销。公开证据已足以对主要风险排序：版权和政策冲击可能损害受监管行业或政府渠道分发；可靠性和编码质量回退可能伤及近期增长所依赖的产品线；算力承诺则带来外部难以量化的融资和利润率敏感性。未决问题范围更窄但重要。公开来源没有显示近期
              LTBT 调整后的确切董事席位分配、头部客户收入占比、企业续约 cohort、SLA
              抵扣，或合同算力与实际变现之间的固定支出桥。这些缺口不意味着风险是灾难性的，但意味着投资假设破裂应绑定可观察触发器：反复发生多产品故障、可见的容量配给、重大不利诉讼裁决、交易对手重新定价算力的速度超过
              Anthropic 向客户转嫁的能力，或 IPO 期间削弱披露可信度的治理摩擦。换言之，正确姿态不是仅因风险否定公司，而是在承销最佳估值路径前，要求对集中度、服务质量和算力经济性给出更严密证明。
