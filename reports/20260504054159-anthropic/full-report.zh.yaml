  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 格局：直接模型实验室、捆绑型在位者、路由层和内部自建替代方案
        blocks:
          - type: paragraph
            body: >-
              Anthropic 所销售的市场，并不是买方只在 Claude 与另一家前沿模型实验室之间做选择。实际替代集合现在是分层的。直接模型实验室竞争仍然重要，尤其是与 OpenAI 的竞争；但大型企业买方也可以留在
              Google 或 Microsoft 的既有生产力套件内，通过 Amazon Bedrock 或 OpenRouter
              等基础设施和路由层采购，或者在治理或控制比购买单一供应商完整表面更重要时，基于开放权重技术栈内部自建。公开证据显示 Anthropic 自身也参与这一更广格局：Claude 通过直营、Amazon Bedrock
              和 Google Cloud Vertex AI 销售，而 Claude Code 将产品延伸进开发者工作流。Menlo 的 2025 企业数据是重要背景，因为它显示内部自建仍然真实存在，但已不是主流路径：76%
              的 AI 用例现在是购买而非内部自建，只有 13% 的企业日常工作负载使用开源模型。这意味着 Anthropic
              受益于当前买方偏好购买工具，但它也面对一个更流动的市场，在这个市场中，买方可以在多个购买和路由选项之间切换，而不是接受经典的单一供应商 SaaS 锁定模式。
