      - number: '7.3'
        title: 基础设施、合作伙伴、客户和竞争风险：多元化有帮助，但交易对手和开放标准仍重要
        blocks:
          - type: paragraph
            body: >-
              相比单一云或单一渠道厂商，Anthropic 的供应与分发更分散，但风险结构仍高度受伙伴关系影响。AWS 仍是主要供应商；Anthropic 已承诺在十年内为最高 5 GW 的 Amazon 算力投入超过
              $100 billion；Microsoft 称 Anthropic 已承诺购买 $30 billion 的 Azure 算力；Broadcom 2026 年 4 月的 8-K 称，Anthropic 将通过
              Google 生态合作从 2027 年起获得约 3.5 GW 的 TPU
              容量。这种多元化降低了单次故障或商业争议立即击穿业务的概率，但也提高了多个交易对手同时影响利润率、上线速度和议价能力的可能性。客户广度有助于抵消纯粹的集中度风险——GIC 和 Anthropic
              都提到年化支出超过 $1 million 的客户先是数百家、随后超过 1,000 家——但公开来源仍未披露头部客户占比、续约行为或直销与伙伴收入结构。竞争和商品化风险也仍然真实存在。MCP 现在已被
              ChatGPT、VS Code、Cursor 等支持，因此互操作性可能扩大采用，同时也降低工具连接的切换成本。与此同时，Claude Code 的可用性和质量现在直接关系到增长，因为多家投资者和媒体来源都把
              Anthropic 的收入加速与编码需求联系起来。
