      - number: '8.2'
        title: 价格背景：按头条 ARR 看，Anthropic 接近优质软件可比公司，但可比性弱于倍数表象
        blocks:
          - type: paragraph
            body: >-
              对 Anthropic 最干净的框架，是把它视为一家处在两类可比公司之间交易的私有前沿模型公司。一边是 Microsoft、Alphabet 和 Amazon 等多元化公开平台，按当前市场数据约以
              9.7x、11.0x 和 3.9x 销售额交易。另一边是更高溢价的 AI 名称，例如 Snowflake 约 10.4x、Palantir 约 77x。Anthropic 自身由已验证的 $380 billion
              融资轮和公司报告 run-rate 推出的约 12.7x 隐含倍数，因此高于 Amazon、略高于 Microsoft、接近 Alphabet 和 Snowflake，并远低于 Palantir 的 AI
              溢价极值。这使该估值比单纯的“标价震惊”反应更容易理解。但同一比较也内含缺陷：公开 P/S 倍数基于经审计的历史收入，而 Anthropic 的数字是公司报告的年化 run-rate，且 Reuters 称
              Anthropic 至少通过部分超大规模云厂商渠道按总额确认收入。因此头条倍数在方向上有用，但不能像公开可比公司组合那样承销。
