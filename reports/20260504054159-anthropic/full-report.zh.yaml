      - number: '5.2'
        title: 架构与运营模式：模型层级位于多层工具和合作伙伴部署栈之内
        blocks:
          - type: paragraph
            body: >-
              公开文档对外层运营模式异常明确，同时有意不披露隐藏内部架构。Anthropic 记录了三个当前普遍可用的模型层级——Opus 4.7、Sonnet 4.6 和 Haiku
              4.5——它们有不同上下文窗口、输出限制和推理模式，另有面向防御性网络安全的受限 Mythos preview。围绕这些模型，Anthropic 现在暴露了一个工具层，包括 code
              execution、remote MCP connections、Files、web search 和寿命更长的 caching。分销也被设计为多渠道：同一核心模型家族出现在 Anthropic 自有
              API、Amazon Bedrock、Google Vertex AI 和 Microsoft Foundry 上。因此，公开技术栈看起来像一个分层系统：顶层是用户表面和管理控制，中间是模型选择，模型周围是工具和
              runtime 服务，底层是超大规模云厂商基础设施。同样重要但仍不透明的是：Anthropic
              不披露模型架构、训练算力规模、数据混合权重或跨云部署的确切经济性。换言之，买方可以理解可观察的运营边界，但仍无法完全检查产生能力、成本和韧性的隐藏引擎。这种不透明是前沿模型的常见特征，但意味着产品尽调必须止步于已记录层，而不能推断内部。
