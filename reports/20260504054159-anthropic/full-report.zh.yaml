  - id: TV004
    title: 可比估值表
    columns:
      - 可比对象
      - 指标
      - 倍数 / 估值 / 状态
      - 相关性
      - 局限
    rows:
      - - Anthropic
        - 私募估值 / 公司报告的年化收入
        - 基于 $380B 和 >$30B run-rate 约为 12.7x
        - 最接近当前入场估值的参考，也是投资者实际被要求承销的基准。
        - 使用公司报告的年化收入，而非经审计的过去收入；优先权条款和净收入留存未披露。
      - - Microsoft
        - 公开 P/S
        - ~9.7x-10.1x
        - 企业 AI 分发、云触达和工具变现的最佳大型股基准。
        - 多元化 mega-cap；AI 只是业务的一部分，利润率成熟得多。
      - - Alphabet
        - 公开 P/S
        - ~11.0x
        - 相关性在于 Alphabet 既是 Anthropic 的主要投资者，也是 Claude 的直接云分发路径。
        - 广告与云混合业务多元；不是纯粹的前沿模型实验室。
      - - Amazon
        - 公开 P/S
        - ~3.9x-4.0x
        - 对同时供应并分发 Anthropic 的超大规模云厂商而言，是有用的较低倍数基准。
        - 零售和 marketplace 组合使其商业模式远比 AI 软件宽泛。
      - - Snowflake
        - 公开 P/S
        - ~10.4x-11.1x
        - 更接近软件公司的高溢价可比对象，且与 Anthropic 有直接合作和企业数据邻近性。
        - 不是基础模型创建者；资本密集度和研究风险低得多。
      - - Palantir
        - 公开 P/S
        - ~77.0x-77.2x
        - 展示公开市场仍愿意为稀缺 AI 溢价叙事、国防和平台敞口支付多少。
        - 政府业务组合、盈利能力和上市公司披露使其只是非常宽松的上限参考，而非严格可比。
    notes: 没有单一公开可比公司能完全匹配 Anthropic。本表混合直接定价语境、超大规模云厂商路径、软件高溢价可比公司，以及一个 AI 溢价极端值，以界定讨论边界。
    enumerationScope:
      coverage: partial
      basis: >-
        This table covers the most decision-useful public and private comparables with accessible May 2026 evidence. It
        is not exhaustive because several frontier-model peers still lack directly comparable public revenue,
        preference, and channel-normalization data.
