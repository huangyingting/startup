  - id: TV002
    title: 正方 / 反方论点表
    columns:
      - 论点
      - 方向
      - 什么会改变观点
    rows:
      - - Anthropic 已有前沿规模需求证据：run-rate 超过 $30B，且 1,000+ 个企业客户年化支出超过 $1M。
        - 正方
        - 若经审计或标准化数字显示留存收入低得多，溢价逻辑会显著削弱。
      - - 通过 AWS、Google、Microsoft 和 Snowflake 的云分发，比纯直销 GTM 模式更快扩大触达。
        - 正方
        - 如果这些渠道拿走过多经济性或降低一方控制力，分发会从护城河变成利润率拖累。
      - - 约 12.7x 标题 ARR 倍数相对高溢价 AI 软件可比公司并非明显荒谬。
        - 正方
        - 如果稀缺性倍数向 Amazon 式或成熟平台水平回归，当前估值会很快失去支撑。
      - - Series G 条款、稀释和清算优先权仍未公开。
        - 反方
        - 看到完整优先权结构和任何 ratchets，可能实质性改善或恶化投资判断。
      - - 资本密集度足够高，需求本身不会单独决定价值。
        - 反方
        - 清晰的支出到收入桥接和利用率时间表，会降低对算力义务跑在变现之前的担忧。
      - - 法律、采购和可靠性问题可能在财务追上前先压缩倍数。
        - 反方
        - 现有争议关闭、服务质量更稳定、政府定位更清晰，都会改善信心。
    notes: 论点围绕当前价格已经隐含了什么展开，而不是围绕 Anthropic 是否是一家技术上强的公司展开。
