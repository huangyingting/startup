  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义：Anthropic 已从聊天助手扩展到应用、API、编码和智能体工作流
        blocks:
          - type: paragraph
            body: >-
              Anthropic 的公开产品表面现在已经足够宽，可以被描述为一个平台家族，而不是单一助手。Claude 的计划页面展示了带多种应用集成的消费者和企业工作区；Claude 4 发布和 Claude Code
              材料显示了专门的编码表面，可在终端运行、与 VS Code 和 JetBrains 集成，并可在 GitHub 工作流中运行。在 API 侧，Anthropic 已从纯文本生成推进到智能体原语：code
              execution、remote MCP connectivity、可复用 Files、web search，以及寿命更长的 prompt
              caching。这很重要，因为公司的产品定义越来越原生于工作流。客户购买的不只是“一个模型”，而是用于研究、写作、编码、企业搜索、自动化，以及在前沿场景中通过受限 Mythos preview
              执行防御性网络安全工作的运营环境。因此，下方模块图以表面、模型层级和工作流基础设施为中心，而不是单一 SKU 层级。这一区分对尽调重要，因为产品风险现在从“Claude
              是否有用”转向“哪一层拥有工作流、谁负责管理，以及故障或锁定会在哪里出现”。这也解释了为什么 Anthropic 越来越多地在包装、管理适配和开发者体验上竞争，而不只是模型质量。
