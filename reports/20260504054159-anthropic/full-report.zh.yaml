  - id: TV003
    title: 牛市 / 基准 / 熊市情景表
    columns:
      - 情景
      - 假设
      - 估值 / 回报逻辑
      - 关键风险
      - 概率信号
    rows:
      - - 牛市
        - Anthropic 将当前 run-rate 转化为约 $38B-$42B 的可持续收入，保持高溢价企业和编码份额，并维持 14x-16x 稀缺性倍数。
        - 隐含估值约 $532B-$672B，或在稀释前约为当前已验证估值的 1.4x-1.8x。
        - 需要标题 ARR 被证明可持续，算力保持可用，且法律/治理噪音不导致倍数重估。
        - 低中
      - - 基准
        - 标准化可持续收入稳定在约 $28B-$32B，市场给予约 10x-12x，更接近高溢价软件而非前沿狂热。
        - 隐含估值约 $280B-$384B，相对当前估值大致持平到小幅下行。
        - 如果净收入和利润率不如标题口径有吸引力，即使执行良好也可能只能守住当前估值。
        - 中
      - - 熊市
        - 净收入等价值仅约 $20B-$24B，或因算力、法律或采购问题恶化，公开可比公司压缩至 7x-9x。
        - 隐含估值约 $140B-$216B，意味着相对当前已验证估值有显著下行。
        - 即使需求不崩塌，只要合作方经济性和义务主导叙事，也可能发生压缩。
        - 中
    notes: 这些情景采用收入倍数逻辑，因为公开证据在利润和现金流转化方面太弱，不足以支持 DCF 质量模型。
