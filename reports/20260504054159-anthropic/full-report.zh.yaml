      - number: '1.3'
        title: 资本基础、合作伙伴分销与公开规模信号
        blocks:
          - type: paragraph
            body: >-
              公开融资和合作证据把 Anthropic 明确置于后期私营公司区间。公司在 2025 年 3 月正式披露，以 $61.5B 投后估值完成 $3.5B Series E；TechCrunch 则引用
              Crunchbase 称累计融资约 $18.2B。Amazon 不只是财务投资人：Anthropic 和 Amazon 均表示，在 2023 年 9 月合作下，AWS 成为 Anthropic
              关键任务工作负载的主要云服务商；Amazon 仅持有少数股权，却通过 Bedrock 分销和芯片协作获得重大商业相关性。公开证据也显示 Google 既是主要支持方，也是通过 Vertex AI
              分销的合作伙伴。在 GTM 侧，Anthropic 官方材料显示 Claude 通过直营、Team 和 Enterprise 计划、Amazon Bedrock、Zoom 集成以及 Snowflake
              数据云覆盖面进行分销。规模信号强但不均衡：Reuters 于 2026 年 4 月报道 Anthropic 可能已经缩小与 OpenAI
              的收入差距，但经审计收入、客户数量、员工人数以及可核对的所有权图谱仍未公开。
