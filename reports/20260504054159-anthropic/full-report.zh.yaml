      - number: '1.2'
        title: 治理、领导层与关键人物依赖
        blocks:
          - type: paragraph
            body: >-
              治理是最有区分度的尽调变量之一。Anthropic 表示自己是 Public Benefit Corporation，其 Board of Directors 由股东和 Long-Term Benefit
              Trust 共同选举。LTBT 页面进一步说明，该信托是一个由五名无财务利益冲突成员组成的独立机构，有权选择和罢免部分董事，并计划随时间推移成为董事会多数。这一结构重要，是因为它为 Anthropic
              增加了一层使命治理：这层治理与巨额融资和战略云依赖并置，张力明显但也是有意设计。当前公开材料将 Dario Amodei 和 Daniela Amodei 识别为核心创始高管；Mike Krieger 于
              2024 年加入担任 Chief Product Officer，补强了资深产品扩张能力；Vas Narasimhan 于 2026 年获任董事，带来受监管行业经验。即便有这些补强，公开记录仍显示公司对
              Amodei 兄妹以及一小批能连接研究信誉、融资、公共政策和商业执行的领导者存在显著关键人物依赖。
