      - number: '2.3'
        title: 增长驱动、采用约束与估值相关性
        blocks:
          - type: paragraph
            body: >-
              需求侧信号足够强，能够支持市场继续扩张。Microsoft 的 2025 Work Trend Index 显示，领导者把 2025
              年视为关键年份，预期智能体会成为战略的一部分，并面临清晰的生产率和产能缺口。PwC 的 Jobs Barometer 以工资、岗位和人均收入信号强化了这种宏观拉动，显示 AI
              已经在转化为商业价值。Anthropic 自身企业案例研究也显示，在支持、提案和分析任务中存在有意义的工作流生产率提升。但制动因素同样重要。Deloitte 显示，即便 ROI
              为正，大多数实验仍无法快速规模化，监管合规和治理时间线正在成为硬约束。Stack Overflow 的 2025
              开发者调查在从业者层面显示同样张力：使用率高，但信任低，部署用例仍被回避，对智能体准确性和隐私的担忧广泛存在。EU AI Act、NIST AI RMF 和 OECD
              问责框架都指向同一方向：高后果用途会比早期生产率试点需要更多文档、监控、监督和信任建设。竞争也依然激烈。对估值而言，这意味着 Anthropic
              受益于真实市场拉动和多条预算路径，但投资承销应对试点转生产的缓慢转化以及缺乏公开分部经济性给予折扣，因为这些数据是分离出干净 SAM 或 SOM 所必需的。
