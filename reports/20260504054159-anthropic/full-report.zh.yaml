            body: >-
              正面情形是真实的。Anthropic 拥有直接订阅收入、企业合同、按 token 计价 API、高级席位、付费附加项和广泛多云分销。公开证据还异常有力地显示，成熟客户正在生产环境中使用
              Claude。战略支持方也不只是被动投资人：Amazon、Microsoft、NVIDIA、Snowflake 和 Zoom 都以经济或分销伙伴身份出现在公开记录中，Amazon
              的备案比多数私营公司披露更清楚地显示了合作伙伴资产负债表支持的规模。负面情形同样重要。Anthropic
              不发布财务报表、经审计收入、现金余额、烧钱率、runway、产品层面毛利率、渠道分成率、折扣表或标准化企业队列数据。已报道收入数字也不能干净比较：Reuters 称 Anthropic
              对超大规模云厂商渠道按总额确认收入，而 Reuters 和 CNBC 都依赖自我报告或匿名来源的 run-rate 数字，而非经审计报表。因此，投资承销结论受到限制。Anthropic
