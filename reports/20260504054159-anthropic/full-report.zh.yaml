            - label: 中
              tone: warning
              detail: 缓释措施存在，但法院和监管机构结果仍属外部变量。
            - label: 高
              tone: negative
              detail: 在诉讼和政策敞口进一步收窄前，剩余风险仍然较高。
        - label: 可靠性 / 编码质量
          values:
            - label: 高
              tone: negative
              detail: 状态页事故和事后复盘证据显示，负载下问题会反复出现。
            - label: 高
              tone: negative
              detail: 编码质量和正常运行时间如今会影响企业工作流和声誉。
            - label: 中
              tone: warning
              detail: Anthropic 会发布事故和回滚信息，但缺少公开 SLA 数据。
            - label: 高
              tone: negative
              detail: 只要编码需求仍是增长引擎，剩余敞口就保持较高。
        - label: 算力 / 云服务交易对手
          values:
            - label: 中高
              tone: warning
              detail: 多项巨额承诺已公开，并通过少数提供商履行。
            - label: 严重
              tone: negative
              detail: 定价、容量交付时点和利润率都可能通过这些节点传导。
            - label: 中
              tone: warning
              detail: 多云布局有帮助，但不能消除合同和交付风险。
            - label: 高
              tone: negative
              detail: 公开证据仍缺少固定支出与实际用量之间的对应关系。
        - label: 治理 / 披露 / 集中度
          values:
            - label: 中
              tone: warning
              detail: 治理结构明确但非传统，关键集中度指标仍未公开。
            - label: 高
              tone: warning
              detail: 披露失误或隐藏的集中度意外可能迅速压缩信心。
            - label: 中低
              tone: neutral
              detail: IPO 准备和政策透明度带来一定约束。
            - label: 中高
              tone: warning
              detail: 剩余敞口主要来自公开精确度缺失，而不是完全没有缓释。
    approximationNotes: null
    claimRefs:
      - CR009
      - CR016
      - CR017
      - CR025
      - CR028
      - CR033
      - CR039
      - CR046
  - id: FR002
    title: 风险传导图
    type: dag
    layout: wide
    summary: Anthropic 的主要风险通过少数共享渠道传导：服务质量、法律信任、云服务交易对手，以及由编码驱动的收入引擎。
    data:
      nodes:
        - id: n1
          label: 版权 / 政策冲击
          description: 影响分发或信任的法院、监管机构或政府行动。
        - id: n2
          label: 可靠性回退
          description: 中断、发布失误或编码质量恶化。
        - id: n3
          label: 算力交易对手
          description: AWS、Google/Broadcom 和 Azure 会塑造成本与交付。
        - id: n4
          label: 编码产品依赖
          description: Claude Code 及相关开发者需求推动增长。
        - id: n5
          label: 客户信任与续约
          description: 企业信心、合作伙伴意愿和流失风险。
        - id: n6
          label: 收入增长
          description: 席位、API 和合作伙伴渠道扩张。
        - id: n7
          label: 利润率 / 融资
          description: 算力经济性、法律成本和融资需求。
        - id: n8
          label: 估值支撑
          description: 市场是否接受最佳情形下的执行假设。
      edges:
        - from: n1
          to: n5
        - from: n1
          to: n7
        - from: n2
          to: n5
        - from: n2
          to: n6
        - from: n3
          to: n6
        - from: n3
          to: n7
        - from: n4
          to: n6
        - from: n4
          to: n5
        - from: n5
          to: n6
        - from: n6
          to: n8
        - from: n7
          to: n8
    approximationNotes: null
    claimRefs:
      - CR013
      - CR016
      - CR017
      - CR023
      - CR025
      - CR028
      - CR039
      - CR043
      - CR046
  - id: FR003
    title: 依赖图
    type: dag
    layout: wide
    summary: Anthropic 的关键外部依赖集中在云服务商、硬件项目、开放协议以及政府或企业渠道，而不是某一项自有内部资产。
    data:
      nodes:
        - id: d1
          label: AWS / Bedrock
          description: 主要训练云、Bedrock 渠道和大型算力承诺。
        - id: d2
          label: Google Cloud / Broadcom
          description: 未来 TPU 容量和 2027 扩容路径。
        - id: d3
          label: Microsoft Azure / NVIDIA
          description: Azure Foundry 分发加上增量算力。
        - id: d4
          label: MCP 生态
          description: 与 ChatGPT、VS Code、Cursor 等共享的开放协议。
        - id: d5
          label: Claude Code / 开发者需求
          description: 与质量和正常运行时间绑定的关键增长引擎。
        - id: d6
          label: 大型企业账户
          description: 高支出客户，集中度和续约画像不透明。
        - id: d7
          label: 政府 / 受监管渠道
          description: 对政策敏感的分发路径。
        - id: d8
          label: 收入 / 估值支撑
          description: 成功执行后的下游财务结果。
      edges:
        - from: d1
          to: d5
        - from: d1
          to: d8
        - from: d2
          to: d5
        - from: d2
          to: d8
        - from: d3
          to: d6
        - from: d3
          to: d8
        - from: d4
          to: d5
        - from: d4
          to: d6
        - from: d5
          to: d8
        - from: d6
          to: d8
        - from: d7
          to: d8
    approximationNotes: null
    claimRefs:
      - CR015
      - CR017
      - CR019
      - CR023
      - CR027
      - CR039
      - CR041
      - CR046
  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: wide
    summary: 该推荐来自强需求证据与未完整规范化的收入口径、大额算力义务和非典型治理之间的碰撞。
    data:
      nodes:
        - id: scale
          label: 规模证据
          detail: 已验证的 $380B 估值、>$30B run-rate，以及 1,000+ 家年化支出超过 $1M 的企业客户。
          tone: positive
        - id: comp
          label: 可比公司语境
          detail: 表观倍数接近高溢价软件可比公司，而不是明显荒谬的区间。
          tone: positive
        - id: quality
          label: 口径规范化缺口
          detail: 收入是年化口径，Reuters 称 Anthropic 按总收入计量，而非扣除部分超大规模云厂商分成后的口径。
          tone: warning
        - id: capital
          label: 资本强度
          detail: AWS、Azure 和 TPU 承诺大到足以改变利润率和下行情形结果。
          tone: warning
        - id: governance
          label: 治理 / 法律悬而未决
          detail: LTBT 控制权复杂性、活跃诉讼、Pentagon 冲突和可靠性压力都很重要。
          tone: warning
        - id: decision
          label: 继续研究
          detail: 公开证据足以让投资人保持关注，但仍不足以支持按当前已验证估值买入。
          tone: neutral
      edges:
        - from: scale
          to: comp
        - from: comp
          to: decision
        - from: quality
          to: decision
        - from: capital
          to: decision
        - from: governance
          to: decision
    approximationNotes: null
    claimRefs:
      - CV001
      - CV002
      - CV004
      - CV006
      - CV008
      - CV011
      - CV014
      - CV017
      - CV018
      - CV019
      - CV032
      - CV043
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: standard
    summary: 当前估值只有在 Anthropic 能维持高溢价收入倍数，或把持久收入提高到当前表观 run-rate 以上时，才显得舒适。
    data:
      items:
        - label: 8x 时所需收入
          value: 47.5
          detail: 在成熟但仍具溢价的平台倍数下，支撑 $380B 估值所需的收入（USD billions）。
          tone: negative
        - label: 12x 时所需收入
          value: 31.7
          detail: 以强劲的软件式倍数支撑当前估值所需的收入（USD billions）。
          tone: warning
        - label: 16x 时所需收入
          value: 23.8
          detail: 若稀缺性溢价持续，支撑该估值所需的收入（USD billions）。
          tone: neutral
        - label: 当前披露 run-rate
          value: 30
          detail: 公司截至 April 2026 披露的年化收入。
          tone: positive
    approximationNotes: 收入门槛是使用已验证 $380B 估值进行的简单估值/收入桥接，不是贴现现金流输出。
    claimRefs:
      - CV001
      - CV002
      - CV033
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: wide
    summary: 公开证据支持较宽估值区间，因为收入口径规范化和倍数选择几乎与需求本身同样重要。
    data:
      items:
        - label: 悲观情形
          low: 140
          mid: 180
          high: 216
          displayValue: $140B-$216B
          detail: 等效净收入低于表观 run-rate，或倍数压缩至 7x-9x。
          tone: negative
        - label: 基准情形
          low: 280
          mid: 332
          high: 384
          displayValue: $280B-$384B
          detail: 持久收入落在 $28B-$32B 左右，市场给予约 10x-12x。
          tone: warning
        - label: 乐观情形
          low: 532
          mid: 602
          high: 672
          displayValue: $532B-$672B
          detail: Anthropic 将当前需求转化为 $38B-$42B 的持久收入，并保留 14x-16x 稀缺性溢价。
          tone: positive
    approximationNotes: 区间是用于投委会讨论的情景化收入倍数输出，不是管理层指引。
    claimRefs:
      - CV040
      - CV041
      - CV042
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: Anthropic 在需求和市场地位上得分很高，但在经济性清晰度、治理简洁性和证据质量上较弱。
    data:
      items:
        - label: 市场顺风
          score: 9
          detail: 企业 AI 和编码需求仍异常强劲。
          tone: positive
        - label: 需求证明
          score: 9
          detail: 已验证估值以及公司披露的收入/客户规模都属顶级。
          tone: positive
        - label: 分发覆盖
          score: 8
          detail: AWS、Google、Microsoft 和 Snowflake 都扩大了 Claude 的触达。
          tone: positive
        - label: 护城河持久性
          score: 7
          detail: 较强，但暴露于合作伙伴渠道和转换成本动态。
          tone: neutral
        - label: 经济性清晰度
          score: 4
          detail: 公开证据在确认收入、利润率和股权结构条款上仍然薄弱。
          tone: warning
        - label: 风险负担
          score: 3
          detail: 法律、采购、可靠性和治理问题都会影响倍数支撑。
          tone: negative
        - label: 证据质量
          score: 5
          detail: 足以严肃看待；但若无私下尽调，仍不足以形成有信心的投资判断。
          tone: warning
    approximationNotes: 评分是基于所引公开证据的 0-10 序数型投委会判断，不是公司提供的 KPI 披露。
    claimRefs:
      - CV002
      - CV004
      - CV016
      - CV017
      - CV018
      - CV019
      - CV020
      - CV021
      - CV022
      - CV036
      - CV043
