  - id: TU001
    title: 客户分层表
    columns:
      - 分层
      - 买方 / 用户 / 付款方
      - 代表性证据
      - 战略价值
      - 缺口
    rows:
      - - 个人订阅
        - 买方和付款方为同一人；用户是个人知识工作者。
        - 定价页上的 Free、Pro 和 Max 层级。
        - 扩大漏斗顶部采用，并支持向更高使用量层级追加销售。
        - 公开来源未披露付费订阅人数、转化率或各方案流失率。
      - - 团队 / 部门工作区
        - 买方是团队负责人或职能负责人；用户为部门员工；付款方为成本中心。
        - Team plan 面向 20–100 人，提供共享工作区和管理控制。
        - 从个人使用进入托管协作的自然先落地再扩张路径。
        - 没有公开席位数、logo 到席位转化或部门扩张数据。
      - - 企业工作区
        - 买方为 CIO、安全、IT 或采购；用户为员工；付款方为企业预算负责人。
        - 销售辅助的企业套装包含 SSO、SCIM、审计日志、支出控制、开票和 HIPAA-ready 打包。
        - 使 Anthropic 可服务受监管且重视安全的买方。
        - 自助企业与销售辅助企业之间的收入结构未披露。
      - - 直连 API / 开发者平台
        - 买方为工程或平台领导；用户为开发者和应用；付款方为工程预算。
        - 平台页面显示按量付费、月度发票计费和承诺支出选项。
        - 从聊天席位扩展到嵌入产品的使用和更高量级消费。
        - 公开来源未披露 API 客户数、平均支出或按 cohort 的留存。
      - - 合作伙伴渠道企业
        - 买方使用既有超大规模云厂商或采购关系；用户为企业开发者和内部团队；付款方为云预算或合并软件预算。
        - Bedrock、Vertex AI、Microsoft Foundry、AWS Marketplace 和基于 marketplace 的 Anthropic 路线均分发 Claude。
        - 降低采购摩擦，并拓宽地域和治理适配。
        - 渠道结构、收入分成以及相较 Anthropic 直连的功能一致性差异未披露。
      - - 嵌入式软件供应商
        - 买方为 SaaS 供应商；用户是该供应商自己的客户；付款方为 SaaS 供应商。
        - Slack、Intercom、GitLab 和 Cox Automotive 将 Claude 嵌入面向客户的产品或工作流。
        - 创造杠杆化 B2B2B 触达，使 Anthropic 能间接触达终端客户。
        - 公开证据很少拆出专门归因于 Claude 的终端客户变现。
      - - 教育和受监管机构
        - 买方为机构领导；用户为学生、教职员工或受监管知识工作者；付款方为机构预算。
        - Syracuse、NBIM 和教育解决方案页面显示大学及受监管金融场景采用。
        - 证明其适配软件公司之外的场景，并支撑高参考价值 logo。
        - 续约条款、驻留适配和合规映射仍部分不透明。
    notes: 该分层表按买方-用户-付款方结构和分发路径归类 Anthropic 客户基础，而不是只按公司规模，因为公开证据显示这些分层的采购路径存在实质差异。
