  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 顶层风险栈：算力压力、可靠性退化和进行中的诉讼是最高残余敞口
        blocks:
          - type: paragraph
            body: >-
              Anthropic 已为前沿模型风险建立可见缓释措施，包括 Responsible Scaling Policy、受限发布、公开 status
              page、法律使用控制和多云分销，但公开记录仍指向集中的顶层风险栈。最清晰的近端运营风险，是使用增长正在超过服务质量。Anthropic 自己在 2026 年 4 月的 Amazon
              算力文章称，增长已在高峰时段给 Free、Pro、Max 和 Team 用户的基础设施造成压力，其 status page 记录了 4 月下旬多次涉及 Claude.ai、API 和 Claude Code
              的事故。Fortune 随后补充了一个更具杀伤力的细节：持续数周的 Claude Code 下滑不只是容量问题，也涉及三项内部工程错误。与此同时，法律和政策敞口仍在进行中。Bartz 和解以 $1.5B
              成本解决了一起以盗版为中心的作者案件，但 Concord 出版商案卷到 2026 年 4 月下旬仍然活跃，Defense Department
              供应链风险争议也显示政府渠道可以多快变得政治化。结果并不是论点破裂，而是一家增长最快的产品仍在制造新的法律、可靠性和治理表面积，其速度快于公开披露关闭这些问题的速度。
