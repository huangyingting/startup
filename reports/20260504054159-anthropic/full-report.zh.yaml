  - id: TR005
    title: 缓释与终止标准表
    columns:
      - 风险
      - 可监测触发项
      - 阈值/事件
      - 行动含义
    rows:
      - - 可靠性 / 编码质量
        - 多产品不稳定反复出现，或又一次高关注度 Claude Code 退化
        - 一个季度内出现两次或更多重大事故、可见容量配给，或新的发布回滚实质性降低编码质量
        - 下调与编码产品相关的增长假设，并把服务质量视为 thesis-break 观察项，而非临时噪音。
      - - 版权 / 隐私敞口
        - 法院或监管机构采取不利行动，扩大数据集、通知或授权义务
        - 新禁令、证据开示结果或监管命令要求重大再训练、删除或授权支出
        - 立即提高要求回报，并重新评估利润率与合规假设。
      - - 云 / 算力依赖
        - 交易对手经济性或容量交付恶化
        - 有证据显示已承诺算力相对固定义务出现延迟、重新定价或利用不足
        - 除非管理层能给出清晰的支出到收入桥接，否则将其从可管理依赖风险上调至 thesis-break 区域。
      - - 客户集中度 / 合作渠道不透明
        - 大客户或合作方集中度比公开客户广度暗示的更高
        - Top-10 客户、单一合作渠道或单一云路径贡献了超预期的大比例收入或续约
        - 限制持仓规模，并要求明确集中度契约或更深入尽调后再承销上行情景。
      - - 治理 / IPO 执行
        - 信托治理冲突或 IPO 期间披露失误
        - 董事会争议、LTBT 冲突、申报延迟，或私下指标与公开指标存在重大差异
        - 暂停投资论证，直到治理、报告和控制质量重新建立。
    notes: 这些触发项设计为可通过公开申报、状态页、新闻或管理层尽调回复监测，而不是依赖直觉。
    claimRefs:
