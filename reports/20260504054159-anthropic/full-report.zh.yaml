  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与定价可见度：标价异常清晰，实际经济性仍不透明
        blocks:
          - type: paragraph
            body: >-
              Anthropic 官方材料现在描述的是一个通过企业合同、付费订阅、直接 API 用量、高级企业席位和按用量计价附加项变现的业务，而不是广告业务。公司明确表示 Claude
              将保持无广告，收入来自企业合同和付费订阅；这在财务上重要，因为它排除了广告支持型消费者策略，并把收入模式绑定到企业和高频用户的付费意愿上。公开标价也强于许多后期私营 AI 实验室。Claude Pro
              按年计费为每月 $17，或按月 $20；Claude Max 起价每月 $100；Team 按年计费每席每月 $20，或按月 $25；API 则公布当前旗舰模型的 token 定价。Anthropic
              还披露了影响单位经济性但不能干净转化为实际收入的变现杠杆：prompt caching 倍率、50% batch 折扣、仅美国推理溢价、web search 收费、code execution 费用以及
              managed-agent runtime 定价。这种透明度有助于收入建模，但并不揭示大型客户在谈判折扣、捆绑承诺、合作伙伴分成或云渠道结算后实际支付多少。
