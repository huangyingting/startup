  - id: TP003
    title: 定价 / 包装对比
    columns:
      - 竞争方
      - 价格 / 单位 / 合同模式
      - 包含能力
      - 折扣或未知项
      - 含义
    rows:
      - - Anthropic
        - Pro 年付 $17/月或月付 $20/月；Team 年付 $20/席位/月或月付 $25/月；Enterprise 定制；API 视模型不同，输入每 MTok $1-$5，输出每 MTok $5-$25
        - Claude 聊天、Claude Code、Claude Cowork、连接器、企业搜索、SSO、管理控制，以及更高层级的高级企业控制
        - Enterprise 实际折扣、最低承诺和 ACV 未公开
        - Anthropic 对自助和 API 入口相对透明，但大型企业经济性并不透明
      - - OpenAI
        - 已审阅 Business 和 Enterprise 界面；经审阅的公开抓取未显示完整席位价格卡；API 定价另行发布
        - Business 工作区、SAML SSO、MFA、不使用数据训练、企业隐私控制、API 访问
        - Enterprise 席位价格和多数合同条款在经审阅的公开材料中仍不清楚
        - OpenAI 在 API 经济性上更容易比较，在企业席位合同上较难比较
      - - Google
        - Workspace Enterprise 需联系销售；另有 Google Cloud / Vertex 定价界面
        - Gmail、Docs、Meet、Chat、Drive、Vault 中的 Gemini，DLP、数据区域、端点管理
        - 与 Anthropic Team 或 OpenAI Business 完全可比的价格，在已审阅企业页面中未公开
        - 即便直接模型定价不易比较，Google 仍可凭捆绑经济性胜出
      - - Microsoft
        - 已审阅 Copilot 定价界面，但这里无法清晰提取经审阅的精确席位经济性；Azure OpenAI 有按量付费、预配置和批量定价模式
        - Copilot Chat、Word、PowerPoint、Excel、Outlook、Teams、Graph grounding、Azure OpenAI 部署灵活性
        - Enterprise 席位价格和议定条款需要直接尽调穿透
        - Microsoft 的强项在于包装和装机基础杠杆，而非透明标价
      - - Amazon
        - Amazon Q Business Lite 每用户每月 $3；Pro 每用户每月 $20；Bedrock 模型定价随提供商和层级变化，并有批量折扣
        - 感知权限的 Q 响应、Q Apps、QuickSight 集成、Bedrock 多模型访问、护栏
        - Bedrock 总成本取决于所选模型组合、流量，以及预留或批量层级
        - 对重视可选性而非单一品牌模型的买家，Amazon 是最清晰的低门槛替代方案
      - - OpenRouter
        - 免费层、按量付费或 Enterprise；按量付费额度收取 5.5% 平台费；提供商 token 价格不加价转嫁
        - 300+ 个模型、提供商路由、故障回退、Enterprise 版 SSO/SAML、预算和支出控制
        - Enterprise 定价取决于用量和承诺；BYOK 另有费用结构
        - OpenRouter 可压低模型买家的切换成本，削弱单一供应商定价权
      - - Mistral
        - Free、Pro、Team 和 Enterprise 公开包装；Team 公开标价可见；Enterprise 定制
        - 协作工作区、连接器、数据导出、域验证、偏隐私的部署选项
        - 精确企业商业条款和大客户折扣未公开
        - Mistral 更像是主权和部署灵活性的替代方案，而不是大众市场套件
    notes: 多个竞争对手的公开企业定价并不完整。未知项保留为明确未知，而不是被标准化成误导性的席位价格对比。
