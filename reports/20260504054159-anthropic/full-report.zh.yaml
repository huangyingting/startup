  - id: TV001
    title: 推荐摘要表
    columns:
      - 决策字段
      - 当前观点
      - 决策含义
    rows:
      - - 推荐
        - 继续研究
        - 保持跟进，但不要仅凭公开证据在已验证的 $380B 估值上承销新资金。
      - - 信心
        - 中
        - 需求证据强；但标准化经济性、股权结构条款和 IPO 级披露仍弱。
      - - 风险评级
        - 高
        - 估值倍数压缩可能通过算力经济性、法律或采购冲击，或弱于标题口径的净收入传导。
      - - 估值立场
        - 合理
        - 仅按公司报告的标题 run-rate 看算合理；仅凭公开资料标准化后的经济性仍可能显得偏紧。
      - - 持有 / 退出姿态
        - 仅在更深入尽调后考虑 3-5 年持有
        - 持久结果可能需要 IPO 级披露，或在条款更清晰的后续入场点进入。
      - - 目标回报纪律
        - 在 $380B 上无法仅凭公开资料支持任何回报门槛
        - 在从继续研究转为买入前，要求披露显著改善、价格显著改善，或两者同时发生。
    notes: 该判断明确对价格敏感：Anthropic 可以是一家强公司，但在当前已验证估值上，仍不足以仅凭公开资料完成投资判断。
