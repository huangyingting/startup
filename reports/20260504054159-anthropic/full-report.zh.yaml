        - 澄清确切持股、董事会/信息权利，以及 Google 经济性与 Amazon 经济性有何不同。
      - - Lightspeed 领投的 Series E 财团
        - 最新财务投资方
        - 2025 年 3 月融资轮把公开估值基准重置为 $61.5B，并引入由 Lightspeed 领投、包含多家 crossover 和风投投资者的新 syndicate。
        - 要求提供当前 cap table、优先权结构、pro rata 权利，以及任何投资者专属治理保护。
      - - Zoom
        - 战略伙伴和投资者
        - Zoom 公开宣布了合作与投资，同时在面向客户的 AI 产品中使用 Claude，并随后将 Zoom 数据暴露给 Claude 工作流。
        - 量化投资规模、商业收入贡献，以及 Zoom 是否拥有任何优先产品或数据访问权。
      - - Snowflake
        - 企业分发伙伴
        - 2025 年扩展形成 $200M 多年合作，并将 Claude 带到跨多云的 12,600+ Snowflake 客户面前。
