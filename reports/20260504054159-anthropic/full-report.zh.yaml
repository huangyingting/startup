  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与规模测算视角
        blocks:
          - type: paragraph
            body: >-
              Anthropic 的可服务市场应从其变现表面向外定义，而不是从整个 AI 技术栈向内定义。公开定价和平台材料显示，公司变现的是席位订阅、企业部署功能、开发者和智能体 API
              用量，以及面向大学的专门教育产品组合。这明显窄于广义生成式 AI 叙事，后者还会纳入设备、服务器、咨询和其他基础设施层。因此，Gartner 对 2025 年 $644B
              的预测适合作为整体终端用户支出的外部包络，但不能直接当作 Anthropic 的收入池。Menlo 对 2025 年企业市场 $37B 的估计和 $19B 应用层估计，更接近能实际流向 Anthropic
              或其应用生态的预算，尽管这些数字仍偏美国企业市场，且并非公司特定口径。实用的投资承销边界应包括企业知识工作席位、按用量计费的编码与智能体工作流、全校教育协议，以及通过 AWS 和 Google Cloud
              由合作伙伴撮合的 Claude 消费。应排除硬件更新、通用云基础设施，以及没有通过 Anthropic 产品或合作伙伴渠道变现的广义 AI 服务支出。即便如此，Anthropic 特定的 SAM 和 SOM
              仍是尽调问题而非公开事实，因为公开披露没有给出合同价值和分部收入组合。
