callouts:
  - calloutType: strength
    title: Anthropic is already the 2025 enterprise-share and coding benchmark
    body: >-
      Independent market-share reporting no longer supports framing Anthropic as a distant enterprise challenger. The
      best public 2025 evidence reviewed here shows Anthropic ahead of OpenAI in both enterprise LLM usage and coding
      share.
    claimRefs:
      - CP027
      - CP028
  - calloutType: risk
    title: Bundle power and routing layers matter as much as raw model quality
    body: >-
      Google and Microsoft can win AI budgets through existing suite contracts, while Amazon Bedrock and OpenRouter make
      multi-model routing easier. Anthropic’s moat therefore depends on staying ahead on quality and enterprise
      ergonomics at the same time.
    claimRefs:
      - CP022
      - CP026
      - CP038
      - CP039
  - calloutType: insight
    title: Public enterprise pricing is still too opaque for a clean realized-margin view
    body: >-
      Anthropic, Google, Microsoft, and OpenAI all expose enough public information to compare packaging, but not enough
      to compare real large-enterprise discounts, committed spend, or renewal economics with confidence.
    claimRefs:
      - CP040
