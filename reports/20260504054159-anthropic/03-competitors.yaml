      - CP042
    figureRefs:
      - FP003
  - id: section-2
    title: >-
      Profiles and pricing: Anthropic leads in coding and enterprise share, but rivals attack through bundles or
      optionality
    body: >-
      The strongest direct rival remains OpenAI because it competes both on API usage and enterprise chat, and its
      public API rate card is still comparable with Anthropic’s flagship token pricing. Yet the official product
      surfaces show different strategic postures across the field. Anthropic’s own pricing page makes Claude Team and
      Enterprise explicit, includes Claude Code in paid subscriptions, and exposes a relatively deep enterprise-control
      layer. Google’s Workspace Enterprise plan and Microsoft 365 Copilot compete differently: they embed AI in tools
      enterprises already pay for and govern, which gives them procurement leverage even when direct model preference is
      mixed. Amazon Bedrock and OpenRouter compete on optionality rather than one branded assistant, letting buyers keep
      multiple model providers behind one control plane. Mistral positions itself around privacy, deployment freedom,
      and sovereignty, with Team and Enterprise packaging plus deploy-anywhere language in its Studio materials.
      Independent 2025 share data is the clearest evidence that Anthropic is not just a niche challenger anymore:
      TechCrunch’s reporting on Menlo’s mid-year enterprise data shows Anthropic at 32% enterprise LLM usage share
      versus OpenAI at 25%, and 42% coding share versus OpenAI at 21%. That is a real current strength, but it coexists
      with public pricing opacity for most large-enterprise contracts outside usage-based APIs and a need to defend
      against better-distributed rivals. Public win-loss and renewal evidence will decide whether that lead is durable.
    claimRefs:
