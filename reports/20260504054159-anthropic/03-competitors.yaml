  - id: section-3
    title: Switching cost, lock-in, multi-homing, and moat durability
    body: >-
      Anthropic’s moat is real, but it is conditional. Public enterprise controls on Claude Team and Enterprise—SSO,
      admin controls, audit logs, SCIM, spend controls, and retention options—help Anthropic behave more like a serious
      system of work than a lightweight model endpoint. That supports stickier deployment once an enterprise
      standardizes on Claude for coding or knowledge-work flows. The countervailing evidence is just as important.
      Microsoft and Google can hide AI procurement inside existing suite and identity relationships. Amazon Bedrock and
      OpenRouter make multi-model routing, provider selection, and fallback operationally easier, reducing the friction
      of multi-homing. Open-weight and deploy-anywhere options from internal builds or vendors such as Mistral continue
      to matter for sovereignty and private-deployment use cases even though open-source workloads remain a minority in
      Menlo’s 2025 data. The result is a market with weaker structural lock-in than classic SaaS: Anthropic can win on
      model quality, coding performance, and enterprise ergonomics, but it cannot assume those wins automatically become
      durable economic power. The diligence focus should therefore be on realized contract terms, migration friction,
      retention, and whether Claude’s coding and enterprise-control lead stays large enough to overcome bundle power and
      routing optionality.
    claimRefs:
