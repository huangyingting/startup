  - id: TP003
    title: Pricing / packaging comparison
    columns:
      - competitor
      - price / unit / contract model
      - included capabilities
      - discount or unknowns
      - implication
    rows:
      - - Anthropic
        - >-
          Pro $17 monthly annual billed or $20 monthly; Team $20 per seat monthly annual billed or $25 monthly;
          Enterprise custom; API from $1-$5 input and $5-$25 output per MTok depending on model
        - >-
          Claude chat, Claude Code, Claude Cowork, connectors, enterprise search, SSO, admin controls, and advanced
          enterprise controls at higher tiers
        - Enterprise realized discounts, minimum commits, and ACV are private
        - >-
          Anthropic is relatively transparent for self-serve and API entry points, but not for large-enterprise
          economics
      - - OpenAI
        - >-
          Business and Enterprise surfaces reviewed; audited public fetch did not expose a complete seat-price card; API
          pricing published separately
        - Business workspace, SAML SSO, MFA, no training on data, enterprise privacy controls, API access
        - Enterprise seat price and most contract terms remain unclear in audited public material
        - OpenAI is easier to compare on API economics than on enterprise seat contracts
      - - Google
        - Workspace Enterprise is contact sales; separate Google Cloud / Vertex pricing surfaces exist
        - Gemini in Gmail, Docs, Meet, Chat, Drive, Vault, DLP, data regions, endpoint management
        - >-
          Exact apples-to-apples price versus Anthropic Team or OpenAI Business is not public from the reviewed
          enterprise page
        - Google can win on bundle economics even when direct model pricing is not simple to compare
      - - Microsoft
        - >-
          Copilot pricing surface reviewed, but exact audited seat economics were not cleanly extractable here; Azure
          OpenAI has pay-as-you-go, provisioned, and batch pricing models
        - Copilot Chat, Word, PowerPoint, Excel, Outlook, Teams, Graph grounding, Azure OpenAI deployment flexibility
        - Enterprise seat price and negotiated terms require a direct diligence read-through
        - Microsoft’s strength is packaging and installed-base leverage more than transparent list pricing
      - - Amazon
        - >-
          Amazon Q Business Lite $3 per user/month; Pro $20 per user/month; Bedrock model pricing varies by provider and
          tier with batch discounts
        - Permission-aware Q responses, Q Apps, QuickSight integration, Bedrock multi-model access, guardrails
        - Bedrock total cost depends on chosen model mix, traffic, and reserved or batch tiers
        - Amazon is the clearest low-entry alternative for buyers who value optionality over one branded model
      - - OpenRouter
        - >-
          Free tier, pay-as-you-go, or enterprise; 5.5% platform fee on pay-as-you-go credits; provider token prices
          passed through without markup
        - 300+ models, provider routing, fallback, SSO/SAML on enterprise, budgets and spend controls
        - Enterprise pricing depends on volume and commits; BYOK adds a separate fee profile
        - OpenRouter can compress switching cost for model buyers and weaken single-vendor pricing power
      - - Mistral
        - Free, Pro, Team, and Enterprise public packaging; Team public list pricing is visible; Enterprise custom
        - Collaborative workspace, connectors, data export, domain verification, privacy-oriented deployment options
        - Exact enterprise commercial terms and large-customer discounts are not public
        - >-
          Mistral is more comparable as a sovereignty and deployment-flexibility alternative than as a mass-market
          bundle
    notes: >-
      Public enterprise pricing is incomplete for several rivals. Unknowns are left explicit rather than normalized into
      a misleading seat-price comparison.
