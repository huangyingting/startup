chapter:
  number: 3
  title: Competitors
  summary: >-
    Anthropic competes from a stronger position than the generic frontier-lab narrative suggests, but the competition is
    broader than OpenAI alone. The real alternative set spans OpenAI, bundled incumbents such as Google and Microsoft,
    routing layers such as Amazon Bedrock and OpenRouter, sovereignty-oriented vendors such as Mistral, and internal
    builds on open-weight models. Anthropic’s current edge is strongest in enterprise model share, coding, and public
    enterprise-control depth; its biggest risks are suite-bundle distribution, multi-model routing that weakens lock-in,
    and opaque enterprise contract pricing that makes realized economics hard to compare publicly.
sections:
  - id: section-1
    title: 'Landscape: direct labs, bundled incumbents, routing layers, and internal-build substitutes'
    body: >-
      Anthropic does not sell into a market where the buyer chooses only between Claude and one other frontier model
      lab. The practical alternative set is now layered. Direct model-lab rivalry still matters, especially against
      OpenAI, but large enterprise buyers can also stay inside incumbent productivity suites from Google or Microsoft,
      buy through infrastructure and routing layers such as Amazon Bedrock or OpenRouter, or build internally on
      open-weight stacks when governance or control matters more than buying one vendor’s full surface. Public evidence
      shows Anthropic itself participates in that broader landscape: Claude is sold directly, through Amazon Bedrock,
      and through Google Cloud Vertex AI, while Claude Code extends the product into developer workflows. Menlo’s 2025
      enterprise data is important context because it shows internal build is still real but no longer the modal path:
      76% of AI use cases are now purchased rather than built internally, and only 13% of enterprise daily workloads use
      open-source models. That means Anthropic benefits from current buyer preference for purchased tools, but it also
      faces a more fluid market in which buyers can switch among several purchased and routed options instead of
      accepting a classic single-vendor SaaS lock-in pattern.
    claimRefs:
      - CP008
      - CP009
      - CP010
      - CP017
      - CP020
      - CP022
      - CP025
      - CP026
      - CP029
      - CP031
