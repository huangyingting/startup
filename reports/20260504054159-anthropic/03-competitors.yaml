  - id: TP004
    title: Moat durability / competitive risk register
    columns:
      - moat claim
      - threat
      - severity
      - mitigation / diligence ask
    rows:
      - - Anthropic leads enterprise usage and coding today
        - OpenAI, Google, and new frontier models can close performance gaps quickly
        - high
        - >-
          Track whether the coding-share lead persists beyond the 2025 Menlo snapshot and whether customer renewals
          match share gains
      - - Anthropic enterprise controls create deployment stickiness
        - Microsoft and Google can offer comparable trust controls inside larger existing suites
        - high
        - >-
          Test whether buyers choose Claude because of controls alone or because controls plus model quality are jointly
          superior
      - - Multi-cloud distribution broadens reach
        - Bedrock and Vertex distribution also reduce exclusivity and make multi-homing easier
        - high
        - Measure how often partner channels deepen share versus commoditize Claude into one routed model among many
      - - Claude pricing transparency is relatively strong for API and self-serve tiers
        - Large-enterprise realized pricing remains opaque across the category
        - medium
        - Request real contract samples, discount bands, and committed-spend terms for Anthropic and key rivals
      - - Open-weight use is still minority today
        - Private deployment and sovereignty demands can still pull sensitive workloads away from Claude
        - medium
        - Segment deals by data-sensitivity and residency requirements rather than assuming one universal moat
      - - Buy-not-build behavior currently favors vendors like Anthropic
        - >-
          Internal build remains viable for well-resourced teams and can cap pricing power even if it is not the
          dominant path
        - medium
        - Diligence migration time, internal evaluation stacks, and benchmark portability before underwriting retention
    notes: >-
      Severity reflects the likely impact on Anthropic’s durability if the threat intensifies, not a judgment that the
      threat is already fully realized.
