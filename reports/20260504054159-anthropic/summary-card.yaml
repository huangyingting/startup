  topStrengths:
    - >-
      Verified demand proof is now exceptional, with company-reported run-rate above $30B and a growing base of large
      enterprise customers.
    - >-
      Distribution is unusually broad across direct product, API, AWS, Google, Microsoft, Snowflake, and workflow
      partners.
    - >-
      Anthropic’s governance and safety architecture are more explicit and publicly documented than most frontier-AI
      peers.
  topRisks:
    - >-
      Normalized economics remain unclear because public revenue appears annualized and at least partly gross of partner
      economics.
    - >-
      Compute commitments and hyperscaler dependence are large enough to reshape margins and downside even without
      demand collapse.
    - >-
      Legal, procurement, reliability, and governance complexity can compress the multiple before IPO-grade disclosure
      arrives.
  unresolvedGaps:
    - Series G preference stack, dilution waterfall, liquidation rights, and any ratchets remain undisclosed.
    - The bridge from company-reported run-rate to recognized, gross-to-net, and retained revenue is still missing.
    - Public disclosure does not provide customer concentration, NRR, churn, or contract renewal structure.
    - Take-or-pay, utilization, and prepayment schedules across major compute commitments remain non-public.
