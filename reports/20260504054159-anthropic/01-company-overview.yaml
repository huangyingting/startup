  - id: TO003
    title: Stakeholder or investor map
    columns:
      - stakeholder
      - role
      - control or economic importance
      - diligence ask
    rows:
      - - Long-Term Benefit Trust
        - Mission-governance body
        - >-
          Can select and remove a portion of the board that is intended to become a majority over time, making it a
          control-relevant stakeholder even without disclosed economic ownership.
        - >-
          Request the charter, trustee appointment mechanics, and reserved matters that interact with stockholder
          rights.
      - - Amazon / AWS
        - Strategic investor and compute/distribution partner
        - >-
          Committed up to $4B, became Anthropic’s primary cloud provider for mission-critical workloads, and distributes
          Claude through Bedrock while retaining only a minority ownership position.
        - >-
          Review cloud-spend commitments, exclusivity limits, chip co-development terms, and any revenue-sharing or MFN
          provisions.
      - - Google / Google Cloud
        - Investor and cloud/distribution partner
        - >-
          Reuters describes Google as one of Anthropic’s largest investors and notes Anthropic distribution through
          Vertex AI, creating a second hyperscaler dependency.
        - Clarify exact ownership, board/information rights, and how Google economics differ from Amazon economics.
      - - Lightspeed-led Series E syndicate
        - Latest financial backers
        - >-
          The March 2025 round reset the public valuation benchmark at $61.5B and added a new syndicate led by
          Lightspeed with multiple crossover and venture investors.
        - >-
          Request the current cap table, preference stack, pro rata rights, and any investor-specific governance
          protections.
      - - Zoom
        - Strategic partner and investor
        - >-
          Zoom publicly announced both a partnership and investment while using Claude in customer-facing AI products
          and later exposing Zoom data to Claude workflows.
        - >-
          Quantify investment size, commercial revenue contribution, and whether Zoom has any preferential product or
          data access.
      - - Snowflake
        - Enterprise distribution partner
        - >-
          The 2025 expansion created a $200M multi-year partnership and put Claude in front of 12,600+ Snowflake
          customers across multiple clouds.
        - Test whether Snowflake is becoming a material distribution gatekeeper for regulated-enterprise deployments.
    notes: >-
      The public cap table is incomplete, so this map emphasizes disclosed governance and commercial leverage rather
      than a definitive shareholder register.
