  - id: TU006
    title: Retention / cohort substitution table
    columns:
      - segment
      - planned cohort question
      - public data available
      - why cohort figure is unsupported
      - substitute evidence
      - diligence ask
    rows:
      - - Direct workspace customers
        - Are users retained across time buckets after initial rollout?
        - Satisfaction, weekly activity, and isolated productivity metrics
        - No month-1/month-3/month-6 retention percentages are published.
        - Use T604 proxies such as GitLab satisfaction and Syracuse weekly activity.
        - Request seat-retention curves and logo renewal rates by workspace cohort.
      - - Direct API customers
        - Do committed-spend API customers renew and expand over time?
        - Rate limits, service tiers, and billing paths
        - Public docs describe pricing mechanics but not cohort retention or expansion.
        - Use procurement and SLA evidence from rate-limit and service-tier docs.
        - Request API cohort retention, committed-spend renewals, and contraction rates.
      - - Partner-channel customers
        - Does Bedrock, Vertex, or Foundry usage compound or churn differently from direct customers?
        - Channel availability, regions, and feature boundaries
        - Public partner docs show channel presence, not time-series customer retention.
        - Use T605 channel-risk analysis instead of a false-precision cohort chart.
        - Request channel-specific retention, gross margin, and migration rates.
      - - Embedded B2B2B platforms
        - Do platforms like Intercom, Slack, or Cox deepen Anthropic usage over time?
        - Product outcomes and downstream scale proxies
        - Public sources show deployment proof but no retained Anthropic revenue cohorts.
        - Use named customer proof and outcome metrics to show adoption depth only.
        - Request partner renewal schedules, usage concentration, and downstream customer attach rates.
    notes: >-
      The chapter packet planned a retention / repeat cohort figure, but the retained sources do not provide
      time-bucketed retention percentages required by the cohort schema. This table documents the substitution and the
      exact diligence asks needed to build a true cohort view later.
    claimRefs:
      - CU039
      - CU040
      - CU041
