callouts:
  - calloutType: strength
    title: Public customer proof is materially better than logo-only marketing
    body: >-
      Anthropic’s best customer evidence names executives, workflows, channels, and measured outcomes. That makes the
      customer story more referenceable than a typical frontier-model vendor that only lists logos.
    claimRefs:
      - CU011
      - CU012
      - CU014
      - CU016
      - CU018
      - CU025
      - CU028
  - calloutType: risk
    title: Retention and concentration are the chapter’s main blind spots
    body: >-
      Even strong case studies do not answer whether Anthropic renews profitably, expands efficiently, or relies too
      much on a handful of customers or partner channels.
    claimRefs:
      - CU039
      - CU040
      - CU041
      - CU042
  - calloutType: insight
    title: Channel breadth helps adoption but weakens assumptions about lock-in
