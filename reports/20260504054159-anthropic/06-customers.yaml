  - id: TU005
    title: Expansion and concentration risk table
    columns:
      - expansion driver
      - concentration risk
      - impact
      - diligence path
    rows:
      - - Admin and compliance controls enable enterprise rollout beyond a single team.
        - Enterprise pricing and contract structure remain opaque.
        - Stronger packaging can expand ACV, but without pricing transparency investors cannot model expansion quality.
        - Request pricing bands, average seat counts, and upsell conversion from Team to Enterprise.
      - - Hyperscaler distribution via Bedrock, Vertex, and Foundry opens enterprise procurement paths.
        - Channel dependence can shift economics and create feature-parity gaps.
        - Anthropic may grow reach while surrendering some product control and margin visibility.
        - Request channel mix, gross margin by channel, and attach rates for direct vs partner features.
      - - >-
          Marketplace procurement and Anthropic marketplace experiments can extend existing Anthropic commitments into
          partner tools.
        - Partner spend can deepen ecosystem dependence but also increase partner bargaining power.
        - Expansion may look strong in bookings while value capture shifts across the stack.
        - Request Marketplace GMV, revenue share, and partner concentration by spend.
      - - Departmental pilots can expand into enterprise-wide deployments as seen at Syracuse and NBIM.
        - Public materials do not show renewal cohorts or conversion from pilot to multi-year contract.
        - Without cohort evidence, land-and-expand remains plausible but not proven as durable revenue.
        - Request pilot-to-production conversion and annual renewal rates for top verticals.
      - - Embedded B2B2B customers such as Intercom and Cox Automotive create leveraged downstream reach.
        - Anthropic may become indirectly dependent on a few large platform partners.
        - Partner concentration could matter even if Anthropic’s direct logo count looks broad.
        - Request top embedded-platform exposure and downstream end-customer revenue share.
      - - Model performance wins can drive preference, as at Delivery Hero and Harvey.
        - Ongoing model evaluation and shared model access show customers can preserve switching leverage.
        - Anthropic may win workloads without owning the full workflow or being the exclusive vendor.
        - Request workload share by customer, exclusivity terms, and displacement rates versus peers.
      - - Regulated and education wins strengthen referenceability.
        - Residency and compliance constraints can still block broader expansion, especially outside the US.
        - Public logos may overstate TAM conversion if residency or procurement hurdles persist.
        - Request regional win/loss analysis, especially for EMEA and highly regulated buyers.
    notes: null
