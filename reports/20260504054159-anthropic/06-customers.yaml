chapter:
  number: 6
  title: Customers
  summary: >-
    Anthropic’s customer evidence is strongest where named enterprises or institutions tie Claude to a production
    workflow with a measurable operating outcome: support resolution, developer throughput, AI adoption, or active
    usage. The customer base is no longer just consumer chat users; it spans direct workspace buyers, API builders,
    partner-channel enterprises on AWS, Google Cloud, and Microsoft, plus embedded software vendors that resell
    Claude-powered value to their own end customers. The main diligence gap is not whether Anthropic has customers, but
    whether those customers renew durably and expand economically: public materials show many deployment wins, but
    little about churn, NRR, concentration, or channel mix.
sections:
  - id: section-1
    title: >-
      Customer segmentation: Anthropic sells to individuals, enterprise admins, developers, and partner-routed buyers
      across multiple verticals
    body: >-
      Anthropic’s public customer footprint now spans several distinct buying motions rather than a single homogeneous
      “Claude user.” The pricing and platform pages show individual subscribers on Free, Pro, and Max plans; team and
      enterprise workspace buyers that care about SSO, SCIM, audit logs, spend controls, and HIPAA-ready packaging; and
      developer/API buyers that can purchase usage directly, via monthly invoicing, or through committed-spend programs.
      On top of that direct motion, Anthropic increasingly reaches enterprise users through partner channels: Amazon
      Bedrock, Google Vertex AI, Microsoft Foundry, AWS Marketplace, and newer marketplace-style procurement routes. The
      customer directory and education solution page broaden the segment picture further. They show not only well-known
      software vendors such as GitLab, Slack, HubSpot, Zapier, Intercom, Cox Automotive, and Harvey, but also education,
      financial-services, cybersecurity, and EMEA-tagged deployments. That matters because the buyer, user, and payer
      are often different. A CIO or security team may approve Claude for Work, a platform team may route usage through
      Bedrock or Vertex, and line employees or downstream end customers may be the actual users. For diligence, this is
      positive because Anthropic is not dependent on one narrowly defined ICP, but it also means the revenue mix between
      self-serve seats, direct enterprise, API consumption, and partner-routed usage remains opaque in public evidence.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
      - CU030
      - CU041
      - CU042
  - id: section-2
    title: >-
      Proof of deployment: the strongest evidence comes from named production workflows with quantified outcomes, not
      just customer logos
    body: >-
      Anthropic’s customer case studies are unusually detailed for a private AI company, and the best ones go well
      beyond logo slides. Lyft says its Claude-powered customer-care assistant, deployed via Amazon Bedrock, reduced
      average resolution time by 87% and now resolves thousands of requests per day. GitLab positions Claude as the
      default model inside GitLab Duo Agent Platform, with compliance and audit controls inherited from the existing
      DevSecOps stack. Slack says Claude-powered search, summaries, and recaps save the average user 97 minutes per week
      while operating on billions of messages and files. HubSpot reports up to 40% productivity gains and a reduction in
      complex technical troubleshooting from three to five days down to under an hour. Syracuse University moved from
      experimentation to an institution-wide rollout, giving Claude to every student, faculty member, and staff member
      and reporting 80–90% weekly active usage among licensed users plus strong growth in student and staff activity.
      Delivery Hero shows a different kind of proof: Claude embedded in engineering workflow, with 100+ pull requests
      merged per day and ~95% of central engineering LiteLLM requests going to Claude. Intercom and Cox Automotive
      extend the pattern into B2B2B settings where Anthropic’s effective reach includes their customers as well. The
      result is a credible production-use record across support, software delivery, collaboration, analytics, education,
      and regulated finance.
    claimRefs:
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
