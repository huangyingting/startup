  - id: T705
    title: Mitigation and kill criteria table
    columns:
      - risk
      - monitorable trigger
      - threshold/event
      - action implication
    rows:
      - - Reliability / coding quality
        - Repeated multi-product instability or another high-profile Claude Code regression
        - >-
          Two or more major incidents in a quarter, visible capacity rationing, or a new release rollback that
          materially degrades coding quality
        - >-
          Cut growth assumptions tied to coding products and treat service quality as a thesis-break watch item rather
          than temporary noise.
      - - Copyright / privacy exposure
        - Adverse court or regulator move that broadens dataset, notice, or licensing obligations
        - >-
          A new injunction, discovery outcome, or regulator order requiring material retraining, deletion, or licensing
          expense
        - Raise required return immediately and re-underwrite margin and compliance assumptions.
      - - Cloud / compute dependency
        - Counterparty economics or capacity delivery worsen
        - Evidence that committed compute is delayed, repriced, or underutilized against fixed obligations
        - >-
          Move from manageable dependency risk toward thesis-break territory unless management can show a clean
          spend-to-revenue bridge.
      - - Customer concentration / partner channel opacity
        - Large-account or partner concentration proves tighter than public breadth suggests
        - >-
          Top-10 customers, one partner channel, or one cloud route account for an unexpectedly large share of revenue
          or renewals
        - Cap position size and demand explicit concentration covenants or deeper diligence before underwriting upside.
      - - Governance / IPO execution
        - Trust-governance conflict or IPO-period disclosure miss
        - Board dispute, LTBT conflict, delayed filings, or material discrepancy between private and public metrics
        - Pause the investment case until governance, reporting, and control quality are re-established.
    notes: >-
      These triggers are designed to be monitorable from public filings, status pages, news, or management diligence
      responses rather than from intuition.
