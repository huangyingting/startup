chapter:
  number: 7
  title: Risks
  summary: >-
    Anthropic’s residual risk profile is dominated by three linked issues: live legal and policy exposure, reliability
    strain in the same coding products driving recent growth, and exceptionally large compute commitments that now run
    through several hyperscaler counterparties. The company’s mitigations are better documented than most peers—formal
    safety thresholds, public status reporting, multicloud distribution, and explicit governance structures—but public
    disclosure still leaves key underwriting questions open around customer concentration, SLA terms, the current LTBT
    seat map, and the spend bridge from contracted compute to realized monetization.
