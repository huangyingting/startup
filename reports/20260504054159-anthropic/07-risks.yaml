sections:
  - id: section-1
    title: 'Top risk stack: compute strain, reliability regressions, and live litigation are the highest residual exposures'
    body: >-
      Anthropic has built visible mitigations for frontier-model risk—its Responsible Scaling Policy, gated releases, a
      public status page, legal usage controls, and multicloud distribution—but the public record still points to a
      concentrated top risk stack. The clearest near-term operational risk is that usage growth is outpacing service
      quality. Anthropic’s own April 2026 Amazon compute post says growth has strained infrastructure for Free, Pro,
      Max, and Team users during peak hours, and its status page records repeated late-April incidents spanning
      Claude.ai, the API, and Claude Code. Fortune then added a more damaging detail: the weeks-long Claude Code decline
      was not only a capacity story but also an execution story involving three internal engineering mistakes. In
      parallel, legal and policy exposure remains live. The Bartz settlement resolved one piracy-centered author case at
      a $1.5 billion cost, yet the Concord publisher docket remained active into late April 2026, and the Defense
      Department’s supply-chain-risk fight showed how quickly a government channel can become politicized. The result is
      not a broken thesis, but a company whose fastest-growing products are still creating new legal, reliability, and
      governance surface area faster than public disclosure is closing it.
    claimRefs:
      - C001
      - C003
      - C009
      - C011
      - C012
      - C025
      - C026
      - C028
      - C037
  - id: section-2
    title: >-
      Legal, regulatory, and safety posture: mitigations are real, but privacy, copyright, and dual-use questions stay
      open
    body: >-
      Anthropic’s safety and governance posture is more explicit than most peers’. It publicly anchors deployment to ASL
      thresholds, says board approval is required for major Responsible Scaling Policy changes after consultation with
      the Long-Term Benefit Trust, and discloses a public-benefit governance model under which the Trust can elect a
      majority of the board within four years. Those are real mitigants, but they do not erase residual legal and policy
      risk. Anthropic’s privacy policy still says the company trains on user inputs and outputs unless users opt out,
      and even opted-out content can be used for safety review or explicit reports. That creates ongoing privacy,
      procurement, and jurisdictional diligence questions for enterprise buyers. On the copyright side, the Bartz
      settlement clarified that piracy-style collection behavior is where Anthropic paid the highest immediate cost, but
      it did not eliminate exposure from active publisher litigation. Safety-wise, Anthropic’s transparency hub makes
      the tradeoff clear: Mythos Preview is intentionally gated because zero-day discovery is inherently dual use, and
      the same transparency hub still discusses evaluation awareness and over-eager model behavior as active research
      issues rather than solved problems.
    claimRefs:
      - C002
      - C004
      - C005
      - C006
      - C007
      - C025
      - C026
      - C033
      - C034
      - C044
  - id: section-3
    title: >-
      Infrastructure, partner, customer, and competitive risk: diversification helps, but counterparties and open
      standards still matter
    body: >-
      Anthropic is more diversified than a single-cloud or single-channel vendor, but its risk profile is still highly
      partner-mediated. AWS remains the primary provider, Anthropic has committed more than $100 billion over ten years
      for up to 5 GW of Amazon capacity, Microsoft says Anthropic has committed $30 billion of Azure compute, and
      Broadcom’s April 2026 8-K says Anthropic will access about 3.5 GW of TPU capacity starting in 2027 through its
      Google ecosystem collaboration. That diversification lowers the probability that one outage or commercial dispute
      instantly breaks the business, but it raises the chance that several counterparties simultaneously shape margin,
      rollout speed, and bargaining power. Customer breadth helps offset pure concentration risk—GIC and Anthropic both
      point to hundreds and then more than 1,000 customers above $1 million of annualized spend—but public sources still
      do not disclose top-customer share, renewal behavior, or direct-versus-partner revenue mix. Competitive and
      commoditization risk also remains real. MCP is now supported by ChatGPT, VS Code, Cursor, and others, so
      interoperability may expand adoption while also reducing switching costs for tool connectivity. Meanwhile Claude
      Code’s availability and quality now matter directly to growth because multiple investor and media sources tie
      Anthropic’s revenue acceleration to coding demand.
    claimRefs:
      - C015
      - C016
      - C017
      - C018
      - C019
      - C021
      - C022
      - C023
      - C024
      - C039
      - C040
      - C041
      - C046
  - id: section-4
    title: >-
      Monitoring and kill criteria: the underwriting problem is less whether risk exists and more whether hidden
      concentration and quality metrics worsen
    body: >-
      Anthropic’s risk picture is underwritable only if diligence keeps separating disclosed mitigations from the
      missing data that still blocks precision. Public evidence is strong enough to rank the headline risks: copyright
      and policy shocks can impair regulated or government distribution; reliability and coding-quality regressions can
      damage the very product line driving recent growth; and compute commitments create a financing and margin
      sensitivity that is hard to quantify externally. The unresolved issues are narrower but important. Public sources
      do not show exact board-seat allocations after recent LTBT changes, top-customer revenue share, enterprise renewal
      cohorts, SLA credits, or the fixed-spend bridge between contracted compute and realized monetization. Those
      omissions do not mean the risk is catastrophic, but they do mean thesis breaks should be tied to observable
      triggers: repeated multi-product outages, visible capacity rationing, a material adverse litigation ruling,
      evidence that counterparties are repricing compute faster than Anthropic can pass it through, or IPO-period
      governance friction that weakens trust in disclosures. In other words, the right posture is not to reject the
      company on risk grounds alone, but to require tighter proof on concentration, service quality, and compute
      economics before underwriting a best-case valuation path.
    claimRefs:
      - C009
      - C013
      - C016
      - C017
      - C028
      - C029
      - C030
      - C031
      - C032
      - C043
      - C046
