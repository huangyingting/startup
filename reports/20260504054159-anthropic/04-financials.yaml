  - id: T404
    title: Capital adequacy table
    columns:
      - item
      - current value/status
      - implication
      - diligence ask
    rows:
      - - Amazon strategic investment
        - $4 billion completed; minority ownership confirmed publicly
        - Strong partner-balance-sheet support, but not a substitute for Anthropic cash disclosure
        - Provide current cap table, liquidation rights, and any linked commercial obligations.
      - - Amazon filing-backed note exposure
        - $5.3 billion invested across notes by March 31, 2025 with another $2.7 billion due by Q4 2025
        - Indicates deeper capital support and more complex security structure than headline press releases alone imply
        - Provide note terms, conversion mechanics, valuation marks, and board/information-right implications.
      - - Microsoft and NVIDIA financing
        - Up to $5 billion and up to $10 billion respectively
        - Expands financing options but may increase ecosystem dependency
        - Provide definitive signed commitment schedule, closing conditions, and governance side letters.
      - - Azure compute commitment
        - $30 billion of compute plus up to one gigawatt additional capacity
        - Makes capital intensity a core underwriting variable even before direct Anthropic burn is known
        - Provide payment cadence, take-or-pay clauses, and flexibility under slower demand scenarios.
      - - AWS primary-cloud commitment
        - AWS remains primary cloud provider and training partner
        - Suggests concentrated supplier dependence even as multi-cloud distribution broadens
        - Provide current spend concentration, migration limits, and termination rights.
      - - Project Glasswing credits and donations
        - Up to $100 million in usage credits plus $4 million in direct donations
        - Demonstrates discretionary capital deployment beyond core commercial product lines
        - Separate strategic ecosystem spend from recurring operating expense and sales expense.
      - - Cash / burn / runway
        - null
        - Largest unresolved blocker for financial underwriting
        - Provide treasury dashboard, monthly burn bridge, and runway scenarios under base and high-compute cases.
      - - Debt / project-finance obligations
        - null
        - Public evidence shows large compute commitments, but not a complete liability schedule
        - Provide all debt, prepayment, supplier-financing, and minimum-capacity agreements.
