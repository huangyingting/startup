  - calloutType: risk
    title: Capital intensity is visible, but true liquidity remains opaque
    body: >-
      Amazon’s filing and Anthropic’s own partnership releases show unusually large financing and compute commitments,
      but none of them disclose Anthropic cash on hand, burn, or runway. Public evidence therefore proves dependence on
      major partners more clearly than it proves self-funded durability.
    claimRefs:
      - C025
      - C026
      - C027
      - C028
      - C029
      - C030
      - C042
  - calloutType: recommendation
    title: Do not underwrite gross margin or runway from public evidence alone
    body: >-
      Anthropic’s public disclosures are good enough to describe pricing, channel breadth, and partner capital support,
      but they are not good enough to close a financial diligence case. Management data is still required for margin,
      cash, burn, and contract-quality questions.
    claimRefs:
      - C014
      - C035
