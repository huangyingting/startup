callouts:
  - calloutType: insight
    title: Anthropic already looks like a multi-surface enterprise AI business, not a single chatbot product
    body: >-
      Official pricing pages, enterprise materials, and partner announcements show subscriptions, seats, token-priced
      APIs, add-on services, and major channel routes. That breadth improves revenue durability even before private
      segment mix is disclosed.
    claimRefs:
