  - id: T405
    title: Public financial gaps table
    columns:
      - missing private metric
      - impact
      - exact diligence path
    rows:
      - - Revenue mix by subscriptions, enterprise, API, and partner channels
        - Cannot underwrite concentration, seasonality, or durable segment growth
        - Request monthly revenue bridge and deferred-revenue roll-forward by product surface and channel.
      - - Realized enterprise pricing and discount policy
        - List pricing is not enough to assess ASP, margin capture, or contract quality
        - Review representative MSAs, order forms, and pricing-approval policy.
      - - Gross margin and compute COGS by model family
        - Margin path cannot be modeled from list prices plus partner announcements alone
        - Request COGS waterfall across training, inference, cloud pass-throughs, and security overhead.
      - - Cash on hand, net burn, and runway
        - Capital adequacy remains impossible to close from public evidence
        - Obtain monthly cash bridge, quarterly burn, covenant package, and board runway scenarios.
      - - Sales efficiency and expansion metrics
        - No public CAC, payback, NRR, or sales-cycle data
        - Request funnel, cohort, and implementation-cost reporting for direct and channel-led GTM.
      - - Cloud and compute commitment schedule
        - Cannot net hyperscaler support against take-or-pay or prepayment obligations
        - >-
          Request a consolidated commitment ledger spanning AWS, Azure, NVIDIA, Microsoft, and Snowflake-linked
          economics.
    notes: >-
      These are the minimum private-data requests needed to turn a strong public narrative into a finance-grade
