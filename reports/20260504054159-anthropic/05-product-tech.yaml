tables:
  - id: TE001
    title: Product module / asset matrix
    columns:
      - module / asset / product line
      - user
      - status / maturity
      - differentiation
      - diligence gap
    rows:
      - - Claude app plans
        - Individual and team knowledge workers
        - Live and broadly packaged
        - Unified chat surface with integrations like Slack and Microsoft 365-adjacent productivity tools
        - Public pages show packaging, but not active-user mix or retention by tier.
      - - Enterprise workspace
        - CIO, security, compliance, and departmental buyers
        - Live and sales-led
        - SSO, SCIM, audit logs, retention controls, IP allowlisting, Compliance API, HIPAA-ready option
        - Trust-center certification scope is not machine-readable from public fetches.
      - - Claude Code
        - Developers and engineering teams
        - GA with expanding admin packaging
        - Terminal-native coding agent with IDE and GitHub workflow support
        - Public evidence is strong on surfaces, weaker on seat penetration and production telemetry.
      - - Anthropic API agent stack
        - Developers building agentic applications
        - Live and rapidly expanding
        - Code execution, Files, web search, MCP connector, prompt caching, citations
        - Public docs do not disclose tool-usage mix, abuse rates, or unit economics by primitive.
      - - MCP ecosystem
        - Developers integrating external systems
        - Live and externally adopted
        - Open protocol with prebuilt server examples and cross-vendor support signals
        - Anthropic does not publish a complete list of production connector adoption by customer or vertical.
      - - Partner cloud distribution
        - Enterprises standardizing on hyperscalers
        - Live across AWS, Google, and Microsoft
        - Same model family available via Bedrock, Vertex AI, and Foundry with partner governance overlays
        - Revenue share, latency trade-offs, and regional availability details remain fragmented.
      - - Mythos / Claude Security
        - Defensive cybersecurity teams and selected partners
        - Preview and gated
        - Frontier security model positioned for vulnerability discovery across large codebases
        - Access is invitation-only, so market maturity and deployment scope remain unobservable.
    notes: >-
      The matrix intentionally groups Anthropic’s stack by customer-facing module rather than by every page-level
      feature. Several subfeatures such as Claude for Slack, Chrome, Excel, PowerPoint, and Word appear as integrations
      within these modules rather than as standalone businesses.
