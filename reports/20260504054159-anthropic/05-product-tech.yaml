chapter:
  number: 5
  title: Product & Technology
  summary: >-
    Anthropic now sells a full-stack AI platform rather than a single chat product: Claude app plans, enterprise
    workspaces, Claude Code, an increasingly agent-oriented API, and multi-cloud distribution through Bedrock, Vertex
    AI, and Microsoft Foundry. The product story is strongest where Anthropic combines frontier coding models with
    workflow infrastructure such as MCP, Files, code execution, prompt caching, and enterprise controls. The biggest
    open risks are not whether the platform exists, but how far its hidden internals, reliability, and trust posture can
    be validated from public evidence alone.
sections:
  - id: section-1
    title: 'Product definition: Anthropic has expanded from chat assistant into app, API, coding, and agent workflows'
    body: >-
      Anthropic’s public product surface is now broad enough to describe as a platform family, not a single assistant.
      Claude’s plan pages expose a consumer and enterprise workspace with multiple app integrations, while the Claude 4
      launch and Claude Code materials show a dedicated coding surface that runs in the terminal, integrates with VS
      Code and JetBrains, and can operate in GitHub workflows. On the API side, Anthropic has moved beyond plain text
      generation into agent primitives: code execution, remote MCP connectivity, reusable files, web search, and
      longer-lived prompt caching. That matters because the company’s product definition is increasingly
      workflow-native. The customer is not merely buying “a model”; they are buying an operating environment for
      research, writing, coding, enterprise search, automation, and—at the frontier—defensive cybersecurity work through
      the gated Mythos preview. The module map below therefore centers on surfaces, model tiers, and workflow
      infrastructure rather than on a single SKU hierarchy. That distinction matters for diligence because product risk
      now shifts from “is Claude useful” toward “which layer owns the workflow, who administers it, and where can
      failures or lock-in emerge.” It also explains why Anthropic increasingly competes on packaging, admin fit, and
      developer ergonomics rather than on model quality alone.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE008
