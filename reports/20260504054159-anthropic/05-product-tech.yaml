  - id: section-2
    title: 'Architecture and operating model: model tiers sit inside a multi-layer tool and partner deployment stack'
    body: >-
      Public documentation is unusually explicit about the outer operating model, while remaining intentionally silent
      on hidden internal architecture. Anthropic documents three current generally available model tiers—Opus 4.7,
      Sonnet 4.6, and Haiku 4.5—with different context windows, output limits, and reasoning modes, plus the gated
      Mythos preview for defensive cybersecurity. Around those models, Anthropic now exposes a tool layer that includes
      code execution, remote MCP connections, Files, web search, and longer-lived caching. Distribution is also
      multi-channel by design: the same core model family appears on Anthropic’s own API, Amazon Bedrock, Google Vertex
      AI, and Microsoft Foundry. The public stack therefore looks like a layered system: user surfaces and admin
      controls on top, model selection in the middle, tool/runtime services around the model, and hyperscaler
      infrastructure beneath. What remains opaque is equally important: Anthropic does not disclose model architecture,
      training-compute scale, data mixture weights, or the exact economics of cross-cloud deployment. In other words,
      buyers can understand the observable operating envelope, but they still cannot fully inspect the hidden engine
      that produces capability, cost, and resilience. That opacity is a normal frontier-model trait, but it means
      product diligence must stop at documented layers instead of inferring internals.
    claimRefs:
