  - id: TE003
    title: Technology / operating architecture table
    columns:
      - layer / process / component
      - role
      - dependency
      - risk
    rows:
      - - User entry surfaces
        - Claude app, enterprise workspace, terminal, IDE, and GitHub entry points
        - Claude packaging pages and Claude Code product surfaces
        - Surface proliferation increases UX and support complexity across user types.
      - - Model tiering
        - Opus for highest-capability work, Sonnet for scale, Haiku for fast sub-agents, Mythos for gated security
        - Anthropic model lifecycle and partner deployment support
        - Anthropic does not reveal internal architecture choices behind each tier.
      - - Tool runtime
        - Code execution, web search, citations, Files, MCP, and caching convert model output into workflows
        - Anthropic API runtime and sandbox execution environment
        - Tool failures create new reliability and abuse surfaces beyond plain text generation.
      - - Context and data layer
        - Uploaded files, remote MCP servers, and cached prompts provide persistent context
        - Customer configuration plus external systems such as Slack, GitHub, or databases
        - Data governance becomes highly customer-specific and may cross sensitive internal systems.
      - - Admin and observability controls
        - Compliance API, audit logs, retention controls, role-based permissions, spend caps
        - Enterprise plan packaging and downstream customer enforcement
        - Public control narratives are strong, but validation evidence is thinner than the marketing surface.
      - - Partner cloud deployment
        - Bedrock, Vertex AI, and Foundry extend distribution and fit buyer governance boundaries
        - Hyperscaler contracts, regional coverage, and partner documentation
        - Anthropic’s economics and some operational details are partly delegated to partners.
      - - Training and serving infrastructure
        - AWS and GCP compute plus PyTorch, JAX, and Triton underpin training and inference
        - Hyperscaler capacity and Anthropic’s internal model-serving stack
        - The public record does not reveal compute scale, redundancy design, or low-level model architecture.
    notes: >-
      This table covers only the observable operating model. Anthropic publishes enough to map layers and dependencies,
      but not enough to reverse-engineer hidden model or infra internals.
