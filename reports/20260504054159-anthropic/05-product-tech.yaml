  - id: TE002
    title: Workflow / use-case table
    columns:
      - user job
      - current workflow
      - company solution
      - measurable benefit
      - limitation
    rows:
      - - General knowledge work
        - Ad hoc research, writing, summarization, planning inside chat tools
        - Claude app plans plus web search, files, and productivity integrations
        - Anthropic positions extended thinking, web search, and document reuse for deeper task handling
        - Public evidence is feature-level, not benchmarked productivity across the whole user base.
      - - Software engineering
        - IDE work, terminal execution, code review, CI repair
        - Claude Code with terminal, VS Code, JetBrains, and GitHub support
        - Anthropic reports Claude 4 coding leadership and GitHub says Sonnet 4 powers the new coding agent
        - Reliability and shortcut behavior are improved, but not eliminated, in Anthropic’s own safety material.
      - - Agent building
        - Custom orchestration glued across APIs, files, and tools
        - Anthropic API with code execution, Files, MCP connector, prompt caching, and citations
        - Tool stack reduces custom integration work and can lower long-context cost and latency
        - Public docs do not expose real-world attach rates or operational failure rates by tool.
      - - Enterprise knowledge and governance
        - Internal copilots gated by identity, retention, and monitoring controls
        - Enterprise plan, Compliance API, retention controls, partner-channel deployment
        - Governance controls are unusually explicit for a private AI lab
        - Certification scope and exact compliance mappings are not fully readable from public fetches.
      - - Data and analytics workflows
        - Exporting data to Python or BI tools for manual analysis
        - Code execution tool plus Files API and long-lived caching
        - Anthropic says Claude can iterate directly on datasets, charts, and analysis inside API sessions
        - >-
          Current public evidence is vendor-authored; no independent benchmark for analytical accuracy is published
          here.
      - - Defensive cybersecurity
        - Manual code review, vuln scanning, and security research
        - Mythos Preview via Project Glasswing and AWS Bedrock gated research preview
        - Anthropic positions Mythos for sophisticated vuln discovery in critical software
        - Preview-only access prevents normal diligence on adoption, false positives, and safe operational envelopes.
