  - id: TE004
    title: Trust / quality / compliance table
    columns:
      - control / certification / quality metric
      - status
      - scope
      - gap
    rows:
      - - Claude Constitution
        - Public and current
        - Behavior hierarchy and alignment framing for Claude models
        - The constitution explains policy intent, not enforcement precision by product line.
      - - Usage Policy and high-risk requirements
        - Public and detailed
        - Prohibited abuse categories, malware bans, extremist support bans, and high-risk use-case safeguards
        - Enforcement metrics and exception rates are not published at the product level.
      - - Responsible Scaling Policy v3.2
        - Public and updated
        - Governance over frontier release, LTBT external review powers, ASL-3 safeguard planning
        - Public summaries omit sensitive implementation detail by design.
      - - Enterprise governance controls
        - Publicly marketed and productized
        - SSO, SCIM, audit logs, role-based access, retention controls, Compliance API, spend caps
        - Public pages do not enumerate every certification or customer configuration dependency.
      - - Privacy and training defaults
        - Public and explicit
        - >-
          Consumer Inputs/Outputs may train models unless users opt out; commercial processing handled on customer
          behalf
        - Customers still need diligence on subprocessor scope, data residency, and product-specific defaults.
      - - Partner authorization boundary
        - Public via Google partner docs
        - Vertex AI access claims FedRAMP High boundary for Claude deployments
        - This does not substitute for a directly readable Anthropic certification ledger.
      - - Reliability transparency
        - Public but short-window
        - Status page exposes active surfaces, incidents, outages, and degraded features
        - Only recent history is visible, limiting longer-term reliability trend analysis.
      - - Commercial legal protection
        - Public for API customers
        - Output ownership and copyright indemnity for authorized use
        - The protection is contractual and does not itself prove product safety or certification scope.
    notes: >-
      Trust-center artifacts were not directly readable beyond the page title in audited fetches, so this table relies
      on public text that is visible without private access plus partner-boundary claims that are directly fetchable.
