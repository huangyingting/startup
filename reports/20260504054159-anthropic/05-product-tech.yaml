figures:
  - id: FE001
    title: Product architecture map
    type: stack
    layout: wide
    summary: >-
      Anthropic’s public product stack layers user surfaces, enterprise controls, model tiers, workflow tools, and
      multi-cloud deployment rather than presenting one monolithic product.
    data:
      layers:
        - label: User surfaces
          detail: End-user entry points span chat, terminal, IDE, and workflow-integrated product surfaces.
          items:
            - label: Claude app
              detail: Consumer and team/enterprise chat workspace.
            - label: Claude Code
              detail: Terminal, IDE, and GitHub-adjacent coding surface.
        - label: Admin and control plane
          detail: Enterprise administration and policy controls govern identity, permissions, logging, and retention.
          items:
            - label: Enterprise governance
              detail: SSO, SCIM, audit logs, Compliance API, retention, spend controls.
            - label: Policy layer
              detail: Constitution, AUP, RSP, privacy, and legal terms shape acceptable use.
        - label: Model tier layer
          detail: Anthropic exposes differentiated model families tuned for capability, cost, speed, and specialist uses.
          items:
            - label: Opus 4.7
              detail: Highest-capability generally available model.
            - label: Sonnet 4.6
              detail: Frontier intelligence at scale for broad enterprise use.
            - label: Haiku 4.5
              detail: Fast and lower-cost tier for sub-agents and latency-sensitive tasks.
            - label: Mythos Preview
              detail: Gated cybersecurity model.
        - label: Workflow tools
          detail: Tooling converts base model access into agentic, context-rich workflows rather than plain chat completion.
          items:
            - label: Code execution
              detail: Sandbox Python runtime for analysis and charting.
            - label: MCP connector
              detail: Remote tool and data access through open protocol servers.
            - label: Files and caching
              detail: Reusable context objects plus longer-lived prompt state.
        - label: Deployment and infrastructure
          detail: Anthropic serves models directly and through hyperscaler channels backed by disclosed cloud partnerships.
          items:
            - label: Anthropic API
              detail: First-party platform endpoint.
            - label: Bedrock, Vertex, Foundry
              detail: Hyperscaler channels with their own governance boundaries.
            - label: AWS and GCP compute
              detail: Publicly disclosed core infrastructure base.
    approximationNotes: null
