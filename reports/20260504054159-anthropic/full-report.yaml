  - id: FR001
    title: Risk heatmap
    type: matrix
    layout: wide
    summary: >-
      Anthropic’s highest residual risks cluster around copyright and policy exposure, compute-backed reliability
      strain, and partner dependence rather than around a single isolated failure mode.
    data:
      columns:
        - Likelihood
        - Impact
        - Mitigation maturity
        - Residual severity
      rows:
        - label: Copyright / government policy
          values:
            - label: medium-high
              tone: warning
              detail: Live litigation and policy volatility are already visible.
            - label: critical
              tone: negative
              detail: Adverse outcomes could hit channel access, compliance cost, and trust.
            - label: medium
              tone: warning
              detail: Mitigations exist, but court and regulator outcomes remain external.
            - label: high
              tone: negative
              detail: Residual risk stays high until litigation and policy exposure narrow further.
        - label: Reliability / coding quality
          values:
            - label: high
              tone: negative
              detail: Status-page incidents and postmortem evidence show recurrence under load.
            - label: high
              tone: negative
              detail: Coding quality and uptime now affect enterprise workflows and reputation.
            - label: medium
              tone: warning
              detail: Anthropic publishes incidents and rollbacks, but public SLA data is missing.
            - label: high
              tone: negative
              detail: Residual exposure remains high while coding demand is a growth engine.
        - label: Compute / cloud counterparties
          values:
            - label: medium-high
              tone: warning
              detail: Several huge commitments are public and run through a few providers.
            - label: critical
              tone: negative
              detail: Pricing, capacity timing, and margin can all transmit through these nodes.
            - label: medium
              tone: warning
              detail: Multicloud presence helps, but does not remove contract and delivery risk.
            - label: high
              tone: negative
              detail: Public evidence still lacks a fixed-spend-to-usage bridge.
        - label: Governance / disclosure / concentration
          values:
            - label: medium
              tone: warning
              detail: Governance is explicit but unconventional, and key concentration metrics remain private.
            - label: high
              tone: warning
              detail: A disclosure miss or hidden concentration surprise could compress confidence quickly.
            - label: low-medium
              tone: neutral
              detail: IPO prep and policy transparency create some discipline.
            - label: medium-high
              tone: warning
              detail: Residual exposure is driven mostly by missing public precision, not by zero mitigation.
