      - number: '1.4'
        title: Milestones, regulatory scrutiny, and evidence gaps
        blocks:
          - type: paragraph
            body: >-
              Anthropic’s public chronology is already dense enough to matter for later chapters. The record runs from
              the 2021 Series A and public emergence of the company, through the 2023 establishment of the Long-Term
              Benefit Trust and the Amazon partnership, to the 2024 Claude 3 launch and Mike Krieger hire, then into
              2025–2026 events including the FTC’s published scrutiny of cloud-provider partnerships, the Series E
              financing, Snowflake distribution expansion, India office build-out, and Vas Narasimhan’s board
              appointment. This is also where the public evidence turns less complete. The FTC’s inquiry and staff
              report explicitly flagged risks around lock-in, switching costs, and access to sensitive technical
              information in arrangements involving Anthropic. CourtListener also shows live copyright litigation in
              Bartz v. Anthropic PBC. Meanwhile, several canonical company-overview metrics remain unresolved in public
              materials: exact headcount, verified current customer count, and a fully reconciled cap table including
              Google and other investor ownership percentages. Those omissions do not undermine Anthropic’s status as a
              leading frontier-AI company, but they do block a cleaner underwrite.
            claimRefs:
              - CO022
              - CO023
              - CO024
              - CO027
              - CO034
