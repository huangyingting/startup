  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: 'Landscape: direct labs, bundled incumbents, routing layers, and internal-build substitutes'
        blocks:
          - type: paragraph
            body: >-
              Anthropic does not sell into a market where the buyer chooses only between Claude and one other frontier
              model lab. The practical alternative set is now layered. Direct model-lab rivalry still matters,
              especially against OpenAI, but large enterprise buyers can also stay inside incumbent productivity suites
              from Google or Microsoft, buy through infrastructure and routing layers such as Amazon Bedrock or
              OpenRouter, or build internally on open-weight stacks when governance or control matters more than buying
              one vendor’s full surface. Public evidence shows Anthropic itself participates in that broader landscape:
              Claude is sold directly, through Amazon Bedrock, and through Google Cloud Vertex AI, while Claude Code
              extends the product into developer workflows. Menlo’s 2025 enterprise data is important context because it
              shows internal build is still real but no longer the modal path: 76% of AI use cases are now purchased
              rather than built internally, and only 13% of enterprise daily workloads use open-source models. That
              means Anthropic benefits from current buyer preference for purchased tools, but it also faces a more fluid
              market in which buyers can switch among several purchased and routed options instead of accepting a
              classic single-vendor SaaS lock-in pattern.
            claimRefs:
              - CP008
              - CP009
              - CP010
              - CP017
              - CP020
              - CP022
              - CP025
              - CP026
              - CP029
              - CP031
              - CP041
              - CP042
      - number: '3.2'
        title: >-
          Profiles and pricing: Anthropic leads in coding and enterprise share, but rivals attack through bundles or
          optionality
        blocks:
          - type: paragraph
            body: >-
              The strongest direct rival remains OpenAI because it competes both on API usage and enterprise chat, and
              its public API rate card is still comparable with Anthropic’s flagship token pricing. Yet the official
              product surfaces show different strategic postures across the field. Anthropic’s own pricing page makes
              Claude Team and Enterprise explicit, includes Claude Code in paid subscriptions, and exposes a relatively
              deep enterprise-control layer. Google’s Workspace Enterprise plan and Microsoft 365 Copilot compete
              differently: they embed AI in tools enterprises already pay for and govern, which gives them procurement
              leverage even when direct model preference is mixed. Amazon Bedrock and OpenRouter compete on optionality
              rather than one branded assistant, letting buyers keep multiple model providers behind one control plane.
              Mistral positions itself around privacy, deployment freedom, and sovereignty, with Team and Enterprise
              packaging plus deploy-anywhere language in its Studio materials. Independent 2025 share data is the
              clearest evidence that Anthropic is not just a niche challenger anymore: TechCrunch’s reporting on Menlo’s
              mid-year enterprise data shows Anthropic at 32% enterprise LLM usage share versus OpenAI at 25%, and 42%
              coding share versus OpenAI at 21%. That is a real current strength, but it coexists with public pricing
              opacity for most large-enterprise contracts outside usage-based APIs and a need to defend against
              better-distributed rivals. Public win-loss and renewal evidence will decide whether that lead is durable.
            claimRefs:
              - CP001
              - CP002
              - CP003
              - CP004
              - CP005
              - CP006
              - CP007
              - CP011
              - CP012
              - CP013
              - CP014
              - CP015
              - CP017
              - CP020
              - CP021
              - CP022
              - CP024
              - CP025
              - CP026
              - CP027
              - CP028
              - CP033
              - CP034
              - CP040
      - number: '3.3'
        title: Switching cost, lock-in, multi-homing, and moat durability
        blocks:
          - type: paragraph
            body: >-
              Anthropic’s moat is real, but it is conditional. Public enterprise controls on Claude Team and
              Enterprise—SSO, admin controls, audit logs, SCIM, spend controls, and retention options—help Anthropic
              behave more like a serious system of work than a lightweight model endpoint. That supports stickier
              deployment once an enterprise standardizes on Claude for coding or knowledge-work flows. The
              countervailing evidence is just as important. Microsoft and Google can hide AI procurement inside existing
              suite and identity relationships. Amazon Bedrock and OpenRouter make multi-model routing, provider
              selection, and fallback operationally easier, reducing the friction of multi-homing. Open-weight and
              deploy-anywhere options from internal builds or vendors such as Mistral continue to matter for sovereignty
              and private-deployment use cases even though open-source workloads remain a minority in Menlo’s 2025 data.
              The result is a market with weaker structural lock-in than classic SaaS: Anthropic can win on model
              quality, coding performance, and enterprise ergonomics, but it cannot assume those wins automatically
              become durable economic power. The diligence focus should therefore be on realized contract terms,
              migration friction, retention, and whether Claude’s coding and enterprise-control lead stays large enough
              to overcome bundle power and routing optionality.
            claimRefs:
              - CP004
              - CP005
              - CP012
              - CP015
              - CP016
              - CP018
              - CP019
              - CP020
              - CP022
              - CP023
              - CP025
              - CP026
              - CP037
              - CP038
              - CP039
              - CP040
              - CP041
              - CP042
