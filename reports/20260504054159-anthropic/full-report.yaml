              - CU029
      - number: '6.3'
        title: >-
          Durability and expansion: Anthropic shows many paths to land-and-expand, but retention, concentration, and
          lock-in are still weakly evidenced
        blocks:
          - type: paragraph
            body: >-
              The go-to-market story is strongest on expansion surface area, not on disclosed renewal economics.
              Anthropic can land customers through direct app plans, direct API contracts, hyperscaler channels, and
              marketplace procurement routes, then expand via more seats, deeper governance controls, developer
              workflows, or partner tools that consume existing Anthropic commitments. AWS Marketplace availability, AWS
              and Vertex routing, and Cox Automotive’s Bedrock deployment all support that expansion narrative. At the
              same time, public evidence warns against assuming strong lock-in. Harvey’s public materials emphasize
              rigorous model evaluation by task rather than one permanent default across every workflow. Delivery Hero
              used Vertex AI and LiteLLM partly to preserve model choice and avoid procurement bottlenecks. Bedrock
              customers also do not receive the full first-party Anthropic tool stack, so partner-channel growth can
              increase reach while lowering feature parity with the direct platform. The largest unresolved issue is
              durability. Public sources disclose no NRR, GRR, churn, contract length, cohort retention, or top-customer
              concentration. Procurement friction is also visible: higher spend ceilings require sales, Priority Tier
              uptime requires commitments, regional workspace availability still requires diligence for some buyers, and
              the public status page shows repeated late-April incidents across claude.ai, API, MCP apps, and Claude
              Code. So the chapter’s conclusion is favorable on adoption and referenceability, but only conditional on
              direct diligence for renewals, large-account economics, and channel dependence.
            claimRefs:
