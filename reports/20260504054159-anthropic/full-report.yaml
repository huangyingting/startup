      items:
        - date: '2021-05-28'
          label: Series A / early public launch
          detail: Anthropic announces $124M Series A and names Dario and Daniela Amodei as leaders.
          tone: positive
        - date: '2023-09-19'
          label: LTBT governance detailed
          detail: Anthropic publicly explains the Long-Term Benefit Trust and majority-board path.
          tone: neutral
        - date: '2023-09-25'
          label: Amazon collaboration expands
          detail: Up to $4B investment and AWS primary-cloud status are announced.
          tone: positive
        - date: '2024-03-04'
          label: Claude 3 launches
          detail: Haiku, Sonnet, and Opus establish the modern Claude family.
          tone: positive
        - date: '2025-01-17'
          label: FTC staff report
          detail: Competition report flags lock-in and switching-cost concerns around cloud-AI partnerships.
