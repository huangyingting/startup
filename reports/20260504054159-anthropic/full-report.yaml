        - Public sources do not disclose paid-subscriber counts, conversion, or churn by plan.
      - - Team / department workspace
        - Buyer is a team lead or function owner; users are departmental employees; payer is a cost center.
        - Team plan targets 20–100 people with shared workspace and admin controls.
        - Natural land-and-expand path from individual use into managed collaboration.
        - No public seat count, logo-to-seat conversion, or departmental expansion data.
      - - Enterprise workspace
        - Buyer is CIO, security, IT, or procurement; users are employees; payer is enterprise budget owner.
        - Sales-assisted enterprise bundles SSO, SCIM, audit logs, spend controls, invoicing, and HIPAA-ready packaging.
        - Makes Anthropic viable for regulated and security-conscious buyers.
        - Revenue mix between self-serve enterprise and sales-assisted enterprise is undisclosed.
      - - Direct API / developer platform
        - >-
          Buyer is engineering or platform leadership; users are developers and applications; payer is engineering
          budget.
        - Platform page shows pay-as-you-go plus monthly invoice billing and committed-spend options.
        - Expands beyond chat seats into product-embedded usage and higher-volume consumption.
        - Public sources do not disclose API customer count, average spend, or retention by cohort.
      - - Partner-channel enterprise
        - >-
          Buyer uses an existing hyperscaler or procurement relationship; users are enterprise developers and internal
          teams; payer is cloud or consolidated software budget.
        - >-
          Bedrock, Vertex AI, Microsoft Foundry, AWS Marketplace, and marketplace-based Anthropic routes all distribute
          Claude.
        - Lowers procurement friction and widens geographic and governance fit.
        - Channel mix, revenue share, and feature-parity differences versus direct Anthropic are not disclosed.
