      - number: '4.2'
        title: 'GTM motion and traction proxies: enterprise-led demand is visible, but sales efficiency is not'
        blocks:
          - type: paragraph
            body: >-
              The best public traction evidence points to an enterprise-heavy go-to-market motion supported by
              product-led entry points and partner distribution. Anthropic’s enterprise page and customer case studies
              show named adoption proxies rather than a reconciled customer count: Zapier reports 89% employee adoption,
              800-plus AI agents deployed, and 10x app-usage growth; GitLab reports 98% surveyed-user satisfaction;
              Quantium reports a 90% reduction in proposal work time; NBIM reports roughly 20% weekly time savings; Lyft
              reports support-resolution times reduced by more than 87%; and Canva says more than 5,000 employees had
              access, with 65% using AI every day or often. Channel partners extend that motion materially. Snowflake’s
              expanded partnership puts Claude in front of 12,600-plus enterprise customers and says thousands of
              customers are already processing trillions of Claude tokens per month. Zoom’s partnership and investment
              indicate embedded-distribution value in contact-center and collaboration workflows. These are strong
              revenue-quality signals because they show real production use in complex enterprise settings, but they are
              still proxies. The public record does not disclose CAC, sales-cycle length, implementation cost, payback,
              cohort retention, or net revenue retention, so financial underwriting still cannot move from adoption
              evidence to a proper enterprise-efficiency model.
            claimRefs:
              - CI015
              - CI016
              - CI017
              - CI018
              - CI019
              - CI020
