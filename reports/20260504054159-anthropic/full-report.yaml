      - number: '2.3'
        title: Growth drivers, adoption constraints, and valuation relevance
        blocks:
          - type: paragraph
            body: >-
              Demand-side signals are strong enough to support continued market expansion. Microsoft's 2025 Work Trend
              Index shows leaders treating 2025 as a pivotal year, expecting agents to become part of strategy, and
              facing a clear productivity-capacity gap. PwC's Jobs Barometer reinforces that macro pull with wage, job,
              and revenue-per-employee signals that suggest AI is already translating into business value. Anthropic's
              own enterprise case studies also point to meaningful workflow productivity gains in support, proposals,
              and analytical tasks. But the braking forces are just as material. Deloitte shows that most experiments
              still do not scale quickly even when ROI is positive, and that regulatory compliance and governance
              timelines are now binding constraints. Stack Overflow's 2025 developer survey shows the same tension at
              the practitioner level: usage is high, but trust is low, deployment use cases remain avoided, and agent
              accuracy and privacy worries are widespread. The EU AI Act, NIST AI RMF, and OECD accountability framing
              all point in the same direction: higher-consequence uses will require more documentation, monitoring,
              oversight, and trust-building than early productivity pilots. Competition also remains intense. For
              valuation, that means Anthropic benefits from real market pull and multiple budget paths, but underwriting
              should discount for slow pilot-to-production conversion and for the lack of public segment economics
              needed to isolate a clean SAM or SOM.
