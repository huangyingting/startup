              - CI022
              - CI041
              - CI042
      - number: '4.3'
        title: 'Cost structure and capital adequacy: cloud and compute commitments dominate the financial story'
        blocks:
          - type: paragraph
            body: >-
              Anthropic’s financial profile is shaped less by classic SaaS cost buckets than by frontier-model compute,
              infrastructure access, and security overhead. Official Anthropic and partner releases already establish
              deep cloud dependence: Amazon says AWS is Anthropic’s primary cloud provider for mission-critical
              workloads and future model development, while Anthropic’s November 2025 Microsoft-NVIDIA announcement says
              the company committed to purchase $30 billion of Azure compute capacity and contract additional capacity
              up to one gigawatt. That same release adds up to $10 billion of NVIDIA investment and up to $5 billion of
              Microsoft investment, while still saying Amazon remains Anthropic’s primary cloud provider and training
              partner. The most important hard evidence comes from Amazon’s Q1 2025 10-Q. Amazon disclosed a $1.25
              billion Anthropic convertible note in 2023, a $2.75 billion second note in 2024, a $1.3 billion third note
              in late 2024, and a further $2.7 billion commitment due by Q4 2025. It also disclosed partial conversion
              of those notes into nonvoting preferred stock, a roughly $3.3 billion gain on reclassification, and an
              estimated $13.8 billion fair value across the notes and preferred stock as of March 31, 2025. Combined
              with Anthropic’s own disclosures around Project Glasswing and ASL-3 deployment overhead, the public record
              strongly implies a capital-intensive business with substantial external financing support, but not one
              whose internal cash generation, burn, or runway can yet be underwritten from public evidence.
            claimRefs:
              - CI023
              - CI024
              - CI025
              - CI026
              - CI027
