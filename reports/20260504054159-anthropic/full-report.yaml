  - id: TP001
    title: Competitor profile table
    columns:
      - competitor
      - category
      - scale/funding
      - target segment
      - differentiation
      - limitation
    rows:
      - - Anthropic
        - Direct frontier lab
        - CNBC reported $61.5B valuation in March 2025
        - Enterprises, developers, coding-heavy teams, regulated buyers
        - Strong coding reputation, multi-cloud distribution, unusually deep enterprise controls on public pages
        - Exact enterprise contract pricing and realized discounts are not public
      - - OpenAI
        - Direct frontier lab + enterprise platform
        - Private market leader in consumer mindshare; public API rate card and business/enterprise surfaces
        - Developers, business teams, broad enterprise deployments
        - Strong API breadth, business-data controls, large installed base
        - Audited public fetch did not expose a complete enterprise seat price card
      - - Google Gemini / Workspace + Vertex AI
        - Incumbent suite vendor + cloud platform
        - Public incumbent with Workspace and Google Cloud distribution
        - Workspace-standardized enterprises and cloud builders
        - Bundled productivity distribution, enterprise data regions, DLP, and Vertex controls
        - Enterprise pricing is largely contact-sales and the exact comparable API package is mixed across surfaces
      - - Microsoft 365 Copilot / Azure OpenAI
        - Incumbent suite vendor + cloud platform
        - Public incumbent with Microsoft 365 and Azure distribution
        - Microsoft-standardized enterprises and Azure developers
        - Embedded app workflow access, Microsoft Graph grounding, privacy boundary inside Microsoft 365
        - Public audited pages emphasize packaging and controls more than simple apples-to-apples seat economics
      - - Amazon Bedrock / Amazon Q
        - Multi-model infrastructure + assistant
        - AWS distribution, multiple model providers, Amazon Q Lite/Pro list pricing
        - AWS-centric builders, platform teams, internal knowledge-work deployments
        - Model optionality, batch discounts, security/compliance posture, low-entry seat pricing for Q
        - End-user assistant brand is weaker than Claude, ChatGPT, or Copilot
      - - OpenRouter
        - Adjacent routing layer
        - 300+ models from 60+ providers through one API; 5.5% platform fee on pay-as-you-go credits
        - Developers and teams prioritizing provider optionality
        - Fast switching, fallback, provider selection, and multi-model procurement simplification
        - It is a routing layer, not a vertically integrated enterprise assistant
      - - Mistral
        - Sovereignty- and privacy-oriented alternative
        - CNBC reported about $14B valuation in September 2025
        - Europe-sensitive enterprises, AI builders, private-deployment buyers
        - Deployable-anywhere posture, data ownership language, privacy and enterprise packaging
        - Public adoption-share evidence is much thinner than for Anthropic or OpenAI
      - - Internal build on open-weight models
        - Substitute / internal build
        - Menlo says 24% of 2025 use cases are still built internally rather than purchased
        - Teams with stronger internal AI engineering, governance, or sovereignty needs
        - Maximum control, model optionality, and private deployment flexibility
        - Longer time to value and higher integration burden than buying a finished product
    notes: >-
      This table covers the most material ways an enterprise buyer can solve Anthropic’s core jobs in 2026: direct labs,
      bundle incumbents, routing layers, sovereignty vendors, and internal build.
