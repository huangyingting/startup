chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity, mission, and operating model
        blocks:
          - type: paragraph
            body: >-
              Anthropic’s official company page describes the business as an AI safety and research company that builds
              reliable, interpretable, and steerable AI systems. That identity is not just branding: the same official
              materials tie Anthropic’s mission to a public-benefit corporate form, a safety-first research agenda, and
              a commercial model that distributes Claude through both direct products and partner channels. Public
              product and business-plan releases show the company monetizing through Claude subscriptions, enterprise
              seats, API access, and embedded distribution on major cloud and workflow platforms rather than a single
              consumer app alone. The official company page does not publish a street address, but Anthropic’s own jobs
              pages and research posts repeatedly anchor operations in San Francisco, which is the most supportable
              primary-office reference point for this chapter. Public geography evidence also shows the company
              expanding from that base into Tokyo and Bengaluru as it scales internationally.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO009
              - CO010
              - CO012
              - CO025
              - CO026
              - CO027
              - CO028
              - CO041
      - number: '1.2'
        title: Governance, leadership, and key-person dependence
        blocks:
          - type: paragraph
            body: >-
              Governance is one of the most distinctive diligence variables. Anthropic states that it is a Public
              Benefit Corporation and that its Board of Directors is elected by stockholders together with the Long-Term
              Benefit Trust. The LTBT page adds that the trust is an independent body of five financially disinterested
              members with authority to select and remove a portion of the board that is intended to become a majority
              over time. That structure matters because it gives Anthropic a mission-governance layer that sits uneasily
              but deliberately alongside mega-round financing and strategic cloud dependencies. Current public materials
              identify Dario Amodei and Daniela Amodei as the core founder-executives, with Mike Krieger’s 2024 arrival
              as Chief Product Officer adding senior product-scaling depth and Vas Narasimhan’s 2026 board appointment
              adding regulated-industry experience. Even with these additions, the public record still suggests
              meaningful key-person dependence around the Amodeis and a small set of leaders who bridge research
              credibility, capital raising, public policy, and commercial execution.
            claimRefs:
              - CO003
              - CO004
              - CO005
              - CO006
              - CO007
              - CO008
              - CO012
              - CO013
              - CO024
              - CO042
              - CO043
      - number: '1.3'
        title: Capital base, partner distribution, and public scale signals
        blocks:
          - type: paragraph
            body: >-
              Public financing and partnership evidence places Anthropic firmly in late-stage private-company territory.
              The company officially disclosed a $3.5 billion Series E at a $61.5 billion post-money valuation in March
              2025, while TechCrunch cited Crunchbase for roughly $18.2 billion of cumulative capital raised. Amazon is
              more than a financial investor: Anthropic and Amazon both state that AWS became Anthropic’s primary cloud
              provider for mission-critical workloads under the September 2023 collaboration, with Amazon taking only a
              minority ownership position but gaining major commercial relevance through Bedrock distribution and chip
              collaboration. Public evidence also points to Google as both a major backer and a distribution partner
              through Vertex AI. On the go-to-market side, Anthropic’s official materials show Claude distributed
              directly, through Team and Enterprise plans, via Amazon Bedrock, through Zoom integrations, and through
              Snowflake’s data-cloud footprint. The scale signal is strong but uneven: Reuters reported in April 2026
              that Anthropic may have closed the revenue gap with OpenAI, yet audited revenue, customer count,
              headcount, and a reconciled ownership map are still not public.
            claimRefs:
              - CO014
              - CO015
              - CO016
              - CO019
              - CO020
              - CO021
              - CO029
              - CO030
              - CO031
              - CO032
