  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'Product definition: Anthropic has expanded from chat assistant into app, API, coding, and agent workflows'
        blocks:
          - type: paragraph
            body: >-
              Anthropic’s public product surface is now broad enough to describe as a platform family, not a single
              assistant. Claude’s plan pages expose a consumer and enterprise workspace with multiple app integrations,
              while the Claude 4 launch and Claude Code materials show a dedicated coding surface that runs in the
              terminal, integrates with VS Code and JetBrains, and can operate in GitHub workflows. On the API side,
              Anthropic has moved beyond plain text generation into agent primitives: code execution, remote MCP
              connectivity, reusable files, web search, and longer-lived prompt caching. That matters because the
              company’s product definition is increasingly workflow-native. The customer is not merely buying “a model”;
              they are buying an operating environment for research, writing, coding, enterprise search, automation,
              and—at the frontier—defensive cybersecurity work through the gated Mythos preview. The module map below
              therefore centers on surfaces, model tiers, and workflow infrastructure rather than on a single SKU
              hierarchy. That distinction matters for diligence because product risk now shifts from “is Claude useful”
              toward “which layer owns the workflow, who administers it, and where can failures or lock-in emerge.” It
              also explains why Anthropic increasingly competes on packaging, admin fit, and developer ergonomics rather
              than on model quality alone.
            claimRefs:
              - CE001
              - CE002
              - CE003
              - CE004
              - CE008
              - CE009
              - CE010
              - CE012
              - CE013
              - CE015
              - CE026
              - CE040
              - CE041
      - number: '5.2'
        title: 'Architecture and operating model: model tiers sit inside a multi-layer tool and partner deployment stack'
        blocks:
          - type: paragraph
            body: >-
              Public documentation is unusually explicit about the outer operating model, while remaining intentionally
              silent on hidden internal architecture. Anthropic documents three current generally available model
              tiers—Opus 4.7, Sonnet 4.6, and Haiku 4.5—with different context windows, output limits, and reasoning
              modes, plus the gated Mythos preview for defensive cybersecurity. Around those models, Anthropic now
              exposes a tool layer that includes code execution, remote MCP connections, Files, web search, and
              longer-lived caching. Distribution is also multi-channel by design: the same core model family appears on
              Anthropic’s own API, Amazon Bedrock, Google Vertex AI, and Microsoft Foundry. The public stack therefore
              looks like a layered system: user surfaces and admin controls on top, model selection in the middle,
              tool/runtime services around the model, and hyperscaler infrastructure beneath. What remains opaque is
              equally important: Anthropic does not disclose model architecture, training-compute scale, data mixture
              weights, or the exact economics of cross-cloud deployment. In other words, buyers can understand the
              observable operating envelope, but they still cannot fully inspect the hidden engine that produces
              capability, cost, and resilience. That opacity is a normal frontier-model trait, but it means product
              diligence must stop at documented layers instead of inferring internals.
            claimRefs:
              - CE004
              - CE005
              - CE006
