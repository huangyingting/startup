  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market boundary and sizing lenses
        blocks:
          - type: paragraph
            body: >-
              Anthropic's addressable market should be defined from its monetization surfaces outward, not from the
              entire AI stack inward. Public pricing and platform materials show the company monetizes a combination of
              seat-based subscriptions, enterprise deployment features, developer and agent API usage, and a dedicated
              education offering for universities. That is materially narrower than broad generative-AI narratives that
              also count devices, servers, consulting, and other infrastructure layers. Gartner's $644 billion 2025
              forecast is therefore useful as an outer envelope for overall end-user spending, but not as a direct
              revenue pool for Anthropic. Menlo's 2025 enterprise estimate of $37 billion and its $19 billion
              application-layer estimate are closer to the budgets that can actually flow into Anthropic or its
              application ecosystem, even though those figures remain U.S.-enterprise centric and not company specific.
              The practical underwriting boundary should include enterprise knowledge-work seats, coding and agent
              workflows billed on usage, campus-wide education agreements, and partner-mediated Claude consumption via
              AWS and Google Cloud. It should exclude hardware refresh, generic cloud infrastructure, and broad AI
              services spend that does not monetize through Anthropic's products or partner channels. That still leaves
              Anthropic-specific SAM and SOM as diligence questions rather than public facts, because public disclosures
              stop short of contract values and segment revenue mix.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
              - CM006
              - CM007
              - CM008
              - CM009
      - number: '2.2'
        title: Buyer segmentation, budgets, and adoption path
        blocks:
          - type: paragraph
            body: >-
              The public evidence suggests Anthropic is selling into multiple buyer maps at once. At the top is
              horizontal enterprise knowledge work, where Team and Enterprise packaging, SSO, audit logs, and domain
              controls support broad employee deployment. The second is the developer and technical buyer, where Claude
              Code, token-priced APIs, managed-agent features, and partner availability on AWS and Google Cloud fit
              platform, engineering, and product budgets. The third is institutional higher education, where Anthropic
              has launched a dedicated product, full-campus agreements, and pedagogy-specific features such as Learning
              Mode and educational integrations. Customer proof and partner proof widen the map further: ServiceNow uses
              Claude in developer and operational contexts, Anthropic's enterprise materials highlight support and
              analytical workflows, and cloud marketplaces route procurement through budgets enterprises already
              control. Adoption also appears to follow a repeatable path. Menlo's PLG evidence and Stack Overflow's
              developer-use rates suggest individual and team experimentation can happen quickly, but enterprise rollout
              usually needs security, spend controls, governance review, and then a larger budget commitment through
              direct sales or partner procurement. That makes buyer coverage broad, but progression uneven.
            claimRefs:
              - CM010
              - CM002
              - CM011
              - CM004
              - CM012
              - CM013
              - CM014
