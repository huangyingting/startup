tables:
  - id: TM001
    title: Market definition table
    columns:
      - segment/category
      - included spend
      - excluded spend
      - buyer/payer
      - relevance
    rows:
      - - Enterprise knowledge-work assistance
        - >-
          Seat-based Claude Team and Enterprise subscriptions, Claude Cowork, and organization-wide productivity use
          cases
        - Generic office software, non-AI collaboration tools, and consulting not tied to Claude usage
        - CIO, COO, central IT, and line-of-business leaders buying for employees
        - Core direct market for Claude deployment across knowledge work
      - - Developer and agent platform
        - >-
          Token-priced API usage, Claude Code workflows, managed-agent features, and model consumption in software
          products
        - Hyperscaler infrastructure spend, unrelated developer tooling, and pure cloud compute
        - CTO, VP Engineering, platform teams, and product engineering budgets
        - Core direct market for Anthropic's coding and application-layer demand
      - - Higher education deployment
        - Campus-wide Claude access, learning-mode usage, and education-oriented API or tool budgets
        - Generic LMS subscriptions, hardware refresh, and non-AI campus software
        - Provost, CIO, procurement, and university administration
        - Distinct institutional budget path outside classic enterprise SaaS motions
      - - Partner-mediated Claude procurement
        - AWS Marketplace and Google Cloud consumption tied directly to Claude availability or model usage
        - General cloud spend that does not route through Claude products or partner-model demand
        - Cloud platform owners, procurement, and enterprise architecture teams
        - Expands distribution and procurement flexibility without making all partner-cloud spend addressable
      - - Broad AI infrastructure adjacency
        - Worldwide AI device, server, and services spending used in broad market forecasts
        - Direct Anthropic revenue when the spend never monetizes through Claude or Anthropic APIs
        - OEMs, hyperscalers, and infrastructure buyers
        - Useful upper-bound TAM context, but mostly outside Anthropic's practical SAM
    notes: >-
      The boundary is drawn from Anthropic's monetization surfaces outward: seat plans, API usage, education deployment,
      and partner-mediated Claude consumption. Broad hardware and services spend matters for context but not as a direct
      revenue pool.
