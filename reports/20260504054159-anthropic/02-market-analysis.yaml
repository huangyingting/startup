figures:
  - id: FM001
    title: Market sizing lens
    type: pyramid
    layout: standard
    summary: >-
      Public sizing should be treated as nested lenses: a broad worldwide upper envelope, a narrower enterprise spend
      pool, and an application-layer slice closer to Anthropic's monetizable market.
    data:
      nodes:
        - label: 'Worldwide generative AI spend: $644B in 2025'
          detail: Gartner broad end-user spending lens and upper envelope for the category.
          tone: neutral
        - label: 'Enterprise generative AI spend: $37B in 2025'
          detail: Menlo enterprise lens that is closer to actual buyer budgets than a whole-stack AI TAM.
          tone: positive
        - label: 'Application-layer enterprise spend: $19B in 2025'
          detail: >-
            Menlo slice that most closely resembles the part of the market Anthropic can monetize directly or
            indirectly.
          tone: positive
        - label: 'Anthropic direct surfaces: seats, APIs, education, and partner channels'
          detail: Anthropic monetizes a subset of the application layer rather than the whole AI stack.
          tone: neutral
    approximationNotes: >-
      This is a lens stack, not a strict TAM-SAM-SOM waterfall, because the underlying sources use different market
      boundaries.
    claimRefs:
      - CM005
      - CM006
      - CM007
      - CM008
      - CM009
