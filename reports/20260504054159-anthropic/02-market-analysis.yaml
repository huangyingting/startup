  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - driver/constraint
      - direction
      - timing
      - implication
      - diligence ask
    rows:
      - - Digital labor and capacity gap
        - up
        - 12-18 months
        - Supports budget growth for assistants and agents as firms try to close productivity gaps
        - Request Anthropic expansion data by seat growth versus new workflow adoption.
      - - Developer AI habit formation
        - up
        - current
        - High developer use supports Claude Code, API, and agent-workflow demand
        - Request Claude Code retention and enterprise conversion by cohort.
      - - Buying over building
        - up
        - current
        - Favors vendors that can land before internal AI programs mature
        - Request Anthropic win rates versus internal builds and open-source alternatives.
      - - Partner procurement channels
        - up
        - current
        - AWS and Google reduce friction by routing Claude through existing spend envelopes
        - Request partner-sourced ARR and attach rates by channel.
      - - Higher education rollout
        - up
        - 12-24 months
        - Creates a distinct institutional budget path, but economics remain opaque
        - Request campus seat counts, pricing bands, and renewal curves.
      - - Pricing opacity and commitment structure
        - down
        - current
        - Makes buyer cost forecasting and SAM estimation harder
        - Request average contract value, seat mix, and committed usage minimums.
      - - Governance and regulatory compliance
        - down
        - current and rising
        - Slows adoption in high-consequence workflows and lengthens enterprise sales cycles
        - Request sector-by-sector compliance roadmaps and implementation evidence.
      - - Trust and human verification
        - down
        - current
        - Low trust in accuracy keeps people in the loop and narrows fully autonomous deployment
        - Request hallucination, review-rate, and quality-assurance metrics in production use cases.
      - - Pilot-to-production bottlenecks
        - down
        - 3-12 months
        - Extends time to value even where ROI is promising
        - Request pilot-to-production conversion, cycle times, and reasons for attrition.
    notes: >-
      The valuation-relevant question is not whether demand exists, but whether Anthropic can convert broad interest
      into durable, governed, and retained production spend before friction and competition slow the curve.
