  - id: T806
    title: Final diligence asks table
    columns:
      - topic
      - missing evidence
      - why it matters
      - owner or diligence path
    rows:
      - - Series G economics
        - Preference order, liquidation rights, ratchets, MFN clauses, conversion terms, and any secondary components.
        - These terms determine whether the $380B headline valuation is economically real for new money.
        - Management, counsel, and financing-room documents.
      - - Revenue quality
        - Bridge from annualized headline revenue to recognized and retained revenue by direct vs partner channel.
        - Gross-versus-net treatment is the single biggest public comparability caveat.
        - CFO diligence pack and revenue-recognition memo.
      - - Customer durability
        - Top-customer concentration, NRR, GRR, churn, and contract length for enterprise and coding cohorts.
        - The current mark assumes the run-rate is durable rather than promotional or concentrated.
        - Sales finance exports and cohort tables.
      - - Compute commitments
        - Take-or-pay, prepayment, utilization, and cancellation terms across AWS, Azure, NVIDIA, and TPU capacity.
        - Downside may come from obligations outrunning monetization, not from weak demand alone.
        - Infrastructure procurement, treasury, and board-approved capex schedules.
      - - IPO controls and governance
        - Board-rights map, LTBT seat map, disclosure controls, audit readiness, and any public-company conversion plan.
        - Anthropic can reach IPO scale before it reaches IPO-grade governance clarity.
        - General counsel, CFO, audit committee, and external counsel materials.
      - - Legal and policy exposure
        - >-
          Reserve policy, litigation status, government channel pipeline, and any commercial restrictions tied to
          procurement disputes.
        - Multiple compression can happen even if demand remains strong.
        - Legal room, policy team, and government affairs diligence.
    notes: >-
      These asks are narrow and investment-critical; each could move either the recommendation or the acceptable entry
      price.
    claimRefs:
