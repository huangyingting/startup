  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: standard
    summary: >-
      The current mark only looks comfortable if Anthropic can preserve premium revenue multiples or increase durable
      revenue beyond the current headline run-rate.
    data:
      items:
        - label: Revenue needed at 8x
          value: 47.5
          detail: USD billions required to support a $380B valuation at a mature but still premium platform multiple.
          tone: negative
        - label: Revenue needed at 12x
          value: 31.7
          detail: USD billions required to support the current mark at a strong software-like multiple.
          tone: warning
        - label: Revenue needed at 16x
          value: 23.8
          detail: USD billions required to support the mark if scarcity premium persists.
          tone: neutral
        - label: Current reported run-rate
          value: 30
          detail: Company-reported annualized revenue as of April 2026.
          tone: positive
    approximationNotes: >-
      Revenue thresholds are simple valuation/revenue bridges using the verified $380B mark, not discounted-cash-flow
      outputs.
    claimRefs:
      - CV001
      - CV002
      - CV033
  - id: FV003
    title: Valuation / return range
    type: range
    layout: wide
    summary: >-
      Public evidence supports a wide valuation range because revenue normalization and multiple selection matter almost
      as much as demand itself.
    data:
      items:
        - label: Bear case
          low: 140
          mid: 180
          high: 216
          displayValue: $140B-$216B
          detail: Net revenue equivalent is lower than the headline run-rate or multiples compress to 7x-9x.
          tone: negative
        - label: Base case
          low: 280
          mid: 332
          high: 384
          displayValue: $280B-$384B
          detail: Durable revenue lands around $28B-$32B and the market awards roughly 10x-12x.
          tone: warning
        - label: Bull case
          low: 532
          mid: 602
          high: 672
          displayValue: $532B-$672B
          detail: Anthropic converts current demand into $38B-$42B of durable revenue and keeps a 14x-16x scarcity premium.
          tone: positive
    approximationNotes: >-
      Ranges are scenario-based revenue-multiple outputs designed for investment committee discussion, not management
      guidance.
    claimRefs:
      - CV040
      - CV041
      - CV042
  - id: FV004
