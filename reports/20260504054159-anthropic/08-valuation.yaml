figures:
  - id: F801
    title: Recommendation logic
    type: flow
    layout: wide
    summary: >-
      The recommendation comes from strong demand proof colliding with incomplete normalization, large compute
      obligations, and unusual governance.
    data:
      nodes:
        - id: scale
          label: Scale proof
          detail: Verified $380B mark, >$30B run-rate, and 1,000+ business customers above $1M annualized spend.
          tone: positive
        - id: comp
          label: Comparable context
          detail: Headline multiple sits near premium software comps rather than in obviously absurd territory.
          tone: positive
        - id: quality
          label: Normalization gap
          detail: Revenue is annualized and Reuters says Anthropic counts gross revenue versus some hyperscaler cuts.
          tone: warning
        - id: capital
          label: Capital intensity
          detail: AWS, Azure, and TPU commitments are large enough to change margin and downside outcomes.
          tone: warning
        - id: governance
          label: Governance / legal overhang
          detail: LTBT control complexity, active litigation, Pentagon conflict, and reliability strain all matter.
          tone: warning
        - id: decision
          label: Research-more
          detail: >-
            Public evidence is good enough to stay engaged and too incomplete to justify buy at the current verified
            mark.
          tone: neutral
      edges:
        - from: scale
          to: comp
        - from: comp
          to: decision
        - from: quality
          to: decision
        - from: capital
          to: decision
        - from: governance
          to: decision
    approximationNotes: null
