  - id: T805
    title: Thesis-break and kill triggers table
    columns:
      - trigger
      - threshold
      - transmission to thesis
      - action implication
    rows:
      - - Net revenue reality disappoints
        - >-
          Private diligence shows that gross run-rate translates into materially lower recognized or retained revenue
          than public readers infer.
        - The current mark would be screening on a weaker denominator than the comp set suggests.
        - Move from research-more toward avoid at the current price unless the entry resets.
      - - Compute obligations outrun monetization
        - >-
          Utilization, take-or-pay, or prepayment schedules reveal fixed obligations that are too large relative to
          revenue conversion.
        - Anthropic becomes a capital-commitment story rather than a software-scarcity story.
        - Re-cut bull and base cases using lower margins and lower multiples.
      - - Legal or procurement overhang worsens
        - Copyright, Pentagon, or other government actions broaden commercial restrictions or required compliance costs.
        - The multiple can compress before revenue has time to catch up.
        - Pause new underwriting until the event path is clear.
      - - Reliability strain becomes recurring
        - Repeated Claude/API/Claude Code outages or release regressions turn demand growth into trust erosion.
        - Revenue quality and renewal confidence fall, especially in enterprise and coding workflows.
        - Lower probability on the bull case and raise risk rating.
      - - Governance or cap-table terms prove investor-unfriendly
        - >-
          Series G preference stack, veto rights, or LTBT-related control mechanics reduce practical economics for new
          money.
        - Headline valuation ceases to represent investable economics.
        - Do not proceed without revised terms or much better price.
    notes: >-
      These are decision triggers, not generic risks; each would directly impair the assumptions needed to defend the
      current verified mark.
    claimRefs:
