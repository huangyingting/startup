  - id: TV004
    title: Comparable valuation table
    columns:
      - comparable
      - metric
      - multiple / valuation / status
      - relevance
      - limitation
    rows:
      - - Anthropic
        - Private valuation / company-reported annualized revenue
        - ~12.7x on $380B and >$30B run-rate
        - >-
          Closest available reference for the current entry mark and the one investors are actually being asked to
          underwrite.
        - >-
          Uses company-reported annualized revenue, not audited trailing revenue; preference terms and net take are
          undisclosed.
      - - Microsoft
        - Public P/S
        - ~9.7x-10.1x
        - Best large-cap benchmark for enterprise AI distribution, cloud reach, and tooling monetization.
        - Diversified megacap; AI is only one part of the business and margins are much more mature.
      - - Alphabet
        - Public P/S
        - ~11.0x
        - >-
          Relevant because Alphabet is both a major investor in Anthropic and a direct cloud distribution route for
          Claude.
        - Diversified advertising and cloud mix; not a pure frontier-model lab.
      - - Amazon
        - Public P/S
        - ~3.9x-4.0x
        - Useful lower-multiple benchmark for a hyperscaler that also supplies and distributes Anthropic.
        - Retail and marketplace mix make the business model far broader than AI software.
      - - Snowflake
        - Public P/S
        - ~10.4x-11.1x
        - A cleaner software-like premium comp with direct Anthropic partnership and enterprise-data adjacency.
        - Not a foundation-model creator; capital intensity and research risk are much lower.
      - - Palantir
        - Public P/S
        - ~77.0x-77.2x
        - Shows what public markets will still pay for scarce AI-premium narratives with defense and platform exposure.
        - >-
          Government mix, profitability, and public-company disclosure make it a very loose upper-bound reference, not a
          like-for-like comp.
    notes: >-
      No single public peer fully matches Anthropic. The table mixes direct pricing context, hyperscaler routes,
      software-premium comps, and one AI-premium extreme to bound the discussion.
    enumerationScope:
      coverage: partial
      basis: >-
        This table covers the most decision-useful public and private comparables with accessible May 2026 evidence. It
        is not exhaustive because several frontier-model peers still lack directly comparable public revenue,
        preference, and channel-normalization data.
