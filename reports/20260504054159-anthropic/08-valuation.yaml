      - - Microsoft
        - Public P/S
        - ~9.7x-10.1x
        - Best large-cap benchmark for enterprise AI distribution, cloud reach, and tooling monetization.
        - Diversified megacap; AI is only one part of the business and margins are much more mature.
      - - Alphabet
        - Public P/S
        - ~11.0x
        - >-
          Relevant because Alphabet is both a major investor in Anthropic and a direct cloud distribution route for
          Claude.
        - Diversified advertising and cloud mix; not a pure frontier-model lab.
      - - Amazon
        - Public P/S
        - ~3.9x-4.0x
        - Useful lower-multiple benchmark for a hyperscaler that also supplies and distributes Anthropic.
        - Retail and marketplace mix make the business model far broader than AI software.
      - - Snowflake
        - Public P/S
        - ~10.4x-11.1x
        - A cleaner software-like premium comp with direct Anthropic partnership and enterprise-data adjacency.
