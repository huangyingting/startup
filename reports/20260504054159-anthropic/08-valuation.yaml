  - id: T802
    title: Thesis / anti-thesis table
    columns:
      - argument
      - direction
      - what would change the view
    rows:
      - - >-
          Anthropic has frontier-scale demand proof with >$30B run-rate and 1,000+ business customers above $1M
          annualized spend.
        - thesis
        - If audited or normalized figures show much lower retained revenue, the premium case weakens materially.
      - - >-
          Cloud distribution through AWS, Google, Microsoft, and Snowflake broadens reach faster than a direct-only GTM
          model could.
        - thesis
        - >-
          If those same channels take too much economics or reduce first-party control, distribution becomes a margin
          drag instead of a moat.
      - - A ~12.7x headline ARR multiple is not visibly absurd against premium AI software comps.
        - thesis
        - >-
          If scarcity multiples normalize toward Amazon-like or mature-platform levels, the current mark loses support
          quickly.
      - - Series G terms, dilution, and liquidation preference are still not public.
        - anti-thesis
        - Seeing the full preference stack and any ratchets could materially improve or worsen the underwrite.
      - - Capital intensity is large enough that demand alone will not determine value.
        - anti-thesis
        - >-
          A clean spend-to-revenue bridge and utilization schedule would reduce fear that compute obligations outrun
          monetization.
      - - Legal, procurement, and reliability issues can compress the multiple before financials catch up.
        - anti-thesis
        - >-
          Closure of active disputes, steadier service quality, and cleaner government positioning would improve
          confidence.
    notes: >-
      Arguments are framed around what the current price already assumes, not around whether Anthropic is a technically
      strong company.
