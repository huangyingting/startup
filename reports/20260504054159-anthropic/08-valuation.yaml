tables:
  - id: TV001
    title: Recommendation summary table
    columns:
      - decision field
      - current view
      - decision implication
    rows:
      - - Recommendation
        - research-more
        - Stay engaged, but do not underwrite new money from public evidence alone at the verified $380B mark.
      - - Confidence
        - medium
        - Demand proof is strong; normalized economics, cap-table terms, and IPO-grade disclosure are still weak.
      - - Risk rating
        - high
        - >-
          Multiple compression can transmit through compute economics, legal or procurement shocks, or
          weaker-than-headline net revenue.
      - - Valuation stance
        - fair
        - >-
          Fair only on company-reported headline run-rate; public-only normalized economics could still screen
          stretched.
      - - Hold / exit posture
        - 3-5 year hold only after deeper diligence
        - A durable outcome likely requires either IPO-quality disclosure or a later entry with cleaner terms.
      - - Target return discipline
        - No public-only hurdle is supportable at $380B
        - >-
          Require materially better disclosure, materially better price, or both before moving from research-more to
          buy.
    notes: >-
      The call is explicitly price-sensitive: Anthropic can be a strong company and still be an incomplete public-only
      underwriting at the current verified mark.
