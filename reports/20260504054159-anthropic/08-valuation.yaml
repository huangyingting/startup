    title: Bull / base / bear scenario table
    columns:
      - scenario
      - assumptions
      - valuation / return logic
      - key risks
      - probability signal
    rows:
      - - Bull
        - >-
          Anthropic converts the current run-rate into roughly $38B-$42B of durable revenue, keeps premium enterprise
          and coding share, and holds a 14x-16x scarcity multiple.
        - Implied valuation about $532B-$672B, or roughly 1.4x-1.8x the current verified mark before dilution.
        - >-
          Requires headline ARR to prove durable, compute to stay available, and legal/governance noise not to re-rate
          the multiple.
        - low-medium
      - - Base
        - >-
          Normalized durable revenue settles around $28B-$32B and the market awards about 10x-12x, closer to premium
          software than frontier euphoria.
        - Implied valuation about $280B-$384B, roughly flat to modest downside versus the current mark.
        - >-
          Even good execution may only hold the present valuation if net revenue and margins are less attractive than
          the headline suggests.
        - medium
      - - Bear
        - >-
          Net revenue equivalent is only about $20B-$24B or public comps compress toward 7x-9x because compute, legal,
          or procurement issues worsen.
        - Implied valuation about $140B-$216B, meaning substantial downside from the current verified mark.
        - Compression can happen without demand collapse if partner economics and obligations dominate the story.
        - medium
    notes: >-
      The scenarios use revenue-multiple logic because public evidence is too weak on profit and cash-flow conversion
      for a DCF-quality model.
