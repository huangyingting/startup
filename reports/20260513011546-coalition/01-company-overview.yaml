company:
  name: Coalition
chapter:
  number: 1
  title: Company Overview
  summary: "Coalition, founded in 2017 in San Francisco, is the world's first Active Insurance provider combining cyber insurance underwriting with continuous attack-surface monitoring, threat alerts, and incident response. The company has raised approximately $800M across funding rounds, maintains a $5B valuation reaffirmed in March 2025, and announced a transformative 10-year global partnership with Allianz Commercial in May 2026 that positions it to become the largest cyber insurer globally."
sections:
  - id: identity-and-business-model
    title: Identity & Business Model
    body: >
      Coalition is a San Francisco-based cybersecurity and insurtech company founded in 2017 with the mission to solve cyber risk and create a safer digital economy. The company operates as the world's first Active Insurance provider—a model that integrates traditional cyber insurance underwriting with proactive, technology-driven risk management. Unlike conventional carriers that price and pay claims reactively, Coalition combines continuous attack-surface monitoring, automated vulnerability alerts, and around-the-clock digital forensics and incident response (DFIR) into a single policy offering. Coalition is simultaneously a licensed cyber insurance carrier—through its subsidiary Coalition Insurance Company (CIC), which holds an A- AM Best rating—and a technology risk management platform. It serves businesses across sectors including healthcare, retail, information technology, legal, financial services, and energy, spanning SMBs to large enterprises. The Active Insurance model assesses an organization's risk at policy inception, monitors the insured's external attack surface throughout the policy term, proactively alerts policyholders when new vulnerabilities emerge, and provides rapid incident response when a cyber event occurs. Coalition operates in seven countries: the United States, Canada, the United Kingdom, Australia, Germany, Denmark, and Sweden. In May 2026, Coalition and Allianz Commercial announced a transformative 10-year agreement under which Allianz transitions its entire standalone commercial cyber portfolio to Coalition, establishing Coalition as Allianz's exclusive global cyber insurance partner across all commercial segments.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
      - CO006
      - CO007
      - CO008
      - CO038
    tableRefs:
      - TO001
    figureRefs:
      - FO003

  - id: founders-and-leadership
    title: Founders & Leadership Team
    body: >
      Coalition was co-founded in 2017 by Joshua Motta, who serves as CEO and co-founder. Motta brings a distinctive cross-disciplinary background spanning national security, technology, and finance: he was CXO and Head of Special Projects at Cloudflare (NYSE: NET, a $25B web infrastructure company), held positions at Goldman Sachs and the Central Intelligence Agency, and gained engineering experience at Microsoft—a rare combination of first-hand cyber threat intelligence and capital markets expertise that is central to the Active Insurance proposition. The company's leadership team is broad for a growth-stage private company. Jim Young serves as CFO overseeing financial operations and capital allocation. Shawn Ram leads as CRO responsible for broker distribution and GTM execution. Frank Fumarola serves as CPO driving product strategy. Maha Virudhagiri serves as CTO overseeing engineering and platform infrastructure. Tiago Henriques serves as Chief Underwriting Officer leading pricing, risk selection, and loss control. David Lynders leads insurance operations as Head of Insurance; John Littzi serves as General Counsel; Dylan Steele leads marketing as CMO; and Sisi Liu serves as Chief of Staff and Head of Strategy and Corporate Development. The leadership team reflects deep functional coverage across insurance operations, cybersecurity, technology, and capital markets. Allianz CEO Oliver Bäte currently sits as an independent Coalition board member and is expected to transition to a nominated director seat upon closing of the May 2026 Allianz partnership. Key-person risk around Joshua Motta is material—he is the public face and strategic architect of Active Insurance, and any CEO succession would carry disproportionate strategic risk for investors and partners alike.
    claimRefs:
      - CO009
      - CO010
      - CO011
