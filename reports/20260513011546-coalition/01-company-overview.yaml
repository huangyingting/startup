callouts:
  - calloutType: strength
    title: "Active Insurance Differentiator"
    body: "Coalition's dual identity as both licensed insurance carrier and technology risk management platform creates a structural moat that pure insurers and pure security vendors cannot easily replicate. The model demonstrably reduces claim frequency (73% fewer claims than industry average) and positions Coalition as the only cyber insurer whose incentives are directly aligned with preventing losses rather than simply paying them."
    claimRefs:
      - CO003
      - CO004
      - CO029
  - calloutType: strength
    title: "Allianz Global Partnership — Strategic Inflection Point"
    body: "The May 2026 announcement that Allianz will transition its entire standalone commercial cyber portfolio to Coalition—with a minimum 10-year term and equity alignment—represents a potential category-defining move. Coalition gains Allianz's global distribution scale, brand recognition, and balance sheet depth; Allianz gains Coalition's technology-driven underwriting and Active Insurance model. If executed successfully, this partnership could make Coalition the largest writer of commercial cyber insurance globally."
    claimRefs:
      - CO038
      - CO039
  - calloutType: risk
    title: "Profitability and Execution Risk"
    body: "Despite ~$800M raised and strong GWP growth, Coalition has not achieved sustained net profitability. The simultaneous execution of Allianz portfolio integration, international expansion, and technology platform investment creates significant management bandwidth risk. Employee feedback signals cultural and organizational scaling challenges."
    claimRefs:
      - CO033
      - CO040
      - CO041

