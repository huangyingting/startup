  - id: adverse-considerations
    title: Adverse Considerations & Risk Signals
    body: >
      Despite Coalition's strong market position and growth trajectory, diligence scrutiny surfaces several risk factors that merit close monitoring. The company has not achieved sustained profitability despite approximately $800M raised; while cash-flow positive status has been reported as of 2025, the combination of aggressive international expansion, significant R&D investment, and capital-intensive insurance underwriting creates persistent questions about the timeline to net income. Employee reviews on platforms such as Blind cite concerns about management clarity, career progression, executive direction, and high turnover—potential signals of organizational scaling friction during rapid growth. Cyber losses among policyholders remain elevated: Coalition's own 2025 Cyber Claims Report found that 60% of 2024 claims stemmed from business email compromise (BEC) or funds transfer fraud, and average ransomware demands remained at approximately $1.1M despite a 22% year-over-year decline. This data illustrates the fundamental limitation of Active Insurance in fully preventing sophisticated, fast-moving cyber attacks—the model reduces frequency and severity but cannot eliminate them. The business model also carries inherent key-person dependency on Joshua Motta as founder-CEO and strategic architect of the Active Insurance concept. Finally, the May 2026 Allianz partnership, while transformative in long-term market potential, introduces significant execution risk: integrating a major incumbent insurer's global commercial cyber book while simultaneously expanding into new markets could strain management bandwidth and operational capacity.
    claimRefs:
      - CO016
      - CO033
      - CO040
      - CO041
      - CO042

