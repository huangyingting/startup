  - id: funding-history-capital-structure
    title: Funding History & Capital Structure
    body: >
      Coalition has raised approximately $800M in venture equity across multiple rounds, achieving unicorn status with its June 2022 Series F. That round raised $250M led by Allianz X, with participation from Valor Equity Partners and Kinetic Partners alongside existing investors including Index Ventures, Ribbit Capital, T. Rowe Price, Durable Capital Partners, and Whale Rock Capital; the round increased Coalition's valuation from $3.5B to $5B. In October 2022, Coalition formed Ferian Re, an independent Bermuda-based Class 3B reinsurer capitalized with approximately $300M from BDT Capital Partners (with The Pritzker Organization as minority investor), providing dedicated reinsurance capacity alongside established program partners Allianz Group, Arch Insurance North America, and Swiss Re Corporate Solutions. In March 2025, Coalition received a $30M corporate minority equity investment from Mitsui Sumitomo Insurance Co. (MS&AD Insurance Group), deepening a global strategic partnership and reaffirming the $5B post-money valuation. The investor base spans fintech-focused VCs (Ribbit Capital, Index Ventures), growth equity firms (Valor Equity, T. Rowe Price, Durable Capital), and strategic corporate investors from global insurance (Allianz X, Mitsui Sumitomo)—providing patient capital, distribution network access, and industry validation across multiple continents. Ferian Re is treated as a separate reinsurance entity and is not included in the ~$800M equity raise figure.
    claimRefs:
      - CO017
      - CO018
      - CO019
      - CO020
      - CO021
      - CO022
