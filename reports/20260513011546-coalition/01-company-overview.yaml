  - id: scale-metrics-milestones
    title: Scale Metrics & Milestones
    body: >
      Coalition has achieved significant operational scale across policyholder count, premium volume, and geographic reach. By year-end 2022, the company protected 160,000+ policyholders with Active Insurance. Annualized gross written premium (GWP) exceeded $775M as of the June 2022 fundraise, with a reported nearly 200% year-over-year revenue growth rate at that time. Coalition's Active Insurance model delivers measurable policyholder outcomes: customers experience 73% fewer claims than industry average, the company has recovered $158M in stolen funds on behalf of policyholders, and 64% of closed claims are resolved with no out-of-pocket loss. Employee count stood at approximately 700–767 as of 2024 by third-party estimates. Key milestones include: the 2021 acquisition of Attune (an MGA and commercial insurance broker platform); the January 2023 launch of Coalition Insurance Company as a full-stack admitted carrier with an A- AM Best rating; the April 2025 launch of the redesigned Coalition Active Cyber Policy for US surplus lines; the November 2025 acquisition of Wirespeed (an automated managed detection and response platform using AI to triage threats in milliseconds); and the May 2026 announcement of the Allianz global commercial cyber portfolio transfer. As of 2025–2026, Coalition is cash-flow positive but has not yet achieved sustained net profitability, consistent with its aggressive international expansion posture.
    claimRefs:
      - CO026
