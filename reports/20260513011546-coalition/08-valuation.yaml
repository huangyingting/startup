  - id: section-comparables
    title: Comparable Set and Valuation Multiples
    body: |
      Coalition's valuation is best assessed against a hybrid comparable set: technology-enabled cyber insurers (primary comparables), traditional cyber insurance leaders (structural comps), and cybersecurity platform companies (multiple reference).

      Direct comparables in the private cyber insurer segment: At-Bay raised $200M at a $1.35B valuation in 2022 — approximately 1/4 of Coalition's mark at the time; Cowbell raised $100M Series C at a $1.5B valuation (2023); Resilience raised $100M Series D at an undisclosed valuation (2024). These comps suggest Coalition commands a material premium to direct cyber insurer peers, which is justified by Coalition's scale (10x+ policyholder count vs. At-Bay) and the Allianz validation.

      Traditional cyber insurance benchmarks: Beazley (LSE: BEZ), a leading global cyber insurer, trades at approximately £4-5B market cap with cyber insurance as a significant portion of its book. Beazley's GWP was approximately £5B in 2024 (all lines), implying a 0.8-1.0x GWP multiple — well below Coalition's implied 5-7x. However, Beazley is a traditional insurer without Coalition's technology platform, commanding lower multiples.

      Cybersecurity platform comps: CrowdStrike (NASDAQ: CRWD) trades at 15-20x revenue with a $70-80B market cap, reflecting its SaaS-like subscription model and market leadership. While not directly comparable (CrowdStrike is a pure cybersecurity platform without insurance), the premium multiple reflects the value of active protection plus data network effects — the same architectural thesis as Coalition. Coalition's insurance-anchored model limits its addressable multiple vs. pure SaaS but provides revenue predictability via GWP that pure SaaS lacks.

      M&A reference: Travelers acquired Corvus Insurance (cyber insurtech) in 2024 at an estimated $200-280M — consistent with a 1.5-2.5x GWP multiple for an early-stage cyber insurer without Coalition's scale or platform differentiation.

      Cross-reference inference: Coalition's defensible premium to direct cyber insurer comps is justified by scale and technology differentiation. A reasonable range for Coalition vs. Cowbell (1.5B at similar stage) is 3-5x premium based on policyholder count difference. Coalition's multiple relative to Beazley is explained by tech platform and growth trajectory. The 5-7x GWP multiple range is supportable as the central case, with risk-adjusted downside to 2-3x GWP.
