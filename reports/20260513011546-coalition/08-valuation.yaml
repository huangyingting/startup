chapter:
  number: 8
  title: Valuation
  summary: "Coalition is a conditional proceed at a verified current valuation. The 2022 Series F $5B mark is stale; no public evidence confirms or refutes the current carrying value. The investment thesis is supported by a structurally large and growing cyber insurance market, a differentiated Active Insurance model with self-reported outcome advantages, strategic validation via the Allianz global partnership, and 160,000+ policyholders. The anti-thesis is anchored by complete financial opacity (no revenue, loss ratio, or burn disclosed), systemic tail risks (correlated loss, war exclusion), reinsurance capacity tightening, and Allianz partner concentration. Base case valuation range: $4.5B–$6.5B with a bull/bear range of $2B–$12B depending on financial performance revelation. A final diligence package — reinsurance structure, loss ratio, renewal rates, and Allianz contract terms — is required before any investment commitment."

sections:
  - id: section-thesis-antithesis
    title: Investment Thesis and Anti-Thesis
    body: |
      The investment thesis for Coalition rests on four mutually reinforcing structural arguments. First, the global cyber insurance market is growing at 10-15% CAGR toward $30B+ by 2030, and Coalition has established itself as the leading technology-differentiated participant in the US SMB segment — the most underserved buyer cohort in the market. Second, Coalition's Active Insurance model creates compounding competitive advantages: more policyholders generate more data, which improves the risk model, which reduces claim frequency, which improves pricing accuracy and retention. Third, the May 2026 Allianz partnership — in which Allianz exclusively transfers its global commercial cyber portfolio to Coalition — is the strongest available third-party validation of Coalition's platform quality, providing 60,000+ enterprise policyholders, a global distribution channel, and a strategic moat in the enterprise segment. Fourth, the acquisition of Wirespeed ADR expands Coalition's value proposition into endpoint detection and response, creating an integration advantage against pure-play insurers.

      The anti-thesis is anchored by five material concerns. First, Coalition has disclosed no financial performance data post-Series F: revenue, loss ratio, combined ratio, burn rate, and profitability trajectory are all unknown. This creates a diligence leap of faith that is unusual for a company at a $5B valuation. Second, cyber insurance carries unique systemic risk: a single correlated cyber event could exhaust Coalition's reinsurance protection, creating a catastrophic loss scenario that cannot be quantified without reinsurance structure data. Third, the war exclusion legal framework is unsettled — if courts invalidate war exclusions in cyber policies, Coalition's carveout for state-actor attacks disappears. Fourth, AI-enabled BEC is accelerating the frequency and severity of the primary claims category (60% of Coalition's claims are BEC/FTF), threatening the 73% fewer claims advantage. Fifth, the Allianz partnership creates a single-partner concentration risk: if Allianz exits, Coalition loses potentially 30-50% of its GWP growth trajectory.

      The key question that determines whether the thesis dominates the anti-thesis is financial performance: if Coalition has achieved 80%+ combined ratio on its SMB book and is approaching break-even at scale, the thesis is compelling. If loss ratios are deteriorating and the company is burning capital, the anti-thesis becomes dominant.
