        title: $5B Vintage Mark Carries 2022 Peak Cycle Risk
        body: "The 2022 valuation mark was set at peak insurtech multiples during a cyber insurance hard market. Post-2022 macro conditions (rate compression, multiple compression, reinsurance tightening) all point toward a lower current clearing price."
        claimRefs:
          - CV014
