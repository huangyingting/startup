  claims:
    - id: CV001
      statement: "The global cyber insurance market is growing at 10-15% CAGR toward $30B+ by 2030, providing Coalition a large and expanding addressable market that supports sustained revenue growth even without competitive share gains."
      type: third-party-reported
      topic: market-growth-thesis
      freshness: current
      sourceRefs: [SV016, SV024, SV031]
      confidence: high
      answersQuestionRefs: [QV001]
    - id: CV002
      statement: "Coalition's Active Insurance model — combining insurance coverage with continuous ASM monitoring, automated underwriting, and 24/7 CIR — creates compounding competitive advantages through the Active Data Graph: more policyholders generate better risk data, which improves pricing accuracy, which enables more competitive offers."
      type: company-claimed
      topic: active-insurance-network-effect
      freshness: current
      sourceRefs: [SV032, SV019]
      confidence: high
      answersQuestionRefs: [QV001, QV002]
    - id: CV003
      statement: "The May 2026 Allianz exclusive global commercial cyber partnership — transferring Allianz's entire commercial cyber portfolio to Coalition's platform — is the strongest available third-party product validation and a major scale catalyst, adding 60,000+ enterprise policyholders."
      type: third-party-reported
      topic: allianz-thesis-catalyst
      freshness: current
      sourceRefs: [SV011, SV025, SV019]
      confidence: high
      answersQuestionRefs: [QV001, QV003]
    - id: CV004
      statement: "Coalition has disclosed no post-Series F financial data: revenue, combined ratio, loss ratio, burn rate, cash balance, and profitability trajectory are entirely unknown from public sources, creating an unbounded uncertainty range on financial performance."
      type: observed
      topic: financial-opacity-anti-thesis
      freshness: current
      sourceRefs: [SV013, SV021]
      confidence: high
      answersQuestionRefs: [QV004, QV005]
    - id: CV005
      statement: "AI-enabled BEC (deepfake audio/video, LLM-generated phishing) is escalating BEC/FTF attack sophistication and success rates, threatening Coalition's primary competitive metric: BEC/FTF already constitutes 60% of Coalition's claims, and frequency increases directly erode the claims advantage."
      type: third-party-reported
      topic: ai-bec-anti-thesis
      freshness: current
      sourceRefs: [SV023, SV016]
      confidence: high
      answersQuestionRefs: [QV006]
    - id: CV006
      statement: "The Wirespeed ADR acquisition (November 2025) deepens Coalition's technology moat by adding active endpoint detection and response to the platform, creating an upsell lever and strengthening the Active Insurance model against pure-play insurer competition."
      type: third-party-reported
      topic: wirespeed-moat-strengthening
      freshness: current
      sourceRefs: [SV028, SV029]
      confidence: medium
      answersQuestionRefs: [QV001, QV007]
    - id: CV007
      statement: "Based on publicly available evidence, Coalition merits a conditional proceed recommendation with medium confidence and medium-high risk rating; data room access is required before investment commitment."
      type: inferred
      topic: recommendation
      freshness: current
      sourceRefs: [SV013, SV015]
      confidence: medium
      answersQuestionRefs: [QV008]
    - id: CV008
      statement: "Coalition's GWP is estimated at $700M-$1B based on 100,000-160,000 policyholders at a blended average premium of $4,000-$7,000; at $700M base GWP and $5B valuation, the implied multiple is 7x GWP — the high end of what is supportable for a technology-differentiated cyber insurer."
      type: estimated
      topic: gwp-multiple-analysis
      freshness: current
      sourceRefs: [SV032, SV015]
      confidence: medium
      answersQuestionRefs: [QV009, QV010]
    - id: CV009
      statement: "A 5-7x GWP multiple is justifiable for Coalition given its technology differentiation, market leadership, and Allianz partnership; this range is above the 0.8-1.0x GWP of traditional carriers like Beazley, reflecting the platform premium."
      type: inferred
      topic: multiple-justification
      freshness: current
      sourceRefs: [SV008, SV015]
      confidence: medium
