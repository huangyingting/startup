  - id: section-valuation-context
    title: Valuation Context and Entry Discipline
    body: |
      Coalition's last disclosed primary financing was the $250 million Series F in February/June 2022 at a $5 billion post-money valuation. The Mitsui Sumitomo Insurance $30 million strategic investment in May 2025 was disclosed as a strategic investment, not a primary equity round, and did not include a valuation mark. No secondary market transactions or new equity rounds have been publicly disclosed since the Series F.

      The $5 billion valuation context: at the time of the Series F (mid-2022), leading insurtech companies were trading at 5-15x revenue, and private market multiples were at cyclical peaks. The global cyber insurance market was in a hard rate cycle with premiums increasing 50-100% year-over-year. Both factors supported elevated private valuations. Since 2022: (1) interest rates rose materially, compressing growth multiples; (2) public insurtech companies experienced multiple compression of 40-70% (e.g., Lemonade, Hippo); (3) cyber insurance premiums softened 15-25% in 2023-2024; (4) reinsurance costs increased. These factors suggest the $5B 2022 mark carries significant vintage risk.

      However, three developments since 2022 are positive for Coalition's valuation: (1) the Allianz exclusive global partnership (May 2026) is a major de-risking event that validates the technology platform and provides a clear path to enterprise scale; (2) the Wirespeed ADR acquisition expands the product moat; (3) the 160,000 policyholder count demonstrates continued SMB market growth. Whether these offset the macro multiple compression is the core valuation debate.

      Dilution and preference overhang: Coalition has raised ~$775M+ in primary equity funding across all rounds. At a $5B valuation, this implies significant dilution from early rounds. Liquidation preferences — common in late-stage VC investments — could create a waterfall structure where investors ahead of common stock receive disproportionate proceeds in sub-$5B exit scenarios. The cap table structure and preference stack are not publicly disclosed.

      Entry discipline principles for a new investment: (1) require data room access before committing; (2) anchor on current-year GWP multiple, not 2022 mark; (3) stress-test for reinsurance availability and war exclusion scenarios; (4) negotiate liquidation preference parity or cap; (5) require management financial guidance with variance bounds.
