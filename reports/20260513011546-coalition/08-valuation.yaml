  - id: section-exit-diligence
    title: Exit Readiness and Final Diligence Asks
    body: |
      Coalition is exit-ready in a bull scenario but faces several structural prerequisites for a liquidity event. For an IPO, Coalition would need to: (1) demonstrate two or more years of profitable underwriting with a disclosed combined ratio; (2) complete the Allianz enterprise integration and show loss ratio parity with the SMB book; (3) achieve $1B+ GWP run rate for market capitalization support at intended multiples; (4) resolve or hedge the war exclusion litigation risk; (5) establish sustainable reinsurance at defined attachment points. The probability of all five conditions being met within 36 months is moderate.

      For a strategic acquisition, the most likely acquirers are major P&C insurance companies (Travelers, Chubb, AXA, Zurich, Allianz itself), global reinsurers seeking primary market exposure (Munich Re, Swiss Re), and large cybersecurity platform companies seeking insurance distribution (CrowdStrike, Palo Alto Networks). The Allianz exclusive partnership may reduce the universe of willing acquirers — if the partnership includes exclusivity language that creates acquirer friction.

      Exit timeline: given the 2022 Series F date and typical VC fund life cycles, the primary Series F investors (including Allianz X as lead) would prefer a liquidity event by 2026-2028. The Allianz partnership, completed May 2026, could accelerate an M&A path with Allianz as acquirer, or serve as a strategic floor value signal to competing acquirers.

      The final diligence package that must be reviewed before investment commitment consists of six items, in order of criticality: (1) reinsurance treaty structure; (2) loss ratio by cohort (SMB vs. Allianz enterprise); (3) annual renewal rate and GRR; (4) current-year GWP and revenue trajectory; (5) Allianz partnership contractual terms (exclusivity, exit, revenue share); (6) NYDFS Part 500 annual certification filing status.

      Thesis-break triggers: the five triggers identified in Chapter 7 apply equally here. In addition, if management confirms that the combined ratio has exceeded 100% for any trailing 12-month period, the financial risk profile escalates significantly. Any adverse NYDFS enforcement action or failure to renew the reinsurance treaty at current terms would represent immediate thesis-break events.
