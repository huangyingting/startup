  evidenceGaps:
    - id: GV001
      title: "Coalition GWP and Financial Performance Entirely Undisclosed"
      description: "Coalition has disclosed no current-year GWP, revenue, loss ratio, combined ratio, or cash flow data. This is the single most material gap in the valuation analysis: without financial data, the GWP multiple cannot be verified, the bull/bear/base distinction cannot be made, and the $5B Series F mark cannot be validated against current performance."
      topic: "Current GWP, revenue, loss ratio, combined ratio, and financial trajectory"
      relatedClaimRefs: [CV004, CV041]
      relatedQuestionRefs: []
      severity: high
    - id: GV002
      title: "Comparable Valuation Data Quality Limited by Private Market Opacity"
      description: "The most directly comparable private cyber insurers (At-Bay, Resilience, Cowbell) all carry 2022-2024 vintage valuations that may not reflect current multiples. Resilience's Series D valuation is undisclosed. The comparable set is therefore limited in its ability to anchor Coalition's current clearing price."
      topic: "Current-vintage comparable valuations for private cyber insurer peers"
      relatedClaimRefs: [CV027, CV025, CV026]
      relatedQuestionRefs: []
      relatedTableRefs: [TV004]
      severity: medium
    - id: GV003
      title: "Preference Stack and Cap Table Not Disclosed"
      description: "With $750M+ in equity raised, Coalition's liquidation preference stack could materially impact returns to common equity in sub-$5B exit scenarios. The preference terms, participation rights, and anti-dilution provisions from the Series F and prior rounds are not publicly disclosed."
      topic: "Liquidation preferences, participation rights, and cap table structure"
      relatedClaimRefs: [CV017, CV039]
      relatedQuestionRefs: []
      severity: medium
    - id: GV004
      title: "IPO / Exit Timeline and Conditions Not Signaled"
      description: "Coalition has made no public statements about IPO plans, exit timeline, or liquidity preferences. The Series F investor fund lifecycle suggests a 2026-2028 preference, but no formal signal has been given. The Allianz partnership terms (including any change-of-control restrictions) may affect the acquirer universe."
