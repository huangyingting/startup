  - id: section-scenarios
    title: Bull, Base, and Bear Scenarios
    body: |
      Valuation scenarios are constructed based on GWP estimates, loss ratio assumptions, and applicable valuation multiples for insurance and insurtech companies at analogous scale and stage.

      **GWP Estimate Basis:** 100,000-160,000 policyholders × blended average premium of $4,000-$7,000 per year = $400M-$1.1B GWP range. The wide range reflects uncertainty about enterprise vs. SMB mix and average premium differences. Base case: $700M GWP.

      **Bull Case ($8B-$12B valuation, 3-5 year horizon):**
      - Assumptions: Allianz enterprise book adds $300M+ GWP and proves durable; combined ratio achieves 85%; Coalition achieves $1.2B GWP by year 3; Wirespeed ADR creates $50M+ ARR from premium tier; reinsurance structure stable; IPO window opens at 10x GWP.
      - Exit path: IPO at 10-12x GWP ($12-14B) or strategic acquisition by a major P&C carrier (Travelers, Chubb, AXA) at 8-10x GWP.
      - Probability signal: requires all five of Allianz durable, strong financials, favorable reinsurance, war exclusion risk contained, and IPO market opening.

      **Base Case ($4.5B-$6.5B valuation, 3-5 year horizon):**
      - Assumptions: Allianz book moderately accretive; combined ratio 90-95%; GWP grows to $850M; premium platform generates moderate upsell; reinsurance mildly tightens; IPO at 6-8x GWP.
      - Exit path: IPO at 6-8x GWP ($5-7B) or late-stage secondary/structured exit.
      - Probability signal: requires continued SMB market leadership, stable loss ratio, and stable Allianz relationship.

      **Bear Case ($1.5B-$3B valuation):**
      - Assumptions: Allianz exits or underdelivers; loss ratio deteriorates to 75%+; reinsurance costs increase materially; AI-BEC acceleration erodes claims advantage; down-round or distressed sale at 2-3x GWP.
      - Exit path: strategic acquisition at 2-3x GWP ($1.4B-$2.1B) or IPO at depressed multiples.
      - Probability signal: triggered by any two of war exclusion ruling, Allianz exit, loss ratio deterioration, and reinsurance non-renewal.

      The key valuation pivot point is the loss ratio on the Allianz enterprise book: if enterprise accounts have higher loss ratios than the SMB book (as expected, given less precise risk scoring), the combined ratio will rise and multiples will compress accordingly.
