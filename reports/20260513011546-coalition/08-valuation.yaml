        body: "Beazley trades at ~1x GWP. Coalition's 5-7x GWP multiple requires sustained technology and growth premium maintenance. If Coalition is perceived as primarily an insurer (not a platform), multiples could compress to 1-3x GWP."
        claimRefs:
