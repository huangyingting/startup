        title: Coalition Commands a Justified Premium to Direct Cyber Insurer Peers
        body: "Coalition's 3-5x premium to At-Bay and Cowbell is defensible based on 10x policyholder count, technology platform depth, and Allianz global distribution validation — all absent from smaller cyber insurer comps."
        claimRefs:
