chapter:
  number: 7
  title: Risks
  summary: "Coalition faces five interlocking risk vectors. The highest-severity threat is correlated systemic cyber loss: a single nation-state or criminal campaign targeting thousands of Coalition policyholders simultaneously could generate aggregate claims exceeding reinsurance capacity. Reinsurance market tightening (Lloyd's, Swiss Re, Munich Re all reducing cyber capacity) threatens Coalition's capital model and loss-transfer architecture. War-exclusion litigation (Merck precedent under appeal risk) could invalidate Coalition's primary policy carveout for state-actor cyberattacks. Regulatory fragmentation across 8 countries with different licensing, data protection, and coverage requirements adds operational complexity. Key operational risks include Coalition's own platform security, underwriting model calibration for novel threats, and CIR capacity at 160,000+ policyholder scale. Financial risks include undisclosed burn rate, premium adequacy vs. evolving ransomware, and the Allianz partner concentration. Mitigations exist but several are structural and unverifiable without management access."

sections:
  - id: section-risk-overview
    title: Risk Landscape Overview and Severity Ranking
    body: |
      Coalition's risk profile is shaped by the inherent characteristics of the cyber insurance business: policy risk is correlated (a single attack can trigger hundreds of simultaneous claims), the threat environment is adversarially evolving (attackers adapt specifically to defeat defenses), and the regulatory environment is fragmented across jurisdictions with inconsistent frameworks. These structural features create risks materially different from property-casualty or general liability insurance.

      The five primary risk vectors in descending severity are: (1) correlated systemic cyber loss event — low-probability, catastrophic-impact; (2) reinsurance market unavailability — medium-probability, high-impact; (3) war exclusion litigation invalidation — low-probability, critical-impact on policy enforceability; (4) underwriting model failure from novel threat patterns — medium-probability, high-impact; (5) Allianz partnership concentration — medium-probability, high revenue impact.

      All five risks interact: a correlated loss event could simultaneously stress the reinsurance tower, trigger war exclusion litigation if the event has state-actor attribution, and potentially breach the Allianz revenue guarantee. Coalition's risk architecture is therefore not additive but multiplicative under tail scenarios.

      Investment-implication: the risk profile supports investment if (a) the reinsurance structure is verified as stable and well-capitalized, (b) the underwriting model is validated against out-of-sample threat data, (c) loss ratios demonstrate stability over multiple claim years, and (d) the Allianz partnership terms include sufficient exit protection. Without management data room access, these conditions cannot be fully verified.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
    callouts:
      - calloutType: risk
        title: Risks Are Correlated, Not Independent
        body: "Cyber risk correlation means that Coalition's five major risk vectors can compound simultaneously. A state-sponsored attack causing mass policyholder loss could trigger war exclusion disputes, stress reinsurance treaties, and damage the Allianz relationship simultaneously."
        claimRefs:
          - CR001
          - CR003
