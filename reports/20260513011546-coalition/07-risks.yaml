  - id: section-partner-dependency
    title: Partner and Dependency Risks
    body: |
      Coalition's revenue and customer scale are increasingly dependent on a small number of strategic partnerships and critical infrastructure providers. These dependencies create concentration risks that are materially different from organic SMB distribution.

      Allianz partnership concentration: following the May 2026 portfolio transfer, Coalition's insured count grew from 100,000 to 160,000+ policyholders. If the Allianz relationship contributes 60,000 policyholders and they represent a disproportionate share of premium (enterprise accounts typically carry higher limits and premiums), Allianz-originated revenue could represent 30-50% of Coalition's total GWP. The partnership terms — exclusivity period, minimum volume commitments, exit provisions — are not publicly disclosed. If Allianz exits or restructures the partnership, Coalition loses both the policyholder count and the distribution channel for future enterprise accounts.

      Reinsurance market access: Coalition is a primary insurer, not a final risk-bearer. Coalition transfers a significant portion of its premium risk to reinsurers (Swiss Re, Munich Re, Lloyd's syndicates). As the cyber reinsurance market has hardened, capacity is contracting: Lloyd's mandated war exclusion changes in 2023 reflect reinsurers' growing discomfort with uncapped cyber exposure. If reinsurers reduce capacity available to Coalition, Coalition's ability to write new business or renew existing accounts at competitive prices is constrained. A reinsurance treaty repricing at annual renewal could compress Coalition's margins materially without offsetting premium rate increases.

      Cloud infrastructure dependency: Coalition Control and the underlying ASM data infrastructure are cloud-hosted (likely AWS or GCP). A significant outage or service degradation at the cloud provider would interrupt Coalition's real-time monitoring capabilities, potentially voiding the "active" component of Active Insurance during the outage window and creating policy coverage disputes.

      Threat intelligence data providers: Coalition's risk scoring depends on third-party data feeds — Shodan and Censys for external attack surface data, VirusTotal/OSINT feeds for dark web exposure, and threat intelligence feeds. If these data providers change their API terms, raise prices, or experience data quality degradation, Coalition's underwriting model accuracy declines.

      Mitsui Sumitomo Insurance dependency: the $30M strategic investment creates a partnership expectation for Japan/APAC distribution. If the Mitsui relationship does not generate expected business volume, the strategic rationale for the investment weakens, potentially creating tension around the investment terms.
