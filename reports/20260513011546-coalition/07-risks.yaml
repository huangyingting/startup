  - id: section-financial-model
    title: Financial and Business Model Risks
    body: |
      Coalition's financial model relies on three core assumptions: (1) its underwriting model accurately prices cyber risk; (2) its Active Insurance model reduces claims frequency sufficiently to support favorable loss ratios; and (3) the reinsurance market remains accessible and affordable. All three assumptions face structural headwinds in 2026.

      Loss ratio risk: Coalition has reported 73% fewer claims than industry average. However, this metric is company-reported and unaudited. If the differential is partially attributable to favorable self-selection (Coalition's underwriting filter selects lower-risk businesses) rather than platform effects, then as Coalition grows and underwrites less-selective segments (including Allianz enterprise accounts, which may not have gone through Coalition's traditional risk-scoring filter), the loss ratio advantage may narrow. A loss ratio deterioration from 50-60% to 70-80% (industry median) would materially compress margins.

      Ransomware re-escalation: the 2024 cyber market saw a resurgence in ransomware activity following a brief lull. Verizon DBIR 2025 showed ransomware in 92% of industries. AI-enabled phishing (deepfake audio/video for BEC) is substantially increasing BEC claim frequency. If BEC/FTF (already 60% of Coalition's claims) accelerates in frequency or severity, loss ratios deteriorate without offsetting premium increases.

      Premium adequacy: cyber insurance premiums softened in 2023-2024 after the 2021-2022 hardening. If premiums remain soft while claims severity increases (ransomware payments growing 50-100% year-over-year in some segments), underwriting profitability at Coalition deteriorates. Coalition has not disclosed its combined ratio or expense ratio, making premium adequacy assessment impossible from public data.

      Capital adequacy: CIC as an admitted carrier is subject to state minimum capital requirements. As Coalition's GWP grows, so do required surplus levels. If Coalition's growth requires capital injections beyond existing investor capacity, a dilutive capital raise or debt issuance becomes necessary. Coalition's last disclosed raise was the $5B valuation Series F (2022); the post-Series F financial trajectory is not publicly disclosed.

      Burn rate and profitability: Coalition has not disclosed revenue, EBITDA, net loss, or cash burn in any public filing. The company's financial health — whether it is cash-flow positive, break-even, or burning capital — is unknown. As a private company, this is expected, but it is a diligence-critical gap for any investor. The Mitsui $30M investment (May 2025) and the Allianz partnership (May 2026) are both positive signals, but neither confirms profitability.

      FX and international capital risk: operating in 8 currencies creates FX exposure in premium collection, claims settlement, and regulatory capital requirements. An adverse USD strengthening could reduce the GBP/EUR/AUD equivalent of international GWP.
