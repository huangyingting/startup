  claims:
    - id: CR001
      statement: "Coalition's cyber insurance business model is exposed to five interlocking risk vectors: correlated systemic loss, reinsurance capacity tightening, war exclusion litigation, underwriting model failure, and Allianz partnership concentration."
      type: inferred
      topic: risk-landscape-overview
      freshness: current
      sourceRefs: [SR008, SR009, SR010]
      confidence: high
      answersQuestionRefs: [QR001]
    - id: CR002
      statement: "Cyber insurance risks are correlated and multiplicative, not independent: a nation-state cyberattack can simultaneously trigger correlated claims, war exclusion disputes, and reinsurance exhaustion in a single event."
      type: inferred
      topic: risk-correlation
      freshness: current
      sourceRefs: [SR008, SR013, SR003]
      confidence: high
      answersQuestionRefs: [QR002]
    - id: CR003
      statement: "Under tail scenarios, a correlated systemic cyber event — similar to NotPetya or SolarWinds but broader in scope — could trigger aggregate claims exceeding Coalition's reinsurance protection, posing an existential capital risk."
      type: inferred
      topic: systemic-loss-risk
      freshness: current
      sourceRefs: [SR008, SR009, SR011]
      confidence: high
      answersQuestionRefs: [QR003]
    - id: CR004
      statement: "The 73% fewer claims metric is the primary proxy for Coalition's risk model effectiveness, but it is company-reported, unaudited, and could deteriorate if novel threat vectors not in the training data (AI-BEC, deepfake fraud, supply chain attacks) become dominant."
      type: inferred
