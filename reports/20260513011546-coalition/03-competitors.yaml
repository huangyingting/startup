      summary: "Financial data for Coalition, At-Bay, Cowbell, Corvus, and Resilience is largely unavailable because all are private companies. Coalition's GWP (~$775M est.) and policyholder count (~110k active) are derived from reinsurance market data, not audited financial statements. Cowbell's path to profitability and Coalition's net premium retention cannot be assessed without confidential financial disclosures."
      severity: material
      relatedQuestionRefs: [QP021, QP022]

    - type: private-evidence-only
      summary: "Travelers has not publicly disclosed the confirmed deal value for its Corvus acquisition beyond the definitive agreement announcement. The reported ~$435M figure is widely cited in industry coverage but not confirmed in Travelers' public filings as a separately disclosed line item. Corvus integration progress and contribution to Travelers' cyber book are not publicly reported."
      severity: minor
      relatedQuestionRefs: [QP023]

    - type: private-evidence-only
      summary: "Coalition has not published Coalition Control platform engagement metrics (active user rates, feature utilization, alert response rates). The claim that the platform reduces claims by 73% is self-reported with actuarial basis disclosed but not independently audited. Renewal rate (89%) is cited via AM Best rating rationale but not independently confirmed."
      severity: material
      relatedQuestionRefs: [QP011, QP024]

    - type: enumeration-incomplete
      summary: "The competitor profile table (TP001), feature/capability matrix (TP002), and pricing comparison (TP003) cover eight of the most significant players but omit smaller cyber MGAs (Paladin Cyber, Trium Cyber), regional insurers with niche cyber books, and international competitors (Hiscox UK, Munich Re cyber direct). Market share data for individual carriers is not publicly available from NAIC in disaggregated form."
