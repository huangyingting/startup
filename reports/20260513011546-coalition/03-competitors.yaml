  - id: incumbent-carriers
    title: "Incumbent Specialty Carriers"
    body: |
      Incumbent carriers compete on financial strength, breadth of coverage, global distribution, and brand reputation rather than technology differentiation. Their cyber products are largely reactive (post-breach response) rather than proactive (pre-breach prevention).

      Beazley PLC is a leading Lloyd's-based specialty insurer. Its Beazley Breach Response (BBR) product provides post-incident services (legal, forensic, PR, notification) and Beazley has an established position in professional liability, healthcare, and financial institutions cyber. Unlike Coalition, Beazley does not offer continuous pre-breach monitoring. Beazley's strength lies in its Lloyd's syndicate structure (global paper, flexible capacity), deep broker relationships, and recognized brand in specialty markets.

      Chubb Limited, the world's largest publicly traded P&C insurer with global operations across 54 countries, offers Cyber Enterprise Risk Management targeting medium-to-large enterprises. Chubb's competitive advantage is its Chubb Studio embedded distribution and white-glove enterprise client relationships -- it lacks Coalition's active monitoring stack.

      AXA XL, the P&C and specialty risk division of AXA Group, provides cyber liability coverage for large enterprises leveraging AXA's global balance sheet. AXA XL competes at the enterprise tier where Coalition is expanding via the Allianz partnership.

      Zurich North America distributes modular multi-line coverage via the Cowbell Select Plus partnership (launched June 2025), signaling that even traditional multi-line carriers see value in the InsurTech distribution layer.
