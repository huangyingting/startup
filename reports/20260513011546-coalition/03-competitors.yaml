  claims:
    - id: CP001
      statement: "The cyber insurance competitive landscape divides into two tiers: (1) technology-native InsurTech MGAs (Coalition, At-Bay, Cowbell, Corvus/Travelers, Resilience) that integrate active monitoring with coverage, and (2) incumbent specialty carriers (Beazley, Chubb, AXA XL, Zurich) that compete on financial strength and broker relationships."
      type: third-party-reported
      topic: market-structure
      sourceRefs: [SP004, SP018]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP001]

    - id: CP002
      statement: "Coalition is the largest technology-native cyber insurer by policyholder count, with approximately 110,000 active policyholders and an estimated $775M annualized GWP in 2025, as reported via reinsurance market data and company disclosures."
      type: third-party-reported
      topic: coalition-scale
      sourceRefs: [SP004, SP019]
      confidence: medium
      freshness: current

    - id: CP003
      statement: "The US cyber insurance market is served by 700+ admitted and surplus lines insurers per NAIC 2024 data, with a fragmented distribution where no single carrier commands more than an estimated 15-20% of the $9.14B domestic DWP market."
      type: inferred
      topic: market-structure
      sourceRefs: [SP018]
      confidence: medium
      freshness: recent

    - id: CP004
      statement: "InsurTech MGAs (Coalition, At-Bay, Cowbell, Resilience) collectively represent an estimated $2-3 billion of the $9.14 billion US domestic cyber insurance DWP market in 2024 -- roughly 22-33% -- with incumbents controlling the remaining majority."
      type: estimated
      topic: insurtech-share
      sourceRefs: [SP018, SP004]
      confidence: medium
      freshness: recent

    - id: CP005
      statement: "The defining competitive differentiation between tech-native InsurTech MGAs and incumbents is the integration of pre-breach active risk monitoring with insurance coverage -- a model pioneered by Coalition in 2017 and replicated by At-Bay (InsurSec) by 2021."
      type: observed
      topic: differentiation-basis
      sourceRefs: [SP007, SP001]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP006
      statement: "Travelers' completion of its acquisition of Corvus Insurance in January 2024 demonstrated that incumbent carriers are acquiring InsurTech AI underwriting capability rather than building it organically, with Corvus now integrated into Travelers' commercial cyber product line."
      type: third-party-reported
      topic: market-consolidation
      sourceRefs: [SP010, SP016]
      confidence: high
      freshness: recent
      answersQuestionRefs: [QP004]

    - id: CP007
      statement: "Rate softening of 22% cumulative from the 2022 peak (Howden Re 2025) has reduced the pricing premium that tech-native cyber insurers could command over incumbents, shifting competitive differentiation from price to demonstrable loss prevention."
      type: third-party-reported
      topic: rate-environment
      sourceRefs: [SP024, SP023]
      confidence: high
      freshness: recent
      answersQuestionRefs: [QP013]

    - id: CP008
      statement: "The global cyber insurance market is served by a mix of Lloyd's syndicates (Beazley, Hiscox), global carriers (Chubb, AXA XL, AIG), reinsurance-backed InsurTech MGAs (Coalition, At-Bay), and AI-underwriting MGAs (Cowbell, Corvus/Travelers) -- each model representing a different capital structure and competitive playbook."
      type: third-party-reported
      topic: market-structure
      sourceRefs: [SP012, SP018]
      confidence: medium
      freshness: current

    - id: CP009
      statement: "At-Bay (Mountain View, CA; founded 2016) raised $295.75M across 8 funding rounds, including a $185M Series D that valued the company at $1.35 billion in July 2021, making it a unicorn and Coalition's most well-capitalized direct InsurTech peer."
      type: third-party-reported
      topic: competitor-scale
      sourceRefs: [SP002, SP014]
      confidence: medium
      freshness: historical
      answersQuestionRefs: [QP002]

    - id: CP010
      statement: "At-Bay's InsurSec model combines cyber insurance with the Stance security platform (MDR, vulnerability scanning, dark web monitoring, vCISO services), directly mirroring Coalition's Active Insurance concept and targeting the same SMB and mid-market insurance buyers."
      type: observed
      topic: at-bay-model
      sourceRefs: [SP001, SP014]
      confidence: high
      freshness: current
      answersQuestionRefs: [QP005]

    - id: CP011
      statement: "At-Bay reported 40,000+ policyholders and $60 billion in risk under management as of 2025, compared to Coalition's approximately 110,000 active policyholders -- meaning At-Bay trails Coalition by approximately 2.5-3x in policyholder count but is growing and has closed the feature gap significantly."
      type: third-party-reported
      topic: competitor-scale
      sourceRefs: [SP001, SP002]
      confidence: medium
      freshness: current
      answersQuestionRefs: [QP002]

    - id: CP012
      statement: "At-Bay acquired At-Bay Specialty Insurance Company (an excess and surplus lines P&C carrier) in January 2023, giving it admitted-equivalent paper capability and eliminating a prior carrier ownership gap vs. Coalition's CIC -- making the two companies structurally more similar in their insurance model."
      type: third-party-reported
      topic: at-bay-carrier
      sourceRefs: [SP014, SP002]
      confidence: medium
      freshness: historical
      answersQuestionRefs: [QP008]

    - id: CP013
      statement: "Cowbell (Pleasanton, CA; founded 2019) raised $208.3M across 5 funding rounds from 16 investors, targeting small and medium-sized enterprises with AI-driven risk scoring via its Cowbell Factor methodology, positioning itself as a pure-play SME cyber insurance provider."
      type: third-party-reported
      topic: competitor-scale
      sourceRefs: [SP003, SP017]
      confidence: medium
      freshness: recent
      answersQuestionRefs: [QP003]

    - id: CP014
      statement: "In June 2025, Cowbell and Zurich North America launched Zurich Select Plus, a modular multi-line insurance product available through the E&S channel, signaling Cowbell's strategy to leverage incumbent carrier distribution and diversify beyond pure cyber MGA operations."
      type: third-party-reported
