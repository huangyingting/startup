    callouts:
      - calloutType: strength
        title: Wirespeed Integration Advances Prevention-Before-Coverage Model
        body: "Sub-2-second automated threat containment embedded with insurance coverage is a product milestone that no traditional carrier has achieved, positioning Coalition at the frontier of prevention-first insurance."
        claimRefs:
          - CE022
          - CE023
      - calloutType: risk
        title: Roadmap Opacity Limits Forward Diligence
        body: "Coalition has not published a multi-year product roadmap. Key questions about planned data partnerships, AI model governance, geographic expansion, and platform monetization remain unanswerable from public sources."
        claimRefs:
