company:
  name: Coalition
chapter:
  number: 5
  title: Product & Technology
  summary: "Coalition's Active Insurance platform integrates cyber insurance with Coalition Control (SaaS, free to policyholders), Wirespeed ADR (automated MDR, sub-2s verdict, probabilistic AI), and Coalition Incident Response (DFIR affiliate). The Active Data Graph — combining attack surface telemetry, claims data from 100,000+ policyholders, and threat intelligence — is the core proprietary data layer. The April 2025 Active Cyber Policy added 11 embedded coverages including Affirmative AI. Key diligence gaps: no SOC 2 attestation for Coalition Control, undisclosed AI model governance, unverified Wirespeed integration depth, and no public roadmap. The platform is available in 8 markets globally."

sections:
  - id: section-product-modules
    title: Product Modules & Active Insurance Platform
    body: |
      Coalition delivers what it calls Active Insurance — an integrated platform that bundles cyber insurance coverage with continuous security tooling, incident response, and threat intelligence. This stands in contrast to traditional cyber insurers who issue policies without real-time security engagement. The commercial proposition centers on a feedback loop: security data improves underwriting precision, lower-risk policyholders pay less, and claims data sharpens security alerting.

      The flagship non-insurance module, Coalition Control, is a SaaS security platform provided to all policyholders at no additional charge. Control performs continuous external attack surface monitoring, generates a dynamic Cyber Health Rating, manages third-party vendor risk, provides compliance evidence collection (mapped to NIST SP 800-53, SOC 2 Type II, CIS v8.1), and issues zero-day vulnerability alerts with remediation guidance. Premium Control features include Wirespeed Automated Detection and Response (ADR), Employee Security Awareness Training, and Managed Email Security.

      The insurance product has evolved significantly. As of April 2025, Coalition launched the Active Cyber Policy, a redesigned surplus-lines cyber offering with eleven previously endorsement-only coverages now embedded as base Insuring Agreements. The policy includes Vanishing Retention (claim-free year incentive), reduced retention for early Funds Transfer Fraud reporting, Affirmative AI Coverage (including deepfake fraud), and Any One Claim Coverage. Available to organizations with up to $5 billion in annual revenue, with limits up to $15 million.

      Coalition Incident Response (CIR), operating as Coalition Security (a separate Coalition affiliate), provides Digital Forensics and Incident Response (DFIR) services. Post-acquisition of Wirespeed, CIR now offers Automated Detection and Response (ADR) with a median time to verdict of 1,801 milliseconds, leveraging probabilistic AI and ISO 2859 quality standards.
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE004
      - CE005
      - CE006
      - CE007
    callouts:
      - calloutType: strength
        title: Integrated Platform Creates Structural Differentiation
        body: "Coalition Control bundled free with every policy creates a competitive advantage that pure-play insurance carriers structurally cannot replicate without significant technology investment."
        claimRefs:
          - CE001
          - CE002
      - calloutType: insight
        title: Active Cyber Policy Signals Underwriting Maturity
        body: "Embedding eleven coverage enhancements into the base policy rather than endorsements reduces broker friction and signals underwriting confidence derived from loss-experience data."
        claimRefs:
          - CE003
          - CE004
    tableRefs: [TE001, TE002]
    figureRefs: [FE001, FE002]

  - id: section-tech-architecture
    title: Technology Architecture & Active Data Graph
    body: |
      Coalition's technology architecture revolves around what the company calls the Active Data Graph — a proprietary data layer that combines external attack surface telemetry, cyber claims outcomes, and threat intelligence signals. This unified data model is used for three purposes: (1) dynamic risk scoring for insurance underwriting, (2) real-time alerting delivered through Coalition Control, and (3) model calibration for Wirespeed's automated threat detection.

      The attack surface monitoring engine performs continuous external scanning of policyholder domains, IP ranges, and cloud assets, identifying exposed services, misconfigured systems, and known-vulnerable software versions. This scanning capability underpins the Cyber Health Rating score visible to policyholders in Control.

      The Wirespeed ADR engine uses a conditional logic algorithm with probabilistic AI to triage threat detections. The platform operates at millisecond resolution, achieving a median time to verdict of 1,801 milliseconds and delivering decisions through ChatOps integrations — Slack, Microsoft Teams, email, and SMS. The 99.99% noise reduction in alerts is attributed to automated triage eliminating false positives and reducing analyst fatigue. Wirespeed's architecture adheres to ISO 2859, the internationally recognized Acceptable Quality Limit standard.

      Control integrates with existing security tooling via documented integration connectors, including Microsoft Defender and SentinelOne, enabling visibility into security posture from within Coalition's platform without requiring tool replacement.

      Coalition's technology organization is led by Chief Technology Officer Maha Virudhagiri and Chief Product Officer Frank Fumarola. The engineering team is augmented by Wirespeed co-founders Tim MalcomVetter (GM, Coalition Security) and Jake Reynolds (Head of Engineering, Coalition Security).
    claimRefs:
      - CE011
      - CE012
      - CE013
      - CE014
      - CE015
      - CE016
      - CE017
    callouts:
      - calloutType: strength
        title: Active Data Graph Creates Compounding Data Moat
        body: "Each claim filed enriches the risk model; each alert issued generates feedback. With 100,000+ policyholders' data, Coalition's model improves with scale in a way that point-in-time underwriters cannot replicate."
        claimRefs:
          - CE011
          - CE012
      - calloutType: risk
        title: Proprietary Architecture Lacks Public Technical Validation
        body: "Coalition does not publish technical architecture documentation, security certifications, or external audit reports. Diligence cannot independently verify the reliability, accuracy, or security of the Active Data Graph."
        claimRefs:
          - CE030
          - CE031
    tableRefs: [TE003]
    figureRefs: [FE003]

  - id: section-trust-compliance
    title: Trust, Security & Compliance
    body: |
      Coalition's product carries multiple layers of trust and compliance requirements. As a licensed insurer across eight countries, Coalition Insurance Company (CIC) is subject to state and national insurance regulatory oversight, which imposes solvency, reserving, and consumer protection requirements.

      Coalition Control's security features include compliance checklist generation mapped to major frameworks — NIST SP 800-53, SOC 2 Type II, and CIS v8.1 — allowing policyholders to use Control for dual-purpose risk management and compliance evidence collection. This reduces the cost of compliance for SMBs, a meaningful differentiator for the target market.

      The Wirespeed platform's ISO 2859 adherence provides a process-level quality standard for threat detection consistency, though this is an internal quality standard, not an independent security audit.

      Coalition has not publicly disclosed SOC 2 attestation for its own platform, third-party penetration test results, or bug bounty program details. For an enterprise selling security products, the absence of public third-party security attestation is a notable gap. Coalition Control processes sensitive customer security posture data, which creates privacy and data custody obligations — privacy policy and data processing agreements exist but are not published in full.

      Coalition's Active Cyber Policy includes Affirmative AI Coverage, covering AI-related threats including deepfake-enabled fraud, which is a leading-edge coverage feature that few market peers match as of 2026.
    claimRefs:
      - CE018
      - CE019
      - CE020
      - CE021
      - CE026
      - CE030
      - CE031
    callouts:
      - calloutType: strength
        title: Multi-Framework Compliance Checklists Serve Dual Value
        body: "Control's support for NIST SP 800-53, SOC 2 Type II, and CIS v8.1 enables policyholders to use it as a compliance tool, increasing platform stickiness and reducing churn."
        claimRefs:
          - CE018
          - CE019
      - calloutType: risk
        title: Coalition Does Not Publish Platform Security Attestations
        body: "Coalition does not publish a SOC 2 attestation for Coalition Control, penetration test results, or a bug bounty scope. For a platform processing sensitive SMB security data, this gap warrants independent diligence."
        claimRefs:
          - CE030
          - CE031
    tableRefs: [TE004]
    figureRefs: [FE004]

  - id: section-roadmap
    title: Roadmap & Development Pipeline
    body: |
      Coalition's publicly disclosed product roadmap is sparse — consistent with its private company status and competitive positioning. However, observable signals indicate several active development threads.

      The Wirespeed integration (acquired November 2025) represents the most significant near-term engineering initiative: merging Wirespeed's ADR into the Active Data Graph, enabling automated threat containment to inform real-time coverage decisions. This integration is described as live at launch, suggesting initial integration is complete but deeper fusion is ongoing.

      The Active Cyber Policy launch (April 2025) demonstrates cadenced insurance product development. The addition of Affirmative AI Coverage and Any One Claim Coverage suggests an underwriting team actively tracking emerging threat vectors and policy design.

      Coalition's April 2026 blog update on Enhanced Business Recovery announced a suite of endorsements designed to protect revenue, speed up settlements, and keep businesses running during claims. This indicates post-claims product expansion beyond pure prevention. The Risky Tech Ranking Q1 2026 update shows continued investment in threat intelligence publishing, which serves as both a marketing signal and a data-collection mechanism.

      The international expansion trajectory (8 markets) suggests continued geographic distribution investment. Coalition has not disclosed plans for consumer lines, D&O/E&O expansion, or vertically specialized cyber products.
    claimRefs:
      - CE022
      - CE023
      - CE024
      - CE025
