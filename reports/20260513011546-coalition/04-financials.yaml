      statement: "Coalition Control, the cyber risk management platform providing vulnerability scanning, threat alerts, and security posture monitoring, is provided free-of-charge to all Coalition policyholders as a benefit bundled into the insurance premium; no standalone SaaS revenue is generated or disclosed."
