  - id: cost-structure-and-capital-adequacy
    title: "Cost Structure and Capital Adequacy"
    body: |
      Coalition's primary operating cost drivers are: (1) broker commissions (~10–15% of GWP), (2) reinsurance cession premiums to Ferian Re and program partners, (3) technology platform and infrastructure costs for Coalition Control and the Active Data Graph, (4) Coalition Incident Response labor and subcontractor costs, and (5) overhead for approximately 726 employees as of March 2026. Unlike software companies or hardware-intensive businesses, Coalition carries minimal physical capex and no inventory, making its capital intensity relatively low by technology standards — though the regulatory capital requirements for CIC (as an admitted insurance carrier) represent a distinct form of capital commitment.

      Coalition has raised approximately $800M in total equity across nine disclosed funding rounds from 2017 through March 2025. The most recent was a $30M strategic investment from Mitsui Sumitomo Insurance, which reaffirmed the $5B post-money valuation. Ferian Re (~$300M, BDT Capital-backed) is a separately capitalized entity not consolidated on Coalition Inc.'s balance sheet. The July 2022 Series F ($250M, led by Allianz X) and the May 2026 Allianz partnership (upfront equity + performance-based compensation + further equity investment commitment) represent deep Allianz financial alignment that reduces near-term independent financing risk but creates strategic dependency concentration. The Wirespeed acquisition (November 2025) represents a technology capital expenditure; acquisition cost was not publicly disclosed.

      Coalition has not disclosed a burn rate, cash balance, or runway. The combination of confirmed 2023–2024 workforce reductions, the push toward cost discipline, and the favorable claims performance (73% fewer claims) suggests the company may be approaching operational breakeven or profitability — but no financial filing or management disclosure confirms this.
    callouts:
      - calloutType: strength
        title: "Low Physical Capex Improves Capital Efficiency"
        body: "Low physical capital intensity (no inventory, no manufacturing) with contractual premium revenue makes Coalition's funding efficiency substantially better than hardware, biotech, or infrastructure businesses of comparable scale. Regulatory capital requirements for CIC are real but manageable at $5B valuation scale."
        claimRefs:
          - CI034
          - CI018
      - calloutType: risk
        title: "Deep Allianz Alignment Reduces Financing Risk but Concentrates Dependency"
        body: "Deep Allianz equity alignment (multiple rounds + 10-year exclusive partnership) reduces financing alternatives and could create strategic conflicts if Coalition ever targets markets or customer segments that compete with Allianz's other insurance interests."
        claimRefs:
          - CI036
          - CI009
    claimRefs:
