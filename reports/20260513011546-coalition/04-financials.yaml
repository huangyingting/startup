  - id: financial-gaps-and-verdict
    title: "Financial Gaps and Verdict"
    body: |
      Coalition is a private company with no SEC-registered securities, no publicly available GAAP financial statements, and no statutory annual statement accessible via standard public registries. The highest-reliability substitute for financial diligence is Coalition Insurance Company's (CIC) annual statutory financial statement filed with state insurance departments (California, New York, and all admitted-state DOIs), which is publicly accessible via NAIC CIS filings or state DOI portals — but has not been retrieved in this research cycle due to dynamic-lookup URL limitations.

      The primary financial gaps are: (1) NWP after reinsurance cessions — the retained premium revenue after ceding to Ferian Re and program partners is the single most important undisclosed financial metric, as it determines the true scale of Coalition's underwriting operation; (2) GAAP/statutory net income or EBITDA — no profitability data is available; (3) the financial magnitude of the Allianz portfolio transition — adding Allianz's commercial cyber book could increase GWP by hundreds of millions but the volume is undisclosed; (4) CIR standalone revenue and margin — it is unclear whether CIR is a meaningful revenue contributor or primarily a LAE-offset function.

      Financial verdict: Coalition's revenue quality is high on the dimensions that can be assessed — contractual premium, recurring annual policies, favorable claims performance, and institutional reinsurance backing from Allianz, Arch, and Swiss Re Corp Solutions. The A- AM Best rating independently validates CIC's financial strength. The principal risk is not revenue quality but revenue opacity: without statutory financials, underwriting diligence requires accessing CIC's annual statement data from state insurance department filings. The Allianz 10-year exclusive partnership is transformationally significant and, if the portfolio transition performs as implied, Coalition's GWP could approximately double within 2–3 years — but the diligence investor cannot yet verify this projection.
    callouts:
      - calloutType: risk
        title: "No Audited Financial Statements Is a Hard Diligence Barrier"
        body: "The absence of audited financials creates an information barrier for underwriting. Coalition's statutory income statement (profit/loss), balance sheet (reserves, surplus, capital), and loss development data are non-negotiable diligence requirements that must be obtained via CIC annual statement access before any investment or credit decision."
        claimRefs:
          - CI033
          - CI028
      - calloutType: recommendation
        title: "Recommended Diligence Actions for Financial Verification"
        body: "Request access to Coalition Insurance Company (CIC, NAIC #29530) annual statutory financial statements directly from California DOI, New York DFS, or NAIC filings. Also request: Ferian Re annual accounts (Bermuda BMA filing), a fully executed copy of the Allianz 10-year partnership agreement, and a management-prepared income statement for Coalition Inc. for FY2023 and FY2024."
        claimRefs:
          - CI028
          - CI029
          - CI033
    claimRefs:
