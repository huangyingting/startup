company:
  name: Coalition
chapter:
  number: 4
  title: Financials
  summary: "Coalition's financial model is built on gross written premium (GWP) from annual cyber insurance policies distributed exclusively through licensed brokers, with a structural revenue quality advantage from ~73% fewer claims than the industry average in 2024. GWP is estimated at approximately $775M annualized in 2025, though Coalition does not disclose net written premium (NWP) after ceding to Ferian Re and program reinsurance partners (Allianz, Arch, Swiss Re Corp Solutions, Ascot Group, Vantage). The company has raised approximately $800M in equity and reaffirmed its $5B valuation in March 2025 via a Mitsui Sumitomo Insurance strategic investment. The May 2026 exclusive 10-year Allianz partnership, which transitions Allianz's entire standalone commercial cyber portfolio to Coalition, is the single most consequential near-term financial event — but its exact GWP magnitude and deal economics remain undisclosed. Coalition Control, its cyber risk platform, is provided free to policyholders (bundled into premium) with no separate SaaS revenue stream. The primary financial diligence blocker is that Coalition is a private company: no audited GAAP financials, no statutory NWP disclosure, and no confirmed EBITDA or burn rate exist in the public domain."

sections:
  - id: revenue-model-and-streams
    title: "Revenue Model and Streams"
    body: |
      Coalition's primary revenue is gross written premium (GWP) from annual commercial cyber insurance policies. Policies are distributed exclusively through licensed insurance brokers and are underwritten either on an admitted basis through Coalition Insurance Company (CIC, NAIC #29530, A- AM Best, all 50 states + DC since 2023) or on a surplus lines basis through Coalition Insurance Solutions (CIS, CA license #0L76155). GWP is estimated at approximately $775M annualized in 2025, based on the 160,000+ policyholder count and ~$4,844 implied average GWP/policyholder disclosed at the Series F in July 2022, adjusted for the subsequent policyholder decline to approximately 100,000 policyholders and market premium changes.

      A material portion of GWP is ceded to Ferian Re (Coalition's Bermuda Class 3B captive reinsurer, capitalized with ~$300M by BDT Capital Partners in October 2022) and to program reinsurance partners including Allianz, Arch, Swiss Re Corp Solutions, Ascot Group, and Vantage. Retained net written premium (NWP) through CIC and CIS is not publicly disclosed; the cession percentage is a primary diligence unknown.

      Coalition Control, the cyber risk management platform providing AI-driven alerts, vulnerability scanning, and monitoring, is provided free-of-charge to all policyholders as part of their bundled premium — there is no standalone SaaS revenue stream. Coalition Incident Response (CIR), operating as Coalition Security, provides fee-based DFIR and claims-adjacent services, but CIR revenue is not separately disclosed and some costs are likely recognized as Loss Adjustment Expense (LAE) within the insurance operation rather than as standalone service revenue.
    callouts:
      - calloutType: strength
        title: "Strength Signal"
        body: "Premium revenue from annual cyber insurance policies is contractual and highly recurring. Industry analyst coverage indicates an approximate 89% policy renewal rate, giving Coalition a durable, predictable revenue base that is structurally superior to transactional SaaS or project-based revenue."
        claimRefs:
      - calloutType: insight
        title: "Insight Signal"
        body: "The bundled model (technology platform + insurance in a single premium) creates a meaningful pricing moat: Coalition can capture risk reduction value in premium pricing that pure-play insurers without equivalent proactive monitoring cannot replicate."
        claimRefs:
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
    tableRefs:
      - TI001
    figureRefs:
      - FI001

  - id: pricing-and-monetization
    title: "Pricing and Monetization"
    body: |
      Coalition's cyber insurance pricing is risk-adjusted and underwritten using its Active Data Graph, which integrates external threat intelligence with policyholder-specific technology signals. The median US SMB cyber insurance premium was approximately $1,740 in 2026 per Marsh market data, reflecting softening conditions from the 2021–2022 hard market peak. Coalition's bundled active monitoring model enables it to offer competitive pricing relative to traditional carriers while maintaining a lower expected loss ratio.

      Broker commissions are the primary channel cost, typically running 10–15% of GWP for US commercial cyber insurance; Coalition does not publicly disclose its specific commission rates or whether it offers volume overrides or contingent commissions. The Allianz May 2026 exclusive 10-year partnership is structured with Coalition receiving upfront consideration through increased equity, performance-based elements linked to growth and profitability of the cyber business, and a commitment from Allianz to further equity investment. This arrangement is financially unusual: it combines channel economics (Allianz as capacity and distribution anchor) with an equity partnership, blurring the line between reinsurance program costs and strategic investor returns.

      Coalition does not charge separately for Coalition Control (the risk platform) or for routine security alert notifications. CIR fee-based engagements represent an incremental monetization stream for incident-level services, but this revenue is not separately disclosed and is unlikely to be material relative to GWP-based premium income.
    callouts:
      - calloutType: assumption
        title: "Broker Commission Rate Is Industry Estimate Only"
        body: "Broker commission rates of 10–15% are an industry estimate; Coalition's actual blended commission rates are not disclosed. Actual net commission economics could differ materially depending on volume-based arrangements with major broker networks."
        claimRefs:
          - CI008
      - calloutType: risk
        title: "Allianz Performance-Based Compensation Introduces Revenue Sensitivity"
        body: "The Allianz performance-based compensation structure introduces earnings sensitivity to Coalition's growth rate; if Allianz's cyber portfolio transition underperforms relative to contractual expectations, Coalition's effective revenue from this relationship could be lower than headline GWP growth implies."
        claimRefs:
          - CI009
          - CI036
    claimRefs:
      - CI007
      - CI008
      - CI009
      - CI010
    tableRefs:
      - TI002

  - id: unit-economics-and-sales-efficiency
    title: "Unit Economics and Sales Efficiency"
    body: |
      Coalition's unit economics are anchored by strong claims performance relative to peers. In 2024, Coalition policyholders experienced 73% fewer claims than the industry average, with claims frequency declining an additional 7% year-over-year. These figures, while self-reported and not independently audited, are directionally corroborated by AM Best's A- financial strength rating, which evaluates the insurer's loss experience. The 56% rate of claims resolved without any policyholder out-of-pocket expense reflects effective LAE management and Coalition Incident Response capabilities.

      Customer acquisition is exclusively broker-mediated; Coalition does not sell directly to end customers at scale. CAC is therefore primarily the cost of broker relationship investment, commission payments (captured in TI002), and marketing/brand spend to generate broker pipeline. The approximate 89% renewal rate (cited by industry analysts) implies strong policyholder retention and a favorable customer lifetime value relative to acquisition cost. Policyholder count declined from 160,000+ in 2022 to approximately 100,000 as of mid-2026, a ~37% reduction that represents either intentional repricing, stricter underwriting, or competitive losses — the explanation has not been officially disclosed by Coalition.

      Coalition Incident Response negotiated ransomware payments down by an average of 60% in 2024, enabling policyholders to resolve claims at lower total cost; this is a measurable CIR operational outcome that supports the retention value proposition even where it does not directly appear as top-line revenue. Coalition's recovery of $31M for policyholders via law enforcement cooperation in 2024 is a meaningful claims mitigation outcome.
    callouts:
      - calloutType: strength
        title: "73% Fewer Claims Implies Structurally Superior Loss Ratio"
        body: "73% fewer claims than industry average is an exceptional underwriting performance indicator. If this differential is sustained, Coalition's blended loss ratio is structurally far below the 50–65% market benchmark, enabling profitable growth at lower premium levels than pure-play incumbents require."
        claimRefs:
          - CI011
          - CI012
      - calloutType: risk
        title: "Policyholder Count Decline Is Adverse Signal Requiring Explanation"
        body: "The ~37% decline in active policyholders (from 160k to ~100k) between 2022 and 2026 is an adverse signal requiring explanation. Repricing-driven attrition suggests a healthier book but compresses the revenue base. If competitive losses to At-Bay or incumbent carriers explain the decline, the growth thesis is impaired."
        claimRefs:
          - CI016
          - CI031
    claimRefs:
      - CI011
      - CI012
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
    tableRefs:
      - TI003
    figureRefs:
