      - number: '7.5'
        title: 财务与商业模式风险
        blocks:
          - type: paragraph
            body: >
              Coalition 的财务模型依赖三个核心假设：（1）承保模型能准确为网络风险定价；（2）Active Insurance 模式足以降低理赔频率，支撑有利的损失率；（3）再保险市场仍可进入且价格可负担。到
              2026 年，这三个假设都面临结构性逆风。


              损失率风险：Coalition 报告理赔数量比行业平均少 73%。但这一指标由公司自行报告，未经审计。如果差异部分来自有利自选择（Coalition 的承保筛选选中了风险更低的企业），而不是平台效果，那么随着
              Coalition 增长并承保选择性较低的分层（包括 Allianz 企业账户，它们未必经过 Coalition 传统风险评分筛选），损失率优势可能收窄。损失率若从 50-60% 恶化到
              70-80%（行业中位数），会明显压缩利润率。


              勒索软件再升级：2024 年网络险市场经历短暂低谷后，勒索软件活动反弹。Verizon DBIR 2025 显示，92% 的行业出现勒索软件。AI 驱动钓鱼（用于 BEC 的 deepfake 音频 /
              视频）正在大幅提高 BEC 理赔频率。如果 BEC/FTF（已占 Coalition 理赔的 60%）在频率或严重程度上加速，而没有相应保费上调，损失率会恶化。


              保费充足性：2021–2022 年市场变硬之后，网络保险保费在 2023–2024 年走软。如果保费持续偏软而理赔严重程度上升（部分分层的勒索软件赔付同比增长 50-100%），Coalition
              的承保盈利能力会恶化。Coalition 未披露综合成本率或费用率，导致无法用公开数据评估保费充足性。


              资本充足性：CIC 作为认可承保商，受州最低资本要求约束。随着 Coalition 的 GWP 增长，所需盈余水平也会上升。如果 Coalition
              增长需要超过现有投资人能力的注资，就必须进行稀释性融资或发行债务。Coalition 最近一次披露融资是 2022 年估值 $5B 的 Series F；Series F 之后的财务轨迹未公开披露。


              烧钱速度与盈利能力：Coalition
              没有在任何公开文件中披露收入、EBITDA、净亏损或现金消耗。公司的财务健康状况——现金流为正、接近盈亏平衡，还是仍在烧钱——未知。作为私营公司，这并不意外，但对任何投资人都是尽调关键缺口。Mitsui $30M
              投资（2025 年 5 月）和 Allianz 合作（2026 年 5 月）都是正面信号，但都不能证明公司已经盈利。


              外汇与国际资本风险：在 8 种货币中运营，会在保费收取、理赔结算和监管资本要求上产生外汇暴露。USD 不利升值可能降低国际 GWP 的 GBP/EUR/AUD 等值。
