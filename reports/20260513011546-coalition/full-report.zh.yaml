      - number: '8.4'
        title: 牛市、基准与熊市情景
        blocks:
          - type: paragraph
            body: >
              估值情景基于 GWP 估算、损失率假设，以及同等规模和阶段的保险与保险科技公司适用估值倍数搭建。


              **GWP 估算基础：** 100,000-160,000 名保单持有人 × 每年 $4,000-$7,000 综合平均保费 = $400M-$1.1B GWP 区间。区间较宽，反映企业客户与 SMB
              组合、平均保费差异的不确定性。基准情景：$700M GWP。


              **牛市情景（$8B-$12B 估值，3-5 年周期）：**

              - 假设：Allianz 企业业务账簿新增 $300M+ GWP 且证明可持续；综合成本率达到 85%；Coalition 第 3 年达到 $1.2B GWP；Wirespeed ADR 通过高级层级创造
              $50M+ ARR；再保险结构稳定；IPO 窗口以 10x GWP 打开。

              - 退出路径：以 10-12x GWP IPO（$12-14B），或被大型 P&C 承保公司（Travelers、Chubb、AXA）以 8-10x GWP 战略收购。

              - 概率信号：需要 Allianz 关系可持续、财务强劲、再保险有利、战争除外风险受控、IPO 市场打开这五项全部成立。


              **基准情景（$4.5B-$6.5B 估值，3-5 年周期）：**

              - 假设：Allianz 业务适度增厚；综合成本率 90-95%；GWP 增至 $850M；高级平台产生适度追加销售；再保险小幅收紧；以 6-8x GWP IPO。

              - 退出路径：以 6-8x GWP IPO（$5-7B），或通过后期二级交易 / 结构化退出。

              - 概率信号：需要 SMB 市场领导地位延续、损失率稳定、Allianz 关系稳定。


              **熊市情景（$1.5B-$3B 估值）：**

              - 假设：Allianz 退出或表现不及；损失率恶化至 75%+；再保险成本显著上升；AI-BEC 加速侵蚀理赔优势；以 2-3x GWP 降价融资或困境出售。

              - 退出路径：以 2-3x GWP（$1.4B-$2.1B）战略收购，或按低迷倍数 IPO。

              - 概率信号：战争除外裁决、Allianz 退出、损失率恶化、再保险不续约四项中任意两项即可触发。


              关键估值支点是 Allianz 企业业务账簿的损失率：如果企业账户损失率高于 SMB 账簿（鉴于风险评分精度较低，这是预期情况），综合成本率会上升，倍数也会随之压缩。
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
      - number: '8.5'
        title: 可比公司组与估值倍数
        blocks:
          - type: paragraph
            body: >
              Coalition 的估值最适合放在混合可比组里看：技术赋能型网络保险公司（主要可比对象）、传统网络保险龙头（结构性可比）、网络安全平台公司（倍数参照）。


              私营网络保险公司直接可比：At-Bay 2022 年以 $1.35B 估值融资 $200M——约为 Coalition 当时标记价的四分之一；Cowbell 2023 年以 $1.5B 估值完成 $100M
              Series C；Resilience 2024 年完成 $100M Series D，估值未披露。这些可比交易表明，Coalition 相对直接网络保险同行享有显著溢价；凭 Coalition
              的规模（保单持有人数量是 At-Bay 的 10x+）和 Allianz 验证，这一溢价有支撑。


              传统网络保险基准：Beazley（LSE: BEZ）是全球头部网络保险公司，网络保险占其承保组合的重要部分，市值约 £4-5B。Beazley 2024 年 GWP 约 £5B（所有险种），隐含 0.8-1.0x
              GWP 倍数——远低于 Coalition 隐含的 5-7x。但 Beazley 是传统保险公司，没有 Coalition 的技术平台，因此倍数更低。


              网络安全平台可比：CrowdStrike（NASDAQ: CRWD）收入倍数为 15-20x，市值 $70-80B，反映其类 SaaS 订阅模式和市场领导地位。虽然二者不能直接可比（CrowdStrike
              是纯网络安全平台，没有保险业务），但溢价倍数反映了主动防护 + 数据网络效应的价值——这正是 Coalition 的同一套架构假设。Coalition 以保险为锚的模式限制了它相对纯 SaaS 可拿到的倍数，但
              GWP 带来纯 SaaS 缺少的收入可预测性。


              M&A 参照：Travelers 2024 年收购 Corvus Insurance（网络保险科技公司），估值约 $200-280M——与早期、且没有 Coalition 规模或平台差异化的网络保险公司
              1.5-2.5x GWP 倍数一致。


              交叉推断：Coalition 相对直接网络保险可比公司的可防守溢价由规模和技术差异化支撑。与 Cowbell（同阶段估值 $1.5B）相比，基于保单持有人数量差异，Coalition 的合理溢价区间为
              3-5x。Coalition 相对 Beazley 的倍数差异来自技术平台和增长轨迹。5-7x GWP 倍数区间可作为中心情景支撑，但风险调整后的下行可到 2-3x GWP。
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
