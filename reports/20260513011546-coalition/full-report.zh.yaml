  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 风险图谱概览与严重性排序
        blocks:
          - type: paragraph
            body: >
              Coalition
              的风险画像由网络保险业务的内在特征塑造：保单风险具有关联性（一次攻击可能同时触发数百起理赔），威胁环境在对抗中演进（攻击者会专门调整手法来击败防御），监管环境横跨多个司法辖区且框架不一致。这些结构特征带来的风险，与财产险、意外险或一般责任险有本质差异。


              五个主要风险向量按严重性从高到低为：（1）关联性系统性网络损失事件——低概率、灾难性影响；（2）再保险市场不可获得——中概率、高影响；（3）战争除外条款诉讼被推翻——低概率、对保单可执行性有关键影响；（4）新型威胁模式导致承保模型失效——中概率、高影响；（5）Allianz
              合作伙伴集中——中概率、高收入影响。


              五项风险彼此联动：一次关联损失事件可能同时压迫再保险塔；如果事件被归因于国家行为者，还可能触发战争除外条款诉讼，并可能违反 Allianz 收入保证。因此，在尾部情景下，Coalition
              的风险架构不是相加，而是相乘。


              投资含义：如果（a）再保险结构被验证为稳定且资本充足，（b）承保模型在样本外威胁数据上得到验证，（c）多个理赔年度的损失率保持稳定，（d）Allianz
              合作条款包含足够退出保护，则风险画像支持投资。没有管理层数据室访问权，这些条件无法完全验证。
