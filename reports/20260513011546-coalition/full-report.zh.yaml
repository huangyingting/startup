      - number: '1.2'
        title: 创始人与管理团队
        blocks:
          - type: paragraph
            body: >
              Coalition 由 Joshua Motta 于 2017 年联合创立，Motta 现任 CEO 和联合创始人。Motta 的背景横跨国家安全、技术和金融：曾任 Cloudflare（NYSE: NET，市值
              $25B 的 Web 基础设施公司）CXO 兼特殊项目负责人，曾在 Goldman Sachs 和美国中央情报局任职，也曾在 Microsoft 积累工程经验。这种一手网络威胁情报与资本市场经验的少见组合，是
              Active Insurance 主张的核心。以一家成长期私营公司看，Coalition 管理层覆盖面很宽。Jim Young 担任 CFO，负责财务运营和资本配置。Shawn Ram 担任
              CRO，负责经纪人分销和 GTM 落地。Frank Fumarola 担任 CPO，推动产品战略。Maha Virudhagiri 担任 CTO，负责工程和平台基础设施。Tiago Henriques
              担任首席核保官，负责定价、风险筛选和损失控制。David Lynders 以保险负责人身份领导保险运营；John Littzi 担任总法律顾问；Dylan Steele 以 CMO 身份负责市场；Sisi Liu
              担任参谋长兼战略与企业发展负责人。管理团队在保险运营、网络安全、技术和资本市场上都有深度职能覆盖。Allianz CEO Oliver Bäte 目前是 Coalition 独立董事，预计在 2026 年 5 月
              Allianz 合作交易交割后转为提名董事席位。Joshua Motta 的关键人风险很高——他是 Active Insurance 的公众面孔和战略架构师，任何 CEO
              接班都会给投资者和合作伙伴带来不成比例的战略风险。
