      - number: '6.4'
        title: 留存、韧性与切换成本
        blocks:
          - type: paragraph
            body: >
              Coalition 未公开披露净留存率（NRR）、总留存率（GRR）、净推荐值（NPS）、续保率、客户终身价值或队列层面留存数据。这些是评估订阅业务客户韧性的核心指标。


              可观察代理信号显示留存动力较强。第一，捆绑式 Active Insurance
              模式——把保险保障与常开安全平台结合——创造了纯网络险承保商无法复制的切换成本。投保人更换承保商时，必须替换的不只是保单，还有安全监控工作流、合规证据工具和事件响应关系。相较商品化保险产品，这提高了流失摩擦。


              第二，Active Cyber Policy 内嵌的 Vanishing Retention 功能直接激励续保：投保人在一个保单年度内没有理赔，就会获得自留额保费减免（隐含范围
              10-25%，具体比例未披露）。这让投保人的财务利益与留在 Coalition 平台并维持良好安全卫生绑定在一起。


              第三，Coalition 报告的理赔数量比行业少 73%，说明投保人在 Coalition 平台上经历的结果明显更好——这是一个自我强化的留存信号。如果投保人遇到的事件更少、自付损失更少，续保价值主张就很强。


              SMB 网络保险的行业基准显示，年续保率约为 78–85%；带主动监控平台的承保商留存高于被动保险公司。Coalition 的结构性优势说明，其留存应达到或高于行业中位数。


              Coalition 通过经纪人分销也影响留存：续保由经纪人管理。如果理赔结果较好，经纪人有强商业动机把客户留在 Coalition。经纪人惯性（避免破坏既有工作关系）也是额外留存因素。


              关键留存数据缺口：实际 GRR 和 NRR 是管理层信息，未公开披露。续保时的保费费率变化——影响留存的关键因素——也未公开披露。
