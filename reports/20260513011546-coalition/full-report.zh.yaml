      - number: '1.3'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              Coalition 已在多轮融资中募集约 $800M 风险股权，并在 2022 年 6 月 F 轮后跻身独角兽。该轮融资 $250M，由 Allianz X 领投，Valor Equity Partners 和
              Kinetic Partners 参投，既有投资者包括 Index Ventures、Ribbit Capital、T. Rowe Price、Durable Capital Partners 和 Whale
              Rock Capital；该轮把 Coalition 估值从 $3.5B 推至 $5B。2022 年 10 月，Coalition 设立 Ferian Re，这是一家独立的百慕大 3B 类再保险公司，由 BDT
              Capital Partners 出资约 $300M（The Pritzker Organization 为少数投资者），为公司提供专属再保险容量，并与既有项目合作方 Allianz Group、Arch
              Insurance North America 和 Swiss Re Corporate Solutions 并行。2025 年 3 月，Coalition 获得 Mitsui Sumitomo
              Insurance Co.（MS&AD Insurance Group）$30M 企业少数股权投资，深化全球战略合作，并重申 $5B 投后估值。投资者基础横跨金融科技 VC（Ribbit
              Capital、Index Ventures）、成长股权机构（Valor Equity、T. Rowe Price、Durable Capital），以及全球保险战略企业投资者（Allianz X、Mitsui
              Sumitomo），带来耐心资本、分销网络入口和跨洲行业背书。Ferian Re 被视为独立再保险实体，不计入约 $800M 股权融资总额。
