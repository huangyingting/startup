        - 每年跟踪 Munich Re 和 Coalition 自身损失经验
      - - SEC 网络安全披露规则（2023 年 7 月）
        - 顺风
        - 2023 年 12 月起生效
        - 上市公司必须在 4 天内披露重大网络事件（Form 8-K），并每年报告治理情况（Form 10-K）；提升董事会层面对网络责任的关注
        - 推高美国上市公司对综合网络安全保障和事前管理的需求
        - 评估 Coalition 在上市公司客户群中的渗透率
      - - EU NIS2 指令合规（2024 年 10 月生效）
        - 顺风
        - 2024 年 10 月起生效
        - 18 个行业被要求采用风险管理和事件报告；推动 2025 年欧洲网络保费同比增长 28%（Marsh McLennan）
        - 验证 Coalition 进军欧洲市场；Allianz 合作提供欧洲分销入口
        - 监测 NIS2 执法行动及其对 Coalition 欧洲投保客户增长的影响
      - - 美国州级隐私立法（CCPA 和 20 多项州法）
        - 顺风
        - 已生效；继续扩张
        - 更多州出台数据保护法，隐私责任暴露扩大；第三方责任理赔潜力上升
        - 扩大 Coalition 责任保障价值主张；可能推动隐私保障产品创新
        - 按州跟踪立法管线；评估隐私诉讼带来的理赔
      - - 数字化转型与云采用
        - 顺风
        - 长期（3–5 年）
        - 云迁移和 IoT 扩大攻击面；Munich Re 称 2023 年云入侵增加 75%；创造新的可保风险暴露
        - 持续扩大 Coalition 可覆盖的风险宇宙；推动新产品开发
        - 评估 Coalition 对云特定风险的产品保障
      - - SMB 网络安全保险采用缺口
        - 顺风（机会）
        - 长期
        - Swiss Re 称，全球 SME 只有约 10% 购买网络安全保险；90% 以上仍未投保；美国 SMB 年保费中位数为 $1,740
        - Coalition 最大的有机增长机会；Active Insurance 和数字报价降低获客成本
        - 监测 SMB 采用率；评估 Coalition 在营收低于 $50M 细分市场的份额
      - - 网络安全保险费率走软
        - 逆风
        - 2022–2023 年起出现；2025 年加速
        - Howden 称全球费率较 2022 年峰值下降 22%；Marsh 称美国 2024 年 Q4 费率下降 5%；新增承保能力进入者加剧竞争
        - 压缩单保单 GWP 增长；可能无法被规模增长抵消；考验 Coalition 定价纪律
        - 监测 Coalition 费率充足性和综合成本率趋势；与市场基准比较
      - - 系统性 / 相关性网络风险（CrowdStrike 事件模型）
        - 逆风
        - 低频、高烈度
        - CrowdStrike 2024 年 7 月中断在数百万企业中引发连锁损失；200 年一遇累积事件模型估算为 $20-46B（Munich Re）
        - 可能让部分网络风险暴露暂时不可保；压力测试 Ferian Re 承保能力；所有网络保险公司都面临风险
