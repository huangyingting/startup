      - number: '3.3'
        title: 传统专业承保人
        blocks:
          - type: paragraph
            body: >
              传统承保人主要比拼财务实力、保障广度、全球分销和品牌声誉，而不是技术差异化。它们的网络安全产品大多偏反应式（入侵后响应），不是前置式（入侵前预防）。


              Beazley PLC 是 Lloyd's 体系内领先的专业保险公司。其 Beazley Breach Response (BBR) 产品提供事件后服务（法律、取证、公关、通知），Beazley
              也在职业责任险、医疗和金融机构网络安全保险中站稳位置。不同于 Coalition，Beazley 不提供持续入侵前监控。Beazley 的强项在 Lloyd's
              辛迪加结构（全球承保牌照、灵活容量）、深厚经纪人关系，以及专业险市场认可的品牌。


              Chubb Limited 是全球最大的上市 P&C 保险公司，业务覆盖 54 个国家，提供面向中大型企业的 Cyber Enterprise Risk Management。Chubb 的竞争优势是 Chubb
              Studio 嵌入式分销和高触达企业客户关系；它缺少 Coalition 的主动监控技术栈。


              AXA XL 是 AXA Group 的 P&C 和专业风险部门，依托 AXA 全球资产负债表，为大型企业提供网络责任保障。Coalition 正通过 Allianz 合作向企业层级扩张，AXA XL
              也在这一层级竞争。


              Zurich North America 通过 Cowbell Select Plus 合作分销模块化多险种保障（2025 年 6 月推出），说明即便传统多险种承保人也看到了 InsurTech 分销层的价值。
