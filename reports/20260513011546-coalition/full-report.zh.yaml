      - number: '5.5'
        title: 产品与技术风险评估
        blocks:
          - type: paragraph
            body: >
              Coalition 的产品和技术模型带有几类结构性风险，值得重点尽调。


              第一，安全工具依赖持续的数据质量和覆盖广度。Active Data Graph 的准确性取决于 Coalition 对攻击面的遥测覆盖。如果投保人资产中有相当一部分落在自动扫描之外——例如隔离系统、OT
              环境、非标准云部署——Cyber Health Rating 就会错估风险，可能导致保单定价过低和意外理赔。


              第二，Wirespeed 整合带来工程执行风险。把一个刚收购的自动化 MDR 平台并入成熟的保险数据湖，并不简单。整合失败可能拉低检测表现，在规模化场景中引入误报，或者在自动遏制动作干扰投保人运营时带来责任暴露。


              第三，Coalition 的 AI 和 ML 模型是自研且未审计的。Wirespeed 使用的条件逻辑算法，以及 Coalition Control
              中的风险评分模型，都没有披露任何独立审计、算法公平性评估或模型风险管理治理。随着 AI 辅助承保和自动遏制进入主流，监管对这些模型的审视正在加强。


              第四，除已点名的集成（Microsoft Defender、SentinelOne）外，Coalition 没有披露技术合作伙伴。依赖主要供应商提供安全遥测，会带来供应商集中风险。云基础设施提供商未披露。
