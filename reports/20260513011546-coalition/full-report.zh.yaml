      - number: '3.4'
        title: 功能与定价对比
        blocks:
          - type: paragraph
            body: >
              Coalition 的定价和功能差异化建立在三项主张上：（1）主动监控带来更低赔付率，使公司能为筛选良好的账户提供有竞争力的价格；（2）Coalition Control 免费包含在保单中（估计为投保客户节省
              $20,000–$50,000 的独立安全工具支出）；（3）整合 DFIR 能力和 FTF 追回（累计 $158M）降低事件总成本。


              关键定价变量是费率走软：美国 SMB 网络安全保费中位数从 2024 年约 $2,100 降至 2026 年约 $1,740（Marsh 美国网络安全市场数据）。费率下行时，Coalition
              可收取的技术溢价会变窄。功能差异化上，Coalition Control 把攻击面监控、零日提醒、TPRM、安全检查清单和可选 Wirespeed ADR 合在一起，是市场上功能最丰富的一体化平台。At-Bay
              Stance 在核心监控和 MDR 上可直接对标，但缺少 Coalition 的数据优势（来自 160k+ 投保客户的 8+ 年索赔数据）。Cowbell Factor 提供 AI
              驱动风险评分，但持续监控深度无法与 Coalition Control 或 At-Bay Stance 相比。


              承保人模式差异化：Coalition 的准入承保牌照（CIC，AM Best A-）覆盖美国 50 个州，再叠加通过 CIS 进入剩余险市场，让经纪人获得最大投放灵活性。At-Bay 的 E&S
              承保人覆盖非准入投放。Cowbell 必须通过合作承保人承保，限制了保单定制。对要求准入承保牌照和评级稳定性的大型经纪客户来说，承保人所有权差异非常关键。
            claimRefs:
              - CP024
              - CP025
              - CP026
              - CP029
              - CP030
