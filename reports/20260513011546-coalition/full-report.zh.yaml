      - number: '8.6'
        title: 退出准备度与最终尽调清单
        blocks:
          - type: paragraph
            body: >
              牛市情景下，Coalition 已具备退出准备度，但流动性事件还需要满足几项结构性前提。若要 IPO，Coalition 需要：(1) 披露综合成本率，并证明两年或以上盈利承保；(2) 完成 Allianz
              企业集成，并显示与 SMB 账簿的损失率平价；(3) 达到 $1B+ GWP 运行率，以支撑目标倍数下的市值；(4) 解决或对冲战争除外诉讼风险；(5) 在明确起赔点下建立可持续再保险。36
              个月内五项条件全部满足的概率中等。


              若走战略收购，最可能的买方是大型 P&C 保险公司（Travelers、Chubb、AXA、Zurich、Allianz 本身）、希望获得一级市场敞口的全球再保险公司（Munich Re、Swiss
              Re），以及希望获得保险分销的大型网络安全平台公司（CrowdStrike、Palo Alto Networks）。Allianz 排他合作可能缩小愿意出手的买方范围——如果合作条款中的排他性语言制造收购摩擦。


              退出时间线：鉴于 2022 年 Series F 日期和典型 VC 基金生命周期，主要 Series F 投资方（包括领投方 Allianz X）会倾向于在 2026-2028 年出现流动性事件。Allianz
              合作于 2026 年 5 月完成，既可能加速 Allianz 作为买方的 M&A 路径，也可能为其他竞购方提供战略底价信号。


              投资承诺前必须审阅的最终尽调包包括六项，按重要性排序：(1) 再保险合约结构；(2) 按客户批次划分的损失率（SMB 与 Allianz 企业）；(3) 年度续约率和 GRR；(4) 当年 GWP
              与收入轨迹；(5) Allianz 合作合同条款（排他性、退出、收入分成）；(6) NYDFS Part 500 年度认证备案状态。


              破坏投资假设的触发项：第 7 章识别的五项触发项同样适用。另，如果管理层确认任何滚动 12 个月周期综合成本率超过 100%，财务风险画像会显著恶化。任何不利的 NYDFS
              执法行动，或无法按现有条款续签再保险合约，都会构成立即破坏投资假设的事件。
