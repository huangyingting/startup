  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与目标市场
        blocks:
          - type: paragraph
            body: >
              Coalition 的目标市场是美国及另外 7 个市场的中小企业（SMB）：United Kingdom、Canada、Australia、Germany、Denmark、Sweden 和 France。核心产品
              Active Cyber Policy 面向年收入最高 $5 billion 的组织。这个收入上限把 Coalition 的主要 TAM 放在大型企业客户之下，后者历史上由 Chubb、AXA XL 和
              Beazley 等传统承保商服务。


              购买画像主要是 Chief Financial Officer 或 Chief Operating Officer（预算权），IT 安全团队则是 Coalition Control 平台的用户。在规模较小的
              SMB 中，经纪人往往推动产品选择。付款方是企业本身，费用来自商业保险预算。


              Coalition 只通过持牌保险经纪人分销，不走直销到客户渠道。在美国非认可（surplus lines）州，Coalition 与批发 E&S 经纪人合作；在 Coalition Insurance
              Company（CIC）持牌的认可市场州，公司也与零售代理和批发经纪人合作。这种渠道模式借力经纪人关系，避免自建直销团队的成本，但客户获取依赖中介关系。


              Allianz 合作（2026 年 5 月）带来一个新客户分层：Allianz 现有全球商业网络险投保人将迁移到 Coalition 平台。这个分层具备企业级特征——组织规模更大、保障需求更复杂——代表
              Coalition 从核心 SMB 焦点向外扩张。承接企业客户需要 Coalition 在保单设计和平台容量上作产品级调整。


              按垂直行业看，Coalition 的理赔数据提示其客户集中在专业服务、技术、零售和金融服务等行业——这些行业 BEC/FTF
              暴露较高。医疗健康也是值得注意的分层，因为勒索软件攻击高度集中。公司尚未公开宣布垂直行业专门产品定制。
