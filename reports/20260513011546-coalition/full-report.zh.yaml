      - number: '2.3'
        title: 买方与付款方分层
        blocks:
          - type: paragraph
            body: >
              商业网络安全保险买方可按公司规模和风险画像分成四个主要层级，每层的预算归属、采用节奏和采购触发点都不同。大型企业（年收入超过 $1 billion）投保最充分，约 80% 持有网络安全保障（Swiss
              Re）。采购决策由 CISO 和 CFO 共同负责，预算在董事会层面审批；主要触发因素是监管强制合规、SEC 网络安全披露要求（2023 年 12
              月起对上市公司生效）、审计委员会审视，以及企业客户合同义务。保障通常是分层结构，由主承保人提供首层保单，再由多家保险公司补充超额容量，最大公司总保障限额可达 $50–150M+。中端市场（收入
              $50M–$1B）是增长最快的买方类别；该层级网络安全保险渗透率估计为 40–60%，预算归 CFO 或财务副总裁所有。采用动因包括网络安全专项合同要求、续保时经纪人推荐，以及重大行业事故后的入侵焦虑。SMB /
              小企业（收入低于 $50M）是全球渗透率最低的客群，美国采用率估计低于 30%，欧洲和亚洲低于
              10%（Howden）。预算由业主经营者或财务主管掌握；采用摩擦来自价格敏感和网络安全专业能力不足，导致很难完成核保申请。Coalition 在美国剩余险市场主攻 SMB；Coalition 数据显示，2026
              年员工少于 250 人企业的年度保费中位数为 $1,740。专业垂直行业——尤其医疗、金融服务和教育——网络风险高于中位数，因此采用倾向更高，但保费也更高（Gallagher 称医疗保费比中位数高
              42%），背后驱动因素包括 HIPAA、SOX 和隐私责任暴露。经纪人 / 代理渠道是所有商业层级的主导分销机制；Coalition 通过独立保险经纪人分销，后者可接入 Coalition 的数字报价平台。
