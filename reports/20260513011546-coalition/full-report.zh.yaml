      - number: '7.4'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: >
              Coalition 的收入和客户规模越来越依赖少数战略合作伙伴和关键基础设施提供商。这些依赖形成的集中风险，与有机 SMB 分销有显著不同。


              Allianz 合作集中：2026 年 5 月组合迁移之后，Coalition 的投保人数从 100,000 增至 160,000+。如果 Allianz 关系贡献 60,000
              名投保人，且它们贡献的保费占比过高（企业账户通常保额和保费更高），来自 Allianz 的收入可能占 Coalition 总 GWP 的
              30-50%。合作条款——独家期限、最低量承诺、退出条款——均未公开披露。如果 Allianz 退出或重组合作，Coalition 会同时失去投保人数量，以及未来企业账户的分销渠道。


              再保险市场准入：Coalition 是直接承保人，不是最终风险承担者。Coalition 将相当一部分保费风险转移给再保险公司（Swiss Re、Munich Re、Lloyd's
              syndicates）。随着网络再保险市场变硬，容量正在收缩：Lloyd's 2023 年强制修改战争除外条款，反映再保险公司越来越不愿承担无上限网络暴露。如果再保险公司减少给 Coalition
              的容量，Coalition 以有竞争力价格承保新业务或续保现有账户的能力都会受限。再保险合约在年度续约时重新定价，可能在没有相应保费费率上调的情况下，明显压缩 Coalition 利润率。


              云基础设施依赖：Coalition Control 和底层 ASM 数据基础设施托管在云端（可能是 AWS 或 GCP）。云服务商发生重大宕机或服务降级，会中断 Coalition
              的实时监控能力，可能在宕机窗口内让 Active Insurance 的「active」部分失效，并引发保单保障争议。


              威胁情报数据提供商：Coalition 的风险评分依赖第三方数据源——Shodan 和 Censys 提供外部攻击面数据，VirusTotal/OSINT feeds 提供暗网暴露和威胁情报。若这些数据提供商改变
              API 条款、提价或数据质量下降，Coalition 承保模型准确性会下滑。


              Mitsui Sumitomo Insurance 依赖：$30M 战略投资带来了对 Japan/APAC 分销的合作预期。如果 Mitsui
              关系没有产生预期业务量，投资的战略理由会变弱，并可能围绕投资条款制造张力。
