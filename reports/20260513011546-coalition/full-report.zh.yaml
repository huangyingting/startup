      - number: '7.3'
        title: 运营与技术风险
        blocks:
          - type: paragraph
            body: >
              Coalition 的运营模型建立在一个前提上：主动安全监控可以预防理赔。这带来一种与传统保险公司相反的运营风险：如果预防平台失效（Coalition Control 数据质量下降、告警阈值错误，或 CIR
              响应时间不足），理赔频率会急剧上升，而保费费率要到下一次续保周期才会相应调整。


              最严重的运营风险是关联性系统性损失。一次网络攻击如果瞄准 Coalition 数千名投保人共享的漏洞——类似 SolarWinds 或 Log4Shell 事件，但影响的是已投保组织——可能同时触发理赔，超过
              Coalition 的损失准备金，甚至超过其再保险塔。2017 年 NotPetya 攻击造成全球损失超过 $10 billion；未来若有同等或更大规模攻击瞄准 SMB 基础设施（云服务、VPN
              设备、email 平台），可能同时击中数千名 Coalition 投保人。Swiss Re 和 Munich Re 都公开警告过网络风险的系统性，并说明它们在限制网络风险总暴露。


              Coalition 自有平台安全是其模式独有的运营风险。Coalition Control 收集 100,000+ 家企业的外部攻击面数据、漏洞扫描结果和安全配置信息。如果 Coalition
              平台被攻破，攻击者将获得一大部分已投保 SMB 市场安全弱点的完整地图。这让 Coalition 成为勒索软件（敲诈）和情报行动的高价值目标。Coalition 自身安全态势、SOC
              能力以及内部事件响应能力没有公开披露。


              承保模型校准风险：Coalition 的自动承保用机器学习基于外部信号（扫描数据、暗网暴露、行业、收入）为网络风险定价。随着攻击者专门调整以规避这些信号——例如对抗性地优化基础设施，让其通过 Coalition
              风险评分——模型准确性会下降。训练数据中没有的新型攻击模式（新勒索软件家族、大规模 AI 驱动钓鱼、供应链攻击）可能系统性地造成保费不足。


              CIR 响应容量：Coalition 的 Cyber Incident Response 团队为所有投保人提供 24/7 服务。Allianz 之后投保人达到
              160,000+，一次大规模伤亡式网络事件可能同时产生数百个 CIR 请求，超过 Coalition 的响应能力。CIR 大规模响应的质量和一致性尚未经过独立评估。


              Wirespeed 整合风险：2025 年 11 月收购 Wirespeed 增加了 ADR 能力，但也带来整合风险。Wirespeed 技术必须接入 Coalition
              平台，同时不能削弱现有检测能力；人员整合、客户迁移和责任转移都是运营变量。
