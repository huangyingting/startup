      - number: '6.2'
        title: 采用轨迹与规模
        blocks:
          - type: paragraph
            body: >
              Coalition 公开披露的投保人数，从 2022 年 Series F（估值 $5 billion）时隐含的基数，增长到 2025 Claims Report 中贡献 Active Data Graph 的
              100,000+ 投保人，再到 2026 年 5 月 Allianz 组合迁移公告中的 160,000+ 受保护企业。这意味着多年增长已经发生，但 Coalition 未披露同比新增投保人获取率或续保量。


              GlobeNewswire 发布的 2022 年 Series F 新闻稿把 Coalition 描述为 SMB 网络保险市场领导者，当时业务覆盖 5 个国家，说明其国际扩张此后仍在继续。由 Allianz X
              领投的 $250 million Series F，用于全球客户获取、承保技术以及 Coalition 认可承保主体扩张。


              Coalition 的理赔数据，是观察客户参与度和平台使用率最直接的公开代理指标。2025 Cyber Claims Report 显示，BEC（Business Email Compromise）和
              FTF（Funds Transfer Fraud）合计占全部理赔的 60%，与往年一致。Coalition 对 FTF 事件的主动 CIR 响应——包括实时联系政府和金融机构——似乎帮助追回了 $158
              million 被盗资金。


              Allianz 合作实质性改变了客户数量轨迹。Allianz 的全球商业网络险账簿代表一个规模大、成熟的企业客户基础，将迁移到 Coalition 平台。此次迁移规模未公开量化，但 Allianz
              的商业网络险组合位居全球前列，说明它可能带来数万条额外保单关系。


              Coalition 的 Control 平台随每张保单免费提供，且所有有效投保人必须 100% 注册，作为保障条件。这保证平台使用数据与投保人数完全重合。相比免费层激活往往滞后于付费转化的 SaaS
              公司，这是一个结构性优势。
