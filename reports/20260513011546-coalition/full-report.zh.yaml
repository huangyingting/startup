      - number: '5.3'
        title: 信任、安全与合规
        blocks:
          - type: paragraph
            body: >
              Coalition 的产品背着多层信任和合规要求。作为在 8 个国家持牌的保险公司，Coalition Insurance
              Company（CIC）受州级和国家级保险监管约束，必须满足偿付能力、准备金和消费者保护要求。


              Coalition Control 的安全功能包括合规清单生成，并映射到 NIST SP 800-53、SOC 2 Type II 和 CIS v8.1 等主要框架。投保人可以把 Control
              同时用于风险管理和合规证据收集。对目标市场中的 SMB 来说，这降低了合规成本，是一个有意义的差异点。


              Wirespeed 平台遵循 ISO 2859，为威胁检测一致性提供流程层面的质量标准；但这是内部质量标准，不是独立安全审计。


              Coalition 尚未公开披露其自有平台的 SOC 2 认证、第三方渗透测试结果或漏洞赏金计划细节。对一家销售安全产品的企业来说，缺少公开的第三方安全认证是明显缺口。Coalition Control
              处理敏感客户安全态势数据，因此产生隐私和数据托管义务——隐私政策和数据处理协议存在，但没有完整公开。


              Coalition 的 Active Cyber Policy 包含 Affirmative AI Coverage，覆盖包括 deepfake 欺诈在内的 AI 相关威胁；截至 2026
              年，这是少数市场同行能匹配的前沿保障功能。
