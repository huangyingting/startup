  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 网络安全保险竞争格局概览
        blocks:
          - type: paragraph
            body: >
              美国商业网络安全保险市场由两类结构迥异的竞争者争夺：技术原生 InsurTech MGA，把主动风险监控与保险保障捆绑；传统专业承保人，则依靠财务实力、经纪人关系和入侵后服务。Coalition 2017
              年开创整合式 Active Insurance 模式；截至 2025 年，按投保客户数计，它仍是最大技术原生网络安全保险公司，约有 110,000 名活跃投保客户、约 $775M 年化 GWP。


              InsurTech MGA 阵营包括 At-Bay（已融资 $295.75M、40,000+ 投保客户、InsurSec 平台）、Cowbell（已融资 $208.3M、SME AI 核保、Zurich
              合作）、Corvus（2024 年 1 月被 Travelers 收购，整合 AI 核保），以及 Resilience（已融资 $217M、聚焦企业 CISO）。最具战略意义的竞争事件，是 Travelers
              以约 $435M 收购 Corvus：这验证了 InsurTech 模式，也让传统承保人获得了 AI 核保能力和全球分销。


              传统承保人阵营由 Beazley（Lloyd's 专业险、Beazley Breach Response）、Chubb（全球最大上市 P&C 保险公司、企业网络安全 ERM）、AXA XL（AXA Group
              P&C 部门）和 Zurich（2025 年与 Cowbell 合作推出 Zurich Select
              Plus）主导。传统承保人的主要优势是财务实力评级、全球经纪人分销、多险种交叉销售和成熟再保险关系——但入侵前技术投入明显少于 Coalition。Coalition 的竞争风险在于趋同：Travelers /
              Corvus 已经证明，一旦传统承保人收购或自建可比的核保和监控技术，差距会缩小。
