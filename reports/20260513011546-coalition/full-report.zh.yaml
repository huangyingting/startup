      - number: '7.2'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Coalition 在美国认可州以持牌保险承保商（Coalition Insurance Company，CIC）运营，在非认可州则通过批发经纪人作为合格 surplus lines
              承保商经营。这种双重结构在州级和联邦层面都产生监管义务，并且随司法辖区不同而变化。


              最重要的美国监管风险是 NYDFS Part 500 网络安全规定，它管辖包括纽约持牌保险公司在内的覆盖实体。作为纽约持牌保险公司，Coalition 必须遵守 2023 年 11 月生效的 Part 500
              更新要求，包括年度合规认证、CBO（Chief Information Security Officer）指定、渗透测试和事件报告义务。违规会让 Coalition 面临执法行动，包括吊销牌照。


              战争除外条款是 Coalition 承保模型中严重性最高的法律风险。NotPetya 攻击（2017）之后，多个司法辖区的法院处理了被归因于国家行为者的网络攻击是否受战争除外条款覆盖的问题。New Jersey
              上诉法院在 Merck v. Ace American Insurance 一案中裁定（2024 年 1 月维持一审），战争除外条款不适用于 NotPetya，因为该条款措辞在网络语境下含糊不清。Lloyd's
              of London 随后要求自 2023 年 3 月起，所有 Lloyd's 网络保单都采用更新后的战争除外措辞，可能造成 Lloyd's 支持保单与非 Lloyd's
              支持保单在保障范围上的分裂。如果未来诉讼导致法院认定网络保单中的战争除外条款不可执行，Coalition 将面对国家行为者攻击的无上限暴露。


              数据隐私责任是另一个法律向量。Coalition 持有 100,000+ 家企业的敏感安全态势数据，包括漏洞扫描结果、访问凭据和事件记录。如果 Coalition 自有平台被攻破，所有投保人运营所在地都会产生
              GDPR、CCPA 以及潜在过失责任。California Insurance Department 对认可承保商 CIC 的监管，也为 California 投保人增加了一层合规要求。


              在国际市场上，Coalition 扩张到 8 个国家造成监管碎片化。UK 保险监管（PRA/FCA）、Australian APRA 要求、German BaFin 监管和 French ACPR
              牌照，各自施加不同的资本、行为和报告要求。8 个司法辖区中任一市场发生监管执法，都可能限制 Coalition 在该市场承保新业务的能力。


              研究线索中未发现针对 Coalition 或 CIC 的活跃监管执法、未决诉讼或重大监管违规的公开证据。
