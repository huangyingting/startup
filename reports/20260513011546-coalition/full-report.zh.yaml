      - number: '4.2'
        title: 定价与变现
        blocks:
          - type: paragraph
            body: >
              Coalition 的网络安全保险定价按风险调整，并用 Active Data Graph 核保；该图谱把外部威胁情报与投保客户特定技术信号整合在一起。Marsh 市场数据显示，2026 年美国 SMB
              网络安全保险保费中位数约为 $1,740，反映 2021–2022 年硬市场峰值后的走软环境。Coalition 的捆绑式主动监控模式，让公司在相对传统承保人提供有竞争力价格的同时，维持更低预期赔付率。


              经纪人佣金是主要渠道成本，美国商业网络安全保险通常为 GWP 的 10–15%；Coalition 未公开披露自己的具体佣金率，也未披露是否提供批量奖励或或有佣金。2026 年 5 月 Allianz 独家 10
              年合作的结构包括：Coalition 通过增持股权获得预付对价；与网络安全业务增长和盈利挂钩的绩效元素；以及 Allianz 进一步股权投资承诺。这一安排在财务上并不常见：它把渠道经济（Allianz
              作为容量和分销锚点）与股权合作结合起来，模糊了再保险项目成本和战略投资者回报之间的边界。


              Coalition 不对 Coalition Control（风险平台）或常规安全提醒另行收费。CIR 收费项目为事件级服务提供增量变现流，但该收入未单独披露，相比基于 GWP 的保费收入，规模不太可能显著。
