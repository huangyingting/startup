      - number: '5.2'
        title: 技术架构与 Active Data Graph
        blocks:
          - type: paragraph
            body: >
              Coalition 的技术架构围绕公司称为 Active Data Graph
              的自研数据层展开，它把外部攻击面遥测、网络理赔结果和威胁情报信号合在一起。这个统一数据模型有三类用途：（1）为保险承保动态评分风险；（2）通过 Coalition Control 实时推送告警；（3）校准
              Wirespeed 自动威胁检测模型。


              攻击面监控引擎持续扫描投保人的域名、IP 段和云资产，识别暴露服务、配置错误系统和已知存在漏洞的软件版本。这项扫描能力支撑了投保人在 Control 中看到的 Cyber Health Rating 分数。


              Wirespeed ADR 引擎用条件逻辑算法和概率式 AI 分诊威胁检测。平台以毫秒级分辨率运行，裁决中位耗时达到 1,801 milliseconds，并通过 ChatOps
              集成——Slack、Microsoft Teams、email 和 SMS——输出决策。告警噪音下降 99.99%，归因于自动分诊消除了误报并减轻分析师疲劳。Wirespeed 架构遵循 ISO
              2859，即国际认可的 Acceptable Quality Limit 标准。


              Control 通过有文档记录的集成连接器接入现有安全工具，包括 Microsoft Defender 和 SentinelOne。客户无需替换工具，就能在 Coalition 平台内看见安全态势。


              Coalition 的技术组织由 Chief Technology Officer Maha Virudhagiri 和 Chief Product Officer Frank Fumarola
              领导。工程团队还得到 Wirespeed 联合创始人 Tim MalcomVetter（GM，Coalition Security）和 Jake Reynolds（Head of
              Engineering，Coalition Security）的补强。
