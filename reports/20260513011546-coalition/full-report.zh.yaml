  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品模块与 Active Insurance 平台
        blocks:
          - type: paragraph
            body: >
              Coalition 交付的是它称为 Active Insurance
              的模式——一个把网络保险保障、持续安全工具、事件响应和威胁情报打包在一起的综合平台。这不同于传统网络险公司：后者只签发保单，并不实时介入安全运营。商业卖点围绕一个反馈闭环展开：安全数据提高承保精度，低风险投保人支付更低保费，理赔数据反过来打磨安全告警。


              旗舰非保险模块 Coalition Control 是一套 SaaS 安全平台，向所有投保人免费提供。Control 持续监控外部攻击面，生成动态 Cyber Health
              Rating，管理第三方供应商风险，提供映射到 NIST SP 800-53、SOC 2 Type II、CIS v8.1 的合规证据收集，并针对零日漏洞发出告警和修复指引。高级 Control 功能包括
              Wirespeed Automated Detection and Response（ADR）、Employee Security Awareness Training 和 Managed Email
              Security。


              保险产品已经大幅演进。截至 2025 年 4 月，Coalition 推出 Active Cyber Policy，这是一款重新设计的非认可市场网络险产品，将 11
              项此前只能通过批单加入的保障嵌入为基础保险协议。该保单包括 Vanishing Retention（无理赔年度激励）、Funds Transfer Fraud 早期报告的自留额降低、Affirmative AI
              Coverage（包括 deepfake 欺诈）以及 Any One Claim Coverage。适用对象为年收入最高 $5 billion 的组织，保额最高 $15 million。


              Coalition Incident Response（CIR）以 Coalition Security（Coalition 的独立关联公司）名义运营，提供 Digital Forensics and
              Incident Response（DFIR）服务。收购 Wirespeed 后，CIR 现在提供 Automated Detection and Response（ADR），借助概率式 AI 和 ISO
              2859 质量标准，裁决中位耗时为 1,801 milliseconds。
