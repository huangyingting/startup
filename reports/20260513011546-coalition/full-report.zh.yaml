      - number: '1.5'
        title: 反向因素与风险信号
        blocks:
          - type: paragraph
            body: >
              尽管 Coalition 市场地位强、增长轨迹清晰，尽调仍暴露出几项需要密切跟踪的风险。公司累计融资约 $800M，但仍未实现持续盈利；即使 2025
              年已有现金流为正的报道，激进国际扩张、重大研发投入和资本密集型保险核保叠加，仍让净利润时间表存疑。Blind
              等平台上的员工评价提到管理清晰度、职业发展、管理层方向和高流动率问题——这可能意味着快速增长中存在组织扩张摩擦。投保客户的网络损失仍处高位：Coalition 自己的 2025 Cyber Claims
              Report 显示，2024 年 60% 的索赔来自商业邮件泄露 (BEC) 或资金转移欺诈，平均勒索软件要价虽然同比下降 22%，仍约为 $1.1M。这组数据说明 Active Insurance
              的根本边界：面对复杂、快速移动的网络攻击，该模式能降低频率和严重程度，但无法彻底消除。商业模式还内生依赖创始人 CEO Joshua Motta，他是 Active Insurance
              概念的战略架构师。最后，2026 年 5 月 Allianz 合作虽然可能长期改写市场格局，也带来显著执行风险：一边整合大型传统保险公司的全球商业网络安全账簿，一边进入新市场，可能拉紧管理层带宽和运营能力。
