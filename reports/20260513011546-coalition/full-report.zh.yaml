      - number: '4.3'
        title: 单位经济与销售效率
        blocks:
          - type: paragraph
            body: >
              Coalition 的单位经济以强于同业的索赔表现为锚。2024 年，Coalition 投保客户的索赔次数比行业均值少 73%，索赔频率又同比下降 7%。这些数字虽为自报，且未独立审计，但 AM Best A-
              财务实力评级从方向上提供佐证，该评级会评估保险公司的损失经验。56% 的索赔在没有任何投保客户自付费用的情况下解决，反映了有效的 LAE 管理和 Coalition Incident Response 能力。


              获客完全由经纪人中介完成；Coalition 并不大规模直接面向终端客户销售。因此，CAC 主要是经纪人关系投入、佣金支付（计入 TI002），以及为生成经纪人线索所投入的营销 / 品牌支出。行业分析师引用的约
              89% 续保率，意味着投保客户留存强，相对获客成本具备有利客户生命周期价值。投保客户数从 2022 年的 160,000+ 降至 2026 年中约 100,000，约减少
              37%；原因可能是有意重新定价、更严格核保，或竞争流失——Coalition 尚未正式披露解释。


              Coalition Incident Response 在 2024 年平均把勒索软件付款谈低 60%，帮助投保客户以更低总成本解决索赔；这是可量化的 CIR
              运营结果，支撑留存价值主张，即使它不直接体现为收入。Coalition 2024 年通过与执法部门合作为投保客户追回 $31M，是一项有意义的索赔缓释结果。
