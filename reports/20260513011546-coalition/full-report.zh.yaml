      - number: '3.2'
        title: 直接 InsurTech 与 MGA 同业
        blocks:
          - type: paragraph
            body: >
              Coalition 最直接的竞争对手是 At-Bay、Cowbell、Corvus / Travelers 和 Resilience；它们都用技术赋能核保，瞄准重叠客户群，而 At-Bay 的 InsurSec
              定位几乎相同。


              At-Bay（加州 Mountain View；2016 年创立；CEO Rotem Iram）8 轮融资合计 $295.75M，其中包括 2021 年 7 月估值 $1.35B 的 $185M D 轮。其
              InsurSec 模式把网络安全保险与 Stance 平台（MDR、漏洞扫描、暗网监控、vCISO 顾问）配对，截至 2025 年拥有 40,000+ 投保客户和 $60 billion
              风险管理规模。At-Bay 通过 Stance MDR 实现 15 分钟平均修复时间，相比 Coalition 的 Wirespeed ADR 是一项差异化能力。At-Bay 于 2023 年 1 月收购
              At-Bay Specialty Insurance Company（一家 E&S P&C 承保人），获得接近准入承保的承保牌照能力。At-Bay 目前在投保客户数上约落后 Coalition 2.5–3 倍。


              Cowbell（加州 Pleasanton；2019 年创立）从 16 位投资者处融资 $208.3M，面向 SME，用 Cowbell Factor 方法做 AI 驱动风险评分。Cowbell
              没有自有保险承保人，而是依赖 Zurich North America 和 Swiss Re 提供容量。2025 年 6 月推出 Zurich Select Plus（模块化多险种 E&S
              产品），标志其向多险种专业平台演进。2025 年 11 月品牌刷新正式确认其扩张到纯网络安全之外。Cowbell 缺少自有承保人，相比 Coalition (CIC) 和 At-Bay，其精算数据优势受限。


              Corvus / Travelers：Corvus（马萨诸塞州 Boston；2017 年创立）于 2024 年 1 月被 Travelers 收购。收购前，Corvus 已融资 $160.8M，并开发了 AI
              驱动的 Smart Cyber 核保平台。收购后，Corvus 扩展 Tech E&O 产品，如今成为 Travelers 的 AI 赋能网络安全核保能力。Travelers 的全球分销、财务实力（Aa2 /
              AA）和准入承保牌照，是 Coalition 增长面临的最强传统承保人威胁。


              Resilience（纽约州 New York；2016 年创立）4 轮融资合计 $217M（2023 年 7 月 D 轮 $100M），以量化网络风险建模和企业 CISO 互动形成差异化。Resilience
              面向中端市场和企业账户，这一客群与 Coalition 核心市场相邻，但没有那么聚焦 SMB。
