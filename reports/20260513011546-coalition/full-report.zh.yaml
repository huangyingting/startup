      - number: '6.3'
        title: 具名客户证据与验证
        blocks:
          - type: paragraph
            body: >
              Coalition 不公开披露单个具名客户账户。考虑到其 SMB 客户基础，识别具体投保人会给客户带来隐私和竞争顾虑，这一点是合理的。因此，传统企业客户引用尽调路径——具名案例研究、客户引述新闻稿和大会证言——对
              Coalition 基本不可用。


              公开可得的主要客户证据，是 Coalition 年度 Cyber Claims Report 中的汇总结果统计；该报告由 Coalition 撰写，并未独立审计。关键指标包括理赔数量少 73%、64%
              已结案件客户零自付、追回资金 $158 million。这些指标有说服力，但由公司自行报告，最好有独立验证。


              Coalition
              的案例研究页面（coalitioninc.com/case-studies）提供按行业和理赔类型组织的匿名客户故事，可作为部署和结果的代理证据。这些案例描述真实场景，但不披露客户名称。Coalition 还发布
              Active Insurance in Action 一书，描述 10 个行业中的 20 个代表性事件场景。这些材料展示了用例广度，但不等同于具名客户引用。


              从可得数据看，Coalition 在 G2 上的评论很少（2021 年档案显示 G2 上没有评论），说明买方社区评论覆盖有限。这可能反映出其 SMB 经纪人中介分销模式：相比卖给 IT 买家的 SaaS
              产品，单个买方更不愿发布软件评论。


              Allianz 合作是最可见的具名客户关系：Allianz Commercial 本身是客户兼合作伙伴，向其商业网络险客户分销 Coalition 保单。这段关系提供了来自成熟保险买方的间接验证，证明
              Coalition 产品质量过关。


              研究线索中未发现重大客户投诉、流失事件、争议理赔或集体诉讼的已验证证据。Reddit MSP 社区关于 Coalition 网络保险的讨论被平台阻止，无法直接分析社区情绪。
