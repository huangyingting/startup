      - number: '1.4'
        title: 规模指标与里程碑
        blocks:
          - type: paragraph
            body: >
              Coalition 已在投保客户数、保费规模和地域覆盖上跑出显著运营规模。截至 2022 年底，公司以 Active Insurance 保护 160,000+ 投保客户。2022 年 6
              月融资时，年化总承保保费 (GWP) 超过 $775M，当时收入同比增速据报接近 200%。Coalition 的 Active Insurance 模式交出了可量化的投保客户结果：客户索赔次数比行业均值少
              73%；公司已代表投保客户追回 $158M 被盗资金；64% 已结案件没有产生投保客户自付损失。第三方估计显示，2024 年员工数约 700–767 人。关键里程碑包括：2021 年收购 Attune（MGA
              和商业保险经纪平台）；2023 年 1 月推出 Coalition Insurance Company，成为持有 AM Best A- 评级的全栈准入承保人；2025 年 4 月在美国剩余险市场推出重新设计的
              Coalition Active Cyber Policy；2025 年 11 月收购 Wirespeed（利用 AI 以毫秒级分拣威胁的自动化托管检测与响应平台）；2026 年 5 月宣布 Allianz
              全球商业网络安全保险组合迁移。截至 2025–2026 年，Coalition 已实现现金流为正，但尚未实现持续净利润，这与其激进国际扩张姿态一致。
