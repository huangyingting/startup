      - number: '8.2'
        title: 投资建议、信心与风险评级
        blocks:
          - type: paragraph
            body: >
              基于全部公开证据，对 Coalition 的建议是 **有条件推进，但保持继续研究姿态**。这不等于买入或持有评级——含义是：现有证据能支撑投资假设的可信度，但没有数据室访问，仍不足以承诺具体入场价格。


              置信度为 **中等**：该投资假设有差异化，也有结构性证据支撑（市场地位、Active Insurance 模式、Allianz 合作），但反向风险实质存在，财务数据缺失也让不确定区间没有上限。


              风险评级为 **中高**：第 7 章识别的五个风险项（相关损失、战争除外、再保险收紧、AI-BEC 升级、Allianz 集中度）单独看都可管理，但合在一起，会形成多项风险同时叠加的尾部情景。


              估值立场是：**2022 年 $5B 标记价处在合理到偏贵之间**，前提是：

              - GWP 估算为 $700M-$1B（基于 100,000-160,000 名保单持有人、$4,000-$7,000 综合平均保费）

              - 对已具规模、且有技术差异化的保险公司，5-7x GWP 的收入倍数是合理的

              - 但 $5B 标记价定在 2021-2022 年 insurtech 估值高峰；此后公开 insurtech 倍数已压缩 40-60%

              - Allianz 合作和 Wirespeed 收购是 2022 年标记价之后的积极进展，部分抵消了倍数压缩


              如果 Coalition 实际 GWP 处在高端（$1B+），且损失率低于 65%，$5B 估值是合理的。如果 GWP 为 $700M、损失率高于 75%，估值就偏高。没有财务披露，无法下结论。


              目标回报 / 持有框架：以 $5B 入场的新投资，需要持有 3-5 年，直到 IPO 或战略收购。牛市情景下，$8-12B 的 IPO 或收购可在 $5B 入场价上产生 60-140% 回报；基准情景
              $5-7B，回报为 0-40%；熊市情景 $2-3B，亏损 40-60%。
            claimRefs:
