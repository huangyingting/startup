      - number: '6.5'
        title: 扩张、渠道依赖与集中风险
        blocks:
          - type: paragraph
            body: >
              Coalition 的主要增长杠杆是地理扩张（8 个市场已上线，更多市场在计划中）、产品扩张（通过 Allianz 承接企业客户，ADR 附加销售）和渠道扩张（新的经纪人关系）。Allianz
              合作是近期最大的扩张项目，因为它在没有新增获客成本的情况下，带来现成的企业商业客户基础。


              但 Allianz 合作也引入了合作伙伴渠道集中风险。如果 Allianz 关系恶化——原因可能是定价争议、监管变化、表现缺口或竞争变化——Coalition
              将立刻失去刚获得的企业客户分层。合作条款，包括独家安排、组合迁移机制和退出条款，均未公开披露。


              经纪人分销模式在结构层面造成渠道集中风险。Coalition 的客户获取管线完全流经持牌保险经纪人和代理。如果大型批发经纪人把首选供应商关系转向竞争对手——尤其是 CrowdStrike 或
              SentinelOne 支持的网络险公司带着经纪人分销激励入场——Coalition 的新业务管线可能明显放缓。


              Coalition 横跨 8 个国家的地理扩张带来监管复杂性。保险牌照、保障设计和理赔处理要求在各市场差异很大。UK、Australia、Germany、Denmark、Sweden 和 France
              各有不同的保险监管框架。Coalition 能否在全球交付一致的 Active Insurance 体验，尚未得到独立验证。


              落地后扩张逻辑：现有投保人可以通过添加高级 Control 功能（ADR、email security、training）、提高保额或增加地点，扩大与 Coalition 的关系。随着投保人数增长，Active
              Data Graph 的价值会复利累积；Wirespeed ADR 整合也创造了增购杠杆。不过，SMB 账户相较企业账户，扩张天花板有限。


              SMB 聚焦在结构上缓解了客户集中：单个 SMB 投保人很可能不超过总 GWP 的 0.1%。不过，Allianz 合作以及其他通过合作伙伴渠道引入的企业级账户，可能带来有意义的收入集中。Allianz
              组合迁移后，如果迁移中包含保费较高的大型企业账户，集中度画像将显著变化。
