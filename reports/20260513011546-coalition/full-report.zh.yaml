      - number: '8.3'
        title: 估值背景与入场纪律
        blocks:
          - type: paragraph
            body: >
              Coalition 最后一次公开披露的一级融资，是 2022 年 2 月 / 6 月以 $5B 投后估值完成的 $250M Series F。Mitsui Sumitomo Insurance 2025 年 5
              月的 $30M 战略投资披露为战略投资，不是一级股权轮，也没有披露估值标记。自 Series F 以来，公开渠道未披露二级市场交易或新一轮股权融资。


              $5B 估值背景：Series F 当时（2022 年中），头部保险科技公司交易倍数为 5-15x 收入，私人市场倍数也处在周期高点。全球网络保险市场处于硬费率周期，保费同比增长
              50-100%。两项因素共同支撑了较高的私人估值。2022 年以来：(1) 利率显著上行，压缩成长倍数；(2) 公开保险科技公司经历 40-70% 的倍数压缩（如 Lemonade、Hippo）；(3)
              2023-2024 年网络保险保费回落 15-25%；(4) 再保险成本上升。这些因素说明，2022 年 $5B 标记价带有显著的高峰年份风险。


              但 2022 年以来，三项进展利好 Coalition 估值：(1) Allianz 排他性全球合作（2026 年 5 月）是重大去风险事件，验证了技术平台，并提供了通向企业级规模的清晰路径；(2) 收购
              Wirespeed ADR 扩大产品护城河；(3) 160,000 名保单持有人证明 SMB 市场仍在增长。这些进展能否抵消宏观倍数压缩，就是估值争论的核心。


              稀释与清算优先权压力：Coalition 历轮一级股权融资合计已超过约 $775M。按 $5B 估值看，这意味着早期轮次之后已有显著稀释。清算优先权在后期 VC 投资中很常见，可能形成瀑布结构；在低于 $5B
              的退出情景里，排在普通股之前的投资人会拿走不成比例的退出收益。股权结构表和优先权层级并未公开披露。


              新投资的入场纪律原则：(1) 承诺前要求数据室访问；(2) 锚定当年 GWP 倍数，而不是 2022 年标记价；(3) 压测再保险可得性和战争除外情景；(4) 谈判取得清算优先权平等或上限；(5)
              要求管理层给出带波动边界的财务指引。
