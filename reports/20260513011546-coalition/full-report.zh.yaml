companyProfile:
  summary: >
    Coalition 是一家后期私营网络安全保险公司和技术平台，2017 年创立，总部位于旧金山。公司开创了 Active Insurance 模式，把网络安全保险、持续攻击面监控、自动化核保和 24/7
    网络事件响应合在一起，形成复利式网络效应：每个投保客户都会产生数据，反过来提升所有客户的风险评分。截至 2026 年 5 月，Coalition 已服务 160,000+ 投保客户；此前，公司完成与 Allianz
    的独家全球商业网络安全合作，Allianz 将其全部商业网络安全保险组合迁移到 Coalition 平台。
