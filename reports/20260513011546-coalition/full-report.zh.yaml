      - number: '3.5'
        title: 护城河耐久度与竞争风险
        blocks:
          - type: paragraph
            body: >
              Coalition 最耐久的护城河，是自有精算数据集（8+ 年、160k+ 投保客户、持续监控 5M+ 互联网暴露资产）和整合式承保人所有权（CIC 准入 + FIC
              剩余险）。这两项优势会相互强化：拥有承保人带来定价控制和损失反馈闭环，纯 MGA（Cowbell）和只做 E&S 的承保人很难同样快地复制。


              最重要的竞争风险，是 At-Bay 持续投入 InsurSec 模式并扩大规模。如果未来 3 年 At-Bay 将投保客户数差距缩小到 Coalition 的 2
              倍以内，数据护城河优势会收窄。次要风险是技术商品化：Microsoft Defender、CrowdStrike Falcon 和 SentinelOne 都在以低价向 SMB 监控扩张，可能让
              Coalition Control 免费平台这一差异化因子商品化。


              Allianz 合作（2026 年 5 月，10 年全球分销协议）是 Coalition 对冲规模劣势最重要的去风险动作，但也让公司在战略上依赖 Allianz 的销售优先级。反向证据是：Coalition
              投保客户数从约 160,000（2022 年）降至 2025 年约 110,000 名活跃投保客户，减少 31%，管理层尚未公开解释。


              截至 2026 年 5 月，美国没有任何州保险监管部门公开对 Coalition、At-Bay 或类似 InsurTech 网络安全保险公司的「监控 +
              保险」捆绑模式发布裁定或监管挑战；但随着模式扩大，监管格局可能演变。
