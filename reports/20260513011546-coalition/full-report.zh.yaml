      - number: '7.6'
        title: 缓释措施、否决标准与尽调问题
        blocks:
          - type: paragraph
            body: >
              Coalition 对几项主要风险有结构性缓释。Active Insurance 模式本身就是对承保模型失效的缓释：实时监控提供反馈闭环，让 Coalition
              在理赔事件发生前识别安全态势恶化的投保人，并调整续保条款。Vanishing Retention 和 CIR 能力在初始保单绑定之后也会降低理赔频率。


              NYDFS Part 500 合规义务既是风险，也是一种自我缓释纪律。年度网络安全认证和 CISO 指定要求，会倒逼组织安全卫生，降低 Coalition 自有平台被攻破的风险。Coalition
              的信任页面和已披露的 SOC 2 合规（如果持续维持）进一步证明内部安全控制。


              关联损失风险主要靠再保险结构管理。Coalition 的灾难性损失暴露受再保险塔高度和起赔点限制。带有巨灾保障的良好再保险项目，是系统性网络事件的主要缓释工具。不过，Coalition
              再保险项目的结构——再保险塔高度、起赔点、复效条款——没有公开披露。


              Allianz 依赖风险部分由 Coalition 既有 100,000+ SMB 客户基础缓释。即便 Allianz 关系终止，Coalition 仍会保留核心 SMB
              账簿。不过，企业增长轨迹和合作解散的声誉影响都会很大。


              否决标准是需要重新评估投资逻辑的具体可测触发点：


              1. **战争除外条款无效裁定**：州最高法院或联邦巡回法院裁定战争除外条款在网络保险保单中不可执行，将使 Coalition 针对国家行为者攻击的主要除外失效。监控信号：Merck 相关或 Lloyd's
              除外条款诉讼中的活跃上诉。


              2. **CIR 在大规模伤亡事件下容量崩塌**：Coalition 的 CIR 团队无法响应同时影响 1,000+
              名投保人的大规模网络事件，导致恶意拒赔索赔或监管制裁。监控信号：服务中断报告、监管投诉、集体诉讼备案。


              3. **再保险合约无法以可接受条款续约**：Coalition 无法以精算合理价格续签主要网络巨灾再保险合约，被迫减少承保容量，或接受无上限关联损失暴露。监控信号：Swiss Re/Munich Re
              网络再保险容量公告。


              4. **Allianz 合作解散**：Allianz 在公告后 24 个月内退出全球独家合作，带走 60,000+ 名投保人和企业渠道。监控信号：Allianz 年报、Insurance Business
              Magazine 报道。


              5. **核心市场监管撤牌**：NYDFS 或 California DOI 因合规失败吊销或暂停 Coalition Insurance Company 牌照。监控信号：NAIC RIRS、州 DOI
              执法行动。
