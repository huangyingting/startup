  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与范围
        blocks:
          - type: paragraph
            body: >
              网络安全保险市场是商业财产与意外险 (P&C) 的子赛道，为机构承保网络攻击、数据泄露、勒索软件、商业邮件泄露 (BEC)、隐私责任和数字风险带来的财务后果。市场包含两类保障：独立网络安全保单，只覆盖网络风险，到
              2025 年占全部网络安全保费的 72%（AM Best）；以及打包进一般责任险、职业责任险或技术 E&O 保单的网络安全附加条款（28%）。市场规模测算纳入的支出是商业网络安全保险保单产生的总承保保费
              (GWP) 或直接承保保费 (DWP)，覆盖第一方损失（业务中断、勒索、数据恢复、危机管理）和第三方责任（隐私责任、监管罚款、受影响方诉讼）。市场边界之外包括：个人 /
              消费者网络安全保险产品、默默覆盖网络风险的一般 P&C 保险（所谓「silent cyber」）、网络安全技术支出（SIEM、EDR、SOC/MDR
              服务）、技术供应商提供的网络安全保证，以及参数型网络安全产品。现状替代方案包括自保（大型企业用公司资产负债表承接网络损失）、专属自保项目、托管检测与响应 (MDR)
              服务（解决频率但不解决财务损失规模），以及完全不购买网络安全保险（全球约 90% SME 的常态）。最重要的相邻市场是主动 / 前置风险管理市场——Coalition Control
              这类服务介于传统网络安全与被动保险之间，模糊了 Coalition 所开创的市场边界。
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
