      - number: '2.4'
        title: 增长驱动与采用催化剂
        blocks:
          - type: paragraph
            body: >
              网络安全保险需求增长的主引擎，是底层威胁环境。勒索软件仍是成本最高的网络事件类别；Munich Re 的 2025 Cyber Insurance Risks and Trends
              报告把勒索软件列为网络安全保险损失的首要原因，出现在 44% 的全部入侵事件中（Verizon DBIR 2025）。商业邮件泄露 (BEC) 和资金转移欺诈 (FTF) 是最高频索赔类型，FBI
              数据显示，过去十年美国已报告 BEC 损失超过 $17 billion。IBM Cost of a Data Breach Report 2025 估计，全球平均数据泄露成本为 $4.4
              million——没有保险时，这一水平仍足以实质威胁中端市场和 SMB 的业务连续性。监管驱动越来越重要。2023 年 7 月，美国证券交易委员会 (SEC)
              通过规则，要求上市公司在重大网络安全事件发生后四个工作日内通过 Form 8-K 披露，并在 Form 10-K 中提供年度治理披露。这显著提升了上市公司董事会层面对网络责任的认知。欧盟 NIS2
              Directive（2024 年 10 月生效）要求 18 个行业的关键和重要实体采取风险管理措施并报告事件，直接推高欧洲网络安全保险需求；Howden 估计 2025 年欧洲网络安全保险保费同比增长
              28%。州级隐私法律（以加州 CCPA 为首，美国已有 20 多个州出台隐私立法）提高了处理个人数据机构的责任暴露。数字化转型驱动包括云迁移、远程办公常态化和 IoT
              扩散，都会扩大攻击面，并与更高网络安全保险需求相关。Munich Re 调查发现，87% 的 C 级别高管认为自身机构的网络保护不足，这意味着即使没有新的监管催化剂，需求增长仍能延续。
