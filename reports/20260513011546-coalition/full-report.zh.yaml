      - number: '2.5'
        title: 采用约束与反向证据
        blocks:
          - type: paragraph
            body: >
              尽管增长叙事成立，网络安全保险市场仍面临实质结构性约束，影响可触达市场落地和 Coalition 捕捉 TAM。2024–2026 年最重要的约束是费率走软：全球网络安全保险费率较 2022 年中峰值下降
              22%（Howden），美国费率在 2024 年 Q4 平均下降
              5%（Marsh）——这是连续七年上涨后的首次季度下调。新进入者带来的保险和再保险容量增加推动了这次修正，压低每张保单的保费收入，也降低了当前赔付率下网络安全核保的财务吸引力。系统性和相关性风险仍是该市场的生存级威胁。2024
              年 7 月 CrowdStrike 软件更新故障并非恶意事件，却在全球数百万企业中级联扩散，展示了系统性网络事件的灾难潜力。Munich Re 估计，200 年一遇事件的模型化累积潜在损失为 $20–46
              billion，可能超过当前全球网络安全保险市场的全部规模。再保险市场高度集中：Howden Re 的网络风险报告显示，前五大再保险公司持有 62% 市场份额，前十大占 87%（NAIC 2025
              报告）。一两家主要玩家撤出再保险，就可能显著限制一级市场容量。精算数据缺口也抑制市场增长：网络安全保险是年轻险种，历史索赔数据有限，难以准确建模损失，这让保险公司难以准确定价；但反过来，这也让 Coalition
              的 Active Insurance 路线（持续生成风险遥测）可能成为核保优势。最后，申请拒绝率很高：41% 的网络安全保险申请首次提交即被拒（Marsh McLennan），即便买方有动机，这一摩擦也会压低
              SMB 采用率。综合成本率稳定（2024–2025 年平均约 65–70%）与费率走软之间的矛盾提出了一个问题：市场是否低估了系统性风险；一旦发生重大灾难性网络事件，市场环境可能突然反转。
            claimRefs:
              - CM034
              - CM035
              - CM036
              - CM037
              - CM038
              - CM039
              - CM040
              - CM041
      - number: '2.6'
        title: 图表与要点
        blocks:
          - type: callout
            title: SME 渗透率：2030 年 $30–50B 机会
            body: >-
              全球只有 10% 的 SME 购买网络安全保险（Swiss Re），但网络风险是 60% SMB 业主最关心的问题之一。到 2030 年把 TAM 扩至 $30–50B，需要把 SME 采用率从 10% 推到
              30–40%。Coalition 凭借数字报价平台、$1,740 的 SMB 保费中位数，以及已被证明能降低索赔频率的 Active Insurance 模式，处在独特有利位置。
            calloutType: insight
            claimRefs:
              - CM015
              - CM017
              - CM018
          - type: callout
            title: 费率走软与系统性风险逆风
            body: >-
              网络安全保险市场的盈利能力（65–70% 综合成本率）掩盖了两项结构性风险：（1）费率较 2022 年峰值累计下滑 22%，如果索赔频率反弹，这一路径可能不可持续；（2）模型化的 200 年一遇灾难事件范围为
              $20–46B，单一事件就可能超过当前全球市场容量，进而触发再保险容量撤出和市场收缩。
