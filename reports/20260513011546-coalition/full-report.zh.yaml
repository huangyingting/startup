      - number: '5.4'
        title: 路线图与开发管线
        blocks:
          - type: paragraph
            body: >
              Coalition 公开披露的产品路线图很少——这与其私营公司身份和竞争定位一致。不过，可观察信号显示公司有几条正在推进的开发线。


              Wirespeed 整合（2025 年 11 月收购）是近期最重要的工程项目：把 Wirespeed 的 ADR 并入 Active Data
              Graph，让自动威胁遏制能够反馈实时保障决策。公司称该整合在发布时已经上线，说明初步集成已完成，但更深层融合仍在推进。


              Active Cyber Policy 于 2025 年 4 月上线，体现出保险产品开发有节奏推进。新增 Affirmative AI Coverage 和 Any One Claim
              Coverage，说明承保团队在主动跟踪新兴威胁向量和保单设计。


              Coalition 2026 年 4 月关于 Enhanced Business Recovery
              的博客更新宣布了一组批单，旨在保护收入、加快理赔结案，并在索赔期间维持业务运转。这说明产品正从纯预防扩展到理赔后场景。Risky Tech Ranking Q1 2026
              更新显示，公司继续投入威胁情报发布；这既是营销信号，也是数据收集机制。


              国际扩张轨迹（8 个市场）说明公司仍在投资地理分销。Coalition 尚未披露消费险、D&O/E&O 扩张或垂直行业专门网络险产品计划。
