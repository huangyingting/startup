      - number: '4.4'
        title: 成本结构与资本充足性
        blocks:
          - type: paragraph
            body: >
              Coalition 的主要运营成本驱动因素包括：（1）经纪人佣金（约为 GWP 的 10–15%）；（2）支付给 Ferian Re 和项目合作方的再保险分出保费；（3）Coalition Control 和
              Active Data Graph 的技术平台与基础设施成本；（4）Coalition Incident Response 人工和分包商成本；（5）截至 2026 年 3 月约 726
              名员工的管理费用。不同于软件公司或硬件密集型企业，Coalition 几乎没有实物 capex，也没有库存，按技术公司标准看资本强度较低——但 CIC 作为准入保险承保人的监管资本要求，是另一种资本承诺。


              2017 年至 2025 年 3 月，Coalition 已在九轮披露融资中募集约 $800M 股权。最近一轮是 Mitsui Sumitomo Insurance $30M 战略投资，重申 $5B
              投后估值。Ferian Re（约 $300M，BDT Capital 支持）是单独资本化实体，不并入 Coalition Inc. 资产负债表。2022 年 7 月 F 轮（$250M，由 Allianz X
              领投）和 2026 年 5 月 Allianz 合作（预付股权 + 绩效补偿 + 进一步股权投资承诺）体现了 Allianz 与公司深度财务绑定，降低近期独立融资风险，但也形成战略依赖集中。Wirespeed
              收购（2025 年 11 月）是一项技术资本支出；收购成本未公开披露。


              Coalition 未披露烧钱速度、现金余额或现金可支撑期。已确认的 2023–2024 年裁员、转向成本纪律，以及有利的索赔表现（索赔次数少
              73%）组合起来，说明公司可能接近运营盈亏平衡或盈利——但没有财务申报或管理层披露确认这一点。
