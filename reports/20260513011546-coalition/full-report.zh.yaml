      - number: '2.2'
        title: 市场规模——TAM、SAM、SOM
        blocks:
          - type: paragraph
            body: >
              多个权威来源交叉指向同一结论：2024–2025 年全球商业网络安全保险市场总承保保费 (GWP) 约为 $15.3–16.6 billion，但前瞻预测会随方法和假设期限显著变化。美国全国保险监督官协会
              (NAIC) 的 2025 Cybersecurity Insurance Report 是最权威的监管来源，显示美国市场 2024 年直接承保保费 (DWP) 为 $9.14
              billion（含外来剩余险）。这较 2023 年 $9.84 billion 收缩 7%，也是美国网络安全保险 DWP 有记录以来首次下降。全球最大再保险公司 Munich Re 估计，全球 GWP 在
              2024 年为 $15.3 billion、2025 年为 $16.3 billion，其中 $10.6 billion（69%）来自北美。Swiss Re 的 Cyber Data Lake 覆盖全球约 70%
              市场，估算 2025 年为 $16.6 billion，意味着较 2024 年增长 8%。Gallagher Re 自有 Cyber Industry Database 预计全球口径下 2024 年为 $14.8
              billion、2025 年为 $16.9 billion、2026 年为 $19.6 billion。Coalition 的 TAM 是全球商业网络安全保险可触达支出——按 GWP 计，2025 年约
              $15–17 billion。SAM 是北美商业网络安全保险，也就是 Coalition 已站稳的市场——按北美约 67–70% 的全球保费份额计，约 $10–11 billion。SOM（Coalition
              当前可获取市场）是美国商业 SMB 和中端市场网络安全保险，覆盖剩余险和准入市场，这是 Coalition 最直接竞争的区域。按 Coalition $775M+ GWP 年化口径（2022 年）和约 $10B
              北美市场计算，截至 2022 年中，Coalition 按年化口径约占北美商业网络安全保险市场 7–8%。关键在于，全球 SME（收入低于 $100M 的公司）只有 10% 购买了任何网络安全保险，而大型企业约为
              80%（Swiss Re）。这创造了持续的自然增长机会，Coalition 的数字优先模式正是为捕捉这类机会而设计。
