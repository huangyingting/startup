      - number: '4.5'
        title: 财务缺口与结论
        blocks:
          - type: paragraph
            body: >
              Coalition 是一家私营公司，没有在 SEC 注册的证券，没有公开可取得的 GAAP 财务报表，也没有能通过标准公共登记系统获取的法定年度报表。财务尽调中可信度最高的替代材料，是 Coalition
              Insurance Company（CIC）向州保险部门提交的年度法定财务报表（California、New York 及所有认可州 DOI），这些材料可通过 NAIC CIS 备案或州 DOI
              门户公开获取；但本轮研究受动态查询 URL 限制，尚未取回。


              主要财务缺口包括：（1）再保险分出后的 NWP——向 Ferian Re 和项目合作伙伴分出之后留下的保费收入，是最关键但未披露的财务指标，因为它决定了 Coalition 承保业务的真实规模；（2）GAAP /
              法定净利润或 EBITDA——目前没有盈利能力数据；（3）Allianz 组合迁移的财务量级——纳入 Allianz 的商业网络险账簿可能让 GWP 增加数亿美元，但具体规模未披露；（4）CIR
              独立收入和利润率——CIR 到底是有意义的收入来源，还是主要用于抵消理赔费用（LAE）的职能，仍不清楚。


              财务结论：在可评估维度上，Coalition 的收入质量较高——合同性保费、年度续期保单、较好的理赔表现，以及来自 Allianz、Arch 和 Swiss Re Corp Solutions
              的机构再保险支持。AM Best A- 评级独立验证了 CIC 的财务实力。核心风险不是收入质量，而是收入不透明：没有法定财务报表时，承保尽调必须从州保险部门备案中取得 CIC 的年度报表数据。Allianz
              10 年独家合作意义重大；如果组合迁移按暗示效果落地，Coalition 的 GWP 可能在 2–3 年内大约翻倍——但尽调投资人目前还无法验证这一预测。
