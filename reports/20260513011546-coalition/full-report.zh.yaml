        - 高——精算错误导致保费不足；人才流失削弱模型
        - 有竞争力的薪酬；机构知识文档化
        - 会见承保负责人；审查精算团队资质和留任情况
      - - CIR（网络事件响应）团队容量
        - 兼具营销和运营双重角色：CIR 质量驱动留存和续保
        - 中（扩张风险）
        - 高——大规模事件中 CIR 不足，会引发理赔争议和声誉损害
        - 人员扩张；手册标准化；升级规程
        - 审查 CIR 团队规模、事件负载、平均响应时间和升级流程
      - - 工程与平台团队（Coalition Control）
        - 平台可靠性和功能迭代速度取决于工程组织质量
        - 低-中
        - 中——平台退化会影响投保人体验和 CIR 效果
        - 有竞争力的工程薪酬；Wirespeed 整合带来人才
        - 审查工程人员规模、平台正常运行时间 SLA，以及 Wirespeed 后的组织结构
      - - 国际运营领导层
        - 8 国运营需要本地监管、法律和理赔经验
        - 中
        - 中——国际市场监管失误或理赔处理不当
        - 各市场本地招聘；法律顾问关系
        - 确认英国、澳大利亚、德国、法国本地领导梯队厚度
      - - 董事会与治理
        - 没有公开董事会构成信息；治理质量未知
        - 低（监管触发）
        - 中——治理失败可能触发投资者 / 合作伙伴退出
        - VC / 战略投资方的标准机构投资者治理要求
        - 索取董事会构成、委员会结构和治理文件
  - id: TR005
    title: 缓释与否决标准表
    claimRefs:
      - CR035
      - CR036
      - CR037
      - CR038
      - CR039
      - CR040
    notes: 否决标准是可量化触发项，一旦触发就需要立即重新评估投资论点。
    columns:
      - 风险
      - 可监测触发项
      - 阈值 / 事件
      - 行动含义
    rows:
      - - 相关性系统性损失事件
        - 影响 >500 名投保人的灾难性网络事件（勒索软件、供应链）
        - 单一事件理赔合计 >$500M；Coalition 若不耗尽再保险就无法赔付
        - 论点破裂：除非再保险足以覆盖敞口，否则退出或大幅减记
      - - 战争除外条款失效
        - 州最高法院或美国联邦巡回法院裁定，网络保单中的战争除外条款不可执行
        - 涉及 Lloyd's 更新版战争除外措辞的案件判决
        - 论点风险：Coalition 暴露于无上限的国家级攻击理赔；需要法律意见
      - - 再保险合约不续约
        - Swiss Re / Munich Re 宣布削减或退出网络再保险容量
        - 续约后 90 天内，Coalition 无法按原起赔点 / 定价落地再保险合约
        - 论点风险：Coalition 必须压降 GWP，或接受自留相关性损失；监测行业容量公告
      - - Allianz 合作关系解体
        - Allianz 宣布重组或退出全球网络保险合作
        - 宣布合作终止或业务量重大下降
        - 论点受损：GWP 可能损失 30-50%；单独评估 SMB 自有账簿质量
      - - 监管吊销牌照
        - NYDFS 或 CA DOI 对 CIC 采取正式执法行动或牌照限制
        - 提交牌照暂停、正式命令或同意协议
        - 受影响市场论点破裂：Coalition 失去承保准入市场业务的能力；经纪商关系影响会连锁传导
      - - 承保模型不利发展
        - 连续两个保单年度，赔付率明显恶化并高于行业基线
        - Coalition 连续两年综合成本率 >100% 或赔付率 >70%（若披露）
        - 论点受损：核心价值主张（更好结果）失效；保费充足性承压；需要重新审视承保并审查模型
