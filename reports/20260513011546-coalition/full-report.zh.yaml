  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Coalition 的投资逻辑建立在四个相互强化的结构性论点上。第一，全球网络保险市场正以 10-15% CAGR 增长，2030 年有望超过 $30B；Coalition 已经在美国 SMB
              这一最供给不足的买方群体中，成为技术差异化最明显的参与者。第二，Coalition 的 Active Insurance
              模式创造复利式竞争优势：更多投保人产生更多数据，数据改善风险模型，模型降低理赔频率，进而提高定价准确性和留存。第三，2026 年 5 月 Allianz 合作——Allianz 将其全球商业网络险组合独家迁移给
              Coalition——是目前能获得的最强第三方验证，证明 Coalition 平台质量，并提供 60,000+ 企业投保人、全球分销渠道和企业分层护城河。第四，收购 Wirespeed ADR 把
              Coalition 的价值主张扩展到终端检测与响应，在纯保险公司面前形成整合优势。


              反向逻辑由五个重大担忧支撑。第一，Coalition 没有披露 Series F 之后的任何财务表现数据：收入、损失率、综合成本率、烧钱速度和盈利轨迹全都未知。对于一家估值 $5B
              的公司，这让尽调必须跨过一个不同寻常的信任跃迁。第二，网络保险带有独特系统性风险：单个关联网络事件可能耗尽 Coalition
              的再保险保护，造成灾难性损失，而没有再保险结构数据就无法量化。第三，战争除外条款的法律框架尚未稳定——如果法院认定网络保单中的战争除外条款无效，Coalition 针对国家行为者攻击的除外保护就会消失。第四，AI
              驱动的 BEC 正在加快主要理赔类别的频率和严重程度（Coalition 理赔中 60% 是 BEC/FTF），威胁其理赔数量少 73% 的优势。第五，Allianz 合作造成单一伙伴集中风险：如果
              Allianz 退出，Coalition 可能失去其 GWP 增长轨迹中的 30-50%。


              决定投资逻辑是否压过反向逻辑的关键问题，是财务表现：如果 Coalition 在 SMB 账簿上实现 80%+
              综合成本率，并在规模化后接近盈亏平衡，投资逻辑就很有吸引力。如果损失率在恶化且公司仍在烧钱，反向逻辑就占上风。
