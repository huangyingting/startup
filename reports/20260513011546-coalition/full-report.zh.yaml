    title: 公司概览
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: >
              Coalition 是一家总部位于旧金山的网络安全和 InsurTech 公司，2017 年创立，使命是解决网络风险，建设更安全的数字经济。公司是全球第一家 Active Insurance
              提供商：这一模式把传统网络安全保险核保与前置、技术驱动的风险管理合在一起。传统保险公司通常事后定价、事后赔付；Coalition 则把持续攻击面监控、自动化漏洞提醒、全天候数字取证与事件响应 (DFIR)
              放进同一张保单。Coalition 既是持牌网络安全保险承保人——通过子公司 Coalition Insurance Company (CIC)，持有 AM Best A-
              评级——也是技术风险管理平台。公司服务医疗、零售、信息技术、法律、金融服务、能源等行业，客户从 SMB 到大型企业不等。Active Insurance
              模式会在保单起始时评估机构风险，在保单期内持续监控被保企业的外部攻击面，新漏洞出现时主动提醒投保客户，网络事件发生时快速响应。Coalition
              在七个国家运营：美国、加拿大、英国、澳大利亚、德国、丹麦和瑞典。2026 年 5 月，Coalition 与 Allianz Commercial 宣布一项具有转折意义的 10 年协议：Allianz
              将其全部独立商业网络安全保险组合迁移给 Coalition，Coalition 成为 Allianz 在所有商业客群里的独家全球网络安全保险合作伙伴。
