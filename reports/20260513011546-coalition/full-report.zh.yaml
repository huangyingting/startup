      - number: '3.6'
        title: 图表与要点
        blocks:
          - type: callout
            title: 整合式数据飞轮：Coalition 最耐久的护城河
            body: >-
              Coalition 的复合竞争护城河建立在自我强化的数据飞轮上：其 CIC 准入承保人从 160k+ 投保客户处积累 8+ 年精算损失数据，用于核保定价；更好的定价吸引更多 SMB
              账户；更多账户产生更多监控数据（5M+ 资产、零日提醒信号）；监控数据降低索赔频率（少 73%）；更低索赔改善赔付率，使 Coalition
              能比竞争对手提供更低保费或更宽保障，而后者受较差损失经验限制。At-Bay 正在搭建类似飞轮，但投保客户规模约落后 2.5 倍。Cowbell 缺少自有承保人组件，没有合作容量依赖就无法闭环。
            calloutType: strength
            claimRefs:
              - CP033
              - CP035
              - CP005
          - type: callout
            title: 投保客户数无法解释的下降，是关键尽调风险
            body: >-
              据再保险市场报道，Coalition 公开引用的投保客户数从 160,000+（2022 年）降至 2025 年约 110,000 名活跃投保客户，减少
              31%，管理层尚未公开解释。三种假设相互竞争：（1）有意优化组合——在费率下降时退出不盈利的 SMB 账户；（2）流失率上升，At-Bay 或 Cowbell
              以价格压低竞争；（3）重述活跃投保客户与已绑定投保客户的口径。如果是（2），这就是 Coalition 核心市场出现竞争替代的证据。在假定 Coalition 仍保持美国 SMB
              网络安全保险市场份额领先之前，必须先解决这个缺口。
            calloutType: risk
            claimRefs:
              - CP035
              - CP036
              - CP007
  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与收入来源
        blocks:
          - type: paragraph
            body: >
              Coalition 的主要收入来自年度商业网络安全保险保单产生的总承保保费 (GWP)。保单完全通过持牌保险经纪人分销，核保要么通过 Coalition Insurance Company（CIC，NAIC
              #29530，AM Best A-，2023 年起覆盖美国 50 个州 + DC）以准入方式进行，要么通过 Coalition Insurance Solutions（CIS，CA 牌照
              #0L76155）以剩余险方式进行。按 160,000+ 投保客户数、2022 年 7 月 F 轮披露的约 $4,844 隐含平均 GWP / 投保客户，并结合随后投保客户数降至约 100,000
              以及市场保费变化，2025 年 GWP 年化估计约为 $775M。


              GWP 中很大一部分分出给 Ferian Re（Coalition 的百慕大 3B 类专属再保险公司，2022 年 10 月由 BDT Capital Partners 出资约
              $300M）以及项目再保险合作方，包括 Allianz、Arch、Swiss Re Corp Solutions、Ascot Group 和 Vantage。CIC 和 CIS 的自留净承保保费 (NWP)
              未公开披露；分出比例是首要尽调未知项。


              Coalition Control 是网络风险管理平台，提供 AI 驱动提醒、漏洞扫描和监控，作为捆绑保费的一部分免费提供给所有投保客户，没有独立 SaaS 收入流。Coalition Incident
              Response (CIR) 以 Coalition Security 名义运营，提供收费 DFIR 和索赔相邻服务，但 CIR 收入没有单独披露，部分成本很可能在保险运营中被确认为损失调整费用
              (LAE)，而不是独立服务收入。
