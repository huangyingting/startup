  topStrengths:
    - >-
      Active Insurance model creates compounding network effects: more policyholders generate better risk data, enabling
      more competitive pricing and higher retention.
    - >-
      Allianz exclusive global commercial cyber partnership (May 2026) is the strongest available third-party product
      and platform validation.
    - >-
      160,000+ policyholders provides durable GWP base, estimated at $700M-$1B, with structural broker and Allianz
      channel switching costs.
    - >-
      Wirespeed ADR acquisition (November 2025) deepens the technology moat into endpoint detection and response,
      creating an upsell lever.
    - >-
      $30B+ growing cyber insurance market at 10-15% CAGR provides sustained tailwind regardless of competitive
      dynamics.
  topRisks:
    - >-
      Complete financial opacity: revenue, combined ratio, loss ratio, and burn are entirely unknown — the core
      valuation inputs cannot be verified from public evidence.
    - >-
      Systemic tail risk: a correlated cyber event could exhaust the reinsurance tower; the structure is undisclosed and
      cannot be stress-tested.
    - >-
      War exclusion legal uncertainty: post-Merck case law is unsettled; an adverse ruling would expose Coalition to
      uncapped nation-state attack losses.
    - >-
      Allianz partner concentration: the exclusive global partnership creates a single-partner dependency representing
      an estimated 30-50% of GWP growth trajectory.
    - >-
      2022 vintage valuation mark: the $5B Series F was priced at peak insurtech multiples and cyber insurance
      hard-market rates; both have since normalized or reversed.
  unresolvedGaps:
    - >-
      Reinsurance treaty structure: attachment points, aggregate limits, counterparties, and reinstatement provisions
      are entirely undisclosed.
    - >-
      Loss ratio by cohort: SMB organic book vs. Allianz enterprise transferred book is the single most important
      financial unknown for thesis validation.
    - 'Annual policyholder renewal rate and GRR: durability of the GWP base cannot be verified without retention data.'
    - >-
      Allianz partnership contractual terms: exclusivity period, exit provisions, revenue share, and change-of-control
      triggers are undisclosed.
    - >-
      Current-year GWP and forward revenue trajectory: the valuation scenario range narrows dramatically with even one
      year of disclosed GWP data.
