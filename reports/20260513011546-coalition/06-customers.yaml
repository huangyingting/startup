company:
  name: Coalition
chapter:
  number: 6
  title: Customers
  summary: "Coalition reported protecting 100,000+ policyholders as of its 2025 Cyber Claims Report, expanding to 160,000+ businesses following the May 2026 Allianz commercial cyber portfolio transfer. The customer base is dominated by U.S. SMBs distributed through wholesale and E&S brokers, with limited international penetration to date. Named customer evidence is not publicly disclosed; aggregate outcome proof (73% fewer claims, 64% zero out-of-pocket, $158M recovered) is the primary proxy. No retention rate, NPS, GRR, or cohort data is publicly available. Key risks: Allianz partnership creates partner channel concentration; broker dependency constrains direct relationship; no named customer references limit diligence depth."

sections:
  - id: section-customer-segments
    title: Customer Segmentation and Target Market
    body: |
      Coalition's target market is small-to-medium-sized businesses (SMBs) across the United States and seven additional markets: United Kingdom, Canada, Australia, Germany, Denmark, Sweden, and France. The core product — the Active Cyber Policy — is designed for organizations with up to $5 billion in annual revenue. This revenue ceiling positions Coalition's primary TAM below large enterprise accounts historically served by incumbent carriers such as Chubb, AXA XL, and Beazley.

      The buyer persona is primarily the Chief Financial Officer or Chief Operating Officer (budget authority), with IT security teams as users of the Coalition Control platform. In smaller SMBs, the broker often drives product selection. The payer is the business itself, through its commercial insurance budget.

      Coalition distributes exclusively through licensed insurance brokers, not through a direct-to-customer sales channel. In non-admitted (surplus lines) U.S. states, Coalition works with wholesale E&S brokers; in admitted-market states where the Coalition Insurance Company (CIC) is licensed, it works with retail agents as well as wholesale brokers. This channel model leverages broker relationships and avoids the cost of building a direct sales team, but creates dependency on intermediary relationships for customer acquisition.

      The Allianz partnership (May 2026) introduces a new customer segment: Allianz's existing global commercial cyber policyholders transitioning to Coalition's platform. This segment is enterprise-grade — larger organizations with more complex coverage needs — and represents a strategic expansion beyond Coalition's core SMB focus. Integration of enterprise accounts requires product-level adjustments to Coalition's coverage design and platform capacity.

      Across verticals, Coalition's claims data suggests concentration in professional services, technology, retail, and financial services — sectors with high BEC/FTF exposure. Healthcare is also a notable segment given high ransomware targeting. Vertical-specific product customization has not been publicly announced.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
    callouts:
      - calloutType: strength
        title: SMB Market Is Structurally Underserved by Incumbents
        body: "Coalition's focus on businesses up to $5B revenue addresses a market historically underserved by large commercial carriers who prioritize enterprise accounts. The bundled insurance-plus-security model is uniquely suited to SMB buyers who lack dedicated security teams."
        claimRefs:
          - CU001
          - CU003
      - calloutType: risk
        title: Allianz Enterprise Channel Requires Product Adaptation
        body: "The Allianz portfolio includes larger commercial accounts that may require coverage customization, higher limits, and service-level guarantees that Coalition's SMB-optimized platform may not yet fully support."
        claimRefs:
          - CU006
          - CU007
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: section-adoption-trajectory
    title: Adoption Trajectory and Scale
    body: |
      Coalition's publicly disclosed policyholder count has grown from an implied base at its 2022 Series F ($5 billion valuation) to 100,000+ policyholders contributing to the Active Data Graph as of the 2025 Claims Report, to 160,000+ businesses protected as of the May 2026 Allianz portfolio transfer announcement. This represents implied multi-year growth, though Coalition has not disclosed year-over-year new policyholder acquisition rates or renewal volumes.

      The 2022 Series F press release by GlobeNewswire describes Coalition as a market leader in cyber insurance for SMBs with operations across five countries at that time, indicating international expansion has continued since. The $250 million Series F, led by Allianz X, was raised to fund customer acquisition globally, underwriting technology, and the expansion of Coalition's admitted carrier.

      Coalition's claims data provides the most direct observable proxy for customer engagement and platform utilization. The 2025 Cyber Claims Report showed that BEC (Business Email Compromise) and FTF (Funds Transfer Fraud) together accounted for 60% of all claims, consistent with prior years. Coalition's proactive CIR response to FTF events — including real-time government and financial institution outreach — appears to have contributed to the $158 million in stolen funds recovered.

      The Allianz partnership materially changes the customer count trajectory. Allianz's commercial cyber insurance book globally represents a large, established enterprise customer base that will transfer to Coalition's platform. The scale of this transfer is not publicly quantified, but Allianz's commercial cyber portfolio is among the largest globally, suggesting this could represent tens of thousands of additional policy relationships.

      Coalition's Control platform, free with every policy, has 100% enrollment by all active policyholders as a condition of coverage. This ensures platform utilization data is co-extensive with the policyholder count, a structural advantage over SaaS businesses where free-tier activation lags paid conversion.
    claimRefs:
      - CU008
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
    callouts:
      - calloutType: strength
        title: 100% Control Adoption Is Structurally Enforced
        body: "Because Coalition Control is bundled with the policy and required for the Vanishing Retention benefit, all policyholders use the platform. This gives Coalition 100% platform utilization — unlike SaaS products where adoption is a separate challenge."
        claimRefs:
          - CU012
          - CU014
      - calloutType: risk
        title: Customer Count Methodology Not Independently Verified
        body: "Coalition's disclosed customer counts come from company self-reports. The difference between 100,000+ (pre-Allianz) and 160,000+ (post-Allianz) implies a significant number of new accounts, but the definition of 'protected' — active policyholders vs. historical or pending — is not specified."
        claimRefs:
          - CU008
          - CU009
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: section-customer-proof
    title: Named Customer Evidence and Proof
    body: |
      Coalition does not publicly disclose named individual customer accounts. This is consistent with its SMB customer base, where individual policyholder identification would create privacy and competitive concerns for customers. As a result, traditional enterprise customer reference diligence paths — named case studies, customer-quoted press releases, and conference testimonials — are largely unavailable for Coalition.

      The primary publicly available customer proof takes the form of aggregate outcome statistics from Coalition's annual Cyber Claims Report, which is authored by Coalition and not independently audited. Key metrics include the 73% fewer claims figure, 64% zero out-of-pocket closed claims, and $158 million in recovered funds. These metrics are compelling but are company-reported and would benefit from independent verification.

      Coalition's case studies page (coalitioninc.com/case-studies) provides access to anonymized customer stories organized by industry and claim type, which serve as proxy proof of deployment and outcomes. These case studies describe real scenarios but do not identify customers by name. Coalition also publishes its Active Insurance in Action book, which describes twenty representative incident scenarios across ten industries. These materials demonstrate use-case breadth but are not equivalent to named customer references.

      G2 reviews for Coalition were sparse as of the available data (the 2021 archive showed no reviews on G2), indicating that buyer community review coverage is limited. This may reflect the SMB broker-mediated distribution model, where individual buyers are less likely to publish software reviews, compared to SaaS products sold to IT buyers.

      The Allianz partnership represents the most visible named customer relationship: Allianz Commercial is itself a customer-as-partner, distributing Coalition policies to its commercial cyber clients. This relationship provides indirect validation of Coalition's product quality by a sophisticated insurance buyer.

      No verified evidence of major customer complaints, churn events, disputed claims, or class action litigation was found in the research trail. Reddit MSP community discussions about Coalition cyber insurance were blocked by the platform, preventing direct community sentiment analysis.
    claimRefs:
      - CU015
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
    callouts:
      - calloutType: risk
        title: Absence of Named Customer References Limits Diligence
        body: "No named SMB customer reference list, enterprise case studies, or independent review scores are publicly available. Diligence must rely on aggregate company-reported outcomes and inferences from partnership announcements."
        claimRefs:
          - CU015
          - CU016
      - calloutType: insight
        title: Allianz Serves as an Indirect Named Reference
        body: "Allianz Commercial transferring its global commercial cyber book to Coalition is the strongest available named customer validation — a sophisticated, globally regulated insurance buyer endorsing Coalition's platform at scale."
        claimRefs:
          - CU019
          - CU020
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: section-retention
    title: Retention, Durability, and Switching Costs
    body: |
      Coalition has not publicly disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), Net Promoter Score (NPS), renewal rates, customer lifetime value, or cohort-level retention data. These are the primary metrics for assessing customer durability in a subscription business.

      Observable proxy signals suggest strong retention dynamics. First, the bundled Active Insurance model — combining insurance coverage with an always-on security platform — creates meaningful switching costs that pure-play cyber insurance carriers cannot replicate. A policyholder who switches carriers must replace not just their policy but their security monitoring workflow, compliance evidence tooling, and incident response relationship. This increases the friction of churn relative to commodity insurance products.

      Second, the Vanishing Retention feature embedded in the Active Cyber Policy directly incentivizes renewal: policyholders who make no claims in a policy year receive a retention premium reduction (implied 10-25% range, exact percentage not disclosed). This aligns the financial interest of the policyholder with staying on the Coalition platform and maintaining strong security hygiene.

      Third, Coalition's reported 73% fewer claims relative to the industry suggests that policyholders experience meaningfully better outcomes on Coalition's platform — a self-reinforcing retention signal. If policyholders experience fewer incidents and fewer out-of-pocket losses, the value proposition for renewal is strong.

      Industry-level benchmarks for SMB cyber insurance retention suggest annual renewal rates of 78–85%, with active monitoring platforms achieving higher retention than passive insurers. Coalition's structural advantages suggest it should achieve retention at or above industry median.

      Coalition's broker-mediated distribution also affects retention: renewals are managed through brokers, who have strong commercial incentives to keep clients with Coalition if claim outcomes are favorable. Broker inertia (avoiding disruption of working relationships) is an additional retention factor.

      Key retention data gaps: actual GRR and NRR figures are management information and not publicly disclosed. Premium rate changes at renewal — a key retention-impacting factor — are not publicly disclosed.
    claimRefs:
      - CU021
      - CU022
      - CU023
      - CU024
      - CU025
      - CU026
    callouts:
      - calloutType: strength
        title: Bundled Platform Creates Structural Switching Costs
        body: "Coalition Control's integration into policyholder security workflows creates genuine switching costs unavailable in pure-play insurance. Vanishing Retention further ties financial incentives to renewal, reducing price-driven churn."
        claimRefs:
          - CU021
          - CU022
      - calloutType: risk
        title: No Public Retention Metrics Available for Diligence
        body: "GRR, NRR, NPS, and cohort data are not publicly disclosed. The estimated retention figures in this report are industry proxies. Actual retention data is a diligence-critical ask for any investment."
        claimRefs:
          - CU026
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: section-concentration-expansion
    title: Expansion, Channel Dependency, and Concentration Risk
    body: |
      Coalition's primary growth levers are geographic expansion (8 markets live, with more planned), product expansion (enterprise accounts via Allianz, ADR add-on), and channel expansion (new broker relationships). The Allianz partnership is the single largest near-term expansion initiative, as it adds a ready-made enterprise commercial customer base without new customer acquisition cost.

      However, the Allianz partnership also introduces a partner channel concentration risk. If the Allianz relationship deteriorates — due to pricing disputes, regulatory changes, performance gaps, or competitive shifts — Coalition would face immediate loss of the enterprise customer segment it gained. The terms of the partnership, including exclusivity arrangements, portfolio transfer mechanics, and exit provisions, are not publicly disclosed.

      The broker distribution model creates channel concentration risk at a structural level. Coalition's customer acquisition pipeline flows entirely through licensed insurance brokers and agents. If major wholesale brokers shift preferred vendor relationships to competitors — particularly if a CrowdStrike or SentinelOne-backed cyber insurer enters with broker distribution incentives — Coalition's new business pipeline could slow materially.

      Coalition's geographic expansion across 8 countries introduces regulatory complexity. Insurance licensing, coverage design, and claims handling requirements vary significantly across markets. The UK, Australia, Germany, Denmark, Sweden, and France each have distinct insurance regulatory frameworks. Coalition's ability to deliver a consistent Active Insurance experience globally is not independently verified.

      Land-and-expand dynamics: existing policyholders can expand their Coalition relationship by adding premium Control features (ADR, email security, training), increasing policy limits, or adding locations. The Active Data Graph compounds in value as policyholder count grows, and the Wirespeed ADR integration creates an upsell lever. However, SMB accounts have limited expansion ceiling compared to enterprise accounts.

      Customer concentration is structurally mitigated by the SMB focus: no single SMB policyholder likely represents more than 0.1% of total GWP. However, the Allianz partnership and any other enterprise-tier accounts introduced via partner channels could create meaningful revenue concentration. Post-Allianz portfolio transfer, if that transfer includes large enterprise accounts with high premiums, the concentration profile changes significantly.
    claimRefs:
      - CU027
      - CU028
      - CU029
      - CU030
      - CU031
      - CU032
    callouts:
      - calloutType: risk
        title: Allianz Dependency Is a Single-Point Partner Concentration Risk
        body: "The Allianz partnership adds substantial customer scale but creates a reversible dependency. If Allianz exits the partnership, Coalition loses its enterprise customer channel with limited ability to replicate it organically."
        claimRefs:
          - CU030
          - CU031
      - calloutType: strength
        title: SMB Diversification Mitigates Revenue Concentration
        body: "100,000+ SMB policyholders with no single account representing more than a fraction of GWP creates structural revenue diversification. The Allianz enterprise book is the primary concentration exception to this pattern."
        claimRefs:
          - CU027
          - CU028
    tableRefs: [TU005]
    figureRefs: []

