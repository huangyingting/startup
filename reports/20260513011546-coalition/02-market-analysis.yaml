  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: SOM-quantification
      missingEvidence: "Definitive US or global SMB/mid-market sub-segment size. No single authoritative source publishes a US SMB commercial cyber sub-market by revenue tier. The SOM figure ($2.5–3.5B) is a derived estimate from NAIC total market and segment share assumptions."
      whyItMatters: "Without a precise SOM figure, Coalition's implied market share calculation is imprecise. A buyer cannot assess whether Coalition's $775M+ GWP run rate reflects 7-8% of North America or a much larger share of a sub-segment."
      diligencePath: "Request Coalition's own SAM/SOM analysis from management; compare to broker market data from Marsh, Aon, or WTW commercial cyber segment breakdowns."
      relatedQuestionRefs: [QM005, QM025]

    - type: stale
      severity: minor
      topic: global-market-2026
      missingEvidence: "2026 global cyber insurance GWP has not yet been formally reported by NAIC (covers 2024 data), Munich Re, or Swiss Re as of May 2026. The most current authoritative market size figure is 2024 (NAIC) and the most current global estimate is 2025 (Munich Re/Swiss Re)."
      whyItMatters: "The market has been growing and the 2025-2026 trajectory is uncertain given rate softening. A market that declined in the US in 2024 may or may not have recovered in 2025-2026."
      diligencePath: "Monitor NAIC's 2026 cybersecurity insurance supplement when published (typically Q1 of following year); track Munich Re and Swiss Re annual market reports."
      relatedQuestionRefs: [QM001, QM002]

    - type: enumeration-incomplete
      severity: minor
      topic: segment-adoption-rates
      missingEvidence: "Precise cyber insurance adoption rates by revenue segment (SMB, mid-market, enterprise) for the US market specifically. Available data (Swiss Re: 10% SME global, 80% large corp) are global estimates, not US-specific."
