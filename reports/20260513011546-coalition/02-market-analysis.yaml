      diligencePath: "Access Marsh McLennan annual benchmarking study; request NAIC supplemental data by company revenue category."
      relatedTableRefs: [TM003]
      relatedQuestionRefs: [QM025]

    - type: enumeration-incomplete
      severity: minor
      topic: sizing-contradictions
      missingEvidence: "Significant variation in market sizing estimates across credible sources: Munich Re ($15.3B global 2024), Guy Carpenter ($16.6B global 2024), NAIC ($9.14B US 2024 incl. alien surplus lines), and aggressive analyst estimates ($20.94B 2025). The contradictions arise from different scope definitions (GWP vs DWP), coverage of alien surplus lines, and geographic scope."
      whyItMatters: "Investors and analysts should not use a single market size figure without understanding the definitional differences."
      diligencePath: "Standardize market size comparisons by scope: US DWP (admitted + alien surplus lines) per NAIC is the only data source with regulatory integrity; global GWP from Munich Re or Swiss Re is the best proxy for total addressable market."
