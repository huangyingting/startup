callouts:
  - calloutType: insight
    title: "SME Penetration: The $30–50B 2030 Opportunity"
    body: "Only 10% of global SMEs carry cyber insurance (Swiss Re), despite cyber risk being a top concern for 60% of SMB owners. The TAM expansion path to $30–50B by 2030 requires accelerating SME adoption from 10% to 30–40%—a market dynamic Coalition is uniquely positioned to address through its digital quoting platform, $1,740 median SMB premium point, and Active Insurance model that demonstrably reduces claims frequency."
    claimRefs:
      - CM015
      - CM017
      - CM018
  - calloutType: risk
    title: "Rate Softening and Systemic Risk Headwinds"
    body: "The cyber insurance market's profitability (65–70% combined ratios) masks two structural risks: (1) a 22% cumulative rate decline from the 2022 peak that may not be sustainable if claims frequency rebounds, and (2) a modeled 200-year catastrophic event range of $20–46B that could exceed the entire current global market capacity in a single event—potentially triggering reinsurance capacity withdrawal and market contraction."
    claimRefs:
      - CM034
      - CM036
      - CM037

