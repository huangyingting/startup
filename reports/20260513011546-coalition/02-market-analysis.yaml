  - id: buyer-segmentation
    title: Buyer & Payer Segmentation
    body: >
      The commercial cyber insurance buyer landscape segments into four primary tiers by company size and risk profile, each with distinct budget ownership, adoption dynamics, and purchase triggers. Large enterprises (annual revenue above $1 billion) are the most thoroughly insured, with approximately 80% carrying cyber coverage (Swiss Re). Purchasing decisions are owned by the CISO and CFO jointly, with budget approved at the board level; the primary adoption triggers are regulatory mandate compliance, SEC cyber disclosure requirements (effective December 2023 for public companies), audit committee scrutiny, and contractual obligations from enterprise customers. Coverage is typically layered, with primary policies from a lead insurer and excess capacity from multiple carriers, totaling $50–150M+ in coverage limits for the largest firms. The mid-market segment ($50M–$1B revenue) represents the fastest-growing buyer class; cyber insurance penetration in this segment is estimated at 40–60%, with budget ownership residing with the CFO or VP of Finance. Adoption is driven by cyber-specific contract requirements, broker recommendations at renewal, and post-breach anxiety after prominent industry incidents. SMB/small businesses (below $50M revenue) are the most underpenetrated segment globally, with adoption estimated at below 30% in the US and below 10% in Europe and Asia (Howden). Budget ownership rests with the owner-operator or controller; adoption friction includes price sensitivity and limited cybersecurity expertise to complete underwriting applications. Coalition targets SMBs in US surplus lines, where median annual premiums for sub-250-employee businesses stand at $1,740 in 2026 (Coalition data). Specialty verticals—particularly healthcare, financial services, and education—exhibit higher-than-median cyber risk and therefore higher adoption propensity, but also higher premiums (healthcare pays 42% premium above median per Gallagher) driven by HIPAA, SOX, and privacy liability exposure. Broker/agent channel is the dominant distribution mechanism for all commercial tiers; Coalition distributes through independent insurance brokers who can access Coalition's digital quoting platform.
