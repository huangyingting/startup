chapter:
  number: 2
  title: Market Analysis
  summary: "The global commercial cyber insurance market reached approximately $15.3–16.6 billion GWP in 2024–2025 and is forecast to double by 2030 at a 10–15% CAGR. The US, the world's largest cyber market, recorded $9.14 billion in direct written premium in 2024, its first-ever annual contraction (–7%), reflecting rate softening after the 2020–2022 hard market. Coalition's primary addressable market is the US and international commercial SMB and mid-market cyber insurance segment—a deeply underpenetrated niche where only ~10% of SMEs globally carry coverage. Growth is driven by escalating cyber threats, expanding regulations (SEC, NIS2, state privacy laws), and mandatory contract-driven adoption; constrained by correlated/systemic risk, reinsurance capacity concentration, rate softening, and underwriting data gaps."
sections:
  - id: market-boundary
    title: Market Boundary & Scope
    body: >
      The cyber insurance market is a sub-segment of commercial property and casualty (P&C) insurance covering organizations against the financial consequences of cyberattacks, data breaches, ransomware, business email compromise (BEC), privacy liability, and related digital risks. The market encompasses two forms of coverage: standalone cyber policies, which exclusively cover cyber risk and represent 72% of all cyber premiums by 2025 (AM Best), and packaged cyber endorsements bundled into general liability, professional liability, or technology E&O policies (28%). The spend included in market sizing calculations is gross written premium (GWP) or direct written premium (DWP) from commercial cyber insurance policies—covering first-party losses (business interruption, extortion, data restoration, crisis management) and third-party liability (privacy liability, regulatory fines, lawsuits from affected parties). Excluded from market boundary: personal/consumer cyber coverage products, general P&C insurance that silently covers cyber risk (so-called "silent cyber"), cybersecurity technology spend (SIEM, EDR, SOC/MDR services), cyber warranties from technology vendors, and parametric cyber products. Status-quo substitutes include self-insurance (large enterprises accepting cyber losses from corporate balance sheets), captive insurance programs, managed detection and response (MDR) services (which address frequency but not financial magnitude), and zero cyber insurance coverage (prevalent among ~90% of global SMEs). The most important adjacency is the active/proactive risk management market—services like Coalition Control that occupy the space between traditional cybersecurity and passive insurance, blurring the market boundary that Coalition pioneered.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
    tableRefs:
      - TM001

  - id: market-sizing
    title: Market Sizing — TAM, SAM, SOM
    body: >
      Multiple authoritative sources triangulate the global commercial cyber insurance market at $15.3–16.6 billion in gross written premium (GWP) for 2024–2025, with material variation in forward projections depending on methodology and assumption horizon. The US National Association of Insurance Commissioners (NAIC) 2025 Cybersecurity Insurance Report—the most authoritative regulatory source—places the US market at $9.14 billion in direct written premium (DWP) in 2024 (including alien surplus lines). This represents a 7% contraction from $9.84 billion in 2023—the first recorded decline in US cyber insurance DWP. Munich Re, the largest global reinsurer, estimates global GWP at $15.3 billion in 2024 and $16.3 billion in 2025, with $10.6 billion (69%) attributable to North America. Swiss Re's Cyber Data Lake—covering approximately 70% of the global market—estimates $16.6 billion for 2025, implying 8% growth from 2024. Gallagher Re's proprietary Cyber Industry Database projects $14.8 billion (2024), $16.9 billion (2025), and $19.6 billion (2026) on a global basis. The TAM for Coalition is the global commercial cyber insurance addressable spend—approximately $15–17 billion in 2025 on a GWP basis. The SAM is North America commercial cyber (Coalition's established market)—approximately $10–11 billion based on North America's ~67–70% share of global premiums. The SOM (Coalition's current obtainable market) is US commercial SMB and mid-market cyber in the surplus lines and admitted markets, where Coalition competes most directly. Based on Coalition's $775M+ GWP run rate (2022) and North America market of ~$10B, Coalition represented approximately 7–8% of the North America commercial cyber market as of mid-2022 on a run-rate basis. Critically, only 10% of global SMEs (companies with revenue below $100M) carry any cyber insurance, compared to approximately 80% of large corporates (Swiss Re). This creates a persistent organic growth opportunity that Coalition's digital-first model is specifically designed to capture.
