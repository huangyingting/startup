companyProfile:
  summary: >
    Coalition is a late-stage private cyber insurer and technology platform founded in 2017 and headquartered in San Francisco.
    It pioneered the Active Insurance model — combining cyber insurance with continuous attack surface monitoring, automated
    underwriting, and 24/7 cyber incident response — to create a compounding network effect where each policyholder generates
    data that improves risk scoring for all. As of May 2026, Coalition serves 160,000+ policyholders following the completion
    of an exclusive global commercial cyber partnership with Allianz, which transferred Allianz's entire commercial cyber
    portfolio to Coalition's platform.
  foundedDate: "2017-01-01"
  founders:
    - name: Joshua Motta
      role: Co-founder / CEO
      background: Former CIA officer and serial cybersecurity entrepreneur; architected the Active Insurance model and led all eight funding rounds.
      claimRefs: []
    - name: John Hering
      role: Co-founder
      background: Co-founder of Lookout (mobile security); contributed early technical and security strategy to the Coalition platform.
      claimRefs: []
  foundingLocation: San Francisco, CA
  headquarters: San Francisco, CA
  productSummary: >
    Coalition sells Active Cyber Insurance policies to SMB and enterprise customers, bundled with Coalition Control (free
    attack surface monitoring), Coalition Incident Response (24/7 breach response), and — post-Wirespeed acquisition — an
    Active Directory Response (ADR) endpoint detection module. The product is distributed through a broker network and,
    as of May 2026, through the Allianz global commercial channel.
  customerFocus: US SMBs (primary), US mid-market, and — post-Allianz — global commercial enterprises across all Allianz markets.
  businessModel: >
    Gross written premium (GWP) from cyber insurance policies; reinsurance treaty to cap net retained losses; platform SaaS
    value embedded in the insurance bundle (Coalition Control, ADR); potential for premium security services revenue from
    ADR/MDR tier.
  stage: Late-stage private (Series F, 2022)
  fundingStatus: >
    $250M Series F at $5B valuation (February/June 2022); $30M strategic investment from Mitsui Sumitomo Insurance (May 2025);
    total disclosed primary equity funding approximately $805M+.
  disclosureProfile: private-undisclosed
  claimRefs: []
summary:
  headline: >
    Coalition is the most differentiated technology-enabled cyber insurer in the US market, but complete financial opacity
    and the unpriced risk of systemic tail events mean a conditional proceed — not a buy — until the data room confirms
    the financial thesis.
