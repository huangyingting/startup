  - id: TM004
    title: Growth drivers and constraints table
    columns:
      - Factor
      - Direction
      - Timing
      - Mechanism / Description
      - Implication for Coalition
      - Diligence Ask
    rows:
      - - Ransomware frequency and severity escalation
        - Tailwind
        - Immediate; ongoing
        - >-
          Ransomware in 44% of breaches (Verizon DBIR); leading cause of cyber insurance claims (Munich Re); motivates
          coverage purchase
        - Primary demand driver; validates Active Insurance's prevention-first model
        - Track Munich Re and Coalition's own loss experience annually
      - - SEC cybersecurity disclosure rules (July 2023)
        - Tailwind
        - Active since Dec 2023
        - >-
          Public companies must disclose material cyber incidents within 4 days (Form 8-K) and annually report
          governance (Form 10-K); elevates board-level cyber liability awareness
        - Increases demand among US public companies for comprehensive cyber coverage and pre-incident management
        - Assess Coalition's penetration of publicly traded company customer base
      - - EU NIS2 Directive compliance (effective Oct 2024)
        - Tailwind
        - Active since Oct 2024
        - >-
          18 sectors mandated to adopt risk management and incident reporting; drove 28% YoY European cyber premium
          growth in 2025 (Marsh McLennan)
        - Validates Coalition's European market expansion; Allianz partnership provides European distribution access
        - Monitor NIS2 enforcement actions and their impact on Coalition's European policyholder growth
      - - US state privacy legislation (CCPA and 20+ state laws)
        - Tailwind
        - Active; expanding
        - >-
          Privacy liability exposure expands as more states enact data protection laws; increases third-party liability
          claims potential
        - Expands Coalition's liability coverage value proposition; may drive product innovation for privacy coverage
        - Track state-by-state legislative pipeline; assess claims from privacy lawsuits
      - - Digital transformation and cloud adoption
        - Tailwind
        - Long-term (3-5 year horizon)
        - >-
          Expanded attack surface from cloud migration and IoT; 75% increase in cloud intrusions in 2023 (Munich Re);
          creates new insurable exposure
        - Continuously expands Coalition's addressable risk universe; drives new product development
        - Assess Coalition's product coverage for cloud-specific risks
      - - SMB cyber insurance adoption gap
        - Tailwind (opportunity)
        - Long-term
        - >-
          Only ~10% of global SMEs carry cyber insurance (Swiss Re); 90%+ remain uninsured; US SMB median premium $1,740
          per year
        - Coalition's largest organic growth opportunity; Active Insurance and digital quoting lower acquisition cost
        - Monitor SMB adoption rates; assess Coalition's market share in sub-$50M revenue segment
      - - Cyber insurance rate softening
        - Headwind
        - Active since 2022-2023; accelerating 2025
        - >-
          Global rates down 22% from 2022 peak (Howden); US Q4 2024 rates down 5% (Marsh); new capacity entrants fueling
          competition
        - Compresses GWP growth per-policy; may not offset volume growth; tests Coalition's pricing discipline
        - Monitor Coalition's rate adequacy and combined ratio trends; compare vs market benchmarks
      - - Systemic / correlated cyber risk (CrowdStrike event model)
        - Headwind
        - Low-frequency, high-severity
        - >-
          CrowdStrike July 2024 outage caused cascading losses across millions of businesses; modeled 200-year
          accumulation event: $20-46B (Munich Re)
        - >-
          Could make some cyber exposures temporarily uninsurable; stress-tests Ferian Re capacity; risk to all cyber
          insurers
        - Assess Coalition's stress-test scenarios; review reinsurance treaty terms and capacity commitments
      - - Reinsurance market concentration
        - Headwind
        - Structural; persistent
        - >-
          Top 5 reinsurers hold 62% of cyber reinsurance market (Howden Re); if 1-2 withdraw, primary market capacity
          could shrink meaningfully
        - >-
          Risk to Coalition's capacity partners including Ferian Re; Allianz as both equity investor and capacity
          partner creates concentration risk
        - Review Ferian Re's reinsurance protection; assess counterparty concentration
      - - Application denial rates and underwriting friction
        - Headwind (adoption barrier)
        - Active; persistent for SMB
        - >-
          41% of cyber insurance applications rejected on first submission (Marsh McLennan); high friction for SMB
          buyers
        - Coalition's pre-screening and digital assessment tools may reduce friction vs. incumbents
        - Track Coalition's application acceptance rate vs. industry benchmark; assess adverse selection risk
    notes: >-
      Data sources: NIS2 timing from EU official records; US state privacy laws from IAPP 2025 (cited in Marsh); rate
      decline data from Howden 2025 and Marsh Q4 2024 market update; adoption gap from Swiss Re; SEC rules from SEC.gov
      press release; systemic accumulation estimates from Munich Re.
