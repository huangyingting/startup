  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Target Market
        blocks:
          - type: paragraph
            body: >
              Coalition's target market is small-to-medium-sized businesses (SMBs) across the United States and seven
              additional markets: United Kingdom, Canada, Australia, Germany, Denmark, Sweden, and France. The core
              product — the Active Cyber Policy — is designed for organizations with up to $5 billion in annual revenue.
              This revenue ceiling positions Coalition's primary TAM below large enterprise accounts historically served
              by incumbent carriers such as Chubb, AXA XL, and Beazley.


              The buyer persona is primarily the Chief Financial Officer or Chief Operating Officer (budget authority),
              with IT security teams as users of the Coalition Control platform. In smaller SMBs, the broker often
              drives product selection. The payer is the business itself, through its commercial insurance budget.


              Coalition distributes exclusively through licensed insurance brokers, not through a direct-to-customer
              sales channel. In non-admitted (surplus lines) U.S. states, Coalition works with wholesale E&S brokers; in
              admitted-market states where the Coalition Insurance Company (CIC) is licensed, it works with retail
              agents as well as wholesale brokers. This channel model leverages broker relationships and avoids the cost
              of building a direct sales team, but creates dependency on intermediary relationships for customer
              acquisition.


              The Allianz partnership (May 2026) introduces a new customer segment: Allianz's existing global commercial
              cyber policyholders transitioning to Coalition's platform. This segment is enterprise-grade — larger
              organizations with more complex coverage needs — and represents a strategic expansion beyond Coalition's
              core SMB focus. Integration of enterprise accounts requires product-level adjustments to Coalition's
              coverage design and platform capacity.


              Across verticals, Coalition's claims data suggests concentration in professional services, technology,
              retail, and financial services — sectors with high BEC/FTF exposure. Healthcare is also a notable segment
              given high ransomware targeting. Vertical-specific product customization has not been publicly announced.
