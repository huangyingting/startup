      - number: '7.6'
        title: Mitigations, Kill Criteria, and Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Coalition has structural mitigations for several of its primary risks. The Active Insurance model is
              itself a mitigation against underwriting model failure: real-time monitoring provides feedback loops that
              allow Coalition to identify policyholders with degraded security postures and adjust renewal terms before
              claim events. The Vanishing Retention and CIR capabilities reduce claim frequency even after the initial
              policy is bound.


              The NYDFS Part 500 compliance obligation is both a risk and a self-mitigating discipline. By requiring
              annual cybersecurity certification and CISO designation, it forces organizational security hygiene that
              reduces Coalition's own platform breach risk. Coalition's trust page and disclosed SOC 2 compliance (if
              maintained) further attest to internal security controls.


              The correlated loss risk is managed primarily through reinsurance structuring. Coalition's catastrophic
              loss exposure is bounded by the height and attachment points of its reinsurance tower. A well-structured
              reinsurance program with catastrophe cover provides the primary mitigation for systemic cyber events.
              However, the structure of Coalition's reinsurance program — tower height, attachment points, reinstatement
              provisions — is not publicly disclosed.


              The Allianz dependency risk is partially mitigated by Coalition's pre-existing SMB customer base of
              100,000+. Even if the Allianz relationship terminated, Coalition would retain its core SMB book. However,
              the enterprise growth trajectory and reputational impact of a partnership dissolution would be material.


              Kill criteria represent the specific measurable triggers at which the investment thesis would need to be
              re-evaluated:


              1. **War exclusion void ruling**: A state supreme court or federal circuit ruling that war exclusions are
              unenforceable in cyber insurance policies would void Coalition's primary carveout for state-actor attacks.
              Monitoring signal: active appeals in Merck-related or Lloyd's exclusion litigation.


              2. **CIR capacity collapse under mass-casualty event**: Coalition's CIR team is unable to respond to a
              mass cyber event affecting 1,000+ policyholders simultaneously, resulting in bad faith claims or
              regulatory sanctions. Monitoring signal: service outage reports, regulatory complaints, class action
              filings.


              3. **Reinsurance treaty non-renewal at acceptable terms**: Coalition is unable to renew its primary cyber
              catastrophe reinsurance treaty at actuarially sound pricing, forcing it to either reduce underwriting
              capacity or accept uncapped correlated loss exposure. Monitoring signal: Swiss Re/Munich Re cyber
              reinsurance capacity announcements.


              4. **Allianz partnership dissolution**: Allianz exits the exclusive global partnership within 24 months of
              announcement, removing 60,000+ policyholders and the enterprise channel. Monitoring signal: Allianz annual
              reports, Insurance Business Magazine coverage.


              5. **Regulatory de-licensing in core market**: NYDFS or California DOI revokes or suspends Coalition
              Insurance Company's license due to compliance failures. Monitoring signal: NAIC RIRS, state DOI
              enforcement actions.
            claimRefs:
              - CR035
              - CR036
              - CR037
              - CR038
              - CR039
              - CR040
