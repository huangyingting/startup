      - number: '8.4'
        title: Bull, Base, and Bear Scenarios
        blocks:
          - type: paragraph
            body: >
              Valuation scenarios are constructed based on GWP estimates, loss ratio assumptions, and applicable
              valuation multiples for insurance and insurtech companies at analogous scale and stage.


              **GWP Estimate Basis:** 100,000-160,000 policyholders × blended average premium of $4,000-$7,000 per year
              = $400M-$1.1B GWP range. The wide range reflects uncertainty about enterprise vs. SMB mix and average
              premium differences. Base case: $700M GWP.


              **Bull Case ($8B-$12B valuation, 3-5 year horizon):**

              - Assumptions: Allianz enterprise book adds $300M+ GWP and proves durable; combined ratio achieves 85%;
              Coalition achieves $1.2B GWP by year 3; Wirespeed ADR creates $50M+ ARR from premium tier; reinsurance
              structure stable; IPO window opens at 10x GWP.

              - Exit path: IPO at 10-12x GWP ($12-14B) or strategic acquisition by a major P&C carrier (Travelers,
              Chubb, AXA) at 8-10x GWP.

              - Probability signal: requires all five of Allianz durable, strong financials, favorable reinsurance, war
              exclusion risk contained, and IPO market opening.


              **Base Case ($4.5B-$6.5B valuation, 3-5 year horizon):**

              - Assumptions: Allianz book moderately accretive; combined ratio 90-95%; GWP grows to $850M; premium
              platform generates moderate upsell; reinsurance mildly tightens; IPO at 6-8x GWP.

              - Exit path: IPO at 6-8x GWP ($5-7B) or late-stage secondary/structured exit.

              - Probability signal: requires continued SMB market leadership, stable loss ratio, and stable Allianz
              relationship.


              **Bear Case ($1.5B-$3B valuation):**

              - Assumptions: Allianz exits or underdelivers; loss ratio deteriorates to 75%+; reinsurance costs increase
              materially; AI-BEC acceleration erodes claims advantage; down-round or distressed sale at 2-3x GWP.

              - Exit path: strategic acquisition at 2-3x GWP ($1.4B-$2.1B) or IPO at depressed multiples.

              - Probability signal: triggered by any two of war exclusion ruling, Allianz exit, loss ratio
              deterioration, and reinsurance non-renewal.


              The key valuation pivot point is the loss ratio on the Allianz enterprise book: if enterprise accounts
              have higher loss ratios than the SMB book (as expected, given less precise risk scoring), the combined
              ratio will rise and multiples will compress accordingly.
            claimRefs:
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
      - number: '8.5'
        title: Comparable Set and Valuation Multiples
        blocks:
          - type: paragraph
            body: >
              Coalition's valuation is best assessed against a hybrid comparable set: technology-enabled cyber insurers
              (primary comparables), traditional cyber insurance leaders (structural comps), and cybersecurity platform
              companies (multiple reference).


              Direct comparables in the private cyber insurer segment: At-Bay raised $200M at a $1.35B valuation in 2022
              — approximately 1/4 of Coalition's mark at the time; Cowbell raised $100M Series C at a $1.5B valuation
              (2023); Resilience raised $100M Series D at an undisclosed valuation (2024). These comps suggest Coalition
              commands a material premium to direct cyber insurer peers, which is justified by Coalition's scale (10x+
              policyholder count vs. At-Bay) and the Allianz validation.


              Traditional cyber insurance benchmarks: Beazley (LSE: BEZ), a leading global cyber insurer, trades at
              approximately £4-5B market cap with cyber insurance as a significant portion of its book. Beazley's GWP
              was approximately £5B in 2024 (all lines), implying a 0.8-1.0x GWP multiple — well below Coalition's
              implied 5-7x. However, Beazley is a traditional insurer without Coalition's technology platform,
              commanding lower multiples.


              Cybersecurity platform comps: CrowdStrike (NASDAQ: CRWD) trades at 15-20x revenue with a $70-80B market
              cap, reflecting its SaaS-like subscription model and market leadership. While not directly comparable
              (CrowdStrike is a pure cybersecurity platform without insurance), the premium multiple reflects the value
              of active protection plus data network effects — the same architectural thesis as Coalition. Coalition's
              insurance-anchored model limits its addressable multiple vs. pure SaaS but provides revenue predictability
              via GWP that pure SaaS lacks.


              M&A reference: Travelers acquired Corvus Insurance (cyber insurtech) in 2024 at an estimated $200-280M —
              consistent with a 1.5-2.5x GWP multiple for an early-stage cyber insurer without Coalition's scale or
              platform differentiation.


              Cross-reference inference: Coalition's defensible premium to direct cyber insurer comps is justified by
              scale and technology differentiation. A reasonable range for Coalition vs. Cowbell (1.5B at similar stage)
              is 3-5x premium based on policyholder count difference. Coalition's multiple relative to Beazley is
              explained by tech platform and growth trajectory. The 5-7x GWP multiple range is supportable as the
              central case, with risk-adjusted downside to 2-3x GWP.
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
          - type: table
            tableRef: TV004
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
      - number: '8.6'
        title: Exit Readiness and Final Diligence Asks
        blocks:
          - type: paragraph
            body: >
              Coalition is exit-ready in a bull scenario but faces several structural prerequisites for a liquidity
              event. For an IPO, Coalition would need to: (1) demonstrate two or more years of profitable underwriting
              with a disclosed combined ratio; (2) complete the Allianz enterprise integration and show loss ratio
              parity with the SMB book; (3) achieve $1B+ GWP run rate for market capitalization support at intended
              multiples; (4) resolve or hedge the war exclusion litigation risk; (5) establish sustainable reinsurance
              at defined attachment points. The probability of all five conditions being met within 36 months is
              moderate.


              For a strategic acquisition, the most likely acquirers are major P&C insurance companies (Travelers,
              Chubb, AXA, Zurich, Allianz itself), global reinsurers seeking primary market exposure (Munich Re, Swiss
              Re), and large cybersecurity platform companies seeking insurance distribution (CrowdStrike, Palo Alto
              Networks). The Allianz exclusive partnership may reduce the universe of willing acquirers — if the
              partnership includes exclusivity language that creates acquirer friction.


              Exit timeline: given the 2022 Series F date and typical VC fund life cycles, the primary Series F
              investors (including Allianz X as lead) would prefer a liquidity event by 2026-2028. The Allianz
              partnership, completed May 2026, could accelerate an M&A path with Allianz as acquirer, or serve as a
              strategic floor value signal to competing acquirers.


              The final diligence package that must be reviewed before investment commitment consists of six items, in
              order of criticality: (1) reinsurance treaty structure; (2) loss ratio by cohort (SMB vs. Allianz
              enterprise); (3) annual renewal rate and GRR; (4) current-year GWP and revenue trajectory; (5) Allianz
              partnership contractual terms (exclusivity, exit, revenue share); (6) NYDFS Part 500 annual certification
              filing status.


              Thesis-break triggers: the five triggers identified in Chapter 7 apply equally here. In addition, if
              management confirms that the combined ratio has exceeded 100% for any trailing 12-month period, the
              financial risk profile escalates significantly. Any adverse NYDFS enforcement action or failure to renew
              the reinsurance treaty at current terms would represent immediate thesis-break events.
            claimRefs:
