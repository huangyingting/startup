      - number: '3.5'
        title: Moat Durability and Competitive Risk
        blocks:
          - type: paragraph
            body: >
              Coalition's most durable moats are its proprietary actuarial dataset (8+ years, 160k+ policyholders, 5M+
              internet-exposed assets continuously monitored) and integrated carrier ownership (CIC admitted + FIC
              surplus lines). These two advantages compound: owning the carrier provides pricing control and loss
              feedback loops that pure MGAs (Cowbell) and E&S-only carriers cannot replicate as quickly.


              The most material competitive risk is At-Bay's sustained investment in the InsurSec model with growing
              scale. If At-Bay closes the policyholder count gap to within 2x of Coalition over the next 3 years, the
              data moat advantage narrows. A secondary risk is technology commoditization: Microsoft Defender,
              CrowdStrike Falcon, and SentinelOne are all expanding into SMB monitoring at low price points, potentially
              commoditizing Coalition Control's free platform differentiator.


              The Allianz partnership (May 2026, 10-year global distribution agreement) is Coalition's most significant
              de-risking move against scale disadvantage -- but creates strategic dependency on Allianz's sales
              priorities. Adverse evidence: Coalition's policyholder count declined from ~160,000 (2022) to ~110,000
              active policyholders in 2025 -- a 31% reduction that management has not publicly explained.


              As of May 2026, no US state insurance department has publicly issued a ruling or regulatory challenge to
              the bundled monitoring + insurance model operated by Coalition, At-Bay, or similar InsurTech cyber
              insurers, though the regulatory landscape could evolve as the model scales.
