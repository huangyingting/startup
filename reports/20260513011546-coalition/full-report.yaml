      - number: '5.3'
        title: Trust, Security & Compliance
        blocks:
          - type: paragraph
            body: >
              Coalition's product carries multiple layers of trust and compliance requirements. As a licensed insurer
              across eight countries, Coalition Insurance Company (CIC) is subject to state and national insurance
              regulatory oversight, which imposes solvency, reserving, and consumer protection requirements.


              Coalition Control's security features include compliance checklist generation mapped to major frameworks —
              NIST SP 800-53, SOC 2 Type II, and CIS v8.1 — allowing policyholders to use Control for dual-purpose risk
              management and compliance evidence collection. This reduces the cost of compliance for SMBs, a meaningful
              differentiator for the target market.


              The Wirespeed platform's ISO 2859 adherence provides a process-level quality standard for threat detection
              consistency, though this is an internal quality standard, not an independent security audit.


              Coalition has not publicly disclosed SOC 2 attestation for its own platform, third-party penetration test
              results, or bug bounty program details. For an enterprise selling security products, the absence of public
              third-party security attestation is a notable gap. Coalition Control processes sensitive customer security
              posture data, which creates privacy and data custody obligations — privacy policy and data processing
              agreements exist but are not published in full.


              Coalition's Active Cyber Policy includes Affirmative AI Coverage, covering AI-related threats including
