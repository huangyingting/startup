      - number: '6.2'
        title: Adoption Trajectory and Scale
        blocks:
          - type: paragraph
            body: >
              Coalition's publicly disclosed policyholder count has grown from an implied base at its 2022 Series F ($5
              billion valuation) to 100,000+ policyholders contributing to the Active Data Graph as of the 2025 Claims
              Report, to 160,000+ businesses protected as of the May 2026 Allianz portfolio transfer announcement. This
              represents implied multi-year growth, though Coalition has not disclosed year-over-year new policyholder
              acquisition rates or renewal volumes.


              The 2022 Series F press release by GlobeNewswire describes Coalition as a market leader in cyber insurance
              for SMBs with operations across five countries at that time, indicating international expansion has
              continued since. The $250 million Series F, led by Allianz X, was raised to fund customer acquisition
              globally, underwriting technology, and the expansion of Coalition's admitted carrier.


              Coalition's claims data provides the most direct observable proxy for customer engagement and platform
              utilization. The 2025 Cyber Claims Report showed that BEC (Business Email Compromise) and FTF (Funds
              Transfer Fraud) together accounted for 60% of all claims, consistent with prior years. Coalition's
              proactive CIR response to FTF events — including real-time government and financial institution outreach —
              appears to have contributed to the $158 million in stolen funds recovered.


              The Allianz partnership materially changes the customer count trajectory. Allianz's commercial cyber
              insurance book globally represents a large, established enterprise customer base that will transfer to
              Coalition's platform. The scale of this transfer is not publicly quantified, but Allianz's commercial
              cyber portfolio is among the largest globally, suggesting this could represent tens of thousands of
              additional policy relationships.


              Coalition's Control platform, free with every policy, has 100% enrollment by all active policyholders as a
              condition of coverage. This ensures platform utilization data is co-extensive with the policyholder count,
              a structural advantage over SaaS businesses where free-tier activation lags paid conversion.
