      - number: '4.3'
        title: Unit Economics and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              Coalition's unit economics are anchored by strong claims performance relative to peers. In 2024, Coalition
              policyholders experienced 73% fewer claims than the industry average, with claims frequency declining an
              additional 7% year-over-year. These figures, while self-reported and not independently audited, are
              directionally corroborated by AM Best's A- financial strength rating, which evaluates the insurer's loss
              experience. The 56% rate of claims resolved without any policyholder out-of-pocket expense reflects
              effective LAE management and Coalition Incident Response capabilities.


              Customer acquisition is exclusively broker-mediated; Coalition does not sell directly to end customers at
              scale. CAC is therefore primarily the cost of broker relationship investment, commission payments
              (captured in TI002), and marketing/brand spend to generate broker pipeline. The approximate 89% renewal
              rate (cited by industry analysts) implies strong policyholder retention and a favorable customer lifetime
              value relative to acquisition cost. Policyholder count declined from 160,000+ in 2022 to approximately
              100,000 as of mid-2026, a ~37% reduction that represents either intentional repricing, stricter
              underwriting, or competitive losses — the explanation has not been officially disclosed by Coalition.


              Coalition Incident Response negotiated ransomware payments down by an average of 60% in 2024, enabling
              policyholders to resolve claims at lower total cost; this is a measurable CIR operational outcome that
              supports the retention value proposition even where it does not directly appear as top-line revenue.
              Coalition's recovery of $31M for policyholders via law enforcement cooperation in 2024 is a meaningful
              claims mitigation outcome.
