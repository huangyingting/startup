  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Cyber Insurance Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              The US commercial cyber insurance market is contested by two structurally distinct competitor tiers:
              technology-native InsurTech MGAs that bundle active risk monitoring with insurance coverage, and incumbent
              specialty carriers that rely on financial strength, broker relationships, and post-breach services.
              Coalition pioneered the integrated Active Insurance model in 2017 and, as of 2025, remains the largest
              tech-native cyber insurer by policyholder count at approximately 110,000 active policyholders and ~$775M
              annualized GWP.


              The InsurTech MGA segment includes At-Bay ($295.75M raised, 40,000+ policyholders, InsurSec platform),
              Cowbell ($208.3M raised, SME AI underwriting, Zurich partnership), Corvus (acquired by Travelers January
              2024, AI underwriting integrated), and Resilience ($217M raised, enterprise CISO focus). The most
              strategically significant competitive event was Travelers' ~$435M acquisition of Corvus, validating the
              InsurTech model while arming an incumbent with AI underwriting capability and global distribution.


              The incumbent carrier tier is dominated by Beazley (Lloyd's specialty, Beazley Breach Response), Chubb
              (world's largest publicly traded P&C insurer, enterprise cyber ERM), AXA XL (AXA Group P&C division), and
              Zurich (partnered with Cowbell for Zurich Select Plus in 2025). Incumbents' primary advantages are
              financial strength ratings, global broker distribution, multi-line cross-sell, and established reinsurance
              relationships -- but they have materially less pre-breach technology investment than Coalition. The
              competitive risk for Coalition is convergence: as Travelers/Corvus demonstrates, the gap narrows when
              incumbents acquire or build comparable underwriting and monitoring technology.
