  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Risk Landscape Overview and Severity Ranking
        blocks:
          - type: paragraph
            body: >
              Coalition's risk profile is shaped by the inherent characteristics of the cyber insurance business: policy
              risk is correlated (a single attack can trigger hundreds of simultaneous claims), the threat environment
              is adversarially evolving (attackers adapt specifically to defeat defenses), and the regulatory
              environment is fragmented across jurisdictions with inconsistent frameworks. These structural features
              create risks materially different from property-casualty or general liability insurance.


              The five primary risk vectors in descending severity are: (1) correlated systemic cyber loss event —
              low-probability, catastrophic-impact; (2) reinsurance market unavailability — medium-probability,
              high-impact; (3) war exclusion litigation invalidation — low-probability, critical-impact on policy
              enforceability; (4) underwriting model failure from novel threat patterns — medium-probability,
              high-impact; (5) Allianz partnership concentration — medium-probability, high revenue impact.


              All five risks interact: a correlated loss event could simultaneously stress the reinsurance tower,
              trigger war exclusion litigation if the event has state-actor attribution, and potentially breach the
              Allianz revenue guarantee. Coalition's risk architecture is therefore not additive but multiplicative
              under tail scenarios.


              Investment-implication: the risk profile supports investment if (a) the reinsurance structure is verified
              as stable and well-capitalized, (b) the underwriting model is validated against out-of-sample threat data,
              (c) loss ratios demonstrate stability over multiple claim years, and (d) the Allianz partnership terms
              include sufficient exit protection. Without management data room access, these conditions cannot be fully
              verified.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
