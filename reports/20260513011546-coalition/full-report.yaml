      - number: '3.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Integrated Data Flywheel: Coalition''s Most Durable Moat'
            body: >-
              Coalition's compound competitive moat rests on a self-reinforcing data flywheel: its CIC admitted carrier
              generates 8+ years of actuarial loss data from 160k+ policyholders, which informs underwriting pricing;
              better pricing attracts more SMB accounts; more accounts generate more monitoring data (5M+ assets,
              zero-day alert signals); that monitoring data reduces claims frequency (73% fewer claims); lower claims
              improve loss ratios, which enable Coalition to offer lower premiums or broader coverage than competitors
              constrained by worse loss experience. At-Bay is building a similar flywheel but trails by ~2.5x on
              policyholder scale. Cowbell lacks the proprietary carrier component and cannot close the loop without
              partner capacity dependency.
            calloutType: strength
            claimRefs:
              - CP033
              - CP035
              - CP005
          - type: callout
            title: Unexplained Policyholder Count Decline Is a Key Diligence Risk
            body: >-
              Coalition's publicly cited policyholder count declined from 160,000+ (2022) to approximately 110,000
              active policyholders in 2025 per reinsurance market reporting -- a 31% reduction that management has not
              publicly explained. Three competing hypotheses: (1) deliberate portfolio optimization -- exiting
              unprofitable SMB accounts as rates declined; (2) elevated churn where At-Bay or Cowbell undercut on price;
              (3) restatement of what counts as active vs. bound policyholders. If (2), this represents evidence of
              competitive displacement in Coalition's core market. This gap must be resolved before assuming Coalition
              maintains market-share leadership in US SMB cyber insurance.
