      - number: '5.5'
        title: Product & Technical Risk Assessment
        blocks:
          - type: paragraph
            body: >
              Coalition's product and technical model carries several structural risks that merit focused diligence.


              First, the security tooling depends on continuous data quality and coverage breadth. The Active Data Graph
              is only as accurate as Coalition's telemetry coverage of attack surfaces. If a material portion of
              policyholder assets fall outside automated scanning coverage — e.g., air-gapped systems, OT environments,
              non-standard cloud deployments — the Cyber Health Rating will misrepresent risk, potentially leading to
              underpriced policies and unexpected claims.


              Second, the Wirespeed integration introduces engineering execution risk. Merging a recently acquired
              automated MDR platform with an established insurance data lake is non-trivial. Integration failures could
              degrade detection performance, introduce false positives at scale, or create liability exposure if
              automated containment actions disrupt policyholder operations.


              Third, Coalition's AI and ML models are proprietary and unaudited. The conditional logic algorithm used by
              Wirespeed and the risk scoring models in Coalition Control are not subject to any disclosed independent
              audit, algorithmic fairness review, or model risk management governance disclosure. As AI-assisted
              underwriting and automated containment become mainstream, regulatory scrutiny of these models is
              increasing.


              Fourth, Coalition does not disclose technology partnerships beyond named integrations (Microsoft Defender,
              SentinelOne). Dependency on major vendors for security telemetry creates supplier concentration risk.
              Cloud infrastructure provider is not disclosed.
