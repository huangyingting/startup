      - number: '2.5'
        title: Adoption Constraints & Adverse Evidence
        blocks:
          - type: paragraph
            body: >
              Despite the growth narrative, the cyber insurance market faces material structural constraints that affect
              addressable market realization and Coalition's TAM capture. The most significant constraint in 2024–2026
              is rate softening: global cyber insurance rates declined 22% from their mid-2022 peak (Howden), and US
              rates fell 5% on average in Q4 2024 (Marsh)—the first quarterly rate decrease after seven consecutive
              years of increases. Increased insurer and reinsurer capacity from new market entrants has driven this
              correction, compressing premium revenue per policy and reducing the financial attractiveness of cyber
              underwriting at current loss ratios. Systemic and correlated risk remains the market's existential threat.
              The July 2024 CrowdStrike software update outage—a non-malicious event that cascaded across millions of
              businesses globally—illustrated the catastrophic potential of systemic cyber events. Munich Re estimates
              the modeled accumulation potential for a 200-year return period event at $20–46 billion, which could
              exceed the entire current global cyber insurance market. The reinsurance market is highly concentrated:
              Howden Re's cyber risk report shows the top five reinsurers hold 62% of market share and the top ten
              account for 87% (NAIC 2025 report). A reinsurance withdrawal by one or two major players could
              significantly constrain primary market capacity. Actuarial data gaps also hinder market growth: cyber is a
              young line of business with limited historical claims data for accurate loss modeling, making it difficult
              for insurers to price coverage accurately—a challenge that, paradoxically, makes Coalition's Active
              Insurance approach (which generates continuous risk telemetry) a potential underwriting advantage.
              Finally, application denial rates are high: 41% of cyber insurance applications are rejected on first
              submission (Marsh McLennan)—a friction point that suppresses SMB adoption even among motivated buyers. The
              contradiction between stable combined ratios (averaging ~65–70% in 2024–2025) and rate softening raises
              the question of whether the market is under-pricing systemic risk, which could lead to a sudden reversal
              in market conditions if a major catastrophic cyber event occurs.
            claimRefs:
              - CM034
              - CM035
              - CM036
              - CM037
              - CM038
              - CM039
              - CM040
              - CM041
