      - number: '6.4'
        title: Retention, Durability, and Switching Costs
        blocks:
          - type: paragraph
            body: >
              Coalition has not publicly disclosed Net Revenue Retention (NRR), Gross Revenue Retention (GRR), Net
              Promoter Score (NPS), renewal rates, customer lifetime value, or cohort-level retention data. These are
              the primary metrics for assessing customer durability in a subscription business.


              Observable proxy signals suggest strong retention dynamics. First, the bundled Active Insurance model —
              combining insurance coverage with an always-on security platform — creates meaningful switching costs that
              pure-play cyber insurance carriers cannot replicate. A policyholder who switches carriers must replace not
              just their policy but their security monitoring workflow, compliance evidence tooling, and incident
              response relationship. This increases the friction of churn relative to commodity insurance products.


              Second, the Vanishing Retention feature embedded in the Active Cyber Policy directly incentivizes renewal:
              policyholders who make no claims in a policy year receive a retention premium reduction (implied 10-25%
              range, exact percentage not disclosed). This aligns the financial interest of the policyholder with
              staying on the Coalition platform and maintaining strong security hygiene.


              Third, Coalition's reported 73% fewer claims relative to the industry suggests that policyholders
              experience meaningfully better outcomes on Coalition's platform — a self-reinforcing retention signal. If
              policyholders experience fewer incidents and fewer out-of-pocket losses, the value proposition for renewal
              is strong.


              Industry-level benchmarks for SMB cyber insurance retention suggest annual renewal rates of 78–85%, with
              active monitoring platforms achieving higher retention than passive insurers. Coalition's structural
              advantages suggest it should achieve retention at or above industry median.


              Coalition's broker-mediated distribution also affects retention: renewals are managed through brokers, who
              have strong commercial incentives to keep clients with Coalition if claim outcomes are favorable. Broker
              inertia (avoiding disruption of working relationships) is an additional retention factor.


              Key retention data gaps: actual GRR and NRR figures are management information and not publicly disclosed.
              Premium rate changes at renewal — a key retention-impacting factor — are not publicly disclosed.
