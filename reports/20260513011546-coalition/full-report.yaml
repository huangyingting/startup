      - number: '3.2'
        title: Direct InsurTech and MGA Peers
        blocks:
          - type: paragraph
            body: >
              Coalition's most direct competitors are At-Bay, Cowbell, Corvus/Travelers, and Resilience -- each
              targeting overlapping customer segments with technology-enabled underwriting and, in At-Bay's case,
              near-identical InsurSec positioning.


              At-Bay (Mountain View, CA; founded 2016; CEO Rotem Iram) raised $295.75M across 8 rounds including a $185M
              Series D at $1.35B valuation (July 2021). Its InsurSec model pairs cyber insurance with the Stance
              platform (MDR, vulnerability scanning, dark web monitoring, vCISO advisory), achieving 40,000+
              policyholders and $60 billion in risk under management as of 2025. At-Bay's 15-minute mean time to
              remediate via Stance MDR is a differentiating capability vs. Coalition's Wirespeed ADR. At-Bay acquired
              At-Bay Specialty Insurance Company (an E&S P&C carrier) in January 2023, giving it admitted-equivalent
              paper capability. At-Bay currently trails Coalition by approximately 2.5-3x in policyholder count.


              Cowbell (Pleasanton, CA; founded 2019) raised $208.3M from 16 investors and targets SMEs with AI-driven
              risk scoring via its Cowbell Factor methodology. Cowbell does not operate a proprietary insurance carrier
              -- depending on Zurich North America and Swiss Re for capacity. The June 2025 launch of Zurich Select Plus
              (modular multi-line E&S product) marks a strategic evolution to a multi-line specialty platform. The
              November 2025 brand refresh formalized this expansion beyond pure cyber. Cowbell's absence of a
              proprietary carrier constrains its actuarial data advantage relative to Coalition (CIC) and At-Bay.


              Corvus/Travelers: Corvus (Boston, MA; founded 2017) was acquired by Travelers in January 2024. Corvus had
              raised $160.8M pre-acquisition and developed an AI-driven Smart Cyber underwriting platform.
              Post-acquisition, Corvus expanded its Tech E&O product and now operates as Travelers' AI-enabled cyber
              underwriting capability. Travelers' global distribution, financial strength (Aa2/AA), and admitted carrier
              paper represent the most formidable incumbent threat to Coalition's growth.


              Resilience (New York, NY; founded 2016) raised $217M across 4 rounds (Series D $100M, July 2023) and
              differentiates through quantitative cyber risk modeling and enterprise CISO engagement. Resilience targets
              mid-market and enterprise accounts -- a segment adjacent to but less SMB-focused than Coalition's core
              market.
