  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity & Business Model
        blocks:
          - type: paragraph
            body: >
              Coalition is a San Francisco-based cybersecurity and insurtech company founded in 2017 with the mission to
              solve cyber risk and create a safer digital economy. The company operates as the world's first Active
              Insurance provider—a model that integrates traditional cyber insurance underwriting with proactive,
              technology-driven risk management. Unlike conventional carriers that price and pay claims reactively,
              Coalition combines continuous attack-surface monitoring, automated vulnerability alerts, and
              around-the-clock digital forensics and incident response (DFIR) into a single policy offering. Coalition
              is simultaneously a licensed cyber insurance carrier—through its subsidiary Coalition Insurance Company
              (CIC), which holds an A- AM Best rating—and a technology risk management platform. It serves businesses
              across sectors including healthcare, retail, information technology, legal, financial services, and
              energy, spanning SMBs to large enterprises. The Active Insurance model assesses an organization's risk at
              policy inception, monitors the insured's external attack surface throughout the policy term, proactively
              alerts policyholders when new vulnerabilities emerge, and provides rapid incident response when a cyber
              event occurs. Coalition operates in seven countries: the United States, Canada, the United Kingdom,
              Australia, Germany, Denmark, and Sweden. In May 2026, Coalition and Allianz Commercial announced a
              transformative 10-year agreement under which Allianz transitions its entire standalone commercial cyber
              portfolio to Coalition, establishing Coalition as Allianz's exclusive global cyber insurance partner
              across all commercial segments.
