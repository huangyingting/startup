      - number: '7.3'
        title: Operational and Technology Risks
        blocks:
          - type: paragraph
            body: >
              Coalition's operational model is built on the premise that proactive security monitoring prevents claims.
              This creates an operational risk that is the inverse of traditional insurers: if the prevention platform
              fails (Coalition Control data quality degrades, alert thresholds are wrong, or CIR response time is
              insufficient), claims frequency rises sharply without a corresponding reduction in premium rates until the
              next renewal cycle.


              The most severe operational risk is correlated systemic loss. A cyberattack targeting a shared
              vulnerability across thousands of Coalition's policyholders — analogous to the SolarWinds or Log4Shell
              events but affecting insured organizations — could trigger simultaneous claims that exceed Coalition's
              loss reserve and potentially its reinsurance tower. The 2017 NotPetya attack caused $10 billion+ in global
              losses; a future attack of equivalent or greater scale targeting SMB infrastructure (cloud services, VPN
              appliances, email platforms) could hit thousands of Coalition policyholders simultaneously. Swiss Re and
              Munich Re have both publicly warned about the systemic nature of cyber risk and their efforts to limit
              aggregate cyber exposure.


              Coalition's own platform security is an operational risk unique to its model. Coalition Control collects
              external attack surface data, vulnerability scan results, and security configuration information for
              100,000+ businesses. If Coalition's platform were breached, attackers would have access to a comprehensive
              map of security weaknesses for a large fraction of the insured SMB market. This makes Coalition a
              high-value target for both ransomware (extortion) and intelligence operations. Coalition's own security
              posture, SOC capabilities, and incident response for internal events are not publicly disclosed.


              Underwriting model calibration risk: Coalition's automated underwriting uses machine learning to price
              cyber risk based on external signals (scan data, dark web exposure, industry, revenue). As attackers adapt
              specifically to evade these signals — for example, adversarially optimizing their infrastructure to pass
              Coalition's risk scoring — the model's accuracy degrades. Novel attack patterns not in the training data
              (new ransomware strains, AI-enabled phishing at scale, supply chain attacks) could cause systematic
              premium inadequacy.


              CIR response capacity: Coalition's Cyber Incident Response team is available 24/7 to all policyholders.
              With 160,000+ policyholders post-Allianz, a mass-casualty cyber event could generate hundreds of
              simultaneous CIR requests, exceeding Coalition's response capacity. The quality and consistency of CIR
              response at scale has not been independently assessed.


              Wirespeed integration risk: the November 2025 acquisition of Wirespeed adds ADR capabilities but also
              integration risk. Wirespeed's technology must be integrated into Coalition's platform without degrading
              existing detection capabilities; staff integration, customer migration, and liability transfer are all
              operational variables.
