            body: >
              Coalition was co-founded in 2017 by Joshua Motta, who serves as CEO and co-founder. Motta brings a
              distinctive cross-disciplinary background spanning national security, technology, and finance: he was CXO
              and Head of Special Projects at Cloudflare (NYSE: NET, a $25B web infrastructure company), held positions
              at Goldman Sachs and the Central Intelligence Agency, and gained engineering experience at Microsoft—a
              rare combination of first-hand cyber threat intelligence and capital markets expertise that is central to
              the Active Insurance proposition. The company's leadership team is broad for a growth-stage private
              company. Jim Young serves as CFO overseeing financial operations and capital allocation. Shawn Ram leads
              as CRO responsible for broker distribution and GTM execution. Frank Fumarola serves as CPO driving product
              strategy. Maha Virudhagiri serves as CTO overseeing engineering and platform infrastructure. Tiago
              Henriques serves as Chief Underwriting Officer leading pricing, risk selection, and loss control. David
              Lynders leads insurance operations as Head of Insurance; John Littzi serves as General Counsel; Dylan
              Steele leads marketing as CMO; and Sisi Liu serves as Chief of Staff and Head of Strategy and Corporate
              Development. The leadership team reflects deep functional coverage across insurance operations,
              cybersecurity, technology, and capital markets. Allianz CEO Oliver Bäte currently sits as an independent
              Coalition board member and is expected to transition to a nominated director seat upon closing of the May
              2026 Allianz partnership. Key-person risk around Joshua Motta is material—he is the public face and
              strategic architect of Active Insurance, and any CEO succession would carry disproportionate strategic
