      - number: '6.3'
        title: Named Customer Evidence and Proof
        blocks:
          - type: paragraph
            body: >
              Coalition does not publicly disclose named individual customer accounts. This is consistent with its SMB
              customer base, where individual policyholder identification would create privacy and competitive concerns
              for customers. As a result, traditional enterprise customer reference diligence paths — named case
              studies, customer-quoted press releases, and conference testimonials — are largely unavailable for
              Coalition.


              The primary publicly available customer proof takes the form of aggregate outcome statistics from
              Coalition's annual Cyber Claims Report, which is authored by Coalition and not independently audited. Key
              metrics include the 73% fewer claims figure, 64% zero out-of-pocket closed claims, and $158 million in
              recovered funds. These metrics are compelling but are company-reported and would benefit from independent
              verification.


              Coalition's case studies page (coalitioninc.com/case-studies) provides access to anonymized customer
              stories organized by industry and claim type, which serve as proxy proof of deployment and outcomes. These
              case studies describe real scenarios but do not identify customers by name. Coalition also publishes its
              Active Insurance in Action book, which describes twenty representative incident scenarios across ten
              industries. These materials demonstrate use-case breadth but are not equivalent to named customer
              references.


              G2 reviews for Coalition were sparse as of the available data (the 2021 archive showed no reviews on G2),
              indicating that buyer community review coverage is limited. This may reflect the SMB broker-mediated
              distribution model, where individual buyers are less likely to publish software reviews, compared to SaaS
              products sold to IT buyers.


              The Allianz partnership represents the most visible named customer relationship: Allianz Commercial is
              itself a customer-as-partner, distributing Coalition policies to its commercial cyber clients. This
              relationship provides indirect validation of Coalition's product quality by a sophisticated insurance
              buyer.


              No verified evidence of major customer complaints, churn events, disputed claims, or class action
              litigation was found in the research trail. Reddit MSP community discussions about Coalition cyber
              insurance were blocked by the platform, preventing direct community sentiment analysis.
