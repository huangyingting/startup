      - number: '8.2'
        title: Recommendation, Confidence, and Risk Rating
        blocks:
          - type: paragraph
            body: >
              Based on the totality of publicly available evidence, the recommendation for Coalition is **conditional
              proceed with a research-more posture**. This is not equivalent to a buy or hold rating — it means the
              available evidence supports investment thesis credibility but is insufficient to commit to a specific
              entry price without data room access.


              The confidence level is **medium**: the thesis is differentiated and well-supported by structural evidence
              (market position, Active Insurance model, Allianz partnership), but the anti-thesis risks are material and
              the absence of financial data creates an unbounded uncertainty range.


              The risk rating is **medium-high**: the five risk vectors identified in Chapter 7 (correlated loss, war
              exclusion, reinsurance tightening, AI-BEC escalation, Allianz concentration) are individually manageable
              but collectively create a tail scenario where multiple risks compound simultaneously.


              The valuation stance is **fair to stretched at the $5B 2022 mark**, assuming:

              - GWP estimate of $700M-$1B (based on 100,000-160,000 policyholders at $4,000-$7,000 blended average
              premium)

              - Revenue multiple of 5-7x GWP is reasonable for a technology-differentiated insurer at scale

              - However, the $5B mark was set in the 2021-2022 peak insurtech valuation environment; public insurtech
              multiples have compressed 40-60% since then

              - The Allianz partnership and Wirespeed acquisition are positive developments since the 2022 mark,
              partially offsetting multiple compression


              If Coalition's actual GWP is at the high end ($1B+) and loss ratio is below 65%, the $5B valuation is
              fair. If GWP is at $700M and loss ratio is above 75%, the valuation is stretched. Without financial
              disclosure, this determination cannot be made.


              Target return/hold framework: a new investment at $5B would require a 3-5 year hold to IPO or strategic
              acquisition. A bull case IPO or acquisition at $8-12B would generate 60-140% return on a $5B entry. A base
              case at $5-7B generates 0-40%. A bear case at $2-3B generates a 40-60% loss.
            claimRefs:
              - CV007
              - CV008
              - CV009
              - CV010
              - CV011
