      - number: '6.5'
        title: Expansion, Channel Dependency, and Concentration Risk
        blocks:
          - type: paragraph
            body: >
              Coalition's primary growth levers are geographic expansion (8 markets live, with more planned), product
              expansion (enterprise accounts via Allianz, ADR add-on), and channel expansion (new broker relationships).
              The Allianz partnership is the single largest near-term expansion initiative, as it adds a ready-made
              enterprise commercial customer base without new customer acquisition cost.


              However, the Allianz partnership also introduces a partner channel concentration risk. If the Allianz
              relationship deteriorates — due to pricing disputes, regulatory changes, performance gaps, or competitive
              shifts — Coalition would face immediate loss of the enterprise customer segment it gained. The terms of
              the partnership, including exclusivity arrangements, portfolio transfer mechanics, and exit provisions,
              are not publicly disclosed.


              The broker distribution model creates channel concentration risk at a structural level. Coalition's
              customer acquisition pipeline flows entirely through licensed insurance brokers and agents. If major
              wholesale brokers shift preferred vendor relationships to competitors — particularly if a CrowdStrike or
              SentinelOne-backed cyber insurer enters with broker distribution incentives — Coalition's new business
              pipeline could slow materially.


              Coalition's geographic expansion across 8 countries introduces regulatory complexity. Insurance licensing,
              coverage design, and claims handling requirements vary significantly across markets. The UK, Australia,
              Germany, Denmark, Sweden, and France each have distinct insurance regulatory frameworks. Coalition's
              ability to deliver a consistent Active Insurance experience globally is not independently verified.


              Land-and-expand dynamics: existing policyholders can expand their Coalition relationship by adding premium
              Control features (ADR, email security, training), increasing policy limits, or adding locations. The
              Active Data Graph compounds in value as policyholder count grows, and the Wirespeed ADR integration
              creates an upsell lever. However, SMB accounts have limited expansion ceiling compared to enterprise
              accounts.


              Customer concentration is structurally mitigated by the SMB focus: no single SMB policyholder likely
              represents more than 0.1% of total GWP. However, the Allianz partnership and any other enterprise-tier
              accounts introduced via partner channels could create meaningful revenue concentration. Post-Allianz
              portfolio transfer, if that transfer includes large enterprise accounts with high premiums, the
              concentration profile changes significantly.
