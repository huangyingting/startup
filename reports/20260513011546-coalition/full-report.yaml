        title: Pricing and Monetization
        blocks:
          - type: paragraph
            body: >
              Coalition's cyber insurance pricing is risk-adjusted and underwritten using its Active Data Graph, which
              integrates external threat intelligence with policyholder-specific technology signals. The median US SMB
              cyber insurance premium was approximately $1,740 in 2026 per Marsh market data, reflecting softening
              conditions from the 2021–2022 hard market peak. Coalition's bundled active monitoring model enables it to
              offer competitive pricing relative to traditional carriers while maintaining a lower expected loss ratio.


              Broker commissions are the primary channel cost, typically running 10–15% of GWP for US commercial cyber
              insurance; Coalition does not publicly disclose its specific commission rates or whether it offers volume
              overrides or contingent commissions. The Allianz May 2026 exclusive 10-year partnership is structured with
              Coalition receiving upfront consideration through increased equity, performance-based elements linked to
              growth and profitability of the cyber business, and a commitment from Allianz to further equity
              investment. This arrangement is financially unusual: it combines channel economics (Allianz as capacity
              and distribution anchor) with an equity partnership, blurring the line between reinsurance program costs
              and strategic investor returns.


              Coalition does not charge separately for Coalition Control (the risk platform) or for routine security
              alert notifications. CIR fee-based engagements represent an incremental monetization stream for
              incident-level services, but this revenue is not separately disclosed and is unlikely to be material
              relative to GWP-based premium income.
