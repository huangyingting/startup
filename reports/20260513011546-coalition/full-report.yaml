      - number: '5.4'
        title: Roadmap & Development Pipeline
        blocks:
          - type: paragraph
            body: >
              Coalition's publicly disclosed product roadmap is sparse — consistent with its private company status and
              competitive positioning. However, observable signals indicate several active development threads.


              The Wirespeed integration (acquired November 2025) represents the most significant near-term engineering
              initiative: merging Wirespeed's ADR into the Active Data Graph, enabling automated threat containment to
              inform real-time coverage decisions. This integration is described as live at launch, suggesting initial
              integration is complete but deeper fusion is ongoing.


              The Active Cyber Policy launch (April 2025) demonstrates cadenced insurance product development. The
              addition of Affirmative AI Coverage and Any One Claim Coverage suggests an underwriting team actively
              tracking emerging threat vectors and policy design.


              Coalition's April 2026 blog update on Enhanced Business Recovery announced a suite of endorsements
              designed to protect revenue, speed up settlements, and keep businesses running during claims. This
              indicates post-claims product expansion beyond pure prevention. The Risky Tech Ranking Q1 2026 update
              shows continued investment in threat intelligence publishing, which serves as both a marketing signal and
              a data-collection mechanism.


              The international expansion trajectory (8 markets) suggests continued geographic distribution investment.
              Coalition has not disclosed plans for consumer lines, D&O/E&O expansion, or vertically specialized cyber
              products.
