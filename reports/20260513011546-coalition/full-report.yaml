      - number: '5.2'
        title: Technology Architecture & Active Data Graph
        blocks:
          - type: paragraph
            body: >
              Coalition's technology architecture revolves around what the company calls the Active Data Graph — a
              proprietary data layer that combines external attack surface telemetry, cyber claims outcomes, and threat
              intelligence signals. This unified data model is used for three purposes: (1) dynamic risk scoring for
              insurance underwriting, (2) real-time alerting delivered through Coalition Control, and (3) model
              calibration for Wirespeed's automated threat detection.


              The attack surface monitoring engine performs continuous external scanning of policyholder domains, IP
              ranges, and cloud assets, identifying exposed services, misconfigured systems, and known-vulnerable
              software versions. This scanning capability underpins the Cyber Health Rating score visible to
              policyholders in Control.


              The Wirespeed ADR engine uses a conditional logic algorithm with probabilistic AI to triage threat
              detections. The platform operates at millisecond resolution, achieving a median time to verdict of 1,801
              milliseconds and delivering decisions through ChatOps integrations — Slack, Microsoft Teams, email, and
              SMS. The 99.99% noise reduction in alerts is attributed to automated triage eliminating false positives
              and reducing analyst fatigue. Wirespeed's architecture adheres to ISO 2859, the internationally recognized
              Acceptable Quality Limit standard.


              Control integrates with existing security tooling via documented integration connectors, including
              Microsoft Defender and SentinelOne, enabling visibility into security posture from within Coalition's
              platform without requiring tool replacement.


              Coalition's technology organization is led by Chief Technology Officer Maha Virudhagiri and Chief Product
              Officer Frank Fumarola. The engineering team is augmented by Wirespeed co-founders Tim MalcomVetter (GM,
              Coalition Security) and Jake Reynolds (Head of Engineering, Coalition Security).
