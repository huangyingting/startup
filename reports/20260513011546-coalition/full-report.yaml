      - number: '3.4'
        title: Feature and Pricing Comparison
        blocks:
          - type: paragraph
            body: >
              Coalition's pricing and feature differentiation rests on three claims: (1) lower loss ratio from active
              monitoring enables competitive pricing for well-screened accounts, (2) Coalition Control is included at no
              additional cost (saving policyholders an estimated $20,000-$50,000 in standalone security tools), and (3)
              integrated DFIR capability and FTF recovery ($158M cumulatively) reduce total incident cost.


              The critical pricing dynamic is rate softening: median US SMB cyber premiums declined from ~$2,100 in 2024
              to ~$1,740 in 2026 (per Marsh US cyber market data). As rates fall, the technology premium Coalition can
              command narrows. Feature differentiation: Coalition Control's combination of attack surface monitoring,
              zero-day alerts, TPRM, security checklists, and optional Wirespeed ADR is the most feature-rich integrated
              platform in the market. At-Bay Stance is directly comparable for core monitoring and MDR but lacks
              Coalition's data advantage (8+ years of claims data from 160k+ policyholders). Cowbell Factor provides
              AI-driven risk scoring but does not offer continuous monitoring depth comparable to Coalition Control or
              At-Bay Stance.


              Carrier model differentiation: Coalition's admitted paper (CIC, A- AM Best) available in 50 states,
              combined with surplus lines access via CIS, gives brokers maximum placement flexibility. At-Bay's E&S
              carrier covers non-admitted placements. Cowbell must route through partner carriers, limiting policy
              customization. This carrier ownership distinction is material for large broker clients who require
              admitted paper and rating consistency.
