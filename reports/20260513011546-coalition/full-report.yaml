      - number: '2.4'
        title: Growth Drivers & Adoption Catalysts
        blocks:
          - type: paragraph
            body: >
              The primary engine of cyber insurance demand growth is the underlying threat environment. Ransomware
              remains the most costly category of cyber events; Munich Re's 2025 Cyber Insurance Risks and Trends report
              identifies ransomware as the leading cause of cyber insurance losses, present in 44% of all breaches
              (Verizon DBIR 2025). Business email compromise (BEC) and funds transfer fraud (FTF) represent the
              highest-frequency claim type, with FBI data showing $17 billion+ in reported US BEC losses over the past
              decade. The IBM Cost of a Data Breach Report 2025 estimates the global average cost of a data breach at
              $4.4 million—still a level that meaningfully threatens mid-market and SMB business continuity without
              insurance. Regulatory drivers are increasingly material. In July 2023, the US Securities and Exchange
              Commission (SEC) adopted rules requiring public companies to disclose material cybersecurity incidents
              within four business days on Form 8-K and to provide annual governance disclosures on Form 10-K. This
              materially elevated board-level awareness of cyber liability for public companies. The European Union's
              NIS2 Directive (effective October 2024) requires essential and important entities across 18 sectors to
              adopt risk management measures and incident reporting, directly increasing cyber insurance demand across
              Europe—with Howden estimating 28% year-over-year European cyber insurance premium growth in 2025.
              State-level privacy laws (led by CCPA in California, with over 20 US states having enacted privacy
              legislation) increase liability exposure for organizations handling personal data. Digital transformation
              drivers include cloud migration, remote work normalization, and IoT proliferation—all of which expand
              attack surface and correlate with higher cyber insurance demand. Munich Re's survey found 87% of C-level
              executives consider their organization's cyber protection to be inadequate, suggesting sustained demand
              growth even without new regulatory catalysts.
            claimRefs:
