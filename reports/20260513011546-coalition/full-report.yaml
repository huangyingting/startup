  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Streams
        blocks:
          - type: paragraph
            body: >
              Coalition's primary revenue is gross written premium (GWP) from annual commercial cyber insurance
              policies. Policies are distributed exclusively through licensed insurance brokers and are underwritten
              either on an admitted basis through Coalition Insurance Company (CIC, NAIC #29530, A- AM Best, all 50
              states + DC since 2023) or on a surplus lines basis through Coalition Insurance Solutions (CIS, CA license
              #0L76155). GWP is estimated at approximately $775M annualized in 2025, based on the 160,000+ policyholder
              count and ~$4,844 implied average GWP/policyholder disclosed at the Series F in July 2022, adjusted for
              the subsequent policyholder decline to approximately 100,000 policyholders and market premium changes.


              A material portion of GWP is ceded to Ferian Re (Coalition's Bermuda Class 3B captive reinsurer,
              capitalized with ~$300M by BDT Capital Partners in October 2022) and to program reinsurance partners
              including Allianz, Arch, Swiss Re Corp Solutions, Ascot Group, and Vantage. Retained net written premium
              (NWP) through CIC and CIS is not publicly disclosed; the cession percentage is a primary diligence
              unknown.


              Coalition Control, the cyber risk management platform providing AI-driven alerts, vulnerability scanning,
              and monitoring, is provided free-of-charge to all policyholders as part of their bundled premium — there
              is no standalone SaaS revenue stream. Coalition Incident Response (CIR), operating as Coalition Security,
              provides fee-based DFIR and claims-adjacent services, but CIR revenue is not separately disclosed and some
              costs are likely recognized as Loss Adjustment Expense (LAE) within the insurance operation rather than as
              standalone service revenue.
