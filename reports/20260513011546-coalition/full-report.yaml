      - number: '7.2'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Coalition operates as a licensed insurance carrier (Coalition Insurance Company, CIC) in admitted US
              states and as an eligible surplus lines carrier through wholesale brokers in non-admitted states. This
              dual structure creates regulatory obligations at both the state and federal level that vary by
              jurisdiction.


              The most significant US regulatory risk is NYDFS Part 500 cybersecurity regulation, which governs covered
              entities including insurance companies licensed in New York. Coalition as a NY-licensed insurer must
              comply with updated Part 500 requirements effective November 2023, including annual certification of
              compliance, CBO (Chief Information Security Officer) designation, penetration testing, and incident
              reporting obligations. Failure to comply exposes Coalition to enforcement action including license
              revocation.


              The war exclusion is the highest-severity legal risk in Coalition's underwriting model. Following the
              NotPetya attacks (2017), courts in multiple jurisdictions addressed whether nation-state-attributed
              cyberattacks are covered under war exclusions. The New Jersey appellate court ruled in Merck v. Ace
              American Insurance (January 2024 affirmation of trial court) that the war exclusion did not apply to
              NotPetya because the exclusion language was ambiguous in the cyber context. Lloyd's of London responded by
              mandating updated war exclusion language for all Lloyd's cyber policies from March 2023, creating a
              potential split between Lloyd's-backed and non-Lloyd's-backed policies on coverage scope. If future
              litigation results in courts ruling war exclusions unenforceable in cyber policies, Coalition would face
              uncapped exposure for state-actor attacks.


              Data privacy liability is an additional legal vector. Coalition holds sensitive security posture data for
              100,000+ businesses, including vulnerability scan results, access credentials, and incident records. A
              breach of Coalition's own platform would create GDPR, CCPA, and potential negligence liability across all
              jurisdictions where policyholders operate. The California Insurance Department's oversight (admitted
              carrier CIC) adds a compliance layer for California policyholders.


              Internationally, Coalition's 8-country expansion creates regulatory fragmentation. UK insurance regulation
              (PRA/FCA), Australian APRA requirements, German BaFin oversight, and French ACPR licensing each impose
              distinct capital, conduct, and reporting requirements. The risk of a regulatory enforcement action in any
              of the 8 jurisdictions could restrict Coalition's ability to write new business in that market.


              No public evidence of active regulatory enforcement actions, pending litigation, or material regulatory
              violations was found against Coalition or CIC in the research trail.
