  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Modules & Active Insurance Platform
        blocks:
          - type: paragraph
            body: >
              Coalition delivers what it calls Active Insurance — an integrated platform that bundles cyber insurance
              coverage with continuous security tooling, incident response, and threat intelligence. This stands in
              contrast to traditional cyber insurers who issue policies without real-time security engagement. The
              commercial proposition centers on a feedback loop: security data improves underwriting precision,
              lower-risk policyholders pay less, and claims data sharpens security alerting.


              The flagship non-insurance module, Coalition Control, is a SaaS security platform provided to all
              policyholders at no additional charge. Control performs continuous external attack surface monitoring,
              generates a dynamic Cyber Health Rating, manages third-party vendor risk, provides compliance evidence
              collection (mapped to NIST SP 800-53, SOC 2 Type II, CIS v8.1), and issues zero-day vulnerability alerts
              with remediation guidance. Premium Control features include Wirespeed Automated Detection and Response
              (ADR), Employee Security Awareness Training, and Managed Email Security.


              The insurance product has evolved significantly. As of April 2025, Coalition launched the Active Cyber
              Policy, a redesigned surplus-lines cyber offering with eleven previously endorsement-only coverages now
              embedded as base Insuring Agreements. The policy includes Vanishing Retention (claim-free year incentive),
              reduced retention for early Funds Transfer Fraud reporting, Affirmative AI Coverage (including deepfake
              fraud), and Any One Claim Coverage. Available to organizations with up to $5 billion in annual revenue,
              with limits up to $15 million.


              Coalition Incident Response (CIR), operating as Coalition Security (a separate Coalition affiliate),
              provides Digital Forensics and Incident Response (DFIR) services. Post-acquisition of Wirespeed, CIR now
              offers Automated Detection and Response (ADR) with a median time to verdict of 1,801 milliseconds,
              leveraging probabilistic AI and ISO 2859 quality standards.
