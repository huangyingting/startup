      - number: '4.5'
        title: Financial Gaps and Verdict
        blocks:
          - type: paragraph
            body: >
              Coalition is a private company with no SEC-registered securities, no publicly available GAAP financial
              statements, and no statutory annual statement accessible via standard public registries. The
              highest-reliability substitute for financial diligence is Coalition Insurance Company's (CIC) annual
              statutory financial statement filed with state insurance departments (California, New York, and all
              admitted-state DOIs), which is publicly accessible via NAIC CIS filings or state DOI portals — but has not
              been retrieved in this research cycle due to dynamic-lookup URL limitations.


              The primary financial gaps are: (1) NWP after reinsurance cessions — the retained premium revenue after
              ceding to Ferian Re and program partners is the single most important undisclosed financial metric, as it
              determines the true scale of Coalition's underwriting operation; (2) GAAP/statutory net income or EBITDA —
              no profitability data is available; (3) the financial magnitude of the Allianz portfolio transition —
              adding Allianz's commercial cyber book could increase GWP by hundreds of millions but the volume is
              undisclosed; (4) CIR standalone revenue and margin — it is unclear whether CIR is a meaningful revenue
              contributor or primarily a LAE-offset function.


              Financial verdict: Coalition's revenue quality is high on the dimensions that can be assessed —
              contractual premium, recurring annual policies, favorable claims performance, and institutional
              reinsurance backing from Allianz, Arch, and Swiss Re Corp Solutions. The A- AM Best rating independently
              validates CIC's financial strength. The principal risk is not revenue quality but revenue opacity: without
              statutory financials, underwriting diligence requires accessing CIC's annual statement data from state
              insurance department filings. The Allianz 10-year exclusive partnership is transformationally significant
              and, if the portfolio transition performs as implied, Coalition's GWP could approximately double within
              2–3 years — but the diligence investor cannot yet verify this projection.
