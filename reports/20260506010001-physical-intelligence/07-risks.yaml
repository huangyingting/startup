callouts:
  - title: Pre-Revenue at $5.6B Is the Central Thesis-Break Risk
    body: >-
      Physical Intelligence's zero-revenue status at a $5.6 billion valuation is not merely a financial metric gap — it
      is the central thesis-break risk for any investment at current pricing. The company must convert enterprise pilots
      to revenue-generating contracts within 12–18 months or face a fundraising environment that will not support an $11
      billion next round. This timeline is shorter than typical enterprise robotics sales cycles, creating structural
      urgency that the founding team must manage actively.
    calloutType: risk
    claimRefs:
      - C226
      - C227
      - C237
  - title: Google Is Simultaneously Investor, Dependency, and Competitor
    body: >-
      CapitalG (Alphabet) led Physical Intelligence's Series B while Google DeepMind competes directly via Gemini
      Robotics. Physical Intelligence's core architecture depends on PaliGemma (Google DeepMind). This creates a
      tripartite risk: investor, dependency, and competitor in the same corporate family. Board-level governance terms
      and contractual protections for PaliGemma commercial use are critical diligence items that are not currently in
      the public record.
    calloutType: risk
    claimRefs:
      - C230
      - C231
      - C232
