callouts:
  - title: Skild AI Leads on Commercial Traction — a Critical Gap
    body: >-
      Skild AI's reported $30M ARR within months of commercial launch represents the most significant competitive threat
      to Physical Intelligence. A software peer with comparable hardware-agnostic positioning but 2.5× the funding and
      already-proven revenue traction creates a first-mover advantage in enterprise relationships. If PI does not
      achieve commercial revenue within the next 12–18 months, Skild's data flywheel and enterprise lock-in could become
      insurmountable.
    calloutType: risk
    claimRefs:
      - C080
      - C081
      - C091
      - C092
  - title: Google DeepMind Represents Asymmetric Compute and Data Threat
    body: >-
      Google DeepMind's Gemini Robotics 1.5 benefits from Alphabet's compute infrastructure, Google-scale multimodal
      training data, and the Gemini API distribution channel. Physical Intelligence cannot match this on compute or data
      scale without strategic partnerships or a step-change in funding. PI's research pedigree may hold near-term
      differentiation, but Google's advantages compound over time.
    calloutType: risk
    claimRefs:
      - C082
      - C083
      - C084
      - C085
