callouts:
  - title: Fastest Path to $1B Raised in Robotics AI
    body: >-
      Physical Intelligence raised over $1 billion in under 20 months from founding — faster than any prior
      pure-software robotics AI startup. The $400M Series A (Nov 2024) and $600M Series B (Nov 2025) both set records
      for robotics foundation model software at the time of their respective closes. However, the company remains
      pre-revenue, creating a tension between investor confidence and commercial validation.
    calloutType: insight
    claimRefs:
      - CO014
      - CO015
      - CO016
      - CO017
  - title: Key-Person Concentration Risk
    body: >-
      CEO Karol Hausman and Chief Scientist Sergey Levine are indispensable to Physical Intelligence's research
      credibility and product direction. The company's academic co-founders hold concurrent university positions,
      creating potential distraction risk, though this also provides elite talent pipeline access. No succession
      planning or governance safeguards have been publicly disclosed.
    calloutType: risk
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
