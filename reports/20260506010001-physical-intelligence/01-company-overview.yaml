chapter:
  number: 1
  title: Company Overview
  summary: >
    Physical Intelligence (pi.ai) is a San Francisco–based AI company founded in March 2024 with the mission to build a
    single general-purpose AI system capable of controlling any robot for any task. The company develops vision-
    language-action (VLA) foundation models, most notably π₀ (pi-zero), that are hardware-agnostic and deployable across
    diverse robot embodiments without task-specific reprogramming. Within 20 months of founding, Physical Intelligence
    raised over $1 billion across three rounds—$70M seed, $400M Series A at $2.4B valuation, and $600M Series B at $5.6B
    valuation—making it the best-funded software-only robotics AI startup globally as of late 2025. Led by ex-Google
    DeepMind and leading academic founders, the company occupies a pre-revenue research stage but has begun early
    enterprise pilots and open-sourced its core model to build an ecosystem.
sections:
  - id: s1
    title: Company Identity and Business Overview
    body: >
      Physical Intelligence, trading as pi.ai, was incorporated and began operations in San Francisco, California in
      March 2024. Its stated mission is to build "a single, general-purpose AI system capable of controlling any robot
      for any task." The company operates at the intersection of robotics, reinforcement learning, and large foundation
      models. Its primary product is π₀ (pi-zero), a vision-language-action (VLA) foundation model that ingests camera
      images, natural language task instructions, and robot proprioceptive state to predict continuous motor actions via
      a flow-matching transformer. π₀ is hardware-agnostic—it can be fine-tuned to operate diverse robot platforms
      (arms, mobile manipulators, humanoids) without rebuilding from scratch. Physical Intelligence's business model
      targets enterprise licensing of its model stack on a per-robot SaaS basis, though as of Q1 2026 the company
      remains pre-commercial-revenue and focused on research deployment and pilot programs. The company has also
      released an open-source variant (openpi) to drive ecosystem adoption and training data contributions.
    claimRefs:
      - CO001
      - CO002
      - CO003
      - CO004
      - CO005
  - id: s2
    title: Founders, Leadership, and Governance
    body: >
      Physical Intelligence was co-founded by a group of seven individuals with complementary expertise spanning
      academic robotics research, applied AI engineering, and operational scaling. CEO Karol Hausman was previously a
      Staff Research Scientist at Google DeepMind where he led robotic manipulation research and contributed to RT-2; he
      also served as an adjunct professor at Stanford University. Chief Scientist Sergey Levine holds a tenured
      Associate Professor position at UC Berkeley and leads the Robotic AI and Learning (RAIL) Lab, which produced
      foundational research in deep RL for robots. Co-founder Chelsea Finn, an Assistant Professor at Stanford, is best
      known for Model-Agnostic Meta-Learning (MAML) and rapid robot adaptation research. Brian Ichter, another
      co-founder, was a Research Scientist at Google DeepMind focusing on kinodynamic planning and GPU-accelerated robot
      algorithms. Adnan Esmail, co-founder and VP of Engineering, was previously SVP of Engineering at Anduril and a
      Tesla Autopilot engineer. Lachy Groom (early Stripe executive and VC investor) and Quan Vuong (robotics RL
      researcher) round out the founding team. The board composition has not been publicly disclosed; key-person risk is
      elevated given the concentrated technical leadership. There are no disclosed governance controversies or
      leadership changes as of Q1 2026.
    claimRefs:
      - CO006
      - CO007
      - CO008
      - CO009
      - CO010
      - CO011
      - CO012
      - CO013
  - id: s3
    title: Funding History, Valuation, and Investors
    body: >
      Physical Intelligence has raised approximately $1.07 billion in approximately 20 months. The seed round of $70
      million was closed in early-mid 2024, backed by Lux Capital and Jeff Bezos among others, and valued the company at
      an undisclosed pre-seed/seed valuation. The Series A of $400 million was closed in November 2024 at a $2.4 billion
      post-money valuation; investors included OpenAI, Thrive Capital, Lux Capital, Index Ventures, and others. The
      Series B of $600 million followed one year later in November 2025, at a $5.6 billion post-money valuation, led by
      CapitalG (Alphabet's growth fund) with participation from Lux Capital, Bond, Redpoint, Sequoia Capital, Thrive
      Capital, Index Ventures, T. Rowe Price, and Jeff Bezos. As of April 2026 the company is reported to be in advanced
      talks for a further funding round at an $11 billion valuation, which if completed would represent a ~2× step-up in
      under six months. All external funding is venture equity; no debt, secondary transactions, or revenue-based
      financing have been publicly disclosed. The large round sizes reflect investor conviction in the market
      opportunity for robot foundation models, as well as the team's research pedigree.
    claimRefs:
      - CO014
      - CO015
      - CO016
      - CO017
      - CO018
      - CO019
      - CO020
  - id: s4
    title: Key Milestones
    body: >
      Physical Intelligence progressed from founding to $1B+ raised and open-source model release in under two years.
      The company announced its founding and seed funding in March 2024. The π₀ model was described in a technical blog
      post and research paper in October 2024, demonstrating multi-task robot control including laundry folding, box
      assembly, and shirt packaging. The Series A closed in November 2024. In February 2025 the company open- sourced π₀
      model weights and code as the openpi repository, the first open-source general robot VLA foundation model. A
      successor π₀.5 was announced in early 2025, featuring enhanced generalization across novel environments. In
      mid-2025 π₀-FAST was introduced, using a frequency-domain discrete action representation (FAST tokenizer) for more
      efficient inference. The Series B at $5.6 billion closed in November 2025. As of Q1 2026, early enterprise pilot
      deployments are underway in manufacturing and logistics verticals with unnamed customers, and the company is
      reported to be approaching its next funding milestone at $11B valuation. There are no disclosed adverse events,
      regulatory investigations, or significant leadership departures as of this report date.
    claimRefs:
      - CO021
      - CO022
      - CO023
      - CO024
      - CO025
      - CO026
      - CO027
