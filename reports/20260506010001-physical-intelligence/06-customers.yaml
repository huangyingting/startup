company:
  name: Physical Intelligence
  website: https://physicalintelligence.company
chapter:
  number: 6
  title: Customers
  summary: >
    Physical Intelligence has no commercial customers as of Q1 2026. The company is in the enterprise pilot phase with
    undisclosed manufacturing and logistics customers, having transitioned from pure research to applied enterprise
    engagement during 2024–2025. The only named external relationships are hardware ecosystem partners (robot OEMs
    providing embodiment data) and research collaborators. No ARR, contract count, named customer references, NRR, or
    retention metrics are available. The primary customer diligence risk is the complete absence of commercial proof —
    all evidence of market demand is inferred from industry trends, the openpi community, and press reports of pilot
    activity. This chapter enumerates all available customer-adjacent evidence and identifies the data room items
    required to assess customer quality in any transaction.
sections:
  - id: s1
    title: Customer Segmentation and Current Status
    body: >-
      Physical Intelligence is in a pure pre-revenue, pre-customer phase as of Q1 2026. The company has publicly
      indicated that it is conducting enterprise pilot programs with unnamed manufacturing and logistics customers, but
      no commercial contracts, customer counts, ARR, or reference customers have been disclosed. Based on publicly
      available information, the expected enterprise customer segmentation is: large manufacturers with high-density
      robot deployments (automotive, electronics, consumer goods assembly), logistics and e-commerce warehousing
      operators requiring flexible pick-and-pack automation, food service and hospitality operators requiring dexterous
      manipulation for food preparation and kitchen tasks, and potentially government or defense customers for
      unstructured environment manipulation. The company has no SMB or mid-market go-to-market motion announced; all
      indicated pilots involve large enterprise accounts with the budget and operational scale to deploy dozens to
      hundreds of robots. The robot OEM partner network (which includes hardware companies that contributed embodiment
      data during training) represents a potential indirect customer or reseller channel through which PI software could
      be licensed on top of partner hardware, creating a B2B2B distribution path alongside direct enterprise sales.
      There is no SMB or self-serve channel, no product-led growth motion, and no disclosed freemium conversion path
      from the openpi open-source release to enterprise contracts. The entire commercial path is enterprise direct and
      OEM channel sales at this stage.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
    tableRefs:
      - TU001
      - TU002
    figureRefs:
      - FU001
  - id: s2
    title: Pilot Activity and Adoption Evidence
    body: >
      Press reporting from 2024–2025 confirms that Physical Intelligence is engaged in enterprise pilot programs with at
      least two named companies: AgiBot (a Chinese robot manufacturer) and Longcheer Technology (an electronics
      manufacturer), both of which are early-stage cross-embodiment data contributors as well as pilot customers. These
      are the only named customer-proximate relationships available from public sources. The openpi open-source
      community provides a secondary signal of adoption: the repository has accumulated thousands of GitHub stars and
      active external fine-tuning activity from academic and industry research teams. This community signal validates
      developer interest and the utility of the technical approach, but it does not constitute enterprise customer
      traction and does not generate revenue. Physical Intelligence has published demo videos of π₀ completing tasks in
      controlled environments; these videos have received significant coverage in technology media (The Verge, IEEE
      Spectrum, VentureBeat), suggesting strong awareness among potential enterprise buyers. Awareness and interest do
      not translate directly to purchasing intent without further commercial validation. The critical unknown is the
      conversion rate from enterprise pilot to signed commercial contract, which is the single most important financial
      metric for any prospective investor to validate in due diligence.
    claimRefs:
      - CU006
      - CU007
      - CU008
      - CU009
      - CU010
    tableRefs:
      - TU003
    figureRefs:
      - FU002
      - FU003
  - id: s3
    title: Retention Outlook, Concentration Risk, and Expansion
    body: >
      Physical Intelligence has no retention metrics, churn data, NRR, or contract renewal data because it has no
      commercial customers. Retention analysis must therefore be forward-looking and based on structural characteristics
      of the planned SaaS-per-robot model. Retention is structurally expected to be high because: (1) robot AI models
      accumulate customer-specific fine-tuning data over time, creating a switching cost equivalent to losing months of
      proprietary task training data; (2) enterprise robot fleets represent major capital investments that create
      inertia against software vendor changes; (3) integration with safety certification workflows and production
      scheduling systems creates additional switching barriers. These structural factors suggest that once Physical
      Intelligence achieves commercial deployment, gross revenue retention above 90% is plausible, but this is entirely
      theoretical at this stage. Customer concentration risk is unknown but expected to be high in the near term if and
      when commercial launch occurs, because the company is likely to close a small number of large enterprise accounts
      first, creating significant top-customer concentration. Diligence should require disclosure of the top-5 customer
      revenue concentration and any minimum purchase commitments in pilot agreements. The expansion model (land one
      deployment in a customer's facility, then expand to additional facilities or robot types) has attractive unit
      economics if customer lifetime is 5+ years and expansion multiplier is 2–5×, but none of this has been
      demonstrated operationally.
    claimRefs:
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
    tableRefs:
      - TU004
      - TU005
    figureRefs:
      - FU004
