callouts:
  - title: Zero Commercial Customers — Highest Customer Risk Rating
    body: >-
      Physical Intelligence has no commercial customers as of Q1 2026. This is the single highest-risk dimension of the
      entire diligence assessment. Investor confidence in the $5.6B valuation depends entirely on the assumption that
      enterprise pilot programs will convert to commercial contracts at acceptable rates, timelines, and ACV levels.
      None of these have been demonstrated. The diligence requirement is a verified pilot conversion plan with concrete
      timelines and at least one signed letter of intent from a named enterprise customer.
    calloutType: risk
    claimRefs:
      - CU001
      - CU002
      - CU015
  - title: Structural Switching Costs Support High Projected Retention
    body: >-
      Robot AI models that accumulate task-specific fine-tuning data over time create a de facto switching cost
      equivalent to losing months or years of proprietary training investment. Combined with integration into safety
      certification workflows and production scheduling, this suggests Physical Intelligence could achieve gross revenue
      retention above 90% once commercial deployment is established. The risk is that this retention advantage depends
      on the enterprise customer genuinely deploying robots at scale — if pilot programs do not convert, retention
      metrics are irrelevant.
    calloutType: insight
    claimRefs:
      - CU011
      - CU012
      - CU013
