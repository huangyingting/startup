callouts:
  - title: The $5.6B Valuation Requires $187M ARR to Be "Fair" at 30× Forward Multiple
    body: >-
      At a $5.6 billion valuation and a 30× forward revenue multiple (reasonable for high-growth AI SaaS), Physical
      Intelligence would need $187 million in ARR to justify the current entry price. No robotics AI company has
      achieved this ARR within 3 years of founding. This is not an investment thesis — it is an option on a 1-in-10
      outcome. Investors must be explicit about this pricing risk.
    calloutType: risk
    claimRefs:
      - CV003
      - CV007
      - CV018
  - title: Watch-and-Invest Strategy Is Preferable to Current Entry
    body: >-
      Given the extreme valuation and zero commercial proof, a watch-and-invest strategy is significantly preferable to
      an immediate entry at $5.6B or $11B. An investor who waits for Physical Intelligence to demonstrate $50M ARR,
      functional safety certification, and PaliGemma commercial licensing would enter at potentially higher valuation
      but with dramatically lower binary risk. The incremental upside from entering earlier does not compensate for the
      commercial uncertainty at current prices.
    calloutType: recommendation
    claimRefs:
      - CV012
      - CV013
      - CV014
