chapter:
  number: 8
  title: Valuation
  summary: >
    Physical Intelligence's $5.6 billion post-money valuation (Series B, November 2025) implies an infinite revenue
    multiple on zero commercial revenue. This is a research-stage premium justified exclusively by team quality,
    cross-embodiment architecture, and investor expectation of category leadership in a market that does not yet exist
    commercially. A comparable framework analysis (AI software and robotics AI comps) yields a fair value range of
    $1.5B–$4.0B on realistic near-term assumptions, implying 30–73% valuation risk at entry. The bull case ($11B
    reported next round) is defensible only if Physical Intelligence achieves $100M+ ARR within 36 months — a pace that
    exceeds all robotics AI precedents. Our stance is CAUTION: the technology is credible, the team is exceptional, but
    the valuation is materially ahead of commercial proof. A watch-and-invest strategy at a materially lower entry (next
    raise at demonstrated $50M ARR) would significantly improve the risk-adjusted return profile.
sections:
  - id: s1
    title: Valuation Context and Entry Discipline
    body: >
      Physical Intelligence closed its Series B in November 2025 at a $5.6 billion post-money valuation on $600 million
      raised, implying a $5.0 billion pre-money entry by CapitalG (Alphabet), T. Rowe Price, Redpoint, and Lux Capital.
      The company had zero commercial revenue at closing. There is no precedent in the robotics AI sector for a company
      achieving a $5.6B valuation at zero ARR within 20 months of founding. The valuation is justified by three factors:
      (1) exceptional team quality (Levine, Finn, Hausman are top-tier researchers); (2) technical execution (π₀ paper
      and demos received strong academic and industry validation); and (3) investor belief in the market size ($170B+
      service robot market by 2030) and Physical Intelligence's potential to own the robot foundation model API layer
      analogous to OpenAI in LLMs. The reported next round at $11 billion (April 2026, unconfirmed) would represent a 2×
      step-up in under six months, which is only credible if the company has signed multiple enterprise LOIs or
      announced a commercial partner of material scale. Any investor entering at $11B has an even narrower margin of
      safety than the Series B investors: at $11B with zero revenue, the revenue multiple recovery to a reasonable 10×
      exit requires $1.1 billion in ARR, which implies a leading robot foundation model company at the scale of a
      top-five enterprise SaaS business. This is a 10–15 year horizon, not 5–7 years.
    claimRefs:
      - CV001
      - CV002
      - CV003
      - CV004
      - CV005
    tableRefs:
      - TV002
    figureRefs:
      - FV004
  - id: s2
    title: Comparable Valuation Framework
    body: >
      In the absence of revenue, valuation must be based on comparable-stage transactions. The most relevant comparables
      are: (1) LLM foundation model companies at pre-/early-revenue stage (OpenAI at $80B at ~$1B ARR = 80× forward
      revenue, implying Physical Intelligence at $5.6B would need ~$70M ARR to be "in range" at comparable multiples);
      (2) robot AI companies at comparable funding stages (Skild AI at $14B at ~$30M ARR = 467× revenue, which is
      extreme but reflects market-clearing demand); (3) pure research-stage AI companies with no revenue (Inflection AI
      at $4B with no commercial product before the Microsoft partnership). Physical Intelligence at $5.6B is within the
      range of extreme pre-revenue AI company valuations but at the high end for a robotics-specific company. The key
      valuation anchors are: (a) if Physical Intelligence achieves $50M ARR by 2027, a 50× forward revenue multiple
      (aggressive) would support $2.5B valuation, implying downside from $5.6B; (b) if it achieves $200M ARR by 2028, a
      30× forward multiple (moderate) would support $6B, in line with the Series B; (c) the bull case requires $400M+
      ARR by 2028 at 20× to justify an $8B valuation, which approaches the lower end of the $11B reported next round.
      The conclusion is that the Series B valuation is "fair" only if Physical Intelligence delivers significant
      commercial traction within 24 months, and the reported next round is extremely aggressive without announced
      commercial revenue.
    claimRefs:
      - CV006
      - CV007
      - CV008
      - CV009
      - CV010
    tableRefs:
      - TV003
      - TV004
    figureRefs:
      - FV002
  - id: s3
    title: Recommendation, Exit Readiness, and Final Diligence Asks
    body: >
      Our recommendation is CAUTION — PASS or WATCH at current valuation, with conditions for a future entry. The
      technology is credible, the team is world-class, and the robot foundation model market has a plausible path to
      very large scale. However, the $5.6B valuation at zero revenue provides insufficient margin of safety for most
      institutional investors, and the reported $11B next round is extremely aggressive. The conditions under which we
      would recommend entry are: (1) Physical Intelligence announces at least $50M ARR from two or more named enterprise
      customers; (2) the company completes at least one functional safety certification (ISO 13849 or CE marking)
      enabling production deployment; (3) a PaliGemma commercial licensing agreement with Google is documented and
      disclosed; (4) Sergey Levine's retention and vesting schedule is confirmed. Exit readiness is 5–7 years from now
      at minimum assuming commercial launch in 2026–2027 and a typical enterprise software scale trajectory. Strategic
      acquirers include Amazon, Microsoft (via Azure robotics), Samsung, Hyundai, and any major industrial conglomerate
      seeking an AI robot stack. IPO readiness would require $300M+ ARR and positive gross margin at scale, which is a
      2029+ event on optimistic assumptions. Final diligence asks are enumerated in T808.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
    tableRefs:
      - TV001
      - TV005
      - TV006
    figureRefs:
      - FV001
      - FV003
