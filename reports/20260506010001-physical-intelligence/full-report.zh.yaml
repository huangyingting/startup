      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 由七名成员共同创立，能力覆盖学术机器人研究、应用 AI 工程和运营扩张。CEO Karol Hausman 曾任 Google DeepMind Staff
              研究科学家，负责机器人操作研究并参与 RT-2，同时担任过 Stanford University 兼职教授。首席科学家 Sergey Levine 是 UC Berkeley 终身副教授，领导 Robotic
              AI and Learning（RAIL）Lab，该实验室产出了机器人深度强化学习的基础研究。联合创始人 Chelsea Finn 是 Stanford 助理教授，以 Model-Agnostic
              Meta-Learning（MAML）和快速机器人适应研究闻名。另一位联合创始人 Brian Ichter 曾任 Google DeepMind 研究科学家，聚焦运动动力学规划和 GPU
              加速机器人算法。联合创始人兼工程副总裁 Adnan Esmail 曾任 Anduril 工程高级副总裁，也做过 Tesla Autopilot 工程师。Lachy Groom（早期 Stripe 高管和 VC
              投资人）与 Quan Vuong（机器人强化学习研究者）补齐创始团队。董事会构成尚未公开；技术领导高度集中，关键人物风险偏高。截至 2026 年 Q1，公司未披露治理争议或管理层变动。
