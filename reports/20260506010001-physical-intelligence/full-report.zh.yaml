      - number: '8.2'
        title: 可比估值框架
        blocks:
          - type: paragraph
            body: >
              没有收入时，估值只能依靠同阶段可比交易。最相关可比包括：（1）收入前 / 早期收入阶段的 LLM 基础模型公司（OpenAI 约 $1B ARR 时估值 $80B = 80× 远期收入，意味着 Physical
              Intelligence 要有约 $70M ARR 才算落入可比倍数区间）；（2）类似融资阶段的机器人 AI 公司（Skild AI 约 $30M ARR 时估值 $14B = 467×
              收入，倍数极端，但反映市场出清需求）；（3）无收入的纯研究阶段 AI 公司（Inflection AI 在 Microsoft 合作前没有商业产品、估值 $4B）。Physical Intelligence 的
              $5.6B 估值位于收入前 AI 公司极端估值区间内，但对机器人垂直公司来说处在高端。关键估值锚点是：（a）若 Physical Intelligence 到 2027 年实现 $50M ARR，50×
              远期收入倍数（激进）可支撑 $2.5B 估值，低于 $5.6B；（b）若到 2028 年实现 $200M ARR，30× 远期倍数（中性）可支撑 $6B，与 Series B 接近；（c）乐观情景需要 2028
              年达到 $400M+ ARR，并用 20× 倍数支撑 $8B 估值，才接近据报道 $11B 下一轮的下沿。结论是：只有 Physical Intelligence 在 24 个月内交出显著商业牵引力，Series
              B 估值才算“合理”；如果没有公开商业收入，据报道的下一轮极其激进。
