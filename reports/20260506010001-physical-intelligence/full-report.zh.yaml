  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 最大的监管风险来自 EU AI Act。该法案将可能造成伤害、且在物理环境中运行的 AI 系统，按 Annex III 可能归为高风险。部署在制造或物流场景中的机器人
              AI 系统，在进入欧盟商业部署前，可能需要合规评估、人类监督机制、技术文档和上市后监测。EU AI Act 合规预计会让欧盟商业化时间线增加 12–24 个月，并消耗大量法律和工程资源。在美国，OSHA
              工作场所安全法规和 NIST AI Risk Management Framework 指南适用于工作环境中的 AI
              系统，但当前美国监管要求不如欧盟法案具体，也不会阻止近期本土部署。制造环境中与人协作的机器人软件需要通过 ISO 13849 和 IEC 62061 功能安全认证；Physical Intelligence
              未披露任何认证进展。训练数据 IP 责任是潜在法律风险：如果 Physical Intelligence 的机器人演示数据集包含来自受版权保护来源的视频内容（制造流程视频、专有机器人操作记录），数据来源方的 IP
              主张可能限制公司的运营自由。截至 2026 年 Q1，没有已知针对 Physical Intelligence 的活跃诉讼、监管执法行动或重大法律纠纷。
            claimRefs:
