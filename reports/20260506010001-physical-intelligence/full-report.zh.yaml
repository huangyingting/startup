  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与细分
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 面对的市场，最好拆成三个同心层。最外层是全球物理 AI 与机器人（硬件加软件），覆盖工业机器人、移动操作机器人、人形机器人和自动驾驶车辆；2025 年 TAM 估计为
              $50–82 billion，到 2030 年增至 $111–185 billion。其内层是企业机器人软件与 AI 栈（模型、部署基础设施、训练流水线），2025 年 SAM 约 $8–15
              billion，预计到 2030 年达到 $20–35 billion，CAGR 为 20–35%。Physical Intelligence 最直接的可服务市场，是机器人基础模型软件和按机器人授权的
              SaaS。该品类尚未形成成熟分析师分类，但按单台机器人经济性，以及制造、物流和仓储自动化中的部署规模推演，2028 年可粗略外推为 $3–8
              billion。关键垂直包括：制造与装配（今天收入最大）、物流与仓储自动化（增长最快）、商业与设施服务，以及医疗和零售中由人形机器人打开的新兴任务。Physical Intelligence
              目前不绑定硬件，目标客户是机器人 OEM 伙伴，以及已经拥有或计划部署机器人队列的企业客户。
