          - type: callout
            title: 先观察、再投资优于当前进入
            body: >-
              鉴于估值极端、商业验证为零，先观察再投资显著优于立即按 $5.6B 或 $11B 进入。投资人如果等到 Physical Intelligence 证明 $50M ARR、功能安全认证和 PaliGemma
