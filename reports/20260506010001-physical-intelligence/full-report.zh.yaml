      - number: '1.4'
        title: 关键里程碑
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 从成立到融资超过 $1B 并发布开源模型，用时不到两年。公司在 2024 年 3 月宣布成立和种子轮融资。2024 年 10 月，π₀
              模型出现在技术博客和研究论文中，展示洗衣物折叠、盒子组装、衬衫包装等多任务机器人控制。Series A 在 2024 年 11 月完成。2025 年 2 月，公司将 π₀ 模型权重和代码以 openpi
              仓库开源，成为首个开源通用机器人 VLA 基础模型。后续 π₀.5 于 2025 年初发布，强化了跨新环境的泛化。2025 年中，π₀-FAST 推出，采用频域离散动作表示（FAST
              tokenizer）提升推理效率。$5.6 billion 估值的 Series B 在 2025 年 11 月完成。截至 2026 年 Q1，早期企业试点已在制造和物流垂直场景启动，客户未具名；公司据报正接近
              $11B 估值的下一轮融资里程碑。截至本报告日期，未披露负面事件、监管调查或重大高管离职。
