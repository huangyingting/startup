  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与架构
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 的核心产品是 π₀ 系列机器人基础模型。不同于此前只针对单一机器人类型和单一任务训练的机器人 AI 系统，π₀ 被设计成跨形态模型：同一套模型权重横跨 68
              种不同机器人硬件配置使用，从单臂机械臂到双手机械灵巧手都有覆盖。跨形态训练带来两个实际好处。第一，模型泛化更广，能把一个机器人上学到的技能，用最少微调迁移到新机器人。第二，公司能聚合来自多类硬件伙伴的训练数据，而不是被单一机器人设计的数据限制。架构上，π₀
              将预训练 PaliGemma 3B 视觉-语言模型（VLM）与 300 million 参数动作专家 transformer 融合。VLM 组件负责理解语言指令和解析视觉场景。动作专家用 flow
              matching 生成连续机器人控制信号（根据机器人不同，可为关节位置、速度或笛卡尔目标）；这种生成式建模技术在精度和推理速度上都优于基于 diffusion 的动作策略。π₀.5 变体在 π₀
              基础上加入更强的互联网规模预训练，拓宽语义理解。π₀-FAST 用更快的单次动作解码器解决时间敏感任务的推理延迟。openpi 开源包则为外部研究社区提供基于 π₀ 权重的微调工具。
