            title: $5.6B 估值要在 30× 远期倍数下“合理”，需要 $187M ARR
            body: >-
              在 $5.6B 估值和 30× 远期收入倍数（对高增长 AI SaaS 属合理水平）下，Physical Intelligence 需要 $187M ARR 才能证明当前进入价格合理。没有任何机器人 AI
              公司在创立 3 年内做到这一 ARR。它不是投资逻辑，而是押注一个 1-in-10 结果的期权。投资人必须把这一价格风险说清楚。
            calloutType: risk
            claimRefs:
