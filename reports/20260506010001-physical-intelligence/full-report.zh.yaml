      - number: '8.3'
        title: 建议、退出准备与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              我们的建议是谨慎——当前估值下放弃或观察，未来进入需满足条件。技术可信，团队世界级，机器人基础模型市场也有一条通向极大规模的合理路径。但零收入对应 $5.6B 估值，对多数机构投资人来说安全边际不足，据报道的
              $11B 下一轮更是极其激进。我们会建议进入的条件是：（1）Physical Intelligence 宣布至少 $50M ARR，来自两个或更多具名企业客户；（2）公司完成至少一项功能安全认证（ISO
              13849 或 CE 标志），可以支撑生产部署；（3）与 Google 的 PaliGemma 商业许可协议有文件记录并已披露；（4）Sergey Levine 的留任与股权归属时间表得到确认。在
              2026–2027 年商业化发布、并按典型企业软件扩张路径推进的假设下，退出准备至少还要 5–7 年。潜在战略收购方包括 Amazon、Microsoft（通过 Azure
              机器人业务）、Samsung、Hyundai，以及任何想要 AI 机器人栈的大型工业集团。IPO 准备需要 $300M+ ARR 和规模化正毛利率；即便按乐观假设，时间也要到 2029 年以后。最终尽调问题列在
              T808。
