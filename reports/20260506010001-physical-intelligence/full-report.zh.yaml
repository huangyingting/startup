        title: 成本结构、资本强度与烧钱速度
        blocks:
          - type: paragraph
            body: >-
              Physical Intelligence 的成本结构主要由研究和工程人员（2026 年 Q1 估计 150–250 人）、模型训练与推理 GPU
              算力，以及旧金山高端办公地点的管理开销构成。若平均全包薪酬为每人每年 $300,000–$400,000，按员工数不同，人员烧钱速度约为每年 $45–$100 million。用多形态数据训练大型机器人 VLA
              模型，算力成本显著；按 π₀ 规模模型的行业基准，每个主要版本训练一次可能花费 $5–20 million，规模化后还会持续产生推理成本。全年总烧钱估计为 $70–$150
              million，意味着如果公司不大幅扩张算力或人员，仅 $600M Series B 就能提供约 4–8 年跑道。不过，若要做到商业规模，公司需要显著扩充人员和算力，满负荷商业建设下跑道可能压缩到 24–36
              个月。Physical Intelligence 未披露实际烧钱速度或账上现金。公司没有公开披露债务融资，也未通过监管文件报告经营亏损；它仍是私营公司，除 Form D 豁免发行外没有 SEC
              报告义务。此外，用于自定义机器人实验室基础设施、安全测试设备，以及试点项目潜在制造伙伴关系的资本开支，也会推高成本基数。这类阶段和画像的公司，通常把 60–70% 烧钱投向人员、20–25%
              投向算力、10–15% 投向设施和其他管理开销。这些比例与可比 AI 研究初创公司一致，也说明如果员工数接近 250 人、算力支出随下一代模型开发放大，Physical Intelligence
              的全年运营成本现实上可能达到 $120 million 或更高。
