  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模式与当前收入状态
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 Q1，Physical Intelligence 没有披露商业收入。公司正在制造和物流领域推进早期企业试点，但没有公开合同、ARR 或商业条款。计划中的收入模式是按机器人授权的 SaaS
              结构：企业客户按每台部署并使用 PI 基础模型的机器人支付经常性年费。这相当于把企业软件里的按席位或按单元 SaaS 模式，用到物理机器人上。公司未公开定价。行业类比显示，每台机器人年费可能在 $5,000 到
              $15,000 之间，这意味着若要做到 $50M ARR，需要约 3,300–10,000
              台活跃机器人部署。额外收入来源可能包括模型微调费（一次性或经常性）、企业部署支持，以及潜在的机器人训练数据集授权。这些都尚未公布。openpi
              开源释放似乎不产生直接收入，更像社区和生态投资。公司的无收入状态带来二元风险：要么未来 12–18 个月内完成商业发布并把企业试点管线转化；要么在竞争对手建立收入牵引后，融资会越来越难。
