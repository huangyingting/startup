  shortDescription: >-
    Physical Intelligence builds robot foundation models — cross-embodiment AI systems that enable diverse robot
    hardware to perform dexterous real-world tasks through a single learned model. Its flagship product π₀ (pi-zero)
    combines a PaliGemma 3B vision-language backbone with a 300M-parameter action expert trained via flow matching,
    supporting 68+ robot embodiments with demonstrated superiority on the LIBERO manipulation benchmark.
