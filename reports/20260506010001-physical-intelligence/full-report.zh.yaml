      - number: '5.2'
        title: 技术表现与基准
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 在 arXiv 预印本中发布基准结果，显示 π₀ 在 LIBERO 基准套件上超过此前最强水平。LIBERO
              测试洗衣物折叠、物品整理、组件装配等灵巧操作任务。具体来看，当只用有限演示数据微调时，π₀ 的任务完成率显著高于 OpenVLA、RT-2 和
              Octo；在企业部署中，收集大量机器人专属数据成本高昂，因此该指标非常关键。模型在长时域灵巧操作任务上尤其强，这类任务被普遍视为机器人 AI
              最难解决的问题：需要在数秒内连续完成接触丰富的动作，例如折叠衣物或装载洗碗机。Physical Intelligence 报告称，π₀
              完成这些任务的成功率能与此前最佳系统竞争，同时数据效率明显更高。不过，已发布基准来自受控实验室环境，不能直接证明其在生产企业环境中的表现；真实场景有非结构化工作空间、光照变化和实时可靠性要求。实验室基准成功率与企业生产可靠性之间的差距，是一个关键未解技术风险。机器人行业经验显示，生产部署成功率通常比实验室结果低
              20–40 个百分点。
