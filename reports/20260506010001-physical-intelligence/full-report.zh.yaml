      - number: '5.3'
        title: 差异化、知识产权与信任姿态
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 的主要技术差异化，在于 VLA 架构：它把预训练 VLM 推理与 flow-matching
              动作专家结合，并在截至目前公开报道中规模最大的跨形态机器人数据集上训练。创始团队的学术资历极强：Sergey Levine（UC Berkeley RAIL Lab，model-agnostic
              meta-learning MAML 相邻方法发明者）、Chelsea Finn（MAML 共同发明人，Stanford AI Lab）和 Karol Hausman（Google DeepMind
              Robotic Learning）。这支团队发表过被引用数千次的基础论文。openpi 发布后，GitHub stars 和外部研究引用都显示开发者社区已经采用。关键 IP 风险包括：（1）核心架构依赖
              PaliGemma（Google DeepMind 模型），形成对 Google 授权条款的依赖；（2）机器人演示视频训练数据的来源和版权状态没有公开披露；（3）arXiv
              预印本详细披露技术路径，降低了资源充足的竞争对手复制门槛。安全与信任方面，Physical Intelligence 尚未披露 π₀ 是否接受过第三方安全认证、功能安全审计（ISO 13849 / IEC
              62061）或网络安全渗透测试。企业部署时，制造和物流客户会要求成文的安全论证，并可能在 CE/OSHA 监管环境中要求监管许可。openpi
              发布内容除技术能力限制外，没有记录明确的安全约束或部署护栏；与企业客户生产部署要求相比，这是缺口。
