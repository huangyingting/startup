      - number: '2.5'
        title: 展项
        blocks:
          - type: callout
            title: 软件层定位才是高毛利打法
            body: >-
              Physical Intelligence 刻意避开硬件制造，瞄准软件智能层；AI SaaS 毛利率可达 70–85%，硬件只有 20–40%。如果机器人基础模型沿用 LLM API
              的打法，建立主导模型加生态的公司会拿走不成比例的经济价值。不过，在资源雄厚的既有玩家追上来之前，PI 必须先跑通商业定价并扩大部署。
            calloutType: insight
            claimRefs:
              - CM001
              - CM002
              - CM010
          - type: callout
            title: 开源释放搭生态，也压缩护城河
            body: >-
              2025 年 2 月 π₀ 开源释放，加速开发者生态形成，同时也让竞争对手能站在 PI 的基础模型上继续构建。这与 Hugging Face / 开源 LLM
              的动态类似：社区采用带来品牌和数据贡献，但基础能力商品化会迫使 PI 依靠企业微调、支持和专有数据来差异化。净市场效果有利于总体市场增长，但对 PI 长期竞争位置的影响并不明朗。
            calloutType: risk
            claimRefs:
              - CM019
              - CM020
              - CM021
  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争框架与市场结构
        blocks:
          - type: paragraph
            body: >
              机器人基础模型市场可分为三类竞争原型。第一类是纯软件 / 智能层玩家，不做硬件，只做通用机器人“大脑”：Physical Intelligence 和 Skild AI
              是主要例子。第二类是全栈机器人集成商，同时做硬件和专有 AI：Figure AI（人形机器人手臂 + Helix VLA）、1X Technologies（人形机器人 + 世界模型）和 Agility
              Robotics（Digit + AI）都属此类。第三类是拥有相邻算力和 AI 资产、正向机器人延伸的科技巨头：Google DeepMind（Gemini Robotics 1.5）、Amazon
              Robotics（Sequoia 机器人驱动系统 + Sparrow）和 NVIDIA（Cosmos 世界基础模型）。Physical Intelligence 在软件智能层最直接对标 Skild
              AI，在模型能力和研究可信度上对标 Google DeepMind。全栈集成商会争夺企业预算，但也可能成为 PI 模型的客户。
            claimRefs:
              - CP001
