      - number: '7.2'
        title: 运营、竞争与技术风险
        blocks:
          - type: paragraph
            body: >
              最尖锐的运营风险，是 π₀ 从实验室走到生产现场的落差。模型在可控实验室里跑出亮眼基准表现，但制造和物流现场难得多：工位非结构化、光照变化、人机混行、实时可靠性要求高，还要 99%+
              可用性。机器人行业经验反复显示，从实验室到生产，性能通常会掉 20–40 个百分点。Physical Intelligence 如果不能在试点阶段补上这段落差，商业转化就会失败。竞争端的运营风险同样高：Skild
              AI 已做到约 $30M ARR，并在搭商业数据飞轮。Skild AI 每多一个季度积累生产部署数据，模型质量就会提升，竞争护城河也会拉宽。Google DeepMind 的 Gemini Robotics
              1.5 是生存级竞争威胁：Google 几乎有无限算力，可直接使用 PaliGemma（Physical Intelligence 所依赖），又通过 Google Cloud 和 Google Workspace
              拥有深厚企业关系，由此天然形成机器人 AI 分发渠道。Physical Intelligence 的开源策略（openpi）带来复制风险：只要竞争对手动机足够强、又有算力，就能拿公开的 arXiv 预印本和
              openpi 代码库起步复现，把研究护城河从几年压缩到几个月。
