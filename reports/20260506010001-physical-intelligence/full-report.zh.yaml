chapters:
  - number: 1
    title: 公司概览
    sections:
      - number: '1.1'
        title: 公司身份与业务概览
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 以 pi.ai 名义经营，2024 年 3 月在加利福尼亚州旧金山注册并启动运营。公司给出的使命是打造「一个单一、通用的 AI
              系统，能够控制任意机器人完成任意任务」。业务落在机器人、强化学习和大型基础模型的交叉点。核心产品是
              π₀（pi-zero），一个视觉-语言-动作（VLA）基础模型：它读取摄像头图像、自然语言任务指令和机器人本体感知状态，再借助 flow-matching transformer 预测连续电机动作。π₀
              不绑定硬件——不必从零重建，就能微调到多类机器人平台（机械臂、移动操作机器人、人形机器人）上运行。Physical Intelligence 的商业模式瞄准企业客户，按机器人数量以 SaaS
              方式授权其模型栈；但截至 2026 年 Q1，公司仍处商业收入前阶段，重心放在研究部署和试点项目上。公司还发布了开源变体 openpi，推动生态采用和训练数据贡献。
