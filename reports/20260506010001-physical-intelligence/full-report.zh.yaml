        title: Physical Intelligence 护城河与竞争风险
        blocks:
          - type: paragraph
            body: >-
              Physical Intelligence 的竞争优势包括：（1）创始人履历——Sergey Levine（RAIL Lab，Berkeley）、Chelsea Finn（MAML，Stanford）和
              Karol Hausman（RT-2，DeepMind）的组合，可能是全球最具可信度的机器人 AI 创始团队；（2）灵巧操作深度——π₀
              展示了业内领先的长时域灵巧任务（洗衣物折叠、装配），多数竞争对手在基准中尚未匹配；（3）开源生态——openpi
              带来开发者社区和训练数据贡献。该护城河的关键风险包括：（1）开源会让基础模型商品化——Skild、Google 等公司能直接对标 PI 已发布工作；（2）Skild AI 估值 $14B，融资额约为 PI 的
              2.5×，且已经实现商业收入；（3）Google DeepMind 的算力和数据高出数个数量级，Gemini Robotics 1.5 已通过 API 向任何开发者开放；（4）PI
              仍无收入——如果商业发布拖延，资金充足的竞争对手会先建立企业关系；（5）全栈集成商（Figure AI、1X）在特定部署中可能拥有更好的硬件-软件协同。当前护城河仍处研究阶段，尚未被商业验证。Physical
              Intelligence 必须在 Skild AI 建立企业锁定、Google DeepMind 完成 Gemini Robotics 商业 API 推出之前，优先推进商业发布、硬件伙伴协议和安全认证。PI
              在已商业验证的企业账户上建立可防守位置的窗口，大约只有未来 12–18 个月。过了这个窗口，护城河可能主要停留在学术层面，而不是商业验证。该市场的竞争终局，会偏向最先证明企业级可靠性并建立经常性收入基础的玩家。
