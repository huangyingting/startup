      - number: '2.3'
        title: 细分客群与买方分析
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 的主要买方分三类：（1）希望把基础模型智能嵌入自家硬件的机器人 OEM 制造商（如 Agility Robotics、Boston Dynamics
              和较小的人形机器人初创公司）；（2）在制造或物流中部署机器人的大型企业运营商，它们希望跨机器人泛化，不想为每个任务单独编程；（3）为工厂和仓库打造交钥匙自动化方案的系统集成商。企业账户的决策人通常是运营副总裁、首席自动化官或工程副总裁，采购流程还会牵涉
              IT 安全审查、数据驻留要求和集成审批。企业机器人从试点到合同的购买周期为 12–24 个月；Physical Intelligence 目前处于试点阶段。OEM
              伙伴渠道能带来更快分发，但毛利更低，也更依赖硬件伙伴成败。北美和欧洲目前是主要市场；亚太（尤其日本、韩国和中国）因工业机器人密度高，代表长期最大放量市场。
