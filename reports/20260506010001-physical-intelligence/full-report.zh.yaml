        title: 客户细分与当前状态
        blocks:
          - type: paragraph
            body: >-
              截至 2026 年 Q1，Physical Intelligence 仍处于完全无收入、无客户阶段。公司公开表示正在与未具名制造和物流客户推进企业试点，但没有披露商业合同、客户数、ARR
              或可引用客户。基于公开信息，预期企业客户可分为：拥有高密度机器人部署的大型制造商（汽车、电子、消费品装配）、需要灵活拣选与包装自动化的物流和电商仓储运营商、需要用灵巧操作完成备餐和厨房任务的餐饮服务与酒店运营商，以及可能服务非结构化环境操作的政府或国防客户。公司未公布
              SMB 或中端市场商业化动作；所有已显示的试点都涉及大型企业账户，这些账户有预算和运营规模，能部署数十到数百台机器人。机器人 OEM 伙伴网络（包括训练期间贡献形态数据的硬件公司）可能成为间接客户或转售渠道，让
              PI 软件在伙伴硬件之上授权销售，形成与企业直销并行的 B2B2B 分发路径。公司没有 SMB 或自助服务渠道，没有产品驱动增长动作，也未披露从 openpi
              开源释放转化到企业合同的免费增值路径。现阶段，整个商业路径都是企业直销和 OEM 渠道销售。
