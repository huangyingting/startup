companyProfile:
  summary: >-
    Physical Intelligence 于 2024 年 3 月在旧金山成立，创始团队由一批顶级机器人 AI 研究者组成——Karol Hausman（CEO，前 Google DeepMind）、Sergey
    Levine（首席科学家，UC Berkeley RAIL Lab）、Chelsea Finn（MAML 共同发明人，Stanford AI Lab）、Brian Ichter（前 Google DeepMind）、Adnan
    Esmail（工程副总裁，前 Anduril/Tesla）和 Lachy Groom（前 Stripe）。公司目标是打造通用机器人基础模型：一个能控制任意机器人、完成任意物理任务的 AI 系统，定位类似 GPT-4
    之于文本任务。旗舰 π₀ 模型横跨 68 种机器人形态训练，在灵巧操作基准上超过此前最强水平。公司不到 20 个月完成三轮融资（种子轮、Series A、Series B），累计融资 $1.07 billion，并在 2025 年
    11 月达到 $5.6 billion 估值，但商业收入仍为零。制造和物流领域已有企业试点，AgiBot 和 Longcheer Technology 被点名为早期合作方。公司所处赛道竞争激烈，对手包括 Skild AI（$14B
    估值、$30M ARR）、Google DeepMind Gemini Robotics 和 Figure AI（$39B 估值），三者分别带来不同类型的竞争压力。
