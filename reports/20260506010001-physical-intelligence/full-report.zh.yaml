            body: >
              Physical Intelligence 没有留存指标、流失数据、NRR 或合同续约数据，因为公司没有商业客户。因此，留存分析只能向前看，并基于计划中的按机器人 SaaS
              模式的结构特征。留存在结构上预计较高，原因包括：（1）机器人 AI
              模型会随时间累积客户专属微调数据，换供应商相当于损失数月专有任务训练数据；（2）企业机器人队列本身是重大资本投入，会让软件供应商更换变得迟滞；（3）与安全认证流程和生产排程系统集成，会进一步提高切换门槛。这些结构性因素说明，一旦
              Physical Intelligence 完成商业部署，超过 90%
              的毛收入留存是有可能的，但现阶段完全停留在理论层面。客户集中度风险未知；若商业发布发生，短期预计会偏高，因为公司可能先签下少数大型企业账户，造成显著头部客户集中。尽调应要求披露前五大客户收入集中度，以及试点协议中的任何最低采购承诺。扩张模式（先落地客户某一设施，再扩到更多设施或机器人类型）若客户生命周期超过
              5 年、扩张倍数达到 2–5×，单位经济性会很有吸引力；但这些都尚未在运营上证明。
