      - number: '1.3'
        title: 融资历史、估值与投资方
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 约 20 个月融资约 $1.07 billion。$70 million 种子轮在 2024 年上半年至年中完成，投资方包括 Lux Capital 和 Jeff
              Bezos 等，公司未披露 pre-seed/seed 估值。$400 million Series A 于 2024 年 11 月完成，投后估值 $2.4 billion；投资方包括 OpenAI、Thrive
              Capital、Lux Capital、Index Ventures 等。$600 million Series B 一年后于 2025 年 11 月完成，投后估值 $5.6 billion，由
              CapitalG（Alphabet 的成长基金）领投，Lux Capital、Bond、Redpoint、Sequoia Capital、Thrive Capital、Index Ventures、T. Rowe
              Price 和 Jeff Bezos 参投。截至 2026 年 4 月，据报道公司正就新一轮融资进行深入谈判，估值 $11
              billion；若完成，意味着不到六个月估值约翻倍。所有外部融资均为风险股权；未公开披露债务、老股转让或收入分成融资。大额融资反映投资人押注机器人基础模型的市场机会，也押注团队的研究履历。
