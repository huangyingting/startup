      - number: '2.2'
        title: TAM、SAM 与 SOM 分析
        blocks:
          - type: paragraph
            body: >
              Grand View Research 估计，物理 AI 市场（具身 AI、机器人智能软件、自主系统）2025 年约 $81.6 billion，至 2033 年 CAGR 约
              32%。MarketsandMarkets 估计，机器人 AI 市场（仅智能与控制软件）2025 年为 $5.8 billion，到 2030 年增至 $25.9 billion。McKinsey 和 BCG
              的分析认为，当专有智能成为相对商品化硬件的主要差异化因素，机器人软件和 AI 层最终将拿走机器人价值链利润的 40–60%。Physical Intelligence 短期
              SOM（2026–2028）受限于制造与物流的早期企业试点；若公司能拿下预计会在该窗口采用机器人基础模型软件的 100–300 个企业账户中的 10–30%，SOM 估计为 $200–500
              million。实现这一点需要成功商业发布、可防守的按机器人授权经济性，以及硬件伙伴规模化。
