      - number: '2.4'
        title: 增长驱动与市场约束
        blocks:
          - type: paragraph
            body: >
              关键增长驱动包括：（1）人口结构推高制造和物流劳动力短缺，机器人 ROI 更容易算通；（2）基础模型能力快速提升，把单个定制技能 $50,000–$250,000
              的机器人任务编程成本，靠微调压到接近零；（3）机器人硬件成本下降，尤其协作机器人和机械臂，扩大可部署基数；（4）开放数据集和合成仿真让机器人训练数据更容易获得；（5）资本强势流入该赛道，推高生态建设动能。约束和风险包括：（1）商业部署对安全与可靠性的要求极高；（2）与传统工业系统集成仍然复杂；（3）π₀
              开源释放让基础模型商品化，削弱 PI 维持专有护城河的能力；（4）Skild AI（$14B 估值）、Google DeepMind、Figure AI
              等资金充足的竞争对手可能执行更快；（5）相对早期商业经济性，训练和推理算力成本偏高。
