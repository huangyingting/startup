            body: >
              Skild AI 成立于 2023 年，总部位于匹兹堡；2026 年初以 $14 billion 估值完成 $1.4 billion Series C，由 SoftBank 和 NVIDIA 领投，Samsung
              与 Salesforce Ventures 参投。其 Skild Brain 模型声称用分层架构实现跨形态泛化，并能做到零样本任务迁移。更关键的是，Skild 在 2025 年商业发布后数月内报告 $30
              million 收入，证明了 Physical Intelligence 尚未拿到的商业化牵引。Google DeepMind 的 Gemini Robotics 1.5 于 2026 年初推出，是可通过云访问的
              VLA 模型，具备先进的智能体规划和多步推理；背后有 Google 算力基础设施、海量多模态数据集，以及 Gemini API 分发。Figure AI 此前以 $39B+ 估值融资
              $675M，打造自有人形机器人（Figure 02）和 Helix VLA 模型，并已部署到 BMW 制造工厂；这种全栈路径形成硬件护城河，但限制纯软件分发。Covariant（2024 年被 Amazon
              收购）聚焦仓储 / 物流操作，拥有最深的真实世界运营数据。挪威人形机器人公司 1X Technologies 正在开发用于机器人认知的世界模型，目标融资最高 $1B，估值约
