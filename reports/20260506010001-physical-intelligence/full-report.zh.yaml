  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值背景与进入纪律
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence 于 2025 年 11 月完成 Series B，融资 $600M，投后估值 $5.6B，意味着 CapitalG（Alphabet）、T. Rowe
              Price、Redpoint 和 Lux Capital 的投前进入价格为 $5.0B。交割时公司商业收入为零。机器人 AI 领域没有先例：一家公司在创立 20 个月内、零 ARR 情况下做到 $5.6B
              估值。估值靠三点支撑：（1）团队质量极高（Levine、Finn、Hausman 均为顶级研究者）；（2）技术执行到位（π₀ 论文和演示获得学界和产业强验证）；（3）投资人相信市场规模（2030 年服务机器人市场
              $170B+），也相信 Physical Intelligence 有机会像 LLM 领域的 OpenAI 一样，占住机器人基础模型 API 层。据报道的下一轮 $11B（2026 年 4
              月，未确认）意味着不到六个月估值翻 2×；只有公司已经签下多个企业 LOI，或宣布一个有实质规模的商业伙伴，估值跳升才可信。任何以 $11B 进入的投资人，安全边际都比 Series B 投资人更窄：在 $11B
              且零收入情况下，要把收入倍数恢复到合理的 10× 退出，需要 $1.1B ARR。换句话说，它要长成一家机器人基础模型龙头，规模接近前五大企业 SaaS 公司。投资周期是 10–15 年，不是 5–7 年。
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV004
              - CV005
