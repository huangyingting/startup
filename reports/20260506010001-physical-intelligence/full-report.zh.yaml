  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: wide
    summary: Physical Intelligence 入场时的关键投资指标，概括财务、商业和风险画像。
    data:
      items:
        - label: 投后估值（B 轮）
          value: $5.6B
          detail: 2025 年 11 月；该估值下 ARR 为零
        - label: 入场收入倍数
          score: 0
          detail: N/A — 无限大（零收入）；行业内最极端倍数
        - label: 估计烧钱速度（年度）
          value: $70–150M
          detail: 分析师估计；公司未披露
        - label: B 轮隐含现金跑道
          value: 4–8 years
          detail: 商业化前规模估计；规模化后压缩至 2–3 年
        - label: 要让本轮估值在 30× 远期倍数下成立所需 ARR
          value: $187M
          detail: 按 $5.6B / 30× = $187M ARR 计算，才能支撑当前估值
        - label: 达到 $50M ARR 的估计年限（基准情景）
          score: 3
          detail: 基于 12–24 个月销售周期和试点转化基准
        - label: 基于可比交易的合理价值区间
          value: $1.5B–$4.0B
          detail: 分析师基于同阶段可比交易估计
        - label: 投资建议
          score: 3
          detail: 谨慎 — 放弃或观察；商业证据达到 $50M+ ARR 后再看
    claimRefs:
      - CV001
      - CV011
      - CV018
