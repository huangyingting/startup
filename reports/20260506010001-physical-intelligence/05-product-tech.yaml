callouts:
  - title: PaliGemma Backbone Creates Structural Google Dependency
    body: >-
      Physical Intelligence's core VLA architecture uses PaliGemma 3B, a model released by Google DeepMind under open
      weights terms. A change in Google's licensing policy or a decision to restrict commercial use of PaliGemma would
      require Physical Intelligence to retrain its foundational model from scratch on an alternative backbone, at a cost
      of tens of millions of dollars and 6–12 months of delay. This is a material single-vendor dependency risk that
      diligence should address with contractual protections if possible.
    calloutType: risk
    claimRefs:
      - CE012
      - CE013
  - title: Cross-Embodiment Training Is the Core Defensible Differentiator
    body: >-
      Physical Intelligence's training across 68 robot embodiments is the most distinctive capability claim in the
      field. If this breadth of cross-embodiment coverage is genuine and generalizable to new robot types, it provides a
      data flywheel and model generalization advantage that would take competitors years to replicate. Verifying that
      the 68 embodiments include commercially relevant robot types (not just academic research platforms) is a key
      diligence priority.
    calloutType: strength
    claimRefs:
      - CE006
      - CE007
      - CE008
