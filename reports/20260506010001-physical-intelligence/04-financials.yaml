callouts:
  - title: Zero Revenue at $5.6 Billion Valuation — An Extreme Bet
    body: >-
      Physical Intelligence's $5.6 billion valuation with $0 commercial revenue implies an effectively infinite revenue
      multiple. This is justified only if investors believe PI will establish category leadership in robot foundation
      model software at significant scale within 3–5 years. The company needs to convert enterprise pilots to
      revenue-generating contracts and publicly demonstrate commercial traction within the next 12–18 months to sustain
      investor confidence for the reported $11B next round.
    calloutType: risk
    claimRefs:
      - CI012
      - CI013
      - CI014
  - title: Burn Rate Estimates Suggest Adequate Runway for Commercial Launch
    body: >-
      If PI's estimated annual burn of $70–$150M is accurate, the $600M Series B alone provides approximately 4–8 years
      of runway at the pre-commercial scale. This is sufficient to fund commercial launch and initial deployment scaling
      without requiring an immediate next raise. However, actual runway compresses significantly if headcount and
      compute investments accelerate to capture market opportunity.
    calloutType: insight
    claimRefs:
      - CI007
      - CI008
      - CI009
