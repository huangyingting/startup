company:
  name: Physical Intelligence
  website: https://physicalintelligence.company
chapter:
  number: 4
  title: Financials
  summary: >
    Physical Intelligence is pre-revenue as of Q1 2026, making it one of the largest pre-commercial robotics AI startups
    by funding raised ($1.07 billion). There is no disclosed ARR, gross margin, burn rate, or cash on hand. The company
    has raised across three rounds (seed, Series A, Series B) at an implied $5.6 billion post-money valuation with no
    commercial revenue to anchor the multiple. Financial modeling relies entirely on unit economics projections for a
    SaaS-per-robot model that has not yet been priced or contracted. Capital adequacy is estimated at 24–36 months of
    runway based on assumed burn rates for a ~150–250 person AI research team. Diligence must surface whether the
    company has a credible path to $50M+ ARR within 36 months to justify continued fundraising at high valuations.
sections:
  - id: s1
    title: Revenue Model and Current Revenue Status
    body: >
      Physical Intelligence has no disclosed commercial revenue as of Q1 2026. The company is conducting early
      enterprise pilot programs in manufacturing and logistics, but no contracts, ARR, or commercial terms have been
      made public. The planned revenue model is a SaaS-per-robot licensing structure, whereby enterprise customers would
      pay a recurring annual fee per robot deployed using PI's foundation model. This is analogous to the per-seat or
      per-unit SaaS models used in enterprise software, applied to physical robots. No pricing has been publicly
      announced. Industry analogies suggest per-robot annual fees could range from $5,000 to $15,000, implying that
      reaching $50M ARR would require approximately 3,300–10,000 active robot deployments. Additional revenue streams
      may include model fine-tuning fees (one-time or recurring), enterprise deployment support, and potentially data
      licensing for robot training datasets. None of these have been announced. The openpi open-source release does not
      appear to generate direct revenue and is treated as a community and ecosystem investment. The company's
      pre-revenue status creates a binary risk: either commercial launch proceeds within 12–18 months and the enterprise
      pilot pipeline converts, or fundraising becomes increasingly difficult as competitors establish revenue traction.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
    tableRefs:
      - TI001
      - TI002
    figureRefs:
      - FI001
      - FI004
  - id: s2
    title: Cost Structure, Capital Intensity, and Burn Rate
    body: >-
      Physical Intelligence's cost structure is dominated by research and engineering personnel (estimated at 150–250
      employees in Q1 2026), GPU compute for model training and inference, and overhead for a premium San Francisco
      location. Annual personnel cost at an average all-in compensation of $300,000–$400,000 per employee implies a
      personnel burn rate of approximately $45–$100 million per year depending on headcount. Compute costs for training
      large robot VLA models on diverse embodiment data are significant; industry benchmarks for models of π₀'s scale
      suggest training runs costing $5–20 million per major version, with ongoing inference costs accruing at scale.
      Total estimated annual burn is $70–$150 million, implying that the $600M Series B alone provides approximately 4–8
      years of runway if the company does not scale its compute or headcount substantially. However, achieving
      commercial scale will require significant headcount and compute expansion, likely compressing runway to 24–36
      months at full commercial build-out. Physical Intelligence has not disclosed its actual burn rate or cash on hand.
      There is no publicly disclosed debt financing, and the company has not reported operating losses through
      regulatory filings as it remains private with no SEC reporting obligation beyond Form D exempt offerings.
      Additionally, capital expenditure for custom robotics lab infrastructure, safety testing equipment, and potential
      manufacturing partnerships for pilot programs would add to the cost base. A company of this profile at this stage
      typically allocates 60–70% of burn to personnel, 20–25% to compute, and 10–15% to facilities and other overhead.
      These proportions are consistent with comparable AI research startups and suggest that Physical Intelligence's
      total annual operating costs could realistically reach $120 million or more if headcount approaches 250 and
      compute expenditure scales with next-generation model development.
    claimRefs:
      - CI006
      - CI007
      - CI008
      - CI009
      - CI010
      - CI011
    tableRefs:
      - TI003
      - TI005
    figureRefs:
      - FI002
  - id: s3
    title: Capital Adequacy, Funding Path, and Financial Risks
    body: >
      With approximately $1.07 billion raised across three rounds and an estimated burn of $70–$150 million per year,
      Physical Intelligence's estimated runway is approximately 24–60 months depending on pace of commercial scale-up.
      The company is reportedly in advanced talks for a next funding round at an $11 billion valuation as of April 2026,
      which if completed at $500M+ would further extend runway by 3–6 years. The key financial risks are: (1) the
      company must achieve at least $50M ARR to justify continued investor confidence before its next raise; (2) if
      commercial conversion of pilots stalls, the valuation step-up becomes difficult to defend — the current $5.6B
      valuation implies an infinite revenue multiple; (3) compute costs for training successive model generations could
      compress runway faster than expected; (4) a market downturn or investor sentiment shift could close the
      fundraising window at AI valuations that do not account for zero revenue. The company has no disclosed customer
      concentration risk as it has no commercial customers. Required source types for financial diligence include
      official company communications and regulatory filings; the only SEC Form D filed is for the Series B exempt
      offering which discloses no financial details beyond offering size.
    claimRefs:
      - CI012
      - CI013
      - CI014
      - CI015
      - CI016
      - CI017
    tableRefs:
      - TI004
    figureRefs:
      - FI003
