callouts:
  - title: Software-Layer Positioning Is the High-Margin Play
    body: >-
      Physical Intelligence deliberately avoids hardware manufacturing, targeting the software intelligence layer where
      margins in AI SaaS are 70–85% gross versus 20–40% for hardware. If robot foundation models follow the LLM API
      playbook, the company that establishes the dominant model-plus-ecosystem wins disproportionate economic value.
      However, this requires PI to establish commercial pricing and scale deployments before well-resourced incumbents
      close the gap.
    calloutType: insight
    claimRefs:
      - CM001
      - CM002
      - CM010
  - title: Open-Source Release Creates Ecosystem but Compresses Moat
    body: >-
      The February 2025 open-source release of π₀ accelerates developer ecosystem formation but simultaneously enables
      competitors to build on PI's base model. This parallels the Hugging Face / open LLM dynamic: community adoption
      builds brand and data contributions, but commoditization of base capabilities forces PI to differentiate on
      enterprise fine-tuning, support, and proprietary data. The net market effect is positive for total market growth
      but ambiguous for PI's long-term competitive position.
    calloutType: risk
    claimRefs:
      - CM019
      - CM020
      - CM021
