chapter:
  number: 2
  title: Market Analysis
  summary: >
    Physical Intelligence operates at the intersection of physical AI, embodied robotics, and foundation model software.
    The addressable market spans industrial automation, logistics, warehouse operations, manufacturing, and emerging
    service robotics. The core TAM for robot AI software (foundation models, deployment stacks, per-robot licensing) is
    estimated at $15–25 billion by 2030, embedded within a broader physical AI / robotics hardware-plus-software TAM of
    $111–185 billion. The market is in early-growth phase: technology readiness is advancing rapidly but commercial
    scaling, data moats, and hardware-software integration remain barriers. Physical Intelligence targets the software
    intelligence layer—the highest-margin segment—rather than hardware manufacturing.
sections:
  - id: s1
    title: Market Definition and Segmentation
    body: >
      The market relevant to Physical Intelligence is best understood in three concentric layers. The broadest is global
      physical AI and robotics (hardware plus software), a market spanning industrial robots, mobile manipulators,
      humanoids, and autonomous vehicles with an estimated TAM of $50–82 billion in 2025 growing to $111–185 billion by
      2030. Within this, the enterprise robotics software and AI stack (models, deployment infrastructure, training
      pipelines) represents a narrower SAM of approximately $8–15 billion in 2025, expected to reach $20–35 billion by
      2030 at 20–35% CAGR. The most relevant addressable segment for Physical Intelligence is robot foundation model
      software and per-robot SaaS licensing, which does not yet have an established analyst category but can be
      extrapolated at roughly $3–8 billion by 2028 based on per-robot unit economics and projected deployment scale in
      manufacturing, logistics, and warehouse automation. Key verticals include: manufacturing and assembly (largest by
      revenue today), logistics and warehouse automation (fastest growing), commercial and facilities services, and
      emerging humanoid-enabled tasks in healthcare and retail. Physical Intelligence is currently hardware-agnostic and
      targets robot OEM partners plus enterprise customers who already own or plan to deploy robot fleets.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
    tableRefs:
      - TM001
    figureRefs:
      - FM001
  - id: s2
    title: TAM, SAM, and SOM Analysis
    body: >
      Grand View Research estimates the physical AI market (embodied AI, robot intelligence software, autonomous
      systems) at approximately $81.6 billion in 2025 with a CAGR of approximately 32% through 2033. MarketsandMarkets
      estimates the AI-in-robotics market (intelligence and control software only) at $5.8 billion in 2025 growing to
      $25.9 billion by 2030. McKinsey and BCG analyses suggest that robot software and AI layers will eventually capture
      40–60% of total robotics value chain margins as proprietary intelligence becomes the primary differentiator over
      commodity hardware. For Physical Intelligence, the SOM in the near term (2026–2028) is constrained to early
      enterprise pilots in manufacturing and logistics, with an estimated SOM of $200–500 million if it can win 10–30%
      of the 100–300 enterprise accounts likely to adopt robot foundation model software in that window. This requires
      successful commercial launch, defensible per-robot licensing economics, and hardware partner scale-up.
    claimRefs:
      - CM006
      - CM007
      - CM008
      - CM009
      - CM010
      - CM011
    tableRefs:
      - TM002
    figureRefs:
      - FM002
      - FM004
  - id: s3
    title: Segment and Buyer Analysis
    body: >
      The primary buyer segments for Physical Intelligence are: (1) robot OEM manufacturers who want to embed foundation
      model intelligence into their hardware (e.g., Agility Robotics, Boston Dynamics, smaller humanoid startups); (2)
      large enterprise operators who deploy robots in manufacturing or logistics and want cross-robot generalization
      without task-specific programming; and (3) system integrators who build turnkey automation solutions for factories
      and warehouses. The decision-maker in enterprise accounts is typically the VP of Operations, Chief Automation
      Officer, or VP of Engineering, with procurement involving IT security review, data residency requirements, and
      integration approval. Buying cycles in enterprise robotics are 12–24 months from pilot to contract; Physical
      Intelligence is in the pilot phase. The OEM partnership channel offers faster distribution but lower margins and
      higher dependency on hardware partner success. North America and Europe are primary markets today; Asia-Pacific
      (particularly Japan, South Korea, and China) represents the largest long- term volume market given high industrial
      robot density.
    claimRefs:
      - CM012
      - CM013
      - CM014
      - CM015
      - CM016
    tableRefs:
      - TM003
    figureRefs:
      - FM003
  - id: s4
    title: Growth Drivers and Market Constraints
    body: >
      Key growth drivers include: (1) accelerating labor shortages in manufacturing and logistics due to demographic
      trends, which make robotics ROI calculations favorable; (2) rapid improvement in foundation model capabilities
      reducing the cost of robot task programming from $50,000–$250,000 per custom skill to near-zero with fine- tuning;
      (3) falling robot hardware costs (especially for collaborative robots and arms) expanding the deployable base; (4)
      increasing availability of robot training data through open datasets and synthetic simulation; and (5) strong
      capital inflows to the sector creating ecosystem development momentum. Constraints and risks include: (1) safety
      and reliability requirements for commercial deployment are extremely stringent; (2) integration complexity with
      legacy industrial systems remains high; (3) the open-source release of π₀ commoditizes the base model and
      challenges PI's ability to maintain proprietary moat; (4) well-funded competitors (Skild AI at $14B valuation,
      Google DeepMind, Figure AI) could out-execute; and (5) compute costs for training and inference are high relative
      to early commercial economics.
    claimRefs:
      - CM017
      - CM018
      - CM019
      - CM020
      - CM021
      - CM022
      - CM023
