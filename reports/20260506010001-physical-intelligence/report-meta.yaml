companyProfile:
  summary: >-
    Physical Intelligence was founded in March 2024 in San Francisco by a team of elite robotics AI researchers —
    Karol Hausman (CEO, ex-Google DeepMind), Sergey Levine (Chief Scientist, UC Berkeley RAIL Lab), Chelsea Finn
    (MAML co-inventor, Stanford AI Lab), Brian Ichter (ex-Google DeepMind), Adnan Esmail (VP Engineering,
    ex-Anduril/Tesla), and Lachy Groom (ex-Stripe). The company's mission is to build a universal robot foundation
    model — an AI system that can control any robot to perform any physical task, analogous to GPT-4's relationship
    to text tasks. Its flagship π₀ model trains across 68 robot embodiments and outperforms prior state-of-the-art
    on dexterous manipulation benchmarks. The company raised $1.07 billion across three rounds (seed, Series A, Series B)
    in under 20 months, reaching a $5.6 billion valuation in November 2025 with zero commercial revenue. Enterprise
    pilots are active in manufacturing and logistics, with AgiBot and Longcheer Technology named as early partners.
    The company operates in a competitive field against Skild AI ($14B valuation, $30M ARR), Google DeepMind Gemini
    Robotics, and Figure AI ($39B valuation), each of which presents a distinct competitive challenge.
