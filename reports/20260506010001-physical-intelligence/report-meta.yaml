    π₀ (pi-zero): Cross-embodiment VLA combining PaliGemma 3B VLM + 300M action expert via flow matching, supporting
    68+ robot embodiments. π₀.5: Enhanced internet-scale pre-training variant. π₀-FAST: Optimized low-latency decoder.
    openpi: Open-source fine-tuning framework (Apache 2.0). Planned commercial product is SaaS per-robot licensing.
  customerFocus: >-
    Pre-commercial. Target segments include large manufacturing (automotive, electronics, consumer goods) and logistics
