  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Framework and Market Structure
        blocks:
          - type: paragraph
            body: >
              The robot foundation model market can be segmented into three competitive archetypes. The first is pure
              software / intelligence-layer players, who build general-purpose robot brains without making hardware:
              Physical Intelligence and Skild AI are the primary examples. The second is full-stack robotics integrators
              who build both hardware and proprietary AI: Figure AI (humanoid arms + Helix VLA), 1X Technologies
              (humanoid + world model), and Agility Robotics (Digit + AI) are examples. The third is incumbent
              technology firms with adjacent compute and AI assets who are extending into robotics: Google DeepMind
              (Gemini Robotics 1.5), Amazon Robotics (Sequoia robotic drive systems + Sparrow), and NVIDIA (Cosmos world
              foundation model). Physical Intelligence most directly competes with Skild AI on the software intelligence
              layer, and with Google DeepMind on model capability and research credibility. Full-stack integrators are
              competitors for enterprise wallet share but also potential customers for PI's model.
            claimRefs:
              - C076
              - C077
              - C078
              - C079
      - number: '3.2'
        title: Key Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Skild AI, founded in 2023 and based in Pittsburgh, has raised $1.4 billion in a Series C round at a $14
              billion valuation (early 2026), led by SoftBank and NVIDIA, with Samsung and Salesforce Ventures
              participating. Its Skild Brain model claims cross-embodiment generalization via hierarchical architecture
              and achieves zero-shot task transfer. Crucially, Skild reported $30 million in revenue within months of
              its commercial launch in 2025, demonstrating monetization traction that Physical Intelligence has yet to
              achieve. Google DeepMind's Gemini Robotics 1.5 launched in early 2026 as a cloud-accessible VLA model with
              advanced agentic planning and multi-step reasoning — backed by Google's compute infrastructure, massive
              multimodal dataset, and distribution through the Gemini API. Figure AI, which earlier raised $675M at
              $39B+ valuation, builds proprietary humanoid robots (Figure 02) with its Helix VLA model, deployed at BMW
              manufacturing plants; this full-stack approach creates hardware moat but limits software-only
              distribution. Covariant (acquired by Amazon in 2024) focuses narrowly on warehouse/logistics manipulation
              and has the deepest real-world operational data. 1X Technologies, a Norwegian humanoid company, is
              developing a world model for robot cognition with up to $1B raise targeted at ~$10B valuation. Each
              competitor has distinct strengths; Physical Intelligence must differentiate on depth of dexterous
              manipulation, ecosystem openness, and research-grade model quality.
            claimRefs:
              - C080
              - C081
              - C082
              - C083
              - C084
              - C085
              - C086
              - C087
              - C088
      - number: '3.3'
        title: Physical Intelligence Moat Analysis and Competitive Risk
        blocks:
          - type: paragraph
            body: >-
              Physical Intelligence's competitive advantages are: (1) founder pedigree — the combination of Sergey
              Levine (RAIL Lab, Berkeley), Chelsea Finn (MAML, Stanford), and Karol Hausman (RT-2, DeepMind) is arguably
              the world's most credible robotics AI founding team; (2) dexterous manipulation depth — π₀ demonstrated
              industry-leading long- horizon dexterous tasks (laundry folding, assembly) not matched by most competitors
              in benchmarks; (3) open-source ecosystem — openpi creates developer community and training data
              contributions. Key risks to this moat include: (1) open-sourcing commoditizes the base model — Skild,
              Google, and others can benchmark against PI's published work; (2) Skild AI has $14B valuation with ~2.5×
              PI's funding and has already achieved commercial revenue; (3) Google DeepMind has orders of magnitude more
              compute and data, and Gemini Robotics 1.5 is accessible via API to any developer; (4) PI remains
              pre-revenue — if commercial launch is delayed, well-funded rivals will establish enterprise relationships
              first; (5) full-stack integrators (Figure AI, 1X) may have better hardware- software synergies for
              specific deployments. The moat is currently research-stage and not yet commercially proven. Physical
              Intelligence must prioritize commercial launch, hardware partner agreements, and safety certification
              before Skild AI establishes enterprise lock-in and before Google DeepMind completes its commercial API
              rollout for Gemini Robotics. The window for PI to establish a defensible position on commercially proven
              enterprise accounts is approximately 12–18 months from now. Beyond this window, the moat risks becoming
              primarily academic rather than commercially validated. The competitive dynamics in this market ultimately
              favor the player who first proves enterprise-grade reliability and establishes a recurring revenue base.
            claimRefs:
              - C089
              - C090
              - C091
              - C092
              - C093
              - C094
              - C095
