  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence's most significant regulatory risk is the EU AI Act, which classifies AI systems
              operating in physical environments with potential for harm as potentially high-risk under Annex III. Robot
              AI systems deployed in manufacturing or logistics contexts will likely require conformity assessment,
              human oversight mechanisms, technical documentation, and post-market monitoring before EU commercial
              deployment. Compliance with the EU AI Act is expected to add 12–24 months to the EU go-to-market timeline
              and require significant legal and engineering resources. In the United States, OSHA workplace safety
              regulations and NIST AI Risk Management Framework guidelines apply to AI systems in workplace
              environments, but current US regulatory requirements are less prescriptive than the EU Act and do not
              block near-term domestic deployment. Functional safety certification under ISO 13849 and IEC 62061 is
              required for robot software deployed in manufacturing environments with human-robot collaboration;
              Physical Intelligence has not disclosed any certification progress. Training data IP liability is a latent
              legal risk: if Physical Intelligence's robot demonstration dataset includes video content derived from
              copyrighted sources (manufacturing process videos, proprietary robot operation recordings), IP claims from
              data originators could constrain the company's freedom to operate. There are no known active litigation
              proceedings, regulatory enforcement actions, or material legal disputes against Physical Intelligence as
              of Q1 2026.
            claimRefs:
              - C217
              - C218
              - C219
              - C220
              - C221
      - number: '7.2'
        title: Operational, Competitive, and Technical Risk
        blocks:
          - type: paragraph
            body: >
              The most acute operational risk is the lab-to-production gap for π₀. While the model demonstrates
              impressive benchmark performance in controlled laboratory conditions, production manufacturing and
              logistics environments are significantly more challenging: unstructured workspaces, variable lighting,
              mixed human and robot traffic, real-time reliability requirements, and the need for 99%+ uptime. Industry
              experience in robotics consistently shows a 20–40 percentage point performance degradation from laboratory
              to production. If Physical Intelligence cannot close this gap during its pilot phase, commercial
              conversion will fail. Competitive operational risk is high from Skild AI, which has already achieved ~$30M
              ARR and is building a commercial data flywheel. Each quarter that Skild AI accumulates production
              deployment data, its model quality improves, widening the competitive moat. Google DeepMind's Gemini
              Robotics 1.5 poses an existential-level competitive threat: Google has effectively unlimited compute,
              direct access to PaliGemma (which Physical Intelligence depends on), and deep enterprise relationships
              through Google Cloud and Google Workspace that provide a natural robot AI distribution channel. Physical
              Intelligence's open-source strategy (openpi) creates a replication risk: a sufficiently motivated
              competitor with compute access can use the published arXiv preprint and the openpi codebase as a starting
              point for replication, compressing the research moat from years to months.
            claimRefs:
              - C222
              - C223
              - C224
              - C225
              - C226
              - C227
      - number: '7.3'
        title: Financial, Dependency, and Key-Person Risk
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence's financial risk profile is extreme at its current valuation: zero revenue,
              $70–$150M estimated annual burn, and a reported next round at $11B that would require demonstrating
              meaningful commercial traction to close. If the $11B round does not close and commercial revenue remains
              at zero, the company would need to either cut burn dramatically or accept down-round financing, both of
              which carry material equity dilution and talent retention risks. The PaliGemma dependency on Google
              DeepMind is both a technical and financial risk: Google is simultaneously an investor (via CapitalG), a
              technology dependency (PaliGemma), and a direct competitor (Gemini Robotics). If Google restricts
              PaliGemma commercial licensing or acquires a competitor, Physical Intelligence's core architecture is at
              risk. Key-person risk is concentrated: Sergey Levine is the primary public face of the technical approach
              and his departure would impair the technical credibility of the company with investors, potential
              partners, and enterprise customers. Chelsea Finn (MAML co-inventor) and Karol Hausman (CEO) represent
              similar concentration. The company has not disclosed any key-person insurance, founder vesting schedules,
              or retention arrangements. Capital concentration risk is also notable: Lux Capital participated in all
              three rounds, and CapitalG (Alphabet) led the Series B, meaning two investors have majority influence on
              the cap table and board dynamics.
            claimRefs:
              - C228
              - C229
              - C230
              - C231
              - C232
              - C233
