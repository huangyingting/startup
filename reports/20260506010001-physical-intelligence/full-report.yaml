      - number: '6.2'
        title: Pilot Activity and Adoption Evidence
        blocks:
          - type: paragraph
            body: >
              Press reporting from 2024–2025 confirms that Physical Intelligence is engaged in enterprise pilot programs
              with at least two named companies: AgiBot (a Chinese robot manufacturer) and Longcheer Technology (an
              electronics manufacturer), both of which are early-stage cross-embodiment data contributors as well as
