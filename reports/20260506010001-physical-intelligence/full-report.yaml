        title: Exhibits
        blocks:
          - type: callout
            title: Skild AI Leads on Commercial Traction — a Critical Gap
            body: >-
              Skild AI's reported $30M ARR within months of commercial launch represents the most significant
              competitive threat to Physical Intelligence. A software peer with comparable hardware-agnostic positioning
              but 2.5× the funding and already-proven revenue traction creates a first-mover advantage in enterprise
              relationships. If PI does not achieve commercial revenue within the next 12–18 months, Skild's data
              flywheel and enterprise lock-in could become insurmountable.
            calloutType: risk
            claimRefs:
              - C080
              - C081
              - C091
