  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Current Revenue Status
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence has no disclosed commercial revenue as of Q1 2026. The company is conducting early
              enterprise pilot programs in manufacturing and logistics, but no contracts, ARR, or commercial terms have
              been made public. The planned revenue model is a SaaS-per-robot licensing structure, whereby enterprise
              customers would pay a recurring annual fee per robot deployed using PI's foundation model. This is
              analogous to the per-seat or per-unit SaaS models used in enterprise software, applied to physical robots.
              No pricing has been publicly announced. Industry analogies suggest per-robot annual fees could range from
              $5,000 to $15,000, implying that reaching $50M ARR would require approximately 3,300–10,000 active robot
              deployments. Additional revenue streams may include model fine-tuning fees (one-time or recurring),
              enterprise deployment support, and potentially data licensing for robot training datasets. None of these
              have been announced. The openpi open-source release does not appear to generate direct revenue and is
              treated as a community and ecosystem investment. The company's pre-revenue status creates a binary risk:
              either commercial launch proceeds within 12–18 months and the enterprise pilot pipeline converts, or
              fundraising becomes increasingly difficult as competitors establish revenue traction.
            claimRefs:
