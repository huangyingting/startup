      - number: '4.2'
        title: Cost Structure, Capital Intensity, and Burn Rate
        blocks:
          - type: paragraph
            body: >-
              Physical Intelligence's cost structure is dominated by research and engineering personnel (estimated at
              150–250 employees in Q1 2026), GPU compute for model training and inference, and overhead for a premium
              San Francisco location. Annual personnel cost at an average all-in compensation of $300,000–$400,000 per
              employee implies a personnel burn rate of approximately $45–$100 million per year depending on headcount.
              Compute costs for training large robot VLA models on diverse embodiment data are significant; industry
              benchmarks for models of π₀'s scale suggest training runs costing $5–20 million per major version, with
              ongoing inference costs accruing at scale. Total estimated annual burn is $70–$150 million, implying that
              the $600M Series B alone provides approximately 4–8 years of runway if the company does not scale its
              compute or headcount substantially. However, achieving commercial scale will require significant headcount
              and compute expansion, likely compressing runway to 24–36 months at full commercial build-out. Physical
              Intelligence has not disclosed its actual burn rate or cash on hand. There is no publicly disclosed debt
              financing, and the company has not reported operating losses through regulatory filings as it remains
              private with no SEC reporting obligation beyond Form D exempt offerings. Additionally, capital expenditure
              for custom robotics lab infrastructure, safety testing equipment, and potential manufacturing partnerships
              for pilot programs would add to the cost base. A company of this profile at this stage typically allocates
              60–70% of burn to personnel, 20–25% to compute, and 10–15% to facilities and other overhead. These
              proportions are consistent with comparable AI research startups and suggest that Physical Intelligence's
              total annual operating costs could realistically reach $120 million or more if headcount approaches 250
              and compute expenditure scales with next-generation model development.
