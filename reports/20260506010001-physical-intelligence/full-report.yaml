  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Segmentation
        blocks:
          - type: paragraph
            body: >
              The market relevant to Physical Intelligence is best understood in three concentric layers. The broadest
              is global physical AI and robotics (hardware plus software), a market spanning industrial robots, mobile
              manipulators, humanoids, and autonomous vehicles with an estimated TAM of $50–82 billion in 2025 growing
              to $111–185 billion by 2030. Within this, the enterprise robotics software and AI stack (models,
              deployment infrastructure, training pipelines) represents a narrower SAM of approximately $8–15 billion in
              2025, expected to reach $20–35 billion by 2030 at 20–35% CAGR. The most relevant addressable segment for
              Physical Intelligence is robot foundation model software and per-robot SaaS licensing, which does not yet
              have an established analyst category but can be extrapolated at roughly $3–8 billion by 2028 based on
              per-robot unit economics and projected deployment scale in manufacturing, logistics, and warehouse
              automation. Key verticals include: manufacturing and assembly (largest by revenue today), logistics and
              warehouse automation (fastest growing), commercial and facilities services, and emerging humanoid-enabled
              tasks in healthcare and retail. Physical Intelligence is currently hardware-agnostic and targets robot OEM
              partners plus enterprise customers who already own or plan to deploy robot fleets.
            claimRefs:
              - C041
              - C042
              - C043
              - C044
              - C045
      - number: '2.2'
        title: TAM, SAM, and SOM Analysis
        blocks:
          - type: paragraph
            body: >
              Grand View Research estimates the physical AI market (embodied AI, robot intelligence software, autonomous
              systems) at approximately $81.6 billion in 2025 with a CAGR of approximately 32% through 2033.
              MarketsandMarkets estimates the AI-in-robotics market (intelligence and control software only) at $5.8
              billion in 2025 growing to $25.9 billion by 2030. McKinsey and BCG analyses suggest that robot software
              and AI layers will eventually capture 40–60% of total robotics value chain margins as proprietary
              intelligence becomes the primary differentiator over commodity hardware. For Physical Intelligence, the
              SOM in the near term (2026–2028) is constrained to early enterprise pilots in manufacturing and logistics,
              with an estimated SOM of $200–500 million if it can win 10–30% of the 100–300 enterprise accounts likely
              to adopt robot foundation model software in that window. This requires successful commercial launch,
              defensible per-robot licensing economics, and hardware partner scale-up.
            claimRefs:
              - C046
              - C047
              - C048
              - C049
              - C050
              - C051
      - number: '2.3'
        title: Segment and Buyer Analysis
        blocks:
          - type: paragraph
            body: >
              The primary buyer segments for Physical Intelligence are: (1) robot OEM manufacturers who want to embed
              foundation model intelligence into their hardware (e.g., Agility Robotics, Boston Dynamics, smaller
              humanoid startups); (2) large enterprise operators who deploy robots in manufacturing or logistics and
              want cross-robot generalization without task-specific programming; and (3) system integrators who build
              turnkey automation solutions for factories and warehouses. The decision-maker in enterprise accounts is
              typically the VP of Operations, Chief Automation Officer, or VP of Engineering, with procurement involving
              IT security review, data residency requirements, and integration approval. Buying cycles in enterprise
              robotics are 12–24 months from pilot to contract; Physical Intelligence is in the pilot phase. The OEM
              partnership channel offers faster distribution but lower margins and higher dependency on hardware partner
              success. North America and Europe are primary markets today; Asia-Pacific (particularly Japan, South
              Korea, and China) represents the largest long- term volume market given high industrial robot density.
            claimRefs:
              - C052
              - C053
              - C054
              - C055
              - C056
      - number: '2.4'
        title: Growth Drivers and Market Constraints
        blocks:
          - type: paragraph
            body: >
              Key growth drivers include: (1) accelerating labor shortages in manufacturing and logistics due to
              demographic trends, which make robotics ROI calculations favorable; (2) rapid improvement in foundation
              model capabilities reducing the cost of robot task programming from $50,000–$250,000 per custom skill to
              near-zero with fine- tuning; (3) falling robot hardware costs (especially for collaborative robots and
              arms) expanding the deployable base; (4) increasing availability of robot training data through open
              datasets and synthetic simulation; and (5) strong capital inflows to the sector creating ecosystem
              development momentum. Constraints and risks include: (1) safety and reliability requirements for
              commercial deployment are extremely stringent; (2) integration complexity with legacy industrial systems
              remains high; (3) the open-source release of π₀ commoditizes the base model and challenges PI's ability to
              maintain proprietary moat; (4) well-funded competitors (Skild AI at $14B valuation, Google DeepMind,
              Figure AI) could out-execute; and (5) compute costs for training and inference are high relative to early
              commercial economics.
            claimRefs:
              - C057
              - C058
              - C059
              - C060
              - C061
              - C062
              - C063
      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Software-Layer Positioning Is the High-Margin Play
            body: >-
              Physical Intelligence deliberately avoids hardware manufacturing, targeting the software intelligence
              layer where margins in AI SaaS are 70–85% gross versus 20–40% for hardware. If robot foundation models
              follow the LLM API playbook, the company that establishes the dominant model-plus-ecosystem wins
              disproportionate economic value. However, this requires PI to establish commercial pricing and scale
              deployments before well-resourced incumbents close the gap.
            calloutType: insight
            claimRefs:
              - C041
              - C042
              - C050
          - type: callout
            title: Open-Source Release Creates Ecosystem but Compresses Moat
            body: >-
              The February 2025 open-source release of π₀ accelerates developer ecosystem formation but simultaneously
              enables competitors to build on PI's base model. This parallels the Hugging Face / open LLM dynamic:
              community adoption builds brand and data contributions, but commoditization of base capabilities forces PI
              to differentiate on enterprise fine-tuning, support, and proprietary data. The net market effect is
              positive for total market growth but ambiguous for PI's long-term competitive position.
            calloutType: risk
            claimRefs:
              - C059
              - C060
              - C061
