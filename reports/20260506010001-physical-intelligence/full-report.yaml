chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Company Identity and Business Overview
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence, trading as pi.ai, was incorporated and began operations in San Francisco,
              California in March 2024. Its stated mission is to build "a single, general-purpose AI system capable of
              controlling any robot for any task." The company operates at the intersection of robotics, reinforcement
              learning, and large foundation models. Its primary product is π₀ (pi-zero), a vision-language-action (VLA)
              foundation model that ingests camera images, natural language task instructions, and robot proprioceptive
              state to predict continuous motor actions via a flow-matching transformer. π₀ is hardware-agnostic—it can
              be fine-tuned to operate diverse robot platforms (arms, mobile manipulators, humanoids) without rebuilding
              from scratch. Physical Intelligence's business model targets enterprise licensing of its model stack on a
              per-robot SaaS basis, though as of Q1 2026 the company remains pre-commercial-revenue and focused on
              research deployment and pilot programs. The company has also released an open-source variant (openpi) to
              drive ecosystem adoption and training data contributions.
            claimRefs:
              - C001
              - C002
              - C003
              - C004
              - C005
      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence was co-founded by a group of seven individuals with complementary expertise spanning
              academic robotics research, applied AI engineering, and operational scaling. CEO Karol Hausman was
              previously a Staff Research Scientist at Google DeepMind where he led robotic manipulation research and
              contributed to RT-2; he also served as an adjunct professor at Stanford University. Chief Scientist Sergey
              Levine holds a tenured Associate Professor position at UC Berkeley and leads the Robotic AI and Learning
              (RAIL) Lab, which produced foundational research in deep RL for robots. Co-founder Chelsea Finn, an
              Assistant Professor at Stanford, is best known for Model-Agnostic Meta-Learning (MAML) and rapid robot
              adaptation research. Brian Ichter, another co-founder, was a Research Scientist at Google DeepMind
              focusing on kinodynamic planning and GPU-accelerated robot algorithms. Adnan Esmail, co-founder and VP of
              Engineering, was previously SVP of Engineering at Anduril and a Tesla Autopilot engineer. Lachy Groom
              (early Stripe executive and VC investor) and Quan Vuong (robotics RL researcher) round out the founding
              team. The board composition has not been publicly disclosed; key-person risk is elevated given the
              concentrated technical leadership. There are no disclosed governance controversies or leadership changes
              as of Q1 2026.
            claimRefs:
              - C006
              - C007
              - C008
              - C009
              - C010
              - C011
              - C012
              - C013
      - number: '1.3'
        title: Funding History, Valuation, and Investors
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence has raised approximately $1.07 billion in approximately 20 months. The seed round of
              $70 million was closed in early-mid 2024, backed by Lux Capital and Jeff Bezos among others, and valued
              the company at an undisclosed pre-seed/seed valuation. The Series A of $400 million was closed in November
              2024 at a $2.4 billion post-money valuation; investors included OpenAI, Thrive Capital, Lux Capital, Index
              Ventures, and others. The Series B of $600 million followed one year later in November 2025, at a $5.6
              billion post-money valuation, led by CapitalG (Alphabet's growth fund) with participation from Lux
              Capital, Bond, Redpoint, Sequoia Capital, Thrive Capital, Index Ventures, T. Rowe Price, and Jeff Bezos.
              As of April 2026 the company is reported to be in advanced talks for a further funding round at an $11
              billion valuation, which if completed would represent a ~2× step-up in under six months. All external
              funding is venture equity; no debt, secondary transactions, or revenue-based financing have been publicly
              disclosed. The large round sizes reflect investor conviction in the market opportunity for robot
              foundation models, as well as the team's research pedigree.
            claimRefs:
              - C014
              - C015
              - C016
              - C017
              - C018
              - C019
              - C020
      - number: '1.4'
        title: Key Milestones
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence progressed from founding to $1B+ raised and open-source model release in under two
              years. The company announced its founding and seed funding in March 2024. The π₀ model was described in a
              technical blog post and research paper in October 2024, demonstrating multi-task robot control including
              laundry folding, box assembly, and shirt packaging. The Series A closed in November 2024. In February 2025
              the company open- sourced π₀ model weights and code as the openpi repository, the first open-source
              general robot VLA foundation model. A successor π₀.5 was announced in early 2025, featuring enhanced
              generalization across novel environments. In mid-2025 π₀-FAST was introduced, using a frequency-domain
              discrete action representation (FAST tokenizer) for more efficient inference. The Series B at $5.6 billion
              closed in November 2025. As of Q1 2026, early enterprise pilot deployments are underway in manufacturing
              and logistics verticals with unnamed customers, and the company is reported to be approaching its next
              funding milestone at $11B valuation. There are no disclosed adverse events, regulatory investigations, or
              significant leadership departures as of this report date.
            claimRefs:
