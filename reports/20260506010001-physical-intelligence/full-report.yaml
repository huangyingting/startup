            body: >-
              Physical Intelligence's core VLA architecture uses PaliGemma 3B, a model released by Google DeepMind under
              open weights terms. A change in Google's licensing policy or a decision to restrict commercial use of
              PaliGemma would require Physical Intelligence to retrain its foundational model from scratch on an
              alternative backbone, at a cost of tens of millions of dollars and 6–12 months of delay. This is a
              material single-vendor dependency risk that diligence should address with contractual protections if
              possible.
            calloutType: risk
