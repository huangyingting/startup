            body: >-
              Physical Intelligence's zero-revenue status at a $5.6 billion valuation is not merely a financial metric
              gap — it is the central thesis-break risk for any investment at current pricing. The company must convert
              enterprise pilots to revenue-generating contracts within 12–18 months or face a fundraising environment
              that will not support an $11 billion next round. This timeline is shorter than typical enterprise robotics
              sales cycles, creating structural urgency that the founding team must manage actively.
