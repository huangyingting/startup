    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Current Status
        blocks:
          - type: paragraph
            body: >-
              Physical Intelligence is in a pure pre-revenue, pre-customer phase as of Q1 2026. The company has publicly
              indicated that it is conducting enterprise pilot programs with unnamed manufacturing and logistics
              customers, but no commercial contracts, customer counts, ARR, or reference customers have been disclosed.
              Based on publicly available information, the expected enterprise customer segmentation is: large
              manufacturers with high-density robot deployments (automotive, electronics, consumer goods assembly),
              logistics and e-commerce warehousing operators requiring flexible pick-and-pack automation, food service
              and hospitality operators requiring dexterous manipulation for food preparation and kitchen tasks, and
              potentially government or defense customers for unstructured environment manipulation. The company has no
              SMB or mid-market go-to-market motion announced; all indicated pilots involve large enterprise accounts
              with the budget and operational scale to deploy dozens to hundreds of robots. The robot OEM partner
              network (which includes hardware companies that contributed embodiment data during training) represents a
              potential indirect customer or reseller channel through which PI software could be licensed on top of
              partner hardware, creating a B2B2B distribution path alongside direct enterprise sales. There is no SMB or
              self-serve channel, no product-led growth motion, and no disclosed freemium conversion path from the
              openpi open-source release to enterprise contracts. The entire commercial path is enterprise direct and
              OEM channel sales at this stage.
