      - number: '6.3'
        title: Retention Outlook, Concentration Risk, and Expansion
        blocks:
          - type: paragraph
            body: >
              Physical Intelligence has no retention metrics, churn data, NRR, or contract renewal data because it has
              no commercial customers. Retention analysis must therefore be forward-looking and based on structural
              characteristics of the planned SaaS-per-robot model. Retention is structurally expected to be high
              because: (1) robot AI models accumulate customer-specific fine-tuning data over time, creating a switching
              cost equivalent to losing months of proprietary task training data; (2) enterprise robot fleets represent
              major capital investments that create inertia against software vendor changes; (3) integration with safety
              certification workflows and production scheduling systems creates additional switching barriers. These
              structural factors suggest that once Physical Intelligence achieves commercial deployment, gross revenue
              retention above 90% is plausible, but this is entirely theoretical at this stage. Customer concentration
              risk is unknown but expected to be high in the near term if and when commercial launch occurs, because the
              company is likely to close a small number of large enterprise accounts first, creating significant
              top-customer concentration. Diligence should require disclosure of the top-5 customer revenue
              concentration and any minimum purchase commitments in pilot agreements. The expansion model (land one
              deployment in a customer's facility, then expand to additional facilities or robot types) has attractive
              unit economics if customer lifetime is 5+ years and expansion multiplier is 2–5×, but none of this has
              been demonstrated operationally.
