            title: Google DeepMind Represents Asymmetric Compute and Data Threat
            body: >-
              Google DeepMind's Gemini Robotics 1.5 benefits from Alphabet's compute infrastructure, Google-scale
              multimodal training data, and the Gemini API distribution channel. Physical Intelligence cannot match this
              on compute or data scale without strategic partnerships or a step-change in funding. PI's research
              pedigree may hold near-term differentiation, but Google's advantages compound over time.
            calloutType: risk
