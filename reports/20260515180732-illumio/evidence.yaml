  - id: EG001
    topic: Illumio ARR, revenue, or market share
    description: >-
      Illumio has not publicly disclosed revenue, ARR, or growth rate figures since its November 2021 Series G round.
      All SOM estimates for this chapter are derived analytically from last known valuation ($2.75B) and comparable
      private cybersecurity company revenue multiples (7–12×). The actual revenue figure could differ materially from
      the $200–400M estimate. An S-1 filing, secondary transaction disclosure, or leak to financial press would provide
      a primary data point.
    relatedQuestionRefs:
      - QM017
    diligenceAsk: >-
      Request revenue/ARR data as part of due diligence; cross-check against sales rep headcount and ACV estimates from
      LinkedIn or ZoomInfo to triangulate independently.
  - id: EG002
    topic: Illumio SAM precise definition and serviceable market sizing
    description: >-
      Illumio has not published a formal SAM definition or addressed market analysis. The SAM estimate used in this
      chapter (microsegmentation software segment ≈ $26.74B) is analytical and based on Mordor Intelligence's broad
      microsegmentation market figure, which includes hardware and services components outside Illumio's software-only
      scope. A vendor-published investor deck or industry analyst note specifically scoping software-defined ZTS would
      sharpen the SAM figure.
    relatedQuestionRefs:
      - QM008
    diligenceAsk: >-
      Request Illumio investor deck (likely includes TAM/SAM framing); cross-check against Gartner Magic Quadrant for
      Microsegmentation inclusion criteria to infer software scope.
  - id: EG003
    topic: Evidence of customers choosing SASE platforms over dedicated ZTS vendors
    description: >-
      While the market dynamics clearly indicate SASE/SSE platforms are adding basic microsegmentation capabilities, no
      authoritative win/loss dataset or public analyst study comparing SASE bundle adoption versus dedicated ZTS was
      found. CrowdStrike, Zscaler, and Palo Alto investor materials occasionally reference workload security expansion
      but do not explicitly quantify ZTS displacement of Illumio-class solutions. Customer interview data or competitive
      intelligence from Illumio sales team would be needed to quantify this risk.
    relatedQuestionRefs:
      - QM023
    diligenceAsk: >-
      Ask Illumio for competitive win/loss data by competitor type (SASE, legacy firewall, standalone ZTS); seek
      customer references in deals where SASE was evaluated and rejected.
