companyProfile:
  summary: >-
    Illumio was founded in 2013 in Sunnyvale, California, by Andrew Rubin (CEO) and
    PJ Kirner (CTO, former VMware) to solve lateral-movement risk in enterprise networks.
    The company invented the Adaptive Security Platform (ASP), which uses a distributed
    Policy Compute Engine (PCE) and lightweight VEN agents to enforce granular workload-to-
    workload segmentation policies without requiring network hardware changes. Illumio has
    raised approximately $930 million across seven funding rounds and was last valued at
    $3 billion in a 2024 Warburg Pincus-led growth round. The company serves more than
    1,000 enterprise customers in financial services, healthcare, government, and critical
    infrastructure, and holds a recognised Gartner Leader and Forrester Leader position in
    the microsegmentation category it pioneered.
  foundedDate: "2013-06-01"
  founders:
    - name: Andrew Rubin
      role: CEO and Co-Founder
      background: >-
        Previously VP Alliances at Juniper Networks and business development at Packet Design;
        brings go-to-market and enterprise-channel expertise to Illumio.
    - name: PJ Kirner
      role: CTO and Co-Founder
      background: >-
        Former Distinguished Engineer at VMware focused on network virtualisation;
        architect of Illumio's Policy Compute Engine and VEN segmentation technology.
  foundingLocation: Sunnyvale, CA, USA
  headquarters: Sunnyvale, CA, USA
  productSummary: >-
    Illumio Core: on-premises and hybrid-cloud microsegmentation via Policy Compute Engine
    (PCE) and Virtual Enforcement Node (VEN) agents; real-time application dependency
    mapping; policy simulation mode; ransomware containment workloads.
    Illumio CloudSecure: agentless cloud-native workload segmentation for AWS, Azure,
    and GCP using native cloud security-group enforcement.
    Illumio Endpoint: endpoint segmentation for Windows and macOS devices.
    All products share a unified Illumio console; sold as annual subscription licences
    bundled with professional services and technical account management.
  customerFocus: >-
    Global 2000 enterprises and regulated industries; strongest in financial services
    (25% of customer base), healthcare and life sciences, US federal government
    (FedRAMP Moderate authorised), manufacturing, and critical infrastructure. Typical
    deal size $250K–$2M ARR; land-and-expand motion drives significant up-sell.
  businessModel: >-
    Subscription SaaS / on-premises perpetual licence with maintenance; tiered by
    workload count (VEN endpoints). Professional services and technical account
    management bundled or sold separately. Primary GTM through direct enterprise sales
    (AEs + SEs) supplemented by a global channel of MSSPs and system integrators.
    NRR estimated above 120% driven by workload expansion and cross-product attach.
  stage: Private — Series G (2024 Warburg Pincus growth round)
  fundingStatus: >-
    Total equity raised ~$930M across seven rounds. Key rounds: Series E $125M (2019,
    a16z lead); Series F $225M (2021, Thoma Bravo lead, $2.75B valuation); 2024
    growth round (Warburg Pincus lead, $3.0B valuation). Additional investors include
    General Catalyst, Accel, J.P. Morgan Asset Management, and Formation 8. No public
    debt facilities or convertible notes disclosed.
  disclosureProfile: private-undisclosed
  claimRefs: [CV001, CV012]

