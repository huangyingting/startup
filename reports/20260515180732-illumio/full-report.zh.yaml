      - number: '5.4'
        title: 技术差异化与知识产权
        blocks:
          - type: paragraph
            body: >
              Illumio 的技术差异化有五根支柱。第一，内核级执行且没有数据路径代理——不同于需要代理或内联硬件的方案，VEN 使用 OS 原生防火墙
              API，安全控制不带来延迟或吞吐开销。第二，基于标签的策略持久性——策略以逻辑工作负载属性对（环境、应用、角色、位置）表达，与 IP
              地址解耦；因此策略可跨云迁移，也能在容器重启和云迁移中保持稳定。第三，Illumination Map 是专利申请中的实时依赖可视化能力，能在工作负载通信发生时即时绘制，据称最多可把策略设计时间缩短
              80%。第四，全面的 OS 覆盖——除了现代 Linux 和 Windows，还支持 AIX、Solaris、macOS 和旧版 Windows Server，这是相对只面向云原生的竞争对手的重要差异。第五，AI
              辅助策略生成——Illumio 新兴 ML 引擎分析已观察到的流量模式并推荐分段规则，降低长期拖慢企业采用的手工策略编写负担。FedRAMP Moderate 授权和 Common Criteria EAL2
              认证，让 Illumio 在监管采购要求刚性的美国联邦和国防市场形成差异。OpenAPI 规范和开发者门户释放出 API 优先架构信号，可在企业安全生态中大规模集成。
