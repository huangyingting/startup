      - number: '7.3'
        title: 运营、人员与合作伙伴风险
        blocks:
          - type: paragraph
            body: >
              Illumio 的运营风险集中在三条向量。第一，PCE SaaS 多云可用性：PCE 托管在 AWS 和 Azure；如果云服务商出现持续可用性事件，或发生数据驻留执法行动，所有 SaaS
              托管客户的策略管理都会受扰。本地 PCE 部署不受影响，但在新业务中占比下降。第二，VEN 代理内核 API 兼容性：VEN 直接与 OS 原生防火墙机制集成，iptables、nftables 或
              Windows Filtering Platform API 的破坏性变更，都需要在整个已安装客户基础上紧急发布 VEN 补丁。Illumio 维护 OS 支持矩阵，但对 OS 厂商内核 API
              路线图没有合同控制权。第三，部署复杂度：大型部署（10,000+ 工作负载）需要分阶段推出 VEN、发现策略并切换执行，在复杂旧有环境中，典型价值实现周期以月计。公开 CVE 披露不完整，导致外部来源无法充分评估
              PCE 和 VEN 的安全记录。人员风险集中在 CEO Andrew Rubin（联合创始人、主要投资者和联邦客户关系负责人）以及 CTO Ben Verghese（PCE 和 VEN
              架构）身上。两人同时离职会实质削弱产品愿景和联邦销售管线。合作伙伴风险集中在 DORA 合规渠道中的 Deloitte 和 KPMG；失去任一合作都会削弱 EMEA 金融行业管线。Common Criteria
              EAL2 认证需要定期复评；若认证失效，强制要求 CC 的司法辖区（德国、韩国、日本）将失去采购资格。
