  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与模块图谱
        blocks:
          - type: paragraph
            body: >
              Illumio 通过三款核心产品交付零信任分段，三者共享统一标签体系和 PCE REST API。Illumio Segmentation（前称 Illumio Core）把 Policy Compute
              Engine（PCE）、Virtual Enforcement Node（VEN）代理和 Illumination Map
              组合在一起，为物理服务器、虚拟机、容器、云实例和终端设备提供实时工作负载可见性与强制微分段。PCE 是中央控制平面：存储工作负载标签（环境、应用、角色、位置），把基于标签的策略规则编译成 OS
              原生防火墙规则集，通过 TLS 加密通道下发给 VEN 代理，并提供安全与合规团队使用的 REST API、Web 控制台、RBAC 和审计日志。VEN 是安装在每个受保护工作负载上的轻量软件代理，借助 OS
              原生防火墙执行 PCE 下发的规则，不进入流量路径。Illumio Insights（原 CloudSecure）通过采集原生云遥测并应用 ML 策略推荐，以无代理方式把平台扩展到 AWS、Azure 和
              GCP。Illumio Endpoint 把同一套 VEN 执行模型用于受管笔记本和桌面，补齐从用户设备到应用工作负载的东西向覆盖。PCE 可作为云托管 SaaS
              提供，也可由客户本地托管部署，包括面向涉密和受监管环境的隔离网络配置。
