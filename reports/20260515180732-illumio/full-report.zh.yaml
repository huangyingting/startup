      - number: '6.2'
        title: 客户分层、用例与行业纵深
        blocks:
          - type: paragraph
            body: >
              Illumio 的客户集中在受监管行业，在这些行业里，网络微分段带来的是强制合规结果，而不只是可选安全提升。金融服务是最大单一垂直行业，占 Fortune 100 客户队列的多数；用例围绕 PCI-DSS
              持卡人数据环境隔离、SOX 应用分离和 SWIFT 边界执行。医疗是第二大垂直行业，驱动力来自 HIPAA PHI 隔离要求，以及医院网络面临的高强度勒索软件风险；NHS England
              是最显眼的参考部署，Illumio 已部署到多个 NHS Trusts，用于勒索软件遏制并支撑 NHS DSPT 合规义务。政府和国防是有意义但公开记录较少的板块；Illumio 的 FedRAMP
              Moderate 授权和 Common Criteria EAL2 认证是美国联邦机构采购前提，公开材料间接提到 USAF。科技和 SaaS
              公司（Salesforce、eBay、ServiceNow）构成第四类客户，微分段用来解决云工作负载隔离和内部人威胁遏制。保险和航空补齐具名客户队列。用例大体映射到四类：勒索软件遏制（隔离被攻陷工作负载，阻止横向移动）、监管合规边界执行（PCI、HIPAA、DORA）、云工作负载可见性和东西向流量监控，以及端点到应用的零信任。Illumio
              的 Healthcare AMS（Advanced Microsegmentation Service）是面向 NHS
              和美国医院网络的托管服务版本，针对内部安全运营能力有限的买方；这反映出针对资源受限买方的一条独立市场进入动作。
