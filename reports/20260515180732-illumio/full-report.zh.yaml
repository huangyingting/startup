  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价架构
        blocks:
          - type: paragraph
            body: >
              Illumio 的收入模型锚定按工作负载计费的年度订阅 SaaS 范式，把公司放在企业安全 SaaS 品类内。核心产品 Illumio Segmentation
              按每个受管理端点（工作负载）授权，也就是说，定价随纳入策略控制的服务器、虚拟机、容器和云实例数量扩张。这个以工作负载为中心的计费单元自然形成落地后扩张：初始企业交易通常保护一个明确工作负载范围，随后客户接入更多数据中心、云区域和应用层，收入随之增长。第二个产品
              Illumio Insights（AI 驱动的云检测与响应）增加了一个可计费模块，可单独销售，也可与 Segmentation
              捆绑，带来平均合同价值（ACV）上行空间。专业服务——包括实施、策略设计咨询和托管服务——在订阅收入线之外产生服务收入。Illumio 的纯软件架构使 COGS 低于混合或依赖硬件的安全供应商。公司还通过 AWS
              和 Microsoft Azure Marketplace 销售，并通过 Deloitte、CDW 和 Presidio 运营经销商渠道，放大直接企业现场销售。截至 2026 年 5
