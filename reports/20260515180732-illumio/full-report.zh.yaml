      - number: '2.2'
        title: 市场规模与分析师估计
        blocks:
          - type: paragraph
            body: >-
              Mordor Intelligence 提供了微分段市场最细的公开数据：估计 2025 年全球市场价值 $21.58B，2026 年升至估计 $26.74B，并预计到 2031 年以 22.34% CAGR 达到
              $73.28B。它显著跑赢更广义的网络安全 市场（2025 年 $24.95B，到 2031 年以 11.28% CAGR 增至 $47.37B）以及零信任安全 市场（2025 年 $41.72B，到 2031
              年以 16.07% CAGR 增至 $102.01B）——说明企业安全姿态从边界转向工作负载中心后，微分段层的结构性增速高于母市场。

              Illumio 的 TAM/SAM/SOM 分析需要把这些市场数字与 Illumio 的具体产品范围和胜单模式叠加。TAM 更合适地用零信任安全市场框定（Mordor 口径 2026 年 $48.43B），因为
              Illumio 平台把自己定位在完整 ZTS 框架内。SAM 更精确地是微分段和 ZTS 软件细分（2026 年 $26.74B），排除基于硬件和纯外围的分段方案。Illumio 的
              SOM——它能现实捕获的收入——未披露；基于最后已知估值（2021 年 11 月 $2.75B）以及可比私营网络安全公司的 7–12× 收入倍数，隐含 ARR 约 $200–400M，占 2026 年 SAM 约
              0.75–1.5%。这个区间很宽，反映 Illumio 自 2021 年以来没有任何公开收入披露。

              纵向看，BFSI 占微分段需求的 28.76%（最大行业），医疗是增长最快行业（5.06% CAGR），驱动因素包括勒索软件攻击增加 328% 和单次平均数据泄露成本 $7.4M。地域上，北美占全球微分段收入
              38.51%，与 Illumio 的主要市场集中度一致。亚太是增长最快地区，CAGR 5.31%。大型企业占市场需求 61.32%；按收入口径，软件部署占 67.19%，云托管部署占 58.43%，这些都与
              Illumio 的产品架构高度匹配。

              多个分析师规模测算口径给出不同的微分段市场估计，原因在于范围边界选择不同（是否纳入 SD-WAN 微分段覆盖和网络访问控制）。Mordor Intelligence 的 $21.58B（2025
              年）采用最宽但仍可辩护的范围，包括软件、硬件和服务。若定义收窄到纯软件定义策略引擎，TAM 估计会小得多。鉴于除 Mordor 外缺少占主导的第三方规模测算权威，投资者应更看重结构性增长向量（22%
              CAGR），而不是绝对市场规模；后者带有 ±30% 的方法论不确定性。
