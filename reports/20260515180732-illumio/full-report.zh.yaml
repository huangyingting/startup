            body: >
              Illumio 的成本结构受益于其纯软件产品架构；相较混合或依赖硬件的安全供应商，这显著降低资本强度。主要成本线是约 896 名员工的总薪酬基数（截至 2026 年 5
              月），覆盖工程、销售和客户成功职能。COGS 主要由 Illumio 平台云基础设施、支持工程师和专业服务交付人力构成；没有硬件制造、实体设备库存或物流成本。估计 75–82% 毛利率与 Bessemer
              Cloud Index 和 OpenView 基准中的企业安全 SaaS 水平一致，也反映在既有软件平台上增加新客户的低边际成本。研发投入（估计收入的 25–35%）对维持相对 Cisco Secure
              Workload、Zscaler 零信任分段和 Palo Alto Networks Prisma Cloud 的产品差异化至关重要。销售和营销支出偏高——估计收入的
              25–35%——反映公司直接企业销售模型，以及维持能拿下数十万美元级大单的现场销售组织所需成本。高研发和高 S&M 支出叠加，意味着 Illumio 可能存在较大经营亏损；盈利路径取决于 ARR
              大幅增长、主动成本优化，或二者兼具。40 法则分数——定义为 ARR 增长率加自由现金流率——在未披露财务数据时无法评估。鉴于没有硬件制造、实体基础设施所有权或设施密集型运营，资本开支估计很低（收入的低于
              5%）。
