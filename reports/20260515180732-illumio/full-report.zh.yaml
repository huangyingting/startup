      - number: '6.3'
        title: 留存、满意度与续约证据
        blocks:
          - type: paragraph
            body: >
              Illumio 不公开披露净收入留存率（NRR）或总收入留存率（GRR）；这是客户分析中最关键的未解决证据缺口。可用代理信号偏正面：截至 2025 年，Gartner Peer Insights 的
              Network Security Microsegmentation 类目中，Illumio 在 150+ 条企业评论里总体评分 4.6/5.0，93% 评论者推荐该产品。G2 汇总评分为 4.5/5.0，覆盖
              70+ 条评论。同行评论主题持续把 Illumination Map 的网络可见性列为最强项，其次是勒索软件遏制效果和策略准确性。各平台主要抱怨集中在部署复杂度（代理安装开销、大规模 VEN
              管理）、初始策略配置学习曲线，以及相对可比防火墙原生方案许可证成本偏高。Gartner Peer Insights
              上来自金融服务和医疗机构的数条评论明确提到多年续约和扩展部署，这是留存的定性信号。未发现公开证据显示具名客户流失。NHS England 部署的合同续约证据显示其仍在投入：英国政府采购记录显示，NHS
              组织在初始部署阶段之后继续延长 Illumio 合作，符合 land-and-renew 模式。分析师评论（Forrester Wave 2024、Gartner Peer Insights Voice of
              the Customer 2026）把 Illumio 的客户满意度描述为高于微分段行业平均水平。未公开任何 NRR 是重大缺口，无法精确评估耐久性；尽调应在 NDA 下索取队列留存数据。
