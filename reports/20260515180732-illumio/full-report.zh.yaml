  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >-
              零信任分段市场有三个清晰竞争层级。第一层是专注微分段和 ZTS 的供应商，整个产品组合都围绕工作负载级策略执行：Illumio（市场标准制定者）、Akamai Guardicore
              Segmentation（最接近的直接竞争对手，背靠 Akamai FY2024 $3.98B 收入基础）、Cisco Secure Workload（前 Tetration，深度集成进 Cisco
              安全产品组合）、VMware NSX（与虚拟机管理程序集成，现归 Broadcom 所有）以及 ColorTokens（主要小型纯玩家，累计融资约 $103M）。这一层围绕微分段深度、策略粒度和部署灵活性竞争。

              第二层覆盖已加入 ZTS 相邻能力的大型安全平台厂商——Zscaler（FY2025 ARR 超 $2.3B，约 8,000 家企业客户）和 Palo Alto Networks（年收入超 $14B，约
              85,000 家企业客户）——作为更广 SASE 或云安全平台战略的一部分。这些厂商构成结构性整合威胁：69%
              的企业安全买方报告工具蔓延担忧，平台厂商利用既有采购关系，把轻量分段与终端、身份和网络访问产品捆绑销售。它们的 ZTS 深度显著浅于 Illumio
              的专用平台，但在中端市场交易中，价格和关系优势可能压过技术差异化。

              第三层是现状替代方案：基于 VLAN
              的防火墙规则、硬件网络分段设备，以及完全依赖外围防御的扁平网络架构。这些替代方案是绿地企业账户中的主要存量方案；当对比对象是手工、无法感知应用且不能跟随工作负载迁移到云的控制手段时，它们也是 Illumio
              最容易赢下的竞争。Broadcom 2023 年以 $61B 收购 VMware 后，NSX 装机基础出现显著 GTM 扰动——据报道许可成本上升——为 Illumio 在 VMware
              重度账户中创造结构性迁移机会。
