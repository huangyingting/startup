    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份、创立与使命
        blocks:
          - type: paragraph
            body: >
              Illumio 2013 年由 Andrew Rubin（CEO）和 PJ Kirner 在加州 Sunnyvale 创立，最初打的是零信任分段（ZTS）旗号。到 2026
              年，公司把品牌重新定位为“入侵遏制公司”，意味着它从纯粹政策驱动的微分段，扩展到覆盖 AI
              驱动检测、响应和遏制的更宽平台。公司的核心判断是：入侵不可避免，网络韧性唯一可行路径是在横向移动酿成灾难前把它遏制住。Illumio 产品包括 Illumio Segmentation（云和网络入侵遏制）以及
              Illumio Insights（混合云检测与响应），二者都通过统一的云原生平台交付。公司总部位于 920 De Guigne Dr, Sunnyvale, California
              94085，业务覆盖北美、欧洲、亚太和中东。Illumio 称自己是全球首个入侵遏制平台，并主张自己在一个由其参与定义的新兴市场品类中占先。公司已运营十余年，部署进全球若干最大企业；公开具名客户包括
              Microsoft（其 CISO 称 Illumio 是“唯一能在 Microsoft 规模下运行并在我们环境中交付的分段解决方案”）、Citi、HSBC、Salesforce、eBay、Cathay
              Pacific、Marriott Vacations Worldwide、QBE Insurance、ServiceNow 和 Western Union。
