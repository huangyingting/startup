  - id: FV001
    type: flow
    title: 建议逻辑
    description: |
      决策流将证据支柱映射到最终“有条件兴趣”建议。展示哪些因素支撑、哪些因素压制以 $2.75B Series G 估值入场的决定。
    layout: standard
    data:
      nodes:
        - id: n1
          label: 市场机会
          detail: ZTS TAM $4.5B+，20%+ CAGR 增长；DORA、FedRAMP、NIS2 监管顺风
          tone: positive
        - id: n2
          label: 产品护城河
          detail: PCE+VEN 架构、基于标签的策略模型、FedRAMP Moderate 授权、传统 OS 支持
          tone: positive
        - id: n3
          label: 客户证明
          detail: 1,000+ 企业客户，具名客户标识（Microsoft、NHS England、Salesforce）
          tone: positive
        - id: n4
          label: 财务不确定性
          detail: 无 ARR 披露，2021 年 11 月后 4.5 年融资空窗，倍数压缩
          tone: negative
        - id: n5
          label: 估值纪律
          detail: $2.75B 入场约为估计 ARR 的 10x；合理但不是深度价值
          tone: neutral
        - id: n6
          label: 有条件兴趣
          detail: 进入资料室验证；承诺前有 5 个阻断性尽调门
          tone: positive
      edges:
        - from: n1
          to: n5
          label: 支撑入场
        - from: n2
          to: n5
          label: 支撑入场
        - from: n3
          to: n5
          label: 支撑入场
        - from: n4
          to: n5
          label: 压制入场
        - from: n5
          to: n6
          label: 导向
    claimRefs:
      - CV011
      - CV012
      - CV036
      - CV038
  - id: FV002
    type: bar
    title: 估值敏感性
    description: |
      Illumio 企业价值在熊、基准、牛三种情景下，对不同 ARR 和 EV/ARR 倍数假设的敏感性。数值以百万美元计。2021 年 11 月 Series G 最后一轮估值 $2.75B 作为参考基准。
    layout: standard
    data:
      items:
        - label: 熊 7x × $200M ARR
          value: 1400
          tone: negative
        - label: 熊 8x × $200M ARR
          value: 1600
          tone: negative
        - label: 基准 10x × $275M ARR
          value: 2750
          tone: neutral
        - label: 最后一轮估值（2021 年 11 月 Series G）
          value: 2750
          tone: warning
        - label: 基准 12x × $275M ARR
          value: 3300
          tone: neutral
        - label: 牛 14x × $320M ARR
          value: 4480
          tone: positive
        - label: 牛 18x × $320M ARR
          value: 5760
          tone: positive
    claimRefs:
