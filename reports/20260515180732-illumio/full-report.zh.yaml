      - CV017
      - CV020
      - CV021
      - CV008
  - id: FV003
    type: range
    title: 估值 / 回报区间
    description: |
      Illumio 投资的四个关键估值参数的低 / 中 / 高区间分析。企业价值和 ARR 估计以百万美元计。EV/ARR 倍数为比率。3 年回报是基于 $2.75B 入场价的总倍数，未调整稀释。
    layout: standard
    data:
      items:
        - label: 2026 年企业价值估计（$M）
          low: 1500
          mid: 2750
          high: 5000
        - label: 2026 年 ARR 估计（$M）
          low: 180
          mid: 275
          high: 380
        - label: EV/ARR 倍数
          low: 7
          mid: 10
          high: 14
        - label: 从 $2.75B 入场的 3 年回报（x）
          low: 0.55
          mid: 1
          high: 1.8
    claimRefs:
      - CV016
      - CV017
      - CV018
      - CV020
      - CV021
      - CV026
  - id: FV004
    type: kpi
    title: 投资 KPI
    description: |
      面向 IC 的 Illumio 投资假设关键绩效指标，覆盖截至 2026 年 5 月的最近估值、总融资、隐含 ARR、市场机会、分析师定位、风险评级和建议状态。
    layout: standard
    data:
      items:
        - label: 最近估值
          value: $2.75B (Series G, Nov 2021)
          detail: 最近一次新发融资轮；4.5 年无新的新发融资轮
          status: confirmed
        - label: 总融资额
          value: ~$557M
          detail: 从 Series A 到 Series G 共 6+ 轮；投资方包括 a16z、General Catalyst、Accel、JPMorgan
          status: confirmed
        - label: 隐含 ARR 基准情形
          value: ~$250-300M
          detail: 按 2021 年倍数隐含 $110-183M ARR，并套用 15% CAGR 估计；未确认
          status: estimated
        - label: 市场（ZTS TAM 2026）
          value: $4.5B+ growing 20%+ CAGR
          detail: 分析师研究给出的微分段市场预测；DORA/FedRAMP 监管顺风
          status: confirmed
        - label: Forrester Wave
          value: Leader Q3 2024
          detail: Forrester Wave for Microsegmentation Solutions 2024 Q3；最高位置
          status: confirmed
        - label: 风险评级
          value: HIGH
          detail: 融资空窗、ARR 未披露、倍数压缩、退出时点风险
          status: confirmed
        - label: 建议
          value: Conditional Interest
          detail: 取决于 ARR/NRR、毛利率、现金消耗率 / 现金可支撑月数、FedRAMP ConMon、客户分群数据
          status: open
    claimRefs:
      - CV006
      - CV007
      - CV012
      - CV040
