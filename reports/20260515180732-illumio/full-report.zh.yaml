      - CV036
      - CV037
      - CV038
      - CV039
    notes: |
      P0 优先项是阻断项：没有满意解决前不会发出投资条款书。P1 是重大项：回答不理想会显著改变估值立场。P2 很重要，但单独不会阻断投资条款书。
