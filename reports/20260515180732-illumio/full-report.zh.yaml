      - number: '5.2'
        title: 技术架构——PCE、VEN 与标签模型
        blocks:
          - type: paragraph
            body: >
              Illumio PCE 是策略编译引擎，不接触应用流量。工作负载标签变化或新工作负载注册后，PCE 会重新计算完整策略规则集——把标签对允许规则转换为具体的基于 IP 地址的防火墙规则集——再通过 TLS
              加密控制通道，把更新后的编译规则推送给所有受影响的 VEN 代理。VEN 代理以轻量 OS 进程运行，直接编程原生内核防火墙（Linux 上的 iptables 或 nftables；Windows Server
              上的 Windows Firewall；AIX 和 Solaris 上的等效机制），不插入数据路径流量。由此带来安全控制，但不增加延迟开销、吞吐下降或新的网络瓶颈。基于标签的策略模型不依赖 IP 地址：IP
              变化、容器重启、云工作负载波动时，策略仍然有效，因为 PCE 会持续跟踪工作负载状态并据此重新编译规则。Illumination Map
              把工作负载之间所有活跃和历史流量呈现为实时可视图谱，让安全团队不打断生产流量，也能识别异常通信路径、应用依赖和可分段对象。PCE 支持本地安装的高可用主备部署；SaaS 版本内置由 Illumio
              管理的可用性。PCE 事件日志为合规报告提供不可篡改的审计轨迹。所有 PCE 与 VEN 通信均使用 TLS，VEN 升级由 PCE 编排，可在不停机情况下对工作负载集群滚动升级。
