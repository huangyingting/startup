      - number: '3.3'
        title: 平台整合者与相邻威胁
        blocks:
          - type: paragraph
            body: >-
              Zscaler 是对 Illumio ZTS 定位最具分析意义的相邻威胁。Zscaler Private Access（ZPA）产品用零隐含信任执行用户到应用的访问策略，与 Illumio
              的工作负载到工作负载东西向分段互补，但方向上有重叠。Zscaler 另行推出了一个用于混合云环境东西向流量的工作负载分段能力品牌（“Zscaler Workload
              Segmentation”），但围绕该产品的分析师覆盖和客户参考仍显著少于 Illumio 的专用平台。Zscaler FY2025 ARR 超 $2.3B，拥有 8,000+ 企业客户基础，因此具备把 ZTS
              能力交叉销售给既有账户的分销规模——这是平台整合采用的主要路径。

              Palo Alto Networks 采取所有安全厂商中最广的平台整合战略，明确向希望减少供应商数量的企业 CISO 营销其“平台化”战略。PANW 年收入超 $14B、企业客户超 85,000 家，具备把
              Prisma Cloud 工作负载保护和 CN-Series 网络安全能力，与终端、SIEM 和身份产品一起打包进整合企业协议的规模。Prisma Cloud 在 IaaS
              环境提供云工作负载保护和基础网络分段，但缺少 Illumio 的 PCE 在跨本地数据中心与云的混合工作负载中交付的应用感知策略粒度。PANW 的 Cortex AI 平台提供强自动化和检测能力，是对 ZTS
              的补充，而非替代。

              第三层相邻威胁包括 CrowdStrike Falcon 平台（检测横向移动，但不执行策略分段）和 Fortinet 的微分段能力（绑定专有 ASIC
              硬件，限制云原生部署）。这些厂商占用的是不同买方预算线——终端或网络设备支出——而不是直接争夺 ZTS 预算。关键竞争动态在于，SASE/SSE 平台买方会把捆绑的基础分段视为“足够好”，还是另行投资专用 ZTS
              平台。第三方研究和分析师评论一致认为，平台厂商的 ZTS 深度显著浅于 Illumio 的应用拓扑智能；但整合购买趋势持续带来定价和关系压力。
