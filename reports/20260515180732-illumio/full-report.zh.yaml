  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 企业客户基础与具名部署
        blocks:
          - type: paragraph
            body: >
              截至 2026 年 5 月，Illumio 的客户基础约为全球 1,000 家企业组织，覆盖 Fortune 100 中 40 多家，以及 Fortune 500 金融服务公司中 15
              家以上。公司官网和资源中心发布了一组经过筛选的具名客户案例和标识，集中在金融服务、医疗、政府与国防，以及大型科技公司。最突出的公开具名客户包括 NHS England（UK National Health
              Service），该机构在多个 NHS Trusts 部署 Illumio Core，用于勒索软件遏制和 DSPT 合规；Bank of America、Morgan
              Stanley、Citi（美国金融机构）；Lufthansa Group（航空 / 物流）；Salesforce 和 eBay（科技）；QBE Insurance（保险）；Western
              Union（金融服务）。若干政府和国防客户因保密限制只被引用、未公开姓名。Illumio 的 CISO 推荐项目产出了有记录的高管证言，包括 Microsoft CISO Bret Arsenault 称
              Illumio 是「the only segmentation solution that would work at the scale of Microsoft」，以及 HSBC、Cathay
              Pacific、Marriott Vacations Worldwide、ServiceNow 高级安全负责人的证言。企业级聚焦是有意为之——Illumio 面向拥有 500+
              工作负载的混合多云环境，而传统防火墙边界方法已不足以覆盖这些组织。平均交易规模和总合同价值未公开披露，但分析师估计，中端企业账户的年经常性收入在六位数区间，全球金融机构和 NHS 级部署在七位数区间。公司披露的
              40+ Fortune 100 渗透数字与竞争对手的客户数披露相符，约占 Fortune 100 队列的 4%。
