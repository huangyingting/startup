      - number: '6.4'
        title: 扩张、集中度与渠道动态
        blocks:
          - type: paragraph
            body: >
              Illumio 的先落地再扩张模式在具名账户中很清楚。初始部署通常从单个高优先级应用环境开始（例如 PCI 持卡人数据环境或单个医院网络分段），等内部团队对 PCE 和 Illumination Map
              建立信心后，再扩展到更多环境。NHS England 的部署已从最初试点扩展到多个 NHS Trusts。金融服务客户报告，其上线从早期隔离项目分阶段推进到更广泛的数据中心级微分段。Illumio AMS
              托管服务模式从商业上验证了客户内扩张，因为它把更多部署范围纳入经常性服务收入线。客户集中度风险中等但不严重：约 1,000 家客户下，如果组合分布合理，单一账户收入占比不应超过
              2%–3%，但这一点未被公开确认。NHS England 关系是可见度最高的单一政府客户，也代表医疗垂直中的显性集中度风险。渠道动态：Illumio 通过 CDW、Presidio 等增值经销商和
              Deloitte、KPMG、Accenture 等系统集成商分销，后者在 Illumio 许可证之外提供部署服务。Deloitte Netherlands 与 Illumio 在 2026 年 4 月联合发布面向
              EU 金融机构的 DORA 合规方案。AWS Marketplace 和 Azure Marketplace 上架提供云原生采购路径，降低云优先企业买家的摩擦。渠道组合带来地理覆盖（Deloitte
              全球足迹、KPMG）和行业深度（Presidio 的企业网络专长）。合作伙伴也提供专业服务收入管线，以非经常性实施收入补充 Illumio 的 SaaS 许可证 ARR。胜负信号显示，Illumio
              的竞争性失单主要发生在只做云原生的部署中输给 Zscaler，以及在优先考虑 XDR 端点检测而非微分段的账户中输给 CrowdStrike。Illumio 最稳定的胜场来自受监管的混合环境，在那里旧版 OS
              覆盖（AIX、Solaris）和合规认证是差异点。
