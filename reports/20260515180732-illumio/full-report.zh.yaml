      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >-
              五个结构性增长驱动支撑微分段采用延续到 2031 年。第一，威胁环境加速恶化：CrowdStrike 2026 Global Threat Report 记录平均攻击者突破时间缩短 65%（现为 29
              分钟），AI 驱动攻击增加 89%，零日漏洞利用比 2025 年增加 42%。IBM 2025 Cost of Data Breach Report 将平均数据泄露成本定为
              $4.4M；缺少零信任访问控制的组织损失显著更高，直接为 ZTS 投资创造可量化 ROI。Verizon 2026 DBIR 确认漏洞利用攻击同比增加
              34%，进一步说明攻击者仍主要通过未修补漏洞横向移动，而微分段可以切断这条路径。

              第二，监管要求已从建议变成强制。OMB M-22-09（2022 年 1 月）要求所有美国联邦机构在 FY2024 前实现具体零信任安全目标；CISA 零信任成熟度模型 v2.0 在网络
              支柱中把微分段列为高级成熟度必需控制项。NIST SP 800-207（2020）是美国政府 ZTA 基础标准，并将工作负载分段列为三大核心 ZTA 组件之一。在欧洲，NIS2（2024 年 10 月生效）和
              DORA（2025 年 1 月生效）施加强制事件报告和运营韧性要求，ZTS 平台可帮助满足这些要求。这些强制要求在联邦机构和受监管行业中创造非自主性支出。

              第三，多云扩散带来复合需求：每个迁移到 IaaS/PaaS 的工作负载都会产生新的东西向流量，需要分段策略；跨数据中心 + AWS + Azure + GCP 的混合架构无法靠 VLAN
              方案保护。第四，网络安全工具整合压力（69% 企业称工具蔓延是担忧）有利于能在多个环境执行广泛策略的平台。第五，2026 年企业云安全预算达到 IT 安全总支出的 34%，直接资助 Illumio
              所在的工作负载保护品类。

              三项实质采用约束限制部署速度。实施复杂度是主要障碍：在数千个工作负载上部署工作负载标签、构建可见性图谱并编写应用隔离围栏 策略，需要大量专业服务投入和安全团队专业能力。网络安全 74%
              的人才短缺（Cybersecurity Insiders 2026）进一步放大这一点——没有供应商提供的自动化或托管服务，组织无法构建或维护复杂分段策略。第三项约束是预算竞争：SASE/SSE
              平台（Zscaler、Palo Alto、Cisco）越来越多捆绑基础微分段能力，使专注 ZTS 的供应商更难赢下那些“足够好”分段已包含在更大平台整合中的交易。
