          - type: callout
            title: 监管顺风是最持久的投资逻辑要素
            body: >
              DORA Article 9（EU 金融服务，2025 年 1 月生效）、FedRAMP 零信任要求（美国联邦）、ASD Essential Eight（澳大利亚）和 NCSC ZTA
              指引（英国）创造了一个合规需求周期，不依赖竞争平台动态。投资者若在 2025-2026 年 DORA 审计周期持有 Illumio，将受益于可预测的监管需求，无论 CrowdStrike 或 Palo Alto
              的竞争压力如何。
