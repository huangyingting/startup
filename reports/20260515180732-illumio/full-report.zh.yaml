companyProfile:
  summary: >-
    Illumio 于 2013 年由 Andrew Rubin（CEO）和 PJ Kirner（CTO，前 VMware）在加州 Sunnyvale 创立，目标是解决企业网络中的横向移动风险。公司发明了 Adaptive
    Security Platform（ASP），用分布式 Policy Compute Engine（PCE）和轻量级 VEN 代理执行细粒度的工作负载间分段策略，不需要改造网络硬件。Illumio 已完成七轮融资，累计约 $930
    million，最近一次估值为 2024 年 Warburg Pincus 领投增长轮的 $3 billion。公司服务超过 1,000 家企业客户，覆盖金融服务、医疗、政府和关键基础设施，并在其开创的微分段品类中获得
    Gartner 领导者和 Forrester 领导者认可。
  foundedDate: '2013-06-01'
  founders:
    - name: Andrew Rubin
      role: CEO 兼联合创始人
      background: 曾任 Juniper Networks 联盟副总裁，并在 Packet Design 负责业务拓展；为 Illumio 带来 GTM 和企业渠道经验。
    - name: PJ Kirner
      role: CTO 兼联合创始人
      background: 前 VMware Distinguished Engineer，专注网络虚拟化；Illumio Policy Compute Engine 和 VEN 分段技术的架构师。
  foundingLocation: Sunnyvale, CA, USA
  headquarters: Sunnyvale, CA, USA
  productSummary: >-
    Illumio Core：通过 Policy Compute Engine（PCE）和 Virtual Enforcement
    Node（VEN）代理，为本地部署和混合云环境提供微分段；实时绘制应用依赖；提供策略模拟模式；覆盖勒索软件遏制工作负载。Illumio CloudSecure：面向 AWS、Azure 和 GCP
    的无代理云原生工作负载分段，使用原生云安全组执行策略。Illumio Endpoint：面向 Windows 和 macOS 设备的终端分段。所有产品共用统一的 Illumio
    控制台；以年度订阅许可证销售，并捆绑专业服务和技术客户经理。
  customerFocus: >-
    全球 2000 强企业和受监管行业；金融服务最强（客户基数的 25%），还包括医疗和生命科学、美国联邦政府（获 FedRAMP Moderate 授权）、制造业和关键基础设施。典型交易规模 $250K–$2M
    ARR；落地后扩张的销售动作带来显著增购。
  businessModel: >-
    订阅式 SaaS / 本地部署永久许可证加维护；按工作负载数量（VEN 端点）分层计费。专业服务和技术客户经理可捆绑，也可单独销售。GTM 以直接企业销售（AE + SE）为主，全球 MSSP 和系统集成商渠道补充。NRR 估计高于
    120%，由工作负载扩张和跨产品附加驱动。
