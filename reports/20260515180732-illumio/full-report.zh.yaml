              没有公开财务披露时，Illumio 的单位经济只能从行业基准、可比企业安全 SaaS 公司，以及商业模式的结构特征推断。按工作负载订阅模式意味着，中端企业部署的平均合同价值（ACV）在
              $350,000–$700,000 区间，大型企业账户为 $1 million 或更高——这与 Bessemer Venture Partners 针对这一规模企业安全 SaaS 的云基准一致。毛利率估计为
              75–82%，由纯软件交付架构驱动；该架构完全剔除了硬件和制造成本，主要成本项是云基础设施、客户成功人员和支持人员。净收入留存率（NRR）估计为
              110–125%，依据是部署模型的结构特征：深度工作负载策略图带来高切换成本，客户向云迁移工作负载时，落地后扩张会自然增加总工作负载数，Insights 模块则给既有账户提供增购抓手。销售和营销费用估计占收入
              25–35%，反映 Fortune 500 网络安全部署常见的高接触、长销售周期（估计 6 到 12 个月）。研发费用同样估计占收入
              25–35%，与在快速演进的多云环境中保持平台同步所需投入一致。获客成本（CAC）和回本周期未披露；估计 12–18 个月回本，基于 Bessemer、OpenView 和 Battery Ventures
              研究中的企业安全 SaaS 基准——这些研究都未引用 Illumio 特定数据。所有单位经济估计置信度为低到中，必须在 NDA 下通过直接尽调解决。
