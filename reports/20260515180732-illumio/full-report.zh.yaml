            body: >
              Illumio 的资本状况主要由 2021 年 11 月 $225 million Series G 融资决定。该轮由 Franklin Templeton 领投，JPMorgan Asset
              Management、Battery Ventures、Andreessen Horowitz（a16z）参投，投后估值 $2.75 billion。截至 2026 年 5
              月，这是公司最近一次公开外部融资；之后约 4.5 年没有披露后续融资。2021 年 Series G 的 SEC Form D（Edgar CIK 1524531）确认了该融资；未发现此后新股权轮次的 Form
              D 文件。此前轮次包括 2021 年 6 月 Thoma Bravo 领投的 $225 million Series F、2015 年 $100 million Series C、2017 年 $125
              million Series D、2019 年 $65 million Series E；披露的风险融资总额约 $557 million。按员工数和行业基准估算，年烧钱速度约 $20–50 million，按
              Series G 交割时点计算现金跑道约 3–8 年，取决于实际烧钱速度。估算区间过宽，本身就是尽调阻碍。2021
              年末以来没有新融资，可能意味着三种情况之一：（a）激进增长投入后现金流接近盈亏平衡；（b）公司有意保住 $2.75 billion 估值，不愿在 2022–2025
              年估值倍数压缩环境下以更低倍数融资；（c）2021 年后私营网络安全 SaaS 倍数压缩，导致按上一轮估值融资困难。公开信息中看不到债务额度、可转债或项目融资义务。Franklin Templeton
              以跨阶段投资者身份参投，释放了 IPO 前定位信号；但截至 2026 年 5 月，公司尚未向 SEC 提交 S-1 或 IPO 注册文件。
