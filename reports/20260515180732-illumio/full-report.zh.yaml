      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: >
              缺少已确认 ARR 和 NRR 数据，使情景分析更复杂。三个情景均假设 $2.75B 入场价格（2021 年 11 月 Series G），以及 2-3 年持有期，最终以 IPO 或战略 M&A 退出。

              悲观情景（$1.5-2.0B 退出 EV，7-8x ARR 倍数）：ARR 增长因平台整合和宏观 IT 预算收紧而降至 10% 以下。ARR 基数 $180-220M 上的倍数压缩到
              7-8x。在该情景下，$2.75B 入场意味着稀释前毛损失 27% 至 45%。若 4.5 年融资缺口被解读为公司无法在 2022-2025 年倍数压缩环境中以高于 $2.75B
              的估值融资，则与该情景兑现相一致。概率估计：25%。

              基准情景（$2.5-3.5B 退出 EV，8-12x ARR）：ARR 按 15% CAGR 增长，到 2026 年达到 $250-300M。倍数维持在 8-12x。以 $2.75B 入场，基准情景意味着 2-3
              年持有期毛回报为 -9% 至 +27%。概率估计：50%。

              乐观情景（$4.0-6.0B 退出 EV，12-18x ARR）：ARR 增速提升到 20%+，到 FY2026 达到 $320-380M。ARR 披露触发倍数重估至 14-18x。PANW 或 Cisco 以
              20-30% M&A 溢价进行战略收购，将带来更多上行。以 $2.75B 入场，乐观情景意味着 45% 至 120% 毛回报。需要数据室确认 ARR，证明 NRR 高于
              115%，且退出窗口有利。概率估计：25%。
