  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: >
              Illumio 的监管和法律风险由五组重叠义务塑造。第一，Illumio Core 的 FedRAMP Moderate 授权打开联邦销售，但也带来持续监控要求和待完成的 Rev 5 基线过渡；若未能在
              FedRAMP PMO 截止日期前完成过渡，授权将受到威胁，估计来自联邦部门客户的 ARR 中约 15% 也会受影响。第二，EU NIS2（2024 年 10 月生效）和 DORA（2025 年 1
              月生效）分别要求关键实体和 EU 金融行业公司实施网络分段，这既创造了对 Illumio 的合规需求，也在 Illumio 自身产品合规姿态出现缺口时带来持续义务风险。第三，GDPR Article 25
              的设计即数据保护解释推动 EU 企业需求，并为 PCE SaaS 多租户部署带来数据驻留义务。第四，BIS Export Administration Regulations 对网络安全项目施加基于 ECCN
              的出口许可要求；Illumio 在 EAR 下的具体分类尚未确认，给 APAC 和受限国家销售留下潜在合规风险。第五，美国 National Cybersecurity Strategy（2023）和 OMB
              M-22-09 零信任要求支撑联邦需求，但也给 Illumio 的联邦客户施加合规义务，可能延迟或约束采购周期。澳大利亚 ASD Essential Eight 和英国 NCSC ZTA 指引把这些义务延伸到
              APAC 和英国政府部门。公开信息未显示针对 Illumio 的活跃诉讼或专利主张，但 VMware NSX 和 Cisco 持有广泛的微分段相邻专利组合，构成潜在主张风险。
