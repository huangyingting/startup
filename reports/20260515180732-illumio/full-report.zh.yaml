  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              Illumio 的投资逻辑建立在三根持久支柱上。第一，Illumio 占据企业微分段品类领导地位；该市场受零信任要求、入侵遏制监管（DORA、FedRAMP、NIS2）和勒索软件保险要求推动，CAGR 超过
              20%。Gartner 预测 2025 年全球信息安全支出将超过 $212 billion，网络分段是增长最快的支出项之一。第二，Illumio 的 PCE 与 VEN
              架构在异构环境中执行工作负载级零信任，包括云原生安全工具无法覆盖的旧版 OS（AIX、SPARC、旧版 Windows），在受监管混合环境中形成多年护城河。FedRAMP Moderate
              授权锁定美国联邦采购，DORA Article 9 则创造结构性 EU 金融服务需求驱动。第三，Forrester Wave 在 2024 年 Q3 微分段榜单将 Illumio 评为领导者，公司企业客户已超过
              1,000 家，显示其在 Fortune 500 受监管垂直行业中采用强劲。

              反向逻辑在于平台整合风险。CrowdStrike Falcon、Palo Alto Prisma Cloud 和 Zscaler ZPA 正把微分段相邻能力嵌入更大的 XDR/SASE/CNAPP
              平台。预算承压的企业 CISO 更偏好平台供应商，而非点状方案。若 Illumio 不能可信地扩展平台叙事，即便监管需求顺风仍在，独立 ZTS 市场份额也可能被侵蚀。Cisco 收购 Isovalent 以及
              AWS VPC Lattice 原生功能尤其威胁云原生优先账户。摇摆因素是：受监管混合环境（政府、金融服务、医疗、关键基础设施）是否足够大、足够忠诚，能支撑 Illumio 在 3-5 年投资期内独立发展。
