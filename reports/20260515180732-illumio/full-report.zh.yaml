        - 无公开现金余额或烧钱率披露
        - P0 — 阻断项
        - 资料室第 1 天
      - - FedRAMP ConMon 计划健康度和 Rev 5 迁移状态
        - FedRAMP 失效会立即剔除联邦板块约 15% 估计 ARR
        - 授权有效；Rev 5 迁移期限未公开披露
        - P1 — 重大项
        - 资料室第 1 周
      - - 客户分群数据 — 前 10 大 ARR 集中度和续约日历
        - 前 10 大高度集中会带来单一客户流失风险；目前未知
        - 仅公开披露客户总数（1,000+）
        - P1 — 重大项
        - 资料室第 1 周
      - - IP 组合审查 — PCE/VEN 相对 Cisco 和 VMware 专利的自由实施
        - Cisco 和 VMware 持有广泛微分段专利；主张风险潜伏
        - 无公开 IP 分析；未见活跃主张，但风险无法量化
        - P2 — 重要项
        - 资料室第 2-3 周
