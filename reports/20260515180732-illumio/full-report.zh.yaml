      - number: '6.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 受监管垂直行业集中度支撑持久需求
            body: >
              Illumio 集中在金融服务、医疗和政府，这些行业都有非可选的合规要求，因此需求有结构性防御。PCI-DSS、HIPAA、DORA、FedRAMP、CMMC 等合规要求形成刚性采购义务，使 Illumio
              部署成为合规必需，而非可选采购。与服务纯可选安全板块的网络安全供应商相比，这会抬高留存并降低流失风险。
