  - id: FR003
    title: 依赖地图
    type: dag
    layout: standard
    description: |
      有向图映射 Illumio 的关键外部依赖——伙伴、平台、监管方和资本提供方——以及依赖方向和风险传导。节点距离表示依赖关键性。
    data:
