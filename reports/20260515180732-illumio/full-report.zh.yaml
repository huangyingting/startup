      - number: '5.5'
        title: 信任、安全性、网络安全与合规
        blocks:
          - type: paragraph
            body: >
              Illumio 拥有多项信任认证，直接影响企业和政府采购决定。PCE SaaS 平台通过 SOC 2 Type II 认证，为企业安全采购所需的安全性、可用性、保密性和处理完整性控制提供独立保证。FedRAMP
              Moderate 授权覆盖 PCE SaaS 产品，为美国联邦机构提供符合 FISMA、并与白宫 M-22-09 零信任要求一致的采购路径。Common Criteria EAL2 认证覆盖 PCE
              产品，在美国国防及盟友政府采购流程中提供受认可的正式安全评估。欧盟方面，DORA Article 9 自 2025 年 1 月起要求 EU 金融实体实施网络分段，Illumio
              定位为关键技术使能方。医疗领域，Illumio 的网络分段能力可按 Section 164.312 的访问控制和审计控制要求隔离 PHI，支撑 HIPAA 技术保障。针对美国 Defense Industrial
              Base 的 CMMC 2.0 Level 2 合规，可通过 Illumio 的工作负载隔离和访问控制能力覆盖 CMMC Access Control domain 要求。PCE
              事件日志提供多个合规框架要求的不可篡改审计轨迹。PCE 内置 RBAC 支持多团队治理和最小权限管理访问，支撑 SOC 2 与 FedRAMP 运营控制要求。截至 2026 年 5 月，公开数据库尚未独立验证
              PCE 或 VEN 的 CVE 历史；这仍是开放尽调项。
