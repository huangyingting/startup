      - number: '7.2'
        title: 竞争替代与技术风险
        blocks:
          - type: paragraph
            body: >
              平台整合是 Illumio 最重要的长期竞争风险。CrowdStrike Falcon、Palo Alto Prisma Cloud、Zscaler ZPA
              三大安全平台已嵌入微分段相邻能力，企业买家可以把横向移动控制并入既有平台关系，而不必采用独立点状方案。Cisco 在 2023 年 12 月收购 Isovalent（eBPF 云原生网络），显示 Cisco
              有意把云原生微分段纳入其安全平台，进一步压缩 Illumio 可服务的云原生板块。VMware NSX 为 vSphere
              环境提供原生虚拟机管理程序级微分段，并持有可能覆盖无代理虚拟机管理程序方法的专利组合。AWS VPC Lattice 在 AWS
              原生架构中提供原生服务到服务连接和分段控制，直接竞争新建云部署。Microsoft-CrowdStrike 内核争议（2024 年 7 月）提高了监管和客户对内核态安全代理的审视，推动市场降低 OS
              级依赖。Illumio 的 VEN 运行在 OS 网络栈（iptables、nftables、Windows Filtering Platform），因此易受内核 API 稳定性变化影响。开源 eBPF
              工具（Cilium、Tetragon）正在获得企业采用，可能把云原生环境中的基础工作负载分段商品化。Illumio 的 AI 策略生成（AEN Early Access）通过潜在 LLM
              对抗性策略注入扩大攻击面。Gartner Market Guide 确认了竞争强度，把 CrowdStrike、Guardicore/Akamai 和 Trellix 列为代表性供应商。
