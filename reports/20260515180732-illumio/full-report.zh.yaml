        - 准确 COGS 拆分；服务与软件毛利率拆分；云基础设施成本
      - - 净收入留存率（NRR）
        - 估计 110-125%
        - 低-中
        - 反映扩张动作和流失；直接驱动 LTV 和增长率
        - 公司披露的 NRR；按客户年份的队列分析；总留存与净留存
      - - 获客成本（CAC）
        - 未披露；估计 12-18 个月回本
        - 低
        - S&M 支出效率；决定烧钱换增长的取舍
        - 按客群划分的销售周期；S&M 占新增 ARR 比例；按队列的回本期
      - - 平均合同价值（ACV）
        - 中型企业估计 $350K-$700K；大型企业 $1M+
