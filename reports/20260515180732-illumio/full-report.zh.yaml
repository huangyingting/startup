      - number: '8.4'
        title: 建议、退出策略与最终尽调问题
        blocks:
          - type: paragraph
            body: >
              建议：在 $2.75B 入场价下有条件兴趣。Series G 价格约为估计 ARR 的 10x，与一家在受监管垂直行业增长 15-20% 的企业网络安全 SaaS
              公司所适用的市场倍数一致。有条件限定来自五个必须在承诺投资前解决的阻断性尽调事项：（1）披露 ARR 和 NRR，以验证基准情景；（2）验证毛利率（目标高于 70%）；（3）确认烧钱速度和现金跑道（需要至少 18
              个月）；（4）审计 FedRAMP ConMon 项目健康状况；（5）客户队列集中度数据。

              风险评级：高。融资缺口、未披露财务指标、倍数压缩和二元退出时点风险叠加，使投资不确定性很高。这不是买入建议，而是需要数据室验证的有条件兴趣信号。

              退出策略：存在三条退出路径，风险画像不同。战略 M&A（Palo Alto Networks、Cisco、Broadcom 是最可信买方）执行确定性最高，估计区间
              $4.0-6.0B；若竞争整合加速，可以实现。IPO 回报最高（以公开市场溢价按 12-15x ARR 估值 $4.0-6.0B），但依赖市场窗口，并要求 ARR 增速超过 20%。GP
              主导的延续基金工具（Thoma Bravo、Warburg Pincus）在公开市场到 2027 年仍关闭时，提供约 $3.0-3.5B 的二级退出底线。

              会把「有条件兴趣」转为「放弃」的投资逻辑破裂触发条件：（1）数据室确认 ARR 增速低于 10%；（2）FedRAMP 授权失效；（3）CEO Andrew Rubin 或 CFO Anup Singh
              离职且无继任计划；（4）Cisco 或 VMware 专利主张成功；（5）到 2028 年底仍无可信退出路径。
