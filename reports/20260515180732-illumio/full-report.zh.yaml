  - id: TE002
    title: 工作流 / 用例表
    columns:
      - 用例
      - 工作流
      - 购买方角色
      - 见效时间
      - 结果
      - 证据
    rows:
      - - 勒索软件遏制
        - 以发现模式部署 VEN 代理；为关键资产工作负载打标签；围绕持卡人数据或生产层落下默认拒绝的隔离圈；在 OS 防火墙层阻断横向移动
        - CISO、安全运营 VP
        - 初始隔离圈数天可上线；完整生产覆盖需数周
        - 勒索软件在初始落点后的横向移动被阻断；爆炸半径被限制在已攻陷分段内
        - SE004, SE018
      - - PCI DSS 网络分段（v4.0 Req 1）
        - 识别持卡人数据环境工作负载；标记为 CDE 层；执行隔离策略，将 CDE 与范围外系统分开；生成来自 PCE 的合规报告
        - CISO、PCI QSA、合规团队
        - CDE 映射需数周；完整 PCI 分段策略需数月
        - 满足 PCI DSS Requirement 1 和 2 的网络分段合规；自动化策略文档减少审计准备时间
        - SE006, SE001
      - - 多云工作负载隔离
        - 在云 IaaS 上部署 VEN，或使用 Insights 无代理模式；按环境 / 应用 / 角色分配标签；无论原生安全组多复杂，都在 AWS、Azure、GCP 上执行一致策略
        - 云安全架构师、平台工程
        - Insights 无代理上线需数小时到数天；基于 VEN 的云覆盖需数天到数周
        - 跨云厂商保持一致的分段策略；不依赖 IP 的策略能顶住云工作负载变动
        - SE001, SE002
      - - 混合数据中心零信任要求
        - 用 Illumination Map 映射本地和云端所有应用流；构建应用隔离圈；从仅靠边界防护迁移到工作负载级分段策略
        - CISO、网络安全团队、企业架构师
        - 完整混合覆盖需数月到数个季度
        - 混合云和本地工作负载实现零信任分段；降低任何入侵的爆炸半径
        - SE005, SE022
      - - DORA 第 9 条合规（欧盟金融业）
        - 按 DORA 韧性要求分段 ICT 系统；用 Illumio 标签策略隔离业务功能；生成自动化网络分段文档供监管审查
        - CISO、首席风险官、合规官
        - 策略映射需数周；完整书面合规态势需数月
        - 形成业务功能之间网络隔离的文档证据；满足欧盟金融实体 DORA 第 9 条技术控制要求
        - SE006, SE005
      - - 美国联邦零信任要求（M-22-09）
        - 部署在已获 FedRAMP Moderate 授权的 PCE SaaS 上；集成身份提供商；按 CISA Zero Trust Maturity Model 执行最小权限横向移动控制
        - 联邦 CISO、ISSM、机构安全架构师
        - FedRAMP 合规上线和策略部署需数月
        - 支撑 FISMA 和 M-22-09 合规；FedRAMP Moderate 授权提供符合 ATO 的采购路径
        - SE005, SE011
    notes: |
      见效时间估计来自 Illumio 发布的案例研究和解决方案页面。购买方角色来自 Illumio 解决方案简报。结果为公司声称；独立第三方案例验证仅限于可获得的公开案例研究（SE018）。
    claimRefs:
      - CE018
      - CE029
      - CE011
      - CE015
  - id: TE003
    title: 技术 / 运营架构表
    columns:
      - 组件
      - 功能
      - 技术
      - 部署选项
      - 依赖
    rows:
      - - 策略计算引擎（PCE）
        - 中央控制平面——管理工作负载标签、编译策略规则、向 VEN 分发规则，提供 Illumination Map、REST API、RBAC、审计日志
        - 自研应用服务器；TLS 加密 API；PostgreSQL 支撑的状态存储；HA 主备模式
        - SaaS（Illumio 托管，已获 FedRAMP 授权）或本地部署（客户 VM 或服务器，包括物理隔离环境）
        - OS 原生工作负载代理（VEN）；可选目录服务（AD/LDAP）用于标签同步
      - - 虚拟执行节点（VEN）
        - 每个工作负载上的执行代理——通过 OS 原生防火墙执行已编译策略规则；在发现模式收集流量遥测；将状态回传 PCE
        - >-
          OS 原生集成——Linux 上用 iptables/nftables，Windows 上用 Windows Firewall，AIX、Solaris、macOS 上用等效机制；轻量 OS 进程，公司称 CPU 开销低于
          1%
        - 按工作负载安装在 Linux、Windows、AIX、Solaris、macOS、容器（pod sidecar 或主机级）和云 IaaS 实例上
        - 通过 TLS 连接 PCE；主机 OS 支持 OS 原生防火墙
      - - Illumination Map
        - 实时交互式流量依赖可视化——展示工作负载之间的通信流；高亮异常和非预期连接；支持先发现、后执行的工作流
        - 集成在 PCE 中的 Web 应用；近实时处理 VEN 代理遥测；正在申请专利的可视化引擎
        - 内嵌于 PCE（SaaS 或本地部署）；可通过 Web 浏览器访问
        - VEN 遥测流；PCE 事件总线；启用 JavaScript 的浏览器
      - - REST API 和 OpenAPI 规范
        - 对 PCE 资源的完整程序化访问——工作负载管理、策略编写、事件流、标签 CRUD、集成 Webhook；支撑 IaC、SIEM、工单自动化
        - HTTP/S REST；开发者门户发布 OpenAPI 3.x 规范；通过 API key 或 OAuth2 认证
        - 内嵌于 PCE；任何网络可达客户端都可访问
        - PCE；外部集成目标（ServiceNow、Splunk、Terraform、Kubernetes）
      - - Illumio Insights（云模块）
        - 面向 AWS、Azure、GCP 的无代理云流量可视性——无需部署 VEN 代理即可摄取云原生遥测；AI 辅助策略推荐引擎；可选接入 PCE 以统一混合策略
        - 云原生 SaaS；摄取 VPC Flow Logs、Azure NSG flow logs、GCP Cloud Logging；基于 ML 的策略推荐引擎
        - 仅 SaaS（云托管）；日志摄取需要云 IAM 权限
        - 云厂商 API 和 IAM 权限；可选连接 PCE 以统一混合策略
      - - PCE 高可用（HA）集群
        - 面向企业韧性的 PCE 主备集群——提供故障切换连续性；跨托管工作负载群编排 VEN 代理滚动升级且不停机
        - 标准主备集群拓扑；健康检查触发故障切换；PCE 节点间状态复制
        - 仅限 PCE 本地部署；PCE SaaS 内置由 Illumio 管理的 HA
        - 共享或复制存储；负载均衡器；客户自管 HA 基础设施
    notes: |
      架构细节来自 PCE 文档（SE001）、开发者门户（SE002）和官方产品页面。VEN CPU 开销为公司声称；公开渠道没有独立基准。HA 拓扑基于公开的 PCE 部署指南。
    claimRefs:
      - CE001
      - CE002
      - CE016
      - CE017
      - CE019
      - CE028
      - CE036
      - CE037
      - CE039
