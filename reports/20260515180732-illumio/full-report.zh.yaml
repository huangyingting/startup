      - number: '7.4'
        title: 财务、退出与交叉风险
        blocks:
          - type: paragraph
            body: >
              Illumio 的财务风险由 2021 年 10 月 $2.75B Series G 和此后无后续融资共同塑造。4.5 年之后，按或接近 2021
              年估值授予的股权期权，视增长轨迹而定，可能接近或已经处于平值，带来员工股权疲劳风险。Thoma Bravo 基金年份（Fund XIII，2021）通常意味着 2026-2028 年存在退出压力，正好遇上网络安全
              SaaS 倍数压缩环境（NTM 8-12x，而 2021 年峰值为 20x）。Illumio 按工作负载计费的许可证模式，让大规模部署对预算更敏感；云自动扩缩容可能造成意外许可证成本尖峰。FTC
              扩大执法权限，为美国企业客户增加额外合规压力。国际扩张要求 PCE SaaS 适配德国、法国、韩国等国家特定数据驻留要求，可能与当前多租户架构冲突。勒索软件威胁格局是双向力量：它提高了对 Illumio
              横向移动遏制的需求，也加大了威胁行为者攻击 Illumio 客户的复杂度。触发投资逻辑破裂的监控指标包括 ARR 增速低于 20%、NRR 低于 100%、竞争性评测胜率低于 50%，以及任何 PCE 或 VEN
              关键安全公告。
