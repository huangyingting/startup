      - number: '3.2'
        title: 直接 ZTS 竞争对手
        blocks:
          - type: paragraph
            body: >-
              Akamai Guardicore Segmentation 是与 Illumio 架构最接近的同类：两家公司均成立于 2013 年，均采用代理 +
              无代理部署模型，并且都在工作负载层面执行基于标签的微分段策略。Akamai 于 2021 年 9 月以约 $600M 收购 Guardicore，把企业级 ZTS 能力纳入一家 FY2024 收入
              $3.98B、拥有 10,000+ 企业客户关系和深厚威胁情报基础设施的组织。此次收购通过 Akamai 的分销网络、安全运营触达和品牌信任，实质增强了 Guardicore
              的竞争地位——尽管整合复杂度和产品路线图对齐仍是 Illumio 客户和分析师提到的执行风险。TechHQ 记录 Illumio 与 Guardicore 在核心隔离围栏能力上具备有意义的功能对等，差异主要在
              Illumio 的 AI Security Graph 和 Guardicore 的威胁可视化。

              Cisco Secure Workload（前 Tetration Analytics，2016 年推出）通过硬件传感器或软件代理采集深度遥测，提供工作负载微分段。它深嵌于 Cisco
              重度企业环境，但需要专用硬件传感器基础设施，带来 Illumio 纯软件方案可以避免的部署开销。Cisco 更广的安全产品组合和既有企业关系，使它在已经标准化使用 Cisco
              网络的大型账户中构成竞争威胁——但硬件依赖限制了多云敏捷性。

              VMware NSX 是与虚拟机管理程序集成的微分段，直接嵌入 vSphere 虚拟化结构，因此是传统 VMware 数据中心的默认 ZTS 解决方案。NSX
              的主要限制是依赖虚拟机管理程序：策略无法跟随工作负载进入没有 vSphere 的公有云环境，给多云覆盖设置了硬上限。Broadcom 于 2023 年 11 月以 $61 billion 收购
              VMware，随后重组许可并显著提高每 CPU 定价，在 VMware 装机基础中引发客户不满，多个企业账户公开探索替代方案。这一扰动为 Illumio 创造了有文档支持的迁移机会：Illumio 可以吸收本地
              NSX 工作负载，同时把策略无缝延伸到 AWS、Azure 和 GCP。

              ColorTokens 是主要剩余的独立小型 ZTS 供应商，截至 2022 年估计累计风险融资 $103M。它主要在中端市场竞争，提供可比的基于标签策略模型，但缺少让 Illumio 进入 Fortune
              500 账户的企业规模、分析师认可和全球支持基础设施。
