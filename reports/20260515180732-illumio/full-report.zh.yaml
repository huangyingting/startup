              Illumio 高管团队由创始人兼 CEO Andrew Rubin 领导；Rubin 自公司 2013 年创立以来一直任职。Rubin 于 2024 年获得 Ernst & Young Bay Area
              年度企业家奖，并七次入选 Goldman Sachs “100 位最受关注企业家”榜单。他拥有 Washington University in St. Louis 金融学 BSBA 学位，并担任
