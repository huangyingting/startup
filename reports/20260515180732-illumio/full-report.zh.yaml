      - number: '4.5'
        title: 财务结论与尽调缺口
        blocks:
          - type: paragraph
            body: >
              Illumio 呈现出一家成熟、资本充足的企业 SaaS 公司的财务轮廓，所在市场利好且增长中；但财务披露不透明，构成重大尽调阻碍。Gartner 预测 2025 年全球安全支出为 $212
              billion、年增长 15.1%，为公司收入提供顺风。监管要求（DORA、NIS2、美国行政令）、勒索软件压力和多云采用，持续推高企业安全预算。不过，自 2021 年 Series G 后，Illumio
              未披露 ARR、毛利率、NRR、烧钱速度或任何前瞻指引。$2.75 billion 估值是在 2021 年网络安全 SaaS 倍数高点定下（ARR 的 20x 或更高）；2023–2025
              年市场修正后倍数已压缩至 8–12x。若没有强劲收入增长证据，当前公允市场价值可能显著低于上次披露值。缺少最新财务数据，潜在投资者无法核实收入增长轨迹、利润率改善或资本效率。公司的 Rule of 40
              得分、盈利路径和自由现金流生成完全不透明。五个关键尽调要求是：（1）经审计的年度收入和按队列拆分的 ARR；（2）最近 NRR
              及队列分析；（3）按业务段拆分的实际毛利率；（4）当前现金余额和月度烧钱速度；（5）显示前 10 大客户收入依赖度的客户集中度分析。除非在 NDA 下取得这些信息，否则无法以可接受信心承销增长或资本回报逻辑。
