      - number: '8.5'
        title: 展示材料
        blocks:
          - type: callout
            title: 在 $2.75B 下有条件兴趣——承诺前必须进数据室
            body: >
              以 $2.75B（2021 年 11 月 Series G）入场，基准情景下价格合理，但悲观情景有 30-45% 下行。4.5 年融资缺口和缺少 ARR 披露，让没有数据室访问时无法精确判断。概率加权 EV 约
              $2.8B，仅比入场价略高；若把入场价谈到 $2.5B，将显著改善风险调整回报。风险评级高。五个 P0/P1 尽调关口全部解决前，不应承诺投资。
            calloutType: recommendation
