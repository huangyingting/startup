  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >-
              Illumio
              的主要竞争场域是零信任分段（ZTS）和微分段软件市场：这类方案在单个工作负载层面执行细粒度、感知身份和应用的网络策略，防止横向移动并遏制入侵影响半径。不同于保护网络边界的外围控制，微分段在网络内部运行，不管工作负载处于物理还是虚拟位置，都在工作负载、应用层和数据存储之间建立软件定义的策略边界。Illumio
              特别聚焦基于主机代理和 API 的分段，通过其 Policy Compute Engine（PCE）下发策略，不需要硬件改造或专用网络设备。

              微分段市场与以下市场正式区分但有重叠：零信任网络访问（ZTNA）管的是以身份为中心的用户到应用连接，而非工作负载之间通信；安全访问服务边缘（SASE）把边缘安全（SSE）与 SD-WAN
              打包，只包含基础分段能力；网络检测与响应（NDR）能检测横向移动，但不执行策略来阻止它。云安全态势管理（CSPM）和云工作负载保护平台（CWPP）是相邻市场，与 Illumio 的 CloudSecure 模块在
              IaaS 可见性上有重叠，但不提供定义 ZTS 的东西向流量分段。

              Illumio 替代的现状方案包括：使用传统防火墙的 VLAN 分段（管理复杂，无法随工作负载迁移到云）、硬件网络分段设备（僵硬且仅限数据中心）、带基础微分段覆盖的
              SD-WAN（应用感知有限），以及完全依赖外围防御的扁平网络架构。Illumio 直接 TAM
              排除的组织支出包括身份与访问管理（IAM）、终端检测与响应（EDR）、SIEM、电子邮件安全和硬件防火墙设备——这些都相邻，但不与工作负载分段直接竞争。
