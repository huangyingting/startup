      - number: '8.2'
        title: 估值背景与可比公司分析
        blocks:
          - type: paragraph
            body: >
              评估 Illumio 估值时，既要看公开网络安全 SaaS 可比公司，也要看私募市场基准。按 2026 年初同业组 NTM ARR 中位数 8-12x 计算，$2.75B 入场估值意味着 Illumio ARR
              至少已从 Series G 时估计的 $110-183M 增长到 $230-340M（Series G 隐含 2021 年高峰倍数 15-25x）。在 15% CAGR 假设下，这可以做到（2026 年
              $200-350M 区间），但没有独立确认。

              公开可比公司提供了有用参照。Zscaler（ARR 约 $2.5B，EV 约 $25B，NTM 约 8x）展示了后 ZIRP 时代网络安全 SaaS 龙头的倍数压缩。Palo Alto Networks（收入
              $9.2B，NTM 约 14x）享有平台溢价。CrowdStrike（ARR 约 $4.2B，NTM 约 19x）因增长和 NRR 异常强劲而处于高端。SentinelOne（ARR 约 $1.1B，NTM 约
              14x）按 ARR 规模是最接近 Illumio 的公开可比公司。私募可比公司中，Claroty 2021 年以 $2.5B 估值融资 $400M，常被拿来与 Illumio 并列。Google 以 $32B
              收购 Wiz 设定了 ZT 云安全规模基准，尽管 Wiz 的云原生架构和增长画像显著不同。

              按 Meritech 和 BVP Cloud 基准，增长 15-25% 的企业网络安全 SaaS 公司 EV/ARR 中位数为 8-12x；前四分位公司（增长高于 25%、NRR 高于 110%）可达
              14-18x。Illumio $2.75B 入场价隐含约 10x 估计 ARR，正落在中速增长受监管 SaaS 业务的合理市场区间，但没有为流动性不足和尽调不确定性提供深度折价。
