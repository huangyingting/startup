  - id: TP002
    title: 功能 / 能力矩阵
    columns:
      - 能力
      - Illumio
      - Akamai Guardicore
      - Cisco Secure Workload
      - VMware NSX (Broadcom)
      - Zscaler
      - Palo Alto Networks
    rows:
      - - 多云原生部署
        - 是：AWS、Azure、GCP、本地部署、混合环境均可通过 PCE 代理 + API 落地；不依赖 vSphere
        - 是：代理 + 无代理覆盖混合环境；Akamai 云基础设施进一步增强
        - 部分：基于代理，但硬件传感器依赖限制云原生部署
        - 否：集成在 hypervisor 中；依赖 vSphere；仅限 VMware 环境
        - 是：云原生 SASE 架构；面向 IaaS 东西向流量的工作负载分段
        - 是：Prisma Cloud 覆盖 AWS / Azure / GCP；CN-Series 面向容器环境
      - - 面向应用的工作负载策略
        - 是：PCE 按应用标签而非 IP 地址给工作负载围栏隔离；自动建议策略
        - 是：基于标签的围栏隔离与 Illumio PCE 相近；可见到进程层
        - 是：基于网络流数据的应用感知策略；需要硬件传感器或软件代理
        - 是：NSX-T 分布式防火墙通过 NSX Service Mesh 支持应用层策略
        - 部分：ZPA 提供用户到应用策略；工作负载东西向分段颗粒度较粗
        - 部分：Prisma Cloud 提供安全态势和部分网络控制；不是完整的工作负载东西向分段
      - - 无代理部署选项
        - 是：代理 + 无代理；不需要硬件；纯软件部署
        - 是：除基于代理外，也支持无代理发现和执行模式
        - 否：遥测需要硬件传感器基础设施；纯软件代理模式拿不到完整遥测
        - 否：需要 vSphere hypervisor；没有纯代理的云原生选项
        - 是：SASE 云代理架构；用户到应用不需要代理；工作负载分段仍使用代理
        - 部分：Prisma Cloud 支持无代理 CSPM 扫描；CN-Series 需要容器部署
      - - AI 辅助策略自动化
        - 是：Illumio AI Security Graph；每秒处理 160K+ 安全事件，实时给出策略建议
        - 部分：威胁可视化和基于 ML 的异常检测；没有可比的 AI 策略图谱
        - 部分：重分析的遥测平台；基于 ML 的异常检测；策略不是 AI 原生
        - 部分：NSX Intelligence 可推荐微分段；AI 原生自动化有限
        - 是：Zero Trust Exchange 用 AI / ML 做威胁检测；工作负载分段的 AI 功能有限
        - 是：Cortex AI 平台；在 PANW 产品中提供 AI 辅助策略；ZTS 的 AI 深度不清楚
      - - 联邦合规就绪度
        - 推进中：正在争取 FedRAMP 授权；已被多个美国联邦机构部署；支持 CISA ZTMM
        - 部分：Akamai 的 CDN 已获 FedRAMP 授权；Guardicore ZTS 的 FedRAMP 状态未确认
        - 是：Cisco Secure Workload 已获 FedRAMP 授权；在美国联邦机构广泛部署
        - 是：VMware NSX 已获 FedRAMP 授权；长期服务联邦市场
        - 是：Zscaler 已获 FedRAMP 授权；有大量联邦 ZPA / SASE 部署
        - 是：Palo Alto Networks 的 Prisma Cloud 和 Cortex 已获 FedRAMP 授权；联邦市场存在感强
      - - 零依赖横向移动遏制
        - 是：策略在工作负载进程层执行；无需改变网络拓扑即可遏制入侵
        - 是：进程层围栏隔离；Guardicore 历来强在阻断横向移动
        - 部分：需要硬件传感器；策略在网络流层执行；颗粒度低于 Illumio
        - 部分：在 vSphere 内部的 vNIC 层执行；无法覆盖非 VMware 工作负载
        - 部分：ZPA 隔离用户到应用路径；东西向工作负载遏制需要额外配置
        - 部分：Prisma Cloud 在云中做运行时执行；没有硬件防火墙时，本地东西向能力有限
    notes: 能力评级来自厂商文档、第三方对比（TechHQ、SecurityWeek）、分析师报告，以及 Illumio 发布的平台材料。所有能力判断均反映截至 2025 年 Q1-Q2 可公开获得的信息；评级可能未覆盖尚未发布的产品更新。
