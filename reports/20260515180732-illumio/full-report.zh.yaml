  - id: FU001
    title: 客户旅程地图
    type: journey-map
    layout: standard
    description: |
      Illumio 企业客户旅程，从初始认知和采购，到分阶段部署、价值证明、续约和扩张。每个阶段都映射到买方细分，以及与留存和扩张动态有关的关键摩擦或成功因素。
    data:
      nodes:
        - id: awareness
          label: 认知与 RFP
          detail: 由勒索软件事件、合规审计或同行 CISO 推荐触发；通过 Illumio 直销或渠道伙伴（Deloitte、CDW、KPMG）采购
        - id: pilot
          label: 试点 / PoC
          detail: 在隔离圈环境中做 10–50 个工作负载试点（PCI CHD、关键应用层或单个 NHS Trust 网络）；Illumination Map 通过流量依赖可视化立即产生价值；典型 PoC 30–90 天
        - id: initial-deploy
          label: 初始生产部署
          detail: 向目标环境铺开 VEN 代理；通过 PCE 编写策略；发现到执行工作流；典型首次分段隔离圈需 4–12 周；成功关键是管理复杂度
        - id: expand
          label: 扩张
          detail: 初始成功后扩展到更多应用环境、更多数据中心、通过 Insights 覆盖云工作负载，或覆盖端点；医疗账户可能引入 AMS 托管服务层
        - id: renew
          label: 续约与深化
          detail: 多年期续约；与 SIEM（Splunk/QRadar）和 SOAR 集成；抢先体验中的 AI 辅助策略生成降低持续管理负担；合规审计证据生成增加粘性
    claimRefs:
      - CU023
      - CU024
  - id: FU002
    title: 采用 / 部署漏斗
    type: funnel
    layout: standard
    description: |
      根据公开输赢评论、案例研究部署模式和企业安全销售周期规范，估计 Illumio 企业部署漏斗，从初次接触到多环境生产部署。数值用于说明相对阶段流失，不是公司确认的管线数据。
    data:
      items:
        - label: 合格企业线索
          value: 100
          detail: 拥有混合工作负载资产和合规要求的 F500+ 企业
        - label: PoC 启动
          value: 45
          detail: 约 45% 合格线索会进入 PoC；门槛是 IT 安全团队容量
        - label: PoC → 初始销售
          value: 28
          detail: 约 62% PoC 到成交率；属于典型企业安全 PoC 转化；复杂度担忧是主要流失原因
        - label: 初始 → 扩展部署
          value: 20
          detail: 约 70% 初始客户在 24 个月内扩展到第二个环境（分析师估计，未确认）
        - label: 锚定 / 多年期标杆账户
          value: 10
          detail: 约 35% 客户成为带有高管证言的多年期锚定标杆；基于客户背书计划密度估计
    claimRefs:
      - CU002
      - CU023
  - id: FU003
    title: 客户证明矩阵
    type: matrix
    layout: standard
    description: |
      证据质量矩阵，将具名客户部署映射到四个维度——部署证据类型、生产成熟度、结果具体性和留存信号。每个维度的证据质量越高，客户集中度带来的投资风险越低。
    data:
      columns:
        - 部署证据
        - 生产成熟度
        - 结果具体性
        - 留存信号
      rows:
        - label: NHS England
          values:
            - label: 采购记录 + 案例研究
              tone: positive
            - label: 多个 Trust 生产部署
              tone: positive
            - label: 达成 DSPT 合规；勒索软件遏制
              tone: positive
            - label: 多年扩张已确认
              tone: positive
        - label: Microsoft
          values:
            - label: CISO 证言
              tone: positive
            - label: 全球超大规模生产部署
              tone: positive
            - label: “Microsoft 规模下唯一解决方案” — CISO 引述
              tone: positive
            - label: 无流失信号；假定仍在持续
              tone: neutral
        - label: Bank of America（金融客户）
          values:
            - label: 新闻材料具名
              tone: neutral
            - label: 多年企业部署
              tone: positive
            - label: PCI-DSS 合规；公开细节有限
              tone: neutral
            - label: 无流失信号
              tone: neutral
        - label: Salesforce
          values:
            - label: 已发布案例研究
              tone: positive
            - label: 云数据中心生产部署
              tone: positive
            - label: 东西向可见性和隔离
              tone: positive
            - label: 部署后发布案例研究
              tone: neutral
        - label: Lufthansa Group
          values:
            - label: 仅新闻稿
              tone: neutral
            - label: 企业部署
              tone: neutral
            - label: 公开结果细节有限
              tone: warning
            - label: 无流失信号
              tone: neutral
    claimRefs:
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU031
      - CU032
  - id: FU004
    title: 留存 / 重复分群
    type: cohort
    layout: standard
    description: |
      按垂直行业估计企业客户留存分群，基于评论平台数据、案例研究中的续约表述、分析师评论和行业平均 SaaS 留存基准。这些是分析师 / 作者估计；公司没有披露留存数据。数值表示各年节点估计续约客户百分比。
    data:
      columns:
        - 第 1 年
        - 第 2 年
        - 第 3 年
      rows:
        - label: 金融服务（估计）
          values:
            - 92
            - 87
            - 83
        - label: 医疗（估计）
          values:
            - 90
            - 85
            - 80
        - label: 政府 / 国防（估计）
          values:
            - 95
            - 90
            - 88
        - label: 科技 / SaaS（估计）
          values:
            - 88
            - 82
            - 77
        - label: 全部垂直行业合计（估计）
          values:
            - 91
            - 86
            - 82
    claimRefs:
      - CU022
  - id: FR001
    title: 风险热力图
    type: matrix
    layout: standard
    description: |
      二维风险热力图，按概率（列：低 / 中 / 高）和对业务或投资假设的影响严重性（行：低 / 中 / 高）绘制 Illumio 主要风险。单元格列出每个概率-影响象限中的主要风险。
    data:
      columns:
        - 低概率
        - 中概率
        - 高概率
      rows:
        - label: 高影响
          values:
            - FedRAMP 失效；专利主张；PCE SaaS 中断；VEN 内核 API 破坏
            - 云原生新建场景替代；平台整合
            - —
        - label: 中影响
          values:
            - 关键 CVE 披露；BIS 出口违规；CC EAL2 失效
            - 股权疲劳导致流失；Thoma Bravo 退出压力；渠道集中
            - RaaS 威胁升级；ARR 减速
        - label: 低影响
          values:
            - 数据驻留缺口；按工作负载计费意外
            - eBPF 商品化；分析师覆盖丢失
            - 宏观 IT 预算收紧
    claimRefs:
      - CR001
      - CR015
      - CR017
      - CR019
      - CR022
      - CR036
  - id: FR002
    title: 风险传导图
    type: dag
    layout: standard
    description: |
      有向图展示主要风险因素如何通过 Illumio 商业模式传导到收入、利润率、融资和客户结果。帮助识别关键风险传导路径和干预点。
    data:
      nodes:
        - id: r1
          label: 监管不合规（FedRAMP 失效 / BIS 违规）
        - id: r2
          label: 专利主张（Cisco / VMware）
        - id: r3
          label: 平台整合（CrowdStrike / PAN / Zscaler）
        - id: r4
          label: 云原生替代（AWS VPC Lattice）
        - id: r5
          label: 股权疲劳 / 关键人员流失
        - id: r6
          label: Thoma Bravo 退出压力
        - id: e1
          label: 联邦 ARR 流失
        - id: e2
          label: 毛利率压缩
        - id: e3
          label: ARR 增长减速
        - id: e4
          label: 产品速度损失
        - id: e5
          label: 估值压力 / IPO 延迟
        - id: e6
          label: 客户和投资人信心侵蚀
      edges:
        - from: r1
          to: e1
          label: 直接剔除 ARR
        - from: r2
          to: e2
          label: 强加特许权使用费
        - from: r3
          to: e3
          label: 竞争替代
        - from: r4
          to: e3
          label: 新建场景 TAM 压缩
        - from: r5
