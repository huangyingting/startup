      - number: '2.3'
        title: 买方与用户细分
        blocks:
          - type: paragraph
            body: >-
              Illumio 及同类零信任分段供应商的主要经济买方是首席信息安全官（CISO），CISO 拥有安全战略并控制工作负载保护预算。年金额超过 $500K 的大型多年期企业平台合同，CIO 会共同批准，CFO
              做正式签字。技术评估由网络安全团队、安全架构师或云安全工程师牵头，他们评估策略管理开销、集成复杂度和代理部署可行性。付款来自安全预算或 IT 基础设施预算；采购和法务审查标准 SaaS 合同条款和多年期承诺结构。

              Illumio 价值最高的买方细分包括：（1）BFSI 受监管企业（占微分段市场 28.76%），PCI-DSS、SOX、GDPR、DORA 和 SWIFT
              审计要求使持卡人环境与其他系统之间的网络隔离接近刚需；（2）医疗服务机构和付款方（增长最快细分，5.06% CAGR），面临 328% 更多勒索软件和 $7.4M 平均数据泄露成本；（3）受 OMB
              M-22-09 FY2024 零信任强制要求约束的美国联邦机构和国防承包商，CISA 零信任成熟度模型 明确要求高级成熟度层具备微分段；（4）受 CISA
              指引约束的关键基础设施运营商（能源、公用事业、通信、交通）；以及（5）具有复杂多云架构的全球 2000 强企业，需要在 AWS、Azure 和 GCP 工作负载之间执行一致的东西向策略。

              中端市场企业（500–10,000 名员工）是服务不足的扩张机会。Cybersecurity Insiders 2026 Cloud Security Report 发现，88%
              的组织运营混合云或多云环境，说明技术驱动因素已经遍布市场；但 74% 提到人才短缺是障碍——这意味着中端组织需要比 Illumio 当前自助式产品更自动化、托管服务化的交付模式。中端市场的预算所有权通常从
              CISO 转向 IT Director 或 VP of Engineering，销售周期缩短，但合同价值降低。Illumio 当前产品定位（Fortune 100 案例研究、专业服务重的部署）表明，截至 2026
              年初，公司对中端市场的优化有限。
