  - id: FE001
    title: 产品架构图
    type: stack
    layout: standard
    description: |
      Illumio 零信任分段架构从底部工作负载执行层到顶部管理和集成界面组织。PCE 控制平面不在数据路径中——它计算并分发策略规则，VEN 代理在每个工作负载的 OS 防火墙层执行。工作负载之间的流量从不经由 PCE。
    data:
      layers:
        - label: 集成和生态层
          detail: >-
            ServiceNow（工单自动化）、Splunk / IBM QRadar（SIEM 事件流）、HashiCorp Terraform（IaC 策略即代码）、Kubernetes admission
            controller（动态工作负载注册）、AWS/Azure/GCP 云市场分发、渠道伙伴 API（Deloitte、Presidio、CDW）
        - label: 管理和可视化层
          detail: >-
            Illumination Map（专利申请中的实时流量依赖可视化）、带 OpenAPI 3.x 规范的 REST API、RBAC 多团队治理、审计事件日志、Illumio Insights（AI
            驱动的无代理云策略）、PCE 网页管理控制台
        - label: Policy Compute Engine（PCE）
          detail: 标签到 IP 翻译引擎、策略规则编译（标签矩阵到 OS 防火墙规则）、工作负载状态跟踪器、事件总线、RBAC、HA 主备模式；部署形态为 FedRAMP 授权 SaaS 或客户托管本地部署，包括隔离网络环境
        - label: 策略通信层
          detail: TLS 加密 PCE-to-VEN 推送通道，将编译后的规则集分发到所有受管工作负载；VEN 代理将流量遥测和工作负载健康状态回传 PCE；没有应用流量经过该层
        - label: 工作负载和执行层
          detail: >-
            VEN 代理运行在 Linux（iptables/nftables）、Windows Server（Windows Firewall）、AIX、Solaris、macOS、容器（pod sidecar
            或主机级）；通过 OS 原生内核防火墙执行默认拒绝策略，无内联代理，也无流量延迟开销
    claimRefs:
      - CE001
      - CE002
      - CE016
      - CE017
      - CE019
      - CE020
  - id: FE002
    title: 客户工作流 / 运营流程
    type: flow
    layout: standard
    description: >
      标准 Illumio 部署流程，从初始 VEN
      安装到发现、打标签、策略模拟和执行。该流程设计为非破坏性：发现模式运行时不执行任何策略，模拟模式在激活任何规则前测试策略影响。客户通常在数天到数周内完成初始隔离圈，并在数月内逐步扩大覆盖。
    data:
      nodes:
        - id: n1
          label: 部署 VEN 代理（发现模式）
          detail: 在目标工作负载上以发现模式安装轻量 VEN 代理——代理收集流量遥测，并向 PCE 上报所有工作负载间通信，不执行任何策略；该阶段对应用流量零扰动
        - id: n2
          label: 通过 Illumination Map 点亮流量路径
          detail: PCE 汇总 VEN 遥测并渲染 Illumination Map——实时可视化所有工作负载间通信流；安全团队识别应用依赖、异常连接和候选分段边界
        - id: n3
          label: 在 PCE 中给工作负载打标签
          detail: 安全团队在 PCE 控制台或通过 REST API 为每个工作负载分配标签（环境、应用、角色、位置）；标签不依赖 IP 地址，可穿透 IP 变化、容器重启和云迁移保持
        - id: n4
          label: 起草分段策略
          detail: 在 PCE 中用标签对构建基于标签的允许规则（例如 App:Payments 与 App:Database 通信）；PCE 按当前标签分配计算每条规则覆盖哪些工作负载；策略用逻辑表达，而不是 IP 地址
        - id: n5
          label: 模拟策略影响
          detail: 运行策略模拟模式，预测拟议规则会阻断哪些流量；在不激活任何执行的情况下审查拟阻断列表；迭代策略，直到确认符合预期
        - id: n6
          label: 执行策略（执行模式）
          detail: >-
            将目标工作负载切到执行模式；PCE 通过 TLS 将编译后的 OS 原生防火墙规则推送给 VEN 代理；VEN 写入 iptables/nftables 或 Windows
            Firewall；横向移动现在按策略被阻断；所有流量违规都会记录
        - id: n7
          label: 监控、调整并扩大覆盖
          detail: 通过 Illumination Map 持续监控；PCE 对新工作负载或异常流量告警；安全团队逐步将 VEN 覆盖扩展到更多工作负载、云环境、容器集群和端点设备
    claimRefs:
      - CE017
      - CE018
      - CE019
      - CE020
      - CE021
      - CE029
