      - number: '5.3'
        title: 部署、集成与客户工作流
        blocks:
          - type: paragraph
            body: >
              Illumio 的部署模型采用分阶段方法，核心是尽量减少扰动。VEN 代理先以发现模式部署，只采集流量遥测、不执行规则；Illumination Map 因此能在任何强制执行前拼出完整应用流量图。随后安全团队在
              PCE 中给工作负载打标签，起草分段策略，在模拟模式中验证（预测阻断列表但不启用强制执行），再逐步把工作负载切到执行模式。该流程通常把首条分段策略的落地时间压到数天或数周，更广覆盖则在数月内展开。本地 PCE
              支持隔离网络中的物理隔离部署，包括涉密政府环境。集成面覆盖 ServiceNow（工单自动化）、Splunk 和 IBM QRadar（SIEM 事件转发）、HashiCorp Terraform（策略即代码与
              IaC 自动化），以及 Kubernetes 准入控制器（动态容器工作负载注册）。VEN 升级由 PCE 编排，支持在受管工作负载集群中滚动升级且应用不停机。开发者门户提供完整 PCE REST API 的
              OpenAPI 规范，支持自定义集成。Illumio 的市场进入既有直销，也有 Deloitte、KPMG、Presidio、CDW 等渠道合作伙伴，为大型企业上线提供部署服务。
