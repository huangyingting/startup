  topStrengths:
    - 微分段早跑 12 年：PCE/VEN 架构能覆盖混合云、裸金属和容器工作负载，不依赖网络硬件；估计 Big-4 对手复制需要 3–5 年
    - Illumio 开创了这个品类，并拿到 Gartner Leader 和 Forrester Leader；MITRE ATT&CK 映射确认，Illumio 能直接削弱横向移动、勒索软件扩散和权限提升等战术
    - 1,000+ 企业客户，包括 Fortune 100 的 15% 和监管行业头部客户；靠工作负载扩张推进 land-and-expand，NRR 估计超过 120%
    - >-
      结构性合规顺风：DORA Article 9（ICT 分段，2025 年 1 月）、CISA Zero Trust Architecture 要求（2025–2026）、NIST SP 800-207 采用、PCI-DSS
      v4，给微分段创造非可选预算项
    - >-
      退出可选性强：Thoma Bravo 4–7 年基金周期（2025–2028 到期）、Warburg Pincus IPO 就绪资本、$12B TAM 以 20%+ CAGR 增长，以及 Cisco、Palo Alto
      Networks、CrowdStrike 已被点名的收购兴趣
  topRisks:
    - >-
      平台整合风险：Cisco（ACI + Hypershield）、Palo Alto Networks（Prisma Cloud micro-segmentation）、CrowdStrike（Falcon Identity
      Protection）和 Microsoft（Entra ID network policies）都在补原生微分段；中端客户可能觉得“够用”，Illumio 独立 TAM 会被压缩
    - 财务不透明：ARR、毛利率、NRR 和单位经济模型没有披露；投资分析只能靠第三方估计和跨公司对标，任何收入负面意外都可能一票否决
    - Thoma Bravo 有退出压力：Series F 投资人要在 2025–2028 年面对 GP 基金周期退出；利率环境不利时被迫老股交易或 IPO，退出倍数可能低于入场
    - >-
      ZIRP 结束后倍数收缩：网络安全 SaaS ARR 倍数已从 25–40x（2021）降到 8–15x（2024–2026）；即便按市场共识 $220M ARR 估计，$3B 估值也意味着 13.6x 倍数，需要 25%+
      ARR 增长才能顶住
    - >-
      AI-native 颠覆：AI 驱动的网络异常检测、LLM 编排的策略生成（来自 Microsoft Copilot for Security、Palo Alto XSIAM 等）可能把手工策略编写商品化；Illumio 当前
      AI 路线图（Copilot Security 集成）仍处早期
  unresolvedGaps:
    - ARR、收入和增速未公开披露；所有 KPI 都是交叉引用的分析师估计，单次新闻披露就可能大幅改写估值图景
    - 毛利率和单位经济模型（CAC、LTV、回本周期）未知；毛利率低于 75% 会说明交付偏服务化，并削弱 IPO 可比性
    - 完整股权结构表、清算优先权堆叠和期权池稀释不可得；Thoma Bravo 和 Warburg Pincus 是否有棘轮条款未披露
    - 净收入留存率未正式披露；员工数不增长的投资标的要支撑 13–15x ARR 倍数，扩张经济模型是关键
    - NIST SP 800-207 和 CISA 要求的执行时间线不确定；如果联邦采购时间线后移，合规需求驱动可能延迟 1–2 年
