  - id: funding-milestones
    title: Funding History, Valuation, and Corporate Milestones
    body: >
      Illumio has raised at least $557 million in total venture funding across multiple rounds
      since its 2013 founding, according to CB Insights. Key publicly documented rounds include
      approximately $100 million raised in 2015, $125 million at a $1 billion-plus valuation in
      2017, $65 million in a Series E in 2019, $225 million in 2021 (with Thoma Bravo cited as
      lead in mid-2021), and a final disclosed $225 million Series G in late 2021 at a $2.75
      billion post-money valuation with Franklin Templeton cited as an investor. The company
      remains private as of May 2026 with no publicly confirmed IPO timeline, though it has
      periodically appeared in lists of potential IPO candidates given its valuation and
      enterprise customer base. The company's 2021 fundraising period was particularly active,
      with two substantial rounds that together added $450 million to the balance sheet and
      elevated the company to unicorn status well above the $1 billion mark.

      Key milestones include: the 2021 launch of Illumio CloudSecure (now rebranded as part of
      Illumio Segmentation for cloud environments), availability on AWS Marketplace and Microsoft
      Azure Marketplace, the 2024 Forrester Wave Leader designation, the 2026 Gartner Peer
      Insights Customers' Choice award (98% willingness-to-recommend, 4.8/5 rating from 160+
      verified reviews), the launch of Illumio Insights with an AI security graph in 2025-2026,
      and the March 2026 announcement of AI security graph enhancements for the Breach Containment
      for the AI Era initiative. In April 2026, Illumio announced a strategic collaboration with
      Deloitte Netherlands to accelerate DORA compliance. As of May 2026, the company has
      approximately 500-1,000 employees based on LinkedIn data (896 employees visible on LinkedIn),
      with 141,394 LinkedIn followers.
