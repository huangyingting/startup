callouts:
  - calloutType: strength
    title: Illumio Holds Dual Analyst Leader Designations
    body: >
      Illumio holds both a Forrester Wave Leader designation (Microsegmentation Solutions Q3 2024,
      labeled "the original microsegmentation specialist") and the 2026 Gartner Peer Insights
      Customers' Choice for Network Security Microsegmentation with a 4.8/5 star rating and 98%
      willingness-to-recommend from 160+ verified reviews. This dual recognition across the
      industry's two premier analyst houses provides strong third-party validation of product quality
      and customer satisfaction.
    claimRefs:
      - CO024
      - CO025

  - calloutType: risk
    title: Valuation Anchor is Four Years Stale; No IPO Timeline Confirmed
    body: >
      The last confirmed valuation of $2.75 billion dates to November 2021 — a period of elevated
      growth multiples for private software companies. As of May 2026, no subsequent equity round or
      updated valuation has been publicly disclosed. Illumio has periodically appeared on IPO watch
      lists but has not confirmed any IPO plans, leaving the current market value opaque. Revenue
      and profitability are also undisclosed, making independent valuation assessment very difficult
      without management-provided financials.
    claimRefs:
      - CO018
      - CO030

  - calloutType: insight
    title: Microsoft CISO Endorsement Signals Platform-Scale Validation
    body: >
      Igor Tsyganskiy, Global CISO of Microsoft, publicly stated that "Illumio was the only
      segmentation solution that would work at the scale of Microsoft and deliver in our environment."
      This endorsement from one of the world's largest and most security-conscious technology
      companies carries significant diligence weight, as Microsoft's internal security bar and scale
      requirements are among the most demanding globally.
    claimRefs:
      - CO007

  - calloutType: assumption
    title: PJ Kirner Co-Founder Status and Current Involvement Unclear
    body: >
      PJ Kirner is identified as a co-founder of Illumio in public sources. However, as of May 2026,
      Kirner does not appear in Illumio's published leadership team. His current role, equity stake,
      and any separation from the company are not confirmed by publicly available sources. This
      represents a governance information gap.
    claimRefs:
      - CO031

