  - id: leadership-governance
    title: Leadership, Board, and Governance
    body: >
      Illumio's executive team is led by founder-CEO Andrew Rubin, who has served since the
      company's 2013 inception. Rubin received the Ernst & Young Bay Area Entrepreneur of the
      Year award in 2024 and has been named to Goldman Sachs' "100 Most Intriguing Entrepreneurs"
      list seven times. He holds a BSBA in Finance from Washington University in St. Louis and
      serves as a board member of Emigrant Bank. The Chief Technology Officer, Ben Verghese,
      joined from VMware where he spent 13 years including as part of the ESX Server product
      founding team. CFO Anup Singh brings over 30 years of experience and previously served as
      EVP and CFO of Anaplan, and before that led Nimble Storage through a successful IPO and
      acquisition by HPE. Chief Product Officer Mario Espinoza previously led SaaS Security and
      Data Protection at Palo Alto Networks. Chief Revenue Officer John Lens led the Americas
      sales organization at Alteryx as SVP. CMO Karl Van den Bergh was previously CMO at Gigamon
      and was named Cybersecurity Marketer of the Year in 2024.

      The board of directors includes notable external members: George Tenet, the 18th Director
      of the Central Intelligence Agency (1997-2004) and recipient of the Presidential Medal of
      Freedom, serves as a board member; JJ Jack (John M. Jack), a Board Partner at Andreessen
      Horowitz (a16z), brings decades of software industry experience including as CEO of Fortify
      Software and Covalent; Mike Kourey, former CFO of Okta and Dialpad, chairs the audit
      committee; and a board member with extensive operations background (former HSBC Group COO
      until September 2024) reflects strong financial sector relationships. The Andreessen Horowitz
      presence on the board signals VC backing at the Series level.
    claimRefs:
