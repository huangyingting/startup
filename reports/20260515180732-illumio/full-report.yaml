      - number: '2.2'
        title: Market Sizing and Analyst Estimates
        blocks:
          - type: paragraph
            body: >-
              Mordor Intelligence provides the most granular public data on the microsegmentation market, estimating
              global market value at $21.58B in 2025, rising to an estimated $26.74B in 2026 and projected to reach
              $73.28B by 2031 at a 22.34% CAGR. This significantly outpaces both the broader Network Security market
              ($24.95B in 2025, growing to $47.37B by 2031 at 11.28% CAGR) and the Zero Trust Security market ($41.72B
              in 2025, growing to $102.01B by 2031 at 16.07% CAGR)—demonstrating that the micro-segmentation layer is
              growing structurally faster than its parent categories as enterprises shift from perimeter to
              workload-centric security postures.

              The TAM/SAM/SOM analysis for Illumio requires layering these market figures against Illumio's specific
              product scope and win patterns. The TAM is most appropriately framed as the Zero Trust Security market
              ($48.43B in 2026 per Mordor), since Illumio's platform positions itself within the full ZTS framework. The
              SAM is more precisely the microsegmentation and ZTS software segment ($26.74B in 2026), excluding
              hardware-based and pure-perimeter segmentation approaches. Illumio's SOM—the revenue it can realistically
              capture—is not disclosed; based on last known valuation ($2.75B, Nov 2021) and comparable private
              cybersecurity company revenue multiples of 7–12×, the implied ARR is approximately $200–400M, representing
              roughly 0.75–1.5% of the 2026 SAM. This wide range reflects the absence of any public Illumio revenue
              disclosure since 2021.

              Vertically, BFSI represents 28.76% of microsegmentation demand (the largest sector), and healthcare is the
              fastest-growing sector (5.06% CAGR) driven by a 328% increase in ransomware attacks and average breach
              costs of $7.4M per incident. Geographically, North America accounts for 38.51% of global microsegmentation
              revenue, aligning with Illumio's primary market concentration. Asia-Pacific is the fastest-growing region
              at 5.31% CAGR. Large enterprises account for 61.32% of market demand; software-based deployments for
              67.19% by revenue and cloud-hosted deployments for 58.43%, all of which align strongly with Illumio's
              product architecture.

              Multiple analyst sizing lenses produce different microsegmentation market estimates due to scope boundary
              choices (whether SD-WAN micro-segmentation overlays and network access control are included). Mordor
              Intelligence's $21.58B (2025) reflects the broadest defensible scope including software, hardware, and
              services. Narrower definitions limited to pure software-defined policy engines would produce substantially
              smaller TAM estimates. Given the absence of a dominant third-party sizing authority alongside Mordor,
              investors should weight the structural growth vector (22% CAGR) more heavily than the absolute size
              number, which carries ±30% methodological uncertainty.
