  productSummary: >-
    Illumio Core: on-premises and hybrid-cloud microsegmentation via Policy Compute Engine (PCE) and Virtual Enforcement
    Node (VEN) agents; real-time application dependency mapping; policy simulation mode; ransomware containment
    workloads. Illumio CloudSecure: agentless cloud-native workload segmentation for AWS, Azure, and GCP using native
    cloud security-group enforcement. Illumio Endpoint: endpoint segmentation for Windows and macOS devices. All
    products share a unified Illumio console; sold as annual subscription licences bundled with professional services
    and technical account management.
  customerFocus: >-
    Global 2000 enterprises and regulated industries; strongest in financial services (25% of customer base), healthcare
    and life sciences, US federal government (FedRAMP Moderate authorised), manufacturing, and critical infrastructure.
