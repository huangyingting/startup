      - number: '2.5'
        title: Exhibits
        blocks:
          - type: callout
            title: Microsegmentation CAGR Is 2× the Parent Market—Structural, Not Cyclical
            body: >-
              The microsegmentation market (22.34% CAGR) is growing at roughly twice the pace of the parent Network
              Security category (11.28% CAGR) and ahead of the full Zero Trust Security market (16.07%). This structural
              outperformance reflects the fundamental architectural shift from perimeter-centric to workload-centric
              security—once an organization commits to hybrid multi-cloud, VLAN-based segmentation cannot follow
              workloads and must be replaced. The CAGR delta is a strong indicator that Illumio is in a secular market
              transition rather than cyclical spending uptick.
            calloutType: insight
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM039
          - type: callout
            title: Regulatory Mandates Create Non-Discretionary Spending Floors
            body: >-
              OMB M-22-09 (U.S. federal, FY2024 deadline), CISA ZTMM v2.0 (microsegmentation as Advanced maturity
              requirement), NIS2 (EU, October 2024 effective), and DORA (EU, January 2025 effective) collectively
              mandate workload segmentation as a required operational resilience control across federal agencies,
              European financial services, and critical infrastructure. This regulatory engine converts what would
              otherwise be a discretionary security investment into compliance spending—structurally more durable than
              ROI-driven security budgets during economic downturns.
            calloutType: strength
            claimRefs:
              - CM016
              - CM017
              - CM018
              - CM028
              - CM029
          - type: callout
            title: SASE Platforms Bundling Basic Segmentation Threatens Standalone ZTS Positioning
            body: >-
              Zscaler, Palo Alto Networks Prisma Access, and Cisco Umbrella increasingly bundle
              microsegmentation-adjacent capabilities (ZTNA policy enforcement, basic workload isolation) within
              SASE/SSE platform contracts. As enterprises prioritize tool consolidation (69% reporting sprawl concerns)
              and as SASE contract values grow, mid-market buyers may accept bundled segmentation rather than investing
              in a dedicated ZTS vendor. Illumio must demonstrate that its application-aware policy granularity,
              multi-cloud agnosticism, and AI security graph provide meaningfully superior outcomes over bundled
              segmentation—a differentiation argument that becomes harder as SASE vendors invest in workload security
              features.
            calloutType: risk
            claimRefs:
