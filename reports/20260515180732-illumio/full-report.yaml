      - number: '6.4'
        title: Expansion, Concentration, and Channel Dynamics
        blocks:
          - type: paragraph
            body: >
              Illumio's land-and-expand model is evident across named accounts. Initial deployments typically begin with
              a single high-priority application environment (e.g., PCI cardholder data environment or a single hospital
              network segment) and expand to additional environments as internal teams gain confidence with the PCE and
              Illumination Map. NHS England's deployment has expanded across multiple NHS Trusts beyond the initial
              pilot. Financial services customers report staged rollouts from initial ring-fencing projects to broader
              data-centre-wide microsegmentation. Expansion within customers is commercially validated by the Illumio
              AMS managed service model, which captures additional deployment scope under a recurring services revenue
              line. Customer concentration risk is moderate but not severe: with ~1,000 customers, no single account
              should constitute more than two to three percent of revenue if the portfolio is reasonably distributed,
              though this is not publicly confirmed. The NHS England relationship is the highest-visibility single
              government customer and represents headline concentration risk in the healthcare vertical. Channel
              dynamics: Illumio distributes through a network of value-added resellers (CDW, Presidio) and systems
              integrators (Deloitte, KPMG, Accenture) who provide deployment services alongside the Illumio licence.
              Deloitte Netherlands and Illumio co-published a DORA compliance offering in April 2026 targeting EU
              financial institutions. The AWS Marketplace and Azure Marketplace listings provide cloud-native
              procurement paths reducing friction for cloud-first enterprise buyers. The channel mix provides geographic
              reach (Deloitte's global footprint, KPMG) and sector depth (Presidio's enterprise network specialisation).
              Partners also provide a pipeline of professional services revenue that supplements Illumio's SaaS licence
              ARR with non-recurring implementation revenue. Win/loss signals suggest competitive losses to Zscaler
              primarily in cloud-native-only deployments, and to CrowdStrike in accounts that prioritise XDR endpoint
              detection over microsegmentation. Illumio wins most consistently in regulated hybrid environments where
