    sections:
      - number: '1.1'
        title: Identity, Founding, and Mission
        blocks:
          - type: paragraph
            body: >
              Illumio was founded in 2013 in Sunnyvale, California, by Andrew Rubin (CEO) and PJ Kirner, originally
              under the Zero Trust Segmentation banner. As of 2026, the company has repositioned its brand as "The
              Breach Containment Company," reflecting an expansion from purely policy-driven microsegmentation to a
              broader platform encompassing AI-powered detection, response, and containment. The company's core thesis
              is that breaches are inevitable and that the only path to cyber resilience is containing lateral movement
              before it becomes a catastrophe. Illumio's products include Illumio Segmentation (cloud and network breach
              containment) and Illumio Insights (hybrid cloud detection and response), both delivered via a unified,
              cloud-native platform. The company is headquartered at 920 De Guigne Dr, Sunnyvale, California 94085, and
              operates globally across North America, Europe, Asia Pacific, and the Middle East. Illumio describes
              itself as the world's first breach containment platform, asserting primacy in an emerging market category
              it helped define. The company has been operational for over a decade, deploying across some of the world's
              largest enterprises, with notable named customers including Microsoft (for whom the CISO stated Illumio
              was "the only segmentation solution that would work at the scale of Microsoft"), Citi, HSBC, Salesforce,
              eBay, Cathay Pacific, Marriott Vacations Worldwide, QBE Insurance, ServiceNow, and Western Union.
