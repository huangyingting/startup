      - number: '8.2'
        title: Valuation Context and Comparable Analysis
        blocks:
          - type: paragraph
            body: >
              Illumio's valuation must be assessed against both public cybersecurity SaaS comparables and private market
              benchmarks. At the peer set median of 8-12x NTM ARR in early 2026, a $2.75B entry valuation implies
              Illumio has grown its ARR to at least $230-340M from the estimated $110-183M at Series G (implied at peak
              2021 multiples of 15-25x). This is achievable under a 15% CAGR assumption ($200-350M range by 2026) but is
              not independently confirmed.

              The public comparable set provides useful reference points. Zscaler (ARR approx. $2.5B, EV approx. $25B,
              NTM approx. 8x) illustrates post-ZIRP multiple compression for cybersecurity SaaS leaders. Palo Alto
              Networks ($9.2B revenue, NTM approx. 14x) commands a platform premium. CrowdStrike (ARR approx. $4.2B, NTM
              approx. 19x) trades at the high end due to exceptional growth and NRR. SentinelOne (ARR approx. $1.1B, NTM
              approx. 14x) is the closest public comp to Illumio by ARR scale. Among private comps, Claroty raised $400M
              at a $2.5B valuation in 2021 and is often cited alongside Illumio. The Wiz $32B Google acquisition set a
              benchmark for ZT cloud security scale, though Wiz's cloud-native architecture and growth profile differ
              materially.

              At the Meritech and BVP Cloud benchmarks, enterprise cybersecurity SaaS companies growing 15-25% trade at
              a median EV/ARR of 8-12x, with top-quartile performers (above 25% growth, above 110% NRR) reaching 14-18x.
              Illumio's entry at $2.75B implies approximately 10x estimated ARR, squarely in the market-appropriate
              range for a mid-growth regulated SaaS business, but offering no deep-value discount for the illiquidity
              and diligence uncertainty.
