          - type: callout
            title: The Regulatory Tailwind Play Is the Most Durable Thesis Element
            body: >
              DORA Article 9 (EU financial services, effective January 2025), FedRAMP Zero Trust requirements (US
              federal), ASD Essential Eight (Australia), and NCSC ZTA guidance (UK) create a compliance demand cycle
              independent of competitive platform dynamics. An investor positioned in Illumio through the 2025-2026 DORA
              audit cycle benefits from predictable regulatory demand regardless of CrowdStrike or Palo Alto competitive
              pressure.
            calloutType: insight
