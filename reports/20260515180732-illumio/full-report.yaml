      - number: '7.2'
        title: Competitive Displacement and Technical Risks
        blocks:
          - type: paragraph
            body: >
              Platform consolidation is Illumio's most material long-term competitive risk. Three major security
              platforms — CrowdStrike Falcon, Palo Alto Prisma Cloud, and Zscaler ZPA — have embedded
              microsegmentation-adjacent capabilities, allowing enterprise buyers to consolidate lateral movement
              controls within an existing platform relationship rather than adopting a standalone point solution.
              Cisco's acquisition of Isovalent (eBPF cloud-native networking) in December 2023 signals Cisco's intent to
              build cloud-native microsegmentation into its security platform, further compressing Illumio's addressable
              cloud-native segment. VMware NSX provides native hypervisor-level microsegmentation for vSphere
              environments and holds a patent portfolio that could assert over agentless hypervisor approaches. AWS VPC
              Lattice provides native service-to-service connectivity and segmentation controls in AWS-native
              architectures, directly competing in greenfield cloud deployments. The Microsoft-CrowdStrike kernel
              controversy (July 2024) elevated regulatory and customer scrutiny of kernel-mode security agents, creating
              pressure to reduce OS-level dependencies. Illumio's VEN operates at the OS network stack (iptables,
              nftables, Windows Filtering Platform), making it vulnerable to kernel-API stability changes. Open-source
              eBPF tools (Cilium, Tetragon) are gaining enterprise adoption and may commoditize basic workload
              segmentation in cloud-native environments. Illumio's AI policy generation (AEN Early Access) expands the
              attack surface via potential LLM adversarial policy injection. The Gartner Market Guide confirms
              competitive intensity with CrowdStrike, Guardicore/Akamai, and Trellix as Representative Vendors.
