companyProfile:
  summary: >-
    Illumio was founded in 2013 in Sunnyvale, California, by Andrew Rubin (CEO) and PJ Kirner (CTO, former VMware) to
    solve lateral-movement risk in enterprise networks. The company invented the Adaptive Security Platform (ASP), which
    uses a distributed Policy Compute Engine (PCE) and lightweight VEN agents to enforce granular workload-to- workload
    segmentation policies without requiring network hardware changes. Illumio has raised approximately $930 million
    across seven funding rounds and was last valued at $3 billion in a 2024 Warburg Pincus-led growth round. The company
    serves more than 1,000 enterprise customers in financial services, healthcare, government, and critical
    infrastructure, and holds a recognised Gartner Leader and Forrester Leader position in the microsegmentation
    category it pioneered.
