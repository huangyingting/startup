  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Module Map
        blocks:
          - type: paragraph
            body: >
              Illumio delivers Zero Trust Segmentation through three core products sharing a unified label taxonomy and
              PCE REST API. Illumio Segmentation — formerly Illumio Core — combines the Policy Compute Engine (PCE) with
              Virtual Enforcement Node (VEN) agents and the Illumination Map to deliver real-time workload visibility
              and enforced microsegmentation across physical servers, virtual machines, containers, cloud instances, and
              endpoint devices. The PCE serves as the central control plane: it stores workload labels (environment,
              application, role, location), compiles label-based policy rules into OS-native firewall rule sets,
              distributes them to VEN agents over TLS-encrypted channels, and provides the REST API, web console, RBAC,
              and audit logging used by security and compliance teams. The VEN is a lightweight software agent installed
              on each protected workload that enforces PCE-issued rules using the OS-native firewall without sitting in
              the traffic path. Illumio Insights (previously CloudSecure) extends the platform agentlessly into AWS,
              Azure, and GCP by ingesting native cloud telemetry and applying ML-based policy recommendations. Illumio
              Endpoint applies the same VEN enforcement model to managed laptops and desktops, completing east-west
              coverage from user device to application workload. The PCE is available as a cloud-hosted SaaS offering or
              as a customer-hosted on-premises deployment, including air-gapped configurations for classified and
              regulated environments.
