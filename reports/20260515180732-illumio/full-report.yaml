  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >-
              Illumio's primary competitive arena is the Zero Trust Segmentation (ZTS) and microsegmentation software
              market—solutions that enforce granular, identity- and application-aware network policies at the individual
              workload level to prevent lateral movement and contain breach blast radius. Unlike perimeter-based
              controls that protect network edges, microsegmentation operates inside the network, creating
              software-defined policy boundaries between workloads, application tiers, and data stores regardless of
              physical or virtual location. Illumio specifically focuses on host-agent and API-based segmentation,
              applying policy through its Policy Compute Engine (PCE) without requiring hardware changes or dedicated
              network appliances.

              The microsegmentation market is formally distinct from but overlapping with: Zero Trust Network Access
              (ZTNA), which governs identity-centric user-to-application connectivity rather than workload-to-workload
              communication; Secure Access Service Edge (SASE), which bundles edge security (SSE) with SD-WAN and
              includes only basic segmentation capabilities; and Network Detection and Response (NDR), which detects
              lateral movement but does not enforce policy to prevent it. Cloud Security Posture Management (CSPM) and
              Cloud Workload Protection Platforms (CWPP) are adjacent markets that overlap with Illumio's CloudSecure
              module for IaaS visibility but do not provide the East-West traffic segmentation that defines ZTS.

              Status-quo substitutes that Illumio displaces include: VLAN-based segmentation using traditional firewalls
              (complex to manage, cannot follow workloads to cloud), hardware network segmentation appliances
              (inflexible, datacenter-only), SD-WAN with basic micro-segmentation overlays (limited
              application-awareness), and flat network architectures relying purely on perimeter defenses. The
              organizational spend excluded from Illumio's direct TAM includes Identity and Access Management (IAM),
              endpoint detection and response (EDR), SIEM, email security, and hardware firewall appliances—all adjacent
              but non-competing with workload segmentation.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
