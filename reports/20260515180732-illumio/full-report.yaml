        title: Customer Segmentation, Use Cases, and Vertical Depth
        blocks:
          - type: paragraph
            body: >
              Illumio's customer base is concentrated in regulated industries where network microsegmentation delivers
              compulsory compliance outcomes, not merely optional security uplift. Financial services is the largest
              single vertical, accounting for the majority of the Fortune 100 customer cohort; use cases centre on
              PCI-DSS cardholder data environment isolation, SOX application separation, and SWIFT boundary enforcement.
              Healthcare is the second-largest vertical, driven by HIPAA PHI isolation requirements and the acute
              ransomware risk profile of hospital networks; NHS England represents the most visible reference
              deployment, with Illumio deployed across multiple NHS Trusts to provide ransomware containment and support
              NHS DSPT compliance obligations. Government and defence accounts for a meaningful but less publicly
              documented segment; Illumio's FedRAMP Moderate authorisation and Common Criteria EAL2 certification are
              prerequisite for US federal agency procurement, and the USAF is cited indirectly in public materials.
              Technology and SaaS companies (Salesforce, eBay, ServiceNow) represent a fourth segment where
              microsegmentation addresses cloud workload isolation and insider-threat containment. Insurance and
              aviation round out the named customer cohort. Use cases map broadly to four categories: ransomware
              containment (isolation of compromised workloads to prevent lateral movement), regulatory compliance
              boundary enforcement (PCI, HIPAA, DORA), cloud workload visibility and east-west traffic monitoring, and
              endpoint-to-application zero trust. Illumio's Healthcare AMS (Advanced Microsegmentation Service) is a
              managed-service variant targeting NHS and US hospital networks where internal security operations capacity
              is limited; this reflects a distinct go-to-market motion for resource-constrained buyers.
