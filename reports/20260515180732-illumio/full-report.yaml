      - number: '5.3'
        title: Deployment, Integration, and Customer Workflow
        blocks:
          - type: paragraph
            body: >
              Illumio's deployment model is designed for minimal disruption through a phased approach. VEN agents are
              first deployed in discovery mode, where they collect traffic telemetry without enforcing any rules —
              allowing the Illumination Map to build a complete picture of application flows before any enforcement
              occurs. Security teams then label workloads in the PCE, draft segmentation policies, validate them in
              simulation mode (which predicts block lists without activating enforcement), and incrementally switch
              workloads to enforce mode. This workflow typically reduces time to first segmentation policy to days or
              weeks, with broader coverage expanding over months. Air-gapped deployments are supported for on-premises
              PCE in isolated networks, including classified government environments. The integration surface covers
              ServiceNow for ticketing automation, Splunk and IBM QRadar for SIEM event forwarding, HashiCorp Terraform
              for policy-as-code and IaC automation, and Kubernetes admission controllers for dynamic container workload
              registration. VEN upgrades are orchestrated by the PCE and support rolling upgrades across a managed
              workload fleet without application downtime. The developer portal provides a full OpenAPI specification
              for the PCE REST API, enabling custom integrations. Illumio's go-to-market includes direct enterprise
              sales alongside channel partners — Deloitte, KPMG, Presidio, and CDW — providing deployment services for
              large enterprise rollouts.
