  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risks
        blocks:
          - type: paragraph
            body: >
              Illumio's regulatory and legal risk profile is shaped by five overlapping obligation sets. First, FedRAMP
              Moderate authorization for Illumio Core enables federal sales but imposes continuous monitoring
              requirements and a pending Rev 5 baseline transition; failure to complete the transition by the FedRAMP
              PMO deadline would jeopardize the authorization and approximately 15% of estimated ARR from federal sector
              customers. Second, EU NIS2 (effective October 2024) and DORA (effective January 2025) mandate network
              segmentation for essential entities and EU financial sector firms respectively, creating both compliance
              demand for Illumio and ongoing obligation risk if Illumio's own product compliance posture gaps emerge.
              Third, GDPR Article 25 data-protection-by-design interpretation drives EU enterprise demand and creates
              data residency obligations for PCE SaaS multi-tenant deployments. Fourth, BIS Export Administration
              Regulations impose ECCN-based export license requirements for cybersecurity items; Illumio's specific
              classification under EAR is unconfirmed, representing a latent compliance risk for APAC and
              restricted-nation sales. Fifth, the US National Cybersecurity Strategy (2023) and OMB M-22-09 zero trust
              mandate sustain federal demand but also impose compliance obligations on Illumio's federal customers that
              can delay or constrain procurement cycles. The Australian ASD Essential Eight and UK NCSC ZTA guidance
              extend these obligations to APAC and UK government sectors. No active litigation or patent assertion
              against Illumio is publicly known, but VMware NSX and Cisco hold broad microsegmentation- adjacent patent
              portfolios that represent a latent assertion risk.
