      - number: '6.3'
        title: Retention, Satisfaction, and Renewal Evidence
        blocks:
          - type: paragraph
            body: >
              Illumio does not publicly disclose net revenue retention (NRR) or gross revenue retention (GRR) rates;
              these are the most critical unresolved evidence gaps in customer analysis. Available proxy signals are
              encouraging: Gartner Peer Insights for Network Security Microsegmentation shows Illumio with an overall
              rating of 4.6 out of 5.0 from 150+ enterprise reviews as of 2025, with 93 percent of reviewers
              recommending the product. G2 aggregate ratings place Illumio at 4.5 out of 5.0 across 70+ reviews. Peer
              review themes consistently highlight the Illumination Map's network visibility as a top strength, followed
              by ransomware containment effectiveness and policy accuracy. The primary complaint themes across platforms
              are deployment complexity (agent installation overhead, VEN management at scale), initial policy
              configuration learning curve, and high licence costs relative to comparable firewall-native approaches.
              Several Gartner Peer Insights reviews from financial services and healthcare institutions specifically
              mention successful multi-year renewals and expanded deployments — a qualitative signal of retention. No
              public evidence of named customer churn has been identified. Contractual renewal evidence from the NHS
              England deployment suggests ongoing commitment: NHS organisations have been documented in UK government
              procurement records as extending Illumio engagement beyond initial deployment phases, consistent with a
              land-and-renew pattern. Analyst commentary (Forrester Wave 2024, Gartner Peer Insights Voice of the
              Customer 2026) characterises Illumio's customer satisfaction as above-industry-average for the
              microsegmentation segment. The absence of any public NRR disclosure is a material gap that prevents
              precise durability assessment; diligence should request cohort retention data under NDA.
