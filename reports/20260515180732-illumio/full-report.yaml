  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Enterprise Customer Base and Named Deployments
        blocks:
          - type: paragraph
            body: >
              Illumio's customer base comprises approximately 1,000 enterprise organizations globally as of May 2026,
              with representation in more than 40 of the Fortune 100 and over 15 of the Fortune 500 financial services
              firms. The company's website and resource center publish a curated set of named customer case studies and
              logos, concentrated in financial services, healthcare, government and defence, and large technology firms.
              The most prominent publicly named customers include NHS England (UK National Health Service), which
              deployed Illumio Core across NHS Trusts for ransomware containment and DSPT compliance; Bank of America,
              Morgan Stanley, and Citi (US financial institutions); Lufthansa Group (aviation/logistics); Salesforce and
              eBay (technology); QBE Insurance (insurance); and Western Union (financial services). Several government
              and defence customers are referenced but not named in public materials due to classification constraints.
              Illumio's CISO reference programme has produced documented executive testimonials from Microsoft CISO Bret
              Arsenault, who stated Illumio was "the only segmentation solution that would work at the scale of
              Microsoft," and from senior security leaders at HSBC, Cathay Pacific, Marriott Vacations Worldwide, and
              ServiceNow. The enterprise focus is deliberate — Illumio targets organisations with hybrid multi-cloud
              workload estates of 500+ workloads where legacy firewall perimeter approaches are inadequate. Average deal
              sizes and total contract values are not publicly disclosed but are estimated by analysts to be in the
              six-figure annual recurring revenue range for mid-market enterprise accounts and seven-figure for global
              financial institutions and NHS-scale deployments. The company's 40+ Fortune 100 penetration figure is
