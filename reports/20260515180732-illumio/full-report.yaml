  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Architecture
        blocks:
          - type: paragraph
            body: >
              Illumio's revenue model is anchored on a per-workload annual subscription SaaS paradigm, positioning the
              company within the enterprise security SaaS category. The core product — Illumio Segmentation — is
              licensed on a per-managed-endpoint (workload) basis, meaning pricing scales with the number of servers,
              virtual machines, containers, and cloud instances placed under policy control. This workload-centric unit
              creates natural land-and-expand dynamics: an initial enterprise deal typically secures protection for a
              defined workload scope, with revenue growing as customers onboard additional data centers, cloud regions,
              and application tiers. The second product, Illumio Insights (AI-powered cloud detection and response),
              adds a billable module that can be sold as a stand-alone offering or bundled with Segmentation, creating
              upward average contract value (ACV) expansion potential. Professional services — including implementation,
              policy design consulting, and managed services — generate services revenue alongside the subscription
              line. Illumio's software-only architecture keeps COGS low relative to hybrid or hardware-dependent
              security vendors. The company also sells via AWS and Microsoft Azure Marketplace, and operates a reseller
              channel through Deloitte, CDW, and Presidio that amplifies direct enterprise field sales. No publicly
              disclosed list pricing or revenue split between subscription and services has been confirmed as of May
              2026; all pricing estimates in this chapter are derived from industry benchmarks and competitor analysis.
              The absence of official pricing pages means realized ACV is based on third-party reporting and market
              inference only.
