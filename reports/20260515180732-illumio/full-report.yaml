      - number: '5.4'
        title: Technology Differentiation and IP
        blocks:
          - type: paragraph
            body: >
              Illumio's technology differentiation rests on five pillars. First, kernel-level enforcement with no
              data-path proxy — unlike solutions requiring agent proxies or in-line hardware, the VEN uses OS-native
              firewall APIs, delivering security without latency or throughput overhead. Second, label-based policy
              persistence — policies are expressed as logical workload attribute pairs (environment, application, role,
              location), decoupled from IP addresses; this makes policies cloud-portable and stable across container
              restarts and cloud migrations. Third, the Illumination Map, a patent-pending real-time dependency
              visualization that maps every workload communication as it occurs, claimed to reduce policy design time by
              up to 80 percent. Fourth, comprehensive OS coverage — support for AIX, Solaris, macOS, and legacy Windows
              Server versions in addition to modern Linux and Windows is a material differentiator against
              cloud-native-only competitors. Fifth, AI-assisted policy generation — Illumio's emerging ML engine
              analyzes observed traffic patterns and recommends segmentation rules, reducing the manual policy-authoring
              burden that has historically slowed enterprise adoption. FedRAMP Moderate authorization and Common
              Criteria EAL2 certification differentiate Illumio in US federal and defense markets where regulatory
              procurement requirements are binding. The OpenAPI specification and developer portal signal an API-first
              architecture enabling integrations at scale across the enterprise security ecosystem.
