  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              The investment thesis for Illumio is built on three durable pillars. First, Illumio occupies the category
              leadership position in enterprise microsegmentation, a market growing at 20%+ CAGR driven by Zero Trust
              mandates, breach-containment regulations (DORA, FedRAMP, NIS2), and ransomware insurance requirements.
              Gartner forecasts global information security spending to exceed $212 billion in 2025, with network
              segmentation among the fastest-growing line items. Second, Illumio's PCE-and-VEN architecture enforces
              workload-level Zero Trust across heterogeneous environments including legacy OS (AIX, SPARC, legacy
              Windows) that cloud-native security tools cannot instrument, creating a multi-year moat in regulated
              hybrid environments. FedRAMP Moderate authorization locks in US federal procurement, while DORA Article 9
              creates a structural EU financial services demand driver. Third, the Forrester Wave named Illumio Leader
              in Microsegmentation Q3 2024, and the company has passed 1,000 enterprise customers, signalling strong
              adoption in the Fortune 500 regulated vertical.

              The anti-thesis rests on platform consolidation risk. CrowdStrike Falcon, Palo Alto Prisma Cloud, and
              Zscaler ZPA are embedding microsegmentation-adjacent capabilities into larger XDR/SASE/CNAPP platforms.
              Enterprise CISOs under budget pressure prefer platform vendors over point solutions. If Illumio fails to
              credibly expand its platform narrative, standalone ZTS market share could erode even as the regulatory
              demand tailwind persists. Cisco's acquisition of Isovalent and native AWS VPC Lattice features
              specifically threaten the cloud-native-first accounts. The swing factor is whether regulated hybrid
              environments (government, financial services, healthcare, critical infrastructure) constitute a large and
              loyal enough segment to sustain Illumio independently for a 3-5 year investment horizon.
            claimRefs:
              - CV011
              - CV012
              - CV013
              - CV014
              - CV015
              - CV026
              - CV027
