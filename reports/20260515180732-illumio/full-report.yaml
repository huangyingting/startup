            title: Conditional Interest at $2.75B — Data Room Required Before Commitment
            body: >
              At $2.75B (November 2021 Series G), entry is FAIR for the base case but carries 30-45% downside in the
              bear case. The 4.5-year funding gap and absent ARR disclosure make precision impossible without data-room
              access. Probability-weighted EV of approximately $2.8B implies a narrow margin above entry; negotiating to
              $2.5B entry would materially improve risk-adjusted returns. Risk rating is HIGH. Do not commit without
              resolving all five P0/P1 diligence gates.
            calloutType: recommendation
