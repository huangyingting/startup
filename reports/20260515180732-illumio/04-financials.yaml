  evidenceGaps:
    - id: GI001
      topic: funding-freshness
      description: >
        No public evidence of new financing rounds, strategic acquisitions, or new institutional
        investor relationships in 2025 or 2026 has been identified. Press coverage, SEC EDGAR
        Form D searches, and Crunchbase monitoring as of May 2026 show no capital events post
        the November 2021 Series G. The absence of public signals does not definitively confirm
        that no private financing or secondary transactions have occurred.
      diligencePath: >
        Monitor Crunchbase, SEC Form D EDGAR filings (CIK 1524531), and financial press for new
        capital events; request directly from management and counsel during formal diligence;
        obtain representations and warranties on material financing events since November 2021.
      relatedQuestionRefs:
        - QI017
      relatedTableRefs:
        - TI004

    - id: GI002
      topic: arr-disclosure
      description: >
        Illumio has never publicly disclosed Annual Recurring Revenue, total revenue, or any
        financial guidance. The most recent implied ARR data point is derived indirectly from the
        November 2021 Series G valuation of $2.75 billion. Without a disclosed ARR baseline,
        growth rate, and cohort composition, underwriting the revenue quality and growth trajectory
        thesis is not possible with acceptable confidence.
      diligencePath: >
        Request audited annual financial statements (income statement, balance sheet, cash flow)
        for fiscal years 2022–2025 under NDA; request ARR schedule broken down by product line
        (Segmentation vs Insights), customer segment, and geography; obtain retention waterfall
        by vintage cohort from CFO.
      relatedQuestionRefs:
        - QI004
        - QI008
      relatedTableRefs:
        - TI005

    - id: GI003
      topic: unit-economics
      description: >
        Key unit economics — gross margin, NRR, CAC, CAC payback, and ACV distribution — are
        entirely unverifiable from public sources. All values in the unit economics table are
        estimated from third-party benchmarks. The wide uncertainty ranges on each metric mean
        the financial model for Illumio rests on benchmark inferences rather than disclosed data.
      diligencePath: >
        Request gross margin breakdown by product line (subscription vs services) under NDA;
        obtain NRR by cohort vintage (annual for last 4 years); request CAC by segment and
        payback period calculation; obtain ACV percentile distribution and deal size histogram.
      relatedQuestionRefs:
        - QI007
        - QI006
      relatedTableRefs:
        - TI003

    - id: GI004
      topic: capital-adequacy
      description: >
        Cash balance, monthly burn rate, and working capital position are not publicly disclosed.
        The estimated runway range of 2–7 years from May 2026 is too wide to be actionable for
        investment decisions. The company's profitability trajectory and free cash flow generation
        capacity are entirely opaque. Without a bank statement or audited cash flow statement,
        the capital adequacy assessment carries very low confidence.
      diligencePath: >
        Request monthly bank statements and board-level management accounts for the most recent
        12 months; obtain CFO-certified cash position as of the most recent quarter; request
        forward budget and cash flow projections for fiscal 2026 and 2027; confirm existence and
        terms of any debt facilities, credit lines, or convertible instruments.
      relatedQuestionRefs:
        - QI006
        - QI017
      relatedTableRefs:
        - TI004
        - TI005

acknowledgedWarnings:
  - dimension: paywallRisk
    reason: >
      SI015 (Wall Street Journal) is behind a paywall and SI012 (PRNewswire microsegmentation
      market report) and SI025 (SecurityWeek cybersecurity funding 2024) return HTTP errors.
      These three restricted sources collectively represent 12 percent of chapter sources,
      well below the 30 percent report-level ceiling. All paywall and broken-access sources
      corroborate facts that are independently supported by multiple accessible ok-status sources
      (SI001, SI013, SI014, SI016, SI017, SI024 all confirm the Series G at the same valuation).
      SI025 is the sole adverse-stance source and is cited only for the general funding environment
      observation, which is also corroborated by SI022 and SI009.
  - dimension: unverifiedSource
    reason: >
      SI012 and SI025 have broken accessStatus and could not be fully read during the research
      phase. SI015 is paywalled. Claims citing these sources are also corroborated by
      accessible primary sources (SI013 official press release, SI024 SEC filing) and are
      not uniquely dependent on the restricted sources. No claim in this chapter rests solely
      on a broken or paywalled source.
