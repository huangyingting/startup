  - id: capital-adequacy
    title: Capital Adequacy and Funding Position
    body: >
      Illumio's capital position centers on its November 2021 Series G financing of $225 million,
      led by Franklin Templeton with participation from JPMorgan Asset Management, Battery Ventures,
      and Andreessen Horowitz (a16z), at a $2.75 billion post-money valuation. This round
      represented the company's most recent external capital infusion as of May 2026 — a span of
      approximately 4.5 years with no disclosed follow-on raise. The SEC Form D filed for the 2021
      Series G (Edgar CIK 1524531) confirms the raise; no subsequent Form D filings for a new equity
      round have been identified. Prior rounds include a $225 million Series F in June 2021 led by
      Thoma Bravo, a $100 million Series C in 2015, a $125 million Series D in 2017, and a $65
      million Series E in 2019 — total disclosed venture funding of approximately $557 million.
      Based on headcount and industry benchmarks, annual cash burn is estimated at $20–50 million
      per year, implying 3–8 years of runway from the Series G close depending on actual burn rate.
      The wide range of this estimate is itself a diligence blocker. The absence of new capital
      raises since late 2021 may reflect either (a) cash flow approaching break-even after
      aggressive growth investment, (b) a deliberate decision to preserve the $2.75 billion
      valuation rather than raise at a lower multiple in the 2022–2025 compressed-valuation
      environment, or (c) difficulty raising at the prior valuation given post-2021 multiple
      compression for private cybersecurity SaaS companies. No debt facilities, convertible notes,
      or project finance obligations are publicly visible. Franklin Templeton's participation as a
      crossover investor signals pre-IPO positioning, though no S-1 or IPO registration has been
      filed with the SEC as of May 2026.
