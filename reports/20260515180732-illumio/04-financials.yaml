  - id: unit-economics
    title: Unit Economics and GTM Efficiency
    body: >
      Without public financial disclosures, Illumio's unit economics must be inferred from industry
      benchmarks, comparable enterprise security SaaS companies, and structural features of the
      business model. The per-workload subscription model implies an average contract value (ACV)
      in the $350,000–$700,000 range for mid-market enterprise deployments and $1 million or more
      for large-enterprise accounts — consistent with Bessemer Venture Partners' Cloud benchmarks
      for enterprise security SaaS at this scale. Gross margin is estimated at 75–82 percent,
      driven by the software-only delivery architecture, which eliminates hardware and manufacturing
      costs from COGS entirely; the primary cost components are cloud infrastructure, customer
      success staffing, and support personnel. Net revenue retention (NRR) is estimated at
      110–125 percent based on structural features of the deployment model: deep workload policy
      maps create high switching costs, land-and-expand dynamics as customers migrate workloads to
      cloud increase total workload count organically, and the Insights module provides an upsell
      lever on existing accounts. Sales and marketing expense is estimated at 25–35 percent of
      revenue, reflecting the high-touch, long sales cycle (estimated six to twelve months) typical
      of Fortune 500 cybersecurity deployments. R&D expense is similarly estimated at 25–35 percent
      of revenue, consistent with the investment needed to maintain platform currency across a
      rapidly evolving multi-cloud landscape. Customer acquisition cost (CAC) and payback period
      are not disclosed; estimated payback of 12–18 months is based on enterprise security SaaS
      benchmarks from Bessemer, OpenView, and Battery Ventures research — none of which cite
      Illumio-specific data. All unit economics estimates carry low-to-medium confidence and must
      be resolved through direct diligence under NDA.
    claimRefs:
      - CI009
      - CI010
      - CI019
      - CI020
      - CI025
      - CI033
    tableRefs:
      - TI003
    figureRefs:
      - FI002

  - id: cost-structure
    title: Cost Structure and Margin Analysis
    body: >
      Illumio's cost structure benefits from its software-only product architecture, which
      materially reduces capital intensity relative to hybrid or hardware-dependent security
      vendors. The primary cost line is the total compensation base for approximately 896
      employees (as of May 2026), spanning engineering, sales, and customer success functions.
      COGS consists primarily of cloud infrastructure for the Illumio platform, support engineers,
      and professional services delivery labor; no hardware manufacturing, physical appliance
      inventory, or logistics costs are present. The estimated gross margin of 75–82 percent
      is consistent with enterprise security SaaS benchmarks from the Bessemer Cloud Index and
      OpenView benchmarks, and reflects the low marginal cost of adding new customers on an
      existing software platform. R&D investment (estimated 25–35 percent of revenue) is critical
      for maintaining competitive product differentiation against Cisco Secure Workload, Zscaler
      Zero Trust Segmentation, and Palo Alto Networks Prisma Cloud. Sales and marketing spend is
      elevated — estimated at 25–35 percent of revenue — reflecting the company's direct enterprise
      sales model and the cost of maintaining a field sales organization capable of closing large
      multi-hundred-thousand-dollar deals. The combination of high R&D and elevated S&M spend means
      Illumio likely operates at a substantial operating loss, with the path to profitability
      contingent on either significant ARR growth, deliberate cost rationalization, or both.
      The Rule of 40 score — defined as ARR growth rate plus free cash flow margin — cannot be
      assessed without disclosed financials. Capital expenditure is estimated to be minimal
      (sub-5 percent of revenue) given the absence of hardware manufacturing, physical
      infrastructure ownership, or facility-intensive operations.
