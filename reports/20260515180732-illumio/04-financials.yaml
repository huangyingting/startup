company:
  name: Illumio

chapter:
  number: 4
  title: Financials
  summary: >
    Illumio is a private, late-stage enterprise SaaS company whose last disclosed financing was a
    $225 million Series G in November 2021 at a $2.75 billion post-money valuation — 4.5 years
    before this report. The company has not publicly disclosed revenue, ARR, gross margin, net
    revenue retention, or cash burn. All financial metrics in this chapter are estimated from
    investor benchmarks, comparable enterprise security SaaS companies, and structural features
    of the per-workload subscription model. The revenue model anchors on annual per-workload
    subscriptions augmented by professional services, cloud-marketplace distribution, and a
    partner-led reseller channel. Gross margin is estimated at 75–82 percent, consistent with
    software-only delivery. Implied ARR for 2026 is estimated at $180–$400 million based on
    the $2.75 billion valuation and observed SaaS multiple compression. Capital adequacy appears
    sufficient on the basis of the $225 million Series G, but runway uncertainty is high given the
    wide estimated burn range of $20–50 million per year. The chapter closes with five critical
    diligence blockers that must be resolved before any underwriting decision: ARR, gross margin,
    NRR, burn rate, and customer concentration.

sections:
  - id: revenue-model
    title: Revenue Model and Pricing Architecture
    body: >
      Illumio's revenue model is anchored on a per-workload annual subscription SaaS paradigm,
      positioning the company within the enterprise security SaaS category. The core product —
      Illumio Segmentation — is licensed on a per-managed-endpoint (workload) basis, meaning
      pricing scales with the number of servers, virtual machines, containers, and cloud instances
      placed under policy control. This workload-centric unit creates natural land-and-expand
      dynamics: an initial enterprise deal typically secures protection for a defined workload
      scope, with revenue growing as customers onboard additional data centers, cloud regions,
      and application tiers. The second product, Illumio Insights (AI-powered cloud detection and
      response), adds a billable module that can be sold as a stand-alone offering or bundled with
      Segmentation, creating upward average contract value (ACV) expansion potential. Professional
      services — including implementation, policy design consulting, and managed services — generate
      services revenue alongside the subscription line. Illumio's software-only architecture keeps
      COGS low relative to hybrid or hardware-dependent security vendors. The company also sells
      via AWS and Microsoft Azure Marketplace, and operates a reseller channel through Deloitte,
      CDW, and Presidio that amplifies direct enterprise field sales. No publicly disclosed list
      pricing or revenue split between subscription and services has been confirmed as of May 2026;
      all pricing estimates in this chapter are derived from industry benchmarks and competitor
      analysis. The absence of official pricing pages means realized ACV is based on third-party
      reporting and market inference only.
    claimRefs:
      - CI003
      - CI004
      - CI005
      - CI022
      - CI023
      - CI024
      - CI029
