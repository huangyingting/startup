- id: TM004
  title: Growth drivers and constraints table
  columns:
  - Driver / Constraint
  - Direction
  - Timing
  - Implication for Illumio
  - Diligence Ask
  rows:
  - - Ransomware and lateral-movement threat escalation (29-min breakout)
    - Growth driver
    - Now, accelerating through 2028+
    - Direct ROI case for ZTS; shorter breakout times make segmentation a near-real-time defense necessity
    - Track Illumio's ROI/TCO claims; benchmark vs. IBM breach cost data in customer proposals
  - - OMB M-22-09 federal zero-trust mandate (FY2024 deadline)
    - Growth driver
    - Now—compliance deadline passed; enforcement ongoing
    - Creates non-discretionary federal procurement channel; CISA maturity model specifies microsegmentation at advanced tier
    - Verify Illumio FedRAMP authorization status; assess federal customer pipeline depth
  - - EU NIS2 (Oct 2024) and DORA (Jan 2025) regulatory mandates
    - Growth driver
    - Now—both directives effective
    - Mandatory operational resilience and incident reporting drives ZTS in European financial and critical infrastructure
      sectors
    - Verify Illumio's EU compliance documentation, DORA-readiness materials; confirm Deloitte Netherlands partnership scope
  - - Multi-cloud proliferation and hybrid architecture expansion
    - Growth driver
    - Now, structural through 2030+
    - Every net-new cloud workload creates a new segmentation policy requirement; CAGR of cloud workloads acts as a leading
      indicator for ZTS demand
    - Track AWS/Azure workload growth rates as proxy; assess Illumio CloudSecure adoption vs. on-prem Segmentation
  - - AI-powered attack escalation (89% increase in AI attacks, 2026)
    - Growth driver
    - Accelerating from 2025
    - AI attacks automate lateral movement at scale; Illumio's AI security graph is the primary response; creates competitive
      differentiation
    - Assess depth and novelty of Illumio AI graph vs. Akamai Guardicore and Cisco Secure Workload
  - - Cybersecurity tool consolidation (25+ tool sprawl)
    - Growth driver / mixed
    - Now, multi-year
    - Consolidation RFPs favor platforms with broad scope; benefits Illumio in enterprise platform deals but threatens standalone
      ZTS positioning if SASE includes segmentation
    - Monitor whether SASE vendors (Zscaler, Palo Alto) expand microseg capabilities sufficient for enterprise deals
  - - Implementation complexity and policy management burden
    - Adoption constraint
    - Multi-year
    - Extends sales cycles; increases PS attach rate; may favor simpler but less capable network-layer segmentation from incumbents
      like Cisco
    - Review Illumio average sales cycle, professional services attach rate, and time-to-value from customer references
  - - Cybersecurity talent shortage (74% reporting impact)
    - Adoption constraint
    - Structural through 2028+
    - Reduces ability of organizations to self-service complex label-based policy; favors automated or managed delivery models
    - Assess Illumio managed services offering, partner PS ecosystem, and AI policy automation maturity
  - - SASE/SSE bundled segmentation competition
    - Adoption constraint
    - Escalating from 2024+
    - Zscaler, Palo Alto Prisma, and Cisco Umbrella include basic micro-seg; 'good-enough' bundled seg may deflect mid-market
      deals
    - Track competitor microseg capability depth; monitor Illumio win/loss data in competitive deals with SASE incumbents
  notes: Drivers and constraints derived from CrowdStrike 2026 Global Threat Report, IBM Cost of Data Breach Report 2025,
    Verizon 2026 DBIR, Cybersecurity Insiders 2026 Cloud Security Report, OMB M-22-09, CISA ZTMM v2.0, and Illumio solution
    pages. Timing for EU mandates (NIS2, DORA) confirmed from official EU directive effective dates. U.S. federal mandates
    per OMB/CISA.
