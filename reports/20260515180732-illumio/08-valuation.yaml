  - id: s-scenarios
    title: "Bull / Base / Bear Scenario Analysis"
    body: >
      Scenario analysis is complicated by the absence of confirmed ARR and NRR data. All three
      scenarios assume the $2.75B entry price (November 2021 Series G) and a 2-3 year hold period
      ending in IPO or strategic M&A exit.

      Bear case ($1.5-2.0B exit EV, 7-8x ARR multiple): ARR growth decelerates below 10% due to
      platform consolidation and macro IT budget tightening. Multiple compresses to 7-8x on an ARR
      base of $180-220M. At this scenario, the $2.75B entry represents a 27% to 45% loss on a
      gross basis before dilution. The 4.5-year funding gap, if interpreted as an inability to
      raise above $2.75B in the 2022-2025 compressed multiple environment, is consistent with this
      scenario materialising. Probability estimate: 25%.

      Base case ($2.5-3.5B exit EV, 8-12x ARR): ARR grows at 15% CAGR to $250-300M by 2026.
      Multiple holds at 8-12x. At $2.75B entry, the base case implies a -9% to +27% gross return
      over a 2-3 year hold period. Probability estimate: 50%.

      Bull case ($4.0-6.0B exit EV, 12-18x ARR): ARR accelerates to 20%+ growth reaching
      $320-380M by FY2026. ARR disclosure triggers a multiple re-rating to 14-18x. A strategic
      acquisition by PANW or Cisco at a 20-30% M&A premium adds further upside. At $2.75B entry,
      the bull case implies a 45% to 120% gross return. Requires ARR confirmation from data room,
      evidence of NRR above 115%, and a favourable exit window. Probability estimate: 25%.
    claimRefs:
