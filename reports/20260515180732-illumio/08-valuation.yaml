  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: illumio-arr-disclosure
      missingEvidence: >
        Illumio ARR and NRR as of most recent fiscal year, management-certified or audited.
        No public disclosure exists; inferred estimates carry wide uncertainty bands.
      whyItMatters: >
        All three valuation scenarios are contingent on ARR reality. Without confirmed ARR,
        the $2.75B entry could represent a 7x or a 15x multiple, the difference between
        deep value and significant overvaluation.
      diligencePath: >
        Request ARR and NRR disclosure as Day 1 data-room item; make it a condition precedent
        to any term sheet or indication of interest letter.
      relatedQuestionRefs:
        - QV008

    - type: private-evidence-only
      severity: material
      topic: secondary-transactions
      missingEvidence: >
        No confirmed secondary market transaction price for Illumio equity since the November
        2021 Series G has been publicly reported or verifiable. Secondary market pricing
        would provide an independent valuation signal between primary rounds.
      whyItMatters: >
        A secondary transaction price at or below $2.75B would confirm the valuation overhang
        thesis and inform the discount required for new entry. Without it, the $2.75B entry
        price has no independent post-2021 verification.
      diligencePath: >
        Engage secondary market brokers (Carta, Nasdaq Private Market, EquityZen) to identify
        any recent secondary pricing; request cap table with secondary transfer history since 2021.
      relatedQuestionRefs:
        - QV010
        - QV013

    - type: private-evidence-only
      severity: material
      topic: preference-stack-details
      missingEvidence: >
        Specific liquidation preferences, participation rights, and anti-dilution provisions
        across the $557M in financing rounds are not disclosed in SEC Form D filings or public
        sources. The preference stack directly affects investor return calculations.
      whyItMatters: >
        If Series G or earlier rounds carry participating preferred with 2x liquidation
        preferences, returns to late-stage secondary buyers could be materially lower than
        gross enterprise value suggests, particularly in bear and base case scenarios below $3.0B.
      diligencePath: >
        Request full cap table and certificate of incorporation with all preferred stock terms
        from Illumio legal counsel in the data room; model return scenarios with and without
        participation rights.
      relatedQuestionRefs:
        - QV019
        - QV023
