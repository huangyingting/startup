      - CV028
      - CV029
      - CV030
    tableRefs:
      - TV003
    figureRefs:
      - FV003
    callouts:
      - calloutType: risk
        title: "Valuation Overhang Is the Primary Risk at $2.75B Entry"
        body: >
          The $2.75B November 2021 valuation was set at peak cybersecurity SaaS multiples of
          15-25x ARR. With the 2026 sector median at 8-12x, Illumio must have grown ARR to at
          least $230M to justify entry at the 2021 price, making the valuation dependent on
          unconfirmed growth assumptions.
        claimRefs:
          - CV029
          - CV010

  - id: s-recommendation
    title: "Recommendation, Exit Strategy, and Final Diligence Asks"
    body: >
      Recommendation: Conditional Interest at $2.75B entry. The Series G price represents
      approximately 10x estimated ARR, consistent with market-appropriate multiples for an
      enterprise cybersecurity SaaS company growing 15-20% in regulated verticals. The conditional
      qualifier reflects five blocking diligence items that must be resolved before commitment:
      (1) ARR and NRR disclosure to validate the base case; (2) gross margin validation (target
      above 70%); (3) burn rate and runway confirmation (need at least 18 months); (4) FedRAMP
      ConMon programme health audit; (5) customer cohort concentration data.

      Risk Rating: HIGH. The funding gap, undisclosed financial metrics, compressed multiples, and
      binary exit timing risk combine to create a high-uncertainty investment. This is not a buy
      recommendation but a conditional indication of interest that requires data-room validation.

      Exit Strategy: Three exit paths exist with distinct risk profiles. Strategic M&A (Palo Alto
      Networks, Cisco, Broadcom as most credible acquirers) is the most execution-certain path at
      an estimated $4.0-6.0B range, achievable if competitive consolidation accelerates. IPO is
      the highest-return path ($4.0-6.0B at 12-15x ARR with a public market premium) but is
      market-timing dependent and requires ARR acceleration above 20%. A GP-led continuation
      vehicle (Thoma Bravo, Warburg Pincus) provides a secondary exit floor at approximately
      $3.0-3.5B if public markets remain closed through 2027.

      Thesis-break triggers that would convert a Conditional Interest to a Pass: (1) ARR growth
      below 10% confirmed in data room; (2) FedRAMP authorization lapse; (3) CEO Andrew Rubin or
      CFO Anup Singh departure without succession plan; (4) successful patent assertion by Cisco
      or VMware; (5) no credible exit path by end of 2028.
    claimRefs:
      - CV031
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
      - CV038
      - CV039
      - CV040
    tableRefs:
      - TV001
      - TV005
      - TV006
    figureRefs:
      - FV004
    callouts:
      - calloutType: recommendation
        title: "Conditional Interest — Five Data Room Gates Required"
        body: >
          Recommendation is Conditional Interest at $2.75B entry. Full commitment requires
          data-room clearance of five blocking items: ARR/NRR, gross margin, burn rate/runway,
          FedRAMP ConMon health, and customer cohort concentration. Risk rating is HIGH.
          Return expectation: -45% to +120% gross depending on ARR reality and exit timing.
        claimRefs:
          - CV040
          - CV036

