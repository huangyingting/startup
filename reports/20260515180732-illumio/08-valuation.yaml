callouts:
  - calloutType: recommendation
    title: "Conditional Interest at $2.75B — Data Room Required Before Commitment"
    body: >
      At $2.75B (November 2021 Series G), entry is FAIR for the base case but carries 30-45%
      downside in the bear case. The 4.5-year funding gap and absent ARR disclosure make precision
      impossible without data-room access. Probability-weighted EV of approximately $2.8B implies
      a narrow margin above entry; negotiating to $2.5B entry would materially improve risk-adjusted
      returns. Risk rating is HIGH. Do not commit without resolving all five P0/P1 diligence gates.
    claimRefs:
      - CV040
      - CV029
      - CV036
  - calloutType: insight
    title: "The Regulatory Tailwind Play Is the Most Durable Thesis Element"
    body: >
      DORA Article 9 (EU financial services, effective January 2025), FedRAMP Zero Trust
      requirements (US federal), ASD Essential Eight (Australia), and NCSC ZTA guidance (UK)
      create a compliance demand cycle independent of competitive platform dynamics. An investor
      positioned in Illumio through the 2025-2026 DORA audit cycle benefits from predictable
      regulatory demand regardless of CrowdStrike or Palo Alto competitive pressure.
    claimRefs:
      - CV013
      - CV014

