chapter:
  number: 8
  title: Valuation
  summary: >
    Illumio's most recent primary financing was the Series G ($225M, $2.75B post-money, November
    2021), with no new primary round in the subsequent 4.5 years. Our base case assigns $250-300M
    ARR at 8-12x, yielding a $2.5-3.5B enterprise value consistent with the $2.75B entry price.
    The recommendation is Conditional Interest: the Series G price is FAIR in the base case but
    carries meaningful downside in the bear case ($1.5-2.0B), and no commitment should be made
    without data-room access to confirm ARR, NRR, gross margin, burn rate, FedRAMP ConMon
    health, and customer cohort data.

sections:
  - id: s-investment-thesis
    title: "Investment Thesis and Anti-Thesis"
    body: >
      The investment thesis for Illumio is built on three durable pillars. First, Illumio occupies
      the category leadership position in enterprise microsegmentation, a market growing at 20%+
      CAGR driven by Zero Trust mandates, breach-containment regulations (DORA, FedRAMP, NIS2),
      and ransomware insurance requirements. Gartner forecasts global information security spending
      to exceed $212 billion in 2025, with network segmentation among the fastest-growing line
      items. Second, Illumio's PCE-and-VEN architecture enforces workload-level Zero Trust across
      heterogeneous environments including legacy OS (AIX, SPARC, legacy Windows) that cloud-native
      security tools cannot instrument, creating a multi-year moat in regulated hybrid environments.
      FedRAMP Moderate authorization locks in US federal procurement, while DORA Article 9 creates
      a structural EU financial services demand driver. Third, the Forrester Wave named Illumio
      Leader in Microsegmentation Q3 2024, and the company has passed 1,000 enterprise customers,
      signalling strong adoption in the Fortune 500 regulated vertical.

      The anti-thesis rests on platform consolidation risk. CrowdStrike Falcon, Palo Alto Prisma
      Cloud, and Zscaler ZPA are embedding microsegmentation-adjacent capabilities into larger
      XDR/SASE/CNAPP platforms. Enterprise CISOs under budget pressure prefer platform vendors
      over point solutions. If Illumio fails to credibly expand its platform narrative, standalone
      ZTS market share could erode even as the regulatory demand tailwind persists. Cisco's
      acquisition of Isovalent and native AWS VPC Lattice features specifically threaten the
      cloud-native-first accounts. The swing factor is whether regulated hybrid environments
      (government, financial services, healthcare, critical infrastructure) constitute a large and
      loyal enough segment to sustain Illumio independently for a 3-5 year investment horizon.
    claimRefs:
      - CV011
      - CV012
      - CV013
      - CV014
      - CV015
      - CV026
      - CV027
    tableRefs:
      - TV002
    figureRefs:
      - FV001
    callouts:
      - calloutType: strength
        title: "Regulated Hybrid Moat Is Defensible for a 3-Year Horizon"
        body: >
          FedRAMP Moderate authorization, DORA Article 9, and legacy OS support (AIX, SPARC)
          create a defensible moat that cloud-native-first platforms cannot replicate without
          multi-year re-architecture. This regulated hybrid position supports a 3-year investment
          horizon regardless of cloud-native competitive pressure.
        claimRefs:
          - CV013
          - CV014

  - id: s-valuation-context
    title: "Valuation Context and Comparable Analysis"
    body: >
      Illumio's valuation must be assessed against both public cybersecurity SaaS comparables and
      private market benchmarks. At the peer set median of 8-12x NTM ARR in early 2026, a $2.75B
      entry valuation implies Illumio has grown its ARR to at least $230-340M from the estimated
      $110-183M at Series G (implied at peak 2021 multiples of 15-25x). This is achievable under a
      15% CAGR assumption ($200-350M range by 2026) but is not independently confirmed.

      The public comparable set provides useful reference points. Zscaler (ARR approx. $2.5B, EV
      approx. $25B, NTM approx. 8x) illustrates post-ZIRP multiple compression for cybersecurity
      SaaS leaders. Palo Alto Networks ($9.2B revenue, NTM approx. 14x) commands a platform
      premium. CrowdStrike (ARR approx. $4.2B, NTM approx. 19x) trades at the high end due to
      exceptional growth and NRR. SentinelOne (ARR approx. $1.1B, NTM approx. 14x) is the closest
      public comp to Illumio by ARR scale. Among private comps, Claroty raised $400M at a $2.5B
      valuation in 2021 and is often cited alongside Illumio. The Wiz $32B Google acquisition set
      a benchmark for ZT cloud security scale, though Wiz's cloud-native architecture and growth
      profile differ materially.

      At the Meritech and BVP Cloud benchmarks, enterprise cybersecurity SaaS companies growing
      15-25% trade at a median EV/ARR of 8-12x, with top-quartile performers (above 25% growth,
      above 110% NRR) reaching 14-18x. Illumio's entry at $2.75B implies approximately 10x
      estimated ARR, squarely in the market-appropriate range for a mid-growth regulated SaaS
      business, but offering no deep-value discount for the illiquidity and diligence uncertainty.
    claimRefs:
