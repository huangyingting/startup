  evidenceGaps:
    - id: GU001
      topic: "nrr-grr-cohort-retention"
      description: >
        Illumio does not publicly disclose NRR, GRR, or cohort-level retention data.
        No proxy calculation from external sources can substitute for company-provided
        data. This is the most critical blocking evidence gap in the customers chapter —
        without it, the investment thesis on retention durability cannot be validated.
      diligencePath: >
        Request NRR and GRR by annual cohort for at least three years under NDA;
        request top-10 customer ARR concentration and renewal calendar; request average
        contract term and auto-renewal rate.
      relatedQuestionRefs:
        - QU006
        - QU015
        - QU021

    - id: GU002
      topic: "customer-count-trajectory"
      description: >
        Illumio's annual new customer acquisition rate and ARR by cohort are not publicly
        disclosed. The ~1,000 customer figure is company-stated and unaudited; the growth
        trajectory (accelerating vs decelerating) is unknown. ARR of $250M–$300M is analyst-
        estimated and unconfirmed. Expansion ARR vs new logo ARR split is not disclosed.
      diligencePath: >
        Request quarterly new logo count for the past eight quarters; request ARR per
        cohort (new logo ARR vs expansion ARR); request confirmation of total ARR range.
      relatedQuestionRefs:
        - QU021

    - id: GU003
      topic: "named-customer-proof-table-completeness"
      description: >
        The Named customer proof table covers only publicly disclosed customers. Illumio's
        full ~1,000 customer list is not available. Approximately 40 Fortune 100 and 15
        Fortune 500 financial services customers are referenced, but only 8–10 are named
        publicly with case study evidence. Government and defence customers are largely unnamed
        due to classification constraints. Customer concentration by ARR is not disclosed.
      diligencePath: >
        Request a fuller anonymised customer roster with ARR bands and vertical breakdown
        under NDA; request representative reference customers from government/defence segment;
        request top-10 customer ARR concentration data.
      relatedQuestionRefs:
        - QU011
      relatedTableRefs:
        - TU003

    - id: GU004
      topic: "retention-benchmark-estimation"
      description: >
        Enterprise customer cohort retention estimates are based on industry benchmarks and
        qualitative review signals, not on Illumio-disclosed data. The estimated retention
        percentages in the cohort figure are illustrative only. Without actual NRR/GRR data,
        the retention arc cannot be precisely validated against sector benchmarks.
      diligencePath: >
        Request cohort retention data under NDA; compare to BenchSaaS enterprise security
        sector median (typically 85–92% GRR for on-premise enterprise security vendors).
      relatedQuestionRefs:
        - QU025

    - id: GU005
      topic: "channel-and-partner-revenue-contribution"
      description: >
        The revenue and pipeline contribution split between Illumio direct sales and channel
        partners (Deloitte, KPMG, CDW, Presidio) is not publicly disclosed. While channel
        partner relationships are confirmed, the percentage of ARR sourced through channel
        vs direct and the trend (growing or contracting channel share) are unknown.
      diligencePath: >
        Request channel revenue contribution as a percentage of total ARR, channel partner
        MDF commitments, and partner-sourced deal conversion rate versus direct.
      relatedQuestionRefs:
        - QU021

    - id: GU006
      topic: "gartner-review-recency-distribution"
      description: >
        The Gartner Peer Insights review pool for Illumio spans multiple years. The recency
        distribution is not fully visible from the public summary view; older reviews from
        pre-2022 platform versions may not reflect current product capabilities. The cohort
        retention estimate in FU004 cannot be independently validated against recent cohort
        data.
      diligencePath: >
        Request Gartner Peer Insights full review dataset with date filter for 2024–2026;
        compare satisfaction scores for recent reviews to baseline; obtain actual NRR data.
      relatedQuestionRefs:
        - QU025
