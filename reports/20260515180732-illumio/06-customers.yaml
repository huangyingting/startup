figures:
  - id: FU001
    title: "Customer journey map"
    type: journey-map
    layout: standard
    description: >
      Illumio enterprise customer journey from initial awareness and procurement through staged
      deployment, proof of value, renewal, and expansion. Each stage maps to the buyer segment
      and key friction or success factors relevant to retention and expansion dynamics.
    data:
      nodes:
        - id: "awareness"
          label: "Awareness & RFP"
          detail: "Triggered by ransomware event, compliance audit, or peer CISO reference; procurement via direct Illumio sales or channel partner (Deloitte, CDW, KPMG)"
        - id: "pilot"
          label: "Pilot / PoC"
          detail: "10–50 workload pilot in ring-fenced environment (PCI CHD, critical app tier, or single NHS Trust network); Illumination Map generates immediate value via traffic dependency visualisation; typical 30–90 day PoC"
        - id: "initial-deploy"
          label: "Initial Production Deployment"
          detail: "VEN agent rollout to target environment; policy authoring via PCE; discovery-to-enforcement workflow; typical first segmentation ring-fence in 4–12 weeks; key success factor is complexity management"
        - id: "expand"
          label: "Expansion"
          detail: "Post-initial success drives expansion to additional app environments, additional data centres, cloud workloads via Insights, or endpoint coverage; AMS managed service layer may be introduced for healthcare accounts"
        - id: "renew"
          label: "Renewal & Deepening"
          detail: "Multi-year renewal; integration with SIEM (Splunk/QRadar) and SOAR; AI-assisted policy generation in Early Access reduces ongoing management burden; compliance audit evidence generation adds stickiness"
    claimRefs:
      - CU023
      - CU024

  - id: FU002
    title: "Adoption / deployment funnel"
    type: funnel
    layout: standard
    description: >
      Estimated Illumio enterprise deployment funnel from initial contact to multi-environment
      production deployment, based on publicly available win/loss commentary, case study
      deployment patterns, and enterprise security sales cycle norms. Values are illustrative
      of relative stage attrition, not company-confirmed pipeline data.
    data:
      items:
        - label: "Qualified Enterprise Leads"
          value: 100
          detail: "F500+ enterprises with hybrid workload estate and compliance mandate"
        - label: "PoC Initiated"
          value: 45
          detail: "Approx. 45% of qualified leads engage in a PoC; gating factor is IT security team capacity"
        - label: "PoC → Initial Sale"
          value: 28
          detail: "Approx. 62% PoC-to-close rate; typical enterprise security PoC conversion; complexity concerns are primary drop-off"
        - label: "Initial → Expanded Deployment"
          value: 20
          detail: "Approx. 70% of initial customers expand to a second environment within 24 months (analyst estimate, not confirmed)"
        - label: "Anchor / Multi-Year Reference Account"
          value: 10
          detail: "Approx. 35% of customers become multi-year anchor references with executive testimonials; estimated based on reference programme density"
    claimRefs:
      - CU002
      - CU023

  - id: FU003
    title: "Customer proof matrix"
    type: matrix
    layout: standard
    description: >
      Evidence quality matrix mapping named customer deployments across four dimensions —
      deployment evidence type, production maturity, outcome specificity, and retention signal.
      Higher evidence quality in each dimension reduces investment risk from customer concentration.
    data:
      columns:
        - "Deployment Evidence"
        - "Production Maturity"
        - "Outcome Specificity"
        - "Retention Signal"
      rows:
        - label: "NHS England"
          values:
            - label: "Procurement records + case study"
              tone: positive
            - label: "Multi-Trust production"
