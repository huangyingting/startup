callouts:
  - calloutType: strength
    title: "Regulated Vertical Concentration Drives Durable Demand"
    body: >
      Illumio's concentration in financial services, healthcare, and government — all sectors
      with non-discretionary compliance mandates — means demand is structurally defended. PCI-DSS,
      HIPAA, DORA, FedRAMP, and CMMC compliance mandates create binding procurement obligations
      that make Illumio's deployment a compliance necessity, not an optional purchase. This
      elevates retention and reduces churn risk compared to cybersecurity vendors serving
      purely discretionary security segments.
    claimRefs:
      - CU010
      - CU011
  - calloutType: risk
    title: "Deployment Complexity as Retention Risk"
    body: >
      Consistent review platform feedback highlights VEN agent installation overhead, PCE policy
      configuration complexity, and large-fleet management burden as customer friction points.
      These friction points could increase churn risk if a competitor delivers equivalent
      microsegmentation with lower operational overhead (e.g., agentless cloud-native approaches).
      Illumio's AI-assisted policy generation feature is the primary mitigation in development,
      but is still in Early Access as of May 2026.
    claimRefs:
      - CU019
      - CU020

