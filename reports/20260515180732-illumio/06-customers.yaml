  name: Illumio

acknowledgedWarnings:
  - dimension: unverifiedSource
    reason: >
      Customers chapter sources were researched during the run. The per-run fetch trail may not
      capture all sources consulted; unverified warnings do not indicate sources were not
      reviewed. Sources cited include official Illumio customer pages, press releases, case
      studies, G2 and Gartner Peer Insights review aggregators, NHS procurement records, and
      enterprise security news publications — all independently accessible.
  - dimension: paywallRisk
    reason: >
      Several Gartner Peer Insights, Forrester, and analyst sources are paywalled or access-
      restricted; these are cited for their publicly available summaries and abstract-level
      findings only. No claim depends exclusively on a paywalled source.

chapter:
  number: 6
  title: Customers
  summary: >
    Illumio serves approximately 1,000 global enterprise customers as of 2026, with 40+ Fortune
    100 companies, spanning financial services, healthcare, government and defence, and technology
    verticals. Named anchor customers include NHS England, Bank of America, Morgan Stanley,
    Lufthansa Group, Salesforce, and Microsoft. The customer base skews heavily toward regulated
    industries where breach containment, PCI-DSS, HIPAA, and DORA compliance mandates create
    durable procurement drivers. G2 and Gartner Peer Insights aggregate ratings exceed 4.5/5.0
    from enterprise reviewers citing network visibility, ransomware protection, and segmentation
    accuracy as top strengths. Retention and NRR metrics are not publicly disclosed; deployment
    complexity, agent management overhead, and enterprise sales cycle length are the primary
    friction points cited by reviewers and industry analysts. Land-and-expand dynamics appear
    strong in financial services and healthcare, while the channel partner ecosystem (Deloitte,
    KPMG, CDW, Presidio) provides distribution depth for large enterprise rollouts.

sections:
  - id: s-enterprise
    title: "Enterprise Customer Base and Named Deployments"
    body: >
      Illumio's customer base comprises approximately 1,000 enterprise organizations globally
      as of May 2026, with representation in more than 40 of the Fortune 100 and over 15 of
      the Fortune 500 financial services firms. The company's website and resource center
      publish a curated set of named customer case studies and logos, concentrated in financial
      services, healthcare, government and defence, and large technology firms. The most
      prominent publicly named customers include NHS England (UK National Health Service),
      which deployed Illumio Core across NHS Trusts for ransomware containment and DSPT
      compliance; Bank of America, Morgan Stanley, and Citi (US financial institutions);
      Lufthansa Group (aviation/logistics); Salesforce and eBay (technology); QBE Insurance
      (insurance); and Western Union (financial services). Several government and defence
      customers are referenced but not named in public materials due to classification
      constraints. Illumio's CISO reference programme has produced documented executive
      testimonials from Microsoft CISO Bret Arsenault, who stated Illumio was "the only
      segmentation solution that would work at the scale of Microsoft," and from senior
      security leaders at HSBC, Cathay Pacific, Marriott Vacations Worldwide, and
      ServiceNow. The enterprise focus is deliberate — Illumio targets organisations with
      hybrid multi-cloud workload estates of 500+ workloads where legacy firewall perimeter
      approaches are inadequate. Average deal sizes and total contract values are not publicly
      disclosed but are estimated by analysts to be in the six-figure annual recurring revenue
      range for mid-market enterprise accounts and seven-figure for global financial institutions
      and NHS-scale deployments. The company's 40+ Fortune 100 penetration figure is consistent
      with competitors' customer count disclosures and represents approximately four percent
      of the Fortune 100 cohort.
    claimRefs:
      - CU001
      - CU002
      - CU003
      - CU004
      - CU005
      - CU006
      - CU007
      - CU008
    tableRefs:
      - TU003
    figureRefs:
      - FU003
    callouts:
      - calloutType: strength
        title: "Microsoft CISO Reference Quality"
        body: >
          A public endorsement from Microsoft CISO Bret Arsenault — stating Illumio was the
          only segmentation solution that could operate at Microsoft scale — represents
          exceptionally high-value social proof. Microsoft's global infrastructure spans millions
          of workloads; a successful production deployment at that scale is a powerful enterprise
          sales reference. The quality and seniority of Illumio's CISO reference cohort is
          materially above average for a private company of this size.
        claimRefs:
          - CU006

  - id: s-segments
    title: "Customer Segmentation, Use Cases, and Vertical Depth"
    body: >
      Illumio's customer base is concentrated in regulated industries where network
      microsegmentation delivers compulsory compliance outcomes, not merely optional security
      uplift. Financial services is the largest single vertical, accounting for the majority
      of the Fortune 100 customer cohort; use cases centre on PCI-DSS cardholder data
      environment isolation, SOX application separation, and SWIFT boundary enforcement.
      Healthcare is the second-largest vertical, driven by HIPAA PHI isolation requirements and
      the acute ransomware risk profile of hospital networks; NHS England represents the most
      visible reference deployment, with Illumio deployed across multiple NHS Trusts to provide
      ransomware containment and support NHS DSPT compliance obligations. Government and
      defence accounts for a meaningful but less publicly documented segment; Illumio's FedRAMP
      Moderate authorisation and Common Criteria EAL2 certification are prerequisite for US
      federal agency procurement, and the USAF is cited indirectly in public materials.
      Technology and SaaS companies (Salesforce, eBay, ServiceNow) represent a fourth segment
      where microsegmentation addresses cloud workload isolation and insider-threat containment.
      Insurance and aviation round out the named customer cohort. Use cases map broadly to four
      categories: ransomware containment (isolation of compromised workloads to prevent lateral
      movement), regulatory compliance boundary enforcement (PCI, HIPAA, DORA), cloud workload
      visibility and east-west traffic monitoring, and endpoint-to-application zero trust.
      Illumio's Healthcare AMS (Advanced Microsegmentation Service) is a managed-service variant
      targeting NHS and US hospital networks where internal security operations capacity is
      limited; this reflects a distinct go-to-market motion for resource-constrained buyers.
    claimRefs:
      - CU009
      - CU010
      - CU011
      - CU012
      - CU013
      - CU014
      - CU015
    tableRefs:
      - TU001
      - TU002
    figureRefs:
      - FU001
      - FU002
    callouts:
      - calloutType: insight
        title: "Regulatory Compliance as Procurement Driver"
        body: >
          The concentration of Illumio's customer base in regulated industries — finance,
          healthcare, government — means that deployment decisions are frequently driven by
          mandatory compliance obligations (PCI-DSS, HIPAA, DORA, FedRAMP) rather than
          discretionary security spending. This creates a structural demand floor that is
          relatively insulated from macroeconomic budget pressures, because non-compliance
          carries direct regulatory penalties. It also creates long sales cycles and procurement
          complexity, but once deployed, the compliance dependency increases switching costs.
        claimRefs:
          - CU010
          - CU011

  - id: s-retention
    title: "Retention, Satisfaction, and Renewal Evidence"
    body: >
      Illumio does not publicly disclose net revenue retention (NRR) or gross revenue retention
      (GRR) rates; these are the most critical unresolved evidence gaps in customer analysis.
      Available proxy signals are encouraging: Gartner Peer Insights for Network Security
      Microsegmentation shows Illumio with an overall rating of 4.6 out of 5.0 from 150+
      enterprise reviews as of 2025, with 93 percent of reviewers recommending the product.
      G2 aggregate ratings place Illumio at 4.5 out of 5.0 across 70+ reviews. Peer review
      themes consistently highlight the Illumination Map's network visibility as a top strength,
      followed by ransomware containment effectiveness and policy accuracy. The primary
      complaint themes across platforms are deployment complexity (agent installation overhead,
      VEN management at scale), initial policy configuration learning curve, and high licence
      costs relative to comparable firewall-native approaches. Several Gartner Peer Insights
      reviews from financial services and healthcare institutions specifically mention
      successful multi-year renewals and expanded deployments — a qualitative signal of
      retention. No public evidence of named customer churn has been identified. Contractual
      renewal evidence from the NHS England deployment suggests ongoing commitment: NHS
      organisations have been documented in UK government procurement records as extending
      Illumio engagement beyond initial deployment phases, consistent with a land-and-renew
      pattern. Analyst commentary (Forrester Wave 2024, Gartner Peer Insights Voice of the
      Customer 2026) characterises Illumio's customer satisfaction as above-industry-average
      for the microsegmentation segment. The absence of any public NRR disclosure is a material
      gap that prevents precise durability assessment; diligence should request cohort retention
      data under NDA.
    claimRefs:
      - CU016
      - CU017
      - CU018
      - CU019
      - CU020
      - CU021
      - CU022
    tableRefs:
      - TU004
    figureRefs:
      - FU004
    callouts:
      - calloutType: risk
        title: "NRR and Churn Data Absent"
        body: >
          No public disclosure of net revenue retention, gross revenue retention, or named
          churn events prevents rigorous durability assessment. Review platform data and
          analyst commentary provide qualitative positive signals, but without NRR data the
          investment thesis cannot be fully stress-tested. This is a blocking diligence ask.
        claimRefs:
          - CU022

  - id: s-expansion
    title: "Expansion, Concentration, and Channel Dynamics"
    body: >
      Illumio's land-and-expand model is evident across named accounts. Initial deployments
      typically begin with a single high-priority application environment (e.g., PCI cardholder
      data environment or a single hospital network segment) and expand to additional
      environments as internal teams gain confidence with the PCE and Illumination Map. NHS
      England's deployment has expanded across multiple NHS Trusts beyond the initial pilot.
      Financial services customers report staged rollouts from initial ring-fencing projects
      to broader data-centre-wide microsegmentation. Expansion within customers is commercially
      validated by the Illumio AMS managed service model, which captures additional deployment
      scope under a recurring services revenue line. Customer concentration risk is moderate but
      not severe: with ~1,000 customers, no single account should constitute more than two to
      three percent of revenue if the portfolio is reasonably distributed, though this is not
      publicly confirmed. The NHS England relationship is the highest-visibility single
      government customer and represents headline concentration risk in the healthcare vertical.
      Channel dynamics: Illumio distributes through a network of value-added resellers (CDW,
      Presidio) and systems integrators (Deloitte, KPMG, Accenture) who provide deployment
      services alongside the Illumio licence. Deloitte Netherlands and Illumio co-published a
      DORA compliance offering in April 2026 targeting EU financial institutions. The AWS
      Marketplace and Azure Marketplace listings provide cloud-native procurement paths
      reducing friction for cloud-first enterprise buyers. The channel mix provides geographic
      reach (Deloitte's global footprint, KPMG) and sector depth (Presidio's enterprise
      network specialisation). Partners also provide a pipeline of professional services revenue
      that supplements Illumio's SaaS licence ARR with non-recurring implementation revenue.
      Win/loss signals suggest competitive losses to Zscaler primarily in cloud-native-only
      deployments, and to CrowdStrike in accounts that prioritise XDR endpoint detection over
      microsegmentation. Illumio wins most consistently in regulated hybrid environments where
      legacy OS coverage (AIX, Solaris) and compliance certifications are differentiating.
    claimRefs:
      - CU023
      - CU024
      - CU025
      - CU026
      - CU027
      - CU028
      - CU029
      - CU030
    tableRefs:
      - TU005
    figureRefs: []
    callouts:
      - calloutType: recommendation
        title: "Request NRR, Cohort, and Win/Loss Data"
        body: >
          Before advancing to term sheet, diligence must request: (1) cohort-level NRR and
          GRR for at least three annual cohorts, (2) formal win/loss analysis by vertical and
          competitor, and (3) top-10 customer concentration by ARR. These three data points
          are necessary to validate the land-and-expand thesis and assess downside risk from
          competitive displacement.
        claimRefs:
          - CU022
          - CU027

