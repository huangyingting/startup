callouts:
- calloutType: insight
  title: Akamai Guardicore Is the Only Direct Peer with Distribution at Scale
  body: Every direct ZTS competitor except Akamai Guardicore is either a smaller company (ColorTokens),
    hypervisor-locked (VMware NSX), hardware-constrained (Cisco Secure Workload), or has recently experienced
    go-to-market disruption (Broadcom/VMware). Akamai Guardicore uniquely combines comparable ZTS depth
    with the distribution network, threat intelligence, and 10,000+ enterprise customer relationships of
    a $3.98B revenue platform security company. This makes it the primary competitive evaluation threat
    in large enterprise RFPs—not the adjacent platform vendors that lack ZTS depth.
  claimRefs:
  - CP002
  - CP011
  - CP012
  - CP018
  - CP039
- calloutType: risk
  title: Platform Bundling Creates Structural Mid-Market Pressure
  body: Zscaler and Palo Alto Networks can offer "good enough" ZTS capabilities bundled at zero or low
    incremental cost to enterprises already under platform agreements. With 69% of security buyers citing
    tool sprawl as a priority and platform vendors offering consolidated billing, the mid-market segment
    (500–5,000 employees) faces genuine consolidation pressure where Illumio's technical superiority may
    not justify standalone procurement. Illumio's defense must center on ROI evidence from breach containment
    outcomes and application-aware policy automation—capabilities bundled ZTS solutions cannot replicate
    at comparable depth.
  claimRefs:
  - CP005
  - CP010
  - CP031
  - CP032
- calloutType: strength
  title: Broadcom Pricing Disruption Creates Near-Term Migration Pipeline
  body: Broadcom's 2023 acquisition of VMware and subsequent significant increase in NSX per-CPU licensing
    costs has generated documented enterprise dissatisfaction in the VMware installed base. Illumio's software-only,
    multi-cloud agent deployment can absorb on-prem NSX workloads while extending policy to AWS, Azure,
    and GCP—a capability NSX cannot provide. This creates a near-term (2024–2026) window where Illumio can
    position as the natural ZTS successor for organizations forced to re-evaluate their VMware licensing
    stack. The opportunity window is finite and narrows once Broadcom/VMware customers complete contract
    renegotiations and settle on multi-year VCF agreements.
  claimRefs:
  - CP007
  - CP015
  - CP016
  - CP040
