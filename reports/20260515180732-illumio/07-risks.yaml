  evidenceGaps:
    - id: GR001
      type: private-evidence-only
      severity: material
      topic: "fedramp-authorization-details"
      missingEvidence: >
        The exact FedRAMP authorization renewal date and Rev 5 transition deadline for Illumio
        Core. The FedRAMP System Security Plan (SSP) is not publicly available, and the
        marketplace listing does not specify the Rev 5 transition completion deadline.
      whyItMatters: >
        Authorization lapse would eliminate approximately 15% of Illumio's estimated ARR from
        the US federal sector. The Rev 5 transition deadline is an actionable monitoring trigger
        and is essential for assessing FedRAMP compliance risk timeline.
      diligencePath: >
        Request Illumio's FedRAMP PMO point of contact to provide the authorization letter,
        Rev 5 transition plan, and projected completion date. Confirm with FedRAMP PMO
        continuous monitoring status independently.
      relatedQuestionRefs:
        - QR001
        - QR008

    - id: GR002
      type: private-evidence-only
      severity: material
      topic: "patent-ip-portfolio"
      missingEvidence: >
        Illumio's patent portfolio in microsegmentation and ZTA, any patent freedom-to-operate
        opinions covering VMware NSX and Cisco ACI feature overlaps, and any received patent
        assertion demand letters or notices. No Illumio-assignee patents were found in a
        USPTO search.
      whyItMatters: >
        A successful patent assertion by Cisco or VMware could impose royalties compressing
        gross margins 5-15% and require product re-architecture costs. Illumio's lack of
        visible IP portfolio limits defensive leverage in cross-licensing negotiations.
      diligencePath: >
        Engage Illumio's IP counsel to provide: (a) complete patent portfolio including pending
        applications, (b) freedom-to-operate opinions for VMware NSX and Cisco ACI feature
        areas, (c) any received patent assertion demand letters, and (d) IP indemnification
        provisions in customer agreements.
      relatedQuestionRefs:
