chapter:
  number: 7
  title: Risks
  summary: >
    Illumio faces a layered risk profile across five dimensions. Regulatory and legal risks are
    material: FedRAMP Moderate authorization requires Rev 5 transition, EU NIS2 and DORA impose
    segmentation mandates on customers, and Illumio's export control classification under BIS EAR
    remains unconfirmed. Competitive risk is elevated as CrowdStrike, Palo Alto, and Zscaler embed
    microsegmentation into XDR/CNAPP/SASE platforms, while AWS VPC Lattice and VMware NSX compete
    in cloud-native and hypervisor contexts. Operational and technical risks include VEN kernel-API
    compatibility exposure following the Microsoft/CrowdStrike kernel controversy, PCE SaaS
    multi-cloud availability dependence, and limited public CVE disclosure. Financial and exit
    risks stem from the October 2021 Series G at $2.75B creating valuation overhang and equity
    fatigue risk after 4.5 years, compounded by compressed cybersecurity IPO multiples. People and
    partner risks include CEO and CTO key-person concentration and channel concentration in
    Deloitte and KPMG. Thesis-break triggers are: FedRAMP authorization lapse, a successful patent
    assertion by Cisco or VMware, and cloud-native displacement exceeding 30% of greenfield deals.

