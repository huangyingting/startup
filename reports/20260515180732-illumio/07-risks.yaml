      - TR003
      - TR004
    figureRefs: []

  - id: s-financial-exit
    title: "Financial, Exit, and Cross-Cutting Risks"
    body: >
      Illumio's financial risk profile is shaped by the October 2021 Series G at $2.75B and the
      absence of subsequent financing. After 4.5 years, equity options granted at or near 2021
      valuations may be at or near the money depending on growth trajectory, creating employee
      equity fatigue risk. Thoma Bravo's fund vintage (Fund XIII, 2021) typically implies exit
      pressure in 2026-2028, coinciding with a compressed cybersecurity SaaS multiple environment
      (8-12x NTM vs. 20x peak in 2021). Illumio's per-workload licensing model creates budget
      sensitivity for large footprint deployments; cloud auto-scaling can cause unexpected
      licensing cost spikes. FTC expanded enforcement authority adds incremental compliance
      pressure for US enterprise customers. International expansion requires adapting PCE SaaS
      to country-specific data residency requirements (Germany, France, South Korea) that may
      conflict with the current multi-tenant architecture. The ransomware threat landscape is a
      dual-force: it elevates demand for Illumio's lateral movement containment but also
      increases the sophistication of threat actors targeting Illumio's customers. Monitoring
      triggers for thesis-break scenarios include ARR growth rate below 20%, NRR below 100%,
      competitive bake-off win rate below 50%, and any PCE or VEN critical security advisory.
    claimRefs:
