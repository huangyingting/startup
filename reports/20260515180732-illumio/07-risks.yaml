  - id: s-operational-people
    title: "Operational, People, and Partner Risks"
    body: >
      Illumio's operational risk profile centers on three vectors. First, PCE SaaS multi-cloud
      availability: the PCE is hosted across AWS and Azure; a sustained cloud provider availability
      event or data residency enforcement action would disrupt customer policy management for all
      SaaS-hosted customers. On-premises PCE deployments are unaffected but represent a declining
      share of new business. Second, VEN agent kernel-API compatibility: the VEN integrates
      directly with OS-native firewall mechanisms, and breaking changes to iptables, nftables, or
      the Windows Filtering Platform API would require emergency VEN patches across the entire
      installed base. Illumio maintains an OS support matrix but has no contractual control over
      OS vendor kernel-API roadmaps. Third, deployment complexity: large deployments (10,000+
      workloads) require staged VEN rollout, policy discovery, and enforcement cutover, with
      typical time-to-value of months in complex legacy environments. Incomplete public CVE
      disclosure means the security track record of PCE and VEN cannot be fully assessed from
      external sources. People risk is concentrated in CEO Andrew Rubin (co-founder, primary
      investor and federal customer relationship owner) and CTO Ben Verghese (PCE and VEN
      architecture). Their concurrent departure would materially impair product vision and
      federal pipeline. Partner risk is concentrated in Deloitte and KPMG for the DORA compliance
      channel; loss of either partnership would impair EMEA financial sector pipeline. The
      Common Criteria EAL2 certification requires periodic re-evaluation and CC-mandating
      jurisdictions (Germany, South Korea, Japan) would lose purchase eligibility if the
      certification lapses.
    claimRefs:
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
      - CR032
