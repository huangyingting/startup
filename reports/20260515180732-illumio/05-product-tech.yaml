  evidenceGaps:
    - id: GE001
      topic: "pce-scale-limits"
      description: >
        Illumio has not published technical specifications for PCE scale limits — including
        maximum managed workloads per PCE cluster, maximum concurrent policy rules, maximum
        events per second throughput, or VEN agent memory footprint benchmarks. All scale claims
        (millions of workloads) are company-stated assertions without supporting technical
        whitepapers or independent benchmarks accessible from public sources as of May 2026.
      diligencePath: >
        Request PCE technical whitepaper with scale specifications and benchmark results under
        NDA; ask for a reference architecture for the largest current production deployment;
        request VEN agent resource utilization benchmarks across supported OS platforms.
      relatedQuestionRefs:
        - QE005

    - id: GE002
      topic: "ven-vulnerability-history"
      description: >
        No CVEs for the PCE or VEN agent are confirmed in the NIST NVD as of May 2026 based on
        a CPE search. However, a negative NVD result does not conclusively mean no
        vulnerabilities exist — Illumio may not consistently register CPEs, or vulnerabilities
        may have been disclosed through private channels or vendor advisories not indexed in NVD.
        Independent security audits of the VEN codebase and PCE application server are not
        publicly available.
      diligencePath: >
        Request Illumio's vulnerability disclosure policy and history of CVEs or security
        advisories since product launch; request results of third-party penetration tests of
        the PCE and VEN; obtain confirmation of bug bounty program scope and historical
        disclosures under NDA.
      relatedQuestionRefs:
        - QE010
        - QE011

    - id: GE003
      topic: "customer-failure-modes"
      description: >
        No public evidence of Illumio customer churn attributable to product failures, deployment
        failures, or competitive displacement has been identified from publicly accessible sources.
        G2 reviews and Gartner Peer Insights provide some customer feedback but are paywalled or
        insufficient to identify named churn events. Customer objections documented in security
        media focus on deployment complexity rather than product reliability. No named lost
        customer cases are publicly reported.
      diligencePath: >
        Request win/loss analysis from Illumio sales leadership under NDA; interview a sample of
        churned or non-renewed customers via reference channel; request customer retention and
        gross revenue retention data for the most recent four fiscal years.
      relatedQuestionRefs:
        - QE012
        - QE025

