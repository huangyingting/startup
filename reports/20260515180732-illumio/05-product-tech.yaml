chapter:
  number: 5
  title: Product & Technology
  summary: >
    Illumio delivers Zero Trust Segmentation (ZTS) through its Policy Compute Engine (PCE) and
    Virtual Enforcement Node (VEN) architecture, enforcing label-based microsegmentation policies
    via OS-native firewalls without sitting in the application data path. The platform spans
    physical servers, VMware, AWS/Azure/GCP, containers, and endpoint devices — including legacy
    AIX and Solaris — making it unusually broad in OS and environment coverage relative to
    cloud-native-only competitors. The PCE is available as a FedRAMP-authorized SaaS offering or
    as an on-premises deployment for air-gapped and sovereign environments. Differentiators
    include kernel-level enforcement with no proxy overhead, an IP-address-independent label
    policy model that persists through cloud churn, and the patent-pending Illumination Map that
    visualizes all workload traffic dependencies in near real-time. FedRAMP Moderate authorization
    and Common Criteria EAL2 certification distinguish Illumio in the federal and defense
    procurement markets. Near-term product priorities include AI-assisted policy generation,
    OT/IoT segmentation, and identity-aware ZTS combining microsegmentation with zero trust
    network access.

sections:
  - id: product-definition
    title: "Product Portfolio and Module Map"
    body: >
      Illumio delivers Zero Trust Segmentation through three core products sharing a unified label
      taxonomy and PCE REST API. Illumio Segmentation — formerly Illumio Core — combines the
      Policy Compute Engine (PCE) with Virtual Enforcement Node (VEN) agents and the Illumination
      Map to deliver real-time workload visibility and enforced microsegmentation across physical
      servers, virtual machines, containers, cloud instances, and endpoint devices. The PCE
      serves as the central control plane: it stores workload labels (environment, application,
      role, location), compiles label-based policy rules into OS-native firewall rule sets,
      distributes them to VEN agents over TLS-encrypted channels, and provides the REST API,
      web console, RBAC, and audit logging used by security and compliance teams. The VEN is a
      lightweight software agent installed on each protected workload that enforces PCE-issued
      rules using the OS-native firewall without sitting in the traffic path. Illumio Insights
      (previously CloudSecure) extends the platform agentlessly into AWS, Azure, and GCP by
      ingesting native cloud telemetry and applying ML-based policy recommendations. Illumio
      Endpoint applies the same VEN enforcement model to managed laptops and desktops, completing
      east-west coverage from user device to application workload. The PCE is available as a
      cloud-hosted SaaS offering or as a customer-hosted on-premises deployment, including
      air-gapped configurations for classified and regulated environments.
    claimRefs:
      - CE001
      - CE002
      - CE003
