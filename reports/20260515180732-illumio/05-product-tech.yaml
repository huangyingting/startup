  claims:
    - id: CE001
      statement: >
        Illumio's Policy Compute Engine (PCE) is the central control plane of the Zero Trust
        Segmentation platform — it stores workload labels, compiles label-based policy rules into
        OS-native firewall rule sets, distributes compiled rules to VEN agents, and provides the
        REST API, web console, RBAC, and audit logging. The PCE does not sit in the data path and
        never handles application traffic.
      type: company-claimed
      topic: "pce-architecture"
      freshness: current
      confidence: high
      sourceRefs:
        - SE001
        - SE004
      tags:
        - pce
        - architecture
        - zero-trust
        - control-plane
      answersQuestionRefs:
        - QE001
        - QE020

    - id: CE002
      statement: >
