figures:
  - id: FE001
    title: "Product architecture map"
    type: stack
    layout: standard
    description: >
      Illumio Zero Trust Segmentation architecture organized from the workload enforcement layer
      at the base to the management and integration surfaces at the top. The PCE control plane
      does not sit in the data path — it computes and distributes policy rules, while VEN agents
      enforce them at the OS firewall layer on each workload. Traffic between workloads is never
      routed through the PCE.
    data:
      layers:
        - label: "Integration and Ecosystem Layer"
          detail: "ServiceNow (ticketing automation), Splunk / IBM QRadar (SIEM event stream), HashiCorp Terraform (IaC policy-as-code), Kubernetes admission controller (dynamic workload registration), AWS/Azure/GCP marketplace distribution, channel partner APIs (Deloitte, Presidio, CDW)"
        - label: "Management and Visualization Layer"
          detail: "Illumination Map (patent-pending real-time traffic dependency visualization), REST API with OpenAPI 3.x specification, RBAC multi-team governance, audit event log, Illumio Insights (AI-driven agentless cloud policy), PCE web management console"
        - label: "Policy Compute Engine (PCE)"
          detail: "Label-to-IP translation engine, policy rule compilation (label matrix to OS firewall rules), workload state tracker, event bus, RBAC, HA active-standby mode; deployed as FedRAMP-authorized SaaS or customer-hosted on-premises including air-gapped environments"
        - label: "Policy Communication Layer"
          detail: "TLS-encrypted PCE-to-VEN push channel distributing compiled rule sets to all managed workloads; VEN agents return traffic telemetry and workload health state to PCE; no application traffic passes through this layer"
        - label: "Workload and Enforcement Layer"
          detail: "VEN agents on Linux (iptables/nftables), Windows Server (Windows Firewall), AIX, Solaris, macOS, containers (pod sidecar or host-level); enforces deny-by-default policy via OS-native kernel firewall with no in-line proxy and no traffic latency overhead"
    claimRefs:
      - CE001
      - CE002
      - CE016
      - CE017
      - CE019
      - CE020

  - id: FE002
    title: "Customer workflow / operating flow"
    type: flow
    layout: standard
    description: >
      Standard Illumio deployment workflow from initial VEN installation through discovery,
      labeling, policy simulation, and enforcement. The workflow is designed to be non-disruptive:
      discovery mode runs without enforcing any policy, and simulation mode tests policy impact
      before any rules are activated. Customers typically complete an initial ring-fence in
      days to weeks and expand coverage incrementally over months.
    data:
      nodes:
        - id: "n1"
          label: "Deploy VEN Agents (Discovery Mode)"
          detail: "Install lightweight VEN agents on target workloads in discovery mode — agents collect traffic telemetry and report all workload-to-workload communications to PCE without enforcing any policy; zero disruption to application traffic during this phase"
        - id: "n2"
          label: "Illuminate Traffic Flows via Illumination Map"
          detail: "PCE aggregates VEN telemetry and renders the Illumination Map — a real-time visual graph of all workload-to-workload communication flows; security team identifies application dependencies, unexpected connections, and candidate segmentation boundaries"
        - id: "n3"
          label: "Label Workloads in PCE"
          detail: "Security team assigns labels (environment, application, role, location) to each workload in the PCE console or via REST API; labels are IP-address-independent and persist through IP changes, container restarts, and cloud migrations"
        - id: "n4"
          label: "Draft Segmentation Policies"
          detail: "Build label-based allow rules in PCE using label pairs (for example App:Payments talking to App:Database); PCE computes which workloads fall in scope for each rule using current label assignments; policy expressed in logical terms, not IP addresses"
        - id: "n5"
          label: "Simulate Policy Impact"
          detail: "Run policy simulation mode to predict which traffic flows would be blocked under proposed rules; review the proposed block list without activating any enforcement; iterate on policy until expected behavior is confirmed"
        - id: "n6"
          label: "Enforce Policies (Enforce Mode)"
          detail: "Switch target workloads to enforce mode; PCE pushes compiled OS-native firewall rules to VEN agents via TLS; VEN programs iptables/nftables or Windows Firewall; lateral movement is now blocked according to policy; all traffic violations logged"
