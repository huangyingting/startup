  - id: architecture
    title: "Technical Architecture — PCE, VEN, and Label Model"
    body: >
      The Illumio PCE operates as a policy compilation engine and never touches application
      traffic. When a workload label changes or a new workload registers, the PCE recomputes the
      full policy rule set — translating label-pair allow-rules into concrete IP-address-based
      firewall rule sets — and pushes the updated compiled rules to every affected VEN agent over
      a TLS-encrypted control channel. VEN agents run as lightweight OS processes that program
      the native kernel firewall (iptables or nftables on Linux; Windows Firewall on Windows
      Server; equivalent mechanisms on AIX and Solaris) without interposing on data-path traffic.
      This delivers security without latency overhead, throughput reduction, or a new network
      chokepoint. The label-based policy model is IP-address-independent: policies remain valid
      across IP changes, container restarts, and cloud workload churn because the PCE
      continuously tracks workload state and recompiles rules accordingly. The Illumination Map
      renders all active and historical traffic flows between workloads as a real-time visual
      graph, enabling security teams to identify unexpected communication paths, application
      dependencies, and segmentation candidates without interrupting production traffic. The PCE
      supports high-availability active-standby deployments for on-premises installations; the
      SaaS variant includes built-in availability managed by Illumio. PCE event logs provide an
      immutable audit trail for compliance reporting. All PCE-to-VEN communication uses TLS, and
      VEN upgrades are orchestrated by the PCE to support rolling upgrades across a workload
      fleet without downtime.
