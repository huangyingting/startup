  - id: trust-compliance
    title: "Trust, Safety, Security, and Compliance"
    body: >
      Illumio holds several trust certifications that are critical for enterprise and government
      procurement decisions. The PCE SaaS platform is SOC 2 Type II certified, providing
      independent assurance of security, availability, confidentiality, and processing integrity
      controls for enterprise security procurement. FedRAMP Moderate authorization covers the
      PCE SaaS offering, providing a compliant procurement path for US federal agencies under
      FISMA and aligned with the White House M-22-09 zero trust mandate. Common Criteria EAL2
      certification covers the PCE product, providing formal security evaluation recognized in
      US defense and allied government procurement processes. In the EU, Illumio is positioned
      as a key technical enabler for DORA Article 9 network segmentation requirements affecting
      EU financial entities from January 2025. For healthcare, Illumio's network segmentation
      capabilities enable HIPAA technical safeguards for PHI isolation under Section 164.312
      access control and audit controls requirements. CMMC 2.0 Level 2 compliance for the US
      Defense Industrial Base is addressed through Illumio workload isolation and access control
      capabilities targeting CMMC Access Control domain requirements. PCE event logging provides
      the immutable audit trail required by multiple compliance frameworks. RBAC within the PCE
      enables multi-team governance with least-privilege administrative access, supporting SOC 2
      and FedRAMP operational control requirements. No CVE history for the PCE or VEN has been
      independently verified from public databases as of May 2026; this remains an open
      diligence item.
    claimRefs:
