appendices:
  - id: A
    title: 投资前关键尽调要求
    blocks:
      - type: callout
        calloutType: recommendation
        title: P0：确认 ARR 和 Plus 单位经济
        body: >-
          要求提供经审计或管理层确认的 ARR、Plus 订阅者数量、月流失率和 ARPU 拆分（消费者 vs. 机构）。这是阻碍可信投资决策的单一最关键数据缺口。所有估值情景都取决于 ARR 更接近 $74M（悲观）还是
          $120M（乐观）。
        claimRefs:
          - CV001
          - CV002
          - CV003
      - type: callout
        calloutType: recommendation
        title: P0：股权结构表和优先股堆叠
        body: 要求提供完全稀释后的股权结构表、清算优先权细节、反稀释条款，以及 Tencent 的 CFIUS 合规姿态。Tencent 悬而未决是结构性退出障碍，出资前必须评估。
        claimRefs:
          - CV034
      - type: callout
        calloutType: risk
        title: P1：COPPA/FTC 监管状态
        body: 获取管理层对 COPPA 2.0 敞口的书面评估、任何未结 FTC 往来函件，以及数据最小化路线图。13 岁以下用户群让 ClassDojo 成为 EdTech 中最受关注的 COPPA 执法目标之一。
        claimRefs:
          - CR015
          - CR016
      - type: list
        title: 追加尽调事项
        items:
          - ClassDojo for Schools：ACV、续约率、学区管线，以及相对 ParentSquare 的竞争赢 / 输
          - 国际变现：前 5 大非美国市场的 Plus 上线时间表和定价
          - 鉴于 CTO 集中风险，核查 Liam Don 接班安排和工程领导层厚度
          - Dojo Islands AI：AI 辅导功能的 MAU、留存数据和单次会话成本
        claimRefs: []
