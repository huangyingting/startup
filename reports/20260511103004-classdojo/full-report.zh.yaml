  - id: TV005
    title: 论点失效与否决触发表
    description: Monitorable triggers that would materially weaken or invalidate the ClassDojo investment thesis.
    columns:
      - 风险
      - 可监测触发因素
      - 阈值 / 事件
      - 对论点的传导
      - 行动含义
    rows:
      - - ESSER 悬崖 — 机构预算坍塌
        - 美国学区 EdTech 预算公告；RFP 活跃度；ClassDojo for Districts 管线
        - 学区管线同比下降超过 40%，或平均 ACV 降至 $1.50/学生以下
        - 机构收入支柱失效；B2B TAM 收缩显著降低 EV
        - 重评为悲观情形；进入价下调 30-40%
      - - COPPA 2.0 执法或同意令
        - FTC 执法数据库；媒体监测；ClassDojo 信任中心更新
        - FTC 对 ClassDojo 启动调查、发出 CID，或宣布同意令
        - 合规成本飙升；学区采购冻结；可能强制调整产品
        - 暂缓；按监管概率加权跑情景
      - - Plus 订阅用户流失超过阈值
        - 通过应用商店信号、合作伙伴披露获得月度订阅用户队列数据
        - Plus 年流失率超过 30%，或净订阅用户数连续两个季度下降
        - 消费者 ARR 支柱失效；若不重新获取流失订阅用户，乐观情形不可能成立
        - 重评为悲观情形；索取完整流失队列数据
      - - 关键高管离职（CEO/President）
        - LinkedIn、媒体监测、ClassDojo 招聘页和博客
        - Sam Chaudhary 或 Liam Don 在没有规划继任的情况下离开公司
        - 关键人风险落地；机构投资者信心下降；交易流程风险上升
        - 暂停；任何新承诺前做深度继任尽调
      - - ParentSquare 赢得重大替代性竞争
        - 学区合同公告；学区发布的技术 RFP
        - ParentSquare 在超过 500K 学生的学区挤出 ClassDojo，或赢下 10+ 个重要学区续约
        - 受影响学区的网络效应被削弱；B2B 收入和推荐闭环受损
        - 重新评估护城河假设；开展赢单 / 输单访谈项目
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Five triggers cover the full investment thesis risk surface: regulatory (COPPA), competitive (ParentSquare),
        financial (Plus churn), operational (ESSER), and key-person; no material category omitted.
    claimRefs:
      - CV015
      - CV025
      - CV026
      - CV030
    notes: 触发因素设计为可通过公开数据或最少的一手研究观察。阈值按基准情形假设校准；当两个或以上标准同时满足时，触发悲观情形。
  - id: TV006
    title: 最终尽调材料清单
    description: Outstanding diligence items required before an investment decision.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 按分部拆分的收入和 ARR
        - FY2024 和 FY2025 经审计总收入、ClassDojo Plus 消费端 ARR、ClassDojo for Districts ARR
        - 没有经核验的 ARR，就无法验证 $1.25B 估值或情景概率
        - 向 ClassDojo IR 索取；将经审计财务作为交割条件
      - - 订阅者队列与流失
        - 按地域和队列年份拆分的 ClassDojo Plus 月活订阅者数、年流失率、LTV 和 CAC
        - 乐观情景要求流失率低于 15%；超过 30% 就触发悲观情景；情景概率权重会明显改变
        - 向 ClassDojo 索取月度队列瀑布表；用应用商店收入数据交叉核验
      - - 股权结构表与优先股堆叠
        - 完整股权结构表，列明股权类别、清算优先权（1x-1.5x）、反稀释权，以及 Five Sigma 2024 年 3 月延期条款
        - 若退出估值低于 $1B，优先权可能让普通股权益减少 20-40%；按比例认购权会影响未来稀释
        - 向公司索取投资条款清单和股权结构表；咨询老股交易数据提供商
      - - 学区合同管线与 NRR
        - 机构分部的 ClassDojo for Districts 客户数、平均 ACV、管线 ARR 和净留存率（NRR）
        - 机构分部是估值重估的主要催化剂；NRR 超过 110% 才能证实落地后扩张逻辑
        - 索取 CRM 管线摘要和前 10 大学区合同条款；做 5-10 个学区访谈
      - - 监管与法律状态
        - 与 FTC 关于 COPPA 2.0 的往来函件；未决诉讼；州级隐私问询；FERPA 认证状态
        - 监管责任是主要尾部风险；任何正在进行的调查都会明显改写风险画像
        - 查阅 FTC 执法数据库；向公司法律顾问索取法律保全登记和未决诉讼清单
      - - 国际商业化
        - 按地域拆分的用户数、Plus 渗透率和收入（美国 vs. 国际）
        - 全球用户超过 50M；若国际商业化低于 5%，乐观情景几乎完全押注美国
        - 索取按地域拆分的 ARR；按国家分析应用商店收入数据
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six diligence topics cover all investment-critical unknowns: revenue, churn, cap table, institutional pipeline,
        regulatory status, and international monetization; no additional topics required.
    claimRefs:
      - CV034
      - CV039
      - CV026
      - CV035
    notes: 尽调待补证据是投资决策的最低门槛。产品路线图、竞争胜负记录、团队接班规划也应同步深挖。优先顺序：（1）经审计收入，（2）流失队列，（3）股权结构表，（4）学区管线，（5）监管状态，（6）国际化。
figures:
  - id: FO001
    title: 公司里程碑时间线
    type: timeline
    layout: wide
    summary: ClassDojo 从 2011 年创立到 2026 年获得 ISTE 认证的融资与产品历程。
    data:
      items:
        - label: 创立
          date: 2011-07
          details: Sam Chaudhary 和 Liam Don 在 Imagine K-12（YC EdTech）孵化后，于 San Francisco 推出 beta 版；第一周有 80 名教师采用。
          tone: positive
        - label: A 轮 — $8.5M
          date: '2014'
          details: Shasta Ventures 领投；General Catalyst、SoftTech VC、Felicis Ventures 参投。资金用于团队和国际增长。
          tone: positive
        - label: B 轮 — $21M
          date: 2016-04
          details: General Catalyst 领投；GSV、Reach Capital、SignalFire 参投。公司转向完整沟通平台，并探索商业模式。
          tone: positive
        - label: C 轮 — $35M
          date: 2018-02
          details: GSV Ventures 与 SignalFire 联合领投。资金预留用于推出 ClassDojo Plus 消费端订阅。
          tone: positive
        - label: D 轮 — $125M（独角兽）
          date: 2022-07
          details: Tencent 领投。投后估值 $1.25B，ClassDojo 成为独角兽。资金用于产品扩张和国际增长。
          tone: positive
        - label: Dojo Islands 上线
          date: '2023'
          details: Dojo Islands 是面向学生游戏化玩耍和社交情感学习的虚拟世界；平台边界从沟通向外扩展。
          tone: positive
        - label: TEC/NDPA 隐私协议
          date: 2025-08
          details: 通过 The Education Cooperative 标准化数据隐私协议，预先满足 14 个州的 FERPA/COPPA 合规要求。
          tone: neutral
        - label: 获得 ISTE 认证
          date: 2026-03
          details: International Society for Technology in Education 认证 ClassDojo 符合高质量产品设计和数字教学法标准。
          tone: positive
    approximationNotes: 融资日期基于 PR Newswire 新闻稿和 Crunchbase 记录；部分早期日期只有大约年份 / 季度。
