      - number: '4.5'
        title: 财务结论与尽调阻断项
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的财务画像结构上有吸引力，但实质披露很不透明。免费增值收入模型、零 CAC 分发以及完全依赖家长端消费者订阅，拼出一种少见组合：大规模分发叠加低资本强度——类似 Duolingo
              早期。反向情景是，ClassDojo 的变现面极窄：一个约 $110/年的消费者产品，面向 K-8
              学生家长；没有披露订阅用户数、没有企业收入，也没有广告兜底。收入质量高（订阅、经常性），但规模未知。五个关键尽调阻断项是：（1）Plus 订阅用户数及趋势——没有这一项，就无法确认 ARR
              和增长率；（2）毛利率——软件、内容和 AI 基础设施成本组合是否把利润率压到 SaaS 基准以下；（3）现金余额和现金跑道——2024 年 3 月融资提供一定安慰，但时间新近性很重要；（4）B2B
              企业收入潜力——ClassDojo for Districts 目前免费，但新的企业销售团队显示有变现意图，只是时间表和模型均未披露；（5）Tencent
              股权结构风险——地缘政治敞口需要围绕关键学区客户做法律和采购尽调。拿不到内部财务数据，就无法仅靠公开数据承销 ClassDojo 的资本充足性、现金跑道和可投性。
