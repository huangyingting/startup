  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品定义与模块图谱
        blocks:
          - type: paragraph
            body: >
              ClassDojo 用一个一体化平台服务三类用户：教师、家长和学生。面向教师的产品提供课堂管理（参与积分、反馈、班级动态）、学生作品集工具和家校沟通渠道——且永久免费。家长 App
              让家长实时连接孩子所在课堂：日常更新、消息，以及（通过 Plus）高级内容。学生体验围绕头像、作品集和 Dojo Islands 虚拟世界展开。

              平台包括六个具名产品模块：（1）ClassDojo 核心模块（教师 + 家长 + 学生沟通，免费）；（2）ClassDojo Plus（家长订阅，$15.49/月或 $109.99/年）；（3）Dojo
              Islands（学生虚拟世界，需订阅 Plus）；（4）ClassDojo Sidekick（AI 教师助手，2024 年推出）；（5）ClassDojo for Districts（管理后台、SIS
              集成、TEC SDPA，免费）；（6）ClassDojo Big Ideas（SEL 内容库，独立 iOS App）。这种模块化设计让免费增值增长成立（教师采用带动家长采用），同时把产生收入的 Plus
              层与免费核心清楚分开。
