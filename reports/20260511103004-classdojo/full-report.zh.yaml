  - number: 3
    title: 竞争对手
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              ClassDojo 所处竞争格局碎片化但正在整合，可分为三个层级。第一层是专门的家长—教师沟通和家庭参与平台——Seesaw、ParentSquare（2023 年 1 月与 Remind
              合并）、TalkingPoints 和 Bloomz——它们直接争夺同一使用场景。第二层是既有 K-12 记录系统厂商——PowerSchool（包含 Schoology LMS）、Infinite Campus
              及类似 SIS 供应商——它们把家长沟通功能嵌入学区强制使用的平台。第三层是免费相邻平台——Google Workspace for Education 和 Microsoft Teams for
              Education——学区广泛用于课程和沟通，它们也在扩展到家庭参与。

              第四类是现状替代品：学校邮件系统、电话、纸质通讯和通用消息应用（WhatsApp、GroupMe、Signal）。它们仍是根深蒂固的默认选项，尤其在 ClassDojo 渗透较浅的国际市场。

              关键结构差异在 GTM 模式：ClassDojo 采用教师优先、免费层的消费者分发模式，形成自下而上的病毒式采用，CAC 接近为零。ParentSquare
              和多数学区导向平台采用自上而下的学区销售动作——教师或家长使用前，必须先通过 IT 审批和采购合同。这些模式不是纯替代关系，而是共存关系，形成多归属环境：学区可能同时有 ClassDojo 的教师部署和
              ParentSquare 的学区沟通合同。

              ParentSquare 与 Remind 在 2023 年 1 月合并，创建了美国最大的学校沟通公司，这是 ClassDojo 历史上最重要的竞争事件。合并后实体服务 42,000
              多所学校（ParentSquare），叠加 Remind 约 3000 万用户、覆盖美国 80%
              学校的声称规模，实际上造出一个在学区层（ParentSquare）和课堂层（Remind）都有显著存在的规模化竞争者。
