        title: 路线图与产品演进
        blocks:
          - type: paragraph
            body: >
              ClassDojo 近期产品投入显示出双轨路线图：（1）加深学区级 B2B 基础设施（SIS 集成、SDPA 协议、管理后台、企业销售能力）；（2）通过 AI（Sidekick）、沉浸式学生体验（Dojo
              Islands）和 SEL 内容（Big Ideas）扩大面向家长的消费者价值主张。学区路线因 2025 年高管招聘（企业销售负责人、B2B 总经理、K-12 参与负责人）而提速，让 ClassDojo
              有机会未来叠加企业变现层，但公司尚未公布定价模型。

              ClassDojo 2025-26 学区产品发布（2025 年 8 月）为学区管理员增加了新功能：增强沟通工具、扩展分析和更深 SIS 集成。ISTE Seal 验证了学习效果主张：ClassDojo 的
              Sidekick AI 能支持教师实践——这说明 AI 投入有可辩护性，而不只是补一个功能勾选项。主要产品风险在于，Dojo Islands 需要持续投入内容和 3D
