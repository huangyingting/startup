            body: >
              ClassDojo 教师优先、免费层分发模式意味着，约 350
              万美国教师（以及全球对应教师）会邀请家长加入课堂，实际上充当无薪销售。这个病毒循环让免费层几乎实现零客户获取成本，并在没有企业销售动作的情况下形成接近饱和的安装基数（美国 K-8 渗透率
              95%）。多数达到类似渗透率的 EdTech 竞争者，都需要学区销售团队和多年采购周期才有相当覆盖。
