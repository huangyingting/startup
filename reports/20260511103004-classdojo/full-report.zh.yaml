            title: 从免费增值走向 B2B
            body: >
              ClassDojo 正有意识地从纯消费者免费增值模式转向企业学区合同；2025 年企业销售和 B2B 总经理等高管任命就是证据。这说明公司试图分散收入来源、提升可预测性。路径类似 Zoom 和
              Slack：先在个人层面占据主导，再把组织转化为买方。
