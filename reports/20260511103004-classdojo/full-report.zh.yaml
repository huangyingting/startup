      - number: '8.5'
        title: 建议、尽调要求与退出准备度
        blocks:
          - type: paragraph
            body: >
              评级：有条件正面 / 观察。ClassDojo 拥有少数教育科技资产才能匹配的可防御战略位置——美国分发无可比拟、变现引擎初生但真实、网络效应已复利 14 年。不过，私营公司零公开财务披露、2022
              年估值标记陈旧、ESSER 预算逆风以及 B2B 收入模型未验证，这几项叠加，意味着没有结构化尽调冲刺，就无法支持任何投资决定。最低必需披露包括：FY2024 和 FY2025 经审计收入，以及按分部划分的
              ARR；Plus 订阅用户数、月流失率、按地域拆分的 LTV/CAC；学区合同管线、ACV 和净留存率；包含清算优先权堆叠、反稀释权和 Five Sigma 2024 年 3
              月条款的股权结构表；以及未决监管问询或 COPPA 往来。退出路径包括 IPO（以日活用户和透明订阅指标支撑 Duolingo 式消费者教育科技叙事）、被大型教育科技集团战略收购（Pearson、HMH 或
              Google for Education），或由希望把 PowerSchool 变现打法套用到 ClassDojo 消费者基础上的 PE 机构进行二级交易 / LBO。以 50M+ 用户和估计 $97-120M
              ARR 计，ClassDojo 在战略收购情景下应可实现 $1-2B 收购价；如果能清楚披露订阅指标，也可达成 $1.5-3B IPO。给予有条件正面，等待经审计财务和订阅用户队列披露后重新评估。
