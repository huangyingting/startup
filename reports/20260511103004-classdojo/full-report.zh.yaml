      - number: '4.3'
        title: 成本结构与单位经济模型
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的成本结构主要是人员和云基础设施：它是软件与内容业务，没有硬件或实物库存。Forbes 称公司 2022 年 7 月有 110 名员工，并描述当时正在「翻倍」；到 2026 年，员工数可能已达
              200-300 人。按典型旧金山软件公司的全负荷人力成本（每人约 $250-$350K）计算，200-300 人团队意味着年运营成本约 $50-$105M，部分可由已报道收入抵消。消费 SaaS
              和移动订阅业务的可比毛利率（Duolingo：FY2024 约 72.7%）显示，ClassDojo Plus 订阅毛利率可能在 65-75%，主要成本是云托管、Big Ideas 和 Dojo Islands
              内容制作、支付处理和客户支持。Duolingo 的 S&M 在 FY2024 占收入约 12%（主要是付费获客）；ClassDojo 的零 CAC 模型意味着 S&M
              占收入比例结构性更低，资源转向产品和内容。公开渠道没有 ClassDojo 专属的成本、利润率或单位经济模型数据。主要成本包袱是 Dojo Islands（虚拟世界平台）：它需要持续投入，且尚未被报道能产生收入。
