      - number: '4.2'
        title: GTM 动作与销售效率
        blocks:
          - type: paragraph
            body: >
              ClassDojo 自创立以来一直靠教师自发传播和有机增长获客。2019 年 Series C 新闻稿确认，现有用户「100% 通过有机、口碑推荐」拉新，公司没有付费营销。这个零 CAC
              的教师获客循环是：教师免费使用 ClassDojo 做课堂管理，再邀请家长加入；家长使用到一定深度后，转化为 ClassDojo Plus 订阅用户。Duolingo 可比公司（MAU 中付费订阅渗透率
              9%，FY2024 销售与营销支出 $90.5M）对应的是完全不同的获客模型，依赖付费效果营销。ClassDojo 的估计 CAC 结构性更低，因为教师本身就是无偿分发渠道，家长只需要一个账号邀请。家长用户转为
              Plus 订阅用户是关键变现节点，但公司没有披露转化率。2025 年，ClassDojo 聘请企业销售负责人 Michael Bell（曾任 Follett School Solutions）、B2B 总经理
              Jeff Buening（曾任 Brightwheel，Harvard MBA）以及 K-12 参与负责人 Chad Stevens（曾任 AWS 教育）——指向学区级企业销售加速，尽管学区产品仍免费。TEC
              SDPA 协议（14 个州）以及 NDPA/SDPC Resource Registry 收录降低了学区采用时的法律摩擦；法律摩擦是教育科技企业销售周期的常见障碍。
