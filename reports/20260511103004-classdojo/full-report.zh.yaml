      - number: '1.2'
        title: 创始人、管理层与治理
        blocks:
          - type: paragraph
            body: >
              ClassDojo 由 Sam Chaudhary（CEO）和 Liam Don（总裁）共同创立；截至 2026 年 5 月，两人仍掌舵公司。Chaudhary 出生于伦敦，毕业于 University of
              Cambridge，创办 ClassDojo 前曾任职 McKinsey & Company。他入选 EY Entrepreneur Of The Year 2025 Bay Area
              获奖者，说明行业认可公司的规模和影响力。Liam Don 拥有 Cambridge 计算机科学背景，担任总裁，负责产品愿景和技术战略。高管团队还包括首席技术官 Dominick Bellizzi 和首席产品官
              Partha Tallavajhala。2025 年初，ClassDojo 新增三名高级管理者：Michael Bell（企业销售负责人）、Jeff Buening（B2B 总经理）和 Chad A.
              Stevens, Ph.D.（K-12 参与负责人），释放出加码学区企业销售的信号。董事会包括 Hemant Taneja（General Catalyst）、Tod Francis（Shasta
              Ventures）、Tim Brady（独立董事），Nikhil Basu Trivedi 和 Michael Moe 则为董事会观察员。两位联合创始人同时扮演运营者和董事会层面参与者，且机构知识集中在
              Chaudhary 和 Don 身上；以公司当前体量看，这是实质性的关键人依赖风险。
