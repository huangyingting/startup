          - type: callout
            title: 学生隐私是持续脆弱点
            body: >
              ClassDojo 大量收集儿童行为和活动数据，尤其涉及 13 岁以下儿童，仍持续引来学界批评和消费者投诉。2026 年 4 月生效的新 COPPA
              规则收紧了对生物识别数据和第三方共享的要求。平台品牌建立在校内社区信任之上，一旦出现执法行动或高关注度数据泄露，用户信任会受到不成比例的打击。
            calloutType: risk
