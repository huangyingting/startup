      - number: '8.4'
        title: 可比公司基准
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的消费者 / B2B 混合教育科技模型位于三类可比原型的交叉点。消费者教育科技可比公司（Duolingo）因 DAU 变现密度和透明盈利能力获得高溢价倍数；Duolingo FY2024 收入
              $748M，Q1 2026 交易倍数为尾随收入 11-14x，支撑来自 40M+ 日活用户和约 8% Super Duolingo 转化率。企业 K-12 SaaS
              可比公司（PowerSchool、Instructure）依靠经常性机构收入交易在较低倍数（6-11x ARR），但客户留存高、现金流可预测；PowerSchool 被 Bain 收购（2024 年）时约
              $5.7B、10-11x ARR，为学区 SIS/LMS 平台设定上限。ClassDojo 最强私营类比是 IXL Learning（2022-24 年估值估计
              $2B+），也在类似规模下同时靠消费者订阅和学校授权变现。Kahoot!（Oslo Bors）交易在尾随收入 3-4x，是消费者教育科技倍数区间低端，受欧洲上市折价和较弱变现密度约束。将 2026 年 8-12x
              混合倍数应用于分析师 ARR 中点估计（$97M），得到当前倍数下 $780M-$1.16B 的公允价值区间——意味着除非 ARR 此后显著增长，否则 2022 年估值略偏贵。
