      - number: '5.4'
        title: 信任、隐私与合规
        blocks:
          - type: paragraph
            body: >
              ClassDojo 在学生数据隐私资质上投入很重——这是它在受监管 K-12 采购中对竞品的最强差异点。关键认证包括：Common Sense Privacy Seal（2023 年 7 月获得，表示在
              Common Sense 框架下隐私得分 84%+）；ISTE Seal of Learning Design（2026 年 3 月）；SDPC 收录（Student Data Privacy
              Consortium，美国多州认可）；TEC SDPA（The Education Cooperative Student Data Privacy Agreement，截至 2025 年覆盖 14 个州）；以及
              Student Privacy Pledge 签署方身份。平台符合 COPPA 和 FERPA，没有广告，也不把学生数据用于商业目的。

              ClassDojo for Districts 包含专门的隐私协议基础设施（SDPA），并通过 TEC 合作建立了覆盖 14 个州的标准化学区数据处理协议。这会简化 IT
              负责人采购：他们需要学生数据法律兜底。不过，ClassDojo Trust
              Center（classdojo.com/trust-center/）无法通过自动化方式接受外部审查，限制了对其安全控制声明（静态加密、SOC
              2、渗透测试频率等）的独立技术验证。正式尽调时，这些细节必须在数据室确认。
