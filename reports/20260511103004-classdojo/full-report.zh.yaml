      - number: '8.2'
        title: 融资背景与估值立场
        blocks:
          - type: paragraph
            body: >
              ClassDojo 最近一次确认估值是 2022 年 7 月 Series D 的 $1.25B，由 Tencent 领投，SoftBank 及既有投资方 General Catalyst、GSV
              Ventures、SignalFire 参投。2024 年 3 月，公司完成一轮由 Five Sigma 作为新机构投资人参与的 Series D 延展轮，条款未披露。延展轮说明公司到 2024
              年仍能融资，但没有提供估值更新。未见二级市场交易或 SAFE-note 文件报道。分析师收入估计 $74-120M 意味着 2022 年估值约为尾随收入 10-17x——即便按 2022
              年高峰标准也偏激进，但考虑用户规模和变现可选性仍可辩护。到 2026 年 5 月，教育科技 SaaS 倍数已压缩；中位数交易从 2021-22 年峰值 12-18x ARR 重定价到 6-10x ARR。若
              2026 年仍按 2022 年估值进入，必须验证 ARR 已增长到足以支撑该估值。四轮合计 $221M 融资产生的稀释和优先权包袱需要建模；Series D 1x-1.5x 清算优先权在低于 $1B
              的退出结果中可能把普通股权益压低 20-40%。ClassDojo for Districts 公开披露的定价为每名学生每年 $2-5；Plus 在美国约 $15.49/月或 $109.99/年。2024 年 3
              月延展轮改善了资本缓冲并降低近期稀释压力，但缺少完整轮次重定价让当前公允市场价值不透明。
