      - number: '3.3'
        title: 既有系统与相邻平台威胁
        blocks:
          - type: paragraph
            body: >
              PowerSchool（powerschool.com）是占主导地位的 K-12 软件生态，服务 90 个国家超过 6000 万学生。产品套件覆盖学生信息系统（SIS）、Schoology
              LMS、评估、特殊教育管理，以及嵌入 SIS 的家长门户来做家庭沟通。2024 年，PowerSchool 被 Bain Capital 收购后私有化，据称交易估值约 $5.6B。PowerSchool
              家长门户作为学区 SIS 合同的一部分打包提供，能提供成绩级透明度、出勤和基础消息——这些功能足以满足许多学区的沟通要求，无需额外供应商。PowerSchool 的竞争威胁不在于与 ClassDojo
              功能完全一致，而在于它是学区记录系统：一旦 IT 强制使用 PowerSchool，学区常把包括 ClassDojo 在内的额外沟通平台视为冗余；后 ESSER 预算压缩期又加大了整合压力。

              Google Workspace for Education Fundamentals 对 K-12 机构免费，包含 Google Classroom（LMS）、Gmail、Meet，以及 2025 年以来的
              Gemini for Education AI 工具。Google Classroom 支持家长观察者账号模式，监护人可收到课堂摘要并看到学生作品。虽然 Google Classroom 不能复制
              ClassDojo 的行为追踪、游戏化或高质量直接家长—教师消息，但零成本部署、Google 账号普及和 AI 集成构成结构性威胁：当 Google 在免费套件中加入家庭参与功能，ClassDojo Plus
              在高级沟通内容上的价值主张会面临来自一个已被学区 IT 强制部署平台的增量竞争。美国约 4000 万学生以某种形式使用 Google Workspace for Education，使其成为部署最广的相邻平台。

              Instructure Canvas 是高等教育 LMS 市场领导者（「北美 50% 的大学学生」），也通过 Canvas for K-12 和家长观察者功能进入 K-12。Canvas 主要在 K-12 LMS
              细分与 Schoology 竞争，与 ClassDojo 的家长沟通模式直接竞争较少。不过，在采用 Canvas 作为企业 LMS 的学区，ClassDojo 向上销售学区级参与分析的机会会被压缩。
