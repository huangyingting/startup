      - number: '2.3'
        title: 买方、用户与付费方分层
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的商业结构独特：消费者牵引的自下而上采用，把用户和付费方拆成双边市场。理解购买路径，需要映射三类人群：教师（采用者）、家长（终端用户，也是 Plus 付费方）和学区（机构付费方）。

              教师是主要采用者。在美国，约 570 万 K-12 教师每年秋季回到 99,239 所公立学校、13,452 个学区的课堂。免费课堂工具的采用决策——也就是 ClassDojo
              核心的行为追踪和课堂消息功能——通常由教师自主做出。一个教师采用平台，就能为整个班级播下家长参与的种子（平均每班 22–25 名学生）。这种自下而上的病毒循环，是 ClassDojo
              的结构性分发优势：教师采用能拉动家长注册，无需学区合同或销售动作。

              家长既是终端用户，也是 ClassDojo Plus 的付费客户。ClassDojo Plus 定价为 $15.49/月或
              $109.99/年，是家长无需学区授权即可选择的直接面向消费者（DTC）订阅。这把收入生成从机构采购周期中解耦出来。按约 5000 万用户（教师和家长混合）计算，即使家长基数只有 5%
              付费转化，也意味着数百万订阅用户。

              学区管理员是企业授权协议的付费方。学校学区通常掌握高于一定门槛的技术支出采购权（每个供应商合同常见为 $10,000–$50,000）。Agile Education Marketing 数据显示，FY2025
              美国平均每生支出为 $17,277，其中通常不到 3% 流向软件和数字平台。因此，一个 3000–5000 名学生的美国中位数学区，年度技术预算约为 $1.5M–$2.5M，为 ClassDojo
              的企业层创造有意义的学区级合同空间。

              不同人群的采用触发点不同。教师看重课堂管理痛点（行为追踪、家长沟通摩擦）。家长看重了解孩子在校一天和直接联系老师。学区看重数据隐私合规（FERPA/COPPA/NDPA 协议）、行政效率和多校标准化。
