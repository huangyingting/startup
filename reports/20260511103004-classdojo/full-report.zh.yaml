      - number: '5.6'
        title: 附录
        blocks:
          - type: callout
            title: 有机产品飞轮是最深护城河
            body: >-
              ClassDojo「教师邀请家长」的采用模型形成一个多边网络，既能自我延续，也很难被替代。教师换平台必须从零重建家长连接；家长换平台则必须重新说服教师采用新工具。这种结构性锁定效应叠加 95%+ K-8
              学校渗透，给了 ClassDojo 一条竞品买不来、也很难快速复制的分发护城河。
            calloutType: strength
            claimRefs:
              - CE018
              - CE019
          - type: callout
            title: Dojo Islands 与 AI 资本消耗高，且无确认收入抵消
            body: >-
              Dojo Islands（3D 虚拟世界，2022+）和 Sidekick AI（LLM API 成本，2024+）都需要持续的实质投入。Dojo Islands 需要内容创作、3D
              渲染基础设施和审核。Sidekick AI 会产生按查询计的 AI API 成本，并随教师使用量扩大。两个功能都不产生独立收入——它们是 Plus 转化驱动因素。如果 Plus
              订阅增长停滞，这些投入会变成缺乏清晰回报路径的资本消耗。
            calloutType: risk
            claimRefs:
