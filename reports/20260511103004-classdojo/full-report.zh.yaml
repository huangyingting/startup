    sections:
      - number: '1.1'
        title: 身份与业务概览
        blocks:
          - type: paragraph
            body: >
              ClassDojo 是一个 K-12 教育科技平台，总部位于加利福尼亚州旧金山，2011 年 8 月由 Sam Chaudhary 和 Liam Don
              创立。公司公开使命是「让地球上的每个孩子都获得自己热爱的教育」，路径是一套免费增值的沟通和课堂管理平台，把教师、学生和家庭连接起来。ClassDojo 是私营公司；截至 2026 年 5 月，公司未披露 IPO
              计划。核心产品对教师、学生和家庭免费，收入来自 ClassDojo Plus（面向家长的高级订阅）和 ClassDojo for Districts（面向学校管理员的 B2B 授权模式）。截至 2026
              年，ClassDojo Plus 在美国的价格约为 $15.49/月或 $109.99/年。平台支持自动翻译成 130 多种语言，因此在语言多元的美国市场和国际市场尤其有价值。ClassDojo
              所在赛道是消费教育科技（EdTech），重点覆盖 K-8 学校沟通和社会情感学习（SEL）基础设施。公司在 2022 年 7 月达到 $1.25B 的独角兽估值；分析师估计年收入在 $74M–$120M 区间，但
              ClassDojo 不公开披露财务指标。
