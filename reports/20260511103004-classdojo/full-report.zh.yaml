      - number: '5.2'
        title: 技术架构与平台
        blocks:
          - type: paragraph
            body: >
              ClassDojo 是云原生 SaaS 平台，覆盖 iOS、Android 和 Web 浏览器。移动 App（iOS 和 Android）自 2011 年起就是主界面，Web
              应用补充服务需要桌面工作流的学区管理员和教师。平台支持实时消息、推送通知和媒体分享（照片、视频、动态），因此需要稳健基础设施，支撑大规模异步与同步通信。

              ClassDojo Sidekick 于 2024 年推出，把 AI 能力直接接入教师产品，用于备课、生成反馈和个性化学生进展洞察。Dojo Islands 是 3D
              虚拟世界，需要额外客户端渲染投入。ClassDojo for Districts 支持学区级 SIS 花名册集成（Clever、ClassLink
              是该细分市场标准）、单点登录（SSO）、批量开通以及学区级报告。平台在 51M+ 学生规模下持续运行，说明云基础设施骨干已经成熟。

              具体云服务商、后端编程语言和工程工具细节未公开披露。ClassDojo 2025 年招聘信息提到 React、TypeScript 和后端岗位，为技术栈提供间接信号。
