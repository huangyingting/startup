      - number: '2.2'
        title: 市场规模——多重视角
        blocks:
          - type: paragraph
            body: >
              测算 ClassDojo 的市场，需要同时调和几种视角。最宽口径（全球 K-12 EdTech）会夸大机会，因为 ClassDojo 不提供硬件、LMS 或课程内容。最窄口径（美国 K-8
              家长—教师沟通）又低估机会，因为 ClassDojo 有实质性的国际存在，产品范围也在扩张。三层框架最能捕捉与投资相关的规模。

              第 1 层——总可寻址市场（TAM）：全球家长—教师沟通和家庭参与软件。Intel Market Research 估算 2025 年为 $2.05B，2032 年为 $3.58B（CAGR
              10.9%）。Verified Market Research 的锚点接近 2025 年 $2B，并以 13.5% CAGR 增至 2033 年 $5.51B。TAM 终点相差 2–4
              倍，本身就是尽调信号：用渗透率精细建模（5410 万美国 K-12 学生 × 每学生技术支出）会推导出更窄的美国家庭参与软件天花板，即在每生支出中典型软件预算占比 1–3% 时约为 $500M–$1.5B。

              第 2 层——可服务市场（SAM）：北美（主要是美国）家长—教师沟通平台。Grand View Research 认为北美占 2025 年全球 EdTech 的 36.1%，据此推算美国 /
              加拿大家长—教师软件市场约为 2025 年全球细分市场的一部分，即大约 $740M–$900M。

              第 3 层——可获得服务市场（SOM）：ClassDojo 在 SAM 内当前和近期可触达的收入上限。公司披露 5000 万以上用户，按当前 Plus 付费附着率估算 ARR 为 $74M–$120M，并在美国
              K-8 达到 95% 渗透率。免费 K-8 使用已接近饱和，主要 SOM 扩张路径不是新学校获取，而是订阅转化（ClassDojo Plus）和学区授权。

              市场增长轨迹并不均质：家长—教师沟通细分更小、增长更慢（10–14% CAGR），低于通用 K-12 AI 平台市场（13–25% CAGR），因为家校沟通工具虽深嵌运营流程，但相比课程或 LMS
              支出，付费意愿有限。对 ClassDojo 更相关的增长向量，是通过订阅升级和企业学区合同提升 ARPU。
