      - number: '2.5'
        title: 规模测算缺口与相互矛盾的估算
        blocks:
          - type: paragraph
            body: >
              本章刻意保留三类规模测算不确定性；如果把它们抹平，估值分析会被扭曲。

              第一，K-12 EdTech 的分析师 TAM 估算在 2025 年全球 $32B 到 $295B 之间，相差 9
              倍，取决于分析师是否纳入：（a）硬件和连接；（b）企业培训和职业发展软件；（c）高等教育平台；以及（d）政府资助的教育基础设施。市场边界没有标准定义。若投资者用 $295B TAM 来测算 ClassDojo
              机会，实际上是在拿一个包含服务器、教材出版商和私人辅导的市场作比较，而这些都不是 ClassDojo 的竞争领域。

              第二，家长—教师沟通软件估算（Intel Market Research 和 Verified Market Research 口径均约为 2025 年 $2B）可能重复计算了学区 SIS 家长门户，因为
              PowerSchool、Infinite Campus 等产品把部分沟通功能打包在内。剔除这部分重叠后，专门的家长参与平台 TAM 会下降。

              第三，基于渗透率的 ClassDojo SOM 有分析师估算未捕捉的天花板约束。美国 K-8 渗透率已达 95%，平台在核心细分中新学校获取空间有限。增长必须来自 ARPU
              扩张（订阅、学区授权），而不是学校份额提升。Plus 当前订阅用户数和学区合同 ACV 没有公开数据，给变现增长模型带来实质不确定性。
