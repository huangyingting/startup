              $190B ESSER 联邦教育刺激资金在 2024 年 9 月到期，意味着学区技术预算在经历 3–4 年支出繁荣后回到疫情前基线。依靠 ESSER 预算增长企业合同的 EdTech
              供应商——包括沟通平台——面临流失风险，因为学区会优先续签任务关键型系统（SIS、LMS），而不是补充性参与工具。ClassDojo 的消费者 Plus
              收入部分隔离了这一风险，但随着学区适应无刺激资金预算，企业授权增长可能在 2026 年前后停滞。
