  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 法律与监管风险——COPPA、FERPA、州法与 FTC 历史
        blocks:
          - type: paragraph
            body: >
              ClassDojo 处在儿童数据、学校合规和消费者订阅交叉点上——这是美国数字服务中监管最重的三类场景。COPPA 要求收集 13 岁以下儿童数据的运营方取得可验证的家长同意、保持数据最小化，并提供删除权。FTC
              曾在 2019 年对 ClassDojo 采取执法行动，形成同意令，要求删除历史学生数据并实施符合 COPPA 的项目。2024 年 12 月 COPPA 规则修订——2025 年 7
              月生效——进一步收紧规则：限制数据用于广告、扩大删除义务，并要求教育科技运营方将学校授权的教师数据收集视为运营方直接收集，增加 ClassDojo 的合规负担。ClassDojo
              在学区合同下作为学校官员行事时，FERPA 适用，带来额外数据治理和审计义务。加利福尼亚（SOPIPA）、纽约、华盛顿等州已出台学生数据隐私法，在联邦最低要求之外叠加要求。英国公司注册确认其对国际用户承担
              GDPR 义务。Student Privacy Compass 记录了 ClassDojo 的历史合规案例，使监管记录部分公开。Common Sense Privacy Seal 和 Student
              Privacy Pledge 签署方身份是实质缓释因素，但不能消除监管责任。
