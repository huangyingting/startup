        - ESSER 逆风拖慢机构业务；ParentSquare 竞争
      - - 悲观
        - ESSER 悬崖使机构管线减少 30-50%；Plus 在 1M 家庭以下见顶；倍数压缩至 5-7x
        - $90-110M
        - 5-7x
        - $450-770M
        - 20-25% — 由监管行动或严重预算收缩触发
        - COPPA 执法；管理层离职；降估值融资
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Bull, base, and bear scenarios cover the full probability-weighted distribution; no additional scenario is
        warranted given the two-driver model (Plus conversion + district ARR).
    claimRefs:
      - CV021
      - CV022
      - CV023
      - CV024
      - CV025
    notes: ARR 预测是基于当前轨迹外推和同业基准的前瞻估算；ClassDojo 不披露收入。概率信号为定性评估。按概率加权的预期价值为 $1.8-2.1B，意味着基准情形下以 2022 年 $1.25B 估值或更低进入可增厚价值。
