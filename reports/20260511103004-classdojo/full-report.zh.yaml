  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: >
              ClassDojo 呈现出 2020 年代最不对称的教育科技投资画像之一。乐观情景建立在三根相互咬合的支柱上：（1）无可匹敌的分发护城河——美国 95% K-8 教师渗透、180 个国家 50M+
              年活跃用户，几乎不靠付费获客建成；（2）相对装机基础仍大体未开发的免费增值到订阅变现跑道；（3）初生但有位置的机构学区收入流（ClassDojo for Districts），有望把免费学区安装转化为经常性
              SaaS 合同。教师驱动的网络效应——一名教师采用带来 20-30 名家长用户——形成的切换成本护城河，结构上优于纯消费者教育科技。EY 在 2025 年认可 ClassDojo 联合创始人为 Bay Area
              Entrepreneur of the Year，显示公司仍有外部背书和领导韧性。反向逻辑集中在三点：（a）12 年后仍没有公开收入或流失披露，估值无法验证；（b）2024 年 9 月到期的 ESSER
              支出悬崖触发学区预算削减，限制 B2B 变现窗口；（c）ParentSquare-Remind 合并（2023 年）带来更激烈竞争，形成一个拥有 20M+
              用户和深厚采购关系的学区优先对手。形成确信前，必须拿到经审计收入、订阅用户队列数据和股权结构条款。
