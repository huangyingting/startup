        - 过去 12 个月收入 11-14x
        - $8.5B+ 市值（2026 年 Q1）
        - 最佳上市可比；消费者驱动，具备 DAU 变现和免费增值转付费模型
        - 语言学习不同于 K-12 通信；变现密度更高
      - - PowerSchool
