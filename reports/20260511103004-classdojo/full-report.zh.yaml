            title: 美国 K-8 渗透率无可匹敌
            body: |
              ClassDojo 声称在美国 K-8 学校达到 95% 渗透率，即便放在市场领导者中也极其突出，并形成强网络效应。大量课堂已经扎根在平台上，竞争对手想替换它极难，尤其是在小学阶段。
            calloutType: strength
