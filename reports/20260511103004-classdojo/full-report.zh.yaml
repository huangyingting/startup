      - number: '7.5'
        title: 人才、执行风险与缓释——监控触发器和投资逻辑破裂点
        blocks:
          - type: paragraph
            body: >
              ClassDojo 由联合创始人 Liam Don 和 Sam Chaudhary 领导；平台自 2011
              年以来一直由创始人持续掌舵。关键人物风险不可忽视：创始人驱动的文化和产品愿景意味着，一旦有人离开，可能造成平台方向扰动、人才流失和投资人信心问题。2025 年企业业务高管招聘（Michael Bell、Jeff
              Buening、Chad Stevens）带来 B2B 销售能力，但在贡献实质收入前面临 12 到 24 个月爬坡风险。公开组织数据未列出 CFO 或
              COO，显示财务和运营领导深度偏薄。相对教育科技同业，缓释质量高于平均。Common Sense Privacy Seal（2023 年）、ISTE Seal（2026 年 3 月）、Student
              Privacy Pledge 签署方身份、TEC DPA（2025 年）和 SDPC Data Registry 收录共同降低学区采购摩擦和监管尾部风险。投资逻辑破裂触发器包括：FTC
              再次执法或出现重大新隐私违规；Plus 订阅用户月流失率持续高于 5%；ClassDojo for Districts 到 FY2026 年底未能达到 $5M+ ARR；Tencent 关系触发 CFIUS
              介入；或创始人离开且没有清晰接班。
