            body: >
              ClassDojo
              运营一个双边教育网络，包含三类用户角色和两类买方角色。教师是主要采用者：平台免费，几分钟即可建班。教师创建班级后，家长收到邀请并必须加入才能接收更新——这让家长成为由教师决策带动的次级采用者。学生通过 Dojo
