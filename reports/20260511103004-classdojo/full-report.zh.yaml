  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与边界
        blocks:
          - type: paragraph
            body: >
              ClassDojo 位于三个重叠市场的交叉处：广义 K-12 教育科技、学校与家庭沟通软件，以及社会情感学习（SEL）和课堂参与平台。市场边界对规模测算和估值很关键，因为类别画得多宽，会让分析师 TAM
              估算相差最多 9 倍。

              商业上最窄但仍有意义的市场，是家长—教师沟通软件——通过消息、行为追踪、出勤提醒和作品集分享来连接家校信息流的数字平台。Intel Market Research 估算该细分市场 2024 年为
              $1.85B，2025 年增至 $2.05B。Verified Market Research 的口径也接近，认为 2025 年约 $2B，到 2033 年达到 $5.51B。这是 ClassDojo
              的主要竞争场。

              如果把边界扩到全部 K-12 EdTech，数字会完全不同：Business Research Company 称 2025 年全球规模为 $31.99B；Dimension Market Research
              则把全球 K-12 EdTech 估到 $295.6B，并把美国 K-12 EdTech 市场估为 $94.8B。Grand View Research 估算 2025 年整个全球 EdTech
              市场（包括高等教育和企业培训等所有细分）为 $187B。差异之所以如此剧烈，源于分析师是否把硬件（设备、白板）、LMS、内容分发和企业培训与纯 K-12 软件平台放在一起。

              家长—教师沟通软件的现状替代品包括电子邮件（学校发放地址）、电话、纸质通讯、学校网站、通用消息应用（WhatsApp、Remind、GroupMe），以及带家长门户的学生信息系统。学区 IT 部门有时会基于
              Infinite Campus 或 PowerSchool 等现有 SIS 供应商搭建基础门户。这些替代品根深蒂固，是 ClassDojo 竞争的主要非消费替代选项，而不只是竞品应用。

              相邻市场包括学生信息系统（SIS）、学习管理系统（LMS）、学生作品集和评估工具，以及全学区沟通套件。ClassDojo 已进入部分相邻领域（例如 Dojo Islands
              的沉浸式学习、作品集分享功能），但尚未成为完整 SIS 或 LMS 替代品。
            claimRefs: []
