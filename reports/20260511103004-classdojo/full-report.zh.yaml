      - number: '8.6'
        title: 附录
        blocks:
          - type: callout
            title: 无可匹敌的 K-12 分发护城河
            body: >
              ClassDojo 的美国 95% K-8 教师渗透和 50M+ 全球用户，代表一种获客成本优势；14
              年市场竞争中，没有哪家资金充足的竞品复制出来。教师到家长的病毒式循环形成结构性护城河：一名教师采用就能零成本带来 20-30 名家长用户——这个 LTV/CAC
              比率支撑整个投资逻辑，也无法通过合理成本的付费获客复制。
            calloutType: strength
            claimRefs:
              - CV017
              - CV036
          - type: callout
            title: ARR 不透明是最大单一风险
            body: >
              ClassDojo 自 2022 年 Series D 以来没有披露任何收入、订阅用户数或流失指标。分析师估计区间 $74-120M 覆盖中点的 62%——对这个阶段的公司来说，离散度异常。没有经验证
              ARR，就无法支持投资决定。缺少披露也阻止市场对 2022 年估值标记做价格发现；任何带棘轮条款的 Series D 或延展轮条款，都可能让有效入场估值与 $1.25B 名义值明显不同。
            calloutType: risk
            claimRefs:
              - CV034
              - CV002
          - type: callout
            title: 有条件正面——以尽调冲刺启动观察
            body: >
              我们给予有条件正面 / 观察评级。战略案例有吸引力：全球少有消费者教育科技资产能同时具备 ClassDojo 的分发规模、网络护城河和双重变现可选性。如果 FY2025 ARR 超过 $125M，2026 年以
              $1.25B 入场（或再融资重定价后的更低价格）可以辩护。在 TV006 中执行尽调冲刺，优先核查经审计收入和流失队列。若 ARR 达 $125M+、流失率低于
              20%，且股权结构表没有阻断性优先权，则上调为完整正面。若 ARR 低于 $85M、流失率超过 25%，或披露存在活跃 COPPA/FTC 程序，则下调为回避。
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV026
              - CV034
