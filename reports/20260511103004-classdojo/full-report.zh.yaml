      - number: '3.5'
        title: 护城河耐久性与反向证据
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的持久竞争优势建立在三根支柱上。第一，网络效应护城河：5000 万以上用户、覆盖美国 95% K-8 学校，意味着任何竞品想替代 ClassDojo，都必须说服单个教师（而不只是学区
              IT）在每个学年重新让所有家长注册新平台。这个教师—家长沟通图谱是 ClassDojo 最耐久的资产；没有同等深度的免费层分发，竞争者难以复制。第二，品牌认知：「ClassDojo」在美国 K-8
              教育中已像「Xerox」和「Googling」一样，成为描述通用动作的类别动词。品牌驱动的自下而上教师采用，带来结构性的自然 CAC
              优势。第三，消费者订阅模式：没有意义重大的直接竞争者同时提供免费课堂工具和面向家长的高级订阅——相较纯 B2B EdTech 平台，ClassDojo 拥有独特分散的收入基础。

              不过，几条负面信号值得尽调重点审视。第一，ClassDojo
              的游戏化做法（怪兽角色、行为积分系统）遭到教育研究者批评，他们认为外在行为奖励系统可能削弱学生内在动机——这会阻碍进步学区采用。第二，ParentSquare+Remind
              合并带来第一个真正规模化的竞争者：42,000 多所学校，叠加 Remind 历史上覆盖美国 80% 学校的声称规模，使合并实体能够可信地向学区 IT 负责人推销单一供应商沟通整合方案，同时替代
              ClassDojo 和 Remind。第三，后 ESSER 学区 IT 整合正在主动缩减批准供应商名单；缺少正式学区合同的供应商，可能随着学区收紧技术栈而被学校设备屏蔽、被网络防火墙过滤。若学区 IT
              越来越限制教师自选工具，ClassDojo 依赖教师管理式采用的路径就会暴露脆弱性。
            claimRefs: []
      - number: '3.6'
        title: 图表
        blocks:
          - type: callout
            title: 消费者 + 企业双模式没有直接对手
            body: >
              在家长—教师沟通细分，ClassDojo 没有直接竞争者同时提供免费课堂层和面向消费者的高级订阅（ClassDojo Plus）。ParentSquare、Seesaw、TalkingPoints 和
              Bloomz 全部只作为企业 B2B 平台运营——收入依赖学区合同续约，100% 暴露在学区预算周期、采购决策和 ESSER 悬崖影响之下。ClassDojo 的消费者 Plus 订阅创造了一条收入流，不受学区
              IT 决策直接约束，随家长习惯性参与增长，并与每一个直接竞争者形成结构性差异。
            calloutType: strength
