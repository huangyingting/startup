      - number: '1.5'
        title: 关键里程碑与不利事件
        blocks:
          - type: paragraph
            body: >
              ClassDojo 15 年的发展轨迹，是从课堂行为追踪应用长成完整的 K-12 沟通生态。平台 2011 年 7 月推出 beta 版，首周被 80 名教师采用；到一周年时，用户已扩至 30 多个国家的 960
              万。重要产品发布包括 Class Story（2015）、学生作品集（2015）、Dojo Islands——游戏化虚拟学习世界（2022 年起），以及 AI
              辅助教师工具（2025–26）。监管相关里程碑包括取得 iKeepSafe 认证、Common Sense Privacy Seal，以及 2026 年 3 月获得 ISTE Seal。2025 年 8 月与
              The Education Cooperative（TEC）在 National Data Privacy Agreement（NDPA）框架下达成合作，覆盖 14 个州的 FERPA 和 COPPA
              合规，是企业渠道落地的重要支点。不利事件则包括学界和社区持续批评 ClassDojo 的行为数据收集做法。2025 年一篇同行评审论文质疑「数据化」学生行为记录及其被滥用的可能。消费者评论平台和 Better
              Business Bureau 也记录了有关计费、技术问题和家长数据处理担忧的投诉。上述负面信号截至 2026 年 5 月尚未演化为正式监管执法，但构成声誉风险；公司正借隐私认证和预批准数据协议主动管理。
