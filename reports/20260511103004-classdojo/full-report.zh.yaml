      - number: '7.4'
        title: 财务与模型风险——未披露指标、ESSER 后逆风、收入集中
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的财务风险画像结构性不透明。作为没有 SEC 报告义务的私营公司，ClassDojo 不披露 ARR、订阅用户数、烧钱速度、资产负债表或现金跑道。因此无法量化评估财务风险。2021 年 5
              月投资发生在 $1B 独角兽估值——早于 2022 年后教育科技估值重置，后者让多家同业经历下轮融资或减值。教育科技行业估值降温范围很广；没有当前指标，ClassDojo
              的按市值重估位置未知。收入集中度风险高：Plus 订阅是主要披露收入流，定价需要与免费沟通替代方案竞争。ESSER 之后学校预算整合正在让学区削减教育科技支出。Duolingo 公开
              10-K（最接近的公开教育科技消费订阅类比）显示 NRR 压缩和订阅用户对价格敏感——这些风险与 ClassDojo Plus 在结构上相关。B2B 企业动作需要在收入爬坡前先投入销售；没有披露管线、成交率和
              ACV，这构成未量化的利润率风险。
