companyProfile:
  summary: >-
    ClassDojo 是一家总部位于旧金山的 EdTech 公司，2011 年由 Sam Chaudhary（CEO）和 Liam Don（CTO）创立，搭出了占据主导地位的 K-12 家校沟通平台。它进入了美国 95% 以上
    K-12 学校和 180 多个国家，靠课堂消息、行为积分和作品集分享连接教师、学生和家长。公司 9 轮融资约 $221M，最近一次是 2022 年 7 月 Tencent 领投、估值 $1.25B 的 $125M Series
    D，2024 年 3 月又获 Five Sigma 领投的未披露金额延展轮。收入主要来自 ClassDojo Plus 消费订阅（$7.99/月）以及刚起步的 ClassDojo for Schools 机构产品；分析师估计 ARR
    在 $74M 到 $120M 之间。由于用户包含 13 岁以下儿童，公司长期承受 COPPA 下的隐私审查，但通过隐私承诺和 FERPA 对齐维持合规姿态。
