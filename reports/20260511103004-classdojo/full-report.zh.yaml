      - number: '5.3'
        title: 差异化与竞争护城河
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的主要护城河是深度嵌入且自我强化的教师—家长网络。教师采用 ClassDojo 后，会把全班每个学生的家长拉进来；每位家长随后在整个学年乃至更久都有持续使用 App
              的理由。这个有机采用飞轮受两点保护：（a）教师惰性——教师切换平台要重建家长连接并重新录入所有学生；（b）家长熟悉度——信任 ClassDojo 界面的家长会抵触换到新的沟通渠道。

              产品差异化包括：ClassDojo 于 2026 年 3 月获得首个由 K-8 沟通平台拿到的 ISTE Seal of Learning Design（经独立教育研究验证）；Common Sense
              Privacy Seal（教育科技最高可得隐私认证，2023 年获得）；以及美国 K-8 教育科技平台中最深的家长渗透。已披露竞品中，还没有哪家同时达到 ClassDojo 95%+ K-8
              学校覆盖，并确认拥有直接面向家长的订阅收入模型。如果 Sidekick AI 能推动教师日常使用，它可能进一步加深留存，并相对 Seesaw、ParentSquare 和 Google Classroom
              形成额外差异化。
