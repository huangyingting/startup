        - 无法测算业务规模或确认增长叙事
      - - 毛利率和 COGS 拆分
        - 决定消费者订阅是否有足够资本效率，支撑公司开支和产品投入。
        - 索取利润表或管理账；参照 Duolingo COGS 构成做基准
        - 如果毛利率 <60%，融资需求会明显高于投资者友好型基准所暗示的水平
      - - B2B / 企业收入和管线
        - ClassDojo for Districts 目前免费；如果未来企业货币化失败，或反过来蚕食教师采用，Plus 订阅用户基数可能缩水。
        - 索取 2025 年 B2B 销售团队带来的管线、ACV 估算和任何测试版企业收入
        - 缺少管线数据就无法量化上行或下行
      - - 现金状况和现金跑道
        - 缺少现金余额和烧钱速度，资本充足性评估无法定稿
        - 索取资产负债表和 12 个月 P&L；对照董事会汇报节奏核验
        - 如果现金跑道短于投资者预期，存在以不利条款意外融资的风险
      - - Tencent CFIUS 和学区采购风险
        - Tencent 的中国股东背景可能在 CFIUS 审查或州采购法下，限制 ClassDojo 被美国联邦、州和军人家庭学区采用。
        - 索取法律顾问的 CFIUS 分析和学区对 Tencent 持股已有的任何异议；审阅州级针对中国教育科技公司的采购限制。
        - 如果采购限制构成实质影响，可能损失 1-5% 的学区销售管线
    notes: >-
      五个缺口都是私营公司尽调的标准阻塞点。Plus 订阅用户数是最关键的缺失数据点，因为它是主要收入驱动因素，也是没有内部财务数据时唯一能确认 ARR 的指标。尽调优先级：（1）订阅用户数，（2）现金 /
