      - number: '7.6'
        title: 附录
        blocks:
          - type: callout
            title: FTC 执法历史在 2024 COPPA 修订下抬高再次执法风险
            body: >
              ClassDojo 的 2019 年 FTC 同意令意味着，任何新的 COPPA 违规都会被视为重复违规，并在当前 FTC 权限下承担明显更高民事罚款。2024 年 12 月 COPPA
              修订扩大了合规面，尤其针对使用学校授权教师数据收集的教育科技运营方。如果 ClassDojo 当前项目不能满足 2025 年 7 月生效日要求，作为有记录的重复违规者，公司将面临实质执法风险。
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: Tencent 投资带来未解决的地缘政治和采购风险
            body: >
              Tencent 领投 $125M Series D，形成一项尚未通过 NSA 或其他缓释协议公开解决的 CFIUS 敞口。ClassDojo
              若要进入联邦教育科技采购或具有国家安全敏感性的州合同，必须处理这一风险。没有任何公开 CFIUS 申报或缓释，本身就是尽调缺口，因为任何限制都会实质影响可服务市场。
            calloutType: risk
            claimRefs:
              - CR008
              - CR019
          - type: callout
            title: 缓释组合高于教育科技类别平均水平
            body: >
              Common Sense Privacy Seal（2023 年）、ISTE Seal（2026 年 3 月）、Student Privacy Pledge 签署方身份、TEC DPA（2025 年）和 SDPC
              Registry 收录共同提供了采购级隐私信号，而大多数教育科技竞品不具备这些信号。这些认证降低学区摩擦，也证明公司持续投入合规。它们还形成一份有记录的善意合规档案，可在 FTC
              程序或学区合同谈判中作为合规项目有效运转的证据引用。
            calloutType: strength
            claimRefs:
              - CR036
              - CR037
              - CR038
              - CR039
          - type: callout
            title: SOC 2 鉴证和 CFIUS 解决是前置尽调项
            body: >
              投资交割前，投资人应要求：（1）SOC 2 Type II 鉴证或同等安全认证；（2）法律顾问就 CFIUS 敞口及任何缓释协议要求出具意见；（3）COPPA 2024
              修订合规缺口分析和补救时间表；（4）披露资产负债表和现金跑道，以评估财务风险。没有这四项，剩余风险无法充分评估。
            calloutType: recommendation
