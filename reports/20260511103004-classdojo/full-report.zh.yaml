            title: 技术架构细节无法独立验证
            body: >-
              ClassDojo Trust Center（classdojo.com/trust-center/）无法接受外部自动化审查。没有公开确认 SOC 2 认证、渗透测试频率、云服务商或基础设施可用性
              SLA。学区采购中，IT 负责人越来越常把 SOC 2 Type II 认证列为批准条件。缺少这一资质或无法确认这一资质，都可能成为后期采购阻断项。
