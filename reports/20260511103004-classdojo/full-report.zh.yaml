      - number: '3.4'
        title: 切换成本、锁定与多归属分析
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的切换成本按利益相关方呈不对称结构：教师高、家长低、学区中高。教师若已在单一课堂应用中积累多年 ClassDojo
              班级记录、行为积分历史和家长网络，迁移就需要让所有家长重新注册新平台——这在学年交界处也是有真实摩擦的沟通任务。因此，ClassDojo
              的年流失风险窗口主要出现在新学年或换校时，而不是学年中途，这给安装基数带来显著稳定性。家长切换成本低：孩子换老师时，家长加入或离开 ClassDojo；家长账号不存在有意义的数据锁定。学区切换成本更高：正式 IT
              审查、数据迁移担忧（从 SIS 同步的学生花名册数据）、合同重谈和员工再培训都会造成采购惯性。

              多归属很常见，既是风险也是验证。许多学区同时运行 ClassDojo（教师管理的课堂参与）和 ParentSquare（学区管理的群发沟通）。这种共存降低了 ClassDojo 近期被替代的风险，但也限制了
              ClassDojo 的企业合同潜力：当学区把 ClassDojo 视为课堂工具，而非学区沟通基础设施投资，预算意愿更小，采购权也落在校长而非 IT 负责人手中。ClassDojo
              Plus（消费者订阅）和通用消息应用之间也存在多归属：许多家长既保留 ClassDojo Plus 订阅，也维护孩子班级的 WhatsApp 群。

              既有系统的分发权力优势显著。PowerSchool 在约 15,000 多个学区的 SIS 渗透，形成天然家长门户交付渠道，无需额外采购。Google Workspace 在 IT
              管理的学校设备项目中被强制部署，意味着任何 ClassDojo 评估开始之前，Google Classroom 已经在场。这些既有厂商的分发杠杆，不是 ClassDojo
              的消费者病毒循环在学区采购层面能轻易抵消的。
