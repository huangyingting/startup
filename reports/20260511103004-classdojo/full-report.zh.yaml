  - number: 4
    title: 财务
    sections:
      - number: '4.1'
        title: 收入模型概览
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的收入模型只有一条公开确认的变现流：ClassDojo Plus，这是面向家长的消费者订阅，2018 年 Q4 以「Beyond School」上线，后更名为 ClassDojo
              Plus。产品价格为 $15.49/月或 $109.99/年——这是公司唯一公开披露的标价。ClassDojo 其他所有产品——核心课堂工具、家庭消息、学校和学区沟通、行为追踪，以及 ClassDojo for
              Districts 平台——都明确且永久地对教师、学生、学校和学区免费。公司公开承诺永远不向教师或学校收费，也永远不向用户展示广告。Plus
              订阅收入支撑整个平台的持续产品开发。这形成了少见的财务结构：ClassDojo 绝大部分产品开发努力服务于零收入用户群（教师和学区管理员），变现却完全取决于家长是否愿意为补充性家庭学习订阅付费。Forbes 在
              2022 年 7 月估计 ClassDojo 年化收入超过 $30M，这是最近的公开收入信号。2025 年，公司任命专门的企业销售负责人和 B2B 总经理，搭建了早期 B2B 企业销售职能；但截至 2026 年
              5 月，ClassDojo for Districts 仍然免费，尚无已确认的企业收入流。
