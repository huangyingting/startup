      - number: '7.2'
        title: 运营与安全风险——数据泄露、可用性、LLM 依赖
        blocks:
          - type: paragraph
            body: >
              ClassDojo 的运营风险集中在三条线。第一，数据安全：为 51M 用户（包括未成年人）存储行为、教育和沟通数据，会形成高价值、高后果攻击目标。Student Privacy Compass 和 BBB
              投诉记录提到的历史合规事项表明，ClassDojo 曾面临数据处理方面的担忧。IBM 2023 Cost of a Data Breach Report 给出的平均泄露成本为
              $4.45M；教育行业事件还会叠加声誉和监管放大器，可能远超直接成本。第二，平台依赖：ClassDojo 的教师和家长 App 完全通过 Apple App Store 和 Google Play
              分发。政策变化或下架会打断核心获客循环，而公开资料没有记录有意义的以 Web 为先的兜底方案。第三，AI 依赖：ClassDojo Sidekick AI 依赖第三方大语言模型 API。上游模型若涨价、API
              废止或质量下降，会带来利润率和产品风险。ESSER 之后，学区 IT 也在整合供应商名单；EdSurge 2024 报道称，刺激资金到期后学校正在做艰难取舍——这增加了 ClassDojo for
              Districts 无法进入学区采购预算的风险。
