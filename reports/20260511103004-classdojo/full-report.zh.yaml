      - number: '8.3'
        title: 情景分析
        blocks:
          - type: paragraph
            body: >
              三个情景锚定估值敏感性分析，每个情景都由 Plus 订阅转化、机构学区 ARR 和市场倍数的明确假设驱动。乐观情景假设 ClassDojo 成功将 50M+ 用户基础的 5-8% 转化为 Plus 订阅用户（约
              2.5-4M 个付费家庭，ARPU 约 $120），到 2027 年产生 $300-480M 消费 ARR，另有 $80-120M 机构学区合同；合计 $380-600M ARR，按 12-15x 收入倍数，对应
              $4.5-9B 企业价值。这要求学区销售动作显著跑赢 2025 年试点轨迹，并且 Plus 年流失率维持在低于 15%。基准情景预计 Plus 到 2027 年达到 1.5-2M 个付费家庭（$180-240M
              消费 ARR）和 $40-60M 机构收入（总计约 $220-300M ARR）；按 8-10x 倍数，企业价值落在 $1.75-3B。悲观情景建模 ESSER 悬崖预算削减使机构管线下降 30-50%，Plus
              订阅增长因竞争上升而在 1M 个家庭以下平台化，且 $90-110M 混合 ARR 的倍数压缩到 5-7x，估值为 $450-770M。主要下行触发器是 COPPA 2.0
              执法；同意令或产品变更命令会施加合规成本，并让机构销售周期放慢 12-18 个月。概率加权期望值（悲观 20%、基准 55%、乐观 25%）暗示 2026 年入场估值的参考区间为 $1.8-2.1B。
