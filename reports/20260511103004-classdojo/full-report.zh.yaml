      - number: '3.2'
        title: 直接竞争者画像
        blocks:
          - type: paragraph
            body: >
              Seesaw（seesaw.com）是 ClassDojo 最接近的直接产品竞争者。Seesaw 约 2012 年成立，定位为「小学学习体验平台」，面向 PreK-6 学校和学区销售一体化套件，包含
              LMS、学生作品集、AI 阅读课程和家庭沟通工具。平台在三个维度与 ClassDojo 竞争：师生互动、家长对课堂作业的可见度，以及行为反馈。不同于 ClassDojo，Seesaw
              只卖给学校和学区——没有单个教师授权或消费者订阅模式。Seesaw 仅提供企业定制合同（「Let's talk」），这限制了自下而上的病毒式分发渠道，但提高了机构承诺度。Seesaw 的 LMS
              相邻能力（学习管理、AI 阅读课程「700 多节基于阅读科学的 K-2 课程」）比 ClassDojo 现有产品范围更宽；如果学区寻求 LMS 整合，它可能构成替代威胁。

              ParentSquare（parentsquare.com）是领先的全学区沟通平台，品牌承诺是「每个家庭，知情并参与」。ParentSquare 由 Anu Bahri 于 2011
              年创立，提供群发通知、双向消息、表单 / 支付、出勤改善（Attendance Plus）、SIS 集成、学校网站，以及 130 多种语言双向翻译。2023 年 1 月与 Remind
              合并后，ParentSquare 组织服务 42,000 多所学校，覆盖超过 2000 万教育工作者和家庭。ParentSquare 把自己定位为学区行政平台，而非课堂教师工具；目标客户是 IT
              负责人、校长和沟通团队，而不是单个教师。这让它在许多部署中与 ClassDojo 互补，而非直接替代；但它直接竞争 ClassDojo 正在追逐的学区企业软件预算。

              Remind（remind.com）现在作为 ParentSquare 品牌运营。合并前，它曾是 ClassDojo 最直接的规模化竞争者，声称拥有约 3000 万用户、覆盖美国 80% 学校，并有约 200
              万教师在平台上。Remind 重点是基于手机的消息沟通，支持自动翻译成 90 多种语言，让没有智能手机应用也能实现公平沟通。Remind 品牌仍以自身产品界面独立运营。

              TalkingPoints（talkingpts.org）是使命驱动的 PreK-12 家庭参与平台，由 CEO Heejae Lim 创立，专注多语言和服务不足社区。2024 年一项覆盖大型城市学区约
              34,000 名学生的随机研究发现，启用 TalkingPoints 的沟通与停学率降低 43% 以及每年相当于多 3 周学习时间相关。TalkingPoints 在 2021 年 Series B 融资
              $24M，主要采用学区销售模式。虽然绝对规模小于 ClassDojo 或 ParentSquare，但 TalkingPoints 依靠公平证据、语言可及性和影响研究形成差异化；这种定位能打动 Title I
              学区，以及优先关注公平结果的资助方。

              Bloomz（bloomz.com）成立于 2013 年，提供统一的家长—教师沟通平台，包含 250 种语言沉浸式翻译、行为追踪、PBIS 支持和 AI 驱动消息。Bloomz 与 ClassDojo
              的核心功能集直接重叠，但市场渗透显著更小。最合适的定位是二线直接竞争者：尚未达到 ClassDojo 级别的分发或品牌认知。
