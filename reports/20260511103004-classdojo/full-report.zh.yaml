        - ~$500-550M ARR（估算）
        - 10-11x ARR
        - $5.7B（Bain Capital LBO，2024）
        - 企业 K-12 SaaS；学区强制采购；净收入留存强
        - SIS/ERP 不同于家校通信；仅机构收入；无消费者变现层
      - - Instructure（Canvas）
        - LBO 后 K-12 / 高教 LMS
        - ~$350-400M ARR（估算）
        - 6-8x ARR
        - $2.6B（KKR LBO，2020）
        - K-12 / 高教 LMS；以学校为中心的销售落地路径类似；附带专业服务
        - LMS 不同于家长参与；K-12 收入低于高教
      - - IXL Learning
        - 私有 K-12 自适应学习 + 学校业务
        - 超过 $300M ARR（估算）
        - 未披露
        - ~$2B+（估算，2022-2024）
