      - number: '1.4'
        title: 规模、用户与市场渗透
        blocks:
          - type: paragraph
            body: >
              截至 2026 年初，ClassDojo 披露全球用户超过 5000 万，覆盖教师、家长和学生。平台进入美国 95% 的 pre-K 到 8 年级学校，并在 180 多个国家运营，是全球部署最广的 EdTech
              平台之一。截至 2026 年初，公司员工约 479–488 人；以其规模看，团队规模稳定但克制。2026 年 3 月，ClassDojo 获得 International Society for
              Technology in Education 颁发的 ISTE Seal，代表其教育产品设计通过严格评估。平台互动指标强劲：据称，经 ClassDojo 发送的消息有 80%
              会在当天被阅读，说明用户已经形成日常使用习惯。公司的地理覆盖主要由美国采用推动，英国、UAE、泰国、新加坡及多个拉美国家是较强的次级市场。这种渗透深度带来显著网络效应，也抬高了校内社区的切换成本，因为教师、家长和管理员往往已深度嵌入平台工作流。分析师估计年收入在
              $74.7M 到 $120M 之间，但 ClassDojo 不公开确认这些数字。
