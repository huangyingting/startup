      - number: '4.4'
        title: 资本充足性与融资历程参照
        blocks:
          - type: paragraph
            body: >
              ClassDojo 自 2011 年以来完成九轮融资，累计约 $221M（TracXn）。截至 Series C 的融资历程见「公司概况」章节；本节聚焦前瞻资本充足性。最近披露事件是：（1）2022 年 7 月
              Tencent 以 $1.25B 投后估值领投 $125M Series D；（2）2024 年 3 月 4 日 Five Sigma 领投一轮未披露金额的延展轮。Five Sigma
              轮是最新外部资本信号，说明本报告运行日前约 26 个月公司仍有投资人支持。现金余额、烧钱速度和现金跑道均未公开披露。如果 2025-2026 年收入接近或超过 $50M（从 Forbes 2022 年中超过
              $30M 的数据外推），且员工数维持在 200-300 人，公司可能处于小幅烧钱或接近盈亏平衡。但这些都是分析师估计，没有内部财务数据无法确认。Tencent
              作为具有中国国家关联色彩的实体进入股权结构表，带来潜在地缘政治和学区采购风险（部分美国学区限制有中国所有权的软件），形成一项不出现在披露财务数据中的或有负债。未发现债务或项目融资工具；ClassDojo
              是轻资产业务，没有实物库存或资本密集型制造。
