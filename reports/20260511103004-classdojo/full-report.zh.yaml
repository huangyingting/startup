      - number: '2.4'
        title: 增长驱动因素与采用约束
        blocks:
          - type: paragraph
            body: >
              家长—教师沟通和 K-12 EdTech 市场同时受驱动因素和约束拉扯：COVID-19 与 ESSER 刺激把技术采用提前了，但后 ESSER 财政悬崖正在压缩许多学区的可自由支配 EdTech 预算。

              主要增长驱动因素：（1）移动设备饱和：全球家长智能手机渗透率超过 80%，无需学区硬件投入即可实现移动优先参与。ClassDojo
              的移动应用是家长主要触点，几乎消除了设备采购门槛。（2）家长参与研究：教育研究持续显示，积极的家长参与可让学生结果改善 15–20%。这套证据为学区采用参与工具提供了机构激励。（3）AI 与个性化：AI
              驱动的行为分析、翻译（ClassDojo 覆盖 180 多个国家，存在多语言需求）和个性化反馈循环等新功能，正在区分高级层并扩大可触达价值主张。（4）隐私标准化：National Data Privacy
              Agreements（NDPAs）和州级学生数据隐私框架扩散（到 2026 年超过 30 个州），形成合规门槛；大型成熟平台（具备隐私认证）比新进入者更容易跨过去。（5）学区整合趋势：K-12
              学区正主动整合技术供应商栈（受后 ESSER 审计压力推动），更偏好有广泛采用证据和合规文档的平台，而不是小众工具。

              主要采用约束：（1）ESSER 资金悬崖：$190B 的 COVID 时期 Elementary and Secondary School Emergency Relief 资金已在 2024 年 9 月 30
              日到期。McKinsey 分析发现，75% 学区认为 ESSER 配置中等或高度有效；但财政悬崖意味着每年约 $20–30B 的技术支出增量不再可用，压缩 2026 年及之后 EdTech
              供应商的新合同启动。（2）预算和切换成本：GAO 发现截至 SY 2021–22，ESSER 支出约 $60B；资金悬崖之后，学区回到疫情前 IT 预算。技术通常不到学校总预算的
              3%。LMS、SIS、课程和沟通平台之间的预算竞争激烈。（3）数字鸿沟：农村和高贫困学区的家长群体智能手机普及滞后，也可能缺少远程参与所需宽带连接，削弱平台效用。（4）隐私监管成本：遵守 COPPA、FERPA
              和州级学生数据隐私框架需要法律资源和持续审计能力。缺少成熟合规基础设施的小型 EdTech 竞争者门槛更高；但对 ClassDojo 来说，这是护城河而非约束。（5）教师倦怠和采用疲劳：超过 80%
              的公立学校报告疫情后学生行为问题增加。教师注意力有限；当工作负荷压力达到峰值，需要持续投入的平台会面临被弃用风险。
