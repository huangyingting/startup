      - number: '7.3'
        title: 合作伙伴与依赖风险——Tencent、应用商店、SIS 供应商、竞品
        blocks:
          - type: paragraph
            body: >
              ClassDojo 有五个实质外部依赖。（1）Tencent：Series D 领投方，隐含经济持股约 12.5%。作为具有中国国家关联色彩的实体，Tencent
              出现在股权结构表中，会给联邦政府和敏感学区客户带来 CFIUS 审查风险。公司未披露 CFIUS 申报或 NSA 缓释协议。（2）Apple/Google：App 分发垄断方。条款或技术认证变化可能使
              ClassDojo 从教师和家长设备上下架。（3）Clever/ClassLink：ClassDojo for Districts 依赖的 SIS
              花名册供应商，用于学区数据同步。任一供应商的定价或战略变化都会提高企业销售成本。（4）LLM API 供应商：Sidekick AI 后端，存在成本、质量和可用性风险。（5）竞争整合：ParentSquare 与
              Remind 合并（2023 年 1 月）后形成一个声称覆盖 42,000+ 学校的合并实体，直接竞争 ClassDojo 的学区沟通逻辑，并为 IT 负责人提供单一供应商替代方案。EdWeek 2024
              关于学校技术支出的报道确认，学区正在主动整合为更少供应商，这会加速 ClassDojo 在正面学区采购评估中被替代的风险。
