              K-12 EdTech 没有标准化市场边界。同一年（2025 年）的分析师估算从 $32B 到 $295B 不等，取决于口径。投资者若用 $295B TAM 框架测算 ClassDojo
              机会，就把服务器基础设施、硬件、高等教育和企业培训也算了进去——这些市场 ClassDojo 并不参与。最相关的可比市场（家长—教师沟通软件）2025 年全球规模约 $2B，意味着 ClassDojo
