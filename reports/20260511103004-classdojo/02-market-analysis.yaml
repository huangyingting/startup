callouts:
  - calloutType: strength
    title: Consumer-Led Viral Distribution Compresses CAC
    body: >
      ClassDojo's teacher-first, free-tier distribution model means approximately 3.5 million US teachers
      (and equivalents globally) act as unpaid sales agents by inviting parents to join their classroom.
      This viral loop produces near-zero customer acquisition cost for the free tier and creates a
      near-saturated installed base (95% US K-8 penetration) without enterprise sales motion. Most
      EdTech competitors with equivalent penetration have required district sales teams and multi-year
      procurement cycles to achieve comparable reach.
    claimRefs: [CM012, CM023]

  - calloutType: risk
    title: ESSER Cliff Compresses Enterprise Revenue Growth Window
    body: >
      The September 2024 expiry of $190B in ESSER federal education stimulus means district technology
      budgets are returning to pre-pandemic baselines after a 3-4 year spending boom. EdTech vendors
      that grew enterprise contracts on ESSER budgets — including communication platforms — face churn
      risk as districts prioritize mission-critical renewals (SIS, LMS) over supplementary engagement
      tools. ClassDojo's consumer Plus revenue partially insulates it from this risk, but enterprise
      licensing growth may stall through 2026 as districts adjust to stimulus-free budgets.
    claimRefs: [CM010, CM039]

  - calloutType: risk
    title: 9x Analyst TAM Divergence Signals Sizing Ambiguity
    body: >
      No standardized market boundary exists for K-12 EdTech. Analyst estimates for the same year
      (2025) range from $32B to $295B depending on scope. Investors using a $295B TAM frame to size
      ClassDojo's opportunity are including server infrastructure, hardware, higher education, and
      corporate training — markets ClassDojo does not participate in. The most relevant comparable
      market (parent-teacher communication software) is approximately $2B globally in 2025, implying
      ClassDojo commands 4-6% revenue penetration — a high-quality but concentrated market position,
      not an uncrowded greenfield.
    claimRefs: [CM024, CM029, CM031]


