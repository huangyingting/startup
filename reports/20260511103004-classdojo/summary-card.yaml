  topStrengths:
    - >-
      Dominant K-12 distribution with 95%+ US school penetration and 50M+ users creates near-irreplaceable teacher habit
      and parent network effects
    - >-
      Viral teacher-to-parent onboarding (one teacher recruits 20-30 parents) gives ClassDojo the only simultaneous
      consumer and institutional network-effect moat in EdTech
    - >-
      Total addressable market of ~$6.2B (K-12 communication + family engagement) growing at 13-15% CAGR with no
      dominant incumbent
    - >-
      ClassDojo for Schools institutional offering addresses a $2.4B district SaaS segment with lower churn and higher
      ARPU than consumer Plus
    - Strong brand trust among teachers and parents — top-2 parent communication app in US, 4.8-star App Store rating
  topRisks:
    - >-
      Revenue opacity: no confirmed ARR, Plus subscriber count, or churn data creates fundamental valuation uncertainty
      at $1.25B
    - >-
      COPPA 2.0 and FTC enforcement risk is elevated given under-13 user base; a consent decree could impose operational
      and cost constraints materially affecting the business model
    - >-
      Post-ESSER K-12 budget contraction (40%+ of districts reducing EdTech spend in 2025) slows institutional
      conversion of ClassDojo for Schools
    - >-
      ParentSquare has raised $100M+ and is rapidly displacing legacy communication tools at the district level,
      directly threatening ClassDojo institutional expansion
    - >-
      Tencent as lead Series D investor creates CFIUS and national-security headline risk that could impair IPO or
      strategic acquisition exit pathways
  unresolvedGaps:
    - >-
      ClassDojo ARR (confirmed), Plus subscriber count, and monthly churn rate — required for any credible DCF or
      comparable valuation
    - 'Cap table details: Tencent ownership percentage, liquidation preference stack, and pro-rata rights'
    - 'ClassDojo for Schools pipeline: ACV, renewal rates, and land-and-expand metrics'
    - 'COPPA 2.0 regulatory exposure: outstanding FTC correspondence and data-minimization roadmap'
    - 'International monetization roadmap: no confirmed Plus pricing or launch timeline for non-US markets'
