summary:
  headline: >-
    ClassDojo 手里有近乎不可撼动的 K-12 分发护城河，但 $1.25B 估值约等于未确认 ARR 的 12-13x，已经偏高；要在 2026-2028 退出窗口前补上估值缺口，Plus 转化必须加速，机构 SaaS
    也要拿出牵引力。
