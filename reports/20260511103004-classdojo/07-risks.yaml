  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: financial metrics and capital runway
      missingEvidence: "ClassDojo's ARR, MRR, burn rate, cash runway, and balance sheet are entirely undisclosed. No Series E or bridge financing has been announced since the July 2022 Series D."
      whyItMatters: "Without financial metrics, investors cannot assess whether ClassDojo is capital-constrained, approaching a forced fundraise, or financially healthy. Capital risk is a blocking diligence gap."
      diligencePath: "Request audited financials or management accounts; obtain cash balance, burn rate, and runway as of Q1 2026; confirm next capital need timeline."
      relatedQuestionRefs: [QR018, QR022]

    - type: private-evidence-only
      severity: blocking
      topic: subscriber retention and unit economics
      missingEvidence: "ClassDojo Plus subscriber count, monthly churn rate, CAC, and LTV are not disclosed. The B2C revenue thesis cannot be validated without these metrics."
      whyItMatters: "If Plus subscriber churn exceeds 3% monthly, the B2C revenue model is structurally impaired. This is the highest-priority financial diligence item."
      diligencePath: "Request Plus subscriber cohort data for 2022 to 2026; obtain monthly churn, NRR, and LTV; compare to Duolingo Plus as a benchmarked EdTech analog."
      relatedQuestionRefs: [QR022]

    - type: enumeration-incomplete
      severity: material
      topic: regulatory legal risk register
      missingEvidence: "Enumeration limited to FTC public records, Student Privacy Compass, and known state laws. Private litigation, non-public regulatory correspondence, and state AG investigations are not captured."
      whyItMatters: "Undisclosed regulatory or legal proceedings could materially affect ClassDojo's ability to operate, close district contracts, or raise capital."
      diligencePath: "Request legal rep letter from ClassDojo's outside counsel; obtain disclosure of all pending or threatened litigation, regulatory inquiries, and consent decree monitoring status."
      relatedQuestionRefs: [QR005, QR007]
      relatedTableRefs: [TR001]

    - type: missing-source
      severity: material
      topic: security certifications and SOC 2 status
      missingEvidence: "No SOC 2 Type II attestation, ISO 27001 certification, or independent penetration test result has been disclosed for ClassDojo's platform."
      whyItMatters: "Absence of security certification is an increasing blocker for district procurement. Without SOC 2, ClassDojo may lose district contracts to certified competitors."
      diligencePath: "Request SOC 2 Type II report; confirm bug bounty program and vulnerability disclosure policy; obtain penetration test summary."

    - type: missing-source
      severity: material
      topic: CFIUS review status and mitigation agreement
      missingEvidence: "No public CFIUS filing, voluntary notice, or NSA mitigation agreement related to Tencent's Series D investment has been found."
      whyItMatters: "Without a CFIUS mitigation agreement, ClassDojo may be prohibited from certain government-connected district sales, reducing addressable market and creating investment timing risk."
      diligencePath: "Engage CFIUS counsel to assess exposure; determine whether a voluntary notice or mitigation agreement is required; review RESTRICT Act applicability."

    - type: stale
      severity: minor
      topic: COPPA 2024 amendment compliance status
      missingEvidence: "No public statement or compliance update from ClassDojo has addressed the December 2024 COPPA amendments (effective July 2025) as of report date."
      whyItMatters: "Non-compliance from the July 2025 effective date would expose ClassDojo to enforcement risk as a documented repeat offender under the 2019 consent decree."
      diligencePath: "Request ClassDojo's 2024-amendment compliance gap analysis and remediation timeline; confirm legal counsel has reviewed updated EdTech provisions."

