callouts:
  - id: CAL1
    calloutType: risk
    title: "FTC enforcement history creates elevated re-enforcement risk under 2024 COPPA amendments"
    body: >
      ClassDojo's 2019 FTC consent decree means any new COPPA violation would be treated as a repeat offense,
      carrying significantly higher civil penalties under current FTC authority. The December 2024 COPPA amendments
      increase the compliance surface, particularly for EdTech operators using school-authorized teacher data
      collection. If ClassDojo's current program does not meet the July 2025 effective date requirements, it faces
      material enforcement risk as a documented repeat offender.
    claimRefs: [CR001, CR002, CR003]

  - id: CAL2
    calloutType: risk
    title: "Tencent investment creates unresolved geopolitical and procurement risk"
    body: >
      Tencent's lead of the $125M Series D creates a CFIUS exposure that has not been publicly resolved through
      an NSA or other mitigation agreement. For ClassDojo to access federal EdTech procurement or state contracts
      with national security sensitivities, this risk must be addressed. The absence of any public CFIUS filing
      or mitigation is itself a diligence gap, as any restriction would materially affect the addressable market.
    claimRefs: [CR008, CR019]

  - id: CAL3
    calloutType: strength
    title: "Mitigation stack is above average for the EdTech category"
    body: >
      Common Sense Privacy Seal (2023), ISTE Seal (March 2026), Student Privacy Pledge signatory status, TEC DPA
      (2025), and SDPC registry listing collectively provide procurement-grade privacy signals that most EdTech
      competitors lack. These certifications reduce district friction and demonstrate sustained compliance investment.
      They also create a documented record of good-faith compliance that can be cited in FTC proceedings or district
      contract negotiations as evidence of a functioning compliance program.
    claimRefs: [CR036, CR037, CR038, CR039]

  - id: CAL4
    calloutType: recommendation
    title: "SOC 2 attestation and CFIUS resolution are pre-condition diligence items"
    body: >
      Before investment close, investors should require: (1) SOC 2 Type II attestation or equivalent security
      certification; (2) legal counsel opinion on CFIUS exposure and any mitigation agreement requirement;
      (3) COPPA 2024 amendment compliance gap analysis and remediation timeline; (4) disclosure of balance sheet
      and cash runway to assess financial risk. Without these four items, residual risk cannot be adequately assessed.
    claimRefs: [CR009, CR028, CR031, CR040]

