  - id: TU005
    title: Expansion and Concentration Risk Assessment
    claimRefs: [CU030, CU031, CU032, CU033, CU034, CU035]
    notes: "Concentration and expansion assessments are analyst inferences based on public product and company data. No revenue, pipeline, or concentration figures have been disclosed by ClassDojo."
    columns:
      - Expansion Driver or Risk
      - Concentration Type
      - Impact
      - Diligence Path
    rows:
      - - Teacher-to-district enterprise upsell (ClassDojo for Districts)
        - Revenue model concentration
        - High — entire B2B revenue thesis depends on converting free teacher presence to enterprise purchase
        - Confirm pipeline size, ACV, win rate, and conversion time; validate with 2025 hire ramp metrics
      - - Plus subscriber revenue (parent-side)
        - Product concentration — single B2C SKU
        - High — no public revenue diversification beyond Plus; price sensitivity in parent segment
        - Obtain subscriber count, monthly churn, and LTV; compare to Duolingo Plus as edtech analog
      - - US K-8 saturation (95% schools)
        - Geographic concentration
        - Medium — organic US growth limited; international monetization unproven
        - Quantify international Plus revenue share; assess product localization investment
      - - Apple / Google app store distribution
        - Platform dependency
        - Medium — policy changes or de-listing would disrupt teacher and parent access
        - Confirm web fallback capability; assess percentage of sessions via browser vs native app
      - - Top-district customer concentration
        - Customer concentration
        - Unknown — no customer revenue breakdown disclosed
        - Request top-10 district ARR as percentage of total; confirm whether TEC constitutes >10% of district revenue

