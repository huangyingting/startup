    title: Customer Segmentation by Buyer / User / Payer Role
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006]
    notes: "Segment scale figures are company-claimed (ClassDojo 2021–2022); current figures are estimates only. Revenue / strategic value entries reflect analyst inference, not disclosed financials."
    columns:
      - Segment
      - Buyer / User / Payer
      - Use Case
      - Scale (claimed)
      - Revenue / Strategic Value
      - Key Evidence Gap
    rows:
      - - Teachers (K-8)
        - User (not buyer); free self-serve adoption
        - Behavior management, messaging, class portfolio, Sidekick AI lesson planning
        - "2M+ teachers (2014 baseline; current unknown)"
        - Core viral acquisition engine; not directly monetized
        - No current MAU or active-teacher count disclosed
      - - Parents
        - Payer (Plus sub) and User (free messaging)
        - Receive student updates, communicate with teacher, purchase Plus for advanced features
        - "51M total users incl. parents (2022 baseline)"
        - Primary B2C revenue stream (~$7.99/mo Plus sub)
        - Subscriber count and conversion rate not disclosed
      - - School Districts (US)
        - Buyer (enterprise license — ClassDojo for Districts)
        - SIS rostering, admin dashboards, privacy compliance, district-wide deployment
        - "Hundreds of districts implied; TEC (90+ districts) confirmed"
        - Emerging B2B revenue; pricing not disclosed
        - No ARR or district count disclosed; pipeline depth unknown
      - - Students (K-8)
        - User; not a buyer or payer
        - Dojo Islands virtual world, Big Ideas SEL app, class reward tracking
        - "51M total users includes students"
        - No direct monetization; retention flywheel for teacher/parent stickiness
        - Engagement metrics (DAU, session length) not disclosed
      - - International Users
        - Users across 180+ countries; monetization unconfirmed
        - Same teacher/parent/student roles as US; localized languages
        - "180+ countries (company-claimed)"
        - Unknown; US Plus pricing suggests US-centric monetization
        - International revenue, conversion rate, and product localization depth unknown

