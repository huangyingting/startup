slug: classdojo
runDate: "2026-05-11"
company:
  name: ClassDojo

chapter:
  number: 6
  title: Customers
  summary: >
    ClassDojo claims penetration in 95% of US K-8 schools and 51 million users across 180 countries as of 2022, with
    two million or more teachers as its primary viral adoption channel. The platform monetizes via ClassDojo Plus
    (parent subscription, ~$7.99/month) and ClassDojo for Districts (enterprise B2B). Teacher adoption is self-serve
    and free, creating a bottom-up network effect that drives parent enrollment. Named district-level customer proof
    is thin: the clearest reference is The Education Cooperative (TEC), covering 90-plus member districts, which
    signed a data processing agreement in 2025. NRR, churn rate, monthly active users, and subscriber counts are not
    publicly disclosed. The EdSurge 2022 investigation surfaced mixed teacher sentiment on behavior tracking, while
    Common Sense Education reviews are broadly positive. International revenue remains unquantified. District
    concentration risk and enterprise pipeline depth are material open questions.

sections:
  - id: S1
    title: Customer Segments — Who Uses and Pays for ClassDojo
    body: >
      ClassDojo operates a two-sided education network with three distinct user roles and two buyer roles.
      Teachers are the primary adopters: the platform is free, and class setup takes minutes. Once a teacher
      creates a class, parents receive invitations and must join to receive updates — making parents secondary
      adopters driven by teacher decisions. Students interact via Dojo Islands (3D virtual world), ClassDojo Big
      Ideas (SEL content app), and the main classroom portal. No direct student monetization exists. The paying
      segments are parents (ClassDojo Plus subscription) and school districts (ClassDojo for Districts enterprise
      tier). The teacher → parent viral funnel is the platform's core customer acquisition engine and creates
      structural dependence on continued teacher adoption. International usage spans 180+ countries, but monetization
      appears heavily US-weighted given Plus pricing in USD and the district product's US-focused compliance posture.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: S2
    title: Adoption Trajectory — Scale Evidence and Growth Signals
    body: >
      ClassDojo's most frequently cited adoption statistic — 95% of US K-8 schools and 51 million global users —
      originates from its May 2021 Series D fundraising context and has been echoed by TechCrunch, Bloomberg,
      Education Week, and EdSurge. No independently audited MAU or DAU figure has been published. The 2M+ teacher
      claim dates to at least 2014; the current figure is unknown. Growth post-2022 is implied by new product
      launches (ClassDojo for Districts, Sidekick AI) and leadership hires (three enterprise executives in 2025) but
      not quantified. The ISTE Seal grant in March 2026 signals ongoing institutional endorsement. EdSurge's 2021
      Series D coverage confirmed the unicorn valuation at $1 billion, corroborated by Bloomberg, Axios, and
      Education Dive. HolonIQ cited ClassDojo among top edtech platforms globally. NWEA research on K-12 technology
      use confirms communication apps (the category ClassDojo leads) as among the most widely deployed school
      technology tools in the US.
    claimRefs: [CU009, CU010, CU011, CU012, CU013, CU014, CU015, CU016]
    tableRefs: [TU002]
    figureRefs: [FU002]

  - id: S3
    title: Named Customer Proof — Teacher, School, and District Evidence
    body: >
      Public named customer proof is limited for a platform of ClassDojo's claimed scale. The strongest reference
      is The Education Cooperative (TEC), a consortium serving 90-plus Massachusetts school districts, which executed
      a formal data processing agreement with ClassDojo in 2025 to enable ClassDojo for Districts deployment. This
      is a production-grade, district-level commitment. Common Sense Education's reviewer community (teachers,
      instructional coaches) consistently rates ClassDojo between 4 and 5 stars across hundreds of reviews, with
      strong marks for parent communication and ease of use. G2's parent-teacher communication category lists
      ClassDojo as a recognized platform. The EdSurge 2022 investigative piece provided teacher and administrator
      perspectives that were mixed: positive on communication efficiency, critical on behavior-tracking pedagogy.
      Bloomerang and HolonIQ secondary research cite ClassDojo as a dominant player versus Seesaw and ParentSquare,
      but no production outcome data (test scores, attendance, engagement lift) is publicly documented at any
      named district level.
    claimRefs: [CU017, CU018, CU019, CU020, CU021, CU022, CU023, CU024]
    tableRefs: [TU003]
    figureRefs: [FU003]

  - id: S4
    title: Retention and Durability — Stickiness Drivers and Absent Metrics
    body: >
      ClassDojo's retention architecture is structurally embedded in the school calendar: teachers build class
      rosters, award histories, and parent communication histories on the platform each academic year. Switching
      requires re-onboarding parents and losing accumulated engagement data. However, the annual year-start
      re-enrollment moment creates a natural churn window where teachers can select alternatives. No NRR, GRR,
      teacher churn rate, or Plus subscriber renewal rate has been disclosed. Common Sense Education and G2 reviews
      show broadly positive sentiment among active users, but do not capture teachers who left the platform. The
      EdSurge 2022 article documented skeptical perspectives from teachers who either stopped using or never adopted
      ClassDojo's behavior-tracking feature, reflecting a potential silent-churn cohort. NEA survey data on
      parent-teacher communication apps shows increasing adoption of dedicated apps in this category, directionally
      supporting ClassDojo's positioning, but does not name ClassDojo specifically. NWEA research on technology
      use in schools confirms communication platforms exhibit high school-year persistence once adopted.
    claimRefs: [CU025, CU026, CU027, CU028, CU029]
    tableRefs: [TU004]
    figureRefs: [FU004]

  - id: S5
    title: Expansion and Concentration Risk — Land-and-Expand and Revenue Dependencies
    body: >
      ClassDojo's expansion pathway runs from free teacher adoption → individual parent Plus conversion → district
      awareness → enterprise ClassDojo for Districts license. This funnel leverages the installed base of 95% US
      K-8 school presence to build a B2B upsell layer. The 2025 TEC agreement and the 2025 enterprise leadership
      hires (Michael Bell, Jeff Buening, Chad Stevens) are the clearest signals of the B2B revenue push. Revenue
      concentration risk is high: Plus subscription revenue depends on parent willingness to pay in a free-adjacent
      market (Seesaw, Remind, and ParentSquare all offer free tiers), and district revenue is untested at scale.
      International monetization is not quantified. The top-10 district revenue concentration is unknown. Platform
      distribution dependence on Apple App Store and Google Play introduces an external risk layer. No evidence of
      channel partner revenue or reseller agreements exists in public sources.
    claimRefs: [CU030, CU031, CU032, CU033, CU034, CU035]
    tableRefs: [TU005]

tables:
