  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: subscription and district revenue metrics
      missingEvidence: "ClassDojo Plus subscriber count, monthly churn rate, ARPU, and ClassDojo for Districts ARR are all private and not disclosed in any public filing or press release."
      whyItMatters: "Without subscriber and revenue retention data, investors cannot assess whether the monetization model converts platform scale into durable revenue or whether Plus churn undermines the B2C thesis."
      diligencePath: "Request audited or management-reported MRR, subscriber count, monthly churn, CAC, and LTV for Plus; request ARR, ACV, and renewal rate for ClassDojo for Districts."
      relatedQuestionRefs: [QU015, QU016]

    - type: private-evidence-only
      severity: blocking
      topic: revenue retention (NRR and GRR)
      missingEvidence: "Net Revenue Retention and Gross Revenue Retention for both Plus and Districts are entirely undisclosed. No cohort, renewal, or expansion data has been published."
      whyItMatters: "NRR is the single most important SaaS health metric. Without it, the claim that ClassDojo's embedded teacher network creates durable retention cannot be validated."
      diligencePath: "Obtain NRR and GRR from management; compare Plus cohort renewal to edtech SaaS benchmarks; request 3-year subscriber cohort data."
      relatedQuestionRefs: [QU021]

    - type: enumeration-incomplete
      severity: material
