callouts:
  - id: CAL1
    calloutType: strength
    title: "Bottom-up viral growth at extraordinary K-8 scale"
    body: >
      ClassDojo's 95% US K-8 school penetration and 51M global users — if current — represent a structural moat
      that is nearly impossible to replicate with marketing spend. Teacher adoption is zero-cost and self-service;
      parent enrollment follows automatically. No edtech communication competitor has publicly claimed comparable
      penetration, and network effects intensify with each school year of accumulated class data.
    claimRefs: [CU001, CU002, CU011]

  - id: CAL2
    calloutType: risk
    title: "Named district customer proof is thin relative to claimed school penetration"
    body: >
      Despite claiming presence in 95% of US K-8 schools, ClassDojo's only publicly documented production-grade
      district reference is the TEC consortium DPA (2025). No named school district has published an outcome study,
      nor has ClassDojo released a customer case study with measurable results. The gap between claimed penetration
      and named proof creates diligence risk: teacher-level usage may not translate to district-level procurement
      at scale.
    claimRefs: [CU017, CU018, CU024]

  - id: CAL3
    calloutType: risk
    title: "Absence of NRR, MAU, and churn data prevents retention assessment"
    body: >
      ClassDojo discloses no Net Revenue Retention, Gross Revenue Retention, monthly active users, or teacher churn
      rate. For a platform whose monetization depends on Plus subscriber renewals and district contract renewals,
      this is a material diligence gap. Investors cannot assess whether the reported 51M user base is growing,
      stable, or in silent decline without these metrics.
    claimRefs: [CU025, CU021]

  - id: CAL4
    calloutType: insight
    title: "Land-and-expand trajectory is strategically sound but unproven at revenue scale"
    body: >
      The teacher-to-district enterprise upsell model is logically coherent: districts observe ClassDojo already
      deployed across their schools and can purchase a formal enterprise tier rather than displace an established
      platform. The 2025 TEC agreement and three enterprise leadership hires signal execution intent. However,
      no revenue from ClassDojo for Districts has been publicly reported, and the ACV, sales cycle, and win rate
      remain unknown.
    claimRefs: [CU032, CU033, CU013]

