callouts:
  - calloutType: strength
    title: Unmatched U.S. K-8 Penetration
    body: >
      ClassDojo's claimed 95% U.S. K-8 school penetration is extraordinary even among market leaders and
      creates powerful network effects. The critical mass of classrooms entrenched on the platform makes
      competitive displacement extremely difficult, particularly in the elementary school segment.
    claimRefs: [CO005, CO038]

  - calloutType: risk
    title: Student Privacy as a Sustained Vulnerability
    body: >
      ClassDojo's extensive behavioral and activity data collection on children, especially those under 13,
      continues to attract academic criticism and consumer complaints. New COPPA rules effective April 2026
      tighten requirements on biometric data and third-party sharing. Any enforcement action or high-profile
      breach would disproportionately damage user trust, given that the platform's brand is built on
      trust within the school community.
    claimRefs: [CO030, CO031, CO032, CO040]

  - calloutType: insight
    title: Freemium-to-B2B Evolution
    body: >
      ClassDojo's deliberate strategic evolution from a pure consumer-freemium model toward enterprise
      district contracts—evidenced by the 2025 executive hires in enterprise sales and B2B general
      management—signals an attempt to diversify revenue and improve predictability. This mirrors the
      playbook of Zoom and Slack, who initially dominated at the individual level before converting
      organizations as buyers.
    claimRefs: [CO027, CO037, CO044]

