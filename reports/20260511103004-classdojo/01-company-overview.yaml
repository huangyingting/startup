company:
  name: ClassDojo
chapter:
  number: 1
  title: Company Overview
  summary: >
    ClassDojo is a San Francisco-based K-12 education technology company founded in 2011 by Sam Chaudhary
    (CEO) and Liam Don (President), reaching 50M+ users in 180+ countries and 95% of U.S. K-8 schools. The
    company raised $221M across nine rounds, achieving unicorn status at a $1.25 billion valuation in 2022
    (Series D, led by Tencent), and operates a freemium model with ClassDojo Plus family subscriptions and
    growing district-level B2B licensing. Privacy compliance and data stewardship remain key strategic priorities
    as new COPPA regulations took effect in April 2026.

sections:
  - id: identity-business-overview
    title: Identity and Business Overview
    body: >
      ClassDojo is a K-12 educational technology platform headquartered in San Francisco, California,
      founded in August 2011 by Sam Chaudhary and Liam Don. The company's stated mission is to "give
      every child on Earth an education they love," and it pursues this through a freemium communication
      and classroom-management platform connecting teachers, students, and families. ClassDojo is
      incorporated as a private company and has not disclosed plans for an initial public offering
      as of May 2026. The core product is free to teachers, students, and families, with revenue
      generated through ClassDojo Plus (a premium parent subscription) and ClassDojo for Districts
      (a B2B licensing model for school administrators). Pricing for ClassDojo Plus stood at
      approximately $15.49/month or $109.99/year in the United States as of 2026. The platform
      offers automatic message translation into 130+ languages, making it particularly valuable in
      linguistically diverse U.S. markets and internationally. ClassDojo's sector is consumer
      education technology (EdTech), with a focus on K-8 school communication and social-emotional
      learning (SEL) infrastructure. The company reached a unicorn valuation of $1.25 billion in
      July 2022, and analysts estimate annual revenue in the range of $74–120 million, though
      ClassDojo does not publicly disclose financial metrics.
    claimRefs: [CO001, CO004, CO017, CO018, CO036, CO019]
    tableRefs: [TO001]
    figureRefs: [FO003]

  - id: founders-leadership-governance
    title: Founders, Leadership, and Governance
    body: >
      ClassDojo was co-founded by Sam Chaudhary (CEO) and Liam Don (President), both of whom remain
      at the helm of the company as of May 2026. Chaudhary was born in London, studied at the University
      of Cambridge, and previously worked at McKinsey & Company before founding ClassDojo. He was named
      an EY Entrepreneur Of The Year 2025 Bay Area winner, reflecting industry recognition of the
      company's scale and impact. Liam Don, who holds a computer science background from Cambridge,
      serves as President and oversees product vision and technical strategy. The executive team
      includes Dominick Bellizzi as Chief Technology Officer and Partha Tallavajhala as Chief Product
      Officer. In early 2025, ClassDojo added three new senior executives: Michael Bell (Head of
      Enterprise Sales), Jeff Buening (General Manager, B2B), and Chad A. Stevens, Ph.D. (Head of
      K-12 Engagement), signaling an intensified focus on enterprise district sales. The board includes
      Hemant Taneja (General Catalyst), Tod Francis (Shasta Ventures), Tim Brady (independent), and
      Nikhil Basu Trivedi and Michael Moe as board observers. The co-founders' dual roles as operator
      and board-level participants and the concentration of institutional knowledge in Chaudhary and
      Don represent a meaningful key-person dependency risk, particularly for a company of this scale.
    claimRefs: [CO002, CO003, CO014, CO015, CO020, CO021, CO022, CO026, CO027, CO033]
    tableRefs: [TO002]

  - id: funding-history-capital
    title: Funding History and Capital Structure
    body: >
      ClassDojo has raised approximately $221 million across nine funding rounds since inception.
      The company launched with seed capital and Y Combinator backing in 2011-2012, followed by a
      Series A of $8.5 million in 2014 led by Shasta Ventures with participation from General Catalyst,
      SoftTech VC, and Felicis Ventures. The Series B of $21 million (April 2016) was led by General
      Catalyst with GSV Ventures, Reach Capital, and SignalFire participating. A Series C of $35
      million was announced in February 2018, co-led by GSV Ventures and SignalFire, with proceeds
      earmarked for building a consumer-facing subscription business. The landmark Series D of $125
      million in July 2022 was led by Tencent and valued ClassDojo at $1.25 billion, conferring
      unicorn status. A Series D extension involving Five Sigma as new institutional investor closed
      in March 2024 at an undisclosed amount. Notable investor Hemant Taneja of General Catalyst has
      been a long-term backer and board member. ClassDojo has no publicly disclosed debt facilities or
      secondary transactions on record. The company's capital structure is private and closely held,
      with no publicly available cap table or secondary-market pricing data.
    claimRefs: [CO008, CO009, CO010, CO011, CO012, CO028, CO043, CO045]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: scale-users-penetration
    title: Scale, Users, and Market Penetration
    body: >
      As of early 2026, ClassDojo reports over 50 million users globally, including teachers, parents,
      and students. The platform is used in 95% of U.S. pre-K through 8th grade schools and operates
      in 180+ countries, making it one of the most widely deployed EdTech platforms worldwide. Headcount
      stands at approximately 479–488 employees as of early 2026, reflecting a stable but measured
      team size for a company at its scale. ClassDojo achieved an ISTE Seal for high-quality product
      design in education in March 2026, awarded by the International Society for Technology in
      Education after a rigorous evaluation. The platform's engagement metrics are strong: 80% of
      messages sent via ClassDojo are reportedly read the same day, an indicator of habitual daily
      use. The company's geographic reach is primarily driven by U.S. adoption, with strong secondary
      markets in the United Kingdom, UAE, Thailand, Singapore, and several Latin American countries.
      This depth of penetration creates significant network effects and high switching costs within
      school communities, as teachers, parents, and administrators are often deeply embedded in the
      platform's workflow. Annual revenue is estimated by analysts between $74.7 million and $120
      million, though ClassDojo does not confirm these figures publicly.
    claimRefs: [CO005, CO006, CO007, CO013, CO016, CO038, CO039]
    figureRefs: [FO002]

  - id: milestones-adverse-events
    title: Key Milestones and Adverse Events
    body: >
      ClassDojo's history spans 15 years of growth from a classroom behavior-tracking app to a
      comprehensive K-12 communication ecosystem. The platform launched in beta in July 2011 and
      was adopted by 80 teachers in its first week; by its first anniversary, it had grown to
      9.6 million users across 30+ countries. Major product launches have included Class Story
      (2015), student portfolios (2015), Dojo Islands—a gamified virtual learning world (2022+),
      and AI-assisted teacher tools (2025-26). Regulatory milestones include obtaining iKeepSafe
      certification, a Common Sense Privacy Seal, and, in March 2026, the ISTE Seal. The August
      2025 partnership with The Education Cooperative (TEC) under the National Data Privacy
      Agreement (NDPA) framework, covering FERPA and COPPA compliance in 14 states, represents
      a significant enterprise-channel enablement. Adverse events include ongoing academic and
      community criticism of ClassDojo's behavioral data collection practices. A 2025
      peer-reviewed article problematized "datafied" student behavioral records and their
      potential for misuse. Consumer review platforms and the Better Business Bureau record
      complaints about billing, technical difficulties, and parental concerns over data handling.
      These adverse signals, while not involving formal regulatory enforcement as of May 2026,
      represent reputational risk that the company actively manages through privacy certifications
      and pre-approved data agreements.
    claimRefs: [CO023, CO024, CO025, CO030, CO031, CO032, CO034, CO035, CO040, CO041, CO042]
    tableRefs: [TO004]

