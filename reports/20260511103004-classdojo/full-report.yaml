appendices:
  - id: A
    title: Key Diligence Asks Before Investment
    blocks:
      - type: callout
        calloutType: recommendation
        title: 'P0: Confirmed ARR and Plus Unit Economics'
        body: >-
          Request the audited or management-confirmed ARR, Plus subscriber count, monthly churn rate, and ARPU breakdown
          (consumer vs. institutional). This is the single most critical data gap blocking a credible investment
          decision. All valuation scenarios hinge on whether ARR is closer to $74M (bear) or $120M (bull).
        claimRefs:
          - CV001
          - CV002
          - CV003
      - type: callout
        calloutType: recommendation
        title: 'P0: Cap Table and Preference Stack'
        body: >-
          Request the fully-diluted cap table, liquidation preference details, anti-dilution provisions, and Tencent's
          CFIUS compliance posture. The Tencent overhang is a structural exit impediment that must be evaluated before
          committing capital.
        claimRefs:
          - CV034
      - type: callout
        calloutType: risk
        title: 'P1: COPPA/FTC Regulatory Status'
        body: >-
          Obtain management's written assessment of COPPA 2.0 exposure, any outstanding FTC correspondence, and the data
          minimization roadmap. The under-13 user base makes ClassDojo one of the highest-profile COPPA enforcement
          targets in EdTech.
        claimRefs:
          - CR015
          - CR016
      - type: list
        title: Additional Diligence Items
        items:
          - 'ClassDojo for Schools: ACV, renewal rates, district pipeline, and competitive win/loss vs. ParentSquare'
          - 'International monetization: Plus launch timeline and pricing for top-5 non-US markets'
          - Liam Don succession and engineering leadership depth given CTO-concentration risk
          - 'Dojo Islands AI: MAU, retention data, and cost-per-session for the AI tutoring feature'
        claimRefs: []
