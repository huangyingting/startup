      - number: '5.2'
        title: Technology Architecture and Platform
        blocks:
          - type: paragraph
            body: >
              ClassDojo operates as a cloud-native SaaS platform delivered across iOS, Android, and web browsers. The
              mobile apps (iOS and Android) have been the primary interface since 2011, with a complementary web
              application for district administrators and teachers requiring desktop workflows. The platform supports
              real-time messaging, push notifications, and media sharing (photos, videos, stories), which requires
              robust infrastructure for asynchronous and synchronous communication at scale.

              ClassDojo Sidekick, introduced in 2024, integrates AI capabilities directly into the teacher product for
              lesson planning, feedback generation, and personalized student progress insights. Dojo Islands is a 3D
              virtual world requiring additional client-side rendering investment. ClassDojo for Districts supports
              district-level SIS rostering integrations (Clever, ClassLink are standard for this segment), single
              sign-on (SSO), bulk provisioning, and district-level reporting. The platform has maintained continuous
              operation at 51M+ student scale, suggesting a mature cloud infrastructure backbone.

              Specific cloud provider, backend programming language, and engineering tooling details are not publicly
              disclosed. ClassDojo's 2025 job postings reference React, TypeScript, and backend roles, providing
