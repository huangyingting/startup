              for commercial purposes.

              ClassDojo for Districts includes dedicated privacy agreement infrastructure (SDPA) and has built
              standardized district data processing agreements covering 14 states through the TEC partnership. This
              streamlines procurement for IT directors who need legal cover for student data. However, ClassDojo's Trust
