      - number: '5.4'
        title: Trust, Privacy, and Compliance
        blocks:
          - type: paragraph
            body: >
              ClassDojo has invested significantly in student data privacy credentials — its strongest differentiator
              against competitors in regulated K-12 procurement. Key certifications: Common Sense Privacy Seal (achieved
              July 2023, indicating 84%+ privacy score on the Common Sense framework); ISTE Seal of Learning Design
              (March 2026); SDPC listing (Student Data Privacy Consortium, recognized across US states); TEC SDPA (The
