    title: Thesis-Break and Kill Triggers Table
    description: Monitorable triggers that would materially weaken or invalidate the ClassDojo investment thesis.
    columns:
      - Risk
      - Monitorable Trigger
      - Threshold / Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - ESSER cliff — institutional budget collapse
        - US district EdTech budget announcements; RFP activity; ClassDojo for Districts pipeline
        - Districts pipeline declines over 40% YoY or average ACV drops below $1.50/student
        - Institutional revenue pillar fails; TAM for B2B contraction materially reduces EV
        - Reassess to Bear case; reduce entry price by 30-40%
      - - COPPA 2.0 enforcement or consent decree
        - FTC enforcement database; press monitoring; ClassDojo trust-center updates
        - FTC opens investigation, issues CID, or announces consent decree against ClassDojo
        - Compliance cost spike; district procurement freeze; potential product change mandate
        - Put on hold pending outcome; run regulatory probability-weighted scenario
      - - Plus subscriber churn exceeds threshold
        - Monthly subscriber cohort data via app store signals, partner disclosures
        - Annual Plus churn exceeds 30% or net subscriber count declines two consecutive quarters
        - Consumer ARR pillar fails; bull case impossible without re-acquiring lapsed subscribers
        - Reassess to Bear case; request full churn cohort data
      - - Key executive departure (CEO/President)
        - LinkedIn, press monitoring, ClassDojo careers and blog
        - Sam Chaudhary or Liam Don departs company without planned succession
        - Key-person risk materializes; institutional investor confidence falls; deal process risk
        - Pause; conduct deep succession diligence before any new commitment
      - - ParentSquare wins major competitive displacement
        - School district contract announcements; district-issued technology RFPs
        - ParentSquare displaces ClassDojo in over 500K student district or wins 10+ major district renewals
        - Network effects in affected districts erode; B2B revenue and referral loop impaired
        - Reassess moat assumptions; conduct win/loss interview program
