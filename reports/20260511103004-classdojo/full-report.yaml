      - number: '3.2'
        title: Direct Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              Seesaw (seesaw.com) is ClassDojo's closest direct product competitor. Founded around 2012 and positioned
              as an "elementary learning experience platform," Seesaw markets to PreK-6 schools and districts with an
              integrated suite of LMS, student portfolio, AI-based reading curriculum, and family communication tools.
              The platform competes with ClassDojo on three dimensions: teacher-student engagement, parent visibility
              into classroom work, and behavior feedback. Unlike ClassDojo, Seesaw sells exclusively to schools and
              districts — there is no individual teacher license or consumer subscription model. Seesaw's pricing is
              enterprise-only with custom contracts ("Let's talk"), which limits its bottoms-up viral distribution
              channel but increases institutional commitment. Seesaw's LMS-adjacent capabilities (learning management,
              AI reading curriculum "700+ lessons for K-2 grounded in the Science of Reading") represent a broader
              product scope than ClassDojo's current offering, creating a potential displacement threat if districts
              seek LMS consolidation.

              ParentSquare (parentsquare.com) is the premier district-wide communication platform, trusting its brand on
              "Every family. Informed. Engaged." Founded in 2011 by Anu Bahri, ParentSquare is a platform for mass
              notifications, two-way messaging, forms/payments, attendance improvement (Attendance Plus), SIS
              integrations, school websites, and two-way translation in 130+ languages. Following the January 2023
              merger with Remind, the combined ParentSquare organization serves 42,000+ schools with over 20 million
              educators and families. ParentSquare positions itself as a district administrative platform rather than a
              classroom teacher tool, targeting IT directors, principals, and communications staff rather than
              individual teachers. This makes it complementary to, rather than a direct substitute for, ClassDojo in
              many deployments, but it competes directly for the district enterprise software budget that ClassDojo is
              pursuing.

              Remind (remind.com), now operated as a ParentSquare brand, was historically ClassDojo's most direct scale
              competitor before the merger, claiming ~30 million users in 80% of US schools and ~2 million teachers on
              the platform. Remind's focus was phone-based messaging with automatic translation into 90+ languages,
              enabling equitable communication without requiring a smartphone app. Remind's brand still operates
              independently with its own product surface.

              TalkingPoints (talkingpts.org) is a mission-driven, PreK-12 family engagement platform founded by CEO
              Heejae Lim, focused specifically on multilingual and underserved communities. A 2024 randomized study of
              ~34,000 students in a large urban district found that TalkingPoints-enabled communication was associated
              with 43% lower suspension rates and the equivalent of three additional weeks of learning time annually.
              TalkingPoints raised $24M in a 2021 Series B and has a primarily district-sales model. While smaller in
              absolute scale than ClassDojo or ParentSquare, TalkingPoints differentiates on equity evidence, language
              access, and impact research — a positioning that resonates in Title I districts and with funders
              prioritizing equity outcomes.

              Bloomz (bloomz.com), founded in 2013, offers a unified parent-teacher communication platform with
              250-language immersive translation, behavior tracking, PBIS support, and AI-powered messaging. Bloomz
              directly overlaps with ClassDojo's core feature set but has significantly smaller market penetration. It
              is best characterized as a second-tier direct competitor that has not achieved ClassDojo-level
              distribution or brand recognition.
