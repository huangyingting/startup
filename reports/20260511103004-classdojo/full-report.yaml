      - number: '4.2'
        title: GTM motion and sales efficiency
        blocks:
          - type: paragraph
            body: >
              ClassDojo's go-to-market has been entirely organic and teacher-driven since founding. The Series C press
              release (2019) confirmed "100% organic, word-of-mouth referral from existing users" with no paid
              marketing. This zero-CAC teacher acquisition loop works as follows: teachers adopt ClassDojo freely for
              classroom management, then invite parents to join; parents who engage enough convert to ClassDojo Plus
              subscribers. The Duolingo comparable (9% paid subscriber penetration of MAUs, $90.5M sales and marketing
              in FY2024) reflects a very different acquisition model with paid performance marketing. ClassDojo's
              estimated CAC is structurally lower because the teacher is an unpaid distribution channel and the parent
              only needs an account invitation. Conversion from parent-user to Plus-subscriber is the key monetization
              event, with no disclosed conversion rate. In 2025, ClassDojo hired a Head of Enterprise Sales (Michael
              Bell, ex-Follett School Solutions), a General Manager for B2B (Jeff Buening, ex-Brightwheel, Harvard MBA),
              and a Head of K-12 Engagement (Chad Stevens, ex-AWS education) — signaling an acceleration of
              district-level enterprise sales, though the district product remains free. The TEC SDPA agreement (14
              states) and NDPA/SDPC Resource Registry listings reduce legal friction for district adoption, a common
              barrier in edtech enterprise sales cycles.
