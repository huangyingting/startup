  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue model overview
        blocks:
          - type: paragraph
            body: >
              ClassDojo's revenue model has one publicly confirmed monetization stream: ClassDojo Plus, a consumer
              subscription for parents that launched as "Beyond School" in Q4 2018 and was rebranded to ClassDojo Plus.
              The product is priced at $15.49 per month or $109.99 per year — the only list price publicly disclosed by
              the company. All other ClassDojo products — the core classroom tool, family messaging, school and district
              communication, behavior tracking, and the ClassDojo for Districts platform — are explicitly and
              permanently free for teachers, students, schools, and districts. The company has committed publicly to
              never charging teachers or schools and to never displaying advertising to users. Revenue from Plus
              subscriptions funds ongoing product development across the entire platform. This creates an unusual
              financial structure: the vast majority of ClassDojo's product development effort serves a zero-revenue
              user base (teachers and district administrators), while monetization depends entirely on parental
              willingness to pay for a supplementary home-learning subscription. Forbes estimated ClassDojo's annualized
              revenue at above $30 million in July 2022, representing the most recent publicly available revenue signal.
              A nascent B2B enterprise sales function was formed in 2025, with the appointment of a dedicated Head of
              Enterprise Sales and General Manager for B2B; however, ClassDojo for Districts remains free as of May
              2026, and no enterprise revenue stream is confirmed.
