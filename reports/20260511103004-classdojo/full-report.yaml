            body: >
              ClassDojo's cost structure is predominantly people and cloud infrastructure: a software-and-content
              business with no hardware or physical inventory. The company had 110 employees in July 2022 per Forbes and
              was described as "doubling" at that time; headcount may have reached 200-300 by 2026. At typical San
              Francisco software company fully-loaded costs (~$250-$350K per employee), a team of 200-300 implies
              ~$50-$105M annual operating cost, partially offset by reported revenue. Comparable gross margins for
              consumer SaaS and mobile subscription businesses (Duolingo: ~72.7% FY2024) suggest ClassDojo's gross
              margin on Plus subscriptions could be 65-75%, with primary costs being cloud hosting, content production
              for Big Ideas and Dojo Islands, payment processing, and customer support. Duolingo's S&M represented ~12%
              of revenue in FY2024 (largely paid acquisition); ClassDojo's zero-CAC model implies structurally lower S&M
              as a percentage of revenue, redirected toward product and content. No ClassDojo-specific cost, margin, or
              unit-economics figure is publicly available. The primary cost overhang is Dojo Islands (virtual world
