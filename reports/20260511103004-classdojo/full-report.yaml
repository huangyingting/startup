      - number: '2.5'
        title: Sizing Gaps and Contradictory Estimates
        blocks:
          - type: paragraph
            body: >
              This chapter deliberately preserves three categories of sizing uncertainty that would distort valuation
              analysis if smoothed over.

              First, analyst TAM estimates for K-12 EdTech span a 9x range ($32B to $295B globally in 2025) depending on
              whether the analyst includes: (a) hardware and connectivity; (b) corporate training and professional
              development software; (c) higher education platforms; and (d) government-funded education infrastructure.
              No standardized market boundary exists. Investors using a $295B TAM to size ClassDojo's opportunity are
              comparing to a market that includes servers, textbook publishers, and private tutoring, none of which
              ClassDojo competes in.

              Second, the parent-teacher communication software estimates ($2B per Intel Market Research and Verified
              Market Research, 2025) may double-count district SIS parent portals, which provide some communication
              functionality bundled in PowerSchool, Infinite Campus, and similar products. Adjusting for this overlap
              would reduce the dedicated parent-engagement-platform TAM.

              Third, ClassDojo's penetration-based SOM has a ceiling constraint not captured in analyst estimates. With
              95% US K-8 penetration, the platform has limited room for new school acquisition in its core segment.
              Growth must come from ARPU expansion (subscriptions, district licensing) rather than share-of-schools
              gains. No public data exists on current Plus subscriber count or district contract ACV, creating material
              uncertainty in the monetization growth model.
            claimRefs: []
