  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Business Overview
        blocks:
          - type: paragraph
            body: >
              ClassDojo is a K-12 educational technology platform headquartered in San Francisco, California, founded in
              August 2011 by Sam Chaudhary and Liam Don. The company's stated mission is to "give every child on Earth
              an education they love," and it pursues this through a freemium communication and classroom-management
              platform connecting teachers, students, and families. ClassDojo is incorporated as a private company and
              has not disclosed plans for an initial public offering as of May 2026. The core product is free to
              teachers, students, and families, with revenue generated through ClassDojo Plus (a premium parent
              subscription) and ClassDojo for Districts (a B2B licensing model for school administrators). Pricing for
              ClassDojo Plus stood at approximately $15.49/month or $109.99/year in the United States as of 2026. The
              platform offers automatic message translation into 130+ languages, making it particularly valuable in
              linguistically diverse U.S. markets and internationally. ClassDojo's sector is consumer education
              technology (EdTech), with a focus on K-8 school communication and social-emotional learning (SEL)
              infrastructure. The company reached a unicorn valuation of $1.25 billion in July 2022, and analysts
              estimate annual revenue in the range of $74–120 million, though ClassDojo does not publicly disclose
              financial metrics.
