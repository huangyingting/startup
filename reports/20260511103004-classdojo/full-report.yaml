              ClassDojo has raised approximately $221 million across nine funding rounds since 2011 (per TracXn). The
              funding chronology through Series C is documented in the Company Overview chapter; this section addresses
              forward capital adequacy. The most recent disclosed events are: (1) a $125 million Series D from Tencent
