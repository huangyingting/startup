        title: Financial and Model Risk — Undisclosed Metrics, Post-ESSER Headwinds, Revenue Concentration
        blocks:
          - type: paragraph
            body: >
              ClassDojo's financial risk profile is structurally opaque. As a private company with no SEC reporting
              obligation, ClassDojo does not disclose ARR, subscriber count, burn rate, balance sheet, or cash runway.
              This prevents any quantified assessment of financial risk. The investment was made at a $1 billion unicorn
              valuation in May 2021 — before the post-2022 EdTech valuation reset that saw multiple peers experience
              down-rounds or impairments. EdTech sector decompression has been broad, and without current metrics,
              ClassDojo's mark-to-market positioning is unknown. Revenue concentration risk is high: the Plus
              subscription is the primary disclosed revenue stream, and its pricing competes against free communication
              alternatives. Post-ESSER school budget consolidation is causing districts to reduce EdTech spend.
              Duolingo's public 10-K (as the closest public EdTech consumer subscription analog) shows NRR compression
              and subscriber sensitivity to price — risks that are structurally relevant to ClassDojo Plus. The B2B
              enterprise motion requires upfront sales investment before revenue ramps; without disclosed pipeline,
              close rates, and ACV, this presents an unquantified margin risk.
