      - number: '1.2'
        title: Founders, Leadership, and Governance
        blocks:
          - type: paragraph
            body: >
              ClassDojo was co-founded by Sam Chaudhary (CEO) and Liam Don (President), both of whom remain at the helm
              of the company as of May 2026. Chaudhary was born in London, studied at the University of Cambridge, and
              previously worked at McKinsey & Company before founding ClassDojo. He was named an EY Entrepreneur Of The
              Year 2025 Bay Area winner, reflecting industry recognition of the company's scale and impact. Liam Don,
              who holds a computer science background from Cambridge, serves as President and oversees product vision
              and technical strategy. The executive team includes Dominick Bellizzi as Chief Technology Officer and
              Partha Tallavajhala as Chief Product Officer. In early 2025, ClassDojo added three new senior executives:
              Michael Bell (Head of Enterprise Sales), Jeff Buening (General Manager, B2B), and Chad A. Stevens, Ph.D.
              (Head of K-12 Engagement), signaling an intensified focus on enterprise district sales. The board includes
              Hemant Taneja (General Catalyst), Tod Francis (Shasta Ventures), Tim Brady (independent), and Nikhil Basu
              Trivedi and Michael Moe as board observers. The co-founders' dual roles as operator and board-level
              participants and the concentration of institutional knowledge in Chaudhary and Don represent a meaningful
              key-person dependency risk, particularly for a company of this scale.
