      - number: '3.4'
        title: Switching Cost, Lock-in, and Multi-homing Analysis
        blocks:
          - type: paragraph
            body: >
              ClassDojo's switching cost profile is asymmetric by stakeholder: high for teachers, low for parents, and
              medium-high for districts. For teachers who have built multi-year ClassDojo class records, behavior point
              histories, and parent networks within a single classroom app, migration requires re-enrolling all parents
              on a new platform — a communication task that carries real friction at school-year boundaries. This
              creates an annual churn-risk window only at new school years or school transitions, not mid-year,
              providing significant stability to ClassDojo's installed base. For parents, switching cost is low: parents
              join or leave ClassDojo as their child changes teachers; no meaningful data lock-in exists for the parent
              account. For districts, switching cost is higher: formal IT review, data migration concerns (student
              roster data synced from SIS), contract renegotiation, and staff retraining all create procurement inertia.

              Multi-homing is common and represents both a risk and a validation. Many districts run ClassDojo
              (teacher-managed classroom engagement) alongside ParentSquare (district-managed mass communication). This
              coexistence reduces ClassDojo's risk of near-term displacement but also caps ClassDojo's enterprise
              contract potential: when districts view ClassDojo as a classroom tool rather than a district communication
              infrastructure investment, budget appetite is smaller and purchase authority sits with principals rather
              than IT directors. Multi-homing also occurs across ClassDojo Plus (consumer subscription) and general
              messaging apps: many parents maintain both a ClassDojo Plus subscription and WhatsApp groups for their
              child's class.

              Distribution power advantages for incumbents are significant. PowerSchool's SIS penetration in ~15,000+
              districts creates a natural parent portal delivery channel that requires no additional procurement.
              Google's Workspace mandate in IT-managed school device programs means Google Classroom is already deployed
              before any ClassDojo evaluation begins. These incumbents have distribution leverage that ClassDojo's
              consumer viral loop does not easily neutralize at the district procurement level.
