      - number: '1.3'
        title: Funding History and Capital Structure
        blocks:
          - type: paragraph
            body: >
              ClassDojo has raised approximately $221 million across nine funding rounds since inception. The company
              launched with seed capital and Y Combinator backing in 2011-2012, followed by a Series A of $8.5 million
              in 2014 led by Shasta Ventures with participation from General Catalyst, SoftTech VC, and Felicis
              Ventures. The Series B of $21 million (April 2016) was led by General Catalyst with GSV Ventures, Reach
              Capital, and SignalFire participating. A Series C of $35 million was announced in February 2018, co-led by
              GSV Ventures and SignalFire, with proceeds earmarked for building a consumer-facing subscription business.
              The landmark Series D of $125 million in July 2022 was led by Tencent and valued ClassDojo at $1.25
              billion, conferring unicorn status. A Series D extension involving Five Sigma as new institutional
              investor closed in March 2024 at an undisclosed amount. Notable investor Hemant Taneja of General Catalyst
              has been a long-term backer and board member. ClassDojo has no publicly disclosed debt facilities or
              secondary transactions on record. The company's capital structure is private and closely held, with no
              publicly available cap table or secondary-market pricing data.
