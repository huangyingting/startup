      - number: '5.3'
        title: Differentiation and Competitive Moat
        blocks:
          - type: paragraph
            body: >
              ClassDojo's primary moat is a deeply embedded teacher-parent network that is self-reinforcing. A teacher
              who adopts ClassDojo recruits the parents of every student in their class; each parent then has a
              persistent reason to maintain the app for the school year and beyond. This organic adoption flywheel is
              protected by (a) teacher inertia — switching costs for teachers include re-establishing parent connections
              and re-enrolling all students — and (b) parent familiarity — parents who trust the ClassDojo interface
              resist switching to a new communication channel.

              Product differentiation includes: the first ISTE Seal of Learning Design earned by any K-8 communication
              platform (ClassDojo received this in March 2026, validated by independent educational research); a Common
              Sense Privacy Seal (highest available for edtech, earned 2023); and the deepest parent penetration of any
              US edtech platform at K-8 level. No disclosed competitor has matched ClassDojo's combination of 95%+ K-8
              school reach with a confirmed direct-to-parent subscription revenue model. The Sidekick AI feature, if it
              drives daily teacher engagement, could further deepen retention and create additional differentiation
              against Seesaw, ParentSquare, and Google Classroom.
            claimRefs:
