companyProfile:
  summary: >-
    ClassDojo is a San Francisco-based EdTech company founded in 2011 by Sam Chaudhary (CEO) and Liam Don (CTO) that
    built the dominant K-12 school-to-home communication platform. Used in over 95% of US K-12 schools and 180+
    countries, ClassDojo connects teachers, students, and parents via classroom messaging, behavior points, and
    portfolio sharing. The company has raised approximately $221M across 9 rounds — most recently a $125M Series D at
    $1.25B valuation led by Tencent in July 2022, with an undisclosed extension in March 2024 led by Five Sigma. Revenue
    is generated primarily from the ClassDojo Plus consumer subscription ($7.99/month) and a nascent ClassDojo for
    Schools institutional offering; analyst estimates place ARR between $74M and $120M. The company has faced persistent
    privacy scrutiny under COPPA due to its under-13 user base but has maintained a compliance posture via privacy
    pledge and FERPA alignment.
