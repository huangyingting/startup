      Triggers are designed to be observable with public-domain data or minimal primary research. Thresholds are
      calibrated to the base case assumptions; bear case is triggered when two or more criteria are met simultaneously.
  - id: TV006
    title: Final Diligence Asks Table
    description: Outstanding diligence items required before an investment decision.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Revenue and ARR by segment
        - FY2024 and FY2025 audited total revenue, ClassDojo Plus consumer ARR, and ClassDojo for Districts ARR
        - Cannot validate $1.25B valuation or scenario probabilities without verified ARR
        - Request from ClassDojo IR; require audited financials as closing condition
      - - Subscriber cohort and churn
        - ClassDojo Plus monthly active subscriber count, annual churn rate, LTV and CAC by geography and cohort year
        - >-
          Bull case requires churn below 15%; bear case triggered at over 30%; scenario probability weights shift
          materially
        - Request monthly cohort waterfall from ClassDojo; cross-check via app store revenue data
      - - Cap table and preference stack
        - >-
          Full cap table with share classes, liquidation preferences (1x-1.5x), anti-dilution rights, and Five Sigma
          March 2024 extension terms
        - Preferences could reduce common equity by 20-40% in sub-$1B outcomes; pro-rata rights affect future dilution
        - Request term sheet and cap table from company; consult secondary market data providers
      - - District contract pipeline and NRR
        - >-
          ClassDojo for Districts logo count, average ACV, pipeline ARR, and net revenue retention (NRR) for
          institutional segment
        - Institutional segment is the primary re-rating catalyst; NRR over 110% would confirm land-and-expand thesis
        - Request CRM pipeline summary and top-10 district contract terms; conduct 5-10 district reference calls
      - - Regulatory and legal status
        - >-
          COPPA 2.0 correspondence with FTC; pending litigation; state-level privacy inquiries; FERPA certification
          status
        - Regulatory liability is the primary tail risk; any active investigation materially changes risk profile
        - Review FTC enforcement database; request legal hold register and pending litigation log from company counsel
      - - International monetization
        - Breakdown of users, Plus penetration, and revenue by geography (US vs. international)
        - 50M+ user base globally; if below 5% international monetization, bull case depends almost entirely on US
        - Request geographic ARR breakdown; analyze app store revenue data by country
    enumerationScope:
      coverage: exhaustive
      basis: >-
        Six diligence topics cover all investment-critical unknowns: revenue, churn, cap table, institutional pipeline,
        regulatory status, and international monetization; no additional topics required.
    claimRefs:
      - CV034
      - CV039
      - CV026
      - CV035
    notes: >-
      Diligence asks are minimum required for an investment decision. Additional depth on product roadmap, competitive
      win/loss, and team succession planning should be pursued in parallel. Priority sequence: (1) audited revenue, (2)
      churn cohort, (3) cap table, (4) district pipeline, (5) regulatory status, (6) international.
