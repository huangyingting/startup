      - number: '2.3'
        title: Buyer, User, and Payer Segmentation
        blocks:
          - type: paragraph
            body: >
              ClassDojo's unique commercial structure features a consumer-led bottoms-up adoption model that separates
              users from payers in a two-sided market. Understanding the buyer journey requires mapping three distinct
              cohorts: teachers (adopters), parents (end-users, plus payers), and school districts (institutional
              payers).

              Teachers are the primary adopters. In the US, approximately 5.7 million K-12 teachers return to classrooms
              each fall across 99,239 public schools in 13,452 districts. Teachers make adoption decisions autonomously
              for free classroom tools — ClassDojo's core behavior tracking and classroom messaging features. A single
              teacher adopting the platform seeds parent engagement for an entire class (averaging 22–25 students per
              classroom). This bottoms-up viral loop is ClassDojo's structural distribution advantage: teacher adoption
              drives parent enrollment without a district contract or sales motion.

              Parents are both end-users and, for ClassDojo Plus, the paying customer. At $15.49/month or $109.99/year,
              ClassDojo Plus is positioned as a direct-to-consumer subscription that parents choose without district
              authorization. This decouples revenue generation from institutional procurement cycles. With approximately
              50M users (mixture of teachers and parents), even a 5% paid conversion rate on the parent base represents
              millions of subscribers.

              District administrators are the payer cohort for enterprise licensing agreements. School districts
              typically hold procurement authority for technology spending above a certain threshold (often
              $10,000–$50,000 per vendor contract). According to Agile Education Marketing, average US per-pupil
              spending is $17,277 in FY2025, of which less than 3% typically goes to software and digital platforms.
              Technology budgets in a median US district of 3,000–5,000 students thus run $1.5M–$2.5M annually —
              creating meaningful district-level contracts for ClassDojo's enterprise tier.

              The adoption trigger differs by cohort. For teachers: classroom management pain (behavioral tracking,
              parent communication friction). For parents: visibility into child's day and direct teacher messaging. For
              districts: data privacy compliance (FERPA/COPPA/NDPA agreements), administrative efficiency, and
              multi-school standardization.
