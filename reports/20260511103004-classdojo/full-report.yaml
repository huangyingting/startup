      - number: '4.5'
        title: Financial verdict and diligence blockers
        blocks:
          - type: paragraph
            body: >
              ClassDojo's financial profile is promising in structure but opaque in substance. The freemium revenue
              model, zero-CAC distribution, and sole reliance on parent consumer subscriptions create a rare combination
              of massive distribution with low capital intensity — analogous to Duolingo's early days. The adverse case
              is that ClassDojo's monetization surface area is extremely narrow: one consumer product at ~$110/year,
              targeting parents of K-8 students, with no disclosed subscriber count, no enterprise revenue, and no
              advertising fallback. Revenue quality is high (subscription, recurring) but scale is unknown. The five
              critical diligence blockers are: (1) Plus subscriber count and trend — without this, ARR and growth rate
              cannot be established; (2) gross margin — whether the mix of software, content, and AI infrastructure
              costs compresses margins below the SaaS benchmark; (3) cash position and runway — the March 2024 raise
              provides comfort but recency matters; (4) B2B enterprise revenue potential — ClassDojo for Districts is
              free today, but the new enterprise sales team signals a monetization intention with no disclosed timeline
              or model; (5) Tencent cap-table risk — the geopolitical exposure requires legal and procurement diligence
              with key district customers. Without access to internal financials, underwriting ClassDojo's capital
