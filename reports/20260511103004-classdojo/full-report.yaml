      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >
              ClassDojo's history spans 15 years of growth from a classroom behavior-tracking app to a comprehensive
              K-12 communication ecosystem. The platform launched in beta in July 2011 and was adopted by 80 teachers in
              its first week; by its first anniversary, it had grown to 9.6 million users across 30+ countries. Major
              product launches have included Class Story (2015), student portfolios (2015), Dojo Islands—a gamified
              virtual learning world (2022+), and AI-assisted teacher tools (2025-26). Regulatory milestones include
              obtaining iKeepSafe certification, a Common Sense Privacy Seal, and, in March 2026, the ISTE Seal. The
              August 2025 partnership with The Education Cooperative (TEC) under the National Data Privacy Agreement
              (NDPA) framework, covering FERPA and COPPA compliance in 14 states, represents a significant
              enterprise-channel enablement. Adverse events include ongoing academic and community criticism of
              ClassDojo's behavioral data collection practices. A 2025 peer-reviewed article problematized "datafied"
              student behavioral records and their potential for misuse. Consumer review platforms and the Better
              Business Bureau record complaints about billing, technical difficulties, and parental concerns over data
              handling. These adverse signals, while not involving formal regulatory enforcement as of May 2026,
              represent reputational risk that the company actively manages through privacy certifications and
              pre-approved data agreements.
