      - number: '3.3'
        title: Incumbent and Adjacent Platform Threats
        blocks:
          - type: paragraph
            body: >
              PowerSchool (powerschool.com) is the dominant K-12 software ecosystem, serving over 60 million students
              across 90 countries. Its product suite spans student information systems (SIS), the Schoology LMS,
              assessment, special education management, and family communication via parent portals embedded in SIS.
              PowerSchool went private in 2024 following acquisition by Bain Capital in a deal reportedly valued at
              approximately $5.6 billion. The PowerSchool parent portal, bundled as part of district SIS contracts,
              provides grade-level transparency, attendance, and basic messaging — features that satisfy many district
              communication mandates without an additional vendor. PowerSchool's competitive threat is not feature
              parity with ClassDojo but rather its status as a district system-of-record: once PowerSchool is mandated
              by IT, districts often view additional communication platforms (including ClassDojo) as redundant, and the
              post-ESSER budget compression period increases pressure to consolidate.

              Google Workspace for Education Fundamentals is available at no cost to K-12 institutions and includes
              Google Classroom (LMS), Gmail, Meet, and since 2025, Gemini for Education AI tools. Google Classroom
              supports a parent observer account model, allowing guardians to receive class summaries and student work
              visibility. While Google Classroom does not replicate ClassDojo's behavior tracking, gamification, or
              direct parent-teacher messaging quality, its zero-cost deployment, Google account ubiquity, and AI
              integration represent a structural threat: as Google adds family engagement features to its free suite,
              the "ClassDojo Plus" value proposition for premium communication content faces incremental competition
              from a platform already mandated by district IT. Approximately 40 million students in the US use Google
              Workspace for Education in some form, making it the most broadly deployed adjacent platform.

              Instructure Canvas, the higher-education LMS market leader ("50% of college and university students in
              North America"), has K-12 presence with Canvas for K-12 and a parent observer feature. Canvas competes
              primarily with Schoology in the K-12 LMS segment and is less directly competitive with ClassDojo's parent
              communication model. However, in districts that adopt Canvas as their enterprise LMS, it reduces
              ClassDojo's opportunity to upsell district-level engagement analytics.
