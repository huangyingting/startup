              Sigma (March 4, 2024). The Five Sigma round is the most recent external capital signal, implying the
              company had investor support approximately 26 months before this report's run date. Cash position, burn
              rate, and runway are not publicly disclosed. If revenue approached or exceeded $50 million in 2025-2026
