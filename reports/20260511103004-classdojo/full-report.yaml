      - number: '1.4'
        title: Scale, Users, and Market Penetration
        blocks:
          - type: paragraph
            body: >
              As of early 2026, ClassDojo reports over 50 million users globally, including teachers, parents, and
              students. The platform is used in 95% of U.S. pre-K through 8th grade schools and operates in 180+
              countries, making it one of the most widely deployed EdTech platforms worldwide. Headcount stands at
              approximately 479–488 employees as of early 2026, reflecting a stable but measured team size for a company
              at its scale. ClassDojo achieved an ISTE Seal for high-quality product design in education in March 2026,
              awarded by the International Society for Technology in Education after a rigorous evaluation. The
              platform's engagement metrics are strong: 80% of messages sent via ClassDojo are reportedly read the same
              day, an indicator of habitual daily use. The company's geographic reach is primarily driven by U.S.
              adoption, with strong secondary markets in the United Kingdom, UAE, Thailand, Singapore, and several Latin
              American countries. This depth of penetration creates significant network effects and high switching costs
              within school communities, as teachers, parents, and administrators are often deeply embedded in the
              platform's workflow. Annual revenue is estimated by analysts between $74.7 million and $120 million,
              though ClassDojo does not confirm these figures publicly.
