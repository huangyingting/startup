      - number: '2.2'
        title: Market Sizing — Multiple Lenses
        blocks:
          - type: paragraph
            body: >
              Sizing ClassDojo's market requires reconciling several lenses simultaneously. The broadest (global K-12
              EdTech) overstates the opportunity because ClassDojo does not provide hardware, LMS, or curriculum
              content. The narrowest (US K-8 parent-teacher comm) understates the opportunity because ClassDojo has
              meaningful international presence and expanding product scope. A three-layer framework best captures the
              investment-relevant sizing.

              Layer 1 — Total Addressable Market (TAM): Global parent-teacher communication and family engagement
              software. Intel Market Research pegs this at $2.05 billion in 2025 and $3.58 billion by 2032 (CAGR 10.9%).
              Verified Market Research anchors near $2 billion in 2025 with a 13.5% CAGR to $5.51 billion by 2033. The
              2–4x range of TAM endpoints is itself a diligence signal: precise penetration-rate-based modelling (54.1M
              US K-12 students × technology spend per student) implies a narrower US-only family engagement software
              ceiling of $500M–$1.5B at typical software budget shares of 1–3% of per-pupil spend.

              Layer 2 — Serviceable Addressable Market (SAM): North America (primarily US) parent-teacher communication
              platforms. Grand View Research places North America at 36.1% of global EdTech in 2025, suggesting a
              US/Canada parent-teacher software market of roughly $740 million–$900 million in 2025 as a fraction of the
              global segment.

              Layer 3 — Serviceable Obtainable Market (SOM): ClassDojo's current and near-term revenue ceiling within
              the SAM. The company reports 50M+ users, an estimated $74–120M ARR at current Plus attachment rates, and
              95% US K-8 penetration. At a near-saturation penetration for free K-8 usage, the primary SOM expansion
              path is subscription conversion (ClassDojo Plus) and district licensing rather than new school
              acquisitions.

              The market's growth trajectory is heterogeneous: the parent-teacher communication segment is smaller and
              more slowly growing (10–14% CAGR) than the general K-12 AI-platform market (13–25% CAGR), because parent
              communication tools are operationally embedded but have modest willingness- to-pay relative to curriculum
              or LMS spending. The more relevant growth vector for ClassDojo is ARPU expansion via subscription upgrades
              and enterprise district contracts.
