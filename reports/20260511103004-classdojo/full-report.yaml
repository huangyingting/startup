            body: >
              ClassDojo's claimed 95% U.S. K-8 school penetration is extraordinary even among market leaders and creates
              powerful network effects. The critical mass of classrooms entrenched on the platform makes competitive
              displacement extremely difficult, particularly in the elementary school segment.
