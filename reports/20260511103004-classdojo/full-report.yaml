      - number: '7.5'
        title: People, Execution Risk, and Mitigations — Monitoring Triggers and Thesis Breaks
        blocks:
          - type: paragraph
            body: >
              ClassDojo is co-founder-led by Liam Don and Sam Chaudhary; the platform has operated since 2011 under
              continuous founder stewardship. Key-person risk is non-trivial: founder-driven culture and product vision
              mean a departure could cause platform direction disruption, talent attrition, and investor confidence
              issues. The 2025 enterprise executive hires (Michael Bell, Jeff Buening, Chad Stevens) bring B2B sales
              capability but face a 12 to 24 month ramp risk before meaningful revenue contribution. No CFO or COO is
              listed in publicly available org data, suggesting thin financial and operational leadership depth.
              Mitigation quality is above average relative to edtech peers. The Common Sense Privacy Seal (2023), ISTE
              Seal (March 2026), Student Privacy Pledge signatory status, TEC DPA (2025), and SDPC Data Registry listing
              collectively reduce district procurement friction and regulatory tail risk. Thesis-break triggers include:
              FTC re-enforcement or material new privacy violation; sustained Plus subscriber churn above 5% monthly;
              ClassDojo for Districts failing to reach $5M-plus ARR by end of FY2026; Tencent relationship triggering
              CFIUS intervention; or founder departure without clear succession.
            claimRefs:
              - CR034
              - CR035
              - CR036
              - CR037
              - CR038
              - CR039
              - CR040
          - type: table
            tableRef: TR005
            claimRefs:
              - CR036
              - CR037
              - CR038
              - CR039
              - CR040
      - number: '7.6'
        title: Exhibits
        blocks:
          - type: callout
            title: FTC enforcement history creates elevated re-enforcement risk under 2024 COPPA amendments
            body: >
              ClassDojo's 2019 FTC consent decree means any new COPPA violation would be treated as a repeat offense,
              carrying significantly higher civil penalties under current FTC authority. The December 2024 COPPA
              amendments increase the compliance surface, particularly for EdTech operators using school-authorized
              teacher data collection. If ClassDojo's current program does not meet the July 2025 effective date
              requirements, it faces material enforcement risk as a documented repeat offender.
            calloutType: risk
            claimRefs:
              - CR001
              - CR002
              - CR003
          - type: callout
            title: Tencent investment creates unresolved geopolitical and procurement risk
            body: >
              Tencent's lead of the $125M Series D creates a CFIUS exposure that has not been publicly resolved through
              an NSA or other mitigation agreement. For ClassDojo to access federal EdTech procurement or state
              contracts with national security sensitivities, this risk must be addressed. The absence of any public
              CFIUS filing or mitigation is itself a diligence gap, as any restriction would materially affect the
              addressable market.
            calloutType: risk
            claimRefs:
              - CR008
              - CR019
          - type: callout
            title: Mitigation stack is above average for the EdTech category
            body: >
              Common Sense Privacy Seal (2023), ISTE Seal (March 2026), Student Privacy Pledge signatory status, TEC DPA
              (2025), and SDPC registry listing collectively provide procurement-grade privacy signals that most EdTech
              competitors lack. These certifications reduce district friction and demonstrate sustained compliance
              investment. They also create a documented record of good-faith compliance that can be cited in FTC
              proceedings or district contract negotiations as evidence of a functioning compliance program.
            calloutType: strength
            claimRefs:
              - CR036
              - CR037
              - CR038
              - CR039
          - type: callout
            title: SOC 2 attestation and CFIUS resolution are pre-condition diligence items
            body: >
              Before investment close, investors should require: (1) SOC 2 Type II attestation or equivalent security
              certification; (2) legal counsel opinion on CFIUS exposure and any mitigation agreement requirement; (3)
              COPPA 2024 amendment compliance gap analysis and remediation timeline; (4) disclosure of balance sheet and
              cash runway to assess financial risk. Without these four items, residual risk cannot be adequately
              assessed.
            calloutType: recommendation
            claimRefs:
              - CR009
              - CR028
              - CR031
              - CR040
  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: >
              ClassDojo presents one of the most asymmetric EdTech investment profiles of the 2020s. The bull case rests
              on three interlocking pillars: (1) an unmatched distribution moat — 95% US K-8 teacher penetration and
              50M+ annual active users in 180 countries — built with near-zero paid acquisition; (2) a
              freemium-to-subscription monetization runway that remains largely untapped relative to the installed base;
              and (3) a nascent institutional district revenue stream (ClassDojo for Districts) poised to convert free
              district installations into recurring SaaS contracts. The teacher-driven network effects — where one
              teacher adoption recruits 20-30 parent users — create a switching cost moat structurally superior to
              pure-consumer EdTech. EY recognized ClassDojo co-founder as Bay Area Entrepreneur of the Year in 2025,
              signaling continued external validation and leadership resilience. Against this, the anti-thesis centers
              on three concerns: (a) zero public revenue or churn disclosure after 12 years, making valuation
              verification impossible; (b) the ESSER spending cliff that expired September 2024, triggering district
              budget reductions that constrain the B2B monetization window; and (c) intensifying competition from the
              ParentSquare-Remind merger (2023), which created a district-first rival with 20M+ users and deep
              procurement relationships. Conviction requires obtaining audited revenue, subscriber cohort data, and
              cap-table terms before committing.
            claimRefs:
              - CV001
              - CV004
              - CV015
              - CV017
              - CV029
              - CV036
              - CV040
          - type: table
            tableRef: TV001
            claimRefs:
              - CV034
              - CV040
              - CV026
          - type: table
            tableRef: TV002
            claimRefs:
              - CV004
              - CV015
              - CV017
              - CV029
              - CV036
              - CV014
              - CV025
              - CV030
          - type: figure
            figureRef: FV001
            claimRefs:
              - CV001
              - CV017
              - CV036
              - CV034
              - CV040
      - number: '8.2'
        title: Financing Context and Valuation Stance
        blocks:
          - type: paragraph
            body: >
              ClassDojo last confirmed valuation of $1.25 billion was set in the July 2022 Series D, led by Tencent with
              participation from SoftBank and existing investors General Catalyst, GSV Ventures, and SignalFire. A
              Series D extension with Five Sigma as a new institutional investor closed in March 2024 at undisclosed
              terms. The extension suggests the company remained financeable into 2024 but provides no valuation update.
              No secondary market transactions or SAFE-note filings have been reported. Analyst revenue estimates of
              $74-120M imply the 2022 mark was struck at approximately 10-17x trailing revenue — aggressive even by 2022
              peak standards but defensible given the user scale and monetization optionality. By May 2026, EdTech SaaS
              multiples have compressed; median deals are repricing at 6-10x ARR versus 12-18x at the 2021-22 peak. A
              fair entry mark in 2026 at the 2022 valuation requires verifying that ARR has grown to support it.
              Dilution and preference overhang from four rounds totaling $221M must be modeled; Series D liquidation
              preferences at 1x-1.5x could reduce common equity by 20-40% in sub-$1B outcomes. ClassDojo for Districts
              pricing at $2-5 per student per year is publicly disclosed; Plus at approximately $15.49/month or
              $109.99/year in the US. The March 2024 extension improves the capital buffer and reduces near-term
              dilution pressure, but the absence of a full-round repricing makes the current fair market value opaque.
            claimRefs:
              - CV001
              - CV002
              - CV003
              - CV005
              - CV008
              - CV009
              - CV035
          - type: figure
            figureRef: FV003
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV027
      - number: '8.3'
        title: Scenario Analysis
        blocks:
          - type: paragraph
            body: >
              Three scenarios anchor the valuation sensitivity analysis, each driven by explicit assumptions about Plus
              subscriber conversion, institutional district ARR, and market multiple. The bull scenario assumes
              ClassDojo successfully converts 5-8% of its 50M+ user base to Plus subscribers (2.5-4M paying families at
              approximately $120 ARPU), generating $300-480M in consumer ARR by 2027, plus $80-120M in institutional
              district contracts; a combined $380-600M ARR at 12-15x revenue multiple yields a $4.5-9B enterprise value.
              This requires the district sales motion to materially outperform its 2025 pilot trajectory and Plus to
              sustain sub-15% annual churn. The base scenario projects Plus reaching 1.5-2M paying families ($180-240M
              consumer ARR) and institutional revenue of $40-60M (total approximately $220-300M ARR) by 2027; at an
              8-10x multiple, enterprise value lands at $1.75-3B. The bear scenario models ESSER cliff budget cuts
              reducing institutional pipeline by 30-50%, Plus subscriber growth plateauing below 1M families due to
              rising competition, and multiple compression to 5-7x ARR on $90-110M of blended ARR, yielding a $450-770M
              valuation. The primary downside trigger is COPPA 2.0 enforcement; a consent decree or product-change
              mandate would impose compliance cost and slow the institutional sales cycle by 12-18 months. The
              probability- weighted expected value (bear 20%, base 55%, bull 25%) implies a $1.8-2.1B reference range
              for a 2026 entry mark.
            claimRefs:
              - CV015
              - CV016
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
              - CV030
          - type: table
            tableRef: TV003
            claimRefs:
              - CV021
              - CV022
              - CV023
              - CV024
              - CV025
          - type: figure
            figureRef: FV002
            claimRefs:
              - CV008
              - CV022
              - CV023
              - CV021
      - number: '8.4'
        title: Comparable Benchmarking
        blocks:
          - type: paragraph
            body: >
              ClassDojo hybrid consumer/B2B EdTech model sits at the intersection of three comparable archetypes.
              Consumer EdTech comps (Duolingo) trade at premium multiples driven by DAU monetization density and
              transparent earnings; Duolingo reported $748M in FY2024 revenue and traded at 11-14x trailing revenue in
              Q1 2026, supported by 40M+ daily active users and approximately 8% Super Duolingo conversion. Enterprise
              K-12 SaaS comps (PowerSchool, Instructure) trade at lower multiples (6-11x ARR) on recurring institutional
              revenue but with high customer retention and predictable cash flows; PowerSchool Bain acquisition (2024)
              at approximately $5.7B at 10-11x ARR sets a ceiling for district-SIS/LMS platforms. ClassDojo strongest
              private analog is IXL Learning (estimated $2B+ valuation, 2022-24), which also monetizes via consumer
              subscriptions and school licensing at comparable scale. Kahoot! (Oslo Bors) trades at 3-4x trailing
              revenue and represents the low end of the consumer EdTech multiple range, constrained by European listing
              discount and weaker monetization density. Applying a 2026 blended multiple of 8-12x to the midpoint
              analyst ARR estimate ($97M) yields a $780M-$1.16B fair-value range at current multiples — implying the
              2022 mark is modestly rich unless ARR has grown meaningfully since then.
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV019
              - CV031
              - CV032
              - CV033
          - type: table
            tableRef: TV004
            claimRefs:
              - CV005
              - CV006
              - CV007
              - CV031
              - CV032
              - CV033
          - type: figure
            figureRef: FV004
            claimRefs:
              - CV001
              - CV011
              - CV036
              - CV010
              - CV023
              - CV008
              - CV034
      - number: '8.5'
        title: Recommendation, Diligence Asks, and Exit Readiness
        blocks:
          - type: paragraph
            body: >
              Rating: Conditional Positive / Watch. ClassDojo holds a defensible strategic position that few EdTech
              assets can match — unparalleled US distribution, a nascent but real monetization engine, and network
              effects that have compounded for 14 years. However, the combination of a private company with zero public
              financial disclosure, a stale 2022 valuation mark, ESSER budget headwinds, and an unproven B2B revenue
              model means no investment decision is supportable without a structured diligence sprint. The minimum
              required disclosures are: FY2024 and FY2025 audited revenue and ARR by segment; Plus subscriber count,
              monthly churn, and LTV/CAC by geography; district contract pipeline, ACV, and net revenue retention; cap
              table with liquidation preference stack, anti-dilution rights, and Five Sigma March 2024 terms; and
              pending regulatory inquiries or COPPA correspondence. Exit pathways include an IPO (a Duolingo-style
              consumer EdTech narrative supported by daily active users and transparent subscriber metrics), a strategic
              acquisition by a major EdTech conglomerate (Pearson, HMH, or Google for Education), or a secondary/LBO by
              a PE firm seeking to apply the PowerSchool monetization playbook to ClassDojo consumer base. At 50M+ users
              and an estimated $97-120M ARR, ClassDojo should be acquirable at $1-2B in a strategic scenario or
              achievable as an IPO at $1.5-3B if subscriber metrics can be disclosed cleanly. Initiate conditional
              positive with a target re-evaluation pending audited financials and subscriber cohort disclosure.
            claimRefs:
              - CV026
              - CV034
              - CV035
              - CV038
              - CV039
              - CV040
          - type: table
            tableRef: TV005
            claimRefs:
              - CV015
              - CV025
              - CV026
              - CV030
          - type: table
            tableRef: TV006
            claimRefs:
              - CV034
              - CV039
              - CV026
              - CV035
      - number: '8.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Unmatched K-12 Distribution Moat
            body: >
              ClassDojo 95% US K-8 teacher penetration and 50M+ global users represent an acquisition cost advantage
              that no well-funded competitor has replicated in 14 years of market competition. The teacher-to-parent
              viral loop creates a structural moat where one teacher adoption brings 20-30 parent users at zero cost —
              an LTV/CAC ratio that underlies the entire investment thesis and is not replicable through paid
              acquisition at reasonable cost.
            calloutType: strength
            claimRefs:
              - CV017
              - CV036
          - type: callout
            title: ARR Opacity Is the Single Largest Risk
            body: >
              ClassDojo has not disclosed any revenue, subscriber count, or churn metric since its 2022 Series D. The
              analyst estimate range of $74-120M spans 62% of the midpoint — an unusual spread for a company at this
              stage. No investment decision is supportable without verified ARR. The absence of disclosure also prevents
              the market from price-discovering the 2022 mark; any Series D or extension terms with ratchet provisions
              could create a substantially different effective entry valuation than the $1.25B headline implies.
            calloutType: risk
            claimRefs:
              - CV034
              - CV002
          - type: callout
            title: Conditional Positive — Initiate Watch with Diligence Sprint
            body: >
              We initiate a Conditional Positive / Watch rating. The strategic case is compelling: few consumer EdTech
              assets globally combine ClassDojo distribution scale, network moat, and dual monetization optionality. The
              2026 entry mark of $1.25B (or lower if a re-round reprices) is defensible if FY2025 ARR exceeds $125M.
              Execute the diligence sprint in TV006, prioritizing audited revenue and churn cohorts. Upgrade to a full
              Positive if ARR is $125M+, churn is sub-20%, and the cap table shows no blocking preferences. Downgrade to
              Avoid if ARR is below $85M, churn exceeds 25%, or an active COPPA/FTC proceeding is disclosed.
            calloutType: recommendation
            claimRefs:
              - CV040
              - CV026
              - CV034
