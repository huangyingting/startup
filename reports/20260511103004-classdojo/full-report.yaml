      - number: '7.2'
        title: Operational and Security Risk — Data Breach, Uptime, LLM Dependency
        blocks:
          - type: paragraph
            body: >
              ClassDojo's operational risk profile centers on three vectors. First, data security: storing behavioral,
              educational, and communication data for 51M users including minors creates a high-value, high-consequence
              attack target. A documented historical compliance matter — referenced by Student Privacy Compass and BBB
              complaint records — established that ClassDojo has faced data-handling concerns. IBM's 2023 Cost of a Data
              Breach Report puts average breach cost at $4.45M, with education sector incidents carrying reputational
              and regulatory amplifiers that can dwarf the direct cost. Second, platform dependency: ClassDojo's teacher
              and parent apps are distributed exclusively through Apple App Store and Google Play. Policy changes or
              de-listing would disrupt the core acquisition loop with no meaningful web-first fallback documented.
              Third, AI dependency: ClassDojo Sidekick AI relies on a third-party large language model API. Pricing
              changes, API deprecation, or quality degradation of the upstream model creates margin and product risk.
              Post-ESSER district IT consolidation is also reducing approved vendor lists, with EdSurge 2024 reporting
              that schools are making hard trade-offs as stimulus funding expires — increasing the risk that ClassDojo
              for Districts does not make district procurement budgets.
