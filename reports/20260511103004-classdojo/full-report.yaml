  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Definition and Boundaries
        blocks:
          - type: paragraph
            body: >
              ClassDojo operates at the intersection of three overlapping markets: broad K-12 educational technology,
              school-to-family communication software, and social-emotional learning (SEL) and classroom engagement
              platforms. Defining the market boundary matters significantly for sizing and valuation, because analyst
              TAM estimates differ by as much as 9x depending on how broadly the category is drawn.

              The narrowest commercially relevant market is parent-teacher communication software — digital platforms
              that bridge home-school information exchange via messaging, behavior tracking, attendance alerts, and
              portfolio sharing. Intel Market Research valued this segment at $1.85 billion in 2024, growing to $2.05
              billion in 2025. Verified Market Research converges on a similar $2 billion in 2025, projecting $5.51
              billion by 2033. This segment is ClassDojo's primary competitive arena.

              Expanding the boundary to all K-12 EdTech yields radically different estimates: the Business Research
              Company cites $31.99 billion globally in 2025, while Dimension Market Research places global K-12 EdTech
              at $295.6 billion in 2025 and the US K-12 EdTech market at $94.8 billion. Grand View Research sizes the
              entire global EdTech market (all segments including higher ed and corporate training) at $187 billion in
              2025. These dramatic differences stem from whether analysts include hardware (devices, whiteboards), LMS,
              content delivery, and corporate training alongside pure K-12 software platforms.

              Status-quo substitutes for parent-teacher communication software include email (school-issued addresses),
              phone calls, paper newsletters, school websites, general-purpose messaging apps (WhatsApp, Remind,
              GroupMe), and student information systems that include parent portals. District IT departments sometimes
              build basic portals on top of existing SIS providers such as Infinite Campus or PowerSchool. These
              substitutes remain deeply entrenched and represent the primary non-consumption alternative that ClassDojo
              competes against, not just rival apps.

              Adjacent markets include student information systems (SIS), learning management systems (LMS), student
              portfolio and assessment tools, and district-wide communication suites. ClassDojo has expanded into some
              adjacencies (Dojo Islands as immersive learning, portfolio sharing features) but has not yet become a full
              SIS or LMS replacement.
