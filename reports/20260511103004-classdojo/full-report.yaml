      - number: '2.6'
        title: Exhibits
        blocks:
          - type: callout
            title: Consumer-Led Viral Distribution Compresses CAC
            body: >
              ClassDojo's teacher-first, free-tier distribution model means approximately 3.5 million US teachers (and
              equivalents globally) act as unpaid sales agents by inviting parents to join their classroom. This viral
              loop produces near-zero customer acquisition cost for the free tier and creates a near-saturated installed
              base (95% US K-8 penetration) without enterprise sales motion. Most EdTech competitors with equivalent
              penetration have required district sales teams and multi-year procurement cycles to achieve comparable
              reach.
            calloutType: strength
            claimRefs:
              - CM012
              - CM023
          - type: callout
            title: ESSER Cliff Compresses Enterprise Revenue Growth Window
            body: >
              The September 2024 expiry of $190B in ESSER federal education stimulus means district technology budgets
              are returning to pre-pandemic baselines after a 3-4 year spending boom. EdTech vendors that grew
              enterprise contracts on ESSER budgets — including communication platforms — face churn risk as districts
              prioritize mission-critical renewals (SIS, LMS) over supplementary engagement tools. ClassDojo's consumer
              Plus revenue partially insulates it from this risk, but enterprise licensing growth may stall through 2026
              as districts adjust to stimulus-free budgets.
            calloutType: risk
            claimRefs:
              - CM010
              - CM039
          - type: callout
            title: 9x Analyst TAM Divergence Signals Sizing Ambiguity
            body: >
              No standardized market boundary exists for K-12 EdTech. Analyst estimates for the same year (2025) range
              from $32B to $295B depending on scope. Investors using a $295B TAM frame to size ClassDojo's opportunity
              are including server infrastructure, hardware, higher education, and corporate training — markets
              ClassDojo does not participate in. The most relevant comparable market (parent-teacher communication
              software) is approximately $2B globally in 2025, implying ClassDojo commands 4-6% revenue penetration — a
              high-quality but concentrated market position, not an uncrowded greenfield.
            calloutType: risk
            claimRefs:
              - CM024
              - CM029
              - CM031
  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape Overview
        blocks:
          - type: paragraph
            body: >
              ClassDojo operates in a fragmented but consolidating competitive landscape defined by three distinct
              competitor tiers. The first tier comprises purpose-built parent-teacher communication and family
              engagement platforms — Seesaw, ParentSquare (which merged with Remind in January 2023), TalkingPoints, and
              Bloomz — that compete directly for the same use case. The second tier consists of K-12 system-of-record
              incumbents — PowerSchool (which includes Schoology LMS), Infinite Campus, and similar SIS providers — that
              embed parent communication functionality within district-mandated platforms. The third tier covers free
              adjacent platforms — Google Workspace for Education and Microsoft Teams for Education — that districts
              deploy for curriculum and communications broadly and which are expanding into family engagement.

              A fourth category is status-quo substitutes: school email systems, phone calls, paper newsletters, and
              general-purpose messaging apps (WhatsApp, GroupMe, Signal), which remain deeply entrenched as the default,
              especially in international markets where ClassDojo's penetration is shallower.

              The key structural distinction is GTM model: ClassDojo uses a teacher-first, free-tier consumer
              distribution model that creates bottoms-up viral adoption with near-zero CAC. ParentSquare and most
              district-focused platforms use a top-down district sales motion — they require IT approval and procurement
              contracts before any teacher or parent can use them. These models coexist rather than purely substitute,
              creating a multi-homing environment where districts may simultaneously have a ClassDojo teacher deployment
              alongside a ParentSquare district communication contract.

              The January 2023 merger between ParentSquare and Remind — creating the nation's largest school
              communications company — represents the most significant competitive event in ClassDojo's history. The
              combined entity serves 42,000+ schools (ParentSquare) with Remind's claim of ~30 million users in 80% of
              US schools, effectively creating a scaled competitor with meaningful presence at both the district
              (ParentSquare) and classroom (Remind) layers.
