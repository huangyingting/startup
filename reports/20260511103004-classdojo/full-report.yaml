  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Legal and Regulatory Risk — COPPA, FERPA, State Laws, FTC History
        blocks:
          - type: paragraph
            body: >
              ClassDojo operates at the intersection of children's data, school compliance, and consumer subscription —
              three of the most regulated contexts in US digital services. COPPA requires operators collecting data from
              children under 13 to obtain verifiable parental consent, maintain data minimization, and provide deletion
              rights. The FTC previously took an enforcement action against ClassDojo in 2019, resulting in a consent
              decree that required deletion of historical student data and implementation of a COPPA-compliant program.
              The December 2024 COPPA rule amendments — effective July 2025 — tighten rules further: they restrict data
              use for advertising, expand deletion obligations, and require EdTech operators to treat school-authorized
              teacher data collection as direct operator collection, increasing ClassDojo's compliance burden. FERPA
              applies to ClassDojo when acting as a school official under district contracts, creating additional data
              governance and audit obligations. California (SOPIPA), New York, Washington, and other states have enacted
              student data privacy laws layering additional requirements beyond federal minimums. UK company
              registration confirms GDPR obligations for international users. Student Privacy Compass documents
              ClassDojo's historical compliance cases, making the regulatory record partially public. The Common Sense
              Privacy Seal and Student Privacy Pledge signatory status are material mitigants but do not eliminate
              regulatory liability.
            claimRefs:
              - CR001
              - CR002
              - CR003
              - CR004
              - CR005
              - CR006
