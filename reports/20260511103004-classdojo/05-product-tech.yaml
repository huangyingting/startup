chapter:
  number: 5
  title: Product & Technology
  summary: >
    ClassDojo is a K-8 classroom communication and management platform serving teachers, parents, and students
    through a freemium model. Core functionality — behavioral tracking, messaging, and class stories — has been
    free since 2011 and remains free for all schools, teachers, and districts. The premium Plus parent
    subscription adds consumer features: SEL content (Big Ideas), virtual worlds (Dojo Islands), AI teacher
    assistance (Sidekick), and advanced parent tools. The platform is cross-platform (iOS, Android, web) with
    95%+ K-8 school reach in the US. ClassDojo's principal product advantages are organic teacher-to-parent
    network effects, ISTE-validated learning design, best-in-class student data privacy credentials (Common
    Sense Privacy Seal, TEC SDPA, SDPC listing), and 51+ million students in active classrooms as of 2026.

sections:
  - id: SE-S001
    title: Product Definition and Module Map
    body: >
      ClassDojo serves three distinct user cohorts through a single integrated platform: teachers, parents, and
      students. The teacher-facing product provides classroom management (engagement points, feedback, class
      stories), student portfolio tools, and parent communication channels — all permanently free. The parent
      app delivers real-time connection to a child's classroom: daily updates, messaging, and (via Plus) premium
      content. The student experience centers on avatars, portfolios, and the Dojo Islands virtual world.

      The platform consists of six named product modules: (1) ClassDojo core (teacher + parent + student
      communication, free); (2) ClassDojo Plus (parent subscription, $15.49/month or $109.99/year); (3) Dojo
      Islands (student virtual world, Plus-gated); (4) ClassDojo Sidekick (AI teacher assistant, launched
      2024); (5) ClassDojo for Districts (admin dashboard, SIS integration, TEC SDPA, free); and (6)
      ClassDojo Big Ideas (SEL content library, separate iOS app). This modular design allows freemium growth
      (teacher adoption drives parent adoption) while keeping the revenue-generating Plus layer clearly
      separated from the free core.
    tableRefs: [TE001, TE002]
    figureRefs: [FE002]
    claimRefs: [CE001, CE002, CE003, CE004, CE005, CE006, CE007, CE008, CE009, CE010]

  - id: SE-S002
    title: Technology Architecture and Platform
    body: >
      ClassDojo operates as a cloud-native SaaS platform delivered across iOS, Android, and web browsers. The
      mobile apps (iOS and Android) have been the primary interface since 2011, with a complementary web
      application for district administrators and teachers requiring desktop workflows. The platform supports
      real-time messaging, push notifications, and media sharing (photos, videos, stories), which requires
      robust infrastructure for asynchronous and synchronous communication at scale.

      ClassDojo Sidekick, introduced in 2024, integrates AI capabilities directly into the teacher product for
      lesson planning, feedback generation, and personalized student progress insights. Dojo Islands is a 3D
      virtual world requiring additional client-side rendering investment. ClassDojo for Districts supports
      district-level SIS rostering integrations (Clever, ClassLink are standard for this segment),
      single sign-on (SSO), bulk provisioning, and district-level reporting. The platform has maintained
      continuous operation at 51M+ student scale, suggesting a mature cloud infrastructure backbone.

      Specific cloud provider, backend programming language, and engineering tooling details are not
      publicly disclosed. ClassDojo's 2025 job postings reference React, TypeScript, and backend roles,
      providing indirect signals about the technology stack.
    tableRefs: [TE003]
    figureRefs: [FE001, FE003]
    claimRefs: [CE011, CE012, CE013, CE014, CE015, CE016, CE017]

  - id: SE-S003
    title: Differentiation and Competitive Moat
    body: >
      ClassDojo's primary moat is a deeply embedded teacher-parent network that is self-reinforcing. A teacher
      who adopts ClassDojo recruits the parents of every student in their class; each parent then has a
      persistent reason to maintain the app for the school year and beyond. This organic adoption flywheel
      is protected by (a) teacher inertia — switching costs for teachers include re-establishing parent
      connections and re-enrolling all students — and (b) parent familiarity — parents who trust the ClassDojo
      interface resist switching to a new communication channel.

      Product differentiation includes: the first ISTE Seal of Learning Design earned by any K-8 communication
      platform (ClassDojo received this in March 2026, validated by independent educational research); a Common
      Sense Privacy Seal (highest available for edtech, earned 2023); and the deepest parent penetration of
      any US edtech platform at K-8 level. No disclosed competitor has matched ClassDojo's combination of
      95%+ K-8 school reach with a confirmed direct-to-parent subscription revenue model. The Sidekick AI
      feature, if it drives daily teacher engagement, could further deepen retention and create additional
      differentiation against Seesaw, ParentSquare, and Google Classroom.
    tableRefs: []
    figureRefs: [FE004]
    claimRefs: [CE018, CE019, CE020, CE021, CE022, CE023]

  - id: SE-S004
    title: Trust, Privacy, and Compliance
    body: >
      ClassDojo has invested significantly in student data privacy credentials — its strongest differentiator
      against competitors in regulated K-12 procurement. Key certifications: Common Sense Privacy Seal
      (achieved July 2023, indicating 84%+ privacy score on the Common Sense framework); ISTE Seal of Learning
      Design (March 2026); SDPC listing (Student Data Privacy Consortium, recognized across US states); TEC
      SDPA (The Education Cooperative Student Data Privacy Agreement, active in 14 states as of 2025); and
      Student Privacy Pledge signatory. The platform is COPPA and FERPA compliant, with no advertising and no
      student data used for commercial purposes.

      ClassDojo for Districts includes dedicated privacy agreement infrastructure (SDPA) and has built
      standardized district data processing agreements covering 14 states through the TEC partnership.
      This streamlines procurement for IT directors who need legal cover for student data. However,
      ClassDojo's Trust Center (available at classdojo.com/trust-center/) was inaccessible to external
      review via automated means, limiting independent technical verification of stated security controls
      (encryption at rest, SOC 2, penetration testing cadence, etc.). These details must be confirmed
      via the data room during formal diligence.
    tableRefs: [TE004]
    figureRefs: []
    claimRefs: [CE024, CE025, CE026, CE027, CE028, CE029, CE030]

  - id: SE-S005
    title: Roadmap and Product Evolution
    body: >
      ClassDojo's recent product investments reveal a two-track roadmap: (1) deepening district-level B2B
      infrastructure (SIS integrations, SDPA agreements, admin dashboards, enterprise sales capacity), and
      (2) expanding the consumer value proposition for parents via AI (Sidekick), immersive student
      experiences (Dojo Islands), and SEL content (Big Ideas). The district track, accelerated by the
      2025 executive hires (Head of Enterprise Sales, GM for B2B, Head of K-12 Engagement), positions
      ClassDojo for a potential future enterprise monetization layer, though no pricing model has been announced.

      ClassDojo's 2025-26 district product launch (August 2025) included new features for district
      administrators: enhanced communication tools, expanded analytics, and deeper SIS integration.
      The ISTE Seal validates the learning efficacy claim that ClassDojo's Sidekick AI supports teacher
      practice — suggesting the AI investment is defensible and not solely a feature-check. The primary
      product risk is that Dojo Islands requires sustained investment in content and 3D infrastructure
      to maintain student engagement, creating a cost escalator without a confirmed revenue offset.
    tableRefs: [TE005]
    figureRefs: []
    claimRefs: [CE031, CE032, CE033, CE034, CE035]

