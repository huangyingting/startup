callouts:
  - calloutType: strength
    title: Organic product flywheel is the deepest moat
    body: ClassDojo's teacher-invites-parent adoption model creates a multi-sided network that is both
      self-perpetuating and hard to displace. A teacher switching platforms must rebuild parent connections
      from scratch; a parent switching must re-convince their teacher to adopt the new tool. This structural
      lock-in, combined with 95%+ K-8 school penetration, gives ClassDojo a distribution moat that
      competitors cannot buy or rapidly replicate.
    claimRefs: [CE018, CE019]

  - calloutType: risk
    title: Dojo Islands and AI are capital-intensive without confirmed revenue offset
    body: Dojo Islands (3D virtual world, 2022+) and Sidekick AI (LLM API costs, 2024+) both require
      material ongoing investment. Dojo Islands requires content creation, 3D rendering infrastructure,
      and moderation. Sidekick AI incurs per-query AI API costs that scale with teacher usage. Neither
      feature generates independent revenue — they are Plus conversion drivers. If Plus subscriber growth
      stalls, this investment becomes a capital drain without a clear path to return.
    claimRefs: [CE007, CE014, CE031]

  - calloutType: risk
    title: Technical architecture details are not independently verifiable
    body: ClassDojo's Trust Center (classdojo.com/trust-center/) was inaccessible to external automated
      review. No SOC 2 certification, penetration testing cadence, cloud provider, or infrastructure
      uptime SLA is publicly confirmed. For district procurement, IT directors increasingly require SOC 2
      Type II certification as a condition of approval. Absence of this credential or inability to confirm
      it represents a potential late-stage procurement blocker.
    claimRefs: [CE016, CE030]

