callouts:
  - calloutType: risk
    title: Single-stream revenue risk
    body: ClassDojo's sole confirmed monetization source is ClassDojo Plus parent subscriptions. The district product is explicitly free and no enterprise revenue model is confirmed. Any disruption to parent subscription demand (competitor free alternative, school year disruption, or economic pressure on household spending) has no secondary revenue buffer.
    claimRefs: []

  - calloutType: risk
    title: Tencent cap table risk
    body: Tencent led ClassDojo's $125M Series D at $1.25B valuation (July 2022). Tencent is a Chinese state-adjacent entity. An increasing number of US districts restrict software with Chinese majority or significant ownership under state-level data privacy laws and informal procurement policies. The size of Tencent's stake and any governance rights are not disclosed.
    claimRefs: []

  - calloutType: risk
    title: B2B enterprise revenue model unconfirmed
    body: ClassDojo hired enterprise sales leadership in 2025 (Head of Enterprise Sales, GM for B2B) but ClassDojo for Districts remains free as of this report. No enterprise pricing model, timeline, or revenue has been disclosed. The risk is that monetizing previously-free district tools creates channel conflict with the organic teacher-adoption flywheel that drives Plus conversion.
    claimRefs: []

