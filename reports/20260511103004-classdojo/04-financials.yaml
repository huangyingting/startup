  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: revenue
      missingEvidence: "ClassDojo Plus subscriber count, ARR, and ARR growth rate are not publicly disclosed."
      whyItMatters: "This is the single most critical financial metric — without subscriber count, ARR and growth rate cannot be established."
      diligencePath: "Request subscriber count data room access; cross-check with Stripe dashboard export, payment processor statements, or audited revenue schedule."
      relatedQuestionRefs: [QI001, QI002, QI013]
      relatedTableRefs: [TI001, TI003]

    - type: private-evidence-only
      severity: blocking
      topic: unit-economics
      missingEvidence: "ClassDojo gross margin, COGS breakdown, and operating expense detail are not publicly disclosed."
      whyItMatters: "Without gross margin, capital efficiency and path to profitability cannot be assessed; a <60% gross margin would materially change the funding requirement analysis."
      diligencePath: "Request management P&L or audited financial statements for FY2022-2025; specifically request COGS schedule itemizing cloud, content, support, and payment processing."
      relatedQuestionRefs: [QI003, QI014]
      relatedTableRefs: [TI003]

    - type: private-evidence-only
      severity: material
      topic: funding
      missingEvidence: "The Five Sigma March 2024 round amount and post-money valuation are not publicly disclosed."
      whyItMatters: "Without knowing the amount, cash position, runway, and 409A mark cannot be assessed."
      diligencePath: "Request Series D+ term sheet and closing cap table from data room; confirm Five Sigma's investment amount and any conversion or preference terms."
      relatedQuestionRefs: [QI010, QI026]
      relatedTableRefs: [TI004]

    - type: private-evidence-only
      severity: material
      topic: risk
      missingEvidence: "Tencent's ownership stake, board seat, and governance rights are not publicly disclosed; no CFIUS analysis has been made public."
      whyItMatters: "Tencent's Chinese state-adjacent ownership may restrict ClassDojo adoption by US federal, state, or military-family districts."
      diligencePath: "Request complete cap table and investor rights agreement; commission legal review of CFIUS applicability and any existing district procurement restrictions related to Tencent ownership."
      relatedQuestionRefs: [QI008, QI020]
      relatedTableRefs: [TI004, TI005]

    - type: missing-source
      severity: material
      topic: enterprise
      missingEvidence: "ClassDojo for Districts enterprise pricing model and pipeline data are not available; no enterprise revenue has been confirmed."
      whyItMatters: "Without enterprise revenue data, the long-term monetization ceiling beyond Plus subscriptions cannot be sized."
