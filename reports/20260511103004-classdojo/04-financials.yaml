company:
  name: ClassDojo
chapter:
  number: 4
  title: Financials
  summary: >
    ClassDojo operates a freemium model anchored on ClassDojo Plus, a consumer subscription for parents
    priced at $15.49/month or $109.99/year — the only disclosed revenue stream in a product otherwise
    free for all teachers, students, schools, and districts. Forbes estimated annualized revenue above
    $30 million in July 2022; no subsequent public figure exists. Total equity raised is ~$221 million
    across nine rounds, most recently a $125 million Series D from Tencent (July 2022, $1.25B valuation)
    and an undisclosed round from Five Sigma (March 2024). The core GTM is zero-CAC organic teacher
    adoption converting to parent Plus subscribers, though a nascent B2B enterprise sales motion (Head of
    Enterprise Sales and GM for B2B hired in 2025) signals an intention to monetize district relationships.
    Unit economics, burn rate, gross margin, and subscription count are private and represent the primary
    diligence blockers. A Duolingo 10-K benchmark suggests ~72-73% gross margins and ~8-9% paid-subscriber
    penetration of MAUs are achievable at scale for consumer edtech freemium, providing a scenario ceiling
    for ClassDojo's Plus performance. Capital adequacy is partially de-risked by the March 2024 raise, but
    cash position remains undisclosed.

sections:
  - id: SI-S001
    title: Revenue model overview
    body: >
      ClassDojo's revenue model has one publicly confirmed monetization stream: ClassDojo Plus, a
      consumer subscription for parents that launched as "Beyond School" in Q4 2018 and was rebranded
      to ClassDojo Plus. The product is priced at $15.49 per month or $109.99 per year — the only list
      price publicly disclosed by the company. All other ClassDojo products — the core classroom tool,
      family messaging, school and district communication, behavior tracking, and the ClassDojo for
      Districts platform — are explicitly and permanently free for teachers, students, schools, and
      districts. The company has committed publicly to never charging teachers or schools and to never
      displaying advertising to users. Revenue from Plus subscriptions funds ongoing product development
      across the entire platform. This creates an unusual financial structure: the vast majority of
      ClassDojo's product development effort serves a zero-revenue user base (teachers and district
      administrators), while monetization depends entirely on parental willingness to pay for a
      supplementary home-learning subscription. Forbes estimated ClassDojo's annualized revenue at above
      $30 million in July 2022, representing the most recent publicly available revenue signal. A nascent
      B2B enterprise sales function was formed in 2025, with the appointment of a dedicated Head of
      Enterprise Sales and General Manager for B2B; however, ClassDojo for Districts remains free as of
      May 2026, and no enterprise revenue stream is confirmed.
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006, CI007, CI008, CI009, CI010, CI011]

  - id: SI-S002
    title: GTM motion and sales efficiency
    body: >
      ClassDojo's go-to-market has been entirely organic and teacher-driven since founding. The Series C
      press release (2019) confirmed "100% organic, word-of-mouth referral from existing users" with no
      paid marketing. This zero-CAC teacher acquisition loop works as follows: teachers adopt ClassDojo
      freely for classroom management, then invite parents to join; parents who engage enough convert to
      ClassDojo Plus subscribers. The Duolingo comparable (9% paid subscriber penetration of MAUs,
      $90.5M sales and marketing in FY2024) reflects a very different acquisition model with paid
      performance marketing. ClassDojo's estimated CAC is structurally lower because the teacher is an
      unpaid distribution channel and the parent only needs an account invitation. Conversion from
      parent-user to Plus-subscriber is the key monetization event, with no disclosed conversion rate.
      In 2025, ClassDojo hired a Head of Enterprise Sales (Michael Bell, ex-Follett School Solutions),
      a General Manager for B2B (Jeff Buening, ex-Brightwheel, Harvard MBA), and a Head of K-12
      Engagement (Chad Stevens, ex-AWS education) — signaling an acceleration of district-level
      enterprise sales, though the district product remains free. The TEC SDPA agreement (14 states) and
      NDPA/SDPC Resource Registry listings reduce legal friction for district adoption, a common barrier
      in edtech enterprise sales cycles.
    tableRefs: []
    figureRefs: [FI002]
    claimRefs: [CI012, CI013, CI014, CI015, CI016, CI017]

  - id: SI-S003
    title: Cost structure and unit economics
    body: >
      ClassDojo's cost structure is predominantly people and cloud infrastructure: a software-and-content
      business with no hardware or physical inventory. The company had 110 employees in July 2022 per
      Forbes and was described as "doubling" at that time; headcount may have reached 200-300 by 2026.
      At typical San Francisco software company fully-loaded costs (~$250-$350K per employee), a team
      of 200-300 implies ~$50-$105M annual operating cost, partially offset by reported revenue.
      Comparable gross margins for consumer SaaS and mobile subscription businesses (Duolingo: ~72.7%
      FY2024) suggest ClassDojo's gross margin on Plus subscriptions could be 65-75%, with primary costs
      being cloud hosting, content production for Big Ideas and Dojo Islands, payment processing, and
      customer support. Duolingo's S&M represented ~12% of revenue in FY2024 (largely paid acquisition);
      ClassDojo's zero-CAC model implies structurally lower S&M as a percentage of revenue, redirected
      toward product and content. No ClassDojo-specific cost, margin, or unit-economics figure is publicly
      available. The primary cost overhang is Dojo Islands (virtual world platform), which requires
      ongoing investment and has not been reported as revenue-generating.
    tableRefs: [TI003]
    figureRefs: [FI003]
    claimRefs: [CI018, CI019, CI020, CI021, CI022, CI023]

  - id: SI-S004
    title: Capital adequacy and funding chronology reference
    body: >
      ClassDojo has raised approximately $221 million across nine funding rounds since 2011 (per TracXn).
      The funding chronology through Series C is documented in the Company Overview chapter; this section
      addresses forward capital adequacy. The most recent disclosed events are: (1) a $125 million Series D
      from Tencent at a $1.25 billion post-money valuation (July 2022), and (2) an undisclosed extension
      round led by Five Sigma (March 4, 2024). The Five Sigma round is the most recent external capital
      signal, implying the company had investor support approximately 26 months before this report's run
      date. Cash position, burn rate, and runway are not publicly disclosed. If revenue approached or
      exceeded $50 million in 2025-2026 (extrapolating from Forbes's >$30M figure in mid-2022) and
      headcount remained at 200-300, the company could plausibly be operating at modest burn or near
      breakeven. However, these are analyst estimates and cannot be confirmed without internal financials.
      Tencent's presence on the cap table as a Chinese state-connected entity introduces potential
      geopolitical and district procurement risk (some US districts restrict software with Chinese
      ownership), creating a contingent liability that does not appear in disclosed financial data. No
      debt or project finance facility is known; ClassDojo's business is asset-light with no physical
      inventory or capital-intensive manufacturing.
    tableRefs: [TI004]
    figureRefs: [FI004]
    claimRefs: [CI024, CI025, CI026, CI027, CI028, CI029, CI030]

  - id: SI-S005
    title: Financial verdict and diligence blockers
    body: >
      ClassDojo's financial profile is promising in structure but opaque in substance. The freemium
      revenue model, zero-CAC distribution, and sole reliance on parent consumer subscriptions create
      a rare combination of massive distribution with low capital intensity — analogous to Duolingo's
      early days. The adverse case is that ClassDojo's monetization surface area is extremely narrow:
      one consumer product at ~$110/year, targeting parents of K-8 students, with no disclosed subscriber
      count, no enterprise revenue, and no advertising fallback. Revenue quality is high (subscription,
      recurring) but scale is unknown. The five critical diligence blockers are: (1) Plus subscriber count
      and trend — without this, ARR and growth rate cannot be established; (2) gross margin — whether the
      mix of software, content, and AI infrastructure costs compresses margins below the SaaS benchmark;
      (3) cash position and runway — the March 2024 raise provides comfort but recency matters; (4)
      B2B enterprise revenue potential — ClassDojo for Districts is free today, but the new enterprise
      sales team signals a monetization intention with no disclosed timeline or model; (5) Tencent
      cap-table risk — the geopolitical exposure requires legal and procurement diligence with key
      district customers. Without access to internal financials, underwriting ClassDojo's capital
      adequacy, runway, and investability is not possible from public data.
    tableRefs: [TI005]
    figureRefs: []
    claimRefs: [CI031, CI032, CI033, CI034, CI035]

