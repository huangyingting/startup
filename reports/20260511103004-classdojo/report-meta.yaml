companyProfile:
  summary: >-
    ClassDojo is a San Francisco-based EdTech company founded in 2011 by Sam Chaudhary (CEO)
    and Liam Don (CTO) that built the dominant K-12 school-to-home communication platform.
    Used in over 95% of US K-12 schools and 180+ countries, ClassDojo connects teachers,
    students, and parents via classroom messaging, behavior points, and portfolio sharing.
    The company has raised approximately $221M across 9 rounds — most recently a $125M
    Series D at $1.25B valuation led by Tencent in July 2022, with an undisclosed extension
    in March 2024 led by Five Sigma. Revenue is generated primarily from the ClassDojo Plus
    consumer subscription ($7.99/month) and a nascent ClassDojo for Schools institutional
    offering; analyst estimates place ARR between $74M and $120M. The company has faced
    persistent privacy scrutiny under COPPA due to its under-13 user base but has maintained
    a compliance posture via privacy pledge and FERPA alignment.
  foundedDate: '2011-01-01'
  founders:
  - name: Sam Chaudhary
    role: CEO
    background: Cambridge University CS graduate; former startup founder; YC S11 alumnus
    claimRefs: [CO006]
  - name: Liam Don
    role: CTO
    background: Cambridge University CS graduate; YC S11 co-founder with Chaudhary
    claimRefs: [CO006]
  foundingLocation: San Francisco, CA (YCombinator S11)
  headquarters: San Francisco, CA
  productSummary: >-
    ClassDojo offers a K-12 school communication platform with teacher-facing classroom
    management (behavior points, portfolios), a parent-facing family app (messaging,
    updates, student stories), and a student experience layer. The premium tier (ClassDojo
    Plus) adds AI tutoring (Dojo Islands AI), homework help, and premium family features.
    ClassDojo for Schools is an emerging B2B institutional product for district-wide
    deployment with admin controls, SSO, and compliance reporting.
  customerFocus: K-12 teachers (primarily elementary), parents of K-12 students, and school/district administrators in the US and international markets.
  businessModel: >-
    Freemium with B2C subscription (ClassDojo Plus at ~$8/month or ~$60/year) monetizing
    the parent user base; nascent B2B institutional SaaS (ClassDojo for Schools) targeting
    districts. Core classroom tool remains free to teachers, driving viral adoption.
  stage: Series D (Jul 2022); unicorn at $1.25B valuation; extension round Mar 2024
  fundingStatus: ~$221M raised total; $125M Series D at $1.25B led by Tencent (Jul 2022); undisclosed Series D extension led by Five Sigma (Mar 2024).
