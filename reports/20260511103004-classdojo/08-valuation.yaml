callouts:
  - calloutType: strength
    title: "Unmatched K-12 Distribution Moat"
    body: >
      ClassDojo 95% US K-8 teacher penetration and 50M+ global users represent an acquisition
      cost advantage that no well-funded competitor has replicated in 14 years of market competition.
      The teacher-to-parent viral loop creates a structural moat where one teacher adoption brings
      20-30 parent users at zero cost — an LTV/CAC ratio that underlies the entire investment
      thesis and is not replicable through paid acquisition at reasonable cost.
    claimRefs: [CV017, CV036]

  - calloutType: risk
    title: "ARR Opacity Is the Single Largest Risk"
    body: >
      ClassDojo has not disclosed any revenue, subscriber count, or churn metric since its 2022
      Series D. The analyst estimate range of $74-120M spans 62% of the midpoint — an unusual
      spread for a company at this stage. No investment decision is supportable without verified ARR.
      The absence of disclosure also prevents the market from price-discovering the 2022 mark;
      any Series D or extension terms with ratchet provisions could create a substantially different
      effective entry valuation than the $1.25B headline implies.
    claimRefs: [CV034, CV002]

  - calloutType: recommendation
    title: "Conditional Positive — Initiate Watch with Diligence Sprint"
    body: >
      We initiate a Conditional Positive / Watch rating. The strategic case is compelling: few
      consumer EdTech assets globally combine ClassDojo distribution scale, network moat, and
      dual monetization optionality. The 2026 entry mark of $1.25B (or lower if a re-round reprices)
      is defensible if FY2025 ARR exceeds $125M. Execute the diligence sprint in TV006, prioritizing
      audited revenue and churn cohorts. Upgrade to a full Positive if ARR is $125M+, churn is
      sub-20%, and the cap table shows no blocking preferences. Downgrade to Avoid if ARR is below
      $85M, churn exceeds 25%, or an active COPPA/FTC proceeding is disclosed.
    claimRefs: [CV040, CV026, CV034]

