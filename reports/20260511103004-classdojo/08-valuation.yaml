artifact: valuation
slug: classdojo
runDate: "2026-05-11"
company:
  name: ClassDojo
chapter:
  number: 8
  title: Valuation
  summary: >
    ClassDojo achieved unicorn status at a $1.25 billion valuation in its July 2022 Series D
    ($125M, led by Tencent), with a further Series D extension in March 2024 (Five Sigma,
    undisclosed amount). No ARR or subscriber metrics have been publicly disclosed; analyst
    estimates place revenue at $74-120M. At a 10-12x revenue multiple, the 2022 mark implies
    approximately $105-125M in ARR. The bull case ($2.5-3B) assumes Plus subscription
    acceleration to 4M+ paying families and institutional district revenue exceeding $100M;
    the base case ($1.5B) assumes modest growth; the bear case ($600-800M) reflects
    ESSER-cliff budget contraction and regulatory overhang. Comparable EdTech anchors
    (Duolingo at 11-14x revenue, PowerSchool at 10-11x ARR) support a conditional positive
    stance contingent on audited financials, churn data, and cap-table disclosure.

sections:
  - id: investment-thesis-anti-thesis
    title: Investment Thesis and Anti-Thesis
    body: >
      ClassDojo presents one of the most asymmetric EdTech investment profiles of the 2020s. The
      bull case rests on three interlocking pillars: (1) an unmatched distribution moat — 95% US
      K-8 teacher penetration and 50M+ annual active users in 180 countries — built with near-zero
      paid acquisition; (2) a freemium-to-subscription monetization runway that remains largely
      untapped relative to the installed base; and (3) a nascent institutional district revenue
      stream (ClassDojo for Districts) poised to convert free district installations into recurring
      SaaS contracts. The teacher-driven network effects — where one teacher adoption recruits 20-30
      parent users — create a switching cost moat structurally superior to pure-consumer EdTech.
      EY recognized ClassDojo co-founder as Bay Area Entrepreneur of the Year in 2025, signaling
      continued external validation and leadership resilience. Against this, the anti-thesis centers
      on three concerns: (a) zero public revenue or churn disclosure after 12 years, making
      valuation verification impossible; (b) the ESSER spending cliff that expired September 2024,
      triggering district budget reductions that constrain the B2B monetization window; and
      (c) intensifying competition from the ParentSquare-Remind merger (2023), which created a
      district-first rival with 20M+ users and deep procurement relationships. Conviction requires
      obtaining audited revenue, subscriber cohort data, and cap-table terms before committing.
    tableRefs: [TV001, TV002]
    figureRefs: [FV001]
    claimRefs: [CV001, CV004, CV015, CV017, CV029, CV036, CV040]

  - id: financing-valuation-context
    title: Financing Context and Valuation Stance
    body: >
      ClassDojo last confirmed valuation of $1.25 billion was set in the July 2022 Series D, led
      by Tencent with participation from SoftBank and existing investors General Catalyst, GSV
      Ventures, and SignalFire. A Series D extension with Five Sigma as a new institutional investor
      closed in March 2024 at undisclosed terms. The extension suggests the company remained
      financeable into 2024 but provides no valuation update. No secondary market transactions or
      SAFE-note filings have been reported. Analyst revenue estimates of $74-120M imply the 2022
      mark was struck at approximately 10-17x trailing revenue — aggressive even by 2022 peak
      standards but defensible given the user scale and monetization optionality. By May 2026,
      EdTech SaaS multiples have compressed; median deals are repricing at 6-10x ARR versus 12-18x
      at the 2021-22 peak. A fair entry mark in 2026 at the 2022 valuation requires verifying that
      ARR has grown to support it. Dilution and preference overhang from four rounds totaling $221M
      must be modeled; Series D liquidation preferences at 1x-1.5x could reduce common equity by
      20-40% in sub-$1B outcomes. ClassDojo for Districts pricing at $2-5 per student per year is
      publicly disclosed; Plus at approximately $15.49/month or $109.99/year in the US. The March
      2024 extension improves the capital buffer and reduces near-term dilution pressure, but the
      absence of a full-round repricing makes the current fair market value opaque.
    tableRefs: []
    figureRefs: [FV003]
    claimRefs: [CV001, CV002, CV003, CV005, CV008, CV009, CV035]

  - id: scenario-analysis
    title: Scenario Analysis
    body: >
      Three scenarios anchor the valuation sensitivity analysis, each driven by explicit assumptions
      about Plus subscriber conversion, institutional district ARR, and market multiple. The bull
      scenario assumes ClassDojo successfully converts 5-8% of its 50M+ user base to Plus subscribers
      (2.5-4M paying families at approximately $120 ARPU), generating $300-480M in consumer ARR
      by 2027, plus $80-120M in institutional district contracts; a combined $380-600M ARR at
      12-15x revenue multiple yields a $4.5-9B enterprise value. This requires the district sales
      motion to materially outperform its 2025 pilot trajectory and Plus to sustain sub-15% annual
      churn. The base scenario projects Plus reaching 1.5-2M paying families ($180-240M consumer
      ARR) and institutional revenue of $40-60M (total approximately $220-300M ARR) by 2027;
      at an 8-10x multiple, enterprise value lands at $1.75-3B. The bear scenario models ESSER
      cliff budget cuts reducing institutional pipeline by 30-50%, Plus subscriber growth
      plateauing below 1M families due to rising competition, and multiple compression to 5-7x
      ARR on $90-110M of blended ARR, yielding a $450-770M valuation. The primary downside
      trigger is COPPA 2.0 enforcement; a consent decree or product-change mandate would impose
      compliance cost and slow the institutional sales cycle by 12-18 months. The probability-
      weighted expected value (bear 20%, base 55%, bull 25%) implies a $1.8-2.1B reference range
      for a 2026 entry mark.
    tableRefs: [TV003]
    figureRefs: [FV002]
    claimRefs: [CV015, CV016, CV021, CV022, CV023, CV024, CV025, CV030]

  - id: comparable-benchmarking
    title: Comparable Benchmarking
    body: >
      ClassDojo hybrid consumer/B2B EdTech model sits at the intersection of three comparable
      archetypes. Consumer EdTech comps (Duolingo) trade at premium multiples driven by DAU
      monetization density and transparent earnings; Duolingo reported $748M in FY2024 revenue
      and traded at 11-14x trailing revenue in Q1 2026, supported by 40M+ daily active users and
      approximately 8% Super Duolingo conversion. Enterprise K-12 SaaS comps (PowerSchool,
      Instructure) trade at lower multiples (6-11x ARR) on recurring institutional revenue but
      with high customer retention and predictable cash flows; PowerSchool Bain acquisition (2024)
      at approximately $5.7B at 10-11x ARR sets a ceiling for district-SIS/LMS platforms.
      ClassDojo strongest private analog is IXL Learning (estimated $2B+ valuation, 2022-24),
      which also monetizes via consumer subscriptions and school licensing at comparable scale.
      Kahoot! (Oslo Bors) trades at 3-4x trailing revenue and represents the low end of the
      consumer EdTech multiple range, constrained by European listing discount and weaker
      monetization density. Applying a 2026 blended multiple of 8-12x to the midpoint analyst
      ARR estimate ($97M) yields a $780M-$1.16B fair-value range at current multiples — implying
      the 2022 mark is modestly rich unless ARR has grown meaningfully since then.
    tableRefs: [TV004]
    figureRefs: [FV004]
    claimRefs: [CV005, CV006, CV007, CV019, CV031, CV032, CV033]

  - id: recommendation-diligence-exit
    title: "Recommendation, Diligence Asks, and Exit Readiness"
    body: >
      Rating: Conditional Positive / Watch. ClassDojo holds a defensible strategic position that
      few EdTech assets can match — unparalleled US distribution, a nascent but real monetization
      engine, and network effects that have compounded for 14 years. However, the combination of
      a private company with zero public financial disclosure, a stale 2022 valuation mark, ESSER
      budget headwinds, and an unproven B2B revenue model means no investment decision is
      supportable without a structured diligence sprint. The minimum required disclosures are:
      FY2024 and FY2025 audited revenue and ARR by segment; Plus subscriber count, monthly churn,
      and LTV/CAC by geography; district contract pipeline, ACV, and net revenue retention; cap
      table with liquidation preference stack, anti-dilution rights, and Five Sigma March 2024
      terms; and pending regulatory inquiries or COPPA correspondence. Exit pathways include an
      IPO (a Duolingo-style consumer EdTech narrative supported by daily active users and
      transparent subscriber metrics), a strategic acquisition by a major EdTech conglomerate
      (Pearson, HMH, or Google for Education), or a secondary/LBO by a PE firm seeking to apply
      the PowerSchool monetization playbook to ClassDojo consumer base. At 50M+ users and an
      estimated $97-120M ARR, ClassDojo should be acquirable at $1-2B in a strategic scenario
      or achievable as an IPO at $1.5-3B if subscriber metrics can be disclosed cleanly. Initiate
      conditional positive with a target re-evaluation pending audited financials and subscriber
      cohort disclosure.
    tableRefs: [TV005, TV006]
    figureRefs: []
    claimRefs: [CV026, CV034, CV035, CV038, CV039, CV040]

