companyProfile:
  summary: >
    Plaid Inc. was founded in 2013 in San Francisco by Zachary Perret and William Hockey, who
    initially attempted to build a consumer personal-finance app before pivoting to the underlying
    data-connectivity layer. Plaid's API enables fintech apps to read consumer bank account data
    (with user consent) for account verification, transaction enrichment, identity, income
    verification, and credit underwriting. By 2025, Plaid had extended beyond data aggregation
    into fraud prevention (Beacon, Signal), payment initiation (Transfer), credit infrastructure
    (Layer), and income / employment verification (Income, Assets). The company withstood a failed
    $5.3B Visa acquisition (DOJ block, January 2021), a 20% workforce reduction in December 2022,
    and a 54% valuation reset from its $13.4B Series D peak — emerging as a leaner, operationally
    profitable business targeting a 2026–2027 IPO. As of early 2026, Plaid held ~70% US market
    share in open-banking aggregation and was growing ARR at approximately 40% year-over-year.
  foundedDate: "2013-01-01"
  founders:
    - name: Zachary (Zach) Perret
      role: Co-founder & CEO
      background: >
        Built Plaid from a consumer-finance app pivot; has led the company through the Visa deal
        collapse, 2022 restructuring, valuation reset, and operational turn to profitability.
      claimRefs: [CO004]
    - name: William Hockey
      role: Co-founder (former CTO, departed 2021)
      background: >
        Departed as CTO in 2021 to co-found Column (a chartered national bank); retains a board
        director role at Plaid.
      claimRefs: [CO005]
  foundingLocation: San Francisco, California
  headquarters: San Francisco, California
  productSummary: >
    Plaid sells developer API products across five pillars: (1) Data connectivity — Auth, Identity,
    Transactions, Investments, Liabilities; (2) Income verification — Income, Assets, Employment;
    (3) Fraud & risk — Beacon (identity-fraud consortium), Signal (ACH risk scoring), Protect
    (account-takeover prevention); (4) Payments — Transfer, PaymentInitiation; (5) Consumer
    finance layer — Layer (pre-filled applications). Newer fraud, payments, and credit products
    exceeded 20% of estimated ARR in 2025.
  customerFocus: >
    Primary: developer-tier fintechs and SMB apps on self-serve, graduating to enterprise contract.
    Strategic: mega-app fintechs (Venmo, Robinhood, Coinbase, Cash App, Betterment, Chime) driving
    majority of ARR; ~200 enterprise accounts (>$1M ARR) account for the bulk of revenue. Emerging:
    traditional banks and credit unions adopting open-banking compliance solutions.
  businessModel: >
    Three-tier revenue model: (1) per-connection fees for Auth/Identity/Transactions (pay-per-call);
    (2) monthly platform subscription for developer-tier apps; (3) annual enterprise contracts with
    committed minimum usage for accounts >$1M ARR. Newer products (Beacon, Signal, Layer, Income)
    use subscription or per-verification pricing. Revenue is predominantly recurring and
    consumption-based.
  stage: Late-stage Private (Series E, IPO-track 2026–2027)
  fundingStatus: >
    ~$1.3B raised across five primary rounds (2013–2025). April 2025 Series E: $575M at $6.1B
    post-money valuation (Franklin Templeton lead; Fidelity, BlackRock, NEA, Ribbit Capital).
    February 2026 employee tender offer implied $8.0B valuation (+31%). IPO filing targeting
    2026–2027; EBITDA-positive as of 2024.
  disclosureProfile: private-undisclosed
  claimRefs: [CO001, CO004, CO005, CO009, CO013, CO018, CO024]

summary:
  headline: >
    Plaid is the structurally dominant US open-banking infrastructure layer with ~$546M estimated
    ARR, 70%+ market share, and accelerating product diversification, but private disclosure
    opacity, regulatory headwinds from CFPB Section 1033, and a Series D valuation overhang
    warrant a track stance at the current $8B implied valuation pending IPO S-1 confirmation.
  overallScore: 7.0
  recommendation: track
  confidence: medium
  riskRating: medium
  valuationStance: fair
  keyMetrics:
    valuationUsdM: 8000
    revenueRunRateUsdM: 546
    arrUsdM: 546
    revenueGrowthYoYPct: 40
    grossMarginPct: 75
    nrrPct: null
    totalRaisedUsdM: 1300
    customerCount: 8000
    headcount: 1318
  topStrengths:
    - "Dominant market position: ~70% US open-banking aggregation share and 8,000+ integrated apps
      create a multi-sided network effect moat — developer ecosystem depth and 10-year bank-connection
      infrastructure cannot be replicated quickly by new entrants or bank consortia."
    - "ARR acceleration with product diversification: ~$546M 2025E ARR growing ~40% YoY (up from
      ~25% in 2024); fraud, payments, and credit products now exceed 20% of ARR, reducing dependency
      on core data-connectivity pricing."
    - "Consumer-consent data flywheel: 100M+ permissioned consumer accounts and ~1M daily new
      connections generate a proprietary behavioral dataset that drives AI-powered fraud, credit,
      and payment scoring products competitors cannot easily replicate."
    - "Regulatory tailwind from CFPB Section 1033: the October 2024 final rule mandating consumer
      data portability embeds Plaid's value proposition into compliance infrastructure, creating
      durable demand from traditional banks needing to comply with open-banking mandates."
    - "Operational profitability and IPO optionality: EBITDA-positive since 2024 and $575M April 2025
      raise from institutional investors (Franklin Templeton, Fidelity, BlackRock) underpin a
      credible 2026–2027 IPO path at lower execution risk than loss-making fintechs."
  topRisks:
    - "CFPB Section 1033 competitive exposure: the rule requires Plaid to grant FDX-API access to
      competing aggregators and direct bank connections, potentially eroding the screen-scraping
      moat that drove early network effects and may compress pricing on legacy data products."
    - "Customer concentration: top 5–10 mega-app fintechs (Venmo, Robinhood, Coinbase, Cash App,
      Betterment) are estimated to drive 40–50%+ of ARR; a single in-house build or platform exit
      by any of these would be a material revenue event."
    - "Valuation reset and IPO execution risk: the 2021 Series D $13.4B price was never validated by
      an arms-length secondary round; the $6.1B April 2025 price implies a 54% discount; IPO
      pricing will be the first true market clearing, with downside to $4–6B in a risk-off
      macro environment."
    - "Regulatory multi-front pressure: DOJ antitrust scrutiny (Visa deal precedent), CFPB open-
      banking rule, state-level privacy laws (CCPA, NYDFS), and European GDPR-style data governance
      create compounding compliance overhead and potential product-flow restrictions."
    - "Private disclosure opacity: all revenue and margin figures are analyst estimates; no audited
      financials are public. A materially worse ARR or margin outcome in the IPO S-1 would reprice
      current secondary market levels of $8B significantly lower."
  unresolvedGaps:
    - "No audited financials; all ARR, NRR, and margin estimates rely on Sacra, PitchBook, and
      Bloomberg estimates — the IPO S-1 filing will be the first independent reconciliation of
      true revenue, COGS, and retention metrics."
    - "NRR and cohort retention not publicly disclosed; management alludes to 'strong expansion'
      but no precise net revenue retention figure has been confirmed by Plaid."
    - "CFPB Section 1033 enforcement timeline and legal challenge outcomes (industry consortium
      lawsuits, Q2 2026+) create binary regulatory risk — adverse ruling could fundamentally
      alter Plaid's competitive position and pricing model."
    - "Leadership succession depth: Zach Perret is the primary external face and strategic lead;
      bench strength and the degree to which co-founder culture loss from William Hockey's 2021
      departure has been absorbed remain unclear."
    - "IPO terms unknown: potential lock-up cliff, insider selling, or weighted-average ratchet
      provisions in Series D preferred stock would materially affect public-market float and
      entry pricing for institutional buyers."

