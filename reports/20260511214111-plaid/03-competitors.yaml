      question: "Is there adverse information about a competitor successfully displacing Plaid customers?"
      type: "adverse"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Stripe has reportedly won new developer customers who previously evaluated Plaid, citing bundling advantage; no confirmed large Plaid-to-Stripe customer churn documented publicly."

    - id: "QP013"
      question: "What is Plaid's developer self-serve onboarding advantage over competitors?"
      type: "mechanism"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Plaid offers sandbox access, comprehensive documentation, and a free developer tier with no enterprise sales gating; MX and Yodlee require enterprise sales processes, creating Plaid's developer-first acquisition advantage."

    - id: "QP014"
      question: "How has competitor M&A activity (Mastercard/Finicity, Visa/Tink) shaped the competitive landscape?"
      type: "mechanism"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Mastercard/Finicity and Visa/Tink created two well-capitalized network-backed competitors with global distribution. These acquisitions reduced the acquisition pool for Plaid; the remaining standalone competitors (MX, TrueLayer) are potential acqui-hire targets or IPO candidates."

    - id: "QP015"
      question: "What is Plaid's competitive position specifically in mortgage/lending income verification?"
      type: "comparison"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Plaid competes with Plaid Income/Assets but lacks GSE (Fannie Mae/Freddie Mac) certification that Finicity has; Plaid is growing in non-GSE lending (personal loans, BNPL) but faces a structural disadvantage in GSE-regulated mortgage."

    - id: "QP016"
      question: "Does Brankas or any APAC competitor pose a risk to Plaid's expansion strategy?"
      type: "comparison"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Brankas is the leading APAC specialist but operates in markets where Plaid has no current presence. No immediate competitive risk; relevant only if Plaid pursues APAC expansion."

    - id: "QP017"
      question: "Are there any new entrants or announced competitors in the US open banking API market in 2025–2026?"
      type: "freshness"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "No major new entrants identified in 2025–2026; market is consolidating around existing players. Some bank-owned initiatives and credit union networks exploring direct API programs are nascent but not yet commercial competitors."

    - id: "QP018"
      question: "How does Plaid compare to Akoya on data quality and completeness for connected bank accounts?"
      type: "comparison"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Akoya provides primary (bank-generated) data which is higher quality but covers only 11 member banks; Plaid provides broader coverage (12,000+ institutions) at potentially lower data fidelity for non-primary API connections."

    - id: "QP019"
      question: "What is MX Technologies' primary differentiation vs. Plaid?"
      type: "comparison"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "MX differentiates on data enrichment depth (transaction categorization, merchant intelligence, financial insights) aimed at enterprise FI clients, vs. Plaid's developer-first multi-product platform."

    - id: "QP020"
      question: "What is the estimated market share of Plaid vs. its competitors in the US financial data API market?"
      type: "quantification"
      targets: ["contentRequirements/0"]
      status: "partial"
      answeredBy: "Plaid is estimated to hold 50–60% of the US financial data API connectivity market by app count and consumer connections; no independently published market share breakdown is available."

    - id: "QP021"
      question: "Are there any adverse news articles specifically criticizing Plaid's competitive practices or data handling?"
      type: "adverse"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Multiple adverse sources exist: Wired and EFF documented Plaid's legacy credential-harvesting practices; FTC complaint (2022 class action) alleged deceptive UI design; bank trade groups have characterized Plaid as a data intermediary that complicates consumer control."

    - id: "QP022"
      question: "How does Plaid's NDR (Net Dollar Retention) compare to competitor ARR growth as a moat indicator?"
      type: "quantification"
      targets: ["contentRequirements/1"]
      status: "partial"
      answeredBy: "Plaid's NDR is estimated at ~120%+ per industry analysts; competitor NDR not publicly disclosed. High NDR indicates strong multi-product expansion within existing customer base."

    - id: "QP023"
      question: "What is the competitive threat from large tech platforms (Apple, Google, Amazon) entering financial data?"
      type: "mechanism"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Apple's Wallet/Savings and Google Wallet are consumer-facing apps, not B2B API providers. No direct competitive threat from FAANG in the B2B API layer currently; however, Apple's financial data permissions for iOS apps could limit third-party data collection long-term."

    - id: "QP024"
      question: "What are the typical contract lengths and switching costs for Plaid enterprise customers?"
      type: "mechanism"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Enterprise contracts are typically 1–3 year terms; switching costs are high due to Plaid's specific API schema, Link UX integration, and user authentication flows embedded into app architectures. Stripe FC is the most viable switching path for payment-adjacent customers."

    - id: "QP025"
      question: "What regulatory risks specifically target the competitive moat of financial data aggregators?"
      type: "adverse"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "CFPB Section 1033 creates a regulated data-sharing framework that could commoditize basic connectivity; bank trade groups are lobbying for data access fees that would increase aggregator costs; FTC enforcement history (2022 Plaid settlement) shows willingness to regulate aggregator practices."

