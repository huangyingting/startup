summary:
  headline: >
    Plaid 是美国开放银行基础设施里结构性占优的一层，估计 ARR 约 $546M、市场份额 70%+，产品多元化也在加速；但私有公司披露不透明、CFPB Section 1033 带来监管逆风、Series D
    估值包袱仍在，因此在当前 $8B 隐含估值下应维持观察，等 IPO S-1 确认。
