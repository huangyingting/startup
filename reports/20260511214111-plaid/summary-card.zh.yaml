  shortDescription: >
    Plaid is the dominant US open-banking infrastructure layer, connecting 100M+ consumer bank accounts to 8,000+
    fintech apps via a developer-friendly API. Founded in 2013 by Zach Perret and William Hockey, Plaid powers account
    verification, transaction data, income verification, and fraud detection for fintechs ranging from Venmo and
    Robinhood to enterprise banks. Plaid has raised ~$1.3B in primary funding and is on an IPO trajectory targeting
    2026–2027.
