chapter:
  number: 1
  title: "Company Overview"
  summary: "Plaid is a San Francisco-based financial data infrastructure company founded in 2013 by Zach Perret and William Hockey, providing APIs that connect consumer bank accounts to 8,000+ fintech apps and enterprises. The company has raised ~$1.3B in primary funding, reached an $8B valuation via a February 2026 employee tender offer—up from the $6.1B April 2025 raise but well below the $13.4B 2021 peak—and achieved estimated $546M ARR in 2025 with adjusted EBITDA profitability, though it carries litigation history (a $58M privacy class action settled in 2022) and an uncertain IPO timeline."

sections:
  - id: "identity-mission"
    title: "Company Identity and Mission"
    body: "Plaid Inc. is a financial technology infrastructure company headquartered in San Francisco, California, incorporated in Delaware. Founded in 2013 by Zach Perret and William Hockey—both former consultants at Bain & Company—Plaid operates as the connectivity layer between consumer bank accounts and the apps and services that rely on financial data. The company's mission is to enable all companies to build fintech solutions by making it easy, safe, and reliable for people to connect their financial data to apps and services. Plaid's API platform provides a single integration point for developers to access bank account data, balances, transaction history, identity information, income data, and fraud signals across 12,000+ financial institutions. The platform supports more than 8,000 fintech, enterprise, and bank customers, including well-known applications such as Venmo, Robinhood, Coinbase, SoFi, Chime, Affirm, and Citi. As of May 2026, Plaid describes itself as the 'analytics platform for financial services,' having expanded from pure connectivity into identity verification, fraud prevention, credit underwriting, and payment initiation. The company operates in over 20 countries across North America, Europe, and the United Kingdom, with six offices globally."
    claimRefs: [CO001, CO002, CO003, CO004, CO010, CO011, CO035, CO036]
    tableRefs: [TO001]
    figureRefs: [FO002]

  - id: "founders-leadership"
    title: "Founders and Leadership"
    body: "Plaid was co-founded by Zachary 'Zach' Perret and William Hockey. Perret serves as CEO and is the primary public face of the company as of May 2026. Hockey departed as CTO in 2021 and went on to co-found Column, a chartered national bank; he remains a board director. The founding story involves an initial attempt to build a consumer financial planning app in 2012–2013, during which the founders encountered the difficulty of connecting to financial institutions and pivoted to building the connectivity API infrastructure itself. They gained early recognition by winning the 2013 TechCrunch Disrupt hackathon with an app called Rambler that visualized banking activity, which helped them attract seed funding from Spark Capital, Google Ventures, and NEA. As of 2026, the executive team includes Eric Sager (COO), Seun Sodipo (CFO), Jean-Denis Greze (CTO), Meredith Fuchs (Chief Legal Officer and General Counsel), Meghan Welch (Chief People Officer), Tom Daniels (CISO), and Ginger Baker (Chief Network Officer). In 2024, Plaid hired Jennifer Taylor as its first President; Taylor previously served as Chief Product Officer at Cloudflare and held senior roles at Salesforce, Facebook, and Adobe. The appointment of a CFO and President signals preparation for an eventual IPO process."
    claimRefs: [CO001, CO004, CO005, CO026, CO027, CO028, CO029, CO030, CO032, CO036, CO037]
    tableRefs: [TO002]

  - id: "funding-capitalization"
    title: "Funding History and Capitalization"
    body: "Plaid has raised approximately $1.3 billion in disclosed primary funding across multiple rounds from 2013 through 2025, plus an undisclosed-size employee liquidity tender offer in February 2026. The seed round of $2.8M in 2013 was followed by a $12.5M Series A, a $44M Series B in June 2016 (led by Goldman Sachs), and a $250M Series C in December 2018 (valuation $2.65B). In April 2021, at the peak of the fintech boom, Plaid raised $425M in a Series D led by Altimeter Capital at a $13.4B valuation—shortly after Visa's $5.3B acquisition attempt was abandoned under DOJ antitrust pressure. In April 2025, Plaid raised $575M in a down-round common-stock sale at $6.1B valuation, structured to fund employee RSU tax obligations and provide internal liquidity, with Franklin Templeton as lead alongside Fidelity, BlackRock, NEA, Ribbit Capital, Silver Lake, and J.P. Morgan. In February 2026, Plaid completed an employee tender offer at an $8B valuation—31% above the April 2025 price—with Citi Ventures, Goldman Sachs, AmEx Ventures, and others participating. The $8B valuation still represents a roughly 40% discount to the 2021 peak of $13.4B. Key shareholders and board-level investors include Andreessen Horowitz, Index Ventures, Ribbit Capital, Spark Capital, Altimeter Capital, Goldman Sachs, Silver Lake, NEA, Kleiner Perkins, and Franklin Templeton."
    claimRefs: [CO006, CO007, CO008, CO009, CO017, CO018, CO019, CO020, CO021, CO025]
    tableRefs: [TO003]
    figureRefs: [FO001]

  - id: "scale-metrics"
    title: "Scale, Financial Metrics, and Business Model"
    body: "Plaid operates as a B2B infrastructure company with a B2B2C usage pattern: its direct customers are fintechs, banks, lenders, and enterprises; the end users are the consumers whose accounts are linked. Pricing uses three models depending on the product: a one-time per-connected-account fee for verification primitives, a monthly subscription per connected account for products with persistent value, and a per-request fee for discrete API calls. Sacra estimates Plaid achieved $546M in ARR in 2025, representing approximately 40% YoY growth from $390M in 2024, with 2024 itself growing ~25% YoY. The company achieved positive operating margins in 2024 and full-year adjusted EBITDA profitability in 2025. Newer product lines—anti-fraud (Protect, Beacon), payments (Transfer), and credit underwriting—more than doubled in 2025 and surpassed 20% of total ARR. Plaid processes nearly 1 million new account connections daily, supports 100M+ global users, and claims 99.99% average uptime. Enterprise customers (1,000+ as of mid-2024) include Citibank, H&R Block, Western Union, Carvana, CarMax, Zillow, and Shopify. As of May 2026, Plaid has approximately 1,300 employees across six global offices, down from a pre-layoff peak; the company laid off ~260 employees (20%) in December 2022 and subsequently rebounded headcount."
    claimRefs: [CO012, CO013, CO014, CO022, CO023, CO024, CO034, CO038, CO039]
    tableRefs: []
    figureRefs: [FO003]

  - id: "milestones-adverse"
    title: "Key Milestones and Adverse Events"
    body: "Plaid's corporate history includes several consequential milestones and adverse events that materially shaped its trajectory. The company's founding pivot from consumer app to API infrastructure, reinforced by early adopters Venmo and Robinhood, established its market position. The Visa acquisition attempt in 2020 at $5.3B (abandoned January 2021 under DOJ antitrust scrutiny) both validated Plaid's strategic value and forced it to demonstrate independent viability. The 2022 class action settlement ($58M, final approval July 2022) required Plaid to delete data, overhaul consent disclosures, and implement privacy architecture changes affecting all users—an adverse event that set industry disclosure standards and triggered follow-on regulatory focus. The December 2022 layoff of 260 employees (20% of workforce) reflected post-pandemic fintech normalization. The April 2025 down-round at $6.1B (versus $13.4B 2021 peak) reflected compressed market multiples, though Perret publicly attributed it to macro conditions rather than business deterioration. The February 2026 tender offer at $8B demonstrated recovery and renewed investor confidence. In April 2026, law firms began investigating a reported Plaid data breach, creating a new pending adverse exposure whose outcome remains unresolved as of the run date. The JPMorgan Chase data access fee dispute, resolved in September 2025, also illustrates ongoing tension between Plaid and large data-provider banks."
    claimRefs: [CO014, CO015, CO016, CO017, CO031, CO033, CO038, CO040]
    tableRefs: [TO004]

