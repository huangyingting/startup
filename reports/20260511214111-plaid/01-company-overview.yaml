callouts:
  - calloutType: "strength"
    title: "Critical Infrastructure Moat"
    body: "Plaid's connectivity to 12,000+ financial institutions and 100M+ linked user accounts creates a durable network effect: each new bank and each new fintech onboarded strengthens the platform for all others. Switching costs for both sides are high once data relationships and developer integrations are established."
    claimRefs: [CO003, CO010, CO011, CO034]

  - calloutType: "risk"
    title: "Valuation Still 40% Below 2021 Peak"
    body: "Despite the February 2026 recovery to $8B, Plaid's current valuation is approximately 40% below the $13.4B 2021 peak, and the company has not yet provided a confirmed IPO timeline. An IPO at current market multiples would require sustained high-growth performance to attract institutional investors at favorable prices."
    claimRefs: [CO007, CO008, CO018]

  - calloutType: "risk"
    title: "Adverse Legal and Regulatory History"
    body: "Plaid settled a $58M privacy class action in 2022 covering 98M users, with required data deletion and disclosure changes. In April 2026, law firms announced investigations into a new data breach. Regulatory uncertainty around CFPB Section 1033 and bank-imposed data-access fees (JPMorgan deal, Sep 2025) create ongoing structural risks to Plaid's business model."
    claimRefs: [CO015, CO016, CO033, CO038]

  - calloutType: "insight"
    title: "AI Firms Drive 20% of New Customer Onboarding"
    body: "Plaid reported that AI companies represented 20% of newly onboarded customers in 2025, reflecting a new growth vector from AI-native applications requiring financial data access. Partnerships with Perplexity (April 2026) and the launch of a transaction foundation model illustrate active monetization of the AI opportunity."
    claimRefs: [CO039]

