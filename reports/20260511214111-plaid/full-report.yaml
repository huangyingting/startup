companyProfile:
  summary: >
    Plaid Inc. was founded in 2013 in San Francisco by Zachary Perret and William Hockey, who initially attempted to
    build a consumer personal-finance app before pivoting to the underlying data-connectivity layer. Plaid's API enables
    fintech apps to read consumer bank account data (with user consent) for account verification, transaction
    enrichment, identity, income verification, and credit underwriting. By 2025, Plaid had extended beyond data
    aggregation into fraud prevention (Beacon, Signal), payment initiation (Transfer), credit infrastructure (Layer),
    and income / employment verification (Income, Assets). The company withstood a failed $5.3B Visa acquisition (DOJ
    block, January 2021), a 20% workforce reduction in December 2022, and a 54% valuation reset from its $13.4B Series D
    peak — emerging as a leaner, operationally profitable business targeting a 2026–2027 IPO. As of early 2026, Plaid
    held ~70% US market share in open-banking aggregation and was growing ARR at approximately 40% year-over-year.
