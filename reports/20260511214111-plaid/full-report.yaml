      - number: '3.3'
        title: Pricing and Packaging Comparison
        blocks:
          - type: paragraph
            body: >
              Pricing in the financial data API market is typically opaque with published rates available only for
              lower-tier or starter plans. Plaid's pricing is structured as: (1) a one-time connection fee for
              Auth/Identity verification ($0.50–$1.50 per verified account depending on volume); (2) a
              per-connected-account monthly fee for ongoing Transactions subscriptions ($0.10–$0.30 per active account
              per month); (3) per-call fees for Income, Assets, and Signal; and (4) custom enterprise pricing negotiated
              for large institutions. The company shifted from pay-per-call to subscription models in 2020–2021 to
              smooth revenue and improve NDR.


              MX Technologies prices on an annual SaaS contract basis tied to number of data connections and enrichment
              features; its contracts typically run $250K–$1M+ for mid-market to enterprise clients. Finicity/Mastercard
              prices are generally enterprise-negotiated and benefit from bundling with Mastercard's broader data
              network services. Akoya pricing is structured around bank membership fees and usage-based charges for API
              calls by third parties connecting through the network. Stripe Financial Connections is priced at $1.50 per
              account connected for standard use and $0.10 for Balance checks—notably higher than Plaid for single-use
              verification, reflecting its premium bundled position within Stripe's ecosystem.


              The overall market shows a trend toward lower per-unit pricing as competition intensifies, with Plaid and
              competitors competing on bundled value rather than unit price. Plaid's multi-product approach (selling 3–4
              products per customer vs. single-product competitors) provides revenue resilience even as per-product
              pricing faces pressure.
