      - number: '1.3'
        title: Funding History and Capitalization
        blocks:
          - type: paragraph
            body: >-
              Plaid has raised approximately $1.3 billion in disclosed primary funding across multiple rounds from 2013
              through 2025, plus an undisclosed-size employee liquidity tender offer in February 2026. The seed round of
              $2.8M in 2013 was followed by a $12.5M Series A, a $44M Series B in June 2016 (led by Goldman Sachs), and
              a $250M Series C in December 2018 (valuation $2.65B). In April 2021, at the peak of the fintech boom,
              Plaid raised $425M in a Series D led by Altimeter Capital at a $13.4B valuation—shortly after Visa's $5.3B
              acquisition attempt was abandoned under DOJ antitrust pressure. In April 2025, Plaid raised $575M in a
              down-round common-stock sale at $6.1B valuation, structured to fund employee RSU tax obligations and
              provide internal liquidity, with Franklin Templeton as lead alongside Fidelity, BlackRock, NEA, Ribbit
              Capital, Silver Lake, and J.P. Morgan. In February 2026, Plaid completed an employee tender offer at an
              $8B valuation—31% above the April 2025 price—with Citi Ventures, Goldman Sachs, AmEx Ventures, and others
              participating. The $8B valuation still represents a roughly 40% discount to the 2021 peak of $13.4B. Key
              shareholders and board-level investors include Andreessen Horowitz, Index Ventures, Ribbit Capital, Spark
              Capital, Altimeter Capital, Goldman Sachs, Silver Lake, NEA, Kleiner Perkins, and Franklin Templeton.
