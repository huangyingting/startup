    sections:
      - number: '1.1'
        title: Company Identity and Mission
        blocks:
          - type: paragraph
            body: >-
              Plaid Inc. is a financial technology infrastructure company headquartered in San Francisco, California,
              incorporated in Delaware. Founded in 2013 by Zach Perret and William Hockey—both former consultants at
              Bain & Company—Plaid operates as the connectivity layer between consumer bank accounts and the apps and
              services that rely on financial data. The company's mission is to enable all companies to build fintech
              solutions by making it easy, safe, and reliable for people to connect their financial data to apps and
              services. Plaid's API platform provides a single integration point for developers to access bank account
              data, balances, transaction history, identity information, income data, and fraud signals across 12,000+
              financial institutions. The platform supports more than 8,000 fintech, enterprise, and bank customers,
              including well-known applications such as Venmo, Robinhood, Coinbase, SoFi, Chime, Affirm, and Citi. As of
              May 2026, Plaid describes itself as the 'analytics platform for financial services,' having expanded from
              pure connectivity into identity verification, fraud prevention, credit underwriting, and payment
              initiation. The company operates in over 20 countries across North America, Europe, and the United
              Kingdom, with six offices globally.
