      - number: '5.5'
        title: Reliability, Security, Privacy, and Compliance
        blocks:
          - type: paragraph
            body: >
              Plaid operates within a stringent regulatory and security compliance framework. Key certifications and
              compliance postures as of 2026 include: SOC 2 Type II (annual audit for security and availability), PCI
              DSS Level 1 (for payment card data handling within Transfer product), ISO 27001 (information security
              management), and CCPA/CPRA compliance for California consumer privacy rights. Plaid's Consumer Report
              product is also subject to the Fair Credit Reporting Act (FCRA), requiring specific procedures for
              consumer dispute handling, accuracy maintenance, and permissible purpose verification.


              The April 2026 data breach investigation is the most significant current compliance risk. Plaid disclosed
              that a limited number of consumer financial records were exposed due to a misconfigured third-party data
              processing partner. The incident triggered investigation by the CFPB and multiple state attorneys general.
              Plaid has engaged external forensics and notified affected consumers, but the investigation was ongoing as
              of the report date. Historically, Plaid resolved a $58M class action settlement in 2022 related to the
              alleged unauthorized sharing of consumer financial data without sufficiently explicit consent—indicating
              that data handling practices are a recurring legal risk area.


              On uptime and reliability: Plaid's published SLA for production API environments is 99.9% monthly uptime.
              The status page (status.plaid.com) shows historical incident data; significant incidents in 2024–2025
              include three outages exceeding 30 minutes affecting the Transactions product and one Auth degradation
              event during a large bank API migration. Enterprise SLAs include incident credits for downtime below the
              99.9% threshold. Plaid's engineering blog (available via the Plaid website) documents infrastructure
              investment in multi-region failover and rate limiting to prevent cascading failures.


              Privacy architecture: consumer data is handled under Plaid's Privacy Policy, which discloses the data
              sharing model to end consumers. The 2022 settlement required enhanced consent disclosures in the Link
              flow. Under CFPB 1033 Phase 1 (effective April 2026), Plaid's data handling must align with the
              regulation's data minimization and purpose limitation requirements, constraining how Plaid can aggregate
              and use consumer data beyond the permissioned use case.
