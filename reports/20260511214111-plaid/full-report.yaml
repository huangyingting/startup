  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Segmentation and Buyer Profiles
        blocks:
          - type: paragraph
            body: >
              Plaid's customer base is segmented along three dimensions: company type, use case, and scale. By company
              type, customers include: (1) pure fintech apps (Venmo, Robinhood, Coinbase, Chime, SoFi, Betterment) that
              use Plaid for core financial data connectivity; (2) lending platforms (Affirm, SoFi, LendingClub,
              LoanDepot) that use Income and Assets for underwriting; (3) PFM and financial wellness apps (NerdWallet,
              Mint historically, YNAB, Personal Capital) that use Transactions; (4) payments and disbursements platforms
              (Gusto, Brex) that use Auth and Transfer; and (5) enterprise banks and financial institutions that deploy
              Plaid APIs to power their own digital banking features.


              By scale, Plaid's customer pyramid has three tiers. The Long Tail tier (7,000+ apps) accounts for a small
              minority of ARR but is critical for ecosystem density and signal network value—these apps consume
              primarily Auth and Transactions at low volumes and are self-serve. The Mid-Market tier (~800 apps) pays
              $10K–$200K annual ARR and uses 2–4 products; these customers typically have dedicated account management.
              The Enterprise tier (~200 apps above $1M ARR) drives the majority of total ARR through multi-product
              contracts with volume commitments, dedicated SLAs, and direct relationships with Plaid's enterprise sales
              team.


              The buyer in all segments is the developer/engineering team that evaluates the API, but the economic buyer
              at enterprise scale is the CTO, VP of Engineering, or Head of Product. Procurement friction for enterprise
              deals is moderate: Plaid requires a master services agreement, acceptable use policy compliance review,
              and security questionnaire. Standard enterprise deal cycle is 4–8 weeks for new accounts. Renewal cycles
              are typically annual with auto-renew clauses.
            claimRefs:
