  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Financing History and Current Valuation Context
        blocks:
          - type: paragraph
            body: |
              Plaid has raised approximately $1.3B in primary equity capital across six rounds, with the final
              round being a $425M Series D at $13.4B post-money valuation in April 2021 — the peak of the
              fintech investment cycle. No Series E has been publicly announced as of May 2026, meaning Plaid
              has operated for over four years on capital raised at peak-cycle pricing. The company executed a
              $6.1B down-round tender offer in April 2025 to provide liquidity to employees and early investors
              at a 54% discount to the Series D valuation, with a subsequent $8.0B secondary market transaction
              in February 2026 showing partial recovery. The financing history reveals a company navigating the
              transition from growth-at-all-costs to a sustainable, profitability-oriented model, with the
              workforce reduction in 2023 and recovery in secondary valuations suggesting the business has
              stabilized but has not yet re-rated to 2021 peak levels. The absence of public financial statements
              creates significant uncertainty about whether the current $8.0–13.4B valuation range is defensible
              at current ARR levels and growth trajectory.
            claimRefs:
