      - number: '6.4'
        title: Retention, Durability, and Customer Satisfaction
        blocks:
          - type: paragraph
            body: >
              Plaid's structural retention advantage stems from high switching costs once the Link SDK is embedded in a
              consumer product. A developer who has integrated Plaid Link into their app's onboarding flow must rebuild
              the bank-linking UX, re-consent existing users, and validate data quality of an alternative aggregator to
              switch—a process requiring 3–6 months of engineering effort for a mature app. This switching cost is the
              primary driver of estimated Net Dollar Retention (NDR) of ~120%+.


              Quantitative retention metrics (GRR, churn rate, cohort renewal rates) are not publicly disclosed by Plaid
              as a private company. The third-party estimate of ~120%+ NDR is derived from Sacra analysis of expansion
              revenue patterns within Plaid's customer base. The key expansion pattern is: Auth as the initial product →
              Transactions for PFM features → Signal for fraud scoring → Transfer for payment initiation → Income for
              lending. This 5-product journey, traversed by larger enterprise customers over 2–4 years, generates the
              expansion revenue that pushes NDR above 100%.


              Developer satisfaction signals are mixed-to-positive: Plaid scores 4.2/5 on G2 (280+ reviews) and 4.0/5 on
              Capterra (50+ reviews). Common positive themes include documentation quality, API reliability, and breadth
              of institution coverage. Common critical themes include pricing opacity, support responsiveness for tier-1
              incidents, and occasional data quality issues for smaller or regional financial institutions. No material
              mass-churn events have been identified from public sources; the post-layoff period (2022–2024) shows no
              evident customer loss despite organizational disruption.
            claimRefs:
              - CU016
              - CU017
              - CU018
              - CU019
              - CU020
