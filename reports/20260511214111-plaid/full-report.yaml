      - number: '5.2'
        title: Technology Architecture and Data Pipeline
        blocks:
          - type: paragraph
            body: >
              Plaid's core infrastructure is a financial data aggregation and normalization platform operating at
              significant scale: approximately 12 billion data events processed annually, 8,000+ connected app
              integrations, and access to 12,000+ financial institutions. The technical architecture operates on three
              layers: (1) data acquisition, (2) data normalization and enrichment, and (3) API serving and product
              delivery.


              Data acquisition uses a hybrid approach. Primary method: direct bank API connections using OAuth-based
              open banking APIs where available (approximately 40% of institutions by coverage, representing the
              majority of accounts by volume). Fallback method: credential-based screen scraping for institutions
              without quality API access. Plaid has invested heavily in transitioning to API-based connections as CFPB
              Section 1033 mandates standardized bank APIs; by April 2026 Phase 1 implementation, direct API coverage is
              expected to increase substantially.


              Data normalization is Plaid's core technical IP: raw bank data (unstructured transaction descriptions,
              varied account schemas, institution-specific field names) is normalized into Plaid's proprietary financial
              data schema. This includes merchant categorization (a machine-learning pipeline that maps raw transaction
              descriptions to merchants and spending categories), income and cash-flow analysis models, and identity
              matching against consumer-provided data. The normalization layer generates the "enriched" data that
              distinguishes Plaid's output from raw bank data feeds.


              API serving infrastructure is cloud-based, deployed across AWS and Google Cloud Platform with multi-region
              redundancy. Plaid maintains a published status page (status.plaid.com) showing real-time API health;
              historical uptime records indicate 99.9%+ SLA compliance across core products. The Link SDK (the
              consumer-facing account-linking UI) is served as an iframe/webview component with no native SDK storage of
              credentials.
