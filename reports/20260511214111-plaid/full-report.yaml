      - number: '6.2'
        title: Customer Adoption Trajectory and Growth Metrics
        blocks:
          - type: paragraph
            body: >
              Plaid's publicly disclosed customer metrics provide a partial view of adoption trajectory. The app count
              grew from approximately 2,600 in 2018 (at Series C) to 5,500 in 2020, to 8,000+ in 2023–2024. Consumer
              accounts linked through Plaid grew from approximately 130 million in 2020 to 200 million+ as of 2025.
              Institution coverage grew from 6,000 in 2018 to 12,000+ in 2025.


              The acceleration in consumer account growth from 2020–2023 coincides with the pandemic-era fintech boom,
              when digital banking adoption surged and PFM app usage increased substantially. The slowdown in app count
              growth (from aggressive expansion in 2019–2021 to consolidation in 2022–2024) reflects the broader fintech
              market contraction following 2022 interest rate increases, which reduced new fintech app formation.
              However, the shift toward enterprise revenue means ARR growth does not track app count growth
              linearly—enterprise multi-product expansion within the existing base drives revenue even as net new app
              adds moderate.


              Activation rate data is not publicly available: Plaid does not disclose what percentage of developers who
              create sandbox accounts convert to production, or the average time-to-production. This is a key diligence
              gap, as a declining activation rate would signal deteriorating developer appeal or increasing competitive
              alternatives. The fact that API call volumes (and hence the data for Signal fraud models) continue growing
              suggests the active production base is healthy.
