      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >-
              Plaid was co-founded by Zachary 'Zach' Perret and William Hockey. Perret serves as CEO and is the primary
              public face of the company as of May 2026. Hockey departed as CTO in 2021 and went on to co-found Column,
              a chartered national bank; he remains a board director. The founding story involves an initial attempt to
              build a consumer financial planning app in 2012–2013, during which the founders encountered the difficulty
              of connecting to financial institutions and pivoted to building the connectivity API infrastructure
              itself. They gained early recognition by winning the 2013 TechCrunch Disrupt hackathon with an app called
              Rambler that visualized banking activity, which helped them attract seed funding from Spark Capital,
              Google Ventures, and NEA. As of 2026, the executive team includes Eric Sager (COO), Seun Sodipo (CFO),
              Jean-Denis Greze (CTO), Meredith Fuchs (Chief Legal Officer and General Counsel), Meghan Welch (Chief
              People Officer), Tom Daniels (CISO), and Ginger Baker (Chief Network Officer). In 2024, Plaid hired
              Jennifer Taylor as its first President; Taylor previously served as Chief Product Officer at Cloudflare
              and held senior roles at Salesforce, Facebook, and Adobe. The appointment of a CFO and President signals
              preparation for an eventual IPO process.
