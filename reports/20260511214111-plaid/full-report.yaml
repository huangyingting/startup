      - number: '1.4'
        title: Scale, Financial Metrics, and Business Model
        blocks:
          - type: paragraph
            body: >-
              Plaid operates as a B2B infrastructure company with a B2B2C usage pattern: its direct customers are
              fintechs, banks, lenders, and enterprises; the end users are the consumers whose accounts are linked.
              Pricing uses three models depending on the product: a one-time per-connected-account fee for verification
              primitives, a monthly subscription per connected account for products with persistent value, and a
              per-request fee for discrete API calls. Sacra estimates Plaid achieved $546M in ARR in 2025, representing
              approximately 40% YoY growth from $390M in 2024, with 2024 itself growing ~25% YoY. The company achieved
              positive operating margins in 2024 and full-year adjusted EBITDA profitability in 2025. Newer product
              lines—anti-fraud (Protect, Beacon), payments (Transfer), and credit underwriting—more than doubled in 2025
              and surpassed 20% of total ARR. Plaid processes nearly 1 million new account connections daily, supports
              100M+ global users, and claims 99.99% average uptime. Enterprise customers (1,000+ as of mid-2024) include
              Citibank, H&R Block, Western Union, Carvana, CarMax, Zillow, and Shopify. As of May 2026, Plaid has
              approximately 1,300 employees across six global offices, down from a pre-layoff peak; the company laid off
              ~260 employees (20%) in December 2022 and subsequently rebounded headcount.
