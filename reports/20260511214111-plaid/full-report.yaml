              The most notable capital structure feature is the February 2026 $8B tender offer, which allowed employees
              and early investors to sell secondary shares to new investors (Citi Ventures, Goldman Sachs, AmEx
              Ventures). This tender offer establishes the reference price for employee equity compensation and sets the
