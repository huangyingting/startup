      - number: '3.2'
        title: Feature and Capability Comparison
        blocks:
          - type: paragraph
            body: >
              Feature comparison across Plaid and its primary competitors reveals significant variation in product
              breadth, geographic coverage, and technical approach. Plaid leads on US institution coverage breadth,
              product suite depth (12+ distinct products), developer experience quality, and multi-use-case coverage
              spanning connectivity, fraud, income, and payments. MX Technologies differentiates on data enrichment and
              analytics depth—its transaction categorization and financial insights layer serves wealth management and
              enterprise clients with richer data models than Plaid's default transaction feed. Finicity/Mastercard
              leads on mortgage and lending verification, with GSE (Fannie Mae, Freddie Mac) approval for digital
              income/asset verification that gives it a strong position in the $2B+ annual mortgage verification market.


              Akoya is unique as a bank-owned API network that provides primary-data connections to its 11 founding bank
              members without screen-scraping, but its network is intentionally limited to direct participants and lacks
              the breadth to serve as a full Plaid substitute. Stripe Financial Connections leverages Stripe's massive
              merchant and developer ecosystem to bundle account connectivity with payment infrastructure, making it
              attractive for payment-first developers who already use Stripe—but its use cases are currently narrower
              (account verification and payment initiation) than Plaid's broader financial data platform.


              In the international market, Tink (Visa) and TrueLayer dominate EU/UK open banking with PSD2-compliant
              APIs, while Plaid's European presence remains limited despite Longitud and Quovo acquisitions. Brankas
              serves APAC markets where Plaid has no meaningful coverage. The competitive dynamics suggest a fragmented
              global market where no single provider leads across all geographies.
