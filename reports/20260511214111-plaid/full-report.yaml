  - number: 7
    title: Risks
    sections:
      - number: '7.1'
        title: Regulatory and Legal Risk
        blocks:
          - type: paragraph
            body: |
              Plaid operates at the intersection of financial data, open banking regulation, and consumer privacy
              — a legal environment in rapid flux across all major markets. The CFPB's Section 1033 rulemaking,
              ongoing FTC enforcement actions, state-level CCPA/CPRA compliance obligations, EU/UK GDPR
              requirements, and residual litigation risk from the 2021 DOJ-blocked Visa acquisition and a $58M
              class-action settlement create a dense and evolving regulatory risk stack. Plaid holds no bank
              charter itself but must comply with data-access regulations applicable to each financial institution
              partner and each jurisdiction in which consumers reside. The $58M settlement requires ongoing consent
              UI compliance and data minimization practices through at least 2026, and Section 1033's ambiguous
              "reasonable compensation" language creates an unresolved pricing risk for Plaid's core Auth revenue.
            claimRefs:
