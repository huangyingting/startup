  - id: FE001
    title: Plaid Data Acquisition and Normalization Architecture
    type: flow
    summary: >-
      Data flow from bank institution through Plaid's acquisition, normalization, and product delivery layers to
      developer app customers.
    data:
      nodes:
        - id: banks
          label: Financial Institutions (12,000+)
          description: >-
            Source of consumer financial data: banks, credit unions, brokerages, retirement accounts. Mix of direct
            OAuth/API and legacy credential-based connections.
        - id: acquisition
          label: Data Acquisition Layer
          description: >-
            Dual-rail: (1) Direct bank OAuth APIs (FDX standard; ~40% of institutions by count, majority by account
            volume); (2) Credential-based scraping fallback (~60% of institutions, declining as CFPB 1033 drives API
            adoption).
        - id: normalization
          label: Normalization and Enrichment Engine
          description: >-
            Proprietary ML pipeline: transaction enrichment (merchant categorization, category tagging), identity
            resolution, income extraction, asset categorization. Converts raw bank data into standardized Plaid schema.
        - id: products
          label: Product API Layer (12 products)
          description: >-
            Auth, Transactions, Identity, Income, Assets, Investments, Monitor, Signal, Protect, Beacon, Consumer
            Report, Transfer, Layer — each product exposes normalized data through distinct API endpoints.
        - id: link
          label: Plaid Link SDK
          description: >-
            Consumer-facing consent UI (iframe/WebView) that handles bank selection, OAuth redirect, consent capture,
            and token generation. Deployed by developer apps within their consumer flow.
        - id: developers
          label: Developer Apps (8,000+)
          description: >-
            Fintech apps, lenders, neobanks, PFM tools, payment platforms consuming Plaid APIs to power financial
            features for their end users.
      edges:
        - from: banks
          to: acquisition
          label: Bank data stream (API + scraping)
        - from: link
          to: acquisition
          label: Consumer credentials / OAuth token
        - from: acquisition
          to: normalization
          label: Raw financial records
        - from: normalization
          to: products
          label: Enriched financial data schema
        - from: products
          to: developers
          label: Plaid API response (JSON)
        - from: developers
          to: link
          label: Link token (triggers consumer flow)
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
  - id: FE002
    title: 'Developer Integration Workflow: From Sandbox to Production'
    type: flow
    summary: >-
      End-to-end developer journey for integrating Plaid, from initial setup to production deployment with live bank
      connections.
    data:
      nodes:
        - id: signup
          label: 1. Sign Up / Dashboard Access
          description: >-
            Developer creates Plaid account; receives API keys for sandbox environment within minutes. No contractual
            commitment required for sandbox.
        - id: sandbox
          label: 2. Sandbox Integration
          description: >-
            Developer integrates Plaid Link SDK and chosen product APIs against sandbox test credentials (simulated bank
            accounts). Quick Start guides for 10 languages; typical integration: 15–30 minutes.
        - id: testing
          label: 3. Test Scenarios
          description: >-
            Sandbox provides test institution with pre-populated account data for Auth, Transactions, Income, and other
            products. Developers validate error handling, edge cases, and UI flow.
        - id: review
          label: 4. Production Access Request
          description: >-
            Developer submits app for Plaid's review: intended use case, data handling practices, Terms of Service
            acceptance. Plaid reviews for compliance with developer agreement and acceptable use policy.
        - id: production
          label: 5. Production Launch
          description: >-
            Developer deploys with production API keys; Plaid Link connects to real financial institutions. Usage billed
            monthly based on product tier and volume.
        - id: expansion
          label: 6. Multi-Product Expansion
          description: >-
            Successful deployment often leads to addition of adjacent products (Auth → Signal → Transfer; Transactions →
            Income). Enterprise accounts negotiate bundled pricing and dedicated support.
      edges:
        - from: signup
          to: sandbox
          label: API keys issued instantly
        - from: sandbox
          to: testing
          label: SDK + API integration
        - from: testing
          to: review
          label: Submit for production access
        - from: review
          to: production
          label: Approval (hours–days)
        - from: production
          to: expansion
          label: Usage growth + upsell motion
