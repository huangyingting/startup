      - number: '1.5'
        title: Key Milestones and Adverse Events
        blocks:
          - type: paragraph
            body: >-
              Plaid's corporate history includes several consequential milestones and adverse events that materially
              shaped its trajectory. The company's founding pivot from consumer app to API infrastructure, reinforced by
              early adopters Venmo and Robinhood, established its market position. The Visa acquisition attempt in 2020
              at $5.3B (abandoned January 2021 under DOJ antitrust scrutiny) both validated Plaid's strategic value and
              forced it to demonstrate independent viability. The 2022 class action settlement ($58M, final approval
              July 2022) required Plaid to delete data, overhaul consent disclosures, and implement privacy architecture
              changes affecting all users—an adverse event that set industry disclosure standards and triggered
              follow-on regulatory focus. The December 2022 layoff of 260 employees (20% of workforce) reflected
              post-pandemic fintech normalization. The April 2025 down-round at $6.1B (versus $13.4B 2021 peak)
              reflected compressed market multiples, though Perret publicly attributed it to macro conditions rather
              than business deterioration. The February 2026 tender offer at $8B demonstrated recovery and renewed
              investor confidence. In April 2026, law firms began investigating a reported Plaid data breach, creating a
              new pending adverse exposure whose outcome remains unresolved as of the run date. The JPMorgan Chase data
              access fee dispute, resolved in September 2025, also illustrates ongoing tension between Plaid and large
              data-provider banks.
