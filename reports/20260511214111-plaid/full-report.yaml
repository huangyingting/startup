  - id: FU001
    title: 'Plaid Customer Journey: Discovery to Enterprise Expansion'
    type: journey-map
    summary: >-
      Customer journey from developer discovery through sandbox integration, production deployment, and multi-product
      enterprise expansion with Plaid.
    data:
      nodes:
        - id: discovery
          label: Discovery
          description: >-
            Developer discovers Plaid via documentation search, GitHub (react-plaid-link), Hacker News discussion,
            colleague recommendation, or Postman API network. Low friction: no sales contact required. Typical trigger:
            need to verify a bank account or pull transaction data in a fintech app.
        - id: sandbox
          label: Sandbox Integration
          description: >-
            Developer creates account; receives API keys instantly; integrates Link SDK in sandbox environment using
            Quick Start guide (~15–30 min). Tests against simulated bank accounts. No contract or credit card required.
            Conversion rate from signup to sandbox integration: unknown (key PLG metric).
        - id: production
          label: Production Launch
          description: >-
            Developer submits app for production access review (compliance check); receives production keys within hours
            to days; goes live with real bank connections. First invoice arrives based on actual usage. Most common
            first product: Auth (bank account verification).
        - id: growth
          label: Growth and Activation
          description: >-
            App grows user base; Plaid API call volume grows proportionally; revenue scales. Account manager assigned at
            $50K+ ARR threshold. Customer begins seeing value in adjacent products (Signal for fraud as payments scale;
            Transactions for PFM features).
        - id: expansion
          label: Multi-Product Expansion
          description: >-
            Enterprise account manager proposes product expansion: Auth → Signal → Transfer → Income/Assets. Bundle
            discount negotiated. Annual contract signed with volume minimums. NDR inflects above 100% as expansion
            outpaces base contract value.
        - id: deepening
          label: Platform Deepening
          description: >-
            Large enterprise (>$1M ARR) integrates 4+ products; customizes Link theme; accesses enterprise SLA;
            participates in Beacon consortium; considers Layer for checkout. Plaid becomes infrastructure-grade
            dependency in the app's technology stack.
