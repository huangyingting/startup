  - id: FV002
    title: 'Valuation Sensitivity: ARR × Multiple Scenarios'
    type: bar
    summary: >-
      Bar chart showing equity valuation outcomes across ARR scenarios ($400M, $550M, $700M, $900M) at three multiple
      assumptions (6x, 10x, 15x forward ARR). Illustrates that the $13.4B Series D price is only justifiable under
      bull-case ARR and multiple assumptions simultaneously.
    data:
      xAxis: ARR Scenario
      yAxis: Equity Valuation ($B)
      items:
        - label: $400M ARR at 6x (Bear)
          value: 2.4
          note: Bear case ARR × bear multiple = $2.4B
        - label: $550M ARR at 6x (Bear)
          value: 3.3
          note: Current ARR est. × bear multiple = $3.3B
        - label: $700M ARR at 6x (Bear)
          value: 4.2
          note: Base ARR × bear multiple = $4.2B
        - label: $900M ARR at 6x (Bear)
          value: 5.4
          note: Bull ARR × bear multiple = $5.4B
        - label: $400M ARR at 10x (Base)
          value: 4
          note: Bear ARR × base multiple = $4.0B
        - label: $550M ARR at 10x (Base)
          value: 5.5
          note: Current ARR est. × base multiple = $5.5B
        - label: $700M ARR at 10x (Base)
          value: 7
          note: Base ARR × base multiple = $7.0B; Series D price = $13.4B
        - label: $900M ARR at 10x (Base)
          value: 9
          note: Bull ARR × base multiple = $9.0B
        - label: $400M ARR at 15x (Bull)
          value: 6
          note: Bear ARR × bull multiple = $6.0B
        - label: $550M ARR at 15x (Bull)
          value: 8.3
          note: Current ARR est. × bull multiple = $8.3B
        - label: $700M ARR at 15x (Bull)
          value: 10.5
          note: Base ARR × bull multiple = $10.5B
        - label: $900M ARR at 15x (Bull)
          value: 13.5
          note: Bull ARR × bull multiple = $13.5B (= Series D price)
