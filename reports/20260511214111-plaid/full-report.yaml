      - number: '8.2'
        title: Comparable Valuation Analysis
        blocks:
          - type: paragraph
            body: |
              Plaid's peer group spans public fintech infrastructure companies, private API infrastructure players,
              and relevant M&A precedents. Public comps (Twilio, MX-equivalent infrastructure businesses) trade
              at 6–12x forward ARR in the 2025 market environment. Private fintech infrastructure rounds (Stripe
              at 23x ARR in 2023, MX at ~8x ARR in its last round) provide a wider range. Plaid's most directly
              comparable public company would be a pure-play financial data API infrastructure provider; no exact
              public comp exists, but Mastercard, Visa, and Fiserv's data connectivity businesses provide
              directional reference at 12–18x revenue for payment infrastructure. The key valuation tension is
              that Plaid's 40% YoY ARR growth (estimated) justifies a premium to slower-growing comps, but its
              private status, absence of audited financials, and regulatory uncertainty apply a 20–30% discount
              relative to a transparent public company. At 10x forward ARR ($546M × 10), the base-case intrinsic
              valuation is approximately $5.5B — materially below the $13.4B Series D price.
            claimRefs:
