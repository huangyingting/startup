  - id: TM004
    title: Growth Drivers and Constraints Table
    columns:
      - Driver / Constraint
      - Direction
      - Timing
      - Implication for Plaid
      - Diligence Ask
    rows:
      - - CFPB Section 1033 mandate
        - Positive driver
        - 2026–2029 phased rollout
        - Legitimizes Plaid's data model; forces bank API buildout that Plaid can serve
        - Track Phase 1 bank compliance (April 2026 deadline) and FDX coverage rates
      - - EU PSD2 / PSD3 open banking adoption
        - Positive driver
        - 2025–2027
        - Established international playbook; Plaid EU revenues growing from small base
        - Quantify non-US revenue contribution in 2025–2026 period
      - - Embedded finance / BaaS growth
        - Positive driver
        - 2025–2028
        - Expands non-fintech buyers; HR, real estate, retail apps all potential customers
        - Assess enterprise sales pipeline for non-fintech verticals
      - - Generative AI in personal finance
        - Positive driver
        - 2025–2027
        - AI-powered financial assistants require high-quality transaction data, increasing API call volume per user
        - Track AI-native fintech customer growth in 2026 cohort
      - - Consumer fintech adoption (mobile-first)
        - Positive driver
        - Ongoing
        - More users connecting bank accounts to apps = more link events, higher volume revenue
        - Monitor link volume per active app vs. prior year
      - - Bank opposition and data-access fees
        - Negative constraint
        - Ongoing / Escalating 2025–2026
        - JPMorgan, Wells Fargo, and others have restricted or charged for data access; threatens margin
        - Map bank-by-bank API availability and fee structure post-1033
      - - FDX adoption fragmentation
        - Negative constraint
        - 2025–2028
        - Uneven FDX standard adoption means dual-track maintenance cost for Plaid (API + scraping fallback)
        - Measure % of connections via OAuth vs. credential-based as of Q1 2026
      - - State privacy regulation expansion
        - Negative constraint
        - 2025–2028
        - >-
          CCPA/CPRA, Virginia CDPA, Texas, and 15+ other state laws create compliance burden for data enrichment
          products
        - Assess Plaid's compliance posture for Consumer Report (FCRA) and data retention
      - - Consumer credential-sharing distrust
        - Negative constraint
        - Ongoing
        - 40%+ of consumers wary of sharing bank credentials; impacts Link conversion rates
        - Track Link authorization abandonment rates by vertical
      - - Credit union / community bank API gaps
        - Negative constraint
        - 2026–2029
        - >-
          Smaller institutions not in Phase 1/2 of 1033 rollout may lack robust APIs through 2029, requiring
          screen-scraping fallback
        - Map Plaid's coverage of 5,000+ credit unions by API availability
    notes: >-
      Direction and timing assessments are analyst characterizations based on regulatory filings, industry research, and
      Plaid public statements. Not all constraints have equal materiality.
