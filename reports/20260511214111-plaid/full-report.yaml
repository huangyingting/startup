  - id: TV002
    title: Investment Thesis and Anti-Thesis Table
    description: Key thesis arguments and the evidence or conditions that would change the view for each argument.
    columns:
      - Dimension
      - Thesis Argument
      - Evidence Supporting
      - What Would Change the View
    rows:
      - - Market position
        - >-
          Plaid is the default bank connectivity layer with 500M+ accounts linked; network effects create a 10-year
          replication moat
        - 8,000+ apps; 12,000+ institutions; co-authorship of FDX API spec
        - FDX API mandates from Section 1033 enabling competitive entry at zero marginal cost; bank access revocation
      - - Product moat
        - >-
          Multi-product expansion (Signal, Income, Transfer, Layer) diversifies beyond Auth into high-margin,
          data-network-dependent products
        - ~40% ARR growth in 2025E; product suite expansion confirmed via Plaid blog and partner announcements
        - Competitors replicate Signal/Income with comparable accuracy; regulatory caps on data-derived scoring
      - - Customer retention
        - >-
          Link SDK integration creates 3-6 month switching cost; NDR of ~120% confirms expansion revenue over and above
          retained base
        - High switching costs documented by tech analysts; NDR estimate from Sacra
        - PayPal/Venmo builds in-house; two or more top-5 customers migrate to MX or build proprietary solutions
      - - Regulatory positioning
        - CFPB Section 1033 legitimizes open banking and Plaid's FDX co-authorship entrenches its compliance role
        - >-
          CFPB final rule Oct 2024; FDX co-authorship confirmed; Section 1033 requires developer ecosystem Plaid has
          built
        - CFPB 'reasonable compensation' language interpreted to cap Plaid fees; FDX spec mandates zero-cost data access
      - - Valuation discipline
        - >-
          Entry at $7-9B (refreshed valuation) with 3-5x upside to IPO at $20-25B at 15x ARR ($1.3-1.7B ARR by 2028) is
          attractive
        - >-
          Secondary market evidence ($6.1B 2025, $8B 2026) supports sub-$10B entry; 15x ARR multiple for high-growth
          infra is achievable at IPO
        - $13.4B Series D price not corrected; forced to invest at peak price without valuation reset
    notes: >-
      Thesis and anti-thesis arguments are analyst assessments based on public information. The thesis strength is
      directionally supported but cannot be fully validated without audited financials, customer contract data, and
      regulatory guidance.
    claimRefs:
