      - number: '2.2'
        title: 'Market Sizing: TAM, SAM, and SOM'
        blocks:
          - type: paragraph
            body: >
              Multiple independent research firms have sized the global open banking market, with estimates ranging from
              $22B to $95B by 2030–2032, reflecting different scope definitions and CAGR assumptions. Grand View
              Research estimates the global open banking market at $22.84B in 2023, growing to $135.17B by 2030 at CAGR
              of 28.6%. MarketsandMarkets sizes the market at $43.15B by 2026 from ~$7.29B in 2018, a 25% CAGR. Fortune
              Business Insights projects the market reaching $94.82B by 2032 at 26.9% CAGR from $24.64B in 2024. Mordor
              Intelligence estimates the open banking market at $24.05B in 2025, growing to $60.13B by 2030 at 20.1%
              CAGR. Allied Market Research projects $43.15B by 2026. Business Research Insights pegs 2023 market size at
              $18.13B growing to $78.43B by 2032.


              The divergence in estimates reflects scope variation: the largest estimates include the full stack of
              embedded finance and Banking-as-a-Service revenues, while the smallest estimates restrict to API licensing
              and data aggregation. For purposes of assessing Plaid's opportunity, the most relevant lens is the US
              financial data API and connectivity market, which represents approximately 30–40% of the global total
              given the US's share of fintech transaction volume. At a 30% share, a $43–95B global market implies a
              $13–29B US TAM by 2026–2032. Within this, Plaid's addressable segment—data connectivity for third-party
              apps excluding full BaaS—is estimated at $5–8B SAM, with a current SOM approximately 7–11% depending on
              which revenue metric is used against the $546M 2025E ARR.


              Growth rates are broadly consistent across sources in the 20–28% CAGR range, driven by regulatory
              tailwinds, rising API adoption, and financial-data use-case expansion into fraud, credit, and identity.
              The main uncertainty is whether the CFPB Section 1033 rule expands the market (by mandating open APIs at
              banks, lowering Plaid's data acquisition cost) or introduces competitive disruption (by enabling
              bank-direct API models that disintermediate aggregators like Plaid).
            claimRefs:
              - CM006
              - CM007
              - CM008
              - CM009
              - CM010
              - CM011
