      - number: '8.4'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: |
              The investment thesis rests on four compounding advantages: (1) network-effects moat from 500M+
              consumer accounts linked through Plaid Link across 12,000+ institutions, creating a verification
              network that would take a decade and billions to replicate; (2) regulatory entrenchment through
              FDX co-authorship giving Plaid structural influence over the Section 1033 compliance spec; (3)
              multi-product expansion from 60%+ Auth-dependent revenue toward high-margin, hard-to-replicate
              products (Signal fraud scoring, Income verification, Transfer ACH); and (4) developer platform
              lock-in from Link SDK integration requiring 3–6 months of re-consent and rebuilding to migrate.
              The anti-thesis centers on three structural threats: Section 1033 commoditizing the core Auth
              connectivity that underpins the majority of ARR; customer concentration in 5 apps accounting for
              an estimated 40–50% of API volume; and the absence of audited financials preventing independent
              validation of profitability claims. The anti-thesis is serious enough that entry at $13.4B
              requires specific diligence preconditions to be satisfied before the thesis outweighs the risks.
            claimRefs:
              - CV025
