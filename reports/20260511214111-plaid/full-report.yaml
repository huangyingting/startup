  - number: 2
    title: Market Analysis
    sections:
      - number: '2.1'
        title: Market Boundary and Definition
        blocks:
          - type: paragraph
            body: >
              Plaid operates at the intersection of three overlapping markets: financial data aggregation, open banking
              infrastructure, and identity-and-fraud infrastructure for financial services. The primary market addressed
              is financial data connectivity—APIs that enable third-party applications to securely read account
              balances, transactions, identity, and income data from financial institutions, and to initiate
              bank-to-bank payments. Adjacent but excluded from core sizing are core banking software (Temenos, FIS),
              payment networks (Visa, Mastercard, ACH rails), credit bureaus (Equifax, Experian, TransUnion), and
              personal financial management apps that are Plaid customers, not competitors.


              The included-spend boundary encompasses: bank account verification fees (for identity and lending
              workflows), transaction data subscriptions (PFM, wealth, analytics), income and asset verification
              (mortgage, lending), ACH payment initiation, fraud-scoring API calls, and identity-verification workflows.
              The key buyer profile is a B2B developer/enterprise: fintechs, neo-banks, lenders, wealth managers,
              tax-preparation apps, HR payroll processors, and increasingly banks themselves consuming a peer's open
              banking layer. The payer is the app/enterprise; the user is the consumer whose account is linked.


              Substitutes for Plaid's connectivity layer include: direct bank API relationships (available for top banks
              but impractical at scale), screen-scraping via credentials (legacy, declining under CFPB 1033), manual
              bank statement uploads (high-friction alternative), and credit-bureau tri-merge reports (partial
              substitute for income/asset data). The CFPB Section 1033 rule finalized in October 2024 is reshaping which
              substitutes remain viable by mandating that banks expose standardized APIs to authorized third parties by
              2026–2029 depending on institution size.
            claimRefs:
              - CM001
              - CM002
              - CM003
              - CM004
              - CM005
