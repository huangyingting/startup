      - number: '7.3'
        title: Partner and Dependency Risk
        blocks:
          - type: paragraph
            body: |
              Plaid depends on three categories of external relationships that each carry meaningful concentration
              or disruption risk: (1) financial institution data access — 12,000+ banks and credit unions whose
              screen-scraping permissions or API access could be withdrawn or restricted; (2) cloud infrastructure
              — AWS as the primary hosting platform; and (3) large fintech customer dependencies — the top 5
              customers (Venmo, Robinhood, Coinbase, Chime, SoFi) are estimated to represent 40–50% of API volume.
              Section 1033's FDX API standardization may reduce switching costs for financial institutions to
              block or restrict Plaid's access methods. The OCC's third-party risk management guidance compels
              banks to monitor aggregator relationships, creating compliance overhead that may incentivize banks
              to reduce their number of approved aggregator relationships over time, further concentrating the
              field to larger, more compliant players like Plaid.
