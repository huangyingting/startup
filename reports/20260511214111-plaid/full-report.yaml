      - number: '8.5'
        title: Recommendation, Diligence Asks, and Thesis-Break Triggers
        blocks:
          - type: paragraph
            body: |
              Recommendation: TRACK — do not invest at $13.4B without completing the four required diligence
              gates: (1) audited financial statements 2023–2025 showing $500M+ ARR and positive or near-breakeven
              EBITDA margins; (2) Series E closing at a refreshed, market-consistent valuation of $7–10B; (3)
              OAuth/FDX API migration status confirming less than 20% screen-scraping exposure; and (4) CFPB
              guidance on Section 1033 "reasonable compensation" language confirming Plaid can charge for data
              access above COGS. If all four gates clear, a $7–9B entry represents a potentially attractive
              risk-adjusted return with 3–5x exit upside via IPO at $20–25B in 2027–2028 (assuming 15x ARR on
              $1.3–1.7B ARR). If the valuation does not correct and Plaid proceeds toward IPO at $13.4B+, the
              risk/return is unattractive at current evidence levels. Conviction level: medium. Confidence in
              thesis direction (Plaid is a structurally important fintech infrastructure company) is high;
              confidence in valuation support at $13.4B is low without the above diligence gates.
