  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: Product Portfolio and Module Map
        blocks:
          - type: paragraph
            body: >
              Plaid's product suite as of 2026 comprises twelve discrete API modules organized across three value tiers.
              The foundational connectivity tier includes Auth (bank account verification for ACH), Transactions
              (enriched transaction history), Investments (portfolio data from brokerage accounts), and Monitor
              (continuous account health alerts). The intelligence and identity tier includes Identity (consumer
              identity and ownership verification), Income (employment and income verification for lending), Assets
              (asset report generation for mortgage and lending), Signal (ACH return risk score), Protect (fraud ring
              detection and synthetic identity), Beacon (collaborative fraud database), and Consumer Report
              (permissioned financial profile with FCRA compliance). The payments and checkout tier comprises Transfer
              (ACH payment orchestration) and Layer (embedded checkout UX with pre-filled payment data).


              Products in the intelligence tier have the highest growth momentum as of 2025—Signal and Protect more than
              doubled in ARR contribution according to Plaid's public communications. The Consumer Report product
              (launched 2024) is unique as a CFPB-regulated consumer reporting agency product, creating an entirely new
              category: permissioned financial data as a credit-reporting-adjacent service. Layer (launched late 2024)
              targets checkout conversion for merchants and is Plaid's first direct-to-consumer-experience product
              rather than a pure backend API.


              The product map reveals deliberate vertical integration: a customer who deploys Plaid Auth for account
              linking may expand to Signal for fraud scoring, Beacon for fraud ring detection, and Transfer for payment
              initiation—creating a multi-product bundle that is materially more defensible than any single-product
              deployment. This bundling is Plaid's primary strategy to increase ARPU within its 8,000-app customer base.
            claimRefs:
