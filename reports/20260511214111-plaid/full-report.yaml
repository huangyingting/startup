        title: Unit Economics and Margin Structure
        blocks:
          - type: paragraph
            body: >
              Plaid's gross margin is estimated at 70–80% based on comparable API infrastructure companies and the
              structure of its cost base. Primary cost of goods sold includes: data acquisition costs (fees paid to
              financial institutions for API access, including the outcome of the JPMorgan data-fee dispute resolved
              September 2025), cloud infrastructure for API serving and data processing, and third-party data licensing.
              Plaid's data costs are a key variable—as CFPB 1033 Phase 1 takes effect in April 2026, the company may
              face new data access fees from large banks currently providing data without charge, or alternatively may
              see cost reductions if bank API quality improves and eliminates expensive fallback scraping.


              Operating expenses are dominated by R&D (product engineering) and sales/marketing. Headcount at ~1,318
              employees implies a revenue-per-employee of approximately $414K at the $546M ARR level, in line with
              high-efficiency SaaS companies. The December 2022 layoff of 260 employees improved operational leverage
              entering 2023–2024. G&A expenses include the cost of maintaining CFPB-compliant data handling, FCRA
              compliance for Consumer Report, and legal costs related to ongoing settlement monitoring and the April
              2026 data breach investigation.


              Customer acquisition cost (CAC) is structurally low for developer-led growth: developers self-onboard via
              the sandbox and documentation, converting to paid without sales touch for lower tiers. Enterprise CAC is
              higher but recouped quickly given high NDR (~120%+ estimated) and multi-year contract values. Lifetime
              value (LTV) is elevated by the multi-product upsell motion—customers who start with Auth typically expand
              to Transactions, then Income, Signal, or Transfer over 12–24 months.
