  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Model and Pricing Structure
        blocks:
          - type: paragraph
            body: >
              Plaid operates a B2B API monetization model with three primary revenue structures. First, one-time
              per-connection fees: customers pay a fee each time a consumer links a new bank account through Plaid's
              Link interface, used primarily for Auth (bank account verification) and Identity products. Fees range from
              approximately $0.50 to $1.50 per verified connection depending on product and volume tier. Second, monthly
              subscription per active connected account: the Transactions product charges approximately $0.10–$0.30 per
              active account per month, creating recurring revenue proportional to the app's active user base. Third,
              per-call API fees: discrete use cases like Income verification, Assets (asset reports), Signal (fraud
              scores), and Consumer Report generate per-call fees that vary by product complexity.


              Plaid shifted from predominantly pay-per-call to subscription-weighted pricing between 2020 and 2022, a
              move that improved revenue predictability and Net Dollar Retention (NDR). Enterprise customers (1,000+
              apps) negotiate annual contracts with volume discounts, minimum commitments, and multi-product bundling.
              The company's pricing page is publicly accessible but enterprise contract terms are confidential.


              Revenue diversification is a key financial theme: the older connectivity and PFM use cases (Transactions,
              Auth) represent the majority of historical revenue, while fraud (Signal, Protect, Beacon), payments
              (Transfer), and identity/credit (Consumer Report, Layer) have grown to represent an estimated 20%+ of ARR
              as of 2025. This diversification reduces reliance on PFM app spending cycles and expands into higher-value
              use cases with better margin profiles.
