      - number: '6.3'
        title: Named Customer Evidence and Deployment Quality
        blocks:
          - type: paragraph
            body: >
              Plaid's customer base includes many of the most prominent consumer fintech brands. The highest-evidence
              deployments are anchored by Venmo (a PayPal property), which was Plaid's first major customer in 2013–2014
              and continues to use Plaid for bank account linking for P2P transfers. Robinhood's S-1 filing with the SEC
              identified Plaid as a key third-party vendor and disclosed that Plaid's services are integrated into
              Robinhood's brokerage account funding workflow. Coinbase has similarly disclosed reliance on Plaid for
              bank account verification and ACH funding in its SEC filings.


              Beyond the mega-apps, Plaid's documented customer base includes: SoFi (banking, lending, and investment
              flows), Betterment (investment account linking for transfers), Chime (account verification and funding),
              Affirm (income verification for BNPL underwriting), NerdWallet (financial account aggregation for
              recommendations), Gusto (payroll and banking integration), and hundreds of digital banks, neobanks, and
              embedded finance platforms. Plaid maintains a public customer showcase page listing logos and use cases.


              Customer proof quality is highest for publicly traded companies (Robinhood, Coinbase, SoFi, Affirm) that
              reference Plaid in SEC filings as a material third-party dependency. For non-public customers (Chime,
              Betterment, NerdWallet, Gusto), evidence comes from press releases, product blog posts, and Plaid's own
              case study materials. Developer reviews on G2 and Capterra confirm production deployment and provide
              qualitative satisfaction signals.
            claimRefs:
