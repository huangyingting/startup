  - id: TV005
    title: Thesis-Break and Kill Trigger Table
    description: Measurable events that would invalidate the investment thesis with transmission and action implications.
    columns:
      - Trigger
      - Threshold / Kill Event
      - Transmission to Thesis
      - Action Implication
    rows:
      - - CFPB Section 1033 compensation cap ruling
        - >-
          CFPB guidance explicitly capping data aggregator fees below $0.05/call OR mandating zero-cost access for
          FDX-compliant APIs
        - >-
          Eliminates pricing power for core Auth product; ARR deceleration to single-digit or negative growth; valuation
          reset below $3B
        - Immediate position exit if holding; suspend new investment until CFPB clarification
      - - Mass customer departure
        - >-
          Two or more top-5 customers (>20% combined API volume) announcing migration to alternative aggregator within
          12 months
        - ARR growth reversal; churn evidence triggers valuation multiple compression; management credibility impaired
        - Downgrade to sell/exit; request emergency data room access to confirm revenue impact
      - - Security breach above threshold
        - Confirmed breach of >100K consumer financial accounts attributed to Plaid infrastructure failure
        - Regulatory enforcement action; customer churn cascade; IPO delayed or cancelled; brand destruction
        - Exit position immediately; breach events have shown to be permanent impairments at this scale
      - - Failure to achieve positive EBITDA
        - Audited financials showing negative EBITDA margin in FY2025 despite 40% ARR growth claims
        - Calls into question unit economics thesis; implies ARR growth is being bought through margin compression
        - Suspend investment; require audited FY2025 financials before any new capital commitment
      - - Series E at below $7B valuation
        - Plaid closes primary equity round at valuation below $7.0B post-money
        - >-
          Confirms market view that $13.4B Series D was overpriced; existing investor impairment; management signaling
          growth rate disappointment
        - Entry opportunity at series price with appropriate discount to secondary; re-evaluate thesis with new data
    notes: >-
      Thresholds are investor-defined diligence triggers, not company-disclosed metrics. Some triggers (CFPB
      compensation cap) are regulatory events outside management's control; others (Series E valuation) are outcomes of
      management execution.
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
  - id: TV006
    title: Final Diligence Asks Table
    description: Evidence gaps requiring resolution before investment conviction can be established at any valuation.
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Audited financials
        - No audited financial statements for FY2023, FY2024, or FY2025 are publicly available
        - Cannot verify ARR, margins, burn rate, or cash position independently; all valuation modeling is approximate
        - >-
          Require as data room item; engage Big-4 auditor engagement letter as proof of intent; precondition to term
          sheet
      - - OAuth migration status
        - Current % of financial institution connections using OAuth/FDX API vs. screen-scraping not disclosed
        - >-
          Screen-scraping exposure is both a security risk and a Section 1033 compliance risk; status determines
          regulatory risk timing
        - Require OAuth migration report in data room; monthly progress updates during diligence period
      - - Customer concentration breakdown
        - Top 10 customer ARR contribution and contract terms not publicly available
        - >-
          Customer concentration above 15% in any single customer is material revenue risk; Venmo/PayPal estimated at
          15%+
        - Request top-10 customer ARR schedule with renewal dates; review contract MSAs for termination provisions
      - - CFPB regulatory correspondence
        - Private regulatory correspondence between Plaid and CFPB/FTC/OCC not publicly accessible
        - >-
          Undisclosed investigations or pre-enforcement inquiries could affect IPO timing and compliance costs
          materially
        - Require regulatory correspondence disclosure with representations and warranties of completeness
      - - Series E / cap table
        - >-
          Post-tender-offer cap table with preference stack, anti-dilution provisions, and Series D+ liquidation
          preferences not available
        - >-
          Preference overhang can impair common equity returns in downside and base scenarios; preference multiple and
          conversion terms matter
        - Request full capitalization table with waterfall analysis in data room
      - - ARR by product segment
        - ARR breakdown by product (Auth, Signal, Income, Transfer, Layer, Identity) not disclosed
        - >-
          Multi-product diversification is a key bull thesis element; without segmentation, ARR durability and growth
          mix cannot be assessed
        - Request product-level ARR breakdown in data room; validate multi-product adoption rates
    notes: >-
      These are minimum-bar diligence items for any institutional investment; failure to provide any one of these in a
      data room is a yellow flag requiring explanation before investment can proceed.
    claimRefs:
      - CV038
      - CV039
      - CV040
      - CV033
      - CV034
