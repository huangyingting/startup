      - number: '2.3'
        title: Market Segmentation and Buyer Map
        blocks:
          - type: paragraph
            body: >
              The open banking and financial data API market is segmented along two primary axes: use case (what the
              data is used for) and buyer type (who purchases the API). The largest use-case segments by transaction
              volume are personal finance and PFM (budgeting, net worth tracking), lending and credit underwriting
              (income/asset verification), and bank-to-bank payments (ACH initiation). Emerging high-growth segments
              include identity verification (KYC/AML for fintech onboarding), fraud prevention (real-time transaction
              risk scoring), embedded wealth management, and tax and payroll connectivity.


              Buyer types span from developer-stage startups (lowest contract value, highest volume) through Series B/C
              fintechs (mid-market enterprise) to large banks and financial institutions purchasing API connectivity for
              their own products. Budget ownership varies significantly: developer-stage buyers use Plaid's pay-per-call
              model on self-serve plans, while large enterprise buyers engage on annual subscription contracts
              negotiated by Plaid's enterprise sales team. The adoption trigger differs by segment: lending apps are
              driven by compliance requirements for income verification; PFM apps by user onboarding quality; payment
              apps by ACH conversion rates; and banks by internal digital transformation pressures and CFPB 1033
              compliance readiness.


              Geographic concentration is heavily US-biased today—Plaid covers 12,000+ US financial institutions
              compared to hundreds in the UK and EU. The company launched EU operations via the Longitud and Quovo
              acquisitions and organic expansion, but as of 2025 the non-US market contributes less than 10% of revenue,
              making the US open banking timeline under CFPB 1033 the dominant near-term growth lever.
            claimRefs:
              - CM015
              - CM016
              - CM017
              - CM018
              - CM019
              - CM020
