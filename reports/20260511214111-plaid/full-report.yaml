      - number: '8.3'
        title: Bull / Base / Bear Scenario Analysis
        blocks:
          - type: paragraph
            body: |
              The bull case requires Section 1033 to entrench Plaid as the compliance infrastructure layer,
              with multi-product ARR expansion (Signal, Income, Transfer, Layer) driving ARR to $900M+ by 2027
              and a successful IPO at 15–18x forward ARR — consistent with high-growth public infrastructure
              comps at their best. At $900M ARR × 15x, equity value would be $13.5B, roughly matching the
              Series D price and potentially yielding positive returns depending on dilution. The base case
              assumes ARR reaches $700M by 2027 at 10x ARR = $7B equity value, representing a 48% markdown
              from $13.4B. The bear case — regulatory commoditization of core Auth revenue, major customer
              churn, or a failed IPO forcing a distressed Series E — results in $3–4B valuation range at 6x
              ARR on a lower revenue base. Probability-weighting across scenarios yields an expected value of
              approximately $6.5–7.5B, suggesting the $13.4B Series D price embeds significant downside risk
              for investors entering at that level. Secondary market evidence (2025 down-round at $6.1B,
              2026 recovery at $8B) is broadly consistent with this base-to-bear range.
            claimRefs:
