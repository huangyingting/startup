            body: >
              Plaid has raised approximately $1.3B in primary equity funding since 2013, plus an employee tender offer
              in February 2026. The capital structure is conventional for a late-stage VC-backed company: common
              stockholders include employees and founders; preferred stockholders include institutional investors across
              all rounds from Spark Capital (seed, 2013) through Franklin Templeton and BlackRock (Series E, 2025). No
              public debt or credit facilities have been disclosed, though it is common for companies at Plaid's scale
