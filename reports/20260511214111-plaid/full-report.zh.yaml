    title: 投资 KPI 评分卡
    type: kpi
    summary: 为投委会汇报准备的 Plaid 八项投资维度结构化评分。分数同时反映公开可得证据质量和分析师对各维度的评估。
    data:
      items:
        - label: 市场机会
          value: 8
          unit: /10
          description: $43–95B TAM；美国市场份额 35%+；开放银行顺风强劲
        - label: 竞争护城河
          value: 7
          unit: /10
          description: 网络效应、参与 FDX 共同起草、Link SDK 锁定效应；Section 1033 构成部分威胁
        - label: 客户验证
          value: 8
          unit: /10
          description: 8,000+ 个应用；SEC 文件点名的大型企业客户；高切换成本已有体现
        - label: 财务健康
          value: 5
          unit: /10
          description: ARR 估计 ~$546M；无经审计财务；盈利未确认；现金跑道不确定
        - label: 管理层 / 团队
          value: 7
          unit: /10
          description: 创始人经验丰富；在 FDX 中有领导地位；成功应对 Visa 交易与监管逆风
        - label: 监管 / 法律风险
          value: 5
          unit: /10
          description: Section 1033 双刃剑；$58M 和解；CFPB 补偿风险待解
        - label: 估值纪律
          value: 4
          unit: /10
          description: $13.4B Series D 轮 >> $5.5–8B 基准内在价值；只有估值刷新至 $7–10B，入场才可行
        - label: 证据质量
          value: 4
          unit: /10
          description: 私营公司；无经审计财务；所有 ARR / 利润率数据均为第三方估计
