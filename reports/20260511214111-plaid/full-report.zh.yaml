      - number: '6.4'
        title: 留存、耐久性与客户满意度
        blocks:
          - type: paragraph
            body: >
              Plaid 的结构性留存优势，来自 Link SDK 嵌入消费者产品后的高切换成本。开发者一旦把 Plaid Link 集成进应用 onboarding
              流程，若要切换，就必须重建银行连接用户体验、让既有用户重新授权，并验证替代聚合器的数据质量；成熟应用通常需要 3–6 个月工程投入。这个切换成本，是估计净美元留存率（NDR）约 120%+ 的主要驱动。


              Plaid 作为私营公司，不公开定量留存指标（GRR、流失率、队列续约率）。第三方估计约 120%+ NDR，来自 Sacra 对 Plaid 客户基础内扩张收入模式的分析。关键扩张路径是：Auth 作为初始产品
              → Transactions 支撑 PFM 功能 → Signal 做欺诈评分 → Transfer 做支付发起 → Income 服务贷款。大型企业客户在 2–4 年内走完这条 5 产品路径，扩张收入把 NDR
              推到 100% 以上。


              开发者满意度信号偏正面但不单一：Plaid 在 G2 得分 4.2/5（280+ 条评价），在 Capterra 得分 4.0/5（50+ 条评价）。常见正面主题包括文档质量、API
              可靠性和机构覆盖广度；常见批评包括定价不透明、一级事故支持响应速度，以及较小或区域性金融机构偶发的数据质量问题。公开来源未发现重大大规模流失事件；裁员后阶段（2022–2024）虽有组织扰动，但没有明显客户流失迹象。
            claimRefs:
              - CU016
              - CU017
              - CU018
              - CU019
              - CU020
