  - number: 4
    title: 财务情况
    sections:
      - number: '4.1'
        title: 收入模型与定价结构
        blocks:
          - type: paragraph
            body: >
              Plaid 采用 B2B API 变现模型，主要有三种收入结构。第一，一次性按连接收费：每当消费者通过 Plaid 的 Link 界面连接新的银行账户，客户支付费用，主要用于 Auth（银行账户验证）和
              Identity 产品。费用约为每个已验证连接 $0.50 到 $1.50，取决于产品和用量层级。第二，按活跃已连接账户月度订阅：Transactions 产品按每个活跃账户每月约 $0.10–$0.30
              收费，形成与应用活跃用户基数成比例的经常性收入。第三，按调用收取 API 费用：Income 验证、Assets（资产报告）、Signal（欺诈评分）和 Consumer Report
              等离散用例，根据产品复杂度产生不同按调用费用。


              2020 至 2022 年间，Plaid 从以按调用付费为主，转向订阅权重更高的定价，这提高了收入可预测性和净美元留存（NDR）。企业客户（1,000+
              个应用）谈判年度合同，包含用量折扣、最低承诺和多产品打包。公司定价页公开可访问，但企业合同条款保密。


              收入多元化是关键财务主题：较老的连接和 PFM 用例（Transactions、Auth）贡献历史收入的大部分，而欺诈（Signal、Protect、Beacon）、支付（Transfer）和身份 /
              信贷（Consumer Report、Layer）截至 2025 年已增长到估计 ARR 的 20%+。这种多元化降低了对 PFM 应用支出周期的依赖，并把业务扩展到更高价值、利润率更好的用例。
            claimRefs:
              - CI001
              - CI002
