              - CV036
      - number: '8.5'
        title: 投资建议、尽调要求与投资逻辑破裂触发点
        blocks:
          - type: paragraph
            body: |
              投资建议：观察——在完成四个必需尽调关口前，不应以 $13.4B 投资：（1）2023–2025 年经审计财务报表，
              显示 $500M+ ARR，且 EBITDA 利润率为正或接近盈亏平衡；（2）Series E 以 $7–10B 的刷新后、
              符合市场的估值完成；（3）OAuth/FDX API 迁移状态确认 screen-scraping 暴露低于 20%；以及（4）CFPB
              对 Section 1033 “reasonable compensation” 措辞给出指引，确认 Plaid 可对高于 COGS 的数据访问收费。
              如果四关全部通过，$7–9B 进入可能具备有吸引力的风险调整后回报，并有望通过 2027–2028 年 $20–25B
              IPO 退出实现 3–5x 上行（假设 $1.3–1.7B ARR 按 15x ARR 估值）。如果估值不修正，Plaid
              又继续以 $13.4B+ 推进 IPO，以当前证据水平看，风险 / 回报不具吸引力。信念水平：中。对投资逻辑方向的信心高——Plaid
              是结构性重要的 fintech 基础设施公司；但若没有上述尽调关口，对 $13.4B 估值支撑的信心低。
