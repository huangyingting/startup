  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 融资历史与当前估值背景
        blocks:
          - type: paragraph
            body: |
              Plaid 通过六轮融资共募集约 $1.3B 新股资本，最后一轮是在 2021 年 4 月以 $13.4B
              投后估值完成的 $425M Series D，正值 fintech 投资周期顶点。截至 2026 年 5 月，Plaid
              没有公开宣布 Series E，这意味着公司已经用周期顶点定价融来的资本运营超过四年。2025 年 4 月，
              公司以 $6.1B 估值执行 down-round tender offer，为员工和早期投资人提供流动性，较 Series D
              估值折让 54%；随后 2026 年 2 月的 $8.0B 二级市场交易显示估值部分修复。融资历史呈现的是一家公司
              正从“不惜代价增长”转向可持续、以盈利为导向的模式；2023 年裁员和二级市场估值修复说明业务已经稳定，
              但尚未重估回 2021 年峰值。缺乏公开财务报表，使当前 $8.0–13.4B 估值区间在现有 ARR 水平和增长轨迹下
              是否站得住，仍有显著不确定性。
