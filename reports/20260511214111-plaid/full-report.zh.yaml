      - number: '8.3'
        title: 乐观 / 基准 / 悲观情景分析
        blocks:
          - type: paragraph
            body: |
              乐观情景要求 Section 1033 把 Plaid 固化为合规基础设施层，并由多产品 ARR 扩张（Signal、Income、Transfer、Layer）
              推动 ARR 到 2027 年达到 $900M+，再以 15–18x forward ARR 成功 IPO；这与高增长上市基础设施公司最强时期的可比倍数一致。
              按 $900M ARR × 15x，股权价值为 $13.5B，大致匹配 Series D 价格，且视稀释情况可能产生正回报。
              基准情景假设 2027 年 ARR 达到 $700M，并按 10x ARR 估值为 $7B 股权价值，较 $13.4B
              折价 48%。悲观情景下，核心 Auth 收入被监管商品化、主要客户流失，或 IPO 失败迫使公司进行受困 Series E；
              在更低收入基础上按 6x ARR，对应 $3–4B 估值区间。对各情景按概率加权，期望价值约为 $6.5–7.5B，
              说明以 $13.4B Series D 价格进入的投资人，面临显著下行风险。二级市场证据（2025 年 $6.1B
              down-round、2026 年恢复至 $8B）总体也与基准到悲观区间一致。
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
              - CV022
              - CV023
              - CV024
          - type: table
            tableRef: TV003
            claimRefs:
              - CV017
              - CV018
              - CV019
              - CV020
              - CV021
      - number: '8.4'
        title: 投资逻辑与反向逻辑
        blocks:
          - type: paragraph
            body: |
              投资逻辑建立在四个复利优势上：（1）Plaid Link 已在 12,000+ 家机构连接 500M+ 消费者账户，
              形成网络效应护城河；要复制这个验证网络，需要十年时间和数十亿美元投入。（2）Plaid 共同起草 FDX，
              在 Section 1033 合规规范上拥有结构性影响力，带来监管嵌入。（3）收入从 60%+ 依赖 Auth
              转向高毛利、难复制的多产品组合（Signal 欺诈评分、Income 验证、Transfer ACH）。（4）Link SDK
              集成带来开发者平台锁定，迁移需要 3–6 个月重新授权和重建。反向逻辑集中在三项结构性威胁：
              Section 1033 使支撑多数 ARR 的核心 Auth 连接商品化；5 个应用贡献估计 40–50% API 调用量，
              客户集中；缺乏经审计财务，无法独立验证盈利声明。反向逻辑足够严肃，以 $13.4B 进入前，
              必须先满足具体尽调先决条件，投资逻辑才足以压过风险。
            claimRefs:
              - CV025
              - CV026
              - CV027
              - CV028
              - CV029
              - CV030
              - CV031
              - CV032
