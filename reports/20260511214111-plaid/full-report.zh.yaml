          description: 估计约 15% 的注册用户进入生产；许多沙盒用户只是评估或原型验证，没有生产用例。Plaid 会审核生产申请，可能筛掉部分申请者。
        - label: 活跃付费应用
          value: 8000
          description: Plaid 公开披露的活跃应用数（累计存量，不是年度新增）。包括每月支付 $50 起的长尾自助账户，也包括大型企业账户。
        - label: 中端市场账户（$10K–$1M ARR）
          value: 800
          description: 估计约 10% 的活跃应用处于中端市场层级；这些账户有专属客户管理，通常使用 2–4 个 Plaid 产品。
        - label: 企业账户（>$1M ARR）
          value: 200
          description: 估计约 2–3% 的活跃应用；通过多产品年度合同贡献大部分总 ARR。该层级包括超级应用（Venmo、Robinhood、Coinbase、Chime、SoFi）。
