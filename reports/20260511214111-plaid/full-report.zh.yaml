      - number: '4.2'
        title: ARR 增长与财务轨迹
        blocks:
          - type: paragraph
            body: >
              基于 Sacra 的第三方分析，并结合 Plaid 融资披露中的佐证信号，Plaid 的估计年经常性收入（ARR）轨迹为：$200M（2022）、$312M（2023，约 56% 增长）、$390M（2024，约
              25% 增长）和 $546M（2025E，约 40% 增长）。2025 年增速从 2024 年约 25% 加速到约 40%，归因于欺诈和支付产品扩张、CFPB Section 1033
              顺风带来新的连接用例，以及现有企业账户扩张。


              Plaid 2024 年实现正经营利润率，Zach Perret 也公开确认 2025 全年调整后 EBITDA 盈利。公司不公开披露 GAAP 财务，因此确切收入、毛利率和经营利润无法从公开文件核验。考虑到
              Plaid 在多轮融资中按不同执行价授予员工股权，股权激励是重大非现金费用；$575M 融资创建的 2025 年 RSU 重组计划，也让 GAAP 与调整后盈利对比更复杂。


              April 2025 以 $6.1B 估值完成的 $575M 融资，是一轮新股融资，专门用于支付二级市场要约收购定价触发的 RSU 归属所得税预扣。这个财务结构并不常见，与成长资本融资不同；$575M
              主要没有进入 Plaid 资产负债表用于运营，而是覆盖员工股权归属税款。融资后现金和资产负债表实力估计较强（现金可能超过 $400M），足以支持有机投资，近期无需再融资。
