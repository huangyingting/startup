      - number: '4.3'
        title: 单位经济与利润率结构
        blocks:
          - type: paragraph
            body: >
              基于可比 API 基础设施公司以及成本结构，Plaid 毛利率估计为 70–80%。主要销售成本包括：数据获取成本（向金融机构支付的 API 访问费用，包括 September 2025 解决的 JPMorgan
              数据费争议结果）、API 服务和数据处理所需云基础设施，以及第三方数据授权。Plaid 的数据成本是关键变量——CFPB 1033 第一阶段于 April 2026
              生效后，公司可能面对大型银行新增数据访问费，这些银行当前免费提供数据；反过来，如果银行 API 质量提高并淘汰昂贵的兜底抓屏，成本也可能下降。


              经营费用主要由研发（产品工程）和销售 / 市场构成。约 1,318 名员工意味着，在 $546M ARR 水平下，每名员工收入约 $414K，与高效率 SaaS 公司一致。December 2022 裁员 260
              人，改善了进入 2023–2024 年的运营杠杆。G&A 费用包括维护符合 CFPB 的数据处理、Consumer Report 的 FCRA 合规，以及持续和解监督与 April 2026
              数据泄露调查带来的法律成本。


              开发者驱动增长让客户获取成本（CAC）结构性偏低：开发者通过沙盒和文档自助入驻，低层级客户无需销售触达即可转付费。企业 CAC 更高，但在高 NDR（估计约
              120%+）和多年合同价值下可较快收回。多产品增购路径抬高客户终身价值（LTV）——以 Auth 起步的客户，通常在 12–24 个月内扩展到 Transactions，再到 Income、Signal 或
              Transfer。
