  - id: FV001
    title: 投资建议逻辑流程
    type: flow
    summary: 从市场规模、产品护城河、客户验证、财务健康、监管风险和估值等证据类别出发，经尽调关口推导至最终建议：观察——前提是四个关键尽调关口全部通过。
    data:
      nodes:
        - id: e1
          label: |-
            市场规模
            $43–95B TAM；Plaid 美国份额 35%+
          type: evidence
        - id: e2
          label: |-
            产品护城河
            FDX 共同起草；Signal/Income 多元化
          type: evidence
        - id: e3
          label: |-
            客户验证
            8,000 个应用；S-1 点名客户
          type: evidence
        - id: e4
          label: |-
            财务健康
            ARR 估计 ~$546M；盈利未确认
          type: evidence
        - id: e5
          label: |-
            监管风险
            Section 1033 双刃剑；$58M 和解
          type: risk
        - id: e6
          label: |-
            估值
            $13.4B Series D 轮 >> $5.5–7B 基准内在价值
          type: risk
        - id: g1
          label: 关口 1：经审计财务显示 ARR $500M+、EBITDA 为正
          type: gate
        - id: g2
          label: 关口 2：Series E 轮刷新估值至 $7–10B
          type: gate
        - id: g3
          label: 关口 3：OAuth 迁移后屏幕抓取占比 <20%
          type: gate
        - id: g4
          label: 关口 4：CFPB 确认允许数据访问补偿
          type: gate
        - id: r1
          label: |-
            建议：观察
            仅在 4 道关口全部通过后入场
          type: recommendation
      edges:
        - from: e1
