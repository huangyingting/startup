  - id: FV002
    title: 估值敏感性：ARR × 倍数情景
    type: bar
    summary: >-
      柱状图展示四种 ARR 情景（$400M、$550M、$700M、$900M）和三种倍数假设（远期 ARR 的 6x、10x、15x）下的股权估值结果。图中显示，$13.4B 的 Series D 轮价格只有在 ARR
      与倍数同时落入乐观情景时才站得住。
    data:
      xAxis: ARR 情景
      yAxis: 股权估值（$B）
      items:
        - label: $400M ARR × 6x（悲观）
          value: 2.4
          note: 悲观 ARR × 悲观倍数 = $2.4B
        - label: $550M ARR × 6x（悲观）
          value: 3.3
          note: 当前 ARR 估计 × 悲观倍数 = $3.3B
        - label: $700M ARR × 6x（悲观）
          value: 4.2
          note: 基准 ARR × 悲观倍数 = $4.2B
        - label: $900M ARR × 6x（悲观）
          value: 5.4
          note: 乐观 ARR × 悲观倍数 = $5.4B
        - label: $400M ARR × 10x（基准）
          value: 4
          note: 悲观 ARR × 基准倍数 = $4.0B
        - label: $550M ARR × 10x（基准）
          value: 5.5
          note: 当前 ARR 估计 × 基准倍数 = $5.5B
        - label: $700M ARR × 10x（基准）
          value: 7
          note: 基准 ARR × 基准倍数 = $7.0B；Series D 轮价格 = $13.4B
        - label: $900M ARR × 10x（基准）
          value: 9
          note: 乐观 ARR × 基准倍数 = $9.0B
        - label: $400M ARR × 15x（乐观）
          value: 6
          note: 悲观 ARR × 乐观倍数 = $6.0B
        - label: $550M ARR × 15x（乐观）
          value: 8.3
          note: 当前 ARR 估计 × 乐观倍数 = $8.3B
        - label: $700M ARR × 15x（乐观）
          value: 10.5
          note: 基准 ARR × 乐观倍数 = $10.5B
        - label: $900M ARR × 15x（乐观）
          value: 13.5
          note: 乐观 ARR × 乐观倍数 = $13.5B（= Series D 轮价格）
