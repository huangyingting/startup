  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 产品组合与模块地图
        blocks:
          - type: paragraph
            body: >
              截至 2026 年，Plaid 产品套件包含十二个离散 API 模块，分布在三个价值层。基础连接层包括 Auth（ACH
              银行账户验证）、Transactions（增强交易历史）、Investments（券商账户组合数据）和 Monitor（持续账户健康提醒）。智能与身份层包括
              Identity（消费者身份和所有权验证）、Income（贷款所需雇佣和收入验证）、Assets（抵押贷款和贷款的资产报告生成）、Signal（ACH
              退回风险评分）、Protect（欺诈团伙检测和合成身份）、Beacon（协作式欺诈数据库）和 Consumer Report（带 FCRA 合规的授权金融画像）。支付与结账层包括 Transfer（ACH
              支付编排）和 Layer（带预填支付数据的嵌入式结账 UX）。


              截至 2025 年，智能层产品增长势头最强——根据 Plaid 公开沟通，Signal 和 Protect 的 ARR 贡献翻倍以上。Consumer Report 产品（2024 年推出）独特之处在于，它是受
              CFPB 监管的消费者报告机构产品，创造了一个全新品类：作为类征信服务的授权金融数据。Layer（late 2024 推出）面向商户提升结账转化，是 Plaid 第一个直接影响消费者体验的产品，而不是纯后端
              API。


              产品地图显示了有意推进的垂直整合：部署 Plaid Auth 做账户连接的客户，可能扩展到 Signal 做欺诈评分、Beacon 做欺诈团伙检测，并用 Transfer
              发起支付——形成多产品打包，比任何单产品部署都更难被替代。这种打包是 Plaid 在 8,000 个应用客户基础内提升 ARPU 的主要策略。
