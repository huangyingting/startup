        - '2024'
        - 全球
        - $22.84B (2023) → $135.17B (2030)；CAGR 28.6%
        - 自上而下分析师模型，纳入 BaaS 和嵌入式金融
        - 中
        - 口径过宽，夸大纯数据 API 市场；缺少一手数据
      - - MarketsandMarkets
        - '2024'
        - 全球
        - 到 2026 年 $43.15B；CAGR 24.4%
        - 供给侧市场模型，访谈 50+ 家供应商
        - 中
        - 预测期止于 2026 年，如今已是近端；未单独拆出美国
      - - Fortune Business Insights
        - '2024'
        - 全球
        - 从 2024 年 $24.64B 到 2032 年 $94.82B；CAGR 26.9%
        - 需求侧调研加二手研究
        - 低-中
        - 测算最高；可能大规模纳入嵌入式金融和 BaaS
      - - Mordor Intelligence
        - '2025'
        - 全球
        - $24.05B (2025) → $60.13B (2030)；CAGR 20.1%
        - 分析师综合监管文件和厂商披露
        - 中
        - 口径保守；5 年窗口止于 2030
      - - Allied Market Research 估算
        - '2023'
        - 全球
        - 到 2026 年 $43.15B；CAGR 24.4%
        - 一手访谈 + 二手研究
        - 中
