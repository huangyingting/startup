  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户分层与买方画像
        blocks:
          - type: paragraph
            body: >
              Plaid 的客户基础可按三条轴线拆分：公司类型、使用场景和规模。按公司类型，客户包括：（1）纯 fintech
              应用（Venmo、Robinhood、Coinbase、Chime、SoFi、Betterment），用 Plaid
              做核心金融数据连接；（2）贷款平台（Affirm、SoFi、LendingClub、LoanDepot），用 Income 和 Assets 做承保；（3）PFM 和金融健康应用（NerdWallet、历史上的
              Mint、YNAB、Personal Capital），用 Transactions；（4）支付和付款平台（Gusto、Brex），用 Auth 和 Transfer；以及（5）企业银行和金融机构，部署
              Plaid API 来支撑自有数字银行功能。


              按规模，Plaid 的客户金字塔分三层。长尾层（7,000+ 个应用）只贡献少量 ARR，但对生态密度和信号网络价值至关重要；这些应用主要以低用量自助消费 Auth 和 Transactions。中端市场层（约
              800 个应用）每年支付 $10K–$200K ARR，使用 2–4 个产品，通常配有专属客户经理。企业层（约 200 个应用，ARR 超过 $1M）通过多产品合同、用量承诺、专属 SLA，以及与 Plaid
              企业销售团队的直接关系，贡献大部分总 ARR。


              所有细分市场里，评估 API 的买方都是开发者 / 工程团队；到企业规模，经济买方则是 CTO、工程副总裁或产品负责人。企业交易的采购摩擦中等：Plaid
              需要签主服务协议、通过可接受使用政策合规审查，并完成安全问卷。新客户的标准企业销售周期为 4–8 周。续约周期通常按年，并带自动续约条款。
