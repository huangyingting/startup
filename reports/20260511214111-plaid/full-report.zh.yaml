      - number: '3.3'
        title: 定价与打包对比
        blocks:
          - type: paragraph
            body: >
              金融数据 API 市场定价通常不透明，公开价格只适用于低层级或入门方案。Plaid 的定价结构是：（1）Auth / Identity 验证收取一次性连接费（每个已验证账户
              $0.50–$1.50，取决于用量）；（2）Transactions 持续订阅按已连接账户收取月费（每个活跃账户每月 $0.10–$0.30）；（3）Income、Assets 和 Signal
              按调用收费；（4）大型机构通过谈判获得定制企业价格。公司在 2020–2021 年从按调用付费转向订阅模型，以平滑收入并改善 NDR。


              MX Technologies 采用年度 SaaS 合同定价，金额与数据连接数量和增强功能挂钩；其中端到企业客户合同通常为 $250K–$1M+。Finicity/Mastercard
              价格通常通过企业谈判确定，并受益于与 Mastercard 更广泛数据网络服务打包。Akoya 定价围绕银行会员费，以及第三方通过网络连接时基于用量的 API 调用费。Stripe Financial
              Connections 标准使用按每个连接账户 $1.50 收费，余额查询为 $0.10，单次验证价格显著高于 Plaid，反映其在 Stripe 生态内的溢价打包位置。


              随着竞争加剧，整个市场呈现单价下降趋势，Plaid 和竞争者更多围绕打包价值而非单位价格竞争。Plaid 的多产品路径（每个客户销售 3–4 个产品，而非单产品竞争者）让单产品价格承压时收入更有韧性。
