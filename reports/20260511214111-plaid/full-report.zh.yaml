  - id: FE004
    title: Plaid 产品成熟度与市场位置象限
    type: quadrant
    summary: 按市场成熟度（x 轴：上市年限 / 采用广度）和竞争护城河强度（y 轴：复制难度 / 数据优势）定位 Plaid 产品组合。
    data:
      xAxis: 市场成熟度（上市年限 / 采用广度）
      yAxis: 竞争护城河强度（复制难度 / 数据优势）
      points:
        - label: Auth
          x: 90
          'y': 40
          description: 高度成熟、部署广泛，但 Stripe Financial Connections 和银行直接 API 正在挤压护城河。按交易量仍是第一。
        - label: Transactions
          x: 85
          'y': 55
          description: 产品成熟，交易增强数据护城河强；增强 ML 已用 10+ 年数据训练，短期难以复制。
        - label: Signal
          x: 55
          'y': 90
          description: 每年 12B+ 事件沉淀出网络效应型欺诈护城河；在产品组合中竞争位置最强；没有类似应用覆盖就难以复制。
        - label: Income
          x: 50
          'y': 60
          description: 市场在增长；Plaid 覆盖强，但在薪资连接上直接面对 Argyle 和 Pinwheel 竞争。
        - label: Assets
          x: 55
          'y': 65
          description: GSE 资格形成机构门槛；Finicity 是主要竞争对手，但 Plaid 覆盖更广。
        - label: Protect / Beacon
          x: 35
          'y': 85
          description: 商业化早期，但联盟模型有较强护城河潜力；没有 Plaid 的分发，竞争者很难复制跨应用欺诈网络。
        - label: Consumer Report
          x: 20
          'y': 80
          description: 非常新；监管门槛（FCRA CRA 注册）形成护城河；唯一把金融数据聚合和 CRA 功能结合起来的玩家。
        - label: Transfer
          x: 40
          'y': 45
          description: 在增长但竞争更激烈；市场已有 ACH 替代方案（Dwolla、modern treasury、直接 ACH）；护城河来自集成欺诈控制。
        - label: Layer
          x: 10
          'y': 60
          description: 仍处很早期；结账网络护城河取决于消费者采用；与 Stripe 和 ApplePay 竞争时冷启动风险显著。
    claimRefs:
      - CE001
      - CE002
      - CE003
      - CE022
  - id: FU001
    title: Plaid 客户旅程：从发现到企业扩张
    type: journey-map
    summary: 客户从开发者发现、沙盒集成、生产部署到 Plaid 多产品企业扩张的旅程。
    data:
      nodes:
        - id: discovery
          label: 发现
          description: >-
            开发者通过文档搜索、GitHub（react-plaid-link）、Hacker News 讨论、同事推荐或 Postman API 网络发现
            Plaid。摩擦低：无需接触销售。典型触发点是需要在金融科技应用中验证银行账户或拉取交易数据。
        - id: sandbox
          label: 沙盒集成
          description: 开发者创建账户；立即拿到 API 密钥；按快速入门指南在沙盒环境集成 Link SDK（约 15–30 分钟）。使用模拟银行账户测试。无需合同或信用卡。从注册到沙盒集成的转化率未知（关键 PLG 指标）。
        - id: production
          label: 生产上线
          description: 开发者提交应用接受生产访问审核（合规检查）；数小时到数天内拿到生产密钥；接入真实银行连接上线。第一张账单按实际用量生成。最常见的首个产品是 Auth（银行账户验证）。
        - id: growth
          label: 增长和激活
          description: >-
            应用用户基数增长；Plaid API 调用量同步增长；收入随之放大。ARR 超过 $50K 后分配客户经理。客户开始看到相邻产品价值（支付规模上来后用 Signal 做欺诈，PFM 功能用
            Transactions）。
        - id: expansion
          label: 多产品扩张
          description: 企业客户经理提出产品扩张：Auth → Signal → Transfer → Income/Assets。谈判打包折扣。签署带用量下限的年度合同。当扩张速度超过基础合同金额时，NDR 拐到 100% 以上。
        - id: deepening
          label: 平台深化
          description: 大型企业（>$1M ARR）集成 4+ 个产品；定制 Link 主题；获得企业 SLA；参与 Beacon 联盟；考虑把 Layer 用于结账。Plaid 成为应用技术栈中的基础设施级依赖。
    claimRefs:
      - CU001
      - CU002
      - CU021
      - CU022
  - id: FU002
    title: 开发者到企业采用漏斗
    type: funnel
    summary: 从 Plaid 开发者注册，到沙盒激活、生产部署，再到企业账户状态的估计转化漏斗。
    data:
      items:
