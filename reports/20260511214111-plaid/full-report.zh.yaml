      - number: '2.5'
        title: 规模测算尽调缺口与矛盾
        blocks:
          - type: paragraph
            body: >
              开放银行和金融数据 API 的现有市场规模证据存在多处矛盾和缺口。第一，公开 TAM 估算在相近目标年份相差超过 4 倍（$22B 到 $95B），主要因为研究机构采用互不兼容的范围定义——有的纳入
              BaaS、嵌入式支付和数字银行基础设施，有的只限于数据连接 API。第二，没有找到专门针对美国金融数据 API 市场（剔除 BaaS）的公开自下而上测算；所有估算都是全球自上而下，再按地区分摊。第三，CFPB
              Section 1033 创造的市场机会尚未被独立研究量化，尽管 Plaid 自己的沟通显示，规则通过把抓屏客户迁移到合规 API 安排，实质性扩大可触达范围。


              对投资者而言，最重要缺口是 CFPB Section 1033 合规对 Plaid 收入到底是净正面还是净中性仍不确定：如果银行直接搭建符合 FDX 的
              API，消费者又能通过银行品牌的同意流程连接应用与银行、绕过 Plaid 的 Link 界面，那么 Plaid 每个连接的边际价值会下降。这种情景通常被称为“银行去中介化”，是 Plaid
              市场位置的核心悲观情景，需要专门尽调 FDX 采用率，以及银行直连 API 的质量基准与 Plaid 覆盖深度对比。
            claimRefs:
              - CM031
