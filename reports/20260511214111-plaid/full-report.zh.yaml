      - number: '5.2'
        title: 技术架构与数据管道
        blocks:
          - type: paragraph
            body: >
              Plaid 的核心基础设施，是大规模运行的金融数据聚合与标准化平台：每年处理约 12 billion 个数据事件，连接 8,000+ 个应用集成，并访问 12,000+
              家金融机构。技术架构分三层：（1）数据获取，（2）数据标准化与增强，（3）API 服务和产品交付。


              数据获取采用混合路径。主要方式：在可用处，通过基于 OAuth 的开放银行 API 与银行直接连接（按覆盖约 40% 的机构，但按账户量代表大多数账户）。兜底方式：对缺少高质量 API
              访问的机构，采用基于凭证的抓屏。Plaid 大力投入向 API 连接迁移，因为 CFPB Section 1033 要求标准化银行 API；到 April 2026 第一阶段实施时，直接 API
              覆盖预计将大幅提升。


              数据标准化是 Plaid 的核心技术 IP：原始银行数据（非结构化交易描述、多样账户 schema、机构特有字段名）被标准化进 Plaid 自研金融数据
              schema。这包括商户分类（用机器学习管道把原始交易描述映射到商户和消费类别）、收入和现金流分析模型，以及与消费者提供数据做身份匹配。标准化层产出“增强”数据，使 Plaid 输出区别于原始银行数据流。


              API 服务基础设施运行在云上，部署于 AWS 和 Google Cloud Platform，并具备多区域冗余。Plaid 维护公开状态页（status.plaid.com），显示实时 API
              健康状况；历史正常运行时间记录显示，核心产品 SLA 合规率为 99.9%+。Link SDK（面向消费者的账户连接 UI）以 iframe / webview 组件提供，本地 SDK 不存储凭证。
            claimRefs:
              - CE006
              - CE007
              - CE008
              - CE009
              - CE010
