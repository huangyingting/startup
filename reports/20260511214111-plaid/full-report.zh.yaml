companyProfile:
  summary: >
    Plaid Inc. 由 Zachary Perret 和 William Hockey 于 2013 年在 San Francisco 创立。两人最初想做一款面向消费者的个人理财应用，后来转向底层数据连接层。Plaid 的 API
    让金融科技应用在用户授权后读取消费者银行账户数据，用于账户验证、交易数据增强、身份、收入验证和信贷承销。到 2025 年，Plaid
    已从数据聚合延伸到反欺诈（Beacon、Signal）、支付发起（Transfer）、信贷基础设施（Layer）以及收入 / 雇佣验证（Income、Assets）。公司扛过了 Visa $5.3B 收购失败（DOJ 于
    January 2021 阻止）、December 2022 裁员 20%，以及较 $13.4B Series D 峰值回落 54% 的估值重置；现在以更精简、运营盈利的状态，瞄准 2026–2027 IPO。截至 early
    2026，Plaid 在美国开放银行聚合市场约占 70% 份额，ARR 同比增速约 40%。
