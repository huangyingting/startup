      - number: '4.4'
        title: 融资历史与资本结构
        blocks:
          - type: paragraph
            body: >
              自 2013 年以来，Plaid 已完成约 $1.3B 新股融资，另有 February 2026 员工要约收购。资本结构符合后期 VC 支持公司的常规：普通股股东包括员工和创始人；优先股股东包括从 Spark
              Capital（种子轮，2013）到 Franklin Templeton 和 BlackRock（Series E，2025）的各轮机构投资者。公司未披露公开债务或信贷额度，不过 Plaid
              这个规模的公司通常会保留循环信贷额度。


              最值得注意的资本结构特征，是 February 2026 的 $8B 要约收购。该交易允许员工和早期投资者向新投资者（Citi Ventures、Goldman Sachs、AmEx
              Ventures）出售老股。这次要约收购确立了员工股权薪酬的参考价格，也为潜在 IPO 定价设定了隐含估值。April 2025 新股融资（$6.1B）与 February 2026
              要约收购（$8B）之间的差距，代表 10 个月内升值 31%，与 ARR 增长轨迹一致。


              投资者包括 Andreessen Horowitz、Index Ventures、Ribbit Capital、Spark Capital、Altimeter Capital、Goldman
              Sachs、Silver Lake、NEA、Kleiner Perkins、Franklin Templeton、BlackRock、Fidelity 和 J.P.
              Morgan。董事会席位未完全公开披露，但早期投资者 Andreessen Horowitz、Spark Capital 和 Altimeter 被认为持有董事席位。截至 May
              2026，公司未披露任何资本重组或举债计划。
