  - id: TV005
    title: 投资逻辑破裂与退出触发条件表
    description: Measurable events that would invalidate the investment thesis with transmission and action implications.
    columns:
      - 触发因素
      - 阈值 / 退出事件
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - CFPB 第 1033 条补偿上限裁定
        - CFPB 指引明确将数据聚合商费用封顶在 $0.05/call 以下，或要求 FDX 合规 API 零成本开放
        - 核心 Auth 产品失去定价权；ARR 增速降至个位数或转负；估值重置到 $3B 以下
        - 若已持有，立即退出；CFPB 澄清前暂停新增投资
      - - 大客户集中流失
        - 两个或更多前五大客户（合计 API 调用量 >20%）在 12 个月内宣布迁移至替代聚合商
        - ARR 增长转负；流失证据压缩估值倍数；管理层可信度受损
        - 下调至卖出 / 退出；要求紧急开放资料室，确认收入影响
      - - 超过阈值的安全事件
        - 确认超过 100K 个消费者金融账户泄露，且归因于 Plaid 基础设施故障
        - 监管执法；客户连锁流失；IPO 推迟或取消；品牌毁损
        - 立即退出持仓；如此规模的泄露事件已显示会造成永久性损伤
      - - 未能实现 EBITDA 转正
        - 经审计财务显示，尽管公司声称 ARR 增长 40%，FY2025 EBITDA 利润率仍为负
        - 单位经济模型逻辑站不住脚；意味着 ARR 增长靠压缩利润率买来
        - 暂停投资；任何新增出资前要求提供经审计的 FY2025 财务
      - - Series E 轮估值低于 $7B
        - Plaid 以低于 $7.0B 的投后估值完成新股融资
        - 证实市场认为 $13.4B Series D 轮定价过高；现有投资人减值；管理层释放增长不及预期信号
        - 若较二级交易有适当折价，可按该轮价格寻找进入机会；用新数据重新评估投资逻辑
    notes: 这些阈值是投资人定义的尽调触发条件，不是公司披露指标。部分触发因素（CFPB 补偿上限）是管理层无法控制的监管事件； 另一些（Series E 估值）则是管理层执行结果。
    claimRefs:
      - CV033
      - CV034
      - CV035
      - CV036
      - CV037
  - id: TV006
    title: 最终尽调事项表
    description: Evidence gaps requiring resolution before investment conviction can be established at any valuation.
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 负责人 / 尽调路径
    rows:
      - - 经审计财务
        - FY2023、FY2024、FY2025 经审计财务报表均未公开
        - 无法独立核验 ARR、利润率、烧钱速度或现金状况；所有估值模型只能近似
        - 列为资料室必备项；以四大会计师事务所审计聘用函证明公司有审计意图；作为条款清单前置条件
      - - OAuth 迁移状态
        - 使用 OAuth/FDX API 而非屏幕抓取的金融机构连接占比未披露
        - 屏幕抓取暴露既是安全风险，也是第 1033 条合规风险；迁移状态决定监管风险发生时间
        - 要求在资料室提供 OAuth 迁移报告；尽调期内每月更新进展
      - - 客户集中度拆分
        - 前 10 大客户 ARR 贡献和合同条款未公开
        - 任何单一客户集中度超过 15%，都是重大收入风险；Venmo/PayPal 估计在 15%+
        - 要求提供前 10 大客户 ARR 明细及续约日期；审阅合同主服务协议（MSA）的终止条款
      - - CFPB 监管往来函件
        - Plaid 与 CFPB/FTC/OCC 的非公开监管往来函件无法公开获取
        - 未披露调查或执法前询问可能显著影响 IPO 时间和合规成本
        - 要求披露监管往来函件，并作出完整性陈述与保证
      - - Series E / 股权结构表
        - 要约收购后的股权结构表未披露，缺少优先股堆叠、反稀释条款和 Series D+ 清算优先权
        - 优先权悬挂会损害下行情景和基准情景下的普通股回报；优先权倍数和转换条款很关键
        - 要求在资料室提供完整股权结构表及瀑布分析
      - - 按产品分部拆分的 ARR
        - 按产品（Auth、Signal、Income、Transfer、Layer、Identity）拆分的 ARR 未披露
        - 多产品多元化是关键乐观逻辑；没有分部数据，就无法评估 ARR 耐久性和增长结构
        - 要求在资料室提供产品级 ARR 拆分；验证多产品采用率
    notes: 这些是任何机构投资的最低尽调门槛；资料室若无法提供其中任一项，都是需要解释的黄色信号，解释清楚前不应推进投资。
    claimRefs:
      - CV038
      - CV039
      - CV040
      - CV033
      - CV034
