      - number: '3.2'
        title: 功能与能力对比
        blocks:
          - type: paragraph
            body: >
              Plaid 与主要竞争对手的功能对比显示，产品广度、地理覆盖和技术路径差异显著。Plaid 在美国机构覆盖广度、产品套件深度（12+
              个不同产品）、开发者体验质量，以及覆盖连接、欺诈、收入、支付的多用例能力上领先。MX Technologies 的差异化在数据增强和分析深度——其交易分类和财务洞察层服务财富管理和企业客户，数据模型比 Plaid
              默认交易数据流更丰富。Finicity/Mastercard 在抵押贷款和贷款验证上领先，获得 GSE（Fannie Mae、Freddie Mac）对数字收入 / 资产验证的批准，让其在年规模 $2B+
              的抵押贷款验证市场中占据强势位置。


              Akoya 独特之处在于它是银行拥有的 API 网络，无需抓屏即可向 11 家创始银行成员提供一手数据连接。但其网络有意限制在直接参与方，覆盖广度不足，难以成为 Plaid 的完整替代。Stripe
              Financial Connections 借助 Stripe 庞大的商户和开发者生态，把账户连接与支付基础设施打包，对已经使用 Stripe 的支付优先开发者很有吸引力；但当前用例比 Plaid
              更广的金融数据平台更窄，主要是账户验证和支付发起。


              国际市场上，Tink（Visa）和 TrueLayer 通过符合 PSD2 的 API 主导 EU/UK 开放银行；Plaid 尽管收购 Longitud 和 Quovo，但欧洲存在感仍有限。Brankas 服务
              APAC 市场，而 Plaid 在该区域没有实质覆盖。竞争态势显示，全球市场碎片化，没有单一供应商能在所有地区领先。
