      - number: '1.3'
        title: 融资历史与资本化
        blocks:
          - type: paragraph
            body: >-
              2013 至 2025 年，Plaid 多轮披露的新股融资约 $1.3 billion，另有 February 2026 一次金额未披露的员工流动性要约收购。2013 年 $2.8M 种子轮之后，公司完成
              $12.5M Series A、June 2016 年 $44M Series B（Goldman Sachs 领投）和 December 2018 年 $250M Series C（估值
              $2.65B）。April 2021，金融科技热潮高点，Plaid 完成 Altimeter Capital 领投的 $425M Series D，估值 $13.4B——当时 Visa $5.3B 收购尝试刚在
              DOJ 反垄断压力下放弃。April 2025，Plaid 以 $6.1B 估值完成 $575M 降估值普通股融资，用于支付员工 RSU 税款并提供内部流动性；Franklin Templeton
              领投，Fidelity、BlackRock、NEA、Ribbit Capital、Silver Lake 和 J.P. Morgan 参投。February 2026，Plaid 以 $8B
              估值完成员工要约收购，较 April 2025 价格高 31%，Citi Ventures、Goldman Sachs、AmEx Ventures 等参与。$8B 估值仍比 2021 年 $13.4B 峰值低约
              40%。主要股东和董事会层面投资方包括 Andreessen Horowitz、Index Ventures、Ribbit Capital、Spark Capital、Altimeter
              Capital、Goldman Sachs、Silver Lake、NEA、Kleiner Perkins 和 Franklin Templeton。
