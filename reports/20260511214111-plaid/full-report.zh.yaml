      - number: '7.5'
        title: 缓释因素、否决条件与尽调优先级
        blocks:
          - type: paragraph
            body: |
              Plaid 有不少缓释因素：FDX 共同起草带来的监管护城河、开发者中的强品牌信任、高切换成本，
              以及分散的客户数量。但投资逻辑被打破的事件仍然可能发生，也可以定义。概率最高的三项否决条件是：
              （1）CFPB Section 1033 最终规则要求零成本 FDX 访问，并消除 screen-scraping 作为竞争护城河；
              （2）大型安全泄露摧毁消费者和客户信任；（3）如果 Venmo/PayPal 迁移到内部方案，客户集中度崩塌。
              每个投资逻辑触发点都有可测阈值和明确尽调路径。关键在于，每项风险也都有明确尽调路径：数据室中的经审计财务、
              OAuth 迁移状态报告和监管往来记录，是最紧急的三项尽调材料。投资人应把这些谈成任何 term sheet
              承诺的先决条件；这些步骤能实质性降风险，而上市公司注册文件在 IPO 时本来也会要求披露。
