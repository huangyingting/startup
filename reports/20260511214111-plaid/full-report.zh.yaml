          description: D 轮融资后（2021 年融资 $425M）现金，扣除估计 2021–2022 年运营支出和国际扩张投入；区间反映较高不确定性。
        - label: '2023'
          low: 200
          high: 350
          unit: $M
          description: 2022 年重组后现金消耗放缓；随着公司接近盈利，烧钱速度大幅下降。
        - label: 2024（EBITDA 转正）
          low: 300
          high: 450
          unit: $M
          description: 首个调整后 EBITDA 盈利年度；现金头寸可能稳定或增长；没有重大资本事件。
        - label: 2025（E 轮融资后）
          low: 350
          high: 600
          unit: $M
          description: 2025 年 4 月 E 轮融资 $575M，但资金主要用于 RSU 税款预扣；扣除经营性现金生成后，估计资产负债表净增现金 $100–200M。
        - label: 2026（要约报价后）
          low: 400
          high: 650
          unit: $M
          description: 要约为老股交易（公司没有获得资金）；EBITDA 盈利和 2025 年后的经营性现金流支撑现金头寸。未披露债务。
    claimRefs:
      - CI031
      - CI019
      - CI020
      - CI021
  - id: FE001
    title: Plaid 数据获取和标准化架构
    type: flow
    summary: 从银行机构到 Plaid 的获取、标准化和产品交付层，再到开发者应用客户的数据流。
    data:
      nodes:
        - id: banks
          label: 金融机构（12,000+）
          description: 消费者金融数据来源：银行、信用合作社、券商、退休账户。连接方式混合了直接 OAuth/API 和传统凭证式连接。
        - id: acquisition
          label: 数据获取层
          description: 双轨：（1）直接银行 OAuth API（FDX 标准；按机构数量约 40%，按账户量占多数）；（2）凭证式抓取兜底（约 60% 的机构，随着 CFPB 第 1033 条推动 API 采用而下降）。
        - id: normalization
          label: 标准化和增强引擎
          description: 自研 ML 管道：交易增强（商户分类、类别标注）、身份解析、收入提取、资产分类。把原始银行数据转成标准化 Plaid 数据模式。
        - id: products
          label: 产品 API 层（12 个产品）
          description: >-
            Auth、Transactions、Identity、Income、Assets、Investments、Monitor、Signal、Protect、Beacon、Consumer
            Report、Transfer、Layer——每个产品都通过独立 API 端点暴露标准化数据。
        - id: link
          label: Plaid Link SDK
          description: 面向消费者的同意授权 UI（iframe/WebView），处理银行选择、OAuth 跳转、同意采集和令牌生成。开发者应用把它嵌入自己的消费者流程。
        - id: developers
          label: 开发者应用（8,000+）
          description: 金融科技应用、贷款机构、数字银行、PFM 工具、支付平台消费 Plaid API，为终端用户驱动金融功能。
      edges:
        - from: banks
          to: acquisition
          label: 银行数据流（API + 抓取）
        - from: link
          to: acquisition
          label: 消费者凭证 / OAuth 令牌
        - from: acquisition
          to: normalization
          label: 原始金融记录
        - from: normalization
          to: products
          label: 增强后的金融数据模式
        - from: products
          to: developers
          label: Plaid API 响应（JSON）
        - from: developers
          to: link
          label: Link 令牌（触发消费者流程）
    claimRefs:
      - CE006
      - CE007
      - CE008
      - CE009
  - id: FE002
    title: 开发者集成工作流：从沙盒到生产
    type: flow
    summary: 集成 Plaid 的端到端开发者旅程，从初始设置到接入真实银行连接的生产部署。
    data:
      nodes:
        - id: signup
          label: 1. 注册 / 控制台访问
          description: 开发者创建 Plaid 账户；几分钟内拿到沙盒环境 API 密钥。沙盒无需合同承诺。
        - id: sandbox
          label: 2. 沙盒集成
          description: 开发者把 Plaid Link SDK 和选定产品 API 接入沙盒测试凭证（模拟银行账户）。快速入门指南覆盖 10 种语言；典型集成耗时 15–30 分钟。
        - id: testing
          label: 3. 测试场景
          description: 沙盒提供预置账户数据的测试机构，覆盖 Auth、Transactions、Income 等产品。开发者验证错误处理、边缘场景和 UI 流程。
        - id: review
          label: 4. 生产访问申请
          description: 开发者提交应用供 Plaid 审核：预期用例、数据处理做法、接受服务条款。Plaid 按开发者协议和可接受使用政策审核合规性。
        - id: production
          label: 5. 生产上线
          description: 开发者使用生产 API 密钥部署；Plaid Link 连接真实金融机构。用量按产品层级和规模按月计费。
        - id: expansion
          label: 6. 多产品扩张
          description: 成功部署后，客户往往会添加相邻产品（Auth → Signal → Transfer；Transactions → Income）。企业账户会谈判打包定价和专属支持。
      edges:
        - from: signup
          to: sandbox
          label: 立即发放 API 密钥
        - from: sandbox
          to: testing
          label: SDK + API 集成
        - from: testing
          to: review
          label: 提交生产访问申请
        - from: review
          to: production
          label: 审批（数小时–数天）
        - from: production
          to: expansion
          label: 用量增长 + 增购动作
    claimRefs:
      - CE012
      - CE013
      - CE014
      - CE015
