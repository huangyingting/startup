  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              开放银行和金融数据 API 市场竞争者很多，可分成几个层级。最早的一层是传统数据聚合商——Yodlee（现属 Envestnet，1999 年创立）和 MX Technologies（2010
              年创立）。它们率先用抓屏方式采集银行账户数据，主要服务企业和财富管理客户。第二层是银行网络支持的玩家：Finicity（2000 年创立，2020 年被 Mastercard 以 $825M 收购）和
              Akoya（由 JPMorgan Chase、Bank of America、Wells Fargo 等 11 家美国大型银行出资的联盟）。它们受益于直接金融机构关系，代表银行业试图控制开放银行数据流。


              第三层且越来越重要的竞争者，是向金融连接延伸的大型技术平台：Stripe 于 2021 年推出 Financial Connections，直接对标 Plaid，并把它与支付平台打包；Square/Block 在
              Cash App 更大生态内提供银行账户验证。第四层是国际玩家，包括 Tink（2021 年被 Visa 以 $2.15B 收购，服务欧洲市场）、TrueLayer（聚焦 UK/EU，Tiger Global
              投资）和 Brankas（APAC 专家）。每个竞争者都有不同地理覆盖、产品强项和市场拓展路径。


              Plaid 的竞争位置由四点定义：（1）美国机构覆盖最广，达 12,000+ 家金融机构，超过 Finicity 约 11,000 家，也超过 Akoya 有限的银行联盟覆盖；（2）开发者驱动品牌，已有
              8,000+ 个应用采用，包括美国最知名的金融科技应用；（3）多产品收入栈，从基础身份验证 / 连接延伸到欺诈、收入验证和消费者信贷数据；（4）在 CFPB Section 1033
              下，被定位为合规开放银行架构的参考实现。
