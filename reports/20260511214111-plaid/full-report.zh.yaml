      - - Business Research Insights
        - '2024'
        - 全球
        - $18.13B (2023) → $78.43B (2032)；CAGR 17.9%
        - 二手研究综合
        - 低
        - CAGR 低于共识；报告缺少一手方法说明
      - - Sacra（由 Plaid ARR 推断）
        - '2025'
        - 美国（Plaid 份额）
        - 估计 ARR ~$546M，对应估计美国 SAM $5–8B，渗透率 ~7–11%
        - 从公司 ARR / 分析师 SAM 估计自下而上推算
        - 中
