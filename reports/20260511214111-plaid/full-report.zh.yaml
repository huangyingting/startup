      - number: '8.2'
        title: 可比估值分析
        blocks:
          - type: paragraph
            body: |
              Plaid 的可比公司组横跨上市 fintech 基础设施公司、私营 API 基础设施玩家和相关 M&A 先例。
              在 2025 年市场环境下，上市可比公司（Twilio、与 MX 类似的基础设施业务）按 6–12x forward ARR
              交易。私营 fintech 基础设施融资轮（Stripe 2023 年 23x ARR、MX 上一轮约 8x ARR）给出更宽区间。
              Plaid 最直接可比的上市公司应是纯金融数据 API 基础设施提供商；市场上没有完全匹配的上市可比，
              但 Mastercard、Visa 和 Fiserv 的数据连接业务，为支付基础设施提供 12–18x 收入的方向性参考。
              核心估值张力在于：Plaid 估计 40% YoY ARR 增长，足以相对低增长可比公司享有溢价；但私营身份、
              缺乏经审计财务和监管不确定性，又相对透明上市公司带来 20–30% 折价。按 10x forward ARR（$546M × 10），
              基准情景内在估值约为 $5.5B，显著低于 $13.4B Series D 价格。
            claimRefs:
              - CV009
              - CV010
              - CV011
