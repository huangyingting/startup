      - number: '1.4'
        title: 规模、财务指标与商业模式
        blocks:
          - type: paragraph
            body: >-
              Plaid 是一家 B2B 基础设施公司，但使用模式是
              B2B2C：直接客户是金融科技公司、银行、贷款机构和企业；最终用户是被连接账户的消费者。定价按产品分三类：验证类基础能力按已连接账户一次性收费；持续创造价值的产品按已连接账户月度订阅；离散 API
              调用按请求收费。Sacra 估计 Plaid 2025 年 ARR 达 $546M，较 2024 年 $390M 约增长 40%；2024 年本身同比约增长 25%。公司 2024 年实现正经营利润率，并在
              2025 全年实现调整后 EBITDA 盈利。较新的产品线——反欺诈（Protect、Beacon）、支付（Transfer）和信贷承销——2025 年收入贡献翻倍以上，并超过总 ARR 的 20%。Plaid
              每天处理近 1 million 个新账户连接，支持 100M+ 全球用户，并声称平均正常运行时间为 99.99%。企业客户（截至 mid-2024 超过 1,000 家）包括 Citibank、H&R
              Block、Western Union、Carvana、CarMax、Zillow 和 Shopify。截至 May 2026，Plaid 在全球六个办公室约有 1,300 名员工，低于裁员前峰值；公司在
              December 2022 裁掉约 260 人（20%），之后员工数反弹。
