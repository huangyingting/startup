      - number: '7.3'
        title: 合作伙伴与依赖风险
        blocks:
          - type: paragraph
            body: |
              Plaid 依赖三类外部关系，每一类都有有意义的集中度或中断风险：（1）金融机构数据访问——12,000+
              家银行和信用合作社，它们的 screen-scraping 许可或 API 访问可能被撤回或限制；（2）云基础设施——AWS
              是主要托管平台；以及（3）大型 fintech 客户依赖——前 5 大客户（Venmo、Robinhood、Coinbase、Chime、SoFi）
              估计贡献 40–50% 的 API 调用量。Section 1033 推动 FDX API 标准化，可能降低金融机构
              封锁或限制 Plaid 访问方式的切换成本。OCC 的第三方风险管理指引要求银行监控聚合器关系，
              带来合规开销，可能激励银行逐步减少获批聚合器关系数量，使市场进一步集中到 Plaid 这类规模更大、
              合规能力更强的参与者手中。
