      - number: '2.2'
        title: 市场规模：TAM、SAM 与 SOM
        blocks:
          - type: paragraph
            body: >
              多家独立研究机构测算了全球开放银行市场，2030–2032 年估计值从 $22B 到 $95B 不等，反映口径定义和 CAGR 假设差异。Grand View Research 估计，全球开放银行市场 2023
              年为 $22.84B，到 2030 年增至 $135.17B，CAGR 为 28.6%。MarketsandMarkets 估计市场将从 2018 年约 $7.29B 增至 2026 年 $43.15B，CAGR
              为 25%。Fortune Business Insights 预计市场从 2024 年 $24.64B 增至 2032 年 $94.82B，CAGR 为 26.9%。Mordor Intelligence
              估计开放银行市场 2025 年为 $24.05B，到 2030 年增至 $60.13B，CAGR 为 20.1%。Allied Market Research 预计 2026 年达到
              $43.15B。Business Research Insights 估算 2023 年市场规模为 $18.13B，到 2032 年增至 $78.43B。


              估算差异来自范围口径：最高的估算纳入嵌入式金融和 Banking-as-a-Service 的全栈收入；最低的估算只看 API 授权和数据聚合。评估 Plaid 机会时，最相关的视角是美国金融数据 API
              与连接市场。考虑到美国在金融科技交易量中的占比，该市场约占全球总量 30–40%。按 30% 份额，$43–95B 全球市场意味着 2026–2032 年美国 TAM 为 $13–29B。在其中，Plaid
              可服务的部分——面向第三方应用、剔除完整 BaaS 的数据连接——估计为 $5–8B SAM；以 $546M 2025E ARR 为分母，当前 SOM 约为 7–11%，取决于采用哪项收入指标。


              各来源给出的增长率大体一致，CAGR 在 20–28% 区间，驱动因素包括监管顺风、API 采用率上升，以及金融数据用例向欺诈、信贷和身份扩张。主要不确定性在于 CFPB Section 1033
              规则会扩大市场，还是带来竞争扰动：它可能强制银行开放 API、降低 Plaid 获取数据的成本；也可能让银行直连 API 模式成型，削弱 Plaid 这类聚合商的中介地位。
