      - number: '1.5'
        title: 关键里程碑与负面事件
        blocks:
          - type: paragraph
            body: >-
              Plaid 的公司史有几项关键里程碑和负面事件，实质性改变了发展路径。从消费者应用转向 API 基础设施，并得到 Venmo 和 Robinhood 等早期采用者背书，奠定了公司的市场位置。2020 年 Visa
              以 $5.3B 发起收购（在 DOJ 反垄断审查下于 January 2021 放弃），既验证了 Plaid 的战略价值，也迫使公司证明自己能独立生存。2022 年隐私集体诉讼和解（$58M，July 2022
              最终批准）要求 Plaid 删除数据、重做同意披露，并调整影响所有用户的隐私架构；这是一次负面事件，也设定了行业披露标准，并引发后续监管关注。December 2022 裁员 260 人（占员工
              20%）反映疫情后金融科技回归常态。April 2025 以 $6.1B 降估值融资（对比 2021 年 $13.4B 峰值）反映市场倍数压缩，不过 Perret
              公开归因于宏观环境，而非业务恶化。February 2026 以 $8B 进行要约收购，显示恢复和投资者信心回归。April 2026，律所开始调查一起据报道发生的 Plaid
              数据泄露，形成新的待决负面敞口；截至本报告运行日，结果仍未明确。JPMorgan Chase 数据访问费争议于 September 2025 解决，也说明 Plaid 与大型数据提供银行之间的张力仍在。
