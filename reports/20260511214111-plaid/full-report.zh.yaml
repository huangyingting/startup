      - number: '7.2'
        title: 运营与安全风险
        blocks:
          - type: paragraph
            body: |
              Plaid 的基础设施为 12,000+ 家金融机构中数百万消费者处理凭证认证和实时交易数据。一旦发生
              大规模凭证泄露、API 服务中断或数据外泄，消费者信任会立刻受损，监管执法会被触发，客户也会流失。
              Plaid 上游第三方金融机构的安全事件，同样会带来传染风险。Plaid 已取得 SOC 2 Type II
              认证和 ISO 27001，但没有公开披露过渗透测试结果。运营韧性依赖云基础设施（AWS）和内部 SRE
              能力。CISA 在 2024 年 8 月发布特定公告，指出 screen-scraping 架构相比基于 OAuth
              的 API 攻击面更大；这进一步说明 Plaid 正在推进的 OAuth 迁移，是安全关键型运营优先事项，
              不只是合规动作。
