        - 任何影响 >100K 个消费者账户的确认漏洞；任何点名 Plaid 安全实践的监管执法令
        - 立即拖累获客；触发深入安全评估
      - - 大客户集中流失
        - PayPal/Venmo 公开 API 架构变更；Robinhood/Coinbase SEC 披露删除 Plaid 供应商引用
