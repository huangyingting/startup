      - number: '5.5'
        title: 可靠性、安全、隐私与合规
        blocks:
          - type: paragraph
            body: >
              Plaid 运行在严格的监管和安全合规框架内。截至 2026 年，关键认证和合规姿态包括：SOC 2 Type II（年度安全和可用性审计）、PCI DSS Level 1（Transfer
              产品内处理支付卡数据）、ISO 27001（信息安全管理），以及面向加州消费者隐私权的 CCPA/CPRA 合规。Plaid 的 Consumer Report 产品还受 Fair Credit
              Reporting Act（FCRA）约束，需要针对消费者争议处理、准确性维护和许可用途验证建立特定程序。


              2026 年 4 月的数据泄露调查，是当前最重大的合规风险。Plaid 披露，由于一家第三方数据处理合作伙伴配置错误，少量消费者金融记录遭到暴露。该事件引发 CFPB 和多个州总检察长调查。Plaid
              已聘请外部取证机构并通知受影响消费者，但截至报告日期调查仍在进行。历史上，Plaid 曾在 2022 年就一起 $58M
              集体诉讼达成和解，案由是涉嫌在缺乏足够明确同意的情况下未经授权分享消费者金融数据；这说明数据处理实践是反复出现的法律风险点。


              可用性和可靠性方面：Plaid 为生产 API 环境公布的 SLA 是月度 99.9% uptime。状态页（status.plaid.com）展示历史事故数据；2024–2025 年的重大事件包括三次影响
              Transactions 产品、持续超过 30 分钟的中断，以及一次大型银行 API 迁移期间的 Auth 降级事件。企业 SLA 对低于 99.9% 门槛的停机提供事故抵扣。Plaid 工程博客（可从
              Plaid 网站访问）记录了多区域故障转移和限流投入，用来防止级联故障。


              隐私架构上，消费者数据按 Plaid Privacy Policy 处理，该政策向终端消费者披露数据分享模式。2022 年和解要求 Link 流程强化同意披露。CFPB 1033 Phase 1（2026 年 4
              月生效）下，Plaid 的数据处理必须符合监管对数据最小化和目的限制的要求，限制 Plaid 在授权用例之外聚合和使用消费者数据。
