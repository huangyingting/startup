  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场边界与定义
        blocks:
          - type: paragraph
            body: >
              Plaid 位于三个重叠市场的交汇处：金融数据聚合、开放银行基础设施，以及面向金融服务的身份与欺诈基础设施。公司主要服务的市场是金融数据连接——通过
              API，让第三方应用安全读取金融机构中的账户余额、交易、身份和收入数据，并发起银行到账户支付。核心测算不包括相邻市场：核心银行软件（Temenos、FIS）、支付网络（Visa、Mastercard、ACH
              rails）、征信机构（Equifax、Experian、TransUnion），以及作为 Plaid 客户而非竞争对手的个人财务管理应用。


              纳入支出边界的部分包括：银行账户验证费用（用于身份和贷款流程）、交易数据订阅（PFM、财富、分析）、收入和资产验证（抵押贷款、贷款）、ACH 支付发起、欺诈评分 API 调用，以及身份验证流程。关键买方画像是
              B2B 开发者 / 企业：金融科技公司、数字银行、贷款机构、财富管理机构、报税应用、HR 薪资处理方，以及越来越多自己使用同行开放银行层的银行。付款方是应用 / 企业；用户是被连接账户的消费者。


              Plaid 连接层的替代方案包括：直接建立银行 API 关系（头部银行可行，但规模化不现实）、通过凭证抓屏（旧模式，在 CFPB 1033
              下走弱）、手工上传银行流水（摩擦很高的替代）、以及征信局三方合并报告（对收入 / 资产数据的部分替代）。CFPB Section 1033 规则于 October 2024 最终落地，要求银行按机构规模在
              2026–2029 年前向授权第三方开放标准化 API，正在重塑哪些替代方案还能成立。
