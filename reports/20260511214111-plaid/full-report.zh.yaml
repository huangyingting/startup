  - id: TM004
    title: 增长驱动因素与约束表
    columns:
      - 驱动因素 / 约束
      - 方向
      - 时间
      - 对 Plaid 的影响
      - 尽调问题
    rows:
      - - CFPB Section 1033 规则要求
        - 正向驱动
        - 2026–2029 分阶段推出
        - 为 Plaid 的数据模式背书；迫使银行建设 API，Plaid 可承接这类需求
        - 跟踪 Phase 1 银行合规（2026 年 4 月截止）和 FDX 覆盖率
      - - EU PSD2 / PSD3 开放银行采用
        - 正向驱动
        - 2025–2027
        - 海外打法已跑通；Plaid 欧洲收入从小基数增长
        - 量化 2025–2026 年非美国收入贡献
      - - 嵌入式金融 / BaaS 增长
        - 正向驱动
        - 2025–2028
        - 拓展非金融科技买方；HR、房地产、零售应用都可能成为客户
        - 评估非金融科技垂直领域的企业销售管线
      - - 个人金融中的生成式 AI
        - 正向驱动
        - 2025–2027
        - AI 金融助手需要高质量交易数据，推高单用户 API 调用量
        - 跟踪 2026 队列中 AI 原生金融科技客户增长
      - - 消费者金融科技采用（移动优先）
        - 正向驱动
        - 持续
        - 更多用户把银行账户接入应用 = 更多 Link 事件和更高用量收入
        - 监测每个活跃应用的 Link 量同比变化
      - - 银行反对与数据访问费
        - 负向约束
        - 持续 / 2025–2026 升级
        - JPMorgan、Wells Fargo 等银行限制数据访问或开始收费；威胁毛利率
        - 逐家映射 1033 后银行 API 可用性和收费结构
      - - FDX 采用碎片化
        - 负向约束
        - 2025–2028
        - FDX 标准采用不均，意味着 Plaid 要承担双轨维护成本（API + 爬虫兜底）
        - 测算截至 2026 年 Q1 OAuth 连接与凭证连接占比
      - - 州级隐私监管扩张
        - 负向约束
        - 2025–2028
        - CCPA/CPRA、Virginia CDPA、Texas 及其他 15+ 部州法律，增加数据增强产品合规负担
        - 评估 Plaid 在 Consumer Report（FCRA）和数据留存上的合规状态
      - - 消费者对凭证共享的不信任
        - 负向约束
        - 持续
        - 40%+ 消费者对共享银行凭证持谨慎态度；影响 Link 转化率
        - 按垂直领域跟踪 Link 授权放弃率
      - - 信用合作社 / 社区银行 API 缺口
        - 负向约束
        - 2026–2029
        - 较小机构不在 1033 推出的 Phase 1/2，直到 2029 年可能仍缺少稳健 API，需要屏幕抓取兜底
        - 按 API 可用性映射 Plaid 对 5,000+ 家信用合作社的覆盖
    notes: 方向和时间判断是分析师基于监管文件、行业研究和 Plaid 公开声明的归纳。并非所有约束都有同等重要性。
