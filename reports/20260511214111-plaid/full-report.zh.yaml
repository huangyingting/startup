        - 获取 Plaid 的 Section 1033 合规路线图；验证 FDX 认证时间表和竞争定位
      - - FTC 消费者金融数据隐私行动
        - 美国联邦
        - FTC 2023 年政策声明；执法环境仍在持续
        - 高
        - 高 — FTC 对欺骗性同意做法和数据转售拥有管辖权；任何执法行动都会造成重大影响
        - Plaid 在 2020 年集体诉讼后修订数据使用政策；2021 年重新设计消费者同意界面
        - 中等 — Plaid 已有记录可查的改进，但 FTC 标准仍在演变
        - 索取监管往来记录；审查同意流程 UX 和数据留存政策
      - - '集体诉讼和解（In re: Plaid Privacy Litigation）'
        - 美国联邦（加州北区）
        - 2022 年以 $58M 和解；监督期仍在进行
        - 低（已解决）
        - 中等 — 和解条款要求持续隐私合规；违反条款会触发新的责任
        - 和解要求调整政策并重新设计同意 UI；合规监督持续到 2026 年
        - 低-中等 — 若合规失守，风险属于尾部事件
        - 确认合规监督义务和到期日；审查和解后的政策审计
      - - GDPR / UK GDPR 合规
        - 欧盟 / 英国
        - 持续合规义务；Plaid 在英国和欧盟活跃
        - 中
        - 高 — GDPR 罚款最高可达全球年收入的 4%；任何英国 / 欧盟执法行动都会造成重大影响
        - Plaid 与欧盟 / 英国数据处理方签有 DPA 协议；已任命 DPO；Privacy Shield 后续框架（DPF）已到位
        - 中等 — 国际数据传输复杂；需要 SCC 和 DPF
        - 审查 Plaid 的欧盟 / 英国 DPA 文件；确认 DPF 认证；验证跨境传输机制
      - - CCPA / CPRA（加州）
        - 加州
        - CPRA 于 2023 年开始执法
        - 中
        - 中等 — 每次故意违规最高可能罚款 $7,500；还涉及消费者删除请求合规
        - 和解后隐私团队扩张；消费者删除工作流已落地
        - 低-中等
        - 审查 CCPA 删除请求 SLA；验证数据主体请求的审计轨迹
      - - Visa 收购 DOJ 反垄断遗留风险
        - 美国联邦
