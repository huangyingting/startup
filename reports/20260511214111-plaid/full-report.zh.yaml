  - number: 7
    title: 风险
    sections:
      - number: '7.1'
        title: 监管与法律风险
        blocks:
          - type: paragraph
            body: |
              Plaid 站在金融数据、开放银行监管和消费者隐私的交汇处；所有主要市场的法律环境都在快速变化。
              CFPB Section 1033 规则制定、FTC 持续执法行动、州级 CCPA/CPRA 合规义务、EU/UK GDPR
              要求，以及 2021 年 DOJ 阻止 Visa 收购和 $58M 集体诉讼和解留下的诉讼尾部风险，
              共同构成密集且持续演变的监管风险栈。Plaid 自身没有银行牌照，但必须遵守适用于每个金融机构
              合作伙伴、以及消费者所在每个司法辖区的数据访问监管。$58M 和解要求 Plaid 至少到 2026 年
              持续遵守同意 UI 合规和数据最小化实践；Section 1033 中含糊的“合理补偿”措辞，也给 Plaid
              核心 Auth 收入留下未解决的定价风险。
