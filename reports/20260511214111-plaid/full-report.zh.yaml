        - 低（历史事件）
        - 低 — 虽是历史事件，但显示 DOJ/FTC 会在并购场景审查 Plaid；未来退出路径可能面临类似审查
        - 历史事件无需缓释；未来收购方应建模监管批准风险
        - 低 — 持续风险有限
        - 对任何超过 $10B 的未来战略退出建模反垄断审查概率；确保收购方法律顾问提前介入
    notes: 各行按剩余严重性排序；评估为分析师基于截至 2026 年 Q2 的公开 CFPB/FTC/OCC 指引作出的推断。Plaid 实际监管状况可能不同。
