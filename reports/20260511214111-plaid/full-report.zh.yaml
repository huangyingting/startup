    title: 公司概况
    sections:
      - number: '1.1'
        title: 公司身份与使命
        blocks:
          - type: paragraph
            body: >-
              Plaid Inc. 是一家金融科技基础设施公司，总部位于 California 州 San Francisco，并在 Delaware 注册成立。Zach Perret 与 William Hockey 于
              2013 年创立 Plaid，两人此前都曾在 Bain & Company 任顾问。Plaid
              充当消费者银行账户与依赖金融数据的应用和服务之间的连接层。公司的使命，是让任何公司都能搭建金融科技方案，让人们把自己的金融数据安全、便捷、可靠地接入应用和服务。Plaid 的 API
              平台给开发者提供单一集成入口，覆盖 12,000+ 家金融机构的银行账户数据、余额、交易历史、身份信息、收入数据和欺诈信号。平台服务 8,000+ 家金融科技、企业和银行客户，包括
              Venmo、Robinhood、Coinbase、SoFi、Chime、Affirm、Citi 等知名应用。截至 May 2026，Plaid
              称自己是「金融服务分析平台」，业务已从纯连接扩展到身份验证、欺诈防控、信贷承销和支付发起。公司在北美、欧洲和英国的 20 多个国家运营，全球设有六个办公室。
