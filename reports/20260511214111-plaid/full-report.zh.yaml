      - number: '1.2'
        title: 创始人与领导层
        blocks:
          - type: paragraph
            body: >-
              Plaid 由 Zachary “Zach” Perret 和 William Hockey 共同创立。截至 May 2026，Perret 担任 CEO，也是公司最主要的公开代表。Hockey 于 2021
              年卸任 CTO，随后共同创办持牌全国性银行 Column；他仍是董事。Plaid 的起点，是 2012–2013 年尝试做一款消费者财务规划应用；创始人在接入金融机构时碰到难题，于是转向搭建连接 API
              基础设施。2013 年，二人用可视化银行活动的应用 Rambler 赢得 TechCrunch Disrupt 黑客松，获得早期关注，并从 Spark Capital、Google Ventures 和 NEA
              获得种子资金。截至 2026 年，管理层包括 Eric Sager（COO）、Seun Sodipo（CFO）、Jean-Denis Greze（CTO）、Meredith
              Fuchs（首席法务官兼总法律顾问）、Meghan Welch（首席人事官）、Tom Daniels（CISO）和 Ginger Baker（首席网络官）。2024 年，Plaid 聘请 Jennifer
              Taylor 出任首任 President；Taylor 此前曾任 Cloudflare 首席产品官，并在 Salesforce、Facebook 和 Adobe 担任高级职务。CFO 和 President
              的任命，显示公司在为最终 IPO 做准备。
