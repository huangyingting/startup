      - number: '2.3'
        title: 市场分层与买方地图
        blocks:
          - type: paragraph
            body: >
              开放银行和金融数据 API 市场按两个主轴分层：用例（数据拿来做什么）和买方类型（谁购买 API）。按交易量看，最大的用例板块是个人理财和 PFM（预算、净资产追踪）、贷款与信贷承销（收入 /
              资产验证），以及银行到账户支付（ACH 发起）。新兴高增长板块包括身份验证（金融科技入驻的 KYC/AML）、欺诈防控（实时交易风险评分）、嵌入式财富管理，以及税务和薪资连接。


              买方类型从开发者阶段初创公司（合同额最低、数量最大），到 Series B/C 金融科技公司（中端企业客户），再到大型银行和金融机构为自有产品购买 API 连接。预算归属差异很大：开发者阶段买方在自助方案上使用
              Plaid 的按调用付费模式；大型企业买方则由 Plaid 企业销售团队谈判年度订阅合同。不同板块的采用触发点也不同：贷款应用受收入验证合规要求驱动；PFM 应用看用户入驻质量；支付应用看 ACH
              转化率；银行则受内部数字化转型压力和 CFPB 1033 合规准备度驱动。


              地理上目前高度偏向美国——Plaid 覆盖 12,000+ 家美国金融机构，而在英国和 EU 仅覆盖数百家。公司通过收购 Longitud 和 Quovo 以及自有扩张进入 EU，但截至 2025
              年，非美国市场收入占比低于 10%，因此 CFPB 1033 下美国开放银行时间表，是近期最主要增长杠杆。
