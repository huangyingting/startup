      - number: '6.2'
        title: 客户采用轨迹与增长指标
        blocks:
          - type: paragraph
            body: >
              Plaid 公开披露的客户指标，只能部分呈现采用轨迹。应用数量从 2018 年（Series C 时）的约 2,600 个，增长到 2020 年的 5,500 个，再到 2023–2024 年的 8,000+
              个。通过 Plaid 连接的消费者账户，从 2020 年的约 130 million 增至截至 2025 年的 200 million+。机构覆盖从 2018 年的 6,000 家增至 2025 年的
              12,000+ 家。


              2020–2023 年消费者账户增长提速，与疫情期间 fintech 热潮同步：数字银行采用率飙升，PFM 应用使用量大幅增加。应用数量增长放缓——从 2019–2021 年的激进扩张，转为 2022–2024
              年的整合——反映了 2022 年加息后更广泛的 fintech 市场收缩，新 fintech 应用创建减少。与此同时，收入向企业端迁移，意味着 ARR
              增长并不与应用数量线性同步；即便新增应用温和，既有客户里的企业多产品扩张仍能拉动收入。


              激活率数据没有公开：Plaid 不披露创建 sandbox 账户的开发者中，有多少比例转入生产环境，也不披露平均投产时间。这是关键证据缺口；激活率下滑会指向开发者吸引力下降，或竞争替代增加。API 调用量（也就是
              Signal 欺诈模型的数据来源）仍在增长，说明活跃生产客户基础仍然健康。
