      - number: '7.4'
        title: 财务与市场风险
        blocks:
          - type: paragraph
            body: |
              Plaid 仍是私营公司，没有公开披露通往盈利的路径，没有经审计财务报表；其 $13.4B 估值，
              还高于 2021 年在不同市场条件下被阻止的 $5.3B Visa 收购报价。fintech 板块倍数恶化、
              利率上升压低 fintech 应用估值并削减其 API 支出，或 IPO 窗口长期关闭，都可能削弱 Plaid
              以有利条款继续融资的能力。公司最后一次公开报道融资是 2021 年 $425M Series D；尚无公开确认的
              Series E，现金跑道因此存疑。S&P Global Market Intelligence 分析显示，金融 API 基础设施
              提供商可获得 6–18x ARR 倍数，这意味着 Plaid 的 $13.4B 估值需要 $700M–$2.2B
              ARR 支撑；这个区间无法从公开来源独立验证。Bloomberg 和 The Information 均报道过，投资人怀疑
              以 2025 年 fintech 倍数证明 2021 年峰值估值的合理性。2023 年 1 月裁员（260 名员工，约 20%）
              降低了烧钱速度，但也带来增长轨迹疑问；在没有公开财务披露前，这个问题仍未解决。
