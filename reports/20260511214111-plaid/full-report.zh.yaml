          description: 基于 Plaid 8,000+ 个累计活跃应用和约 6 年增长轨迹估计的年度新增开发者账户注册量。确切注册数未公开披露。
        - label: 沙盒激活
          value: 20000
          description: 估计约 40% 的注册用户完成沙盒集成（开发者工具激活的行业基准）；Plaid 的文档质量可能支撑高于平均水平的激活率。
        - label: 生产部署
