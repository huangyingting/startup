        - Plaid 是默认的银行连接层，已连接 500M+ 账户；网络效应形成 10 年复制护城河
        - 8,000+ 个应用；12,000+ 家机构；共同撰写 FDX API 规范
        - Section 1033 的 FDX API 强制要求让竞争者以零边际成本进入；银行撤销访问
      - - 产品护城河
        - 多产品扩张（Signal、Income、Transfer、Layer）将业务从 Auth 分散到高毛利、依赖数据网络的产品
        - 2025E ARR 增长约 40%；Plaid 博客和合作伙伴公告确认产品套件扩张
        - 竞争者以相近准确率复制 Signal/Income；监管封顶基于数据的评分
      - - 客户留存
        - Link SDK 集成制造 3-6 个月切换成本；约 120% NDR 证实保留基础之外还有扩张收入
        - 科技分析师记录了高切换成本；NDR 估计来自 Sacra
        - PayPal/Venmo 自建；两个或更多前五大客户迁移到 MX 或自建方案
      - - 监管定位
        - CFPB Section 1033 让开放银行获得合法性，Plaid 共同撰写 FDX 则固化其合规角色
        - CFPB 最终规则于 2024 年 10 月发布；FDX 共同撰写得到确认；Section 1033 需要 Plaid 已经搭好的开发者生态
        - CFPB「合理补偿」措辞被解释为封顶 Plaid 费用；FDX 规范强制零成本数据访问
      - - 估值纪律
        - 以 $7-9B（刷新后估值）进入具吸引力：若按 15x ARR、2028 年 ARR 达 $1.3-1.7B，IPO 估值可到 $20-25B，对应 3-5x 上行
        - 二级市场证据（2025 年 $6.1B、2026 年 $8B）支持低于 $10B 进入；高增长基础设施在 IPO 时有机会拿到 15x ARR 倍数
        - $13.4B 的 Series D 价格未修正；被迫在峰值价格投资，估值没有重置
