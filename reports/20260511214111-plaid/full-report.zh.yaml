      - number: '6.3'
        title: 具名客户证据与部署质量
        blocks:
          - type: paragraph
            body: >
              Plaid 的客户基础囊括许多最知名的消费者 fintech 品牌。证据最强的部署以 Venmo（PayPal 旗下资产）为锚；Venmo 是 Plaid 2013–2014 年第一个大客户，至今仍用 Plaid
              为 P2P 转账连接银行账户。Robinhood 向 SEC 提交的 S-1 招股说明书将 Plaid 列为关键第三方供应商，并披露 Plaid 服务已集成进 Robinhood
              经纪账户入金流程。Coinbase 也在 SEC 文件中披露，其银行账户验证和 ACH 入金依赖 Plaid。


              超级应用之外，Plaid 有文档记录的客户还包括：SoFi（银行、贷款和投资流程）、Betterment（为转账连接投资账户）、Chime（账户验证和入金）、Affirm（BNPL
              承保的收入验证）、NerdWallet（用于推荐的金融账户聚合）、Gusto（薪资和银行集成），以及数百家数字银行、neobank 和嵌入式金融平台。Plaid 维护公开客户展示页面，列出 logo 和使用场景。


              客户证明质量在上市公司（Robinhood、Coinbase、SoFi、Affirm）处最高，因为这些公司在 SEC 文件中把 Plaid
              作为重要第三方依赖提及。非公开客户（Chime、Betterment、NerdWallet、Gusto）的证据来自新闻稿、产品博客文章和 Plaid 自有案例材料。G2 和 Capterra
              上的开发者评价确认了生产部署，并提供定性满意度信号。
