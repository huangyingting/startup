      answeredBy: "Investors include a16z, Index Ventures, Ribbit Capital, Spark Capital, Altimeter Capital, Goldman Sachs, Silver Lake, NEA, Kleiner Perkins, Franklin Templeton, BlackRock, Fidelity, J.P. Morgan. Board details not fully public."

    - id: "QI009"
      question: "What is Plaid's revenue per employee and how does it compare to public peers?"
      type: "comparison"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "~$414K revenue/employee at 1,318 employees; comparable to mid-efficiency SaaS companies; better than pre-layoff 2021 levels."

    - id: "QI010"
      question: "What was the impact of the December 2022 layoffs on Plaid's financial trajectory?"
      type: "mechanism"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "260 employees (20%) laid off Dec 2022; enabled positive operating margins in 2024; structural cost improvement without apparent revenue impact as growth accelerated in 2023."

    - id: "QI011"
      question: "Is there adverse information about Plaid's financial practices or accounting concerns?"
      type: "adverse"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "No accounting fraud or restatement history; the April 2025 RSU-focused fundraise structure was unusual and initially perceived as a down-round negative; bank data-fee disputes represent contingent cost risk."

    - id: "QI012"
      question: "What is Plaid's implied ARR multiple at each funding round valuation?"
      type: "quantification"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "2021 Series D: ~$13.4B / ~$175M ARR (est.) = ~76x; April 2025 Series E: $6.1B / $390M ARR = 15.6x; Feb 2026 tender: $8B / $546M = 14.6x."

    - id: "QI013"
      question: "What portion of Plaid's ARR comes from its newer fraud and payment products?"
      type: "quantification"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Approximately 20%+ of ARR from fraud (Signal, Protect, Beacon) and payment (Transfer, Layer) products as of 2025; CEO statements indicated these segments more than doubled in 2025."

    - id: "QI014"
      question: "Does Plaid have any debt or credit facility?"
      type: "verification"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "No publicly disclosed debt or credit facility; common for late-stage private companies to maintain a revolving credit line but Plaid has not disclosed one."

    - id: "QI015"
      question: "What is the customer concentration risk in Plaid's revenue base?"
      type: "quantification"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "Not publicly disclosed; inferred to be elevated given early customer base dominance by Venmo, Robinhood, Coinbase, SoFi, Chime which could each represent significant ARR."

    - id: "QI016"
      question: "What are the primary cost drivers in Plaid's COGS structure?"
      type: "enumeration"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "COGS includes bank data acquisition fees, cloud infrastructure (AWS/GCP/Azure), third-party data licensing, and compliance/security infrastructure."

    - id: "QI017"
      question: "Has Plaid disclosed any specific revenue figures in SEC filings or investor materials?"
      type: "verification"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "No SEC filings (private company); ARR figures are third-party estimates from Sacra and analyst reports. CEO confirmed EBITDA profitability but not specific revenue in public statements."

    - id: "QI018"
      question: "What is the ARR growth rate trend and what does it imply for IPO readiness?"
      type: "mechanism"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "ARR growth accelerated from ~25% (2024) to ~40% (2025); acceleration combined with EBITDA profitability creates a favorable IPO profile if sustained through 2026 growth."

    - id: "QI019"
      question: "What financial risks stem from the bank data access fee debate?"
      type: "adverse"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "If banks successfully charge data access fees under CFPB 1033's fee provisions, Plaid's COGS could increase materially; JPMorgan dispute resolved Sept 2025 but further negotiations are expected."

    - id: "QI020"
      question: "What is the implied dilution from the Series E and Series D capital raises for early investors?"
      type: "quantification"
      targets: ["contentRequirements/3"]
      status: "partial"
      answeredBy: "Series E was issued as common stock ($575M); exact dilution unknown without capitalization table disclosure. At $6.1B valuation, $575M represents ~9% dilution if treated as new shares."

    - id: "QI021"
      question: "What did the JPMorgan data access fee dispute entail and how was it resolved in September 2025?"
      type: "verification"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "JPMorgan reportedly restricted and charged fees for third-party access to customer bank data via Plaid; resolution reached September 2025 with undisclosed terms. Likely a negotiated data access agreement with fee structure."

    - id: "QI022"
      question: "What are Plaid's stock-based compensation expenses and how do they affect adjusted vs. GAAP profitability?"
      type: "quantification"
      targets: ["contentRequirements/2"]
      status: "partial"
      answeredBy: "Stock-based compensation is a significant non-cash expense; the April 2025 RSU-tax fundraise indicates large vesting events were anticipated. Exact SBC amount not publicly disclosed."

    - id: "QI023"
      question: "What is the expected IPO timeline and market conditions for Plaid's eventual public offering?"
      type: "freshness"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "CEO and CFO (Seun Sodipo hired 2023) statements suggest IPO readiness tracking for 2026–2027; specific date not confirmed; market conditions and revenue trajectory are key variables."

    - id: "QI024"
      question: "What comparables exist for Plaid's ARR multiple of ~14.6x as of the Feb 2026 tender offer?"
      type: "comparison"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "~14.6x ARR is consistent with late-stage private fintech infrastructure companies; comparable to public ARR multiples for Adyen (~15x NTM revenue), Wise (~10x), dLocal (~8x) as of early 2026."

    - id: "QI025"
      question: "Has Plaid disclosed any forward revenue guidance or financial targets publicly?"
      type: "verification"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "No public forward guidance; CEO stated the company is 'growing fast' and 'profitable' but did not provide specific financial targets in publicly available statements."

