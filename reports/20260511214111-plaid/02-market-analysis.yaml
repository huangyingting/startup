      type: "freshness"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Mastercard acquired Finicity (2020), Visa acquired Tink (2021); consolidation slowing post-2022; no major acquisitions in 2025 per available evidence."

