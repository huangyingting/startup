      answeredBy: "1033 mandates standardized API access, legitimizing Plaid's token-based model vs. screen-scraping; creates compliant open banking layer."

    - id: "QM010"
      question: "What is the FDX standard and how widely is it adopted by US financial institutions?"
      type: "verification"
      targets: ["contentRequirements/3"]
      status: "partial"
      answeredBy: "FDX is the primary US open banking standard body; adoption by 200+ institutions but uneven; full data not publicly available."

    - id: "QM011"
      question: "What are the specific effective dates in the CFPB 1033 compliance timeline by institution size?"
      type: "verification"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "April 1 2026 (>$850B assets), April 1 2027 ($10B-$850B), April 1 2028 ($1B-$10B), April 1 2029 (<$1B depository), April 1 2030 (credit unions)."

    - id: "QM012"
      question: "How does EU PSD2/PSD3 compare to the US CFPB 1033 regulatory framework?"
      type: "comparison"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "PSD2 (EU, 2018) was more prescriptive and exchange-rate-focused; 1033 is broader, more flexible, and focuses on data rights; PSD3 (2025 proposed) further strengthens."

    - id: "QM013"
      question: "What market research firm estimates are available for open banking market size?"
      type: "enumeration"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Grand View, MarketsandMarkets, Fortune BI, Mordor, Allied, Business Research Insights — all documented in TM002."

    - id: "QM014"
      question: "What is Plaid's current SOM (share of its addressable market)?"
      type: "quantification"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "~7–11% of estimated $5–8B US SAM, based on ~$546M 2025E ARR."

    - id: "QM015"
      question: "What are the primary substitutes for Plaid's open banking connectivity layer?"
      type: "enumeration"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Direct bank APIs, screen-scraping with credentials, manual bank statement uploads, credit bureau reports."

    - id: "QM016"
      question: "Which financial institution types are most represented in Plaid's 12,000+ institution network?"
      type: "quantification"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "Plaid's 12,000+ coverage includes major banks, regional banks, credit unions, and community banks; the network is dominated by US depository institutions with no public breakdown by institution type."

    - id: "QM017"
      question: "What is the current consumer adoption rate for open banking / account-linking apps in the US?"
      type: "quantification"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "100M+ US consumers have linked accounts via Plaid; broader open banking adoption estimated at 30%+ of US internet users."

    - id: "QM018"
      question: "Is there an adverse data point or analyst critique on open banking TAM estimates?"
      type: "adverse"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "Multiple analysts note TAM range is 4x wide due to scope inconsistency; bottom-up US data API market sizing is unavailable; BIS paper warns of financial stability risks from open banking data concentration."

    - id: "QM019"
      question: "What is the geographic breakdown of open banking market revenue (US vs. EU vs. Asia-Pacific)?"
      type: "quantification"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "EU and UK most mature (PSD2 since 2018); US growing post-1033 estimated at 30-40% of global TAM; APAC early stage. US share is analyst inference, not primary data."

    - id: "QM020"
      question: "What are the major regulatory bodies and their specific actions affecting open banking in 2025–2026?"
      type: "enumeration"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "CFPB (1033 final rule Oct 2024), FTC (privacy enforcement), OCC (fintech charters), state AGs (privacy laws), UK FCA (open banking mandate via CMA)."

    - id: "QM021"
      question: "What is the average revenue per connected account for financial data API providers?"
      type: "quantification"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Plaid pricing ranges from $1.50–$20 per connection depending on product; blended ARPU estimated at $5–7 per connected account annually based on disclosed metrics."

    - id: "QM022"
      question: "How does the open banking market growth trajectory compare between the US and Europe?"
      type: "comparison"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "EU/UK more mature (PSD2 since 2018, 7+ years ahead); US is in earlier mandatory adoption phase with CFPB 1033 effective 2026; US CAGR projected higher due to starting from lower base."

    - id: "QM023"
      question: "What is the estimated market size for fraud prevention and identity verification in financial services?"
      type: "quantification"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "US identity verification market estimated at $8–12B; financial fraud prevention at $20B+; these adjacencies expand Plaid's SAM beyond pure data connectivity."

    - id: "QM024"
      question: "Are there any adverse regulatory developments threatening the open banking market in 2025–2026?"
      type: "adverse"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "CFPB under new leadership potentially revisiting 1033 rule; Republican-led CFPB has signaled reduced enforcement; data fees debate ongoing; FDX standard still voluntary."

    - id: "QM025"
      question: "What is the dollar impact of bank data-access fees on Plaid's cost structure?"
      type: "quantification"
      targets: ["contentRequirements/3"]
      status: "unresolved"
      answeredBy: ""

    - id: "QM026"
      question: "What is the market adoption rate for OAuth-based open banking APIs vs. screen-scraping in the US?"
      type: "quantification"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Plaid reported 95%+ OAuth for major bank connections as of 2024; FDX tracks OAuth adoption across members; full US industry figure is not independently published."

    - id: "QM027"
      question: "What are the key market adjacencies that could expand Plaid's TAM beyond current products?"
      type: "enumeration"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Payroll data (income/tax), insurance connectivity, real estate, government benefits, B2B credit underwriting, international open banking."

    - id: "QM028"
