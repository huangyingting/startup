figures:
  - id: "FE001"
    title: "Plaid Data Acquisition and Normalization Architecture"
    type: "flow"
    summary: "Data flow from bank institution through Plaid's acquisition, normalization, and product delivery layers to developer app customers."
    data:
      nodes:
        - id: "banks"
          label: "Financial Institutions (12,000+)"
          description: "Source of consumer financial data: banks, credit unions, brokerages, retirement accounts. Mix of direct OAuth/API and legacy credential-based connections."
        - id: "acquisition"
          label: "Data Acquisition Layer"
          description: "Dual-rail: (1) Direct bank OAuth APIs (FDX standard; ~40% of institutions by count, majority by account volume); (2) Credential-based scraping fallback (~60% of institutions, declining as CFPB 1033 drives API adoption)."
        - id: "normalization"
          label: "Normalization and Enrichment Engine"
          description: "Proprietary ML pipeline: transaction enrichment (merchant categorization, category tagging), identity resolution, income extraction, asset categorization. Converts raw bank data into standardized Plaid schema."
        - id: "products"
          label: "Product API Layer (12 products)"
          description: "Auth, Transactions, Identity, Income, Assets, Investments, Monitor, Signal, Protect, Beacon, Consumer Report, Transfer, Layer — each product exposes normalized data through distinct API endpoints."
        - id: "link"
          label: "Plaid Link SDK"
          description: "Consumer-facing consent UI (iframe/WebView) that handles bank selection, OAuth redirect, consent capture, and token generation. Deployed by developer apps within their consumer flow."
        - id: "developers"
          label: "Developer Apps (8,000+)"
          description: "Fintech apps, lenders, neobanks, PFM tools, payment platforms consuming Plaid APIs to power financial features for their end users."
      edges:
        - from: "banks"
          to: "acquisition"
          label: "Bank data stream (API + scraping)"
        - from: "link"
          to: "acquisition"
          label: "Consumer credentials / OAuth token"
        - from: "acquisition"
          to: "normalization"
          label: "Raw financial records"
        - from: "normalization"
          to: "products"
          label: "Enriched financial data schema"
        - from: "products"
          to: "developers"
          label: "Plaid API response (JSON)"
        - from: "developers"
          to: "link"
          label: "Link token (triggers consumer flow)"
