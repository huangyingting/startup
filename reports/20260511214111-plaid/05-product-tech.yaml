          description: "Developer creates Plaid account; receives API keys for sandbox environment within minutes. No contractual commitment required for sandbox."
        - id: "sandbox"
          label: "2. Sandbox Integration"
          description: "Developer integrates Plaid Link SDK and chosen product APIs against sandbox test credentials (simulated bank accounts). Quick Start guides for 10 languages; typical integration: 15–30 minutes."
        - id: "testing"
          label: "3. Test Scenarios"
          description: "Sandbox provides test institution with pre-populated account data for Auth, Transactions, Income, and other products. Developers validate error handling, edge cases, and UI flow."
        - id: "review"
          label: "4. Production Access Request"
          description: "Developer submits app for Plaid's review: intended use case, data handling practices, Terms of Service acceptance. Plaid reviews for compliance with developer agreement and acceptable use policy."
        - id: "production"
          label: "5. Production Launch"
          description: "Developer deploys with production API keys; Plaid Link connects to real financial institutions. Usage billed monthly based on product tier and volume."
        - id: "expansion"
          label: "6. Multi-Product Expansion"
          description: "Successful deployment often leads to addition of adjacent products (Auth → Signal → Transfer; Transactions → Income). Enterprise accounts negotiate bundled pricing and dedicated support."
      edges:
        - from: "signup"
          to: "sandbox"
          label: "API keys issued instantly"
        - from: "sandbox"
          to: "testing"
          label: "SDK + API integration"
        - from: "testing"
