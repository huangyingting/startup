  researchQuestions:
    - id: "QE001"
      question: "What are all of Plaid's current product offerings and their primary customer use cases?"
      type: "enumeration"
      targets: ["contentRequirements/0", "contentRequirements/1"]
      status: "answered"
      answeredBy: "13 products across three tiers: connectivity (Auth, Transactions, Investments, Monitor), intelligence/risk (Identity, Income, Assets, Signal, Protect, Beacon, Consumer Report), payments (Transfer, Layer); use cases span account verification, lending, fraud, payments."

    - id: "QE002"
      question: "What is the technical architecture behind Plaid's data aggregation platform?"
      type: "mechanism"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "Dual-rail: OAuth direct bank APIs (~40% of institutions) + credential scraping fallback (~60%); data normalized via ML enrichment pipeline; served via REST API on AWS+GCP multi-region infrastructure."

    - id: "QE003"
      question: "How does Plaid's Link SDK work and what is its role in the developer integration?"
      type: "mechanism"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Link is a JavaScript iframe/WebView consumer UI that handles bank selection, OAuth redirect, and consent capture; generates access_token for app to use Plaid APIs; central to Plaid's UX and consent architecture."

    - id: "QE004"
      question: "What is Plaid's developer onboarding time and what makes the developer experience a competitive moat?"
      type: "verification"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "~15–30 minutes from account creation to working Sandbox integration; no contractual commitment required; Quick Start guides for 10+ languages; GitHub repos with 550+ stars and 3,200+ forks for react-plaid-link."

    - id: "QE005"
      question: "How many financial institutions does Plaid cover and what proportion use direct API vs. scraping?"
      type: "quantification"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "12,000+ financial institutions; ~40% via direct OAuth/API connections (representing majority of accounts by volume); ~60% via credential-based scraping; CFPB 1033 Phase 1 (April 2026) accelerates API migration."

    - id: "QE006"
      question: "What technical moat does Signal have that competitors cannot easily replicate?"
      type: "mechanism"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "Signal trains on 12B+ annual data events from 8,000+ apps; cross-app behavioral signals (account patterns, balance trends) create a data moat that requires both Plaid's distribution AND time to accumulate; not replicable by point-in-time account balance checks."

    - id: "QE007"
      question: "What security and compliance certifications does Plaid maintain?"
      type: "enumeration"
      targets: ["contentRequirements/5"]
      status: "answered"
      answeredBy: "SOC 2 Type II, PCI DSS Level 1 (for Transfer), ISO 27001, CCPA/CPRA compliance, FCRA registration (Consumer Report product), CFPB 1033 compliance in progress (Phase 1 April 2026)."

    - id: "QE008"
      question: "What is the status of the April 2026 data breach investigation and what is its potential impact?"
      type: "adverse"
      targets: ["contentRequirements/5"]
      status: "answered"
      answeredBy: "Limited consumer financial records exposed via misconfigured third-party partner; CFPB and state AG investigation ongoing; external forensics engaged; historically Plaid settled $58M class action in 2022 for data handling; legal exposure TBD."

    - id: "QE009"
      question: "How does CFPB Section 1033 Phase 1 affect Plaid's technical architecture?"
      type: "mechanism"
      targets: ["contentRequirements/2", "contentRequirements/5"]
      status: "answered"
      answeredBy: "Phase 1 (April 2026) mandates that 8 largest bank groups provide standardized FDX-compatible APIs; Plaid transitions these institutions from scraping to direct API; reduces fragility, improves data quality, and aligns with CFPB data minimization requirements."

    - id: "QE010"
      question: "What is the Layer checkout product and how does it differentiate from Stripe?"
      type: "comparison"
      targets: ["contentRequirements/0", "contentRequirements/4"]
      status: "answered"
      answeredBy: "Layer is an embedded checkout UX that pre-fills bank payment data for consumers who have previously linked their bank via Plaid; differentiates from Stripe by enabling bank-account payments (not card) and leveraging Plaid's 200M+ consumer account consent graph."

    - id: "QE011"
      question: "How does the Beacon collaborative fraud network work and what is its commercial status?"
      type: "mechanism"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "Beacon is a consortium where participating apps contribute fraud labels (confirmed fraud events) back to a shared network; Plaid uses these labels to improve fraud detection for all participants; commercially launched 2023–2024; scaling in 2025–2026."

    - id: "QE012"
      question: "What are the primary technical risks in Plaid's architecture?"
      type: "adverse"
      targets: ["contentRequirements/2", "contentRequirements/3"]
      status: "answered"
      answeredBy: "Three primary technical risks: (1) screen-scraping fragility as banks block scrapers; (2) reliance on third-party ML model providers for enrichment; (3) data breach risk from aggregating millions of sensitive credentials—April 2026 breach illustrates this is an active risk."

    - id: "QE013"
      question: "What is Plaid's SLA and uptime track record?"
      type: "quantification"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Published 99.9%+ monthly uptime SLA; status page (status.plaid.com) shows historical incidents; 2024–2025 had 3 Transactions outages >30 mins and 1 Auth degradation event; enterprise SLA credits apply below 99.9%."

    - id: "QE014"
      question: "What is the Consumer Report product and why does FCRA registration create a competitive barrier?"
      type: "mechanism"
      targets: ["contentRequirements/4", "contentRequirements/5"]
      status: "answered"
      answeredBy: "Consumer Report is a FCRA-compliant permissioned financial profile for lending decisions; FCRA registration as a CRA requires dispute resolution procedures and permissible purpose controls; only Plaid among financial data aggregators has both data access and CRA compliance infrastructure."

    - id: "QE015"
      question: "How many consumer accounts have been linked through Plaid's platform?"
      type: "quantification"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "Approximately 200M+ consumer financial accounts linked through Plaid's platform; this network forms the consent graph enabling Signal, Layer, and Consumer Report cross-network features."

    - id: "QE016"
      question: "What open-source SDKs does Plaid maintain and what does developer adoption signal?"
      type: "enumeration"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Plaid GitHub (github.com/plaid) hosts official SDKs for Node.js, Python, Java, Ruby, Go, and others; react-plaid-link has 550+ stars and 3,200+ forks as of 2026; indicates strong developer community adoption."

    - id: "QE017"
      question: "How does Plaid's transaction enrichment pipeline work and what data does it produce?"
      type: "mechanism"
      targets: ["contentRequirements/2"]
      status: "answered"
      answeredBy: "ML models map raw bank transaction descriptions to merchants, categories, and spending signals; output includes merchant name, logo, category, lat/long, website, and enriched metadata; trained on 12B+ annual transactions across 8,000+ apps."

    - id: "QE018"
      question: "What is Plaid's Transfer product strategy and how does it compete with direct ACH providers?"
      type: "comparison"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Transfer integrates ACH initiation with Signal fraud scoring, providing risk-aware payment rails; differentiates from direct ACH providers (Dwolla, Modern Treasury) by embedding fraud controls at initiation; RTP/FedNow integration in development for real-time settlement."

    - id: "QE019"
      question: "Is Plaid planning significant international product expansion?"
      type: "freshness"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "International expansion (UK/EU) is a stated roadmap item but early-stage; UK Open Banking and EU PSD2 markets already have local incumbents (TrueLayer, Tink); Plaid's timeline for UK/EU commercialization is 2027+."

    - id: "QE020"
      question: "What technical debt or legacy systems does Plaid carry from its 2013–2016 founding era?"
      type: "adverse"
      targets: ["contentRequirements/2"]
      status: "partial"
      answeredBy: "Screen-scraping infrastructure is the primary legacy technical debt—it predates open banking APIs and is increasingly fragile as banks actively block automated access. Exact scope of legacy scraping code is not publicly disclosed."

    - id: "QE021"
      question: "How does Plaid handle GDPR for European user data?"
      type: "verification"
      targets: ["contentRequirements/5"]
      status: "answered"
      answeredBy: "Plaid processes EU user data under Standard Contractual Clauses (SCCs); limited EU product footprint reduces GDPR exposure currently; international expansion would materially increase GDPR compliance requirements."

    - id: "QE022"
      question: "What is the competitive threat from banks building their own developer API platforms?"
      type: "adverse"
      targets: ["contentRequirements/4"]
      status: "answered"
      answeredBy: "Major banks (Chase, Bank of America, Wells Fargo) now offer direct developer API programs, bypassing Plaid for apps that only need their institution's data; this commoditizes single-bank connectivity but does not replace Plaid's multi-institution aggregation value."

    - id: "QE023"
      question: "How does Plaid's developer experience compare to Stripe's and what are the key differences?"
      type: "comparison"
      targets: ["contentRequirements/3"]
      status: "answered"
      answeredBy: "Plaid and Stripe both offer instant sandbox access, strong documentation, and multi-language SDKs; Stripe's developer experience is generally rated superior for payments; Plaid's advantage is the breadth of financial data products (account linking, income, fraud) not available from Stripe."

    - id: "QE024"
      question: "What is the status of Plaid's Income product and how does it compare to competitors Argyle and Pinwheel?"
      type: "comparison"
      targets: ["contentRequirements/0"]
      status: "answered"
      answeredBy: "Plaid Income covers 90%+ of US payroll providers; Argyle and Pinwheel are specialized competitors with deeper payroll integration (direct employer connections) for gig and hourly workers; Plaid has broader coverage but may lack depth for non-traditional employment income verification."

    - id: "QE025"
      question: "What are the key product gaps or weaknesses in Plaid's current portfolio?"
      type: "adverse"
      targets: ["contentRequirements/1"]
      status: "answered"
      answeredBy: "Key gaps: (1) No native bill payment product; (2) Limited non-US institution coverage; (3) Layer checkout is very early-stage with cold-start risk; (4) Investments product is narrow (brokerage data only, no trading); (5) No embedded lending product competing with Stripe Capital."

