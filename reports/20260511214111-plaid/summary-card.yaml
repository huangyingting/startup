summary:
  headline: >
    Plaid is the structurally dominant US open-banking infrastructure layer with ~$546M estimated ARR, 70%+ market
    share, and accelerating product diversification, but private disclosure opacity, regulatory headwinds from CFPB
    Section 1033, and a Series D valuation overhang warrant a track stance at the current $8B implied valuation pending
    IPO S-1 confirmation.
