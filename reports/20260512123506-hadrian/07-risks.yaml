chapter:
  number: 7
  title: Risks
  summary: >-
    Risks for Hadrian synthesizes public evidence on industrial / automated manufacturing, retaining private-metric gaps
    where the source base is incomplete.
sections:
  - id: risks-section-1
    title: Evidence base
    body: >-
      Risks section 1 triangulates public evidence for Hadrian against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria.
      Hadrian targets advanced manufacturing bottlenecks in U.S. aerospace and defense rather than broad consumer
      manufacturing. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Revenue, backlog, margin, utilization, and
      contract concentration are not publicly disclosed. Customer-level revenue concentration and production backlog by
      program are not public. The referenced claim set (CR001, CR002, CR003, CR004) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR001
      - CR002
      - CR003
      - CR004
      - CR005
      - CR006
      - CR007
    tableRefs:
      - TR001
      - TR005
    figureRefs:
      - FR001
  - id: risks-section-2
    title: Operating implications
    body: >-
      Risks section 2 triangulates public evidence for Hadrian against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria. The
      company announced a $260M Series C in July 2025 to build AI-powered factories, expand Arizona capacity, and add
      full-product manufacturing. The diligence read is deliberately conservative: public sources can identify the
      company, product surface, financing context, customer or partner proof, and category tailwinds, but they do not
      expose the full management data room. The retained claims in this section therefore separate observed public facts
      from estimated or inferred operating implications. For underwriting, the practical question is not whether the
      company has credible external validation; it does. The harder question is whether that validation converts into
      repeatable economics at the price implied by the latest private financing. Defense manufacturing scale-up creates
      certification, quality, export-control, safety, and working-capital risk. Gross margin and cash burn for the
      Arizona expansion are unavailable. The referenced claim set (CR008, CR009, CR010, CR011) supports the section's
      evidence boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR008
      - CR009
      - CR010
      - CR011
      - CR012
      - CR013
      - CR014
    tableRefs:
      - TR002
    figureRefs:
      - FR002
  - id: risks-section-3
    title: Risk and disconfirmation
    body: >-
      Risks section 3 triangulates public evidence for Hadrian against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria.
      Public reporting in January 2026 described Hadrian as valued at roughly $1.6B after additional capital expansion.
      The diligence read is deliberately conservative: public sources can identify the company, product surface,
      financing context, customer or partner proof, and category tailwinds, but they do not expose the full management
      data room. The retained claims in this section therefore separate observed public facts from estimated or inferred
      operating implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. The $1.6B valuation embeds significant execution credit before
      public proof of sustained factory economics. Quality certifications, yield, scrap rates, and inspection pass rates
      require management diligence. The referenced claim set (CR015, CR016, CR017, CR018) supports the section's
      evidence boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR015
      - CR016
      - CR017
      - CR018
      - CR019
      - CR020
      - CR021
    tableRefs:
      - TR003
    figureRefs:
      - FR003
  - id: risks-section-4
    title: Diligence view
    body: >-
      Risks section 4 triangulates public evidence for Hadrian against the chapter mission: Rank legal, regulatory,
      operational, technical, financial, partner, customer, and execution risks with mitigations and kill criteria.
      Lockheed Martin announced a collaboration with Hadrian in December 2025 to advance software-defined manufacturing
      for missile production capacity. The diligence read is deliberately conservative: public sources can identify the
      company, product surface, financing context, customer or partner proof, and category tailwinds, but they do not
      expose the full management data room. The retained claims in this section therefore separate observed public facts
      from estimated or inferred operating implications. For underwriting, the practical question is not whether the
      company has credible external validation; it does. The harder question is whether that validation converts into
      repeatable economics at the price implied by the latest private financing. Revenue, backlog, margin, utilization,
      and contract concentration are not publicly disclosed. Customer-level revenue concentration and production backlog
      by program are not public. The referenced claim set (CR022, CR023, CR024, CR025) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CR022
      - CR023
      - CR024
      - CR025
      - CR026
      - CR027
      - CR028
    tableRefs:
      - TR004
    figureRefs: []
