companyProfile:
  summary: >-
    Hadrian is a private industrial / automated manufacturing company. AI-enabled, software-defined factories and
    factory-as-a-service capacity for precision aerospace, defense, munitions, maritime, and mission-critical industrial
    components. The latest public financing evidence supports unicorn status, but this report keeps revenue quality,
    retention, margin, burn, backlog, and customer concentration as diligence items where they are not publicly
    disclosed.
