              sources can identify the company, product surface, financing context, customer or partner proof, and
              category tailwinds, but they do not expose the full management data room. The retained claims in this
              section therefore separate observed public facts from estimated or inferred operating implications. For
              underwriting, the practical question is not whether the company has credible external validation; it does.
              The harder question is whether that validation converts into repeatable economics at the price implied by
              the latest private financing. Defense manufacturing scale-up creates certification, quality,
              export-control, safety, and working-capital risk. Gross margin and cash burn for the Arizona expansion are
              unavailable. The referenced claim set (CO008, CO009, CO010, CO011) supports the section's evidence
              boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
