              into recommendation, confidence, risk rating, valuation stance, scenarios, and diligence asks. Lockheed
              Martin announced a collaboration with Hadrian in December 2025 to advance software-defined manufacturing
              for missile production capacity. The diligence read is deliberately conservative: public sources can
              identify the company, product surface, financing context, customer or partner proof, and category
              tailwinds, but they do not expose the full management data room. The retained claims in this section
              therefore separate observed public facts from estimated or inferred operating implications. For
              underwriting, the practical question is not whether the company has credible external validation; it does.
              The harder question is whether that validation converts into repeatable economics at the price implied by
              the latest private financing. Revenue, backlog, margin, utilization, and contract concentration are not
              publicly disclosed. Customer-level revenue concentration and production backlog by program are not public.
