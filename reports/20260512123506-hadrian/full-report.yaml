chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Evidence base
        blocks:
          - type: paragraph
            body: >-
              Company Overview section 1 triangulates public evidence for Hadrian against the chapter mission: Establish
              identity, leadership, funding, scale, and milestones that every later chapter can reuse as ground truth.
              Hadrian targets advanced manufacturing bottlenecks in U.S. aerospace and defense rather than broad
              consumer manufacturing. The diligence read is deliberately conservative: public sources can identify the
              company, product surface, financing context, customer or partner proof, and category tailwinds, but they
              do not expose the full management data room. The retained claims in this section therefore separate
              observed public facts from estimated or inferred operating implications. For underwriting, the practical
              question is not whether the company has credible external validation; it does. The harder question is
              whether that validation converts into repeatable economics at the price implied by the latest private
              financing. Revenue, backlog, margin, utilization, and contract concentration are not publicly disclosed.
              Customer-level revenue concentration and production backlog by program are not public. The referenced
              claim set (CO001, CO002, CO003, CO004) supports the section's evidence boundaries and keeps unsupported
              private metrics as explicit diligence asks rather than invented facts.
            claimRefs:
