company:
  name: Hadrian
chapter:
  number: 2
  title: Market Analysis
  summary: >-
    Market Analysis for Hadrian synthesizes public evidence on industrial / automated manufacturing, retaining
    private-metric gaps where the source base is incomplete.
sections:
  - id: market-analysis-section-1
    title: Evidence base
    body: >-
      Market Analysis section 1 triangulates public evidence for Hadrian against the chapter mission: Define the market,
      buyer, sizing, drivers, and constraints that govern adoption and valuation. Hadrian targets advanced manufacturing
      bottlenecks in U.S. aerospace and defense rather than broad consumer manufacturing. The diligence read is
      deliberately conservative: public sources can identify the company, product surface, financing context, customer
      or partner proof, and category tailwinds, but they do not expose the full management data room. The retained
      claims in this section therefore separate observed public facts from estimated or inferred operating implications.
      For underwriting, the practical question is not whether the company has credible external validation; it does. The
      harder question is whether that validation converts into repeatable economics at the price implied by the latest
      private financing. Revenue, backlog, margin, utilization, and contract concentration are not publicly disclosed.
      Customer-level revenue concentration and production backlog by program are not public. The referenced claim set
      (CM001, CM002, CM003, CM004) supports the section's evidence boundaries and keeps unsupported private metrics as
      explicit diligence asks rather than invented facts.
    claimRefs:
      - CM001
      - CM002
      - CM003
      - CM004
      - CM005
      - CM006
      - CM007
    tableRefs:
      - TM001
    figureRefs:
      - FM001
  - id: market-analysis-section-2
    title: Operating implications
    body: >-
      Market Analysis section 2 triangulates public evidence for Hadrian against the chapter mission: Define the market,
      buyer, sizing, drivers, and constraints that govern adoption and valuation. The company announced a $260M Series C
      in July 2025 to build AI-powered factories, expand Arizona capacity, and add full-product manufacturing. The
      diligence read is deliberately conservative: public sources can identify the company, product surface, financing
      context, customer or partner proof, and category tailwinds, but they do not expose the full management data room.
      The retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Defense manufacturing scale-up creates certification, quality,
      export-control, safety, and working-capital risk. Gross margin and cash burn for the Arizona expansion are
      unavailable. The referenced claim set (CM008, CM009, CM010, CM011) supports the section's evidence boundaries and
      keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CM008
      - CM009
      - CM010
      - CM011
      - CM012
      - CM013
      - CM014
    tableRefs:
      - TM002
    figureRefs:
      - FM002
  - id: market-analysis-section-3
    title: Risk and disconfirmation
    body: >-
      Market Analysis section 3 triangulates public evidence for Hadrian against the chapter mission: Define the market,
      buyer, sizing, drivers, and constraints that govern adoption and valuation. Public reporting in January 2026
      described Hadrian as valued at roughly $1.6B after additional capital expansion. The diligence read is
      deliberately conservative: public sources can identify the company, product surface, financing context, customer
      or partner proof, and category tailwinds, but they do not expose the full management data room. The retained
      claims in this section therefore separate observed public facts from estimated or inferred operating implications.
      For underwriting, the practical question is not whether the company has credible external validation; it does. The
      harder question is whether that validation converts into repeatable economics at the price implied by the latest
      private financing. The $1.6B valuation embeds significant execution credit before public proof of sustained
      factory economics. Quality certifications, yield, scrap rates, and inspection pass rates require management
      diligence. The referenced claim set (CM015, CM016, CM017, CM018) supports the section's evidence boundaries and
      keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CM015
      - CM016
      - CM017
      - CM018
      - CM019
      - CM020
      - CM021
    tableRefs:
      - TM003
    figureRefs:
      - FM003
  - id: market-analysis-section-4
    title: Diligence view
    body: >-
      Market Analysis section 4 triangulates public evidence for Hadrian against the chapter mission: Define the market,
      buyer, sizing, drivers, and constraints that govern adoption and valuation. Lockheed Martin announced a
      collaboration with Hadrian in December 2025 to advance software-defined manufacturing for missile production
      capacity. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Revenue, backlog, margin, utilization, and
      contract concentration are not publicly disclosed. Customer-level revenue concentration and production backlog by
      program are not public. The referenced claim set (CM022, CM023, CM024, CM025) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CM022
      - CM023
      - CM024
      - CM025
      - CM026
      - CM027
      - CM028
    tableRefs:
      - TM004
    figureRefs:
      - FM004
