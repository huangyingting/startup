  number: 4
  title: Financials
  summary: >-
    Financials for Hadrian synthesizes public evidence on industrial / automated manufacturing, retaining private-metric
    gaps where the source base is incomplete.
sections:
  - id: financials-section-1
    title: Evidence base
    body: >-
      Financials section 1 triangulates public evidence for Hadrian against the chapter mission: Explain revenue model,
      unit economics, capital needs, and which financial inputs are insufficient for underwriting. Hadrian targets
      advanced manufacturing bottlenecks in U.S. aerospace and defense rather than broad consumer manufacturing. The
      diligence read is deliberately conservative: public sources can identify the company, product surface, financing
      context, customer or partner proof, and category tailwinds, but they do not expose the full management data room.
      The retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. Revenue, backlog, margin, utilization, and contract concentration
      are not publicly disclosed. Customer-level revenue concentration and production backlog by program are not public.
      The referenced claim set (CI001, CI002, CI003, CI004) supports the section's evidence boundaries and keeps
      unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CI001
      - CI002
      - CI003
      - CI004
      - CI005
      - CI006
      - CI007
    tableRefs:
      - TI001
      - TI005
    figureRefs:
      - FI001
  - id: financials-section-2
    title: Operating implications
    body: >-
      Financials section 2 triangulates public evidence for Hadrian against the chapter mission: Explain revenue model,
      unit economics, capital needs, and which financial inputs are insufficient for underwriting. The company announced
      a $260M Series C in July 2025 to build AI-powered factories, expand Arizona capacity, and add full-product
      manufacturing. The diligence read is deliberately conservative: public sources can identify the company, product
      surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the full
      management data room. The retained claims in this section therefore separate observed public facts from estimated
      or inferred operating implications. For underwriting, the practical question is not whether the company has
      credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Defense manufacturing scale-up creates
      certification, quality, export-control, safety, and working-capital risk. Gross margin and cash burn for the
      Arizona expansion are unavailable. The referenced claim set (CI008, CI009, CI010, CI011) supports the section's
      evidence boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CI008
      - CI009
      - CI010
      - CI011
      - CI012
      - CI013
      - CI014
    tableRefs:
      - TI002
    figureRefs:
      - FI002
  - id: financials-section-3
    title: Risk and disconfirmation
    body: >-
      Financials section 3 triangulates public evidence for Hadrian against the chapter mission: Explain revenue model,
      unit economics, capital needs, and which financial inputs are insufficient for underwriting. Public reporting in
      January 2026 described Hadrian as valued at roughly $1.6B after additional capital expansion. The diligence read
      is deliberately conservative: public sources can identify the company, product surface, financing context,
      customer or partner proof, and category tailwinds, but they do not expose the full management data room. The
      retained claims in this section therefore separate observed public facts from estimated or inferred operating
      implications. For underwriting, the practical question is not whether the company has credible external
      validation; it does. The harder question is whether that validation converts into repeatable economics at the
      price implied by the latest private financing. The $1.6B valuation embeds significant execution credit before
      public proof of sustained factory economics. Quality certifications, yield, scrap rates, and inspection pass rates
      require management diligence. The referenced claim set (CI015, CI016, CI017, CI018) supports the section's
      evidence boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CI015
      - CI016
      - CI017
      - CI018
      - CI019
      - CI020
      - CI021
    tableRefs:
      - TI003
    figureRefs:
      - FI003
  - id: financials-section-4
    title: Diligence view
    body: >-
      Financials section 4 triangulates public evidence for Hadrian against the chapter mission: Explain revenue model,
      unit economics, capital needs, and which financial inputs are insufficient for underwriting. Lockheed Martin
      announced a collaboration with Hadrian in December 2025 to advance software-defined manufacturing for missile
      production capacity. The diligence read is deliberately conservative: public sources can identify the company,
      product surface, financing context, customer or partner proof, and category tailwinds, but they do not expose the
      full management data room. The retained claims in this section therefore separate observed public facts from
      estimated or inferred operating implications. For underwriting, the practical question is not whether the company
      has credible external validation; it does. The harder question is whether that validation converts into repeatable
      economics at the price implied by the latest private financing. Revenue, backlog, margin, utilization, and
      contract concentration are not publicly disclosed. Customer-level revenue concentration and production backlog by
      program are not public. The referenced claim set (CI022, CI023, CI024, CI025) supports the section's evidence
      boundaries and keeps unsupported private metrics as explicit diligence asks rather than invented facts.
    claimRefs:
      - CI022
      - CI023
      - CI024
      - CI025
      - CI026
      - CI027
      - CI028
    tableRefs:
      - TI004
    figureRefs:
      - FI004
