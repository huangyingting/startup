figures:
  - id: FU001
    title: Customer journey map
    type: journey-map
    layout: wide
    summary: >
      End-to-end journey of a large self-insured employer from initial problem awareness through Transcarent contract
      execution, member onboarding, active utilization, and renewal or expansion. Five distinct personas participate at
      different stages: HR/benefits director (buyer), broker/consultant (intermediary), employee/member (user), plan
      administrator (operator), and Health Guide/Care Advocate (service delivery). Key inflection points are the broker
      endorsement (critical for new business acquisition), member app adoption rate (critical for utilization metrics
      and employer ROI), and the annual renewal window (critical for retention and expansion). Typical enterprise sales
      cycle is 3–9 months; onboarding is 60–90 days; renewal discussions begin 90 days before contract expiration.
    approximationNotes: >-
      Journey stages inferred from public product descriptions, CEO interview statements in Fierce Healthcare, the West
      Coast Health Plan case study, and standard enterprise health benefits procurement norms. Specific conversion rates
      between stages are not publicly disclosed by Transcarent.
    data:
      nodes:
        - id: awareness
          label: Problem Awareness
          detail: >-
            HR/Benefits director identifies rising healthcare costs (8–18% annual inflation per consultant benchmarks),
            low employee engagement with benefits, or specific high-cost claim categories (surgery, specialty pharmacy,
            cancer). Often triggered by broker annual benchmarking report or CFO cost-review mandate.
        - id: discovery
          label: Discovery and Evaluation
          detail: >-
            Broker/consultant introduces Transcarent during annual benefits strategy planning. Employer issues RFP to
            2–4 vendors including Transcarent, Quantum Health, Included Health, and others. Transcarent provides demo,
            ROI modeling, and reference case studies. Sales cycle: 3–9 months.
        - id: selection
          label: Contracting and Selection
          detail: >-
            Multi-year contract (typically 2–3 years) negotiated. PEPM and/or case-rate pricing finalized. Legal and
            compliance review completed. HR secures budget approval. Module selection determined: WayFinding only,
            Surgery COE add-on, or full-suite including pharmacy and advocacy.
        - id: onboarding
          label: Onboarding and Launch
          detail: >-
            Employee communication campaign launched; app download drive executed; benefits data integrated with
            existing carrier. Health Guide team assigned. Open enrollment integration completed. Target: >20% app
            registration in first 60 days for WayFinding engagement baseline.
        - id: utilization
          label: Active Utilization
          detail: >-
            Members use WayFinding for benefit navigation and care routing. Virtual care accessed via 98point6-powered
            platform. Surgery COE used for elective procedures. Pharmacy benefit managed through platform. Accolade
            advocacy engaged for complex cases. Members with cancer, weight health, or MSK needs routed to specialty
            programs.
        - id: renewal
          label: Renewal and Expansion
          detail: >-
            Annual account review: savings documentation, ROI presentation, NPS reporting. Cross-sell of additional
            modules (Cancer Care, Weight Health, pharmacy, Accolade advocacy). Multi-year renewal negotiation. Broker
            validates ROI with employer and recommends renewal or competitive re-bid. Successful land-and-expand drives
            NRR above 100%.
    claimRefs:
      - CU004
      - CU019
      - CU020
      - CU033
      - CU036
  - id: FU002
    title: Adoption / deployment funnel
    type: funnel
    layout: standard
    summary: >
      Employer acquisition and member deployment funnel from initial prospect universe through contracted clients and
      active member utilizers. Two critical conversion bottlenecks are identified: converting broker-endorsed prospects
      into signed employer contracts (highly competitive RFP market with Quantum Health, Included Health, Accolade
      legacy, and others), and converting enrolled members into active platform utilizers (engagement challenge common
      to all digital health platforms). The post-merger client count of 1,700+ represents a substantial contracted base,
      but active member utilization rates relative to eligible headcount of 20M+ are not publicly disclosed and
      represent a key diligence data gap.
