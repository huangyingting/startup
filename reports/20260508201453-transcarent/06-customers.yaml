  - id: SU-gtm
    title: Go-to-Market Strategy and Distribution Channels
    body: |
      Transcarent's go-to-market model combines three primary channels: direct employer sales, broker/consultant
      intermediaries, and health plan partnerships. Direct enterprise sales targets HR and benefits decision-makers
      at large self-insured employers through a dedicated field sales team. The broker/consultant channel is critical
      at scale: the majority of large employer health benefit decisions are intermediated by national and regional
      benefits consultants (Mercer, Aon, Willis Towers Watson, Gallagher, NFP), who evaluate, recommend, and co-sell
      solutions to plan sponsors. Being endorsed by top-tier consultants is a key commercial determinant, and
      Transcarent's ability to capture consultant-channel placements has driven much of its organic pre-merger growth.

      Health plan partnerships represent a third channel, where Transcarent integrates navigation or COE services
      on top of a carrier's existing network. Regional Blue Cross Blue Shield plans and other insurers have explored
      bundled arrangements. This channel provides distribution leverage but can create channel conflict with direct
      sales and may compress pricing power. The CareJourney partnership enables data-driven identification of
      high-value providers, strengthening the analytics proposition for employer clients during evaluation.

      The commercial motion is RFP-driven with multi-year contract terms (typically 2–3 years). Employer clients
      sign a master services agreement covering selected modules, with PEPM-based pricing for navigation and
      case-rate pricing for surgical programs. Performance-based components tied to measurable savings or
      utilization metrics are a stated differentiator from legacy navigation vendors. Post-merger, Transcarent
      integrates Accolade's established broker relationships and direct-to-consumer channels into its go-to-market
      motion, creating a broader distribution platform but also a commercial integration execution challenge.
    claimRefs:
      - CU020
      - CU021
      - CU026
      - CU033
