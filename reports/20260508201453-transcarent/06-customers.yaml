          Majority of enterprise health deals flow through a handful of national brokers; loss of preferred-panel status
          with Mercer, Aon, or WTW could materially slow new business
        - 'Negative: channel concentration amplifies sales volatility; no public data on broker recommendation share'
        - Request distribution of new ACV by channel; % sourced from top-3 benefits consultants by volume
