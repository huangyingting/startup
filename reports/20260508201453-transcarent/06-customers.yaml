    - id: EGU001
      gapType: private-evidence-only
      description: >-
        Net revenue retention (NRR), gross revenue retention (GRR), and cohort-level employer churn rates for both
        Transcarent standalone and the post-merger combined entity are not publicly disclosed. These are the
        highest-priority diligence metrics for a subscription-based employer health platform.
      relatedQuestionRefs:
        - QU023
        - QU025
      severity: high
      topic: NRR and GRR retention metrics not publicly disclosed
    - id: EGU002
      gapType: missing-source
      description: >-
        Customer revenue concentration data is unavailable from public sources. It is unknown what percentage of
        combined ARR comes from the top 5 or top 10 employer clients. The Comcast precedent (10% of Accolade revenue)
        establishes that concentration risk is real and has materialized historically.
      relatedQuestionRefs:
        - QU026
      severity: high
      topic: Customer concentration data unavailable
    - id: EGU003
      gapType: private-evidence-only
      description: >-
        Named employer client evidence is limited to fewer than 5 publicly identified accounts out of 1,700+ total
        clients. The vast majority of employer client identities are confidential under contract terms, preventing
        independent verification of deployment quality, use case breadth, or renewal patterns.
      relatedQuestionRefs:
        - QU024
      severity: medium
      topic: Named client list confidential — TU003 coverage is partial sample only
      relatedTableRefs:
        - TU003
    - id: EGU004
      gapType: missing-source
      description: >-
        No evidence was found of current ongoing customer complaints, legal disputes, or regulatory enforcement actions
        filed by employer clients against Transcarent or Accolade post-merger. This absence of evidence is not evidence
        of absence; the gap should be addressed via legal due diligence, insurance disclosure requests, and direct
        customer reference checks.
      relatedQuestionRefs:
        - QU027
      severity: medium
      topic: No material legal disputes identified in public record
    - id: EGU005
      gapType: private-evidence-only
      description: >-
        Post-merger employer attrition and integration impact data are not yet publicly available. The April 2025 merger
        close creates a 12–24 month window of heightened attrition risk as Accolade legacy clients evaluate the combined
        platform at renewal. No disclosure of renewal rates, at-risk ARR, or churn events in the post-merger period has
        been made.
      relatedQuestionRefs:
        - QU023
        - QU025
      severity: high
      topic: Post-merger employer attrition data not yet available
    - id: EGU006
      gapType: conflicting-data
      description: >-
        Accolade's Comparably NPS of -34 and the Transcarent Surgery Care case study NPS of 83+ cannot be reconciled
