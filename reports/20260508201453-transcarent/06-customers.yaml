          Negative: if Accolade advocacy is commoditized in a post-merger bundled product, pricing power may diminish
          over time
        - >-
          Request competitive win/loss data for Accolade advocacy vs. bundled navigation platforms (Quantum Health,
          Included Health)
    notes: >-
      Expansion drivers are based on product architecture and stated strategy; actual expansion rates per account are
      not publicly disclosed. Concentration risks reflect publicly observable signals (Comcast loss) and structural
      logic; actual revenue concentration data is unavailable without access to company financials.
