  - id: SU-risks
    title: Customer Risks and Adverse Signals
    body: |
      The most documented adverse customer signal is the 2022 Comcast departure from Accolade. Comcast, described
      in an Accolade filing as its largest customer of 12 years and representing less than 10% of revenue, ended
      its relationship citing management changes and aggressive renegotiation demands that Accolade declined to
      meet. The announcement caused a 50.2% single-day stock decline — the largest since Accolade's 2020 IPO.
      A Stifel analyst noted that "demand for standalone navigation/advocacy offerings have moderated" among
      some consultants, suggesting potential structural headwinds for the advocacy product line Transcarent
      inherited from Accolade.

      Additional risk signals: (1) limited public disclosure of named employer clients makes independent
      verification of deployment quality and renewal status impossible; (2) Accolade's Comparably NPS of -34
      suggests meaningful dissatisfaction with the advocacy product line among the measured audience;
      (3) customer revenue concentration — the degree to which the top 5–10 employers represent disproportionate
      ARR is unknown; (4) integration risk — during the Accolade merger, service disruption or product gaps
      could trigger attrition at contract renewal windows in the 24 months post-close; and (5) rising healthcare
      cost inflation (8–18% annually per consultant benchmarks cited by CEO Tullman) creates vendor-switching
      urgency for employers actively reviewing benefits, which cuts both ways for Transcarent.
    claimRefs:
      - CU015
      - CU016
      - CU018
      - CU029
