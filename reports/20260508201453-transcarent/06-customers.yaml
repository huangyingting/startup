chapter:
  number: 6
  title: Customers and Go-to-Market
  summary: >
    Post-merger Transcarent serves 20M+ members across 1,700+ employer and health plan clients as of April 2025, up from
    ~300 employer clients pre-merger. The company targets large self-insured employers (1,000+ employees) through direct
    sales and broker/consultant channels. A West Coast public-sector health plan case study — reviewed by Oregon OHA —
    documents a 20.5x ROI, $11M in cumulative surgery savings, and member NPS of 83+ from Surgery Care. Adverse signals
    include the 2022 Comcast departure from Accolade (~10% of its revenue), a Comparably NPS of -34 for Accolade, and
    limited public disclosure of named employer clients or post-merger retention metrics. Customer concentration, NRR,
    and churn data remain undisclosed — critical gaps for diligence.
sections:
  - id: SU-icp
    title: Customer Profile and Ideal Customer Profile
    body: |
      Transcarent's core customer is the self-insured employer — a company that funds its own employee health benefit
      plan rather than purchasing fully insured coverage from a commercial carrier. Transcarent explicitly targets
      organizations with 1,000 or more employees, where the complexity and cost of managing a self-funded health plan
      creates substantial demand for navigation, cost-containment, and care coordination services. These employers —
      predominantly mid-market to large enterprise (1,000–100,000+ employees) — span manufacturing, technology,
      healthcare, financial services, retail, and public sector (education, municipal government). HR and benefits
      decision-makers are the primary buyer personas: benefits directors, VPs of HR, and total rewards leaders who
      control plan design, vendor selection, and annual renewal decisions.

      Beyond direct employers, Transcarent's addressable customer base extends to health plans and union trust funds
      that serve self-insured populations, as well as professional employer organizations (PEOs) that aggregate
      benefits purchasing for smaller companies. Geographically, the focus is national (U.S.) given the
      employer-sponsored insurance structure of American healthcare. The platform is priced on a per-employee-
      per-month (PEPM) model for navigation services (~$5 PEPM for WayFinding) and on bundled case-rate pricing
      for procedure-specific programs like Surgery COE.

      The value proposition presented to buyer personas combines cost reduction (documented ROI from directing
      members to high-value care settings), employee satisfaction (NPS 83+ from a publicly reviewed case study),
      and administrative simplification (one platform, one contract replacing multiple point solutions). Buyers
      evaluate Transcarent through broker/consultant relationships, peer references, and competitive RFP processes
      with typical sales cycles of three to nine months.
