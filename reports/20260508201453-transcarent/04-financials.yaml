  - id: S-I-revenue
    title: Revenue and Scale Metrics
    body: |
      Transcarent's standalone revenue is not publicly disclosed. As a private company, it has
      no obligation to report financial results, and management has consistently declined to
      provide revenue figures. Third-party estimates from data aggregators (Growjo, CBInsights)
      suggest a 2024 annual revenue range of $70–100 million, but these are extrapolations with
      low evidential quality. The most actionable adverse data point comes from a February 2025
      MedCity News analysis citing internal information: the company allegedly signed approximately
      $55–60 million in new business in 2024 against an internal target of $175 million, a
      significant shortfall that suggests either aggressive goal-setting or genuine commercial
      execution challenges in the standalone business.

      For the combined entity, the Accolade revenue baseline is concrete: $414.3 million in
      FY2024 (fiscal year ending February 2024), growing from $132.5 million in FY2020 through
      consistent double-digit expansion. Accolade's Q3 FY2025 revenue was approximately
      $105 million; consensus projected approximately $465 million for the full FY2025 before
      the April 2025 acquisition completed. Transcarent has guided combined 2025 revenue above
      $500 million, which is directionally consistent with Accolade's run rate plus any Transcarent
      contribution. The combined entity serves over 20 million members and 1,700+ employer and
      health plan clients following merger close on April 8, 2025.

      Accolade's revenue history demonstrates steady growth through the employer health market cycle:
      $132.5 million (FY2020), $170.4 million (FY2021), $310.0 million (FY2022), $363.1 million
      (FY2023), and $414.3 million (FY2024). The FY2022 jump of approximately 82% year-over-year
      reflects both organic growth and acquisition-driven revenue. Transcarent's revenue contribution
      from the 98point6 acquisition (completed March 2023 for approximately $100 million) is not
      separately disclosed, but the deal added AI-driven virtual care technology and approximately
      one million physician-patient text interaction records rather than significant revenue scale.
