  - id: S-I-accolade
    title: Accolade Acquisition Economics
    body: |
      The April 8, 2025 acquisition of Accolade (NASDAQ: ACCD) for $621 million ($7.03 per share)
      is the most financially significant event in Transcarent's history and provides the primary
      quantitative financial anchor for this analysis, given the company's otherwise private status.

      Accolade's FY2024 financials (year ending February 29, 2024) are the last full-year audited
      figures available. Revenue was $414.3 million (+14% YoY from $363.1 million in FY2023).
      GAAP gross profit was $158.8 million (38.3% gross margin), while adjusted gross margin
      excluding stock-based compensation and amortization reached 47.6%. GAAP net loss was $99.8
      million, a significant improvement from FY2023's $459.7 million loss (the latter inflated by
      a $299.7 million non-cash goodwill impairment). Adjusted EBITDA was -$7.5 million for FY2024,
      approaching breakeven from -$36.5 million in FY2023.

      Accolade's stock had peaked at approximately $75 per share in early 2021 before declining
      to approximately $3.30 per share in late 2024, a decline exceeding 95%. Contributing factors
      include the loss of Comcast as a major customer in 2022–2023, slowing revenue growth, and
      persistent losses despite the company's scale. Accolade's FY2025 guidance called for revenue
      approaching $500 million with full-year positive adjusted EBITDA — a guidance that was
      partially validated by Q3 FY2025 revenue of approximately $105 million before the acquisition
      completed. The $7.03 per share acquisition price represented a substantial discount to the
      2021 peak but a meaningful premium to late-2024 trading levels. Halper Sadeh LLC launched
      a shareholder investigation in February 2025 alleging potential breach of fiduciary duty by
      Accolade's board in accepting the consideration, adding tail risk to the transaction.
