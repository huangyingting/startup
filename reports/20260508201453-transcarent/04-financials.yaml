  - id: S-I-economics
    title: Unit Economics and Business Model Revenue Drivers
    body: |
      Transcarent generates revenue through at least four distinct streams, though pricing and
      margin data are largely undisclosed or estimated. The primary revenue mechanism for the
      WayFinding AI navigation platform is a per-employee-per-month (PEPM) subscription charged
      to self-insured employer clients. Transcarent has disclosed an approximate list price of
      approximately $5 per employee per month for WayFinding access, which compares to traditional
      navigation vendors pricing at $10–$15 PMPM. This positions WayFinding as a lower-cost
      alternative that can be layered onto existing benefit structures. Industry-standard care
      navigation PMPM/PEPM pricing ranges from $2 to $8 per member per month, with realized
      pricing often below list due to volume discounts and negotiation.

      Surgery Centers of Excellence (inherited from BridgeHealth) use a bundled case-rate model:
      employers contract for specific surgical procedures at pre-negotiated all-inclusive rates
      with selected high-quality providers, with Transcarent earning an administrative fee or
      case management margin on each episode. This model generates meaningful per-episode revenue
      for high-cost procedures (joint replacements, cardiac surgery, bariatric surgery) where
      employer savings can be substantial. Virtual primary care capabilities (via 98point6
      integration) and pharmacy navigation are either bundled into the PEPM or offered as add-on
      services.

      Using Accolade's public financials as the most concrete reference: GAAP gross margin was
      38.3% in FY2024 (47.6% adjusted), with cost of revenue at $221.6 million on $414.3 million
      revenue. Operating expenses were $306.3 million in FY2024, down from $320.8 million in
      FY2023, suggesting cost discipline as revenue scaled. Revenue per employee was approximately
      $150,000–$186,000, in line with digital health industry benchmarks. For the combined entity,
      achieving positive EBITDA at scale will depend on driving Accolade's adjusted gross margin
      above 50% while integrating Transcarent's AI navigation to reduce care team labor intensity.
      At $5 PEPM, a population of 10 million employees would imply $600 million in annualized
      PEPM revenue alone, but actual book-of-business PEPM realization and member penetration
      rates are not disclosed.
