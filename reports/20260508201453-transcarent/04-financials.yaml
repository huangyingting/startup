chapter:
  number: 4
  title: Financial Analysis
  summary: >
    Transcarent is a private company with approximately $450 million in total venture equity raised across four rounds
    (2020–2024) at a $2.2 billion Series D valuation. Its April 2025 acquisition of Accolade for $621 million added the
    only available public financial baseline: Accolade's FY2024 revenue of $414.3 million (14% YoY growth), GAAP gross
    margin of 38.3%, and adjusted EBITDA of -$7.5 million approaching breakeven. Transcarent's standalone revenue
    remains undisclosed; a February 2025 MedCity News report citing internal data alleged only $55–60 million in new
    business signed in 2024 against a $175 million target, a material miss that constitutes the primary adverse signal.
    Combined 2025 revenue is company-guided above $500 million. Key diligence blockers are standalone financials, burn
    rate, NRR, and CAC/payback metrics.
sections:
  - id: S-I-funding
    title: Funding History and Capital Structure
    body: |
      Transcarent has raised approximately $450 million in primary equity across four venture rounds
      spanning 2020 to 2024. The company's capital formation began in October 2020 with a $40 million
      Series A that simultaneously merged with BridgeHealth, a surgical Centers of Excellence platform,
      giving Transcarent immediate surgical benefit management capability and a member base. General
      Catalyst and 7wireVentures co-led the round alongside Alta Partners.

      In June 2021, Transcarent closed a $58 million Series B led by General Catalyst and 7wireVentures,
      with participation from Merck Global Health Innovation Fund, Kleiner Perkins, Leaps by Bayer,
      GreatPoint Ventures, and Threshold Ventures. January 2022 brought the $200 million Series C,
      led by Kinnevik and Human Capital, with strategic health system investors (Northwell Health,
      Intermountain Healthcare, Rush University Medical Center) participating alongside existing
      investors. This round valued the company at $1.62 billion, granting unicorn status.

      The most recent Series D of $126 million, closed in May 2024 and led by General Catalyst
      and 7wireVentures with new investors Geodesic Capital and Memorial Hermann Health System,
      valued Transcarent at $2.2 billion. The round was described by the company as pre-emptive,
      with investors approaching management. Total equity raised reached approximately $450 million.
      Beyond primary equity, Transcarent deployed approximately $100 million to acquire 98point6
      (March 2023) and $621 million to acquire Accolade (April 2025), the latter financed by
      General Catalyst and CEO Glen Tullman's 62 Ventures — not from existing cash balances.
      No public debt or project finance obligations have been disclosed. The historical funding
      chronology is cross-referenced from the Company Overview chapter (Chapter 1).
