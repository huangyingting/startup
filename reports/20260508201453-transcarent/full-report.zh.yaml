        - 虚拟医疗 / 远程医疗
        - '$2.57B 收入（2024）；NYSE: TDOC；FY2024 净亏损 $1B'
        - 全球雇主、健康计划、医疗系统
        - 最大远程医疗网络；美国 94M 成员；Integrated Care B2B 2024 年增长 4%
        - BetterHelp 分部下滑；巨额商誉减值；不是导航优先平台
      - - Hinge Health (HNGE)
