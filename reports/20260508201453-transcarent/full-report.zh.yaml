      - number: '6.3'
        title: Go-to-Market 策略与分销渠道
        blocks:
          - type: paragraph
            body: >
              Transcarent 的 go-to-market 模式结合三条主要渠道：直接雇主销售、经纪人 / 顾问中介，以及健康计划合作伙伴。 直接企业销售通过专门外勤销售团队，瞄准大型自保雇主中的 HR
              和福利决策者。经纪人 / 顾问渠道在规模化时至关重要： 大多数大型雇主健康福利决策，都由全国性和区域性福利顾问（Mercer、Aon、Willis Towers
              Watson、Gallagher、NFP）居中撮合； 他们评估、推荐并共同向计划发起方销售解决方案。获得顶级顾问背书是关键商业决定因素；Transcarent 捕获顾问渠道席位的能力，
              推动了合并前有机增长的很大一部分。


              健康计划合作伙伴是第三条渠道；Transcarent 在承保方既有网络之上集成导航或 COE 服务。 区域性 Blue Cross Blue Shield
              计划和其他保险公司已经探索捆绑安排。该渠道提供分销杠杆，但可能与直销产生渠道冲突， 并压缩定价权。CareJourney 合作伙伴关系支持用数据识别高价值服务方，从而在雇主客户评估阶段强化分析价值主张。


              商业动作由 RFP 驱动，合同通常为多年期（一般 2–3 年）。雇主客户签署主服务协议，覆盖所选模块；导航按 PEPM 定价，
              手术项目按病例费率定价。与可衡量节省或利用率指标挂钩的绩效成分，是公司相对传统导航供应商宣称的差异点。 合并后，Transcarent 把 Accolade 已建立的经纪人关系和直接面向消费者渠道纳入
              go-to-market 动作， 形成更广分销平台，也带来商业整合执行挑战。
