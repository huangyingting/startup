      - number: '4.2'
        title: Accolade 收购的经济账
        blocks:
          - type: paragraph
            body: |
              2025 年 4 月 8 日，Transcarent 以 $621 million（每股 $7.03）收购 Accolade（NASDAQ: ACCD）。
              这是 Transcarent 历史上财务影响最大的事件；公司本身仍是非上市公司，公开财务数据有限，因此这笔交易也为本分析提供了主要量化锚点。

              Accolade 的 FY2024 财务数据（截至 2024 年 2 月 29 日的财年）是目前可用的最后一个完整年度审计数字。
              收入为 $414.3 million，较 FY2023 的 $363.1 million 同比增长 14%。GAAP 毛利润为
              $158.8 million（毛利率 38.3%）；剔除股权激励和摊销后的调整后毛利率达到 47.6%。
              GAAP 净亏损为 $99.8 million，相比 FY2023 的 $459.7 million 亏损明显收窄；后者受到
              $299.7 million 非现金商誉减值的放大。FY2024 调整后 EBITDA 为 -$7.5 million，已从
              FY2023 的 -$36.5 million 接近盈亏平衡。

              Accolade 股价曾在 2021 年初达到约每股 $75，随后在 2024 年末跌至约每股 $3.30，跌幅超过 95%。
              造成下跌的因素包括 2022–2023 年失去 Comcast 这一大客户、收入增速放缓，以及公司已有规模却持续亏损。
              Accolade 的 FY2025 指引是收入接近 $500 million、全年调整后 EBITDA 转正；收购完成前，其
              Q3 FY2025 约 $105 million 的收入部分验证了这一指引。每股 $7.03 的收购价较 2021 年峰值大幅折价，
              但相较 2024 年末交易水平仍有可观溢价。Halper Sadeh LLC 于 2025 年 2 月发起股东调查，
              指称 Accolade 董事会接受该对价可能违反受托责任，为交易增加尾部风险。
