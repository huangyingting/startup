  - id: TU005
    title: 扩张与集中度风险表
    columns:
      - 扩张驱动因素 / 集中风险
      - 描述
      - 影响
      - 尽调路径
    rows:
      - - 先落地再扩张：模块交叉销售
        - 部署 WayFinding 或 Surgery COE 的雇主，可逐步扩展到 Cancer Care、Weight Health、药品福利、Accolade 倡导和专家医疗意见
        - 正向：单账户 PEPM 抬升；若模块附加率强，可推动 NRR 超过 100%
        - 要求提供各队列模块采用率；初始合同后 12 个月和 24 个月内扩张的账户占比
      - - Experience Store 点解决方案增购
        - 雇主可配置整合市场，持续加入心理健康、MSK、糖尿病、生育和肾病等点解决方案
        - 正向：提高平台粘性和单账户 ACV；减少会员端碎片化
        - 要求提供平均每家雇主部署的活跃点解决方案数量；附加采购率趋势
      - - 合并后客户整合风险
        - Accolade 存量客户可能在续约时拿合并平台与替代方案比较；整合扰动或产品缺口可能在交割后 24 个月窗口触发流失
        - 负向：约 1,200 家 Accolade 客户在合并后第 1–3 年有续约风险
        - 要求提供合并后第 1、2 年续约排期和风险 ARR；识别早期流失信号
      - - 大客户收入集中（Comcast 式风险）
        - 占合并 ARR >5% 的单一大型雇主客户会造成集中流失风险；Comcast 流失时约占 Accolade 收入 10%
        - 负向：失去一两家大型雇主可能显著影响收入轨迹
        - 要求提供前 10 大雇主客户占合并 ARR 的比例；确认没有单一客户超过 5%
      - - 经纪商 / 顾问渠道依赖
        - 大多数企业健康福利交易流经少数全国性经纪商；若失去 Mercer、Aon 或 WTW 优选名单地位，可能显著拖慢新业务
        - 负向：渠道集中放大销售波动；经纪商推荐份额无公开数据
        - 要求按渠道拆分新增 ACV；按量计，来自前三大福利顾问的占比
      - - 健康计划合作渠道冲突
        - 健康计划分销会与直接面向雇主销售形成渠道冲突；若两条渠道追逐同一账户，可能出现价格压缩或客户困惑
        - 混合：分销更广，但带来毛利率和定价权风险
        - 厘清渠道协作规则；要求拆分健康计划渠道与直接雇主渠道收入
      - - 独立倡导需求结构性降温
        - 行业分析师在 2022 年指出，独立导航 / 倡导需求已降温；打包平台正在拿份额
        - 负向：若 Accolade 倡导在合并后打包产品中被商品化，定价权可能随时间下降
        - 要求提供 Accolade 倡导对阵打包导航平台（Quantum Health、Included Health）的竞争胜负数据
    notes: 扩张驱动因素基于产品架构和已表述战略；单账户实际扩张率未公开披露。集中度风险反映公开可见信号（Comcast 流失）和结构性逻辑；没有公司财务访问权，就无法取得实际收入集中度数据。
