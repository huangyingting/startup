            body: >
              一批资金充足的病种型和平台相邻竞争者正在争夺雇主健康预算和会员参与度。Teladoc Health（NYSE: TDOC）是最大虚拟护理服务方， 2024 年收入 $2.57 billion，但其
              BetterHelp DTC 心理健康业务在 2024 年下滑 8%，导致 $790M 商誉减值和 $1.0 billion 净亏损。其 Integrated Care（B2B 雇主）业务 2024 年增长
              4%，并通过雇主和健康计划渠道覆盖约 94 million 美国会员。Hinge Health（NYSE: HNGE，2025 年 5 月 22 日 IPO）是雇主数字 MSK 护理的明确领导者， IPO
              前私人估值 $6.5 billion，拥有 2,350+ 家雇主客户（包括 Fortune 100 的 49%），客户留存率 98%。Spring Health 于 2024 年 7 月以 $3.3
              billion 估值完成 $100M Series E，通过 450+ 家直接签约雇主覆盖 10M+ 人群， 具名客户包括 Microsoft、Target、J.P. Morgan Chase 和
              Delta；一项 JAMA Network Open 研究记录了 1.9x ROI。 Lyra Health 最近披露估值为 $5.6 billion（2022 年 1 月），服务 300+ 家雇主组织、覆盖
              20M+ 人群；Aon 四年研究发现健康计划成本每年持续下降 26%。Garner Health 于 2026 年初以 $1.35 billion 估值完成 $118M Series D，使用来自 60+
              billion 份医疗记录和 700+ 项医生指标的理赔数据，估计第一年为雇主降低成本 12%。Rightway Health 于 2024 年 3 月完成 $109M Series D， 将护理导航与透明
              PBM 整合，并把 100% 回扣传递给雇主；Tyson Foods 在 2024 年选择 Rightway 而不是 CVS Caremark。 Collective Health 为自保大型雇主提供整合 TPA
              管理平台，声称可在五年内将医疗成本趋势最高削减 50%，并于 2025 年与 Providence Health Plan 合作。 这些相邻竞争者合起来构成资本充足、临床验证充分的替代方案，争夺与
              Transcarent 相同的雇主福利预算。
