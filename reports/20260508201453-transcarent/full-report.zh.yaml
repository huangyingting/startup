        - 科技赋能的价值医疗；聚焦雇主和支付方
        - 聚焦 Medicare Advantage；收入基数大；支付方组合不同
      - - Hinge Health (HNGE)
        - 上市公司 — 雇主数字健康（2025 年 5 月 IPO）
        - $390M FY2024 收入；$588M LTM
        - $3.86B 企业价值（2026 年 5 月）
        - 5.98x EV/Sales 倍数
        - 聚焦雇主的数字健康；B2B 销售；毛利率高（77%）
        - 仅肌肉骨骼；已盈利（FCF 为正）；溢价倍数反映盈利能力
      - - Spring Health
        - 私营公司 — 心理健康福利
        - $200M–$300M 估计收入（2024）
        - $3.3B 估值（Series E，2024 年 7 月）
        - 11x–16x 估计
        - 雇主心理健康导航；高增长私营数字健康
        - 只有收入估计；心理健康细分；比收购 Accolade 后的 Transcarent 阶段更早
      - - Quantum Health（先例交易）
        - 并购 — 健康导航（Roper Technologies，2021 年）
        - 收购时估计约 $500M 收入
        - $1.7B 收购价
        - ~3.4x
        - 最接近的纯导航可比交易；同一雇主市场细分
        - 2021 年交易；市场环境不同；Roper 作为战略买家支付溢价
      - - Accolade（先例交易，私有化）
        - 并购 — 雇主健康导航（Transcarent，2025 年 4 月）
        - 收购时 $447M LTM 收入
        - $621M 收购价
