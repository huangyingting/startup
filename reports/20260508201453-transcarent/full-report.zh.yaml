  - number: 8
    title: 估值
    sections:
      - number: '8.1'
        title: 估值框架与方法
        blocks:
          - type: paragraph
            body: >-
              给 Transcarent 估值需要在三种方法之间交叉校准；鉴于公司仍是私有公司且并购后结构复杂，每种方法都有局限。第一，收入倍数分析把公司企业价值与可比上市和私营公司按 EV/Revenue
              对标，这是高增长、未盈利数字健康公司最常用的指标。Transcarent 最近一次披露估值（2024 年 5 月 $2.2B）可分别对照其独立报告收入约 $85M（FY2024，Latka 估计）和并入
              Accolade 后约 $550M 的合并收入。按独立口径，隐含 EV/Revenue 约 26x——远高于承压上市市场（Teladoc 0.6x），但接近私营高增长同业（Spring Health
              11–16x）。按合并收入，约 4x 的隐含倍数落在规模化雇主健康平台的可比区间内。第二，先例交易分析参考已完成并购（Quantum Health 以 $1.7B、约 3.4x 收入被收购；Accolade 以
              $621M、约 1.4x LTM 收入被收购）。第三，折现现金流（DCF）框架以 12–15% 的加权平均资本成本（WACC）锚定一家私营、EBITDA
              为负的数字健康公司，但在缺少经审计财务数据时用处有限。证据汇合后支持 $1.6B–$4.4B 的估值区间，取决于情景；若整合目标达成，基准情景中心落在 $2.2B–$2.75B。
