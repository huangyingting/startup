  - id: FV001
    title: 推荐逻辑
    type: flow
    layout: standard
    summary: >-
      该链条从四个评估支柱——规模与证据、AI 差异化、风险画像和估值纪律——经过证据缺口节点，走向最终建议「继续研究 / 观察」。规模和 AI
      是正向输入；风险和证据缺口形成约束，使其无法成为高确信买入。该流程显示，没有任何单一支柱单独决定建议；执行风险、财务不透明和独立估值偏高合在一起，压过了规模和管理层履历的优势。
    approximationNotes: 该流程表示定性逻辑关系，不是量化概率权重。节点标签是基于截至 2026 年 5 月公开证据的编辑判断。
    data:
      nodes:
        - id: scale
          label: 优势：规模——20M+ 成员、1,700+ 客户、$550M 合并收入
          type: input
        - id: ai
          label: 优势：AI——WayFinding 生成式 AI；风险共担模式；98point6 技术
          type: input
        - id: risk
          label: 约束：执行风险——整合复杂；EBITDA 为负；没有经审计财务
          type: process
        - id: valuation
          label: 约束：估值——独立口径 26x 昂贵；合并口径 5x 取决于整合
          type: process
        - id: gap
          label: 证据缺口：没有经审计 FY2025 财务；合并后流失未知；没有临床验证
          type: process
        - id: rec
          label: 建议：继续研究 / 观察——基于经审计财务 + 2025 年上半年 KPI 重新评估
          type: output
    claimRefs:
      - CV001
      - CV021
      - CV022
      - CV030
      - CV041
  - id: FV002
    title: 估值敏感性
    type: bar
    layout: wide
    summary: >-
      该柱状图展示在五种收入倍数情景下，Transcarent 基于 Accolade 合并后估计收入基础 $550M 得出的隐含企业价值。按上市数字健康公司约 1x 收入的中位数倍数，隐含 EV（$550M）远低于当前 $2.2B
      私募市场估值——说明相对承压的上市同业，Transcarent 因增长、规模和 AI 差异化享有显著溢价。当前 Series D 价格（$2.2B）对应合并收入约 4x，与 Hinge Health 上市市场交易（约 6x）和
      Quantum Health 先例交易（约 3.4x）相互支撑。乐观情景 8x 代表 AI 赋能溢价，锚定私有同业 Spring Health 和 Lyra Health。
    approximationNotes: >-
      合并收入 $550M 是管理层估计（DealRoom，2025 年 4 月）。倍数情景是从上市可比公司和先例交易得出的说明性基准，不是正式 DCF 或投行级估值。当前 EV $2.2B 反映 Series D 投后估值；考虑到
      Accolade 收购支付了 $621M 现金并发行额外股权，实际企业价值可能更高。
    data:
      items:
        - label: 1x（上市板块中位数——承压）
          value: 550
        - label: 2x（Accolade 式低价出售区间）
          value: 1100
        - label: 4x（基准情景——当前 Series D 隐含）
          value: 2200
        - label: 6x（Hinge Health IPO 可比）
          value: 3300
        - label: 8x（乐观情景——AI 溢价，私募市场）
          value: 4400
    claimRefs:
      - CV006
      - CV008
      - CV012
      - CV015
      - CV022
  - id: FV003
    title: 估值 / 回报区间
    type: range
    layout: standard
    summary: >-
      截至 2026 年 5 月，Transcarent 的低、中、高企业价值估计分别对应悲观、基准和乐观情景。悲观情景（$1.2B–$1.65B）锚定整合受扰后的可比 M&A 退出倍数，即合并收入
      2–3x；基准情景（$2.2B–$2.75B）反映当前 Series D 定价，即合并收入 4–5x，并假设整合中等成功；乐观情景（$3.5B–$4.4B）反映合并收入 6–8x、AI 溢价和已证明 EBITDA
      盈亏平衡。区间很宽，从 $1.2B 到 $4.4B，凸显整合执行风险的二元性，以及合并后财务披露的重要性。
    approximationNotes: >-
      区间是分析师根据可比交易倍数和先例 M&A 交易估算得出。合并收入 $550M 是管理层估计。没有可供独立验证的经审计财务报表。若假设到 2028 年可实现 $100M 正常化 EBITDA，并对五年 DCF 使用 12–15%
      WACC，结果会收敛在基准情景中点附近，即 $2.4B。
    data:
      items:
        - label: 悲观情景 EV——整合受扰，合并收入 2–3x
          low: 1200
          high: 1650
          unit: $M
        - label: 基准情景 EV——中等整合，合并收入 4–5x
          low: 2200
          high: 2750
          unit: $M
        - label: 乐观情景 EV——AI 溢价，合并收入 6–8x，EBITDA 盈亏平衡
          low: 3500
          high: 4400
          unit: $M
    claimRefs:
      - CV022
      - CV024
      - CV025
      - CV037
      - CV038
  - id: FV004
    title: 投资 KPI
    type: kpi
    layout: standard
    summary: >-
      面向 IC 的打分从七个投资维度评估 Transcarent，采用 1–5 分（1 = 弱，5 = 强）。市场机会和管理层履历得分最高（4/5），原因是雇主健康市场很大，团队也经过 Livongo 验证。收入牵引和 EBITDA
      经济性得分最低（2/5），反映独立收入不透明、已确认 EBITDA 为负，以及整合执行尚未解决。估值吸引力在独立口径下为 2/5（26x 收入），在合并口径下为 3/5（4–5x 收入）。总体加权 IC
      得分：2.9/5——更符合「继续研究 / 观察」，不是高确信买入。
    approximationNotes: 分数是分析师基于截至 2026 年 5 月公开证据作出的编辑评估。没有经审计财务数据。如果经审计 FY2025 合并财务确认 $550M 收入且 EBITDA 轨迹转正，分数很可能大幅改善。
    data:
      items:
        - label: 市场机会
          value: 4
          unit: /5
          note: 大型雇主健康福利 TAM；导航平台市场 10%+ CAGR；自保雇主细分增长
        - label: AI / 产品差异化
          value: 4
          unit: /5
          note: WayFinding 生成式 AI；风险共担定价模式；98point6 IP；未发布经临床验证的结果
        - label: 收入牵引
          value: 2
          unit: /5
          note: 合并约 $550M 已具规模，但独立约 $85M 未达到 $175M 目标；Accolade 收购时 EBITDA 为负
        - label: 竞争护城河
          value: 3
          unit: /5
          note: 相比点解决方案有规模优势；Quantum Health 95% 留存和 Included Health 仍是可信威胁
        - label: 管理层质量
          value: 4
          unit: /5
          note: Tullman / Taneja / Shapiro 有 Livongo 履历；General Catalyst 和 7wire 是一线背书；Frazier 任执行董事长
        - label: 估值吸引力
          value: 2
          unit: /5
          note: 独立口径 26x 昂贵；合并口径 4–5x 属于合理偏高；没有经审计财务会降低信心
        - label: 退出清晰度
          value: 3
          unit: /5
          note: 数字健康 IPO 窗口重新打开（Hinge Health 2025 年 5 月）；M&A 整合活跃；Transcarent 未说明 IPO 时间表
    claimRefs:
      - CV001
      - CV007
      - CV021
      - CV031
      - CV033
      - CV036
