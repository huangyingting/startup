  - number: 5
    title: 产品与技术
    sections:
      - number: '5.1'
        title: 平台架构与产品套件
        blocks:
          - type: paragraph
            body: >
              Transcarent 采用单一平台架构，通过原生 iOS/Android 应用和响应式网页门户交付，品牌定位为“the One Place for Health and Care”。 平台以
              WayFinding™ AI 体验作为消费者入口和编排引擎，背后承接五个具名 Care Experiences（Surgery Care、Cancer Care、 Weight Health、Pharmacy
              Care、2nd.MD 专家意见）以及 Experience Store——一个精选点解决方案市场。 架构坚持移动优先、云原生；其数据和智能层会接入实时理赔数据、福利计划参数以及会员长期健康互动。


              WayFinding 核心于 2024 年 5 月 15 日推出，把生成式 AI 与即时接入护理服务方结合起来。 它整合福利导航（覆盖范围 /
              成本查询）、临床指导（症状分诊、下一步最佳行动路由）和直接护理交付（虚拟医生聊天、线下预约、 COE 手术转诊），不要求会员为每个点解决方案单独登录或出示会员卡。CEO Glen Tullman
              曾把这一架构比作从翻盖手机到智能手机的转变： 前代产品只能处理一个功能，WayFinding 则能处理全部。


              后端方面，平台连接全国虚拟和线下服务方网络、Transcarent 附属医疗集团（原 98point6 护理交付）、透明药房解决方案， 以及直接签约的手术 Centers of
              Excellence（COE）。2025 年 4 月收购 Accolade 后， Accolade 的 Personalized Healthcare Platform
              又把更多患者倡导、专家医学意见和虚拟初级保健（PlushCare）带入合并架构。 最终技术栈现在以统一品牌运营，但截至报告日仍处于整合中。
