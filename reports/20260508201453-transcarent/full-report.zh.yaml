      - number: '1.8'
        title: 展示材料
        blocks:
          - type: callout
            title: 最强公开验证点——Surgery Care ROI
            body: |
              第 1 章最强公开运营证据，是 Oregon Health Authority 托管的西海岸健康计划案例研究：约 10,000 名覆盖人群，
              2023 年 230+ 台手术，20.5x ROI，自 2020 年以来累计手术节省 $11M+，会员 NPS 为 83+，并发症率比全国平均水平低
              83%。这是真实的手术 COE 模式验证点，但它匿名且只有单客户；尽调应要求查看覆盖完整雇主基础的队列级 Surgery Care 结果。
            calloutType: insight
            claimRefs:
              - CO031
              - CO036
              - CO039
          - type: callout
            title: 战略转向风险——Tullman 对 Accolade 的反转
            body: |
              Glen Tullman 在 2021–2024 年公开否定护理导航公司、认为其已经过时，却在 2025 年 1 月以 $621M 收购最大独立导航商 Accolade。
              MedCity News（2025 年 2 月）援引前员工说法称，独立业务 2024 年新业务销售额仅约 $55–60M，目标为 $175M，
              暗示这次反转可能反映增长不达预期。Accolade 还背负 Comcast 2022 年离开的继承流失包袱，使整合执行和客户留存成为交易完成后的关键尽调项。
