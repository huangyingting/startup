            title: 合并后规模：20M 会员与 1,700+ 客户形成可防守市场位置
            body: >
              2025 年 4 月收购 Accolade，把 Transcarent 从一家中等规模数字健康初创公司（约 300 家雇主客户、约 $85M 收入） 变成美国最大的雇主健康与护理平台之一。在 20M+ 会员和
              1,700+ 家雇主 / 健康计划客户规模下，Transcarent 获得了有意义的数据网络效应 （人群规模上的长期会员健康记录）、分销杠杆（Accolade
              已建立的经纪人关系和直接面向消费者渠道）以及交叉销售动作 （把 Accolade 倡导和虚拟初级保健叠加到 Transcarent 的 WayFinding、COE
              和药房能力上）。这一规模创造了切换成本和数据优势， 小型导航竞争对手很难复制，也让 Transcarent 能竞争需要全国覆盖和产品广度的超大型雇主账户。
