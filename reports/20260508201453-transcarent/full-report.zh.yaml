          label: 自然语言查询：会员在 WayFinding App 中输入或说出需求
          type: process
        - id: ai-triage
          label: AI 分诊：智能体 AI 对查询分类；检查福利规则；调用 Total Recall Memory
          type: process
        - id: routing
          label: 智能路由：AI 路由至虚拟医疗、COE 预约、单点解决方案或药房
          type: decision
