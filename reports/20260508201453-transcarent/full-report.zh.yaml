      - number: '5.3'
        title: 核心产品能力
        blocks:
          - type: paragraph
            body: >
              Transcarent 的产品套件通过统一 WayFinding 平台交付，涵盖六项主要能力：


              **福利导航与临床指导**：WayFinding AI 回答关于覆盖范围、费用和护理选项的自然语言问题，引导会员采取下一步最佳临床行动。 平台接入雇主福利计划参数，以个性化结果。Transcarent
              报告称，在激活的会员中，80%+ 无需 HR 介入即可解决需求； 平台还称价格仅为传统导航供应商的一半。


              **虚拟初级保健（由 98point6 支撑）**：基于文本的异步医生咨询，由 AI 驱动的患者接诊和临床文档支持。 会员发起请求后，60 秒内即可获得护理。附属医疗集团为所有 AI 辅助互动提供认证医生监督。
              面向消费者的 98point6 应用已停止运营；在 Transcarent 内，这项能力只面向企业客户。


              **Surgery Care（Centers of Excellence）**：直接签约的 COE 网络，覆盖骨科、减重、心脏和癌症手术。 COE
              医院按手术周期获得捆绑付款（术前、手术、术后、并发症）。会员通常零自付或低自付。 Health Guides 统筹旅行和排期等全部事务。COE 项目源自 BridgeHealth，并在 Transcarent
              创立时（2020 年）并入。


              **Experience Store**：一个精选点解决方案市场，覆盖心理健康（Spring Health、Lyra Health 类型）、MSK、糖尿病、生育及其他病种。 SSO
              集成消除了单独登录。雇主配置可用解决方案；会员数据和导航流程进入 WayFinding 核心，从而支持统一分析。


              **Pharmacy Care**：个性化用药指导、药品价格透明和药房节省。Transcarent 声称可为客户节省最高 40% 的药房成本。


              **2nd.MD 专家医学意见**：针对高成本诊断和治疗方案，由专科医生提供第二诊疗意见；Accolade 收购后整合进平台。
