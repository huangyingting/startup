      - number: '1.4'
        title: 融资历史与投资方
        blocks:
          - type: paragraph
            body: >
              自 2020 年创立以来，Transcarent 已通过四轮披露的一级股权融资累计获得约 $450 million 风险资本。

              2020 年 10 月 Series A（$40 million）伴随收购手术 COE 平台 BridgeHealth。2021 年 6 月 Series B（$58 million）将累计融资推至

              $98 million。2022 年 1 月 Series C（$200 million）使 Transcarent 以 $1.62 billion 估值进入独角兽行列。

              2024 年 5 月 Series D（$126 million）将公司估值定为 $2.2 billion，并把累计股权融资提升至约 $450 million。


              各轮主要投资方包括 General Catalyst 和 7wireVentures，也就是共同出资支持 Livongo 的同一批机构。其他重要投资方包括

              Kinnevik、Human Capital、Ally Bridge Group、Threshold Ventures、Leaps by Bayer、Merck Global Health Innovation
              Fund、

              Alta Partners、Memorial Hermann Health System 和 Geodesic Capital。医疗系统战略投资方（Memorial Hermann、Rush

              University Medical Center、Northwell Health 和 Intermountain Healthcare）显示，Transcarent
              的直签模式与受益于其雇主关系的医疗系统之间存在利益一致性。


              $621 million 的 Accolade 收购由既有现金、General Catalyst 和 Tullman 的 62 Ventures 领投的新股，以及 J.P. Morgan 牵头的债务融资共同支持。

              若计入收购融资，围绕 Transcarent 部署的总资本大幅超过 $1 billion。
