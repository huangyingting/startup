        - 上轮估值 $5.6B（2022 年 1 月）；300+ 家雇主组织；20M+ 覆盖人数
        - 大型雇主
        - 循证混合式照护；4 年内年度健康计划成本降低 26%（Aon 研究）
        - 仅限心理健康；定价高；行为健康之外覆盖有限
