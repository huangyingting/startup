      - number: '4.4'
        title: 单位经济与商业模式收入驱动因素
        blocks:
          - type: paragraph
            body: |
              Transcarent 至少有四类收入来源，但定价和利润率数据大多未披露或只能估计。WayFinding AI 导航平台的主要收入机制，
              是向自保雇主客户按每雇员每月（PEPM）收取订阅费。Transcarent 披露 WayFinding 访问权限的标价约为
              每雇员每月 $5，低于传统导航供应商 $10–$15 PMPM 的定价。这使 WayFinding 成为一种成本更低、
              可叠加到既有福利结构上的替代方案。行业标准的护理导航 PMPM/PEPM 定价为每会员每月 $2 至 $8；
              受规模折扣和谈判影响，实际成交价通常低于标价。

              Surgery Centers of Excellence（继承自 BridgeHealth）采用捆绑病例费率模式：雇主以事先谈好的全包价格，
              向筛选出的高质量服务方采购特定手术项目，Transcarent 则在每个病例中赚取管理费或病例管理利润。
              对关节置换、心脏手术、减重手术等高成本项目，这一模式能带来有意义的单病例收入，因为雇主可节省的金额较大。
              虚拟初级保健能力（通过 98point6 集成）和药房导航，要么打包进 PEPM，要么作为附加服务出售。

              以 Accolade 的公开财务作为最具体参照：FY2024 GAAP 毛利率为 38.3%（调整后为 47.6%），
              在 $414.3 million 收入上，收入成本为 $221.6 million。FY2024 运营费用为 $306.3 million，
              低于 FY2023 的 $320.8 million，说明收入扩张时成本纪律有所改善。人均收入约
              $150,000–$186,000，符合数字健康行业基准。对合并实体而言，规模化实现正 EBITDA 将取决于两点：
              将 Accolade 调整后毛利率推高到 50% 以上，同时整合 Transcarent 的 AI 导航，降低护理团队劳动强度。
              按 $5 PEPM 计算，10 million 名雇员人群仅 PEPM 年化收入就意味着 $600 million；
              但实际业务组合中的 PEPM 实现水平和会员渗透率并未披露。
