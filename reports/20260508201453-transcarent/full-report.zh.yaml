      - number: '2.2'
        title: 总可用市场与关键子市场
        blocks:
          - type: paragraph
            body: |
              美国雇主资助健康福利市场每年保费和理赔支出合计超过 $900 billion，覆盖自保和完全投保两类计划结构。
              自保部分——Transcarent 的主要可服务市场——基于 HFS Research 对联邦备案数据和 SIIA 汇总雇主调研数据的分析，估计约为
              $600 billion。约 154 million 非老年美国人持有雇主资助保险，这是美国劳动年龄成年人最大的健康保险来源。

              医疗导航平台子赛道包括卖给雇主的软件、导航服务和护理管理工具，2023 年全球市场规模约为 $10.1 billion，预计到 2030 年增长至
              $17.7 billion（CAGR：8.4%，Grand View Research）。美国约占全球市场的 40–44%，意味着 2024 年美国导航平台市场约为
              $4–5 billion。范围更窄的面向雇主福利导航子赛道，2024 年估计为 $1.2–2.1 billion（Datahorizzon Research、Verified
              Market Reports），并以 12–14% CAGR 增长，到 2033 年可能达到 $4–5 billion。

              美国虚拟护理和远程医疗市场又增加了一层重要可寻址空间。按覆盖边界不同（虚拟初级护理、异步、行为健康、远程患者监测），广义远程医疗在 2024 年达到
              $42–65 billion。较窄定义的虚拟护理在 2024 年约为 $8.9 billion。Transcarent 平台横跨导航和虚拟护理两个子赛道，
              因此其复合 TAM 明显大于任何单一市场估计。

              一个关键规模尽调缺口：没有独立研究单独测算面向 500+ 员工自保雇主的一体化“导航 + 虚拟护理”平台 SAM。
              这里呈现的估计来自彼此重叠、方法口径有时不一致的分析师报告，各自定义的市场范围不同。导航平台赛道中质量最高的估计来自
              Grand View Research（8.4% CAGR）和 Mordor Intelligence；二者都使用雇主采用率调查和供应商收入披露。
