      - number: '2.3'
        title: 市场增长驱动与顺风
        blocks:
          - type: paragraph
            body: |
              雇主医疗成本通胀是 Transcarent 市场最主要的宏观顺风。Aon 对 950 家美国雇主的分析预计，2025 年每员工医疗成本将增长
              9%，为十多年来最高增速，此前 2024 年增长 6.4%。雇主健康计划现在平均每名员工每年花费约 $14,823（2024 年，Aon），
              家庭保费达到每年 $25,572（KFF 2024）。成本压力推动雇主寻找技术驱动的导航方案，必须能通过更好的福利使用、避免不必要服务、
              并把成员引向高价值服务方来可证明地降低支出。

              几个离散顺风放大了基础成本趋势。第一，专科药物和 GLP-1 支出：处方药成本（包括 Wegovy、Mounjaro 等 GLP-1 减重药）现在占总医疗支出
              25%+；2024 年，34% 的雇主覆盖肥胖适应症 GLP-1，高于 2023 年的 26%。第二，高成本理赔集中：仅 1% 的计划会员贡献超过
              33% 的雇主总医疗支出，百万美元以上理赔在 2022 至 2024 年间增长超过 45%。第三，点状解决方案整合需求：
              约 50% 的组织提供 4–9 种不同数字健康点状解决方案，造成管理碎片化和低使用率——Transcarent 这样的平台型导航商正是要解决这个问题。

              AI 整合是结构性增长驱动：到 2024 年，超过 60% 的医疗导航平台已推出 AI 驱动功能（聊天机器人、预测性路由），85%+ 的 HR 负责人计划在
              2024 年使用 AI 管理福利。Transcarent 于 2024 年 5 月发布的 WayFinding AI 导航器直接对应这一需求。价值医疗采用也在加速：
              约三分之一大型雇主已整合 accountable care 安排，手术护理卓越中心正成为 Fortune 500 公司的标准做法。
              Transcarent 的 Surgery Centers of Excellence 项目正卡在这条趋势上。
