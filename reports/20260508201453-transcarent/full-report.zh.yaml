      - number: '7.3'
        title: 财务与资本结构风险
        blocks:
          - type: paragraph
            body: >
              截至 Series D，Transcarent 累计融资约 $450M，估值 $2.2B。Accolade 收购以股权加现金融资，价格为每股 $7.03，总股权价值 $621M。Accolade FY2024
              财务数据显示，收入 $414.3M（同比 +14%），净亏损 $99.8M，调整后 EBITDA 为 -$7.5M。调整后 EBITDA 较上一年的 -$459.7M
              明显改善（上一年包含大额减值），但合并后公司仍承担可观的持续现金消耗。

              收入集中风险已有记录：2022 日历年，Accolade 在 FY2022 财报电话会上公开披露后失去最大客户 Comcast。消息后，Accolade 股价在 2022 年 4 月从每股 $19.39 跌至
              $4.61。单一大客户流失就引发股价崩塌，说明这种集中度敏感性很可能仍存在于合并后公司。

              数字健康融资环境已较 Transcarent 高速增长期显著恶化。美国数字健康融资从 2021 年的 $29.2B 降至 2024 年的 $10.1B，后期轮次的中位融资规模也在下滑（Series D
              中位数：2024 年 $55M，2023 年 $58M）。2024 年退出活动跌至十年低点。Transcarent 的 $2.2B 估值由 2024 年 Series D 确定；若收入增长目标落空，再融资或
              IPO 场景下未必撑得住。前员工提到 2024 年新业务目标为 $175M，但未完成，估计实际收入约 $80-85M——这一差距说明并购前独立增长低于计划。
