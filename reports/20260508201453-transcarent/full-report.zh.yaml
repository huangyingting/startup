  - number: 6
    title: 客户情况
    sections:
      - number: '6.1'
        title: 客户画像与理想客户画像
        blocks:
          - type: paragraph
            body: >
              Transcarent 的核心客户是自保雇主——这类公司自行出资覆盖员工健康福利计划，而不是从商业保险公司购买全额保险。 Transcarent 明确瞄准员工数 1,000
              人及以上的组织；对它们来说，管理自筹资金健康计划的复杂度和成本，创造了对导航、 控费和护理协调服务的实质需求。这些雇主主要是中型市场到大型企业（1,000–100,000+ 名员工），覆盖制造、科技、医疗、
              金融服务、零售和公共部门（教育、市政政府）。HR 和福利决策者是主要买方画像：福利总监、HR 副总裁和全面薪酬负责人， 他们掌控计划设计、供应商选择和年度续约决策。


              除直接雇主外，Transcarent 的可触达客户群还包括服务自保人群的健康计划和工会信托基金，以及为小型公司聚合福利采购的专业雇主组织（PEO）。
              从地域看，重点是全美国，因为美国医疗体系以雇主赞助保险为核心。导航服务采用每雇员每月（PEPM）定价 （WayFinding 约 $5 PEPM），Surgery COE 等特定项目则采用捆绑病例费率定价。


              面向买方画像的价值主张结合了三点：降低成本（已有案例研究记录将会员引导到高价值护理场景带来的 ROI）、员工满意度 （公开审阅案例研究中 NPS
              83+），以及行政简化（一个平台、一份合同替代多个点解决方案）。买方通过经纪人 / 顾问关系、 同行推荐和竞争性 RFP 流程评估 Transcarent；典型销售周期为三到九个月。
