              雇主客户，并把一家净亏损 $100M 的业务推向盈利；与此同时，数字健康融资环境处在多年低位。2021 年 Teladoc-Livongo 先例（$6.6B 减值）是直接可比交易，也由 Glen Tullman
              促成。任何尽调承销都应把整合里程碑作为首要价值驱动，而不是押注长期市场份额预测。
