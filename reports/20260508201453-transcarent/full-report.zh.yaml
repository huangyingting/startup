      - number: '3.2'
        title: 直接竞争者：护理导航与健康倡导
        blocks:
          - type: paragraph
            body: >
              Transcarent 最直接的竞争威胁，是拥有大型雇主客户基础和多年结果数据的成熟雇主护理导航与健康倡导平台。Quantum Health 总部位于 Dublin, Ohio，2021 年以来由 Roper
              Technologies 持有，被广泛认为是主动式护理导航这个市场品类的开创者。它服务 500+ 家自保雇主和超过 3 million 活跃会员，声称客户留存率 95%，并报告通过 Real-Time
              Intercept 平台在第一年最高可降低雇主理赔成本 5.9%。第三方分析师估计 Quantum Health 2024 年收入为 $500M–$622M。Accolade（NASDAQ:
              ACCD）是领先的上市导航和倡导公司， 截至 2024 年 2 月财年收入约 $414–$447M。Accolade 模式把技术驱动导航与高接触临床倡导团队结合起来；不过它面临低成本数字原生平台的压力，
              必须证明相对于价格点具备清晰 ROI。Included Health 由 Grand Rounds 和 Doctor on Demand 在 2021 年合并而成（GV/Google 和 Salesforce
              Ventures 支持），把护理导航与整合远程医疗结合，估值估计 $1B+，年收入约 $345M。Health Advocate 服务 12,500+ 家雇主客户和 75M+
              会员，代表传统倡导模式；该模式越来越容易被 AI 赋能导航平台冲击，但仍凭借长期经纪商关系和多年合同在中型市场雇主中站稳脚跟。 四家直接竞争者都依赖 PEPM 定价结构和多年雇主合同，形成中等切换成本和市场粘性。
