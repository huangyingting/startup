      - number: '4.3'
        title: 收入与规模指标
        blocks:
          - type: paragraph
            body: |
              Transcarent 单体收入未公开披露。作为非上市公司，它没有报告财务业绩的义务，管理层也一直拒绝提供收入数字。
              Growjo、CBInsights 等数据聚合方的第三方估计显示，2024 年年收入区间为 $70–100 million，
              但这些是外推值，证据质量较低。最可操作的反向数据点来自 MedCity News 2025 年 2 月的一篇分析，
              其援引内部信息称：公司 2024 年签下约 $55–60 million 新业务，而内部目标为 $175 million。
              这一显著缺口意味着，单体业务要么目标设定过于激进，要么真实商业执行存在挑战。

              合并实体的收入基线更扎实：Accolade FY2024（截至 2024 年 2 月的财年）收入为 $414.3 million，
              从 FY2020 的 $132.5 million 起持续保持两位数增长。Accolade Q3 FY2025 收入约
              $105 million；2025 年 4 月收购完成前，市场共识预计 FY2025 全年收入约 $465 million。
              Transcarent 指引合并后 2025 年收入超过 $500 million，这与 Accolade 的运行率加上
              Transcarent 的任何贡献大体一致。2025 年 4 月 8 日合并完成后，合并实体服务超过
              20 million 名会员和 1,700+ 家雇主及健康计划客户。

              Accolade 的收入历史显示，它穿越雇主健康市场周期仍稳步增长：FY2020 为 $132.5 million，
              FY2021 为 $170.4 million，FY2022 为 $310.0 million，FY2023 为 $363.1 million，
              FY2024 为 $414.3 million。FY2022 同比约 82% 的跳升既来自有机增长，也来自收购带来的收入。
              Transcarent 对 98point6 收购（2023 年 3 月完成，约 $100 million）的收入贡献未单独披露；
              这笔交易增加的是 AI 驱动的虚拟护理技术和约一百万条医患文本互动记录，而不是显著收入规模。
