  - id: TV006
    title: 最终尽调问题表
    columns:
      - 主题
      - 缺失证据
      - 重要性
      - 责任方 / 尽调路径
    rows:
      - - 合并后经审计财务
        - 缺少经审计的 FY2025 合并 Transcarent + Accolade 利润表、资产负债表或现金流量表
        - 没有经审计财务，所有估值分析都依赖估计；EBITDA 和现金消耗无法核验
        - 管理层 / 数据室；索取 FY2025 经审计财务和 Q1 2026 未审计中期数据
      - - Accolade 后客户留存
        - 2025 年 4 月合并完成后，Accolade 存量客户没有公开流失数据
        - 整合成败取决于守住 Accolade 的 1,700+ 个客户；10% 流失会从收入基础中抹去 $45M+
        - 与 5+ 个企业客户做参考访谈；向管理层索取合同续约率数据
      - - WayFinding 使用率和临床结果
        - WayFinding AI 建议没有独立临床验证；使用率未公开披露
        - 估值中的 AI 溢价需要临床证据；CDS 分类需要 FDA 监管定性
        - 索取使用率仪表盘、会员参与指标和任何 IRB 批准的结果研究
      - - Transcarent 2024 年独立收入
        - Latka 估计 FY2024 独立收入为 ~$85M；没有管理层披露或经审计数字
        - 相对 $175M 新业务目标未达标（据 MedCity），可能说明商业模式受限
        - 索取经审计或管理层确认的 FY2024 Transcarent 独立收入和新增 ARR 预订
      - - 股权结构表和优先股堆叠
        - 没有公开股权结构表；Series A–D 累计融资 $450M+ 带来的优先权悬空规模未知
        - 高优先股堆叠会在当前估值水平侵蚀普通股价值；稀释情况不清楚
        - 索取股权结构表和瀑布分析，显示 $2.2B、$3B 和 $4B 退出情景下普通股价值
    notes: 所有识别出的缺口均基于截至 2026 年 5 月的公开信息。清单并不穷尽；完整数据室审阅可能发现更多问题。每项尽调问题都是在当前估值下建立投资信念的最低要求。
