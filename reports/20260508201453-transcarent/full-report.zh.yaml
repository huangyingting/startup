      - number: '5.5'
        title: 技术风险与整合挑战
        blocks:
          - type: paragraph
            body: >
              尽调中有几类重大技术与整合风险值得关注：


              **Accolade 整合执行风险**：2025 年 4 月合并把两个独立技术栈、数据模型、会员管理系统和临床工作流放到一起。 截至报告日（2026 年 5 月），整合情况未完全披露。把 Accolade 的
              Personalized Healthcare Platform、PlushCare、 2nd.MD 与 Transcarent 的 WayFinding
              统一成单一连贯体验，是一项复杂的多年工程和临床工作流挑战。


              **缺少独立 AI 基准**：Transcarent 尚未公布其自研 LLM 在临床分诊或路由建议上的独立准确性基准。
              安全性说法（“基于数百万次医生互动”）来自公司表述，尚未被独立验证或同行评审。对尽调而言，这是证据缺口。


              **消费者应用商店评价分化**：Transcarent 应用在 iOS App Store 评分为 4.2 星（226 个评分），在 Google Play 为 3.8 星（103
              条评论）。反复出现的负面主题包括复杂护理审批困难、后续跟进延迟，以及护理需要外部服务方时协调失败。 这些评分显示，会员体验足以支持常规导航，但面对复杂护理需求仍有不足。


              **智能体 AI 可靠性风险**：从 AI 聊天走向完整智能体行动（自主预约、后续跟进、用药依从性）会引入可靠性和安全风险。 智能体行动出错——预约错误服务方、未能升级关键症状——可能带来临床后果。公司引用了
              OECD、NIST 等治理框架， 但未披露运营错误率。


              **数据依赖与模型漂移**：临床 AI 模型使用历史医生互动训练；随着护理模式演变、98point6 消费端量下降（消费者应用已关闭）， 以及 Accolade
              的护理模式被纳入，模型可能漂移。公司未公开记录持续模型维护和刷新周期。
