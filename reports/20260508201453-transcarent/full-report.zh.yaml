chapters:
  - number: 1
    title: 公司概况
    sections:
      - number: '1.1'
        title: 身份与商业模式
        blocks:
          - type: paragraph
            body: |
              Transcarent 是一个消费者导向型健康与护理平台，目标是让自保雇主员工及其家庭更容易获得医疗服务。
              公司的标语是 “One Place for Health and Care™”，体现了它的使命：
              把医疗、药房和点状解决方案福利聚合进一个 AI 驱动的移动应用。Transcarent 于 2021 年 3 月走出隐身模式，
              由 7wireVentures 的 Glen Tullman 和 Lee Shapiro 与 General Catalyst 的 Hemant Taneja 共同构思——
              这也是创建并支持 Livongo Health 的同一机构团队。

              平台把会员连接到一套整合护理服务，包括日常虚拟护理（Care in 60 Seconds）、药房福利、Surgery Centers of
              Excellence、癌症护理、体重健康、行为健康和专家第二意见。2024 年产品策略的核心是 WayFinding™：
              这一生成式 AI 驱动的导航层于 2024 年 5 月发布，让会员能够 24/7 即时获得关于福利、成本和护理选择的个性化答案。
              Transcarent 将自身模式与传统护理导航公司区分开来：它不收取按员工每月计费的费用，而采用与绩效挂钩、承担风险的定价，
              雇主客户按可衡量结果和成本节省付费。

              2025 年 4 月，Transcarent 完成了以 $621 million 收购 Accolade 的交易——Accolade 曾是一家上市的健康倡导和虚拟初级护理公司。
              合并后的组织服务超过 20 million 会员和超过 1,700 家雇主及健康计划客户，使 Transcarent 成为美国规模最大的数字健康导航平台之一。
              按公司指引，2025 年备考收入预计超过 $550 million。
