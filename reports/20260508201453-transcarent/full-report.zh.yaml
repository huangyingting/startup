  - number: 2
    title: 市场分析
    sections:
      - number: '2.1'
        title: 市场定义与细分
        blocks:
          - type: paragraph
            body: |
              Transcarent 位于三个不同但重叠的市场交汇处：雇主资助健康保险（ESI）、医疗导航平台和虚拟护理交付。
              主要市场定义为美国自保雇主——这些组织直接承担员工医疗成本的财务风险，而不是向商业保险公司支付固定保费。
              在雇主资助计划覆盖的全部员工中，自保计划覆盖约 63%；在 200 名及以上员工的公司中，自保是主导模式，渗透率为 79%。

              在 ESI 内，相关支出包括福利管理、临床导航、虚拟初级与专科护理、药房福利管理，以及手术单病种管理。
              Transcarent 的直接 TAM 不包括完全投保的小团体和个人市场（由 Aetna、UnitedHealthcare、Cigna 等承保方管理）、
              Medicare 和 Medicaid 市场，以及未与雇主福利项目整合的独立 DTC 远程医疗。

              雇主不用专门导航平台时，主要替代方案包括：（1）依赖健康计划内置会员服务；（2）部署独立员工援助计划（EAP）；
              （3）直接与福利经纪商或顾问签约；（4）为慢病护理、心理健康和专科需求部署多个碎片化点状解决方案。
              Transcarent 的市场假设是，这些替代方案带来管理碎片化、低使用率和差结果，而它的整合 AI 导航平台可以消除这些问题。
