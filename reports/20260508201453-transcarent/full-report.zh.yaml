      - number: '7.4'
        title: 技术、AI 与监管风险
        blocks:
          - type: paragraph
            body: >
              Transcarent 的 WayFinding 2.0 平台使用生成式 AI
              做症状检查、服务方匹配、预约和临床分流。公司称安全评估「基于数百万次医生互动数据集」，但没有发布经同行评审的准确率基准，例如敏感性、特异性、AUROC 或诊断一致率。缺少公开基准带来监管和责任敞口：如果 FDA
              将 WayFinding 的临床决策支持归类为 II 类或 III 类医疗器械软件（SaMD），Transcarent 将面临 510(k) 上市前通知或上市前批准要求。FDA 于 2025 年 1
              月发布医疗器械 AI 草案指南，引入基于风险的可信度评估框架。

              HIPAA 数据泄露风险很重。合并后会员规模超过 20M 人。2024 年，725 起大型医疗数据泄露事件上报 HHS OCR，暴露记录涉及美国 82% 人口。仅 Change Healthcare
              泄露事件就暴露约 100M 条记录。商业伙伴——包括为 1,700+ 雇主客户处理 PHI 的健康导航平台——是勒索软件的主要目标。按 HHS OCR 数据，2018 至 2023 年，医疗机构勒索软件攻击增加
              278%。以 Transcarent 的规模，单次泄露就可能触发 HIPAA 执法、客户合同终止和声誉损伤。

              医疗整合正受到更强监管审查。FTC 在 2024 年就医疗整合影响发布多机构信息征询，2025 年 2 月生效修订后的 Hart-Scott-Rodino 申报要求，并在 2026 年 3 月成立专门的
              Healthcare Task Force。虽然 Transcarent-Accolade 合并已经完成，未来收购仍可能面临更长审查周期和更高合规成本。Oregon OHA 的监测——第 1、2、5
              年跟进——仍是正在履行的监管义务。

              两家股东律师事务所曾调查 Accolade 收购是否违反受托责任：Halper Sadeh LLC（2025 年 2 月 24 日宣布）和 Ademi LLP（2025 年 1 月 8 日宣布）。两者都关注每股
              $7.03 的收购价是否对 Accolade 公共股东公平。这些调查可能演化为诉讼，带来持续干扰、法律成本和管理层时间消耗。
