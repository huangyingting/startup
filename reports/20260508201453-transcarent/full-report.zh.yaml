      - number: '6.2'
        title: 具名客户与客户基础概览
        blocks:
          - type: paragraph
            body: >
              2025 年 4 月与 Accolade 合并后，Transcarent 客户基础显著扩大，合并实体服务超过 20 million 名会员和 1,700 多家雇主及健康计划客户。合并前，Transcarent
              单体曾披露截至 2023 年末服务 300+ 家雇主和健康计划客户 （据 Fierce Healthcare 报道的 CEO 表述），收入从 2023 年的 $62.8 million 增至 2024 年的
              $85.1 million。 Accolade 私有化前报告称，截至 2024 年 2 月结束的财年，其客户超过 1,200 家。


              具名客户证据稀少，这符合健康福利企业 B2B 常态；保密条款通常阻止公开披露。主要的公开记录部署是一家西海岸健康计划， 服务 30 个学校雇主群体（约 10,000 名覆盖人群），其 Transcarent
              Surgery Care 实现了 20.5x ROI， 自 2020 年以来累计节省 $11 million 手术成本，会员 NPS 为 83+。East West Bank 也在公开的 2025
              计划年度福利概览文件中， 被识别为向员工提供 Transcarent 福利的雇主。


              2023 年收购 98point6 的 AI 业务，为 Transcarent 带来估计 100+ 个自保雇主关系。 FeaturedCustomers 列出 6 个客户推荐和 3 条评论，平台综合评分为
              4.8/5。Transcarent 与 10 家主要医疗系统直接签约的网络 （Advocate Health、Atrium Health、Baylor Scott & White、Corewell
              Health、Hackensack Meridian、Intermountain、 Mass General Brigham、Memorial Hermann、Mount Sinai、Virginia Mason
              Franciscan）支撑其雇主价值主张，提供全国服务方覆盖。
