      - number: '1.2'
        title: 产品架构与交付证据
        blocks:
          - type: paragraph
            body: |
              Transcarent 当前平台由三层拼成：面向会员的 AI 导航层、自有或签约的护理交付资产，以及收购得来的人工倡导基础设施。
              AI 层是 WayFinding™，最早于 2024 年 5 月发布，并在 CES 2025 扩展出智能体功能，包括语音排期、高级症状分诊，以及学习会员偏好、历史和模式的
              Total Recall Memory Engine。收购 98point6 得来的虚拟护理资产提供了关联医疗集团、超过 100 家雇主关系，
              以及近一百万条专有医患文本互动语料，用于训练临床大语言模型工作流。

              护理交付层始于 BridgeHealth 的手术卓越中心网络。该网络带来 160+ 个 COE、300+ 份打包手术合同，以及公司声称的
              25–50% 手术节省。之后，Transcarent 又加入由 10 家主要医疗系统组成的直连服务方生态——包括 Advocate Health、Baylor
              Scott & White、Intermountain、Memorial Hermann、Mount Sinai 和 Mass General Brigham——支持自保雇主直接签约。
              2026 年，公司引入 SmithRx 作为透明 PBM 合作伙伴，并配套提到 Amazon Pharmacy 和 Mark Cuban Cost Plus Drugs 的用药选择工作流，
              从而扩展药房导航。

              公开交付证据以 Surgery Care 最强：一项由 Oregon Health Authority 托管、覆盖约 10,000 名参保人的西海岸健康计划案例研究披露，
              ROI 达 20.5x，2023 年完成 230+ 台手术，2023 年单位成本节省 $3.5 million，自 2020 年以来累计手术节省超过
              $11 million，会员 NPS 为 83+，并发症率比全国平均水平低 83%。这些是有意义的验证点，但仍只是一项匿名单客户案例研究；没有更广泛队列数据前，
              不应外推到完整的 20M+ 会员基础。
