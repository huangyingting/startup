      - number: '1.5'
        title: 规模、指标与办公地点
        blocks:
          - type: paragraph
            body: |
              截至 2024 年 5 月 Series D 公告，Transcarent 披露已有超过 4.3 million 人可通过雇主或健康计划使用其平台。
              Inc. 杂志 2025 年 4 月报道援引，Accolade 交易完成前，Transcarent 会员数为 5.2 million。2025 年 4 月合并完成后，
              合并平台服务超过 20 million 会员和超过 1,700 家雇主及健康计划客户。

              Transcarent 是私营公司，不公开披露经审计财务报表。2025 年 2 月 MedCity News 调查报道引用一名公司发言人的说法，称公司约有
              400 名员工；第三方数据聚合方（Latka、CompWorth）估计 2024 年独立 ARR 为 $80–85 million。这些数字未经验证。
              Accolade 最近披露的全年收入为 2024 财年（截至 2024 年 2 月 29 日）$414 million，净亏损 $100 million。
              按公司沟通口径，合并实体预计在 2025 日历年产生超过 $550 million 收入。

              主要办公室位于 San Francisco, CA（注册 / 高管）、Denver, CO（运营）和 Seattle, WA（通过 Accolade 整合取得）。
