  - id: TV005
    title: 投资逻辑破裂与放弃触发项表
    columns:
      - 触发项
      - 阈值
      - 对投资逻辑的传导
      - 行动含义
    rows:
      - - 合并后客户流失
        - 合并完成后 12 个月内，Accolade 存量雇主合同流失超过 15%
        - 收入基础跌破 $475M；合并倍数重估至悲观情景区间；整合逻辑坍塌
        - 立即更新尽调；减持或退出；监控 2025 年 Q3 客户留存披露
      - - EBITDA 为负轨迹延长
        - 到 FY2026，合并调整后 EBITDA 仍低于 -$30M
        - 现金消耗加速；下轮降估值风险；投资者信心削弱；公司 IPO 窗口关闭
        - 要求管理层更新指引；评估烧钱速度 vs. 现金头寸；评估过桥融资风险
      - - 关键人离开
        - Accolade 交易完成后 24 个月内，Glen Tullman 或 Hemant Taneja / Lee Shapiro 退出领导层
        - 投资者信心受挫信号；战略方向可能变化；董事会治理不确定
        - 列入观察；索取董事会和领导层交接计划
      - - 技术整合失败
        - 到 2025 年底仍未把 WayFinding 和 Accolade 平台统一成单一会员体验
        - 产品差异化叙事受损；雇主合同续约承压；AI 主张未获验证
        - 索取产品路线图和整合里程碑；做客户访谈核验
    notes: 阈值是定性基准，来自可比数字健康并购整合分析。截至 2026 年 5 月，没有公开披露 Transcarent 内部整合 KPI 或流失数据。
