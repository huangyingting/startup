      - number: '6.4'
        title: 客户成功指标与留存信号
        blocks:
          - type: paragraph
            body: >
              合并后实体的留存数据未公开披露。目前最可信的数据点来自 Accolade 合并前管理层：CEO Rajeev Singh 在 2022 年 4 月表示， Accolade 历史雇主客户留存率一直高于 95%，并把
              Comcast 离开描述为孤立事件。该指标早于合并，只适用于先前管理层下的 Accolade 传统客户基础，不能假定它反映合并后实体当前走势。


              会员层面的满意度指标在可得处更强。Oregon OHA 审阅的西海岸健康计划案例研究显示，Surgery Care 会员 NPS 为 83+， 明显高于典型医疗服务基准。FeaturedCustomers 报告
              Transcarent 在 368 个推荐评分中的综合评分为 4.8/5， 但这是供应商提交的精选集合，并非代表性样本。Comparably 平台上 Accolade 的 NPS 为 -34，即 67%
              为贬损者、 33% 为推荐者；这是一个令人担忧的独立信号，与 Surgery Care NPS 83+ 相冲突，若没有代表性雇主客户样本的一手数据，无法调和。


              第三方认可包括连续两年进入 CNBC Disruptor 50（2024 年第 #17，2025 年第 #14），以及 Oregon OHA 在无不利发现情况下批准合并。 无论是 Transcarent
              单体还是合并后组织，净留存率（NRR）、总留存率（GRR）和单客户续约率均未公开披露； 这些仍是最高优先级尽调数据请求。
