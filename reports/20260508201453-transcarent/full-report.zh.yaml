  - id: FR003
    title: 依赖关系图
    type: dag
    layout: standard
    summary: >
      依赖关系图识别出 Transcarent 合并后的 11 项关键依赖。风险最高的五项依赖是：（1）雇主客户基础（收入集中）；（2）Glen Tullman
      个人（战略和资本）；（3）云基础设施（运营连续性）；（4）98point6 AI 引擎（产品差异化）；以及（5）HHS OCR（对 20M 成员 PHI 的 HIPAA 执法权）。Accolade 旧平台（PlushCare /
      2nd.MD）是一项过渡性依赖，会贯穿整合期；如果迁移延迟，风险会叠加。
    approximationNotes: |
      云提供商身份（AWS/Azure）是行业标准假设；公开来源未确认。经纪人渠道依赖依据自保雇主福利购买的行业惯例推断；具体渠道组合未披露。
