  - number: 3
    title: 竞争格局
    sections:
      - number: '3.1'
        title: 竞争格局概览
        blocks:
          - type: paragraph
            body: >
              Transcarent 所在的雇主健康导航与护理交付市场增长很快，整合方案需求正在重塑供应商竞争。根据 Quantum Health 赞助的 2024 年 Employee Benefit News 研究，37%
              的雇主已经提供医疗导航平台，89% 正在主动采取降本行动。 MedCity News 发布的 2024 年顾问调查显示，63% 的福利顾问称客户正把数字健康点状解决方案整合到统一导航平台下。
              市场包含三类重叠竞争者：（1）专门的护理导航和健康倡导平台（Quantum Health、Accolade、Included Health、Health Advocate），
              （2）向导航延伸的虚拟护理和远程医疗服务方（Teladoc Health、Amwell），以及（3）向平台形态上移的病种型数字健康点状解决方案（Hinge Health 做 MSK，Spring Health 和
              Lyra Health 做心理健康，Garner Health 做医生质量，Rightway Health 做导航加 PBM）。 根据 Grand View Research 和 Mordor
              Intelligence，全球医疗导航平台市场在 2025 年估计约 $11–12 billion，并预计到 2030 年达到 $17.6 billion。Rock Health 2024
              年年终综述记录，美国数字健康风险融资总额为 $10.1 billion，覆盖 497 笔交易，其中心理健康和护理导航位居融资最多类别。自保大型雇主是主要战场，福利顾问和经纪商则是所有竞争平台关键购买决策影响者。
