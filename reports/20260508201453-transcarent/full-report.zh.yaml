        - IPO 前估值 $6.5B；2025 年 5 月 IPO；2,350+ 家雇主客户
        - 自保雇主、健康计划
        - 面向 MSK 的 AI 教练 + 可穿戴设备；客户留存率 98%；覆盖 Fortune 100 的 49%
        - MSK 范围窄；点状解决方案；不是完整导航平台
      - - Spring Health
