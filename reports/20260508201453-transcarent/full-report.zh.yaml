      - number: '1.3'
        title: 领导层与治理
        blocks:
          - type: paragraph
            body: |
              Transcarent 由创始人兼 CEO Glen E. Tullman 领导；过去三十年，他曾创建并扩张多家医疗科技公司。
              在 Transcarent 之前，Tullman 是 Livongo Health 的创始人兼执行董事长（2020 年以 $18.5 billion 出售给
              Teladoc），并担任 Allscripts CEO 15 年。Tullman 也是 7wireVentures 的联合创始人兼管理合伙人；该公司是领先的早期数字健康风投机构，
              AUM 超过 $500 million。2024 年，他又成立了独立的 $100 million 个人基金 62 Ventures。

              Accolade 合并完成后，Snezana Mahon, PharmD 晋升为总裁。高管团队包括 Stephanie Peng（CFO）、Connie Hwang MD（Chief
              Clinical Officer）、联席 CTO Praful Kaul 和 Drew Garner（Accolade）、Laurie McGraw（Chief Commercial Officer）、
              Caitlin Fleming（Chief Strategy Officer）以及 Erica Davila（General Counsel）。董事会由前 Merck CEO Ken Frazier 担任主席。
              Lee Shapiro（7wireVentures）和 Hemant Taneja（General Catalyst）作为主要投资方代表担任董事。

              关键人集中风险集中在 Glen Tullman：他的个人品牌、融资关系和战略愿景与公司深度绑定。
              Tullman 同时担任 CEO 和 7wireVentures 管理合伙人（该机构参与所有一级融资轮并为主要投资方），围绕关联方交易形成治理考量。
              Accolade CEO Rajeev Singh 在 2025 年 4 月合并完成后未留任合并后组织。
