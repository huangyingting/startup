  - id: TI005
    title: 公开财务缺口表
    description: >
      Identification of financial metrics that are not publicly available for Transcarent, the impact of those gaps on
      financial underwriting, and the recommended diligence path.
    columns:
      - 缺失指标
      - 对承销判断的影响
      - 精确尽调路径
    rows:
      - - Transcarent 独立收入（FY2021–FY2024）
        - 无法对标自然增长率、收入质量，或相对于 $2.2B 估值的贡献
        - 要求提供 FY2022–FY2024 经审计财务报表；与任何管理层收入披露核对；交叉核验收购前 98point6 和 BridgeHealth 收入
      - - Transcarent 独立毛利率
        - 无法确认服务交付成本结构，也无法判断 Accolade 38–48% 区间是否具代表性
        - 要求按产品线提供 P&L；与 Accolade 收入成本结构对比；要求给出 98point6 交易前 / 后毛利率桥表
      - - 月度净烧钱速度（当前）
        - 无法验证现金跑道是否充足；缺少烧钱背景，$126M Series D 不足以支持资本充足性判断
        - 要求提供 2024 年 1–12 月月度经营现金消耗；要求提供合并后实体 2025 年预计烧钱计划
      - - 净收入留存率（NRR）
        - 无法评估客户扩张与流失；Comcast 流失说明存在 NRR 风险
        - 要求按产品队列提供 NRR；要求提供雇主续约率和平均扩张百分比
      - - 获客成本（CAC）与回本周期
        - 无法评估商业效率，也无法判断 $175M 新业务目标落空是否反映结构性 CAC 问题
        - 要求提供经纪渠道与直销渠道 CAC；要求提供平均销售周期；核验经纪佣金结构
      - - 合并后实体 FY2025 与 FY2026 备考收入
        - 无法验证 $500M+ 合并收入说法，也无法评估整合相关收入风险
        - 要求提供包含收入假设的整合计划、客户迁移时间表，以及收购后 Accolade 客户流失风险评估
      - - Accolade FY2025 全年实际值（收购后）
        - Accolade 最后一个公开季度为 FY2025 Q3（约 $105M 收入）；FY2025 最终业绩已不再公开
        - 向管理层要求 Accolade FY2025 全年业绩；与收购前接近 $500M 的指引对比
    claimRefs:
      - CI014
      - CI015
      - CI016
      - CI031
    notes: |
      上述项目都是财务承销判断的重大尽调阻断点。Accolade 公开监管文件历史（FY2020–FY2024）提供唯一经审计基线。 Transcarent 是非上市公司，因此所有独立财务说法都需要管理层验证和审计师确认。
