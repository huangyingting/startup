      - number: '5.2'
        title: AI 与技术差异化
        blocks:
          - type: paragraph
            body: >
              Transcarent 的 AI 差异化建立在三根支柱上：(1) 随 98point6 收购而来的约一百万条有记录医患聊天互动自研训练数据集； (2) 自建的多智能体 AI 架构；以及 (3)
              分层临床安全体系，包括人在回路审核、代码审计、偏见监测和临床医生监督。


              公司的 LLM 训练使用真实临床互动数据，而不只是医学文献，因此分诊和路由建议有经验数据支撑。 截至 CES 2026，WayFinding 2.0 智能体平台会把临床模型、福利规则、会员偏好和长期记忆库
              （Total Recall Memory Engine™）融合起来，编排多个自主智能体。它们负责症状分诊、服务方搜索与预约（语音 AI 预约）、
              药房协调、复诊提醒和福利信息呈现，把平台从“聊天助手”模式推进到“智能体行动”执行。


              Transcarent 的安全治理遵循 OECD AI 原则和 NIST 风险管理框架，公司也是 Data & Trusted AI Alliance（D&TA）成员， 该联盟为其负责任 AI 政策提供参考。AI
              产品被明确定位为护理导航支持工具，而不是诊断或治疗工具。 公司尚未发布自研 LLM 的独立临床准确性基准。Transcarent 称，症状检查安全评估基于对其附属医疗集团内数百万条医生互动记录的分析。


              语音 AI 预约（WayFinding 2.0）会根据 Transcarent 的服务方质量数据、网内状态、偏好语言和地理偏好选择服务方。 症状检查模块使用的数据集来自同一医患互动语料。Personalized
              Health Path™ 功能会为每位会员生成动态预防护理路径； 该路径结合护士、医生和专科医生的临床输入，以及 AI 风险分析。
