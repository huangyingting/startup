      - number: '6.5'
        title: 客户风险与反向信号
        blocks:
          - type: paragraph
            body: >
              记录最充分的反向客户信号，是 2022 年 Comcast 离开 Accolade。Accolade 文件称 Comcast 是其合作 12 年的最大客户， 贡献收入低于
              10%；该客户因管理层变化和激进重谈价格要求而终止关系，而 Accolade 拒绝接受这些要求。 公告导致 Accolade 股价单日下跌 50.2%，为其 2020 年 IPO 以来最大跌幅。一位 Stifel
              分析师指出，在部分顾问中， “standalone navigation/advocacy offerings” 的需求已经放缓，暗示 Transcarent 从 Accolade
              继承的倡导产品线可能面临结构性逆风。


              其他风险信号包括：(1) 公开披露的具名雇主客户有限，使外部无法独立验证部署质量和续约状态；(2) Accolade 在 Comparably 的 NPS 为
              -34，显示被衡量受众对倡导产品线存在明显不满；(3) 客户收入集中度未知——前 5–10 家雇主在 ARR 中是否占比过高并不清楚；(4) 整合风险——Accolade
              合并期间，服务中断或产品缺口可能在交易完成后 24 个月的合同续约窗口触发流失； (5) 医疗成本通胀上升（CEO Tullman 引用的顾问基准为每年 8–18%）迫使雇主主动审查福利供应商，这对
              Transcarent 是双刃剑。
            claimRefs:
              - CU015
              - CU016
              - CU018
              - CU029
              - CU031
              - CU032
      - number: '6.6'
        title: 图表材料
