        title: 展示材料
        blocks:
          - type: callout
            title: 巨大且结构性增长的 TAM
            body: >
              美国自保雇主健康福利市场每年支出约 $600 billion，整体 ESI 超过 $900 billion。医疗成本每年以 6–9% 通胀， 保证美元口径机会逐年扩大。导航平台赛道以 8.4% CAGR
              增长，并有望在雇主意识到导航可以撬动大部分医疗支出后，因 AI 驱动而重估。
            calloutType: strength
            claimRefs:
              - CM004
              - CM005
              - CM008
              - CM010
          - type: callout
            title: 合并后规模带来结构性优势
            body: >
              Transcarent 于 2025 年 4 月以 $621 million 收购 Accolade，按会员数打造出最大独立导航平台（20M+）。 这一规模具有战略意义：它提供专有使用数据以提升 AI
              导航质量，降低每会员技术成本，并为大型雇主 RFP 提供可替代支付方内嵌导航的可信选项—— 让 Transcarent 从挑战者重新定位为品类领导者。
            calloutType: insight
            claimRefs:
              - CM025
              - CM026
              - CM033
          - type: callout
            title: 支付方既有地位与切换成本约束
            body: >
              最持久的竞争约束是支付方既有地位：通过与 UnitedHealthcare、Cigna 或 Elevance 的 ASO 合同获得打包导航服务的雇主，
              面临显著切换摩擦。拆分导航需要重新谈判健康计划关系、让会员重新注册新 app，并承担变更管理成本。Transcarent 的承担风险模式有助于抵消 ROI
              论证，但结构性切换壁垒仍是真实的采用约束，尤其是在经纪商关系偏向既有健康计划的中型市场雇主中。
            calloutType: risk
            claimRefs:
              - CM024
              - CM029
          - type: callout
            title: 尽调优先级：拆分 SAM 并三角验证 SOM
            body: >
              目前没有公开市场研究直接测算 Transcarent 作为面向自保雇主的一体化“导航 + 虚拟护理”平台的可服务市场。尽调应要求查看 Transcarent 自身 TAM/SAM
              模型、按雇主细分（员工规模层级）的管线数据，以及赢 / 输分析，以三角验证公司对可定义目标市场的实际渗透。 缺乏可信 SAM 估计，是最主要的市场规模尽调缺口。
            calloutType: recommendation
