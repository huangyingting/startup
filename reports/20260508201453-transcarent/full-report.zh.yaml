      - number: '1.7'
        title: 负面事件与批评
        blocks:
          - type: paragraph
            body: |
              2025 年，Transcarent 遭遇了有分量的负面报道。最重要的批评集中在收购 Accolade 代表的战略反转。
              2021–2024 年，Tullman 公开把护理导航公司称为过时的 “travel agents”，并称 “you can't navigate a broken system”——
              但在 2025 年 1 月以 $621 million 收购了美国最大的独立护理导航商。MedCity News 2025 年 2 月调查援引多名前员工在 NDA 下的说法称，
              Transcarent 2024 年新业务销售目标为 $175 million，但实际表现可能只有 $55–60 million——约为目标的 30%。
              公司拒绝确认收入数字。

              法律层面，Halper Sadeh LLC 和 Ademi LLP 等股东律师事务所于 2025 年 2 月启动调查，关注 Accolade 董事会接受每股
              $7.03 收购价是否违反信义义务。截至合并完成，尚未有正式集体诉讼提交。Oregon Health Authority 根据该州 Health Care Market Oversight 项目开展了初步
              30 天监管审查；审查于 2025 年 4 月 7 日结束，未阻止交易。

              Accolade 还带来继承客户和市场认知包袱。被 Transcarent 收购前，Accolade 于 2022 年失去 Comcast——这个服务了 12 年、占收入不到
              10% 的最大客户——引发公开市场剧烈反应，并让市场质疑独立倡导供应商需求。Accolade 自身历史也高度依赖收购：它于 2020 年上市，
              之后收购 2nd.MD 和 PlushCare，最终以疫情时期市值的一小部分价格出售给 Transcarent。因此，整合问题不只是运营规模，
              还在于 Transcarent 能否留住并升级一个增长已放缓的传统倡导客户群。
            claimRefs:
