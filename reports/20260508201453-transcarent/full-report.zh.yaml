      - number: '1.6'
        title: 客户基础、商业打法与具名验证
        blocks:
          - type: paragraph
            body: |
              Transcarent 主要卖给大型自保雇主和健康计划，HR、福利和财务高管是核心经济买方。Accolade 合并前，Fierce Healthcare 报道称
              Transcarent 服务超过 300 家雇主客户，另有健康计划客户。收购 98point6 也把 100+ 家自保雇主关系带入生态；Accolade 则贡献了规模更大的雇主、健康计划、
              倡导、专家意见和虚拟初级护理客户装机基础。交易完成后，合并平台的 1,700+ 客户和 20M+ 合格会员成为头部规模指标，
              但活跃使用率、续约率，以及按客户划分的收入集中度仍未披露。

              商业打法是企业 B2B，并由福利顾问推动：雇主会把 Transcarent 评估为替代或整合层，用来整合碎片化点状解决方案、传统导航供应商、手术 COE 项目和药房福利透明工具。
              承担风险的定价是销售话术核心，因为它承诺可衡量节省，而不是又一项按员工每月计费的导航费。公开具名客户证据仍然稀薄；这在雇主健康福利市场并不罕见，
              但构成尽调约束。最强验证点是匿名西海岸健康计划案例研究；更广泛验证需要在 NDA 下查看客户队列、续约排期、经纪商赢 / 输数据，
              以及对节省主张的独立精算验证。
            claimRefs:
