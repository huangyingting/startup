      该漏斗展示从初始潜在客户池，到已签约客户和活跃使用成员的雇主获取与成员部署路径。两个关键转化瓶颈很明确：一是把经纪人背书的潜在客户转化为已签约雇主合同（RFP 市场竞争激烈，Quantum Health、Included
      Health、Accolade 旧业务等都在场）；二是把已注册成员转化为活跃平台用户（所有数字健康平台都面临的参与度挑战）。合并后的 1,700+ 客户数构成可观签约基础，但相对于 20M+
