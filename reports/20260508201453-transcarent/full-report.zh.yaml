      - number: '8.2'
        title: 收入倍数分析与上市可比公司
        blocks:
          - type: paragraph
            body: >-
              上市数字健康可比公司从 2021 年峰值到 2024–2026 年交易水平经历了剧烈重估下修。行业风向标 Teladoc Health（TDOC）截至 2026 年 5 月在约 $2.5B 年收入上以约
              0.63x EV/Revenue 交易；2021 年收购 Livongo 后计提 $6.6B 商誉减值，倍数从 8x+ 回落。Progyny（PGNY）是一家专科生育福利管理商，在约 $1.3B 收入上以约
              1.2x P/S 交易，利润率在改善。Evolent Health（EVH）以 0.7x EV/Revenue 交易，反映高杠杆和利润率压力。Alignment Healthcare（ALHC）以 0.77x
              EV/Sales 交易，收入约 $4.3B，是利润薄的价值医疗赋能商。近期 IPO 中，Hinge Health（HNGE）于 2025 年 5 月上市，隐含市值约 $3B，目前以约 5.98x
              EV/Revenue 交易；鉴于其面向雇主的数字健康模式和 77% 毛利率，它可能是最相关可比。上市数字健康 EV/Revenue 中位数约 1–2x；从 0.6x（承压）到
              6x（高增长溢价）的区间很宽。Transcarent 合并收入基础（$550M）若按 4–5x EV/Revenue 估值，意味着 $2.2B–$2.75B 企业价值——与 Series D
              参考价一致，也说明定价合理但略偏高。关键溢价驱动来自 AI 差异化（WayFinding 生成式 AI 平台）、风险共担定价模式和并购后规模。
