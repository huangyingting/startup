  - id: TP003
    title: 定价 / 打包方式对比
    columns:
      - 竞争对手
      - 定价模式
      - 估算价格区间
      - 包含能力
      - 主要折扣或未知项
      - 对 Transcarent 的含义
    rows:
      - - Transcarent（WayFinding）
        - PEPM + 基于结果的组成部分
        - 声称较传统导航商低约 50%；确切费率未披露
        - 导航 + AI + 药房 + 手术 CoE + 远程医疗
        - 具体标价保密；雇主合同未公开
        - 价格优势主张未验证；必须发布独立 ROI 才能支撑顾问推荐
      - - Quantum Health
        - 按登记会员 PEPM
        - 估算 $5-$12 PEPM（市场估计）
        - 导航 + 照护协调 + Real-Time Intercept
        - 面向大型雇主群体的批量折扣
        - 价格锚点成熟；Transcarent 必须证明总价值高于单位成本
      - - Accolade
        - 按合格员工 PEPM
        - 估算 $9-$20 PEPM（分析师估计）
        - 导航 + 倡导 + 临床团队 + 专家意见
        - 可提供多年期和多产品折扣
        - 高成本可能给 Transcarent 这类数字原生替代方案留出缺口
      - - Teladoc Integrated Care
        - PEPM + 按次就诊费
        - 估算基础 $2-$6 PEPM + 就诊费（估算）
        - 虚拟问诊 + 慢病管理 + 心理健康
        - 通过 UHC/Aetna/Cigna 嵌入保险公司的捆绑折扣
        - 保险公司渠道让 Teladoc 拿到 Transcarent 目前缺少的规模；捆绑定价很难对抗
      - - Spring Health
        - 按合格员工 PEPM
        - 估算 $3-$5 PEPM（随方案深度变化）
        - 心理健康服务入口 + EAP 替代 + 教练 + 用药管理
        - 绩效保证；JAMA 研究引用 1.9x ROI
        - 仅覆盖心理健康；Transcarent 覆盖面互补，但价格要跟覆盖宽度匹配
      - - Hinge Health
        - 基于结果（登记会员 PPPM）
        - 登记 MSK 会员估算 $15-$25 PPPM
        - 数字 PT + AI 指导 + 可穿戴设备 + 可选线下服务（HingeSelect）
        - 手术避免保证声称最高降低 60%
        - 基于结果的定价可供 Transcarent 更广泛采用
      - - Garner Health
        - 按会员激励模式
        - 雇主成本接近 $0 PEPM + 员工激励报销
        - 医生质量导向 + 用经济激励引导会员看优质医生
        - 保证第 1 年理赔成本降低 12%；激励模式可自我筹资
        - 定价架构不同；雇主 ROI 优先的模式可能挑战传统 PEPM 对比
    notes: 未上市公司的 PEPM 和 PPPM 估算基于分析师评论和市场报告，不是经审计的合同数据。所有竞争对手都未公开确切定价。所有价格区间只能视为用于示意对比的市场估算。
