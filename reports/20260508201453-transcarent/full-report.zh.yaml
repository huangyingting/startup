      - number: '5.4'
        title: 技术收购策略与自研资产
        blocks:
          - type: paragraph
            body: >
              Transcarent 有意采用以收购带动 IP 的策略来搭建技术栈，而不是完全内部开发 AI 和临床能力。两笔关键收购是：


              **98point6（2023 年 3 月，约 $100M）**：收购 AI 驱动虚拟护理平台、附属医疗集团和客户基础（包括 Boeing、Costco、Chipotle、
              Aetna、Banner|Aetna）。核心战略资产是 98point6 约一百万条有记录医患聊天互动数据集，用作 Transcarent 自研 LLM 的训练数据。CEO Glen Tullman
              估计，相比缺乏同等自研训练数据的竞争对手，这让 Transcarent 在临床 AI 上获得 “领先三到四年，甚至五年”的优势。收购后，98point6
              Technologies（剩余部分）更名并转向向第三方医疗系统授权技术平台的 SaaS 模式。


              **Accolade（2025 年 1 月宣布，2025 年 4 月完成，$621M）**：收购 Accolade 的患者倡导平台、14M+ 覆盖人群、 1,400+ 家雇主 /
              健康计划客户、PlushCare（虚拟初级保健）和 2nd.MD（专家医学意见）。Accolade 贡献了 SSAE 18/SOC 审计和 NCQA/URAC 认证。合并实体报告 21M+ 会员和 1,700+
              客户。战略理由是把 Accolade 高接触度人工倡导模式，与 Transcarent 的 AI 优先方法并列起来。


              自研资产包括：医患互动训练语料（Accolade 并入后现估计为数百万次互动）、Total Recall Memory Engine™（持久会员健康记忆）、 多智能体编排架构，以及直接签约的 COE
              网络关系。平台已获得 HITRUST、SOC 2 和 ISO 27001 认证，证明其具备企业级信息安全控制。
