  - id: FU001
    title: 客户旅程图
    type: journey-map
    layout: wide
    summary: >
      该图覆盖一家大型自保雇主的端到端旅程：从最初意识到问题，到与 Transcarent
      签约、成员入职、活跃使用，再到续约或扩张。五类不同角色在不同阶段参与：HR/福利负责人（买方）、经纪人/顾问（中介）、员工/成员（用户）、计划管理员（运营方）和 Health Guide/Care
      Advocate（服务交付）。关键拐点包括经纪人背书（对获新客至关重要）、成员 App 采用率（影响使用指标和雇主 ROI）以及年度续约窗口（决定留存和扩张）。典型企业销售周期为 3–9 个月；入职上线需 60–90
      天；续约讨论在合同到期前 90 天开始。
    approximationNotes: >-
      旅程阶段依据公开产品描述、Fierce Healthcare 的 CEO 访谈表述、West Coast Health Plan 案例研究，以及企业健康福利采购的标准惯例推断。Transcarent
      未公开披露各阶段之间的具体转化率。
    data:
      nodes:
        - id: awareness
          label: 问题意识
          detail: HR/福利负责人发现医疗成本上升（顾问基准显示年通胀 8–18%）、员工对福利参与度低，或特定高成本理赔类别（手术、专科药房、癌症）。触发因素通常是经纪人的年度基准报告，或 CFO 发出的成本审查要求。
        - id: discovery
          label: 发现与评估
          detail: >-
            年度福利战略规划期间，经纪人/顾问引入 Transcarent。雇主向 2–4 家供应商发出 RFP，包括 Transcarent、Quantum Health、Included Health
            等。Transcarent 提供演示、ROI 建模和参考案例研究。销售周期：3–9 个月。
        - id: selection
          label: 签约与选择
          detail: 双方谈判多年期合同（通常 2–3 年）。PEPM 和/或按病例计价最终确定。法律与合规审查完成。HR 拿到预算批准。模块选择随之确定：仅 WayFinding、叠加手术 COE，或包含药房和倡导服务的全套方案。
        - id: onboarding
          label: 入职与上线
          detail: 员工沟通活动启动；App 下载推广执行；福利数据与既有承保方集成。Health Guide 团队完成分配。开放注册集成完成。目标：WayFinding 参与度基线要求前 60 天 App 注册率 >20%。
        - id: utilization
          label: 活跃使用
          detail: >-
            成员使用 WayFinding 做福利导航和就医路由。虚拟医疗通过 98point6 支撑的平台接入。择期手术使用手术 COE。药房福利通过平台管理。复杂病例启用 Accolade 倡导服务。患有癌症、体重健康或
            MSK 需求的成员被路由到专科项目。
        - id: renewal
          label: 续约与扩张
          detail: >-
            年度账户审查包括节省证明、ROI 展示和 NPS 报告。公司交叉销售更多模块（Cancer Care、Weight Health、药房、Accolade 倡导服务）。随后谈判多年期续约。经纪人与雇主验证
            ROI，并建议续约或重新竞标。成功的落地后扩张把 NRR 推到 100% 以上。
    claimRefs:
      - CU004
      - CU019
      - CU020
      - CU033
      - CU036
  - id: FU002
    title: 采用 / 部署漏斗
    type: funnel
    layout: standard
