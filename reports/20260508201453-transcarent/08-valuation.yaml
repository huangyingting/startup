  - id: S02
    title: Revenue Multiple Analysis and Public Comparables
    body: >-
      Public digital health comparables experienced dramatic de-rating from 2021 peaks to 2024–2026 trading levels.
      Teladoc Health (TDOC), the sector bellwether, trades at approximately 0.63x EV/Revenue on ~$2.5B annual revenue as
      of May 2026, down from 8x+ in 2021 following the $6.6B Livongo goodwill impairment. Progyny (PGNY), a specialty
      fertility benefits manager, trades at approximately 1.2x P/S on ~$1.3B revenue with improving margins. Evolent
      Health (EVH) trades at 0.7x EV/Revenue reflecting high leverage and margin pressure. Alignment Healthcare (ALHC)
      trades at 0.77x EV/Sales on ~$4.3B revenue, a value-based care enabler with thin profits. Among recent IPOs, Hinge
      Health (HNGE) went public in May 2025 at an implied ~$3B market cap and now trades at approximately 5.98x
      EV/Revenue — arguably the most relevant comparable given its employer-focused digital health model and 77% gross
      margins. The median public digital health EV/Revenue lands at approximately 1–2x; the range from 0.6x (distressed)
      to 6x (premium growth) is wide. Transcarent's combined revenue base ($550M) at 4–5x EV/Revenue would imply a
      $2.2B–$2.75B enterprise value — consistent with its Series D reference price and suggesting
      fair-to-slightly-stretched pricing. The key premium drivers are AI differentiation (WayFinding generative AI
      platform), at-risk pricing model, and post-merger scale.
