    rows:
      - - Scale & Market Position
        - 20M+ members, 1,700+ clients — largest independent employer health navigation platform post-Accolade
        - >-
          Scale acquired at fire-sale ($621M vs. Accolade $3.5B peak) signals buyer of distressed assets, not market
          leader
        - Client retention above 95% in first 12 months post-merger would confirm scale is defensible
      - - AI Differentiation
        - >-
          WayFinding generative AI platform integrates care navigation, clinical guidance, and care delivery in one
          experience
        - >-
          No published clinical accuracy benchmarks; competitors (Quantum Health, Included Health) rapidly adding AI
          capabilities
        - Independent clinical validation study or CMS certification of AI recommendations
      - - Revenue and Growth
        - Combined $550M revenue base with Accolade growing 14% YoY provides scale foundation
        - >-
          Transcarent standalone revenue (~$85M) missed estimated $175M 2024 target; Accolade was EBITDA-negative at
          acquisition
        - Audited FY2025 revenue showing 15%+ combined growth and improving EBITDA margin
      - - Founder / Investor Pedigree
        - Tullman / Taneja / Shapiro Livongo track record; General Catalyst and 7wireVentures tier-1 backing
        - Glen Tullman publicly dismissed care navigation as obsolete then acquired largest navigator — credibility risk
        - No further strategic about-turns; steady execution against stated integration roadmap
      - - Valuation Entry Point
        - 4–5x combined revenue is within precedent range; AI premium justifiable if growth re-accelerates
        - 26x standalone revenue is expensive; Accolade public market precedent shows 1.4x is the realistic M&A exit
        - Disclosure of 4Q25 revenue run-rate above $600M with positive adjusted EBITDA at combined entity
      - - Exit Pathway
        - Digital health IPO window reopened (Hinge Health, Omada Health IPOs in 2025); M&A consolidation active
        - No stated IPO timeline; venture preference stack may impair common equity value at current valuation
        - IPO filing or strategic sale announcement with clear return of capital to common shareholders
