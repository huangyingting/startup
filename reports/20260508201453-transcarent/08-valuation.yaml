  - id: TV005
    title: Thesis-break and kill triggers table
    columns:
      - Trigger
      - Threshold
      - Transmission to Thesis
      - Action Implication
    rows:
      - - Post-merger client churn
        - Greater than 15% of Accolade-legacy employer contracts lost in 12 months post-close
        - Revenue base erodes below $475M; combined multiple re-rates to bear-case range; integration thesis collapses
        - Immediate diligence update; reduce position or exit; monitor Q3 2025 client retention disclosures
      - - EBITDA-negative trajectory extension
        - Combined adjusted EBITDA remains below negative $30M through FY2026
        - Cash burn accelerates; down-round risk; investor confidence erodes; IPO window closes for company
        - Request management guidance update; assess burn rate vs. cash position; evaluate bridge financing risk
      - - Key-person departure
        - Glen Tullman or Hemant Taneja/Lee Shapiro exit from leadership within 24 months of Accolade close
        - Investor confidence signal; potential strategic direction change; board governance uncertainty
        - Place on watch; request board and leadership transition plan
      - - Technology integration failure
        - Failure to unify WayFinding and Accolade platforms into single member experience by end-2025
        - Product differentiation narrative undermined; employer contract renewals at risk; AI claims unvalidated
        - Request product roadmap and integration milestones; conduct customer reference checks
    notes: >-
      Thresholds are qualitative benchmarks derived from comparable digital health merger integration analyses. No
      public disclosure of Transcarent's internal integration KPIs or churn data exists as of May 2026.
