    title: Recommendation logic
    type: flow
    layout: standard
    summary: >-
      Chain from four assessment pillars — Scale & Proof, AI Differentiation, Risk Profile, and Valuation Discipline —
      through an Evidence Gap node, to the final recommendation of Research-More / Track. Scale and AI are positive
      inputs; Risk and Evidence Gaps are constraining inputs that prevent a conviction Buy. The flow shows that no
      single pillar alone drives the recommendation; the combined weight of execution risk, financial opacity, and
      stretched standalone valuation override the strengths of scale and management pedigree.
    approximationNotes: >-
      Flow represents qualitative logical relationships, not quantitative probability weights. Node labels are editorial
      assessments based on public evidence as of May 2026.
