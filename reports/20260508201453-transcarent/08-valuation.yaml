  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: Audited post-merger financials
      missingEvidence: >-
        No audited FY2025 combined income statement, balance sheet, or cash flow statement for the merged
        Transcarent-Accolade entity. All revenue and EBITDA figures are estimates or unaudited management disclosures.
      whyItMatters: >-
        Without audited financials, valuation multiples and all scenario analyses are conditional on unverified inputs.
        The 4–5x combined revenue multiple thesis cannot be confirmed without knowing actual combined revenue, EBITDA
        trajectory, and cash burn.
      diligencePath: >-
        Request audited FY2025 financials and Q1 2026 unaudited interim from management; require as precondition for any
        investment commitment.
      relatedQuestionRefs:
        - QV026
        - QV029
        - QV033
      relatedTableRefs:
        - TV006
    - type: private-evidence-only
      severity: material
      topic: Cap table and preference overhang
      missingEvidence: >-
        No public cap table or liquidation waterfall analysis available. With $450M+ raised across multiple rounds,
        preference overhang could materially impair common equity value at exit.
      whyItMatters: >-
        A high preference stack can reduce common shareholder value to near zero at a $2.2B exit, even if the enterprise
        value is fair. This is critical for understanding return potential for any new investors.
      diligencePath: >-
        Request cap table, option pool, and waterfall analysis from management showing common equity value at $2.2B,
        $3B, and $4B exit scenarios.
      relatedQuestionRefs:
        - QV032
      relatedTableRefs:
        - TV006
    - type: missing-source
      severity: material
      topic: Transcarent standalone 2024 audited revenue
      missingEvidence: >-
        The only estimate of Transcarent's standalone FY2024 revenue (~$85M) comes from a third-party data service
        (Latka). Management has not disclosed or confirmed this figure. The $175M new business target disclosure came
        from a single unnamed former employee via MedCity News.
      whyItMatters: >-
        If standalone revenue is materially below the 26x-multiple implied by the $2.2B Series D valuation, the revenue
        miss thesis is strengthened and the valuation is harder to defend even on combined metrics.
      diligencePath: >-
        Request management-verified or audited standalone Transcarent FY2024 revenue figures; cross-reference with new
        ARR bookings and churn data.
      relatedQuestionRefs:
        - QV026
      relatedTableRefs:
        - TV006
    - type: missing-source
      severity: minor
      topic: Comparable valuation table coverage gaps
      missingEvidence: >-
        Included Health, Rightway Health, and Quantum Health current revenue and valuation data are not publicly
        available with sufficient precision to compute reliable EV/Revenue multiples. Omada Health (recent IPO) has
        limited trading history.
      whyItMatters: >-
        The comparable set in TV004 is partial; additional data points could shift the median multiple range and affect
        the base-case valuation conclusion.
      diligencePath: >-
        Monitor Included Health and Quantum Health for any revenue disclosures; track Omada Health IPO performance for
        6+ months before using as comparable.
      relatedQuestionRefs:
        - QV019
        - QV020
      relatedTableRefs:
        - TV004
    - type: private-evidence-only
      severity: material
      topic: Post-merger client retention and churn data
      missingEvidence: >-
        No public data on Accolade-legacy client churn or WayFinding adoption rates following the April 2025 merger
        close. Client retention is the single most important integration KPI.
      whyItMatters: >-
        The combined $550M revenue thesis depends on retaining 85%+ of Accolade-legacy clients. A churn rate above 15%
        would reduce revenue to below $475M, pushing the implied multiple above 5x and approaching the thesis-break
        threshold.
      diligencePath: >-
        Reference checks with 5+ enterprise clients; management-provided contractual renewal rate data; monitor press
        coverage of client wins and losses.
      relatedQuestionRefs:
        - QV033
      relatedTableRefs:
        - TV005
        - TV006
