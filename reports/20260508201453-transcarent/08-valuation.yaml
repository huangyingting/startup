  - id: TV006
    title: Final diligence asks table
    columns:
      - Topic
      - Missing Evidence
      - Why It Matters
      - Owner / Diligence Path
    rows:
      - - Audited post-merger financials
        - No audited FY2025 combined Transcarent + Accolade income statement, balance sheet, or cash flow
        - Without audited financials, all valuation analysis relies on estimates; EBITDA and cash burn are unverifiable
        - Management / data room; request FY2025 audited financials and Q1 2026 unaudited interim
      - - Client retention post-Accolade
        - No public churn data for Accolade-legacy clients following the April 2025 merger close
        - Integration success hinges on retaining Accolade's 1,700+ clients; a 10% churn wipes $45M+ from revenue base
        - Reference calls with 5+ enterprise clients; request contractual renewal rate data from management
      - - WayFinding utilization and clinical outcomes
        - No independent clinical validation of WayFinding AI recommendations; utilization rates not publicly disclosed
        - AI premium in valuation requires clinical proof; FDA regulatory clarity on CDS classification needed
        - Request utilization dashboard, member engagement metrics, and any IRB-approved outcomes study
      - - Standalone Transcarent 2024 revenue
        - FY2024 standalone revenue is estimated at ~$85M by Latka; no management-disclosed or audited figure
        - Revenue miss vs. $175M new-business target (per MedCity) may signal commercial model limitations
        - Request audited or management-verified FY2024 Transcarent standalone revenue and new ARR bookings
      - - Cap table and preference stack
        - No public cap table; preference overhang from $450M+ raised across Series A–D is unknown
        - High preference stack can impair common equity value at current valuation level; dilution unclear
        - Request cap table and waterfall analysis showing common equity value at $2.2B, $3B, and $4B exit scenarios
    notes: >-
