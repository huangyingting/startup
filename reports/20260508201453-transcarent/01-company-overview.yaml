callouts:
  - calloutType: risk
    title: "Strategic Pivot Risk — Tullman's Accolade Reversal"
    body: |
      Glen Tullman spent 2021–2024 publicly dismissing care navigation companies as
      obsolete, then acquired the largest independent navigator (Accolade) for $621M in
      January 2025. Former employees cited in MedCity News (Feb 2025) alleged standalone
      2024 new business sales reached only ~$55–60M against a $175M target, suggesting the
      reversal may reflect growth shortfalls. Integration execution risk is substantial.
    claimRefs:
      - CO026
      - CO029

  - calloutType: risk
    title: "Key-Person Concentration — Glen Tullman"
    body: |
      Glen Tullman's personal brand and fundraising relationships are central to
      Transcarent's capital strategy. His simultaneous roles as CEO, 7wireVentures managing
      partner (lead investor), and 62 Ventures founder create governance complexity. Board
      independence from primary investors warrants scrutiny in formal due diligence.
    claimRefs:
      - CO012
      - CO013

