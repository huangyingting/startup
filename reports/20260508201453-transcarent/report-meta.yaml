companyProfile:
  summary: >
    Transcarent is a consumer-directed health and care platform serving employees of
    self-insured employers through its AI-powered WayFinding™ experience. Founded in 2020
    by Glen Tullman, Lee Shapiro, and Hemant Taneja, the company raised ~$450M across four
    rounds before closing its acquisition of Accolade (NASDAQ: ACCD) in April 2025 for
    $621M, creating a combined entity with 20M+ members and 1,700+ employer and health
    plan clients. Public operating proof is strongest in Surgery Care, where an OHA-hosted
    West Coast health plan case study reported 20.5x ROI and $11M+ cumulative surgery savings.
  productSummary: >
    WayFinding™ (launched May 2024) is a mobile-first AI health navigation experience
    that routes members to appropriate care — virtual, surgical, specialist, or point
    solution — using large language models trained on ~1M physician-patient interactions
    acquired with 98point6 (March 2023). The platform includes surgical Centers of
    Excellence (COE), the Experience Store (point solution aggregator with SSO), and
    inherited Accolade health-pro human navigation. The product footprint also includes a
    10-health-system direct provider ecosystem and 2026 Pharmacy Care expansion through SmithRx.
  foundedDate: "2020-01-01"
  founders:
    - name: Glen Tullman
      role: Founder and CEO
      background: >
        Former Livongo founder and executive chairman; former Allscripts CEO; co-founder and
        managing partner of 7wireVentures, a lead Transcarent investor.
      claimRefs: [CO008, CO012, CO013]
    - name: Lee Shapiro
      role: Co-conceiver and 7wireVentures co-founder
      background: >
        7wireVentures leader and Livongo co-creator; part of the same institutional team that
        conceived Transcarent.
      claimRefs: [CO002, CO012]
    - name: Hemant Taneja
      role: Co-conceiver and General Catalyst CEO
      background: >
        General Catalyst leader and Livongo co-creator; investor representative on
        Transcarent's board.
      claimRefs: [CO002, CO012]
  foundingLocation: "San Francisco, CA, USA"
  headquarters: "San Francisco, CA (executive); Denver, CO (operational)"
  customerFocus: >
    Large self-insured employers and health plans, with HR, benefits, and finance leaders as
    the primary economic buyers. Post-Accolade, the combined platform reports 20M+ eligible
    members and 1,700+ employer and health plan clients; active utilization, renewal rates,
    and revenue concentration remain undisclosed.
  businessModel: >
    Enterprise B2B health-benefits platform with performance-aligned, at-risk pricing rather
    than standard up-front or per-employee-per-month navigation fees. Revenue is tied to
    measurable outcomes and savings across navigation, care access, surgery Centers of
    Excellence, pharmacy, point-solution aggregation, and inherited Accolade advocacy services.
  stage: "Growth-stage private; post-Series D; post-Accolade integration"
  fundingStatus: >
    Approximately $450M of primary equity raised through the May 2024 Series D, which valued
    Transcarent at $2.2B. The $621M Accolade acquisition closed in April 2025 and was financed
    through existing cash, new equity led by General Catalyst and 62 Ventures, and debt led by
    J.P. Morgan.
