  sector: "Digital Health / Employer Health Benefits"
  stage: "Growth (Series D)"

companyProfile:
  summary: >
    Transcarent is a consumer-directed health and care platform serving employees of
    self-insured employers through its AI-powered WayFinding™ experience. Founded in 2020
    by Glen Tullman, Lee Shapiro, and Hemant Taneja, the company raised ~$450M across four
    rounds before closing its acquisition of Accolade (NASDAQ: ACCD) in April 2025 for
    $621M, creating a combined entity with 20M+ members and 1,700+ employer and health
    plan clients.
  productSummary: >
    WayFinding™ (launched May 2024) is a mobile-first AI health navigation experience
    that routes members to appropriate care — virtual, surgical, specialist, or point
    solution — using large language models trained on ~1M physician-patient interactions
    acquired with 98point6 (March 2023). The platform includes surgical Centers of
    Excellence (COE), the Experience Store (point solution aggregator with SSO), and
    inherited Accolade health-pro human navigation.
  disclosureProfile: private-undisclosed

summary:
  headline: >
    Transcarent has assembled a compelling post-Accolade platform (20M+ members, 1,700+
    clients, >$550M guided combined revenue) led by a proven CEO, but the investment case
    hinges on unverified standalone financials, unresolved integration execution risk, and
    a $2.2B valuation that looks stretched against the sector's 2022-2024 de-rating.
    Defer commitment until FY2025 audited financials and post-merger churn data are
    available.
