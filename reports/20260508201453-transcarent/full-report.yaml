  - id: FV001
    title: Recommendation logic
    type: flow
    layout: standard
    summary: >-
      Chain from four assessment pillars — Scale & Proof, AI Differentiation, Risk Profile, and Valuation Discipline —
      through an Evidence Gap node, to the final recommendation of Research-More / Track. Scale and AI are positive
      inputs; Risk and Evidence Gaps are constraining inputs that prevent a conviction Buy. The flow shows that no
      single pillar alone drives the recommendation; the combined weight of execution risk, financial opacity, and
      stretched standalone valuation override the strengths of scale and management pedigree.
    approximationNotes: >-
      Flow represents qualitative logical relationships, not quantitative probability weights. Node labels are editorial
      assessments based on public evidence as of May 2026.
    data:
      nodes:
        - id: scale
          label: 'STRENGTH: Scale — 20M+ members, 1,700+ clients, $550M combined revenue'
          type: input
        - id: ai
          label: 'STRENGTH: AI — WayFinding generative AI; at-risk model; 98point6 technology'
          type: input
        - id: risk
          label: 'CONSTRAINT: Execution Risk — integration complexity; EBITDA-negative; no audited financials'
          type: process
        - id: valuation
          label: 'CONSTRAINT: Valuation — 26x standalone expensive; 5x combined conditional on integration'
          type: process
        - id: gap
          label: 'EVIDENCE GAP: No audited FY2025 financials; unknown post-merger churn; no clinical validation'
          type: process
        - id: rec
          label: 'RECOMMENDATION: Research-More / Track — re-evaluate on audited financials + H1 2025 KPIs'
          type: output
    claimRefs:
      - CV001
      - CV021
      - CV022
      - CV030
      - CV041
  - id: FV002
    title: Valuation sensitivity
    type: bar
    layout: wide
    summary: >-
      Bar chart showing implied enterprise values for Transcarent across five revenue multiple scenarios applied to the
      estimated combined post-Accolade revenue base of $550M. At the median public digital health multiple of ~1x
      revenue, the implied EV ($550M) is far below the current $2.2B private market valuation — illustrating that
      Transcarent carries a significant premium for growth, scale, and AI differentiation over distressed public peers.
      The current Series D price ($2.2B) aligns with a 4x revenue multiple on combined revenue, which is supported by
      Hinge Health public market trading (~6x) and precedent Quantum Health transaction (~3.4x). The bull case at 8x
      represents an AI-enabled premium scenario anchored by private peers Spring Health and Lyra Health.
    approximationNotes: >-
      Combined revenue of $550M is a management estimate (DealRoom, April 2025). Multiple scenarios are illustrative
      benchmarks derived from public comps and precedent transactions. Not a formal DCF or banking-grade valuation.
      Current EV of $2.2B reflects Series D post-money valuation; actual enterprise value post-Accolade acquisition may
      be higher given $621M cash paid and additional equity issued.
    data:
      items:
        - label: 1x (public sector median — distressed)
          value: 550
        - label: 2x (Accolade-type fire-sale range)
          value: 1100
        - label: 4x (base case — current Series D implied)
          value: 2200
        - label: 6x (Hinge Health IPO comparable)
          value: 3300
        - label: 8x (bull case — AI premium, private market)
          value: 4400
    claimRefs:
      - CV006
      - CV008
      - CV012
      - CV015
      - CV022
  - id: FV003
    title: Valuation / return range
    type: range
    layout: standard
    summary: >-
      Low, base, and high enterprise value estimates for Transcarent as of May 2026, reflecting bear, base, and bull
      scenarios respectively. Bear case ($1.2B–$1.65B) anchors on comparable M&A exit multiples at 2–3x combined revenue
      following integration disruption; base case ($2.2B–$2.75B) reflects current Series D pricing at 4–5x combined
      revenue with moderate integration success; bull case ($3.5B–$4.4B) reflects 6–8x combined revenue with AI premium
      and demonstrated EBITDA breakeven. The range is wide, spanning $1.2B to $4.4B, underscoring the binary nature of
      the integration execution risk and the importance of post-merger financial disclosure.
    approximationNotes: >-
      Ranges are analyst estimates based on comparable trading multiples and precedent M&A transactions. Combined
      revenue of $550M is a management estimate. No audited financial statements available to independently verify. WACC
      of 12–15% applied to a five-year DCF would converge near the base case mid-point at $2.4B assuming $100M
      normalized EBITDA achievable by 2028.
    data:
      items:
        - label: Bear Case EV — integration disruption, 2–3x combined revenue
          low: 1200
          high: 1650
          unit: $M
        - label: Base Case EV — moderate integration, 4–5x combined revenue
          low: 2200
          high: 2750
          unit: $M
        - label: Bull Case EV — AI premium, 6–8x combined revenue, EBITDA breakeven
          low: 3500
          high: 4400
          unit: $M
    claimRefs:
      - CV022
      - CV024
      - CV025
      - CV037
      - CV038
  - id: FV004
    title: Investment KPIs
    type: kpi
    layout: standard
    summary: >-
      IC-ready scoring of Transcarent across seven investment dimensions on a 1–5 scale (1 = weak, 5 = strong). Market
      opportunity and management pedigree score highest (4/5) given large employer health market and Livongo-proven
      team. Revenue traction and EBITDA economics score lowest (2/5) reflecting the opacity around standalone revenue,
      confirmed EBITDA negativity, and unresolved integration execution. Valuation attractiveness scores 2/5 at
      standalone metrics (26x revenue) and 3/5 at combined metrics (4–5x revenue). Overall weighted IC score: 2.9/5 —
      consistent with a Research-More / Track recommendation rather than a conviction buy.
    approximationNotes: >-
      Scores are editorial assessments by the analyst based on public evidence as of May 2026. No audited financial data
      available. Scores would likely improve materially if audited FY2025 combined financials confirmed $550M revenue
      with positive EBITDA trajectory.
    data:
      items:
        - label: Market Opportunity
          value: 4
          unit: /5
          note: >-
            Large employer health benefits TAM; 10%+ CAGR navigation platform market; growing self-insured employer
            segment
        - label: AI / Product Differentiation
          value: 4
          unit: /5
          note: WayFinding generative AI; at-risk pricing model; 98point6 IP; no clinically validated outcomes published
        - label: Revenue Traction
          value: 2
          unit: /5
          note: >-
            Combined ~$550M is scale, but standalone ~$85M missed $175M target; Accolade was EBITDA-negative at
            acquisition
        - label: Competitive Moat
          value: 3
          unit: /5
          note: >-
            Scale advantage vs. point solutions; Quantum Health 95% retention and Included Health remain credible
            threats
        - label: Management Quality
          value: 4
          unit: /5
          note: >-
            Tullman / Taneja / Shapiro Livongo pedigree; General Catalyst and 7wire tier-1 backing; Frazier executive
            chair
        - label: Valuation Attractiveness
          value: 2
          unit: /5
          note: 26x standalone expensive; 4–5x combined is fair-to-stretched; no audited financials reduce confidence
        - label: Exit Clarity
          value: 3
          unit: /5
          note: >-
            Digital health IPO window reopened (Hinge Health May 2025); M&A consolidation active; no Transcarent IPO
            timeline stated
    claimRefs:
      - CV001
      - CV007
      - CV021
      - CV031
      - CV033
      - CV036
