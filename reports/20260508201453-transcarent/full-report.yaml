  - number: 6
    title: Customers
    sections:
      - number: '6.1'
        title: Customer Profile and Ideal Customer Profile
        blocks:
          - type: paragraph
            body: >
              Transcarent's core customer is the self-insured employer — a company that funds its own employee health
              benefit

              plan rather than purchasing fully insured coverage from a commercial carrier. Transcarent explicitly
              targets

              organizations with 1,000 or more employees, where the complexity and cost of managing a self-funded health
              plan

              creates substantial demand for navigation, cost-containment, and care coordination services. These
              employers —

              predominantly mid-market to large enterprise (1,000–100,000+ employees) — span manufacturing, technology,

              healthcare, financial services, retail, and public sector (education, municipal government). HR and
              benefits

              decision-makers are the primary buyer personas: benefits directors, VPs of HR, and total rewards leaders
              who

              control plan design, vendor selection, and annual renewal decisions.


              Beyond direct employers, Transcarent's addressable customer base extends to health plans and union trust
              funds

              that serve self-insured populations, as well as professional employer organizations (PEOs) that aggregate

              benefits purchasing for smaller companies. Geographically, the focus is national (U.S.) given the

              employer-sponsored insurance structure of American healthcare. The platform is priced on a per-employee-

              per-month (PEPM) model for navigation services (~$5 PEPM for WayFinding) and on bundled case-rate pricing

              for procedure-specific programs like Surgery COE.


              The value proposition presented to buyer personas combines cost reduction (documented ROI from directing

              members to high-value care settings), employee satisfaction (NPS 83+ from a publicly reviewed case study),

              and administrative simplification (one platform, one contract replacing multiple point solutions). Buyers

              evaluate Transcarent through broker/consultant relationships, peer references, and competitive RFP
              processes

              with typical sales cycles of three to nine months.
            claimRefs:
              - CU004
              - CU019
              - CU022
              - CU023
              - CU036
      - number: '6.2'
        title: Named Customers and Client Base Overview
        blocks:
          - type: paragraph
            body: >
              Transcarent's customer base grew significantly through the April 2025 merger with Accolade, creating a
              combined

              entity serving over 20 million members and more than 1,700 employer and health plan clients. Pre-merger,

              Transcarent standalone disclosed serving 300+ employer and health plan clients as of late 2023 (per CEO

              statements reported by Fierce Healthcare), with revenue growing from $62.8 million in 2023 to $85.1
              million

              in 2024. Accolade, prior to being taken private, reported more than 1,200 customers as of its fiscal year

              ended February 2024.


              Named customer evidence is sparse, consistent with enterprise B2B norms in health benefits where

              confidentiality provisions prevent public disclosure. The primary publicly documented deployment is a West

              Coast health plan serving 30 school-based employer groups (~10,000 covered lives), which achieved a 20.5x

              ROI on Transcarent Surgery Care, $11 million in total surgery cost savings since 2020, and a member NPS

              of 83+. East West Bank is publicly identified as an employer offering Transcarent benefits to employees

              through a published benefits overview document for plan year 2025.


              The 2023 acquisition of 98point6's AI business brought an estimated 100+ self-insured employer
              relationships

              into Transcarent's base. FeaturedCustomers lists 6 customer references and 3 reviews with an aggregate

              rating of 4.8/5 for the platform. Transcarent's direct contracting network with 10 major health systems

              (Advocate Health, Atrium Health, Baylor Scott & White, Corewell Health, Hackensack Meridian,
              Intermountain,

              Mass General Brigham, Memorial Hermann, Mount Sinai, Virginia Mason Franciscan) anchors the employer value

              proposition with national provider access.
            claimRefs:
              - CU001
              - CU002
              - CU003
              - CU010
              - CU013
              - CU024
              - CU032
              - CU038
      - number: '6.3'
        title: Go-to-Market Strategy and Distribution Channels
        blocks:
          - type: paragraph
            body: >
              Transcarent's go-to-market model combines three primary channels: direct employer sales, broker/consultant

              intermediaries, and health plan partnerships. Direct enterprise sales targets HR and benefits
              decision-makers

              at large self-insured employers through a dedicated field sales team. The broker/consultant channel is
              critical

              at scale: the majority of large employer health benefit decisions are intermediated by national and
              regional

              benefits consultants (Mercer, Aon, Willis Towers Watson, Gallagher, NFP), who evaluate, recommend, and
              co-sell

              solutions to plan sponsors. Being endorsed by top-tier consultants is a key commercial determinant, and

              Transcarent's ability to capture consultant-channel placements has driven much of its organic pre-merger
              growth.


              Health plan partnerships represent a third channel, where Transcarent integrates navigation or COE
              services

              on top of a carrier's existing network. Regional Blue Cross Blue Shield plans and other insurers have
              explored

              bundled arrangements. This channel provides distribution leverage but can create channel conflict with
              direct

              sales and may compress pricing power. The CareJourney partnership enables data-driven identification of

              high-value providers, strengthening the analytics proposition for employer clients during evaluation.


              The commercial motion is RFP-driven with multi-year contract terms (typically 2–3 years). Employer clients

              sign a master services agreement covering selected modules, with PEPM-based pricing for navigation and

              case-rate pricing for surgical programs. Performance-based components tied to measurable savings or

              utilization metrics are a stated differentiator from legacy navigation vendors. Post-merger, Transcarent

              integrates Accolade's established broker relationships and direct-to-consumer channels into its
              go-to-market

              motion, creating a broader distribution platform but also a commercial integration execution challenge.
            claimRefs:
              - CU020
              - CU021
              - CU026
              - CU033
              - CU036
              - CU037
      - number: '6.4'
        title: Customer Success Metrics and Retention Signals
        blocks:
          - type: paragraph
            body: >
              Retention data for the combined post-merger entity is not publicly disclosed. The most credible available

              data point is from Accolade pre-merger management: CEO Rajeev Singh stated in April 2022 that Accolade's

              historical employer client retention rate has been above 95%, characterizing the Comcast departure as an

              isolated event. This metric predates the merger and applies only to Accolade's legacy base under prior

              management. It cannot be assumed to reflect the post-merger combined entity's current trajectory.


              Member-level satisfaction indicators are stronger where available. The West Coast health plan case study

              reviewed by Oregon OHA reports a member NPS of 83+ from Surgery Care — significantly above typical

              healthcare service benchmarks. FeaturedCustomers reports a 4.8/5 aggregate rating for Transcarent from

              368 reference ratings, though this reflects a curated vendor-submitted set rather than a representative

              sample. Accolade's NPS on the Comparably platform was -34, indicating 67% detractors versus 33% promoters
              —

              a concerning independent signal that conflicts with the Surgery Care NPS and cannot be reconciled without

              primary data from a representative employer client sample.


              Third-party recognition includes two consecutive CNBC Disruptor 50 rankings (#17 in 2024, #14 in 2025),

              and Oregon OHA regulatory approval of the merger with no adverse findings. Net revenue retention (NRR),

              gross revenue retention (GRR), and individual client-level renewal rates are not publicly disclosed for

              either the standalone Transcarent entity or the post-merger combined organization — these remain the

              highest-priority diligence data requests.
            claimRefs:
              - CU005
              - CU008
              - CU011
