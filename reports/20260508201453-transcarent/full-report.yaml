      - number: '6.6'
        title: Exhibits
        blocks:
          - type: callout
            title: 'Post-Merger Scale: 20M Members and 1,700+ Clients Creates Defensible Market Position'
            body: >
              The April 2025 Accolade acquisition transformed Transcarent from a mid-sized digital health startup (~300

              employer clients, ~$85M revenue) into one of the largest employer health and care platforms in the U.S.

              At 20M+ members and 1,700+ employer/health plan clients, Transcarent gains meaningful data network effects

              (longitudinal member health records at population scale), distribution leverage (Accolade's established

              broker relationships and direct-to-consumer channels), and cross-sell motion (Accolade advocacy and
              virtual

              primary care layered onto Transcarent's WayFinding, COE, and pharmacy capabilities). Scale at this level

              creates switching costs and data advantages that smaller navigation competitors cannot easily replicate
              and

              positions Transcarent to compete for jumbo employer accounts that require national coverage and product

              breadth.
