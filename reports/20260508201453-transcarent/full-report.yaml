companyProfile:
  summary: >
    Transcarent is a consumer-directed health and care platform serving employees of self-insured employers through its
    AI-powered WayFinding™ experience. Founded in 2020 by Glen Tullman, Lee Shapiro, and Hemant Taneja, the company
    raised ~$450M across four rounds before closing its acquisition of Accolade (NASDAQ: ACCD) in April 2025 for $621M,
    creating a combined entity with 20M+ members and 1,700+ employer and health plan clients. Public operating proof is
    strongest in Surgery Care, where an OHA-hosted West Coast health plan case study reported 20.5x ROI and $11M+
    cumulative surgery savings.
