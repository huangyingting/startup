- id: FR003
  title: Dependency map
  type: dag
  layout: standard
  summary: 'The dependency map identifies eleven critical dependencies for Transcarent post-merger. The five highest-risk
    dependencies are: (1) employer client base (revenue concentration); (2) Glen Tullman personally (strategy and capital);
    (3) cloud infrastructure (operational continuity); (4) the 98point6 AI engine (product differentiation); and (5) HHS OCR
    (HIPAA enforcement authority over 20M member PHI). The Accolade legacy platform (PlushCare / 2nd.MD) represents a transitional
    dependency that will persist through the integration period and creates compounded risk if the migration is delayed.

    '
  approximationNotes: 'Cloud provider identity (AWS/Azure) is an industry-standard assumption; not confirmed by public source.
    Broker channel dependency is inferred from industry norms for self-insured employer benefits purchasing; specific channel
    mix not disclosed.

    '
