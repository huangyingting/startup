- id: FR002
  title: Risk transmission map
  type: dag
  layout: wide
  summary: 'The risk transmission map shows that integration execution failure and technology stack disruption are the primary
    root risks that can trigger client churn, which cascades into revenue decline, margin compression, investor confidence
    erosion, and ultimately valuation impairment or capital raise difficulty. A HIPAA breach creates a parallel path through
    OCR enforcement to contract termination and accelerated churn. Key-person departure (Tullman) directly impairs investor
    confidence without necessarily triggering operational failure first. The most dangerous scenario combines integration
    failure with a concurrent HIPAA breach — both plausible given the platform consolidation work required in 2025.

    '
  approximationNotes: 'DAG edges represent logical causal relationships inferred from comparable digital health mergers and
    documented risk factors; not quantitative probability flows.

    '
