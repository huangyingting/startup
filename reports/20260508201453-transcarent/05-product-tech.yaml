    - id: EGE001
      gapType: missing-source
      description: >-
        No independent peer-reviewed clinical study or third-party benchmark validates Transcarent's AI clinical
        routing, symptom triage accuracy, or claimed health outcomes (27% ER reduction, 48% readmission drop, 90+ NPS).
        All outcome data is self-reported by Transcarent.
      relatedQuestionRefs:
        - QE005
        - QE014
      severity: high
    - id: EGE002
      gapType: private-evidence-only
      description: >-
        Accolade technology integration progress with WayFinding is not publicly documented. The current state of the
        combined technical stack—what is unified vs. still operating separately (PlushCare, 2nd.MD, Accolade's
        Personalized Healthcare Platform)—is not disclosed.
      relatedQuestionRefs:
        - QE021
      severity: high
    - id: EGE003
      gapType: missing-source
