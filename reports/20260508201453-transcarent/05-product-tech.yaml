      - - Triage health symptoms and find care
        - Internet search; call nurse line; visit urgent care
        - >-
          AI symptom checker based on millions of physician interaction records; agent routes to virtual, urgent, or
          emergency care
        - 27% ER visit reduction reported (2025 company data)
        - No independent benchmark for symptom-checker clinical accuracy; self-reported data only
