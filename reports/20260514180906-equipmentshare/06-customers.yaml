  evidenceGaps:
    - type: enumeration-incomplete
      severity: material
      topic: named-customer-proof
      missingEvidence: >-
        EquipmentShare does not publicly name individual enterprise rental customers due to
        standard contractual confidentiality provisions. Only Yates Construction (ENR Top 20)
        and DED-cited Missouri contractors provide named production deployment evidence; the
        remainder of the customer base is evidenced only through anonymous review platform data.
      whyItMatters: >-
        Without named customer evidence across segments and geographies, the quality and
        breadth of EquipmentShare's production deployment thesis cannot be independently
        verified; logo-count proxies are insufficient for diligence-grade customer validation.
      diligencePath: >-
        Request a curated list of at least 10 named production customers across 3 or more
        segments from management, including deployment scope, contract duration, and whether
        they have agreed to serve as reference accounts for the diligence process.
      relatedQuestionRefs: [QU010, QU012]
      relatedTableRefs: [TU003]

    - type: private-evidence-only
      severity: material
      topic: T3-SaaS-subscriber-count
      missingEvidence: >-
        T3 external subscription ARR, external subscriber count, and net revenue retention
        for T3 SaaS are not disclosed in any public filing. The 357,000 asset count
        combines rental and own-fleet assets and does not distinguish SaaS-only subscribers.
      whyItMatters: >-
        The T3 SaaS layer is the primary software-driven valuation premium for EquipmentShare;
        without subscriber count and ARR, the software component cannot be independently valued
        and the land-and-expand thesis cannot be quantified.
      diligencePath: >-
        Require T3 standalone segment reporting; request external subscriber count, ARR,
        NRR, and contribution margin from management CFO data room prior to investment.
      relatedQuestionRefs: [QU006]

    - type: missing-source
      severity: minor
      topic: named-production-deployments
      missingEvidence: >-
        No procurement records, government contract awards, or construction project filings
        have been identified that name EquipmentShare as the equipment rental provider on
        specific infrastructure or commercial projects.
      whyItMatters: >-
        Government procurement records and project filings would provide independently
        verifiable named customer evidence at higher confidence than review platform data.
      diligencePath: >-
        Search SAM.gov, state procurement portals, and ENR project database for EquipmentShare
        as a named equipment supplier on IIJA-funded infrastructure projects.
      relatedQuestionRefs: [QU010]

    - type: private-evidence-only
      severity: material
      topic: customer-concentration-risk
      missingEvidence: >-
        EquipmentShare does not disclose revenue concentration among its top customers —
        the top-10 customer revenue share, maximum single-customer percentage, or any
        cohort-level concentration metric is absent from the FY2025 10-K.
      whyItMatters: >-
        Customer concentration is a standard diligence checkpoint; without it, key-account
        dependency risk cannot be assessed and a single large-account loss scenario cannot
        be modeled. The absence of disclosure is itself a moderate flag for investors.
      diligencePath: >-
        Request a top-10 customer revenue concentration report from management; compare to
        United Rentals and Herc Holdings proxy disclosures; ask for contractual protections
        against customer concentration before committing capital.
      relatedQuestionRefs: [QU015]

    - type: private-evidence-only
      severity: minor
      topic: OWN-program-customer-conversion
      missingEvidence: >-
        The OWN Program fleet owner count, conversion rate from fleet owner to rental
        customer, and T3 SaaS adoption rate among OWN participants are not disclosed
        in any public filing.
      whyItMatters: >-
        OWN Program participants represent an economically aligned customer acquisition
        channel; without conversion data, the channel's contribution to active customer
        growth cannot be quantified.
      diligencePath: >-
        Request OWN Program participant count, average rental revenue per OWN participant,
        and T3 subscription adoption rate from the management data room.
      relatedQuestionRefs: [QU020]
