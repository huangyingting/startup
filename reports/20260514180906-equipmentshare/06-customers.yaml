company:
  name: "EquipmentShare"

chapter:
  number: 6
  title: "Customers"
  summary: >
    EquipmentShare serves approximately 80,000 active customers concentrated in the U.S.
    construction sector, with general contractors (~40% of rental revenue), specialty trade
    subcontractors (~30%), infrastructure operators (~15%), and industrial users (~10%)
    comprising the primary segments. The company's FY2025 net revenue retention rate exceeds
    110%, indicating strong customer durability driven by the T3 telematics platform's
    switching-cost architecture. Named customer evidence is limited by contractual
    confidentiality norms; Yates Construction (ENR Top 20) is the highest-quality public
    reference. Third-party review platforms (Capterra, G2) corroborate active deployment
    across mid-market contractors, though anonymous sourcing limits evidentiary weight.
    The Infrastructure Investment and Jobs Act is expected to channel $550+ billion in
    construction activity through 2032, sustaining demand tailwinds. Key diligence gaps
    are customer concentration disclosure, T3 SaaS subscriber count, and NPS/GRR by segment.

sections:
  - id: SU-S1
    title: "Customer Segments and Market Composition"
    body: >-
      EquipmentShare serves approximately 80,000 active customers across the United States
      construction industry, with its customer base concentrated in general contractors,
      specialty trade subcontractors, infrastructure project operators, and industrial users.
      According to the company's FY2025 10-K filing, the general contractor segment represents
      the largest revenue contributor at roughly 40 percent of rental revenue, driven by demand
      for earthmoving equipment, aerial work platforms, and telehandlers on multi-trade job sites.
      Specialty trade contractors — electricians, plumbers, HVAC technicians, and framing crews
      — constitute approximately 30 percent, primarily renting small tools and compaction
      equipment. The remaining mix spans infrastructure operators managing highway, bridge, and
      utility projects (~15 percent), and industrial and manufacturing customers (~10 percent).

      The company targets firms generating between $5 million and $500 million in annual
      construction revenue, a highly fragmented middle market that values both equipment
      availability and operational intelligence from the T3 telematics platform. Geographic
      concentration mirrors the company's 407-location footprint across 45 states, with customer
      density highest in the Sun Belt, Southeast, and central United States where the company
      was founded and scaled earliest. Over 357,000 assets are connected to the T3 platform,
      including both EquipmentShare-owned rental equipment and third-party customer-owned
      equipment managed through T3 SaaS subscriptions, indicating broad platform adoption
      across the active customer base.
    claimRefs: [CU001, CU002, CU003, CU004, CU005, CU006, CU007, CU008, CU009]
    tableRefs: [TU001]
    figureRefs: [FU001]

  - id: SU-S2
    title: "Named Customer Evidence and Reference Accounts"
    body: >-
      Publicly documented customer relationships for EquipmentShare are limited by contractual
      confidentiality norms standard in the equipment rental industry. However, several
      high-quality named customer data points exist in the public record. Yates Construction,
      a top-20 ENR-ranked general contractor and one of the largest privately held construction
      companies in the United States, has publicly referenced EquipmentShare T3 telematics in
      fleet management discussions, representing the highest-quality named reference available.
      The Missouri Department of Economic Development, in its 2023 press release celebrating
      EquipmentShare's headquarters expansion, identified multiple Missouri-based construction
      firms as active EquipmentShare rental customers.

      Independent third-party review platforms — including Capterra and G2 — carry 40 to 60
      combined reviews from self-identified construction professionals describing active rental
      use, dispatch management, and T3 software deployment, providing corroborating customer
      evidence at a medium confidence level. The ENR Top 400 Contractors list confirms that
      mid-to-large general contractors in EquipmentShare's operating geographies routinely
      rely on third-party equipment rental for project execution, consistent with the company's
      disclosed customer mix. Aggregate T3 subscriber counts from the 10-K imply a substantial
      base of named accounts, though individual deployments are not itemized in public filings.
      Overall named customer evidence is rated partial, reflecting EquipmentShare's
      confidentiality posture rather than a lack of genuine customer relationships.
    claimRefs: [CU011, CU012, CU013, CU014, CU015, CU016, CU017, CU018, CU019, CU020]
    tableRefs: [TU002, TU003]
    figureRefs: []

  - id: SU-S3
    title: "Retention, Satisfaction, and Customer Durability"
    body: >-
      EquipmentShare reported a net revenue retention rate exceeding 110 percent in FY2025,
      indicating that existing customers collectively expanded their spending by more than
      10 percent year-over-year, offsetting any customer churn. This metric — disclosed in
      the FY2025 10-K — is above the equipment rental industry baseline, where gross revenue
      retention for major players typically runs in the high-80s to low-90s percent range.
      The T3 telematics platform drives a structural retention mechanism: once a customer
      integrates T3 data into jobsite workflows, historical equipment data, maintenance records,
      and utilization analytics are embedded in the platform, raising switching costs.

      Third-party review platforms record aggregate ratings of approximately 4.2 out of 5.0
      for EquipmentShare's rental and T3 services, with common positive themes around equipment
      availability, digital checkout convenience, and responsive dispatch. Negative reviews cite
      pricing competitiveness on long-duration rentals and variability in branch-level service
      quality. FMI Research's market outlook flags demand normalization risk following the
      post-pandemic construction surge as an adverse factor for rental retention in the
      2026 to 2028 period. Customer concentration risk is not disclosed in the 10-K;
      EquipmentShare has not published revenue share by individual customer or top-N customer
      cohort, which is a key diligence gap for evaluating dependency risk.
    claimRefs: [CU021, CU022, CU023, CU024, CU025, CU026, CU027, CU028, CU029, CU030]
    tableRefs: [TU004]
    figureRefs: [FU003, FU004]

  - id: SU-S4
    title: "Customer Acquisition and Expansion Vectors"
    body: >-
      EquipmentShare's customer acquisition strategy operates on three primary vectors:
      geographic branch expansion, the T3 telematics platform as a land-and-expand mechanism,
      and the Infrastructure Investment and Jobs Act tailwind channeling an estimated $550 billion
      in construction activity through 2032. The company opened over 40 new branches in 2024,
      each anchored by local account managers targeting general contractor and specialty trade
      relationships within a defined geographic radius. National and enterprise account teams
      focus on top-100 ENR contractors capable of committing to multi-branch master rental
      agreements, creating large-customer relationships that drive location-level volume.

      The T3 SaaS component creates a separate acquisition channel by signing contractors who
      own their fleet but subscribe for telematics and fleet management — these customers become
      natural rental prospects as they engage with the platform. Associated Builders and
      Contractors workforce data and Census Bureau construction put-in-place estimates confirm
      sustained construction spending growth through 2025, validating the addressable market
      expansion thesis. Bureau of Economic Analysis construction sector GDP data corroborates
      5 to 7 percent annual construction output growth consistent with EquipmentShare's rental
      revenue trajectory. Customer concentration risk is a key undisclosed variable: without
      top-10 customer revenue share data, single-account dependency cannot be assessed
      quantitatively, and this information should be requested from the management data room.
    claimRefs: [CU010, CU031, CU032, CU033, CU034, CU035, CU036, CU037, CU038, CU039, CU040, CU041, CU042]
    tableRefs: [TU005]
    figureRefs: [FU002]

