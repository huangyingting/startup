  - id: section-5
    title: Mitigations are meaningful but kill criteria and diligence gaps remain open
    body: >-
      EquipmentShare has real mitigations in place for its most prominent risks. The OWN Program itself is a
      structural hedge against capital intensity risk, transferring fleet ownership costs to third parties and
      converting fixed costs into variable revenue-sharing obligations. The IIJA tailwind provides multi-year
      infrastructure spending visibility that partially decouples EquipmentShare's growth from private
      construction cycles. The diversified end-market mix—spanning infrastructure, data centers, energy, and
      commercial construction—reduces the correlation of the revenue base to any single sector. The ABL credit
      facility's $3 billion capacity provides material liquidity buffer against short-term demand softening.

      The Q1 2026 financial results and raised guidance confirm that near-term fundamentals are strong, reducing
      the probability of immediate thesis-break scenarios. However, mitigations that worked during a growth period
      may not perform equally well in a contraction. The OWN Program's resilience under stress is untested; the
      ABL covenants' behavior under a declining borrowing base is not fully disclosed; and the T3 cybersecurity
      posture has not been independently validated through public certification or audit disclosures.

      Investors should define explicit kill criteria before underwriting exposure. The most important thesis-break
      triggers are: a sustained construction spending decline exceeding 15% year-over-year, visible OWN Program
      participant withdrawal materially reducing fleet capacity, a cybersecurity incident that compromises T3
      at scale, net leverage rising above 4x due to EBITDA decline, or loss of either founding CEO or President
      without announced succession. Against these triggers, monitoring indicators include: AGC construction
      spending reports, Census Bureau non-residential construction data, EquipmentShare quarterly utilization
      rates, Federal Reserve FOMC minutes and rate decisions, and T3 connectivity metrics. The absence of
      public disclosure around OWN Program concentration, T3 security audits, and succession planning
      represents the most significant diligence gap for institutional investors.
    claimRefs:
      - CR005
      - CR006
      - CR007
      - CR025
      - CR026
      - CR027
      - CR028
      - CR029
      - CR036
      - CR037
