    body: >-
      With 56% of fleet owned by third parties and no public disclosure of OWN Program participant count,
      contract terms, or exit provisions, this risk cannot be sized from public data. It is correlated with
      cyclical demand risk, meaning it could amplify a downturn rather than buffer it.
