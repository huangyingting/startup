  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: OWN-program-concentration
      missingEvidence: >-
        Number of distinct OWN Program participants, average fleet contribution per participant,
        contractual minimum commitments, and exit provisions or notice periods for OWN Program equipment withdrawal.
      whyItMatters: >-
        Without OWN Program concentration and contractual data, investors cannot assess whether the
        56% third-party fleet is broadly distributed and stable or concentrated in a small number of
        large participants who could withdraw significant capacity rapidly.
      diligencePath: >-
        Request OWN Program structure summary from management: participant count, top-10 participant
        fleet concentration, contract terms, exit provisions, and historical withdrawal rate.
      relatedQuestionRefs:
        - QR018
      relatedTableRefs:
        - TR003

    - type: private-evidence-only
      severity: material
      topic: monthly-cash-burn-downturn
      missingEvidence: >-
        EquipmentShare's free cash flow profile under a demand downturn scenario, including
        minimum capex obligations, working capital dynamics, and ABL covenant headroom at various
        revenue decline levels.
      whyItMatters: >-
        Investors need to understand the company's cash position and covenant headroom under
        a 15-30% revenue decline to assess whether the capital structure is resilient or creates
        a potential refinancing risk in a downturn.
      diligencePath: >-
        Request financial model stress scenarios from management, ABL facility covenant schedules,
        and borrowing base calculation methodology under a simulated demand decline.
      relatedQuestionRefs:
        - QR017

    - type: private-evidence-only
      severity: material
      topic: founder-succession-planning
      missingEvidence: >-
        Formal succession plan for CEO Jabbok Schlacks and President Willy Schlacks, including
        identified internal successors, board protocols for leadership transition, and functional
        deputies who could sustain operations in a key-person departure scenario.
      whyItMatters: >-
        Both founders are central to strategy, culture, and OWN Program relationships; without
        a succession plan, loss of either would create significant operational and strategic
        discontinuity that institutional investors would need to price.
      diligencePath: >-
        Request leadership depth assessment from management; review board succession planning minutes;
        evaluate functional deputies for each C-suite role.
      relatedQuestionRefs:
        - QR015

    - type: missing-source
      severity: material
      topic: OSHA-EPA-enforcement-history
      missingEvidence: >-
        Public OSHA citation history for EquipmentShare locations and any EPA enforcement actions
        or environmental compliance violations affecting the fleet or operations.
      whyItMatters: >-
        With 407 locations and 7,700+ employees, the probability of some regulatory interactions
        with OSHA is non-trivial; the absence of public disclosure does not confirm a clean record.
      diligencePath: >-
        Search OSHA Establishment Search database for EquipmentShare citations; request EPA enforcement
        history from management; review 10-K legal proceedings disclosures in detail.
      relatedQuestionRefs:
        - QR016

    - type: private-evidence-only
      severity: minor
      topic: fleet-residual-value-sensitivity
      missingEvidence: >-
        EquipmentShare's internal analysis of used-equipment market recovery rates vs. OEC under
        different demand scenarios, and any residual value insurance or hedging in place.
      whyItMatters: >-
        Fleet residual value is the primary collateral for the ABL facility; understanding recovery
        rates in a distressed scenario is critical to assessing covenant risk.
      diligencePath: >-
        Request used-equipment disposition history and recovery-rate statistics from management;
        review ABL facility appraisal methodology and advance rates.
