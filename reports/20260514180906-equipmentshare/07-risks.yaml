        - AGC construction spending reports; Census non-residential starts; EquipmentShare utilization guidance
        - Non-residential construction spending YoY decline exceeds 15%; EquipmentShare utilization drops below 65%
        - Reassess revenue and EBITDA forecasts; pressure-test ABL covenant headroom; review downside scenario valuation
      - - OWN Program counterparty withdrawal
        - Fleet composition disclosures; OWN Program as % of total fleet in quarterly reports
        - OWN Program fleet share declines materially from 56% baseline without corresponding owned-fleet increase
        - Thesis-break trigger — signals program instability; demand immediate management explanation and OWN Program health data
      - - T3 cybersecurity breach
        - SEC 8-K cybersecurity incident disclosures; industry news monitoring; T3 service status
        - Any material cybersecurity incident disclosed under SEC cyber-incident rules; customer data breach
        - Thesis-break trigger — potential loss of T3 trust and customer relationships; requires incident severity and scope assessment
      - - Capital markets and leverage stress
        - Net leverage; ABL utilization; quarterly financial disclosures
        - Net leverage rises above 4.0x; ABL facility utilization exceeds 80% without clear deleveraging path
        - Reassess financing risk; evaluate covenant trigger probability; reduce position if management cannot articulate deleveraging timeline
      - - Key-person departure
        - Executive team SEC filings; LinkedIn and press monitoring
        - Departure of CEO Jabbok Schlacks or President Willy Schlacks without disclosed succession
        - Thesis-break trigger — requires immediate assessment of succession plan, board response, and strategic continuity
