company:
  name: EquipmentShare
chapter:
  number: 7
  title: Risks
  summary: >-
    EquipmentShare's highest residual risks are cyclical demand sensitivity tied to non-residential construction,
    capital intensity with $9B+ fleet OEC, OWN Program counterparty exposure, T3 cybersecurity vulnerabilities
    across 357,000+ connected assets, and regulatory complexity at 407 locations. Mitigations are real but
    incomplete; investors need explicit kill criteria around construction cycle inflection, OWN Program withdrawal,
    and cybersecurity posture before underwriting downside with confidence.
sections:
  - id: section-1
    title: Cyclical demand and capital intensity define the primary downside scenario
    body: >-
      EquipmentShare's most consequential risk is the structural linkage between non-residential construction
      spending and its rental revenue. The equipment rental industry contracted approximately 30% during the
      2007–2009 recession, and the same transmission mechanism remains fully intact: when GDP slows, construction
      starts fall, utilization rates compress, and fleet operators face simultaneous revenue decline and stranded
      asset exposure. EquipmentShare's fleet OEC of $9,065 million as of FY2025 means that a sustained utilization
      decline would generate significant unabsorbed depreciation and potential residual value impairment. The
      company's annual equipment spend of approximately $1.8 billion requires continuous reinvestment to maintain
      fleet age and competitiveness, meaning that even a modest demand softening forces a difficult choice between
      capex continuation and cash conservation.

      The Federal Reserve's elevated rate environment as of May 2026 introduces an additional transmission channel:
      higher financing costs reduce construction project underwriting, delay starts, and dampen equipment demand
      before any GDP contraction is visible. The IIJA infrastructure tailwind partially offsets this pressure, and
      Q1 2026 results were strong with guidance raised, but infrastructure spending does not fully substitute for
      private non-residential construction activity. Net leverage of 2.8x is manageable under the current business
      plan but would become a more acute concern if EBITDA declined materially. The ABL credit facility provides
      liquidity, but covenants tied to asset quality and coverage ratios would constrain management flexibility
      precisely when flexibility is most needed.

      The OWN Program, in which approximately 56% of EquipmentShare's fleet is owned by third parties rather than
      by the company itself, represents a structural innovation that partially mitigates capital intensity risk—but
      it introduces a distinct counterparty risk. If OWN Program participants perceived deteriorating economics and
      withdrew their equipment, EquipmentShare would face a capacity contraction that could amplify rather than
      buffer a demand downturn. This linkage between demand risk and counterparty risk means the two largest risk
      factors are not independent; they are correlated under the scenarios that matter most to investors.
    claimRefs:
