chapter:
  number: 8
  title: "Valuation"
  summary: >
    EquipmentShare (Nasdaq: EQPT) IPO'd at $24.50/share in January 2026, implying a ~$6.5B market cap
    and ~$11.2B enterprise value, or 6.3x TTM Adjusted Core EBITDA of $1,776M — a material discount
    to pure-rental peers United Rentals (13-15x) and Herc Holdings / Ashtead (8-10x). The current entry
    price is attractive: the base case projects 25-60% upside over three years if the company re-rates
    to 8-10x EBITDA on continued rental growth and margin expansion. The bull case (T3 SaaS ARR
    disclosed and material, 12-14x re-rate) implies 90-130% upside. The bear case (construction
    slowdown, <5% revenue growth, multiple stays at 5-6x) limits downside to -15% from IPO.
    Recommendation is Buy with medium confidence; risk rating is high. Three diligence blockers —
    T3 SaaS ARR disclosure, fleet utilization rates, and segment gross margins — must be resolved to
    move to high conviction.

sections:
  - id: SV-S1
    title: "Investment Thesis and Anti-Thesis"
    body: |
      The investment thesis for EquipmentShare rests on four pillars: (1) a differentiated technology
      platform (T3) embedded in 357,000+ connected assets that creates switching costs and a potential
      high-margin SaaS layer not yet priced into the stock; (2) an accelerating rental revenue growth
      trajectory — 34% YoY in FY2025 and 37% in Q1 2026 — substantially outpacing peers United
      Rentals (~10% growth) and Herc Holdings (~8% growth), driven by location expansion and IIJA
      infrastructure spend; (3) a capital-efficient fleet model through the OWN Program ($4.9B OEC,
      56% of total fleet) that reduces gross capex requirements while expanding the rentable asset base;
      and (4) a valuation entry point at 6.3x TTM EV/EBITDA that is a 50-60% discount to United Rentals
      and a 20-35% discount to mid-cap peers Herc Holdings and Ashtead, providing meaningful margin
      of safety against execution risk.

      The anti-thesis is equally explicit. First, the T3 technology premium is unverifiable from public
      disclosures: no external SaaS ARR, customer count, or net revenue retention metric has been
      disclosed in any SEC filing, earnings release, or IR presentation. If T3's external subscription
      revenues are de minimis (less than $100 million ARR), the valuation case rests entirely on
      traditional equipment rental multiples, and the current 6.3x is merely fair, not attractive.
      Second, construction market cyclicality remains a material risk: EquipmentShare's entire revenue
      base is correlated with U.S. construction starts, and a rate-hike-driven slowdown could reduce
      equipment demand by 10-20%, compressing both revenue and EBITDA margins simultaneously. Third,
      capital intensity constrains free cash flow: FY2025 fleet capex of approximately $1.8 billion
      exceeded Adjusted Core EBITDA of $1.667 billion, making the company FCF-negative in high-growth
      mode. Finally, OWN Program concentration risk is opaque: 56% of the rentable fleet is owned by
      third parties under undisclosed revenue-sharing terms, creating contingent off-balance-sheet
      obligations if OWN participants exit or renegotiate terms.

      The weight of evidence currently favors the thesis over the anti-thesis, but the margin is
      narrower than the bull case suggests. The 6.3x entry multiple provides downside protection;
      the path to multiple expansion depends on evidence that the market does not yet have.
    claimRefs: [CV001, CV004, CV005, CV014, CV023, CV024, CV027, CV034, CV035, CV043]
    tableRefs: [TV002]
    figureRefs: [FV001]

  - id: SV-S2
    title: "Financing Context, Valuation, and Entry Discipline"
    body: |
      EquipmentShare completed its initial public offering on January 23, 2026 on the Nasdaq Global
      Select Market at $24.50 per share, raising approximately $747 million in gross proceeds. The
      offering comprised 228,478,203 Class A shares and 37,568,944 Class B shares, totaling
      approximately 266 million shares outstanding. At the IPO price, the implied market capitalization
      is approximately $6.5 billion. Adding approximately $5.0 billion in net debt (derived from the
      $3 billion ABL facility and other obligations) and subtracting $329 million in cash as of Q1
      2026, the enterprise value is approximately $11.2 billion. With TTM Adjusted Core EBITDA of
      $1,776 million through Q1 2026, the implied EV/EBITDA multiple at IPO was approximately 6.3x.

      The preference stack was substantially simplified at IPO: all outstanding preferred shares
      converted to Class A common at the offering, eliminating the overhang that typically depresses
      pre-IPO valuations. The capital structure post-IPO consists of common equity (Class A and Class B),
      the $3 billion asset-based revolving credit facility with Capital One Bank, and equipment notes.
      Net leverage declined from 3.2x at Q1 2025 to 2.8x at Q1 2026, and the 2026 guidance raise
      (to $5,147-$5,575 million revenue and $1,883-$1,995 million EBITDA) implies further deleveraging
      through earnings growth. The ABL covenants are borrowing-base tied (fleet OEC), not fixed-ratio,
      reducing covenant breach risk in moderate demand scenarios.

      Entry discipline favors the current price. The 6.3x TTM EV/EBITDA compares favorably to the
      8-15x range for listed rental peers. Even if EquipmentShare trades at a 20% discount to
      mid-cap peers (8x multiple) due to information opacity around T3 metrics, the implied EV would
      be approximately $14.2 billion — a 27% premium to the IPO price. The bear case at 5-6x EBITDA
      implies $8.9-$10.7 billion EV, or -5% to -20% from the IPO price — a bounded downside for a
      business with 38% Q1 revenue growth and improving leverage. The risk/reward at current prices
      is asymmetric to the upside.

      Public evidence substantially supports the IPO price: audited FY2025 10-K revenue and EBITDA
      are confirmed, Q1 2026 results exceed consensus, 2026 guidance has been raised, and the S-1
      registration statement provides detailed financial disclosure. The primary evidence gap is the
      absence of T3 SaaS metrics, which would determine whether the stock deserves a software premium
      above the rental peer multiple.
    claimRefs: [CV001, CV002, CV003, CV004, CV005, CV006, CV015, CV016, CV017, CV025]
    tableRefs: [TV001]
    figureRefs: [FV002]

  - id: SV-S3
    title: "Scenario Analysis: Bull, Base, and Bear Cases"
    body: |
      The valuation framework is built on three scenarios anchored to observable operating metrics
      and sector comps. The base case assumes revenue growth normalizes to 15-20% over the next
      three years as new locations ramp (95 opened in FY2025), EBITDA margins expand toward the
      mature branch ceiling of 54-55% as the 2025 cohort seasons, and the EV/EBITDA multiple
      re-rates from 6.3x to 8-10x as T3 optionality becomes better understood by the market.
      At 8-10x forward EBITDA of approximately $1,78-$2.0 billion (FY2026 guidance midpoint), the
      implied EV is $14.2-$18.0 billion, representing 27-60% upside from the IPO enterprise value.

      The bull case requires T3 external SaaS ARR to be disclosed as material (greater than $200M
      ARR with 70%+ gross margins), continued 30%+ rental revenue growth driven by sustained IIJA
      infrastructure project activity, and a multiple re-rate to 12-14x as investors attribute
      a blended rental/SaaS multiple. At these assumptions, 12-month forward EBITDA of approximately
      $2.1 billion supports a $25-$28 billion EV, implying 120-150% upside from the IPO price.
      Bull case triggers include: first external T3 ARR disclosure in an earnings supplement or
      10-K segment note; consecutive quarters of 30%+ rental revenue growth; and expansion into new
      adjacent markets such as specialty rentals or T3-powered fleet management for non-construction
      verticals.

      The bear case is anchored to a construction demand slowdown triggered by a prolonged high-rate
      environment. If the Federal Reserve maintains elevated rates through 2026-2027 and construction
      starts decline by more than 15%, EquipmentShare's rental revenue growth would decelerate to
      less than 5%. EBITDA margins would compress from cost inflation (labor, fuel, maintenance) and
      fleet underutilization, and the multiple would remain at 5-6x. At these assumptions, implied
      EV is $8.9-$10.7 billion — a -5% to -20% decline from the IPO enterprise value. The bear
      case is bounded because the ABL facility covenants are asset-based (not rate-ratio-based),
      limiting covenant breach risk, and the OWN Program provides variable-cost fleet flexibility.
      Moody's construction outlook identifies elevated interest rate sensitivity and potential credit
      market tightening as the primary macro risks for the construction sector in 2026, consistent
      with the bear case thesis.

      The probability distribution across scenarios favors the base case (estimated 50-60%) over
      the bull (20-25%) and bear (15-30%) cases, based on current macroeconomic trajectory, the
      IIJA spending pipeline, and EquipmentShare's strong Q1 2026 execution. However, the bear case
      probability increases materially if the Federal Reserve signals additional rate hikes above
      current market expectations in 2026 or if construction starts data from AGC or Dodge show
      month-over-month deterioration for three or more consecutive months.
    claimRefs: [CV011, CV012, CV013, CV018, CV019, CV020, CV021, CV030, CV031, CV032, CV042]
    tableRefs: [TV003]
    figureRefs: [FV003]

  - id: SV-S4
    title: "Comparable Valuation and Peer Benchmarks"
    body: |
      The equipment rental sector offers a tractable set of public comparables for EquipmentShare.
      The four primary public benchmarks are United Rentals (NYSE: URI), Ashtead Group/Sunbelt
      Rentals (LSE: AHT), Herc Holdings (NYSE: HRI), and H&E Equipment Services (Nasdaq: HEES).
      United Rentals is the largest public equipment rental company in North America, with
      approximately $15 billion in FY2024 revenue and an EV of approximately $22 billion,
      implying a 13-15x NTM EV/EBITDA multiple. This premium reflects United Rentals' scale, its
      Specialty segment (higher-margin tools, fluid solutions, power), and its track record of
      disciplined capital allocation. EquipmentShare's 6.3x multiple represents a 55-60% discount
      to United Rentals.

      Ashtead Group (operating as Sunbelt Rentals in North America) is the most internationally
      comparable peer, with £6.5+ billion in revenue and a £17 billion enterprise value (approximately
      $21 billion USD), implying an 8-10x NTM EV/EBITDA. The discount to United Rentals reflects
      Ashtead's UK listing and a modestly lower specialty mix; however, its North American business
      closely parallels EquipmentShare's construction-focused model. Herc Holdings is the most
      scale-comparable peer, with approximately $3.5 billion in FY2024 revenue and a $5 billion EV,
      also trading at 8-10x NTM. Herc's leverage of approximately 3.5x is similar to EquipmentShare's
      2.8x, making it the closest comparable on capital structure as well as revenue scale.

      H&E Equipment Services, with approximately $1 billion in revenue, is being acquired by United
      Rentals in a 2025 transaction that implied approximately 5-7x EV/EBITDA — establishing a floor
      multiple for smaller-scale, pure-rental operators without a technology differentiator. The
      acquisition confirms that the sector is consolidating toward scale, which is directionally
      positive for EquipmentShare's competitive positioning.

      The comparable analysis supports the view that EquipmentShare's 6.3x TTM EV/EBITDA is a
      discount entry point relative to the 8-15x range for its public peers. The discount is
      partially explained by EquipmentShare's status as a newly public company with less than four
      months of post-IPO trading history, the absence of T3 SaaS metrics, and the lack of fleet
      utilization disclosures that peers like United Rentals provide quarterly. As these information
      gaps close, the rational market outcome is a gradual multiple re-rating toward the 8-10x range,
      consistent with the base case scenario.
    claimRefs: [CV007, CV008, CV009, CV010, CV025, CV026, CV027, CV028, CV034, CV043, CV044]
    tableRefs: [TV004]
    figureRefs: []

  - id: SV-S5
    title: "Exit Readiness, Kill Triggers, and Final Diligence"
    body: |
      EquipmentShare entered the public markets in January 2026 and trades on the Nasdaq Global
      Select Market with standard secondary market liquidity. For institutional investors, the
      primary exit path is open-market secondary sales; block trades would be facilitated by the
      company's investment banks (Goldman Sachs was the lead underwriter for the IPO). For private
      equity and strategic investors, potential M&A exit paths include acquisition by United Rentals
      (which has an established track record of acquiring smaller rental operators, including H&E
      Equipment Services), Ashtead Group (seeking to deepen its North American footprint), or a
      private equity take-private at a premium to the public multiple.

      Five thesis-break triggers require continuous monitoring. First, T3 SaaS ARR disclosed as less
      than $100 million: if the software layer generates de minimis revenues, the technology premium
      collapses and the stock should trade at 5-7x EV/EBITDA, implying a 10-30% decline from IPO.
      Second, a 2026 revenue miss of greater than 10% from the guidance midpoint ($5,361M): if
      total revenue falls below $4.8 billion, the EBITDA growth story breaks and the market would
      likely re-price the stock at the bear case multiple. Third, U.S. construction starts declining
      by more than 15% on a trailing three-month basis per AGC or Dodge data: this would signal a
      structural demand reversal that challenges the entire equipment rental thesis. Fourth, net
      leverage rising above 4.0x: this would introduce ABL covenant stress and reduce the equity
      cushion to levels that concern institutional holders. Fifth, aggressive price competition from
      United Rentals or Sunbelt Rentals leading to rental rate compression of more than 5%: EBITDA
      margins would contract sharply given the fixed-cost base of the fleet.

      The final diligence asks before high-conviction investment are: (1) T3 external SaaS ARR as
      a standalone segment metric with customer count and NRR; (2) fleet dollar utilization rates
      by equipment category on a quarterly basis, comparable to the United Rentals disclosure format;
      (3) OWN Program owner concentration (top 10 owners by OEC) and contract terms including
      revenue-sharing rates and termination provisions; (4) gross margin by segment (rental vs.
      equipment sales vs. contractor supplies) to quantify the margin expansion path from mix shift;
      and (5) customer retention/NRR data for both rental customers and T3 subscribers. Until these
      five items are disclosed — either in the next 10-K/10-Q filing or via management data room
      access — conviction remains medium rather than high.
    claimRefs: [CV029, CV035, CV036, CV037, CV044, CV045]
    tableRefs: [TV005, TV006]
    figureRefs: []

  - id: SV-S6
    title: "Recommendation and Conviction Level"
    body: |
      The overall recommendation is Buy with medium confidence. The valuation case is supported by
      public evidence: audited FY2025 financials, Q1 2026 results ahead of expectations, a raised
      2026 guidance range, a capital structure with 2.8x net leverage (down from 3.2x a year prior),
      and an entry multiple of 6.3x TTM EV/EBITDA that is a demonstrable discount to the rental
      peer set. The rental business alone — growing 34-37% annually, achieving 54-55% EBITDA margins
      at mature branches, and generating 16.5% ROIC — justifies a higher multiple than the stock
      currently implies. The T3 technology layer represents uncaptured upside optionality that the
      market is not yet pricing.

      Risk rating is high. Construction cyclicality is systemic, capital intensity is structurally
      persistent, and the technology premium (the primary differentiation from pure rental peers)
      rests on qualitative rather than quantitative evidence. The inability to independently verify
      T3 SaaS ARR means that a portion of the expected valuation upside is contingent on future
      disclosures that may or may not materialize. Investors must be prepared for continued volatility
      in the stock as it establishes a post-IPO trading history and as T3 disclosure evolves.

      Valuation stance is attractive at current levels. A reasonable base case re-rate from 6.3x to
      8-10x over three years, applied to growing EBITDA, implies 25-60% equity upside. The risk/reward
      at 6.3x entry is asymmetric: the bear case downside is bounded at -15% to -20% (5-6x floor
      multiple supported by H&E Equipment M&A comp and sector floor), while the bull case upside is
      120-150% if T3 SaaS metrics confirm the technology thesis. The target investment horizon is
      three to five years, providing time for T3 segment metrics to be disclosed, the 2025 branch
      cohort to mature and contribute fully to EBITDA, and for IIJA infrastructure project ramp to
      generate sustained equipment demand through 2028-2030.

      The recommendation would be upgraded to strong-buy if T3 external ARR is disclosed as greater
      than $200 million in the next quarterly report, or downgraded to track if the company misses
      the 2026 revenue guidance midpoint by more than 10% or if construction starts data indicates
      a structural market reversal. Entry discipline: buy at or below $28/share (approximately 7x
      NTM EV/EBITDA). Add on weakness below $22/share (approximately 6x NTM). Stop-loss at
      $18/share if thesis-break triggers materialize.
    claimRefs: [CV023, CV024, CV033, CV034, CV038, CV040, CV043]
    tableRefs: []
    figureRefs: [FV004]

