      - ["Fleet Utilization Rate", "Dollar utilization by equipment category on a quarterly basis", "Most important EBITDA sensitivity driver; standard URI/Herc disclosure; absence is anomalous", "Management quarterly KPI supplement; benchmark against URI dollar utilization disclosure"]
      - ["OWN Program Concentration", "Top 10 OWN Program fleet owners by OEC; revenue-sharing rate; contract duration and termination", "56% of fleet OEC ($4.9B) is third-party owned; undisclosed off-balance-sheet risk", "Data room: OWN Program term sheet template and concentration schedule"]
      - ["Gross Margin by Segment", "Rental vs. equipment sales vs. contractor supplies gross profit separately", "Quantify mix-shift benefit from rental growth; model margin expansion path independently", "CFO data room; require ASC 280 segment GP line in next 10-K filing"]
      - ["Customer Retention / NRR", "Net revenue retention for rental and T3 customers; churn by customer cohort", "Core quality indicator; missing for all customer cohorts; NRR materially affects software valuation", "Sales/CRM data room; request trailing 4-quarter NRR for both rental and T3 subscriber cohorts"]
    notes: >-
      Diligence asks are ranked by valuation impact. Item 1 (T3 ARR) is blocking: without it,
      conviction cannot exceed medium. Items 2-5 are material but individually insufficient to
      move conviction on their own. Disclosure in the next 10-K (FY2026, due March 2027) is the
      most likely path to resolution for items 1 and 4.
    claimRefs: [CV029, CV044, CV045]

