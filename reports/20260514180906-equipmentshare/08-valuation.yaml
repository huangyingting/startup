callouts:
  - calloutType: recommendation
    title: "Buy at Current Levels — 6.3x EV/EBITDA Offers Attractive Entry"
    body: >-
      EquipmentShare's 6.3x TTM EV/EBITDA entry multiple represents a 50-60% discount to United
      Rentals and a 20-35% discount to Herc Holdings and Ashtead. The base case implies 25-60%
      equity upside over three years on a re-rate to 8-10x as information gaps close. The risk/reward
      is asymmetric: bear case downside is bounded at -15% to -20%, while bull case upside with T3
      SaaS confirmation is 90-130%. Buy with medium confidence; high risk rating.
    claimRefs: [CV023, CV005, CV034, CV043]

  - calloutType: risk
    title: "T3 SaaS ARR Gap: Medium Conviction Cannot Become High Without Disclosure"
    body: >-
      The technology premium embedded in the bull case depends entirely on T3 external SaaS ARR
      that has not been disclosed in any SEC filing, earnings release, or IR supplement. If T3 ARR
      is less than $100M, the technology layer is de minimis and the stock should trade at 5-7x
      pure-rental multiples. Until ASC 280 segment disclosure or management data room confirmation
      provides this number, conviction remains medium. This is a blocking evidence gap.
    claimRefs: [CV035, CV044]

