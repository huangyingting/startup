  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: T3-SaaS-ARR-and-utilization
      missingEvidence: >-
        T3 external SaaS ARR, connected customer count for external subscribers, net revenue
        retention for the T3 subscription layer, and fleet dollar utilization rates are not
        disclosed in any public SEC filing, earnings release, or IR supplement.
      whyItMatters: >-
        T3 ARR is the primary driver of the technology premium that differentiates EquipmentShare
        from pure-rental peers; without it, 30-50% of bull case upside is unverifiable. Fleet
        utilization governs EBITDA sensitivity to construction cycles and cannot be modeled
        independently without this data.
      diligencePath: >-
        Require T3 standalone segment reporting per ASC 280 in the next 10-K (FY2026, due March
        2027); request ARR, GRR, NRR, and quarterly dollar utilization by category from the CFO
        data room prior to any position increase above initial weight.
      relatedQuestionRefs: [QV010, QV016]
      relatedTableRefs: [TV006]

    - type: enumeration-incomplete
      severity: material
      topic: comparable-valuation-table
      missingEvidence: >-
        Private equipment rental companies including Sunstate Equipment, BlueLine Rental, and
        other regional operators lack publicly disclosed EV or EBITDA data and cannot be included
        in the comparable valuation table.
      whyItMatters: >-
        The comparable set is limited to four public companies; a full enumeration would include
        private operators that may trade at different implied multiples in M&A transactions,
        potentially affecting the floor/ceiling valuation range.
      diligencePath: >-
        Monitor M&A transactions in the equipment rental sector for implied multiples; access
        private company databases for regional operator benchmarks.
      relatedQuestionRefs: [QV020]
      relatedTableRefs: [TV004]

    - type: private-evidence-only
