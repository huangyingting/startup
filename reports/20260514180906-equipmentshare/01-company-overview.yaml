callouts:
  - calloutType: strength
    title: "Public Company with Audited Financials"
    body: "EquipmentShare's January 2026 IPO (Nasdaq: EQPT) provides unprecedented financial transparency for a former construction-tech private unicorn. Audited 10-K and 10-Q filings confirm $4.4B+ in trailing revenue and 34% rental segment growth, removing disclosure risk for prospective investors."
    claimRefs: [CO017, CO027, CO028]

  - calloutType: strength
    title: "Exceptional Revenue Growth Trajectory"
    body: "Rental segment revenue grew from $2,035M (2024) to $2,724M (2025, +34%) and reached a $2,932M TTM run rate through Q1 2026. Full-year 2026 guidance midpoint implies total revenue of ~$5,361M (+22% from 2025), underscoring a sustained high-growth trajectory."
    claimRefs: [CO028, CO030]

  - calloutType: risk
    title: "Key-Person Concentration"
    body: "Jabbok and Willy Schlacks founded the company together, hold Class B supervoting shares, and lead as CEO and President respectively. Their departure or conflict would materially impact strategy and culture. Both received large IPO Founders Awards, reducing near-term departure risk but heightening succession planning gaps."
    claimRefs: [CO006, CO007, CO011]

  - calloutType: insight
    title: "OWN Program Creates Novel Capital Structure Risk"
    body: "Approximately 56% of EquipmentShare's rental fleet (by OEC) as of year-end 2025 is owned by third-party OWN Program participants. While capital-light and margin-enhancing for EquipmentShare, this creates counter-party risk if program investors exit en masse or if asset values decline. This is a novel risk not shared by traditional rental operators."
    claimRefs: [CO016, CO033]

