  name: "EquipmentShare"

chapter:
  number: 1
  title: "Company Overview"
  summary: "EquipmentShare (Nasdaq: EQPT), founded in 2015 and headquartered in Columbia, Missouri, is a vertically integrated construction technology and equipment rental platform that completed its IPO on January 23, 2026 at $24.50 per share raising ~$747 million. The company operates 407 locations across 45 US states, manages a T3-connected fleet of 357,000+ assets, and generated $4,379 million in full-year 2025 revenue—with the rental segment growing 34% year-over-year to $2,724 million."

sections:
  - id: identity-and-mission
    title: "Identity and Mission"
    body: |
      EquipmentShare.com Inc (Nasdaq: EQPT) is an American construction technology and equipment solutions company headquartered at 5710 Bull Run Drive, Columbia, Missouri. The company was incorporated in 2014 and commenced operations on January 1, 2015, after being accepted into Y Combinator's Winter 2015 batch. Effective June 30, 2025, it reincorporated from Delaware to Texas. EquipmentShare's stated mission is to "enable the construction industry with tools that unlock substantial increases to productivity," positioning itself as builder of "the future of construction."

      The company is a vertically integrated platform combining proprietary T3 cloud technology, a connected equipment fleet, and a nationwide branch footprint. Unlike traditional equipment rental companies, EquipmentShare embeds telematics hardware and software intelligence into every machine it operates, creating a persistent data layer across the jobsite. This integrated model allows it to offer rental customers real-time visibility into fleet location, health, and utilization—capabilities that competitors with separate technology stacks typically cannot match at the same depth.

      EquipmentShare serves three broad revenue streams: (1) equipment rental and related services, which is the primary and fastest-growing segment; (2) equipment sales of new and used machinery; and (3) an emerging telematics SaaS subscription business sold to customers operating their own fleets. The company also retails building materials and hardware through Forge & Build branded stores and operates nine OEM dealership sites. By bundling hardware, software, rental access, and service under one platform, EquipmentShare aims to position T3 as the operating system for construction—an analogy to what iOS or Android did for mobile.
    claimRefs: [CO001, CO002, CO003, CO004, CO005]

  - id: founders-and-leadership
    title: "Founders and Leadership"
    body: |
      EquipmentShare was co-founded by brothers Jabbok Schlacks (CEO) and William "Willy" Schlacks (President), along with co-founders Jeff Lowe, Matthew McDonald, and Brad Siegler. As teenagers, Jabbok and Willy built businesses across construction, technology, and general contracting, giving them first-hand operational experience with the pain points contractors face. In 2014, they won Startup Weekend Columbia with a peer-to-peer equipment marketplace concept, which evolved into the company's current integrated rental and technology platform.

      Jabbok Schlacks leads company strategy, growth, and investor relations as CEO. Willy Schlacks leads product, technology, and operational execution as President. Their combined founder-market fit is considered a significant competitive asset: they understand the construction workflow from the ground level, which has shaped product decisions and customer relationships. Both founders retained significant equity stakes through the IPO, maintaining strong alignment of interest with public shareholders. Jabbok and Willy Schlacks received IPO Founders Awards (equity grants tied to the IPO) disclosed in the company's 2025 10-K.

      As of the 2025 10-K filing, the company had 7,700+ team members (LinkedIn cites 8,000+ and earlier about page references 8,500+). The leadership team also includes a VP of Investor Relations (Rhett Butler), who handles capital markets communications. The company is headquartered at 5710 Bull Run Drive, Columbia, Missouri 65201, telephone (573) 299-5222.
    claimRefs: [CO006, CO007, CO008, CO009, CO010, CO011]

  - id: funding-history-and-ipo
    title: "Funding History and IPO"
    body: |
      EquipmentShare went from a Y Combinator seed startup to one of the largest construction-tech IPOs in recent memory. Early funding included a $5.5 million Series A round and a $26 million Series B, both completed between 2015 and 2017. The company then raised a reported $220 million Series E in late 2021, followed by a landmark $600 million Series F round in April 2022 led by SoftBank Vision Fund 2 at a post-money valuation of $3.3 billion—tripling the company's valuation and making it one of the most valuable construction-tech startups in the United States at the time.

      In 2023, the company closed a $3 billion senior secured asset-based revolving credit facility with Capital One Bank, providing substantial liquidity for fleet expansion under the capital-efficient OWN Program model.

      EquipmentShare filed its S-1 with the SEC on December 9, 2025 (amended January 13, 2026) and completed its IPO on January 23, 2026, listing on the Nasdaq Global Select Market under ticker EQPT at $24.50 per share. The IPO raised approximately $747 million in gross proceeds. The Reuters news cited a target valuation of over $6 billion for the IPO. As of February 28, 2026, EquipmentShare had 228,478,203 Class A shares and 37,568,944 Class B shares outstanding—approximately 266 million total shares, implying a market capitalization of roughly $6.5 billion at the IPO price.
    claimRefs: [CO012, CO013, CO014, CO015, CO016, CO017, CO018]
    tableRefs: [TO003, TO004]

  - id: scale-and-milestones
    title: "Scale and Key Milestones"
    body: |
      EquipmentShare has grown with exceptional speed since commencing operations in 2015. By 2018-2020 the company opened its 100th location, was named one of Forbes' Best Startup Employers, launched dealerships for Link-Belt, Takeuchi, Yanmar and others, became the largest buyer of construction equipment, launched Tooling Solutions as an equipment division, and premiered a pilot autonomous machine operating system at Bauma in Munich. By 2021-2023 the company rebranded its technology platform to T3 (The Operating System for Construction), launched Advanced Solutions as a specialty equipment division, became the 4th largest equipment rental company in the United States, and announced the Forge & Build retail hardware brand.

      In 2024, EquipmentShare opened its Technology Development Center (TDC) in Columbia—a $100 million expansion of its HQ designed to create 500 jobs, attended by Missouri Governor Mike Kehoe. The company launched Site Solutions to support large jobsites and opened its Uptime Center, a 24/7 team to monitor T3-connected equipment and jobsites. The company's 300th location milestone was also reached during this period. By year-end 2025, the company operated 385 locations (352 full-service rental branches, 9 dealerships, 24 building materials stores) and opened 95 new locations during the year. As of Q1 2026, EquipmentShare operates 407 locations.

      Key operating metrics as of May 2026 include: 357,000+ assets connected through T3, 6 billion+ data points streamed daily, 45 states served, and $8.1 billion+ in original equipment cost (OEC) under management. The Inc. 5000 2025 ranked EquipmentShare No. 1,742 with 251% three-year revenue growth (2021-2024), and Y Combinator named it to its Top Companies by Revenue (Top 50) list.
    claimRefs: [CO019, CO020, CO021, CO022, CO023, CO024, CO025, CO026]
    tableRefs: [TO002]
    figureRefs: [FO001, FO002]

  - id: snapshot-kpis
    title: "Snapshot KPIs"
    body: |
      EquipmentShare's current scale is anchored by audited financials as a newly public company. Full-year 2025 total revenue reached $4,379 million, up 16% from $3,764 million in 2024. The rental segment—the highest-margin and fastest-growing core—contributed $2,724 million in 2025, up 34% year-over-year. Q1 2026 total revenue was $989 million (up 38% year-over-year), and trailing twelve months (TTM) revenue through Q1 2026 was $4,652 million. The company generated net income of $40 million for full-year 2025 and Adjusted Core EBITDA of $1,667 million.

      Mature rental location Adjusted EBITDA margins were 54% for full-year 2025, rising to 55% on a TTM basis through Q1 2026. Mature location return on invested capital was 16.5% for 2025. The company had total available liquidity of $1,605 million as of March 31, 2026, including $1,276 million revolving credit availability and $329 million in cash. Net leverage stood at 2.8x as of Q1 2026, down from 3.2x a year earlier. The company's 2026 full-year guidance calls for total revenue of $5,147–$5,575 million and Adjusted Core EBITDA of $1,883–$1,995 million.

      Key data gaps: granular gross margin by segment is not broken out publicly at the SaaS/telematics level; headcount breakdown by function; exact T3 SaaS subscription revenue contribution as a standalone segment. The company does not separately disclose T3 standalone subscription ARR, making it difficult to value the technology layer independently from the rental business.
    claimRefs: [CO027, CO028, CO029, CO030, CO031, CO032]
    tableRefs: [TO001]
    figureRefs: [FO003]

