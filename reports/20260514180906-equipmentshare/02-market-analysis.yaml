company:
  name: "EquipmentShare"

chapter:
  number: 2
  title: "Market Analysis"
  summary: >-
    EquipmentShare competes in a US equipment rental market estimated at $70B+ (2024), within a global market of ~$121.6B. The
    company's relevant SAM is the non-residential, industrial, and infrastructure segment across its 45-state footprint—roughly
    $40–55B of rentable demand. Multi-year federal infrastructure tailwinds from the IIJA, data center and AI construction
    investment, and manufacturing reshoring all support sustained demand. Growth constraints include construction cyclicality,
    fragmented and price-sensitive buyer behaviour, low technology adoption rates among small contractors, and the capital
    intensity of fleet-based scaling. Conflicting market size estimates (RER vs MarketsandMarkets) and undisclosed T3 SaaS ARR
    represent the primary unresolved sizing gaps.

sections:
  - id: market-boundary
    title: "Market Boundary and Scope"
    body: |
      EquipmentShare's core market is the US equipment rental industry—the subset of US construction and industrial
      activity in which operators rent, rather than own, the capital equipment required for project execution. The
      US equipment rental market is estimated at $70B+ for 2024 by the RER Top 100 industry ranking, the most
      widely cited domestic benchmark. Within that, EquipmentShare focuses on the non-residential and infrastructure
      segment—commercial buildings, industrial facilities, data centers, manufacturing plants, civil works, highways,
      bridges, and utilities—as opposed to residential single-family homebuilding, which uses lighter and less
      specialized equipment and is dominated by local dealers rather than national rental platforms.

      The included spend covers earthmoving equipment (excavators, loaders, graders, compactors), aerial work
      platforms (boom lifts, scissor lifts), cranes and material handlers, portable power and climate control,
      specialty equipment (trench shoring, demolition, paving), and jobsite tool solutions. Excluded spend includes
      residential-specific tools, consumer equipment hire, owner-operator fleet purchases that bypass rental
      entirely, and the broader construction services market (labor, materials, engineering). The adjacent markets
      most relevant for EquipmentShare's long-term ambition are fleet telematics software (sold to contractors
      managing their own equipment), the used equipment resale market, and building materials retail (served
      through Forge & Build branded stores, 24 locations).

      Status-quo substitutes—what buyers do instead of renting from a national provider—include: owning equipment
      outright (the dominant historic model for large contractors), renting from local independents, renting from
      regional players, or using a specialty subcontractor that brings its own gear. National rental platforms
      compete primarily on availability, geographic reach, fleet breadth, uptime guarantee, and increasingly on
      technology integration. EquipmentShare's T3 telematics platform is the primary differentiation lever in this
      dimension. The US construction market totals $2T+ when residential and infrastructure are both included,
      underscoring that the rental addressable segment is a substantial but well-defined subset.
