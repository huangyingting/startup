  - id: market-sizing
    title: "Market Sizing: TAM, SAM, and SOM"
    body: |
      Two primary sizing lenses are available for the US equipment rental market. The RER Top 100 annual industry
      ranking, the most authoritative domestic source, puts the US market at approximately $70B+ for 2024 based on
      aggregated revenues of the top 100 rental companies. MarketsandMarkets, a commercial research firm, estimates
      the global equipment rental market at $121.6B in 2024 with a projected CAGR of approximately 4.5–5% through
      2029, reaching roughly $152B globally. These two lenses are not directly comparable—one is US-only and
      revenue-based; the other is global and uses shipment/revenue modelling—but together they establish the outer
      envelope and domestic anchor.

      For EquipmentShare specifically, the most defensible SAM is the non-residential and infrastructure equipment
      rental demand across the 45 US states where the company currently operates. A rough triangulation: if the
      US rental market is ~$70B and residential/light-commercial are approximately 20–25% of that, the non-residential
      and infrastructure portion is roughly $52–56B. Adjusting for the 45-state geographic coverage and competitive
      overlap yields an estimated SAM of $40–55B. This is a rough and uncertain estimate; EquipmentShare does not
      disclose its own SAM sizing in public filings.

      EquipmentShare's FY2025 rental segment revenue of $2,724M implies a current market share of approximately 3.9%
      of the $70B US TAM—or roughly 5–7% of a more narrowly defined SAM. For context, United Rentals generated
      approximately $15B in 2025 revenue (~21% of the US TAM), making it the clear market leader at roughly five
      times EquipmentShare's rental scale. Sunbelt Rentals (~$8B) and Herc Holdings (~$3.5B) fill the second and
      third positions. The top four players collectively represent roughly 40–42% of the US market; the remaining
      58% is fragmented among regional and local operators. This fragmentation is the central thesis for
      EquipmentShare's geographic expansion and consolidation strategy.

      SOM analysis: EquipmentShare's 2026 full-year revenue guidance of $5.1–$5.6B (all segments) suggests
      continued aggressive share capture. If rental grows at similar 30%+ rates through 2027, rental revenue could
      approach $4–5B, implying a US market share of roughly 6–7% by 2027—a plausible but not certain trajectory
      given construction cycle risks and competitor capital availability.
