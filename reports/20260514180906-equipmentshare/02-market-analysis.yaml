callouts:
  - calloutType: insight
    title: "IIJA and AI Infrastructure Create Multi-Year Demand Backstop"
    body: >-
      The IIJA's $1.2T in federal infrastructure spending over 10 years and the ongoing data center construction
      boom driven by AI infrastructure investment provide durable, multi-year demand visibility for heavy
      construction equipment rental that is more policy-anchored and less cyclically sensitive than typical
      private construction cycles.
    claimRefs:
      - CM008
      - CM016
      - CM017

  - calloutType: risk
    title: "T3 SaaS Sizing Remains Unverifiable from Public Data"
    body: >-
      EquipmentShare does not disclose T3 SaaS subscription revenue, customer count, or ARR as a standalone
      segment. Investors relying on a technology company valuation premium cannot verify the software layer's
      contribution from public sources. This gap is material to underwriting the valuation spread between
      EquipmentShare and pure-play rental comps.
    claimRefs:
      - CM020
      - CM023
      - CM046

  - calloutType: risk
    title: "Construction Cyclicality Remains the Primary Demand Risk"
    body: >-
      EquipmentShare's 10-K explicitly identifies economic slowdowns and construction spending declines as
      principal risk factors. US equipment rental demand fell sharply during the 2008–2009 financial crisis
      and during the 2020 COVID lockdowns. Despite IIJA and reshoring tailwinds, a broad US recession would
      compress non-residential construction spending and directly impair rental utilization rates and revenue.
    claimRefs:
      - CM035
      - CM040
      - CM047

