  evidenceGaps:
    - type: missing-source
      severity: material
      topic: "T3 SaaS subscription revenue and ARR"
      missingEvidence: >-
        EquipmentShare does not disclose T3 SaaS ARR, subscription customer count, average contract value,
        or churn rate as a standalone segment in its 10-K, 10-Q, or investor materials.
      whyItMatters: >-
        Without T3 SaaS metrics, investors cannot independently verify the technology premium priced into
        EQPT vs pure-play rental comps like URI or HEES. The company's positioning as a technology business
        with rental attached cannot be underwritten without software revenue visibility.
      diligencePath: >-
        Request T3 SaaS ARR, customer count by subscription tier, average contract value, and NRR in
        management due diligence. Cross-reference with S-1 product descriptions and IR presentations.
      relatedQuestionRefs:
        - QM020

    - type: missing-source
      severity: minor
      topic: "Equipment rental penetration rate primary source"
      missingEvidence: >-
        The ~55% construction equipment rental penetration rate is widely cited in industry discussions
        but the primary data source and methodology are not publicly documented from available public sources.
        ARA (American Rental Association) and RER publish related data, but exact survey methodology is unclear.
      whyItMatters: >-
        Whether penetration is trending up (TAM expansion), flat, or plateauing affects the long-term
        addressable market size. If penetration has peaked, growth is purely share-capture within a fixed TAM.
      diligencePath: >-
        Request ARA Rental Market Monitor primary data. Review RER Top 100 historical series for penetration
        trend methodology. Check EquipmentShare S-1 for any internal penetration rate disclosure.
      relatedQuestionRefs:
        - QM016

    - type: missing-source
      severity: minor
      topic: "US equipment rental market growth rate – conflicting forward estimates"
      missingEvidence: >-
        Available public sources provide different US market growth rate estimates. MarketsandMarkets
        projects ~4.5–5% global CAGR but does not publish US-specific forward projections from available
        access. FMI and Dodge provide construction outlook but do not specifically size rental sub-market growth.
      whyItMatters: >-
        Conflicting forward growth estimates widen the range of reasonable SOM projections for EquipmentShare
        and make it difficult to triangulate terminal revenue share without better-sourced data.
      diligencePath: >-
        Source ARA Equipment Rental Industry Outlook report (subscription). Review United Rentals and Sunbelt
        Rentals investor presentations for market growth assumptions. Build bottom-up from Census construction
        projection multiplied by rental penetration rate trend.
      relatedQuestionRefs:
        - QM019
