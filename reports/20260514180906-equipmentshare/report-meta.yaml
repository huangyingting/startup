companyProfile:
  summary: "EquipmentShare (Nasdaq: EQPT) is a Columbia, Missouri-based construction technology and equipment rental company founded in 2015 by brothers Jabbok and Willy Schlacks. The company IPO'd on January 23, 2026 at $24.50/share, raising ~$747M. It operates 407 locations across 45 US states, manages 357,000+ connected assets through its proprietary T3 platform, and generated $4,379M in FY2025 revenue (+16% YoY), with the rental segment growing 34% to $2,724M."
  foundedDate: "2015-01-01"
  founders:
    - name: "Jabbok Schlacks"
      role: "CEO and Co-Founder"
      background: "Serial entrepreneur with background in construction and technology; co-founder since 2014."
      claimRefs: ["CO006"]
    - name: "William (Willy) Schlacks"
      role: "President and Co-Founder"
      background: "Co-founder leading product, technology, and operational execution since 2014."
      claimRefs: ["CO006"]
  foundingLocation: "Columbia, MO"
  headquarters: "Columbia, MO"
  productSummary: "Equipment rental (heavy construction, aerial, earthmoving, material handling, power & HVAC, specialty) augmented by T3 — an OEM-agnostic IoT/SaaS platform providing GPS tracking, predictive maintenance, fleet management, and remote monitoring for 357,000+ connected assets. Also sells new/used equipment via dealerships and retails building materials via Forge & Build stores."
  customerFocus: "General contractors, specialty subcontractors, industrial operators, infrastructure developers, data center builders, and manufacturing facilities across 45 US states."
  businessModel: "Three revenue streams: (1) equipment rental and related services (~62% of revenue), (2) equipment sales new and used, (3) T3 SaaS subscriptions and contractor supplies. Capital-light OWN Program lets third-party fleet owners supply ~56% of OEC, reducing capex. T3 subscriptions sold externally create recurring tech revenue."
  stage: "Public (Nasdaq: EQPT)"
  fundingStatus: "IPO January 2026 raising ~$747M; total equity raised pre-IPO ~$852M including $600M Series F (SoftBank Vision Fund 2, April 2022 at $3.3B valuation); $3B ABL revolving credit facility (Capital One, 2023)."
  disclosureProfile: "public"
  claimRefs: ["CO001", "CO012", "CO027"]

