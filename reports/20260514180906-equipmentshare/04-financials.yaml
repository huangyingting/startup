company:
  name: "EquipmentShare"

chapter:
  number: 4
  title: "Financials"
  summary: >
    EquipmentShare (Nasdaq: EQPT) delivered audited FY2025 total revenue of $4,379M (+16% YoY), with the rental
    segment—its highest-margin core—growing 34% to $2,724M (62.2% of total revenue). Adjusted Core EBITDA reached
    $1,667M in FY2025, expanding to $1,776M on a TTM basis through Q1 2026, when total revenue hit $989M (+38% YoY).
    Mature rental locations generated 54–55% Adj. EBITDA margins and 16.5% ROIC. The company entered 2026 with $1,605M
    in available liquidity and net leverage of 2.8x (down from 3.2x a year earlier), anchored by the January 2026 IPO
    that raised ~$747M. The OWN Program (~56% of fleet OEC, $4.9B) structurally offsets capital intensity by
    externalizing fleet ownership. Full-year 2026 guidance calls for $5,147M–$5,575M revenue and $1,883M–$1,995M Adj.
    Core EBITDA. Primary financial diligence blockers are the non-disclosure of T3 SaaS subscription revenue as a
    standalone segment, fleet utilization rates, and segment-level gross margins.

sections:
  - id: SI-S1
    title: "Revenue Streams, Pricing Model, and Recognition"
    body: |
      EquipmentShare generates revenue across three reported segments: (1) equipment rental and related services
      ($2,724M in FY2025, 62.2% of total revenue), which is time-based rental of construction equipment bundled with
      delivery, maintenance, and telematics via the T3 platform; (2) equipment sales of new and used machinery
      (estimated ~$1,400M, ~32% of total), encompassing OEM dealership sales and fleet disposition; and (3) contractor
      supplies and other (~$255M, ~5.8%), which includes retail hardware through Forge & Build stores and ancillary
      services. An emerging fourth stream—T3 telematics SaaS subscriptions sold to external customers managing their
      own fleets—is operationally present (357,000+ connected assets including third-party) but not separately reported,
      representing a key information gap.

      Revenue recognition follows ASC 606 and ASC 842: rental revenue is accrued ratably over the rental period (daily,
      weekly, or monthly), equipment sales are recognized at the point of transfer of control (delivery), and contractor
      supplies revenue is recognized at the point of sale. T3 subscription revenue for external customers, where billed,
      would be recognized ratably over the subscription term. The rental segment's ratability creates a deferred
      revenue liability for advance-billed periods that is modest relative to the business scale.

      Rental pricing is set dynamically based on geography, equipment category, rental duration, customer volume, and
      fleet availability. No public rate cards are disclosed; pricing is established through quotation or negotiated
      master service agreements with larger accounts. The rental segment's 34% YoY growth in FY2025 substantially
      outpaced total revenue growth of 16%, indicating favorable mix shift toward the highest-margin stream. Revenue
      quality for the rental segment is high: contracts are typically short-duration (daily to monthly), limiting
      long-tail credit exposure, and the T3 platform provides per-asset monitoring that reduces theft and damage risk.
    claimRefs: [CI001, CI002, CI018, CI019, CI023]
    tableRefs: [TI001, TI002]
    figureRefs: [FI001]

  - id: SI-S2
    title: "GTM Motion and Sales Efficiency"
    body: |
      EquipmentShare's go-to-market is primarily direct B2B, operating through a hybrid model of national account
      relationships and local branch-level contractor relationships. The 407-location footprint as of Q1 2026 functions
      as a distributed sales and fulfillment network: each branch serves a local construction market with dedicated
      sales personnel, enabling proximity-based relationships that are difficult for remote competitors to replicate.
      National account teams pursue large general contractors, homebuilders, and infrastructure firms that operate
      across multiple geographies and can benefit from consolidated fleet management via T3.

      Sales cycle proxies are not formally disclosed, but the rental industry model implies short closing cycles for
      standard equipment (days to weeks from inquiry to delivery) and longer enterprise cycles for national account
      contracts involving T3 platform integration (weeks to months). Customer acquisition cost is not publicly
      reported; proxy estimation using branch-level expansion economics suggests each new branch location (open under
      12 months) incurs startup costs that are excluded from the mature EBITDA calculation, implying the company
      tracks ramp economics internally but does not disclose them.

      The T3 platform functions as a retention and upsell mechanism: once a contractor integrates T3 data into
      jobsite workflows, switching costs increase because equipment data, utilization history, and maintenance records
      are embedded in the platform. This creates a structural advantage in customer retention that is difficult to
      quantify from public disclosures. The OWN Program also serves a GTM function by attracting third-party fleet
      owners who become economically aligned with EquipmentShare's platform, effectively expanding the distribution
      network without commensurate capex.
    claimRefs: [CI025, CI028, CI029, CI033]
    tableRefs: []
    figureRefs: [FI002]

  - id: SI-S3
    title: "Cost Structure, Gross Margin, Working Capital, and Capex"
    body: |
      EquipmentShare does not disaggregate segment-level gross margins in its public filings, which is a material
      analytical gap. From first principles, the rental segment carries significantly higher gross margins than
      equipment sales: rental revenue is recurring and largely fixed-cost in nature (fleet D&A, maintenance,
      insurance), while equipment sales revenue carries direct COGS of the equipment value at near-wholesale levels.
      Industry comparables suggest rental gross margins in the 55–65% range for mature operators, versus 10–20%
      for equipment sales. The blended company EBITDA margin of approximately 38% (Adj. Core EBITDA $1,667M /
      revenue $4,379M) is consistent with a rental-heavy mix at the EquipmentShare scale.

      Fleet capex is the dominant capital outflow: EquipmentShare spent approximately $1.8B on equipment in FY2025,
      exceeding its Adj. Core EBITDA of $1,667M and making free cash flow negative before financing activities.
      The OWN Program mitigates this by externalizing fleet ownership—approximately 56% of fleet OEC ($4.9B of
      $8.78B) is contributed by third-party owners under revenue-sharing arrangements, meaning EquipmentShare
      generates rental revenue from assets it does not own. This capital-light program structurally reduces gross
      capex requirements and improves ROIC optics.

      Working capital dynamics are favorable for the rental business: rental revenue is billed in advance or on
      cycle, limiting receivables buildup, and equipment inventory turnover is managed through T3 utilization data.
      Equipment sales working capital is more complex, as new equipment inventory must be financed before sale.
      The $3B ABL revolving credit facility is specifically structured as an asset-based facility secured by
      fleet assets, making it effectively self-funding as the fleet grows. Net leverage improved from 3.2x at
      Q1 2025 to 2.8x at Q1 2026, reflecting EBITDA growth outpacing debt growth post-IPO.
    claimRefs: [CI020, CI022, CI031, CI034, CI036, CI037, CI038, CI041]
    tableRefs: [TI003]
    figureRefs: [FI004]

  - id: SI-S4
    title: "Public Traction and Private Metric Gaps"
    body: |
      EquipmentShare's public financial traction is well-documented for a recently-listed company. Audited FY2025
      revenue of $4,379M (+16% YoY from $3,764M in FY2024) is supported by a 10-K filed March 19, 2026.
      Q1 2026 total revenue of $989M (+38% YoY) and TTM revenue of $4,652M are reported in the May 2026 earnings
      press release. The company raised the 2026 guidance midpoint from prior estimates to $5,147M–$5,575M
      revenue and $1,883M–$1,995M Adj. Core EBITDA. Operational metrics include 407 locations, 357,000+ T3
      connected assets, fleet OEC of $9,065M, and 252,252 fleet units with average age of 31 months.

      Key private metrics not publicly disclosed include: (a) T3 SaaS subscription revenue as a standalone
      segment—the company manages 357,000+ connected assets but does not report per-asset subscription ARR,
      customer count for external SaaS, or NRR for the software layer; (b) fleet physical utilization rate
      (the dollar utilization formula is referenced but actual rates not disclosed); (c) segment-level gross
      margins for rental versus sales versus other; (d) CAC and sales cycle data by channel; (e) OWN Program
      contractual terms including revenue-sharing rates and fleet owner concentration.

      The absence of T3 SaaS metrics is the most significant valuation gap: if T3 subscriptions generate even
      $200–$400M in high-margin recurring ARR, the implied software multiple on that layer could represent 30–50%
      of the total enterprise value—but investors cannot verify or model this without disclosure. The company's
      willingness to disclose T3 metrics in future 10-K/10-Q filings as the software segment matures will be
      a critical catalyst for re-rating.
    claimRefs: [CI001, CI002, CI003, CI004, CI005, CI006, CI007, CI008, CI013, CI021, CI024, CI027, CI035]
    tableRefs: [TI005]
    figureRefs: [FI003]

  - id: SI-S5
    title: "Capital Adequacy and Financing Dependency"
    body: |
      EquipmentShare entered the public markets with a substantially improved capital position following its
      January 2026 IPO, which raised approximately $747M at $24.50 per share. As of Q1 2026, available
      liquidity stood at $1,605M: $329M in cash and cash equivalents plus $1,276M of undrawn capacity under
      the $3B ABL revolving credit facility with Capital One Bank (closed 2023). Net leverage declined from
      3.2x at Q1 2025 to 2.8x at Q1 2026, reflecting both debt paydown and EBITDA growth. The ABL facility
      is secured by fleet assets and scales with the fleet OEC, providing a natural borrowing base as fleet
      grows.

      Capital allocation is dominated by fleet investment. FY2025 equipment spend was approximately $1.8B,
      nearly matching Adj. Core EBITDA of $1,667M, making the business effectively FCF neutral to slightly
      negative in growth mode. This is structural for the equipment rental sector at EquipmentShare's growth
      rate: expanding from 352 locations to 407 locations in Q1 2026 requires substantial new fleet deployment.
      The OWN Program reduces gross capex requirements: with 56% of fleet OEC externally owned, EquipmentShare
      accesses approximately $4.9B of productive assets without direct capital outlay.

      The next financing trigger is not explicitly disclosed, but the ABL facility and strong guidance momentum
      ($5.1–$5.6B revenue in 2026 at 36–46% EBITDA margin guidance) suggest the company does not need
      equity capital in the near term. Existing covenants are tied to the ABL borrowing base (fleet asset
      values), not fixed financial ratios, reducing the risk of covenant breach in a demand downturn. However,
      the 10-K risk factors explicitly identify construction market cyclicality, fleet asset concentration, and
      high debt levels as material risks, underscoring that financing dependency remains a material
      consideration in stress scenarios.
    claimRefs: [CI014, CI015, CI016, CI017, CI018, CI030, CI031]
    tableRefs: [TI004]
    figureRefs: []

  - id: SI-S6
    title: "Financial Verdict: Revenue Quality, Margin Path, Capital Intensity, and Diligence Blockers"
    body: |
      Revenue quality is high: the rental segment—62% of FY2025 revenue and growing 34% YoY—is recurring,
      asset-backed, and differentiated by the T3 technology platform that creates switching costs and data
      moats. Equipment sales (estimated ~32%) are transactional and lower-margin, but serve fleet refresh
      and relationship-deepening functions rather than constituting the core economic engine. The 38% YoY
      acceleration in Q1 2026 revenue growth (versus 16% for full-year 2025) suggests the business is
      re-accelerating, supported by IIJA infrastructure spending, favorable construction market conditions,
      and new location openings.

      The margin path is credible and well-supported: mature locations delivering 54–55% Adj. EBITDA margins
      and 16.5% ROIC provide a proven template for the newer cohort of branches. The margin trajectory from
      new to mature is the core value-creation thesis; with 95 new locations opened in FY2025 and continued
      expansion, the drag from new location startup costs (excluded from mature metrics) is expected to
      moderate as these branches mature over 12 months.

      Capital intensity is structurally high but partially mitigated: ~$1.8B fleet capex exceeds EBITDA in
      FY2025, making the company FCF-negative on a gross basis. The OWN Program ($4.9B OEC, 56% of fleet)
      is a genuine and significant capital offset. Industry peers United Rentals and Herc Holdings operate
      at broadly comparable leverage and ROIC levels, validating the model at scale.

      Three diligence blockers remain: (1) T3 SaaS ARR is undisclosed, preventing independent valuation of
      the technology layer; (2) fleet utilization rates are not reported, making EBITDA sensitivity analysis
      difficult; (3) segment-level gross margins are not disaggregated, limiting cost-structure modeling.
      Until these are addressed, the technology premium in EquipmentShare's valuation rests on qualitative
      rather than quantitative evidence.
    claimRefs: [CI032, CI033, CI036, CI037, CI038, CI039, CI040]
    tableRefs: []
    figureRefs: []

