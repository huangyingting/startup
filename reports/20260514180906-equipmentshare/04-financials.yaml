  evidenceGaps:
    - type: private-evidence-only
      severity: blocking
      topic: T3-SaaS-ARR
      missingEvidence: >-
        T3 external subscription ARR, connected customer count (external only), net revenue retention
        for T3 subscriptions, and standalone T3 segment P&L are not disclosed in any public filing.
      whyItMatters: >-
        The T3 technology layer is the primary source of EquipmentShare's valuation premium over
        traditional equipment rental peers. Without ARR and margin disclosure, the software component
        cannot be independently valued and the technology thesis cannot be underwritten quantitatively.
      diligencePath: >-
        Require T3 standalone segment reporting in the next 10-K; request ARR, external customer
        count, NRR, and contribution margin from management CFO data room prior to investment.
      relatedQuestionRefs: [QI014, QI024]
      relatedTableRefs: [TI003, TI005]
    - type: private-evidence-only
      severity: material
      topic: fleet-utilization-rate
      missingEvidence: >-
        Physical and dollar utilization rates for the EquipmentShare rental fleet are not publicly
        disclosed, despite being a standard disclosure for public equipment rental companies (United
        Rentals discloses dollar utilization quarterly).
      whyItMatters: >-
        Fleet utilization is the single most important driver of EBITDA in the equipment rental model;
        without utilization data, revenue sensitivity to demand cycles cannot be modeled.
      diligencePath: >-
        Request supplemental quarterly data package with dollar utilization by category; benchmark
        against United Rentals and Herc Holdings utilization rates for comparability.
      relatedQuestionRefs: [QI007, QI022]
      relatedTableRefs: [TI003, TI005]
    - type: private-evidence-only
      severity: material
      topic: segment-gross-margins
      missingEvidence: >-
        Gross profit by segment (rental vs equipment sales vs contractor supplies) is not disclosed
        in the FY2025 10-K or any subsequent quarterly filing.
      whyItMatters: >-
        The mix shift toward the rental segment is the primary margin expansion lever; without segment
        gross margins, the magnitude of the margin benefit cannot be modeled.
      diligencePath: >-
        Require segment gross profit line item in next 10-K per ASC 280; if unavailable, request
        from management data room for the trailing four quarters.
      relatedQuestionRefs: [QI022]
      relatedTableRefs: [TI003, TI005]
    - type: private-evidence-only
      severity: moderate
      topic: OWN-program-terms
      missingEvidence: >-
        OWN Program revenue-sharing rates, contract duration, termination rights, and fleet owner
        concentration are not disclosed in public filings.
      whyItMatters: >-
        The OWN Program contributes 56% of fleet OEC ($4.9B); unknown off-balance-sheet obligations
        and concentration risk among fleet owners represents a material downside scenario if OWN
        owners withdraw or renegotiate terms.
      diligencePath: >-
        Request OWN Program term sheet template, fleet owner concentration report (top 10 owners by
        OEC), and aggregate renewal timeline from management.
      relatedQuestionRefs: [QI019]
      relatedTableRefs: [TI004, TI005]
    - type: private-evidence-only
      severity: moderate
      topic: rental-pricing-undisclosed
      missingEvidence: >-
        EquipmentShare does not publish rental rate cards for any equipment category or geography;
        pricing is established via customer quotation and is absent from all public filings and
        IR materials.
      whyItMatters: >-
        Without pricing data, realized revenue yield per OEC dollar cannot be independently
        calculated, limiting the ability to model revenue from fleet expansion without management
        guidance.
      diligencePath: >-
        Request rate card samples by equipment category and region from sales data room; compare
        realized revenue per OEC to United Rentals dollar utilization disclosure as a proxy check.
      relatedQuestionRefs: [QI005]
      relatedTableRefs: [TI002]
    - type: private-evidence-only
      severity: material
      topic: CAC-and-payback
      missingEvidence: >-
        Customer acquisition cost and branch-level ramp curve data for EquipmentShare's rental
        business are not reported in any public filing; no per-branch payback timeline is publicly
        available.
      whyItMatters: >-
        Without CAC data, the payback period on new branch investments and the efficiency of the
        407-location expansion model cannot be independently assessed by investors.
      diligencePath: >-
        Request per-branch ramp analytics from management data room; require months-to-mature
        disclosure and cumulative EBITDA at 12, 24, and 36 months post-opening for a representative
        cohort of locations.
      relatedQuestionRefs: [QI012]
      relatedTableRefs: [TI003]
