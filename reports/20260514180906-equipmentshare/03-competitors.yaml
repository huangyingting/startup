callouts:
  - calloutType: strength
    title: "Integrated Tech + Rental Model Has No Direct Peer"
    body: >-
      EquipmentShare is the only top-5 US equipment rental company with a proprietary, end-to-end telematics platform
      embedded into every rented machine at no incremental charge. This structural combination—meaningful rental fleet
      scale plus leading technology depth—is not replicated by any incumbent or pure-tech competitor as of May 2026.
      The T3 data flywheel, fed by 357,000+ connected assets and 6B+ daily data points, creates compounding advantages
      in predictive maintenance and jobsite AI that require years of data accumulation to replicate.
    claimRefs: [CP010, CP011, CP024, CP034]

  - calloutType: risk
    title: "United Rentals UR One Expansion Is the Primary Moat Threat"
    body: >-
      United Rentals is actively investing in its UR One digital platform to add fleet utilization analytics,
      predictive maintenance, and customer-facing service capabilities—features that directly address EquipmentShare's
      technology differentiation. URI's ~$15 billion revenue base and $22 billion fleet give it substantial capacity
      to fund this effort. If UR One achieves T3-equivalent functionality within 3–5 years, EquipmentShare's
      technology moat could commoditize among large-account customers before T3 subscriptions generate standalone
      defensible ARR.
    claimRefs: [CP006, CP029, CP040]

  - calloutType: insight
    title: "Status Quo Is the Largest SMB Competitor by Volume"
    body: >-
      Manual tracking—spreadsheets and paper logs—remains the dominant fleet management method for the long-tail
      contractor segment (sub-5 machines). EquipmentShare's near-100 new locations per year expansion strategy is
      primarily a market-creation exercise against this status quo, not a displacement battle against incumbent rental
      companies. Converting manual-tracking SMBs to T3-embedded rental is simultaneously the company's highest-growth
      opportunity and the area where incumbents have the least competitive advantage.
    claimRefs: [CP018, CP030, CP031, CP035]

