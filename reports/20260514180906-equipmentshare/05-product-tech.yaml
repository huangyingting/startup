  - id: ESEC02
    title: "Product Module and Asset Map"
    body: |
      T3 consists of four hardware SKUs and a multi-module cloud SaaS suite. The hardware layer is
      designed for broad OEM compatibility: all devices install on any manufacturer's equipment without
      requiring proprietary bus access or equipment-specific firmware [CE013][CE014]. The T3 Keypad is
      the flagship connected control unit, combining remote lock/unlock, cloud connectivity, and RFID
      card-based job costing to automatically log machine hours against specific projects and operators
      [CE005]. The GPS Tracker provides real-time location and historical playback for any asset in the
      fleet, with geofencing capability to alert managers when equipment leaves designated work zones
      [CE006]. The Dash Cam adds an AI-powered forward-facing and driver-monitoring camera with collision
      detection, fatigue monitoring, and incident flagging [CE015]. Bluetooth Tags extend asset tracking
      to small tools and attachments below the threshold where GPS hardware is economical, completing
      the asset tracking ecosystem down to handheld tools [CE016].

      On the software side, the T3 cloud platform is organized into functional modules: fleet management
      dashboard, real-time GPS and geofencing, maintenance scheduling and service history, fuel monitoring
      and consumption analytics, operator safety and certification tracking, jobsite utilization analytics,
      and a remote lock/unlock command interface [CE007][CE017]. The platform exposes integration APIs
      for connectivity with third-party construction management software such as Procore and Viewpoint,
      allowing contractors to push T3 utilization data into their broader project management workflows
      [CE018]. As of May 2026, T3 is connected to more than 357,000 assets, generating over 6 billion
      data points per day—figures that establish T3 as one of the largest industrial IoT networks in
      the construction sector globally [CE019][CE020].
