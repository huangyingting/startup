  - id: ESEC06
    title: "Trust, Safety, Security, and Compliance"
    body: |
      EquipmentShare's T3 platform handles sensitive operational data—equipment locations, utilization
      patterns, operator identities, and jobsite productivity metrics—for thousands of construction
      customers. The security and compliance posture of the platform is a material diligence
      consideration, particularly given the company's recent IPO and associated public-company disclosure
      obligations [CE041][CE042].

      The 10-K filing for FY2025 explicitly identifies cybersecurity as a risk factor, acknowledging
      that breaches or system failures could damage customer relationships and expose the company to
      liability [CE042]. This disclosure is candid but also confirms that the company's security posture
      has not been independently validated in public disclosures to date. SOC 2 Type II certification—
      the standard expected by enterprise customers for cloud SaaS providers handling sensitive
      operational data—has not been publicly confirmed by EquipmentShare as of May 2026, representing
      a material diligence gap [CE043]. Cloud infrastructure vendor selection (AWS, Azure, or GCP) has
      not been publicly disclosed, leaving hyperscaler redundancy and data residency terms unverifiable
      from public sources [CE044].

      On the safety and quality side, T3's operator safety module tracks operator certifications and
      training records, with the Dash Cam providing AI-powered monitoring of unsafe driving behaviors
      and fatigue indicators [CE015][CE045]. The RFID job costing feature creates an operator-level
      accountability trail for each machine hour logged [CE005]. These features align with OSHA
      construction safety requirements and provide contractors with documentation useful for safety
      audits [CE046]. The National Institute of Standards and Technology (NIST) Cybersecurity Framework
      and ISO 27001 provide the relevant reference standards for a platform handling this class of
      industrial operational data, but alignment with those frameworks has not been publicly confirmed
      [CE043][CE047].
