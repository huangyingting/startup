callouts:
  - calloutType: strength
    title: "357,000+ connected assets create an irreplicable OEM-agnostic dataset moat"
    body: >
      With 357,000+ assets streaming 6 billion data points per day, EquipmentShare has assembled the
      largest OEM-agnostic construction equipment dataset in existence. No single OEM telematics
      system or pure-play competitor can replicate this cross-manufacturer training corpus without
      also operating a comparable scale rental and managed fleet program. Network effects compound
      the advantage: each new connected asset improves ML models across the entire network, creating
      a self-reinforcing moat that widens with scale.
    claimRefs:
      - CE019
      - CE020
      - CE034
      - CE035
  - calloutType: risk
    title: "Cybersecurity posture is under-disclosed relative to platform data sensitivity"
    body: >
      The FY2025 10-K acknowledges cybersecurity risk but no SOC 2 Type II report, ISO 27001
      certification, or independent security audit has been publicly confirmed as of May 2026.
      T3 holds sensitive operational data—equipment locations, operator identities, utilization
      patterns, jobsite productivity—for thousands of construction contractors. A breach or
      platform outage would damage customer relationships and potentially expose the company to
      significant liability. Cloud vendor identity and data residency terms are also undisclosed.
    claimRefs:
      - CE042
      - CE043
      - CE044
  - calloutType: insight
    title: "Autonomous machine OS is the highest-optionality but highest-uncertainty bet"
    body: >
      The $100M TDC investment and Bauma Munich 2022 demo signal genuine R&D ambition in autonomous
      construction equipment. If commercialized, an autonomous machine OS would transform T3 from a
      fleet monitoring tool into a labor-replacement platform—potentially the most significant
      economic disruption in construction since the diesel engine. However, regulatory, safety,
      and adoption timelines for autonomous heavy construction equipment remain highly uncertain,
      and no commercial deployment has been announced.
    claimRefs:
      - CE029
      - CE031
      - CE032

