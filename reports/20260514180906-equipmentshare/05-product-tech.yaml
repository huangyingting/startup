  evidenceGaps:
    - type: private-evidence-only
      severity: material
      topic: compliance
      missingEvidence: >
        No publicly available SOC 2 Type II report, ISO 27001 certification, or independent cybersecurity
        audit has been identified for the T3 platform. Cloud infrastructure vendor identity and data
        residency terms are also undisclosed.
      whyItMatters: >
        Enterprise construction customers handling sensitive operational data (equipment locations,
        operator identities, utilization patterns) expect SOC 2 Type II compliance from SaaS vendors.
        Absence of public confirmation is a material gap for any enterprise sales motion and represents
        an unquantified liability risk acknowledged in the 10-K cybersecurity risk factor.
      diligencePath: >
        Request SOC 2 Type II report from data room. Confirm cloud infrastructure vendor and review
        shared responsibility matrix. Request latest penetration test summary and incident response
        policy. Confirm ISO 27001 roadmap timeline.
      relatedQuestionRefs:
        - QE015
        - QE016
        - QE017

    - type: missing-source
      severity: material
      topic: technology
      missingEvidence: >
        No independent third-party validation of T3 predictive maintenance model accuracy has been
        publicly disclosed. The 357,000 asset / 6B data points claim is company-asserted without
        independent audit. The 20% jobsite efficiency improvement from Yates Construction is a
        single customer testimonial without methodology disclosure.
      whyItMatters: >
        If predictive maintenance accuracy is materially lower than implied, the core platform
        value proposition weakens. Unvalidated scale metrics could mislead investors on the
        competitive moat's depth. A single unaudited testimonial is insufficient to support
        broad efficiency claims.
      diligencePath: >
        Request predictive maintenance model accuracy benchmarks (precision/recall by equipment
        category) from data room. Seek independent third-party dataset validation or academic
        case studies. Request additional customer references with quantified outcomes.
      relatedQuestionRefs:
        - QE008
        - QE019
        - QE024

    - type: private-evidence-only
      severity: material
      topic: roadmap
      missingEvidence: >
        No public commercialization timeline for the autonomous machine operating system has been
        announced. The TDC's R&D roadmap beyond autonomous machine pilot stage and the specific
        technical milestones required for commercial autonomous construction equipment deployment
        are not publicly disclosed.
      whyItMatters: >
        Autonomous construction equipment is the highest-optionality upside in the EquipmentShare
        thesis. Without a credible technology roadmap and commercialization timeline, this
        represents speculative upside that cannot be underwritten.
      diligencePath: >
        Request TDC R&D roadmap from management. Obtain update on autonomous machine OS
        development status since Bauma 2022. Ask about regulatory strategy for autonomous
        heavy construction equipment in US markets.
      relatedQuestionRefs:
        - QE010
        - QE022
