      - number: '8.5'
        title: Exit Readiness, Kill Triggers, and Final Diligence
        blocks:
          - type: paragraph
            body: |
              EquipmentShare entered the public markets in January 2026 and trades on the Nasdaq Global
              Select Market with standard secondary market liquidity. For institutional investors, the
              primary exit path is open-market secondary sales; block trades would be facilitated by the
              company's investment banks (Goldman Sachs was the lead underwriter for the IPO). For private
              equity and strategic investors, potential M&A exit paths include acquisition by United Rentals
              (which has an established track record of acquiring smaller rental operators, including H&E
              Equipment Services), Ashtead Group (seeking to deepen its North American footprint), or a
              private equity take-private at a premium to the public multiple.

              Five thesis-break triggers require continuous monitoring. First, T3 SaaS ARR disclosed as less
              than $100 million: if the software layer generates de minimis revenues, the technology premium
              collapses and the stock should trade at 5-7x EV/EBITDA, implying a 10-30% decline from IPO.
              Second, a 2026 revenue miss of greater than 10% from the guidance midpoint ($5,361M): if
              total revenue falls below $4.8 billion, the EBITDA growth story breaks and the market would
              likely re-price the stock at the bear case multiple. Third, U.S. construction starts declining
              by more than 15% on a trailing three-month basis per AGC or Dodge data: this would signal a
              structural demand reversal that challenges the entire equipment rental thesis. Fourth, net
              leverage rising above 4.0x: this would introduce ABL covenant stress and reduce the equity
              cushion to levels that concern institutional holders. Fifth, aggressive price competition from
              United Rentals or Sunbelt Rentals leading to rental rate compression of more than 5%: EBITDA
              margins would contract sharply given the fixed-cost base of the fleet.

              The final diligence asks before high-conviction investment are: (1) T3 external SaaS ARR as
              a standalone segment metric with customer count and NRR; (2) fleet dollar utilization rates
              by equipment category on a quarterly basis, comparable to the United Rentals disclosure format;
              (3) OWN Program owner concentration (top 10 owners by OEC) and contract terms including
              revenue-sharing rates and termination provisions; (4) gross margin by segment (rental vs.
              equipment sales vs. contractor supplies) to quantify the margin expansion path from mix shift;
              and (5) customer retention/NRR data for both rental customers and T3 subscribers. Until these
              five items are disclosed — either in the next 10-K/10-Q filing or via management data room
              access — conviction remains medium rather than high.
