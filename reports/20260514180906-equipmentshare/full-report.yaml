      - number: '2.3'
        title: Buyer Segmentation and Adoption Path
        blocks:
          - type: paragraph
            body: >
              Equipment rental buyers fall into four primary segments based on project type, budget ownership, and

              technology adoption readiness. General contractors (GCs) are the largest and most relationship-driven
              buyer

              group, typically managing multi-trade projects and making rental decisions at the project management or

              superintendent level. They value fleet availability, cross-state portability of service, and account

              management continuity. GCs rent frequently—on a project-by-project basis—and represent the highest-value

              accounts for national platforms. EquipmentShare's footprint of 407 locations across 45 states is
              specifically

              designed to follow GC jobsite expansion.


              Specialty subcontractors (electricians, plumbers, excavators, concrete specialists) represent a fragmented

              and price-sensitive segment. They typically rent lighter or specialized equipment for specific scopes,
              often

              making decisions at the owner-operator or foreman level with minimal centralized procurement. Adoption of

              technology-enhanced rental products is lowest here due to cost sensitivity and familiarity with local

              relationships. Industrial operators—petrochemical, manufacturing, utilities, data centers—are a growing
              and

              strategically important segment for EquipmentShare given the reshoring and AI infrastructure tailwinds.

              These operators tend to have centralized procurement, recurring rental needs (not project-based), and

              existing comfort with IoT and monitoring tools, making them well-suited for T3 adoption.


              Civil and government contractors (highway, bridge, utility) are driven by long-duration project awards,

              often funded by federal and state dollars. The IIJA's $1.2T in infrastructure spending over 10 years

              creates a sustained demand backlog for heavy earthmoving, paving, and grading equipment. Government-funded

              projects carry procurement complexity (prevailing wage, bonding, insurance) but provide multi-year

              visibility. Budget ownership and the adoption path differ by segment: for GCs, the decision moves from

              project manager to corporate procurement as accounts scale; for industrial operators, procurement and

              plant management are gatekeepers; for civil contractors, project owner and bonding requirements govern.


              The T3 adoption funnel begins at the rental relationship—customers experience T3 telematics on rented

              equipment—and can convert to a standalone SaaS subscription for owned fleets. However, construction

              technology adoption is still early-stage: most US contractors still use pen-and-paper or basic
              spreadsheets

              for jobsite management, representing both a large conversion opportunity and a slow near-term ramp for
              pure

              SaaS monetization. EquipmentShare's strategy is to use the rental relationship as the top-of-funnel for

              T3 adoption.
