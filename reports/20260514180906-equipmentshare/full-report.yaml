              - CP040
          - type: callout
            title: Status Quo Is the Largest SMB Competitor by Volume
            body: >-
              Manual tracking—spreadsheets and paper logs—remains the dominant fleet management method for the long-tail
              contractor segment (sub-5 machines). EquipmentShare's near-100 new locations per year expansion strategy
              is primarily a market-creation exercise against this status quo, not a displacement battle against
              incumbent rental companies. Converting manual-tracking SMBs to T3-embedded rental is simultaneously the
              company's highest-growth opportunity and the area where incumbents have the least competitive advantage.
