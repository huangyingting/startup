      - number: '4.2'
        title: GTM Motion and Sales Efficiency
        blocks:
          - type: paragraph
            body: >
              EquipmentShare's go-to-market is primarily direct B2B, operating through a hybrid model of national
              account

              relationships and local branch-level contractor relationships. The 407-location footprint as of Q1 2026
              functions

              as a distributed sales and fulfillment network: each branch serves a local construction market with
              dedicated

              sales personnel, enabling proximity-based relationships that are difficult for remote competitors to
              replicate.

              National account teams pursue large general contractors, homebuilders, and infrastructure firms that
              operate

              across multiple geographies and can benefit from consolidated fleet management via T3.


              Sales cycle proxies are not formally disclosed, but the rental industry model implies short closing cycles
              for

              standard equipment (days to weeks from inquiry to delivery) and longer enterprise cycles for national
              account

              contracts involving T3 platform integration (weeks to months). Customer acquisition cost is not publicly

              reported; proxy estimation using branch-level expansion economics suggests each new branch location (open
              under

              12 months) incurs startup costs that are excluded from the mature EBITDA calculation, implying the company

              tracks ramp economics internally but does not disclose them.


              The T3 platform functions as a retention and upsell mechanism: once a contractor integrates T3 data into

              jobsite workflows, switching costs increase because equipment data, utilization history, and maintenance
              records

              are embedded in the platform. This creates a structural advantage in customer retention that is difficult
              to

              quantify from public disclosures. The OWN Program also serves a GTM function by attracting third-party
              fleet

              owners who become economically aligned with EquipmentShare's platform, effectively expanding the
              distribution

              network without commensurate capex.
            claimRefs:
              - CI025
              - CI028
              - CI029
              - CI033
