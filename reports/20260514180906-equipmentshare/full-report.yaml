          - type: callout
            title: Autonomous machine OS is the highest-optionality but highest-uncertainty bet
            body: >
              The $100M TDC investment and Bauma Munich 2022 demo signal genuine R&D ambition in autonomous construction
              equipment. If commercialized, an autonomous machine OS would transform T3 from a fleet monitoring tool
              into a labor-replacement platform—potentially the most significant economic disruption in construction
              since the diesel engine. However, regulatory, safety, and adoption timelines for autonomous heavy
              construction equipment remain highly uncertain, and no commercial deployment has been announced.
            calloutType: insight
