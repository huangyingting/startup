      - number: '7.2'
        title: Regulatory and legal risks are non-trivial at 407-location scale
        blocks:
          - type: paragraph
            body: >-
              EquipmentShare's regulatory exposure is geographically dispersed but structurally predictable. With
              approximately 407 locations across North America, the company must maintain equipment rental licenses in
              every operating jurisdiction, comply with state and local business licensing regimes that vary materially
              in their requirements, and satisfy environmental regulations governing equipment emissions and disposal.
              The Environmental Protection Agency's regulations on non-road engine emissions impose compliance
              obligations on both EquipmentShare's owned fleet and, indirectly, its OWN Program participants. Violations
              could result in equipment removal from service, fines, or reputational damage in markets where
              EquipmentShare's customer relationships are sensitive to sustainability commitments.

              OSHA construction safety regulations apply directly to EquipmentShare's workforce of approximately 7,700
              employees and to the equipment it rents to contractors. Any safety incident involving EquipmentShare
              equipment could trigger investigations, citations, and reputational harm that affects customer retention.
              The company is also subject to employment laws across multiple jurisdictions, creating labor regulatory
              complexity that scales with headcount and location count.

              As a newly public company following its January 2026 IPO, EquipmentShare now carries SEC disclosure
              obligations including Regulation S-K risk factor requirements, proxy and corporate governance rules, and
              ongoing material event reporting duties. The dual-class share structure—in which founders retain
              disproportionate voting control through Class B shares—creates governance risk for institutional
              shareholders and may face scrutiny from proxy advisors and index providers. No known material litigation
              or regulatory enforcement actions have been disclosed, but the combination of scale, multi-state
              operations, telematics data collection, and public company obligations creates a risk surface that
              requires ongoing legal resourcing and monitoring. Privacy regulations applicable to T3's collection of
              construction site operational data represent an emerging regulatory risk as state-level data protection
              laws proliferate.
