chapters:
  - number: 1
    title: Company Overview
    sections:
      - number: '1.1'
        title: Identity and Mission
        blocks:
          - type: paragraph
            body: >
              EquipmentShare.com Inc (Nasdaq: EQPT) is an American construction technology and equipment solutions
              company headquartered at 5710 Bull Run Drive, Columbia, Missouri. The company was incorporated in 2014 and
              commenced operations on January 1, 2015, after being accepted into Y Combinator's Winter 2015 batch.
              Effective June 30, 2025, it reincorporated from Delaware to Texas. EquipmentShare's stated mission is to
              "enable the construction industry with tools that unlock substantial increases to productivity,"
              positioning itself as builder of "the future of construction."


              The company is a vertically integrated platform combining proprietary T3 cloud technology, a connected
              equipment fleet, and a nationwide branch footprint. Unlike traditional equipment rental companies,
              EquipmentShare embeds telematics hardware and software intelligence into every machine it operates,
              creating a persistent data layer across the jobsite. This integrated model allows it to offer rental
              customers real-time visibility into fleet location, health, and utilization—capabilities that competitors
              with separate technology stacks typically cannot match at the same depth.


              EquipmentShare serves three broad revenue streams: (1) equipment rental and related services, which is the
              primary and fastest-growing segment; (2) equipment sales of new and used machinery; and (3) an emerging
              telematics SaaS subscription business sold to customers operating their own fleets. The company also
              retails building materials and hardware through Forge & Build branded stores and operates nine OEM
              dealership sites. By bundling hardware, software, rental access, and service under one platform,
              EquipmentShare aims to position T3 as the operating system for construction—an analogy to what iOS or
              Android did for mobile.
            claimRefs:
              - CO001
              - CO002
              - CO003
              - CO004
              - CO005
      - number: '1.2'
        title: Founders and Leadership
        blocks:
          - type: paragraph
            body: >
              EquipmentShare was co-founded by brothers Jabbok Schlacks (CEO) and William "Willy" Schlacks (President),
              along with co-founders Jeff Lowe, Matthew McDonald, and Brad Siegler. As teenagers, Jabbok and Willy built
              businesses across construction, technology, and general contracting, giving them first-hand operational
              experience with the pain points contractors face. In 2014, they won Startup Weekend Columbia with a
              peer-to-peer equipment marketplace concept, which evolved into the company's current integrated rental and
              technology platform.


              Jabbok Schlacks leads company strategy, growth, and investor relations as CEO. Willy Schlacks leads
              product, technology, and operational execution as President. Their combined founder-market fit is
              considered a significant competitive asset: they understand the construction workflow from the ground
              level, which has shaped product decisions and customer relationships. Both founders retained significant
              equity stakes through the IPO, maintaining strong alignment of interest with public shareholders. Jabbok
              and Willy Schlacks received IPO Founders Awards (equity grants tied to the IPO) disclosed in the company's
              2025 10-K.


              As of the 2025 10-K filing, the company had 7,700+ team members (LinkedIn cites 8,000+ and earlier about
              page references 8,500+). The leadership team also includes a VP of Investor Relations (Rhett Butler), who
              handles capital markets communications. The company is headquartered at 5710 Bull Run Drive, Columbia,
              Missouri 65201, telephone (573) 299-5222.
