      - number: '7.4'
        title: OWN Program, partner, and financial model concentration require explicit stress-testing
        blocks:
          - type: paragraph
            body: >-
              The OWN Program is simultaneously EquipmentShare's most distinctive financial innovation and its most
              opaque risk factor. With approximately 56% of the fleet owned by third-party participants, EquipmentShare
              has effectively constructed a variable-cost fleet model that reduces fixed asset exposure—but the
              program's resilience under stress has not been publicly tested. If OWN Program participants face financial
              pressure of their own—as many small and mid-sized equipment owners would in a construction downturn—they
              may choose to withdraw equipment, sell assets to competitors, or renegotiate revenue-sharing terms. The
              number of distinct OWN Program participants, their average fleet contribution, and their contractual
              obligations to EquipmentShare have not been disclosed, making it impossible to independently assess
              concentration risk within this population.

              The $3 billion ABL credit facility is a critical liquidity resource, but it also represents a concentrated
              banking relationship whose terms and covenants could constrain EquipmentShare's operational flexibility in
              a stress scenario. Lenders in the ABL facility hold security interests in the owned fleet, creating a
              situation where a demand downturn could simultaneously reduce asset values (reducing borrowing base) and
              increase draw pressure (increasing utilization). This dynamic is common in asset-intensive lending but
              bears explicit attention given the leverage level.

              Competitive dynamics from United Rentals, which generated approximately $15 billion in revenue and is
              aggressively investing in digital capabilities including its UR One platform, represent a strategic
              concentration risk. If United Rentals successfully commoditizes telematics and fleet management
              technology—either organically or through acquisition—EquipmentShare's T3 differentiation premium could
              compress. Trackunit and Samsara, both targeting the construction telematics market, add further
              competitive pressure to the software layer. Herc Holdings and other mid-tier rental operators also compete
              for EquipmentShare's customer base in specific geographies. The financial model risk is therefore both
              cyclical (demand shock) and competitive (margin compression from technology commoditization).
