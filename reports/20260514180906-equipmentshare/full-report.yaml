            body: >-
              The IIJA's $1.2T in federal infrastructure spending over 10 years and the ongoing data center construction
              boom driven by AI infrastructure investment provide durable, multi-year demand visibility for heavy
              construction equipment rental that is more policy-anchored and less cyclically sensitive than typical
              private construction cycles.
