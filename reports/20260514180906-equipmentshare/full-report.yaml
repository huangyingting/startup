  - number: 3
    title: Competitors
    sections:
      - number: '3.1'
        title: Competitive Landscape
        blocks:
          - type: paragraph
            body: >
              EquipmentShare's competitive environment spans two historically separate industries: equipment rental and

              construction technology software. On the rental side, the company faces three national incumbents—United
              Rentals

              (NYSE: URI), Sunbelt Rentals (Ashtead Group, LSE: AHT), and Herc Holdings (NYSE: HRI)—plus regional
              operators

              led by H&E Equipment Services. These incumbents hold significantly larger fleets and branch networks but
              have

              historically operated with limited proprietary technology stacks. On the technology side, EquipmentShare's
              T3

              platform competes with construction telematics and fleet-management SaaS vendors: Trackunit (Goldman Sachs

              Capital / GRO Capital-backed), Tenna, Samsara (NYSE: IOT), and Hilti ON!Track. These providers deliver

              software-only solutions without the capital-intensive rental fleet component.


              Two non-obvious competitive vectors also matter: status quo competition—spreadsheets and paper logs that

              dominate smaller contractors—and internal build paths, where large general contractors develop proprietary

              fleet-management systems rather than adopting third-party platforms. EquipmentShare's 10-K filing
              explicitly

              names United Rentals, Sunbelt Rentals, Herc Holdings, and H&E Equipment Services as direct competitors,
              and

              identifies technology-based differentiation as a key strategic priority.


              EquipmentShare occupies a structurally distinct quadrant: meaningful rental fleet scale combined with a

              proprietary technology platform that is embedded—not bolted on—into every machine. The RER 100 list ranks

              EquipmentShare as the fifth-largest US rental company by fleet size, while its 34% year-over-year rental
              segment

              growth in FY2025 is the fastest among the top five. The most significant forward risk is United Rentals'

              expanding UR One platform, which could commoditize the technology layer if sufficiently resourced. Likely

              near-term entrants include well-capitalized international telematics players seeking US market share via

              acquisition.
            claimRefs:
