      - number: '8.2'
        title: Financing Context, Valuation, and Entry Discipline
        blocks:
          - type: paragraph
            body: |
              EquipmentShare completed its initial public offering on January 23, 2026 on the Nasdaq Global
              Select Market at $24.50 per share, raising approximately $747 million in gross proceeds. The
              offering comprised 228,478,203 Class A shares and 37,568,944 Class B shares, totaling
              approximately 266 million shares outstanding. At the IPO price, the implied market capitalization
              is approximately $6.5 billion. Adding approximately $5.0 billion in net debt (derived from the
              $3 billion ABL facility and other obligations) and subtracting $329 million in cash as of Q1
              2026, the enterprise value is approximately $11.2 billion. With TTM Adjusted Core EBITDA of
              $1,776 million through Q1 2026, the implied EV/EBITDA multiple at IPO was approximately 6.3x.

              The preference stack was substantially simplified at IPO: all outstanding preferred shares
              converted to Class A common at the offering, eliminating the overhang that typically depresses
              pre-IPO valuations. The capital structure post-IPO consists of common equity (Class A and Class B),
              the $3 billion asset-based revolving credit facility with Capital One Bank, and equipment notes.
              Net leverage declined from 3.2x at Q1 2025 to 2.8x at Q1 2026, and the 2026 guidance raise
              (to $5,147-$5,575 million revenue and $1,883-$1,995 million EBITDA) implies further deleveraging
              through earnings growth. The ABL covenants are borrowing-base tied (fleet OEC), not fixed-ratio,
              reducing covenant breach risk in moderate demand scenarios.

              Entry discipline favors the current price. The 6.3x TTM EV/EBITDA compares favorably to the
              8-15x range for listed rental peers. Even if EquipmentShare trades at a 20% discount to
              mid-cap peers (8x multiple) due to information opacity around T3 metrics, the implied EV would
              be approximately $14.2 billion — a 27% premium to the IPO price. The bear case at 5-6x EBITDA
              implies $8.9-$10.7 billion EV, or -5% to -20% from the IPO price — a bounded downside for a
              business with 38% Q1 revenue growth and improving leverage. The risk/reward at current prices
              is asymmetric to the upside.

              Public evidence substantially supports the IPO price: audited FY2025 10-K revenue and EBITDA
              are confirmed, Q1 2026 results exceed consensus, 2026 guidance has been raised, and the S-1
              registration statement provides detailed financial disclosure. The primary evidence gap is the
              absence of T3 SaaS metrics, which would determine whether the stock deserves a software premium
              above the rental peer multiple.
