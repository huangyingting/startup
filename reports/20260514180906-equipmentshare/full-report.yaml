        title: Exhibits
        blocks:
          - type: callout
            title: 357,000+ connected assets create an irreplicable OEM-agnostic dataset moat
            body: >
              With 357,000+ assets streaming 6 billion data points per day, EquipmentShare has assembled the largest
              OEM-agnostic construction equipment dataset in existence. No single OEM telematics system or pure-play
              competitor can replicate this cross-manufacturer training corpus without also operating a comparable scale
              rental and managed fleet program. Network effects compound the advantage: each new connected asset
              improves ML models across the entire network, creating a self-reinforcing moat that widens with scale.
            calloutType: strength
            claimRefs:
