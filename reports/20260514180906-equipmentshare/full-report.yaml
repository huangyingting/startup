          - type: callout
            title: Cybersecurity posture is under-disclosed relative to platform data sensitivity
            body: >
              The FY2025 10-K acknowledges cybersecurity risk but no SOC 2 Type II report, ISO 27001 certification, or
              independent security audit has been publicly confirmed as of May 2026. T3 holds sensitive operational
              data—equipment locations, operator identities, utilization patterns, jobsite productivity—for thousands of
              construction contractors. A breach or platform outage would damage customer relationships and potentially
              expose the company to significant liability. Cloud vendor identity and data residency terms are also
              undisclosed.
            calloutType: risk
            claimRefs:
              - CE042
              - CE043
