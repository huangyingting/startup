        title: Exhibits
        blocks:
          - type: callout
            title: Integrated Tech + Rental Model Has No Direct Peer
            body: >-
              EquipmentShare is the only top-5 US equipment rental company with a proprietary, end-to-end telematics
              platform embedded into every rented machine at no incremental charge. This structural
              combination—meaningful rental fleet scale plus leading technology depth—is not replicated by any incumbent
              or pure-tech competitor as of May 2026. The T3 data flywheel, fed by 357,000+ connected assets and 6B+
              daily data points, creates compounding advantages in predictive maintenance and jobsite AI that require
              years of data accumulation to replicate.
            calloutType: strength
            claimRefs:
