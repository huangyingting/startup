      - number: '4.3'
        title: Cost Structure, Gross Margin, Working Capital, and Capex
        blocks:
          - type: paragraph
            body: >
              EquipmentShare does not disaggregate segment-level gross margins in its public filings, which is a
              material

              analytical gap. From first principles, the rental segment carries significantly higher gross margins than

              equipment sales: rental revenue is recurring and largely fixed-cost in nature (fleet D&A, maintenance,

              insurance), while equipment sales revenue carries direct COGS of the equipment value at near-wholesale
              levels.

              Industry comparables suggest rental gross margins in the 55–65% range for mature operators, versus 10–20%

              for equipment sales. The blended company EBITDA margin of approximately 38% (Adj. Core EBITDA $1,667M /

              revenue $4,379M) is consistent with a rental-heavy mix at the EquipmentShare scale.


              Fleet capex is the dominant capital outflow: EquipmentShare spent approximately $1.8B on equipment in
              FY2025,

              exceeding its Adj. Core EBITDA of $1,667M and making free cash flow negative before financing activities.

              The OWN Program mitigates this by externalizing fleet ownership—approximately 56% of fleet OEC ($4.9B of

              $8.78B) is contributed by third-party owners under revenue-sharing arrangements, meaning EquipmentShare

              generates rental revenue from assets it does not own. This capital-light program structurally reduces
              gross

              capex requirements and improves ROIC optics.


              Working capital dynamics are favorable for the rental business: rental revenue is billed in advance or on

              cycle, limiting receivables buildup, and equipment inventory turnover is managed through T3 utilization
              data.

              Equipment sales working capital is more complex, as new equipment inventory must be financed before sale.

              The $3B ABL revolving credit facility is specifically structured as an asset-based facility secured by

              fleet assets, making it effectively self-funding as the fleet grows. Net leverage improved from 3.2x at

              Q1 2025 to 2.8x at Q1 2026, reflecting EBITDA growth outpacing debt growth post-IPO.
            claimRefs:
              - CI020
