      - number: '3.2'
        title: Rental Incumbent Profiles
        blocks:
          - type: paragraph
            body: >
              United Rentals is the largest equipment rental company in the United States and the world. With
              approximately

              $15 billion in revenue in FY2024 and more than 1,500 branch locations across 49 states and Canada, URI's
              scale

              advantages are substantial. Its rental fleet OEC of approximately $22 billion is the largest in the
              industry—

              more than twice EquipmentShare's $9 billion. URI serves Fortune 500 national accounts through a dedicated

              program and has executed aggressive M&A: BlueLine Rental (2018), BakerCorp (2018), and General Finance

              Corporation (2021). Critically, URI is expanding its UR One digital platform with enhanced fleet
              utilization

              tracking, predictive maintenance capabilities, and customer-facing service portals—directly addressing

              EquipmentShare's technology moat. URI's financial scale gives it capacity to accelerate this investment

              materially, which is the single most adverse competitive development for EquipmentShare.


              Sunbelt Rentals, the North American arm of Ashtead Group (LSE: AHT), generates approximately $7–8 billion
              in

              annual revenue from more than 1,400 US locations. Sunbelt's strategy emphasizes acquisitive growth and
              specialty

              segment expansion: climate control (ClimateZone), industrial services, and scaffold rental. Sunbelt does
              not

              have a proprietary telematics platform comparable to T3 or UR One as of publicly available evidence.


              Herc Holdings (NYSE: HRI), the fourth-largest US rental company, generated approximately $3.5 billion in
              revenue

              in FY2024 from 400+ locations. It markets under the HercRentals brand and offers a ProContractor program.

              Technology investment is more limited than URI's. H&E Equipment Services, generating approximately $1
              billion in

              revenue, operates primarily in the Gulf Coast and Southeast; its competitive relevance is regional rather
              than

              national.
