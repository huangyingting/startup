      - number: '2.5'
        title: Sizing Diligence Gaps and Conflicting Estimates
        blocks:
          - type: paragraph
            body: |
              Several important gaps and contradictions exist in the publicly available market sizing evidence. First,
              there is a meaningful discrepancy between the RER Top 100 US market estimate (~$70B) and the
              MarketsandMarkets global estimate ($121.6B). These two estimates are not directly reconcilable through
              public information alone: RER is US-only and revenue-based, while MarketsandMarkets uses proprietary
              modelling methodology. The ratio (US ~$70B vs global ~$122B) implies the US represents roughly 57% of
              the global equipment rental market—plausible given US construction activity as a share of global, but
              neither source confirms this methodology.

              Second, EquipmentShare does not publicly disclose its T3 SaaS/telematics subscription revenue as a
              standalone line item. This makes it impossible to independently size the software component of the
              addressable market from public sources. The company's 10-K references T3 as a product category but does
              not break out SaaS ARR, customer count, or average contract value for the software segment. This gap
              matters because the company is often positioned as a technology company with rental attached; without
              T3 SaaS metrics, the valuation premium over pure-play rental comps is difficult to verify.

              Third, the equipment rental penetration rate—estimated at approximately 55% of construction using rented
              equipment—is widely cited in industry discussions but the primary source for this figure is unclear
              from public data. RER and ARA (American Rental Association) publish related data, but the exact
              methodology is not publicly documented. Whether penetration is increasing (favorable for industry TAM
              growth) or has plateaued is a key diligence question that is partially unresolved in public data.

              Fourth, independent research firms have varying estimates for global equipment rental market growth rates.
              MarketsandMarkets projects 4.5–5% CAGR through 2029; other sources cited in industry reports suggest
              lower growth rates. These conflicting projections should be treated as a range rather than a point
              estimate for investment analysis. The absence of a single authoritative bottom-up market sizing study
              based on verified rental receipts (rather than survey or modelling) represents a persistent data gap.
            claimRefs:
              - CM020
              - CM022
              - CM023
              - CM011
              - CM046
