      - number: '1.3'
        title: Funding History and IPO
        blocks:
          - type: paragraph
            body: >
              EquipmentShare went from a Y Combinator seed startup to one of the largest construction-tech IPOs in
              recent memory. Early funding included a $5.5 million Series A round and a $26 million Series B, both
              completed between 2015 and 2017. The company then raised a reported $220 million Series E in late 2021,
              followed by a landmark $600 million Series F round in April 2022 led by SoftBank Vision Fund 2 at a
              post-money valuation of $3.3 billion—tripling the company's valuation and making it one of the most
              valuable construction-tech startups in the United States at the time.


              In 2023, the company closed a $3 billion senior secured asset-based revolving credit facility with Capital
              One Bank, providing substantial liquidity for fleet expansion under the capital-efficient OWN Program
              model.


              EquipmentShare filed its S-1 with the SEC on December 9, 2025 (amended January 13, 2026) and completed its
              IPO on January 23, 2026, listing on the Nasdaq Global Select Market under ticker EQPT at $24.50 per share.
              The IPO raised approximately $747 million in gross proceeds. The Reuters news cited a target valuation of
              over $6 billion for the IPO. As of February 28, 2026, EquipmentShare had 228,478,203 Class A shares and
              37,568,944 Class B shares outstanding—approximately 266 million total shares, implying a market
              capitalization of roughly $6.5 billion at the IPO price.
