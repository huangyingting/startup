      - number: '5.3'
        title: Technology Architecture and Operating Model
        blocks:
          - type: paragraph
            body: |
              T3's architecture spans five layers from hardware sensors to customer application, with the data
              and analytics layer as the primary value-creation engine. At the hardware layer, T3 devices use
              cellular and Bluetooth radio connectivity to stream sensor data continuously—engine hours, GPS
              coordinates, fuel levels, operator identification, and machine diagnostics—regardless of OEM [CE013].
              The connectivity layer relies on carrier-grade cellular networks for real-time telemetry, providing
              coverage wherever machines operate on construction sites without requiring local WiFi infrastructure
              [CE021]. Raw telemetry aggregates in EquipmentShare's cloud data layer, which processes 6 billion
              data points per day and stores a growing historical corpus that underpins predictive models [CE020].

              The application layer delivers six functional dashboards accessible via web and mobile: fleet map
              (live GPS), maintenance calendar, utilization heatmaps, fuel analytics, operator compliance
              tracker, and an uptime alerts feed [CE007][CE017]. Machine learning models trained on the
              historical fleet dataset power predictive maintenance recommendations—identifying equipment likely
              to fail before the failure occurs, allowing pre-scheduled repairs that avoid costly unplanned
              downtime [CE022][CE023]. The T3 Uptime Center is the human-in-the-loop component: a 24/7
              operations team monitors anomaly alerts from connected assets and coordinates maintenance dispatch
              when predictive models flag emerging issues [CE009].

              The operating model separates hardware provisioning from SaaS subscription: hardware devices are
              either sold outright or bundled with rental equipment, while the T3 SaaS subscription covers
              ongoing data access, analytics, and platform updates [CE010][CE024]. OEM-agnostic design is an
              architectural decision that materially expands addressable market—rather than supporting only
              EquipmentShare's own rental inventory, T3 can be sold to any contractor with any manufacturer's
              equipment, turning competitors' fleets into T3 subscribers [CE014][CE025].
            claimRefs:
