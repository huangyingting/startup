      - number: '1.4'
        title: Scale and Key Milestones
        blocks:
          - type: paragraph
            body: >
              EquipmentShare has grown with exceptional speed since commencing operations in 2015. By 2018-2020 the
              company opened its 100th location, was named one of Forbes' Best Startup Employers, launched dealerships
              for Link-Belt, Takeuchi, Yanmar and others, became the largest buyer of construction equipment, launched
              Tooling Solutions as an equipment division, and premiered a pilot autonomous machine operating system at
              Bauma in Munich. By 2021-2023 the company rebranded its technology platform to T3 (The Operating System
              for Construction), launched Advanced Solutions as a specialty equipment division, became the 4th largest
              equipment rental company in the United States, and announced the Forge & Build retail hardware brand.


              In 2024, EquipmentShare opened its Technology Development Center (TDC) in Columbia—a $100 million
              expansion of its HQ designed to create 500 jobs, attended by Missouri Governor Mike Kehoe. The company
              launched Site Solutions to support large jobsites and opened its Uptime Center, a 24/7 team to monitor
              T3-connected equipment and jobsites. The company's 300th location milestone was also reached during this
              period. By year-end 2025, the company operated 385 locations (352 full-service rental branches, 9
              dealerships, 24 building materials stores) and opened 95 new locations during the year. As of Q1 2026,
              EquipmentShare operates 407 locations.


              Key operating metrics as of May 2026 include: 357,000+ assets connected through T3, 6 billion+ data points
              streamed daily, 45 states served, and $8.1 billion+ in original equipment cost (OEC) under management. The
              Inc. 5000 2025 ranked EquipmentShare No. 1,742 with 251% three-year revenue growth (2021-2024), and Y
              Combinator named it to its Top Companies by Revenue (Top 50) list.
