  - number: 4
    title: Financials
    sections:
      - number: '4.1'
        title: Revenue Streams, Pricing Model, and Recognition
        blocks:
          - type: paragraph
            body: >
              EquipmentShare generates revenue across three reported segments: (1) equipment rental and related services

              ($2,724M in FY2025, 62.2% of total revenue), which is time-based rental of construction equipment bundled
              with

              delivery, maintenance, and telematics via the T3 platform; (2) equipment sales of new and used machinery

              (estimated ~$1,400M, ~32% of total), encompassing OEM dealership sales and fleet disposition; and (3)
              contractor

              supplies and other (~$255M, ~5.8%), which includes retail hardware through Forge & Build stores and
              ancillary

              services. An emerging fourth stream—T3 telematics SaaS subscriptions sold to external customers managing
              their

              own fleets—is operationally present (357,000+ connected assets including third-party) but not separately
              reported,

              representing a key information gap.


              Revenue recognition follows ASC 606 and ASC 842: rental revenue is accrued ratably over the rental period
              (daily,

              weekly, or monthly), equipment sales are recognized at the point of transfer of control (delivery), and
              contractor

              supplies revenue is recognized at the point of sale. T3 subscription revenue for external customers, where
              billed,

              would be recognized ratably over the subscription term. The rental segment's ratability creates a deferred

              revenue liability for advance-billed periods that is modest relative to the business scale.


              Rental pricing is set dynamically based on geography, equipment category, rental duration, customer
              volume, and

              fleet availability. No public rate cards are disclosed; pricing is established through quotation or
              negotiated

              master service agreements with larger accounts. The rental segment's 34% YoY growth in FY2025
              substantially

              outpaced total revenue growth of 16%, indicating favorable mix shift toward the highest-margin stream.
              Revenue

              quality for the rental segment is high: contracts are typically short-duration (daily to monthly),
              limiting

              long-tail credit exposure, and the T3 platform provides per-asset monitoring that reduces theft and damage
              risk.
