      - number: '8.3'
        title: 'Scenario Analysis: Bull, Base, and Bear Cases'
        blocks:
          - type: paragraph
            body: |
              The valuation framework is built on three scenarios anchored to observable operating metrics
              and sector comps. The base case assumes revenue growth normalizes to 15-20% over the next
              three years as new locations ramp (95 opened in FY2025), EBITDA margins expand toward the
              mature branch ceiling of 54-55% as the 2025 cohort seasons, and the EV/EBITDA multiple
              re-rates from 6.3x to 8-10x as T3 optionality becomes better understood by the market.
              At 8-10x forward EBITDA of approximately $1,78-$2.0 billion (FY2026 guidance midpoint), the
              implied EV is $14.2-$18.0 billion, representing 27-60% upside from the IPO enterprise value.

              The bull case requires T3 external SaaS ARR to be disclosed as material (greater than $200M
              ARR with 70%+ gross margins), continued 30%+ rental revenue growth driven by sustained IIJA
              infrastructure project activity, and a multiple re-rate to 12-14x as investors attribute
              a blended rental/SaaS multiple. At these assumptions, 12-month forward EBITDA of approximately
              $2.1 billion supports a $25-$28 billion EV, implying 120-150% upside from the IPO price.
              Bull case triggers include: first external T3 ARR disclosure in an earnings supplement or
              10-K segment note; consecutive quarters of 30%+ rental revenue growth; and expansion into new
              adjacent markets such as specialty rentals or T3-powered fleet management for non-construction
              verticals.

              The bear case is anchored to a construction demand slowdown triggered by a prolonged high-rate
              environment. If the Federal Reserve maintains elevated rates through 2026-2027 and construction
              starts decline by more than 15%, EquipmentShare's rental revenue growth would decelerate to
              less than 5%. EBITDA margins would compress from cost inflation (labor, fuel, maintenance) and
              fleet underutilization, and the multiple would remain at 5-6x. At these assumptions, implied
              EV is $8.9-$10.7 billion — a -5% to -20% decline from the IPO enterprise value. The bear
              case is bounded because the ABL facility covenants are asset-based (not rate-ratio-based),
              limiting covenant breach risk, and the OWN Program provides variable-cost fleet flexibility.
              Moody's construction outlook identifies elevated interest rate sensitivity and potential credit
              market tightening as the primary macro risks for the construction sector in 2026, consistent
              with the bear case thesis.

              The probability distribution across scenarios favors the base case (estimated 50-60%) over
              the bull (20-25%) and bear (15-30%) cases, based on current macroeconomic trajectory, the
              IIJA spending pipeline, and EquipmentShare's strong Q1 2026 execution. However, the bear case
              probability increases materially if the Federal Reserve signals additional rate hikes above
              current market expectations in 2026 or if construction starts data from AGC or Dodge show
              month-over-month deterioration for three or more consecutive months.
