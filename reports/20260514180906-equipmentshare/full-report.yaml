      - number: '2.4'
        title: Growth Drivers and Adoption Constraints
        blocks:
          - type: paragraph
            body: >
              Several structural tailwinds support sustained demand growth for US equipment rental over the next 3–5
              years.

              First, the Infrastructure Investment and Jobs Act (IIJA) commits $1.2T in federal infrastructure spending

              over ten years, creating a multi-year backlog for highway, bridge, rail, water, and broadband projects
              that

              require heavy construction equipment. Second, the data center construction boom driven by AI
              infrastructure

              investment has surged: hyperscaler capital expenditure programs at Microsoft, Amazon, Google, and Meta are

              funding tens of billions in new facility construction annually. Third, manufacturing reshoring accelerated

              by the CHIPS Act and Inflation Reduction Act (IRA) is generating demand for greenfield industrial
              facilities

              and semiconductor fabrication plants requiring specialized construction equipment. Fourth, sustained
              elevated

              non-residential construction spending—Census Bureau data shows $1.2T+ annually—provides a large base of

              recurring rental demand.


              The primary adoption constraints are structural rather than cyclical. Construction technology adoption

              remains very low: McKinsey has identified construction as one of the world's least productive major

              industries, with productivity growth lagging manufacturing by decades. Most contractors continue to manage

              equipment with informal methods, creating a high education barrier for telematics SaaS adoption. Capital

              intensity is a meaningful constraint for EquipmentShare's fleet expansion: each new location requires

              $15–25M in fleet investment and takes 12–18 months to reach mature economics, limiting how quickly the

              company can scale supply to match demand.


              Switching costs for equipment rental are low in the absence of technology integration—contractors can

              and do source from multiple providers simultaneously. With T3 integration, switching costs increase

              because contractors lose telematics visibility and workflow continuity, creating a modest lock-in moat.

              ROI on T3 telematics adoption is not yet universally demonstrated across contractor segments; anecdotal

              evidence suggests meaningful fleet utilization improvements but systematic third-party studies are sparse.

              Construction cyclicality is the most material macro risk: US equipment rental demand closely tracks

              non-residential construction spending, which fell sharply in 2009 (financial crisis) and 2020 (COVID).

              The 10-K explicitly identifies economic slowdowns, interest rate increases, and construction spending

              declines as principal risk factors. Regulatory tailwinds (IIJA, CHIPS, IRA) partially buffer cyclicality

              but cannot fully offset a broad construction downturn.
