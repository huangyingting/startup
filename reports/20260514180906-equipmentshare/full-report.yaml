      - number: '7.3'
        title: Operational, cybersecurity, and supply chain risks are embedded in the telematics model
        blocks:
          - type: paragraph
            body: >-
              T3's connectivity to more than 357,000 assets creates an attack surface that distinguishes EquipmentShare
              from traditional equipment rental operators. The remote lock and unlock capability—one of T3's core value
              propositions for theft prevention and fleet management—becomes a critical safety risk if the platform is
              compromised. An attacker who gained unauthorized access to T3 could disable equipment mid-operation,
              unlock equipment at unauthorized locations, or exfiltrate construction site operational data including
              infrastructure locations, project timing, and customer business intelligence. The 10-K identifies
              cybersecurity as a material risk factor, but public disclosures do not include specific certifications,
              penetration test results, incident response playbooks, or SLA commitments that would allow investors to
              independently assess the maturity of EquipmentShare's security posture.

              Supply chain risk arises from EquipmentShare's heavy dependence on OEM manufacturers—primarily large
              equipment makers like Caterpillar, John Deere, and Komatsu—for fleet acquisition. During the 2021–2022
              supply chain disruptions, chip shortages and port delays created extended lead times for new equipment,
              forcing rental companies to delay fleet refresh and accept aging inventory. A recurrence of similar
              disruptions would impair EquipmentShare's ability to maintain fleet age, respond to customer demand for
              newer telematics-equipped machines, and honor OEM price locks. OEM price increases compress the economics
              of fleet expansion directly.

              Fleet residual value risk is a third operational dimension that is often underweighted in growth-focused
              analysis. EquipmentShare's $9B+ OEC is a balance sheet asset whose value depends on the health of the used
              equipment market. In prior downturns, used heavy equipment prices fell significantly as rental operators
              liquidated surplus assets simultaneously. Technology obsolescence represents an additional vector: older
              machines without T3-compatible telematics hardware may depreciate faster than expected if customers demand
              connected equipment. NIST cybersecurity framework standards provide a benchmark for connected-equipment
              operators, but EquipmentShare has not publicly disclosed NIST compliance status.
