      - number: '4.6'
        title: 'Financial Verdict: Revenue Quality, Margin Path, Capital Intensity, and Diligence Blockers'
        blocks:
          - type: paragraph
            body: |
              Revenue quality is high: the rental segment—62% of FY2025 revenue and growing 34% YoY—is recurring,
              asset-backed, and differentiated by the T3 technology platform that creates switching costs and data
              moats. Equipment sales (estimated ~32%) are transactional and lower-margin, but serve fleet refresh
              and relationship-deepening functions rather than constituting the core economic engine. The 38% YoY
              acceleration in Q1 2026 revenue growth (versus 16% for full-year 2025) suggests the business is
              re-accelerating, supported by IIJA infrastructure spending, favorable construction market conditions,
              and new location openings.

              The margin path is credible and well-supported: mature locations delivering 54–55% Adj. EBITDA margins
              and 16.5% ROIC provide a proven template for the newer cohort of branches. The margin trajectory from
              new to mature is the core value-creation thesis; with 95 new locations opened in FY2025 and continued
              expansion, the drag from new location startup costs (excluded from mature metrics) is expected to
              moderate as these branches mature over 12 months.

              Capital intensity is structurally high but partially mitigated: ~$1.8B fleet capex exceeds EBITDA in
              FY2025, making the company FCF-negative on a gross basis. The OWN Program ($4.9B OEC, 56% of fleet)
              is a genuine and significant capital offset. Industry peers United Rentals and Herc Holdings operate
              at broadly comparable leverage and ROIC levels, validating the model at scale.

              Three diligence blockers remain: (1) T3 SaaS ARR is undisclosed, preventing independent valuation of
              the technology layer; (2) fleet utilization rates are not reported, making EBITDA sensitivity analysis
              difficult; (3) segment-level gross margins are not disaggregated, limiting cost-structure modeling.
              Until these are addressed, the technology premium in EquipmentShare's valuation rests on qualitative
              rather than quantitative evidence.
            claimRefs:
              - CI032
              - CI033
              - CI036
              - CI037
              - CI038
              - CI039
              - CI040
  - number: 5
    title: Product & Technology
    sections:
      - number: '5.1'
        title: 'T3 Platform: Product Definition and Customer Workflow'
        blocks:
          - type: paragraph
            body: |
              T3 is EquipmentShare's proprietary technology platform, positioned as "The Operating System for
              Construction." It integrates IoT hardware installed on any make or model of heavy construction
              equipment with a cloud SaaS layer that gives contractors real-time visibility and control over
              their entire fleet [CE001][CE002]. In the customer workflow, T3 solves four interconnected
              problems that construction operators face daily: equipment downtime from unscheduled maintenance,
              idle and underutilized machines on jobsites, lack of real-time asset location, and inability to
              enforce operator safety and certification compliance without manual inspection [CE003][CE004].

              A contractor's workflow begins when T3 hardware is installed on a machine—whether owned or rented
              from EquipmentShare. From that moment, the T3 Keypad enables remote start/stop and RFID-based
              job costing, the GPS Tracker provides real-time location and geofencing alerts, and the Dash Cam
              delivers AI-powered driver monitoring and collision detection [CE005][CE006]. All sensor streams
              flow to the T3 cloud dashboard, where fleet managers can schedule preventive maintenance, analyze
              fuel consumption, review operator safety scores, and run jobsite utilization reports without
              physically visiting each machine [CE007][CE008]. The T3 Uptime Center provides 24/7 monitoring
              by a dedicated operations team watching connected equipment across EquipmentShare's customer base,
              enabling proactive intervention before costly failures occur [CE009].

              T3 is sold both as an embedded capability within EquipmentShare's own OWN and RENT fleets and as
              an external SaaS subscription to contractors managing their own equipment [CE010]. This dual
              distribution creates two distinct revenue vectors: the platform deepens EquipmentShare's own
              rental operations while generating a separate subscription revenue stream that is increasingly
              independent of the rental cycle [CE011]. Customer validation is tangible: Yates Construction
              reported a 20% improvement in overall jobsite efficiency after deploying T3 across their fleet,
              which is an extraordinary operational gain for a capital-intensive business [CE012].
            claimRefs:
