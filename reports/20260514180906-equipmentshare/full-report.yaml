      - number: '3.3'
        title: Technology Competitor Profiles
        blocks:
          - type: paragraph
            body: >
              EquipmentShare's T3 platform competes with a set of construction-focused telematics and fleet-management
              SaaS

              vendors that serve the same jobsite visibility problem but without a physical rental fleet.


              Trackunit, backed by Goldman Sachs Capital and GRO Capital, is the most prominent global pure-tech
              competitor.

              With more than 1.3 million connected assets primarily in Europe and the Nordics, Trackunit offers a
              mixed-fleet

              telematics platform for construction. In 2023, Trackunit acquired IronSight, a jobsite access and
              gate-management

              platform, broadening its value proposition beyond GPS tracking. Trackunit's SaaS-only model and European

              concentration limit direct US rental competition with EquipmentShare, but its technology maturity is a
              meaningful

              benchmark.


              Tenna serves more than 700 US construction customers with a multi-technology tracking platform combining
              GPS,

              RFID, and BLE to cover heavy equipment, tools, and attachments. Hilti ON!Track targets enterprise
              construction

              sites with premium asset management tightly integrated into Hilti's tool ecosystem.


              Samsara (NYSE: IOT) generates $1 billion+ in annual recurring revenue from its broader IoT platform
              covering

              vehicles, industrial equipment, and distribution fleets. Samsara is less construction-specific than T3—it
              lacks

              jobsite-specific workflows and OEM telematics integration at the depth EquipmentShare provides—but its
              brand

              recognition and enterprise sales infrastructure make it a credible evaluation alternative for general
              contractors.


              Status quo tracking—pen-and-paper logs and spreadsheets—remains the dominant method in the sub-5-machine

              contractor segment, representing the largest competitive volume in the long tail where EquipmentShare is

              actively expanding. Large contractors building proprietary fleet-management systems represent a third
              category:

              an internal build path that is viable for enterprises but requires sustained engineering investment.
