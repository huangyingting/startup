      - number: '8.4'
        title: Comparable Valuation and Peer Benchmarks
        blocks:
          - type: paragraph
            body: |
              The equipment rental sector offers a tractable set of public comparables for EquipmentShare.
              The four primary public benchmarks are United Rentals (NYSE: URI), Ashtead Group/Sunbelt
              Rentals (LSE: AHT), Herc Holdings (NYSE: HRI), and H&E Equipment Services (Nasdaq: HEES).
              United Rentals is the largest public equipment rental company in North America, with
              approximately $15 billion in FY2024 revenue and an EV of approximately $22 billion,
              implying a 13-15x NTM EV/EBITDA multiple. This premium reflects United Rentals' scale, its
              Specialty segment (higher-margin tools, fluid solutions, power), and its track record of
              disciplined capital allocation. EquipmentShare's 6.3x multiple represents a 55-60% discount
              to United Rentals.

              Ashtead Group (operating as Sunbelt Rentals in North America) is the most internationally
              comparable peer, with £6.5+ billion in revenue and a £17 billion enterprise value (approximately
              $21 billion USD), implying an 8-10x NTM EV/EBITDA. The discount to United Rentals reflects
              Ashtead's UK listing and a modestly lower specialty mix; however, its North American business
              closely parallels EquipmentShare's construction-focused model. Herc Holdings is the most
              scale-comparable peer, with approximately $3.5 billion in FY2024 revenue and a $5 billion EV,
              also trading at 8-10x NTM. Herc's leverage of approximately 3.5x is similar to EquipmentShare's
              2.8x, making it the closest comparable on capital structure as well as revenue scale.

              H&E Equipment Services, with approximately $1 billion in revenue, is being acquired by United
              Rentals in a 2025 transaction that implied approximately 5-7x EV/EBITDA — establishing a floor
              multiple for smaller-scale, pure-rental operators without a technology differentiator. The
              acquisition confirms that the sector is consolidating toward scale, which is directionally
              positive for EquipmentShare's competitive positioning.

              The comparable analysis supports the view that EquipmentShare's 6.3x TTM EV/EBITDA is a
              discount entry point relative to the 8-15x range for its public peers. The discount is
              partially explained by EquipmentShare's status as a newly public company with less than four
              months of post-IPO trading history, the absence of T3 SaaS metrics, and the lack of fleet
              utilization disclosures that peers like United Rentals provide quarterly. As these information
              gaps close, the rational market outcome is a gradual multiple re-rating toward the 8-10x range,
              consistent with the base case scenario.
