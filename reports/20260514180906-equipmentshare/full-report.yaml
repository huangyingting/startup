  - number: 8
    title: Valuation
    sections:
      - number: '8.1'
        title: Investment Thesis and Anti-Thesis
        blocks:
          - type: paragraph
            body: |
              The investment thesis for EquipmentShare rests on four pillars: (1) a differentiated technology
              platform (T3) embedded in 357,000+ connected assets that creates switching costs and a potential
              high-margin SaaS layer not yet priced into the stock; (2) an accelerating rental revenue growth
              trajectory — 34% YoY in FY2025 and 37% in Q1 2026 — substantially outpacing peers United
              Rentals (~10% growth) and Herc Holdings (~8% growth), driven by location expansion and IIJA
              infrastructure spend; (3) a capital-efficient fleet model through the OWN Program ($4.9B OEC,
              56% of total fleet) that reduces gross capex requirements while expanding the rentable asset base;
              and (4) a valuation entry point at 6.3x TTM EV/EBITDA that is a 50-60% discount to United Rentals
              and a 20-35% discount to mid-cap peers Herc Holdings and Ashtead, providing meaningful margin
              of safety against execution risk.

              The anti-thesis is equally explicit. First, the T3 technology premium is unverifiable from public
              disclosures: no external SaaS ARR, customer count, or net revenue retention metric has been
              disclosed in any SEC filing, earnings release, or IR presentation. If T3's external subscription
              revenues are de minimis (less than $100 million ARR), the valuation case rests entirely on
              traditional equipment rental multiples, and the current 6.3x is merely fair, not attractive.
              Second, construction market cyclicality remains a material risk: EquipmentShare's entire revenue
              base is correlated with U.S. construction starts, and a rate-hike-driven slowdown could reduce
              equipment demand by 10-20%, compressing both revenue and EBITDA margins simultaneously. Third,
              capital intensity constrains free cash flow: FY2025 fleet capex of approximately $1.8 billion
              exceeded Adjusted Core EBITDA of $1.667 billion, making the company FCF-negative in high-growth
              mode. Finally, OWN Program concentration risk is opaque: 56% of the rentable fleet is owned by
              third parties under undisclosed revenue-sharing terms, creating contingent off-balance-sheet
              obligations if OWN participants exit or renegotiate terms.

              The weight of evidence currently favors the thesis over the anti-thesis, but the margin is
              narrower than the bull case suggests. The 6.3x entry multiple provides downside protection;
              the path to multiple expansion depends on evidence that the market does not yet have.
